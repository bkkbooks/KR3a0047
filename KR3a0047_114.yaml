body:
  text: 朱子語類卷第一百一十四朱子十一訓門人二先生問看甚文字曰看論語看得論語如何曰自看論語後覺得做工夫緊不似每常悠悠曰做甚工夫曰只是存養曰自見住不得時便是某怕人說我要做這箇事見飯便喫見路便行只管說我要做這箇事何益文蔚又言近來覺有一進處畏不義見不義事不敢做曰甚好但亦要識得義與不義若不曾睹當得是顛前錯後依舊是胡做又曰須看大學聖賢所言皆是自家元有此理但人不肯著意看若稍自著意便自見得卻不是自家無此理他鑿空撰來以下訓文蔚問私意竊發隨即鉏治雖去枝葉本根仍在感物又發如何曰只得如此所以曾子戰戰兢兢如臨深淵如履薄煉一日侍食先生曰只易中節飲食三字人不曾行得子融才卿是許多文字看過今更巡一遍所謂溫故再巡一遍又須較見得分曉如人有多田地須自照管曾耕得不曾耕得若有荒廢處須用耕墾子融曰每自思之今亦不可謂不知但知之未至不可謂不誠但其誠未至不可謂不行但行之未至若得這三者皆至便是了得此事曰須有一箇至底道理因說僧家有規矩嚴整士人卻不循禮曰他卻是心有用處今士人雖有好底不肯為非亦是他資質偶然如此要之其心實無所用每日間慢時多如欲理會道理理會不得便掉過三五日半月日不當事鑽不透便休了既是來這一門鑽不透又須別尋一門不從大處入須從小處入不從東邊入便從西邊入及其入得卻只是一般今頭頭處處鑽不透便休了如此則無說矣有理會不得處須是皇皇汲汲然無有理會不得者譬如人有大寶珠失了不著緊尋如何會得謂文蔚曰公卻是見得一箇物事只是不光彩一日呈所送崇甫序觀畢曰前日說公不光彩且如這般文字亦不光彩問色容莊最難曰心肅則容莊非是外面做那莊出來陳才卿亦說九容次早才卿以右手拽敘衫左袖口偏於一邊先生曰公昨夜說手容恭今卻如此才卿赧然急叉手鞠躬曰忘了先生曰為己之學有忘耶向徐節孝見胡安定退頭容少偏安定忽厲聲云頭容直節孝自思不獨頭容要直心亦要直自此便無邪心學者須是如此始得友仁次日相見先生偶腳氣發因蘇宜久欲歸先生蹙然曰觀某之疾如此非久於世間者只是一兩年間人亦欲接引後輩一兩人傳續此道荷公們遠來亦欲有所相補助只是覺得如此苦口都無一分相啓發處不知如何橫說豎說都說不入如昨夜才卿問程先生如此謹嚴何故諸門人皆不謹嚴因隔夜說程門諸弟子及後來失節者某答云是程先生自謹嚴諸門人自不謹嚴干程先生何事某所以發此者正欲才卿深思而得反之於身如針之劄身皇恐發憤無地自存思其所以然之故卻再問某李先生資質如何全不相干涉非惟不知針之劄身便是刀鋸在身也不知痛了每日讀書心全不在上只是要自說一段文義便了如做一篇文義相似心中全無所作為恰似一箇無圖之人飽食終日無所用心若是心在上面底人說得話來自別自相湊合敢說公們無一日心在上面莫說一日便十日心也不在莫說十日便是數月心也不在莫說數月便是整年心也不在每日讀書只是讀過了便不知將此心去體會所以說得來如此疏先生意甚不樂僩陳才卿說詩先生曰謂公不曉文義則不得只是不見那好處正如公適間說窮理也知事事物物皆具此理隨事精察便是窮理只是不見所謂好處所謂民生日用而不知所謂小曉得而大不曉得這箇便是大病此句厲聲說某也只說得到此要公自去會得久之又曰大凡事物須要說得有滋味方見有功而今隨文解義誰人不解須要見古人好處如昔人賦梅云疏影橫斜水清淺暗香浮動月黃昏這十四箇字誰人不曉得然而前輩直恁地稱歎說他形容得好是如何這箇便是難說須要自得言外之意始得須是看得那物事有精神方好若看得有精神自是活動有意思跳躑叫喚自然不知手之舞足之蹈這箇有兩重曉得文義是一重識得意思好處是一重若只是曉得外面一重不識得他好底意思此是一件大病如公看文字都是如此且如公看詩自宣王中興諸詩至此至節南山公於其他詩都說來中間有一詩最好如白駒是也公卻不曾說這箇便見公不曾看得那物事出謂之無眼目若是具眼底人此等詩如何肯放過只是看得無意思不見他好處所以如此又曰須是踏翻了船通身都在那水中方看得出僩建別録文蔚録云文蔚一日說太極通書不說格物致知工夫先生甚訝之後數日文蔚拈起中間三語先生曰躍翻卻船通身下水裏去文蔚始有所悟今池録卻將文蔚別話頭合作一段記者誤矣袁州臨別請教先生曰守約兄弟皆太拘謹更少放寬謹固好然太拘則見道理不盡處事亦往往急迫道理不只在一邊須是四方八面看始盡訓閎祖邵武人箇箇急迫此是氣稟如此學者先須除去此病方可進道先生謂方子曰觀公資質自是寡過然開闊中又須縝密寬緩中又須謹敬訓方子又問如孟子言勿忘勿助長卻簡易而今要細碎做去怕不能貫通曰孟子言勿忘勿助長處自是言養氣試取孟子說處子細看便見大凡為學最切要處在吾身心其次便是做事此是的實緊切處學者須是把聖人之言來窮究見得身心要如此做事要如此天下自有一箇道理在若大路然聖人之言便是一箇引路底李公晦問忠恕曰初讀書時且從易處看待得熟後難者自易理會如捉賊先擒盡弱者則賊魁自在這裏不容脫也且看論語前面所說分曉處蓋卿前日得公書備悉雅意聖賢見成事跡一一可考而行今日之來若捨六經之外求所謂玄妙之說則無之近世儒者不將聖賢言語為切己之事必於上面求新奇可喜之論屈曲纏繞詭祕變怪不知聖賢之心本不如此既以自欺又轉相授受復以欺人某嘗謂雖使聖人復生亦只將六經語孟之所載者循而行之必不更有所作為伏羲再出依前只畫八卦文王再出依前只衍六十四卦禹再出依前只是洪範九疇此外更有甚詫異事如今要緊只是將口讀底便做身行底說出底便是心存底居父相聚幾一年覺得渠只怕此事有難者某終曉渠意不得以下訓賀孫問在卿如何讀書賀孫云少失怙恃凡百失教既壯所從師友不過習為科舉之文然終不肯安心於彼常欲讀聖賢之書自初得先生所編論孟精義讀之至今不敢忘然中間未能有所決擇故未有定見先生曰大凡人欲要去從師然未及從師之時也須先自著力做工夫及六七分到得聞緊切說話易得長進若是平時不曾用力終是也難一頓下手今須先正路頭明辨為己為人之別直見得透卻旋旋下工夫則思慮自通知識自明踐履自正積日纍月漸漸熟漸漸自然若見不透路頭錯了則讀書雖多為文日工終做事不得比見浙間朋友或自謂能通左傳或自謂能通史記將孔子置在一壁卻將左氏司馬遷駁雜之文鑽研推尊謂這箇是盛衰之由這箇是成敗之端反而思之干你身己甚事你身己有多多少少底事合當理會有多多少少底病未曾去卻來說甚盛衰興亡治亂這箇直是自欺仁父味道卻是別立得一箇志趨卻正下工夫卻易先生因學者少寬舒意曰公讀書恁地縝密固是好但恁地逼截成一團此氣象最不好這是偏處如一項人恁地不子細固是不成箇道理若一向蹙密下梢卻展拓不去明道一見顯道曰此秀才展拓得開下梢可望又曰於辭氣間亦見得人氣象如明道語言固無甚激昂看來便見寬舒意思龜山人只道恁地寬看來不是寬只是不解理會得不能理會得范純夫語解比諸公說理最平淺但自有寬舒氣象最好問看大學覺得未透心也尚粗在曰這粗便是細只是恁地看熟了自通透公往前在陳君舉處如何看文字曰也只就事上理會將古人所說來商量須教可行曰怕恁地不得古人見成法度不用於今自是如今有用不得處然不可將古人底析合來就如今為可用之計如鄭康成所說井田固是難得千里平地如此方正可疆理溝洫之類但古人意思必是如此方得不應零零碎碎做得成古人事事先去理會大處正處到不得已處方有變通今卻先要去理會變通之說問初學心下恐空間未得試驗之平日常常看書否則便思索義理其他邪妄不見來才心下稍空間便思量別所在去這當奈何曰才要間便不間才要靜便不靜某向來正如此可將明道答橫渠書看因舉其間非外是內之說問前日承教辨是非只交遊中便有是有非自家須分別得且不須誦言這莫是只說尋常泛交若朋友則有責善琢磨之義曰固是若是等間人亦自不可說只自家胸次便要得是非分明事事物物上都有箇道理都有是有非所以舜好問而好察邇言雖淺近間言語中莫不有理都要見得破隱惡而揚善自家這裏善惡便分明然以聖明昭鑒才見人不好便說出來也不得只是揚善那惡底自有不得掩之理才說揚善自家已自分明這亦聖人與人為善之意又云一件事走過眼前匹似間也有箇道理也有箇是非緣天地之間上蟠下際都無別事都只是這道理如今理會道理且要識得箇頭若不識得箇頭只恁地散散逐段說不濟事假饒句句說得段段記得有甚精微奧妙都理會得也都是間話若識得箇頭上有源頭下有歸著看聖賢書便句句著實句句為自家身己設如此方可以講學要知這源頭是甚麼只在身己上看許多道理盡是自家固有底仁義禮智知皆擴而充之若火之始然泉之始達這箇是源頭見得這箇了方可講學方可看聖賢說話恰如人知得合當行只假借聖賢言語作引路一般不然徒記得說得都是外面間話聖賢急急教人只在這些子才差過那邊去便都無些子著身己都是要將去附合人都是為別人全不為自家身己才就這邊來便是自工夫這正是為己為人處公今且要理會志趣是要如何若不見得自家身己道理分明看聖賢言語那裏去捉摸又云如今見得這道理了到得進處有用力愨實緊密者進得快有用力慢底便進得鈍何況不見得這源頭道理便緊密也徒然不濟事何況慢慢地便全然是空如今拽轉亦快如船遭逆風吹向別處去若得風翻轉是這一載不問甚麼物色一齊都拽轉若不肯轉時一齊都不轉見說毋不敬便定定著毋不敬始得見說思無邪便定定著思無邪始得書上說毋不敬自家口讀毋不敬身心自恁地怠慢放肆詩上說思無邪自家口讀思無邪心裏卻胡思亂想這不是讀書口即是心心即是口又如說足容重須著重是天理合下付與自家便當重自家若不重便自壞了天理手容恭須著恭是天理合下付與自家便當恭自家若不恭便自壞了天理目容端口容止聲容靜頭容直氣容肅立容德色容莊云云把聖賢說話將來學便是要補填得元初底教好又如說非禮勿視自是天理付與自家雙眼不曾教自家視非禮才視非禮便不是天理非禮勿聽自是天理付與自家雙耳不曾教自家聽非禮才聽非禮便不是天理非禮勿言自是天理付與自家一箇口不曾教自家言非禮才言非禮便不是天理非禮勿動自是天理付與自家一箇身心不曾教自家動非禮才動非禮便不是天理賀孫請問語聲末後低先生不聞因云公仙鄉人何故聲氣都恁地說得箇起頭後面懶將去孔子曰聽其言也厲公只管恁地下梢不好見道理不分明將漸入於幽暗含含胡胡不能到得正大光明之地說話須是一字是一字一句是一句便要見得是非先生謂賀孫也只是莫巧公鄉間有時文之習易得巧問往前承誨只就窮理說較多此來如尊德性致廣大極高明上一截數數蒙提警此意是如何曰已前也說了只是夾雜說如大學中亦自說但覺得近日諸公去理會窮理工夫多又自漸漸不著身己嘗見陸子靜說且恁地依傍看思之此語說得好公看文字亦且就分明注解依傍看教熟待自家意思與他意思相似自通透也自有一般人敏捷都要看過都會通曉若不恁地只是且就曉得處依傍看如公讀論語還當文義曉得了未若文義未曉得又且去看某家如此說某家如彼說少間都攪得一綜沒理會尹和靖只是依傍伊川許多說話只是他也沒變化然是守得定辭先生同黃敬之歸鄉赴舉先生曰仙里士人在外孰不經營僞牒二公獨徑還鄉試殊強人意先生問赴試用甚文字賀孫以春秋對曰春秋為仙鄉陳蔡諸公穿鑿得盡諸經時文愈巧愈鑿獨春秋為尤甚天下大抵皆為公鄉里一變矣先生問時舉觀書如何時舉自言常苦於粗率無精密之功不知病根何在曰不要討甚病根但知道粗率便是病在這上便更加仔細便了今學者亦多來求病根某向他說頭痛灸頭腳痛灸腳病在這上只治這上便了更別討甚病根也以下訓時舉又讀回也三月不違仁一段曰工夫既能向裏只要常提醒此心心才在這裏外面許多病痛自然不見問管仲之器小哉處說及王伯之所以異先生曰公看文字好立議論是先以己意看他卻不以聖賢言語來澆灌胸次中這些子不好自後只要白看乃好先生歷言諸生之病甚切謂時舉看文字也卻細膩親切也卻去身上做工夫但只是不去正處看卻去偏傍處看如與人說話相似不向面前看他卻去背後尋索以為面前說話皆不足道此亦不是些小病痛想見日用工夫也只去小處理會此亦是立心不定故爾切宜戒之先生問云子善別後做甚工夫時舉云自去年書院看孟子至告子歸後雖日在憂患中然夜間亦須看一二章至今春看了卻看中庸見讀程易此讀書工夫如此若裏面工夫尚多間斷未接續成片段將如之何先生曰書所以維持此心若一時放下則一時德性有懈若能時時讀書則此心庶可無間斷矣因問日夜之所息舊兼止息之義今只作生息之義如何曰近看得只是此義時舉云凡物日夜固有生長若良心既放而無操存之功則安得自能生長曰放去未遠故亦能生長但夜間長得三四分日間所為又做了七八分卻摺轉來都消磨了這些子意思此所以終至於梏亡也早拜朔先生說諸友相聚已半年光陰易過其間看得文義分明者所見亦未能超詣不滿人意兼是為學須是己分上做工夫有本領方不作言語說若無存養儘說得明自成兩片亦不濟事況未必說得明乎要須發憤忘食痛切去做身分上功夫莫荏苒歲月可惜也是日問時舉看詩外別看何書時舉答欲一面看近思録曰大凡為學有兩樣一者是自下面做上去一者是自上面做下來自下面做上者便是就事上旋尋箇道理湊合將去得到上面極處亦只一理自上面做下者先見得箇大體卻自此而觀事物見其莫不有箇當然之理此所謂自大本而推之達道也若會做工夫者須從大本上理會將去便好昔明道在扶溝謂門人曰爾輩在此只是學某言語盍若行之謝顯道請問焉卻云且靜坐時舉因云雷在地中復先王以至日閈關商旅不行后不省方在學者分上說便是要安靜涵養這些子善端耳曰若著實做工夫要知這說話也不用說若會做工夫便一字也來這裏使不著此說某不欲說與人卻恐學者聽去便做虛空認了且如程門中如游定夫後來說底話大段落空無理會處未必不是在扶溝時只恁地聽了時舉因言平日學問次第云云先生曰此心自不用大段拘束他他既在這裏又要向那裏討他要知只是爭箇醒與睡著耳人若醒時耳目聰明應事接物便自然無差錯處若被私欲引去便一似睡著相似只更與他喚醒才醒又便無事矣時舉因云釋氏有豁然頓悟之說不知使得否不知倚靠得否曰某也曾見叢林中有言頓悟者後來看這人也只尋常如陸子靜門人初見他時常云有所悟後來所為卻更顛倒錯亂看來所謂豁然頓悟者乃是當時略有所見覺得果是淨潔快活然稍久則卻漸漸淡去了何嘗倚靠得時舉云舊時也有這般狂底時節以為聖人便即日可到到後來果如先生所云漸漸淡了到今日卻只得逐旋挨去然早上聞先生賜教云諸生工夫不甚超詣時舉退而思之不知如何便得超詣曰只從大本上理會亦是逐旋挨去自會超詣且如今學者考理一如在淺水上撐船相似但覺辛苦不能鄉前須是從上面放得些水來添便自然撐得動不用費力滔滔然去矣今有學者在某門者其於考理非不精當說得來置水不漏直是理會得好然所為卻顛倒錯繆全然與所知者相反人只管道某不合引他如今被他纍卻不知渠實是理會得某如何不與他說他凡所說底話今世俗人往往有全曉不得者他之所說非不精明然所為背馳者只是不曾在源頭上用力故也往往他一時明敏隨處理會便自曉得分明然源頭上不曾用功只是徒然耳時舉因云如此者不是知上工夫缺乃是行上全然缺耳曰也緣知得不實故行得無力時舉云惟其不見於行是以知不能實時舉嘗謂知與行互相發明之說誠不可易之論先生又云此心虛明萬理具足外面理會得者即裏面本來有底只要自大本而推之達道耳先生又謂時舉曰朋友相處要得更相規戒有過則告時舉應喏先生曰然小過只嘵嘵底說又似沒緊要相似大底過失又恐他已深痼不容易說要知只盡公之誠意耳又云本領上缺了工夫外面都是間須知道大本若立外面應事接物上道理都是大本上發出如人折這一枝花只是這花根本上物事問久侍師席今將告違氣質偏蔽不能自知尚望賜以一言使終身知所佩服曰凡前此所講論者不過如此亦別無他說但於大本上用力凡讀書窮理須要看得親切某少年曾有一番專看親切處其他器數都未暇考此雖未為是卻與今之學者泛然讀過者似亦不同丙午四月五日見先生坐定問從何來某云自丹陽來問仙鄉莫有人講學某說鄉里多理會文辭之學問公如何用心某說收放心慕顏子克己氣象游判院教某常收放心常察忘與助長曰固是前輩煞曾講說差之毫釐繆以千里今之學者理會經書便流為傳注理會史學便流為功利不然即入佛老最怕差錯問公留意此道幾年何故向此某說先妣不幸某憂痛無所措身因讀西銘見說乾父坤母終篇皆見說得是遂自此棄科舉某十年願見先生緣家事為纍今家事盡付妻子於世務絶無纍又無功名之念正是侍教誨之時先生說公已得操心之要問公常讀何書答云看伊川易傳語孟精義程氏遺書近思録先生說語孟精義皆諸先生講論其間多異同非一定文字又在人如何看公畢竟如何用心某說仰慕顏子見其氣象極好如三月不違仁得一善則拳拳服膺如克己之目某即察私心欲去盡然而極難頃刻不存則忘才著意又助長覺得甚難先生云且只得恁地先生問君十年用功莫須有見處某謝資質愚鈍未有見處望先生教誨先生云也只是這道理先輩都說了問仙鄉莫煞有人講學某說鄉里多從事文辭先生說早來說底學經書者多流為傳注學史者多流為功利不則流入釋老某即說游判院說釋氏亦格物亦有知識但所見不精先生說近學佛者又生出許多知解各立知見又卻都不如它佛元來說得直截問都不曾見誰某說只見游判院薛象先略曾見先生說聞說薛象先甚好只是不相識曾有何說某說薛大博教某居仁由義仁者人之安宅義者人之正路別有何說某說薛大博論顏子克己之目舉伊川四針某又說薛大博說近多時不聞人說這話謂某學問實頭但不須與人說退之言不可公傳道之在孟子己私淑諸人先生云卻不如此孟子說君子之教者五上四者皆親教誨之如私淑艾乃不曾親見私傳此道自治亦猶我教之一等如私淑諸人乃孟子說我未得為孔子徒也但私傳孔子之道淑諸人又說與同座二客如竇君說話與公別池録作此公卻別不用心於外晚見先生同坐廖教授子晦敬之先生說向來人見尹和靖云諸公理會得箇學字否只是學做箇人人也難做如堯舜方是做得箇人某說天地人謂之三極人才有些物欲害處便不與天地流通如何得相似誠為難事先生曰是問鎮江耿守如何某說民間安土樂業云見說好只是不相識先生說與廖子晦適間文卿說明道語學者要鞭辟近裏切問而近思仁在其中矣又曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行只此是學質美者明得盡渣滓便渾然卻與天地同體其次莊敬持養及其至則一也明得盡時渣滓已自化了莊敬持養未能與己合以下訓從周先生問曾理會敬字否曰程先生說主一之謂敬無適之謂一曰畢竟如何見得這敬字曰端莊嚴肅則敬便存曰須是將敬來做本領涵養得貫通時才敬以直內便義以方外義便有敬敬便有義如居仁便由義由義便居仁某說敬莫只是涵養義便分別是非曰不須恁地說不敬時便是不義學者理會道理當深沉潛思又曰讀書如煉丹初時烈火鍛煞然後漸漸慢火養又如煮物初時烈火煮了卻須慢火養讀書初勤敏著力子細窮究後來卻須緩緩溫尋反復玩味道理自出又不得貪多欲速直須要熟工夫自熟中出文卿病在貪多欲速公看道理失之太寬譬如小物而用大籠罩終有轉動又如一物上下四旁皆有所添引如此則必不精矣當如射者專心致志只看紅心若看紅心又覷四邊必不能中列子說一射者懸蝨於戶視之三年大如車輪想當時用心專一不知有他雖實無這事要當如此所見方精某說克伐怨欲此四事自察得卻絶少昨日又思量剛字先聖所取甚重曰吾未見剛者某驗之於身亦庶幾焉且如有邪正二人欲某曲言之雖死不可先生曰不要恁地說惟天性剛強之人不為物欲所屈如克伐怨欲亦不要去尋求勝他如此則胸中隨從者多反害事只此便是克伐怨欲只是虛心看物物來便知是與非事事物物皆有箇透徹無隔礙方是才一事不透便做病且如公說不信陰陽家說亦只孟浪不信夜來說神仙事不能得了當究竟知否某對未知的當請問先生曰伊川曾說地美神靈安子孫盛如不為五者今之陰陽家卻不知惟近世呂伯恭不信然亦是橫說伊川言方為至當古人卜其宅兆是有吉凶方卜譬如草木理會根源則知千條萬葉上各有箇道理事事物物各有一線相通須是曉得敬夫說無神仙也不消得便有也有甚奇異彼此無相干又管他什麼卻須要理會是與非且如說間話多亦是病尋不是處去勝他亦是病便將來做克伐怨欲看了一切掃除若此心湛然常如明鏡物來便見方是如公前日有些見處只管守著歡喜則甚如漢高祖得關中若見寶貨婦女喜後便住則敗事矣又如既取得項羽只管喜後不去經畫天下亦敗事正如過渡既已上岸則當向前不成只管讚嘆渡船之功聖人言語一重又一重須入深處看若只見皮膚便有差錯須深沉方有得夜來所說是終身規模不可便要使便有安頓先生問如何理會致知格物從周曰涵養主一使心地虛明物來當自知未然之理曰恁地則兩截了先生問竇云尋常看敬字如何曰心主於一而無有它適先生曰只是常要提撕令胸次湛然分明若只塊然獨坐守著箇敬卻又昏了須是常提撕事至物來便曉然判別得箇是非去竇云每常胸次湛然清明時覺得可悅曰自是有可悅之理只是敬好敬以直內便能義以方外有箇敬便有箇不敬常如此戒懼方不睹不聞未有私欲之際已是戒懼了及至有少私意發動又卻慎獨如此即私意不能為吾害矣德明竇問讀大學章句或問雖大義明白然不似聽先生之教親切曰既曉得此意思須持守相稱方有益誠敬二字是涵養它底德明竇自言夢想顛倒先生曰魂與魄交而成寐心在其間依舊能思慮所以做成夢因自言數日病只管夢解書向在官所只管夢為人判狀竇曰此猶是日中做底事曰只日中做底事亦不合形於夢德明
