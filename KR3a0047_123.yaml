body:
  text: 朱子語類卷第一百二十三陳君舉陳同父葉正則附先生問德粹去年何處作考官對以永嘉問曾見君舉否曰見之曰說甚話曰說洪範及左傳曰洪範如何說曰君舉以為讀洪範方知孟子之道性善如前言五行五事則各言其德性而未言其失及過於皇極則方辨其失曰不然且各還他題目一則五行二則五事三則八政四則五紀五則皇極至其後庶徵五福六極乃權衡聖道而著其驗耳又問春秋如何說滕云君舉云世人疑左丘明好惡不與聖人同謂其所載事多與經異此則有說且如晉先蔑奔人但謂先蔑奔秦耳此乃先蔑立嗣不定故書奔以示貶曰是何言語先蔑實是奔秦如何不書奔且書奔秦謂之示貶不書奔則此事自不見何以為褒昨說與吾友所謂專於博上求之不反於約乃謂此耳是乃於穿鑿上益加穿鑿疑誤後學可學因問左氏識見如何曰左氏乃一箇趨利避害之人要置身於穩地而不識道理於大倫處皆錯觀其議論往往皆如此且大學論所止便只說君臣父子五件左氏豈知此如云周鄭交質而曰信不由中質無益也正如田客論主而責其不請喫茶使孔子論此肯如此否尚可謂其好惡同聖人哉又如論宋宣公事曰宋宣公可謂知人矣立穆公其子饗之命以義夫是何等言談可學曰此一事公羊議論卻好曰公羊乃儒者之言可學又問林黃中亦主張左氏如何曰林黃中卻會占便宜左氏疏脫多在君子曰渠卻把此殃苦劉歆昔呂伯恭亦多勸學者讀左傳嘗語之云論孟聖賢之言不使學者讀反使讀左傳伯恭曰讀論孟使學者易向外走因語之云論孟卻向外走左氏卻不向外走讀論孟且先正人之見識以參他書無所不可此書自傳惠公元妃孟子起便沒理會大抵春秋自是難看今人說春秋有九分九釐不是何以知聖人之意是如此平日學者問春秋且以胡文定傳語之可學陳君舉得書云更望以雅頌之音消鑠群慝章句訓詁付之諸生問他如何是雅頌之音今只有雅頌之辭在更沒理會又去那裏討雅頌之音便都只是瞞人又謂某前番不合與林黃中陸子靜諸人辨以為相與詰難竟無深益蓋刻畫太精頗傷易簡矜持己甚反涉吝驕不知更何如方是深益若孟子之闢楊墨也只得恁地闢他說刻畫太精便只是某不合說得太分曉不似他只恁地含糊他是理會不得被眾人擁從又不肯道我不識又不得不說說又不識所以不肯索性開口道這箇是甚物事又只恁鶻突了子靜雖占姦不說然他見得成箇物事說話間便自然有箇痕跡可見只是人理會他底不得故見不得然亦易見子靜只是人未從他便不說及鉤致得來便直是說方始與你理會至如君舉胸中有一部周禮都撐腸拄肚頓著不得如遊古山詩又何消說著他只是他稍理會得便自要說又說得不著如東坡子由見得箇道理更不成道理又卻便開心見膽說教人理會得又曰他那得似子靜子靜卻是見得箇道理卻成一部禪他和禪識不得賀孫金溪之學雖偏然其初猶是自說其私路上事不曾侵過官路來後來於不知底亦要彊說便說出無限亂道前輩如歐公諸人為文皆善用其所長凡所短處更不拈出來說所以不見疏脫今永嘉又自說一種學問更沒頭沒尾又不及金溪大抵只說一截話終不說破是箇甚麼然皆以道義先覺自處以此傳授君舉到湘中一收收盡南軒門人胡季隨亦從之問學某向見季隨固知其不能自立其胸中自空空無主人所以纔聞他人之說便動季隨在湖南頗自尊大諸人亦多宗之凡有議論季隨便為之判斷孰是孰非此正猶張天師不問長少賢否只是世襲做大正淳曰湖南之從南軒者甚眾且久何故都無一箇得其學曰欽夫言自有弊諸公只去學他說話凡說道理先大拍下然欽夫後面卻自有說諸公卻只學得那大拍頭必大因說鄉里諸賢文字以為皆不免有藏頭亢腦底意思有學者來問便當直說與之在我不可不說若其人半間不界與其人本無求益之意故意來磨難則不宜說外此說儘無害我畢竟說從古聖賢已行底道理不是為姦為盜怕說與人不知我說出便有甚罪過諸賢所見皆如此祇緣怕人譏笑遂以此為戒便藏頭不說某與林黃中爭辨一事至今亦只是說不以為悔夫道若大路然何掩蔽之有打空說及某人鄉里皆推其有所見其與朋友書言學不至於不識不知順帝之則處則學為無用先生曰近來人自要向高說一等話要知初學及此是為躐等詩人這句自是形容文王聖德不可及處聖人教人何嘗不由識入來宇或曰永嘉諸公多喜文中子曰然只是小它自知定學做孔子不得了才見箇小家活子便悅而趨之譬如泰山之高它不敢登見箇小土堆子便上去只是小僩因說永嘉之學曰張子韶學問雖不是然他卻做得來高不似今人卑污又曰上蔡多說知覺自上蔡一變而為張子韶學蒙古人紀綱天下凡措置許多事都是心法從這裏流出是多少正大今若去逐些子搜抉出來評議恐不得凡看文字也須待自有忽然湊合見得異同處若先去逐些安排比並便不是因問君舉說漢唐好處與三代暗合是如何曹曰亦只是事上看如漢初待群臣不專執其權略堂陛之嚴不恁地操切如財散於天下之類曰這也自是事勢到這裏見得秦時君臣之勢如此間隔故漢初待宰相如此然而蕭何是多少功勞幾年宰相一旦繫獄這喚做操切不操切又如周勃終身有功後來也下獄對問又如賈誼書中所說是如何財用那時自寬饒不得不散在郡縣且如而今要散在郡縣得也不得上面又不儲蓄財賦閑在那裏只是每年合天下之所入不足以供一年之用一月之入不足以供一月之用逐時挨展將去將漢初來看要散之郡縣得否這只是閑說第一項最是養許多坐食之兵其費最廣州郡自是州郡底如許多大軍見如何區處無祖宗天下之半而有祖宗所無之兵如州郡兵還養在何用若留心太守又會教他去攀些弓射些弩教他做許多模樣也只是不忍將許多錢糧白與他到有冢殺時你道他與你去冢殺否只是徒然問君舉曾要如何措置曰常常憂此但措置亦未曾說出問看唐事如何曰聞之陳先生說唐初好處也是將三省推出在外這卻從魏晉時自有裏面一項唐初卻盡屬之外要成一體如唐經禍變後便都有諸王出來克復如肅宗事及代宗後來雖是郭子儀也有箇主出來曰三省在外怕自隋時已如此只唐時併屬之宰相諸王克復代宗事只是郭子儀怕別無諸王唐官看他六典將前代許多官一齊盡置得偏官如何不冗今只看漢初時官如何到得元成間如何又看東漢初如何到東漢末時如何到三國魏晉以後如何只管添只管雜賀孫器遠言鄉間諸先生所以要教人就事上理會教著實緣是向時諸公多是清談終於敗事曰便是而今自恁地說某尚及見前輩都不曾有這話是三十年前如此不曾將這箇分作兩事如所謂推倒牆撞倒壁如此粗話那時都恁地粗卻有好處南渡時有許多人出來做得事經變故後將許多人都推折了到而今卻是氣卑弱了凡事都無些子正大只是細巧曰陳先生要人就事上理會教實之意蓋怕下梢用處不足如司馬公居洛六任只理會得箇通鑑到元祐出來做事卻有未盡處所以激後來之禍如今須先要較量教盡曰便是如今都要恁地說話如溫公所做今只論是與不是合當做與不合當做如何說他激得後禍這是全把利害去說溫公固是有從初講究未盡處也是些小事如役法變得未盡只是東南不便他西北自便之那時節已自極了只得如此做若不得溫公如此做更自有一場出醜今只將紙上語去看便道溫公做得過當子細看那時節若非溫公如何做溫公是甚氣勢天下人心甚麼樣感動溫公直有旋乾轉坤之功溫公此心可以質天地通幽明豈容易及後來呂微仲范堯夫用調停之說兼用小人更無分別所以成後日之禍今人卻不歸咎於調停反歸咎於元祐之政若真是見得君子小人不可雜處如何要委曲遮護得蔡確也是卒急難去也是猾他置獄傾一從官得從官置獄傾一參政得參政置獄傾一宰相得宰相看溫公那時已自失委曲了如王安石罪既已明白後既加罪於蔡確之徒論來安石是罪之魁卻於其死又加太傅及贈禮皆備想當時也道要委曲周施他如今看來這般卻煞不好要好便合當顯白其罪使人知得是非邪正所謂明其為賊敵乃可服須是明顯其不是之狀若更加旌賞卻惹得後來許多群小不服今又都沒理會怕道要做朋黨那邊用幾人這邊用幾人不問是非不別邪正下梢還要如何某看來天下事須先論其大處如分別是非邪正君子小人端的是如何了方好於中間酌量輕重淺深施用賀孫器遠言陳丈大意說格君且令於事上轉移他心下歸於正如蕭何事漢令散財於外可以去其侈心成其愛民之心說北齊宣帝云云曰欲事君者豈可以此為法自元魏以下至北齊最為無綱紀法度自家卻以為事君法賀孫永嘉看文字文字平白處都不看偏要去注疏小字中尋節目以為博只如韋玄成傳廟議渠自不理會得卻引周禮守祧掌守先王先公之廟祧注云先公之遷主藏於后稷之廟先王之遷主藏於文武之廟遂謂周后稷別廟殊不知太祖與三昭三穆皆各自為廟豈獨后稷別廟又云后稷不為太祖甚可怪也閎祖季通及敬之皆云永嘉貌敬甚至及與宮祠乃繳之云朱某素來迂闊臣所不取但陛下進退人才不當如此以問先生先生云不曾見此文字怎見得閎祖德粹問陳君舉福州事曰如此只是過當作一添倅而一州之事皆欲為之益之初九曰利用為大作元吉無咎象曰下不厚事也初九欲為九四作事在下本不當處厚事以為上之所任故為之而致元吉乃為之又不然不惟己不安而亦累於上璘錄云初九上為四所任而作大事必盡善而後無咎若所作不盡善未免有咎也故孔子釋之曰下不厚事也蓋在下之人不當重事若在下之人為在上之人作事未能盡善自應有咎向編近思錄說與伯恭此一段非常有不必入伯恭云既云非常有則有時而有豈可不書以為戒及後思之果然可學璘錄少異陳同父縱橫之才伯恭不直治之多為諷說反被他玩揚陳同父說同父因謂呂伯恭烏得為無罪恁地橫論卻不與他剖說打教破卻和他都自被包裹在裏今來伯恭門人卻亦有為同父之說者二家打成一片可怪君舉只道某不合與說只是他見不破天下事不是是便是非直截兩邊去如何恁地含糊鶻突某鄉來與說許多豈是要眼前好看青天白日在這裏而今人雖不見信後世也須有人看得此說也須回轉得幾人又歎息久之云今有一等自恁地高出聖人之上一等自恁地陷身汙濁要擔頭出不得賀孫同父才高氣粗故文字不明瑩要之自是心地不清和也道夫先生說看史只如看人相打相打有甚好看處陳同父一生被史壞了直卿言東萊教學者看史亦被史壞泳陳同父祭東萊文云在天下無一事之可少而人心有萬變之難明先生曰若如此則雞鳴狗盜皆不可無因舉易曰天下之動貞夫一者也天下何思何慮同歸而殊塗一致而百慮天下何思何慮又云同父在利欲膠漆盆中閎祖鄭厚藝圃折衷當時以為邪說然尚自占取地步但不知權其說之行猶使人知君臣之義如陳同父議論卻乖乃不知正曹丕既篡乃曰舜禹之事吾知之矣此乃以己而窺聖人謂舜禹亦只是篡而文之以揖遜爾同父亦是於漢唐事跡上尋討箇仁義出來便以為此即王者事何異於此必大因言陳同父讀書譬如人看劫盜公案看了須要斷得他罪及防備禁制他教做不得它卻不要斷他罪及防備禁制他只要理會得許多做劫盜底道理待學他做廣或問同父口說皇王帝霸之略而一身不能自保先生曰這只是見不破只說箇是與不是便了若做不是恁地依阿苟免以保其身此何足道若做得是便是委命殺身也是合當做底事賀孫陳同父學已行到江西浙人信向已多家家談王伯不說蕭何張良只說王猛不說孔孟只說文中子可畏可畏可學陸子靜分明是禪但卻成一箇行戶尚有箇據處如葉正則說則只是要教人都曉不得嘗得一書來言世間有一般魁偉底道理自不亂於三綱五常既說不亂三綱五常又說別是箇魁偉底道理卻是箇甚麼物事也是亂道他不說破只是籠統恁地說以謾人及人理會得來都無效驗時他又說你是未曉到這裏他自也曉不得他之說最誤人世間獃人都被他瞞不自知義剛葉正則葉正則說話只是杜撰看他進卷可見大略泳葉進卷待遇集毀板亦毀得是淳葉正則作文論事全不知些著實利害只虛論因及許多云云又見一文論社倉事戴肖望尚有些實說然不是如此葉則都是閑說振見或人所作講義不知如何如此聖人見成言語明明白白人尚曉不得如何須要立一文字令深於聖賢之言如何教人曉得戴肖望比見其湖南說話卻平正只為說得太容易了兼未免有意於弄文賀孫江西之學只是禪浙學卻專是功利禪學後來學者摸索一上無可摸索自會轉去若功利則學者習之便可見效此意甚可憂
