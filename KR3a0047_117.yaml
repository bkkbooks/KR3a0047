body:
  text: 朱子語類卷第一百一十七朱子十四訓門人五黃直卿會看文字只是氣象少間或又有看得不好處文蔚因說正思小學字訓直卿云此等文字亦難做如中只說得無倚之中不曾說得無過不及之中曰便是此等文字難做如仁只說得偏言之仁不曾說得包四者之仁至若海録云一部大爾雅先生聞程正思死哭之哀賀孫有程正思一學生來謁坐定蹙額云正思可惜有骨肋有志操若看道理也粗些子在自修問功夫節目次第曰尋常與學者說做工夫甚遲鈍但積纍得多自有貫通處且如論孟須從頭看以正文為正卻看諸家說狀得正文之意如何且自平易處作工夫觸類有得則於難處自見得意思如養氣之說豈可驟然理會候玩味得七篇了漸覺得意思如一件木頭須先凛削平易處至難處一削可除也今不先治平易處而徒用力於其所難所以未有得而先自困也以下訓謨問謨於鄉曲自覺委靡隨順處多恐不免有同流合汙之失曰孔子於鄉黨恂恂如也似不能言者處鄉曲固要人情周盡但須分別是非不要一面隨順失了自家天下事只有一箇是一箇非是底便是非底便非問是非自有公論曰如此說便不是了是非只是是非如何是非之外更有一箇公論才說有箇公論便又有箇私論也此卻不可不察謨於私欲未能無之但此意萌動時卻知用力克除覺方寸纍省頗勝前日更當如何曰此只是強自降伏若未得天理純熟一旦失覺察病痛出來不可不知也問五峰所謂天理人欲同行異情莫須這裏要分別否曰同行異情只如飢食渴飲等事在聖賢無非天理在小人無非私欲所謂同行異情者如此此事若不曾尋著本領只是說得他名義而已說得名義儘分曉畢竟無與我事須就自家身上實見得私欲萌動時如何天理發見時如何其間正有好用工夫處蓋天理在人异萬古而不泯任其如何蔽錮而天理常自若無時不自私意中發出但人不自覺正如明珠大貝混雜沙礫中零零星星逐時出來但只於這箇道理發見處當下認取簇合零星漸成片段到得自家好底意思日長月益則天理自然純固向之所謂私欲者自然消靡退散久之不復萌動矣若專務克治私欲而不能充長善端則吾心所謂私欲者日相鬥敵縱一時按伏得下又當復作矣初不道隔去私意後別尋一箇道理主執而行才如此又只是自家私意只如一件事見得如此為是如此為非便從是處行將去不可只恁休誤了一事必須知悔只這知悔處便是天理孟子說牛山之木既曰若此其濯濯也又曰萌櫱生焉既曰旦晝梏亡又曰夜氣所存如說求放心心既放了如何又求得只為這些道理根於一性者渾然至善故發於日用者多是善底道理只要人自識得雖至惡人亦只患他頑然不知省悟若心裏稍知不穩便從這裏改過亦豈不可做好人孟子曰人之所以異於禽獸者幾希庶民去之君子存之去只是去著這些子存只是存著這些子學者所當深察也謨再三稱贊先生曰未可如此便做領略過去有些說話且留在胸次烹治鍛煉教這道理成熟若只一時以為說得明白便道是了又恐只做一場話說寒泉之別請所以教曰議論只是如此但須務實請益曰須是下真實工夫未幾復以書來曰臨別所說務實一事途中曾致思否今日學者不能進步病痛全在此處不可不知也既受詩傳併力抄録頗疏侍教先生曰朋友來此多被冊子困倒反不曾做得工夫何不且過此說話彼皆紙上語爾有所面言資益為多又問與周茂元同邸所論何事曰周宰云先生著書立言義理精密既得之熟讀深思從此力行不解有差曰周宰才質甚敏只有些粗疏不肯去細密處求說此便可見載之簡牘縱說得甚分明那似當面議論一言半句便有通達處所謂共君一夜話勝讀十年書若說到透徹處何止十年之功也問未知學問知有人欲不知有天理既知學問則克己工夫有著力處然應事接物之際苟失存主則心不在焉及既知覺已為間斷故因天理發見而收合善端便成片段雖承見教如此而工夫最難曰此亦學者常理雖顏子亦不能無間斷正要常常點檢力加持守使動靜如一則工夫自然接續問中庸或問所謂誠者物之終始以理之實而言也不誠無物以此心不實而言也謂此心不存則見於行事雖不悖理亦為不實正謂此歟曰大學所謂知至意誠者必須知至然後能誠其意也今之學者只說操存而不知講明義理則此心憒憒何事於操存也某嘗謂誠意一節正是聖凡分別關隘去處若能誠意則是透得此關後滔滔然自在去為君子不然則崎嶇反側不免為小人之歸也致知所以先於誠意者如何曰致知者須是知得盡尤要親切尋常只將知至之至作盡字說近來看得合是作切至之至知之者切然後貫通得誠意底意思如程先生所謂真知者是也舜弼以書來問仁及以仁義禮智與性分形而上下先生答書略曰所謂仁之德即程子穀種之說愛之理也愛乃仁之已發仁乃愛之未發若於此認得方可說與天地萬物同體不然恐無交涉仁義禮智性之大目皆形而上者不可分為二也因云舜弼為學自來不切己體認卻只是尋得三兩字來撐拄亦只說得箇皮殼子日同舜弼遊屏山歸因說山園甚佳曰園雖佳而人之志則荒矣方子問尋常於存養時若抬起心則急迫而難久才放下則又散緩而不收不知如何用工方可曰只是君元不曾放得下也以下訓柄問凡人之心不存則亡而無不存不亡之時故一息之頃不加提省之力則淪於亡而不自覺天下之事不是則非而無不是不非之處故一事之微不加精察之功則陷於惡而不自知柄近見如此不知如何曰道理固是如此然初學後亦未能便如此也魏元壽問大學先生因云今學者不會看文章多是先立私意自主張己說只借聖人言語做起頭便自把己意接說將去病痛專在這上不可不戒又云近有一學者來欲說皇極某令他說看都不相近只做一箇大中字說了便更無可說處不知自孔孟以後千數百年間讀書底更不仔細把聖人言語略思量看是如何且人一日間此心是起多少私意起多少計較都不會略略回心轉意去看把聖賢思量不知是在天地間做甚麼也時舉訓椿學者精神短底看義理只到得半途便以為前面沒了必大曰若工夫不已亦須有向進曰須知得前面有方肯做工夫今之學者大概有二病一以為古聖賢亦只此是了故不肯做工夫一則自謂做聖賢事不得不肯做工夫以下訓必大拜違先生曰所當講者亦略備矣更宜愛惜光陰以副願望又曰別後正好自做工夫趲積下一旦相見庶可舉出商量勝如旋來理會必大初見曰必大日來讀大學之書見得與己分上益親切字字句句皆己合做底事但雖見得道理合如此然反而撹括其念慮踐履之間卻有未能如此者蓋緣向來自待未免有失之姑息處始謂氣習物欲之蔽不能頓革當以漸銷鑠之而已不知病根未盡除則為善去惡之際固已為之繫纍不能勇決操存少懈則其隱伏於中者往往紛起而不自覺其動於惡者固多有之今須是將此等意思便與一刀兩斷勿復凝滯於道理合如此處便擔當著做不得遲疑庶可補既往之過致日新之功如何曰要得如此必大又曰向因子夏大德小德之說遂只知於事之大者致察而於小者苟且放過德之不修實此為病張子曰纖惡必除善斯成性矣察惡未盡雖善必粗矣學者須是毫髮不得放過德乃可進曰若能如此善莫大焉以小惡為無傷是誠不可某一生與人說話多矣會看文字曉解明快者卻是吳伯豐方望此人有所成就忽去年報其死可惜可惜若稍假之年其進未可量也伯豐有才氣為學精苦守官治事皆有方法僩吳伯豐好箇人近日死了可惜頗留意也展托得開江西如萬正淳亦純實只是昏鈍與他說都會不得因問展托得開向來明道有此語莫是擴充得去否曰適說吳伯豐只是據他才也展托得行渠與沈是親近日力要收拾它更不為屈可取德明問嘗讀何書曰讀語孟曰如今看一件書須是著力至誠去看一番將聖賢說底一句一字都理會過直要見聖賢語脈所在這一句一字是如何道理及看聖賢因何如此說直是用力與他理會如做冤讎相似理會教分曉然後將來玩味方盡見得意思出來若是泛濫看過今次又見是好明次又見是好終是無功夫不得力以下訓議論中譬如常有一條線子纏縛所以不索性無那精密潔白底意思若是實見得便自一言半句斷得分明先生問與伯豐正淳此去做甚工夫伯豐曰政欲請教先易後詩可否曰既嘗讀詩不若先詩後易曰亦欲看詩曰觀詩之法且虛心熟讀尋繹之不要被舊說粘定看得不活伊川解詩亦說得義理多了詩本只是恁他說話一章言了次章又從而歎詠之雖別無義而意味深長不可於名物上尋義理後人往往見其言只如此平淡只管添上義理卻窒塞了他如一源清水只管將物事堆積在上便壅隘了某觀諸儒之說唯上蔡云詩在識六義體面卻諷味以得之深得詩之綱領他人所不及所謂以意逆志者逆如迎待之意若未得其志只得待之如需于酒食之義後人讀詩便要去捉將志來以至束縛之呂氏詩記有一條收數說者卻不定云此說非詩本意然自有箇安頓用得他處今一概存之正如一多可的人來底都是如所謂要識人情之正夫詩可以觀者正謂其間有得有失有黑有白若都是正卻無可觀今不若且置小序于後熟讀正文如收得一詩其間說香說白說寒時開雖無題目其為梅花詩必矣每日看一經外大學論語孟子中庸四書自依次序循環看然史亦不可不看若只看通鑑通鑑都是連長記去一事只一處說別無互見又散在編年雖是大事其初卻小後來漸漸做得大故人初看時不曾著精神只管看向後去卻記不得不若先草草看正史一過正史各有傳可見始末又有他傳可互考所以易記每看一代正史訖卻去看通鑑亦須作綱目隨其大事劄記某年有某事之類準春秋經文書之溫公亦有本朝大事記附稽古録後先生問及二友俱嘗看易傳看得如何是好何處是緊要看得愛也不愛愛者是愛他甚處等各對訖先生曰如此只是鶻盧提看元不曾實得其味此書自是難看須經歷世故多識盡人情物理方看得入蓋此書平淡所說之事皆是見今所未嘗有者如言事君及處事變患難處皆未嘗當著可知讀時無味蓋他說得闊遠未有底事預包在此學者須先讀詩書他經有箇見處及曾經歷過此等事方可以讀之得其無味之味此初學者所以未可便看某屢問讀易傳人往往皆無所得可見此書難讀如論語所載皆是事親取友居鄉黨目下便用得者所言皆對著學者即今實事孟子每章先言大旨了又自下注腳大學則前面三句總盡致知格物而下一段綱目欲明明德以下一段又總括了傳中許多事一如鎖子骨才提起便總統得來所以教學者且看二三書若易傳則卒乍裏面無提起處蓋其間義理闊多伊川所自發與經文又似隔一重皮膜所以看者無箇貫穿處蓋自孔子所傳時解元亨利貞已與文王之詞不同伊川之說又與經文不相著讀者須是文王自作文王意思看孔子自作孔子意思看伊川自作伊川意思看況易中所言事物已是譬喻不是實指此物而言固自難曉伊川又別發明出義理來今須先得經文本意了則看程傳便不至如門扇無臼轉動不得亦是一箇大底胸次識得世事多者方看得出大抵程傳所以好者其言平正直是精密無少過處不比他處有抑揚讀者易發越如上蔡論語義理雖未盡然人多喜看正以其說有過處啓發得人看者易入若程傳則不見其抑揚略不驚人非深於義理者未易看也人傑録略見易類淳冬至以書及自警詩為贄見翌日入郡齊問功夫大要曰學固在乎讀書而亦不專在乎讀書公詩甚好可見亦曾用工夫然以何為要有要則三十五章可以一貫若皆以為要又成許多頭緒便如東西南北禦寇一般曰晚生妄意未知折衷惟先生教之先生問平日如何用工夫曰只就己上用工夫己上如何用工夫曰只日用間察其天理人欲之辨如何察之曰只就秉彝良心處察之曰心豈直是發莫非心也今這裏說話也是心對坐也是心動作也是心何者不是心然則緊要著力在何處扣之再三淳思未答先生縷縷言曰凡看道理須要窮箇根源來處如為人父如何便止於慈為人子如何便止於孝為人君為人臣如何便止於仁止於敬如論孝須窮箇孝根原來處論慈須窮箇慈根原來處仁敬亦然凡道理皆從根原處來窮究方見得確定不可只道我操修踐履便了多見士人有謹守資質好者此固是好及到講論義理便偏執己見自立一般門戶移轉不得又大可慮道理要見得真須是表裏首末極其透徹無有不盡真見得是如此決然不可移易始得不可只窺見一班半點便以為是如為人父須真知是決然止於慈而不可易為人子須真知是決然止於孝而不可易善須真見得是善方始決然必做惡須真見得是惡方始決然必不做如看不好底文字固是不好須自家真見得是不好好底文字固是好須自家真見得是好聖賢言語須是真看得十分透徹如從他肚裏穿過一字或輕或重移易不得始是看理徹則我與理一然一下未能徹須是浹洽始得這道理甚活其體渾然而其中粲然上下數千年真是昭昭在天地間前聖後聖相傳所以斷然而不疑夫子之所教者教乎此也顏子之所樂者樂乎此也圓轉處儘圓轉直截處儘直截先知所以覺後知先覺所以覺後覺問顏子之樂只是天地間至富至貴底道理樂去樂可求之否曰非也此一下未可便知須是窮究萬理要令極徹已而曰程子謂將這身來放在萬物中一例看大小大快活又謂人於天地間並無窒礙處大小大快活此便是顏子樂處這道理在天地間須是真窮到底至纖至悉十分透徹無有不盡則與萬物為一無所窒礙胸中泰然豈有不樂以下訓淳饒録作五段問日用間今且如何用工夫曰大綱只是恁地窮究根原來處直要透徹又且須敬以直內義以方外此二句為要擇善而固執之如致知格物便是擇善誠意正心修身便是固執只此二事而已淳舉南軒謂知與行互相發曰知與行須是齊頭做方能互相發程子曰涵養須用敬進學則在致知下須字在字便是皆要齊頭著力不可道知得了方始行有一般人儘聰明知得而行不及是資質弱又有一般人儘行得而知不得因問淳資質懦弱行意常緩於知克己不嚴進道不勇不審何以能嚴能勇曰大綱亦只是適間所說於那根原來處真能透徹這箇自都了問靜坐觀書則義理浹洽到幹事後看義理又生如何曰只是未熟問看道理須尋根原來處只是就性上看否曰如何曰天命之性萬理完具總其大目則仁義禮智其中遂分別成許多萬善大綱只如此然就其中須件件要徹曰固是如此又須看性所因是如何曰當初天地間元有這箇渾然道理人生稟得便是性曰性只是理萬理之總名此理亦只是天地間公共之理稟得來便為我所有天之所命如朝廷指揮差除人去做官性如官職官便有職事天下萬事都是合做底而今也不能殺定合做甚底事聖賢教人也不曾殺定教人如何做只自家日用間看甚事來便做工夫今日一樣事來明日又一樣事來預定不得若指定是事親而又有事長指定是事長而又有事君只日用間看有甚事來便做工夫這道理不是如堆金積寶在這裏便把分付與人去亦只是說一箇路頭教人自去討討得便是自底討不得也無奈何須是自著力著些精彩去做容易不得譬如十里地頭自家行到五里見人說十里地頭事便把為是更不進去那人說固不我欺然自家不親到那裏不見得真終是信不過須是理會得七八分功夫了被人決一決便有益說十分話便領得若不曾做工夫雖說十分話亦了不得若道生做一世人不可泛泛隨流須當了得人道便有可望若道不如且過了一生更不在說須思量到如何便超凡而達聖今日為鄉人明日為聖賢如何會到此便一聳拔聳身著力言如此方有長進若理會得也好理會不得也好便悠悠了讀書理會一件了又一件不止是讀書如遇一件事且就這事上思量合當如何做處得來當方理會別一件書不可只就皮膚上看事亦不可只就皮膚上理會天下無書不是合讀底無事不是合做底若一箇書不讀這裏便缺此一書之理一件事不做這裏便缺此一事之理大而天地陰陽細而昆蟲草木皆當理會一物不理會這裏便缺此一物之理天下無不可說底道理如為人謀而忠朋友交而信傳而習亦都是眼前底事皆可說只有一箇熟處說不得除了熟之外無不可說者未熟時頓放這裏又不穩帖拈放那邊又不是然終不成住了也須從這裏更著力始得到那熟處頓放這邊也是頓放那邊也是七顛八倒無不是所謂居之安則資之深資之深則左右逢其原譬如梨柿生時酸澀喫不得到熟後自是一般甘美相去大遠只在熟與不熟之間宇録同謂淳曰大學已是讀過書宜朝夕常常溫誦勿忘講究義理不下得工夫也不得如舉業不下得功夫也不解精老蘇年已壯方學文煞用力到所謂若人之言固當然者這處便是悟做文章合當如此亦只是熟便如此恰如自家們講究義理到熟處悟得為人父確然是止於慈為人子確然是止於孝老蘇文豪傑只是熟子由取他便遠問看文字只就本句固是見得古人本意然不推廣之則用處又易得不相浹如何曰須是本句透熟方可推若本句不透熟不惟推便錯於未推時已錯了學則處事都是理不學則看理便不恁地周匝不恁地廣大不恁地細密然理亦不是外面硬生道理只是自家固有之理堯舜性之此理元無失湯武反之已有些子失但復其舊底學只是復其舊底而已蓋向也交割得來今卻失了可不汲汲自修而反之乎此其所以為急不學則只是硬隄防處事不見理一向任私意平時卻也勉強去得到臨事變便亂了問持敬致知互相發明否曰古人如此說必須是如此更問他發明與不發明要如何古人言語寫在冊子上不解錯了只如此做工夫便見得滋味不做持敬只說持敬作甚不做致知只說致知作甚譬如他人做得飯熟盛在碗裏自是好喫不解毒人是定自家但喫將去便知滋味何用問人不成自家這一邊做得些小持敬工夫計會那一邊致知發明與未發明那一邊做得些小致知工夫又來計會這一邊持敬發明與未發明如此有甚了期季文問持敬致知莫是並行而不相礙否曰也不須如此都要做將去看道理須要就那大處看便前面開闊不要就壁角裏地步窄一步便觸無處去了而今且要看天理人欲義利公私分別得明將自家日用底與他勘驗須漸漸有見處前頭漸漸開闊那箇大壇場不去上面做不去上面行只管在壁角裏縱理會得一句只是一句透道理小了如破斧詩須看那周公東征四國是皇見得周公用心始得諸友問疾請退先生曰堯卿安卿且坐相別十年有甚大頭項工夫大頭項疑難可商量處淳曰數年來見得日用間大事小事分明件件都是天理流行無一事不是合做底更不容挨推閃避撞著這事以理斷定便小心盡力做到尾去兩三番後此心磨刮出來便漸漸堅定雖有大底不見其為大難底不見其為難至磽確至勞苦處不見其為磽確勞苦橫逆境界不見其有憾恨底意可愛羡難割捨底不見其有粘滯底意見面前只是理覺如水到船浮不至有甚慳澀而夫子與點之意顏子樂底意漆雕開信底意中庸鳶飛魚躍底意周子灑落及程子活潑潑底意覺見都在面前真箇是如此而禮儀三百威儀三千亦無一節文非天理流行易三百八十四爻時義便正是就日用上剖析箇天理流行底條目前聖後哲都是一揆而其所以為此理之大處卻只在人倫而身上工夫切要處卻只在主敬敬則此心常惺惺大綱卓然不昧天理無時而不流行而所以為主敬工夫直時不可少時放斷心常敬則常仁先生曰恁地泛說也容易久之曰只恐勞心落在無涯可測之處因問向來所呈與點說一段如何曰某平生便是不愛人說此話論語一部自學而時習之至堯曰都是做工夫處不成只說了與點便將許多都掉了聖賢說事親便要如此事君便要如此事長便要如此言便要如此行便要如此都是好用工夫處通貫浹洽自然見得在面前若都掉了只管說與點正如喫饅頭只撮箇尖處不喫下面餡子許多滋味都不見向來此等無人曉得說出來也好今說得多了都是好笑不成模樣近來覺見說這樣話都是間說不是真積實見昨廖子晦亦說與點及鬼神反覆問難轉見支離沒合殺了聖賢教人無非下學工夫一貫之旨如何不便說與曾子直待他事事都曉得方說與他子貢是多少聰明到後來方與說女以豫為多學而識之者與曰然非與曰非也豫一以貫之此意是如何萬理雖只是一理學者且要去萬理中千頭百緒都理會四面湊合來自見得是一理不去理會那萬理只管去理會那一理說與點顏子之樂如何程先生語録事事都說只有一兩處說此何故說得恁地少而今學者何故說得恁地多只是空想象程先生曰學者識得仁體實有諸己只要義理栽培恐人不曉栽培更說如求經義皆栽培之意呂晉伯問伊川語孟且將緊要處理會如何伊川曰固是好若有所得終不浹洽後來晉伯終身坐此病說得孤單入禪學去聖賢立言垂教無非著實如博我以文約我以禮如尊德性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮如博學之審問之慎思之明辨之篤行之如君子食無求飽居無求安敏於事而慎於言就有道而正焉等類皆一意也大抵看道理要得寬平廣博平心去理會若實見得只說一兩段亦見得許多道理不要將一箇大底言語都來罩了其間自有輕重不去照管說大底說得太大說小底又說得都無巴鼻如昨日說破斧詩恐平日恁地枉用心處多淳曰昨聞先生教誨其他似此樣處無所疑矣曰學問不比做文字不好便改了此卻是分別善惡邪正須要十分是當方與聖賢契合如破斧詩恁地說也不錯只是不好說得一角不落正腔窠喎斜了若恁地看道理淺了不濟事恰似撐船放淺處不向深流運動不得須是運動游泳於其中淳又曰聖人千言萬語都是日用間本分合做底工夫只是立談之頃要見總會處未易以一言決曰不要說總會如博我以文約我以禮博文便是要一一去用工何曾說總會處又如深造之以道欲其自得之也深造以道便是要一一用工到自得方是總會處如顏子克己復禮亦須是非禮勿視非禮勿聽非禮勿言非禮勿動不成只守箇克己復禮將下面許多都除了如公說易只大綱說箇三百八十四爻皆天理流行若如此一部周易只一句便了聖人何故作許多十翼從頭說大哉乾元云云至哉坤元云云聖賢之學非老氏之比老氏說通於一萬事畢其他都不說少間又和那一都要無了方好學者固是要見總會處而今只管說箇總會處如與點之類只恐孤單沒合殺下梢流入釋老去如何會有詠而歸底意思義剛同晚再入臥內淳稟曰適間蒙先生痛切之誨退而思之大要下學而上達下學而上達固相對是兩事然下學卻當大段多著工夫曰聖賢教人多說下學事少說上達事說下學工夫要多也好但只理會下學又局促了須事事理會過將來也要知箇貫通處不要理會下學只理會上達即都無事可做恐孤單枯燥程先生曰但是自然更無玩索既是自然便都無可理會了譬如耕田須是下了種子便去耘鋤灌溉然後到那熟處而今只想象那熟處卻不曾下得種子如何會熟如一以貫之是聖人論到極處了而今只去想象那一不去理會那貫譬如討一條錢索在此都無錢可穿又問為學工夫大概在身則有箇心心之體為性心之用為情外則目視耳聽手持足履在事則自事親事長以至於待人接物灑掃應對飲食寢處件件都是合做工夫處聖賢千言萬語便只是其中細碎條目曰講論時是如此講論做工夫時須是著實去做道理聖人都說盡了論語中有許多詩書中有許多須是一一與理會過方得程先生謂或讀書講明道義或論古今人物而別其是非或應接事物而處其當否如何而為孝如何而為忠以至天地之所以高厚一物之所以然都逐一理會不只是箇一便都了胡叔器因問下學莫只是就切近處求否曰也不須恁地揀事到面前便與他理會且如讀書讀第一章便與他理會第一章讀第二章便與他理會第二章今日撞著這事便與他理會這事明日撞著那事便理會那事萬事只是一理不成只揀大底要底理會其他都不管譬如海水一灣一曲一洲一渚無非海水不成道大底是海水小底不是程先生曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積纍多後自當脫然有悟處又曰自一身之中以至萬物之理理會得多自當豁然有箇覺處今人務博者卻要盡窮天下之理務約者又謂反身而誠則天下之物無不在我此皆不是且如一百件事理會得五六十件了這三四十件雖未理會也大概可曉了某在漳州有訟田者契數十本自崇寧起來事甚難考其人將正契藏了更不可理會某但索四畔衆契比驗四至昭然及驗前後所斷情僞更不能逃又說嘗有一官人斷爭田事被某掇了案其官人卻來那穿款處考出窮理亦只是如此義剛同先生召諸友至臥內曰安卿更有甚說話淳曰兩日思量為學道理日用間做工夫所以要步步縝密者蓋緣天理流行乎日用之間千條萬緒無所不在故不容有所缺缺若工夫有所缺缺便於天理不湊得著曰也是如此理只在事物之中做功夫須是密然亦須是那疏處斂向密又就那密處展放開若只拘要那縝密處又卻局促了問放開底樣子如何曰亦只是見得天理是如此人欲是如此便做將去李丈說廖倅惠書有云無時不戒慎恐懼則天理無時而不流行有時而不戒慎恐懼則天理有時而不流行此語如何曰不如此也不得然也不須得將戒慎恐懼說得太重也不是恁地驚恐只是常常提撕認得這物事常常存得不失今人只見他說得此四箇字重便作臨事驚恐看了如臨深淵如履薄冰曾子亦只是順這道理常常恁地把捉去義剛録作恁地兢謹把捉去不成便恁地驚恐學問只是要此心常存若不用戒慎恐懼而此理常流通者惟天地與聖人耳聖人不勉而中不思而得從容中道亦只是此心常存理常明故能如此賢人所以異於聖人衆人所以異於賢人亦只爭這些子境界存與不存而已常謂人無有極則處便是堯舜周孔不成說我是從容中道不要去戒慎恐懼他那工夫亦自未嘗得息義剛録此下云良久復問安卿適來所說天理人欲正謂如何對曰天下事事物物無非是天理流行曰如公所說只是想像箇天理流行卻無下面許多工夫子思說尊德性又卻說道問學致廣大又卻說盡精微極高明又卻說道中庸溫故又卻說知新敦厚又卻說崇禮這五句是為學用功精粗全體說盡了如今所說卻只偏在尊德性上去揀那便宜多底占了無道問學底許多工夫義剛録作無緊要看了恐只是占便宜自了之學出門動步便有礙做一事不得今人之患在於徒務末而不究其本然只去理會那本而不理會那末義剛作揚下了那末亦不得時變日新而無窮安知他日之事非吾輩之責乎若是少間事勢之來當應也只得應若只是自了便待工夫做得二十分到終不足以應變到那時卻怕人說道不能應變也牽強去應應得便只成杜撰便只是人欲又有誤認人欲作天理處若應變不合義理則平日許多工夫依舊都是錯了吾友僻在遠方無師友講明又不接四方賢士又不知遠方事情又不知古今人事之變這一邊易得暗昧了一日之間事變無窮小而一身有許多事一家又有許多事大而一國又大而天下事業恁地多都要人與他做不是人做卻教誰做不成我只管得自家若將此樣學問去應變如何通得許多事情做出許多事業學者須是立定此心泛觀天下之事精粗巨細無不周遍下梢打成一塊亦是一箇物事方可見於用不是揀那精底放在一邊粗底放在一邊嘗見胡文定答曾吉甫書有人只要存天理去人欲之論後面一向稱贊都不與之分析此便是前輩不會為人處此處正好捉定與他剖判始得所謂天理人欲只是一箇大綱如此下面煞有條目須是就事物上辨別那箇是天理那箇是人欲不可恁地空說將大綱來罩卻籠統無界分恐一向暗昧更動不得如做器具固是教人要做得好不成要做得不好好底是天理不好底是人欲然須是較量所以好處如何樣做方好始得義剛録云然亦大概是如此如做這湯瓶須知是如何地是好如何地是不好而今只儱侗說道好及我問你好處是如何時你卻又不曉如何恁地得今且將平日看甚書中見得古人做甚事那處是那處不是那處可疑那處不可疑自見得又看是如何於平日做底事甚麼處是舉數段來便見得所以為天理所以為人欲淳因舉向年居喪喪事重難自始至終皆自擔當全無分文責備舍弟之意曰此也是合做底淳曰到臨葬時同居尊長皆以年月不利為說淳皆無所徇但治壙事辦則卜一日為之曰此樣天理又是硬了李丈曰亦是尊長說得下曰幸而無齟齬耳若有不能相從則少加委曲亦無妨淳曰大祥次日族中尊長為酒食之會淳走避之後來聞尊長鎮日相尋又令人皇恐如何曰不喫也好然此亦無緊要禮君賜之食則食之父之友食之則食之不避粱肉某始嘗疑此後思之只是當時一食後依舊不食爾父之友既可如此則尊長之命一食亦無妨若有酒醴則辭義剛同是夜再召淳與李丈入臥內曰公歸期不久更有何較量淳讀與點說曰大概都是亦有小小一兩處病又讀廖倅書所難與點說先生曰有得有失又讀淳所回廖倅書先生曰天下萬物當然之則便是理所以然底便是原頭處今所說固是如此但聖人平日也不曾先說箇天理在那裏方教人做去湊只是說眼前事教人平平恁地做工夫去自然到那有見處淳曰因做工夫後見得天理也無妨只是未做工夫不要先去討見天理否曰畢竟先討見天理立定在那裏則心意便都在上面行易得將下面許多工夫放緩了孔門惟顏子曾子漆雕開曾點見得這箇道理分明顏子固是天資高初間仰之彌高鑽之彌堅亦自討頭不著從博文約禮做來欲罷不能竭吾才方見得如有所立卓爾向來髣佛底到此都合聚了曾子初亦無討頭處只管從下面捱來捱去捱到十分處方悟得一貫漆雕開曰吾斯之未能信斯是何物便是他見得箇物事曾點不知是如何合下便被他綽見得這箇物事曾點漆雕開已見大意方是程先生恁地說漆雕開較靜曾點較明爽亦未見得他無下學工夫亦未見得他合殺是如何只被孟子喚做狂及觀檀弓所載則下梢只如此而已曾子父子之學自相反一是從下做到一是從上見得子貢亦做得七八分工夫聖人也要喚醒他喚不上聖人不是不說這道理也不是便說這道理只是說之有時教人有序子晦之說無頭如吾友所說從原頭來又卻要先見箇天理在前面方去做此正是病處子晦疑得也是只說不出吾友合下來說話便有此病是先見有所立卓爾然後博文約禮也若把這天理不放下相似把一箇空底物放這邊也無頓處放那邊也無頓處放這邊也恐雞破放那邊也恐雞破這天理說得蕩漾似一塊水銀滾來滾去捉那不著又如水不沿流紐源合下便要尋其源鑿來鑿去終是鑿不得下學上達自有次第於下學中又有次第致知又有多少次第力行又有多少次第淳曰下學中如致知時亦有理會那上達底意思否曰非也致知今且就這事上理會箇合做底是如何少間又就這事上思量合做底因甚是恁地便見得這事道理合恁地又思量因甚道理合恁地便見得這事道理原頭處逐事都如此理會便件件知得箇原頭處淳曰件件都知得箇原頭處湊合來便成一箇物事否曰不怕不成一箇物事只管逐件恁地去千件成千箇物事萬件成萬箇物事將間自然撞著成一箇物事方如水到船浮而今且去放下此心平平恁地做把文字來平看不要得高第一番且平看那一重文義是如何第二番又揭起第一重看那第二重是如何第三番又揭起第二重看那第三重是如何看來看去二十番三十番便自見得道理有穩處不可才看一段便就這一段上要思量到極要尋見原頭處如天命之謂性初且恁地平看過去便看下面率性之謂道若只反倒這天命之謂性一句便無工夫看率性之謂道了喜怒哀樂未發之謂中亦且平看過去便看發而皆中節謂之和若只反倒這未發之中便又無工夫看中節之和了又曰聖人教人只是一法教萬民及公卿大夫士之子皆如此如父子有親君臣有義初只是有兩句後來又就父子有親裏面推說許多君臣有義裏面推說許多而今見得有親有義合恁地又見得因甚有親因甚有義道理所以合恁地節節推上去便自見原頭處只管恁地做工夫去做得合殺便有采又曰聖人教人只是說下面一截少間到那田地又挨上些子不曾直說到上面子以四教文行忠信又曰博學而篤志切問而近思仁在其中矣做得許多仁自在其中志於道據於德依於仁又且游於藝不成只一句便了若只一句便了何更用許多說話如詩三百一言以蔽之曰思無邪聖人何故不只存這一句餘都刪了何故編成三百篇方說思無邪看三百篇中那箇事不說出來又曰莊周列禦寇亦似曾點底意思他也不是專學老子吾儒書他都看來不知如何被他綽見這箇物事便放浪去了今禪學也是恁地又曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也向見衆人說得玄妙程先生說得絮黃作忉怛後來子細看方見得衆人說都似禪了不似程先生說得穩義剛同問前夜承教誨不可先討見天理私心更有少疑蓋一事各有一箇當然之理真見得此理則做此事便確定不然則此心末梢又會變了不審如何曰這自是一事之理前夜所說只是不合要先見一箇渾淪大底物攤在這裏方就這裏放出去做那萬事不是於事都不顧理一向冥行而已事親中自有箇事親底道理事長中自有箇事長底道理這事自有這箇道理那事自有那箇道理各理會得透則萬事各成萬箇道理四面湊合來便只是一箇渾淪道理而今只先去理會那一不去理會那貫將尾作頭將頭作尾沒理會了曾子平日工夫只先就貫上事事做去到極處夫子方喚醒他說我這道理只用一箇去貫了曾子便理會得不是只要抱一箇渾淪底物事教他自流出去義剛同淳有問目段子先生讀畢曰大概說得也好只是一樣意思義剛録云先生曰末梢自反之說說大而化之做其麼何故恁地儱侗又曰公說道理只要撮那頭一段尖底末梢便要到那大而化之極處中間許多都把做渣滓不要理會相似把箇利刃截斷中間都不用了這箇便是大病曾點漆雕開不曾見他做工夫處不知當時如何被他逴見這道理然就二人之中開卻是要做工夫吾斯之未能信斯便是見處未能信便是下工夫處曾點有時是他做工夫但見得未定或是他天資高後被他瞥見得這箇物事亦不可知雖是恁地也須低著頭隨衆從博學審問慎思明辨篤行底做工夫襯貼起來方實證驗出來方穩不是懸空見得便了博學審問五者工夫終始離他不得只是見得後做得不費力也如曾子平日用工極是子細每日三省只是忠信傳習底事何曾說著一貫曾子問一篇都是問喪祭變禮微細處想經禮聖人平日已說底都一一理會了只是變禮未說也須逐一問過一貫之說夫子只是謾提醒他縱未便曉得且放緩亦未緊要待別日更一提之只是曾子當下便曉得何曾只管與他說如論語中百句未有數句說此孟子自得之說亦只是說一番何曾全篇如此說今卻是懸虛說一箇物事不能得了只要那一去貫不要從貫去到那一如不理會散錢只管要去討索來穿如此則中庸只消天命之謂性一句及無聲無臭至矣一句便了中間許多達孝達德九經之類皆是粗跡都掉卻不能耐煩去理會了如禮儀三百威儀三千只將一箇道理都包了更不用理會中間許多節目今須是從頭平心讀那書許多訓詁名物度數一一去理會如禮儀須自一二三四數至於三百威儀須自一百二百三百數至三千逐一理會過都恁地通透始得若是只恁懸虛不已恰似村道說無宗旨底禪樣瀾翻地說去也得將來也解做頌燒時也有舍利只是不濟得事又曰一底與貫底都只是一箇道理如將一貫已穿底錢與人及將一貫散錢與人只是一般都用得不成道那散底不是錢義剛同泳録云如用一條錢貫一齊穿了問氣弱膽小之病曰公只去做功夫到理明而氣自強而膽自大矣問事各有理而理各有至當十分處今看得七八分只做到七八分處上面缺了分數莫是窮來窮去做來做去久而且熟自能長進到十分否曰雖未能從容只是熟後便自會從容再三詠一熟字諸友入侍坐定先生目淳申前說曰若把這些子道理只管守定在這裏則相似山林苦行一般便都無事可做了所謂潛心大業者何有哉淳曰已知病痛大段缺了下學工夫曰近日陸子靜門人寄得數篇詩來只將顏淵曾點數件事重疊說其他詩書禮樂都不說如吾友下學也只是揀那尖利底說粗鈍底都掉了今日下學明日便要上達如孟子從梁惠王以下都不讀只揀告子盡心來說只消此兩篇其他五篇都刪了緊要便讀間慢底便不讀精底便理會粗底便不理會書自是要讀恁地揀擇不得如論語二十篇只揀那曾點底意思來涵泳都要蓋了單單說箇風乎舞雩詠而歸只做箇四時景致論語何用說許多事前日江西朋友來問要尋箇樂處某說只是自去尋尋到那極苦澀處便是好消息人須是尋到那意思不好處這便是樂底意思來卻無不做工夫自然樂底道理而今做工夫只是平常恁地去理會不要把做差異看了粗底做粗底理會細底做細底理會不消得揀擇論語孟子恁地揀擇了史書及世間粗底書如何地看得義剛同諸友揖退先生留淳獨語曰何故無所問難淳曰數日承先生教誨已領大意但當歸去作工夫曰此別定不再相見淳問曰己分上事已理會但應變處更望提誨曰今且當理會常未要理會變常底許多道理未能理會得盡如何便要理會變聖賢說話許多道理平鋪在那裏且要闊著心胸平去看通透後自能應變不是硬捉定一物便要討常便要討變今也須如僧家行腳接四方之賢士察四方之事情覽山川之形勢觀古今興亡治亂得失之跡這道理方見得周遍士而懷居不足以為士矣不是塊然守定這物事在一室關門獨坐便了便可以為聖賢自古無不曉事情底聖賢亦無不通變底聖賢亦無關門獨坐底聖賢聖賢無所不通無所不能那箇事理會不得如中庸天下國家有九經便要理會許多物事如武王訪箕子陳洪範自身之視聽言貌思極至於天人之際以人事則有八政以天時則有五紀稽之於卜筮驗之於庶徵無所不備如周禮一部書載周公許多經國制度那裏便有國家當自家做只是古聖賢許多規模大體也要識蓋這道理無所不該無所不在且如禮樂射御書數許多周旋升降文章品節之繁豈有妙道精義在只是也要理會理會得熟時道理便在上面又如律曆刑法天文地理軍旅官職之類都要理會雖未能洞究其精微然也要識箇規模大概道理方浹洽通透若只守箇些子捉定在那裏把許多都做間事便都無事了如此只理會得門內事門外事便了不得所以聖人教人要博學二字力說須是博學之審問之慎思之明辨之篤行之子曰我非生而知之者好古敏以求之者也文武之道布在方冊在人賢者識其大者不賢者識其小者夫子焉不學而亦何常師之有聖人雖是生知然也事事理會過無一之不講這道理不是只就一件事上理會見得便了學時無所不學理會時卻是逐件上理會去凡事雖未理會得詳密亦有箇大要處縱詳密處未曉得而大要處已被自家見了今公只就一線上窺見天理便說天理只恁地樣子便要去通那萬事不知如何得萃百物然後觀化工之神聚衆材然後知作室之用於一事一義上欲窺聖人之用心非上智不能也須撒開心胸去理會天理大所包得亦大且如五常之教自家而言只有箇父子夫婦兄弟才出外便有朋友朋友之中事已煞多及身有一官君臣之分便定這裏面又煞多事事事都合講過他人未做工夫底亦不敢向他說如吾友於己分上已自見得若不說與公又可惜了他人於己分上不曾見得泛而觀萬事固是不得而今已有箇本領卻只捉定這些子便了也不得如今只道是持敬收拾身心日用要合道理無差失此固是好然出而應天下事應這事得時應那事又不得學之大本中庸大學已說盡了大學首便說格物致知為甚要格物致知便是要無所不格無所不知物格知至方能意誠心正身修推而至於家齊國治天下平自然滔滔去都無障礙義剛同淳稟曰伏承教誨深覺大缺下學工夫恐遐陬僻郡孤陋寡聞易致差迷無從就正望賜下學說一段以為朝夕取準曰而今也不要先討差處待到那差地頭便旋旋理會下學只是放闊去做局促在那一隅便窄狹了須出四方游學一遭這朋友處相聚三兩月日看如何又那朋友處相聚三兩月日看如何胡叔器曰游學四方固好恐又隨人轉了曰要我作甚義剛録云胡叔器曰恐又被不好底人壞了先生曰我須是先知得他是甚麼樣人及見後與他相處數日便見若是不合便去不合便去若恁地隨人轉又不如只在屋裏孤陋寡聞義剛同先生問淳曰安卿須是友天下之善士為未足又尚論古之人須是開闊方始展拓若只如此恐也不解十分先生餞席酒五行中筵親酌一杯勸李丈云相聚不過如此退去反而求之次一杯與淳曰安卿更須出來行一遭村裏坐不覺壞了人昔陳了翁說一人棋甚高或邀之入京參國手日久在側並無所教但使之隨行攜棋局而已或人詰其故國手曰彼棋已精其高著已盡識之矣但低著未曾識教之隨行亦要都經歷一過臨行拜別先生曰安卿今年已許人書會冬間更須出行一遭李丈稟曰書解乞且放緩願早成禮書以幸萬世曰書解甚易只等蔡三哥來便了禮書大段未也安卿問先生前日與廖子晦書云道不是有箇物事閃閃爍爍在那裏固是如此但所謂操則存舍則亡畢竟也須是有箇物事曰操存只是教你收斂教你心莫胡思亂量幾曾捉定有箇物事在那裏又問顧諟天之明命畢竟是箇甚麼曰此只是說要得道理在面前不被物事遮障了立則見其參於前在輿則見其倚於衡皆只是見得理如此不成別有箇物事光爍在那裏漳州陳淳會問方有可答方是疑賀孫賀孫問安卿近得書否曰緣王子合與他答問諱他寫將來以此漳州朋友都無問難來因說子合無長進在學中將實録課諸生全不識輕重先後許多學者近來覺得都不濟事賀孫云也是世衰道微人不能自立才做官便顛沛曰如做官科舉皆害事或曰若在此說得甚好做卻如此曰只緣無人說得好說得好乃是知得到若知得到雖摩頂至足也只是變他不得因言器之昨寫來問幾條已答去今再說來亦未分曉公之為仁公不可與仁比並看公只是無私才無私這仁便流行程先生云唯公為近之卻不是近似之近才公仁便在此故云近猶云知所先後則近道矣不是道在先後上只知先後便近於道如去其壅塞則水自流通水之流通卻不是去壅塞底物事做出來水自是元有只被塞了才除了塞便流仁自是元有只被私意隔了才克去己私做底便是仁賀孫云公是仁之體仁是理曰不用恁地說徒然不分曉只要是無私無私則理無或蔽今人喜也是私喜怒也是私怒哀也是私哀懼也是私懼愛也是私愛惡也是私惡欲也是私欲苟能克去己私擴然大公則喜是公喜怒是公怒哀懼愛惡欲莫非公矣此處煞係利害顏子所授於夫子只是克己復禮為仁讀書最忌以己見去說但欲合己見不知非本來旨意須是且就他頭說說教分明有不通處卻以己意較量賀孫
