body:
  text: 朱子語類卷第一百二十朱子十七訓門人八雜訓諸門人者為此卷因說林擇之曰此人曉事非其他學者之比徐又曰到他己分事事卻暗文蔚先生問堯卿近看道理所得如何曰日用間有些著落不似從前走作曰此語亦是鶻突須是端的見得是如何譬如飲食須見那箇是好喫那箇滋味是如何不成說道都好喫淳問堯卿今日看甚書曰只與安卿較量下學處曰不須比安卿公年高且據見定底道理受用安卿後生有精力日子長儘可闊著步去淳李丈問前承教只據見定道理受用某日用間已見有些落著事來也應得去不似從前走作曰日用間固是如此也須隨自家力量成就去看如何問工夫到此自是不能間斷得曰博學審問慎思明辨篤行這箇工夫常恁地昔李初平欲讀書濂溪曰公老無及矣只待某說與公二年方覺悟他既讀不得書濂溪說與他何故必待二年之久覺悟二年中說多少事想見事事說與他不解今日一說明日便悟頓成箇別一等人無此理也公雖年高更著涵養工夫如一粒菜子中間含許多生意亦須是培壅澆灌方得成不成說道有那種子在此只待他自然生根生苗去若只見道理如此便要受用去則一日止如一日一年止如一年不會長進正如菜子無糞去培壅無水去澆灌也須是更將語孟中庸大學中道理來涵養淳義剛同堯卿問事來斷制淳録作置不下當何以處之曰便斷制不得也著斷制不成掉了又問莫須且隨力量做去曰也只得隨力量做去又問事有至理理有至當十分處今已看得七八分待窮來窮去熟後自解到那分數足處曰雖未能從容只是熟後便自會只是熟只是熟義剛淳録略傅誠至叔請教曰聖賢教人甚分曉但人不將來做切己看故覺得讀所做時文之書與這箇異要之只是這箇書今人但見口頭道得筆下去得紙上寫得以為如此便了殊不知聖賢教人初不如是而今所讀亦自與自家不相干涉也道夫與楊通老說學問最怕悠悠讀書不在貪多未能讀從後面去且溫習前面已曉底一番看一番別賀孫通老問孟子說浩然之氣如何是浩然之氣先生不答久之曰公若留此數日只消把孟子白去熟讀他逐句自解一句自家只排句讀將去自見得分明卻好來商量若驀地問後待與說將去也徒然康節學於穆伯長每有扣請必曰願開其端勿盡其意他要待自思量得大凡事理若是自去尋討得出來直是別賀孫語通老早來說無事時此理存有事時此理亡無他只是把事做等間須是於事上窮理方可理於事本無異今見事來別把做一般看自然錯了可學周公謹問學者理會文字又卻昏了若不去看恐又無路可入曰便是難且去看聖賢氣象識他一箇規模若欲盡窮天下之理亦甚難且隨自家規模大小做去若是迫切求益亦害事豈不是私意泳李公謹問讀書且看大意有少窒礙處且放過後來旋理會如何曰公合下便立這規模便不濟事了才恁地立規模只是要苟簡小處曉不得也終不見大處若說窒礙到臨時十分不得已只得且放下如何先如此立心賀孫語敬子曰讀書須是心虛一而靜方看得道理出而今自家心只是管外事硬定要如此要別人也如此做所以來這裏看許多時文字都不濟事不曾見有長進是自家心只在門外走與人相抵拒在這裏不曾入得門中不知屋裏是甚模樣這道理本自然不消如此如公所言說得都是只是不曾自理會得公身上事所以全然無益只是硬樁定方法抵拒將去全無自然意思都無那活底水只是聚得許多死水李曰也須是積將去曰也只積得那死水那源頭活水不生了公只是每日硬用力推這車子只見費力若是有活水來那車子自轉不用費力李曰恐才如此說不善聽者放寬便不濟事曰不曾教你放寬所以學問難才說得寬便不著緊才太緊又不濟事寬固是便狼狽然緊底下梢頭也不濟事僩敬子問人患多懼雖明知其不當懼然不能克莫若且強制此心使不動否曰只管強制也無了期只是理明了自是不懼不須強制僩胡叔器問每常多有恐懼何由可免曰須是自下工夫看此事是當恐懼不當恐懼遺書云治怒難治懼亦難克己可以治怒明理可以治懼若於道理見得了何懼之有義剛問叔器看文字如何曰兩日方在思量顏子樂處先生疾言曰不用思量他只道博我以文約我以禮後見得那天理分明日用間義理純熟後不被那人欲來苦楚自恁地快活而今只去博文約禮便自見得今卻索之於杳冥無朕之際去何處討這樂處將次思量得成病而今一部論語說得恁地分明自不用思量只要著實去用工前日所說人心道心便只是這兩事只去臨時思量那箇是人心那箇是道心便顏子也只是使人心聽命於道心不被人心勝了道心今便須是常常揀擇教精使道心常常在裏面如箇主人人心只如客樣常常如此無間斷便能允執厥中義剛胡問靜坐用工之法曰靜坐只是恁靜坐不要間勾當不要間思量也無法問靜坐時思一事則心倚靠在事上不思量則心無所倚靠如何曰不須得倚靠若然又是道家數出入息目視鼻端白一般他亦是心無所寄寓故要如此倚靠若不能斷得思量又不如且恁地也無害淳義剛録同又曰靜坐息間雜思量則養得來便條暢胡叔器患精神短曰若精神少也只是做去不成道我精神少便不做公只是思索義理不精平日讀書只泛泛地過不曾貼裏細密思量公與安卿之病正相反安卿思得義理甚精只是要將那粗底物事都掉了公又不去義理上思量事物來皆奈何不得只是不曾向裏去理會如入市見鋪席上都是好物事只是自家沒錢買得如書冊上都是好說話只是自家無奈他何如黃兄前日說忠恕忠恕只是體用只是一箇物事猶形影要除一箇除不得若未曉且看過去那時復把來玩味少間自見得叔器曰安之在遠方望先生指一路脈去歸自尋曰見行底便是路那裏有別底路來道理星散在事物上卻無總在一處底而今只得且將論孟中庸大學熟看如論語上看不出少間就孟子上看得出孟子上底只是論語上底不可道孟子勝論語只是自家已前看不到而今方見得到又問優游涵泳勇猛精進字如何曰也不須恁地立定牌榜淳録作做題目也不須恁地起草只做將去又問應事當何如曰士人在家有甚大事只是著衣喫飯理會眼前事而已其他天下事聖賢都說十分盡了今無他法為高必因丘陵為下必因川澤自家只就他說話上寄搭些工夫便都是我底某舊時看文字甚費力如論孟諸家解有一箱每看一段必檢許多各就諸說上推尋意脈各見得落著然後斷其是非是底都抄出一兩字好亦抄出雖未如今集注簡盡然大綱已定今集注只是就那上刪來但人不著心守見成說只草草看了今試將精義來參看一兩段所以去取底是如何便自見得大抵事要思量學要講如古人一件事有四五人共做自家須看那人做得是那人做得不是又如眼前一件事有四五人共議甲要如此乙要如彼自家須見那人說得是那人說得不是便待思量得不是此心曾經思量一過有時那不是底發我這是底如十箇物事團九箇不著那一箇便著則九箇不著底也不是枉思量又如講義理有未通處與朋友共講十人十樣說自家平心看那箇不是或他說是底卻發得自家不是底或十人都說不是有時因此發得自家是底所以適來說有時是這處理會得有時是那處理會得少間便都理會得只是自家見識到別無法學者須是撒開心胸事事逐件都與理會過未理會得底且放下待無事時復將來理會少間甚事理會不得義剛林恭甫問論語記門人問答之辭而堯曰一篇乃記堯舜湯武許多事何也曰不消恁地理會文字只消理會那道理譬如喫飯碗中盛得飯自家只去喫看那滋味如何莫要問他從那處來堯曰一篇某也嘗見人說來是夫子嘗誦述前聖之言弟子類記於此先儒亦只是如此說然道理緊要卻不在這裏這只是外面一重讀書須去裏面理會譬如看屋須看那房屋間架莫要只去看那外面墻壁粉飾如喫荔枝須喫那肉不喫那皮公而今卻是剝了那肉卻喫那皮核讀書須是以自家之心體驗聖人之心少間體驗得熟自家之心便是聖人之心某自二十時看道理便要看那裏面嘗看上蔡論語其初將紅筆抹出後又用青筆抹出又用黃筆抹出三四番後又用墨筆抹出是要尋那精底看道理須是漸漸向裏尋到那精英處方是如射箭其初方上齜後來又要中帖少間又要中第一暈又要中第二暈後又要到紅心公而今只在齜之左右或上或下卻不要中的恁地不濟事須是子細看看得這一般熟後事事書都好看便是七言雜字也有道理未看得時正要去緊要處鑽少間透徹則無書不可讀而今人不去理會底固是不足說去理會底又不知尋緊要處也都討頭不著義剛子升問向來讀書病於草草所以多疑而無益今承先生之教欲自大學溫去曰然只是著便把做事如說持敬便須入隻腳在裏面做不可只作說話看了木之子升問主一工夫兼動靜否曰若動時收斂心神在一事上不胡亂思想東去西去便是主一又問由敬可以至誠否曰誠自是真實敬自是嚴謹如今正不要如此看但見得分曉了便下工夫做將去如整齊嚴肅其心收斂常惺惺數條無不通貫木之子升問遇事心不存之病曰只隨處警省收其放心收放只在自家俄頃瞬息間耳或舉先生與呂子約書有知其所以為放者而收之則心存矣此語最切要又問曾子謂孟敬子君子所貴乎道者三之意曰曾子之意且將對下面籩豆之事則有司存說言君子動容貌要得遠暴慢正顏色要得近信出辭氣要得遠鄙倍此其本之所當先者至於籩豆之事則有司存蓋末而當後者耳未說到做工夫上若說三者工夫則在平日操存省察耳木之黎季成問向來工夫零碎今聞先生之誨乃見得人之所任甚重統體通貫曰季成只是守舊窠窟須當進步蓋卿敬之黃名顯子問理既明於心須又見這樣子方始安穩曰學問思辨亦皆是學但學是習此事思是思量此理者只說見這樣子又不得須是依樣去做然只依本畫葫蘆又不可須是百方自去尋討始得宇語敬之今看文字專要看做裏面去如何裏面也更無去處不看得許多言語這裏只主一無適敬以直內涵養去嘗謂文字寧是看得淺不可太深寧是低看不可太高蓋淺近雖未能到那切近處更就上面推尋卻有見時節若太深遠更無回頭時恰是人要來建陽自信州來行到崇安歇了卻不妨明日更行須會到若不問來由一向直走過均亭去迤邐前去更無到建陽時節宇語敬之曰這道理也只是如此看須是自家自奮迅做去始得看公大病痛只在箇懦弱須是便勇猛果決合做便做不要安排不要等待不要靠別人不要靠書籍言語只是自家自檢點公曾看易易裏說陽剛陰柔陰柔是極不好賀孫語黃敬之須是打撲精神莫教恁地慢慢底須是矯教緊緊底須是莫放教慢賀孫語敬之曰敬之意氣甚弱看文字都恁地遲疑不決只是不見得道理分明賀孫問先生向令敬之看孟子若讀此書透須自變得氣質否曰只是道理明自然會變今且說讀孟子讀了只依舊是這箇人便是不曾讀便是不曾得他裏面意思孟子自是孟子自家身己自是自家身己讀書看道理也須著些氣力打撲精神看教分明透徹方於身上有功某近來衰晚不甚著力看文字若舊時看文字有一段理會未得須是要理會得直是辛苦近日卻看得平易舊時須要勉強說教得方了要知初間也著如此著力看公如今只恁地慢慢要進又不敢進要取又不敢取只如將手恁地探摸只怕物事觸了手相似若恁地看文字終不見得道理終不濟事徒然費了時光須是勇猛向前匹馬單鎗做將去看如何只管怕箇甚麼彼丈夫也我丈夫也吾何畏彼哉他合下也有許多義理自家合下也有許多義理他做得自家也做得某近看得道理分明便是有甚利害有甚禍福直是不怕只是見得道理合如此便做將去賀孫黃敬之有書先生示人傑人傑云其說名義處或中或否蓋彼未有實功說得不濟事曰也須要理會若實下功夫亦須先理會名義都要著落彼謂易者心之妙用太極者性之本體其說有病如伊川所謂其體則謂之易其理則謂之道其用則謂之神方說得的當然伊川所謂體字與實字相似乃是該體用而言如陰陽動靜之類畢竟是陰為體陽為用靜而動動而靜是所以為易之體也人傑云向見先生云體是形體卻是著形氣說不如說該體用者為備耳曰若作形氣說然卻只說得一邊惟說作該體用乃為全備卻統得下面其理則謂之道其用則謂之神兩句人傑某平生不會懶雖甚病然亦一心欲向前做事自是懶不得今人所以懶未必是真箇怯弱自是先有畏事之心才見一事便料其難而不為緣先有箇畏縮之心所以習成怯弱而不能有所為也昌父云某平生自覺血氣弱日用工夫多只揀易底事做或尚論人物亦只取其與己力量相近者學之自覺難處進步不得也曰便當這易處而益求其所謂難因這近處而益求其所謂遠不可只守這箇而不求進步縱自家力量到那難處不得然不可不勉慕而求之今人都是未到那做不得處便先自懶怯了雖是怯弱然豈可不向前求其難者遠者但求之無有不得若真箇著力求而不得則無如之何也趙曰某幸聞諸老先生之緒言粗知謹守而不敢失墜爾曰固是好但終非活法爾僩昌父辭請教曰當從實處作工夫可學饒幹廷老問今之學者不是忘便是助長曰這只是見理不明耳理是自家固有底從中而出如何忘得使他見之之明如飢而必食渴而必飲則何忘之有如食而至於飽則止飲而至於滿腹則止又何助長之有此皆是見理不明之病道夫先生謂饒廷老曰觀公近日都汨沒了這箇意思雖縣事叢冗自應如此更宜做工夫蓋卿二彭尋蠡初見問平居做甚工夫曰為科舉所纍自時文外不曾為學曰今之學者多如此然既讀聖人書當反身而求可也二公頗自言其居家實踐等事曰躬行固好亦須講學不講學遇事便有嵲屼不自安處講學明則坦坦地行將去此道理無出聖人之言但當熟讀深思且如人看生文字與熟文字自是兩般既熟時他人說底便是我底讀其他書不如讀論語最要蓋其中無所不有若只躬行而不講學只是箇鶻突底好人又曰論語只是箇坯璞子若子細理會煞有商量處謨語泉州趙公曰學固不在乎讀書然不讀書則義理無由明要之無事不要理會無書不要讀若不讀這一件書便闕了這一件道理不理會這一事便闕這一事道理要他底須著些精彩方得然泛泛做又不得故程先生教人以敬為本然後心定理明孔子言出門如見大賓云云也是散說要人敬但敬便是箇關聚底道理非專是閉目靜坐耳無聞目無見不接事物然後為敬整齊收斂這身心不敢放縱便是敬嘗謂敬字似甚字恰似箇畏字相似宇蕭兄問心不能自把捉曰自是如此蓋心便能把捉自家自家卻如何把捉得他唯有以義理涵養耳又問持其志如何卻又要主張曰志是心之發豈可聽其自放而不持之但不可硬守定耳蓋卿問曾光祖曰公讀書有甚大疑處曰覺見持敬不甚安曰初學如何便得安除是孔子方始恭而安今人平日恁地放肆身心一下自是不安初要持敬也須有些勉強但須覺見有些子放去便須收斂提掇起教在這裏常常相接久後自熟又曰雖然這箇也恁地把捉不得須是先理會得箇道理而今學問便只要理會一箇道理天生蒸民有物有則有一箇物便有一箇道理所以大學之道教人去事物上逐一理會得箇道理若理會一件未得直須反覆推究研窮行也思量坐也思量早上思量不得晚間又把出思量晚間思量不得明日又思量如此豈有不得底道理若只略略地思量思量不得便掉了如此千年也理會不得只管責道是自家魯鈍某常謂此道理無他只是要熟只是今日把來恁地看過明日又把來恁地看過看來看去少間自然看得或有看不得底少間遇著別事沒巴沒鼻也會自然觸發蓋為天下只是一箇道理賀孫光祖說大學首尾該貫此處必有脫字初間看便不得如此要知道理只是這箇道理只緣失了多年卒急要尋討不見待只管理會教熟卻便這箇道理初間略見得些少時也似曰生恁地自無安頓去處到後來理會熟了便自合當如此如一件器用掉在所在多年卒乍要討討不得待尋來尋去忽然討見即是元初的定底物事賀孫光祖說治國平天下皆本於致知格物看來只是敬又舉伊川說內直則外無不方曰伊川亦只是大體如此說看來世上自有一般人不解恁地內直外便方正只是了得自身己遇事應物都顛顛倒倒沒理會大學須是要人窮理今來一種學問正坐此病只說我自理會得了其餘事皆截斷不必理會自會做得更不解商量更不解講究到做出都不合義理所以聖人說敬以直內又說義以方外是見得世上有這般人學者須是要窮理不論小事大事都識得通透直得自本至末自頂至踵並無些子夾雜處若說自家資質恁地好只消恁地做去更不解理會其他道理也不消問別人這倒是夾雜倒是私意賀孫光祖告行云蒙教誨讀大學已略知為學之序平日言語動作亦自常去點檢又恐有發露而不自覺乞指示針戒曰看公意思遲重不到有他過只是看文字上更子細加功更須著些精采賀孫曾問讀大學已知綱目次第了然大要用工夫恐在敬之一字前見伊川說敬以直內義以方外處先生曰能敬以直內矣亦須義以方外方能知得是非始格得物不以義方外則是非好惡不能分別物亦不可格曾又問恐敬立則義在其中伊川所謂弸諸中彪諸外是也曰雖敬立而義在也須認得實方見得今有人雖胸中知得分明說出來亦是見得千了百當及到應物之時顛倒錯謬全是私意不知聖人所謂敬義處全是天理安得有私意因言今釋老所以能立箇門戶恁地亦是他從旁窺得近似他所謂敬時亦卻是能敬更有笠影之喻卓程次卿自述向嘗讀伊洛書妄謂人當隨事而思視時便思明聽時便思聰視聽不接時皆不可有所思所謂思不出其位若無事而思則是紛紜妄想曰若間時不思量義理到臨事而思已無及若只塊然守自家箇軀殼直到有事方思間時都莫思量這卻甚易只守此一句足矣聖賢千千萬萬在這裏何用如公所說則六經語孟之書皆一齊不消存得以孔子之聖也只是好學我非生而知之者好古敏以求之者也文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有若說間時都莫思則世上大事小事都莫理會如此卻都無難者事事須先理會知得了方做得行得何故中庸卻不先說篤行之卻先說博學之審問之慎思之明辨之大學何故卻不先說正心誠意卻先說致知是如何如何孟子卻說道詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮若如公說間時都不消思量季通問程君之意是如何曰他只要理會自家這心在裏面事至方思外面事都不要思量理會蔡云若不理會得世上許多事自家裏面底也怕理會不得曰只據他所見自守一箇小小偏枯底物事無緣知得大體因顧賀孫曰公鄉間陳叔向正是如此如他說格物云物是心須是格住這心致知如了了的當常常知覺他所見既如彼便將聖賢說話都入他腔裏面不如此則他所學無據這都是不曾平心讀聖賢之書只把自家心下先頓放在這裏卻捉聖賢說話壓在裏面如說隨事而思無事不消思聖賢也自有如此說時節又自就他地頭說只如公說思不出其位也不如公說這位字卻不是只守得這軀殼這位字煞大若見得這意思天下甚麼事不關自家身己極而至於參天地贊化育也只是這箇心都只是自家分內事蔡云陸子靜正是不要理會許多王道夫乞朝廷以一監書賜象山此正犯其所忌曰固是蔡云若一向是禪時也終是高曰只是許多模樣是甚道理如此若實見得自家底分明看彼許多道理不待辨而明如今諸公說道這箇也好某敢百口保其自見不曾分明如云洛底也是蜀底也是某定道他元不曾理會得如熙豐也不是元祐也不是某定保他自元不曾理會得如云佛氏也好老氏也好某定道他元不曾理會得若見得自底分明是底直是是非底直是非那得恁地含含胡胡怕觸著人這人也要周旋那人也要周旋賀孫程又問某不是說道間時全不去思量意謂臨事而思如讀書時只思量這書曰讀書時思量書疊了策時都莫思量去行動時心下思量書都不得在這裏坐只思量這裏事移過那邊去坐便不可思量這裏事今日只思量今日事更不可思量明日事這不成說話試自去平心看聖賢書都自說得盡賀孫吳伯英初見問書如何讀曰讀書無甚巧妙只是熟讀字字句句對注解子細辨認語意解得一遍是一遍工夫解得兩遍是兩遍工夫工夫熟時義理自然通貫不用問人先生問尋常看甚文字曰曾讀大學曰看得如何曰不過尋行數墨解得文義通自不曾生眼目於言外求意曰如何是言外意曰且如臣之忠子之孝火之熱水之寒只知為臣當忠為子當孝火性本熱水性本寒不知臣之所以忠子之所以孝火之所以熱水之所以寒曰格物只是就事物上求箇當然之理若臣之忠臣自是當忠子之孝子自是當孝為臣試不忠為子試不孝看自家心中如何火熱水寒水火之性如此凡事只是尋箇當然不必過求便生鬼怪僩吳伯英問某當從致知持敬如此用工夫曰此自吾友身上合做底事不須商量蓋卿吳伯英問持敬之義曰且放下了持敬更須向前進一步問如何是進步處曰心中若無一事時便是敬蓋卿吳伯英講書先生因曰凡人讀書須虛心入裏玩味道理不可只說得皮膚上譬如一食物滋味盡在裏面若只尬噬其外而不得其味無益也問器遠所學來歷曰自年二十從陳先生其教人讀書但令事事理會如讀周禮便理會三百六十官如何安頓讀書便理會二帝三王所以區處天下之事讀春秋便理會所以待伯者豫奪之義至論身己上工夫說道形而上者謂之道形而下者謂之器器便有道不是兩樣須是識禮樂法度皆是道理曰禮樂法度古人不是不理會只是古人都是見成物事到合用時便將來使如告顏淵行夏之時乘殷之輅只是見成物事如學字一般從小兒便自曉得後來只習教熟如今禮樂法度都一齊亂散不可稽考若著心費力在上面少間弄得都困了賀孫器遠言少時好讀伊洛諸書後來見陳先生卻說只就事上理會較著實若只管去理會道理少間恐流於空虛曰向見伯恭亦有此意卻以語孟為虛著語孟開陳許多大本原多少的實可行反以為恐流於空虛卻把左傳做實要人看殊不知少間自都無主張只見許多神頭鬼面一場沒理會此乃是大不實也又只管教人看史書後來諸生都衰了如潘叔度臨死卻去討佛書看且是止不得緣是他那裏都無箇捉摸卻來尋討這箇如人乘船一齊破散了無奈何將一片板且守得在這裏又曰孟子曰作於其心害於其事作於其事害於其政若不就自家身心理會教分明只道有些病痛不妨待有事來旋作安排少間也把捉得一事了只是有些子罅縫少間便是一箇禍端這利害非輕假饒你盡力極巧百方去做若此心有些病根只是會不好又曰又有說道身己自著理會一種應出底事又自著理會這分明分做兩邊去不知古人說修身而天下平須說做不是始得大學云物格而後知至知至而後意誠云云今來卻截斷一項只便要理會平天下如何得又曰聖門之中得其傳者惟顏子顏子之問夫子之答有二項一則問為仁一則問為邦須知得那箇是先那箇是後也須從克己復禮上做來方可及為邦之事這事最分曉可見又曰公適來說君舉要理會經世之學今且理會一件要緊事如國家養許多歸明歸正及還軍年老者費糧食供之州郡困乏展轉二三十年都縮手坐視其困器遠且道合如何商量去之則傷恩養之則益困若壯資其力而老棄其人是大不可須有箇指實器遠言鄉間諸先生嘗懷見先生之意卻不得面會剖析使這意思合又曰某不是要教人步步相循都來入這圈套只是要教人分別是非教明白是底還他是不是底還他不是大家各自著力各自撐柱君盡其職臣效其功各各行到大路頭自有箇歸一處是乃不同之同乃所以為真同也若乃依阿鶻突委曲包含不別是非要打成一片定是不可賀孫器遠問初學須省事方做得工夫曰未能應得事終是省好然又怕要去省卻有不省病痛某嘗看有時做事要省些工夫到得做出卻有不好卻不厭人意且如出路要減些用度令簡便到要用時沒討處也心煩依前是不曾省得若可無事時且省儘好若主家事及父母在上當代勞役終不成掉了去間所在坐不管省事固好然一向不經歷到得事來卻會被他來倒了問處鄉黨固當自盡不要理會別人若有事與己相關不可以不說當如何曰若合說便著說如所謂若要我頭也須說若是不當自家說與其人不可說則只得不說然自家雖然是不說也須示之以不然之意只有箇當說與不當說若要把他不是處做是說便決是不可賀孫曹問先生所解致知格物處某即就這上做去如未能到貫通處莫也無害否曰何謂無害公只是不曾學豈有不貫通處學得熟便通且如要去所在須是去到方得若行得一日又說恐未必能到若如此怎生到得天下只有一箇道理緊包在那下撒破便光明那怕不通曹叔遠又問如孟子言勿忘勿助長卻簡易而今要從細碎做去卻怕不能貫通曰勿忘勿助長自是言養氣試取孟子說處子細看大凡為學最切要處在吾心身其次便是做事此是的實緊切處又那裏見得如此須是聖人之言今之學者須是把聖人之言來窮究見得身心要如此做事要如此天下自有一箇道理若大路然聖人之言便是那引路底江文卿博識群書因感先生之教自咎云某五十年前枉費許多工夫記許多文字曰也不妨如今若理會得這要緊處那許多都有用如七年十載積疊得柴了如今方點火燒賀孫謂江文卿曰多聞擇其善者而從之多見而識之公今卻無擇善一著聖人擇善便是事不遺乎理公今知得便拽轉前許多工夫自不妨要轉便轉更無難者覺公意思尚放許多不下說幾句又漸漸走上來如車水相似又滾將去又曰東坡說話固多不是就他一套中間又自有精處如說易說甚性命全然惡模樣如說書卻有好處如說帝王之興受命之祥如河圖洛書玄鳥生民之詩固有是理然非以是為先恨學者推之過詳流入讖緯後人舉從而廢之亦過矣這是他說得好處公卻不記得這般所在亦是自家本領不明若理會得原頭正到得看那許多方有辨別如程先生與禪子讀碑云公所看都是字某所看都是理似公如今所說亦都是字自家看見都是理賀孫周兄良問某平時所為把捉這心教定一念忽生則這心返被他引去曰這箇亦只是認教熟熟了便不如此今日一念才生有以制之明日一念生又有以制之久後便無此理只是這邊較少那邊較多便被他勝了如一車之火以少水勝之水撲處才滅而火又發矣又如弱人與強人相牽一般強人在門外弱人在門裏弱底不能勝便被他強底拖去了要得勝他亦只是將養教力壯後自然可以敵得他去非別有箇道理也只在自家心有以處之耳孟子所謂捨則亡操則常存在此大學所謂忿懥好樂等事亦是除了此心則心自然正不是把一箇心來正一箇心又曰心只是敬程子所謂主一無適主一只是專一如在這裏讀書又思量做文字又思量別事去皆是不專又曰見得徹處徹上徹下只是一箇道理須是見得實方是見得鐵定如是便為善不如是便為惡此方是見得實卓諸生說書畢先生曰諸公看道理尋得一線子路脈著了說時也只是恁地但於持守處更須加工夫須是著實於行己上做得三兩分始得只恁說過不濟事周貴卿曰非不欲常常持守但志不能帥氣後臨事又變遷了曰只是亂道豈是由他自去正要待他去時撥轉來為仁由己而由人乎哉止吾止也往吾往也義剛李周翰請教屢歎年歲之高未免時文之纍曰這須是自見得從小兒也須讀孝經論語來中間何故不教人如此曾讀書也須疑著某所編小學公且子細去看也有古人說話也有今人說話且看是如何古人都自少涵養好了後因說至善又問作時文先生曰讀書才說要做文字使此心便錯了若剩看得了到合說處便說當不說處不說也得本來不是要人說得便了如時文也只不出聖賢不多說話翻謄出來且如到說忠信處他也會說做好只是與自身全不相干因舉在漳州日詞訟訖有一士人立庭下待詢問乃是要來從學居泉州父母遣學舉業乃厭彼要從學某以其非父母命令且歸去得請再來始無所礙然其有所見如此自別賀孫吳楶直翁問學亦頗知自立而病痛猶多奈何曰未論病痛人必全體是而後可以言病痛譬如純是白物事了而中有黑點始可言病痛公今全體都未是何病痛之可言設雖有善亦只是黑上出白點特其義理之不能已與氣質之或美耳大抵人須先要趨向是若趨向正底人雖有病痛也是白地上出黑花此特其氣稟之偏未能盡勝耳要之白地多也趨向不正底人雖有善亦只是黑地上出白花卻成差異事如孔門弟子亦豈能純善乎然終是白地多可愛也人須先拽轉了自己趨向始得孔子曰苟志於仁矣無惡也既志於義理自是無惡雖有未善處只是過耳非惡也以此推之不志於仁則無善矣蓋志在於利欲假有善事亦偶然耳蓋其心志念念只在利欲上世之志利欲與志理義之人自是不干事志利欲者便如趨夷狄禽獸之徑志理義者便是趨正路鄉里如江德功吳公濟諸人多少是激惱人然其志終在於善世亦有一種不激惱人底又見人說道理他也從而美之見人非佛老他亦從而非之但只是胡亂順人情說而心實不然不肯真箇去做此最不濟事伯羽某人來說書大概只是捏合來說都不詳密活熟此病乃是心上病蓋心不專靜純一故思慮不精明要須養得此心令虛明專靜使道理從裏面流出便好銖曰豫六二介于石不終日貞吉正謂此曰然張仁叟問何以能如此莫只在靜坐否曰自去檢點且一日間試看此幾箇時在內幾箇時在外小說中載趙公以黑白豆記善惡念之起此是古人做工夫處如此檢點則自見矣又曰讀書須將心帖在書冊上逐字看得各有著落方好商量須是收拾此心令專靜純一日用動靜間都在不馳走散亂方看得文字精審如此方是有本領銖先生語陳公直曰讀書且逐些子理會莫要攪動他別底今人讀書多是從頭一向看到尾都攪渾了道夫先生嘗謂劉學古曰康節詩云間居謹莫說無妨蓋道無妨便是有妨要做好人則上面煞有等級做不好人則立地便至只在把住放行之間爾道夫彥忠問居常苦私意紛攪雖即覺悟而痛抑之然竟不能得潔靜不起先生笑曰此正子靜有頭之說卻是使得惟其此心無主宰故為私意所勝若常加省察使良心常在見破了這私意只是從外面入縱饒有所發動只是以主待客以逸待勞自家這裏亦容他不得此事須是平日著工夫若待他起後方省察殊不濟事道夫林士謙初見問仁智自得處曰仁者得其為仁智者得其為智豈仁智之外更有自得公此問不成問且去將論語從學而時習讀起孟子將梁惠王讀起大學從大學之道在明明德讀起中庸從天命之謂性讀起某之法是如此不可只摘中間一兩句來理會意脈不相貫淳蘇宜久辭問歸欲觀易曰而今若教公讀易只看古注并近世數家注又非某之本心若必欲教公依某之易看某底又只說得三分自有六七分曉不得亦非所以為教看來易是箇難理會底物事卒急看未得不若且未要理會聖人云詩書執禮皆雅言也看來聖人教人不過此數者公既理會詩了只得且理會書理會書了便當理會禮禮之為書浩瀚難理會卒急如何看得許多且如箇儀禮也是幾多頭項某因為思得一策不若且買一本溫公書儀歸去子細看看得這箇不惟人家冠昏喪祭之禮便得他用兼以之看其他禮書如禮記儀禮周禮之屬少間自然易不過只是許多路徑節目溫公書儀固有是有非然他那箇大概是僩廖晉卿請讀何書曰公心放已久精神收拾未定無非走作之時可且收斂精神方好商量讀書繼謂之曰王藻九容處且去子細體認待有意思卻好讀書時舉厚之臨別請教因云看文字生曰日子足便熟可學陳希周請問讀書修學之門曰所謂讀書者只是要理會這箇道理治家有治家道理居官有居官道理雖然頭面不同然又只是一箇道理如水相似遇圓處圓方處方小處小大處大然亦只是一箇水耳時舉先生謂鄭光弼子直曰書雖是古人書今日讀之所以蓄自家之德卻不是欲這邊讀得些子便搬出做那邊用易曰君子以多識前言往行以蓄其德公今卻是讀得一書便做得許多文字馳騁跳躑心都不在裏面如此讀書終不干自家事又曰義利之辨正學者所當深知道夫子合純篤膚仲疏敏道夫先生謂正甫任忠厚遂安人精神專一倪鍾唐傑問窮理持敬曰此事不用商量若商量持敬便不成持敬若商量窮理便不成窮理須令實理在題目之後蓋卿閭丘次孟言嘗讀曲禮遺書康節詩覺得心意快活曰他本平鋪地說在裏公卻帖了箇飛揚底意思在上面可知是恁地康節詩云真樂攻心不奈何某謂此非真樂也真樂便不攻心如顏子之樂何嘗恁地曰次孟何敢望康節直塗之人爾曰塗人卻無許多病公正是肚裏有許多見識道理攪得恁地叫喚來又舉曲禮成誦先生曰但曲禮無許多叫喚曰次孟氣不足曰非氣不足乃氣有餘也道夫語元昭且要虛心勿要周遮元昭以十詩獻詩各以二字命題如實理之類節節推之先生指立命詩兩句幾度風霜猛摧折依前春草滿池塘既說道佛老之非又卻流於佛老此意如何元昭曰言其無止息曰觀此詩與賢說話又異此只是要鬥勝知道安用許多言顏子當時不曾如此此只是要人知安排餖飣出來便不是末篇極致尤不是如何便到此直要撞破天門前日說話如彼今日又如此只是說話可學元昭告歸先生曰歸以何為工夫曰子細觀來平生只是不實當於實處用工夫曰只是粗除去粗便是實曰每嘗觀書多只理會大意元不曾子細講究曰大意固合理會文義亦不可不講究最忌流於一偏明道曰與賢說話卻似扶醉漢救得一邊倒了一邊今之學者大抵皆然如今人讀史成誦亦是玩物喪志學者若不理會得聞這說話又一齊棄了只是停埋攤布使表裏相通方可然亦須量力若自家力不及多讀無限書少間埋沒於其間不惟無益反為所害近日學者又有一病多求於理而不求於事求於心而不求於身如說一日克己復禮天下歸仁既能克己則事事皆仁天下皆歸仁於我此皆有實跡而必曰天下皆歸吾仁之中只是無形無影自龜山以來皆如此說徐承叟亦云見龜山說如此先生問元昭近來頗覺得如何曰自覺此心不實曰但不要窮高極遠只於言行上點檢便自實今人論道只論理不論事只說心不說身其說至高而蕩然無守流於空虛異端之說且如天下歸仁只是天下與其仁程子云事事皆仁是也今人須要說天下皆歸吾仁之中其說非不好但無形無影全無下手腳處夫子對顏子克己復禮之目亦只是就視聽言動上理會凡思慮之類皆動字上包了不曾更出非禮勿思一條蓋人能制其外則可以養其內固是內是本外是末但偏說存於中不說制於外則無下手腳處此心便不實外面儘有過言過行更不管卻云吾正其心有此理否浙中王蘋信伯親見伊川來後來設教作怪舒州有語録之類專教人以天下歸仁才見人便說天下歸仁更不說克己復禮璘楊丞問心思擾擾曰程先生云嚴威整肅則心便一一則自無非僻之干只才整頓起處便是天理無別天理但常常整頓起思慮自一璘黃達才言思不能精之病曰硬思也不得只要常常提撕莫放下將久自解有得義剛立之問某常於事物未來思慮未萌時覺見有惺惺底意思故其應變接物雖動卻有不動之意存未知是否曰應變接物只要得是如敬以直內義以方外此可以盡天下之事若須要不動則當好作事處又蹉過了時舉李伯誠曰打坐時意味也好曰坐時固是好但放下腳放開眼便不恁地了須是臨事接物時長如坐時方可如挽一物樣待他要去時硬挽將轉來方得義剛張以道請誨曰但長長照管得那心便了人若能提掇得此心在時煞爭事義剛劉炳韜仲以書問格物未盡處義未精曰此學者之通患然受病不在此這前面別有受病處余正叔曰豈其自然乎曰都不干別事本不立耳伯羽鄭昭先景紹請教曰今人卻是倒置古人學而後仕今人卻反仕而後學其未仕也非不讀書但心有所溺聖賢意思都不能見科舉也是奪志今既免此亦須汲汲於學為學之道聖經賢傳所以告人者已竭盡而無餘不過欲人存此一心使自家身有主宰今人馳騖紛擾一箇心都不在軀殼裏孟子曰學問之道無他求其放心而已又曰存其心養其性所以事天也學者須要識此道夫丘玉甫作別請益曰此道理儘說只如此工夫全在人人卻聽得頑去聲了不曾真箇做須知此理在己不在人得之於心而行之於身方有得力不可只做冊子工夫如某文字說話朋友想都曾見之想只是看過所以既看過依舊只如舊時只是將身掛在理義邊頭不曾真箇與之為一須是決然見得未嘗離不可相捨處便自然著做不能已也又曰學者肯做工夫想是自有時然所謂時者不可等候只自肯做時便是也今學者自不以為飢如何強他使食自不以為渴如何強他使飲必大江元益問入德曰德者己之所自有入德只是進得底且如仁義禮智自家不得便不是自家底幹江元益問門人勇者為誰曰未見勇者幹林叔和別去請教曰根本上缺工夫無歸宿處如讀書應事接物固當用功不讀書不應事接物時如何林好主葉正則之說曰病在先立論聖賢言語卻只將來證他說凡讀書須虛心且似未識字底將本文熟讀平看今日看不出明日又看看來看去道理自出閎祖周元卿問讀書有時半板前心在書上半板後忽然思慮他事口雖讀心自在別處如何得心只在書上曰此最不可不誠無物雖讀猶不讀也誠者物之終始如半板已前心在書上則只在半板有始有終半板以後心不在焉則無物矣壯祖謂諸友曰鄭仲履之學只管從小小處看不知經旨初不如此觀書當從大節目處看程子有言平其心易其氣闕其疑則聖人之意可見矣蓋卿方叔弟問平居時習而習中每覺有愧何也曰如此只是工夫不接續要習須常令工夫接續則得又問尋求古人意思曰某常謂學者須是信又須不信久之卻自尋得箇可信底道理則是真信也大雅先生以林一之問卷示諸生曰一之恁地沉淪不能得超脫他說生物之心我與那物同便會相感這生物之心只是我底觸物便自然感非是因那物有此心我方有此心且赤子不入井牛不觳觫時此心何之須常粧箇赤子入井牛觳觫在面前方有此惻隱之心無那物時便無此心乎又說義利作甚此心才有不存便錯了未說到那義利處淳林一之問先生說動靜義只是動中有靜靜中有動底道理曰固是如此然何須將來引證某僻性最不喜人引證動中靜靜中動古人已說了今更引來要如何引證得是但與此文義不差耳有甚深長今自家理會這處便要將來得使恁地泛泛引證作何用明道言介甫說塔不是上塔今人正是說塔須是要直上那頂上去始得說得濟甚事如要去取咸陽一直去取便好何必要問咸陽是如何廣狹城池在那處宮殿在那處亦何必說是雍州之地但取得其地便是今恁地引證恰似要說咸陽元不曾要取他地宇郭叔雲問為學之初在乎格物物物有理從何處下手曰人箇箇有知不成都無知但不能推而致之耳格物是格物理至徹底處又云致知格物只是一事非是今日格物明日又致知格物以理言致知以心言恪先生教郭曰為學切須收斂端嚴就自家身心上做工夫自然有所得恪與馮德貞說為己為人曰若不為己看做甚事都只是為別人雖做得好亦不關己自家去從師也不是要理會身己自家去取友也不是要理會身己只是漫恁地只是要人說道也曾如此要人說道好自家又識得甚麼人自家又有幾箇朋友這都是徒然說道看道理不曾著自家身己如何會曉得世上如此為學者多只看為己底是如何他直是苦切事事都是自家合做底事如此方可不如此定是不可今有人苦學者他因甚恁地苦只為見這物事是自家合做底事如人喫飯是自家肚飢定是要喫又如人做家主要錢使在外面百方做計一錢也要將歸這是為甚如此只為自家身上事若如此為學如何會無所得賀孫余國秀問治心修身之要以為雖知事理之當為而念慮之間多與日間所講論相違曰且旋恁地做去只是如今且說箇熟字這熟字如何便得到這地位到得熟地位自有忽然不可知處不是被你硬要得直是不知不覺得如此賀孫國秀問向曾問身心性情之德蒙批誨云云宋傑竊於自己省驗見得此心未發時其仁義禮智之體渾然未有區別於此敬而無失則發而為惻隱羞惡辭遜是非之情自有條理而不亂如此體認不知是否曰未須說那敬而無失與未有區別及自有條理而不亂在且要識認得這身心性情之德是甚底模樣說未有區別亦如何得雖是未發時無所分別然亦不可不有所分別蓋仁自有一箇仁底模樣物事在內義自有箇義底模樣物事在內禮智皆然今要就發處認得在裏面物事是甚模樣故發而為惻隱必要認得惻隱之根在裏面是甚底物事發而為羞惡必要認得羞惡之根在裏面是甚底物事禮智亦如之譬如木有四枝雖只一箇大根然必有四根一枝必有一根也又問宋傑尋常覺得資質昏愚但持敬則此心虛靜覺得好若敬心稍不存則裏面固是昏雜而發於外亦鶻突所以專於敬而無失上用功曰這裏未消說敬與不敬在蓋敬是第二節事而今便把來夾雜說則鶻突了愈難理會且只要識得那一是一二是二便是虛靜也要識得這物事不虛靜也要識得這物事如未識得這物事時則所謂虛靜亦是箇黑底虛靜不是箇白底虛靜而今須是要打破那黑底虛靜換做箇白底虛靜則八窗玲瓏無不融通不然則守定那裏底虛靜終身黑淬淬地莫之通曉也燾問先生答余國秀云須理會得其性情之德曰須知那箇是仁義禮智之性那箇是惻隱羞惡恭敬是非之情始得問且如與人相揖便要知得禮數合當如此不然則行矣而不著習矣而不察曰常常恁地覺得則所行也不會大段差舛胡泳用之舉似先生向日曾答蔡丈書承喻以禮為先之說又似識造化之云不免倚於一物未知親切工夫耳大抵濂溪說得的當通書中數數拈出幾字要當如此瞥地即自然有箇省力處無規矩中卻有規矩未造化時已有造化此意如何曰幾固要得且於日用處省察善便存放這裏惡便去而不為便是自家切己處古人禮儀都是自少理會了只如今人低躬唱喏自然習慣今既不可考而今人去理會合下便別將做一箇大頭項又不道且理會切身處直是要理會古人因革一副當將許多精神都枉耗了元未切自家身己在又曰只有大學教人致知格物底便是就這處理會到意誠心正處展開去自然大若便要去理會甚造化先將這心弄得大了少間都沒物事說得滿賀孫林仲參問下學之要受用處曰潑底椅桌在屋下坐便是受用若貪慕外面高山曲水便不是受用底舉詩云貧家淨掃地貧女好梳頭下士晚聞道聊以拙自修前人只恁地說了銖劉淮求教曰某無別法只是將聖賢之書虛心下氣以讀之且看這箇是那箇不是待得一回推出一回新便是進處不然只是外面事只管做出去不見裏滋味如何責得他趙恭父再見問別後讀書如何曰近覺得意思卻不甚迫切曰若只恁地據見定做工夫卻又有苟且之病去曰安敢苟且曰既不迫切便相將向這邊來又不可不察又問切己工夫如何愈見得己私難勝曰這箇也不須苦苦與他為敵但才覺得此心隨這物事去便與他喚回來便都沒事謂南城熊曰聖賢語言只似常俗人說話如今須是把得聖賢言語湊得成常俗言語方是不要引東引西若說這句未通又引那句終久兩下都理會不得若這句已通次第到那句自解通銖看文字不可過於疏亦不可過於密如陳德本有過於疏之病楊志仁有過於密之病蓋太謹密則少間看道理從那窮處去更插不入不若且放下放開闊看燾器之看文字見得快叔蒙亦看得好與前不同賀孫許敬之侍教屢與言不合曰學未曉理亦無害說經未得其意亦無害且須靜聽說話尋其語脈是如何一向強辨全不聽所說胸中殊無主宰少間只成箇狂妄人去淳淳叟問方讀書時覺得無靜底工夫須有讀書之時有虛靜之時曰某舊見李先生嘗教令靜坐後來看得不然只是一箇敬字好方無事時敬於自持凡心不可放入無何有之鄉須收斂在此及應事時敬於應事讀書時敬於讀書便自然該貫動靜心無時不存德明先生見劉淳叟閉目坐曰淳叟待要遺物物本不可遺大雅坐間有及劉淳叟事曰不意其變常至此某向往奏事時來相見極口說陸子靜之學大謬某因詰之云若子靜學術自當付之公論公如何得如此說他此亦見他質薄處然其初間深信之畢竟自家喚做不知人賀孫辨姦論謂事之不近人情者鮮不為大姦慝每常嫌此句過當今見得亦有此樣人某向年過江西與子壽對語而劉淳叟堯夫獨去後面角頭坐都不管學道家打坐被某罵云便是某與陸丈言不足聽亦有數年之長何故恁地作怪義剛因論劉淳叟事云添差倅亦可以為論治三吏事云漕自來為之亦好不然委別了事人淳叟自為太掀揭故生事因論今趙帥可語鹽弊何不一言云某如何敢與大率以沉審為是出位為戒振陳寅仲問劉淳叟曰劉淳叟方其做工夫時也過於陳正己及其狼狽也甚於陳正己陳正己輕薄向到那裏覺得他意思大段輕薄每事只說道他底是他資質本自撈攘後來又去合那陳同父兼是伯恭教他時只是教他權數了伯恭教人不知是怎生地至此笑云向前見他們人有箇祭文云其有能底則教他立功名作文章其無能底便語他正心誠意義剛先生說陳正己薛象先喜之者何事賀孫云想是喜其有才汪長孺謂併無其才全做事不成曰叔權謂長孺他日觀氣質之變以驗進退之淺深此說最好大凡人須是子細沉靜大學謂知止而後有定定而後能靜靜而後能安安而後能慮慮而後能得如一件物事自家知得未曾到這裏所見未曾定以無定之見遂要決斷此事如何斷得盡一件物事有長有短自家須實見得他那處是長那處是短如今便一定把著他短處便一齊沒他長處若只如此少間一齊不通禮記云疑事毋質直而勿有看古人都是恁地不敢草草周先生所以有主靜之說如蒙艮二卦皆有靜止之體洪範五事聽曰聰聰作謀謀屬金金有靜密意思人之為謀亦欲靜密貌曰恭恭作肅肅屬水水有細潤意思人之舉動亦欲細潤聖人所以為聖人只是動靜不失其時時止則止時行則行聖人這般所在直是則得好自家先恁地浮躁如何要發得中節做事便事事做不成說人則不曾說得著實又曰老子之術自有退後一著事也不攙前去做說也不曾說將出但任你做得狼狽了自家徐出以應之如人當紛爭之際自去僻靜處坐任其如何彼之利害長短一一都冷看破了從旁下一著定是的當此固是不好底術數然較之今者浮躁胡說亂道底人彼又較勝因舉老子語豫兮若冬涉川猶兮若畏四鄰儼若客渙若冰將釋子房深於老子之學曹參學之有體而無用賀孫問姜叔權自言終日無思慮有寂然不動之意德輔疑其已至曰且問他還能感而遂通天下之故否須是窮理若只如此則不須說格物致知問如此則叔權之靜未是至曰固是德輔戴明伯請教曰且將一件書讀聖人之言即聖人之心聖人之心即天下之理且逐段看令分曉一段分曉又看一段如此至一二十段亦未解便見箇道理但如此心平氣定不東馳西騖則道理自逐旋分明去得自家心上一病便是一箇道理明也道理固是自家本有但如今隔一隔了須逐旋揩磨呼喚得歸然無一喚便見之理如金溪只要自得若自得底是固善若自得底非卻如何不若且虛心讀書讀書切不可自謂理會得了便理會得且只做理會不得某見說不會底便有長進不長進者多是自謂已理會得了底如此則非特終身不長進便假如釋氏三生十六劫也終理會不得又云此心先錯用向東去及至喚回西邊又也只是那向東底心但只列轉些頓放元不曾改換有一學者先佞佛日逐念金剛大悲咒不停口後來雖不念佛來誦大學論孟卻依舊趕遍數荒荒忙忙誦過此亦只是將念大悲咒時意思移來念儒書爾必大括蒼徐元明名琳鄭子上同見先生說博學而詳說之將以反說約也今江西諸人之學只是要約更不務博本來雖有些好處臨事盡是鑿空杜撰至於呂子約又一向務博而不能反約讀得書多左牽右撰橫說直說皆是此理只是不潔淨不切要有牽合無謂處沈叔晦不讀書不教人只是所守者淺狹只有些子道理便守定了亦不博之弊璘陸深甫問為學次序曰公家庭尊長平日所以教公者如何陸云刪定叔祖所以見教者謂此心本無虧缺人須見得此心方可為學曰此心固是無虧缺然須是事事做得是方無虧缺若只說道本無虧缺只見得這箇便了豈有是理因說江西學者自以為得陸刪定之學便高談大論略無忌憚忽一日自以為悟道明日與人飲酒如法罵人某謂賈誼云秦二世今日即位而明日射人今江西學者乃今日悟道而明日罵人不知所修者果何道哉時舉包詳道書來言自壬子九月一省之後云云先生謂顯道曰人心存亡之決只在出入息之間豈有截自今日今時便鬼亂已後便悄悄之理聖賢之學是掯掯定定做不知不覺自然做得徹若如所言則是聖賢修為講學都不須得只等得一旦恍然悟去如此者起人僥幸之心義剛看孫吉甫書見得是要做文字底氣習且如兩漢晉宋隋唐風俗何嘗有箇人要如此變來只是其風俗之變滾來滾去自然如此漢末名節之極便變作清虛底道理到得陳隋以後都不理會名節也不理會清虛只是相與做一般纖艷底文字君臣之間把這文字做一件大事理會如進士舉是隋煬帝做出來至唐三百年以至國初皆是崇尚文辭鄭子上問風俗滾來滾去如何到本朝程先生出來便理會發明得聖賢道理曰周子二程說得道理如此亦是上面諸公挪趲將來當楊劉時只是理會文字到范文正孫明復石守道李太伯常夷甫諸人漸漸刊落枝葉務去理會政事思學問見於用處及胡安定出又教人作治道齊理會政事漸漸挪得近裏所以周程發明道理出來非一人之力也璘先生謂杜叔高曰學貴適用先生謂魯可幾曰事不要察取盡道夫或問徐子顏曰其人有守但未知所見如何文蔚今學者有兩樣意思鈍底又不能得他理會得到得意思快捷底雖能當下曉得然又恐其不牢固如龔郯伯理會也快但恐其不牢固賀孫先生問郭廷碩今如何曰也只如舊為學曰賢江西人樂善者多知學者少又說楊誠齊廉介清潔直是少謝尚書和易寬厚也煞朴直昔過湘中時曾到謝公之家頽然在敗屋之下全無一點富貴氣也難得又曰聞彭子壽造居甚大何必如此又及一二人曰以此觀謝尚書直是朴實祖道先生問湘鄉舊有從南軒遊者為誰佐對以周奭允升佐外舅舒誼周臣外舅沒已數歲南軒答其論知言疑義一書載文集中允升藏修之所正枕江上南軒題曰漣溪書室鄉曲後學講習其間但允升今病不能出矣先生曰南軒向在靜江曾得書甚稱說允升所見必別安得其一來次第送少藥物與之佐直卿告先生以趙友裕復有相招之意先生曰看今世務已自沒可奈何只得隨處與人說得識道理人多亦是幸事賀孫呂德遠辭云將娶擬某日歸及期其兄云與舍弟商量了且更承教一月卻歸曰公將娶了如何又恁地說此大事不可恁地宅中想都安排了須在等待不可如此了即日歸義剛季繹勸蔡季通酒止其泉南之行蔡決於先生先生笑而不答良久云身勞而心安者為之利少而義多者為之人傑廣録云或有所欲為謀於先生曰心佚而身勞為之利少而義多為之先生看糊窗云有些子不齊整便不是他道理朱季繹云要好看卻從外糊直卿云此自欺之端也賀孫
