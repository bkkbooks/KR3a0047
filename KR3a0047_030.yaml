body:
  text: 朱子語類卷第三十論語十二雍也篇一雍也可使南面章問寬洪簡重是說仲弓資質恁地曰夫子既許它南面則須是有人君之度意其必是如此這又無稽考須是更將它言行去看如何義剛問雍也可使南面伊川曰仲弓才德可使為政也尹氏曰南面謂可使為政也第一章凡五說今從伊川尹氏之說范氏曰仲弓可以為諸侯似不必指諸侯為南面不如為政卻渾全謝氏曰仁而不佞其才宜如此楊氏亦曰雍也仁矣據仁而不佞乃或人之問夫子曰不知其仁則與未知焉得仁之語同謂仲弓為仁矣不知兩說何所據恐仁字聖人未嘗輕許人曰南面者人君聽政之位言仲弓德度簡嚴宜居位不知其仁故未以仁許之然謂仲弓未仁即下語太重矣榦仲弓問子桑伯子章仲弓見聖人稱之故因問子桑伯子如何想見仲弓平日也疑這人故因而發問夫子所謂可也者亦是連上面意思說也仲弓謂居敬而行簡固是居敬後自然能簡然亦有居敬而不行簡者蓋居敬則凡事嚴肅卻要亦以此去律事凡事都要如此此便是居敬而不行簡也時舉仲弓為人簡重見夫子許其可以南面故以子桑伯子亦是一箇簡底人來問孔子看如何夫子云此人亦可者以其簡也然可乃僅可而有未盡之辭故仲弓乃言居敬行簡夫子以為然南行夫問子桑伯子曰行簡只就臨民上說此段若不得仲弓下面更問一問人只道可也簡便道了也是利害故夫子復之曰雍之言然這亦見仲弓地步煞高是有可使南面之基亦見得他深沉詳密處論來簡已是好資稟較之繁苛瑣細使人難事亦煞不同然是居敬以行之方好賀孫問居敬行簡之居如居室之居先生應復問何謂簡曰簡是凡事據見定又曰簡靜復問簡者不煩之謂何謂煩曰煩是煩擾又曰居敬是所守正而行之以簡節居敬行簡是兩件工夫若謂居敬則所行自簡則有偏於居敬之意人傑問居敬而行簡曰這箇是兩件工夫如公所言則只是居敬了自然心虛理明所行自簡這箇只說得一邊居敬固是心虛心虛固能理明推著去固是如此然如何會居敬了便自得他理明更有幾多工夫在若如此說則居敬行簡底又那裏得來如此則子桑伯子大故是箇居敬之人矣世間有那居敬而所行不簡如上蔡說呂進伯是箇好人極至誠只是煩擾便是請客也須臨時兩三番換食次又自有這般人又有不能居敬而所行卻簡易者每事不能勞攘得只從簡徑處行如曹參之治齊專尚清靜及至為相每日酣飲不事事隔牆小吏酣歌叫呼參亦酣飲歌呼以應之何有於居敬耶據仲弓之言自是兩事須子細看始得又曰須是兩頭盡不只偏做一頭如云內外不只是盡其內而不用盡其外如云本末不只是致力於本而不務乎其末居敬了又要行簡聖人教人為學皆如此不只偏說一邊僩問注言自處以敬則中有所主而自治嚴程子曰居敬則心中無物故所行自簡二說不相礙否先生問如何曰看集注是就本文說伊川就居簡處發意曰伊川說有未盡宇集注胡問何謂行簡曰所行處簡要不恁煩碎居上煩碎則在下者如何奉承得故曰臨下以簡須是簡程子謂敬則自然簡只說得敬中有簡底人亦有人自處以敬而所行不簡卻說不及聖人所以曰居敬曰行簡二者須要周盡淳居敬行簡是有本領底簡居簡行簡是無本領底簡程子曰居敬則所行自簡此是程子之意非仲弓本意也人傑胡叔器問居敬則心中無物而所行自簡此說如何曰據某看居敬而行簡以臨其民它說而行簡以臨民則行簡自是一項這而字是別喚起今固有居敬底人把得忒重卻反行得煩碎底今說道居敬則所行自簡恐卻無此意臨下以簡御眾以寬簡自別是一項只是揀那緊要底來行又問看簡字也有兩樣曰只是這箇簡豈有兩樣又曰看它諸公所論只是爭箇敬字義剛叔器問集注何不全用程說曰程子只說得一邊只是說得敬中有簡底意思也是如此但亦有敬而不簡者某所以不敢全依它說不簡底自是煩碎下面人難為奉承御眾以寬臨下以簡便是簡時下面人也易為奉承自不煩擾聖人所以說居敬行簡二者須是兩盡義剛問敬是就心上說簡是就事上說否曰簡也是就心上做出來而今行簡須是心裏安排後去行豈有不是心做出來義剛問居敬則內直內直則外自方居敬而行簡亦猶內直而外方歟若居簡而行簡則是喜靜惡動怕事苟安之人矣曰程子說居敬而行簡只作一事今看將來恐是兩事居敬是自處以敬行簡是所行得要廣問伊川說居敬則心中無物而自簡意覺不同曰是有些子差但此說自不相害若果能居敬則理明心定自是簡這說如一箇物相似內外都貫通行簡是外面說居敬自簡又就裏面說看這般所在固要知得與本文少異又要知得與本文全不相妨賀孫問仲弓問子桑伯子章伊川曰內主於敬而簡則為要直內存乎簡則為疏略仲弓可謂知旨者但下文曰子桑伯子之簡雖可取而未盡善故夫子云可也恐未必如此可也簡止以其簡為可爾想其他有未盡善特有簡可取故曰可也游氏曰子桑伯子之可也以其簡若主之以敬而行之則簡為善楊氏曰子桑伯子為聖人之所可者以其簡也夫主一之謂敬居敬則其行自簡但下文簡而廉一句舉不甚切今從伊川游氏楊氏之說伊川第二第三說皆曰居簡行簡乃所以不簡先有心於簡則多卻一簡恐推說太過既曰疏略則太簡可知不必云多卻一簡如所謂乃所以不簡皆太過范氏曰敬以直內簡以臨人故堯舜修己以敬而臨下以簡恐敬簡不可太分說居字只訓主字若以為主之敬而行之簡則可以為居則敬而行則簡則不可若云修己臨下則恐分了仲弓不應下文又總說以臨其民也又曰子桑伯子其處己亦若待人據夫子所謂可也簡乃指子桑伯子說仲弓之言乃發明簡字恐非以子桑伯子為居簡行簡也尹氏亦曰以其居簡故曰可也亦范氏之意呂氏以為引此章以證前章之說謝氏以為因前章以發此章之問皆是旁說然於正說亦無妨謝氏又曰居敬而行簡舉其大而略其細於敬字上不甚切不如楊氏作主一而簡自見曰可也簡當從伊川說剩卻一簡字正是解太簡之意乃所以不簡之說若解文義則誠有剩語若以理觀之恐亦不為過也范固有不密處然敬簡自是兩事以伊川語思之可見據此文及家語所載伯子為人亦誠有太簡之病謝氏因上章而發明之說是榦徒務行簡老子是也乃所以為不簡子桑伯子或以為子桑戶升卿哀公問弟子章問聖人稱顏子好學特舉不遷怒不貳過二事若不相類何也聖人因見其有此二事故從而稱之柄謂喜怒發於當然者人情之不可無者也但不可為其所動耳過失則不當然而然者既知其非則不可萌於再所謂頻復之吝也二者若不相類而其向背實相對曰聖人雖未必有此意但能如此看亦好柄顏子自無怒因物之可怒而怒之又安得遷問不遷怒此是顏子與聖人同處否曰聖人固是不遷怒然不遷字在聖人分上說便小在顏子分上說便大蓋聖人合下自是無那遷了不著說不遷才說似猶有商量在若堯舜則無商量了是無了何遷之有何不遷之有燾內有私意而至於遷怒者志動氣也有為怒氣所動而遷者氣動志也伯恭謂不獨遷於他人為遷就其人而益之便是遷此卻是不中節非遷也道夫不遷怒不貳過據此之語怒與過自不同怒卻在那不遷上過才說是過便是不好矣僩或問顏子不貳過曰過只是過不要問他是念慮之過與形見之過只消看他不貳處既能不貳便有甚大底罪過也自消磨了時舉問不遷怒不貳過曰重處不在怒與過上只在不遷不貳上今不必問過之大小怒之深淺只不遷不貳是甚力量便見工夫佛家所謂放下屠刀立地成佛若有過能不貳直是難貳如貳官之貳已有一箇又添一箇也又問守之也非化之也曰聖人則都無這箇顏子則疑於遷貳與不遷貳之間賜祖道錄云貳不是一二是長貳之貳餘同尋常解不貳過多只說過字不曾說不貳字所謂不貳者有不善未嘗不知知之未嘗復行也如顏子之克己既克己私便更不萌作矣人傑不遷怒不貳過一以為克己之初一以為用功之處曰自非禮勿視聽言動積習之久自見這箇意思夔孫問學顏子當自不遷怒不貳過起曰不然此是學已成處又問如此當自四勿起曰是程子云顏子事斯語所以至於聖人後之學者宜服膺而勿失也過不遷不貳非言用功處言顏子到此地位有是效驗耳若夫所以不遷不貳之功不出於非禮勿視勿聽勿言勿動四句耳伯羽謨錄云此平日克己工夫持養純熟故有此效行夫問不遷怒不貳過曰此是顏子好學之符驗如此卻不是只學此二件事顏子學處專在非禮勿視聽言動上至此純熟乃能如此時舉賀孫錄云行夫問云云曰不遷怒不貳過不是學自是說顏子一箇證驗如此恭父云顏子工夫盡在克己復禮上曰回雖不敏請事斯語矣是他終身受用只在這上問不遷怒貳過是顏子克己工夫到後方如此卻不是以此方為克己工夫也曰夫子說時也只從他克己效驗上說但克己工夫未到時也須照管不成道我工夫未到那田地而遷怒貳過只聽之耶義剛或問顏子工夫只在克己上不遷不貳乃是克己效驗或曰不遷不貳亦見得克己工夫即在其中曰固是然克己亦非一端如喜怒哀樂皆當克但怒是粗而易見者耳或曰顏子平日但知克己而已不遷不貳是聖人見得他效驗如此曰但看克己復禮自見得問不遷怒是見得理明不貳過是誠意否曰此二者拆開不得須是橫看他這箇是層層趲上去一層了又一層不遷怒不貳過是工夫到處又曰顏子只是得孔子說克己復禮終身受用只是這四箇字不違仁也只是這箇不遷怒不貳過也只是這箇不改其樂也只是這箇克己復禮到得人欲盡天理明無些渣滓一齊透徹日用之間都是這道理賀孫問不遷不貳此是顏子十分熟了如此否曰這是夫子稱他是他終身到處問若非禮勿視聽言動這是克己工夫這工夫在前分外著力與不遷不貳意思不同曰非禮勿視聽言動是夫子告顏子教他做工夫要知緊要工夫卻只在這上如無伐善無施勞是他到處不遷怒不貳過也是他到處問就不遷不貳上看也似有些淺深曰這如何淺深曰不遷怒是自然如此不貳過是略有過差警覺了方會不復行曰這不必如此看只看他不遷怒不貳過時心下如何賀孫又云看文字且須平帖看他意緣他意思本自平帖如夜來說不遷怒不貳過且看不遷不貳是如何顏子到這裏直是渾然更無些子渣滓不遷怒如鏡懸水止不貳過如冰消凍釋如三月不違又是已前事到這裏已自渾淪都是道理是甚次第問過容是指已前底說否曰然問過是逐事上見得如何曰固是逐事上見也不是今日有這一件不是此後更不做明日又是那一件不是此後更不做只顏子地位高纔見一不善不為這一番改時其餘是這一套須頓消了當那時須頓進一番他聞一知十觸處貫通他覺得這一件過其餘若有千頭萬緒是這一番一齊打併掃斷了曰如此看不貳過方始見得是三月不違以後事曰只這工夫原頭卻在非禮勿視非禮勿聽非禮勿言非禮勿動上面若是不遷怒時更無形跡但初學如何須要教他不遷怒不貳過得這也便要如此不得只是克己工夫孔子不以告其他門人卻獨以告顏子可見是難事不是顏子擔當不得這事其他人也只逐處教理會道無古今且只將克己事時時就身己檢察下梢也便會到不遷怒不貳過地位是亦顏子而已須是子細體認他工夫是如何然後看他氣象是如何方看他所到地位是如何如今要緊只是箇分別是非一心之中便有是有非言語便有是有非動作便有是有非以至於應接賓朋看文字都有是有非須著分別教無些子不分曉始得心中思慮纔起便須是見得那箇是是那箇是非才去動作行事也須便見得那箇是是那箇是非應接朋友交遊也須便見得那箇是是那箇是非看文字須便見得那箇是是那箇是非日用之間若此等類須是分別教盡毫釐必計始得孔子曰三人行必有我師焉擇其善者而從之其不善者而改之且如今見人行事聽人言語便須著分別箇是非若是他做不是說不是雖不可誦言之自家是非須先明諸心始得若只管恁地鶻突不分別少間一齊都滾做不好處去都不解知孟子亦說道我知言詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮這不是分別得分明如何得胸次恁地瞭然天下只是箇分別是非若見得這箇分明任你千方百計胡說亂道都著退聽緣這箇是道理端的著如此如一段文字纔看也便要知是非若是七分是還他七分是三分不是還他三分不是如公鄉里議論只是要酌中這只是自家不曾見得道理分明這箇似是那箇也似是且捏合做一片且恁地過若是自家見得是非分明看他千度萬態都無遯形如天下分裂之時東邊稱王西邊稱帝似若不復可一若有箇真主出來一齊即見退聽不朝者來朝不服者歸服不貢者入貢如太祖之興所謂劉李孟錢終皆受併天下混一如今道理箇箇說一樣各家自守以為是只是未得見這公共道理是非前日曾說見道理不明如居天下之廣居立天下之正位行天下之大道是大丈夫若後車千乘傳食諸侯喚做大丈夫也得問是非本吾心之固有而萬物萬事是非之理莫不各具所以是非不明者只緣本心先蔽了曰固是若知得事物上是非分明便是自家心下是非分明程先生所以說纔明彼即曉此自家心下合有許多道理事物上面各各也有許多道理無古今無先後所以說先聖後聖其揆則一下又說道若合符節如何得恁地只緣道理只是一箇道理一念之初千事萬事究竟於此若能先明諸心看事物如何來只應副將去如尺度如權衡設在這裏看甚麼物事來長底短底小底大底只稱量將去可使不差毫釐世上許多要說道理各家理會得是非分明少間事跡雖不一一相合於道理卻無差錯一齊都得如此豈不甚好這箇便是真同只如今諸公都不識所謂真同各家只理會得半截便道是了做事都不敢盡且只消做四五分這邊也不說那邊不是那邊也不說這邊不是且得人情不相惡且得相和同這如何會好此乃所以為不同只是要得各家道理分明也不是易須是常常檢點事事物物要分別教十分分明是非之間有些子鶻突也不得只管會恁地這道理自然分明分別愈精則處事愈當故書曰惟精惟一允執厥中堯舜禹數聖人出治天下是多多少少事到末後相傳之要卻只在這裏只是這箇精一直是難賀孫問前夜承教以不遷怒不貳過乃顏子極至處又在三月不違仁之後據賀孫看若不貳是逐事不貳不是體統說而三月不違乃是統說前後淺深殊有未曉曰不須泥這般所在某那夜是偶然說如此實亦不見得甚淺深只一箇是死後說一箇是在生時說讀書且要理會要緊處如某舊時專揀切身要緊處理會若偏旁有窒礙處只恁地且放下如看這一章只認取不遷怒不貳過意思是如何自家合如何便是會做工夫如射箭要中紅心他貼上面煞有許多圈子善射者不須問他外面圈子是白底是黑底是朱底只是一心直要中紅心始得不貳過不須看他已前只看他不貳後氣象顏子固是於念慮處少差輒改而今學者未到顏子地位只須逐事上檢點過也不論顯微如大雷雨也是雨些子雨也是雨無大小都喚做過只是晴明時節青天白日便無些子雲翳這是甚麼氣象賀孫問顏子能克己不貳過何為三月之外有違仁處曰孔子言其有不善未嘗不知便須亦有不善時又問顏子之過如何曰伊川復卦所言自好未到不勉而中不思而得猶常用力便是心有未順處只但有纖毫用意處便是顏子之過敬之問顏子不遷怒不貳過莫只是靜後能如此否曰聖賢之意不如此如今卒然有箇可怒底事在眼前不成說且教我去靜蓋顏子只是見得箇道理透故怒於甲時雖欲遷於乙亦不可得而遷也見得道理透則既知有過自不復然如人錯喫烏喙才覺了自不復喫若專守虛靜此乃釋老之謬學將來和怒也無了此成甚道理聖賢當怒自怒但不遷耳見得道理透自不遷不貳所以伊川謂顏子之學必先明諸心知所往然後力行以求至蓋欲見得此道理透也立之因問明道云能於怒時遽忘其怒而觀理之是非又是怎生曰此是明道為學者理未甚明底說言於怒時且權停閣這怒而觀理之是非少間自然見得當怒不當怒蓋怒氣易發難制如水之澎漲能權停閣這怒則如水漸漸歸港若顏子分上不消恁地說只見得理明自不遷不貳矣時舉賀孫錄別出敬之問不遷怒不貳過顏子多是靜處做工夫曰不然此正是交滾頭顏子此處無他只是看得道理分明且如當怒而怒到不當怒處要遷自不得不是處便見得自是不會貳敬之又問顏子深潛純粹所謂不遷不貳特其應事之陳跡曰若如此說當這時節此心須別有一處安頓著看公意只道是不應事接物方存得此心不知聖人教人多是於動處說如云出門如見大賓使民如承大祭又如告顏子克己復禮為仁正是於視聽言動處理會公意思只是要靜將心頓於黑卒卒地說道只於此處做工夫這不成道理此卻是佛家之說佛家高底也不如此此是一等低下底如此這道理不是如此人固有初學未有執守應事紛雜暫於靜處少息也只是略如此然做箇人事至便著應如何事至且說道待自家去靜處當怒即怒當喜即喜更無定時只當於此警省如何是合理如何是不合理如何要將心頓放在閑處得事父母便有事父母許多酬酢出外應接便有出外許多酬酢賀孫問顏子不遷怒先生因語余先生宋傑云怒是箇難克治底所謂怒逆德也雖聖人之怒亦是箇不好底事物蓋是惡氣感得恁地某尋常怒多極長如公性寬怒少亦是資質好處壽問今也則亡未聞好學覺語意上句重下句寬恐有引進後人意否曰看文字且要將他正意平直看去只要見得正道理貫通不須滯在這般所在這兩句意只同與哀公言亦未有引進後學意要緊只在不遷怒不貳過六字上看道理要得他如水相似只要他平直滔滔流去若去看偏旁處如水流時這邊壅一堆泥那邊壅一堆沙這水便不得條直流去看文字且把著要緊處平直看教通徹十分純熟見得道理如人一身從前面直望見背後從背直望見前面更無些子遮蔽方好賀孫問集注怒不在血氣則不遷只是不為血氣所動否曰固是因舉公廳斷人而自家元不動又曰只是心平植集注問不貳過乃是略有便止如韓退之說不二之於言行卻粗了曰自是文義不如此又問不貳過卻有過在不遷怒已至聖人只此一事到曰纔云不遷則於聖人之怒亦有些異曰如此則程先生引舜且借而言曰然可學問伊川謂顏子地位豈有不善所謂不善只是微有差失曰如今學者且理會不遷不貳便大過不貳也難儒用問不貳過集注云過於前者不復於後則是言形見之過伊川乃云如顏子地位豈有不善所謂不善只是微有差失纔差失便能知之纔知之便更不萌作又似言念慮之過不知當如何看先生曰不必問是念慮之過與形見之過但過不可貳耳時舉陳後之問顏子不遷怒伊川說得太高渾淪是箇無怒了不貳過又卻低曰喜怒哀樂發而皆中節天下之達道那裏有無怒底聖人只聖人分上著不遷字不得顏子不遷怒便尚在夾界處如曰不改其樂然曰不貳過只是此過不會再生否曰只是不萌於再淳問黎兄疑張子謂慊於己者不使萌於再云夫子只說知之未嘗復行不是說其過再萌於心廣疑張子之言尤加精密至程子說更不萌作則兼說行字矣曰萌作亦只是萌動蓋孔子且恁大體說至程子張子又要人會得分曉故復如此說到精極處只管如此分別便是他不會看枉了心力廣士毅錄云程子張子怕後人小看了故復說到精極處其實則一問顏子不遷怒不貳過曰看程先生顏子所好何學論說得條理只依此學便可以終其身也立之因問先生前此云不遷怒貳過是克己復禮底效驗今又以為學即在此何也曰為學是總說克己復禮又是所學之目也又云天理人欲相為消長克得人欲乃能復禮顏子之學只在這上理會仲弓從莊敬持養處做去到透徹時也則一般時舉問曾子為學工夫比之顏子如何曰曾子只是箇守大抵人若能守得定不令走作必須透徹時舉云看來曾子所守極是至約只如守一箇孝字便後來無往而不通所謂推而放諸四海而準與夫居敬戰陣無不見得是這道理曰孝者百行之源只為他包得闊故也時舉蔡元思問好學論似多頭項曰伊川文字都如此多頭項不恁纏去其實只是一意如易傳包荒便用馮河不遐遺便朋亡意只是如此他成四項起不恁纏說此論須做一意纏看其本也真而靜是說未發真便是不雜無人偽靜便是未感覺者約其情使合於中正其心養其性方是大綱說學之道必先明諸心知所往然後力行以求至便是詳此意一本作知所養恐往字為是往與行字相應淳問天地儲精如何是儲精曰儲謂儲蓄天地儲蓄得二氣之精聚故能生出萬物廣問何為儲精曰儲儲蓄精精氣精氣流通若生物時闌定本是本體真是不雜人偽靜是未發復問上既言靜下文又言未發何也曰疊這一句復問下文明諸心知所養一本作知所往孰是曰知所往是應得力行求至節氣散則不生惟能住便生消息是消住了息便生因說天地儲精及此士毅得五行之秀者為人只說五行而不言陰陽者蓋做這人須是五行方做得成然陰陽便在五行中所以周子云五行一陰陽也舍五行無別討陰陽處如甲乙屬木甲便是陽乙便是陰丙丁屬火丙便是陽丁便是陰不須更說陰陽而陰陽在其中矣或曰如言四時而不言寒暑耳曰然僩其本也真而靜其未發也五性具焉五性便是真未發時便是靜只是疊說僩問程子云情既熾而益蕩其性鑿矣性上如何說鑿曰性固不可鑿但人不循此理任意妄作去傷了他耳鑿與孟子所謂鑿一般故孟子只說養其性養謂順之而不害廣問顏子之所學者蓋人之有生五常之性渾然一心之中未感物之時寂然不動而已而不能不感於物於是喜怒哀樂七情出焉既發而易縱其性始鑿故顏子之學見得此理分明必欲約其情以合於中剛決以克其私私欲既去天理自明故此心虛靜隨感而應或有所怒因彼之可怒而怒之而己無與焉怒才過而此心又復寂然何遷移之有所謂過者只是微有差失張子謂之慊於己只是略有些子不足於心便自知之即隨手消除更不復萌作為學工夫如此可謂真好學矣曰所謂學者只是學此而已伊川所謂性其情大學所謂明明德中庸所謂天命之謂性皆是此理南升明諸心知所往窮理之事也力行求至踐履之事也窮理非是專要明在外之理如何而為孝弟如何而為忠信推此類通之求處至當即窮理之事也人傑聖人無怒何待於不遷聖人無過何待於不貳所以不遷不貳者猶有意存焉與願無伐善無施勞之意同猶今人所謂願得不如此是固嘗如此而今且得其不如此也此所謂守之非化之也人傑文振再說顏子好學一章因說程先生所作好學論曰此是程子二十歲時已做得這文好這箇說話便是所以為學之本惟知所本然後可以為學若不去大本上理會只恁地茫茫然卻要去文字上求恐也未得時舉伊川文字多有句相倚處如顏子好學論可學問顏子短命是氣使然劉質夫所錄一段又別曰大綱如此說可學按此條集義在先進篇章問呂與叔引橫渠說解遷怒事又以三月不違為氣不能守恐是張子呂氏皆是以己之氣質論聖人之言曰不須如此說如說這一段且只就這一段平看若更生枝節又外面討一箇意思橫看都是病人傑因曰須是這裏過一番既聞教誨可造平淡曰此說又是剩了人傑伊川曰顏子之怒在物不在己故不遷有不善未嘗不知知之未嘗復行不貳過也游氏曰不遷怒者怒適其可而止無溢怒之氣也傳所謂怒於室而色於市者遷其怒之甚也不遷怒則發而中節矣喜怒哀樂不能無也要之每發皆中節之為難耳不貳過者一念少差而覺之早不復見之行事也蓋惟聖人能寂然不動故無過顏子能非禮勿動而已故或有不善始萌于中而不及復行是其過在心而行不貳焉但其間正心修身之說若以不貳過作正心不遷怒作修身亦可恐不必如此右第三章凡八說今從伊川游氏之說伊川外五說大率相類其說皆正故不盡錄然亦不出第一說之意橫渠第一第二說皆曰怒於人者不使遷乎其身呂氏亦曰不使可怒之惡反遷諸己而為人之所怒此說恐未安如此只是不貳過之意聖人何以既曰不遷怒又曰不貳過若使惡不遷諸己則只說得不貳過又橫渠曰慊於己者不使萌於再萌字說太深不如游氏作行不貳伊川作未嘗復行乃正范氏曰不遷怒者性不移於怒也此說不可曉若謂性不移於怒而後能不遷怒卻穩與伊川怒不在己之說同若謂不遷怒則性不移於怒恐未當以移字訓遷字則說太深餘說亦寬謝氏曰不患有過蓋不害其為改其說又太淺顏子不應有過而後改特知之未嘗復行爾又與橫渠不萌之說相反皆為未當楊氏不放心之說無甚差但稍寬爾其他皆解得何止不放心而已又說今也則亡一句作無字說不知合訓無字合作死亡之亡若訓無字則與下句重若作死亡之亡則與上句重未知孰是尹氏用伊川說故不錄先生曰游說不貳過乃韓退之之意與伊川不同伊川意卻與橫渠同外書第五卷有一段正如此可更思之須見游氏說病處橫渠遷怒之說固未然然與貳過殊不相似亡即無也或當讀作無榦
