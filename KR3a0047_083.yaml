body:
  text: 朱子語類卷第八十三春秋綱領春秋煞有不可曉處泳人道春秋難曉據某理會來無難曉處只是據他有這箇事在據他載得恁地但是看今年有甚麼事明年有甚麼事禮樂征伐不知是自天子出自諸侯出自大夫出只是恁地而今卻要去一字半字上理會褒貶卻要去求聖人之意你如何知得他肚裏事義剛春秋大旨其可見者誅亂臣討賊子內中國外夷狄貴王賤伯而已未必如先儒所言字字有義也想孔子當時只是要備二三百年之事故取史文寫在這裏何嘗云某事用某法某事用某例邪且如書會盟侵伐大意不過見諸侯擅興自肆耳書郊禘大意不過見魯僭禮耳至如三卜四卜牛傷牛死是失禮之中又失禮也如不郊猶三望是不必望而猶望也如書仲遂卒猶繹是不必繹而猶繹也如此等義卻自分明近世如蘇子由呂居仁卻看得平閎祖春秋只是直載當時之事要見當時治亂興衰非是於一字上定褒貶初間王政不行天下都無統屬及五伯出來扶持方有統屬禮樂征伐自諸侯出到後來五伯又衰政自大夫出到孔子時皇帝王伯之道掃地故孔子作春秋據他事實寫在那裏教人見得當時事是如此安知用舊史與不用舊史今硬說那箇字是孔子文那箇字是舊史文如何驗得更聖人所書好惡自易見如葵丘之會召陵之師踐土之盟自是好本末自是別及後來五伯既衰湨梁之盟大夫亦出與諸侯之會這箇自是差異不好今要去一字兩字上討意思甚至以日月爵氏名字上皆寓褒貶如王人子突救衛自是衛當救當時是有箇子突孔子因存他名字今諸公解卻道王人本不書字緣其救衛故書字孟子說臣弒其君者有之子弒其父者有之孔子懼作春秋說得極是了又曰春秋無義戰彼善於此則有之矣此等皆看得地步闊聖人之意只是如此不解恁地細碎淳義剛録云某不敢似諸公道聖人是於一字半字上定去取聖人只是存得那事在要見當時治亂興衰見得其初王政不行天下皆無統屬及五伯出來如此扶持方有統屬恁地便見得天王都做主不起後同問春秋曰此是聖人據魯史以書其事使人自觀之以為鑒戒爾其事則齊威晉文有足稱其義則誅亂臣賊子若欲推求一字之間以為聖人褒善貶惡專在於是竊恐不是聖人之意如書即位者是魯君行即位之禮繼故不書即位者是不行即位之禮若威公之書即位則是威公自正其即位之禮耳其他崩薨卒葬亦無意義人傑春秋有書天王者有書王者此皆難曉或以為王不稱天貶之某謂若書天王其罪自見宰咺以為冢宰亦未敢信其他如莒去疾莒展輿齊陽生恐只據舊史文若謂添一箇字減一箇字便是褒貶某不敢信威公不書秋冬史闕文也或謂貶天王之失刑不成議論可謂亂道夫子平時稱顏子不遷怒不二過至作春秋卻因惡魯威而及天子可謂桑樹著刀榖樹汁出者魯威之弒天王之不能討罪惡自著何待於去秋冬而後見乎又如貶滕稱子而滕遂至於終春秋稱子豈有此理今朝廷立法降官者猶經赦敘復豈有因滕子之朝威遂併其子孫而降爵乎人傑春秋所書如某人為某事本據魯史舊文筆削而成今人看春秋必要謂某字譏某人如此則是孔子專任私意妄為褒貶孔子但據直書而善惡自著今若必要如此推說須是得魯史舊文參校筆削異同然後為可見而亦豈復可得也謨書人恐只是微者然朝非微者之禮而有書人者此類亦不可曉閎祖或有解春秋者專以日月為褒貶書時月則以為貶書日則以為褒穿鑿得全無義理若胡文定公所解乃是以義理穿鑿故可觀人傑世間人解經多是杜撰且如春秋只據赴告而書之孔子只因舊史而作春秋非有許多曲折且如書鄭忽與突事才書忽又書鄭忽又書鄭伯突胡文定便要說突有君國之德須要因鄭伯兩字上求他是處似此皆是杜撰大概自成襄已前舊史不全有舛逸故所記各有不同若昭哀已後皆聖人親見其事故記得其實不至於有遺處如何卻說聖人豫其爵削其爵賞其功罰其罪是甚說話祖道問孟子說春秋天子之事如何曰只是被孔子寫取在此人見者自有所畏懼耳若要說孔子去褒貶他去其爵與其爵賞其功罰其罪豈不是謬也其爵之有無與人之有功有罪孔子也豫奪他不得祖道人傑録云蘇子由解春秋謂其從赴告此說亦是既書鄭伯突又書鄭世子忽據史文而書耳定哀之時聖人親見據實而書隱威之世時既遠史冊亦有簡略處夫子亦但據史冊而寫出耳或說沈卿說春秋云不當以褒貶看聖人只備録是非使人自見如克段之書而兄弟之義自見如蔑之書而私盟之罪自見來賵仲子便自見得以天王之尊下賵諸侯之妾聖人以公平正大之心何嘗規規於褒貶曰只是中間不可以一例說自有曉不得處公且道如翬帥師之類是如何曰未賜族如挾柔無駭之類無駭魯卿隱二年書無駭九年書挾卒莊十一年書柔皆未命也到莊以後卻不待賜而諸侯自豫之曰便是這般所在那裏見得這箇是賜那箇是未賜三傳唯左氏近之或云左氏是楚左史倚相之後故載楚史較詳國語與左傳似出一手然國語使人厭看如齊楚吳越諸處又棈采如紀周魯自是無可說將虛文敷衍如說籍田等處令人厭看左氏必不解是丘明如聖人所稱煞是正直底人如左傳之文自有縱橫意思史記卻說左丘失明厥有國語或云左丘明左丘其姓也左傳自是左姓人作又如秦始有臘祭而左氏謂虞不臘矣是秦時文字分明賀孫春秋傳例多不可信聖人記事安有許多義例如書伐國惡諸侯之擅興書山崩地震螽蝗之類知災異有所自致也德明或論及春秋之凡例先生曰春秋之有例固矣奈何非夫子之為也昔嘗有人言及命格豫曰命格誰之所為乎曰善談五行者為之也豫曰然則何貴設若自天而降具言其為美為惡則誠可信矣今特出於人為烏可信也知此則知春秋之例矣又曰季子來歸以為季子之在魯不過有立僖之私恩耳初何有大功於魯又況通於成風與慶父之徒何異然則其歸也何足喜蓋以啓季氏之事而書之乎壯祖或人論春秋以為多有變例所以前後所書之法多有不同曰此烏可信聖人作春秋正欲褒善貶惡示萬世不易之法今乃忽用此說以誅人未幾又用此說以賞人使天下後世皆求之而莫識其意是乃後世弄法舞文之吏之所為也曾謂大中至正之道而如此乎壯祖張元德問春秋周禮疑難曰此等皆無佐證強說不得若穿鑿說出來便是侮聖言不如且研窮義理義理明則皆可遍通矣因曰看文字且先看明白易曉者此語是某發出來諸公可記取時舉以下看春秋法問春秋當如何看曰只如看史樣看曰程子所謂以傳考經之事跡以經別傳之真僞如何曰便是亦有不可考處曰其間不知是聖人果有褒貶否曰也見不得如許世子止嘗藥之類如何曰聖人亦只因國史所載而立之耳聖人光明正大不應以一二字加褒貶於人若如此屑屑求之恐非聖人之本意時舉看春秋且須看得一部左傳首尾意思通貫方能略見聖人筆削與當時事之大意時舉叔器問讀左傳法曰也只是平心看那事理事情事勢春秋十二公時各不同如隱威之時王室新東遷號令不行天下都星散無主莊僖之時威文迭伯政自諸侯出天下始有統一宣公之時楚莊王盛強夷狄主盟中國諸侯服齊者亦皆朝楚服晉者亦皆朝楚及成公之世悼公出來整頓一番楚始退去繼而吳越又強入來爭伯定哀之時政皆自大夫出魯有三家晉有六卿齊有田氏宋有華向被他肆意做終春秋之世更沒奈何但是某嘗說春秋之末與初年大不同然是時諸侯征戰只如戲樣亦無甚大殺戮及戰國七國爭雄那時便多是胡相殺如鴈門斬首四萬不知怎生殺了許多長平之戰四十萬人坑死不知如何有許多人後來項羽也坑十五萬不知他如何地掘那坑後那死底都不知當時不知如何地對副許多人安卿曰恐非掘坑曰是掘坑嘗見鄧艾伐蜀坑許多人載說是掘坑義剛春秋之書且据左氏當時天下大亂聖人且據實而書之其是非得失付諸後世公論蓋有言外之意若必於一字一辭之間求褒貶所在竊恐不然齊桓晉文所以有功於王室者蓋當時楚最強大時復加兵於鄭鄭則在王畿之內又伐陸渾之戎觀兵周疆其勢與六國不同蓋六國勢均力敵不敢先動楚在春秋時他國皆不及其強向非威文有以遏之則周室為其所并矣又諸侯不朝聘於周而周反下聘於列國是甚道理廣以下論左氏左氏之病是以成敗論是非而不本於義理之正嘗謂左氏是箇猾頭熟事趨炎附勢之人元城說左氏不識大體只是時時見得小可底事便以為是義剛因舉陳君舉說左傳曰左氏是一箇審利害之幾善避就底人所以其書有貶死節等事其間議論有極不是處如周鄭交質之類是何議論其曰宋宣公可謂知人矣立穆公其子饗之命以義夫只知有利害不知有義理此段不如穀梁說君子大居正卻是儒者議論某平生不敢說春秋若說時只是將胡文定說扶持說去畢竟去聖人千百年後如何知得聖人之心且如先蔑奔秦書則是貶先蔑不書時又不見得此事若如今人說教聖人如何書則是呂伯恭愛教人看左傳某謂不如教人看論孟伯恭云恐人去外面走某謂看論孟未走得三步看左傳底已走十百步了人若讀得左傳熟直是會趨利避害然世間利害如何被人趨避了君子只看道理合如何可則行不可則止禍福自有天命且如一箇善擇利害底人有一事自謂擇得十分利處了畢竟也須帶二三分害來自沒奈何仲舒云仁人正其誼不謀其利明其道不計其功一部左傳無此一句若人人擇利害後到得臨難死節底事更有誰做其間有為國殺身底人只是枉死了始得因舉可憐石頭城寧為袁粲死不作褚淵生蓋民之秉彝又自有不可埋沒自然發出來處璘可學録云天下事不可顧利害凡人做事多要趨利避害不知才有利必有害吾雖處得十分利有害隨在背後不如且就理上求之孟子曰如以利則枉尋直尺而利亦可為歟且如臨難致死義也若不明其理而顧利害則見危致命者反不如偷生苟免之人可憐石頭城寧為袁粲死不作褚淵生民之秉彝不可磨滅如此豈不是自然林黃中謂左傳君子曰是劉歆之辭胡先生謂周禮是劉歆所作不知是如何左傳君子曰最無意思因舉芟夷蘊崇之一段是關上文甚事賀孫左氏見識甚卑如言趙盾弒君之事卻云孔子聞之曰惜哉越境乃免如此則專是回避占便宜者得計聖人豈有是意聖人作春秋而亂臣賊子懼豈反為之解免耶端蒙問左傳載卜筮有能先知數世後事有此理否曰此恐不然只當時子孫欲僭竊故為此以欺上罔下爾如漢高帝蛇也只是脫空陳勝王凡六月便只是他做不成故人以為非高帝做得成故人以為符瑞左傳國語惟是周室一種士大夫說得道理大故細密這便是文武周召在王國立學校教得人恁地惟是周室人會恁地說且如蒸民詩大故說得好人受天地之中以生之類大故說得細密義剛兼論國語左氏所傳春秋事恐八九分是公穀專解經事則多出揣度必大以下三傳春秋制度大綱左傳較可據公穀較難憑胡文定義理正當然此樣處多是臆度說李丈問左傳如何曰左傳一部載許多事未知是與不是但道理亦是如此今且把來參考問公穀如何曰據他說亦是有那道理但恐聖人當初無此等意如孫明復趙啖陸淳胡文定皆說得好道理皆是如此但後世因春秋去考時當如此區處若論聖人當初作春秋時其意不解有許多說話擇之說文定說得理太多盡堆在裏面曰不是如此底亦壓從這理上來淳義剛録少異左氏傳是箇博記人做只是以世俗見識斷當它事皆功利之說公穀雖陋亦有是處但皆得於傳聞多訛謬德明國秀問三傳優劣曰左氏曾見國史考事頗精只是不知大義專去小處理會往往不曾講學公穀考事甚疏然義理卻精二人乃是經生傳得許多說話往往都不曾見國史時舉左傳是後來人做為見陳氏有齊所以言八世之後莫之與京見三家分晉所以言公侯子孫必復其始以三傳言之左氏是史學公穀是經學史學者記得事卻詳於道理上便差經學者於義理上有功然記事多誤如遷固之史大概只是計較利害范曄更低只主張做賊底後來他自做卻敗溫公通鑑凡涉智數險詐底事往往不載卻不見得當時風俗如陳平說高祖間楚事亦不載上一段不若全載了可以見當時事情卻於其下論破乃佳又如亞夫得劇孟事通鑑亦節去意謂得劇孟不足道不知當時風俗事勢劇孟輩亦係輕重知周休且能一夜得三萬人只緣吳王敗後各自散去其事無成溫公於此事卻不知不覺載之蓋以周休名不甚顯不若劇孟耳想溫公平日諍耐劇孟不知溫公為將設遇此人奈得它何否又如論唐太宗事亦殊未是呂氏大事記周赧後便繫秦亦未當當如記楚漢事並書之項籍死後方可專書漢也孔子作春秋當時亦須與門人講說所以公穀左氏得一箇源流只是漸漸訛舛當初若是全無傳授如何鑿空撰得問今欲看春秋且將胡文定說為正如何曰便是他亦有太過處蘇子由教人只讀左傳只是他春秋亦自分曉且如公與夫人如齊必竟是理會甚事自可見又如季氏逐昭公畢竟因甚如此今理會得一箇義理後將他事來處置合於義理者為是不合於義理者為非亦有喚做是而未盡善者亦有謂之不是而彼善於此者且如讀史記便見得秦之所以亡漢之所以興及至後來劉項事又知劉之所以得項之所以失不難判斷只是春秋卻精細也都不說破教後人自將義理去折衷文蔚問公穀傳大概皆同曰所以林黃中說只是一人只是看他文字疑若非一手者或曰疑當時皆有所傳授其後門人弟子始筆之於書爾曰想得皆是齊魯間儒其所著之書恐有所傳授但皆雜以己意所以多差舛其有合道理者疑是聖人之舊僩以下公穀春秋難理會公穀甚不好然又有甚好處如序隱公遜國宣公遜其姪處甚好何休注甚謬公羊說得宏大如君子大居正之類穀梁雖精細但有些鄒搜狹窄公羊是箇村朴秀才穀梁又較黠得些振春秋難看三家皆非親見孔子或以左丘明恥之是姓左丘左氏乃楚左史倚相之後故載楚事極詳呂舍人春秋不甚主張胡氏要是此書難看如劉原父春秋亦好可學云文定解宋災故一段乃是原父說曰林黃中春秋又怪異云隱公篡威公可學云黃中說歸仲子之賵乃是周王以此為正其分曰要正分更有多少般卻如此不契勘可學云杜預每到不通處多云告辭略經傳互異不云傳誤云經誤曰可怪是何識見可學以下諸家解春秋問春秋傳序引夫子答顏子為邦之語為顏子嘗聞春秋大法何也曰此不是孔子將春秋大法向顏子說蓋三代制作極備矣孔子更不可復作故告以四代禮樂只是集百王不易之大法其作春秋善者則取之惡者則誅之意亦只是如此故伊川引以為據耳淳程子所謂春秋大義數十炳如日星者如成宋亂宋災故之類乃是聖人直著誅貶自是分明如胡氏謂書晉侯為以常情待晉襄書秦人為以王事責秦穆處卻恐未必如此須是己之心果與聖人之心神交心契始可斷他所書之旨不然則未易言也程子所謂微辭隱義時措從宜者為難知耳人傑或問伊川春秋序後條曰四代之禮樂此是經世之大法也春秋之書亦經世之大法也然四代之禮樂是以善者為法春秋是以不善者為戒又問孔子有取乎五霸豈非時措從宜曰是又曰觀其豫五霸其中便有一箇奪底意思賀孫春秋序云雖德非湯武亦可以法三王之治如是則無本者亦可以措之治乎語有缺因云伊川甚麼樣子細尚如此難難揚今日得程春秋解中間有說好處如難理會處他亦不為決然之論向見沙隨春秋解只有說滕子來朝一處最好隱十一年方書滕侯薛侯來朝如何桓二年便書滕子來朝先輩為說甚多或以為時王所黜故降而書子不知是時時王已不能行黜陟之典就使能黜陟諸侯當時亦不止一滕之可黜或以春秋惡其朝桓特削而書子自此之後滕一向書子豈春秋惡其朝桓而并後代子孫削之乎或以為當喪未君前又不見滕侯卒皆不通之論沙隨謂此見得春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕子之事魯以侯禮見則所供者多故自貶降而以子禮見庶得貢賦省少易供此說卻恐是何故緣後面鄭朝晉云鄭伯男也而使從公侯之賦見得鄭本是男爵後襲用侯伯之禮以交於大國初焉不覺其貢賦之難辦後來益困於此方說出此等話非獨是鄭伯當時小國多是如此今程公春秋亦如此說滕子程是紹興以前文字不知沙隨見此而為之說還是自見得此意賀孫問諸家春秋解如何曰某盡信不及如胡文定春秋某也信不及知得聖人意裏是如此說否今只眼前朝報差除尚未知朝廷意思如何況生乎千百載之下欲逆推乎千百載上聖人之心況自家之心又未如得聖人如何知得聖人肚裏事某所以都不敢信諸家解除非是得孔子還魂親說出不知如何僩胡文定春秋非不好卻不合這件事聖人意是如何下字那件事聖人意又如何下字要之聖人只是直筆據見在而書豈有許多忉怛友仁問胡春秋如何曰胡春秋大義正但春秋自難理會如左氏尤有淺陋處如君子曰之類病處甚多林黃中嘗疑之卻見得是時舉胡春秋傳有牽強處然議論有開合精神閎祖問胡春秋曰亦有過當處文蔚問胡文定據孟子春秋天子之事一句作骨如此則是聖人有意誅賞曰文定是如此說道理也是恁地但聖人只是書放那裏使後世因此去考見道理如何便為是如何便為不是若說道聖人當時之意說他當如此我便書這一字淳録云以褒之他當如彼我便書那一字淳録云以貶之別本云如此便為豫如彼便為奪則恐聖人不解恁地聖人當初只直寫那事在上面如說張三打李四李四打張三未嘗斷他罪某人杖六十某人杖八十如孟子便是說得那地步闊聖人之意只是如此不解恁地細碎且如季子來歸諸公說得恁地好據某看來季友之罪與慶父也不爭多但是他歸來後會平了難魯人歸之故如此說況他世執魯之大權人自是怕他史官書得恁地孔子因而存此蓋以見他執權之漸耳義剛淳録略春秋今來大綱是從胡文定說但中間亦自有難穩處如叔孫婼祈死事把他做死節本自無據後卻將至自晉一項說又因穀梁公孫舍云云他若是到歸來也須問我屋裏人如何同去弒君也須誅討斯得自死是如何春秋難說若只消輕看過不知是如何如孟子說道春秋無義戰彼善於此只將這意看如何左氏是三晉之後不知是甚麼人看他說魏畢萬之後必大如說陳氏代齊之類皆是後來設為豫定之言春秋分明處只是如晉士飩侵齊至聞齊侯卒乃還這分明是與他賀孫問胡氏傳春秋盟誓處以為春秋皆惡之楊龜山亦嘗議之矣自今觀之豈不可因其言盟之能守與否而褒貶之乎今民泯泯棼棼罔中于信以覆詛盟之時而遽責以未施信而民信之事恐非化俗以漸之意曰不然盟詛畢竟非君之所為故曰君子屢盟亂是用長將欲變之非去盟崇信俗不可得而善也故伊川有言凡委靡隨俗者不能隨時惟剛毅特立乃所以隨時斯言可見矣問洽尋常如何理會是自命曰嘗考之矣當從劉侍讀之說自王命不行則諸侯上僭之事由階而升然必與勢力之不相上下者池録作如歷階而升以至於極蓋既無王命必擇勢力之相敵者共為之所以布於衆而成其僭也齊衛當時勢敵故齊僖自以為小伯而黎人責衛以方伯之事當時王不敢命伯而欲自為伯故於此彼此相命以成其私也及其久也則力之能為者專之矣故威公遂自稱伯以至戰國諸侯各有稱王之意不敢獨稱於國必與勢力之相侔者共約而為之魏齊會于苴澤以相王是也其後七國皆王秦人思有以勝之於是使人致帝於齊約共稱帝豈非相帝自相命而至於相王自相王而至於相帝僭竊之漸勢必至此池録云春秋於此蓋紀王命不行而諸侯僭竊之端也豈非其明證乎曰然則左傳所謂胥命于弭何也曰此以納王之事相遜相先也曰說亦有理洽池録少異問春秋胡文定之說如何曰尋常亦不滿於胡說且如解經不使道理明白卻就其中多使故事大與做時文答策相似近見一相知說傅守見某說云固是好但其中無一故事可用某作此書又豈欲多使事也問先生既不解春秋合亦作一篇文字略說大意使後學知所指歸曰也不消如此但聖人作經直述其事固是有所抑揚然亦非故意增減一二字使後人就一二字上推尋以為吾意旨之所在也問胡文定說元字某不能無疑元者始也正所謂辭之所謂太也今胡乃訓元為仁訓仁為心得無太支離乎曰楊龜山亦嘗以此議之胡氏說經大抵有此病胡文定說春秋高而不曉事情說元年不要年號且如今中興以來更七箇元年若無號則契券能無欺弊者乎淳呂居仁春秋亦甚明白正如某詩傳相似道夫東萊有左氏說亦好是人記録他語言義剛薛常州解春秋不知如何率意如此只是幾日成此文字如何說諸侯無史內則尚有閭史又如趙盾事初靈公要殺盾盾所以走出趙穿便弒公想是他本意如此這箇罪首合是誰做賀孫薛士龍曰魯隱初僭史殊不知周官所謂外史合四方之志便是四方諸侯皆有史諸侯若無史外史何所稽考而為史如古人生子則閭史書之且二十五家為閭閭尚有史況一國乎學蒙昔楚相作燕相書其燭暗而不明楚相曰舉燭書者不察遂書舉燭字於書中燕相得之曰舉燭者欲我之明於舉賢也於是舉賢退不肖而燕國大治故曰不是郢書乃成燕說今之說春秋者正此類也人傑揚録少異學春秋者多鑿說後漢五行志注載漢末有發范明友奴冢奴猶活明友霍光女壻說光家事及廢立之際多與漢書相應某嘗說與學春秋者曰今如此穿鑿說亦不妨只恐一旦有於地中得夫子家奴出來說夫子當時之意不如此爾廣經傳附問春王正月是用周正用夏正曰兩邊都有證據將何從義剛録云這箇難稽考莫去理會這箇某向來只管理會此不放下竟擔閣了吾友讀書不多不見得此等處某讀書多後有時此字也不敢喚做此字如家語周公祝成王冠辭近爾民遠爾年嗇爾時惠爾財親賢任能近爾民言得民之親愛也遠爾年言壽也年與民協音紉能與財協囊來反與時協音尼財音慈義剛録云能字通得三音若作十灰韻則與才字協與時字又不協今更不可理會據今協時字則當作尼字讀淳某親見文定公家說文定春秋說夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月某便不敢信恁地時二百四十二年夫子只證得箇行夏之時四箇字據今周禮有正月有正歲則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅如孟子說七八月之間旱這斷然是五六月十一月徒杠成十二月輿梁成這分明是九月十月若真是十一月十二月時寒自過了何用更造橋梁古人只是寒時造橋度人若暖時又只時教他自從水裏過看來古時橋也只是小橋子不似如今石橋浮橋恁地好義剛春秋傳言元者仁也仁人心也固有此理然不知仁如何卻喚做元如程子曰天子之理原其所自未有不善易傳曰成而後有敗敗非先成者也得而後有失非得何以有失也便說得有根源閎祖胡文定說春秋公即位終是不通且踰年即位凶服如何入廟胡文定卻說是冢宰攝行他事可攝即位豈可攝且如十一月乙丑伊尹以冕服奉嗣王惟十有三祀卻是除服了康王之誥東坡道是召公失禮處想古時是這般大事必有箇權宜如借吉之例或問金縢前輩謂非全書曰周公以身代武王之說只緣人看錯了此乃周公誠意篤切以庶幾其萬一丕子之責于天只是以武王受事天之責任如今人說話他要箇人來服事周公便說是他不能服事天不似我多才多藝自能服事天賀孫春秋一發首不書即位即君臣之事也書仲子嫡庶之分即夫婦之事也書及邾盟朋友之事也書鄭伯克段即兄弟之事也一開首人倫便盡在惠公仲子恐是惠公之妾僖公成風卻是僖公之母不可一例看不必如孫明復之說閎祖孫明復云文九年冬秦人來歸僖公成風之襚與此不稱夫人義同譏其不及事而又兼之貶也義剛曰莊公見潁考叔而告之悔此是他天理已漸漸明了考叔當時聞莊公之事而欲見之此是欲撥動他機及其既動卻好開明義理之說使其心豁然知有天倫之親今卻教恁地做則母子全恩依舊不出於真理此其母子之間雖能如此而其私欲固未能瑩然消釋其所以略能保全而不復開其隙者特幸耳曰恁地看得細碎不消如此某便是不喜伯恭博議時他便都是這般議論恁地忒細碎不濟得事且如這樣他是且欲全他母子之恩以他重那盟誓未肯變故且教他恁地做這且得他全得大義未暇計較這箇又何必如此去論他義剛陳仲蔚問東萊論潁考叔之說是否曰古人也是重那盟誓又問左傳於釋經處但略過如何曰他釋經也有好處如說段不弟故不言弟稱鄭伯譏失教也這樣處說得也好蓋說得闊又問宋宣公可謂知人矣立穆公其子享之這也不可謂知人曰這樣處卻說得無巴鼻如公羊說宣公卻是宋之罪腦左氏有一箇大病是他好以成敗論人遇他做得來好時便說他好做得來不好時便說他不是卻都不折之以理之是非這是他大病敘事時左氏卻多是公穀卻都是胡撰他去聖人遠了只是想像胡說或問左氏果丘明否曰左氏敘至韓魏趙殺智伯事去孔子六七十年決非丘明義剛夫人子氏薨只是仲子左氏豫凶事之說亦有此理考仲子之宮是別立廟人傑二年問石碏諫得已自好了如何更要那將立州吁四句曰也是要得不殺那桓公又問如何不禁其子與州吁遊曰次第是石碏老後奈兒子不何又問殺之如何要引他從陳去忽然陳不殺卻如何曰如喫飯樣不成說道喫不得後便不喫也只得喫義剛二年陳仲蔚說公矢魚于棠云或謂矢如皋陶矢厥謨之矢曰便是亂說今據傳曰則君不射則矢魚是將弓矢去射之如漢武帝親射江中蛟之類何以見得夫子作春秋征只書征伐只書伐不曾恁地下一字如何平白無事陳魚不只寫作陳字卻要下箇矢字則麼遂往陳魚而觀之這幾句卻是左氏自說據他上文則無此意義剛五年鄭人來渝平渝變也蓋魯先與宋好鄭人卻來渝平謂變渝舊盟以從新好也公穀作輸平胡文定謂以物而求平也恐不然但言輸則渝之義自在其中如秦詛楚文云變輸盟刺若字義則是如此其文意則只是渝字也銖六年因言勇而無剛曰剛與勇不同勇只是敢為剛有堅強之意閎祖九年桓公有兩年不書秋冬說者謂以喻時王不能賞罰若如是孔子亦可謂大迂闊矣某嘗謂說春秋者只好獨自說不可與人論難蓋自說則橫說豎說皆可論難著便說不行必大桓四年七年春秋書蔡人殺陳他此是夫子據魯史書之他之弒君初不見於經者亦是魯史無之耳廣六年問書蔡威侯文定以為蔡季之賢知請諡如何曰此只是文誤人傑十七年問魯桓公為齊襄公所殺其子莊公與桓公會而不復讎先儒謂春秋不譏是否曰他當初只是據事如此寫在如何見他譏與不譏當桓公被殺之初便合與他理會使上有明天子下有賢方伯便合上告天子下告方伯興復讎之師只緣周家衰弱無赴訴處莊公又無理會便自與之主婚以王姬嫁齊及到桓公時又自隔一重了況到此事體又別桓公率諸侯以尊周室莊公安得不去若是不去卻不是叛齊乃是叛周曰使莊公當初自能舉兵殺了襄公還可更赴桓公之會否曰他若是能殺襄公他卻自會做伯主不用去隨桓公若是如此便是這事結絶了文蔚僩録詳見本朝六荊楚初書國後進稱人稱爵乃自是他初間不敢驟交於中國故從卑稱後漸大故稱爵賀孫莊十年成風事季友與敬嬴事襄仲一般春秋何故褒季友如書季子來歸是也人傑謂季子既歸而閔公被弒慶父出奔季子不能討賊是其意在於立僖公也先生曰縱失慶父之罪小而季子自有大惡今春秋不貶之而反褒之殆不可曉蓋如高子仲孫之徒只是舊史書之聖人因其文而不革所以書之者欲見當時事跡付諸後人之公議耳若謂季子為命大夫則叔孫婼嘗受命服何為書名乎人傑閔元年春秋書季子來歸恐只是因舊史之文書之如此寬看尚可若謂春秋謹嚴便沒理會或只是魯亂已甚後來季友立得僖公再整頓得箇社稷起有此大功故取之與取管仲意同然季子罪惡與慶父一般春秋若褒之則此一經乃淪三綱斁九法之書爾當時公子牙無罪又用藥毒殺了季子賜族此亦只是時君恩意如秦呼呂不韋作尚父耳正淳曰季子雖來歸亦有放走慶父之罪曰放走慶父罪小它自身上罪大亦治慶父不得必大録云春秋書季子來歸不知夫子何故取季友恐只是如取管仲之意但以其後來有功社稷所以更不論其已前罪過正淳曰說者謂是國人喜季子之來望其討慶父之罪故春秋因如此書之及後來不能治慶父則季子之可貶者亦可見矣曰季子之罪不在放走了慶父先已自有罪過了問季友之為人曰此人亦多可疑諸家都言季友來歸為聖人美之之辭據某看此一句正是聖人著季氏所以專國為禍之基又成風聞季氏之繇乃事之左氏記此數句亦有說話成風沒巴鼻事他則甚據某看此等人皆魯國之賊耳又問子家子曰它卻是忠於昭公只是也無計畫不過只欲勸昭公且泯默含垢受辱因季氏之來請而歸魯耳昭公所以不歸必是要逐季氏而后歸也當時列國之大夫如晉之欒魯之季氏鄭之伯有之徒國國皆然二百四十二年真所謂五濁惡世不成世界孔子說有用我者吾其為東周乎不知如何地做從何處做起某實曉不得或曰相魯可見曰他合下只說得季威子透威子事事信之所以做得及後來被公斂處父一說破了威子便不信之孔子遂做不得矣孟子說五年七年可為政於天下不知如何做孔子不甚說出來孟子自擔負不淺不知怎生做也僩季子來歸如高子來盟齊仲孫來之類當時魯國內亂得一季子歸國則國人皆有慰望之意故魯史喜而書之夫子直書史家之辭其實季子無狀觀於成風事之可見一書季子來歸而季氏得政權去公室之漸皆由此起矣問魯君弒而書薨如何曰如晉史書趙盾弒君齊史書崔杼弒君魯卻不然蓋恐是周公之垂法史書之舊章韓宣子所謂周禮在魯者亦其一事也問諸侯書卒曰劉道原嘗言之此固當書卒問魯君書薨而諸侯書卒內大夫卒而略外大夫只是別內外之辭曰固是且如今虜主死其國必來告哀史官必書虜主之死若虜中宰相大臣彼亦不告此亦必不書之也但書王猛又書王子猛皆不可曉所謂天子未除喪曰豫小子生名之死亦名之此乃據春秋例以為之說耳人傑齊桓公較正當只得一番出伐管仲亦不見出有事時只是遣人出整頓春秋每稱齊人左傳上全不曾載許多事卻載之於國語及出孟子呂丈言左傳不欲見桓公許多不美處要為桓公管仲全之孟子所載桓公亦自犯了故皆不載曰左氏有許多意思時卻是春秋左氏亦不如此回互只是有便載無便不載說得意思回互如此豈不教壞了人晉文公詭譎如侵曹伐衛皆是當時出時不禮之私卻只名謂治其從楚如書晉侯伐衛辭意可見又書楚人救衛如書救皆是美意中國之諸侯晉以私伐之乃反使楚人來救如晉侯侵曹晉侯伐衛楚人救衛其辭皆聖人筆削要來此處看義理今人作春秋義都只是論利害晉侯侵伐皆自出揚僖四年問齊侯侵蔡亦以私如何曰齊謀伐楚已在前本是伐楚特因以侵蔡耳非素謀也問國語左傳皆是左氏編何故載齊桓公於國語而不載於左傳曰不知二書作之先後溫公言先作國語次作傳又有一相識言先左傳次國語國語較老如左傳後看之似然揚昔嘗聞長上言齊威公伐楚不責以僭王之罪者蓋威公每事持重不是一箇率然不思後手者當時楚甚強大僭王已非一日威公若以此問之只宜楚即服罪不然齊豈遽保其必勝楚哉及聞先生言及亦以為然壯祖春秋書會王世子與齊威公也廣五年晉里克事只以春秋所書未見其是非國語載驪姬陰託里克之妻其後里克守不定遂有中立之說他當時只難里克里克若不變太子可安由是觀之里克之罪明矣後來殺奚齊卓子亦自快國人之意且與申生伸冤如春秋所書多有不可曉如里克等事只當時人已自不知孰是孰非況後世乎如蔡人殺陳他都不曾有陳他弒君蹤跡會王世子卻是威公做得好賀孫九年或問春秋書晉殺其大夫荀息是取他否曰荀息亦未見有可取者但始終一節死君之難亦可取耳後又書晉殺其大夫里克者不以弒君之罪討之也然克之罪則在中立今左傳中卻不見其事國語中所載甚詳廣十年問里克丕鄭荀息三人當初晉獻公欲廢太子申生立奚齊荀息便謂君命立之臣安敢二略不能諫君以義此大段不是里克丕鄭謂從君之義不從君之惑所見甚正只是後來卻做不徹曰他倒了處便在那中立上天下無中立之事自家若排得他退便用排退他若奈何他不得便用自死今驪姬一許他中立他事便了便是他只要求生避禍正如隋高祖篡周韋孝寬初甚不能平一見衆人被殺便去降他反教他添做幾件不好底事看史到此使人氣悶或曰看荀息亦有不是處曰全然不是豈止有不是處只是辦得一死亦是難事文蔚曰里克當獻公在時不能極力理會及獻公死後卻殺奚齊此亦未是曰這般事便是難說獻公在日與他說不聽又怎生奈何得他後來亦用理會只是不合殺了他文蔚吳楚盟會不書王恐是吳楚當時雖自稱王於其國至與諸侯盟會則未必稱也閎祖二十一年諸侯滅國未嘗書名衛侯燬滅邢說者以為滅同姓之故今經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而傳寫之誤亦未可知又曰魯君書薨外諸侯書卒劉原父答溫公書謂薨者臣子之詞溫公亦以為然以卒為貶詞者恐亦非是人傑二十五年臧文仲廢六關若以為不知利害而輕廢則但可言不知所以言不仁者必有私意害民之事但古事既遠不可考耳有言臧文仲知征之為害而去之遂并無以識察姦僞故先生云然方子文二年僖公成風與東晉簡文帝鄭太后一也皆所以著妾母之義至本朝真宗既崩始以王后並配當時群臣亦嘗爭之為其創見也後來遂以為常此禮於是乎紊矣人傑四年胡氏春秋文八年記公孫敖事云色出於性淫出於氣其說原於上蔡此殊分得不是大凡出於人身上道理固皆是性色固性也然不能節之以禮制之以義便是惡故孟子於此只云君子不謂性也其語便自無病又曰李先生嘗論公孫敖事只如京師不至而復便是大不恭魯亦不再使人往便是罪如此解之於經文甚當蓋經初無從己氏之說人傑録云胡氏只貶他從己氏之過經文元不及此事八年遂以夫人姜氏至自齊恐是當時史官所書如此蓋為如今魯史不存無以知何者是舊文何者是聖人筆削怎見得聖人之意閎祖宣元年晉驪姬之亂詛無畜群公子自是晉無公族而以卿為公室大夫這箇便是六卿分晉之漸始驪姬謀逐群公子欲立奚齊卓子爾後來遂以為例則疑六卿之陰謀也然亦不可曉僩三年植因舉楚人卒偏之兩乃一百七十五人曰一廣有百七十五人二廣計三百五十楚分為左右廣前後更番植十二年宣公十五年公孫歸父會楚子于宋夏五月宋人及楚人平春秋之責宋鄭正以其叛中國而從夷狄爾中間諱言此事故學者不敢正言今猶守之而不變此不知時務之過也罪其二霸亦非是春秋豈率天下諸侯以從三王之罪人哉特罪其叛中國耳此章先生親具章浦縣學課簿道夫先生問人傑記左傳分謗事否人傑以韓獻子將殺人郤獻子馳救不及使速以徇對先生曰近世士大夫多是如此只要徇人情如荀林父邲之役先縠違命而濟乃謂與其專罪六人同之是何等見識當時為林父者只合按兵不動召先縠而誅之人傑曰若如此豈止全軍雖進而救鄭可也因問韓厥殺人事在郤克只得如此曰既欲馳救則殺之未得為是然這事卻且莫管因云當時楚孫叔敖不欲戰伍參爭之若事有合爭處須當力爭不可苟徇人情也人傑成二年問民受天地之中以生中是氣否曰中是理理便是仁義禮智曷常有形象來凡無形者謂之理若氣則謂之生也清者是氣濁者是形氣是魂謂之精血是魄謂之質所謂精氣為物須是此兩箇相交感便能成物遊魂為變所稟之氣至此已盡魂升於天魄降於地陽者氣也魂也歸於天陰者質也魄也降於地謂之死也知生則便知死只是此理夫子告子路非是拒之是先後節次如此也因說鬼神者造化之跡且如起風做雨震雷閃電花生花結非有神而何自不察耳才見說鬼事便以為怪世間自有箇道理如此不可謂無特非造化之正耳此得陰陽不正之氣不須驚惑所以夫子不語怪以其明有此事特不語耳南軒說無便不是了明作成十三年胡解晉弒其君州蒲一段意不分明似是為欒書出脫曾問胡伯逢伯逢曰厲公無道但當廢之閎祖十八年因問胡氏傳欒書弒晉厲公事其意若許欒書之弒何也曰舊亦嘗疑之後見文定之甥范伯達而問焉伯達曰文定之意蓋以為欒書執國之政而厲公無道如此亦不得坐視為書之計厲公可廢而不可殺也洽言傳中全不見此意曰文定既以為當如此作傳雖不可明言豈不可微示其意乎今纍數百言而其意絶不可曉是亦拙於傳經者也洽楊至之問晉悼公曰甚次第他才大段高觀當初人去周迎他時只十四歲他說幾句話便乖便有操有縱才歸晉做得便別當時厲公恁地弄得狼當被人攛掇胡亂殺了晉室大段費力及悼公歸來不知如何便被他做得恁地好恰如久雨積陰忽遇天晴光景便別赫然為之一新又問勝威文否曰儘勝但威文是白地做起來悼公是見成基址某嘗謂晉悼公宇文周武帝周世宗三人之才一般都做得事都是一做便成及才成又便死了不知怎生地義剛楊至之問左傳元者體之長等句是左氏引孔子語抑古有此語曰或是古已有此語孔子引他也未可知左傳又云克己復禮仁也克己復禮四字亦是古已有此語淳襄九年子上問鄭伯以女樂賂晉悼公如何有歌鍾二肆曰鄭衛之音與先王之樂其器同止是其音異璘十一年問左氏駒支之辨劉侍讀以為無是事曰某亦疑之既曰言語衣服不與華同又卻能賦青蠅何也又太子申生伐東山皋落氏攛掇申生之死乃數公也申生以閔二年十二月出師衣之偏衣佩之金玦數公議論如此獻公更舉事不得便有逆詐億不信底意思左氏一部書都是這意思文章浮艷更無事實蓋周衰時自有這一等迂闊人觀國語之文可見周之衰也某嘗讀宣王欲籍千畝事便心煩及戰國時人卻尚事實觀太史公史記可見公子成與趙武靈王爭胡服甘龍與衛鞅爭變法其他如蘇張之辨莫不皆然衛鞅之在魏其相公孫座勸魏君用之不然須殺之魏君不從則又與鞅明言之鞅以為不能用我焉能殺我及秦孝公下令鞅西入秦然觀孝公下令數語如此氣勢乃是吞六國規模鞅之初見孝公說以帝道王道想見好笑其實乃是霸道鞅之如此所以堅孝公之心後來迂闊之說更不能入使當時無衛鞅必須別有人出來觀孝公之意定是不用孟子史記所載事實左氏安得有此人傑十四年季札辭國不為盡是揚問季札胡文定公言其辭國以生亂溫公又言其明君臣之大分曰可以受可以無受問季札觀樂如何知得如此之審曰此是左氏粧點出來亦自難信如聞齊樂而曰國未可量然一再傳而為田氏烏在其為未可量也此處皆是難信處時舉二十九年或問子産相鄭鑄刑書作丘賦時人不以為然是他不達為國以禮底道理徒恃法制以為國故鄭國日以衰削曰是他力量只到得這裏觀他與韓宣子爭時似守得定及到伯有子皙之徒撓他時則度其可治者治之若治他不得便只含糊過亦緣當時列國世卿每國須有三兩族強大根株盤互勢力相依倚卒急動他不得不比如今大臣才被人論便可逐去故當時自有一般議論如韓獻子分謗之說只是要大家含糊過不要見得我是你不是又如魯以相忍為國意思都如此後來張文潛深取之故其所著雖連篇纍牘不過只是這一意廣昭六年左傳形民之力而無醉飽之心杜預煞費力去解後王肅只解作刑罰之刑甚易曉便是杜預不及他李百藥也有兩處說皆作刑罰字說義剛十二年形民之力而無醉飽之心左傳作形字解者胡說今家語作刑民注云傷也極分曉蓋言傷民之力以為養而無饜足之心也又如禮記中說耆欲將至有開必先家語作有物將至其兆必先為是蓋有字似耆字物字似欲字其字似有字兆字篆文似開字之門必誤無疑今欲作有開解亦可但無意思爾王肅所引證也有好處後漢鄭玄與王肅之學互相詆訾王肅固多非是然亦有考援得好處僩齊田氏之事晏平仲言惟禮可以已之不知他當時所謂禮如何可以已之想他必有一主張燾二十六年春秋權臣得政者皆是厚施於民故晏子對景公之辭曰在禮家施不及國乃先王防間之意人傑或問申包胥如秦乞師哀公為之賦無衣不知是作此詩還只是歌此詩曰賦詩在他書無所見只是國語與左傳說皆出左氏一手不知如何左傳前面說許穆夫人賦載馳高克賦清人皆是說作此詩到晉文公賦河水以後如賦鹿鳴四牡之類皆只是歌誦其詩不知如何因言左氏說多難信如晉范宣子責姜戎不與會姜戎曰我諸戎贄幣不通言語不同不與於會亦無瞢焉賦青蠅而退既說言語不同又卻會恁地說又會誦詩此不可曉胡泳定四年問夾谷之會孔子數語何以能卻萊人之兵曰畢竟齊常常欺魯魯常常不能與之爭卻忽然被一箇人來以禮問他他如何不動如藺相如秦王擊缶亦是秦常欺得趙過忽然被一箇人恁地硬掁他如何不動燾十年聖人隳三都亦是因季氏厭其強也正似唐末五代羅紹威其兵強於諸鎮者以牙兵五千人也然此牙兵又不馴於其主羅甚惡之一日盡殺之其鎮遂弱為鄰鎮所欺乃方大悔揚十二年春秋獲麟某不敢指定是書成感麟亦不敢指定是感麟作大概出非其時被人殺了是不祥淳陳仲亨問晉三卿為諸侯司馬胡氏之說孰正曰胡氏說也是如此但他也只從春秋中間說起這卻不特如此蓋自平王以來便恁地無理會了緣是如此日降一日到下梢自是沒奈他何而今看春秋初時天王尚略略有戰伐之屬到後來都無事及到定哀之後更不敢說著他然其初只是諸侯出來抗衡到後來諸侯才不奈何便又被大夫出來做及大夫稍做得沒奈何又被倍臣出來做這便似唐之藩鎮樣其初是節度抗衡後來牙將孔目官虞候之屬皆殺了節度使後出來做當時被他出來握天下之權恣意恁地做後更沒奈他何這箇自是其勢必如此如夫子說禮樂征伐自天子出一段這箇說得極分曉義剛附此問自陝以東周公主之自陝以西召公主之周召既為左右相如何又主二伯事曰此春秋說所未詳如顧命說召公率西方諸侯入應門左畢公率東方諸侯入應門右所可見者其略如此公羊隱五年春秋傳毀廟之道改塗易檐言不是盡除只改其灰節易其屋簷而已義剛天子之廟復廟重檐檐言簷又曰毀廟之制改塗可也易檐可也銖問穀梁釋夫人孫于齊其文義如何曰始人之也猶言始以人道治莊公也命猶名也猶曰若於道若於言天人皆以為然則是吾受是名也臣子大受命謹其所受命之名而已大抵齊魯之儒多質實當時或傳誦師說見理不明故其言多不倫禮記中亦然如云仁者右也義者左也道他不是不得人傑穀梁莊元年林問先生論春秋一經本是明道正誼權衡萬世典刑之書如朝聘會盟侵伐等事皆是因人心之敬肆為之詳略或書字或書名皆就其事而為之義理最是斟酌毫忽不差後之學春秋多是較量齊魯長短自此以後如宋襄晉悼等事皆是論伯事業不知當時為王道作耶為伯者作耶若是為伯者作則此書豈足為義理之書曰大率本為王道正其紀綱看已前春秋文字雖粗尚知有聖人明道正誼道理尚可看近來止說得伯業權譎底意思更開眼不得此義不可不知宇論治經之弊春秋本是明道正誼之書今人只較齊晉伯業優劣反成謀利大義都晦了今人做義且做得齊威晉文優劣論淳春秋之作不為晉國伯業之盛衰此篇大意失之亦近歲言春秋者之通病也正誼不謀利明道不計功尊王賤伯內諸夏外夷狄此春秋之大旨不可不知也此亦先生親筆道夫問今科舉習春秋學只將伯者事業纏在心胸則春秋先儒謂尊王之書其然邪曰公莫道這箇物事是取士弊如此免不得應之今將六經做時文最說得無道理是易與春秋他經猶自可容今之治春秋者都只將許多權謀變詐為說氣象局促不識聖人之意不論王道之得失而言伯業之盛衰失其旨遠矣公即位要必當時別有即位禮數不書即位者此禮不備故也今不可考其義難見諸家之說所以紛紛晉侯侵曹晉侯伐衛皆是文公譎處考之左氏可見皆所以致楚師也謨今之做春秋義都是一般巧說專是計較利害將聖人之經做一箇權謀機變之書如此不是聖經卻成一箇百將傳因說前輩做春秋義言辭雖粗率卻說得聖人大意出年來一味巧曲但將孟子何以利吾國句說盡一部春秋這文字不是今時方恁地自秦師垣主和議一時去趨媚他春秋義才出會夷狄處此最是春秋誅絶底事人卻都做好說看來此書自將來做文字不得才說出便有忌諱常勸人不必做此經他經皆可做何必去做春秋這處也是世變如二程未出時便有胡安定孫泰山石徂徠他們說經雖是甚有疏略處觀其推明治道直是凜凜然可畏春秋本是嚴底文字聖人此書之作遏人欲於橫流遂以二百四十二年行事寓其褒貶恰如大辟罪人事在款司極是嚴緊一字不敢胡亂下使聖人作經有今人巧曲意思聖人亦不解作得因問文定春秋曰某相識中多有不取其說者正其誼不謀其利明其道不計其功春秋大法正是如此今人卻不正其誼而謀其利不明其道而計其功不知聖人將死作一部書如此感麟涕泣雨淚沾襟這般意思是豈徒然問春秋繁露如何曰尤延之以此書為僞某看來不是董子書又言呂舍人春秋卻好白直說去卷首與末梢又好中間不似伯恭以為此書只粧點為說宇道夫録云近時言春秋者皆是計較利害大義卻不曾見如唐之陸淳本朝孫明復之徒他雖未能深於聖經然觀其推言治道凜凜然可畏終是得聖人箇意思春秋之作蓋以當時人欲橫流遂以二百四十二年行事寓其褒貶恰如今之事送在法司相似極是嚴緊一字不輕易若如今之說只是箇權謀智略兵機譎詐之書爾聖人晚年痛哭流涕筆為此書豈肯恁地纖巧豈至恁地不濟事春秋固是尊諸夏外夷狄然聖人當初作經豈是要率天下諸侯而尊齊晉自秦檜和戎之後士人諱言內外而春秋大義晦矣淳問春秋一經夫子親筆先生不可使此一經不明於天下後世曰某實看不得問以先生之高明看如何難曰劈頭一箇王正月便說不去劉曰六經無建子月惟是禮記雜記中有箇正月日至可以有事于上帝七月日至可以有事于先王其他不見說建子月曰惟是孟子出來作鬧七八月之間旱則苗槁矣便是而今五六月此句又可鶻突歲十一月徒杠成十二月輿梁成是而今九月十月若作今十一月十二月此去天氣較暖便可涉過唯是九月十月不可涉過止有此處說其他便不可說劉云若看春秋要信傳不可曰如何見得曰天王使宰咺來歸仲子之賵傳謂預凶事此非人情天王歸賵於魯正要得牢籠魯這人未死卻歸之賵正所以怒魯也曰天王正以此厚魯古人卻不諱死舉漢梁王事云云又季武子成寢杜氏之葬在西階之下請合葬焉一段先生舉此大笑云以一箇人家一火人扛箇棺櫬入來哭豈不可笑古者大夫入國以棺隨其後使人抬扛箇棺櫬隨行死便要用看古人不諱凶事砥寓録略以下自言不解春秋春秋某煞有不可曉處不知是聖人真箇說底話否泳問先生於二禮書春秋未有說何也曰春秋是當時實事孔子書在冊子上後世諸儒學未至而各以己意猜傳正橫渠所謂非理明義精而治之故其說多鑿是也唯伊川以為經世之大法得其旨矣然其間極有無定當難處置處今不若且存取胡文定本子與後來看縱未能盡得之然不中不遠矣書中間亦極有難考處只如禹貢說三江及荊揚間地理是吾輩親目見者皆有疑至北方即無疑此無他是不曾見耳康誥以下三篇更難理會如酒誥卻是戒飲酒乃曰肇牽車牛遠服賈何也梓材又自是臣告君之辭更不可曉其他諸篇亦多可疑處解將去固易豈免有疑禮經要須編成門類如冠昏喪祭及他雜碎禮數皆須分門類編出考其異同而訂其當否方見得然今精力已不逮矣姑存與後人趙幾道又問禮合如何修曰禮非全書而禮記尤雜今合取儀禮為正然後取禮記諸書之說以類相從更取諸儒剖擊之說各附其下庶便搜閲又曰前此三禮同為一經故有三禮學究王介甫廢了儀禮取禮記某以此知其無識大雅春秋難看此生不敢問如鄭伯髡頑之事傳家甚異可學
