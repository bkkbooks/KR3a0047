body:
  text: 朱子語類卷第九十六程子之書二遺書云不信其師乃知當時有不信者方第三卷學原於思思所以起發其聰明端蒙六經浩渺乍難盡曉且見得路逕後各自立得一箇門庭問如何是門庭曰是讀書之法如讀此一書須知此書當如何讀伊川教人看易以王輔嗣胡翼之王介甫三人易解看此便是讀書之門庭緣當時諸經都未有成說學者乍難捉摸故教人如此或問如詩是吟詠性情讀詩者便當以此求之否曰然僩學者全體此心學雖未盡若事物之來不可不應此亦只是言其大概且存得此心在這裏若事物之來不可不應且隨自家力量應之雖不中不遠矣更須下工夫方到得細密的當至於至善處此亦且是為初學言如龜山卻是恁地初間只管道是且隨力量恁地更不理會細密處下梢都衰塌了賀孫學者全體此心只是全得此心不為私欲汩沒非是更有一心能體此心也此等當以意會端蒙只是心生言只是敬心不熟也恭者私為之恭言恭只是人為禮者非體之禮言只是禮無可捉摸故人為之恭必循自然底道理則自在也端蒙明道曰雖則心操之則存舍之則亡然而持之太甚便是必有事焉而正之也亦須且恁去其說蓋曰雖是必有事焉而勿正亦須且恁地把捉操持不可便放下了敬而勿失即所以中也敬而無失本不是中只是敬而無失便見得中底氣象此如公不是仁然公而無私則仁又曰中是本來底須是做工夫此理方著司馬子微坐亡論是所謂坐馳也他只是要得恁地虛靜都無事但只管要得忘便不忘是馳也明道說張天祺不思量事後須強把他這心來制縛亦須寄寓在一箇形象皆非自然君實又只管念箇中字此又為中所制縛且中字亦何形象他是不思量事又思量箇不思量底寄寓一箇形象在這裏如釋氏教人便有些是這箇道理如曰如何是佛云云胡亂掉一語教人只管去思量又不是道理又別無可思量心只管在這上行思坐想久後忽然有悟中字亦有何形象又去那處討得箇中心本來是錯亂了又添這一箇物事在裏面這頭討中又不得那頭又討不得如何會討得天祺雖是硬捉又且把定得一箇物事在這裏溫公只管念箇中字又更生出頭緒多他所以說終夜睡不得又曰天祺是硬截溫公是死守旋旋去尋討箇中伊川即曰持其志所以教人且就裏面理會譬如人有箇家不自作主卻倩別人來作主賀孫伯豐說敬而無失則不偏不倚斯能中矣曰說得慢了只敬而無失便不偏不倚只此便是中敬而無失問莫是心純於敬在思慮則無一毫之不敬在事為則無一事之不敬曰只是常敬敬即所以中端蒙問聖人不記事所以常記得今人忘事以其記事何也曰聖人之心虛明便能如此常人記事忘事只是著意之故淳李德之問明道因修橋尋長梁後每見林木之佳者必起計度之心因語學者心不可有一事某竊謂凡事須思而後通安可謂心不可有一事曰事如何不思但事過則不留於心可也明道肚裏有一條梁不知今人有幾條梁柱在肚裏佛家有流注想水本流將去有些滲漏處便留滯蓋卿心要在腔殼子裏心要有主宰繼自今便截胸中膠擾敬以窮理德明問心要在腔子裏若慮事應物時心當如何曰思慮應接亦不可廢但身在此則心合在此曰然則方其應接時則心在事上事去則此心亦不管著曰固是要如此德明或問心要在腔子裏曰人一箇心終日放在那裏去得幾時在這裏孟子所以只管教人求放心今人終日放去一箇身恰似箇無梢工底船流東流西船上人皆不知某嘗謂人未讀書且先收斂得身心在這裏然後可以讀書求得義理而今硬捉在這裏讀書心飛揚那裏去如何得會長進賀孫或問心要在腔子裏如何得在腔子裏曰敬便在腔子裏又問如何得會敬曰只管恁地滾做甚麼才說到敬便是更無可說賀孫問人心要活則周流無窮而不滯於一隅如何是活曰心無私便可推行活者不死之謂可學李丈問天地設位而易行乎其中只是敬如何曰易是自然造化聖人本意只說自然造化流行程子是將來就人身上說敬則這道理流行錄云敬便易行也不敬便間斷了前輩引經文多是借來說己意如必有事焉而勿正必勿忘勿助長孟子意是說做工夫處程子卻引來鳶飛魚躍處說自然道理若知得鳶飛魚躍便了此一語又如必有事焉程子謂有事於敬此處那有敬意亦是借來做自己說孟子所謂有事只是集義勿正是勿望氣之生義集則氣自然生我只集義不要等待氣之生若等待便辛苦便去助氣使他長了氣不至於浩然便作起令張旺謂己剛毅無所屈撓便要發揮去做事便是助長淳問天地設位而易行乎其中只是敬敬則無間斷不知易何以言敬曰伊川們說得闊使人難曉曰下面云誠敬而已矣恐是說天地間一箇實理如此曰就天地之間言之是實理就人身上言之惟敬然後見得心之實處流行不息敬才間斷便不誠不誠便無物是息也德明問天地設位而易行乎其中只是敬也敬則無間斷天地人只是一箇道理天地設位而變易之理不窮所以天地生生不息人亦全得此理只是氣稟物欲所昏故須持敬治之則本然之理自無間斷曰也是如此天地也似有箇主宰方始恁地變易便是天地底敬天理只是直上去更無四邊滲漏更無走作賀孫問程子曰敬以直內義以方外仁也如何以此便謂之仁曰亦是仁也若能到私欲淨盡天理流行處皆可謂之仁如博學篤志切問近思能如是則仁亦在其中宇錄作便可為仁如克己復禮亦是仁出門如見大賓使民如承大祭亦是仁居處恭執事敬與人忠亦是仁看從那路入但從一路入做到極處皆是仁淳宇同問不有躬無攸利不立己後雖向好事猶為化物不得以天下萬物撓己己立後自能了當得天下萬物曰下面是伊川解易上句後二句又是覆解此意在乎以立己為先應事為後今人平日講究所以治國平天下之道而自家身己全未曾理會得若能理會自家身己雖與外事若茫然不相接然明德在這裏了新民只見成推將去賀孫問不立己後雖向好事猶為化物何也曰己不立則在我無主宰矣雖向好事亦只是見那事物好隨那事物去便是為物所化淳問主一曰做這一事且做一事做了這一事卻做那一事今人做這一事未了又要做那一事心下千頭萬緒節蜚卿問主一如何用工曰不當恁地問主一只是主一不必更於主一上問道理如人喫飯喫了便飽卻問人如何是喫飯先賢說得甚分明也只得恁地說在人自體認取主一只是專一驤厚之問或人專守主一曰主一亦是然程子論主一卻不然又要有用豈是守塊然之主一呂與叔問主一程子云只是專一今欲主一而於事乃處置不下則與程子所言自不同可學或謂主一不是主一事如一日萬幾須要並應曰一日萬幾也無並應底道理須還他逐一件理會但只是聰明底人卻見得快端蒙主一兼動靜而言問閑邪則固一矣主一則更不消言閑邪曰只是覺見邪在這裏要去閑他則這心便一了所以說道閑邪則固一矣既一則邪便自不能入更不消說又去閑邪恰如知得外面有賊今夜用須防他則便惺了既惺了不須更說防賊賀孫或問閑邪主一如何曰主一似持其志閑邪似無暴其氣閑邪只是要邪氣不得入主一則守之於內二者不可有偏此內外交相養之道也去偽用之問有言未感時知何所寓曰操則存舍則亡出入無時莫知其鄉更怎生尋所寓只是有操而已曰這處難說只爭一毫子只是看來看去待自見得若未感時又更操這所寓便是有兩箇物事所以道只有操而已只操便是主宰在這裏如克己復禮不是克己復禮三四箇字排在這裏克復二字只是拖帶下面二字要挑撥出天理人欲非禮勿視聽言動不是非禮是一箇物事禮又是一箇物事勿又是一箇物事只是勿便是箇主宰若恁地持守勿令走作也由他若不收斂一向放倒去也由他釋氏這處便說得驚天動地聖人只渾淪說在這裏教人自去看賀孫問程子謂有主則虛又謂有主則實曰有主於中外邪不能入便是虛有主於中理義甚實便是實淳外患不能入是有主則實也外邪不能入是有主則虛也自家心裏只有這箇為主別無物事外邪從何處入豈不謂之虛乎然他說有主則虛者實字便已在有主上了又曰有主則實者自家心裏有主外患所不能入此非實而何無主則實者自家心裏既無以為之主則外邪卻入來實其中此又安得不謂之實乎道夫中有主則實實則外患不能入此重在主字上有主則虛虛則邪不能入重在敬字上言敬則自虛靜故邪不得而奸之也端蒙問有主則實又曰有主則虛如何分別曰只是有主於中外邪不能入自其有主於中言之則謂之實自其外邪不入言之則謂之虛又曰若無主於中則目之欲也從這裏入耳之欲也從這裏入鼻之欲也從這裏入大凡有所欲皆入這裏便滿了如何得虛淳錄云皆入這裏來這裏面便滿了以手指心曰如何得虛因舉林擇之作主一銘云有主則虛神守其都無主則實鬼闞其室又曰有主則實既言有主便已是實了卻似多了一實字看來這箇實字謂中有主則外物不能入矣又曰程子既言有主則實又言有主則虛此不可泥看須看大意各有不同始得凡讀書則看他上下意是如何不可泥著一字如揚子言於仁也柔於義也剛到易中言剛卻是仁柔卻是義又論語學不厭知也教不倦仁也到中庸又謂成己仁也成物知也各隨本文意看自不相礙宇主一之謂敬無適之謂一敬主於一做這件事更不做別事無適是不走作泳問何謂主一曰無適之謂一一只是不走作又問思其所當思如何曰卻不妨但不可胡思且只得思一件事如思此一事又別思一件事便不可銖無適之謂一無適是箇不走作且如在這裏坐只在這裏坐莫思量出門前去在門前立莫思量別處去聖人說不有博奕者乎為之猶賢乎已博奕豈是好事與其營營膠擾不若但將此心殺在博奕上驤問主一無適只是莫走作且如讀書時只讀書著衣時只著衣理會一事時只理會一事了此一件又作一件此主一無適之義蜚卿曰某作事時多不能主一曰只是心不定人亦須是定其心曰非不欲主一然竟不能曰這箇須是習程子也教人習曰莫是氣質薄否曰然亦須涵養本原則自然別道夫伊川云主一之謂敬無適之謂一又曰人心常要活則周流無窮而不滯於一隅或者疑主一則滯滯則不能周流無窮矣道夫竊謂主一則此心便存心存則物來順應何有乎滯曰固是然所謂主一者何嘗滯於一事不主一則方理會此事而心留於彼這卻是滯於一隅又問以大綱言之有一人焉方應此事未畢而復有一事至則當何如曰也須是做一件了又理會一件亦無雜然而應之理但甚不得已則權其輕重可也道夫問伊川答蘇季明云求中於喜怒哀樂卻是已發某觀延平亦謂驗喜怒哀樂未發之前為如何此說又似與季明同曰但欲見其如此耳然亦有病若不得其道則流於空故程子云今只道敬又問既發未發不合分作兩處故不許如中庸說固無害曰然可學問舊看程先生所答蘇季明喜怒哀樂未發耳無聞目無見之說亦不甚曉昨見先生答呂子約書以為目之有見耳之有聞心之有知未發與目之有視耳之有聽心之有思已發不同方曉然無疑不知足之履手之持亦可分未發已發否曰便是書不如此讀聖人只教你去喜怒哀樂上討未發已發卻何嘗教你去手持足履上分未發已發都不干事且如眼見一箇物事心裏愛便是已發便屬喜見箇物事惡之便屬怒若見箇物事心裏不喜不怒有何干涉或作一似閑如何謂之已發僩問蘇季明問靜坐時乃說未發之前伊川以祭祀前旒黈纊答之據祭祀時恭敬之心向於神明此是已略發還只是未發曰只是如此恭敬未有喜怒哀樂亦未有思喚做已發不得然前旒黈纊非謂全不見聞若全不見聞則薦奠有時而不知拜伏有時而不能起也淳義剛同用之問蘇季明問喜怒哀樂未發之前求中一條曰此條記得極好只中間說謂之無物則不可然靜中須有箇覺處此二句似反說無物字恐當作有物字涵養於喜怒哀樂未發之前只是戒慎乎其所不睹恐懼乎其所不聞全未有一箇動綻大綱且約住執持在這裏到慎獨處便是發了莫見乎隱莫顯乎微雖未大投發出便已有一毫一分見了便就這處分別從善去惡雖耳無聞目無見然見聞之理在始得雖是耳無聞目無見然須是常有箇主宰執持底在這裏始得不是一向放倒又不是一向空寂了問非禮勿視聽言動是此意否曰此亦是有意了便是已發只是敬而無失所以為中大綱且執持在這裏下面說復卦便是說靜中有動不是如瞌睡底靜中間常自有箇主宰執持後又說艮卦又是說動中要靜復卦便是一箇大翻轉底艮卦艮卦便是兩箇翻轉底復卦復是五陰下一陽艮是二陰上一陽陽是動底物事陰是靜底物事凡陽在下便是震動意思在中便是陷在二陰之中如人陷在窟裏相似在上則沒去處了只得止故曰艮其止陰是柔媚底物事在下則巽順陰柔不能自立須附於陽在中則是附麗之象在上則說蓋柔媚之物在上則歡悅賀孫問未發之前當戒慎恐懼提撕警覺則亦是知覺而伊川謂既有知覺卻是動何也曰未發之前須常恁地醒不是瞑然不省若瞑然不省則道理何在成甚麼大本曰常醒便是知覺否曰固是知覺曰知覺便是動否曰固是動曰何以謂之未發曰未發之前不是瞑然不省怎生說做靜得然知覺雖是動不害其為未動若喜怒哀樂則又別也曰恐此處知覺雖是動而喜怒哀樂卻未發否先生首肯曰是下面說復見天地之心說得好復一陽生豈不是動曰一陽雖動然未發生萬物便是喜怒哀樂未發否曰是淳問前日論既有知覺卻是動也某彼時一言句了及退而思大抵心本是箇活物無間於已發未發常恁地活伊川所謂動字只似活字其曰怎生言靜而以復說證之只是明靜中不是寂然不省故爾不審是否曰說得已是了但寂字未是寂含活意感則便動不只是昏然不省也淳正淳問靜中有知覺曰此是坤中不能無陽到動處卻是復只將十二卦排便見方子問蘇季明問喜怒哀樂未發之前下動字下靜字伊川曰謂之靜則可靜中須有物始得所謂靜中有物者莫是喜怒哀樂雖未形而含喜怒哀樂之理否曰喜怒哀樂乃是感物而有猶鏡中之影鏡未照物安得有影曰然則靜中有物乃鏡中之光明曰此卻說得近似但只是此類所謂靜中有物者只是知覺便是曰伊川卻云纔說知覺便是動曰此恐伊川說得太過若云知箇甚底覺箇甚底如知得寒覺得煖便是知覺一箇物事今未曾知覺甚事但有知覺在何妨其為靜不成靜坐便只是瞌睡文蔚問程子云須是靜中有物始得此莫是先生所謂知覺不昧之意否曰此只是言靜時那道理自在卻不是塊然如死底物也端蒙靜中有物如何曰有聞見之理在即是靜中有物問敬莫是靜否曰敬則自然靜不可將靜來喚做敬去偽問伊川言靜中須有物始得此物云何曰只太極也洽蘇季明嘗患思慮不定或思一事未了他事如麻又生伊川曰不可此不誠之本也須是事事能專一時便好不拘思慮與應事皆要專一而今學問只是要一箇專一若參禪修養亦皆是專一方有功修養家無底事他硬想成有釋氏有底硬想成無只是專一然他底卻難自家道理本來卻是有只要人去理會得卻甚順卻甚易或問專一可以至誠敬否曰誠與敬不同誠是實理是人前輩後都恁地做一件事直是做到十分便是誠若只做得兩三分說道今且謾恁地做恁地也得不恁地也得便是不誠敬是戒慎恐懼意又問恭與敬如何曰恭是主容貌而言貌曰恭手容恭敬是主事而言執事敬事思敬問敬如何是主事而言曰而今做一件事須是專心在上面方得不道是不好事而今若讀論語心又在孟子上如何理會得若做這一件事心又在那事永做不得又曰敬是畏底意思又曰敬是就心上說恭是對人而言又曰若有事時則此心便即專在這一事上無事則此心湛然又曰恭是謹敬是畏莊是嚴嚴威儼恪非所以事親是莊於這處使不得若以臨下則須是莊臨之以莊則敬不莊以贋之則民不敬賀孫問以心使心此句有病否曰無病其意只要此心有所主宰燾問以心使心如何曰平使之今人都由心則是妄使矣恐有誤字可學大率把捉不定皆是不仁問曰心之本體湛然虛明無一毫私欲之累則心德未嘗不存矣把捉不定則為私欲所亂是心外馳而其德亡矣曰如公所言則是把捉不定故謂之不仁今此但曰皆是不仁乃是言惟其不仁所以致把捉不定也端蒙心定者其言重以舒兩句言發於心心定則言必審故的確而舒遲不定則內必紛擾有不待思而發故淺易而急迫此亦志動氣之驗也直卿端蒙明道在扶溝時謝游諸公皆在彼問學明道一日曰諸公在此只是學某說話何不去力行二公云某等無可行者明道曰無可行時且去靜坐蓋靜坐時便涵養得本原稍定雖是不免逐物及自覺而收歛歸來也有箇著落譬如人出外去才歸家時便自有箇著身處若是不曾存養得箇本原茫茫然逐物在外便要收斂歸來也無箇著身處也廣伊川見人靜坐如何便歎其善學曰這卻是一箇總要處安卿問伊川言目畏尖物此理須克去室中率置尖物必不刺人此是如何曰疑病每如此尖物元不曾刺人他眼病只管見尖物來刺人耳伊川又一處說此稍詳有人眼病嘗見獅子伊川教他見獅子則捉來其人一面去捉捉來捉去捉不著遂不見獅子了宇第五卷問前輩說治懼室中率置尖物曰那箇本不能害人心下要恁地懼且習教不如此妄怕問習在危階上行底亦此意否曰那箇卻分明是危只教習教不怕著問習得不怕少間到危疑之際心亦不動否曰是如此胡泳或問程子有言舍己從人最為難事己者我之所有雖痛舍之猶懼守己者固而從人者輕也此說發明得好曰此程子為學者言之若聖人分上則不如此也無適也無莫也義之與比曰痛舍則大段費力矣廣問飢食渴飲冬裘夏葛何以謂之天職曰這是天教我如此飢便食渴便飲只得順他窮口腹之欲便不是蓋天只教我飢則食渴則飲何曾教我窮口腹之欲淳問取甥女歸嫁一段與前孤孀不可再嫁相反何也曰大綱恁地但人亦有不能盡者淳第六卷問程子曰義安處便為利只是當然而然便安否曰是也只萬物各得其分便是利君得其為君臣得其為臣父得其為父子得其為子何利如之此利字即易所謂利者義之和利便是義之和處然那句解得不似此語卻親切正好去解那句義初似不和而卻和截然不可犯似不和分別後萬物各得其所便是和不和生於不義義則和而無不利矣淳寓錄云義則無不和和則無不利矣第七卷程子曰為政須要有綱紀文章謹權審量讀法平價皆不可闕所謂文章者便是文飾那謹權審量讀法平價之類耳僩第八卷問必有關雎麟趾之意然後可以行周官之法度只是要得誠意素孚否曰須是自閨門衽席之微積累到薰蒸洋溢天下無一民一物不被其化然後可以行周官之法度不然則為王莽矣揚雄不曾說到此後世論治皆欠此一意淳問介甫言律一條何意也曰伯恭以凡事皆具惟律不說偶有此條遂謾載之淳第九卷律是八分書言八分方是方子律是八分書是欠些教化處必大不安今之法令謂在下位者閎祖第十卷厚之問感慨殺身者易從容就義為難如何是從容就義曰從容謂徐徐但義理不精則思之再三或汩於利害卻悔了此所以為難曰管仲如何曰管仲自是不死不問子糾正不正可學厚之問伊川不答溫公給事中事如何曰自是不容預如兩人有公事在官為守令者來問自不當答問者已是失曰此莫是避嫌否曰不然本原已不是與避嫌異可學遊定夫編明道語言釋氏有敬以直內無義以方外呂與叔編則曰有敬以直內無義以方外則與直內底也不是又曰敬以直內所以義以方外也又曰遊定夫晚年亦學禪節第十三卷問佛家如何有敬以直內曰他有箇覺察可以敬以直內然與吾儒亦不同他本是箇不耐煩底人故盡欲掃去吾儒便有是有無是無於應事接物只要處得是榦問顏子春生孟子并秋殺盡見曰仲尼無不包顏子方露出春生之意如無伐善無施勞是也使此更不露便是孔子孟子便如秋殺都發出來露其才如所謂英氣是發用處都見也又曰明道下二句便是解上三句獨時焉而已難曉伯羽第十四卷問孟子則露其才蓋以時焉而已直卿云或曰非當如此蓋時出之耳或曰戰國之習俗如此或曰世衰道微孟子不得已焉耳三者孰是曰恐只是習俗之說較穩大抵自堯舜以來至於本朝一代各自是一樣氣象不同伯羽問孟子露其才蓋亦時然而已豈孟子亦有戰國之習否曰亦是戰國之習如三代人物自是一般氣象左傳所載春秋人物又是一般氣象戰國人物又是一般氣象淳論大成從祀因問伊川於毛公不知何所主而取之曰程子不知何所見而然嘗考之詩傳其緊要處有數處如關雎所謂夫婦有別則父子親父子有親則君臣敬君臣敬則朝廷正朝廷正則王化成要之亦不多見只是其氣象大概好問退之一文士耳何以從祀曰有闢佛老之功曰如程子取其原道一篇蓋嘗讀之只打頭三句便也未穩曰且言其大概耳便如董仲舒也則有疏處蜚卿曰伊川謂西銘乃原道之祖如何曰西銘更從上面說來原道言率性之謂道西銘連天命之謂性說了道夫問如他說定名虛位如何曰後人多譏議之但某嘗謂便如此說也無害蓋此仁也此義也便是定名此仁之道仁之德此義之道義之德則道德是總名乃虛位也且須知他此語為老子設方得蓋老子謂失道而後德失德而後仁失仁而後義失義而後禮失禮而後智所以原道後面又云吾之所謂道德合仁與義言之也須先知得他為老子設方看得曰如他謂軻之死不得其傳程子以為非見得真實不能出此語而屏山以為孤聖道絕後學如何先生笑曰屏山只要說釋子道流皆得其傳耳又問如十論之作於夫子全以死生為言似以此為大事了久之乃曰他本是釋學但只是翻謄出來說許多話耳道夫問諸葛亮有儒者氣象如何曰孔明學不甚正但資質好有正大氣象問取劉璋一事如何曰此卻不是又問孔明何故不能一天下曰人謂曹操父子為漢賊以某觀之孫權真漢賊耳先主孔明正做得好時被孫權來戰兩陣到這裏便難向前了權又結托曹氏父子權之為人正如偷去劉氏一物知劉氏之興必來取此物不若結托曹氏以賊托賊使曹氏勝我不害守得一隅曹氏亡則吾亦初無利害煇遺書第一卷言韓愈近世豪傑揚子雲豈得如愈第六卷則曰揚子之學實韓子之學華華則涉道淺二說取予似相牴牾曰只以言性論之則揚子善惡混之說所見僅足以比告子若退之見得到處卻甚峻絕性分三品正是說氣質之性至程門說破氣字方有去著此退之所以不易及而第二說未得其實也謨自古罕有人說得端的惟退之原道庶幾近之卻說見大體程子謂能作許大識見尋求真箇如此他資才甚高然那時更無人制服他便做大了謂世無孔子不當在弟子之列文中子不曾有說見道體處只就外面硬生許多話硬將古今事變來厭捺說或笑似太公家教淳明道行狀說孝弟禮樂處上兩句說心下兩句說用可學問盡性至命必本於孝弟盡性至命是聖人事然必從孝弟做起否曰固是又問伊川說就孝弟中便可盡性至命今時非無孝弟人而不能盡性至命者由之而不知也謂即孝弟便可至命看來孝弟上面更有幾多事如何只是孝弟便至命曰知得這孝弟之理便是盡性至命也只如此若是做時須是從孝弟上推將去方始知得性命如孝弟為仁之本不成孝弟便是仁了但是為仁自孝弟始若是聖人如舜之孝王季之友便是盡性至命事又問程子以窮理盡性至命為一事橫渠以為不然曰若是學者便須節節做去若是聖人便只是一事二先生說須逐箇看問季路問鬼神章先生意亦如此蓋幽明始終固無二理然既是人便與神自是各一箇道理既是生便與死各自一箇道理所以程先生云一而二二而一也曰他已說出但人不去看有王某者便罵學不躐等之說說只是一箇道理看來他卻只見箇一字不見箇二字又有說判然是兩物底似又見箇二字不見箇一字且看孔子以未能對焉能說便是有次第了夔孫問周子窗前草不除去云與自家意思一般此是取其生生自得之意邪抑於生物中欲觀天理流行處邪曰此不要解得那田地自理會得須看自家意思與那草底意思如何是一般淳道夫錄云難言須是自家到那地位方看得要須見得那草與自家意思一般處問周子窗前草不除去即是謂生意與自家一般曰他也只是偶然見與自家意思相契又問橫渠驢鳴是天機自動意思曰固是但也是偶然見他如此如謂草與自家意一般木葉便不與自家意思一般乎如驢鳴與自家呼喚一般馬鳴卻便不與自家一般乎問程子觀天地生物氣象也是如此曰他也只是偶然見如此便說出來示人而今不成只管去守看生物氣象問觀雞雛可以觀仁此則須有意謂是生意初發見處曰只是為他皮殼尚薄可觀大雞非不可以觀仁但為他皮殼粗了夔孫必大曰子厚聞皇子生喜甚見飢殍食便不美者正淳嘗云與人同休戚陸子壽曰此主張題目耳先生問曾致思否對曰皆是均氣同體惟在我者至公無私故能無間斷而與之同休戚也曰固是如此然亦只說得一截如此說時真是主張題目實不曾識得今土木何嘗有私然與他物不相管人則元有此心故至公無私便都管攝之無間斷也必大
