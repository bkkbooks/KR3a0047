body:
  text: 朱子語類卷第一百三十七戰國漢唐諸子家語雖記得不純卻是當時書孔叢子是後來白撰出道夫家語只是王肅編古録雜記其書雖多疵然非肅所作孔叢子乃其所注之人僞作讀其首幾章皆法左傳句已疑之及讀其後序乃謂渠好左傳便可見孔叢子鄙陋之甚理既無足取而詞亦不足觀有一處載其君曰必然云云是何言語揚管子之書雜管子以功業著者恐未必曾著書如弟子職之為全似曲禮它篇有似莊老又有說得也卑直是小意智處不應管仲如此之陋其內政分鄉之制國語載之卻詳管子非仲所著仲當時任齊國之政事甚多稍間時又有三歸之溺決不是間功夫著書底人著書者是不見用之人也其書老莊說話亦有之想只是戰國時人收拾仲當時行事言語之類著之并附以它書問管子中說辟雍言不是學只是君和也先生曰既不是學君和又是箇甚物事而今不必論禮記所謂疑事毋質蓋無所考據不必恁地辨析耳如辟雍之義古不可考或以為學名或以為樂名無由辨證某初解詩亦疑放那裏但今說作學亦說得好了亦有人說辟雍是天子之書院大學又別子蒙國語文字多有重疊無義理處蓋當時只要作文章說得來多爾故柳子厚論為文有曰參之國語以博其趣廣國語中多要說人有不可教則勿教之之意廣問史記云申子卑卑施於名實韓子引繩墨切事情明是非其極慘核少恩皆原於道德之意曰張文潛之說得之宋齊丘作書序中所論也道夫曰東坡謂商鞅韓非得老子所以輕天下者是以敢為殘忍而無疑曰也是這意要之只是孟子所謂楊氏為我是無君也老子是箇占便宜不肯擔當做事底人自守在裏看你外面天翻地覆都不管此豈不是少恩道夫曰若柳下惠之不恭莫亦至然否曰下惠其流必至於此又曰老子著書立言皆有這箇底意思道夫諸子百家書亦有說得好處如荀子曰君子大心則天而道小心則畏義而節此二句說得好曰看得荀子資質也是箇剛明底人曰只是粗他那物事皆未成箇模樣便將來說曰揚子工夫比之荀子恐卻細膩曰揚子說到深處止是走入老莊窠窟裏去如清靜寂寞之說皆是也又如玄中所說靈根之說云云亦只是莊老意思止是說那養生底工夫爾至於佛徒其初亦只是以老莊之言駕說爾如遠法師文字與肇論之類皆成片用老莊之意然他只是說都不行至達磨來方始教人自去做所以後來有禪其傳亦如是遠問晉宋時人多說莊老然恐其亦未足以盡莊老之實說曰當時諸公只是借他言語來蓋覆那滅棄禮法之行爾據其心下汙濁紛擾如此如何理會得莊老底意思廣荀揚荀子儘有好處勝似揚子然亦難看賀孫不要看揚子他說話無好處議論亦無的實處荀子雖然是有錯到說得處也自實不如他說得恁地虛胖賀孫問東坡言三子言性孟子已道性善荀子不得不言性惡固不是然人之一性無自而見荀子乃言其惡它莫只是要人修身故立此說先生曰不須理會荀卿且理會孟子性善渠分明不識道理如天下之物有黑有白此是黑彼是白又何須辨荀揚不惟說性不是從頭到底皆不識當時未有明道之士被他說用於世千餘年韓退之謂荀揚大醇而小疵伊川曰韓子責人甚恕自今觀之他不是責人恕乃是看人不破今且於自己上作工夫立得本本立則條理分明不待辨可學或言性謂荀卿亦是教人踐履先生曰須是有是物而後可踐履今於頭段處既錯又如何踐履天下事從其是曰同須求其真箇同曰異須求其真箇異今則不然只欲立異道何由明陳君舉作夷門歌說荊公東坡不相合須當和同不知如何和得可學荀子荀子說能定而後能應此是荀子好話賀孫入乎耳而著乎心著音直略切問荀揚王韓四子曰凡人著書須自有箇規模自有箇作用處或流於申韓或歸於黃老或有體而無用或有用而無體不可一律觀且如王通這人於世務變故人情物態施為作用處極見得分曉只是於這作用曉得處卻有病韓退之則於大體處見得而於作用施為處卻不曉如原道一篇自孟子後無人似它見得郊焉而天神格廟焉而人鬼享以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當說得極無疵只是空見得箇本原如此下面工夫都空疏更無物事撐住襯簟所以於用處不甚可人意緣他費工夫去作文所以讀書者只為作文用自朝至暮自少至老只是火急去弄文章而於經綸實務不曾究心所以作用不得每日只是招引得幾箇詩酒秀才和尚度日有些工夫只了得去磨煉文章所以無工夫來做這邊事兼他說我這箇便是聖賢事業了自不知其非如論文章云自屈原荀卿孟軻司馬遷相如揚雄之徒卻把孟軻與數子同論可見無見識都不成議論荀卿則全是申韓觀成相一篇可見他見當時庸君暗主戰鬥不息憤悶惻怛深欲提耳而誨之故作此篇然其要卒歸於明法制執賞罰而已他那做處粗如何望得王通揚雄則全是黃老某嘗說揚雄最無用真是一腐儒他到急處只是投黃老如反離騷并老子道德之言可見這人更無說自身命也奈何不下如何理會得別事如法言一卷議論不明快不了決如其為人他見識全低語言極呆甚好笑荀揚二人自不可與王韓二人同日語問王通病痛如何曰這人於作用都曉得急欲見之於用故便要做周公底事業便去上書要興太平及知時勢之不可為做周公事業不得則急退而續詩書續玄經又要做孔子底事業殊不知孔子之時接乎三代有許多典謨訓誥之文有許多禮樂法度名物度數數聖人之典章皆在於是取而纘述方做得這箇家具成王通之時有甚麼典謨訓誥有甚麼禮樂法度乃欲取漢魏以下者為之書則欲以七制命議之屬為續書七制之說亦起於通有高文武宣光武明章制蓋以比二典也詩則欲取曹劉沈謝者為續詩續得這般詩書發明得箇甚麼道理自漢以來紹令之稍可觀者不過數箇如高帝求賢詔雖好又自不純文帝勸農武帝薦賢制策輪臺之悔只有此數詔略好此外蓋無那一篇比得典謨訓誥便求一篇如君牙冏命秦誓也無曹劉沈謝之時又那得一篇如鹿鳴四牡大明文王關雎鵲巢亦有學為四句古詩者但多稱頌之詞言皆過實不足取信樂如何有雲英咸韶濩武之樂禮又如何有伯夷周公制作之禮它只是急要做箇孔子又無佐證故裝點幾箇人來做堯舜湯武皆經我刪述便顯得我是聖人如中說一書都是要學孔子論語說泰伯三以天下讓它便說陳思王善讓論語說殷有三仁它便說荀氏有二仁又提幾箇公卿大夫來相答問便比當時門人弟子正如梅聖俞說歐陽永叔它自要做韓退之卻將我來比孟郊王通便是如此它自要做孔夫子便胡亂捉別人來為聖為賢殊不知秦漢以下君臣人物斤兩已定你如何能加重中說一書固是後人假託非王通自著然畢竟是王通平生好自誇大續詩續書紛紛述作所以起後人假託之故後世子孫見它學周公孔子學不成都冷淡了故又取一時公卿大夫之顯者纘緝附會以成之畢竟是王通有這樣意思在雖非它之過亦它有以啓之也如世人說坑焚之禍起於荀卿荀卿著書立言何嘗教人焚書坑儒只是觀它無所顧藉敢為異論則其末流便有坑焚之理然王通比荀揚又敻別王通極開爽說得廣闊緣它於事上講究得精故於世變興亡人情物態更革沿襲施為作用先後次第都曉得識得箇仁義禮樂都有用處若用於世必有可觀只可惜不曾向上透一著於大體處有所缺闕所以如此若更曉得高處一著那裏得來只細看它書便見他極有好處非特荀揚道不到雖韓退之也道不到韓退之只曉得箇大綱下面工夫都空虛要做更無下手處其作用處全疏如何敢望王通然王通所以如此者其病亦只在於不曾子細讀書他只見聖人有箇六經便欲別做一本六經將聖人腔子填滿裏面若是子細讀書知聖人所說義理之無窮自然無工夫間做他死時極後生只得三十餘歲它卻火急要做許多事或云若少假之年必有可觀曰不然它氣象局促只如此了他做許多書時方只二十餘歲孔子七十歲方繫易作春秋而王通未三十皆做了聖人許多事業氣象去不得了宜其死也又曰中說一書如子弟記它言行也煞有好處雖云其書是後人假託不會假得許多須真有箇人坯模如此方裝點得成假使懸空白撰得一人如此則能撰之人亦自大有見識非凡人矣僩以下論荀揚王韓及諸子賈誼之學雜他本是戰國縱橫之學只是較近道理不至如儀秦蔡范之甚爾他於這邊道理見得分數稍多所以說得較好然終是有縱橫之習緣他根腳只是從戰國中來故也漢儒惟董仲舒純粹其學甚正非諸人比只是困苦無精彩極好處也只有正誼明道兩句下此諸子皆無足道如張良諸葛亮固正只是太粗王通也有好處只是也無本原工夫卻要將秦漢以下文飾做箇三代他便自要比孔子不知如何比得他那斤兩輕重自定你如何文飾得如續詩續書玄經之作盡要學箇孔子重做一箇三代如何做得如續書要載漢以來詔令他那詔令便載得發明得甚麼義理發明得甚麼政事只有高帝時三詔令稍好然已不純如曰肯從吾游者吾能尊顯之此豈所以待天下之士哉都不足録三代之書誥詔令皆是根源學問發明義理所以燦然可為後世法如秦漢以下詔令濟得甚事緣他都不曾將心子細去讀聖人之書只是要依他箇模子見聖人作六經我也學他作六經只是將前人腔子自做言語填放他腔中便說我這箇可以比並聖人聖人做箇論語我便做中說如揚雄太玄法言亦然不知怎生比並某嘗說自孔孟滅後諸儒不子細讀得聖人之書曉得聖人之旨只是自說他一副當道理說得卻也好看只是非聖人之意硬將聖人經旨說從他道理上來孟子說以意逆志者以自家之意逆聖人之志如人去路頭迎接那人相似或今日接著不定明日接著不定或那人來也不定不來也不定或更遲數日來也不定如此方謂之以意逆志今人讀書卻不去等候迎接那人只認硬趕捉那人來更不由他情願又教它莫要做聲待我與你說道理聖賢已死它看你如何說他又不會出來與你爭只是非聖賢之意他本要自說他一樣道理又恐不見信於人偶然窺見聖人說處與己意合便從頭如此解將去更不子細虛心看聖人所說是如何正如人販私鹽擔私貨恐人捉他須用求得官員一兩封書并掩頭行引方敢過場務偷免稅錢今之學者正是如此只是將聖人經書拖帶印證己之所說而已何常真實得聖人之意卻是說得新奇巧妙可以欺惑人只是非聖人之意此無他患在於不子細讀聖人之書人若能虛心下意自莫生意見只將聖人書玩味讀誦少間意思自從正文中迸出來不待安排不待杜撰如此方謂之善讀書且屈原一書近偶閲之從頭被人錯解了自古至今訛謬相傳更無一人能破之者而又為說以增飾之看來屈原本是一箇忠誠惻怛愛君底人觀他所作離騷數篇盡是歸依愛慕不忍捨去懷王之意所以拳拳反復不能自已何嘗有一句是罵懷王亦不見他有偏躁之心後來沒出氣處不奈何方投河殞命而今人句句盡解做罵懷王枉屈說了屈原只是不曾平心看他語意所以如此僩問揚雄曰雄之學似出於老子如太玄曰潛心於淵美厥靈根測曰潛心於淵神不昧也乃老氏說話問太玄分贊於三百六十六日下不足者乃益以踦贏固不是如易中卦氣如何曰此出於京房亦難曉如太玄中推之蓋有氣而無朔矣問伊川亦取雄太玄中說如何曰不是取他言他地位至此耳又問賈誼與仲舒如何曰誼有戰國縱橫之氣仲舒儒者但見得不透曰伊川於漢儒取大毛公如何曰今亦難考但詩注頗簡易不甚泥章句問文中子如何曰渠極識世變有好處但太淺決非當時全書如說家世數人史中並無名又關朗事與通年紀甚懸絶可學謂可惜續經已失不見渠所作如何曰亦何必見只如續書有桓榮之命明帝如此則榮可知使榮果有帝王之學則當有以開導明帝必不至為異教所惑如秋風之詩乃是末年不得已之辭又何足取渠識見不遠卻要把兩漢事與三代比隆近來此等說話極勝須是於天理人欲處分別得明如唐太宗分明是殺兄劫父代位又何必為之分別說沙隨云史記高祖泛舟於池中則明當早參之語皆是史之潤飾看得極好此豈小事高祖既許之明早入辨而又卻泛舟則知此事經史臣文飾多矣問禪位亦出於不得已曰固是它既殺元良又何處去明皇殺太平公主亦如此可畏可學子升問仲舒文中子曰仲舒本領純正如說正心以正朝廷與命者天之令也以下諸語皆善班固所謂純儒極是至於天下國家事業恐施展未必得王通見識高明如說治體處極高但於本領處缺如古人明德新民至善等處皆不理會卻要鬥合漢魏以下之事整頓為法這便是低處要之文中論治體處高似仲舒而本領不及爽似仲舒而純不及因言魏徵作隋史更無一語及文中自不可曉嘗考文中世系并看阮逸龔鼎臣注及南史劉夢得集次日因考文中世系四書不同殊不可曉又檢李泰伯集先生因言文中有志於天下亦識得三代制度較之房魏諸公文稍有些本領只本原上工夫都不曾理會若究其議論本原處亦只自老莊中來木之先生令學者評董仲舒揚子雲王仲淹韓退之四子優劣或取仲舒或取退之曰董仲舒自是好人揚子雲不足道這兩人不須說只有文中子韓退之這兩人疑似試更評看學者亦多主退之曰看來文中子根腳淺然卻是以天下為心分明是要見諸事業天下事它都一齊入思慮來雖是卑淺然卻是循規蹈矩要做事業底人其心卻公如韓退之雖是見得箇道之大用是如此然卻無實用功處它當初本只是要討官職做始終只是這心他只是要做得言語似六經便以為傳道至其每日功夫只是做詩博奕酣飲取樂而已觀其詩便可見都襯貼那原道不起至其做官臨政也不是要為國做事也無甚可稱其實只是要討官職而已僩立之問揚子與韓文公優劣如何曰各自有長處文公見得大意已分明但不曾去子細理會如原道之類不易得也揚子雲為人深沈會去思索如陰陽消長之妙他直是去推求然而如太玄之類亦是拙底工夫道理不是如此蓋天地間只有箇奇耦奇是陽耦是陰春是少陽夏是太陽秋是少陰冬是太陰自二而四自四而八只恁推去都走不得而揚子卻添兩作三謂之天地人事事要分作三截又且有氣而無朔有日星而無月恐不是道理亦如孟子既說性善荀子既說性惡他無可得說只得說箇善惡混若有箇三底道理聖人想自說了不待後人說矣看他裏面推得辛苦卻就上面說些道理亦不透徹看來其學似本於老氏如惟清惟勝惟淵惟默之語皆是老子意思韓文公於仁義道德上看得分明其剛領已正卻無他這箇近於老子底說話又問文中子如何曰文中子之書恐多是後人添入真僞難見然好處甚多但一一似聖人恐不應恰限有許多事相協得好如見甚荷蕢隱者之類不知如何得恰限有這人若道他都是粧點來又恐粧點不得許多然就其中惟是論世變因革處說得極好又問程子謂揚子之學實韓子之學華是如何曰只緣韓子做間雜言語多故謂之華若揚子雖亦有之不如韓子之多時舉揚子雲韓退之二人也難說優劣但子雲所見處多得之老氏在漢末年難得人似它亦如荀子言語亦多病但就彼時亦難得一人如此子雲所見多老氏者往往蜀人有嚴君平源流且如太玄就三數起便不是易中只有陰陽奇耦便有四象如春為少陽夏為老陽秋為少陰冬為老陰揚子雲見一二四都被聖人說了卻杜撰就三上起數問溫公最喜太玄曰溫公全無見處若作太玄何似作曆老泉嘗非太玄之數亦說得是又問與康節如何曰子雲何敢望康節康節見得高又超然自得退之卻見得大綱有七八分見識如原道中說得仁義道德煞好但是他不去踐履玩味故見得不精微細密伊川謂其學華者只謂愛作文章如作詩說許多間言語皆是華也看得來退之勝似子雲南升問先生王氏續經說云云荀卿固不足以望之若房杜輩觀其書則固嘗往來於王氏之門其後來相業還亦有得於王氏道否曰房杜如何敢望文中子之萬一其規模事業無文中子髣佛某嘗說房杜只是箇村宰相文中子不干事他那制度規模誠有非後人之所及者又問仲舒比之如何曰仲舒卻純正然亦有偏又是一般病韓退之卻見得又較活然亦只是見得下面一層上面一層都不曾見得大概此諸子之病皆是如此都只是見得下面一層源頭處都不曉所以伊川說西銘是原道之宗祖蓋謂此也僩只有董仲舒資質純良摸索道得數句著如正誼不謀利之類然亦非它真見得這道理恪董子問性者生之質曰不然性者生之理氣者生之質已有形狀問仲舒云性者生之質也不是只當云性者生之理也氣者生之質也璘謂性者生之質本莊子之言曰莊子有云形體保神各有儀則謂之性前輩謂此說頗好如有物有則之意璘問仲舒以情為人之欲如何曰也未害蓋欲為善欲為惡皆人之情也道夫童問董仲舒見道不分明處曰也見得鶻突如命者天之令性者生之質情者人之欲命非聖人不行性非教化不成情非制度不節等語似不識性善模樣又云明於天性知自貴於物知自貴於物然後知仁義知仁義然後重禮節重禮節然後安處善安處善然後樂循理又似見得性善模樣終是說得騎墻不分明端的淳仲舒言命者天之令性者生之質如此說固未害下云命非聖人不行便牽於對句說開去了如正誼明道之言卻自是好道夫問或謂此語是有是非無利害如何曰是不論利害只論是非理固然也要亦當權其輕重方盡善無此亦不得只被今人只知計利害於是非全輕了道夫建寧出正誼明道如何論先生曰正其誼不謀其利明其道不計其功誼必正非是有意要正道必明非是有意要明功利自是所不論仁人於此有不能自已者師出無名事故不成明其為賊敵乃可服此便是有意立名以正其誼在浙中見諸葛誠之千能云仁人正其義不謀其利明其道不計其功仲舒說得不是只怕不是義是義必有利只怕不是道是道必有功先生謂才如此人必求功利而為之非所以為訓也固是得道義則功利自至然而有得道義而功利不至者人將於功利之徇而不顧道義矣璘仲舒所立甚高後世之所以不如古人者以道義功利關不透耳其議胸奴一節婁敬賈誼智謀之士為之亦不如此劉淳叟問漢儒何以溺心訓詁而不及理曰漢初諸儒專治訓詁如教人亦只言某字訓某字自尋義理而已至西漢末年儒者漸有求得稍親者終是不曾見全體問何以謂之全體曰全體須徹頭徹尾見得方是且如匡衡問時政亦及治性情之說及到得他入手做時又卻只修得些小宗廟禮而已翼奉言見道知王治之象見經知人道之務亦自好了又卻只教人主以陰陽日辰貪狠廉貞之類辨君子小人以此觀之他只時復窺見得些子終不曾見大體也唯董仲舒三篇說得稍親切終是不脫漢儒氣味只對江都易王云仁人正其義不謀其利明其道不計其功方無病又是儒者語董仲舒才不及陸宣公而學問過之張子房近黃老而隱晦不露諸葛孔明近申韓節揚子雲出處非是當時善去亦何不可揚揚子問揚子避礙通諸理之說是否曰大概也似只是言語有病問莫不是避字有病否曰然少間處事不看道理當如何便先有箇依違閃避之心矣僩學之為王者事不與上文屬只是言人君不可不學底道理所以下文云堯舜禹湯文武汲汲仲尼皇皇以數聖人之盛德猶且如此問仲尼皇皇如何曰夫子雖無王者之位而有王者之德故作一處稱揚道夫揚子雲謂南北為經東西為緯故南北為縱東西為橫六國之勢南北相連則合縱秦據東西以橫破縱也蓋南北長東西短南北直東西橫錯綜於其間也敬仲德隆則晷星星隆則晷德晷影也猶影之隨形也蓋德隆則星隨德而見星隆則人事反隨星而應僩揚子雲云月未望則載魄於西既望則終魄於東其紐於日乎先生舉此問學者是如何衆人引諸家注語古注解載作始魄作光溫公改魄作朏先生云皆非是皆不合久之乃曰只曉得箇載字便都曉得載者如加載之載如老子云載營魄左氏云從之載正是這箇載字諸家都亂說只有古注解云月未望則光始生於西面以漸東滿既望則光消虧於西面以漸東盡此兩句略通而未盡此兩句盡在其紐於日乎一句上蓋以日為主月之光也日載之光之終也日終之載猶加載之載又訓上如今人上光上采色之上蓋初一二間時日落於酉月是時同在彼至初八九日落在酉則月已在午至十五日相對日落於酉而月在卯此未望而載魄於西蓋月在東日則在西日載之光也及日與月相去愈遠則光漸消而魄生少間月與日相蹉過日卻在東月卻在西故光漸至東盡則魄漸復也當改古注云日加魄於西面以漸東滿日復魄於西面以漸東盡其載也日載之其終也日終之皆繫於日又說秦周之士貴賤拘肆皆繫於上之人猶月之載魄終魄皆繫於日也故曰其紐於日乎其載其終皆向日也溫公云當改載魄之魄作朏都是曉揚子雲說不得故欲如此改老子所謂載營魄便是如此載營魄抱一能無離乎一便是魄抱便是載蓋以火養水也魄是水以火載之營字恐是熒字光也古字或通用不可知或人解作經營之營亦得次日又云昨夜說終魄於東終字亦未是昨夜解終作復言光漸消而復其魄也蓋終魄亦是日光加魄於東而終之也始者日光加魄之西以漸東滿及既望則日光旋而東以終盡月之魄則魄之西漸復而光漸消於魄之西矣因又說老子載營魄昨日見溫公解得揚子載魄沒理會因疑其解老子亦必曉不得及看果然但注云載營魄闕只有此四字而已潁濱解云神載魄而行言魄是箇沈滯之物須以神去載他令他外舉其說云聖人則以魄隨神而動衆人則神役於魄據他只於此間如此強解得若以解揚子則解不得矣又解魄做物只此一句便錯耳目之精明者為魄如何解做物得又以一為神亦非一正指魄言神抱魄火抱水也溫公全不理會修養之學所以不曉潁濱一生去理會修養之術以今觀之全曉不得都說錯了河上公固是胡說如王弼也全解錯了王弼解載作處魄作所居言常處於所居也更是胡說據潁濱解老子全不曉得老子大意他解神載魄而行便是箇剛強外舉底意思老子之意正不如此只是要柔伏退步耳觀他這一章盡說柔底意思云載營魄抱一能無離乎專氣致柔能如嬰兒乎天門開闢能為雌乎老子一書意思都是如此它只要退步不與你爭如一箇人叫哮跳躑我這裏只是不做聲只管退步少間叫哮跳躑者自然而屈而我之柔伏應自有餘老子心最毒其所以不與人爭者乃所以深爭之也其設心措意都是如此間時他只是如此柔伏遇著那剛強底人它便是如此待你張子房亦是如此如云推天下之至柔馳騁天下之至堅又云以無為取天下這裏便是它無狀處據此便是它柔之發用功效處又楚詞也用載營魄字其實與潁濱解老子同若楚詞恐或可如此說以此說老子便都差了張毅然漕試回先生問曰今歲出何論題曰論題云云出文中子曰如何做張曰大率是罵他者多先生笑曰他雖有不好處也須有好處故程先生言他雖則附會成書其間極有格言荀揚道不到處豈可一向罵他友仁請曰願聞先生之見曰文中子他當時要為伊周事業見道不行急急地要做孔子他要學伊周其志甚不卑但不能勝其好高自大欲速之心反有所纍二帝三王卻不去學卻要學兩漢此是他亂道處亦要作一篇文字說這意思友仁文中子徐問文中子好處與不好處曰見得道理透後從高視下一目瞭然今要去揣摩不得淳文中子其間有見處也即是老氏又其閒被人夾雜今也難分別但不合有許多事全似孔子孔子有荷蕢等人它也有許多人便是裝點出來其間論文史及時事世變煞好今浙間英邁之士皆宗之南升文中子中說被人亂了說治亂處與其他好處極多但向上事只是老釋如言非老莊釋迦之罪并說若云云處可見揚曰過法言曰大過之揚文中子論時事及文史處儘有可觀於文取陸機史取陳壽曾將陸機文來看也是平正升卿房杜於河汾之學後來多有議論且如中說只是王氏子孫自記亦不應當時開國文武大臣盡其學者何故盡無一語言及其師兼所記其家世事考之傳記無一合者文中子看其書忒裝點所以使人難信如說諸名卿大臣多是隋末所未見有者兼是他言論大綱雜霸凡事都要硬做如說禮樂治體之類都不消得從正心誠意做出又如說安我所以安天下存我所以厚蒼生都是為自張本做雜霸鎡基黃德柄問續書天子之義制詔志策有四大臣之義命訓對讚議誡諫有七如何曰這般所在極膚淺中間說話大綱如此但看世俗所稱道便喚做好都不識如云朝董公孫之對據道理看只有董仲舒為得如公孫已是不好朝錯是話箇甚麼又如自敘許多說話盡是夸張考其年數與唐煞遠如何唐初諸名卿皆與說話若果與諸名卿相處一箇人恁地自標致史傳中如何都不見說因說史傳儘有不可信處嘗記五峰說看太宗殺建成元吉事尚有不可憑處如云先一日太宗密以其事奏高祖高祖省表愕然報曰明當鞫問汝宜早參只將這幾句看高祖且教來日鞫問如何太宗明日便擁兵入內又云上已召裴寂蕭瑀陳叔達欲按其事又云上方泛舟海池豈有一件事恁麼大兄弟搆禍如此之極為父者何故恁地恬然無事此必有不足信者只左傳是有多難信處如趙盾一事後人費萬千說話與出脫其實此事甚分明如司馬昭之弒高貴鄉公他終不成親自下手必有抽戈用命如賈充成濟之徒如曰司馬公畜養汝等正為今日今日之事無所問也看左傳載靈公欲殺趙盾今日要殺殺不得明日要殺殺不得只是一箇人君要殺一臣最易為力恁地殺不得也是他大段強了今來許多說話自是後來三晉既得政撰造掩覆反有不可得而掩者矣物來若不能明事至若不能辨是吾心大段昏在賀孫文中子議論多是中間暗了一段無分明其間弟子問答姓名多是唐輔相恐亦不然蓋諸人更無一語及其師人以為王通與長孫無忌不足故諸人懼無忌而不敢言亦無此理如鄭公豈畏人者哉七制之主亦不知其何故以七制名之此必因其續書中曾採七君事跡以為書而名之曰七制如二典禮例今無可考大率多是依倣而作如以董常如顏子則是以孔子自居謂諸公可為輔相之類皆是撰成要安排七制之君為它之堯舜考其事跡亦多不合劉禹錫作歙池江州觀察王公墓碑乃仲淹四代祖碑中載祖諱多不同及阮逸所注并載關朗等事亦多不實王通大業中死自不同時如推說十七代祖亦不應遼遠如此唐李翱已自論中說可比太公家教則其書之出亦已久矣伊川謂文中子有些格言被後人添入壞了看來必是阮逸諸公增益張大復借顯者以為重耳今之僞書甚多如鎮江府印關子明易并麻衣道者易皆是僞書麻衣易正是南康戴紹韓所作昨在南康觀其言論皆本於此及一訪之見其著述大率多類麻衣文體其言險側輕佻不合道理又嘗見一書名曰子華子說天地陰陽亦說義理人事皆支離妄作至如世傳繁露玉杯等書皆非其實大抵古今文字皆可考驗古文自是莊重至如孔安國書序并注中語多非安國所作蓋西漢文章雖粗亦徑今書序只是六朝軟慢文體因舉史記所載湯誥并武王伐紂言詞不典不知是甚底齊東野人之語也謨問文中子之學曰它有箇意思以為堯舜三代也只與後世一般也只是偶然做得著問它續詩續書意只如此因舉答賈瓊數處說曰近日陳同父便是這般說話它便忌程先生說帝王以道治天下後世只是以智力把持天下正緣這話說得它病處它便忌問玄經尤可疑只緣獻帝奔北便以為天命已歸之遂帝魏曰今之注本是阮逸注龔鼎臣便有一本注後面敘他祖都與文中子所說不同說他先已仕魏不是後來方奔去明日尋看又問它說權義舉而皇極立如何曰如皇極某曾有辨今說權義也不是蓋義是活物權是稱錘義是稱星義所以用權今似它說卻是以權為嫂溺援之之義以義為授受不親之禮但不如此問義便有隨時底意思曰固是問它只緣以玄經帝魏生此說曰便是它大本領處不曾理會縱有一二言語可取但偶然耳問他以心跡分看了便是錯處曰它說何憂何疑也只是外面恁地裏面卻不恁地了又問動靜見天地之心說得似不然曰它意思以方員為形動靜為理然亦無意思而今自家若見箇道理了見它這說話都似不曾說一般夔孫文中子續經猶小兒豎瓦屋然世儒既無高明廣大之見因遂尊崇其書方子天下皆憂吾獨得不憂天下皆疑吾獨得不疑又曰樂天知命吾何憂窮理盡性吾何疑蓋有當憂疑者有不當憂疑者然皆心也文中子以為有心跡之判故伊川非之又曰惟其無一己之憂疑故能憂疑以天下惟其憂以天下疑以天下故無一己之憂疑道夫大抵觀聖人之出處須看他至誠懇切處及灑然無纍處文中子說天下皆憂吾獨得不憂天下皆疑吾獨得不疑又曰窮理盡性吾何疑樂天知命吾何憂此說是或問文中子僭擬古人是如何曰這也是他志大要學古人如退之則全無要學古人底意思柳子厚雖無狀卻又占便宜如致君澤民事也說要做退之則只要做官如末年潮州上表此更不足說了退之文字儘好末年尤好燾韓退之卻有些本領非歐公比原道其言雖不精然皆實大綱是韓子器之問博愛之謂仁曰程先生之說最分明只是不子細看要之仁便是愛之體愛便是仁之用蔣明之問原道起頭四句恐說得差且如博愛之謂仁愛如何便盡得仁曰只為他說得用又遺了體明之又問四字先後當如何曰公去思量久後自有著落震或問由是而之焉之謂道曰此是說行底非是說道體問足乎己無待於外之謂德曰此是說行道而有得於身者非是說自然得之於天者節子耕問定名虛位曰恁地說亦得仁義是實有的道德卻是總名凡本末小大無所不該如下文說道有君子有小人德有凶有吉是也人傑録詳問仁與義為定名道與德為虛位虛位之義如何曰亦說得通蓋仁義禮智是實此道德字是通上下說卻虛如有仁之道義之道仁之德義之德此道德只隨仁義上說是虛位他又自說道有君子小人德有凶有吉謂吉人則為吉德凶人則為凶德君子行之為君子之道小人行之為小人之道如道二仁與不仁君子道長小人道消之類若是志於道據於德方是好底方是道德之正問原道上數句如何曰首句極不是定名虛位卻不妨有仁之道義之道仁之德義之德故曰虛位大要未說到頂上頭故伊川云西銘原道之宗祖可學坐井觀天謂天只如此大小是他見得如此須出井來看方得必大退之謂以之為人則愛而公愛公二字甚有意義原道中舉大學卻不說致知在格物一句蘇子由古史論舉中庸不獲乎上後卻不說不明乎善不誠乎身二句這兩箇好做對司馬溫公說儀秦處說立天下之正位行天下之大道卻不說居天下之廣居看得這樣底都是箇無頭學問夔孫韓子原性曰人之性有五最識得性分明蔣兄因問博愛之謂仁四句如何曰說得卻差仁義兩句皆將用做體看事之合宜者為義仁者愛之理若曰博愛曰行而宜之則皆用矣蓋卿韓文原性人多忽之卻不見他好處如言所以為性者五曰仁義禮智信此語甚實方子問韓文公說人之所以為性者五是他實見得到後如此說耶惟復是偶然說得著曰看它文集中說多是間過日月初不見他做工夫處想只是才高偶然見得如此及至說到精微處又卻差了因言惟是孟子說義理說得來精細明白活潑潑地如荀子空說許多使人看著如喫糙米飯相似廣問退之原性三品之說是否曰退之說性只將仁義禮智來說便是識見高處如論三品亦是但以某觀人之性豈獨三品須有百千萬品退之所論卻少了一氣字程子曰論性不論氣不備論氣不論性不明此皆前所未發如夫子言性相近若無習相遠一句便說不行如人生而靜靜固是性只著一生字便是帶著氣質言了但未嘗明說著氣字惟周子太極圖卻有氣質底意思程子之論又自太極圖中見出來也韓文公原鬼不知鬼神之本只是在外說箇影子至問韓子稱孟子醇乎醇荀與揚大醇而小疵程子謂韓子稱孟子甚善非見得孟子意亦道不到其論荀揚則非也荀子極偏駁只一句性惡大本已失揚子雖少過然亦不識性更說甚道至謂韓子既以失大本不識性者為大醇則其稱孟子醇乎醇亦只是說得到未必真見得到先生曰如何見得韓子稱荀揚大醇處便是就論性處說至云但據程子有此議論故至因問及此先生曰韓子說荀揚大醇是泛說與田駢慎到申不害韓非之徒觀之則荀揚為大醇韓子只說那一邊湊不著這一邊若是會說底說那一邊亦自湊著這一邊程子說荀子極偏駁揚子雖少過此等語皆是就分金稱上說下來今若不曾看荀子揚子則所謂偏駁雖少過等處亦見不得至問孟子謂楊墨之道不息孔子之道不著韓文公推尊孟氏闢楊墨之功以為不在禹下而讀墨一篇卻謂孔子必用墨子墨子必用孔子者何也曰韓文公第一義是去學文字第二義方去窮究道理所以看得不親切如云其行己不敢有愧於道他本只是學文其行己但不敢有愧於道爾把這箇做第二義似此樣處甚多先生考訂韓文公與大顛書堯卿問曰觀其與孟簡書是當時已有議論而與之分解不審有崇信之意否曰真箇是有崇信之意他是貶從那潮州去無聊後被他說轉了義剛曰韓公雖有心學問但於利祿之念甚重曰他也是不曾去做工夫他於外面皮殼子上都見得安排位次是恁地於原道中所謂寒而後為之衣飢然後為之食為宮室為城郭等皆說得好只是不曾向裏面省察不曾就身上細密做工夫只從粗處去不見得原頭來處如一港水他只見得是水卻不見那原頭來處是如何把那道別做一件事道是可以行於世我今只是恁地去行故立朝議論風采亦有可觀卻不是從裏面流出平日只以做文吟詩飲酒博戲為事及貶潮州寂寥無人共吟詩無人共飲酒又無人共博戲見一箇僧說道理便為之動如云所示廣大深迥非造次可喻不知大顛與他說箇什麼得恁地傾心信向韓公所說底大顛未必曉得大顛所說底韓公亦見不破但是它說得恁地好後便被它動了安卿曰博愛之謂仁等說亦可見其無原頭處曰以博愛為仁則未有博愛以前不成是無仁義剛曰他說明明德卻不及致知格物緣其不格物所以恁地先生曰他也不曉那明明德若能明明德便是識原頭來處了又曰孟子後荀揚淺不濟得事只有箇王通韓愈好又不全安卿曰他也只是見不得十分不能止於至善曰也是又曰淳録云問禪學從何起曰云云佛學自前也只是外面粗說到梁達磨來方說那心性然士大夫未甚理會淳録作信向做工夫及唐中宗時有六祖禪學專就身上做工夫直要求心見性士大夫才有向裏者無不歸他去韓公當初若早有向裏底工夫亦早落在中去了又曰亦有一般人已做得工夫道理上已有所見只它些小近似處不知只是近似便把做一般這裏才一失腳便陷他裏面去了此等不盡然亦間有然者義剛退之與大顛書歐公云實退之語東坡卻罵以為退之家奴隸亦不肯如此說但是陋儒為之復假托歐公語以自蓋然觀集古録歐公自有一跋說此書甚詳東坡應是未見集古録耳看得來只是錯字多歐公是見它好處其中一兩段不可曉底都略過了東坡是只將他不好處來說義剛退之晚來覺沒頓身己處如招聚許多人博塞去聲為戲所與交如靈師惠師之徒皆飲酒無賴及至海上見大顛壁立萬仞自是心服其言實能外形骸以理自勝不為事物侵亂此是退之死款樂天莫年賣馬遣妾後亦落莫其事可見歐公好事金石碑刻都是沒著身己處卻不似參禪修養人猶是貼著自家身心理會也宋子飛言張魏公謫永州時居僧寺每夜與子弟賓客盤膝環坐於長連榻上有時說得數語有時不發一語默坐至更盡而寢率以為常李德之言東坡晚年卻不衰先生曰東坡蓋是夾雜些佛老添得又鬧熱也方子韓退之云磨礱去圭角浸潤著光精又曰沈浸醲郁又曰沈潛乎訓義反復乎句讀杜元凱云優而游之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也而今學者都不見這般意思又曰磨礱去圭角易曉浸潤著光精此句最好人多不知又曰只是將聖人言語只管浸灌少間自是生光精氣象自別僩包顯道曰新史做得韓退之傳較不甚實先生曰新史最在後收拾得事須備但是它要去做文章凛地說得不條達據某意只將那事說得條達便是文章而今要去做言語凛地說得不分明義剛韓文公似只重皇甫湜以墓志付之李翱只令作行狀翱作得行狀絮但湜所作墓志又顛蹶李翱卻有些本領如復性書有許多思量歐陽公也只稱韓李義剛又一條云退之卻喜皇甫湜卻不甚喜李翱後來湜為退之作墓志卻說得無緊要不如李翱行狀較著實蓋李翱為人較朴實皇甫湜較落魄浩曰唐時莫是李翱最識道理否曰也只是從佛中來浩曰渠有去佛齊文闢佛甚堅曰只是粗跡至說道理卻類佛問退之見得不甚分明曰他於大節目處又卻不錯亦未易議浩云莫是說傳道是否曰亦不止此他氣象大抵大又歐陽只說韓李不曾說韓柳浩韓退之歐陽永叔所謂扶持正學不雜釋老者也然到得緊要處更處置不行更說不去便說得來也拙不分曉緣他不曾去窮理只是學作文所以如此東坡則雜以佛老到急處便添入佛老相和去聲傾戶孔切瞞人如裝鬼戲放煙火相似且遮人眼如諸公平日擔當正道自視如何及才議學校便說不行臨了又卻只是詞賦好是甚麼議論如王介甫用三經義取士及元祐間議廢之復詞賦爭辨一上臨了又卻只是說經義難考詞賦可以見人之工拙易考所爭者只此而已大可笑也僩韓退之及歐蘇諸公議論不過是主於文詞少間卻是邊頭帶說得些道理其本意終自可見木之
