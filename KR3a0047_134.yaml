body:
  text: 朱子語類卷第一百三十四歷代一司馬遷才高識亦高但粗率閎祖以下歷代史太史公書疏爽班固書密塞振司馬子長動以孔子為證不知是見得亦且是如此說所以伯恭每發明得非細只恐子長不敢承領耳史記亦疑當時不曾得刪改脫卧高祖紀記迎太公處稱高祖此樣處甚多高祖未崩安得高祖之號漢書盡改之矣左傳只有一處云陳桓公有寵於王曹器遠說伯夷傳得孔子而名益彰云云先生曰伯夷當初何嘗指望孔子出來發揮他又云黃屋左纛朝以十月葬長陵此是大事所以書在後先生曰某嘗謂史記恐是箇未成底文字故記載無次序有疏闊不接續處如此等是也閎祖因言班固作漢書不合要添改史記字行文亦有不識當時意思處如七國之反史記所載甚疏略卻都是漢道理班固所載雖詳便卻不見此意思呂東萊甚不取班固如載文帝建儲詔云楚王季父也春秋高閲天下之義理多矣明於國家之大體吳王於朕兄也惠仁以好德淮南王弟也秉德以陪朕豈不為豫哉固遂節了吳王一段只於淮南王下添皆字云皆秉德以陪朕蓋陪字訓二以此言弟則可言兄可乎今史記中卻載全文又曰屏山卻云固作漢紀有學春秋之意其敘傳云為春秋考紀又曰遷史所載皆是隨所得者載入正如今人草卧如酈食其踞洗前面已載一段末後又載與前說不同蓋是兩處說已寫入了又據所得寫入一段耳顏師古注前漢書如此詳猶有不可曉者況其他史無注者漢宣渭上詔令單于毋謁范升劾周黨伏而不謁謁不知是何禮數無注疑是君臣之禮見而自通其名然不可考矣方子必大録云想謁禮必又重漢書有秀才做底文章有婦人做底文字亦有載當時獄辭者秀才文章便易曉當時文字多碎句難讀尚書便有如此底周官只如今文字太齊整了漢書言幾者動之微吉凶之先見者也又如豈若匹夫匹婦之為諒自經於溝瀆而人莫之知也添一箇人字甚分曉道夫解雜亂紛糾不控拳拳音絭攘臂繩今之骨袖手圈也言解鬥者當善解之不可牽引絭繩也批亢搗虛亢音剛喉嚨也言與人鬥者不扼其喉拊其背未見其能勝也僩沈存中以班固律曆志定言數處為脛說是小說中脛廟之意蓋不曉算法而言爾人傑漢書引繩排拫音痕不附己者今人誤讀拫為根注云猶今言拫音戶谷反之類蓋關中俗語如此拫猶云抵拒擔閣也引繩排拫如以繩扞拒然僩劉昭補志於冠幘車服尤詳前史所無方子晉書皆為許敬宗胡寫入小說又多改壞了東坡言孟嘉傳陶淵明之自然今蓋云使然更有一二處饒何氏録作此類甚多東坡此文亦不曾見揚因問晉書說得晉人風流處好先生云云又云世說所載說得較好今皆改之矣揚載記所紀夷狄祖先之類特甚此恐其故臣追記而過譽之舊唐書一傳載乞加恩相王事其文曰恩加四海宋景文為改作恩加骨肉五代史略假借太原以劉知遠之後非僭竊辭較直也揚五代舊史溫公通鑑用之歐公蓋以此作文因有失實處如宦者張居翰當時但言緩取一日則一日固二日則二日固歐公直將作大忠說得太好了問班史通鑑二氏之學如何曰讀其書自可見又曰溫公不取孟子取揚子至謂王伯無異道夫王伯之不侔猶碔砆之於美玉故荀卿謂粹而王駁而伯孟子為齊梁之君力判其是非者以其有異也又溫公不喜權謀至修書時頗刪之奈當時有此事何只得與他存在若每處刪去數行只讀著都無血脈意思何如存之卻別做論說以斷之驤通鑑文字有自改易者仍皆不用漢書上古字皆以今字代之南北史除了通鑑所取者其餘只是一部好笑底小說明仲看節通鑑文定問當是溫公節否明仲云豫讓好處是不以死生二其心故簡子云真義士也今節去之是無見識必非溫公節也方溫公無自節通鑑今所有者乃僞本序亦僞作通鑑例每一年或數次改年號者只取後一號故石晉冬始篡而以此年繫之曾問呂丈呂丈曰到此亦須悔然多了不能改得某只以甲子繫年下面注所改年號通鑑告姦者與斬敵首同賞不告姦者與降敵同罰史記商君議更法首便有斬敵首降敵兩條賞罰後面方有此兩句比類之法其實秦人上戰功故以此二條為更法之首溫公卻節去之只存後兩句比類之法遂使讀之者不見來歷溫公修書凡與己意不合者即節去之不知他人之意不如此通鑑此類多矣僩通鑑事末利及怠而貧者舉以為收孥謂收之為奴婢不得比良民有罪則民得以告之官而自殺之僩溫公論才德處未盡如此則才都是不好底物矣僩或問溫公才德之辨曰溫公之言非不是但語脈有病耳才如何全做不好人有剛明果決之才此自是好德亦有所謂昏德若塊然無能為亦何取於德德是得諸己才是所能為若以才德兼全為聖人卻是聖人又夾雜箇好不好也銖才有好底有不好底德有好底有不好底德者得之於己才者能有所為如溫公所言才是不好底既才是不好底又言才德兼全謂之聖人則聖人一半是不好底溫公之言多說得偏謂之不是則不可節問溫公言聰明強毅之謂才聰明恐只是才不是德曰溫公之言便是有病堯舜皆曰聰明又曰欽明又曰文明豈可只謂之才如今人不聰明便將何者喚作德也銖溫公以正直中和為德聰明強毅為才先生曰皆是德也聖人以仁智勇為德聰明便是智強毅便是勇賜陳仲亨問諸儒才德之說曰合下語自不同如說才難須是那有德底才高陽氏才子八人這須是有德而有才底若是將才對德說則如周公之才之美樣便有是才更要德這箇合下說得自不同又問智伯五賢曰如說射御足力之類也可謂之才義剛溫公通鑑不信四皓輔太子事謂只是叔孫通諫得行意謂子房如此則是脅其父曰子房平生之術只是如此唐太宗從諫亦只是識利害非誠實高祖只是識事機明利害故見四皓者輔太子便知是得人心可以為之矣叔孫通嫡庶之說如何動得他又謂高祖平生立大功業過人只是不殺人溫公乃謂高祖殺四人甚異事見考異其後一處所在又卻載四人又不信劇孟事意謂劇孟何以為輕重然又載周丘其人極無行自請於吳云去呼召得數萬人助吳如子房劇孟皆溫公好惡所在然著其事而立論以明之可也豈可以有無其事為褒貶溫公此樣處議論極純因論章惇言溫公義理不透曰溫公大處占得多章小黯何足以知大處揚溫公謂魏為正統使當三國時便去仕魏矣升卿胡致堂云通鑑久未成書或言溫公利餐錢故遲遲溫公遂急結束了故唐五代多繁冗見管見後唐莊宗六月甲午條下方溫公之言如桑麻穀粟且如稽古録極好看常思量教太子諸王恐通鑑難看且看一部稽古録人家子弟若先看得此便是一部古今在肚裏了學蒙稽古録有不備者當以通鑑補之溫公作此書想在忙裏做成元無義例閎祖稽古録一書可備講筵官僚進讀小兒讀六經了令接續讀去亦好末後一表其言如蓍龜一一皆驗宋莒公歷年通譜與此書相似但不如溫公之有法也高氏小史亦一好書但難得本子高峻唐人通鑑中亦多取之方子匡衡傳司馬公史論稽古録范唐鑑不可不讀賀孫致堂管見方是議論唐鑑議論弱又有不相應處前面說一項事末又說別處去唐鑑缺處多看底辨得出時好唐鑑多說得散開無收殺如姚崇論擇十道使患未得人它自說得意好不知范氏何故卻貶其說范唐鑑第一段論守臣節處不圓要做一書補之不曾做得范此文草草之甚其人資質渾厚說得都如此平正只是疏多不入理終守臣節處於此亦須有些處置豈可便如此休了如此議論豈不為英雄所笑揚録云程門此人最好然今看都只是氣質呂與叔緊范唐鑑首一段專是論太宗本原然亦未盡太宗後來做處儘好只為本領不是與三代便別問歐陽以除隋之亂比跡湯武致治之美庶幾成康贊之無乃太過曰只為歐公一輩人尋常亦不曾理會本領處故其言如此端蒙范氏以武王釋箕子封比干事比太宗誅高德儒此亦據他眼前好處恁地比並也未論到他本原處似此樣且寬看若一一責以全則後世之君不復有一事可言端蒙唐鑑白馬之禍歐公論不及此唐鑑議論覺似迂緩不切考其意蓋王介甫秉政造新法神考專意信之以為真可以振起國勢一新其舊故范氏之論每以為此惟在人主身心之間而不在法如言豐財在於節用神考曰豈有著破皂襖破皮鞋即能致國富邪公謹唐鑑意正有疏處孫之翰唐論精練說利害如身處親歷之但理不及唐鑑耳閎祖伯恭晚年謂人曰孫之翰唐論勝唐鑑要之也是切於事情只是大剛卻不正了唐鑑也有緩而不精確處如言租庸調及楊炎二稅之法說得都無收殺只云在於得人不在乎法有這般苟且處審如是則古之聖賢徒善云爾他也是見熙寧間詳於制度故有激而言要之只那有激便不平正道夫或說二氣五行錯揉萬變曰物久自有弊壞秦漢而下二氣五行自是較昏濁不如太古之清明純粹且如中星自堯時至今已自差五十度了秦漢而下自是弊壞得箇光武起整得略略地後又不好了又得箇唐太宗起來整得略略地後又不好了終不能如太古或云本然底亦不壞曰固是夔孫論歷代周自東遷之後王室益弱畿內疆土皆為世臣據襲莫可誰何而畿外土地亦皆為諸侯爭據天子雖欲分封而不可得如封鄭桓公都是先用計指射鄶地罔而取之亦是無討土地處此後王室子孫豈復有疆土分封某常以為郡縣之事已萌於此矣至秦時是事勢窮極去不得了必須如此做也僩以下春秋權重處便有弊宗室權重則宗室作亂漢初及晉是也外戚權重則外戚作亂兩漢是也春秋之君多逐宗族晉惠公得國便不納群公子文公之入即殺懷公此乃異日六卿分晉之兆必大問春秋時良法美意尚有存者曰去古愈近便古意愈多升卿成周之時卿士甚小到後來鄭武公們為王卿士便是宰相恰如後世侍中中書令一般論周稱卿士不同在周官六卿之屬言之則卿士乃是六卿之士也徒幾人士幾人如皇父卿士番為司徒如周人將畀虢公政亦卿士卿士惟月衛武公為平王卿士之類則這般之職不知如何小蒙封建世臣賢者無頓身處初間亦未甚至春秋時孔子事如何可學楚地最廣今之襄漢皆是儘是強大齊晉若不更伯楚必吞周而有天下緣他極強大所以齊威晉文責之皆是沒緊要底事威公豈不欲將僭王猾夏之事責之但恐無收殺故只得如此至如晉文城濮之戰依舊委曲還他許多禮數亦如威公之意然此處亦足以見先王不忍戕民之意未泯也設使威文所以責之者不少假借他定不肯服兵連禍結何時而已到得戰國斬首動是數萬無復先王之意矣僩問揚管仲子産如何揚謂管仲全是功利心不好子産較近道理聖人稱子産有君子之道四然只就得如此如何是本原頭有病否曰是本原雜問傅全美謂范文正所為似子産謂細膩是否曰文正疏決不相似亦粗曰只是雜揚管仲內政士卿十五乃戰士也所以教之孝悌忠信尊君親上之義夫子曰以不教民戰是謂棄之故雖霸者之道亦必如此人傑問晉伐原以示信大搜以示禮此是信禮否曰此是假禮信之名以欺人欲舉而用之非誠心也如湯之於葛葛云無以供粢盛湯使亳衆往為之耕葛云無以供犧牲湯使人遺之牛羊至於不得已而後征之非是以此餌之而圖以殺之也又云司馬遷云文王之治岐耕者九一仕者世祿皆是降陰德以分紂之天下不知文王之心誠於為民者若此又云漢高祖取天下所謂仁義者豈有誠心哉其意本謂項羽背約及到新城遇三老董公遮道之言方假此之名以正彼之罪所謂縞素發喪之舉其意何在似此之謀看當時未必不是欲項羽殺之而後罪之也卓因論寧武子義剛言春秋時識義理者多曰也是那時多世臣君臣之分密其情自不能相舍非是皆曉義理古時君臣都易得相親天下有天下之君臣淳録云大處有大君臣小處有小君臣一國有一國之君臣一家有一家之君臣自秦漢以來便都遼絶今世如士人猶略知有君臣之分若是田夫去京師動數千里它曉得甚麼君臣本朝但制兵卻有古意太祖軍法曰一階一級皆歸服事之儀故軍中階級卻嚴有定分義剛淳録略鬻拳只是箇粗豪人其意則忠而其事皆非理不足言也僩子升問伍子胥曰父不受誅子復讎可也謂之亂臣賊子亦未可又問還是以其出亡在外而言亦可以為通論否曰古人自有這般事如不為舊君服之義可見後世天下一家事體又別然亦以其出亡之故若曾臣事之亦不可也又問父死非其罪子亦可仕否曰不可孫曾如何曰世數漸遠終是漸輕亦有可仕之理但不仕者正也可仕者權也木之越棲會稽本在平江楚破越其種散史記故後號為百越此間處處有之山上多有小小城郭故壘皆是諸越舊都邑也春秋末楚地最廣蓋自初間并吞諸蠻而有其地如淮南之舒宿亳之蓼皆是初間若不得齊威管仲看他氣勢定是吞周室以此觀之孔子稱管仲之功豈溢美哉吳之所以得破楚也是楚平以後日就衰削又恰限使得伍子胥如此先又有申公巫臣往吳教之射御戰陳這兩人所以不向齊晉那邊去也是見得齊晉都破壞了兼那時如闔閭夫差勾踐幾人皆是蠻夷中之豪傑今浙間是南越地平廣閩廣是東越地狹多阻南豐送李柳州誤謂柳為南越賀孫越都會稽今東門外所在土地只如今闊狹後并吳了卻移都平江亦名會稽秦後於平江立會稽郡吳越國勢人物亦不爭多越尚著許多氣力今虜何止於吳所以圖之者又不及越如何濟事今做時亦須著喫些艱辛如越始得范蠡文種未是難二人皆在越籠絡中此是難某在紹興想像越當時事亦自快人越止一小國當時亦未甚大段富貴在越自克如此亦未是難事然自越之後後來不曾見更有一人似之信立事之難也揚范蠡載西子以往王銍性之言歷考文書無此事其原出杜牧之詩云西子下吳會一舸隨鴟夷王解此意又不然曰王性之不成器如這般發事渠讀書多考究得甚精且多也揚義剛論田子方貧賤驕人之說雖能折子擊卻非知道者之言不成我貧賤便可凌人此豈忘乎貧賤富貴者哉陳仲亨不以為然次日請問先生曰他是為子擊語意而發但子方卻別有箇意思它後面說言不用行不合則納履而去此是說我只是貧賤不肯自詘說大人則藐之孟子也如此說雖曰聖人無小大無敢慢不肯如此說但視那為富貴權勢所移者有間矣聖人氣象固不如此若大賢以下則未免如是以下戰國趙武靈王也是有英氣所以做得恁地也緣是他肚裏事會恁地做得但他不合只倚這些子如後來立後一乖也是心不正後感召得這般事來義剛問樂毅伐齊文中子以為善藏其用東坡則責其不合妄效王者事業以取敗二說孰是曰這是他們愛去立說後都不去考教子細這只是那田單會守後不奈他何當時樂毅自是兼秦魏之師又因人怨湣王之暴故一旦下齊七十餘城及既殺了湣王則人心自是休了它又怕那三國來分他底連忙發遣了它以燕之力量也只做得恁地更是那田單也忠義盡死節守那二城樂毅不是不要取它也煞費氣力被它善守後不奈他何樂毅也只是戰國之士又何嘗是王者之師它當時也恣意去鹵掠正如孟子所謂毀其宗廟遷其重器不過如此舉措它當時那鼎也去扛得來他豈是不要他底但是田單與他皆會兩箇相遇智勇相角至相持三年便是樂毅也煞費氣力但取不得及用騎劫則是大段無能後被田單使一箇小術數子便乘勢殺將去便是國不可以無人如齊但有一田單盡死節恁地守便不奈他何義剛常先難而後易不然則難將至矣如樂毅用事始常懼難乃心謹畏不敢忽易故戰則雖大國堅城無有不破者及至勝則自驕膽大而恃兵強因去攻二城亦攻不下壽昌樂毅莒即墨之圍乃用師之道當如此用速不得又齊湣王人多叛之及死而其子立於莒則人復惜之不忍盡亡其國即墨又有田單故下之難使毅得盡其策必不失之光武下一城不得明帝謂下之太速揚義剛曰藺相如其始能勇於制秦其終能和以待廉頗可謂賢矣但以義剛觀之使相如能以待廉之術待秦乃為善謀蓋柔乃能制剛弱乃能勝強今乃欲以匹夫之勇恃區區之趙而鬥強秦若秦奮其虎狼之威將何以處之今能使秦不加兵者特幸而成事耳先生曰子由有一段說大故取它說它不是戰國之士此說也太過其實它只是戰國之士龜山亦有一說大概與公說相似說相如不合要與秦爭那璧要之恁地說也不得和氏璧也是趙國相傳以此為寶若當時驟然被人將去則國勢也解不振古人傳國皆以寶玉之屬為重若子孫不能謹守便是不孝當時秦也是強但相如也是料得秦不敢殺他後方恁地做若其它人則是怕秦殺了便不敢去如藺相如豈是孟浪恁地做它須是料度得那秦過了戰國時如此等也多黃歇取楚太子也是如此當時被他取了秦也不曾做聲只恁休了義剛春秋時相殺甚者若相罵然長平坑殺四十萬人史遷言不足信敗則有之若謂之盡坑四十萬人將幾多所在又趙卒都是百戰之士豈有四十萬人肯束手受死決不可信又謂秦十五年不敢出兵窺山東之類何嘗有等事皆史之溢言常疑四十萬人死恐只司馬遷作文如此未必能盡坑得許多人德明常思孫臏料龐涓暮當至馬陵如何料得如此好僩曰使其不燭火看白書則如之何曰臏料龐涓是箇絮底人必看無疑此有三樣上智底人他曉得必不看下智呆底人亦不必看中智底人必看看則墮其機矣嘗思古今智士之謀略詭譎固不可及然記之者能如此曲折書之而不失其意則其智亦不可及矣燕丹知燕必亡故為荊軻之舉德明術至韓非說難精密至矣蘇張亦尚疏陳仲亨問合從便不便曰溫公是說合從為六國之便觀當時合從時秦也是懼蓋天下盡合為一而秦獨守關中一片子地也未是長策但它幾箇心難一如何有箇人兜攬得他也是難這箇卻須是如孟子之說方得如有不嗜殺人者則天下之人皆引領而望之師文王大國五年小國七年必為政於天下孟子只是責辦于己設使當時有仁政則如大旱之望雲霓民自歸之秦雖強亦無如我何義剛問蘇秦激怒張儀如秦人皆說它術高竊以為正是失策處曰某謂未必有此事所謂激怒者只是蘇秦當時做得稱意後去欺那張儀而今若說是蘇秦怕秦來敗從所以激張儀入秦庶秦不來敗從那張儀與你有甚人情這只是蘇秦之徒見他做倒了這一著後粧點出此事來謾人義剛夔孫録云因說蘇秦激張儀入秦事曰某嘗疑不恁地做得拙蘇秦豈不知張儀入秦會翻了他想是蘇秦輸了這一籌其徒遂裝撰此等說話人傑録云常疑蘇秦資送張儀入秦事恐無此理當時范睢蔡澤之徒多是乘人間隙而奪之位何嘗立得事功吳起務在富國強兵破遊說之言縱橫者若是立腳務實自不容此輩紛紜撓亂也問關中形勝周用以興到得後來秦又用以興曰此亦在人做當春秋時秦亦為齊晉所軋不得伸到戰國時六國又皆以夷狄擯之使不得與中國會盟及孝公因此發憤致得商鞅而用之遂以強大後來又得惠文武昭襄皆是會做底故相繼做起來若其間有一二君昏庸則依舊做壞了以此見得形勝也須是要人相副因言昭王因范睢傾穰侯之故卻盡收得許多權柄秦遂益強豈不是會廣以下秦陳仲亨以義剛所疑問云商鞅說孝公帝王道不從乃說以伯道鞅亦不曉帝王道但是先將此說在前者渠知孝公決不能從且恁地說庶可以堅後面伯道之說耳先生曰鞅又如何理會得帝王之道但是大拍頭去揮那孝公耳他知孝公是行不得他恁地說只是欲人知道我無所不曉義剛問不知溫公削去前一截是如何曰他說無此事不肯信又問如子房招四皓伊川取之以為得納約自牖之義而溫公亦削之如何曰是他意裏不愛不合他意底則削去某常說陳平說高祖曰項王能敬人故多得廉節之士大王慢侮人故廉節之士多不為用然廉節士終不可得臣願得數萬斤金以間疏楚君臣這便是商鞅說孝公底一般他知得高祖決不能不嫚侮以求廉節之士但直說他則恐未必便從故且將去嚇他一嚇等他不從後卻說之此政與商鞅之術同而溫公也削去若是有此一段時見得他說得有意思今削去了則都無情意他平白無事教把許多金來用問高祖便肯如此等類被他削去底多如何恁地得善善惡惡是是非非皆著存得在那裏其間自有許多事若是不好底便不載時孔子一部春秋便都不是了那裏面何所不有義剛元本云商鞅先以帝王說孝公此只是大拍頭揮他底它知孝公必不能用得這說話且說這大話了卻放出那本色底來通鑑削去前一節溫公之意謂鞅無那帝王底道理遂除去了溫公便是不曉這般底人如條侯擊吳楚到洛陽得劇孟隱若一敵國亦不信他說道如何得一箇俠士便隱若一敵國不知這般人得之未必能成事若為盜所得煞會撓人蓋是他自有這般賓客那一般人都信向他若被他一下鼓動得去直是能生事又如陳平說高帝謂項王下人能得廉節之士大王慢侮人故嗜利無恥者歸之大王誠能去兩短集兩長則云云然大王恣悔慢必不得廉節之士故勸捐數萬斤金以間楚君臣這也是度得高祖必不能下士故先說許多話教高祖亦自知做不得了方說他本謀來故能使人聽信某說此正與商鞅之術同而溫公亦削了夔孫録同但云溫公性朴直便是不曉這般底人得劇孟事也不信謂世間都無這般底人以今觀之秦取六國當甚易而秦甚難之以古來無此樣不敢輕易因說後世篡奪難大凡事前未有樣者不易做揚仲亨問開阡陌曰阡陌便是井田陌百也阡千也東西曰阡南北曰陌或謂南北曰阡東西曰陌未知孰是但卻是一箇橫一箇直耳如百夫有遂遂上有涂這便是陌若是十箇涂恁地直在橫頭又作一大溝謂之洫洫上有路這便是阡阡陌只是疆界自阡陌之外有空地則只恁地間在那裏所以先王要如此者也只是要正其疆界怕人相侵互而今商鞅卻開破了遇可做田處便墾作田更不要恁地齊整這開字非開創之開乃開闢之開蔡澤傳曰破壞井田決裂阡陌觀此可見這兩句自是合掌說後人皆不曉唐時卻說寬鄉為井田狹鄉為阡陌東萊論井田引蔡澤傳兩句然又卻多方回互說從那開阡陌之意上去義剛問井田阡陌曰已前人都錯看了某嘗考來蓋陌者百也阡者千也井田一夫百畝則為遂遂上有徑此是縱為陌十夫千畝則為溝溝上有畛此是橫為阡積此而往百夫萬畝則為洫洫上有涂涂縱又為陌千夫十萬畝則為澮澮上有道道橫又為阡商鞅開之乃是當時井田既不存便以此物為無用一切破蕩了蔡澤傳云商君決裂阡陌乃是如此非謂變井田為阡陌也夔孫僩録云人皆謂廢古井田開今阡陌云云阡陌是井田路其路甚大廢田遂一齊開小了作田故謂之破井田開阡陌揚伯恭言秦變法後世雖屢更數易終不出秦如何曰此意好但使伯恭為相果能盡用三代法度否問後有聖賢者出如何曰必須別有規模不用前人硬本子升卿黃仁卿問自秦始皇變法之後後世人君皆不能易之何也曰秦之法盡是尊君卑臣之事所以後世不肯變且如三皇稱皇五帝稱帝三王稱王秦則兼皇帝之號只此一事後世如何肯變又問賈生仁義攻守之說恐秦如此亦難以仁義守之曰它若延得數十年亦可扶持整頓只是犯衆怒多下面逼得來緊所以不旋踵而亡如三皇五帝三王以來皆以封建治天下秦一切掃除不留種子秦視六國之君如坑嬰兒今年捉一人明年捉兩人絶滅都盡所以犯天下衆怒當時但聞秦字不問智愚男女盡要起而亡之陳涉便做陳王張耳便做趙王更阻遏它不住漢高祖自小路入秦由今襄陽金商藍田入關節録作從長安角上入關項羽自河北大路入關及項羽盡殺秦人想得秦人亦悔不且留取子嬰在也銖秦以水德王故數用六為紀振五德相承古人所說皆不定謂周為木德後秦以鄒衍之說推之乃以為火德故秦以所不勝者承周號水德漢又承周不承秦後又有謂漢非火德者王莽又有云云三代而上未有此論則東坡謂威侮五行怠棄三正者又未必是揚咸陽在渭北漢在渭南秦建十月已久通鑑不曾契勘揚
