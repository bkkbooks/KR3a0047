body:
  text: 朱子語類卷第一理氣上太極天地上問太極不是未有天地之先有箇渾成之物是天地萬物之理總名否曰太極只是天地萬物之理在天地言則天地中有太極在萬物言則萬物中各有太極未有天地之先畢竟是先有此理動而生陽亦只是理靜而生陰亦只是理問太極解何以先動而後靜先用而後體先感而後寂曰在陰陽言則用在陽而體在陰然動靜無端陰陽無始不可分先後今只就起處言之畢竟動前又是靜用前又是體感前又是寂陽前又是陰而寂前又是感靜前又是動將何者為先後不可只道今日動便為始而昨日靜更不說也如鼻息言呼吸則辭順不可道吸呼畢竟呼前又是吸吸前又是呼淳問昨謂未有天地之先畢竟是先有理如何曰未有天地之先畢竟也只是理有此理便有此天地若無此理便亦無天地無人無物都無該載了有理便有氣流行發育萬物曰發育是理發育之否曰有此理便有此氣流行發育理無形體曰所謂體者是強名否曰是曰理無極氣有極否曰論其極將那處做極淳若無太極便不侴了天地方子太極只是一箇理字人傑有是理後生是氣自一陰一陽之謂道推來此性自有仁義德明天下未有無理之氣亦未有無氣之理氣以成形而理亦賦焉銖先有箇天理了卻有氣氣積為質而性具焉敬仲問理與氣曰伊川說得好曰理一分殊合天地萬物而言只是一箇理及在人則又各自有一箇理夔孫問理與氣曰有是理便有是氣但理是本而今且從理上說氣如云太極動而生陽動極而靜靜而生陰不成動已前便無靜程子曰動靜無端蓋此亦是且自那動處說起若論著動以前又有靜靜以前又有動如云一陰一陽之謂道繼之者善也這繼字便是動之端若只一開一闔而無繼便是闔殺了又問繼是動靜之間否曰是靜之終動之始也且如四時到得冬月萬物都歸窠了若不生來年便都息了蓋是貞復生元無窮如此又問元亨利貞是備箇動靜陰陽之理而易只是乾有之曰若論文王易本是作大亨利貞只作兩字說孔子見這四字好便挑開說了所以某嘗說易難看便是如此伏羲自是伏羲易文王自是文王易孔子因文王底說又卻出入乎其間也又問有是理而後有是氣未有人時此理何在曰也只在這裏如一海水或取得一杓或取得一擔或取得一碗都是這海水但是他為主我為客他較長久我得之不久耳夔孫義剛録同問先有理抑先有氣曰理未嘗離乎氣然理形而上者氣形而下者自形而上下言豈無先後理無形氣便粗有渣滓淳或問必有是理然後有是氣如何曰此本無先後之可言然必欲推其所從來則須說先有是理然理又非別為一物即存乎是氣之中無是氣則是理亦無掛搭處氣則為金木水火理則為仁義禮智人傑或問理在先氣在後曰理與氣本無先後之可言但推上去時卻如理在先氣在後相似又問理在氣中發見處如何曰如陰陽五行錯綜不失條緒便是理若氣不結聚時理亦無所附著故康節云性者道之形體心者性之郛郭身者心之區宇物者身之舟車問道之體用曰假如耳便是體聽便是用目是體見是用祖道或問先有理後有氣之說曰不消如此說而今知得他合下是先有理後有氣邪後有理先有氣邪皆不可得而推究然以意度之則疑此氣是依傍這理行及此氣之聚則理亦在焉蓋氣則能凝結造作理卻無情意無計度無造作只此氣凝聚處理便在其中且如天地間人物草木禽獸其生也莫不有種定不會無種子白地生出一箇物事這箇都是氣若理則只是箇淨潔空闊底世界無形跡他卻不會造作氣則能醞釀凝聚生物也但有此氣則理便在其中僩問有是理便有是氣似不可分先後曰要之也先有理只不可說是今日有是理明日卻有是氣也須有先後且如萬一山河大地都陷了畢竟理卻只在這裏胡泳徐問天地未判時下面許多都已有否曰只是都有此理天地生物千萬年古今只不離許多物淳天地問天地之心亦靈否還只是漠然無為曰天地之心不可道是不靈但不如人恁地思慮伊川曰天地無心而成化聖人有心而無為淳問天地之心天地之理理是道理心是主宰底意否曰心固是主宰底意然所謂主宰者即是理也不是心外別有箇理理外別有箇心又問此心字與帝字相似否曰人字似天字心字似帝字夔孫義剛同道夫言向者先生教思量天地有心無心近思之竊謂天地無心仁便是天地之心若使其有心必有思慮有營為天地曷嘗有思慮來然其所以四時行百物生者蓋以其合當如此便如此不待思維此所以為天地之道曰如此則易所謂復其見天地之心正大而天地之情可見又如何如公所說祇說得他無心處爾若果無心則須牛生出馬桃樹上發李花他又卻自定程子曰以主宰謂之帝以性情謂之乾他這名義自定心便是他箇主宰處所以謂天地以生物為心中間欽夫以為某不合如此說某謂天地別無勾當只是以生物為心一元之氣運轉流通略無停間只是生出許多萬物而已問程子謂天地無心而成化聖人有心而無為曰這是說天地無心處且如四時行百物生天地何所容心至於聖人則順理而已復何為哉所以明道云天地之常以其心普萬物而無心聖人之常以其情順萬事而無情說得最好問普萬物莫是以心周遍而無私否曰天地以此心普及萬物人得之遂為人之心物得之遂為物之心草木禽獸接著遂為草木禽獸之心只是一箇天地之心爾今須要知得他有心處又要見得他無心處只恁定說不得道夫萬物生長是天地無心時枯槁欲生是天地有心時方問上帝降衷于民天將降大任於人天祐民作之君天生物因其才而篤作善降百祥作不善降百殃天將降非常之禍於此世必預出非常之人以擬之凡此等類是蒼蒼在上者真有主宰如是邪抑天無心只是推原其理如此曰此三段只一意這箇也只是理如此氣運從來一盛了又一衰一衰了又一盛只管恁地循環去無有衰而不盛者所以降非常之禍於世定是生出非常之人邵堯夫經世吟云義軒堯舜湯武桓文皇王帝霸父子君臣四者之道理限于秦降及兩漢又歷三分東西俶擾南北紛紜五胡十姓天紀幾棼非唐不濟非宋不存千世萬世中原有人蓋一治必又一亂一亂必又一治夷狄只是夷狄須是還他中原淳帝是理為主淳蒼蒼之謂天運轉周流不已便是那箇而今說天有箇人在那裏批判罪惡固不可說道全無主之者又不可這裏要人見得僩又僩問經傳中天字曰要人自看得分曉也有說蒼蒼者也有說主宰者也有單訓理時天地初間只是陰陽之氣這一箇氣運行磨來磨去磨得急了便拶許多渣滓裏面無處出便結成箇地在中央氣之清者便為天為日月為星辰只在外常周環運轉地便只在中央不動不是在下淳清剛者為天重濁者為地道夫天運不息晝夜輾轉故地榷在中間使天有一息之停則地須陷下惟天運轉之急故凝結得許多渣滓在中間地者氣之渣滓也所以道輕清者為天重濁者為地道夫天以氣而依地之形地以形而附天之氣天包乎地地特天中之一物爾天以氣而運乎外故地榷在中間隤然不動使天之運有一息停則地須陷下道夫天包乎地天之氣又行乎地之中故橫渠云地對天不過振地卻是有空闕處天卻四方上下都周匝無空闕逼塞滿皆是天地之四向底下卻靠著那天天包地其氣無不通恁地看來渾只是天了氣卻從地中迸出又見地廣處淵季通云地上便是天端蒙天只是一箇大底物須是大著心腸看他始得以天運言之一日固是轉一匝然又有大轉底時候不可如此偏滯求也僩天明則日月不明天無明夜半黑淬淬地天之正色僩山河大地初生時須尚軟在氣質方子天地始初混沌未分時想只有水火二者水之滓腳便成地今登高而望群山皆為波浪之狀便是水泛如此只不知因甚麼時凝了初間極軟後來方凝得硬問想得如潮水湧起沙相似曰然水之極濁便成地火之極清便成風霆雷電日星之屬僩西北地至高地之高處又不在天之中義剛唐太宗用兵至極北處夜亦不曾太暗少頃即天明謂在地尖處去天地上下不相遠掩日光不甚得揚地有絶處唐太宗收至骨利幹置堅昆都督府其地夜易曉夜亦不甚暗蓋當地絶處日影所射也其人髮皆赤揚通鑑說有人適外國夜熟一羊脾而天明此是地之角尖處日入地下而此處無所遮蔽故常光明及從東出而為曉其所經遮蔽處亦不多耳義剛問康節論六合之外恐無外否曰理無內外六合之形須有內外日從東畔升西畔沉明日又從東畔升這上面許多下面亦許多豈不是六合之內曆家算氣只算得到日月星辰運行處上去更算不得安得是無內外淳問自開闢以來至今未萬年不知已前如何曰已前亦須如此一番明白來又問天地會壞否曰不會壞只是相將人無道極了便一齊打合混沌一番人物都盡又重新起問生第一箇人時如何曰以氣化二五之精合而成形釋家謂之化生如今物之化生甚多如虱然揚天地不恕謂肅殺之類振可幾問大鈞播物還是一去便休也還有去而復來之理曰一去便休耳豈有散而復聚之氣道夫氣造化之運如磨上面常轉而不止萬物之生似磨中撒出有粗有細自是不齊又曰天地之形如人以兩奬相合貯水於內以手常常掉開則水在內不出稍住手則水漏矣過問氣之伸屈曰譬如將水放鍋裏煮水既乾那泉水依前又來不到得將已乾之水去做它夔孫人呼氣時腹卻脹吸氣時腹卻厭論來呼而腹厭吸而腹脹乃是今若此者蓋呼氣時此一口氣雖出第二口氣復生故其腹脹及吸氣時其所生之氣又從裏趕出故其腹卻厭大凡人生至死其氣只管出出盡便死如吸氣時非是吸外氣而入只是住得一霎時第二口氣又出若無得出時便死老子曰天地之間其猶橐籥乎動而不屈虛而愈出橐籥只是今之價扇耳廣數只是算氣之節候大率只是一箇氣陰陽播而為五行五行中各有陰陽甲乙木丙丁火春屬木夏屬火年月日時無有非五行之氣甲乙丙丁又屬陰屬陽只是二五之氣人之生適遇其氣有得清者有得濁者貴賤壽夭皆然故有參錯不齊如此聖賢在上則其氣中和不然則其氣偏行故有得其氣清聰明而無福祿者亦有得其氣濁有福祿而無知者皆其氣數使然堯舜禹皋文武周召得其正孔孟夷齊得其偏者也至如極亂之後五代之時又卻生許多聖賢如祖宗諸臣者是極而復者也揚録云碩果不食之理如大睡一覺及醒時卻有精神揚録此下云今卻詭詐玩弄未有醒時非積亂之甚五六十年即定氣息未蘇了是大可憂也天地統是一箇大陰陽一年又有一年之陰陽一月又有一月之陰陽一日一時皆然端蒙陰陽五行陰陽五行之理須常常看得在目前則自然牢固矣人傑陰陽是氣五行是質有這質所以做得物事出來五行雖是質他又有五行之氣做這物事方得然卻是陰陽二氣截做這五箇不是陰陽外別有五行如十干甲乙甲便是陽乙便是陰高淵同問前日先生答書云陰陽五行之為性各是一氣所稟而性則一也兩性字同否曰一般又曰同者理也不同者氣也又曰他所以道五行之生各一其性節復問這箇莫是木自是木火自是火而其理則一先生應而曰且如這箇光也有在硯蓋上底也有在墨上底其光則一也節五行相為陰陽又各自為陰陽端蒙氣之精英者為神金木水火土非神所以為金木水火土者是神在人則為理所以為仁義禮智信者是也植金木水火土雖曰五行各一其性然一物又各具五行之理不可不知康節卻細推出來僩天一自是生水地二自是生火生水只是合下便具得濕底意思木便是生得一箇軟底金便是生出得一箇硬底五行之說正蒙中說得好又曰木者土之精華也又記曰水火不出於土正蒙一段說得最好不胡亂下一字節問黃寺丞云金木水火體質屬土曰正蒙有一說好只說金與木之體質屬土水與火卻不屬土問火附木而生莫亦屬土否曰火自是箇虛空中物事問只溫熱一作暖之氣便是火否曰然胡泳僩同水火清金木濁土又濁可學論陰陽五行曰康節說得法密橫渠說得理透邵伯溫載伊川言曰向惟見周茂叔語及此然不及先生之有條理也欽夫以為伊川未必有此語蓋伯溫妄載某則以為此語恐誠有之方子土無定位故今曆家以四季之月十八日為土分得七十二日若說播五行於四時以十干推之亦得七十二日方子高同問四時取火何為季夏又取一番曰土旺於未故再取之土寄旺四季每季皆十八日四箇十八日計七十二日其他四行分四時亦各得七十二日五箇七十二日共湊成三百六十日也僩問古者取火四時不同不知所取之木既別則火亦異否曰是如此胡泳火中有黑陽中陰也水外黑洞洞地而中卻明者陰中之陽也故水謂之陽火謂之陰亦得伯羽陰以陽為質陽以陰為質水內明而外暗火內暗而外明橫渠曰陰陽之精互藏其宅正此意也坎離道夫清明內影濁明外影清明金水濁明火日僩天有春夏秋冬地有金木水火人有仁義禮智皆以四者相為用也季札春為感夏為應秋為感冬為應若統論春夏為感秋冬為應明歲春夏又為感可學四時問學者云古人排十二時是如何諸生思未得先生云志是從之從心乃是心之所之古時字從之從日亦是日之所至蓋日至於午則謂之午時至未則謂之未時十二時皆如此推古者訓日字實也月字缺也月則有缺時日常實是如此如天行亦有差月星行又遲趕它不上惟日鐵定如此又云看北斗可以見天之行夔孫
