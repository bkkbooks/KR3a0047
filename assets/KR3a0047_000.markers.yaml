  - {type: variant, offset: 2625, length: 2, content: 問諸, WYG: 病此而力未能救恒用愧歎而已公暇覽閱秘書喜誦語類以自益因嘅見此不早且以不能人有是書為恨何則聖賢格言大訓世非不多而此尤明切易曉可為入道之指南故也陳君有見乎此乃力求是書刻而傳之以惠學者以端}
