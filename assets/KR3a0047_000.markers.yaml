  - {type: variant, offset: 193, length: 821, content: 六竇從周字文卿丹陽人丙午以後所聞池錄十四金去偽字敬直樂平人乙未所聞池錄十五李季札字季子婺源人丙申乙卯所聞池錄十六萬人傑字正淳興國人庚子以後所聞池錄十七饒錄四十六楊道夫字仲愚建甯人己酉以後所聞池錄十八十九徐宇字居父永嘉人庚戌以後所聞池錄二十廿一饒錄四十六林恪字叔恭天台人癸丑所聞池錄廿二饒錄四十六石洪慶字子餘臨漳人癸丑所聞池錄廿三徐容字仁父永嘉人辛亥所聞池錄廿四甘節字吉父臨川人癸丑以後所聞池錄廿五黃義剛字毅然臨川人癸丑以後所聞池錄廿六廿七饒錄四十六淵字亞夫涪陵人癸丑所聞池錄廿八襲蓋卿字夢錫常寧人甲寅所聞池錄廿九廖謙字益仲衡陽人甲寅所聞池錄三十孫自修字敬父宣城人甲寅所聞池錄三一潘履孫字坦翁婺源人居紹興甲寅所聞池錄三二湯泳字叔永丹陽人乙卯所聞池錄三三林夔孫字子武三山人丁巳以後所聞池錄三四三五陳埴錄已削錢木之字子山晉陵人寓永嘉丁巳所聞池錄三六曾祖道字擇之寧都人丁巳所聞池錄三七沈僩字杜仲永嘉人戊午以後所聞池錄三八三九四十四一郭友仁字德元山陽人寓臨安戊午所聞池錄四二李儒用字仲秉岳陽人己未所聞池錄四三饒錄三十黃榦字直卿三山人饒錄一饒後錄二何鎬字叔京邵武人乙未以前所聞饒錄二程端蒙字正思鄱陽人己亥以後所聞饒錄三周謨字舜弼南康人己亥以後所聞饒錄四五潘柄字謙之三山人癸卯以後所聞饒錄六魏椿字元壽建陽人戊申五夫所聞饒錄七饒後錄二十四吳必大字伯豐興國人戊申己酉所聞饒錄八黃字子耕豫章人戊申所聞饒錄九十楊若海字道夫之子饒錄十一楊驤字子昂道夫族中己酉甲寅所聞饒錄十二陳淳字安卿臨漳人庚戌己未所聞饒錄十三十四童伯羽字蜚卿甌甯人庚戌所聞饒錄十五鄭可學字子上莆田人辛亥所聞饒錄十六滕璘字德粹新安人辛亥所聞饒錄十七王力行字近思同安人辛亥所聞饒錄十八游敬仲字連叔南劍人辛亥所聞饒錄十九不知何氏辛亥同舍共聞饒錄二十黃升卿辛亥所聞饒錄廿一周明作字元興建陽人壬子以後所聞饒錄廿二蔡錄字行夫平陽人壬子所錄饒錄廿三楊與立字子權浦城人道夫從兄壬子同劉龔栗譚見饒錄廿四鄭南升字文相潮, WYG: 卷刋于徽}
