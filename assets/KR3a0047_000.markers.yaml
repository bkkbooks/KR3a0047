  - {type: variant, offset: 2623, length: 1, content: 頃, WYG: 合而校補遂成全書欲重刻以廣其傳謀於憲使嚴郡余公公喜倡諸同寅各捐俸餘并勸部民之好義者出貲以相其成自今春始工期以秋畢因寓書語予以其故并徴序焉愚謂文公遺語無非譚經論事明理之言也學者不循其言以求至乎聖賢之域則理有不明心無實得豈善學哉惟其不善學也是以性汨於氣私勝而理微注措云為鮮有不戾道者士習日以卑陋民風日以頽弊而治道不能復古有由然也竊}
