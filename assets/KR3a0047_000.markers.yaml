  - {type: variant, offset: 2573, length: 0, content: '', WYG: 之士從事於詳説反約之功云爾淳祐壬子上冬王佖序自帝王道化不行於天下而後孔孟道學之傳興孟氏既没其傳遂泯歴秦漢隋唐至於有宋周程張朱諸君子繼出而後道學復明焉然䆒其推演性命道德之精微剖析天人事物之藴奥而折衷羣聖賢之述作俾學者有所據依以為學則功未有盛於朱文公先生者也文公傳註成言至精至粹固已家傳人誦之}
