  - {type: variant, offset: 1307, length: 513, content: 可疑包揚字顯道建昌人癸卯甲辰乙巳所聞饒後錄三四五六間有疑誤劉炎字潛夫邵武人己酉甲寅以後所聞饒後錄七劉子寰字所父建陽人己未所聞饒後錄八邵浩字叔義金華人丙午所聞饒後錄九劉砥字履之三山人庚戌所聞饒後錄十劉礪字用之三山人己未所聞饒後錄十一李煇字晦父饒後錄十二陳芝字庭秀壬子所聞饒後錄十三黃灝字商伯都昌人饒後錄十四黃卓字先之饒後錄十五汪德輔字長孺鄱陽人壬子所聞饒後錄十六吳振字伯起饒後錄十七吳雉字和中建陽人饒後錄十八鍾震字春伯潭州人甲寅所聞饒後錄十九林子蒙饒後錄二十林學履字安卿永福人己未所錄饒後錄廿一蕭佐字定夫湘鄉人甲寅所聞饒後錄廿二舒高甲寅所聞饒後錄廿三李杞字良仲平江人甲寅所聞饒後錄廿六張洽字元德清江人丁未癸丑所聞附池錄後黃士毅字子洪莆田人蜀類徽續類李壯祖字處謙邵武人蜀類李公謹名文子字公謹邵武人蜀類一之蜀類枅徽續類郭逍遙建別錄十八不知何氏建別錄十九二十朱子遺語之行於世也盛矣蓋本其舊者有三而從以類者二靖德嘗受讀而病其難也昔朱子嘗次程子之書矣著記錄者主名而稍第其所聞歲月且以精擇審取戒後之學者李公道傳之刊池錄也蓋用此法黃公榦既序之矣后乃不滿意蓋亦懼夫讀者之不得其方也二公之心其亦韓子所謂堯舜之利民也大而禹之慮民也深者乎是以黃公不自, WYG: ''}
