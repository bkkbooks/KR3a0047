  - {type: variant, offset: 1840, length: 413, content: 所未蔡公杭刊後錄又益富矣然饒錄最後三家李公嘗附致其疑而其四十二卷元題文說者以靖德考之疑包公揚所錄蓋公之子尚書恢嘗刻公所輯文說一編視此卷雖略而饒後錄所刊包公錄中往往有此卷中語是知此為公所錄亡疑獨所載胡子知言一章謂書為溺心志之大阱者最為疑忌後學使不知者謂為先生語是當削去亡疑而李公不能察也語錄之難讀如此黃公之慮豈為過哉語之從類黃子洪士毅始為之史廉叔公說刻之蜀近歲徽州又刻之王公佖為續類徽州又刻之昔張宣公類洙泗言仁祖程子意也而朱子以滋學者入耳出口之弊疑之魏公了翁援是為學者慮當矣蔡公乃曰論語諸篇記亦以類則議者亦莫能破也然三錄二類凡五書者並行而錯出不相統壹蓋蜀類增多池錄三十餘家饒錄增多蜀類八九家而蜀類續類又有池饒三錄所無者王公謂蜀類作於池饒各為錄之後者蓋失之而今池錄中語尚多蜀類所未收則不可曉已豈池錄嘗再增定邪抑子洪猶有遺邪子洪所定門目頗精詳為力矣廉叔刻之不復讎校故文字甚差脫或至不可讀徽本附以饒錄續類又增前類所未入亦為有功惜其雜亂, WYG: 刪除}
