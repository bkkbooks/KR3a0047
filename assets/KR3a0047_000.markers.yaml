  - {type: variant, offset: 2876, length: 0, content: '', krp: 鬼神其别有三在天之鬼神隂陽造化是也在人之鬼神人死為鬼是也祭祀之鬼神神示祖考是也三者雖異其所以為鬼神者則同知其異又知其同斯可以語鬼神之道矣故合為一卷性理論性不論氣不備故先總論人物之性而繼以氣稟之性為一卷古人之學必先明夫名義故為學也易而求之不差後世名義不明故為學也難盖有終身昧焉而不察者又安能反而體之於身哉故以性情心意等之命名者為一卷仁義禮智等之命名者為一卷共三卷學先之以小學為一卷總論為學之方為一卷次論知行為一卷次專論讀書之法為二卷乃致知之一端也次則及夫持守為一卷又次則終以行事為一卷共七卷朱子教人之序如此因敢次第之即大學致知而后誠意正心脩身誠意正心脩身而后齊家治國平天下之道也從上聖賢相承定法不容變易如近世之逞虚言而不實踐乃學者之罪正原於知之未致非教之失也苟或懲此别立一法後致知而先行事則其始雖若有近效而其終之弊必至廢書而流於異端不然所見不充規模狹隘不過於循黙自守而已所謂經綸大經則無矣非理學之功用也大學五卷論語三十二卷孟子十一卷中庸三卷易十三卷易類悉本卦爻次第上下繫說序卦亦本古注分章今從本義惟綱領三卷則畧為義例氣數雖並行然有氣而後有數故先隂陽而數始次之物受形於氣數故圖書次之易本圖書而畫故伏羲六十四卦次之而原易之作則本教天下之占故卜筮次之而所以教天下之占者則假竒偶之體以象吉凶故象次之此伏羲之易朱子所謂本義也此則為二卷易始無辭更文王周公孔子而辭始備故三聖之易越千有餘年至程子而始演易之理邵子而始明易之數又至朱子而始推易之占故繼以三子之易然後總論夫讀易之方與夫卦爻等義可以類推而通者而復終之以人事以明易為人事用也凡後世之言易者其得失畧次于後使學者有考焉此則為一卷上經四卷下經二卷下繫三卷說序雜卦一卷書二卷詩二卷孝經一卷春秋一卷禮八卷樂一卷孔孟周程張邵朱子自孔子及顔曾弟子至孟子以周程張子共附為一卷周程所以上繼孔孟也然後分周子之書為一卷程子之書為三卷凡係入近思者皆依卷次第别為二卷其非入近思者以類而從别為一卷文集附焉張子之書為二卷亦别入近思者邵子之書為一卷程子門人為一卷楊氏尹氏門人為一卷羅氏胡氏門人為一卷朱子自論學工夫為一卷論注書為一卷已上諸經存者不入外任一卷内任一卷論治道一卷論取士一卷論兵刑一卷論民財一卷論官一卷訓門人九卷吕伯恭一卷陳葉一卷陸氏一卷老莊一卷釋氏一卷本朝六卷歴代三卷戰國漢唐諸子一卷雜類一卷作文二卷朱子語類姓氏廖德明字子晦南劍人癸巳以後所聞池録一饒録四十六輔廣字漢卿慶源人居嘉興甲寅以後所聞池録二余大雅字正叔上饒人戊戌以後所聞池録三陳文蔚字才卿上饒人戊申以後所聞池録四李閎祖字守約邵武人戊申以後所聞池録五李方子字公晦邵武人戊申以後所聞池録六葉賀孫字味道括蒼人居永嘉辛亥以後所聞池録七八九十十一潘時舉字子善天台人癸丑以後所聞池録十二饒録四十六董銖字叔重鄱陽人丙辰以後所聞池録十三饒録四十六竇從周字文卿丹陽人丙午以後所聞池録十四金去偽字敬直樂平人乙未所聞池録十五李季札字季子婺源人丙申乙卯所聞池録十六萬人傑字正淳興國人庚子以後所聞池録十七饒録四十六楊道夫字仲愚建寧人己酉以後所聞池録十八十九徐㝢字居父永嘉人庚戌以後所聞池録二十一二十饒録四十六林恪字叔恭天台人癸丑所聞池録二十二饒録四十六石洪慶字子餘臨漳人癸丑所聞池録二十三徐容字仁父永嘉人辛亥所聞池録二十四甘節字吉父臨川人癸丑以後所聞池録二十五黃義剛字毅然臨川人癸丑以後所聞池録二十六二十七饒録三十八㬊淵字亞夫涪陵人癸丑所聞池録二十八龔盖卿字夢錫闕甲寅所聞池録二十九廖謙字益仲衡陽人甲寅所聞池録三十孫自修字敬父宣城人甲寅所聞池録三十一潘履孫字坦翁婺源人居紹興甲寅所聞池録三十二湯泳字叔永丹陽人乙卯所聞池録三十三林䕫孫字子武三山人丁巳以後所聞池録三十四三十五陳埴録已削錢木之字子山晉陵人寓永嘉丁巳所聞池録三十六曾祖道字闕闕丁巳所聞池録三十七沈僴字杜仲永嘉人戊午以後所聞池録三十八三十九四十四十一郭友仁字徳元山陽人寓臨安戊午所聞池録四十二李儒用字仲秉岳陽人己未所聞池録四十三饒録三十黄榦字直卿閩縣人闕饒録一饒後録一何鎬字叔京邵武人乙未以前所聞饒録二程端蒙字正思鄱陽人己亥以後所聞饒録三周謨字舜弼南康人己亥以後所聞饒録四五潘柄字謙之三山人癸卯以後所聞饒録六魏椿字元夀建陽人戊申五夫所聞饒録七饒後録二十四吳必大字伯豐興國人戊申己酉所聞饒録八黃㽦字子耕分寧人戊申所聞饒録九十楊若海字闕子道夫之闕饒録十一楊驤字子昻道夫族兄己酉甲寅所聞饒録十二陳淳字安卿龍溪人庚戌己未所聞饒録十三十四章伯雨字蜚卿甌寧人庚戌所聞饒録十五鄭可學字子上莆田人辛亥所聞饒録十六滕璘字徳粹新安人辛亥所聞饒録十七王力行字近思同安人辛亥所聞饒録十八游敬仲字連叔南劍人辛亥所聞饒録十九不知何氏辛亥同舍共聞饒録二十黄升卿字闕闕辛亥所聞饒録二十一周明作字元興建陽人壬子以後所聞饒録二十二蔡㦛字行夫平陽人壬子所錄饒録二十三楊與立字闕夫浦城人道從兄壬子同劉闕龔栗諦見饒録二十四鄭南升字文相潮州人癸丑所聞饒録二十五歐陽謙之字晞遜闕癸丑所聞饒録二十六游倪字和之建寧人癸丑所聞饒録二十七楊至字至之泉州人癸丑甲寅所聞饒録二十八饒後錄二十五潘植字立之闕癸丑所聞饒録二十九王過字幼觀鄱陽人甲寅以後所聞饒録三十董拱夀字仁叔鄱陽人甲寅所聞饒録三十一林學蒙字正卿三山人甲寅以後所聞饒録三十二林賜字聞一闕乙卯以後所聞饒録三十三胡泳字伯量南康人戊午所聞饒録三十四吕燾字徳昭弟煥字徳逺南康人己未所聞饒錄三十六三十七不知何氏己未同舍共録饒録三十九不知何氏闕饒録四十四一四二吳夀昌字大年邵武人丙午同子浩録饒録四十三楊長孺字伯子廬陵人甲寅記見饒録四十四吳琮字仲方臨川人甲寅記見饒録四十五已上三家非㡳木覽者詳之楊方字子直汀州人庚寅所聞饒後録一間有可疑包揚字顯道建昌人癸卯甲辰乙巳所聞饒後録三四五六間有疑誤劉炎字闕闕己酉甲寅以後所聞饒後録七劉子寰字圻父建陽人己未所聞饒後録八邵浩字闕闕丙午所聞饒後録九劉砥字履之三山人庚戌所聞饒後録十劉礪字用之三山人己未所聞饒後録十一李煇字晦父闕闕饒後録十二陳芝字庭秀闕壬子所聞饒後録十三黄灝字商伯都昌人闕饒後録十四黄卓字徳美延平人闕饒後録十五汪徳輔字長孺鄱陽人壬子所聞饒後録十六呉振字闕闕闕饒後録十七呉雉字和中建陽人闕饒後録十八鍾震字春伯潭州人甲寅所聞饒後録十九林子蒙字闕闕闕饒後録二十林學履字闕闕己未所録饒後録二十一蕭佐字闕闕甲寅所聞饒後録二十二舒髙字闕闕甲寅所聞饒後録二十二李把字良仲平江人甲寅所聞饒後録二十六張洽字元徳清江人丁未癸丑所聞附池録後黄士毅字子洪莆田人闕蜀類徽續類李壯祖字處謙邵武人闕蜀類李公謹字闕闕闕蜀類一之闕蜀類枅闕徽續類郭逍遥字闕闕闕建别録十八不知何氏闕建别録十九二十}
