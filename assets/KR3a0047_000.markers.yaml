  - {type: variant, offset: 2561, length: 1, content: 讀, WYG: 言嘗以告周卿者亷叔曰然則已諸曰已之無傷雖然安於小成甘於自棄者氣質之偏而無以矯之也而秉彝好德之心誰獨無之予前所憂葢為世之專事乎耳目口筆苟以譁衆取寵而無志乎逺且大者也儻不忍自薄其身則無寧深體熟玩以為求端用力之模準者乎今未可概以是為疑而閟其傳盍遂以此冠篇而併刻之將聽學者之自擇焉子洪名士毅姑蘇人嘗類文公集百五十卷今藏之策府又類注儀禮未成書云嘉定十三年九月丁亥朔臨卭魏了翁序論語一書乃聖門髙弟所集以記夫子之嘉言善行垂訓後世朱子}
