  - {type: variant, offset: 2528, length: 0, content: '', krp: 觀其所言則今他書間𫝊朱子之語而不見于語類者葢多為靖徳所刪削鄭任鑰不知此意乃以四書大全所引不見今本語類者指為或問小注之証其亦不考之甚矣乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀朱子語類原序晦庵朱先生所與門人問答門人退而私竊記之先生没其書始出記錄之語未必盡得師𫝊之本㫖而更相傳寫又多失其本真甚或輒自刪改雜亂訛舛幾不可讀李君道傳貫之自蜀來仕于朝博求先生之遺書與之游者亦樂為之搜訪多得記錄者之初本其後出守儀真持庾節於池陽又與潘時舉葉賀孫諸嘗從游於先生之門者互相讎校重複者削之訛謬者正之有别錄者有不必錄者隨其所得為卷帙次第凡三十有三家繼此有得者又將以附于後時以備散失廣其𫝊耳先生之著書多矣教人求道入德之方備矣師生函丈間往復詰難其辨愈詳其義愈精讀之竦然如侍燕閒承謦欬也厯千載而如㑹一堂合衆聞而悉歸一已是書之傳豈小補哉貫之既以鋟諸木以榦與聞次輯而俾述其意云嘉定乙亥十月朔旦門人黄榦謹書嘉定乙亥嵗仲兄文惠公持節江左取所傳朱文公先生語錄鋟木池陽凡三十有三家其書盛行性傳被命造朝益加搜訪由丙戌至今得四十有一家率多初本去其重複正其訛舛第其嵗月刻之鄱陽學宫復考池錄所餘多可傳者因取以附其末合池錄與今錄凡先生平生所與學者談經論事之語十得其九嗣有所得尚續刋之池錄之行也文肅黃公直卿既為之序其後書與伯兄乃殊不滿意且謂不可以隨時應荅之語易平生著述之書性傳謂記者易差自昔而然河南遺書以李端伯師說為首盖端伯所記伊川先生嘗稱其最得明道先生之㫖故也至論浩氣一條所謂以直養而無害云者伊川乃深不謂然端伯猶爾况於其他直卿之云真是也然嘗聞和靖先生稱伊川之語曰某在何必觀此書而文公先生之言則曰伊川在何必觀伊川亡則不可以不觀矣盖亦在乎學者審之而已先生家禮成於乾道庚寅通鑑綱目西銘解義成於壬辰太極通書義成於癸巳論孟註問詩集傳成於淳熈丁酉易本義啓蒙成於乙巳丙午之間大學中庸章句或問成書雖乆至己酉乃始序而傳之楚辭集註韓文考異成於慶元乙卯禮書雖有綱目脫藁者僅二十有三篇其著書嵗月次第可考也家禮編成而逸既殁而其書出與晩嵗之說不合先生盖未嘗為學者道也語孟中庸大學四書後多更定今大學誠意章盖未易簀前一夕所改也是四書者覃思最乆訓釋最精明道傳世無復遺藴至其他書盖未及有所筆削獨見於疑難荅問之際多所異同而易書為甚㬊淵所錄一編與本義異者十之三四大率多合先君文昭本傳之說文昭謂乾坤之用主於誠敬坎離之用主於誠明世未有通其義者而先生獨稱之其不執一說惟是之從如此故愚謂語錄與四書異者當以書為正而論難往復書所未及者當以語為助與詩易諸書異者在成書之前亦當以書為正而在成書之後者當以語為是學者類而求之斯得之矣不特此也先生平日論事甚衆規恢其一也至其暮年乃謂言規恢於紹興之間者為正言規恢於乾道以後者為邪非語錄所載後人安得而知之是編也真不為無益而學者不可以不之讀也先生又有别錄十卷所譚者炎興以來大事為其多省中語未敢𫝊而卯火亡之今所存者幸亦一二焉嘉熙戊戌月正元日後學三嵎李性傳書鄱陽所刋先師文公朱先生語錄固欲續池錄所未備然先師之言滿天下二錄所收亦豈能遽盡哉淳祐戊申抗將指江東鄱陽洪叔魯芹以其外大父吏部楊公方手所錄寒泉語見示既又於安仁湯叔遜次得其家藏包公揚所錄二公在師門為前輩所錄尚未編入則所遺者亦多矣繼而東陽王元敬佖亦以所集刋本見寄又得里中朋友所傳一二家乃悉以次編入為二十六卷先師之緒言雖未敢謂無復遺逸然所㑹稡益富矣獨念先師又有親自删定與先大父西山講論之語及性與天道之妙名曰翁季錄者久未得出以流行於世豈斯文之顯晦固自有時乎竊尤有感於此故輒併識其拳拳之意云淳祐己酉中秋日門人建安蔡抗書子朱子語錄行於世尚矣池錄三十有三家鄱本續錄四十有二家其三十四家池本所未有也再見者兩家錄餘凡六家又後錄二十三家其二十家亦池本所未有也再見者三家合三錄為八十七家及門之士固有如謝先生在程門無錄者其有錄可傳者既如此矣堅末學生晩嘉定癸未甲申間侍先君子官長沙帥西山真先生倅𢎞齋李先生常進之函丈又事長沙舒先生列岳麓諸生果齋李先生過潭又獲侍講席焉果齋先君子畏友也嘗介以登朱子之門堅繇是多見未行語錄手抄盈篋凡六十五家今四十年矣晚得池鄱本參攷刋者固已多然黄士毅所錄朱子親筆所改定者已見於輔廣錄中其所自錄及師言則亦三錄所未有若李壯祖張洽郭逍遥所錄亦未有也朅來閩中重加㑹稡以三錄所餘者二十九家及增入未刋者四家自為别集以附續錄後集之末泰華髙矣滄海深矣非有待增益也獨念蚤所聞於父師者罔敢失墜今幸是錄所已行者如此則其尚有所遺者敢付之一筆删去哉亦並行之可也抑堅聞之大易居行先以學聚問辯中庸篤行先以學問思辯程子以講明道義論古今人物為格物致知之首則學非問辯不明審矣朱子教人既有成書又不能忘言者為答問發也天地之所以髙厚一物之所以然其在成書引而不發者語錄所不可無也凡讀先生成書者兼攷乎語錄可也若但涉獵乎語錄而不玩味於成書幾何而不為入耳出口之資為已之學葢不然也書於篇端以諗同志抑以自警焉咸淳初元嘉平之月後學天台吳堅敬識右語類總成七十家除李侯貫之已刋外增多三十八家或病諸家所記互有重複乃類分而考之盖有一時之所同聞退各抄録見有等差則領其意者斯有詳略或能盡得於言而首尾該貫或不能盡得於言而語脉間斷或就其中粗得一二言而止今惟存一家之最詳者而它皆附于下至於一條之内無一字之不同者必抄録之際嘗相參校不則非其聞而得於傳録則亦惟存一家而注與某人同爾既以類分遂可繕寫而略為義例以為後先之次第有太極然後有天地有天地然後有人物有人物然後有性命之名而仁義禮智之理則人物所以為性命者也所謂學者求得夫此理而已故以太極天地為始乃及於人物性命之原與夫古學之定序次之以羣經所以明此理者也次之以孔孟周程朱子所以傳此理者也乃繼之以斥異端異端所以蔽此理而斥之者任道統之責也然後自我朝及歴代君臣法度人物議論亦略具焉此即理之行於天地設位之後而著於治亂興衰者也凡不可以類分者則雜次之而以作文終焉葢文以載道理明意達則辭自成文後世理學不明第以文辭為學固有竭終身之力精思巧製以務名家者然其學既非其理不明則其文雖工其意多悖故特次之於後深明夫文為末而理為本也然始焉妄易分類之意惟欲考其重複及今而觀之則夫理一而名殊問同而答異者淺深詳略一目在前互相發明思已過半至於羣經則又足以起或問之所未及校本義之所未定補書説之所未成而大學章句所謂髙入虛空卑流功利者皆灼然知其所指而不為近似所陷溺矣誠非小補者故嘗謂孔孟之道至周程而復明至朱子而大明自今以後雖斯道未能盛行於世而誦遺書私淑艾者必不乏人不至於千五百年之久絶而不續反復斯編抑自信云語類成編積百四十卷同志艱於傳錄而眉山史亷叔願鋟于木士毅之類次雖犯不韙而不復固辭者庶幾無傳録之艱也獨池本陳埴一家惟論仁一條按遺文乃答埴書不當取為類故今不載又輔廣所録以先生改本校之則去其所改而反存其所勾者合三十餘條今亦惟據改本自首連數至君子所貴乎道者三而注云自此以前皆先生親改亦傳聞之誤當時雜改定者八十餘條耳或有一條析為三四條如竇從周録所見先生語之類今則復其舊或士毅所傳本多於刋本如黃義剛者悉類入而不去文異者則姑注一二條云一本作某字以上皆與池本異者盖池本雖黄侯直卿之所次輯然李侯貫之惟據所傳以授直卿而直卿亦據所授以加讎校且有增改於已讎校之後者不與焉故近聞之直卿欲求元本刋改而未能也至於或出於追述或得於傳聞則文辭之間不無差誤凡此之類}
