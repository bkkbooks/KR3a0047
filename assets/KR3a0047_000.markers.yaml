  - {type: variant, offset: 1015, length: 269, content: 人癸丑所聞饒錄廿五歐陽謙之字晞遜癸丑所聞饒錄廿六游倪字和之建甯人癸丑所聞饒錄廿七楊至字至之泉州人癸丑甲寅所聞饒錄廿八饒後錄二十五潘植字立之癸丑所聞饒錄廿九王過字幼觀鄱陽人甲寅以後所聞饒錄三十董拱壽字仁叔鄱陽人甲寅所聞饒錄三一林學蒙字正卿三山人甲寅以後所聞饒錄三二林賜字聞一乙卯以後所聞饒錄三三胡泳字伯量南康人戊午所聞饒錄三四呂燾字德昭弟煥字德遠南康人己未所聞饒錄三六三七不知何氏己未同舍共錄饒錄三九不知何氏饒錄四十四一四二吳壽昌字大年邵武人丙午同子浩錄饒錄四三楊長孺字伯子廬陵人甲寅記見饒錄四四吳琮字仲方臨川人甲寅記見饒錄四五已上三家非柢, WYG: 曰徽}
