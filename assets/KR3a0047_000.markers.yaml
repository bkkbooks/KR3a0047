  - {type: variant, offset: 2705, length: 151, content: 樞密所跋文說謂公所錄多且詳與世所傳大概無異故藏而不出云者不相似樞密又謂公所錄已亡於建安之火不復存而湯氏乃有藏本是皆不能使人亡疑焉者靖德來盱江樞密甫下世恨不及質之也近歲吳公堅在建安又刊別錄二冊蓋收池饒三錄所遺而亦多已見他錄者併參校而附益之粗為定編靖德適行郡事因輒刻之郡齋與學者共之咸淳庚午正月辛亥靖德再書, WYG: 語類原序}
