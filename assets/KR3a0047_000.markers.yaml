  - {type: variant, offset: 2561, length: 1, content: 讀, krp: 言嘗以告周卿者亷叔曰然則已諸曰已之無傷雖然安於小成甘於自棄者氣質之偏而無以矯之也而秉彝好德之心誰獨無之予前所憂葢為世之專事乎耳目口筆苟以譁衆取寵而無志乎逺且大者也儻不忍自薄其身則無寧深體熟玩以為求端用力之模準者乎今未可概以是為疑而閟其傳盍遂以此冠篇而併刻之將聽學者之自擇焉子洪名士毅姑蘇人嘗類文公集百五十卷今藏之策府又類注儀禮未成書云嘉定十三年九月丁亥朔臨卭魏了翁序論語一書乃聖門髙弟所集以記夫子之嘉言善行垂訓後世朱子}
  - {type: variant, offset: 2565, length: 1, content: 戒, WYG: 編其亦傚是意而為之者也或曰語必以類相從豈論語意歟曰學而一篇所記多務本之意里仁七章所記皆為仁之方若八佾之論禮樂鄉黨之記言行公冶長辨人物之賢否微子載聖賢之出處亦何嘗不以類哉天下之理同歸而殊塗一致而百慮非有以會而通之}
  - {type: page-break, offset: 2565, content: '', id: KR3a0047_WYG_000-14a, image: WYG0700/WYG0700-0008a.png}
  - {type: variant, offset: 2565, length: 1, content: 戒, krp: 編其亦傚是意而為之者也或曰語必以類相從豈論語意歟曰學而一篇所記多務本之意里仁七章所記皆為仁之方若八佾之論禮樂鄉黨之記言行公冶長辨人物之賢否微子載聖賢之出處亦何嘗不以類哉天下之理同歸而殊塗一致而百慮非有以會而通之}
  - {type: punctuation, offset: 2566, content: ，, id: KR3a0047_tls_000-bkkpn3603}
  - {type: 'tls:seg', offset: 2566, content: '', id: KR3a0047_tls_000-1a.3214}
  - {type: variant, offset: 2567, length: 1, content: 庶, WYG: 祗見其異耳大傳曰觸類而長之天下之能事畢矣而伊川之誨學者亦必曰將聖賢言仁處類聚觀之然則語類之集其有功於學者多矣新安舊有紫陽書堂而紫陽之書未備也通守洪君勲教授張君文虎相與謀以蜀本語類刋之越二歲而書成郡侯謝工部坐屬余為跋其梗概余不得辭也因僭為之說曰理有可以類通而非可以類止是其然必有所以然學者因其類以䆒極朱子之全書使此理融會通貫不梏於一事一物而止則無愧於吾夫子觸類而長之訓也若夫憚煩勞安簡佚以為取足於此則朱子固嘗以是為學者病矣烏}
  - {type: page-break, offset: 2567, content: '', id: KR3a0047_WYG_000-14b, image: WYG0700/WYG0700-0008b.png}
  - {type: variant, offset: 2567, length: 1, content: 庶, krp: 祗見其異耳大傳曰觸類而長之天下之能事畢矣而伊川之誨學者亦必曰將聖賢言仁處類聚觀之然則語類之集其有功於學者多矣新安舊有紫陽書堂而紫陽之書未備也通守洪君勲教授張君文虎相與謀以蜀本語類刋之越二歲而書成郡侯謝工部坐屬余為跋其梗概余不得辭也因僭為之說曰理有可以類通而非可以類止是其然必有所以然學者因其類以䆒極朱子之全書使此理融會通貫不梏於一事一物而止則無愧於吾夫子觸類而長之訓也若夫憚煩勞安簡佚以為取足於此則朱子固嘗以是為學者病矣烏}
  - {type: variant, offset: 2570, length: 0, content: '', WYG: 抑二君推廣私淑之意亦賢矣哉淳祐壬子六月望日蔡抗序文公朱先生語類一百三十八卷壺山黄子洪取門人所錄語以類相從也先是池本饒本人各為錄間見錯出讀者病焉子洪既以類流傳便於玩索而微言精語猶有所遺佖每加訪求得所未見自是朋友知舊知其有心於纂輯亦頗互出所有以見示凡三十有餘家既裒以為婺錄而繼之者尚未艾也佖幽居無事葢嘗潛心而觀之審訂其複重參繹其端緒用子洪已定門目稡為續類凡四十卷或謂前類不為少矣又以續類附益之不已多乎竊謂學固戒於徒博然亦不可以不博而徑約也又況文公先生之道髙明廣大致極無遺學者正當盡博約之方而後精微中庸之趣始可漸而求佖每觀諸家所錄以其問有淺深故於教告亦有不同其視文公先生之精藴不能得其全者尚多有之必也篤信好學反復尋繹能知所盡心焉雖以前續之繁固將無所厭斁不然則雖先生平日已著為定論之書尚有所憚而不肯觀而況於此乎哉然則先生片言半語苟有所傳固不容有所忽而不䆒其所歸也新安魏史君葢鶴山先生之嗣也近以紫陽所刋語類為寄因以續類為請而慨然欲併刋之以全書院之傳布其樂於闡明文公先生之遺訓葢如此遂舉以屬之且竊識于後庶幾乎}
  - {type: page-break, offset: 2570, content: '', id: KR3a0047_WYG_000-15a, image: WYG0700/WYG0700-0008c.png}
