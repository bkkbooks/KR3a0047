body:
  text: 朱子語類卷第一百一十一朱子八論民建寧迎神先生曰孟子言我亦欲正人心息邪説距詖行放淫辭今人心都喎邪了所以如此泉州一富室捨財造廟舉室乘舟往廟所致祭落成中流舟溺無一人免者民心不得其正眼前利害猶曉不得況欲曉之以義理哉必大人傑録略教民今欲行古制欲法三代煞隔霄壤今説為民減放幾時放得到他元肌膚處且如轉運使每年發十萬貫若大段輕減減至五萬貫可謂大恩然未減放那五萬貫尚是無名額外錢須一切從民正賦凡所增名色一齊除盡民方始得脫淨這裏方可以議行古制如今民生日困頭只管重更起不得為人君為人臣又不以為急又不相知如何得好這須是上之人一切掃除妄費臥薪嘗膽合天下之智力日夜圖求一起而更新之方始得某在行在不久若在彼稍久須更見得事體可畏處不知名園麗圃其費幾何日費幾何下面頭會箕斂以供上之求又有上不在天子下不在民只在中間白乾消沒者何限因言賦重民困曰此去更須重在賀孫取民程正思言當今守令取民之弊渠能言其弊畢竟無策就使臺官果用其言而陳於上前雖戒敕州縣不過虛文而已先生云今天下事只礙箇失人情便都使不得蓋事理只有一箇是非今朝廷之上不敢辨別是非如宰相固不欲逆上意上亦不欲忤宰相意今聚天下之不敢言是非者在朝廷又擇其不敢言之甚者為臺諫習以成風如何做得事人傑今上下匱乏勢須先正經界賦入既正總見數目量入為出罷去冗費而悉除無名之賦方能救百姓於湯火中若不認百姓是自家百姓便不恤必大荀悅云田制須是大亂之後方可定揚今之賦輕處更不可重只重處減似那輕處可矣淳今世産賦百弊砧基簿只是人戶私本在官中本天下更無一處有稅賦本末更無可稽尋處義剛朋友言某官失了稅簿先生曰此豈可失了此是根本無這箇後如何稽考所以周官建官便皆要那史所謂史便是掌管那簿底義剛福建賦稅猶易辨浙中全是白撰橫斂無數民甚不聊生丁錢至有三千五百者人便由此多去計會中使作宮中名字以免稅向見辛幼安説糞船亦插德壽宮旗子某初不信後提舉浙東親見如此嘗有人充保正來論某當催秋稅某人當催夏稅某初以為催稅只一般何爭秋夏問之乃知秋稅苗産有定色易催夏稅是和買絹最為重苦蓋始者一匹官先支得六百錢後來變得令人先納絹後請錢已自費力了後又無錢可請只得白納絹今又不納絹只令納價錢錢數又重催不到者保正出之一番當役則為之困矣故浙中不如福建浙西又不如浙東江東又不如江西越近都處越不好淳義剛同浩曰江浙稅重昨日來路問村人見得此間只成十一之稅曰嘗見前輩説閩中真是樂國某初只在山間不知外處事及到浙東然後知吾鄉果是樂地今只汀州全做不得彼處屢經寇竊逃亡者多遺下産業好者上戶占去不好者勒鄰至耕佃鄰至無力又逃亡所有田業或拋荒或隱沒都無歸著又官科鹽於民歲歲增添此外有名目科斂不一官艱於催科民苦於重斂更無措手足處守倅只利俸厚得俸便了更不恤大體須是得監司與理會亦近説與應倉了不知如何浩云要好得監司去地頭置局與理會一番直是見底方可住先生擊節曰此是至切之論某之見正是如此浩黃仁卿將宰樂安論及均稅錢曰今説道稅不出鄉要之稅有輕重如何不出鄉得若教稅不出州時庶説稍均得先生曰稅不出鄉只是古人一時間尋得這説去防那一時之弊而今耳裏聞得卻把做箇大説話但只均稅錢也未盡須是更均稅物方得且如福州納稅一錢可以當這裏十錢而今便須是更均那稅物又曰往在漳州見有退稅者不是一發退了謂如春退了稅後秋又要退苗卻不知別郡如何然畢竟是名目多後恁地據某説時只教有田底便納米有地底便納絹只作兩鈔官司亦只作一倉一場如此百姓與官司皆無許多勞攘又曰三十年一番經界方好又曰元稹均田圖惜乎不見今將他傳來考只有兩疏卻無那圖然周世宗一見而喜之便欲行想見那圖大段好嘗見陸宣公奏議後面説那口分世業其纖悉畢盡古人直是恁地用心今人若見均田圖時他只把作鄉司職事看了定是不把作書讀今如何得有陸宣公樣秀才又曰林勳本政書每鄉開具若干字號田田下注人姓名是以田為母人為子説得甚好義剛楊通老相見論納米事先生曰今日有一件事最不好州縣多取於民監司知之當禁止卻要分一分此是何義理又論廣西鹽曰其法亦不密如立定格六斤不得過百錢不知去海遠處搬擔所費重此乃許子之道但當任其所之隨其所嚮則其價自平天下之事所以可權衡者正謂輕重不同乃今一定其價安得不弊又論汀寇止四十人至調泉福建三州兵臨境無寇須令汀守分析先生曰才做從官不帶職出便把這事做欠闕見風吹草動便喜做事不顧義理只是簡利多害少者為之今士大夫皆有此病可學嘗謂為政者當順五行修五事以安百姓若曰賑濟於凶荒之餘縱饒措置得善所惠者淺終不濟事道夫賑民今賑濟之事利七而害三則當冒三分之害而全七分之利不然必欲求全恐併與所謂利者失之矣人傑余正甫説時煞説得好雖有智者為之計亦不出於此然所説救荒賑濟之意固善而上面取出之數不節不可直卿云制度雖只是這箇制度用之亦在其人如糴米賑飢此固是但非其人則做這事亦將有不及事之患曰然賀孫賑濟之策初且大綱如抄人口之類亦且待其抄來如何如不實有人訟然後或添或去卻罪官吏一細碎便生病屯田亦然且理會大處如薛士龍輩皆有一定格子細細碎碎皆在我手尚得只一出使委人如何了得又此等事須是上下一心方行得揚直卿言辛幼安帥湖南賑濟榜文祇用八字曰劫禾者斬閉糶者配先生曰這便見得他有才此八字若做兩榜便亂道又曰要之只是粗法道夫李壽翁啓請要移義倉放鄉下令簿尉月巡之丞三月一巡之先生曰如此則丞簿尉只幹辦此事也不給都無力及其他事矣又月月官出擾鄉人一番也是行不得後被朝廷寫下常平法一卷下來也不道是行得行不得只休了又有一官人要令逐縣試過了方得來就試先生云且如福州十二縣今只一處弊逐處試過卻有十二處弊揚今日莫備於役法亦莫弊於役法振役民問差役雇役孰便曰互有得失而今所謂雇役便者即謂不擾稅人然聚浮浪無根著之人在那裏又多害事所謂差役便者即謂稅人自顧藉愛惜然其為之者多有破家蕩産之患蓋緣既教他作衙前少間庫廚都教他管便自備這物事以供應官員大有不便祖宗時卻有坊場河渡以補之謂之優重也夔孫因論役法曰差役法善朝以道嘗有劄子論差役有十利僩彭仲剛子復作台州臨海縣理會役法甚善朝廷措置役法看如何措置終是不公且如鄉有寬狹寬鄉富家多狹鄉富家少狹鄉富家靳靳自足一被應役無不破家蕩産極可憐憫彭計一縣有幾鄉鄉有闊狹某鄉多富家某鄉少富家卻中分富家以畀兩鄉令其均平其有不均處則隨其道里遠近分割裨補令其恰好人甚便之或曰恐致人怨曰不怨蓋其公心素有以信於民民自樂之雖非法令之所得為然使民宜之亦終不得而變也又有所在利於為保正而不利於為保長者蓋保長催稅其擾極多某在紹興有人訴不肯為保長少間卻計會情願做保正某甚嘉之以為捨易而就難及詢之土人乃云保長難於保正又有計會欲為保長者蓋有所獲於其中所在風俗不同看來只用倍法若産錢滿若干當為保正外又計其餘産若干當為保長若産錢倍多則須兩番為保正如此則無爭又催稅之法頃見崇安趙宰使人俵由子分為幾限令百姓依限當廳來納甚無擾及過隆興見帥司令諸邑俵由子催稅而責以十限縣但委之吏手是時飢餓民甚苦之恣為吏人乞覓或所少止七百而限以十限每限自用百錢與吏或欲作一項輸納吏又以違限拒之或所少不滿千錢而趁限之錢則已踰千矣其擾不可言所以做官難非通四方之風俗情偽如何了得僩李丈問保正可罷否曰這箇如何罷得但處之無擾可矣曰此自王荊公始否曰保正自古有但所管人戶數有限今只論都則人數不等然亦不干人數多寡若無擾雖所管千百家亦不為勞苦若重困之雖二十家亦不勝矣淳因論保伍法或曰此誠急務曰固是先王比閭保伍之法便是此法都是從這裏做起所謂分數是也兵書云御衆有多寡分數是也看是統馭幾人只是分數明所以不亂王介甫鋭意欲行保伍法以去天下坐食之兵不曾做得成范仲達名如璋太史之弟為袁州萬載令行得保伍極好自來言保伍法無及之者此人有心力行得極整肅雖有姦細更無所容每有疑以無行止人保伍不敢著互相傳送至縣縣驗其無他方令傳送出境訖任滿無一寇盜頃張定叟知袁州託其訊問則其法已亡偶有一縣吏略記大概僩某保甲草中所説縣郭四門外置隅官四人此最緊要蓋所以防衛縣郭以制變縣有官府獄訟倉庫之屬須是四面有箇防衛始得一箇隅官須各管得十來里方可諸鄉則只置彈壓之類而不復置隅官默寓箇大小相維之意於其間又後面子弟一段須是著意理會這箇子弟真箇要他用非其他泛泛之比須是別有箇拔擢旌賞以激勸之乃可此等事難處須是理會教他整密無些罅縫方可僩歸正人元是中原人後陷於蕃而復歸中原蓋自邪而歸於正也歸明人元不是中原人是徭洞之人來歸中原蓋自暗而歸於明也如西夏人歸中國亦謂之歸明燾論財今朝廷之財賦不歸一分成兩三項所以財匱且如諸路總領贍軍錢凡諸路財賦之入總領者戶部不得而預也其他則歸戶部戶部又未盡得凡天下之好名色錢容易取者多者皆歸於內藏庫封樁庫惟留得名色極不好極難取者乃歸戶部故戶部所得者皆是枷棒栲箠得來所以戶部愈見匱乏封樁內藏孝宗時鋭意恢復故愛惜此錢不肯妄用間欲支則有司執奏旋悟而止及至今日則供浮費不復有矣今之戶部內藏正如漢之大農少府錢大農則國家經常之費少府則人主之私錢今之戶部但逐時了得些以支撥都下軍馬之類如無又借出內藏錢以充之凡天下財賦到即分幾多入內庫幾多入何處幾多入戶部王宣子為戶部時曾去理會虞并甫不樂罷黜之揚因致道説國家財用耗屈某人曾記得在朝文臣每月共支幾萬貫武臣及內侍等五六十萬貫曰唐初節度使皆是臨陳對敵平定禍亂故得此官今因唐舊而節度使之名不罷皆安居暇食安然受節度使之重祿豈不是無謂似聞蔡京當國曾欲罷之賀孫宗室俸給一年多一年駸駸四五十年後何以當之事極必有變如宗室生下便有孤遺請給初立此條止為貧窮全無生活計者那曾要得恁地泛及賀孫因言宗室之盛曰頃在漳州因壽康登極恩宗室重試出官一日之間出官者凡六十餘人州郡頓添許多俸給幾無以支吾朝廷不慮久遠宗室日盛為州郡之患今所以已有一二州郡倒了緣宗室請受浩翰直是孤遺多且如一人有十子便用十分孤遺請受有子孫多則寧不肯出官蓋出官則其子孫孤遺之俸皆止而一官之俸反不如孤遺衆分之多也在法宗室無依倚者方得請孤遺俸有依倚者不得請有依倚謂其伯叔兄弟有官可以相依倚而不至於困乏今則有伯叔兄弟為官者反得憑勢以請孤遺之俸而真孤遺無依倚者反艱於請以其無援而州郡沮抑之也不知當初立法如何煞有不公處如宗室丁憂依舊請俸宗室選人待闕亦有俸給恩亦太重矣朝廷更不思久遠他日為州郡之害未涯也如漢法宗室惟天子之子則裂土地而王之其王之子則嫡者一人繼王庶子則皆封侯侯惟嫡子繼侯而其諸子則皆無封故數世之後皆與庶人無異其勢無以自給則不免躬農畝之事如光武少年自販米是也漳泉宗室最多南外西外在彼宮中不能容則皆出居於外因問西外南外曰徽宗以宗室衆多京師不能容故令秦王位下子孫出居西京謂之西外太祖位下子孫出居南京謂之南外及靖康之亂遭虜人殺戮虜掠之餘能渡江自全者高宗亦遣州郡收拾於是皆分置福泉二州依舊分太祖秦王位下而居之也居於京師者皆太宗以下子孫太宗子孫是時世次未遠皆有緦麻服故皆處於京師而太宗以下又自分兩等濮園者尤親蓋濮邸比那又爭兩從也濮園之親所謂南班宗室是也近年如趙不流之屬皆是南班其恩禮又優故濮園位下女事人者其夫皆有官因言京師破時黃唐傳為宗正官以宗室簿籍獻於虜虜依簿搜索無一人能逃匿者又徽宗淵聖諸子皆是宦者指名取索亦無一人能免者言之痛傷虜人初破京城時只見來索近上寵幸用事底宦者數人人莫測之但疑其欲效此間置官依效宮闈間事耳乃是呼去問諸王諸公主所在宮人有幾位諸王有幾位兩宮各有多少并宮中寶玉之藏各有幾所宦者一一聲説略不敢隱其有宮中祕藏寶玉之物外人不得知者虜人皆來索取皆是宦者教之也方搜捕諸王宗室時吳革獻議於孫傅欲藏匿淵聖之子年十許歲以續趙祀而取外人一子狀貌年數相似者殺之以獻虜云皇子出閣為衆人爭奪蹂踐而死孫傅不敢擔當竟不敢為只得兩手付之無一箇骨肉能免者可痛問吳革是時結連義兵欲奪二聖為范瓊誘殺之不知當時若從中起能有濟否曰也做不得大勢去矣古人云懍乎若朽索之馭六馬豈不是如此只這裏才操縱少緩其終便有此禍可不栗栗危懼從古以來如此如唐高祖太宗之子孫被武后殺盡其間不絶如吝唐明皇奔迸流離其子孫皆餓死中更幾番禍亂殺戮無遺哀哉卓或論會子之弊曰這物事輕了是誘人入於死地若是一片白紙也直一錢在而今要革其弊須是從頭理會方得燾或欲通銅錢出淮先生深以為不然云東南銅錢已是甚少其壞之又多端私鑄銅器者動整四五緡壞了只某鄉間舊有此想見別處更多又有海舶之泄海船高大多以貨物覆其上其內盡載銅錢轉之外國朝廷雖設官禁那曾檢點得出其不廉官吏反以此為利又其一則淮上透漏監官點閲稅物但得多納幾錢他不復問銅錢過彼極有利六七百文可得好絹一匹若更不禁那箇不要帶去又聞入川中用若放入川蜀其透漏之路更多賀孫論淮西鐵錢交子曰交子本是代錢今朝廷只以紙視之今須是銅錢交子不得用於淮鐵錢交子不得用於江南又須江南官司置場兌換銅錢交子乃可行耳人傑兩淮鐵錢交子試就今不行處作箇措置不若禁行在會子不許過江只專令用交子如淮人要過江買賣江南須自有人停榻交子便能換錢又不若朝廷捐數萬貫錢在江南收買交子卻發過淮南自可流通必大曰不許行在會子過淮此恐難禁先生以為然必大因言鐵錢之輕亦緣積年鑄得多了又只用之淮上十餘郡所以至此益賤先生遂言古者只是荒歲方鑄錢周禮所謂國凶荒札喪則市無征而作布既可因此以養飢民又可以權物之重輕蓋古人錢闕方鑄將來添今淮上亦可且住鑄數歲候少時卻鑄次年臣僚請罷舒蘄鼓鑄必大閩下四州鹽法分稅上四州官賣浙東紹興四州邊海亦合如閩下四州法而官賣之故其法甚弊揚
