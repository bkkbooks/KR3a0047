body:
  text: 朱子語類卷第二十五論語七八佾篇孔子謂季氏章季氏八佾止是多添人數未有明文故夫子就其事責之若三家雍徹則分明歌天子之詩故夫子引其詩以曉之人傑問是可忍也孰不可忍也曰季氏初心也須知其為不安然見這八佾人數熱鬧便自忍而用之這便是遏絕天理失其初心也子升問集注兩說不同曰如今亦未見聖人之言端的是如何如後說之意亦自當存蓋只此便是天理發處聖人言語固是旨意歸一後人看得有未端的處大率意義長者錄在前有當知而未甚穩者錄在後如放於利而行多怨或者又說求利而不得則自多怨天尤人此意亦自是但以意旨觀之人怨之說為分曉故只從一說木之居父問是可忍也後說恐未安聖人氣象似不如此暴露曰前日見趙子欽亦疑此亦是但聖人亦自有大段叵耐人處如孔子作春秋是大段叵耐忍不得處賀孫問是可忍也范氏謂季氏罪不容誅莫是有不容忍之意否曰只大概如此說不是有此意時舉三家者以雍徹章問三家者以雍徹曰這箇自是不當用更無可疑問是成王賜周公曰便是成王賜周公也是成王不是若武王賜之也是武王不是公道是成王賜便不敢道不是了雍詩自是武王之樂餘人自是用他不得成王已自用不得了何況更用之於他人卓問雍徹程子謂成王之賜伯禽之受皆非也曰使魯不曾用天子之禮樂則三家亦無緣見此等禮樂而用之時舉問范氏以成王賜魯以天子禮樂惟用以祀周公於大廟非使魯君亦得以用之也不如伊川斷然便道成王不當賜伯禽不當受曰然范先生說書大抵言語寬所以至此榦居是邦不非其大夫只是不議其過惡若大夫有不善合當諫正者亦不可但已孔子謂季氏八佾與三家雍徹之事又卻不然人傑人而不仁如禮何章或問人而不仁如禮何人而不仁如樂何曰如禮樂何謂其不柰禮樂何也心中斯須不和不樂而鄙詐之心入之外貌斯須不莊不敬而慢易之心入之既不和樂不莊敬如何行得禮樂儒用錄云不莊不敬不和不樂便是不仁暴慢鄙詐則無如禮樂何矣譬如不善操舟必不柰一舟何不善乘馬必不柰一馬何又問禮樂是玉帛鐘鼓之文否曰看其文勢卻是說玉帛鐘鼓之禮樂也人傑儒用同人既不仁自是與那禮樂不相管攝禮樂雖是好底事心既不在自是呼喚他不來他亦不為吾用矣心既不仁便是都不醒了如人身體麻木都不醒了自是與禮樂不相干事所以孟子說學問之道無他求其放心而已矣只是一箇求放心更無別工夫或曰初求放心時須是執持在此不可令他放曰也不用擒捉他只是要常在這裏或曰只是常常省察照管得在便得不可用心去把持擒捉他曰然只知得不在才省悟便在這裏或曰某人只恁擒制這心少間倒生出病痛心氣不定曰不是如此只是要照管常在此便得問禮者天理之節文樂者天理之和樂仁者人心之天理人心若存得這天理便與禮樂湊合得著若無這天理便與禮樂湊合不著曰固是若人而不仁空有那周旋百拜鏗鏘鼓舞許多勞攘當不得那禮樂燾人而不仁則其心已不是其心既不是便用之於禮樂也則是虛文決然是不能為心既不正雖有鐘鼓玉帛亦何所用卓人而不仁如禮何而今莫說八佾雍徹是無如禮樂何便教季氏用四佾以祭也無如禮樂何緣是它不仁了夔孫蜚卿問人而不仁如禮何是無惻隱之心則禮樂皆為虛文曰此仁是指全體而言不是指惻隱可學希真問人而不仁與不能以禮讓為國皆曰如禮何意同否曰人而不仁是以仁對禮樂言不以禮讓是以禮之實對禮之文言能以遜讓為先則人心感服自無乖爭陵犯之風恪或問集注云禮樂不為之用如何曰禮是恭敬底物事爾心中自不恭敬外面空做許多般模樣樂是和樂底物事爾心中自不和樂外面強做和樂也不得心裏不恁地外面強做終是有差失縱饒做得不差失也只表裏不相應也不是禮樂集注集注云禮樂不為用是如何曰不仁之人渾是一團私意自不柰那禮樂何禮樂須是中和溫厚底人便行得若不仁之人與禮樂自不相關了譬如無狀之人去讀語孟六經語孟六經自是語孟六經與他即無干涉又安得為之用時舉或問人而不仁注下數語曰其如禮樂何哉是柰他不下禮樂不為之用也是不為我使我使他不得雖玉帛交錯不足以為禮雖鐘鼓鏗鏘不足以為樂雖有禮而非禮雖有樂而非樂因言季氏當初成王不賜伯禽不受則後人雖欲僭亦無樣子他也做不成又曰觀天子之禮於魯宋宋是二王後有天子之禮當時諸侯皆不識天子之禮皆於魯宋觀之節仁者天下之正理只是汎說不是以此說仁體若曰義者天下之正理也得義剛問仁者天下之正理曰說得自好只是太寬須是說仁是本心之全德便有箇天理在若天理不在人欲橫肆如何得序而和時舉程子說仁者天下之正理固好但少疏不見得仁仁者本心之全德人若本然天理之良心存而不失則所作為自有序而和若此心一放只是人欲私心做得出來安得有序安得有和銖問仁者天下之正理曰此說太寬如義亦可謂天下之正理禮亦可謂天下之正理又問仁是合知覺與理而為之與捨知覺而為之與曰仁自是知覺又問知覺是仁中之一件否久之曰生底是仁又曰仁義禮智是四箇根子惻隱羞惡恭敬是非是根上所發底苗又曰生是元長是亨收斂是利藏是貞只是一氣理無形故就氣上看理也是恁地次日又曰仁是根愛是苗又曰古人言仁多以慈詳愷悌易則曰安土敦乎仁故能愛何嘗以知覺為仁又曰程子曰仁是理此說太寬如曰偏言則一事專言則包四者此說卻是緊要底問仁如何包四者曰易便說得好元者善之長義禮知莫非善這箇卻是善之長又曰義禮知無仁則死矣何處更討義禮知來又曰如一間屋分為四段仁是中間緊要一段孟子言仁人心義人路後不言義者包義在其中如克己復禮為仁亦是恁地節問仁者心之德也不仁之人心德既亡方寸之中絕無天理平日運量酬酢盡是非僻淫邪之氣無復本心之正如此等人雖周旋於玉帛交錯之間鐘鼓鏗鏘之際其於禮樂判為二物如猿狙衣周公之服一般其如禮樂何伊川所謂仁者天下之正理失正理則無序而不和所謂正理即心之德也若天理不亡則見得禮樂本意皆是天理中發出來自然有序而和若是胸中不有正理雖周旋於禮樂之間但見得私意擾擾所謂升降揖遜鏗鏘節奏為何等物不是禮樂無序與不和是他自見得無序與不和而禮樂之理自在也曰只是如此南升問人而不仁如禮樂何據李氏之說則指在外之禮樂言之如玉帛鐘鼓之類程先生所謂無序而不和卻是主在內者言之如何曰兩說只是一意緣在我者無序而不和故在外之禮樂亦不為我用又問仁義禮智皆正理也而程子獨以仁為天下之正理如何曰便是程子之說有太寬處此只是且恁寬說曰是以其專言者言之否曰也是如此廣問集注舉三說若游氏則言心程氏主理李氏謂待人而後行曰所疑者何曰今觀前二說與後說不相似曰仲思以為如何曰此正苟非其人道不虛行之意蓋心具是理而所以存是心者則在乎人也曰恁地看則得之道夫問呂氏曰禮樂之情皆出於仁此語似好曰大概也只是如此問游氏曰人而不仁則人心亡矣如何曰此說好問曾見先生說仁者心之德義禮智皆心之德否曰都是只仁是箇大底問謝氏曰未能顛沛造次由於是故如禮何未能不憂故如樂何似說得寬曰他只似做時文用故事也不必恁地問程先生尹先生皆以仁為正理如何是正理曰只是正當底道理榦集義林放問禮之本章問林放問禮章先生謂得其本則禮之全體無不在其中如何是禮之全體曰兼文質本末言之曰後面只以質為禮之本如何又說文質皆備曰有質則有文有本則有末徒文而無質如何行得譬如樹木必有本根則自然有枝葉華實若無本根則雖有枝葉華實隨即萎落矣廣林聞一問林放問禮之本而孔子并以喪告之何也曰喪亦是禮奢底是禮之吉者喪是禮之凶者節辛適正問林放問禮之本何故只以喪禮答之曰禮不過吉凶二者而已上句泛以吉禮而言下句專指凶禮而言然此章大意不在此須看問答本意孔子只是答他問禮之本然儉戚亦只是禮之本而已及其用也有當文時不可一向以儉戚為是故曰品節斯斯之謂禮蓋自有箇得中恰好處僩問喪與其易也寧戚曰其他冠婚祭祀皆是禮故皆可謂與其奢也寧儉惟喪禮獨不可故言與其易也寧戚易者治也言治喪禮至於習熟也喪者人情之所不得已若習治其禮有可觀則是樂於喪而非哀戚之情也故禮云喪事欲其縱縱爾卓問喪與其易也寧戚注易為治何也曰古人做物滑淨無些礙處便是易在禮只是太滑熟了生固無誠實人纔太滑熟亦便少誠實曰夫子何故只以儉戚答禮之本曰初頭只是如此未有後來許多文飾文飾都是後來事喪初頭只是戚禮初頭只是儉當初亦未有那儉儉是對後來奢而言之蓋追說耳如堯土階三尺當初只是恁地不是為儉後來人稱為儉耳東坡說忠質文謂當初亦未有那質只因後來文便稱為質孔子曰從先進周雖尚文初頭尚自有些質在曰三綱五常亦禮之本否曰初頭亦只有箇意耳如君臣亦只是箇誠敬而已未有許多事淳問禮之本曰初間只有箇儉戚未有那文儉戚是根有這根然後枝葉自發出來又問戚是此心自然發出底儉又不類曰儉亦不是故意儉元初且只有汙樽抔飲之類毅父問先生舊說儉戚且是近本曰對奢易言之且得說儉戚是本若論禮之本則又在儉戚之前未用如此說得時舉奢易過於文儉戚則不及而質與其過也寧不及不及底可添得夔孫問林放問禮之本一章某看來奢易是務飾於外儉戚是由中曰也如此說不得天下事那一件不由心做但儉戚底發未盡在奢易底發過去了然都由心發譬之於花只是一箇花心卻有開而未全開底有開而將離披底那儉戚底便猶花之未全開奢易底便猶花之離披者且如人之居喪其初豈無些哀心外面裝點得來過當便埋沒了那哀心人之行禮其初豈無些恭敬之心亦緣他裝點得來過當便埋沒了那恭敬之心而今人初以書相與莫不有恭敬之心後來行得禮數重復使人厭煩那恭敬之心便埋沒了或問易字集注引孟子易其田疇之易是習熟而平易之意否曰易只是習得來熟似歡喜去做做得來手輕足快都無那惻怛不忍底意思因舉檀弓喪事欲其縱縱爾與曲禮喪事先遠日皆是存惻怛不忘之意也燾胡叔器說林放問禮之本一章曰林放若問禮之大體便包得闊今但問本似未為大然當時習於繁文人但指此為禮更不知有那實處故放問而夫子大之想是此問大段契夫子之心蓋有那本時文便在了若有那文而無本則豈得為禮易其田疇之說蓋由范氏喪易而文之語推之治田者須是經犁經耙治得窒礙方可言熟也若居喪習熟於禮文行得皆無窒礙則哀戚必不能盡故曰不若戚而不文之愈也如楊氏汙樽抔飲之說他是就儉說卻不甚親切至於喪不可以徑行直情一句大覺文意顛倒後面云則其本戚而已卻似與前面無收殺此須是說居喪先要戚然卻不可無衰麻哭踊之數以為之節如此說方得今卻說得衰麻哭踊似是先底卻覺語意不完龜山說話多如此不知如何卻是范氏儉者物之質戚者心之誠二語好又曰人只習得那文飾處時自是易忘了那朴實頭處如巧言令色鮮矣仁之類義剛楊氏謂禮始諸飲食燔炙言禮之初本在飲食然其用未具但以火熾石其石既熱卻以肉鋪其上熟而食之安有鼎俎籩豆也然方其為鼎俎之始亦有文章雕鏤煩而質滅矣故云與奢寧儉又云楊說喪不可直情而徑行此一語稍傷那哀戚之意其意當如上面始諸飲食之語謂喪主於哀戚為之哭泣擗踊所以節之其本則戚而已楊氏語多如此所以取彼處亦少子蒙問林放問禮之本夫禮貴得中奢易則過於文儉戚則不及而質皆未為合禮然質乃禮之本過於文則去本已遠且禮之始本諸飲食汙樽而抔飲簣桴而土鼓豈不是儉今若一向奢而文則去本已遠故寧儉而質喪主於哀戚故立衰麻哭踊之數以節之今若一向治其禮文而無哀戚之意則去本已遠故寧戚而質乃禮之本曰也只是如此南升問易乃慢易如何范氏以為喪易而文曰易也近文易字訓治不是慢易簡易之易若是慢易簡易聖人便直道不好了知何更下得與其字只此可見榦夷狄之有君章問夷狄之有君一章程氏注似專責在下者陷無君之罪君氏注似專責在上者不能盡為君之道何如曰只是一意皆是說上下僭亂不能盡君臣之道如無君也義剛夷狄之有君不如諸夏無君且勝之者此說無意義振問范氏呂氏皆以為夷狄有君而無禮義不如諸夏之無君而有禮義恐未當曰不知他如何恁地說且如聖人恁地說時便有甚好處不成中國無君恰好問亡莫只是有無君之心否曰然榦季氏旅於泰山章問季氏旅於泰山一段曰天子祭天地諸侯祭其國之山川只緣是他屬我故我祭得他若不屬我則氣便不與之相感如何祭得他因舉太子申生秦將祀予事時舉問曾謂泰山不如林放乎曰聖人也不曾是故意為季氏說只是據事說季氏聞之自當止君子無所爭章問君子無所爭章曰君子無所爭必於射見之言射有勝負是相爭之地而猶若此是不爭也語勢是如此南升其爭也君子言爭得來也君子銖問其爭也君子只是橫渠說爭為辭遜底否曰然畢竟是為君子之爭不為小人之爭榦巧笑倩兮章素以為絢不知是何詩若以為今碩人詩則章句全且此一句最有理亦不應刪去因說古人繪事未必有今人花巧如雲字雷字見筆談去偽同問伊川云美質待禮以成德猶素待繪以成絢卻似有質須待禮有素須待絢曰不然此質卻重素以為絢言人有好底姿容材質又有口輔之美盼倩之佳所以表其質也此見素以為質而絢以文之也起予之義者謂孔子言繪事後素之時未思量到禮後乎處而子夏首以為言正所以啟發夫子之意非謂夫子不能而子夏能之以教夫子也子蒙因論起予者商回非助我等處云聖人豈必待二子之言而後有所啟發耶然聖人胸中雖包藏許多道理若無人叩擊則終是無發揮於外一番說起則一番精神也柄夏禮吾能言之章問夏禮吾能言之所謂禮是說制度文章不是說三綱五常如前答子張所問者否曰這也只是說三綱五常問吾能言之是言甚事曰聖人也只說得大綱須是有所證方端的足則吾欲證之證之須是杞宋文獻足方可證然又須是聖人方能取之以證其言古禮今不復存如周禮自是紀載許多事當時別自有箇禮書如云宗伯掌邦禮這分明自有禮書樂書今亦不可見賀孫問文獻曰只是典籍賢人若以獻作法度卻要用這憲字問徵字訓成字如何曰也有二義如此只是證成之故魏徵字玄成又曰這一段中庸說得好說道有宋存焉便見得杞又都無了如今春秋傳中宋猶有些商禮在榦或問孔子能言夏殷之禮而無其證是時文獻不足孔子何從知得曰聖人自是生知聰明無所不通然亦是當時賢者識其大不賢者識其小孔子廣詢博問所以知得杞國最小所以文獻不足觀春秋所書杞初稱侯已而稱伯已而稱子蓋其土地極小財賦不多故寧甘心自降為子男之國而其朝覲貢賦率以子男之禮從事聖人因其實書之非貶之也僩問夏禮吾能言之章以中庸參看殷猶可考夏之文獻不足尤甚曰杞國最小所以文獻不足觀春秋所書初稱侯已而稱伯已而稱子蓋其朝覲貢賦之屬率以子男之禮從事聖人因其實而書之非貶之也如滕國亦小隱十一年來朝書侯桓二年來朝書子解者以為桓公弒君之賊滕不合朝之故貶稱子某嘗疑之以為自此以後一向書子使聖人實惡其黨惡來朝之罪則當止貶其一身其子孫何罪一例貶之豈所謂惡惡止其身耶後來因沙隨云滕國至小其朝覲貢賦不足以附諸侯之大國故甘心自降為子子孫一向微弱故終春秋之世常稱子聖人因其實而書之耳故鄭子產嘗爭貢賦之次曰昔天子班貢輕重以列鄭伯男也而使從公侯之貢懼弗給也敢以為請即其事也春秋之世朝覲往來其禮極繁大國務吞并猶可以辦小國侵削之餘何從而辦之其自降為子而一切從省者亦何足怪若謂聖人貶人則當時大國滅典禮叛君父務吞并者常書公書侯不貶此而獨責備於不能自存之小國何聖人畏強陵弱尊大抑小其心不公之甚故今解春秋者某不敢信正以此耳胡泳禘自既灌而往者章禘只祭始祖及所自出之帝祫乃合群廟皆在當以趙匡之說為正從周方子錄云所自出之帝無廟程先生說禘是禘其始祖之所自出併群廟之主皆祭之祫則止自始祖而下合群廟之主皆祭之所謂禘之說恐不然故論語集解中止取趙伯循之說廣云觀禘祫兩字之義亦可見曰禘只是王者既立始祖之廟又請他那始祖之尊長來相熱樂相似廣仁父問禘自既灌而往者吾不欲觀之集注有兩意曰這其實也只說既灌而往不足觀若不王不禘而今自著恁地說將來其實這一句只說灌以後不足觀又云觀盥而不薦有孚顒若下觀而化也這盥自與灌不同灌是以秬鬯之酒灌地以降神這盥只是洗手凡祭祀數數盥手一拜則掌拊地便又著洗伊川云人君正其表儀以為下民之觀當莊嚴如始盥之初勿使誠意少散如既薦之後某看觀卦意思不是如此觀義自說聖人至德出治天下自然而化更不待用力而下莫不觀感而化故取義於盥意謂積誠之至但是盥滌而不待乎薦享有孚已自顒若故曰下觀而化也蔡季通因云盥而不薦有孚顒若言其理也下觀而化述其德也賀孫問禘之說諸家多云魯躋僖公昭穆不順故聖人不欲觀如何曰禘是於始祖之廟推所自出之帝設虛位以祀之而以始祖配即不曾序昭穆故周禘帝嚳以后稷配之王者有禘有祫諸侯有祫而無禘此魯所以為失禮也時舉問呂氏以未盥之前誠意交於神明既灌而後特人事耳如何曰便是有這一說道是灌以前可觀以後不必觀聖人制禮要終始皆盡誠不必如此說榦李公晦問知其說者之於天下也其如示諸斯乎曰此尚明得何況其他此尚感得何況其他節器之問禘之說治天下如指諸掌恐是至誠感動之意曰禘是祭之甚遠甚大者若其他四時之祭及祫祭祭止於太祖若禘又祭其祖之所自出如祭后稷又推后稷上一代祭之周人禘嚳是也禮不王不禘禘者祭其祖之所自出而以祖配之蓋無廟而祭於祖廟所以難以答或人固是魯禘非禮然事體大自是難說若主祭者須是極其誠意方可感格賀孫問或問禘之說集注所謂非仁孝誠敬之至不足以與此何也蓋祭祀之事以吾身而交於鬼神最是大事惟仁則不死其親惟孝則篤於愛親又加之誠敬以聚集吾之精神精神既聚所謂祖考精神便是吾之精神豈有不來格者曰看得文字皆好南升禘是追遠之中又追遠報本之中又報本蓋人於近親曾奉養他底則誠易感格如思其居處言笑此尚易感若太遠者自非極其至誠不足以格之所以難下語答他此等處極要理會在論語中為大節目又曰聖人制祭祀之意深遠非常人所能知自祖宗以來千數百年元是這一氣相傳德厚者流光德薄者流卑但法有止處所以天子只得七廟諸侯五大夫三此是法當如此然聖人之心猶不滿故又推始祖自出之帝以始祖配之然已自無廟只是祔於始祖之廟然又惟天子得如此諸侯以下不與焉故近者易感遠者難格若薄俗粗淺之人他誠意如何得到這裏不是大段見得義理分明底如何推得聖人報本反始之意如此深遠非是將這事去推那事只是知得此說則其人見得義理儘高以之觀他事自然沛然所以治天下不難也明作叔共問禘之說曰尋常祭祀猶有捉摸到禘時則甚渺茫蓋推始祖之所自出者而祭之於始祖之廟以始祖配之其所禘者無廟無主便見聖人追遠報本之意無有窮已若非誠敬之至何以及此故知禘之說則誠無不格此聖人所以難言也時舉問知禘之說則理無不明如何曰幽明只是一理若是於那渺茫幽深之間知得這道理則天下之理皆可推而明之矣恪問知禘之說則理無不明誠無不格治天下不為難矣先王報本反始之意雖莫深於禘如何纔知其說便能於理無所不明曰此是理之至大者蓋人推至始祖則已極矣今又推始祖所自出之帝而祀焉則其理可謂窮深極遠矣非仁孝誠敬之至何以及此能知此則自然理無不明誠無不格於治天下真不為難矣廣子升問禘之說曰禘之意最深長如祖考與自家身心未相遼絕祭祀之理亦自易理會至如郊天祀地猶有天地之顯然者不敢不盡其心至祭其始祖已自大段闊遠難盡其感格之道今又推其始祖之所自出而祀之苟非察理之精微誠意之極至安能與於此哉故如此則於治天下不難也木之問知禘之說則理無不明誠無不格而天下不難治此只是說聖人窮盡物理而無一念之不實雖至幽至遠之神猶能感通則其治天下自是明且易否曰此是說禘與他祭不同當看那禘字義剛言禘是祭始祖所自出之帝蓋遠而易忘人情所不追念者而乃能感而通之非仁孝誠敬之至孰能與此曰然義剛仁父問知禘之說則理無不明誠無不格治天下不難如何曰天地陰陽生死晝夜鬼神只是一理若明祭祀鬼神之理則治天下之理不外於此七日戒三日齊必見其所祭者故郊焉則天神格廟焉則人鬼享此可謂至微而難通者若能如此到得治天下以上感下以一人感萬民亦初無難者這鬼神生死之理卻惟上蔡見得看他說吾之精神即祖考之精神說得有道理如說非其鬼而祭之一段亦說得好賀孫問知禘之說何故治天下便易曰禘諸公說得也多頭項而今也見不得集注中且依約如此說或問以魯人僭故孔子不說否曰也未必是如此不知只是不敢知或曰只是知得報本否曰亦不專是如此中庸明乎禘嘗之義治國其如示諸掌亦如此說蓋禘是箇大祭那裏有君臣之義有父子之親知得則大處是了便也自易曰恐此只是既知得報本又知得名分又知得誠意否曰是此處游氏說得好祭統中說祭有十倫亦甚好子細看方知得不是空言淳或問禘之說曰謝氏云全得自家精神便是祖考精神此說好苟能全得自家精神則郊焉而天神格廟焉而人鬼享子蒙問魯之郊禘自成王之賜伯禽之受不是了後世子孫合如何而改曰時王之命如何敢改曰恐不可自改則當請命於天王而改之否先生首肯曰是淳祭如在章問祭如在人子固是盡誠以祭不知真可使祖宗感格否曰上蔡言自家精神即祖考精神這裏盡其誠敬祖宗之氣便在這裏只是一箇根苗來如樹已枯朽邊傍新根即接續這正氣來宇或問祭如在祭神如神在曰祭先主於孝祭神主於敬雖孝敬不同而如在之心則一聖人萬一有故而不得與祭雖使人代若其人自能極其恭敬固無不可然我這裏自欠少了故如不祭時舉正甫問祭如在祭神如神在曰祭先如在祭外神亦如神在愛敬雖不同而如在之誠則一吾不與祭而他人攝之雖極其誠敬而我不得親致其如在之誠此心終是闕然倪祭如在祭神如神在此是弟子平時見孔子祭祖先及祭外神之時致其孝敬以交鬼神也孔子當祭祖先之時孝心純篤雖死者已遠因時追思若聲容可接得以竭盡其孝心以祀之也祭外神謂山林溪谷之神能興雲雨者此孔子在官時也雖神明若有若亡聖人但盡其誠敬儼然如神明之來格得以與之接也吾不與祭如不祭孔子自謂當祭之時或有故而使人攝之禮雖不廢然不得自盡其誠敬終是不滿於心也范氏所謂有其誠則有其神無其誠則無其神蓋神明不可見惟是此心盡其誠敬專一在於所祭之神便見得洋洋然如在其上如在其左右然則神之有無皆在於此心之誠與不誠不必求之恍忽之間也南升問祭神如神在何神也曰如天地山川社稷五祀之類曰范氏謂有其誠則有其神無其誠則無其神只是心誠則能體得鬼神出否曰誠者實也有誠則凡事都有無誠則凡事都無如祭祀有誠意則幽明便交無誠意便都不相接了曰如非所當祭而祭則為無是理矣若有是誠心還亦有神否曰神之有無也不可必然此處是以當祭者而言若非所當祭底便待有誠意然這箇都已錯了淳問范氏云有其誠則有其神無其誠則無其神恐是自家心裏以為有便有以為無便無曰若只據自家以為有便有無便無如此卻是私意了這箇乃是自家欠了他底蓋是自家空在這裏祭誠意卻不達於彼便如不曾祭相似燾子善問鬼神范氏解祭如在云有其誠則有其神無其誠則無其神虛空中無非氣死者既不可得而求矣子孫盡其誠敬則祖考即應其誠還是虛空之氣自應吾之誠還是氣只是吾身之氣曰只是自家之氣蓋祖考之氣與己連續賀孫與其媚於奧章王孫賈之意欲夫子媚己緊要是媚字不好如夫子事君盡禮也何嘗是媚他見夫子當時事君盡禮便道夫子媚奧故夫子都不答他只道是不如此獲罪於天則無所禱何為媚奧亦何為媚灶逆理而動便獲罪於天問此兩句恐是時人有語故問曰何謂也曰恐是如此榦王孫賈庸俗之人見孔子在衛將謂有求仕之意欲孔子附己故有媚奧與媚灶之言彼亦須聞有孔子之聖但其氣習卑陋自謂有權可以引援得孔子也子曰不然者謂媚奧與媚灶皆非也天下只有一箇正當道理循理而行便是天若稍違戾於理便是得罪於天更無所禱告而得免其罪也猶言違道以干進乃是得罪於至尊至大者可畏之甚豈媚時君與媚權臣所得而免乎此是遜辭以拒王孫賈亦使之得聞天下有正理也南升周問獲罪於天集注曰天即理也此指獲罪於蒼蒼之天耶抑得罪於此理也曰天之所以為天者理而已天非有此道理不能為天故蒼蒼者即此道理之天故曰其體即謂之天其主宰即謂之帝如父子有親君臣有義雖是理如此亦須是上面有箇道理教如此始得但非如道家說真有箇三清大帝著衣服如此坐耳銖問注云天即理也逆理則獲罪於天矣人若順理而行則心平氣和而自然安裕若悖理傷道非必有所謂天禍人刑而其胸次錯亂乖氣充積此即是獲罪於天否曰固是如此也不消說道心氣和平這也只見有為惡幸免者故有此說然也不必說道有無人禍天刑即是纔逆理便自獲罪於天賀孫或問灶陘曰想是灶門外平正可頓柴處義剛問五祀皆設主而祭於所然後迎尸而祭於奧曰譬如祭灶初設主於灶陘陘非可做好安排故又祭於奧以成禮凡五祀皆然但亦有不可曉者若被人問第二句便曉未得問以何人為尸便曉不得五祀各有主未祭及祭畢不知於何處藏是無所考也賀孫周監於二代章周公制成周一代之典乃視夏商之禮而損益之故三代之禮其實則一但至周而文為大備故孔子美其文而從之南升夫子得志大概從周處多道夫問吾從周曰孔子為政自是從周處多蓋法令自略而日入於詳詳者以其弊之多也既詳則不可復略今法令明備猶多姦宄豈可更略略則姦宄愈滋矣僩子入太廟章問子入太廟每事問曰雖是有司之事孔子亦須理會但其器物須有人家無者故見不得今入宗廟方及見之亦須問方得南升子入太廟每事問知底更審問方見聖人不自足處賀孫子入太廟每事問宗廟朝廷重事自用謹雖知亦問曰是當然必有差失處每常思量行事所以錯處多是有忽之之心且如使人做一事丁寧諄復其中已有意以為易曉而忽之不囑者少間事之差處都由那忽處生僩射不主皮章說射不主皮章曰夫子亦非是惡貫革之射但是當時皆習於此故言古人之道耳如古人亦只是禮射不主皮若武射依舊要貫革若不貫革何益義剛或問射不主皮是絕不取於貫革曰先王設射謂弧矢之利以威天下豈不願射得深中如不失其馳舍矢如破發彼小殪此大兕之類皆是要得透豈固以不主皮為貴而但欲略中而已蓋鄉射之時是習禮容然習禮容之人未必皆勇敢之夫若以貫革為貴則失所以習禮之意故謂若有人體直心正持了弓矢又審固若射不貫革其禮容自可取豈可必責其貫革哉此所以謂為力不同科也時舉或問射不主皮為力不同科先生舉易弧矢之利以威天下又舉詩舍矢如破曰射之本意也是要得貫革只是大射之禮主於觀德卻不全是祼股肱決射御底人只要內志正外體直取其中不專取其力耳倪植同古人用之戰鬥須用貫革之射若用之於禮樂則觀德而已武王克商散軍郊射而貫革之射息則是前此用兵之時須用貫革之射今則不復用矣又曰郭先生云弓弩之制被神宗改得不好高宗亦嘗如此說又曰郭先生謂古人射法易學今人射法難學渠須理會得郭先生論弓弩及馬甚精南升問明道說此與為力而射者不同科伊川曰功力非一端苟有可取不必同科此二說都就本文上添了字多方解得恐未穩曰便是如此這處自是甚分明又問明道曰射不專以中為善如何曰他也只是一時間恁地說被人寫放冊上便有礙如內志正外體直只要箇中不要中要甚底問主皮如何說曰皮字看來只做箇貫革字主便是主於貫革因問古人射要如何用曰其初也只是修武備聖人文之以禮樂榦子貢欲去告朔之餼羊章或問論語數段曰依文解義只消如此說只是更要看他聖人大底意思且如適間公說愛禮存羊一段須見得聖人意思大常人只是屑屑惜那小費聖人之心卻將那小費不當事所惜者是禮他所存者大更看得這般意思出方有益自家意思方寬展方有箇活動長進處僩居父問餼羊注云特羊曰乃專特之特非牛也特牲用特皆是特用一牛非指特為牛也賀孫事君盡禮章如拜下禮也今拜乎上而孔子必拜乎下此孔子盡禮處銖君使臣以禮章或說君使臣以禮臣事君以忠講者有以先儒謂君使臣以禮則臣事君以忠為非者其言曰君使臣不以禮則臣可以事君而不忠乎君使臣不以禮臣則有去而已矣事之不以忠非人臣之所宜為也先生曰此說甚好然只說得一邊尹氏謂君使臣以禮則臣事君以忠亦有警君之意亦不專主人臣而言也如孟子言君之視臣如犬馬則臣視君如寇讎此豈孟子教人臣如此哉正以警其君之不以禮遇臣下爾為君當知為君之道不可不使臣以禮為臣當盡為臣之道不可不事君以忠君臣上下兩盡其道天下其有不治者哉乃知聖人之言本末兩盡去偽問尹氏謂君使臣以禮則臣事君以忠此恐只是說泛然之臣若任重之臣恐不當如此說曰就人君而言則如此說但道理亦是如此自是人主不善遇之則下面人不盡心如孟子所謂君之視臣如手足則臣視君如腹心道理是如此義剛因問孟子此章前輩皆謂有圭角如何安卿言孟子恐只是為戰國人君而設曰也是理當如此自人臣言固是不可不忠但人君亦豈可不使臣以禮若只以為臣下當忠而不及人主則無道之君聞之將謂人臣自是當忠我雖無禮亦得如此則在上者得肆其無禮後人好避形跡多不肯分明說卻不知使上不盡禮而致君臣不以善終卻是賊其君者也若使君能盡禮則君臣凛地長久義剛關雎樂而不淫章問關雎樂而不淫哀而不傷於詩何以見之曰憂止於輾轉反側若憂愁哭泣則傷矣樂止於鐘鼓琴瑟若沉湎淫泆則淫矣僩又云是詩人得性情之正也問關雎樂而不淫哀而不傷曰此言作詩之人樂不淫哀不傷也因問此詩是何人作曰恐是宮中人作蓋宮中人思得淑女以配君子未得則哀既得則樂然當哀而哀而亦止於輾轉反側則哀不過其則當樂而樂而亦止於鐘鼓琴瑟則樂不過其則此其情性之正也銖問關雎樂而不淫哀而不傷是詩人情性如此抑詩之詞意如此曰是有那情性方有那詞氣聲音淳問關雎之詩得情性之正如此學者須是玩其辭審其音而後知之曰只玩其辭便見得若審其音也難關雎是樂之卒章故曰關雎之亂亂者樂之卒章也故楚辭有亂曰是也前面須更有但今不可考耳南升集注問審其音如何曰辭氣音節亦得其正如人傳嵇康作廣陵散操當魏末晉初其怒晉欲奪魏慢了商弦令與宮弦相似宮為君商為臣是臣陵君之象其聲憤怒躁急如人鬧相似便可見音節也銖講關雎樂而不淫哀而不傷有引明道之說為證者哀窈窕思賢才而無傷善之心焉此言無傷善與所謂哀而不傷者如何講者云為其相似故明道舉以為證否曰不然無傷善與哀而不傷兩般樂而不淫哀而不傷是言哀樂中節謂不傷為無傷善之心則非矣謨哀公問宰我章問古者各樹其所宜之木以為社不知以木造主還便以樹為主曰看古人意思只以樹為社主使神依焉如今人說神樹之類問不知周禮載社主是如何曰古人多用主命如出行大事則用絹帛就廟社請神以往如今魂帛之類社只是壇若有造主何所藏之古者惟喪國之社屋之賀孫或問有以使民戰栗為哀公之言者曰諸家多如此說卻恐未然恐只是宰我之辭上有一曰字者宰我解周人以栗之義故加一曰字以發其辭耳子聞之曰成事不說遂事不諫既往不咎蓋云駟不及舌言豈可以輕發邪言出宰我之口入哀公之耳矣豈可更諫而追之哉問成事不說遂事不諫既往不咎三句有別否曰亦有輕重然社也無說話便待宰我當初答得好也無說話況使民戰栗之語下面又將啟許多事邪淳問宰我所言尚未見於事如何不可救曰此只責他易其言未問其見於事與未見於事所謂駟不及舌斯言之玷不可為也蓋欲使謹於言耳木之管仲之器小哉章問管仲小器曰緣他器小所以做出來事皆如此燾或說管仲器小章義剛言使仲器局宏闊須知我所為功烈如彼其卑豈肯侈然自肆至於奢僭如此曰也不說道功烈卑時不當如此便是功大亦不可如此義剛管仲器小陶兄云須是如孟子言居天下之廣居立天下之正位行天下之大道方是大器曰是子蒙管氏有三歸不是一娶三姓女若此卻是僭此一段意只舉管仲奢處以形容他不儉下段所說乃形容他不知禮處便是僭竊恐不可做三娶說明作問管仲之器小哉集注云度量褊淺規模卑狹曰度量褊淺是他容受不去了容受不去則富貴能淫之貧賤能移之威武能屈之矣規模是就他施設處說僩集注林聞一問度量褊淺規模卑狹只是一意否曰某當時下此兩句便是有意因會坐間朋友各說其意叔重云度量褊淺言容納不得也管仲志於功利功利粗成心已滿足此便器小處蓋不是從反身修德上做來故規模卑狹奢而犯禮器小可知器大則自知禮矣時舉云管仲以正天下正諸侯為莫大之功卻不知有行一不義殺一不辜底事更大於此此所以為小也先生曰必兼某上面兩句方見得它器小蓋奢而犯禮便是它裏面著不得見此些小功業便以為驚天動地所以肆然犯禮無所忌也亦緣他只在功利上走所以施設不過如此才做到此便不覺自足矣古人論王伯以為王者兼有天下伯者能率諸侯此以位論固是如此然使其正天下正諸侯皆出於至公而無一毫之私心則雖在下位何害其為王道惟其摟諸侯以伐諸侯假仁義以為之欲其功盡歸於己故四方貢賦皆歸於其國天下但知有伯而不復知有天子此其所以為功利之心而非出於至公也在學者身上論之凡日用常行應事接物之際才有一毫利心便非王道便是伯者之習此不可不省察也或云王伯之分固是如此然邵康節多說皇王帝伯之道不知皇帝與王又有何異同是時使之然耶曰此亦是其德有厚有薄皇與帝終是自然然黃帝亦曾用兵戰鬥亦不是全然無所作為也時舉問管仲之器小哉器莫只是以資質言之否曰然若以學問充滿之則小須可大曰固是曰先生謂其度量褊淺規模卑狹此二句盡得器小之義否曰前日亦要改度量作識量蓋才說度量便只去寬大處看了人只緣見識小故器量小後又思量亦不須改度量是言其資質規模是言其所為惟其器小故所為亦展拓不開只欲去後面添說所以如此者只緣不知學以充之之意管仲只緣器量小故才做得他這些功業便包括不住遂至於奢與犯禮奢與犯禮便是那器小底影子若是器大者自然不至如此看有甚功業處之如無胡文定春秋傳卻只以執轅濤一事為器小此太拘泥因言管仲相桓公以伐楚只去問他包茅昭王不返二事便見他得如此休據楚當時憑陵中夏僭號稱王其罪大矣如何不理會蓋才說著此事楚決不肯服便事勢住不得故只尋此年代久遠已冷底罪過及些小不供貢事去問想它見無大利害決不深較只要他稍稍追聽便收殺了此亦是器小之故才是器小自然無大功業廣問管仲之器小哉此是孔子說管仲胸中所蘊及其所施設處將器小二字斷盡了蓋當時之人只見管仲有九合之功將謂它大處大故孔子卻見它一生全無本領只用私意小智做出來僅能以功利自強其國若是王佐之才必不如此故謂之器小蓋奢與僭便是器小之人方肯做然亦只是器小底人一兩件事看得來孔子器小兩字是包括管仲一生自本至末是箇褊淺卑狹底人曰管仲固是用私意小智做出來今為管仲思量看當做如何方得某云須如孟子告齊梁之君若不可則休曰是時周室猶未衰此最是難事合為它思量直卿云胡文定公云當上告天王下告方伯是時天王又做不起桓公係是方伯了也做不得是時楚強大幾無周室若非桓公出來也可慮但管仲須相桓公伐楚了卻令桓公入相于周輔助天子曰是時有毛韓諸公皆為天子三公豈肯便信得桓公過便放桓公入來又云若率諸侯以朝王如何曰也恐諸公未肯放桓公率許多諸侯入周來此事思量是難事又也難說南升問規矩如何為大器曰這一箇物事方只是這一箇物事方不能令其他底方如規可以令天下物事圓矩可以令天下物事方把這一箇矩看要甚麼皆可以方非大器而何節蕭景昭舉楊氏曰道學不明而王伯之略混為一塗故聞管仲之器小則疑其為儉以不儉告之則又疑其知禮先生曰恐混為一塗之下少些曲折蓋當時人但見有箇管仲更不敢擬議他故疑器小之為儉又疑不儉之為知禮時舉問管仲小器曰只為他本領淺只做得九合諸侯一匡天下之功揚雄說得極好大器其猶規矩準繩無施不可管仲器小只做得這一件事及三歸反坫等事用處皆小上蔡說得來太小如曰則其得君而專政夫豈以天下為心哉不過濟耳目之欲而已管仲又豈止如此若如此又豈能九合諸侯一匡天下大凡自正心誠意以及平天下則其本領便大今人只隨資稟去做管仲資稟極高故見得天下利害都明白所以做得許多事自劉漢而下高祖太宗亦是如此都是自智謀功力中做來不是自聖賢門戶來不是自自家心地義理中流出使高祖太宗當湯武固自不得若當桓文尚未可知問使二君與桓文同時還在其上還出其下曰桓公精密做工夫多年若文公只是六年一作疏淺已自甚快但管仲作內政盡從腳底做出所以獨盛於諸侯漢高從初起至入秦只是擄掠將去與項羽何異但寬大不甚殺人耳秦以苛虐亡故高祖不得不寬大隋以拒諫失國故太宗不得不聽人言皆是他天資高見得利害分明稍不如此則天下便叛而去之如太宗從諫甚不得已然當時只有這一處服得人又曰漢唐與齊晉之時不同漢唐甚倉猝又問謝氏卻言子雲之說不然曰他緣是快只認得量淺底意思便說將去無所往而不利無所適而不通無所為而不成無所受而不可以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當富貴不能淫貧賤不能移威武不能屈要之大器即此便是如上蔡只認得箇富貴不能淫驤集義子語魯太師樂章問始作翕如也謂樂之初作五聲六律合同而奏故曰翕如從者放也言聲音發揚出來清濁高下相濟而和既是清濁高下相濟而和了就中又各有條理皦然而明不相侵奪既有倫理故其聲相連續而遂終其奏言自始至終皆條理如此曰此亦是據夫子所說如此古樂既亡無可考處但是五聲六律翕然同奏了其聲音又純然而和更無一聲參差若有一聲參差便不成樂且如一宮只得七聲若黃鐘一宮合得姑洗等七聲或少一聲也不得多一聲也不得南升儀封人請見章問古人相見皆有將命之詞而論語獨載儀封人之說及出便說二三子何患於喪乎是他如何便見得曰某嘗謂這裏儘好看如何從者見之後便見得夫子恁地這也見得儀封人高處據他謂君子之至於斯吾未嘗不得見他大段見得好人多所以一見之頃便見得聖人出大抵當周之末尚多有賢人君子在故人得而見之至之云到孟子時事體又別如公都子告子萬章之徒尚不知孟子況其他乎曰然道夫問儀封人亦是據理而言若其得位失位則非所及知也曰儀封人與夫子說話皆不可考但此人辭氣最好必是箇賢有德之人一見夫子其觀感之間必有所見故為此言前輩謂作者七人以儀封人處其一以此南升子謂韶盡美矣章問韶盡美盡善武盡美未盡善是樂之聲容都盡美而事之實有盡善未盡善否曰不可如此分說便是就樂中見之蓋有這德然後做得這樂出來若無這德卻如何做得這樂出來故於韶之樂便見得舜之德是如此於武之樂便見得武王之德是如此都只是一統底事壽或問韶武美善曰德有淺深舜性之武王反之自是有淺深又舜以揖遜武以征伐雖是順天應人自是有不盡善處今若要強說舜武同道也不得必欲美舜而貶武也不得又曰舜武不同正如孟子言伯夷伊尹之於孔子不同至謂得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下不為是則同也舜武同異正如此故武之德雖比舜自有深淺而治功亦不多爭韶武之樂正是聖人一箇影子要得因此以觀其心大凡道理須寬心看使各自開去打疊了心胸安頓許多道理在裏面高者還他高下者還他下大者還他大小者還他小都歷歷落落是多少快活道夫叔蒙問韶盡美盡善武盡美未盡善曰意思自不同觀禮記所說武王之舞始而北出周在南商在北此便做箇向北意思再成而滅商須做箇伐商意思三成而南又做箇轉歸南意思四成而南國是疆五成而分周公左召公右又分六十四箇做兩處看此舞可想見樂音須是剛不似韶純然而和武須有些威武意思又問堯舜處湯武之時肯如湯武所為否曰聖德益盛使之自服耳然到得不服若征伐也免不得亦如征有苗等事又如黃帝大段用兵但古人用兵與後世不同古人只趲將退便是贏那曾做後世樣殺人或十五萬或四十萬某從來不信謂之多殺人信有之然指定數四十萬必無此理只如今安頓四十萬人亦自大段著地位四十萬人也須會走也須爭死如何掘箇窟去埋得許多賀孫子善問韶盡美矣一章曰後世所謂文武之舞亦是就韶武舞變出來韶舞不過是象那地平天成六府三事允治天下恁地和平底意思武舞不過象當時伐商底意思觀此二箇意思自是有優劣但若論其時則當時聚一團惡人為天下害不能消散武王只得去伐若使文王待得到武王時他那舊習又不消散文王也只得伐舜到這裏也著伐但恐舜文德盛其徒或自相叛以歸之亦未可知但武王之時只得如此做堯舜性之也湯武身之也性是自有底身是從身上做得來其實只是稟資略有些子不相似處耳恪韶與武今皆不可考但書所謂正德利用厚生惟和九功惟敘九敘惟歌戒之用休勸之以九歌此便是作韶樂之本也所謂九德之歌九韶之樂是也看得此歌本是下之人作歌不知當時如何取之以為樂卻以此勸在下之人武王之武看樂記便見得蓋是象伐紂之事其所謂北出者乃是自南而北伐紂也看得樂氣象便不恁地和韶樂只是和而已故武所以未盡善又云樂聲也易得亡失如唐太宗破陣樂今已不可考矣南升問集注美者聲容之盛善者美之實如何是美之實曰據書中說韶樂云德惟善政政在養民水火金木土穀惟修正德利用厚生惟和九功惟敘九敘惟歌此是韶樂九章看他意思是如何到得武樂所謂武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成而復綴以崇與夫總干而山立武王之事也發揚蹈厲太公之志也其意思與韶自是不同廣集注善者美之實實只是事是武王之事不稱也舜之德性之武王反之是他身上事與揖遜征伐不相干但舜處武王時畢竟又別明作問善者美之實曰實是美之所以然處且如織出絹與布雖皆好然布終不若絹好問性之反之似此精微處樂中如何見得曰正是樂上見只是自家不識它樂所以見不得僩問善者美之實曰美是言功善是言德如舜九功惟敘九敘惟歌與武王仗大義以救民此其功都一般不爭多只是德處武王便不同曰未盡善亦是征伐處未滿意否曰善只說德是武王身上事不干征伐事曰是就武王反之處看否曰是謝教曰畢竟揖遜與征伐也自是不同征伐是箇不得已曰亦在其中然不專就此說淳曰既征伐底是了何故又有不得已意曰征伐底固是畢竟莫如此也好所以孔子再三誦文王至德其意亦可見矣樂便是聖人影子這處未盡善便是那裏有未滿處淳或問韶武善美之別曰只就世俗論之美如人生得好善則其中有德行耳以樂論之其聲音節奏與功德相稱可謂美矣善則是那美之實又問或說武王之心與舜一般只是所行處與心相反所以有盡善未盡善之別曰聖人固無兩心烏有心如此而所行相反者且如堯之末年水土之害如此得舜承當了天下遂極治紂之時天下大亂得武王仗仁義誅殘賊天下遂大治以二聖人之功業論之皆可謂盡美矣然其美之實有盡未盡者只是舜較細武王較粗些然亦非聖人實要如此只是所遇之時不同耳僩問征伐固武王之不幸使舜當之不知如何曰只看舜是生知之聖其德盛人自歸之不必征伐耳不然事到頭也住不得如文王亦然且如殷始咎周周人乘黎祖伊恐奔告于受這事勢便自是住不得若曰奔告于受則商之忠臣義士何嘗一日忘周自是紂昏迷爾道夫問吳氏稗傳謂書序是後人傅會不足信曰亦不必序只經文謂祖伊恐奔告于王曰天子天既訖我殷命則是已交手爭競了紂固無道然亦是武王事勢不相安住不得了仲虺告成湯曰肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜則仲虺分明言事勢不容住我不誅彼則彼將圖我矣後人多曲為之說以諱之要之自是避不得道夫或問盡善盡美說揖遜征誅足矣何以說性之反之處曰也要尋它本身上來自是不同使舜當武王時畢竟更強似大武使武王當舜時必不及韶樂好銖問子謂韶盡美矣章引程氏曰堯舜湯武其揆一也征伐非其所欲所遇之時然耳使舜遇湯武之時不知如何曰只怕舜德盛人自歸之若是大段負固不得已也須征伐如伐苗是也又問舜性之湯武反之地位亦自不同曰舜之德如此又撞著好時節武王德不及舜又撞著不好時節銖問堯舜在湯武時還做湯武事否曰堯舜且做堯舜看湯武且做湯武看看得其心分明自見得可學湯武之征伐只知一意惻怛救民而已不知其他僩問武未盡善曰若不見得他性之反之不同處又豈所謂聞其樂而知其德乎舜與武王固不待論今且論湯武則其反之至與未至雖非後學所敢議然既嘗讀其書恐亦不待聞樂而知之也請問曰以書觀之湯畢竟反之工夫極細密但以仲氏稱湯處觀之如以禮制心以義制事等語又自謂有慚德覺見不是往往自此益去加功如武王大故疏其數紂之罪辭氣暴厲如湯便都不如此賜或問武未盡善一段先生以所答示諸友云看得如何皆未有所答次問祖道答曰看來湯武也自別如湯自放桀歸來猶做工夫如從諫弗咈改過不吝昧爽丕顯旁求俊彥刻盤銘修人紀如此之類不敢少縱武王自伐紂歸來建國分土散財發粟之後便只垂拱了又如西旅之獒費了太保許多氣力以此見武王做工夫不及成湯甚遠先生所謂觀詩書可見者愚竊以為如此先生笑曰然某之意正如此祖道問范氏以為德不同謝氏以為時不同游氏以為事不同三者孰是曰畢竟都有些子如何得同楊氏曰武之武非聖人之所欲橫渠亦曰征伐豈其所欲此說好榦集義居上不寬章子升問居上不寬曰寬字難識蓋有政教法度而行之以寬耳非廢弛之謂也如敬敷五教在寬蓋寬行於五教之中也木之居上不寬三句句末這三字是本有其本方可就其本上看他得失厚薄若無其本更看箇甚麼明作居上而不寬為禮而不敬臨喪而不哀更無可據以為觀者矣蓋寬也敬也哀也所謂本也其本既亡則雖有條教法令之施威儀進退之節擗踊哭泣之數皆無足觀者若能寬能敬能哀了卻就它這寬敬哀中去考量他所行之是否若不寬不敬不哀則縱其他有是處皆不在論量之限矣如醋須是酸方就它酸之中看那箇釅那箇淡若只似水相似更論量箇甚麼無可說矣僩問居上不寬一章曰才無那寬敬哀三者便是無可觀了把什麼去觀他惟有三者方可觀其至與不至盡與不盡行此三者之得失也但看可以觀之字便自見得觀字去著燾希真問吾何以觀之哉章曰如寬便有過不及哀便有淺深敬便有至不至須有上面這箇物事方始就這上見得他得失若無這箇物事卻把甚麼觀得他恪葉問吾何以觀之哉曰居上緊要在寬為禮緊要在敬臨喪緊要在哀三者俱無則居上為禮臨喪卻似不曾一般將以何者觀之哉言將甚底看它它都無了銖去偽錄云居上只要觀它寬為禮只要觀它敬臨喪只要觀它哀今皆無之無可觀矣
