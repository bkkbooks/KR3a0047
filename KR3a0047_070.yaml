body:
  text: 朱子語類卷第七十易六屯屯是陰陽未通之時蹇是流行之中有蹇滯困則窮矣賀孫屯利建侯此占恐與乾卦利見大人同例亦是占者與爻相為主賓也曰然但此亦大概如此到占得時又看如何若是自卜為君者得之則所謂建侯者乃己也若是卜立君者得之則所謂建侯者乃君也此又看其所遇如何緣易本不是箇悦定底文字所以曰不可為典要問占者固如此恐作易者須有定論曰也只是看一時間見得箇意思如何耳榦問剛柔始交而難生程傳以雲雷之象為始交謂震始交於下坎始交於中如何曰剛柔始交只指震言所謂震一索而得男也此三句各有所指剛柔始交而難生是以二體釋卦名義動乎險中大亨貞是以二體之德釋卦辭雷雨之動滿盈天造草昧宜建侯而不寧是以二體之象釋卦辭只如此看甚明緣後來說者交雜混了故覺語意重複銖剛柔始交而難生龜山解云剛柔始交是震難生是坎雷雨之動滿盈亦是那鬱塞底意思淵天造草昧宜建侯而不寧孔子又是別發出一道理說當此擾攘之時不可無君故須立君礪宜建侯而不寧不可道建侯便了須更自以為不安寧方可淵問本義云此以下釋元亨利貞用文王本意何也曰文王本意說乾元亨如貞只是說乾道大通而至正故筮得者其占當得大通而利於正固至孔子方作四德說後人不知將謂文王作易便作四德說即非也如屯卦所謂元亨利貞者以其能動即可以亨而在險則宜守正故筮得之者其占為大亨而利於正初非謂四德也故孔子釋此彖辭只曰動乎險中大亨貞是用文王本意釋之也銖問屯需二象皆陰陽未和洽成雨之象然屯言君子以經綸需乃言飲食宴樂何也曰需是緩意在他無所致力只得飲食宴樂屯是物之始生象草木初出地之狀其初出時欲破地面而出不無齟齬艱難故當為經綸其義所以不同也時舉問屯彖云利建侯而本義取初九陽居陰下為成卦之主何也曰此彖辭一句蓋取初九一爻之義初九一爻蓋成卦之主也一陽居二陰之下有以賢下人之象有為民歸往之象陰從陽也故宜立君故象曰以貴下賤大得民也此意甚好因問程傳只言宜建侯輔助如何曰易只有三處言利建侯屯兩言之豫一言之皆言立君左氏分明有立君之說衛公子元遇屯則可見矣但它又說名元是有元之象或問元者善之長曰公子元夢康叔謂己曰元康叔名之可謂長矣云云又問彖傳言宜建侯而不寧豈以有動而遇險之象耶曰聖人見有此象故又因以為戒曰宜立君而又不可遽謂安寧也然此是押韻銖問初九利建侯注云占者如是則利建以為侯此爻之占與卦辭異未知其指盤桓難進者處陰之下欲進不能耶將所居得正不肯輕進耶曰卦辭通論一卦所謂侯者乃屬他人即爻之初九也爻辭專言一爻所謂侯者乃其自己故不同也榦問初九以陽在下而居動體上應六四陰柔險陷之爻固為盤桓之象然六二屯如邅如乘馬班如亦似有盤桓意曰盤桓只是欲進而難進貌若六二則有險難矣蓋乘初九之剛下為陽逼故為所難而邅回不進又問匪寇婚媾程傳設匪逼於寇難則往求於婚媾此說如何曰某舊二十許歲時讀至此便疑此語有病只是別無它說可據只得且隨它說然每不滿後來方見得不然蓋此四字文義不應必如此費力解也六二乘初九之剛下為陽所逼然非為寇也乃來求己為婚媾耳此婚媾與己皆正指六四也又問六四求婚媾此婚媾疑指初九之陽婚媾是陰何得陽亦可言曰婚媾通指陰陽但程傳謂六二往求初九之婚媾恐未然也又問十年乃字十年只是指數窮理極而言耶曰易中此等取象不可曉如說十年三年七日八月等處皆必有所指但今不可穿鑿姑闕之可也銖耿氏解易女子貞不字作嫁笄而字貞不字者謂未許嫁也卻與婚媾之義相通亦說得有理伊川作字育之字十年乃字耿南仲亦如此說淵問即鹿無虞曰虞只是虞人六三陰柔在下而居陽位陰不安於陽則貪求陽欲乘陰即妄行故不中不正又上無正應妄行取困所以為即鹿無虞陷入林中之象沙隨盛稱唐人郭京易好近寄得來說鹿當作麓象辭當作即麓無虞何以從禽也問郭據何書曰渠云曾得王輔嗣親手與韓康伯注底易本鹿作麓以從禽上有何字然難考據恐是亂說銖蒙伊川說蒙亨髣彿是指九二一爻說所以云剛中也淵山下有險是卦象險而止是卦德蒙有二義險而止險在內止在外自家這裏先自不安穩了外面更去不得便是蒙昧之象若見險而能止則為蹇卻是險在外自家這裏見得去不得所以不去故曰知矣哉嘗說八卦著這幾箇字形容最好看如險止健順麗人說動都包括得盡喚做卦之情淵山下有險蒙之地也山下已是險峻處又遇險前後去不得故於此蒙昧也蒙之意也只是心下鶻突燾問本義云九二以可亨之道發生之蒙而又得其時之中如下文所指之事皆以亨行而當其可何以見其當其可曰下文所謂二五以志相應而初筮則告之再三瀆則不告皆時中也初筮告以剛中者亦指九二有剛中之德故能告而有節夫能告而有節即所謂以剛而中也問匪我求童蒙童蒙求我我指二童蒙指五五柔暗而二剛明五來求二二不求五也但占者若是九二之明則為人求我而亨在人占者若是九五之暗則為我求人而亨在我與乾九二九五利見大人之占同例否曰某作如此說卻僅勝近世人硬裝一件事說得來窒礙費氣力但亦恐是如此耳因問初筮告再三瀆瀆則不告若作占者說則如何曰人來求我我則當視其可否而告之蓋視其來求我之發蒙者有初筮之誠則告之再三煩瀆則不告之也我求人則當致其精一以叩之蓋我而求人以發蒙則常盡初筮之誠而不可有再三之瀆也銖曰發此一例即所謂稽實待虛曰然銖卦中說剛中處最好看剛故能包蒙不剛則方且為物所蒙安能包蒙剛而不中亦不能包蒙如上九過剛而不中所以為擊蒙六三說勿用取女者大率陰爻又不中不正合是那一般無主宰底女人金夫不必解做剛夫此一卦緊要是九二一爻為主所以治蒙者只在兩箇陽爻而上九過剛故只在此九二為主而二與五應亦助得那五去治蒙大抵蒙卦除了初爻統說治蒙底道理其餘三四五皆是蒙者所以唯九二一爻為治蒙之主淵蒙以養正聖功也蓋言蒙昧之時先自養教正當了到那開發時便有作聖之功若蒙昧之中已自不正他日何由得會有聖功淵問山下出泉曰古人取象也只是看大意略如此髣彿不皆端的若解要到親切便都沒去處了如天在山中山中豈有天如地中有山便只是平地了淳果行育德又是別說一箇道理山下出泉卻是箇流行底物事暫時被他礙住在這裏觀這意思卻是說自家當恁地做工夫卦中如此者多淵以象言之果者泉之必通育者靜之時也季通云育德是艮止也端蒙或自家是蒙得他人發或他人是蒙得自家發節卦辭有平易底有難曉底利用刑人用說桎梏粗說時如今人打人棒也須與他脫了那枷方可一向枷他不得若一向枷他便是以往吝這只是說治蒙者當寬慢蓋法當如此淵不利為寇寇只是要去害他故戒之如此淵問擊蒙不利為寇如本義只是就自身克治上說是如何曰事之大小都然治身也恁地若治人做得太甚亦反成為寇占得此爻凡事不可過當如伊川作用兵說亦是但只做得一事用不如且就淺處說去卻事事上有用若便說深了則一事用得別事用不得學履問利用禦寇上下順也曰上九一陽而眾陰隨之如人皆從順於我故能禦寇便如適來說孔子告陳恒之事須是得自家屋裏人從我方能去理會外頭人若自家屋裏人不從時如何去禦得寇便做不得所以象曰上下順也燾需需主事孚主心需其事而心能信實則光亨以位乎尊位而中正故所為如此利涉大川而能需則往必有功利涉大川亦蒙上文有孚光亨貞吉淵問需卦大指曰需者寧耐之意以剛遇險時節如此只當寧耐以待之且如涉川者多以不能寧耐致覆溺之禍故需卦首言利涉大川銖問乾陽上進之物前遇坎險不可遽進以陷於險故為需曰遇此時節當隨遠隨近寧耐以待之直至需于泥已甚狼當矣然能敬慎亦不至敗至於九五需得好只是又難得這般時節當此時只要定以待之耳至上六居險之極又有三陽並進六不當位又處陰柔亦只得敬以待之則吉又問不當位如何曰凡初上二爻皆無位二士三卿大夫四大臣五君位上六之不當位如父老不任家事而退閑僧家之有西堂之類銖以正中以中正也則一般這只是要協韻淵利涉大川利涉是乾也大川是坎也往有功是乾有功也或云以乾去涉大川燾需待也以飲食宴樂謂更無所為待之而已待之須有至時學道者亦猶是也人傑後世策士之言只說出奇應變聖人不恁地合當需時便需淵問敬慎不敗本義以為發明占外之意何也曰言象中本無此意占者不可無此意所謂占外意也銖問敬慎曰敬字大慎字細小如人行路一直恁地去便是敬前面險處防有喫跌便是慎慎是惟恐有失之之意如思慮兩字思是恁地思去慮是怕不恁地底意思夔孫穴是陷處喚做所安處不得分明有箇坎陷也一句柔得正了需而不進故能出於坎陷四又坎體之初有出底道理到那上六則索性陷了淵伯豐問需于酒食貞吉曰需只是待當此之時別無作為只有箇待底道理然又須是正方吉坎體中多說酒食想須有此象但今不可考淵王弼說初上無位如言乾之上九貴而無位需之不當位然乾之上九不是如此需之不當卻有可疑二四上是陰位不得言不當淵訟訟攻責也而今訟人攻責其短而訟之自訟則反之於身亦如此僩問訟卦大指因言大凡卦辭取義不一如訟有孚窒惕中吉蓋取九二中實坎為加憂之象中實為有孚坎險為窒坎為加憂為惕九二居下卦之中故曰有信而見窒能懼而得中也終凶蓋取上九終極於訟之象利見大人蓋取九五剛健中正居尊之象不利涉大川又取以剛乘險以實履陷之象此取義不一也然亦有不必如此取者此特其一例也曰卦辭如此辭極齊整蓋所取諸爻義皆與爻中本辭協亦有雖取爻義而與爻本辭不同者此為不齊整處也又問卦變之義曰此訟卦變自遯而來為剛來居二此是卦變中二爻變者蓋四陽二陰自遯來者十四卦訟即初變之卦剛來居二柔進居三故曰剛來而得中又問細讀本義所釋卦辭若看得分明則彖辭之義亦自明只須略提破此是卦義此是卦象卦體卦變不必更下注腳矣曰某當初作此文字時正欲如此蓋彖辭本是釋經之卦辭若看卦辭分明則彖辭亦已可見但後來要重整頓過未及不知而今所解能如此本意否又問觀訟一卦之體只是訟不可成初六不永所事九二不克訟六三守舊居正非能訟者九四不克訟而能復就正理渝變心志安處於正九五聽訟元吉上九雖有鞶帶之錫而不免終朝之褫首尾皆是不可訟之意故彖曰終凶訟不可成此句豈即本義所指卦體耶曰然因問易最難點如訟九四不克訟句復即命句渝句安貞句吉六三食舊德句貞句厲終吉句曰厲自是一句終吉又是一句易辭只是元排此幾句在此伊川作變其不安者為安貞作一句讀恐不甚自然又曰如訟上剛下險是屬上句險而健訟是屬下句銖不利涉大川是上面四畫陽載不起壓了這般重淵問訟彖云剛來而得中也大抵上體是剛下體是柔剛下而變柔則為剛來今訟之上體既是純剛安得謂之剛來邪曰此等須要畫箇圖子看便好訟卦本是遯卦變來遯之六二上為訟之六三其九三下為九二乃為訟卦此類如柔來而文剛分剛上而文柔與夫剛自外來而為主於內皆是如此若畫圖子起便極好看更不待說若如先儒說則多牽強矣時舉天自向上去水自向下來必是有訟淵作事謀始言觀此等象便當每事謀之於其始淵王弼言有德司契是借這箇契字說言自家執這箇契在此人來合得我便與他自家先定了這是謀始司契底意思淵問不永所事小有言終吉曰此爻是陰柔之人也不會十分與人訟那人也無十分傷犯底事但只略去訟之才辨得明便止所以終吉也燾九二正應在五五亦陽故為窒塞之象淵問九二不克訟歸而逋其邑人三百戶無眚解者牽強曰如此解時只得說小邑常以為易有象數者以此何故不言二百戶以其有定數也聖人之象便依樣子又不似數之類只曰不克訟歸逋竄也振三百戶必須有此象今不可考王輔嗣說得意忘象是要忘了這象伊川又說假象是只要假借此象今看得不解得恁地全無那象只是不可知只得且從理上說乾為馬卻說龍坤為牛卻說馬離為龜卻說牛做得箇例來括他方得見說已做了例又卻不曾見得淵問食舊德從上吉也曰是自做不得若隨人做方得吉之道復即命渝言復就命而變其不順之命淵訟元吉便似乾之利見大人有占無象者爻便是象訟元吉九五便是淵師吉無咎謂如一件事自家做出來好方得無罪咎若做得不好雖是好事也則有咎無咎吉謂如一件事元是合做底自家做出來又好如所謂戰則克祭則受福戰而臨事懼好謀成祭而恭敬齊肅便是無咎克與受福便是吉如行師之道既已正了又用大人率之如此則是都做得是便是吉了還有甚咎淵師彖辭亦是說得齊整處銖在師中吉言以剛中之德在師中所以吉淵問潘謙之說師九二欲互說在師中吉懷萬邦也王三錫命承天寵也何如曰聖人作易象只是大概恁地不是恁地子細解釋礪問師或輿尸伊川說訓為眾主如何曰從來有輿尸血刃之說何必又牽引別說某自小時未曾職訓詁只讀白本時便疑如此說後來從鄉先生學皆作眾主說甚不以為然今看來只是兵敗輿其尸而歸之義小年更讀左傳形民之力而無醉飽之心意欲解釋形字是割剝之意醉飽是厭足之意蓋以為割剝民力而無厭足之心後來見注解皆以形字訓象字意云象民之力而無已甚某甚覺不然但被形字無理會不敢改他底近看貞觀政要有引用處皆作刑民又看家語亦作刑民字方知舊來看得是此是祭公箴穆公之語須如某說其語方切礪問易爻取意義如師之五長子帥師乃是本爻有此象又卻說弟子輿尸何也曰此假設之辭也若言弟子輿尸則凶矣問此例恐與家人嗃嗃而繼以婦子嘻嘻同曰然榦問程傳云長子謂九二以中正之德合於上而受任以行夫以九之居二中則是矣豈得為正曰此只是錯了一字耳莫要泥他時舉開國承家為是坤有土之象然屯之利建侯卻都無坤止有震此又不可曉淵開國承家小人勿用舊時說只作論功行賞之時不可及小人今思量看理去不得他既一例有功如何不及他得看來開國承家一句是公共得底未分別君子小人在小人勿用則是勿更用他與之謀議經畫爾漢光武能用此義自定天下之後一例論功行封其所以用之在左右者則鄧禹耿弇賈復數人他不與焉因問古之論功行封真箇是裂土地與之守非如後世虛帶爵邑若使小人參其間則誠有弊病曰勢不容不封他得但聖人別有以處之未見得如何如舜封象則使吏治其國若是小人亦自有以處之也先生云此義方思量得如此未曾改入本義且記取學履比李問比卦大抵占得之多是人君為人所比之象曰也不必拘若三家村中推一箇人作頭首也是為人所比也須自審自家才德可以為之比否所以原筮元永貞也學履筮字說做占決亦不妨然亦不必說定不是龜筮之筮淵問不寧方來後夫凶曰別人自相比了己既後於眾人卻要強去比他豈不為人所惡是取凶也後夫猶言後人春秋傳有云先夫當之矣亦是占中一義後夫不必如伊川說左傳齊崔卜娶妻卦云入于其宮不見其妻凶人以為凶他云前夫當之矣彼云前夫則此云後夫正是一樣語陽便是夫陰便是婦礪後夫只是說後來者古人亦曾說先夫當之也有喚作夫婦之夫底淵後夫凶言九五既為眾陰所歸若後面更添一箇陽來則必凶古人如袁紹劉馥劉繇劉備之事可見兩雄不並棲之義淵比吉也也字羨當云比吉比輔也下順從也比輔也解比字下順從也解吉字廣伊川言建萬國以比民言民不可盡得而比故建諸侯使比民而天子所親者諸侯而已這便是它比天下之道淵終來有他說將來似顯比便有那周遍底意思淵問比之匪人曰初應四四是外比於賢為比得其人二應五五為顯比之君亦為比得其人惟三乃應上上為比之無首者故為比之匪人也時舉問伊川解顯比王用三驅失前禽所謂來者揜之去者不追與失前禽而殺不去者所譬頗不相類如何曰田獵之禮置旃以為門刈草以為長圍田獵者自門驅而入禽獸向我出者皆免惟被驅而入者皆獲故以前禽比去者不追獲者譬來則取之大意如此無緣得一一相似伊川解此句不須疑但邑人不誡吉一句似可疑恐易之文義不如此耳洽比九五邑人不誡蓋上之人顯明其比道而不必人之從己而其私屬亦化之不相戒約而自然從己也礪邑人不誡如有聞無聲言其自不消相告戒又如歸市者不止耕者不變相似淵易第六爻在上為首自下又為尾兩用比上六象曰比之無首無所終也是也小畜小畜言以巽之柔順而畜三陽畜他不住大畜則以艮畜乾畜得有力所以喚作大畜小畜亨是說陽緣陰畜他不住故陽得自亨橫渠言易為君子謀不為小人謀凡言亨皆是說陽到得說陰處便分曉說道小人吉亨字便是下面剛中而志行乃亨淵問見人說此卦作巽體順是小人以柔順小術畜君子故曰小畜如何曰易不可專就人上說且就陰陽上看分明巽畜乾陰畜陽故謂之小若配之人事則為小人畜君子也得為臣畜君也得為因小小事畜止也得不可泥定一事說學履問密雲不雨自我西郊曰此是以巽畜乾巽順乾健畜他不得故不能雨凡雨者皆是陰氣盛凝結得密方濕潤下降為雨且如飯甑蓋得密了氣鬱不通四畔方有溫汗今乾上進一陰止他不得所以彖中云尚往也是指乾欲上進之象到上九則以卦之始終言畜極則散遂為既雨既處陰德盛滿如此所以有君子征凶之戒學履密雲不雨尚往也是陰包他不住陽氣更散做雨不成所以尚往也礪問風行天上小畜象義如何曰天在山中大畜蓋山是堅剛之物故能力畜其三陽風是柔軟之物止能小畜之而已耳時舉風行天上小畜君子以懿文德言畜他不住且只逐些子發泄出來只以大畜比之便見得大畜說多識前言往行以畜其德小畜只是做得這些箇文德如威儀文辭之類淵問初九復自道何其咎吉此爻與四相應正為四所畜者乃云復自道何邪曰易有不必泥爻義看者如此爻只平看自好復自道便吉復不自道便凶自無可疑者矣時舉復自道之復與復卦之復不同復卦言已前不見了這陽如今復在此復自道是復他本位從那道路上去如無往不復之復淵小畜但能畜得九三一爻而已九三是迫近他底那兩爻自牽連上來淵孚有在陽爻有在陰爻伊川謂中虛信之本中實信之質淵富以其鄰與上合志是說上面巽體同力畜乾鄰如東家取箇西家取箇取上下兩畫也此言五居尊位便動得那上下底攣如手把攣住之象既雨既處言便做畜得住了做得雨後這氣必竟便透出散了德積是說陰德婦人雖正亦危月才滿便虧君子到此亦行不得這是那陰陽皆不利之象淵問小畜以一陰而畜五陽而九五乃云富以其鄰是與六四之陰并力而畜下三陽不知九五何故反助陰耶曰九五上九皆為陰所畜又是同巽之體故反助之也又曰上九爻辭殊不可斷若人占得此爻則吉凶未可知然易占法有活法聖人因事教人如有是德而得是爻則為吉無是德而得是爻則不應須如此看乃活如輿說輻夫妻反目一爻可謂不好然能以剛自守則雖得此爻而凶不應矣銖上九雖是陰畜陽至極處和而為雨必竟陰制陽是不順所以雖正亦厲礪小畜上九疑是太甲伊尹之事當之注云陰既盛而亢陽則君子亦不可以有行恐當云君子於此宜靜而不宜動故征則凶也方與上意不相害曰作伊周之事說亦得作易本意只說陰畜陽到極處問既如此則何故又曰君子征凶曰便是易本意只言陰畜陽若以事言之則伊尹之於太甲周公之於成王固如此如武后之於高宗亦然問武后事恐不可謂之既雨曰它也自和問恐不可謂之婦貞曰易中之意言婦雖貞猶厲而況於不貞乎蓋易文本是兩下說在那裏不可執定看榦十六日月雖闕未多卻圓似生明之時畢竟是漸闕去月初雖小於生魄時卻是長底時節問占得此爻則如何曰這當看所值之時何如大意大抵不得便宜月幾望小畜上六歸妹六五中孚六四履履虎尾言履危而不傷之象便是後履前之意隨著他後去淵履上乾下兌以陰躡陽是隨後躡他如踏他腳跡相似所以云履虎尾是隨後履他尾故於卦之三四爻發虎尾義便是陰去躡他陽背脊後處伊川云履藉說得生受礪問履以兌遇乾和說以躡剛強之後所以有履虎尾而不傷之象但彖言剛中正履帝位而不疚正指九五而言而九五爻辭乃曰夬履貞厲有危象焉何也曰夬決也九五以剛中正履帝位而下又以和說應之故其所行果決自為無所疑礙所以雖正亦厲蓋曰雖使得正亦危道也為戒深矣銖時舉錄見下叔重問剛中正履帝位而不疚光明此是指九五而言然九五爻辭云夬履貞厲與彖似相反何邪曰九五是以剛居上下臨柔說之人故決然自為而無所疑不自知其過於剛耳時舉問履如何都做禮字說曰定上下辨民志便也是禮底意思又曰禮主卑下履也是那踐履處所行若不由禮自是乖戾所以曰履以和行謙又更卑下所以節制乎禮又曰禮是自家恁地卑下謙是就應物而言又曰履和而至以下每句皆是反說履出於人情之自然所以和者疑於不然而卻至謙尊而光若秦人尊君卑臣則雖尊而不光惟謙則尊而又光伊川這一卦說卻大象并素履履道坦坦處卻說得好履道道即路也淵武人為于大君必有此象但六三陰柔不見得有武人之象淵履三四爻正是躡他虎尾處陽是進底物事四又上躡五亦為虎尾之象砥志行也只是說進將去淵夬履是做得忒快雖合履底也有危厲淵夬履貞厲正東坡所謂憂治世而危明主也學履視履考祥居履之終視其所履而考其祥做得周備底則大吉若只是半截時無由考得其祥後面半截卻不好未可知旋是那團旋來卻到那起頭處淵泰論陰陽各有一半聖人於泰否只為陽說道理看來聖人出來做須有一箇道理使得天下皆為君子世間人多言君子小人常相半不可太去治他急迫之卻為害不然如舜湯舉伊尹皋陶不仁者遠自是小人皆不敢為非被君子夾持得皆革面做好人了淵問看否泰二卦見得泰無不否若是有手段底則是稍遲得曰自古自治而入亂者易由亂而入治者難治世稍不支捂便入亂去亂時須是大人休否方做得學履問財成輔相字如何解曰裁成猶裁截成就之也裁成者所以輔相也一作輔相者便只是於裁成處以補其不及而已又問裁成何處可見曰眼前皆可見且如君臣父子兄弟夫婦聖人便為制下許多禮數倫序只此便是裁成處至大至小之事皆是固是萬物本自有此理若非聖人裁成亦不能如此齊整所謂贊天地化育而與之參也一作此皆天地之所不能為而聖人能之所以贊天地之化育而功與天地參也又問輔相裁成學者日用處有否曰饑食渴飲冬裘夏葛耒耜罔罟皆是淵財成是截做段子底輔相是佐助他底天地之化儱侗相續下來聖人便截作段子如氣化一年一周聖人與他截做春夏秋冬四時淵問財成輔相無時不當然何獨於泰時言之曰泰時則萬物各遂其理方始有裁成輔相處若否塞不通一齊都無理會了如何裁成輔相得學履燾錄作天地閉塞萬物不生聖人亦無所施其力泰初九云占者陽剛則其征吉矣當云占者陽剛而得其類則征吉矣以其彙亦是占辭曰以其彙屬上文嘗見郭璞易林亦如此做句便是那時人已自恁地讀了蓋拔茅連茹者物象也以其彙者人也榦問包荒得尚于中行以光大也以九二剛中有光大之德乃能包荒邪為是包荒得尚于中行所以光大邪曰易上如說以中正也皆是以其中正方能如此此處也只得做以其光大說若不是一箇心胸明闊底如何做得礪勿恤其孚只作一句讀孚只是信蓋言不卹後來信與不信爾義剛于食有福食如食舊德之食赤壁賦吾與子之所共食之食礪富以其鄰言以其富厚之力而能用其鄰不富以其鄰言不待富厚之力而能用其鄰淵帝乙歸妹今人只做道理譬喻推說看來須是帝乙嫁妹時占得此爻淵自邑告命是倒了邑是私邑卻倒來命令自家雖便做得正人君到此也則羞吝淵方泰極之時只得自治其邑程先生說民心離散自其親近者而告命之雖正亦吝然此時只得如此雖吝卻未至於凶礪且如城復于隍須有這箇城底象隍底象邑底象城隍邑皆土地在坤爻中自有此象淵城復于隍隍是河掘其土以為城又因以固城也勿用師師是兵師凡坤有眾與土之象礪問泰卦無平不陂無往不復與城復于隍因言否泰相乘如此聖人因以垂戒曰此亦事勢之必然治久必亂亂久必治天下無久而不變之理子善遂言天下治亂皆生於人心治久則人心放肆故亂因此生亂極則人心恐懼故治由此起曰固是生於人心然履其運者必有變化持守之道可也如明皇開元之治自是好了若但能把捉不至如天寶之放肆則後來亦不應如此狼狽銖因言觀聖人立象係辭當好時便須有戒懼收斂底意當不好時便須有艱難守正底意徹首徹尾不過敬而已卦中無全好者亦無全不好者大率敬即好不敬即不好先生頷之銖否否之匪人言沒了這人道淵問否之匪人三字說者多牽強本義云與泰相反故曰匪人言非人道也程易卻云天地不交而萬物不生故無人道如何曰說者云此三字衍蓋與比之匪人語同而字異遂錯誤於此今強解不通也又問初六拔茅茹以其彙貞吉亨蓋三陰在下各以類進然惡未形故戒其能正則吉而亨蓋能正則變為君子矣程易作君子在下說云當否之時君子在下以正自守如何曰程氏亦作君子之象說某覺得牽強不是此意又問九四有命無咎疇離祉三陰已過而陽得亨則否過中而將濟之時與泰九三無平不陂無往不復相類曰泰九三時已有小人便是可畏如此故艱貞則無咎否下三爻君子尚畏它至九四即不畏之矣故有有命疇離祉之象占也又問九五其亡其亡繫于苞桑如何曰有戒懼危亡之心則便有苞桑繫固之象蓋能戒懼危亡則如繫于苞桑堅固不拔矣如此說則象占乃有收殺非是其亡其亡而又繫于苞桑也銖拔茅茹貞吉亨這是吉凶未判時若能於此改變時小人便是做君子君子小人只是箇正不正初六是那小人欲為惡而未發露之時到六二包承則已是打破頭面了然尚自承順那君子未肯十分做小人在到六三便全做小人了所以包許多羞恥大凡小人做了罪惡他心下也自不穩當此便是包羞之說淵包承龜山以包承小人為一句言否之世當包承那小人如此卻不成句龜山之意蓋欲解洗他從蔡京父子之失也淵包承也是包得許多承順底意思學履包羞之說是有意傷善而未能之意他六二尚自包承到這六三已是要害君子然做事不得所以包許多羞恥淵否九四雖是陽爻猶未離乎否體只緣他是陽故可以有為然須有命方做得又曰有命是有箇機會方可以做占者便須是有箇築著磕著時節方做得事成方無咎礪否九四有命無咎疇離祉這裏是吉凶未判須是有命方得無咎故須得一箇幸會方能轉禍為福否本是陰長之卦九五休否上九傾否又自大故好蓋陰之與陽自是不可相無者今以四時寒暑而論若是無陰陽亦做事不成但以善惡及君子小人而論則聖人直是要消盡了惡去盡了小人蓋亦抑陰進陽之義學履錄作助陽之意某於坤卦曾略發此意今有一樣人議論謂君子小人相對不可大故去他若要盡去他則反激其禍且如舜湯舉皋陶伊尹不仁者遠所謂去小人非必盡滅其類只是君子道盛小人自化雖有些小無狀處亦不敢發出來豈必勦滅之乎文蔚學履錄略九四則否已過中上三爻是說君子言君子有天命而無咎大抵易為君子謀且如否內三爻是小人得志時然不大段會做得事初則如此二又如此三雖做得些箇也不濟事到四則聖人便說他那君子得時否漸次反泰底道理五之苞桑繫辭中說得條暢盡之矣上九之傾否到這裏便傾了否做泰淵九五以陽剛得位可以休息天下之否然須常存得危亡之心方有苞桑之固不知聖人於否泰只管說包字如何須是象上如何取其義今曉他不得只得說堅固嘗見林謙之與張欽夫講易林以為有象欽夫云看孔子說公用射隼于高墉之上只是以道理解了便是無用乎象遂著書說此看來不如此蓋當時人皆識得象卻有未曉得道理處故聖人不說象卻就上發出道理說初不是懸空說出道理凡天下之物須是就實事上說方有著落又曰聖人分明是見有這象方就上面說出來今只是曉他底不得未說得也未要緊不可說道他無此象呂大臨以酬爵不舉解不盡人之歡酬爵不舉是實事如此不盡人之歡便是就上說出這話來礪同人同人于野亨利涉大川是兩象一義利君子貞是一象淵乾行也言須是這般剛健之人方做得這般事若是柔弱者如何會出去外面同人又去涉險淵易雖抑陰然有時把陰為主如同人是也然此一陰雖是一卦之主又卻柔弱做主不得淵類族辨物言類其族辨其物且如青底做一類白底做一類恁地類了時同底自同異底自異淵問類族辨物如伊川說云各以其類族辨物之同異也則是就類族上辨物否曰類族是就人上說辨物是就物上說天下有不可皆同之理故隨他頭項去分別類族如分姓氏張姓同作一類李姓同作一類辨物如牛類是一類馬類是一類就其異處以致其同此其所以為同也伊川之說不可曉學履問六二與九五柔剛中正上下相應可謂盡善卻有同人于宗吝與先號咷之象如何曰以其太好兩者時位相應意趣相合只知款密卻無至公大同之心未免係於私故有吝觀二人同心其利斷金同心之言其臭如蘭固是他好處然於好處猶有失以其係於私暱而不能大同也大凡悔者自凶而之吉吝者自吉而趨凶又問伏戎于莽升其高陵如何曰只是伏于高陵之草莽中三歲不敢出與九四乘其墉皆為剛盛而高三欲同於二而懼九五之見攻故升高伏戎欲敵之而五陽方剛不可奪故三歲不興而象曰不能行也四欲同於二而為三所隔故乘墉攻之而以居柔遂自反而弗克而象曰義弗克也程傳謂升高陵有升高顧望之意此說雖巧恐非本意程傳說得通天下之志處極好云文明則能燭理故能明大同之義剛健則能克己故能盡大同之道此說甚善大凡說書只就眼前說出底便好崎嶇尋出底便不好問大師克相遇本義無說何也曰舊說只用大師克勝之方得相遇或云大師之克見二陽之強則非也銖曰二五本自同心而為三四所隔故先號咷先謂理直也淵錄云以中直也言其理直而不得伸所以先號咷大師克而後相遇則後笑矣蓋亦義理之同物終不得而間之故相遇也先生頷之又問同人于郊曰郊是荒寂無人之所言不能如同人于野曠遠無私荒僻無與同蓋居外無應莫與同者亦可以無悔也銖伯豐問同人三四皆有爭奪之義曰只是爭六二一陰爻卻六二自與九五相應三以剛居剛便迷而不返四以剛居柔便有反底道理繫辭云近而不相得則凶如初上則各在事外不相干涉所以無爭問同人于郊曰同人于野是廣大無我之意同人于郊是無可與同之人也取義不同自不相悖時舉大有應乎天而時行程說以為應天時而行何如曰是以時而行是有可行之時礪火在天上大有凡有物須是自家照見得方見得有若不照見則有無不可知何名為有淵問君子以遏惡揚善順天休命竊以為天之所以命我者此性之善也人惟蔽於非心邪念是以善端之在人心日以湮微君子儻能遏止非心邪念於未萌則善端始自發揚而天之所以命我者始無所不順如此而為順天休命若何曰天道喜善而惡惡遏惡而揚善非順天休命而何吾友所說卻似嫌他說得大要束小了說蓋卿問初九無交害匪咎艱則無咎曰此爻本最吉不解有咎然須說艱則無咎蓋易之書大抵教人戒慎恐懼無有以為易而處之者雖至易之事亦必以艱難處之然後無咎也僩古人於亨字作享烹字通用如公用亨于天子分明是享字易中解作亨字便不是問上九自天祐之吉無不利曰上九以陽剛居上而能下從六五者蓋陽從陰也大有唯六五一陰而上下五陽應之上九能下從六五則為履信思順而尚賢蓋五之交孚信也而上能履之謙退不居思順也志從於五尚賢也天之所助者順人之所助者信所以有自天祐之吉無不利之象若無繫辭此數句此爻遂無收殺以此見聖人讀易見爻辭有不分明處則於繫辭傳說破如此類是也又問遏惡揚善順天休命由天命有善而無惡當大有時遏止其惡顯揚其善反之於身亦莫不然非止用人用人乃其一事耳又問公用亨于天子亨只當作享字看與王用亨于西山同曰公用亨于天子已有左氏所引可證如隨之王用亨于西山亦必是祭享之享無疑又問匪其彭只當依程傳作盛貌曰程說為優王弼作下比九三分權之臣蓋以彭為旁言專心承五常匪其旁因說王荊公上韓魏公啟云時當大有更懷下比之嫌用此事譏魏公也銖謙謙便能亨又為君子有終之象淵虧盈益謙是自然之理淵變盈流謙揚子雲言山殺瘦澤增高此是說山上之土為水漂流下來山便瘦澤便高淵鬼神言害言福是有些造化之柄淵鬼神說害說福如言與鬼神合其吉凶則鬼神便說箇吉凶字淵問謙彖云云鬼神是造化之跡既言天地之道又言鬼神何邪曰天道是就寒暑往來上說地道是就地形高下上說鬼神是就禍福上說各自主一事而言耳因云上古之時民心昧然不知吉凶之所在故聖人作易教之卜筮使吉則行之凶則避之此是開物成務之道故繫辭云以通天下之志以定天下之業以斷天下之疑正謂此也初但有占而無文往往如今之珓相似耳但如今人因火珠林起課者但用其爻而不用其辭則知古者之占往往不待辭而後見吉凶至文王周公方作彖爻之辭使人得此爻者便觀此辭之吉凶至孔子又恐人不知其所以然故又復逐爻解之謂此爻所以吉者謂以中正也此爻所以凶者謂不當位也明明言之使人易曉耳至如文言之類卻是就上面發明道理非是聖人作易專為說道理以教人也須見聖人本意方可學易時舉謙之為義不知天地人鬼何以皆好尚之蓋太極中本無物若事業功勞又於我何有觀天地生萬物而不言所利可見矣賀孫問謙尊而光卑而不可踰曰恐程先生之說非周易本文之意尊字是對卑字說言能謙則位處尊而德愈光位雖卑而莫能踰如古之賢聖之君以謙下人則位尊而愈光若驕奢自大則雖尊而不光子蒙謙尊而光卑而不可踰以尊而行謙則其道光以卑而行謙則其德不可踰尊對卑言伊川以謙對卑說非是但聖人九卦之引此一句看來大綱說僩裒多益寡便是謙稱物平施便是裒多益寡淵問謙裒多益寡看來謙雖是若放低去實是損高就低使教恰好不是一向低去曰大抵人多見得在己者高在人者卑謙則抑己之高而卑以下人便是平也學履鳴謙在六二又言貞者言謙而有聞須得其正則吉蓋六二以陰處陰所以戒他要貞謙而不貞則近於邪佞上六之鳴卻不同處謙之極而有聞則失謙本意蓋謙本不要人知況在人之上而有聞乎此所以志未得淵撝謙言發揚其謙蓋四是陰位又在上卦之下九三之上所以更當發撝其謙不違則言不違法則淵六四撝謙是合如此不是過分事故某解其象云言不為過礪叔重因問程易說利用侵伐蓋以六五柔順謙卑然君道又當有剛武意故有利用侵伐之象然上六亦言利用行師如何曰便是此等有不通處時舉用之問謙上六象曰志未得也如何曰為其志未得所以行師征邑國蓋以未盡信從故也又問謙之五上專說征伐何意曰坤為地為眾凡說國邑征伐處多是因坤聖人元不曾著意只是因有此象方說此事文蔚問謙上六志未得也曰志未得所以行師亦如六五之意問謙上六何取象於行師曰坤為眾有坤卦處多言師如泰上六城復于隍勿用師之類坤為土土為國故云征邑國也以此見聖人于易不是硬做皆是取象因有這象方就上面說礪問謙是不與人爭如何五上二爻皆言利用侵伐利用行師象曰利用侵伐征不服也若以其不服而征則非所以為謙矣曰老子言大國以下小國則取小國小國以下大國則取大國又言抗兵相加哀者勝矣孫子曰始如處女敵人開戶後如脫兔敵不及拒大抵謙自是用兵之道只退處一步耳所以利用侵伐也蓋自初六積到六五上六謙亦極矣自宜人人服之尚更不服則非人矣故利用侵伐也如必也臨事而懼皆是此意銖豫建侯行師順動之大者立箇國君非舉動而何淵刑罰不清民不服只為舉動不順了致得民不服便是徒配了他亦不服淵豫之時義言豫之時底道理雷出地奮止是象其聲而已薦上帝配祖考大概言之淵先王作樂無處不用然用樂之大者尤在於薦上帝配祖考也僩問作樂崇德曰先生作樂其功德便自不可掩也時舉問作樂崇德是自崇其德如大韶大武之類否曰是礪叔重問豫初六與九四為應九四由豫大有得本亦自好但初六恃有強援不勝其豫至於自鳴所以凶否曰九四自好自是初六自不好怎柰他何又問雷出地奮豫先王以作樂崇德先生謂象其聲者謂雷取其義者為和崇德謂著其德作樂所以發揚其德也時舉介于石言兩石相摩擊而出火之意言介然之頃不待終日而便見得此道理淵盱豫悔言覷著六四之豫便當速悔遲時便有悔盱豫是句淵問六三云上視於四而下溺於豫下溺之義未曉曰如此人趨時附勢以得富貴而自為樂者也榦由豫猶言由頤淵隨伊川說說而動動而說不是不當說說而動凡卦皆從內說出去蓋卦自內生動而說卻是若說說而動卻是自家說他後他動不成隨了我動彼說此之謂隨淵動而說成隨巽而止成蠱節天下隨時處當從王肅說淵問程先生云澤隨雷動君子當隨時宴息是否曰既曰雷動何不言君子以動作卻言宴息范益之曰宴息乃所以養其明曰不是蓋其卦震下兌上乃雷入地中之象雷隨時藏伏故君子亦嚮晦入宴息此是某所見如此不知舊人曾如此看否子蒙問初九官有渝貞吉出門交有功官是主字之義是一卦之主首變得正便吉不正便凶曰是如此又曰這必是變了只是要出門交有功卻是變礪官有渝隨之初主有變動然尚未深淵小子丈夫程說是淵王用亨于西山言誠意通神明神亦隨之如況於鬼神乎之意淵蠱皿蟲為蠱言器中盛那蟲教他自相併便是那積蓄到那壞爛底意思一似漢唐之衰弄得來到那極弊大壞時所以言元亨蓋極弊則將復興故言元亨巽而止蟲那不是巽而止能治蠱巽而止所以為蠱趙德莊說下面人只務巽上面人又懶惰不肯向前上面一向剛下面一向柔倒塌了這便是蠱底道理淵必大錄云上頭底只管剛下頭底只管柔又只巽順事事不向前安得不蠱舊聞趙德莊如此說問蠱是壞亂之象雖亂極必治如何便會元亨曰亂極必治天道循環自是如此如五胡亂華以至於隋亂之極必有唐太宗者出又如五季必生太祖若不如此便無天道了所以彖只云蠱元亨而天下治也礪先甲後甲言先甲之前三日乃辛也是時前段事已過中了是那欲壞之時便當圖後事之端略略撐住則箇雖終歸於弊且得支吾幾時淵問蠱剛上柔下有數義剛在上而柔在下為卦體下卑巽而上苟止所以為蠱此卦義又自卦變言之自賁井既濟來皆剛上而柔下此卦變曰是龜山說巽而止乃治蠱之道言當柔順而止不可堅正必為此說非惟不成道理且非易彖文義巽而止蠱猶順以動豫動而說隨皆言卦義某本義之說蓋是趙德莊說趙云剛在上柔在下下卑巽而上苟止所以蠱壞此則文義甚協又問先甲辛也後甲丁也辛有新意丁有丁寧意其說似出月令注曰然但古人祭祀亦多用先庚先甲先庚丁也後庚癸也如用丁亥辛亥之類又問有子考無咎與意承考之考皆是指父在父在而得云考何曰古人多通言如康誥大傷厥考心可見又問九三幹父之蠱小有悔無大咎言小有悔則無大悔矣言無大咎則不免有小咎矣但象曰終無咎則以九三雖過剛不中然在巽體不為無順而得正故雖悔而無咎至六四則不然以陰居柔不能有為寬裕以治蠱將日深而不可治故往則見吝言自此以往則有吝也曰此兩爻說得悔吝二字最分明九三有悔而無咎由凶而趨吉也六四雖目下無事然卻終吝由吉而趨凶也元祐間劉莘老劉器之之徒必欲盡去小人卻是未免有悔至其他諸公欲且寬裕無事莫大段整頓不知目前雖遮掩拖延得過後面憂吝卻多可見聖人之深戒又問上九不事王侯高尚其事占與戒皆在其中如何曰有此象則其占當如此又戒其必如此乃可也若得此象而不能從則有凶矣當此時節若能斷然不事王侯高尚其事不半上落下或出或入則其志真可法則矣只為人不能如此也銖剛上而柔下巽而止蠱此是言致蠱之由非治蠱之道龜山之說非是又嘗見龜山在朝與陳幾叟書及有一人卦召請教於龜山龜山云不要拆壞人屋子皆是此意思及胡文定論時政說得便自精神索性堯夫詩云安得淳厚又秀慧與之共話天下事必大巽而止蠱是事事不理會積沓到後面成一大弊故謂之蠱非謂制蠱之道當巽而止龜山才質困弱好說一般不振底話如云包承小人又語某人云莫拆了人屋子其意謂屋弊不可大段整理他只得且撐拄過其說巽止之義蓋亦如此意爾豈不大害哉端蒙汪聖錫曾言某人別龜山往赴召龜山送之曰且緩下手莫去拆倒人屋子因言龜山解蠱卦以巽而止為治蠱之道所以有此說大凡看易須先看成卦之義險而健則成訟巽而止則成蠱蠱艮上而巽下艮剛居上巽柔居下上高亢而不下交下卻巽而不能救此所以蠱壞也巽而止只是巽順便止了便無所施為如何治蠱蠱元亨而天下治須是大善以亨方能治蠱也德明問巽而止蠱莫是遇事巽順以求其理之所止而後為治蠱之道曰非也大抵資質柔巽之人遇事便不能做事無奮迅之意所以事遂至於蠱壞了蠱只是事之壞了者祖道蠱元亨而天下治言蠱之時如此必須是大善亨通而後天下治淵問蠱君子以振民育德如何曰當蠱之時必有以振起聳動民之觀聽而在己進德不已必須有此二者則可以治蠱矣銖問幹父之蠱程傳云初居內而在下故取子幹父蠱之象本義云蠱者前人已壞之事故諸爻皆以子幹父蠱為言柄謂若如此說惟初爻為可通若他爻則說不行矣本義之說則諸爻皆可通也曰是如此柄幹母之蠱伊川說得是淵不事王侯無位之地如何出得來更幹箇甚麼淵問蠱上九傳知止足之道退而自保者與量能度分安於不求知者何以別曰知止足是能做底量能度分是不能做底淳臨問臨不特是上臨下之謂臨凡進而逼近者皆謂之臨否曰然此是二陽自下而進上則知凡相逼近者皆為臨也學履問至于八月有兩說前說自復一陽之月至遯二陰之月陰長陽遯之時後說自泰至觀觀二陽在上四陰在下與臨相反亦陰長陽消之時二說孰長曰前說是周正八月後說是夏正八月恐文王作卦辭時只用周正紀之不可知也又問二爻皆云咸臨二陽遍臨四陰故有咸臨之象程易作咸感之義如何曰陰必從陽謂咸為感亦是但覺得牽強些此等處皆曉未得如至臨與敦臨亦相似難分別今只得如此說此易所以未易看也銖剛浸而長以下三句解臨字大亨以正便是天之道也解亨字亦是惟其如此所以如此須用說八月有凶者蓋要反那二陽二陽在下四五皆以正應臨之上無所臨卻還去臨那二陽三近二陽也去臨他如小人在上位卻把甘言好語臨在下之君子至臨言其相臨之切敦臨有敦厚之意淵易中言天之命也天之道也義只一般但取其成韻耳不必強分析賀孫問臨初九以剛居正九二以剛居中六四六五以柔順臨下故有相感應之道所以謂之咸臨否曰是又問六四以陰居正柔順臨下又有正應臨之極善故謂之至臨曰至臨無咎未是極好只是與初相臨得切至故謂之至上六敦臨自是積累至極處有敦篤之義艮上九亦謂之敦艮復上六爻不好了所以只於五爻謂之敦復居臨之時二陽得時上進陰不敢與之爭而志與之應所謂在內者非謂正應只是卦內與二陽應也又曰此便是好卦不獨說道理自是好讀所謂卦有小大辭有險易此便是大底卦礪觀盥非灌之義盥本為薦而不薦是欲蓄其誠意以觀示民使民觀感而化之義有孚顒若便是那下觀而化卻不是說人君身上事聖人以神道設教是聖人不犯手做底即是盥而不薦之義順而巽中正以觀天下謂以此觀示之也淵問盥而不薦是取未薦之時誠意渾全而未散否曰祭祀無不薦者此是假設來說薦是用事了盥是未用事之初云不薦者言常持得這誠敬如盥之意常在若薦則是用出用出則纔畢便過了無復有初意矣詩云心乎愛矣遐不謂矣中心藏之何日忘之楚辭云思公子兮未敢言正是此意說出這愛了則都無事可把持矣惟其不說但藏在中心所以常見其不忘也學履問盥而不薦曰這猶譬喻相似蓋無這事且如祭祀纔盥便必薦那有不薦底但取其潔之義耳燾用之問盥而不薦伊川以為灌鬯之初誠敬猶存至薦羞之後精意懈怠本義以為致其潔清而不輕自用其義不同曰盥只是浣手不是灌鬯伊川承先儒之誤若云薦羞之後誠意懈怠則先王祭祀只是灌鬯之初猶有誠意及薦羞之後皆不成禮矣問若爾則是聖人在上視聽言動皆當為天下法而不敢輕亦猶祭祀之時致其潔清而不敢輕用否曰然問有孚顒若先生以為孚信在中而尊嚴故下觀而化之伊川以為天下之人孚信顒然而仰之恐須是孚信尊嚴方得下觀而化曰然又問觀觀之義曰自上示下曰觀去聲自下觀上曰觀平聲故卦名之觀去聲而六爻之觀皆平聲問觀我生觀其生之別曰我者彼我對待之言是以彼觀此觀其生是以此自觀六三之觀我生進退者事君則觀其言聽計從治民則觀其政教可行膏澤可下可以見自家所施之當否而為進退九五之觀我生如觀風俗之美惡臣民之從違可以見自家所施之善惡上九之觀其生則是就自家視聽言動應事接物處自觀九五上九君子無咎蓋為君子有剛陽之德故無咎小人無此德自當不得此爻如初六童觀小人之道也君子則吝小人自是如此故無咎此二爻君子小人正相對說僩問有孚顒若承上文盥而不薦蓋致其潔清而不輕自用則孚信在中而顒然可仰一說下之人信而仰之二說孰長曰從後說則合得彖辭下觀而化之義或曰前說似好曰當以彖辭為定又問六三觀我生進退不觀九五而觀己所行通塞以為進退否曰看來合是觀九五大率觀卦二陽在上四陰仰之九五為主六三觀我生進退者觀九五如何而為進退也初六六二以去五之遠觀貴於近所觀不明不大六四卻見得親切故有觀光利用之象六三處二四之間固當觀九五以為進退也子善遂問如此則我字乃是指九五而言易中亦有此例如頤之初九曰舍爾靈龜觀我朵頤是也曰此我乃是假外而言耳又問觀卦四陰長而二陽消正八月之卦而名卦係辭不取此義何也曰只為九五中正以觀示天下事都別了以此見易不可執一看所謂不可為典要惟變所適也此說我字與本義不同當考銖觀天之神道只是自然運行底道理四時自然不忒聖人神道亦是說他有教人自然觀感處淵問觀六爻一爻勝似一爻豈所據之位愈高則所見愈大邪曰上二爻意自別下四爻是所據之位愈近則所見愈親切底意思學履問觀卦陰盛而不言凶咎曰此卦取義不同蓋陰雖盛於下而九五之君乃當正位故只取為觀於下之義而不取陰盛之象也時舉觀我是自觀如視履考祥底語勢觀其亦是自觀卻從別人說易中其字不說別人只是自家如乘其墉之類淵觀我生如月受日光觀其生只是日光礪
