body:
  text: 朱子語類卷第一百三十八雜類禹入聖域而不優優裕也言入聖域恰好更不優裕優裕謂有餘剩漢儒見得此意思好賀孫爾雅是取傳注以作後人卻以爾雅證傳注文蔚爾雅非是只是據諸處訓釋所作趙岐説孟子爾雅皆置博士在漢書亦無可考泳陳仲亨問周書云將欲敗之必姑輔之將欲取之必姑與之今周書何緣無之曰此便是那老子裏教句是周時有這般書老子為柱下史故多見之孔子所以適周問禮之屬也緣是他知得古人以竹簡寫書民間不能盡有惟官司有之如秦焚書也只是教天下焚之他朝廷依舊留得如説非秦記及博士所掌者盡焚之到六經之類他依舊留得但天下人無有義剛汲冢古書堯憂囚舜野死尹篡太甲太甲殺尹之類皆其所出誠之常袖呂不韋春秋云其中甚有好處及舉起皆小小術數耳璘書坊印得六經前面纂圖子也略可觀如車圖雖不甚詳然大概也是義剛七書所載唐太宗李衛公問答乃阮逸偽書逸建陽人文中子玄經關子明易皆逸所作揚問山海經曰一卷説山川者好如説禽獸之形往往是記録漢家宮室中所畫者説南向北向可知其為畫本也方子素問語言深靈樞淺較易振柳文後龍城雜記王銍性之所為也子厚敘事文字多少筆力此記衰弱之甚皆寓古人詩文中不可曉知底於其中似暗影出偽書皆然杜牧之燕將録文甚雄壯省心録乃沈道原作非林和靖也程泰之演繁露其零碎小小議論亦多可取如辨罘罳之類是也某頃因看筆談中辨某人誤以屏為反坫後看説文坫字下乃注云屏也因疑存中所辨未審後舉以問泰之泰之曰存中辨是然不是某人誤乃説文誤耳洪景盧隨筆中辨得數種偽書皆是但首卷載歐帖事卻恐非實世間偽書如西京雜記顏師古已辨之矣柳子厚龍城録乃王性之輩所作必大金人亡遼録女真請盟背盟録汪端明撰僩洛陽志説道最好文字最簡嚴惜乎不曾見義剛指掌圖非東坡所為砥柱銘上説禹挂冠莫顧過門不入挂冠是有箇文字上説禹治水時冠挂著樹急於治水今記不得是甚文字世間文字甚多只後漢書注內有無限事警世競辰二圖偽道夫邵公濟墓志好方子吳才老協韻一部每字下注某處使作某音亦只載得有證據底只是一例子泉州有板本淳近世考訂訓釋之學唯吳才老洪慶善為善僩稱平者自他人稱平之稱去者人之本號道夫周貴卿問折衷之義曰衷只是中左傳説始中終亦用此衷字衷是三摺而處其中者義剛問折衷之衷曰是無過些子無不及些子正中間又曰是恰好底節折衷者折轉來取中衷只是箇中節中如字即其中也中音衆則是當之義謂適當其中也如六藝折衷音衆於夫子亦謂折當使歸於中之義中與所以謂之中音衆以適當其中如字而異也振淳醇皆訓厚純是不雜先生曰期極也古人用期字多作極字周昌云心期期知其不可言極知其不可口吃故重一字也銖謂之名之也之謂直為也方子復復指其上復字扶又反再復也方子尚衣尚書尚食乃主守之意秦語作平音淳魏大名也魏巍字通魏字篆文亦有山字在其中是有大義因是名為大名府揚舅子謂之內兄弟姑子謂之外兄弟揚因説外甥似舅以其似母故也致道問形似母情性須別曰情性也似大抵形是箇重濁底占得地步較闊情性是箇輕清底易得走作賜古者姓氏大概姓只是女子之別故字從女男則從氏如季孫氏之類春秋可見後世賜姓殊無義理端蒙氏如孟孫叔孫季孫是也姓則同姓後世子孫或以氏為姓今人皆稱張氏李氏謂從上下來只是氏了只有三代而上經賜姓者為姓如姚如姒如姬之類是正姓唐時尚有氏不同而同出者不得為婚姻揚沈莊仲問姓氏如何分別曰姓是大總腦處氏是後來次第分別處如魯本姬姓其後有孟氏季氏同為姬姓而氏有不同某嘗言天子因生以賜姓諸侯以字為諡因以為族竊恐諡本氏字先儒隨他錯處解將去義理不通且如舜生於媯汭武王遂賜陳胡公滿為媯姓即因生賜姓如鄭之國氏本子國之後駟氏本子駟之後如此之類所謂以字為氏因以為族文蔚姓與氏之分姓是本原所生氏是子孫下各分如商姓子其後有宋宋又有華氏魚氏孔氏之類周自黃帝以來姓姬其後魯衛毛聃晉鄭之屬各自以國為氏而其國之子孫又皆以字為氏如魯國子展之後為展氏展禽喜是也如三家孟仲季為氏或因所居為氏如東門氏之類左氏曰天子因生以賜姓諸侯以字為諡因以為族天子自因生以賜姓為推其所自出而賜之姓如舜居媯汭及武王即位封舜之後於陳因賜姓為媯此所謂因地以賜姓也諸侯以字為諡只是氏字傳寫之訛遂以氏字為諡無義理只是以字為氏如上文展氏孟氏之類也杜預點諸侯以字四字為句斷而為諡因以為族為一句此亦是強解看來只是錯了諡字至孫方以王父之字為氏上兩世為承公之姓也卓自秦漢以來奴僕主姓今有一大姓所在四邊有人同姓不知所來者皆是奴僕之類揚同異之理如同姓本親以下去漸疏異姓本疏他日婚姻卻又親陰陽相涵之理也萬物聚散之理也方適母與所生封贈恩例一同不便看來嫡庶之別須略有等降乃為合理砥因説諱字曰漢宣帝舊名何曾諱病己平帝舊名亦不諱虜中法偏旁字皆諱如敬字和警字皆諱淳見人名諱同不可遽改只半真半草寫之揚曰只是寫時莫與太真説時莫太分明揚因説四方聲音多訛曰卻是廣中人説得聲音尚好蓋彼中地尚中正自洛中脊來只是太邊南去故有些熱若閩浙則皆邊東角矣閩浙聲音尤不正揚先生因説詩中關洛風土習俗不同曰某觀諸處習俗不同見得山川之氣甚牢且如建州七縣縣縣人物各自是一般一州又是一般生得長短大小清濁皆不同都改變不得豈不是山川之氣甚牢燾因論南方人易得病曰北方地氣厚人皆不病叔祖奉使在北方十五年已上生冷無所不食全不害歸來才半年一切發來遂死更有一武臣代州人嘗至五臺山有一佛殿上皆青石暑月每於石上徹日睡全無病如來南方睡如何了得揚諸生入問候先生曰寒後卻凛地氣痞西川人怕寒嘗有人入裏面作守召客後令人打扇坐客皆起白云若使人打扇少間有某疾生冷果子亦不可吃才吃便有某疾便是西川之人大故怕寒如那有雪處直是四五月後雪不融這便是所謂景朝多風處便是日到那裏時過午時陽氣不甚厚所以如此所謂漏天處皆在那裏恁地便是天也不甚闊只那裏已如此了這是西南尚如此若西北想是寒過那秦鳳之間想見寒如峨眉山趙子直嘗登上面煮粥更不熟有箇核子時有李某者凍得悶絶了莊仲云不知佛國如何曰佛國卻暖他靠得崑崙山後那裏卻暖便是那些子也差異四方蠻夷都不曉人事那裏人卻理會得般道理恁地便是那裏人也大故嶢崎不知是怎生後恁地義剛榷場中有文字賣説中原所在山川地理州縣邸店甚詳中亦雜以虜人官制某以為是中原有忠義之人做出來欲朝廷知其要害處也關中秦時在渭水之北居但作離宮之類於渭南漢時宮闕在渭水之南終南之北背渭面終南隋時此處水皆鹹文帝遂移居西北稍遠漢之都唐都在隋一偏西北角唐宮殿制度正當甚好官街皆用墻居民在墻內民出入處皆有坊門坊中甚窄故武元衡出坊門了始遇害本朝宮殿街巷京城制度皆仍五代因陋就簡所以不佳唐田兵官制承宇文周有些制度故較好舊東京關中漢唐宮闕街巷之類圖今衢州有碑本揚行在舊時行宮之門虜使來有語後虜作二牌來前曰麗正後曰和寧遂報去謂太小今自作牌依其名題揚古之王城有三途左男行右女行中車行天下路中有車軌道揚漳州州學中從祀是神霄宮神改塑紹興府禹廟重塑禹像王仲行將舊禹與一道士去改塑天齊仁聖帝此是一類子德明汪端明説朝廷塑一顯仁皇后御容三年不成卻是一行人要希逐日食錢所費不資端明為禮部尚書奏過太上得旨催促又卻十日便了朝廷事多如此浩王拱辰作高樓溫公作土室時人語云一人鑽天一人入地康節謂富公云比有怪事一人巢居一人穴處方蕪湖舊有一富家曰韋居士字深道喜延知名士如黃太史陳了翁遷謫每歲餽餉不下千娘今人才見遷謫者便以為懼安得有此等人人傑陸務觀説漢中之民當春月男女行哭首戴白楮幣上諸葛公墓其哭皆甚哀云先生親筆於南軒所撰武侯傳後道夫齊蕭子良死不用棺置於石床之上唐時子良幾世孫蕭隱士過一洲見數人云此人似蕭王隱士訝之到一郡遂見解幾人劫墓賊來乃洲上之人隱士説與官令勘之乃曾開蕭王冢來云王臥石床上儼然如生揚廬山有淵明古迹處曰上京淵明集作京師之京今土人以為荊楚之荊江中有一盤石石上有痕云淵明醉臥於其石上名淵明醉石某為守時架小亭下瞰此石榜歸去來館又取西山劉凝之菴用魯直詩名曰清靜退菴與此相對夔孫晝則聽金鼓夜戰看火候嘗疑夜間不解戰蓋只是設火候防備敵來劫寨之屬古人屯營其中盡如井形於巷道十字處置火候如有間諜一處舉火則盡舉更走不得義剛馳車千駟革車千乘馳車即兵車蓋輕車也革車駕以牛蓋輜重之車每輕車七十二人三人在車上一御一持矛一持弓此三人乃七十五人中之將蓋五伍為兩兩有長故也輕車甚疾義剛豫凶事亦恐有之龔勝傳昭帝賜韓福策曰不幸死者賜復衾一祠以中牢古人此等事自多難以懸斷閎祖三元是道家之説上元燒燈卻見於隋煬帝未知始於何時賀孫問真元外氣如何曰真元是生氣在身上曰外氣入真元氣否曰雖吸入又散出自有界限但論其理則相通可學物造時亦遇氣候故皆有數揚時氣初只是氣疑其氣盛便有物以主之氣散又無了揚元善每相見便説氣數讖緯此不足憑只是它由天命然亦由人事才有此事得人去理會便了德明龍氣盛虎魄盛故龍能致雲虎能嘯風也許氏必用方首論虎晴定魄龍齒安魂亦有理廣醫家言心藏神脾藏意肝藏魂肺藏魄腎藏精與志與康節所説不同曰此不可曉德明嘗見徐侍郎敦立書三字帖於主位前云磨兜堅竟不曉所謂後竟得來乃是古人有銘如三緘口之類此書於腹曰磨兜堅謹勿言畏秦禍也敬仲問人有震死者如何曰有偶然者有為惡而感召之者如人欲操刀殺人而遇之者或遭其傷刺而死之類是也僩東坡云月未望而魚腦實既望則虛蓋出淮南子則食膾宜及未望也揚論説物理因問東坡説人不怕虎者虎不奈得其人何是有此理東坡説小兒不怕者是一證傳燈録載歸宗南泉三人曾遇虎皆不以為事季清言有一鄉人賣文字遇虎其人無走處了曾聞人言虎識字遂鋪開文字與虎看自去此數事皆其驗也先生曰曾見一僧名亨黃龍清會下人言僧入山遇虎只是常事初見時虎亦作威近前來見人不怕他漸漸去了後常常見人慣了都如常揚曰只是初見不怕難先生曰人心能堅忍得此時好揚翟公遜説鬼星渡河最亂道鬼星是經星如何解渡河泳野雉知雷起于起處可學罘罳或云乃門屏上刻作形漢注未是可學古人作甲用皮每用必漆後世用檩不知自何時起泳古人問籌者要説得這事分明歷歷落落這一事了便盡斷又要得界分分明泳宮即墻也僩太王畫像頭上有一片皮直裹至頸上此便是鉤領義剛王彥輔麈史載機頭之説甚詳方子衛朴善算作蓮花漏其形如稱東坡詆之文蔚漢祭河用御龍御馬皆以木為之此已是紙錢之漸義剛紙錢起於玄宗時王璵蓋古人以玉幣後來易以錢至玄宗惑於王璵之説而鬼神事繁無許多錢來埋得璵作紙錢易之文字便是難理會且如唐禮書載范傳正言唯顏魯公張司業家祭不用紙錢故衣冠效之而國初言禮者錯看遂作紙衣冠而不用紙錢不知紙錢衣冠有何間別義剛古之木今有無者多如楷木只孔子墓上當時諸弟子各以其方之木來栽後有此木今天下皆無此木其木亦如槐可作簡文皆橫生然亦只是文促後似橫樣義剛臨安檩箭只是錢王將此搖動人心使神之義剛瑞金新鑄印蓋嘗失一印重鑄之恐作弊故加新鑄之文國初有一奉使印亦如此義剛祕書省畫大樹下數人只古衣而無名君舉以為恐是孔子在宋木下習禮被伐木時義剛祕書省畫得唐五王及黃番綽明皇之類恐是吳道子畫李某跋之有云畫當如蓴菜某初曉不得不知它如何説得數句恁地好後乃知他是李伯時外甥蓋畫須如蓴菜樣滑方好須是圓滑時方妙義剛雪裏芭蕉他是會畫雪只是雪中無芭蕉他自不合畫了芭蕉人卻道他會畫芭蕉不知他是誤畫了芭蕉問春牛事未見出處但月令載出土牛以送寒氣不知其原果出於此否或又云以示勸耕之意未詳孰是某嘗見云處士立於縣庭土牛之南恐古者每歲為一牛至春日別以新易舊而送之也王丈云昔有道人云嵴生可以觀夜氣嘗插竿以記之自早至暮長不分寸曉而視之已數寸矣次日問夜氣莫未説到發生處曰然然彼説亦一驗也後在玉山僧舍驗之則日夜俱長良不如道人之説閎祖問廬山光怪恐其下有寶故光氣發見如此嘗見邵武張鑄説曾官嶽陽見江上有光氣其後漁人於其處網得銅鐘一枚又一小説云某郡某處嘗有光處令人掘得銅印一顆先生又自云向送葬開善望見兩山之間有光如野燒從地而發高而復下問云其山舊有銅坑也德明德粹語婺源有一人其子見鬼先生曰昔薛士龍之子亦然可學因説薛常州之子甚怯弱曰只是精神不全便如此向見邪法者溝人小兒稍靈利者便溝不倒可學云薛氏之兒所謂九聖奇鬼先生曰渠平生亦好説鬼可學云薛常州平日亦講學何故信此曰不知其所講如何可學獸中狐最易為精怪淳狐性多疑每渡河須冰盡合乃渡若聞冰下猶有水聲則終不敢渡恐冰解也故黃河邊人每視冰上有狐迹乃敢渡河又狐每走數步則必起而人立四望立行數步乃復走走數步復人立四望而行故人性之多疑慮者謂之狐疑狼性不能平行每行首尾一俯一仰首至地則尾舉向上胡舉向上則尾疐至地故曰狼跋其胡載疐其尾僩因論張天師先生曰本朝有南劍太守林積送張天師於獄中而奏云其祖乃漢賊不宜使子孫襲封一時人皆信之而彼獨能明其為賊其所奏必有可觀者林積者秦相時嘗為侍郎義剛郭天錫因算徽宗當為天子遂得幸官至承宣使其人亦鯁直敢説天覺每要占問時不尚自去見它多是使覺範去後來發覺蔡元長遂以為天錫有幻術令人監繫日置豬狗血於其側後來只被血薰殺了義剛覺範因張天覺事下大獄自供云本是醫人因入醫張相公府養娘有效遂與度牒令某作僧義剛神殺之類亦只是五行旺衰之氣推亦有此理但是後人推得小了太拘忌耳曉得了見得破底好如上蔡言我要有便有我要無便無方好然難不曉底人只是孟浪不信呂丈都不曉風水之類故不信今世俗人信便有不信便無亦只是此心疑與不疑耳揚因及談命課靈者曰是他精力強精力到處便自驗淳因説都下士夫愛看命曰士夫功名心切且得他差除一番亦好曰若命中有官便是天與我若就人論便是朝廷與我今不感戴天與朝廷卻感戴他們終身不忘甚可怪淳陶安國事真武先生曰真武非是有一箇神披髮只是玄武所謂青龍朱雀白虎玄武亦非是有四箇恁地物事以角星為角心星為心尾星為尾是為青龍虛危星如龜騰蛇在虛危度之下故為玄武真宗時諱玄字改玄字為真字故曰真武參星有四隻腳如虎故為白虎翼星如翼軫如項下嗉井為冠故為朱雀盧同詩曰頭戴井冠揚子雲言龍虎鳥龜正是如此節先生問四明龍現事璘答云頃歲鄞縣趙公萬禱雨於天井山之龍井曾有龍現張左藏良臣作記云俄有光發波間如叢炬復紅焰飛動下見龍之首甚大不違顏咫尺大復現小復現全體鱗甲爚爚有光久不沒陰氣颯然見者魄喪神動曰見王嘉叟云見龍初出水先有物如蓮花之狀而後水湧異物出兩眼光如銅盤與趙尉所見頗合璘或言某人之死人有夢見之者甚恐遂辭位而去先生曰唐令狐綯亦嘗夢見李德裕明日語人曰衛公精爽可畏頃時劉丞相莘老死於貶所後來得昭雪復官其子斯立有啓謝時宰一聯云晚歲離騷徑招魂於異域平生精爽或見夢於故人世傳以為佳陳易和叔將赴試韓魏公戒之曰離場屋久更宜子細陳曰三十年做老娘不解倒悅了孩兒既而王字押作賦韻率土之濱莫非王遂見黜魏公聞之笑曰果然倒悅了孩兒矣往年見徐端立待郎云葉石林嘗問某或謂司馬溫公范蜀公議鍾律不合又某與某爭某事蓋故為此議以表見其非朋比之為者如何徐曰此事有無不可知然為此論者亦可謂不占便宜矣石林為之笑便罷僩汪玉山童稚時喻玉泉令他對七字對云馬蹄踏破青青草玉山應口對云龍爪拏開黯黯雲先生説沈持要知衢州日都下早間事晚已得報閎祖云要知得如此急做甚先生云公説得是閎祖或言某人輕財好義先生曰以何道理之而義乎升卿因李將為郭帥閣俸曰凡是名利之地自家退以待之便自安穩才要只管向前便危險事勢定是如此如一碗飯在這裏才去爭也有爭得不被人打底也有爭得被人打底也有爭不得空被人打底賀孫或論及欲圖押綱厚賞者先生曰譬如一盤珍饌五人在坐我愛吃那四人亦都愛吃我伸手去拏那四人亦伸手去拏未必果誰得之能恁地思量便可備知來物如古者橫議權謀之士雖千萬人所欲得底他也有計術去必得淳財猶膩也近則污人豪傑之士恥言之僩人言仁不可主兵義不可主財某謂惟仁可以主兵義可以主財道夫賢者順理而安行智者知機而固守丁未耳聽至鄭叔友謂敗不可懲勝不可狃此言殊有味振王宣子説甘卞言士大夫以面折廷爭為職以此而出人亦高之宦官以承順為事忽犯顏而出誰將你當事如此之乖後漢呂強後世無不賢之詠古詩丈夫棄甲胄長揖別上官為楊元禮發也問元禮事如何曰緣一二監司相知者已去後人不應副賑濟此事已做不得若取之百姓又不可所以乞祠問當時合如何處置方善曰只得告監司理會賑濟不從則力爭又不從則投劾而去事方分曉語畢遂諷誦此詩云德明沈季文於小學則有莊敬敦篤而不從事於禮樂射御書數於大學則不由格物致知而遽欲誠意正心閎祖黎紹先好箇人可謂聽其言也厲義剛周顯祖不事外飾天資簡朴若海諸葛誠之守立過人升卿劉季高也豪爽只是也無腦頭義剛林擇之曰上四州人輕揚不似下四州人先生曰下四州人較厚潮陽士人亦厚然亦陋莆人多詐淳朴無偽者陳魏公而已義剛或傳連江鎮寇作燒千餘家時張子直通判云此處人煙極盛曰某嘗疑此地如何承載得許多人力行退而思之此所謂知小圖大力小任重之意力行前年鄭瀛上書得罪杖八十下臨安贖臨安一吏人憫之見其無錢為代出錢贖之揚王侍郎普之弟某經兵火其乳母抱之走為一將官所得乳母自思為王氏乳母而失其子其罪大矣遂潛謀歸計將此將官家兵器皆去其刃弓則斷其弦自求一好馬抱兒以逃追兵踵至匿於麥中如此者三四僅全兒達王家常見一僧説之僧今亦忘矣欲為之傳未果可學義剛録云常見一老僧云李伯時家遭寇伯時尚小被賊并妳子劫去賊將遂以妳子為妻一日上元其夫出看妳子以計遣諸婢皆往看遂將弓箭刀刃之屬盡投於井馬亦解放但自乘一馬而去少頃聞前面有人馬聲恐是來趕他乃下馬走入麥中藏其賊尚以鎗入麥中撈攬幸而小底不曾啼遂無事未幾得聞那賊説這賊婢知他那裏去渠知無事遂又走夜行晝伏數日方到尋見他家人某嘗欲記此事後來被那僧死了遂無問處竟休了陳光澤二子求字先生字萃曰仲亨云萃便亨凡物積之厚而施之也廣如水積得科子滿便流又字華曰仲蔚云君子豹變其文蔚也變謂變其態若裏面變得是虎外面便有虎之文變得是豹外面便有豹之文義剛有言士大夫家文字散失者先生齔然曰魏元履宋子飛兩家文籍散亂皆某不勇決之過當時若是聚衆與之抄劄封鎖則庶幾無今日之患道夫德粹問十年前屢失子亦曾寫書問先生先生答皆云子之有無皆命不必祈禱後又以弟為子更有甚礙理處舍弟之子年乃大於此則是叔拜侄曰以弟為子昭穆不順方伯謨曰便是弟之子小亦不可曰然可學問唐誥敕如何都是自寫曰不知如何想只是自寫了卻去計會印如蔡君謨封贈亦是自寫看來只是自有字名故如此義剛張以道向在黃巖見顏魯公的派孫因事到官其人持魯公誥敕五七道來庭下稱有蔭細看其誥敕皆魯公親書其字而其誥乃是黃紙書之此義如何先生曰魯公以能書名當時因自書之而只用印又亦不足據本朝蔡君謨封贈其祖誥敕亦自寫之蓋其以字名人亦樂令其自寫也魯公誥後為劉會之所藏義剛一日請食荔子因論興化軍陳紫自蔡端明迄今又二百來年此種猶在而甘美絶勝獨無它本天地間有不可曉處率如此所謂及其至也聖人有所不能知要之它自有箇絲脈相通但人自不知耳聖人也只知得大綱到不可知處亦無可奈何但此等瑣碎不知亦無害爾道夫先生因吃茶罷曰物之甘者吃過必酸苦者吃過卻甘茶本苦物吃過卻甘問此理如何曰也是一箇道理如始於憂勤終於逸樂理而後和蓋禮本天下之至嚴行之各得其分則至和又如家人嗃嗃悔厲吉婦子嘻嘻終吝都是此理夔孫建茶如中庸之為德江茶如伯夷叔齊又曰南軒集云草茶如草澤高人臘茶如臺閣勝士似他之説則俗了建茶卻不如適間之説兩全也道夫侍先生過水南谷中見一種蒿柔嫩香氣溫潤可愛因采一二莖把玩先生曰此即古人所謂蘭是也又云蕙亦非今之蕙乃零陵香是也炎今福州紅糟即古之所謂醴酒也用匙挑吃義剛古升十六寸二分為升容一百六十二寸為斗僩今之一升即古之三升今之一兩即古之三兩僩古錢有貨泉字貨布字是王莽錢於古尺正徑一寸雖久有損大概亦是淳先生見正甫所衣之衫只用白練圓領領用皂問此衣甚制度曰是唐衫先生不復説後遂易之過布一簆四十眼著八十絲為一升今興化人能為之云云十升布已難做至如三十升不知古人如何做也若三升布則極疏矣古人不諱白皮辨乃以白鹿皮為之但加飾焉如冠之白但用疏細為吉凶耳方或云俗語夜飯減一口活得九十九曰此出古樂府三叟詩墨翟與工輸巧爭辨云云論到下梢一著勝一著沒了期一曰吾知其所以拒子矣吾不言一曰吾知所以攻子矣吾不言燾莽何羅本姓馬乃後漢馬后之祖班固為澤而改之方子步騭不去為瓜耳瓜可無身不可無升卿陶隱居注本草不識那物後説得差背底多緣他是箇南人那時南北隔絶他不識北方物事他居建康義剛仙遊有蔡溪見説甚好裏面有一片大石有一石門入去沿溪到那石上有陳理常居太學聞此地好齎少餅徑入去石上坐飢甚則吃少許餅久後吃盡了飢不奈何欲出則當初入門已發了誓遂且忍餓遇樵者見他在坐亦異之間得些物事來吃久後報得外面道人都來遂起得箇菴自此卻好病翁嘗至其菴時陳居士方死尚在坐未曾斂見面前一石頭似箇香山子子細看又不是石恰似乳香滴成樣都通明身旁一道人云是陳先生臨死時滴出鼻涕又一道人來禮拜歎息云可惜陳先生鍊得成後卻不成僩崇觀間李定之子某有文字乞毀通鑑板建炎間坐此貶竄後放歸復官詞云下喬木而入幽谷朕姑示於寬恩以鴟梟而笑鳳凰爾無沉於述識
