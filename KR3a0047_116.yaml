body:
  text: 朱子語類卷第一百一十六朱子十三訓門人四問平時處事當未接時見得道理甚分明及做著又便錯了不知如何恁地曰這是難事但須是知得病痛處便去著力若是易為則天下有無數聖賢了以下訓義剛問打坐也是工夫否曰也有不要打坐底如果若之屬他最說打坐不是又問而今學者去打坐後坐得瞌睡時心下也大故定曰瞌睡時卻不好問氣質昏蒙作事多悔有當下便悔時有過後思量得不是方悔時或經久所為因事機觸得悔時方悔之際惘然自失此身若無所容有時恚恨至於成疾不知何由可以免此曰既知悔時第二次莫恁地便了不消得常常地放在心下那未見能見其過而內自訟底便是不悔底今若信意做去後蕩然不知悔固不得若既知悔後次改便了何必常常恁地悔淳録云既知悔便住了莫更如此做只管悔之又悔作甚世間只是這箇道理譬如晝日當空一念之間合著這道理則皎然明白更無纖毫窒礙故曰天命之謂性不只是這處有處處皆有只是尋時先從自家身上尋起所以說性者道之形體也此一句最好蓋是天下道理尋討將去那裏不可體驗只是就自家身上體驗一性之內便是道之全體千人萬人一切萬物無不是這道理不特自家有它也有不特甲有乙也有天下事都恁地書有合講處有不必講處如主一處定是如此了不用講只是便去下工夫不要放肆不要戲慢整齊嚴肅便是主一便是敬聖賢說話多方百面須是如此說但是我恁地說他箇無形無狀去何處證驗只去切己理會此等事久自會得問說漆雕開章云云先生不應又說與點章云云先生又不應久之卻云公那江西人只管要理會那漆雕開與曾點而今且莫要理會所謂道者只是君之仁臣之敬父之慈子之孝便是而今只去理會言忠信行篤敬博學而篤志切問而近思仁在其中矣須是步步理會坐如尸便須要常常如尸立如齊便須要常常如齊而今卻只管去理會那流行底不知是箇甚麼物事又不是打破一桶水隨科隨坎皆是義剛啓曰向時請問平生多悔之病蒙賜教謂第二番莫為便了也不必長長存在胸中義剛固非欲悔但作一事時千思萬量若思量不透處又與朋友相度合下做時自謂做得圓密了及事才過又便猛省著有缺缺處才如此思著則便被氣動了志便是三兩日精神不定不知此病生於何處曰便是難便是難不能得到恰好處顏子仰之彌高鑽之彌堅瞻之在前忽焉在後便是如此便是不能得見這箇物事定帖這也無著力處聖人教人但不過是博文約禮須是平時只管去講明講明得熟時後卻解漸漸不做差了又問格物工夫至為浩大如義剛氣昏也不解泛然格得欲且將書細讀就上面研究義理如何曰書上也便有面前道理在義剛又言古人為學皆是自小得人教之有方所以長大來易入於道義剛目前只是習作舉業好書皆不曾講究而今驟收其放心覺用力倍難今欲將小學等書理會從灑掃應對進退禮樂書數射御從頭再理會起不知如何曰也只是事事致謹常常持養莫教放慢了便是若是自家有箇操柄時便自不解到得十分走作了義剛啓曰半年得侍灑掃曲蒙提誨自此得免小人之歸但氣質昏蒙自覺易為流俗所遷今此之歸且欲閉門不出刻意讀書皆未知所向欲乞指示先生曰只杜門便是所向別也無所向只是就書上子細玩味考究義理便是義剛之初拜先生也具述平日之非與所以遠來之意力求陶鑄及所以為學之序先生曰人不自訟則沒奈何他今公既自知其過則講書窮理便是為學也無他陶鑄處問讀書以何者為先曰且將論語大學共看至是又請曰大學已看了先生解得分明也無甚疑論語已看九篇今欲看畢此書更看孟子如何曰好孟子也分明甚易看侍教半年仰蒙提誨自正月間看論語覺得略得入頭處先生所以教人只要逐章逐句理會不要揀擇敬遵明訓但此番歸去恐未便得再到侍下如語孟中設有大疑則無可問處今欲於此數月揀大頭段來請教不知可否曰好先生問淵平日如何做工夫看甚文字曰舊治春秋並史書曰春秋如何看曰只用劉氏說看曰公數千里來見某其志欲如何曰既拜先生只從先生之教曰春秋是學者末後事惟是理明義精方見得春秋是言天下之事今不去理會身己上事卻去理會天下之事到理會得天下事於身己上卻不曾處置得所以學者讀書先要理會自己本分上事又言劉道修向時章疏中說道學字用錯了先生因論德修向時之事不合將許多條法與壽皇看暴露了被小人知之卻做了腳手某以為大率若小人勢弱時節只用那虛聲便可恐得他去若小人勢盛時節便不可如此暴露被他先做腳手雖然德修亦自好當時朝廷大故震動訓淵亞夫將上趙子直黃文叔二書呈先生先生曰公有志於當世亦自好但若要從自家身上做將來須是捨其所已學從其所未學恪先生語亞夫云亞夫歸去且須杜門安坐數年虛心玩味他義理教專與自家心契合若恁底時病痛自去義理自明大抵靜方可看義理佐須是靜方可為學謂亞夫曰公既歸可且杜門潛心數年方子蓋卿録云亞夫稟辭先生勉之曰歸後且杜門潛心二三年仍須虛心以讀書甲寅八月三日蓋卿以書見先生於長沙郡齊請隨諸生遇晚聽講是晚請教者七十餘人或問向蒙見教讀書須要涵泳須要浹洽因看孟子千言萬語只是論心七篇之書如此看是涵泳工夫否曰某為見此中人讀書大段鹵莽所以說讀書須當涵泳只要子細尋繹令胸中有所得爾如吾友所說又襯貼一件意思硬要差排看書豈是如此又一士友曰先生涵泳之說乃杜元凱優而柔之之意曰固是如此亦不用如此解說所謂涵泳者只是子細讀書之異名也大率與人說話便是難某只說一箇涵泳一人硬來差排一人硬來解說此是隨語生解支離延蔓間說間講少間展轉只是添得多說得遠如此講書如此聽人說話全不是自做工夫全無巴鼻可知是使人說學是空談此中人所問大率如此好理會處不理會不當理會處卻支離去說說得全無意思以下訓蓋卿蓋卿因言致知格物工夫既到然後應事接物始得其宜若工夫未到雖於應事接物之際未盡合宜亦只得隨時為應事接物之計也曰固是如此若學力未到時不成不去應事接物且如某在長沙時處之固有一箇道理今在路途道理又別人若學力未到其於應事接物之間且隨吾學力所至而處之善乎明道之言曰學者全體此心學雖未盡若事物之來不可不應但隨分限應之雖不中不遠矣蓋卿稟辭且乞贈言先生曰逐日所相與言者宜著工夫不用重說曰尚得為遠謁函丈之計曰人事不可預期歸日宜一面著實做工夫初見先生云某自到此與朋友亦無可說古人學問只是為己而已聖賢教人具有倫理學問是人合理會底事學者須是切己方有所得今人知為學者聽人說一席好話亦解開悟到切己工夫卻全不曾做所以悠悠歲月無可理會若使切己下工聖賢言語雖散在諸書自有箇通貫道理須實有見處自然休歇不得如人趁養家一般一日不去趁便受飢餓今人事無小大皆潦草過了只如讀書一事頭邊看得兩段便揭過後面或看得一二段或看得三五行殊不曾子細理會如何會有益或問人講學不明用處全差了曰不待酬酢應變時若學不切己自家一箇渾身自無處著雖三魂七魄亦不知下落何待用時方差坐間有言及傅子癪者曰人雖見得他偏見得他不是此邊卻未有肯著力做自家工夫如何不為他所謾近世人大被人謾可笑見人胡亂一言一動便被降下了只緣自無工夫所以如此便又有不讀書之說可以誘人宜乎陷溺者多先生又云彼一般說話雖是說禪卻能鞭逼得人緊後生於此邊既無所得一溺其說便把做件事做如何可回終竟他底不是愈傳愈壞了人或又云近世學者多躐等亦曰更有不及等人以下訓謙問謙曾與戴肖望相處如何曰亦只商量得舉子程文曰此是一厄人過了此一厄當理會學問今人過了此一厄又去理會應用之文作古文作詩篇亦是一厄須是打得破方得問為學工夫以何為先曰亦不過如前所說專在人自立志既知這道理辦得堅固心一味向前何患不進只患立志不堅只恁聽人言語看人文字終是無得於己或云須是做工夫方覺言語有益曰別人言語亦當子細窮究孟子說我知言我善養吾浩然之氣知言便是窮究別人言語他自邪說何與我事被他謾過理會不得便有陷溺所謂生於其心害於其政作於其政害於其事蓋謂此也德之看文字尖新如見得一路光明便射從此一路去然為學讀書寧詳毋略寧近毋遠寧下毋高寧拙毋巧若一向罩過不加子細便看書也不分曉然人資質亦不同有愛趨高者亦有好務詳者雖皆有得然詳者終是看得溥博浹洽又言大學等書向來人只說某說得詳如何不略說使人自致思此事大不然人之為學只是爭箇肯不肯耳他若無得不肯向這邊略亦不解致思他若肯向此一邊自然有味愈詳愈有意味生知之聖不待學而自至若非生知須要學問學問之先止是致知所知果致自然透徹不患不進謙請云知得須要踐履曰不真知得如何踐履得若是真知自住不得不可似他們只把來說過了又問今之言學者滿天下家誦中庸大學語孟之書人習中庸大學語孟之說究觀其實不惟應事接物與所學不相似而其為人舉足動步全不類學者所為或做作些小氣象或專治一等議論專一欺人此豈其學使然歟抑踐履不至歟抑所學之非歟曰此何足以言學某與人說學問止是說得大概要人自去下工譬如寶藏一般其中至寶之物何所不有某止能指與人說此處有寶若不下工夫自去討終是不濟事今人為學多是為名不肯切己某甚不滿於長沙士友胡季隨特地來一見卻只要相閃不知何故南軒許久與諸公商量到如今只如此是不切己之過廖兄請曰某遠來求教獲聽先生雅言至論退而涵泳發省甚多旅中只看得先生大學章句或問一過所以誨人者至矣為學入德之方無以加此敢不加心明日欲別誨席更乞一言之賜曰他無說只是自下工夫便有益此事元不用許多安排等待所謂造次顛沛必於是也人只怕有悠悠之患廖復對曰學者之病多在悠悠極荷提策曰見得分曉便當下工夫時難得而易失不可只恁地過了蓋卿先生問前此得書甚要講學今有可說否自修云適值先生去國匆匆不及款承教誨曰自家莫匆匆便了訓自修問平日工夫泳對理會時文先生曰時文中亦自有工夫請讀何書曰看大學以下訓泳說大學首章不當意先生說公讀書如騎馬不會鞭策得馬行撐船不會使得船動讀大學必次論孟及中庸兼看近思録先生曰書讀到無可看處恰好看先生與泳說看文字罷常且靜坐問而今看道理不出只是心不虛靜否曰也是不曾去看會看底就看處自虛靜這箇互相發以下訓夔孫先生謂夔孫云公既久在此可將一件文字與衆人共理會立箇程限使敏者不得而先鈍者不得而後且如這一件事或是甲思量不得乙或思量得這便是朋友切磋之義夔孫請所看底文字曰且將西銘看及看畢夔孫依先生解說過先生曰而今解得分曉了便易看當初直是難說夔孫請再看底文字索近思録披數板云也揀不得便漏了他底也不得遂云無極而太極而今人都想像有箇光明閃爍底物事在那裏那不知本是說無這物事只是有箇理解如此動靜而已及至一動一靜便是陰陽一動一靜循環無端太極動而生陽亦只是從動處說起其實動之前又有靜靜之前又有動推而上之其始無端推而下之以至未來之際其卒無終自有天地便只是這物事在這裏流轉一日便有一日之運一月便有一月之運一歲便有一歲之運都只是這箇物事滾滾將去如水車相似一箇起一箇倒一箇上一箇下其動也便是中是仁其靜也便是正是義不動則靜不靜則動如人不語則默不默則語中間更無空處又如善惡不是善便是惡不是惡便是善聖人定之以中正仁義便是主張這箇物事蓋聖人之動便是元亨其靜便是利貞都不是間底動靜所以繼天地之志述天地之事便是如此如知得恁地便生知得恁地便死知得恁地便消知得恁地便長此皆是繼天地之志隨他恁地進退消息盈虛與時偕行小而言之飢食渴飲出作入息大而言之君臣便有義父子便有仁此都是述天地之事只是這箇道理所以君子修之便吉小人悖之便凶這物事機關一下撥轉便攔他不住如水車相似才踏發這機更住不得所以聖賢兢兢業業一日二日萬幾戰戰兢兢至死而後知免大化恁地流行只得隨他恁地故曰存心養性所以事天也夭壽不二修身以俟之所以立命也這與西銘都相貫穿只是一箇物事如云五行一陰陽也陰陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉便只是天地之塞吾其體天地之帥吾其性只是說得有詳略緩急耳而今萬物到秋冬時各自斂藏便恁枯瘁忽然一下春來各自發生條暢這只是一氣一箇消一箇息那箇滿山青黃碧緑無非天地之化流行發見而今自家吃他著他受用他起居食息都在這裏離他不得所以仁者見之便謂之仁智者見之便謂之智無非是此箇物事繼之者善便似日日裝添模樣成之者性便恰似造化都無可做了與造化都不相關相似到得成之者性就那上流行出來又依前是繼之者善譬如穀既有箇穀子裏面便有米米又會生出來如果子皮裏便有核核裏便有仁那仁又會發出來人物莫不如此如人方其在胞胎中受那父母之氣則是繼之者善及其生出來便自成一箇性了便自會長去這後又是繼之者善只管如此仁者謂之仁便是見那發生處智者謂之智便是見那收斂處百姓日用而不知便是不知所謂發生亦不知所謂收斂醉生夢死而已周先生太極通書便只是滾這幾句易之為義也只是如此只是陰陽交錯千變萬化皆從此出故曰易有太極這一箇便生兩箇兩箇便生四箇四箇便生八箇八箇便生十六箇十六箇便生三十二箇三十二箇便生六十四箇故八卦定吉凶吉凶生大業聖人所以說出時只是使人不迷於利害之途耳少頃又舉誠幾德一章說云誠無為只是自然有實理恁地不是人做底都不曾犯手勢幾善惡便是心之所發處有箇善有箇惡了德便只是善底為聖為賢只是這材料做又舉第三大本達道章說云未發時便是那靜已發時便是那動方其靜時便是有箇體在裏了如這桌子未用時已有這桌子在了及其已發便有許多用一起一倒無有窮盡若靜而不失其體便是天下之大本立焉動而不失其用便是天下之達道行焉若其靜而或失其體則天下之大本便昏了動而或失其用則天下之達道便乖了說來說去只是這一箇道理夔孫問云此箇道理孔子只說一陰一陽之謂道繼之者善成之者性都不會分別出性是如何孟子乃分別出說是有此四者然又只是以理言到周先生說方始盡方始見得人必有是四者這四者亦有所附著先生曰孔子說得細膩說不曾了孟子說得粗疏略只是說成之者性不曾從原頭推說來然其界分自孟子方說得分曉陳仲蔚因問龜山說知其理一所以為仁知其分殊所以為義仁便是體義便是用否曰仁只是流出來底義是合當做底如水流動處是仁流為江河匯為池沼便是義如惻隱之心便是仁愛父母愛兄弟愛鄉黨愛朋友故舊有許多等差便是義且如敬只是一箇敬到敬君敬長敬賢便有許多般樣禮也是如此如天子七廟諸侯五廟這箇便是禮其或七或五之不同便是義禮是理之節文義便是事之所宜處呂與叔說天命之謂性云自斬而緦喪服異等而九族之情無所憾自王公至皂隸儀章異制而上下之分莫敢爭自是天性合如此且如一堂有十房父子到得父各慈其子子各孝其父而人不嫌者自是合如此也其慈其孝這便是仁各親其親各子其子這便是義這箇物事分不得流出來便是仁仁打一動義禮智便隨在這裏了不是要仁使時義卻留在後面少間放出來其實只是一箇道理論著界分便有許多分別且如心性情虛明應物知得這事合恁地那事合恁地這便是心當這事感則這理應當那事感則那理應這便是性出頭露面來底便是情其實只是一箇物事而今這裏略略動這三箇便都在子細看來亦好則劇又舉邵子性者道之形體處曰道雖無所不在然如何地去尋討他只是回頭來看都在自家性分之內自家有這仁義禮智便知得他也有仁義禮智千人萬人一切萬物無不是這道理推而廣之亦無不是這道理他說道之形體便是說得好林子武初到時先生問義剛云在何處安下曰未曾移入堂長房曰它便是有思量底蘇子容押花字常要在下面後有一人官在其上卻挨得他花字向上面去他遂終身悔其初無思量不合押花字在下及包顯道等來遂命子武作堂長後竟不改義剛問承先生賜教讀書之法如今看來聖賢言行本無相違其間所以有可疑者只是不逐處研究得通透所以見得抵牾若真箇逐處逐節逐段見得精切少間卻自到貫通地位曰固是如今若苟簡看過只一處便自未曾理會得了卻要別生疑義徒勞無益訓木之慶元丁巳三月見先生於考亭先生曰甚荷遠來然而不是時節公初從何人講學曰少時從劉衡州問學曰見衡州如何曰衡州開明大體使人知所向慕曰如何做工夫曰卻是無下手處曰向來亦見廬陵諸公有問目之類大綱竟緩不是斬釘截鐵真箇可疑可問彼此只做一場話說休了若如此悠悠恐虛過歲月某已前與朋友往來亦是如此後來欽夫說道凡肯向此者吾二人只如此放過了不特使人泛然來行一遭便道我曾從某人處講論一向胡說反為人取笑亦是壞了多少好氣質底若只悠悠地去可惜今後須是截下看晚年要成就得一二人不妨是吾輩事業自後相過者這裏直是不放過也祖道又曰頃年亦嘗見陸象山先生笑曰這卻好商量公且道象山如何曰象山之學祖道曉不得更是不敢學曰如何不敢學曰象山與祖道言目能視耳能聽鼻能知香臭口能知味心能思手足能運動如何更要甚存誠持敬硬要將一物去治一物須要如此做甚詠歸舞雩自是吾子家風祖道曰是則是有此理恐非初學者所到地位象山曰吾子有之而必欲外鑠以為本可惜也祖道曰此恐只是先生見處今使祖道便要如此恐成猖狂妄行蹈乎大方者矣象山曰纏繞舊習如落陷阱卒除不得先生曰陸子靜所學分明是禪又曰江西人大抵秀而能文若得人點化是多少明快蓋有不得不任其責者然今黨事方起能無所畏乎忽然被他來理會礙公進取時如何曰此是自家身己上進取何足議曰可便遷入精舍以下訓祖道先生謂祖道曰讀書且去鑽研求索及反覆認得時且蒙頭去做久久須有功效吾友看文字忒快了卻不沉潛見得他子細意思莫要一領他大意便去摶摸此最害事且熟讀就他注解為他說一番說得行時卻又為他精思久久自落窠臼略知瞥見便立見解終不是實恐他時無把捉虛費心力問進德之方曰大率要修身窮理若修身上未有工夫亦無窮理處問修身如何曰且先收放心如心不在無下手處要去體察你平昔用心是為己為人若讀書計較利祿便是為人資稟純厚者須要就上面做工夫問如何曰人生與天地一般無些缺缺處且去子細看秉彝常性是如何將孟子言性善處看是如何善須精細看來一日拜別先生曰歸去各做工夫他時相見卻好商量也某所解語孟和訓詁注在下面要人精粗本末字字為咀嚼過此書某自三十歲便下工夫到而今改猶未了不是草草看者且歸子細曾兄問讀大學已知綱目次第了然大要用工夫恐在敬之一字前見伊川說敬以直內義以方外處先生曰能敬以直內矣亦須義以方外能知得是非始格得物不以義方外則是非好惡不能分別物亦不可格又問恐敬立則義在其中伊川所謂弸諸中彪諸外是也曰雖敬立而義在也須認得實方見得今有人雖胸中知得分明說出來亦是見得千了百當及應物之時顛倒錯謬全是私意亦不知聖人所謂敬義處全是天理安得有私意今釋老能立箇門戶恁地亦是它從旁窺得近似他所謂敬時亦卻是能敬更有箇笠影之喻某嘗喜那鈍底人他若是做得工夫透徹時極好卻煩惱那敏底只是略綽看過不曾深去思量當下說也理會得只是無滋味工夫不耐久如莊仲便是如此某嘗煩惱這樣底少間不濟事敏底人又卻要做那鈍底工夫方得以下訓僩問尋常遇事時也知此為天理彼為人欲及到做時乃為人欲引去事已卻悔如何曰此便是無克己工夫這樣處極要與他掃除打疊方得如一條大路又有一條小路明知合行大路然小路面前有箇物引著自家不知不覺行從小路去及至前面荊棘蕪穢又卻生悔此便是天理人欲交戰之機須是遇事之時便與克下不得苟且放過此須明理以先之勇猛以行之若是上智聖人底資質不用著力自然存天理而行不流於人欲若賢人資質次於聖人者到遇事時固不會錯只是先也用分別教是而後行之若是中人之資質須大段著力無一時一刻不照管克治始得曾子曰仁以為己任不亦重乎死而後已不亦遠乎又曰戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子直是恁地用功方得問每日做工夫處曰每日做工夫只是常常喚醒如程子所謂主一之謂敬謝氏所謂常惺惺法是也然這裏便有致知底工夫程子曰涵養須用敬進學則在致知須居敬以窮理若不能敬則講學又無安頓處問色容莊持久甚難曰非用功於外也心肅而容莊問若非聖人說下許多道理則此身四支耳目更無安頓處曰然古人固嘗言之非禮則耳目手足無所措道理極是細膩公們心都粗大入那細底不得公而今只是說他人短長都不自反己看如公適間說學者來此不講誦蚤來莫去是理會甚事自初來至去是有何所得聽得某說話有何警發每日靠甚麼做本從那裏做去公卻會說得箇頭勢如此大及至末梢又卻只是檢點他人某事某事元未有緊要那人亦如何服公說且去理會自己身心煞有事在今公掀然有飛揚之心以為治國平天下如指諸掌不知自家一箇身心都安頓未有下落如何說功名事業怎生治人古時英雄豪傑不如此張子房不問著他不說諸葛孔明甚麼樣端嚴公浙中一般學是學為英雄之學務為跅弛豪縱全不點檢身心某這裏須是事事從心上理會起舉止動步事事有箇道理一毫不然便是缺闕了他道理固是天下事無不當理會只是有先後緩急之序須先立其本方以次推及其餘今公們學都倒了緩其所急先其所後少間使得這身心飛揚悠遠全無收拾歲而今人不知學底他心雖放然猶放得近今公雖曰知為學然卻放得遠少間會失心去不可不覺讀書之法既先識得他外面一箇皮殼了又須識得他裏面骨髓方好如公看詩只是識得箇模像如此他裏面好處全不見得自家此心都不曾與他相黏所以眊燥無汁漿如人開溝而無水如此讀得何益未論讀古人書且如一近世名公詩也須知得他好處在那裏如何知得他好處亦須吟哦諷詠而後得之今人都不曾識好處也不識不好處也不識不好處以為好者有之矣好者亦未必以為好也其有知得某人詩好某人詩不好者亦只是見已前人如此說便承虛接響說取去如矮子看戲相似見人道好他也道好及至問著他那裏是好處元不曾識舉世皆然只是不曾讀熟讀後自然見得人而不為周南召南其猶正牆面而立也與今公讀二南了還能不正牆面而立否意思都不曾相黏濟得甚事前日所舉韓退之蘇明允二公論作文處他都是下這般工夫實見得那好處方做出這般文章他都是將三代以前文字熟讀後故能如此如向者呂子約書來說近來看詩甚有味録得一冊來盡是寫他讀詩有得處及觀之盡是說詩序如關雎只是說一箇后妃之德也葛覃只是說得箇后妃之本與化天下以婦道也自關關雎鳩葛之覃兮已下更不說著如此讀詩是讀箇其麼呂伯恭大事紀亦是如此盡是編排詩序書序在上面他們讀書盡是如此草草以言事則不實以立辭則害意問鳶飛魚躍南軒云鳶飛魚躍天地之中庸也曰只看公如此說便是不曾理會得了莫依傍他底說只問取自家是真實見得不曾自家信是信得箇甚麼這箇道理精粗小大上下四方一齊要著到四邊合圍起理會莫令有些子走透少間方從一邊理會得些小有箇見處有箇入頭處若只靠一邊去理會少間便偏枯了尋捉那物事不得若是如此悠悠只從一路去攻擊他而又不曾著力何益於事李敬子曰覺得已前都是如此悠悠過了曰既知得悠悠何不便莫要悠悠便是覺意思都不曾痛切每日看文字只是輕輕地拂過寸進尺退都不曾依傍築磕著那物事來此間說時旋扭掜湊合說得些小才過了又便忘了或他日被人問起又遂旋扭掜說得些小過了又忘記了如此濟得甚事早間說如負痛相似因言持敬如書所云若有疾如此方謂之持敬如人負一箇大痛念念在此日夜求所以去之之術理會這一件物須是徹頭徹尾全文記得始是如此末是如此中間是如此如此謂之是如此謂之非須是理會教透徹無些子疑滯方得若只是如此輕輕拂過是濟甚事如兩軍冢殺兩邊擂起鼓了只得拌命進前有死無二方有箇生路更不容放慢若才攻慢便被他殺了友仁初參拜畢出疑問一冊皆大學語孟中庸平日所疑者先生略顧之謂友仁曰公今須是逐一些子細理會始得不可如此鹵莽公之意自道此是不曉者故問然其他不問者恐亦未必是豈能便與聖賢之意合須是理會得底也來整理過方可以下訓友仁問邦畿千里惟民所止曰此是大率言物各有所止之處且如公其心雖止得是其跡則未在心跡須令為一方可豈有學聖人之道服非法之服享非禮之祀者程先生謂文中子言心跡之判便是亂說者此也友仁曰舍此則無資身之策曰君子謀道不謀食豈有為人而憂此者先生曰公向道甚切也曾學禪來曰非惟學禪如老莊及釋氏教典亦曾涉獵自說法華經至要處乃在是法非思量分別之所能解一句先生曰我這裏正要思量分別能思量分別方有豁然貫通之理如公之學也不易因以手指書院曰如此屋相似只中間潔淨四邊也未在未能博學便要約禮窮理處不曾用工守約處豈免有差若差之毫忽便有不可勝言之弊又顧同舍曰德元卻於此理見得倣佛惜乎不曾多讀得書卻謂友仁曰更須痛下工夫讀書始得公今所看大學或問格物致知傳程子所說許多說話都一一記得方有可思索玩味張問先生論語或問甚好何故不肯刊行曰便是不必如此文字儘多學者愈不將做事了只看得集注儘得公還盡記得集注說話否非唯集注恐正文亦記不全此皆是不曾仔細用工夫且如邵康節始學於百原堅苦刻厲冬不爐夏不扇夜不就席者有年公們曾如此否論語且莫說別處只如說仁處這裏是如此說那裏是如此說還會合得否友仁曰先生有一處解仁字甚曉然言仁者人心之全德必欲以身體而力行之可謂重矣一息尚存此志不容少懈可謂遠矣先生不應次日卻問公昨夜所舉解仁說在何處曰在曾子言仁以為己任章先生曰德元看文字卻能記其緊要處有萬千人看文字者卻不能於緊要處理會只於瑣細處用工前日他問中庸或問不一其內無以制其外不齊其外無以養其中靜而不存無以立其本動而不察無以勝其私此皆是切要處學者若能於切要處做工夫又於細微處不遺闕了久之自然有得拜辭先生曰公識性明精力短每日文字不可多看又記性鈍但用工不輟自有長進矣因誨郭兄云讀書者當將此身葬在此書中行住坐臥念念在此誓以必曉徹為期看外面有甚事我也不管只恁一心在書上方謂之善讀書若但欲來人面前說得去不求自熟如此濟得甚事須是著起精神字字與他看過不惟念得正文注字要自家暗地以俗語解得方是如今自家精神都不曾與書相入念本文注字猶記不得如何曉得卓僩同讀書須立下硬寨定要通得這一書方看第二書若此書既曉未得我寧死也不看那箇如此立志方成工夫郭德元言記書不得曰公不可欲速且讀一小段若今日讀不得明日又讀明日讀不得後日又讀須被自家讀得若只記得字義訓釋或其中有一兩字漏落便是那腔子不曾填得滿如一箇物事缺了尖角處相似少間自家做出文字便也有所缺缺不成文理嘗見蕃人及武臣文字常不成文理便是如此他心中也知得要如此說只是字義有所缺缺下得不是這箇便是不得於言勿求於心之患是他心有所蔽故如此司馬遷史記用字也有下得不是處賈誼亦然如治安策說教太子處云太子少長知妃色則入于學這下面承接便用解說此義忽然掉了卻說上學去云學者所學之官也又說帝入東學上親而貴仁一段了卻方說上太子事云及太子既冠成人免於保傅之嚴云云都不成文義更無段落他只是乘才快胡亂寫去這般文字也不可學董仲舒文字卻平正只是又困董仲舒匡衡劉向諸人文字皆善弱無氣焰司馬遷賈生文字雄豪可愛只是逞快下字時有不穩處段落不分明匡衡文字卻細密他看得經書極子細能向裏做工夫只是做人不好無氣節仲舒讀書不如衡子細疏略甚多然其人純正開闊衡不及也又曰荀子云誦數以貫之思索以通之誦數即今人讀書記遍數也古人讀書亦如此只是荀卿做得那文字不帖律處也多僩郭德元告行先生曰人若於日間間言語省得一兩句間人客省見得一兩人也濟事若渾身都在鬧場中如何讀得書人若逐日無事有見成飯喫用半日靜坐半日讀書如此一二年何患不進僩
