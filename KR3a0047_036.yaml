body:
  text: 朱子語類卷第三十六論語十八子罕篇上子罕言利章行夫問子罕言利與命與仁曰罕言者不是不言又不可多言特罕言之耳罕言利者蓋凡做事只循這道理做去利自在其中矣如利涉大川利用行師聖人豈不言利但所以罕言者正恐人求之則害義矣罕言命者凡吉凶禍福皆是命若儘言命恐人皆委之於命而人事廢矣所以罕言罕言仁者恐人輕易看了不知切己上做工夫然聖人若不言則人又理會不得如何是利如何是命如何是仁故不可不言但雖不言利而所言者無非利雖不言命而所言者無非命雖不言仁而所言者無非仁恪問子罕言利與命與仁曰這利字是箇監平聲界鏖糟的物事若說全不要利又不成特地去利而就害若纔說著利少間便使人生計較又不成模樣所以孔子於易只說利者義之和又曰利物足以和義只說到這裏住又曰只認義和處便是利不去利上求利了孟子只說箇仁義未有仁而遺其親未有義而後其君只說到箇義字時早是掉了那利字不說了緣他是箇裏外牽連底物事纔牽著這一邊便動那一邊所以這字難說命字亦是如此也是箇監界物事孔子亦非不說如云不知命之類只是都不說著便又使人都不知箇限量若只說著時便又使人百事都放倒了不去做只管說仁之弊於近世胡氏父子見之踢著腳指頭便是仁少間都使人不去窮其理是如何只是口裏說箇仁字便有此等病出來僩子罕言利與命與仁非不言罕言之爾利誰不要才專說便一向向利上去命不可專恃若專恃命則一向胡做去仁學者所求非不說但不常常把來口裏說泳問子罕言利曰利最難言利不是不好但聖人方要言恐人一向去趨利方不言不應是教人去就害故但罕言之耳蓋利者義之和義之和處便利老蘇嘗以為義剛而不和惟有利在其中故和此不成議論蓋義之和即是利卻不是因義之不和而遂用些小利以和之後來東坡解易亦用此說更不成議論也時舉問子罕言利孔子自不曾說及利豈但罕言而已曰大易一書所言多矣利只是這箇利若只管說與人未必曉得以義為利之意卻一向只管營營貪得計較孟子曰未有仁而遺其親未有義而後其君這箇是說利但人不可先計其利惟知行吾仁非為不遺其親而行仁惟知行吾義不為不後其君而行義賀孫文振問子罕言利與命與仁曰命只是一箇命有以理言者有以氣言者天之所以賦與人者是理也人之所以壽夭窮通者是氣也理精微而難言氣數又不可盡委之而至於廢人事故聖人罕言之也仁之理至大數言之不惟使人躐等亦使人有玩之之心蓋舉口便說仁人便自不把當事了時舉命有二天命之命固難說只貴賤得喪委之於命亦不可仁在學者力行利亦不是不好底物事才專說利便廢義泳問子罕言仁論語何以說仁亦多曰聖人也不容易說與人只說與幾箇向上底淳問子所罕言之命恐只是指夫人之窮通者言之今范陽尹氏皆以盡性知性為言不求之過否曰命只是窮通之命必大集義問或曰罕言利是何等利楊氏曰一般云云竊謂夫子罕言者乃放於利而行之利若利用出入乃義之所安處卻不可以為一般曰利用出入之利亦不可去尋討尋討著便是放於利之利如言利物足以和義只去利物不言自利又曰只元亨利貞之利亦不可計較計較著即害義為義之人只知有義而已不知利之為利必大或問龜山都一般之說似可疑曰易所言利字謂當做底若放於利而行之利夫子誠罕言二利字豈可做一般正淳問尹氏子罕一章曰尹氏命字之說誤此只是不知命無以為君子之命故曰計利則害義言命則廢事也必大麻冕禮也章麻冕緇布冠也以三十升布為之升八十縷則其經二千四百縷矣八十縷四十抄也泳純儉絲也不如用絲之省約泳子絕四章絕四是徹上徹下這意字正是計較底私意僩問意如何毋得曰凡事順理則意自正毋意者主理而言不順理則只是自家私意可學必在事先固在事後固只是滯不化德明必在事先固在事後如做一件事不是了只管固執道我做得是植意私意之發必在事先固在事後我私意成就四者相因如循環閎祖徐問意必固我曰意是要如此聖人只看理當為便為不當為便不為不曾道我要做我不要做只容一箇我便是意了曰必固之私輕意我之私重否曰意必固我只一套去意是初創如此有私意便到那必處必便到固滯不通處固便到有我之私處意是我之發端我是意之成就曰我是有人己之私否曰人自是人己自是己不必把人對說我只是任己私去做便於我者則做不便於我者則不做只管就己上計較利害與人何相關人多要人我合一人我如何合得呂銘曰立己與物私為町畦他們都說人己合一克己只是克去己私如何便說到人己為一處物我自有一等差只是仁者做得在這裏了要得人也如此便推去及人所以親親而仁民仁民而愛物人我只是理一分自不同淳寓同余國秀問毋意必固我曰意是發意要如此必是先事而期必固是事過而執滯到我但知有我不知有人必之時淺固之時長譬如士人赴試須要必得到揭榜後便已必不得了但得則喜喜不能得化不得則慍慍亦不能得化以此知固時久也意是始我是終必固在中間亦是一節重似一節也又云言必信行必果言自合著信行自合著果何待安排才有心去必他便是不活便不能久矣又云意是絲毫我是成一山嶽也時意必固我亦自有先後凡起意作一事便用必期之望所期之事或未至或已過又執滯而留於心故有有我之患意是為惡先鋒我是為惡成就正如四德貞是好底成就處我是惡底成就處人傑意者有我之端我則意之效先立是意要如此而為之然後有必有固而一向要每事皆己出也聖人作事初無私意或為或不為不在己意而惟理之是從又何固必有我哉力行問意私意也我私己也看得來私己是箇病根有我則有意曰意是初發底意思我則結撮成箇物事矣有我則又起意展轉不已此四事一似那元亨利貞但元亨利貞是好事此是不好事廣吳仁父問意必固我曰須知四者之相生凡人做事必先起意不問理之是非必期欲事成而已事既成是非得失已定又復執滯不化是之謂固三者只成就得一箇我及至我之根源愈大少間三者又從這裏生出我生意意又生必必又生固又歸宿於我正如元亨利貞元了亨亨了又利利了又貞循環不已僩吳伯英問意必固我曰四者始於我而終於我人惟有我故任私意既任私意百病俱生做事未至而有期必之心事既有過則有固滯之患凡若此者又只是成就一箇我耳壯祖絕四先生曰此四者亦是相因底始於有私意有私意定是有期必既期必又生固滯卻結裏做箇有我出來炎無意必固我而凝然中立者中也端蒙必在事先固在事後有意必固三者乃成一箇我如道是我恁地做蓋固滯而不化便成一箇我橫渠曰四者有一焉則與天地不相似植集注問橫渠謂四者有一焉則與天地不相似略有可疑曰人之為事亦有其初未必出於私意而後來不能化去者若曰絕私意則四者皆無則曰子絕一便得何用更言絕四以此知四者又各是一病也時舉問意必固我有無次第曰意是私意始萌既起此意必是期要必行固是既行之後滯而不化我是緣此後便只知有我此四者似有終始次序必者迎之於前固者滯之於後此四者正與元亨利貞四者相類元者善之長貞是箇善底成就處意是造作始萌我是箇惡底成就處又問敬則無己可克若學之始則須從絕四去如何曰敬是成己之敬可知無己可克此四者須是始學亦須便要絕去之又問復於喜怒哀樂未發之前曰此語尹子已辨之疑記錄有差處又問意必固我既亡之後學者所宜盡心如何曰所謂學者所宜盡心於此事而學之非謂意必固我既亡之後始盡心耳又問橫渠云四者既亡則以直養而無害曰此直字說得重了觀孟子所說處說得觕直只是自反而縮後人求之太深說得忒夾細了集義問君子之學在於意必固我既亡之後而復於喜怒哀樂未發之前如何曰不然尹和靖一段好意必固我是要得無未發之前眾人俱有卻是要發而中節與此不相類又問若自學者而言欲絕意必固我到聖人地位無此四者則復於未發之前復於未發之前蓋全其天理耳曰固是如此但發時豈不要全因命敬之取和靖語錄來檢看又云他意亦好卻說不好可學君子之學在意必固我既亡之後而復於喜怒哀樂未發之前何也曰意必固我既亡之後盡心於學所言是也喜怒哀樂自有發時有未發時各隨處做工夫如何強復之於未發尹氏語錄中辨此甚詳必大求之於喜怒哀樂未發之前而體之於意必固我既亡之後如此說著便害義理此二句不可相對說喜怒哀樂未發之前固無可求及其既發亦有中節不中節之異發若中節者有何不可至如意必固我則斷不可有二者焉得而對語哉橫渠謂意必固我自始學至成德竭兩端之教者謂夫子教人絕此四者故皆以毋字為禁止之辭或謂意必固我既亡之後必有事焉者曰意必固我既亡便是天理流行鳶飛魚躍何必更任私意也謨問意必固我既亡之後必有事焉所謂有事者如何曰橫渠亦有此說若既無此天理流出亦須省著可學問意必固我伊川以發而當者理也發而不當者私意也此語是否曰不是如此所謂毋意者是不任己意只看道理如何見得道理是合當如此做便順理做將去自家更無些子私心所以謂之毋意若才有些安排布置底心便是任私意若元不見得道理只是任自家意思做將去便是私意縱使發而偶然當理也只是私意未說到當理在伊川之語想是被門人錯記了不可知僩張子曰意有思也未安意卻是箇有為底意思為此一事故起此一意也必大我有方也方所也猶言有限隔也端蒙守約問橫渠說絕四之外心可存處必有事焉聖不可知也曰這句難理會舊見橫渠理窟見他裏面說有這樣大意說無是四者了便當自有箇所嚮所謂聖不可知只是道這意思難說橫渠儘會做文章如西銘及應用之文如百碗燈詩甚敏到說話卻如此難曉怕是關西人語言自是如此賀孫問張子曰云云或問謂此條語意簡奧若不可曉竊以張子下數條語考之似以必有事焉為理義之精微處其意大抵謂善不可以有心為雖夷清惠和猶為偏倚未得謂之精義故謂絕四之外下頭有一不犯手勢自然底道理方真是義孟子之言蓋謂下頭必有此道理乃聖而不可知處此說於孟子本意殊不合然未審張子之說是如此否曰橫渠此說又拽退孟子數重自說得深古聖賢無此等議論若如此說將使讀者終身理會不得其流必有弊必大橫渠之意以絕為禁止之辭是言聖人將這四者使學者禁絕而勿為毋字亦是禁止之意故曰自始學至成德竭兩端之教也必是事之未來處固是事之已過處道夫伯豐問張子曰毋意必固我然後能範圍天地之化曰固是如此四者未除如何能範圍天地但如此說話終是稍寬耳子畏於匡章文不在茲乎言在茲便是天未喪斯文淳後死者夫子自謂也死字對沒字泳問天之將喪斯文未喪斯文文即是道否曰既是道安得有喪未喪文亦先王之禮文聖人於此極是留意蓋古之聖人既竭心思焉將行之萬世而無弊者也故常恐其喪失而不可考大雅後死者是對上文文王言之如曰未亡人之類此孔子自謂也與天生德於予意思一般斯文既在孔子孔子便做著天在孔子此語亦是被匡人圍得緊後方說出來又問孔子萬一不能免匡人之難時如何曰孔子自見得了子畏於匡一節看來夫子平日不曾如此說往往多謙抑與此不同先生笑云此卻是真箇事急了不覺說將出來炎敬之問明道舍我其誰是有所受命之辭匡人其如予何是聖人自做著天裏孟子是論世之盛衰己之去就故聽之於天孔子言道之盛衰自應以己任之未審此說如何曰不消如此看明道這說話固是說未盡如孔子云天之將喪斯文天之未喪斯文看此語也只看天如何只是要緊不在此處要緊是看聖賢所以出處大節賀孫問程子云夫子免於匡人之圍亦苟脫也此言何謂曰謂當時或為匡人所殺亦無十成某云夫子自言匡人其如予何程子謂知其必不能違天害己何故卻復有此說曰理固如是事則不可知必大問呂氏曰文者前後聖之所修道則出乎天而已故孔子以道之廢興付之命以文之得喪任諸己曰道只是有廢興卻喪不得文如三代禮樂制度若喪便掃地太宰問於子貢章先生曰太宰云夫子聖者歟何其多能也是以多能為聖也子貢對以夫子固天縱之將聖又多能也是以多能為聖人餘事也子曰吾少也賤故多能鄙事君子多乎哉不多也是以聖為不在於多能也三者之說不同諸君且道誰說得聖人地位著諸生多主夫子之言先生曰太宰以多能為聖固不是若要形容聖人地位則子貢之言為盡蓋聖主於德固不在多能然聖人未有不多能者夫子以多能不可以律人故言君子不多尚德而不尚藝之意其實聖人未嘗不多能也柄問太宰初以多能為夫子之聖子貢所答方正說得聖人體段夫子聞之數語卻是謙辭及有多能非所以率人之意曰固是子貢說得聖人本分底聖人所說乃謙辭植太宰知我乎以下煞有曲折意思聖人不直謂太宰不足以知我只說太宰也知我這便見聖人待人恁地溫厚又曰聖人自是多能今若只去學多能則只是一箇雜骨董底人所以說君子多乎哉不多也義剛問夫子多材多藝何故能爾曰聖人本領大故雖是材藝他做得自別只如禮聖人動容周旋俯仰升降自是與它人不同如射亦然天生聖人氣稟清明自是與他人不同列子嘗言聖人力能拓關雖未可信然要之聖人本領大後事事做得出來自別銖問吾不試故藝曰想見聖人事事會但不見用所以人只見它小小技藝若使其得用便做出大功業來不復有小小技藝之可見矣問此亦是聖人賢於堯舜處否曰也不須如此說聖人賢於堯舜處卻在於收拾累代聖人之典章禮樂制度義理以垂於世不在此等小小處此等處非所以論聖人之優劣也橫渠便是如此說以為孔子窮而在下故做得許多事如舜三十便徵庸了想見舜於小事也煞有不會處雖是如此也如此說不得舜少年耕稼陶漁也事事去做來所以人無緣及得聖人聖人事事從手頭更歷過來所以都曉得而今人事事都不會最急者是禮樂樂固不識了只是日用常行吉凶之禮也都不曾講得僩問天縱之將聖縱猶肆也言不為限量何如曰天放縱聖人做得恁地不去限量它問如此愚不肖是天限量之乎曰看氣象亦似天限量它一般如這道理聖人知得盡得愚不肖要增進一分不得硬拘定在這裏宇集注將聖殆也殆庶幾也如而今說將次將字訓大處多詩中亦孔之將之類多訓大詩裏多協韻所以要如此等字使若論語中只是平說泳吾有知乎哉章問吾有知乎哉與吾無隱乎爾意一般否曰那箇說得闊這箇主答問而言或曰那箇兼動靜語默說了曰然燾林恭甫問此章曰這空空是指鄙夫言聖人不以其無所有而略之故下句更用我字喚起義剛問竭兩端處疑與不憤不啟一段相反不憤不啟聖人待人自理會方啟發他空空鄙夫必著竭兩端告之如何曰兩端就一事而言說這淺近道理那箇深遠道理也便在這裏如舉一隅以四角言這桌子舉起一角便有三角在兩端以兩頭言之凡言語便有兩端文字不可類看這處與那處說又別須是看他語脈論這主意在吾有知乎哉無知也此聖人謙辭言我無所知空空鄙夫來問我又盡情說與他凡聖人謙辭未有無因而發者這上面必有說話門人想記不全須求這意始得如達巷黨人稱譽聖人博學而無所成名聖人乃曰吾執御矣皆是因人譽己聖人方承之以謙此處想必是人稱道聖人無所不知誨人不倦有這般意思聖人方道是我無知識亦不是誨人不倦但鄙夫來問我則盡情向他說若不如此聖人何故自恁地謙自今觀之人無故說謙話便似要人知模樣宇問伊川謂聖人之言必降而自卑不如此則人不親賢人之言必引而自高不如此則道不尊此是形容聖人氣象不同邪抑據其地位合當如此曰聖人極其高大人自難企及若更不俯就則人愈畏憚而不敢進賢人有未熟處人未甚信服若不引而自高則人必以為淺近不足為孟子人皆以為迂闊把做無用使孟子亦道我底誠迂闊無用則何以起人慕心所以與他爭辯不是要人尊己直使人知斯道之大庶幾竦動著力去做孔子嘗言如有用我者期月而已可也又言吾其為東周乎只作平常閑說孟子言如欲平治天下當今之世舍我其誰便說得廣是勢不得不如此又問如程子說話亦引而自高否曰不必如此又生枝節且就此本文上看一段須反覆看來看去要爛熟方見意味快樂令人都不欲看別段始得淳寓錄云程子曰聖人之言必降而自卑不如此則人不親賢人之言則引而自高不如此則道不尊不審這處形容聖賢氣象不同或據其地位合著如此耶曰地位當如此聖人極其高大人皆疑之以為非我所能及若更不恁地俯就則人愈畏憚而不敢進孟子於道雖已見到至處然做處畢竟不似聖人熟人不能不疑其所未至若不引而自高則人必以為淺近而不足為孟子人皆以為迂闊把他無用了若孟子也道是我底誠迂闊無用如何使得所以與人辨與人爭亦不是要人尊己只要人知得斯道之大庶幾使人竦動警覺夫子常言如有用我者期月而已可又言吾其為東周乎只平常如此說孟子便道如欲平治天下當今之世舍我其誰也便說得恁地奢遮其勢不得不如此這話從來無人會如此說非他程先生見得透如何敢鑿空恁地說出來正淳問執兩端與竭兩端如何曰兩端也只一般猶言頭尾也執兩端方識得一箇中竭兩端言徹頭徹尾都盡也問只此是一言而盡這道理如何曰有一言而盡者有數言而盡者如樊遲問仁曰愛人問知曰知人此雖一言而盡推而遠之亦無不盡如子路正名之論直說到無所措手足如子路問政哀公問政皆累言而盡但只聖人之言上下本末始終小大無不兼舉端蒙鳳鳥不至章鳳鳥不至聖人尋常多有謙詞有時亦自諱不得泳子見齊衰者章康叔臨問作與趨者敬之貌也何為施之於齊衰與瞽者作與趨固是敬然敬心之所由發則不同見冕衣裳者敬心生焉而因用其敬見齊衰者瞽者則哀矜之心動於中而自加敬也呂刑所謂哀敬折獄正此意也蓋卿震錄疑聞同叔臨問雖少必作過之必趨欲以作字趨字說做敬不知如何曰固是敬須是看這敬心所從發處如見齊衰是敬心生於哀見瞽者是敬心生於閔震問作與趨如何見得聖人哀矜之心曰只見之過之而變容動色便是哀矜之豈真涕泣而後謂之哀矜也燾顏淵喟然嘆章學者說顏子喟然嘆曰一章曰公只消理會顏子因何見得到這裏是見箇甚麼物事眾無應者先生遂曰要緊只在夫子循循然善誘人博我以文約我以禮三句上須看夫子循循然善誘底意思是如何聖人教人要緊只在格物致知克己復禮這箇窮理是開天聰明是甚次第賀孫夫子教顏子只是博文約禮兩事自堯舜以來便自如此說惟精便是博文惟一便是約禮義剛博我以文約我以禮聖門教人只此兩事須是互相發明約禮底工夫深則博文底工夫愈明博文底工夫至則約禮底工夫愈密廣博我以文約我以禮聖人教人只此兩事博文工夫固多約禮只是這些子如此是天理如此是人欲不入人欲則是天理禮者天理之節文節謂等差文謂文采等差不同必有文以行之鄉黨一篇乃聖人動容周旋皆中禮處與上大夫言自然誾誾與下大夫言自然侃侃若與上大夫言卻侃侃與下大夫言卻誾誾便不是聖人在這地位知這則樣莫不中節今人應事此心不熟便解忘了又云聖賢於節文處描畫出這樣子令人依本子去學譬如小兒學書其始如何便寫得好須是一筆一畫都依他底久久自然好去又云天理人欲只要認得分明便喫一盞茶時亦要知其孰為天理孰為人欲人傑安卿問博文是求之於外約禮是求之於內否曰何者為外博文也是自內裏做出來我本來有此道理只是要去求知須是致物須是格雖是說博然求來求去終歸於一理乃所以約禮也易所謂尺蠖之屈以求伸也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也而今尺蠖蟲子屈得一寸便能伸得一寸來許他之屈乃所以為伸龍蛇於冬若不蟄則凍殺了其蟄也乃所以存身也精義入神乃所以致用也利用安身乃所以崇德也欲罷不能如人行步左腳起了不由得右腳不起所謂過此以往未之或知也若是到那窮神知化則須是德之盛也方能顏子其初見得聖人之道尚未甚定所以說彌高彌堅在前在後及博文約禮工夫既到則見得如有所立卓爾但到此卻用力不得了只待他熟後自到那田地義剛國秀問所以博文約禮格物致知是教顏子就事物上理會克己復禮卻是顏子有諸己曰格那物致吾之知也便是會有諸己賀孫因論博我以文曰固是要就書冊上理會然書冊上所載者是許多書冊載不盡底又是多少都要理會僩正淳問顏淵喟然歎曰一段曰吾人未到他地位畢竟未識說箇甚麼再問乃曰瞻之在前忽然在後是沒捉摸處是他顏子見得恁地如有所立卓爾是聖人已到顏子未到處以下總論顏淵喟然歎處是顏子見得未定只見得一箇大物事沒奈他何節顏子仰之彌高鑽之彌堅瞻之在前忽然在後不是別有箇物事只是做來做去只管不到聖人處若做得緊又太過了若放慢做又不及聖人則動容周旋都是這道理義剛或問顏子鑽仰曰顏子鑽仰前後只得摸索不著意思及至盡力以求之則有所謂卓然矣見聖人氣象大概如此然到此時工夫細密從前篤學力行底粗工夫全無所用蓋當此時只有些子未安樂但須涵養將去自然到聖人地位也力行仰高鑽堅瞻前忽後此猶是見得未親切在如有所立卓爾方始親切雖欲從之末由也已只是腳步未到蓋不能得似聖人從容中道也閎祖瞻之在前忽然在後是猶見得未定及所立卓爾則已見得定但未到爾只是天理自然底不待安排所以著力不得時蓋為安排著便不自然便與他底不相似這箇卓爾事事有在裏面亦如一以貫之相似佐或問瞻前忽後章曰此是顏子當初尋討不著時節瞻之卻似在前及到著力趕上又卻在後及鑽得一重了又卻有一重及仰之又卻煞高及至上得一層了又有一層到夫子教人者又卻循循善誘既博之以文又約之以禮博之以文是事事物物皆窮究約之以禮是使之復禮卻只如此教我循循然去下工夫久而後見道體卓爾立在這裏此已見得親切處然雖欲從之卻又末由也已此是顏子未達一間時此是顏子說己當初捉摸不著時事祖道問顏子此說亦是立一箇則例與學者求道用力處故程子以為學者須學顏子有可依據孟子才大難學者也曰然祖道周元興問顏子當鑽仰瞻忽時果何所見曰顏子初見聖人之道廣大如此欲向前求之轉覺無下手處退而求之則見聖人所以循循然善誘之者不過博文約禮於是就此處竭力求之而所見始親切的當如有所立卓爾在前而歎其峻絕著力不得也又問顏子合下何不便做博文約禮工夫曰顏子氣稟高明合下見得聖人道大如此未肯便向下學中求及其用力之久而後知其真不外此故只於此處著力爾銖問顏子瞻忽事為其見得如此所以欲罷不能曰只為夫子博之以文約之以禮所以欲罷不能問瞻忽前後是初見時事仰高鑽堅乃其所用力處曰只是初見得些小未能無礙奈何他不得夫子又只告以博文約禮顏子便服膺拳拳弗失緊要是博文約禮問顏子後來用力見得如有所立卓爾何故又曰雖欲從之末由也已曰到此亦無所用力只是博文約禮積久自然見得德明問顏子喟然歎處莫正是未達一間之意夫顏子無形顯之過夫子稱其三月不違仁所謂違仁莫是有纖毫私欲發見否曰易傳中說得好云既未能不勉而中所欲不踰矩是有過也瞻前忽後是顏子見聖人不可及無捉摸處如有所立卓爾卻是真箇見得分明又曰顏子纔有不順意處有要著力處便是過人傑夫子之教顏子只是博文約禮二事至於欲罷不能既竭吾才如有所立卓爾處只欠箇熟所謂過此以往未之或知也窮神知化德之盛也人傑問顏淵喟然歎章曰仰鑽瞻忽四句是一箇關如有所立卓爾處又是一箇關不是夫子循循善誘博文約禮便雖見得高堅前後亦無下手處惟其如此所以過得這一關欲罷不能非止是約禮一節博文一節處亦是欲罷不能博文了又約禮約禮了又博文恁地做去所以欲罷不能至於如有所立去處見得大段親切了那末由也已一節卻自著力不得著力得處顏子自著力了博文約禮是著力得處也又曰顏子為是先見得這箇物事了自高堅前後做得那卓爾處一節親切如一節了如今學者元不曾識那箇高堅前後底是甚物事更怎望他卓爾底植問瞻之在前四句曰此段有兩重關此處顏子非是都不曾見得顏子已是到這裏了比他人都不曾到問聖人教人先博文而後約禮橫渠先以禮教人何也曰學禮中也有博文如講明制度文為這都是文那行處方是約禮也夔孫欲罷不能是住不得處惟欲罷不能故竭吾才不惟見得顏子善學聖人亦見聖人曲盡誘掖之道使他歡喜不知不覺得到氣力盡處如人飲酒飲得一盃好只管飲去不覺醉郎當了夔孫大率看文字且看從實處住如喟然歎一章且看到那欲罷不能處如後面只自家工夫到那田地自見得都不必如此去贊詠想像籠罩燾問如有所立卓爾只是說夫子之道高明如此或是似有一物卓然可見之意否曰亦須有箇模樣問此是聖人不思不勉從容自中之地顏子鑽仰瞻忽既竭其才歎不能到曰顏子鑽仰瞻忽初是捉摸不著夫子不就此啟發顏子只博之以文約之以禮令有用功處顏子做這工夫漸見得分曉至於欲罷不能已是住不得及夫既竭吾才如此精專方見得夫子動容周旋無不中處皆是天理之流行卓然如此分曉到這裏只有箇生熟了顏子些小未能渾化如夫子故曰雖欲從之末由也已德明問如有所立卓爾是聖人不思不勉從容自中處顏子必思而後得勉而後中所以未至其地曰顏子竭才便過之問如何過曰才是思勉便過不思勉又不及顏子勉而後中便有些小不肯底意心知其不可故勉強擺回此等意義懸空逆料不得須是親到那地位方自知問集注解瞻之在前忽然在後作無方體曰大概亦是如此德明恭父問顏子平日深潛沉墧觸處從容只於喟然之歎見得他煞苦切處揚子云顏苦孔之卓恐也是如此到這裏見得聖人直是峻極要進這一步不得便覺有懇切處曰顏子到這裏也不是大段著力只他自覺得要著力自無所容其力賀孫恪錄云恭父問顏子平日深潛純粹到此似覺有苦心極力之象只緣他工夫到後視聖人地位卓然只在目前只這一步峻絕直是難進故其一時勇猛奮發不得不如此觀揚子雲言顏苦孔之卓似乎下得箇苦字亦甚親切但顏子只這一時勇猛如此卻不見迫切到末由也已亦只得放下曰看他別自有一箇道理然茲苦也茲其所以為樂也程子曰到此地位工夫尤難直是峻絕又大段著力不得所以著力不得緣聖人不勉而中不思而得了賢者若著力要不勉不思便是思勉了此所以說大段著力不得今日勉之明日勉之勉而至於不勉今日思之明日思之思而至於不思自生而至熟正如寫字一般會寫底固是會不會寫底須學他寫今日寫明日寫自生而至熟自然寫得泳集注問程子曰到此地位至著力不得何謂也曰未到這處須是用力到這處自要用力不得如孔子六十而耳順七十而從心這處如何用力得只熟了自然恁地去橫渠曰大可為也化不可為也在熟之而已過此以往未之或知也窮神知化德之盛也淳寓錄同洽錄云到這裏直待他自熟且如熟還可著力否問顏淵喟然歎一段高堅前後可形容否曰只是說難學要學聖人之道都摸索不著要如此學不得要如彼學又不得方取他前又見在後這處皆是譬喻如此其初恁地難到循循善誘方略有箇近傍處吳氏以為卓爾亦不出乎日用行事之間問如何見得曰是他見得恁地定見得聖人定體規模此處除是顏子方見得問程子言到此大段著力不得胡氏又曰不怠所從必欲至乎卓立之地何也曰末由也已不是到此便休了不用力但工夫用得細不似初間用許多粗氣力如博學審問慎思明辯篤行之類這處也只是循循地養將去顏子與聖人大抵爭些子只有些子不自在聖人便不勉而中不思而得這處如何大段著力得才著力又成思勉去也只恁地養熟了便忽然落在那窠窟裏明道謂賢毋謂我不用力我更著力淳錄云明道謂賢看顥如此顥煞用工夫人見明道是從容然明道卻自有著力處但細膩了人見不得宇正淳問集注顏子喟然而歎一章不用程子而用張子之說曰此章經文自有次第若不如張子說須移如有所立卓爾向前始得必大蜚卿問博約之說程子或以為知要或以為約束如何曰博我以文約我以禮與博學於文約之以禮一般但博學於文約之以禮孔子是汎言人能博文而又能約禮可以弗畔夫道而顏子則更深於此耳侯氏謂博文是致知格物約禮是克己復禮極分曉而程子卻作兩樣說便是某有時曉他老先生說話不得孟子曰博學而詳說之將以反說約也這卻是知要蓋天下之理都理會透到無可理會處便約蓋博而詳所以方能說到要約處約與要同道夫曰漢書要求字讀如約束曰然頃之復曰知崇禮卑聖人這箇禮字如何說到那地位道夫曰知崇便是博禮卑便是約否曰博然後崇約然後卑物理窮盡卓然於事物之表眼前都欄自家不住如此則所謂崇戒慎恐懼一舉一動一言一行無不著力如此則是卑問卑法地曰只是極其卑爾又問知崇如天禮卑如地而後人之理行乎曰知禮成性而天理行乎其間矣道夫集義問橫渠說顏子三段卻似說顏子未到中處曰可知是未到從容中道如瞻之在前忽焉在後便是橫渠指此做未能及中蓋到這裏又著力不得才緊著便過了稍自放慢便遠了到此不爭分毫間只是做得到了卻只涵養既竭吾才如有所立卓爾便是未到不思而得處雖欲從之末由也已便是未到不勉而中處問橫渠說顏子發歎處曰高明不可窮是說仰之彌高博厚不可極是說鑽之彌堅中道不可識則瞻之在前忽然在後至其欲罷不能既竭吾才則方見如有所立卓爾謂之如則是於聖人中道所爭不多才著力些便過才放慢些便不及直是不容著力人傑所謂瞻之在前忽然在後這只是箇中庸不可能蓋聖人之道是箇恰好底道理所以不可及自家纔著意要去做不知不覺又蹉過了且如恭而安這是聖人不可及處到得自家纔著意去學時便恭而不安了此其所以不可能只是難得到恰好處不著意又失了纔著意又過了所以難橫渠曰高明不可窮博厚不可極則中道不可識蓋顏子之歎也雖說得拘然亦自說得好或曰伊川過不及之說亦是此意否曰然蓋方見聖人之道在前自家要去趕著他不知不覺地蹉過了那聖人之道又卻在自家後了所謂忽然在後也只是箇中庸不可能夫子循循然善誘人非特以博文約禮分先後次序博文中亦自有次序約禮中亦自有次序有箇先後淺深欲罷不能便只是就這博文約禮中做工夫合下做時便是下這十分工夫去做到得這歎時便是欲罷不能之效眾人與此異者只是爭這箇欲罷不能做來做去不知不覺地又住了顏子則雖罷而自有所不能不是勉強如此此其所以異於人也又曰顏子工夫到此已是七八分了到得此是滔滔地做將去所以欲罷不能如人過得箇關了便平地行將去僩伯豐問顏子求龍德正中而未見是庸言之信庸行之謹閑邪存其誠聖人從容中道地位否曰然又問極其大而後中可求如何曰此言執其兩端用其中於民正如程子室中廳中國中之說不極其大則不得其中也又問止其中而後大可有如何曰在中間便盡得四邊若偏向這一邊即照管那一邊不得張子此語甚好若云未見其止卻使得不是未見其止只是不息非得其所止之止子疾病章問久矣哉由之行詐是不特指那一事言也曰是指從來而言問人苟知未至意未誠則此等意慮時復發露而不自覺曰然廣問由之行詐如何曰見子路要尊聖人恥於無臣而為之一時不能循道理子路本心亦不知其為詐然而子路尋常亦是有不明處如死孔悝之難是致死有見不到只有一毫不誠便是詐也饒本作子路平日強其所不知以為知故不以出公為非問子路使門人為臣一章曰世間有一種事分明是不好人也皆知其不好謂如子路使門人為臣此等事未有不好亦未為欺天但子路見不透卻把做好事去做了不知其實卻不是了燾子貢曰有美玉章子貢只是如此設問若曰此物色是只藏之惟復將出用之耳亦未可議其言之是非也必大子欲居九夷章問子欲居九夷使聖人居之真有可變之理否曰然或問九夷前輩或以箕子為證謂朝鮮之類是否曰此亦未見得古者中國亦有夷狄如魯有淮夷周有伊雒之戎是也又問此章與乘桴浮海莫是戲言否曰只是見道不行偶然發此歎非戲言也因言後世只管說當時人君不能用聖人不知亦用不得每國有世臣把住了如何容外人來做如魯有三桓齊有田氏晉有六卿比比皆然如何容聖人插手雉出則事公卿章喪事不敢不勉不為酒困此等處聖人必有為而言燾問不為酒困何有於我哉曰語有兩處如此說皆不可曉尋常有三般說話一以為上數事我皆無有一說謂此數事外我皆復何有一說云於我何有然皆未安某今闕之去偽集注今有定說正淳問出則事公卿一段及范氏以燕而不亂為不為酒困如何曰此說本卑非有甚高之行然工夫卻愈精密道理卻愈無窮故曰知崇禮卑又曰崇德廣業蓋德知雖高然踐履卻只是卑則愈廣又曰德言盛禮言恭謙也者致恭以存其位者也此章之義似說得極低然其實則說得極重范氏似以不為酒困為不足道故以燕飲不亂當之過於深矣必大子在川上章問逝者如斯曰逝只訓往斯字方指川流處植或問子在川上曰逝者如斯夫不舍晝夜曰古說是見川流因歎大抵過去底物不息猶天運流行不息如此亦警學者要當如此不息蓋聖人之心純亦不已所以能見之去偽問注云天地之化往者過來者續無一息之停乃道體之本然也其可指而易見者莫如川流故於此發以示人其反而求之身心固生生而不息氣亦流通而不息二者皆得之於天與天地為一體者也然人之不能不息者有二一是不知後行不得二是役於欲後行不得人須是下窮理工夫使無一理之不明下克己工夫使無一私之或作然此兩段工夫皆歸在敬上故明道云其要只在慎獨曰固是若不慎獨便去隱微處間斷了能慎獨然後無間斷若或作或輟如何得與天地相似廣士毅錄云此只要常常相續不間斷了集注或問天地之化往者過來者續此道體之本然也如何曰程子言之矣天運而不已日往則月來云云皆與道為體與道為體此句極好某常記得舊作觀瀾記兩句云觀湍流之不息悟有本之無窮人傑祖道錄別出或問子在川上曰此是形容道體伊川所謂與道為體此一句最妙某嘗為人作觀瀾詞其中有二句云觀川流之不息兮悟有本之無窮又問明道曰其要只在慎獨如何曰能慎獨則無間斷而其理不窮若不慎獨便有欲來參入裏面便間斷了也如何卻會如川流底意又問明道云自漢以來諸儒皆不識此如何曰是他不識如何卻要道他識此事除了孔孟猶是佛老見得些形象譬如畫人一般佛老畫得些模樣後來儒者於此全無相著如何教他兩箇不做大祖道曰只為佛老從心上起工夫其學雖不是然卻有本儒者只從言語文字上做有知此事是合理會者亦只做一場話說過了所以輸與他曰彼所謂心上工夫本不是然卻勝似儒者多公此說卻是祖道問注云此道體之本然也後又曰皆與道為體向見先生說道無形體卻是這物事盛載那道出來故可見與道為體言與之為體也這體字較粗如此則與本然之體微不同曰也便在裏面只是前面體字說得來較闊連本末精粗都包在裏面後面與道為體之體又說出那道之親切底骨子恐人說物自物道自道所以指物以見道其實這許多物事湊合來便都是道之體便在這許多物上只是水上較親切易見僩公晦問子在川上注體字是體用之體否曰只是這箇體道之體只是道之骨子節問如何是與道為體曰與那道為形體這體字卻粗只是形體問猶云性者道之形體否曰然僩問注云此道體也下面云是皆與道為體與字其義如何曰此等處要緊與道為體是與那道為體道不可見因從那上流出來若無許多物事又如何見得道便是許多物事與那道為體水之流而不息最易見者如水之流而不息便見得道體之自然此等處閑時好玩味炎與道為體此四字甚精蓋物生水流非道之體乃與道為體也學蒙先生舉程子與道為體之語示過言道無形體可見只看日往月來寒往暑來水流不息物生不窮顯顯者乃是與道為體過問伊川曰此道體也天運而不已至皆與道為體如何曰形而上者謂之道形而下者謂之器道本無體此四者非道之體也但因此則可以見道之體耳那無聲無臭便是道但尋從那無聲無臭處去如何見得道因有此四者方見得那無聲無臭底所以說與道為體劉用之曰如炭與火相似曰也略是如此義剛徐問程子曰日往則月來至皆與道為體何謂也曰日月寒暑等不是道宇錄云日往月來寒往暑來水流不息物生不窮不是道然無這道便也無這箇了惟有這道方始有這箇既有這箇則就上面便可見得道這箇是與道做骨子問張思叔說此便是無窮伊川曰一箇無窮如何便了得何也曰固是無窮然須看因甚恁地無窮須見得所以無窮處始得若說天只是高地只是厚便也無說了須看所以如此者是如何淳宇同周元興問與道為體曰天地日月陰陽寒暑皆與道為體又問此體字如何曰是體質道之本然之體不可見觀此則可見無體之體如陰陽五行為太極之體又問太極是體二五是用曰此是無體之體叔重曰如其體則謂之易否曰然又問有天德便可語王道曰有天德則便是天理便做得王道無天德則做王道不成又曰無天德則是私意是計較後人多無天德所以做王道不成節伊川說水流而不息物生而不窮皆與道為體這箇體字似那形體相似道是虛底道理因這箇物事上面方看見如曆家說二十八宿為天之體天高遠又更運轉不齊不記這幾箇經星如何見得他經禮三百曲禮三千無一事之非仁經禮曲禮便是與仁為體高至之問逝者如斯夫不舍晝夜便是純亦不已意思否曰固是然此句在吾輩作如何使楊曰學者當體之以自強不息曰只是要得莫間斷程子謂此天德也有天德便可語王道其要只在慎獨慎獨與這裏何相關只少有不慎便斷了宇又曰天理流行之妙若少有私欲以間之便如水被些障塞不得恁滔滔地流去問程子謂自漢以來儒者皆不識此義曰是不曾識得佛氏卻略曾窺得上面些箇影子儒用問注中有天德而後可以語王道先生云只是無些子私意子在川上一段注此道體之本然也欲學者時時省察而無毫髮之間斷才不省察便間斷此所以其要只在慎獨人多於獨處間斷泳因說此章問曰今不知吾之心與天地之化是兩箇物事是一箇物事公且思量良久乃曰今諸公讀書只是去理會得文義更不去理會得意聖人言語只是發明這箇道理這箇道理吾身也在裏面萬物亦在裏面天地亦在裏面通同只是一箇物事無障蔽無遮礙吾之心即天地之心聖人即川之流便見得也是此理無往而非極致但天命至正人心便邪天命至公人心便私天命至大人心便小所以與天地不相似而今講學便要去得與天地不相似處要與天地相似又曰虛空中都是這箇道理聖人便隨事物上做出來又曰如今識得箇大原了便見得事事物物都從本根上發出來如一箇大樹有箇根株便有許多芽櫱枝葉牽一箇則千百箇皆動夔孫因說子在川上章問明道曰天地設位而易行乎其中只是敬也敬則無間斷也是這意思曰固是天地與聖人一般但明道說得寬夔孫問見大水必觀焉是何意曰只川上之歎恐是夫子本語孟荀之言或是傳聞之訛必大我未見好德如好色章至之問好德如好色此即大學如好好色之意要得誠如此然集注載衛靈公事與此意不相應何也曰書不是恁地讀除了靈公事便有何發明存靈公事在那上便有何相礙此皆沒緊要聖人當初只是恁地歎未見好德如那好色者自家當虛心去看又要反求思量自己如何便是好德如何便是好色方有益若只管去校量他與聖人意思愈見差錯聖人言語自家當如奴僕只去隨他教住便住教去便去今卻如與做師友一般只去與他校如何得大學之說自是大學之意論語之說自是論語之意論語只是說過去尾重則首輕這一頭低那一頭昂大學只將兩句平頭說去說得尤力如何要合兩處意來做一說得淳蜀錄作林一之問文少異叔重問何謂招搖曰如翱翔節語之而不惰章讀語之而不惰曰惟於行上見得他不惰時舉陳仲亨問語之而不惰於甚處見得曰如得一善則拳拳服膺而不失之矣欲罷不能皆是其不惰處義剛問如何是不惰處曰顏子聽得夫子說話自然住不得若他人聽過了半疑半信若存若亡安得不惰雉問語之不惰曰看來不惰只是不說沒緊要底話蓋是那時也沒心性說得沒緊要底話了燾子謂顏淵章問未見其止曰如橫渠之說以為止是止於中亦說得但死而不活蓋是顏子未到那處未到那成就結果處蓋顏子一箇規模許多大若到那收因結果必有大段可觀者也燾苗而不秀章徐問苗而不秀秀而不實何所喻曰皆是勉人進學如此這箇道理難當只管恁地勉強去苗而不秀秀而不實大概只說物有生而不到長養處有長養而不到成就處淳苗須是秀秀須是實方成不然何所用學不至實亦何所用後生可畏章後生可畏是方進者也四十五十而無聞是中道而止者也曰然
