body:
  text: 朱子語類卷第二理氣下天地下天文有半邊在上面須有半邊在下面僩如何見得天有三百六十度甚麼人去量來只是天行得過處為度天之過處便是日之退處日月會為辰節有一常見不隱者為天之蓋有一常隱不見者為天之底節叔器問天有幾道曰據曆家說有五道而今且將黃赤道說赤道正在天之中如合子縫模樣黃道是在那赤道之間義剛問同度同道曰天有黃道有赤道天正如一圓匣相似赤道是那匣子相合縫處在天之中黃道一半在赤道之內一半在赤道之外東西兩處與赤道相交度卻是將天橫分為許多度數會時是日月在那黃道赤道十字路頭相交處冢撞著望時是月與日正相向如一箇在子一箇在午皆同一度謂如月在畢十一度日亦在畢十一度雖同此一度卻南北相向日所以蝕於朔者月常在下日常在上既是相會被月在下面遮了日故日蝕望時月蝕固是陰敢與陽敵然曆家又謂之暗虛蓋火日外影其中實暗到望時恰當著其中暗處故月蝕僩問周天之度是自然之數是強分曰天左旋一晝一夜行一周而又過了一度以其行過處一日作一度三百六十五度四分度之一方是一周只將南北表看今日恁時看時有甚星在表邊明日恁時看這星又差遠或別是一星了胡泳天一日周地一遭更過一度日即至其所趕不上一度月不及十三度天一日過一度至三百六十五度四分度之一則及日矣與日一般是為一期揚天行至健一日一夜一周天必差過一度日一日一夜一周恰好月卻不及十三度有奇只是天行極速日稍遲一度月必遲十三度有奇耳因舉陳元滂云只似在圓地上走一人過急一步一人差不及一步又一人甚緩差數步也天行只管差過故曆法亦只管差堯時昏旦星中於午月令差於未漢晉以來又差今比堯時似差及四分之一古時冬至日在牽牛今卻在斗德明天最健一日一周而過一度日之健次於天一日恰好行三百六十五度四分度之一但比天為退一度月比日大故緩比天為退十三度有奇但曆家只算所退之度卻云日行一度月行十三度有奇此乃截法故有日月五星右行之說其實非右行也橫渠曰天左旋處其中者順之少遲則反右矣此說最好書疏璣衡禮疏星回於天漢志天體沈括渾儀議皆可參考閎祖問天道左旋自東而西日月右行則如何曰橫渠說日月皆是左旋說得好蓋天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一正恰好比天進一度則日為退一度二日天進二度則日為退二度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退盡本數遂與天會而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退了十三度有奇進數為順天而左退數為逆天而右曆家以進數難算只以退數算之故謂之右行且曰日行遲月行速然則日行卻得其正故揚子太玄首便說日云云向來久不曉此因讀月令日窮於次疏中有天行過一度之說推之乃知其然又如書齊七政疏中二三百字說得天之大體亦好後漢曆志亦說得好義剛錄云前漢曆志說道理處少不及東漢志較詳淳問月令疏地冬上騰夏下降是否曰未便理會到此且看大綱識得後此處用度算方知淳義剛同天左旋日月亦左旋但天行過一度日只在此當卯而卯當午而午某看得如此後來得禮記說暗與之合泳天道與日月五星皆是左旋天道日一周天而常過一度日亦日一周天起度端終度端故比天道常不及一度月行不及十三度四分度之一今人卻云月行速日行遲此錯說也但曆家以右旋為說取其易見日月之度耳至問天道左旋日月星辰右轉曰自疏家有此說人皆守定某看天上日月星不曾右轉只是隨天轉天行健這箇物事極是轉得速且如今日日與月星都在這度上明日旋一轉天卻過了一度日遲些便欠了一度月又遲些又欠了十三度如歲星須一轉爭了三十度要看曆數子細只是璇璣玉衡疏載王蕃渾天說一段極精密可檢看便是說一箇現成天地了月常光但初二三日照只照得那一邊過幾日漸漸移得正到十五日月與日正相望到得月中天時節日光在地下迸從四邊出與月相照地在中間自遮不過今月中有影云是莎羅樹乃是地形未可知賀孫義剛言伯靖以為天是一日一周日則不及一度非天過一度也曰此說不是若以為天是一日一周則四時中星如何解不同更是如此則日日一般卻如何紀歲把甚麼時節做定限若以為天不過而日不及一度則趲來趲去將次午時便打三更矣因取禮記月令疏指其中說早晚不同及更行一度兩處曰此說得甚分明其他曆書都不如此說蓋非不曉但是說滑了口後信口說習而不察更不去子細檢點而今若就天裏看時只是行得三百六十五度四分度之一若把天外來說則是一日過了一度季通常有言論日月則在天裏論天則在太虛空裏若去太虛空裏觀那天自是日月羇得不在舊時處了先生至此以手畫輪子曰謂如今日在這一處明日自是又羇動著些子又不在舊時處了又曰天無體只二十八宿便是天體日月皆從角起天亦從角起日則一日運一周依舊只到那角上天則一周了又過角些子日日累上去則一年便與日會次日仲默附至天說曰天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲故日行一日亦繞地一周而在天為不及一度積三百六十五日九百四十分日之二百三十五而與天會是一歲日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日會十二會得全日三百四十八餘分之積又五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歲月行之數也歲有十二月月有三十日三百六十日者一歲之常數也故日與天會而多五日九百四十分日之二百三十五者為氣盈月與日會而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而閏生焉故一歲閏率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五十有九歲七閏則氣朔分齊是為一章也先生以此示義剛曰此說也分明義剛天道左旋日月星並左旋星不是貼天天是陰陽之氣在上面下人看見星隨天去耳宇問經星左旋緯星與日月右旋是否曰今諸家是如此說橫渠說天左旋日月亦左旋看來橫渠之說極是只恐人不曉所以詩傳只載舊說或曰此亦易見如以一大輪在外一小輪載日月在內大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月似右轉了曰然但如此則曆家逆字皆著改做順字退字皆著改做進字僩晉天文志論得亦好多是許敬宗為之日月隨天左旋如橫渠說較順五星亦順行曆家謂之緩者反是急急者反是緩曆數謂日月星所經歷之數揚問日是陽如何反行得遲如月曰正是月行得遲問日行一度月行十三度有奇曰曆家是將他退底度數為進底度數天至健故日常不及他一度月又遲故不及天十三度有奇且如月生於西一夜一夜漸漸向東便可見月退處問如此說則是日比天行遲了一度月比天行遲了十三度有奇曰曆家若如此說則算著那相去處度數多今只以其相近處言故易算聞季通云西域有九執曆卻是順算胡泳程子言日升降於三萬里是言黃赤道之間相去三萬里天日月星皆是左旋只有遲速天行較急一日一夜繞地一周三百六十五度四分度之一而又進過一度日行稍遲一日一夜繞地恰一周而於天為退一度至一年方與天相值在恰好處是謂一年一周天月行又遲一日一夜繞地不能匝而於天常退十三度十九分度之七至二十九日半強恰與天相值在恰好處是謂一月一周天月只是受日光月質常圓不曾缺如圓毬只有一面受日光望日日在酉月在卯正相對受光為盛天積氣上面勁只中間空為日月來往地在天中不甚大四邊空有時月在天中央日在地中央則光從四旁上受於月其中昏暗便是地影望以後日與月行便差背向一畔相去漸漸遠其受光面不正至朔行又相遇日與月正緊相合日便蝕無光月或從上過或從下過亦不受光星亦是受日光但小耳北辰中央一星甚小謝氏謂天之機亦略有意但不似天之樞較切淳日月升降三萬里之中此是主黃道相去遠近而言若天之高則里數又煞遠或曰八萬四千里未可知也立八尺之表以候尺有五寸之景寸當千里則尺有五寸恰當三萬里之半日去表有遠近故景之長短為可驗也曆家言天左旋日月星辰右行非也其實天左旋日月星辰亦皆左旋但天之行疾如日天一日一周更攙過一度日一日一周恰無贏縮以月受日光為可見月之望正是日在地中月在天中所以日光到月四伴更無虧欠唯中心有少壓翳處是地有影蔽者爾及日月各在東西則日光到月者止及其半故為上弦又減其半則為下弦逐夜增減皆以此推地在天中不為甚大只將日月行度折算可知天包乎地其氣極緊試登極高處驗之可見形氣相催緊束而成體但中間氣稍寬所以容得許多品物若一例如此氣緊則人與物皆消磨矣謂日月只是氣到寅上則寅上自光氣到卯上則卯上自光者亦未必然既曰日月則自是各有一物方始各有一名星光亦受於日但其體微爾五星之色各異觀其色則金木水火之名可辯眾星光芒閃爍五星獨不如此眾星亦皆左旋唯北辰不動在北極五星之旁一小星是也蓋此星獨居天軸四面如輪盤環繞旋轉此獨為天之樞紐是也日月薄蝕只是二者交會處二者緊合所以其光掩沒在朔則為日食在望則為月蝕所謂紓前縮後近一遠三如自東而西漸次相近或日行月之旁月行日之旁不相掩者皆不蝕唯月行日外而掩日於內則為日蝕日行月外而掩月於內則為月蝕所蝕分數亦推其所掩之多少而已謨日月升降三萬里中謂夏至謂冬至其間黃道相去三萬里夏至黃道高冬至黃道低伊川誤認作東西相去之數形器之物雖天地之大亦有一定中處伊川謂天地無適而非中非是揚先生論及璣衡及黃赤道日月躔度潘子善言嵩山本不當天之中為是天形欹側遂當其中耳曰嵩山不是天之中乃是地之中黃道赤道皆在嵩山之北南極北極天之樞紐只有此處不動如磨臍然此是天之中至極處如人之臍帶也銖周髀法謂極當天中日月遶天而行遠而不可見者為盡此說不是問論語或問中云南極低入地三十六度北極高出地三十六度如何曰圓徑七十二度極正居其中堯典疏義甚詳德明季通嘗設一問云極星只在天中而東西南北皆取正於極而極星皆在其上何也某無以答後思之只是極星便是北而天則無定位義剛南極在下七十二度常隱不見唐書說有人至海上見南極下有數大星甚明此亦在七十二度之內義剛月體常圓無闕但常受日光為明初三四是日在下照月在西邊明人在這邊望只見在弦光十五六則日在地下其光由地四邊而射出月被其光而明月中是地影月古今人皆言有闕惟沈存中云無闕揚月無盈闕人看得有盈闕蓋晦日則月與日相疊了至初三方漸漸離開去人在下面側看見則其光闕至望日則月與日正相對人在中間正看見則其光方圓因云禮運言播五行於四時和而後月生也如此則氣不和時便無月恐無此理其云三五而盈三五而闕彼必不曾以理推之若以理推之則無有盈闕也畢竟古人推究事物似亦不甚子細或云恐是說元初有月時曰也說不得燾問弦望之義曰上弦是月盈及一半如弓之上弦下弦是月虧了一半如弓之下弦又問是四分取半否曰如二分二至也是四分取半因說曆家謂紓前縮後近一遠三以天之圍言之上弦與下弦時月日相看皆四分天之一僩問月本無光受日而有光季通云日在地中月行天上所以光者以日氣從地四旁周圍空處迸出故月受其光先生曰若不如此月何緣受得日光方合朔時日在上月在下則月面向天者有光向地者無光故人不見及至望時月面向人者有光向天者無光故見其圓滿若至弦時所謂近一遠三只合有許多光又云月常有一半光月似水日照之則水面光倒射壁上乃月照也問星受日光否曰星恐自有光德明問月受日光只是得一邊光曰日月相會時日在月上不是無光光都載在上面一邊故地上無光到得日月漸漸相遠時漸擦挫月光漸漸見於下到得望時月光渾在下面一邊望後又漸漸光向上去胡泳或問月中黑影是地影否曰前輩有此說看來理或有之然非地影乃是地形倒去遮了他光耳如鏡子中被一物遮住其光故不甚見也蓋日以其光加月之魄中間地是一塊實底物事故光照不透而有此黑暈也問日光從四邊射入月光何預地事而礙其光曰終是被這一塊實底物事隔住故微有礙耳或錄云今人剪紙人貼鏡中以火光照之則壁上圓光中有一人月為地所礙其黑暈亦猶是耳康節謂日太陽也月少陰也星少陽也辰太陰也星辰非星也又曰辰弗集於房房者舍也故十二辰亦謂之十二舍上辰字謂日月也所謂三辰北斗去辰爭十二來度日蝕是日月會合處月合在日之下或反在上故蝕月蝕是日月正相照伊川謂月不受日光意亦相近蓋陰盛亢陽而不少讓陽故也又曰日月會合故初一初二月全無光初三漸開方微有弦上光是哉生明也開後漸亦光至望則相對故圓此後復漸相近至晦則復合故暗月之所以虧盈者此也伯羽問自古以日月之蝕為災異如今曆家卻自預先算得是如何曰只大約可算亦自有不合處有曆家以為當食而不食者有以為不當食而食者木之曆家之說謂日光以望時遙奪月光故月食日月交會日為月掩則日食然聖人不言月蝕日而以有食為文者闕於所不見閎祖日食是為月所掩月食是與日爭敵月饒日些子方好無食揚日月交蝕暗虛道夫遇險謂日月相遇陽遇陰為險也振日月食皆是陰陽氣衰徽廟朝曾下詔書言此定數不足為災異古人皆不曉曆之故揚橫渠言日月五星亦隨天轉如二十八宿隨天而定皆有光芒五星逆行而動無光芒揚緯星是陰中之陽經星是陽中之陰蓋五星皆是地上木火土金水之氣上結而成卻受日光經星卻是陽氣之餘凝結者疑得也受日光但經星則閃爍開闔其光不定緯星則不然縱有芒角其本體之光亦自不動細視之可見僩莫要說水星蓋水星貼著日行故半月日見泳夜明多是星月早日欲上未上之際已先爍退了星月之光然日光猶未上故天欲明時一霎時暗揚星有墮地其光燭天而散者有變為石者揚分野之說始見於春秋時而詳於漢志然今左傳所載大火辰星之說又卻只因其國之先曾主二星之祀而已是時又未有所謂趙魏晉者然後來占星者又卻多驗殊不可曉廣叔重問星圖曰星圖甚多只是難得似圓圖說得頂好天彎紙卻平方圖又卻兩頭放小不得又曰那箇物事兩頭小中心漲又曰三百六十五度四分度之一想見只是說赤道兩頭小必無三百六十五度四分之一節風只如天相似不住旋轉今此處無風蓋或旋在那邊或旋在上面都不可知如夏多南風冬多北風此亦可見廣霜只是露結成雪只是雨結成古人說露是星月之氣不然今高山頂上雖晴亦無露露只是自下蒸上人言極西高山上亦無雨雪廣高山無霜露卻有雪某嘗登雲谷晨起穿林薄中並無露水沾衣但見煙霞在下茫然如大洋海眾山僅露峰尖煙雲環繞往來山如移動天下之奇觀也或問高山無霜露其理如何曰上面氣漸清風漸緊雖微有霧氣都吹散了所以不結若雪則只是雨遇寒而凝故高寒處雪先結也道家有高處有萬里剛風之說便是那裏氣清緊低處則氣濁故緩散想得高山更上去立人不住了那裏氣又緊故也離騷有九天之說注家妄解云有九天據某觀之只是九重蓋天運行有許多重數以手畫圖暈自內繞出至外其數九裏面重數較軟至外面則漸硬想到第九重只成硬殼相似那裏轉得又愈緊矣僩雪花所以必六出者蓋只是霰下被猛風拍開故成六出如人擲一團爛泥於地泥必灒開成稜瓣也又六者陰數大陰玄精石亦六稜蓋天地自然之數僩問龍行雨之說曰龍水物也其出而與陽氣交蒸故能成雨但尋常雨自是陰陽氣蒸鬱而成非必龍之為也密雲不雨尚往也蓋止是下氣上升所以未能雨必是上氣蔽蓋無發洩處方能有雨橫渠正蒙論風雷雲雨之說最分曉木之問雷電程子曰只是氣相摩軋是否曰然或以為有神物曰氣聚則須有然纔過便散如雷斧之類亦是氣聚而成者但已有渣滓便散不得此亦屬成之者性張子云其來也幾微易簡其究也廣大堅固即此理也雷如今之爆杖蓋鬱積之極而迸散者也方子十月雷鳴曰恐發動了陽氣所以大雪為豐年之兆者雪非豐年蓋為凝結得陽氣在地來年發達生長萬物敬仲雷雖只是氣但有氣便有形如蝃蝀本只是薄雨為日所照成影然亦有形能吸水吸酒人家有此或為妖或為祥義剛虹非能止雨也而雨氣至是已薄亦是日色射散雨氣了揚伊川說世間人說雹是蜥蜴做初恐無是理看來亦有之只謂之全是蜥蜴做則不可耳自有是上面結作成底也有是蜥蜴做底某少見十九伯說親見如此記在別錄十九伯誠確人語必不妄又此間王三哥之祖參議者云嘗登五臺山山極高寒盛夏柠綿被去寺僧曰官人帶被來少王甚怪之寺僧又為借得三兩條與之中夜之間寒甚擁數床綿被猶不煖蓋山頂皆蜥蜴含水吐之為雹少間風雨大作所吐之雹皆不見明日下山則見人言昨夜雹大作問皆如寺中所見者又夷堅志中載劉法師者後居隆興府西山修道山多蜥蜴皆如手臂大與之餅餌皆食一日忽領無限蜥蜴入菴井中之水皆為飲盡飲乾即吐為雹已而風雨大作所吐之雹皆不見明日下山則人言所下之雹皆如蜥蜴所吐者蜥蜴形狀亦如龍是陰屬是這氣相感應使作得他如此正是陰陽交爭之時所以下雹時必寒今雹之兩頭皆尖有稜道疑得初間圓上面陰陽交爭打得如此碎了雹字從雨從包是這氣包住所以為雹也古今曆家只推算得箇陰陽消長界分耳人傑曆太史公曆書是說太初然卻是顓頊四分曆劉歆作三統曆唐一行大衍曆最詳備五代王朴司天考亦簡嚴然一行王朴之曆皆止用之二三年即差王朴曆是七百二十加去季通所用卻依康節三百六十數人傑今之造曆者無定法只是趕汚天之行度以求合或過則損不及則益所以多差因言古之鍾律紐算寸分毫釐絲忽皆有定法如合符契皆自然而然莫知所起古之聖人其思之如是之巧然皆非私意撰為之也意古之曆書亦必有一定之法而今亡矣三代而下造曆者紛紛莫有定議愈精愈密而愈多差由不得古人一定之法也季通嘗言天之運無常日月星辰積氣皆動物也其行度疾速或過不及自是不齊使我之法能運乎天而不為天之所運則其疏密遲速或過不及之間不出乎我此虛寬之大數縱有差忒皆可推而不失矣何者以我法之有定而律彼之無定自無差也季通言非是天運無定乃其行度如此其行之差處亦是常度但後之造曆者其為數窄狹而不足以包之爾僩問曆法何以推月之大小曰只是以每月二十九日半六百四十分日之二十九計之觀其合朔為如何如前月大則後月初二日月生明前月小則後月初三日月生明人傑閏餘生於朔不盡周天之氣周天之氣謂二十四氣也月有大小朔不得盡此氣而一歲日子足矣故置閏揚中氣只在本月若趲得中氣在月盡後月便當置閏人傑沈存中欲以節氣定晦朔不知交節之時適在亥此日當如何分方子或說曆四廢日曰只是言相勝者春是庚辛日秋是甲乙日溫公潛虛亦是此意人傑五子六甲二五為干二六為支人傑先在先生處見一書先立春次驚蟄次雨水次春分次穀雨次清明云漢曆也揚子升問人言虜中曆與中國曆差一日是否曰只如子正四刻方屬今日子初自屬昨日今人纔交子時便喚做今日如此亦便差一日木之曆數微眇如今下漏一般漏管稍澀則必後天稍闊則必先天未子而子未午而午淵曆法季通說當先論天行次及七政此亦未善要當先論太虛以見三百六十五度四分度之一一一定位然後論天行以見天度加損虛度之歲分歲分既定然後七政乃可齊耳道夫或問季通曆法未是曰這都未理會得而今須是也會布算也學得似他了把去推測方見得他是與不是而今某自不曾理會得如何說得他是與不是這也是康節說恁地若錯時也是康節錯了只是覺得自古以來無一箇人考得到這處然也只在史記漢書上自是人不去考司馬遷班固劉向父子杜佑說都一同不解都不是賀孫陳得一統元曆紹興七八年間作又云局中暗用紀元曆以統元為名文蔚渾儀可取蓋天不可用試令主蓋天者做一樣子如何做只似箇雨傘不知如何與地相附著若渾天須做得箇渾天來賀孫或錄云有能說蓋天者欲令作一蓋天儀不知可否或云似傘樣如此則四旁須有漏風處故不若渾天之可為儀也先生嘗言數家有大小陽九道夫問果爾則有國有家者何貴乎修治曰在我者過得他一二分便足以勝之道夫數問周公定豫州為天地之中東西南北各五千里今北邊無極而南方交趾便際海道里長短敻殊何以云各五千里曰此但以中國地段四方相去言之未說到極邊與際海處南邊雖近海然地形則未盡如海外有島夷諸國則地猶連屬彼處海猶有底至海無底處地形方盡周公以土圭測天地之中則豫州為中而南北東西際天各遠許多至於北遠而南近則地形有偏爾所謂地不滿東南也禹貢言東西南北各二千五百里不知周公何以言五千里今視中國四方相去無五千里想他周公且恁大說教好看如堯舜所都冀州之地去北方甚近是時中國土地甚狹想只是略相羈縻至夏商已後漸漸開闢如三苗只在今洞庭彭蠡湖湘之間彼時中國已不能到三苗所以也負固不服後來又見先生說崑崙取中國五萬里此為天地之中中國在東南未必有五萬里嘗見佛經說崑崙山頂有阿耨大池水流四面去其東南入中國者為黃河其二方流為弱水黑水之類又曰自古無人窮至北海想北海只挨著天殼邊過緣北邊地長其勢北海不甚闊地之下與地之四邊皆海水周流地浮水上與天接天包水與地問天有形質否曰無只是氣旋轉得緊如急風然至上面極高處轉得愈緊若轉纔慢則地便脫墜矣問星辰有形質否曰無只是氣之精英凝聚者或云如燈花否曰然僩地理人言北方土地高燥恐暑月亦蒸濕何以言之月令云是月也土潤溽暑天氣下降地氣上騰想得春夏間天轉稍慢故氣候緩散昏昏然而南方為尤甚至秋冬則天轉益急故氣候清明宇宙澄曠所以說天高氣清以其轉急而氣緊也僩海那岸便與天接或疑百川赴海而海不溢曰蓋是乾了有人見海邊作旋渦吸水下去者直卿云程子大爐价之說好方子海水無邊那邊只是氣蓄得在揚海水未嘗溢者莊周所謂沃焦土是也德明潮之遲速大小自有常舊見明州人說月加子午則潮長自有此理沈存中筆談說亦如此德明陸子靜謂潮是子午月長沈存中續筆談之說亦如此謂月在地子午之方初一卯十五酉方子蔡伯靖曰山本同而末異水本異而末同義剛問先生前日言水隨山行何以驗之曰外面底水在山下中間底水在脊上行因以指為喻曰外面底水在指縫中行中間底水在指頭上行又曰山下有水今浚井底人亦看山脈節冀都是正天地中間好箇風水山脈從雲中發來雲中正高脊處自脊以西之水則西流入于龍門西河自脊以東之水則東流入于海前面一條黃河環繞右畔是華山聳立為虎自華來至中為嵩山是為前案遂過去為泰山聳于左是為龍准南諸山是第二重案江南諸山及五嶺又為第三四重案淳義剛同堯都中原風水極佳左河東太行諸山相遶海島諸山亦皆相向右河南遶直至泰山湊海第二重自蜀中出湖南出廬山諸山第三重自五嶺至明越又黑水之類自北纏繞至南海泉州常平司有一大圖甚佳揚河東地形極好乃堯舜禹故都今晉州河中府是也左右多山黃河繞之嵩華列其前廣上黨即今潞州春秋赤狄潞氏即其地也以其地極高與天為黨故曰上黨上黨太行山之極高處平陽晉州蒲阪山之盡頭堯舜之所都也河東河北諸州如太原晉陽等處皆在山之兩邊窠中山極高闊伊川云太行千里一塊石山後是忻代諸州泰山卻是太行之虎山又問平陽蒲阪自堯舜後何故無人建都曰其地磽瘠不生物人民朴陋儉嗇故惟堯舜能都之後世侈泰如何都得僩河東河北皆遶太行山堯舜禹所都皆在太行下揚太行山一千里河北諸州皆旋其趾潞州上黨在山脊最高處過河便見太行在半天如黑雲然揚或問天下之山西北最高曰然自關中一支生下函谷以至嵩山東盡泰山此是一支又自嶓冢漢水之北生下一支至揚州而盡江南諸山則又自岷山分一支以盡乎兩浙閩廣僩江西山皆自五嶺贛上來自南而北故皆逆閩中卻是自北而南故皆順揚閩中之山多自北來水皆東南流江浙之山多自南來水多北流故江浙冬寒夏熱僩仙霞嶺在信州分水之右其脊脈發去為臨安又發去為建康義剛江西山水秀拔生出人來便要硬做升卿荊襄山川平曠得天地之中有中原氣象為東南交會處耆舊人物多最好卜居但有變則正是兵交之衝又恐無唣類義剛要作地理圖三箇樣子一寫州名一寫縣名一寫山川名仍作圖時須用逐州正斜長短闊狹如其地形糊紙葉子以剪振或問南北對境圖曰天下大川有二止河與江如淮亦小只是中間起虜中混同江卻是大川李德之問薛常州九域圖如何曰其書細碎不是著書手段予決九川距四海了卻逐旋爬疏小江水令至川此是大形勢蓋卿先生謂張倅云向於某人家看華夷圖因指某水云此水將有入淮之勢其人曰今其勢已自如此先生因言河本東流入海後來北流當時亦有填河之議今乃向南流矣力行某說道後來黃河必與淮河相并伯恭說今已如此問他如何見得伯恭說見薛某說又曰元豐間河北流自後中原多事後來南流虜人亦多事近來又北流見歸正人說或錄云因看劉樞家中原圖黃河卻自西南貫梁山泊迤邐入淮來神宗時河北流故虜人盛今卻南來故其埶亦衰又曰神宗時行淤田策行得甚力差官去監那箇水也是肥只是未蒙其利先有衝頹廬舍之患潘子善問如何可治河決之患曰漢人之策令兩旁不立城邑不置民居存留些地步與他不與他爭放教他寬教他水散漫或流從這邊或流從那邊不似而今作堤去圩他元帝時募善治河決者當時集眾議以此說為善又問河決了中心平處卻低如何曰不會低他自擇一箇低處去又問雍州是九州那裏高曰那裏無甚水又曰禹貢亦不可考其次第那如經量門簿所謂門簿者載此一都有田若干有山若干節御河是太行之水出來甚清周世宗取三關是從御河裏去三四十日取了又曰御河之水清見底後來黃河水衝來濁了曰河北流是禹之故道又曰不是禹之故道近禹之故道節仲默問有兩漢水如何有一水謂之西漢江曰而今如閬州等處便是東川東川卻有一支出來便是西漢江即所謂嘉陵江也義剛南康郡治張齊賢所建蓋兩江之咽喉古人做事都有意思又如利州路卻有一州在劍閣外方子漢荊州刺史是守襄陽魏晉以後以江陵為荊州節吳大年曰呂蒙城在郢州其城方其中又有數重形址如井今猶存義剛道州即舂陵武帝封子為舂陵王後徙居鄧州至今鄧州亦謂之舂陵義剛漢時人仕宦於瓜州者更極前面亦有人往長安西門至彼九千九百九十九里揚
