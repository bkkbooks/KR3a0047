body:
  text: 朱子語類卷第三十四論語十六述而篇述而不作章徐兄問述而不作是制作之作乎曰是孔子未嘗作一事如刪詩定書皆是因詩書而刪定又問聖人不得時得位只如此聖人得時得位時更有制作否曰看聖人告顏子四代禮樂只是恁地恐不大段更有制作亦因四代有此禮樂而因革之亦未是作處又問如何作春秋恐是作否曰其事則齊桓晉文其文則史其義則丘竊取之矣看來是寫出魯史中間微有更改爾某嘗謂春秋難看平生所以不敢説著如何知得上面那箇是魯史舊文那箇是夫子改底字若不改時便只依魯史如何更作春秋做甚先生徐云知我者其惟春秋乎罪我者其惟春秋乎又公羊穀梁傳云其辭則丘有罪焉耳這是多少擔負想亦不能不是作不知是如何賀孫録意同蜚卿問信而好古曰既信古又好古今人多是信而不好或好而不信如好之者則曰他也且恁地説信之者雖知是有箇理恁地畢竟多欠了箇篤好底意思道夫行夫問述而不作章曰雖説道其功倍於作者論來不知所謂刪者果是有刪否要之當時史官收詩時已各有編次但到孔子時已經散失故孔子重新整理一番未見得刪與不刪如云吾自衛反魯然後樂正雅頌各得其所云各得其所則是還其舊位賀孫集注默而識之章宜久問默而識之章曰此雖非聖人極致然豈易能默而識之若不是必與理契念念不忘者不能學不厭如人之為學有些小間斷時便是厭教不倦如以他人之事為不切於己便是倦今學者須是將此三句時時省察我還能默識否我學還不厭否我教還不倦否如此乃好時舉默而識之至誨人不倦是三節雖非聖人之極致在學者亦難如平時講貫方能記得或因人提撕方能存得若默而識之乃不言而存諸心非心與理契安能如此學不厭在學者久亦易厭視人與己若無干涉誨之安能不倦此三者亦須是心無間斷方能如此植問默而識之曰是得之於心自不能忘了非是聽得人説後記得節問默而識之曰如顏子得一善則拳拳服膺而弗失猶是執捉住這箇卻是聞一善言見一善行便如己有而弗失矣燾默而識之者默不言也不言而此物常在也今人但説著時在不説時不在非禮勿視要和根株取不是只禁你不看聽言動皆然祖道鄭問何有於我哉曰此語難説聖人是自謙言我不曾有此數者聖人常有慊然不足之意衆人雖見他是仁之至熟義之至精它只管自見得有欠闕處賀孫讀默而識之章曰此必因人稱聖人有此聖人以謙辭答之後來記者卻失上面一節只做聖人自話記了默而識之便是得之於心學不厭便是更加講貫誨不倦便是施於人也時舉問何有於我哉恐是聖人自省之辭蓋聖人以盛德之至猶恐其無諸己而自省如此亦謙己以勉人之意曰此等處須有上一截話恐是或有人説夫子如何故夫子因有此言如達巷黨人所言如此故夫子曰吾何執執御乎執射乎吾執御矣今此章卻只是記録夫子之語耳如曰二三子以我為隱乎吾無隱乎爾亦必因門人疑謂有不盡與他説者故夫子因有是言也必大德之不修章或問此章曰須實見得是如何德是甚麼物事如何喚做修如何喚做不修人而無欲害人之心這是德得之於吾心也然害人之心或有時而萌者是不能修者也德者道理得於吾心之謂修者言好修治之之謂更須自體之須把這許多説話做自家身上説不是為別人説問徙義與改不善兩句意似合掌曰聖人做兩項説在試剖析令分明徙義是做這件事未甚合宜或見人説見人做得恰好自家遷在合宜處不善便是全然不是這須重新改換方得賀孫叔器問德之不修可以包下三句否曰若恁地夫子但説一句便了何用更説四句徙義改過略似修德裏面事然也別是箇頭項講學自是講學修德自是修德如致知格物是講學誠意正心修身是修德博學審問慎思明辨是講學篤行是修德若徙義改不善如何地分叔器未及對曰不善是自家做得淫邪非僻底事徙義是雖無過惡然做得未恰好便是不合義若聞人説如何方是恰好便當徙而從之聖人説這幾句淺深輕重盡在裏面聞義不能徙底罪小不善不能改底罪大但聖人不分細大都説在裏面學者皆當著工夫義剛此四句修德是本為要修德故去講學下面徙義改過即修德之目也行父問先知德不可不修方知學不可不講能講學方能徙義能徙義方能改不善如此看如何曰修德是本修德恰似説入則孝出則弟謹而信泛愛衆而親仁學不可不講恰似説行有餘力則以學文或問徙義改不善之別曰徙義不是説元初做不是元初本心自是好但做得錯了做得不合宜如所謂皆以善為之而不知其義才移教合義理便是全好若不善則是元初便做得不是須都改了方得徙義是過失不善是罪犯賀孫恪録別出行父問德之不修一段曰須先理會孝弟忠信等事有箇地位然後就這裏講學聞義不能徙這一件事已是好事但做得不合義見那人説如此方是義便移此之不義以從彼之義不善則已是私意了上面是過失下面是故犯恪德之不修如有害人之心則仁之德不修有穿窬之心則義之德不修仁之德修則所言無不仁之言所行無不仁之行義之德修則所言無不義之言所行無不義之行淵録云實得仁於心則發出來為仁之言做出來為仁之行實得義於心則發出來為義之言做出來為義之行聞義不能徙不善不能改二句雖似合掌卻有輕重淺深聞義者尚非有過但不能徙義耳至於不善則是有過而不能改其為害大矣植南升録別出德之不修如無害人之心則仁之德修無穿窬之心則義之德修聞義不能徙是見得自家事未合宜及聞合宜事便徙而就之不善則是有過惡了如此説方不合掌南升或問德之不修一章曰遷善改過是修德中緊要事蓋只修德而不遷善改過亦不能得長進又曰遷善改過是兩項不是説改其過而遷於善遷善便是有六七分是二三分不是自家卻見得那二三分是處即遷而就之要教十分是著改過則是十分不好全然要改此遷善改過之別如通書中云君子乾乾不息於誠便是修德底事下面便是接説遷善改過底事意正相類燾立之問此章曰德是理之既得於吾心者便已是我有底物事了更須日日磨礱勿令間斷始得徙義與改不善一似合掌然須著與他分別蓋義是事之宜處我做這一件事覺得未甚合宜便著徙令合宜此卻未見得有不善處至不善便是有過惡須著速改始得此所以有輕重之別又問此四句若要連續看如何曰才要連續便是説文字不是要著實做工夫若著實做工夫便一句自是一句時舉李問此章曰此四句是四件事不可一滾説了下面兩句粗看只是一件事一般然此兩句自有輕重蓋見義不能徙此只是些子未合宜處便當徙而從宜不善不能改則大段已是過惡底事便當改了此一句較重雉讀德之不修章曰此自是四句若要合説便是德須著修於己講學便更進其德到徙義改過始是見之於行事須時時要點檢如此説卻相連續也時舉問聞義不能徙不善不能改先生云有輕重其意如何曰義宜也事須要合宜不能徙未為不是卻不合宜那不善底卻重須便打并了叔重云聞義不能徙較輕曰那箇大體卻無邪惡又曰聞義不能徙較密於不善不能改不善不能改較重於聞義不能徙節德之不修至是吾憂也這雖是聖人以此教人然學不厭之意多見於此使有一毫自以為聖任其自爾則雖聖而失其聖矣賀孫又曰此是聖人自憂也聖人固無是四者之憂所以然者亦自貶以教人之意謨子之燕居章叔器問申申夭夭之義曰申申是言其不局促是心廣體胖後恁地申申舒泰夭夭好貌觀桃之夭夭是少好之貌則此亦是恁地所謂色愈只是和悅底意思但此只是燕居如此在朝及接人又不然義剛問申申夭夭聖人得於天之自然若學者有心要收束則入於嚴厲有心要舒泰則入於放肆惟理義以養其氣養之久則自然到此否曰亦須稍嚴肅則可不然則無下手處又曰但得身心收斂則自然和樂又曰不是別有一箇和樂才整肅則自和樂恪甚矣吾衰章據文勢時甚矣吾衰也是一句久矣吾不復夢見周公是一句惟其久不夢見所以見得是衰若只是初不夢見時也未見得衰處此也無大義理但文勢當是如此義剛孔子固不應常常夢見周公然亦必曾夢見來故如此説然其所以如此説之意卻是設詞必大蜚卿問孔子夢周公若以聖人欲行其道而夢之耶則是心猶有所動若以壯年道有可行之理而夢之耶則又不應虛有此兆朕也曰聖人曷嘗無夢但夢得定耳須看它與周公契合處如何不然又不見別夢一箇人也聖人之心自有箇勤懇惻怛不能自已處自有箇脫然無所繫纍處要亦正是以此卜吾之盛衰也砥問夢周公是真夢否曰當初思欲行周公之道時必亦是曾夢見曰恐涉於心動否曰心本是箇動物怎教它不動夜之夢猶寤之思也思亦是心之動處但無邪思可矣夢得其正何害心存這事便夢這事常人便胡夢了宇録此下云孔子自言老矣以周公之道不可得行思慮亦不到此故不復夢甚歎其衰如此居甫舉莊子言至人無夢曰清淨者愛恁地説佛老家亦説一般無夢底話淳宇同吾不復夢見周公自是箇徵兆如此當聖人志慮未衰天意難定八分猶有兩分運轉故他做得周公事遂夢見之非以思慮也要之精神血氣與時運相為流通到鳳不至圖不出明王不興其徵兆自是恁地胡文定公謂春秋絶筆於獲麟為志一則動氣意思説得也甚好但以某觀之生出一箇物事為人所斃多少是不好是亦一徵兆也道夫問設當孔子晚年時君有能用之則何如曰便是不衰如孔子請討陳恆時已年七十一到此也做得箇甚又問程子謂孔子之志必將正名其罪上告天子下告方伯而率與國以討之不知天子果能從乎曰當時惟在下者難告問果爾則告命稽違得無有不及事之悔乎曰使哀公能從則聖人必一面行將去聞於周王使知之耳道夫問甚矣吾衰也曰不是孔子衰是時世衰又曰與天地相應若天要用孔子必不教他衰如太公武王皆八九十歲夫子七十餘想見纍垂節戴少望謂顏淵子路死聖人觀之人事鳳鳥不至河不出圖聖人察之天理不復夢見周公聖人驗之吾身夫然後知斯道之果不可行而天之果無意於斯世也曰這意思也發得好道夫夢周公忘肉味祭神如神在見得聖人真一處理會一事便全體在這一事道夫問孔子夢周公卻是思曰程先生如此説意欲説孔子不真見周公然見何害可學問伊川以為不是夢見人只是夢寐常存行周公之道耳集注則以為如或見之不知果是如何曰想是有時而夢見既分明説夢見周公全道不見恐亦未安又問夫子未嘗識周公夢中烏得而見之曰今有人夢見平生所不相識之人卻云是某人某人者蓋有之夫子之夢固與常人不同然亦有是理耳壯祖集注集義問此章曰孔子未衰以前常夢見周公矣伊川卻言不曾夢見何也曰聖人不應日間思量底事夜間便夢見如高宗夢傅説卻是分明有箇傅説在那裏高宗不知所以夢見亦是朕兆先見者如此孔子夢奠兩楹事豈是思慮後方夢見此説甚精微但於此一章上説不行今且得從程子説去偽志於道章問志於道曰思量講究持守踐履皆是志念念不舍即是總説須是有許多實事夔孫吉甫説志於道處曰志於道不是只守箇空底見解須是至誠懇惻念念不忘所謂道者只是日用當然之理事親必要孝事君必要忠以至事兄而弟與朋友交而信皆是道也志於道者正是謂志於此也時舉道理也是一箇有條理底物事不是囫圇一物如老莊所謂恍惚者志於道只是存心於所當為之理而求至於所當為之地非是欲將此心繫在一物之上也端蒙志於道如講學力行皆是據於德則是這箇物事已成箇坯璞子了義剛問據於德曰如孝便是自家元得這孝道理非從外旋取來據於德乃是得這基址在這裏植據於德德者得之於身然既得之守不定亦會失了須常照管不要失了須是據守方得明作問據於德云云曰德者吾之所自有非自外而得也以仁義禮智觀之可見韓退之云德足乎己無待乎外説得也好南升道者人之所共由如臣之忠子之孝只是統舉理而言德者己之所獨得如能忠能孝則是就做處言也依仁則又所行處每事不違於仁端蒙志於道方有志焉據於德一言一行之謹亦是德依於仁仁是衆善總會處德明道是日用常行合做底德是真箇有得於己仁謂有箇安頓處季札先生問正淳曾聞陸子壽志於道之説否正淳謂子壽先令人立志曰只做立志便虛了聖人之説不如此直是有用力處且如孝於親忠於君信於朋友之類便是道所謂志只是如此知之而已未有得於己也及其行之盡於孝盡於忠盡於信有以自得於己則是孝之德忠之德信之德如此然後可據然只志道據德而有一息之不仁便間斷了二者皆不能有卻須據於德後而又依於仁正淳謂這箇仁是據發見説曰既見於德亦是發見處然仁之在此卻無隱顯皆貫通不可專指為發見人傑録云志於道是君臣父子夫婦兄弟朋友之道明得此理得之於身斯謂據於德然而不依於仁則二者皆為無用矣依仁不止於發見凡內外隱顯莫非仁也正卿問志道據德依仁曰志於道猶是兩件物事據於德謂忠於君則得此忠孝於親則得此孝是我之得於己者也故可據依仁則是平日存主處無一念不在這裏又是據於德底骨子時舉正卿問志道據德依仁曰德是自家心下得這箇道理如欲為忠而得其所以忠如欲為孝而得其所以孝到得依於仁則又不同依仁則是此理常存於心日用之間常常存在據德依仁雖有等級不比志道與據德依仁全是兩截志只是心之所之與有所據有所依不同也賀孫問據於德依於仁曰德只是做這一件事底意思據而勿失仁又親切又問仁是全體德只是一事之德否曰然又曰事父母則為孝德事兄長則為悌德德是有得於心是未事親從兄時已渾全是孝弟之心此之謂德必大先生問學者據德依仁如何分別學者纍日説皆不合乃曰德是逐件上理會底仁是全體大用當依靠處又曰據德是因事發見底如因事父有孝由事君有忠依仁是本體不可須臾離底據德如著衣喫飯依仁如鼻之呼吸氣僩德是道之實仁是德之心道夫行夫問志道據德依仁遊藝曰志於道方是要去做方是事親欲盡其孝事兄欲盡其弟方是恁地至據於德則事親能盡其孝事兄能盡其弟便自有這道理了卻有可據底地位才説盡其孝便是據於孝雖然如此此只是就事上逐件理會若是不依於仁不到那事親事兄時此心便沒頓放處依於仁則自朝至暮此心無不在這裏連許多德總攝貫穿都活了志於道方要去做據於德則道方有歸著雖有歸著猶是在事上依於仁則德方有本領雖然藝亦不可不去理會如禮樂射御書數一件事理會不得此心便覺滯礙惟是一一去理會這道理脈絡方始一一流通無那箇滯礙因此又卻養得這箇道理以此知大則道無不包小則道無不入小大精粗皆無滲漏皆是做工夫處故曰語大天下莫能載語小天下莫能破恪志於道據於德依於仁遊於藝先生曰志者心之所之道者當為之理為君有君之理為臣有臣之理志於道者留心於此理而不忘也德者得也既得之則當據守而弗失仁者人之本心也依如依乎中庸之依相依而不捨之意既有所據守又當依於仁而不違如所謂君子無終食之間違仁是也遊於藝一句比上三句稍輕然不可大段輕説如上蔡云有之不害為小人無之不害為君子則是太輕了古人於禮樂射御書數等事皆至理之所寓遊乎此則心無所放而日用之間本未具舉而內外交相養矣或言志於道正如顏子仰高鑽堅以求至乎聖人之地否曰若如此説便是要將此心寄在道裏面底説話道只是人所當行之道自有樣子如為人父止於慈為人子止於孝只從實理上行不必向渺茫中求也謨叔器説志於道云知得這箇道理從而志之曰不特是知得時方志便未知而有志於求道也是志德是行其道而有得於心雖是有得於心而不失然也須長長執守方不失如孝行之已得則固不至於不孝若不執守也有時解走作如忠行之已得則固不至於不忠若不執守也有時解有脫落處這所以下一據字然而所以據此德又只要存得這心在存得這心在時那德便自在了所以説依於仁工夫到這裏又不遺小物而必遊於藝叔器因言禮樂射御書數自秦漢以來皆廢了曰射如今秀才自是不曉御是而今無車書古人皆理會得如偏旁義理皆曉這也是一事數是算數而今人皆不理會六者皆實用無一可缺而今人是從頭到尾皆無用小兒子教他做詩對大來便習舉子業得官又去習啓事雜文便自稱文章之士然都無用處所以皆不濟事漢時雖不以射取士然諸生卻自講射一年一次依儀禮上説會射一番卻尚好今世以文取士如義若教它依經旨去説些道理尚得今卻只是體貼字句就這兩三句題目上説去全無義理如策若是著實論些時務也尚得今卻只是虛説説得好底凛地不得包顯道言向前義是先引傳注數條後面卻斷以己意如東坡數條卻尚得先生然之義剛或問志道據德依仁遊藝曰德是行來行去行得熟已成箇物事了惟這箇物事已得於我故孝也是這物事流出來做孝忠也是這物事流出來做忠若只説為子盡孝為臣盡忠這只説得盡説德不得蓋德是得這物事於我故事親必孝必不至於不孝事君必忠必不至於不忠若今日孝明日又不孝今日忠明日又不忠是未有得於我不可謂之德惟德是有得於我者故可據守之也若是未有得於我則亦無可據者又問此是成德否曰便恁地説也不得若做這物事未成就時一箇物事是一箇物事在孝只是孝忠只是忠惟做來做去湊足成就一箇物事貫通時則千頭萬件都只是這一箇物事流出來道家所謂安養成胎蓋德是百行之胎也所以君子以成德為行依於仁仁是箇主即心也依於仁則不失其本心既不失其本心則德亦自然有所據若失其本心則與那德亦不見矣遊於藝蓋上三句是箇主腦藝卻是零碎底物事做那箇又來做這箇是遊來遊去之謂也然亦不可遊從別處去須是遊於藝方得又云説行時只可言志於道不可謂之德又云成德只是要成此德燾問自志於道到依於仁工夫到這處縝密較易些否曰似恁地都是難問此是顏子不違仁地位否先生問如何知得顏子能如此它人不能曰顏子亞聖之資固易為力若它人用工深亦須到這處曰這處先要就志於道上理會志於道便恁地利恁地好這須知是箇生死路頭因以手指分作兩邊去云這一邊是死路那一邊去是生路這去便善那去便惡知得此路是了只管向此路去念念不忘處己也在是接人也在是講論也在是思索也在是今人把捉不定要做這邊去又要做那邊去一出一入或東或西以夫子十五志於學三十而立四十而不惑五十而知天命皆是從志學做來著工夫須看得聖人志於學處是如何這處見得定後去節節有下工夫處據於德德者得也便是我自得底不是徒恁地知得便住了若徒知得不能得之於己似説別人底於我何干如事親能孝便是我得這孝事君能忠便是我得這忠説到德便是成就這道方有可據處但據於德固是有得於心是甚次第然亦恐怕有走作時節其所存主處須是依於仁自得於心不可得而離矣到遊藝猶言學文雖事未甚要緊然亦少不得須知那箇先那箇後始得亦所以助其存主也宇問若是志於道據於德則雖初學便可如此下功且如據於德則得寸守寸得尺守尺若是依於仁則仁是指全體而言如何便解依得它曰所謂據於德亦須是真箇有是德方可據守如事親時自無不孝方是有孝之德其餘亦然亦非初學遽可及也依仁只是此心常在不令少有走作也因言周禮先説知仁聖義中和孝友睦姻任恤此是教萬民底事又説教國子以三德曰至德以為道本敏德以為行本孝德以知逆惡至德謂德之全體天下道理皆由此出如所謂存以養性之事是也故以此教上等人若次一等人則教以敏德為行本敏是強敏之謂以敏德教之使之見善必遷有過必改為學則強力任事則果決亦是一等特立獨行之人若又次一等則教以孝德以知逆惡使它就孝上做將去熟於孝則知逆惡之不可為夫是三者必相兼若能至德則自兼那兩事若自下做去亦可以到至德處若只理會箇至德而無下二者則空疏去又曰自志於道至依於仁是從粗入精自依於仁至遊於藝是自本兼末能依於仁則其遊於藝也蓋無一物之非仁矣因舉橫渠語云天體物而不遺猶仁體事無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾遊衍無一物之不體也此是橫渠赤心片片説與人如荀揚何嘗有這樣説話廣志於道志之一字不徒是知已是心中放它不下據於德是行道而得之於己然此都且就事上説至依於仁則無物欲之纍而純乎天理道至此亦活德至此亦活卻亦須遊於藝問小學禮樂射御書數之文是藝否曰此雖小學至依於仁既熟後所謂小學者至此方得他用夔孫據於德德謂得之於心有這箇物事了不待臨時旋討得來且如仁義禮智有在這裏不待臨時旋討得來又曰德是自家有所得處在這裏且如事親孝則孝之理得事兄弟則弟之理得所謂在這裏但得有淺深又曰志於道據於德説得尚粗到依於仁方是工夫細密遊於藝者乃是做到這裏又當養之以小物植據於德有時也會失了必依於仁此心常存則照管得到能守是德矣遊於藝似若無緊切底事然能如此則是工夫大故做得到了所謂庸言之信庸行之謹也夔孫讀書須將聖賢言語就自家身上做工夫方見事事是實用如志道據德依仁遊藝將來安排放身上看看道是甚麼物事自家如何志之以至據德依仁遊藝亦莫不然方始有得道夫子升問上三句皆有次序至於藝乃日用常行莫不可後否曰藝是小學工夫若説先後則藝為先而三者為後若説本末則三者為本而藝其末固不可徇末而忘本習藝之功固在先遊者從容潛玩之意又當在後文中子説聖人志道據德依仁而後藝可遊也此説得自好木之或問遊者玩物適情之謂玩物適情安得為善曰遊於藝一句是三字公卻只説得一字人傑集注自行束修章古人空手硬不相見束修是至不直錢底羔雁是較直錢底真宗時講筵説至此云聖人教人也要錢義剛不憤不啓章問憤悱曰此雖聖人教人之語然亦學者用力處敬仲學者至憤悱時其心已略略通流但心已喻而未甚信口欲言而未能達故聖人於此啓發之舉一隅其餘三隅須是學者自去理會舉一隅而不能以三隅反是不能自用其力者孔子所以不再舉也謨憤悱是去理會底若不待憤悱而啓發之不以三隅反而復之則彼不惟不理會得且聽得亦未將做事燾悱非是全不曉底也曉得三五分只是説不出問伊川謂必待誠至而後告之曰憤悱便是誠意到不憤悱便是誠不到節凡物有四隅舉一隅則其三隅之理可推若不能以三隅反則於這一隅亦恐未必理會得在舉一隅以三隅反只是告往知來否曰只是凡方者一物皆有四隅植或問程子曰待憤悱而後發則沛然矣如何是沛然底意思曰此正所謂時雨之化譬如種植之物人力隨分已加但正當那時節欲發生未發生之際卻欠了些子雨忽然得這些子雨來生意豈可禦也子食於有喪者之側章子食於有喪者之側未嘗飽子於是日哭則不歌此是聖人天理燾問食於有喪之側而未嘗飽亦以其哀傷之極足以感動人心自不能飽也曰哀是哀死者不干生人事所謂哭死而哀非為生者也若喪家極哀又能使人愈哀耳又有喪家人全不以死者為念視之若無反使人為之悲哀者同元德記燾子食於有喪之側未嘗飽也有食不下咽之意謨子於是日哭則不歌不要把一個誠字包卻須要識得聖人自然重厚不輕浮意思時舉問博文亦可以學道而上蔡解哭則不歌謂能識聖人之情性然後可以學道曰聖人情性便是理又曰博文約禮亦是要識得聖人情性思曰睿只是思會睿節集義子於是日哭則不歌上蔡説得亦有病聖人之心如春夏秋冬不遽寒燠故哭之日自是不能遽忘又曰聖人終不成哭了便驟去歌得如四時也須漸漸過去道夫録云其變也有漸且如古者喪服自始死至終喪中間節次漸漸變輕不似如今人直到服滿一頓除脫了便著華采衣服賀孫道夫同問謝氏之説曰謝氏之學大抵習忘如以三月不知肉味反是病和韶樂都忘之方是必大子謂顏淵曰章讀用之則行舍之則藏章曰專在則字上如可以仕則仕可以久則久之類是也時舉此八字極要人玩味若他人用之則無可行舍之則無可藏唯孔子與顏淵先有此事業在己分內若用之則見成將出來行舍之則藏了它人豈有是哉故下文云唯我與爾有是夫有是二字當如此看謨問尹氏曰命不足道也曰如常人用之則行乃所願舍之則藏非所欲舍之則藏是自家命恁地不得已不奈何聖人無不得已底意思聖人用我便行舍我便藏無不奈何底意思何消更言命又曰命不足道也命不消得更説又曰知命不足道也節問命不足道也曰到無可奈何處始言命如云道之將行也與命也道之將廢也與命也此為子服景伯説時舉録云聖人説命只是為中人以下説聖人欲曉子服景伯故以命言如曰有命是為彌子瑕説聖人用之則行舍之則藏未嘗到那無可奈何處何須説命如一等人不知有命又一等人知有命猶自去計較中人以上便安於命到得聖人便不消得言命夔孫問用舍行藏章曰聖人於用舍甚輕沒些子緊要做用則行舍則藏如晴乾則著鞋雨下則赤腳尹氏云命不足道蓋不消言命也植義剛曰用舍係乎道之盛衰行藏以道而舒卷己之窮達非所計故曰命不足道曰用舍是由在別人不由得我行藏是由在那人用舍亦不由得我仲默問這命只是君子不謂命也之命否曰是義剛用舍無預於己行藏安於所遇命不足道也蓋只看義理如何都不問那命了雖使前面做得去若義去不得也只不做所謂殺一不辜行一不義而得天下有所不為若中人之情則見前面做不得了方休方委之於命若使前面做得它定不肯已所謂不得已而安之命者也此固賢於世之貪冒無恥者然實未能無求之之心也聖人更不問命只看義如何貧富貴賤惟義所在謂安於所遇也如顏子之安於陋巷它那曾計較命如何陶淵明説盡萬千言語説不要富貴能忘貧賤其實是大不能忘它只是硬將這箇抵拒將去然使它做那世人之所為它定不肯做此其所以賢於人也或云看來淵明終只是晉宋間人物曰不然晉宋間人物雖曰尚清高然箇箇要官職這邊一面清談那邊一面招權納貨淵明卻真箇是能不要此其所以高於晉宋人也或引伊川言晉宋清談因東漢節義一激而至此者曰公且説節義如何能激而為清談或云節義之禍在下者不知其所以然思欲反之所以一激而其變至此曰反之固是一説然亦是東漢崇尚節義之時便自有這箇意思了蓋當時節義底人便有傲睨一世汙濁朝廷之意這意思便自有高視天下之心少間便流入於清談去如皇甫規見雁門太守曰卿在雁門食雁肉作何味那時便自有這意思了少間那節義清苦底意思無人學得只學得那虛驕之氣其弊必至於此僩問用舍行藏曰此有數節最好仔細看未説到用舍行藏處且先看箇毋意毋必底意此是甚底心渾然是箇天理尹氏謂命不足道此本未有此意亦不可不知也蓋知命者不得已之辭人要做這事及至做不得則曰命是心裏猶不服他若聖賢用之則行舍之則藏更不消得説命到説臨事而懼好謀而成八字雖用舍行藏地位遠了然就此地頭看也自好某嘗謂聖人之言好如荷葉上水珠顆顆圓這臨事而懼便是戎慎恐懼底心若有所恐懼心驚膽畏便不得了孟子説禹惡旨酒而好善言湯立賢無方文王望道而未之見武王不泄邇不忘遠周公思兼三王許多事皆是聖人事然有小大不同如惡旨酒乃是事之小者思兼三王乃是事之大者然亦都是一箇戒慎恐懼底心人心多縱弛便都放去若是聖人行三軍這便是不易之法非特行軍如此事事皆然莊子庖丁解牛神妙然每到族心必怵然為之一動然後解去心動便是懼處豈是似醉人恣意胡亂做去韓文鬥雞聯句云一噴一醒然再接再礪乃謂都困了一以水噴之則便醒一噴一醒所謂懼也此是孟郊語也説得好又問觀此處則夫子與顏子一般了曰到此地位大節也同了如孟子説伯夷伊尹與夫子是則同處看伯夷伊尹與夫子豈是一樣人但是此大節處同若此處不同則不足為聖人矣夔孫義剛録別出叔器説用之則行章曰命是有箇必得底意及不得則委之於命聖人只是用之則行舍之則藏如孟子所説求之有道得之有命此卻是為中才發聖人自是不論到這裏然此只是尹氏添此一腳本文非有此意臨事而懼好謀而成比用之則行舍之則藏固是大相遠但這裏面道理也自完具無欠無剩某嘗説聖人言語如荷葉上水珠子一顆一顆圓叔器問顏子與聖人同否曰大節目也同如孟子説伯夷伊尹孔子得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為也是則同這便是大節目處皆同若是這箇不同時便不喚做聖人了只是纖細縝密論來卻有不同處又曰這一章有四五節道理義剛子路説子行三軍則誰與雖無私意然猶有固必之心人傑子行三軍則誰與宜作相與之與非許與之之與好謀而成人固有好謀者然疑二不決往往無成者多矣孔子行三軍其所與共事者必臨事而懼好謀而成者也謨亞夫問子行三軍則誰與曰三軍要勇行三軍者要謀既好謀然須要成事蓋人固有好謀而事不成者卻亦不濟事時舉因云謀在先成在後成非勇亦不能決曰然時舉好謀而成既謀了須是果決去做教成若徒謀而不成何益於事所謂作舍道旁三年不成者也臨事而懼是臨那事時又須審一審蓋間時已自思量都是了都曉得了到臨事時又更審一審這懼字正如安而後能慮底慮字相似又曰而今只是據本子看説行三軍是如此試把數千人與公去行看好皇恐僩問用之則行舍之則藏竊意漆雕曾閔亦能之曰舍之則藏易用之則行難若開用之未必能行也聖人規模大藏時不止藏他一身煞藏了事譬如大船有許多器具寶貝撑去則許多物便都住了衆人便沒許多力量然聖人行藏自是脫然無所係纍救世之心雖切然得做便做做不得便休他人使有此若未用時則切切於求行舍之則未必便藏耿直之向有書云三代禮樂制度盡在聖人所以用之則有可行某謂此固其可行之具但本領更全在無所係纍處有許大本領則制度默化出來都成好物故在聖人則為事業衆人沒那本領雖盡得他禮樂制度亦只如小屋收藏器具窒塞都滿運轉都不得砥問楊氏曰樂則行之憂則違之孔顏之所同天下文明則孔子而已矣其義如何曰龜山解經常有箇纏底病如解苗而不秀章云必有事焉而勿正勿忘勿助長則苗斯秀秀斯實矣初亦不曉其説徐觀之乃是因苗字牽引上揠苗又纏上勿忘勿助耳此章取易來如此比並固亦可通然於本旨無所發明卻外去生此議論必大集義富而可求章讀富而可求章曰須要仔細看富而可求也一句上面自是虛意言而可求便是富本不可求矣因舉君子贏得做君子小人枉了做小人之説又云此章最見得聖人言語渾成底氣象須要識得時舉子在齊聞韶章史記子在齊聞韶音學之三月不知肉味三月當作一點蓋是學韶樂三月耳非三月之久不知肉味也去偽夫子之心與韶樂相契所以不知肉味又有習之三月之説泳子聞韶音學之三月不知肉味學之一節不知如何今正好看其忘肉味處這裏便見得聖人之樂如是之美聖人之心如是之誠又曰聖人聞韶須是去學不解得只恁休了學之亦須數月方熟三月大約只是言其久不是真箇足頭九十日至九十一日便知肉味想見韶樂之美是能感動人是能使人視端而行直某嘗謂今世人有目不得見先王之禮有耳不得聞先王之樂此大不幸也道夫問孔子聞韶學之三月不知肉味若常人如此則是心不在焉而聖人如此何也曰此其所以為聖人也公自思量看久之又曰衆人如此則是溺於物欲之私聖人則是誠一之至心與理合不自知其如此又問聖人存心如此之切所以至於忘味曰也不是存心之切恁地又説壞了聖人它亦何嘗切切然存心要去理會這事只是心自與那道理契合只覺得那箇好自然如此耳僩吳伯英問孔子聞韶學之三月不知肉味聖人殆亦固滯不化當食之時又不免心不在焉之病若何曰主一無適是學者之功聖人行事不可以此求之也更是舜之樂盡善盡美而孔子聞之深有所契於心者所謂得志行乎中國若合符節是以學之三月而不自知其忘味也壯祖建別録見下吳伯英問心不在焉則食而不知其味是心不得其正也然夫子聞韶何故三月不知肉味曰也有時如此所思之事大而飲食不足以奪其志也且如發憤忘食吾嘗終日不食皆非常事以其所憤所思之大自不能忘也壯祖先生嘗讀他傳云孔子居齊聞韶音見齊國之人亦皆視端而形聳蓋正音所感如此升卿石丈問齊何以有韶曰人説公子完帶來亦有甚據淳問伊川以三月不知肉味為聖人滯於物今添學之二字則此意便無妨否曰是石丈引三月之證曰不要理會三月字須看韶是甚麼音調便使得人如此孔子是如何聞之便恁地須就舜之德孔子之心處看淳集義問伊川疑三月即是音字如何曰此處最要看他不知肉味處最有意思蓋夫子知韶之美一聞之則感之至深學之三月故至於不知肉味若道一聞之便三月不知肉味恐無此道理伊川疑得自是但史記上有學之二字伊川恐適不曾考到此耳觀此處須見得夫子之心與舜之心分明為一感之至深故盡心以學之念念在此而自不能忘也時舉子在齊聞韶學之三月不知肉味上蔡只要説得泊然處便有些莊老某謂正好看聖人忘肉味處始見聖人之心如是之誠韶樂如是之美又舉史記載孔子至齊促從者行曰韶樂作從者曰何以知之曰吾見童子視端而行直雖是説得異亦容有此理賀孫冉有曰夫子為衛君乎章論子貢問衛君事曰若使子貢當時徑問輒事不唯夫子或不答便做答時亦不能如此詳盡若只問伯夷叔齊何人也曰古之賢人也亦未見分曉所謂賢人如君子而不仁者有矣亦如何便見得出處一時皆當豈無怨悔處只再問怨乎便見得子貢善問才説道求仁而得仁又何怨便見得夷齊兄弟所處無非天理蒯輒父子所向無非人欲二者相去奚啻潑贄美玉直截天淵矣問子貢欲知為衛君何故問夷齊曰一箇是父子爭國一箇是兄弟讓國此是則彼非可知問何故又問怨乎曰此又審一審所以夫子言求仁得仁是就心上本原處説凡讓出於不得已便有怨夷齊之讓是合當恁地乃天理之當然又何怨大綱衛君底固為不是到此越見得衛君沒道理又問子欲正名是公子郢否曰此又是第二節事第一節須先正輒父子之名問輒尚在則如何正曰上有天子下有方伯它不當立如何不正宇夫子為衛君乎若只言以子拒父自不須疑而問今冉子疑夫子為衛君者以常法言之則衛公輒亦於義當立者也以輒當立故疑夫子必助之求仁而得仁此只是不傷其本心而已若伯夷叔齊不讓而於心終不安人之心本仁才傷著本心則便是不仁矣謨問子貢有怨乎之問何也曰夫子謂夷齊是賢人恐賢者亦有過之者於是問以決之看這事是義理合如此否如其不必讓而讓之則未必無怨悔之心矣夫子告以求仁而得仁者謂是合恁地若不恁地是去仁而失仁矣若衛君事則大不然矣子貢所以知其必不為也夔孫夫子説古之賢人也賢人固有做得間不恰好處便未知得夷齊之讓是與不是若是不必遜則終未免有怨悔若有怨悔則讓便未得為是如此則未見得夫子不為輒所以更問怨乎夫子説求仁而得仁又何怨恁地便是要讓讓方是合這道理既是以讓為合理則始知夫子之不為輒義剛只伯夷叔齊古之賢人也一句便可知得夫子不為衛君矣何故更要問怨乎這一句卻煞有説話子貢也是會問義剛安卿以書問夷齊辨論甚悉曰大概是如此但更於求仁而得仁上看道夫問安字莫便是此意否曰然但見他説得來不大段緊切故教他更於此上看曰伯夷不敢安嫡長之分以違君父之命叔齊不敢從父兄之命以亂嫡庶之義這便是求仁伯夷安於逃叔齊安於讓而其心舉無隉杌之慮這便是得仁否曰然衛君便是不能求仁耳道夫孔子論伯夷謂求仁而得仁又何怨司馬遷作伯夷傳但見得伯夷滿身是怨蘇子由伯夷論卻好只依孔子説文蔚問子貢衛君之問與去兵去食之問皆非尋常問者所及程子固常稱之而又曰孔門學者獨顏子為善問何也曰顏子之問又須親切如此事在顏子又自理會得亦不必問也必大問夫子為衛君章程子所引諫伐事或問論非此章答問本意當矣今集注全載其説不刪此語何也曰諫伐而餓固非此章本意然亦是伯夷不怨底事故程子同引來説必大集注子貢之問意只主讓國諫伐之事卻在裏面事如聖人卻是泛説燾吳伯英問夷齊讓國而去一以父命為尊一以天倫為重要各得其本心之正而盡乎天理之公矣所謂孤竹君當時或無中子之可立則二子將奈何曰縱二子不立則其宗社之有賢子弟立之可也壯祖或問伯夷叔齊之讓使無中子則二子不成委先君之國而棄之必有當立者曰伊川説叔齊當立看來立叔齊雖以父命然終非正理恐只當立伯夷或曰伯夷終不肯立奈何曰若國有賢大臣則必請於天子而立之不問伯夷情願矣看來二子立得都不安但以正理論之則伯夷分數稍優耳胡文定春秋解這一段也好説吳季札讓國事聖人不取之牽引四五事為證所以經只書吳子使札來聘此何異於楚子使椒來聘之事耶但稱名則聖人貶之深矣云云但近世説春秋皆太巧不知果然否也僩因説記録之難如劉質夫記明道説輒據位而拒父則衛之臣子去之可也輒去之而從父則衛之臣子拒蒯瞶可也是以蒯瞶為得罪於父亦不當立也後胡文定公引在春秋中説如上句説卻是但下句卻云輒去而從父則衛之臣子當輔輒以拒蒯瞶則是錯了後來胡致堂卻説立郢為是乃是救文定前説之錯至若楊文靖説此段尤不可曉文靖之意只欲破王元澤説善兄弟之遜必惡父子之爭遂有此病要之元澤此二句自好也燾集義胡家説夷齊所為全性命之理若他人謂其全性命之理猶可若謂夷齊要全性命之理而後如此為之此大害義理殺身成仁亦只是義當殺身即是成仁若為成仁而殺身便只是利心揚飯疏食章義剛説樂在其中一章先生曰這有三十來箇字但看那箇字是先只樂字是先他是先理會得那樂後方見得不義而富且貴於我如浮雲呂與叔數句説得好非是有所見如何道得到義剛問樂亦在其中聖人何為如是之樂曰正要理會聖人之心如何得恁地聖人之心更無些子渣滓故我之心淘來淘去也要知聖人之心恪樂亦在其中此樂與貧富自不相干是別有樂處如氣壯底人遇熱亦不怕遇寒亦不怕若氣虛則必為所動矣閎祖叔器説樂在其中引博文約禮曰顏子自是顏子樂與夫子也不干事這説得不相似義剛問或問謂夫子樂在其中與顏子之不改者又有間矣豈非謂顏子非樂於簞瓢特不以是而改其心之所樂至於夫子則隨所寓而樂存焉一曰不改一曰亦在文意固自不同否然程子則曰非樂疏食飲水也雖疏食飲水不能改其樂也卻似無甚異於所以論顏子者今集注乃載其説何耶曰孔顏之樂亦不必分不改是從這頭説入來在其中是從那頭説出來必大集注餘見顏樂章問上蔡云義而得富得貴猶如浮雲況不義乎曰這是上蔡説得過當此只説不義之富貴視之如浮雲不以彼之輕易吾之重若義而得富貴便是當得如何掉脫得如舜禹有天下固説道不與亦只恁地安處之又如所以長守貴也所以長守富也義當得之亦自當恁地保守堯命舜云天之曆數在爾躬允執其中四海困窮天祿永終豈是不要保守賀孫集義加我數年章問五十學易一段曰聖人學易於天地萬物之理吉凶悔吝進退存亡皆見得盡自然無差失聖人説此數句非是謾然且恁地説聖人必是見得是如此方如此説謙之文振問五十以學易曰也只就卦爻上占考其理合如何他書一事是一理易卻説得闊也有底事説在裏未有底事也説在裏又曰易須錯綜看天下甚麼事無一不出於此如善惡是非得失以至於屈伸消長盛衰看是甚事都出於此伏羲以前不知如何占考至伏羲將陰陽兩箇畫卦以示人使人於此占考吉凶禍福一畫為陽二畫為陰一畫為奇二畫為偶遂為八卦又錯綜為六十四卦凡三百八十四爻文王又為之彖象以釋其義無非陰陽消長盛衰伸屈之理聖人之所以學者學此而已把乾卦一卦看如乾元亨利貞人要做事若占得乾卦乾是純陽元者大也亨者通也其為事必大通然而雖説大亨若所為之事不合正道則亦不得其亨故雖云大亨而又利於正卦內六爻都是如此如説潛龍勿用是自家未當出作之時須是韜晦方始無咎若於此而不能潛晦必須有咎又如上九云亢龍有悔若占得此爻必須以亢滿為戒如這般處最是易之大義易之為書大抵於盛滿時致戒蓋陽氣正長必有消退之漸自是理勢如此又云當極盛之時便須慮其亢如當堯之時須交付與舜若不尋得箇舜便交付與他則堯之後天下事未可知又云康節所以見得透看他説多以盛滿為戒如云飲酒愛微醺不成使酩酊又云康節多於消長之交看又云許多道理本無不可知之數惟是康節體得熟只管體來體去到得熟後看是甚麼事理無不洞見賀孫因學者問學易無大過章曰易只有陰陽兩字分奇偶一畫是陽兩畫是陰從此錯綜推為六十四卦三百八十四爻後來文王卻就畫繫之以辭看來易元初只是畫又曰天地只是一箇陰一箇陽把來錯綜大抵陽則多吉陰則多凶吉為善凶為惡又看所處之位逐爻看之陽有時而凶陰有時而吉又曰如他經先因其事方有其文如書言堯舜禹成湯伊尹武王周公之事因有許多事業方説到那裏若無那事亦不説到那裏易則是箇空底物事未有是事預先説是理故包括得盡許多道理看人做甚事皆撞著也又曰易無思也無為也易是箇無情底物事故寂然不動占之者吉凶善惡隨事著見乃感而遂通又云易中多言正如利正正吉利永正之類皆是要人守正又云易如占得一爻須是反觀諸身果盡得那道理否如坤六二直方大不習無不利須看自家能直能方能大方能不習無不利凡皆類此又曰所謂大過如當潛而不潛當見而不見當飛而不飛皆是過又曰乾之一卦純乎陽固是好如元亨利貞蓋大亨之中又須知利在正非正則過矣又曰如坤之初六須知履霜有堅冰之漸要人恐懼修省不知恐懼修省便是過易大概欲人恐懼修省又曰文王繫辭本只是與人占底書至孔子作十翼方説君子居則觀其象而玩其辭動則觀其變而玩其占又曰夫子讀易與常人不同是他胸中洞見陰陽剛柔吉凶消長進退存亡之理其贊易即就胸中寫出這箇理植問學易無大過聖人何以有過曰只是聖人不自足之意聖人此般話也如道者三我無能聖仁吾豈敢不是聖人能如此更誰能如此程子謂學易者無大過文勢不然此章五十字誤然章之大旨在無大過不在五十上淳問五十以學易章先生舉史記云是時孔子年老已及七十欲贊易故發此語若作五十以學易全無意思問孔子少年不學易到老方學易乎曰作彖象文言以為十翼不是方讀易也問伊川以八索為過處如何曰某不敢如此説宇問伊川前一説則大過在八索之類後一説則大過在弟子之學易者俱未有定據曰史記加作假古本五十作卒字加假聲相近五十與卒字相似而併誤也此孔子繫易之時自謂假我數年卒以學易可以無大過者為此自謙之辭以教學者深以見易之道無窮也謨子所雅言章問子所雅言詩書執禮曰古之為儒者只是習詩書禮樂言執禮則樂在其中如易則掌於太卜春秋掌於史官學者兼通之不是正業只這詩書大而天道之精微細而人事之曲折無不在其中禮則節文法度聖人教人亦只是許多事僩子所雅言詩書執禮未常及易夫子常所教人只是如此今人便先為一種玄妙之説德明伊川云夫子雅素之言止於如此若性與天道不可得而聞者則在默而識之不知性與天道便於詩書執禮中求之乎曰語意不如此觀子貢説夫子之言性與天道自是有説時節但亦罕言之恭父云觀子貢此處固足以見子貢方聞性天道之妙又如説天何言哉四時行焉百物生焉天何言哉這是大段警悟他處曰這般處是大段分曉又云若實能默而識之則於詩書執禮上自見得性與天道若不實能默識得雖聖人便説出也曉不得賀孫問執禮執字恐當時自以執字目其禮非夫子方為是言曰詩書只是口説得底惟禮要當執守故孔子常説教人執禮故云詩書執禮皆雅言也不是當時自有此名賀孫集注葉公問孔子於子路章發憤忘食樂以忘憂不知老之將至云爾聖人不是有所因為甚事了如此只是意思有所憤發便至於忘食樂便至於忘憂至於不知老之將至聖人不肯半上落下直是做到底雖是聖人若自貶下之辭其實超詣卻非聖人做不得憤是感之極深樂是樂之極至聖人不是胡亂説是他真箇有發憤忘食樂以忘憂處次日再問曰如今不必説是為甚發憤或是有所感只理會他忘食忘憂發憤便至於忘食樂便至於忘憂便與聞韶不知肉味之意相似發憤忘食樂以忘憂不知老之將至云爾泛説若是謙辭然聖人之為人自有不可及處直要做到底不做箇半間不界底人非是有所因真箇或有所感發憤而至於忘食所樂之至而忘憂蓋有不知其然而不自知其老之將至也又如好古敏以求之自是謙辭學不厭教不倦亦是謙辭當時如公西華子貢自能窺測聖人不可及處蓋聖人處己之謙若平易而其所以不可及者亦在其中矣觀聖人若甚慢只是你趕他不上人傑録云子貢公西華亦自看得破問發憤忘食樂以忘憂曰聖人全體極至沒那不間不界底事發憤便忘食樂便忘憂直恁地極至大概聖人做事如所謂一棒一條痕一摑一掌血直是恁地燾問發憤忘食未知聖人發憤是如何曰要知他發憤也不得只是聖人做事超越衆人便做到極處發憤便忘食樂便忘憂若他人發憤未必能忘食樂處未必能忘憂聖人直是脫灑私欲自是惹不著這兩句雖無甚利害細看來見得聖人超出乎萬物之表因説發憤忘食樂以忘憂曰觀天地之運晝夜寒暑無須臾停聖人為學亦是從生至死只是如此無止法也僩為學要剛毅果決悠悠不濟事且如發憤忘食樂以忘憂是甚麼樣精神甚麼樣骨力因説胡季隨學蒙其為人也發憤忘食樂以忘憂不知老之將至云爾與不怨天不尤人下學而上達知我者其天乎二章固不出乎略無人欲渾然天理之意要各隨其頭面看他意思如何譬之皆金也做盞時是一樣做叉時是一樣須是隨其意思見得分明方好不然亦只鶻突而已發憤忘食是發憤便能忘食樂以忘憂是樂便能忘憂更無些小係纍無所不用其極從這頭便默到那頭但見義理之無窮不知身世之可憂歲月之有變也衆人縱如何發憤也有些無緊要心在雖如何樂終有些係纍在乎中不怨天不尤人樂天安土安於所遇無一毫之私意下學上達是天人事理洞然透徹無一毫之間隔聖人所謂上達只是一舉便都在此非待下學後旋上達也聖人便是天人則不能如天惟天無人許多病敗故獨能知之天非真有知識能知但聖人有此理天亦有此理故其妙處獨與之契合釋氏亦云惟佛與佛乃能知之正此意也伯羽對葉公之問見其事皆造極脫然無所係纍但見義理無窮不知歲月之有改莫我知之歎見其樂天安土無入而不自得天人事理洞然無毫髮之間苟有一毫之私則無以窺此境之妙故曰知我者其天乎道夫學者做得事不是須是悔悔了便不要做始得若悔了第二番又做是自不能立志又干別人甚事因問集注有未得則發憤忘食之説曰聖人未必有未得之事且如此説若聖人便有這般事是他便發憤做將去學者當悔時須是學聖人始得豈可自道我不似聖人便休卻明作集注叔器問發憤忘食樂以忘憂何以便見全體至極有非聖人不能及者曰這樣處也難説可以意曉但是見得聖人事事透徹事事做到那極致處叔器問看聖賢説話也須先識聖人是甚麼樣人賢人是甚麼樣人方見得他説得淺深曰夫子説聖人君子善人有恆等級甚分明要見等級只是孟子六謂之説如可欲之謂善便是那善人如充實之謂美等便皆是那賢人事如大而化之以上方是聖人事義剛問橫渠仲尼憤一發而至於聖之説曰聖人緊要處自生知了其積學者卻只是零碎事如制度文為之類其本領不在是若張子之説是聖人全靠學也大抵如所謂我非生而知之好古敏以求之皆是移向下一等説以教人亦是聖人看得地步廣闊自視猶有未十全滿足處所以其言如此非全無事實而但為此詞也必大集義發憤忘食章東坡云實言則不讓貶言則非實故常略言之而天下之美莫能加焉此説非不好但如此則是聖人已先計較方為此説似非聖人之意聖人言語雖是平易高深之理即便在這裏學者就中庸處看便見得高明處夔孫我非生而知之者章問我非生而知之者好古敏以求之者聖人之敏求固止於禮樂名數然其義理之精熟亦敏求之乎曰不然聖人於義理合下便恁地固天縱之將聖又多能也敏求則多能之事耳其義理完具禮樂等事便不學也自有一副當但力可及故亦學之若孟子於此等也有學得底也有不曾學得底然亦自有一副當但不似聖人學來尤密耳仲思問何以言之曰如班爵祿井田喪禮之類只是説得大概然亦是去古遠無可考處但他大綱正制度雖有不備處亦不妨伯羽好古敏以求之聖人是生知而學者然其所謂學豈若常人之學也聞一知十不足以盡之義剛子不語怪力亂神章問子不語怪力亂神集注言鬼神之理難明易惑而實不外乎人事鬼神之理在人事中如何見得曰鬼神只是二氣之屈伸往來就人事中言之如福善禍淫便可以見鬼神道理論語中聖人不曾説此宇問如動靜語默亦是此理否曰固是聖人全不曾説這話與人這處無形無影亦自難説所謂敬鬼神而遠之只恁地説集注舊文寓三人行章聖人之學異夫常人之學才略舉其端這裏便無不昭徹然畢竟是學人若以自修為心則舉天下萬物凡有感乎前者無非足以發吾義理之正善者固可師不善者這裏便恐懼修省恐落在裏面去是皆吾師也夔孫天生德於豫章讀天生德於豫一章曰才做聖人自反無愧説時便小了聖人須知道天生德於聖人桓魋如何害得故必其不能違天害己也時舉恭父問必不能違天害己不知當時聖人見其事勢不可害己還以理度其不能害耶曰若以勢論則害聖人甚易唯聖人自知其理有終不能害者賀孫問天生德於豫桓魋其如豫何孔子既如此説了卻又微服而過宋者乃是天理人事之交盡否曰然所謂知命者不立乎巖牆之下若知命者便立乎巖牆之下也何害卻又不立而今所謂知命者只是捨命燾魏問謝氏云聖人不敢必其不我害也使其能為我害亦天也是如何曰這説是聖人必其不能害己如匡人其如豫何皆是斷然害聖人不得聖人説出自恁地直截如説道之將行也與命之道之將廢也與命也公伯寮其如命何這是未定之辭如孟子説吾之不遇魯侯天也臧氏之子焉能使豫不遇哉遇不遇看天如何亦是未定之辭賀孫二三子以我為隱乎章子善説吾無隱乎爾此在弟子自見得如何如顏子只見得所立卓爾冉子自見得力不足中道而廢聖人以學者不能自去用力故以此警之曰要緊意思都在吾無行而不與三三子處須去仔細認聖人無不與三三子處在那裏時舉録云須要看聖人如何是無行不與二三子處凡日用飲食居處之間認得聖人是如何自家今當如何或問鄉黨所得亦足以見聖人之動靜曰與上大夫言誾誾如也之類這亦可見但夫子所以與二三子又不止此須是實認得意思是如何賀孫夫子嘗言中人以下不可以語上也而言性與天道則不可得而聞想是不曾得聞者疑其有隱不知夫子之坐作語默無不是這箇道理風霆流形庶物露生無非教也聖人雖教人灑掃應對這道理也在裏面義剛問伊川言聖人教人常俯就若是掠下一著教人是聖人有隱乎爾何也曰道有大小精粗大者精者固道也小者粗者亦道也觀中庸言大哉聖人之道洋洋乎發育萬物峻極于天此言道之大處優優大哉禮儀三百威儀三千是言道之小處聖人教人就其小者近者教人便是俯就然所謂大者精者亦只在此初無二致要在學者下學上達自見得耳在我則初無所隱也銖子以四教章教人之道自外約入向裏去故先文後行而忠信者又立行之方也謨子善説文行忠信恐是教人之序當先博以文使之躬行方教之忠信曰此是表裏互説在這裏不是當學文修行時不教之存忠信在教人當從外説入又云學者初來須是先與他講説不然是行箇甚麼忠是甚物事信是甚物事到得為忠為信時自是説不得若平日講説到忠信且只是文到得盡此忠信二節全在學者自去做如講説如何是孝如何是弟這都只是文去行其所謂孝所謂弟方始是實事賀孫文行忠信如説事親是如此事兄是如此雖是行之事也只是説話在須是自家體此而行之方是行蘊之於心無一毫不實處方是忠信可傳者只是這文若行忠信乃是在人自用力始得雖然若不理會得這箇道理不知是行箇甚麼忠信箇甚麼所以文為先如入孝出弟謹信泛愛親仁非謂以前不可讀書以前亦教他讀書理會許多道理但必盡得這箇恰好讀書又曰到這裏卻好讀書讀子以四教曰其初須是講學講學既明而後修於行所行雖善然更須反之於心無一毫不實處乃是忠信時舉文行忠信教不以文無由入説與事理之類便是文小學六藝皆文也子以四教且如小學子能食食教以右手能言教之男唯女俞是先教他做箇伎倆這都是行底事而後教他識義理夔孫問文行忠信恐是博文約禮之意曰然忠信只是約禮之實燾問行是就身上説忠信是就心上説否曰是義剛問文行為先忠信為次之説如何曰世上也自有初間難曉底人便把忠信與説又教如何理會也須且教讀書漸漸壓伏這箇身心教定方可與説問行有餘力則以學文是如何曰讀書最不要如此比並如上説怕人卒急難理會須先將文開發他如詩書禮樂射御書數都是文這自與説務本意不同賀孫先生因或者講子以四教問何以有四者之序或者既對先生曰文便是窮理豈可不見之於行然既行矣又恐行之有未誠實故又教之以忠信也所以伊川言以忠信為本蓋非忠信則所行不成故耳因問行有餘力則以學文何也曰彼將教子弟而使之知大概也此則教學者深切用工也問然則彼正合小學之事歟曰然壯祖或問此章是先文而後行行有餘力則以學文是先行而後文何以不同曰文行忠信是從外做向內則以學文是從內做向外聖人言此類者多要人逐處自識得銖因問中庸末章自衣錦説至無聲無臭是從外做向內首章自天命之性説至萬物育是從內做向外曰不特此也惟天下聰明睿知説到溥博淵泉是從內説向外惟天下至誠經綸天下之大經至肫肫其仁聰明聖智達天德是從外説向內聖人發明內外本末小大巨細無不周遍學者當隨事用力也銖聖人吾不得而見之章聖人也只是這箇道理但是他理會得爛熟後似較聖樣其實只是這道理君子是事事做得去所謂君子不器善人則又不及君子只是知得有善有惡肯為善而不肯為惡耳有常者又不及善人只是較依本分義剛問善人是資質大故粹美其心常在於善道所以自不至於有惡有常者則是箇確實底人否曰是有常底也不到事事做得是只是有志於善而不肯為惡耳善人則從來恁地好事事依本分但人多等級善人雖是資質好雖是無惡然不踐迹亦不入於室緣不甚曉得道理不可以到聖人只是恁地便住了義剛善人是資質自好底人要做好事而自然無惡者也有恆則只是把捉得定又未到善人自然好處在善人正如上文所謂聖人有恆正如所謂君子然而善人有恆者皆未知學問者也僩問善人有恆者之別曰善人已無惡但不入道有恆者惟守恆分而已論語中此等皆泛問非切於日用之急者此等皆置之後面前面自有緊切處若緊切處通餘處自理會得賀孫竇問善人有恆一章有恆者之去聖人高下固懸絶矣然未有不自有恆而能至於聖人者天下事大概既是有恆方做得成嘗觀分水嶺之水其初甚微行一兩日流漸大至到建陽遂成大溪看來為學亦是有恆方可至於聖人曰最是古人斷機譬喻最切緣是斷時易接時難一斷了便不可接泳吳伯英解亡而為有章曰正謂此皆虛夸之事不可以久是以不能常非謂此便是無常也壯祖問亡而為有等與難乎有恆矣不相似曰蓋如此則不實矣只是外面虛張做安能有常乎宇亡而為有虛而為盈約而為泰此是説無恆以前事若是以亡為有以虛為盈以約為泰則不能常謂如我窮約卻欲作富底舉止縱然時暫做得將來無時又做不要如此便是無常亡對有而言是全無虛是有但少約是就用度上説義剛問難乎有恆矣曰這不是説他無常只是這人恁地有頭無尾了是難乎有常矣是不會有常卓録云此等人不可謂有常之人矣言此三病皆受於無常之前又曰如説居上不寬為禮不敬臨喪不哀吾何以觀之哉不是不去觀他又不是不足觀只為他根源都不是了更把甚麼去觀他重在以字上又云將甚底物事去看他居上寬為禮敬臨喪哀就裏面方可看他箇深淺過不及卓録云如有其寬有其敬有其哀時即觀其深淺當否如何今既無此則吾復以何者而觀之言更不可觀之矣他都無這箇了更將何以觀之如考試一般若文字平平尚可就中看好惡若文理紕繆更將甚麼去考得論語如此處多今人都只粗淺滾説過也自説得只是聖人本意不如此只是看得熟了少間自分別得出賀孫卓録少異蓋有不知而作之者章楊問不知而作作是述作或只是凡所作事曰只是作事又問多聞擇其善者而從之多見而識之不知可以作多聞而識之多見擇其善者而從之得否曰聞見大略爭不多較所聞畢竟多聞須別識善惡而從見則見得此為是彼為非則當識之他日行去不差也宇或問此章之義曰聞是聞前言往行見是見目今所為聞之須要擇其善者而從之必有得於己不是聞詳見略亦不是聞淺見深不須如此分聞見字蓋卿問多聞多見之別曰聞是都聞得好説話了從之是又擇其尤善者而從之見只是泛泛見得雖未必便都從他然也著記他終始首尾得失燾多聞已聞得好話了故從中又揀擇多見只是平日見底事都且記放這裏燾多見而識之見又較切實多見姑且識之如沒要緊底語言文字謾與他識在不識也沒要緊要緊卻在多聞擇善而從之如今人卻只要多識卻無擇善一著賀孫因坐客雜記而言讀多聞擇其善者而從之章云聞見亦是互相發明此下見干祿章時舉問多聞曰聞只是聞人説底己亦未理會得問知有聞見之知否曰知只是一樣知但有真不真爭這些子不是後來又別有一項知所知亦只是這箇事如君止於仁臣止於敬之類人都知得此只後來便是真知淳問擇善而從之是已知否曰未擇時則未辨善惡擇了則善惡別矣譬如一般物好惡來雜在此須是擇出那好底擇去那惡底擇來擇去則自見得好惡矣燾知之次也知以心言得於聞見者次之謨問多聞多見不同如何曰聞是耳聞見是目見問多聞擇其善者而從之多見如何不擇呂氏説聞愈於見從愈於識知愈於從如何曰多聞便有所當行故擇而行之多見雖切然未必當行姑識在賀孫仁遠乎哉章人之為學也是難若不從文字上做工夫又茫然不知下手處若是字字而求句句而論而不於身心上著切體認則又無所益且如説我欲仁斯仁至矣何故孔門許多弟子聖人竟不曾以仁許之雖以顏子之賢而尚或違於三月之後而聖人乃曰我欲斯至盍亦於日用體驗我若欲仁其心如何仁之至其意又如何又如説非禮勿視聽言動盍亦每事省察何者為禮何者為非禮而吾又何以能勿視勿聽若每日如此讀書庶幾看得道理自我心而得不為徒言也壯祖或問我欲仁斯仁至矣曰凡人讀書只去究一兩字學所以不進若要除卻這箇道理又空讀書須把自身來體取做得去方是無疑若做不去須要講論且如欲仁斯仁至如何恁地易至於顏子三月不違仁又如何其餘更不及此又怎生得恁地難論語似此有三四處讀論語須是恁地看方得銖吳伯英講我欲仁斯仁至矣因引有能一日用其力於仁矣乎以證之且曰如先生固嘗注曰仁本固有欲之則至志之所至氣亦至焉先生曰固是但是解一日用力而引此言則是説進數步今公言欲仁仁至而引前言則是放退數步地也以此觀先生説經大率如此因正淳説我欲仁斯仁至矣曰今人非不知利祿之不可求求之必不可得及至得底皆是非用力所至然而有至終身求之而不止者如何得人皆欲仁所以後來聖賢不出盡是庸凡便是無肯欲仁者如何得箇道理使人皆好仁所以孔子謂吾未見好仁者所謂好德如好色須是真箇好德如好色時方可如今須是自於這裏著意思量道如何不欲仁卻欲利祿如何不好德卻只好色於此猛省恐有箇道理問我欲仁曰才欲便是仁在這裏胡子知言上或問放心如何求胡子説一大段某説都不消恁地如孟子以雞犬知求為喻固是但雞犬有時出去被人打殺煮喫了也求不得又其求時也須遣人去求這箇心則所係至大而不可不求求之易得而又必得蓋人心只是有箇出入不出則入出乎此則入乎彼只是出去時人都不知不覺才覺得此心放便是歸在這裏了如戒慎恐懼才恁地便是心在這裏了又問程子以心使心如何曰只是一箇心被他説得來卻似有兩箇子細看來只是這一箇心夔孫陳司敗問昭公章問昭公娶同姓之事若天王舉法則如何斷曰此非昭公故為之也當時吳盛強中國無伯主以齊景公猶云既不能令又不受命涕出而女於吳若昭公亦是藉其勢不得已之故非貪其色而然也天子舉法則罪固不免亦須原情自有處置況不曰孟姬而曰吳孟子則昭公亦已自知其非矣子與人歌而善章子與人歌而善必使反之而後和之今世間人與那人説話那人正説得好自家便從中截斷如云已自理會得不消説之類以此類看聖人是甚氣象與人歌且教他自歌一終了方令再歌而後和之不於其初歌便和恐混雜他不盡其意此見聖人與人為善賀孫若不待其反而後和則他有善亦不得而知今必使之反之而後和之便是聖人不掩人善處義剛集注説子與人歌不掩人善蓋他歌既善使他復歌聖人未遽和以攙雜之如今人見人説得一話好未待人了便將話來攙他底則是掩善植問伊川云歌必全章與割不正不食同意如何曰是直候歌者徹章然後再從頭和之不是半中間便和恐是此意文莫吾猶人也章文莫吾猶人也莫是疑辭猶今人云莫是如此否言文則吾與人一般如云聽訟吾猶人也若躬行君子則吾未之有得此與君子之道四丘未能一焉之意同謨若聖與仁章夫子固多謙辭到得説抑為之不厭誨人不倦公西華便識得所以有正唯弟子不能學也之説便説道聖人有不讓處泳其他人為之誨人不能無厭倦時惟聖人則不厭不倦正唯弟子不能學也言正是弟子不能學處這若不是公西華親曾去做來親見是恁地如何解恁地説義剛為之不厭誨人不倦他也不曾説是仁聖但為之畢竟是為箇甚麼誨人畢竟是以甚麼物事誨人這便知得是為之是為仁聖之道誨之是以仁聖之道誨人義剛仁之與聖所以異者大而化之之謂聖若大而未化之只可謂之仁此其所以異明作子疾病章讀此章曰在臣子則可在我則不可聖人也知有此理故但言我不用禱而亦不責子路之非也時舉子路請禱子曰有諸要知子路所以請禱之意是如何審一審看他意思著落再説來卻轉動不得方好説與他或問有禱之理否曰子路説禱爾於上下神祇便是有此理子路若要禱但在我不用禱耳或問子路請禱處曰子路若不當請聖人何不直拒之乃問有諸何也立之對云聖人不直拒子路故必問之而後以為無所事禱曰不然蓋夫子疑子路禱之非正故以有諸叩之及子路舉誄聖人知非淫祀乃云我無所事禱時舉子路請禱子曰有諸聖人不直截截他待子路説了然後從容和緩答他今人才到請禱處便截了聖人皆不如此必使反之而後和之亦然病而禱古亦有此理但子路不當請之於夫子其曰丘之禱久矣注云孔子素行合於神明是也伊川云無過可悔無善可遷此是解素行合於神明一句謨叔器問子路請禱注下是兩箇意思模樣曰是但士喪禮那意卻只是箇小意思良久云聖人便是仔細若其他人便須叫喚罵詈聖人卻問有諸待他更説卻云是禱久矣這如與人歌而善必反之而後和之樣卻不是他心裏要恁仔細聖人自是恁地仔細不恁地失枝落節大步跳過去説義剛問疾病而禱古人固行之矣然自典禮之亡世既莫知所當致禱之所緇黃巫覡始以其説誣民惑衆而淫祀日繁今欲一切屏絶則於君父之疾無所用力之際不一致禱在臣子之心必有慊然不足者欲姑隨世俗而勉焉為之然吾心既不以為然亦必不能於此自致其誠況於以所賤事君親歟然則如之何而可曰今自是無所可禱如儀禮五祀今人尋常皆不曾祀又尋常動是越祭於小小神物必以為祭之無益某向為郡禱旱時如舊例醮祭之類皆嘗至誠為之但才見張天師心下便不信了必大奢則不孫章或問奢則不孫曰才奢便是不孫他自是不戢斂也公且看奢底人意思儉底人意思那奢底人便有驕敖底意思須必至於過度僭上而後已然卻又是一節在燾問奢非止謂僭禮犯上之事只是有夸張侈大之意便是否曰是義剛君子坦蕩蕩章君子坦蕩蕩只是意誠心廣體胖耳子溫而厲章子溫而厲威而不猛恭而安須看厲便自有威底意思不猛便自有溫底意思大抵曰溫曰威曰恭三字是主曰厲曰不猛曰安是帶説上下二句易理會諸公且看聖人威底氣象是如何久之云聖人德盛自然尊嚴又云謝氏以此説夷惠過處頗是賀孫叔器説子溫而厲章曰此雖是説聖人之德容自然如此然學者也當如此舉偏而補弊蓋自舜之命夔已如此而皋陶陳九德亦然不可不知義剛問子溫而厲一章是總言聖人容貌鄉黨是逐事上説否曰然此是就大體上看聖人燾問張子云十五年學箇恭而安不成曰恭而安如何學得成安便不恭恭便不安這箇使力不得是聖人養成底事顏子若是延得幾年便是聖人不是到此更用著力只是養底工夫了顏子工夫至到只是少養如煉丹火氣已足更不添火只以暖氣養教成就耳明作魏問橫渠言十五年學恭而安不成明道曰可知是學不成有多少病在莫是如伊川説若不知得只是覷卻堯學他行事無堯許多聰明睿智怎生得似他動容周旋中禮曰也是如此更有多少病在良久曰人便是被氣質局定變得些子了又更有些子變得些子了又更有些子又云聖人發憤便忘食樂便忘憂直是一刀兩段千了百當聖人固不在説但顏子得聖人説一句直是傾腸倒肚便都了更無許多廉纖纏擾絲來線去問橫渠只是硬把捉故不安否曰他只是學箇恭自驗見不曾熟不是學箇恭又學箇安賀孫
