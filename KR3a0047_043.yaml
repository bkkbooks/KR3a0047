body:
  text: 朱子語類卷第四十三論語二十五子路篇子路問政章問先之勞之勞字既有兩音有兩說否曰勞之以身勤之以事亦須是自家喫些辛苦方能令得他詩所謂星言夙駕說于桑田古人戴星而出戴星而入必是自耐勞苦方能說得人欲民之親其親我必先之以孝欲民之事其長我必先之以弟子路請益聖人告之無倦蓋勞苦亦人之難事故以無倦勉之宇問勞之恐是以言語勸勉他曰如此說不盡得為政之理若以言語勸勉它亦不甚要緊亦是淺近事聖人自不用說亦不見得無倦底意勞是勤於事勤於事時便有倦底意所以教它勞東坡下行字與事字最好或問愛之能勿勞乎有兩箇勞字曰這箇勞是使它勞謙之文振問注云凡民之事以身先之則雖勞不怨如何曰凡是以勞苦之事役使人自家須一面與它做方可率得它如勸課農桑等事也須是自家不憚勤勞親履畎畝廣錄作循行阡陌與他勾當方得賀孫集注問蘇說勞字未甚明曰先是率他勞是為他勤勞銖問先之勞之諸說孰長曰橫渠云必身為之倡且不愛其勞而又益之以不倦此說好又問以身為之倡者果勞乎曰非是之謂也既以身為之倡又更不愛其勞而終之以無倦此是三節事去偽集義仲弓為季氏宰章潘立之問先有司曰凡為政隨其大小各自有有司須先責他理會自家方可要其成且如錢穀之事其出入盈縮之數須是教它自逐一具來自家方可考其虛實之成且如今做太守人皆以為不可使吏人批朱某看來不批不得如詞訴反覆或經已斷或彼處未結絕或見在催追他埋頭又來下狀這若不批出自家如何與它判得只是要防其弊若既如此後或有人詞訴或自點檢一兩項有批得不實即須痛治以防其弊賀孫問程子曰便見仲弓與聖人用心之大小推此義一心可以興邦一心可以喪邦只在公私之間所謂公私者豈非仲弓必欲人材皆由己舉聖人則使人各得而舉之否曰仲弓只是見不到纔見不到便陷於私學者見程子說興邦喪邦說得甚險故多疑於此然程子亦曰推其義爾必大集注問程子謂觀仲弓與聖人便見其用心之小大以此知樂取諸人以為善所以為舜之聖而凡事必欲出乎己者真成小人之私矣曰於此可見聖賢用心之大小仲弓只緣見識未極其開闊故如此人之心量本自大緣私故小蔽固之極則可以喪邦矣廣問先有司赦小過舉賢才各是一事蘇氏楊氏乃相須而言之曰論語中有一二處如道千乘之國敬事而信節用而愛人使民以時雖各是一事然有相須之理必大集義子路曰衛君待子章亞夫問衛君待子為政章曰其初只是一箇名不正便事事都做不得禮樂不興刑罰不中便是箇大底事不成問禮樂不興疑在刑罰不中之後今何故卻云禮樂不興而後刑罰不中曰禮之所去刑之所取禮樂既不興則刑罰宜其不中又曰禮是有序樂是和樂既事不成如何得有禮樂耶時舉文振問何以謂之事不成則禮樂不興曰事不成以事言禮樂不興以理言蓋事不成則事上都無道理了說甚禮樂亞夫問此是禮樂之實還是禮樂之文曰實與文原相離不得譬如影便有形要離那形說影不得時舉事不成是粗說那事做不成禮樂不興是和這理也沒了事只是說他做出底禮樂卻是那事底理禮樂只是一件物事安頓得齊齊整整有次序便是禮無那乖爭底意思便是樂植或問如何是事不成後禮樂便不興禮樂不興後卻如何便刑罰不中曰大凡事須要節之以禮和之以樂事若不成則禮樂無安頓處禮樂不興則無序不和如此則用刑罰者安得不顛倒錯亂諸家說各有所長可會而觀之去偽楊問注謂言不順則無以考實而事不成此句未曉曰實即事也又問言與事似乎不相涉曰如何是不相涉如一人被火急討水來救始得卻教它討火來此便是言不順如何濟得事又如人捉賊走東去合從東去捉卻教它走從西去如何捉得皆言不順做事不成若就衛論之輒子也蒯聵是父今也以兵拒父是以父為賊多少不順其何以為國何以臨民事既不成則顛沛乖亂禮樂如何會興刑罰如何會中明道所謂一事苟其餘皆苟正謂此也又問子路之死於衛其義如何曰子路只見得下一截道理不見上一截道理孔悝之事它知道是食焉不避其難卻不知食出公之食為不義東坡嘗論及此問如此是它當初仕衛便不是曰然宇集注總論問衛君欲召孔子為政而孔子欲先正名孔子既為之臣復欲去出公亦豈人情曰惟孔子而後可問靈公既逐蒯聵公子郢辭不立衛人立輒以拒蒯聵論理輒合下便不當立不待拒蒯聵而後為不當立也曰固是輒既立蒯聵來爭必矣僩必也正名乎孔子若仕衛必先正其君臣父子之名如蒯聵不當立輒亦不當立當去輒而別立君以拒蒯聵晉趙鞅欲立蒯聵聖人出時必須大與他剖判一番教它知箇是與不是亞夫問論道理固是去輒使國人自拒蒯聵以事情論之晉人正主蒯聵勢足以壓衛聖人如何請于天子請于方伯天子既自不奈何方伯又是晉自做如何得曰道理自是合如此了聖人出來須自能使晉不為蒯聵賀孫因問如請討陳常之事也只是據道理不論事情曰如這一兩件大事可惜聖人做不透若做得透使三綱五常既壞而復興千條萬目自此而更新聖人年七八十歲拳拳之心終做不成賀孫吳伯英問若使夫子為衛政不知果能使出公出從蒯聵否曰聖人行事只問義之合與不合不問其能與不能也若使每事只管計較其能與不能則豈不惑於常情利害之私乎此在學者尤宜用力而況聖人乎壯祖問夫子得政於衛須有所廢立否曰亦只是說與他令自為去就亦難為迫逐之必大胡文定說輒事極看得好可學問胡氏之說只是論孔子為政正名事理合如此設若衛君用孔子孔子既為之臣而為政則此說亦可通否曰聖人必不肯北面無父之人若輒有意改過遷善則孔子須先與斷約如此方與他做以姚崇猶先以十事與明皇約然後為之相而況孔子乎若輒不能然則孔子決不為之臣矣淳問胡氏云云使孔子得政則是出公用之也如何做得此等事曰據事理言之合當如此做耳使孔子仕衛亦必以此事告之出公若其不聽則去之耳廣蒯聵與輒若有一人識道理各相避就去了今蒯聵欲入衛輒不動則所以處其事者當如何後世議者皆以為當立郢不知郢不肯做郢之不立蓋知其必有紛爭也若使夫子為政則必上告天子下告方伯拔郢而立之斯為得正然夫子固不欲與其事也或謂春秋書晉趙鞅納世子蒯聵于戚稱世子者謂其當立曰若不如此書當如何書之說春秋者多穿鑿往往類此人傑叔器問子郢不肯立也似不是曰只立輒時只是蒯聵一箇來爭若立它時則又添一箇來爭愈見事多人以千乘之國讓之而不肯受它畢竟是看得來惹手難做後不敢做義剛樊遲請學稼章樊遲學稼當時須自有一種說話如有為神農之言許行君民並耕之說之類炎誦詩三百章亞夫問誦詩三百何以見其必達於政曰其中所載可見如小夫賤隸閭黨之間至鄙俚之事君子平日耳目所不曾聞見者其情狀皆可因此而知之而聖人所以修德於己施於事業者莫不悉備於其間所載之美惡讀誦而諷詠之如是而為善如是而為惡吾之所以自修於身者如是是合做底事如是是不合做底事待得施以治人如是而當賞如是而當罰莫不備見如何於政不達若讀詩而不達於政則是不曾讀也又問如何使於四方必能專對曰於詩有得必是於應對言語之間委曲和平賀孫子謂衛公子荊章問公子荊善居室也無甚高處聖人稱善何也曰公子荊所為正合道理恰好處常人為屋室不是極其華麗則牆崩壁倒全不理會子荊自合而完完而美循循有序而又皆曰苟而已初不以此累其心在聖人德盛此等事皆能化了不足言在公子荊能如此故聖人稱之謙之時舉錄小異問衛公子荊夫子止稱其居室之善如何曰此亦姑舉其一事之善而稱之又安知其他無所長乎必大子適衛章宜久說子適衛一章先生因言古者教人有禮樂動容周旋皆要合他節奏使性急底要快也不得性寬底要慢也不得所以養得人情性如今教人既無禮樂只得把兩冊文字教他讀然而今未論人會學喫緊自無人會教所以明道欲得招致天下名儒使講明教人之方選其德行最高者留以為大學師卻以次分布天下令教學者須是如此然後學校方成次第也時舉衣食不足則不暇治禮義而飽暖無教則又近於禽獸故既富而教之燾苟有用我章立之說苟有用我者一章曰聖人為政一年之間想見以前不好底事都革得盡到三年便財足兵強教行民服時舉如有用我者期月而已可也聖人做時須一切將許多不好底撤換了方做自家底所以伊川云紀綱布置必三年方可有成也賀孫善人為邦章安卿問集注云民化於善可以不用刑殺恐善人只是使風俗醇朴若化於善恐是聖君之事曰大概論功效是如此其深淺在人不必恁地粘皮著骨去說不成說聖人便得如此善人便不得如此不必恁地分別善人是他做百年工夫積累到此自是能使人興善人自是不陷於刑辟如文景恁地後來海內富庶豈不是勝殘去殺如漢循吏許多人才循良也便有效如陳太丘卓茂魯恭只是縣令也能如此不成說你便不是聖人如何做得這箇只看他功效處又何必較量道聖人之效是如此善人之效是如彼聖人比善人自是不同且如綏之斯來動之斯和殺之而不怨利之而不庸民日遷善而不知為之善人定是未能到這田地但是有這般見識有這般心胸積累做將去亦須有效且如而今寬刑薄賦民亦自能興起而不陷於刑聖人論功效亦是大概如此只思量他所以致此效處如何便了何必較他優劣便理會得也無甚切己處義剛問善人為邦百年又教民七年又必世後仁與可也三年有成之義如何曰此須有聖人作用方得如此今大概亦自可見惟明道文集中一策答得甚詳與今人答策專是謾策題者甚別試讀之可見去偽如有王者章或問三年有成必世後仁遲速不同何也曰伊川曰三年謂法度紀綱有成而化行也漸民以仁摩民以義使之浹於肌膚淪於骨髓天下變化風移俗易民歸於仁而禮樂可興所謂仁也此非積久何以能致又曰自一身之仁而言之這箇道理浸灌透徹自天下言之舉一世之仁皆是這箇道理浸灌透徹植苟正其身章問范氏以先正其身為王者以德行仁之事不能正其身而正人為以力假仁之事曰王者霸者只是指王霸之道范氏之說緩而不切必大定公問一言興邦章聖人說話無不子細磨稜合縫盛水不漏如說以德報怨如說一言興邦其他人便只說予無樂乎為君惟其言而莫予違也便可以喪邦只此一句便了聖人則須是恁地子細說方休如孟子說得便粗如今之樂猶古之樂大王公劉好色好貨之類故橫渠說孟子比聖人自是粗顏子所以未到聖人亦只是心尚粗義剛葉公問政章曾問近者悅遠者來夫子答葉公之問政者專言其效與答季康子子夏等不同如何曰此須有施為之次第葉公老成必能曉解也人傑近者悅而遠者來則大小強弱非所論矣燾樊遲問仁章孔門教人多以數語能使人自存其心如居處恭纔恭則心不放也如此之類問雖之夷狄不可棄曰上三句散著下一句方閂得緊謙之亞夫問如何雖之夷狄不可棄曰道不可須臾離可離非道須是無間斷方得若有間斷此心便死了在中國是這箇道理在夷狄也只是這箇道理子善云若居處恭執事敬與人忠時私心更無著處曰若無私心當體便是道理南升或問樊遲問仁一段聖人以是告之不知樊遲果能盡此否曰此段須反求諸己方有工夫若去樊遲身上討則與我不相干矣必當思之曰居處恭乎執事敬乎與人忠乎不必求諸樊遲能盡此與否也又須思居處恭時如何不恭時如何執事敬時如何不敬時如何與人忠時如何不忠時如何方知須用恭敬與忠也今人處於中國飽食煖衣未至於夷狄猶且與之相忘而不知其不可棄而況之夷狄臨之以白刃而能不自棄者乎履孫大凡讀書須是要自家日用躬行處著力方可且如居處恭執事敬與人忠雖之夷狄不可棄也與那言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉此二事須是日日粘放心頭不可有些虧欠處此最是為人日下急切處切宜體之椿亞夫問居處恭執事敬一章曰這箇道理須要到處皆在使生意無少間斷方好譬之木然一枝一葉無非生意才有一毫間斷便枝葉有不茂處時舉云看來此三句動靜出處待人接物無所不該便私意自無容處因兼仲弓問仁一章說曰大抵學問只要得箇門戶子入若入得門了便只要理會箇仁其初入底門戶不必只說道如何如何若纔得箇門戶子入須便要入去若只在外面說道如何也不濟事時舉或問胡氏謂樊遲問仁者三此最先先難次之愛人其最後乎何以知其然曰雖無明證看得來是如此若未嘗告之以恭敬忠之說則所謂先難者將從何下手至於愛人則又以發於外者言之矣廣子貢問士章問行己有恥使於四方不辱君命兩句似不連綴恐是行己有恥則足以成其身推是心以及職分則不辱君命又可以成其職分之所當為曰行己有恥則不辱其身使於四方能盡其職則不辱君命廣宗族稱孝鄉黨稱弟是能守一夫之私行而不能廣其固有之良心賀孫文振舉程子曰子貢欲為皎皎之行聞於人者夫子告之皆篤實自得之事謂子貢發問節次正如此曰子貢平日雖有此意思然這一章卻是他大段平實了蓋渠見行己有恥使於四方不是些小事故又問其次至宗族稱孝鄉黨稱弟他亦未敢自信故又問其次凡此節次皆是他要放平實去做工夫故每問皆下到下面問今之從政者何如卻是問錯了聖人便云何足算也乃是為他截斷了也此處更宜細看時舉子貢問士都是退後說子貢看見都不是易事又問其次子貢是著實見得那說底也難故所以再問其次這便是伊川所謂子貢欲為皎皎之行夫子告之皆篤實自得之事底意植或說某人可奉使云子貢問士孔子告之云云伊川云篤實自得之事謂如有恥不辱其次常行又其次雖小人亦可只是退步意思如使乎使乎意則是深厚足有為者又如行三軍臨事而懼好謀而成此八字極有意然言之謙謙氣象正如出軍之憂心悄悄也若軒然自表於眾人之上安可為將如孔明用兵如此然未嘗謂精又如曹公賞諫烏桓者至如徐禧云左縈右拂直前刺之一步三人則其死可見矣狄青殺伐敗之而已至於太原出境而止段穎則不然方不得中行而與之章狂者知之過狷者行之過僩問不得中行而與之一段曰謹厚者雖是好人無益於事故有取於狂狷然狂狷者又各墮於一偏中道之人有狂者之志而所為精密有狷者之節又不至於過激此極難得時舉人須是氣魄大剛健有立底人方做得事成而今見面前人都恁地衰做善都做不力便做惡也做不得那大惡所以事事不成故孔子歎不得中行而與之必也狂狷乎人須有些狂狷方可望僩聖人不得中行而與之必求狂狷者以狂狷者尚可為若鄉原則無說矣今之人纔說這人不識時之類便須有些好處纔說這人圓熟識體之類便無可觀矣楊問狂狷集注云善人胡為亦不及狷者曰善人只循循自守據見定不會勇猛精進循規蹈矩則有餘責之以任道則不足淳錄下云故無可望狷者雖非中道然這般人終是有筋骨淳錄作骨肋其志孤介知善之可為而為之知不善之不可為而不為直是有節操狂者志氣激昂聖人本欲得中道而與之晚年磨來磨去難得這般恰好底人如狂狷尚可因其有為之資裁而歸之中道道夫錄云得聖人裁抑之則狂者不狂狷者不狷矣淳錄云末年無柰何方思得此等人可見道之窮矣問何謂狷曰介然有守也且如孔門只一箇顏子如此純粹道夫錄作合下天資純粹到曾子道夫錄有氣質字便過於剛與孟子相似世衰道微人欲橫流若不是剛介有腳跟底人定立不住漢文帝謂之善人武帝卻有狂氣象陸子靜省試策世謂文帝過武帝愚謂武帝勝文帝其論雖偏容有此理文帝天資雖美然止此而已道夫錄云若責之以行聖人之道則必不能蓋他自安於此觀其言曰卑之無甚高論令今可行也武帝多有病痛然天資高足以有為使合下得真儒輔佐它豈不大可觀惜乎輔非其人不能勝其多欲之私做從那邊去了末年天下虛耗其去亡秦無幾然它自追悔亦其天資高也如與衛青言若後世又為朕所為是襲亡秦之跡太子厚重好靜欲求守文之主安有賢於太子者乎見得它知過處胡氏謂武帝能以仲舒為相汲黯為御史大夫豈不善乎宇道夫錄淳錄同南人有言章問不占而已矣曰如只是不讀書之意或問或承之羞曰承如奉承之承如人送羞辱與之也燾君子和而不同章問諸說皆以和如和羹為義如何曰不必專指對人說只君子平常自處亦自和自然不同大抵君子小人只在公私之間淳錄云君子小人只是這一箇事而心有公私不同孔子論君子小人皆然和是公底同同是私底和如周而不比亦然周是公底比比是私底周同一事而有公私五峰云天理人欲同體異用同行異情以同行異情卻是所謂同體者卻只是言同一事但既犯了體用字卻成是體中亦有人欲五峰只緣錯認了性無善惡便做出無限病痛知言中節節如此立之問君子和而不同如溫公與范蜀公議論不相下之類不知小人同而不和卻如誰之類曰如呂吉甫王荊公是也蓋君子之心是大家只理會這一箇公當底道理故常和而不可以苟同小人是做箇私意故雖相與阿比然兩人相聚也便分箇彼己了故有些小利害便至紛爭而不和也時舉君子易事而難說章問君子易事而難說曰君子無許多勞攘故易事小人便愛些便宜人便從那罅縫去取奉他故易說燾君子泰而不驕章問君子泰而不驕曰泰是從容自在底意思驕便有私意欺負他無欺負他理會不得是靠我這些子皆驕之謂也如漢高祖有箇粗底泰而不驕他雖如此胡亂罵人之屬卻無許多私意唐太宗好作聰明與人辯便有驕底意思燾剛毅木訥近仁章問剛毅木訥近仁剛與毅如何分別曰剛是體質堅強如一箇硬物一般不軟不屈毅卻是有奮發作興底氣象宇仁之為物難說只是箇惻隱羞惡未發處這箇物事能為惻隱羞惡能為恭敬是非剛毅木訥只是質朴厚重守得此物故曰近仁震子路問士章問何如斯可謂之士一段曰聖人見子路有粗暴底氣象故告之以切偲怡怡又恐子路一向和說去了又告之以朋友切切偲偲兄弟則怡怡聖人之言是恁地密謙之問胡氏說切切懇到也偲偲詳勉也如何是懇到詳勉意思曰古人多下聯字去形容那事亦難大段解說想當時人必是曉得這般字今人只是想像其聲音度其意是如此耳切切偲偲胡氏說為當懇到有苦切之意然一向如此苦切而無浸灌意思亦不可又須著詳細相勉方有相親之意宇善人教民七年章問善人教民七年亦可以即戎矣如何恰限七年曰如此等他須有箇分明界限如古人謂三十年制國用則有九年之食至班固則推得出那三十年果可以有九年食處料得七年之類亦如此廣問孔子云善人教民七年亦可以即戎矣晉文公自始入國至僖公二十七年教民以信以義以禮僅得四年遂能一戰而霸此豈文公加善人一等也耶曰大抵霸者尚權譎要功利此與聖人教民不同若聖人教民則須是七年謨問集注先只云教民者教之孝悌忠信後又添入務農講武之法曰古人政事大率本末兼具因說向來此間有盜賊之害嘗與儲宰議起保伍彼時也商量做一箇計畫後來賊散亦不成行後來思之若成行亦有害蓋纔行此便著教他習武事然這裏人已是殺人底莫更教得他會越要殺人如司馬溫公嘗行保伍之法春秋教習以民為兵後來所教之人歸更不去理會農務生事之屬只管在家作鬧要酒物喫其害亦不淺古人兵出於民卻是先教之以孝悌忠信而後驅之於此所以無後來之害燾以不教民戰章或疑不教民戰善人教民也七年固是教之以孝悌忠信不須兼戰法而教之否曰然戰法自不用了孔子卻是為見春秋時忒會戰故特說用教之以孝悌忠信之意伯羽
