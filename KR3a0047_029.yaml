body:
  text: 朱子語類卷第二十九論語十一公冶長下子路有聞章問子路有聞未之能行惟恐有聞因舉子路數事以明子路好學如此而仕衛之出處乃如彼曰今只當就子路有聞上考究不須如此牽二三說不知要就此處學子路未之能行惟恐有聞還只要求子路不是處如此看恐將本意失了就此言之見得子路勇於為善處他這處直是見得如此分明到得聞其正名處卻鶻突學者正要看他這處在衛又是別項說話也又曰可見古人為己之實處子路急於為善唯恐行之不徹譬如人之飲食有珍羞異饌須是喫得盡方好若喫不透亦徒然子路不急於聞而急於行今人惟恐不聞既聞得了寫在冊子上便了不去行處著工夫賀孫寓録略子貢問曰孔文子章問孔文子孔姞之事如此不好便敏而好學不恥下問濟得甚事而聖人取之何也曰古人諡法甚寬所謂節以一惠言只有一善亦取之節者節略而取其一善也孔文子固是不好只節此一惠則敏學下問亦是它好處銖問孔文子之諡曰古人有善雖多而舉一以為諡如有十事皆善只舉一善可以包之如九事不善只有一善則亦可以一善為諡皆無一善而後名之曰幽厲凡二字諡非禮也如貞惠文子睿聖武公皆是饒兩字了周末王亦有二字諡淳問勤學好問為文諡之以文莫是見其躬行之實不足否曰不要恁地說不成文王便是不能武武王便是不能文諡以尊名節以一惠如有十事不善云云同淳録至名之曰幽厲它而今是能勤學好問便諡之以文如何見得它躬行之不足那不好底自是不好而今既諡之以文便見得它有這一長如何便說道是將這一字來貶它又問孫宣公力言雙字諡之非不知雙字諡起於何時曰諡以尊名節以一惠便是只以一字諡為惠而今若加二字或四字皆是分外有了若如文王之德如此卻將幾箇字諡方盡如雙字諡自周已是如此了如威烈王慎靚王皆是義剛孔文子何以謂之文也此一段專論諡故注云非經天緯地之文也周禮諡只有二十八字如文字文王諡曰文周公亦諡為文今孔文子亦諡為文不成說孔文子與文王一般蓋人有善多者則摘其尤一事為諡亦有只有一善則取一善為諡而隱其他惡者如孔文子事是也僩吉甫問經天緯地之文曰經天緯地是有文理一橫一直皆有文理故謂之文孔文子之文是其小者如本朝楊文公之屬亦謂之文蓋卿問經天緯地曰文曰經是直底緯是橫底理會得天下事橫者直者各當其處皆有條理分曉便是經天緯地其次如文辭之類亦謂之文但是文之小者耳直卿云伊川謂倫理明順曰文此言甚好佐問文如何經天緯地曰如織布絹經是直底緯是橫底或問文之大者莫是唐虞成周之文曰裁成天地之道輔相天地之宜此便是經天緯地之文問文只是發見於外者為文曰處事有文理是處是文節因論孔文子曰聖人寬腸大度所以責人也寬燾問孔文子敏而好學與顏子之好學如何曰文子與顏子所以不同者自是顏子所好之學不同不干以能問於不能事使文子以能問於不能亦只是文子之學伯羽子謂子産章問子産溫良慈愷莫短於才否曰孔子稱子産有君子之道四安得謂短於才子産政事盡做得好不專愛人做得不是他須以法治之孟子所言惠而不知為政者偶一事如此耳僩問使民也義是教民以義先生應節問其使民也義如都鄙有章上下有服田有溝洫廬井有伍之類謂為之裁處得是當使之得其定分也曰義字說得未是義字有剛斷之意其養民則惠使民則義惠字與義字相反便見得子産之政不專在於寬就都鄙有章處看得見義字在子産上不在民上南升吉甫問都鄙有章上下有服曰有章是有章程條法有服是貴賤衣冠各有制度鄭國人謂取我田疇而伍之取我衣冠而褚之是子産為國時衣服有定制不敢著底皆收之囊中故曰取而褚之至蓋卿録云有章是都鄙各有規矩有服是衣冠服用皆有等級高卑臧文仲居蔡章山節藻梲為藏龜之室以瀆鬼神便是不知古人卜筮之事固有之但一向靠那上去便是無意智了如祀爰居是見一鳥飛來便去祀他豈是有意智看他三不知皆是瀆鬼神之事山節藻梲不是僭若是僭時孔子當謂之不仁臧文仲在當時既沒其言立人皆說是非常底人孔子直是見他不是處此篇最好看便見得聖人微顯闡幽處南升時舉録見下文振問臧文仲季文子令尹子文陳文子數段曰此數段是聖人微顯闡幽處惟其似是而非故聖人便分明說出來要人理會得如臧文仲人皆以為知聖人便說道它既惑於鬼神安得為知蓋卜筮之事聖人固欲使民信之然藏蓍龜之地須自有箇合當底去處今文仲乃為山節藻梲以藏之須是它心一向倒在卜筮上了如何得為知古說多道它僭某以為若是僭則不止謂之不知便是不仁了聖人今只說他不知便是只主不知而言也時舉問居蔡之說如集注之云則是藏龜初未為失而山節藻梲亦未為僭臧文仲所以不得為知者特以其惑於鬼神而作此室以藏龜爾曰山節藻梲恐只是華飾不見得其制度如何如夫子只譏其不知便未是僭所謂作虛器而已大夫不藏龜禮家乃因此立說必大臧文仲無大段善可稱但他不好處如論語中言居蔡之事左氏言不仁不知者三卻占頭項多了然他是箇會說道理底人如教行父事君之禮如宋大水魯遣使歸言宋君之意臧曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉皆是他會說燾子張問曰令尹子文章或問令尹子文之忠若其果無私意出於至誠惻怛便可謂之仁否曰固是然不消泥他事上說須看他三仕三已還是當否以舊政告新令尹又須看他告得是否只緣他大體既不是了故其小節有不足取如管仲之三歸反玷聖人卻與其仁之功者以其立義正也故管仲是天下之大義子文是一人之私行耳譬如仗節死義之人視坐亡而立化者雖未必如他之修然然大義卻是彼雖去得好卻不足取也時舉三仕三已所以不得為仁蓋不知其事是如何三仕之中是有無合當仕否三已之中又不知有無合當已否明作黃先之問子文文子二節曰今人有些小利害便至於頭紅面赤子文卻三仕三已略無喜慍有些小所長便不肯輕以告人而子文乃盡以舊政告之新尹此豈是容易底事其地位亦甚高矣今人有一毫係纍便脫灑不得而文子有馬十乘乃棄之如敝屣然此亦豈是易事常人豈能做得後人因孔子不許他以仁便以二子之事為未足道此卻不可須當思二子所為如此高絶而聖人不許之以仁者因如何未足以盡仁就此處子細看便見得二子不可易及而仁之體段實是如何切不可容易看也時舉履之說子文文子曰公推求得二子太苛刻不消如此某注中亦說得甚平不曾如公之說聖人之語本自渾然不當如此搜索他後手今若有箇人能三仕三已無喜慍也是箇甚麼樣人這箇強不得若強得一番無喜慍第二番定是動了又如有馬十乘也自是箇巨室有力量人家誰肯棄而違之文子卻脫然掉了去也自是箇好人更有多少人捨去不得底所以聖人亦許其忠與清只說未知焉得仁聖人之語本自渾然不當如此苛刻搜人過惡兼也未消論到他後來在僩燾録別出或問令尹子文一章曰如子文之三仕三已而無喜慍已是難了不可說他只無喜慍之色有喜慍之心若有喜慍之心只做得一番過如何故得兩三番過舊令尹之政必告新令尹亦不可說他所告是私意只說未知所告者何事陳文子有馬十乘亦是大家他能棄而去之亦是大段放得下了亦不可說他是避利害如此割舍且當時有萬千捨不得不去底如公之論都侵過說太苛刻了聖人是平說本自渾然不當如此搜索他後手燾問令尹子文之事集注言未知皆出於天理而無人欲之私故聖人但以忠許之竊詳子文告新令尹一節若言徒知有君而不知有天子徒知有國而不知有天下推之固見其不皆出於天理也至於三仕無喜三已無慍分明全無私欲先生何以識破他有私處曰也不曾便識破但是夫子既不許之以仁必是三仕三已之間猶或有未善也壯祖集注問先生謂當理而無私心則仁矣先言當理而後言無私心者莫只是指其事而言之歟曰然廣或問子文文子未得為仁如何曰仁者當理而無私心二子各得其一蓋子文之無喜慍是其心固無私而於事則未盡善文子潔身去亂其事善矣然未能保其心之無私也仁須表裏心事一一中理乃可言聖人辭不迫切只言未知如何而得仁則二子之未仁自可見銖此說可疑問集注論忠清與本文意似不同曰二子忠清而未盡當理故止可謂之忠清而未得為仁此是就其事上著實研究出來若不如此即不知忠清與仁有何分別此須做箇題目入思議始得未易如此草草說過賜問子文之忠文子之清聖人只是就其一節可取如仁卻是全體所以不許他曰也恁地說不得如三仁聖人也只是就他一節上說畢竟一事做得是時自可以見其全體古人謂觀鳳一羽足以知其五色之備如三子之事皆不可見聖人當時許之必是有以見得他透徹若二子之事今皆可考其病敗亦可見以表證裏則其裏也可知矣燾問子文之忠文子之清未知焉得仁曰此只就二子事上說若比干伯夷之忠清是就心上說若論心時比干伯夷已是仁人若無讓國諫紂之事亦只是仁人蓋二子忠清元自仁中出若子文文子夫子當時只見此兩件事是清與忠不知其如何得仁也又曰夫欲論仁如何只將一兩件事便識得此人破須是盡見得他表裏方識得破去僞夷齊之忠清是本有底故依舊是仁子文文子之忠清只得喚做忠清賜問子文若能止僭王猾夏文子去就若明是仁否曰若此卻是以事上論曰注中何故引此曰但見其病耳可學師惱問云云曰大概看得也是若就二子言之則文子資稟甚高只緣他不講學故失處亦大子文文子一章事上跡上是忠清上蔡解見處是仁子文只是忠不可謂之仁若比干之忠見得時便是仁也容有質厚者能之若便以為仁恐子張識忠清而不識仁也方集義五峰說令尹子文陳子文處以知為重說未知焉得仁知字絶句今知言中有兩章說令尹處云楚乃古之建國令尹為相不知首出庶物之道若如此則是謂令尹為相徒使其君守僭竊之位不能使其君王天下耳南軒謂恐意不如此然南軒當時與五峰相與往復亦只是講得箇大體南軒只做識仁體認恐不盡領會五峰意耳五峰疑孟之說周遮全不分曉若是恁地分疏孟子凛地沉淪不能得出問五峰問南軒陳文子之清令尹子文之忠初無私意如何聖人不以仁許之枅嘗思之而得其說曰仁之體大不可以一善名須是事事盡合於理方謂之仁若子文之忠雖不加喜慍於三仕三已之時然其君僭王竊號而不能正救文子之清雖棄十乘而不顧然崔氏無君其惡已著而略不能遏止之是盡於此而不盡於彼能於其小而不能於其大者安足以語仁之體乎曰讀書不可不子細如公之說只是一說非聖人當日本意夫仁者心之德使二子而果無私心則其仕已而無喜慍當不特謂之忠而謂之仁棄十乘而不居當不特謂之清而謂之仁聖人所以不許二子者正以其事雖可觀而其本心或有不然也枅令尹子文陳文子等是就人身上說仁若識得仁之統體即此等不難曉矣或曰南軒解此謂有一毫私意皆非仁如令尹子文陳文子以終身之事求之未能無私所以不得為仁曰孔子一時答他亦未理會到他終身事只據子張所問底事未知是出於至誠惻怛未知是未能無私孔子皆不得而知故曰未知焉得仁非是以仕已無喜慍與棄而違之為非仁也這要在心上求然以心論之子文之心勝文子之心只是心中有些小不慊快處便是不仁文蔚曰所以孔子稱夷齊曰求仁而得仁又何怨曰便是要見得到此文蔚季文子三思而後行章問季文子三思而後行章曰思之有未得者須著子細去思到思而得之這方是一思雖見得已是又須平心更著思一遍如此則無不當者矣若更過思則如稱子稱物相似推來推去輕重卻到不定了時舉季文子三思而後行子曰再斯可矣曰聖人也只是大概如此說謂如明理底人便思三兩番亦不到得私意起又如魯鈍底人思一兩番不得第三四番思得之無定然而多思大率流而入私意底多雖此是聖人就季文子身上說然而聖人之言自是渾厚占得地位闊再斯可矣是常法大概當如此燾季文子三思而後行程子所謂三則私意起而反惑如何曰這是某當問公底某云若是思之未透雖再三思之何害先生曰不然且如凡事初一番商量已得成箇體段了再思一番與之審處當行不當行便自可決斷了若於其中又要思量那箇是利那箇是害則避害就利之心便起如何不是私炎問看雍也更有何商量處賀孫曰向看公冶長一篇如微生高季文子三思二章覺得於人情未甚安曰是如何未安如今看得如何曰向看得如乞醯事也道是著如此委曲三思事也道是著如此審細如今看來乃天理人欲相勝之機曰便是這般所在本是平直易看只緣被人說得支蔓故學者多看不見這般所在如一件物事相似自恁地平平正正更不著得些子蹺欹是公鄉里人去說這般所在卻都勞攘了凡事固是著審細才審一番又審一番這道理是非已自分曉少間才去計較利害千思百算不能得了少間都滾得一齊沒理會了問這差處是初間略有些意差後來意上生意不能得了曰天下事那裏被你算得盡才計較利害莫道三思雖百思也只不濟事如今人須要計較到有利無害處所以人欲只管熾義理只管滅橫渠說聖人不教人避凶而趨吉只教人以正信勝之此可破世俗之論這不是他看這道理洞徹如何說得到這裏若不是他堅徑峭絶如何說得到這裏又云聖人於微處一一指點出來教人他人看此二章也只道匹似間賀孫又問乞醯及三思章曰三思是亂了是非天下事固有難易易底是非自易見若難事初間審一審未便決得是非更審一審這是非便自會分明若只管思量利害便紛紛雜雜不能得了且如只是思量好事若思得紛雜雖未必皆邪已自不正大漸漸便入於邪僻況初來原頭自有些子私意了如乞醯若無便說無若恁地曲意周旋這不過要人道好不過要得人情本是要周旋不知這心下都曲小了若無便說無是多少正大至若有大急難非己可成明告於衆以共濟其急難這又自不同若如乞醯務要得人情這便與孟子所謂士未可以言而言可以言而不言是皆穿窬之類也同意易比之九五云顯比王用三驅失前禽邑人不誡吉聖人之於人來者不拒去者不追如何一一要曲意周旋才恁地便滯於一偏況天理自不如此賀孫寧武子邦有道則知章問寧武子章曰武子不可不謂知但其知時人可得而及南升問寧武子曰此無甚可疑邦有道安分做去故無事可稱邦無道則全身退聽非難人皆能如此惟其不全身退聽卻似愚然又事事處置得去且不自表著其能此所以謂其愚不可及也賜寧俞邦有道則智邦無道則愚邦雖無道是他只管向前做那事去又卻能沉晦不露是非避事以免禍也言不可及亦猶莊子之難能深豫之之辭端蒙通老問寧武子之愚曰愚非愚魯之謂但是有才不自暴露觀衛侯為晉文公所執他委曲調護此豈愚者所能為故文公以為忠而免之忠豈愚之謂當亂世而能如此此其所以免禍也可學寧武子當衛成公出奔時煞曾經營著力來愚只是沉晦不認為己功故不可及若都不管國家事以是為愚豈可以為不可及也去僞問寧武子其愚不可及曰他人於邦無道之時要正救者不能免患要避患者又卻偷安若寧武子之愚既能韜晦以免患又自處不失其正此所以為不可及因舉晉人有送酒者云可力飲此勿預時事如此之愚則人皆能之也人傑寧武子邦無道則愚曰愚有兩節有一般愚而冒昧向前底少間都做壞了事如寧武子雖冒昧向前不露圭角只猝猝做將去然少間事又都做得了此其愚不可及也燾器之問當衛之無道武子卻不明進退之義而乃周旋其間不避艱險是如何曰武子九世公族與國同休戚要與尋常無干涉人不同若無干涉人要去也得住也得若要去時須早去始得到那艱險時節卻要去是甚道理宇問寧武子世臣他人不必如此曰然又看事如何若羇旅之臣見幾先去則可若事已爾又豈可去此事最難當權其輕重可學問寧武子愚處曰蓋不自表暴而能周旋成事伊川所謂沈晦以免患是也木之集注問先生謂武子仕成公無道之君云云此其愚之不可及也後面又取程子之說曰邦無道能沈晦以免患故曰不可及也亦有不當愚者比干是也若所謂亦有不當愚者固與先生之意合若所謂沈晦以免患者卻似與先生意異曰武子不避艱險以濟其君愚也然卒能全其身者智也若當時不能沈晦以自處則為人所害矣尚何君之能濟哉故當時稱知又稱其愚也廣周元興問寧武子曰武子當文公有道之時不得作為然它亦無事可見此其知可及也至成公無道失國若智巧之士必且去深僻處隱避不肯出來武子竭力其間至誠懇惻不避艱險卻能擺脫禍患卒得兩全非它能沈晦何以致此若比以智自免之士武子卻似箇愚底人但其愚得來好若使別人處之縱免禍患不失於此則失於彼此武子之愚所以不可及若比干諫而死看來似不會愚底人然它於義卻不當愚只得如此處又與武子不同故伊川說亦有不當愚者比干是也銖問比干何以不當愚曰世間事做一律看不得聖人不是要人人學寧武子但如武子亦自可為法比干卻是父族微子既去之後比干不容於不諫諫而死乃正也人當武子之時則為武子當比干之時則為比干執一不得也時舉子在陳章斐然成章也是自成一家了做得一章有頭有尾且如狂簡真箇了得狂簡底事不是半上落下雖與聖賢中道不同然畢竟是他做得一項事完全與今學者有頭無尾底不同聖人不得中道者與之故不得已取此等狂狷之人尚有可裁節使過不及歸于中道不似如今人不曾成得一事無下手腳裁節處且如真箇了得一箇狂簡地位也自早不易得釋老雖非聖人之道卻被他做得成一家明作成章是做得成片段有文理可觀蓋他狂也是做得箇狂底人成不是做得一上又放掉了狷也是他做得狷底成不是今日狷明日又不狷也如孝真箇是做得孝成忠真箇是做得忠成子貢之辨子路之勇都是真箇做得成了不是半上落下今日做得明日又休也僩斐然成章狂簡進取是做得透徹有成就了成章謂如樂章五聲變成文之謂如五采成文之謂章言其做得成就只恐過了所以欲裁之若是半青半黃不至成就卻如何裁得子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章當時從行者朝夕有商量無可憂者但留在魯國之人惟其狂簡故各自成章有頭有尾不知裁度若異端邪說釋老之學莫不自成一家此最害義如坐井觀天彼自以為所見之盡蓋窟在井裏所見自以為足及到井上又卻尋頭不著寧可理會不得卻自無病人傑先之問孔子在陳小子狂簡欲歸而裁之然至後來曾皙之徒弔喪而歌全似老莊不知聖人既裁之後何故如此曰裁之在聖人而聽不聽在他也時舉問孔子在陳曰歸歟歸歟此蓋夫子歷聘諸國見當時不能行其道也故欲歸而傳之門人狂簡者立高遠之志但過高而忽略恐流於異端故孔子思歸將以裁正之也曰孟子謂不忘其初便是只管一向過高了又曰文振說文字大故細南升或問子在陳一章看得夫子行道之心切於傳道之心曰也不消如此說且如人而今做事還是做目前事還是做後面事蓋道行於時自然傳於後然行之於時而傳之於後則傳之尤廣也或曰如今日無非堯舜禹湯之道曰正此謂也又問裁之為義如物之不正須裁割令正也曰自是如此且如狂簡底人不裁之則無所收檢而流入於異端蓋這般人只管是要他身高都不理會事所以易入於異端大率異端皆是遁世高尚底人素隱行怪之人其流為佛老又曰遁世高尚皆是苦行底人而今所以無異端緣那樣人都便入佛老去了且如孟之反不伐是他自占便宜處便如老氏所謂不為天下先底意思子桑子死琴張弔其喪而歌是不以生死芥帶便如釋氏子桑戶不衣冠而處夫子譏其同人道於牛馬或問又云皆老氏之流也如此等人雖是志意高遠然非聖人有以裁正之則一向狂去更無收殺便全不濟事了又云仁民愛物固是好事若流入於墨氏摩頂放踵而利天下為之則全不好了此所以貴裁之也燾蜚卿問孔子在陳何故只思狂士不說狷者曰狷底已自不濟事狂底卻有箇軀殼可以鞭策斐只是自有文采詩云有斐君子萋兮斐兮成章是自有箇次第自成箇模樣賀孫問集注謂文理成就而著見是只就他意趨自成箇模樣處說又云志大而略於細是就他志高遠而缺實做工夫說否曰然狷者只是自守得些便道是了所謂言必信行必果者是也賀孫集注問先生解云斐文貌成章言其文理成就有可觀者不知所謂文是文辭邪亦指事理言之邪曰非謂文辭也言其所為皆有文理可觀也又問狂簡既是志大而略於事又卻如何得所為成章曰隨他所見所習有倫有序有首有尾也便是異端雖與聖人之道不同然做得成就底亦皆隨他所為有倫序有首尾可觀也廣問集注謂文理成就如何曰雖是狂簡非中然卻做得這箇道理成箇物事自有可觀不是半上落下故聖人雖謂其狂簡而不知所裁然亦取其成一箇道理大率孔門弟子隨其資質各能成就如子路之勇真箇成一箇勇冉求之藝真箇成一箇藝言語德行之科皆然一齊被他做得成就了銖符舜功問集注釋狂簡之狂皆作高遠之意不知罔念作狂之狂與此狂字如何曰也不干事又問狂而不直如何曰此卻略相近狂而不直已自是不好了但尚不為惡在若罔念作狂則是如桀紂樣迷惑了義剛問恐其過中失正而或流於異端如莊列之徒莫是不得聖人為之依歸而無所取裁者否曰也是恁地又問子夏教門人就灑掃應對上用工亦可謂實然不一再傳而便流為莊周何故曰也只是韓退之恁地說漢書也說得不甚詳人所見各不同只是這一箇道理才看得別便從那別處去義剛問狂簡處先生云古來異端只是遁世高尚之士其流遂至於釋老如子桑戶死琴張臨其喪而歌是不以死生芥蒂胸次孟之反不伐便如道家所謂三寶一曰不敢為天下先是也似此等人雖則志意高遠若不得聖人裁定亦不濟事節伯夷叔齊章伯夷叔齊不念舊惡要見得他胸中都是義理拱燾文振問不念舊惡怨是用希曰此與顏子不遷怒意思相似蓋人之有惡我不是惡其人但是惡其惡耳到他既改其惡便自無可惡者今人見人有惡便惡之固是然那人既改其惡又從而追惡之此便是因人一事之惡而遂惡其人卻不是惡其惡也時舉南升録云此與不遷怒一般其所惡者因其人之可惡而惡之而所惡不在我及其能改又只見他善處不見他惡處聖賢之心皆是如此不念舊惡非惡其人也惡其人之無狀處昨日為善今日為惡則惡之而不好矣昨日為惡今日為善則好之而不惡矣皆非為其人也聖人大率如此但伯夷平日以隘聞故特明之方子問伯夷不念舊惡曰這箇也只是恰好只是當然且如人之有惡自家合當怒之人既改了便不當更怒之然伯夷之清也卻是箇介僻底人宜其惡惡直是惡之然能不念舊惡卻是他清之好處燾問蘇氏言二子之出意其父子之間有違言焉若申生之事歟不念舊惡莫是父子之間有違言處否曰然問孟子所言伯夷事自是如此孤潔諫武王伐商又都是伯夷而叔齊之事不可得見未知其平時行事如何卻並以不念舊惡稱之曰讓國二子同心度其當時必是有怨惡處問父欲立叔齊不立伯夷在叔齊何有怨惡曰孤竹君不立伯夷而立叔齊想伯夷當時之意亦道我不當立我弟卻當立叔齊須云兄當立不立卻立我兄弟之間自不能無此意問兄弟既遜讓安得有怨曰只見得他後來事當其初豈無怨惡之心夫子所以兩處皆說二子無怨問某看怨是用希之語不但是兄弟間怨希這人孤立易得與世不合至此無怨人之心此其所以為伯夷叔齊歟曰是如此宇或問問蘇氏父子違言之說恐未穩否曰蘇氏之說以為己怨而希字猶有些怨在然所謂又何怨則絶無怨矣又不相合恐只得從伊川說怨是人怨舊惡如衣冠不正望望然去之類蓋那人有過自家責他他便生怨然他過能改即止不復責他便不怨矣其所怨者只是至愚無識不能改過者耳淳孰謂微生高直章醯至易得之物尚委曲如此若臨大事如何當有便道有無便道無才枉其小便害其大此皆不可謂誠實也去僞只乞諸其鄰而與之便是屈曲處又問或朋友間急來覓一物自家若無與他去鄰家覓之卻分明說與可否曰這箇便是自家要做一面人情蓋謂是我為你乞得燾問看孔子說微生高一章雖一事之微亦可見王霸心術之異處一便見得皞皞氣象一便見得歡虞氣象曰然伊川解顯比一段說最詳賀孫問微生高不過是曲意徇物掠美市恩而已所枉雖小害直甚大聖人觀人每於微處便察見心術不是曰所謂曲意徇物掠美市恩其用心要作甚南升集注問范氏言千駟萬鍾從可知焉莫是說以非義而豫必有非義而取否曰不是說如此豫必如此取只看他小事尚如此到處千駟萬鍾亦只是這模樣微生高用心也是怪醯有甚難得之物我無了那人有教他自去求可矣今卻轉乞與之要得恩歸於己若教他自就那人乞恩便歸那人了此是甚心術淳録云若是緊要底物我無則求與之猶自可若曰宛轉濟人急難則猶有說今人危病轉求丹藥之類則有之問取豫二字有輕重否寓以為寧過於豫必嚴於取如何曰如此卻好然看一介不以與人一介不以取人本不分輕重今看豫自是豫他人不是入己寧過些不妨卻不干我事取則在己取之必當嚴楊問文中子言輕施者必好奪如何曰此說得亦近人情宇問張子韶有一片論乞醯不是不直上蔡之說亦然曰此無他此乃要使人回互委曲以為直爾噫此鄉原之漸不可不謹推此以往而不為枉尺直尋者幾希大雅行夫問此一章曰人煞有將此一段做好說謂其不如此抗直猶有委曲之意自張子韶為此說今煞有此說昨見戴少望論語講義亦如此說這一段下連巧言令色足恭都是一意當初孔門編排此書已從其類只自看如今有人來乞些醯亦是間底事只是與他說自家無鄰人有之這是多少正大有何不可須要自家取來卻做自底與之是甚氣象這本心是如何凡人欲恩由己出皆是偏曲之私恩由己出則怨將誰歸賀孫巧言令色足恭章義剛說足恭云只是過於恭曰所謂足者謂本當只如此我卻以為未足而添足之故謂之足若本當如此而但如此則自是足了乃不是足凡制字如此類者皆有兩義義剛問足恭曰足之為義湊足之謂也謂如合當九分卻要湊作十分意謂其少而又添之也才有此意便不好燾足去聲讀求足乎恭也是加添之意蓋能恭則禮已止矣若又去上面加添些子求足乎恭便是私欲也僩巧言令色足恭與匿怨皆不誠實者也人而不誠實何所不至所以可恥與上文乞醯之義相似去僞燾録云這便是乞醯意思一般所以記者類於此問巧言令色足恭是既失本心而外為諂媚底人匿怨而友其人是內懷險詖而外與人相善底人曰門人記此二事相連若是微生高之心弄來弄去便做得這般可恥事出來南升問左丘明謝氏以為古之聞人則左傳非丘明所作曰左丘是古有此姓名明自是一人作傳者乃左氏別自是一人是撫州鄧大著名世字元亞如此說他自作一書辨此義剛丘明所恥如此左傳必非其所作顏淵季路侍章問無伐善無施勞善與勞如何分別曰善是自家所有之善勞是自家做出來底燾問施勞之施是張大示誇意否曰然淳問老者安之朋友信之少者懷之孔子只舉此三者莫是朋友則是其等輩老者則是上一等人少者則是下一等此三者足以該盡天下之人否曰然廣問安老懷少恐其間多有節目今只統而言之恐流兼愛曰此是大概規模未說到節目也人傑顏淵季路侍一段子路所以小如顏淵者只是工夫粗不及顏淵細密工夫粗便有不周遍隔礙處又曰子路只是願車馬衣服與人共未有善可及人也僩問願車馬衣輕裘與朋友共曰這只是他心裏願得如此他做工夫只在這上豈不大段粗又曰子路所願者粗顏子較細向裏來且看他氣象是如何僩或問子路顏淵言志曰子路只是說得粗若無車馬輕裘便無工夫可做顏子無伐善無施勞便細膩有工夫然子路亦是無私而與物共者銖子路如此做工夫畢竟是疏是有這箇車馬輕裘方做得工夫無這車馬輕裘不見他做工夫處若顏子則心常在這裏做工夫然終是有些安排在恪子路須是有箇車馬輕裘方把與朋友共如顏子不要車馬輕裘只就性分上理會無伐善無施勞車馬輕裘則不足言矣然以顏子比之孔子則顏子猶是有箇善有箇勞在若孔子便不見有痕跡了夫子不厭不倦便是純亦不已植問顏子子路優劣曰子路柤用心常在外願車馬之類亦無意思若無此不成不下工夫然卻不私己顏子念念在此間顏季皆是願夫子則無願字曰夫子也是願又曰子路底收斂也可以到顏子顏子底純熟可以到夫子節子路顏淵夫子都是不私己但有小大之異耳子路只車馬衣裘之間所志已狹顏子將善與衆人公共何伐之有施諸己而不願亦勿施於人何施勞之有卻已是煞展拓然不若聖人分明是天地氣象端蒙問顏淵季路侍一章曰子路與顏淵固均於無我然子路做底都向外不知就身己上自有這工夫如顏子無伐善無施勞只是就自家這裏做恭甫問子路後來工夫進如衣敝縕袍與衣狐貉者立而不恥這卻見於裏面有工夫曰他也只把這箇做了自著破敝底卻把好底與朋友共固是人所難能然亦只是就外做較之世上一等切切於近利者大不同賀孫問顏淵季路夫子言志曰今學者只從子路比上去不見子路地位煞高是上面有顏子底一層見子路低了更有夫子一層又見顏子低了學者望子路地位如何會做得他底他這氣象煞大不如是何以為聖門高弟植叔器曰子路但及朋友不及他人所以較小曰願車馬衣輕裘與朋友共以朋友有通財之義故如此說那行道之人不成無故解衣衣之但所以較淺小者他能舍得車馬輕裘未必能舍得勞善有善未必不伐有勞未必不施若能退後省察則亦深密向前推廣則亦闊大范益之云顏子是就義理上做工夫子路是就事上做工夫曰子路是就意氣上做工夫顏子自是深潛淳粹淳録作縝密較別子路是有些戰國俠士氣象學者亦須如子路恁地割捨得士而懷居不足以為士矣若今人恁地畏首畏尾瞻前顧後粘手惹腳如何做得事成恁地莫道做好人不成便做惡人也不成先生至此聲極洪叔器再反覆說前章先生曰且粗說人之生各具此理但是人不見此理這裏都黑卒卒地如貓兒狗子飢便待物事喫困便睡到富貴便極聲色之奉一貧賤便憂愁無聊聖人則表裏精粗無不昭徹其形骸雖是人其實只是一團天理所謂從心所欲不踰矩左來右去盡是天理如何不快活義剛或問子路願車馬衣輕裘與朋友共是他做功夫處否曰這也不是他做工夫亦是他心裏自見得故願欲如此然必有別做工夫處若依如此做工夫大段粗了又問此卻見他心曰固是此見得他心之恢廣磨去得那私意然也只去得那粗底私意如顏子卻是磨去那近裏底了然皆是對物我而言又云狂簡底人做來做去沒收殺便流入異端如子路底人做來做去沒收殺便成任俠去又問學者做工夫須自子路工夫做起曰亦不可如此說且如有顏子資質底不成交他做子路也燾亞夫問子路言志處曰就聖人上看便如日出而爝火息雖無伐善無施勞之事皆不必言矣就顏子上看便見得雖有車馬衣裘共敝之善既不伐不施卻不當事了不用如子路樣著力去做然子路雖不以車馬輕裘為事然畢竟以此為一件功能此聖人大賢氣象所以不同也時舉子路有濟人利物之心顏子有平物我之心夫子有萬物得其所之心道夫吳伯英講子路顏淵夫子言志先生問衆人曰顏子季路所以未及聖人者何衆人未對先生曰子路所言只為對著一箇不與朋友共敝之而有憾在顏子所言只為對著一箇伐善施勞在非如孔子之言皆是循其理之當然初無待乎有所懲創也子路之志譬如一病人之最重者當其既蘇則曰吾當謹其飲食起居也顏子之志亦如病之差輕者及其既蘇則曰吾當謹其動靜語默也夫出處起居動靜語默之知所謹蓋由不知謹者為之對也曾不若一人素能謹護調攝渾然無病問其所為則不過曰飢則食而渴則飲也此二子之所以異於聖人也至就二子而觀之則又不容無優劣季路之所志者不過朋友而已顏子之志則又廣矣季路之所言者粗顏子之所言者細也壯祖閎祖録云子路顏淵夫子言志伊川諸說固皆至當然二子之所以異於夫子者更有一意無憾對憾而言也無伐無施對伐施而言也二子日前想亦未免此病今方不然如人病後始願不病故有此言如夫子則更無懲創不假修為此其所以異也顏淵子路只是要克去驕吝二字如謝氏對伊川云知矜之為害而改之然謝氏終有矜底意如解孟之反不伐便著意去解人傑舊或說老者安之一段謂老者安於我朋友信於我少者懷於我此說較好蓋老者安於我則我之安之必盡其至朋友信於我則我之為信必無不盡少者懷於我則我之所以懷之必極其撫愛之道卻是見得聖人說得自然處義剛集注或問集注云安於我懷於我信於我何也曰如大學君子賢其賢而親其親小人樂其樂而利其利一般蓋無一物不得其所也老者我去安他他便安於我少者我去懷他他便懷於我朋友我去信他他便信於我又問顏子子路所答曰此只是各說身己上病痛處子路想平日不能與朋友共裘馬顏子平日未能忘伐善施勞故各如此言之如新病安來說方病時事如說我今日病較輕得些便是病未曾盡去猶有些根腳更服藥始得彼云願則猶有未盡脫然底意思又如病起時說願得不病便是曾病來然二子如此說時便是去得此病了但尚未能如天子自然而已如夫子則無此等了曠然如太空更無些滯礙其所志但如此耳更不消著力又曰古人揀己偏重處去克治子路是去得箇吝字顏子是去得箇驕字祖道夔孫録云二子言志恰似新病起人雖去得此病了但著服藥隄防願得不再發作若聖人之志則曠然太虛了無一物又曰古人為學大率體察病痛就上面克治將去問老者安之云云一說安者安我也恭父謂兩說只一意先生曰語意向背自不同賀孫云若作安老者說方是做去老者安我說則是自然如此了曰然因舉史記魯世家及漢書地理志云魯道之衰洙泗之間齗齗如也謂先魯盛時少者代老者負荷老者即安之到後來少者亦知代老者之勞但老者自不安於役少者故道路之間只見遜讓故曰齗齗如也注云分辨之意也賀孫問仲由何以見其求仁曰他人於微小物事尚戀戀不肯捨仲由能如此其心廣大而不私己矣非其意在於求仁乎升卿叔蒙問夫子安仁顏子不違仁子路求仁曰就子路顏子聖人只是見處有淺深大小耳皆只是盡我這裏底子路常要得車馬輕裘與朋友共據他煞是有工夫了輕財重義有得些小潑物事與朋友共多少是好今人計較財物這箇是我底那箇是你底如此見得子路是高了顏子常要得無伐善施勞顏子工夫是大段縝密就顏子分上正恰好了也只得如此到聖人是安仁地位大抵顏子無伐善無施勞也只與願車馬輕裘與朋友共敝相似夫子安老懷少信朋友也與無伐善無施勞相似但有淺深大小不同就子路地位更收斂近裏便會到無伐善無施勞處就顏子地位更極其精微廣大便到安老懷少信朋友爾宇問夫子安仁顏淵不違仁子路求仁曰伊川云孔子二子之志皆與物共者也有淺深小大之間耳子路底淺顏子底深二子底小聖人底大子路底較粗顏子底較細膩子路必待有車馬輕裘方與物共若無此物又作麼生顏子便將那好底物事與人共之見得那子路底又低了不足為只就日用間無非是與人共之事顏子底儘細膩子路底只是較粗然都是去得箇私意了只是有粗細子路譬如脫得上面兩件鏖糟底衣服了顏子又脫得那近裏面底衣服了聖人則和那裏面貼肉底汗衫都脫得赤骨立了僩問觀子路顏子孔子之志皆是與物共者也才與物共便是仁然有小大之別子路求仁者也顏子不違仁者也孔子安仁者也求仁者是有志於此理故其氣象高遠可以入道然猶自車馬輕裘上做工夫顏子則就性分上做工夫能不私其己可謂仁矣然未免於有意只是不違仁氣象若孔子則不言而行不為而成渾然天理流行而不見其跡此安仁者也曰說得也穩大凡人有己則有私子路願車馬衣輕裘與朋友共其志可謂高遠然猶未離這軀殼裏顏子不伐其善不張大其功則高於子路然願無伐善無施勞便是猶有此心但願無之而已是一半出於軀殼裏孔子則離了軀殼不知那箇是己那箇是物凡學學此而已南升時舉録云文振問此章先生曰子路是不以外物纍其心方剝得外面一重粗皮子去顏淵卻又高一等便是又剝得一重細底皮去猶在軀殼子裏若聖人則超然與天地同體矣問孔子安仁固無可言顏子不違仁乃是已得之故不違便是克己復禮底事子路方有與物共之志故曰求仁曰然又曰這般事如今都難說他當時只因子路說出那一段故顏子就子路所說上說便見得顏子是箇已得底意思孔子又就顏子所說上說皆是將己與物對說子路便是箇舍己忘私底意思今若守定他這說曰此便是求仁不成子路每日都無事只是如此當時只因子路偶然如此說出故顏子孔子各就上面說去其意思各自不同使子路若別說出一般事則顏子孔子又自就他那一般事上說然意思卻只如此文蔚子路顏淵孔子言志須要知他未言時如何讀書須迎前看不得隨後看所謂考跡以觀其用察言以求其心且如公說從仁心上發出所以忘物我言語也無病也說得去只是尚在外邊程先生言不私己而與物共是三段骨體須知義理不能已之處方是用得大抵道理都是合當恁地不是過當若到是處只得箇恰好事親若曾子可也從周顏子之志不以己之長方人之短不以己之能愧人之不能是與物共道夫問伊川言子路勇於義者觀其志豈可以勢利拘之哉曰能輕己之所有以與人共勢利之人豈肯如此子路志願正學者事宇問車馬輕裘與朋友共亦常人所能為之事子路舉此而言卻似有車馬衣裘為重之意莫與氣象煞遼絶否曰固則是只是如今人自有一等鄙吝者直是計較及於父子骨肉之間或有外面勉強而中心不然者豈可與子路同日而語子路氣象非富貴所能動矣程子謂豈可以勢利拘之哉木之問浴沂地位恁高程子稱子路言志亞於浴沂何也曰子路學雖粗然他資質也高如人告以有過則喜有聞未之能行惟恐有聞見善必遷聞義必徙皆是資質高車馬輕裘都不做事看所以亞於浴沂故程子曰子路只為不達為國以禮道理若達便是這氣象也淳問亞於浴沂者也浴沂是自得於中而外物不能以纍之子路雖未至自得然亦不為外物所動矣曰是義剛問車馬輕裘與朋友共此是子路有志求仁能與物共底意思但其心不為車馬衣裘所纍耳而程子謂其亞於浴沂據先生解曾點事煞高子路只此一事如何便亞得他曰子路是箇資質高底人要不做底事便不做雖是做工夫處粗不如顏子之細密然其資質卻自甚高若見得透便不干事廣問願聞子之志雖曰比子路顏子分明氣象不同然觀曾點言志一段集注盛贊其雖答言志之問而初實未嘗言其志之所欲為以為曾點但知樂所樂而無一毫好慕之心作為之想然則聖人殆不及曾點邪曰聖人所言雖有及物之意然亦莫非循其理之自然使物各得其所而己不勞焉又何害於天理之流行哉蓋曾點所言卻是意思聖人所言盡是事實問不自私己故無伐善知同於人故無施勞恐是互舉曰他先是作勞事之勞說所以有那知同於人一句某後來作功勞之勞皆只是不自矜之意無伐善是不矜己能無施勞是不矜己功至之云無施勞但作己所不欲勿施於人意思解也好曰易有勞而不伐與勞謙君子有終皆是以勞為功義剛問施勞與伐善意思相類曰是相類問看來善自其平生之所能言勞以其一時之功勞言曰亦是勞是就事業上說問程子言不自私己故無伐善知同於人故無施勞看來不自私己與知同於人亦有些相似曰不要如此疑以善者己之所有不自有於己故無伐善以勞事人之所憚知同於人故無施勞宇問集注云羈靮以御馬而不以制牛這箇只是天理聖人順之而已曰這只是天理自合如此炎録云天下事合恁地處便是自然之理如老者安之是他自帶得安之理來朋友信之是他自帶得信之理來少者懷之是他自帶得懷之理來聖人為之初無形跡季路顏淵便先有自身了方做去如穿牛鼻絡馬首都是天理如此恰似他生下便自帶得此理來又如放龍蛇驅虎豹也是他自帶得驅除之理來如剪滅蝮虺也是他自帶得剪滅之理來若不驅除剪滅便不是天理所以說道有物必有則不問好惡底物事都自有箇則子又云子路更修教細密便是顏子地位顏子若展拓教開便是孔子地位子路只緣粗了又問集注云皆與物共者也但有小大之差耳曰這道理只為人不見得全體所以都自狹小了最患如此聖人如何得恁地大人都不見道理形骸之隔而物我判為二又云強恕而行求仁莫近焉若見得萬物皆備於我如何不會開展又問顏子恐不是強恕意思子路卻是強恕否曰顏子固不是強恕然學者須是強恕始得且如今人有些小物事有箇好惡自定去把了好底卻把不好底與人這般意思如何得開闊這般在學者正宜用工漸漸克去便是求仁工夫賀孫伊川令學者看聖賢氣象曰要看聖賢氣象則甚且如看子路氣象見其輕財重義如此則其胸中鄙吝消了幾多看顏子氣象見其無伐善無施勞如此則其胸中好施之心消了幾多此二事誰人胸中無雖顏子亦只願無則其胸中亦尚有之聖人氣象雖非常人之所可能然其如天底氣象亦須知常以是涵養於胸中又云亦須看子路所以不及顏子處顏子所以不及聖人處吾所以不及賢者處卻好做工夫叔器問先識聖人氣象如何曰也不要如此理會聖賢等級自分明了如子路定不如顏子顏子定不如夫子只要看如何做得到這裏且如願車馬衣輕裘敝之無憾自家真能如此否有善真能無伐否有勞真能無施否今不理會聖賢做起處義剛録作今不將他做處去切己理會體認分明著卻只去想他氣象則精神卻只在外自家不曾做得著實工夫須是切問而近思向時朋友只管愛說曾點漆雕開優劣亦何必如此但當思量我何緣得到漆雕開田地何緣得到曾點田地若不去學他做只管較他優劣義剛録作如此去做將久便解似他他那優劣自是不同何必計較便較得分明亦不干自己事如祖公年紀自是大如爺爺年紀自是大如我只計較得來也無益叔器云希顏録曾子書莫亦要如此下工夫否曰曾子事雜見他書他只是要聚做一處看顏子事亦只要在眼前也不須恁地起模畫樣而今緊要且看聖人是如何常人是如何自家因甚便不似聖人因甚便只似常人就此理會得自是超凡入聖淳義剛同或問有人於此與朋友共實無所憾但貧乏不能復有所置則於所敝未能恝然忘情則如之何曰雖無憾於朋友而眷眷不能忘情於己敝之物亦非賢達之心也道夫附問謝氏解顏淵季路侍章或問謂其以有志為至道之病因及其所論浴沂御風何思何慮之屬每每如此竊謂謝氏論學每有不屑卑近之意其聖門狂簡之徒歟集注云狂簡志大而略於事也曰上蔡有此等病不是小分明是釋老意思向見其雜文一編皆不帖帖地如觀復堂記如謝人啓事數篇皆然其啓內有云志在天下豈若陳孺子之云乎身寄人間得如馬少游而足矣必大或問已矣乎章問程子曰自訟不置能無改乎又曰罪己責躬不可無然亦不當長留在心胸為悔今有學者幸知自訟矣心胸之悔又若何而能不留耶曰改了便無悔又問已往之失卻如何曰自是無可救了必大時可問伊川云自訟不置能無改乎譬如人爭訟一訟未決必至於再必至於三必至於勝而後已有過則亦必當攻責不已必至於改而後已曰伊川怕人有過只恁地訟了便休故說教著力看來世上也自有人徒恁地訟訟了便休只看有多少事來今日又恁地自訟明日又恁地自訟今年又恁地自訟明年又恁地自訟看來依舊不曾改變只是舊時人他也只知箇自訟是好事只是不誠於自訟賀孫十室之邑章或問美底資質固多但以聖人為生知不可學而不知好學曰亦有不知所謂學底如三家村裏有好資質底人他又那知所謂學又那知聖人如何是聖人又如何是生知堯如何是堯舜如何是舜若如此則亦是理會不得底了燾義剛說忠信如聖人生質之美者也此是表裏粹然好底資質曰是義剛
