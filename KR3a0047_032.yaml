body:
  text: 朱子語類卷第三十二論語十四雍也篇三冉求曰非不說子之道章問力不足者非干志否曰雖非志而志亦在其中所見不明氣質昏弱皆力不足之故冉求乃自畫耳力不足者欲為而不能為自畫者可為而不肯為宇力不足者中道而廢廢是好學而不能進之人或是不會做工夫或是材質不可勉者今女畫畫是自畫乃自謂材質不敏而不肯為學者必大中道而廢與半途而廢不同半途是有那懶而不進之意中道是那只管前去中道力不足而止他這中道說得好高問冉求自畫曰如駑駘之馬固不可便及得騏驥然且行向前去行不得死了沒奈何卻不行便甘心說行不得如今如此者多問自畫與自棄如何曰也只是一般只自畫是就進上說到中間自住了自棄是全不做賀孫伊川曰冉求言非不說子之道力不足也夫子告以為學為己未有力不足者所謂力不足者乃中道而自廢耳今汝自止非力不足也自廢與自止兩自字意不同自廢則罪不在己自止乃己之罪謝氏曰欲為而不能為是之謂力不足能為而不欲為是之謂畫以畫為力不足其亦未知用力與使其知所以用力豈有力不足者其亦未知說夫子之道與使其知說夫子之道豈肯畫也第十一章凡六說伊川謝氏之說范氏楊氏之說亦正但無甚緊切處呂氏發明伊川之說以中道而廢作不幸字甚親切廢字作足廢大鑿不知伊川只上一自字便可見尹氏用伊川之說但於廢字上去一自字便覺無力曰伊川兩自字恐無不同之意觀其上文云未有力不足者則是所謂力不足者正謂其人自不肯進爾非真力不足也此說自與本文不合而來說必令牽合為一故失之耳謝氏與伊川不同卻得本文之意幹子謂子夏曰章問女為君子儒無為小人儒君子於學只欲得於己小人於學只欲見知於人曰今只就面前看便見君子儒小人儒同為此學者也若不就己分上做工夫只要說得去以此欺人便是小人儒南升問孔子誨子夏勿為小人儒曰子夏是箇細密謹嚴底人中間忒細密於小小事上不肯放過便有委曲周旋人情投時好之弊所以或流入於小人之儒也子游與子夏絶不相似子游高爽疏暢意思闊大似箇蕭散底道人觀與子夏爭灑掃應對一段可見如為武城宰孔子問女得人焉爾乎他卻說箇淡臺滅明及所以取之又卻只是行不由徑未嘗至於偃之室兩句有甚干涉可見這箇意思好他對子夏說本之則無如之何他資稟高明須是識得這些意思方如此說又問子張與子夏亦不同曰然子張又不及子游子游卻又實子張空說得箇頭勢太大了裏面工夫都空虛所以孔子誨之以居之無倦行之以忠便是救其病子張較聒噪人愛說大話而無實問謝氏說子夏文學雖有餘意其遠者大者或昧焉子張篇中載子夏言語如此豈得為遠者大者或昧曰上蔡此說某所未安其說道子夏專意文學未見箇遠大處看只當如程子君子儒為己小人儒為人之說問或以夫子教子夏為大儒毋為小儒如何曰不須說子夏是大儒小儒且要求箇自家使處聖人為萬世立言豈專為子夏設今看此處正要見得箇義與利分明人多於此處含糊去了不分界限君子儒上達小人儒下達須是見得分曉始得人自是不覺察耳今自道己會讀書看義理做文章便道別人不會自以為說得行便謂強得人此便是小人儒毫釐間便分君子小人豈謂子夏決不如此問五峰言天理人欲同體而異用同行而異情先生以為同體而異用說未穩是否曰亦須是實見此句可疑始得又曰今人於義利處皆無辨只恁鶻突去是須還他是不是還他不是若都做得是猶自有深淺況於不是宇集義第十二章凡五說今從謝氏之說伊川尹氏以為為人為己范氏以為舉內徇外治本務末楊氏以義利為君子小人之別其說皆通而於淺深之間似不可不別竊謂小人之得名有三而為人為利徇外務末其過亦有淺深蓋有直指其為小人者此人也其陷溺必深有對大人君子而言者則特以其小於君子大人而得是名耳與陷溺者不同雖均於為人為利均於徇外務末而過則有淺深也夫子告子夏以毋為小人儒乃對君子大人而小者耳若只統說則與世俗之真小人者無異而何以儒為哉曰伊川意可包衆說小人固有等第然此章之意卻無分別幹子游為武城宰章聖人之言寬緩不急迫如焉爾乎三箇字是助語節問子游為武城宰章曰公事不可知但不以私事見邑宰意其鄉飲讀法之類也南升問楊氏曰為政以人才為先如子游為武城宰縱得人將焉用之似說不通曰古者士人為吏恁地說也說得通更為政而得人講論此亦為政之助恁地說也說得通節問集注取楊氏說云觀其二事之小而正大之情可見矣曰看這氣象便不恁地猥碎問非獨見滅明如此亦見得子游胸懷也恁地開廣故取得這般人曰子游意思高遠識得大體問與琴張曾皙牧皮相類否曰也有曾皙氣象如與子夏言抑末也本之則無如之何此一著固是失了只也見得這人是曠闊底又如問孝則答以今之孝者是謂能養不敬何以別見得他於事親愛有餘而敬不足又如說事君數斯辱矣朋友數斯疏矣與喪致乎哀而止亦見得他不要如此苦切子之武城聞絃歌子游舉君子學道愛人等語君子是大人小人是小民昨日丘子服出作論題皆曉不得子游意謂君子學道及其臨民則愛民小民學道則知分知禮而服事其上所以絃歌教武城孔子便說他說得是這也見子游高處賀孫問檀弓載子游曾子語多是曾子不及子游曰人說是子游弟子記故子游事詳問子游初間甚高如何後來卻不如曾子之守約曰守約底工夫實如子游這般人卻怕於中間缺工夫問子謂子夏曰女為君子儒無為小人儒看子夏煞緊小故夫子恐其不見大道於義利之辨有未甚明曰子游與子夏全相反只子夏灑掃應對事卻自是切己工夫如子夏促狹如子游說抑末也本之則無如之何是他見得大源頭故不屑屑於此如孔子答問孝於子夏曰色難與子游全是兩樣子夏能勤奉養而未知愈色婉容之為美賀孫問謝氏曰云云右第十三章凡五說伊川兩說伊川尹氏解行不由徑作動必從正道楊氏謂直道而行皆是疑行不由徑為非中理竊意滅明之為人未至成德但有一節一行可取如非公事不至偃室自成德者觀之此特其一行爾而子游尚稱之則行不由徑亦但以其不欲速而遵大路可知也伊川兩說蓋權時者之事也范氏乃就推人君說曰來說得之幹孟之反不伐章問孟之反不伐曰孟之反資稟也高未必是學只世上自有這般人不要爭功胡先生說莊子所載三子云孟子反子桑戶子琴張子反便是孟之反子桑戶便是子桑伯子可也簡底子琴張便是琴張孔子所謂狂者也但莊子說得怪誕但他是與這般人相投都自恁地沒檢束賀孫立之問此章曰人之矜伐都從私意上來才有私意便有甚好事也做不得孟之反不伐便是克伐不行與顏子無伐善施勞底意思相似雖孟之反別事未知如何只此一節便可為法人之私意多端聖人所以言此者正提起與人看使人知所自克也時舉問凡人所以矜伐者其病根在甚處只為有欲上人之心才有欲上人之心則人欲日長天理日消凡可以矜己誇人者無所不至故學者當去其欲上人之心則天理自明矣曰欲上人之心便是私欲聖人四方八面提起向人說只要人去得私欲孟之反其他事不可知只此一事便可為法也南升問孟之反不伐人之伐心固難克然若非先知得是合當做底事則臨事時必消磨不去諸葛孔明所謂此臣所以報先帝而忠陛下之職分也若知凡事皆其職分之所當為只看做得甚麼樣大功業亦自然無伐心矣曰也不是恁地只得箇心地平底人故能如此若使其心地不平有矜伐之心則雖十分知是職分之所當為少間自是走從那一邊去遏捺不下少間便說我卻盡職分你卻如何不盡職分便自有這般心孟之反只是箇心地平所以消磨容得去僩讀孟之反不伐章曰此與馮異之事不同蓋軍敗以殿為功殿於後則人皆屬目其歸地若不恁地說便是自承當這箇殿後之功若馮異乃是戰時有功到後來事定諸將皆論功它卻不自言也時舉問呂氏謂人之不伐能不自言而已孟之反不伐則以言以事自掩其功加於人一等矣第十四章凡六說今從呂說范楊侯尹論其謙讓不伐只統說大綱於聖人所稱孟之反之意有未盡不如呂氏說得馬不進也之意出謝氏說學者事甚緊切於本文未密曰若不自掩即是自居其功矣恐不必如呂氏說幹不有祝鮀之佞章問此章曰此孔子歎辭也言衰世好諛悅色非此不能免蓋深傷之當只從程先生之說謨第十五章凡七說伊川三說今從伊川此說伊川第二第三說呂范尹之說皆一意與伊川第一說同范氏曰有朝之令色無鮀之巧言猶難免於當世據范氏主意乃在疾時之好佞故曰猶難免於當世非加一猶字則其說不通文意恐不如此謝氏曰善觀世之治亂者如此乃推說侯氏曰而字疑為不字說恐未必是文錯或文勢如此曰當從伊川說幹誰能出不由戶章誰能出不由戶何故人皆莫由此道也振問何莫由斯道也曰但才不合理處便是不由道問呂氏曰出而不能不由戶則何行而非達道也哉楊氏曰道無適而非也孰不由斯乎猶之出必由戶也百姓日用而不知耳尹氏曰道不可離可離非道猶出入必由戶也第十六章凡六說今從呂楊尹之說伊川范氏謝氏皆正但伊川事必由其道一句未粹范謝說稍寬曰此言人不能出不由戶何故卻行不由道怪而歎之之辭也伊川雖不如此說然事必由其道一句不見其失不可輕議更宜思之幹質勝文則野章史掌文籍之官如二公及王乃問諸史并周禮諸屬各有史幾人如內史御史皆掌文籍之官秦有御史大夫亦掌制度文物者也僩質勝文則野文勝質則史是不可以相勝才勝便不好龜山云則可以相勝則字怕誤當作不字賀孫夫子言文質彬彬自然停當恰好不少了些子意思若子貢文猶質質猶文便說得偏了端蒙問伊川曰君子之道文質得其宜也范氏曰凡史之事云云第十七章凡七說今從伊川范氏之說伊川第二說呂氏說論史字皆通謝氏專指儀容說恐未當大綱且論文質故有野與史之別若專以為儀容則說史字不通史無與儀容事楊氏自質之勝文以下皆推說與本文不類尹氏曰史文勝而理不足理字未安如此則野可謂之理勝也既謂之勝則理必不足野與史皆可謂之理不足也曰史既給事官府則亦習於容止矣謝說之失不在此卻是所說全以觀人為言無矯揉著力處失卻聖人本旨楊說推得卻有功文勝則理不足亦未有病野固理勝而文不足也幹人之生也直章生理本直人不為直便有死之道而卻生者是幸而免也夔孫罔之生也之生與上面生字微有不同此生字是生存之生人之絶滅天理便是合死之人今而不死蓋幸免也人傑或問人之生也直曰人之生元來都是直理罔便是都背了直理當仁而不仁當義而不義皆是背了直理既如此合是死若不死時便是幸而免燾天地生生之理只是直才直便是有生生之理不直則是枉天理宜自屈折也而亦得生是幸而免耳如木方生須被折了便不直多應是死到得不死幸然如此賀孫問人之生也直曰生理本直順理而行便是合得生若不直便是不合得生特幸而免於死耳亞夫問如何是生理本直曰如父子便本有親君臣便本有義南升人之生也直如飢食渴飲是是非非本是曰直自無許多周遮如敬以直內只是要直又曰只看生理本直四字時舉録云只玩味此四字便自有味如見孺子入井便自有怵惕之心時舉録云即便是直見不義底事便自有羞惡之心是本有那箇當為之理若是內交要譽便是不直時舉録云才有內交要譽之意便是曲了林恭甫說生理本直未透曰如水有源便流這只是流出來無阻滯處如見孺子將入井便有箇惻隱之心見一件可羞惡底事便有箇羞惡之心這都是本心自然恁地發出來都遏不住而今若順這箇行便是若是見入井後不惻隱見可羞惡而不羞惡便是拗了這箇道理這便是罔義剛罔只是脫空作僞做人不誠實以非為是以黑為白如不孝於父卻與人說我孝不弟於兄卻與人說我弟此便是罔據此等人合當用死卻生於世是幸而免耳生理本直如耳之聽目之視鼻之臭口之言心之思是自然用如此若才去這裏著些屈曲支離便是不直矣又云凡人解書只是這一箇粗近底道理不須別為高遠之說如云不直只是這箇不直卻云不是這箇不直別有箇不直此卻不得所謂淺深者是人就這明白道理中見得自有粗細不可說這說是淺底別求一箇深底若論不直其粗至於以鹿為馬也是不直其細推至一念之不實惡惡不如惡惡臭好善不如好好色也是不直只是要人自就這箇粗說底道理中看得越向裏來教細耳不是別求一樣深遠之說也僩問或問云上生字為始生之生下生字為生存之生雖若不同而義實相足何也曰後日生活之生亦是保前日之生所以人死時此生便絶節問明道云民受天地之中以生天命之謂性也人之生也直亦是此意莫微有差別否曰如何有差別便是這道理本直孔子卻是為欲說罔之生也所以說箇直字與民受天地之中義理一般僩集義問伊川曰人類之生以直道也欺罔而免者幸耳謝氏曰云云第十八章凡九說楊氏兩說今從伊川謝氏之說明道曰生理本直范氏曰人之性善故其生直尹氏曰直性也此三說者皆以生字作始生之生未安據此章正如禮所謂失之者死得之者生乃生存之生若以為生本直性本直則是指人之始生言之人之始生固可謂之直下文又不當有始生而罔者下句若作生存之生則上句不應作始生之生橫渠解幸而免似鑿本文上句卻無吉凶莫非正之意呂氏曰罔如網無常者也罔字只對直字看便可見似不必深說游氏雖說有未盡大綱亦正楊氏曰人者盡人道者其意以人字作一重字解似對罔字言之未當人字只大綱說第二說大略曰此兩生字上一字是始生之生下一字是生存之生當以明道之說求之則得之矣幹知之者不如好之者章知之者不如好之者人之生便有此理然被物欲昏蔽故知此理者已少好之者是知之已至分明見得此理可愛可求故心誠好之樂之者是好之已至而此理已得之於己凡天地萬物之理皆具足於吾身則樂莫大焉知之者如五穀之可食好之者是食而知其味樂之者是食而飽南升問若是真知安得不如好之若是真好安得不如樂之曰不說不是真知與真好只是知得未極至好得未極至如數到九數便自會數過十與十一去數到十九數便自會數過二十與二十一去不著得氣力自然如此若方數得六七自是未易過十數得十五自是未易過二十數這都是未極至處如行到福州須行到福州境界極了方到興化界這邊來也行盡福州界了方行到南劍界若行未盡福州界自是未到得別州境界樂則生矣生則惡可已也賀孫問明道曰篤信好學未如自得之樂好之者如游他人園圃樂之者則己物耳然只能信道亦是人之難能也伊川曰非有所得安能樂之又曰知之者在彼而我知之也好之者雖篤而未能有之至於樂之則為己之所有第十九章凡七說伊川三說今從明道伊川之說伊川第二說推說教人事曰知之必好之好之必求之求之必得之古人此箇學是終身底事果能造次顛沛必於是豈有不得之理范氏曰樂則生矣呂氏亦曰樂則不可已皆推說樂以後事若原其所以樂則須如伊川之說呂氏曰知之則不惑據此章知字只謂好學者耳未到不惑地位其說稍深楊氏曰夫婦之愚可以與知焉則知之非艱矣此說知字又太淺人而知學者亦不易得夫婦之知習之而不察者耳未足以為知二說正相反呂氏過楊氏不及謝氏曰樂則無欣厭取舍謂之無厭無舍則可若謂之無所欣無所取則何以謂之樂尹氏大綱與伊川同意但以安字訓樂字未緊曰所論知字甚善但此亦謂知義理之大端者耳謝說大抵太過幹中人以上章叔器問中人上下是資質否曰且不粧定恁地或是他工夫如此或是他資質如此聖人只說中人以上中人以下時便都包得在裏面了聖人說中人以下不可將那高遠底說與他怕他時下無討頭處若是就他地位說時理會得一件便是一件庶幾漸漸長進一日強似一日一年強似一年不知不覺便也解到高遠處義剛問聖人教人不問智愚高下未有不先之淺近而後及其高深今中人以上之資遽以上焉者語之何也曰他本有這資質又須有這工夫故聖人方以上者語之今人既無這資質又無這工夫所以日趨於下流宇正淳問中人以下不可以語上是使之下學而未可語以上達否曰如此則下學上達分而為二事矣況上達亦如何說得與他須是待他自達此章只是說智識未理會得此義理者語之無益爾必大行夫問此章曰理只是一致譬之水也有把與人少者有把與人多者隨其質之高下而告之非謂理有二致也時舉或問此一段曰正如告顏淵以克己復禮告仲弓以持敬行恕告司馬牛以言之訒蓋清明剛健者自是一樣恭默和順者自是一樣有病痛者自是一樣皆因其所及而語之也僩問謝氏既以分言又以操術言豈非謂貴賤異等執業不同故居下者不可語之以向上者之事否曰也只是論學術所至之淺深而已必大集義問明道曰上智高遠之事非中人以下所可告蓋踰涯分也橫渠曰云云此說得之呂監廟所編其說似正不知載在何集録第二十章凡六說伊川兩說橫渠說在外伊川第二說曰中人以上中人以下皆謂才也第一說與尹氏之說同此意謂之才者以為稟受然爾楊氏亦曰有中人上下者氣稟異也此三說皆以其上中下為係所稟受范氏則曰由學與不學故也謝氏亦曰特語其操術淺深非不移之品此二說又以其上中下為係於學術五說正相反據本文只大綱論上中下初未嘗推原其所以然也若推原其所以然則二者皆有之或以其稟受不同或以其學術有異不可偏舉曰伊川第二說已具二者之意矣幹樊遲問知章問務民之義敬鬼神而遠之諸家皆作兩事說曰此兩句恐是一意民者人也義者宜也如詩所謂民之秉彝即人之義也此則人之所宜為者不可不務也此而不務而反求之幽冥不可測識之間而欲避禍以求福此豈謂之智者哉先難後獲即仲舒所謂仁人明道不計功之意呂氏說最好辭約而義甚精去僞問樊遲問知當專用力於人道之所宜而不惑於鬼神之不可知此知者之事也若不務人道之所宜為而褻近鬼神乃惑也須是敬而遠之乃為知先難而後獲謂先其事之所難而後其效之所得此仁者之心也若方從事於克己而便欲天下之歸仁則是有為而為之乃先獲也若有先獲之心便不可以為仁矣曰何故有先獲之心便不可以為仁曰方從事於仁便計較其效之所得此便是私心曰此一句說得是克己正是要克去私心又卻計其效之所得乃是私心也只是私心便不是仁又曰務民之義只是就分明處用力則一日便有一日之效不知務民之義褻近鬼神只是枉費心力今人褻近鬼神只是惑於鬼神此之謂不知如臧文仲居蔡古人非不用卜筮今乃褻瀆如此便是不知呂氏當務之為急說得好不求於所難知一句說得鶻突南升問敬鬼神而遠之莫是知有其理故能敬不為他所惑故能遠曰人之於鬼神自當敬而遠之若見得那道理分明則須著如此如今人信事浮屠以求福利便是不能遠也又如卜筮自伏羲堯舜以來皆用之是有此理矣今人若於事有疑敬以卜筮決之有何不可如義理合當做底事卻又疑惑只管去問於卜筮亦不能遠也蓋人自有人道所當為之事今若不肯自盡只管去諂事鬼神便是不智因言夫子所答樊遲問仁智一段正是指中間一條正當路與人人所當做者卻不肯去做才去做時又便生箇計獲之心皆是墮於一偏人能常以此提撕則心常得其正矣廣問敬鬼神而遠之曰此鬼神是指正當合祭祀者且如宗廟山川是合當祭祀底亦當敬而不可褻近泥著才泥著便不是且如卜筮用龜所不能免臧文仲卻為山節藻梲之室以藏之便是不智也銖問敬鬼神而遠之如天地山川之神與夫祖先此固當敬至如世間一種泛然之鬼神果當敬否曰他所謂敬鬼神是敬正當底鬼神敬而遠之是不可褻瀆不可媚如卜筮用龜此亦不免如臧文仲山節藻梲以藏之便是媚便是不知節問程子說鬼神如孔子告樊遲乃是正鬼神如說今人信不信又別是一項如何滾同說曰雖是有異然皆不可不敬遠可學先難後獲只是無期必之心時舉問仁者先難而後獲曰獲有期望之意學者之於仁工夫最難但先為人所難為不必有期望之心可也去僞只是我合做底事便自做將去更無下面一截才有計獲之心便不是了恪先難後獲仁者之心如是故求仁者之心亦當如是須先難而後獲不探虎穴安得虎子須是捨身入裏面去如搏寇讎方得之若輕輕地說得不濟事方子問仁者先難而後獲難者莫難於去私欲私欲既去則惻然動於中者不期見而自見曰仁畢竟是箇甚形狀曰仁者與天地萬物為一體曰此只是既仁之後見得箇體段如此方其初時仁之體畢竟是如何要直截見得箇仁底表裏若不見他表裏譬猶此屋子只就外面貌得箇模樣縱說得著亦只是籠罩得大綱不見屋子裏面實是如何須就中實見得仔細方好又問就中間看只是惻然動於中者無所係纍昏塞便是否曰此是已動者若未動時仁在何處曰未動時流行不息所謂那活潑潑底便是曰諸友所說仁皆是貌模今且為老兄立箇標準要得就這上研磨將來須自有箇實見得處譬之食糖據別人說甜不濟事須是自食見得甜時方是真味大雅或問此章曰常人之所謂知多求知人所不知聖人之所謂知只知其所當知而已自常人觀之此兩事若不足以為知然果能專用力於人道之宜而不惑於鬼神之不可知卻真箇是知燾集注問集注仁之心知之事曰務民之義敬鬼神是就事上說先難後獲是就處心積慮處說仁字說較近裏知字說較近外夔孫叔器問集注心與事之分曰這箇有甚難曉處事便是就事上說心便是就裏面說務民之義敬鬼神而遠之這是事先難後獲這是仁者處心如此事也是心裏做出來但心是較近裏說如一間屋相似說心底是那房裏說事底是那廳問仁者先難而後獲後字如未有義而後其君之後否曰是又問此只是教樊遲且做工夫而程子以為仁如何曰便是仁這一般外面恁地然裏面通透也無界限聖人說話有一句高一句低底便有界限若是隴侗說底才做得透便是如克己復禮便不必說只是為仁之事做得透便是又如我欲仁斯仁至矣才欲仁便是仁因言先儒多只是言後有所得說得都輕淳録云後字說得輕了唯程先生說得恁地重這便是事事說得有力如事君敬其事而後其食先事後得之類皆是此例義剛言若有一毫計功之心便是私欲曰是義剛淳同問明道曰先難克己也伊川曰以所難為先而不計所獲仁也又曰民亦人也務人之義知也鬼神不敬則是不知不遠則至於瀆敬而遠之所以為知又曰有為而作皆先獲也如利仁是也古人惟知為仁而已今人皆先獲也右第二十一章凡七說明道三說伊川四說今從明道伊川之說明道第一說曰民之所宜者務之所欲與之聚之第三說亦曰務民之義如項梁立義帝謂從民望者是也伊川第一說亦曰能從百姓之所宜者知也尹氏用伊川說此三說皆以務民之義作從百姓之所宜恐解知字太寬問知而告以從百姓之所宜恐聖人告樊遲者亦不至如是之緩竊意民字不當作百姓字解只伊川第二說曰民亦人也似穩所謂知者見義而為之者也不見義則為不知務如齊不務德之務然必曰民之義者己亦民也通天下只一義耳何人我之別所謂務民之義者與務己之義無異孟子曰居天下之廣居則亦與己之廣居無異故伊川謂民亦人也恐有此意若以民字作百姓字解復以義字作宜字恐說知字太緩伊川第三說鬼神事范作振民育德其說寬振民之意亦與明道伊川從百姓之所宜之意同皆恐未穩否呂氏曰當務為急不求所難知似將務民之義敬鬼神而遠之作一句解看此兩句正與非其鬼而祭之諂也見義不為無勇也相類兩句雖連說而文意則異謝氏曰敬鬼神而遠之知鬼神之情狀也伊川第三說似未須說到如此深遠正以其推言之耳楊氏曰樊遲學稼固務民之事而已非義也莫非事也而曰事而非義則不可但有義不義之異事與義本無異曰民之義謂人道之所宜也來說得之但所謂居天下之廣居與己之廣居無異則天下只有此一廣居何必更說無人我之異乎呂氏說詞約而義甚精但伊川說非其鬼而祭之兩說相連卻費力若如范氏說則可以相因矣楊氏所引本無意義然謂事即是義則不可且如物還可便謂之理否幹知者樂水章胡問此章曰聖人之言有淺說底有深說底這處只是淺說仁只似而今重厚底人知似而今伶利底人然亦在人看淳義剛録云胡問仁是指全體而言否曰聖人說仁固有淺深這箇是大概說云云正卿問知者樂水仁者樂山是以氣質言之不知與仁者安仁知者利仁有高下否曰此仁知二字亦說得淺不可與安仁利仁較優劣如中庸說知仁勇這箇仁知字說得煞大賀孫問知者樂水仁者樂山是就資質上說就學上說曰也是資質恁地但資質不恁地底做得到也是如此這只說箇仁知地位不消得恁地分資質好底固是合下便恁地若是資質不好後做得到時也只一般義剛知者樂水仁者樂山不是兼仁知而言是各就其一體而言如仁者見之謂之仁知者見之謂之知人傑問樂字之義釋曰喜好是知者之所喜好在水仁者之所喜好在山否曰且看水之為體運用不窮或淺或深或流或激山之安靜篤實觀之儘有餘味某謂如仲尼之稱水曰水哉水哉子在川上曰逝者如斯夫皆是此意否舊看伊川說非體仁知之深者不能如此形容之理會未透自今觀之真是如此曰不必如此泛濫且理會樂水樂山直看得意思窮盡然後四旁莫不貫通苟先及四旁卻終至於與本說都理會不得也人傑子善問知者樂水仁者樂山曰看聖人言須知其味如今只看定樂山樂水字將仁知來比類湊合聖言而不知味也譬如喫饅頭只喫些皮元不曾喫餡謂之知饅頭之味可乎今且以知者樂水言之須要仔細看這水到隈深處時如何到峻處時如何到淺處時如何到曲折處時如何地有不同而水隨之以為態度必至於達而後已此可見知者處事處仁者樂山亦以此推之洽惟聖人兼仁知故樂山樂水皆兼之自聖人而下成就各有偏處魏問此章曰此一章只要理會得如何是仁如何是知若理會這兩箇字通透如動靜等語自分曉賀孫問知者動仁者靜動是運動周流靜是安靜不遷此以成德之體而言也若論仁知之本體知則淵深不測衆理於是而斂藏所謂誠之復則未嘗不靜仁者包藏發育一心之中生理流行而不息所謂誠之通則未嘗不動曰知者動意思常多故以動為主仁者靜意思常多故以靜為主今夫水淵深不測是靜也及滔滔而流日夜不息故主於動山包藏發育之意是動也而安重不遷故主於靜今以碗盛水在此是靜也畢竟他是動物故知動仁靜是體段模樣意思如此也常以心體之便見南升問仁知動靜之說與陰陽動靜之說同否曰莫管他陽動陰靜公看得理又過了大抵看理只到這處便休又須得走過那邊看便不是了然仁主於發生其用未嘗不動而其體卻靜知周流於事物其體雖動然其用深潛縝密則其用未嘗不靜其體用動靜雖如此卻不須執一而論須循環觀之蓋仁者一身混然全是天理故靜而樂山且壽壽是悠久之意知者周流事物之間故動而樂水且樂樂是處得當理而不擾之意若必欲以配陰陽則仁配春主發生故配陽動知配冬主伏藏故配陰靜然陰陽動靜又各互為其根不可一定求之也此亦在學者默而識之祖道或問知者動仁者靜如太極圖說則知為靜而仁為動如何曰且自體當到不相礙處方是儒用録云觀書且就當下玩索文意不須如此牽引反生枝蔓良久曰這物事直看一樣橫看一樣儒用録云道理不可執著且逐件理會子貢說學不厭為知教不倦為仁子思卻言成己為仁成物為知仁固有安靜意思然施行卻有運用之意又云知是伏藏祖録作潛伏淵深底道理至發出則有運用然至於運用各當其理而不可易處又不專於動人傑仁靜知動易中說仁者見之陽也知者見之陰也這樣物事大抵有兩樣仁配春知配冬中庸說成己仁也成物知也仁在我知在物孟子說學不厭知也教不倦仁也又卻知在我仁在物見得這樣物事皆有動靜泳仁知動靜自仁之靜知之動而言則是成己仁也成物知也自仁之動知之靜而言則是學不厭知也教不倦仁也恪仁者靜或謂寂然不動為靜非也此言仁者之人雖動亦靜也喜怒哀樂皆動也仁者之人豈無是數者哉蓋於動之中未嘗不靜也靜謂無人欲之紛擾而安於天理之當然耳若謂仁有靜而不動則知亦常動而不靜乎謨通老問仁知動靜合二者如何曰何必合此亦言其多耳不成仁者便愚知者便一向流蕩要之安靜中自有一箇運動之理運動中自有一箇安靜之理方是可學知便有箇快活底意思仁便有箇長遠底意思故曰知者樂仁者壽問知者樂水一章看這三截卻倒似動靜是本體山水是說其已發樂壽是指其效曰然倒因上二句說到他本體上知者動然他自見得許多道理分明只是行其所無事其理甚簡以此見得雖曰動而實未嘗不靜也仁者靜然其見得天下萬事萬理皆在吾心無不相關雖曰靜而未嘗不動也動不是恁地勞攘紛擾靜不是恁地塊然死守這與樊遲問仁知章相連自有互相發明處朱蜚卿問是如何曰專去理會人道之所當行而不惑於鬼神之不可知便是見得日用之間流行運轉不容止息胸中曉然無疑這便是知者動處心下專在此事都無別念慮繫絆見得那是合當做底事只恁地做將去是先難後獲便是仁者靜如今人不靜時只為一事至便牽惹得千方百種思慮這事過了許多夾雜底卻又在這裏不能得了頭底已自是過去了後面帶許多尾不能得了若是仁者逐一應去便沒事一事至便只都在此事上蜚卿問先生初說仁者樂山仁者是就成德上說那仁者先難後獲仁者是就初學上說曰也只一般只有箇生熟聖賢是已熟底學者學者是未熟底聖賢蜚卿問先難後獲意如何曰後如後其君後其親之意哭死而哀非為生者經德不回非以干祿言語必信非以正行這是熟底先難後獲是得仁底人君子行法以俟命是生底先難後獲是求仁底人賀孫問上蔡所說先難謂如射之有志若跣之視地若臨深若履薄皆其心不易之謂曰說得是先難是心只在這裏更不做別處去如上嶺高峻處不能得上心心念念只在要過這處更不思量別處去過這難處未得便又思量到某處這便是求獲賀孫問仁知動靜集注說頗重疊曰只缺轉換了一箇體字若論來仁者雖有動時其體只自靜知者雖有靜時其體只自動賀孫集注或問動靜以體言如何曰以體言是就那人身上說燾問知者動集注以動為知之體知者樂水又曰其用周流而不窮言體用相類如何曰看文字須活著意思不可局定知對仁言則仁是體知是用只就知言則知又自有體用如乾道成男坤道成女豈得男便都無陰女便都無陽這般須相錯看然大抵仁都是箇體知只是箇用淳知者動而不靜又如何處動仁者靜而不動又死殺了是則有交互之理但學者且只得據見在看便自見得不要如此紛紛也所舉程子曰非禮仁知之深者不能如此形容此語極好看儘用玩味不是常說如子語魯太師樂處亦云非知樂之深者不能言皆此類也極用仔細玩味看明作伊川樂山樂水處言動靜皆其體也此只言體段非對用而言端蒙集義仁者壽是有壽之理不可以顏子來插看如罔之生也幸而免罔亦是有死之理淳問謝氏仁知之說曰世間自有一般渾厚底人一般通曉底人其終亦各隨其材有所成就夫子以仁者知者對而言之誠是各有所偏如曰仁者安仁知者利仁及所謂好仁者惡不仁者皆是指言兩人如孔門則曾子之徒是仁者子貢之徒是知者如此章亦是泛說天下有此兩般人爾必大問伊川曰樂喜好也知者樂於運動若水之流通仁者樂於安靜如山之定止知者得其樂仁者安其常也樂喜樂於恐皆去聲又曰知者樂凡運用處皆樂仁者壽以靜而壽又曰樂山樂水氣類相合范氏曰知者運而不息故樂水仁者安於山故樂山動則能和故樂動則自樂恐不必將和作樂字靜則能久故壽非深於仁知者不能形容其德右第二十二章凡七說伊川四說今從伊川范氏之說伊川第二說曰樂水樂山與夫動靜皆言其體也第三說亦曰動靜仁知之體也體字只作形容仁知之體段則可若作體用之體則不可仁之體可謂之靜則知之體亦可謂之靜所謂體者但形容其德耳呂氏乃以為山水言其體動靜言其用此說則顯然以為體用之體既謂之樂山樂水則不專指體用亦在其中動可謂之用靜不可謂之用仁之用豈宜以靜名之謝氏曰自非聖人仁知必有所偏故其趨向各異則其成功亦不同也據此章乃聖人形容仁知以教人使人由是而觀亦可以知其所以為仁知也謝氏以為指知仁之偏恐非聖人之意謝氏又曰以其成物是以動以其成己是以靜楊氏曰利之故樂水安之故樂山利故動安故靜竊謂聖人論德互有不同譬如論日或曰如燭或曰如銅盤說雖不同由其一而觀之皆可以知其為日然指銅盤而謂之燭指燭而謂之銅盤則不可聖人論仁知或以為成己成物或以為安仁利仁或以為樂山樂水各有攸主合而一之恐不可也游氏推說仁壽尹氏同伊川故不録曰所論體用甚善謝氏說未有病但末後句過高不實耳成己成物安仁利仁樂山樂水意亦相通如學不厭教不倦之類則不可強通耳幹
