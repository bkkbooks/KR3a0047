body:
  text: 朱子語類卷第一百六朱子三外任同安主簿主簿就職內大有事縣中許多簿書皆當管某向為同安簿許多賦稅出入之簿逐日點對僉押以免吏人作弊時某人為泉倅簿書皆過其目後歸鄉與說及亦懵不知他是極子細官人是時亦只恁呈過賀孫因說慢令致期謂之賊曰昔在同安作簿時每點追稅必先期曉示只以一幅紙截作三片作小榜遍貼云本廳取幾日點追甚鄉分稅仰人戶鄉司主人頭知委只如此到限日近時納者紛紛然此只是一箇信而已如或違限遭點定斷不恕所以人怕時舉初任同安主簿縣牒委補試喚吏人問例云預榜曉示令其具檢頗多即諭以不要如此只用一幅紙寫數榜但云縣學某月某日補試各請知悉臨期吏覆云例當展日又諭以斷不展日過問奏狀還借用縣印否曰豈惟縣印縣尉印亦可借蓋是專達與給納官司及有兵刑處朝廷皆給印今之官司合用印處緣兵火散失多用舊印要去朝廷請印又須要錢所以官司且只苟簡過了某在同安作簿去州請印當時有箇指揮使并一道家印緣胥吏得錢方給某戲謂要做箇軍員與道士亦不能得又見崇安縣丞用淮西漕使印人傑南康因說賑濟曰平居須是修陂塘始得到得旱了賑濟委無良策然下手得早亦得便宜在南康時才見旱便凛刷錢物庫中得三萬來貫準擬糴米添支官兵卻去上供錢內借三萬貫糴米賑糶早時糴得卻糶錢還官中解發是以不闕事舊來截住客船糴三分米至於客船不來某見官中及上戶自有米遂出榜放客船米自便不糴客船米又且米價不甚貴又曰悔一件事南康煞有常平米是庚寅辛卯年大旱時糴米價甚貴在法不得減元價遂不曾糶當時只好糶了上章待罪且得為更新米一番亦緣當時自有米所以不動此米久之為南康官吏之害璘某在南康時民有訟坐家逃移者是身只在家而託言逃移不納稅又有訟望鄉復業者是身不回鄉而寄狀管業也淳道夫言察院黃公鍰字用和剛正人素畏憚其族有縱惡馬踏人者公治之急其人避之惟謹公則斬其馬足以謝所傷先生曰某南康臨罷有躍馬於市者踏了一小兒將死某時在學中令送軍院次日以屬知録晚過廨舍知録云早上所喻已栲治如法某既而不能無疑回至軍院則其人冠屨儼然初未嘗經栲掠也遂將吏人并犯者訊次日吏人杖脊勒罷偶一相識云此是人家子弟何苦辱之某曰人命所係豈可寬弛若云子弟得躍馬踏人則後日將有甚於此者矣況州郡乃朝廷行法之地保佑善良抑挫豪橫乃其職也縱而不問其可得耶後某罷諸公相餞於白鹿某為極口說西銘民吾同胞物吾與也一段今人為秀才者便主張秀才為武官者便主張武官為子弟者便主張子弟其所陷溺一至於此賀孫聞之先生云因出謁回即使吏杖之譙樓下方始交割道夫人傑録云因說劉子澄好言家世曰某在南康時有一子弟騎馬損人家小兒某訊而禁之子澄以為不然某因講西銘凡天下疲癃殘疾惸獨鰥寡吾兄弟顛連而無告者也君子之為政且要主張這一等人遂痛責之大概人不可有偏倚處法鄰縣有事於鄰州只是牒上今卻小郡與鄰大郡便申狀非是蓋雖是大郡卻都只是列郡只合使牒某在南康時吏人欲申隆興又建康除了安撫亦只是列郡某都是使牒吏初皇懼某與之云有法不妨只如此去揚總論作郡因論常平倉曰某自點二州知常平之弊如此更不敢理會看南康自有五六萬石漳州亦六七萬石盡是浮埃空殼如何敢挑動這一件事不知做甚麼合殺某在浙東嘗奏云常平倉與省倉不可相連須是東西置立令兩倉相去遠方可每常官吏檢點省倉則掛省倉某號牌子檢點常平倉則掛常平倉牌子只是一箇倉互相遮瞞令所在常平倉都教司法管此最不是少間太守要侵支司法如何敢拗他通判雖管常平而其職實管於司法又所在通判大率避嫌不敢與知州爭事韓文公所謂例以嫌不可否事者也且如經總制錢牙契錢倍契錢之類盡被知州瞞朝廷奪去更不敢爭僩與陳尉說治盜事因曰凡事須子細體察思量到人所思量不到處防備到人所防備不到處方得無事又曰凡事須是小心寅畏若恁地粗心駕去不得又曰某嘗作郡來每見有賊發則惕然皇恐便思自家是長民之官所以致此是何由遂百種為收捉捉得便自歡喜不捉得則終夜皇恐賀孫因說鄭惠叔愛惜官錢云某見人將官錢胡使為之痛心兩為守皆承弊政之後其所用官錢並無分明凡所送遺並無定例但隨意所向為厚薄問胥輩皆云有時這般官員過往或十千或五千後番或是這樣又全不送白休了某遂云如此不得朝廷有箇公庫在這裏若過往官員當隨其高下多少與之乃是公道豈可把為自家私恩於是立為定例看甚麼官員過此便用甚麼例送與之卻得公溥後來至於凡入廣諸小官如簿尉之屬箇箇有五千之助覺得意思儘好賀孫馬子嚴莊甫見先生言近有人作假書請託公事者先生曰收假書而不見下書之人非善處事者舊見吳提刑逵公路當官凡下書者須令當廳投下卻將書於背處觀之觀畢方發付其人令等回書前輩處事詳密如此又某當官時有人將書來者亦有法以待之須是留其人喫湯當面拆書若無他方令其去人傑問今之神祠無義理者極多若當官處於極無義理之神祠雖係敕額凡祈禱之類不往可否曰某當官所至須理會一番如儀案所具合祈禱神示有無義理者使人可也人傑浙東而今救荒甚可笑自古救荒只有兩說第一是感召和氣以致豐穰其次只有儲蓄之計若待他飢時理會更有何策東邊遣使去賑濟西邊遣使去賑濟只討得逐州幾箇紫綾冊子來某處已如何措置某處已如何經畫元無實惠及民或問先生向來救荒如何曰亦只是討得紫綾冊子更有何策自修賑濟無奇策不如講水利到賑濟時成甚事向在浙東疑山陰會稽二縣刷飢餓人少通判鄭南再三云數實及子細刷起三倍可學紹興時去得遲已無擘畫只依常行先差一通判抄劄城下兩縣飢民其人不留意只抄得四萬來人外縣卻抄得多遂欲治之而不曾卻託石天民重抄得八萬人是時已遲天民云甚易只關集大保長盡在一寺令供出人之貧者大保長無有不知數日便辨卻分作數等賑濟賑糶其初令畫地圖量道里遠近就僧寺或莊宇置糶米所於門首立木瀆關防再入之人璘先生語次問浙東旱可學云浙東民戶歌先生之德先生曰向時到部州縣有措置亦賴朝廷應副得以效力已自有名無實者多因曰向時浙東先措置分戶高下出米不知有米無米不同有徐木者獻策須是逐鄉使相推排有米者時以事逼不曾行今若行之一縣甚易大抵今時做事在州郡已難在監司尤難以地闊遠動成文具惟縣令於民親行之為易計米之有無而委鄉之聰明誠信者處之聰明者人不能欺誠信者人不忍欺若昏懦之人為之所紿譎詐之士則務欲容於此大不可可學浙東之病如和買之害酒坊之害置酒坊者做不起破家做得起害民如鹽倉之害如溫州有數處鹽倉置官吏甚多而一歲所買不過數十斤自可省罷更欲白之朝出鹽之地納白戶鹽卻令過私鹽升卿某向在浙東吏人押安撫司牒既僉名押字至紹興府牒吏亦請僉名某當時只押字去聞王仲行有語此伊川所謂只第一件便做不得者如南康舊來有文字到建康皆用申狀某以為不然是時陳福公作留守只牒建康僉廳若作前宰執只當直牒也如南康有文字到鄰路監司亦只合備牒其諸縣與鄰州用牒卻有著令德明因論監司巡歷受折送曰近法自上任許一次受直卿曰看亦只可量受曰某在浙東都不曾受道夫建陽簿權縣有婦人夫無以贍父母欲取以歸事到官簿斷聽離致道深以為不然謂夫婦之義豈可以貧而相棄官司又豈可遂從其請曰這般事都就一邊看不得若是夫不才不能育其妻妻無以自給又奈何這似不可拘以大義只怕妻之欲離其夫別有曲折不可不根究直卿云其兄任某處有繼母與父不恤前妻之子其子數人貧窶不能自活哀鳴於有司有司以名分不便只得安慰而遣之竟無如之何曰不然這般所在當以官法治之也須追出後母責戒勵若更離間前妻之子不存活他定須痛治因云程先生謂舜不告而娶舜雖不告堯嘗告之矣堯之告之也以王法治之而已因云昔為浙東倉時紹興有繼母與夫之表弟通遂為接腳夫擅用其家業恣意破蕩其子不甘來訴初以其名分不便卻之後趕至數十里外其情甚切遂與受理委楊敬仲敬仲深以為子訴母不便某告之曰曾與其父思量否其父身死其妻輒棄背與人私通而敗其家業其罪至此官司若不與根治則其父得不銜冤於地下乎今官司只得且把他兒子頓在一邊渠當時亦以為然某後去官想成休了初追之急其接腳夫即赴井其有罪蓋不可掩賀孫漳州郡中元自出公牒延郡士黃知録樵施允壽石洪慶李唐咨林易簡楊士訓及淳與永嘉徐寓八人入學而張教授與舊職事沮格至是先生下學僚屬又有乞留舊有官學正有司只得守法言者不止先生變色厲詞曰郡守以承流宣化為職不以簿書財計獄訟為事某初到此未知人物賢否風俗厚薄今已九月矣方知得學校底裏遂欲留意學校所以採訪鄉評物論延請黃知録以其有恬退之節欲得表率諸生又延請前輩士人同為之表率欲使邦人士子識些向背稍知為善之方與一邦之人共趨士君子之域以體朝廷教養作成之意不謂作之無應弄得來沒合殺教授受朝廷之命分教一邦其責任不為不重合當自行規矩而今卻容許多無行之人爭訟職事人在學枉請官錢都不成學校士人先要識箇廉退之節禮義廉恥是謂四維若寡廉鮮恥雖能文要何用某雖不肖深為諸君恥之淳寓録少異詣學學官以例講書歸謂諸生曰且須看他古人道理意思如何今卻只做得一篇文字讀了望他古人道理意思處都不曾見道夫先生熟聞知録趙師虙之為人試之政事又得其實遂首舉之其詞曰履行深醇持心明恕聞者莫不心服道夫聞先生禁漳民禮佛朝嶽皆所以正人心也曰未說到如此只是男女混淆便當禁約爾侍坐諸公各言諸處淫巫瞽惑等事先生蹙頞嗟歎而已因舉江西有玉隆萬壽宮太平興國宮每歲兩處朝拜不憚遠近奔趨失其本心一至於此曰某嘗見其如此深哀其愚上升一事斷無此理豈有許多人一日同登天自後又卻不見一箇登天之人如汀民事定光二佛其惑亦甚其佛肉身嘗留公廳禱祈徼福果有知道理人為汀州合先投畀水火以祛民惑愚民施財崇修佛宇所在皆然此弊滋蔓尤甚陳後之言泉州妖巫惑民新立廟貌海船運土石及遠來施財遭風覆舟相繼而不悟曰亦嘗望見廟宇壯麗但尋常不喜入神廟不及往觀凡此皆是愚而無知者之所為耳謨鄭湜補之問戢盜曰只是嚴保伍之法鄭云保伍之中其弊自難關防如保頭等易得挾勢為擾曰當令逐處鄉村舉衆所推服底人為保頭又不然則行某漳州教軍之法以戢盜心這是已試之效因與說某在漳州初到時教習諸軍弓射等事皆無一人能之後分許多軍作三番每日輪番入校場挽弓及等者有賞其不及者留在只管挽射及等則止終不及則罷之兩月之間翕然都會射及上等者亦多後多留刺以填闕額其有老弱不能者並退罷之他若會射了有賊盜他是不怕他劉叔通問韓范當初教兵甚善先生因云公道韓公兵法如何又云刺陝西義勇事何故這箇人恁地不曉事儂智高反亦是輕可底事何故恁地費力劉云聞廣中都無城郭其處種竻木為城枝節生刺刀火不能破賀孫楊通老問趙守斷人立後事錯了人無所訴曰理卻是心之骨這骨子不端正少間萬事一齊都差了如一箇印刊得不端正看印在甚麼所在千箇萬箇都喎斜不知人心如何恁地暗昧這項事其義甚明這般所在都是要自用不肯分委屬官所以事叢雜處置不暇胡亂斷去在法屬官自合每日到官長處共理會事如有不至者自有罪今則屬官雖要來長官自不要他來他也只得體這般法意是多少好某嘗說或是作縣看是狀牒如何煩多都自有箇措置每聽詞狀集屬官都來列位於廳上看有多少均分之各自判去到著到時亦復如此若是眼前易事各自處斷若有可疑等事便留在集衆較量斷去無有不當則獄訟如何會壅此非獨為長官者省事而屬官亦各欲自效兼是如簿尉等初官使之決獄聽訟得熟是亦教誨之也某在漳州豐憲送下狀如雨初亦為隨手斷幾件後覺多了恐被他壓倒了於是措置幾隻廚子在廳上分了頭項送下訟來即與上簿合索案底自入一廚人案已足底自入一廚一日集諸同官各分幾件去定奪只於廳兩邊設幕位令逐項敘來歷未後擬判俟食時即就郡廚辦數味飲食同坐食訖即逐人以所定事較量初間定得幾箇來自去做文章都不說著事情某不免先為畫樣子云某官今承受提刑司判下狀係某事一甲家於某年某月某日有甚干照計幾項乙家於某年某月某日有甚干照計幾項逐項次第寫令分明一甲家如何因甚麼事爭起到官乙家如何來解釋互論甲家又如何供對已前事分明了一某年某月某日如何斷一某年某月某日某家於某官番訴某官又如何斷以後幾經番訴並畫一寫出後面卻點對以前所斷當否或有未盡情節擬斷在後如此了卻把來看中間有擬得是底並依其所擬斷決合追人便追人若不消追人便只依其所擬回申提刑司去有擬得未是底或大事可疑卻合衆商量如此事都了並無壅滯楊通老云天下事體固是說道當從原頭理會來也須是從下面細處理會將上始得曰固是如做監司只管怕訟多措置不下然要省狀也不得若不受詞訟何以知得守令政事之當否全在這裏見得只如入建陽受建陽民戶訟這箇知縣之善惡便見得如今做守令其弊百端豈能盡防如胥吏沈滯公事邀求於人人皆知可惡無術以防之要好在嚴立程限他限日到自要苦苦邀索不得若是做守令有可以白干沈滯底事便是無頭腦須逐事上簿逐事要了始得某為守一日詞訴一日著到合是第九日亦詞訟某卻罷了此日詞訟明日是休日今日便刷起一旬之內有未了事一齊都要了大抵做官須是令自家常間吏胥常忙方得若自家被文字來叢了討頭不見吏胥便來作弊做官須是立綱紀綱紀既立都自無事如諸縣發簿曆到州在法本州點對自有限日如初間是本州磨算司便自有十日限卻交過通判審計司亦有五日限今到處並不管著限日或遲延一月或遲延兩三月以邀索縣道直待計囑滿其所欲方與呈州初過磨算司使一番錢了到審計司又使一番錢到倅廳發回呈州呈覆吏人又要錢某曾作簿知其弊於南康及漳州皆用限日他這般法意甚好後來一向埋沒了某每到即以法曉諭定要如此亦使磨底磨得子細審底審得子細有新簿舊簿不同處便批出理會初間吏輩以為無甚緊要在漳州押下縣簿付磨算司及審計司限到滿日卻不見到根究出乃是交點司未將上即時決兩吏後來卻每每及限雖欲邀索也不敢遷延縣道知得限嚴也不被他邀索如此等事整頓得幾件自是省事此是大綱紀如某為守凡遇支給官員俸給預先示以期日到此日只要一日支盡更不留未支這亦防邀索之弊看百弊之多只得嚴限以促之使他大段邀索不得又曰某人世為良宰云要緊處有八字開除民丁凛割戶稅世世傳之又曰法初立時有多少好意思後來節次臣僚胡亂申請皆變壞了如父母在堂不許異財法意最好今為人父母在不異財卻背地去典賣後來卻昏賴人以一時之弊變萬世之良法只是因某人私意申請法儘有好處今非獨下之人不畏法把法做文具事上自朝廷也只把做文具行了皆不期於必行前夜說上下視法令皆為間事如不許州郡監司饋送幾番行下而州郡監司亦復如前但變換名目多是做忌日去寺中焚香於是皆有折送其數不薄間有甚無廉恥者本無忌日乃設為忌日焚香以圖饋送者朝廷詔令事事都如此無紀綱人人玩弛可慮可慮又只如省部有時行下文字儘有好處只是後來付之胥吏之手都沒收殺某在漳州忽行下文字應諸州用鑄印處或有闕損磨滅底並許申上重行改造此亦有當申者如合有鑄印處乃是兵刑錢穀處如尉有鑄印亦有管部弓兵司理主郡刑獄乃無鑄印後來申去又如掉在水中一般過得幾時又行文字來又申去又休了如今事事如此省部文字一付之吏手一味邀索百端阻節如某在紹興有納助米人從縣保明到州州保明到監司監司方與申部忽然部中又行下一文字來再令保明某遂與逐一詳細申去云已從下一一保明訖未委今來因何再作行移如此申去休了後來忽又行下來云助米人稱進士未委是何處幾時請到文解還是鄉貢如何仰一一牒問上來這是叵耐不叵耐他事事敢如此邀求取索當初朝廷只許進士助米所謂進士只是科舉終場人如何敢恁地說某當時若便得這省吏在前即時便與刺兩行字配將去然申省去將謂省官須治此吏那裏治他又如奏罷一縣令即申請一面差人待闕候救荒事訖交割下替不知下替便來爭上去部裏論部裏便判罷權官後來與申去云元初差這人乃是奉聖旨令救荒盡與備許多在前及後部中行下乃前列聖旨了後乃仍舊自云合還下替交割職事直是恁地胡亂行移略不知有聖旨那箇權官見代者來得恁地急不能與爭自去了賀孫敬之問淳熙事類本朝纍聖刪定刑書不知尚有未是處否曰正緣是刪改太多遂失當初立法之意如父母在堂不許分異此法意極好到後來因有人親在私自分析用盡了到親亡卻據法負賴遂著令許私分又某往在臨漳豐憲送一項公事有人情願不分人皆以為美乃是有寡嫂孤子後來以計嫁其嫂而又以已子添立併其産業後委鄭承看驗逐項剖析子細乃知其情賀孫頃常欲因奏對言一事而忘之諸州軍兵衣絹或非所有則以上供錢對易於出産州軍最為煩擾如漳州舊與信處二州對易每歲本州為兩州包認上供錢若干盡數解納而兩州絹絶不來太守歲遣書饋懇情恬不為意或得三分之一措發到一半極矣然絹紕薄而價高常致軍人怨詈傅景仁初解漳州以支散衣絹不好為軍人喊噪不得已以錢貼支始得無事歲以為苦興化取之台州更是回遠此事最不難理會而無一人肯言之者不知何故既知漳不出絹信州處州有之何不令兩州以所合發納上供錢輸絹左藏只令漳州以錢散軍人豈不兩便軍人皆願得錢不願得絹蓋今絹價每匹三千省而請錢則得五千省故也此亦當初立法委曲勞復之過改之何妨僩本州鬻鹽最為毒民之橫賦屢經旨罷而復屢起先生至石丈屢言其利害曲折先生即散榜先罷瀕海十一鋪其餘諸鋪擬俟經界正賦既定然後悉除之至是諸鋪解到鹽錢諸庫皆充塞先生曰某而今方見得鹽錢底裏與郡中歲計無預前後官都被某見過無不巧作名色支破者古者山澤之利與民共之今都占了是何理也合盡行除罷而行迫無及矣淳本朝立法以知州為不足恃又置通判分掌財賦之屬然而知州所用之財下面更有許多幕職官通管尚可稽考惟通判使用更無稽考通判廳財賦極多某在漳州凡胥吏輩窠坐有優輕處重難處盡與他擺換一次優者移之重處重者移之優處惟通判廳人吏不願移換某曰你若不肯盡與你斷罷於是皆一例擺換蓋通判廳財賦多恣意侵漁無所稽考也僩問欲行經界本末曰本一官員姓唐上殿論及此尋行下漳泉二州相度本州申以為可行而泉州顏尚書操兩可之說致廟堂疑二卻是因黃伯耆輪對再論其劄子末極好如云今日以天下之大公卿百官之衆商量一經界三年而不成使更有大於此者將若之何上如其請即時付出三省宰執奏請又止且行於漳州且事當論是非若經界果可行當行於三州若不可行則皆當止漳與泉汀接壤今獨行於漳州果何謂某云今農務已興乃差官措置豈是行經界之時去冬好行乃不行廟堂何不略思曰今日諸公正是如此滾纏過故做到公卿如少有所思則必至觸礙安得身如此之安若放此心於天地間公平處置則何事不可為去年上朝廷文字及後來抗祠請皆有後時之慮今日卻非避事可學經界料半年便都了以半年之勞而革數百年之弊且未說到久亦須四五十年未便卒壞若行則令四縣特作四樓以貯簿籍州特作一樓以貯四縣之圖帳不與他文書混闔郡皆曰不可者只是一樣人田多稅少便造說唪嚇以為必有害無利一樣人是憚勞懶做事卻被那說所誣遂合辭以為不可其下者因翕然從之或曰亦是民間多無契故恐耳曰十分做一分無契此只一端耳況某亦許無契者來自陳或曰只據民戶見在田不必索契如何曰如此則起無限爭訟必索契則無限爭訟遏矣今之為縣真有愛民之心者十人則十人以經界為利無意於民者十人則十人以經界為害今之民只教貧者納稅富者自在收田置田不要納稅如此則人便道好更無些事不順他便稱頌為賢守淳因論漳泉行經界事假未得人勢亦著做古人立事亦硬擔當著做以死繼之而已韓魏公作相溫公在言路凡事頗不以魏公為然魏公甚被他激撓後來溫公作魏公祠堂記卻說得魏公事分明見得魏公不可及處溫公方心服他記中所載魏公之言曰凡為人臣者盡力以事君死生以之顧事之是非何如耳至於成敗天也豈可豫憂其不成遂輟不為哉公為此言時乃仁宗之末英宗之初蓋朝廷多故之時也必大人傑録云某在臨漳欲行經界只尋得善熟者數人任之大抵立事須要人才若人才難得不成便休須著做去又一條云立事之人須要硬擔當死生以之如韓魏公之立英廟英廟即位繼感風疾魏公當時只是鎮之以靜及英廟疾亟迎立穎王或曰若主上復安將如之何魏公曰不過為太上皇耳溫公為諫官魏公甚苦之及作魏公祠堂記有數語形容魏公最好是他見得魏公有不可及處先生於州治射堂之後圃畫為井字九區中區石甃為高壇中之後區為茆菴菴三瀆左瀆櫺為泰卦右為否卦後為復卦前扇為剝卦菴前接為小屋前區為小茅亭左右三區各列植桃李而間以梅九區之外圍繞植竹是日遊其間笑謂諸生曰上有九疇八卦之象下有九丘八陳之法淳先生庚戌四月至臨漳淳罷省試歸至冬至始克拜席下明年先生以喪嫡子丐祠甚堅當路者又以經界一奏先生持之力雖已報行而終以不便己為病幸其有是請也即為允之四月主管鴻慶宮加祕閣修撰二十九日遂行淳送至同安縣東之沈井鋪而別實五月二日也先生在臨漳首尾僅及一期以南陬敝陋之俗驟承道德正大之化始雖有欣然慕而亦有諤然疑譁然毀者越半年後人心方肅然以定僚屬厲志節而不敢恣所欲仕族奉繩檢而不敢干以私胥徒易慮而不敢行姦豪猾斂蹤而不敢冒法平時習浮屠為傳經禮塔朝嶽之會者在在皆為之屏息平時附鬼為妖迎遊於街衢而掠抄於閭巷亦皆相視斂戢不敢輒舉良家子女從空門者各閉精廬或復人道之常四境狗偷之民亦望風奔遁改復生業至是及期正爾安習先生之化而先生行矣是豈不為恨哉淳先生因說邑中隕星恐有火災縣官禱禳云豈可不修人事合當拘家家蓄水警備因舉漳州之政賀孫建寧自鄭丙程大昌至今聖節不許僧子升堂說法他處但人不敢擔當住罷某在臨漳且令隨例祝香只不許人問話頃曾孝敘知青州請一僧開堂觀者甚衆其僧忽云此知州是你青州半面天子孝敘大皇恐即時自劾枷此僧送獄必大先生除江東漕辭免文蔚問萬一不容辭免則當如何曰事便是如此安排不得此已辭了而今事卻在他這裏如何預先安排得文蔚潭州在潭州時詣學升堂以百數籤抽八齊每齊一人出位講大學一章講畢教授以下請師座講說大義曰大綱要緊只是前面三兩章君子小人之分卻在誠其意處誠於為善便是君子不誠底便是小人更無別說琮問先生到此再詣學矣不知所以教諸生者規模如何曰且教他讀經書識得聖人法語大訓曰鄉來南康白鹿學規卻是教條不是官司約束曰屢欲尋訪湖學舊規尚此未獲曰先生如此教人可無躐等之患曰躐等何害若果有會躐等之人自可敬服曰何故曰今若有人在山腳下便能一躍在山頂上何幸如之政恐不由山腳終不可以上山頂耳琮先生至嶽麓書院抽簽子請兩士人講大學語意皆不分明先生遽止之乃諭諸生曰前人建書院本以待四方士友相與講學非止為科舉計某自到官甚欲與諸公相與講明一江之隔又多不暇意謂諸公必皆留意今日所說反不如州學又安用此贅疣明日煩教授諸職事共商量一規程將來參定發下兩學共講磨此事若只如此不留心聽其所之學校本是來者不拒去者不追豈有固而留之之理且學問自是人合理會底事只如明明德一句若理會得自提省人多少明德不是外面將來安在身上自是本來固有底物事只把此切己做工夫有甚限量此是聖賢緊要警策人處如何不去理會不理會學問與蚩蚩橫目之氓何異謙客說社倉訟事曰如今官司鶻突都無理會不如莫辨因說如今委送事不知屬官能否胡亂送去更無分曉了絶時節某在潭州時州中僚屬朝夕相見卻自知得分曉只縣官無由得知後來區處每月版帳錢令縣官逐人輪番押來當日留住試以公事又怕他鶻突寫來卻與立了格式云今蒙使府委送某事如何一某人於某年月日於某處理某事某官如何斷一又於某時某再理某官如何斷一某今看詳此事理如此於條合如何結絶如此人之能否皆不得而隱木之問先生須更被大任用在曰某何人安得有此然亦做不得出來便敗且如在長沙城周圍甚廣而兵甚少當時事未定江上洶洶萬一兵潰必趨長沙守臣不可去只是浪戰而死此等事須是有素定家計魏公初在五路治兵積粟為五年計然後大舉因虜人攻犯淮甸不得已為牽制之師事既多違魏公久廢晚年出來便做不得欲為家計年老等不得了只是逐急去所以無成某今日亦等不得了規模素不立才出便敗德明或問修城事云修城一事費亦浩瀚恐事大力小兼不得人亦難做如今只靠兩寨兵固是費力又無馭衆之將可用張倅云向來靖康之變虜至長沙城不可守雖守臣之罪亦是闊遠難守曰向見某州修城亦以闊遠之故稍縮令狹卻易修周伯壽云前此陳君舉說長沙米倉酒庫自在城外萬一修得城完財物盡在城外不便只當移倉庫不當修城曰此是秀才家應科舉議論倉庫自當移城自當修先生又云向見張安國帥長沙壁間掛一修城圖計料甚子細有人云如何料得如此恐可觀不可用張帥自後便卷了圖子更不說著周益公自是怕事底人不知誰便說得他動初益公任內只料用錢七萬今磚瓦之費已使了六萬所餘止一萬初料得少如今朝廷亦不肯添了謙而今官員不論大小盡不見客敢立定某日見客某日不見客甚至月十日不出不知甚麼條貫如此是禮乎法乎可怪不知出來與人相應接少頃有甚辛苦處使人之欲見者等候不能得見或有急幹欲去有甚心情等待欲吞不可欲吐不得其苦不可言此等人所謂不仁之人心都頑然無知抓著不癢搯著不痛矣小官嘗被上位如此而非之矣至他榮顯又不自知矣因言夏漕每日先見過往人客了然後請職事官相見蓋恐幕職官稟事多時過客不能久候故也潭州初一十五例不見客諸司皆然某遂破例令皆相見先生在潭州每間日一詣學士人見於齊中官員則於府署僩今人獄事只管理會要從厚不知不問是非善惡只務從厚豈不長姦惠惡大凡事付之無心因其所犯考其實情輕重厚薄付之當然可也若從薄者固不是只云我只要從厚則此病所係亦不輕某在長沙治一姓張人初不知其惡如此只因所犯追來久之乃出頭適有大赦遂且與編管後來聞得此人凶惡不可言人只是平白地打殺不問門前有一木橋商販者自橋上過若以柱杖拄其橋必捉來弔縛此等類甚多若不痛治何以懲戒公等他日仕宦不問官大小每日詞狀須置一簿穿字號録判語到事亦作一簿發放文字亦作一簿每日必勾了號要一日內許多事都了方得若或做不辦又作一簿記未了事日日檢點了如此方不被人瞞了事今人只胡亂隨人來理會來與不來都不知豈不誤事銖過甲寅年見先生聞朋輩說昨歲虜人問使人云南朝朱先生出處如何對以本朝見擢用既歸即白堂所以得帥長沙之命過
