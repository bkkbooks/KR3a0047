body:
  text: 朱子語類卷第一百一十九朱子十六訓門人七欲速之患終是有如一念慮間便出來如看書欲都了之意是也以下訓方方行屋柱邊轉擦下柱上黑見云若周旋中規折旋中矩不到得如此大率多戒方欲速也方云此去當自持重以矯輕先生曰舊亦嘗戒釋之以安重方云此去欲看論語如何曰經皆好看但有次第耳前此曾令方熟看禮記臨行請教曰纍日所講無非此道但當勉之又曰持守可以自勉惟窮理須講論此尤當勉又曰經書正須要讀如史書要見事變之血脈不可不熟又曰持敬工夫愈密愈精因曰自浮沉了二十年只是説取去今乃知當涵養包顯道言楊子直論孟子四端也説得未是先生笑曰他舊曾去朝以道家作館朝教他校正闢孟子説被以道之説入心後因此與孟子不足後來所以抵死要與他做頭抵這亦是拗人才拗便都不見正底道理諸葛誠之嘗言孟子説性善説得來緩不如説惡底較好那説惡底便使得人戒慎恐懼後方去為善不知是怎生見得偏後恁地蹺蹊嘗見他執得一部呂不韋呂覽到道裏面煞有道理不知他見得是如何朝以道在經筵講論語畢合當解孟子他説要莫講高宗問他如何曰孟子與孔子之道不同孔子尊王孟子卻教諸侯行王道由此遭論去國他當時也是博學負重名但是而今將他幾箇劄子來看卻不可曉不知是如何李覯也要罵孟子不知只管要與孟子做頭抵做甚你且揀箇小底來罵也得義剛包顯道領生徒十四人來四日皆無課程先生令義剛問顯道所以來故於是次日皆依精舍規矩説論語一生説時習章先生曰只是熟故説到説時自不肯休了而今人所以恁地作輟者只是未熟以善及人而信從者衆此説地步闊蓋此道理天下所公共我獨曉之而人不曉得也自悶今有朋自遠方來則從者衆故可樂這箇自是地位大段高了人不知而不慍也是難慍不是大段怒但心裏略有不平底意便是慍此非得之深養之厚何以至此一生説務本章先生曰君子務本本立而道生這是掉開説凡事若是務本時道便自然生此若拈定孝弟説下面自不要這兩句了又曰愛是仁之發謂愛是仁卻不得論性則仁是孝弟之本惟其有這仁所以能孝弟仁是根孝弟是發出來底仁是體孝弟是用仁是性孝弟是仁裏面事某嘗謂孟子論四端處説得最詳盡裏面事事有心性情都説盡心是包得這兩箇物事性是心之體情是心之用性是根情是那芽子惻隱羞惡辭遜是非皆是情惻隱是仁之發謂惻隱是仁卻不得所以説道是仁之端也端便是那端緒子讀書須是子細思之弗得弗措也辨之弗明弗措也如此方是今江西人皆是要偷間自在才讀書便要求箇樂處這便不是了某説若是讀書尋到那苦澀處方解有醒悟康節從李挺之學數而曰但舉其端勿盡其言容某思之它是怕人説盡了這便是有志底人因言聖人漉得那天理似泥樣熟只看那一部周禮無非是天理纖悉不遺一生説三省章先生曰忠是發於心而形於外信也是心裏發出來但卻是就事上説而今人自謀時思量得無不周盡及為人謀則只思量得五六分便了這便是不忠與朋友交非謂要安排去罔他為不信只信口説出來説得不合於理便是不信謀是主一事言信是泛説一生説敬事而信章先生曰大事小事皆要敬聖人只是理會一箇敬字若是敬時方解信與愛人節用使民若不敬則其他都做不得學而一篇皆是就本領上説如治國禮樂刑政尚有多少事而夫子卻只説此五項者此蓋本領所在一生説入孝出弟章先生曰夫子只是泛恁地説説得較寬子夏説得較力他是説那誠處賢賢易色是誠於好善事父母能竭其力是誠於事親事君能致其身是誠於事君與朋友交言而有信是誠於交朋友這説得都重所以恁地説他是要其終而言道理也是恁地但不合説得大力些義剛問賢賢易色如何在先曰是有那好善之心底方能如此一生説溫良恭儉章先生曰夫子也不要求之於己而後得也不只是有此五德若説求之於己而後得則聖人又無這般意思這只是説聖人謹厚退讓不自以為聖賢人自然樂告之夫子之求之也此是反語言夫子不曾求不似其它人求後方得這是就問者之言以成語如吾聞以堯舜之道要湯未聞以割烹也伊尹不是以堯舜之道去要湯是定這只是表得不曾割烹耳一生説顏子不愚章先生曰聖人便是一片赤骨立底天理光明照耀更無蔽障顏子則是有一重皮了但其他人則被這皮子包裹得厚剝了一重又一重不能得便見那裏面物事顏子則皮子甚薄一剝便爆出來夫子與他説只是要與它剝這一重皮子它緣是這皮子薄所以一説便曉更不要再三如説與它克己復禮它更不問如何是克己如何是復禮它便曉得但問其目如何而已以下訓揚義剛先生謂顯道曰久不相見不知年來做得甚工夫曰只據見成底書讀夔孫録云包顯道侍坐先生方修書語之曰公輩逍遙快活某便是被這事苦包曰云云先生曰聖賢已説過何待更去理會他但是不恁地恁地都不濟事次日又言昨夜睡不著因思顯道恁地説不得若是恁地便不是自強不息底道理人最是怕陷溺其心而今顯道輩便是以清虛寂滅陷溺其心劉子澄輩便是以務求博雜夔孫録作求多務博陷溺其心周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦聖賢之心直是如此已而其生徒復説孝弟為仁之本先生曰説得也都未是因命林子武説一過既畢先生曰仁是根惻隱是根上發出底萌芽親親仁民愛物便是枝葉次日先生親下精舍大會學者夔孫録云顯道請先生為諸生説書先生曰荷顯道與諸生遠來某平日説底便是了要特地説又似無可説而今與公鄉里平日説不同處只是爭箇讀書與不讀書講究義理與不講究義理如某便謂是須當先知得方始行得如孟子所謂詖淫邪遁之辭何與自家事而自家必欲知之何故若是不知其病痛所自來少間自家便落在裏面去了孔子曰詩可以興可以觀可以群可以怨邇之事父遠之事君多識於鳥獸草木之名那上面六節固是當理會若鳥獸草木之名何用自家知之但是既為人則於天地之間物理須要都知得方可若頭上髻子便十日不梳後待如何便一月不梳待如何但須是用梳方得張子曰書所以維持此心一時放下則一時德性有懈也是説得維持字好蓋不讀書則此心便無用處今但見得些子便更不肯去窮究那許多道理陷溺其心於清虛曠蕩之地卻都不知豈可如此直卿與某相聚多年平時看文字甚子細數年在三山也煞有益於朋友今可為某説一遍直卿起辭先生曰不必多讓顯道云可以只將昨日所説有子章申之於是直卿略言此章之指復歷敘聖賢相傳之心法既畢先生曰仁便是本仁更無本了若説孝弟是仁之本則是頭上安頭以腳為頭伊川所以將為字屬行字讀蓋孝弟是仁裏面發出來底性中只有箇仁義禮智何嘗有箇孝弟來它所以恁地説時緣是這四者是本發出來卻有許多事千條萬緒皆只是從這四箇物事裏面發出來如愛便是仁之發才發出這愛來時便事事有第一是愛親其次愛兄弟其次愛親戚愛故舊推而至於仁民皆是從這物事發出來人生只是箇陰陽那陰中又自有箇陰陽陽中又自有箇陰陽物物皆不離這四箇而今且看如天地便有箇四方以一歲言之便有箇四時以一日言之便有箇晝夜昏旦以十二時言之便是四箇三若在人則只是這仁義禮智這四者如這火爐有四箇角樣更不曾折了一箇方未發時便只是仁義禮智及其既發則便有許多事但孝弟至親切所以行仁以此為本如這水流來下面做幾箇塘子須先從那第一箇塘子過那上面便是水源頭上面更無水了仁便是本行仁須是從孝弟裏面過方始到那第二箇第三箇塘子但據某看孝弟不特是行仁之本那三者皆然如親親長長須知親親當如何長長當如何年長以倍則父事之十年以長則兄事之五年以長則肩隨之這便是長長之道事君時是一般與上大夫言是一般與下大夫言是一般這便是貴貴之道如此便是義事親有事親之禮事兄有事兄之禮如今若見父不揖後謂之孝弟可不可便是行禮也由此過孟子説孩提之童無不知愛其親及其長也無不知敬其兄若是知得親之當愛兄之當敬而不違其事之之道這便是智只是這一箇物事推於愛則為仁宜之則為義行之以遜則為禮知之則為智良久顯道云江西之學大要也是以行己為先先生曰如孝弟等事數件合先做底也易曉夫子也只略略説過如孝弟謹信泛愛親仁也只一處恁地説若是後面許多合理會處須是從講學中來不然為一鄉善士則可若欲理會得為人許多事則難義剛先生因論揚書謂江南人氣粗徑而少細膩浙人氣和平而力弱皆其所偏也揚浩作卷子疏已上條目為問先生逐一説過了浩乞逐段下疏數語先生曰某意思到處或説不得説得處或寫不得此據所見盡説了若寫下未必分明卻失了先間言語公只記取若未安不妨反覆訓邵浩砥初見先生問曾做甚工夫對以近看大學章句但未知下手處曰且須先操存涵養然後看文字方始有浹洽處若只於文字上尋索不就自家心裏下工夫如何貫通問操存涵養之道如何曰才操存涵養則此心便在仲思問操存未能無紛擾之患曰才操便存今人多於操時不見其存過而操之愈自執捉故有紛擾之患此下訓砥問有事時須應事接物無事時此心如何曰無事時亦只如有事時模樣只要此心常在也又問程子言未有致知而不在敬如何曰心若走作不定如何見得道理且如理會這一件事未了又要去理會那一件事少間都成沒理會須是理會這事了方去理會那事又問只是要主一曰當如此又問思慮難一如何曰徒然思慮濟得甚事某謂若見得道理分曉自無間雜思慮人之所以思慮紛擾只緣未實見得此理若實見得此理更何暇思慮天下何思何慮不知有甚事可思慮也又問伊川嘗教人靜坐如何曰亦是他見人要多思慮且以此教人收拾此心耳若初學者亦當如此用之問動容周旋未能中禮於應事接物之間未免有礙理處如何曰只此便是學但能於應酬之頃逐一點檢便一一合於理久久自能中禮也砥訓礪問論孟疑處曰今人讀書有疑皆非真疑某雖説了只做一場話説過於切己工夫何益向年在南康都不曾為諸公説次日求教切己工夫曰且如論語説孝弟為仁之本因甚後便可以為仁之本巧言令色鮮矣仁卻為甚不鮮禮不鮮義而但鮮仁須是如此去著實體認莫要才看一遍不通便掉下了蓋道本無形象須體認之可矣以下訓輝問私欲難克奈何曰為仁由己而由人乎哉所謂克己復禮為仁者正如以刀切物那刀子乃我本自有之器物何用更借別人底若認我一己為刀子而克之則私欲去而天理見矣陳芝廷秀以謝昌國尚書書及嘗所往來詩文來見且曰每嘗讀書須極力苦思終爾不似曰不知所讀何書曰尚書語孟曰不知又何所思曰只是於文義道理致思爾曰也無大段可思聖賢言語平鋪説在裏如夫子説學而時習之自家是學何事便須著時習習之果能説否有朋自遠方來果能樂不樂今人學所以求人知人不見知果能不慍否至孟子見梁王便説箇仁義與利今但看自家所為是義乎是利乎向內便是義向外便是利此甚易見雖不讀書只恁做將去若是路陌正當即便是義讀書是自家讀書為學是自家為學不干別人一線事別人助自家不得若只是要人道好要求人知便是為人非為己也因誦子張問達一章語音琅然氣節慷慨聞者聳動道夫以下訓芝廷秀問今當讀何書曰聖賢教人都提切己説話不是教人向外只就紙上讀了便了自家今且剖判一箇義利試自睹當自家今是要求人知要自為己孔子曰君子喻於義小人喻於利又曰古之學者為己今之學者為人孟子曰亦有仁義而已矣何必曰利孟子雖是為時君言在學者亦是切身事大凡為學且須分箇內外這便是生死路頭今人只一言一動一步一趨便有箇為義為利在裏從這邊便是為義從那邊便是為利向內便是入聖賢之域向外便是趨愚不肖之途這裏只在人劄定腳做將去無可商量若是已認得這箇了裏面煞有工夫卻好商量也顧謂道夫曰曾見陸子靜義利之説否曰未也曰這是他來南康某請他説書他卻説這義利分明是説得好如云今人只讀書便是為利如取解後又要得官得官後又要改官自少至老自頂至踵無非為利説得來痛快至有流涕者今人初生稍有知識此心便恁亹亹地去了干名逐利浸浸不已其去聖賢日以益遠豈不深可痛惜道夫先生謂陳廷秀曰今只理會下手做工夫處莫問他氣稟與習只是是底便做不是底莫做一直做將去那箇萬里不留行更無商量如今推説雖有許多般樣到做處只是是底便做一任你氣稟物欲我只是不恁地如此則雖愚必明雖柔必強氣習不期變而變矣道夫為學有用精神處有惜精神處有合著工夫處有枉了工夫處要之人精神有得亦不多自家將來枉用了亦可惜惜得那精神便將來看得這文字某舊讀書看此一書只看此一書那裏得恁間功夫録人文字廷秀行夫都未理會得這箇功夫在今當截頭截尾劄定腳跟將這一箇意思帖在上面上下四旁都不管他只見這物事在面前任你孔夫子見身也還我理會這箇了直須抖擻精神莫要昏鈍如救火治病豈可悠悠歲月道夫廷秀問某緣不能推廣曰而今也未要理會如此如佛家云只怕不成佛不怕成佛後不會説話如公卻是怕成佛後不會説話了廷秀又問莫是見到後自會恁地否曰不用恁地問如今只用下工夫去理會見到時也著去理會見不到時也著去理會且如見得此段後如何便休得自著去理會見不到時也不曾説自家見不到便休了越著去理會理會到死若理會不得時亦無可奈何道夫陳芝拜辭先生贈以近思録曰公事母可檢幹母之蠱看便自見得那道理因言易傳自是成書伯恭都托來作閫範今亦載在近思録某本不喜他如此然細點檢來段段皆是日用切近功夫而不可闕者於學者甚有益友仁問每日做工夫處曰每日工夫只是常常喚醒如程先生所謂主一之謂敬謝氏所謂常惺惺法是也然這裏便是致知底工夫程先生曰涵養須是敬進學則在致知須居敬以窮理若不能敬則講學又無安頓處問主一無適亦是遇事之時也須如此曰於無事之時這心卻只是主一到遇事之時也是如此且如這事當治不治當為不為便不是主一了若主一時坐則心坐行則心行身在這裏心亦在這裏若不能主一如何做得工夫又曰人之心不正只是好惡昏了他孟子言平旦之氣其好惡與人相近者幾希蓋平旦之時得夜間息得許久其心便明則好惡公好則人之所當好惡則人之所當惡而無私意於其間過此時則喜怒哀樂紛擾於前則必有以動其氣動其氣則必動其心是梏之反覆而夜氣不能存矣雖得夜間稍息而此心不能自明是終不能善也問每常遇事時也分明知得理之是非這是天理那是人欲然到做處又卻為人欲引去及至做了又卻悔此是如何曰此便是無克己工夫這樣處極要與他掃除打疊如一條大路又有一條小路自家也知得合行大路然被小路有箇物事引著不知不覺走從小路去及至前面荊棘蕪穢又卻生悔此便是天理人欲交戰之機須是遇事時便與克下不得苟且放過明理以先之勇猛以行之若是上智聖人底資質它不用著力自然循天理而行不流於人欲若賢人之資次於聖人者到得遇事時固不會錯只是先也用分別教是而後行之若是中人之資須大段著力無一時一刻不照管克治始得曾子曰仁以為己任不亦重乎死而後已不亦遠乎須是如此做工夫其言曰戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子直是恁地用工方得語黃先之病處數日諄諄先之云自今敢不猛省曰何用猛省見得這箇是要緊便拽轉來如東邊不是便挈過西邊更何用猛省只某夜來説得不力故公領得尤未切若領會得切只眼下見不是便一下打破沙瓶便了公今只看一箇身心是自家底是別人底是自家底時今才挈轉便都是天理挈不轉便都是人欲要識許多道理是為自家是為別人看許多善端是自家本來固有是如今方從外面強取來附在身上只恁地看便灑然分明未之思也夫何遠之有才思便在這裏某嘗説孟子雞犬之喻也未甚切雞犬有求而不得心則無求而不得才思便在這裏更不離步莊子云其熱焦火其寒凝冰其疾俯仰之間而再撫四海之外心之變化如此只怕人自不求如桀紂盜跖他自向那邊去不肯思他若才會思便又在這裏心體無窮前做不好便換了後面一截生出來便是良心善性賀孫昨夜與先之説思則得之才思便在這裏這失底已自過去了自家才思這道理便自生認得著莫令斷始得一節斷一節便不是今日恁地一節斷了明日又恁地一節斷只管斷了一向失去賀孫德輔言自承教誨兩日來讀書覺得只是熟時自見道理曰只是如此若忽下趨高以求快則都不是下學而上達初學直是低以下訓德輔德輔言今人看文字義理如何得恁不細密曰只是不曾仔細讀那書枉用心錯思了孔子説吾嘗終日不食終夜不寢以思無益不如學也正謂這樣底所謂思而不學則殆殆者心隉杌危殆不安尹和靖讀得伊川説話煞熟雖不通透渠自有受用處呂堅中作尹墓志祭文云尹於六經之書耳順心通如誦己言嘗愛此語説得好但和靖卻欠了思問汪長孺所讀何書長孺誦大學所疑先生曰只是輕率公不惟讀聖賢之書如此凡説話及論人物亦如此只是不敬又云長孺氣粗故不仔細為今工夫須要靜靜多不妨今人只是動多了靜靜亦自有説話程子曰為學須是靜又曰靜多不妨才靜事都見得然總亦只是一箇敬辨長孺向來自謂有悟其狂怪殊不可曉恰與金溪學徒相似嘗見受學於金溪者便一似咽下箇甚物事被他撓得來恁地又如有一箇蠱在他肚中螬得他自不得由己樣某嘗皆譬云長孺叔權皆是為酒所使一箇善底只是發酒慈那一箇便酒顛必大薑叔權也是箇資質好底人正如吳公濟相似汪長孺正好得他這般人相處但叔權也昏鈍不是箇撥著便轉挑著便省底於道理只是慢慢思量後方説得若是長孺説話恁地橫後跳躑他也無奈他何道夫問孟子如不得已一段曰公念得如不得已一句字重了聲高但平看便理會得因此有警以言語太粗急也訓振先生問日間做甚工夫震曰讀大學章句或問玩味先生所以警策學者著實用工處曰既知工夫在此便把大學為主我且做客聽命於大學又問或問中載諸先生敬之説震嘗以整齊嚴肅體之於身往往不能久此心又未免出入不能自制曰只要常常操守人心如何免得出入正如人要去又且留住他莫教他去得遠訓震椿臨行請教曰凡人所以立身行己應事接物莫大乎誠敬誠者何不自欺不妄之謂也敬者何不怠慢不放蕩之謂也今欲作一事若不立誠以致敬説這事不妨胡亂做了做不成又付之無可奈何這便是不能敬人面前底是一樣背後又是一樣外面做底事內心卻不然這箇皆不誠也學者之心大凡當以誠敬為主訓椿紹興甲寅良月先生由經筵奉祠待命露芝杞往見首問曾作甚工夫曰向蒙程先生曰端蒙賜教謂人之大倫有五緊要最是得寸守寸得尺守尺曰如何得這寸得這尺曰大概以持敬為本推而行之於五者之間曰大綱是如此顧蘇兄云凡人為學須窮理窮理以讀書為本孔子曰好古敏以求之若不窮理便只守此安得有進底工夫如李兄所云固是且更窮理就事物上看窮得這箇道理到底了又卻窮那箇道理如此積之以久窮理益多自然貫通窮理須是窮得到底方始是杞云莫致知在格物否曰固是大學論治國平天下許多事卻歸在格物上凡事事物物各有一箇道理若能窮得道理則施之事物莫不各當其位如人君止於仁人臣止於敬之類各有一至極道理又云凡萬物莫不各有一道理若窮理則萬物之理皆不出此曰此是萬物皆備於我曰極是訓杞初投先生書以此心不放動為主敬之説先生曰主敬二字只恁地做不得須是內外交相養蓋人心活物吾學非比釋氏須是窮理書中有云近乃微測為學功用知此事乃切己事所係甚重先生舉以語朋友云誠是如此以下訓士毅問窮理莫如隨事致察以求其當然之則曰是如此問人固有非意於為過而終陷於過者此則不知之矣然當不知之時正私意物欲方蔽錮竊恐雖欲致察而不得其真曰這箇恁地兩相擔閣不得須是察問程子所謂涵養須用敬進學則在致知不可除一句曰如此方始是又曰知與敬是先立底根腳講論自是講論須是將來自體驗説一段過又一段何補某向來從師一日説話晚頭如溫書一般須子細看過有疑則明日又問問士毅尋常讀書須要將説心處將自體之以心言處事處推之以事隨分量分曉方放過莫得體驗之意否曰亦是又曰體驗是自心裏暗自講量一次廣録云或問先生謂講論固不可無須是自去體認如何是體認曰體認是把那聽得底自去心裏重復思繹過伊川曰時復思繹浹洽於中則説矣某向來從師日間所聞説話夜間如溫書一般一一子細思量過方有疑明日又問士毅稟歸請教曰只前數日説底便是只要去做工夫如飲食在前須是去喫他方知滋味又曰學者最怕不知蹊徑難與他説今日有一朋友將書來説從外面去不知何益不免説與他教看孟子存心一段人須是識得自家物事且如存若不識得他如何存得如今既知蹊徑且與他做去只如主敬窮理不可偏廢這兩件事如踏一物一般踏著這頭那頭便動如行步左足起右足自來又曰更有一事如今學者須是莫把做外面事看人須要學不學便欠闕了他底學時便得箇恰好人須做工夫方有疑初做時事定是觸著相礙沒理會處只如居敬窮理始初定分作兩段居敬則執持在此才動則便忘了也問始學必如此否曰固然要知居敬在此動時理便自窮只是此話工夫未到時難説又曰但能無事時存養教到動時也會求理問如何是反身窮理曰反身是著實之謂又曰向自家體分上求以下訓枅問天理真箇難明己私真箇難克望有以教之先生罵曰公不去用力只管説道是難孟子曰道若大路然豈難知哉人病不求耳往往公亦知得這箇道理好才下手見未有入頭處便説道是難而不肯用力所以空過了許多月日可惜可惜公若用力久亦自有箇入頭處何患其難枅嘗問先生自謂矯揉之力雖勞而氣稟之偏自若警覺之念雖至而惰怠之習未除異端之教雖非所願學而芒忽之差未能辨善利之間雖知所決擇而正行惡聲之念或潛行而不自覺先覺之微言奧論讀之雖間有契而不能浹洽於心意之間云云曰所論皆切問近思人之為學惟患不自知其所不足今既知之則亦即此而加勉焉耳為仁由己豈他人所能與惟讀書窮理之功不可不講也先生語枅曰看公意思好但本原處殊欠工夫莫如此過了日月可惜
