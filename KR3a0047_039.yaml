body:
  text: 朱子語類卷第三十九論語二十一先進篇上先進於禮樂章立之問先進後進於禮樂文質何以不同曰禮只是一箇禮用得自不同如升降揖遜古人只是誠實依許多威儀行將去後人便自做得一般樣忒好看了古人只是正容謹節後人便近於巧言令色樂亦只是一箇樂亦是用處自不同古樂不可得而見矣只如今人彈琴亦自可見如誠實底人彈便雍容平淡自是好聽若弄手弄腳撰出無限不好底聲音只見繁碎耳因論樂黃鍾之律最長應鍾之律最短長者聲濁短者聲清十二律旋相為宮宮為君商為臣樂中最忌臣陵君故有四清聲如今響板子有十六箇十二箇是正律四箇是四清聲清聲是減一律之半如應鍾為宮其聲最短而清或蕤賓為商則是商聲高似宮聲是為臣陵君不可用遂乃用蕤賓律減半為清聲以應之雖然減半然只是此律故亦自能相應也此是通典載此一項徽宗朝作大晟樂其聲是一聲低似一聲故其音緩散太祖英明不可及當王朴造樂時聞其聲太急便令減下一律其聲遂平時舉問先進於禮樂此禮樂還說宗廟朝廷以至州閭鄉黨之禮樂曰也不止是這般禮樂凡日用之間一禮一樂皆是禮樂只管文勝去如何合殺須有箇變轉道理如今日事都恁地侈靡某在南康時通上位書啓只把紙封後來做書盝如今盡用紫羅背盝內用真紅事事都如此如何合殺問孔子又云吾從周只是指周之前輩而言曰然聖人窮而在下所用禮樂固是從周之前輩若聖人達而在上所用禮樂須更有損益不止從周之前輩若答顏子為邦之問則告以四代之禮樂問如孔子所言禮與其奢也寧儉喪與其易也寧戚又云禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉此皆欲損過就中之意曰固是此等語最多又云觀聖人意思因見得事事都如此非獨禮樂如孟子後面說許多鄉原狂狷亦是此意鄉原直是不好寧可是狂底狷底如今人恁地文理細密倒未必好寧可是白直粗疏底人賀孫夫子於禮樂欲從先進今觀禮書所載燕饗之禮品節太繁恐亦難用不若只如今人宴集就中刪修使之合義如鄉飲酒禮向來所行真成彊人行之何益所以難久不若只就今時宴飲之禮中刪改行之情意卻須浹洽必大從我於陳蔡章問從我於陳蔡者皆不及門曰此說當從明道謂此時適皆不在孔子之門思其相從於患難而言其不在此耳門人記之因歷數顏子而下十人并目其所長云耳謨問德行不知可兼言語文學政事否曰不消如此看自就逐項上看如顏子之德行固可以備若他人固有德行而短於才者因云冉伯牛閔子之德行亦不多見子夏子游兩人成就自不同胡五峰說不知集注中載否他說子夏是循規守矩細密底人子游卻高朗又缺細密工夫荀子曰第作其冠神談其辭禹行而舜趨是子張氏之賤儒也正其衣冠齊其顏色嗛然而終日不言是子夏氏之賤儒也偷懦憚事無廉恥而嗜飲食必曰君子固不用力是子游氏之賤儒也如學子游之弊只學得許多放蕩疏闊意思賀孫因舉如喪至乎哀而止事君數斯辱朋友數斯疏皆是子游之言如小子當灑掃應對進退等語皆是子夏之言又如子游能養而不能敬子夏能敬而少溫潤之色皆見二子氣象不同處曰然賀孫問德行言語政事文學之別曰德行是箇兼內外貫本末全體底物事那三件各是一物見於用者也德行得之於心而見於行事者也回也非助我者也章舊曾問李先生顏子非助我者處李先生云顏子於聖人根本有默契處不假枝葉之助也如子夏乃枝葉之功祖道南容三復白圭章先生令接讀問目南容三復白圭云不是一旦讀此乃是日日讀之玩味此詩而欲謹於言行也此事見家語自分明時舉顏路請子之車章鄭問顏淵死孔子既不與之車若有錢還亦與之否曰有錢亦須與之無害問注以為命車何以驗之曰禮記言大夫賜命車節門人厚葬章門人厚葬是顏子之門人不得視猶子以有二三子故也歎不得如葬鯉之得宜此古注說得甚好又簡徑明作季路問事鬼神章事人事鬼以心言知生知死以理言泳或問季路問鬼神章曰事君親盡誠敬之心即移此心以事鬼神則祭如在祭神如神在人受天所賦許多道理自然完具無缺闕須盡得這道理無缺闕到那死時乃是生理已盡安於死而無愧時舉或問二氣五行聚則生散則死聚則不能不散如晝之不能不夜故知所以生則知所以死苟於事人之道未能盡焉能事鬼哉曰不須論鬼為已死之物但事人須是誠敬事鬼亦要如此事人如出則事公卿入則事父兄事其所當事者事鬼亦然苟非其鬼而事之則諂矣去僞問人鬼一理人能誠敬則與理為一自然能盡事人事鬼之道有是理則有是氣人氣聚則生氣散則死是如此否曰人且從分明處理會去如誠敬不至以之事人則必不能盡其道況事神乎不能曉其所以生則又焉能曉其所以死乎亞夫問未知生焉知死先生曰若曰氣聚則生氣散則死才說破則人便都理會得然須知道人生有多少道理自稟五常之性以來所以父子有親君臣有義者須要一一盡得這生底道理則死底道理皆可知矣張子所謂存吾順事沒吾寧也是也時舉問天地之化雖生生不窮然而有聚必有散有生必有死能原始而知其聚而生則必知其後必散而死能知其生也得於氣化之日初無精神寄寓於太虛之中則知其死也無氣而俱散無復更有形象尚留於冥漠之內曰死便是都散無了或問季路問鬼神章曰世間無有聚而不散散而不聚之物聚時是這模樣則散時也是這模樣若道孔子說與子路又不全與他說若道不說又也只是恁地義剛先生說未能事人焉能事鬼曾以一時趨平原者言之我於人之不當事者不妄事則於鬼神亦然所以程子云能盡事人之道則能盡事鬼之道一而二二而一過問伊川謂死生人鬼一而二二而一是兼氣與理言之否曰有是理則有是氣有是氣則有是理氣則二理則一賀孫徐問集注云鬼神不外人事在人事中何以見曰鬼神只是二氣屈伸往來在人事如福善禍淫亦可見鬼神道理論語少說此般話曰動靜語默亦是此理否曰亦是然聖人全不曾說這般話與人以其無形無影固亦難說所謂敬鬼神而遠之只如此說而已淳今集注無閔子侍側章問閔子誾誾冉有子貢侃侃二者氣象曰閔子純粹冉有子貢便較粗了侃侃便有盡發見在外底氣象閔子則較近裏些子雄問冉有子貢侃侃如也這侃侃字只作剛直說如何曰也只是剛直閔子騫氣象便自深厚冉有子貢便都發見在外冉有子貢侃侃如也侃侃剛直之貌不必泥事跡以二子氣象觀之賜之達求之藝皆是有才底人大凡人有才便自暴露便自然有這般氣象閔子純於孝自然有誾誾氣象端蒙誾誾是深沉底侃侃是發露圭角底行行是發露得粗底夔孫問誾誾行行侃侃皆是剛正之意如冉求平日自是個退遜之人如何也解有此意思曰三子皆意思大同小異求賜則微見其意子路則全體發在外閔子則又全不外見然此意思亦自在三子者皆有疑必問有懷必吐無有遮覆含糊之意曰豈非以卑承尊易得入於柔佞卑諂三子各露其情實如此故夫子樂之曰都無那委曲回互底意思廣問誾誾行行侃侃曰閔子於和悅中卻有剛正意思仲由一於剛正閔子深厚仲由較表露問子路不得其死然曰然者未定之辭聖人雖謂其不得其死使子路能變其氣習亦必有以處死賀孫吳伯英講由也不得其死處問曰由之死疑其甚不明於大義豈有子拒父如是之逆而可以仕之乎曰然仲由之死也有些沒緊要然誤處不在致死之時乃在於委質之始但不知夫子既教之以正名而不深切言其不可仕於衛何歟若冉有子貢則能問夫子為衛君與否蓋不若子路之粗率壯祖或問子路死於孔悝之難死得是否曰非是自是死得呆出公豈可仕也又問若仕於孔悝則其死為是否曰未問死孔悝是不是只合下仕於衛自不是了況孔悝亦自是不好底人何足仕也子路只見得可仕於大夫而不知輒之國非可仕之國也問孔門弟子多仕於列國之大夫者何故曰他別無科闕仕進者只有此一門舍此則無從可仕所以顏閔寧不仕耳僩子路死孔悝之難未為不是只是他當初事孔悝時錯了到此不得其死饒本作到此只得死衛君不正冉有子貢便能疑而問之有思量便不去事他若子路粗率全不信聖人說話必也正名亦是教子路不要事衛他更說夫子之迂若由也不得其死聖人已見得他錯了但不如鳴鼓攻之責得求之深雖有不得其死及正名之說然終不分曉痛說與他使之知不要事孔悝此事不可曉不知聖人何故不痛責之明作子路為人粗於精微處多未達其事孔悝蓋其心不以出公為非故也悝即出公之黨何以見得他如此如衛君待子為政夫子欲先正名他遂以為迂可見他不以出公為非故其事悝蓋自以為善而為之而不知其非義也子貢問師與商也章問師也過商也不及看過與不及處莫只是二子知見上缺工夫曰也不獨知見上缺只二子合下資質是這模樣子張便常要將大話蓋將去子夏便規規謹守看論語中所載子張說話及夫子告子張處如多聞闕疑多見闕殆之類如子張自說我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也此說話固是好只是他地位未說得這般話這是大賢以上聖人之事他便把來蓋人其疏曠多如此孔子告子夏如云無為小人儒又云無欲速無見小利如子夏自言可者與之其不可者拒之小子當灑掃應對進退之類可見又問參也竟以魯得之魯卻似有不及之意然曾參雖魯而規模志向自大所以終能傳夫子之道子夏合下淺狹而不能窮究道體之大全所以終於不及曰魯自與不及不相似魯是質朴渾厚意思只是鈍不及底恰似一箇物事缺了些子賀孫問伊川謂師商過不及其弊為楊墨曰不似楊墨墨氏之學萌櫱已久晏子時已有之矣師商之過不及與兼愛為我不關事必大季氏富於周公章問以季氏之富而求也為之聚斂曰不問季氏貧富若季氏雖富而取於民有制亦何害此必有非所當取而取之者故夫子如此說義剛問冉求聖門高弟親炙聖人不可謂無所見一旦仕於季氏為之聚斂而附益之蓋緣他工夫間斷故不知不覺做到這裏豈可不時時自點檢曰固是只緣箇公私義利界分不明所以如此若是常在界分內做自然不到如此才出界分去則無所不至矣廣問季氏富於周公一章先生令舉范氏之說歎美久之云人最怕資質弱若過於剛如子路雖不得其死百世之下其勇氣英風尚足以起頑立懦若冉有之徒都自扶不起如云可使足民他豈不知愛民而反為季氏聚斂如范氏云其心術不明惟是心術不明到這般所在都不自知又云以仕為急他只緣以仕為急故從季氏見他所為如此又拔不出一向從其惡賀孫因云若閔子善為我辭之意便見得煞高曰然因云謝氏說閔子處最好因令賀孫舉讀全文曰冉求路頭錯處只在急於仕人亦有多樣有一等人合下只是要求進又有一等人心性自不要如此見此事自匹似間又有一等人雖要求進度其不可亦有退步之意賀孫柴也愚章柴也愚他是箇謹厚底人不曾見得道理故曰愚明作吳伯英問柴也愚因說柴嘗避難於衛不徑不竇使當時非有室可入則柴必不免此還合義否曰此聖人所以言其愚也若夫子畏於匡微服過宋料須不如此壯祖用之問高子羔不竇不徑事曰怕聖人須不如此如不徑不竇只說平安無事時節若當有寇賦患難如何專守此以殘其軀此柴之所以為愚聖人微服而過宋微服是著那下賤人衣服觀這意如此只守不徑不竇之說不得如途中萬一遇大盜賊也須走避那時如何要不由小徑去得然子羔也是守得定若更學到變通處儘好止緣他學有未盡處問學到時便如曾子之易簀曰易簀也只是平常時節又曰子路使子羔為費宰子曰賊夫人之子不可為政者正緣他未能應變他底卻自正問子路之死與子羔事如何曰子路事更難說又曰如聖節就祝壽處拜四拜張忠甫不出仕嘗曰只怕國忌聖節去拜佛不得這也如不竇不徑相似因說國家循襲這般禮數都曉不得往往拜佛之事始於梁武帝以私忌設齊始思量聖節要寓臣子之意又未有箇所在奉安又曰尊號始於唐德宗後來只管循襲若不是人主自理會得如何說當神宗時群臣上尊號司馬溫公密撰不允詔書勸上不受神宗便不受這只是神宗自見得雖溫公也要如此不得且如三年喪其廢如此長遠壽皇要行便行了也不見有甚不可行處賀孫參也魯魯是魯鈍曾子只緣魯鈍被他不肯放過所以做得透若是放過只是魯而已恪讀參也魯一段云只曾子資質自得便宜了蓋他以遲鈍之故見得未透只得且去理會終要洞達而後已若理會不得便放下了如何得通透則是終於魯而已時舉參也竟以魯得之曾子魯鈍難曉只是他不肯放過直是捱得到透徹了方住不似別人只略綽見得些小了便休今一樣敏底見得容易又不能堅守鈍底捱得到略曉得處便說道理止此更不深求惟曾子更不放舍若這事看未透真是捱得到盡處所以竟得之僩明道謂曾子竟以魯得之緣他質鈍不解便理會得故著工夫去看遂看得來透徹非他人所及有一等伶俐人見得雖快然只是從皮膚上略過所以不如他且莫說義理只如人學做文章非是只恁地讀前人文字了便會做得似他底亦須是下工夫始造其妙觀韓文公與李翊書老蘇與歐陽公書說他學做文章時工夫甚麼細密豈是只恁從冊子上略過便做得如此文字也毅略參也竟以魯得之不說須要魯魯卻正是他一般病但卻尚是箇好底病就他說卻是得這箇魯底力義剛參也竟以魯得之魯鈍則無造作賀孫曾子以魯得之只是魯鈍之人卻能守其心專一明達者每事要入一分半上落下多不專一端蒙回也其庶乎章敬之問回也其庶乎屢空大意謂顏子不以貧窶動其心故聖人見其於道庶幾子貢不知貧富之定命而於貧富之間不能無留情故聖人見其平日所講論者多出億度而中曰據文勢也是如此但顏子於道庶幾卻不在此聖人謂其如此益見其好子貢不受命也在平日聖人亦不因其貨殖而言賀孫因問集注云顏回言其樂道又能安貧以此意看若顏子不處貧賤困窮之地亦不害其為樂曰顏子不處貧賤固自樂到他處貧賤只恁地更難所以聖人於此數數拈掇出來賀孫顏子屢空說作空中不是論語中只有空空如也是說無所得別不見說虛空處可學問屢空前輩及南軒皆作空無說以為無意必固我之無但顏子屢空未至於聖人之皆無而純然天理也及先生所解卻作屢空乏而自樂何也曰經意當如此不然則連下文子貢作二段事空無之說蓋自何晏有此解晏老氏清淨之學也因其有此說後來諸公見其說得新好遂發明之若顏子固是意必固我之屢無只是此經意不然顏子不以貧乏改其樂而求其富如此說下文見得子貢有優劣宇問呂曰貨殖之學聚所聞見以度物可以屢中而不能悉中嘗記前輩一說曰自太史公班固列子貢於貨殖下與馬醫夏畦同科謂其所至諸侯莫不分庭抗禮天下後世無不指子貢為豎賈之事子貢孔門高弟豈有聖人之門而以賈豎為先乎屢空無我者也其學則自內而求貨殖自外而入非出於己之所自得也特其才高凡接於見聞者莫不解悟比之屢空者為有間矣曰此說乃觀文葉公所作審是集中之語蓋呂與叔之遺意也乍看似好而道理恐不如是蓋屢空者空乏其身也貨殖則對屢空而言不能不計較者是也范氏曰顏子簞食瓢飲屢絶而不改其樂天下之物豈有能動其心者此說為得之謨子張問善人之道章問善人之道曰善人之道只是箇善人底道理所謂善人者是天資渾然一箇好人他資質至善而無惡即可欲之謂善他所行底事自然皆善不消得按本子自不至於惡若是常人不依本子便不能盡善流而為惡但他既天資之善故不必循塗守轍行之皆善卻緣只是如此而無學故不能入聖人閫室橫渠之解極好塗轍猶言規矩尺度味道問善人只是好資質全未曾學曰是又問不踐跡曰是古人所做底事恁地好雖不曾學古人已做底事做得來也恁地好循塗守徹猶言循規守矩云耳踐跡跡是舊跡前人所做過了底樣子是成法也善人雖不曾知得前人所做樣子效他去做但所為亦自與暗合但未能到聖人深處恪施問不踐跡曰是他資質美所為無箇不是雖不踐成法卻暗合道理然他也自不能曉會只暗合而已又卻不曾學問所以亦不入於室林問不入室室是神化地位否曰非也室只是深奧處宇問不踐跡曰善人質美雖不學樣子卻做得是然以其不學是以不入室到聖人地位不得謙之善人乃是天資自然有善者不待循常跡而自然能有其善然而不能加學則亦不足以入聖人之室震謝教問不踐跡曰資質美只是暗合不依本子做橫渠說得好然亦只是終於此而已淳問不踐跡亦不入於室莫是篤行之而後可以入善之閫奧否曰若如此言卻是說未為以前事今只說善人只是一箇好底資質不必踐元本子亦未入於室須是要學方入聖賢之域惟橫渠云志於仁而無惡此句最盡如樂正子自可欲之善人去自可到美大聖神地位去僞問善人莫是天資好人否故雖不必循守舊人塗轍而自不為惡然其不知學問故亦不能入於聖人之室此可見美質有限學問無窮否曰然廣問尋常解踐跡猶踏故步不踐跡者亦有所進亦不入於室者所進不遠也今集注解踐跡不循樣轍之意如何曰善人者以其心善故不假成法而其中自能運用故曰不踐跡據此止說善人未有進意洽問不踐跡何以為善人曰不循習前人已試之法度而亦可以為善如漢文帝是也大雅魏才仲問善人之道一章曰如所謂雖曰未學吾必謂之學矣之類又問如太史公贊文帝為善人意思也是曰然只為他截斷只到這裏不能做向上去所以說道不依樣子也自不為惡只是不能入聖人之室又問文帝好黃老亦不免有慘酷處莫是才好清淨便至於法度不立必至慘酷而後可以服人曰自清淨至慘酷中間大有曲折卻如此說不得唯是自家好清淨便一付之法有犯罪者都不消問自家但看法何如只依法行自家這裏更不與你思量得此所以流而為慘酷伯謨曰黃老之教本不為刑名只要理會自己亦不說要慘酷但用之者過耳曰緣黃老之術凡事都先退一著做教人不防他到得逼近利害也便不讓別人寧可我殺了你定不容你殺了我他術多是如此所以文景用之如此文帝猶善用之如南越反則卑詞厚禮以誘之吳王不朝賜以几杖等事這退一著都是術數到他教太子朝錯為家令他謂太子亦好學只缺識術數故以朝錯傅之到後來七國之變弄成一場紛亂看文景許多慈祥豈弟處都只是術數然景帝用得不好如削之亦反不削亦反賀孫子畏於匡章或問回何敢死伊川改死為先是否曰伊川此話門人傳之恐誤其間前後有相背處今只作死字說其曰吾以汝為死矣者孔子恐顏回遇害故有此語顏子答曰子在回何敢死者顏子謂孔子既得脫禍吾可以不死矣若使孔子遇害則顏子只得以死救之也或問顏路在顏子許人以死何也曰事偶至此只得死此與不許友以死之意別不許以死在未處難以前乃可如此處已遇難卻如此說不得去僞
