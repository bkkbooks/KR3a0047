body:
  text: 朱子語類卷第三十一論語十三雍也篇二子華使於齊章子升問冉子請粟聖人不與之辨而與之益之曰聖人寬洪可以豫可以無豫豫之亦無害但不使傷惠耳木之冉子與之粟五秉聖人亦不大段責他而原思辭祿又謂與爾鄰里鄉黨看來聖人與處卻寬恪張子曰於斯二者可見聖人之用財雖是小處也莫不恰好便是一以貫之處夔孫義剛録云聖人於小處也區處得恁地盡便是一以貫之處聖人做事著地頭范氏曰夫子之道循理而已故周急不繼富以為天下之通義使人可繼也游氏曰餼廩稱事所以食功也今原思為之宰而辭祿不受則食功之義廢矣蓋義所當得則雖萬鍾不害其為廉借使有餘猶可以及鄰里鄉黨蓋鄰里鄉黨有相賙之義尹氏曰赤之適齊也乘肥馬衣輕裘而冉求乃資之與之釜者所以示不當與也求不達其意而請益與之五秉故夫子非之又曰原思之辭常祿使其苟有餘則分諸鄰里鄉黨者凡取豫一適於義而已第四章凡七說今從范氏游氏尹氏之說伊川謂師使弟子不當有所請其說雖正然恐非本意據冉求乃為其母請其意欲資之也使冉求為子華請則猶可責之以弟子之禮若為其母請則止欲附益之故責之以繼富恐或外生一意非夫子責冉求之意范氏第二說與楊氏謝氏之說大率以辭受取舍順理合義為文只說大綱其間曲折詳備則不如尹氏之深切呂氏曰富而與人分之則廉者無辭於富造語未盡不能無差向使不義之富可以分人廉者所必辭也富之可辭與不可辭在於義不義而不在於分人與不分人也謝氏曰與之釜與之庾意其祿秩所當得者此說恐未穩使祿秩當得夫子不待冉子之請而與之祿有常數夫子何心輕重於其間哉為其母請粟觀其文勢非祿秩也明矣曰為其母請即為子華請也呂氏說只據原思辭祿而言非謂不義之富也幹子謂仲弓章問子謂仲弓曰犁牛之子騂且角伊川謂多一曰字意以仲弓為犁牛子也考之家語仲弓生於不肖之父其說可信否曰聖人必不肯對人子說人父不善謨犁牛之子范氏蘇氏得之幹問此章前後作用人不以世類南軒以仲弓言焉知賢才之故故孔子教之用人此說牽合然亦似有理脈曰橫渠言大者苟立雖小未純人所不棄也今欽夫此說無他只是要回互不欲說仲弓之父不肖耳何不虛心平氣與他看古人賢底自賢不肖底自不肖稱其賢可以為法語其不肖可以為戒或曰恐是因仲弓之父不肖而微其辭曰聖人已是說了此亦何害大抵人被人說惡不妨但要能改過過而能改則前愆頓釋昔日是箇不好底人今日有好事自不相干何必要回互然又要除卻曰字此曰字留亦何害如子謂顏淵曰吾見其進也不成是與顏淵說況此一篇大率是論他人不必是與仲弓說也只蘇氏卻說此乃論仲弓之德非是與仲弓言也大雅子曰回也章問三月不違仁曰仁與心本是一物被私欲一隔心便違仁去卻為二物若私欲既無則心與仁便不相違合成一物心猶鏡仁猶鏡之明鏡本來明被塵垢一蔽遂不明若塵垢一去則鏡明矣顏子三箇月之久無塵垢其餘人或日一次無塵垢少間又暗或月一次無塵垢二十九日暗亦不可知南升問三月不違仁曰三月只是言久爾非謂三月後必違也此言顏子能久於仁爾雖念慮之間間有不善處卻能知之而未嘗復行也去僞問三月不違仁三月後亦有違否曰畢竟久亦有間斷曰這間斷亦甚微否曰是如不二過過便是違仁非禮勿視聽言動四句照管不到便是過淳問日月至焉曰日至是一日一次至此月至是一月一次至此言其疏也間時都思量別處又問思量事不到不好然卻只是間事如何曰也不是視便要思明聽便思聰總思量便要在正理上如何可及間事銖問如何是日至月至曰某舊說其餘人有一日不違仁有一月不違仁者近思之一日不違仁固應有之若一月不違似亦難得近得一說有一日一番見得到有一月一番見得到比之一日猶勝如一月之遠若顏子方能三月不違天理純然無一毫私僞間雜夫子所以獨稱之宇義剛說回也其心三月不違仁集注云仁者心之德竊推此義以為天生一人只有一心這腔子裏面更無些子其他物事只有一箇渾全底道理更無些子缺缺所謂仁也曰莫只將渾全底道理說須看教那仁親切始得義剛顏子三月不違只是此心常存無少間斷自三月後卻未免有毫髮私意間斷在但顏子才間斷便覺當下便能接續將去雖當下便能接續畢竟是曾間斷來若無這些子卻便是聖人也日月至焉看得來卻是或一日一至或一月一至這亦難說今人若能自朝至暮此心洞然表裏如一直是無纖毫私意間斷這地位豈易及惟實曾去下工夫方自見得橫渠內外賓主之說極好三月不違那箇是主人是常在家裏坐底三月後或有一番出去卻便會歸來日月至焉那箇是客是從外面到底然亦是徹底曾到一番卻不是髣佛見得箇恁地或日一到這裏或月一到這裏便又出去以月較日又疏到了正卿問集注不知其仁也云雖顏子之賢猶不能不違於三月之後如何曰不是三月以後一向差去但於這道理久後略斷一斷便接續去只是有些子差便接了若無些子間斷便全是天理便是聖人所以與聖人一間者以此舊說只做有一月至者有一日至者與顏淵三月至者有次第看來道理不如此顏子地位比諸子煞有優劣如賜也聞一以知二回也聞一以知十此事爭多少此是十分爭七八分張子云云這道理譬如一屋子是自家為主朝朝夕夕時時只在裏面如顏子三月不能不違只是略暫出去便又歸在裏面是自家常做主若日至者一日一番至是常在外為客一日一番暫入裏面來又便出去月至亦是常在外為客一月一番入裏面來又便出去又云三月不違者如人通身都白只有一點子黑日月至焉者如人通身都黑只有一點白又云顏子一身已自不見其身日用之間只見許多道理賀孫今集注不知其仁章無此說問如今之學者一日是幾遍存省當時門人乃或日一至焉或月一至焉不應如是疏略恐仁是渾然天理無纖毫私欲處今日之學者雖曰存省亦未到這境界他孔門弟子至便是至境界否曰今人能存得亦是這意思但觸動便不得被人叫一聲便走了他當那至時應事接物都不差又不知至時久近如何那裏煞有曲折日至者卻至得頻數恐不甚久月至者或旬日或一二日皆不可知又問橫渠云云文蔚竊謂三月不違者天理為主人欲為賓日月至焉者人欲為主天理為賓學者工夫只得勉勉循循以克人欲存天理為事其成與不成至與不至則非我可必矣曰是如此文蔚問伊川言不違是有纖毫私欲橫渠言要知內外賓主之辨曰前後說是如此劉仲升云與久而不息者氣象迥別大雅云久而不息自是聖人事曰三月不違是自家已有之物三月之久忽被人借去自家旋即取回了日月至焉是本無此物暫時問人借得來便被人取去了大雅至之問橫渠言始學之要當知三月不違止過此幾非在我者曰且以屋喻之三月不違者心常在內雖間或有出時然終是在外不穩便才出即便入蓋心安於內所以為主日月至焉者心常在外雖間或有入時然終是在內不安才入即便出蓋心安於外所以為賓日至者一日一至此月至者一月一至此自外而至也不違者心常存日月至者有時而存此無他知有至未至意有誠未誠知至矣雖驅使為不善亦不為知未至雖軋勒使不為此意終迸出來故貴於見得透則心意勉勉循循自不能已矣過此幾非在我者猶言過此以往未之或知言過此則自家著力不得待他自長進去又曰三月不違之違猶白中之黑日月至焉之至猶黑中之白今須且將此一段反覆思量渙然冰釋怡然理順使自會淪肌浹髓夫子謂君子上達小人下達只在這些子若拗不轉便下達去了又曰此正如誠意章相似知善之可好而好之極其篤知不善之可惡而惡之極其深以至於慊快充足方始是好處道夫問三月不違仁先生曰如何是心如何是仁曰心是知覺底仁是理曰耳無有不聰目無有不明心無有不仁然耳有時不聰目有時不明心有時不仁問莫是心與理合而為一曰不是合心自是仁然私欲一動便不仁了所以仁人心也學理會甚麼事只是理會這些子又問張子之說莫是三月不違者是仁常在內常為主日月至焉者是仁常在外常為賓曰此倒說了心常在內常為主心常在外常為客如這一間屋主常在此居客雖在此不久著去問如此則心不違仁者是心在仁內曰不可言心在仁內略略地是恁地意思又曰便是難說問過此幾非在我者如何曰不用著力如決江河水至而舟自浮如說學只說到說處住以上不用說至說處則自能尋將上去不到說處是不曾時習時習則相將自然說又曰人只是一箇不肯學須是如喫酒自家不愛喫硬將酒來喫相將自然要喫不待強他如喫藥人不愛喫硬強他喫節問橫渠說內外賓主之辨若以顏子為內與主不成其他門人之所學便都只在外曰他身己是都在道外恰似客一般譬之一箇屋聖人便常在屋裏坐顏子也在屋裏只有時誤行出門外然便覺不是他住處便回來其他卻常在外面有時入來不是他活處少間又自出去了而今人硬把心制在這裏恰似人在路上做活計百事都安在外雖是他自屋舍時暫入來見不得他活處亦自不安又自走出了雖然也須漸漸把捉終不成任他如何又曰日月至焉者是有一日得一番至有一月得一番至賀孫問日月至焉一句曰看得來日卻是久底月卻是暫時底因說橫渠內外賓主之辨曰顏子一似主人長在家裏三月以後或有出去時節便會向歸其餘是賓或一日一至或一月一至以日較月月又卻疏又曰不違者是在內至焉者是在外來又問幾非在我者曰舍三月不違去做工夫都是在我外不在我這裏了謙之問橫渠內外賓主之說曰主是仁賓卻是己身不違仁者己住在此屋子內了日月至焉者時暫到此又出去是乃賓也後數日又因一學者舉此段為問而曰仁譬如此屋子顏子在此裏面住但未免間有出去時他人則或入來住得一日或入來住得一月不能久處此此即內外賓主之辨過此幾非在我者謂學者但當勉勉循循做工夫而已舍是則他無所事也必大或問橫渠內外賓主之辨一段云仁在內而我為主仁在外而我為客如何曰此兩句又是後人解橫渠之語蓋三月不違底是仁為主私欲為客諸子日月至焉者是私欲為主仁只為客譬如人家主人常在屋中出外時少便出去也不久須歸來日月至焉者則常常在外做客暫時入屋來又出去出去之時多在屋之時少或一月一番至或一日一番至終是不是主人故常在外然那客亦是主人只是以其多在外故謂之客敬則常在屋中住得不要出外久之亦是主人既是主人自是出去時少也佛經中貧子寶珠之喻亦當三月不違者我為主而常在內也日月至焉者我為客而常在外也仁猶屋心猶我常在屋中則為主出入不常為主則客也過此幾非在我者如水漲船行更無著力處銖問橫渠內外之說曰譬如一家有二人一人常在家一人常在外在家者出外常少在外者常不在家間有歸家時只是在外多謨三月不違仁是在屋底下做得主人多時日月至焉是有時從外面入來屋子底下橫渠所謂內外賓主之辨者是也又曰學者須是識得屋子是我底始得儒用問內外賓主之辨曰不違仁者仁在內而為主然其未熟亦有時而出於外日月至焉者仁在外而為賓雖有時入於內而不能久也廣三月不違主有時而出日月至焉賓有時而入人固有終身為善而自欺者不特外面蓋有心中欲為善而常有一箇不肯底意便是自欺從周叔器未達內外賓主之辨一句曰日月至焉底便是我被那私欲挨出在外面是我勝那私欲不得又問使心意勉勉循循不能已曰不能已是為了又為為得好後只管為如欲罷不能相似蔡仲默云如生則惡可已也之類曰是義剛問三月不違仁曰仁即是心心如鏡相似仁便是箇鏡之明鏡從來自明只為有少間隔便不明顏子之心已純明了所謂三月不違只緣也曾有間隔處又問張子謂使心意勉勉循循而不能已過此幾非在我者是如何曰學者只要勉勉循循而不能已才能如此便後面雖不用大段著力也自做去如推箇輪車相似才推得轉了他便滔滔自去所謂學而時習之不亦說乎者正謂說後不待著力而自不能已也時舉張子言勉勉循循而不能已須是見得此心自不能已方有進處過此幾非在我謂過三月不違非工夫所能及如末由也已真是著力不得又云勉勉循循之說須是真箇到那田地實知得那滋味方自不能已要住不得自然要去過此幾非在我言不由我了如推車子相似才著手推動輪子了自然運轉不停如人喫物既得滋味自然愛喫日月至焉者畢竟也是曾到來但不久耳明作或問張子幾非在我者曰既有循循勉勉底工夫自然住不得幾非在我者言不待用力也如易傳中說過此以往未之或知也之意為學正如推車子相似才用力推得動了便自轉將去更不費力故論語首章只說箇學而時習之不亦說乎便言其效驗者蓋學至說處則自不容已矣廣南升録別出問幾非在我之義曰非在我言更不著得人力也人之為學不能得心意勉勉循循而不已若能如是了如車子一般初間著力推得行了後來只是滾將去所謂學而時習之不亦說乎若得說了自然不能休得如種樹一般初間栽培灌溉及既成樹了自然抽枝長葉何用人力南升味道問過此幾非在我者疑橫渠止謂始學之要唯當知內外賓主之辨此外非所當知曰不然學者只要撥得這車輪轉到循循勉勉處便無著力處自會長進去如論語首章言學只到不亦說乎處住下面便不說學了蓋到說時此心便活因言韓退之蘇明允作文只是學古人聲響盡一生死力為之必成而後止今之學者為學曾有似他下工夫到豁然貫通處否可學周貴卿問幾非在我者曰如推車子樣初推時須要我著力及推發了後卻是被他車子移將去也不由在我了某嘗說學而時習之不亦說乎若是做到這裏後自不肯住了而今人只是不能得到說處義剛問過此幾非在我者曰過此即是過此以往未之或知底意思若工夫到此蓋有用力之所不能及自有不可已處雖要用力亦不能得又問內外賓主之辨曰三月不違為主日月至焉為賓主則常在其中賓則往來無常蓋存主之時少在外之時多日月至焉為其時暫而不能久若能致其賓主之辨而用其力則工夫到處自有不可息者宇問何謂幾非在我者曰此即過此以往未之或知之意蓋前頭事皆不由我我不知前面之分寸也不知前面之淺深只理會這裏工夫便內外賓主之辨常要分曉使心意勉勉循循不已只如此而已便到顏子既竭吾才如有所立卓爾之地雖欲從之末由也已也只恁地淳過此幾非在我者到此則進進不能已亦無著力處拱壽子升問過此幾非在我莫是過此到聖人之意否曰不然蓋謂工夫到此則非我所能用其力而自然不能已如車已推而勢自去如船已發而纜自行若不能辨內外賓主不能循循不已則有時而間斷矣孟子所謂夫仁亦在乎熟之而已矣此語說得盡了木之問過此幾非在我者莫只見許多道理不見自身己如何曰這只是說循循勉勉便自住不得便自不由自身己只是這箇關難過才過得自要住不得如顏子所謂欲罷不能這箇工夫入頭都只在窮理只這道理難得便會分明又云今學者多端固有說得道理是卻自不著身只把做言語用了固有要去切己做工夫卻硬理會不甚進者又云看得道理透少間見聖賢言語句句是為自家身己設又云內外賓主只是如今人多是不能守得這心譬如一間屋日月至焉者是一日一番入裏面來或有一月一番入裏面來他心自不著這裏便又出去了若說在內譬如自家自在自屋裏作主心心念念只在這裏行也在這裏坐也在這裏睡臥也在這裏三月不違是時復又暫出外去便覺不是自家屋便歸來今舉世日夜營營於外直是無人守得這心若能收這心常在這裏便與一世都背馳了某嘗說今學者別無他只是要理會這道理此心元初自具萬物萬事之理須是理會得分明賀孫問三月不違仁伊川舉得一善則拳拳服膺仁乃全體何故以善稱曰仁是合衆善一善尚不棄況萬善乎可學集義問不違仁是此心純然天理其所得在內得一善則服膺而弗失恐是所得在外曰得一善則服膺弗失便是三月不違仁處又問是如何曰所謂善者即是收拾此心之理顏子三月不違仁豈直恁虛空湛然常閉門合眼靜坐不應事不接物然後為不違仁也顏子有事亦須應須飲食須接賓客但只是無一毫私欲耳道夫問伊川謂日月至焉與久而不息者所見規模雖略相似其意味迥別看來日月至與不息者全然別伊川言略相似何也曰若論到至處卻是與久而不息底一般只是日月至者至得不長久不息者純然無間斷宇問伊川曰三月言其久天道小變之節蓋言顏子經天道之變而為仁如此其終久於仁也又曰三月不違仁蓋言其久然非成德事范氏曰回之於仁一時而不變則其久可知其餘則有時而至焉不若回愈久而弗失也夫子之於仁慎其所以取與人者至矣有能一日用其力於仁矣乎猶不得見焉惟獨稱顏子三月不違其可謂仁也已謝氏曰回之為人語其所知雖出於學然鄰於生知矣語其成功雖未至於從容亦不可謂勉強矣三月不違仁仁矣特未可以語聖也亦未達一間之稱耳三月特以其久故也古人三月無君則弔去國三月則復詩人以一日不見如三月兮夫子聞韶三月不知肉味皆久之意右第六章凡九說今從伊川范氏謝氏之說伊川第一說以得一善則服膺弗失作三月不違仁未甚切第二說曰三月言其久過此則聖人也呂氏亦曰以身之而未能信性久則不能不懈又曰至於三月之久猶不能無違又曰至於三月之久其氣不能無衰雖欲勉而不違仁不可得也楊氏曰三月不違仁未能無違也侯氏亦曰三月不違仁便是不遠而復也過此則通天通地無有間斷尹氏亦曰三月言其久若聖人則渾然無間矣此五說皆同而有未安惟呂氏為甚竊謂此章論顏子三月不違仁其立言若曰能久不違仁而已其餘日月至焉者亦若曰至於仁而不久而已若以為顏子三月不違既過三月則違之何以為顏子此呂氏之說為未安楊氏亦此意伊川侯氏尹氏之說亦與呂氏楊氏相類特不顯言之耳故愚以三月特以其久不必泥三月字顏子視孔子為未至者聖人則不思不勉顏子則思勉也諸子視顏子為未至者則以久近不同耳若謂顏子三月則違恐未安伊川第三說與橫渠同皆說學者事但橫渠內外賓主四字不知如何說恐只是以三月不違者為有諸己故曰內曰主日月至焉者若存若亡故曰外曰賓否游氏說仁字甚切恐於本文不甚密先生曰能久不違仁不知能終不違耶亦有時而違耶顏子若能終不違仁則又何思勉之有易傳復之初九爻下有論此處可更思之游氏引仁人心也則仁與心一物矣而曰心不違仁何也幹季康子問仲由章問求之藝可得而聞否曰看他既為季氏聚斂想見是有藝問龜山解以為知禮樂射御書數然後謂之藝曰不止是禮樂射御書數宇求也藝於細微上事都理會得緣其材如此故用之於聚斂必有非他人所及者惜乎其有才而不善用之也問集注以從政例為大夫果何所據然則子游為武城宰仲弓為季氏宰之類皆不可言政歟曰冉子退於季氏之朝夫子曰其事也如有政雖不吾以吾其與聞之亦自可見壯祖呂氏曰果則有斷達則不滯藝則善裁皆可使從政也右第七章凡六說今從呂說伊川曰人各有所長能取其長皆可用也尹氏亦用此意若謂從政則恐非人人可能范氏惟說三子之失恐就本文解則未須說失處謝氏論季氏之意以謂陋儒所短正在此亦恐季氏未必有此意其問至於再三乃是有求人才之意使季氏尚疑其短則其問不必至反覆再三也楊氏論果藝達三德不如呂氏謹嚴曰此段所說得之但破范說非是幹正淳問范氏解季康子問三子可使從政章曰人固有病然不害其為可用其材固可用然不掩其為有病必大曰范氏之說但舉三子具臣貨殖之病卻不言其材之為可用者曰范氏議論多如此說得這一邊便忘卻那一邊唐鑑如此處甚多以此見得世間非特十分好人難得只好書亦自難得必大問謝氏三子於克己獨善雖季氏亦知其有餘之說曰世間固有一種號為好人然不能從政者但謝氏言克己獨善說得太重當云修己自好可也必大季氏使閔子騫為費宰章或問閔子不仕季氏而由求仕之曰仕於大夫家為僕家臣不與大夫齒那上等人自是不肯做若論當時侯國皆用世臣自是無官可做不仕於大夫除是終身不出如曾閔方得燾第八章五說今取謝氏之說伊川范楊尹氏四說大率皆同只略說大綱曰謝氏固好然辭氣亦有不平和處幹謝氏說得也粗某所以寫放這裏也是可以警那懦底人若是常常記得這樣在心下則可以廉頑立懦不至倒了今倒了底也多義剛伯牛有疾章侯氏曰夫子嘗以德行稱伯牛矣於其將亡也宜其重惜之故再歎曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也言非可愈之疾亦不幸短命之意尹氏曰牖牖下也包氏謂有惡疾不欲人知恐其不然也右第九章五說今從尹氏侯氏之說范氏曰冉伯牛盡其道而死故曰命楊氏亦曰不知謹疾則其疾有以致之而至者伯牛無是也故曰命矣夫此說於義理正當但就本文看說命矣夫較深聖人本意只是惜其死歎之曰命也若曰無可奈何而安之命爾方將問人之疾情意悽愴何暇問其盡道與否也況下文以為斯人有斯疾則以為不當有此疾也豈有上文稱其盡道而死下文復歎其不當疾而疾文勢亦不相聯屬謝氏同尹氏謹嚴先生曰此說非是更思之幹賢哉回也章問顏子不改其樂莫是樂箇貧否曰顏子私欲克盡故樂卻不是專樂箇貧須知他不干貧事元自有箇樂始得時舉伯豐問顏子之樂不是外面別有甚事可樂只顏子平日所學之事是矣見得既分明又無私意於其間自然而樂是否曰顏子見得既盡行之又順便有樂底滋味問顏子樂處恐是工夫做到這地位則私意脫落天理洞然有箇樂處否曰未到他地位則如何便能知得他樂處且要得就他實下工夫處做下梢亦須會到他樂時節宇叔器問顏子樂處莫是樂天知命而不以貧窶纍其心否曰也不干那樂天知命事這四字也拈不上淳録云又加卻樂天知命四字加此四字又壞了這樂顏子胸中自有樂地雖在貧窶之中而不以纍其心不是將那不以貧窶纍其心底做樂義剛問這樂正如不如樂之者之樂曰那說從樂天知命上去底固不是了這說從不如樂之上來底也不知那樂是樂箇甚麼物事樂字只一般但要人識得這須是去做工夫涵養得久自然見得因言通書數句論樂處也好明道曰百官萬務金革百萬之衆曲肱飲水樂亦在其中觀它有扈游山詩是甚麼次第陳安卿云它那日也未甚有年曰也是有箇見成底樂義剛淳録此下云樂只是恁地樂更不用解只去做工夫到那田地自知道讀一小集見李偲祭明道文謂明道當初欲著樂書而不及因笑曰既是樂何用書說甚問顏子之樂只是天地間至富至貴底道理樂去求之否曰非也此以下未可便知須是窮究萬理要極徹已而曰程子謂將這身來放在萬物中一例看大小大快活又謂人於天地間並無窒礙大小大快活此便是顏子樂處這道理在天地間須是直窮到底至纖至悉十分透徹無有不盡則於萬物為一無所窒礙胸中泰然豈有不樂淳問顏子不改其樂是私欲既去一心之中渾是天理流行無有止息此乃至富至貴之理舉天下之物無以尚之豈不大有可樂曰周子所謂至富至貴乃是對貧賤而言今引此說恐淺只是私欲未去如口之於味耳之於聲皆是欲得其欲即是私欲反為所纍何足樂若不得其欲只管求之於心亦不樂惟是私欲既去天理流行動靜語默日用之間無非天理胸中廓然豈不可樂此與貧窶自不相干故不以此而害其樂直卿云與浩然之氣如何曰也是此意但浩然之氣說得較粗又問說樂道便不是是如何曰才說樂道只是冒罩說不曾說得親切又云伊川所謂其字當玩味是如何曰是元有此樂又云見其大則心泰周子何故就見上說曰見便是識此味南升問不改其樂與樂在其中矣二者輕重如何曰不要去孔顏身上問只去自家身上討敬仲以下論孔顏之樂恭父問孔顏之分固不同其所樂處莫只一般否曰聖人都忘了身只有箇道理若顏子猶照管在恪行夫問不改其樂曰顏子先自有此樂到貧處亦不足以改之曰夫子自言疏食飲水樂在其中其樂只一般否曰雖同此樂然顏子未免有意到聖人則自然賀孫子善謂夫子之樂雖在飯疏食飲水之中而忘其樂顏子不以簞瓢陋巷改其樂是外其簞瓢陋巷曰孔顏之樂大綱相似難就此分淺深唯是顏子止說不改其樂聖人卻云樂亦在其中不改字上恐與聖人略不相似亦只爭些子聖人自然是樂顏子僅能不改如云得與不失得是得了若說不失亦只是得但說不失則僅能不失耳終不似得字是得得隱此亦有內外賓主之意或問與不違仁如何曰僅能不違賀孫呈回也不改其樂與樂在其中矣一段問目先生曰說得雖巧然子細看來不須如此分亦得向見張欽夫亦要如此說某謂不必如此所謂樂之深淺乃在不改上面所謂不改便是方能免得改未如聖人從來安然譬之病人方得無病比之從來安樂者便自不同如此看其深淺乃好時舉叔器問不改其樂與不能改其樂如何分曰不改其樂者僅能不改其樂而已不能改其樂者是自家有此樂它無奈自家何以此見得聖賢地位某嘗謂明道之言初見便好轉看轉好伊川之言初看似未甚好久看方好某作六先生贊伯恭云伊川贊尤好蓋某是當初見得箇意思恁地所謂布帛之文菽粟之味知德者希孰識其貴也被伯恭看得好又云伯恭欽夫二人使至今不死大段光明義剛聖人之樂且粗言之人之生各具此理但是人不見此理這裏都黑窣窣地如貓子狗兒相似飢便求食困便思睡一得富貴便極聲色之娛窮四體之奉一遇貧賤則憂戚無聊所謂樂者非其所可樂所謂憂者非其所可憂也聖人之心直是表裏精粗無不昭徹方其有所思都是這裏流出所謂德盛仁熟從心所欲不踰矩莊子所謂人貌而天蓋形骸雖是人其實是一塊天理又焉得而不樂又曰聖人便是一片赤骨立底天理顏子早是有箇物包裹了但其皮薄剝去容易聖人一為指出這是天理這是人欲他便洞然都得了夔孫問顏子樂處曰顏子之樂亦如曾點之樂但孔子只說顏子是恁地樂曾點卻說許多樂底事來點之樂淺近而易見顏子之樂深微而難知點只是見得如此顏子是工夫到那裏了從本原上看方得賜顏子之樂平淡曾點之樂已勞攘了至邵康節云真樂攻心不奈何樂得大段顛蹶或曰顏子之樂只是心有這道理便樂否曰不須如此說且就實處做工夫學蒙問自有其樂之自字曰自字對簞瓢陋巷言言簞瓢陋巷非可樂蓋自有其樂耳節集注問周子令程子尋顏子所樂何事而周子程子終不言不審先生以為所樂何事曰人之所以不樂者有私意耳克己之私則樂矣節問程子云周茂叔令尋顏子仲尼樂處所樂何事竊意孔顏之學固非若世俗之著於物者但以為孔顏之樂在於樂道則是孔顏與道終為二物要之孔顏之樂只是私意淨盡天理照融自然無一毫繫纍耳曰然但今人說樂道說得來淺了要之說樂道亦無害道夫曰觀周子之問其為學者甚切曰然頃之復曰程子云人能克己則心廣體胖仰不愧俯不怍其樂可知有息則餒矣道夫問濂溪教程子尋孔顏樂處蓋自有其樂然求之亦甚難曰先賢到樂處已自成就向上去了非初學所能求況今之師非濂溪之師所謂友者非二程之友所以說此事卻似莽廣不如且就聖賢著實用工處求之如克己復禮致謹於視聽言動之間久久自當純熟充達向上去宇義剛說程子曰周子每令求顏子樂處所樂何事夫天理之流行無一毫間斷無一息停止大而天地之變化小而品彙之消息微而一心之運用廣而六合之彌綸渾融通貫只是這一箇物事顏子博文約禮工夫縝密從此做去便能尋得箇意脈至於竭盡其才一旦豁然貫通見得這箇物事分明只在面前其樂自有不能已者曰也不要說得似有一箇物事樣道是箇公共底道理不成真箇有一箇物事在那裏被我見得只是這箇道理萬事萬物皆是理但是安頓不能得恰好而今顏子便是向前見不得底今見得向前做不得底今做得所以樂不是說把這一箇物事來恁地快活義剛堯卿問不改其樂注克己復禮改作博文約禮如何曰說博文時和前一段都包得克己復禮便只是約禮事今若是不博文時便要去約也如何約得住義剛問叔器看文字如何曰兩日方思量顏子樂處先生疾言曰不用思量他只是博我以文約我以禮後見得那天理分明日用間義理純熟後不被那人欲來苦楚自恁地快活你而今只去博文約禮便自見得今卻去索之於杳冥無朕之際你去何處討將次思量得人成病而今一部論語說得恁分明自不用思量只要著實去用工如前日所說人心道心便只是這兩事只去臨時思量那箇是人心那箇是道心便顏子也只是使得人心聽命於道心後不被人心勝了道心你而今便須是常揀擇教精使道心常常在裏面如箇主人人心如客樣常常如此無間斷則便能允執厥中義剛鮮于侁言顏子以道為樂想侁必未識道是箇何物且如此莽莽對故伊川答之如此必大集義問昔鄒道卿論伊川所見極高處以為鮮于侁問於伊川曰顏子不改其樂不知所樂者何事伊川曰尋常道顏子所樂者何事曰不過說顏子所樂者道伊川曰若有道可樂便不是顏子豈非顏子工夫至到道體渾然與之為一顏子之至樂自默存於心人見顏子之不改其樂而顏子不自知也曰正謂世之談經者往往有前所說之病本卑而抗之使高本淺而鑿之使深本近而推之使遠本明而必使之至於晦且如伊尹耕於有莘之野由是以樂堯舜之道未嘗以樂道為淺也直謂顏子為樂道有何不可蓋卿或問程先生不取樂道之說恐是以道為樂猶與道為二物否曰不消如此說且說不是樂道是樂箇甚底說他不是又未可為十分不是但只是他語拙說得來頭撞公更添說與道為二物愈不好了而今且只存得這意思須是更子細看自理會得方得燾去僞録云謂非以道為樂到底所樂只是道非道與我為二物但熟後便樂也問伊川謂使顏子而樂道不足為顏子如何曰樂道之言不失只是說得不精切故如此告之今便以為無道可樂走作了問鄒侍郎聞此謂吾今始識伊川面已入禪去曰大抵多被如此看因舉張思叔問子在川上曰便是無窮伊川曰如何一箇無窮便了得他曰無窮之言固是但為渠道出不親切故以為不可可學劉黻問伊川以為若以道為樂不足為顏子又卻云顏子所樂者仁而已不知道與仁何辨曰非是樂仁唯仁故能樂爾是他有這仁日用間無些私意故能樂也而今卻不要如此論須求他所以能不改其樂者是如何緣能非禮勿視非禮勿聽非禮勿言非禮勿動這四事做得實頭工夫透自然至此問程子謂使顏子以道為樂則非顏子通書顏子章又卻似言以道為樂曰顏子之樂非是自家有箇道至富至貴只管把來弄後樂見得這道理後自然樂故曰見其大則心泰心泰則無不足無不足則富貴貧賤處之一也節問明道曰簞瓢陋巷非可樂蓋自有其樂耳其字當玩味自有深意伊川曰顏子之樂非樂簞瓢陋巷也不以貧窶纍其心而改其所樂也故夫子稱其賢又曰天下有至樂惟反身者得之而極天下之欲不與存焉又曰顏子簞瓢非樂也忘也呂氏曰禮樂悅心之至不知貧賤富貴可為吾之憂樂右第十章八說今從明道伊川呂氏之說明道第二說伊川第二第三第七說范氏說皆是推說於本文未甚密伊川第四說答鮮于侁曰使顏子以道為樂而樂之則非顏子矣竊意伊川之說謂顏子與道為一矣若以道為可樂則二矣不知然否謝氏曰回也心不與物交故無所欲不與物交恐說太深游氏用伊川說楊氏之說亦穩但無甚緊要發明處尹氏謂不以衆人之所憂改其樂不如伊川作不以貧窶纍其心而改其所樂蓋聖人本意在簞瓢陋巷上見得顏子賢處人不堪其憂特輔一句伊川之說乃其本意而尹氏乃取其輔句說顏子賢處未甚緊曰所論答鮮于侁語大概得之而未子細更就實事上看心不與物交非謂太深蓋無此理雖大聖人之心亦不能不交物也幹
