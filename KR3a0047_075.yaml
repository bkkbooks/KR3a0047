body:
  text: 朱子語類卷第七十五易十一上繫下聖人有以見天下之賾賾字在説文曰雜亂也古無此字只是嘖字今從賾亦是口之義言天下之至賾而不可惡雖是雜亂聖人卻於雜亂中見其不雜亂之理便與下句天下之至動而不可亂相對天下之至賾與左傳嘖有煩言之嘖同那箇從口這箇從是箇口裏説話多雜亂底意思所以下面説不可惡若喚做好字不應説箇可惡字也探賾索隱若與人説話時也須聽他雜亂説將出來底方可索他那隱底淵淳録云本從口是喧鬧意從旁亦然聖人有以見天下之賾正是説畫卦之初聖人見陰陽變化便畫出一畫有一箇象只管生去自不同六十四卦各是一樣更生到千以上卦亦自各一樣學蒙擬諸其形容未便是説那水火風雷之形容方擬這卦看是甚形容始去象那物之宜而名之一陽在二陰之下則象以雷一陰在二陽之下則象以風擬是比度之意學蒙問擬諸其形容者比度陰陽之形容蓋聖人見陰陽變化雜亂於是比度其形容而象其物宜是故謂之象曰也是如此嘗得郭子和書云其先人云不獨是天地風雷水火山澤謂之象只是畫卦便是象也説得好學蒙問聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻曰象言卦也下截言爻也會通者觀衆理之會而擇其通者而行且如有一事關著許多道理也有父子之倫也有君臣之倫也有夫婦之倫若是父子重則就父子行將去而他有不暇計若君臣重則行君臣之義而他不暇計若父子之恩重則便得身體髮膚受之父母不敢毀傷之義而委致其身之説不可行若君臣之義重則當委致其身而不敢毀傷之説不暇顧此之謂觀會通僩問聖人有以見天下之動是説文王周公否曰不知伏羲畫卦之初與連山歸藏有繫辭否為復一卦只是六畫學蒙問觀會通行其典禮是就會聚處尋一箇通路行將去否曰此是兩件會是觀衆理之會聚處如這一項君臣之道也有父子兄弟之道也有須是看得周遍始得通便是一箇通行底路都無窒礙典禮猶言常禮常法又曰禮便是節文升降揖遜是也但這箇禮字又説得闊凡事物之常理皆是學蒙一卦之中自有會通六爻又自各有會通且如屯卦初九在卦之下未可以進為屯之義乾坤始交而遇險陷亦屯之義似草穿地而未申亦屯之義凡此數義皆是屯之會聚處若盤桓利居貞便是一箇合行底便是他通處也學蒙觀會通以行其典禮會是衆理聚處雖覺得有許多難易窒礙必於其中卻得箇通底道理謂如庖丁解牛於族處卻批大郤導大窾此是於其筋骨叢聚之所得其可通之理故十九年刃若新發於硎且如事理間若不於會處理會卻只見得一偏便如何行得通須是於會處都理會其間卻自有箇通處便如脈理相似到得多處自然通貫得所以可行其典禮蓋會而不通便窒塞而不可行通而不會便不知許多曲直錯雜處問言天下之至賾而不可惡此是説天下之事物如此不是説卦上否曰卦亦如此三百八十四爻是多少雜亂學蒙言天下之至賾而不可惡也蓋雜亂處人易得厭惡然而這都是道理中合有底事自合理會故不可惡言天下之至動而不可亂也蓋動亦是合有底然上面各自有道理故自不可亂學蒙先生命二三子説書畢召蔡仲默及義剛語小子侍立先生顧義剛曰勞公教之不廢公讀書否曰不廢因借先生所點六經先生曰被人將去都無本了看公於句讀音訓也大段子細那言天下之至賾而不可惡也是音作去聲字是公以意讀作去聲曰只據東萊音訓讀此字有三音或音作入聲池録云或音亞或如字或烏路反先生笑曰便是他們好恁地強説仲默曰作去聲也似是先生曰據某看只作入聲亦是池録云烏路切於義為近説雖是如此勞攘事多然也不可以為惡池録云也不可厭惡而今音訓有全不可曉底若有兩三音底便著去裏面揀一箇較近底來解義剛池録略而異天下之至動事若未動時不見得道理是如何人平不語水平不流須是動方見得會通是會聚處典禮是借這般字來説觀他會通處卻求箇道理來區處他所謂卦爻之動便是法象這箇故曰爻也者效天下之動者也動亦未説事之動只是事到面前自家一念之動要求處置他便是動淵問擬之而後言議之而後動凡一言一動皆於易而擬議之否曰然擬之而後言議之而後動擬議以成其變化此變化只就人事説擬議只是裁度自家言動使合此理變易以從道之意如擬議得是便吉擬議未善則為凶矣謨問擬議以成其變化曰這變化就人動作處説如下所舉七爻皆變化也學履鳴鶴在陰其子和之我有好爵吾與爾縻之此本是説誠信感通之理夫子卻專以言行論之蓋誠信感通莫大於言行上文言天下之賾而不敢惡也言天下之動而不敢亂也先儒多以賾字為至妙之意若如此説則何以謂之不敢惡賾只是一箇雜亂冗鬧底意思言之而不惡者精粗本末無不盡也賾字與頤字相似此有互體之意此間連説互體失記鶴鳴好爵皆卦中有此象諸爻立象聖人必有所據非是白撰但今不可考耳到孔子方不説象如見豕負塗載鬼一車之類孔子只説群疑亡也便見得上面許多皆是狐惑可疑之事而已到後人解説便多牽強如十三卦中重門擊柝以待暴客只是豫備之意卻須待用互體推艮為門闕雷震乎外之意剡木為矢弦木為弧只為睽乖故有威天下之象亦必待穿鑿附會就卦中推出制器之義殊不知卦中但有此理而已故孔子各以蓋取諸某卦言之亦曰其大意云爾漢書所謂獲一角獸蓋麟云皆疑辭也謨問言行君子之樞機是言所發者至近而所應者甚遠否曰樞機便是鳴鶴在陰下面大概只説這意都不解著我有好爵二句學蒙其利斷金斷是斷做兩段又曰同人先號咷而後笑聖人卻恁地解學蒙右第八章卦雖八而數須十八是陰陽數十是五行數一陰一陽便是二以二乘二便是四以四乘四便是八五行本只是五而有是十者蓋一箇便包兩箇如木便包甲乙火便包丙丁土便包戊己金便包庚辛水便包壬癸所以為十學履五位相得而各有合是兩箇意一與二三與四五與六七與八九與十是奇耦以類相得一與六合二與七合三與八合四與九合五與十合是各有合在十干甲乙木丙丁火戊己土庚辛金壬癸水便是相得甲與己合乙與庚合丙與辛合丁與壬合戊與癸合是各有合學履所以成變化而行鬼神也先生舉程子云變化言功鬼神言用張子曰成行鬼神之氣而已數只是氣變化鬼神亦只是氣天地之數五十有五變化鬼神皆不越於其間大衍之數五十蓍之數五十蓍之籌乃其策也策中乘除之數則直謂之數耳淵大衍之數五十以天地之數五十有五除出金木水火土五數并天一便用四十九此一説也數家之説雖多不同某自謂此説卻分曉三天兩地則是已虛了天一之數便只用天三對地二又五是生數之極十是成數之極以五乘十亦是五十以十乘五亦是五十此一説也又數始於一成於五小衍之而成十大衍之而成五十此又是一説繫辭言蓍法大抵只是解其大略想別有文字今不可見但如天數五地數五此是舊文五位相得而各有合是孔子解文天數二十有五地數三十凡天地之數五十有五此是舊文此所以成變化而行鬼神此是孔子解文分而為二是本文以象兩是解挂一揲之以四歸奇於扐皆是本文以象三以象四時以象閏之類皆解文也乾之策二百一十有六坤之策百四十有四孔子則斷之以當期之日二篇之策萬有一千五百二十孔子則斷之以當萬物之數於此可見謨蓍卦當初聖人用之亦須有箇見成圖算後失其傳所僅存者只有這幾句大衍之數五十其用四十有九分而為二挂一揲之以四歸奇於扐只有這幾句如以象兩以象三以象四時以象閏已是添入許多字説他了又曰元亨利貞仁義禮智金木水火春夏秋冬將這四箇只管涵泳玩味儘好賀孫揲蓍法不得見古人全文如今底一半是解一半是説如分而為二是説以象兩便是解想得古人無這許多解須別有箇全文説淵挂一歲右揲二歲扐三歲一閏也左揲四歲扐五歲再閏也人傑揲蓍雖是一小事自孔子來千五百年人都理會不得唐時人説得雖有病痛大體理會得是近來説得太乖自郭子和始奇者揲之餘為奇扐者歸其餘扐於二指之中今子和反以挂一為奇而以揲之餘為扐又不用老少只用三十六三十二二十八二十四為策數以為聖人從來只説陰陽不曾説老少不知他既無老少則七八九六皆無用又何以為卦又曰龜為卜策為筮策是餘數厲録云策是條數謂之策他只胡亂説策字厲録云只鶻突説了或問他既如此説則再扐而後挂之説何如曰他以第一揲扐為扐第二第三揲不挂為扐第四揲又挂然如此則無五年再閏厲録云則是六年再閏也如某已前排真箇是五年再閏聖人下字皆有義挂者挂也扐者勒於二指之中也賀孫厲録小異二篇之策當萬物之數不是萬物盡於此數只是取象自一而萬以萬數來當萬物之數耳策數云者凡手中之數皆是如散策於君前有誅龜策弊則埋之不可以既揲餘數不為策數也四營而成易易字只是箇變字四度經營方成一變若説易之一變卻不可這處未下得卦字亦未下得爻字只下得易字淵引而伸之觸類而長之是占得一卦則就上面推看如乾則推其為圜為君為父之類是也學履問顯道神德行曰道較微妙無形影因卦辭説出來道這是吉這是凶這可為這不可為德行是人做底事因數推出來方知得這不是人硬恁地做都是神之所為也又曰須知得是天理合如此學蒙神德行是説人事那粗做底只是人為若決之於鬼神德行便神淵易惟其顯道神德行故能與人酬酢而佑助夫神化之功也學履顯道神德行是故可與酬酢可與佑神矣此是説蓍卦之用道理因此顯著德行是人事卻由取決於蓍既知吉凶便可以酬酢事變神又豈能自説吉凶與人因有易後方著見便是易來佑助神也右第九章易有聖人之道四至精至變則合做兩箇是他裏面各有這箇淵問以言者尚其辭以言是取其言以明理斷事如論語上舉不恆其德或承之羞否曰是學履問以言以動以制器以卜筮這以字是指以易而言否曰然又問辭占是一類變象是一類所以下文至精合辭占説至變合變象説曰然占與辭是一類者曉得辭方能知得占若與人説話曉得他言語方見得他胸中底蘊變是事之始象是事之已形者故亦是一類也學履用之問以制器者尚其象曰這都難説蓋取諸離蓋字便是一箇半間半界底字如取諸離取諸益不是先有見乎離而後為網罟先有見乎益而後為耒耜聖人亦只是見魚鱉之屬欲有以取之遂做一箇物事去攔截他欲得耕種見地土硬遂做一箇物事去剔起他卻合於離之象合於益之意又曰有取其象者有取其意者賀孫問以卜筮者尚其占卜用龜亦使易占否曰不用則是文勢如此學履問君子將有為也將有行也問焉而以言其受命也如響曰此是説君子作事問於蓍龜也問焉以言人以蓍問易求其卦爻之辭而以之發言處事受命如響則易受人之命如響之應聲以決未來吉凶也去偽問焉而以言曰若以上下文推之以言卻是命筮之詞古人亦大段重這命筮之辭而以言三字義若拗若作以易言之如所謂不恆其德或承之羞則不占只是以其言之義又於上下文不順學蒙謨録云言是命龜受命龜受命也參伍以變錯綜其數參謂三數之伍謂伍數之揲蓍本無三數五數之法只言交互參考皆有自然之數如三三為九五六三十之類雖不用以揲蓍而推算變通未嘗不用錯者有迭相為用之意綜又有總而挈之之意如織者之綜絲也謨參伍是相牽連之意如三要做五須用添二五要做六須著添一做三須著減二錯綜是兩樣錯是往來交錯之義綜如織底綜一箇上去一箇下來陽上去做陰陰下來做陽如綜相似淵問參伍以變錯綜其數曰荀子説參伍處楊倞解之為詳漢書所謂欲問馬先問牛參伍之以得其實綜如織綜之綜大抵陰陽奇耦變化無窮天下之事不出諸此成天下之文者若卦爻之陳列變態者是也定天下之象者物象皆有定理只以經綸天下之事也人傑問參伍以變先生云既三以數之又五以數之譬之三十錢以三數之看得幾箇三了又以五數之看得幾箇五兩數相合方可看得箇成數曰是如此又問不獨是以數算大概只是參合底意思如趙廣漢欲問馬先問牛便只是以彼數來參此數否曰是卻是恁地數了又恁地數也是將這箇去比那箇又曰若是他數猶可湊三與五兩數自是參差不齊所以舉以為言如這箇是三箇將五來比又多兩箇這箇是五箇將三來比又少兩箇兵家謂窺敵制變欲伍以參今欲窺敵人之事教一人探來恁地説又差一箇探來若説得不同便將這兩説相參看如何以求其實所以謂之欲伍以參學履參伍以變參字音曹參之參猶言參互底意思譬猶幾箇物事在這邊逐三箇數看是幾箇又逐五箇數看是幾箇又曰若三箇兩是六箇便多了一箇三箇三是九箇又少一箇三箇四又是十二箇也未是三箇五方是十五箇大略如此更須仔細去看學蒙錯綜其數本義云錯者交而互之一左一右之謂也莫是揲蓍以左揲右右揲左否曰不特如此乾對坤坎對離自是交錯又問綜者總而挈之莫是合挂扐之數否曰且以七八九六明之六七八九便是次序然而七是陽六壓他不得便當挨上七生八八生九九又須挨上便是一低一昂學蒙手指畫六五指七四指八三指九二指或問經緯錯綜之義曰錯是往來底綜是上下底綜便是織機上底古人下這字極子細但看他那單用處都有箇道理如經綸底字綸是兩條絲相合各有條理凡用綸處便是倫理底義統字是上面垂一箇物事下來下面有一箇人接著便謂之統但看垂字便可見又曰錯綜其數便只是七八九六六對九七對八便是東西相錯六上生七為陽九下生八為陰元本云七下生八為陰八上生九又為陽便是上下為綜又曰古人做易其巧不可言太陽數九少陰數八少陽數七太陰數六初亦不知其數如何恁地元來只是十數太陽居一除了本身便是九箇少陰居二除了本身便是八箇少陽居三除了本身便是七箇太陰居四除了本身便是六箇這處古來都不曾有人見得義剛寂然不動感而遂通天下之故與窮理盡性以至於命本是説易不是説人諸家皆是借來就人上説亦通閎祖感而遂通感著他卦卦便應他如人來問底善便與説善來問底惡便與説惡所以先儒説道潔淨精微這般句説得有些意思淵陳厚之問寂然不動感而遂通曰寂然是體感是用當其寂然時理固在此必感而後發如仁感為惻隱未感時只是仁義感為羞惡未感時只是義某問胡氏説此多指心作已發曰便是錯了縱使已發感之體固在所謂動中未嘗不靜如此則流行發見而常卓然不可移今只指作已發一齊無本了終日只得奔波急迫大錯了可學易便有那深有那幾聖人用這底來極出那深研出那幾研是研摩到底之意詩書禮樂皆是説那已有底事惟是易説那未有這事研幾是不待他顯著只在那茫昧時都處置了深是幽深通是開通所以閉塞只為他淺若是深後便能開通人志道理若淺如何開通得人所謂通天下之志亦只似説開物相似所以下一句也説箇成務易是説那未有底六十四卦皆是如此淵深就心上説幾就事上説幾便是有那事了雖是微畢竟有件事深在心甚玄奧幾在事半微半顯通天下之志猶言開物開通其閉塞故其下對成務淵極出那深故能通天下之志研出那幾故能成天下之務淵問惟深也惟幾惟神也此是説聖人如此否曰是説聖人亦是易如此若不深如何能通得天下之志又曰他恁黑窣窣地深疑若不可測然其中卻事事有又曰事事都有箇端緒可尋又曰有路脈線索在裏面所以曰惟幾也故能成天下之務研者便是研窮他或問幾曰便是周子所謂動而未形有無之間者也學蒙問繫辭言惟深也故能通天下之志又言以通天下之志此二通字乃所以通達天下之心志使之通曉如所謂開物之意曰然這般些小道理更無窮問極深研幾深幾二字如何曰研幾是研磨出那幾微處且如一箇卦在這裏便有吉有凶有悔有吝幾微毫釐處都研磨出來問如何是極深曰要人都曉得至深難見底道理都就易中見得問如所謂幽明之故死生之説鬼神之情狀之類否曰然問如此説則正與本義所謂所以極深者至精也所以研幾者至變也正相發明曰然幹右第十章問易開物成務冒天下之道是易之理能恁地而人以之卜筮又能開物成務否曰然學蒙開物成務冒天下之道讀繫辭須見得如何是開物如何是成務又如何是冒天下之道須要就卦中一一見得許多道理然後可讀繫辭也蓋易之為書因卜筮以設教逐爻開示吉凶包括無遺如將天下許多道理包藏在其中故曰冒天下之道如利用為大作一爻象只曰下不厚事也自此推之則凡居下者不當厚事如子於父臣之於君僚屬之於官長皆不可以踰分越職縱可為亦須是盡善方能無過所以有元吉無咎之戒繫辭自大衍數以下皆是説卜筮事若不曉他盡是説爻變中道理則如所謂動靜不居周流六虛之類有何憑著今人説易所以不將卜筮為主者只是慊怕小卻這道理故憑虛失實茫昧臆度而已殊不知由卜筮而推則上通鬼神下通事物精及於無形粗及於有象如包罩在此隨取隨得居則觀其象而玩其辭動則觀其變而玩其占者又不待卜而後見只是體察便自見吉凶之理聖人作易無不示戒乾卦才説元亨便説利貞坤卦才説元亨便説利牝馬之貞大畜乾陽在下為艮所畜三得上應又畜極必通故曰良馬逐可謂通快矣然必艱難貞正又且曰間輿衛然後利有攸往設若恃良馬之壯而忘艱貞之戒則必不利矣乾之九三君子終日乾乾固是好事然必曰夕惕若厲然後無咎也凡讀易而能句句體驗每存兢栗戒慎之意則於己為有益不然亦空言爾謨是故聖人以通天下之志以定天下之業以斷天下之疑此只是説蓍龜若不是蓍龜如何通之定之斷之到蓍之德圓而神以下卻是從源頭説而未是説卜筮蓋聖人之心具此易三德故渾然是此道理不勞作用一毫之私便是洗心即退藏於密所謂密者只是他人自無可捉摸他處便是寂然不動吉凶與民同患神以知來知以藏往皆具此道理但未用之蓍龜故曰古之聰明睿知神武而不殺者夫此言只是譬喻如聖人已具此理卻不犯手耳明於天之道以下方説蓍龜乃是發用處是興神物以前民用聖人既具此理又將此理復就蓍龜上發明出來使民亦得前知而用之也聖人以此齋戒以神明其德德即聖人之德又即卜筮齋戒以神明之聖人自有此理亦用蓍龜之理以神明之蓍之德圓而神卦之德方以知六爻之義易以貢蓍與卦以德言爻以義言只是具這道理在此而已故聖人以此洗心退藏於密以此洗心者心中渾然此理別無他物退藏於密只是未見於用所謂寂然不動也下文説神以知來便是以蓍之德知來知以藏往便是以卦之德藏往洗心退藏言體知來藏往言用然亦只言體用具矣而未及使出來處到下文是興神物以前民用方發揮許多道理以盡見於用也然前段必結之以聰明睿知神武而不殺者只是譬喻蓍龜雖未用而神靈之理具在猶武是殺人底事聖人卻存此神武而不殺也謨六爻之義易以貢今解貢字只得以告人説但神知字重貢字輕卻曉不得學蒙易以貢是變易以告人聖人以此洗心退藏於密是以那易來洗濯自家心了更沒些私意小智在裏許聖人便似那易了不假蓍龜而知卜筮所以説神武而不殺這是他有那神以知來知以藏往又説箇齋戒以神明其德皆是得其理不假其物淵前面一截説易之理未是説到蓍卦卜筮處後面方説卜筮聖人之心渾只是圓神方知易貢三箇物事更無別物一似洗得來淨潔了前面此字指易之理言武是殺底物事神武卻不殺便如易是卜筮底物事這箇卻方是説他理未到那用處到下面是以明於天之道方是説卜筮淵以此洗心都只是道理聖人此心虛明自然具衆理潔靜精微只是不犯手卦爻許多不是安排對副與人看是甚人來自然撞著易如此聖人也如此所以説箇蓍之德卦之德神明其德淵聖人以此洗心注云洗萬物之心若聖人之意果如此何不直言以此洗萬物之心乎大抵觀聖賢之言只作自己作文看如本説洗萬物之心卻止云洗心於心安乎人傑退藏於密時固是不用這物事吉凶與民同患也不用這物事用神而不用蓍用知而不用卦全不犯手退藏於密是不用事時到他用事也不犯手事未到時先安排在這裏了事到時恁地來恁地應淵退藏於密密是主靜處萬化出焉者動中之靜固是靜又有大靜萬化森然者方神以知來知以藏往一卦之中凡爻卦所載聖人所已言者皆具已見底道理便是藏往占得此卦因此道理以推未來之事便是知來聖人以此洗心一段聖人胸中都無纖毫私意都不假卜筮只是以易之理洗心其未感物也湛然純一都無一毫之纍更無些迹所謂退藏於密也及其吉凶與民同患卻神以知來知以藏往是誰人會恁地非古人聰明睿知神武而不殺者不能如此神武不殺者聖人於天下自是所當者摧所向者伏然而他都不費手腳又曰他都不犯手這便是神武不殺又曰神以知來如明鏡然物事來都看見知以藏往只是見在有底事他都識得又曰都藏得在這裏又曰如揲蓍然當其未揲也都不知揲下來底是陰是陽是老是少便是知來底意思及其成卦了則事都絣定在上面了便是藏往下文所以云是以明於天之道察於民之故設為卜筮以為民之鄉導故只是事聖人於此又以卜筮而齋戒以神明其德顯道神德行之神字便似這神字猶言吉凶陰若有神明之相相似這都不是自家做得卻若神之所為又曰這都只退聽於鬼神又曰聖人於卜筮其齋戒之心虛靜純一戒慎恐懼只退聽於鬼神學蒙古之聰明睿知神武而不殺者夫如譬喻説相似人傑聖人明於天之道而察於民之故是興神物以前民用蓋聖人見得天道人事都是這道理蓍龜之靈都包得盡於是作為卜筮使人因卜筮知得道理都在這裏面問明於天之道而察於民之故天之道便是民之故否曰論得到極處固只是一箇道理看時須做兩處看方看得周匝無虧欠處問天之道只是福善禍淫之類否曰如陰陽變化春何為而生秋何為而殺夏何為而暑冬何為而寒皆要理會得問民之故如君臣父子之類是否曰凡民生日用皆是若只理會得民之故卻理會不得天之道便即民之故亦未是在到得極時固只是一理要之須是都看得周匝始得幹是興神物以前民用此言有以開民使民皆知前時民皆昏塞吉凶利害是非都不知因這箇開了便能如神明然此便是神明其德又云民用之則神明民德聖人用之則自神明其德蓍之德以下三句是未涉於用聖人以此洗心是得此三者之理而不假其物這箇是有那神以知來知以藏往淵明道愛舉聖人以此齋戒以神明其德夫一句雖不是本文意思要之意思自好因再舉之幹問此恐是君子篤恭而天下平之意曰否只如上蔡所謂敬是常惺惺法又問此恐非是聖人分上事曰便是説道不是本文意思要之自好言畢再三誦之幹神明其德言卜筮尊敬也精明也方闔闢乾坤理與事皆如此書亦如此這箇只説理底意思多知禮成性橫渠説得別他道是聖人成得箇性衆人性而未成淵問闔戶之謂坤一段只是這一箇物以其闔謂之坤以其闢謂之乾以其闔闢謂之變以其不窮謂之通發見而未成形謂之象成形謂之器聖人修禮立教謂之法百姓日用則謂之神曰是如此又曰利用出入者便是人生日用都離他不得又曰民之於易隨取而各足易之於民周遍而不窮所以謂之神所謂活潑潑地便是這處學蒙太極中全是具一箇善若三百八十四爻中有善有惡皆陰陽變化以後方有賀孫周子康節説太極和陰陽滾説易中便抬起説周子言太極動而生陽靜而生陰如言太極動是陽動極而靜靜便是陰動時便是陽之太極靜時便是陰之太極蓋太極即在陰陽裏如易有太極是生兩儀則先從實理處説若論其生則俱生太極依舊在陰陽裏但言其次序須有這實理方始有陰陽也其理則一雖然自見在事物而觀之則陰陽函太極推其本則太極生陰陽學履問易有太極是生兩儀兩儀生四象四象生八卦曰此太極卻是為畫卦説當未畫卦前太極只是一箇渾淪底道理裏面包含陰陽剛柔奇耦無所不有及各畫一奇一耦便是生兩儀再於一奇畫上加一耦此是陽中之陰又於一奇畫上加一奇此是陽中之陽又於一耦畫上加一奇此是陰中之陽又於一耦畫上加一耦此是陰中之陰是謂四象所謂八卦者一象上有兩卦每象各添一奇一耦便是八卦嘗聞一朋友説一為儀二為象三為卦四為象如春夏秋冬金木水火東西南北無不可推矣謨去偽同明之問易有太極是生兩儀兩儀生四象四象生八卦曰易有太極便有箇陰陽出來陰陽便是兩儀儀匹也兩儀生四象便是一箇陰又生出一箇陽是一象也一箇陽又生一箇陰是一象也一箇陰又生一箇陰是一象也一箇陽又生一箇陽是一象也此謂四象四象生八卦是這四箇象生四陰時便成坎震坤兌四卦生四箇陽時便成巽離艮乾四卦震乾兌離震太極巽坎艮坤每卦變八卦為六十四卦端蒙易有太極便是下面兩儀四象八卦自三百八十四爻總為六十四自六十四總為八卦自八卦總為四象自四象總為兩儀自兩儀總為太極以物論之易之有太極如木之有根浮屠之有頂但木之根浮圖之頂是有形之極太極卻不是一物無方所頓放是無形之極故周子曰無極而太極是他説得有功處夫太極之所以為太極卻不離乎兩儀四象八卦如一陰一陽之謂道指一陰一陽為道則不可而道則不離乎陰陽也太極如一木生上分而為枝幹又分而生花生葉生生不窮到得成果子裏面又有生生不窮之理生將出去又是無限箇太極更無停息只是到成果實時又卻少歇不是止到這裏自合少止正所謂終始萬物莫盛乎艮艮止是生息之意賀孫以定天下之吉凶成天下之亹亹莫大乎蓍龜人到疑而不能自明處往往便放倒不復能向前動有疑阻既有卜筮知是吉是凶便自勉勉住不得其所以勉勉者是卜筮成之也右第十一章問書不盡言言不盡意一章曰立象盡意是觀奇耦兩畫包含變化無有窮盡設卦以盡情偽謂有一奇一耦設之於卦自是盡得天下情偽繫辭便斷其吉凶變而通之以盡利此言占得此卦陰陽老少交變因其變便有通之之理鼓之舞之以盡神未占得則有所疑既占則無所疑自然使得人腳輕手快行得順便如大衍之後言顯道神德行是故可與酬酢可與佑神定天下之吉凶成天下之亹亹皆是鼓之舞之之意乾坤其易之縕邪乾坤成列而易立乎其中這又是言立象以盡意設卦以盡情偽易不過只是一箇陰陽奇耦千變萬變則易之體立若奇耦不交變奇純是奇耦純是耦去那裏見易易不可見則陰陽奇耦之用亦何自而辨問在天地上如何曰關天地甚麼事此是説易不外奇耦兩物而已化而裁之謂之變推而行之謂之通這是兩截不相干化而裁之屬前項事謂漸漸化去裁制成變則謂之變推而行之屬後項事謂推而為別一卦了則通行無礙故為通舉而措之天下謂之事業便只是定天下之吉凶成天下之亹亹者極天下之賾者存乎卦謂卦體之中備陰陽變易之形容鼓天下之動者存乎辭是説出這天下之動如鼓之舞之相似卦即象也辭即爻也大抵易只是一箇陰陽奇耦而已此外更有何物神而明之一段卻是與形而上之道相對説自形而上謂之道説至於變通事業卻是自至約處説入至粗處去自極天下之賾者存乎卦説至於神而明之則又是由至粗説入至約處默而成之不言而信則説得又微矣學履問書不盡言言不盡意是聖人設問之辭曰也是如此亦是言不足以盡意故立象以盡意書不足以盡言故因繫辭以盡言又曰書不盡言言不盡意是元舊有此語又曰立象以盡意不獨見聖人有這意思寫出來自是他象上有這意設卦以盡情偽不成聖人有情又有偽自是卦上有這情偽但今曉不得他那處是偽如下云中心疑者其辭支誣善之人其辭遊也不知如何是支是遊不知那卦上見得沈思久之曰看來情偽只是箇好不好如剝五陰只是要害一箇陽這是不好底情便是偽如復如臨便是好底卦便是真情學蒙問立象設卦繫辭是聖人發其精意見於書變通鼓舞是聖人推而見於事否曰是學蒙變而通之以盡利鼓之舞之以盡神立象設卦繫辭皆為卜筮之用而天下之人方知所以避凶趨吉奮然有所興作不知手之舞之足之蹈之之意故曰定天下之吉凶成天下之亹亹者莫大乎蓍龜猶催迫天下之人勉之為善相似謨問變而通之如禮樂刑政皆天理之自然聖人但因而為之品節防範以為教於天下鼓之舞之蓋有以作興振起之使之遷善而不自知否曰鼓之舞之便無所用力自是聖人教化如此又曰政教皆有鼓舞但樂占得分數較多自是樂會如此而不自知因舉橫渠云云巫其舞之盡神者巫從工兩邊人字是取象其舞巫者託神如舞雩之類皆須舞蓋以通暢其和氣達於神明問鼓之舞之以盡神又言鼓天下之動者存乎辭鼓舞恐只是振揚發明底意思否曰然蓋提撕警覺使人各為其所當為也如初九當潛則鼓之以勿用九二當見則鼓之以利見大人若無辭則都發不出了幹鼓之舞之以盡神鼓舞有發動之意亦只如成天下之亹亹之義鼓天下之動者存乎辭是因易之辭而知吉凶後如此乾坤其易之縕向論衣敝縕袍縕是綿絮胎今看此縕字正是如此取義易是包著此理乾坤即是易之體骨耳人傑録云縕如縕袍之縕是箇胎骨子問乾坤其易之縕曰縕是袍中之胎骨子乾坤成列便是乾一兌二離三震四巽五坎六艮七坤八都成列了其變易方立其中若只是一陰一陽則未有變易在又曰有這卦則有變易無這卦便無這易了又曰易有太極則以易為主此一段文意則以乾坤為主學蒙乾坤成列易立乎其中矣乾坤只是説二卦此易只是説易之書與天地定位易行乎其中之易不同行乎其中者卻是説易之道理問乾坤成列而易立乎其中是説兩畫之列是説八卦之列曰兩畫也是列八卦也是列六十四卦也是列學蒙問天地設位而易行乎其中乾坤成列而易立乎其中如易行乎其中此固易曉至如易立乎其中豈非乾坤既成列之後道體始有所寓而形見其立也有似如有所立卓爾之立乎曰大抵易之言乾坤者多以卦言易立乎其中只是乾坤之卦既成而易立矣況所謂如有所立卓爾亦只是不可及之意後世之論多是説得太高不必如此説蓋卿乾坤毀此乾坤只言卦方乾坤毀則無以見易易只是陰陽卦畫沒這幾箇卦畫憑箇甚寫出那陰陽造化何處更得易來這只是反覆説易不可見則乾坤或幾乎息只是説揲蓍求卦更推不去説做造化之理息也得不若前説較平淵易不可見則乾坤或幾乎息矣易體也乾坤健順用也方形是這形質以上便為道以下便為器這箇分別得最親切故明道云惟此語截得上下最分明又曰形以上底虛渾是道理形以下底實便是器淵問形而上下如何以形言曰此言最的當設若以有形無形言之便是物與理相間斷了所以謂截得分明者只是上下之間分別得一箇界止分明器亦道道亦器有分別而不相離也謨形而上者謂之道形而下者謂之器道是道理事事物物皆有箇道理器是形迹事事物物亦皆有箇形迹有道須有器有器須有道物必有則賀孫形而上謂道形而下謂器這箇在人看始得指器為道固不得離器於道亦不得且如此火是器自有道在裏夔孫形而上者指理而言形而下者指事物而言事事物物皆有其理事物可見而其理難知即事即物便要見得此理只是如此看但要真實於事物上見得這箇道理然後於己有益為人君止於仁為人子止於孝必須就君臣父子上見得此理大學之道不曰窮理而謂之格物只是使人就實處窮竟事事物物上有許多道理窮之不可不盡也謨伊川云形而上者謂之道形而下者謂之器須著如此説曰這是伊川見得分明故云須著如此説形而上者是理形而下者是物如此開説方見分明如此了方説得道不離乎器器不遺乎道處如為君須止於仁這是道理合如此為人臣止於敬為人子止於孝為人父止於慈這是道理合如此今人不解恁地説便不索性兩邊説怎生説得通賀孫問如何分形器曰形而上者是理才有作用便是形而下者問陰陽如何是形而下者曰一物便有陰陽寒暖生殺皆見得是形而下者事物雖大皆形而下者堯舜之事業是也理雖小皆形而上者祖道形而上者謂之道一段只是這一箇道理但即形器之本體而離乎形器則謂之道就形器而言則謂之器聖人因其自然化而裁之則謂之變推而行之則謂之通舉而措之則謂之事業裁也行也措也都只是裁行措這箇道曰是問化而裁之謂之變曰化是漸漸移將去截斷處便是變且如一日是化三十日截斷做一月便是變又曰最是律管長短可見胡泳化而裁之化是因其自然而化裁是人為變是變了他且如一年三百六十日須待一日日漸次進去到那滿時這便是化自春而夏夏而秋秋而冬聖人去這裏截做四時這便是變化不是一日內便頓然恁地底事人之進德亦如此三十而立不是到那三十時便立須從十五志學漸漸化去方到橫渠去這裏説做化而裁之便是這意柔變而趨於剛剛化而趨於柔與這箇意思也只一般自陰來做陽其勢浸長便覺突兀有頭面自陽去做陰這只是漸漸消化去這變化之義亦與鬼神屈伸意相似淵方子録云陽化而為陰只恁消縮去無痕迹故謂之化陰變而為陽其勢浸長便覺突兀有頭面故謂之變變化二者不同化是漸化如自子至亥漸漸消化以至於無如自今日至來日則謂之變變是頓斷有可見處橫渠説化而裁之一段好橫渠説化而裁之謂之變一句説得好不知本義中有否曰無但尋常看此一句只如自初九之潛而為九二之見這便是化就他化處截斷便是變曰然化是箇亹亹地去有漸底意思且如而今天氣漸漸地涼將去到得立秋便截斷這已後是秋便是變問如此則裁之乃人事也曰然幹問化而裁之謂之變又云存乎變是如何曰上文化而裁之便喚做變下文是説變處見得化而裁之如自初一至三十日便是化到這三十日裁斷做一月明日便屬後月便是變此便是化而裁之到這處方見得學履化而裁之存乎變只在那化中裁截取便是變如子丑寅卯十二時皆以漸而化不見其化之之迹及亥後子時便截取是屬明日所謂變也僩化而裁之存乎變推而行之存乎通裁是裁截之義謂如一歲裁為四時一時裁為三月一月裁為三十日一日裁為十二時此是變也又如陰陽兩爻自此之彼自彼之此若不截斷則豈有定體通是通其變將已裁定者而推行之即是通謂如占得乾之履便是九三乾乾不息則是我所行者以此而措之於民則謂之事業也化而裁之方是分下頭項推而行之便是見於事如堯典分命羲和許多事便是化而裁之到敬授人時便是推而行之學履問易中多言變通通字之意如何曰處得恰好處便是通問往來不窮謂之通如何曰處得好便不窮通便不窮不通便窮問推而行之謂之通如何曰推而行之便就這上行將去且如亢龍有悔是不通了處得來無悔便是通變是就時就事上説通是就上面處得行處説故曰通其變只要常教流通不窮問如貧賤富貴夷狄患難這是變行乎富貴行乎貧賤行乎夷狄行乎患難至於無入而不自得便是通否曰然幹右第十二章
