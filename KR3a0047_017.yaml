body:
  text: 朱子語類卷第十七大學四或問上經一章或問吾子以為大人之學一段問友仁看大學或問如何曰粗曉其義曰如何是收其放心養其德性曰放心者或心起邪思意有妄念耳聽邪言目觀亂色口談不道之言至於手足動之不以禮皆是放也收者便於邪思妄念處截斷不續至於耳目言動皆然此乃謂之收既能收其放心德性自然養得不是收放心之外又養箇德性也曰看得也好友仁問或問以七年之病求三年之艾非百倍其功不足以致之人於已失學後須如此勉強奮勵方得曰失時而後學必著如此趲補得前許多缺闕處人一能之己百之人十能之己千之若不如是悠悠度日一日不做得一日工夫只見沒長進如何要填補前面賀孫持敬以補小學之闕小學且是拘檢住身心到後來克己復禮又是一段事德明問大學首云明德而不曾說主敬莫是已具於小學曰固然自小學不傳伊川卻是帶補一敬字可學敬字是徹頭徹尾工夫自格物致知至治國平天下皆不外此人傑問或問說敬處曰四句不須分析只做一句看次日又曰夜來說敬不須只管解說但整齊嚴肅便是敬散亂不收斂便是不敬四句只行著皆是敬燾或問大學論敬所引諸說有內外之分曰不必分內外都只一般只恁行著都是敬僩問敬諸先生之說各不同然總而行之常令此心常存是否曰其實只一般若是敬時自然主一無適自然整齊嚴肅自然常惺惺其心收斂不容一物但程子整齊嚴肅與謝氏尹氏之說又更分曉履孫或問先生說敬處舉伊川主一與整齊嚴肅之說與謝氏常惺惺之說就其中看謝氏尤切當曰如某所見伊川說得切當且如整齊嚴肅此心便存便能惺惺若無整齊嚴肅卻要惺惺恐無捉摸不能常惺惺矣人傑問或問舉伊川及謝氏尹氏之說只是一意說敬曰主一無適又說箇整齊嚴肅整齊嚴肅亦只是主一無適意且自看整齊嚴肅時如何這裏便敬常惺惺也便是敬收斂此心不容一物也便是敬此事最易見試自體察看便見只是要教心下常如此因說到放心如惻隱羞惡是非辭遜是正心才差去便是放若整齊嚴肅便有惻隱羞惡是非辭遜某看來四海九州無遠無近人人心都是放心也無一箇不放如小兒子才有智識此心便放了這裏便要講學存養賀孫光祖問主一無適與整齊嚴肅不同否曰如何有兩樣只是箇敬極而至於堯舜也只常常是箇敬若語言不同自是那時就那事說自應如此且如大學論語孟子中庸都說敬詩也書也禮也亦都說敬各就那事上說得改頭換面要之只是箇敬又曰或人問出門使民時是敬未出門使民時是如何伊川答此儼若思時也要知這兩句只是箇毋不敬又須要問未出門使民時是如何這又何用問這自可見如未出門使民時是這箇敬當出門使民時也只是這箇敬到得出門使民了也只是如此論語如此樣儘有最不可如此看賀孫或問整齊嚴肅與嚴威儼恪之別曰只一般整齊嚴肅雖非敬然所以為敬也嚴威儼恪亦是如此燾問上蔡說敬者常惺惺法也此說極精切曰不如程子整齊嚴肅之說為好蓋人能如此其心即在此便惺惺未有外面整齊嚴肅而內不惺惺者如人一時間外面整齊嚴肅便一時惺惺一時放寬了便昏怠也祖道曰此箇是氣須是氣清明時便整齊嚴肅昏時便放過了如何捉得定曰志者氣之帥也此只當責志孟子曰持其志毋暴其氣若能持其志氣自清明或曰程子曰學者為習所奪氣所勝只可責志又曰只這箇也是私學者不恁地不得此說如何曰涉於人為便是私但學者不如此如何著力此程子所以下面便放一句云不如此不得也祖道因看涪陵記善録問和靖說敬就整齊嚴肅上做上蔡卻云是惺惺法二者如何厚之云先由和靖之說方到上蔡地位曰各有法門和靖是持守上蔡卻不要如此常要喚得醒要之和靖底是上蔡底橫渠曰易曰敬以直內伊川云主一卻與和靖同大抵敬有二有未發有已發所謂毋不敬事思敬是也曰雖是有二然但一本只是見於動靜有異學者須要常流通無間又如和靖之說固好但不知集義又卻缺工夫曰亦是渠才氣去不得只得如此大抵有體無用便不渾全又問南軒說敬常云義已森然於其中曰渠好如此說如仁智動靜之類皆然可學問謝氏惺惺之說曰惺惺乃心不昏昧之謂只此便是敬今人說敬卻只以整齊嚴肅言之此固是敬然心若昏昧燭理不明雖強把捉豈得為敬又問孟子告子不動心曰孟子是明理合義告子只是硬把捉砥或問謝氏常惺惺之說佛氏亦有此語曰其喚醒此心則同而其為道則異吾儒喚醒此心欲他照管許多道理佛氏則空喚醒在此無所作為其異處在此僩問和靖說其心收斂不容一物曰這心都不著一物便收斂他上文云今人入神祠當那時直是更不著得些子事只有箇恭敬此最親切今人若能專一此心便收斂緊密都無些子空罅若這事思量未了又走做那邊去心便成兩路賀孫問尹氏其心收斂不容一物之說曰心主這一事不為他事所亂便是不容一物也問此只是說靜時氣象否曰然又問只靜時主敬便是必有事否曰然僩此篇所謂在明明德一段問或問說仁義禮智之性添健順字如何曰此健順只是那陰陽之性義剛問健順仁義禮智之性曰此承上文陰陽五行而言健陽也順陰也四者五行也分而言之仁禮屬陽義智屬陰問立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義仁何以屬陰曰仁何嘗屬陰袁機仲正來爭辨他引君子於仁也柔於義也剛為證殊不知論仁之定體則自屬陽至於論君子之學則又各自就地頭說如何拘文牽引得今只觀天地之化草木發生自是條暢洞達無所窒礙此便是陽剛之氣如云采薇采薇薇亦陽止薇亦剛止蓋薇之生也挺直而上此處皆可見問禮屬陽至樂記則又以禮屬陰樂屬陽曰固是若對樂說則自是如此蓋禮是箇限定裁節粲然有文底物事樂是和動底物事自當如此分如云禮主其減樂主其盈之類推之可見僩問健順在四端何屬曰仁與禮屬陽義與智屬陰問小學詩書禮樂以造士注云禮陰也曰此以文明言彼以節制言問禮智是束斂底意思故屬陰否曰然或問智未見束斂處曰義猶略有作為智一知便了愈是束斂孟子曰是非之心智也才知得是而愛非而惡便交過仁義去了胡泳問陰陽五行健順五常之性曰健是稟得那陽之氣順是稟得那陰之氣五常是稟得五行之理人物皆稟得健順五常之性且如狗子會咬人底便是稟得那健底性不咬人底是稟得那順底性又如草木直底硬底是稟得剛底軟底弱底是稟得那順底僩問或問氣之正且通者為人氣之偏且塞者為物如何曰物之生必因氣之聚而後有形得其清者為人得其濁者為物假如大爐鎔鐵其好者在一處其渣滓又在一處又問氣則有清濁而理則一同如何曰固是如此理者如一寶珠在聖賢則如置在清水中其輝光自然發見在愚不肖者如置在濁水中須是澄去泥沙則光方可見今人所以不見理合澄去泥沙此所以須要克治也至如萬物亦有此理天何嘗不將此理與他只為氣昏塞如置寶珠於濁泥中不復可見然物類中亦有知君臣母子知祭知時者亦是其中有一線明處然而不能如人者只為他不能克治耳且蚤虱亦有知如飢則噬人之類是也祖道問或問云於其正且通者之中又或不能無清濁之異故其所賦之質又有智愚賢不肖之殊世間有人聰明通曉是稟其氣之清者矣然卻所為過差或流而為小人之歸者又有為人賢而不甚聰明通曉是如何曰或問中固已言之所謂又有智愚賢不肖之殊是也蓋其所賦之質便有此四樣聰明曉事者智也而或不賢便是稟賦中缺了清和溫恭之德又有人極溫和而不甚曉事便是賢而不智為學便是要克化教此等氣質令恰好耳僩舜功問序引參天地事如何曰初言人之所以異於禽獸者至下須是見己之所以參化育者又問此是到處如何曰到大有地步在但學者須先知其如此方可以下手今學者多言待發見處下手此已遲卻才思要得善時便是善可學問或問自其有生之初以下是一節顧人心稟受之初又必皆有以得乎陰陽五行之氣以下是一節苟於是焉而不值其清明純粹之會這又轉一節下又轉入一節物欲去是否曰初間說人人同得之理次又說人人同受之氣然其間卻有撞著不好底氣以生者這便被他拘滯了要變化卻難問如何是不好底氣曰天地之氣有清有濁若值得晦暗昏濁底氣這便稟受得不好了既是如此又加以應接事物逐逐於利欲故本來明德只管昏塞了故大學必教人如此用工到後來卻會復得初頭渾全底道理賀孫林安卿問介然之頃一有覺焉則其本體已洞然矣須是就這些覺處便致知充擴將去曰然昨日固已言之如擊石之火只是些子才引著便可以燎原若必欲等大覺了方去格物致知如何等得這般時節林先引或問中至於久而後有覺之語為比先生因及此那箇覺是物格知至了大徹悟到恁地時事都了若是介然之覺一日之間其發也無時無數只要人識認得操持充養將去又問真知之知與久而後有覺之覺字同否曰大略也相似只是各自所指不同真知是知得真箇如此不只是聽得人說便喚做知覺則是忽然心中自有所覺悟曉得道理是如此人只有兩般心一箇是是底心一箇是不是底心只是才知得這是箇不是底心只這知得不是底心底心便是是底心便將這知得不是底心去治那不是底心知得不是底心便是主那不是底心便是客便將這箇做主去治那箇客便常守定這箇知得不是底心做主莫要放失更那別討箇心來喚做是底心如非禮勿視聽言動只才知得這箇是非禮底心此便是禮底心便莫要視如人瞌睡方其睡時固無所覺莫教才醒便抖擻起精神莫要更教他睡此便是醒不是已醒了更別去討箇醒說如何得他不睡程子所謂以心使心便是如此人多疑是兩箇心不知只是將這知得不是底心去治那不是底心而已元思云上蔡所謂人須是識其真心方乍見孺子入井之時其怵惕惻隱之心乃真心也曰孟子亦是只討譬喻就這親切處說仁之心是如此欲人易曉若論此心發見無時而不發見不特見孺子之時為然也若必待見孺子入井之時怵惕惻隱之發而後用功則終身無緣有此等時節也元思云舊見五峰答彪居仁書說齊王易牛之心云云先生辨之正是此意曰然齊王之良心想得也常有發見時只是常時發見時不曾識得都放過了偶然愛牛之心有言語說出所以孟子因而以此推廣之也又問自非物欲昏蔽之極未有不醒覺者曰便是物欲昏蔽之極也無時不醒覺只是醒覺了自放過去不曾存得耳僩友仁說明明德此明德乃是人本有之物只為氣稟與物欲所蔽而昏今學問進修便如磨鏡相似鏡本明被塵垢昏之用磨擦之工其明始現及其現也乃本然之明耳曰公說甚善但此理不比磨鏡之法先生略抬身露開兩手如閃出之狀曰忽然閃出這光明來不待磨而後現但人不自察耳如孺子將入於井不拘君子小人皆有怵惕惻隱之心便可見友仁云或問中說是以雖其昏蔽之極而介然之頃一有覺焉則即此空隙之中而其本體已洞然便是這箇道理先生頷之曰於大原處不差正好進修友仁問或問所以明而新之者非可以私意苟且為也私意是說著不得人為苟且是說至善曰才苟且如何會到極處賀孫舉程子義理精微之極曰大抵至善只是極好處十分端正恰好無一毫不是處無一毫不到處且如事君必當如舜之所以事堯而後喚做敬治民必當如堯之所以治民而後喚做仁不獨如此凡事皆有箇極好處今之人多是理會得半截便道了待人看來喚做好也得喚做不好也得自家本不曾識得到少刻也會入於老也會入於佛也會入於申韓之刑名止緣初間不理會到十分少刻便沒理會那箇是白那箇是皂那箇是酸那箇是鹹故大學必使人從致知直截要理會透方做得不要恁地半間半界含含糊糊某與人商量一件事須是要徹底教盡若有些子未盡處如何住得若有事到手未是處須著極力辨別教是且看孟子那箇事恁地含糊放過有一字不是直爭到底這是他見得十分極至十分透徹如何不說得賀孫問或問說明德處云所以應乎事物之間莫不各有當然之則其說至善處又云所以見於日用之間者莫不各有本然一定之則二處相類何以別曰都一般至善只是明德極盡處至纖至悉無所不盡淳仁甫問以其義理精微之極有不可得而名者故姑以至善目之曰此是程先生說至善便如今人說極是且如說孝孟子說博奕好飲酒不顧父母之養此是不孝到得會奉養其親也似煞強得這箇又須著如曾子之養志而後為能養這又似好了又當如所謂先意承志諭父母於道不遺父母惡名使國人稱願道幸哉有子如此方好又云孝莫大於尊親其次能養直是到這裏方喚做極是處方喚做至善處賀孫郭德元問或問有不務明其明德而徒以政教法度為足以新民者又有自謂足以明其明德而不屑乎新民者又有略知二者之當務而不求止於至善之所在者此三者求之古今人物是有甚人相似曰如此等類甚多自謂能明其德而不屑乎新民者如佛老便是不務明其明德而以政教法度為足以新民者如管仲之徒便是略知明德新民而不求止於至善者如前日所論王通便是卓録云又有略知二者之當務顧乃安於小成因於近利而不求止於至善之所在者如前日所論王通之事是也看他於己分上亦甚修飭其論為治本末亦有條理甚有志於斯世只是規模淺狹不曾就本原上著功便做不徹須是無所不用其極方始是看古之聖賢別無用心只這兩者是喫緊處明明德便欲無一毫私欲新民便欲人於事事物物上皆是當正如佛家說為此一大事因緣出見於世此亦是聖人一大事也千言萬語只是說這箇道理若還一日不扶持便倒了聖人只是常欲扶持這箇道理教他撐天柱地文蔚問明德而不能推之以新民可謂是自私曰德既明自然是能新民然亦有一種人不如此此便是釋老之學此箇道理人人有之不是自家可專獨之物既是明得此理須當推以及人使各明其德豈可說我自會了我自樂之不與人共因說曾有學佛者王天順與陸子靜辨論云我這佛法和耳目鼻口髓腦皆不愛惜要度天下人各成佛法豈得是自私先生笑曰待度得天下人各成佛法卻是教得他各各自私陸子靜從初亦學佛嘗言儒佛差處是義利之間某應曰此猶是第二著只它根本處便不是當初釋迦為太子時出遊見生老病死苦遂厭惡之入雪山修行從上一念便一切作空看惟恐割棄之不猛屏除之不盡吾儒卻不然蓋見得無一物不具此理無一理可違於物佛說萬理俱空吾儒說萬理俱實從此一差方有公私義利之不同今學佛者云識心見性不知是識何心是見何性德明知止而後有定以下一段問能知所止則方寸之間事事物物皆有定理矣曰定靜安三項若相似說出來煞不同有定是就事理上說言知得到時見事物上各各有箇合當底道理靜只就心上說問無所擇於地而安莫是素富貴行乎富貴素貧賤行乎貧賤否曰這段須看意思接續處如能得上面帶箇慮字能慮上面帶箇安字能安上面帶箇靜字能靜上面帶箇定字有定上面帶箇知止字意思都接續既見得事物有定理而此心恁地寧靜了看處在那裏在這裏也安在那邊也安在富貴也安在貧賤也安在患難也安不見事理底人有一件事如此區處不得恁地區處又不得這如何會有定才不定則心下便營營皇皇心下才恁地又安頓在那裏得看在何處只是不安賀孫能慮則隨事觀理極深研幾曰到這處又更須審一審慮字看來更重似思字聖人下得言語恁地鎮重恁地重三疊四不若今人只說一下便了此聖人所以為聖人賀孫安卿問知止是始能得是終或問言非有等級之相懸何也曰也不是無等級中間許多只是小階級無那大階級如志學至從心中間許多便是大階級步卻闊知止至能得只如志學至立相似立至不惑相似定靜安皆相類只是中間細分別恁地問到能得處是學之大成抑後面更有工夫曰在己已盡了更要去齊家治國平天下亦只是自此推去宇古之欲明明德於天下一段問或問自誠意以至於平天下所以求得夫至善而止之是能得已包齊家治國說了前晚何故又云能得後更要去齊家治國平天下曰以修身言之都已盡了但以明明德言之在己無所不盡萬物之理亦無所不盡如至誠惟能盡性只盡性時萬物之理都無不盡了故盡其性便盡人之性盡人之性便盡物之性宇蜚卿言或問云人皆有以明其明德則各誠其意各正其心各修其身各親其親各長其長而天下無不平矣明德之功果能若是不亦善乎然以堯舜之聖閨門之內或未盡化況謂天下之大能服堯舜之化而各明其德乎曰大學明明德於天下只是且說箇規模如此學者須是有如此規模卻是自家本來合如此不如此便是缺了他底且如伊尹思匹夫不被其澤如己推而納之溝中伊尹也只大概要恁地又如何使得無一人不被其澤又如說比屋可封也須有一家半家不恁地者只是見得自家規模自當如此不如此不得到得做不去處卻無可奈何規模自是著恁地工夫便卻用寸寸進若無規模次第只管去細碎處走便入世之計功謀利處去若有規模而又無細密工夫又只是一箇空規模外極規模之大內推至於事事物物處莫不盡其工夫此所以為聖賢之學道夫問或問心之神明妙衆理而宰萬物曰神是恁地精彩明是恁地光明又曰心無事時都不見到得應事接物便在這裏應事了又不見恁地神出鬼沒又曰理是定在這裏心便是運用這理底須是知得到知若不到欲為善也未肯便與你為善欲不為惡也未肯便不與你為惡知得到了直是如飢渴之於飲食而今不讀書時也須收斂身心教在這裏乃程夫子所謂敬也整齊嚴肅雖只是恁地須是下工夫方見得賀孫德元問何謂妙衆理曰大凡道理皆是我自有之物非從外得所謂知者或録此下云便只是理才知得便只是知得我底道理非是以我之知去知彼道理也道理固本有用知方發得出來若無知道理何從而見或録云才知得底便是自家先有之道理也只是無知則道無安頓處故須知然後道理有所湊泊也如夏熱冬寒君仁臣敬非知如何知得所以謂之妙衆理猶言能運用衆理也運用字有病故只下得妙字或録云蓋知得此理也又問知與思於身最切緊曰然二者只是一事知如手思是使那手去做事思所以用夫知也僩問知如何宰物曰無所知覺則不足以宰制萬物要宰制他也須是知覺道夫或問宰萬物是主宰之宰宰制之宰曰主便是宰宰便是制又問孟子集注言心者具衆理而應萬事此言妙衆理而宰萬物如何曰妙字便稍精彩但只是不甚穩當具字便平穩履孫郭兄問莫不有以知夫所以然之故與其所當然之則曰所以然之故即是更上面一層如君之所以仁蓋君是箇主腦人民土地皆屬它管它自是用仁愛試不仁愛看便行不得非是說為君了不得已用仁愛自是理合如此試以一家論之為家長者便用愛一家之人惜一家之物自是理合如此若天使之然每常思量著極好笑自那原頭來便如此了又如父之所以慈子之所以孝蓋父子本同一氣只是一人之身分成兩箇其恩愛相屬自有不期然而然者其它大倫皆然皆天理使之如此豈容強為哉且以仁言之只天地生這物時便有箇仁它只知生而已從他原頭下來自然有箇春夏秋冬金木水火土初有陰陽有陰陽便有此四者故賦於人物便有仁義禮智之性仁屬春屬木且看春間天地發生藹然和氣如草木萌芽初間僅一針許少間漸漸生長以至枝葉花實變化萬狀便可見他生生之意非仁愛何以如此緣他本原處有箇仁愛溫和之理如此所以發之於用自然慈祥惻隱孟子說惻隱之端惻隱又與慈仁不同惻隱是傷痛之切蓋仁本只有慈愛緣見孺子入井所以傷痛之切義屬金是天地自然有箇清峻剛烈之氣所以人稟得自然有裁制便自然有羞惡之心禮智皆然蓋自本原而已然非旋安排教如此也昔龜山問一學者當見孺子入井時其心怵惕惻隱何故如此學者曰自然如此龜山曰豈可只說自然如此了便休須是知其所自來則仁不遠矣龜山此語極好又或人問龜山曰以先知覺後知知覺如何分龜山曰知是知此事覺是覺此理且如知得君之仁臣之敬子之孝父之慈是知此事也又知得君之所以仁臣之所以敬父之所以慈子之所以孝是覺此理也僩或問格物章本有所以然之故曰後來看得且要見得所當然是要切處若果見得不容已處則自可默會矣治國平天下者諸侯之事一段問南軒謂為己者無所為而然也曰只是見得天下事皆我所合當為而為之非有所因而為之然所謂天下之事皆我之所當為者只恁地強信不得須是學到那田地經歷磨鍊多後方信得過道夫問為己曰這須要自看逐日之間小事大事只是道我合當做便如此做這便是無所為且如讀書只道自家合當如此讀合當如此理會身己才說要人知便是有所為如世上人才讀書便安排這箇好做時文此又為人之甚者賀孫為己者無所為而然無所為只是見得自家合當做不是要人道好如甲兵錢穀籩豆有司到當自家理會便理會不是為別人了理會如割股廬墓一則是不忍其親之病一則是不忍其親之死這都是為己若因要人知了去恁地便是為人器遠問子房以家世相韓故從少年結士欲為韓報仇這是有所為否曰他當初只一心欲為國報仇只見這是箇臣子合當做底事不是為別人不是要人知賀孫行夫問為己者無所為而然曰有所為者是為人也這須是見得天下之事實是己所當為非吾性分之外所能有然後為之而無為人之弊耳且如哭死而哀非為生者今人弔人之喪若以為亡者平日與吾善厚真箇可悼哭之發於中心此固出於自然者又有一般人欲亡者家人知我如此而哭者便不是這便是為人又如人做一件善事是自家自肯去做非待人教自家做方勉強做此便不是為人也道夫曰先生所說錢穀甲兵割股廬墓已甚分明在人所見如何爾又問割股一事如何曰割股固自不是若是誠心為之不求人知亦庶幾今有以此要譽者因舉一事為問先生詢究駭愕者久之乃始正色直辭曰只是自家過計了設使後來如何自家也未到得如此天下事惟其直而已試問鄉鄰自家平日是甚麼樣人官司推究亦自可見行夫曰亦著下獄使錢得箇費力去曰世上那解免得全不霑濕如先所說是不安於義理之慮若安於義理之慮但見義理之當為便恁滴水滴凍做去都無後來許多事道夫傳一章然則其曰克明德一段問克明德克能也或問中卻作能致其克之之功又似克治之克如何曰此克字雖訓能字然克字重於能字能字無力克字有力便見得是他人不能而文王獨能之若只作能明德語意便都弱了凡字有訓義一般而聲響頓異便見得有力無力之分如克之與能是也如云克宅厥心克明俊德之類可見僩顧諟天之明命一段問全體大用無時不發見於日用之間如何是體如何是用曰體與用不相離且如身是體要起行去便是用赤子匍匐將入井皆有怵惕惻隱之心只此一端體用便可見如喜怒哀樂是用所以喜怒哀樂是體淳録云所以能喜怒者便是體寓問或問常目在之真若見其參於前倚於衡也則成性存存而道義出矣不知所見者果何物耶曰此豈有物可見但是凡人不知省察常行日用每與是德相忘亦不自知其有是也今所謂顧諟者只是心裏常常存著此理在一出言則言必有當然之則不可失也一行事則事必有當然之則不可失也不過如此耳初豈實有一物可以見其形象耶壯祖問引成性存存道義出矣何如曰自天之所命謂之明命我這裏得之於己謂之明德只是一箇道理人只要存得這些在這裏才存得在這裏則事君必會忠事親必會孝見孺子則怵惕之心便發見穿窬之類則羞惡之心便發合恭敬處便自然會恭敬合辭遜處便自然會辭遜須要常存得此心則便見得此性發出底都是道理若不存得這些待做出那箇會合道理賀孫是三者固皆自明之事一段問顧諟一句或問復以為見天之未始不為人而人之未始不為天何也曰只是言人之性本無不善而其日用之間莫不有當然之則則所謂天理也人若每事做得是則便合天理天人本只一理若理會得此意則天何嘗大人何嘗小也壯祖問天未始不為人而人未始不為天曰天即人人即天人之始生得於天也既生此人則天又在人矣凡語言動作視聽皆天也只今說話天便在這裏顧諟是常要看教光明燦爛照在目前僩傳二章或問盤之有銘一段德元問湯之盤銘見於何書曰只見於大學又曰成湯工夫全是在敬字上看來大段是一箇修飭底人故當時人說他做工夫處亦說得大段地著如禹克勤于邦克儉于家之類卻是大綱說到湯便說檢身若不及文蔚云以義制事以禮制心不邇聲色不殖貨利等語可見日新之功曰固是某於或問中所以特地詳載者非道人不知亦欲學者經心耳文蔚問丹書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶從字意如何曰從順也敬便豎起怠便放倒以理從事是義不以理從事便是欲這處敬與義是箇體用亦猶坤卦說敬義宇傳三章復引淇澳之詩一段瑟兮僩兮者恂栗也僩字舊訓寬大某看經子所載或從熺或從鋒之不同然皆云有武毅之貌所以某注中直以武毅言之道夫云如此注則方與瑟字及下文恂栗之說相合曰且如恂字鄭氏讀為峻某始者言此只是恂恂如也之恂何必如此及讀莊子見所謂木處則惴栗恂懼然後知鄭氏之音為當如此等處某於或問中不及載也要之如這般處須是讀得書多然後方見得道夫問切磋琢磨是學者事而盛德至善或問乃指聖人言之何也曰後面說得來大非聖人不能此是連上文文王於緝熙敬止說然聖人也不是插手掉臂做到那處也須學始得如孔子所謂德之不修學之不講聞義不能徙不善不能改是吾憂也此有甚緊要聖人卻憂者何故惟其憂之所以為聖人所謂生而知之者便只是知得此而已故曰惟聖罔念作狂惟狂克念作聖淳寓同如切如磋者道學也如琢如磨者自修也既學而猶慮其未至則復講習討論以求之猶治骨角者既切而復磋之切得一箇朴在這裏似亦可矣又磋之使至於滑澤這是治骨角者之至善也既修而猶慮其未至則又省察克治以終之猶治玉石者既琢而復磨之琢是琢得一箇朴在這裏似亦得矣又磨之使至於精細這是治玉石之至善也取此而喻君子之於至善既格物以求知所止矣又且用力以求得其所止焉正心誠意便是道學自修瑟兮僩兮赫兮喧兮到這裏睟面盎背發見於外便是道學自修之驗也道夫云所以或問中有始終條理之別也良為此爾曰然道夫如切如磋道學也卻以為始條理之事如琢如磨自修也卻以為終條理之事皆是要工夫精密道學是起頭處自修是成就處中間工夫既講求又復講求既克治又復克治此所謂已精而求其益精已密而求其益密也謨周問切磋是始條理琢磨是終條理終條理較密否曰始終條理都要密講貫而益講貫修飭而益修飭淳問琢磨後更有瑟僩赫喧何故為終條理之事曰那不是做工夫處是成就了氣象恁地穆穆文王亦是氣象也宇
