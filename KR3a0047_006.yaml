body:
  text: 朱子語類卷第六性理三仁義禮智等名義道者兼體用該隱費而言也節以下道理道是統名理是細目可學道訓路大概説人所共由之路理各有條理界瓣因舉康節云夫道也者道也道無形行之則見於事矣如道路之道坦然使千億萬年行之人知其歸者也閎祖理是有條瓣逐一路子以各有條謂之理人所共由謂之道節問道與理如何分曰道便是路理是那文理問如木理相似曰是問如此卻似一般曰道字包得大理是道字裏面許多理脈又曰道字宏大理字精密胡泳問萬物粲然還同不同曰理只是這一箇道理則同其分不同君臣有君臣之理父子有父子之理節理者有條理仁義禮智皆有之節問既是一理又謂五常何也曰謂之一理亦可五理亦可以一包之則一分之則五問分為五之序曰渾然不可分節只是這箇理分做四段又分做八段又細碎分將去四段者意其為仁義禮智當時亦因言文路子之説而及此節理只是一箇理理舉著全無欠闕且如言著仁則都在仁上言著誠則都在誠上言著忠恕則都在忠恕上言著忠信則都在忠信上只為只是這箇道理自然血脈貫通端蒙理是有條理有文路子文路子當從那裏去自家也從那裏去文路子不從那裏去自家也不從那裏去須尋文路子在何處只挨著理了行節理如一把線相似有條理如這竹籃子相似指其上行篾曰一條子恁地去又別指一條曰一條恁地去又如竹木之文理相似直是一般理橫是一般理有心便存得許多理節季通云理有流行有對待先有流行後有對待曰難説先有後有季通舉太極説以為道理皆然且執其説人傑先生與人書中曰至微之理至著之事一以貫之節理無事則無所依附節問仁與道如何分別曰道是統言仁是一事如道路之道千枝百派皆有一路去故中庸分道德曰父子君臣以下為天下之達道智仁勇為天下之達德君有君之道臣有臣之道德便是箇行道底故為君主於仁為臣主於敬仁敬可喚做德不可喚做道幹以下兼論德至德至道道者人之所共由德者己之所獨得盛德至善盛德以身之所得而言至善以理之極致而言誠忠孚信一心之謂誠盡己之謂忠存於中之謂孚見於事之謂信端蒙存之於中謂理得之於心為德發見於行事為百行節德是得於天者講學而得之得自家本分底物事節問泛觀天地間日往月來寒往暑來四時行百物生這是道之用流行發見處即此而總言之其往來生化無一息間斷處便是道體否曰此體用説得是但總字未當總便成兼用説了只就那骨處便是體如水之或流或止或激成波浪是用即這水骨可流可止可激成波浪處便是體如這身是體目視耳聽手足運動處便是用如這手是體指之運動提掇處便是用淳舉論語集注曰往者過來者續無一息之停乃道體之本然也曰即是此意淳以下論體用問前夜説體用無定所是隨處説如此若合萬事為一大體用則如何曰體用也定見在底便是體後來生底便是用此身是體動作處便是用天是體萬物資始處便是用地是體萬物資生處便是用就陽言則陽是體陰是用就陰言則陰是體陽是用宇體是這箇道理用是他用處如耳聽目視自然如此是理也開眼看物著耳聽聲便是用江西人説箇虛空底體涉事物便喚做用節問先生昔曰禮是體今乃曰禮者天理之節文人事之儀則似非體而是用曰公江西有般鄉談才見分段子便説道是用不是體如説尺時無寸底是體有寸底不是體便是用如稱無星底是體有星底不是體便是用且如扇子有柄有骨子用紙糊此便是體人搖之便是用楊至之問體曰合當底是體節人只是合當做底便是體人做處便是用譬如此扇子有骨有柄用紙糊此則體也人搖之則用也如尺與稱相似上有分寸星銖則體也將去稱量物事則用也方子問去歲聞先生曰只是一箇道理其分不同所謂分者莫只是理一而其用不同如君之仁臣之敬子之孝父之慈與國人交之信之類是也曰其體已略不同君臣父子國人是體仁敬慈孝與信是用問體用皆異曰如這片板只是一箇道理這一路子恁地去那一路子恁地去如一所屋只是一箇道理有廳有堂如草木只是一箇道理有桃有李如這衆人只是一箇道理有張三有李四李四不可為張三張三不可為李四如陰陽西銘言理一分殊亦是如此又曰分得愈見不同愈見得理大節誠者實有此理節以下論誠誠只是實又云誠是理一作只是理去偽誠實理也亦誠愨也由漢以來專以誠愨言誠至程子乃以實理言後學皆棄誠愨之説不觀中庸亦有言實理為誠處亦有言誠愨為誠處不可只以實為誠而以誠愨為非誠也砥問性誠曰性是實誠是虛性是理底名誠是好處底名性譬如這扇子相似誠譬則這扇子做得好又曰五峰曰誠者命之道乎中者性之道乎仁者心之道乎此語分得輕重虛實處卻好某以為道字不若改做德字更親切道字又較疏植先生問諸友誠敬二字如何分各舉程子之説以對先生曰敬是不放肆底意思誠是不欺妄底意思過以下誠敬誠只是一箇實敬只是一箇畏端蒙妄誕欺詐為不誠怠惰放肆為不敬此誠敬之別幹問誠敬曰須逐處理會誠若是有不欺意處只做不欺意會敬若是有謹畏意處只做謹畏意會中庸説誠作中庸看孟子説誠處作孟子看將來自相發明耳夔孫謹字未如敬敬又未如誠程子曰主一之謂敬一者之謂誠敬尚是著力銖以下雜論問誠信之別曰誠是自然底實信是人做底實故曰誠者天之道這是聖人之信若衆人之信只可喚做信未可喚做誠誠是自然無妄之謂如水只是水火只是火仁徹底是仁義徹底是義夔孫叔器問誠與信如何分曰誠是箇自然之實信是箇人所為之實中庸説誠者天之道也便是誠若誠之者人之道也便是信信不足以盡誠猶愛不足以盡仁上是下不是可學誠者實有之理自然如此忠信以人言之須是人體出來方見端蒙誠字以心之全體而言忠字以其應事接物而言此義理之本名也至曾子所言忠恕則是聖人之事故其忠與誠仁與恕得通言之如恕本以推己及物得名在聖人則以己及物矣端蒙問仁與誠何別曰仁自是仁誠自是誠何消合理會理會這一件也看到極處理會那一件也看到極處便都自見得淳或問誠是體仁是用否曰理一也以其實有故謂之誠以其體言則有仁義禮智之實以其用言則有惻隱羞惡恭敬是非之實故曰五常百行非誠非也蓋無其實矣又安得有是名乎植或問誠是渾然不動仁是此理流出否曰自性言之仁亦未是流出但其生動之理包得四者問一與中與誠浩然之氣為一體事否曰一只是不雜不可將做一事中與誠與浩然之氣固是一事然其分各別誠是實有此理中是狀物之體段浩然之氣只是為氣而言去偽問仁義禮智誠中庸不知如何看曰仁義禮智乃未發之性所謂誠中庸皆已發之理人之性本實而釋氏以性為空也輝在天只是陰陽五行在人得之只是剛柔五常之德泳以下五常大而天地萬物小而起居食息皆太極陰陽之理也又曰仁木義金禮火智水信土祖道或問仁義禮智性之四德又添信字謂之五性如何曰信是誠實此四者實有是仁實有是義禮智皆然如五行之有土非土不足以載四者又如土於四時各寄王十八日或謂王於戊己然季夏乃土之本宮故尤王月令載中央土以此人傑問向蒙戒喻説仁意思云義禮智信上著不得又須見義禮智信上少不得方見得仁統五常之意大雅今以樹為喻夫樹之根固有生氣然貫徹首尾豈可謂幹與枝花與葉無生氣也曰固然只如四時春為仁有箇生意在夏則見其有箇亨通意在秋則見其有箇誠實意在冬則見其有箇貞固意在夏秋冬生意何嘗息本雖雕零生意則常存大抵天地間只一理隨其到處分許多名字出來四者於五行各有配惟信配土以見仁義禮智實有此理不是虛説又如乾四德元最重其次貞亦重以明終始之義非元則無以生非貞則無以終非終則無以為始不始則不能成終矣如此循環無窮此所謂大明終始也大雅得此生意以有生然後有禮智義信以先後言之則仁為先以大小言之則仁為大閎祖問先生以為一分為二二分為四四分為八又細分將去程子説性中只有仁義禮智四者而已只分到四便住何也曰周先生亦止分到五行住若要細分則如易樣分節以下仁義禮智嘗言仁義禮智而以手指畫扇中心曰只是一箇道理分為兩箇又橫畫一畫曰兩箇分為四箇又以手指逐一指所分為四箇處曰一箇是仁一箇是義一箇是禮一箇是智這四箇便是箇種子惻隱羞惡恭敬是非便是種子所生底苗節人只是此仁義禮智四種心如春夏秋冬千頭萬緒只是此四種心發出來銖吉甫問仁義禮智立名還有意義否曰説仁便有慈愛底意思説義便有剛果底意思聲音氣象自然如此直卿云六經中專言仁者包四端也言仁義而不言禮智者仁包禮義包智方子節同佐同仁與義是柔軟底禮智是堅實底仁義是頭禮智是尾一似説春秋冬夏相似仁義一作禮是陽底一截禮智一作義智是陰底一截淵方子録云仁義是發出來嫩底禮智是堅硬底問仁義禮智體用之別曰自陰陽上看下來仁禮屬陽義智屬陰仁禮是用義智是體春夏是陽秋冬是陰只將仁義説則春作夏長仁也秋斂冬藏義也若將仁義禮智説則春仁也夏禮也秋義也冬智也仁禮是敷施出來底義是肅殺果斷底智便是收藏底如人肚臟有許多事如何見得其智愈大其藏愈深正如易中道立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義解者多以仁為柔以義為剛非也卻是以仁為剛義為柔蓋仁是箇發出來了便硬而強義便是收斂向裏底外面見之便是柔僩仁禮屬陽義智屬陰袁機仲卻説義是剛底物合屬陽仁是柔底物合屬陰殊不知舒暢發達便是那剛底意思收斂藏縮便是那陰底意思他只念得於仁也柔於義也剛兩句便如此説殊不知正不如此又云以氣之呼吸言之則呼為陽吸為陰吸便是收斂底意鄉飲酒義云溫厚之氣盛於東南此天地之仁氣也嚴凝之氣盛於西北此天地之義氣也僩仁禮屬陽屬健義知屬陰屬順問義則截然有定分有收斂底意思自是屬陰順不知智如何解曰智更是截然更是收斂如知得是知得非知得便了更無作用不似仁義禮三者有作用智只是知得了便交付惻隱羞惡辭遜三者他那箇更收斂得快僩生底意思是仁殺底意思是義發見會通是禮收一作深藏不測是智節仁義禮智便是元亨利貞若春間不曾發生得到夏無緣得長秋冬亦無可收藏泳問元亨利貞有次第仁義禮智因發而感則無次第曰發時無次第生時有次第佐百行皆仁義禮智中出節仁義禮智性之大目皆是形而上者豈可分也人傑問仁得之最先蓋言仁具義禮智曰先有是生理三者由此推之可學仁渾淪言則渾淪都是一箇生意義禮智都是仁對言則仁與義禮智一般淳鄭問仁是生底意義禮智則如何曰天只是一元之氣春生時全見是生到夏長時也只是這底到秋來成遂也只是這底到冬天藏斂也只是這底仁義禮智割做四段一箇便是一箇渾淪看只是一箇淳問仁是天地之生氣義禮智又於其中分別然其初只是生氣故為全體曰然問肅殺之氣亦只是生氣曰不是二物只是斂些春夏秋冬亦只是一氣可學仁與智包得義與禮包不得方子仁所以包三者蓋義禮智皆是流動底物所以皆從仁上漸漸推出仁智元貞是終始之事這兩頭卻重如坎與震是始萬物終萬物處艮則是中間接續處味道問仁包義禮智惻隱包羞惡辭遜是非元包亨利貞春包夏秋冬以五行言之不知木如何包得火金水曰木是生氣有生氣然後物可得而生若無生氣則火金水皆無自而能生矣故木能包此三者仁義禮智性也性無形影可以摸索只是有這理耳惟情乃可得而見惻隱羞惡辭遜是非是也故孟子言性曰乃若其情則可以為善矣蓋性無形影惟情可見觀其發處既善則知其性之本善必矣時舉問孟子説仁義禮智義在第二太極圖以義配利則在第三曰禮是陽故曰亨仁義禮智猶言東西南北元亨利貞猶言東南西北一箇是對説一箇是從一邊説起夔孫四端猶四德逐一言之則各自為界限分而言之則仁義又是一大界限故曰仁人心也義人路也如乾文言既曰四德又曰乾元者始而亨者也利貞者性情也文蔚正淳言性之四端迭為賓主然仁智其總統也恭而無禮則勞是以禮為主也君子義以為質是以義為主也蓋四德未嘗相離遇事則迭見層出要在人默而識之曰説得是大雅學者疑問中謂就四德言之仁卻是動智卻是靜曰周子太極圖中是如此説又曰某前日答一朋友書云仁體剛而用柔義體柔而用剛人傑問仁義禮智四者皆一理舉仁則義禮智在其中舉義與禮則亦然如中庸言舜其大智也歟其下乃云好問好察邇言隱惡而揚善謂之仁亦可執其兩端用其中於民謂之義亦可然統言之只是發明智字故知理只是一理聖人特於盛處發明之爾曰理固是一貫謂之一理則又不必疑其多自一理散為萬事則燦然有條而不可亂逐事自有一理逐物自有一名各有攸當但當觀當理與不當理耳既當理後又何必就上更生疑大雅仁義禮智才去尋討他時便動了便不是本來底又曰心之所以會做許多蓋具得許多道理又曰何以見得有此四者因其惻隱知其有仁因其羞惡知其有義又曰伊川榖種之説最好又曰冬飲湯是宜飲湯夏飲水是宜飲水冬飲水夏飲湯便不宜人之所以羞惡者是觸著這宜如兩箇物事樣觸著宜便羞惡者是獨只是一事節末數語疑有脫誤仁字須兼義禮智看方看得出仁者仁之本體禮者仁之節文義者仁之斷制知者仁之分別猶春夏秋冬雖不同而同出於春春則生意之生也夏則生意之長也秋則生意之成冬則生意之藏也自四而兩兩而一則統之有宗會之有元故曰五行一陰陽陰陽一太極又曰仁為四端之首而智則能成始而成終猶元為四德之長然元不生於元而生於貞蓋天地之化不翕聚則不能發散也仁智交際之間乃萬化之機軸此理循環不窮吻合無間故不貞則無以為元也又曰貞而不固則非貞貞如板築之有幹不貞則無以為元又曰文言上四句説天德之自然下四句説人事之當然元者乃衆善之長也亨者乃嘉之會也嘉會猶言一齊好也會猶齊也言萬物至此通暢茂盛一齊皆好也利者義之和處也貞者乃事之楨幹也體仁足以長人以仁為體而溫厚慈愛之理由此發出也體猶所謂公而以人體之之體嘉會者嘉其所會也一一以禮文節之使之無不中節乃嘉其所會也利物足以和義義者事之宜也利物則合乎事之宜矣此句乃翻轉義字愈明白不利物則非義矣貞固以貞為骨子則堅定不可移易銖問仁曰將仁義禮智四字求又問仁是統體底否曰且理會義禮智令分明其空闕一處便是仁又曰看公時一般氣象如何私時一般氣象如何德明蜚卿問仁恐是生生不已之意人唯為私意所汨故生意不得流行克去己私則全體大用無時不流行矣曰此是衆人公共説底畢竟緊要處不知如何今要見仁字意思須將仁義禮智四者共看便見仁字分明如何是義如何是禮如何是智如何是仁便仁字自分明若只看仁字越看越不出曰仁字恐只是生意故其發而為惻隱為羞惡為辭遜為是非曰且只得就惻隱字上看道夫問先生嘗説仁字就初處看只是乍見孺子入井而怵惕惻隱之心蓋有不期然而然便是初處否曰恁地靠著他不得大抵人之德性上自有此四者意思仁便是箇溫和底意思義便是慘烈剛斷底意思禮便是宣著發揮底意思智便是箇收斂無痕迹底意思性中有此四者聖門卻只以求仁為急者緣仁卻是四者之先若常存得溫厚底意思在這裏到宣著發揮時便自然會宣著發揮到剛斷時便自然會剛斷到收斂時便自然會收斂若將別箇做主便都對副不著了此仁之所以包四者也問仁即性則性字可以言仁否曰性是統言性如人身仁是左手禮是右手義是左腳智是右腳蜚卿問仁包得四者謂手能包四支可乎曰且是譬喻如此手固不能包四支然人言手足亦須先手而後足言左右亦須先左而後右直卿問此恐如五行之木若不是先有箇木便亦自生下面四箇不得曰若無木便無火無火便無土無土便無金無金便無水道夫問向聞先生語學者五行不是相生合下有時都有如何曰此難説若會得底便自然不相悖喚做一齊有也得喚做相生也得便雖不是相生他氣亦自相灌注如人五臟固不曾有先後但其灌注時自有次序久之又曰仁字如人釀酒酒方微發時帶些溫氣便是仁到發到極熱時便是禮到得熟時便是義到得成酒後卻只與水一般便是智又如一日之間早間天氣清明便是仁午間極熱時便是禮晚下漸敘便是義到夜半全然收斂無些形迹時便是智只如此看甚分明道夫今日要識得仁之意思是如何聖賢説仁處最多那邊如彼説這邊如此説文義各不同看得箇意思定了將聖賢星散説體看處處皆是這意思初不相背始得集注説愛之理心之德愛是惻隱惻隱是情其理則謂之仁心之德德又只是愛謂之心之德卻是愛之本柄人之所以為人其理則天地之理其氣則天地之氣理無迹不可見故於氣觀之要識仁之意思是一箇渾然溫和之氣其氣則天地陽春之氣其理則天地生物之心今只就人身己上看有這意思是如何才有這意思便自恁地好便不恁地乾燥將此意看聖賢許多説仁處都只是這意告顏子以克己復禮克去己私以復於禮自然都是這意思這不是待人旋安排自是合下都有這箇渾全流行物事此意思才無私意間隔便自見得人與己一物與己一公道自流行須是如此看孔門弟子所問都只是問做工夫若是仁之體段意思也各各自理會得了今卻是這箇未曾理會得如何説要做工夫且如程先生云偏言則一事專言則包四者上云四德之元猶五常之仁恰似有一箇小小底仁有一箇大大底仁偏言則一事是小小底仁只做得仁之一事專言則包四者是大大底仁又是包得禮義智底若如此説是有兩樣仁不知仁只是一箇雖是偏言那許多道理也都在裏面雖是專言那許多道理也都在裏面致道云如春是生物之時已包得夏長秋成冬藏意思在曰春是生物之時到夏秋冬也只是這氣流注去但春則是方始生榮意思到夏便是結裏定了是這生意到後只漸老了賀孫曰如溫和之氣固是見得仁若就包四者意思看便自然有節文自然得宜自然明辨曰然賀孫或問論語言仁處曰理難見氣易見但就氣上看便見如看元亨利貞是也元亨利貞也難看且看春夏秋冬春時盡是溫厚之氣仁便是這般氣象夏秋冬雖不同皆是陽春生育之氣行乎其中故偏言則一事專言則包四者如知福州是這箇人此偏言也及專言之為九州安撫亦是這一箇人不是兩人也故明道謂義禮智皆仁也若見得此理則聖人言仁處或就人上説或就事上説皆是這一箇道理正叔云滿腔子是惻隱之心曰仁便是惻隱之母又曰若曉得此理便見得克己復禮私欲盡去便純是溫和沖粹之氣乃天地生物之心其餘人所以未仁者只是心中未有此氣象論語但云求仁之方者是其門人必嘗理會得此一箇道理今但問其求仁之方故夫子隨其人而告之趙致道云李先生云仁是天理之統體先生曰是南升疑與上條同聞仁有兩般有作為底有自然底看來人之生便自然如此不待作為如説父子欲其親君臣欲其義是他自會如此不待欲也父子自會親君臣自會義既自會恁地便活潑潑地便是仁因舉手中扇云只如搖扇熱時人自會恁地搖不是欲他搖孟子説乍見孺子入井時皆有怵惕惻隱之心最親切人心自是會如此不是內交要譽方如此大凡人心中皆有仁義禮智然元只是一物發用出來自然成四派如破梨相似破開成四片如東對著西便有南北相對仁對著義便有禮智相對以一歲言之便有寒暑以氣言之便有春夏秋冬以五行言之便有金木水火土且如陰陽之間儘有次第大寒後不成便熱須是且做箇春溫漸次到熱田地大熱後不成便寒須是且做箇秋敘漸次到寒田地所以仁義禮智自成四派各有界限仁流行到那田地時義處便成義禮智處便成禮智且如萬物收藏何嘗休了都有生意在裏面如穀種桃仁杏仁之類種著便生不是死物所以名之曰仁見得都是生意如春之生物夏是生物之盛秋是生意漸漸收斂冬是生意收藏又曰春夏是行進去秋冬是退後去正如人呵氣呵出時便熱吸入時便冷明作百行萬善固是都合著力然如何件件去理會得百行萬善總於五常五常又總於仁所以孔孟只教人求仁求仁只是主敬求放心若能如此道理便在這裏方子拱壽同學者須是求仁所謂求仁者不放此心聖人亦只教人求仁蓋仁義禮智四者仁足以包之若是存得仁自然頭頭做著不用逐事安排故曰苟志於仁矣無惡也今看大學亦要識此意所謂顧諟天之明命無他求其放心而已方子拱壽同問求仁曰看來仁字只是箇渾淪底道理如大學致知格物所以求仁也中庸博學審問慎思明辨力行亦所以求仁也又問諸先生皆令人去認仁必要人體認得這仁是甚物事曰而今別把仁做一物事認也不得羇説鶻突了亦不得燾或問存得此心便是仁曰且要存得此心不為私欲所勝遇事每每著精神照管不可隨物流去須要緊緊守著若常存得此心應事接物雖不中不遠思慮紛擾於中都是不能存此心此心不存合視處也不知視合聽處也不知聽或問莫在於敬否曰敬非別是一事常喚醒此心便是人每日只鶻鶻突突過了心都不曾收拾得在裏面又曰仁雖似有剛直意畢竟本是箇溫和之物但出來發用時有許多般須得是非辭遜斷制三者方成仁之事及至事定三者各退仁仍舊溫和緣是他本性如此人但見有是非節文斷制卻謂都是仁之本意則非也春本溫和故能生物所以説仁為春明作或曰存得此心即便是仁曰此句甚好但下面説合於心者為之不合於心者勿為卻又從義上去了不干仁事今且只以孟子仁人心也義人路也便見得仁義之別蓋仁是此心之德才存得此心即無不仁如説克己復禮亦只是要得私欲去後此心常存耳未説到行處也才説合於心者行之便侵過義人路底界分矣然義之所以能行卻是仁之用處學者須是此心常存方能審度事理而行其所當行也此孔門之學所以必以求仁為先蓋此是萬理之原萬事之本且要先識認得先存養得方有下手立腳處耳夫仁亦在乎熟之而已矣文蔚耳之德聰目之德明心之德仁且將這意去思量體認將愛之理在自家心上自體認思量便見得仁仁是箇溫和柔軟底物事老子説柔弱者生之徒堅強者死之徒見得自是看石頭上如何種物事出藹乎若春陽之溫泛乎若醴酒之醇此是形容仁底意思當來得於天者只是箇仁所以為心之全體卻自仁中分四界子一界子上是仁之仁一界子是仁之義一界子是仁之禮一界子是仁之智一箇物事四腳撑在裏面唯仁兼統之心裏只有此四物萬物萬事皆自此出天之春夏秋冬最分曉春生夏長秋收冬藏雖分四時然生意未嘗不貫縱雪霜之慘亦是生意以生字説仁生自是上一節事當來天地生我底意我而今須要自體認得試自看一箇物堅硬如頑石成甚物事此便是不仁試自看溫和柔軟時如何此所以孝悌為仁之本若如頑石更下種不得俗説硬心腸可以見硬心腸如何可以與他説話惻隱羞惡辭遜是非都是兩意惻是初頭子隱是痛羞是羞己之惡惡是惡人之惡辭在我遜在彼是非自分明才仁便生出禮所以仁配春禮配夏義是裁制到得智便了所以配秋配冬既認得仁如此分明到得做工夫須是克己復禮出門如見大賓使民如承大祭己所不欲勿施於人方是做工夫處先生令思仁字至第三夜方説前三條以後八條又連三四夜所説今依次第不敢移動泳仁兼義言者是言體專言仁者是兼體用而言節孔子説仁多説體孟子説仁多説用如克己復禮惻隱之心之類閎祖節同直卿云聖賢言仁有專指體而言者有包體用而言者先生曰仁對義禮智言之則為體專言之則兼體用此等處須人自看如何一一説得日日將來看久後須會見得佐周明作問仁曰聖賢説話有説自然道理處如仁人心是也有説做工夫處如克己復禮是也雉前輩教人求仁只説是淵深溫粹義理飽足幹仁在事若不於事上看如何見仁方做一方便事也是仁不殺一蟲也是仁三月不違也是仁節仁則固一一所以為仁言所以一者是仁也方熟底是仁生底是恕自然底是仁勉強底是恕無計較無睹當底是仁有計較有睹當底是恕道夫公在前恕在後中間是仁公了方能仁私便不能仁可學仁是愛底道理公是仁底道理故公則仁仁則愛端蒙公是仁之方法人身是仁之材料銖公卻是仁發處無公則仁行不得可學仁將公字體之及乎脫落了公字其活底是仁季通語方或問仁與公之別曰仁在內公在外又曰惟仁然後能公又曰仁是本有之理公是克己工夫極至處故惟仁然後能公理甚分明故程子曰公而以人體之則是克盡己私之後只就自身上看便見得仁也公不可謂之仁但公而無私便是仁敬不可謂之中但敬而無失便是中道夫無私以間之則公公則仁譬如水若一些子礙便成兩截須是打併了障塞便滔滔地去從周拱壽同做到私欲淨盡天理流行便是仁道夫余正叔嘗於先生前論仁曰仁是體道之全曰只是一箇渾然天理文蔚王景仁問仁曰無以為也須是試去屏疊了私欲然後子細體驗本心之德是甚氣象無徒講其文義而已也壯祖周明作謂私欲去則為仁曰謂私欲去後仁之體見則可謂私欲去後便為仁則不可譬如日月之光雲霧蔽之固是不見若謂雲霧去則便指為日月亦不可如水亦然沙石雜之固非水之本然然沙石去後自有所謂水者不可便謂無沙無石為水也雉余正叔謂無私欲是仁曰謂之無私欲然後仁則可謂無私便是仁則不可蓋惟無私欲而後仁始見如無所壅底而後水方行方叔曰與天地萬物為一體是仁曰無私是仁之前事與天地萬物為一體是仁之後事惟無私然後仁惟仁然後與天地萬物為一體要在二者之間識得畢竟仁是甚模樣欲曉得仁名義須并義禮智三字看欲真箇見得仁底模樣須是從克己復禮做工夫去今人説仁如糖皆道是甜不曾喫著不知甜是甚滋味聖人都不説破在學者以身體之而已矣閎祖或問仁當何訓曰不必須用一字訓但要曉得大意通透仁字説得廣處是全體惻隱慈愛底是説他本相高仁是根惻隱是萌芽親親仁民愛物便是推廣到枝葉處夔孫仁固有知覺喚知覺做仁卻不得閎祖以名義言之仁自是愛之體覺自是智之用本不相同但仁包四德苟仁矣安有不覺者乎道夫問以愛名仁是仁之迹以覺言仁是仁之端程子曰仁道難名惟公近之不可便以公為仁畢竟仁之全體如何識認克己復禮天下歸仁孟子所謂萬物皆備於我是仁之體否先生曰覺決不可以言仁雖足以知仁自屬智了愛分明是仁之迹浩曰惻隱是仁情之動處要識仁須是兼義禮智看有箇宜底意思是義有箇讓底意思是禮有箇別白底意思是智有箇愛底意思是仁仁是天理公是天理故伊川謂惟公近之又恐人滯著隨即曰不可便以公為仁萬物皆備固是仁然仁之得名卻不然浩曰二字可疑浩問先生答湖湘學者書以愛字言仁如何曰緣上蔡説得覺字太重便相似説禪問龜山卻推惻隱二字曰龜山言萬物與我為一云云説亦太寬問此還是仁之體否曰此不是仁之體卻是仁之量仁者固能覺謂覺為仁不可仁者固能與萬物為一謂萬物為一為仁亦不可譬如説屋不論屋是木做柱竹做壁卻只説屋如此大容得許多物如萬物為一只是説得仁之量因舉禪語是説得量邊事云云德明問程門以知覺言仁克齋記乃不取何也曰仁離愛不得上蔡諸公不把愛做仁他見伊川言博愛非仁也仁是性愛是情伊川也不是道愛不是仁若當初有人會問必説道愛是仁之情仁是愛之性如此方分曉惜門人只領那意便專以知覺言之於愛之説若將浼焉遂蹉過仁地位去説將仁更無安頓處見孺子匍匐將入井皆有怵惕惻隱之心這處見得親切聖賢言仁皆從這處説又問知覺亦有生意曰固是將知覺説來冷了覺在知上卻多只些小搭在仁邊仁是和底意然添一句又成一重須自看得便都理會得淳宇同余景思問仁之與心曰仁字是虛心字是實如水之必有冷冷字是虛水字是實心之於仁亦猶水之冷火之熱學者須當於此心未發時加涵養之功則所謂惻隱羞惡辭遜是非發而必中方其未發此心之體寂然不動無可分別且只恁混沌養將去若必察其所謂四者之端則既思便是已發道夫仁雞雛初生可憐意與之同意思鮮嫩天理著見一段意思可愛發出即皆是切脈同體説多不能記蓋非言語可喻也孟子便説箇樣子今不消理會樣子只如顏子學取孔子教人仁只要自尋得了後自知非言可喻只是天理當其私欲解剝天理自是完備只從生意上説仁其全體固是仁所謂專言之也又從而分則亦有仁義分言之仁今不可於名言上理會只是自到便有知得上蔡所謂飲食知味也方湖南學者説仁舊來都是深空説出一片頃見王日休解孟子云麒麟者獅子也仁本是惻隱溫厚底物事卻被他們説得抬虛打險瞪眉弩眼卻似説麒麟做獅子有吞伏百獸之狀蓋自知覺之説起之麒麟不食生肉不食生草獅子則百獸聞之而腦裂若説得本源則不犯仁字禪家曹洞有五位法固可笑以黑為正位白為偏位若説時只是形容箇黑白道理更不得犯黑白二字皆是要從心中流出不犯紙上語從周義便作宜字看洽不可執定隨他理去如此自家行之便是義節義是箇毅然説話如利刀著物季札義如利刀相似人傑録云似一柄快刀相似都割斷了許多牽絆祖道義如利刀相似胸中許多勞勞攘攘到此一齊割斷了聖賢雖千言萬語千頭萬項然一透都透如孟子言義伊川言敬都徹上徹下義字如一橫劍相似凡事物到前便兩分去君子義以為質義以為上義不食也義弗乘也精義入神以致用也是此義十分精熟用便見也克己復禮為仁善善惡惡為義驤仁義其體亦有先後節仁對義為體用仁自有仁之體用義又有義之體用伯羽趙致道問仁義體用動靜何如曰仁固為體義固為用然仁義各有體用各有動靜自詳細驗之賀孫仁義互為體用動靜仁之體本靜而其用則流行不窮義之用本動而其體則各止其所義之嚴肅即是仁底收斂淳以仁屬陽以義屬陰仁主發動而言義主收斂而言若揚子云於仁也柔於義也剛又自是一義便是這物事不可一定名之看他用處如何問於仁也柔於義也剛曰仁體柔而用剛義體剛而用柔銖曰此豈所謂陽根陰陰根陽邪曰然銖先生答叔重疑問曰仁體剛而用柔義體柔而用剛廣請曰自太極之動言之則仁為剛而義為柔自一物中陰陽言之則仁之用柔義之用剛曰也是如此仁便有箇流動發越之意然其用則慈柔義便有箇商量從宜之義然其用則決裂廣尋常人施恩惠底心便發得易當刑殺時此心便疑可見仁屬陽屬剛義屬陰屬柔直卿云即將舒斂二字看便見喜則舒怒則斂方子仁義如陰陽只是一氣陽是正長底氣陰是方消底氣仁便是方生底義義便是收回頭底仁要之仁未能盡得道體道則平鋪地散在裏仁固未能盡得然仁卻是足以該道之體若識得陽便識得陰識得仁便識得義識得一箇便曉得其餘箇道夫問義者仁之質曰義有裁制割斷意是把定處便發出許多仁來如非禮勿視聽言動便是把定處一日克己復禮天下歸仁便是流行處淳問孟子以惻隱為仁之端羞惡為義之端周子曰愛曰仁宜曰義然以其存於心者而言則惻隱與愛固為仁心之發然羞惡乃就恥不義上反説而非直指義之端也宜字乃是就事物上説不知義在心上其體段如何曰義之在心乃是決裂果斷者也柄天下之物未嘗無對有陰便有陽有仁便有義有善便有惡有語便有默有動便有靜然又卻只是一箇道理如人行出去是這腳行歸亦是這腳譬如口中之氣噓則為溫吸則為寒耳雉禮者節文也禮數節直卿曰五常中説知有兩般就知識處看用著知識者是知就理上看所以為是為非者亦知也一屬理一屬情曰固是道德皆有體有用宇禮者仁之發智者義之藏且以人之資質言之溫厚者多謙遜通曉者多刻剝燾問仁敬曰上蔡以來以敬為小不足言須加仁字在上其實敬不須言仁敬則仁在其中矣方以下兼論恭敬忠信恭主容敬主事有事著心做不易其心而為之是敬恭形於外敬主於中自誠身而言則恭較緊自行事而言則敬為切淳初學則不如敬之切成德則不如恭之安敬是主事然專言則又如修己以敬敬以直內只偏言是主事恭是容貌上説端蒙問恭敬二字以謂恭在外功夫猶淺敬在內功夫大段細密曰二字不可以深淺論恭敬猶忠信兩字文蔚曰恭即是敬之發見先生默然良久曰本領雖在敬上若論那大處恭反大如敬若不是裏面積盛無緣發出來做得恭文蔚吉甫問恭敬曰恭字軟敬字硬直卿云恭似低頭敬似抬頭至因言恭敬二字如忠信或云敬主於中者也恭發於外者也曰凡言發於外比似主於中者較大蓋必充積盛滿而後發於外則發於外者豈不如主於中者然主於中者卻是本不可不知僩忠信者真實而無虛偽也無些欠闕無些間斷朴實頭做去無停住也敬者收斂而不放縱也祖道忠自裏面發出信是就事上説忠是要盡自家這箇心信是要盡自家這箇道理
