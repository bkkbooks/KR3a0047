body:
  text: 朱子語類卷第八十五禮二儀禮總論河間獻王得古禮五十六篇想必有可觀但當時君臣間有所不曉遂至無傳故先儒謂聖經不亡於秦火而壞於漢儒其說亦好溫公論景帝太子既亡當時若立獻王為嗣則漢之禮樂制度必有可觀又致堂謂武帝若使董仲舒為相汲黯為御史大夫則漢治必盛某嘗謂若如此差除那裏得來廣先王之禮今存者無幾漢初自有文字都無人收拾河間獻王既得雅樂又有禮書五十六篇惜乎不見於後世是當時儒者專門名家自一經之外都不暇講況在上又無典禮樂之主故胡氏說道使河間獻王為君董仲舒為相汲黯為御史則漢之禮樂必興這三箇差除豈不甚盛賀孫今儀禮多是士禮天子諸侯喪祭之禮皆不存其中不過有些小朝聘燕饗之禮自漢以來凡天子之禮皆是將士禮來增加為之河間獻王所得禮五十六篇卻有天子諸侯之禮故班固謂愈於推士禮以為天子諸侯之禮者班固作漢書時此禮猶在不知何代何年失了可惜可惜廣賀孫録略禮書如儀禮尚完備如他書儒用儀禮不是古人預作一書如此初間只以義起漸漸相襲行得好只管巧至於情文極細密極周經處聖人見此意思好故録成書只看古人君臣之際如公前日所畫圖子君臨臣喪坐撫當心要絰而踊今日之事至於死生之際恝然不相關不啻如路人所謂君臣之恩義安在祖宗時於舊執政喪亦親臨渡江以來一向廢此只秦檜之死高宗臨之後來不復舉如陳福公壽皇眷之如此隆至其死亦不親臨祖宗凡大臣死遠地不及臨者必遣郎官往弔壽皇凡百提掇得意思這般處卻恁地不覺今日便一向廢卻賀孫禮有經有變經者常也變者常之變也先儒以曲禮為變禮看來全以為變禮亦不可蓋曲者委曲之義故以曲禮為變禮然毋不敬安定辭安民哉此三句豈可謂之變禮先儒以儀禮為經禮然儀禮中亦自有變變禮中又自有經不可一律看也禮記聖人說禮及學者問答處多是說禮之變上古禮書極多如河間獻王收拾得五十六篇後來藏在祕府鄭玄輩尚及見之今注疏中有引援處後來遂失不傳可惜可惜儀禮古亦多有今所餘十七篇但多士禮耳僩儀禮是經禮記是解儀禮如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義以至燕射之類莫不皆然只是儀禮有士相見禮禮記卻無士相見義後來劉原父補成一篇文蔚問補得如何曰他亦學禮記下言語只是解他儀禮文蔚魯共王壞孔子宅得古文儀禮五十六篇其中十七篇與高堂生所傳十七篇同鄭康成注此十七篇多舉古文作某則是他當時亦見此壁中之書不知如何只解此十七篇而三十九篇不解竟無傳焉義剛儀禮疏說得不甚分明溫公禮有疏漏處高氏送終禮勝得溫公禮義剛劉原父補亡記如士相見義公食大夫義儘好蓋偏會學人文字如今人善為百家書者又如學古樂府皆好意林是專學公羊亦似公羊其他所自為文章如雜著等卻不甚佳人傑永嘉張忠甫所校儀禮甚仔細然卻於目録中冠禮玄端處便錯了但此本較他本為最勝賀孫陳振叔亦儘得其說儀禮云此乃是儀更須有禮書儀禮只載行禮之威儀所謂威儀三千是也禮書如云天子七廟諸侯五大夫三士二之類是說大經處這是禮須自有箇文字賀孫士冠問士冠禮筮于廟門其禮甚詳而昏禮止云將加諸卜占曰吉既無筮而卜禮略何也曰恐卜筮通言之又問禮家之意莫是冠禮既詳其筮則於昏禮不必更詳且從省文之義如何曰亦恐如此然儀禮中亦自有不備處如父母戒女止有其辭而不言於某處之類人傑問宿賓曰是戒肅賓也是隔宿戒之燾古朝服用布祭則用絲詩絲衣繹賓尸也皮辨素積皮辨以白鹿皮為之素積白布為裙泳問士冠禮有所謂始加再加三加如何曰所謂三加彌尊只是三次加初是緇布冠以粗布為之次皮辨次爵辨諸家皆作畫爵看來亦只是皮辨模樣皆以白皮為之緇布冠古來有之初是緇布冠齊則緇之次皮辨者只是朝服爵辨士之祭服周禮爵辨居五冕之下又問致美乎黻冕注言皆祭服也黻冕恐不全是祭服否曰祭服謂之黻冕朝服謂之饥如詩鞞琫有珌內則端鞞紳皆是問士冠禮一加再加言吉月令月至三加言以歲之正不知是同時否曰只是一時節行此文自如此說加緇布冠少頃又更加皮辨少頃又更加爵辨然後成禮如溫公冠禮亦倣此初裹巾次帽次機頭又問黻冕黻蔽膝也以韋為之舜之畫衣裳有黼黻絺繡不知又如何畫於服上曰亦有不可曉黻在裳之前亦畫黻於其上宇陳仲蔚問冠儀曰凡婦人見男子每先一拜男拜則又答拜再拜亦然若子冠則見母亦如之重成人也尋常則不如此但古人無受拜禮雖兄亦答拜君亦然但諸侯見君則兩拜還一拜義剛冠者見母與兄弟而母與兄弟皆先拜此一節亦差異昏禮亦然婦始見舅姑舅姑亦拜義剛士冠禮始冠緇布冠冠而弊之弊是不用也義剛士昏儀禮昏禮下達用鴈注謂在下之人達二家之好而用鴈非也此只是公卿大夫下達庶人皆用鴈後得陸農師解亦如此說陸解多杜撰亦煞有好處但簡略難看陳祥道禮書考得亦穩淳義剛録云擇之云自通典後無人理會禮本朝但有陳祥道陸佃略理會來曰陳祥道理會得也穩陸農師也有好處但杜撰處多如儀禮云云問昏禮用鴈壻執鴈或謂取其不再偶或謂取其順陰陽往來之義曰士昏禮謂之攝盛蓋以士而服大夫之服爵辨乘大夫之車墨車則當執大夫之贄前說恐傅會又曰重其禮而盛其服賜或問禮經婦三月而後廟見與左氏不同曰左氏說禮處多與禮經不同恐是當時俗禮非必合於禮經又問既為婦便當廟見必三月之久何邪曰三月而後事定三月以前恐更有可去等事至三月不可去則為婦定矣故必待三月而後廟見或曰未廟見而死則以妾禮葬之曰歸葬於婦氏之黨文蔚鄉飲酒鄉飲酒云笙入樂南陔白華華黍想是笙入吹此詩而樂亦奏此詩樂便是衆樂皆奏之也聘禮問聘禮所言君行一臣行二之義曰君行步闊而遲臣行步狹而疾故君行一步而臣行兩步蓋不敢同君之行而踐其跡也國語齊君晏子行子貢怪之問孔子君臣交際之禮一段說得甚分曉僩公食大夫禮公食大夫禮乃是專饗大夫為主人者時出勸賓賓辭而獨饗人傑覲禮天子常服皮辨惟諸侯來朝見於廟中服冕服用鬱鬯之酒灌神人傑覲是正君臣之禮較嚴天子當依而立不下堂而見諸侯朝是講賓主之儀天子當寧而立在路寢門之外相與揖遜而入義剛喪服經傳今人齊衰用布太細又大功小功皆用苧布恐皆非禮大功須用市中所賣火麻布稍細者或熟麻布亦可小功須用虔布之屬古者布帛精粗皆有升數所以說布帛精粗不中度不鬻於市今更無此制聽民之所為所以倉卒難得中度者只得買來自以意擇製之爾僩喪服葛布極粗非若今之細也僩緦十五升抽其半者是一只用一經如今廣中有一種疏布又如單經黃草布皆只一經也然小功十二升則其縷反多於緦矣又不知是如何閎祖問溫公儀首絰綴於冠而儀禮疏說別材而不相綴曰綴也得不綴也得無緊要淳堯卿問絰帶之制曰首絰大一扼只是拇指與第二指一圍腰絰較小絞帶又小於腰絰腰絰象大帶兩頭長垂下絞帶象革帶一頭有扣子以一頭串於中而束之總如今之髻巾括髮是束髮為髻安卿問鄭氏儀禮注及疏以男子括髮與免及婦人髽皆云如著幓頭然所謂幓頭何也曰幓頭只如今之掠頭編子自項而前交於額上卻繞髻也免或讀如字謂去冠又問婦人首絰之制曰亦只是大麻索作一環耳幓音驂義剛或問服制曰儀禮事事都載在裏面其間曲折難行處他都有箇措置得恰好因舉一項父卒繼母嫁後為之服報傳曰何以期也貴終也嘗為母子貴終其恩此為繼母服之義賀孫沈存中說喪服中曾祖齊衰服曾祖以上皆謂之曾祖恐是如此如此則皆合有齊衰三月服看來高祖死豈有不為服之理須合行齊衰三月也伊川頃言祖父母喪須是不赴舉後來不曾行法令雖無明文看來為士者為祖父母期服內不當赴舉僩沈存中云高祖齊衰三月不特四世祖為然自四世以上凡建事皆當服衰麻三月高祖蓋通稱耳閎祖問某人不肯丁所生母憂曰禮為所生父母齊衰杖期律文許申心喪若所生父再娶亦當從律某人是也又問若所生父與所繼父俱再娶當持六喪乎曰固是又問先儒爭濮議事曰此只是理會稱親當時蓋有引戾園事欲稱皇考者又問稱皇考是否曰不是然近世儒者亦有多言合稱皇考者人傑儀禮稽顙條內注說國君有疾不能為祖父母曾祖父母服則世子斬又曰君喪皆斬說已分明天子無期喪凡有服則必斬三年淳因言孫為人君為祖承重頃在朝檢此條不見後歸家檢儀禮疏說得甚詳正與今日之事一般乃知書多看不辦舊來有明經科便有人去讀這般書注疏都讀過自王介甫新經出廢明經學究科人更不讀書卒有禮文之變更無人曉得為害不細如今秀才和那本經也有不看底朝廷更要將經義賦論策頒行印下教人在僩無大功尊父母本是期加成三年祖父母世父母叔父母本是大功加成期其曾祖父母小功及從祖伯父母叔父母小功者乃正服之不加者耳閎祖母之姊妹服反重於母之兄弟緣於兄弟既嫁則降服而於姊妹之服則未嘗降故為子者於舅服緦於姨母服小功也賀孫舅於甥之妻有服甥之妻於夫之舅卻無服也可疑恐是舅則從父身上推將來故廣甥之妻則從父身上推將來故狹義剛禮妻之父曰舅謂我舅者吾謂之甥古禮甥字用處極多如壻謂之甥姑之子亦曰甥或問姪字本非兄弟之子所當稱曰然伊川嘗言之胡文定家子弟稱猶子禮兄弟之子猶子也亦不成稱呼嘗見文定家將伊川語録凡家書說姪處皆作猶子私嘗怪之後見他本只作姪字乃知猶子字文定所改以伊川嘗非之故也殊不知伊川雖非之然未有一字替得亦且只得從俗若改為猶子豈不駭俗據禮兄弟之子當稱從子為是自曾祖而下三代稱從子自高祖四世而上稱族子僩始封之君不臣其兄弟封君之子不臣其諸父不忘其舊也公謹喪服五服皆用狀朋友麻是加麻於弔服之上麻謂絰也閎祖問改葬緦鄭玄以為終緦之月數而除服王肅以為葬畢便除如何曰如今不可考禮宜從厚當如鄭氏問王肅以為既虞而除之若是改葬神已在廟久矣何得虞乎曰便是如此而今都不可考看來也須當反哭於廟問鄭氏以為只是有三年服者改葬服緦三月非三年服者弔服加麻葬畢除之否曰然子思曰禮父母改葬緦而除則非父母不服緦也賀孫既夕問朝祖時有遷祖奠恐在祖廟之前祖無奠而亡者難獨享否曰不須如此理會禮說有奠處便是合有奠無奠處便合無奠更何用疑其他可疑處卻多如溫公疑斬齊古制而功緦又卻不古制是何說也古者五服皆用麻但有等差皆有冠絰但功緦之絰小耳今人吉服不古而凶服古亦無謂也今俗喪服之制下用橫布作欄惟斬衰用不得淳義剛同少牢饋食儀禮日用丁巳按注家說則當作丁己蓋十干中柔日也雉儀禮饋食之詞曰適爾皇祖伯某父伯伯仲叔季也某字也父美稱助辭也振
