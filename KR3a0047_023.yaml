body:
  text: 朱子語類卷第二十三論語五為政篇上為政以德章問為政以德莫是以其德為政否曰不必泥這以字為政以德只如為政有德相似節亞夫問為政以德云云曰人之有德發之於政如水便是箇濕底物事火便是箇熱底物事有是德便有是政植德與政非兩事只是以德為本則能使民歸若是所令反其所好則民不從義剛文振問為政以德莫是以身率之曰不是強去率它須知道未為政前先有是德若道以身率之此語便粗了時舉鄭録云德是得之於我者更思此意或問為政以德曰為政以德不是欲以德去為政亦不是塊然全無所作為但德修於己而人自感化然感化不在政事上卻在德上蓋政者所以正人之不正豈無所作為但人所以歸往乃以其德耳故不待作為而天下歸之如衆星之拱北極也銖為政以德非是不用刑罰號令但以德先之耳以德先之則政皆是德上蔡說辰非是北辰乃天之北極天如水車北辰乃軸處水車動而軸未嘗動上蔡所云乃北斗北斗同衆星一日一周天安得謂之居其所可學衆問為政以德章曰此全在德字德字從心者以其得之於心也如為孝是心中得這箇孝為仁是心中得這箇仁若只是外面恁地中心不如此便不是德凡六經言德字之意皆如此故曰忠信所以進德也忠信者謂實得於心方為德也為政以德者不是把德去為政是自家有這德人自歸仰如衆星拱北辰北辰者天之樞紐乃是天中央安樞處天動而樞不動不動者正樞星位樞有五星其前一明者太子其二最明者曰帝座乃太一之常居也其後一箇分外開得些子而不甚明者極星也惟此一處不動衆星於北辰亦是自然環向非有意於共之也子蒙問北辰北極也不言極而言辰何義曰辰是大星又云星之界分亦謂之辰如十二辰是十二箇界分極星亦微轉只是不離其所不是星全不動是箇傘腦上一位子不離其所因舉晉志云北極五星天運無窮三光迭耀而極星不移故曰居其所而衆星共之銖論北辰安卿問北辰曰北辰是那中間無星處這些子不動是天之樞紐北辰無星緣是人要取此為極不可無箇記認故就其傍取一小星謂之極星這是天之樞紐如那門筍子樣又似箇輪藏心藏在外面動這裏面心都不動義剛問極星動不動曰極星也動只是它近那辰後雖動而不覺如那射糖盤子樣那北辰便是中心樁子極星便是近樁底點子雖也隨那盤子轉卻近那樁子轉得不覺今人以管去窺那極星見其動來動去只在管裏面不動出去向來人說北極便是北辰皆只說北極不動至本朝人方去推得是北極只是北辰頭邊而極星依舊動又一說那空無星處皆謂之辰康節說日月星辰自是四件辰是一件天上分為十二段即十二辰辰天壤也此說是每一辰各有幾度謂如日月宿於角幾度即所宿處是辰也故曰日月所會之處為辰又曰天轉也非東而西也非循環磨轉卻是側轉義剛言樓上渾儀可見曰是直卿舉鄭司農五表日景之說曰其說不是不如鄭康成之說又曰南極在地下中處南北極相對天雖轉極卻在中不動義剛問如說南極見老人壽則是南極也解見曰南極不見是南邊自有一老人星南極高時解浮得起來義剛問北辰是甚星集注以為北極之中星天之樞也上蔡以為天之機也以其居中故謂之北極以其周建於十二辰之舍故謂之北辰不知是否曰以上蔡之明敏於此處卻不深考北辰即北極也以其居中不動而言是天之樞軸天形如雞子旋轉極如一物橫异居中兩頭稱定一頭在北上是為北極居中不動衆星環向也一頭在南是為南極在地下人不可見因舉先生感興詩云感此南北極樞軸遙相當即是北極否曰然又問太一有常居太一是星否曰此在史記中說太一星是帝座即北極也以星辰位言之謂之太一以其所居之處言之謂之北極太一如人主極如帝都也詩云三辰環侍傍三辰謂何曰此以日月星言也宇問謝氏云以其居中故謂之北極先生云非是何也曰所謂以其所建周於十二辰者自是北斗史記載北極有五星太一常居中是極星也辰非星只是星中間界分其極星亦微動惟辰不動乃天之中猶磨之心也沈存中謂始以管窺其極星不入管後旋大其管方見極星在管絃上轉一之子上問北極曰北極自是北極居中不動者史記天官書可見謝顯道所說者乃北斗北斗固運轉也璘問集注云德者行道而有得於身也後改身作心如何曰凡人作好事若只做得一件兩件亦只是勉強非是有得所謂得者謂其行之熟而心安於此也如此去為政自是人服譬如今有一箇好人在說話聽者自是信服所謂無為非是盡廢了許多簿書之類但是我有是德而彼自服不待去用力教他來服耳義剛集注行道而有得於身身當改作心諸經注皆如此又曰古人製字皆不苟如德字中間從心便是曉此理僩舊說德者行道而有得於身今作得於心而不失諸書未及改此是通例安卿曰得於心而不失可包得行道而有得於身曰如此較牢固真箇是得而不失了義剛問無為而天下歸之曰以身率人自是不勞力禮樂刑政固不能廢只是本分做去不以智術籠絡天下所以無為明作問為政以德如何無為曰聖人合做處也只得做如何不做得只是不生事擾民但為德而民自歸之非是說行此德便要民歸我如齊桓晉文做此事便要民如此如大搜以示禮伐原以示信之類但聖人行德於上而民自歸之非有心欲民之服也僩子善問為政以德然後無為聖人豈是全無所為邪曰聖人不是全無一事如舜做許多事豈是無事但民心歸向處只在德上卻不在事上許多事都從德上出若無德而徒去事上理會勞其心志只是不服為政以德一似燈相似油多便燈自明恪賀孫録云子善問為政以德然後無為曰此不是全然不為但以德則自然感化不見其有為之跡耳問邵漢臣為政以德然後無為是如何漢臣對德者有道於身之謂自然人自感化曰看此語程先生說得也未盡只說無為還當無為而治無為而不治這合著得政者正也子帥以正則莫敢不正而天下歸之卻方與譬北辰居其所而衆星共之相似邵因舉集注中所備録者曰下面有許多話卻亦自分曉賀孫問為政以德老子言無為之意莫是如此否曰不必老子之言無為孔子嘗言無為而治者其舜也與夫何為哉恭己正南面而已矣老子所謂無為便是全不事事聖人所謂無為者未嘗不為依舊是恭己正南面而已矣是己正而物正篤恭而天下平也後世天下不治者皆是不能篤恭盡敬若能盡其恭敬則視必明聽必聰而天下之事豈有不理卓賀孫録云老子所謂無為只是簡忽聖人所謂無為卻是付之當然之理如曰無為而治者其舜也與夫何為哉恭己正南面而已這是甚麼樣本領豈可與老氏同日而語詩三百章若是常人言只道一箇思無邪便了便略了那詩三百聖人須是從詩三百逐一篇理會了然後理會思無邪此所謂下學而上達也今人止務上達自要免得下學如說道灑掃應對進退便有天道都不去做那灑掃應對進退之事到得灑掃則不安於灑掃進退則不安於進退應對則不安於應對那裏面曲折去處都鶻突無理會了這箇須是去做到得熟了自然貫通到這裏方是一貫古人由之而不知今人不由而但求知不習而但求察賀孫居父問思無邪曰三百篇詩只是要得人思無邪思無邪三字代得三百篇之意賀孫思無邪一句便當得三百篇之義了三百篇之義大概只要使人思無邪若只就事上無邪未見得實如何惟是思無邪方得思在人最深思主心上佐或問思無邪曰此詩之立教如此可以感發人之善心可以懲創人之逸志祖道問思無邪曰若言作詩者思無邪則其間有邪底多蓋詩之功用能使人無邪也植徐問思無邪曰非言作詩之人思無邪也蓋謂三百篇之詩所美者皆可以為法而所刺者皆可以為戒讀之者思無邪耳作之者非一人安能思無邪乎只是要正人心統而言之三百篇只是一箇思無邪析而言之則一篇之中自有一箇思無邪道夫思無邪乃是要使讀詩人思無邪耳讀三百篇詩善為可法惡為可戒故使人思無邪也若以為作詩者思無邪則桑中溱洧之詩果無邪耶某詩傳去小序以為此漢儒所作如桑中溱洧之類皆是淫奔之人所作非詩人作此以譏刺其人也聖人存之以見風俗如此不好至於做出此詩來使讀者有所愧恥而以為戒耳呂伯恭以為放鄭聲矣則其詩必不存某以為放是放其聲不用之郊廟賓客耳其詩則固存也如周禮有官以掌四夷之樂蓋不以為用亦存之而已伯恭以為三百篇皆正詩皆好人所作某以為正聲乃正雅也至於國風逐國風俗不同當是周之樂師存列國之風耳非皆正詩也如二南固正矣鄭衛詩分明是有鄭衛字安得謂之正乎鄭漁仲詩辨將仲子只是淫奔之詩非刺仲子之詩也某自幼便知其說之是然太史公謂三百篇詩聖人刪之使皆可弦歌伯恭泥此以為皆好蓋太史之評自未必是何必泥乎璘或曰先儒以三百篇之義皆思無邪先生笑曰如呂伯恭之說亦是如此讀詩記序說一大段主張箇詩說三百篇之詩都如此看來只是說箇可以怨言詩人之情寬緩不迫優柔溫厚而已只用他這一說便瞎卻一部詩眼矣僩問如先生說思無邪一句卻如何說曰詩之意不一求其切於大體者惟思無邪足以當之非是謂作者皆無邪心也為此說者乃主張小序之過詩三百篇大抵好事足以勸惡事足以戒如春秋中好事至少惡事至多此等詩鄭漁仲十得其七八如將仲子詩只是淫奔艾軒亦見得向與伯恭論此如桑中等詩若以為刺則是抉人之陰私而形之於詩賢人豈宜為此伯恭云只是直說答之云伯恭如見人有此事肯作詩直說否伯恭平日作詩亦不然伯恭曰聖人放鄭聲又卻取之如何曰放者放其樂耳取者取其詩以為戒今所謂鄭衛樂乃詩之所載伯恭云此皆是雅樂曰雅則大雅小雅風則國風不可紊亂言語之間亦自可見且如清廟等詩是甚力量鄭衛風如今歌曲此等詩豈可陳於朝廷宗廟此皆司馬遷之過伯恭多引此為辨嘗語之云司馬遷何足證子約近亦以書問止乎禮義答之云詩有止乎禮義者亦有不止乎禮義者可學問思無邪子細思之只是要讀詩者思無邪曰舊人說似不通中間如許多淫亂之風如何要思無邪得如止乎禮義中間許多不正詩如何會止乎禮義怕當時大約說許多中格詩卻不指許多淫亂底說某看來詩三百篇其說好底也要教人思無邪說不好底也要教人思無邪只是其它便就一事上各見其意然事事有此意但是思無邪一句方盡得許多意問直指全體是如何曰只說思無邪一語直截見得詩教之本意是全備得許多零碎底意又曰聖人言詩之教只要得人思無邪其它篇篇是這意思惟是此一句包說得盡某看詩要人只將詩正文讀自見其意今人都緣這序少間只要說得序通卻將詩意來合序說卻不要說教詩通呂子約一番說道近看詩有所得待取來看卻只是說得序通某意間非獨將序下文去了首句甚麼也亦去了且如漢廣詩下面幾句猶似說得通上一句說德廣所及也是說甚麼又如說賓之初筵衛武公刺時也韓詩說是衛武公自悔之詩看來只是武公自悔國語說武公年九十猶針警於國曰群臣無以我老耄而舍我必朝夕端恪以交戒我看這意思只是悔過之詩如抑之詩序謂衛武公刺厲王亦以自警也後來又考見武公時厲王已死又為之說是追刺凡詩說美惡是要那人知如何追刺以意度之只是自警他要篇篇有美刺故如此說又說道亦以自警兼是說正雅變雅看變雅中亦自煞有好詩不消分變雅亦得如楚茨信南山甫田大田諸篇不待看序自見得是祭祀及稼穡田政分明到序說出來便道是傷今思古陳古刺今那裏見得如卷阿是說召康公戒成王如何便到後面民勞板蕩刺厲王中間一截是幾時卻無一事係美刺只緣他須要有美有刺美便是成康時君刺只是幽厲所以其說皆有可疑問怕是聖人刪定故中間一截無存者曰怕不曾刪得許多如太史公說古詩三千篇孔子刪定三百怕不曾刪得如此多賀孫問集注以為凡言善者足以感發人之善心言惡者足以懲創人之逸志而諸家乃專主作詩者而言何也曰詩有善有惡頭面最多而惟思無邪一句足以該之上至於聖人下至於淫奔之事聖人皆存之者所以欲使讀者知所懲勸其言思無邪者以其有邪也直卿曰詩之善惡如藥之參苓巴豆而思無邪乃藥之單方足以當是藥之善惡者也曰然道夫曰如此則施之六經可也何必詩曰它經不必言又曰詩恰如春秋春秋皆亂世之事而聖人一切裁之以天理道夫集注問夫子言三百篇詩可以興善而懲惡其用皆要使人思無邪而已云云曰便是三百篇之詩不皆出於情性之正如關雎二南詩四牡鹿鳴詩文王大明詩是出於情性之正桑中鶉之奔奔等詩豈是出於情性之正人言夫子刪詩看來只是採得許多詩往往只是刊定聖人當來刊定好底詩便吟詠興發人之善心不好底詩便要起人羞惡之心又曰詩三百篇雖桑中鶉奔等詩亦要使人思無邪一句可以當得三百篇之義猶云三百篇詩雖各因事而發其用歸於使人思無邪然未若思無邪一句說得直截分明南升時舉録別出文振問思無邪曰人言夫子刪詩看來只是採得許多詩夫子不曾刪去往往只是刊定而已聖人當來刊定好底詩便要吟詠興發人之善心不好底詩便要起人羞惡之心皆要人思無邪蓋思無邪是魯頌中一語聖人卻言三百篇詩惟魯頌中一言足以盡之時舉問所謂其言微婉各因一事而發曰一事如淫奔之詩只刺淫奔之事如暴虐之詩只刺暴虐之事思無邪卻凡事無所不包也又曰陳少南要廢魯頌忒煞輕率它作序卻引思無邪之說若廢了魯頌卻沒這一句宇或問思無邪如何是直指全體曰詩三百篇皆無邪思然但逐事無邪爾唯此一言舉全體言之因曰夏之日冬之夜百歲之後歸于其居冬之夜夏之日百歲之後歸于其室此無邪思也出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員此亦無邪思也為子而賦凱風亦無邪思也為臣而賦北門亦無邪思也但不曾說破爾惟思無邪一句便分明說破或曰如淫奔之詩如何曰淫奔之詩固邪矣然反之則非邪也故某說其善者可以感發人之善心惡者可以懲創人之逸志廣程子曰思無邪誠也誠是實心之所思皆實也明作程子說問思無邪誠也非獨是行無邪直是思無邪方是誠曰公且未要說到這裏且就詩三百如何一言以蔽之曰思無邪集注說要使人得情性之正情性是貼思正是貼無邪此如做時文相似只恁地貼方分曉若好善惡惡皆出於正便會無邪若果是正自無虛僞自無邪若有時也自入不得賀孫問思無邪曰不但是行要無邪思也要無邪誠者合內外之道便是表裏如一內實如此外也實如此故程子曰思無邪誠也時舉思無邪誠也不專說詩大抵學者思常要無邪況視聽言動乎誠是表裏都恁地實又曰不獨行處要如此思處亦要如此表裏如此方是誠伊川曰思無邪誠也每常只泛看過子細思量極有義理蓋行無邪未是誠思無邪乃可為誠也賀孫問思無邪誠也所思皆無邪則便是實理曰下實理字不得只得下實心字言無邪也未見得是實行無邪也未見得是實惟思無邪則見得透底是實義剛問程子曰思無邪誠也曰思在言與行之先思無邪則所言所行皆無邪矣惟其表裏皆然故謂之誠若外為善而所思有不善則不誠矣為善而不終今日為之而明日廢則不誠矣中間微有些核子消化不盡則亦不誠矣又曰伊川誠也之說也粗胡泳僩録別出因言思無邪與意誠曰有此種則此物方生無此種生箇甚麼所謂種者實然也如水之必濕火之必燒自是住不得思無邪表裏皆誠也若外為善而所思有不善則不誠矣為善而不終今日為之而明日廢忘則不誠矣中間微有些核子消化不破則不誠矣又曰思無邪有兩般伊川誠也之說也粗僩問思無邪誠也曰人聲音笑貌或有似誠者然心有不然則不可謂之誠至於所思皆無邪安得不謂之誠夔孫因潘子善問詩三百章遂語諸生伊川解思無邪一句如何只著一箇誠也伊川非是不會說只著此二字不可不深思大凡看文字這般所在須教看得出思無邪誠也是表裏皆無邪徹底無毫髮之不正世人固有修飾於外而其中未必能純正惟至於思亦無邪斯可謂之誠賀孫義剛說思無邪集注云誠也之意先生曰伊川不是不會說卻將一誠字解了且如今人固有言無邪者亦有事無邪者然未知其心如何惟思無邪則是其心誠實矣又曰詩之所言皆思無邪也如關雎便是說樂而不淫哀而不傷葛覃便是說節儉等事皆歸於思無邪也然此特是就其一事而言未足以括盡一詩之意惟思無邪一語足以蓋盡三百篇之義蓋如以一物蓋盡衆物之意義剛林問思無邪曰人之踐履處可以無過失若思慮亦至於無邪則是徹底誠實安得不謂之誠人傑李兄問思無邪伊川說作誠是否曰誠是在思上發出詩人之思皆情性也情性本出於正豈有假僞得來底思便是情性無邪便是正以此觀之詩三百篇皆出於情性之正卓問思無邪曰只此一言當盡得三百篇之義讀詩者只要得思無邪耳看得透每篇各是一箇思無邪總三百篇亦只是一箇思無邪毋不敬禮之所以為教思無邪詩之所以為教宇范氏說問思無邪曰前輩多就詩人上說思無邪發乎情止乎禮義某疑不然不知教詩人如何得思無邪如文王之詩稱頌盛德盛美處皆吾所當法如言邪僻失道之人皆吾所當戒是使讀詩者求無邪思分而言之三百篇各是一箇思無邪合三百篇而言總是一箇思無邪問聖人六經皆可為戒何獨詩也曰固是如此然詩中因情而起則有思欲其思出於正故獨指思無邪以示教焉問詩說思無邪與曲禮說毋不敬意同否曰毋不敬是用功處所謂正心誠意也思無邪思至此自然無邪功深力到處所謂心正意誠也若學者當求無邪思而於正心誠意處著力然不先致知則正心誠意之功何所施所謂敬者何處頓放今人但守一箇敬字全不去擇義所以應事接物處皆顛倒了中庸博學之審問之慎思之明辨之篤行之孟子博學而詳說之將以反說約也顏子博我以文約我以禮從上聖賢教人未有不先自致知始宇思無邪不必說是詩人之思及讀詩之思大凡人思皆當無邪如毋不敬不必說是說禮者及看禮記者當如此大凡人皆當毋不敬人傑去僞録云此一句出處止是說為孔子見得此一句皆當三百篇之義故舉以為說餘同楊士訓尹叔問思無邪毋不敬曰禮言毋不敬是正心誠意之事詩言思無邪是心正意誠之事蓋毋者禁止之辭若自無不敬則亦心正意誠之事矣又曰孔子曰博學於文約之以禮顏子曰博我以文約我以禮孟子曰博學而詳說之將以反說約也今若祇守著兩句如何做得須是讀了三百篇有所興起感發然後可謂之思無邪真箇坐如尸立如齊而後可以言毋不敬道夫問思無邪毋不敬是一意否曰思無邪有辨別毋不敬卻是渾然好底意思大凡持敬程子所謂敬如有箇宅舍講學如遊騎不可便相離遠去須是於知處求行行處求知斯可矣謨毋不敬思無邪毋不敬是渾然底思是已萌此處只爭些可學上蔡說思無邪一條未甚親切東萊詩記編在劈初頭看它意只說得箇詩可以怨底意如何說思無邪賀孫集義思無邪如正風雅頌等詩可以起人善心如變風等詩極有不好者可以使人知戒懼不敢做大段好詩者大夫作那一等不好詩只是閭巷小人作前輩多說是作詩之思不是如此其間多有淫奔不好底詩不成也是無邪思上蔡舉數詩只說得箇可以怨一句意思狹甚若要盡得可以興以下數句須是思無邪一語甚闊呂伯恭做讀詩記首載謝氏一段說話這一部詩便被此壞盡意思夫善者可以感發得人之善心惡者可以懲創得人之逸志今使人讀好底詩固是知勸若讀不好底詩便悚然戒懼知得此心本不欲如此者是此心之失所以讀詩者使人心無邪也此是詩之功用如此明作問周氏說思無邪皆無心而思無心恐無緣有思曰不成三代直道而行人皆無心而思此是從引三代直道便誤認了道之以政章問道之以政曰聖人之意只為當時專用政刑治民不用德禮所以有此言謂政刑但使之遠罪而已若是格其非心非德禮不可聖人為天下何曾廢刑政來恪道之以德是躬行其實以為民先如必自盡其孝而後可以教民孝自盡其弟而後可以教民弟如此類宜其家人而後可以教國人宜兄宜弟而後可以教國人賀孫或問齊之以禮曰道之以德是以感人之善心若不著禮以為之規矩如何齊得它須以禮齊之使賢者知所止不肖者有所跂及問格字曰是合格及格之格使人之合法度而已祖道讀道之以德齊之以禮曰才說禮便自有箇中制賢者可以俯而就之不肖者便可企而及之炎問道之以德齊之以禮曰這德字只是適來說底德以身率人人之氣質有淺深厚薄之不同故感者不能齊一必有禮以齊之如周官一書何者非禮以至歲時屬民讀法之屬無不備具者正所以齊民也齊之不從則刑不可廢若只道之以德而無禮以約之則儱統無收殺去格者至於善也如格于文祖格于上下與夫格物格者皆至也儲宰云此是堯舜地位曰古人有得百里之地而君之便能如此明道便是有此氣象子蒙問道之以德齊之以禮曰資質好底便化不好底須立箇制度教人在裏面件件是禮後世專用以刑然不用刑亦無此理但聖人先以德禮到合用處亦不容已有恥且格只將格字做至字看至是真箇有到處如王假有廟格于上帝之格如遷善遠罪真箇是遠罪有勉強做底便是不至季札問道之以德猶可致力齊之以禮州縣如何做得曰便是如今都蕩然無此家具了便也難得相應古人比閭之法比有長閭有師便真箇能行禮以帥之民都是教了底人故教人可以流通如一大圳水分數小圳去無不流通後世有聖賢作必不肯只恁休須法古從底做起始得一之先之以法制禁令是合下有猜疑關防之意故民不從又卻齊之以刑民不見德而畏威但圖目前苟免於刑而為惡之心未嘗不在先之以明德則有固有之心者必觀感而化然稟有厚薄感有淺深又齊之以禮使之有規矩準繩之可守則民恥於不善而有以至於善南升論全章道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格此謂庶民耳若所謂士者行己有恥不待上之命也鎬問道之以政齊之以刑道之以德齊之以禮曰近見一朋友讀道德功術策前一篇說得不是盡說術作不好後一篇卻說得是曰有道德則功術乃道德之功道德之術無道德則功術方不好某嘗見一宰相說上甚有愛人之心不合被近日諸公愛把恢復來說了某應之曰公說得便不是公何不曰愛人乃所以為恢復恢復非愛人不能幹因問政刑德禮四者如何說曰此政與道德功術一般有德禮則政刑在其中不可專道政刑做不得底但不專用政刑幹道之以德者是自身上做出去使之知所向慕齊之以禮者是使之知其冠婚喪祭之儀尊卑小大之別教人知所趨既知德禮之善則有恥而格於善若道齊之以刑政則不能化其心而但使之少革到得政刑少弛依舊又不知恥矣問刑政莫只是伯者之事曰專用政刑則是伯者之為矣卓道之以德集注云淺深厚薄之不一謂其間資稟信向不齊如此雖是感之以德自有不肯信向底亦有太過底故齊一之以禮禮是五禮所謂吉凶軍賓嘉須令一齊如此所謂賢者俯而就不肖者企而及正如齊之以刑亦然先立箇法制如此若不盡從便以刑罰齊之集注後面餘意是說聖人謂不可專恃刑政然有德禮而無刑政又做不得聖人說話無一字無意味如只說道之以德齊之以禮便不是了明作集注道之以德齊之以禮觀感得深而厚者固好若淺而薄者須有禮以齊之則民將視吾之禮必恥於不善而至於善矣人傑問道之以政齊之以刑范氏說則民無所不至語亦過否曰若只靠政刑去治民則民是會無所不至又問呂氏說云政刑能使懦者畏不能使強者革此之謂失其本心亦怕未如此曰這說亦是偏了若專政刑不獨是弱者怕強者也會怕到得有德禮時非獨使強者革弱者也會革因仁父問侯氏云刑政霸者之事曰專用刑政只是霸者事問威文亦須有德禮如左傳所云曰它只是借德禮之名出做事如大搜以示之禮伐原以示之信出定襄王以示之義它那曾有躬行德禮之實這正是有所為而為之也聖人是見得自家合著恁地躬行那待臨時去做些又如漢高祖為義帝發喪那曾出於誠心只是因董公說分明借這些欺天下看它來意也只要項羽殺了它卻一意與項羽做頭底賀孫集義吾十有五而志于學章或問十五志學章曰聖人是生知安行云云曰且莫說聖人只於已分上說如何是志學如何是立如何是不惑如何是如天命如何是耳順如何是從心所欲不踰矩且理會這幾箇字教分曉某所以逐句下只解其字義直至後面方說聖人分上事今且說如何是志學曰心有所之謂之志志學則其心專一向這箇道理上去曰說文義大概也只如此說然更有意思在世間千歧萬路聖人為甚不向別路去只向這一路來志是心之深處故醫家謂志屬腎如今學者誰不為學只是不可謂之志於學如果能志於學則自住不得學而時習之到得說後自然一步趲一步去如人當寒月自然向有火處去暑月自然向有風處去事君便從敬上去事親便從孝上去雖中間有難行處亦不憚其難直做教徹廣曰人不志學有兩種一是全未有知了不肯為學者一是雖已知得又卻說道但得本莫愁末了遂不肯學者曰後一種古無此只是近年方有之卻是有兩種一種是全未有知者一種是雖知得了後卻若存若亡不肯至誠去做者然知之而不肯為亦只是未嘗知之耳又曰如人要向箇所在去便是志到得那所在了方始能立立得牢了方能向上去廣問聖人十年工夫曰不須理會這箇且理會志於學能志學許多科級須著還我季札吾十有五章曰看志字最要緊直須結裹在從心不踰矩上然又須循乎聖人為學之序方可炎問志學與立曰志是要求箇道猶是兩件物事到立時便是腳下已踏著了也時舉周問三十而立無所事志何也曰志方是趨向恁地去求討未得到此則志盡矣無用志了淳漢臣問立者立於斯道也曰立只是外物動搖不得賀孫問立是心有定守而物不能搖動否曰是問孔子三十而立似與孟子四十不動心同如何曰四十而不惑卻相似壯祖四十而不惑於事上不惑五十而知天命知所從來德明文振問四十不惑五十知天命曰此兩句亦相離不得不惑是隨事物上見這道理合是如此知天命是知這道理所以然如父子之親須知其所以親只緣元是一箇人凡事事物物上須是見它本原一線來處便是天命時舉問四十而不惑是於事物當然之理如君之仁臣之敬父之慈子之孝之類皆曉之而不疑五十知天命是天道流行賦與萬物在人則所受之性所謂仁義禮智渾然無不該之全體知者知之而無不盡曰須是見得自家曾不惑曾知天命否方是切己又云天命處未消說在人之性且說是付與萬物乃是事物所以當然之故如父之慈子之孝須知父子只是一箇人慈孝是天之所以與我者南升問先生教某不惑與知命處不惑是謂不惑於事物知命謂知其理之當然如或問所謂理之當然而不容已者某覺見豈有至人既能不惑於事物矣又至於十年之久然後知其理之當然曰今且據聖人之言如此且如此去看不可恁地較遲速遠近若做工夫未到那貫通處如何得聖人次第如伊川說虎傷人須是真見得似那虎傷底方是卓問五十知天命集注云天命即天道也事物所以當然之故也如何是所以當然之故曰如孝親悌長此當然之事推其所以然處因甚如此學者未便會知此理聖人學力到此此理洞然它人用力久亦須會到宇辛問五十知天命何謂天命先生不答又問先生厲辭曰某未到知天命處如何知得天命淳十五志于學三十守得定四十見得精詳無疑五十知天命天命是這許多柄子天命是源頭來處又曰因甚恁地知得來處節問六十而耳順在人之最末何也曰聽最是人所不著力所聞皆是道理無一事不是可見其義精仁熟如此一之問四十而不惑是知其然五十知天命是其所以然如此說得否曰如門前有一溪其先得知溪中有水其後知得水源頭發源處如天命之謂性率性之謂道四十時是見得那率性之謂道五十時是見他天命之謂性到六十時是見得那道理爛熟後不待思量過耳便曉義剛問聖人生知安行所謂志學至從心等道理自幼合下皆已完具云云曰聖人此語固是為學者立法然當初必亦是有這般意思聖人自覺見自有進處故如此說聖人自說心中事而今也不可知只做得不可知待之曰立是大綱處把得定否曰立是事物侵奪它不得須子細看志是如何立是如何問伊川謂知天命而未至命從心方至命此說如何曰亦是這知天命是從不惑來不惑是見道理恁地灼然知天命是知箇源頭來處恁地徹淳總論全章問志學便是一箇骨子後來許多節目只就這上進工夫從心所欲不踰矩自從容中道也曰固是志學時便是知了只是箇小底知不惑知天命耳順卻是箇大底知立便是從心不踰矩底根子從心不踰矩便是立底事只是到這裏熟卻是箇大底立文蔚問志于學章曰就志學上便討箇立底意思來就立上便討箇不惑底意思來人自志學之後十五年工夫方能有立立比不惑時立尚是箇持守底意思不惑便是事理不惑了然不惑方是事理不惑到知天命又是天之所以命我者無不知也須看那過接處過得甚巧植叔蒙問看來此章要緊在志上曰固是到聖人三十時這志久交卸了又問五十知天命曰初來是知事物合著如此到知命卻是和箇原來都知了器之問此章聖人自是言一生工夫效驗次第如此不似大學格物誠意正心修身是隨處就實做工夫處否曰是聖人將許多鋪攤在七十歲內看來合下已自耳順不踰矩了宇聖人亦大約將平生為學進德處分許多段說十五志于學此學自是徹始徹終到四十不惑已自有耳順從心不踰矩意思但久而益熟年止七十若更加數十歲也只是這箇終不然到七十便畫住了賀孫志學至從心所欲不踰矩只是一理先自人事做做來做去就上自長如事父孝事君忠初時也只忠孝後來便知所以孝所以忠移動不得四十不惑是於人事間不惑五十知皆自天命來伊川說以先知覺後知以先覺覺後覺知是知此事覺是覺此理亦此意如行之而著習矣而察聖賢所說皆有兩節不可躐等從周吳仁父問十五志于學章知行如何分曰志學亦是要行而以知為重三十而立亦是本於知而以行為重志學是知之始不惑與知天命耳順是知之至三十而立是行之始從心所欲不踰矩是行之至如此分看銖志于學是一面學一面力行至三十而立則行之效也學與不惑知天命耳順相似立與從心不踰矩相似又問四十而不惑何更待五十而知天命曰知天命是知得微妙而非常人之所可測度矣耳順則凡耳聞者便皆是道理而無凝滯伊川云知天命則猶思而得到耳順則不思而得也僩或問三十而立四十而不惑集注云立守之固也然恐未有未不惑而能守者曰自有三節自志學至於立是知所向而大綱把捉得定守之事也不惑是就把捉裏面理會得明知之事也於此則能進自不惑至耳順是知之極也不踰矩是不待守而自固者守之極也伯羽問十五志于學章曰志學與不惑知天命耳順是一類立與從心所欲是一類志學一類是說知底意思立與從欲一類是說到底地位問未能盡知事物之當然何以能立曰如栽木立時已自根腳著土漸漸地生將去問未知事物之所以然何以能不疑曰知事物之當然者只是某事知得是如此某事知得是如此到知其所以然則又上面見得一截又曰這箇說得都精問耳順曰程子謂知天命為思而得耳順為不思而得耳順時所聞皆不消思量不消擬議皆盡見得又問聞無道理之言亦順否曰如何得都有道理無道理底也見他是那裏背馳那裏缺闕那一邊道理是如何一見便一落索都見了胡泳吾十有五而志于學古人於十五以前皆少習父兄之教已從事小學之中以習幼儀舞象舞勺無所不習到此時節他便自會發心去做自去尋這道理志者言心之念只在此上步步恁地做為之不厭三十而立者便自卓然有立不為他物移動任是說虛說空說功說利便都搖動他不得以至富貴不能淫貧賤不能移威武不能屈四十而不惑於事物當然更無所疑五十知天命則窮理盡性而知極其至矣立時則未免有所把捉不惑則事至無疑勢如破竹迎刃而解矣不惑者見事也知天命者見理也伊川云先知先覺知是知此事覺是覺此理又問不惑者是知其然知天命者是知其所以然曰是如此如父之慈子之孝不惑者知其如此而為之知天命者謂因甚教我恁地不恁地不得是如何似覺得皆天命天理又曰志學是知立與不惑是行知天命耳順是知從心所欲又是行下面知得小上面知得較大下面行得小上面又行得較大子蒙劉潛夫問從心所欲不踰矩莫是聖人極處否曰不須如此說但當思聖人十五志學所志者何事三十而立所立者何事四十而不惑不惑之意如何五十知天命知得了是如何六十耳順如何是耳順每每如此省察體之於身庶幾有益且說如今學者逐一便能檢防省察猶患所欲之越乎規矩也今聖人但從心所欲自不踰矩是甚次第又曰志學方是大略見得如此到不惑時則是於應事時件件不惑然此數者皆聖人之立聖人之不惑學者便當取吾之所以用功處真切體認庶幾有益壯祖十五志學一章全在志于學上當思自家是志於學與否學是學箇甚如此存心念念不放自然有所得也三十而立謂把捉得定世間事物皆搖動我不得如富貴威武貧賤是也不惑謂識得這箇道理合東便東合西便西了然於中知天命便是不惑到至處是知其所以然如事親必孝事君必忠之類耳順是不思而得如臨事迎刃而解自然中節不待思索所欲不踰矩是不勉而中季札問耳順曰到得此時是於道理爛熟了聞人言語更不用思量得才聞言便曉只是道理爛熟耳志學字最有力須是志念常在於學方得立則是能立於道理也然事至猶有時而惑在不惑則知事物當然之理矣然此事此物當然之理必有所從來知天命是知其所從來也上蔡云知性之所自出理之所自來最好璘問七十從心一節畢竟是如何曰聖人生知理固已明亦必待十五而志于學但此處亦非全如是亦非全無實但須自覺有生熟之分可學蜚卿問十五志于學一段曰聖人也略有箇規模與人同如志學也是衆人知學時及其立與不惑也有箇跡相似若必指定謂聖人必恁地固不得若說聖人全無事乎學只脫空說也不得但聖人便自有聖人底事道夫問十五志學章曰這一章若把做學者功夫等級分明則聖人也只是如此但聖人出於自然做得來較易燾或問自志學而立至從心所欲自致知誠意至治國平天下二者次第等級各不同何也曰論語所云乃進學之次第大學所云乃論學之規模柄所謂以類而推只是要近去不要遠了如學者且只是做學者事所謂志學與立猶易理會至耳順以後事便去測度了士毅三十而立是心自定了事物不能動搖然猶是守住至不惑則見得事自如此更不用守至知天命則又深一節如父子有親君臣有義固是合當親合當義更知得天初命我時便有箇親有箇義在又如命有德討有罪皆是天理合如此耳順則又是上面一齊曉得無所不通矣又問四十不惑是知之明五十知天命是知極其精六十耳順是知之之至曰不惑是事上知知天命是理上知耳順是事理皆通入耳無不順今學者致知儘有次第節目胡氏不失本心一段極好儘用子細玩味聖人千言萬語只是要人收拾得箇本心不要失了日用間著力屏去私欲扶持此心出來理是此心之所當知事是此心之所當為不要埋沒了它可惜只如修身齊家治國平天下至大至公皆要此心為之又云人心皆自有許多道理不待逐旋安排入來銖録此下云但人有以陷溺其心於是此理不明聖人立許多節目只要人剔刮得自家心裏許多道理出來而已明作銖同集注問聖人凡謙詞是聖人亦有意於為謙抑平時自不見其能只是人見其為謙耳曰聖人也是那意思不恁地自滿淳舉東萊說聖人無謙本無限量不曾滿曰此說也略有些意思然都把聖人做絶無此也不得聖人常有此般心在如勞而不伐有功而不德分明是有功有勞卻不曾伐淳問十五志于學曰橫渠用做實說伊川用做假設說聖人不到得十年方一進亦不解懸空說這一段大概聖人元是箇聖人了它自恁地實做將去它底志學異乎衆人之志學它底立異乎衆人底立它底不惑異乎衆人之不惑植集注問十五志于學至七十從心所欲不踰矩程子云窮理盡性以至於命如何曰這事遠難說某嘗解孟子瞽瞍底豫而天下之為父子者定曰知此者為盡心能此者為盡性問窮理莫是自志學時便只是這箇道理到耳順時便是工夫到處曰窮理只自十五至四十不惑時已自不大段要窮了三十而立之時便是箇鋪模定了不惑時便是見得理明也知天命時又知得理之所自出耳順時見得理熟從心所欲不踰矩時又是爛熟也問所學者便是格物至平天下底事而立至不踰矩便是進學節次否曰然問橫渠說五十窮理盡性至天之命六十盡人物之性如何曰據五十而知天命則只是知得盡性而已又問盡性恐是盡己之性然後盡人物之性否曰只是一箇性不須如此看又曰自聖人言之窮理盡性至命合下便恁地自學者言之且如讀書也是窮理如何便說到盡性至命處易中是說聖人事論語知天命且說知得如此未說到行得盡處如孟子說盡心知性知天這便是說知存心養性至所以立命這便是說盡性至命要說知天命分曉只把孟子盡心知性說問四十不動心恐只是三十而立未到不惑處曰這便是不惑知言處可見孟子是義精理明天下之物不足以動其心不是強把捉得定問橫渠說不踰矩如何曰不知它引夢周公如何是它自立一說竟理會不得問范公說從心所以養血氣如何曰更沒理會幹問五十知天命曰上蔡云理之所自來性之所自出此語自是子貢謂夫子性與天道性便是自家底天道便是上面一節這箇物事上面有箇腦子下面便有許多物事徹底如此太極圖便是這箇物事箕子為武王陳洪範先言五行次言五事蓋在天則為五行在人則為五事知之者須是知得箇模樣形體如何某舊見李先生云且靜坐體認作何形象問體認莫用思否曰固是且如四端雖固有孟子亦言思則得之不思則不得也又曰此箇道理大則包括乾坤提挈造化細則入毫釐絲忽裏去無遠不周無微不到但須是見得箇周到底是何物夔孫孟懿子問孝至子夏問孝章問無違曰未見得聖人之意在且說不以禮蓋亦多端有苟且以事親而違禮有以僭事親而違禮自有箇道理不可違越聖人雖所以告懿子者意在三家僭禮然語意渾全又若不專為三家發也銖子曰無違此亦通上下而言三家僭禮自犯違了不當為而為固為不孝若當為而不為亦不孝也詳味無違一語一齊都包在裏集注所謂語意渾然者所以為聖人之言明作問孟懿子問孝云云曰聖人之言皆是人所通行得底不比它人說時只就一人面上說得其餘人皆做不得所謂生事葬祭須一於禮此是人人皆當如此然其間亦是警孟氏不可不知南升問生事以禮章胡氏謂為其所得為是如何曰只是合得做底諸侯以諸侯之禮事其親大夫以大夫之禮事其親便是合得做底然此句也在人看如何孔子當初是就三家僭禮說較精彩在三家身上又切當初卻未有胡氏說底意思就今論之有一般人因陋就簡不能以禮事其親又有一般人牽於私意卻不合禮淳生事葬祭之必以禮聖人說得本闊人人可用不特為三家僭禮而設然就孟懿子身上看時亦有些意思如此故某於末後亦說及之非專為此而發也至龜山又卻只說那不及禮者皆是倚於偏此最釋經之大病因言今人於冠婚喪祭一切苟簡徇俗都不知所謂禮者又如何責得它違與不違古禮固難行然近世一二公所定之禮及朝廷五禮新書之類人家儻能相與講習時舉而行之不為無補又云周禮忒煞繁細亦自難行今所編禮書只欲使人知之而已觀孔子欲從先進與寧儉寧戚之意往往得時位必不盡循周禮必須參酌古人別制為禮以行之所以告顏子者亦可見世固有人硬欲行古禮者然後世情文不相稱廣因言書儀中冠禮最簡易可行曰不獨書儀古冠禮亦自簡易頃年見欽夫刊行所編禮止有婚喪祭三禮因問之曰冠禮覺難行某云豈可以難行故闕之兼四禮中冠禮最易行又是自家事由己而已若婚禮便關涉兩家自家要行它家又不要行便自掣肘又為喪祭之禮皆繁細之甚且如人遭喪方哀苦中那得工夫去講行許多禮數祭禮亦然行時且是用人多昨見某人硬自去行自家固曉得而所用執事之人皆不曾講習觀之者笑且莫管至於執事者亦皆忍笑不得似恁行禮濟得甚事此皆是情文不相稱處不如不行之為愈廣叔蒙問父母唯其疾之憂注二說前一說未安曰它是問孝如此可以為孝矣賀孫以下武伯問孝父母唯其疾之憂前說為佳後說只說得一截蓋只管得不義不曾照管得疾了明作問集注中舊說意旨如何曰舊說似不說背面卻說背後一句相似全用上添一句新說雖用下添一句然常得父母之心如此便也自不為不孝故雖添句已不多添一之問色難此是承順父母之色或是自己和顏順色以致愛於親為難曰人子胸中才有些不愛於親之意便有不順氣象此所以為愛親之色為難宇以下子夏問孝問曾字或訓則或訓嘗何也又詩中憯字訓曾不知一音耶二音耶曰除了人姓皆當音在增反凡字義云某之為言某也者則是音義皆略相近嘗與則意亦略同廣叔蒙問孟懿子問孝子曰無違集注云此為懿子發者告衆人者也若看答孟武伯子游語亦可謂之告衆人曰無違意思闊若其它所告卻就其人所患意思多然聖人雖是告衆人意思若就孟懿子身上看自是大段切雖是專就一人身上說若於衆人身上看亦未嘗無益賀孫集注總論四章或問武伯多可憂之事如何見得曰觀聖人恁地說則知其人之如此矣廣或問父母唯其疾之憂何故以告武伯曰這許多所答也是當時那許多人各有那般病痛故隨而救之又曰其它所答固是皆切於學者看此句較切其它只是就道理上說如此卻是這句分外於身心上指出若能知愛其身必知所以愛其父母賀孫問子夏能直義如何見它直義處曰觀子夏所謂可者與之不可者拒之孟子亦曰孟施舍似曾子北宮黝似子夏則子夏是箇持身謹規矩嚴底人廣問子夏能直義而或少溫潤之色直義莫是說其資之剛方否曰只是於事親時無甚回互處義剛孟懿子孟武伯子游子夏問孝聖人答之皆切其所短故當時聽之者止一二句皆切於其身今人將數段只作一串文義看了問孔子答問孝四章雖不同意則一曰如何曰彼之間孝皆有意乎事親者孔子各欲其於情性上覺察不使之偏勝則其孝皆平正而無病矣曰如此看恰好過不敬何以別乎敬大概是把當事聽無聲視無形色難是大段恭順積得厚方能形見所以為難勉強不得此二者是因子游子夏之所短而進之能養服勞只是外面工夫遮得人耳目所及者如今人和養與服勞都無了且得如此然後就上面更進將去大率學者且要儘從小處做起正如起屋未須理會架屋且先立箇基趾定方得明作問色難有數說不知孰是曰從楊氏愈色婉容較好如以為承順顏色則就本文上又添得字來多了然而楊氏說文學處又說遠了如此章本文說處也不道是文太多但是誠敬不足耳孔門之所謂文學又非今日文章之比但子游為人則愛有餘而敬不足子夏則敬有餘而愛不足故告之不同問如何見得二子如此曰且如灑掃應對子游便忽略了子夏便只就這上做工夫又曰謝氏說此章甚差幹問子游見處高明而工夫則疏子夏較謹守法度依本子做觀答為政問孝之語可見惟高明而疏故必用敬惟依本做故必用有愛心又觀二人灑掃應對之論與子夏博學篤志之論亦可見伯羽問夫子答子游子夏問孝意雖不同然自今觀之奉養而無狎恩恃愛之失主敬而無嚴恭儼恪之偏儘是難曰既知二失則中間須自有箇處之之理愛而不敬非真愛也敬而不愛非真敬也敬非嚴恭儼恪之謂以此為敬則誤矣只把做件事小心畏謹便是敬道夫伯羽録云敬只是把做事小心畏謹不敢慢道問告子游子夏云云曰須當體察能養與服勞如何不足為孝敬時模樣如何只說得不濟事南升子夏之病乃子游之藥子游之病乃子夏之藥若以色難告子游以敬告子夏則以水濟水以火濟火故聖人藥各中其病方
