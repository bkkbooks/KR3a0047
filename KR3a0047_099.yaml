body:
  text: 朱子語類卷第九十九張子書二非類入近思者別為此卷正蒙有差分曉底看節或問正蒙中說得有病處還是他命辭不出有差還是見得差曰他是見得差如曰繼之者善也方是善惡混云云成之者性是到得聖人處方是成得性所以說知禮成性而道義出似這處都見得差了賀孫正蒙所論道體覺得源頭有未是處故伊川云過處乃在正蒙答書之中云非明睿所照而考索至此蓋橫渠卻只是一向苦思求將向前去卻欠涵泳以待其義理自形見處如云由氣化有道之名說得是好終是生受辛苦聖賢便不如此說試教明道說便不同如以太虛太和為道體卻只是說得形而下者皆是發而皆中節謂之和處橫渠教人道夜間自不合睡只為無可應接他人皆睡了己不得不睡他做正蒙時或夜裏默坐徹曉他直是恁地勇方做得因舉曾子任重道遠一段曰子思曾子直恁地方被他打得透榦橫渠作正蒙時中夜有得亦須起寫了方放下得而睡不然放不下無安著處正蒙說道體處如太和太虛虛空云者止是說氣說聚散處其流乃是箇大輪迴蓋其思慮攷索所至非性分自然之知若語道理惟是周子說無極而太極最好如由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名亦說得有理由氣化有道之名如所謂率性之謂道是也然使明道形容此理必不如此說伊川所謂橫渠之言誠有過者乃在正蒙以清虛一大為萬物之原有未安等語概可見矣人傑問橫渠說太和所謂道一段考索許多亦好其後乃云不如野馬絪縕不足謂之太和卻說倒了曰彼以太和狀道體與發而中節之和何異人傑問橫渠太虛之說本是說無極卻只說得無字曰無極是該貫虛實清濁而言無極字落在中間太虛字落在一邊了便是難說聖人熟了說出便恁地平正而今把意思去形容他卻有時偏了明道說氣外無神神外無氣謂清者為神則濁者非神乎後來亦有人與橫渠說橫渠卻云清者可以該濁虛者可以該實卻不知形而上者還他是理形而下者還他是器既說是虛便是與實對了既說是清便是與濁對了如左丞相大得右丞相不多問曰無極且得做無形無象說曰雖無形卻有理又問無極太極只是一物曰本是一物被他恁地說卻似兩物夔孫橫渠說道止於形器中揀箇好底說耳謂清為道則濁之中果非道乎客感客形與無感無形未免有兩截之病聖人不如此說如曰形而上者謂之道又曰一陰一陽之謂道人傑言客感客形與無感無形未免分截作兩段事聖人不如此說只說形而上形而下而已故又曰一陰一陽之謂道蓋陰陽雖是器而與道初不相離耳道與器豈各是一物乎問太虛不能無氣一段曰此難理會若看又走作去裏去偽問氣聚則離明得施而有形氣不聚則離明不得施而無形離明何謂也曰此說似難曉有作日光說有作目說看來只是氣聚則目得而見不聚則不得而見易所謂離為目是也先生因舉方其形也有以知幽之因方其不形也有以知明之故合當言其形也有以知明之故其不形也有以知幽之因方是卻反說何也蓋以形之時此幽之因已在此不形之際其明之故已在此聚者散之因散者聚之故一之寓同問橫渠云太虛即氣太虛何所指曰他亦指理但說得不分曉曰太和如何曰亦指氣曰他又云由昧者指虛空為性而不本天道如何曰既曰道則不是無釋氏便直指空了大要渠當初說出此道理多誤可學正蒙中地純陰天浮陽一段說日月五星甚密閎祖參兩篇橫渠云天左旋處其中者順之少遲則反右矣此說好閎祖橫渠言陰聚之陽必散之一段卻見得陰陽之情橫渠云陽為陰累則相持為雨而降陽氣正升忽遇陰氣則相持而下為雨蓋陽氣輕陰氣重故陽氣為陰氣壓墜而下也陰為陽得則飄揚為雲而升陰氣正升忽遇陽氣則助之飛騰而上為雲也陰氣凝聚陽在內者不得出則奮擊而為雷霆陽氣伏於陰氣之內不得出故爆開而為雷也陽在外者不得入則周旋不舍而為風陰氣凝結於內陽氣欲入不得故旋繞其外不已而為風至吹散陰氣盡乃已也和而散則為霜雪雨露不和而散則為戾氣曀霾戾氣飛雹之類曀霾黃霧之類皆陰陽邪惡不正之氣所以雹水穢濁或青黑色僩問橫渠言帝天之命主於民心曰皆此理也民心之所向即天心之所存也人傑天道篇問橫渠謂鬼神者往來屈伸之意故天曰神地曰示人曰鬼示字之義如何曰說文示字以有所示為義故視字從示天之氣生而不息故曰神地之氣顯然示人故曰示向嘗見三舍時舉子易義中有云一而大謂之天二而小謂之地二而小即示字也恐是字說又曰天曰神地曰示者蓋其氣未嘗或息也人鬼則其氣有所歸矣廣神化篇林問神為不測故緩辭不足以盡神化為難知故急辭不足以體化如何是緩辭急辭曰神自是急底物事緩辭如何形容之如陰陽不測之謂神神無方易無體皆是急辭化是漸漸而化若急辭以形容之則不可宇林問象若非氣指何為象時若非象指何為時云云答曰且如天地日月若無這氣何以撐住得成這象象無晦明何以別其為晝夜無寒無暑何以別其為冬夏宇天氣降而地氣不接則為霧地氣升而天氣不接則為雺見禮運注聲者氣形相軋而成兩氣風雷之類兩形桴鼓之類氣軋形如笙簧之類形軋氣如羽扇敲矢之類是皆物感之良能人習之而不察耳至動物篇問橫渠說天性在人猶水性之在冰凝釋雖異為理一也又言未嘗無之謂體體之謂性先生皆以其言為近釋氏冰水之喻有還元反本之病云近釋氏則可未嘗無之謂體體之謂性蓋謂性之為體本虛而理未嘗不實若與釋氏不同曰他意不是如此亦謂死而不亡耳文蔚誠明篇問張子冰水之說何謂近釋氏曰水性在冰只是凍凝成箇冰有甚造化及其釋則這冰復歸於水便有跡了與天性在人自不同曰程子器受日光之說便是否曰是除了器日光便不見卻無形了淳問橫渠謂所不能無感首無性性只是理安能感恐此言只可名心否曰橫渠此言雖未親切然亦有箇模樣蓋感固是心然所以感者亦是此心中有此理方能感理便是性但將此句要來解性便未端的如伊川說仁者天下之正理又曰仁者天下之公善之本也將此語來贊詠仁則可要來正解仁則未親切如義豈不是天下之正理淳問橫渠言物所不能無感謂性此語如何曰有此性自是因物有感見於君臣父子日用事物當然處皆感也所謂感而遂通是也此句對了天所不能自已謂命蓋此理自無息止時晝夜寒暑無一時停故逝者如斯而程子謂與道為體這道理今古晝夜無須臾息故曰不能已銖問聞見之知非德性之知他便把博物多能作聞見之知若如學者窮理豈不由此至德性之知曰自有不由聞見而知者可學大心篇問橫渠耳目知德性知曰便是差了雖在聞見亦同此理不知他資質如此何故如此差某云呂與叔難曉處似橫渠好處卻多曰他又曾見伊川某云他更在得一二十年須傳得伊川之學曰渠集中有與蘇季明一書可疑恐曾學佛可學賀孫再問前夜所說橫渠聖人不教人避凶處吉亦以正信勝之之語伯謨云此可以破世俗利害之說合理者無不吉悖理者無不凶然其間未免有相反者未有久而不定也先生因云諸葛誠之卻道呂不韋春秋好道他措置得事好卻道董子正其義不謀其利明其道不計其功說不是他便說若是利成則義自在其中功成則道自在其中賀孫大易篇問橫渠說遇曰他便說命就理說曰此遇乃是命曰然命有二有理有氣曰子思天命之謂性是理孟子是帶氣說曰然可學乾稱篇橫渠言遇命是天命遇是人事但說得亦不甚好不如孟子某又問曰但不知他說命如何可學橫渠闢釋氏輪回之說然其說聚散屈伸處其弊卻是大輪回蓋釋氏是箇箇各自輪回橫渠是一發和了依舊一大輪回呂與叔集中亦多有此意思橫渠所謂立得心只是作得主底意思端蒙以下理窟篇語錄並雜錄問橫渠得尺守尺得寸守寸之說曰不必如此且放寬地步不成讀書得一句且守一句須一面居敬持養將去德明用之問虛者仁之原曰此如克己復禮為仁又如太極動而生陽子蒙問虛者仁之原曰虛只是無欲故虛虛明無欲此仁之所由生也又問此虛字與一大清虛之虛如何曰這虛也只是無欲渠便將這箇喚做道體然虛對實而言卻不似形而上者銖問橫渠有清虛一大之說又要兼清濁虛實曰渠初云清虛一大為伊川詰難乃云清兼濁虛兼實一兼二大兼小渠本要說形而上反成形而下最是於此處不分明如參兩云以參為陽兩為陰陽有太極陰無太極他要強索精思必得於己而其差如此又問橫渠云太虛即氣乃是指理為虛似非形而下曰縱指理為虛亦如何夾氣作一處問西銘所見又的當何故卻於此差曰伊川云譬如以管窺天四旁雖不見而其見處甚分明渠他處見錯獨於西銘見得好可學或問橫渠先生清虛一大之說如何曰他是揀那大底說話來該攝那小底卻不知道纔是恁說便偏了便是形而下者不是形而上者須是兼清濁虛實一二小大來看方見得形而上者行乎其間橫渠清虛一大卻是偏他後來又要兼清濁虛實言然皆是形而下蓋有此理則清濁虛實皆在其中可學橫渠說氣清虛一大恰似道有有處有無處須是清濁虛實一二大小皆行乎其間乃是道也其欲大之乃反小之方陳後之問橫渠清虛一大恐入空去否曰也不是入空他都向一邊了這道理本平正清也有是理濁也有是理虛也有是理實也有是理皆此理之所為也他說成這一邊有那一邊無要將這一邊去管那一邊淳清虛一大形容道體如此道兼虛實言虛只說得一邊閎祖橫渠言清虛一大為道體是於形器中揀出好底來說耳遺書中明道嘗辨之或者別立一天疑即是橫渠可學問橫渠說虛云亦有箇意思只是難說要之只動而無動靜而無靜說為善橫渠又說至虛無應有病方問中虛信之本中實信之質如何曰只看中虛中實字便見本質之異中虛是無事時虛而無物故曰中虛若有物則不謂之中虛自中虛中發出來皆是實理所以曰中實燾問中虛信之本曰中虛只是自家無私主故發出來無非真實纔有些私於中便不虛不信矣燾問心如何能通以道使無限量曰心不是橫門硬迸教大得須是去物欲之蔽則清明而無不知窮事物之理則脫然有貫通處橫渠曰不以聞見梏其心大其心則能體天下之物所謂通之以道便是脫然有貫通處若只守聞見便自然狹窄了問心包誠一段曰是橫渠說話正如心小性大之意可學橫渠云以誠包心不若以心包誠是他看得忒重故他有心小性大之說道夫因看語錄心小性大心不弘於性滯於知思說及上蔡云心有止說遂云心有何窮盡只得此本然之體推而應事接物皆是故於此知性之無所不有知天亦以此因省李先生云盡心者如孟子見齊王問樂則便對云云言貨色則便對云云每遇一事便有以處置將去此是盡心舊時不之曉蓋此乃盡心之效如此得此本然之心則皆推得去無窮也如見牛未見羊說苟見羊則亦便是此心矣方橫渠云以道體身非以身體道蓋是主於義理只知有義理卻將身只做物樣看待謂如先理會身上利害是非便是以身體道如顏子非禮勿視便只知有禮不知有己耳問橫渠說以道體身等處曰只是有義理直把自家作無物看伊川亦云除卻身只是理懸空只是箇義理人傑橫渠云學者識得仁體後如讀書講明義理皆是培壅且只於仁體上求得一箇真實卻儘有下工夫處也謨道夫問張子云以心克己即是復性復性便是行仁義竊謂克己便是克去私心卻云以心克己莫剩卻以心兩字否曰克己便是此心克之公但看為仁由己而由人乎哉非心而何言忠信行篤敬立則見其參於前在輿則見其倚於衡這不是心是甚麼凡此等皆心所為但不必更著心字所以夫子不言心但只說在裏教人做如喫飯須是口寫字須是手更不用說口喫手寫又問復性便是行仁義復是方復得此性如何便說行得曰既復得此性便恁地行纔去得不仁不義則所行便是仁義那得一箇在不仁不義與仁義之中底物事不是人欲便是天理不是天理便是人欲所以謂欲知舜與蹠之分者無他利與善之間也所隔甚不多但聖賢把得這界定爾道夫
