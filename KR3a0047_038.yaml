body:
  text: 朱子語類卷第三十八論語二十鄉黨篇總論鄉黨記聖人動容周旋無不中禮泳如鄉黨說聖人容色處是以有事觀聖人如言燕居申申夭夭是以無事時觀聖人學者於此又知得聖人無時無處而不然燾鄉黨一篇自天命之謂性至道不可須臾離也皆在裏面許多道理皆自聖人身上迸出來惟聖人做得甚分曉故門人見之熟是以紀之詳也問看論語及鄉黨之半曰覺公看得淺未甚切己終了鄉黨篇更須從頭溫一過許多說話盡在集注中賀孫問賀孫讀鄉黨已終覺得意思如何曰見得段段都是道理合著如此不如此定不得才有些子不如此心下便不安曰聖賢一句是一箇道理要得教人識著都是要人收拾已放之心所謂學問之道無他求其放心而已非是學問只在求放心非把求放心為學問工夫乃是學問皆所以求放心如詩三百一言以蔽之曰思無邪大要皆欲使人思無邪而已賀孫第一節鄉黨宗廟朝廷言貌不同看鄉黨篇須以心體之孔子於鄉黨恂恂如也似不能言者如何是似不能言者宗廟朝廷便便言唯謹如何是便便言唯謹朝與下大夫言侃侃如也與上大夫言誾誾如也如何是侃侃如何是誾誾義剛録云看鄉黨一篇須是想像他恂恂是如何誾誾是如何不可一滾看問先生解侃侃誾誾四字不與古注同古注以侃侃為和樂誾誾為中正曰衎字乃訓和樂與此侃字不同說文以侃為剛直後漢書中亦云侃然正色誾誾是和說而諍此意思甚好和說則不失事上之恭諍則又不失自家義理之正廣或問鄉黨如恂恂侃侃之類曰如此類解說則甚易須是以心體之真自見箇氣象始得士毅問孔子於鄉黨恂恂如也似不能言者或有大是非利害似不可不說所謂似不能言者恐但當以卑遜為主所以說似不能言曰不是全不說但較之宗廟朝廷為不敢多說耳問其在宗廟朝廷集注云宗廟禮法之所在在宗廟則每事問固是禮法之所在不知聖人還已知之而猶問還以其名物制度之非古而因訂之曰便是這處某嘗道是孔子初仕時如此若初來問一番了後番番來番番問恐不如此孰謂鄹人之子知禮乎呼曰鄹人之子是與孔子父相識者有此語多應是孔子初年賀孫第二節在朝廷事上接下不同亞夫問朝與下大夫言侃侃如也與上大夫言誾誾如也曰侃侃是剛直貌以其位不甚尊故吾之言可得而直遂至於上大夫之前則雖有所諍必須有含蓄不盡底意思不如侃侃之發露得盡也閔子侍側一章義亦如此時舉問注云侃侃剛直誾誾是和悅而諍不知諍意思如何曰說道和悅終不成一向放倒了到合辨別處也須辨別始得內不失其事上之禮而外不至於曲從如古人用這般字不是只說字義須是想像這意思是如此如恂恂皆是有此意思方下此字如史記云魯道之衰洙泗之間齗齗如也齗誾字同這正見和悅而諍底意思當道化盛時斑白者不提挈不負戴於道路少壯者代其事到周衰少壯者尚欲執其任而老者自不肯安爭欲自提挈自負戴此正是和悅而諍賀孫誾誾說文云和悅而諍看得字義是一難底字緣有爭義漢志洙泗之間齗齗義一同兩齒相斷泳漢書諸尚書爭一件事其中有云誾誾侃侃得禮之容緘默邪心非朝廷福泳第三節為君擯相問賓不顧矣曰古者賓退主人送出門外設兩拜賓更不顧而去國君於列國之卿大夫亦如此燾問君召使擯擯如其命數之半如上公九命則擯者五人以次傳命曰古者擯介之儀甚煩如九命擯五人介則如命數是九人賓主相見自擯以下列兩行行末相近如主人說一句主人之擯傳許多擯者訖又交過末介傳中介直至賓之上介方聞之賓賀孫古者相見之禮主人有擯賓有介賓傳命於上介上介傳之次介次介傳之末介末介傳之末擯末擯傳之次擯次擯傳之上擯上擯傳之主人然後賓主方相見又曰看來古人大故淳朴人君出命不甚會說話所以著人代他說話燾植舉注云揖左人則左其手揖右人則右其手揖左人傳命出也揖右人傳命入也曰然植集注引朝氏說謂孔子無使擯執圭之事正淳曰定公十年夾谷之會孔子相恐即擯相之相曰相自是相擯自是擯相是相其禮儀擯是傳道言語故擯用命數之半以次傳說必大今集注無第四節在朝之容立不中門行不履閾注云棖闑之間由闑右不踐閾只是自外入右邊門中乃君出入之所闑如一木拄門如今人多用石墩當兩門中臣傍闑右邊出入此右字自內出而言賀孫棖如今羇頭相似闑當中礙門者今城門有之古人常掩左扉人君多出在門外見人所以當棖闑之間為君位泳問立不中門或問謂門之左右扉各有中其制可考否曰門之中有闑扉之兩旁有棖棖闑之間即中古人常闔左扉所謂中門者謂右扉之中也必大蕭問過位色勃如也位謂門屏之間人君寧立之處曰古今之制不同今之朝儀用秦制也古者朝會君臣皆立故史記謂秦王一旦捐賓客而不立朝君立於門屏之間屏者乃門間蕭牆也今殿門亦設之三公九卿以下設位於廷中故謂之三槐九棘者廷中有樹處公卿位當其下也雉過位注云君之虛位謂門屏之間曰如今人廳門之內屏門之外似周禮所謂外朝也植問復其位踧踖如也曰此是到末梢又結算則箇若衆人到末梢便撒了聖人則始乎敬終乎敬故到末梢又整頓則箇燾第五節為君聘上如揖下如授舊說亦好但此方說升堂時其容如此既升堂納圭於君前即不復執之以下故說做下堂不得所以只用平衡之說言之上下謂執圭之高低也必大執圭上如揖下如授前輩多作上階之上下階之下其實既下則已不用笏往往授介者只是高不過於揖故如揖下不低於授故如授賀孫享禮有容色曰聘但以圭至享則更用圭璧庭實植問聘享之禮曰正行聘禮畢而後行享禮聘是以命圭通信少間仍舊退還命圭享是獻其圭璧琮璜非命圭也幣皮輿馬之類皆拜跪以獻退而又以物獻其夫人凡三四次方畢所獻之物皆受但少間別有物回之又問庭實曰皮幣輿馬皆陳之於庭實私覿是所遣之大夫既以君命行聘享之禮畢卻行私禮參見他國之君也燾饗禮有容色儀禮謂發氣滿容何故如此曰聘是初見時故其意極於恭肅既聘而享則用圭璧以通信有庭實以將其意比聘時漸紓也聘禮篇廣私覿愈愈曰聘者享禮乃其君之信私覿則聘使亦有私禮物與所聘之國君及其大臣植第六節衣服之制君子不以紺緅飾紅紫不以為褻服今反以紅紫為朝服賀孫紺是而今深底鴉青色義剛紺深青揚赤色揚浮也植問緅以飾練服緅是絳色練服是小祥後喪服如何用絳色以為飾曰便是不可曉此箇制度差異絳是淺紅色紺是青赤色如今之閃青也廣問紅紫且近於婦人女子之服不知古之婦人女子亦多以紅紫為服否曰此亦不可知但據先儒如此說耳廣蒨纁絳朱此紅之染數一入為蒨再入為纁三入為絳四入為朱子蒙當暑袗絺綌必表而出之與蒙彼皺絺有兩說泳裘乃純用獸皮而加裏衣如今之貂裘或問狐白裘曰是集衆狐為之植第七節謹齊事明衣即是箇布衫長一身有半欲蔽足爾又曰即浴衣也見玉藻注植問變食謂不飲酒不茹葷而今之致齊者有酒何也曰飲酒非也但禮中亦有飲不至醉之說廣問齊必變食曰葷是不食五辛第八節飲食之制一言一語一動一作一坐一立一飲一食都有是非是底便是天理非底便是人欲如孔子失飪不食不時不食割不正不食不多食無非天理如口腹之人不時也食不正也食失飪也食便都是人欲便都是逆天理如只喫得許多物事如不當喫才去貪喫不住都是逆天理看道理只管進只管細便好只管見上面只管有一重方好如一物相似剝一重又剝一重又有一重又剝一重剝到四五重剝得許多皮殼都盡方見真實底今人不是不理會道理只是不肯子細只守著自底便了是是非非一向都沒分別如詖淫邪遁之辭也不消得辨便說道是他自陷自蔽自如此且恁地和同過也不妨賀孫問割不正不食與席不正不坐此是聖人之心純正故日用間才有不正處便與心不相合心亦不安曰聖人之心無毫釐之差謂如事當恁地做時便硬要恁地做且如不得其醬不食這一物合用醬而不得其醬聖人寧可不喫蓋皆欲得其當然之則故也又問注云精鑿也曰是插教那米白著燾不得其醬不食其字正緊要其醬如魚膾芥醬之類閎祖不得其醬如今所謂醬如禮記內則中有數般醬隨所用而不同植肉雖多不使勝食氣非特肉也凡蔬果之類皆不可勝食氣泳第十節居鄉問鄉人儺朝服而立於阼階集注云庶其依己而安或云存室神蓋五祀之屬子孫之精神即祖考之精神故祖考之精神依於己若門行戶灶之屬吾身朝夕之所出處則鬼神亦必依己而存曰然一家之主則一家之鬼神屬焉諸侯守一國則一國鬼神屬焉天子有天下則天下鬼神屬焉看來為天子者這一箇神明是多少大如何有些子差忒得若縱欲無度天上許多星辰地下許多山川如何不變怪蔡云子陵足加帝腹便見客星侵帝座曰殷之未喪師克配上帝紂未做不好時便與天相配是甚細事賀孫第十一節與人交之誠意蘇實問問人於他邦再拜而送之曰古人重此禮遣使者問人於他邦則主人拜而送之從背脊後拜潘子善因言浙中若納婦嫁娶盛禮時遣人入傳語婚姻之家亦拜送之至反命則不拜也植問康子饋藥拜而受之看此一事見聖人應接之間義理發見極其周密曰這般所在卻是龜山看得子細云大夫有賜拜而受之禮也未達不敢嘗所以慎疾必告之直也直而有禮故其直不絞龜山為人粘泥故說之較密賀孫第十二節事君之禮君祭先飯尋常則主人延客祭如世俗出生之類今侍食於君君祭則臣先自喫飯若為君嘗食然不敢當客禮也膳人取那飲食來請君祭泳問疾君視之方東首常時首當在那邊禮記自云寢常當東首矣平時亦欲受生氣恐不獨於疾時為然曰常時多東首亦有隨意臥時節如記云請席何向請衽何趾這見得有隨意向時節然多是東首故玉藻云居常當戶寢常東首也常寢於北牖下君問疾則移南牖下賀孫問病者居北牖之義曰是就北牖下安床睡因君來故遷之南牖下使以南面視己耳義剛第十三節交朋友之義問朋友死無所歸曰於我殯朋友之饋非祭肉不拜朋友之義固當如此後世同志者少而泛然交處者多只得隨其淺深厚薄度吾力量為之寧可過厚不可過薄曰朋友交游固有淺深若泛然之交一一要周旋也不可於自家情分稍厚自著如此須是情文相稱若泛泛施之卻是曲意徇物古人於這般所在自分明如交友稱其信也執友稱其仁也自有許多樣又如於師吾哭諸寢朋友哭諸寢門之外所知哭於野恩義自有許多節賀孫第十四節容貌之變問記云若有疾風迅雷甚雨雖夜必興衣服冠而坐看來不如此定是不安但有終日之雷終夜之雨如何得常如此曰固當常如此但亦主於疾風迅雷甚雨若平平底雷風雨也不消如此問當應接之際無相妨否曰有事也只得應賀孫第十五節升車之容立之說車中不內顧一章曰立視五雋式視馬尾蓋雋是車輪一轉之地車輪高六尺圍三徑一則闊丈八五轉則正為九丈矣立視雖遠亦不過此時舉
