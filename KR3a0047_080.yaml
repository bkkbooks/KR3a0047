body:
  text: 朱子語類卷第八十詩一綱領只是思無邪一句好不是一部詩皆思無邪振溫柔敦厚詩之教也使篇篇皆是譏刺人安得溫柔敦厚璘因論詩曰孔子取詩只取大意三百篇也有會做底有不會做底如君子偕老子之不淑云如之何此是顯然譏刺他到第二章已下又全然放寬豈不是亂道如載馳詩煞有首尾委曲詳盡非大段會底說不得又如鶴鳴做得極巧更含蓄意思全然不露如清廟一倡三歎者人多理會不得注下分明說一人倡之三人和之譬如今人挽歌之類今人解者又須要胡說亂說祖道問刪詩曰那曾見得聖人執筆刪那箇存這箇也只得就相傳上說去賀孫問詩次序是當如此否曰不見得只是楚茨信南山甫田大田諸詩元初卻當作一片又曰如卷阿說豈弟君子自作賢者如泂酌說豈弟君子自作人君大抵詩中有可以比並看底有不可如此看自有這般樣子賀孫說卷阿與詩傳不同以下論詩次序章句詩人只見他恁地重三疊四說將謂是無倫理次序不知他一句不胡亂下文蔚曰今日偶看棫樸一篇凡有五章前三章是說人歸附文王之德後二章乃言文王有作人之功及紀綱四方之德致得人歸附者在此一篇之意次第甚明曰然遐不作人卻是說他鼓舞作興底事功夫細密處又在後一章如曰勉勉我王綱紀四方四方便都在他線索內牽著都動文蔚曰勉勉即是純亦不已否曰然追琢其章金玉其相是那工夫到後文章真箇是盛美資質真箇是堅實文蔚恭父問詩章起於誰曰有故言者是指毛公無故言者皆是鄭康成有全章換一韻處有全押韻處如頌中有全篇句句是韻如殷武之類無兩句不是韻到稼穡匪解自欠了一句前輩分章都曉不得某細讀方知是欠了一句賀孫李善注文選其中多有韓詩章句常欲寫出易直子諒韓詩作慈良方子問王風是他風如此不是降為國風曰其辭語可見風多出於在下之人雅乃士夫所作雅雖有刺而其辭莊重與風異可學以下論風雅頌大序言一國之事係一人之本謂之風所以析衛為邶鄘衛曰詩古之樂也亦如今之歌曲音各不同衛有衛音鄘有鄘音邶有邶音故詩有鄘音者係之鄘有邶音者係之邶若大雅小雅則亦如今之商調宮調作歌曲者亦按其腔調而作爾大雅小雅亦古作樂之體格按大雅體格作大雅按小雅體格作小雅非是做成詩後旋相度其辭目為大雅小雅也大抵國風是民庶所作雅是朝廷之詩頌是宗廟之詩又云小序漢儒所作有可信處絕少大序好處多然亦有不滿人意處去偽器之問風雅與無天子之風之義先生舉鄭漁仲之說言出於朝廷者為雅出於民俗者為風文武之時周召之作者謂之周召之風東遷之後王畿之民作者謂之王風似乎大約是如此亦不敢為斷然之說但古人作詩體自不同雅自是雅之體風自是風之體如今人做詩曲亦自有體製不同者自不可亂不必說雅之降為風今且就詩上理會意義其不可曉處不必反倒因說嘗見蔡行之舉陳君舉說春秋云須先看聖人所不書處方見所書之義見成所書者更自理會不得卻又取不書者來理會少間只是說得奇巧木之詩有是當時朝廷作者雅頌是也若國風乃採詩有採之民間以見四方民情之美惡二南亦是採民言而被樂章爾程先生必要說是周公作以教人不知是如何某不敢從若變風又多是淫亂之詩故班固言男女相與歌詠以言其傷是也聖人存此亦以見上失其教則民欲動情勝其弊至此故曰詩可以觀也且詩有六義先儒更不曾說得明卻因周禮說豳詩有豳雅豳頌即於一詩之中要見六義思之皆不然蓋所謂六義者風雅頌乃是樂章之腔調如言仲呂調大石調越調之類至比興賦又別直指其名直敘其事者賦也本要言其事而虛用兩句釣起因而接續去者興也引物為況者比也立此六義非特使人知其聲音之所當又欲使歌者知作詩之法度也問豳之所以為雅為頌者恐是可以用雅底腔調又可用頌底腔調否曰恐是如此某亦不敢如此斷今只說恐是亡其二大雅問二雅所以分曰小雅是所係者小大雅是所係者大呦呦鹿鳴其義小文王在上於昭于天其義大問變雅曰亦是變用他腔調爾大抵今人說詩多去辨他序文要求著落至其正文關關雎鳩之義卻不與理會王德修云詩序只是國史一句可信如關雎后妃之德也此下即講師說如蕩詩自是說蕩蕩上帝序卻言是天下蕩蕩賚詩自是說文王既勤止我應受之是說後世子孫賴其祖宗基業之意他序卻說賚予也豈不是後人多被講師瞞耶曰此是蘇子由曾說來然亦有不通處如漢廣德廣所及也有何義理卻是下面無思犯禮求而不可得幾句卻有理若某只上一句亦不敢信他舊曾有一老儒鄭漁仲更不信小序只依古本與疊在後面某今亦只如此令人虛心看正文久之其義自見蓋所謂序者類多世儒之誤不解詩人本意處甚多且如止乎禮義果能止禮義否桑中之詩禮義在何處王曰他要存戒曰此正文中無戒意只是直述他淫亂事爾若鶉之奔奔相鼠等詩卻是譏罵可以為戒此則不然某今看得鄭詩自叔于田等詩之外如狡童子衿等篇皆淫亂之詩而說詩者誤以為刺昭公刺學校廢耳衛詩尚可猶是男子戲婦人鄭詩則不然多是婦人戲男子所以聖人尤惡鄭聲也出其東門卻是箇識道理底人做大雅林子武問詩者中聲之所止曰這只是正風雅頌是中聲那變風不是伯恭堅要牽合說是然恐無此理今但去讀看便自有那輕薄底意思在了如韓愈說數句其聲浮且淫之類這正是如此義剛問比興曰說出那物事來是興不說出那物事是比如南有喬木只是說箇漢有游女奕奕寢廟君子作之只說箇他人有心予忖度之關雎亦然皆是興體比底只是從頭比下來不說破興比相近卻不同周禮說以六詩教國子其實只是這賦比興三箇物事風雅頌詩之標名理會得那興比賦時裏面全不大段費解今人要細解不道此說為是如奕奕寢廟不認得意在那他人有心處只管解那奕奕寢廟植以下賦比興問詩中說興處多近比曰然如關雎麟趾相似皆是興而兼比然雖近比其體卻只是興且如關關雎鳩本是興起到得下面說窈窕淑女此方是入題說那實事蓋興是以一箇物事貼一箇物事說上文興而起下文便接說實事如麟之趾下文便接振振公子一箇對一箇說蓋公本是箇好底人子也好孫也好族人也好譬如麟趾也好定也好角也好及比則卻不入題了如比那一物說便是說實事如螽斯羽詵詵兮宜爾子孫振振兮螽斯羽一句便是說那人了下面宜爾子孫依舊是就螽斯羽上說更不用說實事此所以謂之比大率詩中比興皆類此僩比雖是較切然興卻意較深遠也有興而不甚深遠者比而深遠者又係人之高下有做得好底有拙底常看後世如魏文帝之徒作詩皆只是說風景獨曹操愛說周公其詩中屢說便是那曹操意思也是較別也是乖義剛比是以一物比一物而所指之事常在言外興是借彼一物以引起此事而其事常在下句但比意雖切而卻淺興意雖闊而味長賀孫詩之興全無巴鼻振錄云多是假他物舉起全不取其義後人詩猶有此體如青青陵上柏磊磊澗中石人生天地間忽如遠行客又如高山有涯林木有枝憂來無端人莫之知青青河畔草綿綿思遠道皆是此體方子振錄同六義自鄭氏以來失之后妃自程先生以來失之后妃安知當時之稱如何可學以下六義或問詩六義注三經三緯之說曰三經是賦比興是做詩底骨子無詩不有才無則不成詩蓋不是賦便是比不是比便是興如風雅頌卻是裏面橫丳底都有賦比興故謂之三緯燾器之問詩傳分別六義有未備處曰不必又只管滯卻許多且看詩意義如何古人一篇詩必有一篇意思且要理會得這箇如柏舟之詩只說到靜言思之不能奮飛綠衣之詩說我思古人實獲我心此可謂止乎禮義所謂可以怨便是喜怒哀樂發而皆中節處推此以觀則子之不得於父臣之不得於君朋友之不相信皆當以此意處之如屈原之懷沙赴水賈誼言歷九州而相其君何必懷此都也便都過常了古人胸中發出意思自好看著三百篇詩則後世之詩多不足觀矣木之問詩傳說六義以託物興辭為興與舊說不同曰覺舊說費力失本指如興體不一或借眼前物事說將起或別自將一物說起大抵只是將三四句引起如唐時尚有此等詩體如青青河畔草青青水中蒲皆是別借此物興起其辭非必有感而見於此物也有將物之無興起自家之所有將物之有興起自家之所無前輩都理會這箇不分明如何說得詩本指只伊川也自未見得看所說有甚廣大處子細看本指卻不如此若上蔡怕曉得詩如云讀詩須先要識得六義體面這是他識得要領處問詩雖是吟詠使人自有興起固不專在文辭然亦須是篇篇句句理會著實見得古人所以作此詩之意方始於吟詠上有得曰固是若不得其真實吟詠箇甚麼然古人已多不曉其意如左傳所載歌詩多與本意元不相關問我將維天其右之既右享之今所解都作左右之右與舊不同曰周禮有享右祭祀之文如詩中此例亦多如既右烈考亦右文母之類如我將所云作保祐說更難方說維羊維牛如何便說保祐到伊嘏文王既右享之也說未得右助之右問振鷺詩不是正祭之樂歌乃獻助祭之臣未審如何曰看此文意都無告神之語恐是獻助祭之臣古者祭祀每一受胙主與賓尸皆有獻酬之禮既畢然後亞獻至獻畢復受胙如此禮意甚好有接續意思到唐時尚然今併受胙於諸獻既畢之後主與賓尸意思皆隔了古者一祭之中所以多事如季氏祭逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戶堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎古人祭禮是大段有節奏賀孫詩序起關雎后妃之德也止教以化之大序起詩者志之所之也止詩之至也敬仲以下大序聲發出於口成文而節宣和暢謂之音乃合於音調如今之唱曲合宮調商調之類敬仲詩大序亦只是後人作其間有病句國史方子詩纔說得密便說他不著國史明乎得失之跡這一句也有病周禮禮記中史並不掌詩左傳說自分曉以此見得大序亦未必是聖人做小序更不須說他做小序不會寬說每篇便求一箇實事填塞了他有尋得著底猶自可通不然便與詩相礙那解底要就詩卻礙序要就序卻礙詩詩之興是劈頭說那沒來由底兩句下面方說那事這箇如何通解鄭聲淫所以鄭詩多是淫佚之辭狡童將仲子之類是也今喚做忽與祭仲與詩辭全不相似這箇只似而今閑潑曲子南山有臺等數篇是燕享時常用底敘賓主相好之意一似今人致語又曰詩小序不可信而今看詩有詩中分明說是某人某事者則可知其他不曾說者而今但可知其說此等事而已韓退之詩曰春秋書王法不誅其人身高大序亦有未盡如發乎情止乎禮義又只是說正詩變風何嘗止乎禮義振問止乎禮義曰如變風柏舟等詩謂之止乎禮義可也桑中諸篇曰止乎禮義則不可蓋大綱有止乎禮義者止乎禮義如泉水載馳固止乎禮義如桑中有甚禮義大序只是揀好底說亦未盡淳詩大序只有六義之說是而程先生不知如何又卻說從別處去如小序亦間有說得好處只是杜撰處多不知先儒何故不虛心子細看這道理便只恁說卻後人又只依他那箇說出亦不看詩是有此意無若說不去處又須穿鑿說將去又詩人當時多有唱和之詞如是者有十數篇序中都說從別處去且如蟋蟀一篇本其風俗勤儉其民終歲勤勞不得少休及歲之暮方且相與燕樂而又遽相戒曰日月其除無已太康蓋謂今雖不可以不為樂然不已過於樂乎其憂深思遠固如此至山有樞一詩特以和答其意而解其憂爾故說山則有樞矣隰則有榆矣子有衣裳弗曳弗婁子有車馬弗馳弗驅一旦宛然以死則他人藉之以為樂爾所以解勸他及時而樂也而序蟋蟀者則曰刺晉僖公儉不中禮蓋風俗之變必由上以及下今謂君之儉反過於禮而民之俗猶知用禮則必無是理也至山有樞則以為刺晉昭公又大不然矣若魚藻則天子燕諸侯而諸侯美天子之詩也采菽則天子所以答魚藻矣至鹿鳴則燕享賓客也序頗得其意四牡則勞使臣也而詩序下文則妄矣皇皇者華則遣使臣之詩也棠棣則燕兄弟之詩也序固得其意伐木則燕朋友故舊之詩也人君以鹿鳴而下五詩燕其臣故臣受君之賜者則歌天保之詩以答其上天保之序雖略得此意而古注言鹿鳴至伐木皆君所以下其臣臣亦歸美於上崇君之尊而福祿之以答其歌卻說得尤分明又如行葦自是祭畢而燕父兄耆老之詩首章言開燕設席之初而慇懃篤厚之意已見於言語之外二章言侍御獻酬飲食歌樂之盛三章言既燕而射以為懽樂末章祝頌其既飲此酒皆得享夫長壽今序者不知本旨見有勿踐履之說則便謂仁及草木見戚戚兄弟便謂親睦九族見黃耇台背便謂養老見以祈黃耇便謂乞言見介爾景福便謂成其福祿細細碎碎殊無倫理其失為尤甚既醉則父兄所以答行葦之詩也鳧鷖則祭之明日繹而賓尸之詩也古者宗廟之祭皆有尸既祭之明日則煖其祭食以燕為尸之人故有此詩假樂則公尸之所以答鳧鷖也今序篇皆失之又曰詩即所謂樂章雖有唱和之意祇是樂工代歌亦非是君臣自歌也道夫詩書序當開在後面升卿以下小序敬之問詩書序曰古本自是別作一處如易大傳班固序傳並在後京師舊本揚子注其序亦總在後德明王德修曰六經惟詩最分明曰詩本易明只被前面序作梗序出於漢儒反亂詩本意且只將四字成句底詩讀卻自分曉見作詩集傳待取詩令編排放前面驅逐過後面自作一處文蔚詩序作而觀詩者不知詩意節詩序東漢儒林傳分明說道是衛宏作後來經意不明都是被他壞了某又看得亦不是衛宏一手作多是兩三手合成一序愈說愈疏浩云蘇子由卻不取小序曰他雖不取下面言語留了上一句便是病根伯恭專信序又不免牽合伯恭凡百長厚不肯非毀前輩要出脫回護不知道只為得箇解經人卻不曾為得聖人本意是便道是不是便道不是方得浩詩小序全不可信如何定知是美刺那人詩人亦有意思偶然而作者又其序與詩全不相合詩詞理甚順平易易看不如序所云且如葛覃一篇只是見葛而思歸寧序得卻如此毛公全無序解鄭間見之序是衛宏作小序極有難曉處多是附會如魚藻詩見有王在鎬之言便以為君子思古之武王似此類甚多可學因論詩歷言小序大無義理皆是後人杜撰先後增益湊合而作多就詩中採摭言語更不能發明詩之大旨纔見有漢之廣矣之句便以為德廣所及才見有命彼後車之言便以為不能飲食教載行葦之序但見牛羊勿踐便謂仁及草木但見戚戚兄弟便為親睦九族見黃耇台背便謂養老見以祈黃耇便謂乞言見介爾景福便謂成其福祿隨文生義無復理論卷耳之序以求賢審官知臣下之勤勞為后妃之志事固不倫矣況詩中所謂嗟我懷人其言親暱太甚寧后妃所得施於使臣者哉桃夭之詩謂婚姻以時國無鰥民為后妃之所致而不知其為文王刑家及國其化固如此豈專后妃所能致耶其他變風諸詩未必是刺者皆以為刺未必是言此人必傅會以為此人桑中之詩放蕩留連止是淫者相戲之辭豈有刺人之惡而反自陷於流蕩之中子衿詞意輕儇亦豈刺學校之辭有女同車等皆以為刺忽而作鄭忽不娶齊女其初亦是好底意思但見後來失國便將許多詩盡為刺忽而作考之於忽所謂淫昏暴虐之類皆無其實至遂目為狡童豈詩人愛君之意況其所以失國正坐柔懦闊疏亦何狡之有幽厲之刺亦有不然甫田諸篇凡詩中無詆譏之意者皆以為傷今思古而作其他謬誤不可勝說後世但見詩序巍然冠於篇首不敢復議其非至有解說不通多為飾辭以曲護之者其誤後學多矣大序卻好或者謂補湊而成亦有此理書小序亦未是只如堯典舜典便不能通貫一篇之意堯典不獨為遜舜一事舜典到歷試諸艱之外便不該通了其他書序亦然至如書大序亦疑不是孔安國文字大抵西漢文章渾厚近古雖董仲舒劉向之徒言語自別讀書大序便覺軟慢無氣未必不是後人所作也謨詩序實不足信向見鄭漁仲有詩辨妄力詆詩序其間言語太甚以為皆是村野妄人所作始亦疑之後來子細看一兩篇因質之史記國語然後知詩序之果不足信因是看行葦賓之初筵抑數篇序與詩全不相似以此看其他詩序其不足信者煞多以此知人不可亂說話便都被人看破了詩人假物興辭大率將上句引下句如行葦勿踐履戚戚兄弟莫遠具爾行葦是比兄弟勿字乃興莫字此詩自是飲酒會賓之意序者卻牽合作周家忠厚之詩遂以行葦為仁及草木如云酌以大斗以祈黃耇亦是歡合之時祝壽之意序者遂以為養老乞言豈知祈字本只是祝頌其高壽無乞言意也抑詩中間煞有好語亦非刺厲王如於乎小子豈是以此指其君兼厲王是暴虐大惡之主詩人不應不述其事實只說謹言節語況厲王無道謗訕者必不容武公如何恁地指斥曰小子國語以為武公自警之詩卻是可信大率古人作詩與今人作詩一般其間亦自有感物道情吟詠情性幾時盡是譏刺他人只緣序者立例篇篇要作美刺說將詩人意思盡穿鑿壞了且如今人見人纔做事便作一詩歌美之或譏刺之是甚麼道理如此亦似里巷無知之人胡亂稱頌諛說把持放鵰何以見先王之澤何以為情性之正詩中數處皆應答之詩如天保乃與鹿鳴為唱答行葦與既醉為唱答蟋蟀與山有樞為唱答唐自是晉未改號時國名自序者以為刺僖公便牽合謂此晉也而謂之唐乃有堯之遺風本意豈因此而謂之唐是皆鑿說但唐風自是尚有勤儉之意作詩者是一箇不敢放懷底人說今我不樂日月其除便又說無已太康職思其居到山有樞是答者便謂子有衣裳弗曳弗婁宛其死矣他人是愉子有鐘鼓弗鼓弗考宛其死矣他人是保這是答他不能享些快活徒恁地苦澀詩序亦有一二有憑據如清人碩人載馳諸詩是也昊天有成命中說成王不敢康成王只是成王何須牽合作成王業之王自序者恁地附會便謂周公作此以告成功他既作周公告成功便將成王字穿鑿說了又幾曾是郊祀天地被序者如此說後來遂生一場事端有南北郊之事此詩自說昊天有成命又不曾說著地如何說道祭天地之詩設使合祭亦須幾句說及后土如漢諸郊祀詩祭某神便說某事若用以祭地不應只說天不說地東萊詩記卻編得子細只是大本已失了更說甚麼向嘗與之論此如清人載馳一二詩可信渠卻云安得許多文字證據某云無證而可疑者只當闕之不可據序作證渠又云只此序便是證某因云今人不以詩說詩卻以序解詩是以委曲牽合必欲如序者之意寧失詩人之本意不恤也此是序者大害處賀孫詩序多是後人妄意推想詩人之美刺非古人之所作也古人之詩雖存而意不可得序詩者妄誕其說但疑見其人如此便以為是詩之美刺者必若人也如莊姜之詩卻以為刺衛頃公今觀史記所述頃公竟無一事可紀但言某公卒子某公立而已都無其事頃公固亦是衛一不美之君序詩者但見其詩有不美之跡便指為刺頃公之詩此類甚多皆是妄生美刺初無其實至有不能考者則但言刺詩也思賢妃也然此是汎汎而言如漢廣之序言德廣所及此語最亂道詩人言漢之廣矣其言已分曉至如下面小序卻說得是謂文王之化被于南國美化行乎江漢之域無思犯禮求而不可得也此數語卻好又云看來詩序當時只是箇山東學究等人做不是箇老師宿儒之言故所言都無一事是當如行葦之序雖皆是詩人之言但卻不得詩人之意不知而今做義人到這處將如何做於理決不順某謂此詩本是四章章八句他不知作八章章四句讀了如敦彼行葦牛羊勿踐履方苞方體惟葉泥泥戚戚兄弟莫遠具爾或肆之筵或授之几此詩本是興詩即是興起下四句言以行葦興兄弟勿踐履是莫遠意也又云鄭衛詩多是淫奔之詩鄭詩如將仲子以下皆鄙俚之言只是一時男女淫奔相誘之語如桑中之詩云眾散民流而不可止故樂記云桑間濮上之音亡國之音也其眾散其民流誣上行私而不可止也鄭詩自緇衣之外亦皆鄙俚如采蕭采艾青衿之類是也故夫子放鄭聲如抑之詩非詩人作以刺君乃武公為之以自警又有稱小子之言此必非臣下告君之語乃自謂之言無疑也卓問詩傳盡撤去小序何也曰小序如碩人定之方中等見於左傳者自可無疑若其他刺詩無所據多是世儒將他諡號不美者挨就立名爾今只考一篇見是如此故其他皆不敢信且如蘇公刺暴公固是姓暴者多萬一不見得是暴公則惟暴之云者只作一箇狂暴底人說亦可又如將仲子如何便見得是祭仲某由此見得小序大故是後世陋儒所作但既是千百年已往之詩今只見得大意便了又何必要指實得其人姓名於看詩有何益也大雅問詩傳多不解詩序何也曰某自二十歲時讀詩便覺小序無意義及去了小序只玩味詩詞卻又覺得道理貫徹當初亦嘗質問諸鄉先生皆云序不可廢而某之疑終不能釋後到三十歲斷然知小序之出於漢儒所作其為繆戾有不可勝言東萊不合只因序講解便有許多牽強處某嘗與言之終不肯信讀詩記中雖多說序然亦有說不行處亦廢之某因作詩傳遂成詩序辨說一冊其他繆戾辨之頗詳煇鄭漁仲謂詩小序只是後人將史傳去揀并看謚卻附會作小序美刺振伯恭黨得小序不好使人看著轉可惡振器之問詩協韻之義曰只要音韻相協好吟哦諷誦易見道理亦無甚要緊今且要將七分工夫理會義理三二分工夫理會這般去處若只管留心此處而於詩之義卻見不得亦何益也又曰協韻多用吳才老本或自以意補入木之以下論詩韻問詩協韻是當時如此作是樂歌當如此曰當時如此作古人文字多有如此者如正考父鼎銘之類可學問先生說詩率皆協韻得非詩本樂章播諸聲詩自然協韻方諧律呂其音節本如是耶曰固是如此然古人文章亦多是協韻因舉王制及老子協韻處數段又曰周頌多不協韻疑自有和底篇相協清廟之瑟朱弦而疏越一唱而三歎歎即和聲也儒用詩之音韻是自然如此這箇與天通古人音韻寬後人分得密後隔開了離騷注中發兩箇例在前朕皇考曰伯庸庚寅吾以降洪又重之以脩能耐紉秋蘭以為佩後人不曉卻謂只此兩韻如此某有楚辭協韻作子厚名字刻在漳州方子協韻恐當以頭一韻為準且如華字協音敷如有女同車是第一句則第二句顏如舜華當讀作敷字然後與下文佩玉瓊琚洵美且都皆協至如何彼穠矣唐棣之華是第一韻則當依本音讀而下文王姬之車卻當作尺奢反如此方是今只從吳才老舊說不能又創得此例然楚辭紛余既有此內美兮又重之以修能能音耐然後下文紉秋蘭以為佩協若能字只從本音則佩字遂無音如此則又未可以頭一韻為定也閎祖吳才老補韻甚詳然亦有推不去者某煞尋得當時不曾記今皆忘之矣如外禦其務協烝也無戎才老無尋處卻云務字古人讀做蒙不知戎汝也汝戎二字古人通用是協音汝也如南仲太祖太師皇父整我六師以修我戎亦是協音汝也下民有嚴協不敢怠遑才老欲音嚴為莊云避漢諱卻無道理某後來讀楚辭天問見一嚴字乃押從莊字乃知是協韻嚴讀作昂也天問才老豈不讀往往無甚意義只恁打過去也義剛饒何氏錄云中庸奏格無言奏音族平聲音騣所以毛詩作鬷字或問吳氏協韻何據曰他皆有據泉州有其書每一字多者引十餘證少者亦兩三證他說元初更多後刪去姑存此耳然猶有未盡因言商頌天命降監下民有嚴不僭不濫不敢怠遑吳氏云嚴字恐是莊字漢人避諱改作嚴字某後來因讀楚辭天問見嚴字都押入剛字方字去又此間鄉音嚴作戶剛反乃知嚴字自與皇字協然吳氏豈不曾看楚辭想是偶然失之又如兄弟鬩于牆外禦其務每有良朋烝也無戎吳氏復疑務當作蒙以協戎字某卻疑古人訓戎為汝如以佐戎辟戎雖小子則戎女音或通後來讀常武詩有云南仲太祖太師皇父整我六師以修我戎則與汝協明矣因言古之謠諺皆押韻如夏諺之類散文亦有押韻者如曲禮安民哉協音茲則與上面思辭二字協矣又如將上堂聲必揚將入戶視必下下協音護禮運孔子閒居亦多押韻莊子中尤多至於易彖辭皆韻語也又云禮記五至三無處皆協廣知子之來扐之雜佩以贈入之此例甚多作字作做保字作補往近王舅近音既說文作誤寫作近問詩協韻有何所據而言曰協韻乃吳才老所作某又續添減之蓋古人作詩皆押韻與今人歌曲一般今人信口讀之全失古人詠歌之意煇詩音韻間有不可曉處因說如今所在方言亦自有音韻與古合處子升因問今陽字卻與唐字通清字卻與青字分之類亦自不可曉曰古人韻疏後世韻方嚴密見某人好考古字卻說青字音自是親如此類極多木之器之問詩曰古人情意溫厚寬和道得言語自恁地好當時協韻只是要便於諷詠而已到得後來一向於字韻上嚴切卻無意思漢不如周魏晉不如漢唐不如魏晉本朝又不如唐如元微之劉禹錫之徒和詩猶自有韻相重密本朝和詩便定不要一字相同不知卻愈壞了詩木之論讀詩詩中頭項多一項是音韻一項是訓詁名件一項是文體若逐一根究然後討得些道理則殊不濟事須是通悟者方看得方子以下總論讀詩之方聖人有法度之言如春秋書禮是也一字皆有理如詩亦要逐字將理去讀便都礙了淳問聖人有法度之言如春秋書與周禮字較實詩無理會只是看大意若要將理去讀便礙了問變風變雅如何曰也是後人恁地說今也只依他恁地說如漢廣汝墳皆是說婦人如此則是文王之化只及婦人不及男子只看他大意恁地拘不得宇公不會看詩須是看他詩人意思好處是如何不好處是如何看他風土看他風俗又看他人情物態只看伐檀詩便見得他一箇清高底意思看碩鼠詩便見他一箇暴歛底意思好底意思是如此不好底是如彼好底意思令自家善意油然感動而興起看他不好底自家心下如著槍相似如此看方得詩意僩詩有說得曲折後好底有只恁平直說後自好底如燕燕末後一章這不要看上文考下章便知得是恁地意思自是高遠自是說得那人著義剛林子武說詩曰不消得恁地求之太深他當初只是平說橫看也好豎看也好今若要討箇路頭去裏面尋卻怕迫窄了義剛讀詩之法且如白華菅兮白茅束兮之子之遠俾我獨兮蓋言白華與茅尚能相依而我與子乃相去如此之遠何哉又如倬彼雲漢為章于天周王壽考遐不作人只是說雲漢恁地為章于天周王壽考豈不能作人也上兩句皆是引起下面說略有些意思傍著不須深求只此讀過便得僩看詩且看他大意如衛諸詩其中有說時事者固當細考如鄭之淫亂底詩若苦搜求他有甚意思一日看五六篇可也僩看詩義理外更好看他文章且如谷風他只是如此說出來然而敘得事曲折先後皆有次序而今人費盡氣力去做後尚做得不好義剛讀詩且只將做今人做底詩看或每日令人誦讀卻從旁聽之其話有未通者略檢注解看卻時時誦其本文便見其語脈所在又曰念此一詩既已記得其語卻逐箇字將前後一樣字通訓之今注解中有一字而兩三義者如假字有云大者有云至者只是隨處旋扭掜耳非通訓也先生因言看詩須并協韻讀便見得他語自整齊又更略知協韻所由來甚善又曰伊川有詩解數篇說到小雅以後極好蓋是王公大人好生地做都是識道理人言語故它裏面說得儘有道理好子細看非如國風或出於婦人小夫之口但可觀其大概也銖問以詩觀之雖千百載之遠人之情偽只此而已更無兩般曰以某看來須是別換過天地方別換一樣人情釋氏之說固不足據然其書說盡百千萬劫其事情亦只如此而已況天地無終窮人情安得有異必大看詩不要死殺看了見得無所不包今人看詩無興底意思節以下論讀詩在興起讀詩便長人一格如今人讀詩何緣會長一格詩之興最不緊要然興起人意處正在興會得詩人之興便有一格長豐水有虯武王豈不仕蓋曰豐水且有虯武王豈不有事乎此亦興之一體不必更注解如龜山說關雎處意亦好然終是說死了如此便詩眼不活必大問向見呂丈問讀詩之法呂丈舉橫渠置心平易之說見教某遵用其說去誦味來固有箇涵泳情性底道理然終不能有所啟發程子謂興於詩便知有著力處今讀之止見其善可為法惡可為戒而已不知其他如何著力曰善可為法惡可為戒不特詩也他書皆然古人獨以為興於詩者詩便有感發人底意思今讀之無所感發者正是被諸儒解殺了死著詩義興起人善意不得如南山有臺序云得賢則能為邦家立太平之基蓋為見詩中有邦家之基字故如此解此序自是好句但纔如此說定便局了一詩之意若果先得其本意雖如此說亦不妨正如易解若得聖人繫辭之意便橫說豎說都得今斷以一義解定易便不活詩所以能興起人處全在興如山有樞隰有榆別無意義只是興起下面子有車馬子有衣裳耳小雅諸篇皆君臣燕飲之詩道主人之意以譽賓如今人宴飲有致語之類亦間有敘賓客答辭者漢書載客歌驪駒主人歌客毋庸歸亦是此意古人以魚為重故魚麗南有嘉魚皆特舉以歌之儀禮載乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀本一套事後人移魚麗附於鹿鳴之什截以嘉魚以下為成王詩遂失當時用詩之意故胡亂解今觀魚麗嘉魚南山有臺等篇辭意皆同菁莪湛露蓼蕭皆燕飲之詩詩中所謂君子皆稱賓客後人卻以言人君正顛倒了如以湛露為恩澤皆非詩義故野有蔓草零露湑兮亦以為君之澤不下流皆局於一箇死例所以如此周禮以六詩教國子當時未有注解不過教之曰此興也此比也此賦也興者人便自作興看比者人便自作比看興只是興起謂下句直說不起故將上句帶起來說如何去上討義理今欲觀詩不若且置小序及舊說只將元詩虛心熟讀徐徐玩味候彷彿見箇詩人本意卻從此推尋將去方有感發如人拾得一箇無題目詩再三熟看亦須辨得出來若被舊說一局局定便看不出今雖說不用舊說終被他先入在內不期依舊從它去某向作詩解文字初用小序至解不行處亦曲為之說後來覺得不安第二次解者雖存小序間為辨破然終是不見詩人本意後來方知只盡去小序便自可通於是盡滌舊說詩意方活又曰變風中固多好詩雖其間有沒意思者然亦須得其命辭遣意處方可觀後人便自做箇道理解說於其造意下語處元不及究只後代文集中詩亦多不解其辭意者樂府中羅敷行羅敷即使君之妻使君即羅敷之夫其曰使君自有婦羅敷自有夫正相戲之辭又曰夫婿從東來千騎居上頭觀其氣象即使君也後人亦錯解了須得其辭意方見好笑處必大學者當興於詩須先去了小序只將本文熟讀玩味仍不可先看諸家注解看得久之自然認得此詩是說箇甚事謂如拾得箇無題目詩說此花既白又香是盛寒開必是梅花詩也卷阿召康公戒成王其始只說箇好意思如豈弟君子皆指成王純嘏爾壽之類皆說優游享福之事至有馮有翼以下方說用賢大抵告人之法亦當如此須先令人歆慕此事則其肯從吾言必樂為之矣人傑讀詩正在於吟詠諷誦觀其委曲折旋之意如吾自作此詩自然足以感發善心今公讀詩只是將己意去包籠他如做時文相似中間委曲周旋之意盡不曾理會得濟得甚事若如此看只一日便可看盡何用逐日只捱得數章而又不曾透徹耶且如人入城郭須是逐街坊里巷屋廬臺榭車馬人物一一看過方是今公等只是外面望見城是如此便說我都知得了如鄭詩雖淫亂然出其東門一詩卻如此好女曰雞鳴一詩意思亦好讀之真箇有不知手之舞足之蹈者僩以下論詩在熟讀玩味詩如今恁地注解了自是分曉易理會但須是沉潛諷誦玩味義理咀嚼滋味方有所益若是草草看過一部詩只兩三日可了但不得滋味也記不得全不濟事古人說詩可以興須是讀了有興起處方是讀詩若不能興起便不是讀詩因說永嘉之學只是要立新巧之說少間指摘東西鬥湊零碎便立說去縱說得是也只無益莫道又未是木之讀詩之法只是熟讀涵味自然和氣從胸中流出其妙處不可得而言不待安排措置務自立說只恁平讀著意思自足須是打疊得這心光蕩蕩地不立一箇字只管虛心讀他少間推來推去自然推出那箇道理所以說以此洗心便是以這道理盡洗出那心裏物事渾然都是道理上蔡曰學詩須先識得六義體面而諷味以得之此是讀詩之要法看來書只是要讀讀得熟時道理自見切忌先自布置立說僩問學者誦詩每篇誦得幾遍曰也不曾記只覺得熟便止曰便是不得須是讀熟了文義都曉得了涵泳讀取百來遍方見得那好處那好處方出方見得精怪見公每日說得來乾燥元來不曾熟讀若讀到精熟時意思自說不得如人下種子既下得種了須是討水去灌溉他討糞去培擁他與他耘鋤方是下工夫養他處今卻只下得箇種子了便休都無耘治培養工夫如人相見纔見了便散去都不曾交一談如此何益所以意思都不生與自家都不相入都恁地乾燥這箇貪多不得讀得這一篇恨不得常熟讀此篇如無那第二篇方好而今只是貪多讀第一篇了便要讀第二篇讀第二篇了便要讀第三篇恁地不成讀書此便是大不敬此句厲聲說須是殺了那走作底心方可讀書僩大凡讀書先曉得文義了只是常常熟讀如看詩不須得著意去裏面訓解但只平平地涵泳自好因舉池之竭矣不云自頻泉之竭矣不云自中四句吟詠者久之又曰大雅中如烝民板抑等詩自有好底董氏舉侯苞言衛武公作抑詩使人日誦於其側不知此出在何處他讀書多想見是如此又曰如孟子也大故分曉也不用解他熟讀滋味自出夔孫先生問林武子看詩何處曰至大雅大聲曰公前日方看節南山如何恁地快恁地不得而今人看文字敏底一揭開板便曉但於意味卻不曾得便只管看時也只是恁地但百遍自是強五十遍時二百遍自是強一百遍時題彼脊鴒載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生這箇看時也只是恁地但裏面意思卻有說不得底解不得底意思卻在說不得底裏面又曰生民等篇也可見祭祀次第此與儀禮正相合義剛問時舉看文字如何曰詩傳今日方看得綱領要之緊要是要識得六義頭面分明則詩亦無難看者曰讀詩全在諷詠得熟則六義將自分明須使篇篇有箇下落始得且如子善向看易傳往往畢竟不曾熟如此則何緣會浹洽橫渠云書須成誦精思多在夜中或靜坐得之不記則思不起今學者看文字若記不得則何緣貫通時舉曰緣資性魯鈍全記不起曰只是貪多故記不得福州陳止之極魯鈍每讀書只讀五十字必三二百遍而後能熟精習讀去後來卻赴賢良要知人只是不會耐苦耳凡學者要須做得人難做底事方好若見做不得便不去做要任其自然何緣做得事成切宜勉之時舉問看詩如何曰方看得關雎一篇未有疑處曰未要去討疑處只熟看某注得訓詁字字分明卻便玩索涵泳方有所得若便要立議論往往裏面曲折其實未曉只髣彿見得便自虛說耳恐不濟事此是三百篇之首可更熟看時舉先生謂學者曰公看詩只看集傳全不看古注曰某意欲先看了先生集傳卻看諸家解曰便是不如此無卻看底道理才說卻理會便是悠悠語今見看詩不從頭看一過云且等我看了一箇了卻看那箇幾時得再看如冢殺相似只是殺一陣便了不成說今夜且如此冢殺明日重新又殺一番僩文蔚泛看諸家詩說先生曰某有集傳後只看集傳先生又曰曾參看諸家否曰不曾曰卻不可文蔚解詩漢書傳訓皆與經別行三傳之文不與經連故石經書公羊傳皆無經文藝文志云毛詩經二十九卷毛詩詁訓傳三十卷是毛為詁訓亦不與經連也馬融為周禮注乃云欲省學者兩讀故具載本文然則後漢以來始就經為注未審此詩引經附傳是誰為之其毛詩二十九卷不知併何卷也毛鄭所謂山東老學究歐陽會文章故詩意得之亦多但是不合以今人文章如他底意思去看故皆局促了詩意古人文章有五七十里不回頭者蘇黃門詩說疏放覺得好振歐陽公有詩本義二十餘篇煞說得有好處有詩本末篇又有論云何者為詩之本何者為詩之末詩之本不可不理會詩之末不理會得也無妨其論甚好近世自集注文字出此等文字都不見了也害事如呂伯恭讀詩記人只是看這箇它上面有底便看無底更不知看了僩因言歐陽永叔本義而曰理義大本復明於世固自周程然先此諸儒亦多有助舊來儒者不越注疏而已至永叔原父孫明復諸公始自出議論如李泰伯文字亦自好此是運數將開理義漸欲復明於世故也蘇明允說歐陽之文處形容得極好近見其奏議文字如回河等劄子皆說得盡誠如老蘇所言便如詩本義中辨毛鄭處文辭舒緩而其說直到底不可移易程先生詩傳取義太多詩人平易恐不如此橫渠云置心平易始知詩然橫渠解詩多不平易程子說胡安定解九四作太子事云若一爻作一事只做得三百八十四事此真看易之法然易傳中亦有偏解作一事者林艾軒嘗云伊川解經有說得未的當處此文義間事安能一一皆是若大頭項則伊川底卻是此善觀伊川者陸子靜看得二程低此恐子靜看其說未透耳譬如一塊精金卻道不是金非金之不好蓋是不識金也人傑必大錄云橫渠解悠悠蒼天此何人哉卻不平易子由詩解好處多歐公詩本義亦好因說東萊改本書解無闕疑處只據意說去木之問書解誰底好看曰東坡解大綱也好只有失如說人心惟危這般處便說得差了如今看他底須是識他是與不是處始得木之問讀詩記序中雅鄭邪正之說未明曰向來看詩中鄭詩邶鄘衛詩便是鄭衛之音其詩大段邪淫伯恭直以謂詩皆賢人所作皆可歌之宗廟用之賓客此甚不然如國風中亦多有邪淫者又問思無邪之義曰此只是三百篇可蔽以詩中此言所謂無邪者讀詩之大體善者可以勸而惡者可以戒若以為皆賢人所作賢人決不肯為此若只一鄉一里中有箇恁地人專一作此怨刺恐亦不靜至於皆欲被之絃歌用之宗廟如鄭衛之詩豈不褻瀆用以祭幽厲褒姒可也施之賓客燕享亦待好賓客不得須衛靈陳幽乃可耳所謂詩可以興者使人興起有所感發有所懲創可以觀者見一時之習俗如此所以聖人存之不盡刪去便盡見當時風俗美惡非謂皆賢人所作耳大序說止乎禮義亦可疑小序尤不可信皆是後人託之仍是不識義理不曉事如山東學究者皆是取之左傳史記中所不取之君隨其謚之美惡有得惡謚及傳中載其人之事者凡一時惡詩盡以歸之最是鄭忽可憐凡鄭風中惡詩皆以為刺之伯恭又欲主張小序鍛煉得鄭忽罪不勝誅鄭忽卻不是狡若是狡時他卻須結齊國之援有以鉗制祭仲之徒決不至於失國也謚法中如墮覆社稷曰頃便將柏舟一詩硬差排為衛頃公便云賢人不遇小人在側更無分疏處愿而無立曰僖衡門之詩便以誘陳僖愿而無立志言之如子衿只是淫奔之詩豈是學校中氣象褰裳詩中子惠思我褰裳涉溱至狂童之狂也且豈不是淫奔之辭只緣左傳中韓宣子引豈無他人便將做國人思大國之正己不知古人引詩但借其言以寓己意初不理會上下文義偶一時引之耳伯恭只詩綱領第一條便載上蔡之說上蔡費盡辭說只解得箇怨而不怒纔先引此便是先瞎了一部文字眼目問今人自做一詩其所寓之意亦只自曉得前輩詩如何可盡解曰何況三百篇後人不肯道不會須要字字句句解得麼當時解詩時且讀本文四五十遍已得六七分卻看諸人說與我意如何大綱都得之又讀三四十遍則道理流通自得矣或問詩曰詩幾年埋沒被某取得出來被公們看得恁地搭滯看十年仍舊死了那一部詩今若有會讀書底人看某詩傳有不活絡處都塗了方好而今詩傳只堪減不堪添胡泳伯恭說詩太巧亦未必然古人直不如此今某說皆直靠直說揚李茂欽問先生曾與東萊辨論淫奔之詩東萊謂詩人所作先生謂淫奔者之言至今未曉其說曰若是詩人所作譏刺淫奔則婺州人如有淫奔東萊何不作一詩刺之茂欽又引他事問難先生曰未須別說只為我答此一句來茂欽辭窮先生曰若人家有隱僻事便作詩訐其短譏刺此乃今之輕薄子好作謔詞嘲鄉里之類為一鄉所疾害者詩人溫醇必不如此如詩中所言有善有惡聖人兩存之善可勸惡可戒杞某解詩多不依他序縱解得不好也不過只是得罪於作序之人只依序解而不考本詩上下文意則得罪於聖賢也揚因說學者解詩曰某舊時看詩數十家之說一一都從頭記得初間那裏敢便判斷那說是那說不是看熟久之方見得這說似是那說似不是或頭邊是尾說不相應或中間數句是兩頭不是或尾頭是頭邊不是然也未敢便判斷疑恐是如此又看久之方審得這說是那說不是又熟看久之方敢決定斷說這說是那說不是這一部詩並諸家解都包在肚裏公而今只是見已前人解詩便也要注解更不問道理只認捉著便據自家意思說於己無益於經有害濟得甚事凡先儒解經雖未知道然其盡一生之力縱未說得七八分也有三四分且須熟讀詳究以審其是非而為吾之益今公纔看著便妄生去取肆以己意是發明得箇甚麼道理公且說人之讀書是要將作甚麼用所貴乎讀書者是要理會這箇道理以反之於身為我之益而已僩詩傳中或云姑從或云且從其說之類皆未有所考不免且用其說拱壽詩傳只得如此說不容更著語工夫卻在讀者必大問分詩之經詩之傳何也曰此得之於呂伯恭風雅之正則為經風雅之變則為傳如屈平之作離騷即經也如後人作反騷與九辯之類則為傳耳煇
