body:
  text: 朱子語類卷第四十五論語二十七衛靈公篇衛靈公問陳章問明日遂行在陳絶糧想見孔子都不計較所以絶糧曰若計較則不成行矣燾周問固窮有二義不知孰長曰固守其窮古人多如此說但以上文觀之則恐聖人一時答問之辭未遽及此蓋子路方問君子亦有窮乎聖人答之曰君子固是有窮時但不如小人窮則濫爾以固字答上面有字文勢乃相應雉子曰賜也章孔子告子貢曰女以豫為多學而識之者與豫一以貫之蓋恐子貢只以己為多學而不知一以貫之之理後人不會其意遂以為孔子只是一貫元不用多學若不是多學卻貫箇甚底且如錢貫謂之貫須是有錢方貫得若無錢卻貫箇甚孔子實是多學無一事不理會過若不是許大精神亦吞不得許多只是於多學中有一以貫之耳文蔚問子貢一貫章曰聖人也不是不理會博學多識只是聖人之所以聖卻不在博學多識而在一以貫之今人有博學多識而不能至於聖者只是無一以貫之然只是一以貫之而不博學多識則又無物可貫夔孫問子貢一貫章曰一以貫之固是以心鑒照萬物而不遺然也須多學而識之始得未有不學而自能一貫者也時舉夫子謂子貢曰女以豫為多學而識之者與曰然非與聖人說此一句不是且恁地虛說故某嘗謂子貢曰然非與然字也是非與也是而今只管懸想說道一貫卻不知貫箇甚麼聖人直是事事理會得如云好古敏以求之不是驀直恁地去貫得它如曾子問許多曲折它思量一一問過而夫子一一告之末云吾聞諸老聃云是聖人當初都曾事事理會過如天下之聖說道事親事親中間有多少事說道事君事君中間有多少事而今正患不能一一見箇恰好處如何便說一貫近見永嘉有一兩相識只管去考制度卻都不曾理會箇根本一旦臨利害那箇都未有用處卻都不將事呂伯恭向來教人亦云論語皆虛言不如論實事便要去考史如陸子靜又只說箇虛靜云全無許多事顏子不會學擇乎中庸得一善則拳拳勿失善則一矣何用更擇子路有聞未之能行唯恐有聞一聞之外何用再聞便都與禪家說話一般了聖人道理都不恁地直是周遍夔孫問謝氏謂如天之於衆形非物刻而雕之是如何曰天只是一氣流行萬物自生自長自形自色豈是逐一粧點得如此聖人只是一箇大本大原裏發出視自然明聽自然聰色自然溫貌自然恭在父子則為仁在君臣則為義從大本中流出便成許多道理只是這箇一便貫將去所主是忠發出去無非是恕宇淳同問謝氏解云聖人豈務博者哉如天之於衆形匪物刻而雕之也故曰豫一以貫之德輶如毛毛猶有倫上天之載無聲無臭至矣所以引此詩者莫只是贊其理之密否曰固是到此則無可得說了然此須是去涵泳只恁地說過亦不濟事多學而識之亦不是不是故子貢先曰然又曰非與學者固有當多學而識之者然又自有箇一貫底道理但多學而識之則可說到一以貫之則不可說矣廣子張問行章言忠信行篤敬去其不忠信篤敬者而已方問行篤敬曰篤者有重厚深沉之意敬而不篤則恐有拘迫之患時舉忠信篤敬立則見其參前在輿則見其倚衡如此念念不忘伊川謂只此是學銖至之問學要鞭辟近裏鞭辟如何曰此是洛中語一處說作鞭約大抵是要鞭督面裏去今人皆不是鞭督向裏心都向外明道此段下云切問近思言忠信行篤敬云云何嘗有一句說做外面去學要博志須要篤志篤問便切思便近只就身上理會伊川言仁在其中即此是學元不曾在外這箇便是近裏著己今人皆就外面做工夫恰似一隻船覆在水中須是去翻將轉來便好便得使吾輩須勇猛著力覆將轉先生轉身而言曰須是翻將轉來始得宇集注楊問學要鞭辟近裏何謂鞭辟曰辟如驅辟一般又問質美者明得盡渣滓便渾化與天地同體是如何曰明得透徹渣滓自然渾化又問渣滓是甚麼曰渣滓是私意人欲天地同體處如義理之精英渣滓是私意人欲之未消者人與天地本一體只緣渣滓未去所以有間隔若無渣滓便與天地同體克己復禮為仁己是渣滓復禮便是天地同體處有不善未嘗不知不善處是渣滓顏子三月不違仁既有限此外便未可知如曾子為人謀而不忠與朋友交而不信傳而不習是曾子渣滓處漆雕開言吾斯之未能信皆是有些渣滓處只是質美者也見得透徹那渣滓處都盡化了若未到此須當莊敬持養旋旋磨擦去教盡宇問學要鞭辟近裏至莊敬持養竊謂如顏子克己復禮天理人欲便截然兩斷此所謂明得盡渣滓便渾化如仲弓出門如見大賓使民如承大祭便且是莊敬持養曰然顏子克己復禮不是盲然做卻是他生見得分曉了便是聖人說話渾然今克己復禮一句近下人亦用得不成自家未見得分曉便不克己只得克將去只是顏子事與此別又曰知得後只是一件事如適間說博學篤志切問近思亦只是本體上事又如博我以文約我以禮亦是本體上事只緣其初未得須用如此做工夫及其既得又只便是這箇文蔚曰且如博學於文人心自合要無所不知只為而今未能如此須用博之以文曰人心固是無所不知若未能如此卻只是想像且如釋氏說心亦自謂無所不知他大故將做一箇光明瑩徹底物事看及其問他他便有不知處如程先生說窮理卻謂不必盡窮天下之理只是理會得多後自然貫通去某嘗因當官見兩家爭産各將文字出拖照其間亦有失卻一兩紙文字只將他見在文字推究便自互換見得出若是都無文字只臆度說兩家所競須有一曲一直便不得元不曾窮理想像說我這心也自無所不知便是如此文蔚學要鞭辟近裏一段明得盡者一見便都明了更無渣滓其次惟是莊敬持養以消去其渣滓而已所謂持養亦非是作意去穿鑿以求其明但只此心常敬則久久自明矣廣因歐兄問質美者明得盡渣滓便渾化洽曰尹和靖以渣滓二字不當有如何曰和靖議論每如此所謂渣滓者私意也質美者明得盡所以渣滓一齊渾化無了洽問程子曰質美者明得盡渣滓便渾化與天地同體求之古人誰可當之顏子孔門高第猶或有違仁時不知已上別有人否曰想須有之曰湯武如何先生卻問湯武與顏子孰優未及對先生徐曰呂與叔云論成德顏子不若湯武之廣大論學則湯武不若顏子之細密湯武功夫誠恐不若顏子細密如湯聖敬日躋猶是密切處至武王並不見其切己事必大直哉史魚章正淳問直哉史魚君子哉蘧伯玉諸儒以為史魚不及蘧伯玉如何曰試將兩人對換說看如何直固是好然一向直便是偏豈得如蘧伯玉之君子必大志士仁人章或問仁曰仁者只是吾心之正理志士仁人無求生以害仁有殺身以成仁須知道求生害仁時雖以無道得生卻是抉破了我箇心中之全理殺身成仁時吾身雖死卻得此理完全也時舉余正叔謂殺身者只是要成這仁曰若說要成這仁卻不是只是行所當行而已文蔚問無求生以害仁有殺身以成仁一章思之死生是大關節要之工夫卻不全在那一節上學者須是於日用之間不問事之大小皆欲即於義理之安然後臨死生之際庶幾不差若平常應事義理合如此處都放過到臨大節未有不可奪也曰然賀孫曾見人解殺身成仁言殺身者所以全性命之理人當殺身時何暇更思量我是全性命之理只為死便是生便不是不過就一箇是故伊川說生不安於死至於全其性命之理乃是旁人看他說底話非是其人殺身時有此意也直卿云若如此則是經德不回所以干祿也方子子貢問為仁章問子貢問為仁章曰大夫必要事其賢者士必友其仁者便是要琢磨勉厲以至於仁如欲克己而未能克己欲復禮而未能復禮須要更相勸勉乃為有益因云時舉說文字見得也定然終是過高而傷巧此亦不是些小病痛須要勇猛精進以脫此科白始得又云且放令心地寬平不要便就文字上起議論時舉問子貢問為仁何以答以事其大夫之賢者友其士之仁者曰也是箇入德之方又問事與友孰重曰友為親切賢只是統言友徑指仁上說銖顏淵問為邦章行夏之時行夏小正之事德明才仲問行夏之時曰夏時人正也此時方有人向上人猶芒昧子時天正也此時天方開丑時地正也言地方萌夫子以寅月人可施功故從其時此亦是後來自推度如此如曆家說則以為子起於黃鍾寅起於太簇又問輅注云禮文有異曰有制度與車不同以前只謂之車今南郊五輅見說極高大問何不作車與行事官乘著法服騎馬亦不好看曰在中原時亦有乘車者若舊制亦有著法服騎馬如散騎常侍在於輅之左右是也因舉上蔡論語舉王介甫云事衰世之大夫友薄俗之士聽淫樂視慝禮皎然不惑於先王之道難矣哉此言甚好楊通老問既如此言後來何故卻相背曰只是把做文章做不曾反己求之璘録云介甫此語只是做文字說去不曾行之於身聞其身上極不整齊所以明道對神宗王安石聖人之問引赤舄几几見說平日亦脫冠露頂地臥然當初不如此觀曾子固送黃生序以其威儀似介卿介卿渠舊字也故名其序曰喜似渠怪誕如此何似之有璘録云恐介甫後生時不如此恐是後來學佛了禮法一時掃去渠少年亦不喜釋老晚年大喜不惟錯說了經書和佛經亦錯解了揭諦揭諦波羅僧揭諦此胡語也渠注云揭真諦之道以示人大可笑可學璘録略問行夏之時曰前輩說多不同有說三代皆建寅又說只是建子與寅無建丑者劉和夫書解又說自五帝以來便迭建三正不止於三代其引證甚詳據皇極經世亦起於子他以幾萬幾千年為一會第一會起於子第二會起於丑第三會起於寅至寅上方始注一開物字恐是天氣肇於子至丑上第二會處地氣方凝結至寅上第三會人物始生耳蓋十一月斗指於子至十二月斗雖指於丑而日月乃會於子故商正周正皆取於此然以人事言之終不若夏正之為善也雉楊尹叔問天開於子地闢於丑人生於寅如何曰康節說一元統十二會前面虛卻子丑兩位至寅位始紀人物云人是寅年寅月寅時生以意推之必是先有天方有地有天地交感方始生出人物來淳夏時注問天開於子地闢於丑人生於寅曰此是皇極經世中說今不可知他只以數推得是如此他說寅上生物是到寅上方有人物也有三元十二會三十運十二世十二萬九千六百年為一元歲月日時元會運世皆自十二而三十自三十而十二至堯時會在巳午之間今則及未矣至戌上說閉物到那裏則不復有人物矣問不知人物消靡盡時天地壞也不壞曰也須一場鶻突既有形氣如何得不壞但一箇壞了又有一箇廣至之問康節說天開於子地闢於丑人生於寅是否曰模樣也是如此經世書以元統會十二會為一元一萬八百年為一會初間一萬八百年而天始開又一萬八百年而地始成又一萬八百年而人始生初間未有物只是氣塞及天開些子後便有一塊渣滓在其中初則溶軟後漸堅實今山形自高而下便似鏽義剛作傾瀉出來模樣淳曰每常見山形如水漾沙之勢想初間地未成質之時只是水後來漸漸凝結勢自如此凡物皆然如雞子殼之類自氣而水水而質尤分曉曰是淳問天有質否抑只是氣曰只似箇旋風下面軟上面硬道家謂之剛風世說天九重分九處為號非也只是旋有九重上轉較急下面氣濁較暗上面至高處至清且明與天相接淳問晉志論渾天以為天外是水所以浮天而載地是否曰天外無水地下是水載某五六歲時心便煩惱箇天體是如何外面是何物淳義剛同周問三正之建不同如何曰天開於子地闢於丑人生於寅蓋至子始有天故曰天正至丑始有地故曰地正至寅始有人故曰人正康節分十二會言到子上方有天未有地到丑上方有地未有人到寅上方始有人子丑寅皆天地人之始故三代即其始處建以為正康節十二會以堯舜時在午今在未至戌則人物消盡銖問顏子問為邦孔子止告之以四代之禮樂卻不及治國平天下之道莫是此事顏子平日講究有素不待夫子再言否曰固是如此只是他那克己復禮陋巷簞瓢便只是這事窮時是恁地著衣喫飯達時亦只是恁著衣喫飯他日用間是理會甚事想每日講論甚熟三代制度卻是不甚會說處卻是生處如堯舜禹卻只是就事上理會及到舉大事卻提起那本領處說謂精一執中等語又問聖人就四代中各舉一事亦只是立一箇則例教人以意推之都要如此否曰固是凡事皆要放此文蔚問顏淵問為邦曰顏子於道理上不消說只恐它這制度尚有缺闕故夫子只與說這箇他這箇問得大答得大皆是大經大法莊周說顏子坐忘是他亂說又曰顏子著力做將去如克己復禮非禮勿視聽言動在它人看見是沒緊要言語它做出來多少大一件事植問顏淵問為邦曰顏淵為政其他如敬事而信節用愛人與夫居之無倦行之以忠之類更不用說所以斟酌禮樂而告之也時舉亞夫問顏淵問為邦曰顏子事事了得了只缺這些子故聖人斟酌禮樂而告之近有學者欲主張司馬遷謂渠作漢高祖贊黃屋左纛朝以十月是他惜高祖之不能行夏之時乘商之輅謂他見識直到這裏與孔子答顏淵之意同某謂漢高祖若行夏之時乘商之輅也只做得漢高祖卻如何及得顏子顏子平日是多少工夫今卻道漢高祖只缺這一節是都不論其本矣時舉恭父問顏淵問為邦此事甚大不知使其得邦家時與聖人如何曰終勝得孟子但不及孔子些問莫有綏之斯來動之斯和底意思否曰亦須漸有這意思又問文武之道未墜於地此是孔子自承當處否曰固是惟是孔子便做得它人無這本領當不得且如四代之禮樂惟顏子有這本領方做得若無這本領禮樂安所用哉所謂行夏時乘商輅服周冕舞韶舞亦言其大略耳恪賀孫録又問以下不同云正卿問顏子涵養之功多曾子省察之功多曰固不可如此說然顏子資稟極聰明凡是涵養得來都易如聞一知十如於吾言無所不說如亦足以發如問為邦一時將許多大事分付與他是他大段了得看問為邦而孔子便以四代禮樂告之想是所謂夏時商輅周冕韶舞當博我以文之時都理會得或問孔子答顏淵之問欲用四代禮樂至論郁郁乎文則曰吾從周何故曰此正適來說心小則物物皆病賢心中只著得上一句不著得下一句可學賜問顏淵問為邦章程子謂發此以為之兆曰兆猶言準則也非謂為邦之道盡於此四者略說四件事做一箇準則則餘事皆可依倣此而推行之耳雉子曰已矣乎章楊至之問好德如好色即是大學如惡惡臭如好好色要得誠如此然集注載衛靈公事與此意不相應恐未穩否曰書都不恁地讀除了衛靈公便有何發明在衛靈公上便有何相礙此皆沒緊要較量他作甚聖人當初恁地歎未見好德如那好色者自家當虛心去看又要反來思量自己如何便是好德如何便是好色如此方有益若只管去較量他與聖人意思愈見差錯聖人言語自家當如奴僕只去隨他他教住便住他教去便去而今卻與他做師友只是較量他大學之說自是大學之意論語之說自是論語之意論語只是說過去尾重則首輕這一頭低那一頭便昂大學是將兩句平頭說得尤力如何合得來做一說淳寓録少異躬自厚章問躬自厚而薄責於人自責厚莫是周備篤切意思否曰厚是自責得重責了又責積而不已之意賀孫或録云只是責己要多責人要少不曰如之何章林問不曰如之何曰只是要再三反復思量若率意妄行雖聖人亦無奈何淳君子義以為質章問君子義以為質一章曰義以為質是制事先決其當否了其間節文次第須要皆具此是禮以行之然徒知盡其節文而不能孫以出之則亦不可且如人知尊卑之分須當讓他然讓之之時辭氣或不能婉順便是不能孫以出之信以成之者是終始誠實以成此一事卻非是孫以出之後方信以成之也時舉或問君子義以為質一章曰義只是合宜義有剛決意思然不可直撞去禮有節文度數故用禮以行之孫以出之是用和為貴義不和用禮以行之己自和然禮又嚴故孫以出之使從容不迫信是朴實頭做無信則義禮孫皆是僞甘吉父問行與出何別曰行是當恁地行出是做處賀孫問君子義以為質一章看來有義以為本必有下面三者方始成就得曰然義以為質是應事處又問以敬為主則義為用以義為本則下面三者為用曰然燾周貴卿問義是就事上說蓋義則裁斷果決若不行之以節文出之以退遜則恐有忤於物信以成之這一句是繳上三句言若不誠實則義必不能盡禮必不能行而所謂孫特是詐僞耳曰也是恁地義剛問禮行孫出何以別曰行是安排恁地行出是從此發出禮而不遜則不免矯世以威嚴加人拱燾問義以為質至信以成之章如孔子之對陽貨孟子之不與王歡言莫全得此理否曰然問行與出如何分曰行是大綱行時出則始自此出去也人固有行之合禮而出之不遜者廣至之問明道謂君子敬以直內則義以方外義以為質則禮以行之遜以出之信以成之曰只是一箇義義以為質便是自義以方外處說起來若無敬以直內也不知義之所在時舉君子矜而不爭章問矜而不爭曰矜是自把捉底意思故書曰不矜細行終纍大德雉或問不矜細行與矜而不爭之矜如何曰相似是箇珍惜持守之意人傑子貢問有一言可以終身行之章恕可以終身行之是行之無窮盡問孔子言恕必兼忠如何此只言恕曰不得忠時不成恕時忠在裏面了幹問可以終身行之之恕恐推到極處便是以己及物為仁否曰這未說那一邊只說推在燾問終身行之其恕乎潔矩之道是恕之端否曰潔矩正是恕浩問終身行之其恕乎如何只說恕不說忠看得忠字尤為緊要曰分言忠恕有忠而後恕獨言恕則忠在其中若不能恕則其無忠可知恕是忠之發處若無忠便自做恕不出問忠恕看來也是動靜底道理如靜是主處動是用處不知是否曰聖人每就用處教人亦不是先有靜而後有動問看來主靜是做工夫處曰雖說主靜亦不是棄事物以求靜既為人亦須著事君親交朋友綏妻子御僮僕不成捐棄了閉門靜坐事物來時也不去應接云且待我去靜坐不要應又不可只茫茫隨他事物中走二者中須有箇商量倒斷始得這處正要著力做工夫不可皮膚說過去又曰動靜亦不是截然動截然靜動時靜便在這裏如人來相問自家去答他便是動才答了便靜這裏既靜到事物來便著去應接不是靜坐時守在這裏到應接時便散亂了去然動靜不出是一箇理知這事當做便順理做去便見動而靜底意思故曰知止而後有定定而後能靜事物之來若不順理而應則雖塊然不交於物心亦不能得靜惟動時能順理則無事時始能靜靜而能存養則應接處始得力須動時做工夫靜時也做工夫兩莫相靠莫使工夫間斷始得若無間斷靜時固靜動時心亦不動若無工夫動時固動靜時雖欲求靜亦不可得而靜矣動靜恰似船一般須隨他潮去始得浪頭恁地高船也隨他上浪頭恁地低船也隨他下動靜只是隨他去當靜還他靜當動還他動又如與兩人同事相似這人做得不是那人便著救他那人做得不是這人便著去救他終不成兩人相推這人做不是卻推說不干我事是那人做得如此那人做不是推說不干我事是他做得如此便不是相為底道理又曰所以程子言未有致知而不在敬者又言涵養當用敬進學則在致知若不能以敬養在這裏如何會去致得知若不能致知又如何成得這敬宇吾之於人也章問吾之於人也誰毀誰譽如有所譽者其有所試矣曰毀者那人本未有十分惡自家將做十分說他便是毀若是只據他之惡而稱之則不可謂之毀譬如一物本完全自家打破了便是毀若是那物元來破了則不可謂之毀譽亦是稱獎得來過當其有所試矣那人雖未有十分善自家卻遂知得他將來如此毀人則不可如此也燾先生忽問王子合曰吾之於人也誰毀誰譽如有所譽者其有所試矣斯民也三代之所以直道而行也尋常作如何說子合對曰三代之時公道行不妄毀譽人如有毀譽須先試得其實方言之曰便是看錯了下面只言如有所譽者其有所試如何不說如有所毀須知道是非與毀譽不同方說得蓋當其實曰是非過其實曰毀譽當時公道行是言是非言非而無是過其實者然以忠厚褒借而譽者容或有之然亦已試其實矣其過實而毀者必無也浩先生說如有所譽者其有所試矣數句季通在坐證曰雍也可使南面之類是也先生然之過聖人之言與後世別如斯民也三代之所以直道而行也有合上底字無乃便不成文此句全在所以上言三代之直道行於斯民也古亦此民今亦此民三代能行之耳誰毀誰譽者凡人未至於惡而惡之故謂之毀未至於善而善之故謂之譽聖人於下又曰如有所譽其有所試矣此一句卻去了毀蓋以不得已而譽亦嘗試之此乃善人之意長惡人之意短之意可學問若到於合好惡處卻不用此二字先生曰然可學伯豐問三代直道而行曰此緊要在所以字上民是指今日之民即三代之民三代蓋是以直道行之於民今亦當以直道行之於民直是無枉不特不枉毀雖稱譽亦不枉也舊嘗有此意因讀班固作景帝贊引此數語起頭以明秦漢不易民而化之意曰孔子稱斯民也三代之所以直道而行也信哉其意蓋謂民無古今周秦網密文峻故姦軌不勝到文景恭儉民便醇厚只是此民在所施何如耳此政得之問斯民也三代之所以直道而行也斯民是指當時之人言之言三代所以直道而行只是此民言毀人固不可過實譽人亦不可過實言吾所以不敢妄加毀譽之民只是三代行直道之民班固舉此贊漢景帝甚好人傑問斯民是今此之民即三代之時所以為善之民如說高皇帝天下相似嘗怪景帝贊引此一句不曉他意蓋是說周秦雖網密文峻而不勝其弊到文景黎民醇厚亦只是此民也聖人說一句話便是恁地闊便是從頭說下來義剛問所以字本虛然意味乃在此如云斯民也三代嘗以此行直道矣聖人知毀譽之非正於人無所毀而猶有所譽蓋將以試其人所以見聖人至公之道又以見聖人進人之為善也璘亞夫問三代直道而行曰此民也是三代時直道而行之民我今若有所毀譽亦不得迂曲而枉其是非之實且舉漢景帝贊所引處云意卻似不同時舉巧言亂德章問小不忍則亂大謀曰忍字有兩說只是一意有忍乃有濟王介甫解作強忍之忍前輩解作慈忍之忍某謂忍是含忍不發之意如婦人之仁是不能忍其愛匹夫之勇是不能忍其忿二者只是一意雉問小不忍如婦人之仁匹夫之勇似是兩意皆說得婦人之仁是姑息匹夫之勇是不能涵容曰只是一意婦人之仁不能忍於愛匹夫之勇不能忍於忿皆能亂大謀如項羽是也夔孫閎祖録略人能弘道章問人能弘道曰道不可須臾離可離非道是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨又曰天下之達道五所以行之者三君臣父子兄弟夫婦朋友古今所共底道理須是知知仁守勇決繼又曰人者天地之心沒這人時天地便沒人管植問人能弘道先生以扇喻曰道如扇人如手手能搖扇扇如何搖手夔孫吾嘗終日不食章問聖人真箇終日不食終夜不寢以思否曰聖人也曾恁地來聖人說發憤忘食卻是真箇惟橫渠知得此意嘗言孔子煞喫辛苦來橫渠又言堯不曾喫辛苦舜喫辛苦但三十徵庸後來便享富貴孔子一生貧賤事事都去理會過來問堯不曾喫辛苦做工夫依舊聰明聖知無缺缺但不如孔子於事理又周匝詳盡德輔吾嘗終日不食終夜不寢以思無益不如學也某注云蓋勞心以必求不如遜志而自得思是硬要自去做底學是依這本子去做便要小著心隨順箇事理去做而今人都是硬去做要必得所以更做不成須是軟著心貼就它去做孟子所謂以意逆志極好逆是推迎它底意思僩問注云遜志而自得如何是遜志曰遜志是卑遜其志放退一著寬廣以求之不忒恁地迫窄便要一思而必得雉君子謀道不謀食章問君子謀道不謀食曰上面說君子謀道不謀食蓋以耕也餒在其中矣學也祿在其中矣又恐人錯認此意卻將學去求祿故下面又繳一句謂君子所以為學者所憂在道耳非憂貧而學也雉學固不為謀祿然未必不得祿如耕固不求餒然未必得食雖是如此然君子之心卻只見道不見祿如先難後獲正義不謀利睹當不到那裏閎祖論語凡言在其中矣當以餒字推之蓋言不必在其中而在焉者矣方因言近來稍信得命及孔子說君子謀道不謀食憂道不憂貧觀此一段則窮達當付之分定所當謀者惟道爾曰此一段不專為有命蓋專為學者當謀道而設只說一句則似緩而不切故又反覆推明以至憂道不憂貧而止且君子之所急當先義語義則命在其中如行一不義殺一不辜而得天下不為此只說義若不恤義惟命是恃則命可以有得雖萬鍾有不辨禮義而受之矣義有可取如為養親於義合取而有不得則當歸之命爾如澤無水困則不可以有為只得致命遂志然後付之命可也大雅知及之章問知及之仁能守之曰此是說講學莊以蒞之以後說為政時舉亞夫問知及之仁不能守之一章上下文勢相牽合不來相似曰知及之仁能守之是明德工夫下面是新民工夫亞夫云克己復禮為仁到仁便是極了今卻又有莊以蒞之與動之以禮底工夫是如何曰今自有此心純粹更不走失而於接物應事時少些莊嚴底意思闒闒翣翣底自不足以使人敬他此便是未善處宜久問此便是要本末工夫兼備否曰固是但須先有知及之仁能守之做箇根本了卻方好生去點檢其餘便無處無事不善若根本不立又有何可點檢處時舉知及之如大學知至仁守之如意誠蒞不莊動不以禮如所謂不得其正與所謂敖惰而辟之類到仁處大本已好但小節略略有些未善如一箇好物只是安頓得略傾側少正之則好矣不大故費力也夔孫問知及之一章曰莊以蒞之是自家去臨民動之不以禮這動字不是感動之動是使民底意思謂如使民去做這件事亦有禮是使之以禮下梢禮字歸在民身上又問是使他做事要他做得來合節拍否曰然又問是合禮底事便以使之不合禮底事便不以使之曰然看那動之字便是指那民說使他向善便是以禮不使他向善便是不以禮如古所謂搜苗獮狩就其中教之少長有序之事便是使之以禮蓋是使他以此事此事有禮存也燾或問此章曰此一章當以仁為主所謂知及之所以求吾仁蒞之動之所以持養吾仁者得之矣謨或問不莊以蒞之一章下兩句集注以為氣質之小疵曰固有生成底然亦不可專主氣質蓋亦有學底燾君子不可小知章問小知是小有才大受是大有德如盆成括小有才未聞大道是也曰卻如何說可不可字義理且看他本文正意是如何說今不合先以一說橫著胸中便看不見必大當仁不讓於師章或問當仁不讓於師這當字是承當之當否曰然亦是任字模樣燾子善問直卿云當仁只似適當為仁之事集注似以當為擔當之意曰如公說當字謂值為仁則不讓如此恐不值處煞多所以覺得做任字說是恐這仁字是指大處難做處說這般處須著擔當不可說道自家做不得是師長可做底事賀孫君子貞而不諒章亞夫問貞而不諒曰貞者正而固也蓋見得道理是如此便須只恁地做所謂知斯二者弗去是也為正字說不盡故更加固字如易所謂貞固足以幹事若諒者是不擇是非必要如此故貞者是正而固守之意諒則有固必之心也時舉諒字論語有三箇匹夫之諒貞而不諒是不好友諒卻是好以貞對諒則諒為不好若是友與其友無信之人又卻不如友諒也諒信之小者孟子所謂亮恐當訓明字廣辭達而已矣章辭達而已矣也是難道夫
