body:
  text: 朱子語類卷第四十四論語二十六憲問篇憲問恥章問集注云憲之狷介其於邦無道穀之可恥固知之至於邦有道穀之可恥恐未必知何也曰邦有道之時不能有為只小廉曲謹濟得甚事且如舊日秦丞相當國有人壁立萬仞和宮觀也不請此莫是世間第一等人及秦既死用之為臺諫則不過能論貪污而已治錄云為侍從不過做得尋常事此不免聖人所謂恥也於國家大計亦無所建立且如子貢問士一段宗族稱孝鄉黨稱弟之人莫是至好而聖人必先之以行己有恥不辱君命為上蓋孝弟之人亦只是守得那一夫之私行不能充其固有之良心然須是以孝弟為本無那孝弟也做不得人有時方得恰好須是充那固有之良心到有恥不辱君命處方是謙之治錄云子貢問士必先答以行己有恥使於四方不辱君命自今觀之宗族鄉黨皆稱孝弟豈不是第一等人然聖人未以為士之至行者僅能行其身無過而無益於人之國不足深貴也問邦有道穀邦無道穀恥也諸家只解下一腳爾上一句卻不曾說著此言邦有道穀邦無道穀而繼之以恥也者豈非為世之知進不知退者設耶曰穀之一字要人玩味穀有食祿之義言有道無道只會食祿略無建明豈不可深恥謨克伐怨欲不行章克伐怨欲須從根上除治閎祖克伐怨欲不行只是遏殺得住此心不問存亡須是克己祖道克伐怨欲不行所以未得為仁者如面前有一事相觸雖能遏其怒畢竟胸中有怒在所以未得為仁蓋卿晞遜問克伐怨欲不行如何曰此譬如停賊在家豈不為害若便趕將出去則禍根絕矣今人非是不能克去此害卻有與它打做一片者人傑問克代怨欲不行孔子不大段與原憲學者用工夫且於此不行焉亦可曰須是克己涵養以敬於其方萌即絕之若但欲不行只是遏得住一旦決裂大可憂可學問可以為難矣曰這箇也是他去做功夫只是用功淺在燾問克伐怨欲不行曰不行只是遏在胸中不行耳畢竟是有這物在裏才說無便是合下埽去不容它在裏譬如一株草凛去而留其根與連其根凛去此箇意思如何而今人於身上有不好處須是合下便凛去若只是在人面前不行而此箇根苗常留在裏便不得又問而今覺得身上病痛閑時自謂都無之才感物時便自發出如何除得曰閑時如何會發只是感物便發當其發時便凛除去莫令發便了又問而今欲到無欲田地莫只是凛除熟後自會如此否曰也只是凛除熟而今人於身上不好處只是常凛去之才發便凛自到熟處夔孫問克伐怨欲不行此是禁制之未能絕去根苗也曰說也只是恁地說但要見得那絕去根苗底是如何用功這禁制底是如何用功分別這兩般功夫是如何又問恐絕去根苗底如顏子克己否曰如勿字也是禁止之公更去子細思量只恁地如做時文樣底說不濟事燾問克伐怨欲須要無先生前日令只看大底道理這許多病自無今看來莫是見得人己一體則求勝之心自無見得事事皆己當為則矜伐之心自無見得死生有命富貴在天則忿怨貪欲之心自無否曰固是如此這已是第二著了問莫是見得天地同然公共底道理否曰這亦是如此亦是第二著若見得本來道理亦不待說與人公共不公共見得本來道理只自家身己上不是箇甚麼是伐箇甚麼是怨欲箇甚麼所以夫子告顏子只是教他克己復禮能恁地則許多病痛一齊退聽出門如見大賓使民如承大祭這是防賊工夫克己復禮這是殺賊工夫賀孫克己底是一刀兩段而無克伐怨欲了克伐怨欲不行底則是忍著在內但不放出耳燾克伐怨欲不行只是禁止不使之行其要行之心未嘗忘也克己復禮便和那要行之心都除卻此克己與克伐怨欲不行所以氣象迥別也枅問克伐怨欲不行何以未足為仁必克己復禮乃得為仁曰克己者一似家中捉出箇賊打殺了便沒事若有克伐怨欲而但禁制之使不發出來猶關閉所謂賊者在家中只是不放出去外頭作過畢竟窩藏必大問克己與克伐怨欲不行曰克己是拔去病根不行是捺在這裏且教莫出然這病根在這裏譬如捉賊克己便是開門趕出去索性與他打殺了便是一頭事了不行是閉了門藏在裏面教它且不得出來作過謙之克己如誓不與賊俱生克伐怨欲不行如薄伐玁狁至于太原但逐出境而已僩安卿說克伐怨欲不行先生問曰這箇禁止不行與那非禮勿視聽言動底勿字也只一般何故那箇便是為仁這箇禁止卻不得為仁必有些子異處試說看安卿對曰非禮勿視聽言動底是於天理人欲之幾既曉然判別得了便行從天理上去克伐怨欲不行底只是禁止不行這箇人欲卻不知於天理上用功所以不同曰它本文不曾有此意公何據輒如此說久之曰有一譬喻如一箇人要打人一人止之曰你不得打才打他一拳我便解你去官裏治你又一人曰你未要打它此二者便是克己與不行之分克己是教它不得打底便是從根源上與它說定不得打未要打底是這裏未要打及出門去則有時而打之矣觀此可見克己者是從根源上一刀兩斷便斬絕了更不復萌不行底只是禁制它不要出來它那欲為之心未嘗忘也且如怨箇人卻只禁止說莫要怨它及至此心欲動又如此禁止雖禁止得住其怨之之心則未嘗忘也如自家饑見芻豢在前心中要喫卻忍得不喫雖強忍住然其欲喫之心未嘗忘克己底則和那欲喫之心也打疊殺了僩李閎祖問目中有克伐怨欲不行及非禮勿視聽言動一段先生問德明云謂之勿則與不行者亦未有異何以得仁德明對曰勿者禁止之詞顏子工夫只是積漸克將去人欲漸少天理漸多久之則私意剝盡天理復全方是仁曰雖如是終是勿底意猶在安得謂之仁再三請益曰到此說不得只合實下工夫自然私意留不住德明問克伐與克復只是一箇克字用各不同竊謂克己是以公勝私克伐是有意去勝人曰只是箇出入意克己是入來勝己克伐是出去勝人問楊敬仲說克字訓能此己元不是不好底為仁由己何嘗不好克己復禮是能以此己去復禮也曰艾軒亦訓是作能謂能自主宰此說雖未善然猶是著工夫若敬仲之言是謂無己可克也德明問克伐怨欲章不知原憲是合下見得如此還是他氣昏力弱沒柰何如此曰是他從來只把這箇做好了只要得不行便了此所以學者須要窮理只緣他見得道理未盡只把這箇做仁然較之世之沉迷私欲者他一切不行已是多少好惟聖道廣大只恁地不濟事須著進向上去克伐怨欲須要無始得若藏蓄在這裏只是做病問原憲本也不是要藏蓄在這裏曰這也未見他要藏蓄在只是據他說便不是了公不消如此看只那箇是是那箇是不是聖人分明說這箇不是仁公今只看合要無合要有了不行若必定要無下梢猶恐未能盡去若合下只要不行便了道如何問孔子既云不知其仁原憲卻不問仁何也曰這便是他失問這也是他從來把自見做好了如此明道亦說原憲承當不得所以不復問他非獨是這句失問如邦有道穀邦無道穀恥也也失問邦無道固不當受祿若有道如何也不可受祿當時未見得意思也須著較量蓋邦無道而受祿固不可有道而苟祿亦不可問原憲也不是箇氣昏力弱底人何故如此曰他直是有力看他孤潔節介卒未易及只是見識自如此若子路見識較高他問時須問到底然教原憲去為宰從政未必如子路冉求之徒若教子路冉求做原憲許多孤介處也做不得孟子曰人有不為也而後可以有為原憲卻似只要不為卻不理會有為一節如今看道理也恁地漸漸看將去不可說道無所見無所得便放倒休了也不可道有些小所見有些小所得便自喜道只消如此這道理直是無窮賀孫問原憲強制克伐怨欲使之不行是去半路上做工夫意思與告子相似觀其辭所合得之粟亦是此意曰憲是箇狷者傳中說憲介狷處亦多廣或說憲問仁是原憲有所感曰不必如此說凡觀書且論此一處文義如何不必它說可學有德者必有言章問范氏之說曰以心譬仁以四肢譬勇此說亦無甚病若欲以勇為義之屬則是夫子亦不合說仁者必有勇也范氏之失卻在首句所謂仁之為力舉者莫能勝上蓋欲以此形容勇字卻不知其不類也必大南宮适問於孔子章南宮适大意是說德之可貴而力之不足恃說得也好然說不透相似說堯舜賢於桀紂一般故聖人不答也是無可說蓋他把做不好又說得是把做好又無可說只得不答而已亦見孔子不恁地作鬧得過便過淳問如何見得以禹稷比夫子曰舊說如此觀夫子不答恐有此意但問得鶻突蓋适意善而言拙擬人非其倫爾太史公亦以盜跖與伯夷並說伯夷傳乃史遷自道之意必大問明道謂适以禹稷比夫子故夫子不答上蔡以為首肯之意非直不答也龜山以為禹稷有天下不止躬稼夫子未盡然其言故不答三說孰是曰适之言亦不為不是問得也疏禹稷是好人羿奡自是不好底人何消恁地比並說夫子也只是不答緣問得騃正如仲尼賢如盜跖這般說話豈不是騃然它意思卻好所以出而聖人稱美之曰君子哉若人尚德哉若人如孟子所謂孳孳為善者舜之徒也云云不以舜之所以事堯事君云云這般言語多少精密适之問如何似得這般話舉似某人詩云云何似仲尼道最良張僧范寇知何物卻與宣尼較短長宇問夫子不答南宮适之問似有深意曰如何過謂禹稷之有天下羿奡不得其死固是如此亦有德如禹稷而不有天下者孔子終身為旅人是也亦有惡如羿奡而得其終者盜跖老死於牖下是也凡事應之必然有時而或不然惟夫子之聖所以能不答君子之心亦為其所當為而不計其效之在彼蜀錄云必然之中或有不然者存學者之心惟知為善而已他不計也夫子不答固有深意非聖人不能如是曰此意思較好過君子而不仁者章問此君子莫只是輕說不是指那成德者而言否曰君子而不仁者有矣夫他只是用這般現成句義剛問此章曰君子譬如純白底物事雖有一點黑是照管不到處小人譬如純黑底物事雖有一點白處卻當不得白也燾愛之能勿勞乎章至之問愛之能勿勞乎曰愛之而弗勞是姑息之愛也凡人之愛多失於姑息如近有學者持服而來便自合令他歸去卻念他涉千里之遠難為使他徒來而徒去遂不欲卻他此便是某姑息處乃非所以為愛也時舉為命章問為命裨諶草創之曰春秋之辭命猶是說道理及戰國之談說只是說利害說到利害的當處便轉謙之或問子產章子產心主於寬雖說道政尚嚴猛其實乃是要用以濟寬耳所以為惠人賀孫問管仲曰人也范楊皆以為盡人道集注以為猶云此人也如何曰古本如此說猶詩所謂伊人莊子所謂之人也若作盡人道說除管仲是箇人他人便都不是人更管仲也未盡得人道在奪伯氏駢邑正謂奪為己有問集注言管仲子產之才德使二人從事於聖人之學則才德可以兼全否曰若工夫做到極處也會兼全宇問孔子所稱管仲奪伯氏邑沒齒無怨言此最難恐不但是威力做得曰固是雖然亦只是霸者事問武侯於廖立李平是如何曰看武侯事跡儘有駁雜去處然事雖未純卻是王者之心管仲連那心都不好程先生稱武侯有王佐之才亦即其心而言之事跡間有不純也然其要分兵攻魏先主將一軍入斜谷關羽將荊州之眾北向則魏首尾必不相應事必集矣蜀人材難得都是武侯逐旋招致許多人不似高祖光武時雲合響應也賀孫問集注云管仲之德不勝其才子產之才不勝其德其於聖人之道概乎其未有聞也若據二子所成之事跡則誠未知聖人之學然觀管仲非鬼神通之精神之極也之語與子產論伯有事其精思察理如此恐亦未可謂全不知聖人之學曰大處他不知如此等事他自知之且使子路為鄭國必須強似子產觀其自謂三年為國可使有勇且知方也則必不為強國所服屬矣廣貧而無怨章問貧而無怨難富而無驕易曰貧則無衣可著無飯可喫存活不得所以無怨難富則自有衣著自有飯喫但略知義理稍能守本分便是無驕所以易二者其勢如此燾貧而無怨不及於貧而樂者又勝似無諂者子路問成人章至之問子路問成人一章曰知曰不欲曰勇曰藝有是四德而文之以禮樂固可以為成人然聖人卻只舉臧武仲公綽卞莊子冉求恐是就子路之所及而言曰也不是揀低底說是舉這四人要見得四項今有人知足以致知又無貪欲又勇足以決又有才能這箇亦自是甚麼樣人了何況又文之以禮樂豈不足為成人又問集注謂才全德備渾然不見一善成名之跡粹然無復偏倚駁雜之弊雖聖人亦不過如此後面又說若論其至則非聖人盡人道不足以語此然則聖人之盡人道事體似又別曰若聖人則不用件件恁地說又問下面說見利思義見危授命久要不忘平生之言覺見子路也盡得此三句不知此數語是夫子說是子路說曰這一節難說程先生說有忠信而不及於禮樂也偏至之云先生又存胡氏之說在後便也怕是胡氏之說是所以存在後倪時舉錄略別出至之問子路問成人一章曰有知而不能不欲則無以守其知能不欲而不能勇則無以決其為知不欲且勇矣而於藝不足則於天下之事有不能者矣然有是四者而又文之以禮樂茲其所以為成人也又問若聖人之盡人道則何以加此曰聖人天理渾全不待如此逐項說矣時舉或問文之以禮樂曰此一句最重上面四人所長且把做箇樸素子唯文之以禮樂始能取四子之所長而去四子之所短然此聖人方以為亦可以為成人則猶未至於踐形之域也時舉亞夫問子路成人章曰這一章最重在文之以禮樂一句上今之成人者以下胡氏以為是子路之言恐此說卻是蓋聖人不應只說向下去且見利思義至久要不忘平生之言三句自是子路已了得底事亦不應只恁地說蓋子路以其所能而自言故胡氏以為有終身誦之之固也亞夫云若如此夫子安得無言以繼之曰恐是他退後說也未可知時舉楊尹叔問今之成人以下是孔子言抑子路言曰做子路說方順此言亦似子路模樣然子路因甚如此說畢竟亦未見得又問公綽不欲等可以事證否曰亦不必證此只是集眾善而為之兼體用本末而言淳子問公叔文子章時然後言者合說底不差過它時節植問子問公叔文子章曰且說這三個不厭字意思看或云緣它時然後言時然後笑時然後取所以人不厭之曰惟其人不厭之所以有不言不笑不取之稱也蓋其言合節拍所以雖言而人不厭之雖言而實若不言也這不厭字意正如孟子所謂文王之囿方七十里民猶以為小相似僩魏才仲問子問公叔文子一段當時亦未必是誇曰若不是誇便是錯說了只當時人稱之已過當及夫子問之而賈所言又愈甚故夫子不信可學如不言不笑不取似乎難卻小若真能如此只是一偏之行然公明賈卻說以告者過也時然後言樂然後笑義然後取似乎易卻說得大了蓋能如此則是時中之行也燾晉文公譎而不正章因論桓文譎正曰桓公是較本分得些子文公所為事卻多有曲折處左傳所載可見蓋不特天王狩河陽一事而已義剛問晉文譎而不正諸家多把召王為晉文之譎集注謂伐衛以致楚師而陰謀以取勝這說為通曰晉文舉事多是恁地不肯就正做去呂伯恭博議論此一段甚好然其說忒巧逐節看來卻都是如此晉文用兵便是戰國孫吳氣習宇東萊博議中論桓文正譎甚詳然說亦有過處又曰桓公雖譎卻是直拔行將去其譎易知如晉文都是藏頭沒尾也是蹺踦驤子路曰桓公殺公子糾章周衰王道不振管仲乃能九合諸侯不以兵車功被當時澤流後世誰得如他之仁如其仁夫子許其有仁之事功也砥江彝叟問管仲如其仁顏漕說作管仲之仁如召忽是否曰聖人於上面豈曾許召忽仁來聖人分明直許管仲云九合諸侯不以兵車管仲之力也如其仁如其仁者誰得似他這仁又云公且仔細看他是許管仲不是許管仲聖人上面既說得管仲如此大了後面卻如何只恁地小結殺得且如公做文字上面說幾句重了下面如何恁地輕去得江兄又問顏漕之意以召忽之死為仁而管仲似之曰聖人於上面已自說自經於溝瀆一項已結之矣豈得更如此先生因說揚雄言爰變丹青如其智這句便是不許他底說話且如易中所謂又誰咎也自有三箇而其義則有兩樣如不節之嗟與自我致寇言之則謂咎皆由己不可咎諸人如出門同人言之則謂人誰有咎之者矣以此見古人立言有用字雖同而其義則不同卓賀孫疑同聞別出江問如其仁或說如召忽之仁曰公且道此是許管仲是不許管仲看上面如此說如何喚做不許他上面說得如此大了下面豈是輕輕說過舊見人做時文多做似仁說看上文是不如此公且道自做數句文字上面意如此下面意合如何聖人當時舉他許多功故云誰如得他底仁終不成便與許顏子底意相似管仲莫說要他三月不違仁若要他三日也不會如此若子貢冉求諸人豈不強得管仲賀孫亞夫問管仲之心既已不仁何以有仁者之功曰如漢高祖唐太宗未可謂之仁人然自周室之衰更春秋戰國以至暴秦其禍極矣高祖一旦出來平定天下至文景時幾致刑措自東漢以下更六朝五胡以至於隋雖曰統一然煬帝繼之殘虐尤甚太宗一旦埽除以致貞觀之治此二君者豈非是仁者之功耶若以其心言之本自做不得這箇功業然謂之非仁者之功可乎管仲之功亦猶是也時舉才仲問南軒解子路子貢問管仲疑其未仁非仁故舉其功以告之若二子問管仲仁乎則所以告之者異此說如何先生良久曰此說卻當可學問集注說子路疑管仲忘君事讎忍心害理不得為仁此忍心之忍是殘忍之忍否方天理流行時遽遏絕之使不得行便是忍心害理矣曰傷其惻隱之心便是忍心如所謂無求生以害仁害仁便是忍心也故謝子說三仁云三子之行同出於至誠惻怛之意此說甚好廣子貢曰管仲非仁章安卿問伊川言仲始與之同謀遂與之同死可也知輔之爭為不義將自免以圖後功亦可也竊謂天下無兩可之理一是則一非如兩可之說恐亦失之寬否曰雖無兩可然前說亦是可但自免以圖後功則可之大者淳曰孟子可以死可以無死是始者見其可以死後細思之又見其可以無死則前之可者為不可矣曰即是此意安卿又問集注謂王魏先有罪而後有功不可以相揜只是論其罪則不須論其功論其功則不須論其罪否曰是堯卿問管仲功可揜過否曰他義不當死久之又曰這般處也說得不分曉大抵後十篇不似前十篇如子路問成人處說得也粗安卿云只是臧武仲之知等皆不是十分底事曰是義剛淳錄同問集解云管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也其視程子說固平實矣然人之大節已失其餘莫不足觀否曰雖是大節已失畢竟他若有功時只得道他是有功始得廣管仲不死子糾聖人無說見得不當死後又有功可稱不是後功可以償前不死之罪也伊川有此意亦恐看得不曾仔細魏鄭公則是前仕建成矣不當更仕太宗後卻有功溫公論嵇紹王裒謂紹後有死節之功須還前不是後既策名委質只得死也不可以後功掩前過王魏二公謂功可以補過猶可管仲則前無過而後有功也楊管仲孔子自有說他過處自有說他功處過不能以揜功如唐之王魏亦然或問設有弒父弒君不可贖之罪雖有功亦在所不說矣曰如此則無可言者文蔚問聖人分明是大管仲之功而孟子硬以為卑如何曰孟子是不肯做他底是見他做得那規模來低因云若仲輔其君使佐周室以令天下俾諸侯朝聘貢賦皆歸於王室而盡正名分致周之命令復行於天下己乃退就藩臣之列如此乃是今仲糾合諸侯雖也是尊王室然朝聘貢賦皆是歸己而命令皆由己出我要如此便如此初不稟命於天子不過只是要自成霸業而已便是不是義剛陳成子弒簡公章問陳成子弒簡公一章曰哀公若委之孔子孔子須有計畫以處之必不空言而但已也謂須有後手意孔子若哀公委之以權必有道理以制三子但有些罅縫事便可成謂舉國不從而三子內一箇動便得又問程子云左氏記孔子之言曰陳恒弒其君民之不與者半以魯之眾加齊之半可克也此非孔子之言誠若此言是以力不以義也曰聖人舉事也不會只理會義理都不問些利害事也須是可行方得但云以魯之眾加齊之半須是先得魯之眾方可用齊之半蓋齊之半雖未必難動而魯之眾卻未便得他從然此事聖人亦必曾入思慮但卻不專主此也燾問陳成子弒簡公章云三子有無君之心夫子所以警之曰須先看得聖人本意夫子初告時真箇是欲討成子未有此意後人自流泝源知聖人之言可以警三子無君之心非是聖人托討成子以警三子聖人心術不如此枉曲雉子路問事君章亞夫問勿欺也而犯之曰犯只是有犯無隱之犯如三諫不聽之類諫便是犯也時舉徐問勿欺也而犯之子路豈欺君者莫只是他勇便解恁地否曰是恁地子路性勇凡言於人君要他聽或至於說得太過則近乎欺如唐人諫敬宗遊驪山謂驪山不可行若行必有大禍夫驪山固是不可行然以為有大禍則近於欺矣要之其實雖不失為愛君而其言則欺矣問如何是欺曰有意瞞人便是欺曰看得子路不是瞞人底人曰無臣而為有臣乃欺也廣君子上達章君子上達一日長進似一日小人下達一日沈淪似一日賀孫問注云君子循天理故日進乎高明小人徇人欲故日究乎污下究字之義如何曰究者究竟之義言究竟至於極也此段本橫渠呂與叔之言將來湊說語意方備小人徇人欲只管被它墜下去只見沈了如人墜水相似因又言究竟之義今人多是如此初間只是差些子少間究竟將去越見差得多如說道理亦是如此初間錯些子少間只管去救救來救去越弄得大無不如此如人相訟初間本是至沒緊要底事喫不過胡亂去下一紙狀少間公吏追呼出入搔擾末梢計其所費或數十倍於所爭之多今人做錯一件事說錯一句話不肯當下覺悟便改卻只管去救其失少間救得過失越大無不是如此僩問君子上達小人下達曰伊川之說為至其次則呂氏得之達只是透向上去君子只管進向上小人只管向下橫渠說亦是尹氏之所謂達卻只是說得君子喻於義之意卻只是喻曉之義楊氏之說舜跖卻是伊川之意謝氏之說大段遠了不干事范氏之說初是喻於義利次是達於上下其末愈上愈下卻有伊川之意大抵范氏說多如此其人最好編類文字觀書多匆遽不仔細好學而首章說得亂董董地覺得他理會這物事不下大抵范氏為人宏博純粹卻不會研窮透徹如唐鑑只是大體好不甚精密議論之間多有說那人不盡如孫之翰唐論雖淺到理會一事直窮到底教他更無轉側處古之學者為己章立之問古之學者為己今之學者為人曰此只是初間用心分毫之差耳所謂上達下達者亦只是自此分耳下達者只因這分毫有差便一日昏蔽似一日如人入爛泥中行相似只見一步深似一步便渾身陷沒不能得出也君子之學既無所差則工夫日進日見高明便一日高似一日也因言秦檜之事云云其所以與張魏公有隙之由乃因魏公不薦他作宰相而薦趙丞相故後面生許多怨惡蓋皆始於此耳時舉問伊川云為己欲得之於己也為人欲見知於人也後又云古之學者為己其終至於成物今之學者為人其終至於喪己兩說不同何也曰此兩段意思自別前段是低底為人後段是好底為人前為人只是欲見知於人而已後為人卻是真箇要為人然不曾先去自家身己上做得工夫非唯是為那人不得末後和己也喪了雉蘧伯玉使人於孔子章問莊子說蘧伯玉行年五十而知四十九年之非此句固好又云行年六十而六十化化是如何曰謂舊事都消忘了又曰此句亦說得不切實伯玉卻是箇向裏做工夫人莊子之說自有過當處廣李公晦問行年六十而六十化曰只是消融了無固滯蓋卿君子恥其言過其行章君子恥其言而過其行過猶行過恭喪過哀之過謂力行也潘叔恭端蒙子貢方人章賜也賢乎哉夫我則不暇學者須思量不暇箇甚麼須於自己體察方可見友仁不逆詐章問不逆詐章曰雖是不逆詐不億不信然也須要你能先覺方是賢蓋逆詐億不信是才見那人便逆度之先覺卻是他詐與不信底情態已露見了自家這裏便要先覺若是在自家面前詐與不信卻都不覺時自家卻在這裏做什麼理會甚事便是昏昧呆底相似此章固是要人不得先去逆度亦是要人自著些精采看方得又問楊氏誠則明矣之說曰此說大了與本文不相干如待誠而後明其為覺也後矣蓋此章人於日用間便要如此燾或問不逆詐不億不信如何又以先覺為賢曰聰明底人便自覺得如目動言肆便見得是將誘我燕王告霍光反漢昭帝便知得霍光不反燕在遠如何知得便是它聰明見得豈非賢乎若當時便將霍光殺了安得為賢銖才仲問南軒解不逆詐一段引孔注先覺人情者是能為賢乎此說如何曰不然人有詐不信吾之明足以知之是之謂先覺彼未必詐而逆以詐待之彼未必不信而先億度其不信此則不可周子曰明則不疑凡事之多疑皆生於不明如以察為明皆至暗也唐高宗之流是也如放齊稱胤子朱啟明而堯知其嚚堯之明是以知之是先覺也凡抑字皆是挑轉言語舊見南軒用抑字多未安可學微生畝謂孔子章微生畝蓋晨門之徒當時多有此般人如棘子成亦此類淳驥不稱其力章問驥不稱其力一章謂有德者必有才有才者不必有德後世分才德為二者恐失之曰世固有有才而無德者亦有有德而短於才者夫子亦自以德與力分言矣必大以德報怨章亞夫問以德報怨章曰以德報怨不是不好但上面更無一件可以報德譬如人以千金與我我以千金酬之便是當然或有人盜我千金而吾亦以千金與之卻是何理視與千金者更無輕重斷然是行不得也時舉以直報怨則無怨矣以德報怨亦是私璘問以直報怨以德報德曰聖人答得極好以德報怨怨乃過德以怨報德豈是人情以直報怨則於彼合為則為是無怨也與孟子三反及不校同禮記云以德報怨寬身之仁也言如此亦是寬身終不是中道可學問禮記注改仁作人曰亦不必改通老問在官遇故舊有公事如何曰亦權其輕重只看此心其事小亦可周旋若事大只且依公某問蘇章夜與故人飲明日按之此莫太不是曰此是甚人只是以故人為貨如往時秦檜當國一日招胡明仲飲極歡歸則章疏下又送路費甚厚殷勤手簡秦檜有數事往日親聞之胡侍郎及籍溪先生太上在河北為虜騎所逐禱於崔府君廟歸而立其祠於郊壇之旁檜一日奏事因奏北使將來若見此祠而問將何以對遽命移於湖上可學問以德報德以直報怨曰以德報德蓋它有德於我自是著饒潤它些子所謂公法行於上私義伸於下也以直報怨當賞則賞之當罰則罰之當生則生之當死則死之怨無與焉不說自家與它有怨便增損於其間問如此所以怨有不讎德無不報曰然又云以德報怨是著意要饒他如呂晦叔為賈昌朝無禮捕其家人坐獄後呂為相適值朝廷治賈事呂乃乞寬賈之罪恐渠以為臣與有私怨後賈竟以此得減其罪此以德報怨也然不濟事於大義都背了蓋賞罰出於朝廷之公豈可以己意行乎其間又問以德報怨寬身之仁也以怨報怨刑戮之民也此有病否曰此也似說得好以德報怨自家能饒人則免得人只管求怨自家故曰寬身之仁也如以怨報怨則日日相搥鬥打幾時是了故曰刑戮之民也燾問以德報怨章注謂旨意曲折反覆微妙無窮何也曰以德報怨本老氏語以德報怨於怨者厚矣而無物可以報德則於德者不亦薄乎呂申公為相曾與賈種民有怨卻與之郡職可謂以德報怨厚於此人矣然那裏人多少被其害賈素無行元豐中在大理為蔡確鷹犬申公亦被誣構及公為相而賈得罪公復為請知通利軍以直報怨則不然如此人舊與吾有怨今果賢邪則引之薦之果不肖邪則棄之絕之是蓋未嘗有怨矣老氏之言死定了孔子之言意思活移來移去都得設若不肖者後能改而賢則吾又引薦之矣淳莫我知也夫章問孔子告子貢曰莫我知也夫一段子貢又不曾問夫子告之必有深意莫是警子貢否曰論語中自有如此等處如告子路知德者鮮告曾子一以貫之皆是一類此是大節目要當自得這卻是箇有思量底事要在不思量處得文蔚問莫我知也夫曰夫子忽然說這一句做甚必有箇著落處當時不特門人知孔子是聖人其它亦有知之者但其知處不及門人知得較親切然孔子當是時說這話他人亦莫知著落惟是子貢便知得這話必有意思在於是問說是人皆知夫子是聖人何為說道莫之知夫子於是說出三句大抵都是退後底說話這箇不喚不響在這裏但說是不怨天於天無所怨不尤人於人無所忤下學而上達自在這裏做自理會得如水無石如木無風貼貼地在這裏人亦無緣知得而今人所以知於人者都是兩邊作得來張眉弩眼大驚小怪知我者其天乎便是人不及知但有天知而已以其與天相合也此與對葉公之語略相似都是放退一步說大概聖人說話平易若孟子便早自不同夔孫義剛錄云子曰莫我知也夫當時不惟門人知夫子別人也知道是聖人今夫子卻恁地說是如何如子貢之聰明想見也大故知聖人但尚有知未盡處故如此說子貢曰何為其莫知子也子貢說是他不為不知夫子所以怪而問之夫子便說下面三句這三句便似葉公問孔子於子路處樣皆是退後一步說不怨天是於天無所逆不尤人是於人無所違忤下學是只恁地去做上達是做後自理會得這箇不響不喚如水之無石木之無風只帖帖地在這裏宜其人不能知若似其他人撐眉弩眼恁地叫喚去做時人卻便知但聖人卻不恁地只是就平易去做只這平易便是人不能及處便如發憤忘食樂以忘憂看著只是恁地平說但是人自不可及人既不能知則只有天知所以只有天知者是道理與天相似也問不怨天不尤人此二句體之於身覺見不尤人易不怨天難何以能不怨天曰此是就二句上生出意看了且未論恁地且先看孔子此段本意理會得本意便了此段最難看若須要解如何是不怨天如何是不尤人如何是下學如何是上達便粘滯了天又無心無腸如何知得孔子須是看得脫灑始得此段只渾淪一意宇錄云此段語意自是零亂星散難捉摸只渾淪一意蓋孔子當初歎無有知我者子貢因問何為莫知子夫子所答辭只是解何為莫知子一句大凡不得乎天則怨天不得乎人則尤人我不得乎天亦不怨天不得乎人亦不尤人與世都不相干涉方其下學人事之卑與眾人所共宇錄云畢竟是尋常事人所能共又無奇特聳動人處及其上達天理之妙忽然上達去人又捉摸不著如何能知得我知我者畢竟只是天理與我默契耳以此見孔子渾是天理伯羽錄云所謂下學人事者又不異常人而無所得知至上達天理處而人又不能知以此兩頭蹉過了故人終不知獨有箇天理與聖人相契耳彼天畢竟知之久之又曰聖人直是如此瀟灑正如久病得汗引箭在手忽然破的也又曰孔子當初說這般話與子貢時必是子貢有堪語這道理模樣然孔子說了子貢又無以承之畢竟也未曉得宇錄云問集注言惜乎子貢猶有所未達也若子貢能達之如何曰他若達之必須有說惜乎見夫子如此說便自住了聖門自顏曾以下惟子貢儘曉得聖人多是將這般話與子貢說他若未曉聖人豈肯說與但他只知得箇頭耳若曉得亦必有語如予欲無言予一以貫之也只如此住了如曾子聞一貫語便曰唯是他曉得童問宇錄作宇問伯羽錄作仲思問子貢後來聞性與天道如何曰亦只是方聞得畢竟也未見得透徹又曰不怨天不尤人下學而上達這三句與發憤忘食樂以忘憂不知老之將至三句以為夫子自譽則又似自貶以為自貶則又似自譽淳寓錄伯羽錄少異饒錄殊略問不怨天不尤人下學而上達知我者其天乎知恐是與天契合不是真有箇知覺否先生曰又似知覺又不似知覺這裏也難說不怨天不尤人聖人都不與己相干聖人只是理會下學而自然上達下學是立腳只在這裏上達是見識自然超詣到得後來上達便只是這下學元不相離下學者下學此事上達者上達此理問聖人亦有下學如何曰聖人雖是生知亦何嘗不學如入太廟每事問吾十有五而志于學便是學也銖下學而上達每學必自下學去泳未到上達只有下學芝下學上達雖是二事只是一理若下學得透上達便在這裏道夫下學者事也上達者理也理只在事中若真能盡得下學之事則上達之理便在此道夫下學只是事上達便是理下學上達只要於事物上見理使邪正是非各有其辨若非仔細省察則所謂理者何從而見之謨下學是低心下意做到那做得超越便是上達佐道理都在我時是上達譬如寫字初習時是下學及寫得熟一點一畫都合法度是上達明作問下學而上達曰學之至即能上達但看著力不著力十五而志乎學下學也能立則是上達矣又自立而學能不惑則上達矣層層級級達將去自然日進乎高明洽問下學上達聖人恐不自下學中來曰不要說高了聖人高了學者如何企及越說得聖人低越有意思季札蔡問有一節之上達有全體之上達曰不是全體只是這一件理會得透那一件又理會得透積累多便會貫通不是別有一箇大底上達又不是下學中便有上達須是下學方能上達今之學者於下學便要求玄妙則不可灑掃應對從此可到形而上未便是形而上謝氏說過了鄭曰今之學者多說文章中有性天道南軒亦如此說曰他太聰敏便說過了淳須是下學方能上達然人亦有下學而不能上達者只緣下學得不是當若下學得是當未有不能上達釋氏只說上達更不理會下學然不理會下學如何上達道夫問不怨天一段曰如此故天知可學問知我者其天乎只是孔子自知否曰固然只是這一箇道理廣問莫我知也夫一節曰此語乃是提撕子貢不怨天不尤人下學處聖人無異於眾人到那上達處不同所以眾人卻莫能知得惟是天知又曰中庸苟不固聰明聖知達天德者其孰能知之古注云惟聖人能知聖人此語自好所謂天知者但只是他理一般而已樂天便是不怨天安土便是不尤人人事天理間便是那下學上達底植先生顧義剛云公前日看知我者其天乎說得也未分曉這箇只管去思量不得須時復把起來看若不曉又且放下只管恁地久後自解曉得這須是自曉也十分著說不得義剛問莫我知也夫與予欲無言二段子貢皆不能復問想是不曉聖人之意曰非是不曉聖人語意只是無默契合處不曾有默地省悟觸動他那意思處若有所默契須發露出來不但已也僩問方其為學雖上智不容於不下及其為達雖下愚不容於不上此與上智下愚不移不相梗否曰不干那事若恁地比並理會將間都沒理會了且看此處本意方其學時雖聖人亦須下學如孔子問禮問官名未識須問問了也須記及到達處雖下愚也會達便不愚了某以學者多不肯下學故下此語問何謂達曰只是下學了意思見識便透過上面去淳問明道言下學而上達意在言表曰意在言表如下學只是下學如何便會上達自是言語形容不得下學上達雖是兩件理會得透徹冢合只一件下學是事上達是理理在事中事不在理外一物之中皆具一理就那物中見得箇理便是上達如大而化之之謂聖聖而不可知之之謂神然亦不離乎人倫日用之中但恐人不能盡所謂學耳果能學安有不能上達者宇程子曰下學上達意在言表何也曰因其言以知其意便是下學上達淳問意在言表是如何曰此亦無可說說那下學上達便是意在言表了廣公伯寮愬子路章問公伯寮其如命何曰這命字猶人君命人以官職是教你做這事天之命人亦是教你去做這箇但做裏面自有等差燾聖人不自言命凡言命者皆為眾人言也道之將行也與命也為公伯寮愬子路言也天生德於予亦是門人促之使行謂可以速矣故有是說不知命無以為君子亦是對眾人言燾問呂氏曰道出乎天非聖人不興無聖人則廢而已故孔子以道之廢興付之命以文之得喪任諸己曰道只是有廢興卻喪不得文如三代禮樂制度若喪便掃地賢者辟世章問賢者辟世一章曰凡古之隱者非可以一律看有可以其時之所遇而觀之者有可以其才德之高下而觀之者若長沮桀溺之徒似有長往而不返之意然設使天下有道而出計亦無甚施設只是獨善其身如老莊之徒而已大抵天下有道而見不必待其十分太平然後出來天下無道而隱亦不必待其十分大亂然後隱去天下有道譬如天之將曉雖未甚明然自此只向明去不可不出為之用天下無道譬如天之將夜雖未甚暗然自此只向暗去知其後來必不可支持故亦須見幾而作可也時舉賢者辟世浩然長往而不來舉世棄之而不顧所謂遯世不見知而不悔者也問沮溺荷蓧之徒可以當此否曰可以當之或云集注以太公伊尹之徒當之恐非沮溺之徒可比也曰也可以當只是沮溺之徒偏耳伊呂平正僩子路宿於石門章問石門章先生謂聖人無不可為之時且以人君言之堯之所以處丹朱而禪舜舜之處頑父嚚母傲弟之間與其所以處商均而禪禹以人臣言之伊尹之所以處太甲周公之所以處管蔡此可見聖人無不可為之時否曰然廣子擊磬於衛章子擊磬於衛先生云如何聞擊磬而知有憂天下之志或對曰政如聽琴而知其心在螳螂捕蟬耳久之先生曰天下固當憂聖人不應只管憂如樂亦在其中亦自有樂時或云聖人憂天下其心自然如此如天地之造化萬物而憂不累其心曰然則擊磬之時其心憂乎樂乎對曰雖憂而未嘗無樂又有曰其憂世之心偶然見於擊磬之時先生皆不然之曰此是一箇大題目須細思之拱壽問荷蕢聞磬聲如何便知夫子之心不忘天下曰他那箇人煞高如古人於琴聲中知有殺心者耳因說泉州醫僧妙智大師後來都不切脈只見其人便知得他有甚病又後來雖不見其人只教人來說因其說便自知得此如他心通相似蓋其精誠篤至所以能知又問硜硜乎是指磬聲而言否曰大約是如此廣問子擊磬於衛一章曰荷蕢亦是出乎世俗數等底人在鄭子產晏平仲之上或問如蘧伯玉又知學或曰蘧伯玉恐未為知道曰謂之知道之全亦不可謂之全不知道亦不可燾或問荷蕢沮溺之徒賢於世俗之人遠矣不知比蘧伯玉如何曰荷蕢之徒高於子產晏平仲輩而不及伯玉蓋伯玉知為學者也僩上好禮章禮達而分定達謂達於下廣子路問君子章陳仲卿問修己以敬曰敬者非但是外面恭敬而已須是要裏面無一毫不直處方是所謂敬以直內者是也時舉或錄詳別出陳仲卿問修己以敬修己以安人修己以安百姓曰須看敬以直內氣象敬時內面一齊直徹上徹下更無些子私曲若不敬則內面百般計較做出來皆是私心欲利甲必害乙利乙必害丙如何得安或問修己如何能安人曰且以一家言之一人不修己看一家人安不安節惟上下一於恭敬這卻是上之人有以感發興起之體信是忠達順是恕體信是無一毫之偽達順是發而皆中節無一物不得其所聰明睿智皆由此出這是自誠而明礪賀孫錄云是自誠而明意思體信是真實無妄達順是使萬物各得其所集注因問上下一於恭敬上之人下之人也同寅協恭出聖人之敬熏天炙地不是獨修於九重而天下之人侮慢自若也如漢廣之化可見方問體信達順曰體信是實體此道於身達順是發而中節推之天下而無所不通也燾問體信是體其理之實達順是行其理之宜否曰如忠恕二字之義廣問體信達順曰信只是實理順只是和氣體信是致中底意思達順是致和底意思燾錄云體信達順如致中和之謂此是禮記中語言能恭敬則能體信達順聰明睿智由此出者言能恭敬自然心便開明銖問如何是體信達順曰體信只盡這至誠道理順即自此發出所謂和者天下之達道體信達順即是主忠行恕問聰明睿智皆由是出是由恭敬出否曰是心常恭敬則常光明先生又贊言修己以敬一句須是如此這處差便見顛倒錯亂詩稱成湯聖敬日躋聖人所以為聖人皆由這處來這處做得工夫直是有功宇道夫錄略亞夫問程先生說修己以敬因及聰明睿知皆由此出不知如何曰且看敬則如何不會聰明敬則自是聰明人之所以不聰不明止緣身心惰慢便昏塞了敬則虛靜自然通達賀孫因問周子云靜虛則明明則通是此意否曰意亦相似賀孫體信是體這誠信達順是通行順道聰明睿智皆由是出者皆由敬出以此事天饗帝此即敬也植程子曰君子修己以安百姓篤恭而天下平至以此事天享帝此語上下不難曉惟中間忽云聰明睿智皆由此出則非容易道得是他曾因此出些聰明睿智來夔孫楊至之問如何程氏說到事天享帝了方說聰明睿智皆由此出曰如此問乃見公全然不用工夫聰明睿智如何不由敬出且以一國之君看之此心纔不專靜則姦聲佞辭雜進而不察何以為聰亂色諛說之容交蔽而莫辨何以為明睿知皆出於心心既無主則應事接物之間其何以思慮而得其宜所以此心常要肅然虛明然後物不能蔽又云敬字不可只把做一箇敬字說過須於日用間體認是如何此心常卓然公正無有私意便是敬有些子計較有些子放慢意思便是不敬故曰敬以直內要得無些子偏邪又與文振說平日須提掇精神莫令頹塌放倒方可看得義理分明看公多恁地困漫漫地則不敬莫大乎是賀孫原壤夷俟章原壤無禮法淳于髡是箇天魔外道本非學於孔孟之門者陸子靜如何將來作學者並說得道夫問原壤登木而歌夫子為弗聞也者而過之待之自好及其夷俟則以杖叩脛近於太過曰這裏說得卻差如原壤之歌乃是大惡若要理會不可但已且只得休至於夷俟之時不可教誨故直責之復叩其脛自當如此若如正淳之說則是不要管他卻非朋友之道矣人傑闕黨童子將命章欲速成者是越去許多節次要到至處無是理也方
