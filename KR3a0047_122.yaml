body:
  text: 朱子語類卷第一百二十二呂伯恭因說南軒東萊或云二先生若是班乎壽昌曰不然先生適聞之遂問如何曰南軒非壽昌所敢知東萊亦不相識但以文字觀之東萊博學多識則有之矣守約恐未也先生然之壽昌某嘗謂人之讀書寧失之拙不可失之巧寧失之低不可失之高伯恭之弊盡在於巧伯羽伯恭說義理太多傷巧未免杜撰子靜使氣好為人師要人悟一云呂太巧杜撰陸喜同己使氣閎祖或問東萊象山之學曰伯恭失之多子靜失之寡柄或問東萊謂變化氣質方可言學曰此意甚善但如鄙意則以為學乃能變化氣質耳若不讀書窮理主敬存心而徒切切計較於昨非今是之間恐亦勞而無補也伯恭更不教人讀論語方子伯恭教人看文字也粗有以論語是非問者伯恭曰公不會看文字管他是與非做甚但有益於我者切於我者看之足矣且天下須有一箇是與不是是處便是理不是處便是咈理如何不理會得賜躬自厚而薄責於人則遠怨矣呂丈舊時性極褊急因病中讀論語於此有省後遂如此好廣錄云伯恭言少時愛使性才見使令者不如意便躁怒後讀論語云云某嘗問路德章曾見東萊說及此否伯恭要無不包羅只是撲過都不精詩小序是他看不破薛常州周禮制度都不能言邵數亦教季通說過一遍又休了揚東萊聰明看文理卻不子細向嘗與較程易到噬嗑卦和而且治一本治作洽據治字於理為是他硬執要做洽字和已有洽意更下洽字不得緣他先讀史多淳錄作讀史來多而所以看粗著眼讀書須是以經為本而後讀史義剛淳同李德之問繫辭精義編得如何曰編得亦雜只是前輩說話有一二句與繫辭相雜者皆載只如觸類而長之前輩曾說此便載入更不暇問是與不是蓋卿或問繫辭精義曰這文字雖然是裒集得做一處其實於本文經旨多有難通者如伊川說話與橫渠說話都有一時意見如此故如此說若用本經文一二句看得亦自通只要成片看便上不接得前下不帶得後如程先生說孟子勿忘勿助長只把幾句來說敬後人便將來說此一章都前後不相通接前不得接後不得若知得這般處是假借來說敬只恁地看也自見得程先生所以說之意自與孟子不相背馳若此等處最不可不知賀孫人言何休為公羊忠臣某嘗戲伯恭為毛鄭之佞臣道夫問東萊之學曰伯恭於史分外子細於經卻不甚理會有人問他忠恕楊氏侯氏之說孰是他卻說公如何恁地不會看文字這箇都好不知是如何看來他要說為人謀而不盡心為忠傷人害物為恕恁地時他方說不是義剛曰他也是相承那江浙間一種史學故恁地曰史甚麼學只是見得淺義剛先生問向見伯恭有何說曰呂丈勸令看史曰他此意便是不可曉某尋常非特不敢勸學者看史亦不敢勸學者看經只語孟亦不敢便教他看且令看大學伯恭動勸人看左傳遷史令子約諸人抬得司馬遷不知大小恰比孔子相似必大伯恭子約宗太史公之學以為非漢儒所及某嘗痛與之辨子由古史言馬遷淺陋而不學疏略而輕信此二句最中馬遷之失伯恭極惡之古史序云古之帝王其必為善如火之必熱水之必寒其不為不善如騶虞之不殺竊脂之不穀此語最好某嘗問伯恭此豈馬遷所能及然子由此語雖好又自有病處如云帝王之道以無為宗之類他只說得箇頭勢大下面工夫又皆疏空亦猶馬遷禮書云大哉禮樂之道洋洋乎鼓舞萬物役使群動說得頭勢甚大然下面亦空疏卻引荀子諸說以足之又如諸侯年表盛言形勢之利有國者不可無末卻云形勢雖強要以仁義為本他上文本意主張形勢而其末卻如此說者蓋他也知仁義是箇好底物事不得不說且說教好看如禮書所云亦此意也伯恭極喜渠此等說以為遷知行夏之時乘殷之輅服周之冕為得聖人為邦之法非漢儒所及此亦眾所共知何必馬遷然遷嘗從董仲舒遊史記中有余聞之董生云此等語言亦有所自來也遷之學也說仁義也說詐力也用權謀也用功利然其本意卻只在於權謀功利孔子說伯夷求仁得仁又何怨他一傳中首尾皆是怨辭盡說壞了伯夷子由古史皆刪去之盡用孔子之語作傳豈可以子由為非馬遷為是可惜子約死了此論至死不曾明聖賢以六經垂訓炳若丹青無非仁義道德之說今求義理不於六經而反取疏略淺陋之子長亦惑之甚矣僩問東萊大事記有續春秋之意中間多主史記曰公鄉里主張史記甚盛其間有不可說處都與他出脫得好如貨殖傳便說他有諷諫意之類不知何苦要如此世間事是還是非還非黑還黑白還白通天通地貫古貫今決不可易若使孔子之言有未是處也只還他未是如何硬穿鑿說木之又問左氏傳合如何看曰且看他記載事跡處至如說道理全不似公穀要知左氏是箇曉了識利害底人趨炎附勢如載劉子天地之中一段此是極精粹底至說能者養之以福不能者敗以取禍便只說向禍福去了大率左傳只道得禍福利害底說話於義理上全然理會不得又問所載之事實否曰也未必一一實子升問如載卜妻敬仲與季氏生之類是如何曰看此等處便見得是六卿分晉田氏纂齊以後之書又問此還是當時特故撰出此等言語否曰有此理其間做得成者如斬蛇之事做不成者如丹書狐鳴之事看此等書機關熟了少間都壞了心術莊子云有機械者必有機事有機事必有機心則純白不備純白不備者道之所不載也今浙中於此二書極其推尊是理會不得因言自孟子後聖學不傳所謂軻之死不得其傳如荀卿說得頭緒多了都不純一至揚雄所說底話又多是莊老之說至韓退之喚做要說道理又一向主於文詞至柳子厚卻反助釋氏之說因言異端之教漢魏以後只是老莊之說至晉時肇法師釋氏之教始興其初只是說未曾身為至達磨面壁九年其說遂熾木之看大事記云其書甚妙考訂得子細大勝詩記此書得自由詩被古說壓了伯恭解說文字太尖巧渠曾被人說不曉事故作此等文字出來極傷事敬之問大事記所論如何曰如論公孫弘等處亦傷太巧德明伯恭大事記辨司馬遷班固異同處最好渠一日記一年渠大抵謙退不敢任作書之意故通鑑左傳已載者皆不載其載者皆左傳通鑑所無者耳有太纖巧處如指出公孫弘張湯姦狡處皆說得羞愧人伯恭少時被人說他不曉事故其論事多指出人之情偽云我亦知得此有此意思不好璘東萊自不合做這大事記他那時自感疾了一日要做一年若不死自漢武至五代只千來年他三年自可了此文字人多云其解題煞有工夫其實他當初作題目卻煞有工夫只一句要包括一段意解題只見成檢令諸生寫伯恭病後既免人事應接免出做官若不死大段做得文字賀孫因說伯恭少儀外傳多瑣碎處曰人之所見不同某只愛看人之大體大節磊磊落落處這般瑣碎便懶看伯恭又愛理會這處其間多引忍恥之說最害義緣他資質弱與此意有合遂就其中推廣得大想其於忠臣義士死節底事都不愛他亦有詩說張巡許遠那時不應出來淳伯恭是箇寬厚底人不知如何做得文字卻似箇輕儇底人如省試義大段鬧裝說得堯舜大段脅肩諂笑反不若黃德潤辭雖窘卻質實尊重館職策亦說得慢不分曉後面又全無緊要伯恭尋常議論亦緣讀書多肚裏有義理多恰似念得條貫多底人要主張一箇做好時便自有許多道理升之九天之上要主張做不好時亦然或言東萊館職策君舉治道策頗涉清談不如便指其事說自包治道大原意曰伯恭策止緣裏面說大原不分明只自恁地依傍說更不直截指出賀孫伯恭文鑑有正編其文理之佳者有其文且如此而眾人以為佳者有其文雖不甚佳而其人賢名微恐其泯沒亦編其一二篇者有文雖不佳而理可取者凡五例先生云已亡一例後來為人所譖令崔大雅敦詩刪定奏議多刪改之如蜀人呂陶有一文論制師服此意甚佳呂止收此一篇崔云陶多少好文何獨收此遂去之更參入他文先生方讀文鑑而學者至坐定語學者曰伯恭文鑑去取之文若某平時看不熟者也不敢斷他有數般皆某熟讀底今揀得也無巴鼻如詩好底都不在上面卻載那衰颯底把作好句法又無好句法把作好意思又無好意思把作勸戒又無勸戒林擇之云他平生不會作詩曰此等有甚難見處義剛淳錄云伯恭文鑑去取未足為定論東萊文鑑編得泛然亦見得近代之文如沈存中律歷一篇說渾天亦好義剛伯恭所編奏議皆優柔和緩者亦未為全是今丘宗卿作序者是舊所編後修文鑑不止乎此更添入嘗語呂丈編奏議為臺諫懷挾揚伯恭祭南軒文都就小狹處說來其文弱呂伯恭文集中如答項平父書是傅夢泉子淵者如罵曹立之書是陸子靜者其他偽者想又多在璘伯恭亦嘗看藏經來然甚深不見於言語文字間有些伯術卻忍不住放得出來今害人之甚揚可憐子約一生辛苦讀書只是竟與之說不合今日方接得他三月間所寄書猶是論寂然不動依舊主他舊說時子約已死它硬說寂然不動是耳無聞目無見心無思慮至此方是工夫極至處伊川云要有此理除是死也幾多分曉某嘗答之云洪範五事貌曰僵言曰啞視曰盲聽曰聾思曰塞方得還有此理否渠至死不曉不知人如何如此不通用之云釋氏之坐禪入定便是無聞無見無思無慮曰然它是務使神輕去其體其理又不同神仙則使形神相守釋氏則使形神相離佛家有白骨觀初想其形從一點精氣始漸漸胞胎孕育生產稚乳長大壯實衰老病死以致屍骸胖脹枯僵久之化為白骨既想為白骨則視其身常如白骨所以厭棄脫離而無留戀之念也此又釋氏之最下者僩以下子約今日得子約書有見未用之體一句此話卻好問未用是喜怒哀樂未發時那時自覺有箇體段則是如著意要見他則是已發曰只是識認他士毅廣錄云近得子約書有未發之本體一句此語甚好人須是看得這箇分曉始得答子約書云目下放過了合做底親切工夫虛度了難得少壯底時日方子觀呂子約書有論讀詩及劉壯輿字畫一段曰某之語詩與子約異詩序多附會須當觀詩經渠平日寫書來字畫難曉昔日劉元城戒劉壯輿謂此人字畫不正必是心術不明故寫此一段與之子約書又云昨讀左傳劉康公說民受天地之中以生下云君子勤禮小人盡力見得古人說道理平實不張皇而著實下手隨貴賤高卑皆有地位非如後世此之為可而此之為不可人有所不可為道有所不可行也先生曰此一段議論卻好可學呂子約死先生曰子約竟齎著許多鶻突道理去矣賀孫先生問呂子約近況如何曰呂丈在鄉里方取其家來骨肉得團聚不至落寞曰得渠書多說仙郡士友日夕過從以問學為樂罪大責輕遷客得如此過分矣亦是仙郡士友好學樂善豈非衡州流風餘韻所及乎嗟歎久之又問曰識章茂獻否曰嘗見之亦蒙教誨曰江西士大夫如茂獻亦難得又言吳伯豐有見識力學不倦祖道因言伯豐自植立事曰此某知之有未盡不意伯豐能如此祖道伯恭門徒氣宇厭厭四分五裂各自為說久之必至銷歇子靜則不然精神緊峭其說分明能變化人使人旦異而晡不同其流害未艾也道夫以下門人婺州士友只流從祖宗故事與史傳一邊去其馳外之失不知病在不曾於論語上加工升卿浙間學者推尊史記以為先黃老後六經此自是太史談之學若遷則皆宗孔氏如於夏紀贊用行夏時事於商紀贊用乘商輅事高祖紀贊則曰朝以十月車服黃屋左纛蓋譏其不用夏時商輅也遷之意脈恐誠如是考得甚好然但以此遂謂遷能學孔子則亦徒能得其皮殼而已假使漢高祖能行夏時乘商輅亦只是漢高祖終不可謂之禹湯此等議論恰與欲削鄉黨者相反必大先生出示答孫自修書因言陸氏之學雖是偏尚是要去做箇人若永嘉永康之說大不成學問不知何故如此他日用動靜間全是這箇本子卒乍改換不得如呂氏言漢高祖當用夏之忠卻不合黃屋左纛不知縱使高祖能用夏時乘商輅亦只是這漢高祖也骨子不曾改變蓋本原處不在此銖伊川發明道理之後到得今日浙中士君子有一般議論又費力只是云不要矯激遂至於凡事回互揀一般偎風躲箭處立地卻笑人慷慨奮發以為必陷矯激之禍此風更不可長如嚴子陵是矯激分明呂伯恭作祠記須要辨其非矯激想見子陵聞之亦自一笑子陵之高節自前漢之末如龔勝諸公不屈於王莽者甚多漢書末後有傳可見光武是一箇讀書識道理底人便去尊敬嚴子陵子陵既高蹈遠舉又誰恤是矯激不是矯激在胡文定父子平生不服人只服范文正公嚴子陵祠記云先生之心出乎日月之上光武之量包乎天地之外微先生不能成光武之大微光武豈能遂先生之高直是說得好其議論什麼正大往時李太伯作袁州學記說崇詩書尚節義文字雖粗其說振厲使人讀之森然可以激懦夫之氣近日浙中文字雖細膩只是一般回互無奮發底意思此風漸不好其意本是要懲艾昔人矯激之過其弊至此孔子在陳思魯之狂士蓋狂士雖不得中猶以奮發可與有為若一向委靡濟甚事又說固是矯激者非只是不做矯激底心亦是私意大凡只看道理合做與不合耳如合做豈可避矯激之名而不為璘鄭子上問昨日所說浙中士君子多要回互以避矯激之名莫學顏子之渾厚否曰渾厚自是渾厚今浙中人只學一般回互底心意不是渾厚渾厚是可做便做不計利害之謂今浙中人卻是計利害太甚做成回互耳其弊至於可以得利者無不為如陳仲弓送宦者葬所謂有仲弓之志則可無仲弓之志則不可因說東漢事勢士君子欲全身遠害則有不仕而已若出仕遇宦官縱橫如何畏禍不與他理會得若未免仕只得辭尊居卑辭富居貧若既要為大官又要避禍無此理璘問前蒙賜書中有近日浙中學者多靠一邊如何曰往往泥文義者只守文義淪虛靜者更不讀書又有陳同父一輩說又必求異者某近到浙中學者卻別滯文義者亦少只沈晦叔一等皆問著不言不語說著文義又卻作怪近日浙中一項議論盡是白空撰出覺全捉摸不著恰如自家不曾有基地卻要起甚樓臺就上面添一層又添一層只是道新奇好看其實全不濟事又云空撰出許多說話如掜眼生花賀孫叔度與伯恭為同年進士年又長自視其學非伯恭比即俯首執子弟禮而師事之略無難色亦今世之所無耳道夫叔度叔度應童子進士詞科然竟以不能隨世俛仰不肯一日置其身於仕路也道夫自叔度以正率其家而子弟無一人敢為非義者道夫
