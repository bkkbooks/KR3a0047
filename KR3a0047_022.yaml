body:
  text: 朱子語類卷第二十二論語四學而篇下慎終追遠章慎終追遠伊川云不止為喪祭推之是如此但本意只是為喪祭王問伊川謂不止喪祭此說如何曰指事而言恐曾子當初只是說喪祭推此意則每事都要存這些子雉慎終追遠專主喪祭而言若看得喪祭事重時亦自不易只就喪祭上推亦是多少事或說天下事皆要慎終追遠亦得明作胡叔器問追遠是親否曰言追則不是親了包顯道問遠祖時人不解更有追念之意想只是親曰只江南來不如此湖北人上墳不問遠祖也哭這卻好人之一身推其所自則必有本便是遠祖畢竟我是它血脈若念及此則自不能無追感之情且如今老人不能得見箇孫子今若便見十世孫時也惜畢竟是自家骨肉人只是不思量到這裏所以追感之誠不至也義剛陳仲亨說民德歸厚先生問如何謂厚是有餘之意陳未達曰謂如此已自得了更添些子恰似著衣如此已暖了更加一件是之謂厚厚對薄而言若我未厚民自是趨從薄處去義剛問程子云推而至於天下之事皆能慎其終不忘於遠如何曰事事皆要如此慎終則末梢雖是理會教盡不忘於遠遠是人易忘且如今追封人及祖父等事這是久遠恩澤人多是據眼前有功者有賞而無久而不忘底意思這般事若能追念起來在己之德既厚而民心亦有所興起賀孫夫子至於是邦章敬子問夫子溫良恭儉讓曰此子貢舉夫子可親之一節溫之一事耳若論全體須如子溫而厲威而不猛恭而安德明問溫是恁地溫和深厚良是恁地簡易正直恭是端嚴恭敬儉是省約有節讓是謙遜自卑曰良字說未是良即是良善猶今言善人所謂易乃樂易坦易之易直如世人所謂白直之直無姦詐險詖底心如所謂開口見心是也此章亦須見得聖人不求人而人自求之意南升或問良何以訓易直曰良如今人言無嶢崎為良善無險阻密蔽又曰易平易和易直無屈曲節李問良如何訓易直曰良善之人自然易直而無險詐猶俗言白直也雉問良易直之義曰平易坦直無許多艱深纖巧也銖亞夫問良何以為易直曰只是平易白直而已因舉韓詩外傳有一段與樂記相似但易直子諒之心生矣處改子諒二字為慈良此卻分明也時舉問良易直也如何曰此心不傾險不粗戾自是平易簡直樂記言易直子諒之心昔人改子諒作慈良看來良字卻是人之初心慈愛良善便是元者善之長孟子說惻隱之心人皆有不忍人之心皆是這般心聖人教人先要求此心正為萬善之總處宇問儉就那處看曰儉只是用處儉為衣冠服飾用度之類宇儉謂節制非謂儉約之謂只是不放肆常收斂之意明作聖人之德無不備非是只有此五者但是此五者皆有從後謙退不自聖底意思故人皆親信而樂告之也夔孫伯游問溫良恭儉讓一章曰最要看得此五字溫是如何氣象良是如何氣象恭儉讓又是如何深體之於我則見得聖人有不求人而人自即之底意思今人卻無非是求自請舉以往並是求人雖做宰相地位也是恁地縱不肯明求也須暗地結托蓋以求人為常而不知其為非也學而一篇多是先以此教人如人不知而不慍如巧言令色如不患人之不己知皆是雖中庸亦多此意如衣錦尚絅皆是且要理會那不求底道理時舉龜山解夫子溫良恭儉讓有暴慢侈泰等語正淳以為暴慢侈泰誠所當戒而先生以為其流至於為人似不然之曰暴慢侈泰固所當戒但不當於此言龜山說話常有些畏罪禍底意思在不知聖人溫良恭儉讓是自然常如此非欲為是以求聞政也賀孫父在觀其志章論父在觀其志曰此一句已有處變意思必有為而言節父在觀其志沒觀其行孝子之志行也人傑觀志觀行只是大概須是無改方見得孝若大段悖理處又自當改此特言其常耳明作邵漢臣說父在觀其志一章曰父在時使父賢而子不肖雖欲為不肖之事猶以父在而不敢為然雖無甚不肖之行而其志可知矣使子賢而父不肖雖欲為善事而父有所不從時有勉強而從父之為者此雖未見其善行而要其志之所存則亦不害其為賢矣至於父沒則己自得為於是其行之善惡可於此而見矣父在時子非無行也而其所主在志父沒時子非無志也其所主在行故子曰云云也時舉問此章上二句見守身之行下一句見愛親之心曰也不必做兩截說只是折轉說上二句觀人之大概下一句就觀其行細看其用心之厚薄如何行雖善矣父道可以未改而輕率改之亦未善也伯羽三年無改於父之道可謂孝矣道猶事也言道者尊父之詞人傑或問三年無改曰是有可改而未十分急者只得且存之父在則子不得專而其志卻可知父沒則子雖得專而其不改之意又可見此所謂孝祖道三年無改謂是半上半下底事在所當改者但不可匆遽急改之若有死其親之心有揚其親之過之意待三年然後徐改之便不覺若是大故不好底事則不在此限耳夔孫才說三年無改便是這事有未是處了若父之道已是何用說無改終身行之可也事既非是便須用改何待三年孝子之心自有所不忍耳若大段害人底事須便改始得若事非是而無甚妨害則三年過了方改了僩問三年無改於父之道只就孝子心上看孝子之心三年之間只思念其父有不忍改之心曰大概是如此但其父若有聖賢之道雖百世不可改此又就事上看直卿云游氏所謂在所當改而可以未改處亦好看南升游氏說游氏曰三年無改亦謂在所當改而可以未改者爾謂此事當改但三年之間孝子之心有所未忍改耳向時南軒卻改作可以改而可以未改耳某與說若如此說則雖終身不改可也此章之意則云此事必當改但可以未改耳三年過則必當改也僩問若父有大段不是底事妨國害政者只得便改豈可必待三年曰若有大段不是須是便改或曰孟莊子之孝也其他可能也其不改父之臣與父之政是難能也與此同否曰不同此章是言父之所行有不善而子不忍改乃見其孝若莊子之父獻子自是箇賢者其所施之政所用之臣皆是莊子能不改之此其所以為難問若然則何足以為難曰子孫不能守父之業而輕改之者多矣莊子乃能守之非難能而何先儒以為莊子之賢不及獻子疑其不能守父之政不能用父之臣而莊子乃能不改此其所以為難能也此說得之僩游氏謂在所當改而可以未改者此正是說得謹密處聖人之意亦正如此若以可改而未改則三年之後四年改之其意如何既合於道雖終身守之可也奚止三年若不合於道如盜跖之所為則不得不改若其事雖不善無甚緊要亦姑守之以待三年若遽改之是忘其親也某舊日朋友亦看此處不透與南軒說他卻改作可以改而可以未改者此語與在所當改者大爭在所當改正是這樣事若不改則不當於理若要改則亦未為急故遲之者以孝子之心不忍也子蒙三年無改游氏此解極好向時欽夫改作可以改可以未改卻不是但此章必有為而發然無所考又曰死其親而暴其過孝子所不忍為義剛諸說唯游氏說得好在所當改而可以未改此說極穩此正指在所當改可以未改處深味之孝子之心可見銖問或說不改事父之道又說不改父存所行之道二說奚擇先生反而問之欲從何說曰不改父在所行之道恐是曰然遂舉游氏可以改而未改者所謂三年云不必改者此說卻切當若說道不可改雖終身守之可也豈止三年乎此為在所當改而可以遲遲三年者也自新法之行諸公務為緣飾文致一詞將此一句辨論無限而卒莫之合也宇或問父在觀其志父沒觀其行曰觀其文意便是父在時其子志行已自有與父不同者然於此三年之間必能不改父道乃見其孝不然所行雖善亦未得為孝此必有為而言然緊要在看游氏尹氏兩節意銖戴智老問近見先生說此章疑聖人有為而發曰聖人之言未有若此曲折者疑當說時亦有事在所當改而可以未改者故聖人言此又云尹氏說得孝子之心未說得事若如其說則孔子何必更說三年無改必若游氏說則說得聖人語意出銖三年無改尹氏說得心於事上未盡游氏於事理上說得好故並載之使互相發拱壽三年無改於父之道諸先生之說有過者謂要改有不及謂不改有至當者須要將去辨別豈可不讀書振禮之用和為貴章先生問學者今人行禮多只是嚴如何得他和答者皆不契曰只是要知得禮合如此所以行之則和緩而不迫蓋聖人制禮無一節是強人皆是合如此且如孔子與上大夫言時自然誾誾與下大夫言時自然侃侃在學者須知道與上大夫言合用誾誾與下大夫言合用侃侃便自然和嘗謂呂與叔說得數句好云自斬至緦衣服異等九族之情無所憾自王公至皂隸儀章異制上下之分莫敢爭皆出於性之所有循而行之無不中節也此言禮之出於自然無一節強人須要知得此理則自然和黃有開因舉先生舊說云且如父坐子立君尊臣卑多少是嚴若見得父合坐子合立君合尊臣合卑則無不安矣曰然雉直卿言禮之用和為貴今觀內則一篇則子事父母之禮亦嚴矣然下氣怡色則和可知也觀玉藻鄉黨所載則臣之事君禮亦嚴矣然一爵而言言二爵而油油君在與與則和可知也曰如此則和與禮成二物矣須是見得禮便是和乃可如入公門鞠躬如也如不容可謂至嚴矣然而自肯甘心為之而無厭倦之意者乃所以為和也至嚴之中便是至和處不可分做兩截去看道夫伯游問禮之用和為貴云禮之體雖截然而嚴然自然有箇撙節恭敬底道理故其用從容和緩所以為貴苟徒知和而專一用和必至於流蕩而失禮之本體今人行事莫是用先王禮之體而後雍容和緩以行之否曰說固是恁地卻如何做功夫伯游云順理而行先生又遍問坐上諸友叔重曰知得是當然之理自甘心行之便自不拘迫時舉云其初須持敬持之久則漸熟熟處便和曰要須是窮理始得見得這道理合用恁地便自不得不恁地如賓主百拜而酒三行固是用恁地如入公門鞠躬如也屏氣似不息過位踧踖如也苟不知以臣事君合用如此終是不解和且如今人被些子燈花落手便說痛到灼艾時因甚不以為痛只緣知道自家病合當灼艾出於情願自不以為痛也若要放教和卻便是知和而和矣時舉銖錄別出吳問禮之用和為貴先生令坐中各說所見銖曰頃以先生所教思之禮者天理節文之自然人之所當行者人若知得是合當行底自甘心行之便自不拘迫不拘迫所以和非是外面討一箇和來添也曰人須是窮理見得這箇道理合當用恁地我自不得不恁地如賓主百拜而酒三行因甚用恁地如入公門鞠躬在位踧踖父坐子立苟不知以臣事君以子事父合用為此終是不解和譬之今人被些子燈花落手便須說痛到灼艾時因甚不以為苦緣它知得自家病合用灼艾出於情願自不以為痛也銖因問如此則這和亦是自然之和若所謂知和而和卻是有心於和否曰知和而和離卻禮了禮之用和是禮中之和知和而和是放教和些纔放教和便是離卻禮了銖問禮之用和為貴曰禮中自有和須是知得當如此則行之自然和到和處方為美因舉龜山與薛宗博說逐日會職事茶事其人云禮起聖人之偽今日會茶莫不消得如此龜山曰既是不消得因何又卻會茶其人曰只為心中打不過龜山曰只此打不過處便是禮非聖人之偽禮之用和為貴只為不如此則心有不安故行之自和耳銖問禮之用和為貴曰禮如此之嚴分明是分毫不可犯卻何處有箇和須知道吾心安處便是和如入公門鞠躬如也須是如此吾心方安不如此便不安才不安便是不和也以此見得禮中本來有箇和不是外面物事也又問知和而和是如何曰知和而和卻是一向去求和便是離了禮且如端坐不如箕踞徐行後長者不如疾行先長者到這裏更有甚禮可知是不可行也時舉禮之用和為貴見君父自然用嚴敬皆是人情願非由抑勒矯拂是人心固有之同然者不待安排便是和才出勉強便不是和聖人品節裁限使事事合於中正這箇當在這裏那箇當在那裏更不得過才過便不是禮若和而知限節便是禮明作禮之用和為貴和是自家合有底發見出來無非自然賀孫或問禮之用和為貴曰禮是嚴敬之意但不做作而順於自然便是和和者不是別討箇和來只就嚴敬之中順理而安泰者便是也禮樂亦只是如此看祖道或問禮之用和為貴君臣父子之間可謂嚴矣若不和則情不通曰不必如此說且以人之持敬若拘迫則不和不和便非自然之理人傑問禮之用和為貴莫是禮之中便有一箇和莫是在用處曰禮雖主於嚴其用則和因舉禮主於減樂主於盈一節問禮樂二字相離不得曰也須看得各自為一物又非判然二物又曰天下之事嚴而不和者卻少和而不節之以禮者常多謙之邵問禮之用和為貴曰如人入神廟自然肅敬不是強為之禮之用自然有和意又問和便是樂否曰也是禮中之樂未便是樂樂中亦有禮如天子八佾諸侯六大夫四士二又是樂中之禮禮之和處便是禮之樂樂有節處便是樂之禮僩問禮以全體言何故用和曰如此則不消得樂振小大由之言小事大事皆是箇禮樂合於禮便是樂故通書云陰陽理而後和故禮先而樂後卓問禮之用和為貴是和在禮中知和而和是和在禮外曰只為它知和而和都忘卻禮耳銖有禮而不和則尚是存得那本之體在若只管和則併本都忘了就這兩意說又自有輕重義剛周舜功問從容不迫如何謂之和曰只是說行得自然如此無那牽強底意思便是從容不迫那禮中自然箇從容不迫不是有禮後更添箇從容不迫若離了禮說從容不迫便是自恣義剛集注禮主於敬而其用以和為貴然如何得他敬而和著意做不得才著意嚴敬即拘迫而不安要放寬些又流蕩而無節須是真箇識得禮之自然處則事事物物上都有自然之節文雖欲不如此不可得也故雖嚴而未嘗不和雖和而未嘗不嚴也又曰和便有樂底意思故和是樂之本閎祖問集注云云上一截將從容不迫說禮之用和為貴甚分明但將從容不迫就下一截體驗覺得未通如鄉黨一書也只是從容不迫如何卻會不行若會從容不迫必不會無節曰只是立心要從容不迫不得才立心要從容不迫少間便都放倒了且如聖人恭而安聖人只知道合著恭自然不待勉強而安才說要安排箇安便添了一箇賀孫問知和而和是從容不迫曰從容不迫雖是和然其流遂至於縱而無節又曰學者而今但存取這心這心是箇道之本領這心若在這義理便在存得這心便有箇五六分道理了若更時時拈掇起來便有箇七八分底道理卓仁甫問集注載程子禮樂之說何如曰也須先是嚴敬方有和若直是盡得敬不會不和臣子入朝自然極其恭敬也自和這不待勉強如此是他情願如此便自和君君臣臣父父子子兄兄弟弟夫婦朋友各得其位自然和若君失其所以為君臣失其所以為臣如何會和如諸公在此坐都恁地收斂這便是和若退去自放肆或乖爭便是不和通書說禮理也樂和也陰陽理而後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理然後和故禮先而樂後說得最好易說利者義之和利只在義之和義本是箇割截裁制之物惟施得宜則和此所以為利從前人說這一句都錯如東坡說道利所以為義之和他把義做箇慘殺之物看了卻道得利方和利是乾卦一德如何這一句卻去說義兼他全不識義如他處說亦然又曰有所不行只連下面說方通如曰有所不行者知和而和不以禮節之亦不可行也如易裏說其唯聖人乎知進退存亡而不失其正者其唯聖人乎賀孫問集注云和者心以為安而行之不迫後又引程子云恭而安別而和二句竊謂行而不迫只說得恭而安卻未有別而和底意思曰是如此後來集注卻去了程說柄問伊川曰別而和別字如何曰分雖嚴而情卻通如知和而和執辭不完卻疑記錄有差集義問上蔡謂禮樂之道異用而同體還是同出於情性之正還是同出於敬曰禮主敬敬則和這便是他同體處道夫問禮樂之道異用同體如何曰禮主於敬樂主於和此異用也皆本之於一心是同體也然敬與和亦只一事砥錄云卻只是一事都從這裏發出則其體同矣敬則和和則自然敬仲思問敬固能和和如何能敬曰和是碎底敬敬是合聚底和蓋發出來無不中節便是和處砥錄云發出來和無不中節便是處處敬敬與和猶小德川流大德敦化伯羽砥少異淳錄云問先生常云敬是合聚底和和是碎底敬是以敬對和而言否曰然敬只是一箇敬無二箇敬二便不敬矣和便事事都要和這裏也恰好這處也中節那處也中節若一處不和便不是和矣敬是喜怒哀樂未發之中和是發而皆中節之和才敬便自然和如敬在這裏坐便自有箇氤氳磅礡象也寓錄云敬只是一箇敬分不得才有兩箇便不敬矣和則處處皆和是事事中節若這處中節那處不中節便非和矣又曰凡恰好處皆是和但敬存於此則氤氳磅礡自然而和問禮樂同體是敬與和同出於一理否曰敬與和同出於一心曰謂一理如何曰理亦說得然言心卻親切敬與和皆是心做曰和是在事否曰和亦不是在事在心而見於事淳童問上蔡云禮樂異用而同體是心為體敬和為用集注又云敬為體和為用其不同何也曰自心而言則心為體敬和為用以敬對和而言則敬為體和為用大抵體用無盡時只管恁地移將去如自南而視北則北為北南為南移向北立則北中又自有南北體用無定這處體用在這裏那處體用在那裏這道理儘無窮四方八面無不是千頭萬緒相貫串以指旋曰分明一層了又一層橫說也如此豎說也如此翻來覆去說都如此如以兩儀言則太極是太極兩儀是用以四象言則兩儀是太極四象是用以八卦言則四象又是太極八卦又是用淳道夫錄少異問禮樂之用相反相成曰且如而今對面端嚴而坐這便是禮合於禮便是和如君臣之間君尊臣卑其分甚嚴若以勢觀之自是不和然其實卻是甘心為之皆合於禮而理自和矣且天子之舞八佾諸侯六大夫四皆是當如此若天子舞天子之舞諸侯舞諸侯之舞大夫舞大夫之舞此便是和若諸侯僭天子大夫僭諸侯此便是失禮失禮便不和易言利者義之和也若以理言之義自是箇斷制底氣象有凜然不可犯處似不和矣其實卻和若臣而僭君子而犯父不安其分便是不義不義則不和矣孟子云未有仁而遺其親者也未有義而後其君者也即是這意思只是箇依本分若依得本分時你得你底我得我底則自然和而有別若上下交征利則上下相攘相奪便是不義不和而切於求利矣老蘇作利者義之和論卻把利別做一箇物來和義都不是了他於理無所見只是胡亂恁地說去卓問諸先生以和為樂未知是否曰和似未可便說樂然亦有樂底意思信近於義章問信近於義言可復也曰如今人與人要約當於未言之前先度其事之合義與不合義合義則言不合義則不言言之則其言必可踐而行之矣今不先度其事且鶻突恁地說了到明日卻說這事不義我不做則是言之不可踐也言而不踐則是不信踐其所言又是不義是不先度之故卓凡言須先度是非可否果近於義而後言則其言可踐恐不近於義其言將不可復也德明問言可復也曰前輩說都是說後來事如說出話了後看是義與不義方理會復與不復若是恁地更不消說也得某看來是要人謹於未發皆是未交際之先賀孫問信近義恭近禮何謂近曰近只是合古人下字寬今且就近上說雖未盡合義亦已近義了雖未盡合禮亦已近禮了宇以下信恭吳問信近於義曰與人要約不是當不問行得行不得次第踐其言則害於義不踐其言則害於信須是合下要約時便審令近義致恭亦然若不中節不失之過則失之不及皆是取辱潘子善因曰近字說得寬曰聖賢之言不迫切銖或問信近於義莫便是合義恭近於禮莫便是中禮先生曰近亦是對遠而言遠於義則言不可復遠於禮則必不能遠恥辱或問集注云約信而合其宜致恭而中其節合其宜便是義中其節便是禮如何是近義近禮曰此亦大綱說如巧言令色鮮矣仁之意然只得近於義近於禮亦好是便合其宜中其節更好廣問如何得約信而合其宜曰只是不妄發曰萬一料事不過則如之何曰這卻無可奈何卻是自家理不明爾問致恭而中其節則能遠恥辱這恥辱是在人在己曰兼有在裏且如見尊長而拜禮也我卻不拜被詰問則無以答這便是為人所恥辱有一般人不當拜而拜之便是諂諛這則可恥可辱者在我矣道夫因不失其親親如親仁之親人傑以下因親可宗因如今人云倚靠人之意宗即是主字如主讎由之主必大因如因徐辟之因因猶傍也親又較厚宗則宗主之又較重問注因仍苟且曰因仍與苟且一樣字因仍猶因循苟且是事恁地做一般人初間不謹擇便與他交下梢他有氣勢便道是我來宗他豈不被他累孔子當時若不擇揀去主癰疽便被壞了宇所依不失其所可親之人亦可宗而主之矣主猶主顏讎由之主蓋當時羈旅之臣所至必有主須於其初審其所可親者從而主之可也賀孫宗主也所宗者可以久而宗主之如夫子於衛主顏讎由則可親之人若主癰疽與寺人瘠環便是不可親之人此是教人接人底道理也時舉因不失其親亦可宗也三字有淺深輕重因乃泛言親則近之矣宗則尊之也如孔子於衛或舍於寺人瘠環之家然謂之親則不可可學問亦可宗也曰我所親之人將來便可為吾之宗主主如主顏讎由之主且如此人不可親而吾乃親之若此人他日得志援我以進則是我失其所主矣陳了翁曾受蔡卞之薦後來擺脫不得乃是失其所親者也人傑漢臣說因不失其親曰與人交際當謹之於始若其人下來不可宗主則今日莫要親他若今日苟且過了與之相親則下來所宗非其可宗者矣時舉因字輕宗字重初間若不子細胡亂與之相依下梢卻是宗他了且如做官與箇至不好底人往來下梢忽然為他所薦舉便是宗他賀孫正淳問亦可宗也曰如今初間與好人相親後來受他薦舉辟差便是著宗他此是前不失親後亦可宗也賀孫問因不失其親曰因字最輕偶然依倚他此時便須物色其人賢與不賢後去亦可宗主如韓文公與崔群書所論交往或其人後不入於善而於己已厚雖欲悔之亦不可處相似枅問因不失其親曰而今與人同官也是相親將來或用它薦舉因它超擢便著宗主它如所親者不善安知它異日不能薦舉我超擢我便著宗主它這箇便是失其所可宗者信近義恭近禮因不失其親此三句是今目下事言可復遠恥辱亦可宗是將來底事銖全章此一節須作兩截看上面恭近於禮信近於義因不失其親是接物與人之初下數句卻是久而無弊之效但當初合下便須著思量到無弊處也時舉問信近於義一段曰未說著不必信只是信合於宜且如一人相約為事已許之少間卻不行是不合義不可踐矣恭凡致敬皆恭也禮則辨其異若與上大夫接而用下大夫之恭是不及也與下大夫接而用上大夫之恭是過也過與不及必取辱矣可學問信近於義一章曰約信事甚多今與人約做一件事須是合當做底事方可與之約則所約之言方可行如不可約之事則休與之約謂其不可行也問恭近於禮謂致敬於人須是合當加禮之人曰不是加禮如致敬於人當拜於堂上乃拜於堂下當揖卻拜皆是不中節適以自取辱問因不失其親謂依賴於人須是得箇正當可親近之人而後可以宗主曰也是如此更子細推去又問集注人之言行交際一段恐言是約信行是致敬交際是依人曰大綱如此說皆交際也言可復便是行南升此一章皆是言謹始之意只如初與人約便用思量他日行得方可諾之若輕諾之他日言不可復便害信也必大錄云若不看義之可行便與他約次第行不得便成脫空恭近於禮且如合當在堂上拜卻下堂拜被人非笑固是辱合當堂下拜卻在堂上拜被人斥罵亦是辱因失其親且如此人不好初去親他時似不害將來主之便錯了須是揀擇見得是好方可親他且如趨事上位其人或不可親既去親了他一日或以舉狀與我我受了便用主之非其人雖悔何及大率有子說底言語奧澀難曉裏面儘有滋味須用子細玩味明作王問因不失其親集注舊連上句義禮後本卻不如此曰後來看得信與義恭與禮因與親各各是一事有此兩項李問恭近於禮曰非止諂媚於人是取辱之道若恭不及禮亦能取辱且如見人有合納拜者卻止一揖有合不拜者反拜他皆不近禮不合拜固是取辱若合拜而不拜被他責我不拜豈不是取辱先生因言論語中有子說數章文勢皆奧澀難為人解雉古人文字皆協韻如信近於義言可復也恭近於禮遠恥辱也因不失其親亦可宗也宗協音族淳楊允叔問伊川言信非義近於義者以其言可復也恭非禮近於禮者以其遠恥辱也信恭因不失近於義禮亦可宗敬也此說如何曰某看不當如此說聖人言語不恁地連纏要去致敬那人合當拜卻自長揖則為不及於禮禮數不至人必怒之豈不為辱合當與那人相揖卻去拜則是過於禮禮數過當被人不答豈不為恥所依者須是得其可親之人方可如一般不好人來薦我是為失其所親須是合下知得此人是如何於其初謹之可也若失其可親之人而宗之將來必生悔吝問橫渠說君子寧言之不顧不規規於非義之信寧身被困辱不徇人以失禮之恭寧孤立無助不失親於可賤之人尹和靖書以自警今墨蹟可見不知此說如何曰伊川說得太遠橫渠說較近傍宇集義信近於義章疑上三句是工夫言如能近義則有可復言之理否曰然人說話固要信然不近義時其勢不可踐踐卻便反害於信矣問橫渠云寧言之不顧不規規於非義之信寧身被恥辱不徇人以非禮之恭寧孤立無助不失親於可賤之人此卻似倒看了文義矣重在下句相似如何曰此便是先儒舊底說它為惑箇也字故然如某解底也字便只是箇矣字又問程先生所解是於文義不合乎是道理未必然乎曰也是一說但如此說都無緊要了如橫渠說底雖似倒猶有一截工夫程先生說底某便曉未得直卿云他猶可也中一句最難說曰他有說不倒時伯羽又問謝氏說末云欲免此惟學而已故人貴乎明善此雖無謹始慮終之意然大段意好否首肯之曰然人固貴乎學但學是平昔當如此此是說事之發慮當審也伯羽問程先生說如何曰信近於義以言可復他意思要說也字出恐不必如此說范氏說如何曰范說不甚好恭近於禮恭合下便要近禮信近於義信合下便要近義故其言可復恥辱可遠信只似與人相約莫要待得言不可復時欲徇前言便失義不徇便失信只是低頭唱喏時便看近禮與不近禮問大人言不必信又如何曰此大人之事大人不拘小節變通不拘且如大人不是合下便道我言須是不信只是到那箇有不必信處須著如此學者只要合下信便近義恭便近禮榦君子食無求飽章食無求飽居無求安須是見得自家心裏常有一箇合當著緊底道理此類自不暇及若說道要在此地著緊都不濟事問敏於事而慎於言先生謂不敢盡其所有餘如何曰言易得多故不敢盡行底易得不足故須敏又曰行常苦於不足言常苦於有餘謙之問食無求飽一章先生嘗語學者曰此須是反覆看其意如何曰若只不求安飽而不謹言敏行有甚意思若只謹言敏行而不就正於有道則未免有差若工夫不到則雖就有道亦無可取正者聖人之言周備無欠闕類如此中庸尊德性道問學數語亦此意廣事難行故要敏言易出故要謹就有道而正其言行之是非蓋求飽求安是其存心處敏行謹言是其用工處須是正方得又曰有許多工夫不能就有道以正其是非也不得若無許多工夫雖欲正亦徒然又曰敏於事是合當做底事須便要做了明作食無求飽居無求安而不敏於事不謹於言也未是好學若不能恁地則就有道而正焉又是正箇甚麼但能敏事謹言而不就有道而正也不得這裏面折一句不得義剛就有道而正焉若先無本領就正箇甚然但知自做工夫而不就正於有道未必自家見得便是反覆兩邊看方盡大抵看文字皆當如此閎祖就有道而正焉須是上面做得許多工夫既有根本方可就正於有道或錄云學者須先有根本方有可正也禪家云三家村也有叢林須是自去做工夫得七八分了方來從師有質正當此時一兩句便可剖判今來此逐旋學也難又云能久從師去也好南升問就有道而正焉只是正上面言與事否曰不是說上句大概言每用取正於有道之人若是說上句居無求安食無求飽敏事謹言皆自當如此又何用取正耶雉貧而無諂章富無驕貧無諂隨分量皆可著力如不向此上立得定是入門便差了士毅希真問貧而無諂一章大意謂人必當如此曰不是說必著如此但人且要就自身己上省察若有諂與驕之病且就這裏克治賀孫問富而好禮曰只是不奢侈凡事好循理不恁地勉強好有樂意便全不見那驕底意思有人亦合禮只是勉強如此不是好淳曾光祖云貧而無諂富而無驕須是先能如此方可以到那樂與好禮田地曰不特此章如此皆是恁地如適來說食無求飽樣也是恁地義剛可學云無諂無驕尚有貧富之心至樂好禮則忘之矣曰貧而諂富而驕最不好添一無字恰遮蓋得過樂與好禮乃於此上加功可學問貧而樂如顏子非樂於簞瓢自有樂否曰也不消說得高大概是貧則易諂富則易驕無諂無驕是知得驕諂不好而不為之耳樂是他自樂了不自知其為貧也好禮是他所好者禮而已亦不自知其為富也曰然則二者相去甚遠乎曰也在人做到處如何樂與好禮亦有淺深也消得將心如此看且知得是爭一截學之不可已也如此伯羽貧而無諂富而無驕與貧而樂富而好禮此無次序只看資質與學之所至如何資質美者便自能貧而樂富而好禮如未及此卻須無諂而後能樂能無驕而後能好禮也謨童問貧而無諂富而無驕未若貧而樂富而好禮是學要造其精極否曰看文字要脫灑不要黏滯自無諂無驕者言之須更樂與好禮方為精極不可道樂與好禮須要從無諂無驕上做去蓋有人資質合下便在樂與好禮地位不可更回來做無諂無驕底工夫孔子意做兩人說謂一般人無諂無驕不若那一般人樂與好禮較勝他子貢意做一人說謂無諂無驕不若更樂與好禮淳楊問貧而無諂一段曰此是兩節不可如此說世間自有一般資質高底人合下便能貧而樂富而好禮他已在貧而樂富而好禮地位了終不成又教他去學無諂無驕問集注說學者不可忽下而趨高卻似有先後不可躐等之意曰自與學者言之是如此今人未能無諂無驕卻便到貧而樂富而好禮如何得聖人此語正似說兩人一般猶言這人貧而無諂富而無驕固是好然不似那一人貧而樂富而好禮更勝得他子貢卻盡得無諂無驕底了聖人更進得他貧而樂富而好禮地位宇上條疑同聞集注非今本問子貢問貧無諂富無驕伊川諸說大抵謂其貨殖非若後人之豐財但此心未忘耳今集注謂其先貧後富則是亦嘗如後世之生產作業矣曰怕是如此聖人既說貨殖須是有些如此看來子貢初年也是把貧與富煞當事了賀孫吳仁父問此章曰後面子貢舉詩之意不是專以此為貧而樂富而好禮底工夫蓋見得一切事皆合為此不可安於小成而不自勉也時舉不切則磋無所施不琢則磨無所措切與琢是無諂無驕磋與磨是樂與好禮集注謂超乎貧富之外者蓋若為貧而樂與富而好禮便是不能超貧富了樂自不知貧好禮自不知富明作叔蒙問子貢云如切如磋如琢如磨若只是說夫子樂與好禮之意又何以謂之告往知來曰他說意思闊非止說貧富故云告往知來賀孫問知來指何者而言曰子貢於此煞是用工夫了聖人更進他上面一節以見義理不止於此然亦不止就貧富上說講學皆如此天下道理更闊在宇問貧而無諂章曰公只管纏某義理無窮一句子貢問無諂無驕夫子以為僅可然未若樂與好禮此其深淺高下亦自分明子貢便說切磋琢磨方是知義理之無窮也直卿云若謂無諂無驕為如切如琢樂與好禮為如磋如磨則下文告往知來一句便說不得切磋琢磨兩句說得來也無精采只此小小文義間要用理會子貢言無諂無驕孔子但云僅可而已未若樂與好禮子貢便知義理無窮人須就學問上做工夫不可少有得而遽止詩所謂如切如磋如琢如磨治之已精而益求其精者其此之謂乎故子曰賜也可與言詩告諸往而知來告其所已言者謂處貧富之道而知其所未言者謂學問之功南升倪錄別出文振問貧而無諂一章曰貧而無諂富而無驕比他樂與好禮者別人便說不足道聖人只云可也蓋可也時便也得了只是比樂與好禮者分明爭一等諂者必不能好禮若於諂與驕中求樂與好禮此如適越北其轅反行求及前人無可至之理集注中所謂義理無窮者不是說無諂無驕至樂與好禮處便是義理無窮自是說切磋琢磨處精而益精爾倪陶安國問貧而無諂章曰聖門學者工夫確實縝密逐步挨去下學上達如子貢之無諂無驕是它實做到這裏便只見得這裏聖人知其已是實了得這事方進它一步它方始道上面更有箇樂與好禮便豁然曉得義理無窮學問不可少得而遽已也聖門為學工夫皆如此子路衣敝縕袍而不恥孔子稱其不忮不求它實到此位但便以此自喜故孔子曰是道也何足以臧它方知道尚有功夫在此正與子貢無諂無驕一章相似今之學者先知得甚高但著實行處全然欠闕了且如樂與好禮今人皆知道是強得無諂無驕便貪要說它卻不知無諂無驕功夫自未實進得卻恐從這處做病痛程門諸公不能盡聞伊川之說然卻據它所聞各做工夫今語錄悉備向上道理知得明皆說得去只是就身分上切實工夫大欠了銖或問集注云學者固不可安於小成而不求造道之極致亦不可鶩於虛遠而不察切己之實病也曰固是要進然有第一步方可進第二步燾仲思問樂與好禮曰無諂無驕此就貧富裏用功耳樂與好禮則大不干事至此蓋富亦樂貧亦好禮而言貧樂富好禮者但且因貧富上而舉其重者耳明道曰貧而樂非富而好禮不能富而好禮非貧而樂不能伯羽集注不患人之不己知章漢臣問患不知人也如何知得他人曰見得道理明自然知人自家不識得道理破如何知得他人賢否時舉仁父問此條以知己與知人對說須是先從裏面做出知人卻是裏面做出若自家不能知得人便是自家不知得道理賀孫問知人是隆師親友曰小事皆然然學做工夫到知人地位已甚高可學問不患人之不己知章曰自家德行充於中不待人之知若自家不知人這箇便是不知道不知則所見不明不能明人之賢否所謂不知言無以知人也知言如詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮若能知言他纔開口自家便知得他心裏事這便是知人若宰相不能知人則用捨之際不能進賢而退不肖若學者不能知人則處朋友之際豈能擇乎又曰論語上如此言者有三不病人之不己知病其不能也不患莫己知求為可知也聖人之言雖若同而其意皆別病其不能者言病我有所不能於道求為可知者當自求可知之實然後人自知之雖然如此亦不是為昭灼之行以蘄人之必知卓不患人之不己知患不知人也今人都倒做了工夫
