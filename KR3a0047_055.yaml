body:
  text: 朱子語類卷第五十五孟子五滕文公上滕文公為世子章孟子道性善言必稱堯舜須看因何理會箇性善作甚底賜性善故人皆可為堯舜必稱堯舜者所以驗性善之實德明孔子罕言性孟子見滕文公便道性善必稱堯舜恰似孟子告人躐等相似然他亦欲人先知得一箇本原則為善必力去惡必勇今於義理須是見得了自然循理有不得不然若說我要做好事所謂這些意能得幾時子端蒙劉棟問人未能便至堯舜而孟子言必稱之何也曰道性善與稱堯舜二句正相表裏蓋人之所以不至於堯舜者是他力量不至固無可奈何然人須當以堯舜為法如射者之於的箭箭皆欲其中其不中者其技藝未精也人到得堯舜地位方做得一箇人無所欠闕然也只是本分事這便是止於至善道夫問孟子言性何必於其已發處言之曰未發是性已發是善可學孟子道性善其發於外也必善無惡惡非性也性不惡矣節問孟子道性善不曾說氣稟曰是孟子不曾思量到這裏但說本性善失卻這一節問氣稟是偶然否曰是偶然相值著非是有安排等待問天生聰明又似不偶然曰便是先來說主宰底一般忽生得箇人恁地便是要他出來作君作師書中多說聰明蓋一箇說白一箇說黑若不是聰明底如何遏伏得他眾人所以中庸亦云惟天下至聖為能聰明睿知足以有臨且莫說聖賢只如漢高祖光武唐憲宗武宗他更自了得某嘗說韓退之可憐憲宗也自知他只因佛骨一事忤意未一年而憲宗死亦便休了蓋只有憲宗會用得他池錄作憲宗也會用人或曰用李絳亦如此曰憲宗初年許多伎倆是李絳教他絳本傳說得詳然絳自有一書名論事記記得更詳如李德裕獻替錄之類夔孫李仲實問注云惟堯舜為能無物欲之蔽而充其性人蓋有恬於嗜欲而不能充其性者何故曰不蔽於彼則蔽於此不蔽於此則蔽於彼畢竟須有蔽處物欲亦有多少般如白日須是雲遮方不見若無雲豈應不見耶此等處緊要在性字上今且合思量如何是性在我為何物反求吾心有蔽無蔽能充不能充不必論堯如何舜又如何如此方是讀書閎祖或問孟子道性善章看來孟子言赤子將入井有怵惕惻隱之心此只就情上見亦只說得時暫發見處如言孩提之童無不親其親亦只是就情上說得他人事初無預於己若要看得自己日用工夫惟程子所謂天下之理原其所自未有不善嘉怒哀樂未發何嘗不善發而中節即無往而不善發不中節然後不善此語最為親切學者知此當於喜怒哀樂未發加持敬工夫於喜怒哀樂已發加省察工夫方為切己曰不消分這箇是親切那箇是不親切如此則成兩截了蓋是四者未發時那怵惕惻隱與孩提愛親之心皆在裏面了少間發出來即是未發底物事靜也只是這物事動也只是這物事如孟子所說正要人於發動處見得是這物事蓋靜中有動者存動中有靜者存人但要動中見得靜靜中見得動若說動時見得是一般物事靜時又見得別是一般物事靜時見得是這般物事動時又見得不是這般物事沒這說話蓋動時見得是這物事即是靜時所養底物事靜時若存守得這物事則日用流行即是這物事而今學者且要識得動靜只是一箇物事燾性圖惡惡不可謂從善中直下來只是不能善則偏於一邊為惡性善性無不善善發而中節無往不善孟子初見滕世子想是見其資質好遂即其本原一切為他啟迪了世子若是負荷得時便只是如此了及其復見孟子孟子見其領略未得更不說了只是發他志但得於此勉之亦可以至彼若更說便漏逗了當時啟迪之言想見甚好惜其不全記不得一觀揚問集注云云曰大概是如此孟子七篇論性處只此一處已說得盡須是日日認一過只是要熟又曰程子說才與孟子說才自不同然不相妨須是子細看始得賀孫問三子之事成阀則若參較彼己顏子則知聖人學之必可至公明儀則篤信好學者也三者雖有淺深要之皆是尚志曰也略有箇淺深恁地看文字且須看他大意又曰大抵看文字不恁地子細分別出來又卻鶻突到恁地細碎分別得出來不曾看得大節目處又只是在落草處尋道夫曰這般緊要節目其初在道性善其中在夫道一而已矣其終在若藥不瞑眩厥疾弗瘳曰然道夫符舜功問滕世子從孟子言何故後來不濟事曰亦是信不篤如自楚反復問孟子孟子已知之曰世子疑吾言乎則是知性不的他當時地步狹本難做又識見卑未嘗立定得志且如許行之術至淺下且延之舉此可見可學或問孟子初教滕文公如此似好後來只恁休了是如何曰滕國小絕長補短止五十里不過如今一鄉然孟子與他說時也只說猶可以為善國而已終不成以所告齊梁之君者告之兼又不多時便為宋所滅因言程先生說孔子為乘田則為乘田為委吏則為委吏為司寇則為司寇無不可者至孟子則必得賓師之位方能行道此便是他能大而不能小處惟聖人則無不遍大小方圓無所不可又曰如孟子說諸侯之禮吾未之學也此亦是講學之有闕蓋他心量不及聖人之大故於天下事有包括不盡處天下道理儘無窮人要去做又做不辦極力做得一兩件又困了唯是聖人便事事窮到徹底包括淨盡無有或遺正淳曰如夏商之禮孔子皆能言之卻是當時杞宋之國文獻不足不足取以證聖人之言耳至孟子則曰吾未之學也而已嘗聞其略也而已廣滕定公薨章今欲處世事於陵夷之後乃一向討論典故亦果何益孟子於滕文公乃云諸侯之禮吾未之學便說與齊疏之服参粥之食哭泣盡哀大綱先正了可學古宗法如周公兄弟之為諸侯者則皆以魯國為宗至戰國時滕猶稱魯為宗國也廣滕文公問為國章因說今日田賦利害曰某嘗疑孟子所謂夏后氏五十而貢殷人七十而助周人百畝而徹恐不解如此先王疆理天下之初做許多畎溝澮洫之類大段費人力了若自五十而增為七十自七十而增為百畝則田間許多疆理都合更改恐無是理孟子當時未必親見只是傳聞如此恐亦難盡信也廣孟子說夏后氏五十而貢商人七十而助周人百畝而徹恐亦難如此移改禮記正義引劉氏皇氏之說正是獃人說話蓋田地一方溝洫廬舍成之亦難自五十里而改為七十里既是七十里卻改為百里便都著那趲動此擾亂之道如此則非三代田制乃王莽之制矣必大孟子說貢助徹亦有可疑者若夏后氏既定五十而貢之制不成商周再分其田遞相增補豈不大擾聖人舉事恐不如此如王莽之封國割某地屬某國至於淮陽太守無民可治來歸京師此尤可笑正義引劉氏皇氏熊氏說皆是臆度迂僻之甚人傑孟子說制度皆舉其綱而已如田之十一喪之自天子達之類方世祿是食公田之人問鄰長比長之屬有祿否曰恐未必有問士者之學如何曰亦農隙而學孰與教之曰鄉池錄作卿大夫有德行而致其仕者俾教之德明孟子只把雨我公田證周亦有公田讀書亦不須究盡細微因論永嘉之學於制度名物上致詳方子問滕文公為善如何行王道不得只可為後法曰他當時大故展拓不去只有五十里如何做得事看得來渠國亦不甚久便亡問所謂小國七年者非是封建小國恐是燕韓之類曰然可學請野九一而助國中什一使自賦如古注之說如何曰若將周禮一一求合其說亦難此二句大率有周禮制度野謂甸稍縣都行九一法國中什一以在王城豐凶易察去偽或問請野九一而助國中什一使自賦曰國中行鄉遂之法如五家為比五比為閭四閭為族五族為黨五黨為州又如五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍皆是五五相連屬所以行不得那九一之法故只得什一使自賦如鄉遂卻行井牧之法次第是一家出一人兵且如五家為比比便有一箇長了井牧之法次第是三十家方出得士十人徒十人井田之法孟子說夏五十而貢殷七十而助周百畝而徹此都是孟子拗處先是五十後是七十又是一百便是一番打碎一番想聖人處事必不如是勞擾又如先儒說封建古者公侯百里伯七十里子男五十里至周公則斥大疆界始大封侯國公五百里侯四百里伯三百里子男百里如此則是將那小底移動添封為大國豈有此理禹塗山之會執玉帛者萬國當時所謂國者如今溪洞之類如五六十家或百十家各立箇長自為一處都來朝王想得禮數大段藞苴後來到夏商衰時皆相吞併漸漸大了至周時只有千八百國便是萬國吞併為千八百國不及五分之一矣可見其又大了周畢竟是因而封之豈有移去許多小國卻封為大國然聖人立法亦自有低昂不如此截然謂如封五百里國這一段四面大山如太行卻有六百里不成是又挑出那百里外加封四百里這一段卻有三百五十里不成又去別處討一段子五十里來添都不如此殺定蓋孟子時去周已七八百年如今去隋時既無人記得又無載籍可考所以難見得端的又周封齊魯之地是誅紂伐奄滅國者五十所以封齊魯之地極廣如魯地方千里如齊東至海西至河南至穆陵北至無棣是多少廣闊燾問圭田餘夫之田是在公田私田之外否曰卿受田六十邑乃當二百四十井此外又有圭田五十畝也餘夫二十五畝乃十六歲以前所受在一夫百畝之外也孟子亦只是言大概耳未必曾見周禮也時舉有為神農之言章德修解君民並耕以為有體無用曰如何是有體無用這箇連體都不是德修曰食豈可無但以君民並耕而食則不可不成因君民不可並耕卻不耕耕食自不可無此是體以君民並耕則無用曰有大人之事有小人之事若是以君民並耕畢竟體已不是文蔚排淮泗而注之江淮自不與江通大綱如此說去謨問振德是施惠之意否曰是然不是財惠之惠只是施之以教化上文匡直輔翼等事是也彼既自得之復從而教之放勛曰曰字不當音驛墨者夷之章夷子以謂愛無差等施由親始似知所先後者其說如何曰人多疑其知所先後而不知此正是夷子錯處人之有愛本由親立推而及物自有等級今夷子先以為愛無差等而施之則由親始此夷子所以二本矣夷子但以此解厚葬其親之言而不知愛無差等之為二本也去偽亞夫問愛無差等施由親始與親親而仁民仁民而愛物相類否曰既是愛無差等何故又施由親始這便是有差等又如施由親始一句乃是夷之臨時譔出來湊孟子意卻不知愛無差等一句已不是了他所謂施由親始便是把愛無差等之心施之然把愛人之心推來愛親是甚道理時舉問愛有差等此所謂一本蓋親親仁民愛物具有本末也所謂二本是如何曰愛無差等何止二本蓋千萬本也退與彥忠論此彥忠云愛吾親又兼愛他人之親是二愛並立故曰二本德明或問一本曰事他人之親如己之親則是兩箇一樣重了如一本有兩根也燾問人只是一父母所生如木只是一根株夷子卻視他人之親猶己之親如牽彼樹根強合此樹根曰愛無差等便是二本至曰命之矣之字作夷子名看方成句法若作虛字看則不成句法曰是至尹氏曰何以有是差等一本故也無偽也既是一本其中便自然有許多差等二本則二者並立無差等矣墨子是也僩滕文公下陳代曰不見諸侯章問枉尺直尋曰援天下以道若枉己便已枉道則是已失援天下之具矣更說甚事自家身既已壞了如何直人恪招虞人以旌不至將殺之刀鋸在前而不避非其氣不餒如何強得閎祖詭遇是做人不當做底行險是做人不敢做底方子子路則範我馳驅而不獲者也管仲之功詭遇而獲禽耳燾射者御者都合法度方中嬖奚不能正射王良以詭御就之故良不貴之御法而今尚可尋但是今人尋得亦無用處故不肯侯景反時士大夫無人會騎此時御法尚存今射亦有法一學時便要合其法度若只是胡亂射將來又學其法不得某舊學琴且亂彈謂待會了卻依法原來不然其後遂學不得知學問安可不謹厥始揚景春曰公孫衍張儀章敬之問居天下之廣居立天下之正位行天下之大道曰大概只是無些子偏曲且如此心廓然無一毫私意直與天地同量這便是居天下之廣居便是居仁到得自家立身更無些子不當於理這便是立天下之正位便是守禮及推而見於事更無些子不合於義這便是行天下之大道便是由義論上兩句則居廣居是體立正位是用論下兩句則立正位是體行大道是用要知能居天下之廣居自然能立天下之正位行天下之大道恪居之問廣居正位大道曰廣居是廓然大公無私欲之蔽正位是所立處都無差過大道是事事做得合宜居字是就心上說擇之云廣居就存心上說先生曰是立字是就身上說行字是就施為上說賀孫居之問廣居正位大道曰廣居是不狹隘以天下為一家中國為一人何廣如之正位大道只是不僻曲正位就處身上說大道就處事上說植居者心之所存廣居無私意也才有私意則一分為二二分為四四分為八只見分小著立者身之所處正位者當為此官則為此官當在此則在此行者事之所由大道者非偏旁之徑荊棘之場人生只是此三事節居天下之廣居立天下之正位行天下之大道唯集義養氣方到此地位富貴不能淫貧賤不能移威武不能屈以浩然之氣對著他便能如此彼以其富我以吾仁彼以其爵我以吾義在彼者皆我之所不為也在我者皆古之制也吾何畏彼哉閎祖問居廣居立正位行大道是浩然之氣否曰然浩然之氣須是養有下工夫處居廣居以下是既有浩然之氣方能如此大雅問居天下之廣居云云如欲授孟子室養弟子以萬鍾孟子若去那裏立便不是正位林擇之云如不與驩言之事亦是正位曰然公孫丑問不見諸侯章問公孫丑言孟子不見諸侯何故千里來見梁惠王曰以史記考之此是梁惠王招之而至其曰千里而來者亦是勞慰之辭爾孟子出處必不錯了如平日在諸侯國內雖不為臣亦有時去見他若諸侯來召則便不去蓋孟子以賓師自處諸侯有謀則就之如孟子一日將見王王不合使人來道我本就見緣有疾不可以風不知可以來見否孟子才聞此語便不肯去時坐間有楊方縣丞者云弟子稱其師不見諸侯必是其師尋常如此其見梁惠王亦須有說但今人不肯便信他說話只管信後人言語所以疑得孟子如此謨孟子之時時君重士為士者不得不自重故必待時君致敬盡禮而後見自是當時做得箇規模如此定了如史記中列國之君擁篲先迎之類卻非是當世輕士而孟子有意於矯之以自高也因說孟子不見諸侯及此僩至云看得孟子於辭受取舍進退去就莫非天理時中之妙無一毫人欲之私無一毫過不及之病如謂段干木踰垣而避之泄柳閉門而不納是皆已甚迫斯可以見矣充仲子之操則蚓而後可謂非其有而取之者盜也充類至義之盡辭曰聞戒餽贐可受則受之皆無一毫過不及無一毫私意曰道理固是恁地而今有此事到面前這道理又卻那裏安頓至公都子問好辯章居之問孟子豈好辯章先生令看大意曰此段最好看看見諸聖賢遭時之變各行其道是這般時節其所以正救之者是這般樣子這見得聖賢是甚麼樣大力量恰似天地有闕齾處得聖賢出來補得教周全補得周全後過得稍久又不免有闕又得聖賢出來補這見聖賢是甚力量直有闔闢乾坤之功賀孫堯晚年方遭水堯之水最可疑禹治之尤不可曉胡安定說不可信掘地注海之事亦不知如何掘蓋堯甚以為儆必不是未有江河而然滔天之水如何掘以注海只是不曾見中原如何此中江河皆有路通常疑恐只是治黃河費許多力黃河今由梁山泊入清河楚州振問孔子作春秋空言無補亂臣賊子何緣便懼且何足為春秋之一治曰非說當時便一治只是存得箇治法使這道理光明燦爛有能舉而行之為治不難當時史書掌於史官想人不得見及孔子取而筆削之而其義大明孔子亦何嘗有意說用某字使人知勸用某字使人知懼用某字有甚微詞奧義使人曉不得足以褒貶榮辱人來不過如今之史書直書其事善者惡者了然在目觀之者知所懲勸故亂臣賊子有所畏懼而不犯耳近世說春秋者太巧皆失聖人之意又立為凡例加某字其例為如何去某字其例為如何盡是胡說問孔子所書辭嚴義簡若非三傳詳著事跡也曉得筆削不得曰想得孔子作書時事跡皆在門人弟子皆曉他聖人筆削之意三家懼其久而泯沒也始皆筆之於書流傳既久是以不無訛謬然孔子已自直書在其中如云夫人姜氏會齊侯于某公與夫人姜氏會齊侯于某公薨于齊公之喪至自齊夫人孫于齊此等顯然在目雖無傳亦可曉且如楚子侵中國得齊桓公與之做頭抵攔遏住他使之不得侵齊桓公死又得晉文公攔遏住如橫流泛濫硬做隄防不然中國為渰浸必矣此等義何難曉問讀春秋之法曰無它法只是據經所書之事跡準折之以先王之道某是某非某人是底猶有未是處不是底又有彼善於此處自將道理折衷便見如看史記秦之所以失如何漢之所以得如何楚漢交爭楚何以亡漢何以興其所以為是非得失成敗盛衰者何故只將自家平日講明底道理去折衷看便見看春秋亦如此只是聖人言語細密要人子細斟量考索耳問胡文定春秋解如何曰說得太深蘇子由教人看左傳不過只是看他事之本末而以義理折衷去取之耳僩孟子苦死要與楊墨辯是如何與他有甚冤惡所以闢之如不共戴天之讎能言距楊墨者聖人之徒也才說道要距楊墨便是聖人之徒如人逐賊有人見了自不與捉這便喚做是賊之黨賊是人情之所當惡若說道賊當捉當誅這便是主人邊人若說道賊也可捉可恕這只喚做賊邊人賀孫問孟子好辯一節曰當時如縱橫刑名之徒孟子卻不管他蓋他只壞得箇粗底若楊墨則害了人心須著與之辯時舉謂當時人心不正趨向不一非孟子力起而闢之則聖人之道無自而明是時真箇少孟子不得曰孟子於當時只在私下恁地說所謂楊墨之徒也未怕他到後世卻因其言而知聖人之道為是知異端之學為非乃是孟子有功於後世耳時舉因居之看好辯一章曰墨氏愛無差等故視其父如路人楊氏只理會自己所謂修其身而外天下國家者故至於無君要之楊墨即是逆理不循理耳如一株木順生向上去是順理今一枝乃逆下生來是逆理也如水本潤下今洪水乃橫流是逆理也禹掘地而注之海乃順水之性使之潤下而已暴君壞宮室以為污池棄田以為園囿民有屋可居有地可種桑麻今乃壞而棄之是逆理也湯武之舉乃是順理如楊墨逆理無父無君邪說誣民仁義充塞便至於率獸食人人相食此孟子極力闢之亦只是順理而已此一段多推本先生意非全語植敬之問楊墨曰楊墨只是差了些子其末流遂至於無父無君蓋楊氏見世間人營營於名利埋沒其身而不自知故獨潔其身以自高如荷蕢接輿之徒是也然使人皆如此潔身而自為則天下事教誰理會此便是無君也墨氏見世間人自私自利不能及人故欲兼天下之人人而盡愛之然不知或有一患難在君親則當先救在他人則後救之若君親與他人不分先後則是待君親猶他人也便是無父此二者之所以為禽獸也孟子之辯只緣是放過不得今人見佛老家之說者或以為其說似勝吾儒之說或又以為彼雖說得不是不用管他此皆是看他不破故不能與之辯若真箇見得是害人心亂吾道豈容不與之辯所謂孟子好辯者非好辯也自是住不得也南升問墨氏兼愛何遽至於無父曰人也只孝得一箇父母那有七手八腳愛得許多能養其父無闕則已難矣想得他之所以養父母者粗衣糲食必不能堪蓋他既欲兼愛則其愛父母也必疏其孝也不周至非無父而何墨子尚儉惡樂所以說里號朝歌墨子回車想得是箇淡泊枯槁底人其事父母也可想見又問率獸食人亦深其弊而極言之非真有此事也曰不然即它之道便能如此楊氏自是箇退步愛身不理會事底人墨氏兼愛又弄得沒合殺使天下倀倀然必至於大亂而後已非率獸食人而何如東晉之尚清談此便是楊氏之學楊氏即老莊之道少間百事廢弛遂啟夷狄亂華其禍豈不慘於洪水猛獸之害又如梁武帝事佛至於社稷丘墟亦其驗也如近世王介甫其學問高妙出入於老佛之間其政事欲與堯舜三代爭衡然所用者盡是小人聚天下輕薄無賴小人作一處以至遺禍至今他初間也何嘗有啟狄亂華率獸食人之意只是本原不正義理不明其終必至於是耳或云若論其修身行己人所不及曰此亦是他一節好其他狠厲偏僻招合小人皆其資質學問之差亦安得以一節之好而蓋其大節之惡哉吁可畏可畏僩問墨氏兼愛疑於仁此易見楊氏為我何以疑於義曰楊朱看來不似義他全是老子之學只是箇逍遙物外僅足其身不屑世務之人只是他自要其身界限齊整不相侵越微似義耳然終不似也僩論楊墨及異端類餘見盡心上孟子言我欲正人心蓋人心正然後可以有所為今人心都不正了如何可以理會
