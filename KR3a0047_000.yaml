body:
  text: 朱子語録姓氏廖德明字子晦南劍人癸巳以後所聞池録一饒録四十六輔廣字漢卿慶源人居嘉興甲寅以後所聞池録二余大雅字正叔上饒人戊戌以後所聞池録三陳文蔚字才卿上饒人戊申以後所聞池録四李閎祖字守約邵武人戊申以後所聞池録五李方子字公晦邵武人戊申以後所聞池録六葉賀孫字味道括蒼人居永嘉辛亥以後所聞池録七八九十十一潘時舉字子善天台人癸丑以後所聞池録十二饒録四十六董銖字叔重鄱陽人丙辰以後所聞池録十三饒録四十六竇從周字文卿丹陽人丙午以後所聞池録十四金去僞字敬直樂平人乙未所聞池録十五李季札字季子婺源人丙申乙卯所聞池録十六萬人傑字正淳興國人庚子以後所聞池録十七饒録四十六楊道夫字仲愚建寧人己酉以後所聞池録十八十九徐宇字居父永嘉人庚戌以後所聞池録二十草一饒録四十六林恪字叔恭天台人癸丑所聞池録草二饒録四十六石洪慶字子餘臨漳人癸丑所聞池録草三徐容字仁父永嘉人辛亥所聞池録草四甘節字吉父臨川人癸丑以後所聞池録草五黃義剛字毅然臨川人癸丑以後所聞池録草六草七饒録四十六淵字亞夫涪陵人癸丑所聞池録草八襲蓋卿字夢錫常寧人甲寅所聞池録草九廖謙字益仲衡陽人甲寅所聞池録三十孫自修字敬父宣城人甲寅所聞池録三一潘履孫字坦翁婺源人居紹興甲寅所聞池録三二湯泳字叔永丹陽人乙卯所聞池録三三林夔孫字子武三山人丁巳以後所聞池録三四三五陳埴録已削錢木之字子山晉陵人寓永嘉丁巳所聞池録三六曾祖道字擇之寧都人丁巳所聞池録三七沈僩字杜仲永嘉人戊午以後所聞池録三八三九四十四一郭友仁字德元山陽人寓臨安戊午所聞池録四二李儒用字仲秉嶽陽人己未所聞池録四三饒録三十黃幹字直卿三山人饒録一饒後録二何鎬字叔京邵武人乙未以前所聞饒録二程端蒙字正思鄱陽人己亥以後所聞饒録三周謨字舜弼南康人己亥以後所聞饒録四五潘柄字謙之三山人癸卯以後所聞饒録六魏椿字元壽建陽人戊申五夫所聞饒録七饒後録二十四吳必大字伯豐興國人戊申己酉所聞饒録八黃字子耕豫章人戊申所聞饒録九十楊若海字道夫之子饒録十一楊驤字子昂道夫族中己酉甲寅所聞饒録十二陳淳字安卿臨漳人庚戌己未所聞饒録十三十四童伯羽字蜚卿甌寧人庚戌所聞饒録十五鄭可學字子上莆田人辛亥所聞饒録十六滕璘字德粹新安人辛亥所聞饒録十七王力行字近思同安人辛亥所聞饒録十八游敬仲字連叔南劍人辛亥所聞饒録十九不知何氏辛亥同舍共聞饒録二十黃升卿辛亥所聞饒録草一周明作字元興建陽人壬子以後所聞饒録草二蔡録字行夫平陽人壬子所録饒録草三楊與立字子權浦城人道夫從兄壬子同劉龔栗談見饒録草四鄭南升字文相潮州人癸丑所聞饒録草五歐陽謙之字晞遜癸丑所聞饒録草六游倪字和之建寧人癸丑所聞饒録草七楊至字至之泉州人癸丑甲寅所聞饒録草八饒後録二十五潘植字立之癸丑所聞饒録草九王過字幼觀鄱陽人甲寅以後所聞饒録三十董拱壽字仁叔鄱陽人甲寅所聞饒録三一林學蒙字正卿三山人甲寅以後所聞饒録三二林賜字聞一乙卯以後所聞饒録三三胡泳字伯量南康人戊午所聞饒録三四呂燾字德昭弟煥字德遠南康人己未所聞饒録三六三七不知何氏己未同舍共録饒録三九不知何氏饒録四十四一四二吳壽昌字大年邵武人丙午同子浩録饒録四三楊長孺字伯子廬陵人甲寅記見饒録四四吳琮字仲方臨川人甲寅記見饒録四五已上三家非柢本覽者詳之楊方字子直汀州人庚寅所聞饒後録一間有可疑包揚字顯道建昌人癸卯甲辰乙巳所聞饒後録三四五六間有疑誤劉炎字潛夫邵武人己酉甲寅以後所聞饒後録七劉子寰字所父建陽人己未所聞饒後録八邵浩字叔義金華人丙午所聞饒後録九劉砥字履之三山人庚戌所聞饒後録十劉礪字用之三山人己未所聞饒後録十一李輝字晦父饒後録十二陳芝字庭秀壬子所聞饒後録十三黃灝字商伯都昌人饒後録十四黃卓字先之饒後録十五汪德輔字長孺鄱陽人壬子所聞饒後録十六吳振字伯起饒後録十七吳雉字和中建陽人饒後録十八鍾震字春伯潭州人甲寅所聞饒後録十九林子蒙饒後録二十林學履字安卿永福人己未所録饒後録草一蕭佐字定夫湘鄉人甲寅所聞饒後録草二舒高甲寅所聞饒後録草三李杞字良仲平江人甲寅所聞饒後録草六張洽字元德清江人丁未癸丑所聞附池録後黃士毅字子洪莆田人蜀類徽續類李壯祖字處謙邵武人蜀類李公謹名文子字公謹邵武人蜀類一之蜀類枅徽續類郭逍遙建別録十八不知何氏建別録十九二十朱子遺語之行於世也盛矣蓋本其舊者有三而從以類者二靖德嘗受讀而病其難也昔朱子嘗次程子之書矣著記録者主名而稍第其所聞歲月且以精擇審取戒後之學者李公道傳之刊池録也蓋用此法黃公幹既序之矣后乃不滿意蓋亦懼夫讀者之不得其方也二公之心其亦韓子所謂堯舜之利民也大而禹之慮民也深者乎是以黃公不自出其所録其後李公性傳刊續録於饒以備池録之所未蔡公杭刊後録又益富矣然饒録最後三家李公嘗附致其疑而其四十二卷元題文說者以靖德考之疑包公揚所録蓋公之子尚書恢嘗刻公所輯文說一編視此卷雖略而饒後録所刊包公録中往往有此卷中語是知此為公所録亡疑獨所載胡子知言一章謂書為溺心志之大阱者最為疑忌後學使不知者謂為先生語是當削去亡疑而李公不能察也語録之難讀如此黃公之慮豈為過哉語之從類黃子洪士毅始為之史廉叔公說刻之蜀近歲徽州又刻之王公佖為續類徽州又刻之昔張宣公類洙泗言仁祖程子意也而朱子以滋學者入耳出口之弊疑之魏公了翁援是為學者慮當矣蔡公乃曰論語諸篇記亦以類則議者亦莫能破也然三録二類凡五書者並行而錯出不相統一蓋蜀類增多池録三十餘家饒録增多蜀類八九家而蜀類續類又有池饒三録所無者王公謂蜀類作於池饒各為録之後者蓋失之而今池録中語尚多蜀類所未收則不可曉已豈池録嘗再增定邪抑子洪猶有遺邪子洪所定門目頗精詳為力矣廉叔刻之不復讎校故文字甚差脫或至不可讀徽本附以饒録續類又增前類所未入亦為有功惜其雜亂重復讀者尤以為病而饒後録新增數家王公或未之見未及收也靖德忘其晚陋輒合五書而參校之因子洪門目以續類附焉饒後録入焉遺者收之誤者正之考其同異而削其復者一千一百五十餘條越數歲編成可繕寫顧文字浩博猶不敢謂亡舛誤覽者幸哀其劬而正之其或一二字可疑則元録之訛無別本可訂定固不得輒改也諸公序語列之篇端合而考之黃公謂歷千載而如會一堂合衆聞而悉歸一己所以志學者之幸李公謂語録與諸書異者當以歲月先後求之亦確論也獨論記者易差而謂李端伯猶爾則不然蓋以至大至剛以直為句者乃伊川之說端伯不誤也讀書之難豈獨語録朱子嘗言論語後十篇不及前六言六蔽不似聖人法語是孔門所記猶可疑也而況後之書乎讀者誠能服膺乎精擇審取之訓以為讀語類之法而又以滋入耳出口之弊云者為讀語類之戒則庶乎可與共學矣景定癸亥秋八月戊申朔後學導江黎靖德書李公性傳敘饒録謂先生有別録多談炎興大事未敢傳而亡於火猶幸存一二頃嘗問諸其家則所云存者亦不存矣甚可惜也因讀蔡公所刻包公録已四卷其一卷既與元題文說者相出入而他三卷所言大抵多炎興間事疑即李公昔藏而今亡者但略無互見於諸家之所録則與其子樞密所跋文說謂公所録多且詳與世所傳大概無異故藏而不出云者不相似樞密又謂公所録已亡於建安之火不復存而湯氏乃有藏本是皆不能使人亡疑焉者靖德來盱江樞密甫下世恨不及質之也近歲吳公堅在建安又刊別録二冊蓋收池饒三録所遺而亦多已見他録者併參校而附益之粗為定編靖德適行郡事因輒刻之郡齊與學者共之咸淳庚午正月辛亥靖德再書朱子語類門目理氣太極陰陽凡形於法象者二卷
