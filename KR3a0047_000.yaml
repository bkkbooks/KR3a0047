body:
  text: 朱子語錄姓氏廖德明字子晦南劍人癸巳以後所聞池錄一饒錄四十六輔廣字漢卿慶源人居嘉興甲寅以後所聞池錄二余大雅字正叔上饒人戊戌以後所聞池錄三陳文蔚字才卿上饒人戊申以後所聞池錄四李閎祖字守約邵武人戊申以後所聞池錄五李方子字公晦邵武人戊申以後所聞池錄六葉賀孫字味道括蒼人居永嘉辛亥以後所聞池錄七八九十十一潘時舉字子善天台人癸丑以後所聞池錄十二饒錄四十六董銖字叔重鄱陽人丙辰以後所聞池錄十三饒錄四十六竇從周字文卿丹陽人丙午以後所聞池錄十四金去偽字敬直樂平人乙未所聞池錄十五李季札字季子婺源人丙申乙卯所聞池錄十六萬人傑字正淳興國人庚子以後所聞池錄十七饒錄四十六楊道夫字仲愚建甯人己酉以後所聞池錄十八十九徐宇字居父永嘉人庚戌以後所聞池錄二十廿一饒錄四十六林恪字叔恭天台人癸丑所聞池錄廿二饒錄四十六石洪慶字子餘臨漳人癸丑所聞池錄廿三徐容字仁父永嘉人辛亥所聞池錄廿四甘節字吉父臨川人癸丑以後所聞池錄廿五黃義剛字毅然臨川人癸丑以後所聞池錄廿六廿七饒錄四十六淵字亞夫涪陵人癸丑所聞池錄廿八襲蓋卿字夢錫常寧人甲寅所聞池錄廿九廖謙字益仲衡陽人甲寅所聞池錄三十孫自修字敬父宣城人甲寅所聞池錄三一潘履孫字坦翁婺源人居紹興甲寅所聞池錄三二湯泳字叔永丹陽人乙卯所聞池錄三三林夔孫字子武三山人丁巳以後所聞池錄三四三五陳埴錄已削錢木之字子山晉陵人寓永嘉丁巳所聞池錄三六曾祖道字擇之寧都人丁巳所聞池錄三七沈僩字杜仲永嘉人戊午以後所聞池錄三八三九四十四一郭友仁字德元山陽人寓臨安戊午所聞池錄四二李儒用字仲秉岳陽人己未所聞池錄四三饒錄三十黃榦字直卿三山人饒錄一饒後錄二何鎬字叔京邵武人乙未以前所聞饒錄二程端蒙字正思鄱陽人己亥以後所聞饒錄三周謨字舜弼南康人己亥以後所聞饒錄四五潘柄字謙之三山人癸卯以後所聞饒錄六魏椿字元壽建陽人戊申五夫所聞饒錄七饒後錄二十四吳必大字伯豐興國人戊申己酉所聞饒錄八黃字子耕豫章人戊申所聞饒錄九十楊若海字道夫之子饒錄十一楊驤字子昂道夫族中己酉甲寅所聞饒錄十二陳淳字安卿臨漳人庚戌己未所聞饒錄十三十四童伯羽字蜚卿甌甯人庚戌所聞饒錄十五鄭可學字子上莆田人辛亥所聞饒錄十六滕璘字德粹新安人辛亥所聞饒錄十七王力行字近思同安人辛亥所聞饒錄十八游敬仲字連叔南劍人辛亥所聞饒錄十九不知何氏辛亥同舍共聞饒錄二十黃升卿辛亥所聞饒錄廿一周明作字元興建陽人壬子以後所聞饒錄廿二蔡錄字行夫平陽人壬子所錄饒錄廿三楊與立字子權浦城人道夫從兄壬子同劉龔栗譚見饒錄廿四鄭南升字文相潮州人癸丑所聞饒錄廿五歐陽謙之字晞遜癸丑所聞饒錄廿六游倪字和之建甯人癸丑所聞饒錄廿七楊至字至之泉州人癸丑甲寅所聞饒錄廿八饒後錄二十五潘植字立之癸丑所聞饒錄廿九王過字幼觀鄱陽人甲寅以後所聞饒錄三十董拱壽字仁叔鄱陽人甲寅所聞饒錄三一林學蒙字正卿三山人甲寅以後所聞饒錄三二林賜字聞一乙卯以後所聞饒錄三三胡泳字伯量南康人戊午所聞饒錄三四呂燾字德昭弟煥字德遠南康人己未所聞饒錄三六三七不知何氏己未同舍共錄饒錄三九不知何氏饒錄四十四一四二吳壽昌字大年邵武人丙午同子浩錄饒錄四三楊長孺字伯子廬陵人甲寅記見饒錄四四吳琮字仲方臨川人甲寅記見饒錄四五已上三家非柢本覽者詳之楊方字子直汀州人庚寅所聞饒後錄一間有可疑包揚字顯道建昌人癸卯甲辰乙巳所聞饒後錄三四五六間有疑誤劉炎字潛夫邵武人己酉甲寅以後所聞饒後錄七劉子寰字所父建陽人己未所聞饒後錄八邵浩字叔義金華人丙午所聞饒後錄九劉砥字履之三山人庚戌所聞饒後錄十劉礪字用之三山人己未所聞饒後錄十一李煇字晦父饒後錄十二陳芝字庭秀壬子所聞饒後錄十三黃灝字商伯都昌人饒後錄十四黃卓字先之饒後錄十五汪德輔字長孺鄱陽人壬子所聞饒後錄十六吳振字伯起饒後錄十七吳雉字和中建陽人饒後錄十八鍾震字春伯潭州人甲寅所聞饒後錄十九林子蒙饒後錄二十林學履字安卿永福人己未所錄饒後錄廿一蕭佐字定夫湘鄉人甲寅所聞饒後錄廿二舒高甲寅所聞饒後錄廿三李杞字良仲平江人甲寅所聞饒後錄廿六張洽字元德清江人丁未癸丑所聞附池錄後黃士毅字子洪莆田人蜀類徽續類李壯祖字處謙邵武人蜀類李公謹名文子字公謹邵武人蜀類一之蜀類枅徽續類郭逍遙建別錄十八不知何氏建別錄十九二十朱子遺語之行於世也盛矣蓋本其舊者有三而從以類者二靖德嘗受讀而病其難也昔朱子嘗次程子之書矣著記錄者主名而稍第其所聞歲月且以精擇審取戒後之學者李公道傳之刊池錄也蓋用此法黃公榦既序之矣后乃不滿意蓋亦懼夫讀者之不得其方也二公之心其亦韓子所謂堯舜之利民也大而禹之慮民也深者乎是以黃公不自出其所錄其後李公性傳刊續錄於饒以備池錄之所未蔡公杭刊後錄又益富矣然饒錄最後三家李公嘗附致其疑而其四十二卷元題文說者以靖德考之疑包公揚所錄蓋公之子尚書恢嘗刻公所輯文說一編視此卷雖略而饒後錄所刊包公錄中往往有此卷中語是知此為公所錄亡疑獨所載胡子知言一章謂書為溺心志之大阱者最為疑忌後學使不知者謂為先生語是當削去亡疑而李公不能察也語錄之難讀如此黃公之慮豈為過哉語之從類黃子洪士毅始為之史廉叔公說刻之蜀近歲徽州又刻之王公佖為續類徽州又刻之昔張宣公類洙泗言仁祖程子意也而朱子以滋學者入耳出口之弊疑之魏公了翁援是為學者慮當矣蔡公乃曰論語諸篇記亦以類則議者亦莫能破也然三錄二類凡五書者並行而錯出不相統壹蓋蜀類增多池錄三十餘家饒錄增多蜀類八九家而蜀類續類又有池饒三錄所無者王公謂蜀類作於池饒各為錄之後者蓋失之而今池錄中語尚多蜀類所未收則不可曉已豈池錄嘗再增定邪抑子洪猶有遺邪子洪所定門目頗精詳為力矣廉叔刻之不復讎校故文字甚差脫或至不可讀徽本附以饒錄續類又增前類所未入亦為有功惜其雜亂重複讀者尤以為病而饒後錄新增數家王公或未之見未及收也靖德忘其晚陋輒合五書而參校之因子洪門目以續類附焉饒後錄入焉遺者收之誤者正之考其同異而削其複者一千一百五十餘條越數歲編成可繕寫顧文字浩博猶不敢謂亡舛誤覽者幸哀其劬而正之其或一二字可疑則元錄之訛無別本可訂定固不得輒改也諸公序語列之篇端合而考之黃公謂歷千載而如會一堂合眾聞而悉歸一己所以志學者之幸李公謂語錄與諸書異者當以歲月先後求之亦確論也獨論記者易差而謂李端伯猶爾則不然蓋以至大至剛以直為句者乃伊川之說端伯不誤也讀書之難豈獨語錄朱子嘗言論語後十篇不及前六言六蔽不似聖人法語是孔門所記猶可疑也而況後之書乎讀者誠能服膺乎精擇審取之訓以為讀語類之法而又以滋入耳出口之弊云者為讀語類之戒則庶乎可與共學矣景定癸亥秋八月戊申朔後學導江黎靖德書李公性傳敘饒錄謂先生有別錄多談炎興大事未敢傳而亡於火猶幸存一二頃嘗問諸其家則所云存者亦不存矣甚可惜也因讀蔡公所刻包公錄已四卷其一卷既與元題文說者相出入而他三卷所言大抵多炎興間事疑即李公昔藏而今亡者但略無互見於諸家之所錄則與其子樞密所跋文說謂公所錄多且詳與世所傳大概無異故藏而不出云者不相似樞密又謂公所錄已亡於建安之火不復存而湯氏乃有藏本是皆不能使人亡疑焉者靖德來盱江樞密甫下世恨不及質之也近歲吳公堅在建安又刊別錄二冊蓋收池饒三錄所遺而亦多已見他錄者併參校而附益之粗為定編靖德適行郡事因輒刻之郡齋與學者共之咸淳庚午正月辛亥靖德再書朱子語類門目理氣太極陰陽凡形於法象者二卷
