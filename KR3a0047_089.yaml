body:
  text: 朱子語類卷第八十九禮六冠昏喪總論冠禮昏禮不知起於何時如禮記疏說得恁地不知如何未暇辨得義剛問冠昏喪祭何書可用曰只溫公書儀略可行亦不備又曰只是儀禮問伊川亦有書曰只有些子節欽夫嘗定諸禮可行者淳録云在廣西刊三家禮乃除冠禮不載問之云難行某答之云古禮惟冠禮最易行淳録云只一家事如昏禮須兩家皆好禮淳録云礙兩家如五兩之儀須兩家是一樣人始得方得行喪禮臨時哀痛中少有心力及之祭禮則終獻之儀煩多長久皆是難行看冠禮比他禮卻最易行賀孫淳録少異問喪祭之禮今之士固難行而冠昏自行可乎曰亦自可行某今所定者前一截依溫公後一截依伊川昏禮事屬兩家恐未必信禮恐或難行若冠禮是自家屋裏事卻易行向見南軒說冠禮難行某云是自家屋裏事關了門將巾冠與子弟戴有甚難又云昏禮廟見舅姑之亡者而不及祖蓋古者宗子法行非宗子之家不可別立祖廟故但有禰廟今只共廟如何只見禰而不見祖此當以義起亦見祖可也問必待三月如何曰今若既歸來直待三月又似太久古人直是至此方見可以為婦及不可為婦此後方反馬馬是婦初歸時所乘車至此方送還母家賀孫問冠昏喪祭禮曰今日行之正要簡簡則人易從如溫公書儀人已以為難行其殽饌十五味亦難辦舜功云隨家豐儉曰然問唐人立廟不知當用何器曰本朝只文潞公立廟不知用何器曰與叔亦曾立廟用古器然其祭以古玄服乃作大袖皂衫亦怪不如著公服今五禮新儀亦簡唐人祭禮極詳可學問冠昏之禮如欲行之當須使冠昏之人易曉其言乃為有益如三加之辭出門之戒若只以古語告之彼將謂何曰只以今之俗語告之使之易曉乃佳時舉冠因言冠禮或曰邾隱公將冠使孟懿子問於孔子孔子對他一段好曰似這樣事孔子肚裏有多但今所載於方冊上者亦無幾爾廣昏天子諸侯不再娶亡了后妃只是以一娶十二女九女者推上魯齊破了此法再娶大夫娶三士二卻得再娶揚因論今之士大夫多是死於欲曰古人法度好天子一娶十二女諸侯一娶九女老則一齊老了都無許多患揚親迎之禮從伊川之說為是近則迎於其國遠則迎於其館閎祖問程氏昏儀與溫公儀如何曰互有得失曰當以何為主曰迎婦以前溫公底是婦入門以後程儀是溫公儀親迎只拜妻之父兩拜便受婦以行卻是程儀遍見妻之黨則不是溫公儀入門便廟見不是程儀未廟見卻是大概只此兩條以此為準去子細看曰廟見當以何日曰古人三月而後見曰何必待三月曰未知得婦人性行如何三月之久則婦儀亦熟方成婦矣然今也不能到三月只做箇節次如此曰古人納采後又納吉若卜不吉則如何曰便休也曰古人納幣五兩只五匹耳恐太簡難行否曰計繁簡則是以利言矣且吾儕無望於復古則風俗更教誰變曰溫公用鹿皮如何曰大節是了小小不能皆然亦沒緊要曰溫公婦見舅姑及舅姑享婦儀是否曰亦是古人有此禮淳或問古者婦三月廟見而溫公禮用次日今有當日即廟見者如何曰古人是從下做上其初且是行夫婦禮次日方見舅姑服事舅姑已及三月不得罪於舅姑方得奉祭祀義剛問婦當日廟見非禮否曰固然溫公如此他是取左氏先配後祖之說不知左氏之語何足憑豈可取不足憑之左氏而棄可信之儀禮乎卓人著書只是自入些己意便做病痛司馬與伊川定昏禮都是依儀禮只是各改了一處便不是古人意司馬禮云親迎奠雁見主昏者即出不先見妻父母者以婦未見舅姑也是古禮如此伊川卻教拜了又入堂拜大男小女這不是伊川云壻迎婦既至即揖入內次日見舅姑三月而廟見是古禮司馬禮卻說婦入門即拜影堂這又不是古人初未成婦次日方見舅姑蓋先得於夫方可見舅姑到兩三月得舅姑意了舅姑方令見祖廟某思量今亦不能三月之久亦須第二日見舅姑第三日廟見乃安亦當行親迎之禮古者天子必無親至后家之禮今妻家遠要行禮一則令妻家就近處設一處卻就彼往迎歸館成禮一則妻家出至一處壻即就彼迎歸自成禮賀孫叔器問昏禮溫公儀婦先拜夫程儀夫先拜婦或以為妻者齊也當齊拜何者為是曰古者婦人與男子為禮皆俠拜每拜以二為禮昏禮婦先二拜夫答一拜婦又二拜夫又答一拜冠禮雖見母母亦俠拜淳問今有士人對俗人結姻欲行昏禮而彼俗人不從卻如何先生微笑顧義剛久之乃曰這也是費力只得宛轉使人去與他商量古禮也省徑人也何苦不行直卿曰若古禮有甚難行者也不必拘如三周御輪不成是硬要扛定轎子旋三匝先生亦笑而應義剛曰如俗禮若不大段害理者些小不必盡去也得曰是久之云古人也有不可曉古人於男女之際甚嚴卻如何地親迎乃用男子御車但只令略偏些子不知怎生地直卿舉今人結髮之說為笑先生曰若娶用結髮則結髮從軍皆先用結了頭髮後方與番人冢殺耶義剛堯卿問姑舅之子為昏曰據律中不許然自仁宗之女嫁李瑋家乃是姑舅之子故歐陽公曰公私皆已通行此句最是把駛去聲這事又如魯初間與宋世為昏後又與齊世為昏其間皆有姑舅之子者從古已然只怕位不是義剛喪問喪禮制度節目曰恐怕儀禮也難行如朝夕奠與葬時事尚可未殯以前如何得一一恁地子細只如含飯一節教人從那裏轉那裏安頓一一各有定所須是有人相方得孔子曰行夏之時乘殷之輅已是厭周文之類了某怕聖人出來也只隨今風俗立一箇限制須從寬簡而今考得禮子細一一如古固是好如考不得也只得隨俗不礙理底行去胡泳因論喪服曰今人吉服皆已變古獨喪服必欲從古恐不相稱閎祖云雖是如此但古禮已廢幸此喪服尚有古制不猶愈於俱亡乎直卿亦以為然先生曰禮時為大某嘗謂衣冠本以便身古人亦未必一一有義又是逐時增添名物愈繁若要可行須是酌古之制去其重復使之簡易然後可又云一人自在下面做不濟事須是朝廷理會一齊與整頓過又云康節說某今人須著今時衣服忒煞不理會也閎祖以下喪服問子升向見考祔禮煞子細不知其他禮數都考得如此否曰未能及其他曰今古不同如殯禮今已自不可行子升因問喪禮如溫公儀今人平時既不用古服卻獨於喪禮服之恐亦非宜兼非禮不足哀有餘之意故向來斟酌只以今服加衰絰曰論來固是如此只如今因喪服尚存古制後世有願治君臣或可因此舉而行之若一向廢了恐後來者愈不復識矣木之問喪服今人亦有欲用古制者時舉以為吉服既用今制而獨喪服用古制恐徒駭俗不知當如何曰駭俗猶些小事但恐考之未必是耳若果考得是用之亦無害時舉喪禮衣服之類逐時換去如葬後換葛衫小祥後換紳布之類揚問喪服之制曰衣帶下尺鄭注云要也廣尺足以掩裳上際廖西仲云以布半幅其長隨衣之圍橫綴於衣下而謂之要問喪服如至尊之喪小官及士庶等服於古皆差儀禮諸侯為天子斬衰三年傳曰君至尊也注天子諸侯及卿大夫有地者皆曰君庶人為國君齊衰三月注不言民而言庶人庶人或有在官者天子畿內之民服天子亦如之以是觀之自古無通天下為天子三年之制前輩恐未之考曰今士庶人既無本國之君服又無至尊服則是無君亦不可不示其變如今敘衫亦不害此亦只存得些影子問士庶亦不可久庶人為國君亦止齊衰三月諸侯之大夫為天子亦止小功繐衰或問有官人嫁娶在祔廟後曰只不可帶花用樂少示其變又曰至尊之服要好初來三日用古冠服上衣下裳以後卻用今所制服四腳機頭等自京官以上是一等服京官以下是一等服士人又一等服庶人又一等服如此等級分明也好器之問壽皇行三年之喪是誰建議曰自是要行這是甚次第可惜無好宰相將順成此一大事若能因舉行盛典及於天下一整數千百年之陋垂數千百年之成憲是甚次第時相自用紫衫皂帶入臨用白衫待退歸便不著某前日在上前說及三年之喪亦自感動次日即付出與禮官集議意甚好不知後來如何忽又住了卻對宰相說也似吒異不知壽皇既已行了又有甚吒異只是亦無人助成此事因檢儀禮注疏說嫡孫承重甚詳君之喪服士庶亦可聚哭但不可設位某在潭州時亦多有民衆欲入衙來哭某初不知外面被門子止約了待兩三日方知遂出榜告示亦有來哭者賀孫以下君喪因說天子之喪自太子宰執而下漸降其服至於四海則盡三月服謂凶服訃所至不問地之遠近但盡於三月而止天子初死近地先聞則盡三月遠地或後聞之亦止於三月之內也又云古者次第公卿大夫與列國之諸侯各為天子三年之喪而列國之卿大夫又各為其君三年之服蓋止是自服其君如諸侯之大夫為本國諸侯服三年之喪則不復為天子服百姓則畿內之民自為天子服本國之君服三年之喪也故禮曰百姓為天子諸侯有土者服三年之喪為此也又云君之喪諸達官之長杖達官謂得自通於君者如內則公卿宰執六曹之長九寺五監之長外則監司郡守皆自得通章奏於君者凡此者皆杖以次則不杖如太常卿杖太常少卿則不杖若無太常卿則少卿代之杖也只不知王畿之內公卿之有采地者其民當何如服當檢看卓徽廟訃至胡明仲知嚴州衆議欲以日易月張晉彥為司理為明仲言前世以日易月皆是有遺詔今太上在遠無遺詔豈可行胡曰然則如之何曰盍請之於朝胡如其說不報可學高宗登遐壽皇麻衣不離身而臣子晏然朝服如常只於朝見時略換皂帶以為服至尊之服冠有數樣衣有數樣所以當來如此者乃是甚麼時便著甚麼樣冠服昨聞朝廷無所折衷將許多衣服一齊重疊著了古禮恐難行如今來卻自有古人做未到處如古者以皮束棺如何會彌縫又設熬黍稷於棺旁以惑蚍蜉可見少智然三日便殯了又見得防慮之深遠今棺以用漆為固要拘三日便殯亦難喪最要不失大本如不用浮屠送葬不用樂這也須除卻所謂古禮難行者非是道不當行只怕少間止了得要合那邊要合這邊到這裏一重大利害處卻沒理會卻便成易了古人已自有箇活法如身執事者面垢而已之類賀孫器遠問安常習故是如何曰云云如親生父母子合當安之到得立為伯叔後疑於伯叔父有不安者這也是理合當如此然而自古卻有大宗無子則小宗之子為之後這道理又卻重只得安於伯叔父母而不可安於所生父母喪服則為為後父母服三年所生父母只齊衰不杖期賀孫以下服制問天下事易至於安常習故如何曰且如今人為所生父母齊衰不杖期為所養父母斬衰三年以理觀之自是不安然聖人有箇存亡繼絶底道理又不容不安且如濮安懿王事當時皆以司馬公為是今則濮安懿王下卻有主祀朝廷卻未嘗正其號卓祖在父亡祖母死亦承重畢嫡孫承重庶孫是長亦不承庶子之長子死亦服三年揚禮只有父母服他服並無故今長幼服都無考妻服期子以父在服亦期故哭祭之類同今律則不然故其禮皆齟齬揚顯道問服制曰唐時添那服制添得也有差異處且如親叔伯是期堂叔須是大功乃便降為小功不知是怎生地義剛服議漢儒自為一家之學以儀禮喪服篇為宗禮記中小記大傳則皆申其說者詳密之至如理絲櫛髮可試考之畫作圖子更參以通典及今律令當有以見古人之意不苟然也灝問孝子於尸柩之前在喪禮都不拜如何曰想只是父母在生時子弟欲拜亦須俟父母起而衣服今恐未忍以神事之故亦不拜胡泳以下居喪或問哀慕之情易得間斷如何曰此如何問得人孝子喪親哀慕之情自是心有所不能已豈待抑勒亦豈待問人只是時時思慕自哀感所以說祭思敬喪思哀只是思著自是敬自是哀若是不哀別人如何抑勒得他因舉宰我問三年之喪云云曰女安則為之聖人也只得如此說不當抑勒他教他須用哀只是從心上說教他自感悟僩録略問居喪以來惟看喪禮不欲讀他書恐妨哀然又覺精神元自荒迷更專一用心去考索制度名物愈覺枯燥今欲讀語孟不知如何曰居喪初無不得讀書之文古人居喪廢業業是簨廪上版子廢業謂不作樂耳古人禮樂不去身惟居喪然後廢樂故喪復常讀樂章周禮司業者亦司樂也叔器問今之墨衰便於出入而不合禮經如何曰若不能出則不服之亦好但有出入治事則只得服之喪服四制說百官備百物具不言而事行者扶而起言而後事行者杖而起身執事而後行者面垢而已蓋惟天子諸侯始得全伸其禮庶人皆是自執事不得伸其禮淳義剛同親喪兄弟先滿者先除服後滿者後除以在外聞喪有先後者揚喪妻者木主要作妻名不可作母名若是婦須作婦名翁主之卒哭即祔更立木主於靈坐朝夕奠就之三年除之揚長子死則主父喪用次子不用姪今法如此宗子法立則用長子之子此法已壞只從今法揚問喪之五服皆有制不知飲食起居亦當終其制否曰合當盡其制但今人不能行然在人斟酌行之宇問喪禮不飲酒不食肉若朝夕奠及親朋來奠之饌則如之何曰與無服之親可也淳喪葬之時只當以素食待客祭饌葷食只可分與僕役賀孫問居喪為尊長強之以酒當如何曰若不得辭則勉徇其意亦無害但不可至沾醉食已復初可也問坐客有歌唱者如之何曰當起避僩或問親死遺囑教用僧道則如何曰便是難處或曰也可以不用否曰人子之心有所不忍這事須子細商量胡泳或問設如母卒父在父要循俗制喪服用僧道火化則如何曰公如何曰只得不從曰其他都是皮毛外事若決如此做從之也無妨若火化則不可泳曰火化則是殘父母之遺骸曰此話若將與喪服浮屠一道說便是未識輕重在胡泳喪三年不祭蓋孝子居倚廬堊室只是思慕哭泣百事皆廢故不祭耳然亦疑當令宗人攝祭但無明文不可考耳閎祖以下喪廢祭伊川謂三年喪古人盡廢事故併祭祀都廢今人事都不廢如何獨廢祭祀故祭祀可行先生曰然亦須百日外方可然奠獻之禮亦行不得只是鋪排酒食儀物之類後主祭者去拜若是百日之內要祭或從伯叔兄弟之類有人可以行或問今人以孫行之如何曰亦得又曰期大小功緦麻之類服今法上日子甚少便可以入家廟燒香拜揚問喪三年不祭曰程先生謂今人居喪都不能如古禮卻於祭祀祖先獨以古禮不行恐不得橫渠曰如此則是不以禮祀其親也某嘗謂如今人居喪時行三二分居喪底道理則亦當行三二分祭先底禮數今按此語非謂只可行三二分但既不得盡如古則喪祭亦皆當存古耳廣古人緦麻已廢祭祀恐今人行不得揚問三年喪中得做祭文祭故舊否曰古人全不弔祭今不奈何胡籍溪言只散句做不押韻揚先生以子喪不舉盛祭就影堂前致薦用深衣幅巾薦畢反喪服哭奠於靈至慟賀孫問練而祔是否曰此是殷禮而今人都從周禮若只此一件卻行殷禮亦無意思若如陸子靜說祔了便除去几筵則須練而祔若鄭氏說祔畢復移主出於寢則當如周制祔亦何害賀孫以下祔今不立昭穆即所謂祔於曾祖曾祖姑者無情理也德明古人所以祔於祖者以有廟制昭穆相對將來祧廟則以新死者安於祖廟所以設祔祭豫告使死者知其將來安於此位亦令其祖知是將來移上去其孫來居此位今不異廟只共一堂排作一列以西為上則將來祧其高祖了只趲得一位死者當移在禰處如此則只當祔禰今祔於祖全無義理但古人本是祔於祖今又難改他底若卒改他底將來後世或有重立廟制則又著改也神宗朝欲議立朝廷廟制當時張虎則以為祧廟祔廟只移一位陸農師則以為祔廟祧廟皆移一匝如農師之說則是世為昭穆不定豈得如此文王卻是穆武王卻是昭如曰我穆考文王又曰我昭考武王又如左傳說管蔡郕霍魯衛毛繹郜雍曹滕畢原酆郇文之昭也這十六國是文王之子文王是穆故其子曰文之昭也邘晉應韓武之穆也這四國是武王之子武王是昭故其子曰武之穆也則昭穆是萬世不可易豈得如陸氏之說陸氏禮象圖中多有杜撰處不知當時廟制後來如何不行賀孫祔新主而遷舊主亦合告祭舊主古書無所載兼不說遷於何所天子則有始祖之廟而藏之夾室大夫亦自有始祖之廟今皆無此更無頓處古人埋桑主於兩階間蓋古者階間人不甚行今則混雜亦難埋於此看來只得埋於墓所大戴禮說得遷祔一條又不分曉先生以長子大祥先十日朝暮哭諸子不赴酒食會近祥則舉家蔬食此日除祔先生纍日顏色憂戚賀孫二十五月祥後便禫看來當如王肅之說於是月禫徙月樂之說為順而今從鄭氏之說雖是禮疑從厚然未為當看來而今喪禮須當從儀禮為正如父在為母期非是薄於母只為尊在其父不可復尊在母然亦須心喪三年及嫂叔無服這般處皆是大項事不是小節目後來都失了而今國家法為所生父母皆心喪三年此意甚好賀孫以下禫先是旦日吳兄不講禮先生問何故曰為祖母承重方在禫故不敢講賀禮或問為祖母承重有禫制否曰禮惟於父母與長子有禫賀孫録云卻於祖母未聞今既承重則便與父母一般了當服禫廣賀孫同或問女子已嫁為父母禫否曰賀孫録云想是無此禮據禮云父在為母禫止是主男子而言廣賀孫同問今弔者用橫烏如何曰此正與羔裘玄冠不以弔相反亦不知起於何時想見當官者既不欲易服去弔人故杜撰成箇禮數若閒居時只當易服用敘衫廣弔本朝於大臣之喪待之甚哀賀孫舉哲宗哀臨溫公事曰溫公固是如此至於嘗為執政已告老而死祖宗亦必為之親臨罷樂看古禮君於大夫小斂往焉大斂往焉於士既殯往焉何其誠愛之至今乃恝然這也只是自渡江後君臣之勢方一向懸絶無相親之意故如此古之君臣所以事事做得成緣是親愛一體因說虜人初起時其酋長與部落都無分別同坐同飲相為戲舞所以做得事如後來兀朮犯中國虜掠得中國士類因有教之以分等陛立制度者於是上下位勢漸隔做事漸難賀孫君臨臣喪某舊為先人飾棺考制度作帷逃李先生以為不切而今禮文覺繁多使人難行後聖有作必是裁減了方始行得賀孫飾棺先生殯其長子諸生具香燭之奠先生留寒泉殯所受弔望見客至必涕泣遠接之客去必遠送之就寒泉菴西向殯掘地深二尺闊三四尺內以火磚鋪砌用石灰重重遍塗之棺木及外用土磚夾砌將下棺以食五味奠亡人次子以下皆哭拜諸客拜奠次子代亡人答拜蓋兄死子幼禮然也賀孫以下殯伯量問殯禮可行否曰此不用問人當自觀其宜今以不漆不灰之棺而欲以磚土圍之此可不可耶必不可矣數日見公說喪禮太繁絮禮不如此看說得人都心悶須討箇活物事弄如弄活蛇相似方好公今只是弄得一條死蛇不濟事某嘗說古者之禮今只是存他一箇大概令勿散失使人知其意義要之必不可盡行如始喪一段必若欲盡行則必無哀戚哭泣之情何者方哀苦荒迷之際有何心情一一如古禮之繁細委曲古者有相禮者所以導孝子為之若欲孝子一一盡依古禮必躬必親則必無哀戚之情矣況只依今世俗之禮亦未為失但使哀戚之情盡耳有虞氏瓦棺而葬夏后氏堲周必無周人之繁文委曲也又禮壙中用生體之屬久之必潰爛卻引蟲蟻非所以為亡者慮久遠也古人壙中置物甚多以某觀之禮文之意太備則防患之意反不足要之只當防慮久遠毋使土親膚而已其他禮文皆可略也又如古者棺不釘不用漆粘而今灰漆如此堅密猶有蟻子入去何況不使釘漆此皆不可行孔子曰如用之則吾從先進已是厭周之文了又曰行夏之時乘殷之輅此意皆可見使聖賢者作必不盡如古禮必裁酌從今之宜而為之也又如士相見禮鄉飲酒禮射禮之屬而今去那裏行只是當存他大概使人不可不知方周之盛時禮又全體皆備所以不可有纖毫之差今世盡不見徒掇拾編緝於殘編斷簡之餘如何必欲盡倣古之禮得或曰郁郁乎文哉吾從周聖人又欲從周之文何也曰聖人之言固非一端蓋聖人生於周之世周之一代禮文皆備誠是整齊聖人如何不從得只是如用之則吾從先進謂自為邦則從先進耳僩伯謨問某人家欲除服而未葬除之則魂魄無所依不可祔廟曰不可如何不早葬葬何所費只是悠悠因語莆人葬只是於馬鬣上大可憂須是懸棺而葬可學以下葬喪事都不用冥器糧瓶之類無益有損棺槨中都不著世俗所用者一物揚因說地理曰程先生亦揀草木茂盛處便不是不擇伯恭卻只胡亂平地上便葬若是不知此理亦不是若是知有此道理故意不理會尤不是堯卿問合葬夫婦之位曰某當初葬亡室只存東畔一位亦不曾考禮是如何安卿云地道以右為尊恐男當居右曰祭以西為上則葬時亦當如此方是義剛先生葬長子喪儀銘旌埋銘魂轎柩止用紫蓋盡去繁文埋銘石二片各長四尺闊二尺許止記姓名歲月居里刻訖以字面相合以鐵束之置於壙上其壙用石上蓋厚一尺許五六段橫湊之兩旁及底五寸許內外皆用石灰雜炭末細沙黃泥築之賀孫問改葬曰須告廟而後告墓方啓墓以葬葬畢奠而歸又告廟哭而後畢事方穩行葬更不必出主祭告時卻出主於寢賀孫人家墓壙棺槨切不可太大當使壙僅能容槨槨僅能容棺乃善去年此間陳家墳墓遭發掘者皆緣壙中太闊其不能發者皆是壙中狹小無著腳手處此不可不知也又此間墳墓山腳低卸故盜易入問墳與墓何別曰墓想是塋域墳即土封隆起者光武紀云為墳但取其稍高四邊能走水足矣古人墳極高大壙中容得人行也沒意思法令一品以上墳得一丈二尺亦自儘高矣守約云墳墓所以遭發掘者亦陰陽家之說有以啓之蓋凡發掘者皆以葬淺之故若深一二丈自無此患古禮葬亦許深曰不然深葬有水嘗見興化漳泉間墳墓甚高問之則曰棺只浮在土上深者僅有一半入地半在地上所以不得不高其封後來見福州人舉移舊墳稍深者無不有水方知興化漳泉淺葬者蓋防水爾北方地土深厚深葬不妨豈可同也問槨外可用炭灰雜沙土否曰只純用炭末置之槨外槨內實以和沙石灰或曰可純用灰否曰純灰恐不實須雜以篩過沙久之沙灰相乳入其堅如石槨外四圍上下一切實以炭末約厚七八寸許既辟濕氣免水患又截樹根不入樹根遇炭皆生轉去以此見炭灰之妙蓋炭是死物無情故樹根不入也抱朴子曰炭入地千年不變問范家用黃泥拌石炭實槨外如何曰不可黃泥久之亦能引樹根又問古人用瀝青恐地氣蒸熱瀝青溶化棺有偏陷卻不便曰不曾親見用瀝青利害但書傳間多言用者不知如何僩風之為物無物不入因解巽為風今人棺木葬在地中少間都吹喎了或吹翻了問今地上安一物雖烈風未必能吹動何故地如此堅厚卻吹得動曰想得在地中蘊蓄欲發其力盛猛及出平地則其氣渙散矣或云恐無此理曰政和縣有一人家葬其親於某位葬了但時聞壙中響聲其家以為地之善故有此響久之家業漸替子孫貧窮以為地之不利遂發視之見棺木一邊擊觸皆損壞其所擊觸處正當壙前之籠壙今捲磚為之棺木所入之處也或云恐是水浸致然曰非也若水浸則安能擊觸有聲不知此理如何古人惟家廟有碑廟中者以繫牲冢上四角四箇以繫索下棺棺既下則埋於四角所謂豐碑是也或因而刻字於其上後人凡碑刻無不用之且於中間穴孔不知欲何用也今會稽大禹廟有一碑下廣鋭而上小薄形製不方不圓尚用以繫牲云是當時葬禹之物上有隸字蓋後人刻之也僩碑
