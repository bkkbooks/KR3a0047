body:
  text: 朱子語類卷第一百一十八朱子十五訓門人六先生問伯羽如何用功曰且學靜坐痛抑思慮曰痛抑也不得只是放退可也若全閉眼而坐卻有思慮矣又言也不可全無思慮無邪思耳以下訓伯羽學者博學審問慎思明辨等多有事在然初學且須先打疊去雜思慮作得基址方可下手如起屋須有基址許多梁柱方有頓處觀書須寬心平易看先見得大綱道理了然後詳究節目公今如人入大屋方在一重門外裏面更有數重門未入未見便要說他房裏事如何得公大抵容貌語言皆急迫須打疊了令心下快活如一把棼絲見自棼而未定才急下手去拏愈亂人須打疊了心下間思雜慮如心中紛擾雖求得道理也沒頓處須打疊了後得一件方是一件兩件方是兩件公看文字子細卻是急性太忙迫都亂了又是硬鑽鑿求道理不能平心易氣看且用認得定用玩味寬看問讀書莫有次序否余正叔云不可讀讀則蹉過了曰論語章短者誠不可讀讀則易蹉過後章去若孟子詩書等非讀不可蓋它首尾自相應全籍讀方見問伯羽嘗覺固易蹉了專看則又易入於硬鑽之弊如何曰是不可鑽書不可進前一步看只有退看譬如以眼看物欲得其大體邪正曲直須是遠看方定若近看愈狹了不看見凡人謂以多事廢讀書或曰氣質不如人者皆是不責志而已若有志時那問他事多那問他氣質不美曰事多質不美者此言雖若未是太過然即此可見其無志甘於自暴自棄過孰大焉真箇做工夫人便自不說此話蜚卿問致知後須持養方力行曰如是則今日致知明日持養後日力行只持養便是行正心誠意豈不是行但行有遠近治國平天下則行之遠耳可學蜚卿問不知某之主一如何曰凡人須自知如己喫飯豈可問他人飢飽又問或於無事時更有思量否曰無事時只是無事更思箇甚然人無事時少有事時多才思便是有事蜚卿曰靜時多為思慮紛擾曰此只為不主一人心皆有此病不如且將讀書程課繫縛此心逐旋行去到節目處自見功效淺深大凡理只在人心中不在外面只為人役役於不可必之利名故本原固有者日加昏蔽豈不可惜道夫蜚卿欲類仁說看曰不必録只識得一處他處自然如破竹矣道夫先生謂蜚卿看公所疑是看論語未子細這讀書是要得義理通不是要做趕課程模樣若一項未通且就上思索教通透方得初間疑處只管看來自會通解若便寫在策上心下便放卻於心下便無所得某若有未通解處自放心不得朝朝日日只覺有一事在這裏賀孫蜚卿以書謁先生有棄科舉之說先生曰今之士大夫應舉干祿以為仰事俯育之計亦不能免公生事如何曰粗可伏臘曰更須自酌量道夫蜚卿曰某欲謀於先生屏棄科舉望斷以一言曰此事在公自看如何須是度自家可以仰事俯育作文字比之他人有可得之理否亦須自思之如人飢飽寒暖須自知之他人如何說得道夫蜚卿云某正為心不定不事科舉曰放得下否曰欲放下曰才說欲字便不得須除去欲字若要理會道理忙又不得亦不得懶驤看今世學者病痛皆在志不立嘗見學者不遠千里來此講學將謂真以此為事後來觀之往往只要做二三分人識些道理便是不是看他不破不曾以此語之夫人與天地並立為三自家當思量天如此高地如此厚自家一箇七尺血氣之軀如何會並立為三只為自家此性元善同是一處出來一出一入若有若亡元來固有之性不曾見得則雖其人衣冠其實與庶物不爭多伊川曰學者為氣所勝習所奪只可責志顏淵曰仰之彌高鑽之彌堅瞻之在前忽焉在後既竭吾才如有所立卓爾在顏子分明見此物須要做得如人在戰陳雷鼓一鳴不殺賊則為賊所殺又安得不向前又如學者應舉覓官從早起來念念在此終被他做得但移此心向學何所不至孔子曰吾十有五而志於學至三十而立以上節節推去五峰曰為學在立志立志在居敬此言甚佳夫一陰一陽相對志才立則已在陽處立雖時失腳入陰然一覺悟則又在於陽今之學者皆曰它是堯舜我是衆人何以為堯舜為是言者曾不如佛家善財童子曰我已發菩提心行何行而作佛渠卻辦作佛自家卻不辦作堯舜某因問立志固是然志何以立曰自端本立以身而參天地以匹夫而安天下實有此理方伯謨問使齊王用孟子還可以安天下否曰孟子分明往見齊王以道可行只是他計些小利害愛些小便宜一齊昏了自家只立得大者定其他物欲一齊走退又舉中庸一段曰德性曰高明曰廣大皆是元來底問學中庸精微所以接續此也某問孔門弟子問仁問智皆從一事上做去曰只為他志已立故求所以趨向之路然孔門學者亦有志不立底如宰豫冉求是也顏子固不待說如子路有聞未之能行惟恐有聞豈不是有志至如漆雕開曾點皆有志孔子在陳思魯之狂士狂士何足思蓋取其有志得聖人而師之皆足為君子以下訓可學璘録云録異見後訓璘先生問昨日與吾友說立志一段退後思得如何某曰因先生之言子細思之皆是實理如平日見害人之事不為見非義之財不取皆是自然如此曰既自然如此因何做堯舜不得某謂盡其心則知其性曰此不是答策題須是實見得徐行後長者謂之弟須見得如何弟是作得堯舜因語執德不弘信道不篤焉能為有焉能為亡所謂天理人欲也更將孟子答滕文公曹交問孟子章熟讀才見得此甚省力問作事多始鋭而終輟莫是只為血氣使曰雖說要義理之氣然血氣亦不可無孟子氣體之充但要以義理為主耳問講學須當志其遠者大者曰固是然細微處亦須研窮若細微處不研窮所謂遠者大者只是揣作一頭詭怪之語果何益須是知其大小測其淺深又別其輕重因問平時讀書因見先生說乃知只得一模樣耳曰模樣亦未易得恐只是識文句問反其性如何曰只吾友會道箇反時此便是天性只就此充之別無道理滕文公才問孟子孟子便道性善自今觀之豈不躐等不知此乃是自家屋裏物有甚過當既立得性了則每事點檢視事之來是者從之非者違之此下文甚長且於根本上用工夫既尚留此便宜審觀自見再見請教因問平日讀書時似亦有所見既釋書則別是一般又每苦思慮紛擾雖持敬亦未免弛慢不知病根安在曰此乃不求之於身而專求之於書固應如此古人曰為仁由己而由人乎哉凡吾身日用之間無非道書則所以接湊此心耳故必先求之於身而後求之於書則讀書方有味又曰持敬而未免弛慢是未嘗敬也須是無間斷乃可至如言思慮多須是合思即思不合思者不必思則必不擾亂又問凡求之於心須是主一為或於事事求之曰凡事無非用心處只如於孝則求其如何是孝於弟則求其如何是弟大抵見善則遷有過則改聖人千言萬語不出此一轍須積習時久游泳浸漬如飲醇酒其味愈長始見其真是真非若似是而非似有而實未嘗有終自恍惚然此最學者之大病又問讀書宜以何為法曰須少看凡讀書須子細研窮講究不可放過假如有五項議論開策時須逐一為別白求一定說若他日再看又須從頭檢閲而後知前日之讀書草略甚矣近日學者讀書六經皆云通及問之則往往失對只是當初讀時綽過了孟子曰仁在乎熟吾友更詳思之大抵古人讀書與今人異如孔門學者於聖人才問仁問知終身事業已在此今人讀書仁義禮智總識而卻無落泊處此不熟之故也昔五峰於京師問龜山讀書法龜山云先讀論語五峰問論語二十篇以何為緊要龜山曰事事緊要看此可見問可學稟性太急數年來力於懲忿上做工夫似減得分數然遇事不知不覺忿暴何從而去此病曰亦在乎熟耳如小兒讀書遍數多自記得此熟之驗也大抵稟賦得深多少年月一旦如何便盡打疊得須是日夜懲戒之以至於熟久當自去一日晚同王春先生親戚魏才仲請見問吾友年幾何對云三十七曰已自過時若於此因循便因循了昔人讀書二十四五時須已立得一門庭某因說平日亦有志於學只是為貧奔走雖勤讀書全無趨向曰讀書須窮研道理吾友日看論孟否對以常看曰如何看曰日間只是看精義曰看精義有利有害若能因諸家之說以考聖人之意而得於吾心則精義有益若只鶻突綽過如風過耳雖百看何補善看論孟者只一部論孟自亦可何必精義因舉學而時習之問曰吾友何說某依常解云云先生曰聖人下五箇字無一字虛學然後時習之不學則何習之有所謂學者不必前言往行凡事上皆是學如箇人好學其為人箇事好學其為事習之者習其所學也習之而熟能無悅乎近日學者多學而不習某又問學而不思則罔亦是此意曰且就本文理會牽傍會合最學者之病又問有朋自遠方來何故樂對以得朋友而講習故樂曰若是已得於己何更待朋友再三請益曰且自思之語次因道某平日讀箇不識塗徑枉費心力適得先生開喻方知趨向自此期早夜孜孜無負教誨曰吾友既如此說須與人作樣子第一下工夫莫草略研究一章義理已得方別看一章近日學者多緣草略過了故下梢頭儹無去處一齊棄了大凡看書粗則心粗看書細則心細若研窮不熟得些義理以為是亦得以為非亦得須是見得差之毫釐繆以千里方可問昨日先生所問退而以滕文公數章熟讀只如昨日所說四端此便是真心便是性善今只是於天理人欲上判了去得人欲天理自明自家家裏事豈有不向前先生曰然未要論到人欲人欲亦難去只且自體認這箇理如何的見是性善堯舜是可為如何是仁如何是義若於此有見要已自已不得孟子曰求則得之舍則失之今學者求不見得舍不見失只是悠悠今日待明日明日又待後日語未畢伯謨至先生云適來所言子上卻有許多說話德粹無說然皆是不勉力作工夫謝上蔡於明道前舉史書成文明道曰賢卻會記得可謂玩物喪志上蔡發汗須是如此感動方可今只且於舊事如此過豈是感發須是不安方是所謂不能以一朝居問德粹數日作何工夫曰讀告子曰見得如何曰固是要見亦當於事上見之曰行事上固要見無事時亦合理會如看古人書或靜坐皆可以見又問某見得如何曰只是操捨二字分判曰操捨固是亦須先見其本不然方操而則存時已捨而則亡矣又問前說有朋自遠方來看見如何曰前日說不是有朋自遠方來乃是善可以及人善可以及人則合彼己為一豈不樂先生曰此是可以及人為或已及人曰惟其可以及人所以能及人先生曰樂是可以及人而樂是已及人而樂曰已及人而樂先生曰然伊川說已盡後來諸公多變其說云朋友講習我若未有所得誰肯自遠方來要之此道天下公共既已得於己必須及於人不知而不慍非君子成德不能慍非怒之謂自君子以降人不知己亦不能無芥蒂於胸中先生問近日所見如何某對間斷處頗知提撕曰更宜加意先生問近日如何曰頗覺心定如何心定曰每常遇無事卻散漫遇有事則旋求此心今卻稍勝前曰讀甚書曰讀告子昨讀至夜氣之說因覺病痛全在此心上曰亦未說至此須是見得有踊躍之意方可是日德粹又語小學先生曰德粹畢竟昏弱子上尚雜更宜加意問人有剛果過於中如何曰只為見彼善於此剛果勝柔故一向剛周子曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁須如此別方可璘録云問孫吉甫說性剛未免有失如何先生舉通書云剛善剛惡固是剛比之暗弱之人為勝然只是彼善於此而已畢竟未是問何以制之使歸於善曰須於中求之問昨日承先生教誨矯激事歸而思之務為長厚固不可然程氏教人卻云當學顏子之渾厚看近日之弊莫只是真僞不同曰然顏子卻是渾厚今人卻是聶夾大不同且如當官必審是非明去就今做事至於危處卻避禍曰吾為渾厚可乎且如後漢諸賢與宦官為敵既為冀州刺史宦官親戚在部內為害安得不去之安得謂之矯激須是不做它官故古人辭尊而居卑辭富而居貧居卑則不與權豪相抗亦無甚職事符舜功云如陳實弔宦官之喪是大要渾厚曰然某問如范滂之徒太甚曰只是行其職大抵義理所在當為則為無渾厚無矯激如此方可某又問李膺赦後殺人莫不順天理曰然士不幸遇亂世不必仕如趙臺卿乃於杜子賓夾壁中坐過數年又如蔡雍更無整身處問吾友昔從曾大卿游於其議論云何曰曾先生靜默少言有一二言不及其躬行者曰曾卿齊家正身不欺暗室真難及鄭子上因赴省經過問左傳數事先生曰數年不見公將謂有異問相發明卻問這般不緊要者何益人若能於大學語孟中庸四書窮究得通透則經傳中折莫甚大事以其理推之無有不曉者況此末事今若此可謂是揚了甜桃樹沿山摘醋梨也友仁璘注鄂渚教官闕先生曰某嘗勸人不如做縣丞隨事猶可以及物做教官沒意思說義理人不信又須隨分做課試方是鬧熱以下訓璘問做何工夫璘對以未曾曰若是做得工夫有疑可問便好商量若未做工夫只說得一箇為學大端他日又如何得商量嘗見一般朋友見事便奮發要議論胡亂將經書及古人作議論看來是沒意思又有一般全不做功夫底更沒下手商量處又不如彼胡亂做工夫有可商議得且如論古人便是論錯了亦是曾考論古人事跡一過他日與說得是將從前錯底改起便有用問為學大端曰且如士人應舉是要做官故其功夫勇猛念念不忘竟能有成若為學須立箇標準我要如何為學此志念念不忘功夫自進蓋人以眇然之身與天地並立而為三常思我以血氣之身如何配得天地且天地之所以與我者色色周備人自污壞了因舉萬物皆備於我反身而誠樂莫大焉一章今之為學須是求復其初求全天之所以與我者始得若要全天之所以與我者便須以聖賢為標準直做到聖賢地位方是全得本來之物而不失如此則功夫自然勇猛臨事觀書常有此意自然接續若無求復其初之志無必為聖賢之心只見因循荒廢了因舉孟子道性善言必稱堯舜一章云道性善是說天之所以與我者便以堯舜為樣子說人性善皆可以為堯舜便是立箇標準了下文引成閥顏淵公明儀之言以明聖賢之可以必為末後若藥不瞑眩厥疾不瘳最說得好人要為聖賢須是猛起服瞑眩之藥相似教他麻了一上了及其定疊病自退了又舉顏子仰之彌高一段又說人之為學正如說恢復相似且如東南亦自有許多財賦許多兵甲儘自好了如何必要恢復只為祖宗元有之物須當復得若不復得終是不了今人為學彼善於此隨分做箇好人亦自足矣何須必要做聖賢只為天之所以與我者不可不復得若不復得終是不了所以須要講論學以聖賢為準故問學須要復性命之本然求造聖賢之極方是學問可學録云如尋常人說且作三五分人有甚不可何必須早夜孳孳只為自家元有一箇性甚是善須是還其元物不還元物畢竟缺闕此一事乃聖人相傳立定一鐵樁移動不得然此是大端如此其間讀書考古驗今工夫皆不可廢因舉尊德性而道問學一章又云有一般人只說天之所以與我者都是光明純粹好物其後之所以不好者人為有以害之吾之為學只是去其所以害此者而已害此者盡去則工夫便了故其弊至於廢學不讀書臨事大綱雖好而所見道理便有偏處為學既知大端是欲復天之所與而必為聖賢便以父子有親君臣有義夫婦有別長幼有序朋友有信此五者為五箇大樁相似念念理會便有工夫可做所以大學在止於至善只云為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信從前朋友來此某將謂不遠千里而來須知箇趣向了只是隨分為他說箇為學大概去看來都不得力此某之罪今日思之學者須以立志為本如昨日所說為學大端在於求復性命之本然求造聖賢之極致須是便立志如此便做去始得若曰我之志只是要做箇好人識些道理便休宜乎工夫不進日夕漸漸消靡今須思量天之所以與我者必須是光明正大必不應只如此而止就自家性分上儘做得去不到聖賢地位不休如此立志自是歇不住自是儘有工夫可做如顏子之欲罷不能如小人之孳孳為利念念自不忘若不立志終不得力因舉程子云學者為氣所勝習所奪只可責志又舉云立志以定其本居敬以持其志此是五峰議論好處又舉士尚志何謂尚志曰仁義而已矣又舉舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣又舉三軍可奪帥匹夫不可奪志也如孔門亦有不能立志者如冉求非不說子之道力不足也是也所以其後志於聚斂無足怪又曰要知天之與我者只如孟子說無惻隱之心非人也無羞惡之心非人也無是非之心非人也無辭遜之心非人也今人非無惻隱羞惡是非辭遜發見處只是不省察了若於日用間試省察此四端者分明迸趲出來就此便操存涵養將去便是下手處只為從前不省察了此端才見又被物欲汨了所以秉彝不可磨滅處雖在而終不能光明正大如其本然試思人以眇然之身可以贊天地之化育以常人而可以為聖賢以四端之微而充之可以保四海是如何而致若分明見此志自立工夫自住不得昨日所說為學大端在於立志必為聖賢曾看得人皆可以為堯舜道理分明否又見得我可以為堯舜而不為其患安在固是孟子說性善徐行後長之類然今人四端非不時時發見非不能徐行何故不能為堯舜且子細看若見得此分明其志自立其工夫自不可已因舉執德不弘信道不篤焉能為有焉能為亡謂不弘不篤不當得一箇人數無能為輕重須常常自問人人之性善而己之性卻不見其善人皆可以為堯舜而己之身即未見其所以為堯舜者何故常常自問知所愧恥則勇厲奮發而志立矣更將孟子告子篇反復讀之指不若人之類數段可以助人興發必為之志問所觀書璘以讀告子篇對曰古人興於詩詩可以興又曰雖無文王猶興人須要奮發興起必為之心為學方有端緒古人以詩吟詠起發善心今既不能曉古詩某以為告子篇諸段讀之可以興發人善心者故勸人讀之且如義理之悅我心猶芻豢之悅我口讀此句須知義理可以悅我心否果如芻豢悅口否方是得璘謂理義悅心亦是臨事見得此事合理義自然悅懌曰今則終日無事不成便廢了理義便無悅處如讀古人書見其事合理義思量古人行事與吾今所思慮欲為之事才見得合理義則自悅才見不合理義自有羞愧憤悶之心不須一一臨事時看問璘昨日臥雲菴中何所為璘曰歸時日已暮不曾觀書靜坐而已先生舉橫渠六有說言有法動有教晝有為宵有得息有養瞬有存以為雖靜坐亦有所存主始得不然兀兀而已可學録云先生問德粹夜間在菴中作何工夫德粹云云先生曰橫渠云言有教動有法晝有為宵有得息有養瞬有存此語極好君子終日乾乾不可食息間亦不必終日讀書或靜坐存養亦是天地之生物以四時運動春生夏長固是不息及至秋冬凋落亦只是藏於其中故明年復生若使至秋冬已絶則來春無緣復有生意學者常喚令此心不死則日有進德粹問在四明守官要顧義理才到利害重處則顧忌只是拌一去如何先生曰無他只是志不立卻隨利害走了可學問德粹此心動時應物不動時如何曰只是散漫曰便是錯了自家一箇心卻令成兩端須是檢點他可學人在官固當理會官事然做得官好只是使人道是一好官人須講學立大本則有源流若只要人道是好官人今日做得一件明日又做一件卻窮了德粹云初到明州問為學於沈叔晦叔晦曰若要讀書且於婺源山中坐既在四明且理會官事先生曰縣尉既做了四年滕德粹元不曾理會可學誨力行云若有人云孔孟天資不可及便知此人自暴自棄萬劫千生無緣見道所謂九萬里則風斯下以下訓力行講學切忌研究一事未得又且放過別求一事如此則有甚了期須是逐件打結久久通貫力行退讀先生格物之說見李先生所以教先生有此意力行連日荷教府判張丈退謂力行曰士佺到此餘五十日備見先生接待學者多矣不過誘之掖之未見如待吾友著氣用力痛下鉗鎚如此以九分欲打煉成器不得不知此意問事有最難底奈何曰亦有數等或是外面阻遏做不得或是裏面紛亂處不去亦有一種紛拏時及纖亳委曲微細處難處全只在人自去理會大概只是要見得道理分明逐事上自有一箇道理易曰探賾索隱賾處不是奧是紛亂時隱是隱奧也全在探索上紛亂是他自紛亂我若有一定之見安能紛亂得我大凡一等事固不可避避事不是工夫又有一等人情底事得遣退時且遣退無時是了不要摟攬凡可以省得底事省亦不妨應接亦只是不奈何有合當住不得底事此卻要思量處置裏面都自有箇理或謂人心紛擾時難把捉曰真箇是難把持不能得久又被事物及間思慮引將去孟子牛山之木一章最要看操之則存舍之則亡或又謂把持不能久勝物欲不去曰這箇不干別人事雖是難亦是自著力把持常惺惺不要放倒覺得物欲來便著緊不要隨他去這箇須是自家理會若說把持不得勝他不去是自壞了更說甚為仁由己而由人乎哉又曰把心不定喜怒憂懼四者皆足以動心因問憂患恐懼恐四字似一般曰不同恐懼是目下逼來得緊底使人恐懼失措憂患是思慮預防那將來有大禍福利害底事此不同又問忿懥好樂乃在我之事可以勉強不做如憂患恐懼乃是外面來底不由自家曰都不得便是外面來底須是自家有箇道理措置得下恐懼憂患只是徒然事來亦合當思慮不妨但只管纍其本心也不濟得事孔子畏匡人文王囚羑里死生在前了聖人元不動心處之恬然只看此便是要見得道理分明自然無此患所以聖人教人致知格物考究一箇道理自此以上誠意正心皆相連上去也以下訓明作凡日用工夫須是自做喫緊把捉見得不是處便不要做勿徇他去所說事有善者可從又有不善者間之依舊從不善處去所思量事忽為別思量勾引將去皆是自家不曾把捉得住不干別人事須是自把持不被他引去方是顏子問仁孔子答許多話其末卻云為仁由己而由人乎哉看來不消此二句亦得然許多話不是自己著力做又如何得明知不善又去做看來只是知得不親切若真箇知得定不肯做正如人說飲食過度傷生此固衆所共知然不是真知偶一日飲食過度為害則明日決不分外飲食此真知其傷遂不復再為也把捉之說固是自用著力然又以枯槁無滋味卒急不易著力須平日多讀書講明道理以涵養灌培使此心常與理相入久後自熟方見得力處且如讀書便今日看得一二段來日看三五段殊未有緊要須是磨以歲月讀得多自然有用處且約而言之論孟固當讀六經亦當讀史書又不可不讀講究得多便自然熟但始初須大段著力窮究理會教道理通徹不過一二番稍難向後也只是以此理推去更不艱辛可以觸類而長正如入仕之初看公案初看時自是未相諳較難理會須著些心力如法考究若如此看得三五項了自然便熟向後看時更不似初間難亦可類推也又如人要知得輕重須用稱方得有拈弄得熟底只把在手上便知是若干斤兩更不用稱此無他只是熟今日也拈弄明日也拈弄久久自熟也如百工技藝做得精者亦是熟後便精孟子曰夫仁亦在乎熟之而已所以貴乎熟者只是要得此心與義理相親苟義理與自家相近則非理之事自然相遠思慮多走作亦只是不熟熟後自無又如說做事偶合於理則心安或差時則餒此固是可見得本然之理所以差時便覺不安然又有做得不是處不知覺悟須是常惺惺省察不要放過據某看學問之道只是眼前日用底便是初無深遠玄妙大凡學問不可只理會一端聖賢千言萬語看得雖似紛擾然卻都是這一箇道理而今只就緊要處做固好然別箇也須一一理會湊得這一箇道理都一般方得天下事硬就一箇做終是做不成如莊子說風之積也不厚則其負大翼也無力須是理會得多方始襯簟得起且如籩豆之事則有司存非是說籩豆之事置之度外不用理會動容貌三句亦只是三句是自家緊要合做底籩豆是付與有司做底其事為輕而今只理會三句籩豆之事都不理會萬一被有司喚籩做豆若不曾曉得便被他瞞又如田子方說君明樂官不明樂音他說得不是若不明得音如何明得官次第被他易宮為商也得所以中庸先說箇博學之孟子曰博學而詳說之且看孔子雖曰生知事事去問人若問禮問喪於老聃之類甚多只如官名不曉得莫也無害聖人亦汲汲去問郯子蓋是我不識底須是去問人始得因說南軒洙泗言仁編得亦未是聖人說仁處固是仁然不說處不成非仁天下只有箇道理聖人說許多說話都要理會豈可只去理會說仁處不說仁處便掉了不管子思做中庸大段周密不易他思量如是德性五句須是許多句方該得盡然第一句為主致廣大極高明溫故敦厚此上一截是尊德性事如道中庸盡精微知新崇禮此下一截是道問學事都要得纖悉具備無細不盡如何只理會一件或問知新之理曰新是故中之事故是舊時底溫起來以尊德性然後就裏面討得新意乃為道問學一日因論讀大學答以每為念慮攪擾頗妨工夫曰只是不敬敬是常惺惺底法以敬為主則百事皆從此做去今人都不理會我底自不知心所在都要理會他事又要齊家治國平天下心者身之主也撐船須用篙吃飯須用匙不理會心是不用篙不使匙之謂也攝心只是敬才敬看做甚麼事登山亦只這箇心入水亦只這箇心訓辯與立同問常苦志氣怯弱恐懼太過心下常若有事少悅豫底意思不知此病痛是如何曰試思自家是有事是無事曰本無事自覺得如此曰若是無事便是無事又恐懼箇甚只是見理不徹後如此若見得理徹自然心下無事然此亦是心病因舉遺書捉虎及滿室置尖物事又曰且如今人害潔淨病那裏有潔淨病只是疑病疑後便如此不知在君父之前還如此得否黻又因論氣質各有病痛不同曰才明理後氣質自然變化病痛都自不見了以下訓與立黻先生誨與立等曰為學之道無他只是要理會得目前許多道理世間事無大無小皆有道理如中庸所謂率性之謂道也只是這箇道理道不可須臾離也只是這箇道理見得是自家合當做底便做將去不當做底斷不可做只是如此又曰為學無許多事只是要持守心身研究道理分別得是非善惡直是如好好色如惡惡臭到這裏方是踏著實地自住不得又曰經書中所言只是這一箇道理都重三疊四說在裏只是許多頭面出來如語孟所載也只是這許多話一箇聖賢出來說一番了一箇聖賢又出來從頭說一番如書中堯之所說也只是這箇舜之所說也只是這箇以至於禹湯文武所說也只是這箇又如詩中周公所贊頌文武之盛德亦只是這箇便若桀紂之所以危亡亦只是反了這箇道理若使別撰得出來古人須自撰了惟其撰不得所以只共這箇道理又曰讀書須是件件讀理會了一件方可換一件這一件理會得通徹是當了則終身更不用再理會後來只須把出來溫尋涵泳便了若不與逐件理會則雖讀到老依舊是生底又卻如不曾讀一般濟甚事如喫飯不成一日都要喫得盡須與分做三頓喫只恁地頓頓喫去知一生喫了多少飯讀書亦如此黻因說學者先立心志為難曰也無許多事只是一箇敬徹上徹下只是這箇道理到得剛健便自然勝得許多物欲之私溫公謂人以為如制悍馬如幹盤石之難也靜而思之在我而已如轉戶樞何難之有黻問思無邪固要得如此不知如何能得如此曰但邪者自莫思便了又問且如持敬豈不欲純一於敬然自有不敬之念固欲與己相反愈制則愈甚或謂只自持敬雖念慮妄發莫管他久將自定還如此得否曰要之邪正本不對立但恐自家胸中無箇主若有主且自不能入又問不敬之念非出於本心如忿欲之萌學者固當自克雖聖賢亦無如之何至於思慮妄發欲制之而不能曰才覺恁地自家便挈起了但莫先去防他然此只是自家見理不透做主不定所以如此大學曰物格而後知至知至而後意誠才意誠則自然無此病拜先生訖坐定先生云文振近看得文字較細須用常提掇起得惺惺不要昏晦若昏晦則不敬莫大焉才昏晦時少間一事來一齊被私意牽將去做主不得須用認取那箇是身那箇是心卓然在目前便做得身主少間事物來逐一區處得當以下訓南升又云看文字須以鄭文振為法理會得便說出待某看甚處未是理會未得便問又云渠今退去心中卻無疑也先生曰文振近來看得須容易了南升曰不敢容易看但見先生集注字字著實故易得分明先生曰潘兄鄭兄要看文字可明日且同文振從後段看起將來卻補前面廖兄亦可從此看起謂潘立之鄭神童廖晉卿也朋友多是方理會得文字好又歸去似指植言又云鄭文振能平心看文字看得平正周匝只無甚精神如立之則有說得到處如文振無甚卓然到處亦無甚不到處植先生問倪已前做甚工夫曰只是理會舉業曰須有功夫曰只是習春秋又問更做甚工夫曰曾涉獵看先生語孟精義曰近來作春秋義穿鑿殊甚如紹興以前只是諱言攘夷復讎事專要說和戎卻不至如此穿鑿某那時亦自說春秋不可做而今穿鑿尤甚倪曰緣是主司出題目多是將不相屬處出致舉子不得不如此曰卻是引得他如此又曰向來沈司業曾有申請令主司不得斷章出題後來少變曰向在南康日教官出題不是也不免將他申請下郡學令不得如此近來省試如書題依前如此又曰看來不要作春秋義可別治甚經以下訓倪時舉云問游和之曾看甚文字曰某以春秋應舉粗用力於此經似不免有科第之心故不知理義之要曰春秋難治做出經義往往都非經旨某見紹興初治春秋者經義中只避數項說話如復仇討賊之類而已如今卻不然往往所避者多更不復依傍春秋經意說只自做一種說話知他是說甚麼大凡科舉之事士子固未能免然只要識得輕重若放那一頭重這一頭輕是不足道然兩頭輕重一般也只不得便一心在這裏一心在那裏於本身易得悠悠須是教令這頭重那頭輕方好孟子云今之人修其天爵以要人爵凡要人爵者固是也理會天爵然以要人爵而為之則所修者皆非切己之學問倪未識下手工夫曰舉業與這箇道理一似箇藏子做舉業只見那一邊若將此心推轉看這一邊極易孟子云古人修其天爵而人爵從之今人修其天爵以要人爵又將起扇子云公只是將那頭放重這頭放輕了便得若兩頭平也不得倪求下手工夫曰只是要收斂此心莫要走作走作便是不敬須要持敬堯是古今第一箇人書說堯劈頭便云欽明文思欽便是敬問敬如何持曰只是要莫走作若看見外面風吹草動去看覷他那得許多心去應他便也不是收斂問莫是主一之謂敬曰主一是敬表德只是要收斂處宗廟只是敬處朝廷只是嚴處閨門只是和便是持敬時舉聞同見後倪曰自幼既失小學之序願授大學曰授大學甚好也須把小學書看只消旬日功夫諸公固皆有志於學然持敬工夫大段缺在若不知此何以為進學之本程先生云涵養須用敬進學則在致知此最切要和之問不知敬如何持曰只是要收斂此心莫令走失便是今人精神自不曾定讀書安得精專凡看山看水風驚草動此心便自走失視聽便自眩惑此何以為學諸公切宜免此時舉緊切詳密以下訓至書云千萬更加勉力就日用實事上提撕勿令昏縱為佳至自謂從來於喜怒哀樂之發雖未敢自謂中節自覺亦無甚過差曰若不窮理則喜怒哀樂之發便有過差處也不覺所以貴於窮理書云日用之間常切操存讀書窮理亦無廢惰久久當自覺有得力處又書云要須反己深自體察有箇火急痛切處方是入得門戶若只如此悠悠定是間過日月向後無得力處莫相怪也三書文集未載楊子順楊至之趙唐卿辭歸請教先生曰學不是讀書然不讀書又不知所以為學之道聖賢教人只是要誠意正心修身齊家治國平天下所謂學者學此而已若不讀書便不知如何而能修身如何而能齊家治國聖賢之書說修身處便如此說齊家治國處便如此節節在那上自家都要去理會一一排定在這裏來便應將去淳楊問某多被思慮紛擾思這事又慮做那一事去雖知得了自是難止曰既知不是便當絶斷更何必問宇至之少精深蜚之少寬心二病正相反道夫植再舉曾子忠恕一貫及子貢聞一知二章曰大概也是如此更須依曾子逐事經歷做過方知其味先生繼問或人理會得所舉忠恕否陳因問集注中舉程子第一段先生曰明道說此一段甚好非程子不能道得到自忠恕一以貫之以後說忠恕至達道也住乃說一以貫之之忠恕其曰此與違道不遠異者動以天爾何也蓋此數句乃動以天爾如推己及人違道不遠則動以人爾又問如此則有學者之忠恕曰聖人不消言恕故集注中云借學者之事而言以下訓植植舉仁者愛之理心之德紬繹說過曰大概是如此而今只是做仁工夫植因問顏子博文約禮是循環工夫否曰不必說循環如左腳行得一步了右腳方行得一步右腳既行得一步左腳又行得一步此頭得力那頭又長那頭既得力此頭又長所以欲罷而不能所謂欲罷不能者是它先見得透徹所以復乎天理欲罷不能如顏子教他復天理他便不能自已教他徇人欲便沒舉止了蓋惟是見得通透方無間斷不然安得不間斷過見先生越數日問曰思得為學之要只在主敬以存心格物以觀當然之理曰主敬以存心卻是下句當云格物所以明此心以下訓過先生教過為學不可粗淺因以橘子譬云皮內有肉肉內有子子內有仁又云譬如掃地不可只掃面前如椅子之下及角頭背處亦須掃著先生語過以為學須要專一用功不可雜亂因舉異教數語云用志不分乃凝於神置之一處無事不辦謂林正卿曰理會這箇且理會這箇莫引證見相將都理會不得理會剛而塞且理會這一箇剛字莫要理會沉潛剛克各自不同節訓學蒙問思慮紛擾曰公不思慮時不識箇心是何物須是思慮時知道這心如此紛擾漸漸見得卻有下工夫處以下訓賜問存心多被物欲奪了曰不須如此說且自體認自家心是甚物自家既不曾識得箇心而今都說未得才識得不須操而自存如水火相濟自不相離聖賢說得極分明夫子說了孟子恐後世不識又說向裏後之學者依舊不把做事更說甚間話孟子四端處儘有可玩索問每日暇時略靜坐以養心但覺意自然紛起要靜越不靜曰程子謂心自是活底物事如何窒定教他不思只是不可胡亂思才著箇要靜底意思便是添了多少思慮且不要恁地拘迫他須自有寧息時又曰要靜便是先獲便是助長便是正以下訓胡泳問程子教人每於己分上提撕然後有以見流行之妙正如先生昨日答語中謂理會得其性情之德體用分別各是何面目一段一般曰是如此問人之手動足履須還是都覺得始得看來不是處都是心不在後挫過了曰須是見得他合當是恁地問立則見其參於前在輿則見其倚於衡只是熟後自然見得否曰也只是隨處見得那忠信篤敬是合當如此又問舊見敬齊針中云擇地而蹈折旋蟻封遂欲如行步時要步步覺得他移動要之無此道理只是常常提撕曰這箇病痛須一一識得方得且如事父母方在那奉養時又自著注腳解說道這箇是孝如事兄長方在那順承時又自著注腳解說道這箇是弟便是兩箇了問只是如事父母當勞苦有倦心之際卻須自省覺說這箇是當然曰是如此伯量問南軒所謂敬者通貫動靜內外而言泳嘗驗之反見得靜時工夫少動時工夫多少間隨事逐物去了曰隨事逐物也莫管他有事來時須著應他也只得隨他去只是事過了自家依舊來這裏坐所謂動亦敬靜亦敬也又問但恐靜時工夫少動時易得撓亂耳曰如何去討靜得有事時須著應且如早間起來有許多事不成說事多撓亂人我且去靜坐不是如此無事時固是敬有事時敬便在事上且如早間人客來相見自家須著接它接它時敬便在交接處少間又有人客來自家又用接它若自朝至暮人客來不已自家須盡著接它不成不接它無此理接它時敬便隨著在這裏人客去後敬亦是如此若厭人客多了心煩此卻是自撓亂其心非所謂敬也所以程子說學問到專一時方好蓋專一則有事無事皆是如此程子答或人之問說一大片末梢只有這一句是緊要處又曰不可有厭煩好靜之心人在世上無無事底時節要無事時除是死也隨事來便著應他有事無事自家之敬元未嘗間斷也若事至面前自家卻自主靜頑然不應便是心死矣僩壽昌問鳶飛魚躍何故仁便在其中先生良久微笑曰公好說禪這箇亦略似禪試將禪來說看壽昌對不敢曰莫是雲在青天水在瓶麼壽昌又不敢對曰不妨試說看曰渠今正是我我且不是渠曰何不道我今正是渠既而又曰須將中庸其餘處一一理會令教子細到這箇田地時只恁地輕輕拈掇過便自然理會得更無所疑亦不著問人訓壽昌先生顧壽昌曰子好說禪禪則未必是然其所趣向猶以為此是透脫生死底等事其見識猶高於世俗之人紛紛然抱頭聚議不知是照證箇甚底事先生曰子所謂賢者過之也夫過猶不及然其玩心於高明猶賢於一等輩因問子遊廬山嘗聞人說一周宣幹否壽昌對以聞之今見有一子頤字龜父者在先生曰周宣幹有一言極好朝廷若要恢復中原須要罷三十年科舉始得先生問壽昌近日教浩讀甚書壽昌對以方伯謨教他午前即理論語仍聽講曉些義理午後即念些蘇文之類庶學作時文先生笑曰早間一服木附湯午後又一服清涼散復正色云只教讀詩書便好先生問壽昌子好說禪何不試說一上壽昌曰明眼人難謾先生曰我則異於是越明眼底越當面謾他先生問壽昌子見疏山有何所得對曰那箇且拈歸一壁去曰是會了拈歸一壁是不會了拈歸一壁壽昌欲對云總在裏許然當時不曾敢應會先生為壽昌題手中扇云長憶江南三月裏鷓鴣啼處百花香執筆視壽昌曰會麼會也不會壽昌對曰總在裏許先生奉天子命就國於潭道過臨江長孺自吉水山間越境迎見某四拜先生受半答半跪進劄子略云竊觀聖賢之間惟兩答問最親切極至子路曾皙冉有公西華侍坐子曰居則曰不吾知也如或知爾則何以哉子路以使勇對冉有以足民對子華以小相對三子者夫子皆未所領許也獨曾點下一轉語異乎三子者之撰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與點也此是一問答子貢問有一言而可以終身行之者乎子曰其恕乎此是一問答是故善答莫如點善問者莫如賜長孺懵不知道先生若曰如或知爾則何以哉長孺未有以對也長孺狂妄將有請問於先生曰有一言而可以終身行之者乎先生推先聖之心慰學者之望不孤長孺所以委身受教之誠賜金聲玉振之音先生閲劄子笑曰恁地卻不得子貢問夫子有一言而可以終身行之者乎子曰其恕乎此只是就子貢身上與他一箇恕字若其他學者要學聖人煞有事件如何將一箇字包括得盡問曰先生云一箇字包不盡極是但大道茫茫何處下手須有一箇切要可以用功夫處先生乃舉中庸大哉聖人之道至敦厚以崇禮一章誦訖遂言曰尊德性道問學致廣大盡精微極高明道中庸溫故知新敦厚崇禮只從此下功夫理會曰何者是德性何者是問學曰不過是居處恭執事敬言忠信行篤敬之類都是德性至於問學卻煞闊條項甚多事事物物皆是問學無窮無盡曰德性卻如何尊問學卻如何道曰將這德性做一件重事莫輕忽他只此是尊時先生手中持一扇因舉扇而言且如這一柄扇自家不會做去問人扇如何做人教之以如何做如何做既聽得了須是去做這扇便得如此方是道問學若只問得去卻掉下不去做如此便不是道問學曰如先生之言道字莫只是訓行否先生頷之而曰自尊德性而下雖是五句卻是一句總四句雖是十件卻兩件統八件如何是一句總四句曰尊德性道問學這一句為主都總得致廣大盡精微極高明道中庸溫故知新敦厚崇禮四句問如何是兩件統八件不知分別那箇四件屬尊德性那箇四件屬道問學曰致廣大盡精微極高明道中庸這四件屬尊德性溫故知新敦厚崇禮這四件屬道問學按章句尊德性所以存心致廣大極高明溫故敦厚皆存心之屬也道問學所以致知盡精微道中庸知新崇禮皆致知之屬也此録蓋誤問如何致廣大如何盡精微曰自家須要做聖賢事業到聖賢地位這是致廣大然須是從掃灑應對進退間色色留意方得這是盡精微問如何極高明如何道中庸曰此身與天地並這是極高明若只說卻不踏實地無漸進處亦只是胡說也須是自家周旋委曲於規矩準繩之中到俯仰無愧怍處始得這是道中庸問如何溫故如何知新曰譬如讀論語今日讀這一段所得是如此明日再讀這一段所得又如此兩日之間所讀同而所得不同這便是溫故知新問如何敦厚如何崇禮曰若只是恁地敦厚卻塊然無用也須是見之運量酬酢施為注措之間發揮出來始得長孺謝云教誨親切明白後學便可下工夫先生又諷誦大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人然後行故曰苟不至德至道不凝焉等數語而贊之曰這全在人且如發育萬物峻極于天禮儀三百威儀三千甚次第大事只是一箇人做了然而下面又特地拈出謂苟不至德至道不凝焉結這兩句最為要切須先了得禮儀三百威儀三千然後到得發育萬物峻極于天去處這一箇凝字最緊若不能凝則更沒些子屬自家須是凝時方得所謂至德便是禮儀三百威儀三千所謂至道便是發育萬物峻極于天切須著力理會按章句至德指其人至道指發育萬物峻極于天與禮儀三百威儀三千兩節此録亦誤長孺請曰愚陋恐不能盡記先生之言不知先生可以書為一說如何先生笑曰某不立文字尋常只是講論適來所說盡之矣若吾友得之於心推而行之一向用工儘有無限何消某寫出若於心未契縱使寫在紙上看來是甚麼物事吾友只在紙上尋討又濟甚事長孺謝曰敢不自此探討力行曰且著力勉之勉之長孺起先生留飯置酒三行燕語久之飯罷辭去退而記之訓長孺因言異端之學曰嘗見先生答死而不亡說其間數句大率禪學只是於自己精神魂魄上認取一箇有知覺之物把持玩弄至死不肯放捨可謂直截分曉曰何故只舉此數句其他平易處都不說只是務要痛快說話只此便是病處初在臨江見來劄固已疑其有此今見果然問平日自己不知病痛今日得蒙點破卻望指教如何醫治曰大凡自家見得都是也且做一半是留取一半且做未是萬一果是終久不會變著萬一未是將久浹洽自然貫通不可才有所見便就上面扭掜如孟子中養氣一段是學者先務問養氣一段不知要緊在甚處曰從頭至尾都要緊因指靜香堂言今人說屋只說棟梁要緊不成其他椽桷事事都不要以下訓琮問程子之言有傳遠之誤者願先生一一與理會過曰今之所言與程子異者亦多矣曰節目小者不必論且如金縢一說程子謂此但是周公發於誠心不問有此理無此理如聖人自在天理上行豈有無此理而聖人乃為之者此等語恐誤曰然則有此理乎曰詳考金縢首尾周公初不曾代武王死曰以旦代某之身卻是如何曰武王有疾周公恐是三后在天有所譴責故以身代行事而請命焉耳先生舉豫仁若考以下至無墜天之降寶命曰此一段卻如何解曰如古注之說恐待周公太薄曰今卻要如何說曰竊詳周公之意蓋謂盡其材藝於鬼神之事者己所能也己所能則己所當任其責非武王之責也受命帝庭而敷佑四方定爾子孫而使民祗畏是則武王之所能若今三后以鬼神之事責武王是墜天之降寶命也曰只務說得響快前聖後賢都是恁地解說將來如何一旦要改換他底此非學者之先務須於自家身己上理會方是實學問格物之學須是窮見實理今若於聖人分上不能實見何以學聖人曰自己一箇身心元不理會卻只管去議論別人不是枉了工夫曰平日讀至此有疑願求是正曰只緣自己處工夫少所以別人處議論多且理會自家應事接物處與未應接時此心如何曰昨日先生與諸人答問心說或謂存亡出入皆是神明之妙或謂存底入底亦不是先生之說云入而存者道心也出而亡者人心也琮謂通四句只是說人心操之則存舍之則亡於是出入無時莫知其鄉言其所以危者如此若是道心則湛然常存不惟無出亦自無入不惟不舍雖操亦無所用曰且道如何是人心如何是道心曰心一也方寸之間人欲交雜則謂之人心純然天理則謂之道心曰人心堯舜不能無道心桀紂不能無蓋人心不全是人欲若全是人欲則直是喪亂豈止危而已哉只飢食渴飲目視耳聽之類是也易流故危道心即惻隱羞惡之心其端甚微故也問惟精惟一不知學者工夫多在精字上或多在一字上曰惟精惟一是一樣說話曰琮意工夫合多在精字上曰如何見得曰譬如射藝精則一不精則二三曰如何得精曰須從克己中來若己私未克則被粗底夾和在何止二三曰精字只是於縫脈上見得分明一字卻是守處問如此恐允執厥中更無著力處曰是其效也或問今日挑講諸生所請何事曰萍鄉一士人問性無復其說雖未是其意卻可進因言克己復禮今人全不曾子細理會琮問克己銘一篇如顏子分上恐不必如此曰何故曰顏子不遠復有不善未嘗不知知之未嘗復行安用張皇如此曰又只是議論別人又曰此己字未與物為對只己意發處便自克了問是克家之克非克敵之克也曰林三山亦有此說大凡孔門為仁言雖不同用工處都一般又問如子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者不知此言是築底處或尚有進步處曰如何曰事賢友仁方是利其器處曰亦是如此聖賢言語只管將來玩弄何益於己曰舊學生以論題商議非敢推尋立論曰不問如此只合下立腳不是偏在語言上去全無體察工夫所以神氣飛揚且如仲方主張克己之說只是治己還曾如此自治否仁之為器重為道遠舉莫能勝行莫能至果若以此自任是大小大事形神自是肅然無有師保如臨父母曾子所謂戰戰兢兢如臨深淵如履薄冰如此氣象何暇輕於立論仲方此去須覺識見只管遲鈍語言只管畏縮方是自家進處琮起謝云先生教誨之言可謂深中膏肓如負芒刺自惟病根生於思而不學於是不養之氣襲而乘之徵於色發於聲而不自知也孟子曰持其志毋暴其氣琮雖不敏請事斯語矣曰此意固然志不立後如何持得曰更願指教曰大學之道在明明德在新民是立志處
