body:
  text: 朱子語類卷第一百九朱子六論取士古人學校教養德行道藝選舉爵祿宿衛征伐師旅田獵皆只是一項事皆一理也召穆公始諫厲王不聽而退居于郊及厲王出奔國人欲殺其子召公匿之國人圍召公之第召公乃以己子代厲王之子而宣王以立因歎曰便是這話難說古者公卿世及君臣恩意交結素深與國家共休戚故患難相為如此後世相遇如塗人及有患難則渙然離散而已然今之公卿子孫亦不可用者只是不曾教得故公卿之子孫莫不驕奢淫佚不得已而用草茅新進之士舉而加之公卿之位以為苟勝於彼而已然所恃者以其知義理故勝之耳若更不知義理何所不至古之教國子其法至詳密故其才者既足以有立而不才者亦得以薰陶漸染而不失為寡過之人豈若今之驕騃淫奢也哉陳同父課卧中有一段論此稍佳僩竇問人才須教養明道章疏須先擇學官如何曰便是未有善擇底人某嘗謂天下事不是從中做起須得結子頭是當然後從上梳理下來方見次序德明問聞先生嘗言州縣學且依舊課試太學當專養行義之士曰卻如此不得士自四方遠來太學無緣盡知其來歷須是從鄉舉德明呂與叔欲奏立四科取士曰德行曰明經曰政事曰文學德行則待州縣舉薦下三科卻許人投牒自試明經裏面分許多項目如春秋則兼通三傳禮則通三禮樂則盡通諸經所說樂處某看來樂處說也未盡政事則如試法律等及行移決判事又定為試辟未試則以事授之一年看其如何辟則令所屬長官舉辟遠器云這也只是法曰固是法也待人而行然這卻法意詳盡如今科舉直是法先不是了今來欲教吏部與二三郎官盡識得天下官之賢否定是了不得這事賀孫因論學校曰凡事須有規模且如太學亦當用一好人使之自立繩墨遲之十年日與之磨煉方可今日學官只是計資考遷用又學識短淺學者亦不尊尚可學曰神宗未立三舍前太學亦盛曰呂氏家孰記云未立三舍前太學只是一大書會當時有孫明復胡安定之流人如何不趨慕可學林擇之曰今士人所聚多處風俗便不好故太學不如州學州學不如縣學縣學不如鄉學曰太學真箇無益於國家教化之意何在向見陳魏公說亦以為可罷義剛祖宗時科舉法疏闊張乖崖守蜀有士人亦不應舉乖崖去尋得李畋出來舉送去如士人要應舉時只是著布衫麻鞋陳狀稱百姓某人今聞朝廷取士如何如何來應舉連投所業太守略看所業方請就客位換襴機相見方得請試只一二人試訖舉送舊亦不糊名仁宗時方糊名揚商鞅論人不可多學為士人廢了耕戰此無道之言然以今觀之士人千人萬人不知理會甚事真所謂游手只是恁地底人一旦得高官厚祿只是為害朝廷何望其濟事真是可憂因云云云舊時此中赴試時只是四五千人今多一倍因論呂與叔論得取士好因論其集上代人章表之類文字多難看此文集之弊揚因謂去了此等好曰然因歎與叔甚高可惜死早使其得六十左右直可觀可惜善人無福兄弟都有立一兄和叔做鄉儀者更直截死早揚康節謂天下治則人上行天下亂則人上文太祖時人都不理會文仁宗時人會說今又不會說只是胡說因見時文義甚是使人傷心揚因說子張學干祿曰如今時文取者不問其能應者亦不必其能只是盈紙便可得推而上之如除擢皆然禮官不識禮樂官不識樂皆是吏人做上去學官只是備員考試而已初不是有德行道藝可為表率仁義禮智從頭不識到尾國家元初取人如此為之奈何明作三舍人做乾元統天義說乾元處云如目之有視耳之有聽體之有氣心之有神云云如今也無這般時文僩今人作經義正是醉人說話只是許多說話改頭換面說了又說不成文字僩今人為經義者全不顧經文務自立說心粗膽大敢為新奇詭異之論方試官命此題已欲其立奇說矣又出題目定不肯依經文成片段都是斷章牽合是甚麼義理三十年前人猶不敢如此只因一番省試出上天之載無聲無臭儀刑文王三句後遂成例當時人甚駭之今遂以為常矣遂使後生輩違背經旨爭為新奇迎合主司之意長浮競薄終將若何可慮可慮王介甫三經義固非聖人意然猶使學者知所統一不過專念本經及看注解而以其本注之說為文辭主司考其工拙而定去留耳豈若今之違經背義恣為奇說而無所底止哉當時神宗令介甫造三經義意思本好只是介甫之學不正不足以發明聖意為可惜耳今為經義者又不若為詞賦詞賦不過工於對偶不敢如治經者之亂說也聞虜中科舉罷即曉示云後舉於某經某史命題仰士子各習此業使人心有所定止專心看一經一史不過數舉則經史皆通此法甚好今為主司者務出隱僻題目以乘人之所不知使人弊精神於檢閲茫然無所向方是果何法也僩時有報行遣試官牽合破碎出題目者或曰如此行遣一番也好曰某常說不當就題目上理會這箇都是道術不一所以如此所以王介甫行三經字說說是一道德同風俗是他真箇使得天下學者盡只念這物事更不敢別走作胡說上下都有箇據守若是有才者自就他這腔子裏說得好依舊是好文字而今人卻務出暗僻難曉底題目以乘人之所不知卻如何教他不杜撰不胡說得或曰若不出難題恐盡被人先牢籠做了曰莫管他自家依舊是取得好文字不誤遠方觀聽而今卻都是杜撰胡說破壞後生心術這箇乖某常說今日學校科舉不成法上之人分明以賊盜遇士士亦分明以盜賊自處動不動便鼓譟作鬧以相迫脅非盜賊而何這箇治之無他只是嚴挾書傳義之禁不許繼燭少間自沙汰了一半不是秀才底人他亦自不敢來雖無沙汰之名而有其實既不許繼燭他自要奔去聲無緣更代得人筆或曰恐難止遏今只省試及太學補試已自禁遏不住曰也只是無人理會若捉得一兩箇真箇痛治人誰敢犯這箇須從保伍中做起卻從保正社首中討保明狀五家為保互相保委若不是秀才定不得與保明若捉出詭名納兩副三副卷底人來定將保明人痛治人誰敢犯某嘗說天下無難理會底事這般事只是黑地裏腳指縫也求得出來不知如何得恁地無人理會又曰今日科舉考試也無法不通看或曰解額當均否曰固是當均或曰看來不必立為定額但以幾名終場卷子取一名足矣曰不得少間便長詭名納卷之弊依舊與他立定額只是從今起照前三舉內終場人數計之就這數內立定額數三舉之後又將來均一番如此則多少不至相懸絶矣因說混補曰頃在朝時趙丞相欲行三舍法陳君舉欲行混補趙丞相不肯曰今此天寒粟貴若復混補須添萬餘人米價愈騰踊矣某曰為混補之說者固是謬為三舍之說亦未為得也未論其他只州郡那裏得許多錢榖養他蓋入學者既有舍法之利又有科舉之利不入學者止有科舉一塗這裏便是不均利之所在人誰不趨看來只均太學解額於諸路便無事如今太學解額七人取兩人便七人取一人也由我十人取一人也由我二十人三十人四十人取一人也只由我而今自立箇不平放這裏如何責得人趨或問恩榜無益於國家可去否曰此又去不得去之則傷仁恩人必怨看來只好作文學助教闕立定某州文學幾員助教幾員隨其人士之多少以定員數如宗室宮觀例令自指射占闕相與受代莫要教他出來做官既不傷仁恩又無老耄昏濁貪猥不事事之病矣杜佑通典中說釋奠處有文學助教官因說祿令曰今日祿令更莫說更是不均且如宮觀祠祿少間又盡指占某州某州蓋州郡財賦各自不同或元初立額有厚薄或後來有增減少間人盡占多處去雖曰州郡富厚被人炒多了也供當不去少間本州本郡底不曾給得只得去應副他處人矣因又說經界或曰初做也須擾人曰若處之有法何擾之有而今只是人人不曉所以被人瞞說難行間有一兩箇曉得底終不足以勝不曉者之多若人人都教他算教他法量他便使瞞不得矣打量極多法惟法算量極易自紹興間秦丞相舉行一番以至今看來是蘇綽以後到紹興方得行一番今又多弊了看來須是三十年又量一番庶常無弊蓋人家田産只五六年間便自不同富者貧貧者富少間病敗便多飛産匿名無所不有須是三十年再與打量一番則乘其弊少而易為力人習見之亦無所容其奸矣要之既行也安得盡無弊只是得大綱好其間寧無少弊處只如秦丞相紹興間行也安得盡無弊只是十分弊也須革去得九分半所餘者一分半分而已今人卻情願受這十分重弊壓在頭上都不管及至才有一人理會起便去搜剔那半分一分底弊來瑕疵之以為決不可行如被人少卻百貫千貫卻不管及被人少卻百錢千錢便反到要與理會今人都是這般見識而今分明是有箇天下國家無一人肯把做自家物事看不可說著某常說天下事所以終做不成者只是壞於懶與私而已懶則士大夫不肯任事有一樣底說我只認做三年官了去誰能間理會得間事間討煩惱我不理會也得好好做官去次則豪家上戶群起遮攔恐法行則奪其利盡用納稅惟此二者為梗而已又曰事無有處置不得者事事自有箇恰好處只是不會思量不得其法只如舊時科舉無定日少間人來這州試了又過那州試州裏試了又去漕司試無理會處不知誰恁聰明會思量定作八月十五日積年之弊一朝而革這箇方喚做處置事聖人所以做事動中機會便是如此又曰凡事須看透背後去因舉掌云且如這一事見得這一面是如此便須看透那手背後去方得如國手下棋一著便見得數十著以後之著若只看這一面如何見得那事幾更說甚治道僩包顯道言科舉之弊先生曰如他經尚是就文義上說最是春秋不成說話多是去求言外之意說得不成模樣某說道此皆是侮聖人之言卻不如王介甫樣索性廢了較強又笑云常有一人作隨時變通論皆說要復古至論科舉要復鄉舉里選卻說須是歇二十年卻行要待那種子盡了方行得說得來也是義剛器遠問今士人習為時文應舉如此須當有箇轉處否曰某舊時看只見天下如何有許多道理恁地多如今看來只有一箇道理只有一箇學在下者也著如此學在上者也著如此學在上若好學自見道理許多弊政亦自見得須要整頓若上好學便於學舍選舉賢儒如胡安定孫明復這般人為教導之官又須將科目盡變了全理會經學這須會好今未說士子且看朝廷許多奏表支離蔓衍是說甚麼如誥宰相只須說數語戒諭如此做足矣敬之云先生常說表奏之文下諛其上也誥敕之文上諛其下也賀孫問今日科舉之弊使有可為之時此法何如曰也廢他不得然亦須有箇道理又曰更須兼他科目取人今時文賦卻無害理經義大不便分明是侮聖人之言如今年三知舉所上劄子論舉人使字理會這箇濟得甚今日亦未論變科舉法只是上之人主張分別善惡擢用正人使士子少知趨向則人心自變亦有可觀可學問歐陽公當時變文體亦是上之人主張曰渠是變其詭怪但此等事亦須平日先有服人方可舜功問歐陽公本論亦好但末結未盡曰本論精密卻過於原道原道言語皆自然本論卻生受觀其意思乃是聖人許多憂慮做出卻無自然氣象下篇不可曉德粹云以拜佛知人之性善先生曰亦有說話佛亦教人為善故渠以此觀之也可學今科舉之弊極矣鄉舉里選之法是第一義今不能行只是就科舉法中與之區處且變著如今經義格子使天下士子各通五經大義一舉試春秋一舉試三禮一舉試易詩書禁懷挾出題目便寫出注疏與諸家之說而斷以己意策論則試以時務如禮樂兵刑之屬如此亦不為無益欲革奔競之弊則均諸州解額稍損太學之額太學則罷月書季考之法皆限之以省試獨取經明行修之人如此亦庶幾矣木之因言今日所在解額太不均先生曰只將諸州終場之數與合發解人數定便了又不是天造地設有定數何故不敢改動也是好笑浩或言太學補試動一二萬人之冗曰要得不冗將太學解額減損分布於諸州軍解額少處如此則人皆只就本州軍試又何苦就補試也燾臨別先生留飯坐間出示理會科舉文字大要欲均諸州解額仍乞罷詩賦專經學論策條目井井云且得士人讀些書三十年後恐有人出泳乙卯年先生作科舉私議一通付過看大概欲於三年前曉示下次科場以某經某子某史試士人如大義每道只六百字其餘兩場亦各不同後次又預前以某年科場別以某經某子某史試士人蓋欲其逐番精通也過欲借録不許過先生言時文之謬云如科舉後便下詔今番科舉第一場出題目在甚經內論題出在甚史內如史記漢書等廣說二書策只出一二件事庶幾三年之間專心去看得一書得底固是好不得底也逐番看得一般書子細胡泳先生云禮書已定中間無所不包某常欲作一科舉法今之詩賦實為無用經義則未離於說經但變其虛浮之格如近古義直述大意立科取人以易詩書為一類三禮為一類春秋三傳為一類如子年以易詩書取人則以前三年舉天下皆理會此三經卯年以三禮取人則以前三年舉天下皆理會此三禮午年以春秋三傳取人則以前三年舉天下皆理會此春秋三傳如易詩書稍易理會故先用此一類取人如是周而復始其每舉所出策論皆有定所如某書出論某書出策如天文地理樂律之類皆指定令學者習而用以為題賀孫云此法若行但恐卒未有考官曰須先令考官習之賀孫李先生說今日習春秋者皆令各習一傳并習誰解只得依其說不得臆說先生曰六經皆可如此下家狀時皆令定了揚今人都不曾讀書不會出題目禮記有無數好處好出題目揚科舉種子不好謂試官只是這般人揚張孟遠以書來論省試策題目言今日之弊在任法而不任人孟遠謂今日凡事傷不能守法曰此皆偏說今日乃是要做好事則以礙法不容施行及至做不好事即便越法不顧只是不勇於為善必大科舉是法弊大抵立法只是立箇得人之法若有奉行非其人卻不干法事若只得人便可今卻是法弊雖有良有司亦無如之何王嘉叟云朝廷只有兩般法一是排連法今銓部是也一是信采法今科舉是也問今之學校自麻沙時文冊子之外其他未嘗過而問焉曰怪它不得上之所以教者不過如此然上之人曾不思量時文一件學子自是著急何用更要你教你設學校卻好教他理會本分事業曰上庠風化之原所謂季考行藝者行尤可笑只每月占一日之食便是先生笑曰何其簡易也曰天下之事大正則難如學校間小正須可曰大處正不得小處越難才動著便有掣肘如何正得琮因說科舉所取文字多是輕浮不明白著實因歎息云最可優者不是說秀才做文字不好這事大關世變東晉之末其文一切含胡是非都沒理會賀孫有少年試教官先生曰公如何須要去試教官如今最沒道理是教人懷牒來試討教官某嘗經歷諸州教官都是許多小兒子未生髭鬚入學底多是老大底人如何服得他某思量須是立箇定制非四十以上不得任教官又云須是罷了堂除及注授教官卻請本州鄉先生為之如福州便教林少穎這般人做士子也歸心他教也必不苟又云只見泉州教官卻老成意思卻好然他教人也未是如教人編抄甚長編文字又曰今教授之職只教人做科舉時文若科舉時文他心心念念要爭功名若不教他你道他自做不做何待設官置吏費廩祿教他做也須是當職底人怕道人不曉義理須是要教人識些如今全然無此意如何恁地賀孫坐中有說赴賢良科曰向來作時文應舉雖是角虛無實然猶是白直卻不甚害事今來最是喚做賢良者其所作策論更讀不得緣世上只有許多時事已前一齊話了自無可得說如笮酒相似第一番淋了第二番又淋了第三番又淋了如今只管又去許多糟粕裏只管淋有甚麼得話既無可得話又只管要新最切害處是輕德行毀名節崇智術尚變詐讀之使人痛心疾首不知是甚世變到這裏可畏可畏這都是不祥之兆隆興以來不恁地自隆興以後有恢復之說都要來說功名初不曾濟得些事今看來反把許多元氣都耗卻管子孔門所不道而其言猶曰禮義廉恥是謂四維如今將禮義廉恥一切掃除了卻來說事功賀孫葉正則彭大老欲放混補廟堂亦可之但慮艱食故不果行二人之意大率為其鄉人地耳廟堂云今日太學文字不好卻不知所以不好之因便使時文做得十分好後濟得甚事某有一策諸州解額取見三舉終場最多人數以寬處為準皆與添上省試取數卻不增其補試卻用科舉年八月十五日引試若要就補須舍了解試始得如此庶幾人有固志免得如此奔競喧鬨閎祖說趙丞相欲放混補歎息云方今大倫恁地不成模樣身為宰相合以何為急卻要急去理會這般事如何恁地不識輕重此皆是衰亂之態只看宣和末年番人將至宰相說甚事只看實録頭一版便見且說太學秀才做時文不好你道是識世界否如今待補取士有甚不得如何道恁地便取得人才如彼便取不得人才只是亂說待補之立也恰如擲骰子一般且試采擲得便得試擲不得便不得試且以為節制那裏得底便是不得底便不是這般做事都是枉費氣力某常說均解額只將逐州三舉終場人數用其最多為額每百人取幾人太學許多濫恩一齊省了元在學者聽依舊恩例諸路牒試皆罷了士人如何也只安鄉舉如何自家卻立箇物事引誘人來奔趨下面又恁地促窄無入身處如何又只就微末處理會若均解額取人數多或恐下梢恩科數多則更將分數立一長限以前得舉人卻只依舊限有甚不得處他只說近日學中緣有待補不得廣取以致學中無好文字不知時文之弊已極雖鄉舉又何嘗有好文字膾炙人口若是要取人才那裏將這幾句冒頭見得只是胡說今時文日趨於弱日趨於巧小將士人這些志氣都消削得盡莫說以前只是宣和末年三舍法才罷學舍中無限好人才如胡邦衡之類是甚麼樣有氣魄做出那文字是甚豪壯當時亦自煞有人及紹興渡江之初亦自有人才那時士人所做文字極粗更無委曲柔弱之態所以亦養得氣宇只看如今稱斤注兩作兩句破頭如此是多少衰氣賀孫或問趙子直建議行三舍法補入縣學自縣學比試入於州學自州學貢至行在補試方入太學如何曰這是顯然不可行底事某嘗作書與說他自謂行之有次第這下梢須大乖今只州縣學裏小小補試動不動便只是請囑之私若便把這箇為補試之地下梢須至於興大獄子直這般所在都不詢訪前輩如向者三舍之弊某嘗及見老成人說劉聘君云縣學嘗得一番分肉肉有內舍外舍多寡之差偶齊僕下錯了一分學生便以界方打齊僕高聲大怒云我是內舍生如何卻只得外舍生肉如此等無廉恥事無限只是蔡京法度如此嘗見胡珵德輝有言曰學校之設所以教天下之人為忠為孝也國家之學法始於熙寧成於崇觀熙寧之法李定為之也崇觀之法蔡京為之也李定者天下之至不孝者也蔡京者天下之至不忠者也豈有不忠不孝之人而其所立之法可行於天下乎今欲行三舍之法亦本無他說只為所取待補多滅裂真正老成士人多不得太學就試太學緣此多不得人然初間所以立待補之意只為四方士人都來就試行在壅隘故為此法然又須思量所以致得四方士人苦死都要來赴太學試為甚麼這是箇弊端須從根本理會去某與子直書曾云若怕人都來赴太學試須思量士人所以都要來做甚麼皆是秀才皆非有古人教養之實而仕進之途如此其易正試既優又有舍選恩數厚較之諸州或五六百人解送一人何其不平至於此自是做得病痛如此不就這處醫治卻只去理會其末今要好且明降指揮自今太學並不許以恩例為免若在學人援執舊例則以自今新補入為始他未入者幸得入而已未暇計此太學既無非望之恩又於鄉舉額窄處增之則人人自安鄉里何苦都要入太學不就此整理更說甚高抑崇秦相舉之為司業抑崇乃龜山門人龜山於學校之弊煞有說話渠非不習聞講論到好做處卻略不施為秦本惡程學後見其用此人人莫不相慶以為庶幾善類得相汲引後乃大不然一向苟合取媚而已學校以前整頓固難當那時兵興之後若從頭依自家好規模整頓一番豈不可為他當時於秦相前亦不敢說及此賀孫因論黃幾先言曾於周丈處見虜中賦氣脈厚先生曰那處是氣象大了說得出來自是如此不是那邊人會揚
