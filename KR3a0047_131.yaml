body:
  text: 朱子語類卷第一百三十一本朝五中興至今日人物上李趙張汪黃秦李伯紀徽廟時因論京城水災被出後復召用遂約吳敏勸行內禪事李恐吳做不得乃自作文於袖中入吳已為之矣後欽宗即位用之一日聞金人來殿上臣寮都失措皆欲作竄計李叩閣門入論閣門止之欽宗聞之令引見力陳禦戎之策忠義慨然上大喜即擢知樞密院事李英爽奮發然性疏用術欽廟用督太原師適种師中敗遂得罪太上登極建炎初召汪黃輩云李好用兵今召用恐金人不樂上曰朕立於此想彼亦不樂矣遂用為相後汪黃竟使言官去之在相位止百餘日許右丞作陳少陽哀詞亦各見其出處揚李丞相不甚知人所用多輕浮相於南京時建議三事借民間錢二云云三云云宋齊愈言之其時正誅叛人遂以宋嘗令立張邦昌戮之當時人多知是立張邦昌間有未知者宋書以示之及刑人多冤之張魏公深言宋甚好人宋蜀人當時模樣亦是汪黃所使人魏公亦汪黃薦李罷相乃魏公言罷也揚黃仲本言於先生曰李伯紀一再召乃黃潛善薦也途中見顏岐言章遂疑潛善為之李入國門潛善率百官迓之李默不一語因此二公生隙又曰上云李綱孩視朕先生曰李丞相有大名當時誰不追咎其不用以至於此上意亦須向之潛善因而推之背後卻令顏岐言之情理必是如此仲本是其族人不欲辨之揚問魏公何故亦嘗論列李丞相曰魏公初赴南京亦主汪黃後以其人之不足主也意思都轉後居福州李公家於彼相得甚歡是時李公亦嘗薦魏公曾惹言語又問魏公論李丞相章疏中有修怨專殺等語似指誅宋齊愈而言何故曰宋齊愈舊曾論李公來但他那罪過亦非小小刑杖斷遣得了又曰當時議論自是一般好笑方召李丞相時顏岐之徒論列謂張邦昌虜人所厚不宜疏遠李綱虜人所惡不宜再用幸而高宗語極好云如朕之立恐亦非虜人所樂遂得命召不寢曰方南京建國時全無紀綱自李公入來整頓一番方略成箇朝廷模樣如僭竊及嘗受僞命之臣方行誅竄死節之臣方行旌恤然李公亦以此去位矣又曰便是天下事難得恰好是時恰限撞著汪黃用事二人事事無能卻會專殺如置馬伸於死地陳東歐陽徹之死皆二人為之傳中興詔令御史臺勸劄宋齊愈外至會議處於卓子上取筆寫張邦昌三字坐皆失色儒用陳少陽之死黃潛善害之也其詳見於許右丞哀詞中同時死者歐陽徹徹楚州人某族叔祖時居高郵一日使一人往楚州鹽城小村中買物事久而不歸後問之乃云彼村中三四日大雪叔祖甚怪之云八月二十間安得有雪亦且據其僕云記之後有人自彼中來問之果然乃歐陽死時也揚舜舉十六相誅四凶如此方恰好兩邊方停勻後世都不然惟小人得志耳方天下無事之時則端人正士行義謹飭之士為小人排擯不能一日安於朝廷遷竄貶謫及擾攘多故之秋所謂忠臣義士者犯水火蹈白刃以捐其軀而小人者平世固是他享富貴及亂世亦是他獨寬縱橫顛倒無非是他得志之日君子者常不幸而小人者常幸也如汪黃在高宗初年為宰相後來竄廣中正中原多故之日卻是好好送他去廣中避盜及事稍定依舊取他出來為官高宗初啓中興而此等人為宰相如何有恢復之望在維揚時番人兵矢簇在胸前了他猶自不管世間有此愚人子蒙問中興諸相曰張魏公才極短雖大義極分明而全不曉事扶得東邊倒了西邊知得這裏忘了那裏趙忠簡卻曉事有才好賢樂善處置得好而大義不甚分明李丞相大義分明極有才做事有終始本末昭然可曉只是中間粗不甚謹密此是他病然他綱領大規模宏闊照管得始終本末才極大諸公皆不及只可惜太粗耳朱丞相秀水間居録自誇其功太過以復辟之事皆由他做不公道魏公有鎮江録又問呂頤浩曰這人粗胡亂一時間得他用不足道子蒙魏公才短然中興以來要為者只李張二公揚李伯紀大節好敗兵事乃當時為其所治者附會滋益之不足盡信揚李伯紀請誅張邦昌并畔者後以結余睹事過海振李伯紀丞相為宣撫使時幕下賓客盡一時之秀胡德輝何晉之翁士特諸人皆有文名德輝尤蒙特顧諸將每有稟議正紛拏辨說之際諸公必厲聲曰且聽大丞相處分諸將遂無語看來文士也是誤人蓋真箇能者未必能言文士雖未必能卻又口中說得筆下寫得真足以動人聞聽多至敗事者此也儒用因語李忠定曰君子能勤小物故無大患閎祖問中興賢相皆推趙忠簡公何如曰看他做來做去亦只是王茂洪規摹當時廟論大概亦主和議按王庶乞免簽書和議文字劄貼黃云契勘臣前項所上章奏及與王論議實有妨嫌今若不自陳稟則又如趙鼎劉大中輩首鼠兩端於陛下國事何益使當國久未必不出於和但就和上卻須有些計較如歲幣稱呼疆土之類不至一一聽命如秦會之樣草草地和了後來秦沒意智乃以不合沮撓和議為詞貶之卻十分送箇好題目與他問趙好處如何曰意思好又孜孜汲引善類但其行事亦有不強人意處如自平江再都建康張德遠極費調護已自定疊了只因酈瓊叛去德遠罷相趙公再入憂虞過計遂決還都臨安之策一夜起發自是不復都金陵矣問酈瓊之叛或云因呂安老折辱之不能安遂生反心如不親坐廳但垂簾露履以受其參之類恐無此等事曰此亦傳聞之過又問當時皆歸罪魏公以為不合罷劉光世故有此變曰光世在當時貪財好色無與為比軍政極是弛壞罷之未為不是但分付得他兵馬無著落又云此事似不偶然如虜人寇虐劉豫不臣但無人敢問著他至此屯重兵淮上方謀大舉以伐劉豫忽然有此一段疏脫遂止又云如呂安老才氣儘自過人觀其議論亦甚精確問酈瓊叛去之後聞亦不得志於虜曰虜後來亦用他為將但初叛歸於劉豫虜人卻疑豫擁兵太衆或疑與我為內應遂有廢豫之謀酈瓊叛於淮西實紹興七年秋戊辰也瓊既降劉豫金人憂其難制遂廢僞齊其詔有云勿謂奪蹊田之牛其罰則甚不能為托子之友非棄亦何此天滅齊豫也豈偶然哉儒用問趙忠簡張魏公當國魏公欲戰忠簡欲不戰忠簡以為劉豫杌上肉耳然豫挾虜人以為重今且得豫遮蔽虜人我之被禍猶小若取劉豫則我獨當虜人難矣魏公不然之必欲戰二策孰是曰忠簡非是殺得劉豫了又卻抵當虜人有何不可劉豫亦未便是杌上肉在若以趙之才恐也當未得那杌上肉他亦未會被你殺得只是胡說若真箇殺得劉豫則我之勢益強虜人自畏矣何難當之有虜豺狼犬羊也見威則畏見善則愈肆欺侮若自家真箇曾勝劉豫殺得一兩番贏他便怕矣靖康以後自家只管怕他與之和所以他愈肆欺侮若自家真箇能勝劉豫他安得不懼虜禽獸耳豈可以柔服也嘗見征蒙記李成之子某從兀朮征蒙國因記征蒙時事云兀朮在甚處淮上二士人說之曰今韓世忠渡江遺棄糧草甚多若我急往收取資之以取江南必可得也兀朮然其言遂急來淮上則空無所有蓋韓已先般輜重糧草歸而後抽軍回也倣徨淮上正未有策而糧草已竭窘不可言先已敗於劉錡錡在順昌扼其前進退不可遂遣使請和兀朮謂其下曰今南朝幸而欲和即大幸不然即送死耳無策可為也這下又不知其狼狽如是若知之以偏師臨之無遺類矣是時雖稍勝然高宗終畏之欲和因其使來喜甚遂遣使報之欲和兀朮大喜遂得還是兀朮不敢望和自以為必死其遣使也蓋亦謾試此間耳可惜此機會所以後來也怕一向欲和又云劉信叔是時以孤軍在順昌兀朮來伐諸將皆欲走信叔曰不可我若走則虜人必前拒我襲在後必無遺類若幸而得至江則諸將盡扼江上責我以擅棄歸之罪亦必盡殺我決無可生之理不若堅守此城與虜人決勝負庶幾死中可以求生也某嘗說冢殺無巧妙只是死中求生兩軍相拄一邊立得腳住不退即贏矣須是死中求生方勝也遂據城與虜人戰大敗虜人兀朮由是畏怯若非錡順昌一勝兀朮亦未必便致狼狽如此之甚信叔本將家子喜讀書能詩詩極佳善寫字後來當完顏亮時己自老病緣其侄劉缋先戰敗遂至於敗卓饒録云張魏公欲討劉豫趙丞相云留他在上可以扞蔽北虜若除了便與北虜為鄰恐難抵當此是甚說話豈有不能討叛臣而可以服夷狄乎趙丞相亦自主和議但爭河北數州及不肯屈膝數項禮數爾至秦丞相便都不與爭趙丞相是西人人皆望其有所成就不知他倒都不進前方子録云趙元鎮亦只欲和但秦檜既擔當了元鎮卻落得美名張魏公本與趙忠簡同心輔政陳公輔排程氏乃因趙公趙公去已而呂安老敗趙公復相可學趙丞相中興名臣一人而已然當時不滿人意處亦多且如好伊洛之學又不大段理會得故皆為人以是欺之一日出見一屋稍好栽些花木之類問知是一內官家及言於上謂今暫駐蹕於此當日圖恢復而內臣乃居安如此遂編管之揚趙丞相收拾得些人材然亦雜如喻子才之徒亦預焉也揚先生云沈公雅言趙丞相鎮靜德量之懿而諳練事機則恐於秦公不逮張子功以為不然且曰燾在都司日忠簡為相有建議者公必計也曰如是則利在上而害在民如是則害在上利在民今須如此行則利澤均而公私便至秦公則僚屬凡有關白默無一語而屬諸吏事出則皆吏輩所為而非復前日之所擬道夫僩録云嘗見沈公雅云某嘗問張子功趙忠簡與秦丞相二公孰能辦事某以秦公為能子功曰不然某嘗為都司事二公每百官有稟白事件趙公必當面剖析商量此事合如何行如此行則利國如此行則利民如此則利民而害國如此則利國而害民如此則國與民俱利當面便商量判斷了僚屬便奉承以行及至秦公則百官凡有所稟白無酬酢略不可否但付與吏人少間更沒理會此事便沉埋了如此謂之秦公勝趙公可乎魏公初以何右丞薦為太常簿趙忠簡為開封推官相得甚歡在圍城中朝夕論講濟時之策魏公先達力相汲引遂除司勳員外郎一向超擢反在魏公上嘗論天下人材魏公劇談秦會之可用趙云此人得志吾輩安所措足邪魏公云且為國事計姑置吾人利害時趙公為左張公為右皆兼樞密院事忽報兀朮大舉深入朝廷震怖時劉光世將重兵屯合肥魏公親往視師因奏記曰此決非兀朮必劉豫遣其子姪麟猊來寇耳臣往在關西數與兀朮戰熟其用兵利害今觀此舉決非其人魏公遂下令督戰光世恐懼謀欲退師而南以與趙公平時有鄉曲雅故遂私有請於趙折彥質時知樞密院事復助之請遂徑自樞府下文字令光世退師魏公聞之大怒下令曰敢有一人渡江即斬以徇光世聞之復駐軍如故此事雖謂之曲在趙公可也已而拓皋大捷虜騎遂退魏公既還絶不言前功欲以安趙公與共國事也而二公門下士互相排抵魏公之人至有作為詩賦以嘲趙公者趙公之跡不安且有論之者遂去魏公獨相乃力薦會之為樞密使及酈瓊叛於合肥呂安老死之魏公之跡亦不安懇辭求去高宗問誰可代卿者魏公復薦趙公遂令魏公擬批召之既出會之謂必薦己就閣子語良久魏公言不及之會之色漸變未幾中使傳宣促進所擬文字魏公遂就坐作劄子封付中使會之色變愈甚魏公遂上馬去及趙公再相會之反謂之曰張德遠直恁無廉恥弄壞得淮上事如此猶不知去及主上傳宣來召相公方皇恐上馬去趙公以為然後又數數讒間之趙公不能不信也又如光世之罷實當於罪酈瓊叛去豈不可舉能者乃復以淮西之軍付光世弄得都成私意初趙公極惡秦之為人不與通情及趙公為相秦為樞密使每事惟公之命是聽久而趙公安之復深信之又薦之至與之並相並相之後復不敢專唯諾而已忽一日高宗怒唐暉趙公為之分解檜察上意惡暉逡巡發一語云如唐暉樣人才也不難得又一日趙公奏恩平郡王乃建王之弟建王乃恩平之兄建州不過一郡之地吳乃一大都會恐弟之封不宜壓兄檜察見高宗以慈壽意主於恩平遂奏曰也不較此因此二事高宗深眷之又因力主和議趙公罷遂拜左相他言語不多只用兩句那事都了趙公不知魏公之無他為檜所排得泉州是時魏公知福州二公相見因說及曩日之事趙公方知為檜所中相與太息而已或曰以檜之才若用之以正豈不能任恢復之責曰他亦只是閉著門在屋子裏做得不知出門去又如何這事難坐間多稱其能處置大事曰他急時也荒忙無計策他初一番講和虜人以河南之地歸未幾敗盟大舉入寇邊報既至大恐不知所為顧盼朝士問以計策時張巨山微誦曰德無常師主善為師善無常主協於克一檜心異之衆人既退獨留巨山坐問適間之語巨山曰天下之事各隨時節不可拘泥曩者相公與虜人講和者時當講和也今虜人既敗盟則曲在彼我不得不應亦時當如此耳因為之畫策召諸將為戰攻之計他大喜即命巨山為奏卧倉卒不子細起頭兩句云伊尹告成湯曰德無常師主善為師孔子曰陳力就列不能者止遂急書進呈會之復喜遂播告天下決策用兵已而劉信叔順昌大捷虜人遂退檜復專其功大喜亟擢用巨山至中書舍人有無名子作詩嘲之一聯云成湯為太甲宣聖作周任周莊仲云劉參政大中之子知某州劉季章曾為其館客嘗與先生說見其翁日録覺得高宗之意極不樂魏公先生曰然劉曰有御史者川人名戒字定夫魏公在川陝時上書言利害魏公喜檄用之倔強不從魏公遂疏遠之戒由是不樂後酈瓊之叛魏公去位張為御史首論魏公高宗喜謂輔臣曰張戒論浚曰不臣之跡已見跋扈之跡未明此兩句極當其罪謂其已罷宣撫使除樞密而猶用宣撫使印除吏不已也是時趙公奏曰此恐是一時不審之過亦未至於不臣也秦檜徐進曰既為臣子恐亦不宜如此檜之乘機伺人主喜怒擠陷人皆此類也儒用按是時周祕石公揆李誼交章詆公不特一張戒而已儒用德明録二條今附正之問劉寶學當初從魏公始末先生云當時趙公且要持重魏公卻要大舉有劉麟者舉兵掠邊朝廷不探虛實以為虜復大入趙公震恐張公出視師江上趙公手書云今日之事且須持重未可輕戰萬一失事雖公不為一身慮如宗廟社稷何是時劉麟兵以為折彥古敗於淮上遁去於是張公鼓舞益為大舉計謂趙公怯敵言者繼亦有論列趙遂罷相初趙公遣熊叔雅相視川陝事宜魏公亦遣寶學往寶學見川中無兵無財歸告魏公向者兵財如許尚不能集事今實未可動魏公疑寶學附會趙公時又欲令寶學帥淮西代領酈瓊兵寶學以為此軍不可代遂改呂安老願往寶學為陳利害宜辭此行安老以告魏公怒於此出寶學知泉州既而淮西果失師酈瓊全軍遁虜於是魏公罷相帥福州先是秦相與呂相同在政府呂相視師淮上秦相盡改其規模一時為呂相所引用人多逐去盡起在外諸賢如胡文定張子公程伯禹諸人布在朝列實欲傾呂相也後呂相召還過某州席大光邀留告所以傾秦之術以為莫若先去黨魁黨魁指文定也秦竟為呂相所傾出知紹興府是時富直柔者富公之子嘗於一寺中與秦相握臂疑語且及富公為相時事忽若有所思徑入去踰時不出富怪之須臾出云元來宰相要如此做一時會稽政事便放下不問雖公筵亦只令去通判處理會趙公素鄙秦之為人魏公卻薦秦相遂再召除樞密使既視事一切不問魏公出知福州朝辭上問孰可以代卿者魏公薦趙相上云可一面批旨奏來魏公還堂秦相迎之以為必薦己也坐久無語秦色變少頃中使傳宣云有旨令作召趙相公文字來於是魏公指揮堂吏作文字奏上秦大不樂魏公去國趙相至秦譖魏公於趙公曰德遠到堂中尚未肯去直到中使催促召相公文字方上馬趙公於是益不樂魏公及趙公為秦所傾出知泉州過福州與魏公相見語及當時薦代之事二公始豁然無疑先生曰秦相自為樞密使不理會事及與趙公並相一切聽其所為皆富直柔教之也直柔不才子富公相業安有此哉其後上頗厭趙公為秦所窺只兩言傾去是時有唐暉者作舍人求去上云唐暉只管求去趙公力薦乞且留此人秦奏云似這般人才亦不難得上欲封普安郡王為建王恩平為吳王趙公以為建一郡耳吳古大國事體不稱秦奏云此亦只是虛名有何不可趙公愕然於是遂求去又一條云秦相初罷政張當軸是時虜入淮上魏公出視師遂起秦相知臨安故事前宰相召還例賜茶藥繖蓋之屬趙公並不檢舉秦相使人禱魏公公盡與合得禮數魏公淮上方向進趙公憂不便奏乞退師保建康以南既而虜兵卻言者攻趙相謂進師非趙鼎意坐是罷出魏公獨相遂挽秦為樞密使秦一切唯唯從公所為久之始與公爭事及呂安老廬州失師魏公乞出上不能留因問卿去孰可代者公遂薦趙相上云卿可具文字來既退至都堂秦迎之有喜色意其必薦己也公坐久無語秦色變公乃指揮堂吏作召趙相文字及趙公來秦相譖魏公曰上意如此德遠猶且倣徨及中使宣索召相公文字方上馬去及言魏公所以短趙公者由是二公為深仇故趙相居位不復牽挽魏公其後因一僧與魏公生日秦相治之甚峻幾逮及公又治趙相之子獄未成夜忽有一燈墜獄中其上書一反字明日獄具罪當斬秦檜不悅欲加族誅文字未上檜死先生云若族趙相家當時連逮數十人做到這裏自休不得其勢須如曹操去僩因問當初高宗若必不肯和乘國勢稍振必成功曰也未知如何蓋將驕惰不堪用僩問如張韓劉嶽之徒富貴已極如何責他死了宜其不可用若論數將之才則嶽飛為勝然飛亦橫只是他猶欲向前冢殺先生曰便是如此有才者又有些毛病然亦上面人不能駕馭他若撞著周世宗趙太祖那裏怕他駕馭起皆是名將緣上之舉措無以服其心所謂得罪於巨室者也是夜因論為政不得罪於巨室語及此又問劉光世本無能然卻軍心向他其裨將亦多可用者曰他本將家子云云張魏公撫師淮上督劉光世進軍是時虜人正大舉入寇光世恐懼遂背後懇趙忠簡是時趙為相折彥質為樞密折助之請樞密院遂命劉光世退軍魏公聞之大怒遂趕回劉光世出榜約束云如一人一馬渡江者皆斬光世遂不敢渡江便回淮上樞府一面令退軍而宣府令進軍淮上然終退怯魏公既還朝遂力言光世巽懦不堪用罷之而命呂安老董其軍及安老為瓊等所殺降劉豫魏公由是得罪而趙忠簡復相趙既相遂復舉劉光世為將都弄成私意魏公已自罷得劉光世好了雖呂安老敗事然復舉能者而任之亦足矣何必須光世哉此皆趙之私意以某觀必竟魏公去得光世是而趙所為非豈有虜人方入你卻欲掉了去一邊令進軍一邊令退軍如何作事云云又言諸將驕橫張與韓較與高宗密故二人得全嶽飛較疏高宗又忌之遂為秦所誅而韓世忠破膽矣只有韓世忠在大儀鎮算殺得虜人一陳好高宗初遣魏良臣往虜中講和令韓世忠退師渡江韓聞魏將至知其欲講和也遂留之云某方在此措處得略好正抵當得虜人住大功垂成而主上乃令追還何也魏云主上方與大金講和以息兩國之民恐邊將生事敗盟故欲召公還慎勿違上意韓再三歎息以為可惜又云既上意如此只得抽軍歸耳遂命士卒束裝即日為歸計魏遂渡淮兀朮問以韓世忠已還否魏答以某來時韓世忠正治疊行即日起離矣兀朮再三審之知其然遂稍弛備世忠乘其懈回軍奮擊之兀朮大敗魏良臣皇恐無地再三哀求云實見韓將回不知其紿己乃得免因言陳同父上書乞遷都建康而曰黃帝披山通道未嘗寧居今宮室臺榭妃嬪媵嬙之盛如此如何動得高宗本遷都建康了卻是趙忠簡打疊歸來蓋初間虜人入寇群臣勸高宗躬往撫師行至平江而止繼而淮上諸將相繼獻捷趙公得人望正在此時已而欲返臨安適張魏公來遂堅勸高宗往建康及淮師失律趙公荒窘遂急勸高宗移歸臨安自此遂不復動矣看趙公後來也無奈何其勢只得與虜人講和是時已遣王倫以二十事使虜約不稱臣以濁河為界此便是講和了後來秦檜力排趙公遂以不肯講和之罪歸之使萬世之下趙公得全其名者乃檜力也問張趙二公優劣曰若論理會朝政進退人才趙公又較縝密無疏失若論擔當大事竭力向前則趙公不如張公張公雖是竭力擔當只是他才短慮事疏處多盡其才力方照管得若才有些不到處便弄出事來便是難趙公也是不諳軍旅之務所以不敢擔當萬一虜人來到面前無以應之不若退避耳僩儒用録云或問趙忠簡公與魏公材品如何曰趙公於軍旅邊事上不甚諳練於國事人才上卻理會得精密仍更持重但其心未必如張公辨得為國家擔當向前自中興以來廟堂之上主恢復者前有李伯紀後有張公而已但張公才短處事有疏略處他前後許多事皆是竭其心力而為之少有照管不到處便有疏脫出來問趙忠簡行狀他家子弟欲屬筆於先生先生不許莫不以為疑不知先生之意安在曰這般文字利害若有不實朝廷或來取索則為不便如某向來張魏公行狀亦只憑欽夫寫來事實做將去後見光堯實録其中煞有不相應處故於這般文字不敢輕易下筆趙忠簡行實向亦嘗為看一過其中煞有與魏公同處或有一事張氏子弟載之則以為盡出張公趙公子弟載之則以為盡出趙公某既做了魏公底以為出於張公今又如何說是趙公耶故某答他家子弟盡令他轉托陳君舉見要他去子細推究參考當時事實庶得其實而無抵牾耳問張趙都是好宰相未知人品如何曰他兩箇當初都要協力出來主張國事只緣後來有些不足遂做不成以某觀之趙公未免有些不是處曰何以見之曰且如淮上既敗張公既退趙公復相凡張公所為一切更改張公已遷都建康卻將車駕復歸臨安張公所用蜀中人才一皆退之觀此似亦趙公未免有不是處也曰臨安駐蹕聞之立意不欲安於此耳又嘗聞長老之言有植竹於內庭者趙公見而拔之曰汝欲安於此乎然則再歸臨安恐必有為非是與魏公相反也又見趙公遺事有一條說張公罷相趙公復相事甚詳云德遠所用人才如馮如熊等在朝諸人趙公皆更用之亦豈得謂之故與張公相反乎先生曰拔竹之事似是汪端明所記但某未敢深信嘗記張公欲行遣一內臣趙公但欲薄責之蓋恐其徒或來報復如此則拔竹事其能然乎至於收用蜀中人才恐未必然也大抵張公才疏意廣卻敢擔當大事至於趙公卻深曉事其於人才世務區處得頗精密至於擔當天下事恐不及張公也枅張魏公材力雖不逮而忠義之心雖婦人孺子亦皆知之故當時天下之人惟恐其不得用若海杜子美詩云艱危須藉濟時才某思至此不覺感歎濟時才分明是難得直卿問志與才互相發否曰有才者未必有志有志則自然有才人多言張魏公才短然被他有志後終竟做得來也正當道夫明受之禍魏公在江中忽有人登其舟公問為誰云苗太尉使我來殺相公公云汝何不殺我云相公忠義某們不肯做此事後面更有人來相公不可不防備公問姓名不告而去欽夫云德明孝宗初起魏公用事魏公議論與上意合故獨付以恢復之任公亦當之而不辭然其居廢許時不曾收拾人才倉卒從事少有當其意者諸公多薦查元章籥江凌人馮圓仲方蜀人魏公亦素相知辟置幕府朝廷恐其進太鋭遂以陳福公唐立夫參其軍以二人厚重詳審故也緣唐立夫亦只是箇清曠會說話好骨董談禪底人與魏公同鄉里契分素厚故令參其軍事因笑曰正如趙元鎮相似那邊一面去督戰這邊一面令回軍成甚舉措魏公既失利遂用湯進之未幾虜人再來湯往視師辭不行又命王瞻叔瞻叔又辭不行蓋魏公初罷淮上宣撫時朝廷命王治其錢穀瞻叔極力搜索軍士皆忿怨若往必有一場大疏脫蓋是時軍士已肆言欲殺之矣沈莊仲云嘗見先生說魏公被李顯忠邵宏淵二將說動故決意進兵既而唐陳二公皆不從魏公令問二將二將曰聞虜人積糧運芻於虹縣靈壁矣秋高馬肥必大舉南寇今若不先其未發而破之及其來莫說某輩不肯用心二公聞此言故亦從之魏公既入奏事淹留一兩月及還則已六月矣乘劇暑進兵以至於敗未幾魏公薨皆無人可用幸而復與虜人講和乃定儒用張魏公初召來縉紳甚喜時湯進之在右揆衆以為魏公必居左既而告庭雙麻湯遷左魏公居右凡事皆為湯所沮魏公不得已出視師言官尹穡陰搖撼之一日陳良翰邦彥上殿言及此壽皇云安有此事當今群臣誰出魏公之右者恐是臺諫中陰有所沮卿可宣諭之陳退自念臺諫中某人某人姓名失記皆主魏公只有尹一人意異然上旨如此不可不宣諭遂以上意達諸人尹云某明日亦上殿既不見報次日又上殿繼而有旨陳知建寧魏公遂罷問湯後來罪責如何曰渠建議和親以四州還之而虜復犯淮壽皇怒免官削爵土可學張魏公被召入相議北征某時亦被召辭歸嘗見欽夫與說若相公誠欲出做則當請旨盡以其事付己拔擢英雄智謀之士一任諸己然後可為若欲與湯進之同做決定做不成後來果如此然那時又除湯為左相卻把魏公做右相雖便得左相湯做右相也不得何況卻把許多老大去為他所制後來乖此只要濟事故不察外人見利害甚分明賀孫因論張魏公湯思退主戰和曰亦不可徒從上言戰以拗太上太上以故兩番不曾成了所以怕主戰者須是做得模樣在人眼前教太上看得自信其可以戰則自無說也揚張魏公不與人共事有自為之意也是當時可共事之人少然亦不可如此天下事未有不與人共而能濟者汪明遠得旨出措置荊襄奏乞迂路過建康見張公張公不與之言問亦不答揚張魏公可惜一片忠義之心而疏於事亦是他年老覺得精神衰急欲成事故至此兼是朝廷諸公不能得公用兵幸其敗以為口實初間是李顯忠邵宏淵請於公以為虜人精兵在虹縣矣俟秋來大舉南寇今若不先破其巢穴待他事成驟至某等此時直當不得公問其實否李忠顯邵宏淵便云某人之語甚詳即不僉聽呼二人議其說如前公曰云云於是即動不知如何恁地輕率德明魏公言元祐待熙豐人太甚所以致禍人無君子小人孰不可為善此是其父賢良之說汪書答云又有如何大圭者何為張所禮後譖張于秦公云便是這般人云云先生謂汪書云若某則曰公嘗深於易易只言君子小人今若言無小人是無用易也方秦會之入參時胡文定有書與友人云吾聞之喜而不寐前輩看他都不破如此淳秦檜翟公巽知密州秦檜作教授一日有一隱者至會相曰此教授大貴翟問與某如何曰翰林如何及之如何及之時游定夫在坐退因勉秦云隱者甚驗幸自重游因說與胡文定曰此中有箇秦會之好胡問如何曰事事裏不會秦後於陳應之處問游後云曾為游酢知云上蔡言於陳應之應之言於先生下事事裏不會籍溪言於先生揚問胡文定公與秦丞相厚善之故曰秦會之嘗為密教翟公巽時知密州薦試宏詞游定夫過密與之同飯於翟奇之後康侯問人才於定夫首以會之為對云其人類荀文若又云無事不會京城破虜欲立張邦昌執政而下無敢有異議惟會之抗疏以為不可康侯亦義其所為力言於張德遠諸公之前後會之自海上歸與聞國政康侯屬望尤切嘗有書疏往來講論國政康侯有詞掖講筵之召則會之薦也然其雅意堅不欲就是必已窺見其微隱有難處者故以老病辭後來會之做出大疏脫則康侯已謝世矣定夫之後及康侯諸子會之皆擢用之時在坐范兄云定夫之子不甚發揚秦老數求乃翁論語解序因循不果録呈其侄有知之者遂默記之一日進見秦老及此則舉其文以對由是喜之後故擢至侍從是為子蒙尊人又曰此老當國卻留意故家子弟往往被他牢籠出去多墜家聲獨胡明仲兄弟卻有樹立終是不歸附他嘗問和仲先世遺文因曰先公議論好但只是行不得和仲曰聞之先人所以謂之好議論政以其可以措諸行事何故卻行不得答曰公不知便是六經也有說得行不得處此是這老子由中之言看來聖賢說話他只將做一件好底物事安頓在那裏又曰此老千鬼百怪如不樂這人貶竄將去卻與他通殷勤不絶一日忽招和仲飯意極拳拳比其還家則臺章已下又送白金為贐按程子山諸公在貶所俱有啓事謝其存問者皆此類也如欲論去之人章疏多是自為以授言者做得甚好傅安道諸公往往認得如見彈洪慶善章曰此秦老筆也儒用德明録云秦相曾語胡和仲云先丈議論固好然行不得和仲問既是議論好何故不可行秦云仲尼垂世立教且說箇道理如此以示人如何便一一行得一日又語和仲云柳下惠降志辱身如何和仲對云降志辱身是下惠之和未若夷齊不降其志不辱其身秦曰不然也有合降志時合辱身時先生曰秦老自再相後每事便如此陳剛云向見東萊說秦老語和仲云先丈說敬以直內義以方外一句是一句不是我只是敬以直內賀孫録云胡寧為太常丞上令録遺文看寧遂告兄寅寅繕寫表進更以副本獻秦檜檜看畢即謂和仲曰都使不得和仲曰某聞之先人皆是可用之語丞相如何說使不得曰論語孟子許多說話那曾是盡使得只是也要後人知得有許多說話又一日問和仲曰賢道敬以直內義以方外是兩事是一事和仲曰聞之先人這只是一事檜曰賢後生不識某看來只是上一句用得和仲曰這是聖人兩句法語丞相如何道只一句用得檜曰某平生所行只上一句賢說須著下一句賢且試方看聖賢法言無一非實用檜只作好說話看過平生如此宜其誤國也可學録云檜召五峰兄弟五峰辭甚力和仲言頗孫遂再召赴闕檜問來時仁仲何言曰家兄令稟丞相善類久廢民力久困檜不答問和仲曰敬以直內只行上一句下一句只與賢行只曰文定文字甚好和仲進此文字以副本納之檜云只是行不得和仲再三問既好何故行不得檜云孔孟言語亦有行不得寫在策上只是且教人知得此又揚録云太上一日問胡和仲文定春秋外更有甚文字胡曰只有幾卷家集上曰可進來遂進之後秦檜問胡曰先丈文字進了連說先丈好議論三四句後曰只是一句也行不得胡曰議論好時只是謂好行相公既說好如何行一句不得曰不特先丈文字如此聖賢議論亦豈盡可行只是且教世間人知得有這一般道理又燾録云或問信而好古曰而今人多不好古皆是他不信因舉秦會之嘗與胡和仲說如先公解春秋儘好議論只是無一句行得對曰惟其可行方是議論若不可行則成甚議論秦曰且如周公孔子之言那有一句行得只是說得好所以存留在與後人看又璘録云檜召胡和仲來問敬以直內義以方外和仲之父子兄弟尋常以為此兩句只是一事檜云不然敬以直內可用某逐日受用便是義以方外不可行和仲疑之檜云公試行看和仲上殿光堯索文定公文集因以副本呈檜云先公議論甚好但一句也行不得且如孔孟許多說話也只是存一箇好話令人知有此好話耳決不可行又問和仲不降其志不辱其身如何和仲既解以對檜云合降志須著降合辱身須著辱和仲以太常丞權郎檜忽請喫酒五杯歸而章疏下矣檜之不情如此秦檜聞富季申言深有感歸出謂富曰元來作相當如此後來所為皆得之於此不知其說然大率保位之術耳揚秦檜初罷相出在某處與客握手夜語庭中客偶說及富公事秦忽掉手入內客莫知其故久之方出再三謝客云荷見教客亦莫知所謂扣問乃答云處相位元來是不當起去是渠悔出偶投其機故發露如此趙丞相初亦不喜之及其再入全然若無能趙便謂其收斂不做一聲遂一向不疑之亦不知其如此胡康侯初甚喜之於家問中云秦會之歸自虜中若得執政必大可觀康侯全不見得後來事亦是知人不明又云秦會之是有骨力惜其用之錯或問他何故不就攻戰上做曰他是見得這一邊難成功兼察得高宗意向亦不決為戰討計賀孫問富直柔握手之語不審何說曰往往只是說富公後來去朝廷使河北被人讒間等事秦老聞之忽入去久之不出富怪之後出云元來做宰相是不可去秦既再入遂譖魏公於趙公又因唐暉等二事傾去趙相一向自做更不肯去胡和仲嘗勸秦云相公當國日久中外小康宜請老以順盈虛消息之理秦曰此事不然我當時做這事尚拖泥帶水不曾了得問何事未了曰是未取得他中原曰若取中原必須用兵相公是主和議者曰我從來固不主用兵然虜自衰亂不待用兵自可取後來楊安止亦有劄子勸秦相去位秦相大率如對和仲者於是不樂安止遂坐此去國不然安止亦順做從官先生曰不曉他要取中原之意後來見陳國壽糴說秦老初欲以此事付國壽擬除它廬帥陳云荷朝廷任使帥長沙廣西皆內地若邊帥當擇才某於軍旅事素不習恐敗事其議遂已竊意秦老只是要兵柄入手此事做未成若兵柄在手後來必大段作怪德明秦太師與呂並相呂出甚所在秦一時換了臺諫人物呂聞之不平有客告之云其黨魁乃胡文定可逐去則秦不足慮呂如其言歸而諷臺諫論之秦爭於上遂併論秦高宗欲罷其相令人行詞當時秦所引皆是好人而立朝無過人皆不平行詞者遂求御批以疏其罪高宗遂批與之大略云其未相時說作相數月可以致治既相皆無所建明後來秦再相數年之後卻奏過以為當初無過為人所讒遂行下詞臣家索御批既得之則以納於高宗其無禮不臣如此可學録云秦會之初罷相高宗親批付綦叔厚草麻御書藏綦氏及秦氣焰盛自廣倅移某人知台州於其家索出而納於高宗某人潮州人又當時史館有宰臣拜罷録已載此罷相時事亦有士大夫録得此書秦已改史館之書了又行下收民間所藏者德明揚録云秦前罷相時有御批其罪狀與翰林學士綦密禮行詞後再相令人於綦家搜索之自於上前納了兄秦楚材作翰林之類官上以檜故亦眷其人檜亦忌而出之因話及秦丞相問當時諸公皆入虜渠何以全家得還曰此甚可疑當和親時王倫自虜至欲高宗屈膝中外憤怒秦老出有人榜云秦相公是細作揚録云都下甚憤似有欲殺之之意一日在甚寺中聖節一樹上貼一榜子云秦相公是細作是時陳應之正同到廟堂問和親之故秦云某意無他但人主有六十歲老親在遠須要取來相聚因顧左右令取國書與應之看乃是詔書秦捲其前後只見中間云不求而得可謂大恩蓋指河南也先生言畢云此事當記取恐久後無人知之者當時虜中諸將爭權廢劉豫以河南歸我乃是獺辣獺辣既誅兀朮用事又欲背約是時命樓照簽書密院為宣撫辟鄭亨仲又一人記不全為屬至蜀見吳玠玠曰某有一策昔失陝西五路最為要害今虜人以河南歸我而陝西在其中可謂失策徐必悔悟今不若移近蜀之兵進而據之則猶庶幾稍遲則不及事矣樓云此策固善但某不敢專須奏朝廷亨仲因力奏之即莫奏未數日虜兵已下陝西矣當時下河南止用單使有一相識姓名失記為蔡州平輿尉一日弓手報天使至縣尉當出迎曰天使何人曰北使曰我南朝官不可拜北使曰如此則官人可歸矣乃為辦兩車并骨肉送之入南境既而使到縣官皆投拜蓋本北人未換者可學僩録云胡明仲與秦檜爭和議於朝堂秦無語但取金人所答國書以手急卷箝其兩頭止留中間一行示明仲云不求而得可謂大恩字如掌大時虜人初以河南之地歸我也先生親見致堂說揚録云秦老講和後曾取得河南地關中五路地連河南盡得之時令樓照往守鄭剛中在幕吳玠云今與之講和極是云云今得五路須急發兵守之某守某處令誰守某處要急為之虜人只是不曾思量恐覺便來取當時他人亦以為常惟鄭剛中擊節稱是因言鄭才識高云云樓曰某來時不曾得旨須著入文字鄭曰可急入文字未幾虜人取去矣秦檜倡和議以誤國挾虜勢以邀君終使彝倫斁壞遺親後君此其罪之大者至於戮及元老賊害忠良攘人之功以為己有又不與也若海李泰發參政在上前與秦相爭論甚力每語侵秦相皆不應及李公奏事畢秦徐曰李光無人臣之禮上始怒德明秦檜初主和議時舉朝無人從之遂奏太上曰乞召李光來問如何遂召至未對時全不得見人不知如何與秦檜相見秦待之酒行如誤言云滿斟參政酒時光為尚書之類光聞參政之言秦遂與論和議如何光贊之次日對陳和議之是和議遂定遂參政光性剛雖暫屈終是不甘遂與秦檜謅秦所判文光取塗改之後為秦治過海歸死揚章貢軍叛上不知一日問如何秦曰軍人們間相爭之類已令人去撫定矣問是誰說上初不言詰之乃曰兒子說遂尋別事罰俸三月不支揚施全刺秦檜或謂嶽侯舊卒非是蓋舉世無忠義這些正義忽然自他身上發出來秦檜引問之曰你莫是心風否曰我不是心風舉天下都要去殺番人你獨不肯殺番人我便要殺你賀孫胡邦衡作書記當時事其序云有張扶者請檜乘副車呂願中作秦城王氣圖他當初拜相罷去極好再來卻曰前日但知道行則留不行則去今乃知不可去漸漸便到此田地及至極處亦顧其家曹操下令云云是也問霍光先生曰霍光無此心只是弒許后一事不發覺此大謬又問秦氏科第先生曰曾與汪端明說此是指鹿為馬汪丈云只是無見識可學璘録云秦太師專政時張扶或云張柄請乘副車呂願中作秦城王氣詩以獻檜皆受不辭呂知靜江府府有驛名秦城忽傳言有王氣呂作詩與僚屬和之成冊以獻此見胡邦衡所作紹興間被貶逐人事實序熊子復欲作一書記其事從其子借之或云非邦衡所作又曰私科舉或云恐是愚弄天下之人指鹿為馬之意汪聖錫云恐不如此只愚騃耳初時人以伊周譽檜末後人以舜禹譽檜檜亦受之大抵久執權柄與人結怨多才欲放下恐人害己似執守不放其初未必有邪心到後來漸漸生出皆是鄙夫患失之謀耳問張魏公行狀秦相叛逆事如何曰當時煞有士大夫獻謀者亦有九錫之議矣吳曾輩是也振秦檜在相時執政皆用昏庸無能者如汪渤章夏董德元皆一類人太上一日問處州兵反事秦久未對章夏在後恐秦忘之因對一句後秦語之曰檜不能對時參政卻好對檜未對參政何故便如此即時逐去之興化林大鼐為士人時對策言自宣政以來人無節義後得秦檜於虜中乞立趙氏節義可取時秦被黜間居後秦知之大擢用一日在經筵因講得甚稱上意上喜賜一帶秦逐出之揚秦檜每有所欲為事諷令臺諫知後只令林一飛輩往論之要去一人時只云劾某人去臺諫便著尋事上之臺諫亦嘗使人在左右探其意才得之即上文字太上只是慮虜人故任之如此及秦死遂召陳誠之沈該万俟镨金安節諸人以誠之輩嘗為奉使沈嘗以贓罷官後以上書言講和進用皆秦黨也秦死封王禮數之類皆得又一面行遣昔時諫臺為皆附會權臣揚秦檜舊作好文時亦多有好相識晚年都不與他一切壞了一日謂和仲曰舊時亦煞有好相識後皆不濟事近來卻有幾人好如曹泳湯思退輩皆其晚年所信用者曹凶險狡獪之甚秦之妻兒親黨皆為其所離間秦信愛之如子然皆在其籠絡中矣決定後來推秦作一大惡事旋害了秦而自為之秦死其妻兒銜之泣訴於太上謂秦時多事皆曹為之遂編直海外而死曹妻亦自狡要令一人軍將等去取曹喪恐其不從先教一婢子云你待我使其人不從你便倒地作侍郎語云平日受我多少恩你若不從我即有禍及汝及使其人果有不肯從意婢遂倒地如其言其人拜告即請行蓋曹平日詭怪家習之也然曹有才可用知紹興日當聖節吏人呈年例店家借紫絹結甚物事曹云不必借看每年軍人緋紫衫要幾多絹遂檢籍所用與此所用不爭多遂取出染結了卻將染緋紫遂不擾知臨安日當拜郊郊壇要若干土朱刷年例先出錢買朱吏人呈曹曰不要近郊壇有赤黃土先令人將炭若干斤放彼處臨期不遠令諸鐵匠於彼處放炭如何燒土以膠和塗其壇遂省錢多少天下事無不理會得只是凶惡可畏甚戚里又秦檜之子娶其兄女揚秦檜己亥年冬死未死前一二年間作一二件無狀底事起獄斷送士大夫之類近死兩年朝不保暮日日起獄凶焰張大可畏黃豐知興化日有人有一弟因爭兄財不與遂以其兄嘗編録得胡銓上書言秦檜緊要數語告以為兄罵秦太師官司亦以尋常不曾為理會時有一囚與爭財弟同獄問得其首尾其囚配卒不記何州一日福州帥張某過其人直訴之於帥為有人罵太師黃不為理會帥上其事於秦即時攝取黃下大理并其妻孥皆繫之遂勘閩中何處州海島上有林二十三娘適度甚物事追之尉即往海上收一二老婦女林幾娘皆有之俱無林二十三娘鄉老云此中只有一廟是林二十三娘廟遂令鄉老供文字去且休了黃不曾有一分事亦追官勒停揚殺嶽飛范同謀也胡銓上書言秦檜檜怒甚問范如何行遣范曰只莫採半年便冷了若重行遣適成孺子之名秦甚畏范後出之揚王次翁河東人曾做甚官已致仕秦檜召來作臺官受檜風旨治善類自此人始揚王循友彥霖家子孫知建康辭秦而往問有何委秦曰亦無事只有一親戚在彼秦之甥極不肖恐到庭下為痛治及到任其人果犯來與痛治喫棒之類其人母骨肉訴之秦秦大怒即尋一事加於王王得罪妻孥皆配了婦女皆為軍人所娶揚建人黃公達作太守有贓提領韓美成績家子弟欲治之黃已去告之朝士朝士曰公能作一件不惟可以解此又可以得美官但恐公尚有所惜不肯為耳黃問如何曰公上殿能以劄子言曾天隱李彌遜之徒不主和議宜罪之黃即為之秦檜大喜即擢為察院韓徑使人守察院門云黃察院有公事未了要去理會秦見不是道理遂罷黃揚興化一傅丈云秦今諸子孫皆其夫人王家人林一飛乃秦作教官時婢所生夫人不容與同官林家人養秦後欲取歸未遂而死後其黨人欲為料理其夫人自陳云妾有幾子林非是林遂貶何地林死有子今皆無祿乃檜親孫也林居興化揚秦太師死高宗告楊郡王云朕今日始免得這膝褲中帶匕首乃知高宗平日常防秦之為逆但到這田地匕首也如何使得秦在虜中知虜人已厭兵歸又見高宗亦厭兵心知和議必可成所以力主和議獺辣主事始定和議至次年兀朮殺獺辣而畔盟至順昌為劉信叔所敗至楚州又為糧絶兵師離散方得成和若不喫這兩著亦恐未便成和太后自虜歸云某年月日虜人待之禮數有加至某年月又加禮又某年月又甚厚今以年月考之皆是我師克捷之時故虜懼而加禮禮極厚乃是順昌之捷高宗初見秦能擔當得和議遂悉以國柄付之被他入手了高宗更收不上高宗所惡之人秦引而用之高宗亦無如之何高宗所欲用之人秦皆擯去之舉朝無非秦之人高宗更動不得蔡京們著數高治元祐黨只一章疏便盡行遣了秦檜死有論其黨者不能如此只管今日說兩箇明日又說兩箇不能得了有薦張魏公者高宗云朕寧亡國不用張浚問秦相既死如何又卻不更張復和親曰自是高宗不肯當渠死後乃用沈該万俟镨魏道弼又有一人此數人皆是當時說和親者中外既知上意未幾又下詔云和議出於朕意故相秦檜只是贊成今檜既死聞中外頗多異論不可不戒約甚沮人心當初有一二件事皆不是如檜家既保全而專治其黨士大夫遭檜貶竄者敘復甚緩渠死得甚好若更在甚可畏當時已欲殺趙丞相之家既加以反逆則牽聯甚衆見說有三十餘家皆當坐中外寒心高宗亦甚厭惡之但無如之何問所以至於如此者何故曰伊川云人主致危亡之道非一而逸欲為甚渠當初一面安排作太平調度以奉高宗陰奪其權又挾虜勢以為重可學秦老既死中外望治在上人不主張卻用一等人物當時理會秦氏諸公又宣諭止了當時如張子韶范仲達之流人已畏之但前輩亦多已死上借問魏可卻是後來因逆亮起方少驚懼用人才籍溪輪對乞用張魏公劉信叔王龜齡查元章又一人繼之時有文集謂之四賢集可學好底氣數常守那不好底氣數不過且如秦檜在相位十一二年被他手殺了幾箇人又殺了許多人皆是他那不好底氣數到長了秦老是上大夫之小人曹泳是市井之小人揚
