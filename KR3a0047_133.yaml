body:
  text: 朱子語類卷第一百三十三本朝七盜賊蜀中有趙教授者因二蘇斥逐以此搖動人心遂反當時也自響應但未幾而哲宗上仙事體皆變了所以做得來也沒巴鼻蜀人大故強悍易反成都嘗有一通判要反已自與府中都吏客將皆有謀了不知如何一婢走出來告云日逐有官員來議事帥因下簾令辨府中人則皆每日所見合謀者其事遂敗義剛方臘起向薌林時為小官言今無策只有起劉元城陳了翁作相則心不戰而自平揚伊川嘗説今人都柔了蓋自祖宗以來多尚寬仁不曾用大利之屬由此人皆柔軟四方無盜賊後來靖康時多盜蓋虜難方急朝廷無暇治之耳且如紹聖之後山東河北連年大飢而盜作也皆隨即仆滅但見長上云若更遲四五年虜人不來盜亦難禁止蓋是飢荒極了義剛方臘之亂愚民望風響應其間聚黨劫掠者皆假竊臘之名字人人曰方臘來矣所至瓦解臘之婦紅裝盛飾如后妃之象以鏡置胸懷間就日中行則光采爛然競傳以為祥瑞儒用論及楊公云當時也無甚大賊不過只是盜賊而已如李成之徒也只是劫掠若無討則不過自食人皆不是做事底義剛建賊范汝為本無技能為盜亦非其本心其叔積中卻素有包藏陰結徒黨置兵器滿倉箱中其徒勸之舉事每每猶豫若有所待有不快於中者輒火十數家且殺人因劫之為首其人終不肯但曰時未可我決不能為汝輩可別推一人為主衆遂擁戴汝為勢乃猖獗建之士如歐陽穎士施逵吳琮者善文章多材藝或已登科皆望風往從之置偽官日以蕭曹房杜自相標置以漢祖唐宗頌其功德汝為愚人偃然當之朝廷遣官軍來平賊時秋稼已熟賊聞官軍且至放水灌田又以禾穟相結連已而決熒去水官軍至不諳其山川道路賊縱之入山山路險隘騎卒不能前賊覺官軍已疲困乃出平原以誘官軍官軍出山爭趨田中既為結穟牽絆又陷泥淖賊因四面鏖擊之官軍大敗乘勝據建州三年纍降纍叛竟遣韓世忠來方能勦除之汝為自縊尸為衆所焚弗獲初建人陸棠謝尚有鄉曲之譽陸乃龜山壻為士人時極端重頗似有德器者賊聲言使二人來招我吾降矣朝廷遣之既而賊有二心乃拘繫久之歐陽輩又説之日益切因循遂為賊用賊敗歐陽穎士吳琮先誅死陸謝施逵以檻車送行在至中途逵謂二人曰吾輩至必死與其戮於市朝且極痛楚曷若早自裁二人曰何可得自死逵曰易爾乃密令人為藥三元小大形色俱相似一乃無毒者逵取無毒者服之餘二人服即死逵既至行在歸罪於二人理官無所考證迄從末減但編置湖南某州中途又逃去或為道人或為行者或為人典庫藏後迤單望淮去有喜其材者以女妻之住數月復北走降虜改名宜生登偽科後擢用甚峻逆亮將犯淮時猶為之奉使比來時黃尚書通老為館伴黃幼與之同筆硯雅相好至是不欲見其人以疾辭遂改召張子公宜生猶問子公通老安在子公以實對欲扣虜中事不可得因登六和塔子公領客宜生先登亟問之曰奉使得無首丘之念乎宜生曰必來言方終而介使至宜生色為之變既歸即為虜所誅龍泉尉施慶之乃其族也嘗舉宜生十數詩內入使時題都亭驛詩云江梅的礫未全開老倦無心上將臺人在江南望江北斷鴻聲裏送潮來又按蕭間集注宜生字朋望建安浦城人宣政間為潁川教授與宗室趙德麟友善後仕劉豫豫廢歸其國歷南臺郎中刺隰深二州召為禮侍纍遷侍講道號三住道人儒用一士人見龜山容貌甚端莊坐不動每來必如是以此喜之一日引入書院久坐忽報有客龜山出接士人獨坐凝然不動如故宅眷壁外窺之大段驚異士人別去家人以實告皆稱其如此好人愈為所取後以女妻之乃陸棠也及范汝為作亂棠入其黨見矯情飾貌之難信也過李楫寇廣西出榜約不收民稅十年故從叛者如雲稱之為李王反謂官兵為賊以此知今日取民太重深是不便廣瀘州之事朝廷既是命委清強官體究帥司若有謀只那體究官便是捉賊官且如揀差體究官帥司祇密著一不下司文字與之令到地頭體究隨宜便與處分若體究官到彼他見朝廷之意未十分來煎迫亦須開門放入但只與之言今日之事既是如此若大兵四合勦滅亦不難今亦未能如是但你這頭首人合當出來陳説始初是如何及其既至則收而梟之事即定矣若遽然進兵掩捕則事勢須激城中之人不可保而州郡必且殘破道夫夷狄西夏李繼遷本夷狄姓托跋後賜姓李五代時有其地國初世襲太宗欲取之遂召繼遷歸京師以別人代之一日繼遷逃歸朝廷費無限心力不能得遂以其兄繼隆知夏州令招之其兄遂陰與之合每奏朝廷謂已無事後朝廷又召其兄歸繼遷遂復有其地靈州屬朝廷又在西夏之外為西夏截斷又以兵圖之使不得通朝廷靈州絶遠難救援又其地渾沙無水不可掘每兵行則用水以自隨渴殺了多少人行其沙地上皆動陷了數百人馬只見不在太宗心欲棄之而不言時參政張洎南唐亡國之臣專以諂敗其主歸又以諂遭遇揣知上意即進可棄之説上問宰相呂端又令各進説端言如此則各有説非僉議合謀之意洎即詆端避事端言洎不過揣合上意後洎即進説端不曾進上謂洎揣合果如端言封還其説朝廷遂詔靈州守臣出兵與接漸漸離去棄之張齊賢以為不可如此則被夏人掩殺須是與之戰勝則得之不勝則漸漸引去方議未定忽報靈州已為夏人所破矣因而為彼所有後來朝廷費了幾多氣力去取韓范輩用兵後徐禧永樂之敗是也張魏公舊官於陝西嘗登高望見西夏界外則西夏土地亦不甚闊如何強盛被他守得如此好祖宗時兵每出輒敗今依舊五州全又更取過那邊去了土地合闊矣只見強盛虜人亦不奈何當時亦曾敗於彼揚因論西夏事曰當時事不可曉看來韓范亦無素定基本只是逐旋做出且如當時覆軍敗將這下方且失利他之勢甚張忽然自來納款求和這全不可曉後來不久元昊遂死不知他不死數年又必有甚姦謀大未可知且如當時朝廷必欲他稱臣遂使契丹號令之契丹方自以為功朝廷正未有所處又卻二國自相侵凌不爾則當時又須費力大抵西人勇健喜鬥三五年必一次為邊害本朝韓范張魏公諸人他只是一箇秀才於這般事也不大段會只是被他忠義正當故做得恁地道夫或問范文正公經理西事看得多是收拾人才曰然如滕子京孫元規之徒素無行節范公皆羅致之幕下後犯法又極力救解之如劉滬張亢亦然蓋此等人是有才底做事時須要他用但要會用得他又云范公嘗立一軍為龍猛軍皆是招收前後作過黥配底人後來甚得其用時人目范公為龍猛指揮使又曰方范公起用事時軍政全無統紀從頭與他整頓一番其後卻只務經理內地養威持重專行淺攻之策以為得寸則吾之寸得尺則吾之尺卒以此牽制夏人遣使請和儒用問本朝建國何故不都關中曰前代所以都關中者以黃河左右旋繞所謂臨不測之淵是也近東獨有函谷關一路通山東故可據以為險又關中之山皆自蜀漢而來至長安而盡池録作關中之山皆自西而東若橫山之險乃山之極高處橫山皆黃石山不生草木本朝則自橫山以北盡為西夏所有山河之固與吾共之反據高以臨我是以不可都也神宗鋭意欲取橫山蓋得橫山則可據高以臨彼然取橫山之要又在永樂故永樂之城夏人以死爭之我師大敗神宗聞喪師大慟聖躬由是不豫按編年重和元年童貫命种師道劉延慶等取夏國求和等寨大敗夏人而還六月夏人納款初夏人恃橫山諸險以抗中國慶曆中王嗣宗范仲淹建議取之會元昊納款而止元豐中李憲建議又會王師失利神宗厭兵不克行貫嘗從憲得其規摹政和初議進築至是十餘年遂得橫山之地夏人失援故納款然國家是時已建下燕之策益以多故其後西夏與女真人乙巳冬女真圍太原夏人犯河外則是橫山之取有以結怨於彼也又曰神宗初即位富韓公為相問為治之要富公曰須是二十年不説著用兵二字此一句便與神宗意不合已而擢用王介甫首以用兵等説稱上旨君臣相得甚歡時建昌軍司戶王韶上平戎策介甫力薦之初為秦鳳路經略司機宜後知通遠軍遂一戰而復熙河捷書聞上大喜解白玉帶以賜介甫賞其知人又加韶為龍圖閣侍待制以為熙河帥熙河本鎮洮軍因復其地改為熙州只是廣漠之鄉有之不加益無之不加損狃於一勝之後廟論一意主於用兵三敗至於永樂極矣永樂之敗徐禧死之禧師川之父黃魯直之妹夫也能文章好談兵也有進策行於世文字甚好二蘇之文未出學者爭傳誦之儒用神宗其初要結高麗去共攻契丹高麗如何去得契丹自是大國高麗朝貢於彼如何敢去犯他義剛人主好勤遠略底也是無意思當初高麗遣使來朝廷只就他使者以禮答遣之神宗卻要別差兩使去緣他那裏知文故兩使皆侍從皆是文人高麗自是臣屬之國如何比得契丹契丹自是敵國義剛嘗見韓無咎説高麗入貢時神宗喻其進先秦古書及進來內有六經不曾焚者神宗喜即欲頒行天下王介甫恐壞他新經遂奏云真偽未可知萬一刊行後為他所欺豈不傳笑夷夏神宗遂止本亦不傳以某觀之未必有是事蓋招徠高麗時介甫已不在相位且神宗是甚次第剛明設使所進真有契於上心亦豈介甫所能止之又記文昌雜録中説高麗所進孝經門上下一二句記未真緯經只是讖緯之書必無進先秦古書之事但嘗聞尤延之云孟子仁也者人也章下高麗本云義也者宜也禮也者履也智也者知也信也者實也合而言之道也此説近是儒用或問高麗風俗好曰終帶蠻夷之風後來遣子弟入辟雍及第而歸者甚多嘗見先人同年小録中有賓貢者即其所貢之士也賓貢二字更須訂證當時宣賜幣帛之外又賜介甫新經三十本盛以黑函黃帕其外得者皆寶藏之儒用國家方與女真和時高麗遣使來求近上醫師二人上召老醫擇二人遣往至則日夕厚禮皆不問醫而多問禁中事二醫怪而問之高麗主曰我有緊密事欲達宋皇恐所遣使不能密故欲得宋皇親近之人而分付之所以問公禁中事者欲以見公是所親信耳二人因問之高麗主曰聞宋皇欲與女真和夾攻契丹此非良策蓋我國與女真陸路相通常使人察之女真不是好人勝契丹後必及宋而吾國亦不能自存此合當思所以備之二人問所以備之之説曰女真作一陳法甚好我今思得一法勝之因令觀教其女真陳蓋如拐子馬之類二人歸奏上怒召老醫而責之其一人出門吐血後不死其一人歸即死義剛儒用録云先生嘗見玉山汪丈云得之御史臺一老吏方徽宗通好女真為滅遼之約高麗有所聞欲納忠誠不可得遂托病遣使求醫於本朝且願得供奉內庭上所親信者遂擇二國醫以往至則館御供帳其禮甚厚但經月無引見之音二醫怪之私有請於館伴者一日得旨入見引至內庭盡屏左右諭二醫曰寡人非病也顧有誠款願效於上國欲得附卿奏之幸密以聞二醫許諾則曰女真人面獸心貪婪如豺狼安可與之共事今不早圖之後悔無及聞其訓練國人皆為精兵纍歲有事於燕每戰轉勝小國得一二陳法可與之角如欲得之敢不唯命諭畢方厚為之禮而遣之二醫歸具奏本末徽宗聞之滋不樂且懼其語泄丞相童蔡輩乃為食於家召二醫以食之食畢而斃高麗與女真相接不被女真所滅者多是有術以制之高麗要五十餘主今此方為權臣所篡而易姓義剛又一條云高麗得四十主今已易姓姓王金虜舊巢在會寧府四時遷徙無常春則往鴨緑江獵夏則往一山忘其名極冷避暑秋亦往一山如何冬往一山射虎今都燕山矣揚燕山之北古有大山嶺為隔但有一路傍險水後來石晉以與耶律則其險路在其度內矣揚燕山是古幽州石晉割賂契丹契丹既為金人所滅其種之傑者遂來據燕其主死其妻蕭太后主之童貫蔡攸往取之番番兵敗後金人自取之朝廷求之遂盡載數州之物婦女之類而去更索厚資賣之朝廷以其所索之物與之遂得數州空地朝廷空內資以守之郭藥師者燕將初歸本朝金人來取燕遂歸金郭只留守燕及本朝得燕郭又迎降金人一日大節冬至之類官吏都集賀郭郭留飲盡取各人家屬之類盡來飲少頃金人兵至無一人得脫者自此遂入寇矣朝廷與大遼結好百十年矣一日忽與金人約共攻遼而本朝無一人往是時方十三起童貫自這邊來了遂不及往既失約後取燕又是金人金人見本朝屢敗兵於燕遂有入寇之心是時相王黼主其事童貫主兵蔡攸副之蔡京不主作詩送其子云百年信約宜堅守六月師徒早罷休京作事都作兩下取燕有功則其子在無功則渠不曾主又有一子絛上書言其父不是聞亦是其父之謀也金寇初圍城時京云有一策可使虜人一兵不反朝廷使人問之云見上方可言寇去人問之云決汴河可以灌之後寇再來未至時已決之矣東南數千里渺然巨浸西北遂為寇所據四方音問一信不通以此故也揚粘罕圍太原一年有餘姚師古輩皆為其戰退遂破太原張孝純守太原一年多少辛苦及城破一死不得遂降後為劉豫處官太原既破遂一直圍京城揚李若水勸欽宗出李謂虜人可信醉後枕人睡熟以此信之揚金人初起時初未立將臨發兵召集庭下問之有能言其策之善者即授以將使往及成功而歸又集庭下問衆人而賞之金幾多衆人言未得又加之賞罰如此分明安得不成事揚虜人有一謀時聚諸尊長於一屋內全不言只用一物畫地謀了便各去做如其事難決便出野外無人處去商量揚兀朮征蒙死於道有三策獻於虜主一則以汴京立淵聖欲招致江南之人二則以近上宗室守邊三則講和曰若行前二者也被他攪又曰道君有子四十人只放二十人歸來這二十人親王也要物事供他燾虜至紹興守臣李鄴降虜及駕至明州張俊大殺一番駕泛海虜人走明州人今尚怨張俊不乘時殺去可大勝遂休了辛巳逆亮來時一隊自海中來李寶自膠西殺敗李鄴既降與虜酋並馬出有一衛士赴駕不及尚留紹興見之以一大方磚逐打其酋幾中因被害死之今立一廟在其所賜旌忠額後人皆於其廟賣酒某至一切逐去之説與王書令崇奉之先生又云某在時更為大其廟其衛士姓唐揚劉豫來寇朝廷只管謀避計李伯紀云自南京退維揚遂失河東北自維揚退金陵遂失京東西一番退一番失設若是金人來奈熱不得亦著去不能久留今又只是劉豫只是這邊人渠得一邑守一邑得一郡守一郡如何只管遠避揚逆亮入寇時劉信叔在揚州亮欲至劉盡焚城外居屋盡用石灰白了城多寫完顏亮死於此字亮多忌見而惡之遂居龜山人多不可容必致變果死滅揚王仲衡云虜中大臣有過時用紫茸觀鋪地令伏其上杖之嘗有一宰相一駙馬受杖駙馬因此悒怏而死非恨其杖也恨不得紫茸觀也又曰嘗有一官人出有一吏人來至其花園中背上黃袱袱得一束文字某問何文字曰史書也那官人伊是史官某問可借否曰不妨遂開看內有一段云詔曰宰相姓名某謀南伐若以為是合盡心以贊其謀以為不是合盡忠極力以諫之不可依違以敗成算今某人略略諫之可杖六十揚楊割大師阿骨打楊割之子吳乞買阿骨打之弟完顏亶乞買之子完顏亮完顏雍葛王璟斡離不斡離嗢兀朮皆阿骨兄弟也阿骨打既死諸酋立其弟吳乞買乞買死國人欲立阿骨打之子暗版孛訖烈此五字不知如何記不得暗版孛訖烈名宗盤虜中謂大官人也暗版者大也孛訖者官人也大官人者即所謂太子也諸酋不肯復立乞買之子完顏亶而以暗版孛訖烈為相暗版孛訖烈實懷怨望云己當為主亶覺之遂殺宗盤一日遂盡誅二十七王悟室亦被誅孛訖烈亦在其中二十七王皆其黨與兄弟也連蔓宗族親舊皆殺了亶又為亮所弒自立葛王先名褎後以其字似衰字遂改名雍亶亮皆兄弟也亶之父行名皆從宗兄弟名皆從上粘罕亦阿骨打族人嘗為相初入中國破京師斡離不粘罕也斡離不早死斡離嗢後亦早死粘罕後來勸立劉豫內則蕭慶主其事蕭慶用事久及兀朮撻懶廢劉豫而誅蕭慶粘罕爭之不能得亶遂忌之粘罕悒怏而死後來獨兀朮得後死初虜入中國問何姓最大中原人答以王姓最大虜人呼王為完顏自是王者之後遂姓完顏又問虜人今漸衰替曰卒急倒他未得被他立得箇頭勢大若十分中做得一兩分事便足以扶持振起除是大無道殘暴酷虐則不知如何若是如此做將去無大段殘暴之事恐卒消磨他未得蓋其勢易以振起也卓論及北虜事當初起時如山林虎豹縱於原野豈是人伯謨曰當時曲端獻策不出十年彼必以酒色死方可取先生曰阿骨打才得幽州便死曾見有人論虜人無事權在其主用兵權在將故虜主不用兵此説是大抵當初出時是夷狄及志得意滿與我何異因與某人欲請邊郡自效先生曰易曰知進退存亡而不失其正者其惟聖人乎上之人不欲用兵而我自欲為之是不識時問恢復之事多始勤終怠如何曰只以私意為之不以復讎為念可學葛王大故會他所以要和親者蓋恐用兵時諸將執兵權或得要己不如和親可坐享萬乘之樂其初雖是利於用兵到後來惟恐我與他冢殺義剛葛王便是會底他立得年號也強謂之大定義剛葛王懲逆亮之敗一向以仁政自居先生喟然歎曰某要見復中原今老矣不及見矣或者説葛王在位專行仁政中原之人呼他為小堯舜曰他能尊行堯舜之道要做大堯舜也由他又曰他豈變夷狄之風恐只是天資高偶合仁政耳友仁南渡之後説復讎者惟胡氏父子説得無病其餘並是半上落下説雖魏公要用兵其實亦不能明大義所以高宗只以區區成敗進退之到秦檜主和虜歸河南上下欣然便只説得地之美更不説不義若無范伯達如圭則陵寢一向忘之矣魏公時謫永州亦入文字只説莫與之和如何感動魏公傾五路兵為富平之敗又潰於淮上若無氣力也是做不得事韓魏公煞是箇人物然亦適是人事恰做得若更向上且怕難擔當賀孫論恢復檜死上即位正大有為之大機會揚邵弘取泗州胡昉取海州邵公人腳家胡角場牙人唐鄧汝三州皆官軍取之王師駸駸到南京矣而諸將虜掠女之類不可言吳玠更要人錢虜騎來走歸矣虜人一番圍泗洲弘力扼之後救兵至方解揚泗海唐鄧四州皆可取西京中原之地逆亮來時用兵僅取得此四州而湯思退無故與之惜哉揚晉人下吳卻是已得蜀從蜀一造船直抵南岸周世宗只圖江南是時襄漢蜀中別有主所以屯淮上開河抵江今蜀中出兵可以入武關從襄漢樊鄧可以搗汝洛由淮上可以取徐州辛巳間官軍已奪宿州國家若大舉只用十五萬精兵德明江州皇甫將名倜曾領兵守信陽作山寨三年云由其山接金房諸山而出取西京中原云國家用事某願當此一路云都不用國家兵糧沿路人皆自願為兵且與糧其人忠醇能同甘苦得士心不附內貴然亦未必能以律御兵而戰也揚陳問復讎之義禮記疏云穀梁春秋許百世復讎又某書庶人許五世復讎又云國君許九世復讎又某人引魯桓公為齊襄公所殺其子莊公與齊桓公會盟春秋不譏自桓至定公九世孔子相定公會齊侯於夾谷是九世不復讎也此説如何曰謂復百世之讎者是亂説許五世復讎者謂親親之恩欲至五世而斬也春秋許九世復讎與春秋不譏春秋美之之事皆是解春秋者亂説春秋何嘗説不譏與美他來聖人作春秋不過直書其事美惡人自見後世言春秋者動引譏美為言不知他何從見聖人譏美之意又曰事也多樣國君復讎之事又不同僩云如本朝夷狄之禍雖百世復之可也曰這事難説久之曰凡事貴謀始也要及早乘勢做才放冷了便做不得如魯莊公之事他親見齊襄公殺其父既不能復又親與之宴會又與之主婚築王姬之館於東門之外使周天子之女去嫁他所為如此豈特不能復而已既親與讎人如此如何更責他報齊桓公況更欲責定公夾谷之會爭那裏去見讎在面前不曾報得更欲報之於其子若孫非惟事有所不可也自沒氣勢無意思了又況齊桓公率諸侯尊周室以義而舉莊公雖欲不赴其盟會豈可得哉事又當權箇時勢義理輕重若桓公不是尊王室無事自來召諸侯如此則莊公不赴可也今桓公名為尊王室若莊公不赴非是叛齊乃叛周也又況桓公做得氣勢如此盛大自家如何便復得讎若欲復讎則襄公殺其父之時莊公當以不共戴天之故告之天子方伯連率必以復讎為事殺得襄公而後已如此方快今既不能然又親與之同會與之主婚於其正當底讎人尚如此則其子何罪又況其子承其被殺後而入國又做得國來自好莊公之所不如宜其不能復而俯首事之也陳問若莊公能殺襄公了復與桓公為會可否曰既殺襄公則兩家之事已了兩邊方平自與桓公為會亦何妨但莊公若能殺襄公則九合諸侯一正天下之功將在莊公而不在齊桓矣惟其不能所以只得屈服事之也只要乘氣勢方急時便做了方好才到一世二世後事便冷了假使自家欲如此做也自鼓氣不振又況復讎須復得親殺吾父祖之讎方好若復其子孫有甚意思漢武帝引春秋九世復讎之説遂征胡狄欲為高祖報讎春秋何處如此説諸公讀此還信否他自好大喜功欲攘伐夷狄姑托此以自詭耳如本朝靖康虜人之禍看來只是高宗初年乘兀朮粘罕斡離不及阿骨打未死之時人心憤怒之日以父兄不共戴天之讎就此便打疊了他方快人意孝宗即位鋭意雪恥然事已經隔與吾敵者非親殺吾父祖之人自是鼓作人心不上所以當時號為端人正士者又以復讎為非和議為是而乘時喜功名輕薄巧言之士則欲復讎彼端人正士豈故欲忘此虜蓋度其時之不可而不足以激士心也如王公明炎虞斌父之徒百方勸用兵孝宗盡被他説動其實無能用著輒敗只志在脫賺富貴而已所以孝宗盡被這樣底欺做事不成蓋以此耳僩云但不能殺虜主耳若而今捉得虜人來殺之少報父祖之怨豈不快意曰固是好只是已不干他事自是他祖父事你若捉得他父祖來殺豈不快人意而今是他子孫干他甚事又問疏中又引君以無辜殺其父其子當報父之讎如此則是報君豈有此理曰疏家胡説豈有此理又引伍子胥事説聖人是之曰聖人何嘗有明文是子胥來今之為春秋者都是如此胡問疏又引子思曰今之君子退人若將墜諸淵毋為戎首不亦善乎言當執之但勿為兵首從人以殺之可也曰盡是胡解子思之意蓋為或人問禮為舊君有服禮歟子思因云人君退人無禮如此他不為戎首來殺你已自好了何況更望其為你服此乃自人君而言蓋甚之之辭非言人臣不見禮於其君便可以如此也讀書不可窒塞須看他大意僩恢復之計須是自家喫得些辛苦少做十年或二十年多做三十年豈有安坐無事而大功自致之理哉道夫今朝廷之議不是戰便是和不和便戰不知古人不戰不和之間亦有箇且硬相守底道理卻一面自作措置亦如何便侵軼得我今五六十年間只以和為可靠兵又不曾練得財又不曾蓄得説恢復底都是亂説耳某嘗謂恢復之計不難惟移浮靡不急之費以為養兵之資則虜首可梟矣道夫近見吳公濟會中朋友讀時文策其間有問道德功術者二篇一篇以功術為不好一篇以為有道德則功術乃道德之功術無道德則功術不好前篇不如後篇某常見一宰相説上甚有愛人之心不合被近日諸公愛説恢復某應之曰公便説得不是公何不曰愛人乃所以為恢復恢復非愛人不能因説為政篇道德政刑與此一般有道德則刑政乃在其中不可道刑政不好但不得專用政刑耳本朝禦戎始終為和字壞後來人見景德之和無恙遂只管守之殊不知當時本朝全盛抵得住後來與女真彼此之勢如何了揚和戎問不能自強則聽天所命修德行仁則天命在我因説靖康之禍云云終始為講和所誤虜人至城下攻城猶説講和及高宗渡江亦只欲講和問秦檜之所以力欲講和者亦以高宗之意自欲和也曰然是他知得虜人之意是欲厭用兵他當初自虜中來時已知得虜人厭兵故這裏迎合高宗之意那箇又投合虜人之意虜人是時子女玉帛已自充滿厭足非復曩時長驅中原之鋭矣又被這邊殺一兩陳怕了兼虜之創業之主已死他那邊兄弟自相屠戮這邊兵勢亦稍稍強所以他亦欲和卓秦檜自虜中歸見虜人溺於聲色宴安得之中國者日夜爛熳亦有厭兵意秦得此意遂歸來主和其初亦是矣然猶已奉之蕩不為一毫計使其和中自治有策後當逆亮之亂一掃而復中原一大機會也惜哉揚秦檜講和時歲幣絹二萬五千匹銀二萬五千兩今歲絹減五千匹銀減五千兩此定數每常往來人事禮數皆用金銀器盛腦子貴藥物之類所費不資大約等絹三千五百文一匹銀二千五百文一兩大數一百二十萬緡彼來時只是些羊巴匹段之類甚微揚
