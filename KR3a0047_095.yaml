body:
  text: 朱子語類卷第九十五程子之書一凡入近思録者皆依次第類為此卷近思録首卷所論誠中仁三者發明義理固是有許多名只是一理但須隨事別之如説誠便只是實然底道理譬如天地之於萬物陰便實然是陰陽便實然是陽無一毫不真實處中只是喜怒哀樂未發之理仁便如天地發育萬物人無私意便與天地相似但天地無一息間斷聖希天處正在此仁義禮智便如四柱仁又包括四者如易之元亨利貞必統於元如時之春秋冬夏皆本於春析而言之各有所指而已謨問伊川言喜怒哀樂未發謂之中中也者寂然不動是也南軒言伊川此處有小差所謂喜怒哀樂之中言衆人之常性寂然不動者聖人之道心又南軒辨呂與叔論中書説亦如此今載近思録如何曰前輩多如此説不但欽夫自五峰發此論某自是曉不得今湖南學者往往守此説牢不可破某看來寂然不動衆人皆有是心至感而遂通惟聖人能之衆人卻不然蓋衆人雖具此心未發時已自汩亂了思慮紛擾夢寐顛倒曾無操存之道至感發處如何得會如聖人中節宇心一也有指體而言者有指用而言者伊川此語與橫渠心統性情相似淳伊川曰四德之元猶五常之仁偏言則主一事專言則包四者若不得他如此説出如何明得問仁既偏言則一事如何又可包四者曰偏言之仁便是包四者底包四者底便是偏言之仁節郭兄問偏言則一事專言則包四者曰以專言言之則一者包四者以偏言言之則四者不離一者也卓仁之包四德猶冢宰之統六官閎祖問論語中言仁處皆是包四者曰有是包四者底有是偏言底如克己復禮為仁巧言令色鮮矣仁便是包四者節問仁何以能包四者曰人只是這一箇心就裏面分為四者且以惻隱論之本只是這惻隱遇當辭遜則為辭遜不安處便為羞惡分別處便為是非若無一箇動底醒底在裏面便也不知羞惡不知辭遜不知是非譬如天地只是一箇春氣振録作春生之氣發生之初為春氣發生得過李録云長得過便為夏收斂便為秋消縮便為冬明年又從春起渾然只是一箇發生之氣節方子振同問仁包四者只就生意上看否曰統是一箇生意如四時只初生底便是春夏天長亦只是長這生底秋天成亦只是遂這生底若割斷便死了不能成遂矣冬天堅實亦只是實這生底如穀九分熟一分未熟若割斷亦死了到十分熟方割來這生意又藏在裏面明年熟亦只是這箇生如惻隱羞惡辭遜是非都是一箇生意當惻隱若無生意這裏便死了亦不解惻隱當羞惡若無生意這裏便死了亦不解羞惡這裏無生意亦不解辭遜亦不解是非心都無活底意思仁渾淪言則渾淪都是一箇義禮知都是仁對言則仁義與禮智一般淳寓録云安卿問仁包四者就初意上看就生意上看曰統是箇生意四時雖異生意則同劈頭是春生到夏長養是長養那生底秋來成遂是成遂那生底冬來堅實亦只堅實那生底草木未華實去摧折他便割斷了生意便死了如何會到成實如穀有兩分未熟只成七八分穀仁義禮智都只是箇生意當惻隱而不惻隱便無生意便死了羞惡固是義當羞惡而無羞惡這生意亦死了以至當辭遜而失其辭遜是非而失其是非心便死全無那活底意思問四德之元猶五常之仁偏言則一事專言則包四者曰須先識得元與仁是箇甚物事便就自家身上看甚麼是仁甚麼是義禮智既識得這箇便見得這一箇能包得那數箇若有人問自家如何一箇便包得數箇只答云只為是一箇問直卿曰公於此處見得分明否曰向來看康節詩見得這意思如謂天根月窟間來往三十六宮都是春正與程子所謂靜後見萬物皆有春意同且如這箇棹子安頓得恰好時便是仁蓋無乖戾便是生意窮天地異古今只是一箇生意故曰仁者與物無對以其無往非仁此所以仁包四德也曰如此體仁便不是便不是生底意思棹子安頓得恰好只可言中不可謂之仁元只是初底便是如木之萌如草之芽其在人如惻然有隱初來底意思便是幹録作要理會得仁當就初處看故元亨利貞而元為四德之首就初生處看便見得仁所以程子謂看雞雛可以觀仁為是那嫩小底便是仁底意思在幹録作亦是看其初意思問如所謂初來底意思便是不知思慮之萌不得其正時如何曰這便是地頭著賊更是那元字上著賊了如合施為而不曾施為時便是亨底地頭著賊了如合收斂而不曾收斂時便是利底地頭著賊了如合貞靜而不能貞靜時便是貞底地頭著賊了幹録作問物理固如此就人心思慮上觀之如何曰思慮方萌特守得定便是仁如思慮方萌錯了便是賊其仁當施為時錯了便是賊其禮當收斂時錯了便是賊其義當貞靜時錯了便是賊其智凡物皆有箇如此道理以一身觀之元如頭亨便是手足利便是胸腹貞便是那元氣所歸宿處所以人頭亦謂之元首穆薑亦曰元者體之長也今若能知得所謂元之元元之亨元之利利之貞上面一箇元字便是包那四箇下面元字則是偏言則一事者恁地説則大煞分明了須要知得所謂元之元亨之元利之元貞之元者蓋見得此則知得所謂只是一箇也若以一歲之體言之則春便是元之元所謂首夏清和者便是亨之元孟秋之月便是利之元到那初冬十月便是貞之元也只是初底意思便是幹録作如春夏秋冬春為一歲之首由是而為夏為秋為冬皆自此生出所以謂仁包四德者只緣四箇是一箇只是三箇元卻有元之元元之亨元之利元之貞又有亨之元利之元貞之元曉得此意則仁包四者尤明白了道夫曰如先生之言正是程子説復其見天地之心復之初爻便是天地生物之心也曰今只將公所見看所謂心譬如穀種生之性便是仁陽氣發處乃情也觀之便見久之復曰正如天官冢宰以分歲言之特六卿之一耳而建邦之六典則又統六卿也道夫幹録稍異問曩者論仁包四者蒙教以初底意思看仁昨看孟子四端處似頗認得此意曰如何曰仁者生之理而動之機也惟其運轉流通無所間斷故謂之心故能貫通四者曰這自是難説他自活今若恁地看得來只見得一邊只見得他用處不見他體了問生之理便是體否曰若要見得分明只看程先生説心譬如穀種生之性便是仁便分明若更要真識得仁之體只看夫子所謂克己復禮克去己私如何便喚得做仁曰若如此看則程子所謂公字愈覺親切曰公也只是仁底殼子盡他未得在畢竟裏面是箇甚物事生之性也只是狀得仁之體道夫直卿問仁包四德如元者善之長從四時生物意思觀之則陰陽都偏了曰如此則秋冬都無生物氣象但生生之意至此退了到得退未盡處則陽氣依舊在且如陰陽其初亦只是一箇進便喚做陽退便喚做陰道夫問仁包四者然惻隱之端如何貫得是非羞惡辭遜之類曰惻隱只是動處接事物時皆是此心先擁出來其間卻自有羞惡是非之別所以惻隱又貫四端如春和則發生夏則長茂以至秋冬皆是一氣只是這箇生意問偏言則曰愛之理專言則曰心之德如何曰偏言是指其一端因惻隱之發而知其有是愛之理專言則五性之理兼舉而言之而仁則包乎四者是也謨問仁可包義智禮惻隱如何包羞惡二端曰但看羞惡時自有一般惻怛底意思便可見曰仁包三者何以見曰但以春言春本主生夏秋冬亦只是此生氣或長養或斂藏有間耳可學伊川言天所賦為命物所受為性理一也自天之所賦與萬物言之故謂之命以人物之所稟受於天言之故謂之性其實所從言之地頭不同耳端蒙唐傑問近思録既載鬼神者造化之迹又載鬼神者二氣之良能似乎重了曰造化之迹是日月星辰風雨之屬二氣良能是屈伸往來之理蓋卿人性無不善雖桀紂之為窮凶極惡也知此事是惡但則是我要恁地做不奈何便是人欲奪了銖伊川言在物為理凡物皆有理蓋理不外乎事物之間處物為義義宜也是非可否處之得宜所謂義也端蒙在物為理處物為義理是在此物上便有此理義是於此物上自家處置合如此便是義義便有箇區處問在物為理處物為義曰且如這棹子是物於理可以安頓物事我把他如此用便是義友仁問忠信所以進德至對越在天也曰此一段只是解箇終日乾乾在天之剛健者便是天之乾在人之剛健者便是人之乾其體則謂之易便是橫渠所謂坱然太虛升降飛揚未嘗止息者自此而下雖有許多般要之形而上者謂之道形而下者謂之器皆是實理以時節分段言之便有古今以血氣支體言之便有人己卻只是一箇理也道夫忠信所以進德至君子當終日對越在天也這箇只是解一箇終日乾乾忠信進德修辭立誠便無間斷便是終日乾乾不必便説終日對越在天下面説上天之載無聲無臭云云便是説許多事都只是一箇天賀孫問詳此一段意只是體當這箇實理雖説出有許多般其實一理也曰此只是解終日乾乾故説此一段從上天之載無聲無臭説起雖是無聲無臭其闔闢變化之體則謂之易然所以能闔闢變化之理則謂之道其功用著見處則謂之神此皆就天上説及説到命於人則謂之性率性則謂之道修道則謂之教是就人身上説上下説得如此子細都説了可謂盡矣故説神如在其上如在其左右又皆是此理顯著之迹看甚大事小事都離了這箇事不得上而天地鬼神離這箇不得下而萬事萬物都不出此故曰徹上徹下不過如此形而上者無形無影是此理形而下者有情有狀是此器然謂此器則有此理有此理則有此器未嘗相離卻不是於形器之外別有所謂理異古異今萬事萬物皆只是這箇所以説但得道在不係今與後己與人叔蒙問不出這體用其體則謂之性其用則謂之道曰道只是統言此理不可便以道為用仁義禮智信是理道便是統言此理直卿云道字看來亦兼體用如説其理則謂之道是指體言又説率性則謂之道是指用言曰此語上是就天上説下是就人身上説直卿又云只是德又自兼體用言如通書云動而正曰道用而和曰德曰正是理雖動而得其正理便是道若動而不正則不是道和亦只是順理用而和順便是得此理於身若用而不和順則此理不得於身故下云匪仁匪義匪禮匪智匪信悉邪也只是此理故又云君子慎動直卿問太極圖只説動而生陽靜而生陰通書又説箇機此是動靜之間又有此一項又云智字自與知識之知不同智是具是非之理知識便是察識得這箇物事好惡又問神是心之至妙處所以管攝動靜十年前曾聞先生説神亦只是形而下者賀孫問神既是管攝此身則心又安在曰神即是心之至妙處滾在氣裏説又只是氣然神又是氣之精妙處到得氣又是粗了精又粗形又粗至於説魂説魄皆是説到粗處賀孫寓録云直卿云看來神字本不專説氣也可就理上説先生只就形而下者説先生曰所以某就形而下説畢竟就氣處多發出光彩便是神味道問神如此説心又在那裏曰神便在心裏凝在裏面為精發出光彩為神精屬陰神屬陽説到魂魄鬼神又是説到大段粗處問上天之載無聲無臭其體則謂之易如何看體字曰體是體質之體猶言骨子也易者陰陽錯綜交換代易之謂如寒暑晝夜闔闢往來天地之間陰陽交錯而實理流行蓋與道為體也寒暑晝夜闔闢往來而實理於是流行其間非此則實理無所頓放猶君臣父子夫婦長幼朋友有此五者而實理寓焉故曰其體則謂之易言易為此理之體質也程子解逝者如斯不舍晝夜曰此道體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體集注曰天地之化往者過來者續無一息之停乃道體之本然也即是此意銖其體則謂之易在人則心也其理則謂之道在人則性也其用則謂之神在人則情也所謂易者變化錯綜如陰陽晝夜雷風水火反復流轉縱橫經緯而不已也人心則語默動靜變化不測者是也體是形體也賀孫録云體非體用之謂言體則亦是形而下者其理則形而上者也故程子曰易中只是言反復往來上下亦是意也端蒙以其體謂之易以其理謂之道這正如心性情相似易便是心道便是性易變易也如奕碁相似寒了暑暑了寒日往而月來春夏為陽秋冬為陰一陰一陽只管恁地相易賀孫其體則謂之易其理則謂之道其用則謂之神人傑謂陰陽闔闢屈伸往來則謂之易皆是自然皆有定理則謂之道造化功用不可測度則謂之神程子又曰其命於人則謂之性率性則謂之道修道則謂之教只是就人道上説人傑謂中庸大旨則天命之謂性率性之謂道是通人物而言修道之謂教則聖賢所以扶世立教垂法後世者皆是也先生曰就人一身言之易猶心也道猶性也神猶情也翌日再問云既就人身言之卻以就人身者就天地言之可乎曰天命流行所以主宰管攝是理者即其心也而有是理者即其性也如所以為春夏所以為秋冬之理是也至發育萬物者即其情也人傑録別出正淳問其體則謂之易只屈伸往來之義是否曰義則不是只陰陽屈伸便是形體又問昨日以天地之心情性在人上言之今卻以人之心性情就天上言之如何曰春夏秋冬便是天地之心天命流行有所主宰其所以為春夏秋冬便是性造化發用便是情又問恐心大性小曰此不可以小大論若以能為春夏秋冬者為性亦未是只是所以為此者是合下有此道理謂如以鏡子為心其光之照見物處便是情其所以能光者是性因甚把木板子來卻照不見為他元沒這光底道理其體則謂之易其理則謂之道其功用則謂之鬼神易是陰陽屈伸隨時變易大抵古今只是大闔闢小闔闢今人説易都無著摸聖人便於六十四卦只以陰陽奇耦寫出來至於所以為陰陽為古今乃是此道理及至忽然生物或在此或在彼如花木之類驀然而出華時都華實時都實生氣便發出來只此便是神如在人仁義禮智惻隱羞惡心便能管攝其為喜怒哀樂即情之發用處其體則謂之易其理則謂之道其用則謂之神此三句是説自然底下面云其命於人則謂之性此是就人上説謂之命於人這人字便是心字夔孫問此一段自浩然之氣以上自是説道下面説神如在其上如在其左右不知如何曰一段皆是明道體無乎不在名雖不同只是一理發出是箇無始無終底意林易簡問莫是動靜無端陰陽無始底道理否曰不可如此類泥著但見梗礙耳某舊見伊川説仁令將聖賢所言仁處類聚看看來恐如此不得古人言語各隨所説見意那邊自如彼説這邊自如此説要一一來比並不得又曰文字且子細逐件理會待看得多自有箇見處林曰某且要知盡許多疑了方可下手做曰若要知了如何便知得了不如且就知得處逐旋做去知得一件做一件知得兩件做兩件貪多不濟事如此用工夫恐怕輕費了時月某謂少看有功卻多泛泛然多看全然無益今人大抵有貪多之病初來只是一箇小沒理會下梢成一箇大沒理會宇明道醫書手足不仁止可以得仁之體一段以意推之蓋謂仁者天地生物之心而人物所得以為心則是天地人物莫不同有是心而心德未嘗不貫通也雖其為天地為人物各有不同然其實則有一條脈絡相貫故體認得此心而有以存養之則心理無所不到而自然無不愛矣才少有私欲蔽之則便間斷發出來愛便有不到處故世之忍心無恩者只是私欲蔽錮不曾認得我與天地萬物心相貫通之理故求仁之切要只在不失其本心而已若夫博施濟衆則自是功用故曰何干仁事言不於此而得也仁至難言亦以全體精微未易言也止曰立人達人則有以指夫仁者之心而便於此觀則仁之體庶幾不外是心而得之爾然又嘗以伊川穀種之説推之其心猶穀種生之性便是仁陽氣發動乃情也蓋所謂生之性即仁之體發處即仁之用也若夫博施濟衆則又是穀之成實而利及於人之謂以是觀之仁聖可知矣先生云何干仁事謂仁不於此得則可以為聖仁全無干涉則不可又云氣有不貫血脈都在這氣字上著心看則意好又云何事於仁言何止是仁必也仁之成德猶曰何止於木必也木之成就何止於穀必也穀之成禾之意耳端蒙伊川語録中説仁者以天地萬物為一體説得太深無捉摸處易傳其手筆只云四德之元猶五常之仁偏言則一事專言則包四者又曰仁者天下之公善之本也易傳只此兩處説仁説得極平實學者當精看此等處銖生之謂性一條難説須子細看此一條伊川説得亦未甚盡生之謂性是生下來喚做性底便有氣稟夾雜便不是理底性了前輩説甚性惡善惡混都是不曾識性到伊川説性即理也無人道得到這處理便是天理又那得有惡孟子説性善便都是説理善雖是就發處説然亦就理之發處説如曰乃若其情曰非才之罪又曰生之謂性如碗盛水後人便以碗為水水卻本清碗卻有淨有不淨問雖是氣稟亦尚可變得否曰然最難須是人一能之己百之人十能之己千之方得若只恁地待他自變他也未與你卒乍變得在這道理無他巧只是熟只是專一賀孫人生氣稟理有善惡此理字不是説實理猶云理當如此僩人生氣稟理有善惡理只作合字看端蒙生之謂性一段當作三節看其間有言天命者有言氣質者生之謂性是一節水流就下是一節清濁又是一節問生之謂性一段難看自起頭至惡亦不可不謂之性也成兩三截曰此一段極難看但細尋語脈卻亦可曉上云不是兩物相對而生蓋言性善也曰既言性善下卻言善固性也然惡亦不可不謂之性卻是言氣稟之性似與上文不相接曰不是言氣稟之性蓋言性本善而今乃惡亦是此性為惡所汩正如水為泥沙所混不成不喚做水曰適所問乃南軒之論曰敬夫議論出得太早多有差舛此間有渠論孟解士大夫多求之者又難為拒之又問人生而靜當作斷句曰只是連下文而不容説作句性自稟賦而言人生而靜以上未有形氣理未有所受安得謂之性又問才説性時便已不是性此處先生所答記得不切不敢録次夜再問別録在後又問凡人説性只是説繼之者善也繼之者善如何便指作性曰吾友疑得極是此卻是就人身上説繼之者善若就向上説則天理方流出亦不可謂之性曰生之謂性性即氣氣即性此言人生性與氣混合者曰有此氣為人則理具於身方可謂之性又問向滕德粹問生之謂性先生曰且從程先生之説亦好當時再三請益先生不答後來子細看此蓋告子之言若果如程先生之説亦無害而渠意直是指氣為性與程先生之意不同曰程先生之言亦是認告子語脈不差果如此説則孟子何必排之則知其發端固非矣大抵諸儒説性多説著氣如佛氏亦只是認知覺作用為性又問孟注云近世蘇氏胡氏之説近此甚觀二家之説似亦不執著氣曰其流必至此又問胡氏説性不可以善惡名似只要形容得性如此之大曰不是要形容只是見不明若見得明則自不如此敬夫向亦執此説嘗語之云凡物皆有對今乃欲作尖邪物何故程先生論性只云性即理也豈不是見得明是真有功於聖門又問繼之者善也成之者性也至程先生始分明曰以前無人如此説若不是見得安能及此第二夜復問昨夜問生之謂性一段意有未盡不知才説性便不是性此是就性未稟時説已稟時説曰就已稟時説性者渾然天理而已才説性時則已帶氣矣所謂離了陰陽更無道此中最宜分別又問水流而就下以後此是説氣稟否若説氣稟則生下已定安得有遠近之別曰此是夾習説饒本云此是説氣可學問生之謂性一章泳竊意自生之謂性至然惡亦不可不謂之性也是本來之性與氣質之性兼説劈頭只指箇生字説是兼二者了曰那性字卻如何泳曰恐只是都説做性泳又問舊來因此以水喻性遂謂天道純然一理便是那水本來清陰陽五行交錯雜揉而有昏濁便是那水被泥污了昏濁可以復清者只緣他母子清曰然那下愚不移底人卻是那臭穢底水問也須可以澄治曰也減得些分數因言舊時人嘗裝惠山泉去京師或時臭了京師人會洗水將沙石在筧中上面傾水從筧中下去如此十數番便漸如故或問下愚亦可以澄治否泳云恐他自不肯去澄治了曰那水雖臭想也未至汙穢在問物如此更推不去卻似那臭泥相似曰是如此又問自蓋生之謂性至猶水流而就下也一節是説本來之性曰蓋生之謂性卻是如何泳曰只是提起那一句説又問人生而靜以上不容説人生而靜是説那初生時更説向上去便只是天命了曰所以大哉乾元萬物資始只説是誠之源也至乾道變化各正性命方是性在凡人説性只是説繼之者善也便兼氣質了問恐只是兼了情曰情便兼質了所以孟子答告子問性卻説乃若其情則可以為善矣説仁義禮智卻説惻隱羞惡恭敬是非去蓋性無形影情卻有實事只得從情上説入去問因情以知性恰似因流以知源舊聞蔡季通問康叔臨云凡物有兩端惻隱為仁之端是頭端是尾端叔臨以為尾端近聞周莊仲説先生云不須如此分曰公如何説曰惻隱是性之動處因其動處以知其本體是因流以知其源恐只是尾端曰是如此又問皆水也至然不可以濁者不為水也一節曰這水只是説氣質泳曰竊謂因物欲之淺深可以見氣質之昏明猶因惻隱羞惡可以見仁義之端曰也是如此或問氣清底人自無物欲曰也如此説不得口之欲味耳之欲聲人人皆然雖是稟得氣清才不檢束便流於欲去又問如此則人不可不加澄治之功至置在一隅也一節是説人求以變化氣質然變了氣質復還本然之性亦不是在外面添得曰是如此又問水之清則性善之謂也至於舜禹有天下而不與焉者也一節是言學者去求道不是外面添聖人之教人亦不是強人分外做曰此理天命也一句亦可見胡泳或問生之謂性一段曰此段引譬喻亦叢雜如説水流而就下了又説從清濁處去與就下不相續這處只要認得大意可也又曰然惡亦不可不謂之性一句又似有惡性相似須是子細看義剛問惡亦不可不謂之性先生舊做明道論性説云氣之惡者其性亦無不善故惡亦不可不謂之性明道又云善惡皆天理謂之惡者本非惡但或過或不及便如此蓋天下無性外之物本皆善而流於惡耳如此則惡專是氣稟不干性事如何説惡亦不可不謂之性曰既是氣稟惡便也牽引得那性不好蓋性只是搭附在氣稟上既是氣稟不好便和那性壞了所以説濁亦不可不謂之水水本是清卻因人撓之故濁也又問先生嘗云性不可以物譬明道以水喻性還有病否曰若比來比去也終有病只是不以這箇比又不能得分曉僩善固性也然惡亦不可不謂之性也疑與孟子抵牾曰這般所在難説卒乍理會未得某舊時初看亦自疑但看來看去自是分明今定是不錯不相誤只著工夫子細看莫據己見便説前輩説得不是又問草木與人物之性一乎曰須知其異而不害其為同知其同而不害其為異方得木之正淳問性善大抵程氏説善惡處説得善字重惡字輕曰善固性也惡亦不可不謂之性也此是氣質之性蓋理之與氣雖同畢竟先有此理而後有此氣又問郭氏性圖曰性善字且做在上其下不當同以善惡對出於下不得已時善字下再寫一善卻傍出一惡字倒著以見惡只是反於善且如此猶自可説正淳謂自不當寫出來曰然問人生而靜以上不容説一段曰人生而靜以上即是人物未生時人物未生時只可謂之理説性未得此所謂在天曰命也才説性時便已不是性者言才謂之性便是人生以後此理已墮在形氣之中不全是性之本體矣故曰便已不是性也此所謂在人曰性也大抵人有此形氣則是此理始具於形氣之中而謂之性才是説性便已涉乎有生而兼乎氣質不得為性之本體也然性之本體亦未嘗雜要人就此上面見得其本體元未嘗離亦未嘗雜耳凡人説性只是説繼之者善也者言性不可形容而善言性者不過即其發見之端而言之而性之理固可默識矣如孟子言性善與四端是也未有形氣渾然天理未有降付故只謂之理已有形氣是理降而在人具於形氣之中方謂之性已涉乎氣矣便不能超然專説得理也程子曰天所賦為命物所受為性又曰在天曰命在人曰性是也銖明道論性一章人生而靜靜者固其性然只有生字便帶卻氣質了但生字以上又不容説蓋此道理未有形見處故今才説性便須帶著氣質無能懸空説得性者繼之者善本是説造化發育之功明道此處卻是就人性發用處説如孟子所謂乃若其情則可以為善之類是也伊川言極本窮源之性乃是對氣質之性而言言氣質之稟雖有善惡之不同然極本窮源而論之則性未嘗不善也端蒙問人生而靜以上一段曰程先生説性有本然之性有氣質之性人具此形體便是氣質之性才説性此性字是雜氣質與本來性説便已不是性這性字卻是本然性才説氣質底便不是本然底也人生而靜以下方有形體可説以上是未有形體如何説賀孫曾問人生而靜以上不容説曰此是未有人生之時但有天理更不可言性人生而後方有這氣稟有這物欲方可言性卓人生而靜以上不容説此只是理才説性時便已不是性此是氣質要之假合而後成文蔚人生而靜已是夾形氣專説性不得此處宜體認可學或問説人生而靜以上不容説為天命之不已感物而動酬酢萬殊為天命之流行不已便是流行不知上一截如何下語曰人生而靜以上不容説乃天命之本體也人傑問人生而靜以上一段曰有兩箇性字有所謂理之性有所謂氣質之性下一性字是理人生而靜此生字已自帶氣質了生而靜以上便只是理不容説才説性時便只説得氣質不是理也淳才説性便已不是性也蓋才説性時便是兼氣質而言矣人生而靜以上不容説人生而靜以上只説得箇人生而靜上面不通説蓋性須是箇氣質方説得箇性字若人生而靜以上只説箇天道下性字不得所以子貢曰夫子之言性與天道不可得而聞也便是如此所謂天命之謂性者是就人身中指出這箇是天命之性不雜氣稟者而言爾若才説性時則便是夾氣稟而言所以説時便已不是性也濂溪説性者剛柔善惡中而已矣濂溪説性只是此五者他又自有説仁義禮智底性時若論氣稟之性則不出此五者然氣稟底性便是那四端底性非別有一種性也然所謂剛柔善惡中者天下之性固不出此五者然細推之極多般樣千般百種不可窮究但不離此五者爾僩人生而靜以上不容説是只説性如説善即是有性了方説得善方問近思録中説性似有兩種何也曰此説往往人都錯看了才説性便有不是人性本善而已才墮入氣質中便薰染得不好了雖薰染得不好然本性卻依舊在此全在學者著力今人卻言有本性又有氣質之性此大害理去偽問凡人説性只是説繼之者善也這繼字莫是主於接續承受底意思否曰主於人之發用處言之道夫程子云凡人説性只是説繼之者善孟子言性善是也易中所言蓋是説天命流行處明道卻將來就人發處説孟子言性善亦是就發處説故其言曰乃若其情則可以為善矣蓋因其發處之善是以知其本無不善猶循流而知其源也故孟子説四端亦多就發處説易中以天命言程子就人言蓋人便是一箇小天地耳端蒙夫所謂繼之者善也者猶水流而就下也此繼之者善指發處而言之也性之在人猶水之在山其清不可得而見也流出而見其清然後知其本清也所以孟子只就見孺子入井皆有怵惕惻隱之心處指以示人使知性之本善者也易所謂繼之者善也在性之先此所引繼之者善也在性之後蓋易以天道之流行者言此以人性之發見者言明天道流行如此所以人性發見亦如此如後段所謂其體則謂之易其理則謂之道其用則謂之神某嘗謂易在人便是心道在人便是性神在人便是情緣他本原如此所以生出來箇箇亦如此一本故也閎祖問或謂明道所謂凡人説性只是説繼之者善與易所謂繼之者善意不同明道是言氣質之性亦未嘗不善如孔子性相近之意曰明道説繼之者善固與易意不同但以為此段只説氣質之性則非也明道此段有言氣質之性處有言天命之性處近陳後之寫來只於此段性字下各注某處是説天命之性某處是説氣質之性若識得數字分明有著落則此段儘易看銖問明道言今人説性多是説繼之者善如孟子言性善是也此莫是説性之本體不可言凡言性者只是説性之流出處如孟子言乃若其情則可以為善矣之類否先生點頭後江西一學者問此先生答書云易大傳言繼善是指未生之前孟子言性善是指已生之後是夕復語文蔚曰今日答書覺得未是文蔚曰莫是易言繼善是説天道流行處孟子言性善是説人性流出處易與孟子就天人分上各以流出處言明道則假彼以明此耳非如先生未生已生之云曰然文蔚繼之者善也周子是説生生之善程子説作人性之善用處各自不同若以此觀彼心有窒礙人傑問伊川云萬物之生意最可觀曰物之初生其本未遠固好看及幹成葉茂便不好看如赤子入井時惻隱怵惕之心只些子仁見得時卻好看到得發政施仁其仁固廣便看不見得何處是仁賜問萬物之生意最可觀此元者善之長也斯所謂仁也此只是先生向所謂初之意否曰萬物之生天命流行自始至終無非此理但初生之際淳粹未散尤易見爾只如元亨利貞皆是善而元則為善之長亨利貞皆是那裏來仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出爾道夫問天地萬物之理無獨必有對對是物也理安得有對曰如高下小大清濁之類皆是曰高下小大清濁又是物也如何曰有高必有下有大必有小皆是理必當如此如天之生物不能獨陰必有陽不能獨陽必有陰皆是對這對處不是理對其所以有對者是理合當恁地淳天地萬物之理無獨必有對問如何便至不知手之舞之足之蹈之曰真箇是未有無對者看得破時真箇是差異好笑且如一陰一陽便有對至於太極便對甚底曰太極有無極對曰此只是一句如金木水火土即土亦似無對然皆有對太極便與陰陽相對此是形而上者謂之道形而下者謂之器便對過卻是橫對了土便與金木水火相對蓋金木水火是有方所土卻無方所亦對得過必大録云四物皆資土故也胡氏謂善不與惡對惡是反善如仁與不仁如何不可對若不相對覺説得天下事都尖斜了沒箇是處必大録云湖南學者云善無對不知惡乃善之對惡者反乎善者也必大同問天下之理無獨必有對有動必有靜有陰必有陽以至屈伸消長盛衰之類莫不皆然還是他合下便如此邪曰自是他合下來如此一便對二形而上便對形而下然就一言之一中又自有對且如眼前一物便有背有面有上有下有內有外二又各自為對雖説無獨必有對然獨中又自有對且如碁盤路兩兩相對末梢中間只空一路若似無對然此一路對了三百六十路此所謂一對萬道對器也銖天下之物未嘗無對有陰便有陽有仁便有義有善便有惡有語便有默有動便有靜然又卻只是一箇道理如人行出去是這腳歸亦是這腳譬如口中之氣噓則為溫吸則為寒耳雉問陰陽晝夜善惡是非君臣上下此天地萬物無獨必有對之意否曰這也只如喜怒哀樂之中便有箇既發而中節之和在裏相似道夫問天地之間亭亭當當直上直下出便不是如何曰喜怒哀樂未發謂之中亭亭當當直上直下等語皆是形容中之在我其體段如此出則不是者出便是已發發而中節只可謂之和不可謂之中矣故曰出便不是謨問亭亭當當之説曰此俗語也蓋不偏不倚直上直下之意也問敬固非中惟敬而無失乃所以為中否曰只是常敬便是喜怒哀樂未發之中也道夫天地間亭亭當當直上直下之正理出則不是如此則是內敬而無無失最盡居敬方謂居字好方問無妄誠之道不欺則所以求誠否曰無妄者聖人也謂聖人為無妄則可謂聖人為不欺則不可又問此正所謂誠者天之道思誠者人之道否曰然無妄是自然之誠不欺是著力去做底道夫無妄之謂誠是天道不欺其次矣是人道中庸所謂思誠者是也味道問無妄之謂誠不欺其次也曰非無妄故能誠無妄便是誠無妄是四方八面都去得不欺猶是兩箇物事相對宇或問無妄之謂誠不欺其次矣曰無妄是兼天地萬物所同得底渾淪道理不欺是就一邊説泳問不欺是就人身説否曰然胡泳無妄自是我無妄故誠不欺者對物而言之故次之祖道問沖漠無朕至教入塗轍他所謂塗轍者莫只是以人所當行者言之凡所當行之事皆是先有此理卻不是臨行事時旋去尋討道理曰此言未有這事先有這理如未有君臣已先有君臣之理未有父子已先有父子之理不成元無此理直待有君臣父子卻旋將道理入在裏面又問既是塗轍卻只是一箇塗轍是如何曰是這一箇事便只是這一箇道理精粗一貫元無兩樣今人只見前面一段事無形無兆將謂是空蕩蕩卻不知道沖漠無朕萬象森然已具如釋氏便只是説空老氏便只是説無卻不知道莫實於理曰未應不是先已應不是後應字是應務之應否曰未應是未應此事已應是已應此事未應固是先卻只是後來事已應固是後卻只是未應時理文蔚未應不是先已應不是後如未有君臣已先有君臣之理在這裏不是先本無卻待安排也既是塗轍卻只是一箇塗轍如既有君君臣臣底塗轍卻是元有君臣之理也升卿子升問沖漠無朕一段曰未有事物之時此理已具少間應處只是此理所謂塗轍即是所由之路如父之慈子之孝只是一條路從源頭下來木之或問未應不是先一條曰未應如未有此物而此理已具到有此物亦只是這箇道理塗轍是車行處且如未有塗轍而車行必有塗轍之理賀孫問沖漠無朕一段曰此只是説無極而太極又問下文既是塗轍卻只是一箇塗轍是如何曰恐是記者欠了字亦曉不得又曰某前日説只從陰陽處看則所謂太極者便只在陰陽裏所謂陰陽者便只是在太極裏而今人説陰陽上面別有一箇無形無影底物是太極非也夔孫他本小異問近取諸身百理皆具且是言人之一身與天地相為流通無一之不相似至下言屈伸往來之義只於鼻息之間見之卻只是説上意一腳否曰然又問屈伸往來只是理自如此亦猶一闔一闢闔固為闢之基而闢亦為闔之基否曰氣雖有屈伸要之方伸之氣自非既屈之氣氣雖屈而物亦自一面生出此所謂生生之理自然不息也道夫問屈伸往來氣也程子云只是理何也曰其所以屈伸往來者是理必如此一陰一陽之謂道陰陽氣也其所以一陰一陽循環而不已者乃道也淳明道言天地之間只有一箇感應而已蓋陰陽之變化萬物之生成情偽之相通事為之終始一為感則一為應循環相代所以不已也端蒙問天下只有箇感應曰事事物物皆有感應寤寐語默動靜亦然譬如氣聚則風起風止則氣復聚感應二字有二義以感對應而言則彼感而此應專於感而言則感又兼應意如感恩感德之類端蒙問感只是內感曰物固有自內感者然亦不專是內感固有自外感者所謂內感如一動一靜一往一來此只是一物先後自相感如人語極須默默極須語此便是內感若有人自外來喚自家只得喚做外感感於內者自是內感於外者自是外如此看方周遍平正只做內感便偏頗了夔孫心性以穀種論則包裹底是心有秫種有粳種隨那種發出不同這便是性心是箇發出底池本作心似箇沒思量底他只會生又如服藥喫了會治病此是藥力或溫或敘便是藥性至於喫了有溫證有敘證這便是情夔孫履之問心本善發於思慮則有善不善章如何曰疑此段微有未穩處蓋凡事莫非心之所為雖放僻邪侈亦是心之為也善惡但如反覆手耳翻一轉便是惡止安頓不著也便是不善如當惻隱而羞惡當羞惡而惻隱便不是又問心之用雖有不善亦不可謂之非心否曰然伯羽問發於思慮則有善不善看來不善之發有二有自思慮上不知不覺自發出來者有因外誘然後引動此思慮者間邪之道當無所不用其力於思慮上發時便加省察更不使形於事為於物誘之際又當於視聽言動上理會取然其要又只在持敬惟敬則身心內外肅然交致其功則自無二者之病曰謂發處有兩端固是然畢竟從思慮上發者也只在外來底天理渾是一箇只不善便是不從天理出來不從天理出來便是出外底了視聽言動該貫內外亦不可謂專是外面功夫若以為在內自有一件功夫在外又有一件功夫則內外支離無此道理須是誠之於思守之於為內外交致其功可也端蒙問心本善發於思慮則有善不善程子之意是指心之本體有善而無惡及其發處則不能無善惡也胡五峰云人有不仁心無不仁先生以為下句有病如顏子其心三月不違仁是心之仁也至三月之外未免少有私欲心便不仁豈可直以為心無不仁乎端蒙近以先生之意推之莫是五峰不曾分別得體與發處言之否曰只為他説得不備若云人有不仁心無不仁心有不仁心之本體無不仁則意方足耳端蒙問心既發則可謂之情不可謂之心如何曰心是貫徹上下不可只於一處看可學既發則可謂之情不可謂之心此句亦未穩淳心生道也此句是張思叔所記疑有欠闕處必是當時改作行文所以失其文意伯豐云何故入在近思録中曰如何敢不載但只恐有闕文此四字説不盡心生道也人有是心斯具是形以生惻隱之心生道也如何曰天地生物之心是仁人之稟賦接得此天地之心方能有生故惻隱之心在人亦為生道也謨心生道也心乃生之道惻隱之心人之生道也乃是得天之心以生生物便是天之心可學問心生道也一段上面心生道莫是指天地生物之心下面惻隱之心人之生道莫是指人所得天地之心以為心蓋在天只有此理若無那形質則此理無安頓處故曰有是心斯具是形以生上面猶言繼善下面猶言成性曰上面心生道也全然做天底也不得蓋理只是一箇渾然底人與天地混合無間端蒙有是心斯具是形以生是心乃屬天地未屬我在此乃是衆人者至下面各正性命則方是我底故又曰惻隱之心人之生道也仁者天地生物之心而人物之所得以為心人未得之此理亦未嘗不在天地之間只是人有是心便自具是理以生又不可道有心了卻討一物來安頓放裏面似恁地處難看須自體認得端蒙伊川云心生道也方云生道者是本然也所以生者也曰是人為天地之心意本文云又曰生亦是生生之意蓋有是惻隱心則有是形方曰滿腔子是惻隱之心方敬子解不求諸心而求諸迹以博聞強記巧文麗詞為工以為人不知性故怠於為希聖之學而樂於為希名慕利之學曰不是他樂於為希名慕利之學是他不知聖之可學別無可做只得向那裏去若知得有箇道理可以學做聖人他豈不願為緣他不知聖人之可學飽食終日無所用心不成空過須討箇業次弄或為詩或作文是他沒著渾身處只得向那裏去俗語所謂無圖之輩是也因曰世上萬般皆下品若見得這道理高見世間萬般皆低故這一段緊要處只在先明諸心上蓋先明諸心了方知得聖之可學有下手處方就這裏做工夫若不就此如何地做僩以下第二卷好學論入集注者已附本章舜弼問定性書也難理會曰也不難定性字説得也詫異此性字是箇心字意明道言語甚圓轉初讀未曉得都沒理會子細看卻成段相應此書在鄠時作年甚少淳明道定性書自胸中瀉出如有物在後面逼逐他相似皆寫不辨直卿曰此正所謂有造道之言曰然只是一篇之中都不見一箇下手處蜚卿曰擴然而大公物來而順應這莫是下工處否曰這是説已成處且如今人私欲萬端紛紛擾擾無可奈何如何得他大公所見與理皆是背馳如何便得他順應道夫曰這便是先生前日所謂也須存得這箇在曰也不由你存此心紛擾看著甚方法也不能得他住這須是見得須是知得天下之理都著一毫私意不得方是所謂知止而後有定也不然只見得他如生龍活虎相似更把捉不得道夫問定性書云大率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然曰此一書首尾只此兩項伊川文字段數分明明道多只恁成片説將去初看似無統子細理會中問自有路脈貫串將去君子之學莫若擴然而大公物來而順應自後許多説話都只是此二句意艮其背不獲其身行其庭不見其人此是説擴然而大公孟子曰所惡於智者為其鑿也此是説物來而順應第能於怒時遽忘其怒而觀理之是非遽忘其怒是應廓然而大公而觀理之是非是應物來而順應這須子細去看方始得賀孫明道答橫渠定性未能不動一章明道意言不惡事物亦不逐事物今人惡則全絶之逐則又為物引將去惟不拒不流泛應曲當則善矣蓋橫渠有意於絶外物而定其內明道意以為須是內外合一動亦定靜亦定則應物之際自然不纍於物苟只靜時能定則動時恐卻被物誘去矣端蒙問聖人動亦定靜亦定所謂定者是體否曰是曰此是惡物來感時定抑善惡來皆定曰惡物來不感這裏自不接曰善物則如何曰當應便應有許多分數來便有許多分數應這裏自定曰子哭之慟而何以見其為定曰此是當應也須是擴然而大公物來而順應再三誦此語以為説得圓淳問聖人定處未詳曰知止而後有定只看此一句便了得萬物各有當止之所知得則此心自不為物動曰舜號泣于旻天象憂亦憂象喜亦喜當此時何以見其為定曰此是當應而應當應而應便是定若不當應而應便是亂了當應而不應則又是死了淳問天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若擴然而大公物來而順應學者卒未到此奈何曰雖未到此規模也是恁地擴然大公只是除卻私意事物之來順他道理應之且如有一事自家見得道理是恁地卻有箇偏曲底意思要為那人便是不公便逆了這道理不能順應聖人自有聖人大公賢人自有賢人大公學者自有學者大公又問聖賢大公固未敢請學者之心當如何曰也只要存得這箇在克去私意這兩句是有頭有尾説話大公是包説順應是就裏面細説公是忠便是維天之命於穆不已順應便是乾道變化各正性命道夫擴然而大公是寂然不動物來而順應是感而遂通僩趙致道問自私者則不能以有為為應迹用智者則不能以明覺為自然所謂天地之常以其心普萬物而無心聖人之常以其情順萬事而無情所謂普萬物順萬事者即廓然而大公之謂無心無情者即物來而順應之謂自私則不能廓然而大公所以不能以有為為應迹用智則不能物來而順應所以不能以明覺為自然曰然銖明道云不能以有為為應迹應迹謂應事物之迹若心則未嘗動也端蒙問昨日因説程子謂釋氏自私味道舉明道答橫渠書中語先生曰此卻是舉常人自私處言之若據自私而用智與後面治怒之説則似乎説得淺若看得説那自私則不能以有為為應迹用智則不能以明覺為自然則所指亦大闊矣先生曰固然但明道總人之私意言耳味道又舉反鑑索照與夫惡外物之説先生曰此亦是私意蓋自常人之私意與佛之自私皆一私也但非是專指佛之自私言耳又曰此是程子因橫渠病處針之然有一般人其中空疏不能應物又有一般人溺於空虛不肯應物皆是自私若能豁然而大公則上不陷於空寂下不纍於物欲自能物來而順應廣賀孫録云漢卿前日説佛是自私味道舉明道自私用智之語亦是此意先生嘗以此自私説較粗是常人之自私某細思之如自私則不能以有為為應迹用智則不能以明覺為自然亦是説得煞恐只是佛氏之自私先生曰此説得較闊兼兩意也是見橫渠説得有這病故如此説賀孫云今以惡外物之心求照無物之地猶反鑑而索照也亦是説絶外物而求定之意曰然但所謂自私而用智如世人一等嗜欲也是不能以有為為應迹如異端絶滅外物也是不能以有為為應迹若廓然大公物來順應便都不如此上不淪於空寂下不纍於物欲問定性書所論固是不可有意於除外誘然此地位高者之事在初學恐亦不得不然否曰初學也不解如此外誘如何除得有當應者也只得順他便看理如何理當應便應不當應便不應此篇大綱只在廓然而大公物來而順應兩句其他引易孟子皆是如此末謂第能於怒時遽忘其怒而觀理之是非一篇著力緊要只在此一句遽忘其怒便是擴然大公觀理之是非便是物來順應明道言語渾淪子細看節節有條理曰內外兩忘是內不自私外應不鑿否曰是大抵不可以在內者為是而在外者為非只得隨理順應淳先生舉人情易發而難制者惟怒為甚惟能於怒時遽忘其怒而觀理之是非舊時謂觀理之是非才見己是而人非則其爭愈力後來看不如此如孟子所謂我必不仁也其自反而仁矣其橫逆由是也則曰此亦妄人而已矣璘人情易發而難制明道云人能於怒時遽忘其怒亦可見外誘之不足惡而於道亦思過半矣此語可見然有一説若知其理之曲直不必校卻好若見其直而又怒則愈甚大抵理只是此理不在外求若於外復有一理時卻難為只有此理故可學問聖人恐無怒容否曰怎生無怒容合當怒時必亦形於色如要去治那人之罪自為笑容則不可曰如此則恐涉忿怒之氣否曰天之怒雷霆亦震舜誅四凶當其時亦須怒但當怒而怒便中節事過便消了更不積淳問定性書是正心誠意功夫否曰正心誠意以後事宇伊川謂雖無邪心苟不合正理即妄也如楊墨何嘗有邪心只是不合正理義剛先生以伊川答方道輔書示學者曰他只恁平鋪無緊要説出一來只是要移易他一兩字也不得要改動他一句也不得道夫問蘇季明以治經為傳道居業之事居常講習只是空言無益質之兩先生何如曰季明是橫渠門人祖橫渠修辭之説以立言傳後為修辭是為居業明道與説易上修辭不恁地修辭只是如非禮勿言若修其言辭正為立己之誠意乃是體當自家敬以直內義以方外之實事便是理會敬義之實事便是表裏相應敬以直內義以方外便是立誠道之浩浩何處下手惟立誠才有可居之處有可居之處則可以修業業便是逐日底事業恰似日課一般忠信所以進德為實下手處如是心中實見得理之不妄如惡惡臭如好好色常常恁地則德不期而進矣誠便即是忠信修省言辭便是要立得這忠信若口不擇言只管逢事便説則忠信亦被汩沒動蕩立不住了明道便只辨他修辭二字便只理會其大規模伊川卻與辨治經便理會細密都無縫罅又曰伊川也辨他不盡如講習不止只是治經若平日所以講習父慈子孝兄友弟恭與應事接物有合講者或更切於治經亦不為無益此更是一箇大病痛賀孫孟子才高學之無可依據為他元來見識自高顏子才雖未嘗不高然其學卻細膩切實所以學者有用力處孟子終是粗端蒙伊川曰學者須是學顏子孟子説得粗不甚子細只是他才高自至那地位若學者學他或會錯認了他意思若顏子説話便可下手做孟子底更須解説方得賀孫蔡問孟子無可依據學者當學顏子如養氣處豈得為無可依據曰孟子皆是要用顏子須就己做工夫所以學顏子則不錯淳問且省外事但明乎善惟進誠心只是教人鞭辟近裏竊謂明善是致知誠心是誠意否曰知至即便意誠善才明誠心便進又問其文章雖不中不遠矣便是應那省外事一句否曰然外事所可省者即省之所不可省者亦強省不得善只是那每事之至理文章是威儀制度所守不約泛濫無功説得極切這般處只管將來玩味則道理自然都見又曰這般次第是呂與叔自關中來初見二程時説話蓋橫渠多教人禮文制度之事他學者自管用心不近裏故以此説教之然只可施之與叔諸人若與龜山言便不著地頭了公今看了近思録看別經書須將遺書兼看蓋他一人是一箇病痛故程先生説得各各自有精采道夫且省外事但明乎善惟進誠心是且理會自家切己處明善了又更須看自家進誠心與未賀孫學者識得仁體實有諸己只要義理裁培識得與實有須做兩句看識得是知之也實有是得之也若只識得只是知有此物卻須實有諸己方是己物也問明道説學者識得仁體實有諸己只要義理栽培一段只緣他源頭是箇不忍之心生生不窮故人得以生者其流動發生之機亦未嘗息故推其愛則視夫天地萬物均受此氣均得此理則無所不當愛曰這道理只熟看久之自見如此硬樁定説不得如云從他源頭上便有箇不忍之心生生不窮此語有病他源頭上未有物可不忍在未説到不忍在只有箇陰陽五行有闔闢有動靜自是用生不是要生到得説生物時又是流行已後既是此氣流行不息自是生物自是愛假使天地之間淨盡無一物只留得這一箇物事他也自愛如云均受此氣均得此理所以須用愛也未説得這裏在此又是説後來事此理之愛如春之溫天生自然如此如火相似炙著底自然熱不是使他熱也因舉東見録中明道曰學者須先識仁仁者渾然與物同體義禮智信皆仁也云云極好當添入近思録中僩心只是放寬平便大不要先有一私意隔礙便大心大則自然不急迫如有禍患之來亦未須驚恐或有所獲亦未有便歡喜在少間亦未必禍更轉為福福更轉為禍荀子言君子大心則天而道小心則畏義而節蓋君子心大則是天心心小則文王之翼翼皆為好也小人心大則放肆心小則是褊隘私吝皆不好也賀孫明道以上蔡記誦為玩物喪志蓋為其意不是理會道理只是誇多鬥靡為能若明道看史不差一字則意思自別此正為己為人之分賀孫問禮樂只在進反之間便得情性之正記曰禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文恐減與盈是禮樂之體本如此進與反卻是用功處否曰減是退讓撙節收斂底意思是禮之體本如此進者力行之謂盈是和説舒散快滿底意思是樂之體如此反者退斂之謂禮主其減卻欲進一步向前著力去做樂主其盈卻須退斂節制收拾歸裏如此則禮減而卻進樂盈而卻反所以為得情性之正也故曰減而不進則消盈而不反則亡也因問如此如禮樂相為用矣曰然銖問禮樂只在進反之間便得性情之正何謂也曰記得禮減而進以進為文樂盈而反以反為文禮如凡事儉約如收斂恭敬便是減須當著力向前去做便是進故以進為文樂如歌詠和樂便是盈須當有箇節制和而不流便是反故以反為文禮減而卻進前去樂盈而卻反退來便是得情性之正淳禮主其減者禮主於撙節退遜檢束然以其難行故須勇猛力進始得故以進為文樂主其盈者樂主於舒暢發越然一向如此必至於流蕩故以反為文禮之進樂之反便得情性之正又曰主減者當進須力行將去主盈者當反須回顧身心禮樂進反禮主於減謂主於斂束然斂束太甚則將久意消了做不去故以進為文則欲勉行之樂主於盈謂和樂洋溢然太過則流故以反為文則欲回來減些子故進反之間便得情性之正不然則流矣端蒙問禮樂進反之説曰禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮以謙遜退貶為尚故主減然非人之所樂故須強勉做將去方得樂以發揚蹈厲為尚故主盈然樂只管充滿而不反則文也無收殺故須反方得故云禮減而不進則銷樂盈而不反則放故禮有報而樂有反所以程子謂只在進反之間便得性情之正道夫天分即天理也父安其父之分子安其子之分君安其君之分臣安其臣之分則安得私故雖行一不義殺一不辜而得天下有所不為賀孫論學便要明理論治便須識體這體字只事理合當做處凡事皆有箇體皆有箇當然處問是體段之體否曰也是如此又問如為朝廷有朝廷之體為一國有一國之體為州縣有州縣之體否曰然是箇大體有格局當做處如作州縣便合治告訐除盜賊勸農桑抑末作如朝廷便須開言路通下情消朋黨如為大吏便須求賢才去贓吏除暴斂均力役這箇都是定底格局合當如此做或問云云曰不消如此説只怕人傷了那大體如大事不曾做得卻以小事為當急便害了那大體如為天子近臣合當謇諤正直又卻恬退寡默及至處鄉里合當閉門自守躬廉退之節又卻向前要做事這箇便都傷了那大體如今人議論都是如此合當舉賢才而不舉而曰我遠權勢合當去姦惡而不去而曰不為已甚且如國家遭汴都之禍國於東南所謂大體者正在於復中原雪讎恥卻曰休兵息民兼愛南北正使真箇能如此猶不是況為此説者其實只是懶計而已僩根本須是先培壅涵養持敬便是栽培賀孫問根本須是先培壅然後可立趨向曰此段只如弟子入孝出第行謹言信愛衆親仁行有餘力則以學文之意耳先只是從實上培壅一箇根腳卻學文做工夫去端蒙仲思問敬義夾持直上達天德自此曰最是他下得夾持兩字好敬主乎中義防於外二者相夾持要放下霎時也不得只得直上去故便達天德伯羽敬義夾持直上達天德自此表裏夾持更無東西走作去處上面只更有箇天德忠信所以進德修辭立其誠所以居業者乾道也敬以直內義以方外者坤道也只是健順又曰非禮勿視聽言動者乾道出門如見大賓使民如承大祭者坤道又曰公但看進德立誠是甚模樣強健賀孫敬義夾持直上達天德自此直上者無許多人欲牽惹也因説敬恕先生舉明道語云敬義夾持直上達天德自此而今有一樣人裏面謹嚴外面卻苴有人外面恁地寬恕裏面卻都是私意了內外夾持如有人在裏面把住一人在門外把持不由他不上去夔孫問正其義不謀其利明其道不計其功道義如何分別曰道義是箇體用道是大綱説義是就一事上説義是道中之細分別功是就道中做得功效出來宇問正其義者凡處此一事但當處置使合宜而不可有謀利占便宜之心明其道則處此事便合義是乃所以為明其道而不可有計後日功效之心正義不謀利在處事之先明道不計功在處事之後如此看可否曰恁地説也得他本是合掌説看來也須微有先後之序僩子蒙録云或問正義在先明道在後曰未有先後此只是合掌底意思正其義不謀其利明其道不計其功或曰事成之謂利所以有義功成則是道便不是惠迪吉從逆凶然惠迪亦未必皆吉可學楊問膽欲大而心欲小如何曰膽大是千萬人吾往處天下萬物不足以動其心貧賤不能移威武不能屈皆是膽大心小是畏敬之謂文王小心翼翼曾子戰戰兢兢臨深履薄是也問橫渠言心大則百物皆通心小則百物皆病何如曰此心小是卑陋狹隘事物來都沒奈何打不去只管見礙皆是病如要敬則礙和要仁則礙義要剛則礙柔這裏只看得一箇更著兩箇不得為敬便一向拘拘為和便一向放肆沒理會仁便煦煦姑息義便粗暴決裂心大便能容天下萬物有這物則有這理有那物即有那道理並行而不相悖並育而不相害宇膽欲大而心欲小戰戰兢兢如臨深淵方能為赳赳武夫公侯干城之事德明蜚卿云智欲圓而行欲方膽欲大而心欲小妄意四者缺一不可曰圓而不方則譎詐方而不圓則執而不通志不大則卑陋心不小則狂妄江西諸人便是志大而心不小者也道夫或問智欲圓而行欲方智欲圓轉若行不方正而合於義則相將流於權謀譎詐之中所謂智欲圓而行欲方也曰也是如此又曰智是對仁義禮智信而言須是知得是非方謂之智不然便是不智子蒙問學不言而自得者乃自得也曰道理本自廣大只是潛心積慮緩緩養將去自然透熟若急迫求之則是起意去趕趁他只是私意而已安足以入道僩問視聽思慮動作皆天也人但於中要識得真與妄耳真妄是於那發處別識得天理人欲之分如何曰皆天也言視聽思慮動作皆是天理其順發出來無非當然之理即所謂真其妄者卻是反乎天理者也雖是妄亦無非天理只是發得不當地頭譬如一草木合在山上此是本分今卻移在水中其為草木固無以異只是那地頭不是恰如善固性也惡亦不可不謂之性之意端蒙問視聽思慮動作皆天之所為及發而不中節則是妄故學者須要識別之曰妄是私意不是不中節道夫曰這正是顏子之所謂非禮者曰非禮處便是私意道夫役智力於農圃內不足以成己外不足以治人是濟甚事賀孫進德則自忠恕是從這裏做出來其致則公平言其極則公平也端蒙問公只是仁底道理仁卻是箇流動發生底道理故公而以人體之方謂之仁否曰此便是難説公而以人體之此一句本微有病然若真箇曉得方知這一句説得好所以程先生又曰公近仁蓋這箇仁便在這人字上你元自有這仁合下便帶得來只為不公所以蔽塞了不出來若能公仁便流行譬如溝中水被沙土罨靸壅塞了故水不流若能擔去沙土罨靸水便流矣又非是去外面別擔水來放溝中是溝中元有此水只是被物事壅遏了去其壅塞水便流行如克己復禮為仁所謂克己復禮者去其私而已矣能去其私則天理便自流行不是克己了又別討箇天理來放在裏面也故曰公近仁又問公所以能恕所以能愛恕則仁之施愛則仁之用愛是仁之發處恕是推其愛之之心以及物否曰如公所言亦非不是只是自是湊合不著都無滋味若道理只是如此看又更做甚麼所以只見不長進正緣看那物事沒滋味又問莫是帶那上文公字説否曰然恕與愛本皆出於仁然非公則安能恕安能愛又問愛只是合下發處便愛未有以及物在恕則方能推己以及物否曰仁之發處自是愛恕是推那愛底愛是恕之所推者若不是恕去推那愛也不能及物也不能親親仁民愛物只是自愛而已若裏面元無那愛又只推箇甚麼如開溝相似是裏面元有這水所以開著便有水來若裏面元無此水如何會開著便有水若不是去開溝縱有此水也如何得他流出來愛水也開之者恕也又問若不是推其愛以及物縱有此愛也無可得及物否曰不是無可得及物若不能推則不能及物此等處容易曉如何恁地難看僩問仁之道只消道一公字公是仁之理公而以人體之故曰仁竊謂仁是本有之理公是克己功夫到處公所以能仁所謂公而以人體之者若曰己私既盡只就人身上看便是仁體猶骨也如體物不可遺之體貞者事之幹之類非體認之體也曰公是仁之方法人是仁之材料有此人方有此仁蓋有形氣便具此生理若無私意間隔則人身上全體皆是仁如無此形質則生意都不湊泊他所謂體者便作體認之體亦不妨體認者是將此身去裏面體察如中庸體群臣之體也銖問向日問公而以人體之則為仁先生曰體作體認之體亦不妨銖思之未達竊謂有此人則具此仁然人所以不仁者以其私也能無私心則此理流行即此人而此仁在矣非是公後又要去體認尋討也先生顧楊至之謂曰仁字叔重説得是了但認體字未是體者乃是以人而體公蓋人撑起這公作骨子則無私心而仁矣蓋公只是一箇公理仁是人心本仁人而不公則害夫仁故必體此公在人身上以為之體則無所害其仁而仁流行矣作如此看方是銖問公而以人體之如何曰仁者心之德在我本有此理公卻是克己之極功惟公然後能仁所謂公而以人體之者蓋曰克盡己私之後就自家身上看便見得仁也謨公而以人體之故為仁蓋公猶無塵也人猶鏡也仁則猶鏡之光明也鏡無纖塵則光明人能無一毫之私欲則仁然鏡之明非自外求也只是鏡元來自有這光明今不為塵所昏爾人之仁亦非自外得也只是人心元來自有這仁今不為私欲所蔽爾故人無私欲則心之體用廣大流行而無時不仁所以能愛能恕仁之名不從公來乃是從人來故曰公而以人體之則為仁端蒙仁之道只消道一公字非以公為仁須是公而以人體之伊川自曰不可以公為仁世有以公為心而慘刻不恤者須公而有惻隱之心此功夫卻在人字上蓋人體之以公方是仁若以私欲則不仁矣公而以人體之為仁仁是人心所固有之理公則仁私則不仁未可便以公為仁須是體之以人方是仁公恕愛皆所以言仁者也公在仁之前恕與愛在仁之後公則能仁仁則能愛能恕故也謨李問仁欲以公愛恕三者合而觀之如何曰公在仁之先愛恕在仁之後又問公而以人體之一句曰緊要在人字上仁只是箇人淳公所以為仁故伊川云非是以公便為仁公而以人體之仁譬如水泉私譬如沙石能壅卻泉公乃所以決去沙石者也沙石去而水泉出私去而仁復也德明謂仁只是公固若未盡謂公近仁耳又似太疏伊川曰只是一箇公字學者問仁則常教他將公字思量此是先生晚年語平淡中有意味顯道記憶語及入關語録亦有數段更宜參之鎬或問恕則仁之施愛則仁之用施與用如何分別曰恕之所施施其愛爾不恕則雖有愛而不能及人也銖問恕則仁之施愛則仁之用施與用何以別曰施是從這裏流出用是就事説推己為恕恕是從己流出去及那物愛是才調恁地愛如水恕如水之流又問先生謂愛如水恕如水之流淳退而思有所未合竊謂仁如水愛如水之潤恕如水之流不審如何曰説得好昨日就過了淳問恕則仁之施愛則仁之用施與用如何分曰恕是分俵那愛底如一桶水愛是水恕是分俵此水何處一杓故謂之施愛是仁之用恕所以施愛者銖恕則仁之施愛則仁之用施用兩字移動全不得這般處惟有孔孟能如此下自荀揚諸人便不能便可移易昔有言盡己之謂忠盡物之謂恕伊川言盡物只可言信推己之謂恕蓋恕是推己只可言施如此等處極當細看道夫或問力行如何是淺近語曰不明道理只是硬行又問何以為淺近曰他只是見聖賢所為心下愛硬依他行這是私意不是當行若見得道理時皆是當恁地行又問這一點意氣能得幾時了是如何曰久時將次只是恁地休了節涵養須用敬進學則在致知無事時且存養在這裏提撕警覺不要放肆到講習應接時便當思量義理淳楊子順問涵養須用敬涵養甚難心中一起一滅如何得主一曰人心如何教他不思如周公思兼三王以施四事豈是無思但不出於私則可曰某多被思慮紛擾思這一事又牽走那事去雖知得亦自難止曰既知得不是便當絶斷了淳涵養此心須用敬譬之養赤子方血氣未壯實之時且須時其起居飲食養之於屋室之中而謹顧守之則有向成之期才方乳保卻每日暴露於風日之中偃然不顧豈不致疾而害其生耶大雅問伊川謂敬是涵養一事敬不足以盡涵養否曰五色養其目聲音養其耳義理養其心皆是養也賀孫用之問學者思先立標準如何曰如必有事焉而勿正之謂而今雖道是要學聖人亦且從下頭做將去若日日恁地比較也不得雖則是曰舜何人也豫何人也若只管將來比較不去做工夫又何益賀孫問學者做工夫須以聖人為標準如何卻説得不立標準曰學者固當以聖人為師然亦何須得先立標準才立標準心裏便計較思量幾時得到聖人處聖人田地又如何便有箇先獲底心顏淵曰舜何人也豫何人也有為者亦若是也只是如此平説教人須以聖賢自期又何須先立標準只恁下著頭做少間自有所至僩尹和靖從伊川半年後方見得西銘大學不知那半年是在做甚麼想見只是且教他聽説話曾光祖云也是初入其門未知次第驟將與他看未得先生曰豈不是如此又曰西銘本不曾説理一分殊因人疑後方説此一句義剛問尹彥明見程子後半年方得大學西銘看此意如何曰也是教他自就切己處思量自看平時箇是不是未欲便把那書與之讀曰如此則末後以此二書併授之還是以尹子已得此意還是以二書互相發故曰他好把西銘與學者看他也是要教他知天地間有箇道理恁地開闊道夫昨夜説尹彥明見伊川後半年方得大學西銘看此意思也好也有病蓋且養他氣質淘潠去了那許多不好底意思如學記所謂未卜禘不視學遊其志也之意此意思固好然也有病者蓋天下有多少書若半年間都不教他看一字幾時讀得天下許多書所以尹彥明終竟後來工夫少了易曰盛德大業至矣哉富有之謂大業須是如此方得天下事無所不當理會者才工夫不到業無由得大少間措諸事業便有欠缺此便是病或曰想得當時大學亦未成倫緒難看在曰然尹彥明看得好想見煞著日月看臨了連格物也看錯了所以深不信伊川今日格一件明日格一件之説是看箇甚麼或曰和靖才力極短當初做經筵不見得若便當難劇想見做不去曰只他做經筵也不奈何説得話都不痛快所以難能解經而通世務者無如胡文定然教他做經筵又都不肯一向辭去要做春秋解不知是甚意思蓋他有退而著書立言以垂後世底意思無那措諸事業底心縱使你做得了將上去知得人君是看不看若朝夕在左右説豈不大有益是合下不合有這著書垂世底意思故也人説話也難有説得響感動得人者如明道會説所以上蔡説才到明道處聽得他説話意思便不同蓋他説得響自是感發人伊川便不似他伊川説話方終是難感動人或曰如與東坡們説話固是他們不是然終是伊川説話有不相乳入處曰便是説話難只是這一樣説話只經一人口説便自不同有説得感動人者有説得不愛聽者近世所見會説話説得響令人感動者無如陸子靜可惜如伯恭都不會説話更不可曉只通寒暄也聽不得自是他聲音難曉子約尤甚僩問謝氏説何思何慮處程子道恰好著工夫此是著何工夫曰人所患者不能見得大體謝氏合下便見得大體處只是下學之功夫卻欠程子道恰好著工夫便是教他著下學底工夫淳
