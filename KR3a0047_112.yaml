body:
  text: 朱子語類卷第一百一十二朱子九論官周不置三公之官只是冢宰以下六卿為之周公嘗以冢宰為太師顧命乃同召太保奭芮伯彤伯畢公衛侯毛公注謂此六卿也稱公則三公矣揚或問漢三公之官與周制不同何耶曰漢初未見孔壁古文尚書中周官一篇説太師太傅太保為三公或録云自古文尚書出方有周官篇伏生口授二十五篇無周官故漢只置太尉司徒司空為三公而無周三公三少蓋未見古文尚書但見伏生口授牧誓立政篇中所説司徒司馬司空遂誤以是為三公而置之愚按漢高后元年初置少傅平帝元始元年又置太保太師然當時所建三公實司徒司馬司空非此之謂但因其字義以為師保之職故亦甚尊崇之位在三公上東漢稱為上公後世易為三師皆是意也使西漢明見周官有所據依必不若是舛矣又按漢書百官表中卻曰太師太傅太保是為三公又曰或説司馬主天司徒主人司空主土是為三公其説與周官合者豈孔氏書所謂傳之子孫以貽後代者至是私有所傳授故班固得以述之歟抑但習聞其説無所折衷故兩存之而不廢耶古文尚書至東晉時因內史梅頤始行于世東晉之前如揚雄以酒誥為虛談趙岐杜預以説命皋陶謨等篇為逸書則其證也古者諸侯之國只得置司徒司馬司空三卿為天子方得置三公三孤六卿牧誓立政所紀周是時方為諸侯乃侯國制度周官所紀則在成王時所以不同三公三孤以師道輔佐天子本是加官周公以太師兼冢宰召公以太保兼宗伯是以加官而兼宰相之職也上數語疑有未圓處後世官職益紊今遂以三公三孤之官為階官貼職之類不復有師保之任論道經邦之責矣舊來猶是文臣之有勳德重望者方除以其有輔教天子之名故也後世或以諸王或以武臣為之既是天子之子與武臣豈可任師保之責耶訛謬承襲不復釐正祖宗之法除三孤三公者必須建節或録云今加三公者又須加節度使朝廷又極惜節度使蓋節度使每月請俸千餘緡所以不輕授人本朝如韓富文杜諸公欲加三公少須建節不知是甚意加檢校太子少保少師之類然後除開府儀同三司既除開府然後除三孤三公南渡以來如張韓劉嶽諸武臣猶是如此今則不然既建節後便抹過檢校徑除開府至三孤三公矣或録云或和開府抹過加三公三少者有之又曰檢校開府以上蔭子便得文官文臣為樞密直學士者蔭子反得武官如富鄭公家子弟有為武官者是也五代以武臣為樞密使武臣或不識字故置樞密直學士令文臣輔之故奏子皆得武官本朝因而不廢文官自金紫轉特進開府然後加三公三少如富韓諸公是如此本朝置三太三少而無司徒司馬司空之三公然韓杜諸公有兼司徒司空又有守司空者皆不可曉神宗贈韓魏公尚書令令後世不得更加侍中中書令著為定制其禮極隆本朝惟韓公為然饒録云蓋已前贈者皆是以中書令兼尚書令神宗特贈尚書令者其禮極重後來蔡京改官制遂奏云昔太宗皇帝嘗為尚書令今後更不除尚書令殊不知為尚書令者乃唐太宗也故唐不除尚書令惟郭子儀功高特除子儀堅不敢受曰昔者太宗皇帝嘗為此官非人臣敢居朝廷遂加尚父之號蔡京名為紹述熙豐故事卻恣意紛更不知訛舛舉朝莫不笑之而不敢指其非又奏徽宗云嘗面奉神宗聖旨令改造尚書省尚書省者神宗所造規模極雄偉國朝以來官府所未有訖工神宗幸之見壯麗如此出令云今後輒敢少有更易者以違制論自後宰相居之輒不利王圭病死章子厚韓忠彥蔡確皆相繼斥去京惡之是時蜀中有一士人姓家迎合其意獻唐尚書省圖云唐尚書省正廳在前六曹諸司房在後今皆反是又土地堂在正廳之前今卻在後所以宰相數不利京信其説遂毀拆重造比前苟簡逼仄之甚無忌憚如此又曰本朝太宗嘗以中書令為開封尹由開封尹入禪大統故後來不除中書令尹開府者亦不敢正除必加權字蔡京改官制遂除中書令當除底不除謂尚書令不當除底卻除又尹開封者更不帶權字其悖亂無知皆此類也又京以三公為宰相令人以公相呼己而不得呼相公後來秦檜亦如此蓋倣此也或問僕射名義如何曰舊云秦時置僕射專主射恐不然禮云僕人師扶左射人師扶右即周官太僕之職君薨以是舉僕射之名蓋起於此以其朝夕親近人主後世承誤輒失其真遂以為宰相之號如侍中中書令尚書令亦是如此侍中秦官漢因之多是侍衛人主或録云或執唾壺虎子之屬行幸則從其初職甚微行則參錯於宦官之間其初猶以儒者為之如武帝時孔安國為侍中嘗掌唾壺是也以其日與人主相親故浸以用事尚書是掌群臣書奏如州郡開拆司管進呈文字凡四方章奏皆由之以達其初亦甚微只如尚衣尚食尚輦尚藥之類亦緣居中用事所以權日重按秦時少府遣吏四人在殿中主發書故謂之尚書尚猶主也中書因漢武帝遊宴後庭去外庭遠始用宦者典事謂之中書謁者或録云故置中尚書以宦者為之置令僕射尤與人主親狎故其權愈重元帝時弘恭為令石顯為僕射嘗權傾內外按蕭望之云中書政本宜用士人蓋自武帝始用宦官出入奏事非舊制也及光武即位政事不任三公而盡歸臺閣或録云臺即尚書閣即禁中也三公皆擁虛器凡天下事盡入於中書或録作中尚書嘗見後漢群臣章奏首云臣某奏疏尚書猶今言殿下陛下之類雖是不敢指斥而言亦足以見其居要地而秉重權矣當時事無巨細皆是尚書行下三公或不經由三公徑下九卿或録云三公之權反不如九卿所以漢世宦者弄權用事故東漢時不惟尚書之權重九卿之權亦重者此也按光武不任三公事歸臺閣者蓋當時謂六尚書臺猶今言尚書省也曹操開魏王府未敢即擬朝廷建官或録云置中書但置祕書令或録作監篡漢之後始改為中書監以其素承寵任故荀勗自中書遷尚書監人賀之勗曰奪我鳳凰池諸君何賀耶或録云蓋尚書又不如中書之居中用事親密也問侍中是時為何官曰黃門監即今之門下省左右散騎常侍皆黃門監之屬也西漢時中書之權重東漢時尚書之權重至此則中書之權復重而尚書之權漸輕矣問省字何義曰省即禁也舊謂之禁避漢元后父諱遂改為省儒用或録少異古者人主左右攜提執賤役若虎賁綴衣之類皆是士大夫日相親密所謂待御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧不似而今大隔絶人主極尊嚴真如神明人臣極卑屈望拜庭下不交一語而退漢世禁中侍衛亦是士大夫以孔安國大儒而執唾盂雖儀盆亦是士人執之宋文帝時大臣劉湛入見則與坐語初間愛之視日影之斜惟恐其去後來厭之視日景之斜惟恐其不去後竟殺之魏明帝初説大臣太重則國危小臣太親則身蔽當時於大臣已為之處置後來左右小臣親密至使中書令某人上床執手強草遺詔流弊便有此事漢宣懲霍光之弊事必躬親又有宦者恭顯出來光武懲王莽之弊不任三公事歸臺閣尚書御史大夫謁者謂之三臺義剛昔周公立許多官制都有統攝連屬自秦漢而下皆是因一事立一官便無些統攝連屬了燾尚書尚衣尚食尚乃主守之意秦語作平音淳漢御史大夫如本朝參知政事義剛唐官皆家京師賀孫唐之僕射即今之特進他只是恁轉將去義剛唐之兵盡付與刺史節度使其他牙將之類皆由刺史節度使辟置無如今許多官屬廣唐之朝廷有親衛有勳衛有翊衛親衛則以親王侯之子為之勳衛則以功臣之子弟為之翊衛則惟其所選公謹或問東宮官屬曰唐六典載東宮官制甚詳如一小朝廷置詹事以統衆務則猶朝廷之尚書省也置左右二春坊以領衆局則猶中書門下省也左右春坊又皆設官有各率其屬之意崇文館猶朝廷之館閣贊善大夫猶朝廷之諫議大夫其官職一視朝廷而為之降殺此等制度猶好今之東宮官屬極苟簡左右春坊舊制皆用賢德者為之今遂用武辨之小有才者其次惟有講讀數員而已如贊善大夫諸官又但為階官非實有職業神宗以唐六典改官制乃有疏略處如東宮官屬之不備是也其舊嘗入一劄子論東宮官制疏略宜放舊損益之不報又曰唐之官制亦大率因隋之舊府衛租庸調之法皆是也當時大亂殺傷之後幾無人類所以宇文泰與蘇綽能如此經營三代而下制度稍可觀者唯宇文氏耳蘇綽一代之奇才今那得一人如此儒用唐六典明皇時所選雖有是書然其建官卻不依此其書卻是齊整然其説一切繁冗迂曲神宗喜之一一依此定官制神宗本欲富強其後因此皆迂曲緩弱了左僕射行事右丞相取旨溫公元祐間甚苦之入文字要改祖宗官制雖名不齊整然其實徑直紹興間以其不便方改之二相之權均矣揚因論神宗官制右相反重前漢官制雖亂道卻是實主事神宗時反徇名亡實漢初制中書後武帝倦勤遂置內中書宦官為之石顯之類是也溫公亦私造得一制度左相主禮吏戶三部右相主兵刑工三部後有一人要令六部尚書得自執奏亦不行今左右相兼掌三省事揚方今朝廷只消置一相三參政兼六曹如吏兼禮戶兼工兵兼刑樞密可罷如此則事易達又如宰相擇長官長官卻擇其寮今銓曹注擬小官繁據而又不能擇賢每道只令監司差除亦好每道仍只用一監司人傑因舉陸宣公之言以為豈有為臺閣長官則不能擇一二屬吏為宰相則可擇千百具寮曰此説極是當時如沈既濟亦有此説之意人傑嘗與劉樞言某做時且精選一箇吏部尚書使得盡搜羅天下人才諸部官長得自辟屬官卻要過中書吏部尚書考察朝官未闕人時亦未得薦俟次第闕人卻令侍從以下各舉一人二人只舉一二人彼亦不敢以大段非才者進今常常薦人一切都淡了又併天下監司一路只著一漕一憲茶鹽將兼了因論尹穡不著胸中不好時卻尚解理會事當時多併了官司後來又復了揚陳同父謂今要得國富兵強須是分諸路為六段六曹尚書領之諸州有事祇經諸曹尚書奏裁取旨又每一歲或二歲使一巡歷庶幾下情可達先生曰若廣中四川之類使之巡歷則其本曹亦有廢弛之患陳曰劇曹則所領者少若路遠則兵工部可為也曰此亦是一説道夫古者王畿千里而已然官屬已各令其長推擇今天下之大百官之衆皆總於吏部下至宰執幹辦使臣特其家私僕爾亦須吏部差注所以只是羇羇地鶻突差將去何暇論其人之材否今朝廷舉事三省下之六部六部下之監寺監寺卻申上六部六部又備申三省三省又依所申行下只祠祭差官其人不過在朝職事官其姓名亦豈難記然省中必下之禮部禮部行下太常太常方擬定申部部申省省方從其所申差官不知何用如此迂曲只三省事亦然尚書關中書取旨中書送門下審覆門下送尚書施行又如既有六部即無用九卿周家只以六卿分職漢人只以九卿釐庶務事各歸一本朝建官重三疊四多少勞擾此須大有為後痛更革之若但宰相有志亦不能辦必得剛健大有為之君自要做時方可書曰亶聰明作元后元后作民父母須是剛明智勇出人意表之君方能立天下之事又如今諸路兵將官有總管路分路鈐都監監押正將副將都不曾管一事廂軍既無用又養禁軍禁軍又分揀中不揀中兩等然亦無用又別養大軍今大軍亦漸如廂禁軍矣此是耗囁多少通其變使民不倦今變而不通民皆倦了故鼓舞不動國初緣藩鎮強故收其兵權置通判官故已無前日可防之弊卻依舊守此法可謂不知變也只通判是要何用繆者事事不管只任知州自為強者又必妄作以撓郡政是何益哉必大自秦置守尉監漢有郡守刺史如今監司專主按察至漢末令刺史掌兵遂侵郡守之權兼治民事而刺史之權獨重後來或置或否漢有十二州百三郡郡有太守州有刺史歷代添置州名愈多而郡愈少又其後也遂去郡而為州故刺史兼治軍民而守廢至隋又置郡守後又廢守置刺史而刺史遂為太守之職某嘗説不用許多監司每路只置一人復刺史之職正其名曰按察使令舉刺州縣官吏其下卻置判官數員以佐之如轉運判官刑獄判官農田判官之類農田專主婚田轉運專主財賦刑獄專主盜賊而刺史總之稍重諸判官之權資序視通判而刺史視太守判官有事欲奏聞則刺史為之發奏刺史不肯發則許判官自徑申御史臺尚書省以分刺史之權蓋刺史之權獨專則又不便若其人昏濁則害貽一路百姓無出氣處故又須略重判官之權諸判官下卻置數員屬官如職幕官之類如此則重權歸一太守自治州事而刺史則舉刺一路豈不簡徑省事而無煩擾耗囁之弊矣問今之主管資格亦視通判曰然但權輕不能有所為只得奉承運使而已若分為判官俾得專達則其權重而監司亦不敢妄作矣僩姚崇擇十道使之説甚善范富天章所條亦只説到擇監司而已今諸路監司猥衆恰如無一般不若每路只擇一賢監司其餘悉可省罷監司每路只須留一人揀其無風力者且與一郡而擇去之必大銓擇之法只好京官付之監司選人付之郡守各令他隨材擬職州申監司監司申吏部長二審察聞奏下授其職卻令宰相擇監司吏部擇郡守如此則朝廷亦可無事又何患其不得人道夫朝廷只當擇監司太守自餘職幕縣官容他各辟所知方可責成天下須是放開做使恢恢有餘地乃可浩因論薦舉之弊曰亦不難革只是擇諸路監司并得一好吏部尚書揀薦得不是人材者退去便須得人今胡亂薦來但不犯贓罪便得若犯了贓不過降得兩官安得不胡薦監司薦人後犯贓犯罪須與鐫三五資正郎則降為員郎員郎則降為承議郎以下若已為侍從或無職名可鐫則鐫其俸或一切不與奏薦如此則方始得它痛恁地也須怕今都不損它一毫道夫只管説官冗何不於任子上更減今員外所得恩數展至正郎正郎恩數迤邐展上合奏京官者且與選人又何害不肯索性理會一番只是恐人怨謗祖宗時亦幾次省削了久而自定何足恤耶浩兵制官制田制便考得三代西漢分明然與今日事勢名實皆用不得如官制不若且就今日之官罷其冗員存其當存者亦自善必大某嘗謂宰相是舜禹伊周差遣下此亦須房杜姚宋之徒方能處置得天下事後之當此任者怪他不能當天下之事不得是他人品只如此力量有所不足如何強得振客有為固始尉言淮甸無備甚先生曰大臣慮四方若位居宰相也須慮周於四方始得如今宰相思量得一邊便全然掉卻那一邊如人為一家之長一家上下也須常常都計挂在自家心下始得賀孫今日言事官欲論一事一人皆先探上意如何方進文字振先生閲報狀見臺中有論列章疏歎曰射人須射馬擒賊須擒王如何卻倒了道夫古人云左史書言右史書動今也恁地分不得只合合而記之直卿曰所可分者事而已曰也分不得所言底便行出此事來道夫國子司業學官尚可為天下人材所聚庶幾有可講學成就者然今日為之明日便當改作使士人毋以利為心若君無尊德樂道之誠必不能用方治愈大則愈難為監司不如做郡做郡不如做縣蓋這裏有仁愛心便隔這一重要做件事他不為做便無緣得及民淳某嘗謂今做監司不如做州郡做州郡不如做一邑事體卻由自家監司雖大於州州雖大於邑然都被下面做翻了上面如何整頓道夫為守令第一是民事為重其次則便是軍政今人都不理會道夫俞亨宗云某做知縣只做得五分曰何不連那五分都做了自修襄陵許子禮作縣法開收人丁推割産稅二句方開落丁口推割産錢是治縣八字法詞牒無情理者不必判先減書鋪及勒供罪狀不得告訐之類葉子昂催稅只約民間逐限納錢上州縣不留錢德明有一朋友作宰通監司書先説無限道理陳公亮作帥謂之曰若要理會職事且不須此迂闊某以為名言人傑前輩説話可法某嘗見吳公路云他作縣不敢作旬假一日假則積下一日事到底自家用做轉添得繁劇則多粗率不子細豈不害事道夫謂李思永曰衡陽訟牒如何思永曰無根之訟甚多先生曰與他研窮道理分別是非曲直自然訟少若厭其多不與分別愈見事多蓋卿問德粹婺源旱如何滕答云云先生曰最有一件事是今日大弊旱則申雨檢荒則云熟火燒民家則減數奏到處如此可學某人為太守當見客日分先見過客方接同官及寄居賓人問其故曰同官有稟議待商量區處頗費時節過客多是略見即行若停軋在後恐妨行色此事可法賀孫朝廷設教官一件大未是後生為教官便做大了只歷一兩任教官便都不了世事須是不拘科甲到五十方可為之不然亦須四十五淳律主簿管押一縣簿凡事盡與之知録事録一郡事太守有事許知録奏聞謂之知録者以官稍大如今知縣之類揚官無大小凡事只是一箇公若公時做得來也精采便若小官人也望風畏服若不公便是宰相做來做去也只得箇沒下梢與立今之仕宦不能盡心盡職者是無那先其事而後其食底心端蒙嘗歎州縣官碌碌民無所告訴兼民情難知耳目難得其人看來如何明察亦多有不知者以此觀之若是見得分明決斷時豈可使有毫髮不盡又歎云民情難知如此只是將甚麼人為耳目之寄賀孫如看道理辨是非又須是自高一著方判決得別人説話如堂上之人方能看堂下之人若身在堂下如何看見子細又如今兩人冢炒自家要去決斷他須是自家高得他若與他相似也斷他不得況又不如他李雖不與熟嘗於其見先人時望見之先人稱其人有才略因云今做官人幾時箇箇是闒冗人多是要立作向上那箇不説道先著馭吏少間無有不拱手聽命於吏者這只是自家不見得道理事來都區處不下吏人弄得慣熟卻見得高於他只得委任之又云如圍棋一般兩人初著那箇不要勝誰肯去就死地自做活計這只是見不高無奈何賀孫胡致堂言吏人不可使他知我有恤他之意此説極好又曰此已是恤他不可恤小處可恤大處不可恤又曰三五十錢底可恤若有人來理會亦須治他節某與諸公説下梢去仕宦不可不知須是有旁通歷逐日公事開項逐一記了即勾之未了須理會教了方不廢事賀孫當官文書簿曆須逐日結押不可拖下僩前輩檢驗皆有書當官者不可不知極多樣僩因民戶計較沮撓社倉倉官而知縣不恤曰此事從來是官吏見這些米不歸於官吏所以皆欲沮壞其事今若不存官倉數年之間立便敗壞雖二十來年之功俱為無益賀孫人居官要應副親戚非理做事只説道囑託所得貨賄親戚受之這是甚麼底事敢胡亂做因説吳公路為本路憲崇安宰上世與之有契在邑恣行無所不至有訴於吳其罪甚衆只謂其上世有恩於我我今居官終不成以法相繩遂寬釋訟者遣之斯人益肆其暴虐邑民皆無所告訴看來固當不忘上世之恩若以私恩一向廢法又如何當官漢武帝不以隆慮公主之故而赦其子昭平君雖其初以金錢豫贖其死罪後竟付之法云法令者先帝之所造也奈何以弟故廢先帝法吾何面目入高廟乎東方朔上壽曰臣聞聖主為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二帝三王之所重也陛下行之天下幸甚夫天討有罪是大小大事豈可以私廢直卿云若是吳憲待崇安宰雖當一付之法還亦有少委曲否曰如恩舊在部屬未欲一置于法亦須令尋醫去可也賀孫為稅官若是父兄宗族舟船過只得稟白州府請別委官檢稅豈可直拔放去所以祖宗立法許相回避又曰臨事須是分毫莫放過如某當官或有一相識親戚之類如此越用分明不肯放過道夫或欲圖神綱厚賞者曰譬如一盤珍饌五人在坐我愛喫那四人亦都愛喫我伸手去拏那四人亦伸手去拏未必果誰得之能恁地思量便自不去圖古者權謀之士雖千萬人所欲得底他也有計術去必得淳過到溫陵回以所聞嶽侯對高廟天下未太平之問云文臣不愛錢武臣不惜命天下當太平告之先生之前只笑云後來武官也愛錢過
