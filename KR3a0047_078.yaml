body:
  text: 朱子語類卷第七十八尚書一綱領至之問書斷自唐虞以下須是孔子意曰也不可知且如三皇之書言大道有何不可便刪去五帝之書言常道有何不可便刪去皆未可曉道夫以下論三皇五帝陳仲蔚問三皇所說甚多當以何者為是曰無理會且依孔安國之說五峰以為天皇地皇人皇而伏羲神農黃帝堯舜為五帝卻無高辛顓頊要之也不可便如此說且如歐陽公說文王未嘗稱王不知九年大統未集是自甚年數起且如武王初伐紂之時曰惟有道曾孫周王發又未知如何便稱王假謂史筆之記何為未即位之前便書為王且如太祖未即位之前史官只書殿前都點檢安得便稱帝耶是皆不可曉又問歐公所作帝王世次序闢史記之誤果是否曰是皆不可曉昨日得鞏仲至書潘叔昌託討世本向時大人亦有此書後因兵火失了今亦少有人收得史記又皆本此為之且如孟子有滕定公及世本所載則有滕成公滕考公又與孟子異皆不可得而考前人之誤既不可考則後人之論又以何為據耶此事已釐革了亦無理會處義剛一本云問三皇當從何說曰只依孔安國之說然五峰又將天地人作三皇羲農黃唐虞作五帝云是據易繫說當如此要之不必如此且如歐公作泰誓論言文王不稱王歷破史遷之說此亦未見得史遷全不是歐公全是蓋泰誓有惟九年大統未集之說若以文王在位五十年之說推之不知九年當從何數起又有曾孫周王發之說到這裏便是難理會不若只兩存之又如世本所載帝王世系但有滕考公成公而無文公定公此自與孟子不合理會到此便是難曉亦不須枉費精神孔壁所出尚書如禹謨五子之歌胤征泰誓武成冏命微子之命蔡仲之命君牙等篇皆平易伏生所傳皆難讀如何伏生偏記得難底至於易底全記不得此不可曉如當時誥命出於史官屬辭須說得平易若盤庚之類再三告戒者或是方言或是當時曲折說話所以難曉人傑以下論古今文伏生書多艱澀難曉孔安國壁中書卻平易易曉或者謂伏生口授女子故多錯誤此不然今古書傳中所引書語已皆如此不可曉僩問如史記引周書將欲取之必固與之之類此必非聖賢語曰此出於老子疑當時自有一般書如此故老子五千言皆緝綴其言取其與己意合者則入之耳僩問林少穎說盤誥之類皆出伏生如何曰此亦可疑蓋書有古文有今文今文乃伏生口傳古文乃壁中之書禹謨說命高宗肜日西伯戡黎泰誓等篇凡易讀者皆古文況又是科斗書以伏生書字文考之方讀得豈有數百年壁中之物安得不訛損一字又卻是伏生記得者難讀此尤可疑今人作全書解必不是大雅伯豐再問尚書古文今文有優劣否曰孔壁之傳漢時卻不傳只是司馬遷曾師授如伏生尚書漢世卻多傳者朝錯以伏生不曾出其女口授有齊音不可曉者以意屬成此載於史者及觀經傳及孟子引享多儀出自洛誥卻無差只疑伏生偏記得難底卻不記得易底然有一說可論難易古人文字有一般如今人書簡說話雜以方言一時記録者有一般是做出告戒之命者疑盤誥之類是一時告語百姓盤庚勸論百姓遷都之類是出於記録至於蔡仲之命微子之命冏命之屬或出當時做成底詔告文字如後世朝廷詞臣所為者然更有脫簡可疑處蘇氏傳中於乃洪大誥治之下略考得些小胡氏皇王大紀考究得康誥非周公成王時乃武王時蓋有孟侯朕其弟小子封之語若成王則康叔為叔父矣又其中首尾只稱文考成王周公必不只稱文王又有寡兄之語亦是武王與康叔無疑如今人稱劣兄之類又唐叔得禾傳記所載成王先封唐叔後封康叔決無姪先叔之理吳才老又考究梓材只前面是告戒其後都稱王恐自是一篇不應王告臣下不稱朕而自稱王耳兼酒誥亦是武王之時如此則是斷簡殘編不無遺漏今亦無從考正只得於言語句讀中有不可曉者闕之又問壁中之書不及伏生書否曰如大禹謨又卻明白條暢雖然如此其間大體義理固可推索但於不可曉處闕之而意義深遠處自當推究玩索之也然亦疑孔壁中或只是畏秦焚坑之禍故藏之壁間大概皆不可考矣按家語後云孔騰字子襄畏秦法峻急乃藏尚書於孔子舊堂壁中又漢史記尹敏傳云孔鮒所藏伯豐問尚書未有解曰便是有費力處其間用字亦有不可曉處當時為伏生是濟南人朝錯卻潁川人止得於其女口授有不曉其言以意屬讀然而傳記所引卻與尚書所載又無不同只是孔壁所藏者皆易曉伏生所記者皆難曉如堯典舜典皋陶謨益稷出於伏生便有難曉處如載采采之類大禹謨便易曉如五子之歌胤征有甚難記卻記不得至如泰誓武成皆易曉只牧誓中便難曉如五步六步之類如大誥康誥夾著微子之命穆王之時冏命君牙易曉到呂刑亦難曉因甚只記得難底卻不記得易底便是未易理會包顯道舉所看尚書數條先生曰諸誥多是長句如君奭弗永遠念天威越我民罔尤違只是一句越只是及罔尤違是總說上天與民之意漢藝文志注謂誥是曉諭民若不速曉則約束不行便是誥辭如此只是欲民易曉顯道曰商書又卻較分明曰商書亦只有數篇如此盤依舊難曉曰盤卻好曰不知怎生地盤庚抵死要恁地遷那都若曰有水患也不曾見大故為害曰他不復更說那事頭只是當時小民被害而大姓之屬安於土而不肯遷故說得如此曰大概伏生所傳許多皆聱牙難曉分明底他又卻不曾記得不知怎生地顯道問先儒將十一年十三年等合九年說以為文王稱王不知有何據曰自太史公以來皆如此說了但歐公力以為非東坡亦有一說但書說惟九年大統未集豫小子其承厥志卻有這一箇痕瑕或推泰誓諸篇皆只稱文考至武成方稱王只是當初三分天下有其二以服事殷也只是羈縻那事體自是不同了義剛書有兩體有極分曉者有極難曉者某恐如盤庚周誥多方多士之類是當時召之來而面命之而教告之自是當時一類說話至於旅獒畢命微子之命君陳君牙冏命之屬則是當時修其詞命所以當時百姓都曉得者有今時老師宿儒之所不曉今人之所不曉者未必不當時之人卻識其詞義也道夫書有易曉者恐是當時做底文字或是曾經修飾潤色來其難曉者恐只是當時說話蓋當時人說話自是如此當時人自曉得後人乃以為難曉爾若使古人見今之俗語卻理會不得也以其間頭緒多若去做文字時說不盡故只直記其言語而已廣尚書諸命皆分曉蓋如今制誥是朝廷做底文字諸誥皆難曉蓋是時與民下說話後來追録而成之典謨之書恐是曾經史官潤色來如周誥等篇恐只似如今榜文曉諭俗人者方言俚語隨地隨時各自不同林少穎嘗曰如今人即日伏惟尊候萬福使古人聞之亦不知是何等說話人傑尚書中盤庚五誥之類實是難曉若要添減字硬說將去儘得然只是穿鑿終恐無益耳時舉安卿問何緣無宣王書曰是當時偶然不曾載得又問康王何緣無詩曰某竊以昊天有成命之類便是康王詩而今人只是要解那成王做王業後便不可曉且如左傳不明說作成王詩後韋昭又且費盡氣力要解從那王業上去不知怎生地義剛道夫請先生點尚書以幸後學曰某今無工夫曰先生於書既無解若更不點則句讀不分後人承舛聽訛卒不足以見帝王之淵懿曰公豈可如此說焉知後來無人道夫再三請之曰書亦難點如大誥語句甚長今人卻都碎讀了所以曉不得某嘗欲作書說竟不曾成如制度之屬祇以疏文為本若其他未穩處更與挑剔令分明便得又曰書疏載在璇璣玉衡處先說箇天今人讀著亦無甚緊要以某觀之若看得此則亦可以粗想象天之與日月星辰之運進退疾遲之度皆有分數而曆數大概亦可知矣道夫讀尚書法或問讀尚書曰不如且讀大學若尚書卻只說治國平天下許多事較詳如堯典克明俊德以親九族至黎民於變這展開是多少舜典又詳賀孫問致知讀書之序曰須先看大學然六經亦皆難看所謂聖人有郢書後世多燕說是也知尚書收拾於殘闕之餘卻必要句句義理相通必至穿鑿不若且看他分明處其他難曉者姑闕之可也程先生謂讀書之法當平其心易其氣闕其疑是也且先看聖人大意未須便以己意參之如伊尹告太甲便與傅說告高宗不同伊尹之言諄切懇到蓋太甲資質低不得不然若高宗則無許多病痛所謂黷於祭祀時謂弗欽之類不過此等小事爾學者亦然看得自家病痛大則如伊尹之言正用得著蓋有這般病須是這般藥讀聖賢書皆要體之於己每如此謨問尚書難讀蓋無許大心胸他書亦須大心胸方讀得如何程子只說尚書曰他書卻有次第且如大學自格物致知以至平天下有多少節次尚書只合下便大如堯典自克明俊德以親九族至黎民於變時雍展開是大小大分命四時成歲便是心中包一箇三百六十五度四分度之一底天方見得恁地若不得一箇大底心胸如何了得賀孫某嘗患尚書難讀後來先將文義分明者讀之聱訛者且未讀如二典三謨等篇義理明白句句是實理堯之所以為君舜之所以為臣皋陶稷契伊傅輩所言所行最好紬繹玩味體貼向自家身上來其味自別謨讀尚書只揀其中易曉底讀如期三百有六旬有六日以閏月定四時成歲此樣雖未曉亦不緊要節二典三謨其言奧雅學者未遽曉會後面盤誥等篇又難看且如商書中伊尹告太甲五篇說得極切其所以治心修身處雖為人主言然初無貴賤之別宜取細讀極好今人不於此等處理會卻只理會小序某看得書小序不是孔子自作只是周秦間低手人作然後人亦自理會他本義未得且如皋陶矢厥謨禹成厥功帝舜申之申重也序者本意先說皋陶後說禹謂舜欲令禹重說故將申字係禹字蓋伏生書以益稷合於皋陶謨而思曰贊贊襄哉與帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜相連申之二字便見是舜令禹重言之意此是序者本意今人都不如此說說得雖多皆非其本意也又曰以義制事以禮制心此是內外交相養法事在外義由內制心在內禮由外作銖問禮莫是攝心之規矩否曰禮只是這箇禮如顏子非禮勿視聽言動之類皆是也又曰今學者別無事只要以心觀衆理理是心中所有常存此心以觀衆理只是此兩事耳銖問可學近讀何書曰讀尚書曰尚書如何看曰須要考歷代之變曰世變難看唐虞三代事浩大闊遠何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓湯曰豫畏上帝不敢不正熟讀豈不見湯之心大抵尚書有不必解者有須著意解者不必解者如仲虺之誥太甲諸篇只是熟讀義理自分明何俟於解如洪範則須著意解如典謨諸篇辭稍雅奧亦須略解若如盤庚諸篇已難解而康誥之屬則已不可解矣昔日伯恭相見語之以此渠云亦無可闕處因語之云若如此則是讀之未熟後二年相見云誠如所說可學問讀尚書欲裒諸家說觀之如何先生歷舉王蘇程陳林少穎李叔易十餘家解訖卻云便將衆說看未得且讀正文見箇意思了方可如此將衆說看書中易曉處直易曉其不可曉處且闕之如盤庚之類非特不可曉便曉了亦要何用如周誥諸篇周公不過是說周所以合代商之意是他當時說話其間多有不可解者亦且觀其大意所在而已又曰有功夫時更宜觀史必大語德粹云尚書亦有難看者如微子等篇讀至此且認微子與父師少師哀商之淪喪己將如何其他皆然若其文義知他當時言語如何自有不能曉矣可學書序恐不是孔安國做漢文粗枝大葉今書序細膩只似六朝時文字小序斷不是孔子做義剛論孔序漢人文字也不喚做好卻是粗枝大葉書序細弱只是魏晉人文字陳同父亦如此說尚書注并序某疑非孔安國所作蓋文字善困不類西漢人文章亦非後漢之文或言趙岐孟子序卻自好曰文字絮氣悶人東漢文章皆然僩尚書決非孔安國所注蓋文字困善不是西漢人文章安國漢武帝時文章豈如此但有太粗處決不如此困善也如書序做得善弱亦非西漢人文章也卓尚書孔安國傳此恐是魏晉間人所作托安國為名與毛公詩傳大段不同今觀序文亦不類漢文章漢時文字粗魏晉間文字細如孔叢子亦然皆是那一時人所為廣孔安國尚書序只是唐人文字前漢文字甚次第司馬遷亦不曾從安國受尚書不應有一文字軟郎當地後漢人作孔叢子者好作僞書然此序亦非後漢時文字後漢文字亦好揚孔氏書序不類漢文似李陵答蘇武書因問董仲舒三策文氣亦弱與朝賈諸人文章殊不同何也曰仲舒為人寬緩其文亦如其人大抵漢自武帝後文字要入細皆與漢初不同必大傳之子孫以貽後代漢時無這般文章義剛孔安國解經最亂道看得只是孔叢子等做出來泳論孔傳某嘗疑孔安國書是假書比毛公詩如此高簡大段爭事漢儒訓釋文字多是如此有疑則闕今此卻盡釋之豈有千百年前人說底話收拾於灰燼屋壁中與口傳之餘更無一字訛舛理會不得兼小序皆可疑堯典一篇自說堯一代為治之次序至讓於舜方止今卻說是讓於舜後方作舜典亦是見一代政事之終始卻說歷試諸艱是為要受讓時作也至後諸篇皆然況先漢文章重厚有力量今大序格致極輕疑是晉宋間文章況孔書至東晉方出前此諸儒皆不曾見可疑之甚大雅尚書小序不知何人作大序亦不是孔安國作怕只是撰孔叢子底人作文字軟善西漢文字則粗大夔孫論小序書小序亦非孔子作與詩小序同廣書序是得書於屋壁已有了想是孔家人自做底如孝經序亂道那時也有了燾書序不可信伏生時無之其文甚弱亦不是前漢人文字只似後漢末人又書亦多可疑者如康誥酒誥二篇必是武王時書人只被作洛事在前惑之如武王稱寡兄朕其弟卻甚正梓材一篇又不知何處録得來此與他人言皆不領嘗與陳同甫言陳曰每常讀亦不覺今思之誠然徐彥章問先生卻除書序不以冠篇首者豈非有所疑於其間耶曰誠有可疑且如康誥第述文王不曾說及武王只有乃寡兄是說武王又是自稱之詞然則康誥是武王誥康叔明矣但緣其中有錯說周公初基處遂使序者以為成王時事此豈可信徐曰然則殷地武王既以封武庚而使三叔監之矣又以何處封康叔曰既言以殷餘民封康叔豈非封武庚之外將以封之乎又曾見吳才老辨梓材一篇云後半截不是梓材緣其中多是勉君乃臣告君之詞未嘗如前一截稱王曰又稱汝為上告下之詞亦自有理壯祖或問書解誰者最好莫是東坡書為上否曰然又問但若失之簡曰亦有只消如此解者廣諸家解東坡書解卻好他看得文勢好學蒙東坡書解文義得處較多尚有粘滯是未盡透徹振諸家注解其說雖有亂道若內只有一說是時亦須還它底是尚書句讀王介甫蘇子瞻整頓得數處甚是見得古注全然錯然舊看郭象解莊子有不可曉處後得呂吉甫解看卻有說得文義的當者因論書解必大曰舊聞一士人說注疏外當看蘇氏陳氏解曰介甫解亦不可不看書中不可曉處先儒既如此解且只得從他說但一段訓詁如此說得通至別一段如此訓詁便說不通不知如何必大荊公不解洛誥但云其間煞有不可強通處今姑擇其可曉者釋之今人多說荊公穿鑿他卻有如此處若後來人解書又卻須要解盡廣易是荊公舊作卻自好三經義詩書周禮是後來作底卻不好如書說聰明文思便要牽就五事上說此類不同銖因問世所傳張綱書解只是祖述荊公所說或云是閩中林子和作果否曰或者說如此但其家子孫自認是它作張綱後來作參政不知自認與否子孫自認之說當時失於再叩後因見汪玉山駁張綱諡文定奏狀略云一行狀云公講論經旨尤精於書著為論說探微索隱無一不與聖人契世號張氏書解臣竊以王安石訓識經義穿鑿傅會專以濟其刑名法術之說如書義中所謂敢於殄戮乃以乂民忍威不可訖凶德不可忌之類皆害理教不可以訓綱作書解掇拾安石緒餘敷衍而潤飾之今乃謂其言無一不與聖人契此豈不厚誣聖人疑誤學者銖先生因說古人說話皆有源流不是胡亂荊公解聰明文思處牽合洪範之五事此卻是穿鑿如小旻詩云國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾卻合洪範五事此人往往曾傳箕子之學劉文公云人受天地之中以生等語亦是有所師承不然亦必曾見上世聖人之遺書大抵成周時於王都建學盡收得上世許多遺書故其時人得以觀覽而剽聞其議論當時諸國想亦有書若韓宣子適魯見易象與魯春秋但比王都差少耳故孔子看了魯國書猶有不足得孟僖子以車馬送至周入王城見老子因得遍觀上世帝王之書燾胡安定書解未必是安定所注行實之類不載但言行録上有少許不多不見有全部專破古說似不是胡平日意又間引東坡說東坡不及見安定必是僞書曾彥和熙豐後人解禹貢林少穎吳才老甚取之振林書儘有好處但自洛誥已後非他所解祖道胡氏闢得吳才老解經亦過當才老於考究上極有功夫只是義理上自是看得有不子細其書解徽州刻之李經叔易伯紀丞相弟解書甚好亦善考證振呂伯恭解書自洛誥始某問之曰有解不去處否曰也無及數日後謂某曰書也是有難說處今只是強解將去爾要之伯恭卻是傷於巧道夫向在鵝湖見伯恭欲解書云且自後面解起今解至洛誥有印本是也其文甚鬧熱某嘗問伯恭書有難通處否伯恭初云亦無甚難通處數日問卻云果是有難通處問書當如何看曰且看易曉處其他不可曉者不要強說縱說得出恐未必是當時本意近世解書者甚衆往往皆是穿鑿如呂伯恭亦未免此也時舉先生云曾見史丞相書否劉云見了看他說昔在二字其說甚乖曰亦有好處劉問好在甚處曰如命公後衆說皆云命伯禽為周公之後史云成王既歸命周公在後看公定豫往矣一言便見得是周公且在後之意卓薛士龍書解其學問多於地名上有功夫堯典問序云聰明文思經作欽明文思如何曰小序不可信問恐是作序者見經中有欽明文思遂改換欽字作聰字否曰然若稽古帝堯作書者敘起振林少穎解放勳之放作推而放之四海之放比之程氏說為優廣安安只是箇重疊字言堯之聰明文思皆本於自然不出於勉強也允則是信實克則是能廣安安若云止其所當止上安字是用下安字是體成性存存亦然又恐只是重字若小心翼翼安安存存亦然皆得振允恭克讓從張綱說謂信恭能讓作書者贊詠堯德如此德明允恭克讓程先生說得義理亦好只恐書意不如此程先生說多如此詩尤甚然卻得許多義理在其中振格至也格於上下上至天下至地也廣克明俊德是明明德之意德明克明俊德只是說堯之德與文王克明德同廣克明俊德只是明己之德詞意不是明俊德之士振顯道問堯典自欽明文思以下皆說堯之德則所謂克明俊德者古注作能明俊德之人似有理曰且看文勢不見有用人意又問納于大麓烈風雷雨弗迷說者或謂大録萬機之政或謂登封太山二說如何曰史記載使舜入山林烈風雷雨弗迷其道當從史記人傑任道問堯典以親九族說者謂上至高祖下至玄孫林少穎謂若如此只是一族所謂九族者父族四母族三妻族二是否曰父族謂本族姑之夫姊妹之夫女子之夫家母族謂母之本族母族與姨母之家妻族則妻之本族與其母族是也上殺下殺旁殺只看所畫宗族圖可見人傑九族且從古注克明德是再提起堯德來說百姓或以為民或以為百官族姓亦不可考姑存二說可也釐則訓治釐降只是他經理二女下降時事爾廣九族以三族言者較大然亦不必如此泥但其所親者皆是胤子朱做丹朱說甚好然古有胤國堯所舉又不知是誰鯀殛而禹為之用聖人大公無毫髮之私禹亦自知父罪當然振平章百姓只是近處百姓黎民則合天下之民言之矣典謨中百姓只是說民如罔咈百姓之類若是國語中說百姓則多是指百官族姓廣百姓畿內之民非百官族姓也此家齊而後國治之意百姓昭明乃三綱五常皆分曉不鶻突也人傑百姓昭明百姓只是畿內之民昭明只是與它分別善惡辨是與非以上下文言之即齊家治國平天下之事問孔傳云百官族姓程子謂古無此說呂刑只言官伯族姓後有百姓不親干百姓咈百姓皆言民豈可指為百官族姓後漢書亦云部刺史職在辨章百姓宣美風俗辨章即平章也過又云族姓亦不可不明先生只曰未曾如此思量過堯舜之道如平章百姓黎民於變時雍之類皆是幾時只是安坐而無所作為履孫羲和即是那四子或云有羲伯和伯共六人未必是義剛羲和主曆象授時而已非是各行其方之事德明曆是古時一件大事故炎帝以鳥名官首曰鳳鳥氏曆正也歲月日時既定則百工之事可考其成程氏王氏兩說相兼其義始備廣曆是書象是器無曆則無以知三辰之所在無璣衡則無以見三辰之所在廣古字宅度通用宅嵎夷之類恐只是四方度其日景以作曆耳如唐時尚使人去四方觀望廣問寅賓出日寅餞納日如何曰恐當從林少穎解寅賓出日是推測日出時候寅餞納日是推測日入時候如土圭之法是也暘谷南交昧谷幽都是測日景之處宅度也古書度字有作宅字者東作南訛西成朔易皆節候也東作如立春至雨水節之類寅賓則求之於日星鳥則求之於夜厥民析因夷隩非是使民如此民自是如此因者因其析後之事夷者萬物收成民皆優逸之意孳尾至氄毛亦是鳥獸自然如此如今曆書記鳴鳩拂羽等事程泰之解暘谷南交昧谷幽都以為築一臺而分為四處非也古注以為羲仲居治東方之官非也若如此只是東方之民得東作他處更不耕種矣西方之民享西成他方皆不斂穫矣大抵羲和四子皆是掌曆之官觀於咨汝羲暨和之辭可見敬致乃冬夏致日春秋致月是也春秋分無日景夏至景短冬至景長人傑平秩東作之類只是如今穀雨芒種之節候爾林少穎作萬物作之作說即是此意廣東作只是言萬物皆作當春之時萬物皆有發動之意與南訛西成為一類非是令民耕作羲仲一人東方甚廣如何管得許多德明敬致只是冬夏致日之致寅賓是賓其出寅餞是餞其入敬致是致其中北方不說者北方無日故也廣朔易亦是時候歲亦改易於此有終而復始之意在察也廣堯典云期三百六旬有六日而今一歲三百五十四日者積朔空餘分以為閏朔空者六小月也餘分者五日四分度之一也大雅自疇咨若時登庸到篇末只是一事皆是為禪位設也一舉而放齊舉胤子再舉而歡兜舉共工三舉而四嶽舉鯀皆不得其人故卒以天下授舜廣伯恭說子朱啓明之事不是此乃為放齊翻款堯問疇咨若時登庸放齊不應舉一箇明於為惡之人此只是放齊不知子朱之惡失於薦揚耳德明包顯道問朱先稱啓明後又說他嚚訟恐不相協曰便是放齊以白為黑夔孫録云問啓明與嚚訟相反靜言庸違則不能成功卻曰方鳩僝功此便是歡兜以白為黑云云以非為是所以舜治他但那人也是崎嶢且說而今暗昧底人解與人健訟不解惟其啓明後方解嚚訟又問堯既知鯀如何尚用之曰鯀也是有才智想見只是狠拗自是所以弄得恁地郎當所以楚辭說鯀幸直以亡身必是他去治水有不依道理處壞了人多弄八九年無收殺故舜殛之義剛夔孫録略共工歡兜看得來其過惡甚於放齊胤子朱廣僝功亦非灼然知是為見功亦且是依古注說亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歷人宥肆亦見厥君事戕敗人宥之類都不成文理不可曉象恭滔天滔天二字羡因下文而誤廣四嶽只是一人四嶽是總十二牧者百揆是總九官者義剛問四嶽是十二牧之長否曰周官言內有百揆四嶽則百揆是朝廷官之長四嶽乃管領十二牧者四嶽通九官十二牧為二十有二人則四嶽為一人矣又堯咨四嶽以汝能庸命巽朕位不成堯欲以天下與四人也又周官一篇說三公六卿甚分曉漢儒如揚雄鄭康成之徒以至晉杜元凱皆不曾見直至東晉此書方出伏生書多說司馬司空乃是諸候三卿之制故其誥諸侯多引此顧命排列六卿甚整齊太保奭冢宰芮伯宗伯彤伯司馬畢公司徒衛侯司寇毛公司空疏中言之甚詳康誥多言刑罰事為司寇也太保畢公毛公乃以三公下行六卿之職三公本無職事亦無官屬但以道義輔導天子而已漢卻以司徒司馬司空為三公失其制矣人傑必大録別出正淳問四嶽百揆曰四嶽是總在外諸侯之官百揆則總在內百官者又問四嶽是一人是四人曰汝能庸命巽朕位不成讓與四人又如咨二十有二人乃四嶽九官十二牧尤見得四嶽只是一人因言孔壁尚書漢武帝時方出又不行於世至東晉時方顯故揚雄趙岐杜預諸儒悉不曾見如周官乃孔氏書說得三公三孤六卿極分明漢儒皆不知只見伏生書多說司徒司馬司空遂以此為三公不知此只是六卿之半武王初是諸侯故只有此三官又其他篇說此三官者皆是訓誥諸侯之詞如三郊三遂亦是用天子之半伏生書只顧命排得三公三孤六卿齊整如曰太保奭芮伯彤伯畢公衛侯毛公召公與畢公毛公是三公芮伯彤伯衛侯是三孤太保是冢宰芮伯是司徒衛侯是康叔為司寇所以康誥中多說刑三公只是以道義傅保王者無職事官屬卻下行六卿事漢時太傅亦無官屬必大异哉是不用亦可試可乃已言試而可則用之亦可已而已之也廣堯知鯀不可用而尚用此等事皆不可曉當時治水事甚不可曉且如滔天之水滿天下如何用工如一處有一處無尚可既洪水滔天不知如何掘地注海今水深三尺便不可下工如水甚大則流得幾時便自然成道亦不用治不知禹當時治水之事如何揚庸命方命之命皆謂命令也庸命者言能用我之命以巽朕位也方命者言止其命令而不行也王氏曰圓則行方則止猶今言廢閣詔令也蓋鯀之為人悻戾自用不聽人言語不受人教令也廣先儒多疑舜乃前世帝王之後在堯時不應在側陋此恐不然若漢光武只是景帝七世孫已在民間耕稼了況上古人壽長傳數世後經歷之遠自然有微而在下者廣蒸蒸東萊說亦好曾氏是曾彥和自有一本孫曾書解孫是孫懲廣女于時觀厥刑于二女皆堯之言釐降二女于溈汭嬪于虞乃史官之詞言堯以女下降於舜爾帝曰欽哉是堯戒其二女之詞如所謂往之女家必敬必戒也若如此說不解亦自分明但今解者便添入許多字了說廣帝曰我其試哉女于時觀厥刑于二女此堯之言釐降二女于溈汭嬪于虞此史官所記釐治也帝曰欽哉堯之言乃往之女家必敬必戒之意輯五瑞是方呼喚來乃日覲四嶽群牧隨其到者先後見之肆覲東后五玉三帛二生一死贄協時月正日同律度量衡修五禮如五器卒乃復文當次第如此復只是同象以典刑是正刑墨劓剕宮大辟象猶縣象魏之象畫之令人知流宥五刑正刑有疑似及可憫者隨其重輕以流罪宥之鞭作官刑撲作教刑鞭撲皆刑之小者金作贖刑鞭撲小刑之可憫者令以金贖之正刑則只是流無贖法眚梨肆赦過誤可憫雖正刑亦赦怙終賊刑怙終者則賊刑必大嬪于虞帝曰欽哉堯戒女也振舜典東萊謂舜典止載舜元年事則是若說此是作史之妙則不然焉知當時別無文字在廣舜典自虞舜側微至乃命以位一本無之直自堯典帝曰欽哉而下接起慎徽五典所謂伏生以舜典合於堯典也玄德難曉書傳中亦無言玄者今人避諱多以玄為元甚非也如玄黃之玄本黑色若云元黃是子畏於正之類也舊來頒降避諱多以玄為真字如玄冥作真冥玄武作真武伯豐問既諱黃帝名又諱聖祖名如何曰舊以聖祖為人皇中之一黃帝自是天降而生非少昊之子其說虛誕蓋難憑信也人傑濬哲文明溫恭允塞細分是八字合而言之卻只是四事濬是明之發處哲則見於事也文是文章明是明著易中多言文明允是就事上說塞是其中實處廣濬哲文明溫恭允塞是八德問徽五典是使之掌教納於百揆是使之宅百揆賓於四門是使之為行人之官納大麓恐是為山虞之官曰若為山虞則其職益卑且合從史記說使之入山雖遇風雨弗迷其道也人傑納于大麓當以史記為據謂如治水之類弗迷謂舜不迷於風雨也若主祭之說某不敢信且雷雨在天如何解迷仍是舜在主祭而乃有風雷之變豈得為好義剛烈風雷雨弗迷只當如太史公說若從主祭說則弗迷二字說不得弗迷乃指人而言也廣堯命舜曰三載汝陟帝位舜讓於德弗嗣則是不居其位也其曰受終於文祖只是攝行其事也故舜之攝不居其位不稱其號只是攝行其職事爾到得後來舜遜於禹不復言位止曰總朕師爾其曰汝終陟元后則今不陟也率百官若帝之初者但率百官如舜之初爾廣舜居攝時不知稱號謂何觀受終受命則是已將天下分付他了廣堯舜之廟雖不可考然以義理推之堯之廟當立於丹朱之國所謂修其禮物作賓於王家蓋神不歆非類民不祀非族故禮記有虞氏褅黃帝而郊嚳祖顓頊而宗堯伊川以為可疑方子書正義璿璣玉衡處說天體極好閎祖在璿璣玉衡以齊七政注謂察天文審己當天心否未必然只是從新整理起此是最當先理會者故從此理會去廣類只是祭天之名其義則不可曉與所謂旅上帝同皆不可曉然決非是常祭廣問六宗曰古注說得自好鄭氏宗讀為禜即祭法中所謂祭時祭寒暑祭日祭月祭星祭水旱者如此說則先祭上帝次禋六宗次望山川然後遍及群神次序皆順問五峰取張髦昭穆之說如何曰非唯用改易經文兼之古者昭穆不盡稱宗唯祖有功宗有德故云祖文王而宗武王且如西漢之廟唯文帝稱太宗武帝稱世宗至唐朝乃盡稱宗此不可以為據雉問輯五瑞既月乃日觀四嶽群牧班瑞于群后恐只是王畿之諸侯輯斂瑞玉是命圭合信如點檢牌印之屬如何曰不當指殺王畿如顧命太保率東方諸侯畢公率西方諸侯不數日間諸侯皆至如此之速人傑汪季良問望禋之說曰注以至於岱宗柴為句某謂當以柴望秩於山川為一句道夫協時月正日只是去合同其時日月爾非謂作曆也每遇巡狩凡事理會一遍如文字之類廣同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復舊說皆云如五器謂即是諸侯五玉之器初既輯之至此禮既畢乃復還之看來似不如此恐書之文顛倒了五器五禮之器也五禮者乃吉凶軍賓嘉之五禮凶禮之器即是衰絰之類軍禮之器即是兵戈之類吉禮之器即是簠簋之類如者亦同之義言有以同之使天下禮器皆歸於一其文當作五玉三帛二生一死贄同律度量衡修五禮如五器卒乃復言諸侯既朝之後方始同其律度量衡修其五禮如其五器其事既卒而乃復還也子蒙問修五禮吳才老以為只是五典之禮唐虞時未有吉凶軍賓嘉之名至周時方有之然否曰不然五禮只是吉凶軍賓嘉如何見得唐虞時無此因說舜典此段疑有錯簡當云肆覲東后五玉三帛二生一死贄協時月正日同律度量衡修五禮如五器卒乃復如者齊一之義卒乃復者事畢復歸也非謂復歸京師只是事畢復歸故亦曰復前說班瑞於群后即是還之也此二句本橫渠說銖五玉三帛二生一死贄乃倒文當云肆覲東后五玉三帛二生一死贄協時月正日同律度量衡修五禮如五器卒乃復五器謂五禮之器也如周禮大行人十一年同數器之謂如即同也卒乃復言事畢則回之南嶽去也又曰既見東后必先有贄見了然後與他整齊這許多事一遍廣問贄用生物恐有飛走曰以物束縛之故不至飛走義剛卒乃復是事畢而歸非是以贄為復也義剛汪季良問五載一巡狩還是一年遍歷四方還是止於一方曰恐亦不能遍問卒乃復曰說者多以為如五器輯五瑞而卒復以還之某恐不然只是事卒則還復爾魯可幾問古之巡狩不至如後世之千騎萬乘否曰今以左氏觀之如所謂國君以乘卿以旅國君則以千五百人衛正卿則以五百人從則天子亦可見矣可幾曰春秋之世與茆茨土階之時莫不同否曰也不然如黃帝以師為衛則天子衛從亦不應大段寡弱也道夫或問舜之巡狩是一年中遍四嶽否曰觀其末後載歸格於藝祖用特一句則是一年遍巡四嶽矣問四嶽惟衡山最遠先儒以為非今之衡山別自有衡山不知在甚處曰恐在嵩山之南若如此則四嶽相去甚近矣然古之天子一歲不能遍及四嶽則到一方境上會諸侯亦可周禮有此禮廣銖録云唐虞時以潛山為南嶽五嶽亦近非是一年只往一處五載一巡狩此是立法如此若一歲間行一遍則去一方近處會一方之諸侯如周禮所謂十有二歲巡狩殷國殷國即是會一方之諸侯使來朝也又云巡狩亦非是舜時創立此制蓋亦循襲將來故黃帝紀亦云披山通道未嘗寧居廣舜巡狩恐不解一年周遍得四嶽皆至遠也揚巡守只是去回禮一番義剛肇十有二州冀州堯所都北去地已狹若又分而為幽并二州則三州疆界極不多了青州分為營州亦然葉氏曰分冀州西為并州北為幽州青州又在帝都之東分其東北為營州廣仲默集注尚書至肇十有二州因云禹即位後又并作九州曰也見不得但後面皆只說帝命式于九圍以有九有之師不知是甚時又復并作九州義剛象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑象者象其人所犯之罪而加之以所犯之刑典常也即墨劓剕宮大辟之常刑也象以典刑此一句乃五句之綱領諸刑之總括猶今之刑皆結於笞杖徒流絞斬也凡人所犯罪各不同而為刑固亦不一然皆不出此五者之刑但象其罪而以此刑加之所犯合墨則加以墨刑所犯合劓則加以劓刑剕宮大辟皆然猶夷虜之法傷人者償創折人手者亦折其手傷人目者亦傷其目之類流宥五刑者其人所犯合此五刑而情輕可恕或因過誤則全其肌體不加刀鋸但流以宥之屏之遠方不與民齒如五流有宅五宅三居之類是也鞭作官刑者此官府之刑猶今之鞭撻吏人蓋自有一項刑專以治官府之胥吏如周禮治胥吏鞭五百鞭三百之類撲作教刑此一項學官之刑猶今之學舍夏楚如習射習藝春秋教以禮樂冬夏教以詩書凡教人之事有不率者則用此刑撲之如侯明撻記之類是也金作贖刑謂鞭撲二刑之可恕者則許用金以贖其罪如此解釋則五句之義豈不粲然明白象以典刑之輕者有流以宥之鞭撲之刑之輕者有金以贖之流宥所以寬五刑贖刑所以寬鞭撲聖人斟酌損益低昂輕重莫不合天理人心之自然而無毫釐秒忽之差所謂既竭心思焉繼之以不忍人之政者如何說聖人專意只在教化刑非所急聖人固以教化為急若有犯者須以此刑治之豈得置而不用問贖刑非古法曰然贖刑起周穆王古之所謂贖刑者贖鞭撲耳夫既已殺人傷人矣又使之得以金贖則有財者皆可以殺人傷人而無辜被害者何其大不幸也且殺之者安然居乎鄉里彼孝子順孫之欲報其親者豈肯安於此乎所以屏之四裔流之遠方彼此兩全之也僩問象以典刑如何為象曰此言正法象如懸象魏之象或謂畫為五刑之狀亦可此段舜典載得極好有條理又輕重平實象以典刑謂正法蓋畫象而示民以墨劓剕宮大辟五等肉刑之常法也流宥五刑為流法以宥犯此肉刑之正法者蓋其為惡害及平人故雖不用正法亦必須遷移於外鞭作官刑撲作教刑此二者若可憫則又為贖刑以贖之蓋鞭撲是罪之小者故特為贖法俾聽贖而不及於犯正法者蓋流以宥五刑贖以宥鞭撲如此乃平正精詳真舜之法也至穆王一例令出金以贖便不是不成殺人者亦止令出金而免故蕭望之贖刑議有云如此則富者得生貧者獨死恐開利路以傷治化其說極當大率聖人作事一看義理當然不為苟且姑息也銖問五刑吳才老亦說是五典之刑如所謂不孝之刑不悌之刑曰此是亂說凡人有罪合用五刑如何不用荀子有一篇專論此意說得甚好荀子固有不好處然此篇卻說得儘好銖五流所以寬五刑贖刑又所以寬鞭撲之刑石林說亦曾入思量鄭氏說則據他意胡說將去爾廣古人贖金只是用於鞭撲之小刑而已重刑無贖到穆王好巡幸無錢便遂造贖法五刑皆有贖墨百鍰劓惟倍剕倍差宮六百鍰大辟千鍰聖人存此篇所以記法之變然其間亦多好語有不輕於用刑底意淳或問欽哉欽哉惟刑之恤哉曰多有人解書做寬恤之恤某之意不然若做寬恤如被殺者不令償命死者何辜大率是說刑者民之司命不可不謹如斷者不可續乃矜恤之恤耳人傑放歡兜於崇山或云在今灃州慈利縣義剛殛鯀於羽山想是偶然在彼而殛之程子謂時適在彼是也若曰罪之彰著或害功敗事於彼則未可知也大抵此等隔涉遙遠又無證據只說得箇大綱如此便了不必說殺了才說殺了便受折難廣四凶只緣堯舉舜而遜之位故不服而抵於罪在堯時則其罪未彰又他畢竟是箇世家大族又未有過惡故動他未得廣流放竄不是死刑殛伊川言亦不是死未見其說振問舜不惟德盛又且才高嗣位未幾如齊七政覲四嶽協時月正日同律度量衡肇十二州封十二山及四罪而天下服一齊做了其功用神速如此曰聖人作處自別故書稱三載底可績德明林少穎解徂落云魂殂而魄落說得好便是魂升於天魄降於地底意思如明則有禮樂幽則有鬼神禮樂是可見底鬼神是不可見底禮是節約收縮底便是鬼樂是發揚舒暢底便是神夔孫堯崩百姓如喪考妣此是本分四海遏密八音以禮論之則為過為天子服三年之喪只是畿內諸侯之國則不然為君為父皆服斬衰君謂天子諸侯及大夫之有地者大夫之邑以大夫為君大夫以諸侯為君諸侯以天子為君各為其君服斬衰諸侯之大夫卻為天子服齊衰三月禮無二斬故也公之喪諸達官之長杖達官謂通於君得奏事者各有其長杖其下者不杖可知文蔚問後世不封建諸侯天下一統百姓當為天子何服曰三月天下服地雖有遠近聞喪雖有先後然亦不過三月文蔚問明四目達四聰是達天下之聰明否曰固是曰孔安國言廣視聽於四方如何曰亦是以天下之目為目以天下之耳為耳之意人傑柔遠能邇柔遠卻說得輕能邇是奈何得他使之帖服之意三就只當從古注五宅三居宅只訓居人傑惇德允元只是說自己德使之厚其德信其仁難字只作平聲任如字難任人言不可輕易任用人也廣問亮采惠疇曰疇類也與儔同惠疇順衆也疇咨若豫采舉其類而咨詢也人傑禹以司空行宰相事汝平水土則是司空之職惟時懋哉則又勉以行百揆之事廣禹以司空宅百揆猶周以六卿兼三公今以戶部侍郎兼平章事模樣義剛問堯德化如此久何故至舜猶曰百姓不親五品不遜曰也只是怕恁地又問蠻夷猾夏是有苗否曰也不專指此但此官為此而設義剛敬敷五教在寬聖賢於事無不敬而此又其大者故特以敬言之在寬是欲其優游浸漬以漸而入也夔孫五服三就若大辟則就市宮刑則如漢時就蠶室在墨劓剕三刑度亦必有一所在刑之既非死刑則傷人之肌體不可不擇一深密之所但不至如蠶室爾廣五刑三就用五刑就三處故大辟篤於市宮刑下蠶室其他底刑也是就箇隱風處不然牽去當風處割了耳鼻豈不割殺了他夔孫問五流有宅五宅三居曰五刑各有流法然亦分作三項如居四海之外九州之內或近甸皆以輕重為差五服三就是作三處就刑如斬人於市腐刑下蠶室劓刖就僻處蓋劓刖若在當風處必致殺人聖人既全其生不忍如此銖孟子說益烈山澤而焚之是使之除去障翳驅逐禽獸耳未必使之為虞官也至舜命作虞然後使之養育其草木禽獸耳廣問命伯夷典禮而曰夙夜惟寅直哉惟清何也曰禮是見成制度夙夜惟寅直哉惟清乃所以行其禮也今太常有直清堂人傑問夙夜惟寅直哉惟清曰人能敬則內自直內直則看得那禮文分明不糊塗也廣惟寅故直惟直故清義剛古者教人多以樂如舜命夔之類蓋終日以聲音養其情性亦須理會得樂方能聽璘古人以樂教胄子緣平和中正詩言志歌永言聲依永律和聲八音克諧無相奪倫古人詩只一兩句歌便衍得來長聲是宮商角徵羽是聲依所歌而發卻用律以和之如黃鐘為宮則太簇為羽之類不可亂其倫序也泳直而溫只是說所教胄子要得如此若說做教者事則於教胄子上都無益了廣或問詩言志聲依永律和聲曰古人作詩只是說他心下所存事說出來人便將他詩來歌其聲之清濁長短各依他詩之語言卻將律來調和其聲今人卻先安排下腔調了然後做語言去合腔子豈不是倒了卻是永依聲也古人是以樂去就他詩後世是以詩去就他樂如何解興起得人祖道聲依永律和聲以五聲依永以律和聲之高下節聲依永律和聲此皆有自然之調沈存中以為臣與民不要大事與物大不妨若合得自然二者亦自大不得可學聲只有五并二變聲律只有十二已上推不去聲依永律和聲堲只訓疾較好廣殄行是傷人之行書曰亦敢殄戮用乂民殄殲乃讎皆傷殘之義廣納言似今中書門下省義剛問夙夜出納朕命惟允曰納言之官如今之門下審覆自外而進入者既審之自內而宣出者亦審之恐讒說殄行之震驚朕師也人傑稷契皋陶夔龍這五官秀才底官所以教他掌教掌刑掌禮樂都是那秀才做底事如那垂與益之類便皆是箇粗嗇底聖賢所以只教他治虞治工之屬便是他只會做這般事義剛舜生三十徵庸數語只依古注點似好廣問張子以別生分類為明庶物察人倫恐未安曰書序本是無證據今引來解說更無理會了又問如以明庶物察人倫為窮理不知於聖人分上著得窮理字否曰這也是窮理之事但聖人於理自然窮爾道夫方設居方逐方各設其居方之道九共九篇劉侍讀以共為丘言九丘也人傑大禹謨大禹謨序帝舜申之序者之意見書中皋陶陳謨了帝曰來禹汝亦昌言故先說皋陶矢厥謨禹成厥功帝又使禹亦陳昌言耳今書序固不能得書意後來說書者又不曉序者之意只管穿鑿求巧妙爾廣自后克艱厥后至四夷來王只是一時說話後面則不可知廣書中迪字或解為蹈或解為行疑只是訓順字書曰惠迪吉從逆凶惟影響逆對順恐只當訓順也兼書中迪字用得本皆輕棐字只與匪同被人錯解作輔字至今誤用只顏師古注漢書曰棐與匪同某疑得之尚書傳是後來人做非漢人文章解得不成文字但後漢張衡已將棐字作輔字使不知如何王若曰周公若曰只是一似如此說底意思若漢書皇帝若曰之類蓋是宣導德意者敷演其語或録者失其語而退記其意如此也忱諶並訓信如云天不可信當無虞時須是警戒所警戒者何罔失法度罔游於逸罔淫於樂人當無虞時易至於失法度游逸淫樂故當戒其如此既知戒此則當任賢勿二去邪勿疑疑謀勿成如此方能罔違道以干百姓之譽罔咈百姓以從己之欲義剛警戒無虞至從己之欲聖賢言語自有箇血脈貫在裏如此一段他先說警戒無虞蓋制治未亂保邦未危自其未有可虞之時必警必戒能如此則不至失法度淫於逸遊於樂矣若無箇警戒底心欲不至於失法度不淫逸不遊樂不可得也既能如此然後可以知得賢者邪者正者謀可疑者無可疑者若是自家身心顛倒便會以不賢為賢以邪為正所當疑者亦不知矣何以任之去之勿成之哉蓋此三句便是從上面有三句了方會恁地又如此然後能罔違道以干百姓之譽罔咈百姓以從己之欲蓋於賢否邪正疑審有所未明則何者為道何者為非道何者是百姓所欲何者非百姓之所欲哉夔孫問水火金木土穀惟修正德利用厚生惟和正德是正民之德否曰固是水如隄防灌溉金如五兵田器火如出火內火禁焚萊之類木如斧斤以時之類良久云古人設官掌此六府蓋為民惜此物不使之妄用非如今出之民用財無節也戒之用休言戒諭以休美之事勸之以九歌感動之意但不知所謂九歌者如何周官有九德之歌大抵禹只說綱目其詳不可考矣人傑地平天成是包得下面六府三事在義剛劉潛夫問六府三事林少穎云六府本乎天三事行乎人吳才老說上是施下是功未知孰是曰林說是又問戒之用休董之用威并九歌曰正是匡之直之輔之翼之之意九歌只是九功之敘可歌想那時田野自有此歌今不可得見賀孫念茲在茲釋茲在茲用捨皆在於此人名言茲在茲允出茲在茲語默皆在此人名言則名言之允出則誠實之所發見者也人傑法家者流往往常患其過於慘刻今之士大夫恥為法官更相循襲以寬大為事於法之當死者反求以生之殊不知明於五刑以弼五教雖舜亦不免教之不從刑以督之懲一人而天下人知所勸戒所謂辟以止辟雖曰殺之而仁愛之實已行乎中今非法以求其生則人無所懲懼陷於法者愈衆雖曰仁之適以害之道夫聖人亦不曾徒用政刑到德禮既行天下既治亦不曾不用政刑故書說刑期於無刑只是存心期於無而刑初非可廢又曰欽哉惟刑之恤哉只是說恤刑賀孫罪疑惟輕豈有不疑而強欲輕之之理乎王季海當國好出人死罪以積陰德至於奴與佃客殺主亦不至死廣録云豈有此理某嘗謂雖堯舜之仁亦只是罪疑惟輕而已人傑或問人心道心之別曰只是這一箇心知覺從耳目之欲上去便是人心知覺從義理上去便是道心人心則危而易陷道心則微而難著微亦微妙之義學蒙舜功問人心惟危曰人心亦不是全不好底故不言凶咎只言危蓋從形體上去泛泛無定向或是或非不可知故言其危故聖人不以人心為主而以道心為主蓋人心倚靠不得人心如船道心如柁任船之所在無所向若執定柁則去住在我璘人心亦未是十分不好底人欲只是饑欲食寒欲衣之心爾如何謂之危既無義理如何不危士毅問人心惟危程子曰人心人欲也恐未便是人欲曰人欲也未便是不好謂之危者危險欲墮未墮之間若無道心以御之則一向入於邪惡又不止於危也方子録云危者欲陷而未陷之辭子靜說得是又問聖人亦有人心不知亦危否曰聖人全是道心主宰時舉録云聖人純是道心故其人心自是不危若只是人心也危故曰惟聖罔念作狂又問此聖字尋常只作通明字看說得輕曰畢竟是聖而罔念便狂銖時舉録同道心是知覺得道理底人心是知覺得聲色臭味底人心不全是不好若人心是全不好底不應只下箇危字蓋為人心易得走從惡處去所以下箇危字若全不好則是都倒了何止於危危是危殆道心惟微是微妙亦是微昧若說道心天理人心人欲卻是有兩箇心人只有一箇心但知覺得道理底是道心知覺得聲色臭味底是人心不爭得多人心人欲也此語有病雖上智不能無此豈可謂全不是陸子靜亦以此語人非有兩箇心道心人心本只是一箇物事但所知覺不同惟精惟一是兩截工夫精是辨別得這箇物事一是辨別了又須固守他若不辨別得時更固守個甚麼若辨別得了又不固守則不長遠惟能如此所以能合於中道又曰惟精惟一猶擇善而固執之佐人心亦只是一箇知覺從饑食渴飲便是人心知覺從君臣父子處便是道心微是微妙亦是微晦又曰形骸上起底見識或作從形體上生出來底見識便是人心義理上起底見識或作就道理上生出來底見識便是道心心則一也微則難明有時發見些子使自家見得有時又不見了惟聖人便辨之精守得徹頭徹尾學者則須是擇善而固執之方子道心是義理上發出來底人心是人身上發出來底雖聖人不能無人心如饑食渴飲之類雖小人不能無道心如惻隱之心是但聖人於此擇之也精守得徹頭徹尾問如何是惟微曰是道心略瞥見些子便失了底意思惟危是人心既從形骸上發出來易得流於惡蓋卿問人心道心曰如喜怒人心也然無故而喜喜至於過而不能禁無故而怒怒至於甚而不能遏是皆為人心所使也須是喜其所當喜怒其所當怒乃是道心問饑食渴飲此人心否曰然須是食其所當食飲其所當飲乃不失所謂道心若飲盜泉之水食嗟來之食則人心勝而道心亡矣問人心可以無否曰如何無得但以道心為主而人心每聽命焉耳僩饑食渴飲人心也如是而飲食如是而不飲食道心也喚做人便有形氣人心較切近於人道心雖先得之然被人心隔了一重故難見道心如清水之在濁水惟見其濁不見其清故微而難見人心如孟子言耳目之官不思道心如言心之官則思故貴先立乎其大者人心只見那邊利害情欲之私道心只見這邊道理之公有道心則人心為所節制人心皆道心也伯羽呂德明問人心道心曰且如人知饑渴寒暖此人心也惻隱羞惡道心也只是一箇心卻有兩樣須將道心去用那人心方得且如人知饑之可食而不知當食與不當食知寒之欲衣而不知當衣與不當衣此其所以危也義剛饑欲食渴欲飲者人心也得飲食之正者道心也須是一心只在道上少間那人心自降伏得不見了人心與道心為一恰似無了那人心相似只是要得道心純一道心都發見在那人心上問人心道心曰飲食人心也非其道非其義萬鍾不取道心也若是道心為主則人心聽命於道心耳夔孫問人心道心如飲食男女之欲出於其正即道心矣又如何分別曰這箇畢竟是生於血氣文蔚問人心惟危則當去了人心否曰從道心而不從人心節道心人心之理節心只是一箇心卓録云人心道心元來只是一箇只是分別兩邊說人心便成一邊道心便成一邊精是辨之明一是守之固卓作專既能辨之明又能守之固斯得其中矣這中是無過不及之中賀孫自人心而收之則是道心自道心而放之便是人心惟聖罔念作狂惟狂克念作聖近之驤人心如卒徒道心如將伯羽問動於人心之微則天理固已發見而人欲亦已萌天理便是道心人欲便是人心曰然可學問道心惟微曰義理精微難見且如利害最易見是粗底然鳥獸已有不知之者又曰人心道心只是爭些子孟子曰人之所以異於禽獸者幾希夔孫義剛録見下林武子問道心是先得人心是形氣所有但地步較闊道心卻在形氣中所以人心易得陷了道心也是如此否曰天下之物精細底便難見粗底便易見饑渴寒暖是至粗底雖至愚之人亦知得若以較細者言之如利害則禽獸已有不能知者若是義理則愈是難知這只有些子不多所以說人之所以異於禽獸者幾希言所爭也不多義剛人心者氣質之心也可為善可為不善道心者兼得理在裏面惟精是無雜惟一是終始不變乃能允執厥中節人心是知覺口之於味目之於色耳之於聲底未是不好只是危若便說做人欲則屬惡了何用說危道心是知覺義理底惟微是微妙亦是微隱惟精是要別得不雜惟一是要守得不離惟精惟一所以能允執厥中至問微是微妙難體危是危動難安否曰不止是危動難安大凡祢人欲自是危險其心忽然在此忽然在彼又忽然在四方萬里之外莊子所謂其熱焦火其寒凝冰凡苟免者皆幸也動不動便是墮坑落塹危孰甚焉文蔚曰徐子融嘗有一詩末句云精一危微共一心文蔚答之曰固知妙旨存精一須別人心與道心曰他底未是但只是答他底亦慢下一句救得少緊當云須知妙旨存精一正為人心與道心又問精一曰精是精別此二者一是守之固如顏子擇中庸處便是精得一善拳拳服膺弗失處便是一伊川云惟精惟一所以至之允執厥中所以行之此語甚好文蔚程子曰人心人欲故危殆道心天理故精微惟精以致之惟一以守之如此方能執中此言盡之矣惟精者精審之而勿雜也惟一者有首有尾專一也此自堯舜以來所傳未有他議論先有此言聖人心法無以易此經中此意極多所謂擇善而固執之擇善即惟精也固執即惟一也又如博學之審問之謹思之明辨之皆惟精也篤行又是惟一也又如明善是惟精也誠之便是惟一也大學致知格物非惟精不可能誠意則惟一矣學則是學此道理孟子以後失其傳亦只是失此洽問惟精惟一曰人心直是危道心直是微且說道心微妙有甚準則直是要擇之精直是要守之一揚因論惟精惟一曰虛明安靜乃能精粹而不雜誠篤確固乃能純一而無間僩惟精惟一舜告禹所以且說行不似學者而今當理會精也方精是識別得人心道心一是常守得定允執只是箇真知道夫問精一執中之說曰惟精是精察分明惟一是行處不雜執中是執守不失大雅漢卿問惟精惟一允執厥中一段曰凡事有一半是一半不是須要精辨其是非惟一者既辨得是非卻要守得徹頭徹尾惟其如此故於應事接物之際頭頭捉著中惟精是致知惟一是力行不可偏廢杞問堯舜禹大聖人也允執厥中執字似亦大段喫力如何曰聖人固不思不勉然使聖人自有不思不勉之意則罔念而作狂矣經言此類非一更細思之人傑符舜功問學者當先防人欲正如未上船先作下水計不如只於天理上做功夫人欲自消曰堯舜說便不如此只云人心惟危道心惟微渠只於兩者交界處理會堯舜時未有文字其相授受口訣只如此方伯謨云人心道心伊川說天理人欲便是曰固是但此不是有兩物如兩箇石頭樣相挨相打只是一人之心合道理底是天理徇情欲底是人欲正當於其分界處理會五峰云天理人欲同行異情說得最好及至理會了精底一底只是一箇人又曰執中是無執之執如云以堯舜之道要湯何曾要來璘可學録別出舜功問人多要去人欲不若於天理上理會理會得天理人欲自退曰堯舜說不如此天理人欲是交界處不是兩箇人心不成都流只是占得多道心不成十全亦是占得多須是在天理則存天理在人欲則去人欲嘗愛五峰云天理人欲同行而異情此語甚好舜功云陸子靜說人心混混未別曰此說亦不妨大抵人心道心只是交界不是兩箇物觀下文惟精惟一可見德粹問既曰精一何必云執中曰允字有道理惟精一則信乎其能執中也因舉子靜說話多反伊川如君子喻於義小人喻於利解云惟其深喻是以篤好渠卻云好而後喻此語亦無害終不如伊川通老云伊川云敬則無己可克曰孔門只有箇顏子孔子且使之克己如何便會不克此語意味長可學舜禹相傳只是說人心惟危道心惟微惟精惟一允執厥中只就這心上理會也只在日用動靜之間求之不是去虛中討一箇物事來惟皇上帝降衷於下民天敘有典天秩有禮天便是這箇道理這箇道理便在日用間存養是要養這許多道理在中間這裏正好著力宇林恭甫說允執厥中未明先生曰中只是箇恰好底道理允信也是真箇執得堯當時告舜時只說這一句後來舜告禹又添得人心惟危道心惟微惟精惟一三句是舜說得又較子細這三句是允執厥中以前事是舜教禹做工夫處說道人心惟危道心惟微須是惟精惟一方能允執厥中堯當時告舜只說一句是時舜已曉得那箇了所以不復更說舜告禹時便是怕禹尚未曉得故恁地說論語後面說謹權量審法度修廢官舉逸民之類皆是恰好當做底事這便是執中處堯舜禹湯文武治天下只是這箇道理聖門所說也只是這箇雖是隨他所問說得不同然卻只是一箇道理如屋相似進來處雖不同入到裏面只是共這屋大概此篇所載便是堯舜禹湯文武相傳治天下之大法雖其纖悉不止此然大要卻不出此大要卻於此可見次日恭甫又問道心只是仁義禮智否曰人心便是饑而思食寒而思衣底心饑而思食後思量當食與不當食寒而思衣後思量當著與不當著這便是道心聖人時那人心也不能無但聖人是常合著那道心不教人心勝了道心道心便只是要安頓教是莫隨那人心去這兩者也須子細辨別所以道人心惟危道心惟微這箇便須是常常戒慎恐懼精去揀擇若揀得不精又便只是人心大概這兩句只是箇公與私只是一箇天理一箇人欲那惟精便是要揀教精惟一便是要常守得恁地今人固有其初揀得精後來被物欲引從人心去所以貴於惟一這惟精惟一便是舜教禹做工夫處它當時傳一箇大物事與他更無他說只有這四句且如仁者先難而後獲那先難便是道心後獲便是人心又如未有仁而遺其親未有義而後其君說仁義時那不遺親而後君自在裏面了若是先去計較那不遺親不後君便是人心便不是天理之公義剛問惟精惟一也是就心上說否曰也便是就事說不成是心裏如此臨事又別是箇道理有這箇心便有這箇事因有這箇事後方生這箇心那有一事不是心裏做出來底如口說話便是心裏要說如紾兄之臂你心裏若思量道不是時定是不肯為義剛問曾看無垢文字否某說亦曾看問如何某說如他說動心忍性學者當驚惕其心抑遏其性如說惟精惟一精者深入而不已一者專致而不二曰深入之說卻未是深入從何處去公且說人心道心如何某說道心者喜怒哀樂未發之時所謂寂然不動者也人心者喜怒哀樂已發之時所謂感而遂通者也人當精審專一無過不及則中矣曰恁地則人心道心不明白人心者人欲也危者危殆也道心者天理也微者精微也物物上有箇天理人欲因指書几云如墨上亦有箇天理人欲硯上也有箇天理人欲分明與他劈做兩片自然分曉堯舜禹所傳心法只此四句從周德明録別出竇初見先生先生問前此所見如何對以欲察見私心云云因舉張無垢人心道心解云精者深入而不已一者專志而無二亦自有力曰人心道心且要分別得界限分明彼所謂深入者若不察見將入從何處去竇曰人心者喜怒哀樂之已發未發者道心也曰然則已發者不謂之道心乎竇曰了翁言人心即道心道心即人心曰然則人心何以謂之危道心何以謂之微竇曰未發隱於內故微發不中節故危是以聖人欲其精一求合夫中曰不然程子曰人心人欲也道心天理也此處舉語録前段所謂人心者是氣血和合做成先生以手指身嗜欲之類皆從此出故危道心是本來稟受得仁義禮智之心聖人以此二者對待而言正欲其察之精而守之一也察之精則兩箇界限分明專一守著一箇道心不令人欲得以干犯譬如一物判作兩片便知得一箇好一箇惡堯舜所以授受之妙不過如此德明問允執厥中曰書傳所載多是說無過不及之中只如中庸之中亦只說無過不及但喜怒哀樂之未發謂之中一處卻說得重也人傑既惟精惟一允執厥中又曰無稽之言勿聽弗詢之謀勿庸節因言舜禹揖遜事云本是箇不好底事被他一轉轉作一大好事文蔚舞干羽之事想只是置三苗於度外而示以閒暇之意廣皋陶謨問允迪厥德謨明弼諧說者云是形容皋陶之德或以為是皋陶之言曰下文說慎厥身修思永是允迪厥德意庶明勵翼是謨明弼諧意恐不是形容皋陶底語問然則此三句是就人君身上說否曰是就人主身上說謨是人主謀謨弼是人臣輔翼與之和合如同寅協恭之意銖庶明勵翼庶明是衆賢樣言賴衆明者勉勵輔翼義剛問亦行有九德亦言其人有德曰此亦難曉若且據文勢解之當云亦言其人有德乃言曰載采采言其人之有德當以事實言之古注謂必言其所行某事某事以為驗是也人傑九德分得細密閎祖皋陶九德只是好底氣質然須兩件湊合將來方成一德凡十八種必大或問聖賢教人如克己復禮等語多只是教人克去私欲不見有教人變化氣質處如何曰寬而栗柔而立剛而無虐這便是教人變化氣質處又曰有人生下來便自少物欲者看來私欲是氣質中一事義剛簡而廉廉者隅也簡者混而不分明也論語集注廉謂稜角峭厲與此簡者混而不分明相發壽昌因其生而第之以其所當處者謂之敘因其敘而與之以其所當得者謂之秩天敘便是自然底次序君便教他居君之位臣便教他居臣之位父便教他居父之位子便教他居子之位秩便是那天敘裏面物事如天子祭天地諸侯祭山川大夫祭五祀士庶人祭其先天子八諸侯六大夫四皆是有這箇敘便是他這箇自然之秩義剛天工人其代之天秩天敘天命天討既曰天便自有許多般在其中天人一理只有一箇分不同方同寅協恭是上下一於敬方同寅協恭是言君臣政事懋哉懋哉即指上文五禮五刑之類要五禮有庸五典五惇須是同寅協恭和衷要五服五章五刑五用須是政事懋哉懋哉義剛天命有德五服五章哉天討有罪五刑五用哉若德之大者則賞以服之大者德之小者則賞以服之小者罪之大者則罪以大底刑罪之小者則罪以小底刑盡是天命天討聖人未嘗加一毫私意於其間只是奉行天法而已天敘有典敕我五典五惇哉天秩有禮自我五禮有庸哉許多典禮都是天敘天秩下了聖人只是因而敕正之因而用出去而已凡其所謂冠昏喪祭之禮與夫典章制度文物禮樂車輿衣服無一件是聖人自做底都是天做下了聖人只是依傍他天理行將去如推箇車子本自轉將去我這裏只是略扶助之而已僩益稷問益稷篇禹與皋陶只管自敘其功是如何曰不知是怎生地那夔前面且做是脫簡後面卻又有一段那禹前面時只是說他無可言但豫思日孜孜皋陶問他如何他便說也要恁地孜孜卻不知後面一段是怎生地良久云他上面也是說那丹朱後故恁地說丹朱緣如此故不得為天子我如此勤苦故有功以此相戒其君教莫如丹朱而如我便是古人直不似今人便要瞻前顧後義剛止守也惟幾當審萬事之幾惟康求箇安穩處弼直以直道輔之應之非惟人應之天亦應之節張元德問惟幾惟康其弼直東萊解幾作動康作靜如何曰理會不得伯恭說經多巧良久云恐難如此說問元德尋常看豫克厥宅心作存其心否曰然曰若說三有俊心三有宅心曰三有宅三有俊則又當如何此等處皆理會不得解得這一處礙了那一處若逐處自立說解之何書不可通良久云宅者恐是所居之位是已用之賢俊者是未用之賢也元德問豫欲聞六律五聲八音在治忽以出納五言汝聽曰亦不可曉漢書在治忽作七始詠七始如七均之類又如工以納言時而揚之格則承之庸之否則威之一段上文說欽四鄰庶頑讒說若不在時侯以明之撻以記之書用識哉欲並生哉皆不可曉如命龍之辭亦曰朕聖讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允皆言讒說此須是當時有此制度今不能知又不當杜撰胡說只得置之元德謂侯以明之撻以記之乃是賞罰曰既是賞罰當別有施設如何只靠射豈有無狀之人才射得中便為好人乎元德問五言東萊釋作君臣民事物之言曰君臣民事物是五聲所屬如宮亂則荒其君驕宮屬君最大羽屬物最小此是論聲若商放緩便似宮聲尋常琴家最取廣陵操以某觀之其聲最不和平有臣陵其君之意出納五言卻恐是審樂知政之類如此作五言說亦頗通又云納言之官如漢侍中今給事中朝廷誥令先過後省可以封駁元德問孔壁所傳本科斗書孔安國以伏生所傳為隸古定如何曰孔壁所傳平易伏生書多難曉如堯典舜典皋陶謨益稷是伏生所傳有方鳩僝功載采采等語不可曉大禹謨一篇卻平易又書中點句如天降割於我家不少延用寧王遺我大寶龜圻父薄違農父若保宏父定辟與古注點句不同又舊讀罔或耆壽俊在厥服作一句今觀古記款識中多云俊在位則當於壽字絶句矣又問盤庚如何曰不可曉如古我先王將多於前功適於山用降我凶德嘉績於朕邦全無意義又當時遷都更不說明遷之為利不遷之為害如中篇又說神說鬼若使如今誥令如此好一場大鶻突尋常讀尚書讀了太甲伊訓咸有一德便著鞔過盤庚卻看說命然高宗肜日亦自難看要之讀尚書可通則通不可通姑置之人傑義剛點尚書作會作一句先生曰公點得是義剛明庶以功恐庶字誤只是試字廣苗頑弗即工此是禹治水時調役他國人夫不動也後方征之既格而服則治其前日之罪而竄之竄之而後分北之今說者謂苗既格而又叛恐無此事又曰三苗想只是如今之溪洞相似溪洞有數種一種謂之媌未必非三苗之後也史中說三苗之國左洞庭右彭蠡在今湖北江西之界其地亦甚闊矣廣
