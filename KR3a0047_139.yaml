body:
  text: 朱子語類卷第一百三十九論文上有治世之文有衰世之文有亂世之文六經治世之文也如國語委靡繁絮真衰世之文耳是時語言議論如此宜乎周之不能振起也至於亂世之文則戰國是也然有英偉氣非衰世國語之文之比也饒録云國語說得絮只是氣衰又不如戰國文字更有些精彩楚漢間文字真是奇偉豈易及也又曰國語文字極困苦振作不起戰國文字豪傑便見事情非你殺我則我殺你黃云觀一時氣象如此如何遏捺得住所以啓漢家之治也僩楚詞不甚怨君今被諸家解得都成怨君不成模樣九歌是托神以為君言人間隔不可企及如己不得親近於君之意以此觀之他便不是怨君至山鬼篇不可以君為山鬼又倒說山鬼欲親人而不可得之意今人解文字不看大意只逐句解意卻不貫楚詞問離騷卜居篇內字曰字義從來曉不得但以意看可見如突梯滑稽只是軟熟迎逢隨人倒隨人起底意思如這般文字更無些小窒礙想只是信口恁地說皆自成文林艾軒嘗云班固揚雄以下皆是做文字已前如司馬遷司馬相如等只是恁地說出今看來是如此古人有取於登高能賦這也須是敏須是會說得通暢如古者或以言揚說得也是一件事後世只就紙上做如就紙上做則班揚便不如已前文字當時如蘇秦張儀都是會說史記所載想皆是當時說出又云漢末以後只做屬對文字直至後來只管弱如蘇頲著力要變變不得直至韓文公出來盡掃去了方做成古文然亦止做得未屬對合偶以前體格然當時亦無人信他故其文亦變不盡才有一二大儒略相效以下並只依舊到得陸宣公奏議只是雙關做去又如子厚亦自有雙關之文向來道是他初年文字後將年譜看乃是晚年文字蓋是他效世間模樣做則劇耳文氣衰弱直至五代竟無能變到尹師魯歐公幾人出來一向變了其間亦有欲變而不能者然大概都要變所以做古文自是古文四六自是四六卻不滾雜賀孫楚些沈存中以些為咒語如今釋子念娑婆訶三合聲而巫人之禱亦有此聲此卻說得好蓋今人只求之於雅而不求之於俗故下一半都曉不得道夫離騷協韻到篇終前面只發兩例後人不曉卻謂只此兩韻如此至楚詞注下事皆無這事是他曉不得後卻就這語意撰一件事為證都失了他那正意如淮南子山海經皆是如此義剛高斗南解楚詞引瑞應圖周子充說館閣中有此書引得好他更不問義理之是非但有出處便說好且如天問云啓棘賓商山海經以為啓上三嬪於天因得九歎九辨以歸如此是天亦好色也柳子厚天對以為胸嬪說天以此樂相博換得某以為棘字是夢字商字是古文篆天字如鄭康成解記衣衰作齊衰云是壞字也此亦是擦壞了蓋啓夢賓天如趙簡子夢上帝之類賓天是為之賓天與之以是樂也今人不曾讀古書如這般等處一向恁地過了陶淵明詩形夭無千歲曾氏考山海經云當作形天舞干戚看來是如此周子充不以為然言只是說精衛也此又不用出處了夔孫古人文章大率只是平說而意自長後人文章務意多而酸澀如離騷初無奇字只恁說將去自是好後來如魯直恁地著力做卻自是不好方子道夫録云古今擬騷之作惟魯直為無謂古賦雖熟看屈宋韓柳所作乃有進步處入本朝來騷學殆絶秦黃朝張之徒不足學也雉荀卿諸賦縝密盛得水住歐公蟬賦其名曰蟬這數句也無味雉楚詞平易後人學做者反艱深了都不可曉漢初賈誼之文質實朝錯說利害處好答制策便亂道董仲舒之文緩弱其答賢良策不答所問切處至無緊要處有纍數百言東漢文章尤更不如漸漸趨於對偶如楊震輩皆尚讖緯張平子非之然平子之意又卻理會風角鳥占何愈於讖緯陵夷至於三國兩晉則文氣日卑矣古人作文作詩多是模倣前人而作之蓋學之既久自然純熟如相如封禪書模倣極多柳子厚見其如此卻作貞符以反之然其文體亦不免乎蹈襲也人傑漢文司馬遷文雄健意思不帖帖有戰國文氣象賈誼文亦然老蘇文亦雄健似此皆有不帖帖意仲舒文實劉向文又較實亦好無些虛氣象比之仲舒仲舒較滋潤發揮大抵武帝以前文雄健武帝以後更實到杜欽谷永書又太弱無歸宿了匡衡書多有好處漢明經中皆不似此淳仲舒文大概好然也無精彩淳林艾軒云司馬相如賦之聖者揚子雲班孟堅只填得他腔子佐録作腔子滿如何得似他自在流出左太沖張平子竭盡氣力又更不及可學問呂舍人言古文衰自谷永曰何止谷永鄒陽獄中書已自皆作對子了又問司馬相如賦似作之甚易曰然又問高適焚舟決勝賦甚淺陋曰文選齊梁間江總之徒賦皆不好了因說神宗修汴城成甚喜曰前代有所作時皆有賦周美成聞之遂撰汴都賦進上大喜因朝降出宰相每有文字降出時即合誦一遍宰相不知是誰知古賦中必有難字遂傳與第二人以次傳至尚書右丞王和甫下無人矣和甫即展開琅然誦一遍上喜既退同列問如何識許多字和甫曰某也只是讀傍文揚録作一邊呂編文鑑要尋一篇賦冠其首又以美成賦不甚好遂以梁周翰五鳳樓賦為首美成賦亦在其後賓戲解嘲劇秦貞符諸文字皆祖宋玉之文進學解亦此類陽春白雪云云者不記其名皆非佳文揚夜來鄭文振問西漢文章與韓退之諸公文章如何某說而今難說便與公說某人優某人劣公亦未必信得及須是自看得這一人文字某處好某處有病識得破了卻看那一人文字便見優劣如何若看這一人文字未破如何定得優劣便說與公優劣公亦如何便見其優劣處但子細自看自識得破而今人所以識古人文字不破只是不曾子細看又兼是先將自家意思橫在胸次所以見從那偏處去說出來也都是橫說又曰人做文章若是子細看得一般文字熟少間做出文字意思語脈自是相似讀得韓文熟便做出韓文底文字讀得蘇文熟便做出蘇文底文字若不曾子細看少間卻不得用向來初見擬古詩將謂只是學古人之詩元來卻是如古人說灼灼園中花自家也做一句如此遲遲澗畔松自家也做一句如此磊磊澗中石自家也做一句如此人生天地間自家也做一句如此意思語脈皆要似他底只換卻字某後來依如此做得二三十首詩便覺得長進蓋意思句語血脈勢向皆效它底大率古人文章皆是行正路後來杜撰底皆是行狹隘邪路去了而今只是依正底路脈做將去少間文章自會高人又云蘇子由有一段論人做文章自有合用底字只是下不著又如鄭齊叔云做文字自有穩底字只是人思量不著橫渠云發明道理惟命字難要之做文字下字實是難不知聖人說出來底也只是這幾字如何鋪排得恁地安穩或曰子瞻云都來這幾字只要會鋪排然而人之文章也只是三十歲以前氣格都定但有精與未精耳然而掉了底便荒疏只管用功底又較精向見韓無咎說它晚年做底文字與他二十歲以前做底文字不甚相遠此是它自驗得如此人到五十歲不是理會文章時節前面事多日子少了若後生時每日便偷一兩時間做這般工夫若晚年如何有工夫及此或曰人之晚年知識卻會長進曰也是後生時都定便長進也不會多然而能用心於學問底便會長進若不學問只縱其客氣底亦如何會長進日見昏了有人後生氣盛時說盡萬千道理晚年只恁地闒靸底或引程先生曰人不學便老而衰曰只這一句說盡了又云某人晚年日夜去讀書某人戲之曰吾丈老年讀書也須還讀得入不知得入如何得出謂其不能發揮出來為做文章之用也其說雖粗似有理又云人晚年做文章如禿筆寫字全無鋒鋭可觀又云某四十以前尚要學人做文章後來亦不暇及此矣然而後來做底文字便只是二十左右歲做底文字又云劉季章近有書云他近來看文字覺得心平正某答他令更掉了這箇虛心看文字蓋他向來便是硬自執他說而今又是將這一說來罩正身未理會得在大率江西人都是硬執他底橫說如王介甫陸子靜都只是橫說且如陸子靜說文帝不如武帝豈不是橫說又云介甫諸公取人如資質淳厚底他便不取看文字穩底他便不取如那決裂底他便取說他轉時易大率都是硬執他底燾張以道曰眄庭柯以怡顏眄讀如俯讀作盼者非義剛韓文力量不如漢文漢文不如先秦戰國揚大率文章盛則國家卻衰如唐貞觀開元都無文章及韓昌黎柳河東以文顯而唐之治已不如前矣汪聖錫云國初制詔雖粗卻甚好又如漢高八年詔與文帝即位詔只三數句今人敷衍許多無過只是此箇柱子若海韓柳先生方修韓文考異而學者至因曰韓退之議論正規模闊大然不如柳子厚較精密如辨鶡冠子及說列子在莊子前及非國語之類辨得皆是黃達才言柳文較古曰柳文是較古但卻易學學便似他不似韓文規模闊學柳文也得但會衰了人文字義剛夔孫録云韓文大綱好柳文論事卻較精核如辨鶡冠子之類非國語中儘有好處但韓難學柳易學揚因論韓文公謂如何用功了方能辨古書之真僞曰鶡冠子亦不曾辨得柳子厚謂其書乃寫賈誼鵬賦之類故只有此處好其他皆不好柳子厚看得文字精以其人刻深故如此韓較有些王道意思每事較含洪便不能如此揚退之要說道理又要則劇有平易處極平易有險奇處極險奇且教他在潮州時好止住得一年柳子厚卻得永州力也柳學人處便絶似平淮西雅之類甚似詩詩學陶者便似陶韓亦不必如此自有好處如平淮西碑好揚陳仲蔚問韓文禘義說懿獻二廟之事當否曰說得好其中所謂興聖廟者乃是敘武昭王之廟乃唐之始祖然唐又封皋陶為帝又尊老子為祖更無理會又問韓柳二家文體孰正曰柳文亦自高古但不甚醇正又問子厚論封建是否曰子厚說封建非聖人意也勢也亦是但說到後面有偏處後人辨之者亦失之太過如廖氏所論封建排子厚太過且封建自古便有聖人但因自然之理勢而封之乃見聖人之公心且如周封康叔之類亦是古有此制因其有功有德有親當封而封之卻不是聖人有不得已處若如子厚所說乃是聖人欲吞之而不可得乃無可奈何而為此不知所謂勢者乃自然之理勢非不得已之勢也且如射王中肩之事乃是周末征伐自諸侯出故有此等事使征伐自天子出安得有是事然封建諸侯卻大故難制御且如今日蠻洞能有幾大若不循理朝廷亦無如之何若古時有許多國自是難制如隱公時原之一邑乃周王不奈他何賜與鄭鄭不能制到晉文公時周人將與晉而原又不服故晉文公伐原且原之為邑甚小又在東周王城之側而周王與晉鄭俱不能制蓋渠自有兵不似今日太守有不法處便可以降官放罷古者大率動便是征伐所以孟子曰三不朝則六師移之在周官時已是如此了便是古今事勢不同便是難說因言孟子所謂五等之地與周禮不同孟子蓋說夏以前之制周禮乃是成周之制如當時封周公於魯乃七百里於齊尤闊如所謂東至於海西至於河南至於穆陵北至於無棣以地理考之大段闊所以禹在塗山萬國來朝至周初但千八百國又曰譬如一樹枝葉太繁時本根自是衰枯如秦始皇則欲削去枝葉而自留一幹亦自不可義剛有一等人專於為文不去讀聖賢書又有一等人知讀聖賢書亦自會作文到得說聖賢書卻別做一箇詫異模樣說不知古人為文大抵只如此那得許多詫異韓文公詩文冠當時後世未易及到他上宰相書用菁菁者莪詩注一齊都寫在裏面若是他自作文豈肯如此作最是說載沉載浮沉浮皆載也可笑載是助語分明彼如此說了他又如此用賀孫韓文退之除崔群侍郎制最好但只有此制別更無不知如何義剛或問伯夷頌萬世標準與特立獨行雖足以明君臣之大義適權通變又當循夫理之當然者也先生曰說開了當云雖武王周公為萬世標準然伯夷叔齊惟自特立不顧又曰古本云一凡人沮之譽之與彼夫聖人是一對其文意尤有力椿退之送陳彤秀才序多一不字舊嘗疑之只看過了後見謝子暢家本乃後山傳歐陽本圈了此不字韓退之墓志有怪者了先生喜韓文宴喜亭記及韓弘碑碑老年筆方唐僧多從士大夫之有名者討詩文以自華如退之送文暢序中所說又如劉禹錫自有一卷送僧詩或云退之雖闢佛也多要引接僧徒曰固是他所引者又卻都是那破賴底僧如靈師惠師之徒及晚年見大顛於海上說得來闊大勝妙自然不得不服人多要出脫退之也不消得恐亦有此理也廣先輩好做詩與僧僧多是求人詩序送行劉禹錫文集自有一冊送僧詩韓文公亦多與僧交涉又不曾見好僧都破落戶然各家亦被韓文公說得也狼狽文公多只見這般僧後卻撞著一箇大顛也是異事人多說道被大顛說下了亦有此理是文公不曾理會他病痛彼他才說得高便道是好了所以有頗聰明識道理實能外形骸以理自勝之語賀孫才卿問韓文李漢序頭一句甚好曰公道好某看來有病陳曰文者貫道之器且如六經是文其中所道皆是這道理如何有病曰不然這文皆是從道中流出豈有文反能貫道之理文是文道是道文只如喫飯時下飯耳若以文貫道卻是把本為末以末為本可乎其後作文者皆是如此因說蘇文害正道甚於老佛且如易所謂利者義之和卻解為義無利則不和故必以利濟義然後合於人情若如此非惟失聖言之本指又且陷溺其心先生正色曰某在當時必與他辨卻笑曰必被他無禮友仁柳文局促有許多物事卻要就些子處安排簡而不古更說些也不妨封建論并數長書是其好文合尖氣短如人火忙火急來說不及又便了了揚柳文柳子厚文有所模倣者極精如自解諸書是倣司馬遷與任安書劉原父作文便有所倣宮沉羽振錦心繡口柳子厚語璘韓千變萬化無心變歐有心變杜祈公墓志說一件未了又說一件韓董晉行狀尚稍長權德輿作宰相神道碑只一板許歐蘇便長了蘇體只是一類柳伐原議極局促不好東萊不知如何喜之陳後山文如仁宗飛白書記大段好曲折亦好墓志亦好有典有則方是文章其他文亦有大局促不好者如題太白像高軒過古詩是晚年做到平易處高軒過恐是絶筆又一條云後山仁宗飛白書記其文曲折甚多過得自在不如柳之局促總論韓柳歐蘇諸公東坡文字明快老蘇文雄渾儘有好處如歐公曾南豐韓昌黎之文豈可不看柳文雖不全好亦當擇合數家之文擇之無二百篇下此則不須看恐低了人手段但採他好處以為議論足矣若班馬孟子則是大底文字道夫韓文高歐陽文可學曾文一字挨一字謹嚴然太迫又云今人學文者何曾作得一篇枉費了許多氣力大意主乎學問以明理則自然發為好文章詩亦然國初文章皆嚴重老成嘗觀嘉祐以前誥詞等言語有甚拙者而其人才皆是當世有名之士蓋其文雖拙而其辭謹重有欲工而不能之意所以風俗渾厚至歐公文字好底便十分好然猶有甚拙底未散得他和氣到東坡文字便已馳騁忒巧了及宣政間則窮極華麗都散了和氣所以聖人取先進於禮樂意思自是如此國朝文劉子澄言本朝只有四篇文字好太極圖西銘易傳序春秋傳序因言杜詩亦何用曰是無意思大部小部無萬數益得人甚事因傷時文之弊謂張才叔書義好自靖人自獻於先王義胡明仲醉後每誦之又謂劉棠舜不窮其民論好歐公甚喜之其後姚孝寧易義亦好壽昌録云或問太極西銘曰自孟子以後方見有此兩篇文章李泰伯文實得之經中雖淺然皆自大處起議論首卷潛書民言好如古潛夫論之類周禮論好如宰相掌人主飲食男女事某意如此今其論皆然文字氣象大段好甚使人愛之亦可見其時節方興如此好老蘇父子自史中戰國策得之故皆自小處起議論歐公喜之李不軟貼不為所喜范文正公好處歐不及李晚年須參道有一記說達磨宗派甚詳須是大段去參究來又曰以李視今日之文如三日新婦然某人輩文字乃蛇鼠之見先生讀宋景文張巡贊曰其文自成一家景文亦服人嘗見其寫六一瀧岡阡表二句云求其生而不得則死者與我皆無恨也溫公文字中多取荀卿助語六一文一倡三歎今人是如何作文六一文有斷續不接處如少了字模樣如祕演詩集序喜為歌詩以自娛十年間兩節不接六一居士傳意凡文弱仁宗飛白書記文不佳制誥首尾四六皆治平間所作非其得意者恐當時亦被人催促加以文思緩不及子細不知如何然有紆餘曲折辭少意多玩味不能已者又非辭意一直者比黃夢升墓志極好問先生所喜者云豐樂亭記揚陳同父好讀六一文嘗編百十篇作一集今刊行豐樂亭記是六一文之最佳者卻編在拾遺歐公文字鋒刃利文字好議論亦好嘗有詩云玉顏自古為身纍肉食何人為國謀以詩言之是第一等好詩以議論言之是第一等議論拱壽欽夫文字不甚改改後往往反不好亞夫曰歐公文字愈改愈好曰亦有改不盡處如五代史宦者傳末句云然不可不戒當時必有載張承業等事在此故曰然不可不戒後既不欲載之於此而移之於後則此句當改偶忘削去故也方子因改謝表曰作文自有穩字古之能文者才用便用著這樣字如今不免去搜索修改又言歐公為蔣穎叔輩所誣既得辨明謝表中自敘一段只是自胸中流出更無些窒礙此文章之妙也又曰歐公文亦多是修改到妙處頃有人買饒録作見得他醉翁亭記卧初說滁州四面有山凡數十字末後改定只曰環滁皆山也五字而已饒録云有數十字序滁州之山忽大圈了一邊注環滁皆山也一句如尋常不經思慮信意所作言語亦有絶不成文理者不知如何廣前輩見人皆通文字先生在同安嘗見六一見人文字三卷子是以平日所作詩文之類楷書以獻之振歐公文章及三蘇文好說只是平易說道理初不曾使差異底字換卻那尋常底字儒用文字到歐曾蘇道理到二程方是暢荊公文暗歐公文字敷腴溫潤曾南豐文字又更峻潔雖議論有淺近處然卻平正好到得東坡便傷於巧議論有不正當處後來到中原見歐公諸人了文字方稍平老蘇尤甚大抵已前文字都平正人亦不會大段巧說自三蘇文出學者始日趨於巧如李泰伯文尚平正明白然亦已自有些巧了廣問荊公之文如何曰他卻似南豐文但比南豐文亦巧荊公曾作許氏世譜寫與歐公看歐公一日因曝書見了將看不記是誰作意中以為荊公作又曰介甫不解做得恁地恐是曾子固所作廣又問後山文如何曰後山煞有好文字如黃樓銘館職策皆好又舉數句說人不怨暗君怨明君處以為說得好廣又問後山是宗南豐文否曰他自說曾見南豐於襄漢間後見一文字說南豐過荊襄後山攜所作以謁之南豐一見愛之因留款語適欲作一文字事多因托後山為之且授以意後山文思亦澀窮日之力方成僅數百言明日以呈南豐南豐云大略也好只是冗字多不知可為略刪動否後山因請改竄但見南豐就坐取筆抹數處每抹處連一兩行便以授後山凡削去一二百字後山讀之則其意尤完因歎服遂以為法所以後山文字簡潔如此廣因舉秦丞相教其子孫作文說中說後山處曰他都記錯了南豐入史館時止為檢討官是時後山尚未有官後來入史館嘗薦邢和叔雖亦有意薦後山以其未有官而止廣揚録云秦作後山敘謂南豐辟陳為史官陳元祐間始得官秦說誤因言文士之失曰今曉得義理底人少間被物欲激搏猶自一強一弱一勝一負如文章之士下梢頭都靠不得且如歐陽公初間做本論其說已自大段拙了然猶是一片好文章有頭尾它不過欲封建井田與冠婚喪祭搜田燕饗之禮使民朝夕從事於此少間無工夫被佛氏引去自然可變其計可謂拙矣然猶是正當議論也到得晚年自做六一居士傳宜其所得如何卻只說有書一千卷集古録一千卷琴一張酒一壺碁一局與一老人為六更不成說話分明是自納敗闕如東坡一生讀盡天下書說無限道理到得晚年過海做過化峻靈王廟碑引唐肅宗時一尼恍惚升天見上帝以寶玉十三枚賜之云中國有大災以此鎮之今此山如此意其必有寶云云更不成議論似喪心人說話其他人無知如此說尚不妨你平日自視為如何說盡道理卻說出這般話是可怪否觀於海者難為水游於聖人之門者難為言分明是如此了便看他們這般文字不入僩問坡文不可以道理並全篇看但當看其大者曰東坡文說得透南豐亦說得透如人會相論底一齊指摘說盡了歐公不盡說含蓄無盡意又好因謂張定夫言南豐祕閣諸序好曰那文字正是好峻靈王廟碑無見識伏波廟碑亦無意思伏波當時蹤跡在廣西不在彼中記中全無發明揚曰不可以道理看他然二碑筆健曰然又問潛真閣銘好曰這般間戲文字便好雅正底文字便不好如韓文公廟碑之類初看甚好讀子細點檢疏漏甚多又曰東坡令其姪學渠兄弟蚤年應舉時文字揚人老氣衰文亦衰歐陽公作古文力變舊習老來照管不到為某詩序又四六對偶依舊是五代文習東坡晚年文雖健不衰然亦疏魯如南安軍學記海外歸作而有弟子揚觶序點者三之語序點是人姓名其疏如此淳六一記菱溪石東坡記六菩薩皆寓意防人取去然氣象不類如此老蘇之文高只議論乖角燾老蘇文字初亦喜看後覺得自家意思都不正當以此知人不可看此等文字固宜以歐曾文字為正東坡子由晚年文字不然然又皆議論衰了東坡初進策時只是老蘇議論坡文雄健有餘只下字亦有不貼實處道夫坡文只是大勢好不可逐一字去點檢義剛東坡墨君堂記只起頭不合說破竹字不然便似毛穎傳必大東坡歐陽公文集敘只恁地文章儘好但要說道理便看不得首尾皆不相應起頭甚麼樣大末後卻說詩賦似李白記事似司馬相如賀孫統領商榮以溫公神道碑為餉先生命吏約道夫同視且曰坡公此文說得來恰似山摧石裂道夫問不知既說誠何故又說一曰這便是他看道理不破處頃之直卿至復問若說誠之則說一亦不妨否曰不用恁地說蓋誠則自能一問大凡作這般文字不知還有布置否曰看他也只是據他一直恁地說將去初無布置如此等文字方其說起頭時自未知後面說甚麼在以手指中間曰到這裏自說盡無可說了卻忽然說起來如退之南豐之文卻是布置某舊看二家之文復看坡文覺得一段中缺了句一句中缺了字又曰向嘗聞東坡作韓文公廟碑一日思得頗久饒録云不能得一起頭起行百十遭忽得兩句云匹夫而為百世師一言而為天下法遂掃將去道夫問看老蘇文似勝坡公黃門之文又不及東坡曰黃門之文衰遠不及也只有黃樓賦一篇爾道夫因言歐陽公文平淡曰雖平淡其中卻自美麗有好處有不可及處卻不是闒茸無意思又曰歐文如賓主相見平心定氣說好話相似坡公文如說不辦後對人鬧相似都無恁地安詳蜚卿問范太史文曰他只是據見定說將去也無甚做作如唐鑑雖是好文字然多照管不及評論總意不盡只是文字本體好然無精神所以有照管不到處無氣力到後面多脫了道夫因問黃門古史一書曰此書儘有好處道夫曰如他論西門豹投巫事以為他本循良之吏馬遷列之於滑稽不當似此議論甚合人情曰然古史中多有好處如論莊子三四篇譏議夫子處以為決非莊子之書乃是後人截斷莊子本文攙入此其考據甚精密由今觀之莊子此數篇亦甚鄙俚道夫或問蘇子由之文比東坡稍近理否曰亦有甚道理但其說利害處東坡文字較明白子由文字不甚分曉要之學術只一般因言東坡所薦引之人多輕儇之士若使東坡為相則此等人定皆布滿要路國家如何得安靜賀孫諸公祭溫公文只有子由文好歐公大段推許梅聖俞所注孫子看得來如何得似杜牧注底好以此見歐公有不公處或曰聖俞長於詩曰詩亦不得謂之好或曰其詩亦平淡曰他不是平淡乃是枯槁拱壽范淳夫文字純粹下一箇字便是合當下一箇字東坡所以伏他東坡輕文字不將為事若做文字時只是胡亂寫去如後面恰似少後添節後來如汪聖錫制誥有溫潤之氣曾問某人前輩四六語孰佳答云莫如范淳夫因舉作某王加恩制云周尊公旦地居四輔之先漢重王蒼位列三公之上若昔仁祖尊事荊王顧豫沖人敢後茲典自然平正典重彼工於四六者卻不能及德明劉原父才思極多湧將出來每作文多法古絶相似有幾件文字學禮記春秋說學公穀文勝貢父振劉貢父文字工於摹倣學公羊儀禮若海蘇子容文慢義剛南豐文字確實道夫問南豐文如何曰南豐文卻近質他初亦只是學為文卻因學文漸見些子道理故文字依傍道理做不為空言只是關鍵緊要處也說得寬緩不分明緣他見處不徹本無根本工夫所以如此但比之東坡則較質而近理東坡則華豔處多或言某人如搏謎子更不可曉曰然尾頭都不說破頭邊做作掃一片去也好只到尾頭便沒合殺只恁休了篇篇如此不知是甚意思或曰此好奇之過曰此安足為奇觀前輩文章如賈誼董仲舒韓愈諸人還有一篇如此否夫所貴乎文之足以傳遠以其議論明白血脈指意曉然可知耳文之最難曉者無如柳子厚然細觀之亦莫不自有指意可見何嘗如此不說破其所以不說破者只是吝惜欲我獨會而他人不能其病在此大概是不肯蹈襲前人議論而務為新奇惟其好為新奇而又恐人皆知之也所以吝惜僩曾所以不及歐處是紆徐揚録作餘曲折處曾喜模擬人文字擬峴臺記是倣醉翁亭記不甚似南豐擬制內有數篇雖雜之三代誥命中亦無愧必大南豐作宜黃筠州二學記好說得古人教學意出義剛南豐列女傳序說二南處好南豐范貫之奏議序氣脈渾厚說得仁宗好東坡趙清獻神道碑說仁宗處其文氣象不好第一流人等句南豐不說子由挽南豐詩甚服之兩次舉南豐集中范貫之奏議序末文之備盡曲折處方南豐有作郡守時榜之類為一集不曾出先生舊喜南豐文為作年譜問嘗聞南豐令後山一年看伯夷傳後悟文法如何曰只是令他看一年則自然有自得處江西歐陽永叔王介甫曾子固文章如此好至黃魯直一向求巧反纍正氣必大陳後山之文有法度如黃樓銘當時諸公都斂衽佐録云便是今人文字都無他抑揚頓挫因論當世人物有以文章記問為能而好點檢它人不自點檢者曰所以聖人說益者三樂樂節禮樂樂道人之善樂多賢友至館職策陳無己底好李清臣文飽滿雜說甚有好議論李清臣文比東坡較實李舜舉永樂敗死墓志說得不分不明看來是不敢說桐陰舊話載王銍云李邦直作韓太保惟忠墓志乃孫巨源文也先生曰巨源文溫潤韓碑徑只是邦直文也揚論胡文定公文字字皆實但奏議每件引春秋亦有無其事而遷就之者大抵朝廷文字且要論事情利害是非令分曉今人多先引故事如論青苗只是東坡兄弟說得有精神他人皆說從別處去德明胡侍郎萬言書好令後生讀先生舊親寫一冊又曰上殿劄子論元老好無逸解好請行三年喪劄子極好諸奏議外制皆好陳幾道存誠齊銘某初得之見其都是好義理堆積更看不辦後子細誦之卻見得都是湊合與聖賢說底全不相似其云又如月影散落萬川定相不分處處皆圓這物事不是如此若是如此孔孟卻隱藏著不以布施是何心哉乃知此物事不當恁地說張子韶文字沛然猶有氣開口見心索性說出使人皆知近來文字開了又闔闔了又開開闔七八番到結末處又不說只恁地休了至文章輕重可見人壽夭不在美惡上白鹿洞記力輕韓元吉雖只是胡說然有力吳逵文字亦然揚韓無咎文做著儘和平有中原之舊無南方啁哳之音佐王龜齡奏議氣象大曾司直大故會做文字大故馳騁有法度裘父大不及他裘父文字澀說不去義剛陳君舉西掖制詞殊未得體王言溫潤不尚如此胡明仲文字卻好義剛或言陳蕃叟武不喜坡文戴肖望溪不喜南豐文先生曰二家之文雖不同使二公相見曾公須道坡公底好坡公須道曾公底是道夫德粹語某人文章先生曰紹興間文章大抵粗成段時文然今日太細膩流於委靡問賢良先生曰賢良不成科目天下安得許多議論可學以下論近世之文諸公文章馳騁好異止緣好異所以見異端新奇之說從而好之這也只是見不分曉所以如此看仁宗時制詔之文極朴固是不好看只是它意思氣象自恁地深厚久長固是拙只是他所見皆實看他下字都不甚恰好有合當下底字卻不下也不是他識了不下只是他當初自思量不到然氣象儘好非如後來之文一味纖巧不實且如進卷方是二蘇做出恁地壯偉發越已前不曾如此看張方平進策更不作文只如說鹽鐵一事他便從鹽鐵原頭直說到如今中間卻載著甚麼年甚麼月後面更不說措置如今只是將虛文漫演前面說了後面又將這一段翻轉這只是不曾見得所以不曾見得只是不曾虛心看聖賢之書固有不曾虛心看聖賢書底人到得要去看聖賢書底又先把他自一副當排在這裏不曾見得聖人意待做出又只是自底某如今看來惟是聰明底人難讀書難理會道理蓋緣他先自有許多一副當聖賢意思自是難入因說陳叔向是白撰一箇道理某嘗說教他據自底所見恁地說也無害只是又把那說來壓在這裏文字上他也自見得自底虛了行不得故如此然如何將兩箇要捏做一箇得一箇自方一箇自圓如何總合得這箇不是他要如此止緣他合下見得如此如楊墨楊氏終不成自要為我墨氏終不成自要兼愛只緣他合下見得錯了若不是見得如此定不解常如此做楊氏壁立萬仞毫髮不容較之墨氏又難若不是他見得如此如何心肯意肯陳叔向所見吒異它說目視己色耳聽己聲口言己事足循己行有目固當視天下之色有耳固當聽天下之聲有口固能言天下之事有足固當循天下之行他卻如此說看他意思是如此只要默然靜坐是不看眼前物事不聽別人說話不說別人是非不管別人事又如說言忠信行篤敬一章便說道緊要只在立則見其參於前在輿則見其倚於衡問道見是見箇甚麼物事他便說見是見自家身己某與說立是自家身己立在這裏了參於前又是自家身己在輿是自家身己坐在這裏了倚於衡又是自家身己卻是有兩箇身己又說格物做心云格住這心方會知得到未嘗見人把物做心與他恁地說他只是自底是以此知人最是知見為急聖人尚說學之不講是吾憂也若只恁地死守得這箇心便了聖人又須要人講學何故若只守這心據自家所見做將去少間錯處都不知賀孫今人作文皆不足為文大抵專務節字更易新好生面辭語至說義理處又不肯分曉觀前輩歐蘇諸公作文何嘗如此聖人之言坦易明白因言以明道正欲使天下後世由此求之使聖人立言要教人難曉聖人之經定不作矣若其義理精奧處人所未曉自是其所見未到耳學者須玩味深思久之自可見何嘗如今人欲說又不敢分曉說不知是甚所見畢竟是自家所見不明所以不敢深言且鶻突說在裏宇前輩文字有氣骨故其文壯浪歐公東坡亦皆於經術本領上用功今人只是於枝葉上粉澤爾如舞訝鼓然其間男子婦人僧道雜色無所不有但都是假底舊見徐端立言石林嘗云今世安得文章只有箇減字換字法爾如言湖州必須去州字只稱湖此減字法也不然則稱霅上此換字法也方子蓋卿録云今人做文字卻是胭脂膩粉粧成自是不壯浪無骨氣如舞訝鼓相似也有男兒也有婦女也有僧道秀才但都是假底嘗見徐端立言石林嘗云今世文章只是用換字減字法如說湖州只說湖此減字法不然則稱霅上此換字法嘗見張安道進卷其文皆有直氣謙録云今來文字至無氣骨向來前輩雖是作時文亦是朴實頭鋪事實朴實頭引援朴實頭道理看著雖不入眼卻有骨氣今人文字全無骨氣便似舞訝鼓者塗眉畫眼僧也有道也有婦人也有村人也有俗人也有官人也有士人也有只不過本樣人然皆足以惑衆真好笑也或云此是禁懷挾所致曰不然自是時節所尚如此只是人不知學全無本柄被人引動尤而效之正如而今作件物事一箇做起一人學起有不崇朝而遍天下者本來合當理會底事全不理會直是可惜貫穿百氏及經史乃所以辨驗是非明此義理豈特欲使文詞不陋而已義理既明又能力行不倦則其存諸中者必也光明四達何施不可發而為言以宣其心志當自發越不凡可愛可傳矣今執筆以習研鑽華采之文務悅人者外而已可恥也矣人傑以下論作文道者文之根本文者道之枝葉惟其根本乎道所以發之於文皆道也三代聖賢文章皆從此心寫出文便是道今東坡之言曰吾所謂文必與道俱則是文自文而道自道待作文時旋去討箇道來入放裏面此是它大病處只是它每常文字華妙包籠將去到此不覺漏逗說出他本根病痛所以然處緣他都是因作文卻漸漸說上道理來不是先理會得道理了方作文所以大本都差歐公之文則稍近於道不為空言如唐禮樂志云三代而上治出於一三代而下治出於二此等議論極好蓋猶知得只是一本如東坡之說則是二本非一本矣僩才要作文章便是枝葉害著學問反兩失也壽昌詩律雜文不須理會科舉是無可奈何一以門戶一以父兄在上責望科舉卻有了時詩文之類看無出時節芝一日說作文曰不必著意學如此文章但須明理理精後文字自典實伊川晚年文字如易傳直是盛得水住蘇子瞻雖氣豪善作文終不免疏漏處大雅問要看文以資筆勢言語須要助發義理曰可看孟子韓文韓不用科段直便說起去至終篇自然純粹成體無破綻如歐曾卻各有一箇科段卻曾學曾為其節次定了今覺得要說一意須待節次了了方說得到及這一路定了左右更去不得又云方之文有澀處因言陳阜卿教人看柳文了卻看韓文不知看了柳文便自壞了如何更看韓文方因論文曰作文字須是靠實說得有條理乃好不可架空細巧大率要七分實只二三分文如歐公文字好者只是靠實而有條理如張承業及宦者等傳自然好東坡如靈壁張氏園亭記最好亦是靠實秦少游龍井記之類全是架空說去殊不起發人意思時舉文章要理會本領謂理前輩作者多讀書亦隨所見理會今皆倣賢良進卷胡作每論著述文章皆要有綱領文定文字有綱領龜山無綱領如字說三經辨之類方前輩做文字只依定格依本份做所以做得甚好後來人卻厭其常格則變一般新格做本是要好然未好時先差去聲異了又云前輩用言語古人有說底固是用如世俗常說底亦用後來人都要別撰一般新奇言語下梢與文章都差異了卻將差異底說話換了那尋常底說話燾問舍弟序子文字如何進工夫云云曰看得韓文熟饒録云看一學者文字曰好好讀得韓文熟又曰要做好文字須是理會道理更可以去韓文上一截如西漢文字用工問史記如何曰史記不可學學不成卻顛了不如且理會法度文字問後山學史記曰後山文字極法度幾於太法度了然做許多碎句子是學史記又曰後世人資稟與古人不同今人去學左傳國語皆一切踏踏地說去沒收煞揚文字奇而穩方好不奇而穩只是闒靸燾作文何必苦留意又不可太頽塌只略教整齊足矣文蔚前輩作文者古文有名文字皆模擬作一篇故後有所作時左右逢原因論詩曰嘗見傅安道說為文字之法有所謂筆力有所謂筆路筆力到二十歲許便定了便後來長進也只就上面添得些子筆路則常拈弄時轉開拓不拈弄便荒廢此說本出於李漢老看來作詩亦然雉因說伯恭所批文曰文章流轉變化無窮豈可限以如此某因說陸教授謂伯恭有箇文字腔子才作文字時便將來入箇腔子做文字氣脈不長先生曰他便是眼高見得破至之以所業呈先生先生因言東萊教人作文當看獲麟解也是其間多曲折又曰某舊最愛看陳無己文他文字也多曲折謂諸生曰韓柳文好者不可不看道夫人要會作文章須取一本西漢文與韓文歐陽文南豐文燾因論今日舉業不佳曰今日要做好文者但讀史漢韓柳而不能便請斫取老僧頭去嘗與後生說若會將漢書及韓柳文熟讀不到不會做文章舊見某人作馬政策云觀戰奇也觀戰勝又奇也觀騎戰勝又大奇也這雖是粗中間卻有好意思如今時文一兩行便做萬千屈曲若一句題也要立兩腳三句題也要立兩腳這是多少衰氣賀孫後人專做文字亦做得衰不似古人前輩云言衆人之所未嘗任大臣之所不敢多少氣魄今成甚麼文字節人有才性者不可令讀東坡等文有才性人便須取入規矩不然蕩將去因論今人作文好用字子如讀漢書之類便去收拾三兩箇字洪邁又較過人亦但逐三兩行文字筆勢之類好者讀看因論南豐尚解使一二字歐蘇全不使一箇難字而文章如此好揚凡人做文字不可太長照管不到寧可說不盡歐蘇文皆說不曾盡東坡雖是宏闊瀾翻成大片滾將去他裏面自有法今人不見得他裏面藏得法但只管學他一滾做將去文字或作做事無大綱領拈掇不起某平生不會做補接底文字補協得不濟事方子前輩云文字自有穩當底字只有始者思之不精又曰文字自有一箇天生成腔子古人文字自貼這天生成腔子節因論今世士大夫好作文字論古今利害比並為說曰不必如此只要明義理義理明則利害自明古今天下只是此理所以今人做事多暗與古人合者只為理一故也大雅人做文字不著只是說不著說不到說自家意思不盡燾看陳蕃叟同合録序文字艱澀曰文章須正大須教天下後世見之明白無疑揚因說作應用之文此等苛禮無用亦可但人所共用亦不可廢曹宰問云尋常人徇人情做事莫有牽制否曰孔子自有條法從衆從下惟其當爾謙大率諸義皆傷淺短鋪陳略盡便無可說不見反覆辨論節次發明工夫讀之未終已無餘味矣此學不講之過也抄漳浦課簿道夫顯道云李德遠侍郎在建昌作解元做本強則精神折衝賦其中一聯云虎在山而藜藿不採威令風行金鑄鼎而魑魅不逢姦邪影滅試官大喜之乃是全用汪玉溪相黃潛善麻制中語後來士人經禮部訟之時樊茂實為侍郎乃云此一對當初汪內翰用時卻未甚好今被李解元用此賦中見得工訟者遂無語而退德遠緣此見知於樊先生因舉舊有人作仁人之安宅賦一聯云智者反之若去國念田園之樂衆人自棄如病狂昧宮室之安
