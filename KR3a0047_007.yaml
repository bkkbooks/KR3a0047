body:
  text: 朱子語類卷第七學一小學古者初年入小學只是教之以事如禮樂射御書數及孝弟忠信之事自十六七入大學然後教之以理如致知格物及所以為忠信孝弟者驤古人自入小學時已自知許多事了至入大學時只要做此工夫今人全未曾知此古人只去心上理會至去治天下皆自心中流出今人只去事上理會泳古者小學已自養得小兒子這裏定已自是聖賢坯璞了但未有聖賢許多知見及其長也令入大學使之格物致知長許多知見節古人小學養得小兒子誠敬善端發見了然而大學等事小兒子不會推將去所以又入大學教之璘小學是直理會那事大學是窮究那理因甚恁地宇小學者學其事大學者學其小學所學之事之所以節小學是事如事君事父事兄處友等事只是教他依此規矩做去大學是發明此事之理銖古人便都從小學中學了所以大來都不費力如禮樂射御書數大綱都學了及至長大也更不大段學便只理會窮理致知工夫而今自小失了要補填實是難但須莊敬誠實立其基本逐事逐物理會道理待此通透意誠心正了就切身處理會旋旋去理會禮樂射御書數今則無所用乎御如禮樂射書數也是合當理會底皆是切用但不先就切身處理會得道理便教考究得些禮文制度又干自家身己甚事賀孫古者小學已自暗養成了到長來已自有聖賢坯模只就上面加光飾如今全失了小學工夫只得教人且把敬為主收斂身心卻方可下工夫又曰古人小學教之以事便自養得他心不知不覺自好了到得漸長漸更歷通達事物將無所不能今人既無本領只去理會許多閑汨董百方措置思索反以害心賀孫問大學與小學不是截然為二小學是學其事大學是窮其理以盡其事否曰只是一箇事小學是學事親學事長且直理會那事大學是就上面委曲詳究那理其所以事親是如何所以事長是如何古人於小學存養已熟根基已深厚到大學只就上面點化出些精彩古人自能食能言便已教了一歲有一歲工夫至二十時聖人資質已自有十分宇作三分大學只出治光彩今都蹉過不能轉去做只據而今當地頭立定腳做去補填前日欠闕栽種後來合做底宇作根株如二十歲覺悟便從二十歲立定腳力做去三十歲覺悟便從三十歲立定腳力做去縱待八九十歲覺悟也當據見定劄住硬寨做去淳宇同器遠前夜說敬當不得小學某看來小學卻未當得敬敬已是包得小學敬是徹上徹下工夫雖做得聖人田地也只放下這敬不得如堯舜也終始是一箇敬如說欽明文思頌堯之德四箇字獨將這箇敬做擗初頭如說恭己正南面而已如說篤恭而天下平皆是賀孫陸子壽言古者教小子弟自能言能食即有教以至灑掃應對之類皆有所習故長大則易語今人自小即教做對稍大即教作虛誕之文皆壞其性質某當思欲做一小學規使人自小教之便有法如此亦須有益先生曰只做禪苑清規樣做亦自好大雅天命非所以教小兒教小兒只說箇義理大概只眼前事或以灑掃應對之類作段子亦可每嘗疑曲禮衣毋撥足毋蹶將上堂聲必揚將入戶視必下等協韻處皆是古人初教小兒語列女傳孟母又添兩句曰將入門問孰存淳義剛同教小兒讀詩不可破章道夫先生初令義剛訓二三小子見教曰授書莫限長短但文理斷處便住若文勢未斷者雖多授數行亦不妨蓋兒時讀書終身改口不得嘗見人教兒讀書限長短後來長大後都念不轉如訓詁則當依古注問向來承教謂小兒子讀書未須把近代解說底音訓教之卻不知解與他時如何若依古注恐他不甚曉曰解時卻須正說始得若大段小底又卻只是粗義自與古注不相背了義剛余正叔嘗言今人家不善教子弟先生曰風俗弄得到這裏可哀文蔚小童添炭撥開火散亂先生曰可拂殺了我不愛人恁地此便是燒火不敬所以聖人教小兒灑掃應對件件要謹某外家子姪未論其賢否如何一出來便齊整緣是他家長上元初教誨得如此只一人外居氣習便不同義剛問女子亦當有教自孝經之外如論語只取其面前明白者教之何如曰亦可如曹大家女戒溫公家範亦好義剛後生初學且看小學之書那是做人底樣子廣先生下學見說小學曰前賢之言須是真箇躬行佩服方始有功不可只如此說過不濟事淳和之問小學所疑曰且看古聖人教人之法如何而今全無這箇天佑下民作之君作之師蓋作之君便是作之師也時舉或問某今看大學如小學中有未曉處亦要理會曰相兼看亦不妨學者於文為度數不可存終理會不得之心須立箇大規模都要理會得至於其明其暗則係乎人之才如何耳人傑問小學載樂一段不知今人能用得否曰姑使知之古人自小皆以樂教之乃是人執手提誨到得大來涵養已成稍能自立便可今人既無此非志大有所立因何得成立可學因論小學曰古者教必以樂後世不復然問此是作樂使之聽或其自作曰自作若自理會不得自作何益古者國君備樂士無故不去琴瑟日用之物無時不列於前問鄭人賂晉以女樂乃有歌鐘二肆何故曰所謂鄭聲特其聲異耳其器則同今之教坊樂乃胡樂此等事久則亡歐陽公集古錄載寇萊公好舞柘枝有五十曲文忠時其亡已多舉此可見舊見升朝官以上前導一物用水晶為之謂之主斧今亦無之某云今之籍妓莫是女樂之遺否曰不知當時女樂如何通老問左手執籥右手秉翟曰所謂文舞也又問古人舞不回旋曰既謂之舞安得不回旋某問漢家周舞注云此舜舞曰遭秦之暴古帝王樂盡亡惟韶樂獨存舜舞乃此舞也又問通老大學祭孔子樂渠云亦分堂上堂下但無大鐘曰竟未知今之樂是何樂可學元興問禮樂射御書數書莫只是字法否曰此類有數法如日月字是象其形也江河字是諧其聲也考老字是假其類也如此數法若理會得則天下之字皆可通矣時舉論小學書餘見本類弟子職一篇若不在管子中亦亡矣此或是他存得古人底亦未可知或是自作亦未可知竊疑是他作內政時士之子常為士因作此以教之想他平日這樣處都理會來然自身又卻在規矩準繩之外義剛弟子職所受是極云受業去後須窮究道理到盡處也毋驕恃力如恃氣力欲胡亂打人之類蓋自小便教之以德教之以尚德不尚力之事卓
