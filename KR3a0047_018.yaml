body:
  text: 朱子語類卷第十八大學五或問下傳五章獨其所謂格物致知者一段先生為道夫讀格物說舉遺書或問學何為而可以有覺一段曰能致其知則思自然明至於久而後有覺是積纍之多自有箇覺悟時節勉強學問所以致其知也聞見博而智益明則其效著矣學而無覺則亦何以學為也哉此程子曉人至切處道夫問致知下面更有節次程子說知處只就知上說如何曰既知則自然行得不待勉強卻是知字上重可學伊川云知非一概其為淺深有甚相絶者云云曰此語說得極分明至論知之淺深則從前未有人說到此道夫知便要知得極致知是推致到極處窮究徹底真見得決定如此程子說虎傷人之譬甚好如這一箇物四陲四角皆知得盡前頭更無去處外面更無去處方始是格到那物極處淳人各有箇知識須是推致而極其至不然半上落下終不濟事須是真知問固有人明得此理而涵養未到卻為私意所奪曰只為明得不盡若明得盡私意自然留不得若半青半黃未能透徹便是尚有渣滓非所謂真知也問須是涵養到心體無不盡處方善不然知之雖至行之終恐不盡也曰只為知不至今人行到五分便是它只知得五分見識只識到那地位譬諸穿窬稍是箇人便不肯做蓋真知穿窬之不善也虎傷事亦然德明致知是推極吾之知識無不切至切字亦未精只是一箇盡字底道理見得盡方是真實如言喫酒解醉喫飯解飽毒藥解殺人須是喫酒方見得解醉人喫飯方見得解飽人不曾喫底見人說道是解醉解飽他也道是解醉解飽只是見得不親切見得親切時須是如伊川所謂曾經虎傷者一般卓問進修之術何先者云云曰物理無窮故他說得來亦自多端如讀書以講明道義則是理存於書如論古今人物以別其是非邪正則是理存於古今人物如應接事物而審處其當否則是理存於應接事物所存既非一物能專則所格亦非一端而盡如曰一物格而萬理通雖顏子亦未至此但當今日格一件明日又格一件積習既多然後脫然有箇貫通處此一項尤有意味向非其人善問則亦何以得之哉道夫問一理通則萬理通其說如何曰伊川嘗云雖顏子亦未到此天下豈有一理通便解萬理皆通也須積纍將去如顏子高明不過聞一知十亦是大段聰明了學問卻有漸無急迫之理有人嘗說學問只用窮究一箇大處則其他皆通如某正不敢如此說須是逐旋做將去不成只用窮究一箇其他更不用管便都理會得豈有此理為此說者將謂是天理不知卻是人欲明作叔文問正心誠意莫須操存否曰也須見得後方始操得不然只恁空守亦不濟事蓋謹守則在此一合眼則便走了須是格物蓋物格則理明理明則誠一而心自正矣不然則戢戢而生如何守得他住曰格物最是難事如何盡格得曰程子謂今日格一件明日又格一件積習既多然後脫然有貫通處某嘗謂他此語便是真實做工夫來他也不說格一件後便會通也不說盡格得天下物理後方始通只云積習既多然後脫然有箇貫通處又曰今卻不用慮其他只是箇知至而後意誠這一轉較難道夫問伊川說今日格一件明日格一件工夫如何曰如讀書今日看一段明日看一段又如今日理會一事明日理會一事積習多後自然通貫德明德功云釋氏說斫樹木今日斫明日斫到樹倒時只一斫便了問伊川云今日格得一件明日格得一件莫太執著否曰人日用間自是不察耳若體察當格之物一日之間儘有之宇窮理者因其所已知而及其所未知因其所已達而及其所未達人之良知本所固有然不能窮理者只是足於已知已達而不能窮其未知未達故見得一截不曾又見得一截此其所以於理未精也然仍須工夫日日增加今日既格得一物明日又格得一物工夫更不住地做如左腳進得一步右腳又進一步右腳進得一步左腳又進接續不已自然貫通洽黃毅然問程子說今日格一件明日格一件而先生說要隨事理會恐精力短如何曰也須用理會不成精力短後話便信口開行便信腳步冥冥地去都不管他又問無事時見得是如此臨事又做錯了如何曰只是斷置不分明所以格物便要閒時理會不是要臨時理會閒時看得道理分曉則事來時斷置自易格物只是理會未理會得底不是從頭都要理會如水火人自是知其不可蹈何曾有錯去蹈水火格物只是理會當蹈水火與不當蹈水火臨事時斷置教分曉程子所謂今日格一件明日格一件亦是如此且如看文字聖賢說話粹無可疑者若後世諸儒之言喚做都不是也不得有好底有不好底好底裏面也有不好處不好底裏面也有好處有這一事說得是那一件說得不是有這一句說得是那一句說得不是都要恁地分別如臨事亦要如此理會那箇是那箇不是若道理明時自分曉有一般說漢唐來都是有一般說漢唐來都不是恁地也不得且如董仲舒賈誼說話何曾有都不是底何曾有都是底須是要見得他那箇議論是那箇議論不是如此方喚做格物如今將一箇物事來是與不是見得不定便是自家這裏道理不通透若道理明則這樣處自通透淳黃自録詳別出問陸先生不取伊川格物之說若以為隨事討論則精神易弊不若但求之心心明則無所不照其說亦似省力曰不去隨事討論後聽他胡做話便信口說腳便信步行冥冥地去都不管他義剛曰平時明知此事不是臨時卻做錯了隨即又悔此畢竟是精神短後照燭不逮曰只是斷制不下且如有一人牽你出去街上行不成不管後只聽他牽去須是知道那裏不可去我不要隨他去義剛曰事卒然在面前卒然斷制不下這須是精神強始得曰所以格物便是要閒時理會不是要臨時理會如水火人知其不可蹈自是不去蹈何曾有人錯去蹈水火來若是平時看得分明時卒然到面前須解斷制若理會不得時也須臨事時與盡心理會十分斷制不下則亦無奈何然亦豈可道曉不得後但聽他如今有十人須看他那箇好那箇不好好人也有做得不是不好人也有做得是底如有五件事看他處得那件是那件不是處得是又有曲折處而今人讀書全一例說好底固不是但取聖人書而以為後世底皆不足信也不是如聖人之言自是純粹但後世人也有說得是底如漢仲舒之徒說得是底還他是然也有不是處也自可見須是如此去窮方是但所謂格物也是格未曉底已自曉底又何用格如伊川所謂今日格一件明日格一件也是說那難理會底義剛積習既多自當脫然有貫通處乃是零零碎碎湊合將來不知不覺自然醒悟其始固須用力及其得之也又卻不假用力此箇事不可欲速欲速則不達須是慢慢做去人傑問自一身之中以至萬物之理理會得多自當豁然有箇覺處曰此一段尤其切要學者所當深究道夫曰自一身以至萬物之理則所謂由中而外自近而遠秩然有序而不迫切者曰然到得豁然處是非人力勉強而至者也道夫行夫問明道言致知云夫人一身之中以至萬物之理理會得多自然有箇覺悟處曰一身之中是仁義禮智惻隱羞惡辭遜是非與夫耳目手足視聽言動皆所當理會至若萬物之榮悴與夫動植小大這底是可以如何使那底是可以如何用車之可以行陸舟之可以行水皆所當理會又問天地之所以高深鬼神之所以幽顯曰公且說天是如何獨高蓋天只是氣非獨是高只今人在地上便只見如此高要之他連那地下亦是天天只管轉來旋去天大了故旋得許多渣滓在中間世間無一箇物事恁地大故地恁地大地只是氣之渣滓故厚而深鬼神之幽顯自今觀之他是以鬼為幽以神為顯鬼者陰也神者陽也氣之屈者謂之鬼氣之只管恁地來者謂之神洋洋然如在其上焄蒿悽愴此百物之精也神之著也這便是那發生之精神神者是生底以至長大故見其顯便是氣之伸者今人謂人之死為鬼是死後收斂無形無跡不可理會便是那氣之屈底道夫問橫渠所謂二氣之良能良能便是那會屈伸底否曰然道夫明道云窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積纍多後自當脫然有悟處又曰自一身之中以至萬物之理理會得多自當豁然有箇覺處今人務博者卻要盡窮天下之理務約者又謂反身而誠則天下之物無不在我者皆不是如一百件事理會得五六十件了這三四十件雖未理會也大概是如此向來某在某處有訟田者契數十本中間一段作僞自崇寧政和間至今不決將正契及公案藏匿皆不可考某只索四畔衆契比驗前後所斷情僞更不能逃者窮理亦只是如此淳問窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積纍多後自當脫然有悟處曰程先生言語氣象自活與衆人不同道夫器遠問格物當窮究萬物之理令歸一如何曰事事物物各自有理如何硬要捏合得只是才遇一事即就一事究竟其理少間多了自然會貫通如一案有許多器用逐一理會得少間便自見得都是案上合有底物事若是要看一件曉未得又去看一樣看那箇未了又看一樣到後一齊都曉不得如人讀書初未理會得卻不去究心理會問他易如何便說中間說話與書甚處相類問他書如何便云與詩甚處相類一齊都沒理會所以程子說所謂窮理者非欲盡窮天下之理又非是止窮得一理便到但積纍多後自當脫然有悟處此語最親切賀孫問知至若論極盡處則聖賢亦未可謂之知至如孔子不能證夏商之禮孟子未學諸侯喪禮與未詳周室班爵之制之類否曰然如何要一切知得然知至只是到脫然貫通處雖未能事事知得然理會得已極多萬一有插生一件差異底事來也都識得他破只是貫通便不知底亦通將去某舊來亦如此疑後來看程子說格物非謂欲盡窮天下之物又非謂只窮得一理便到但積纍多後自脫然有悟處方理會得僩問程子格物之說曰須合而觀之所謂不必盡窮天下之物者如十事已窮得八九則其一二雖未窮得將來湊會都自見得又如四旁已窮得中央雖未窮得畢竟是在中間了將來貫通自能見得程子謂但積纍多後自當脫然有悟處此語最好若以為一草一木亦皆有理今日又一一窮這草木是如何明日又一一窮這草木是如何則不勝其繁矣蓋當時也只是逐人告之如此夔孫問程子言今日格一件明日格一件積習既久自當脫然有貫通處又言格物非謂盡窮天下之理但於一事上窮盡其他可以類推二說如何曰既是教類推不是窮盡一事便了且如孝盡得箇孝底道理故忠可移於君又須去盡得忠以至於兄弟夫婦朋友從此推之無不盡窮始得且如炭又有白底又有黑底只窮得黑不窮得白亦不得且如水雖是冷而濕者然亦有許多樣只認冷濕一件也不是格但如今下手且須從近處做去若幽奧紛拏卻留向後面做所以先要讀書理會道理蓋先學得在這裏到臨時應事接物撞著便有用處且如火爐理會得一角了又須都理會得三角又須都理會得上下四邊方是物格若一處不通便非物格也又曰格物不可只理會文義須實下工夫格將去始得夔孫問伊川論致知處云若一事上窮不得且別窮一事竊謂致之為言推而致之以至於盡也於窮不得處正當努力豈可遷延逃避別窮一事邪至於所謂但得一道而入則可以類推而通其餘矣夫專心致志猶慮其未能盡知況敢望以其易而通其難者乎曰這是言隨人之量非曰遷延逃避也蓋於此處既理會不得若專一守在這裏卻轉昏了須著別窮一事又或可以因此而明彼也道夫問程子若一事上窮不得且別窮一事之說與中庸弗得弗措相發明否曰看來有一樣底若弗得弗措一向思量這箇少間便會擔閣了若謂窮一事不得便掉了別窮一事又輕忽了也不得程子為見學者有恁地底不得已說此話夔孫仁甫問伊川說若一事窮不得須別窮一事與延平之說如何曰這說自有一項難窮底事如造化禮樂度數等事是卒急難曉只得且放住且如所說春秋書元年春王正月這如何要窮曉得若使孔子復生也便未易理會在須是且就合理會底所在理會延平說是窮理之要若平常遇事這一件理會未透又理會第二件第二件理會未得又理會第三件恁地終身不長進賀孫陶安國問千蹊萬徑皆可適國國恐是譬理之一源處不知從一事上便可窮得到一源處否曰也未解便如此只要以類而推理固是一理然其間曲折甚多須是把這箇做樣子卻從這裏推去始得且如事親固當盡其事之之道若得於親時是如何不得於親時又當如何以此而推之於事君則知得於君時是如何不得於君時又當如何推以事長亦是如此自此推去莫不皆然時舉德元問萬物各具一理而萬理同出一原曰萬物皆有此理理皆同出一原但所居之位不同則其理之用不一如為君須仁為臣須敬為子須孝為父須慈物物各具此理而物物各異其用然莫非一理之流行也聖人所以窮理盡性而至於命凡世間所有之物莫不窮極其理所以處置得物物各得其所無一事一物不得其宜除是無此物方無此理既有此物聖人無有不盡其理者所謂惟至誠贊天地之化育則可與天地參者也僩行夫問萬物各具一理而萬理同出一源此所以可推而無不通也曰近而一身之中遠而八荒之外微而一草一木之衆莫不各具此理如此四人在坐各有這箇道理某不用假借於公公不用求於某仲思與廷秀亦不用自相假借然雖各自有一箇理又卻同出於一箇理爾如排數器水相似這盂也是這樣水那盂也是這樣水各各滿足不待求假於外然打破放裏卻也只是箇水此所以可推而無不通也所以謂格得多後自能貫通者只為是一理釋氏云一月普現一切水一切水月一月攝這是那釋氏也窺見得這些道理濂溪通書只是說這一事道夫或問萬物各具一理萬理同出一原曰一箇一般道理只是一箇道理恰如天上下雨大窩窟便有大窩窟水小窩窟便有小窩窟水木上便有木上水草上便有草上水隨處各別只是一般水胡泳又問物必有理皆所當窮云云曰此處是緊切學者須當知夫天如何而能高地如何而能厚鬼神如何而為幽顯山嶽如何而能融結這方是格物道夫問觀物察己還因見物反求諸己此說亦是程子非之何也曰這理是天下公共之理人人都一般初無物我之分不可道我是一般道理人又是一般道理將來相比如赤子入井皆有怵惕知得人有此心便知自家亦有此心更不消比並自知宇格物致知彼我相對而言耳格物所以致知於這一物上窮得一分之理即我之知亦知得一分於物之理窮二分即我之知亦知得二分於物之理窮得愈多則我之知愈廣其實只是一理才明彼即曉此所以大學說致知在格物又不說欲致其知者在格其物蓋致知便在格物中非格之外別有致處也又曰格物之理所以致我之知僩程子云天地之所以高厚一物之所以然學者皆當理會只是舉其至大與其至細者言學者之窮理無一物而在所遺也至於言講明經義論古今人物及應接事物則上所言亦在其中矣但天地高厚則資次未到這裏亦未易知爾端蒙問致知之要當知至善之所在云云曰天下之理逼塞滿前耳之所聞目之所見無非物也若之何而窮之哉須當察之於心使此心之理既明然後於物之所在從而察之則不至於泛濫矣道夫周問程子謂一草一木皆所當窮又謂恐如大軍遊騎出太遠而無所歸何也曰便是此等語說得好平正不向一邊去淳問程子謂如大軍遊騎無所歸莫只是要切己看否曰只要從近去士毅且窮實理令有切己工夫若只泛窮天下萬物之理不務切己即是遺書所謂遊騎無所歸矣德明問格物莫是天下之事皆當理會然後方可曰不必如此聖人正怕人如此聖人云吾少也賤故多能鄙事又云君子多乎哉不多也又云多聞擇其善者而從之多見而識之知之次也聖人恐人走作這心無所歸著故程子云如大軍之遊騎出太遠而無所歸也卓或問格物問得太煩曰若只此聯纏說濟得自家甚事某最怕人如此人心是箇神明不測物事今合是如何理會這耳目鼻口手足合是如何安頓如父子君臣夫婦朋友合是如何區處就切近處且逐旋理會程先生謂一草一木亦皆有理不可不察又曰徒欲泛然觀萬物之理恐如大軍之遊騎出太遠而無所歸又曰格物莫若察之於身其得尤切莫急於教人然且就身上理會凡纖悉細大固著逐一理會然更看自家力量了得底如何宇問格物雖是格天下萬物之理天地之高深鬼神之幽顯微而至於一草一木之間物物皆格然後可也然而用工之始伊川所謂莫若察之吾身者為急不知一身之中當如何用力莫亦隨事而致察否曰次第亦是如此但如今且從頭做將去若初學又如何便去討天地高深鬼神幽顯得且如人說一件事明日得工夫時也便去做了逐一件理會去久之自然貫通但除了不是當閒底物事皆當格也又曰物既格則知自至履孫問格物莫若察之於身其得之尤切曰前既說當察物理不可專在性情此又言莫若得之於身為尤切皆是互相發處道夫問格物窮理但立誠意以格之曰立誠意只是朴實下工夫與經文誠意之說不同道夫問立誠意以格之曰此誠字說較淺未說到深處只是確定徐録作堅確其志朴實去做工夫如胡氏立志以定其本便是此意淳宇同李德之問立誠意以格之曰這箇誠意只是要著實用力所以下立字蓋卿誠意不立如何能格物所謂立誠意者只是要著實下工夫不要若存若亡遇一物須是真箇即此一物究極得箇道理了方可言格若物格而后知至知至而后意誠大學蓋言其所止之序其始則必在於立誠佐問中庸言自明而誠今先生教人以誠格物何故曰誠只是一箇誠只爭箇緩頰去僞問入道莫如敬未有致知而不在敬者曰敬則此心惺惺道夫伊川謂學莫先於致知未有致知而不在敬者致知是主善而師之也敬是克一而協之也伯羽敬則心存心存則理具於此而得失可驗故曰未有致知而不在敬者道夫問程子云未有致知而不在敬者蓋敬則胸次虛明然後能格物而判其是非曰雖是如此然亦須格物不使一毫私欲得以為之蔽然後胸次方得虛明只一箇持敬也易得做病若只持敬不時時提撕著亦易以昏困須是提撕才見有私欲底意思來便屏去且謹守著到得復來又屏去時時提撕私意自當去也德明問春間幸聞格物之論謂事至物來便格取一箇是非覺有下手處曰春間說得亦太迫切只是伊川說得好問如何迫切曰取效太速相次易生出病伊川教人只說敬敬則便自見得一箇是非德明問春間所論致知格物便見得一箇是非工夫有依據秋間卻以為太迫切何也曰看來亦有病侵過了正心誠意地步多只是一敬字好伊川只說敬又所論格物致知多是讀書講學不專如春間所論偏在一邊今若只理會正心誠意池録作四端情性卻有局促之病只說致知格物池録作讀書講學一作博窮衆理又卻似泛濫古人語言自是周浹若今日學者所謂格物卻無一箇端緒只似尋物去格如齊宣王因見牛而發不忍之心此蓋端緒也便就此擴充直到無一物不被其澤方是致與格只是推致窮格到盡處凡人各有箇見識不可謂他全不知如孩提之童無不知愛其親及其長也無不知敬其兄以至善惡是非之際亦甚分曉但不推致充廣故其見識終只如此須是因此端緒從而窮格之未見端倪發見之時且得恭敬涵養有箇端倪發見直是窮格去亦不是鑿空尋事物去格也又曰涵養於未發見之先窮格於已發見之後德明問格物敬為主如何曰敬者徹上徹下工夫祖道問格物或問論之已詳不必分大小先後但是以敬為本後遇在面前底便格否曰是但也須是從近處格將去義剛問程先生所說格物之要在以誠敬為主胡氏說致知格物又要立志以定其本如何曰此程先生說得為人切處古人由小便學來如視無誑如灑掃應對進退皆是少年從小學教他都是誠敬今人小學都不曾去學卻欲便從大學做去且如今格一物若自家不誠不敬誠是不欺不妄敬是無怠慢放蕩才格不到便棄了又如何了得工夫如何成得又云程先生云主一之謂敬此理又深又說今人所作所為皆緣是不去立志若志不立又如何去學又如何去致知格物中做得事立志之說甚好非止為讀書說一切之事皆要立志椿問涵養須用敬進學則在致知曰二者偏廢不得致知須用涵養涵養必用致知道夫任道弟問或問涵養又在致知之先曰涵養是合下在先古人從小以敬涵養父兄漸漸教之讀書識義理今若說待涵養了方去理會致知也無期限須是兩下用工也著涵養也著致知伊川多說敬敬則此心不放事事皆從此做去因言此心至靈細入毫芒纖芥之間便知便覺六合之大莫不在此又如古初去今是幾千萬年若此念才發便到那裏下面方來又不知是幾千萬年若此念才發便也到那裏這箇神明不測至虛至靈是甚次第然人莫不有此心多是但知有利欲被利欲將這箇心包了起居動作只是有甚可喜物事有甚可好物事一念才動便是這箇物事賀孫廣録云或問存養致知先後曰程先生謂存養須是敬進學則在致知又曰未有致知而不在敬者蓋古人才生下兒子便有存養他底道理父兄漸漸教他讀書識義理今人先缺了此一段故學者先須存養然存養便當去窮理若說道俟我存養得卻去窮理則無期矣因言人心至靈雖千萬里之遠千百世之上一念才發便到那裏神妙如此卻不去養他自旦至暮只管展轉於利欲中都不知覺問竇看格物之義如何曰須先涵養清明然後能格物曰亦不必專執此說事到面前須與他分別去到得無事又且持敬看自家這裏敬與不敬如何若是不敬底意思來便與屏徹去久之私欲自留不得且要切己做工夫且如今一坐之頃便有許多語話豈不是動才不語話便是靜一動一靜循環無已便就此窮格無有空闕時不可作二事看某向時亦曾說未有事時且涵養到得有事卻將此去應物卻成兩截事今只如此格物便只是一事且如言忠信行篤敬只見得言行合如此下一句蠻貊之邦行矣便未須理會及其久也只見得合如此言合如此行亦不知其為忠信篤敬如何而忠信篤敬自在裏許方好德明從周録云先生問如何理會致知格物曰涵養主一之義使心地虛明物來當自知未然之理曰恁地則兩截了又問致知在乎所養養知莫過於寡欲道夫云養知莫過於寡欲此句最為緊切曰便是這話難說又須是格物方得若一向靠著寡欲又不得道夫行夫問致知在乎所養養知莫過於寡欲曰二者自是箇兩頭說話本若無相干但得其道則交相為養失其道則交相為害道夫楊子順問養知莫過於寡欲是既知後便如此養否曰此不分先後未知之前若不養之此知如何發得既知之後若不養則又差了淳宇同致知在乎所養養知莫過於寡欲二句致知者推致其知識而至於盡也將致知者必先有以養其知有以養之則所見益明所得益固欲養其知者惟寡欲而已矣欲寡則無紛擾之雜而知益明矣無變遷之患而得益固矣直卿端蒙遺書朝氏客語卷中張思叔記程先生語云思欲格物則固已近道一段甚好當收入近思録僩問暢潛道記一篇多有不是處如說格物數段如云思欲格物則固已近道言皆緩慢曰它不合作文章意思亦是只是走作又問如云可以意得不可以言傳此乃學佛之過下一段云因物有遷數語似得之曰然先生舉一段云極好記夜氣又問它把致知為本亦未是曰他便把終始本末作一事了可學問看致知說如何曰程子說得確實平易讀著意味愈長先生曰且是教人有下手處道夫問大學致知格物之方曰程子與門人言亦不同或告之讀書窮理或告之就事物上體察炎先生既為道夫讀程子致知說復曰格物一章正大學之頭首宜熟復將程先生說更逐段研究大抵程先生說與其門人說大體不同不知當時諸公身親聞之卻因甚恁地差了道夫問兩日看何書對看或問致知一段猶未了曰此是最初下手處理會得此一章分明後面便容易程子於此段節目甚多皆是因人資質說故有說向外處有說向內處要知學者用功六分內面四分外面便好一半已難若六分外面則尤不可今有一等人甚明且於道理亦分曉卻只恁地者只是向外做工夫士毅廣録詳致知一章此是大學最初下手處若理會得透徹後面便容易故程子此處說得節目最多皆是因人之資質耳雖若不同其實一也見人之敏者太去理會外事則教之使去父慈子孝處理會曰若不務此而徒欲泛然以觀萬物之理則吾恐其如大軍之遊騎出太遠而無所歸若是人專只去裏面理會則教之以求之情性固切於身然一草一木亦皆有理要之內事外事皆是自己合當理會底但須是六七分去裏面理會三四分去外面理會方可若是工夫中半時已自不可況在外工夫多在內工夫少耶此尤不可也廣或問程子致知格物之說不同曰當時答問各就其人而言之今須是合就許多不同處來看作一意為佳且如既言不必盡窮天下之物又云一草一木亦皆有理今若於一草一木上理會有甚了期但其間有積習多後自當脫然有貫通處者為切當耳今以十事言之若理會得七八件則那兩三件觸類可通若四旁都理會得則中間所未通者其道理亦是如此蓋長短大小自有準則如忽然遇一件事來時必知某事合如此某事合如彼則此方來之事亦有可見者矣聖賢於難處之事只以數語盡其曲折後人皆不能易者以其於此理素明故也又云所謂格物者常人於此理或能知一二分即其一二分之所知者推之直要推到十分窮得來無去處方是格物人傑問伊川說格物致知許多項當如何看曰說得已自分曉如初間說知覺及誠敬固不可不勉然天下之理必先知之而後有以行之這許多說不可不格物致知中間說物物當格及反之吾身之說卻是指出格物箇地頭如此又云此項兼兩意又見節次格處自立誠意以格之以下卻是做工夫合如此又云用誠敬涵養為格物致知之本賀孫問程子謂致知節目如何曰如此理會也未可須存得此心卻逐節子思索自然有箇覺處如諺所謂冷灰裏豆爆季札問二程說格物謂當從物物上格之窮極物理之謂也或謂格物不當從外物上留意特在吾一身之內是有物必有則之謂如何曰外物亦是物格物當從伊川之說不可易灑掃應對中要見得精義入神處如何分內外浩先生問公讀大學了如何是致知格物說不當意先生曰看文字須看他緊要處且如大段落自有箇緊要處正要人看如作一篇詩亦自有箇緊要處格物一章前面說許多便是藥料它自有箇炮爦炙道理這藥方可合若不識箇炮爦炙道理如何合得藥藥方亦為無用次日稟云夜來蒙舉藥方為喻退而深思因悟致知格物之旨或問首敘程夫子之說中間條陳始末反覆甚備末後又舉延平之教千言萬語只是欲學者此心常在道理上窮究若此心不在道理上窮究則心自心理自理邈然更不相干所謂道理者即程夫子與先生已說了試問如何是窮究先生或問中間一段求之文字索之講論考之事為察之念慮等事皆是也既是如此窮究則仁之愛義之宜禮之理智之通皆在此矣推而及於身之所用則聽聰視明貌恭言從又至於身之所接則父子之親君臣之義夫婦之別長幼之序朋友之信以至天之所以高地之所以厚鬼神之所以幽顯又至草木鳥獸一事一物莫不皆有一定之理今日明日積纍既多則胸中自然貫通如此則心即理理即心動容周旋無不中理矣先生所謂衆理之精粗無不到者詣其極而無餘之謂也吾心之光明照察無不周者全體大用無不明隨所詣而無不盡之謂書之所謂睿董子之所謂明伊川之所謂說虎者之真知皆是此謂格物此謂知之至也先生曰是如此泳蜚卿問誠敬寡欲以立其本如何曰但將不誠處看便見得誠將不敬處看便見得敬將多欲來看便見得寡欲道夫然則吾子之意亦可得而悉聞一段問天道流行發育萬物人物之生莫不得其所以生者以為一身之主是此性隨所生處便在否曰一物各具一太極問此生之道其實也是仁義禮智信曰只是一箇道理界破看以一歲言之有春夏秋冬以乾言之有元亨利貞以一月言之有晦朔弦望以一日言之有旦晝暮夜節問或問中謂口鼻耳目四肢之用是如何曰貌曰恭言曰從視明聽聰又問君臣父子夫婦長幼朋友之常如何曰事君忠事親孝節問由中而外自近而遠曰某之意只是說欲致其知者須先存得此心此心既存卻看這箇道理是如何又推之於身又推之於物只管一層展開一層又見得許多道理又曰如足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊這便是一身之則所當然者曲禮三百威儀三千皆是人所合當做而不得不然者非是聖人安排這物事約束人如洪範亦曰貌曰恭言曰從視曰明聽曰聰思曰睿以至於睿作聖夫子亦謂君子有九思此皆人之所不可已者道夫問上帝降衷曰衷只是中也又曰是恰好處如折衷是折兩者之半而取中之義卓陶安國問降衷之衷與受中之中二字義如何曰左氏云始終而衷舉之又曰衷甲以見看此衷字義本是衷甲以見之義為其在裏而當中也然中字大概因過不及而立名如六藝折衷於夫子蓋是折兩頭而取其中之義後人以衷為善卻說得未親切銖德元問詩所謂秉彝書所謂降衷一段其名雖異要之皆是一理曰誠是一理豈可無分別且如何謂之降衷曰衷是善也曰若然何不言降善而言降衷衷字看來只是箇無過不及恰好底道理天之生人物箇箇有一副當恰好無過不及底道理降與你與程子所謂天然自有之中劉子所謂民受天地之中相似與詩所謂秉彝張子所謂萬物之一原又不同須各曉其名字訓義之所以異方見其所謂同一云若說降衷便是秉彝則不可若說便是萬物一原則又不可萬物一原自說萬物皆出此也若統論道理固是一般聖賢何故說許多名字衷只是中今人言折衷去聲者以中為準則而取正也天生蒸民有物有則則字卻似衷字天之生此物必有箇當然之則故民執之以為常道所以無不好此懿德物物有則蓋君有君之則臣有臣之則為人君止於仁君之則也為人臣止於敬臣之則也如耳有耳之則目有目之則視遠惟明目之則也聽德惟聰耳之則也從作乂言之則也恭作肅貌之則也四肢百骸萬物萬事莫不各有當然之則子細推之皆可見又曰凡看道理須是細心看他名義分位之不同通天下固同此一理然聖賢所說有許多般樣須是一一通曉分別得出始得若只儱侗說了盡不見他裏面好處如一爐火四人四面同向此火火固只一般然四面各不同若說我只認曉得這是一堆火便了這便不得他裏面玲瓏好處無由見如降衷于下民這緊要字卻在降字上故自天而言則謂之降衷自人受此衷而言則謂之性如云天所賦為命物所受為性命便是那降字至物所受則謂之性而不謂之衷所以不同緣各據他來處與所受處而言也惟皇上帝降衷于下民此據天之所與物者而言若有常性是據民之所受者而言克綏厥猷猷即道道者性之發用處能安其道者惟后也如天命之謂性率性之謂道修道之謂教三句亦是如此古人說得道理如此縝密處處皆合今人心粗如何看得出佛氏云如來為一大事因緣故出現於世某嘗說古之諸聖人亦是為此一大事也前聖後聖心心一符如印記相合無纖毫不似處劉用之曰衷字是兼心說如云衷誠丹衷是也言天與我以是心也曰恁地說不得心性固只一理然自有合而言處又有析而言處須知其所以析又知其所以合乃可然謂性便是心則不可謂心便是性亦不可孟子曰盡其心知其性又曰存其心養其性聖賢說話自有分別何嘗如此儱侗不分曉固有儱侗一統說時然名義各自不同心性之別如以碗盛水水須碗乃能盛然謂碗便是水則不可後來橫渠說得極精云心統性情者也如降衷之衷同是此理然此字但可施於天之所降而言不可施於人之所受而言也僩池録作二段天降衷者衷降此以降言為命以受言為性節陳問劉子所謂天地之中即周子所謂太極否曰只一般但名不同中只是恰好處上帝降衷亦是恰好處極不是中極之為物只是在中如這燭臺中央簪處便是極從這裏比到那裏也恰好不曾加些從那裏比到這裏也恰好不曾減些宇問天地之中與程子天然自有之中是一意否曰只是一意蓋指大本之中也此處中庸說得甚分明他日自考之銖問天地之中天然自有之中同否曰天地之中是未發之中天然自有之中是時中曰然則天地之中是指道體天然自有之中是指事物之理曰然閎祖問以其理之一故於物無不能知以其稟之異故於理或不能知曰氣稟之偏者自不求所以知若或有這心要求便即在這裏緣本來箇仁義禮智人人同有只被氣稟物欲遮了然這箇理未嘗亡才求便得又曰這箇便是難說喚做難又不得喚做易又不得喚做易時如何自堯舜禹湯文武周孔以後如何更無一箇人與相似喚做難又才知覺這箇理又便在這裏這箇便須是要子細講究須端的知得做將去自容易若不知得雖然恁地把捉在這裏今夜捉住明朝又不見了明朝捉住後日又不見了若知得到許多蔽翳都沒了如氣稟物欲一齊打破便日日朝朝只恁地穩穩做到聖人地位賀孫問或問中云知有未至是氣稟私欲所纍曰是被這兩箇阻障了所以知識不明見得道理不分曉聖人所以將格物致知教學者只是要教你理會得這箇道理便不錯一事上皆有一箇理當處事時便思量體認得分明久而思得熟只見理而不見事了如讀聖人言語讀時研窮子細認得這言語中有一箇道理在裏面分明久而思得熟只見理而不見聖人言語不然只是冥行都顛倒錯亂了且如漢高帝做事亦有合理處如寬仁大度約法三章豈不是合理處甚多有功諸將嫚罵待他都無禮數所以今日一人叛明日一人叛以至以愛惡易太子如此全錯更無些子道理前後恰似兩人此只是不曾真箇見得道理合如此做中理底是他天資高明偶然合得不中理處多亦無足怪只此一端推了古今青史人物都只是如此所以聖人教學者理會道理要他真箇見得了方能做得件件合道理今日格一件明日格一件遇事時把捉教心定子細體認逐旋捱將去不要放過積纍功夫日久自然見這道理分曉便處事不錯此與偶合者天淵不同問去私欲氣稟之纍曰只得逐旋戰退去若要合下便做一次排遣無此理亦不濟得事須是當事時子細思量認得道理分明自然勝得他次第這邊分明了那邊自然容著他不得如今只窮理為上又問客氣暴怒害事為多不知是物欲耶氣稟耶曰氣稟物欲亦自相連著且如人稟得性急於事上所欲必急舉此一端可以類推又曰氣稟物欲生來便有要無不得只逐旋自去理會消磨大要只是觀得理分明便勝得他明作問或考之事為之著或察之念慮之微看來關於事為者不外乎念慮而入於念慮者往往皆是事為此分為二項意如何曰固是都相關然也有做在外底也有念慮方動底念慮方動便須辨別那箇是正那箇是不正這只就始末上大約如此說問只就著與微上看曰有箇顯有箇微問所藉以為從事之實者初不外乎人生日用之近其所以為精微要妙不可測度者則在乎真積力久默識心通之中是乃夫子所謂下學而上達者曰只是眼前切近起居飲食君臣父子兄弟夫婦朋友處便是這道理只就近處行到熟處見得自高有人說只且據眼前這近處行便是了這便成苟簡卑下又有人說掉了這箇上面自有一箇道理亦不是下梢只是謾人聖人便只說下學上達即這箇便是道理別更那有道理只是這箇熟處自見精微又曰堯舜之道孝弟而已矣亦只是就近處做得熟便是堯舜聖人與庸凡之分只是箇熟與不熟庖丁解牛莫不中節古之善書者亦造神妙賀孫問或問云天地鬼神之變鳥獸草木之宜莫不有以見其所當然而不容已所謂不容已是如何曰春生了便秋殺他住不得陰極了陽便生如人在背後只管來相趲如何住得淳寓録云春生秋殺陽開陰閉趲來趲去自住不得或問理之不容已者如何曰理之所當為者自不容已孟子最發明此處如曰孩提之童無不知愛其親及其長也無不知敬其兄自是有住不得處人傑今人未嘗看見當然而不容已者只是就上較量一箇好惡爾如真見得這底是我合當為則自有所不可已者矣如為臣而必忠非是謾說如此蓋為臣不可以不忠為子而必孝亦非是謾說如此蓋為子不可以不孝也道夫問或問物有當然之則亦必有所以然之故如何曰如事親當孝事兄當弟之類便是當然之則然事親如何卻須要孝從兄如何卻須要弟此即所以然之故如程子云天所以高地所以厚若只言天之高地之厚則不是論其所以然矣謨或問莫不有以見其所當然而不容已與其所以然而不可易者先生問每常如何看廣曰所以然而不可易者是指理而言所當然而不容已者是指人心而言曰下句只是指事而言凡事固有所當然而不容已者然又當求其所以然者何故其所以然者理也理如此固不可易又如人見赤子入井皆有怵惕惻隱之心此其事所當然而不容已者也然其所以如此者何故必有箇道理之不可易者今之學者但止見一邊如去見人只見得他冠冕衣裳卻元不曾識得那人且如為忠為孝為仁為義但只據眼前理會得箇皮膚便休都不曾理會得那徹心徹髓處以至於天地間造化固是陽長則生陰消則死然其所以然者是如何又如天下萬事一事各有一理須是一一理會教徹不成只說道天吾知其高而已地吾知其深而已萬物萬事吾知其為萬物萬事而已明道詩云道通天地有形外思入風雲變態中觀他此語須知有極至之理非冊子上所能載者廣曰大至於陰陽造化皆是所當然而不容已者所謂太極則是所以然而不可易者曰固是人須是自向裏入深去理會此箇道理才理會到深處又易得似禪須是理會到深處又卻不與禪相似方是今之不為禪學者只是未曾到那深處才到那深處定走入禪去也譬如人在淮河上立不知不覺走入番界去定也只如程門高弟游氏則分明是投番了雖上蔡龜山也只在淮河上游游漾漾終看他未破時時去他那下探頭探腦心下也須疑它那下有箇好處在大凡為學須是四方八面都理會教通曉仍更理會向裏來譬如喫果子一般先去其皮殼然後食其肉又更和那中間核子都咬破始得若不咬破又恐裏頭別有多滋味在若是不去其皮殼固不可若只去其皮殼了不管裏面核子亦不可恁地則無緣到得極至處大學之道所以在致知格物格物謂於事物之理各極其至窮到盡頭若是裏面核子未破便是未極其至也如今人於外面天地造化之理都理會得而中間核子未破則所理會得者亦未必皆是終有未極其至處因舉五峰之言曰身親格之以精其知雖於致字得向裏之意然卻恐遺了外面許多事如某便不敢如此說須是內外本末隱顯精粗一一周遍方是儒者之學廣問格物章或問中如何說表裏精粗曰窮理須窮究得盡得其皮膚是表也見得深奧是裏也知其粗不曉其精皆不可謂之格故云表裏精粗無所不盡過問以類而推之說曰是從已理會得處推將去如此便不隔越若遠去尋討則不切於己必大問或問云心雖主乎一身而其體之虛靈足以管乎天下之理理雖散在萬物而其用之微妙實不外乎一人之心不知用是心之用否曰理必有用何必又說是心之用夫心之體具乎是理而理則無所不該而無一物不在然其用實不外乎人心蓋理雖在物而用實在心也又云理遍在天地萬物之間而心則管之心既管之則其用實不外乎此心矣然則理之體在物而其用在心也次早先生云此是以身為主以物為客故如此說要之理在物與在吾身只一般燾或問云萬物生於天地之間不能一日而相無而亦不可相無也如何曰萬物生於天地人如何少得它亦如何使它無得意只是如此舊夫近世大儒有為格物致知之說一段或問中近世大儒格物致知之說曰格猶扞也禦也能扞禦外物而後能知至道溫公必窮物之理同出於一為格物呂與叔窮理只是尋箇是處上蔡天下之物不可勝窮然皆備於我而非從外得龜山今日格一件明日格一件為非程子之言和靖物物致察宛轉歸已胡文定即事即物不厭不棄而身親格之五峰呂與叔謂凡物皆出於一又格箇甚麼固是出於一只緣散了千岐萬徑今日窮理所以要收拾歸於一泳呂與叔說許多一了理自無可得窮說甚格物泳窮理是尋箇是處然必以恕為本但恕乃求仁之方試看窮理如何著得恕字窮理蓋是合下工夫恕則在窮理之後胡文定載顯道語云恕則窮理之要某理會安頓此語不得賀孫上蔡說窮理只尋箇是處以恕為本窮理自是我不曉這道理所以要窮如何說得恕字他當初說恕字大概只是說要推我之心以窮理便礙理了龜山說反身而誠卻大段好須是反身乃見得道理分明如孝如弟須見得孝弟我元有在這裏若能反身爭多少事他又卻說萬物皆備於我不須外面求此卻錯了身親格之說得親字急迫自是自家格不成倩人格賜以今日格一件明日格一件為非伊川之言者和靖也和靖且是深信程子者想是此等說話不曾聞得或是其心不以為然故於此說有所不領會耳謝子尋箇是處之說甚好與呂與叔必窮萬物之理同出於一為格物知萬物同出乎一理為知至其所見大段不同但尋箇是處者須是於其一二分是處直窮到十分是處方可人傑張元德問以今日格一件明日格一件為非程子之言者曰此和靖之說也大抵和靖為人淳故他不聽得而出於衆人之録者皆以為非伊川之言且如伊川論春秋之傳為案經為斷它亦以為伊川無此言且以此兩句即以傳考經之事跡以經別傳之真僞之意非伊川之言而何恪今日格一件明日格一件乃楊遵道所録不應龜山不知泳龜山說只反身而誠便天地萬物之理在我胡文定卻言物物致察宛轉歸己見雲雷知經綸見山下出泉知果行之類惟伊川言不可只窮一理亦不能遍窮天下萬物之理某謂須有先後緩急久之亦要窮盡如正蒙是盡窮萬物之理德明胡文定宛轉歸己之說這是隔陌多少記得一僧徒作一文有此一語泳問觀物察己其說如何曰其意謂察天行以自強察地勢以厚德如此只是一死法子蒙問物物致察與物物而格何別曰文定所謂物物致察只求之於外如所謂察天行以自強察地勢以厚德只因其物之如是而求之耳初不知天如何而健地如何而順也道夫曰所謂宛轉歸己此等言語似失之巧曰若宛轉之說則是理本非己有乃強委曲牽合使入來爾許多說只有上蔡所謂窮理只是尋箇是處為得之道夫曰龜山反身而誠之說只是摸空說了曰都無一箇著實處道夫曰卻似甚快曰若果如此則聖賢都易做了又問他既如此說其下工夫時亦須有箇窒礙曰也無做處如龜山於天下事極明得如言治道與官府政事至纖至細處亦曉得到這裏卻恁說次第他把來做兩截看了道夫知言要身親格之天下萬事如何盡得龜山反身而誠則萬物在我矣太快伊川云非是一理上窮得亦非是盡要窮窮之久當有覺處此乃是方格物以身伊川有此一說然大都說非一五峰既出於一偏而守之亦必有一切之效然不曾熟看伊川之意也方五峰說立志以定其本居敬以持其志志立乎事物之表敬行乎事物之內而知乃可精者這段語本說得極精然卻有病者只說得向裏來不曾說得外面所以語意頗傷急迫蓋致知本是廣大須用說得表裏內外周遍兼該方得其曰志立乎事物之表敬行乎事物之內此語極好而曰而知乃可精便有局促氣象他便要就這裏便精其知殊不知致知之道不如此急迫須是寬其程限大其度量久久自然通貫他言語只說得裏面一邊極精遺了外面一邊所以其規模之大不如程子且看程子所說今日格一件明日格一件積久自然貫通此言該內外寬緩不迫有涵泳從容之意所謂語小天下莫能破語大天下莫能載也僩黃問立志以定其本居敬以持其志曰人之為事必先立志以為本志不立則不能為得事雖能立志苟不能居敬以持之此心亦泛然而無主悠悠終日亦只是虛言立志必須高出事物之表而居敬則常存於事物之中令此敬與事物皆不相違言也須敬動也須敬坐也須敬頃刻去他不得卓問立志以定其本莫是言學便以道為志言人便以聖為志之意否曰固是但凡事須當立志不可謂今日做些子明日便休又問敬行乎事物之內曰這箇便是細密處事事要這些子在志立乎事物之表立志便要卓然在這事物之上看是甚麼都不能奪得他又不恁地細細碎碎這便是志立乎事物之表所以今江西諸公多說甚大志開口便要說聖說賢說天說地傲睨萬物目視霄漢更不肯下人問如此則居敬以持其志都無了曰豈復有此據他才說甚敬便壞了那箇又曰五峰說得這數句甚好但只不是正格物時工夫卻是格物已前事而今卻須恁地道夫伊川只云漸漸格去積纍多自有貫通處說得常寬五峰之說雖多然似乎責效太速所以傳言其急迫璘問先生舊解致知欲人明心之全體新改本卻削去只說理何也曰理即是此心之理檢束此心使無紛擾之病即此理存也苟惟不然豈得為理哉問先生說格物引五峰復齊記曰格之之道必立志以定其本居敬以持其志云云以為不免有急迫意思何也曰五峰只說立志居敬至於格物卻不說其言語自是深險而無顯然明白氣象非急迫而何問思量義理易得有苦切意思如何曰古人格物致知何曾教人如此若看得滋味自是歡喜要住不得若只以狹心求之易得如此若能高立著心不牽惹世俗一般滋味以此去看義理但見有好意思了問所謂一草一木亦皆有理不知當如何格曰此推而言之雖草木亦有理存焉一草一木豈不可以格如麻麥稻粱甚時種甚時收地之肥地之磽厚薄不同此宜植某物亦皆有理問致知自粗而推至於精自近而推至於遠不知所推之事如世間甚事曰自無穿窬之心推之至於以不言餂之類自無欲害人之心推之舉天下皆在所愛至如一飯以奉親至於保四海通神明皆此心也宇先生問大學看得如何曰大綱只是明明德而著力在格物上曰著力處大段在這裏更熟看要見血脈相貫穿程子格物幾處更子細玩味說更不可易某當初亦未曉得如呂如謝如尹楊諸公說都見好後來都段段録出排在那裏句句將來比對逐字稱停過方見得程子說雞撲不破諸公說挨著便成粉碎了問胡氏說何謂太迫曰說得來局蹙不恁地寬舒如將繩索絣在這裏一般也只看道理未熟如程子說便寬舒他說立志以定其本是始者立箇根基居敬以持其志志立乎事物之表敬行乎事物之內而知乃可精知未到精處方是可精此是說格物以前底事後面所說又是格物以後底事中間正好用工曲折處都不曾說便是局蹙了宇格物須是到處求博學之審問之慎思之明辨之皆格物之謂也若只求諸己亦恐見有錯處不可執一伊川說得甚詳或讀書或處事或看古人行事或求諸己或即人事復曰於人事上推測自有至當處如楊謝游尹諸公非不見伊川畢竟說得不曾透不知如何今人多說傳聞不如親見看得如此時又卻傳聞未必不如親見蓋當時一問一對只說得一件話而今卻鬥合平日對問講論作一處所以分明好看浩這箇道理自孔孟既沒便無人理會得只有韓文公曾說來又只說到正心誠意而遺了格物致知及至程子始推廣其說工夫精密無復遺憾然程子既沒諸門人說得便差都說從別處去與致知格物都不相干只不曾精曉得程子之說耳只有五峰說得精其病猶如此亦緣當時諸公所聞於程子者語意不全或只聞一時之語或只聞得一邊所以其說多差後來卻是集諸家語録湊起衆說此段工夫方始渾全則當時門人親炙者未為全幸生於先生之後者未為不幸蓋得見諸家記録全書得以詳考所以其法畢備又曰格物致知其次上蔡說得稍好僩諸公致知格物之說皆失了伊川意此正是入門款於此既差則他可知矣問延平謂為學之初且當常存此心勿為他事所勝凡遇一事即當且就此事反復推尋以究其極待此一事融釋脫落然後別窮一事久之自當有灑然處與伊川今日格一件明日格一件之語不同如何曰這話不如伊川說今日明日恁地急卓録但云伊川說得較快這說是教人若遇一事即且就上理會教爛熟離析不待擘開自然分解久之自當有灑然處自是見得快活某常說道天下事無他只是箇熟與不熟若只一時恁地約摸得都不與自家相干久後皆忘卻只如借得人家事一般少間被人取將去又濟自家甚事賀孫卓同李堯卿問延平言窮理工夫先生以為不若伊川規模之大條理之密莫是延平教人窮此一事必待其融釋脫落然後別窮一事設若此事未窮遂為此事所拘不若程子若窮此事未得且別窮之言為大否曰程子之言誠善窮一事未透又便別窮一事亦不得彼謂有甚不通者不得已而如此耳不可便執此說容易改換卻致工夫不專一也壯祖廷老問李先生以為為學之初凡遇一事當且就此事反覆推尋以究其理此說如何曰為學之初只得如此且如楊之為我墨氏之兼愛顏子居陋巷禹稷之三過其門而不入禹稷則似乎墨氏之兼愛顏子當天下如此壞亂時節卻自簞瓢陋巷則似乎楊氏之為我然也須知道聖賢也有處與他相似其實卻不如此中間有多少商量舉此一端即便可見道夫傳六章因說自欺欺人曰欺人亦是自欺此又是自欺之甚者便教盡大地只有自家一人也只是自欺如此者多矣到得那欺人時大故郎當若論自欺細處且如為善自家也知得是合當為也勉強去做只是心裏又有些便不消如此做也不妨底意思如不為不善心裏也知得不當為而不為雖是不為然心中也又有些便為也不妨底意思此便是自欺便是好善不如好好色惡惡不如惡惡臭便做九分九釐九毫要為善只那一毫不要為底便是自欺便是意不實矣或問中說得極分曉僩問或問誠意章末舊引程子自慊之說今何除之曰此言說得亦過淳先之問誠意章或問云孟子所論浩然之氣其原蓋出於此何也曰人只是慊快充足仰不愧俯不怍則其氣自直便自日長以至於充塞天地雖是刀鋸在前鼎鑊在後也不怕賀孫傳七章陳問或問云此心之體寂然不動如鏡之空如衡之平何不得其正之有此是言其體之正又心之應物皆出於至公而無不正矣此又是言其用之正所謂心正者是兼體用言之否曰不可只道體正應物未必便正此心之體如衡之平所謂正又在那下衡平在這裏隨物而應無不正又云如衡之平下少幾箇字感物而發無不正宇問正心必先誠意而或問有云必先持志守氣以正其心何也曰此只是就心上說思慮不放肆便是持志動作不放肆便是守氣守氣是無暴其氣只是不放肆宇鍾唐傑問或問云意既誠矣而心猶有動焉然後可以責其不正而復乎正意之既誠何為心猶有動曰意雖已誠而此心持守之不固是以有動到這裏猶自三分是小人正要做工夫且意未誠時譬猶人之犯私罪也意既誠而心猶動譬猶人之犯公罪也亦甚有間矣蓋卿或問意既誠矣而心猶有動焉然後可以責其不正而復乎正是如何曰若是意未誠時只是一箇虛僞無實之人更問甚心之正與不正唯是意已誠實然後方可見得忿懥恐懼好樂憂患有偏重處即便隨而正之也廣問意既誠矣一段曰不誠是虛僞無實之人更理會甚正正如水渾分甚清濁不虛僞無實是箇好人了這裏方擇得正不正做事如水清了只是微動故忿懥四者已是好人底事事至不免為氣動則不免差了因舉左氏傳云正曲為直正直為正曲是體段不直既為整直只消安排教端正故云正直士毅過録云先生因子洪問意誠矣而心猶有動之意而曰如正直為正正曲為直兩句正曲為直如出成界方已直矣正直為正則如安頓界方得是當處傳九章問赤子之心是已發大學或問云人之初生固純一而未發何也曰赤子之心雖是已發然也有未發時如飢便啼渴便叫恁地而已不似大人恁地勞攘赤子之心亦涵兩頭意程子向來只指一邊言之宇問仁讓言家貪戾言人或問以為善必積而后成惡雖小而可懼發明此意深足以警人當為善而去惡矣然所引書云德罔小不德罔大則疑下一句正合本文而上一句不或反乎曰爾惟德罔小正言其不可小也則庶乎萬邦惟慶正與大學相合壯祖或問先吏部說有諸己而後求諸人無諸己而後非諸人曰這是說尋常人若自家有諸己又何必求諸人無諸己又何必非諸人如孔子說躬自厚而薄責於人攻其惡毋攻人之惡至於大學之說是有天下國家者勢不可以不責他然又須自家有諸己然後可以求人之善無諸己然後可以非人之惡賀孫范公恕己之心恕人這一句自好只是聖人說恕不曾如是倒說了不若橫渠說以責人之心責己愛己之心愛人則是見他人不善我亦當無是不善我有是善亦要他人有是善推此計度之心此乃恕也於己不當下恕字泳范公以恕己之心恕人此句未善若曰以愛己之心愛人方無病蓋恕是箇推出去底今收入來做恕己便成忽略了道夫蜚卿問大學或問近世名卿謂以恕己之心恕人是不忠之恕如何曰這便是自家本領不正古人便先自本領上正了卻從此推出去如己欲立也不是阿附得立到得立人處便也不要由阿附而立己欲達也不是邪枉得達到得達人處便也不要由邪枉而達今人卻是自家先自不正當了阿附權勢討得些官職富貴去做了便見別人阿附討得富貴底便欲以所以恕己者而恕之卻不知恕之一字只可說出去不可說入來只可以接物不可以處己蓋自家身上元著不得箇恕字只恕己兩字便不是了問今人言情恕恕以待人是否曰似如此說處也未見他邪正之所在若說道自家不合去穿窬切望情恕這卻著不得若說道偶忙不及寫書切望情恕這卻無害蓋自家有忙底時節幹問大學或問以近世名卿恕字之說為不然矣而復録其語於小學者何也曰小學所取寬若欲修潤其語當曰以愛己之心愛人可也必大傳十章問或問以所占之地言之則隨所在如此否曰上下也如此前後也如此左右也如此古人小處亦可見如並坐不橫肱恐妨礙左邊人又妨礙右邊人如此則左右俱不相妨此便是以左之心交於右以右之心交於左如戶開亦開戶闔亦闔有後入者闔而勿遂前人之開所以待後之來自家亦當依他恁地開前人之闔恐後人有妨所議自家亦當依他恁地闔此是不以後來而變乎前之意如後面更有人來則吾不當盡闔了門此又是不以先入而拒乎後之意如此則前後處得都好便是以前之心先於後以後之心從於前問凡事事物物皆要如此否曰是如我事親便也要使人皆得事親我敬長慈幼便也要使人皆得敬長慈幼此章上面說上老老而民興孝上長長而民興弟上恤孤而民不倍是民之感化如此可見天下人人心都一般君子既知人都有此心所以有潔矩之道要人人都得盡其心若我之事其親備四海九州之美味卻使民之父母凍餓藜藿糟糠不給我之敬長慈幼卻使天下之人兄弟妻子離散便不是潔矩中庸一段所求乎子之事我如此而我之事父卻未能如此所求乎臣之事我如此而我之事君卻未能如此及所求乎弟所求乎朋友亦是此意上下左右前後及中央做七箇人看便自分曉淳寓同
