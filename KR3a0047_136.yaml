body:
  text: 朱子語類卷第一百三十六歷代三因論三國形勢曰曹操合下便知據河北可以為取天下之資既被袁紹先説了他又不成出他下故為大言以誑之胡致堂説史臣後來代為文辭以欺後世看來只是一時無説了大言耳此著被袁紹先下了後來崎嶇萬狀尋得箇獻帝來為挾天下令諸侯之舉此亦是第二大著若孫權據江南劉備據蜀皆非取天下之勢僅足自保耳雉曹操用兵煞有那幸而不敗處卻極能料如征烏桓便能料得劉表不從其後來端蒙問先主為曹操所敗請救於吳若非孫權用周瑜以敵操亦殆矣曰孔明之請救知其不得不救孫權之救備須著救他必大録云孫權與劉備同禦曹操亦是其勢不得不合不如此便當迎操矣此亦非好相識勢使然也及至先主得荊州權遂遣呂蒙擒關羽才到利害所在便不相顧人傑必大録小異劉備之敗於陸遜雖言不合輕敵亦是自不合連營七百餘里先自做了敗形是時孔明在成都督運餉後云法孝直若在不使主上有此行孔明先不知曾諫止與否今皆不可考但孔明雖正然盆去聲法孝直輕快必有術以止之必大諸葛孔明大綱資質好但病於粗疏孟子以後人物只有子房與孔明子房之學出於黃老孔明出於申韓如授後主以六韜等書與用法嚴處可見若以比王仲淹則不似其細密他卻事事理會過來當時若出來施設一番亦須可觀木之或問孔明曰南軒言其體正大問學未至此語也好但孔明本不知學全是駁雜了然卻有儒者氣象後世誠無他比升卿問孔明興禮樂如何曰也不見得孔明都是禮樂中人也只是粗底禮樂宇淳録云孔明也粗若興禮樂也是粗禮樂砥録云孔明是禮樂中人但做時也粗疏忠武侯天資高所為一出於公若其規模并寫申子之類則其學只是伯程先生云孔明有王佐之心然其道則未盡其論極當魏延請從間道出關中侯不聽侯意中原已是我底物事何必如此故不從不知先主當時只從孔明不知孔明如何取荊取蜀若更從魏延間道出關中所守者只是庸人從此一出是甚聲勢如拉朽然侯竟不肯為之揚致道問孔明出處曰當時只有蜀先主可與有為耳如劉表劉璋之徒皆了不得曹操自是賊既不可從孫權又是兩間底人只有先主名分正故只得從之時可問王猛從苻堅如何曰苻堅事自難看觀其殺苻生與東海公陽分明是特地殺了而史中歷數苻生酷惡之罪東海公之死云是太后在甚樓子上見它門前車馬甚盛欲害苻堅故令人殺之此皆不近人情蓋皆是己子不應便專愛堅而特使人殺東海公也此皆是史家要出脫苻堅殺兄之罪故裝點許多此史所以難看也時舉諸葛亮之事其於荊蜀亦合取當日草廬亦是商量準擬在此但此時不當恁地若是恁地取時全不成舉措如二人視魏而不伐自合當取兼在是時捨此無以為資若能聲其罪用兵而取之卻正但當時劉焉父子亦得人情恐亦未易取伯豐問聖人處此合如何曰亦須別有箇道理若似如此寧可事不成只為後世事欲苟成功欲苟就便有許多事亮大綱卻好只為如此便有斑駁處方子録云孔明執劉璋蓋緣事求可功求成故如此曰然則寧事之不成曰然器遠問諸葛武侯殺劉璋是如何曰這只是不是初間教先主殺劉璋先主不從到後來先主見事勢迫也打不過便從他計要知不當恁地行計殺了他若明大義聲罪致討不患不服看劉璋欲從先主之招傾城人民願留之那時郡國久長能得人心如此賀孫毅然問孔明誘奪劉璋似不義曰便是後世聖賢難做動著便粘手惹腳淳諸葛孔明天資甚美氣象宏大但所學不盡純正故亦不能盡善取劉璋一事或以為先主之謀亦必是孔明之意然在當時多有不可盡曉處如先主東征之類不見孔明一語議論後來壞事卻追恨法孝直若在則能制主上東行孔明得君如此猶有不能盡言者乎先主不忍取荊州不得已而為劉璋之圖若取荊州雖不為當然劉表之後君弱勢孤必為他人所取較之取劉璋不若得荊州之為愈也學者皆知曹氏為漢賊而不知孫權之為漢賊也若孫權有意興復漢室自當與先主協力并謀同正曹氏之罪如何先主才整頓得起時便與壞倒如襲取關羽之類是也權自知與操同是竊據漢土之人若先主事成必滅曹氏且復滅吳矣權之姦謀蓋不可掩平時所與先主交通姑為自全計爾或曰孔明與先主俱留益州獨令關羽在外遂為陸遜所襲當時只先主在內孔明在外如何曰正當經理西向宛洛孔明如何可出此特關羽恃才疏鹵自取其敗據當時處置如此若無意外齟齬曹氏不足平兩路進兵何可當也此亦漢室不可復興天命不可再續而已深可惜哉謨直卿問孔明出師每乏糧古人做事須有道理須先立些根本曰孔明是殺賊不得不急如人有箇大家被賊來占了趕出在外墻下住殺之豈可緩一才緩人便一切都忘了孔明亦自言一年死了幾多人不得不急為之意司馬懿甚畏孔明便使得辛毗來遏令不出兵其實是不敢出也國家只管與講和聘使往來賀正賀節稱叔稱侄只是見鄰國不知是讎了又問勾踐謀吳二十年又如何曰事體不同諸侯各有國未便伐吳則越亦自在如此謀乃是揚孔明出師表文選與三國志所載字多不同互有得失五月渡瀘是説前事如孟獲之七縱七擒正其時也渡瀘是先理會南方許多去處若不先理會許多去處到向北去終是被他在後乘間作撓既理會得了非惟不被他來撓又卻得他兵衆來使賀孫誦武侯之言曰治世以大德不以小惠從周問武侯寧靜致遠之説曰靜便養得根本深固自可致遠揚孔明治蜀不曾立史官陳壽險甚揚録作檢拾而為蜀志故甚略孔明極是子細者亦恐是當時經理王業之急有不暇及此諸葛亮臨陳對敵意思安間如不欲戰而苻堅踴躍不寐而行師此其敗不待至淝水而決矣方看史策自有該載不盡處如後人多説武侯不過子午谷路往往那時節必有重兵守這處不可過今只見子午谷易過而武侯自不過史只載魏延之計以為夏侯楙是曹操壻怯而無謀守長安甚不足畏這般所在只是該載不盡亮以為此危計不如安從坦道又揚聲由斜谷又使人據箕谷此可見未易過賀孫先生説八陳圖法人傑因云尋常人説戰陳事多用變詐恐王者之師不如此曰王者勢嚮大自不須用變詐譬如孟賁與童子相搏自然勝他孟賁不得且如諸葛武侯七縱七擒事令孟獲觀其營壘分明教你看見只是不可犯若用變詐已是其力不敵須假些意智勝之又今之戰者只靠前列後面人更著力不得前列勝則勝前列敗則敗如八陳之法每軍皆有用處天衝地軸龍飛虎翼蛇鳥風雲之類各為一陳有專於戰鬥者有專於衝突者又有纏繞之者然未知如何用之又問垓下之戰曰此卻分曉又問淮陰多多益辦程子謂分數明如何曰此御衆以寡之法且如十萬人分作十軍則每軍有一萬人大將之所轄者十將而已一萬又分為十軍一軍分作十卒則一將所管者十卒而已卒正自管二十五人則所管者三卒正耳推而下之兩司馬雖管二十五人然所自將者五人又管四伍長伍長所管四人而已至於大將之權專在旗鼓大將把小旗撥發官執大旗三軍視之以為進退若李光弼旗麾至地令諸軍死生以之是也若八陳圖自古有之周官所謂如戰之陳蓋是此法握幾文雖未必風后所作然由來須遠武侯立石於江邊乃是水之回洑處所以水不能漂蕩其擇地之善立基之堅如此此其所以為善用兵也又問陰符經有絶利一源用師十倍三反晝夜用師萬倍之説如何曰絶利者絶其二三一源者一其源本三反晝夜者更加詳審豈惟用兵凡事莫不皆然倍如事半古之人功必倍之之謂上文言瞽者善聽聾者善視則其專一可知注陰符者分為三章上言神仙抱一之道中言富國安民之法下言強兵戰勝之術又有人每章作三事解釋後來一書吏竊而獻之高宗高宗大喜賜號渾成其人後以強橫害物為知饒州汪某斷配人傑或問季通八陳圖説其間所著陳法是否曰皆是元來有底但季通分開許多方圓陳法不相混雜稍好又問史記所書高祖垓下之戰季通以為正合八陳之法曰此亦後人好奇之論大凡有兵須有陳不成有許多兵馬相戰鬥只羇作一團又只排作一行必須左右前後步伍行陳各有條理方得今且以數人相撲言之亦須擺布得所而後相角今人但見史記所書甚詳漢書則略之便以司馬遷為曉兵法班固為不曉此皆好奇之論不知班固以為行陳乃用兵之常故略之從省文爾看古來許多陳法遇征戰亦未必用得所以張巡用兵未嘗倣古兵法不過使兵識將意將識士情蓋未論臨機應變方略不同只如地圓則須布圓陳地方則須布方陳亦豈容概論也又曰常見老將説大要臨陳又在番休遞上分一軍為數替將戰則食第一替人既飽遣之入陳便食第二替人覺第一替人力將困即調發第二替人往代第三替亦如之只管如此更番則士常飽健而不至於困乏鄉來張柔直守南劍戰退范汝為只用此法方汝為之來寇也柔直起鄉兵與之戰令城中殺羊牛豕作肉串仍作飯分鄉兵為數替以入陳之先後更迭食之士卒力皆有餘遂勝汝為又云劉信叔順昌之勝鄉見張仲隆云親得之信叔大概亦是如此時極暑探報人至云虜騎至矣信叔令一卒擐甲立之烈日中少頃問甲熱乎曰熱矣可著手乎則曰熱甚不可著手矣時城中軍亦不甚多信叔嘗有宿戒遇戰則分為數替如是下令軍中可依此飲食士卒更番而上又多合暑藥往者歸者皆飲之人情胥快元城劉師閔向張魏公督軍暑藥以薑棄為之與今冰壺散方大概相似故能大敗虜人蓋方我之甲士甲熱不堪著手則虜騎被甲來者其熱可知又未免有困餒之患於此時而擊之是以勝也或曰是戰也信叔戒甲士人帶一竹筒其中實以煮豆入陳則割棄竹筒狼籍其豆於下虜馬飢聞豆香低頭食之又多為竹筒所滾腳下不得地以故士馬俱斃曰此則不得而知但聞多遣輕鋭之卒以大刀斫馬足每折馬一足則和人皆仆又有相蹂踐者大率一馬仆則從旁而斃不下十數人儒用八陳圖敵國若有一二萬人自家止有兩三千人雖有法何所用之蔡云勢不敵則不與鬥先生笑曰只辦著走便了蔡云這是箇道理譬如一箇十分雄壯底人與一箇四五分底人廝打雄壯底只有力四五分底卻識相打法對副雄壯底便不費力只指點將去這見得八陳之法有以寡敵衆之理先生曰也須是多寡強弱相侔可也又須是人雖少須勇力齊一始得蔡云終不是使病人與壯人鬥也賀孫陳者定也八陳圖中有奇正前面雖未整猝然遇敵次列便已成正軍矣季通語方用之問諸葛武侯不死與司馬仲達相持終如何曰少間只管算來算去看那箇錯了便輸輸贏處也不在多只是爭些子季通云看諸葛亮不解輸曰若諸葛亮輸時輸得少司馬懿輸時便狼狽賀孫諸葛公是忠義底司馬懿司馬懿是無狀底諸葛公劉禪備位而已道夫羊陸相遺問只是敵國相傾之謀欲以氣相勝非是好意思人傑録云觀陸抗正是彰其德於祜之言斯可見矣如漢文修尉他祖墓及石勒修祖逖母墓事皆相近必大王儀為司馬昭軍師昭殺之雖無辜裒仕晉猶有可説而裒不仕乃過於厚者嵇康魏臣而晉殺之紹不當仕晉明矣蕩陰之忠固可取亦不相贖事讎之過自不相掩司馬公云使無蕩陰之忠殆不免君子之譏不知君子之譏初不可免也人傑録云儀嘗仕昭而昭誅之云云晉元帝無意復中原卻託言糧運不繼誅督運令史淳于伯而還行刑者以血拭柱血為之逆流天人幽顯不隔絲毫閎祖湯執中立賢無方東晉時所用人才皆中州浮誕者之後惟顧榮賀循有人望不得已而用之人傑王導為相只周旋人過一生嘗有坐客二十餘人逐一稱讚獨不及一胡僧并一臨海人二人皆不悅導徐顧臨海人曰自公之來臨海不復有人矣又謂胡僧曰蘭奢蘭奢乃胡語之褒譽者也於是二人亦悅人傑問老子之道曹參文帝用之皆有效何故以王謝之力量反做不成曰王導謝安又何曾得老子妙處淳録云人常以王導比謝安然謝安又勝王導石林説王導只是隨波逐流底人謝安卻較有建立也煞有心於中原王導自渡江來只是恁地都無取中原之意此説也是但謝安也被這清虛絆了都做不得又問孔子惡鄉原如老子可謂鄉原否曰老子不似鄉原鄉原卻尚在倫理中行那老子卻是出倫理之外它自處得雖甚卑不好聲不好色又不要官做然其心卻是出於倫理之外其説煞害事如鄉原便卻只是箇無見識底好人未害倫理在義剛謝安之待桓溫本無策溫之來廢了一君幸而要討九錫要理資序未至太甚猶是半和秀才若它便做箇二十分賊如朱全忠之類更進一步安亦無如之何王儉平日自比謝安王儉是已敗闕底謝安謝安特幸未疏脫底王儉耳安比王儉只是有些英氣苻堅之來亦無措置前輩云非晉人之善乃苻堅之不善耳然堅只不合擁衆來謝安必有以料之兼秦人國內自亂晉亦必知之故安得以鎮靜待之堅之來在安亦只得發兵去迎敵當來苻堅若不以大衆來只以輕兵時擾晉邊便坐見狼狽因問正淳曰桓溫移晉祚時安能死節否曰必不能卻須逃去曰逃將安往若非死節即北面事賊耳到這裏是築底處中間更無空地因説韋孝寬智略如此當楊堅篡周時尉遲迥等皆死孝寬乃獻金尉斗始嘗疑之既不與它為異亦何必如此附結之元來到這地位便不與辨亦不免死既不能死便只得失節耳又曰謝安之於苻堅如近世陳魯公之於完顏亮幸而捱得它死耳伯豐問寇萊公澶淵事如何曰當來它卻有錯處然到此只得向前不可退後也溫太真處王敦事難先生云亦不佳某做不得揚王祥孝感只是誠發於此物感於彼或以為內感或以為自誠中來皆不然王祥自是王祥魚自是魚今人論理只要包合一箇渾淪底意思雖是直截兩物亦強羇合説正不必如此世間事雖千頭萬緒其實只一箇道理理一分殊之謂也到感通處自然首尾相應或自此發出而感於外或自外來而感於我皆一理也謨淵明所説者莊老然辭卻簡古堯夫辭極卑道理卻密升卿陶淵明古之逸民若海問苻堅立國之勢亦堅牢治平許多年百姓愛戴何故一敗塗地更不可救曰他是掃土而來所以一敗更救不得又問他若欲滅晉遣一良將提數萬之兵以臨之有何不可何必掃境而來曰他是急要做正統恐後世以其非正統故急欲亡晉此人性也急躁初令王猛滅燕猛曰既委臣陛下不必親臨及猛入燕忽然堅至蓋其心又恐猛之功大故親來分其功也便是他器量小所以後來如此僩王猛事苻堅煞有事節苻堅之兄乃其謀殺之賀孫桓溫入三秦王猛來見眼中不識人卻謂三秦豪傑未有至何也三秦豪傑非猛而誰可笑揚晉任宗室以八王之亂自宋而後皆殺兄弟宗室以至召去知其不好途中見人哭問如何死曰病死曰病死何哭至有臨刑時平日念佛者皆合掌願後世莫生王侯家揚蘇綽立租庸等法亦是天下人殺得少了故行得易三代而下必義為之只有一箇諸葛孔明若魏鄭公全只是利李密起有一道士説密即東都縛煬帝獨夫天下必應揚謂密不足道漢唐之興皆是為利須是有湯武之心始做得太宗亦只是為利亦做不得先生曰漢高祖見始皇出謂丈夫當如此耳項羽謂彼可取而代也其利心一也郭汾陽功名愈大而心愈小意思好易傳及諸葛次及郭汾陽揚漢高祖取天下卻正當為他直截恁地做去無許多委曲唐初隋大亂如此高祖太宗因群盜之起直截如此做去只是誅獨夫為他心中打不過又立恭帝假援回護委曲如此亦何必爾所以不及漢之創業也端蒙高祖辭得九錫卻是端蒙高祖與裴寂最昵宮人私侍之説未必非高祖自為之而史家反以此文飾之也端蒙因論唐事先生曰唐待諸國降王不合道理竇建德所行亦合理忽然而亡不可曉王世充卻不殺當初高祖起太原入關立代王遂即位世充於東都亦立越王二人一樣故且赦之至殺蕭銑則大無理他自是梁子孫元非叛臣某問唐史臣論高祖殺蕭銑不成議論曰然通老問以宮人侍高祖在太宗不當為曰它在當時只要得事成本無救世之心何暇顧此唐有天下三百年唐宗室最少屢經大盜殺之又多不出閣只消磨盡了可學唐太宗以晉陽宮人侍高祖是致其父於必死之地便無君臣父子夫婦之義漢高祖亦自粗疏惟光武差細密卻曾讀書來問晉元帝所以不能中興者其病安在曰元帝與王導元不曾有中原志收拾吳中人情惟欲宴安江沱耳問祖逖摧鋒越河所向震動使其不死當有可觀曰當是時王導已不愛其如此使戴若思輩監其軍可見如何得事成問紹興初嶽軍已向汴都秦相從中制之其事頗相類曰建炎初宗澤留守東京招徠群盜數百萬使一舉而取河北數郡即當時事便可整頓及為汪黃所制怏怏而死京師之人莫不號慟於是群盜分散四出為山東淮南劇賊德唐源流出於夷狄故閨門失禮之事不以為異祖道太宗奏建成元吉高祖云明當鞫問汝宜早參及次早建成入朝兄弟相遇遂相殺尉遲敬德著甲持刃見高祖高祖在一處泛舟程可久謂既許明早理會又卻去泛舟此處有闕文或為隱諱先生曰此定是添入此一段與前後無情理太宗決不曾奏既奏了高祖見三兒要相殺如何尚去泛舟此定是加建成元吉之罪處又謂太宗先奏了不是前不説太宗誅建成比於周公誅管蔡只消以公私斷之周公全是以周家天下為心太宗則假公義以濟私欲者也端蒙太宗殺建成元吉比周公誅管蔡如何比得太宗無周公之心只是顧身然當時亦不合為官屬所迫兼太宗亦自心不穩溫公此處亦看不破乃云待其先發而應之亦只便是鄭伯克段于鄢須是有周公之心則可問曰范太史云是高祖處得不是曰今論太宗且責太宗論高祖又自責高祖不成只責高祖太宗全無可責又問不知太宗當時要處得是合如何曰為太宗孝友從來無了卻只要來此一事上使亦如何使得先生又曰高祖不數日軍國事便付與太宗亦只是不得已唐世內禪者三如肅宗分明不是只如睿宗之於玄宗亦只為其誅韋氏有功了事亦不得已爾端又論太宗事云太宗功高天下所係屬亦自無安頓處只高祖不善處置了又建成乃欲立功蓋之如玄宗誅韋氏有功睿宗欲立宋王成器宋王成器便理會得事堅不受端蒙因及王魏事問論後世人不當盡繩以古人禮法畢竟高祖不當立建成曰建成既如此王魏何故不見得又何故不知太宗如此便須莫事建成亦只是望僥幸問二人如此機敏何故不見得曰王魏亦只是直揚因問太宗殺建成事及王魏教太子立功結君後又不能死難曰只為祇見得功利全不知以義理處之端蒙太宗納巢剌王妃魏鄭公不能深諫范純夫論亦不盡純夫議論大率皆只從門前過資質極平正點化得甚次第不知伊川當時如何不曾點化他先生嘗語呂丈云范純夫平生於書册皆只從忙中攝過了所以諷呂丈也太宗從魏鄭公仁義之説只是利心意謂如此便可以安居民上漢文帝資質較好然皆老氏術也揚或謂史贊太宗止言其功烈之盛至於功德兼隆則傷夫自古未知有曰恐不然史臣正贊其功德之美無貶他意其意亦謂除隋之亂是功致治之美是德自道學不明故曰功德者如此分別以聖門言之則此兩事不過是功未可謂之德驤問胡氏管見斷武后於高宗非有婦道合稱高祖太宗之命數其九罪廢為庶人而賜之死竊恐立其子而殺其母未為穩否曰這般處便是難理會處在唐室言之則武后當殺在中宗言之乃其子也宰相大臣今日殺其母明日何以相見問南軒欲別立宗室如何曰以後來言之則中宗不了以當時言之中宗亦未有可廢之事天下之心皆矚望中宗高宗又別無子不立中宗又恐失天下之望此最是難處不知孟子當此時作如何處今生在數百年之後只據史傳所載不見得當時事情亦難如此斷定須身在當時親看那時節及事情如何若人心在中宗只得立中宗若人心不在中宗方別立宗室是時承乾亦有子在若率然妄舉失人心做不行又事多看道理未須便將此樣難處來闌斷了須要通其他更有好理會處多且看別處事事通透後此樣處亦易義剛先生問人傑姚崇擇十道使患未得人如何曰只姚崇説患未得人便見它真能精擇曰固是然唐鑑卻貶之唐鑑議論大綱好欠商量處亦多又云范文正富文忠當仁宗時條天下事亦只説擇監司為治只此是要矣人傑退之云凡此蔡功惟斷乃成今須要知他斷得是與不是古今煞有以斷而敗者如唐德宗非不斷卻生出事來要之只是任私意帝剛愎不明理不納人言惟憲宗知蔡之不可不討知裴度之不可不任若使他理自不明胸中無所見則何以知裴公之可任若只就斷字上看而遺其左右前後殊不濟事道夫周莊仲曰憲宗當時表也看如退之潮州表上一見便憐之有復用之意曰憲宗聰明事事都看近世如孝宗也事事看義剛李白見永王璘反便從臾之文人之沒頭腦乃爾後來流夜郎是被人捉著罪過了凛地作詩自辨被迫脅李白詩中説王説霸當時人必謂其果有智略不知其莽蕩立見疏脫必大顏魯公只是有忠義而無意智底人當時去那裏見使者來不知是賊便下兩拜後來知得方罵義剛史以陸宣公比賈誼誼才高似宣公宣公諳練多學便純粹大抵漢去戰國近故人才多是不粹道夫陸宣公奏議極好看這人極會議論事理委曲説盡更無滲漏雖至小底事被他處置得亦無不盡如後面所説二稅之弊極佳人言陸宣公口説不出只是寫得出今觀奏議中多云今日早面奉聖旨云云臣退而思之云云疑或然也問陸宣公比諸葛武侯如何曰武侯氣象較大恐宣公不及武侯當面便説得如説孫權一段雖辨士不及其細密處不知比宣公如何只是武侯也密如橋梁道路井灶圊溷無不修繕市無醉人更是密只是武侯密得來嚴其氣象剛大嚴毅僩陸宣公奏議末數卷論稅事極盡纖悉是他都理會來此便是經濟之學淳問陸宣公既貶避謗闔戶不著書祇為古今集驗方曰此亦未是豈無聖經賢傳可以玩索可以討論終不成和這箇也不得理會人傑或問維州事溫公以德裕所言為利僧孺所言為義如何曰德裕所言雖以利害言然意卻全在為國僧孺所言雖義然意卻全濟其己私且德裕既受其降矣雖義有未安也須別做置處乃縛送悉怛謀使之恣其殺戮果何為也升卿牛僧孺何緣去結得箇杜牧之後為渠作墓志今通鑑所載維州等有些事好底皆是揚説者謂陽城居諫職與屠沽出沒果然則豈能使其君聽其言哉若楊綰用而大臣損音樂減騶御則人豈可不有以養素自重耶銑方伯謨云使甘露之禍成唐必亡無疑壽昌唐租庸調大抵改新法度是世界一齊更新之初方做得如漢衰魏代只是漢舊物事晉代魏亦只用這箇以至六朝相代亦是遞相祖述弊法卒亦變更不得直到得元魏北齊後周居中原時中原生靈死於兵寇幾盡所以宇文泰蘇綽出來便做得租庸調故隋唐因之賀孫唐六典載唐官制甚詳古禮自秦漢已失北周宇文泰及蘇綽有意復古官制頗詳盡如租庸調府兵之類皆是蘇綽之制唐遂因之唐之東宮官甚詳某以前上封事亦言欲復太子官屬如唐之舊因論唐府兵之制曰永嘉諸公以為兵農之分反自唐府兵始卻是如此蓋府兵家出一人以戰以戍并分番入衛則此一人便不復為農矣僩唐口分是八分世業是二分有口則有口分有家則有世業古人想亦似此樣淳義剛録云唐口分是二分世業是八分有口則有口分寡婦皆無過十二云云唐節度使收稅皆入其家所以節度富淳杜佑可謂有意於世務者問理道要訣曰是一箇非古是今之書理道要訣亦是杜佑書是一箇通典節要方子朱梁不久而滅無人為他藏掩得故諸惡一切發見若更稍久必掩得一半揚後唐莊宗善音律好寵伶優其卒也得鷹坊人善友斂樂器而焚之所謂君以此始必以此終豈欺我哉壽昌周世宗天資高於人才中尋得箇王朴來用不數年間做了許多事業且如禮樂律歷等事想他見都會得故能用其説成其事又如本朝太祖直是明達故當時創法立度其節拍一一都是蓋緣都曉得許多道理故也一本此下云所謂神聖其臣莫及趙普輩皆不及之廣問世宗果賢主否曰看來也是好問當時也曾制禮作樂曰只是四年之間煞做了事問今刑統亦是他所作曰開寶通禮當時做不曾成後來太祖足成了而今一邊征伐一邊制禮作樂自無害事自是有人來與他做今人鄉一邊便不對那一邊才理會征伐便將禮樂做間慢了世宗胸懷又較大胡泳五代時甚麼樣周世宗一出便振收三關是王朴死後事模樣世宗未死時須先取了燕冀則雲中河東皆在其內矣本朝收河東契丹常以重兵援其後契丹嫌劉氏不援始取之揚周世宗亦可謂有天下之量才見元稹均田圖便慨然有意周世宗大均天下之田元稹均田圖世未之見德明周世宗規模雖大然性迫無甚寬大氣象做好事亦做教顯顯地都無些含洪之意亦是數短而然揚晉悼公幼年聰慧似周世宗只是世宗卻得太祖接續他做將去雖不是一家人以公天下言之畢竟是得人接續所做許多規模不枉卻且如周武帝一時也自做得好只是後嗣便如此弱了後來雖得一箇隋文帝終是甚不濟事文蔚
