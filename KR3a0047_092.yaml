body:
  text: 朱子語類卷第九十二樂古今問古尺何所考曰羊頭山黍今不可得只依溫公樣他考必仔細然尺亦多樣隋書載十六等尺說甚詳王莽貨泉錢古尺徑一寸因出二尺曰短者周尺長者景表尺義剛十二律皆在只起黃鍾之宮不得所以起不得者尺不定也升卿律管只吹得中聲為定季通嘗截小竹吹之可驗若謂用周尺或羊頭山黍雖應準則不得中聲終不是大抵聲太高則焦殺低則盎緩牛鳴盎中謂此又云此不可容易杜撰劉歆為王莽造樂樂成而莽死後荀勗造於晉武帝時即有五胡之亂和峴造於周世宗時世宗亦死惟本朝太祖神聖特異初不曾理會樂但聽樂聲嫌其太高令降一分其聲遂和唐太宗所定樂及本朝樂皆平和所以世祚久長笑云如此議論又卻似在樂不在德也德明因論樂律云尺以三分為增減蓋上生下生三分損一益一故須一寸作九分一分分九釐一釐分九絲方如破竹都通得去人傑錄云律管只以九寸為準則上生下生三分益一損一如破竹矣其制作通典亦略備史記律書漢律歷志所載亦詳范蜀公與溫公都枉了相爭只通典亦未嘗看蜀公之言既疏溫公又在下無聲做管不成德明司馬遷說律只是推一箇通了十二箇皆通十二律自黃鍾而生黃鍾是最濁之聲其餘漸漸清若定得黃鍾是便入得樂都是這裏纔差了些子其他都差只是寸難定所以易差道夫樂聲黃鍾九寸最濁應鍾最清清聲則四寸半八十一五十四七十二六十四至六十四則不齊而不容分矣人傑音律如尖塔樣闊者濁聲尖者清聲宮以下則太濁羽以上則太輕皆不可為樂惟五聲者中聲也人傑樂律自黃鍾至中呂皆屬陽自蕤賓至應鍾皆屬陰此是一箇大陰陽黃鍾為陽大呂為陰太簇為陽夾鍾為陰每一陽間一陰又是一箇小陰陽閎祖自黃鍾至中呂皆下生自蕤賓至應鍾皆上生以上生下皆三生二以下生上皆三生四閎祖禮記注疏說五聲六律十二管還相為宮處分明人傑旋宮且如大呂為宮則大呂用黃鍾八十一之數而三分損一下生夷則夷則又用林鍾五十四之數而三分益一上生夾鍾其餘皆然閎祖問先生所論樂今考之若以黃鍾為宮便是太簇為商姑洗為角蕤賓為變徵林鍾為徵南呂為羽應鍾為變宮若以大呂為宮便是夾鍾為商中呂為角林鍾為變徵夷則為徵無射為羽黃鍾為變宮其餘則旋相為宮周而復始若言相生之法則以律生呂便是下生以呂生律則為上生自黃鍾下生林鍾林鍾上生太簇太簇下生南呂南呂上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓本當下生今卻復上生大呂大呂下生夷則夷則上生夾鍾夾鍾下生無射無射上生中呂相生之道至是窮矣遂復變而上生黃鍾之宮再生之黃鍾不及九寸只是八寸有餘然黃鍾君象也非諸宮之所能役故虛其正而不復用所用只再生之變者就再生之變又缺其半所謂缺其半者蓋若大呂為宮黃鍾為變宮時黃鍾管最長所以只得用其半聲而餘宮亦皆倣此曰然又曰宮商角徵羽與變徵皆是數之相生自然如此非人力所加損此其所以為妙問既有宮商角徵羽又有變宮變徵何也曰二者是樂之和去聲相連接處道夫旋相為宮若到應鍾為宮則下四聲都當低去所以有半聲亦謂之子聲近時所謂清聲是也大率樂家最忌臣民陵君故商聲不得過宮聲然近時卻有四清聲方響十六箇十二箇是律呂四片是四清聲古來十二律卻都有半聲所謂半聲者如蕤賓之管當用六寸卻只用三寸雖用三寸聲卻只是大呂但愈重濁耳又問聲氣之元曰律歷家最重這元聲元聲一定向下都定元聲差向下都差植饒本云因論樂云黃鍾之律最長應鍾之律最短長者聲濁短者聲清十二律旋相為宮宮為君商為臣樂中最忌臣陵君故有四清聲如今方響有十六箇十二箇是正律四箇是四清聲清聲是減一律之半如應鍾為宮其聲最短而清或蕤賓為之商則是商聲高似宮聲為臣陵君不可用遂乃用蕤賓律減半為清聲以應之雖然減半只是出律故亦自能相應也此是通典載此一項又云樂聲不可太高又不可太低樂中上聲便是鄭衛所以太祖英明不可及當王朴造樂聞其聲太急便令減下一律其聲遂平徽宗朝作大晟樂其聲一聲低似一聲故其音緩又云賢君大概屬意於雅樂所以仁宗晚年極力要理會雅樂終未理會得律遞相為宮到末後宮聲極清則臣民之聲反重故作折半之聲然止於四者以為臣民不可大於君也事物大於君不妨五聲分為十二律添三分減三分至十二而止後世又增其四取四清聲璘宮與羽角與徵相去獨遠故於其間製變宮變徵二聲廣問周禮大司樂說宮角徵羽與七聲不合如何曰此是降神之樂如黃鍾為宮大呂為角太簇為徵應鍾為羽自是四樂各舉其一者而言之以大呂為角則南呂為宮太簇為徵則林鍾為宮應鍾為羽則太簇為宮以七聲推之合如此注家之說非也人傑律呂有十二用時只使七箇自黃鍾下生至七若更插一聲便拗了淳七聲之說國語言之人傑律十有二作樂只用七聲惟宮聲筵席不可用用則賓主失歡力行云今人揲卦得乾卦者多不為吉故左傳言隨元亨利貞有是四德乃可以出曰然力行問國語云律者立均出度韋昭注云均謂均鍾木長七尺係之以弦不知其制如何曰韋昭是箇不分曉底人國語本自不分曉更著他不曉事愈見鶻突均只是七均如以黃鍾為宮便用林鍾為徵太簇為商南呂為羽姑洗為角應鍾為變宮蕤賓為變徵這七律自成一均其聲自相諧應古人要合聲先須吹律使眾聲皆合律方可用後來人想不解去逐律吹得京房始有律準乃是先做下一箇母子調得正了後來只依此為準國語謂之均梁武帝謂之通其制十三弦一弦是全律底黃鍾只是散聲又自黃鍾起至應鍾有十二弦要取甚聲用柱子來逐弦分寸上柱取定聲立均之意本只是如此古來解書最有一箇韋昭無理會且如下文六者中之色六字本只是黃字闕卻上面一截他便就這六字上解謂六聲天地之中六者天地之中自是數干色甚事文蔚水火木金土是五行之序至五聲宮卻屬土至羽屬水宮聲最濁羽聲最清一聲應七律共八十四調除二律是變宮止六十調人傑樂聲是土金木火水洪範是水火木金土人傑樂之六十聲便如六十甲子以五聲合十二律而成六十聲以十干合十二支而成六十甲子若不相屬而實相為用遺書云三命是律五星是歷即此說也只曉不得甲子乙丑皆屬木而納音卻屬金前輩多論此皆無定說僩絲宮而竹羽人傑絲尚宮竹尚羽竹聲大故以羽聲濟之絲聲細故以宮聲濟之廣周禮以十二律為之度數如黃鍾九寸林鍾六寸之類以十二聲為之劑量斟酌磨削剛柔清濁音聲有輕重高低故復以十二聲劑量蓋磬材有厚薄令合節奏如磬氏已上則磨其旁已下則磨其端之類先生偶言及律呂謂管有長短則聲有清濁黃鍾最長則聲最濁應鍾最短則聲最清時舉云黃鍾本為宮然周禮祭天神人鬼地谀之時則其樂或以黃鍾為宮或以林鍾為宮未知如何曰此不可曉先儒謂商是殺聲鬼神所畏故不用而只用四聲迭相為宮未知其五聲不備又何以為樂大抵古樂多淡十二律之外又有黃鍾大呂太簇夾鍾四清聲雜於正聲之間樂都可聽今古樂不可見矣長沙南嶽廟每祭必用樂其節奏甚善祭者久立不勝其勞據圖經云是古樂然其樂器又亦用伏鼓之類如此則亦非古矣時舉因云金聲玉振是樂之始終不知只是首尾用之還中間亦用耶曰樂有特鍾特磬有編鐘編磬編鐘編磬是中間奏者特鐘特磬是首尾用者時舉云所謂玉振者只是石耶還真用玉曰只是石耳但大樂亦有玉磬所謂天球者是也問周禮祭不用商音或以為是武王用厭勝之術竊疑聖人恐無此意曰這箇也難曉須是問樂家如何不用商嘗見樂家言是有殺伐之意故祭不用然也恐是無商調不是無商音他那奏起來五音依舊皆在又問向見一樂書溫公言本朝無徵音竊謂五音如四時代謝不可缺一若無徵音則本朝之樂大段不成說話曰不特本朝從來無那徵不特徵無角亦無之然只是太常樂無那宴樂依舊有這箇也只是無徵調角調不是無徵音角音如今人曲子所謂黃鍾宮大呂羽這便是調謂如頭一聲是宮聲尾後一聲亦是宮聲這便是宮調若是其中按拍處那五音依舊都用不只是全用宮如說無徵便只是頭聲與尾聲不是徵這卻不知是如何其中有箇甚麼欠缺處所以做那徵不成徽宗嘗令人硬去做然後來做得成卻只是頭一聲是徵尾後一聲依舊不是依舊走了不知是如何平日也不曾去理會這須是樂家辨得聲音底方理會得但是這箇別是一項未消得理會義剛古者太子生則太師吹管以度其聲看合甚律及長其聲音高下皆要中律南北之亂中華雅樂中絕隋文帝時鄭譯得之於蘇祗婆蘇祗婆乃自西域傳來故知律呂乃天地自然之聲氣非人之所能為譯請用旋宮何妥恥其不能遂止用黃鍾一均事見隋志因言佛與吾道不合者蓋道乃無形之物所以有差至如樂律則有數器所以合也閎祖六朝彈箏鼓瑟皆歌節唐太宗不曉音律謂不在樂者只是胡說易唐祖孝孫說八十四調季通云只有六十調不以變宮變徵為調恐其說有理此左傳中聲以降五降之後不容彈矣之意也人傑自唐以前樂律尚有制度可考唐以後都無可考如杜佑通典所算分數極精但通典用十分為寸作算法頗難算蔡季通只以九分算本朝范馬諸公非惟不識古制自是於唐制亦不曾詳看通典又不是隱僻底書不知當時諸公何故皆不看只如沈存中博覽筆談所考器數甚精亦不曾看此使其見此則所論過於范馬遠甚呂伯恭不喜筆談以為皆是亂說某與言未可恁地說恐老兄欺他未得在只是他做人不甚好耳因令將五音十二律寫作圖子云且須曉得這箇其他卻又商量道夫問樂曰古聲只是和後來多以悲恨為佳溫公與范蜀公胡安定與阮逸李照爭辨其實都自理會不得卻不曾去看通典通典說得極分明蓋此書在唐猶有傳者至唐末遂失其傳王朴當五代之末杜撰得箇樂如此當時有幾鍾名為啞鍾不曾擊得蓋是八十四調朴調其聲令一一擊之其實那箇啞底卻是古人制此不擊以避宮聲若一例皆擊便有陵節之患漢禮樂志劉歆說樂處亦好唐人俗舞謂之打令其狀有四曰招曰搖曰送其一記不得蓋招則邀之之意搖則搖手呼喚之意送者送酒之意舊嘗見深村父老為余言其祖父嘗為之收得譜子曰兵火失去舞時皆裹机頭列坐飲酒少刻起舞有四句號云送搖招搖三方一圓分成四片得在搖前人多不知皆以為啞謎漢卿云張鎡約齋亦是張家好子弟曰見君舉說其人大曉音律因言今日到詹元善處見其教樂又以管吹習古詩二南七月之屬其歌調卻只用太常譜然亦只做得今樂若古樂必不恁地美人聽他在行在錄得譜子大凡壓入音律只以首尾二字章首一字是某調章尾只以某調終之如關雎關字合作無射調結尾亦著作無射聲應之葛覃葛字合作黃鍾調結尾亦著作黃鍾聲應之如七月流火三章皆七字起七字則是清聲調末亦以清聲調結之如五月斯螽動股二之日鑿冰沖沖五字二字皆是濁聲黃鍾調末以濁聲結之元善理會事都不要理會箇是只信口胡亂說事事喚做曾經理會來如宮商角徵羽固是就喉舌唇齒上分他便道只此便了元不知道喉舌唇齒上亦各自有宮商角徵羽何者蓋自有箇疾徐高下賀孫溫公與范忠文胡安定與阮逸李照等議樂空自爭辯看得來都未是元不曾去看通典據通典中所說皆是又且分曉廣云如此則杜佑想是理會得樂曰這也不知他會否但古樂在唐猶有存者故他因取而載於書至唐末黃巢亂後遂失其傳至周世宗時王朴據他所見杜撰得箇樂出來通鑑中說王朴說當時鍾有幾箇不曾擊謂之啞鍾朴乃調其聲便皆可擊看得來所以存而不擊者恐是避其陵慢之聲故不擊之耳非不知擊之也廣范蜀公謂今漢書言律處折了八字蜀中房庶有古本漢書有八字所以與溫公爭者只爭此范以古本為正蜀公以上黨粟一千二百粒實今九寸為準闊九寸溫公以一千二百粒排今一尺為準漢書文不甚順又粟有大小遂取中者為之然下粟時頓緊則粟又下了又不知如何為正排又似非是今世無人曉音律只憑器論造器又紛紛如此古人曉音律風角鳥占皆能之太史公以律論兵意出於此仁宗時李照造樂蜀公謂差過了一音每思之為之痛心劉羲叟謂聖上必得心疾後果然揚仁宗以胡安定阮逸樂書令天下名山藏之意思甚好道夫問溫公論本朝樂無徵音如何曰其中不能無徵音只是無徵調如首以徵音起而末復以徵音合殺者是徵調也徵調失其傳久矣徽宗令人作之作不成只能以徵音起而不能以徵音終如今俗樂亦只有宮商羽三調而已淳蔡京用事主張喻世清作樂盡破前代之言樂者因作中聲正聲如正聲九寸中聲只八寸七分一按史記七字多錯乃是十分一其樂只是杜撰至今用之人傑徽宗時一黥卒魏漢津造雅樂一部皆杜撰也今太學上丁用者是此樂揚季通律書分明是好卻不是臆說自有按據道夫問季通律書難曉曰甚分明但未細考耳問空圍九分便是徑三分曰古者只說空圍九分不說徑三分蓋不啻三分猶有奇也問算到十七萬有餘之數當何用曰以定管之長短而出是聲如太簇四寸惟用半聲方和大抵考究其法是如此又未知可用與否耳節五聲須是知音律之人與審驗過方見得德明季通理會樂律大段有心力看得許多書也是見成文字如史記律歷書自無人看到這裏他近日又成一律要盡合古法近時所作律逐節吹得卻和怕如今未必如此這箇若促些子聲便焦殺若長些子便慢蕩賀孫陳淳言琴只可彈黃鍾一均而不可旋相為宮此說猶可至謂琴之泛聲為六律又謂六律為六同則妄矣今人彈琴都不知孰為正聲若正得一弦則其餘皆可正今調弦者云如此為宮聲如此為商聲安知是正與不正此須審音人方曉得古人所以吹管聲傳在琴上如吹管起黃鍾之指則以琴之黃鍾聲合之聲合無差然後以吹遍合諸聲五聲既正然後不用管只以琴之五聲為準而他樂皆取正焉季通書來說近已曉得但絣定七絃不用調絃皆可以彈十一宮琴之體是黃鍾一均故可以彈十一宮如此則大呂太簇夾鍾以下聲聲皆用按徽都無散聲蓋纔不按即是黃鍾聲矣亦安得許多指按耶兼如其說則大呂以下亦不可對徽須挨近第九徽裏按之此後愈挨下去方合大呂諸聲蓋按著正徽復是黃鍾聲矣渠云頃問之太常樂工工亦云然恐無此理古人彈琴隨月調弦如十一月調黃鍾十二月調大呂正月調太簇二月調夾鍾但此後聲愈緊至十月調應鍾則弦急甚恐絕矣不知古人如何季通不能琴他只是思量得不知彈出便不可行這便是無下學工夫吾人皆坐此病古人朝夕習於此故以之上達不難蓋下學中上達之理皆具矣如今說古人兵法戰陣坐作進退斬射擊刺鼓行金止如何曉得他底莫說古人底曉不得只今之陣法也曉不得更說甚麼如古之兵法進則齊進退則齊退不令進而進猶不令退而退也如此則無人敢妄動然又卻有一人躍馬陷陣殺數十百人出入數四矢石不能傷者何也良久又曰據今之法只是兩軍相持住相射相刺立得腳住不退底便嬴立不住退底便輸耳僩今朝廷樂章長短句者如六州歌頭皆是俗樂鼓吹之曲四言詩乃大樂中曲本朝樂章會要國史中只有數人做得好如王荊公做得全似毛詩甚好其他有全做不成文章橫渠只學古樂府做辭拗強不似亦多錯字今之樂皆胡樂也雖古之鄭衛亦不可見矣今關雎鹿鳴等詩亦有人播之歌曲然聽之與俗樂無異不知古樂如何古之宮調與今之宮調無異但恐古者用濁聲處多今樂用清聲處多季通謂今俗樂黃鍾及夾鍾清如此則爭四律不見得如何般涉調者胡樂之名也般如般若之般子在齊聞韶據季札觀樂魯亦有之何必在齊而聞之也又夫子見小兒徐行恭謹曰韶樂作矣人傑詹卿家令樂家以俗樂譜吹風雅篇章初聞吹二南詩尚可聽後吹文王詩則其聲都不成模樣因言古者風雅頌名既不同其聲想亦各別廣趙子敬送至小雅樂歌以黃鍾清為宮此便非古清者半聲也唐末喪亂樂人散亡禮壞樂崩朴自以私意撰四清聲古者十二律外有十二子聲又有變聲六謂如黃鍾為宮則他律用正律若他律為宮則不用黃鍾之正聲而用其子聲故漢書云黃鍾不與他律為役者此也若用清聲為宮則本聲輕清而高餘聲重濁而下禮書中刪去乃是樂律通典中蓋說得甚明本朝如胡安定范蜀公司馬公李照輩元不曾看徒自如此爭辨也漢書所載甚詳然不得其要太史公所載甚略然都是要緊處新修禮書中樂律補篇以一尺為九寸一寸為九分一分為九釐一釐為九毫一毫為九絲方子樂律中所載十二詩譜乃趙子敬所傳云是唐開元間鄉飲酒所歌也但卻以黃鍾清為宮此便不可蓋黃鍾管九寸最長若以黃鍾為宮則餘律皆順若以其他律為宮便有相陵處今且只以黃鍾言之自第九宮後四宮則後為角或為羽或為商或為徵若以為角則是民陵其君矣若以為商則是臣陵其君矣徵為事羽為物皆可類推樂記曰五者皆亂迭相陵謂之慢如此則國之滅亡無日矣故製黃鍾四清聲用之清聲短其律之半是黃鍾清長四寸半也若後四宮用黃鍾為角徵商羽則以四清聲代之不可用黃鍾本律以避陵慢故漢志有云黃鍾不復為他律所役其他律亦皆有清聲若遇相陵則以清聲避之不然則否惟是黃鍾則不復為他律所用然沈存中續筆談說云惟君臣民不可相陵事物則不必避先生一日又說古人亦有時用黃鍾清為宮前說未是廣音律只有氣人亦只是氣故相關揚今之士大夫問以五音十二律無能曉者要之當立一樂學使士大夫習之久後必有精通者出升卿今人都不識樂器不聞其聲故不通其義如古人尚識鐘鼓然後以鐘鼓為樂故孔子云樂云樂云鐘鼓云乎哉今人鐘鼓已自不識揚鎛鐘甚大特懸鐘也眾樂未作先擊特鐘以發其聲眾樂既闋乃擊特磬以收其韻僩堂上樂金鐘玉磬今太常玉磬鎖在櫃裏更不曾設恐為人破損無可賠還尋常交割只據文書若要看旋開櫃取一二枚視之人傑今之簫管乃是古之笛雲簫方是古之簫廣畢篥本名悲栗言其聲之悲壯也廣俗樂中無徵聲蓋沒安排處及無黃鍾等四濁聲今之曲子亦各有某宮某宮云今樂起處差一位璘洛陽有帶花劉使名几於俗樂甚明蓋曉音律者范蜀公徒論鍾律其實不曉但守死法若以應鍾為宮則君民事物皆亂矣司馬公比范公又低二公於通典尚不曾看通典自說得分曉史記律書說律數亦好此蓋自然之理與先天圖一般更無安排但數到窮處又須變而生之卻生變律人傑劉几與伶人花日新善其弟厭之令勿通几戒花吹笛於門外則出與相見其弟又令終日吹笛亂之然花笛一吹則劉識其音矣人傑向見一女童天然理會得音律其歌唱皆出於自然蓋是稟得這一氣之全者人傑胡問今俗妓樂不可用否曰今州縣都用自家如何不用得亦在人斟酌淳
