body:
  text: 朱子語類卷第四十二論語二十四顏淵篇下仲弓問仁章文振說仲弓問仁謂上四句是主敬行恕下兩句是以效言曰此六句又須作一片看始得若只以下兩句作效驗說卻幾乎間了這兩句蓋內外無怨是箇應處到這裏方是充足飽滿如上章說天下歸仁亦是如此蓋天下或有一人不許以仁便是我為仁工夫有所未至如此看方見出門使民兩句綴箇己所不欲勿施於人兩句這兩句又便綴著箇無怨兩句上下貫通都無虧缺方始見得告顏淵仲弓問仁規模只依此做工夫更不容別間用心矣時舉植同己所不欲勿施於人緊接著那出門使民在邦無怨在家無怨緊接著那己所不欲勿施於人直到這裏道理方透徹似一片水流注出來到這裏方住中間也間斷不得效驗到這處方是做得透徹充足飽滿極道體之全而無虧缺外內間才有一人怨它便是未徹便如天下歸仁底才有一箇不歸仁便是有未到處又云內外無怨便是應處如關雎之仁則有麟趾之應鵲巢之仁則有騶虞之應問仁者甚多只答顏子仲弓底說得來大又曰顏子天資明便能於幾微之間斷制得天理人欲了植或問推己及物之謂恕曰推己及物便是己所不欲勿施於人然工夫卻在前面出門如見大賓使民如承大祭須是先主於敬然後能行其恕或問未出門使民之前更有工夫否曰未出門使民之時只是如此惟是到出門使民時易得走失故愈著用力也時舉問己所不欲勿施於人如己欲為君子則欲人皆為君子己不欲為小人則亦不欲人為小人曰此兩句亦是大綱說如富壽康寧人之所欲死亡貧苦人之所惡所欲者必以同於人所惡者不以加於人必大先生自唐石歸曰路上有人問己所不欲勿施於人是恕如以刑罰加人豈其人之所欲便是不恕始得且說如何衆人各以意對先生曰皆未分明伊川云恕字須兼忠字說此說方是盡忠是盡己也盡己而後為恕以刑罰加人其人實有罪其心亦自以為當然故以刑加之而非強之以所不欲也其不欲被刑者乃其外面之私心若其真心既已犯罪亦自知其當刑矣今人只為不理會忠而徒為恕其弊只是姑息張子韶中庸有云聖人因己之難克而知天下皆可恕之人即此論也今人只為不能盡己故謂人亦只消如此所以泛然亦不責人遂至於彼此皆自恕而已璘可學録云如刑人殺人之事己亦不欲到其時為之則傷恕如何可學云但觀其事之當理則不欲變為欲曰設如人自犯罪至於死到刑時其心欲否諸友皆無以答曰此當合忠字看忠者盡己之謂若看得己實有是罪則外雖不欲而亦知其當罪到此則不欲字使不著若不看忠字只用一恕字則似此等事放不過必流而為姑息張子韶解中庸云以己之難克而知天下皆可恕之人因我不會做皆使天下之人不做如此則相為懈怠而已此言最害理問在家在邦之怨是屬己屬人曰如何說得做在己之怨聖人言語只要平看儒者緣要切己故在外者多拽入來做內說在身上者又拽來就心上說必大問在家無怨在邦無怨曰此以效驗言若是主敬行恕而在家在邦皆不能無怨則所謂敬恕者未是敬恕問怨有是有非如何都得他無怨曰此且說怨得是底未說到不是底雉問在邦無怨在家無怨或以為其怨在己或以為其怨在人曰若以為己自無怨卻有甚義理此言能以敬為主而行之恕則人自不恕也人不我怨此仁之效如孔子告顏淵克己則言天下歸仁告仲弓以己所不欲勿施於人則言在邦無怨在家無怨此皆以效言特其效有小大之異耳去僞希遜問夫子答顏子仲弓問仁之異曰此是各就它資質上說然持敬行恕便自能克己克己便自能持敬行恕亦不必大段分別時舉以下通論二章曰克己復禮是剛健勇決一上便做了若所以告仲弓者是教他平穩做去慢慢地消磨了譬如服藥克己者要一服便見效敬恕者漸漸服藥磨去其病也人傑持敬行恕雖不曾著力去克己復禮然卻與克己復禮只一般蓋若是把這箇養來養去那私意自是著不得出門如見大賓使民如承大祭時也著那私意不得己所不欲勿施於人時也著那私意不得義剛問克己工夫與主敬行恕如何曰克己復禮是截然分別箇天理人欲是則行之非則去之敬恕則猶是保養在這裏未能保它無人欲在若將來保養得至亦全是天理矣克己復禮如撥亂反正主敬行恕如持盈守成二者自有優劣雉克己復禮如內修政事外攘夷狄出門使民如上策莫如自治問程先生說學質美者明得盡渣滓便渾化其次惟莊敬持養及其成功一也此可以分顏子仲弓否曰不必如此說賀孫仲弓出門如見大賓為仁如把截江淮顏子克己為仁便如欲復中原燾讀書須要將聖賢言語體之於身如克己復禮與出門如見大賓須就自家身上體看我實能克己與主敬行恕否件件如此方始有益又因晞遜問克己復禮曰人之私意有知得便克去者有忘記去克他者有不獨是忘記去克他卻反與他為朋者時舉問朱蜚卿讀書何所疑曰論語切要處在言仁言仁處多某未識門路日用至親切處覺在告顏子一章答仲弓又卻別集注云仲弓未及顏子故特告以操存之要不知告顏子者亦只是操存否曰這須子細玩味所告二人氣象自不同顧問賀孫前夜曾如何說賀孫舉先生云告仲弓底是防賊工夫告顏淵底是殺賊工夫蜚卿問如何曰且子細看大意是如此告顏子底意思是本領已自堅固了未免有些私意須一向克除教盡告仲弓底意思是本領未甚周備只是教他防捍疆土為自守計賀孫問孔子答顏淵仲弓問仁處旨同否曰不爭多大概也相似只答顏子處是就心上說工夫較深密為難問二條在學者則當並行不悖否曰皆當如此做當克己則須克己當出門如見大賓則須出門如見大賓克己復禮不是克己了又復禮只克去己私便是禮有是有非只去了非便是是所以孔子只說非禮勿視聽言動只克去那非便是禮曰呂銘癢痾疾痛皆切吾身句是否曰也說得只是不合將己對物說一篇意都要大同於物克只是克這箇孔子當初本意只是說克自己私欲淳伯羽問持敬克己工夫相資相成否乎曰做處則一但孔子告顏子仲弓隨他氣質地位而告之耳若不敬則此心散漫何以能克己若不克己非禮而視聽言動安能為敬仲思問敬則無己可克如何曰鄭子上以書問此因示鄭書曰說得也好鄭書云孔子惟顏子仲弓實告之以為仁之事餘皆因其人而進之顏子地位高擔當得克己矣故以此告之仲弓未至此姑告以操存之方涵養之要克己之功難為而至仁也易敬恕之功易操而至仁也難其成功則一故程子云敬則無己可克是也但學者為仁如謝氏云須於性偏處勝之亦不可緩特不能如顏子深於天理人欲之際便可至仁耳非只敬恕他不克己也又曰鄭言學者克己處亦好大底告顏子底便體用全似仲弓底若後人看不透便只到歸裏去做仲弓底了依舊用做顏子底克己乾道也敬恕坤道也忠信進德修辭立誠表裏通徹無一毫之不實何更用直內坤卦且恁地守顏子如將百萬之兵操縱在我拱揖指揮如意仲弓且守本分敬之至固無己可克克己之至亦不消言敬敬則無己可克者是無所不敬故不用克己此是大敬如聖敬日躋於緝熙敬止之敬也伯羽道夫略李時可問仲弓問仁孔子告之以出門如見大賓云云伊川只說作敬先生便說敬以持己恕以及物看來須如此說方全曰程子不是就經上說是偶然摘此兩句所以只說做敬又問伊川曰孔子言仁只說出門如見大賓使民如承大祭觀其氣象便須心廣體胖動容周旋中禮自然看來孔子方是教仲弓就敬上下工夫若是言仁亦未到得這處曰程子也不是就經上說公今不消得恁地看但且就他這二句上看其氣象是如何又問孔子告顏淵以克己復禮為仁若不是敬也如何克得己復得禮曰不必如此說聖人說話隨人淺深克己工夫較難出門使民較易然工夫到後只一般所謂敬則無己可克也賀孫集注程子言仁只說出門如見大賓使民如承大祭看其氣象便須心廣體胖動容周旋中禮問孔子告仲弓方是持敬底事程子如此說豈不有自然勉強之異乎曰程子之言舉敬之極致而言也又程子云敬以直內義以方外仁也問言敬義內外方做工夫而程子又何以遽言仁也曰此亦言敬以直內則無一毫私意仁自在其中爾大抵這般處要寬看識得他意不可迫切求之端蒙或問伊川云孔子言仁只說出門云云至中禮惟慎獨便是守之之法曰亦須先見得箇意思方慎獨以守之又曰此前面說敬而不見得此便是見得底意思便是見得敬之氣象功效恁地若不見得即黑淬淬地守一箇敬也不濟事賀孫問程先生說云云看其氣象便須心廣體胖動容周旋中禮看來也是平日用功方能如此非一旦出門如見大賓使民如承大祭便能如此曰自這裏做去方能如此只是常能存得此心便能如此又問克己復禮乾道主敬行恕坤道曰乾道者是見得善惡精粗分明便一刀兩段斬截了坤道便順這一邊做將去更不犯著那一邊又云乾道是創業之君坤道是繼體守成之君燾或問伊川未出門未使民時如何曰此儼若思時也聖人之言得他恁地說也好但使某答那人則但云公且去出門如見大賓使民如承大祭因曰那未出門使民時自是當敬不成未出門使民時不敬卻待出門時旋旋如見大賓使民時旋旋如承大祭卻成甚舉止聖人所以只直說出門如見大賓使民如承大祭更不說那未出門使民時如何如今恁地說卻較淡了義剛夔孫録云伊川答此問固好足以明聖人之說見得前面有一段工夫但當初正不消恁地答他卻好與他說今日就出門使民時做去若是出門使民時果能如見大賓承大祭則未出門使民以前自住不得了子升問克己復禮乾道也此莫是知至已後工夫否曰也不必如此說只見得一事且就一事上克去便是克己終不成說道我知未至便未下工夫若以大學之序言之誠意固在知至之後然亦須隨事修為終不成說知未至便不用誠意正心但知至已後自不待勉強耳木之袁子節問克己復禮何以謂之乾道主敬行恕何以謂之坤道曰乾道奮發而有為坤道靜重而持守一作有守時舉或問克己復禮者乾道莊敬持守者坤道如何分別曰乾道奮發而有為如庸言之信庸行之謹間邪存其誠之類是也忠信所以進德修辭立其誠所以居業坤道靜重而持守如敬以直內義以方外之類是也觀夫子告二子氣象各有所類洽或問顏冉之學何以有乾道坤道之別曰顏子是奮發而有為冉子是謙退而持守顏子高明強毅夫子故就其資質而教以克己復禮之學冉子溫厚靜重故以持敬行恕教之必大問克己復禮乾道主教行恕坤道如何曰仲弓資質溫粹顏子資質剛明克己復禮天下歸仁為仁由己而由人乎哉顏子之於仁剛健果決如天旋地轉雷動風行做將去仲弓則斂藏嚴謹做將去顏子如創業之君仲弓如守成之君顏子如漢高祖仲弓如漢文帝伊川曰質美者明得盡渣滓便渾化卻與天地同體其次惟莊敬以持養顏子則是明得盡者也仲弓則是莊敬以持養之者也及其成功一也潛夫曰舊曾聞先生說顏冉二子之於仁譬如捉賊顏子便赤手擒那賊出仲弓則先去外面關防然後方敢下手去捉他廣周貴卿問克己復禮乾道持敬行恕坤道曰乾道是見群龍無首吉既變則成坤故先迷失道後順得常西南得朋東北喪朋坤則都無頭但利牝馬之貞而已所以乾卦自君子進德修業以至於知至至之可與幾也知終終之可與存義也從知處說來如坤則但說敬以直內義以方外只就持守處說只說得一截如顏子克己復禮工夫卻是從頭做起來是先要見得後卻做去大要著手腳仲弓卻只是據見成本子做只是依本畫葫蘆都不問著那前一截了仲弓也是和粹但精神有所不及顏子是大故通曉向時陸子靜嘗說顏子不如仲弓而今看著似乎是克己復禮底較不如那持敬行恕底較無事但克己復禮工夫較大顏子似創業之君仲弓似守成之君仲弓不解做得那前一截只據見在底道理持守將去又一條云克己復禮是要見得天理後方做將去仲弓卻只是據見在持將去又問仲弓寬洪簡重如何見得曰也只想得是恁地夫子許他南面非如此不可如不佞等處也見得他簡重而今觀他說居敬行簡之類見得仁工夫也大故細密義剛夔孫録云坤是箇無頭底其繇辭曰利牝馬之貞先迷後得乾爻皆變而之坤其辭曰見群龍無首吉乾便從知處說起故云知至至之知終終之坤只是從持守處說故云敬以直內義以方外克己復禮也是有知底工夫在前主敬行恕只是據見定依本分做將去或說仲弓勝似顏淵謂出門如見大賓使民如承大祭勝如克己底費腳手然而顏子譬如創業底仲弓是守成底顏子極聰明警悟仲弓儘和粹問顏子問仁與仲弓問仁處看來仲弓才質勝似顏子曰陸子靜向來也道仲弓勝似顏子然卻不是蓋克己復禮乾道也是喫一服藥便效主敬行恕坤道也是服藥調護漸漸消磨去公看顏子多少大力量一克己復禮便了仲弓只是循循做將去底如何有顏子之勇祖道曰雖是如此然仲弓好做中人一箇準繩至如顏子學者力量打不到不如且學仲弓曰不可如此立志推第一等與別人做顏子雖是勇然其著力下手處也可做因舉釋氏云有一屠者放下屠刀立地成佛底事或曰如不遷不二卻是學者難做底曰重處不在怒與過只在遷與二字上看今不必論怒與過之大小只看不遷不二是甚模樣又云二不是一二之二是長二之二蓋一箇邊又添一箇此謂之二又問守之也非化之也如何曰聖人則卻無這箇顏子則疑於遷二與不遷二之間又問先生適說克己復禮是喫一服藥便效可以著力下手處更望力為開發曰非禮勿視勿聽勿言勿動處便是克己蓋人只有天理人欲日間行住坐臥無不有此二者但須自當省察譬如坐如尸立如齊此是天理當如此若坐欲縱肆立欲跛倚此是人欲了至如一語一默一飲一食盡是也其去復禮只爭這些子所以禮謂之天理之節文者蓋天下皆有當然之理今復禮便是天理但此理無形無影故作此禮文畫出一箇天理與人看教有規矩可以憑據故謂之天理之節文有君臣便有事君底節文有父子便有事父底節文夫婦長幼朋友莫不皆然其實皆天理也天理人欲其間甚微於其發處子細認取那箇是天理那箇是人欲知其為天理便知其為人欲既知其為人欲則人欲便不行譬如路然一條上去一條下去一條上下之間知上底是路便行下底差了便不行此其所操豈不甚約言之豈不甚易卻是行之甚難學者且恁地做將去久久自然安泰人既不隨私意則此理是本來自有底物但為後來添得人欲一段如孩提之童無不知愛其親及長無不知敬其兄豈不是本來底卻是後來人欲肆時孝敬之心便失了然而豈真失了於靜處一思念道我今日於父兄面上孝敬之心頗虧則此本來底心便復了也只於此處牢把定其功積久便不可及祖道問出門如見大賓使民如承大祭伊川謂大賓大祭只是敬也今若專主於大賓大祭之心而不容其私欲之害亦可為仁否曰下一節所謂不欲勿施與無怨此乃以接物而言敬是此心接物亦以此心佐集義問仲弓問仁曰能敬能恕則仁在其中問呂氏之說卻是仁在外曰說得未是又問只用敬否曰世有敬而不能恕底人便只理會自守卻無溫厚愛人氣象若恕而無敬則無以行其恕問在家在邦無怨諸說不同曰覺得語脈不是又問伊川謂怨在己卻是自家心中之怨曰只是處己既能敬而接人又能恕自然是在邦在家人皆無得而怨之此是為仁之驗便如天下歸仁處一般司馬牛問仁章或問仁者其言也訒曰仁者常存此心所以難其出不仁者已不識痛癢得說便說如人夢寐中語豈復知是非善惡仁者只知為之難言之得無訒乎宇宜久問仁者其言也訒曰仁者心常醒在見箇事來便知道須要做得合箇道理不可輕易便是知得道為之難故自不敢輕言若不仁底人心常如睡底相似都不曾見箇事理便天來大事也敢輕輕做一兩句說了時舉仲蔚問仁者其言也訒只是訥於言意思否曰訥於言而敏於行是怕人說得多後行不逮其言也訒是說持守得那心定後說出來自是有斟酌恰似肚裏先商量了方說底模樣而今人只是信口說方說時它心裏也自不知得義剛仁者之人言自然訒在學仁者則當自謹言語中以操持此心且如而今人愛胡亂說話輕易言語者是他此心不在奔馳四出如何有仁明作仁者其言也訒這是司馬牛身上一病去得此病方好將息充養耳道夫為之難言之得無訒乎心存則自是不敢胡亂說話大率說得容易底便是他心放了是實未嘗為之也若不敢胡亂做者必不敢容易說然亦是存得這心在或曰言行常相表裏又曰人到得少說話時也自是心細了燾僩録略問聖人答司馬牛其言也訒此句通上下言否曰就他身上說又較親切人謹得言語不妄發即求仁之端此心不放便存得道理在這裏學者千章萬句只是理會一箇心且如仁者其言也訒察其言便可知其本心之存與不存天理人欲之勝負端蒙或問顏子仲弓司馬牛問仁雖若各不同然克己工夫也是主敬其言也訒也是主敬曰司馬牛如何做得顏子仲弓底工夫須是逐人自理會仁譬之屋克己是大門打透便入來主敬行恕是第二門言訒是箇小門雖皆可通然小門便迂回得些是它病在這裏如先難後獲亦是隨它病處說銖司馬牛問君子章不憂不懼司馬牛將謂是塊然頑然不必憂懼不知夫子自說是內省不疚自然憂懼不來明作為學須先尋得一箇路徑然後可以進步可以觀書不然則書自書人自人且如孔子說內省不疚夫何憂何懼須觀所以不憂不懼由內省不疚學者又須觀所以內省不疚如何得來可學司馬牛憂曰章死生有命是合下稟得已定而今著力不得富貴在天是你著力不得僩富貴在天非我所與如有一人為之主宰然升卿死生有命富貴在天子夏之意只說是死生是稟於有生之初不可得而移富貴是眼下有時適然遇著非我所能必若推其極固是都稟於有生之初因問伊川橫渠命遇之說曰所謂命者如天子命我作甚官其官之間易繁難甚處做得甚處做不得便都是一時命了自家只得去做故孟子只說莫非命也卻有箇正與不正所謂正命者蓋天之始初命我如事君忠事父孝便有許多條貫在裏至於有厚薄淺深這卻是氣稟了然不謂之命不得只不是正命如桎梏而死喚做非命不得蓋緣它當時稟得箇乖戾之氣便有此然謂之正命不得故君子戰兢如臨深履薄蓋欲順受其正者而不受其不正者且如說當死於水火不成便自赴水火而死而今只恁地看不必去生枝節說命說遇說同說異也夔孫問敬而無失曰把捉不定便是失雉或言司馬牛所憂人當兄弟如此也是處不得曰只是如子夏說敬而無失與人恭而有禮若大段著力不得也不奈何若未然底可諫尚可著力做了時也不奈何得明作問四海皆兄弟胡氏謂意圓語滯以其近於二本否曰子夏當初之意只謂在我者敬而無失與人又恭而有禮如此則四海之內皆親愛之何患乎無兄弟要去開廣司馬牛之意只不合下箇皆兄弟字便成無差等了淳子張問明章問浸潤之譖膚受之訴曰譖是譖人是不干己底事才說得驟便不能入他須是間言冷語掉放那裏說教來不覺訴是逆是切己底事方說得緩慢人便不將做事須是說得緊切要忽然間觸動他如被人罵便說被人打被人打便說人要殺蓋不如此不足以觸動他也又問明而遠是見得到否曰是明字說不足又添箇遠字贊之燾或問膚受之訴切近梨也若他父兄有急難其事不可緩來訴時便用周他若待我審究得實已失事了此當如何曰不然所以說明又說遠須是眼裏識箇真僞始得若不識箇真僞安得謂之明遠這裏自有道理見得過他真僞卻來瞞我不得譬識藥材或將假藥來賣我識得過任他說千言萬語我既見破僞了看如何說也不買此所以謂之明遠只是這些子明作問浸潤膚受之說想得子張是箇過高底資質於此等處有不察故夫子語之否曰然廣子貢問政章文振問足食足兵民信之矣曰看來此只是因足食足兵而後民信本是兩項事子貢卻做三項事認了信字便是在人心不容變底事也時舉問民無信不立是民自不立是國不可立曰是民自不立民不立則國亦不能以立矣問民如何是不立曰有信則相守而死無信則相欺相詐臣棄其君子棄其父各自求生路去淳棘子成曰章問惜乎夫子之說君子也曰此說君子與說其爭也君子同蓋說得話來也君子熹問惜乎夫子之說君子也古注只作一句說先生作兩句說如何曰若作一句說則惜乎二字無著落廣問文猶質也質猶文也虎豹之篐猶犬羊之篐如何以文觀人曰無世間許多禮法如何辨得君子小人如老莊之徒絶滅禮法則都打箇沒理會去但子貢之言似少差別耳如孔子說禮與其奢也寧儉與其不遜也寧固便說得好雉棘子成全說質固未盡善子貢全說文以矯子成又錯若虎皮羊皮雖除了毛畢竟自別事體不同使一箇君子與一箇屠販之人相對坐並不以文見畢竟兩人好惡自別大率固不可無文亦當以質為本如寧儉寧戚之意明作哀公問於有若章問盍徹乎曰徹是八家皆通出力合作九百畝田收則計畝均收公取其一如助則八家各耕百畝同出力共耕公田此助徹之別也燾問百姓足君孰與不足曰未有府庫財非其財者也百姓既足不成坐視其君不足亦無此理蓋有人斯有土有土斯有財若百姓不足君雖厚斂亦不濟事雉或問有若對哀公盍徹乎之說云云曰今之州郡盡是於正法之外非泛誅取且如州郡倍契一項錢此是何名色然而州縣無這箇便做不行當初經總制錢本是朝廷去賴取百姓底州郡又去瞞經總制錢都不成模樣然不如此又便做不行或曰今州郡有三項請受最可畏宗室歸正添差使臣也曰然歸正人今卻漸少宗室則日盛可畏小使臣猶不見得更有那班裏換受底大使臣這箇最可畏每人一月自用四五百千結裹它僩子張問崇德辨惑章問主忠信徙義曰主忠信者每事須要得忠信且如一句話不忠信便是當得沒這事了主字須重看喚做主是要將這箇做主徙義是自家一事未合義遷徙去那義上見得又未甚合義須更徙去令都合義主忠信且先有本領了方徙義恁他便德會崇若不先主忠信即空了徙去甚處如何會崇主忠信而不徙義卻又固執植主忠信是劄腳處徙義是進步處漸漸進去則德自崇矣方子問易只言忠信所以進德而孔子答子張崇德之問又及於徙義者是使學者於所存所行處兩下都做工夫否曰忠信是箇基本徙義又是進處無基本徙進不得有基本矣不徙義亦無緣得進廣問子張問崇德辨惑孔子既答之矣末又引我行其野之詩以結之誠不以富亦祗以異伊川言此二句當冠之齊景公有馬千駟之上後之傳者因齊景公問政而誤之耳至范氏則以為人之成德不以富亦祗以行異於野人而已此二說如何曰如范氏說則是牽合如伊川說則是以富言千駟異言夷齊也今只得如此說謨齊景公問政章問齊景公問政孔子告以君君臣臣父父子子然當時陳氏厚施於國根株盤據如此政使孔子為政而欲正其君臣父子當於何處下手曰此便是難據晏子之說則曰惟禮可以已其亂然當時舉國之人皆欲得陳氏之所謀成豈晏子之所謂禮者可得而已之然此豈一朝一夕之故蓋其失在初履霜而至堅煉亦末如之何也已如孔子相魯欲墮三家至成則為孟氏所覺遂不可墮要之三家孟氏最弱季叔為強強者墮之而弱者反不可墮者強者不覺而弱者覺之故也問成既不可墮夫子如何別無處置了便休曰不久夫子亦去魯矣若使聖人久為之亦須別有箇道理廣問齊景公問政與待孔子二章想是一時說話觀此兩段見得景公是箇年老志衰苟且度日不復有遠慮底人曰景公平日自是箇無能為底人不待老也廣子路無宿諾章問子路無宿諾曰子路許了人便與人去做這事不似今人許了人卻掉放一壁不管雉子張問政章亞夫問居之無倦行之以忠曰居之無倦在心上說行之以忠在事上說居之無倦者便是要此心長在做主不可放倒便事事都應得去行之以忠者是事事要著實故某集注云以忠則表裏如一謂裏要如此便外面也如此事事靠實去做也時舉問居之無倦行之以忠曰若是有頭無尾底人便是忠也不久所以孔子先將箇無倦逼截它賀孫問居之無倦行之以忠曰所居是自己事要終始如一行之以忠是對人言之謂應接時恐有不誠處必大子張是箇有鋭氣底人它作事初頭乘些鋭氣去做少間做到下梢多無殺合故告以居之無倦又且不朴實故告之以行之以忠欲其盡心力也燾亞夫問居謂存諸心無倦謂始終如一行謂施諸事以忠謂表裏如一此固分明然行固是行其所居但不知居是居箇甚物事曰常常恁地提省在這裏若有頃刻放倒便不得賀孫君子成人之美章問君子成人之美不成人之惡成字如何曰成字只是欲字季康子患盜章問楊氏謂欲民之不為盜在不欲而已橫渠謂欲生於不足則民盜能使無欲則民自不為盜假設以子不欲之物賞子使竊子必不竊故為政在乎足民使無所欲而已如橫渠之說則是孔子當面以季康子比盜矣孔子於季康子雖不純於為臣要之孔子必不面斥之如此聖人氣象恐不若是如楊氏所說只是責季康子之貪然氣象和平不如此之峻厲今欲且從楊說如何曰善謨季康子問政章或問子為政焉用殺曰尹氏謂殺之為言豈為人上之語哉此語固好然聖人只說焉用殺三字自是不用解了蓋上之人為政欲善則民皆善自是何用殺聖人之言渾成如此時舉子張問士章問何如斯可謂之達曰行得無窒礙謂之達在家必達在邦必達事君則得乎君治民則得乎民事親則孝事長則弟無所不達植録云如事親則得乎親事君則得乎君之類又曰色取仁而行違居之不疑正是指子張病痛處謙之周問聞達之別曰達是退一步底聞是近前一步做底退一步底卑遜篤實不求人知一旦工夫至到卻自然會達聞是近前一步做惟恐人不知故矜張誇大一時若可喜其實無足取者雉問達字之義曰此是聞達之達非明達之達但聞只是求聞於人達卻有實實方能達達者實有而不居聞者卻是要做這模樣端蒙質直而好義便有箇觸突人底意思到得察言觀色慮以下人便又和順底細不至觸突人矣慮謂思之詳審常常如此思慮恐有所不覺知也聖人言語都如此周遍詳密僩問察言而觀色曰此是實要做工夫蓋察人之言觀人之色乃是要驗吾之言是與不是今有人自任己意說將去更不看人之意是信受它還不信受它如此則只是自高更不能謙下於人實去做工夫也大抵人之為學須是自低下做將去才自高了便不濟事時舉問察言觀色想是子張躐等為大賢於人何所不容之事於人不辨別邪正與賢不肖故夫子言此以針之曰子張是做箇大底意思包他人至之問堂堂乎張也它是有箇忽略底意思否曰他做箇大底意思包人便是忽略時舉色取仁而行違這是占外面地位闊了裏面填不足植問子張問達與聞一章曰達者是自家實去做而收斂近裏底如質直好義便是自去做察言觀色便是察人辭色而與之言又慮以下人惟恐其不收斂也若是只據自家意只管說去更不問人聽與不聽便是不察言觀色然而能如此則德修於己而自孚於人所行自無窒礙矣故曰達聞者是箇做作底專務放出外求人知而已如色取仁而行違便是不務實而專務外居之不疑便是放出外而收斂不得只得自擔當不放退蓋才放退則連前面都壞只得大拍頭居之不疑此其所以駕虛而無實行也某向來未曉聞達二字因見鄉中有人其傳揚說好者甚衆以至傳揚於外莫不皆然及細觀其所為皆不誠實以此方見得聖人分達與聞之別意思如此段形容得達與聞極精又云色取仁而行違不惟是虛有愛憐之態如正顏色而不近信色厲而內荏皆色取仁而行違也燾問子張問聞與達一章達是躬行實踐做出來底聞是沽名要譽底曰然達是常自貶損不求名而名自達者聞是向前求名底又云慮以下人慮是子細思量謂如做一事便思量惟恐有觸突人處又云質直好義是質直好底有那質直粗底又不好義燾質是質實直又自是一字質就性資上說直漸就事上說到得好義又多在事上直固是一直做去然至於好義則事事區處要得其宜這一項都是詳細收斂工夫如色取仁而行違居之不疑這只是粗謾將去世上有此等人專以大意氣加人子張平日是這般人故孔子正救其病此章大意不出一箇是名一箇是實賀孫問色取仁而行違居之不疑在邦必聞在家必聞與鄉原如何曰卻不同那在邦必聞在家必聞底是大拍頭做要壓倒人鄉原卻是不做聲不做氣陰沈做罪過底人義剛言二者皆是要譽而天理都不存了曰固是如此但一箇是向前去做一箇是退來做義剛問子張以聞為達伊川以為明達之達上蔡以為令聞四達之達尹氏以為充於內而發於外為達三說如何曰此所謂達者只是言所行要無窒礙如事君必得乎上治民必得乎下而無所不行無所不通與子張問行大抵相似呂氏謂德孚於人者必達矯行求名者必聞此說卻是好去僞集注楊問質直而好義質直是質性之直或作兩件說曰質與直是兩件察言觀色龜山說察言故不失口於人觀色故不失色於人如何曰自家色如何觀得只是察人言觀人色若照管不及未必不以辭氣加人此只做自家工夫不要人知既有工夫以之事親則得乎親以之事君則得乎君以之交朋友而朋友信雖蠻貊之邦行矣此是在邦在家必達之理子張只去聞處著力聖人此語正中其膏肓質直好義等處專是就實色取仁而行違專是從虛宇問質直而好義和靖謂立志質直如何曰這箇莫不須說立志質直但只是無華僞質是朴實直是無遍由而所行又合宜觀人之言而察人之色審於接物慮以下人只是一箇謙如此便做得去達是做得去又問仁如何以顏色取曰此處與前說相反只是顏色雖做仁者舉止而所行又卻不如此此恐是就子張身上說驤樊遲從遊舞雩之下章問如何先事後得便可以崇德曰人只有這一箇心不通著兩箇物事若一心做事又有一箇求得之心便於這上不專如何有積纍之功這一條心路只是一直去更無它歧才分成兩邊便不得且如今做一事一心在此做一心又去計較功勞這一件事定是不到頭不十分精緻若是做一事只是做一事要做這箇又要做那箇便自不得雖二者皆出於善也不得況於不善者乎賀孫陳希真問先事後得非崇德與曰今人做事未論此事當做不當做且先計較此事有甚功效既有計較之心便是專為利而做不復知事之當為矣德者理之得於吾心者也凡人若能知所當為而無為利之心這意思便自高遠才為些小利害討些小便宜這意思便卑下了所謂崇者謂德自此而愈高起也時舉問先事後得曰但做自家合做底事不必望他功效今做一件好事便望他功效則心便兩歧了非惟是功效不見連那所做底事都壞了而今一向做將去不望他功效則德何緣不崇時舉論先事後得曰正如韓信背水陳都忘了反顧之心戰必勝矣又云當思先事後得如何可以崇德蓋不可有二心一心在事則德自崇矣方子亞夫問先難而後獲先事後得莫是因樊遲有計較功利之心故如此告之曰此是後面道理而今且要知先事後得如何可以崇德蓋做合做底事便純是天理才有一毫計較之心便是人欲若只循箇天理做將去德便自崇才有人欲便這裏做得一兩分卻那裏缺了一兩分這德便消削了如何得會崇聖人千言萬語正要人來這裏看得破時舉攻其惡無攻人之惡須是截斷了外面它人過惡只自檢點方能自攻其惡若才去檢點它人自家這裏便疏心便粗了僩問子張樊遲崇德辨惑之問何故答之不同曰子張是矜張不實底人故夫子於崇德則告之以主忠信徙義欲收斂著實做工夫常人之情好人惡人只是好之惡之而已未至於必欲其生必欲其死處必是子張平日於喜怒之間用心過當故又告之以此樊遲為人雖無所考以學稼學圃及夫子答問觀之必是箇鄙俗粗暴底人故夫子告之以先難後獲此又以先事後得告之蓋鄙俗則有近利之意粗暴則有因忿忘身之患皆因其失而救之也雉樊遲問仁章樊遲未達者蓋愛人且是泛愛知人則有所擇二者相反故疑之夫子曰舉直錯諸枉能使枉者直能使枉者直便是仁樊遲誤認二句只是知故見子夏而問之子夏遂言之至於不仁者遠然後仁知之義皆備德明樊遲問仁孔子答以愛人問知答以知人有甚難曉處樊遲因甚未達蓋愛人則無所不愛知人則便有分別兩箇意思自相反故疑之只有曾吉甫說得好舉直錯諸枉便是知人能使枉者直便是愛人曾解一部論語只曉得這一段每常說仁知一箇是慈愛一箇是辨別各自向一路惟是舉直錯諸枉能使枉者直方見得仁知合一處仁裏面有知知裏面有仁僩愛人知人自相為用若不論直與枉一例愛他也不得大抵惟先知了方能頓放得箇仁也聖人只此兩句自包上下後來再與子夏所言皆不出此兩句意所以為聖人之言時舉文振說樊遲問仁曰愛人一節先生曰愛人知人是仁知之用聖人何故但以仁知之用告樊遲卻不告之以仁知之體文振云聖人說用則體在其中曰固是蓋尋這用便可以知其體蓋用即是體中流出也時舉或問愛人者仁之用知人者知之用孔子何故不以仁知之體告之乃獨舉其用以為說莫是仁知之體難言而樊遲未足以當之姑舉其用使自思其體曰體與用雖是二字本未嘗相離用即體之所以流行賀孫問不仁者遠矣謂不仁者皆為仁則不仁之事無矣曰是雉問樊遲問仁知一章燾看來不惟治天下國家如此而今學者若在一家一鄉而處置得合義時如此如不仁者遠矣之類曰這仁知兩字相須但辨別得分曉舉錯得是當便是仁之事且如人在鄉曲處置得事是當教一鄉之人不至於爭鬥即所以仁之也燾子貢問友章問忠告善道曰告之之意固是忠了須又教道得善始得雉問忠告善道曰善道是以善道之如有人雖敢忠言未必皆合道理者則是未善也時舉
