body:
  text: 朱子語類卷第一百二十五老氏莊列附老子康節嘗言老氏得易之體孟子得易之用非也老子自有老子之體用孟子自有孟子之體用將欲取之必固與之此老子之體用也存心養性充廣其四端此孟子之體用也廣老子之術謙沖儉嗇全不肯役精神閎祖老子之術須自家占得十分穩便方肯做才有一毫於己不便便不肯做閎祖老子之學大抵以虛靜無為沖退自守為事故其為說常以懦弱謙下為表以空虛不毀萬物為實其為治雖曰我無為而民自化然不化者則亦不之問也其為道每每如此非特載營魄一章之指為然也若曰旁月日扶宇宙揮斥八極神氣不變者是乃莊生之荒唐其曰光明寂照無所不通不動道場遍周沙界者則又瞿曇之幻語老子則初曷嘗有是哉今世人論老子者必欲合二家之似而一之以為神常載魄而無所不之則是莊釋之所談而非老子之意矣僩伯豐問程子曰老子之言竊弄闔闢者何也曰如將欲取之必固與之之類是它亦窺得些道理將來竊弄如所謂代大臣斫則傷手者謂如人之惡者不必自去治它自有別人與它理會只是占便宜不肯自犯手做曰此正推惡離己曰固是如子房為韓報秦攛掇高祖入關又項羽殺韓王成又使高祖平項羽兩次報仇皆不自做後來定太子事它亦自處間地又只教四老人出來定之老子不犯手張子房其學也陶淵明亦只是老莊問楊氏愛身其學亦淺近而舉世宗尚之何也曰其學也不淺近自有好處便是老子之學今觀老子書自有許多說話人如何不愛其學也要出來治天下清虛無為所謂因者君之綱事事只是因而為之如漢文帝曹參便是用老氏之效然又只用得老子皮膚凡事只是包容因循將去老氏之學最忍它間時似箇虛無卑弱底人莫教緊要處發出來更教你枝梧不住如張子房是也子房皆老氏之學如嶢關之戰與秦將連和了忽乘其懈擊之鴻溝之約與項羽講和了忽回軍殺之這箇便是他柔弱之發處可畏可畏它計策不須多只消兩三次如此高祖之業成矣僩問楊朱似老子頃見先生如此說看來楊朱較放退老子反要以此治國以此取天下曰大概氣象相似如云致虛極守靜篤之類老子初間亦只是要放退未要放出那無狀來及至反一反方說以無事取天下如云反者道之動弱者道之用之類僩楊朱之學出於老子蓋是楊朱曾就老子學來故莊列之書皆說楊朱孟子闢楊朱便是闢莊老了釋氏有一種低底如梁武帝是得其低底彼初入中國也未在後來到中國卻竊取老莊之徒許多說話見得儘高新唐書李蔚贊說得好南升人皆言孟子不排老子老子便是楊氏問老子與鄉原如何曰老子是出人理之外不好聲不好色又不做官然害倫理鄉原猶在人倫中只是箇無見識底好人淳義剛一條見論語類老子中有仙意列子列子平淡疏曠方子莊子莊周曾做秀才書都讀來所以他說話都說得也是但不合沒拘檢便凡百了或問康節近似莊周曰康節較穩燾莊子比邵子見較高氣較豪他是事事識得又卻蹴踏了以為不足為邵子卻有規矩方子李夢先問莊子孟子同時何不一相遇又不聞相道及林作其書亦不相及如何曰莊子當時也無人宗之他只在僻處自說然亦止是楊朱之學但楊氏說得大了故孟子力排之義剛夔孫同問孟子與莊子同時否曰莊子後得幾年然亦不爭多或云莊子都不說著孟子一句曰孟子平生足跡只齊魯滕宋大梁之間不曾過大梁之南莊子自是楚人想見聲聞不相接大抵楚地便多有此樣差異底人物學問所以孟子說陳良云云曰如今看許行之說如此鄙陋當時亦有數十百人從他是如何曰不特此也如莊子書中說惠施鄧析之徒與夫堅白異同之論歷舉其說是甚麼學問然亦自名家或云他恐是借此以顯理曰便是禪家要如此凡事須要倒說如所謂不管夜行投明要到如人上樹口銜樹枝手足懸空卻要答話皆是此意廣云通鑑中載孔子順與公孫龍辨說數話似好曰此出在孔叢子其他說話又不如此此書必是後漢時人撰者若是古書前漢時又都不見說是如何其中所載孔安國書之類其氣象萎薾都不似西京時文章廣老莊老子猶要做事在莊子都不要做了又卻說道他會做只是不肯做廣莊周是箇大秀才他都理會得只是不把做事觀其第四篇人間世及漁父篇以後多是說孔子與諸人語只是不肯學孔子所謂知者過之者也如說易以道陰陽春秋以道名分等語後來人如何下得它直是似快刀利斧劈截將去字字有著落公晦曰莊子較之老子較平帖些曰老子極勞攘莊子得些只也乖莊子跌蕩老子收斂齊腳斂手莊子卻將許多道理掀翻說不拘繩墨方子録云莊子是一箇大秀才他事事識得如天下篇後面乃是說孔子似用快刀利斧斫將去更無些礙且無一句不著落如說易以道陰陽等語大段說得好然卻不肯如此做去老子猶是欲斂手齊腳去做他卻將他窠窟一齊踢翻了莊子去孟子不遠其說不及孟子者亦是不相聞今亳州明道宮乃老子所生之地莊子生於蒙在淮西間孟子只往來齊宋鄒魯以至於梁而止不至於南然當時南方多是異端如孟子所謂陳良楚産也悅周公仲尼之道北學於中國又如說南蠻藎舌之人非先王之道是當時南方多異端或問許行恁地低也有人從之曰非獨是許行如公孫龍堅白同異之說是甚模樣也使得人終日只弄這箇漢卿問孔子順許多話卻好曰出於孔叢子不知是否只孔叢子說話多類東漢人文其氣軟弱又全不似西漢人文兼西漢初若有此等話何故不略見於賈誼董仲舒所述恰限到東漢方突出來皆不可曉賀孫前廣録一條疑聞同問老子與莊子似是兩般說話曰莊子於篇末自說破矣問先儒論老子多為之出脫云老子乃矯時之說以某觀之不是矯時只是不見實理故不知禮樂刑政之所出而欲去之曰渠若識得寂然不動感而遂通天下之故自不應如此它本不知下一節欲占一簡徑言之然上節無實見故亦不脫灑今讀老子者亦多錯如道德經云名非常名則下文有名無名皆是一義今讀者皆將有無作句又如常無欲以觀其妙常有欲以觀其竅只是說無欲有欲今讀者乃以無有為句皆非老子之意可學莊子老子不是矯時夷惠矯時亦未是可學莊列孟子莊子文章皆好列子在前便有迂僻處左氏亦然皆好高而少事實人傑因言列子語佛氏多用之莊子全寫列子又變得峻奇列子語溫純柳子厚嘗稱之佛家於心地上煞下工夫賀孫列莊本楊朱之學故其書多引其語莊子說子之於親也命也不可解於心至臣之於君則曰義也無所逃於天地之間是他看得那君臣之義卻似是逃不得不奈何須著臣服他更無一箇自然相胥為一體處可怪故孟子以為無君此類是也大雅老莊列子莊子是箇轉調底老子列子又細似莊子雷擊所在只一氣滾來間有見而不為害只緣氣未掤裂有所擊者皆是已發蔡季通云人於雷所擊處收得雷斧之屬是一氣擊後方始結成不是將這箇來打物見人拾得石斧如今斧之狀似細黃石因說道士行五雷法先生曰今極卑陋是道士許多說話全亂道蔡云禪家又勝似他曰禪家已是九分亂道了他又把佛家言語參雜在裏面如佛經本自遠方外國來故語音差異有許多差異字人都理會不得他便撰許多符咒千般萬樣教人理會不得極是陋蔡云道士有箇莊老在上卻不去理會曰如今秀才讀多少書理會自家道理不出他又那得心情去理會莊老蔡云無人理會得老子通透大段鼓動得人恐非佛教之比曰公道如何蔡云緣他帶治國平天下道理在曰做得出也只是箇曹參蔡云曹參未能盡其術曰也只是恁地只是藏縮無形影因問蔡曰公看道可道非常道名可名非常名無名天地之始有名萬物之母是如何說蔡云只是無名是天地之始有名便是有形氣了向見先生說庚桑子一篇都是禪今看來果是曰若其它篇亦自有禪話但此篇首尾都是這話又問蔡曰莊子虛無因應如何點曰只是恁地點多有人將虛無自做一句非是他後面又自解如何是無如何是因又云莊子文章只信口流出煞高蔡云列子亦好曰列子固好但說得困弱不如莊子問老子如何曰老子又較深厚蔡云看莊周傳說似乎莊子師於列子云先有作者如此恐是指列子曰這自說道理未必是師列子蔡問皆原於道德之意是誰道德曰這道德只自是他道德蔡云人多作吾聖人道德太史公智識卑下便把這處作非細看便把作大學中庸看了曰大學中庸且過一邊公恁地說了主張史記人道如何大凡看文字只看自家心下先自偏曲了看人說甚麼事都只入這意來如大路看不見只行下偏蹊曲徑去如分明大字不看卻只看從罅縫四旁處去如字寫在上面不看卻就字背後面看如人眼自花了看見眼前物事都差了便說道只恁地蔡云不平心看文字將使天地都易位了曰道理只是這一箇道理但看之者情僞變態言語文章自有千般萬樣合說東卻說西合說這裏自說那裏都是將自家偏曲底心求古人意又云如太史公說話也怕古人有這般人只自家心下不當如此將臨川何言江默之事觀之說道公羊穀梁是姓姜人一手做也有這般事尚書序不似孔安國作其文軟弱不似西漢人文西漢文粗豪也不似東漢人文東漢人文有骨肋也不似東晉人文東晉如孔坦疏也自得他文是大段弱讀來卻宛順是做孔叢子底人一手做看孔叢子撰許多說話極是陋只看他撰造說陳涉那得許多說話正史都無之他卻說道自好陳涉不能從之看他文卑弱說到後面都無合殺蔡云恐是孔家子孫曰也不見得蔡說春秋呂氏解煞好曰那箇說不好如一句經在這裏說做褒也得也有許多說話做貶也得也有許多說話都自說得似又云如史記秦紀分明是國史中間儘謹嚴若如今人把來生意說也都由他說春秋只是舊史録在這裏蔡云如先生做通鑑鋼目是有意是無意須是有去取如春秋聖人豈無意曰聖人雖有意今亦不可知卻妄為之說不得蔡云左氏怕是左史倚相之後蓋左傳中楚事甚詳曰以三傳較之在左氏得七八分蔡云道理則穀梁及七八分或云三傳中間有許多騃處都是其學者後來添入賀孫儒教自開闢以來二帝三王述天理順人心治世教民厚典庸禮之道後世聖賢遂著書立言以示後世及世之衰亂方外之士厭一世之紛拏畏一身之禍害書空寂以求全身於亂世而已及老子倡其端而列禦寇莊周楊朱之徒和之孟子嘗闢之以為無父無君比之禽獸然其言易入其教易行當漢之初時君世主皆信其說而民亦化之雖以蕭何曹參汲黯太史談輩亦皆主之以為真足以先於六經治世者不可以莫之尚也及後漢以來米賊張陵海島寇謙之之徒遂為盜賊曹操以兵取陽平陵之孫魯即納降款可見其虛繆不足稽矣僩老子書道可道章第一問老子道可道章或欲以常無常有為句讀而欲字屬下句者如何曰先儒亦有如此做句者不妥帖問三十輻共一轂當其無有車之用無是車之坐處否曰恐不然若以坐處為無則上文自是就輻轂而言與下文戶牖埏埴是一例語某嘗思之無是轂中空處惟其中空故能受軸而運轉不窮猶傘柄上木管子衆骨所會者不知名何緣管子中空又可受傘柄而闢闔下上車之轂亦猶是也莊子所謂樞始得其環中以應無窮亦此意僩谷神不死章第六正淳問谷神不死是為玄牝曰谷虛谷中有神受聲所以能響受物所以生物問谷神曰谷只是虛而能受神謂無所不應它又云虛而不屈動而愈出有一物之不受則虛而屈矣有一物之不應是動而不能出矣問玄牝或云玄是衆妙之門牝是萬物之祖曰不是恁地說牝只是木孔承嵴能受底物事如今門閂謂之牡鐶則謂牝鎖管便是牝鎖鬚便是牡雌雄謂之牝牡可見玄者謂是至妙底牝不是那一樣底牝問老子之言似有可取處曰它做許多言語如何無可取如佛氏亦儘有可取但歸宿門戶都錯了夔孫問谷神不死曰谷之虛也聲達焉則響應之乃神化之自然也是謂玄牝玄妙也牝是有所受而能生物者也至妙之理有生生之意焉程子所取老氏之說也人傑玄牝蓋言萬物之感而應之不窮又言受而不先如言聖人執左契而不責於人契有左右左所以銜右言左契受之義也方子沈莊仲問谷神不死是謂玄牝如何曰谷神是那箇虛而應物底物事又問常有欲以觀其徼徼之義如何曰徼是那邊徼如邊界相似說那應接處向來人皆作常無常有點不若只作常有欲無欲點義剛問原壤看來也是學老子曰他也不似老子老子卻不恁地莊仲曰卻似莊子曰是便是夫子時已有這樣人了莊仲曰莊子雖以老子為宗然老子之學尚要出來應世莊子卻不如此曰莊子說得較開闊較高遠然卻較虛走了老子意思若在老子當時看來也不甚喜他如此說莊仲問道可道如何解曰道而可道則非常道名而可名則非常名又問玄之義曰玄只是深遠而至於黑窣窣地處那便是衆妙所在又問寵辱若驚貴大患若身曰從前理會此章不得義剛張以道問載營魄與抱一能無離乎之義曰魄是一魂是二一是水二是火二抱一火守水魂載魄動守靜也義剛專氣致柔只看他這箇甚麼樣工夫專非守之謂也只是專一無間斷致柔是到那柔之極處才有一毫發露便是剛這氣便粗了僩老子之學只要退步柔伏不與你爭才有一毫主張計較思慮之心這氣便粗了故曰致虛極守靜篤又曰專氣致柔能如嬰兒乎又曰知其雄守其雌為天下溪知其白守其黑為天下谷所謂溪所謂谷只是低下處讓你在高處他只要在卑下處全不與你爭他這工夫極離常見畫本老子便是這般氣象笑嘻嘻地便是箇退步占便宜底人雖未必肖他然亦是它氣象也只是他放出無狀來便不可當如曰以正治國以奇用兵以無事取天下他取天下便是用此道如子房之術全是如此嶢關之戰啖秦將以利與之連和了即回兵殺之項羽約和已講解了即勸高祖追之漢家始終治天下全是得此術至武帝盡發出來便即當子房間時不做聲氣莫教他說一語更不可當少年也任俠殺人後來因黃石公教得來較細只是都使人不疑他此其所以乖也莊子比老子便不同莊子又轉調了精神發出來粗列子比莊子又較細膩問御風之說亦寓言否曰然僩古之為善士章第十五甘叔懷說先生舊常謂老子也見得此箇道理只是怕與事物交涉故其言有曰豫兮若冬涉川猶兮若畏四鄰儼若容廣因以質於先生曰老子說話大抵如此只是欲得退步占姦不要與事物接如治人事天莫若嗇迫之而後動不得已而後起皆是這樣意思故為其學者多流於術數如申韓之徒皆是也其後兵家亦祖其說如陰符經之類是也他說以正治國以奇用兵以無事取天下據他所謂無事者乃是大奇耳故後來如宋齊丘遂欲以無事竊人之國如今道家者流又卻都不理會得他意思廣將欲唿之章第三十六問老氏柔能勝剛弱能勝強之說曰它便揀便宜底先占了若這下則剛柔寬猛各有用時德明上德不德章第三十八郭德元問老子云夫禮忠信之薄而亂之首孔子又卻問禮於他不知何故曰他曉得禮之曲折只是他說這是箇無緊要底物事不將為事某初間疑有兩箇老聃橫渠亦意其如此今看來不是如此他曾為柱下史故禮自是理會得所以與孔子說得如此好只是他又說這箇物事不用得亦可一似聖人用禮時反若多事所以如此說禮運中謀用是作而兵由此起等語便自有這箇意思文蔚反者道之動章第四十一問反者道之動弱者道之用曰老子說話都是這樣意思緣他看得天下事變熟了都於反處做起且如人剛強咆哮跳躑之不已其勢必有時而屈故他只務為弱人才弱時卻蓄得那精剛完全及其發也自然不可當故張文潛說老子惟靜故能知變然其勢必至於忍心無情視天下之人皆如土偶爾其心都冷冰冰地了便是殺人也不恤故其流多入於變詐刑名太史公將他與申韓同傳非是強安排其源流實是如此廣易不言有無老子言有生於無便不是閎祖道生一章第四十二一便生二二便生四老子卻說二生三便是不理會得道生一一生二二生三不合說一箇生一箇方名與身章第四十四多藏必厚亡老子也是說得好義剛天下有道章第四十六天下有道卻走馬以糞車是一句謂以走馬載糞車也頃在江西見有所謂糞車者方曉此語今本無車字不知先生所見何本僩治人事天章第五十九老子言治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積德則無不克他底意思只要收斂不要放出友仁儉德極好凡事儉則鮮失老子言治人事天莫若嗇夫惟嗇是謂早服早服是謂重積德被它說得曲盡早服者言能嗇則不遠而復便在此也重積德者言先已有所積復養以嗇是又加積之也如修養者此身未有所損失而又加以嗇養是謂早服而重積若待其已損而後養則養之方足以補其所損不得謂之重積矣所以貴早服早服者早覺未損而嗇之也如某此身已衰耗如破屋相似東扶西倒雖欲修養亦何能有益耶今年得季通書說近來深曉養生之理盡得其法只是城郭不完無所施其功也看來是如此僩老子治人事天莫如嗇嗇養也先生曰嗇只是吝嗇之嗇它說話只要少用些子舉此一段至莫知其極河莊子書內篇養生第三因者君之綱道家之說最要這因萬件事且因來做因舉史記老子傳贊云云虛無因應變化於無窮曰虛無是體與因應字當為一句蓋因應是用因而應之之義云爾植因論庖丁解牛一段至恢恢乎其有餘刃曰理之得名以此目中所見無全牛熟僩外篇天地第十二莊子云各有儀則之謂性此謂各有儀則如有物有則比之諸家差善董仲舒云質朴之謂性性非教化不成性本自成於教化下一成字極害理可學問野馬也塵埃也生物之以息相吹也是如何曰他是言九萬里底風也是這箇推去息是鼻息出入之氣節問莊子實而不知以為忠當而不知以為信此語似好曰以實當言忠信也好只是它意思不如此雖實而我不知以為忠雖當而我不知以為信問莊生他都曉得只是卻轉了說曰其不知處便在此僩外篇天運第十四先生曰天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是孰居無事而推行是意者其有機緘而不得已邪意者其運轉不能自止邪雲者為雨乎雨者為雲乎孰能施是孰居無事淫樂而勸是莊子這數語甚好是他見得方說到此其才高如莊子天下篇言詩以道志書以道事禮以道行樂以道和易以道陰陽春秋以道名分若見不分曉焉敢如此道要之他病我雖理會得只是不做又曰莊老二書解注者甚多竟無一人說得他本義出只據他臆說某若拈出便別只是不欲得友仁烈風莊子音作厲風如此之類甚多節參同契先生以參同契示張以道云近兩日方令書坊開得然裏面亦難曉義剛問曾景建謂參同本是龍虎上經果否曰不然蓋是後人見魏伯陽傳有龍虎上經一句遂僞作此經大概皆是體參同而為故其間有說錯了處如參同中云二用無爻位周流行六虛二用者即易中用九用六也乾坤六爻上下皆有定位唯用九用六無位故周流行於六虛今龍虎經卻錯說作虛危去蓋討頭不見胡亂牽合一字來說義剛參同契所言坎離水火龍虎鉛汞之屬只是互換其名其實只是精氣二者而已精水也坎也龍也汞也氣火也離也虎也鉛也其法以神運精氣結而為丹陽氣在下初成水以火煉之則凝成丹其說甚異內外異色如鴨子卵真箇成此物參同契文章極好蓋後漢之能文者為之讀得亦不枉其用字皆根据古書非今人所能解以故皆為人枉解世間本子極多其中有云千周粲彬彬兮萬遍將可睹神明或告人兮魂靈忽自悟言誦之久則文義要訣自見又曰二用無爻位周流行六虛二用者用九用六九六亦坎離也六虛者即乾坤之初二三四五上六爻位也言二用雖無爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而無定所也世有龍虎經云在參同契之先季通亦以為好及得觀之不然乃撹括參同契之語而為之也僩卓録云鉛汞龍虎水火坎離皆一樣是精氣參同契盡被後人胡解凡說鉛汞之屬只是互換其名其實只一物也精與氣二者而以神運之耳云云千周兮粲彬彬用之萬遍斯可睹鬼神將告豫神靈忽自悟言誦之久則文義要訣自見又云二用無爻位周流遍六虛言二用雖無爻位常周流乎乾坤六爻之間猶人身之精氣常周流乎人之一身而無定所也又云往來無定所上下無常居亦此意也世有龍虎經或以為在參同契之先嘗見季通說好及觀之不然盡是撹括參同契為之如說二用六虛處彼不知為周易之二用六虛盡錯解了遂分說云有六樣虛盡是亂說參同契文章極好念得亦不枉其中心云汝若不告人絶聖道罪誅言之著竹帛又恐漏泄天機之意故但為重覆反復之語令人子細讀之自曉其法皆在其中多不曉參同契為艱深之詞使人難曉其中有千周萬遍之說欲人之熟讀以得之也大概其說以為欲明言之恐泄天機欲不說來又卻可惜人傑論修養人言仙人不死不是不死但只是漸漸銷融了不覺耳蓋他能煉其形氣使渣滓都銷融了唯有那些清虛之氣故能升騰變化漢書有云學神仙尸解銷化之術看得來也是好則劇然久後亦須散了且如秦漢間所說仙人後來都不見了國初說鍾離權呂洞賓之屬後來亦不見了近來人又說劉高尚過幾時也則休也廣長孺說修養般運事曰只是屏氣減息思慮自少此前輩之論也今之人傳得法時便授與人更不問他人肥與瘠怯與壯但是一律教他未有不敗不成病痛者因論道家修養有默坐以心縮上氣而致閉死者曰心縮氣亦未為是某嘗考究他妙訣只要神形全不撓動故老子曰心使氣則強才使氣便不是自然只要養成嬰兒如身在這裏坐而外面行者是嬰兒但無工夫做此其導引法只如消息皆是下策淳陰符經恐皆唐李筌所為是他著意去做學他古人何故只因他說起便行於世某向以語伯恭伯恭亦以為然一如麻衣易只是戴氏自做自解文字自可認道夫曰向見南軒跋云此真麻衣道者書也曰敬夫看文字甚疏道夫閭丘主簿進黃帝陰符經傳先生說握奇經等文字恐非黃帝作池本作因閭丘問握奇經引程子說先生曰云云唐李筌為之聖賢言語自平正都無許多嶢崎池本此下云又詩序是衛宏作好事者附會以為出聖人其詩章多是牽合須細考可也因舉遺書云前輩說處或有未到池本作有到有不到處不可一概定橫渠尋常有太深言語如言鬼神二氣之良能說得好伊川言鬼神造化之跡卻未甚明白問良能之義曰只是二氣之自然者耳因舉明則有禮樂幽則有鬼神鬼自是屬禮從陰神自是屬樂從陽池本云鬼神即禮樂又云前輩之說如此當知幽與明之實如何鬼自從陰屬禮神自從陽屬樂因舉樂者敦和率神而從天禮者別宜歸鬼而從地云云易言精氣為物游魂為變此卻是知鬼神之情狀魂氣升於天體魄歸於地是神氣上升鬼魄下降不特人也凡物之枯敗也其香氣騰於上其物腐於下此可類推閭丘次孟謂陰符經所謂自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推變化順矣此數語雖六經之言無以加先生謂如他閭丘此等見處儘得今按陰符經無其語道夫陰符經云天地之道浸這句極好陰陽之道無日不相勝只管逐些子挨出這箇退一分那箇便進一分道夫問陰符經云絶利一源曰絶利而止守一源節問陰符經三反晝夜是如何曰三反如學而時習之是貫上文言言專而又審反是反反覆覆節三反晝夜之說如修養家子午行持今日如此明日如此做得愈熟愈有效驗人傑論道教老氏初只是清淨無為清淨無為卻帶得長生不死後來卻只說得長生不死一項如今恰成箇巫祝專只理會厭禳祈禱這自經兩節變了賀孫道家有老莊書卻不知看盡為釋氏竊而用之卻去倣效釋氏經教之屬譬如巨室子弟所有珍寶悉為人所盜去卻去收拾人家破甕破釜必大道教最衰儒教雖不甚振然猶有學者班班駮駮說些義理又曰佛書中多說佛言道書中亦多云道言佛是箇人道卻如何會說話然自晉來已有此說必大道家之學出於老子其所謂三清蓋倣釋氏三身而為之爾佛氏所謂三身法身者釋迦之本性也報身者釋迦之德業也肉身者釋迦之真身而實有之人也今之宗其教者遂分為三像而駢列之則既失其指矣而道家之徒欲倣其所為遂尊老子為三清元始天尊太上道君太上老君而昊天上帝反坐其下悖戾僭逆莫此為甚且玉清元始天尊既非老子之法身上清太上道君又非老子之報身設有二像又非與老子為一而老子又自為上清太上老君蓋倣釋氏之失而又失之者也況莊子明言老聃之死則聃亦人鬼爾豈可僭居昊天上帝之上哉釋老之學盡當毀廢假使不能盡去則老氏之學但當自祀其老子關尹列莊子徒以及安期生魏伯陽輩而天地百祠自當領於天下之祠官而不當使道家預之庶乎其可也僩論道家三清今皆無理會如那兩尊已是詭名俠戶了但老子既是人鬼如何卻居昊天上帝之上朝廷更不正其位次又如真武本玄武避聖祖諱故曰真武玄龜也武蛇也此本虛危星形以之故因而名北方為玄武七星至東方則角亢心尾象龍故曰蒼龍西方奎婁狀似虎故曰白虎南方張翼狀似鳥故曰朱鳥今乃以玄武為真聖而作真龜蛇於下已無義理而又增天蓬天猷及翊聖真君作四聖殊無義理所謂翊聖乃今所謂曉子者真宗時有此神降故遂封為真君義剛道家行法只是精神想出恐人不信故以法愚之太史遷呂與叔集記一事極怪舊見臨漳有孫事道巡檢亦能此可學云天下有許多物事想極物自入來曰然可學道家說仙人尸解極怪異將死時用一劍一圓藥安於睡處少間劍化作自己藥又化作甚麼物自家卻自去別處去其劍亦有名謂之良非子良非之義猶言本非我也良非子好對亡是公
