body:
  text: 朱子語類卷第六十八易四乾上問乾坤古無此二字作易者特立此以明道如何曰作易時未有文字是有此理伏羲始發出可學以下總論乾坤乾坤只是卦名乾只是箇健坤只是個順純是陽所以健純是陰所以順至健者惟天至順者惟地所以後來取象乾便為天坤便為地淵乾坤陰陽以位相對而言固只一般然以分言乾尊坤卑陽尊陰卑不可並也以一家言之父母固皆尊母終不可以並乎父兼一家亦只容有一個尊長不容並所謂尊無二上也僩易中只是陰陽乾坤是陰陽之純粹者然就一年論之乾卦氣當四月坤卦氣當十月不可便道四月十月生底人便都是好人這箇又錯雜不可知淵方子錄云以卦氣言之四月是純陽十月是純陰然又恁地執定不得江德功言乾是定理坤是順理近是鄉論乾坤必先乾而後坤然又常以靜者為主故復卦一陽來復乃自靜來端蒙方其有陽怎知道有陰方有乾卦怎知更有坤卦在後淵物物有乾坤之象雖至微至隱纖毫之物亦無有無者子細推之皆可見僩問黃先之易說因曰伊川好意思固不盡在解經上然就解經上亦自有極好意思如說乾字便云乾健也健而無息之謂乾夫天專言之則道也天且弗違是也分而言之以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾賀孫以下易傳語問乾者天地之性情是天之道否曰性情是天愛健地愛順處又問天專言之則道也曰所謂天命之謂性此是說道所謂天之蒼蒼此是形體所謂惟皇上帝降衷於下民此是謂帝以此理付之便有主宰意又曰天道虧盈而益謙地道變盈而流謙此是說形體又問今之郊祀何故有許多帝曰而今煞添差了天帝共成十箇帝了且如漢時祀太乙便即是帝池本云問今郊祀也祀太乙曰而今都重了而今又別祀太乙一國三公尚不可況天而有十帝乎周禮中說上帝是總說帝說五帝是五方之帝說昊天上帝只是說天之象鄭氏以為北極看來非也北極只是星如太微是帝之庭紫微是帝之居紫微便有太子后妃許多星帝庭便有宰相執法許多星又有天市亦有帝座處便有權衡稱斗星夔孫或問以主宰謂之帝孰為主宰曰自有主宰蓋天是箇至剛至陽之物自然如此運轉不息所以如此必有為之主宰者這樣處要人自見得非語言所能盡僩錄作到也因舉莊子孰綱維是孰主張是十數句曰他也見得這道理如圭峰禪師說知字樣卓僩同問以功用謂之鬼神以妙用謂之神曰鬼神者有屈伸往來之跡如寒來暑往日往月來春生夏長秋收冬藏皆鬼神之功用此皆可見也忽然而來忽然而往方如此又如彼使人不可測知鬼神之妙用也僩莊仲問以功用謂之鬼神以妙用謂之神曰鬼神是有一箇漸次形跡神則忽然如此忽然不如此無一箇蹤由要之亦不離於鬼神只是無跡可見文蔚以功用謂之鬼神以妙用謂之神鬼神如陰陽屈伸往來消長有癞跡可見者以妙用謂之神是忽然如此皆不可測忽然而來忽然而去忽然在這裏忽然在那裏以功用謂之鬼神此以氣之屈伸往來言也以妙用謂之神此言忽然如此又忽然不如此者鬼是一定底神是變而不可知底端蒙功用是有跡底妙用是無跡底妙用是其所以然者義剛叔器問功用謂之鬼神妙用謂之神曰功用兼精麤而言是說造化妙用以其精者言其妙不可測天地是體鬼神是用鬼神是陰陽二氣往來屈伸天地間如消底是鬼息底是神生底是神死底是鬼以四時言之春夏便為神秋冬便為鬼又如晝夜晝便是神夜便是鬼淳錄云所以鬼夜出以人言之語為神默為鬼動為神靜為鬼以氣息言之呼為神吸為鬼昭明焄蒿悽愴此百物之精也神之著也如鬼神之露光處是昭明其氣蒸上處是焄蒿使人精神竦動處淳錄作閃處是悽愴如武帝致李夫人其風肅然是也淳錄云問鬼夜出如何曰間有然者亦不能皆然夜屬陰妖鳥陰類亦多夜鳴又問草木土石有魄而無魂否曰淳錄云此不可以魂魄論易言精氣為物若以精氣言則是有精氣者方有魂魄但出底氣便是魂精便是魄譬如燒香燒得出來底汁子便是魄那成煙後香底便是魂淳錄云漿便是魄煙便是魂魂者魄之光燄魄者魂之根蒂安卿問體與魂有分別如耳目是體聰明便是魄曰是魂者氣之神魄者體之神淮南子注謂魂陽神也魄陰神也此語說得好安卿問心之精爽是謂魂魄曰只是此意又問人生始化曰魄如何是始化曰是胎中初略略成形時又問哉生魄曰是月十六日初生那黑處揚子言月未望而生魄於西既望則終魄於東他錯說了後來四子費盡氣力去解轉不分明溫公又於正文改一字解也說不出義剛淳錄同問以功用謂之鬼神以妙用謂之神曰鬼神只是往來屈伸功用只是論發見者所謂神也者妙萬物而為言妙處即是神其發見而見於功用者謂之鬼神至於不測者則謂之神如鬼神者造化之跡鬼神者二氣之良能二說皆妙所謂造化之跡者就人言之亦造化之跡也其生也氣日至而滋息物生既盈氣日反而游散便是鬼神所謂二氣良能者鬼神只是以陰陽言又分言之則鬼是陰神是陽大率往為陰來為陽屈為陰伸為陽無一物無往來屈伸之義便皆鬼神著見者也又問齊明盛服以承祭祀卻如何曰亦只是此往來屈伸之氣古人到祭祀處便是招呼得來如天地山川先祖皆不可以形求卻是以此誠意求之其氣便聚又問祖先已死以何而求曰其氣亦自在只是以我之氣承接其氣才致精神以求之便來格便有來底道理古人於祭祀處極重直是要求得之商人求諸陽便先作樂發散在此之陽氣以求之周人求諸陰便焚燎鬱鬯以陰靜去求之徐元震問中庸體物而不可遺曰所謂體物不可遺者蓋此理於人初不相離萬物皆體之究其極只是陰陽造化而已故太極圖言大哉易乎只以陰陽剛柔仁義及言原始反終故知死生之說而止人之生死亦只是陰陽二氣屈伸往來耳符兄問以性情言之謂之乾曰是他天一箇性情如此火之性情則是箇熱水之性情則是箇寒天之性情則是一箇健健故不息惟健乃能不息其理是自然如此使天有一時息則地須落下去人都墜死緣他運轉周流無一時息故局得這地在中間今只於地信得他是斷然不息蓋卿方子錄云天惟健故不息不可把不息做健下同問乾者天之性情健而無息之謂乾何以合性情言之曰性情二字常相參在此情便是性之發非性何以有情健而不息非性何以能此僩乾者天之性情指理而言也謂之性情該體用動靜而言也端蒙問乾者天之性情曰此是以乾之剛健取義健而不息便是天之性情此性如人之氣質健之體便是天之性健之用便是天之情靜也專便是性動也直便是情問乾者天之性情曰此只是論其性體之健靜專是性動直是情大抵乾健雖靜時亦專到動時便行之以直坤主順只是翕闢謂如一箇剛健底人雖在此靜坐亦專一而有箇作用底意思只待去作用到得動時其直可知若一柔順人坐時便只恁地靜坐收斂全無個營為底意思其動也只是闢而已又問如此則乾雖靜時亦有動意否曰然問乾坤天地之性情性是性情是情何故兼言之曰乾健也動靜皆健坤順也動靜皆順靜是性動是情淳乾坤是性情天地是皮殼其實只是一箇道理陰陽自一氣言之只是箇物若作兩箇物看則如日月如男女又是兩箇物事學蒙方子錄云天地形而下者天地乾坤之皮殼乾坤天地之性情問以乾字為伏羲之文元享利貞為文王之文固是不知履虎尾同人於野亨之類又何如曰此恐是少了字或是就上字立辭皆不可攷有羅田宰吳仁傑云恐都剩了字如乾坤之類皆剩了問若乾坤則猶可言屯蒙之類若無卦名不知其為何卦曰他說卦畫便是名了恐只是欠了字底是榦以下乾卦元亨利貞在這裏都具了楊宗範卻說元亨屬陽利貞屬陰此卻不是乾之利貞是陽中之陰坤之元亨是陰中之陽乾後三畫是陰坤前三畫是陽淵文王本說元亨利貞為大亨利正夫子以為四德梅长初生為元開花為亨結子為利成熟為貞物生為元長為亨成而未全為利成熟為貞節致道問元亨利貞曰元是未通底亨利是收未成底貞是已成底譬如春夏秋冬冬夏便是陰陽極處其間春秋便是過接處恪乾之四德元譬之則人之首也手足之運動則有亨底意思利則配之胸臟貞則元氣之所藏也又曰以五臟配之尤明白且如肝屬木木便是元心屬火火便是亨肺屬金金便是利腎屬水水便是貞道夫元亨利貞譬諸穀可見穀之生萌芽是元苖是亨穟是利成實是貞穀之實又復能生循環無窮德明元亨利貞理也有這四段氣也有這四段理便在氣中兩箇不曾相離若是說時則有那未涉於氣底四德要就氣上看也得所以伊川說元者物之始亨者物之遂利者物之實貞者物之成這雖是就氣上說然理便在其中伊川這說話改不得謂是有氣則理便具所以伊川只恁地說便可見得物裏面便有這理若要親切莫若只就自家身上看惻隱須有惻隱底根子羞惡須有羞惡底根子這便是仁義仁義禮智便是元亨利貞孟子所以只得恁地說更無說處仁義禮智似一箇包子裏面合下都具了一理渾然非有先後元亨利貞便是如此不是說道有元之時有亨之時淵元亨利貞無斷處貞了又元今日子時前便是昨日亥時物有夏秋冬生底是到這裏方感得生氣他自有箇小小元亨利貞淵氣無始無終且從元處說起元之前又是貞了如子時是今日子之前又是昨日之亥無空闕時然天地間有箇局定底如四方是也有箇推行底如四時是也理都如此元亨利貞只就物上看亦分明所以有此物便是有此氣所以有此氣便是有此理故易傳只說元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成不說氣只說物者言物則氣與理皆在其中伊川所說四句自動不得只為遂字成字說不盡故某略添字說盡高以天道言之為元亨利貞以四時言之為春夏秋冬以人道言之為仁義禮智以氣候言之為溫涼燥濕以四方言之為東西南北節溫底是元熱底是亨涼底是利寒底是貞節四德之元猶五常之仁偏言則一事專言則包四者此段只於易元者善之長與論語言仁處看若天下之動貞夫一者也則貞又包四者周易一書只說一箇利則利又大也元者善之長也善之首也亨者嘉之會也好底會聚也義者宜也宜即義也萬物各得其所義之合也幹事事之骨也猶言體物也看此一段須與太極圖通看四德之元安在甚處剝之為卦在甚處乾天也一段在甚處方能通成一片不然則不貫通少間看得如此了猶未是受用處在賀孫光祖問四德之元猶五常之仁偏言則一事專言則包四者曰元是初發生出來生後方會通通後方始向成利者物之遂方是六七分到貞處方是十分成此偏言也然發生中已具後許多道理此專言也惻隱是仁之端羞惡是義之端辭遜是禮之端是非是智之端若無惻隱便都沒下許多到羞惡也是仁發在羞惡上到辭遜也是仁發在辭遜上到是非也是仁發在是非上問這猶金木水火否曰然仁是木禮是火義是金智是水賀孫曾兄亦問此答曰元者乃天地生物之端乾言大哉乾元萬物資始至哉坤元萬物資生乃知元者天地生物之端倪也元者生意在亨則生意之長在利則生意之遂在貞則生意之成若言仁便是這意思仁本生意乃惻隱之心也苟傷著這生意則惻隱之心便發若羞惡也是仁去那義上發若辭遜也是仁去那禮上發若是非也是仁去那智上發若不仁之人安得更有義禮智卓元亨利貞其發見有次序仁義禮智在裏面自有次序到發見時隨感而動卻無次序淵周貴卿問元亨利貞以此四者分配四時卻如何云乾之德也曰他當初只是說大亨利於正不以分配四時孔子見此四字好後始分作四件說孔子之易與文王之易略自不同義剛問道鄉謂四德之中各具四德竊嘗思之謂之各具四德如康節所謂春之春春之夏春之秋春之冬夏之春夏之夏夏之秋夏之冬則可謂之能迭相統攝如春可以包夏夏亦可以包春則不可也先生復令舉似道鄉之說曰便是他不須得恁地說道夫問元亨利貞乾之四德仁義禮智人之四德然亨卻是禮次序卻不同何也曰此仁禮義智猶言春夏秋冬也仁義禮智猶言春秋夏冬也因問李子思易說曰他是胡說因問或云先生許其說乾坤二卦本於誠敬果否曰就他說中此條稍是但渠只是以乾卦說修辭立其誠閉邪存其誠坤卦說敬以直內便說是誠敬爾銖云恐渠亦未曾實識得誠敬曰固是且謾說耳銖論乾之四德曰貞取以配冬者以其固也孟子以知斯二者弗去為知之實弗去之說乃貞固之意彼知亦配冬也壯祖言四德云不有其功常久而不已者也不有其功言化育之無跡處為貞因言貞於五常為智孟子曰知斯二者弗去是也既知又曰弗去有兩義又文言訓正固又於四時為冬冬有始終之義王氏亦云腎有兩有龜有蛇所以朔易亦猶貞也又傳曰貞各稱其事方問乾元亨利貞注云見陽之性健而成形之大者為天故三奇之卦名之曰乾而擬之於天也竊謂卦辭未見取象之意其成形之大者為天及擬之於天二句恐當於大象言之下文天之象皆不易一句亦然坤卦放此曰纔設此卦時便有此象了故於此豫言之又後面卦辭亦有兼象說者故不得不豫言也榦或問乾卦是聖人之事坤卦是學者之事如何曰也未見得初九九二是聖人之德至九三九四又卻說學者修業進德事如何都把做聖人之事得學履或言乾之六爻其位雖不同而其為德則一曰某未要人看易這箇都難說如乾卦他爻皆可作自家身上說惟九二九五要作自家說不得兩箇利見大人向來人都說不通九二有甚麼形影如何教見大人某看來易本卜筮之書占得九二便可見大人大人不必說人君也賀孫其他爻象占者當之惟九二見龍人當不得所以只當把爻做主占者做客大人即是見龍又如九三不說龍亦不可曉若說龍時這亦是龍之在那亢旱處他所以說君子乾乾夕惕只此意淵占者當不得見龍飛龍則占者為客利去見那大人大人即九二九五之德見龍飛龍是也若郏龍君子則占者自當之矣淵利見大人與程傳說不同不是卦爻自相利見乃是占者利去見大人也須看自家占底是何人方說得那所利見之人淵問程易於九二云利見大德之君又言君亦利見大德之臣以成其功天下亦利見大德之人以被其澤於九五云利見在下大德之人又言天下固利見大德之君兩爻互言如此不審的何所指曰此當以所占之人之德觀之若己是有九二之德占得此九二爻則為利見九五大德之君若常人無九二之德者占得之則為只利見此九二之大人耳己為九五之君而有九五之德占得此九五爻則為利見九二大德之人若九二之人占得之則為利見此九五大德之君各隨所占之人以爻與占者相為主賓也太祖一日問王昭素曰九五飛龍在天利見大人常人何可占得此卦昭素曰何害若臣等占得則陛下是飛龍在天臣等利見大人是利見陛下也此說得最好銖曰如此看來易多是假借虛設故用不窮人人皆用得也曰此所謂理定既實事來尚虛存體應用稽實待虛所以三百八十四爻而天下萬事無不可該無不周遍此易之用所以不窮也銖問九三不言象何也曰九三陽剛不中居下之上有強力勞苦之象不可言龍故特指言乾乾惕若而已言有乾乾惕厲之象也銖君子終日乾乾矣至夕猶檢點而惕然恐懼蓋凡所以如此者皆所以進德修業耳銖竇問君子終日乾乾是法天否曰才說法天便添著一件事君子只是終日乾乾天之行健不息往往亦只如此如言存箇天理不須問如何存他只是去了人欲天理自然存如顏子問仁夫子告以非禮勿視聽言動除卻此四者更有何物須是仁德明厲無咎是一句他後面有此例如頻復厲無咎是也淵問乾九三伊川云雖言聖人事苟不設戒何以為教淵錄云發得此意極好僩錄云竊意因時而惕雖聖人亦常有此心曰易之為書廣大悉備人皆可得而用初無聖賢之別伊川有一段云君有君之用臣有臣之用說得好及到逐卦解釋又卻分作聖人之卦賢人之卦更有分作守令之卦者古者又何嘗有此不知是如何以某觀之無問聖人以至士庶但當此時便當恁地兢惕卜得此爻也當恁地兢惕砥僩錄同祖道舉乾九三君子終日乾乾是君子進德不懈不敢須臾寧否曰程子云在下之人君德已著此語亦是拘了記得有人問程子胡安定以九四爻為太子者程子笑之曰如此三百八十四爻只做得三百八十四件事了此說極是及到程子解易卻又拘了要知此是通上下而言在君有君之用臣有臣之用父有父之用子有子之用以至事物莫不皆然若如程子之說則千百年間只有箇舜禹用得也大抵九三一爻才剛而位危故須著乾乾夕惕若厲方可無咎若九二則以剛居中位易處了故凡剛而處危疑之地皆當乾乾夕惕若厲則無咎也祖道淵與天不爭多淵是那空虛無實底之物躍是那不著地了兩腳跳上去底意思淵或躍在淵淵是通處淵雖下於田田卻是箇平地淵則通上下一躍即飛在天問胡安定將乾九四為儲君曰易不可恁地看易只是古人卜筮之書如五雖主君位而言然亦有不可專主君位言者天下事有那一箇道理自然是有若只將乾九四為儲位說則古人未立太子者不成是虛卻此一爻如一爻只主一事則易三百八十四爻乃止三百八十四件事去偽問程易以乾之初九為舜側微時九二為舜佃漁時九三為玄德升聞時九四為歷試時何以見得曰此是推說爻象之意非本指也讀易若通得本指後便儘說去儘有道理可言敢問本指曰易本因卜筮而有象因象而有占占辭中便有道理如筮得乾之初九初陽在下未可施用其象為潛龍其占曰勿用凡遇乾而得此爻者當觀此象而玩其占隱晦而勿用可也它皆倣此此易之本指也蓋潛龍則勿用此便是道理故聖人為彖辭象辭文言節節推去無限道理此程易所以推說得無窮然非易本義也先通得易本指後道理儘無窮推說不妨若便以所推說者去解易則失易之本指矣銖問易傳乾卦引舜事以證之當初若逐卦引得這般事來證大好看曰便是當時不曾計會得久之曰經解說潔淨精微易之教也不知是誰做伊川卻不以為然據某看此語自說得好蓋易之書誠然是潔淨精微他那句語都是懸空說在這裏都不犯手如伊川說得都犯手勢引舜來做乾卦乾又那裏有箇舜來當初聖人作易又何嘗說乾是舜他只是懸空說在這裏都被人說得來事多失了他潔淨精微之意易只是說箇象是如此何嘗有實事如春秋便句句是實如言公即位便真箇有箇公即位如言子弒父臣弒君便真箇是有此事易何嘗如此不過只是因畫以明象因數以推數因這象數便推箇吉凶以示人而已都無後來許多勞攘說話僩問龜山說九五飛龍在天取飛字為義以天位言之不可階而升以聖學言之非力行而至曰此亦未盡乾卦自是聖人之天德只時與位有隱顯漸次耳德明凡占得卦爻要在互分賓主各據地位而推如九五飛龍在天利見大人若揣自己有大人之德占得此爻則如聖人作而萬物咸睹作之者在我而睹之者在彼我為主而彼為賓也自己無大人之德占得此爻則利見彼之大人作之者在彼而睹之者在我我為賓而彼為主也僩用九不用七且如得純乾卦皆七數這卻是不變底它未當得九未在這爻裏面所以只占上面彖辭用九蓋是說變淵見群龍無首王弼伊川皆解不成他是不見得那用九用六之說淵問乾坤獨言用九用六何也曰此惟歐公說得是此二卦純陽純陰而居諸卦之首故於此發此一例凡占法皆用變爻占故凡占得陽爻者皆用九而不用七百九十二陽爻之通例也占得陰爻者皆用六而不用八百九十二陰爻之通例也蓋七為少陽九為老陽六為老陰八為少陰老變而少不變凡占用九用六者用其變爻占也此揲蓍之法遇乾而六爻皆變則為陰故有群龍無首之象即坤利牝馬之貞也言群龍而卻無頭剛而能柔則吉也遇坤而六爻皆變則為陽故有利永貞之象即乾之元亨利貞也此發凡之言因問坤體貞靜承天而行未嘗為始而常代終故自坤而變陽故為群龍而無首有利貞而無元亨是否曰坤雖變而為陽然坤性依舊在他本是個無頭底物如婦從夫臣從君地承天先迷後得東北喪朋西南得朋皆是無頭處也銖問用九見群龍無首吉伊川之意似云用陽剛以為天下先則凶無首則吉曰凡說文字須有情理方是用九當如歐公說方有情理某解易所以不敢同伊川便是有這般處看來當以見群龍無首為句蓋六陽已盛如群龍然龍之剛猛在首故見其無首則吉大意只是要剛而能柔自人君以至士庶皆須如此若說為天下先便只是人主方用得以下便使不得恐不如此又曰如歐說蓋為卜筮言所以須著有用九用六若如伊川說便無此也得礪乾吉在無首坤利在永貞這只說二用變卦乾吉在無首言卦之本體元是六龍今變為陰頭面雖變渾身卻只是龍只一似無頭底相似坤利在永貞不知有何關捩子這坤卻不得見他元亨只得他永貞坤之本卦固自有元亨變卦卻無淵群龍無首便是利牝馬者為不利牡而卻利牝如西南得朋東北喪朋皆是無頭底淵伯豐問乾用九爻辭如何便是坤先迷後得東北喪朋之意曰此只是無首所以言利牝馬之貞無牡馬大凡人文字皆不可忽歐公文字尋常往往不以經旨取之至於說用九用六自來卻未曾有人說得如此他初非理會象數者而此論最得之且既有六爻又添用九用六因甚不用七八蓋九乃老陽六乃老陰取變爻也古人遇乾之坤即以見群龍無首吉為占見群龍無首卻是變乾為坤便以坤為占也遇坤之乾即用利永貞為占坤變為乾即乾之利也問天地生物氣象如溫厚和粹即天地生物之仁否曰這是從生處說來如所謂大哉乾元萬物資始至哉坤元萬物資生那元字便是生物之仁資始是得其氣資生是成其形到得亨便是他彰著利便是結聚貞便是收斂既無形跡又須復生至如夜半子時此物雖存猶未動在到寅卯便生巳午便著申酉便結亥子丑便實及至寅又生他這箇只管運轉一歲有一歲之運一月有一月之運一日有一日之運一時有一時之運雖一息之微亦有四箇段子恁地運轉但元只是始初未至於著如所謂怵惕惻隱存於人心自恁惻惻地未至大段發出道夫曰他所以謂滿腔子是惻隱之心蓋以其未散也曰他這箇是事事充滿如惻隱則皆是惻隱羞惡則皆是羞惡辭遜是非則皆是辭遜是非初無不充滿處但人為己私所隔故多空虛處爾道夫大哉乾元是說天道流行各正性命是說人得這道理做那性命處卻不是正說性如天命之謂性孟子道性善便是就人身上說性易之所言卻是說天人相接處淵乾元統天蓋天只是以形體而言乾元即天之所以為天者也猶言性統形爾端蒙問乾元統天曰乾只是天之性情不是兩箇物事如人之精神豈可謂人自是人精神自是精神燾問乾元統天注作健者能用形者也恐說得是否曰也是然只是說得乾健不見得是乾元蓋云大哉乾元萬物資始乃統天則大意主在元字上學履前輩解經有只明大義務欲大指明而有不貼文義強說者如程易發明道理大義極精只於易文義多有強說不通處銖因問程易說大明天道之終始則見卦之六位各以時成不知是說聖人明之耶說乾道明之耶曰此處果是說得鶻突但遺書有一段明說云人能明天道之終始則見卦爻六位皆以時成此語證之可見大明者指人能明之也因問乾道終始如何曰乾道終始即四德也始則元終則貞蓋不終則無以為始不貞則無以為元六爻之立由此而立耳以時成者言各以其時而成如潛見飛躍皆以時耳然皆四德之流行也初九九二之半即所謂元九二之半與九三即所謂亨九四與九五之半即所謂利九五之半與上九即所謂貞蓋聖人大明乾道之終始故見六位各以時成乘此六爻之時以當天運而四德之所以終而復始應變而不窮也銖大明終始是就人上說楊遵道錄中言人能大明乾道之終始易傳卻無人字某謂文字疑似處須下語剖析教分曉方子乘字大概只是譬喻御字龜山說做御馬之御卻恐傷於太巧這段是古人長連地說下去卻不分曉伊川傳說得也不分曉語錄中有一段卻分曉乃是楊遵道所錄云人大明天道之終始這處下箇人字是緊切底字讀書須是看這般處淵時乘六龍以御天六龍只是六爻龍只是譬喻明此六爻之義潛見飛躍以時而動便是乘六龍便是御天又曰聖人便是天天便是聖人礪大明終始這一段說聖人之元亨六位六龍只與譬喻相似聖人之六位如隱顯進退行藏潛龍時便當隱去見龍時便是他出來如孔子為魯司寇時便是他大故顯了到那獲麟絕筆便是他亢龍時這是在下之聖人然這卦大概是說那聖人得位底若使聖人在下亦自有箇元亨利貞如首出庶物不必在上方如此如孔子出類拔萃便是首出萬物著書立言澤及後世便是萬國咸寧淵問大哉乾元萬物資始乃統天是說乾之元雲行雨施品物流行是說乾之亨大明終始六位時成時乘六龍以御天是說聖人之元亨乾道變化各正性命保合大和乃利貞是說乾之利貞首出庶物萬國咸寧是說聖人之利貞此本義之言但程易云首出庶物是乾道首出庶物而萬彙亨萬國咸寧是君道尊臨天位而四海從言王者體天之道則萬國咸寧如何曰恁地說也得只恐牽強銖乾道變化似是再說元亨變化字且只大概恁地說不比繫辭所說底子細各正性命他那元亨時雖正了然未成形質到這裏方成如那百穀堅實了方喚做正性命乾道是統說底四德是說他做出來底大率天地是那有形了重濁底乾坤是他性情其實乾道天德互換一般乾道又言得深些子天地是形而下者只是這箇道理天地是箇皮殼淵乾道便只是天德不消分別乾道變化是就乾道上說天德是就他四德上說淵問何謂各正性命曰各得其性命之正節問保合大和乃利貞曰天之生物莫不各有軀殼如人之有體果實之有皮核有箇軀殼保合以全之能保合則真性常存生生不窮如一粒之穀外面有箇殼以裹之方其發一萌芽之始是物之元也及其抽枝長葉只是物之亨到得生實欲熟未熟之際此便是利及其既實而堅此便是貞矣蓋乾道變化發生之始此是元也各正性命小以遂其小大以遂其大則是亨矣能保合矣全其大和之性則可利貞卓保合大和天地萬物皆然天地便是大底萬物萬物便是小底天地文蔚問首出庶物萬國咸寧恐盡是聖人事伊川分作乾道君道如何曰乾道變化至乃利貞是天饒錄作乾首出庶物萬國咸寧是聖人又曰首出庶物須是聰明睿知高出庶物之上以君天下方得萬國咸寧禮記云聰明睿知足以有臨也須聰明睿知皆過於天下之人方可臨得他礪乾重卦上下皆乾不可言兩天昨日行一天也今日又行亦一天也其實一天而行健不已有重天之象此所以為天行健坤重卦上下皆坤不可言兩地地平則不見其順必其高下層層有重地之象此所以為地勢坤一作所以見地勢之坤順天之運轉不窮所以為天行健季札厚之問健足以形容乾否曰可伊川曰健而無息謂之乾蓋自人而言固有一時之健有一日之健惟無息乃天之健可學問天行健曰胡安定說得好其說曰天者乾之形乾者天之用天形蒼然南極入地下三十六度北極出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里人一呼一吸為一息一息之間天行已八十餘里人一晝一夜有萬三千六百餘息故天行九十餘萬里天之行健可知故君子法之以自強不息云因言天之氣運轉不息故閣得地在中間銖未達先生曰如弄碗珠底只恁運轉不住故在空中不墜少有息則墜矣銖問衛老疑問中天行健一段先生批問他云如何見得天之行健德明竊謂天以氣言之則一晝一夜周行乎三百六十度之中以理言之則於穆不已無間容息豈不是至健先生曰他卻不是如此只管去自強不息上討又說邠老社倉宜避去事舉易之否象曰君子以儉德避難不可榮以祿德明問天運不息君子以自強不息曰非是說天運不息自家去趕逐也要學他如此不息只是常存得此心則天理常行而周流不息矣又曰天運不息非特四時為然雖一日一時頃刻之間其運未嘗息也燾因說乾健曰而今人只是坐時便見他健不健了不待做事而後見也又曰某人所記劉元城每與人相見終坐不甚交談欲起屢留之然終不交談或問之元城曰人坐久必傾側久坐而不傾側必貴人也故觀人之坐起可以知人之貴賤某後來見草堂先生說又不如此元城極愛說話觀草堂之說與某人所記之語大抵皆同多言其平生所履與行己立身之方是時元城在南京恣口極談無所顧忌南京四方之衝東南士大夫往來者無不見之賓客填門無不延接其死之時去靖康之禍只三四年間耳元城與了齋死同時不知二公若留到靖康當時若用之何以處也僩易只消認他經中七段乾坤二卦分外多了一段認得這箇子向後面底不大故費解說淵致道問元者善之長曰元亨利貞皆善也而元乃為四者之長是善端初發見處也時舉易言元者善之長說最親切無滲漏仁義禮智莫非善這箇卻是善之長仁是有滋味底物事說做知覺時知覺卻是無滋味底物事仁則有所屬如孝弟慈和柔愛皆屬仁淵元者善之長春秋傳記穆姜所誦之語謂元者體之長覺得體字較好是一體之長也僩亨者嘉之會亨是萬物亨通到此界分無一物不美便是嘉之會問亨者嘉之會曰此處難下語且以草木言之發生到夏時好處都來湊會嘉只是好處會是期會也又曰貞固是固得恰好如尾生之信是不貞之固須固得好方是貞賜問亨者嘉之會曰春天萬物發生未大故齊到夏一時發生都齊旺許多好物皆萃聚在這裏便是嘉之會曰在人言之則如何曰動容周旋皆中禮便是嘉之會嘉會足以合禮須是嘉其會始得淳亨者嘉之會嘉會足以合禮蓋言萬物各有好時然到此亨之時皆盛大長茂無不好者故曰嘉之會會是會集之義也人之修為便處處皆要好不特是只要一處好而已須是動容周還皆中乎禮可也故曰嘉會嘉其所會也燾問亨者嘉之會曰嘉是美會是聚無不盡美處是亨蓋自春至夏便是萬物暢茂物皆豐盈咸遂其美然若只一物如此他物不如此又不可以為會須是合聚來皆如此方謂之會如嘉會足以合禮則自上文體仁而言謂君子嘉其會此嘉字說得輕又不當如前說此只是嘉其所會此嘉字當若文之以禮樂之文字蓋禮樂之文則文字為重到得文之以禮樂便不同謂如在人若一言一行之美亦不足以為會直是事事皆盡美方可以為會都無私意方可以合禮利者義之和義疑於不和矣然處之而各得其所則和義之和處便是利利者義之和義是箇有界分斷制底物事疑於不和然使物各得其分不相侵越乃所以為和也僩義之和只是中節蓋義有箇分至如親其親長其長則是義之和如不親其親而親他人之親便不是和礪義之和處便是利如君臣父子各得其宜此便是義之和處安得謂之不利如君不君臣不臣父不父子不子此便是不和安得謂之利孔子所以罕言利者蓋不欲專以利為言恐人只管去利上求也去偽利者義之和所謂義者如父之為父子之為子君之為君臣之為臣各自有義然行得來如此和者豈不是利利字與不利字對如云利有攸往不利有攸往南升施問利者義之和曰義之分別似乎無情卻是要順乃和處蓋嚴肅之氣義也而萬物不得此不生乃是和又曰亨者嘉之會會聚也正是夏萬物一齊長時然上句嘉字重會字輕下句會字重嘉字輕可學利是那義裏面生出來底凡事處制得合宜利便隨之所以云利者義之和蓋是義便兼得利若只理會利卻是從中間半截做下去遺了上面一截義底小人只理會後面半截君子從頭來植問程子曰義安處便為利只是當然便安否曰是只萬物各得其分便是利君得其為君臣得其為臣父得其為父子得其為子何利如之這利字即易所謂利者義之和利便是義之和處程子當時此處解得亦未親切不似這語卻親切正好去解利者義之和句義初似不和卻和截然而不可犯似不和分別後萬物各止其所卻是和不和生於不義義則無不和和則無不利矣砥錄云義則和矣義則無不利矣然義其初截然近於不和不利其終則至於各得其宜云云貞者事之幹伊川說貞字只以為正恐未足以盡貞之義須是說正而固然亦未推得到知上看得來合是如此知是那默運事變底一件物事所以為事之幹淵正字不能盡貞之義須用連正固說其義方全正字也有固字意思但不分明終是欠闕正如孟子所謂知斯二者弗去是也知斯是正意弗去是固意賀孫易言貞字程子謂正字盡他未得有貞固之意榦問又有所謂不可貞者是如何曰也是這意思只是不可以為正而固守之榦體仁如體物相似人在那仁裏做骨子故謂之體仁仁是箇道理須著這人方體得他做得他骨子比而效之之說卻覺得未是淵體仁不是將仁來為我之體我之體便都是仁也僩問體仁解云以仁為體是如何曰說只得如此要自見得蓋謂身便是仁也學履問伊川解體仁作體乾之仁看來在乾為元在人為仁只應就人上說仁又解利物和義作合於義乃能利物亦恐倒說了此類恐皆未安曰然君子行此四德則體仁是君子之仁也但前輩之說不欲辨他不是只自曉得便了學履嘉會者萬物皆發見在裏許直卿云猶言萬物皆相見處得事事是故謂之嘉會一事不是便不謂之嘉會會是禮發見處意思卻在未發見之前利物使萬物各得其所乃是義之和處義自然和不是義外別討箇和方子嘉會雖是有禮後底事然這意思卻在禮之先嘉其所會時未說到那禮在然能如此則便能合禮利物時未說到和義在然能使物各得其利則便能和義會字說道是那萬物一齊發見處得他盡嘉會便是如只一事兩事嘉美時未為嘉會會字張葆光用齊字說說得幾句也好使物各得其宜何利如之如此便足以和義這利字是好底如孟子所謂戰國時利是不好底這箇利如那未有仁而遺其親未有義而後其君之利和字也有那老蘇所謂無利則義有慘殺而不和之意蓋於物不利則義未和淵問利物足以和義曰義斷是非別曲直近於不和然是非曲直辨則便是利此乃是和處也時舉利物足以和義凡說義各有分別如君臣父子夫婦兄弟之義自不同似不和然而各正其分各得其理便是順利便是和處事物莫不皆然人傑問利物足以和義曰義便有分別當其分別之時覺得來不和及其分別得各得其所使物物皆利卻是和其義如天之生物物物有箇分別如君君臣臣父父子子至君得其所以為君臣得其所以為臣父得其所以為父子得其所以為子各得其利便是和若君處臣位臣處君位安得和乎又問覺得於上句字義顛倒曰惟其利於物者所以和其義耳正淳問貞固字卻與上文體仁嘉會利物亦似不同曰亦是比方便須用兩字方說得盡伊川說利物足以和義覺見他說得糊塗如何喚做和合於義四句都說不力淵利物足以和義此數句最難看老蘇論此謂慘殺為義必以利和之如武王伐紂義也若徒義則不足以得天下之心必散財發粟而後可以和其義若如此說則義在利之外分截成兩段了看來義之為義只是一箇宜其初則甚嚴如男正位乎外女正位乎內直是有內外之辨君尊於上臣恭於下尊卑大小截然不可犯似若不和之甚然能使之各得其宜則其和也孰大於是至於天地萬物無不得其所亦只是利之和爾此只是就義中便有一個和既曰利者義之和卻說利物足以和義蓋不如此不足以和其義也嘉會足以合禮嘉美也會是集齊底意思許多嘉美一時鬥湊到此故謂之會亨屬夏如春生之物自是或先或後或長或短未能齊整纔到夏便各各一時茂盛此所謂嘉之會也嘉其所會便動容周旋無不中禮就亨者嘉之會觀之嘉字是實會字是虛嘉會足以合禮則嘉字卻輕會字卻重貞固足以幹事幹如木之幹事如木之枝葉貞固者正而固守之貞固在事是與做箇骨子所以為事之幹欲為事而非此貞固便植立不起自然倒了謨問文言四德一段曰元者善之長以下四句說天德之自然君子體仁足以長人以下四句說人事之當然元只是善之長萬物生理皆始於此眾善百行皆統於此故於時為春於人為仁亨是嘉之會此句自來說者多不明嘉美也會猶齊也嘉會眾美之會猶言齊好也春天發生萬物未大故齊到夏時洪纖高下各各暢茂蓋春方生育至此乃無一物不暢茂其在人則禮儀三百威儀三千事事物物大大小小一齊到恰好處所謂動容周旋皆中禮故於時為夏於人為禮周子遂喚作中利者為義之和萬物至此各遂其性事理至此無不得宜故於時為秋於人為義貞者乃事之幹萬物至此收歛成實事理至此無不的正故於時為冬於人為智此天德之自然其在君子所當從事於此者則必體仁乃足以長人嘉會足以合禮利物足以和義貞固足以幹事此四句倒用上面四箇字極有力體者以仁為體仁為我之骨我以之為體仁皆從我發出故無物不在所愛所以能長人嘉會足以合禮者言須是美其所會也欲其所會之美當美其所會蓋其厚薄親疏尊卑小大相接之體各有節文無不中節即所會皆美所以能合於禮也利物足以和義者使物物各得其利則義無不和蓋義是斷制裁割底物若似不和然惟義能使事物各得其宜不相妨害自無乖戾而各得其分之和所以為義之和也蘇氏說利者義之和卻說義慘殺而不和不可徒義須著些利則和如此則義是一物利又是一物義是苦物恐人嫌須著些利令甜此不知義之言也義中自有利使人而皆義則不遺其親不後其君自無不利非和而何貞固足以幹事貞正也知其正之所在固守而不去故足以為事之幹幹事言事之所依以立蓋正而能固萬事依此而立在人則是智至靈至明是是非非確然不可移易不可欺瞞所以能立事也幹如板築之有楨幹今人築牆必立一木於土中為骨俗謂之夜叉木無此則不可築橫曰楨直曰幹無是非之心非知也知得是是非非之正緊固確守不可移易故曰知周子則謂之正也銖故曰乾元亨利貞他把乾字當君子淵
