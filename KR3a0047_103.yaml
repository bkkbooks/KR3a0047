body:
  text: 朱子語類卷第一百三羅氏門人李願中李先生終日危坐而神彩精明略無隤墮之氣升卿延平先生氣象好振問延平先生言行曰他卻不曾著書充養得極好凡為學也不過是恁地涵養將去初無異義只是先生睟面盎背自然不可及驤李延平初間也是豪邁底人到後來也是磨琢之功在鄉若不異於常人鄉曲以上底人只道他是箇善人他也略不與人說待問了方與說賀孫李先生少年豪勇夜醉馳馬數里而歸後來養成徐緩雖行二三里路常委蛇緩步如從容室中也問先生如何養曰先生只是潛養思索方人性褊急發不中節者當於平日言語動作間以緩持之持之久則心中所發自有條理因說李先生行郊外緩步委蛇如在室中不計其遠嘗隨至人家才相見便都看了壁上碑文先生俟茶罷即起向壁立看看了一廳碑又移步向次壁看看畢就坐其所持專一詳緩如此初性甚急後來養成至於是也方行夫問李先生謂常存此心勿為事物所勝先生答之云云頃之復曰李先生涵養得自是別真所謂不為事物所勝者古人云終日無疾言遽色他真箇是如此如尋常人去近處必徐行出遠處行必稍急先生出近處也如此出遠處亦只如此尋常人湙一人湙之一二聲不至則聲必厲先生湙之不至聲不加於前也又如坐處壁間有字某每常亦須起頭一看若先生則不然方其坐時固不看也若是欲看則必起就壁下視之其不為事物所勝大率若此常聞先生後生時極豪邁一飲必數十杯醉則好馳馬一驟三二十里不回後來卻收拾得恁地純粹所以難及道夫李先生居處有常不作費力事所居狹隘屋宇卑小及子弟漸長逐間接起又接起廳屋亦有小書室然甚齊整瀟灑安物皆有常處其制行不異於人亦常為任希純教授延入學作職事居常無甚異同頽如也真得龜山法門亦嘗議龜山之失方李延平不著書不作文頽然若一田夫野老然又太和順了羅仲素衣服之類亦日有定程如黃昏如何服睡復易然太執揚李先生好看論語自明而已謂孟子早是說得好了使人愛看了也其居在山間亦殊無文字看讀辨正更愛看春秋左氏初學於仲素只看經後侯師聖來沙縣羅邀之至問伊川如何看云亦看左氏要見曲折故始看左氏方或問近見廖子晦言今年見先生問延平先生靜坐之說先生頗不以為然不知如何曰這事難說靜坐理會道理自不妨只是討要靜坐則不可理會得道理明透自然是靜今人都是討靜坐以省事則不可嘗見李先生說舊見羅先生說春秋頗覺不甚好不知到羅浮靜極後又理會得如何是時羅已死某心常疑之以今觀之是如此蓋心下熱鬧如何看得道理出須是靜方看得出所謂靜坐只是打疊得心下無事則道理始出道理既出則心下愈明靜矣僩舊見李先生云初問羅先生學春秋覺說得自好後看胡文定春秋方知其說有未安處又云不知後來到羅浮山中靜極後見得又如何某頗疑此說以為春秋與靜字不相干何故須是靜處方得工夫長進後來方覺得這話好蓋義理自有著力看不出處然此亦是後面事初間亦須用力去理會始得若只靠著靜後聽他自長進便卻不得然為學自有許多階級不可不知也如某許多文字便覺得有箇喫力處尚有這些病在若還更得數年不知又如何幹李先生云看聖賢言語但一踔看過便見道理者卻是真意思才著心去看便蹉過了多升卿正蒙知言之類學者更須被他汩沒李先生極不要人傳寫文字及看此等舊嘗看正蒙李甚不許然李終是短於辨論邪正蓋皆不可無也無之即是少博學詳說工夫也方李先生云橫渠說不須看非是不是只是恐先入了費力方李問陳幾叟借得文定傳本用薄紙真謹寫一部易傳亦然方李先生云書不要點看得更好方李先生說一步是一步如說仁者其言也訒某當時為之語云聖人如天覆萬物云云李曰不要如是廣說須窮其言也訒前頭如何要得一進步處方李先生不要人強行須有見得處方行所謂灑然處然猶有偏在灑落而行固好未到灑落處不成不行亦須按本行之待其著察方李先生當時說學已有許多意思只為說敬字不分明所以許多時無捉摸處方李先生說人心中大段惡念卻易制伏最是那不大段計利害乍往乍來底念慮相續不斷難為驅除今看得來是如此廣李先生嘗云人之念慮若是於顯然過惡萌動此卻易見易除卻怕於相似間底事爆起來纏繞思念將去不能除此尤害事某向來亦是如此賀孫必有事焉由此可至君子三變改過遷善由此可至所過者化李先生說方李先生言事雖紛紛須還我處置方李先生有為只用蠱卦但有決裂處方李先生云天下事道理多如子瞻才智高亦或窺得然其得處便有病也方問先生所作李先生行狀云終日危坐以驗夫喜怒哀樂之前氣象為如何而求所謂中者與伊川之說若不相似曰這處是舊日下得語太重今以伊川之語格之則其下工夫處亦是有些子偏只是被李先生靜得極了便自見得是有箇覺處不似別人今終日危坐只是且收斂在此勝如奔馳若一向如此又似坐禪入定賀孫或問延平先生何故驗於喜怒哀樂未發之前而求所謂中曰只是要見氣象陳後之曰持守良久亦可見未發氣象曰延平即是此意若一向這裏又差從釋氏去淳問延平欲於未發之前觀其氣象此與楊氏體驗於未發之前者異同如何曰這箇亦有些病那體驗字是有箇思量了便是已發若觀時恁著意看便也是已發問此體驗是著意觀只恁平常否曰此亦是以不觀觀之淳再論李先生之學常在目前先生曰只是君子戒慎所不睹恐懼所不聞便自然常存顏子非禮勿視聽言動正是如此德明胡氏門人張敬夫近日南軒書來不曾見說嘗讀某書有何新得今又與伯恭相聚往往打入多中去也方欽夫見識極高卻不耐事伯恭學耐事卻有病升卿南軒伯恭之學皆疏略南軒疏略從高處去伯恭疏略從卑處去伯恭說道理與作為自是兩件事如云仁義道德與度數刑政介然為兩塗不可相通他在時不曾見與某說他死後諸門人弟子此等議論方漸漸說出來乃云皆原於伯恭也僩欽夫說得高了故先生只要得典實平易方敬夫高明他將謂人都似他才一說時便更不問人曉會與否且要說盡他箇故他門人敏底秪學得他說話若資質不逮依舊無著摸某則性鈍說書極是辛苦故尋常與人言多不敢為高遠之論蓋為是身曾親經歷過故不敢以是責人爾學記曰進而不顧其安使人不由其誠今教者之病多是如此道夫學者於理有未至處切不可輕易與之說張敬夫為人明快每與學者說話一切傾倒說出此非不可但學者見未到這裏見他如此說便不復致思亦甚害事某則不然非是不與他說蓋不欲與學者以未至之理耳枅南軒嘗言遁悶工夫好做振南軒說端倪兩字極好此兩字卻自人欲中生出來人若無這些箇秉彝如何思量得要做好人輝或問南軒云行之至則知益明知既明則行益至此意如何曰道理固是如此學者工夫當並進不可推泥牽連下梢成兩下擔閣然二者都要用工則成就時二者自相資益矣銖王壬問南軒類聚言仁處先生何故不欲其如此曰便是工夫不可恁地如此則氣象促迫不好聖人說仁處固是緊要不成不說仁處皆無用亦須是從近看將去優柔玩味久之自有一箇會處方是工夫如博學審問慎思明辨篤行聖人須說博學如何不教人便從慎獨處做須是說禮儀三百威儀三千始得雉問先生舊與南軒反覆論仁後來畢竟合否曰亦有一二處未合敬夫說本出胡氏胡氏之說惟敬夫獨得之其餘門人皆不曉但云當守師之說向來往長沙正與敬夫辨此可學問南軒與先生書說性善者歎美之辭如何曰不必如此說善只是自然純粹之理今人多以善與惡對說便不是大凡人何嘗不願為好人而怕惡人輝問南軒謂動中見靜方識此心如何是動中見靜曰動中見靜便是程子所說艮止之意釋氏便言定聖人只言止宇録云此段文已詳了敬夫卻要將這箇為見天地之心復是靜中見動他又要動中見靜卻倒說了淳宇同問曾看南軒論語否曰雖嘗略看未之熟也曰南軒後來只修得此書如孟子竟無工夫改必大南軒論語初成書時先見後十篇一切寫去與他說後見前十篇又寫去後得書來謂說得是都改了孟子說不曾商量問南軒解子謂子産有君子之道四焉將孟子惠而不知為政立兩壁辨論非特於本旨為贅且使學者又生出一事曰欽夫最不可得聽人說話便肯改如論語舊說某與議論修來多是此類且如他向解顏淵克己復禮處須說要先格物然後克己某與說克己一事自始學至成德若未至從心所欲不踰矩從容中道時皆要克豈可與如此說定因作一戲語云譬如對先生長者聽其格言至論卻嫌他說得未盡云我更與他添些令盡彼當時聞此語即相從除卻先要格物一段不意今又添出自始學至成德皆要克一段此是某攻他病底藥病去則藥自不用可也今又更留取藥在卻是去得一病又留取一病在又如述而不作處他元說先云彼老彭者何人哉而反使吾夫子想像慕用某與說此譬如吾夫子前面致恭盡禮於人而吾輩乃奮怒攘臂於其後他聞說即改此類甚衆若孟子則未經修為人傳去印了彼亦自悔出仕後不曾看得文字未及修孟子而卒蓋其間有大段害事者如論性善處卻著一片說入太極來此類頗多大雅云此書卻好把與一般頽闒者看以作其喜學之意曰此亦呂伯恭教人看上蔡語録之意但既與他看了候他稍知趨嚮便與醫了則得大雅南軒語孟子嘗說他這文字不好看蓋解經不必做文字止合解釋得文字通則理自明意自足今多去上做文字少間說來說去只說得他自一片道理經意卻蹉過了要之經之於理亦猶傳之於經傳所以解經也既通其經則傳亦可無經所以明理也若曉得理則經雖無亦可嘗見一僧云今人解書如一盞酒本自好被這一人來添些水那一人來又添些水次第添來添去都淡了他禪家儘見得這樣只是他又忒無注解問陸氏之學恐將來亦無注解去曰他本只是禪幹問嘗看文字多是虛字上無緊要處最有道理若做文粗疏粗解這般意思卻恐都不見了曰然且如今說秉彝這箇道理卻在彝字上秉字下所以莊子謂批大郤導大窾便是道理都在空處如易中說觀其會通以行其典禮通便是空處行得去便是通會便是四邊合湊來處問莊子云聞解牛得養生如何可以養生曰只是順他道理去不假思慮不去傷著它便可以養生又曰不見全牛只是見得骨骼自開問莊子此意如何曰也是他見得箇道理如此問他本是絶滅道理如何有所見曰他也是就他道理中見得如此因歎曰天下道理各見得恁地剖析開去多少快活若只鶻突在裏是自欺而已又問老子云三十幅共一轂有之以為利無之以為用亦是此意否曰某也政謂與此一般便也是他看得到這裏幹林艾軒在行在一日訪南軒曰程先生語録某卻看得易傳看不得南軒曰何故林曰易有象數伊川皆不言何也南軒曰孔子說易不然易曰公用射隼于高墉之上獲之無不利如以象言則公是甚射是甚隼是甚高墉是甚聖人止曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有振龍泉簿范伯崇寄書來云今日氣象官無大小皆難於有為蓋通身是病無下藥處耳安得大賢君子正其根本使萬目具舉吾民得樂其生耶嚴陵之政遠近能言之蓋惻隱之心發於誠然加之明敏何事不立方上初召魏公先召南軒來某亦赴召至行在語南軒云湯進之不去事不可為莫擔負了他底至於敗事某待得見魏公時親與之說度住不得一二日去矣及魏公來湯左相張右相都不可商量事同進同退獨與上商量又不得上又要商量但時召南軒入往來傳言與魏公商量召南軒上在一幄中外無一人說話甚款南軒開陳臨安不可居乞且移蹕建康然宮禁左右且少帶人又百司之類亦且帶緊要底去上曰朕獨行后妃宮禁之類全不帶一人去臨安淫侈之甚如何居南軒祝上未須與人說相將又謅上曰朕不言卿不須漏泄上因曰待朕取一文字與卿看上顧左右無人使遂曰卿且待上自起去取南軒見幄外皆是宮人深懼所言皆為彼聞之矣少頃上來忘其文字其後與宰相議用兵事湯固力爭上曰朕旦夕親往建康未幾外面鬨鬨地謂上往建康南軒見上問云陛下嘗祝臣勿言聞陛下對宰執言之何也上曰被他撓人故以此激之意思如此記不全南軒出入甚親密滿朝忌之一日往見周葵政府諸人在次第逐報南軒來周指之曰吾輩進退皆在此郎之手是時南軒少年又處得地位不是而人情皆如此何以成得事南軒亦間至太上處理會事之類太上曰尚記得卿父娶時如何事卿今如此南軒奏邊事並不可和之意太上亦順應之臨辭去乃曰與卿父說不如和好湯在相位時有御札出來罵亦有秦檜不如之語然竟用之不可曉恐是太上意上因廣西買馬事之類甚向南軒諸公已忌之後到荊南趙雄事事沮之不可為矣先生又言近有誰說在荊南時司天奏相星在楚地甚明上曰張栻當之人愈忌之揚南軒再召時論今日自是當理會恢復然不如此理會須是云云有劄子上大喜次日降出劄子御批恢復須是如此理會即除侍講云且得直宿時與卿說話虞允文趙雄之徒不喜遂沮抑揚南軒自魏公有事後在家凡出入人事之類必以兩轎同其弟出入揚議南軒祭禮曰欽夫信忒猛又學胡氏云云有一般沒人情底學問嘗謂欽夫曰改過不吝從善如流固好然於事上也略審覆行亦何害南軒只以魏公繼室配又以時祭廢俗祭某屢言之伯羽因說南軒為人作文序曰欽夫無文字不做序淳南軒從善之亟先生嘗與間坐立所見什物之類放得不是所在並不齊整處先生謾言之雖夜後亦即時今人移正之揚春風駘蕩家家到天理流行事事清此南軒題桃符云爾擇之議之方欽夫言老子云不善人善人之資善人不善人之師與孔子見賢思齊見不賢內省之意不同為老子不合有資之之意不善也方
