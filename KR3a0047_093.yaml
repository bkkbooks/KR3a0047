body:
  text: 朱子語類卷第九十三孔孟周程張子看聖賢代作未有孔子便無論語之書未有孟子便無孟子之書未有堯舜便無典謨未有商周便無風雅頌賀孫此道更前後聖賢其說始備自堯舜以下若不生箇孔子後人去何處討分曉孔子後若無箇孟子也未有分曉孟子後數千載乃始得程先生兄弟發明此理今看來漢唐以下諸儒說道理見在史策者便直是說夢只有箇韓文公依稀說得略似耳文蔚天不生仲尼萬古長如夜唐子西嘗於一郵亭梁間見此語季通云天先生伏羲堯舜文王後不生孔子亦不得後又不生孟子亦不得二千年後又不生二程亦不得方孔子天地間甚事不理會過若非許大精神亦吞許多不得一日因話又說今覺見朋友間都無大精神文蔚問定禮樂是禮記所載否曰不見得節復問贊易之贊曰稱述其事如大哉乾元之類是贊節戰國秦漢間孔子言語存者尚多有之如孟子所引仁不可為眾為此詩者其知道乎又如劉向所引之類夫子度量極大與堯同門弟子中如某人輩皆不點檢他如堯容四凶在朝相似必大人傑錄云堯容四凶在朝夫子之門亦何所不容問孔子不是不欲仕只是時未可仕曰聖人無求仕之義君不見用只得且恁地做銖或問孔子當衰周時可以有為否曰聖人無有不可為之事只恐權柄不入手若得權柄在手則兵隨印轉將逐符行近溫左氏傳見定哀時煞有可做底事問固是聖人無不可為之事聖人有不可為之時否曰便是聖人無不可為之時若時節變了聖人又自處之不同又問孔子當衰周豈不知時君必不能用己曰聖人卻無此心豈有逆料人君能用我與否到得後來說吾不復夢見周公與鳳鳥不至河不出圖吾已矣夫時聖人亦自知其不可為矣但不知此等話是幾時說據陳恒弒其君孔子沐浴而朝請討之時是獲麟之年那時聖人猶欲有為也廣問看聖人汲汲皇皇不肯沒身逃世只是急於救世不能廢君臣之義至於可與不可臨時依舊裁之以義曰固是但未須說急於救世自不可不仕又問若據危邦不入亂邦不居有道則見無道則隱等語卻似長沮桀溺之徒做得是曰此為學者言之聖人做作又自不同又問聖人亦明知世之不可為否曰也不是明知不可但天下無不可為之時苟可以仕則仕至不可處便止如今時節臺諫固不可做州縣也自做得到得居位守職卻教自家枉道廢法雖一簿尉也做不得便著去位木之某嘗疑誅少正卯無此事出於齊魯陋儒欲尊夫子之道而造為之說若果有之則左氏記載當時人物甚詳何故有一人如許勞攘而略不及之史傳間不足信事如此者甚多僩衛靈公無道如此夫子直欲扶持之戀戀其國久而不去不知是何意不可曉必大孔子在衛國居得甚久想是靈公有英雄之氣孔子見其可與有為故久居而欲輔之壽昌問自孔子後何故無聖人曰公且看三代而下那件不薄文章字畫亦可見只緣氣自薄因問康節一元開物閉物之說是否曰有此理不易他窺測至此浩揚錄云自周後氣薄亦不生聖賢或問孔子當孟子時如何曰孔子自有作用然亦須稍加峻厲又問孔子若見用顏子還亦出否曰孔子若用顏子亦須出來做他次一等人如孔子做宰相顏子便做參政去偽龜山謂孔子如知州孟子如通判權州也是如此通判權州畢竟是別人事須著些力去做始得廣問顏子合下完具只是小要漸漸恢廓孟子合下大只是未粹要索學以充之此莫是才具有異曰然孟子覺有動蕩底意思可學或問顏子比湯如何曰顏子只據見在事業未必及湯使其成就則湯又不得比顏子前輩說禹與顏子雖是同道禹比顏子又粗些顏子比孟子則孟子當粗看磨稜合縫猶未有盡處若看諸葛亮只看他大體正當細看不得大雅才仲問顏子因舉先生舊語云顏子優於湯武如何見得曰公只且自做工夫這般處說不得據自看覺得顏子渾渾無痕跡賀孫問顏子之學莫是先於性情上著工夫否曰然凡人為學亦須先於性情上著工夫非獨於性情上著工夫行步坐立亦當著工夫煇謨錄云學者固當存養性情然處事接物動止應酬皆是著工夫處不獨性情也邵漢臣問顏淵仲尼不同曰聖人之德自是無不備其次則自是易得不備如顏子已是煞周全了只比之聖人更有些未完如仲弓則偏於淳篤而少顏子剛明之意若其他弟子未見得只如曾子則大抵偏於剛毅這終是有立腳處所以其他諸子皆無傳惟曾子獨得其傳到子思也恁地剛毅孟子也恁地剛毅惟是有這般人方始湊合得著惟是這剛毅等人方始立得定子思別無可考只孟子所稱如摽使者出諸大門之外北面再拜稽首而不受如云事之云乎豈曰友之云乎之類這是甚麼樣剛毅賀孫孔門只一箇顏子合下天資純粹到曾子便過於剛與孟子相似世衰道微人欲橫流不是剛勁有腳跟底人定立不住淳問若使曾子為邦比顏子如何曰想得不似顏子熟然曾子亦大故有力曾子子思孟子大略皆相似問明道比顏子如何曰不要如此問且看他做工夫處德明曾點開闊漆雕開深穩振曾點父子為學不同點有康節底意思將那一箇物玩弄道夫曾子父子相反參合下不曾見得只從日用間應事接物上積累做去及至透徹那小處都是自家底了點當下見得甚高做處卻又欠闕如一座大屋只見廳堂大概裏面房室元不曾經歷所以夷考其行而有不掩卒歸於狂儒用曾子真積力久若海曾子說話盛水不漏敬仲曾子太深壁立萬仞振孔門弟子如子貢後來見識煞高然終不及曾子如一唯之傳此是大體畢竟他落腳下手立得定壁立萬仞觀其言如彼以其富我以吾仁可以托六尺之孤士不可以不弘毅之類故後來有子思孟子其傳永孟子氣象尤可見士毅曾子本是魯拙後來既有所得故守得夫子規矩定其教人有法所以有傳若子貢則甚敏見得易然又雜往往教人亦不似曾子守定規矩故其後無傳因竇問子貢之學無傳德明子貢俊敏子夏謹嚴孔子門人自曾顏而下惟二子後來想大故長進僩但將論語子夏之言看甚嚴毅節子游是箇簡易人於節文有未至處如譏子夏之門人與喪致乎哀而止廣子張過高子夏窄狹端蒙子張是箇務外底人子游是箇高簡虛曠不屑細務底人子夏是箇謹守規矩嚴毅底人因觀荀子論三子之賤儒亦是此意蓋其末流必至是也僩問孔門學者如子張全然務外不知如何地學卻如此曰也干他學甚事他在聖門亦豈不曉得為學之要只是他資質是箇務外底人所以終身只是這意思子路是箇好勇底人終身只是說出那勇底話而今學者閒時都會說道理當如何只是臨事時依前只是他那本來底面目出來都不如那閒時所說者僩子路全義理管仲全功利振孟子極尊敬子路問韓子稱孔子之道大而能博大是就渾淪博是就該貫處否曰韓子亦未必有此意但如此看亦自好至問如何是學焉而皆得其性之所近曰政事者就政事上學得文學者就文學上學得德行言語者就德行言語上學得至看來人全是資質韓退之云孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近此說甚好看來資質定了其為學也只就他資質所尚處添得些小好而已所以學貴公聽並觀求一箇是當處不貴徒執己自用今觀孔子諸弟子只除了曾顏之外其他說話便皆有病程子諸門人上蔡有上蔡之病龜山有龜山之病和靖有和靖之病無有無病者或問也是後來做工夫不到故如此曰也是合下見得不周遍差了又曰而今假令親見聖人說話盡傳得聖人之言不差一字若不得聖人之心依舊差了何況猶不得其言若能得聖人之心則雖言語各別不害其為同如曾子說話比之孔子又自不同子思傳曾子之學比之曾子其言語亦自不同孟子比之子思又自不同然自孔子以後得孔子之心者惟曾子子思孟子而已後來非無能言之士如揚子雲法言模倣論語王仲淹中說亦模倣論語言愈似而去道愈遠直至程子方略明得四五十年為得聖人之心然一傳之門人則已皆失其真矣云云其終卒歸於擇善固執明善誠身博文約禮而已只是要人自去理會僩孟子比之孔門原憲謹守必不似他然他不足以及人不足以任道孟子便擔當得事淳孟子孟子不甚細膩如大匠把得繩墨定千門萬戶自在又記千門字上有東南西北字節鄧子禮問孟子恁地而公孫萬章之徒皆無所得曰也只是逐孟子上上下下不曾自去理會又曰孔子於門人恁地提撕警覺尚有多少病痛賀孫問周子是從上面先見得曰也未見得是恁地否但是周先生天資高想見下面工夫也不大故費力而今學者須是從下學理會若下學而不上達也不成箇學問須是尋到頂頭卻從上貫下來夔孫周子季通云濂溪之學精愨深密端蒙濂溪清和孔經甫祭其文曰公年壯盛玉色金聲從容和毅一府皆傾墓碑亦謂其精密嚴恕氣象可想矣道夫周子看得這理熟縱橫妙用只是這數箇字都括盡了周子從理處看邵子從數處看都只是這理砥曰畢竟理較精粹曰從理上看則用處大數自是細碎砥今人多疑濂溪出於希夷又云為禪學其諸子皆學佛可學云濂溪書具存如太極圖希夷如何有此說或是本學老佛而自變了亦未可知曰嘗讀張忠定公語錄公問李畋云汝還知公事有陰陽否云云此說全與濂溪同忠定見希夷蓋亦有些來歷但當時諸公知濂溪者未嘗言其有道可學曰此無足怪程太中獨知之曰然又問明道之學後來固別但其本自濂溪發之只是此理推廣之耳但不如後來程門授業之多曰當時既未有人知無人往復只得如此可學濂溪在當時人見其政事精絕則以為宦業過人見其有山林之志則以為襟袖洒落有仙風道氣無有知其學者惟程太中獨知之這老子所見如此宜其生兩程子也只一時程氏類多好人舉橫渠祭太中弟云父子參點又祭明道女兄云見伯淳言汝讀孟子有所見死生鬼神之蘊無不洞曉今人為卿相大臣者尚不能知先生笑曰此事是譏富公竇問韓公一家氣象如何曰韓公天資高但學識淺故只做得到那田地然其大綱皆正又云明道當初想明得煞容易便無那渣滓只一再見濂溪當時又不似而今有許多言語出來不是他天資高見得易如何便明得德明問遺書中載明道語便自然洒落明快曰自是他見得容易伊川易傳卻只管修改晚年方出其書若使明道作想無許多事嘗見門人有祭明道文云先生欲著樂書有志未就不知其書要如何作德明周程問明道濂溪俱高不如伊川精切曰明道說話超邁不如伊川說得的確濂溪也精密不知其他書如何但今所說這些子無一字差錯問明道不著書曰嘗見某人祭明道文說蹺蹊說明道要著樂書樂音洛樂如何著得書德輔汪端明嘗言二程之學非全資於周先生者蓋通書人多忽略不曾考究今觀通書皆是發明太極書雖不多而統紀已盡二程蓋得其傳但二程之業廣耳二程不言太極者用劉絢記程言清虛一大恐人別處走今只說敬意只在所由只一理也一理者言仁義中正而主靜方濂溪靜一明道敬方子明道說話渾淪煞高學者難看淳程子明道說底話恁地動彈流轉方子明道語宏大伊川語親切方明道說話一看便好轉看轉好伊川說話初看未甚好久看方好義剛明道說話亦有說過處如說舜有天下不與又其說闊人有難曉處如說鳶飛魚躍謂心勿忘勿助長處伊川較子細說較無過然亦有不可理會處又曰明道所見甚俊偉故說得較快初看時便好子細看亦好伊川說初看時較拙子細看亦拙又曰明道說經處較遠不甚協注揚說明道言語儘寬平伊川言語初難看細讀有滋味又云某說大處自與伊川合小處卻持有意見不同說南軒見處高如架屋相似大間架已就只中間少裝折宇明道曾看釋老書伊川則莊列亦不曾看先生云後來須著看不看無緣知他道理伊川好學論十八時作明道十四五便學聖人二十及第出去做官一向長進定性書是二十二三時作是時遊山許多詩甚好義剛問明道可比顏子伊川可比孟子否曰明道可比顏子孟子才高恐伊川未到孟子處然伊川收束檢制處孟子卻不能到煇竇問前輩多言伊川似孟子曰不然伊川謹嚴雖大故以天下自任其實不似孟子放腳放手孟子不及顏子顏子常自以為不足德明鄭問明道到處響應伊川入朝成許多事此亦可見二人用處曰明道從容伊川都挨不行陳後之問伊川做時似孟子否曰孟子較活絡問孟子做似伊尹否先生首肯又曰孟子傳伊尹許多話當時必有一書該載淳問學於明道恐易開發學於伊川恐易成就曰在人用力若不用力恐於伊川無向傍處明道卻有悟人處方伊川說話如今看來中間寧無小小不同只是大綱統體說得極善如性即理也一語直自孔子後惟是伊川說得盡這一句便是千萬世說性之根基理是箇公共底物事不解會不善人做不是自是失了性卻不是壞了著修賀孫明道詩云旁人不識予心樂將謂偷閑學少年此是後生時氣象眩露無含蓄學蒙或問明道五十年猶不忘遊獵之心曰人當以此自點檢須見得明道氣質如此至五十年猶不能忘在我者當益加操守方是不可以此自恕卓東坡見伊川主司馬公之喪譏其父在何以學得喪禮如此然後人遂為伊川解說道伊川先丁母艱也不消如此人自少讀書如禮記儀禮便都已理會了古人謂居喪讀喪禮亦平時理會了到這時更把來溫審不是方理會賀孫因論司馬文呂諸公當時尊伊川太高自宰相以下皆要來聽講遂致蘇孔諸人紛紛曰宰相尊賢如此甚好自是諸人難與語只如今賭錢喫酒等人正在無禮你卻將禮記去他邊讀如何不致他惡揚伊川令呂進伯去了韓安道李先生云此等事須是自信得及如何教人做得揚至之問程先生當初進說只以聖人之說為可必信先王之道為可必行不狃滯於近規不遷惑於眾口必期致天下如三代之世何也先生曰也不得不恁地說如今說與學者也只得教他依聖人言語恁地做去待他就裏面做工夫有見處便自知得聖人底是確然恁地荊公初時與神宗語亦如此曰願陛下以堯舜禹湯為法今苟能為堯舜禹湯之君則自有皋夔稷契伊傅之臣諸葛亮魏徵有道者所羞道也說得甚好只是他所學偏後來做得差了又在諸葛魏徵之下義剛有咎伊川著書不以示門人者再三誦之先生不以為然也因坐復歎先生曰公恨伊川著書不以示人某獨恨當時提撕他不緊故當時門人弟子布在海內炳如日星自今觀之皆不滿人意只今易傳一書散滿天下家置而人有之且道誰曾看得他箇果有得其意者否果曾有行得他箇否道夫聞伯夷柳下惠之風者頑廉薄敦皆有興起此孟子之善想像者也孔子元氣也顏子和風慶雲也孟子泰山巖巖之氣象也此程夫子之善想像者也今之想像大程夫子者當識其明快中和處小程夫子者當識其初年之嚴毅晚年又濟以寬平處豈徒想像而已哉必還以驗之吾身者如何也若言論風旨則誦其詩讀其書字字而訂之句句而議之非惟求以得其所言之深旨將併與其風範氣象得之矣大雅書無所不讀事無所不能若作強記多能觀之誠非所以形容有道之君子然在先生分上正不妨書之當讀者無所不讀欲其無不察也事之當能者無所不能以其無不通也觀其平日辯異端闢邪說如此之詳是豈不讀其書而以耳剽決之耶至於鄙賤之事雖瑣屑然孰非天理之流行者但此理既得自然不習而無不能耳故孔子自謂多能鄙事但以為學者不當自是以求之故又曰不多也今欲務於強記多能固非所以為學然事物之間分別太甚則有修飭邊幅簡忽細故之病又非所以求盡心也鎬伊川快說禪病如後來湖南龜山之弊皆先曾說過湖南正以為善龜山求中於喜怒哀樂之前方居仁謂伊川顢頇語是親見與病叟書中說方伊川告詞如此是紹興初年議論未免一褒一貶之雜也謨程先生傳甚備見徽廟實錄呂伯恭撰振叔器問橫渠似孟子否曰一人是一樣規模各不同橫渠嚴密孟子宏闊孟子是箇有規矩底康節安卿曰他宏闊中有縝密處每常於所謂不見諸侯何也曰不敢也賜之則不受何也曰不敢也此兩處見得他存心甚畏謹守義甚縝密曰固是至之曰孟子平正橫渠高處太高僻處太僻曰是義剛張子橫渠將這道理抬弄得來大後更柰何不下必大橫渠儘會做文章如西銘及應用之文如百碗燈詩甚敏到說話卻如此難曉怕關西人語言自如此賀孫橫渠之學是苦心得之乃是致曲與伊川異以孔子為非生知渠蓋執好古敏以求之故有此語不知好古敏以求之非孔子做不得可學問橫渠之教以禮為先浩恐謂之禮則有品節每遇事須用秤停當禮方可遵守初學者或未曾識禮恐無下手處敬則有一念之肅便已改容更貌不費安排事事上見得此意如何先生曰古人自幼入小學便教以禮及長自然在規矩之中橫渠卻是用官法教人禮也易學今人乍見往往以為難某嘗要取三禮編成一書事多蹉過若有朋友只兩年工夫可成浩張橫渠傳當時人推范純夫作見神宗實錄揚明道之學從容涵泳之味洽橫渠之學苦心力索之功深端蒙程張橫渠之於程子猶伯夷伊尹之於孔子若海問孔子六經之書盡是說道理內實事故便覺得此道大自孟子以下如程張之門多指說道之精微學之要領與夫下手處雖甚親切易見然被他開了四至便覺規模狹了不如孔子六經氣象大曰後來緣急欲人曉得故不得不然然亦無他不得若無他說破則六經雖大學者從何處入頭橫渠最親切程氏規模廣大其後學者少有能如橫渠輩用工者近看得橫渠用工最親切直是可畏學者用工須是如此親切更有一說奉祝老兄言語更多些更須刪削見簡潔處方是大雅閭丘次孟云諸先生說話皆不及小程先生雖大程亦不及曰不然明道說話儘高那張說得端的處儘好且如伊川說仁者天下之公善之本也大段寬而不切如橫渠說心統性情這般所在說得的當又如伊川謂鬼神者造化之跡卻不如橫渠所謂二氣之良能也直卿曰如何曰程子之說固好但只渾淪在這裏張子之說分明便見有箇陰陽在曰如所謂功用則謂之鬼神也與張子意同曰只為他渾淪在那裏閭丘曰明則有禮樂幽則有鬼神曰只這數句便要理會明便如何說禮樂幽便如何說鬼神須知樂便屬神禮便屬鬼他此語落著主在鬼神因指甘蔗曰甘香氣便喚做神其漿汁便喚做鬼直卿曰向讀中庸所謂誠之不可掩處竊疑謂鬼神為陰陽屈伸則是形而下者若中庸之言則是形而上者矣曰今也且只就形而下者說來但只是他皆是實理處發見故未有此氣便有此理既有此理必有此氣道夫今且須看孔孟程張四家文字方始講究得著實其他諸子不能無過差也理
