body:
  text: 朱子語類卷第一百二十九本朝三自國初至熙寧人物因論唐初國初人才云國初人材是五代時已生得了德明太宗朝一時人多尚文中子蓋見朝廷事不振而文中子之書頗說治道故也然不得其要范文正公雖有欲為之志然也粗不精密失照管處多卓僩録略國初人便已崇禮義尊經術欲復二帝三代已自勝如唐人但說未透在直至二程出此理始說得透因看种明逸集方子問本朝宰相孰優曰各有所長力行趙幾道云本朝宰相但一味度量而已曰寬裕溫柔足以有容固好又須發強剛毅足以有執則得大雅宰相薦張齊賢曾受一曹司甚恩忘了齊賢後以兄事之舉此一事齊賢可知矣先生曰祖宗時人朴實如此今好薦章如此乃是一言章也揚李文靖只做得如此若有學便可做三代事真宗晚年豈有如此等事揚談苑說李文靖沒口匏事極好可謂鎮浮然與不興利事皆落一偏胡不廣求有道賢德興起至治也方李文靖重厚沉默嘗寓京師亦少出入一日忽有一轎至下轎乃一蓋頭婦人不見其面然儀度甚美入文靖房久而出衆訝之以為文靖如此卻引得這般人來遂問之文靖亦只依違應之曰亦言某前程之類何足信深詰之文靖曰諸公曾見其面乎一面都是目許文靖為相揚問本朝如王沂公人品甚高晚年乃求復相何也曰便是前輩都不以此事為非所以至范文正方厲廉恥振作士氣曰如寇萊公也因天書欲復相曰固是植問王沂公云恩欲己出怨使誰當似此不可為通法否曰它只說不欲牢籠人才說使必出自我門下它亦未嘗不薦人才相問先生前日曾論本朝惟范文正公振作士大夫之功為多不知使范公處韓公受顧命之時處事亦能如韓公否曰看范公才氣亦須做得又曰祖宗以來名相如李文靖王文正諸公只恁地善亦不得至范文正時便大厲名節振作士氣故振作士大夫之功為多問范文正作百官圖以獻其意如何曰它只說如此遷轉即是公如此遷轉即是私呂許公當國有無故躐等用人處故范公進此圖於仁宗因舉詩云誨爾序爵人主此事亦不可不知假如有人已做侍御史宰相驟擢作侍從雖官品高然侍御史卻緊要為人主者便須知把他擢作侍從如何不把做諫議大夫之類植近得周益公書論呂范解仇事曰初范公在朝大臣多忌之及為開封府又為百官圖以獻因指其遷進遲速次序曰某為超遷某為左遷如是而為公如是而為私意頗在呂相呂不樂由是落職出知饒州未幾呂亦罷相後呂公再入元昊方犯邊乃以公經略西事公亦樂為之用嘗奏記呂公云相公有汾陽之心之德仲淹無臨淮之才之力後歐陽公為范公神道碑有歡然相得戮力平賊之語正謂是也公之子堯夫乃以為不然遂刊去此語前書今集中亦不載疑亦堯夫所刪他如叢談所記說得更乖某謂呂公方寸隱微雖未可測然其補過之功使天下實被其賜則有不可得而掩者范公平日胸襟豁達毅然以天下國家為己任既為呂公而出豈復更有匿怨之意況公嘗自謂平生無怨惡於一人此言尤可驗忠宣固是賢者然其規模廣狹與乃翁不能無間意謂前日既排申公今日若與之解仇前後似不相應故諱言之卻不知乃翁心事政不如此歐陽公聞其刊去碑中數語甚不樂也問後來正獻亦及識范公否曰正獻通判潁州時歐陽公為守范公知青州過潁謁之因語正獻曰太博近朱者赤歐陽永叔在此宜頻近筆硯異時同薦三人則王荊公司馬溫公及正獻公也其知人如此又曰呂公所引如張方平王拱辰李淑之徒多非端士終是不樂范公張安道過失更多但以東坡父子懷其汲引之恩文字中十分說他好今人又好看蘇文所以例皆稱之介甫文字中有說他不好處人既不看看又不信儒用呂申公斥逐范文正諸人至晚年復收用之范公亦竭盡底蘊而為之用這見文正高處忠宣辨歐公銘志事這便是不及文正道夫范文正傑出之才某嘗謂天生人才自足得用豈可厚誣天下以無人自是用不到耳且如一箇范文正公自做秀才時便以天下為己任無一事不理會過一旦仁宗大用之便做出許多事業今則所謂負剛大之氣者且先一筆勾斷稱停到第四五等人氣宇厭厭布列臺諫如何得事成故某向謂姓名未出而內外已知其非天下第一流矣道夫范文正公嘗云浙人輕佻易動切宜戒之子蒙某嘗說呂夷簡最是箇無能底人今人卻說他有相業會處置事不知何者為相業何者善處置為相正要以進退人才為先使四夷聞知知所聳畏方其為相其才德之大者如范文正諸公既不用下而豪俊跅弛之士如石曼卿諸人亦不能用其所引援皆是半間不界無狀之人弄得天下之事日入於昏亂及一旦不奈元昊何遂盡挨與范文正公若非范文正公則西方之事決定弄得郎當無如之何矣今人以他為有相業深所未曉子蒙因言仁宗朝講書楊安國之徒一時聚得幾箇朴純無能之人可笑先生曰此事緣范文正招引一時才俊之士聚在館閣如蘇子美梅聖俞之徒此輩雖有才望雖皆是君子黨然輕儇戲謔又多分流品一時許公為相張安道為御史中丞王拱辰之徒皆深惡之求去之未有策而蘇子美又杜祁公壻杜是時為相蘇為館職兼進奏院每歲院中賽神例賣故紙錢為飲燕之費蘇承例賣故紙因出己錢添助為會請館閣中諸名勝而分別流品非其侶者皆不得與會李定願與而蘇不肯於是盡招兩軍女妓作樂爛飲作為傲歌王勝之名直柔句云欹倒太極遣帝扶周公孔子驅為奴這一隊專探伺他敗闕才聞此句拱辰即以白上仁宗大怒即令中官捕捉諸公皆已散走逃匿而上怒甚捕捉甚峻城中喧然於是韓魏公言於上曰陛下即位以來未嘗為此等事一旦遽如此驚駭物聽仁宗怒少解而館閣之士罷逐一空故時有一網打盡之語杜公亦罷相子美除名為民永不敘復子美居湖州有詩曰不及雞竿下坐人言不得比罪人引赦免放也雖是拱辰安道輩攻之甚急然亦只這幾箇輕薄做得不是縱有時名然所為如此終亦何補於天下國家邪仁宗於是懲才士輕薄之弊這幾箇承意旨盡援引純朴持重之人以愚仁宗凡解經不過釋訓詁而已如楊安國彭乘之徒是也是時張安道為御史中丞助呂公以攻范卓陳執中俗吏然執法仁廟謂惟此人不瞞人近世葉顒近似之揚德粹以明州士人所寄書納先生因請問其書中所言先生曰渠言漢之名節魏晉之曠蕩隋唐之辭章皆懲其弊為之不然此只是正理不明相羇將去遂成風俗後漢名節至於末年有貴己賤人之弊如皇甫規鄉人見之卻問卿在鴈門食鴈美乎舉此可見積此不已其勢必至於虛浮入老莊相羇到齊梁間又不復如此只是作一般艷辭君臣賡歌褻瀆之語不以為怪隋之辭章乃起於煬帝進士科至不成科目故遂羇纏至唐至本朝然後此理復明正如人有病今日一病明日變一病不成要將此病變作彼病某問已前皆羇纏成風俗本朝道學之盛豈是羇纏先生曰亦有其漸自范文正以來已有好議論如山東有孫明復徂徠有石守道湖州有胡安定到後來遂有周子程子張子出故程子平生不敢忘此數公依舊尊他若如楊劉之徒作四六駢儷之文又非此比然數人者皆天資高知尊王黜霸明義去利但只是如此便了於理未見故不得中某問安定學甚盛何故無傳曰當時所講止此只些門人受去做官死後便已嘗言劉彝善治水後來果然彝有一部詩遇水處便廣說璘録云劉彝治水所至興水利劉有一部詩解處處作水利說好笑熟處難忘某又問以前說後漢之風皆以為起於嚴子陵近來說又別曰前漢末極有名節人光武卻極崇儒重道尊經術後世以為法如見樊英築壇場猶待神明嚴子陵直分明是隱士渠高氣遠邁直是不屈又論其不矯激呂伯恭作祠堂記卻云它中和嘗問之嚴子陵何須如此說使它有知聞之豈不發一笑因說前輩如李泰伯們議論只說貴王賤伯張大其說欲以劫人之聽卻是矯激然猶有以使人奮起今日須要作中和將來只便委靡了如范文正公作子陵祠堂記云先生之心出乎日月之上光武之器包乎天地之外微先生不能成光武之大微光武豈能遂先生之高胡文定父子極喜此語大抵前輩議論粗而大今日議論細而小不可不理會某問此風俗如何可變曰如何可變只且自立可學論安定規模雖少疏然卻廣大著實如孫明復春秋雖過當然占得氣象好如陳古靈文字尤好嘗過台州見一豐碑說孔子之道甚佳此亦是時世漸好故此等人出有魯一變氣象其後遂有二先生若當時稍加信重把二先生義理繼之則可以一變而乃為王氏所壞問當時如此積漸將成而壞於王氏莫亦是有氣數曰然可學因言兼山艾軒二氏中庸曰程子未出時如胡安定石守道孫明復諸人說話雖粗疏未盡精妙卻儘平正更如古靈先生文字都好道夫云只如諭俗一文極為平正簡易曰許多事都說盡也見他一箇胸襟盡包得許多又曰大抵事亦自有時如程子未出而諸公已自如此平正道夫本朝孫石輩忽然出來發明一箇平正底道理自好前代亦無此等人如韓退之已自五分來只是說文章若非後來關洛諸公出來孫石便是第一等人孫較弱石健甚硬做問孫明復如何恁地惡胡安定曰安定較和易明復卻剛徑或曰孫泰山也是大故剛介曰明復未得為介石守道卻可謂剛介義剛石守道只是粗若其名利嗜欲之類直是打疊得伶俐茲所以不動心也揚嘉祐前輩如此厚重胡安定於義理不分明然是甚氣象問安定平日所講論今有傳否曰並無薛士龍在湖州嘗以書問之回書云並無如當初取湖州學法以為太學法今此法無今日法乃蔡京之法又云祖宗以來學者但守注疏其後便論道如二蘇直是要論道但注疏如何棄得可學安定太山徂徠廬陵諸公以來皆無今日之術數老蘇有九分來許罪揚安定胡先生只據他所知說得義理平正明白無一些玄妙近有一輩人別說一般惹邪底詳說話禪亦不是如此只是不曾見那禪師便是被他笑揚録云徐子儀之徒因論李泰伯曰當時國家治時節好所論皆徑正如此曾南豐攜歐公書往餘杭見范文正文正云歐九得書令將錢與公今已樁得甚處錢留公矣亦欲少款適聞李先生來欲出郊迓之云云閩宰方叔圭永嘉人以書來稱本朝人物甚盛而功業不及於漢唐只緣是要去小人先生曰是何等議論小人如何不去得自是不可合之物一薰一蕕十年尚猶有臭觀仁宗用韓范富諸公是甚次第只為小人所害及韓富再當國前日事都忘了富公一向畏事只是要看經念佛緣是小人在傍故耳若謂小人不可去則舜當時去四凶是錯了可學問方君意謂不與小人競則身安可以做事曰不去小人如何身得安劉晦伯云有人說泰卦內君子外小人為君子在內小人在外小人道消乃是變為君子曰亦有此理聖人亦有容小人處又是一截事且當看正當處使小人變為君子固好只是不能得如此可學云小人譖君子須加以朋黨叛逆曰如此則一網可打盡雖是如此然君子亦不可過當如元祐諸公行蔡新州事卻不是渠固有罪然以作詩行重責大不可然當元祐時只行遣渠一人至紹聖則禍甚酷以此觀君子之於小人未能及其毫毛而小人之於君子其禍常大安可不去可學韓富初來時要拆洗做過做不得出去及再來亦只隨時了遇聖明如此猶做不得揚富鄭公與韓魏公議不合富恨之至不弔魏公喪富公守某州魯直為尉久不之任在路遷延富有所聞大怒及到遂不與交割後幕幹勸之方肯及魯直在史館修韓魏公傳使人問富曾弔韓喪否知其不曾遂以此事送下案中遂成案底後人雖欲修去此事而有案底竟不可去魯直也可謂乖但魏公年年卻使人去鄭公家上壽恁地便是富不如韓較寬大義剛韓魏公富鄭公皆言新法不便韓公更能論列上面不從他也委曲作箇道理著行他底如富公更不行自用他那法度後來遂被人言雖如此畢竟喚做是不得今事有不便但當如韓公論列若不從也須做道理減省了行他底大不可行則有去而已如富公直截自用己意則不可也端蒙歐公章疏言地震山石崩入於海某謂正是羸豕孚躅之義當極治時已自栽培得這般物在這裏了故直至如今道夫先生因泛言交際之道云先人曾有雜録冊子記李仲和之祖見居三衢同包孝肅同讀書一僧舍每出入必經由一富人門二公未嘗往見之一日富人俟其過門邀之坐二公託以他事不入他日復招飯意廑甚李欲往包公正色與語曰彼富人也吾徒異日或守鄉郡今妄與之交豈不為他日纍乎竟不往後十年二公果相繼典鄉郡先生因嗟歎前輩立己接人之嚴蓋如此方二公為布衣所志已如此此古人所謂言行必稽其所終慮其所敝也或言近有為鄉邑者泛接部內士民如布衣交甚至狎溺無所不至後來遇事入手處之頗有掣肘處曰為邑之長此等處當有限節若脫略繩墨其末流之弊必至於此包李之事可為法也時舉張乖崖云陽是人有罪而未書案尚變得陰是已書案更變不得此人曾見希夷來言亦似太極圖節趙叔平樂易厚善人也平生做工夫欲驗心善惡之多少以一器盛黑豆一器盛白豆中間置一虛器才一善念動則取白豆投其中惡念動則取黑豆投其中至夜則倒虛器中之豆觀其黑白以驗善惡之多少初間黑多而白少久之漸一般又久之則白多而黑少又久則和豆也無了便是心純一於善矣或曰恐無此理曰前輩有一種工夫如此若能持敬則不消如此心煩自然當下便復於善矣陳烈字季慈行甚高然古怪太甚使其知義理之正是如何樣有力量惜其只一向從一邊去辭官表甚古橫渠嘗稱之溫公薨陳上表慰國家張文潛集中有代范忠宣答其表書陳烈辭官表上謂似中書之文陳好行古禮其妻厭之而求去人遂誣陳惡其妻醜而出之揚陳烈初年讀書不理會得又不記因讀孟子求放心一段遂謝絶人事靜坐室中數月後看文字記性加數倍又聰明揚阮逸撰元經關朗易李靖問對見後山談叢崔正言奏議亦好又問曾看劉質夫春秋謝顯道胡明仲集否
