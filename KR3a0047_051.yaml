body:
  text: 朱子語類卷第五十一孟子一題辭陳丈言孟子趙岐所記者卻做得好曰做得絮氣悶人東漢文章皆如此卓解書難得分曉趙岐孟子拙而不明王弼周易巧而不明梁惠王上孟子見梁惠王章希真說孟子對梁惠王以仁義章曰凡事不可先有箇利心才說著利必害於義聖人做處只向義邊做然義未嘗不利但不可先說道利不可先有求利之心蓋緣本來道理只有一箇仁義更無別物事義是事事合宜賀孫說義利處曰聖賢之言所以要辨別教分明但只要向義邊一直去更不通思量第二著才說義乃所以為利固是義有大利存焉若行義時便說道有利則此心只邪向那邊去固是未有仁而遺其親未有義而後其君才於為仁時便說要不遺其親為義時便說要不後其君則是先有心於為利聖賢要人止向一路做去不要做這一邊又思量那一邊仲舒所以分明說不謀其利不計其功賀孫孟子大綱都剖析得分明如說義利等處如答宋牼處見得事只有箇是非不通去說利害看來惟是孟子說得斬釘截鐵賀孫正淳問仁者心之德愛之理義者心之制事之宜德與理俱以體言制與宜俱以用言否曰心之德是渾淪說愛之理方說到親切處心之制卻是說義之體程子所謂處物為義是也揚雄言義以宜之韓愈言行而宜之之謂義若只以義為宜則義有在外意須如程子言處物為義則是處物者在心而非外也又云大概說道理只渾淪說又使人無捉摸處若要說得親切又卻局促有病如伊川說仁者天下之公善之本也說得渾淪開闊無病知言說理是要親切所以多病賀孫或問心之德愛之理以體言心之制事之宜以用言曰也不是如此義亦只得如此說事之宜雖若在外然所以制其義則在心也程子曰處物為義非此一句則後人恐未免有義外之見如義者事之宜事得其宜之謂義皆說得未分曉蓋物之宜雖在外而所以處之使得其宜者則在內也曰仁言心之德便見得可包四者義言心之制卻只是說義而已曰然程子說仁者天下之公善之本也固是好然說得太渾淪只恐人理會不得大抵說得寬廣自然不受指點若說得親切又覺得意思局促不免有病知言則是要說得親切而不免有病者也又曰也須說教親切因言漢唐諸人說義理只與說夢相似至程先生兄弟方始說得分明唐人只有退之說得近旁然也只似說夢但不知所謂劉迅者如何曰迅是知幾之子據本傳說迅嘗注釋六經以為舉世無可語者故盡焚之曰想只是他理會不得若是理會得自是著說與人廣至問心之德是就專言之統體上說愛之理是就偏言之一體上說雖言其體而用未嘗不包在其中心之制是說義之主於中事之宜是說義之形於外合內外而言之也曰心之制亦是就義之全體處說事之宜是就千條萬緒各有所宜處說事之宜亦非是就在外之事說看甚麼事來這裏面便有箇宜處這便是義又舉伊川曰在物為理處物為義又曰義似一柄利刀看甚物來皆割得去非是刀之割物處是義只這刀便是義時舉録略別出至之問義者心之制事之宜曰事之宜也是說在外底事之宜但我才見箇事來便知這箇事合恁地處此便是事之宜也義如刀相似其鋒可以割制他物才到面前便割將去然鋒與刀則初未嘗相離也時舉義者心之制事之宜所謂事之宜方是指那事物當然之理未說到處置合宜處也僩問心之制是裁制曰是裁制問莫是以制其心曰心自有這制心自是有制制如快利刀斧事來劈將去可底從這一邊去不可底從那一邊去節梁惠王問利國便是為己只管自家國不管他人國義利之分其爭毫釐范氏只為說不到聖賢地位上蓋義者利之和也謨集義王立於沼上章德修說王立於沼上一章引齊宣王見孟子於雪宮事云梁惠王其辭遜齊宣王其辭誇先生曰此說好又說寡人願安承教一章有和氣致祥乖氣致異之說曰恐孟子之意未到此文蔚寡人之於國章移民移粟荒政之所不廢也燾晉國天下莫強焉章問孟子告梁王省刑罰薄稅斂便可以撻秦楚之甲兵夫魏地迫近於秦無時不受兵割地求城無虛日孟子之言似大容易否曰自是響應如此當時之人焦熬已甚率歡欣鼓舞之民而征之自是見效速後來公子無忌縞素一舉直搗至函谷關可見德明孟子亦是作為底人如云彼陷溺其民王往而征之夫誰與王敵非不用兵也特其用兵不若當時戰國之無義理耳如五畝之宅樹之以桑而下為政之實行之既至則視當時無道之國豈可但已哉人傑孟子見梁襄王章問望之不似人君此語孔子還道否曰孔子不說孟子忍不住便說安卿煞不易他會看文字疑得都是合疑處若近思固不能疑蜚卿又疑得曲折多無事生出事又曰公疑得太過都落從小路去了伯羽齊宣王問齊桓晉文之事章無道桓文之事事者營霸之事儒者未嘗講求如桓公霸諸侯一匡天下則誰不知至於經營霸業之事儒者未嘗言也謨或問仁術字當何訓曰此是齊王見牛觳觫而不忍之心萌故以羊易之孟子所謂無傷蓋能獲得齊王仁心發見處術猶方便也履孫仁術謂已將牛去殺是其仁心無可為處了卻令以羊易之又卻存得那仁心此是為其仁之術也振陳晞周問仁術曰術未必便是全不好且如仁術見牛之觳觫是仁心到這裏處置不得無術以處之是自家這仁心抑遏不得流行故以羊易之這是用術處有此術方得自家仁心流行植時舉録詳陳晞周問仁術曰術字本非不好底事只緣後來把做變詐看了便道是不好卻不知天下事有難處處須著有箇巧底道理始得當齊王見牛之時惻隱之心已發乎中又見釁鍾事大似住不得只得以所不見者而易之乃是他既用旋得那事又不抑遏了這不忍之心此心乃得流行若當時無箇措置便抑遏了這不忍之心遂不得而流行矣此乃所謂術也時舉見牛未見羊也未字有意味蓋言其體則無限量言其用則無終窮充擴得去有甚盡時要都盡是有限量方問先生解物皆然心為甚曰人心應物其輕重長短之難齊而不可不度以本然之權度又有甚於物者不知如何是本然之權度曰本然之權度亦只是此心此心本然萬理皆具應物之時須是子細看合如何便是本然之權度也如齊宣王見牛而不忍之心見此是合權度處及至興甲兵危士臣搆怨於諸侯又卻忍為之便是不合權度失其本心又問莫只是無所為而發者便是本心曰固是然人又多是忘了問如何忘了曰當惻隱時卻不惻隱是也問此莫是養之未至否曰亦是察之未精廣黃先之問物皆然心為甚曰物之輕重長短之差易見心之輕重長短之差難見物之差無害心之差有害故曰心為甚又曰物易見心無形度物之輕重長短易度心之輕重長短難度物差了只是一事差心差了時萬事差所以心為甚又曰以本然之權度度心又曰愛物宜輕仁民宜重此是權度以此去度節問孟子論齊王事考之史記後來無一不效曰雖是如此已是見得遲了須看他一部書見得句句的確有必然之效方是德明至云看孟子已看到七八章見孟子於義利之辨王霸之辨其剖判為甚嚴至於顧鴻鴈麋鹿之樂與好世俗之樂此亦是人情之常故孟子順而導之以與民同樂之意至於誤認移民移粟以為盡心而不能制民之産以行仁政徒有愛牛之心而不能推廣以行仁政以開導誘掖以先王之政可謂詳明至皆未見所疑處只伊川說孟子說齊梁之君行王政王者天下之義主也聖賢亦何心哉視天命之改與未改爾於此數句未甚見得明先生卻問至云天命之改與未改如何見得曰莫是周末時禮樂征伐皆不出於天子生民塗炭而天王不能正其權以救之否曰如何三晉猶尚請命於周曰三晉請命既不是而周王與之亦不是如溫公所云云便是天王已不能正其權曰如何周王與之不是便以為天命之改曰至見得未甚明舊曾記得程先生說譬如一株花可以栽培則須栽培莫是那時已是栽培不得否曰大勢已去了三晉請命於周亦不是知尊周謾假其虛聲耳大抵人心已不復有愛戴之實自入春秋以來二百四十年間那時猶自可整頓不知周之子孫何故都無一人能明目張膽出來整頓到孟子時人心都已去曰程子說天命之改莫是大勢已去曰然至集義梁惠王下莊暴見孟子章孟子開道時君故曰今之樂猶古之樂至於言百姓聞樂音欣欣然有喜色處則關閉得甚密如好色好貨亦此類也謨齊宣王問文王囿章孟子言文王由百里興亦未必然問孟子謂文王之囿方七十里先生以為三分天下有其二以後事若只百里如何有七十里之囿然孟子所謂傳有之者如何曰想他須有據但孟子此說其意亦只主在風齊宣王爾若文王之囿果然縱一切人往則雖七十里之大不過幾時亦為赤地矣又焉得有林木烏獸之長茂乎周之盛時雖天下山林猶有厲禁豈有君之苑囿反縱芻獵恣往而不禁乎亦無是理漢武帝規上林苑只有二三十里當時諸臣已皆以為言豈有文王之囿反如是之大問交鄰國有道章湯事葛文王事昆夷昆夷不可考大抵湯之事葛文王事昆夷其本心所以事之之時猶望其有悔悟之心必待伐之豈得已哉亦所當然耳謨問仁者為能以大事小是仁者之心寬洪惻怛便是小國不恭亦撓他不動智者為能以小事大蓋智者見得利害甚明故祇得事大曰也不特是見得利害明道理自合恁地小之事大弱之事強皆是道理合恁地至問樂天者保天下畏天者保其國曰只是說其規模氣象如此時舉録作有大小耳至問樂天畏天者曰樂天是聖人氣象畏天是賢人氣象孟子只是說大概聖賢氣象如此使智者當以大事小時也必以大事小使仁者當以小事大處也必以小事大不可將太王文王交互立說便失了聖賢氣象此自是兩層事孟子之說是前面一層又須是看得後面一層所以貴乎不以文害辭者正是此類人須見得言外意好去僞問人皆謂我毀明堂章問孟子以公劉太王之事告其君恐亦是委曲誘掖之意曰這兩事卻不是告以好色好貨乃是告以公劉太王之事如此兩事看來卻似易待去做時多少難大凡文字須將心體認看這箇子細看來甚是難如孟子又說子服堯之服誦堯之言行堯之行是堯而已矣看來也是易這如何便得相似又如說徐行後長者謂之弟疾行先長者謂之不弟堯舜之道孝弟而已矣看來也似易賀孫問孟子語好貨好色事使孔子肯如此答否曰孔子不如此答但不知作如何答問孟子答梁王問利直掃除之此處又卻如此引導之曰此處亦自分義利特人不察耳可學問湯放桀章賊仁者無愛心而殘忍之謂也賊義者無羞惡之心之謂也節先生舉賊仁者謂之賊賊義者謂之殘問何以別近思云賊仁是害心之理賊義是見於所行處傷其理曰以義為見於所行便是告子義外矣義在內不在外義所以度事亦是心度之然此果何以別蓋賊之罪重殘之罪輕仁義皆是心仁是天理根本處賊仁則大倫大法虧滅了便是殺人底人一般義是就一節一事上言一事上不合宜便是傷義似手足上損傷一般所傷者小尚可以補淳寓録同問孟子言賊仁賊義如何力行曰譬之伐木賊仁乃是伐其本根賊義只是殘害其一枝一葉人而賊仁則害了本心曰賊仁便是將三綱五常天敘之典天秩之理一齊壞了義隨事制宜賊義只是於此一事不是更有他事在力行問賊仁是絶滅天理賊義是傷敗彝倫如臣弒君子弒父及齊襄公鳥獸之行等事皆人倫大惡不審是絶滅天理是傷敗彝倫曰傷敗彝倫只是小小傷敗常理若此等乃是絶害天理了義剛録云傷敗彝倫只是小小傷敗常理如不以禮食不親迎之類若紾兄之臂踰東家牆底便是絶滅天理丹書怠勝敬者滅即賊仁者謂之賊意欲勝義者凶即賊義者謂之殘意賊義是就一事上說賊仁是就心上說其實賊義便即是賊那仁底但分而言之則如此淳義剛録同為巨室章問教玉人雕琢玉集注云不敢自治而付之能者愛之甚也治國家則不能用賢而徇私欲是愛國家不如玉也此莫是餘意否曰正意是如何曰正意只是說玉人自會琢玉何消教他賢者自有所學何用教他舍其所學後譬只是申解前譬曰兩譬又似不相似不知如何做得恁地嵯峨齊人伐燕勝之章齊人伐燕孟子以為齊宣史記以為湣王溫公平生不喜孟子及作通鑑卻不取史記而獨取孟子皆不可曉荀子亦云湣王伐燕然則非宣王明矣問孟子必不誤曰想得湣王後來做得不好門人為孟子諱故改為宣王爾問湣王若此之暴豈能慚於孟子曰既做得不是說得他底是他亦豈不愧也溫公通鑑中自移了十年據史記湣王十年伐燕今溫公信孟子改為宣王遂硬移進前十年溫公硬拗如此又云史記魏惠王三十六年惠王死襄王立襄王死哀王立今汲冢竹書不如此以為魏惠王先未稱王時為侯三十六年乃稱王遂為後元年又十六年而惠王卒即無哀王惠王三十六年了便是襄王史記誤以後元年為哀王立故又多了一哀王汲冢是魏安釐王冢竹書記其本國事必不會錯溫公取竹書不信史記此一段卻是僩此條有誤當從春秋解後序居之問取之而燕民悅則取之至文王是也竊疑文王豈有革商之念曰此等難說孔子謂可與立未可與權到那時事勢自是要住不得後人把文王說得忒恁地卻做一箇道行看著不做聲不做氣如此形容文王都沒情理以詩書考之全不是如此如詩自從太王王季說來如云至于太王實始翦商如下武之詩文王有聲之詩都說文王做事且如伐崇一事是做甚麼又不是一項小小侵掠乃是大征伐詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉此見大段動衆岐山之下與崇相去自是多少因甚如此這般處要做文王無意取天下他録作出做事都不得又如說侵自阮疆陟我高岡無矢我陵我陵我阿無飲我泉我泉我池這裏見都自據有其土地自是大段施張了或曰紂命文王得專征伐紂不得已命之文王不得已受之橫渠云不以聲色為政不以革命有中國默順帝則而天下歸焉其惟文王乎若如此說恰似內無純臣之義外亦不屬於商這也未必如此只是事勢自是不可已只當商之季七顛八倒上下崩頽忽於岐山下突出許多人也是誰當得文王之事惟孟子識之故七篇之中所以告列國之君莫非勉之以王道賀孫滕文公問滕小國也章問孟子答滕文公三段皆是無可奈何只得勉之為善之辭想見滕國至弱都主張不起故如此曰只是如此只是吾得正而斃焉之意蓋滕是必亡無可疑矣況王政不是一日行得底事他又界在齊楚之間二國視之猶太山之壓雞卵耳若教他粗成次第此二國亦必不見容也當時湯與文王之興皆在空間之地無人來覷他故日漸盛大若滕則實是難保也立之云若教他能舉國以聽孟子如何曰他若能用得孟子至二三十年使鄰國之民仰之若父母則大國亦想不能動他但世間事直是難得恰好耳齊梁之國甚彊可以有為而孟子與其君言恬然不恤滕文公卻有善意又以國小主張不起以此知機會真不易得也時舉魯平公將出章魯平公極是箇衰弱底人不知孟子要去見他是如何孟子平生大機會只可惜齊宣一節這箇不相遇其他也應是無可成之理如見滕文公說許多井田也是一場疏脫云有王者起必來取法孟子也只是說得在這裏滕也只是做不得賀孫
