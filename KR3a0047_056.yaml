body:
  text: 朱子語類卷第五十六孟子六離婁上離婁之明章上無道揆則下無法守儻上無道揆則下雖有奉法守一官者亦將不能用而去之矣朝不信道工不信度信如憑信之信此理只要人信得及自然依那箇行不敢逾越惟其不信所以妄作如胥吏分明知得條法只是他冒法以為姦便是不信度也因歎曰看得道理熟見世間事才是苟且底鮮有不害事雖至小之事以苟且行之必亦有害而況大事乎只是信不及所以苟且凡云且如此作且如此過去皆其弊也凡見人説某人做得事好做得事無病這便是循理若見人説某人做得有害其中必有病如今人所以苟且者只為見理不明故苟且之心多若是見得道理熟自然有所分別而不肯為惡矣卓僩録略上無禮下無學此學謂國之俊秀者前面工是百官守法度者此學字是責學者之事惟上無教下無學所以不好之人並起而居高位執進退黜陟之權盡做出不好事來則國之喪亡無日矣所以謂之賊民蠹國害民非賊而何然其要只在於仁者宜在高位所謂一正君而國定也僩問責難之恭陳善閉邪之敬何以別曰大概也一般只恭意思較闊大敬意思較細密如以堯舜三代望其君不敢謂其不能便是責難於君便是恭陳善閉邪是就事上説蓋不徒責之以難凡事有善則陳之邪則閉之使其君不陷於惡便是敬責難之恭是尊君之詞先立箇大志以先王之道為可必信可必行陳善閉邪是子細著工夫去照管務引其君於當道陳善閉邪便是做那責難底工夫不特事君為然為學之道亦如此大立志向而細密著工夫如立志以古聖賢遠大自期便是責難然聖賢為法於天下我猶未免為鄉人其何以到須是擇其善者而從之其非者而去之如日用間凡一事須有箇是有箇非去其非便為是克去己私便復禮如此雖未便到聖賢地位已是入聖賢路了淳責難於君謂之恭以堯舜責之而不敢以中才常主望之非尊之而何陳善閉邪謂之敬此是尊君中細密工夫問人臣固當望君以堯舜若度其君不足以為善而不之諫或謂君為中才可以致小康而不足以致大治或導之以功利而不輔之以仁義此皆是賊其君否曰然人臣之道但當以極等之事望其君責他十分事臨了只做得二三分若只責他二三分少間做不得一分矣若論才質之優劣志趣之高下固有不同然吾之所以導之者則不可問其才志之高下優劣但當以堯舜之道望他如飯必用喫衣必用著脾胃壯者喫得來多弱者喫得來少然不可不喫那飯也人君資質縱説卑近不足與有為然不修身得否不講學得否不明德得否此皆是必用做底到得隨他資質做得出來自有高下大小然不可不如此做也孔子曰敬事而信節用而愛人使民以時這般言語是鐵定底條法更改易不得如此做則成不如此做則敗豈可謂吾君不能而遂不以此望之也僩問責難於君謂之恭陳善閉邪謂之敬曰恭是就人君分上理會把他做箇大底人看致恭之謂也敬只是就自家身上做如陳善閉邪是在己當如此做燾賓師不以趨走承順為恭而以責難陳善為敬人君不以崇高富貴為重而以貴德尊士為賢則上下交而德業成矣燾規矩方圓之至章問規矩方圓之至也曰規矩是方圓之極聖人是人倫之極蓋規矩便盡得方圓聖人便盡得人倫故物之方圓者有未盡處以規矩為之便見於人倫有未盡處以聖人觀之便見惟聖人都盡無一毫之不盡故為人倫之至燾問欲為君至堯舜而已矣昨因看近思録如看二典便當求堯所以治民舜所以事君某謂堯所以治民修己而已舜所以事君誠身以獲乎上而已曰便是不如此看此只是大概説讀書之法而已如何恁地硬要樁定一句去包括他得若論堯所以治民舜所以事君是事事做得盡且如看堯典自欽明文思安安以至終篇都是治民底事自欽明文思至格于上下是一段自克明俊德至於變時雍又是一段自乃命羲和至庶績咸熙又是一段後面又説禪舜事無非是治民之事舜典自濬哲文明以至終篇無非事君之事然亦是治民之事不成説只是事君了便了只是大概言觀書之法如此或曰若論堯所以治民舜所以事君二典亦不足以盡之曰也大概可見僩或問道二仁與不仁而已矣不仁何以亦曰道曰此譬如説有小路有大路何疑之有去偽道二仁與不仁而已矣猶言好底道理不好底道理也若論正當道理只有一箇更無第二箇所謂夫道一而已矣者也因言胡季隨主其家學云云已下見胡仁仲類僩三代之得天下章廢興存亡惟天命不敢不從若湯武是也呂燾愛人不親章聖人説話是趲上去更無退後來孟子説愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之這都是趲向上去更無退下來如今人愛人不親更不反求諸己教你不親也休治人不治更不反求諸己教你不治也休禮人不答更不反求諸己教你不答也休我也不解恁地得你也不仁不義無禮無智我也不仁不義無禮無智大家做箇鶻突沒理會底人范忠宣所説以恕己之心恕人且如自家不孝也教天下人不消得事其親自家不忠也教天下人不消得事其君自家不弟也教天下人不消事其兄自家不信也教天下人不消信其友恁地得不得還有這道理否又曰張子韶説中庸所求乎子以事父未能也到事父下點做一句看他説以聖人之所難能這正是聖人因責人而點檢自家有未盡處如何恁地説了而今人多説章句之學為陋某看見人多因章句看不成句卻壞了道理又曰明道言忠恕二字要除一箇更除不得須是忠方可以行其恕若自家不穿窬便教你不穿窬方喚做恕若自家穿窬卻教別人不穿窬這便不是恕若自家穿窬也教大家穿窬這也不是恕雖然聖人之責人也輕如所謂以人治人改而止教他且存得這道理也得小人革面教他且革面也得又不成只恁地也須有漸又曰堯舜其猶病諸聖人終是不足賀孫為政不難章吳伯英問不得罪於巨室曰只是服得他心佐天下有道章小德役大德小賢役大賢是以賢德論小役大弱役強全不賭是只是以力論振鄭問小役大弱役強亦曰天何也曰到那時不得不然亦是理當如此淳仁不可為衆為猶言難為弟難為兄之為言兄賢難做他弟弟賢難做他兄仁者無敵難做衆去抵當他端蒙仁不可為衆也毛公注亦云盛德不可為衆也鳶飛戾天注亦曰言其上下察也此語必別有箇同出處如金聲玉振兒寬云天子建中和之極兼總條貫金聲而玉振之亦必是古語不能自強則聽天所命修德行仁則天命在我今之為國者論為治則曰不消做十分底事只隨風俗做便得不必須欲如堯舜三代只恁地做天下也治為士者則曰做人也不須做到孔孟十分事且做得一二分也得盡是這樣苟且見識所謂聽天所命者也僩自暴者章問自暴自棄之別曰孟子説得已分明看來自暴者便是剛惡之所為自棄者便是柔惡之所為也時舉自暴是非毀道理底自棄是自放棄底賜言非禮義以禮義為非而拒之以不信自暴自賊害也吾身不能居仁由義自謂不能而絶之以不為自棄自棄絶也閎祖先生問梁自暴自棄如何梁未答先生曰言非禮義非如非先生之道之非謂所言必非詆禮義之説為非道是失之暴戾我雖言而彼必不肯聽是不足與有言也自棄者謂其意氣卑弱志趣凡陋甘心自絶以為不能我雖言其仁義之美而彼以為我必不能居仁由義是不足有為也故自暴者強自棄者弱伊川云自暴者拒之以不信自棄者絶之以不為梁云平日大為科舉纍曰便是科舉不能為纍卓問向所説自暴作自粗暴與今集注暴害也不同曰也只是害底是如暴其民甚言非禮義謂之自暴要去非議這禮義如今人要罵道學一般只説道這許多做好事之人自做許多模樣不知這道理是人人合有底他自恁地非議是他自害了這道理賀孫仁人之安宅義人之正路自人身言之則有動靜自理言之則是仁義祖道居下位章誠是天道在人只説得思誠泳敬之問誠者天之道也思誠者人之道也思誠莫須是明善否曰明善自是明善思誠自是思誠明善是格物致知思誠是毋自欺慎獨明善固所以思誠而思誠上面又自有工夫在誠者都是實理了思誠者恐有不實處便思去實它誠者天之道天無不實寒便是寒暑便是暑更不待使它恁地聖人仁便真箇是仁義便真箇是義更無不實處在常人説仁時恐猶有不仁處説義時恐猶有不義處便著思有以實之始得時舉問至誠而不動者未之有也不誠未有能動者也此是以實理見之於用故便有感通底道理曰不是以實理去見之於用只是既有其實便自能感動得人也因言孟子於義利間辨得毫釐不差見一事來便劈做兩片便分箇是與不是這便是集義處義是一柄刀相似才見事到面前便與他割制了時舉伯夷辟紂章才卿問伯夷是中立而不倚下惠是和而不流否曰柳下惠和而不流之事易見伯夷中立不倚之事何以驗之陳曰扣馬之諫餓而死此是不倚曰此謂之偏倚亦何可以見其不倚文蔚録云如此卻是倚做一邊去文蔚曰他雖如此又卻不念舊惡曰亦不相似劉用之曰伯夷居北海之濱若將終身焉及聞西伯善養老遂來歸之此可見其不倚否曰此下更有一轉方是不倚蓋初聞文王而歸之及武王伐紂而去之遂不食周粟此可以見其不倚也僩文蔚録意同求也為季氏宰章至之問如李悝盡地力之類不過欲教民而已孟子何以謂任土地者亦次於刑曰只為他是欲富國不是欲為民但強占土地開墾將去欲為己物耳皆為君聚斂之徒也時舉辟草萊任土地者次之如李悝盡地力商鞅開阡陌他欲致富強而已無教化仁愛之本所以為可罪也僩恭者不侮人章聖人但顧我理之是非不問利害之當否衆人則反是且如恭儉聖人但知恭儉之不可不為爾衆人則以為我不侮人則人亦不侮我我不奪人則人亦不奪我便是計較利害之私要之聖人與衆人做處便是五峰所謂天理人欲同行而異情者也道夫淳于髡曰章事有緩急理有大小這樣處皆須以權稱之或問執中無權之權與嫂溺援之以手之權微不同否曰執中無權之權稍輕嫂溺援之以手之權較重亦有深淺也僩人不足與適章大人格君心之非此謂精神意氣自有感格處然亦須有箇開導底道理不但默默而已伊川解遇主于巷所謂至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意正此意也或曰設遇暗君將如何而格之曰孔子不能格魯哀孟子不能格齊宣諸葛孔明之於後主國事皆出於一己將出師先自排布宮中府中許多人後主雖能聽從然以資質之庸難以變化孔明雖親寫許多文字與之亦終不能格之凡此皆是雖有格君之理而終不可以致格君之效者也謨可學録云問有不好君如何格曰其精神動作之間亦須有以格之要之有此理在我而在人者不可必人不足與適至格君心之非三句當作一句讀某嘗説此處與言不必信行不必果惟義所在皆須急忙連下句讀若偶然脫去下句豈不害事方子人之患章孟子一句者如人之患在好為人師之類當時議論須多今其所記者乃其要語爾孟子謂樂正子曰章德修謂樂正子從子敖之齊未必徒餔啜曰無此事豈可遽然加以此罪文蔚仁之實章或問事親從兄一段曰緊要在五箇實字上如仁是親親而仁民仁民而愛物義是長長貴貴尊賢然在家時未便到仁民愛物未事君時未到貴貴未從師友時未到尊賢且須先從事親從兄上做將去這箇便是仁義之實仁民愛物貴貴尊賢是仁義之英華若理會得這箇便知得其他那分明見得而守定不移便是智之實行得恰好便是禮之實由中而出無所勉強便是樂之實大凡一段中必有緊要處這一段便是這箇字緊要胡泳仁之實事親是也義之實從兄是也此數句某煞曾入思慮來嘗與伯恭説實字有對名而言者謂名實之實有對理而言者謂事實之實有對華而言者謂華實之實今這實字不是名實事實之實正是華實之實仁之實本只是事親推廣之愛人利物無非是仁義之實本只是從兄推廣之忠君弟長無非是義事親從兄便是仁義之實推廣出去者乃是仁義底華采文蔚問仁義之實曰須是理會得箇實字方曉得此章意思這實字便是對華字且如愛親仁民愛物無非仁也但是愛親乃是切近而真實者乃是仁最先發去處於仁民愛物乃遠而大了義之實亦然夔孫事親是孝從兄是弟堯舜之道孝弟而已今人將孝弟低看了孝弟之至通于神明光于四海直是如此竇問仁之實事親是也竊謂實者是事親得其歡心當此時直是和悅此是實否曰不然此乃樂之實樂斯二者之事但事親從兄是仁義之根實處最初發得來分曉向亦曾理會此實字卻對得一箇華字親親仁也仁民愛物亦仁也事親是實仁民愛物乃華也德明問事親從兄有何分別曰事親有愛底意思事兄有嚴底意思又曰有敬底意思問從兄如何為義之實曰言從兄則有可否問所以同處如何曰不當論同問伊川以為須自一理中別出此意如何曰只是一箇道理發出來偏於愛底些子便是仁偏於嚴底些子便是義又曰某怕人便説理一節問事之當為者皆義也如何專以從兄言之曰從兄乃事之當為而最先者又問事親豈非事之當為而不歸之義何也曰己與親乃是一體豈可論當為不當為柄問義之實從兄是也曰義是那良知良能底發端處雖小兒子莫不愛父母到長大方理會得從兄所謂及其長也無不知敬其兄此義發端處植問孟子言義之實從兄是也中庸卻言義者宜也尊賢為大甚不同如何曰義謂得宜尊賢之等道理宜如此曰父子兄弟皆是恩合今以從兄為義何也曰以兄弟比父子已是爭得些問五典之常義主於君臣今曰從兄又曰尊賢豈以隨事立言不同其實則一否曰然德明問孟子言羞惡之心義之端也又曰義之實從兄是也不知羞惡與從兄之意如何相似曰不要如此看且理會一處上義理教通透了方可別看如今理會一處未得卻又牽一處來滾同説少間愈無理會處聖賢説話各有旨歸且與他就逐句逐字上理會去木之問性中雖具四端五常其實只是一理故孟子獨以仁義二者為主而以禮為節文斯二者智為知斯二者柄謂仁義二者之中又當以仁為主蓋仁者愛之理愛之得其當則義也曰義卻是當愛不當愛柄問仁之實事親是也一段似無四者只有兩箇以禮為節文斯二者智是知斯二者只是兩箇生出禮智來曰太極初生亦只生陰陽然後方有其他底節問孟子言禮之實節文斯二者知之實知斯二者禮知似無專位今以四德言卻成有四箇物事曰也只是一處如此説有言四箇底有言兩箇底有言三箇底不成説道他只説得三箇遺了一箇不説四箇言兩箇如扇一面青一面白一箇説這一邊謂之青扇一箇説那一邊謂之白扇不成道説青扇底是説白扇底不是節專言仁則包三者言仁義則又管攝禮智二者如智之實知斯二者禮之實節文斯二者是也德明問節文之文曰文是裝裹得好如升降揖遜節節者等級也文不直回互之貌節朱蜚卿問樂則生矣生則惡可已也曰如今恁地勉強安排如何得樂到得常常做得熟自然浹洽通快周流不息油然而生不能自已只是要到這樂處實是難在若只恁地把捉安排才忘記又斷了這如何得樂如何得生問如今也且著恁地把捉曰固是且著恁地須知道未是到處須知道樂則生處是當到這地頭恰似春月草木許多芽櫱一齊爆出來更止遏不得賀孫問如孩提之童無不知愛其親及其長也無不知敬其兄這箇不是旋安排這只就他初發上説曰只如今不能常會如此孩提知愛其親如今自失了愛其親意思及其長也知敬其兄如今自失了敬其兄意思須著理會孟子所以説大人者不失其赤子之心須要常常恁地要之須是知得這二者使常常見這意思方會到得樂則生矣處要緊卻在知斯二者弗去是也二句上須是知得二者是自家合有底不可暫時失了到得禮之實節文斯二者既知了又須著檢點教詳密子細節節應拍方始會不間斷方始樂方始生孟子又云知皆擴而充之若火之始然泉之始達苟能充之足以保四海苟不充之不足以事父母與知斯二者節文斯二者一段語勢有不同一則説得緊急一則説得有許多節次次序詳密又曰樂則生如水之流撥盡許多擁塞之物只恁地滔滔流將去賀孫天下大悅章不得乎親不可以為人不順乎親不可以為子得乎親者不問事之是非但能曲為承順則可以得其親之悅苟父母有做得不是處我且從之苟有孝心者皆可然也順乎親則和那道理也順了非特得親之悅又使之不陷於非義此所以為尤難也僩恭父問不得乎親以心言不順乎親以道言道謂喻父母於道恐如此看得不可為人不可為子兩字出曰人字只説大綱子字卻説得重不得乎親之心固有人承親順色看父母做甚麼事不問是非一向不逆其志這也是得親之心然猶是淺事惟順乎親則親之心皆順乎理必如此而後可以為子所以又説蒸蒸乂不格姦瞽瞍砥豫而天下化瞽瞍砥豫而天下之為父子者定賀孫不順乎親不可以為子是無一事不是處和親之心也順了下面所以説瞽瞍砥豫舜盡事親之道而瞽瞍砥豫瞽瞍砥豫而天下化瞽瞍砥豫而天下之為父子者定此之謂盡性人傑
