body:
  text: 朱子語類卷第九十七程子之書三此卷係遺書中非入近思與四書等注者以類而從為一卷文集附或問尹和靖言看語録伊川云某在何必看此此語如何曰伊川在便不必看伊川不在了如何不看蓋卿録云若伊川不在則何可不讀只是門人所編各隨所見淺深卻要自家分別它是非前輩有言不必觀語録只看易傳等書自好天下亦無恁地道理如此則只當讀六經不當看論孟矣天下事無高無下無小無大若切己下工夫件件是自家底若不下工夫擇書來看亦無益先生又言語録是雜載只如間說一件話偶然引上經史上便把來編了明日人又隨上面去看直是有學力方能分曉謙以下論語録問遺書中有十餘段說佛處似皆云形上直內與聖人同卻有一兩處云要之其直內者亦自不是此語見得甚分明不知其它所載莫是傳録之差曰固是才經李端伯呂與叔劉質夫記便真至游定夫便錯可惜端伯與叔質夫早喪使此三人者在於程門之道必有發明可學謂此事所係非輕先生盍作一段文字為辨明之曰須待為之因說芮國器嘗云天下無二道聖人無兩心如何要排佛曰只為無二道故著不得它佛法只是作一無頭話相欺誑故且恁地過若分明說出便窮可學記録言語難故程子謂若不得某之心則是記得它底意思今遺書某所以各存所記人之姓名者蓋欲人辨識得耳今觀上蔡所記則十分中自有三分以上是上蔡意思了故其所記多有激揚發越之意游氏所說則有溫純不決之意李端伯所記則平正質夫所記雖簡約然甚明切看得來劉質夫那人煞高惜乎不壽廣伊川語各隨學者意所録不應一人之說其不同如此游録語慢上蔡語險劉質夫語簡永嘉諸公語絮振李端伯語録宏肆劉質夫語記其髓方子坐客有問侯先生語録異同者曰侯氏之說多未通胡先生嘗薦之羅他録作楊後延平先生與相會頗謂胡先生稱之過當因言其人輕躁不定羅先生雖以凜然嚴毅之容與相待度其頗難之但云其游程門之久甚能言程門之事然於道理未有所見故其說前後相反沒理會有與龜山一書賀孫張思叔語録多作文故有失其本意處不若只録語録為善方子楊志仁問明道說話曰最難看須是輕輕地挨傍它描摸它意思方得若將來解解不得須是看得道理大段熟方可看節先生問近來全無所問是在此做甚工夫義剛對數日偶看遺書數版入心遂乘興看數日先生曰遺書録明道語多有只載古人全句不添一字底如曰思無邪如曰聖人以此齊戒以神明其德夫皆是亦有重出者是當時舉此句教人去思量先生語至此整容而誦聖人以此齊戒以神明其德夫曰便是聖人也要神明這箇本是一箇靈聖底物事自家齊戒便會靈聖不齊戒便不靈聖古人所以七日戒三日齊胡叔器曰齊戒只是敬曰固是敬但齊較謹於戒湛然純一之謂齊肅然警惕之謂戒到湛然純一時那肅然警惕也無了義剛胡明仲文伊川之語而成書凡五日而畢世傳河南夫子書乃其略也方問欲取程氏遺書中緊要言語分為門類作一處看庶得前後言語互相發明易於融會如何曰若編得也好只恐言仁處或說著義言性處或說著命難入類耳浩學者宜先看遺書次看尹和靖文字後乃看上蔡文字以發光彩且已不述其說也季通語方伊川語尹曰夫子沒而微言絶異端起而大義乖不知數十年後人將謂我是何如人作說怪異模樣又三録中說且得它見得不錯已是好所以楊謝如此方改文字自是難有時意思或不好便把來改待得再看又反不如前底是以此見皆在此心如何才昏便不得或有所遷就或有所回避或先有所主張隨其意之所重義理便差了器之問程子語有何疑處曰此等恐録得差或恐是一時有箇意思說出或是未定之論今且怕把人未定之論便喚做是也是切害如今言語最是難得一一恰好或有一時意思見得是如此它日所見或未必然惟聖人說出句句字字都恰好這只是這箇心只是聖人之心平一賀孫記録言語有不同處如伊川江行事有二處載一本云伊川自涪陵舟行遇風舟人皆懼惟伊川不動岸上有負薪者遙謂之曰達後如此捨後如此伊川欲答之而舟去已遠矣一本謂既至岸或問其故伊川曰心存誠敬爾或曰心存誠敬曷若無心伊川欲與之言已忽不見矣某嘗謂前說不然蓋風濤洶湧之際負薪者何以見其不懼而語言又何以相聞邪孰若無心之說謂隱者既言則趨而辟之可也謂其忽然不見則若鬼物然必不然矣又況達之與捨只是一事安得有分別邪人傑論日之行到寅寅上光到卯卯上光電是陰陽相軋如以石相磨而火生長安西風而雨因食韭言天地間寒暖有先後或傳京師少雷恐是地有高下霹靂震死是惡氣相擊搏凡此數條者果皆有此理否曰此皆一時談論所及學者記録如此要之天地陰陽變化之機日月星辰運行之度各有成說而未可以立談判也明道詩有思入風雲變態中之語前輩窮理何事不極其至今所疑數條其間必自有說且洊雷震君子以恐懼修省聖人垂訓如此則霹靂震死等事理之所有不可以為無也謨以下天地性理伊川云測景以三萬里為準若有窮然有至一邊已及一萬五千里者而天地之運蓋如初也此言蓋誤所謂升降一萬五千里中者謂冬夏日行南陸北陸之間相去一萬五千里耳非謂周天只三萬里閎祖程氏遺書一段說日月處諸本皆云不如三焦說周回而行不曉其義後見一本云不如舊說周回而行乃傳寫之誤雉十五卷必有無種之人生於海島十八卷太古之時人有牛首蛇身金山得龍卵龍湧水入寺取卵而去涪州見村民化虎此數條皆記録者之誕曰以太極之旨而論氣化之事則厥初生民何種之有此言海島無人之處必有無種之人不足多怪也龍亦是天地間所有之物有此物則有此理取卵而去容或有之村民化虎其說可疑或恐此人氣惡如虎它有所感召未足深較也謨問遺書中有數段皆云人與物共有此理只是氣昏推不得此莫只是大綱言其本同出若論其得此理莫已不同曰同曰既同則所以分人物之性者卻是於通塞上別如人雖氣稟異而終可同物則終不可同然則謂之理同則可謂之性同則不可曰固然但隨其光明發見處可見如螻蟻君臣之類但其稟形既別則無復與人通之理如獮猴形與人略似則便有能解野狐能人立故能為怪如豬則極昏如草木之類荔枝牡丹乃發出許多精英此最難曉可學伊川說海漚一段與橫渠水冰說不爭多可學問程子說性一條云學者須要識得仁體若知見得便須立誠敬以存之是如何曰公看此段要緊是那句曰是誠敬二字上曰便是公不會看文字它說要識仁要知見得方說到誠敬末云吾之心即天地之心吾之理即萬物之理一日之運即一歲之運這幾句說得甚好人也會解得只是未必實見得向編近思録欲收此段伯恭以為怕人曉不得錯認了程先生又說性即理也更說得親切曰佛氏所以得罪於聖人止緣它只知有一身而不知有天地萬物曰如今人又忒煞不就自身己理會又問性即理何如曰物物皆有性便皆有其理曰枯槁之物亦有理乎曰不論枯槁它本來都有道理因指案上花瓶云花瓶便有花瓶底道理書燈便有書燈底道理水之潤下火之炎上金之從革木之曲直土之稼穡一一都有性都有理人若用之又著順它理始得若把金來削做木用把木來鎔做金用便無此理曰西銘之意與物同體體莫是仁否曰固是如此然怎生見得意思是如此與物同體固是仁只便把與物同體做仁不得恁地只說得箇仁之軀殼須實見得方說得親切如一碗燈初不識之只見人說如何是燈光只恁地摶摸只是不親切只是便把光做燈不得賀孫明道言學者須先識仁一段說話極好只是說得太廣學者難入人傑問一段說性命下卻云見於事業之謂理理字不甚切曰意謂理有善有惡但不甚安良久又曰上兩句正是天命之謂性下一句是率性之謂道中庸是就天性上言此是就事物上言亦無害可學呂與叔謂養氣可以為養心之助程先生以為不然養心只是養心又何必助如為孝只是為孝又何必以一事助之某看得來又不止此蓋才養氣則其心便在氣上了此所以為不可也廣呂與叔言養氣可以為養心之助程先生大以為不然某初亦疑之近春來方信心死在養氣上氣雖得其養卻不是養心了方子問呂與叔有養氣之說伊川有數處皆不豫之養氣莫亦不妨只是認此為道卻不是曰然又問一處說及平日思慮如何曰此處正是微涉於道故正之可學遺書論命處注云聖人非不知命然於人事不得不盡如何曰人固有命可是不可不順受其正如知命者不立乎巖牆之下是若謂其有命卻去巖牆之下立萬一倒覆壓處卻是專言命不得人事盡處便是命去僞問觀雞雛此可觀仁何也曰凡物皆可觀此偶見雞雛而言耳小小之物生理悉具必大仲思問遺書云看雞雛可以觀仁如何曰既通道理後這般箇久久自知之記曰善問者如攻堅木先其易者後其難者所以游先生問陰陽不測之謂神而程子問之曰公是揀難底問是疑後問故昨日與公說讀書須看一句後又看一句讀一章後又讀一章格物須格一物後又格一物見這箇物事道理既多則難者道理自然識得驤問遺書謂切脈可以體仁莫是心誠求之之意否曰還是切脈底是仁那脈是仁曰切脈是仁曰若如此則當切脈時又用著箇意思去體仁復問蜚卿曰仲思所說如何曰以伯羽觀之恐是觀雞雛之意曰如何曰雞雛便是仁也曰切脈體仁又如何曰脈是那血氣周流切脈則便可以見仁曰然恐只是恁地脈理貫通乎一身仁之理亦是恁地又問雞雛如何是仁道夫曰先生嘗謂初與嫩底便是曰如此看較分明蓋當是時飲啄自如未有所謂爭鬥侵陵之患者只此便是仁也道夫致道問仁則一不仁則二如何曰仁則公公則通天下只是一箇道理不仁則是私意故變詐百出而不一也時舉問和靖語録中有兩段言仁一云某謂仁者公而已伊川曰何謂也曰能好人能惡人伊川曰善涵養又云某以仁惟公可盡之伊川曰思而至此學者所難及也天心所以至仁者惟公耳人能至公便是仁先生曰人能至公便是仁此句未安然和靖言仁所見如此問伊川何不以一二語告之曰未知其如何可學伊川言一心之謂誠盡心之謂忠某看忠有些子是誠之用如惡惡臭如好好色十分真實恁地便是誠若有八九分恁地有一分不恁地便是夾雜些虛僞在內便是不誠忠便是盡心盡心亦是恁地便有些子是誠之用賀孫一心之謂誠盡己之謂忠誠是實理自然如此此處卻不曾帶那動只恁地平放在這裏忠卻是處事待物見得卻是向外說來端蒙盡心之謂忠一心之謂誠存於中之謂孚見諸事之謂信問中孚之義先生引伊川蓋孚字從爪從子取鳥抱卵之義言人心之所存者實有是物也僩問誠然後能敬未知誠須敬然後誠敬小誠大如何說曰必存此實理方能敬只是此一敬字聖人與學者深淺自異可學問程子曰天下善惡皆天理何也曰惻隱是善於不當惻隱處惻隱即是惡剛斷是善於不當剛斷處剛斷即是惡雖是惡然原頭若無這物事卻如何做得本皆天理只是被人欲反了故用之不善而為惡耳必大問善惡皆天理如何曰此只是指其過處言如惻隱之心仁之端本是善才過便至於姑息羞惡之心義之端本是善才過便至於殘忍故它下面亦自云謂之惡者本非惡但或過或不及便如此文蔚問天下善惡皆天理楊墨之類只是過不及皆出於仁義謂之天理則可如世之大惡謂之天理可乎曰本是天理只是翻了便如此如人之殘忍便是翻了惻隱如放火殺人可謂至惡若把那去炊飯殺其人之所當殺豈不是天理只緣翻了道理有背有面順之則是背之則非緣有此理方有此惡如溝渠至濁當初若無清冷底水緣何有此或問善惡皆天理也若是過與不及些小惡事固可說天理如世間大罪惡如何亦是天理曰初來本心都自好少間多被利害遮蔽如殘賊之事自反了惻隱之心是自反其天理賀孫問既是反了天理如何又說皆天理也莫是殘賊底惡初從羞惡上發淫溺貪欲底惡初從惻隱上發後來都過差了原其初發都是天理曰如此說亦好但所謂反者亦是四端中自有相反處如羞惡自與惻隱相反是非自與辭遜相反如公說也是好意思因而看得舊一句不通處出如用人之智去其詐用人之勇去其暴這兩句意分曉惟是用人之仁去其貪一句沒分曉今公說貪是愛上發來也是思之是淳善底人易得含胡苟且姑息貪戀賀孫善只是當恁地底惡只是不當恁地底善惡皆是理但善是那順底惡是反轉來底然以其反而不善則知那善底自在故善惡皆理也然卻不可道有惡底理端蒙問天只是以生為道繼此生理便是善善便有一箇元底意思生便是繼如何分作兩截曰此亦先言其理之統如此然亦未甚安有一人云元當作無尤好笑可學孟子說性善是就用處發明人性之善程子謂乃極本窮原之性卻就用處發明本理人傑季容甫問中理在事義在心如何曰中理只是做得事來中理義則所以能中理者也義便有揀擇取舍易傳曰在物為理處物為義問天地設位一段明道云見劉質夫録論人神處天地設位合道易字道它字不得不知此說如何曰明道說話自有不論文義處可學問遺書有古言乾坤不用六子一段如何曰此一段卻主張是自然之理又有一段卻不取可學問遺書首卷體道之說曰體猶體當體究之體言以自家身己去體那道蓋聖賢所說無非道者只要自家以此身去體它令此道為我之有也如克己便是體道工夫僩以下為學工夫謝氏記明道語既得後須放開此處恐不然當初必是說既得後自然從容不迫它記得意錯了謝氏後來便是放開周恭叔又是放倒因舉伊川謂持之太甚便是助長亦須且恁去助長固是不好然合下未能到從容處亦須且恁去猶愈於不能執捉者淳既得後須放開此亦非謂須要放開但謂既有所得自然意思廣大規模開擴若未能如此便是未有得只是守耳蓋以放開與否為得與未得之驗若謂有意放開則大害事矣上蔡謂周恭叔放開太早此語亦有病也論遺書中說放開二字先生曰且理會收斂問昨日論橫渠言得尺守尺得寸守寸先生卻云須放寬地步如何曰只是且放寬看將去不要守殺了橫渠說自好但如今日所論卻是太局促了德明先生問遺書中欲夾持這天理則在德一段看得如何必大對曰中庸所謂苟不至德至道不凝焉先生默然久之必大問如何曰此亦說得然只是引證畢竟如何是德曰只是此道理因講習躬行後見得是我之所固有故守而勿失耳曰尋常看據於德如何說必大以橫渠得寸守寸得尺守尺對曰須先得了方可守如此說上依舊認德字未著今且說只是這道理然須長長提撕令在己者決定是做得如此如方獨處默坐未曾事君親接朋友然在我者已渾全是一箇孝弟忠信底人以此做出事來事親則必孝事君則必忠與朋友交則必信不待旋安排蓋存於中之謂德見於事之謂行易曰君子以成德為行正謂以此德而見諸事耳德成於我者若有一箇人在內必定孝弟忠信斷不肯為不孝不弟不忠不信底事與道家所謂養成箇嬰兒在內相似凡人欲邊事這箇人斷定不肯教自家做故曰默而成之不言而信存乎德行謂雖未曾說出來時存於心中者已斷是如此了然後用得戒慎恐懼存養工夫所以必用如此存養者猶恐其或有時間斷故耳程子所謂須有不言而信者謂未言動時已渾全是箇如此人然卻未有跡之可言故曰言難為形狀又言學者須學文知道者進德而已有德則不習無不利自初學者言之它既未知此道理則教它認何為德故必先令其學文既學文後知得此道理了方可教其進德聖人教人既不令其躐等級做進德工夫不令其止於學文而已德既在己則以此行之耳不待外面勉強旋做故曰有德則不習無不利凡此工夫全在收斂近裏而已中庸末章發明此意至為深切自衣錦尚絅以下皆是只暗暗地做工夫去然此理自掩蔽不得故曰暗然而日章小人不曾做時已報得滿地人知然實不曾做得故曰的然而日亡淡而不厭簡而文溫而理皆是收斂近裏知遠之近知風之自知微之顯一句緊一句先生再三誦此六言曰此工夫似淡而無味然做時卻自有可樂故不厭似乎簡略然大小精粗秩然有序則又不止於簡而已溫而理溫厚似不可曉而條目不可亂是於有序中更有分別如此入細做工夫故能知遠之近知風之自知微之顯夫見於遠者皆本於吾心可謂至近矣然猶以己對物言之知風之自則知凡見於視聽舉動者其是非得失必有所從來此則皆本於一身而言矣至於知微之顯則又說得愈密夫一心至微也然知其極分明顯著學者工夫能如此收斂來方可言德然亦未可便謂之德但如此則可以入德矣其下方言尚不愧於屋漏蓋已能如此做入細工夫知得分明了方能慎獨涵養其曰不動而敬不言而信蓋不動不言時已是箇敬信底人了又引詩不顯維德豫懷明德德輶如毛言之一章之中皆是發明箇德字然所謂德者實無形狀故以無聲臭終之必大伊川云敬則無己可克其說高矣然夫子當時只告顏子以克己復禮而已蓋敬是常常存養底道理克己是私欲發時便與克除去兩不相妨孔子告顏子克己之論下面又有為仁由己而由人乎哉之語在璘問主敬不接視聽須得如此否曰蓋有此樣人如許渤之類心要活活是生活之活對著死說活是天理死是人欲必大録云天理存則活人欲用則死周流無窮活便能如此伯豐問程子曰覺悟便是信如何曰未覺悟時不能無疑便半信半不信已覺悟了別無所疑即是信何以窒欲伊川曰思此莫是言欲心一萌當思禮義以勝之否曰然又問思與敬如何曰人於敬上未有用力處且自思入庶幾有箇巴攬處思之一字於學者最有力去僞惟思為能窒欲如何曰思與觀同如言第能於怒時遽忘其怒而觀理之是非蓋是非既見自然欲不能行升卿思可以勝欲亦是曰莫是要喚醒否曰然蔡問程子曰要息思慮便是不息思慮曰思慮息不得只敬便都沒了淳上床斷不可思慮事為思慮了沒頓放處如思慮處事思慮了又便做未得如思量作文思量了又寫未得遂只管展轉思量起來便儘思量不過如此某舊來緣此不能寐寧可呼燈來隨手寫了方睡得著程子贈溫公數珠只是令它數數而已如道家數息是也問事上之道莫若忠待下之道莫若恕莫是因事言之曰此說不知如何郭子和亦如此說如潔矩豈無事上之恕可學程子曰積習儘有功禮在何處積習在學者事到積習熟時即和禮亦不見矣必大問從善如登是進向上底意抑難底意曰從善積纍之難從惡淪胥之易從善卻好然卻難從惡便陷得易了淳問蘇季明治經傳道一段曰明道只在居業上說忠信便是誠曰誠字說來大如何執捉以進德曰由致知格物以至誠意處則誠矣曰此是聖人事學者如何用功曰此非說聖人乃是言聖人之學如此若學者則又有說話乾言聖人之學故曰忠信所以進德修辭立其誠所以居業坤言賢人之學故曰敬以直內義以方外忠信便是在內修辭是在外問何不說事卻說辭曰事尚可欺人辭不可掩故曰言顧行行顧言曰既分聖賢之學其歸如何曰歸無異但著乾所言便有自然底意思坤所言只是作得持守終無自然底氣象正如孔子告顏淵以克己而告仲弓以敬恕曰伊川云敬則無己可克則又與顏淵無異矣曰不必如此看且各就門戶做若到彼處自入得尤好只是其分界自如此可學問伊川語龜山勿好著書著書則多言多言則害道如何曰怕分卻心自是於道有害大雅居甫問伊川云隨時變易乃能常久不知既變易何以反能久曰一出一入乃能常如春夏秋冬乃天地之常久使寒而不暑暑而不寒安能常久可學呂舍人記伊川說人有三不幸以為有高才能文章亦謂之不幸便是這事乖少間盡被這些子能解擔閣了一生便無暇子細理會義理只從外面見得些皮膚便說我已會得筆下便寫得去自然無暇去講究那精微被人扛得來大又被人以先生長者目我更不去下問少間傳得滿鄉滿保都是這般種子橫渠有一段說人多為人以前輩見處每事不肯下問壞了一生我寧終是不知此段最好看僩自家既有此身必有主宰理會得主宰然後隨自家力量窮理格物而合做底事不可放過些子因引程子言如行兵當先做活計節問以物待物一段上文云安可使小者亦大下又云用一心而處之意似相背曰一心而處之只是言盡吾心耳可學樂意相關禽對語生香不斷樹交花程子云可以見得浩然之氣先生云此只是無間斷之意看相關對語不斷交花便見得端蒙問遺書云堯舜幾千年其心至今在何謂也曰此是心之理今則分明昭昭具在面前淳以下聖賢及先儒問伊川言象憂亦憂象喜亦喜與孔子微服而過宋相類曰舜知象之將殺己而象憂則亦憂象喜則亦喜孔子知恆魋必不能害而又微服過宋此兩事若相拗然皆是道並行而不相悖故云相類非謂舜與孔子事一一相類也銖節録云舜知象欲殺己而不防夫子知桓魋不能殺己而微服此兩事甚相拗故伊川曰相類問伊川曰聖人與理為一無過不及中而已敢問顏子擇乎中庸未見其止歎夫子瞻前忽後則過不及雖不見於言行而亦嘗動於心矣此亦是失否曰此一段說得好聖人只是一箇中底道理去僞問有顏子之德則孟子之事功自有與說才誠處一段不同恐彼是說天資之才與此才別到得理明無不可用是理明則天資之才不用曰然可學周茂叔納拜已受去如何還可學問遺書中說孔孟一段看見不甚有異南軒好提出曰明道云我自做天裏此句只是帶過後來卻說是以天自處便錯了要之此句亦是明道一時之意思如此今必欲執以為定說卻向空去了可學問明道行狀謂未及著書而今有了翁所跋中庸何如曰了翁初得此書亦疑行狀所未嘗載後乃謂非明道不能為此了翁之姪幾叟龜山之壻也翁移書曰近得一異書吾姪不可不見幾叟至次日翁冠帶出此書幾叟心知其書非是未敢言翁問曰何疑曰以某聞之龜山乃與叔初年本也翁始覺遂不復出近日陸子靜力主以為真明道之書某云卻不要與某爭某所聞甚的自有源流非強說也兼了翁所舉知仁勇之類卻是道得著至子靜所舉沒意味也道夫伊川前後進講未嘗不齊戒潛思存誠如此則未進講已前還有間斷否曰不然尋常未嘗不誠只是臨見君時又加意爾如孔子沐浴而告哀公是也去僞問伊川臨終時或曰平生學底正要今日用伊川開目曰說要用便不是此是如何曰說要用便是兩心僩魏問橫渠言十五年學恭而安不成明道曰可知是學不成有多少病在莫是如伊川說若不知得只是覷卻堯學它行事無堯許多聰明睿知怎生得似它動容周旋中禮曰也是如此更有多少病良久曰人便是被一箇氣質局定變得些子了又更有些子變得些子又更有些子又云聖人發憤忘食樂以忘憂發憤便忘食樂便忘憂直是一刀兩段千了萬當聖人固不在說但顏子得聖人說一句直是傾腸倒肚便都了更無許多廉纖纏繞絲來線去問橫渠只是硬把捉故不安否曰它只是學箇恭自驗見不曾熟不是學箇恭又學箇安程先生幼年屢說須要井田封建到晚年又說難行見於暢潛道録想是它經歷世故之多見得事勢不可行淳問古不必删一段曰此是說井田伊川高明必見得是無不可行然不如橫渠更驗過則行出去無窒礙必大古不必驗因橫渠欲置田驗井田故云爾伊川說話多有如此處可學范純父言今人陳乞恩例義當然否人皆以為本分不為害伊川曰只為而今士大夫道得箇乞字慣卻動不動又是乞也因問陳乞封父祖如何伊川云此事體又別再三請益但云其說甚長待別時說先生云某因說甚長之意思之後來人只是投家狀便是陳乞了以至入仕事事皆然古者人有才德即舉用當時這般封贈朝廷自行之何待陳乞程先生之意恐然也觀後來郊恩都不曾為太中陳請則乞封贈程先生亦不為之矣揚問伊川於陳乞封父母之問云待別時說過謂此自出朝廷合行之禮當今有司檢舉行下亦不必俟陳乞也答云如此名義卻正過問謝顯道初見明道自負該博史書盡卷不遺一字明道曰賢卻記得許多可謂玩物喪志謝聞此言汗流浹背面發赤明道曰即此是惻隱之心夫為師問所折難而愧形於顏色與惻隱之心似不相屬明道乃云爾者何也曰此問卻要商量且何不曰羞惡之心而謂之惻隱之心諸公試各以己意言之黎季成對曰此恐是識痛癢底道理先生未以為然次日復以此請問先生曰只是謝顯道聞明道之言動一動為它聞言而動便是好處卻不可言學者必欲其動且如惻隱羞惡辭遜是非不是四件物合下都有偏言則一事總言則包四者觸其一則心皆隨之言惻隱之心則羞惡辭遜是非在其中矣又曰此心之初發處乃是惻隱如有春方有夏有惻隱方有羞惡也如根蒂相連蓋卿伊川問和靖近日看大學功夫如何和靖曰只看得心廣體胖處意思好伊川曰如何見得好尹但長吟心廣體胖一句而已看它一似瞞人然和靖不是瞞人底人公等讀書都不見這般意思僩又舉程子之言謂陳平知宰相之體先生問如何是理陰陽過未對曰下面三語便是理陰陽過以下雜類問程先生云自漢以來儒者皆不識此曰如仲舒語只約度有這物事韓退之雖知有這物事又說得太闊疏了燾魯叔問溫公薨背程子以郊禮成賀而不弔如何曰這也可疑或問賀則不弔而國家事體又重則不弔似無可疑曰便是不恁地所以東坡謂子於是日哭則不歌即不聞歌則不哭蓋由哀而樂則難由樂而哀則甚易且如早作樂而暮聞親屬緦麻之戚不成道既歌則不哭這箇是一腳長一腳短不解得平如所謂三揖而進一辭而退不成道辭亦當三這所在以某觀之也是伊川有些過處道夫問這事且看溫公諱日與禮成日同則弔之可也或已在先則更差一日亦莫未有害否曰似乎在先但勢不恁地自是合如此只如進以禮退以義罪疑惟輕功疑惟重天下事自是恁地稱停不得道夫問王祥孝感事伊川說如何曰程先生多有此處是要說物我一同然孝是王祥魚是水中物不可不別如說感應亦只言己感不須言物可學問伊川奪嫡之說不合禮經是當時有遺命抑後人為之邪先生曰亦不見得如何只侯師聖如此說問此說是否曰亦不見得是如何淳世間有鬼神馮依言語者蓋屢見之未可全不信本卷何以曰師巫降言無此理又好談鬼神者假使實有聞見亦未足信或是心病或是目病外書卻言不信神怪不可被猛撞出來後如何處置先生曰神怪之說若猶未能自明鮮有不惑者學者惟當以正自守而窮理之有無久久當自見得讀書講明義理到此等處雖有不同姑闕其疑以俟它日未晚也謨程先生謂莊生形容道體之語儘有好處老氏谷神不死一章最佳莊子云嗜欲深者天機淺此言最善又曰謹禮不透者深看莊子然則莊老之學未可以為異端而不講之耶曰君子不以人廢言言有可取安得而不取之如所謂嗜欲深者天機淺此語甚的當不可盡以為虛無之論而妄訾之也謨曰平時慮為異教所汨未嘗讀莊老等書今欲讀之如何曰自有所主則讀之何害要在識其意所以異於聖人者如何爾謨以下異端遺書說老子言雜陰符經卻不雜然皆窺測天道而未盡者也程先生可謂言約而理盡括盡二書曲折友仁持國曰道家有三住心住則氣住氣住則神住此所謂存存守一伯淳曰此三住者人終食之頃未有不離者其要只在收放心此則明道以持國之言為然而道家三住之說為可取也至第二卷何以有曰若言神住氣住則是浮屠入定之法雖言養氣亦是第二節事若是則持國當日之論容有未盡者或所記未詳如何曰二程夫子之為教各因其人而隨事發明之故言之抑揚亦或不同學者於此等處必求其所以為立言之意倘自為窒塞則觸處有礙矣與持國所言自是于持國分上當如此說然猶卒歸於收放心至闢之以為浮屠入定之說者是必嚴其辭以啓迪後進使先人之初不惑乎異端之說云爾謨外書録伊川語今僧家讀一卷經便要一卷經中道理受用儒者讀書卻只間了都無用處又明道嘗至禪房方飯見其趨進揖遜之盛歎曰三代威儀盡在是矣二說如何曰此皆歎辭也前說歎後之學者不能著實做工夫所以都無用處後說歎吾儒禮儀反為異端所竊取但其間記録未精故語意不圓所以為可疑耳謨李端伯所記第一條力闢釋氏說出山河大地等語歷舉而言之至論聖人之道則以為明如日星及其終也以為會得此便是會禪至與侯世興講孟子浩然之氣則舉禪語為況云事則不無擬心則差十五卷論中庸言無聲無臭勝如釋氏言非黃非白似又以中庸之言下與釋氏較勝負至如所謂灑掃應對與佛家默然處合與陳瑩中論天在山中大畜是芥子納須彌所引釋氏語不一而足如其闢異端之嚴而記者多録此何耶曰韓持國本好佛學明道與語而有便是會禪之說者蓋就其素所講明者因以入之今人多說闢異端往往於其教中茫然不知其說馮虛妄語宜不足以服之如明道諸先生實嘗深究其說盡得其所以為虛誕怪僻之要領故因言所及各有其旨未可以為苟徇其說也謨問遺書首篇明道與韓持國論禪一段看來韓持國只是曉得那低底禪嘗見范蜀公與溫公書說韓持國為禪作祟要想得山河大地無寸土不知還能無寸土否可將大樂與喚醒歸這邊來今觀明道答它至如山河大地之說是它山河大地又干你何事想是持國曾發此問來故明道如此說不知當初韓持國合下被甚人教得箇矮底禪如此然范蜀公欲以大樂喚醒不知怎生喚得它醒它方欲盡掃世間之物歸于至靜而彼欲以鬧底物引之亦拙矣況范蜀公之樂也可可地用之問此等說如何是矮底禪豈解更有一般高底禪曰不然它說世間萬法皆是虛妄然又都是真實你攻得它前面一項破它又有後面一項攻它不破如明道云若說幻為不好底性則請別尋一箇好底性來換了此不好底性此語也攻它不破它元不曾說這箇不是性它也說直指人心見性成佛何嘗說這箇不是性你說性外無道道外無性它又何嘗說性外有道道外有性來它之說有十分與吾儒相似處只終不是若見得吾儒之說則它之說不攻自破所以孟子說遁辭知其所窮它到說窮處便又有一樣說話如云世間萬法都是虛妄然又都是真實此又是如何今不須窮它窮得它一邊它又有一邊都莫問它只看得自家天命之謂性率性之謂道分曉了卻略將它說看過便見它底不是所以明道引孔子豫欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉只看這數句幾多分曉也不待解說只是玩味久之便見天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉天有四時春夏秋冬風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也多少分曉只是人自昏了所以道理也要箇聰明底人看一看便見也是快活人而今如此費人口頰猶自不曉又曰釋迦佛初間入山修行它也只是厭惡世諦為一身之計觀它修行大故用功未有後來許多禪底說話後來相傳一向說開了僩伊川謂釋氏之見如管中窺天只見直上不見四旁某以為不然釋氏之見蓋是瞥見水中天影耳方子禪家言性猶日下置器謂輪回也如以蟻性與牛是傾此於彼方子問昨日先生說佛氏但願空諸所有此固不是然明道嘗說胸中不可有一事如在試院推算康節數明日問之便已忘了此意恐亦是空諸所有底意曰此出上蔡語録中只是録得它自意無這般條貫顏子得一善則拳拳服膺而不失孟子必有事焉而勿忘何嘗要人如此若是箇道理須著存取只如易繫說過此以往未之或知亦只是雖欲從之末由也已之意在它們說便如鬼神變怪有許多不可知底事德明以下論記録之疑伊川曰實理者實見得是實見得非實理與實見不同今合說必記録有誤蓋有那實理人須是實見得見得恁地確定便有實見得又都間了淳先生顧陳安卿曰伊川說實理有不可曉處云實見得是實見得非恐是記者之誤見字上必有漏落理自是理見自是見蓋物物有那實理人須是實見得義剛曰理在物見在我曰是如此義剛問不當以體會為非心是如何曰此句曉未得它本是闢橫渠心小性大之說心性則一豈有小大橫渠卻自說心統性情不知怎生卻恁地說問不當以體會為非心故有心小性大之說如何是體會曰此必是橫渠有此語今其書中失之矣橫渠云心禦見聞不弘於性卻做兩般說渠說人能弘道非道弘人處云心能檢其性人能弘道也性不知檢其心非道弘人也此意卻好又不知它當初把此心性作如何分橫渠說話有差處多如此可學問游定夫所記如云一息不存非中也又曰君子之道無適不中故其心與中庸合此處必是記録時失正意曰不知所記如何其語極難曉可學問游定夫記程先生語所謂一物不該非中也一事不為非中也一息不存非中也何哉為其偏而已矣觀其意蓋以中為理偏為不周遍之意一物不該一事不為是說無物不有之意一息不存是說無時不然之意是否曰便是它說中字不著中之名義不如此它說偏字卻是一偏一偏便不周遍卻不妨但定夫記此語不親切不似程先生每常說話緣它夾雜王氏學當時王氏學盛行薰炙得甚廣一時名流如江民表彭器資鄒道卿陳了翁皆被薰染大片說去銖問自性而行皆善也以下當初必是以同此性而於其上如此分別記録不真了曰然可學問稱性之善一段曰不是又問心如何有形曰張敬夫極善此二字曰當初意思必是以心比性有少模倣故記如此曰然可學學者不可以不誠一段不是可學問內外得一段亦大寬曰然可學物各付物不役其知便是致知然最難此語未敢信恐記者之誤人傑問遺書有一段云致知在格物物來則知起物各付物不役其知則意自誠比其它說不同卻不曾下格物工夫曰不知此一段如何又問物來則知起似無害但以下不是曰亦須格方得可學問用方知不用則不知曰這說也是理會不得怕只是如道家通得未來底事某向與一術者對坐忽然云當有某姓人送簡至矣久之果然扣之則云某心先動了故知所謂用與不用怕如此恐伊川那時自因問答去今不可曉要附在至誠之道可以前知解中只攪得鶻突沒理會賀孫問遺書中云聖人於易言無思無為此戒夫作為此句須有錯曰疑當作此非戒夫作為可學問思入風雲變態中曰言窮理精深雖風雲變態之理思亦到節以下文集明道詩不須愁日暮天際是輕陰龜山語録說是時事梅臺詩亦說時事璘明道詩云旁人不識豫心樂將謂偷間學少年此是後生時氣象眩露無含蓄有鍾粹美兮會元之期元氣會則生聖賢歷家謂十一月朔夜半甲子冬至自是難得遇也砥問呂與叔問中處中者道之所從出某看呂氏意如何曰性者道之所從出云爾中即性也亦是此意只是名義未善大意卻不在此如程先生云中即道也若不論其意亦未安曰中即道也未安謂道所從出卻是就人為上說已陷了又云中即道也卻亦不妨又問若謂性與道大本與達道可混為一即未安以下云云至安得不為二乎程先生語似相矛盾曰大本達道性道雖同出要須於中識所以異又問中之為義自過不及而立名此段說中與平日異只為呂氏形容中太過故就其既發告之曰然又問若只以中為性以下云云至卻為近之曰此語不可曉當時問時辭意亦自窘束又問不倚之謂中不雜之謂和如何曰有物方倚得中未有物如何倚曰若是當倒說中則不倚曰亦未是不如不偏好又問中發出則自不雜是要見工夫處故以為未安曰不雜訓和不得可以訓不純游定夫云不乖之謂和卻好又問赤子之心處此是一篇大節目程先生云毫釐有異得為大本乎看呂氏此處不特毫釐差乃大段差然毫釐差亦不得聖人之心如明鏡止水赤子之心如何比得曰未論聖人與叔之失卻是認赤子之已發者皆為未發曰固是如此然若論未發時衆人心亦不可與聖人同曰如何不同若如此說卻是天理別在一處去了曰如此說即中庸所謂未發之中如何曰此卻是要存其心又是一段事今人未發時心多擾擾然亦有不擾擾時當於此看大抵此書答辭亦有反為所窘處當初不若只與論聖人之心如此赤子之心如彼則自分明又問引孟子心為甚如何曰孟子乃是論心自度非是心度物又問引允執厥中如何曰它把做已發言故如此說曰聖人智周以下終未深達又云言未有異又終未覺又云固未嘗以已發不同處指為大本雖如此說然所指又別曰然曰南軒云心體昭昭處分作兩段曰不是如此此說極好敬夫初唱道時好如此說話又問此一篇前項只是名義失最失處在赤子之心曰然可學鄭問呂氏與伊川論中書曰呂說大概亦是只不合將赤子之心一句插在那裏便做病赤子飢便啼寒便哭把做未發不得如大人心千重萬折赤子之心無恁勞攘只不過飢便啼寒便哭而已未有所謂喜所謂怒所謂哀所謂樂其與聖人不同者只些子問南軒辨心體昭昭為已發如何曰不消如此伊川只是改它赤子未發南軒又要去討它病淳施問赤子之心曰程子道是已發而未遠如赤子飢則啼渴則飲便是已發宇今人呼墓地前為明堂嘗見伊川集中書為券臺不曉所以南軒欲改之某云不可且留著後見唐人文字中言某朝詔改為券臺僩
