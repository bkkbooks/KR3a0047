body:
  text: 朱子語類卷第六十一孟子十一盡心下盡信書章孟子說盡信書不如無書者只緣當時恁地戰鬥殘戮恐當時人以此為口實故說此然血流漂杵看上文自說前徒倒戈攻其後以北不是武王殺他乃紂之人自蹂踐相殺荀子云所以殺之者非周人也商人也賀孫舜之飯糗茹草章或問二女果趙氏以果為侍有所據否曰某常推究此廣韻從女從果者亦曰侍也去僞好名之人章好名之人只是偶然能如此苟非其人苟非真能讓之人則簞食豆羹反見於色想見孟子亦少了幾箇字其人者指真能讓底人言子蒙讓千乘之國惟賢人能之然好名之人亦有時而能之然若不是真箇能讓之人則於小處不覺發見矣蓋好名之人本非真能讓國也徒出一時之慕名而勉強為之耳然這邊雖能讓千乘之國那邊簞食豆羹必見於色東坡所謂人能碎千金之璧而不能不失聲於破釜正此意也苟非其人其人指真能讓國者非指好名之人也僩徐孟寶問好名之人能讓千乘之國曰會得東坡說能碎千金之璧不能不失聲於破釜否曰如此則能讓千乘之國只是好名至簞食豆羹見於色卻是實情也曰然曰如此說時好名大故未是好事在曰只李守約之祖光祖刪定曾如此說來某嘗把此一段對向為身死而不受一段為義蓋前段是好名之人大處打得過小處漏綻也動於萬鍾者是小處遮掩得過大處發露也大雅民為貴章伊川云勾龍配食於社棄配食於稷始以其有功於水土故祀之今以其水旱故易之夫二神之功萬世所賴旱乾水溢一時之災以一時之災而遽忘萬世之功可乎曰變置社稷非是易其人而祀之也伊川之說也蓋言遷社稷壇場於他處耳謨仁也者人也章或問仁者人也曰仁是仁不可說故以人為說者是就人性上說節仁者人也人之所以為人者以其有此而已一心之間渾然天理動容周旋造次顛沛不可違也一違則私欲間乎其間為不仁矣雖曰二物其實一理蓋仁即心也不是心外別有仁也椿仁者人也合而言之道也此是說此仁是人底道理就人身上體認出來又就人身上說合而言之便是道也仁者人也合而言之道也只仁與人合而言之便是道猶言公而以人體之便是仁也子蒙仁者人也非是以人訓仁且如君臣之義君臣便是人義便是仁盡君臣之義即是道所謂合而言之者也履孫人之所以得名以其仁也言仁而不言人則不見理之所寓言人而不言仁則人不過是一塊血肉耳必合而言之方見得道理出來因言仁字最難形容是箇柔軟有知覺相酬接之意此須是自去體認切問而近思仁在其中矣廣問合而言之道也曰只說仁不說人則此道理安頓何處只說人不說仁則人者特一塊血肉耳必合將來說乃是道也必大問先生謂外國本下更有云云者何所據曰向見尤延之說高麗本如此廣問仁也者人也曰此仁字不是別物即是這人底道理將這仁與人合便是道程子謂此猶率性之謂道也如中庸仁者人也是對義者宜也意又不同人字是以人身言之仁字有生意是言人之生道也中庸說仁字又密止言修身以道修道以仁便說仁者人也是切己言之孟子是統而言之徐問禮記仁者右也道者左也仁者人也道者義也曰這般話理會作甚淳貉稽曰章或問肆不殄厥慍亦不殞厥問此綿之八章孟子以是稱文王無足怪憂心悄悄慍于群小此邶柏舟之詩何與孔子而以此稱孔子何也曰此不必疑如見毀於叔孫幾害於桓魋皆慍于群小也辭則衛詩意似孔子之事故孟子以此言孔子至於綿詩肆不殄厥慍之語注謂說文王以詩考之上文正說太王下文豈得便言文王如此意其間須有闕文若以為太王事則下又卻有虞芮質厥成之語某嘗作詩解至此亦曾有說集傳今有定說去僞口之於味也章孟子亦言氣質之性如口之於味也之類是也節徐震問口之於味以至四肢之於安佚是性否曰豈不是性然以此求性不可故曰君子不謂性也人傑敬之問有命焉君子不謂性也有命焉乃是聖人要人全其正性曰不然此分明說君子不謂性這性字便不全是就理上說夫口之欲食目之欲色耳之欲聲鼻之欲臭四肢之欲安逸如何自會恁地這固是天理之自然然理附於氣這許多卻從血氣軀殼上發出來故君子不當以此為主而以天命之理為主都不把那箇當事但看這理合如何有命焉有性焉此命字與性字是就理上說性也君子不謂性也命也君子不謂命也此性字與命字是就氣上說賀孫仁之於父子義之於君臣禮之於賓主智之於賢者聖人之於天道命也有性焉君子不謂命也此命字有兩說一以所稟言之一以所值言之集注之說是以所稟言之清而厚則仁之於父子也至若鼓瞍之於舜則薄於仁矣義之於君臣也盡若桀紂之於逢干則薄於義矣禮薄而至於賓主之失其歡智薄而至於賢者之不能盡知其極至於聖人之天道有性之反之之不同如堯舜之盛德固備於天道若禹入聖域而不優則亦其稟之有未純處是皆所謂命也人傑或問聖人之於天道文勢與上文一否曰與上文一堯舜性之則盡矣湯武身之則未也履孫性也有命焉君子不謂性命也有性焉君子不謂命是因甚有兩樣閎祖性也有命焉性字兼氣稟而言命也有性焉此性字專言其理伯羽問性也有命焉曰此性字兼物欲而言說得緩而闊如下文有性焉之性則說得緊兩箇命字亦不同燾性也有命焉此性是氣稟之性命則是限制人心者命也有性焉此命是氣稟有清濁性則是道心者方子直卿云不謂性命章兩性字兩命字都不同上面性字是人心下面性字是道心上面命字是氣論貧富貴賤下面命字是理論智愚賢不肖學蒙區兄問有性焉有命焉一段先生甚喜以謂某四十歲方看透此段意思上云性也是氣稟之性有命焉是斷制人心欲其不敢過也下云命也蓋其所受氣稟亦有厚薄之不齊有性焉是限則道心欲其無不及也蓋卿震録云區兄以性也之性為氣稟之性有性焉之性為天命之性先生云某四十歲方得此說不易公思量得或問君子不謂性命曰論來口之於味目之於色耳之於聲鼻之於臭四肢之於安佚固是性然亦便是合下賦豫之命仁之於父子義之於君臣禮之於賓主智之於賢者聖人之於天道固是命然亦便是各得其所受之理便是性孟子恐人只見得一邊故就其所主而言舜禹相授受只說人心惟危道心惟微論來只有一箇心那得有兩樣只就他所主而言那箇便喚做人心那箇便喚做道心人心如口之於味目之於色耳之於聲鼻之於臭四肢之於安佚若以為性所當然一向惟意所欲卻不可蓋有命存焉須著安於定分不敢少過始得道心如仁之於父子義之於君臣禮之於賓主智之於賢者聖人之於天道若以為命已前定任其如何更不盡心卻不可蓋有性存焉須著盡此心以求合乎理始得又曰口之於味目之於色耳之於聲鼻之於臭四肢之於安佚這雖說道性其實這已不是性之本原惟性中有此理故口必欲味耳必欲聲目必欲色鼻必欲臭四肢必欲安佚自然發出如此若本無此理口自不欲味耳自不欲聲目自不欲色鼻自不欲臭四肢自不欲安佚賀孫或問命字之義曰命謂天之付與所謂天令之謂命也然命有兩般有以氣言者厚薄清濁之稟不同也如所謂道之將行將廢命也得之不得曰有命是也有以理言者天道流行付而在人則為仁義禮智之性如所謂五十而知天命天命之謂性是也二者皆天所付與故皆曰命又問孟子謂性也有命焉此性所指謂何曰此性字指氣質而言如性相近之類此命字卻合理與氣而言蓋五者之欲固是人性然有命分既不可謂我性之所有而必求得之又不可謂我分可以得而必極其欲如貧賤不能如願此固分也富貴之極可以無所不為然亦有限制裁節又當安之於理如紂之酒池肉林卻是富貴之極而不知限節之意若以其分言之固無不可為但道理卻恁地不得今人只說得一邊不知合而言之未嘗不同也命也有性焉此命字專指氣而言此性字卻指理而言如舜遇瞽瞍固是所遇氣數然舜惟盡事親之道期於底豫此所謂盡性大凡清濁厚薄之稟皆命也所造之有淺有深所遇之有應有不應皆由厚薄清濁之分不同且如聖人之於天道如堯舜則是性之湯武則是身之禹則入聖域而不優此是合下所稟有清濁而所造有淺深不同仁之於父子如舜之遇瞽瞍義之於君臣如文王在羑里孔子不得位禮之於賓主如子敖以孟子為簡智之於賢者如晏嬰智矣而不知孔子此是合下來所稟有厚薄而所遇有應不應但其命雖如此又有性焉故當盡性大抵孟子此語是各就其所重言之所以伸此而抑彼如論語所說審富貴而安貧賤之意張子所謂養則付命於天道則責成於己是也然又自要看得活道理不是死底物在人自著力也仁之於父子以下與集注不同讀者詳之銖問命矣夫這只是說他一身氣數止於此否曰是它稟受得來只恁地這命便似向來說人心相似是有兩般命卻不是有兩箇命有兼氣血說底有全說理底如有命焉君子不謂命也只是這一箇命前面說底是一般後面說底是一般如口之於味耳之於聲性之這便是人心然不成無後也要恁地所以說有命焉君子不謂性也這命便是指理而言若是仁之於父子義之於君臣命也有性焉君子不謂命也這命便是兼氣血而言其實只是這一箇理就氣稟論則不同且如義之於君臣亦有未事君時先懷一箇不忠底心者子之於父亦有常常懷不孝底心者不成不管他只聽他自恁地須著區處教不恁地始得蔡仲默問相近也是指氣質而言否曰是若孟子便直說曰非天之降才爾殊也其所以陷溺其心者然也說至此高聲云只是這箇道理堯舜三王治天下只是理會這箇千百年來無人曉得後都黑了到程先生後說得方分明義剛堯卿謂君子不謂性命章前段說性是物欲之性命是命分後段說性是仁義禮智之性命是稟賦之命似各不同曰只是一般此亦不難解有甚麼玄妙只將自家身看便見且如耆芻豢而厭藜藿是性如此然芻豢分無可得只得且喫藜藿如父子有親有相愛底亦有不相愛底有相愛深底亦有相愛淺底此便是命然在我有薄處便當勉強以至其厚在彼有薄處吾當致厚感他得他亦厚如瞽瞍之頑舜便能使蒸蒸乂不格姦叔器問瞽瞍之惡彰彰於天下後世舜何以謂之大孝曰公且自與他畫策瞽瞍頑嚚天知地聞舜如何掩得且說今遇瞽瞍之父公便要如何淳君子不謂性命一章只要遏人欲長天理前一節人以為性我所有須要必得後一節人以為命則在天多委之而不修所以孟子到人說性處卻曰有命人說命處卻曰有性或曰先生嘗言前段要輕看後段要重看曰固有此理想曾言之謨問智之於賢者聖人之於天道集注尚存兩說曰兩說皆通前章又似周密問賢者必智何為卻有淺深天道必在聖人何為卻有厚薄曰聖賢固有等差如湯武之於堯舜武王之於文王便自可見謨或問伊川曰口目鼻耳四肢之欲性也然有分焉不可謂我須要得是有命也又曰仁之於父子至聖人之於天道謂之命者以其本受有厚薄故也然其性善可學而盡故謂之性夫人之分量固有厚薄所以其口目耳鼻四肢之欲不可以言性伊川前說是矣仁義禮智天道此天之所以命於人所謂本然之性者也今曰命有厚薄則是本然之性有兩般也若曰伊川以厚薄言人氣質稟受於陰陽五行者如此孟子不應言命若以氣質厚薄言命則是天之降才為有殊矣又如言仁則曰仁之於父子言義則曰義之於君臣言禮言智亦然至言天道則曰聖人之於天道文勢至是當少變邪抑自有意邪曰孟子言降才且如此說若命則誠有兩般以稟受有厚薄也又不可謂稟受為非命也大抵天命流行物各有得不謂之命不可也命如人有富貴貧賤豈不是有厚薄知之於賢者則有小大聖人之於天道亦有盡不盡處只如堯舜性之則是盡得天道湯武身之則是於天道未能盡也此固是命然不可不求之於性去僞問智之於賢者或云吾既有智則賢者必見之此說如何曰如此解似語勢倒而不順須從橫渠說晏嬰之智而不知仲尼豈非命歟然此命字恐作兩般看若作所稟之命則是嬰稟得智之淺者若作命分之命則晏子偶然蔽於此遂不識夫子此是作兩般看賜劉問孟子性也有命焉命也有性焉將性命做兩件子思天命之謂性又合性命為一如何曰須隨聖賢文意看孟子所謂命是兼氣稟而言子思專以天所賦而言又問易言窮理盡性以至於命如何先生不答少頃曰不要如此看文字游定夫初見伊川問陰陽不測之謂神伊川曰賢是疑了問只揀難底問後來人便道游將難底問大意要且將聖賢言語次第看看得分曉自然知得伊川易傳序云求言必自近易於近者非知言者也此伊川喫緊為人處宇或問聖人之於天道一段以示諸友祖道曰伯豐舉錢文季之說大概言命處只將為所稟之命莫是偏了曰此說亦是如集注中舉橫渠說云以晏子之賢而不識孔子豈非命也已有此意了如伯豐見識所立亦甚難得祖道浩生不害問曰章可欲之謂善可欲只是說這人可愛也淳問可欲之善曰為君仁為臣敬為父慈為子孝是也外是而求則非大雅問可欲之謂善若作人去欲他恐與有諸己之謂信不相協蓋有諸己是說樂正子身上事可欲卻做人說恐未安曰此便是他有可欲處人便欲他豈不是渠身上事與下句非不相協時舉善人能無惡矣然未必能不失也必真知其善之當然而實有於己然後能不失信者實有於己而不失之謂端蒙問可欲之謂善有諸己之謂信充實之謂美曰善人只是資質好底人孔子所謂不踐跡亦不入於室者是也是箇都無惡底人亦不知得如何是善只是自是箇好人而已有諸己之謂信是都知得了實是如此做此是就心上說心裏都理會得充實之謂美是就行上說事事都行得盡充滿積實美在其中而無待於外如公等說話都是去外面旋討箇善來栽培放這裏都是有待於外如仁我本有這仁卻不曾知得卻去旋討箇仁來注解了方曉得這是仁方堅執之而不失如義我元有這義卻不曾知得卻旋去討箇義來注解了方曉得這是義堅守之而勿失這都是有待於外無待於外底他善都是裏面流出來韓文公所謂足乎己無待於外之謂德是也有待於外底如伊川所謂富人多寶貧子借看之喻是也又曰可欲之謂善如人有百萬貫錢世界他都不知得只認有錢使有屋住有飯喫有衣著而已有諸己之謂信則知得我有許多田地有許多步畝有許多金銀珠玉是如何營運是從那裏來盡得知了僩問可欲之謂善至聖而不可知之謂神曰善渾全底好人無可惡之惡有可喜可欲之善有諸己之謂信真箇有此善若不有諸己則若存若亡不可謂之信自此而下雖一節深如一節卻易理會充實謂積纍光輝謂發見於外化則化其大之之跡聖而不可知處便是神也所以明道言仲尼無跡顏子微有跡孟子其跡著或問顏子之微有跡處曰如願無伐善無施勞皆是若孔子有跡只是人捉摸不著去僞古人用聖字有兩樣大而化之之謂聖是一般如知仁聖義之聖只通明亦謂之聖可學樂正子二之中是知好善而未能有諸己故有從子敖之失人傑録云二之中四之下未必皆實有諸己者故不免有失錯處可欲之謂善人之所同愛而目為好人者謂之善人蓋善者人所同欲惡者人所同惡其為人也有可欲而無可惡則可謂之善人也橫渠曰志仁無惡之謂善誠善於身之謂信人傑集注問可欲之謂善曰橫渠說善人者志於仁而無惡蓋可欲底便是善可惡底便是惡若是好善又好惡卻如何得有諸己此語脈亦不必深求只是指人說只是說善人信人又問至大而化之皆是指人否曰皆是又問只自善推去否曰固是然須是有箇善方推得譬如合一藥須先有真藥材然後和合羅碾得來成藥若是藥材不真雖百般羅碾畢竟不是大凡諸人解義理只知求向上去不肯平實放下去求惟程子說得平實然平實中其義自深遠如中庸中解動則變變則化只是就外面說其他人解得太高蓋義理本平易卻被人求得深了只如明則誠矣誠則明矣橫渠皆說在裏面若用都收入裏面裏面卻沒許多節次安著不得若要強安排便須百端撰合都沒是處或問可欲之謂善伊川云善與元者善之長同理又曰善便有箇元底意思橫渠云求仁必求於未惻隱之前明善必明於可欲之際二先生言善皆是極本窮源之論發明善字而已至於可欲之義則未有說也近世學者多要於可欲上留意有曰一性之真其未發也無思無為難以欲言無欲則無可無不可及其感而遂通則雖聖人未免有欲有欲則可不可形焉可者天理也不可者人欲也可者欲之不可者不欲非善己乎不知此說是否曰不須如此說善人只是渾全一箇好人都可愛可欲更無些憎嫌處問如是則惟已到善人地位者乃可當之若學者可欲為善當如何用工曰可欲只是都無可憎惡處學者必欲於善字上求用工處但莫做可憎可惡事便了問充實之謂美充實云者始信有是善而已今乃充而實之非美乎易曰美在其中而暢於四肢此之謂也充實而有光輝云者和順積於中英華發於外故此有所形見彼有所觀睹非大乎孟子曰大人正己而物正此之謂也橫渠謂充內形外之謂美塞乎天地之間則有光輝之意不知此說然乎曰橫渠之言非是又問大而化之之謂聖聖而不可知之謂神非是聖上別有一般神人但聖人有不可知處便是神也又以上竿弄瓶習化其高為喻則其說亦既明矣但大而化之之聖此句各有一說未知其意同否伊川曰大而化之只是理與己一其未化者如人操尺度量物用之尚不免有差至於化則己便是尺度尺度便是己橫渠云大能成性謂之聖近又聞先生云化其大之跡謂聖竊嘗玩味三者之言恐是一意不知是否曰然謨集義程子曰乾聖人之分也可欲之善屬焉坤賢人之分也有諸己之信屬焉一箇是自然一箇是做工夫積習而至又曰善信美大聖神是六等人可欲之謂善是說資稟好可欲是別人以為可欲有諸己之謂信是說學又曰直方大直方然後大積習而至然後能不習無不利閎祖令思乾聖人之分也可欲之善屬焉坤賢人之分也有諸己之信屬焉對曰乾者純陽之卦陽氣之始也始無不善聖人之心純乎天理一念之發無非至善故曰乾聖人之分也可欲之善屬焉坤者純陰之卦陰氣之終所以成始者也賢人學而後復其初欲有諸己必積習而後至故曰坤賢人之分也有諸己之信屬焉先生曰只是一箇是自然一箇是做工夫可欲之謂善是說資稟可欲是別人以為可欲有諸己之謂信是說學乾九二聖人之學可欲之善屬焉可欲之善是自然道理未到修為故曰聖人之學坤六二賢人之學有諸己之信屬焉有諸己便欲執持保守依文按本做故曰賢人之學忠信進德修辭立誠乾道也是流行發用朴實頭便做將去是健之義敬以直內義以方外坤道也便只簡靜循守是順之義大率乾是做坤是守乾如活龍相似有猛烈底氣象故九五曰飛龍在天文言說得活潑潑地到坤便善了六五只說黃裳元吉文言中不過說黃中通理正位居體而已看易記取陰陽二字看乾坤記取健順二字便不錯了逃墨必歸於楊章或問孟子云逃墨必歸於楊逃楊必歸於儒蓋謂墨氏不及楊氏遠矣韓子卻云孔墨必相為用如此墨氏之學比之楊朱又在可取曰昌黎之言有甚憑據且如原道一篇雖則大意好終是疏其引大學只到誠意處便住了正如子由古史引孟子自在下位不獲乎上只到反諸身不誠處便住又如溫公作通鑑引孟子立天下之正位行天下之大道卻去了居天下之廣居皆是掐卻一箇頭三事正相類也文蔚盆成括仕於齊章盆成括恃才妄作謂不循理了硬要胡做僩人皆有所不忍章叔器問充無受爾汝之實曰惡不仁者其為仁矣不使不仁者加乎其身惡不仁而不能使不仁者不加乎其身便是不能充無受爾汝之實義剛不直心而私意如此便是穿窬之類又云裏面是如此外面卻不如此外面恁地裏面卻不恁地燾問此章前面雙關說仁義後面卻專說義如何曰前一截是衆人所共曉到這後又較細密難曉故詳說之又問莫有淺深否曰後面也是說得漸漸較密道夫問人能充無受爾汝之實集注云實誠也人不肯受爾汝之實者羞惡之誠也須是自治其身無不謹然後無爾汝之稱否曰這些子注中解得不分曉記得舊時解得好卻因後來改來改去不分曉了看來實字對名字說不欲人以爾汝之稱加諸我是惡爾汝之名也然反之於身而去其無可爾汝之行是能充其無受爾汝之實也若我自有未是處則雖惡人以爾汝相稱亦自有所愧矣又問餂者探取之意猶言探試之探否曰餂是鉤致之意如本不必說自家卻強說幾句要去動人要去悅人是以言餂之也如合當與他說卻不說須故為要難使他來問我是以不言餂之也又問政使當言而言苟有悅人之意是亦穿窬之類否曰固是這穿窬之心便是那受爾汝之實又問此章首言仁義而後專言義者何也曰仁只是一路不過只是箇不忍之心苟能充此心便了義卻頭項多又問人能充無穿窬之心是就至粗處說未可以言而言與可以言而不言是說入至細處否曰然能充無受爾汝之實處工夫卻甚大了到這田地功夫大段周密了所以說無所往而不為義也使行己有一毫未盡便不能無受爾汝之實矣達者推也是展去充填滿也填塞教滿又曰此段最好看僩問人能充無受爾汝之實曰某舊說恐未然看來人皆惡爾汝之名須是充此心使無受爾汝之實又曰須是就這惡其名處充到那無受爾汝之實處則無所往而不為義矣如今面前惡穿窬之名而背後卻為穿窬便有穿窬之實須是無穿窬之實始得莊仲問伊川為東坡所玩侮是如何曰公是倒看了充無受爾汝之實孔子之伐木削跡不成也是有受爾汝之實子蒙言近而指遠章說言近指遠守約施博四方八面皆看得見此理本是遠近博約如一而行之則自近約始道理只是一但隨許多頭面去說又不可不逐頭面理會也方時可問君子之言也不下帶而道存焉不下帶或作心說曰所謂心者是指箇潛天潛地底說還只是中間一塊肉砥是若作心說恐未是時舉堯舜性者也章湯武反之其反之雖同然細看來武王終是疏略成湯卻孜孜向進如其伐桀所以稱桀之罪只平說過又放桀之後惟有慚德武王數紂至於極其過惡於此可見矣人傑湯武固皆反之但細觀其書湯反之之工恐更精密又如湯誓與牧誓數桀紂之罪詞氣亦不同史記但書湯放桀而死武王遂斬紂頭懸之白旗又曰湯有慚德如武王恐亦未必有此意也儒用或問言語必信非以正行信言語以正行莫無害否曰言語在所當信若有意以此而正行便是有所為而然也燾聖人是人與法為一己與天為一學者是人未與法為一己未與天為一固須行法以俟命也道夫注云無意而安行性也性下合添之者二字僩說大人則藐之章敬之問說大人則藐之章曰這為世上有人把大人許多崇高富貴當事有言不敢出口故孟子云爾集注說自分明論語說畏大人此卻說藐大人大人固當畏而所謂藐者乃不是藐他只是藐他許多堂高數仞榱題數尺之類賀孫養心莫善於寡欲章問養心莫善於寡欲曰緊要在寡字多字看那事又要這事又要便是多欲子蒙養心莫善於寡欲欲是好欲不是不好底欲不好底欲不當言寡振孟子曰其為人也寡欲章只是言天理人欲相為消長分數其為人也寡欲則人欲分數少故雖有不存焉者寡矣不存焉寡則天理分數多也其為人也多欲則人欲分數多故雖有存焉者寡矣存焉者寡則是天理分數少也端蒙敬之問養心莫善於寡欲養心也只是中虛曰固是若眼前事事要時這心便一齊走出了未是說無只減少便可漸存得此心若事事貪要這箇又要那箇未必便說到邪僻不好底物事只是眼前底事才多欲便將本心都紛雜了且如秀才要讀書要讀這一件又要讀那一件又要學寫字又要學作詩這心一齊都出外去所以伊川教人直是都不去他處用其心也不要人學寫字也不要人學作文章這不是僻道理是合如此人只有一箇心如何分做許多去若只管去間處用了心到得合用處於這本來底都不得力且看從古作為文章之士可以傳之不朽者今看來那箇喚做知道也是此初心下只趨向那邊都是做外去了只是要得寡欲存這心最是難以湯武聖人孟子猶說湯武反之也反復也反復得這本心如不邇聲色不殖貨利只為要存此心觀旅獒之書一箇獒受了有甚大事而反覆切諫以此見欲之可畏無小大皆不可忽賀孫敬之問寡欲曰未說到事只是才有意在上面便是欲便是動自家心東坡云君子可以寓意於物不可以留意於物這說得不是才說寓意便不得人好寫字見壁間有碑軸便須要看別是非好畫見掛畫軸便須要識美惡這都是欲這皆足以為心病某前日病中間坐無可看偶中堂掛幾軸畫才開眼便要看他心下便走出來在那上因思與其將心在他上何似閉著眼坐得此心寧靜子善問如夏葛冬裘渴飲飢食此理所當然才是葛必欲精細食必求飽美這便是欲曰孟子說寡欲如今且要得寡漸至於無賀孫集注云多而不節未有不失其本心者多字對寡字說才要多些子便是欲僩曾皙嗜羊棗章羊棗只是北邊小棗如羊矢大者義剛萬章問孔子在陳章鄉原原與願同荀子原儖注讀作願是也觀孟子意是言好不是言不好然此一等人只是如此了自是不可進了問鄉原之義曰原字與願字同義以其務為謹願不欲忤俗以取容專務徇俗欲使人無所非刺既不肯做狂又不肯做狷一心只要得人說好更不理會自己所見所得與天理之是非彼狂者嘐嘐然以古人為志雖行之未至而所知亦甚遠矣狷者便只是有志力行不為不善二者皆能不顧流俗汙世之是非雖是不得中道卻都是為己不為他人彼鄉原便反非笑之曰何以是嘐嘐也言不顧行行不顧言則言古之人此是鄉原笑狂者也行何為踽踽敘敘生斯世也為斯世也善斯可矣此是鄉原笑狷者也彼其實所向則是閹然媚於世而已孔子以他心一向外馳更不反已故以為德之賊而孟子又以為不可與入堯舜之道又問孔門狂者如琴張曾皙輩是也如子路子夏輩亦可謂之狷者乎曰孔門亦有狂不成狂狷不成狷如冉求之類是也至於曾皙誠狂者也只爭一撮地便流為莊周之徒大雅狂狷是箇有骨肋底人鄉原是箇無骨肋底人東倒西擂東邊去取奉人西邊去周全人看人眉頭眼尾周遮掩蔽惟恐傷觸了人君子反經而已矣所謂反經去其不善為其善者而已僩敬之問經正則庶民興這箇經正還當只是躬行亦及政事否曰這箇不通分做兩件說如堯舜雖是端拱無為只政事便從這裏做出那曾恁地便了有禹湯之德便有禹湯之業有伊周之德便有伊周之業終不如萬石君不言而躬行凡事一切不理會有一家便當理會一家之事有一國便當理會一國之事又曰孟子當楊墨塞道其害非細孟子若不明白說破只理會躬行教他自化如何得化賀孫問此即大學明德新民之至否曰然新民必本於明德而明德所以為新民也賀孫集義反經經者天下之大經如父子有親君臣有義夫婦有別長幼有序朋友有信又如大學中說止於仁止於敬之類是提起大綱然而天下之事雖至纖悉舉不出於此理非集義不可人傑集義問集義反經之說如何曰經便是大經君臣父子夫婦兄弟朋友五者若便集義且先復此大經天下事未有出此五者其間卻煞有曲折如大學亦先指此五者為言使大綱既正則其他節目皆可舉若不先此大綱則其他細碎工夫如何做謂如造屋先有柱腳然後窗牖有安頓處由堯舜至於湯章問然而無有乎爾則亦無有乎爾曰惟三山林少穎向某說得最好若禹皋陶則見而知之湯則聞而知之蓋曰若非前面見而知得後之人如何聞而知之也孟子去孔子之世如此其未遠近聖人之居如此其近然而已無有見而知之者則五百歲之後又豈復有聞而知之者乎去僞蔣端夫問聞知見知所知者何事曰只是這道理物物各具一理又問此道理如何求謂見之於心或求之於事物曰不知所求者何物若不以心於何求之求之於事物亦是以心震
