body:
  text: 朱子語類卷第二十六論語八里仁篇上里仁為美章或問里仁一篇自首至觀過斯知仁矣都是說仁里仁為美是指言仁厚之俗觀過斯知仁是指言慈愛底仁其他則皆就心德上說曰雖是如此然統體便都只是那箇仁如里有仁厚之俗便那一里之人這心不大故走作所以有仁厚之俗觀過斯知仁便也是這心僩問里仁為美論語孟子注不同如何曰論語本文之意只是擇居孟子引來證擇術又是一般意思言里以仁者為美人之擇術豈可不謹然亦不爭多問美是里之美抑人之美曰如云俗美一般如今有箇鄉村人淳厚便是那鄉村好有箇鄉村人不仁無廉無恥者多便是那鄉村不好這章也無甚奧義只是擇居而已然里仁字也差異淳問里仁為美孟子引用自要說下文安宅謝氏說論語本意不是如此曰若這般說話也要認得本旨是了若如孟子說也無害如謝氏也無害賀孫問此章謝氏引孟子擇術為證如何曰聖人本語不是說擇術古人居必擇鄉遊必就士是合著事劉問今人數世居此土豈宜以他鄉俗美而遽遷邪曰古人危邦不入亂邦不居近而言之若一鄉之人皆為盜賊吾豈可不知所避聖人言語說得平正必欲求奇說令高遠如何今人說文字眼前淺近底他自要說深在外底他要說向裏本是說他事又要引從身上來本是說身上事又要引從心裏來皆不可宇不仁者不可以久處約章問不仁者不可以久處約不可以長處樂仁者安仁知者利仁此四句都相屬知者則知天理之為是而必循之知人欲之為非而必去之所以能處約處樂而不至於濫與淫曰如此說時便是硬去做都不見利仁底意思如安仁者他便是仁了更不用說如所謂利仁者是真箇見得這仁愛這一箇物事好了猶甘於芻豢而不甘於粗糲若只是聞人說這箇是好自家也髣彿見得是如此卻如何得如芻豢之悅我口如何得利仁底意便只是硬去做了燾問既是失其本心則便解濫淫而必以久言之何故曰也有時下未肯恁地做底聖人說話穩而今說道他不仁則約便濫樂便淫也有不便恁地底義剛賀孫錄云亦有乍能勉強一時者至之問仁者安仁曰仁者心便是仁早是多了一安字知者利仁未能無私意只是知得私意不是著腳所在又知得無私意處是好所以在這裏千方百計要克去箇私意這便是利仁時舉劉潛夫問安仁利仁之別曰安仁者不知有仁如帶之忘腰屨之忘足利仁者是見仁為一物就之則利去之則害壯祖晞遜問所謂利仁者莫是南軒所謂有所為而為者否曰有所為而為不是好底心與利仁不同仁者安仁恰似如今要做一事信手做將去自是合道理更不待逐旋安排如孟子說動容周旋中禮者盛德之至也哭死而哀非為生者也經德不回非以干祿也言語必信非以正行也這只順道理合做處便做更不待安排布置待得君子行法以俟命而已便與上不同又云有為而為之正是說五霸假之也之類賀孫仁者溫淳篤厚義理自然具足不待思而為之而所為自帖帖地皆是義堙所謂仁也知者知有是非而取於義理以求其是而去其非所謂知也升卿蕭景昭問而今做工夫且須利仁曰唯聖人自誠而明合下便自安仁若自明而誠須是利仁銖仁知雖一然世間人品所得自有不同顏子曾子得仁之深者也子夏子貢得知之深者也如程門之尹氏則仁勝上蔡則知勝升卿或問仁者心無精粗內外遠近之間曰若有便成兩段此句為仁者安仁設節集義或問仁者心無內外遠近精粗之間如何曰仁者洞然只是一箇心所以無內外精粗遠近之間然須看自家有間底心是如何然後看無間底心是如何又問無內外之間是如何曰表裏如一又問如何是遠近精粗之間曰他當初若更添高下顯微古今這樣字也只是一理又問纔有些箇攙絕間斷便不得曰纔有私意便間斷了所以要克己復禮便是要克盡私意蓋仁者洞然只是這一箇心如一碗清水纔入些泥有清處有濁處又問上蔡解此段只是論仁者安仁知者利仁先解這一段方連上面說曰看他文義須是包上面說方得相貫然仁者安仁知者利仁又須著自去看問不能無遠近精粗之間如何曰亦只是內外意思吾心渾然一理無內外遠近精粗這段分別說極通透上蔡尋常說有過當處此卻他人說不到先生再三誦安仁則一利仁則二之句以為解中未有及此者因歎云此公見識直是高利仁貪利為之未要做遠底且就近底做未要做精底且就粗底做問安仁者非顏閔以上不知此味便是聖人之事乎曰是須知非顏閔以上不知此味到顏閔地位知得此味猶未到安處也宇問安仁者心無內外遠近精粗之間性之未動既皆至理所存情之既發無非至理所著利仁固是審於既發莫更著謹於未發否曰若未發時自著不得工夫未發之時自堯舜至於塗人一也問原憲克伐怨欲不行是他許多不好物事都已發了只白地壅遏得住所以非獨不得為仁亦非求仁之事曰是如此賀孫問上蔡云安仁非顏閔以上做不得顏閔似未至安仁曰亦見此意思可學惟仁者能好人能惡人章蕭景昭說此章先生云注中引程子所謂得其公正是如何答云只是好惡當理便是公正先生曰程子只著箇公正二字解某恐人不理會得故以無私心解公字好惡當於理解正字有人好惡當於理而未必無私心有人無私心而好惡又未必皆當於理惟仁者既無私心而好惡又皆當於理也時舉問唯仁者能好人能惡人程子所謂得其公正是也曰今人多連看公正二字其實公自是公正自是正這兩箇字相少不得公是心裏公正是好惡得來當理苟公而不正則其好惡必不能皆當乎理正而不公則切切然於事物之間求其是而心卻不公此兩字不可少一僩居父問仁者動靜皆合正理必有定則凡可好可惡者皆湊在這則子上所以能好人能惡人曰然程子所以說得其公正是也惟公然後能正公是箇廣大無私意正是箇無所偏主處賀孫問惟仁者能好人能惡人好善而惡惡天下之同情若稍有些子私心則好惡之情發出來便失其正惟仁者心中渾是正理見人之善者則好之見不善者則惡之或好或惡皆因人之有善惡而吾心廓然大公絕無私係故見得善惡十分分明而好惡無不當理故謂之能好能惡曰程子之言約而盡公者心之平也正者理之得也一言之中體用備矣南升苟志於仁章問苟志於仁矣無惡也竊謂學者有志於仁雖有趨向已正而心念未必純善而無過差纔有過差便即是惡豈得言無曰志於仁則雖有過差不謂之惡惟其不志於仁是以至於有惡此志字不可草草看人傑先生問學者苟志於仁矣無惡也與士志於道而恥惡衣惡食者未足與議也前面說志於仁則能無惡此段說志於道而猶有此病其志則一而其病不同如何諸友言不合曰仁是最切身底道理志於仁大段是親切做工夫底所以必無惡志於道則說得來闊凡人有志於學皆志於道也若志得來泛泛不切則未必無恥惡衣惡食之事又恥惡衣食亦有數樣今人不能甘粗糲之衣食又是一樣若恥惡衣惡食者則是也喫著得只是怕人笑羞不如人而已所以不足與議僩苟志於仁矣方志仁時便無惡若間斷不志仁時惡又生或云過非心所欲為惡則心所欲曰惡是誠中形外過是偶然過差明作楊氏云苟志於仁矣未必無過舉也然而為惡則無矣先生問學者過與惡如何分別曰過非心所欲為惡是心所欲為曰惡是誠於中形諸外所以異也銖富與貴章或問富貴不處是安於義貧賤不去是安於命曰此語固是但須知如何此是安義彼是安命蓋吾何求哉求安於義理而已不當富貴而得富貴則害義理故不處不當貧賤而得貧賤則自家義理已無愧居之何害富貴人所同欲若不子細便錯了貧賤人所同惡自家既無愧義理若更去其中分疏我不當貧賤便不是張子韶說審富貴而安貧賤極好學蒙審富貴而安貧賤者言不以其道得富貴須是審苟不以其道決是不可受它底不以其道得貧賤卻要安蓋我雖是不當貧賤然當安之不可於上面計較云我不當得貧賤有汲汲求去之心譬如人作折本經紀相似銖問君子當得富貴所謂不當得而得者乃人君不能用其言徒欲富貴其身曰富貴不以道得之不但說人君不用其言只富貴其身如此說卻說定了凡是富貴貧賤有不當得而得者皆不處不去如孔子主我衛卿可得之類亦是不當得之富貴須且平說不要執定一事又終食造次顛沛一句密似一句須至傾覆流離之際亦不違仁也南升文振問富與貴一章曰富與貴不以其道得之若曰是諂曲以求之此又是最下等人所謂得之者便設有自到我面前者吾知其有一毫不是處也不可處譬如秀才赴試有一人先得試官題目將出來賣只要三兩貫錢便可買得人定是皆去買惟到這裏見得破方是有學力聖人言語豈可以言語解過一遍便休了須是實體於身灼然行得方是讀書時舉問貧賤如何是不當得而得之曰小人放僻邪侈自當得貧賤君子履仁行義疑不當得貧賤然卻得貧賤這也只得安而受之不可說我不當得貧賤而必欲求脫去也今人大率於利雖不當得亦泯默受之有害則必以為不當得而求去之矣君子則於富貴之來須是審而處之於貧賤則不問當得與不當得但當安而受之不求去也問此二節語猶云怨有不讎而德無不報之意否曰然蓋於富貴則有所不處於貧賤則必受之而不辭也僩問不以其道得之不去也去字或讀作上聲可否曰自家離去之去去聲讀除去之去上聲讀此章只是去聲義剛君子去仁之去只音去聲如孟子去齊之去我元有而自離去之也若作上聲則是除卻賀孫明作錄云是除卻了非也富與貴貧與賤一章某曰學者須是從富貴貧賤處判斷得下方有用工處先生喜曰這裏看得分曉須要做下面工夫若做得下面工夫看上面事愈覺分曉又問惡不仁者直是如此峻潔曰只緣是不要一點不仁底事著在身上又曰如此看得方是炎子善問此章曰且如不處不去若是資質好底所見稍明便於這裏也能見得只是未必到無終食不違底意思不處不去乃是立腳處好了細密工夫方下得若上面無立腳處了其他可見一作下面工夫無緣可見聖人之意不獨是教人於富貴貧賤處做工夫須是到終食不違顛沛造次都用工方可恪先生因寓看里仁篇云前面幾段更好熟看令意脈接續因問造次是急遽苟且之時苟且莫只就人情上說否曰苟且是時暫處苟可以坐苟可以立令此心常存非如大賓大祭時也問曾子易簀莫是苟且時否曰此正是顛沛之時那時已不可扶持要如此坐也不能得宇敬之問富貴貧賤聖人教人要得分別取舍到箇真切處便隨道理做去有一般昏弱之人都只是人欲上行便是不識痛癢底人先生曰聖人這處恰似說得疏學問工夫儘多聖人去富貴貧賤上做工夫不是處富貴貧賤時節又如何做工夫終不成閑過了這處聖人且立箇大界限先要人分別得箇路頭君子去仁便是不成箇君子看聖人說得來似疏下面便說到細密處須是先說箇粗後面方到細處若不是就粗處用工便要恁地細密也不得須知節節有工夫剝了一重又一重去了一節又一節敬之云此章說此三句可謂緊切雖然只說存養未說仁處要是教人自體認看先生笑曰公又如此所見這裏未是極處更要去言外說道理如何得聖人這處正是說築底處正是好著力處卻如此輕說過了眾人是這箇心聖人也只是這箇心存得心在這裏道理便在這裏從古聖賢只是要理會這箇物事保養得這箇在那事不從這裏做出宇富與貴貧與賤方是就至粗處說後面無終食之間違仁與造次顛沛必於是方說得來細密然先不立得這箇至粗底根腳則後面許多細密工夫更無安頓處人更無可得說須是先能於富貴不處貧賤不去立得這箇粗底根腳了方可說上至細處去若見利則趨見便則奪這粗上不曾立得定更說箇甚麼正如貧而無諂富而無驕與貧而樂富而好禮相似若未能無諂無驕如何說得樂與好禮卻是先就粗處說上細上去僩富貴貧賤不處不去此一節且說箇粗底方是箇君子皮殼裏面更多有事在然先會做這事方始能不去其仁既把得定然後存養之功自此漸漸加密夔孫錄此下云然必先無終食違仁然後造次顛沛必於是如孟子言善利之間須從間字上看但孟子之言勇決孔子之言詳緩學者須就這上著力今學者都不濟事才略略有些利害便一齊放倒了某嘗向朋友說須是就這上立得腳住方是離得泥水若不如此則是在泥裏行才要出又墮在泥裏去縱說得道理也沒安頓處如大學所謂誠其意者毋自欺也毋自欺有多少事他卻只就小人閒居為不善見君子而後厭然揜其不善而著其善處說為甚先要去了這箇蓋不切則磋無所施不琢則磨無所措矣又曰審富貴是義安貧賤是命賜不以道得富貴不處不以道得貧賤不去是說處這事君子去仁惡乎成名是主宰處終食造次顛沛是操存處李先生說得好端問富與貴是人之所欲也一章曰如孔子言此便是自平居時說到那造次顛沛之際如孟子說義重於生處卻又說急處有打得過時如閒居時卻有照管不到處或失之燾周李卿問造次之義曰杜預謂造次之期言草草不成禮也便是此意左傳謂過信為次亦只是苟且不為久計之意義剛蜚卿問注云取舍之分明然後存養之功密存養之功密則取舍之分益明如何曰此言內外大小皆當理會外若不謹細行則內何以為田地根本內雖有田地根本而外行不謹則亦為之搖奪如世間固有小廉曲謹而臨大節無可取者亦有外面界辨分明而內守不固者可學問明道云不以其道得之富貴如患得之文義如何曰如患得之是患不得之將此得字解上得字必大集義我未見好仁者章問好仁即便會惡不仁惡不仁便會好仁今並言如何曰固是好仁能惡不仁然有一般天資寬厚溫和底人好仁之意較多惡不仁之意較少一般天資剛毅奮發底人惡不仁之意較多好仁之意較少好仁者無以尚之惡不仁不使不仁者加乎其身這個便是好惡樣子問此處以成德而言便是顏子得一善拳拳服膺曾子任重而道遠與啟手足處是這地位否曰然好仁者自是那一等天資純粹底人亦其真知仁之可好而實好之故視天下之物無以尚乎此惡不仁者又是那一等天資耿介底人亦其真知不仁之可惡而實惡之故凡不仁之事不使毫髮加諸己若好仁而有以尚之這便不是真好惡不仁而未免有所不當為這便不是真惡然好仁者於不仁非不惡終是好底意思多惡不仁者於仁非不好終是惡底意思重好仁非顏曾未易言惡不仁恐伯夷叔齊方始當得問此一章曰好仁者與惡不仁者雖略有輕重然惡不仁者到得不使不仁加乎其身便亦是仁了二者以資稟言之其寬弘靜重者便是好仁底人其剛毅特立者便是惡不仁底人時舉曰利仁者即是好仁者否曰好仁惡不仁皆利仁者之事時舉曰蓋有之矣我未之見也是言未見用力底人還是未見用力而力不足之人曰此意聖人只是言其用力者之難得用力於好者固未之見到資稟昏弱欲進而不能者亦未之見可見用力者難得也問好仁惡不仁是有優劣否曰略有之好仁者自有一般人資質較寬和溫厚惡不仁者自是有一般人資稟較剛果決裂然而皆可謂之成德橫渠言好仁惡不仁只是一人說得亦好但不合聖人言兩者字必竟是言兩人也問好仁惡不仁有輕重否曰也微有些輕重好仁是他資質寬厚和重惡不仁是剛毅方正好仁則於仁與禮上多些惡不仁則於義與智上多些好仁只知有仁而不見那不仁來害他惡不仁是曾得知這病痛惟恐來害他略與安行強行相似好仁是康強底人平生未嘗病亦不知有病痛惡不仁是曾被病害知得病源惟恐病來侵著惡不仁終是兩件好仁卻渾淪了學者未能好仁且從惡不仁上做將去庶幾堅實僩問好仁者如顏子惡不仁者似孟子否曰好仁者與惡不仁者本無優劣只是他兩箇資質如此好仁底人是箇溫柔寬厚底資質只見得好仁處好不甚嫌那不仁底他只見得好仁路上熟惡不仁者便是箇剛勁峭直底資質心裏真箇是惡那不仁底事好仁底較強些子然好仁而未至卻不及那惡不仁之切底蓋惡不仁底真是壁立千仞滴水滴凍做得事成僩好仁惡不仁只是利仁事卻有此二等然亦無大優劣只是好仁者是資性渾厚底惡不仁者是資性剛毅底好仁者惻隱之心較多惡不仁者羞惡之心較多聖人之意謂我未見好仁惡不仁者又從而自解之曰我意所謂好仁者須是無以尚之所謂惡不仁者須是不使不仁者加乎其身是好之篤惡之切如此等人不是說那略略恁地好仁惡不仁底又曰伯夷是惡不仁底柳下惠是好仁底也無大故優劣夔孫因論好仁惡不仁曰此亦以資質而言蓋有一等人只知好仁更不管惡不仁事一等人專是惡不仁意思多然其不使不仁者加乎其身則所為必無不仁矣然畢竟好仁者終是較得便宜緣他只低著頭自去做了惡不仁者卻露些圭角芒刃得人嫌在如顏子明道是好仁孟子伊川是惡不仁康節近於好仁橫渠是惡不仁燾問好仁惡不仁莫只是一樣人否曰把做一樣說也得把做兩樣看也得也有那好仁底人也有那惡不仁底人如伯夷便是惡不仁底柳下惠便是好仁底因言此數段皆是緊要處須是把做箇題目只管去尋始得尋來尋去將久自解有悟如喫物事味味皆好卻須知道那一般最好其所以好是如何方是義剛好仁者無以尚之言好之深而莫有能變易之者惡不仁者不使加乎其身言惡之篤而不使不仁之事加於己此與如好好色如惡惡臭皆是自己上事非是專言好人之仁惡他人之不仁也端蒙好仁者無以尚之只是將無以加之來說此與惡不仁一段相對既是好仁便知得其他無以加此若是說我好仁又卻好財好色物皆有好便是不曾好仁若果是好仁便須天下之物皆無以過之亦有解作無一物可以易其所好者蓋只是好仁一件方可謂之好仁所以言我未見好仁者徐元震問惡不仁如何曰只謂惡不仁本不是仁只不使不仁者加乎其身便是仁了好仁者與惡不仁者便別如好仁者則真能好之惡不仁者知不仁之可惡而不知好仁故別壽昌好仁者便高了惡不仁者如見白黑相似吾好白者只取白者彼黑者便自從一邊去如好白而不取白只管地去疾黑者則亦淺矣孔子言仁處皆是用力處問有能一日用其力於仁矣乎曰此心散漫放肆打一聳動時便在這裏能使得多少力雖云用力卻不大故用力佐問好仁惡不仁雖不可得果能一旦奮然用力不患力之不足曰須是立志為先這氣便隨他敬義夾持上達天德問一日用其力將志氣合說如何曰用力說氣較多志亦在上面了志之所至氣必至焉這志如大將一般指揮一出三軍皆隨只怕志不立若能立志氣自由我使夫志氣之帥也氣體之充也人出來恁地萎萎衰衰恁地柔弱亦只是志不立志立自是奮發敢為這氣便生志在這裏氣便在這裏因舉手而言曰心在這手上手便暖在這腳上腳便暖志與氣自是相隨若真箇要求仁豈患力不足聖人又說道亦有一般曾用力而力不足之人可見昏弱之甚如這般人也直是少敬之問這章聖人前面說箇向上底中閒說箇能用力而無不足底又說到有用力而力不足底有許多次第所以深警學者否曰也不是深警學者但言成德之事已不可見而用力於仁者亦無之宇敬之問好仁惡不仁至我未之見也此不出兩端好仁惡不仁者是真知得分明此身常在天理上下面說有能一日用力及力不足者皆是正當分別天理人欲處著工夫又說里仁前面所說都是且教人涵養別須更有下工夫處曰工夫只是這箇若能於此涵養是甚次第今看世上萬法萬事都只是這一箇心又曰今夜說許多話最要緊所謂講學者講此而已所謂學者學此而已賀孫問集注云好仁者真知仁之可好故舉天下之物無以加之惡不仁者真知不仁之可惡故其所以為仁者必能絕去不仁之事而不使少有及於吾身此亦只是利仁事否曰然問上蔡謂智者謂之有所見則可有所得則未可如此則是二者乃方用功底人聖人何以為未之見曰所謂未有得者當已見得仁如此好了貪心篤好必求其至便喚做有所得未可問集注於好仁惡不仁云皆成德之事所以難得而見若說未有得如何又謂之成德曰若真是好仁惡不仁底人已是大段好了只是未喚做得仁問這雖說是成德莫亦未是十全否曰雖未是十全須已及六七分了賀孫集注問集注云是成德之事如何曰固是便是利仁之事問這處地位便是在安仁之次而利仁之熟也曰到這裏是熟又未說到安仁安仁又別宇問集注前後說不同前說能用力於仁未見其力有不足者後說有用力而力不足者既曰用力亦安有昏弱欲進而不能者曰有這般人其初用力非不切至到中間自是欲進不能夫子所謂力不足者中道而廢正說此等人冉求力可做卻不自去著力耳間或有曾用力而力不足底人這般人亦是難得某舊只說得有能一日用其力一句後知某未穩大段費思量一似蟻鑽珠模樣鑽來鑽去語脈卻是如此方見得兩箇未見字不相礙宇問集注云志之所至氣必至焉以泳觀之亦有始立之志不足以帥久縱之氣者曰也是志不足問養得志完全時只在持守否曰持守體察講學考索凡聖人所說底皆著去做問須有一箇本領曰貫通處只是敬問南軒云敬字貫通動靜而以靜為本曰那是就那主靜上說閑時若靜坐些小也不妨因舉明道教上蔡且靜坐彼時卻在扶溝縣學中明道言某只是聽某說話更不去行上蔡對以無可行處明道教他且靜坐若是在家有父母合當奉養有事務合當應接不成只管靜坐休胡泳一日諸生講論語至此章有引范氏之言者曰惡不仁者不若好仁者之為美也又援呂氏之說以為惡不仁者劣於好仁者蓋謂孔子以好仁無以尚之故以惡不仁者之為劣也曰惡不仁者亦不易得但其人嚴厲可畏不如好仁者之和易也正不須將好仁惡不仁分優劣聖人謂好仁者無以尚之非以好仁者為不可過也謂人之好仁如好好色更無以尚之者此誠於好仁者也其曰惡不仁者其為仁矣不使不仁加乎其身者惡不仁如惡惡臭唯恐惡臭之及吾身其真箇惡他如此非是且如此惡他後又卻不惡他也去偽集義人之過也章黨類也偏也君子過於厚小人過於薄觀此則仁與不仁可知君子過於厚厚雖有未是處終是仁人或問過莫是失否曰亦是失也去偽問觀過知仁一章曰此是就人有過失處觀之謂如一人有過失或做錯了事便觀其是過於厚是過於薄過於厚底雖是不是然可恕亦是仁者之類過於薄底便不得便是不仁了知仁只是知其仁與不仁而已燾非是專要在過上看仁蓋就過上亦可以知仁炎觀過斯知仁此仁字是指慈愛而言淳問里仁數章說仁自有淺深輕重曰固是如觀過知仁之仁只是就仁愛上說故程先生尹先生皆只將厚薄愛忍字說便見只是慈愛底仁如里仁為美卻是那全底義剛問觀過知仁曰先儒說得仁來大了學者只管逐句愛說深不知此仁字說較淺不是仁者安仁之仁如有好底人無私意而過只是理會事錯了便也見得仁在不好底人有私意便無過也不敢保他有仁如禮記謂仁者之過易辭仁者之過只是理會事錯了無甚蹊蹺故易說不仁之過是有私意故難說此亦是觀過知仁意淳或問觀過斯知仁這仁字說得較輕曰也只是此理所以伊川云君子常失於厚過於愛厚字愛字便見得仁湖南諸公以知覺做仁說得來張大可畏某嘗見人解麒麟之於走獸云麒麟獅子也某嘗以為似湖南諸公言仁且麒麟是不踐生草不食生物多少仁厚他卻喚做獅子卻是可畏但看聖人將仁字與義字相同說便見南升聖人之言寬舒無所偏失如云觀過斯知仁猶曰觀人之過足知夫仁之所存也若於此而欲求仁之體則失聖人本意矣禮記與仁同過之意說得太巧失於迫切人傑性之問此章曰所謂君子過於厚與愛者雖然是過然亦是從那仁中來血脈未至斷絕若小人之過於薄與忍則與仁之血脈已是斷絕其謂之仁可乎時舉問過於厚與愛雖未為中理然就其厚與愛處看得來便見得是君子本心之德發出來曰厚與愛畢竟是仁上發來其苗脈可見南升此段也只是論仁若論義則當云君子過於公小人過於私君子過於廉小人過於貪君子過於嚴小人過於縱觀過斯知義矣方得這般想是因人而發專指仁愛而言也僩問伊川謂人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人傷於忍愚謂此與禮與其奢也寧儉同意曰近之人傑或問伊川此說與諸家之說如何曰伊川之說最善以君子之道觀君子則君子常過於愛失之厚以小人之道觀小人則小人常過於忍失於薄如此觀人之過則人之仁與不仁可知矣又問南軒謂小人失於薄傷於忍豈人之情也哉其所陷溺可知矣此云陷溺如何曰他要人自觀故下陷溺二字知所陷溺則知其非仁矣問南軒作韋齋記以黨為偏云偏者過之所由生也觀者用力之妙也覺吾之偏在是從而觀之則仁可識矣此說如何曰此說本平易只被後來人說得別了去偽問昨與劉公度看南軒為先生作韋齋記其間說觀過知仁一段以所觀在己及洙泗言仁論又以所觀在人不知二說先生孰取曰觀人底是記曰與仁同功其仁未可知也與仁同過然後其仁可知也即是此意又問不知此語還是孔子說否曰固不可知只是有此理曰以琮觀之不如觀己底穩貼曰此禪話也曰琮不識禪話但據己見思量若所觀在人謂君子常過於厚小人常過於薄小人於其黨類亦有過於厚處恐君子小人之過於厚薄上分別不開故謂不如只作觀己說較靜辦曰有觀字有過字有知字不知那箇是仁或謂觀便是仁事在那裏曰如琮鄙見觀字過字知字皆不是仁仁字政與過字相對過則不仁仁則不過蓋黨是己私仁是天理識得過底是己私便識得不過底是天理曰如此則卻常留箇過與己私在傍邊做甚琮曰此是聖人言知仁處未是言為仁處曰此是禪學下等說話禪門高底也自不肯如此說一部論語何嘗只說知仁便須有下手處請自思量別處說仁還有只言知仁底意思否琮朝聞道章問朝聞道道是如何曰道只是眼前分明底道理賀孫問朝聞道而可夕死莫須是知得此理之全體便可以了足一生之事乎曰所謂聞道亦不止知得一理須是知得多有箇透徹處至此雖便死也不妨明道所謂非誠有所得豈以夕死為可乎須是實知有所得方可宇道只是事物當然之理只是尋箇是處大者易曉於細微曲折人須自辨認取若見得道理分曉生固好死亦不妨不然生也不濟事死也枉死又云所謂聞者通凡聖而言不專謂聖賢然大率是為未聞道者設且如昨日不曾聞今日聞之便是程子所謂人知而信者為難非誠有所得豈以夕死為可乎知後須要得得後方信得篤夕死可矣只是說便死也不妨非謂必死也明作問集注云道者事物當然之理然嘗思道之大者莫過乎君臣父子夫婦朋友之倫而其有親有義有別有信學者苟至一日之知則孰不聞焉而即使之死則亦覺未甚濟得事然而所謂道者果何處真切至當處又何以使人聞得而遂死亦無憾曰道誠不外乎日用常行之間但公說未甚濟事者第恐知之或未真耳若是知得真實必能信之篤守之固幸而未死則可以充其所知為聖為賢萬一即死則亦不至昏昧過了一生如禽獸然是以為人必以聞道為貴也曰所謂聞者莫是大而天地微而草木幽而鬼神顯而人事無不知否曰亦不必如此大要知得為人底道理則可矣其多與少又在人學力也曰看得此章聖人非欲人聞道而必死但深言道之不可不聞耳若將此二句來反之曰若人一生而不聞道雖長生亦何為便自明白曰然若人而聞道則生也不虛死也不虛若不聞道則生也枉了死也枉了壯祖問朝聞道如何便夕死可矣曰物格知至則自然理會得這箇道理觸處皆是這箇道理無不理會得生亦是這一箇道理死亦是這一箇道理恪問夕死可矣雖死亦安無有遺恨曰死亦是道理南升朝聞道夕死可矣此聞是知得到信得及方是聞道故雖死可也若以聽人之說為聞道若如此便死亦可謂枉死了燾問朝聞道夕死可矣曰若是聞道則生也得箇好生死也得箇好死問朝夕固甚言其近然既聞而非久即死莫多有不及事之悔否曰猶愈於不聞胡泳問朝聞道夕死可矣曰所謂夕死可者特舉其大者而言耳蓋苟得聞道則事無小大皆可處得富貴貧賤無所往而不可故雖死亦有死之道也此說與集注少異讀者詳之時舉守約問伊川解朝聞道夕死可矣死得是也不知如何曰朝聞道則生得是死便也死得是若不聞道則生得不是死便也恁地若在生仰不愧俯不怍無纖毫不合道理處則死如何不會是賀孫集義朝聞道夕死可矣二先生之說初無甚異蓋道卻是事物當然之理見得破即隨生隨死皆有所處生固所欲死亦無害先生顧安卿曰伊川說實理有不可曉處云實見得是實見得非恐是記者之誤見字上必有漏落理自是理見自是見蓋物物有那實理人須是實見得義剛曰理在物見在我曰是如此義剛淳錄云實理與實見不同蓋有那實理人須是見得見得恁地確定便是實見若不實見得又都閑了賀孫問聞道自是聞道也無間於死生曰如何是無間於死生曰若聞道生也得死也得曰若聞道而死方是死得是死是則在生也都是若不聞道在生也做不是到死也不是吾儒只是要理會這道理生也是這理死也只是這理佛家卻說被這理勞攘百端費力要埽除這理教無了一生被這理撓一生被這心撓問伊川說此一段及呂氏說動容周旋中禮盛德之至君子行法俟命是此意否曰這是兩項動容周旋中禮這是聖人事聞道自不足以言之自與道為一了自無可得聞行法以俟命是見得了立定恁地做問伊川云得之於心是為有得不待勉強學者須當勉強是如何曰這兩項又與上別這不待勉強又不是不勉而中從容中道只是見得通透做得順便如所謂樂循理底意思問曾子易簀當時若差了這一著喚做聞道不聞道曰不論易簀與不易簀只論他平日是聞道與不聞道平日已是聞道那時萬一有照管不到也無奈何問若果已聞道到那時也不到會放過曰那時是正終大事既見得自然不放過賀孫士志於道章問志於道而恥惡衣惡食既是志道如何尚如此曰固有這般半上半落底人其所謂志也是志得不力只是名為志道及外物來誘則又遷變了這箇最不濟事義剛眾朋友共說士志於道以下六章畢先生曰此數章如尹和靖程子所注只於本文添一兩字看著似平淡子細去窮究其味甚長義剛君子之於天下也章文矩問君子之於天下也一章曰義是吾心所處之宜者見事合恁地處則隨而應之更無所執也時舉義之與比非是我去與義相親義自是與比謨敬之問義之與比是我這裏所主者在義曰自不消添語言只是無適無莫看義理合如何處物為義只看義理合如何區處他義當富貴便富貴義當貧賤便貧賤當生則生當死則死只看義理合如何賀孫南軒說無適無莫適是有所必莫是無所主便見得不安程氏謂無所往無所不往且要義之與比處便安了曰古人訓釋字義無用適字為往字者此適字當如吾誰適從之適音的是端的之意言無所定亦無所不定爾欽夫云吾儒無適無莫釋氏有適有莫此亦可通大雅問上蔡所謂於無可無不可之間有義存焉則君子之心果有所倚乎凡事皆有一箇合宜底道理須是見得分明雖毫髮不差然後得是當曰義即宜也但須處得合宜故曰處物為義南升先生問謝氏謂君子之心果有所倚乎如何看義剛云只是隨事物去量度不是倚於義曰只是把心去看是與不是義剛因問無可無不可皆是無所容心但聖人是有箇義佛老是聽其自然是恁地否曰聖人也不說道可也不說道不可但看義如何耳佛老皆不睹是我要道可便是可我要道不可便是不可只由在我說得義剛君子懷德章懷刑只是惡不善不使不善之事加乎一身南升君子懷刑言思刑法而必不犯之如懼法之云爾端蒙君子懷刑如禮記所謂畏法令又如肅政教之類皆是或謂如問國之大禁而後敢入是否曰不必如此說只此懷刑一句亦可為善如違條礙貫底事不做亦大段好了明作問所貴乎君子者正以其無所待於外而自修也刑者先王所以防小人君子何必以是為心哉先生默然良久曰無慕於外而自為善無畏於外而自不為非此聖人之事也若自聖人以降亦豈不假於外以自修飭所以能見不善如探湯不使不仁者加乎其身皆為其知有所畏也某因思集注言君子小人趨向不同公私之間而已只是小人之事莫非利己之事私也君子所懷在德則不失其善至於刑則初不以先王治人之具而有所憎疾也亦可借而自修省耳只是一箇公心且如伊川卻做感應之理解此一章文義雖亦可通然論語上言君子小人皆是對舉而並言此必不然也先生又言如漢舉孝廉必曰順鄉里肅政教肅政教之云是亦懷刑之意也某因思得此所謂君子者非所謂成德之人也若成德之人則誠不待於懷刑也但言如此則可以為君子如此則為小人未知是否壯祖此是君子小人相對說看尹子之說得之若一串說底便添兩箇則字惠字下又著添字又問懷刑曰只是君子心常存法大抵君子便思量苦底小人便思量甜底又有一說懷刑作恤刑懷德作施德要之不如好善而惡不仁者是放於利而行章放於利而行多怨只是要便宜底人凡事只認自家有便宜處做便不恤他人所以多怨南升放於義而行只據道理做去亦安能盡無怨於人但識道理者須道是雖有怨者如何恤得他若放於利則悖理徇私其取怨之多必矣閎祖或說放於利而行義剛云此非斷斷然為利但是依放那利行是外不為利而內實有為利底意思曰才是放時便是為利了豈有兩樣若是外不為利而內實為利則是為利尤甚於斷斷然為利者義剛放利多怨或問青苗亦自便民何故人怨曰青苗便是要利息所以人怨明作能以禮讓為國章讓是那禮之實處苟徒跪拜俯伏而以是為禮何足取信於人讓者譬如凡事寧就自家身上扶出些子辭尊居卑辭多受少底意思方是禮之實賜不能以禮讓為國是徒能進退可觀容止可度及到緊要處卻不能讓雖有這繁文末節處亦無用亦不得謂之禮僩問讓者禮之實也莫是辭讓之端發於本心之誠然故曰讓是禮之實曰是若玉帛交錯固是禮之文而擎跽曲拳升降俛仰也只是禮之文皆可以偽為惟是辭讓方是禮之實這卻偽不得既有是實自然是感動得人心若以好爭之心而徒欲行禮文之末以動人如何感化得他問如禮何一句從來諸先生都說得費力今說讓是禮之實則此句尤分明曰前輩於這般處也自闊略才被說得定了便只是是也賀孫問不能以禮讓為國如禮何諸家解義卻是解做如國何了曰是如此如諸家所說則便當改作如國何大率先王之為禮讓正要朴實頭用若不能以此為國則是禮為虛文爾其如禮何謨問禮者自吾心恭敬至於事為之節文兼本末而言也讓者禮之實所為恭敬辭遜之心是也君子欲治其國亦須是自家盡得恭敬辭遜之心方能以禮為國所謂一家讓一國興讓則為國何難之有不能盡恭敬辭遜之心則是無實矣雖有禮之節文亦不能行況為國乎曰且不柰禮之節文何何以為國南升義剛說禮讓為國一章添不信仁賢咈百姓從己之欲等語曰此於聖賢本意不親切一家讓一國興讓此只是說我能如此禮遜則下面人自是興起更相遜讓如此則為國何難之有未說到那一人貪戾一國作亂處在如東坡說敦教化中一段亦自好其說雖粗道理卻是恁地而今人好玄妙凛地說得無形無影卻不如只粗說較強良久歎息言今日不能制民之產已自不是民自去買田又更收牙稅是甚說話古人禁人聚飲今卻張官置吏惟恐人不來飲如此卻何以責人謙遜義剛不患無位章不患無位患所以立猶云不怕無官做但怕有官不會做若有致君澤民之具達則行之無位非所患也南升不患莫己知求為可知也不患人之不己知患不知人也這箇須看聖人所說底語意只是教人不求知但盡其在我之實而已看聖人語意了又看今人用心也有務要人知者只是看這語意差便要如此所謂求為可知只是盡其可知之實非是要做些事便要夸張以期人知這須看語意如居易以俟命也只教人依道理平平做將去看命如何卻不是說關門絕事百樣都不管安坐以待這命賀孫
