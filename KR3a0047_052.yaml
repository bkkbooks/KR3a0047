body:
  text: 朱子語類卷第五十二孟子二公孫丑上之上問夫子當路於齊章以齊王猶反手不知置周王於何地曰此難言可以意會如湯武之事是也春秋定哀間周室猶得至孟子時天命人心已離矣去偽問夫子加齊之卿相章或問雖由此霸王不異矣如何分句曰只是雖由此霸王不異矣言從此為霸為王不是差異蓋布衣之權重於當時如財用兵甲之類盡付與他樂毅統六國之師長驅入齊蓋卿公孫丑問孟子動心否乎非謂以卿相當富貴動其心謂伯王事大恐孟子擔當不過有所疑懼而動其心也閎祖孟子之不動心非如揚雄之説霸王不異矣蓋言由此可以行伯王之事公孫丑見其重大恐孟子或懼而動心德明德修問公孫丑説不動心是以富貴而動其心先生曰公孫丑雖不知孟子必不謂以富貴動其心但謂霸王事大恐孟子了這事不得便謂孟子動心不知霸王當甚間事因論知言養氣德修謂養氣為急知言為緩曰孟子須先説我知言然後説我善養吾浩然之氣公孫丑先問浩然之氣次問知言者因上面説氣來故接續如此問不知言如何養得氣德修云先須養有尺便量見天下長短曰須要識這尺文蔚先生問趙丞看不動心章如何曰已略見得分明曰公孔丑初問不動心只道加以卿相重任怕孟子心下怯懾了故有動心之問其意謂必有勇力擔當得起方敢不動其心故孟子下歷言所以不動心之故公道那處是一章緊要處趙舉持其志無暴其氣為對曰不如此趙舉集義所生以為對曰然因言欲養浩然之氣則在於直要得直則在於集義集義者事事要得合義也事事合義則仰不愧俯不怍趙又問夫有所受之也是如何曰公如此看文字不得且須逐項理會理會這一項時全不知有那一項始得讀大學時心只在大學上讀論語時心只在論語上更不可又去思量別項這裏一字理會未得且理會這一字一句理會未得且理會這一句如不動心一段更著仔細去看看著方知更有未曉處須待十分曉得無一句一字窒礙方可看別處去因云橫渠語録有一段説讀書須是成誦不成誦則思不起直須成誦少間思量起便要曉得這方是浹洽賀孫先生問周看公孫丑不動心章答云云先生曰公孫丑初間謂任此重事還動心不動心孟子答以不動心極容易底事我從四十已不動了告子又先我不動心公孫丑又問不動心有道理無道理孟子又告以有於是又舉北宮黝孟施舍之勇也是不動然彼之所以不動者皆強制於外不是存養之功故又舉曾子之言云自反縮與不縮所以不動只在方寸之間若仰不愧俯不怍看如何大利害皆不足以易之若有一毫不直則此心便索然公孫丑又問孟子所以不動者如何孟子遂答以我知言我善養吾浩然之氣若依序問當先問知言公孫丑只承孟子之言便且問浩然之氣賀孫器之問不動心一條曰此一段為被他轉換問所以答得亦周匝然止就前段看語脈氣象雖無後截亦自可見前一截已自見得後面許多意足賀孫問告子之不動心是否曰告子之不動心是粗法或強制不動金録作修身不能不動不可知或臨大事而金録作不能不動亦未可知非若孟子酬酢萬變而不動也又問正如北宮黝之勇作養勇否曰然謨去偽同告子不動心是硬把定閎祖北宮黝孟施舍只是粗勇不動心德明孟施舍北宮黝是不畏死而不動心告子是不認義理而不動心告子惟恐動著他心德明問集注云施是發語聲何也曰此是古注説後面只稱舍字可見問有何例可按曰如孟之反舟之僑尹公之他之類德明問集注云子夏篤信聖人何以言之曰這箇雖無事實儒用録云此因孟子説處文義推究亦無事實可指但看他言語如日知其所亡月無忘其所能博學而篤志切問而近思看他此處閎祖録云便見得他有箇緊把定底意思又把孟子北宮黝來比便見他篤信聖人處夔孫儒用録云詳味之有篤信聖人氣象閎祖略問孟施舍量敵慮勝似有懼也孟子乃曰能無懼如何曰此孟施舍譏他人之言舍自云我則能無懼而已問那是孟施舍守約處曰孟施舍本與北宮黝皆只是勇夫比曾子不同如北宮黝孟施舍孟賁只是就勇上言如子襄曾子告子就義理上言去偽問如何是孟施舍守約處曰北宮黝便勝人孟施舍卻只是能無懼而已矣如曰視不勝猶勝也此是孟施舍自言其勇如此若他人則量敵而進慮勝而會是畏三軍者爾豈能為必勝哉能無懼而已矣去偽引曾子謂子襄之言以明不動心之由在於自反而縮下文詳之閎祖曾子守約不是守那約言所守者約耳僩今人把守氣不如守約做題目此不成題目氣是實物約是半虛半實字對不得守約只是所守之約言北宮黝之守氣不似孟施舍守氣之約孟施舍之守氣又不如曾子所守之約也孟施舍就氣上做工夫曾子就理上做工夫淳尋常人説守約二字極未穩如云守氣不如守約分明將約字做一物遂以約字對氣字所謂守約者所守者約耳謨去偽同孟子説曾子謂子襄一段已自盡了只為公孫丑問得無了期故有後面許多説話自修不得於言只是不曉這説話言只似道理字淳不得於言勿求於心不得於心勿求於氣此告子不動心之法告子只就心上理會堅持其心言與氣皆不理會不得謂失也有失於其言則曰無害於心但心不動言雖失不必問也惟先之於心則就心上整理不復更求於氣德明不得於言勿求於心此正孟子告子不動心之差別處當看上文云敢問夫子之不動心與告子之不動心孟子卻如此答便見得告子只是硬做去更不問言之是非便錯説了也不省如與孟子論性説性猶杞柳也既而轉性猶湍水也他只不問是非信口説出定要硬把得心定不得於言謂言之失也勿求於心謂言之失非干心事也此其學所以與孟子異故孟子章末云我故曰告子未嘗知義以其外之也端蒙不得於言勿求於心不得於心勿求於氣不得猶曰失也謂言有所不知者則不可求之於心心有不得其正者則不可求之於氣孟子謂言有所不能知正以心有所不明故不得於言勿求於心不可其不得於心者固當求之心然氣不得所養亦反能動其心故不得於心勿求於氣雖可而未盡也蓋知言只是知理告子既不務知言亦不務養氣但只硬把定中間箇心要他不動孟子則是能知言又能養氣自然心不動蓋知言本也養氣助也三者恰如行軍知言則其先鋒知虛識實者心恰如主帥氣則卒徒也孟子則前有引導後有推助自然無恐懼紛擾而有以自勝告子則前後無引助只恁孤立硬做去所以與孟子不動心異也不得於言以下但作如此看則此一章血脈貫通而於知言養氣詖淫邪遁之辭方為有下落也至於集義工夫乃在知言之後不能知言則亦不能集義言如觀古聖賢之言與聽今人之言皆是端蒙不得於心勿求於氣者不失其本則猶可也不得於言而不求於心以考其所失則其中頑然無所知覺無以擇其義之所安故斷之以不可端蒙不得於言勿求於心是心與言不相干不得於心勿求於氣是心與氣不相貫此告子説也告子只去守箇心得定都不管外面事外面是亦得不是亦得孟子之意是心有所失則見於言如肝病見於目相似陸子靜説告子亦有好處今人非但不識孟子亦不識告子只去言語上討不著陸子靜卻説告子只靠外面語言更不去管內面以某看告子只是守著內面更不管外面泳問告子謂不得於言勿求於心是自己之言耶是他人之言耶若要得後面知言處相貫則是他人之言曰這一段前後都相貫即是一樣言語告子於此不達則不復反求其理於心嘗見陸子靜説這一段大段稱告子所見高告子固是高亦是陸子之學與告子相似故主張他然陸氏之學更鶻突似告子至云陸氏之學不甚教人讀書看文字與告子相似否先生曰便是先生又謂養氣一段緊要處是自反而縮以直養而無害是集義所生者緊要處在此三句上看至林問不得於言勿求於心曰此章文義節節相承須逐節次第理會此一節只言告子所以先我不動心者皆是以義為外故就告子所言以辨其是非爾又問浩然之氣便是西銘意思否曰考論文義且只據所讀本文逐句逐字理會教分明不須旁引外説枝蔓遊衍反為無益如論浩然之氣便直看公孫丑所問意思如何孟子所答如何一徑理會去使當時問答之意一一明白了然後卻更理會四旁餘意未晚今於孟子之意未能曉得又卻轉從別處去末梢都只恁休去又問詖淫邪遁之意如何辨別曰詖淫邪遁雖是四般然才有一般則其餘牽連而生大概多從詖上起詖只是偏才偏便自是一邊高一邊低不得其正如楊氏為我則蔽於仁墨氏兼愛則蔽於義由其蔽故多為蔓衍推之愈闊如爛物相似只管浸淫陷在一處都轉動不得如墨者夷之所謂愛無差等施由親始愛無差等是其本説又卻假托施由親始之言栽接以文其説是也淫辭如此自不知其為邪如列子達生之論反以好色飲酒為善事而不覺其離於道也及其説不行又走作逃遁轉從別處去釋氏毀人倫去四大人謂其不可行則曰雖不毀棄人倫亦可以行吾説此其所以必窮也又問性善之論與浩然之氣如何曰性善自是性善何與於此方理會浩然之氣未有一些涯際又卻説性善又如適來西銘之問也譬如往一處所在路留連濡滯正所要往之地愈不能達何如且一徑直截去到此處了卻往他所何害此為學者之大病謨問氣體之充曰都是這一點母子上生出如人之五臟皆是從這上生出來夔孫問血氣之氣與浩然之氣不同曰氣便只是這箇氣所謂體之充也便是炎志乾氣坤升卿問志至焉氣次焉曰志最緊氣亦不可緩志至焉則氣便在這裏是氣亦至了卓李問志至焉氣次焉此是説志氣之大小抑志氣之先後曰也不是先後也不是以大小只是一箇緩急底意思志雖為至然氣亦次那志所爭亦不多蓋為告子將氣忒放低説了故説出此話淳鄭太錫問志至焉氣次焉曰志最緊要氣亦不可緩故曰志至焉氣次焉持其志無暴其氣是兩邊做工夫志只是心之所向而今欲做一件事這便是志持其志便是養心不是持志外別有箇養心問志與氣如何分別曰且以喜怒言之有一件事這裏便合當審處是當喜是當怒若當喜也須喜若當怒也須怒這便持其志若喜得過分一向喜怒得過分一向怒則氣便粗暴了便是暴其氣志卻反為所動今夫蹶者趨者是氣也他心本不曾動只是忽然喫一跌氣才一暴則其心志便動了賀孫或問志至焉氣次焉此是説養氣次第志是第一件氣是第二件又云持其志無暴其氣此是言養氣工夫內外須是交盡不可靠自己自守其志便謂無事氣才不得其平志亦不得其安故孟子以蹶趨形容之告子所謂不得於心勿求於氣雖是未為全論程子所以言氣動志者什一正謂是爾曰然兩者相夾著方始德不孤胡泳志至氣次只是先後志在此氣亦隨之公孫丑疑只就志理會理會得志氣自隨之不必更問氣也故云又曰持其志無暴其氣何也孟子下文專説氣云蹶趨之氣亦能動心德明持其志無暴其氣內外交相養蓋既要持志又須無暴其氣持志養氣二者工夫不可偏廢以氣一則動志志一則動氣觀之則見交相為養之理矣端蒙既持其志不必言無暴其氣可也然所以言者聖賢有這物便做這事公孫丑猶疑而問曰既曰志至焉氣次焉又曰持其志無暴其氣者何也持其志只是輕輕地做得去無暴其氣只是不縱喜怒哀樂凡人縱之節問持其志無暴其氣處古人在車聞鸞和行則鳴佩玉凡此皆所以無暴其氣今人既無此不知如何而為無暴曰凡人多動作多語笑做力所不及底事皆是暴其氣且如只行得五十里卻硬要行百里只舉得五十斤重卻硬要舉百斤凡此類皆能動其氣今學者要須事事節約莫教過當此便是養氣之道也時舉先生問公每讀無暴其氣如何鄭云只是喜怒哀樂之時持之不使暴戾曰此乃是持其志志者心之所向持志卻是養心也不是持志之外別有箇養心持者把提教定當喜時也須喜當怒時也須怒當哀時也須哀當樂時也須樂審教定後發必中節這是持志若無暴其氣又是下面一截事若不當喜而喜與喜之過分不當怒而怒與怒之過分不當哀樂而哀樂與哀樂之過其節者皆是暴其氣暴其氣者乃大段粗也卓或問人之氣有清明時有昏塞時如何曰人當持其志能持其志則氣當自清矣然孟子既説持其志又説無暴其氣聖賢之言不偏於一類如此蓋恐人專於志而略於氣故也正如説必有事焉又説勿正心説勿忘又説勿助長皆此意也問伊川論持其志曰只這箇也是私然學者不恁地不得先生曰此亦似涉於人為然程子之意恐人走作故又救之曰學者不恁地不得因舉程子云學者為習所奪氣所勝只可責志又問既得後須放開不然卻只是守曰如從心所欲不踰矩是也然此理既熟自是放出但未能得如此耳人傑或疑氣何以能動志曰志動氣是源頭濁者故下流亦濁也氣動志者卻是下流壅而不泄反濁了上面也蓋卿氣若併在一處自然引動著志古人所以動息有養也升卿遺書曰志一動則動氣氣一動則動志外書曰志專一則動氣氣專一則動志二者孰是曰此必一日之語學者同聽之而所記各有淺深類多如此志一動則動氣氣一動則動志此言未説動氣動志而先言志動氣動又添入一動字不若後説所記得其本旨蓋曰志專一則固可以動氣而氣專一亦可以動其志也謨蹶者趨者是氣也而反動其心今人奔走而來偶喫一跌其氣必逆而心不定是氣之能動其心如人於忙急之中理會甚事亦是氣未定也卓問蹶趨反動其心若是志養得堅定莫須蹶趨亦不能動得否曰蹶趨自是動其心人之奔走如何心不動得曰蹶趨多遇於猝然不可支吾之際所以易動得心曰便是淳知言知理也節知言然後能養氣閎祖孟子説養氣先説知言先知得許多説話是非邪正人傑録作得失都無疑後方能養此氣也人傑同孟子論浩然之氣一段緊要全在知言上所以大學許多工夫全在格物致知僩知言養氣雖是兩事其實相關正如致知格物正心誠意之類若知言便見得是非邪正義理昭然則浩然之氣自生人傑去偽同問養氣要做工夫知言似無工夫得做曰豈不做工夫知言便是窮理不先窮理見得是非如何養得氣須是道理一一審處得是其氣方充大德明知言則有以明夫道義而於天下之事無所疑養氣則有以配夫道義而於天下之事無所懼燾敢問夫子惡乎長曰我知言我善養吾浩然之氣公孫丑既知告子之失而未知孟子之所以得敢問焉而孟子告之我知言者能識群言之是非也浩然盛大流行之貌蓋天地之氣而吾之所得以充其體者也孟子能知人言之是非告子乃自以其言為外而不復考其得失孟子善養其氣而告子乃以為末而不求其得失可見矣端蒙胡文定説知言知至也養氣誠意也亦自説得好木之胡氏云格物則能知言誠意則能養氣閎祖問知言在養氣之先如何曰知是知得此理告子便不理會故以義為外如云不得於言勿求於心雖言亦謂是在外事更不管著只強制其心問向看此段以告子不得於言是偶然失言非謂他人言也曰某向來亦如此説然與知言之義不同此是告子聞他人之言不得其義理又如讀古人之書有不得其言之義皆以為無害事但心不動足矣不知言便不知義所以外義也如詖淫邪遁亦只是他人言故曰生於其心其字便是謂他人也又言聖門以言語次於德行言語亦大難若非燭理洞徹胸次坦然即酬酢應對蹉失多矣因論奏事而言問此須要記問熟方臨時一一舉得出曰亦未説記問如沙中之事張良只云陛下不知乎此乃謀反耳何嘗別有援引至借箸發八難方是援引古今問伊川龜山皆言張良有儒者氣象先生卻以良為任數曰全是術數問養虎自遺患等事竊謂機不可失曰此時便了卻項羽卻較容易然項羽已是無能為終必就擒也德明今按聞他人言之説與集注異有問知言先生曰言之所發便是道理人只將做言看做外面看且如而今對人説話人説許多自家對他便是自家己事如何説是外面事坐中有聶尉亦建昌人與謙言先生向日説傅子癪是天理戰罷人欲宅眷又云傅子癪是擔著官綱擔子到處胡撞人胡把競人謙氣一氣浩然之氣義理之所發也閎祖浩然之氣是養得如此方子浩然之氣清明不足以言之才説浩然便有箇廣大剛果意思如長江大河浩浩而來也富貴貧賤威武不能移屈之類皆低不可以語此公孫丑本意只是設問孟子能擔當得此樣大事否故孟子所答只説許多剛勇故説出浩然之氣只就問答本文看之便見得仔細謨氣只是一箇氣但從義理中出來者即浩然之氣從血肉身中出來者為血氣之氣耳閎祖問浩然之氣是稟得底否曰只是這個氣若不曾養得剛底便粗暴弱底便衰怯又曰氣魄大底雖金石也透過了夔孫或問孟子説浩然之氣卻不分稟賦清濁説曰文字須逐項看此章孟子之意不是説氣稟只因説不動心滾説到這處似今人説氣魄相似有這氣魄便做得這事無氣魄便做不得文振説浩然之氣曰不須多言這只是箇有氣魄無氣魄而已人若有氣魄方做得事成於世間禍福得喪利害方敵得去不被他恐動若無氣魄便做人衰颯懾怯於世間禍福利害易得恐動只是如此他本只是答公孫丑不動心纏來纏去説出許多養氣知言集義其實只是個不動心人若能不動心何事不可為然其所謂不動心不在他求只在自家知言集義則此氣自然發生於中不是只行一兩事合義便謂可以掩襲於外而得之也孔子曰不得中行而與之必也狂狷乎看來這道理須是剛硬立得腳住方能有所成只觀孔子晚年方得箇曾子曾子得子思子思得孟子此諸聖賢都是如此剛果決烈方能傳得這個道理若慈善柔弱底終不濟事如曾子之為人語孟中諸語可見子思亦是如此如云摽使者出諸大門之外又云以德則子事我者也奚可以與我友孟子亦是如此所以皆做得成學聖人之道者須是有膽志其決烈勇猛於世間禍福利害得喪不足以動其心方能立得腳住若不如此都靠不得況當世衰道微之時尤用硬著脊梁無所屈撓方得然其工夫只在自反常直仰不愧天俯不怍人則自然如此不在他求也又曰如今人多將顏子做箇柔善底人看殊不知顏子乃是大勇反是他剛果得來細密不發露如箇有大氣力底人都不使出只是無人抵得他孟子則攘臂扼腕盡發於外論其氣象則孟子粗似顏子顏子較小如孔子孔子則渾然無迹顏子微有迹孟子其迹盡見然學者則須自粗以入細須見剛硬有所卓立然後漸漸加工如顏子聖人也僩問浩然之氣即是人所受於天地之正氣否曰然又問與血氣如何曰只是一氣義理附于其中則為浩然之氣若不由義而發則只是血氣然人所稟氣亦自不同有稟得盛者則為人強壯隨分亦有立作使之做事亦隨分做得出若稟得弱者則委靡巽懦都不解有所立作唯是養成浩然之氣則卻與天地為一更無限量廣或問浩然之氣是天地正氣不是粗厲底氣曰孟子正意只説人生在這裏便有這氣能集義以養之便可以充塞宇宙不是論其粗與細正與不正如所謂惻隱之心人皆有之只是理如此若論盜跖便幾於無此心矣不成孟子又説箇有惻隱之心無惻隱之心問浩然之氣曰這箇孟子本説得來粗只看他一章本意是説箇不動心所謂浩然之氣只似箇粗豪之氣他做工夫處雖細膩然其成也卻只似箇粗豪之氣但非世俗所謂粗豪者耳僩浩然之氣一章説得稍粗大意只是要仰不愧於天俯不怍於人氣便浩然如彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉如在彼者皆我所不為也在我者皆古之制也吾何畏彼哉自家有道理對著他沒道理何畏之有閎祖孟子養氣一章大綱是説箇仰不愧於天俯不怍於人上面從北宮黝孟施舍説將來只是箇不怕但二子不怕得粗孟子不怕得細或問合而有助助字之訓如何曰道義是虛底物本自孤單得這氣帖起來便自張主皆去聲無所不達如今人非不為善亦有合於道義者若無此氣便只是一箇衰底人李先生曰配是襯帖起來又曰若説道襯貼卻是兩物氣與道義只是一滾發出來思之一滾發出來説得道理好襯帖字説配字極親切從周蓋卿録云先生因舉延平之言曰配是襯帖起來若道箇襯帖卻是兩物道義與氣只是一滾發出來思之一滾發出來説得道理好襯帖字卻説得配字親切孟子分明説配義與道只是襯帖不是兩物相襯貼只是一滾發出來但道理得此浩然之氣襯貼起方有力量事可擔當若無是則餒矣又曰義與道若無浩然之氣襯帖起縱有一二合於道義未免孤單後蓋卿録震録記黎季成所問兩條疑同聞而有詳略浩然之氣一章孔子兩句盡之曰內省不疚夫何懼憂何僩問他書不説養氣只孟子言之何故曰這源流便在那心廣體胖內省不疚夫何憂何懼處來大抵只是這一箇氣又不是別將箇甚底去養他但集義便是養氣知言便是知得這義人能仰不愧俯不怍時看這氣自是浩然塞乎天地之間幹問養氣一章皆自大學誠意一章來曰不必説自那裏來只是此一箇道理説來説去自相湊著道夫問向看誠意章或問云孟子所論浩然之氣其原蓋出於此道夫因誦其所謂浩然之説先生謂也是恁地只是不要忙不知此語是為始學者言養氣之理如此曰不是恁地這工夫是忙不得他所以有勿忘勿助長之論道夫問浩然之氣如何看曰仁義禮智充溢於中睟然見面盎背心廣體胖便自有一般浩然氣象曰此説甚細膩然非孟子本意此段須從頭看來方見得孟子本意孟子當初如何便當大任而不動心如何便過孟賁遠矣如何便自反而縮千萬人吾往矣只此勇為不懼便是有浩然之氣此説似粗而實精以程子説細考之當初不是説不及此只門人記録緊要處脫一兩字便和全意失了浩然之氣只是這血氣之氣不可分作兩氣人之言語動作所以充滿於一身之中者即是此氣只集義積纍到充盛處仰不傀俯不怍這氣便能浩然問配義之配何謂合而有助之意曰此語已精如有正將又立箇副將以配他乃所以助他天下莫強於理義當然是義總名是道以道義為主有此浩然之氣去助他方勇敢果決以進如這一事合當恁地做是義也自家勇敢果決去做便是有這浩然之氣去助他有人分明知得合當恁地做又恧縮不敢去做便是餒了無此浩然之氣如君有過臣諫之是義也有到冒死而不顧者便是浩然之氣去助此義如合説此話卻恧縮不對便是氣餒便是欿然之氣只是一氣餒了便成欿然之氣不調和便成忿厲之氣所以古人車則有和鸞行則有佩玉貴於養其氣問氣一則動志這氣字是厲氣否曰亦不必把作厲氣但動志則已是不好底氣了志動氣者什九氣動志者什一須是以志為主無暴其氣孟子當初乃剩説此一句所以公孫丑復辨問集義到成此浩然之氣則氣與義為一矣及配助義道則又恐成二物否曰氣與義自是二物只集義到充盛處則能強壯此氣便自浩然所以又反來助這道義無是氣便餒而不充了問配者助也是氣助道義而行又曰集義所生是氣又因義集而後生莫是氣與道義兩相為用否曰是兩相助底意初下工夫時便自集義然後生那浩然之氣及氣已養成又卻助道義而行淳厚之問浩然之氣迫於患難方失曰是氣先歉故臨事不能支吾浩然之氣與清明之氣自不同浩然猶江海浩浩可學浩然之氣乃是於剛果處見以前諸儒於此卻不甚説只上蔡云浩然是無虧欠處因舉屏山喜孫寶一段可學問上蔡嘗曰浩然之氣須於心得其正時識取又曰浩然是無虧欠時竊謂夜氣清明以至平旦此氣無虧欠而得其正即加勿忘勿助長之功以存養之如何曰夜氣者乃清明自然之氣孟子示人要切處固當存養若浩然之氣卻當從吾嘗聞大勇於夫子之語看之至配義與道無是餒也於此得其正而無虧欠則其氣浩然天下大事何所做不得又問浩然之氣原本在於至大至剛若用工處只在必有事焉而勿正心勿忘勿助長否曰勿忘勿助長亦只是涵泳底意思用工全在集義佐信州刊李復潏水集有一段説浩然之氣只是要仰不愧俯不怍便自然無怯懼其言雖粗卻盡此章之意前輩説得太高如龜山為某人作養浩堂記都説從別處去閎祖孟子養氣一段某説得字字甚仔細請子細看浩然之氣須是識得分明自會養得成若不見得直是是直是非欲説不説只恁地含含胡胡依違鶻突要説又怕不是這如何得會浩然人自從生時受天地許多氣自恁地周足只緣少間見得沒分曉漸漸衰颯了又不然便是行有不慊於心氣便餒了若見得道理明白遇事打併淨潔又仰不愧俯不怍這氣自浩然如豬胞相似有許多氣在裏面便恁地飽滿周遍若無許多氣便厭了只有許多筋膜這氣只論箇浩然與餒又不然只是驕吝有些善只是我自會更不肯向人説恁地包含這也只會餒天地吾身之氣非二賀孫兩箇其為氣也前箇是説氣之體段如此後箇是説這氣可將如此用僩問伊川以至大至剛以直為絶句如何曰此是趙岐説伊川從之以某觀之只將至大至剛為絶句亦自意義分明輝曰如此卻不費力曰未可如此説更宜將伊川之説思之輝問程子以直字為句先生以以直字屬下句曰文勢當如此説若以直字為句當言至大至剛至直又此章前後相應皆是此意先言自反而縮後言配義與道所謂以直養而無害乃自反而縮之意大抵某之解經只是順聖賢語意看其血脈通貫處為之解釋不敢自以己意説道理也人傑古注及程氏皆將至大至剛以直做一句據某所見欲將至大至剛為一句以直養而無害為一句今人説養氣皆謂在必有事焉而勿正心勿忘勿助長四句上要緊未必在此藥頭只在那以直養而無害及集義上這四句卻是箇炮炙鍛煉之法直只是無私曲集義只是事事皆直仰不愧於天俯不怍於人便是浩然之氣而今只將自家心體驗到那無私曲處自然有此氣象文蔚云所以上蔡説於心得其正時識取曰是文蔚問塞天地莫只是一箇無虧欠否曰他本自無虧欠只為人有私曲便欠卻他底且如萬物皆備於我反身而誠樂莫大焉亦只是箇無虧欠君仁臣忠父慈子孝自家欠卻他底便不快活反身而誠樂莫大焉無欠闕也以此見浩然之氣只是一箇仰不愧於天俯不怍於人王德修云伊川卻將至大至剛以直與坤卦直方大同説曰便是不必如此且只將孟子自看便見孟子説得甚粗易卻説得細文蔚伯豐問至大至剛以直字自絶句曰古注如此程氏從之然自上下文推之故知以直字屬下句不是言氣體正是説用工處若只作養而無害卻似禿筆寫字其話沒頭觀此語脈自前章縮不縮來下章又云是集義所生義亦是直意若行有不慊於心則餒矣故知是道用功夫處必有事焉而勿正心心字連上句亦得但避大學正心故將心字連下句然初不相干各自取義古注正字作望字解如將心勿忘屬上文勿助長屬下文亦不須如此只是浩然之氣養之未至而望有之便是正如其正時只是望之而已至於助長則是強探力取氣未能養遽欲加人力之私是為揠苗而已饒録云至于期望不得浩然時卻未能養遽欲強加力作弄要教浩然便是助長也黎季成問伊川於以直處點句先生卻於剛字下點句曰若於直字斷句則養字全無骨肋只是自反而縮是以直養而無害也又問配義與道曰道義在人須是將浩然之氣襯貼起則道義自然張主所謂配合而助之者乃是貼起來也先生作而言曰此語若與孟子不合者天厭之天厭之蓋卿黎季成問至大至剛以直三者乃氣之本體闕一不可三者之中直字尤切今集注卻似以直來養此氣曰不用直卻著甚底來養黎云集義工夫是養曰義便是直此直字從曾子聞大勇於夫子自反而縮處説起後來又説集義與此以直養而無害皆一章緊切處所謂浩然之氣粗説是仰不愧於天俯不怍於人無所疑畏故上面從北官黝孟施舍説來只是説箇不怕但二子不怕得粗曾子不怕得細膩黎又問配義與道集注云配者合而有助之意竊疑配字罕有以助為釋者曰公如何説正好商量曰浩然之氣集義而成者其用則無非義其體則道也曰卻如何是合曰浩然之氣與道義無間異曰如此則是無分別此一段都緩慢了公歸去仰臥思量心必不安黎又云先生之意甚明切某所疑配字非助曰此謂道義得浩然之氣助之方有張主如以一碗水攙一碗水則剛果勇決無所疑憚有以任重做得去若箇人做得一件半件事合道義而無浩然之氣來配助則易頽墮了未必不為威武所屈貧賤所移做大丈夫不得又云助字釋配字乃得之李先生云助是陪貼底字先生又曰某解此段若有一字不是孟子意天厭之又曰無此氣之扶持之仁或見困於不仁義或見陵於不義震遺書以李端伯所録最精故冠之篇首然端伯載明道所言以至大至剛為句以直養二字屬下句及楊遵道録伊川之言則曰先生無此説斷然以至大至剛以直為一句二説正相抵牾曰至大至剛以直趙臺卿如此解直養之説伊川嫌其以一物養一物故從趙注舊嘗用之後來反覆推究卻是至大至剛作一句以直養而無害作一句為得孟子之意蓋聖賢立言首尾必相應如云自反而縮便有直養意思集義之説亦然端伯所記明道語未必不親切但恐伊川又自主張得別故有此議論今欲只從明道之説也謨問明道以以直養而無害為句伊川云先兄無此説何也曰看那一段意思明道説得似乎有理孟子所謂以直者但欲其無私意耳以前頭説自反而縮自反而不縮處都是以直養底意思氣之體段本自剛大自是能塞天地被人私意妄作一向蔽了他一箇大底體段故孟子要人自反而直不得妄有作為以害其本體如明道所説真箇見得孟子本意又云伊川為人執便道是先兄無此言也問伊川作以直點如何曰氣之體段若自剛大外更著一二字形容也得然工夫卻不在上面須要自家自反而直然後能養而無害也又問詖淫邪遁曰詖只是偏詖如人足跛相似斷行不得且楊墨説為我兼愛豈有人在天地間孑然自立都不涉著外人得又豈有視人如親一例兼愛得此二者皆偏而不正斷行不得便是蔽於此了至淫辭則是説得愈泛濫陷溺於中只知有此而不知有他也邪辭則是陷溺愈深便一向離了正道遁辭則是説得窮後其理既屈自知去不得便別換一箇話頭如夷之説施由親始之類這一句本非他本意只臨時撰出來也先生又云生於其心害於其政者是才有此心便大綱已壞了至發於其政害於其事則是小底節目都以次第而壞矣因云孟子是甚麼底資質甚麼底力量卻纖悉委曲都去理會直是要這道理無些子虧欠以此知學問豈是執一箇小小底見識便了得直是要無不周匝方是道理要須整頓精神硬著脊骨與他做將去始得時舉植同王德修説浩然之氣大剛直是氣之體段實養處是必有事焉以下曰孟子浩然之氣要處只在集義集義是浩然之氣生處大剛與直伊川須要説是三箇何也大雅云欲配直方大三德曰坤直方自是要敬以直內義以方外大自是敬義立而德不孤孔子説或三或五豈有定例據某看得孟子只説浩然之氣至大至剛養此剛大須是直行有不慊於心是不直也便非所以集義浩然從何而生曾子説自反而縮自反而不縮亦此類也如必有事焉是事此集義也而勿正是勿必此浩然之生也正待也有期必之意公羊曰師出不正反戰不正勝古語有然心勿忘是勿忘此義也勿助長是勿助此氣也四句是籠頭説若論浩然之氣只是剛大養之須是直蓋以直只是無私曲之心仰不愧俯不怍如此養則成剛大之實而充塞天地之間不難也所以必要集義方能直也龜山謂嫌以一物養一物及他説又自作直養某所以不敢從伊川之説大雅氣雖有清濁厚薄之不齊然論其本則未嘗異也所謂至大至剛者氣之本體如此但人不能養之而反害之故其大者小剛者弱耳閎祖以直養而無害謂自反而縮俯仰不愧故能養此氣也與大學自慊之意不同自慊者如好好色如惡惡臭皆要自己慊足非為人也謨以直養是自反而縮集義是直養然此工夫須積漸集義自能生此浩然之氣不是行一二件合義底事能博取浩然之氣也集義是歲月之功襲取是一朝一夕之事從而掩取終非己有也德明養而無害要養又要無害助長是害處又曰必有事焉只是集義炎至大至剛氣之本體以直養而無害是用功處塞乎天地乃其效也問塞乎天地氣之體段本如此充養到浩然處然後全得箇體段故曰塞乎天地如但能之恐有誤字所謂推之天地之間無往而不利恐不然曰至塞乎天地便無往不可德明問浩然之氣如何塞乎天地曰塞乎天地之間是天地之正氣人之血氣有限能養之則與天地正氣亦同又問塞莫是充塞否曰是遍滿之意也去偽問塞乎天地之間曰天地之氣無所不到無處不透是他氣剛雖金石也透過人便是稟得這箇氣無欠闕所以程子曰天人一也更不分別浩然之氣乃吾氣也養而無害則塞乎天地一為私意所蔽則慊然而餒卻甚小也又曰浩然之氣只是氣大敢做而今一樣人畏避退縮事事不敢做只是氣小有一樣人未必識道理然事事敢做是他氣大如項羽力拔山兮氣蓋世便是這樣氣人須是有蓋世之氣方得文蔚録云塞天地只是氣魄大如所謂氣蓋世又曰如古人臨之以死生禍福而不變敢去罵賊敢去徇國是他養得這氣大了不怕他又也是他識道理故能如此問塞乎天地之間是元氣體段合下如此或又言只是不疑其行無往不利何也曰只為有此體段所以無往不利不然須有礙處問程子有物始言養無物養箇甚此只要識得浩氣體段否曰只是説箇大意如此問先生解西銘天地之塞作窒塞之塞如何曰後來改了只作充塞橫渠不妄下字各有來處其曰天地之塞是用孟子塞乎天地其曰天地之帥是用志氣之帥也德明氣只是這箇氣才存此心在此氣便塞乎天地之間泳問人能仰不愧俯不怍便有充塞天地底氣象否曰然才有不慊於心便是餒了廣上章既説浩然如此又言其為氣也配義與道謂養成浩然之氣以配道義方襯貼得起不然雖有道義其氣懾怯安能有為無是餒也謂無浩氣即如飢人之不飲食而餒者也德明氣配道義有此氣道義便做得有力淳鄭問配義與道配是合否曰配亦是合底意須思是養得這氣做得出方合得道義蓋人之氣當於平時存養有素故遇事之際以氣助其道義而行之配合也助也若於氣上存養有所不足遇事之際便有十分道理亦畏怯而不敢為鄭云莫是見義而不為無勇也底意思否曰亦是這箇道理又曰所謂氣者非干他事只是自家平時仰不愧俯不怍存養於中其氣已充足飽滿以之遇事自然敢為而無畏怯若平時存養少有不足則遇事之際自是索然而無餘矣卓賀孫同或問浩然之氣配義與道曰如今説得大錯不肯從近處説且如配字是將一物合一物義與道得此浩然之氣來貼助配合自然充實張主若無此氣便是餒了至大至剛讀斷以直養而無害以直方能養得便是前面説自反而縮道理是集義所生是氣是積集許多義理而生非是將義去外面襲取掩撲此氣來粗説只是中有主見得道理分明直前不畏爾孟施舍北宮黝便粗糙曾子便細膩爾謙配義與道配從而合之也氣須是隨那道義如云地配天地須在天後隨而合之婦配夫亦然畢竟道義是本道義是形而上者氣是形而下者若道義別而言則道是體義是用體是舉他體統而言義是就此一事所處而言如父當慈子當孝君當仁臣當敬此義也所以慈孝所以仁敬則道也故孟子後面只説集義端蒙問配義與道曰道義是公共無形影底物事氣是自家身上底物道義無情若自家無這氣則道義自道義氣自氣如何能助得他又曰只有氣魄便做得出問氣是合下有否曰是合下有若不善養則無理會無主宰或消滅不可知或使從他處去亦不可知夔孫養氣章道義與氣不可偏廢雖有此道義苟氣不足以充其體則歉然自餒道氣亦不可行矣如人能勇於有為莫非此氣苟非道義則亦強猛悍戾而已道義而非此氣以行之又如人要舉事而終於委靡不振者皆氣之餒也必有事焉而勿正趙氏以希望之意解正字看來正是如此但説得不甚分明今以為期待之意則文理不重復蓋必有事於此然後心不忘於此正之不已然後有助長之患言意先後各有重輕孟施舍似曾子北宮黝似子夏數子所為本不相侔只論養勇借彼喻此明其所養之不同爾正如公孫丑謂夫子過孟賁遠矣孟賁豈孟子之流只是言其勇爾謨方集義以生此氣則須要勉強及到氣去配義與道則道義之行愈覺剛果更無凝滯尚何恐懼之有謨問配義與道曰此為理會得道理底也須養得氣才助得它夔孫配義與道只是説氣會來助道義若輕易開口胡使性氣卻只助得客氣人才養得純粹便助從道義好處去賜配義與道道是體一事有一理是體到隨事區處便是義士毅問氣之所配者廣矣何故只説義與道曰道是體義是用程子曰在物為理處物為義道則是物我公共自然之理義則吾心之能斷制者所用以處此理者也廣配義與道如云人能弘道可學氣義互相資可學問浩然之氣人人有之但不養則不浩然爾曰是又問配字從前只訓合先生以助意釋之有據否曰非謂配便是助但養得那氣充便不餒氣充方合得那道義所以説有助之意義剛配義與道集注云配者合而有助之謂炎謂此一句從來説不分曉先生作合而有助便覺得賓主分曉工夫亦自有徑捷曰語意是如此氣只是助得道義炎問合而有助之意曰若無氣以配之則道義無助輝問合而有助之意曰氣自氣道義自道義若無此氣則道義亦不可見世之理直而不能自明者正為無其氣耳譬如利刀不可斬割須有力者乃能用之若自無力利刀何為力行其為氣也配義與道無是餒也有一樣人非不知道理但為氣怯更帖襯義理不起閎祖其為氣也配義與道無是餒也配合也義者人心節制之用道者人事當然之理餒不飽也氣由道義而有而道義復乘氣以行無異體也得其所養則氣與道義初不相離而道義之行得以沛然無所疑憚者若其無此則如食之不飽雖欲勉於道義而亦無以行矣氣者道義之成質故必集義乃能生之集義猶言積善端蒙配義與道無是餒也將這氣去助道義方能行得去若平時不得養此氣衰颯了合當做底事也畏縮不敢去做如朝廷欲去這一小人我道理直了有甚怕他不敢動著知他是小人不敢去他只是有這氣自衰了其氣如此便是合下無工夫所謂是集義所生者須是平時有集義工夫始得到行這道義時氣自去助他集義是平時積纍工夫配義與道是卒然臨事氣配道義行將去此兩項各自有頓放處但將粗處去看便分曉春秋時欲攻這敵國須先遣問罪之詞我這裏直了將這箇去摧他勢他雖有些小勢力亦且消沮去了漢高祖為義帝發喪用董公言明其為賊敵乃可服我這箇直了行去自不怕得它宇或問配義與道蓋人之能養是氣本無形聲可驗惟於事物當然之理上有所裁制方始得見其行之勇斷之決緣這道義與那氣冢合出來所以無是餒也曰更須仔細是如此其間但有一兩字轉換費力便説意不出又問後面説集義所生這箇養氣底規模如何下手都由酬酢應接舉皆合義人既如此俯仰無愧所以其氣自然盛大流行燾録云問養氣曰酬酢應接舉皆合義則俯仰並無愧怍故其氣自然盛大流行曰這後方可説配義集義與配義是相向説初間其氣由集義而生後來道義卻須那氣相助是以無所疑憚胡泳李問無是餒也是指義是指氣曰這是説氣曰下面如何便説集義所生曰上截説須養這氣下再起説所以生此氣每一件事做得合義便會生這氣生得這氣便自會行這義伊川云既生得此氣語其體則與道合語其用則莫不是義譬之以金為器及其器成方命得此是金器生字與取字相對説生是自裏面生出取是自外面取來且如今人有氣魄合做事便做得去若無氣魄雖自見得合做事卻做不去氣只是身中底氣道義是衆人公共底天地浩然之氣到人得之便自有不全了所以須著將道理養到浩然處賀孫問前賢云譬如以金為器器成方得命為金器舊聞此説遂謂無是餒也是字指道義而言先生曰不知當時如何作如此説力行孟子做義上工夫多大小大養氣只是一箇集義孟子許多論氣處只在集義所生一句上去偽或問集義曰只是無一事不求箇是而已矣恪或問集義曰集義只是件件事要合宜自然積得多蓋卿或問集義曰事事都要合道理才有些子不合道理心下便不足才事事合道理便仰不愧俯不怍因云如此一章初看道如何得許多頭緒恁地多後來看得無些子窒礙賀孫問集義曰集猶聚也處物為義須是事事要合義且如初一件合義了第二第三件都要合義此謂之集義或問伊川義莫是中理否此理如何曰如此説卻是義在外也蓋有是有非而我有以處之故為義端蒙集義謂如十事有一事不合義則便有愧須是集聚衆義然後是氣乃生非義襲而取之非是於外求得是義而摶出此氣也震養浩然之氣只在集義所生一句上氣不是平常之氣集義以生之者義者宜也凡日用所為所行一合於宜今日合宜明日合宜集得宜多自覺胸中慊足無不滿之意不然則餒矣非義襲而取之非是外取其義以養氣也配義與道者大抵以坤配乾必以乾為主以妻配夫必以夫為主配作隨底意思以氣配道義必竟以道義為主而氣隨之是氣常隨著道義謨或問是集義所生者一句曰是集義者言是此心中分別這是義了方做出來使配合得道義而行之非是自外而襲得來也生字便是對取字而言卓或問人有生之初理與氣本俱有後來欲動情流既失其理而遂喪其氣集義則可以復其性而氣自全曰人只怕人説氣不是本來有底須要説人生有此氣孟子只説其為氣也至大至剛以直養而無害又説是集義所生者自不必添頭上一截説呂子約亦是如此數摺價説不了某直敢説人生時無浩然之氣只是有那氣質昏濁頽塌之氣這浩然之氣方是養得恁地孟子只謂此是集義所生未須別説若只管謂氣與道義皆是我本來有底少間要行一步既怕失了道義又怕失了氣恰似兩隻腳併著一隻苧要東又牽了西要西又牽了東更行不得胡泳問此氣是當初稟得天地底來便自浩然抑是後來集義方生曰本是浩然被人自少時壞了今當集義方能生曰有人不因集義合下來便恁地剛勇如何曰此只是粗氣便是北宮黝孟施舍之勇底亦終有餒時此章須從頭節節看來看去首尾貫通見得活方是不可只略獵涉説得去便是了淳問孟子養浩然之氣如所謂集義勿忘勿助持其志無暴其氣似乎皆是等級曰他祇是集義合當做底便做將去自然塞乎天地之間今若謂我要養氣便是正便是助長大抵看聖賢文字須要會得他這意若陷在言語中便做病來道夫集義故能生浩然之氣問何以不言仁曰浩然之氣無他只是仰不愧俯不怍無一毫不快於心自生浩然之氣只合説得義義便事事合宜德明問一之看浩然之氣處如何曰見集義意思是要得安穩如講究書中道理便也要見得安穩曰此又是窮理不是集義集義是行底工夫只是事事都要合義窮理則在知言之前窮理是做知言工夫能窮理然後能知言淳問浩然之氣集義是用功夫處否曰須是先知言知言則義精而理明所以能養浩然之氣知言正是格物致知苟不知言則不能辨天下許多淫邪詖遁將以為仁不知其非仁將以為義不知其非義則將何以集義而生此浩然之氣氣只是充乎體之氣元與天地相流通只是仰不愧俯不怍自然無恐無懼塞乎天地今人心中才有歉愧則此氣自然消餒作事更無勇鋭配義與道者配是相合而有助譬如與人鬥敵又得一人在後相助自然愈覺氣勝告子不得於言勿求於心不得於心勿求於氣只是一味勃然不顧義理如此養氣則應事接物皆去不得孟子是活底不動心告子是死底不動心如孟子自是沉潛積養自反而縮只是理會得道理是當雖加齊卿相是甚做不得此章正要反覆子細看公孫丑如何問孟子如何答孟子才説志至焉氣次焉持其志無暴其氣公孫丑便以志為至以氣為第二等事故又問何故又要無暴其氣孟子方告之以不特志能動氣而氣亦能動志也氣能動志須是尋常體察如飲酒固能動志然苟能持其志則亦不能動矣侍坐者有於此便問直方大如何曰議論一事未分明如何隔向別處去下梢此處未明彼又不曉一切泛然無入頭處讀書理會義理須是勇猛徑直理會將去正如關羽擒顏良只知有此人更不知有別人直取其頭而歸若使既要砍此人又要砍那人非惟力不給而其所得者不可得矣又如行路欲往一處所卻在道邊間處留滯則所欲到處何緣便達看此一章便須反覆讀誦逐句逐節互相發明如此三二十過而曰不曉其義者吾不信也謨養氣一段緊要只在以直養而無害是集義所生自反而縮等處又曰非義襲而取之其語勢如人之有是四端猶其有四體卻不是説有無四體底人言此氣須是集義方生得不是一旦向義外面襲取得那氣來教恁地浩然植問浩然之氣是集義所生非義襲而取之也如何曰此是反覆説正如所謂仁義禮智非由外鑠我也我固有之也是積集衆義所生非是行一事偶然合義便可掩襲於外而得之浩然之氣我所固有者也廣問集義是以義為內義襲是以義為外否曰不必如此説此兩句是掉轉説如云我固有之也非由外鑠我也蓋義本於心不自外至積集此義而生此氣則此氣實生於中如北宮黝孟施舍之勇亦自心生又問集注云非由只行一事偶合於義便可以掩襲於外而得之曰集義是集衆義故與只行一事相對説襲猶兵家掩襲之襲出其不意如劫寨相似非順理而行有積集工夫者也人傑非義襲而取之謂積集於義自然生得此氣非以浩然為一物可以義襲取之也德明是集義所生者非義襲而取之也須是積習持養則氣自然生非謂一事合宜便可掩取其氣以歸於己也閎祖問是集義所生者非義襲而取之也曰今説集義如學者工夫須是於平日所為之事求其合於義者而行之積集既久浩然氣自生若説義襲則於一事之義勇而為之以壯吾氣耳襲如用兵掩襲之襲猶曰於一事一行之義勇而為之以襲取其氣也人傑正淳問非義襲而取之如何曰所謂義襲而取之者襲如用兵之襲有襲奪之意如掩人不備而攻襲之謂如才得行一件事合義便將來壯吾氣以為浩然之氣可以攫拏而來夫是之謂襲若集義者自非生知須是一一見得合義而行若是本初清明自然行之無非是義此舜由仁義行者其他須用學知凡事有義有不義便於義行之今日行一義明日行一義積纍既久行之事事合義然後浩然之氣自然而生如金溪之學向來包子只管説集義襲義某嘗謂之曰如此説孟子孟子初無襲義今言襲義卻是包子矣其徒如今只是將行得一事合義便指準將來長得多少精神乃是告子之意但其徒禁錮著不説出來非義襲而取之見江西人只愛説義襲不知如何襲只是説非以義掩取是氣蓋氣自內而生非由外而入蓋卿問無浩然之氣固是襯貼他義不起然義有欠闕即氣亦餒故曰行有不慊於心則餒矣竊謂氣與義必相須曰無義則做浩然之氣不成須是集義方成得浩然之氣德明浩然要事事合義一事餒便行不得可學問明道説浩然之氣曰一為私意所蔽則欿然而餒知其小矣據孟子後面説行有不慊於心則餒矣先生解曰所行一有不合於義而自反不直則不足於心而體自有所不充只是説所行不義則欿然而餒今説蔽字則是説知之意不知何如曰蔽是遮隔之意氣自流通不息一為私意所遮隔則便去不得今且以粗言之如項羽一箇意氣如此才被漢王數其罪十便覺沮去不得了廣問集注云告子外義蓋外之而不求非欲求之於外也曰告子直是將義屏除去只就心上理會因説陸子靜云讀書講求義理正是告子義外工夫某以為不然如子靜不讀書不求義理只靜坐澄心卻似告子外義德明集注非定本養氣二項敬以直內必有事義以方外集義方孟子論養氣只全就已發處説程子論養志自當就未發處説養志莫如敬以直內各是一義自不妨內外交養不可説孟子救告子義外之失而姑為此言也必有事焉是須把做事做如主敬也須是把做事去主如求放心也須是把做事去求如窮理也須是把做事去窮僩鄭天禧問必有事焉而勿正當作絶句否曰元舊是恁地讀卓必有事焉而勿正心此言正心自與大學語脈不同此正字是期待其效之意仁者先難而後獲正心是先獲意思先獲是先有求獲之心古人自有這般語公羊傳云師出不正反戰不正勝此正字與孟子説正心之正一般言師出不可必期其反戰不可必期其勝也賀孫問必有事焉而勿正之義曰正猶等待之意趙岐解云不可望其福雖説意粗了其文義卻不錯此正如師出不正反戰不正勝之正古人用字之意如此言但當從事於此而勿便等待其效之意或問此便是助長否曰正未是助長待其效而不得則漸漸助之長矣譬之栽木初栽即是望其長望之之久而不如意則揠苗矣明道曰下言之漸重此言卻是後因論仁者先難而後獲洽曰先解勿正字頗有後獲之意曰頗有此意曰如此解則於用工處儘有條理曰聖賢之言條理精密往往如此但看得不切錯認了他文義則并與其意而失之耳洽必有事焉而勿正有事有所事也正預期也言人之養氣須是集義苟有未充不可預期其效而必強為以助其長也端蒙必有事焉而勿正這裏是天命流行處謨勿正所以為預期者亦猶程子所謂思而曰善然後為之是正之之意歟曰程子此言稍寬今以正為預期者卻有引據所謂戰不正勝是也謨必有事焉而勿正心勿忘勿助長是養氣中一節目饒本作集義中小節目不要等待不要催促淳事正忘助相因無所事必忘正必助長閎祖集義如藥頭必有事焉而勿正心勿忘勿助長如製度閎祖必有事焉謂有所事只是集義也正則有所待蓋必之之意勿忘勿助長但勿忘則自然長助長則速之如揠苗者也德明或問必有事焉而勿正曰正便是期必集義多則浩然之氣自生若著一箇意在這裏等待他生便為害今日集得多少義又等他氣生明日集得多少義又等他氣生這都是私意只成得一箇助長恁地則不惟氣終不會生這所集之義已不得為是了或問必有事焉而勿正曰正是等待之意如一邊集義一邊在此等待那氣生今日等不見明日又等不見等來等去便卻去助長恪勿正心勿期其浩然也勿忘者勿忘其下工夫也助長者無不畏之心而強為不畏之形節勿忘勿助長本連上文集義而言故勿忘謂勿忘集義也一言一動之間皆要合義故勿忘助長謂不待其充而強作之使充也如今人未能無懼卻強作之道我不懼未能無惑卻強作之道我不惑是助長也有事有事於集義也勿正謂勿預等待他聽其自充也升卿必有事焉而勿正心勿忘勿助長也下兩句非是覆解上兩句此自有淺深勿正是勿期必其如此勿助長是不到那地位了不可硬要充去如未能集義不可硬要浩然才助長在我便有那欺偽之心施於事末梢必不勝任譬如十鈞之力而負千鈞故助長之害最大端蒙必有事焉謂集義正是期望忘是不把做事助長是作弄意思世自有此等人孟子之意只是如此粗言之要之四者初無與養氣事只是立此界至如東至某西至某其中間一段方是浩然處也必大問預期其效如何曰集義於此自生浩然之氣不必期待他如種木焉自是生長不必日日看覷他若助長直是拔起令長如今説不怕鬼本有懼心強云不懼又如言不畏三軍者出門聞金鼓之聲乃震怖而死事見孟子注須積習之功至則自然長不可助長也德明養氣一章在不動心不動心在勇勇在氣氣在集義勿忘勿助長又是那集義底節度若告子則更不理會言之得失事之是非氣之有平不平只是硬制壓那心使不動恰如説打硬修行一般端蒙問必有事焉而勿正章曰必有事焉孟子正説工夫處且從上面集義處看來便見得必有事焉者言養氣當必以集義為事勿正者勿待也勿忘者勿忘其以集義為事也助長者是待之不得而拔之使長也言人能集義以養其浩然之氣故事物之來自有以應之不可萌一期待之心少間待之不得則必出於私意有所作為而逆其天理矣是助之長也今人之於物苟施種植之功至於日至之時則自然成熟若方種而待其必長不長則從而拔之其逆天害物也甚矣又云集養是養氣底丹頭必有事便是集義底火法言必有事者是義氣之法度也養得這氣在此便見得這箇自重那箇自輕如公孫丑言加齊卿相得行道焉以為孟子動心於此不知孟子所養在此見於外者皆由這裏做出來又曰孔子與顏淵用之則行舍之則藏唯我與爾有是夫這有是夫言我有這箇道理在不是言有用舍行藏也又云心有所主宰則氣之所向者無前所謂氣蓋世之類是也有其心而無其氣則雖十分道理底事亦有不敢為者氣不充也卓看助長説曰孟子必有事焉勿忘是論集義工夫勿正與勿助長是論氣之本體上添一件物事不得若是集義便過用些力亦不妨卻如何不著力得苗固不可揠若灌溉耘治豈可不盡力今謂克治則用嚴養氣則不可助長如此則二事相妨如何用功勿忘勿助長自是孟子論養氣到這裏不得不恁地説如今學者先要把箇勿忘勿助長來安排在肚裏了做工夫卻不得明道云勿忘勿助長之間正當處也此等語更宜玩味大凡觀書從東頭直築著西頭南頭築著北頭七穿八透皆是一理方是貫通古人所以貴一貫也必大必有事焉只消此一句這事都了下面而勿正心勿忘勿助長恰似剩語卻被這三句撑拄夾持得不活轉不自在然活轉自在人卻因此三句而生只是才喚醒這物事便在這裏點著便動只此便是天命流行處便是天命之謂性率性之謂道便是仁義之心便是惟皇上帝降衷于下民謝氏所謂活潑潑地只是這些子更不待想像尋求分明在這裏觸著便應通書中元亨誠之通利貞誠之復一章便是這意思見得這箇物事了動也如此靜也如此自然虛靜純一不待更去求虛靜不待體認只喚著便在這裏或曰吾儒所以與佛氏異者吾儒則有條理有準則佛氏則無此爾曰吾儒見得箇道理如此了又要事事都如此佛氏則説便如此做也不妨其失正在此僩侯師聖説必有事焉而勿正心伊川舉禪語為説曰事則不無擬心則差當時於此言下有省某甚疑此語引得不相似必有事是須有事於此勿正心是不須恁地等待今説擬心則差是如何言須擬之而後言行須擬之而後動方可中節不成不擬不議只恁地去此語似禪某不敢編入精義義剛可學録云擬心則差是借語問必有事焉而勿正心勿忘勿助長疑孟子只是養氣節次近世諸儒之語把來作一段工夫莫無妨否曰無妨只看大意如何曰諸儒如此説雖無害只是孟子意已走作先生解此卻好曰此一段趙岐注乃是就孟子説只是頗緩慢可學必有事焉而勿正卻似鳶飛魚躍之言此莫是順天理自然之意否曰孟子之説只是就養氣上説程子説得又高須是看孟子了又看程先生説便見得孟子只説勿忘勿助長程先生之言於其中卻有一箇自然底氣象去偽問鳶飛魚躍與必有事焉之意曰説著相似又不甚相似説不相似又卻相似必有事焉是才舉這事理便在裏了如説話未斷理便在此了夔孫韓退之詩云強懷張不滿弱念闕易盈無是餒也雖強支撑起來亦支撑不得所謂揠苗者也閎祖雉録見語類或問知言養氣一章曰此一章專以知言為主若不知言則自以為義而未必是義自以為直而未必是直是非且莫辨矣然説知言又只説知詖淫邪遁之四者蓋天下事只有一箇是與不是而已若辨得那不是底則便識得那是底了謂如人説十句話有四句不是有六句是若辨得那四句不是則那六句便是是底了然非見得道理十分分明則不能辨得親切且如集義皆是見得道理分明則動靜出處皆循道理無非集義也而今人多見理不明於當為者反以為不當為於不當為者反以為當為則如何能集義也惟見理明則義可集義既集則那自反而縮便不必説自是在了又曰孟子先説知言後説養氣而公孫丑便問養氣某向來只以為是他承上文方論氣而問今看得不然乃是公孫丑會問處留得知言在後面問者蓋知言是末後合尖上事如大學説正心修身只合殺在致知在格物一句蓋是用工夫起頭處燾詖辭知其所蔽詖是偏詖只見得一邊此理本平正他只説得一邊那一邊看不見便是如物蔽了字凡從皮皆是一邊意如跛是腳一長一短坡是山一邊斜淳淫辭知其所陷陷是身溺在那裏如陷溺於水只是見水而不見岸也夔孫陳正己問詖淫邪遁如何是遁底模樣曰如墨者夷之之説窮遂又牽引古之人若保赤子之説為問如佛家初説剃除髭髮絶滅世事後其説窮又道置生産業自無妨礙賀孫孟子説知言處只有詖淫邪遁四者知言是幾多工夫何故只説此四字蓋天地之理不過是與非而已既知得箇非便識箇是矣且如十句言語四句是有詖淫邪遁之病那六句便是矣僩或問詖淫邪遁曰詖辭偏詖之辭也見詖辭則知其人之蔽於一偏如楊氏蔽於為我墨氏蔽於兼愛皆偏也淫辭放蕩之辭也見淫辭則知其人之陷於不正而莫知省悟也見邪辭則知其人之離於道見遁辭則知其人之説窮而走也去偽問此四辭如何分別曰詖辭乃是偏放一邊如楊氏之仁墨氏之義蔽者蔽於一而不見其二淫者廣大無涯陷於其中而不自知邪則已離於正道而自立一箇門庭遁辭辭窮無可説又卻自為一説如佛家言治産業皆實相既如此説怎生不出來治産業如楊朱云一毫何以利天下此是且分解其説你且不拔一毫況其他乎大抵吾儒一句言語佛家只管説不休如莊周末篇説話亦此類今入與佛辨最不得便宜他卻知吾説而用之如橫渠正蒙乃是將無頭事與人作言語可學詖辭知其所蔽詖是偏詖之詖偏於一邊不見一邊只是蔽耳如遮蔽相似到得就偏説中説得淫辭便廣闊至有所陷溺如陷在水中不見四旁矣遂成一家邪説離於正道到得後來説不通時便作走路所謂遁辭也如釋氏論理其初既偏反復譬喻其辭非不廣矣然畢竟離於正道去人倫把世事為幻妄後來亦自行不得到得窮處便説走路如云治生産業皆與實相不相違背豈非遁辭乎孟子知言只是從知其偏處始璘詖是偏詖説得來一邊長一邊短其辭如此則知其心有所蔽矣淫是放蕩既有所蔽説得來漸次夸張其辭如此則知其心有所陷矣邪辭是既陷後一向邪僻離叛將去遁詞是既離後走腳底話如楊氏本自不拔一毛而利天下卻説天下非一毛所能利夷子本説愛無差等卻説施由親始佛氏本無父母卻説父母經皆是遁辭人傑賜録云詖辭是一邊長一邊短如人之跛倚緣它只見這一邊都不見那一邊是以蔽少間説得這一邊闊大了其辭放蕩便知他心陷在這裏邪説是一向遠了遁辭是走腳底話如墨者夷之云云詖是險詖不可行故蔽塞淫是説得虛大故有陷溺邪則離正道遁則窮惟窮故遁如儀秦楊墨莊列之説皆具四者德明詖淫邪遁蔽陷離窮四者相因心有所蔽只見一邊不見一邊如楊氏為我墨氏兼愛各只見一邊故其辭詖而不平蔽則陷溺深入之義也故其辭放蕩而過陷則離離是開去愈遠也故其辭邪離則窮窮是説不去也故其辭遁遁如夷之之言是也閎祖先之問詖淫邪遁四者相因之説如何曰詖辭初間只是偏了所以偏者止緣他蔽了一邊如被物隔了只見一邊初間是如此後來只管陷入裏面去漸漸只管説得闊了支蔓淫溢才恁地陷入深了於是一向背卻正路遂與正路相離了既離了正路他那物事不成物事畢竟用不得其説必至於窮為是他説窮了又為一説以自遁如佛家之説賀孫或問詖淫邪遁四者相因之説曰詖字是遮了一邊只見一邊如陂字亦是一邊高一邊低跛字亦是腳一邊長一邊短皆是只有一邊之意淫辭知其所陷淫便是就所詖處多了被他只看得這一邊都蓋了那一邊如人雞在水裏只見得那水更不見有平正底道理詖是少了那一邊淫是添了這一邊然詖與淫只是見偏了猶自是道理在然只管淫而不止便失了那道理既是不正無緣立得住便至於遁遁則多討物理前來遮蓋沈莊仲問詖淫邪遁之辭文蔚曰如莊周放浪之言所謂淫辭曰如此分不得只是心術不正便自節次生此四者如楊墨自有楊墨底詖淫邪遁佛老自有佛老底詖淫邪遁申韓自有申韓底詖淫邪遁如近世言功利者又自有一種詖淫邪遁不特是如此有一樣苟且底人議論不正亦能使是非反覆張安道説本朝風俗淳厚自范文正公一變遂為崖異刻薄後來安道門人和其言者甚衆至今士大夫莫能辨明豈不可畏文蔚問詖淫邪遁之辭楊墨似詖莊列似淫儀秦似邪佛似遁曰不必如此分別有則四者俱有其序自如此詖是偏詖不平譬似路一邊高一邊低便不可行便是蔽塞了一邊既蔽塞則其勢必至於放蕩而陷溺淫而陷溺必至於邪僻而叛道才問著便遁而窮且如楊墨為我兼愛之説可謂是偏頗至於摩頂放踵拔一毛利天下不為便是不可行夷之云愛無差等施由親始不是他本意只為被孟子勘破其詞窮遂為此説是遁也如佛學者初有桑下一宿之説及行不得乃云種種營生無非善法皆是遁也德明淫邪辭相互可學孟子離此四病所以知人言有四病方問程子説孟子知言譬如人在堂上方能辨堂下人曲直所謂在堂上者莫只是喻心通於道者否曰此只是言見識高似他方能辨他是非得失若見識與他一般如何解辨得他廣士毅録云才高於衆人了方見得與衆人一般低立在堂下如何辨得人長短問孟子知言處生於其心害於其政先政而後事闢楊墨處説作於其心害於其事先事而後政曰先事而後政是自微而至著先政而後事是自大綱而至節目雉孟子説知言養氣處止是到聖人復起必從吾言矣住公孫丑疑孟子説知言養氣忒擔當得大故引我於辭命則不能以詰孟子孟子對以惡是何言也丑又問昔者子夏子遊子張皆得聖人之一體意欲以孟子比聖人故孟子推尊聖人以為己不敢當遂云姑舍是去偽問顏子具體而微微是微小或隱微之微曰微只是小然文意不在小字上只是説體全與不全宇顏子所知所行事事只與聖人爭些子所以曰具體而微燾具體而微伊川言合下小是言氣稟如三月不違則有乏處因五峰與張説方問浩然之氣後面説伯夷伊尹孔子是則同處曰後面自是散説出去不須更回引前頭這裏地位極高浩然之氣又不足言不須更説氣了有百里之地則足以有天下然行一不義殺一不辜則有所不為此是甚麼樣氣象大段是極至處了雖使可以得天下然定不肯將一毫之私來壞了這全體古之聖人其大根腳同處皆在此如伊尹非其義也非其道也一介不以與人一介不以取諸人繫馬千駟祿之以天下弗視弗顧與此所論一般聖人同處大概皆在此於此而不同則不足以言聖人矣某舊説孟子先説知言而公孫丑先問養氣者承上文方論志氣而言也今看來他問得卻自有意思蓋知言是那後面合尖末梢頭處合當留在後面問如大學所論自修身正心卻説到致知格物蓋致知格物是末梢尖處須用自上説下來方為有序也又曰公孫丑善問問得愈密盛水不漏若論他會恁地問則不當云軻之死不得其傳不知後來怎生不可曉或是孟子自作此書潤飾過不可知僩得百里皆能朝諸侯是德之盛行一不義殺一不辜不為是心之正不肯將那小處害了那大處亦如伊尹雖祿之天下不顧千駟弗視到那一介處亦不輕取豫燾根本節目不容不同得百里之地而朝諸侯有天下此是甚次第又行一不義殺一不辜而得天下不為直是守得定閎祖問夷尹得百里之地果能朝諸侯有天下否曰孟子如此説想是如此然二子必不肯為問孟子比顏子如何曰孟子不如顏子顏子較細問孟子亦有恁底意否曰然孟子似伊尹僩問夷惠曰伯夷格局更高似柳下惠道夫曰看他伯夷有壁立萬仞之氣曰然道夫或問宰我子貢有若智足以知聖人汙不至阿其所好曰汙是汙下不平處或當時方言未可知當屬上文讀去偽古人之政不可得而見只是當時所制之禮便知得當時所施之政淳伯豐問見其禮而知其政聞其樂而知其德是謂夫子是謂他人曰只是大概如此説子貢之意蓋言見人之禮便可知其政聞人之樂便可知其德所以由百世之後等百世之王莫有能違我之見者所以斷然謂自生民以來未有孔子此子貢以其所見而知夫子之聖如此也一説夫子見人之禮而知其政聞人之樂而知其德由百世之後等百世之王莫有能逃夫子之見者此子貢所以知其為生民以來未有也然不如前説之順
