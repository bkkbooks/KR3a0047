body:
  text: 朱子語類卷第七十一易七噬嗑彖辭中剛柔分以下都掉了頤中有物只說利用獄爻亦各自取義不說噬頤中之物淵張元德問易中言剛柔分兩處一是噬嗑一是節此頗難解曰據某所見只是一卦三陰三陽謂之剛柔分洽録云分猶均也曰易中三陰三陽卦多獨於此言之何也曰偶於此言之其他卦別有義洽録云剛柔分語意與日夜分同又問復卦剛反作一句否曰然此二字是解復亨下云動而以順行是解先入無疾以下大抵彖辭解得易極分明子細尋索儘有條理時舉洽同問諸卦象皆順說獨雷電噬嗑倒說何耶曰先儒皆以為倒寫二字二字相似疑是如此僩雷電噬嗑與雷電豐似一般曰噬嗑明在上動在下是明得事理先立這法在此未見犯底人留待異時而用故云明罰敕法豐威在上明在下是用這法時須是明見下情曲折方得不然威動於上必有過錯也故云折獄致刑此是伊川之意其說極好學履噬膚滅鼻膚腹腴拖泥處滅浸沒也謂因噬膚而沒其鼻於器中也噬乾胏得金矢荊公已嘗引周禮鈞金之說按噬膚滅鼻之說與本義不同僩問九四利艱貞六五貞厲皆有艱難正固危懼之意故皆為戒占者之辭曰亦是爻中元自有此道理大抵才是治人彼必為敵不是易事故雖是時位卦德得用刑之宜亦須以艱難正固處之至於六三噬臘肉遇毒則是所噬者堅韌難合六三以陰柔不中正而遇此所以遇毒而小吝然此亦是合當治者但難治耳治之雖小吝終無咎也銖問噬嗑得金矢不知古人獄訟要鈞金束矢之意如何曰不見得想是詞訟時便令他納此教他無切要之事不敢妄來又問如此則不問曲直一例出此則實有冤枉者亦懼而不敢訴矣曰這箇須是大切要底事古人如平常事又別有所在如劑石之類學履賁伊川說乾坤變為六子非是卦不是逐一卦畫了旋變去這話難說伊川說兩儀四象自不分明卦不是旋取象了方畫須是都畫了這卦方只就已成底卦上面取象所以有剛柔來往上下淵先儒云天文也上有剛柔相錯四字恐有之方與下文相似且得分曉礪問君子明庶政無敢折獄本義云明庶政是明之小者無折獄是明之大者此專是就象取義伊川說此則又就賁飾上說不知二說可相備否曰明庶政是就離上說無折獄是就艮上說離明在內艮止在外則是事之小者可以用明折獄是大事一折便了有止之義明在內不能及他故止而不敢折也大凡就象中說則意味長若懸空說道理雖說得去亦不甚親切也學履山下有火賁內明外止雖然內明是箇止殺底明所以不敢用其明以折獄此與旅相似而相反賁內明外止旅外明內止其象不同如此問苟明見其情罪之是非亦何難於折獄曰是他自有箇象如此遇著此象底便用如此然獄亦自有十三八棒便了底亦有須待囚訊鞠勘録問結證而後了底書曰要囚服念五六日至于旬時丕蔽要囚周禮秋官亦有此數句便是有合如此者若獄未是而決之是所謂敢折獄也若獄已具而留之不決是所謂留獄也不留獄者謂囚訊結證已畢而即決之也僩問明庶政無敢折獄曰此與旅卦都說刑獄事但爭艮與離之在內外故其說相反止在外明在內故明政而不敢折獄止在內明在外故明謹用刑而不敢留獄又曰癩言之如今州縣治獄禁勘審覆自有許多節次過乎此而不決便是留獄不及乎此而決便是敢於折獄尚書要囚至于旬時他須有許多時日此一段與周禮秋官同意礪六四白馬翰如言此爻無所賁飾其馬亦白也言無飾之象如此學履問賁于丘園束帛戔戔曰此兩句只是當來卦辭非主事而言看如何用皆是這箇道理或曰賁于丘園安定作敦本說曰某之意正要如此或以戔戔為盛多之貌曰非也戔戔者淺小之意凡淺字箋字皆從戔或問淺小是儉之義否曰然所以下文云吝終吉吝者雖不好看然終卻吉去僞問賁于丘園是在艮體故安止於丘園而不復有外賁之象曰雖是止體亦是上比於九漸漸到極處若一向賁飾去亦自不好須是收斂方得問敦本務實莫是反朴還淳之義否曰賁取賁飾之義他今卻來賁田園為農圃之事當賁之時似若鄙吝然儉約終得吉吉則有喜故象云有喜也礪問賁于丘園曰當賁飾華盛之時而安于丘園朴陋之事其道雖可吝而終則有吉也問六五之吉何以有喜曰終吉所以有喜又問白賁無咎曰賁飾之事太盛則有咎所以處太盛之終則歸于白賁勢當然也僩賁于丘園束帛戔戔是箇務農尚儉戔戔是狹小不足之意以字義考之從水則為淺從貝則為賤從金則為錢如所謂束帛戔戔六五居尊位卻如此敦本尚儉便似吝嗇如衛文公漢文帝雖是吝卻終吉此在賁卦有反本之義到上九便白賁和束帛之類都沒了賁于丘園是箇務實底學履作務農尚本之義束帛戔戔是賁得不甚大所以說吝兩句是兩意淵問伊川解賁于丘園指上九而言看來似好蓋賁三陰皆受賁于陽不應此又獨異而作敦本務實說也曰如何丘園便能賁人束帛戔戔他解作裁剪之象尤艱曲說不出這八字只平白在這裏若如所說則曲折多意思遠舊說指上九作高尚隱于丘園之賢而用束帛之禮聘召之若不用某說則此說似近他將丘園作上九之象束帛戔戔作裁剪紛裂之象則與象意大故相遠也學履問六五是柔中居尊敦本尚實故有賁于丘園之象然陰性吝嗇故有束帛戔戔之象戔戔淺小貌人而如此雖可羞吝然禮奢寧儉故得終吉此與程傳指丘園為上九者如何曰舊說多作以束帛聘在外之賢但若如此說則與吝終吉文義不協今程傳所指亦然蓋戔戔自是淺小之意如從水則為淺從人則為俴從貝則為賤皆淺小意程傳作剪裁已是迂回又說丘園更覺牽強如本義所說卻似與吝終吉文義稍協又問白賁無咎上得志也何謂得志曰居卦之上在事之外不假文飾而有自然之文便自優游自得也銖曰如本義說六五上九兩爻卻是賁極反本之意曰六五已有反本之漸故曰丘園又曰束帛戔戔至上九白賁則反本而復於無飾矣蓋皆賁極之象也銖伊川此卦傳大有牽強處束帛解作剪裁恐無此理且如今將束帛之說教人解人決不思量從剪裁上去義剛白賁無咎據剛上文柔是不當說自然而卦之取象不恁地拘各自說一義淵剝問上以厚下安宅安宅者安於禮義而不遷否曰非也厚下者乃所以安宅宅如山附於地惟其地厚所以山安其居而不搖人君厚下以得民則其位亦安而不搖猶所謂本固邦寧也僩問剝之初與二蔑貞凶是以陰蔑陽以小人蔑君子之正道凶之象也不知只是陽與君子當之則凶為復陰與小人亦自為凶曰自古小人滅害君子終亦有凶但此爻象只是說陽與君子之凶也礪或問碩果不食伊川謂陽無可盡之理剝於上則生於下無間可容息也變於上則生於下乃剝復相因之理畢竟須經由坤坤卦純陰無陽如此陽有斷滅也何以能生於復曰凡陰陽之生一爻當一月須是滿三十日方滿得那腔子做得一畫成今坤卦非是無陽陽始生甚微未滿那腔子做一畫未成非是坤卦純陰便無陽也然此亦不是甚深奧事但伊川當時解不曾分明道與人故令人做一件大事看文蔚小人剝廬是說陰到這裏時把他這些陽都剝了此是自剝其廬舍無安身己處衆小人託這一君子為芘覆若更剝了是自剝其廬舍便不成剝了淵舊見二十家叔說懷字公立廬如周禮秦無廬之廬音廬蓋戟柄也謂小人自剝削其戟柄僅留其鐵而已果何所用如此說方見得小象小人剝廬終不可用一句意亦自好又問變化二字舊見本義云變者化之漸化者變之成夜來聽得說此二字乃謂化是漸化變是頓變似少不同曰如此等字自是難說變者化之漸化者變之成固是如此然易中又曰化而裁之謂之變則化又是漸蓋化如正月一日漸漸化至三十日至二月一日則是正月變為二月矣然變則又化是化長而變短此等字須當通看乃好銖復問剝一陽盡而為坤程云陽未嘗盡也曰剝之一陽未盡時不曾生才盡於上這些子便生於下了卓問一陽復於下是前日既退之陽已消盡而今別生否曰前日既退之陽已消盡此又是別生伊川謂陽無可盡之理剝於上則生於下無閒可容息說得甚精且以卦配月則剝九月坤十月復十一月剝一陽尚存復一陽已生坤純陰陽氣闕了三十日安得謂之無盡曰恐是一月三十日雖到二十九日陽亦未盡否曰只有一夜亦是盡安得謂之無盡嘗細推之這一陽不是忽地生出才立冬便萌芽下面有些氣象上面剝一分下面便萌芽一分上面剝二分下面便萌芽二分積纍到那復處方成一陽坤初六便是陽已萌了淳問伊川所說剝卦曰公說關要處未甚分明他上才消下便生且如復卦是一陽有三十分他便從三十日頭逐分纍起到得交十二月冬至他一爻已成消時也如此只伊川說缺得幾句說漸消漸長之意直卿問冬至子之半如何是一陽方生賀孫云冬至子之半是已生成一陽不是一陽方生曰冬至方是結算那一陽冬至以後又漸生成二陽過一月卻成臨卦坤卦之下初陽已生矣賀孫為嫌於無陽也自觀至剝三十日剝方盡自剝至坤三十日方成坤三十日陽漸長至冬至方是一陽第二陽方從此生陰剝每日剝三十分之一一月方剝得盡陽長每日長三十分之一一月方長得成一陽陰剝時一日十二刻亦每刻中漸漸剝全一日方剝得三十分之一陽長之漸亦如此長直卿舉冬至子之半先生曰正是及子之半方成一陽子之半後第二陽方生陽無可盡之理這箇才剝盡陽當下便生不曾斷續伊川說這處未分曉似缺兩句在中間方說得陰剝陽生不相離處虞復之云恰似月弦望便見陰剝陽生逐旋如此陰不會一上剝陽不會一上長也宇剝上九一畫分為三十分一日剝一分至九月盡方盡然剝於上則生於下無間可息至十月初一日便生一分積三十分而成一畫但其始未著耳至十一月則此畫已成此所謂陽未嘗盡也道夫問陰亦然今以夬乾姤推之亦可見矣但所謂聖人不言者何如曰前日劉履之說蔡季通以為不然某以為分明是如此但聖人所以不言者這便是一箇參贊裁成之道蓋抑陰而進陽長善而消惡用君子而退小人這便可見此理自是恁地雖堯舜之世豈無小人但有聖人壓在上面不容他出而有為耳豈能使之無邪劉履之曰蔡季通嘗言陰不可以抗陽猶地之不足以配天此固然之理也而伊川乃謂陰亦然聖人不言耳元定不敢以為然也道夫問十月何以為陽月先生因詰諸生令思之云程先生於易傳雖發其端然終說得不透徹諸生答皆不合復請問先生曰剝盡為坤復則一陽生也復之一陽不是頓然便生乃是自坤卦中積來且一月三十日以復之一陽分作三十分從小雪後便一日生一分上面趲得一分下面便生一分到十一月半一陽始成也以此便見得天地無休息處時舉義剛曰十月為陽月不應一月無陽一陽是生於此月但未成體耳曰十月陰極則下已陽生謂如六陽成六段而一段又分為三十小段從十月積起至冬至積成一爻不成一陽是陡頓生亦須以分毫積起且如天運流行本無一息間斷豈解一月無陽且如木之黃落時萌芽已生了不特如此木之冬青者必先萌芽而後舊葉方落若論變時天地無時不變如楞嚴經第二卷首段所載非惟一歲有變月亦有之非惟月有變日亦有之非惟日有變時亦有之但人不知耳此說亦是義剛問坤為十月陽氣剝於上必生於下則此十月陽氣已生但微而未成體至十一月一陽之體方具否曰然凡物變之漸不惟月變日變而時亦有變但人不覺爾十一月不能頓成一陽之體須是十月生起云云學履味道舉十月無陽曰十月坤卦皆純陰自交過十月節氣固是純陰然郟陽在地下已旋生起來了且以一月分作三十分細以時分之是三百六十分陽生時逐旋生生到十一月冬至方生得就一畫陽這一畫是卦中六分之一全在地下二畫又較在上面則箇至三陽則全在地上矣四陽五陽六陽則又層層在上面去不解到冬至時便頓然生得一畫所以莊子之徒說道造化密移疇覺之哉又曰一氣不頓進一形不頓虧蓋見此理陰陽消長亦然如包胎時十月具方成箇兒子植賀孫録見下陽無驟生之理如冬至前一月中氣是小雪陽已生三十分之一分到得冬至前幾日須已生到二十七八分到是日方始成一畫不是昨日全無今日一旦便都復了大抵剝盡處便生莊子云造化密移疇覺之哉這語自說得好又如列子亦謂運轉無已天地密移疇覺之哉凡一氣不頓進一形不頓虧亦不覺其成不覺其虧蓋陰陽浸消浸盛人之一身自少至老亦莫不然賀孫植問不頓進是漸生不頓虧是漸消陰陽之氣皆然否曰是問十月是坤卦陽已盡乎曰陰陽皆不盡至此則微微一線路過因而復發耳大雅七日只取七義猶八月有凶只取八義淵問朋來無咎曰復卦一陽方生疑若未有朋也然陽有剛長之道自一陽始生而漸長礪録云畢竟是陽長將次並進以至于極則有朋來之道而無咎也反復其道七日來復天行也消長之道自然如此故曰天行處陰之極亂者復治往者復還凶者復吉危者復安天地自然之運也問六二休復之吉以下仁也曰初爻為仁人之體六二爻能下之謂附下於仁者學莫便於近乎仁既得仁者而親之資其善以自益則力不勞而學美矣故曰休復吉上六迷復凶至于十年不克征這是箇極不好底爻故其終如此凡言十年三年五年七月八月三月者想是象數中自有箇數如此故聖人取而言之至于十年不克征十年勿用則其凶甚矣僩問復卦剛反當作一句曰然此二字是解復亨下云動而以順行是解出入無疾以下大抵彖辭解得易極分明子細尋索儘有條理聖人說復其見天地之心到這裏微茫發動了最可以見生氣之不息也只如此看便見天只有箇春夏秋冬人只有箇仁義禮智此四者便是那四者所以孟子說四端猶四體闕一不可人若無此四者便不足為人矣心是一箇運用底物只是有此四者之理更無別物只此體驗可見問復其見天地之心生理初未嘗息但到坤時藏伏在此至復乃見其動之端否曰不是如此這箇只是就陰陽動靜闔闢消長處而言如一堆火自其初發以至漸漸發過消盡為灰其消之未盡處固天地之心也然那消盡底亦天地之心也但那箇不如那新生底鮮好故指那接頭再生者言之則可以見天地之心親切如云利貞者性情也一元之氣亨通發散品物流形天地之心盡發見在品物上但叢雜難看及到利貞時萬物悉已收斂那時只有箇天地之心丹青著見故云利貞者性情也正與復其見天地之心相似康節云一陽初動處萬物未生時蓋萬物生時此心非不見也但天地之心悉已布散叢雜無非此理呈露倒多了難見若會看者能於此觀之則所見無非天地之心矣惟是復時萬物皆未生只有一箇天地之心昭然著見在這裏所以易看也僩問天地之心雖靜未嘗不流行何為必於復乃見曰三陽之時萬物蕃新只見物之盛大天地之心卻不可見惟是一陽初復萬物未生冷冷靜靜而一陽既動生物之心闖然而見雖在積陰之中自藏掩不得此所以必於復見天地之心也銖曰邵子所謂玄酒味方淡大音聲正稀正謂此否曰正是此意不容別下注腳矣又問天心無改移謂何曰年年歲歲是如此月月日日是如此又問純坤之月可謂至靜然昨日之靜所以養成今日之動故一陽之復乃是純陰養得出來在人則主靜而後善端始復在天地之化則是終則有始貞則有元也曰固有此意但不是此卦大義大象所謂至日閉關者正是於已動之後要以安靜養之蓋一陽初復陽氣甚微勞動他不得故當安靜以養微陽如人善端初萌正欲靜以養之方能盛大若如公說卻是倒了銖復見天地心動之端靜中動方見生物心尋常吐露見於萬物者盡是天地心只是冬盡時物已成性又動而將發生此乃可見處方問復見天地之心之義曰十月純陰為坤卦而陽未嘗無也以陰陽之氣言之則有消有息以陰陽之理言之則無消息之間學者體認此理則識天地之心故在我之心不可有間斷也過問復見天地之心曰天地所以運行不息者做箇甚事只是生物而已物生於春長於夏至秋萬物咸遂如收斂結實是漸欲離其本之時也及其成則物之成實者各具生理所謂碩果不食是已夫具生理者固各繼其生而物之歸根復命猶自若也如說天地以生物為心斯可見矣又問既言心性則天命之謂性命字有心底意思否曰然流行運用是心人傑天地生物之心未嘗須臾停然當氣候肅殺草木搖落之時此心何以見曰天地此心常在只是人看不見故必到復而後始可見僩天地之心未嘗無但靜則人不得而見爾道夫伊川言一陽復於下乃天地生物之心一段蓋謂天地以生生為德自元亨利貞乃生物之心也但其靜而復乃未發之體動而通焉則已發之用一陽來復其始生甚微固若靜矣然其實動之機其勢日長而萬物莫不資始焉此天命流行之初造化發育之始天地生生不已之心於是而可見也若其靜而未發則此之心體雖無所不在然卻有未發見處此程子所以以動之端為天地之心亦舉用以該其體爾端蒙問一陽復於下乃天地生物之心也先儒皆以靜為見天地之心竊謂十月純坤不為無陽天地生物之心未嘗間息但未動耳因動而生物之心始可見曰十月陽氣收斂一時關閉得盡天地生物之心固未嘗息但無端倪可見惟一陽動則生意始發露出乃始可見端緒也言動之頭緒於此處起於此處方見得天地之心也因問在人則喜怒哀樂未發時而所謂中節之體已各完具但未發則寂然而已不可見也特因事感動而惻隱羞惡之端始覺因事發露出來非因動而漸有此也曰是銖問程子言先儒皆以靜為見天地之心不知動之端乃天地之心動處如何見得曰這處便見得陽氣發生其端已兆於此春了又冬冬了又春都從這裏發去事物間亦可見只是這裏見得較親切鄭兄舉王輔嗣說寂然至無乃見天地心曰他說無是胡說若靜處說無不知下面一畫作甚麼宇問動見天地之心固是不知在人可以主靜言之否曰不必如此看這處在天地則為陰陽在人則為善惡有不善未嘗不知知之未嘗復行不善處便是陰善處便屬陽上五陰下一陽是當沉迷蔽錮之時忽然一夕省覺便是陽動處齊宣王興甲兵危士臣構怨於諸侯可謂極矣及其不忍觳觫即見善端之萌肯從這裏做去三王事業何患不到宇居甫問復見天地之心曰復未見造化而造化之心於此可見某問靜亦是心而心未見曰固是但又須靜中含動意始得曰王弼說此似把靜作無曰渠是添一重說話下自是一陽如何說無上五陰亦不可說無說無便死了無復生成之意如何見其心且如人身上一陽善也五陰惡也一陽君子也五陰小人也只是有不善未嘗不知知之未嘗復行且看一陽對五陰是惡五而善一才復則本性復明非天心而何可學與上條同聞問復以動見天地之心而主靜觀復者又何謂曰復固是動主靜是所以養其動動只是這靜所養底一陽動便是純坤月養來曰此是養之於未動之前否曰此不可分前後但今日所積底便為明日之動明日所積底便為後日之動只管恁地去觀復是老氏語儒家不說老氏愛說動靜萬物並作吾以觀其復謂萬物有歸根時吾只觀他復處淳問程子以動之端為天地之心動乃心之發處何故云天地之心曰此須就卦上看上坤下震坤是靜震是動十月純坤當貞之時萬物收斂寂無蹤跡到此一陽復生便是動然不直下動字卻云動之端端又從此起雖動而物未生未到大段動處凡發生萬物都從這裏起豈不是天地之心康節詩云冬至子之半大雪子之初氣冬至子之中氣天心無改移一陽初動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問庖羲可謂振古豪傑淳問冬至子之半曰康節此詩最好某於本義亦載此詩蓋立冬是十月初小雪是十月中大雪十一月初冬至十一月中小寒十二月初大寒十二月中冬至子之半即十一月之半也人言夜半子時冬至蓋夜半以前一半已屬子時今推五行者多不知之然數每從這處起略不差移此所以為天心然當是時一陽方動萬物未生未有聲臭氣味之可聞可見所謂玄酒味方淡大音聲正希也漢卿問一陽初動處萬物未生時曰此在貞元之間才見孺子入井未做出惻隱之心時節因言康節之學不似濂溪二程康節愛說箇循環底道理不似濂溪二程說得活如無極而太極太極本無極體用一源顯微無間康節無此說方子廣録見下問康節所謂一陽初動後萬物未生時這箇時節莫是程子所謂有善無惡有是無非有吉無凶之時否先生良久曰也是如此是那怵惕惻隱方動而未發於外之時正淳云此正康節所謂一動一靜之間也曰然某嘗謂康節之學與周子程子所說小有不同康節於那陰陽相接處看得分曉故多舉此處為說不似周子說無極而太極與五行一陰陽陰陽一太極如此周遍若如周子程子之說則康節所說在其中矣康節是指貞元之間言之不似周子程子說得活體用一源顯微無間廣賀孫録別出漢卿問一陽初動處萬物未生時以人心觀之便是善惡之端感物而動處曰此是欲動未動之間如怵惕惻隱於赤子入井之初方怵惕惻隱而未成怵惕惻隱之時故上云冬至子之半是康節常要就中間說子之半則是未成子方離於亥而為子方四五分是他常要如此說常要說陰陽之間動靜之間便與周程不同周程只是五行一陰陽陰陽一太極太極本無極只是體用動靜互換無極康節便只要說循環便須指消息動靜之間便有方了不似二先生賀孫天地之心動後方見聖人之心應事接物方見出入朋來只做人說覺不勞攘淵論復見天地之心程子曰聖人無復故未嘗見其心且堯舜孔子之心千古常在聖人之心周流運行何往而不可見若言天地之心如春生發育猶是顯著此獨曰聖人無復未嘗見其心者只為是說復卦繫辭曰復小而辨於物蓋復卦是一陽方生於群陰之下如幽暗中一點白便是小而辨也聖人贊易而曰復見天地之心今人多言惟是復卦可以見天地之心非也六十四卦無非天地之心但於復卦忽見一陽來復故即此而贊之爾論此者當知有動靜之心有善惡之心各隨事而看今人乍見孺子將入於井因發動而見其惻隱之心未有孺子將入井之時此心未動只靜而已衆人物欲昏蔽便是惡底心及其復也然後本然之善心可見聖人之心純於善而已所以謂未嘗見其心者只是言不見其有昏蔽忽明之心如所謂幽暗中一點白者而已但此等語話只可就此一路看去才轉入別處便不分明也不可不知謨問聖人無復未嘗見其心天地之氣有消長進退故有復聖人之心純乎天理故無復曰固是又問鼓舞萬物而不與聖人同憂天地則任其自然聖人贊化育則不能無憂曰聖人也安得無憂但聖人之憂憂得恰好不過憂耳夔孫舉聖人無復故不見其心一節語學者曰聖人天地心無時不見此是聖人因贊易而言一陽來復於此見天地之心尤切正是大黑暗中有一點明可學國秀問舊見蔡元思說先生說復卦處靜極而動聖人之復惡極而善常人之復是否曰固是但常人也有靜極而動底時節聖人則不復有惡極而善之復矣僩上云見天地之心以動靜言也下云未嘗見聖人之心以善惡言也道夫復雖一陽方生然而與衆陰不相亂如人之善端方萌雖小而不為衆惡所遏底意思相似學履饒録作雖小而衆惡卻遏他不得問一陽復在人言之只是善端萌處否曰以善言之是善端方萌處以惡言之昏迷中有悔悟向善意便是復如睡到忽然醒覺處亦是復氣象又如人之沉滯道不得行到極處忽小亨道雖未大行已有可行之兆亦是復這道理千變萬化隨所在無不渾淪淳敬子問今寂然至靜在此若一念之動此便是復否曰恁地說不盡復有兩樣有善惡之復有動靜之復兩樣復自不相須須各看得分曉終日營營與萬物並馳忽然有惻隱是非羞惡之心發見此善惡為陰陽也若寂然至靜之中有一念之動此動靜為陰陽也二者各不同須推教子細僩伊川與濂溪說復字亦差不同用之云濂溪說得復字就歸處說伊川就動處說曰然濂溪就坤上說就回來處說如云利貞者誠之復誠心復其不善之動而已矣皆是就歸來處說伊川卻正就動處說如元亨利貞濂溪就利貞上說復字伊川就元字頭說復字以周易卦爻之義推之則伊川之說為正然濂溪伊川之說道理只一般非有所異只是所指地頭不同以復卦言之下面一畫便是動處伊川云下面一爻正是動如何說靜得雷在地中復云云看來伊川說得較好王弼之說與濂溪同僩問陽始生甚微安靜而後能長故復之象曰先王以至日閉關人於迷途之復其善端之萌亦甚微故須莊敬持養然後能大不然復亡之矣曰然又曰古人所以四十強而仕者前面許多年亦且養其善端若一下便出來與事物羇了豈不壞事賀孫陽氣始生甚微必安靜而後能長問曰此是靜而後能動之理如何如人之天理亦甚微須是無私欲撓之則順發出來曰且如此看又問安靜二字還有分別否曰作一字看端蒙叔重問先生以至日閉關程傳謂陽之始生至微當安靜以養之恐是十月純坤之卦陽已養於至靜之中至是方成體爾曰非也養於既復之後又問復見天地之心曰要說得見字親切蓋此時天地之間無物可見天地之心只有一陽初生淨淨潔潔見得天地之心在此若見三陽發生萬物之後則天地之心散在萬物則不能見得如此端的雉掩身事齊戒月令夏至冬至君子皆齊戒處必掩身及此防未然此二句兼冬至夏至閉關息商旅所以養陽氣也絶彼柔道牽所以絶陰氣易姤之初六繫于金柅是也銖問無祗悔祗字何訓曰書中祗字只有這祗字使得來別看來只得解做至字又有訓多為祗者如多見其不知量也多祗也祗與只同僩先生舉易傳語惟其知不善則速改以從善而已曰這般說話好簡當文蔚問上六迷復至下十年不克征如何曰過而能改則亦可以進善迷而不復自是無說所以無往而不凶凡言三年十年三歲皆是有箇象方說若三歲猶是有箇期限到十年便是無說了礪無妄無妄本是無望這是沒理會時節忽然如此得來面前朱英所謂無望之福是也桑樹中箭柳樹出汁淵史記無妄作無望問若以為無望即是願望之望非誠妄之妄曰有所願望即是妄但望字說得淺妄字說得深必大剛自外來說卦變動而健說卦德剛中而應說卦體大亨以正說元亨利貞自文王以來說做希望之望這事只得倚閣在這裏難為斷殺他淵伊川易傳似不是本意剛自外來是所以做造無妄動而健是有卦後說底淵往字說得不同淵問雖無邪心苟不合正理則妄也既無邪何以不合正曰有人自是其心全無邪而卻不合於正理如賢智者過之他其心豈曾有邪卻不合正理佛氏亦豈有邪心者夔孫因論易傳雖無邪心苟不合正理則妄也乃邪心也或以子路使門人為臣事為證先生曰如鬻拳強諫之類是也或云王荊公亦然曰溫公忠厚故稱荊公無姦邪只不曉事看來荊公亦有邪心夾雜他卻將周禮來賣弄有利底事便行之意欲富國強兵然後行禮義不知未富強人才風俗已先壞了向見何一之有一小論稱荊公所以辦得盡行許多事緣李文靖為相日四方言利害者盡皆報罷積得許多弊事所以激得荊公出來一齊要整頓過荊公此意便是慶曆范文正公諸人要做事底規模然范文正公等行得尊重其人才亦忠厚荊公所用之人一切相反僩或問物與無妄衆說不同文蔚曰是各正性命之意先生曰然一物與他一箇無妄文蔚或說無妄曰卦中未便有許多道理聖人只是說有許多爻象如此占著此爻則有此象無妄是箇不指望偶然底卦忽然而有福忽然而有禍如人方病忽然勿藥而愈是所謂無妄也據諸爻名義合作無望不知孔子何故說歸無妄人之卜筮如決杯珓如此則吉如此則凶杯珓又何嘗有許多道理如程子之說說得道理儘好儘開闊只是不如此未有許多道理在又曰無妄一卦雖云禍福之來也無常然自家所守者不可不利於正不可以彼之無常而吾之所守亦為之無常也故曰無妄元亨利貞其匪正有眚若所守匪正則有眚矣眚即災也問伊川言災自外來眚自內作是否曰看來只一般微有不同耳災是禍偶然生於彼者眚是過誤致然書曰眚災肆赦春秋曰肆大眚皆以其過誤而赦之也僩問不耕穫不菑畬伊川說爻辭與小象卻不同如何曰便是曉不得爻下說不耕而獲到小象又卻說耕而不必求穫都不相應某所以不敢如此說他爻辭分明說道不耕穫了自是有一樣時節都不須得作為又曰看來無妄合是無望之義不知孔子何故使此妄字如無妄之災無妄之疾都是沒巴鼻恁地又曰無妄自是大亨了又卻須是貞正始得若些子不正則行有眚眚即與災字同不是自家做得只有些子不是他那裏便有災來問眚與災如何分曰也只一般尚書云眚災肆赦春秋肆大眚眚似是過誤災便直自是外來又曰此不可大段做道理看只就逐象上說見有此象便有此義少間自有一時築著磕著如今人問杯珓杯珓上豈曾有道理自是有許多吉凶礪不耕穫一句伊川作三意說不耕而穫耕而不穫耕而不必穫看來只是也不耕也不穫只見成領會他物事淵問不耕穫不菑畬曰言不耕不穫不菑不畬無所為於前無所冀於後未嘗略起私意以作為唯因時順理而已程傳作不耕而穫不菑而畬不唯添了而字又文勢牽強恐不如此又問無妄之災曰此卦六爻皆是無妄但六三地頭不正故有無妄之災言無故而有災也如行人牽牛以去而居人反遭捕詰之擾此正無妄之災之象又問九五陽剛中正以居尊位無妄之至何為而有疾曰此是不期而有此但聽其自爾久則自定所以勿藥有喜而無疾也大抵無妄一卦固是無妄但亦有無故非意之事故聖人因象示戒又問史記作無望謂無所期望而有得疑有不耕穫不菑畬之意曰此出史記春申君傳正說李園事正是說無巴鼻而有一事正合無妄之災無妄之疾亦見得古人相傳尚識得當時此意也銖不耕穫不菑畬如易傳所解則當言不耕而穫不菑而畬方可又如云極言無妄之義是要去義理上說故如此解易之六爻只是占吉凶之辭至彖象方說義理六二在無妄之時居中得正故吉其曰不耕穫不菑畬是四字都不做謂雖事事都不動作亦自利有攸往史記無妄作無望是此意六三便是無望之災或繫之牛行人之得何與邑人事而邑人之災如諺曰閉門屋裏坐禍從天上來是也此是占辭如飛龍在天利見大人若庶人占得此爻只是利去見大人也然吉凶以正勝有雖得凶而不可避者縱貧賤窮困死亡卻無悔吝故橫渠云不可避凶趨吉一以正勝是也又如占得坤六二爻須是自己直方大方與爻辭相應便不習無不利若不直方大卻反凶也必大録此下云如春秋時南蒯占得坤六五爻以為大吉示子服惠伯惠伯曰忠信之事則可不然必敗一段說得極好蓋南蒯所占雖得吉爻然所為卻不黃裳即是大凶問不耕穫不菑畬未富之義曰此有不可曉然既不耕穫不菑畬自是未富只是聖人說占得此爻雖是未富但利有攸往耳雖是占爻然義理亦包在其中易傳中說未字多費辭大畜能止健都不說健而止見得是艮來止這乾淵篤實便有輝光艮止便能篤實淵九三一爻不為所畜而欲進與上九合志同進俱為畜極而通之時故有良馬逐何天之衢亨之象但上九已通達無礙只是滔滔去九三過剛鋭進故戒以艱貞間習蓋初二兩爻皆為所畜獨九三一爻自進耳子善問九六為正應皆陰皆陽則為無應獨畜卦不爾何也曰陽遇陰則為陰所畜九三與上九皆陽皆欲上進故但以同類相求也小畜亦然先生因言某作本義欲將文王卦辭只大綱依文王本義略說至其所以然之故卻於孔子彖辭中發之且如大畜利貞不家食吉利涉大川只是占得大畜者為利正不家食而吉利於涉大川至於剛上尚賢等處乃孔子發明各有所主爻象亦然如此則不失文王本意又可見孔子之意但今未暇整頓耳又曰大畜下三爻取其能自畜而不進上三爻取其能畜彼而不使進然四能止之於初故為力易五則陽已進而止之則難但以柔居尊得其機會可制故亦吉但不能如四之元吉耳銖何天之衢亨或如伊川說衍一何字亦不可知礪頤頤須是正則吉何以觀其正不正蓋觀頤是觀其養德是正不正自求口實是又觀其養身是正不正未說到養人處觀其所養亦只是說君子之所養養浩然之氣模樣淵自養則如爵祿下至於飲食之類是說自求口實淵問觀頤觀其所養作所養之道觀其自養作所以養生之術曰所養之道如學聖賢之道則為正黃老申商則為非凡見於修身行義皆是也所養之術則飲食起居皆是也又問伊川把觀其所養作觀人之養如何曰這兩句是解養正則吉所養之道與養生之術正則吉不正則不吉如何是觀人之養不曉程說是如何學履頤卦最難看銖問本義言觀頤謂觀其所養之道自求口實謂觀其所養之術與程傳以觀頤為所以養人之道求口實謂所以自養之道如何先生沉吟良久曰程傳似勝蓋下體三爻皆是自養上體三爻皆是養人不能自求所養而求人以養己則凶故上三爻皆凶求於人以養其下雖不免於顛拂畢竟皆好故下三爻皆吉又問虎視耽耽本義以為下而專也蓋賴其養以施於下必有下專之誠方能無咎程傳作欲立威嚴恐未必然曰頤卦難看正謂此等且虎視耽耽必有此象但今未曉耳銖曰音辨載馬氏云耽耽虎下視貌則當為下而專矣曰然又問其欲逐逐如何曰求養於下以養人必當繼繼求之不厭乎數然後可以養人而不窮不然則所以養人者必無繼矣以四而賴養於初亦是顛倒但是求養以養人所以雖顛而吉先生又曰六五居貞吉猶洪範用靜吉用作凶所以不可涉大川六五不能養人反賴上九之養是已拂其常矣故守常則吉而涉險阻則不可也直卿因云頤之六爻只是顛拂二字求養於下則為顛求食於上則為拂六二比初而求上故顛頤當為句拂經于丘頤句征凶即其占辭也六三拂頤雖與上為正應然畢竟是求於上以養己所以有拂頤之象故雖正亦凶也六四顛頤固與初為正應然是賴初之養以養人故雖顛亦吉六五拂經即是比于上所以有拂經之象然是賴上九之養以養人所以居正而吉但不能自養所以不可涉大川耳銖或云諺有禍從口出病從口入甚好曰此語前輩曾用以解頤之象慎言語節飲食廣問伊川解下三爻養口體上三爻養德義如何曰看來下三爻是資人以為養上三爻是養人也六四六五雖是資初與上之養其實是他居尊位藉人以養而又推以養人故此三爻似都是養人之事伊川說亦得但失之疏也學履義剛録云下三爻是資人以養己養己所以養人也頤六四一爻理會不得雖是恁地解畢竟曉不得如何是施於下又如何是虎礪六五拂經居貞吉不可涉大川六五陰柔之才但守正則吉故不可以涉患難六四顛頤吉虎視耽耽其欲逐逐此爻不可曉僩大過問大過既棟橈不是好了又如何利有攸往曰看彖辭可見棟橈是以卦體本末弱而言卦體自不好了卻因剛過而中巽而說行如此所以利有攸往乃亨也大抵彖傳解得卦辭直是分明學履洽同問大過小過先生與伊川之說不同曰然伊川此論正如以反經合道為非相似殊不知大過自有大過時節小過自有小過時節處大過之時則當為大過之事處小過之時則當為小過之事如堯舜之禪受湯武之放伐此便是大過之事喪過乎哀用過乎儉此便是小過之事只是在事雖是過然適當其時便是合當如此做便是合義如堯舜之有朱均豈不能多擇賢輔而立其子且恁地平善過然道理去不得須是禪授方合義湯武豈不能出師以恐嚇紂且使其悔悟修省然道理去不得必須放伐而後已此所以事雖過而皆合理也僩易傳大過云道無不中無不常聖人有小過無大過看來亦不消如此說聖人既說有大過直是有此事雖云大過亦是常理始得因舉晉州蒲事云舊常不曉胡文定公意以問范伯達丈他亦不曉後來在都下見其孫伯逢問之渠云此處有意思但是難說出如左氏分明有稱君無道之說厲公雖有罪但合當廢之可也而欒書中行偃弒之則不是然畢竟厲公有罪故難說後必有曉此意者賜澤滅木澤在下而木在上今澤水高漲乃至浸沒了木是為大過又曰木雖為水浸而木未嘗動故君子觀之而獨立不懼遁世無悶礪小過是收斂入來底大過是行出來底如獨立不懼遁世無悶是也淵藉用白茅亦有過慎之意此是大過之初所以其過尚小在淵問大過棟橈是初上二陰不能勝四陽之重故有此象九三是其重剛不中自不能勝其任亦有此象兩義自不同否曰是如此九三又與上六正應亦皆不好不可以有輔自是過於剛強輔他不得九四棟隆只是隆便不橈乎下過涉滅頂不可咎也恐是他做得是了不可以咎他不似伊川說易中無咎有兩義如不節之嗟無咎王輔嗣云是他自做得又將誰咎至出門同人無咎又是他做得好了人咎他不得所以亦云又誰咎也此處恐不然又曰四陽居中如何是大過二陽在中又如何是小過這兩卦曉不得今且只逐爻略曉得便也可占礪大過陽剛過盛不相對值之義故六爻中無全吉者除了初六是過於畏慎無咎外九二雖無不利然老夫得女妻畢竟是不相當所以象言過以相與也九四雖吉而又有他則吝九五所謂老婦者乃是指客爻而言老婦而得士夫但能無咎無譽亦不為全吉至於上六過涉滅頂凶無咎則是事雖凶而義則無咎也銖過涉滅頂凶不可咎也東漢諸人不量深淺至於殺身亡家此是凶然而其心何罪故不可咎也夔孫坎水流不盈才是說一坎滿便流出去一坎又滿又流出去行險而不失其信則是說決定如此淵坎水只是平不解滿盈是滿出來淵六三險且枕只是前後皆是枕便如枕頭之枕礪問來之坎坎曰經文中疊字如兢兢業業之類是重字來之自是兩字各有所指謂下來亦坎上往亦坎之往也進退皆險也又問六四舊讀樽酒簋句二用缶句本義從之其說如何曰既曰樽酒簋二又曰用缶亦不成文理二益之也六四近尊位而在險之時剛柔相際故有但用薄禮益以誠心進結自牖之象問牖非所由之正乃室中受明之處豈險難之時不容由正以進耶曰非是不可由正蓋事變不一勢有不容不自牖者終無咎者始雖不甚好然於義理無害故終亦無咎無咎者善補過之謂也又問上六徽纆二字云三股曰徽兩股曰纆曰據釋文如此銖樽酒簋做一句自是說文如此礪問納約自牖曰不由戶而自牖以言艱險之時不可直致也季札納約自牖雖有向明之意然非是路之正淵坎不盈祗既平祗字他無說處看來只得作抵字解復卦亦然不盈未是平但將來必會平二與五雖是陷于陰中畢竟是陽會動陷他不得如有孚維心亨如行有尚皆是也礪坎不盈中未大也曰水之為物其在坎只能平自不能盈故曰不盈盈高之義中未大者平則是得中不盈是未大也學履離離便是麗附著之意易中多說做麗也有兼說明處也有單說明處明是離之體麗是麗著底意思離字古人多用做麗著說然而物相離去也只是這字富貴不離其身東坡說道剩箇不字便是這意古來自有這般兩用底字如亂字又喚做治淵離字不合單用淵火中虛暗則離中之陰也水中虛明則坎中之陽也道夫問離卦是陽包陰占利畜牝牛便也是宜畜柔順之物曰然礪彖辭重明自是五二兩爻為君臣重明之義大象又自說繼世重明之義不同同六二中正六五中而不正今言麗乎正麗乎中正次第說六二分數多此卦唯這爻較好然亦未敢便恁地說只得且說未詳淵本義今無未詳字問明兩作離曰若做兩明則是有二箇日不可也故曰明兩作離只是一箇日相繼之義明兩作如坎卦水洊至非以明兩為句也明字便是指日而言學履明兩作猶言水洊至今日明來日又明若說兩明卻是兩箇日頭淵明兩作離作起也如日然今日出了明日又出是之謂兩作蓋只是這一箇明兩番作非明兩乃兩作也僩叔重說離卦問火體陰而用陽是如何曰此言三畫卦中陰而外陽者也坎象為陰水體陽而用陰蓋三畫卦中陽而外陰者也惟六二一爻柔麗乎中而得其正故元吉至六五雖是柔麗乎中而不得其正特借中字而包正字耳又問日昃之離曰死生常理也若不能安常以自樂則不免有嗟戚曰生之有死猶晝之必夜故君子當觀日昃之象以自處曰人固知常理如此只是臨時自不能安耳又問九四突如其來如曰九四以剛迫柔故有突來之象焚死棄言無所用也離為火故有焚如之象或曰突如其來如與焚如自當屬上句死如棄如自當做一句曰說時亦少通但文勢恐不如此時舉九四有侵陵六五之象故曰突如其來如火之象則有自焚之義故曰焚如死如棄如言其焚死而棄也學履焚死棄只是說九四陽爻突出來逼拶上爻焚如是不戢自焚之意棄是死而棄之之意淵焚如死如棄如自成一句恐不得如伊川之說礪六五介于兩陽之間憂懼如此然處得其中故不失其吉淵問郭沖晦以為離六五乃文明盛德之君知天下之治莫大於得賢故憂之如此如堯以不得舜為己憂舜以不得禹皋陶為己憂是否曰離六五陷於二剛之中故其憂如此只為孟子說得此二句便取以為說金録云恐不是如此於上下爻不相通所以有牽合之病解釋經義最怕如此謨去僞同有嘉折首是句淵
