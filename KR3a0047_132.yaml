body:
  text: 朱子語類卷第一百三十二本朝六中興至今日人物下宗澤守京城治兵禦戎以圖恢復之計無所不至上表乞回鑾數十表乞不南幸乞修二聖宮殿論不割地其所建論所謀畫是非利害昭然可觀觀其勢駸駸乎中興之基矣耿南仲沮之於南京時勢不歸京城汪黃沮之淮甸時動相掣肘使不得一有所為如令樁管器甲之類不得擅有支遣問所召募係何色額人召募得百十萬以上人令京民出助軍錢不得支錢修城池造器械數事皆汪黃張愨為之初宗守京太上即位南京時河東北京東西之民日夜自守望駕歸京王師之來全無盜賊駕一居淮甸賊起百十萬丁進李成楊進之徒兢起宗盡召之為用事垂成而薨朝廷不為諸人作主諸人四散為賊矣傷哉宗薨時年七十諡忠簡揚宗忠簡公薨其家人方入棺未斂軍兵輿出大廳三日祭弔來哭不絶祭物滿廳無數其得軍情人心如此揚王庶西人趙元鎮引作樞密甚有威望又言他強倔死葬廬山王之奇是庶之子亦作樞密庶以私怨殺曲端端亦西人庶嘗在其軍中幾為端所殺振王子尚初在陝西為金人所圍求救於曲端端命一愛將救之既至欲求休息數日王不許戰敗奔入城王斬之既而城陷王奔端端詰責欲殺之有幕僚力諫止囚之一日遣入蜀遂譖端於魏公魏公殺端可學徐師川微時嘗遊廬山遇一宦者鄭諶與之詩曰平生不善劉蕡策色色門中看有人後入樞府鄭時適用事模樣似有力焉徐在密院時金人寇襄陽中書集議徐曰彼本盜賊所有時國步未安盜有竊發據城邑者因以與之好時為官跋扈則為盜得失不足為國家輕重時趙元鎮為參知政事曰襄陽為金人所據則川廣路絶國家危矣徐曰此是樞密院事參政不須與趙曰小小兵事樞密自主之可也此國家大事政府安得不與即上馬而去太上聞之罷徐樞密徐歸鄉以前輩自居恃文使氣好罵專以飲酒為事不擇貧賤皆往啖之詩亦無甚佳者揚可學録云徐師川在密院荊襄有密報五府會議師川曰今日朝廷視荊襄乃無用地何不棄之趙丞相為參政曰此乃上流何可棄師川曰密院事何預參政趙曰某參知政事此乃係政事之大者安得不預遂策馬徑出入文字朝廷為之罷師川趙遂知院為帥未行虜退師韓世忠作小官時一城被圍郡將無計世忠令募敢死士得二百人世忠云不消多只擇得精者八十人令人持一斧世忠問云其間豈無能為盜者遂令往偷了鼓捶卻略將石頭去驚他門他必往報中軍便隨入見有紅帳者便斫俟彼人集便出來恐有馬軍來趕便與相殺城上皆喊云馬軍進如是果退圍揚嶽太尉飛本是韓魏公家佃客每見韓家子弟必拜振嶽飛恃才不自晦郭子儀晚節保身甚闒冗然當緊要處又不然單騎見虜云云飛作副樞便直是要去做張韓知其謀便只依違然便不做亦不免其用心如此直是忠勇也揚紹興間諸將橫劉光世使一將官來奏事應對之類皆善上喜之轉官頗賜豫劉疑其以軍中機密上聞欲殺之其人走投朝廷朝廷不知如何區處之劉又使人逐路殺之追者已近其人告州將藏之獄中入文字朝廷方免揚吳玠到饒風關卻走回此事惟張巨山退虜記得實德明後世用兵只是胡冢殺那曾有節制如季通説八陳可用怕也未必可用當臨陳時只看當時事體排扒得著所在如吳璘敗虜於殺金平前面對陳交兵正急後面諸軍一齊擁前爛殺虜人這有甚陳法且如用兵前陳交接後陳即用木車隔了不令突出當吳璘那時軍勢勇猛將來隔了一齊都斫開突前去有甚陳法看來兵之勝負全在勇怯又云用兵之要敵勢急則自家當委曲以纏繞之敵勢緩則自家當徑直以衝突之賀孫古之戰也兩軍相對甚有禮有饋惠焉有飲酌焉不似後世便只是爛殺將去劉錡順昌之捷亦只是投之死地而後生當時虜騎大擁而至凡十餘萬諸將會議以為固知力不能當然急渡江則朝廷兵守已自戒嚴必不可渡兼攜持老幼虜騎已迫必為所追其勢終歸於死若兩下皆死不若固守庶幾可生遂閉城門而守虜人大至劉錡先遣人約他某日戰虜人謂其敢與我約戰大怒至日虜騎壓於城外時正暑月劉錡分部下兵五千為五隊先備暑藥飯食酒肉存在先以一副兜牟與甲置之日下曬時令人以手摸看熱得幾何如此數次其兜牟與甲尚可容手則未發直待熱如火不可容手乃喚一隊軍至令喫酒飯少定與暑藥遂各授兵出西門戰少頃又喚一隊上授之出南門如此數隊分諸門迭出迭入虜遂大敗緣虜人衆多其立無縫僅能操戈更轉動不得而我兵執斧直入人叢掀其馬甲以斷其足一騎才倒即壓數騎殺死甚衆況當衆正熱甲盾如火流汗喘息煩悶而吾軍迭出飽鋭清敘而傷困者即扶歸就藥調護遂以至寡敵至衆虜人大敗方有怯中國之意遂從和議前此皆未肯真箇要和此是庚申年六月可惜此機不遂進賀孫張棟字彥輔謂劉信叔親與他言順昌之戰時金人十上萬人圍了城城中兵甚不多劉使人下書約戰日虜人笑是日早虜騎迫城下而陳連山檩陳甚密不動劉先以檩甲一聯曬庭中一邊以肉飯犒師時使人摸檩甲未大熱又且候候甲熱甚遂開城門以所犒一隊持斧出令只掀起虜騎斫斷馬腳人馬都全裝一騎倒又粘倒數騎虜人全無下手處此隊歸以五苓大順散與服之令歇又以所犒第二隊出如前殺甚多虜覺得勢敗遂遁走後人問曬甲之事如何曰甲熱則虜人在日中皆熱悶矣此則在敘處歇方出時當暑月也揚籍溪嘗云建炎間勤王之師所過州縣如入無人之境恣行擒掠公私苦之有陳無玷者以才略稱嘗作某縣宿戒邑人各備器械候聞鍾聲則人執以出隨其所居相比排列未幾勤王之師入縣將肆縱橫之狀即命擊鍾邑人聞之如其宿戒以出師徒見其戈矛森列不虞其有備若此也相顧失色遂整師以過秋毫無犯邑人德之又胡文定公之趨召命也泛舟而下無玷走吏致書戒其吏云計程到江黃間有官船自下而上者可扣之當是本官吏至彼果有舟上者一問得之其善料事如此蓋渠以事占之知文定之不果造朝也儒用某人作縣臨行請教於某人先生言其姓名今忘記某人曰張直柔在彼每事可詢訪之某人到官忽有旨令諸縣造戰船召匠計之所費甚巨因意臨行請教之語亟訪策於張張曰此事甚易可作一小者計其丈尺廣狹長短即是推之則大者可見矣遂如其語為之比成推算比前所計之費減十之三四其後諸縣皆重有科斂獨是邑不擾而辨後其人知紹興府太后山陵被旨令應副錢數萬給磚為墻其大小厚薄呼磚匠於後圃依樣造之會其直比拋降之數減數倍遂申朝廷乞紹興自認磚墻正中宦者欺弊遂急沮其請只令紹興府應副錢不得干預磚墻事儒用成録云其人曰如何費許多錢遂呼磚匠於園後結墻一堵驗之先問其磚之大小厚薄依樣燒磚而結之費比朝廷所拋降之數減數倍云云張觷字直柔福建人嘗知處州有人欲造大舟不能計其所費問之張云可造一小舟以寸折尺便可計算後又有人欲築紹興圍神廟牆召匠計之云費八萬緡其人用張法自築一丈長算其墻可直二萬遂以四萬與匠者董事內官無所得遂與奏紹興貧不如自出錢太后遂自出錢費三十二萬緡揚高宗朝有朝士後為尚書建炎嘗請駕幸福建以為福建有天險又上言邵武南劍人多鑿紙錢費農業乞降旨禁之或人家忌日之類不得燒紙錢只燒經幡一二紙好笑如此粘罕長槍大劍如此而使若輩人謀國云云邵武有文集又有趙霈者清獻之孫此時亦上言聖節殺雞鵝太多只令殺豬羊大牲適傳有一龍虎大王南侵邊方以為懼胡侍郎云不足慮此有雞鵝御史足以當之揚紹興間曾天隱名恬作中書舍人曾亦賢者然嘗為蔡京引用後修哲宗實録成太上趙丞相要就褒賞修實録官制辭上説破前後是非曾以蔡之故常主那一邊及行詞只模糊作一修史轉官制上與丞相不樂命呂居仁行呂權中書舍人自丁巳三月二十五日上一狀論分別邪正謂曾之徒也自荊公諸人熙豐間用事新經字説之類已壞了人心術元祐諸公所為那一邊人終不以為是紹聖以後又復新政敗壞一向至於渡江然舊人亦多在者其所見舊染不省雖賢者亦復如是如曾之徒是也因論人以先入為主一生做病揚湯思退事秦檜最久其無狀皆親學得故所為如此之乖揚湯思退作樞密董德元參政商量薦小秦作相董言之不答湯即背其説逐董出召魏良臣來作參魏治楊存中上不答湯又逐出魏湯遂作相揚湯思退王之望尹穡三人姦甚又各有文以計去了魏公盡毀其邊備山寨水匱之類凡險要處有備禦者皆毀之還了金人四州以謂可以保其和好而無事矣一日只見虜騎十萬突至驚擾一番而去三人者乃罷其謀蓋三人之所同也尹乃疏平日邊事尹能文其事尚如此姦宰相自為一室藏文書全不令臺諫至其後及賈誼待大臣盤劍之類事湯卒以驚死敗小人情狀如此初去了魏公毀邊備時諸將皆欲得而殺之王之望尚在其所急上書論三事一恢復二守禦三與之和時亦要地界歲幣之類分明上大喜即日召歸參大政乃金人有所須上商量之際上意欲不與欲之望有所説之望全不言上顧之云如何之望曰不如且與之上曰卿前書意如何及敗二人皆懼邊將之怨己不敢出師上前至以鄙語相罵之望謂湯小數子成把價撒出來好士夫所為如此之類言語記不全三人之意惟恐奉虜不至但看要如何虜見其著數低易之遂無所不敢使其和議如秦檜時則亦一檜矣好梟三人首於都市俾虜人聞之亦以少畏此是甲申年虜騎來時思退之望既罷穡不罷上令胡銓穡往經略邊備二人皆搬家先去上但知胡如此怒去之時召陳魯公魯公至留胡上曰用其經略邊事遂搬家先去用是罷之陳曰如此則穡亦搬家去臣途中見之遂罷穡多讀書能文然行不成人上初極重之每對群臣言無人及穡龔茂良為左司諫與穡同對欲促上早定和議穡曰內政只消三二箇月打疊不日可以至太平但外敵未去下手未得且與講和為便揚方伯謨問某人如何忘其姓名先生曰對移縣丞一節全處不下又問是當初未見得曰他當初感發踊躍只是後來不接續語朱希真曰天下有一等人直是要文采求進用因説及尹穡前日趙蕃稱他是好人伯謨問他當初如何會許多年不出曰只是且礙過及至上手則亂渠初擢用力言但得虜和三二月綱紀自定龔實之云便是他人耳聾敢如此説如減冗官事是但非其人行之失人心渠初除浙西制置胡邦衡除浙東邦衡搬家從蘇秀迤單欲歸鄉因此罷陳魯公再用因言於上曰胡銓搬家固可罪尚向北尹穡搬家乃向南上云無此事公云臣親見之自古人主無與天下立敵之理天下皆道不好陛下乃力主張張魏公在督府渠欲搖撼一日陳彥廣對言張某似有罷意上曰安有此事方今誰出魏公上上每呼張相只曰魏公必是臺諫中為此卿可宣諭陳見尹道上意尹云某請對數日駕在德壽批出陳知建寧府魏公亦罷某問當時諸公薦之何故曰亦能文章大抵以此取人不考義理無以知其人多為所誤如蘇子由用楊畏畏為攻向上三人蘇終不遷畏曰蘇公不足與矣乃反攻之可學或問胡邦衡在新州十七八年不死先生曰天生天殺道之理也人如何解死得人廣胡邦衡尚號為有知識者一日以書與范伯達云某解得易魏公為作序解得春秋鄭億年為作序以為美事范答書云易得魏公序甚好鄭序春秋者不知是何人得非劉豫左相乎是此人時且請去之胡舊嘗見李彌遜字似之亦一好前輩謂胡曰人生亦不解事事可稱只做得一兩節好便好胡後來喪名失節亦未必非斯言有以入之也揚呂居仁學術雖未純粹然切切以禮義廉恥為事所以亦有助於風俗今則全無此意方子呂家之學大率在於儒禪之間習典故居仁遂去學作詩亦不説於趙丞相後於秦檜所為亦有輔之者籍溪云嘗代一表云仰日月於九天之上下一句甚卑可憐之詞居仁為之也後虜中此文亦有人傳之揚呂居仁作舍人時繳奏文字好處多一章論袁煥章乞作教官教官人之師表豈可乞此論不聞數十年矣今皆是陳乞然不陳乞朝廷又不為檢舉朝廷為檢舉方是亦可以養士大夫廉恥今皆不然都要陳乞舊除從官便不磨勘今亦不然如磨勘大約用三載考績之法一年一切了今年年日日理會官員磨勘揚呂居仁不甚惡贓汙深惡多才刻薄者此自回避黨人故有此論出來然大害名教豈不使得子孫取受如論固窮守節處甚佳揚呂舍人好言忍恥之類此意不佳揚因及劉道原不受溫公惠曰如此做得人也靈利揚説呂居仁解大學曰他諸公何故一做下便不改動一字非聖人安能如此這般非是大聖便是大愚因説呂居仁作汪民表墓志不好曰作龜山底尤不好故文定全不用盡做過了振呂居仁家往往自抬舉他人家便是聖賢其家法固好然專恃此以為道理只如此卻不是如某人才見長上便須尊敬以求教見年齒才小便要教他多是如此人傑因曰此乃取其家法而欲施之於他人也人傑汪聖錫不直潘子賤直前事云無緣聽得殿上語向宜卿云吾當時之言尹和靖某事又為朱子發理會恤典子賤當時為呂居仁所賣德明張無垢説得一般道理一切險而動振張無垢氣魄汪端明全無些子氣魄無垢論語説得甚敷暢橫説豎説居之不疑永嘉前輩覺得卻到好到是近日諸人無意思陳少南某向雖不識之看他舉動煞好雖是有些疏卻無而今許多纖曲賀孫問少南雖是疏到在講筵議論實有正直氣象曰然近日許多人往往到自議論他賀孫問陳少南詩如何曰亦間有好處然疏又為之甚輕易秦檜居溫州時陳嘗為館客後入經筵因講公羊母以子貴之説為非是因論嫡妾之分是時太母還朝陳遂忤太上意安置惠州張宋卿於彼從之徽廟梓宮歸鄭后梓宮亦歸邢后太上初聘亦隨歸及邊以訃聞太母還秦檜欲以吉服迎吳才老時為禮官獨以為不可謂須先以凶服迎梓宮歸太上幾年不見太母了不爭些二三日奉安梓宮了卻以吉服迎太母歸衆禮官聚都堂皆從秦意吳獨爭之秦曰此不是公聚訟處即以吳出之先生又云公羊之説非是只有一嫡揚因論李德遠黃世永為湯進之所買云他亦是不曾見前輩前輩皆不如此湯見人時一面顏色言語皆買人之物史直翁亦然然卻較好史雖主和然亦有去交結得一人為應者然許他皆過分數了誠使彼足以抗虜此中亦何以處之其策甚非也揚史丞相好薦人極不易然卻有些籠絡人意思不佳陳丞相較渾厚無這般意思又若賢否不辨者振陳福公自在只如一無所能底村秀才梁丞相亦然振史老雖如此然嘗愛論薦引拔士人此一節可喜如陳應求方寸平正遠過龔實之然龔又卻好事每到處便收拾得些人才劉樞不好士人先亦讀書長編從頭批抹過近得書云尚要諸經史從頭為看一遍顧老病恐不能揚因論張戒定夫其初名節好後來亦以書與諸公論當時某不是全不主和議但謂和時要如何後來多有如某之料其意欲進甚鋭太上終是嫌破和議底人秦檜死亟下詔守和議不變用沈該万俟镨陳誠之輩故張戒自秦檜死後數年終不用而張自躁如此蓋是學無本原故耳張學老子之類揚張定夫居建昌享高壽有文集曰正平集自言初學孔子之道而無所得後讀老子而願學焉又喜管子其議多尚法制立朝亦可觀人傑録與先吏部厚善當時朝士皆敬之雖有素喜陵人者亦不敢慢嘗對高宗云陛下有仁宗之儉慈而乏藝祖之英略高宗以為説得好又嘗言過江以來非李伯紀趙元鎮張魏公三人也立不住先生謂若海曰令祖全節翁孝義篤至又能堅正自守當時權貴欲一見之竟不為屈至於通判公又為張趙所知持論凜然不肯阿附秦老可謂無忝於所生者前輩高風誠可敬仰為子孫者其忍不思所以奉承而世守之乎或曰今人志在趨利聞人道及此等事則多非訐訕笑先生曰某嘗謂得他當面言之猶似可又有口以為是心實非之存在胸中不知不覺做出怪事者茲尤可畏按胡泳云內翰文公之後若海鄧名世吏臨川人學甚博趙丞相以白衣起為著作郎與先吏部同局吏部甚敬畏之有考證文字甚多考證姓氏一部甚詳紹興府有印板謂左丘姓人有牌榜在賣卦左氏只是姓左先生云楚左史倚相世為史官恐其後也鄧著作後為秦檜以傳出祕書文字罪之褫官勒停揚熊叔雅名彥詩王時雍壻也金人入寇京城不守時雍盡搜取婦女於虜人人號時雍為虜人外公當秦檜時叔雅知永州魏公時安置永州秦檜之父曾為玉山知縣玉山人要為老秦立祠堂求叔雅作記叔雅質之魏公魏公令勿須作叔雅自後只是言貧這後恐不得差遣十數日後魏公知其意與之曰前日所謂祠堂記作也不妨叔雅作之大意言人問公有甚異政曰無異政只見民父子有親君臣夫婦長幼朋友之倫皆如此好了子太師得其道以治天下亦然云云立大碑於玉山揚三山黃明陟登是黃傳正之父揚録云張登福建人録云張致中父登從周録云永福姓張人其人朴實公介為甚處宰諸録云尤溪初上任凡邑人來見者都請諸録云士夫僧道百餘人但一揖揚録云坐處亦不足只立説話問諸公能打對否人皆不敢對因云天對甚其中有人云對地又問日對甚云對月陽對甚云對陰卻又問利對甚云對害乃大聲云這便不是了天下一切人都被這些子壞了才把害對利便事事上只見得利害更不問義理録云人只知以利對害便只管尋利去須知道利乃對義才明得義利便自無乖爭之事自後只要如此分別不要更到訟庭後來在任果有政聲此事須近於迂闊然卻甚好今不可多見矣時舉録云一揖而退此亦可書其桃符云奉勸邑人依本分莫將間事到公庭言雖質意亦好揚録云其人為政簡易無係纍後坐化死李椿年行經界先從他家田上量起今之輔弼能有此心否人傑王龜齡學也粗疏只是他天資高意思誠愨表裏如一所至州郡上下皆風動而今難得此等人賀孫王詹事守泉初到任會七邑宰勸酒歷告之以愛民之意出一絶云九重天子愛民深令尹宜懷惻怛心今日黃堂一杯酒使君端為庶民斟七邑宰皆為之感動其為政甚嚴而能以至誠感動人心故吏民無不畏愛去之日父老兒童攀轅者不計其數公亦為之垂淚至今泉人猶懷之如父母時舉汪端明學亦平正然疏文亦平正不好小蹊曲徑福建政事鎮靜與福亦相宜蜀政不及見事亦快揚汪端明少從學於焦先生汪既達時從杲老問禪憐焦之老欲進之以禪因勸焦登徑山見杲杲舉寂然不動感而遂通焦曰和尚不可破句讀書不契而歸亦奇士也焦名援字公路南京人清修苦節之士閎祖汪聖錫日以親師取友多識前言往行為事故其晚年德成行尊為世名卿若海汪季路甚子細但為人性太寬理會事不能得了賀孫祝懷汝昭嘗論張説一日祝有一婢溺死衢守施元之謂張曰祝婢乃其父婢祝汙之恐事泄抑令其死張遂言之於上上曰此事大若有之行遣不得草草若無不須以此陷人遂陰遣一兵士之類來衢探其事往來月餘日得其實矣一日乃投都監曰奉聖旨來探祝編修家公事遂叫集鄰里作保明狀去事方已兵士小人乃能如此揚主上一日嘉鄭自明直言遂問近臣曰昔時有一魏掞之好直言今何在左右以死對問有子弟否無人為敷陳遂贈直祕閣宣教郎揚這道理易晦而難明某少年過莆田見林謙之方次榮説一種道理説得精神極好聽為之踊躍鼓動退而思之忘寢與食者數時好之念念而不忘及至後來再過則二公已死更無一人能繼其學者也無一箇會説了僩論林艾軒作文解經曰林成季井伯為艾軒作墓銘諱艾軒著書但云幸學講中庸九經及某篇是艾軒所著此是有形諱不得底嘗見九經口義先説一段冒子全與所講不干涉其説是言巍巍乎惟天為大唯堯則之巍巍乎舜禹之有天下而不與焉人看時都理會不得某卻曾見他口説來乃是説道巍巍乎者世上有恁地大底事惟天有之惟堯則之下面又説箇巍巍乎者言此大事只是天與堯有之舜禹都不與此蓋是取奉光堯不知卻推倒舜禹又云在興化南寺見艾軒言曾點言志一段歸自釋音作饋字此是物各付物之意某云如何見得艾軒云曾點不是要與冠者童子真箇去浴沂風雩只是見那人有冠者有童子也有在那裏澡浴底也有在那裏乘敘底也有在那裏饋餉饁南畝底曾點見得這意思此謂物各付物艾軒甚祕其説密言於先生也德輔王説習之性直好人與林艾軒輩行上即位即召見論不可講和上一日謂宰臣曰前日上殿有箇生得貌寢是言此忘了甚底官人議論亦好遂除官龔實之笑王習之以不講和奉上意先生謂習之直不是奉上龔實之多讀書知前輩大體頗識義理又有才做得去亦有文小官時甚好為正言時攻曾龍後來心術一偏至於如此可惜可惜反不如陳應求全不如他卻較好揚因給舍繳駁事而大臣無所可否云昔梁叔子將為執政時曾語劉樞云某若當地頭有文字從中出不當如何如何也須説教住了始得後梁已大用而文字自中出者初不聞有甚執奏劉樞深怪其事後見錢某因事説及丞相煞有力中出文字日日有之丞相每每袖回了而後已自今觀之又不見此賀孫某人初登宰輔奏逐薑特立忽有旨召薑乞出甚力在六和塔待命有旨免宣押某人初過樞天下屬望首有召薑之命經由樞密曾無奏止坐視丞相以近習故去國其意只以入樞未久恐説不行而去為人所笑故放過此一著是甚小事直卿云人日日常將理義夾持箇身心庶幾遇事住不得若是平常底人也是難得不變如其人固謂世人屬望但此事亦須不要官爵方做得曰固是若是不要官爵這一項事如何放得過每看史策到這般地頭為之汗栗一箇身己便頓在兵刃之間然漢唐時爭議而死愈死愈爭其爭愈力本朝用刑至寬而人多畏懦到合説處反畏似虎至道因問武后事狄梁公雖復正中宗然大義終不明做得似鶻突曰當此時世只做得到恁地狄梁公終死於周然薦得張柬之迄能反正又問呂后事勢倒做得只如此然武后卻可畏曰呂后只是一箇村婦人因戚姬遂迤邐做到後來許多不好武后乃是武功臣之女合下便有無君之心自為昭儀便鴆殺其子以傾王后中宗無罪而廢之則武后之罪已定只可便以此廢之拘於子無廢母之義不得呂后與高祖同起行伍識兵略故布置諸呂與諸軍平勃之成功也適直呂后病困故做得許多腳手平勃亦幸而成功胡文定謂武后之罪當告於宗廟社稷而誅之又云中宗決不敢為黜母之事然而并中宗廢之又不得當時人心惟是見武后以非罪廢天子故疾之深惟是見中宗以無罪被廢故願復之切若并中宗廢之又未知有何收拾人心這般處極難賀孫耿京起義兵為天平軍節度使有張安國者亦起兵與京為兩軍辛幼安時在京幕下為記室方銜命來此致歸朝之義則京已為安國所殺幼安後歸挾安國馬上還朝以正典刑儒用辛幼安亦是箇人才豈有使不得之理但明賞罰則彼自服矣今日所以用之者彼之所短更不問之視其過當為害者皆不之恤及至廢置又不敢收拾而用之人傑問陳亮可用否曰朝廷賞罰明此等人皆可用如辛幼安亦是一帥材但方其縱恣時更無一人敢道它略不警策之及至如今一坐坐了又更不問著便如終廢此人作帥亦有勝它人處但當明賞罰以用之耳近世如汪端明專理會民如辛幼安卻是專理會兵不管民他這理會兵時下便要驅以塞海其勢可畏植辛幼安為閩憲問政答曰臨民以寬待士以禮馭士以嚴恭甫再為潭帥律己愈謹御吏愈嚴某謂如此方是道夫劉樞帥建康所得月千娘劉欲止受正所當得者以恐壞後來例不敢但受之後卻送其不當得者於公使庫後韓元龍來作漕盡不受其所不當得者劉甚稱服之平父云振劉恭父創第規模宏麗先生勸止之曰胸奴未滅何以家為忠肅意不樂也道夫劉寶學初娶熊氏生樞密生次子方落地問是男即命與其弟直閣為子熊不樂都不問竟以是而沒後樞密娶呂氏入門未幾即命呂一切儀物盡與直閣女為嫁具呂即送與之平父云振某曾訪謝昌國問艮齋安在謝指廳事云即此便是其廳亦敝陋玄鄭金安節為人好振戴肖望云洪景盧楊廷秀爭配享俱出可謂無黨曰不然要無黨須是分別得君子小人分明某嘗謂凡事都分做兩邊是底放一邊非底放一邊是底是天理非底是人欲是即守而勿失非即去而勿留此治一身之法也治一家則分別一家之是非治一邑則分別一邑之邪正推而一州一路以至天下莫不皆然此直上直下之道若其不分黑白不辨是非而猥曰無黨是大亂之道戴曰信而後諫意欲委曲以濟事曰是枉尺直尋而可為也閎祖孫逢吉從之煞好初除便上一文字盡將今所諱忌如正心誠意許多説話一齊盡説出看來這是合著説底話只如今人那箇口道是是那箇不多方去回避賀孫天下事須論一箇是不是後卻又論其中節與不中節余右失於許然使其言見聽不無所補李琪則所謂不在其位不謀其政要知卻亦有以救其失也如二子卻所謂是中之不中節者道夫耿直之作浙漕時有一榜在客位甚好説用考課之法應州縣官不許用援有績可考自發薦章如考課在上而挾貴援者即降次等今在鎮江亦然否曰僻在山林不知其詳但聞私謁不行曰向來耿守有一書説用之則行舍之則藏從周曰此義當如何説曰也只是前來説若如耿説卻是聖人學得些骨董要把來使全不自心中流出從周曰伊尹耕於有莘之野而樂堯舜之道濂溪曰志伊尹之所志學顏子之所學伊尹恥其君至若撻於市學者若橫此心在胸中卻是志於行莫不可曰非是私修身養性與致君澤民只是一理從周吳公路作南劍天柱灘記曰事無大小為之必成害無大小除之必去此見其志方王宣子説甘抃言士大夫以面折廷爭為職以此而出人皆高之宦官以承順為事忽犯顏而出誰將你當事而黃彥節是也其見如此之乖後漢呂強後世無不賢之揚近年有洪邦直為宰以贓被訟求救於伯圭伯圭薦之甘抃甘抃薦之上召見賜錢以為此人甚廉而賢除監察御史振先生聞黃文叔之死頗傷之云觀其文字議論是一箇白直響快底人想是懊悶死了言不行諫不聽要去又不得去也是悶人因言蜀中今年煞死了係名色人如胡子遠吳挺都是有氣骨底吳是得力邊將賀孫近世士大夫憂國忘家每言及國家輒感憤慷慨者惟於趙子直黃文叔見之耳僩趙子直奉命將入蜀請於先生曰某將入蜀蜀中亦無事可理會意欲請於朝得沿淮差遣庶可理會屯田曰出於朝廷之意猶恐不得終其事若自請以行則下梢或有小事請乞不行便難出手如舉薦小吏而不從其薦或按劾小吏而不從其劾或求錢米以補闕之而不從其所求這如何做賀孫趙子直政事都瑣碎看見都悶人曾向擇之云朱丈想得不喜某政事可知是不喜賀孫或言趙子直多疑先生曰諸公且言人因甚多疑魯可幾曰只是見不破爾道夫趙子直要分門編奏議先生曰只是逐人編好因論舊編精義逐人編自始終有意今一齊節去更拆散了不見其全意矣趙子直亦可謂忠臣然以宗社之大計言之亦有未是處不知何以見先帝人傑一日獨侍坐先生忽顰蹙云趙丞相謫命似出胡紘問胡紘不知曾識他否曰舊亦識之此人頗記得文字莆陽之政亦好但見朋友多説其很愎某曰丞相前日之事做得都是否曰也有些不是處問所以不是處曰公他日當自見之先生又曰一時正人皆已出去今全無一好人在朝某曰鄭溥之當時草趙丞相罷相詞固好以某觀之當時不做便乞出尤為奇特曰也不必如此但是後來既遷之後便出亦自好它卻不合不肯出所以可疑若説教他不做便出亦無此典故某曰且如富鄭公繳遂國夫人之封以前亦何曾有此自富公既做後遂為例先生微笑而不答某又問丞相秉軸首召先生入經筵命下士子相慶以為太平可致忽然一日報罷莫不惶惑竊議者云先生請早晚入講筵人主將不能堪便知先生不能久在君側曰早晚入講筵非某之請是自來如此然某當時便教久在講筵恐亦無益一日雖是兩番入講筵文字分明一一解注亦只講過而已看來亦只是文具枅或曰今世士大夫不詭隨者亦有五六人曰此輩在向時本是闒茸人不比數底但今則上面一項真箇好人盡屏除了故這一輩稍稍能不變便稱好人其實班固九品之中方是中下品人若中中以上不復有矣先生因問某人如何或曰也靠不得曰然見他寫書來皆不可曉頃在某處得書來説學問又如何資質又如何讀書不長進又如何某答之云不須如何説話不濟事若資質弱便放教剛若過剛便放教稍柔些若懶便放教勤讀論語便徹頭徹尾理會論語讀孟子便徹頭徹尾理會孟子其他書皆然此等事本不用問人問人只是杭唐日子不濟事只須低著頭去做若做底自是不消問人這番又得他書亦不可曉或曰終是他於利欲之場打不透欲過這邊卻捨彼不得欲倒向那邊又畏朋友之議又緣頃被某人抬獎得太過正如箇船閣在沙岸上要上又不得要下又推不動曰然無一番大水來泛將去這船終不動要之只是心不勇之故某嘗歎息天下有些英雄人都被釋氏引將去甚害事且如昔日老南和尚他後生行腳時已有六七十人隨著他參請於天下叢林尊宿無不遍謁無有可其意者只聞石霜楚圓之名不曾得去遂特地去訪他及到石霜頗聞其有不可人意處南大不樂徘徊山下數日不肯去見後來又思量既到此須一見而決如是又數日不得已隨衆入室揭簾欲入又舍不得拜他如是者三遂奮然曰為人有疑不決終非丈夫遂揭簾徑入才交談便被石霜降下他這般人立志勇決如此觀其三四揭簾而不肯入他定不肯詭隨人也廣録云世上有一種人心下自不分明只是怕人道不會不肯問人昔老南去參慈明時已有人隨他了它欲入慈明室數次欲揭簾入去又休末後乃云有疑不決終非大丈夫遂入其室某嘗説怪不得今日士大夫是他心裏無可作做無可思量飽食終日無所用心自然是只隨利欲走間有務記誦為詞章者又不足以救其本心之陷溺所以箇箇如此只緣無所用心故如此前輩多有得於佛學當利害禍福之際而不變者蓋佛氏勇猛精進清淨堅固之説猶足以使人淡泊有守不為外物所移也若記覽詞章之學這般伎倆如何救拔得他那利欲底窠窟動或曰某人讀書只是摘奇巧為文章以求富貴耳曰恁地工夫也只做得那不好底文章定無氣魄所以他文字皆困苦某小年見上一輩未説如何箇箇有氣魄敢擔當做事而今人箇箇都恁地衰無氣魄也是氣運使然而今秀才便有些氣魄少年被做那時文都銷磨盡了所以都無精采做事不成僩彪居正德美記得無限史記只是不肯説只要説一般無巴鼻底道理在南嶽説溫故而知新不是今人所説之故新故者性也新者心也溫性而知心故可以為人師其説道理如此然口嘵嘵不肯已璘
