body:
  text: 朱子語類卷第一百一十朱子七論兵今州郡無兵無權先王之制內有六鄉六遂都鄙之兵外有方伯連帥之兵內外相維緩急相制賀孫本強則精神折衝不強則招殃致凶僩或言古人之兵當如子弟之衛父兄而孫吳之徒必曰與士卒同甘苦而後可是子弟必待父兄施恩而後報也先生曰巡而拊之三軍之士皆如挾纊此意也少不得賀孫木之同凡為守帥者止教閲將兵足矣程其年力汰斥癃老衰弱招補壯健足可為用何必更添寨置軍其間衣糧或厚或薄遂致偏廢如此間將兵則皆差出接送矣方子辛棄疾頗諳曉兵事云兵老弱不汰可慮向在湖南收茶寇令統領揀人要一可當十者押得來便看不得盡是老弱問何故如此云只揀得如此間有稍壯者諸處借事去州郡兵既弱皆以大軍可恃又如此為今之計大段著揀汰但所汰者又未有頓處某向見張魏公説以分兵殺虜之勢只緣虜人調發極難元顏要犯江南整整兩年方調發得聚彼中雖是號令簡無此間許多周遮但彼中人才逼迫得太急亦易變所以要調發甚難只有沿淮有許多捍禦之兵為吾之計莫若分幾軍趨關陝他必擁兵於關陝又分幾軍向西京他必擁兵於西京又分幾軍望淮北他必擁兵於淮北其他去處必空弱又使海道兵搗海上他又著擁兵捍海上吾密揀精鋭幾萬在此度其勢力既分於是乘其稍弱處一直收山東虜人首尾相應不及再調發來添助彼卒未聚而吾已據山東才據山東中原及燕京自不消得大段用力蓋精鋭萃於山東而虜勢已截成兩段去又先下明詔使中原豪傑自為響應是時魏公答以某只受一方之命此事恐不能主之蔡云今兵政如此終當如何曰須有道理蔡曰莫著改更法制曰這如何得如同父云將今法制重新洗換一番方好某看來若便使改換得井牧其田民皆為兵若無人統率之其為亂道一也然則如之何曰只就這腔裏自有道理這極易只呼吸之間便可以弱為強變怯為勇振柔為剛易敗為勝直如反掌耳賀孫先生云當今要復太祖兵法方可復中原又云諸州禁軍皆不可用幾年説要揀冗兵但只説得各圖苟且安便無有為者故新者來舊者又不去來而又來相將積得皆不可用如澄冗官見這人不可用便除一人而今不可用者又復留而不去故軍冗不練官冗不澄壽昌問今日之軍政只有君相上下一心揀之又揀如太祖時方好曰只有揀練便用太祖時即用如揀而養十數年又老了依舊無用揚今兵官愈多兵愈不精道夫今日兵不濟事兵官不得人專務刻削兵且驕弱安養不知勞苦一旦如何用某嘗言宜散京師之兵卻練諸郡之兵依太祖法每年更戍趲去淮上衛邊謂如福建之兵趲去饒州饒州之兵趲去衢信衢信趲去行在迤邐趲去淮上今年如此明年又趲去則京師全無養兵之費豈不大好辨言今兵政之弊曰唐制節度兵觀察財處置等使即節鎮也使持節某州諸軍事兵某州刺史民即支郡也支郡隸於節鎮而節鎮支郡各有衙前左右押衙管軍都頭並掌兵事又皆是士人為之其久則根勢深固反視節度有客主之勢至有誅逐其上而更代為之凡陸梁跋扈之事因茲而有惟是節度得人方能率服人心歸命朝廷若論唐初兵力最盛斥地最廣乃在於統兵者簡約而無牽制之患然自唐末大抵節鎮之患深如人之病外強中乾其勢必有以通其變而後可故太祖皇帝知其病而疏理之於是削其支郡以斷其臂指之勢當時至有某州某縣直隸京師而不屬節度者置通判以奪其政命都監監押以奪其兵立倉場庫務之官以奪其財向之所患今皆無憂矣其後又有路分鈐轄總管等員神宗時又增置三十七將亂離之後又有都統統領統制之名大抵今日之患又卻在於主兵之員多朝廷雖知其無用姑存其名日費國家之財不可勝計又刻剝士卒使士卒困怨於下若更不變而通之則其害未艾也要之此事但可責之郡守他分明謂之郡將若使之練習士卒修治器甲築固城壘以為一方之守豈不隱然有備而可畏古人謂生之者衆食之者寡為之者疾用之者舒今一切反之道夫問後世雖養長征兵然有緩急依舊徵發於民終是離民兵不得兼長征兵終不足靠如杜子美石壕吏詩可見曰自秦漢以下至六國皆未有長征兵都是徵發於民及唐府衛法壞然後方有長征兵因論荊襄義勇州縣官吏反擾之當時朝廷免徵科官吏不得役使今徵科既不得免民反倍有所費又官吏役使如故曰某當初見劉共父説他制得義勇極好且是不屬官吏官不得擾之某應之曰無緣有不屬州縣之理固疑其末流如此僩兵甲詭名不可免善兵者亦不於此理會才有一人可用便令其兼數人之料軍中若無此便不足以使人故朝廷只是擇將以其全數錢米與之只責其成功不來此屑屑計較近來刮刷得都盡朝廷方以為核實得好先生云聞前輩云云揚兵法以能分合為變不獨一陳之間有分合天下之兵皆然今日之兵分者便不可合合者便不可分本朝舊來只郡國禁兵而已但在西北者差精鋭耳渡江後又添上御前軍卻是張韓輩自起此項兵後來既不可得而去只得如此聚屯今以不如祖宗時財賦養祖宗時所無之兵安得不窮也唐時州縣上供少故州縣富兵在藩鎮朝廷無甚養兵之費自本朝罷了藩鎮州郡之財已多歸於上熙豐間又令州郡見看軍額幾人折了者不得補卻以其費樁管上供而朝廷得錢物甚多今天下兵約四五十萬又皆羸弱無用之人所費不可計今若要理會須從此起揚論財賦曰財用不足皆起於養兵十分八分是養兵其他用度止在二分之中古者刻剝之法本朝皆備所以有靖康之亂已前未有徐揚江鄂之兵止謂張宣撫兵某人兵今增添許多兵合當精練禁兵汰其老弱以為廂兵節今朝廷盡力養兵而兵常有不足之患自兵農既分之後計其所費卻是無日不用兵也時舉今天下財用費於養兵者十之八九一百萬貫養一萬人此以一歲計僩今日民困正緣沿江屯兵費重只有屯田可減民力見説襄漢間儘有荒地某云當用甚人耕墾曰兵民兼用各自為屯彼地沃衍收穀必多若做得成敵人亦不敢窺伺兵民得利既多且耕且戰便是金城湯池兵食既足可省漕運民力自蘇然後盡驅州郡所養歸明北軍往彼就食則州郡自寬遲之十年其效必著須是擇帥既得其人專一委任許令辟召寮屬同心措置勿數更易庶幾有濟浩屯田范伯達有文字説淮上屯田須與畫成一井中為公田以給軍令軍人子弟分耕取公田所入以給軍德明因言淮上屯田前此朝廷嘗差官理會其人到彼都不曾敢起人所與者都只令人築起沿江間地以為屯此亦太不立大抵世事須是出來擔當不可如此放倒人是天地中最靈之物天能覆而不能載地能載而不能覆恁地大事聖人猶能裁成輔相之況於其他因舉齊景公答夫子君君臣臣之語又與晏子言美哉室之語皆放倒説話且如五代時兵驕甚矣周世宗高平一戰既敗卻忽然誅不用命者七十餘人三軍大振遂復合戰而克之凡事都要人有志壯祖屯田須是分而屯之統帥屯某州總司屯甚州漕司屯甚州以戶部尚書為屯田使使各考其所屯之多少以為殿最則無不可行者今則不然每欲行一文字則經由數司僉押相牽制事何由成道夫趙昌父相見因論兵事先生曰兵以用而見其強弱將以用而見其能否且如本朝諸公遊陝西者多知邊事此亦是用兵之故今日諸生坐於屋下何以知其能縱有韓白復生亦何由辨之可學擇將帥問選擇將帥之術曰當無事之時欲識得將須是具大眼力如蕭何識韓信方得不然邊警之時兩兵相抗恁時人才自急且如國家中興張韓劉嶽突然而出豈平時諸公所嘗識者不過事期到此廝拶出來耳道夫不令宦官賣統軍官職是今日軍政第一義方今日將官全無意思只似人家驕子弟了褒衣博帶談道理説詩書寫好字事發遣如此何益於事謙今諸道帥臣只曾作一二任監司即以除之有警則又欲其親督戰士此最不便萬一為賊所虜為之奈何彼固不足恤然失一帥其勢豈不張大前輩謂祖宗用帥取以二路一是曾歷邊郡一是帥臣子弟曾諳兵事者此最有理或謂戎幕宜用文武三四員此意亦好蓋經歷知得此等利害向後皆可為帥然必須精選而任不可泛濫也道夫或問諸公論置二大帥以統諸路之帥如何曰不消如此只是擇得一箇人了君相便專意委任他卻使之自擇參佐事便歸一今若更置大帥以監臨之少間必有不相下之意徒然紛擾須是得一箇人委任他聽他自漸漸理會許多軍政將來自有條理恪蜀遠朝廷萬有餘里擇帥須用嚴毅素有威名足以畏壓人心則喜亂之徒不敢作矣道夫或問古今治亂者先生言古今禍亂必有病根漢宦官后戚唐藩鎮皆病根也今之病根在歸正人忽然放教他來州縣如何奈得他何所幸老者已死少者無彼中人氣象似此間人一般無能為矣謙邊防馬政甚弊廬州舊夾肥水而城今只築就一邊揚論刑天下事最大而不可輕者無過於兵刑臨陳時是胡亂錯殺了幾人所以老子云夫佳兵者不祥之器聖人不得已而用之獄訟面前分曉事易看其情偽難通或旁無佐證各執兩説繫人性命處須喫緊思量猶恐有誤也僩論刑云今人説輕刑者只是所犯之人為可憫而不知被傷之人尤可念也如劫盜殺人者人多為之求生殊不念死者之為無辜是知為盜賊計而不為良民地也若如酒稅偽會子及飢荒竊盜之類猶可以情原其輕重大小而處之時舉今之法家惑於罪福報應之説多喜出人罪以來福報夫使無罪者不得直而有罪者得幸免是乃所以為惡爾何福報之有書曰欽哉欽哉惟刑之恤哉所謂欽恤者欲其詳審曲直令有罪者不得免而無罪者不得濫刑也今之法官惑於欽恤之説以為當寬人之罪而出其死故凡罪之當殺者必多為可出之塗以俟奏裁則率多減等當斬者配當配者徒當徒者杖當杖者笞是乃賣弄條貫舞法而受賕者耳何欽恤之有罪之疑者從輕功之疑者從重所謂疑者非法令之所能決則罪從輕而功從重惟此一條為然耳非謂凡罪皆可以從輕而凡功皆可以從重也今之律令亦有此條謂法所不能決者則俟奏裁今乃明知其罪之當死亦莫不為可生之塗以上之惟壽皇不然其情理重者皆殺之僩李公晦問恕字前輩多作愛人意思説如何曰畢竟愛人意思多因云人命至重官司何故斬之於市蓋為此人曾殺那人不斬他則那人之冤無以伸這愛心便歸在被殺者一邊了然古人罪疑惟輕與其殺不辜寧失不經雖愛心只在被殺者一邊卻又溢出這一邊些子佐
