body:
  text: 朱子語類卷第七十六易十二繫辭下問八卦成列只是説乾兌離震巽坎艮坤先生解云之類如何曰所謂成列者不止只論此橫圖若乾南坤北又是一列所以云之類學履問八卦成列象在其中矣象只是乾兌離震之象未説到天地雷風處否曰是然八卦是一項看象在其中又是逐箇看又問成列是自一奇一耦畫到三畫處其中逐一分便有乾兌離震之象否曰是學履問剛柔相推變在其中矣繫辭焉而命之動在其中矣變字是總卦爻之有往來交錯者言動字是專指占者所值當動底爻象而言否曰變是就剛柔交錯而成卦爻上言動是專主當占之爻言如二爻變則占者以上爻為主這上爻便是動處如五爻變一爻不變則占者以不變之爻為主則這不變者便是動處也學履剛柔者立本者也變通者趨時者也此兩句亦相對説剛柔者陰陽之質是移易不得之定體故謂之本若剛變為柔柔變為剛便是變通之用剛柔者立本者也變通者趨時者也便與變化者進退之象也剛柔者晝夜之象也是一樣剛柔兩箇是本變通只是其往來者學履吉凶者貞勝者也這一句最好看這箇物事常在這裏相勝一箇吉便有一箇凶在後面來這兩箇物事不是一定住在這裏底物各以其所正為常正是説他當然之理蓋言其本相如此與利貞之貞一般所以説利貞者性情也橫渠説得別他説道貞便能勝得他如此則下文三箇貞字説不通這箇只是説吉凶相勝天地間一陰一陽如環無端便是相勝底道理陰符經説天地之道浸故陰陽勝浸字最下得妙天地間不陡頓恁地陰陽勝又説那五箇物事在這裏相生相剋曰五賊在心施行於天用不好心去看他便都是賊了五賊乃言五性之德施行於天言五行之氣陳子昂感遇詩亦略見得這般意思大概説相勝是説他常底他以本相為常淵問吉凶者貞勝者也貞字便是性之骨曰貞是常恁地便是他本相如此猶言附子者貞熱者也龍腦者貞寒者也天下只有箇吉凶常相往來陰符云自然之道靜故萬物生天地之道浸故陰陽勝極説得妙靜能生動浸是漸漸恁地消去又漸漸恁地長天地之道便是常恁地示人陰符經云天地萬物之道浸故陰陽勝陰陽相推而變化順矣學蒙貞常也陰陽常只是相勝如子以前便是夜勝晝子以後便是晝勝夜觀是示人不窮貞夫一者也天下常只是有一箇道理又曰須是看教字義分明方看得下落説也只説得到偏傍近處貞便是他體處常常如此所以説利貞者性情也礪貞只是常吉凶常相勝不是吉勝凶便是凶勝吉二者常相勝故曰貞勝天地之道則常示日月之道則常明天下之動貞夫一者也天下之動雖不齊常有一箇是底故曰貞夫一陰符經云自然之道靜故天地萬物生天地之道浸故剛柔勝若不是極靜則天地萬物不生浸者漸也天地之道漸漸消長故剛柔勝此便是吉凶貞勝之理這必是一箇識道理人説其他多不可曉似此等處特然好文蔚問吉凶貞勝一段橫渠説何如曰説真勝處巧矣卻恐不如此只伊川説作常字甚佳易傳解此字多云正固固乃常也但不曾發出貞勝之理蓋吉凶二義無兩立之理迭相為勝非吉勝凶則凶勝吉矣故吉凶常相勝人傑録云理自如此所以訓貞字作常者貞是正固只一正字盡貞字義不得故又著一固字謂此雖是正又須常固守之然後為貞在五常屬智孟子所謂知之實知斯二者弗去是也正是知之固是守之徒知之而不能守之則不可須是知之又固守之蓋貞屬冬大抵北方必有兩件事皆如此莫非自然言之可笑如朱雀青龍白虎只一物至玄武便龜蛇二物謂如冬至前四十五日屬今年後四十五日便屬明年夜分子時前四刻屬今日後四刻即屬來日耳人傑録略問張子貞勝之説曰此雖非經意然其説自好便只行得他底説有甚不可大凡看人解經雖一時有與經意稍遠然其説底自是一説自有用處不可廢也不特後人古來已如此如元亨利貞文王重卦只是大亨利於守正而已到夫子卻自解分作四德看文王卦辭當看文王意思到孔子文言當看孔子意思豈可以一説為是一説為非問爻者效此者也曰爻是兩箇交叉看來只是交變之義卦分明是將一片木畫挂於壁上所以為卦問爻也者效此者也是效乾坤之變化而分六爻象也者像此者也是象乾坤之虛實而為奇耦曰像此效此此便是乾坤象只是像其奇耦學蒙先生問如何是爻象動乎內吉凶見乎外或曰陰陽老少在分蓍揲卦之時而吉凶乃見於成卦之後曰也是如此然內外字猶言先後微顯學履功業見乎變是就那動底爻見得這功業字似吉凶生大業之業猶言事變庶事相似學履聖人之情見乎辭下連接説天地大德曰生此不是相連乃各自説去聖人之大寶曰位後世只為這兩箇不相對有位底無德有德底無位有位則事事做得淵守位曰仁釋文仁作人伯恭尚欲擔當此以為當從釋文淵問人君臨天下大小大事只言理財正辭如何曰是因上文而言聚得許多人無財何以養之有財不能理又不得正辭便只是分別是非又曰教化便在正辭裏面學履理財正辭禁非是三事大概是辨別是非理財言你底還你我底還我正辭言是底説是不是底説不是猶所謂正名淵右第一章仰則觀象於天一段只是陰陽奇耦閎祖觀鳥獸之文與地之宜近取身遠取物仰觀天俯察地只是一箇陰陽聖人看這許多般事物都不出陰陽兩字便是河圖洛書也則是陰陽粗説時即是奇耦聖人卻看見這箇上面都有那陰陽底道理故説道讀易不可恁逼拶他歐公只是執定那仰觀俯察之説便與河圖相礙遂至不信他淵伏羲觀鳥獸之文與地之宜那時未有文字只是仰觀俯察而已想得聖人心細雖以鳥獸羽毛之微也盡察得有陰陽今人心粗如何察得或曰伊川見兔曰察此亦可以畫卦便是此義曰就這一端上亦可以見凡草木禽獸無不有陰陽鯉魚脊上有三十六鱗陰數龍脊上有八十一鱗陽數龍不曾見鯉魚必有之又龜背上文中間一簇成五段文兩邊各插四段共成八段子八段之外兩邊周圍共有二十四段中間五段者五行也兩邊插八段者八卦也周圍二十四段者二十四氣也箇箇如此又如草木之有雌雄銀杏桐楮牝牡麻竹之類皆然又樹木向陽處則堅實其背陰處必虛軟男生必伏女生必偃其死於水也亦然蓋男陽氣在背女陽氣在腹也揚子雲太玄云觀龍虎之文與龜鳥之象謂二十八宿也僩以通神明之德以類萬物之情盡於八卦而震巽坎離艮兌又總於乾坤曰動曰陷曰止皆健底意思曰入曰麗曰悅皆順底意思聖人下此八字極狀得八卦性情盡蓋取諸益等蓋字乃模樣是恁地淳可學録云蓋字有義黃帝堯舜氏作到這時候合當如此變易窮則變道理亦如此垂衣裳而天下治是大變他以前底事了十三卦是大概説則這箇幾卦也是難曉淵使民不倦須是得一箇人通其變若聽其自變如何得賀孫上古結繩而治後世聖人易之以書契天下事有古未之為而後人為之因不可無者此類是也如年號一事古所未有後來既置便不可廢胡文定卻以後世建年號為非以為年號之美有時而窮不若只作元年二年此殊不然三代以前事迹多有不可考者正緣無年號所以事無統紀難記如云某年王某月箇箇相似無理會處及漢既建年號於是事乃各有紀屬而可記今有年號猶自姦偽百出若只寫一年二年三年則官司詞訟簿曆憑何而決少間都無理會處嘗見前輩説有兩家爭田地甲家買在元祐幾年乙家買在前甲家遂將元字改擦作嘉字乙家則將出文字又在嘉祐之先甲家遂又將嘉祐字塗擦作皇祐有年號了猶自被人如此無後如何僩結繩今溪洞諸蠻猶有此俗又有刻板者凡年月日時以至人馬糧草之數皆刻板為記都不相亂僩右第二章林安卿問易者象也象也者像也四句莫只是解箇象字否曰象是解易字像又是解象字材又是解象字末句意亦然義剛易也者象也象也者像也只是髣佛説不可求得太深程先生只是見得道理多後卻須將來寄搭在上面説淵易者象也是總説起言易不過只是陰陽之象下云像也材也天下之動也則皆是説那上面象字學履右第三章二君一民試教一箇民有兩箇君看是甚模樣淵右第四章天下何思何慮一句便是先打破那箇思字卻説同歸殊塗一致百慮又再説天下何思何慮謂何用如此憧憧往來而為此朋從之思也日月寒暑之往來尺蠖龍蛇之屈伸皆是自然底道理不往則不來不屈則亦不能伸也今之為學亦只是如此精義入神用力於內乃所以致用乎外利用安身求利於外乃所以崇德乎內只是如此做將去雖至於窮神知化地位亦只是德盛仁熟之所致何思何慮之有謨問天下同歸殊塗一致百慮何不云殊塗而同歸百慮而一致曰也只一般但他是從上説下自合如此學蒙乾乾不息者體日往月來寒來暑往者用有體則有用有用則有體不可分先後説僩天下何思何慮一段此是言自然而然如精義入神自然致用利用安身自然崇德節問天下同歸而殊塗一章言萬變雖不同然皆是一理之中所自有底不用安排曰此只説得一頭尺蠖若不屈則不信得身龍蛇若不蟄則不伏得氣如何存得身精義入神疑與行處不相關然而見得道理通徹乃所以致用利用安身亦疑與崇德不相關然而動作得其理則德自崇天下萬事萬變無不有感通往來之理又曰日往則月來一段乃承上文憧憧往來而言往來皆人所不能無者但憧憧則不可學蒙尺蠖之屈以求信龍蛇之蟄以藏身精義入神以致用利用安身以崇德大凡這箇都是一屈一信一消一息一往一來一闔一闢大底有大底闔闢消息小底有小底闔闢消息皆只是這道理砥或問尺蠖之屈以求信也伊川説是感應如何曰屈一屈便感得那信底信又感得那屈底如呼吸出入往來皆是尺蠖屈便要求伸龍蛇蟄便要存身精研義理無毫釐絲忽之差入那神妙處這便是要出來致用外面用得利而身安乃所以入來自崇己德致用之用即是利用之用所以橫渠云精義入神事豫吾內求利吾外利用安身素利吾外致養吾內事豫吾內言曾到這裏面來淵至録略且如精義入神如何不思那致用底卻不必思致用底是事功是效驗淵入神是到那微妙人不知得處一事一理上淵利用安身今人循理則自然安利不循理則自然不安利升卿未之或知是到這裏不可奈何窮神知化雖不從這裏面出來然也有這箇意思淵窮神知化德之盛也這德字只是上面崇德之德德盛後便能窮神知化便如聰明睿知皆由此出自誠而明相似淵窮神知化化是逐些子挨將去底一日復一日一月復一月節節挨將去便成一年這是化神是一箇物事或在彼或在此當在陰時全體在陰在陽時全體在陽都只是這一物兩處都在不可測故謂之神橫渠云一故神兩故化又注云兩在故不測這説得甚分曉淵問非所困而困焉名必辱大意謂石不能動底物學蒙録作挨動不得底物事自是不須去動他若只管去用力徒自困耳學蒙録云且以事言有著力不得處若只管著力去做少間做不成他人卻道自家無能便是辱了或曰若在其位則只得做曰自是如此曰爻意謂不可做底便不可入頭去做學履學蒙録詳公用射隼孔子是發出言外意學蒙問危者以其位為可安而不知戒懼故危亡者以其存為可常保是以亡亂者是自有其治如有其善之有是以亂曰某舊也如此説看來保字説得較牽強只是常有危亡與亂之意則可以安其位保其存有其治易曰知幾其神乎便是這事難如邦有道危言危行邦無道危行言孫今有一樣人其不畏者又言過於直其畏謹者又縮做一團更不敢説一句話此便是不曉得那幾若知幾則自中節無此病矣君子上交不諂下交不瀆蓋上交貴於恭恭則便近於諂下交貴和易和則便近於瀆蓋恭與諂相近和與瀆相近只爭些子便至於流也僩君子上交不諂下交不瀆下面説幾最要看箇幾字只爭些子凡事未至而空説道理易見事已至而顯然道理也易見惟事之方萌而動之微處此最難見或問幾者動之微何以獨於上交下交言之曰上交要恭遜才恭遜便不知不覺有箇諂底意思在裏下交不瀆亦是如此所謂幾者只才覺得近諂近瀆便勿令如此此便是知幾幾者動之微吉之先見者也漢書引此句吉下有凶字當有凶字僩蓋人之情上交必諂下交必瀆所爭只是些子能於此而察之非知幾者莫能上交著些取奉之心下交便有傲慢之心皆是也幾者動之微是欲動未動之間便有善惡便須就這處理會若到發出處更怎生奈何得所以聖賢説慎獨便是要就幾微處理會賀孫魏問幾者動之微吉之先見者也曰似是漏字漢書説幾者動之微吉凶之先見者也似説得是幾自是有善有惡君子見幾亦是見得方舍惡從善不能無惡又曰漢書上添字如豈若匹夫匹婦之為諒自經於溝瀆而人莫之知也添箇人字似是賀孫知微知彰知柔知剛是四件事學履問伊川作見微則知彰矣見柔則知剛矣其説如何曰也好看來只作四件事亦自好既知微又知彰既知柔又知剛言其無所不知以為萬民之望也學蒙其殆庶幾乎殆是幾乎之義又曰是近又曰殆是危殆者是爭些子底意思又曰或以幾字為因上文幾字而言但左傳與孟子庶幾兩字都只做近字説顏子有不善未嘗不知知之未嘗復行今人只知知之未嘗復行為難殊不知有不善未嘗不知是難處今人亦有説道知得這箇道理及事到面前又卻只隨私欲做將去前所知者都自忘了只為是不曾知銖有不善未嘗不知知之未嘗復行直是顏子天資好如至清之水纖芥必見蓋卿天地氤氳言氣化也男女構精言形化也端蒙天地絪縕萬物化醇致一專一也惟專一所以能絪縕若不專一則各自相離矣化醇是已化後化生指氣化而言草木是也僩致一是專一之義程先生言之詳矣天地男女都是兩箇方得專一若三箇便亂了三人行減了一箇則是兩箇便專一一人行得其友成兩箇便專一程先生説初與二三與上四與五皆兩相與自説得好初二二陽四五二陰同德相比三與上應皆兩相與學蒙橫渠云艮三索而得男乾道之所成兌三索而得女坤道之所成所以損有男女構精之義亦有此理右第五章乾坤易之門不是乾坤外別有易只易便是乾坤乾坤便是易似那兩扇門相似一扇開便一扇閉只是一箇陰陽做底如闔戶謂之坤闢戶謂之乾淵問乾坤易之門門者是六十四卦皆由是出如兩儀生四象只管生出邪為是取闔闢之義邪曰只是取闔闢之義六十四卦只是這一箇陰陽闔闢而成但看他下文云乾陽物也坤陰物也陰陽合德而剛柔有體便見得只是這兩箇學蒙乾陽物坤陰物陰陽形而下者乾坤形而上者道夫天地之撰撰即是説他做處淵録云撰是所為問其稱名也雜而不越是指繫辭而言是指卦名而言曰他後面兩三番説名後又舉九卦説看來只是謂卦名又曰繫辭自此以後皆難曉學蒙於稽其類一本作於稽音啓其顙又一本於作烏不知如何曰但不過是説稽考其事類淵其衰世之意邪伏羲畫卦時這般事都已有了只是未曾經歷到文王時世變不好古來未曾有底事都有了他一一經歷這崎嶇萬變過來所以説出那卦辭如箕子之明夷如入於左腹獲明夷之心於出門庭此若不是經歷如何説得淵彰往察來往者如陰陽消長來者事之未來吉凶僩問彰往察來如神以知來知以藏往相似往是已定底如天地陰陽之變皆已見在這卦上了來謂方來之變亦皆在這上曰是學蒙微顯闡幽幽者不可見便就這顯處説出來顯者便就上面尋其不可見底教人知得又曰如顯道神德行相似學蒙微顯闡幽便是顯道神德行德行顯然可見者道不可見者微顯闡幽是將道來事上看言那箇雖是粗底然皆出於道義之蘊潛龍勿用顯也陽在下也只是就兩頭説微顯所以闡幽闡幽所以微顯只是一箇物事僩將那道理來事物上與人看就那事物上推出那裏面有這道理微顯闡幽僩右第六章因論易九卦云聖人道理只在口邊不是安排來如九卦只是偶然説到此而今人便要説如何不説十卦又如何不説八卦便從九卦上起義皆是胡説且如履德之基只是要以踐履為本謙德之柄只是要謙退若處患難而矯亢自高取禍必矣復德之本如孟子所謂自反困德之辨困而通則可辨其是困而不通則可辨其非損是懲忿窒欲益是修德益令廣大巽德之制巽以行權巽只是低心下意要制事須是將心入那事裏面去順他道理方能制事方能行權若心粗只從事皮膚上綽過如此行權便就錯了巽伏也入也學蒙三陳九卦初無他意觀上面其有憂患一句便見得是聖人説處憂患之道聖人去這裏偶然看見這幾卦有這箇道理所以就這箇説去若論到底睽蹇皆是憂禍患底事何故卻不説以此知只是聖人偶然去這裏見得有此理便就這裏説出聖人視易如雲行水流初無定相不可確定他在易之序履卦當在第十上面又自不説乾坤淵鄭仲履問易繫云作易者其有憂患乎如何止取九卦曰聖人論處憂患偶然説此九卦耳天下道理只在聖人口頭開口便是道理偶説此九卦意思自足若更添一卦也不妨更不説一卦也不妨只就此九卦中亦自儘有道理且易中儘有處憂患底卦非謂九卦之外皆非所以處憂患也若以困為處憂患底卦則屯蹇非處憂患而何觀聖人之經正不當如此後世拘於象數之學者乃以為九陽數聖人之舉九卦合此數也尤泥而不通矣既論九卦之後因言今之談經者往往有四者之病本卑也而抗之使高本淺也而鑿之使深本近也而推之使遠本明也而必使至於晦此今日談經之大患也蓋卿三説九卦是聖人因上面説憂患故發明此一項道理不必深泥如困德之辨若説蹇屯亦可蓋偶然如此説大抵易之書如雲行水流本無定相確定説不得揚子雲太玄一爻吉一爻凶相間排將去七百三十贊乃三百六十五日之晝夜晝爻吉夜爻凶又以五行參之故吉凶有深淺毫髮不可移此可為典要之書也聖人之易則有變通如此卦以陽居陽則吉他卦以陽居陽或不為吉此卦以陰居陰則凶他卦以陰居陰或不為凶此不可為典要之書也方子問巽何以為德之制曰巽為資斧巽多作斷制之象蓋巽字之義非順所能盡乃順而能入之義謂巽一陰入在二陽之下是入細直徹到底不只是到皮子上如此方能斷得殺若不見得盡如何可以行權問井德之地曰井有本故澤及於物而井未嘗動故曰居其所而遷如人有德而後能施以及人然其德性未嘗動也井以辨義如人有德而其施見於物自有斟酌裁度礪損先難而後易如子産為政鄭人歌之曰孰殺子産吾其與之及三年人復歌而誦之蓋事之初在我亦有所勉強在人亦有所難堪久之當事理順人心這裏方易便如利者義之和一般義是一箇斷制物事恰似不和久之事得其宜乃所以為和如萬物到秋許多嚴凝肅殺之氣似可畏然萬物到這裏若不得此氣收斂凝結許多生意又無所成就其難者乃所以為易也益長裕而不設長裕只是一事但充長自家物事教寬裕而已困窮而通此因困卦説澤無水困君子以致命遂志蓋此是致命遂志之時所以困彖曰險以説困而不失其所亨其惟君子乎蓋處困而能説也困而寡怨是得其處困之道故無所怨於天無所尤於人若不得其道則有所怨尤矣井居其所而遷井是不動之物然其水卻流行出去利物井以辨義辨義謂安而能慮蓋守得自家先定方能辨事之是非若自家心不定事到面前安能辨其義也巽稱而隱巽是箇卑巽底物事如兌見而巽伏也自是箇隱伏底物事蓋巽一陰在下二陽在上陰初生時已自稱量得箇道理了不待顯而後見如事到面前自家便有一箇道理處置他不待發露出來如云尊者於己踰等不敢問其年蓋才見箇尊長底人便自不用問其年不待更計其年然後方稱量合問與不合問也稱而隱是巽順恰好底道理有隱而不能稱量者有能稱量而不能隱伏不露形迹者皆非巽之道也巽德之制也巽以行權都是此意僩問巽稱而隱曰以巽以行權觀之則稱字宜音去聲為稱物之義又問巽有優遊巽入之義權是仁精義熟於事能優遊以入之意曰是又曰巽是入細底意説在九卦之後是八卦事了方可以行權某前時以稱揚為説了錯了學蒙問巽稱而隱隱字何訓曰隱不見也如風之動物無物不入但見其動而不見其形權之用亦猶是也昨得潘恭叔書説滕文公問間於齊楚與竭力以事大國兩段注云蓋遷國以圖存者權也效死勿去者義也義字當改作經思之誠是蓋義便近權如或可如此或可如彼皆義也經則一定而不易既對權字須著用經字僩問井以辨義曰只是井居其所而遷大小多寡施之各當或問井以辨義之義曰井居其所而遷又云井德之地也蓋井有定體不動然水卻流行出去不窮猶人心有持守不動而應變則不窮也德之地也地是那不動底地頭一本云是指那不動之處又曰佛家有函蓋乾坤句有隨波逐流句有截斷衆流句聖人言語亦然如以言其遠則不禦以言其邇則靜而正此函蓋乾坤句也如井以辨義等句只是隨道理説將去此隨波逐流句也如復其見天地之心神者妙萬物而為言此截斷衆流句也僩才卿問巽以行權曰權之用便是如此見得道理精熟後於物之精微委曲處無處不入所以説巽以行權僩問巽以行權權是逶迤曲折以順理否曰然巽有入之義巽為風如風之入物只為巽便能入義理之中無細不入又問巽稱而隱隱亦是入物否曰隱便是不見處文尉鄭仲履問巽以行權恐是神道曰不須如此説巽只是柔順低心下意底氣象人至行權處不少巽順如何行得此外八卦各有所主皆是處憂患之道蓋卿巽以行權兌見而巽伏權是隱然做底物事若顯然底做卻不成行權淵右第七章問易之所言無非天地自然之理人生日用之所不能須臾離者故曰不可遠曰是學蒙既有典常是一定了占得這爻了吉凶自定便是有典常淵易不可為典要易不是確定硬本子揚雄太玄卻是可為典要他排定三百五十四贊當晝三百五十四贊當夜晝底吉夜底凶吉之中又自分輕重凶之中又自分輕重易卻不然有陽居陽爻而吉底又有凶底有陰居陰爻而吉底又有凶底有有應而吉底有有應而凶底是不可為典要之書也是有那許多變所以如此淵問據文勢則內外使知懼合作使內外知懼始得曰是如此不知這兩句是如何硬解時也解得去但不曉其意是説甚底上下文意都不相屬又曰上文説不可為典要下文又説既有典常這都不可曉常猶言常理學蒙使知懼便是使人有戒懼之意易中説如此則吉如此則凶是也既知懼則雖無師保一似臨父母相似常恁地戒懼淵右第八章其初難知至非其中爻不備若解也硬解了但都曉他意不得這下面卻説一箇噫字都不成文章不知是如何後面説二與四同功三與五同功卻説得好但不利遠者也曉不得學蒙問雜物撰德辨是與非則非其中爻不備曰這樣處曉不得某常疑有闕文先儒解此多以為互體如屯卦震下坎上就中間四爻觀之自二至四則為坤自三至五則為艮故曰非其中爻不備互體説漢儒多用之左傳中一處説占得觀卦處亦舉得分明看來此説亦不可廢學履問其要無咎其用柔中也近君則當柔和遠去則當有強毅剛果之象始得此二之所以不利然而居中所以無咎曰也是恁地説問上下貴賤之位何也曰四二則四貴而二賤五三則五貴而三賤上初則上貴而初賤上雖無位然本是貴重所謂貴而無位高而無民在人君則為天子父天子師在他人則清高而在物外不與事者此所以為貴也銖右第九章問道有變動故曰爻爻有等故曰物物相雜故曰文曰道有變動不是指那陰陽老少之變是説卦中變動如乾卦六畫初潛二見三惕四躍這箇便是有變動所以謂之爻爻中自有等差或高或低或遠或近或貴或賤皆謂之等易中便可見如説遠近相取而悔吝生近而不相得則凶二與四同功而異位二多譽四多懼近也三與五同功而異位三多凶五多功貴賤之等也又曰列貴賤者存乎位皆是等也物者想見古人占卦必有箇物事名為物而今亡矣這箇物是那列貴賤辨尊卑底物相雜故曰文如有君又有臣便為君臣之文是兩物相對待在這裏故有文若相離去不相干便不成文矣卦中有陰爻又有陽爻相間錯則為文若有陰無陽有陽無陰如何得有文學履右第十章其辭危是有危懼之意故危懼者能使之安平慢易者能使之傾覆易之書於萬物之理無所不具故曰百物不廢其要是約要之義若作平聲則是要其歸之意又曰要去聲是要恁地要平聲是這裏取那裏意思又曰其要只欲無咎右第十一章或問乾是至健不息之物經歷艱險處多雖有險處皆不足為其病自然足以進之而無難否曰不然舊亦嘗如此説覺得終是硬説易之書本意不如此正要人知險而不進不説是我至健順了凡有險阻只認冒進而無難如此大非聖人作易之意觀上文云易之興也其當殷之末世周之盛德邪至此之謂易之道也看他此語但是恐懼危險不敢輕進之意乾之道便是如此卦中皆然所以多説見險而能止如需卦之類可見易之道正是要人知進退存亡之道若如冒險前進必陷於險是知進而不知退知存而不知亡豈乾之道邪惟其至健而知險故止於險而不陷於險也又曰此是就人事上説又曰險與阻不同險是自上視下見下之險故不敢行阻是自下觀上為上所阻故不敢進僩學履録少異問夫乾天下之至健也德行至知阻曰不消先説健順好底物事自是知險阻恰如良馬他才遇險阻處便自不去了如人臨懸崖之上若説不怕險要跳下來必跌殺良久又曰此段專是以憂患之際而言且如健當憂患之際則知險之不可乘順當憂患之際便知阻之不可越這都是當憂患之際處憂患之道當如此因憂患方生那知險知阻若只就健順上看便不相似如下文説危者使平易者使傾能説諸心能研諸慮皆因憂患説大要乾坤只是循理而已他若知得前有險之不可乘而不去則不陷於險知得前有阻之不可冒而不去則不困於阻若人不循理以私意行乎其間其過乎剛者雖知險之不可乘卻硬要乘則陷於險矣雖知阻之不可越卻硬要越則困於阻矣只是順理便無事又問在人固是如此以天地言之則如何曰在天地自是無險阻這只是大綱説箇乾坤底意思如此又曰順自是畏謹宜其不越夫阻如健卻宜其不畏險然卻知險而不去蓋他當憂患之際故也又問簡易曰若長是易時更有甚麼險他便不知險矣若長是簡時更有甚麼阻他便不知阻矣只是當憂患之際方見得僩乾天下之至健更著思量看來聖人無冒險之事須是知險便不進向前去又曰他只是不直撞向前自別有一箇路去如舜之知子不肖則以天下授禹相似又曰這只是説剛健之理如此莫硬去天地上説因説乾坤知險阻非是説那定位底險阻乾是箇至健底物自是見那物事皆低坤是至順底物自是見那物事都大敬子云如云能勝物之謂剛故常信於萬物之上相似曰然如云膽欲大而心欲小至健恆易以知險如膽欲大至順恆簡以知阻如心欲小又如云大心則天而道小心則畏義而節相似李云如人欲渡若風濤洶湧未有要緊不渡也不妨萬一有君父之急也只得渡曰固是如此只是未説到這裏在這箇又是説處那險阻聖人固是有道以處之這裏方説知險阻知得了方去處他問如此則乾之所見無非險坤之所見無非阻矣曰不然他是至健底物自是見那物事底如人下山阪自上而下但見其險而其行也易坤是至順底物則自下而上但見其阻險阻只是一箇物事一是自上而視下一是自下而視上若見些小險便止了不敢去安足為健若不顧萬仞之險只恁從上面擂將下此又非所以為乾若見些小阻便止了不敢上去固不是坤若不顧萬仞之阻必欲上去又非所以為坤所説險阻與本義異僩乾健而以易臨下故知下之險險底意思在下坤順而以簡承上故知上之阻阻是自家低他卻高底意思自上面下來到那去不得處便是險自下而上上到那去不得處便是阻易只是這兩箇物事自東而西也是這箇自西而東也是這箇左而右右而左皆然淵因言乾坤簡易知險知阻而曰知險阻便不去了惟其簡易所以知險阻而不去敬子云今行險徼幸之人雖知險阻而猶冒昧以進惟乾坤德行本自簡易所以知險阻僩問乾常易以知險坤常簡以知阻曰乾健則看什麼物都剌音辣將過去坤則有阻處便不能進故又是順如上壁相似上不得自是住了後復云前説差了乾雖至健知得險了卻不下去坤雖至順知得阻了更不上去以人事言之若健了一向進去做甚收殺或録云乾到險處便止不行所以為常易學蒙又説知險知阻曰舊因登山而知之自上而下則所見為險自下而上則所向為阻蓋乾則自上而下坤則自下而上健則遇險亦易順則還阻亦簡然易則可以濟險而簡亦有可涉阻之理因登山而得乾坤險阻之説尋常將險阻作一箇意思其實自高而下愈覺其險乾以險言者如此自下而升自是阻礙在前坤以阻言者如此謨自山下上山為阻故指坤而言自山上觀山下為險故指乾而言敬仲易只是一陰一陽做出許多樣事夫乾夫坤一段也似上面知大始作成物意思説諸心只是見過了便説這箇屬陽研諸慮是研窮到底似那安而能慮直是子細這箇屬陰定吉凶是陽成亹亹是陰便是上面作成物且以做事言之吉凶未定時人自意思懶散不肯做去吉凶定了他自勉勉做將去所以屬陰大率陽是輕清底物事之輕清底屬陽陰是重濁底物事之重濁者屬陰成亹亹是做將去淵能説諸心乾也能研諸慮坤也説諸心有自然底意思故屬陽研諸慮有作為意思故屬陰定吉凶乾也成亹亹坤也事之未定者屬乎陽定吉凶所以為乾事之已為者屬陰成亹亹所以為坤大抵言語兩端處皆有陰陽如開物成務開物是陽成務是陰如致知力行致知是陽力行是陰周子之書屢發此意推之可見謨能説諸心能研諸慮方始能定天下之吉凶成天下之亹亹凡事見得通透了自然歡説既説諸心是理會得了於事上便審一審便是研諸慮研是更去研磨定天下之吉凶是剖判得這事成天下之亹亹是做得這事業學蒙問變化云為吉事有祥象事知器占事知來曰上兩句只説理如此下兩句是人就理上知得在陰陽則為變化在人事則為云為吉事自有祥兆惟其理如此故於變化云為則象之而知已有之器於吉事有祥則占之而知未然之事也又問器字是凡見於有形之實事者皆為器否曰易中器字是恁地説學履變化云為是明吉事有祥是幽象事知器是人事占事知來是筮象事知器是人做這事去占事知來是他方有箇禎祥這便占得他如中庸言必有禎祥見乎蓍龜之類吉事有祥凶事亦有淵問易書之中有許多變化云為又吉事皆有休祥之應所以象事者於此而知器占事者於此而知來曰是天地設位四句説天人合處天地設位便聖人成其功能人謀鬼謀則雖百姓亦可以與其能成能與與能雖大小不同然亦是小小底造化之功用然百姓與能卻須因蓍龜而方知得人謀鬼謀如謀及乃心庶人卜筮相似淵百姓與能與字去聲他無知因卜筮便會做得事便是與能人謀鬼謀猶洪範之謀及卜筮卿士庶人相似學蒙八卦以象告以後説得叢雜不知如何學蒙問八卦以象告至失其守者其辭屈一段竊疑自吉凶可見矣而上只是總説易書所載如此自變動以利言而下則專就人占時上説曰然又問易之情近而不相得則凶或害之悔且吝是如何曰此疑是指占法而言想古人占法更多今不見得蓋遠而不相得則安能為害惟切近不相得則凶害便能相及如一箇凶人在五湖四海之外安能害自家若與之為鄰近則有害矣又問此如今人占火珠林課底若是凶神動與世不相干則不能為害惟是克世應世則能為害否曰恐是這樣意思學履中心疑者其辭支中心疑故不敢説殺其辭支者如木之有枝開兩岐去德輔云思曰睿學而不思則罔蓋亦弗思而已矣豈有不可思維之理曰固是若不可思維則聖人著書立言於後世何用德輔右第十二章
