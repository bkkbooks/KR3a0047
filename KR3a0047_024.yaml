body:
  text: 朱子語類卷第二十四論語六為政篇下吾與回言章論語所載顏子語止有喟然之歎與問仁兩章而已而夫子曰吾與回言終日不知是説甚麼惜乎其不傳也廣或問顏子終日不違如愚謂顏子心與聖人契曰此是前輩已自説了畢竟要見顏子因甚與聖人契問者無言文蔚曰孔子博他以文約他以禮他於天下之理無所不明所以於聖人之言無所不契曰孔子未博文約禮之前又如何文蔚曰顏子已具聖人體段曰何處是他具聖人體段文蔚無答曰顏子乃生知之次比之聖人已是九分九釐所爭處只爭一釐孔子只點他這些便與他相湊他所以深領其言而不再問也文蔚問顏子不違與孔子耳順相近否曰那地位大段高不違是顏子與孔子説話都曉得耳順是無所不通淳李從之問顏子省其私不必指燕私只是他自作用處曰便是這意思但恐沒著落卻如何省只是説燕私庶幾有箇著處方有可省處私不專在無人獨處之地或有人相對坐心意默所趨向亦是私如慎獨之獨亦非特在幽隱人所不見處只他人所不知雖在衆中便是獨也察其所安安便是箇私處問亦足以發是顏子於燕私之際將聖人之言發見於行事否曰固是雖未盡見於行事其理亦當有發見處然燕私之際尤見顏子踐履之實處問顏子如愚曰夫子與言之時只似一箇呆底退而省其私之所為亦足以發明其意義似不呆如克己復禮他便知得克己復禮如博我以文約我以禮他皆知之便是足以發處卓不違如愚不須説了亦足以發是聽得夫子説話便能發明於日用躬行之間此夫子退而省察顏子之私如此且如説非禮勿視聽言動顏子便真箇不於非禮上視聽言動集注謂坦然由之而無疑是他真箇見得真箇便去做明作問亦足以發莫是所以發明夫子所言之旨否曰然且如夫子告以非禮勿視聽言動顏子受之不復更問如何是禮與非禮但是退而省察顏子之所為則直是視聽言動無非禮也此則足以發夫子之言也壯祖先生令看顏子亦足以發於何處見之是甚麼意思或云見得親切處於非禮勿視聽言動一章可見曰大概是如此良久云於睟面盎背皆見之因舉程先生之言曰出門如見大賓使民如承大祭充之則睟面盎背此之謂也燾退而省其私亦足以發這些子便難看且如顏子甚麼處足以見退而省其私亦足以發如今著一箇人甚麼處足以發甚麼處便不足以發義剛問亦足以發是顏子退有所省發否曰不然集注已説得分明了蓋與之言顏子都無可否似箇愚者及退而觀其所行皆夫子與之言者一一做得出來不差豈不是足以發明得夫子之道其語勢只如此恰如今人説與人做一器用方與他説箇尺寸高低形製他聽之全然似不曉底及明日做得來卻與昨日所説底更無分毫不似祖道亦足以發謂其能發己之言若不悱不發是以此而發彼也引而不發是引弓而不發矢也用字各有不同人傑如子貢子夏是曉了較不甚問辨若它人則三番四番説都曉不得獨夫子與顏子説時它卻恁地曉得這處便當思量它因甚麼解恁地且如這一件物事我曾見來它也曾見來及我説這物事則它便曉得若其他人不曾見則雖説與它它也不曉義剛問顏子深潛淳粹曰深潛是深厚不淺露恁地時意思常藏在裏面燾集注問顏子深潛淳粹此只是指天資而言否曰是義剛問集注載李先生之説甚分明但所謂默識心融觸處洞然自有條理便見顏子聞夫子之言自原本至於條目一一理會得所以與夫子意不相背及退省其私即見其日用語默動靜之間皆足以發明夫子之道坦然由之而不疑便見得顏子不惟理會得夫子言語及退便行將去更無窒礙曰亦足以發一句最好看若粗説時便是行將去然須是子細看亦足以發一句南升問李先生謂顏子聖人體段已具體段二字莫只是言箇模樣否曰然又問惟其具聖人模樣了故能聞聖人之言默識心融否曰顏子去聖人不爭多止隔一膜所謂於吾言無所不説其所以不及聖人者只是須待聖人之言觸其機乃能通曉爾又問所以如此者莫只是渣滓化未盡否曰聖人所至處顏子都見得只是未到仰之彌高鑽之彌堅瞻之在前忽焉在後這便顏子不及聖人處這便見得未達一間處且如於道理上才著緊又蹉過才放緩又不及又如聖人平日只是理會一箇大經大法又卻有時而應變達權才去應變達權處看他又卻不曾離了大經大法可仕而仕學他仕時又卻有時而止可止而止學他止時又卻有時而仕無可無不可學他不可又卻有時而可學他可又卻有時而不可終不似聖人事事做到恰好處又問程子説孟子雖未敢便道他是聖人然學已到聖處莫便是指此意而言否曰顏子去聖人尤近或云某於克己復禮動容貌兩章卻理會得若是仰高鑽堅瞻前忽後終是未透曰此兩章止説得一邊是約禮底事到顏子便説出兩腳來聖人之教學者不過博文約禮兩事爾博文是道問學之事於天下事物之理皆欲知之約禮是尊德性之事於吾心固有之理無一息而不存今見於論語者雖只有問仁問為邦兩章然觀夫子之言有曰吾與回言終日想見凡天下之事無不講究來自視聽言動之際人倫日用當然之理以至夏之時商之輅周之冕舜之樂歷代之典章文物一一都理會得了故於此舉其大綱以語之而顏子便能領略得去若元不曾講究則於此必疑問矣蓋聖人循循善誘人才趲到那有滋味處自然住不得故曰欲罷不能既竭吾才如有所立卓爾卓爾是聖人之大本立於此以酬酢萬變處顏子亦見得此甚分明只是未能到此爾又卻趲逼他不得他亦大段用力不得易曰精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也只是這一箇德非於崇德之外別有箇德之盛也做來做去做到徹處便是廣問不違如愚章心融恐是功深力到處見得道理熟了故言入於心隨即融化更無渣滓故其發見於日用之間從容和順所以能發明聖人之道非生將道理體貼力行之也是否曰固是功夫至到亦是天資高顏子自是鄰於生知者也一之仲愚問默識心融如何曰説箇融字最好如消融相似融如雪在陽中若不融一句在肚裏如何發得出來如人喫物事若不消只生在肚裏如何能滋益體膚須是融化渣滓便下去精英便充於體膚故能肥潤如孔子告曾子一貫之語他人聞之只是箇一貫曾子聞之便能融化故發忠恕而已出來又問是曾子平昔工夫至此乎曰也是他資質自別一之器之問亦足以發伊川有天理昭著語與先生所説不同曰便只是這箇夫子所言他別會發明而行之伊川所謂天理昭著便是聖人所説底道理顏子便會一一與做且如對人言語他曉不得或曉得不分明少間只恁地悠悠漫漫雖然恁地説自將這言語無落著了到得顏子聖人與説一句他便去做那一句聖人與説兩句他便去做那兩句賀孫以下諸説問退而省其私曰私者他人所不知而回之所自知者夫子能察之如心之所安燕居獨處之所為見識之所獨見皆是也又曰私字儘闊私與中庸慎獨之獨同大意只是初間與回言一似箇不通曉底人相似退而觀其所獨為又足以發明夫子所説之道且説克己復禮夫子告之矣退而察之則見其果然克己復禮因説范氏説私字作與門人言恐不是謝氏以不違作聲聞相通雖以耳聽而實以神受又較深只是無所不説便是不違幹視其所以章文振問視其所以一章曰此不惟可以觀人亦當以此自考時舉義剛録云觀人固是如此觀己亦當如此問視其所以一章所以是大綱目看這一箇人是為善底人是為惡底人若是為善底人又須觀其意之所從來若是本意以為己事所當為無所為而為之乃為己若以為可以求知於人而為之則是其所從來處已不善了若是所從來處既善又須察其中心樂與不樂若是中心樂為善自無厭倦之意而有日進之益若是中心所樂不在是便或作或輟未免於偽以是察人是節節看到心術隱微處最是難事亦必在己者能知言窮理使心通乎道而能精別是非然後察人如聖人也曰於樂處便是誠實為善如好好色如惡惡臭不是勉強做來若以此觀人亦須以此自觀看自家為善果是為己果是樂否先生又云看文字須學文振每逐章挨近前去文振此兩三夜説話大故精細看論語方到一篇便如此直卿云先生説文振資質好南升所以是所為所由是如此做所安是所樂譬如讀書是所為豈不是好事然其去如此做又然多般有為己而讀書者有為名而讀者有為利而讀者須觀其所由從如何其為己而讀者固善矣然或有出於勉強者故又觀其所樂端蒙問視其所以觀其所由察其所安三句前一句是兼善惡而言後兩句是專言善尋常有一樣人所為雖不善然其意之所發卻不是要做不善而心終亦不安於不善是這般樣人是如何曰這箇也自有於觀過知仁可見燾李仲實問視其所以者善者為君子惡者為小人知其小人不必論也所由所安亦以觀察君子之為善者否曰譬如淘米其粳與沙其始也固淘去之矣再三淘之恐有未盡去之沙秕耳人傑問察其所安云今人亦有做得不是底事心卻不安又是如何曰此是良心終是微私欲終是盛微底須被他盛底勝將去微底但有端倪無力爭得出正如孟子説非無萌櫱之生一段意當良心與私欲交戰時須是在我大段著力與他戰不可輸與他只是殺賊一般一次殺不退只管殺殺數次時須被殺退了私欲一次勝他不得但教真箇知得他不好了立定腳根只管硬地自行從好路去待得熟時私意自住不得因舉濂溪説果而確無難焉須是果敢勝得私欲方確然守得這道理不遷變問有何道理可助這箇果曰別無道理助得只是自著力戰退他明作視其所以一章炎問觀人之法論到此卻是無遺先生微笑曰孟子觀人之法又自簡徑如曰胸中正則眸子瞭焉胸中不正則眸子眊焉便是炎問觀其所由謂意之所從來何也曰只是看他意思來處如何如讀書固是好然他意思來處亦有是為利者視其所以以用也為也為義為君子為利為小人方是且粗看如有一般人只安常守分不恁求利然有時意思亦是求利察其所安又看他心所安穩處一節深一節淳集注問觀其所由集注兩説如何曰意之所從來如讀書是好須看所讀何書行其所為或強勉有所為後説不如前説蓋行其所為只是就上面細看過不如意之所從來是就他心術上看所安集注下得樂字不穩安大率是他平日存主習熟處他本心愛如此雖所由偶然不如此終是勉強必竟所樂不在此次第依舊又從熟處去如平日愛倨傲勉強教他恭敬一時之間亦能恭敬次第依舊自倨傲了心方安呂氏一説謂所由是看他已前所為事所安是察他已後所為事亦通所謂知言窮理蓋知言亦是窮理之一事然蓋互舉也又云知人亦是窮理之一端且如因不失其親須知人方得明作問觀其所由集注言意之所從來如何曰如齊桓伐楚固義也然其意所從來乃因怒蔡姬而伐蔡蔡潰遂伐楚此則所為雖是而所由未是也銖察人之所安尤難故必如聖人之知言窮理方能之廣問視其所以觀其所由察其所安若聖人於人之善惡如見肺肝當不待如此著力曰這也為常人説聖人固不用得如此然聖人觀人也著恁地詳細如今人説一種長厚説話便道聖人不恁地只略略看便了這箇若不見教徹底善惡分明如何取舍且如今從學也有誠心來底也有為利來底又如今人讀書也有誠心去讀底也有為利讀底其初也卻好漸漸自見得他心下不恁地這須著知且如要從師須看得那人果是如何又如委託人事若是小小事要付託人尚可以隨其所長交付與他若是要成一件大事如何不見得這人了方付與如所謂可以託六尺之孤可以寄百里之命臨大節而不可奪若不真見這人是恁地如何這事託得他問伊川云視其所以是觀人之大概若所由所安也只兼善惡説今集注只解向不好邊去恐似無過中求有過非聖人意曰這只是平心恁地看看得十分是如此若要長厚便恁地包含其初欲恕人而終於自恕少間漸漸將自己都沒理會了都不知若能於待人嚴到得於自身己也會嚴問觀人之道也有自善而入於惡亦有事雖惡而心所存本好曰這箇也自可見須是如此看方見好底鐵定是好人不好底鐵定是不好人讀書不可不仔細若不因公問某也不説到這裏初間才看善惡便曉然到觀其所由有不善這又勝得當下便不是底到察其所安有不善這又勝前二項人不是到這裏便做不好人看他只是不是他心肯意肯必不會有終今按此轉語方答得上所疑集注分明賀孫所以只是箇大概所由便看他所從之道如為義為利又也看他所由處有是有非至所安處便是心之所以安方定得且如看得如此又須著自反看自家所以所由所安如何只是一箇道理呂氏以所以作今所自處所由作昔所經由所安作卒所歸宿卻成前後事非是一時觀人不必如此説又問觀其所由曰視其所以者只是觀人之凡日所由者便看他如何地做且如作士人作商賈此是所以至如讀書為利時又也不好如孝與忠若還孝而至於陷父于不義忠而至於阿諛順旨其所以忠與孝則同而所由之道則別問曰如小人為利便是不好了又更觀其所由做甚曰為利固是為利畢竟便有一節話若還看得只是這人了更不須看幹集義溫故而知新章溫故只是時習廣溫故知新謂溫故書而知新義振溫故方能知新不溫而求新知則亦不可得而求矣礪問溫故知新曰是就溫故中見得這道理愈精勝似舊時所看銖溫故而知新味其語意乃為溫故而不知新者設不溫故固是間斷了若果無所得雖溫故亦不足以為人師所以溫故又要知新惟溫故而不知新故不足以為人師也這語意在知新上義剛問溫故聞見之在外者知新義理之得於己者若溫故而不知新則徒聞見而已惟知新則是在我之義理因溫故而有以自得之其應無窮故可以為師乎曰然又問不離溫故之中而知新其亦下學上達之理乎曰亦是漸漸上達之意一之問溫故知新曰道理即這一箇道理論孟所載是這一箇道理六經所載也是這箇道理但理會得了時時溫習覺滋味深長自有新得溫字對冷字如一杯羹在此冷了將去溫來又好南升溫故而知新此處知新是重中庸溫故而知新乃是溫故重聖人言語自有意思一箇這頭重一箇那頭重又曰溫故而不知新一句只是一句了夔孫溫故知新不是易底新者只是故中底道理時習得熟漸漸發得出來且如一理看幾箇人來問就此一理上一人與説一箇理都是自家就此理上推究出來所以其應無窮且如記問之學記得一事更推第二事不去記得九事便説十事不出所以不足為人師明作集注記問之學不足為人師只緣這箇死殺了若知新則引而伸之觸類而長之則常活不死殺矣如記問之學記得十件只是十件記得百件只是百件知新則時復溫習舊聞以知新意所以常活僩溫故則能知新如所引學記則是溫故而不知新只是記得箇硬本子更不解去裏面搜尋得道理義剛溫故而知新是活底故可以為人師記問之學只是死底故不足以為人師振溫故而知新可以為師矣先生曰此只是一件事都有兩箇義理如溫故而不能知新諸先生把日知其所亡做知新似倒説了日知其所亡乃溫故以前事日知其所未有如今日方做事業相似便方始月無忘其所能乃溫故也既溫故而知新謝氏説溫故知新又説得高遠了先生曰程先生説可以為師作只此一句可師不如便把做為師之師看此一句只説是人若不能溫故知新便不可為人師守舊而不知新義便不活不足以應學者之求若溫故而知新則從此儘推得去呂氏説師尚多聞只是泥孟子之語孟子初間也且恁地説呂氏便把來作引證不得大率聖人之言語闊被他把做恁地説也無礙理處幹集義仁父問溫故而知新可以為師矣伊川謂此一言可師此一事可師竊有未喻曰伊川見得亦差了這一句正對記問之學不足為人師一句若溫習舊聞則義理日通無有窮已若記問之學雖是記得多雖是讀得多雖是聞得多雖是千卷萬卷只是千卷萬卷未有不窮然而這一句説師亦只説平常恁地師卻不説是孔子這般師兼是這主意只為世上有不溫故知新而便欲為人師故發此一句卻不是説如此便可以為師言如此方可以為師以證人不如此而遽欲為師者伊川卻只認這意一向要去分解以此知讀書儘著仔細伊川恁地工夫也自有這般處聖人語言極精密無些子偏重亦無些子罅漏如説一言而喪邦有諸曰唯其言而莫之違只消如此説亦得便須説道如不善而莫之違也不幾乎一言而喪邦乎或曰以德報怨何如看來也似好聖人便問他何以報德以直報怨以德報德若以直報怨只是依直報之恰如無怨相似且如人有些侵我處若是我不是便休了若是他不是與他理會教是便了賀孫問以德報怨非獨説道無以報德只是以德報怨也自不得曰然如此只是偽只是不誠賀孫君子不器章君子不器是不拘於一所謂體無不具人心原有這許多道理充足若慣熟時自然看要如何無不周遍子貢瑚璉只是廟中可用移去別處便用不得如原憲只是一箇喫菜根底人邦有道出來也做一事不得邦無道也不能撥亂反正夷清惠和亦只做得一件事明作或問君子不器如孔門德行之外乃為器否曰若偏於德行而其用不周亦是器君子者才德出衆之名德者體也才者用也君子之人亦具聖人之體用夔孫録云體無不備用無不周次於聖人者也但其體不如聖人之大而其用不如聖人之妙耳人傑君子不器事事有些非若一善一行之可名也賢人則器獲此而失彼長於此又短於彼賢人不及君子君子不及聖人壽昌問君子不器之旨曰人心至靈均具萬理是以無所往而不知然而仁義禮智之性苟以學力充之則無所施而不通謂之不器可也至於人之才具分明是各局於氣稟有能有不能又問如何勉強得曰君子者成德之名也所貴乎君子者有以化其氣稟之性耳不然何足以言君子中庸言雖愚必明雖柔必強處正是此意壯祖問君子所以不器者緣是就格物致知上做工夫看得道理周遍精切及廓然貫通有以盡其心之全體故施之於用無所不宜非特一才一藝而已曰也是如此但説得著力了成德之士自是不器南升君子不器君子是何等人曰此通上下而言有一般對小人而言底君子便是小底君子至如聖人吾不得而見之得見君子斯可矣便説大底君子便是聖人之次者問不器是那箇君子曰此是成德全才之君子不可一偏看他問侯氏舉君子不可小知而可大受如何曰不可小知便是不可以一偏看他他卻擔負得遠大底小人時便也有一才一藝可取故可小知問子貢女器也喚做不是君子得否曰子貢也是箇偏底可貴而不可賤宜於宗廟朝廷而不可退處此子貢之偏處問謝氏舉清和任也只是器否曰這是他成就得偏卻不是器他本成就得來大如得百里之地而君之一段他自是大只是成就得來偏問諸先生多舉形而上形而下如何説曰可見底是器不可見底是道理是道物是器因指面前火爐曰此是器然而可以向火所以為人用便是道問謝氏以為顏閔有聖人之一體未必優於子夏子遊子張然而具體也既謂之具體又説不如三子何也曰他意只道是顏子便都無許多事如古人説無所長既無所短安有所長底意他把來驅駕作文字便語中有病因問具體而微曰五峰説得牽強看來只是比似孔子較小今看顏子比孔子真箇小幹集義問范氏謝氏説如何曰天下道理皆看得透無一理之不知無一事之不明何器之有如范氏説也説得去然不消如此謝氏説得意思也好推其極乃大底不器伊尹伯夷柳下惠皆能一天下則器固大矣自一才一藝者觀之亦不可謂之器矣然自孔子可仕可止觀之則彼止在一邊亦器也孟子誠不肯學他底了一之子貢問君子章問先行其言而後從之曰此為子貢而發其實有德者必有言若有此德其言自足以發明之無有説不出之理夫子只云欲訥於言而敏於行敏於事而慎於言未嘗説無事於言人傑問先行其言而後從之苟能行矣何事於言曰只為子貢多言故告之如此若道只要自家行得説都不得亦不是道理聖人只説敏於事而慎於言敏於行而訥於言言顧行行顧言何嘗教人不言夔孫徐仁甫問先行其言而後從之莫須將先行作一句否曰程子如此卻未敢以為然恐其言而後從之不成一句若云而後其言從之方得不若以先行其言作一句而後從之作一句大意只説先行其所言而後言其所行讀書須是看出處主意如何此是子貢問君子孔子為子貢多言故以先行其言而後從之答之蓋為子貢發也問先行其言謂人識得箇道理了可以説出來卻不要只做言語説過須是合下便行將去而後從之者及行將去見得自家所得底道理步步著實然後説出來卻不是杜撰意度須還自家自本至末皆説得有著實處曰此一章説得好南升君子周而不比章問周與比莫也相似否曰外面相似而裏面大差了如驕泰和同亦然故幾微之間不可不辨幹周是無不愛比是私也相比或二人相比也是植君子周而不比周是遍人前背後都如此心都一般不偏滯在一箇如老者安之朋友信之少者懷之亦是周遍忠信為周如這一箇人合當如何待那箇人又合如何待自家只看理無輕重厚薄便是周遍周是公底比比是私底周周是無所不比也如為臣則忠為子卻不能孝便是偏比不周遍只知有君而不知有親按忠信為周他録別有定説淳問比周曰君子小人即是公私之間皆是與人親厚但君子意思自然廣大小人與人相親時便生計較與我善底做一般不與我善底做一般周與比相去不遠要須分別得大相遠處某集注中曾説此意君子與人相親也有輕重有厚薄但意思自是公南升問周而不比曰周者大而遍之謂比便小所謂兩兩相比君子之於人無一人使之不得其所這便是周小人之於人但見同於己者與之不同於己者惡之這便是比君子之於人非是全無惡人處但好善惡惡皆出於公用一善人於國則一國享其治用一善人於天下則天下享其治於一邑之中去一惡人則一邑獲其安於一鄉之中去一惡人則一鄉受其安豈不是周小人之心一切反是又云歐陽朋黨論説周武以三千為大朋商紂億兆之人離心離德又云比周二字於易中所言又以比字為美如九五顯比取王用三驅失前禽之義皆美也如頑嚚不友相與比周又卻是不好卓比之與周皆親厚之意周則無所不愛為諸侯則愛一國為天子則愛天下隨其親疏厚薄無不是此愛若比則只是揀擇或以利或以勢一等合親底他卻自有愛憎所以有不周處又云集注謂普遍是泛愛之意偏黨非特勢利大概君子心公而大所以周普小人心狹而常私便親厚也只親厚得一箇明作問比周曰且如一鄉之中有箇惡人我這裏若可除去便須除去卻得這一鄉都安此君子周而不比也至如小人於惡人則喜其與己合必須親愛之到得無惡之人每與己異必思傷害之此小人之比而不周也武三思嘗言如何是善人如何是惡人與豫合者是善人與豫不合者是惡人賀孫問比周曰周固是好然而有一種人是人無不周旋之使所周之人皆善固是好萬一有箇不好底人自家周旋他去這人會去作無窮之害此無他只是要人之同己所以為害君子則不然當親則親當疏則疏而已夔孫問注周言普遍豈泛愛衆而親仁之意歟曰亦是如此大抵君子立心自是周遍好惡愛憎一本於公小人惟偏比阿黨而已宇集注問注云君子小人所以分則在公私之際毫釐之差耳何謂毫釐之差曰君子也是如此親愛小人也是如此親愛君子公小人私節問注云欲學者察乎兩間而審其取舍之幾當在思慮方萌之初與人交際之始於此審決之否曰致察於思慮固是但事上亦須照管動針曰哲人知幾誠之於思志士勵行守之於為須著隨處照管不應道這裏失了後面更不去照管覺得思處失了便著去事上看便舍彼取此須著如此方得恪徐問比周曰只是公私周則遍及天下比則昵於親愛之間又問忠信為周阿黨為比如何曰忠信為周只緣左傳周爰咨詢指作忠信後人遂將來妄解最無道理且如易比卦言比吉也比輔也原筮元永貞無咎則比都是好大抵比於君子則為善比於小人則為惡須是看聖人説處本意如何據此周而不比比而不周只是公私集義問范氏説忠信為周恐未説到此曰忠信所以周也若面前背後不誠實則不周矣周是公底比無所不比也比是私底周周一邊背了一邊周則意思卻照管得到極其至為臣則忠為子則孝是亦周也一之學而不思章問論語言學字多不同學而不思則罔此學字似主於行而言博學於文此學字似主於知而言曰學而不思則罔此學也不是行問學字義如何曰學只是效未能如此便去效做問恐行意較多否曰只是未能如此便去學做如未識得這一箇理便去講究要識得也是學未識得這一箇書便去讀也是學未曉得這一件事去問人如何做便也是學問人便是依這本子做去不問人便不依本子只鶻突杜撰做去學是身去做思只是默坐來思問學是學其事思是思其理否曰思只是思所學底事學而不思便都罔了問思而不學何以危殆曰硬將來拗縛捉住在這裏便是危殆只是杜撰恁地不恁自然便不安穩淳學與思須相連才學這事須便思量這事合如何學字甚大學效他聖賢做事南升學是學其事如讀書便是學須緩緩精思其中義理方得且如做此事是學然須思此事道理是如何只恁下頭做不思這事道理則昧而無得若只空思索卻又不傍所做事上體察則心終是不安穩須是事與思互相發明明作學不止是讀書凡做事皆是學且如學做一事須是更經思量方得然只管思量而不學則自家心必不安穩便是殆也學而不思如讀書不思道理是如何思而不學如徒苦思索不依樣子做植思而不學則殆雖用心思量不曾就事上習熟畢竟生硬不會妥帖銖問不求諸心則昏而無得不習其事則危而不安如何曰思與學字相對説學這事便思這事人説這事合恁地做自家不曾思量這道理是合如何則罔然而已罔似今人説罔兩既思得這事若不去做這事便不熟則臬兀不安如人學射雖習得弓箭裏許多模樣若不曾思量這箇是合如何也不得既思得許多模樣是合如何卻不曾置得一張弓一隻箭向垛邊去射也如何得集注或問學而不思章引程子博學審問慎思明辨力行五者廢一非學何也曰凡學字便兼行字意思如講明義理學也效人做事亦學也孔子步亦步趨亦趨是效其所為才效其所為便有行意銖叔蒙問集注卻舉中庸學問思辨與行之語據某看學與行是學之始終問思辨是思之始終曰然賀孫問思而不學則殆注身不親歷所謂親歷豈講求義理與躬行處均為親歷乎曰講求義理又似乎思但就見定事上學去話間因語及某人曰此正思而不學之人只一向尋空去凡事須學方能進步集注非定本寓問諸先生説有外意者有説偏傍者也須看否曰也要見得他礙處因問楊氏説思則敬以直內義以方外如何曰敬自是存養底事義自是推行底事且説思與學也未須説存養推行處若把推行作學便不是中庸裏面博學力行自是兩件今人説學便都説到行處去且如讀書看這一句理會不得便須熟讀此便是學然學而不思便是按古本也無得處若徒然閉目靜思而不學又也徒勞心不穩當然後推到行處問罔字作欺罔無實之罔如何曰不必如此説罔是昏昧底意問思而不學則殆只是尹氏勞而無所安底意否曰是勞便是其心勞不安便是於義理不安問謝氏窮大而失其所居如何曰只是不安幹集義攻乎異端章或問攻乎異端曰攻者是講習之謂非攻擊之攻這處須看他如何是異端如何是正道異端不是天生出來天下只是這一箇道理緣人心不正則流於邪説習於彼必害於此既入於邪必害於正異端不止是楊墨佛老這箇是異端之大者問攻字若作攻擊也如何便有害曰便是聖人若説攻擊異端則有害便也須更有説話在不肯只恁地説遂休了若從攻擊則呂氏之説近之不如只作攻治之攻較穩幹凡言異端不必攻者皆是為異端遊説反間孟子謂能言距楊墨者聖人之徒也不必便能距楊墨但能説距楊墨亦是聖人之徒淳問集注云攻專治之也若為學便當專治之異端則不可專治也曰不惟説不可專治便略去理會他也不得若是自家學有定止去看他病痛卻得也是自家眼目高方得若是冨地則也奈他不何如後來士大夫末年皆流入佛氏者緣是把自家底做淺底看便沒意思了所以流入他空寂玄妙之説去燾集注問程子曰佛氏之言近理所以害甚於楊墨看來為我疑於義兼愛疑於仁其禍已不勝言佛氏如何又卻甚焉曰楊墨只是硬恁地做佛氏最有精微動得人處本朝許多極好人無不陷焉如李文靖王文正謝上蔡楊龜山遊先生諸人賀孫問集注何以言佛而不言老曰老便只是楊氏人嘗以孟子當時只闢楊墨不闢老不知闢楊便是闢老如後世有隱遁長往而不來者皆是老之流他本不是學老只是自執所見與此相似淳味道問只説釋氏不説楊墨如何曰楊墨為我兼愛做出來也淡而不能惑人只為釋氏最能惑人初見他説出來自有道理從他説愈深愈是害人攻乎異端章曰楊氏為我拔一毛而利天下不為墨氏兼愛至不知有父如此等事世人見他無道理自不去學他只如墨者夷之厚葬自打不過緣無道理自是行不得若佛氏則近理所以惑人此事難説觀其書可見明作呂氏曰君子反經而已矣經正斯無邪慝今惡乎異端而以力攻之適足以自蔽而已説得甚好但添得意思多了不敢保是聖人之意聖人之意分明只是以力攻之理會他底未得枉費力便將己業都荒了淳集注由誨女知之章問知之為知之章子路不應有以不知為知之病曰子路粗暴見事便自説是曉會得如正名一節便以為迂故和那不知處也不知耳銖問知之為知之曰子路氣象粗疏不能隨事精察或有不合於己雖於夫子亦艴然如子之迂也之類故夫子告之以此雉或問誨汝知之乎章曰惟伊川便説得盡別人只説得一邊知之為知之不知為不知則無自欺之蔽其知固自明矣若不説求其知一著則是使人安於其所不知也故程子又説出此意其説方完上不失於自欺下不失於自勉廣徐問上蔡之説如何曰上蔡説未是其説求為過高要之聖人之言只是説緊切底事只為今人知之以為知將那不知者亦説是知終至於知與不知都無界限了若人能於其知者以為知於不知者以為不知而不強以為知此便是知了只為子路性勇怕他把不知者亦説是知故為他説如此子張學干祿章戴智老説干祿章曰多聞多見二字人多輕説過了將以為偶然多聞多見耳殊不知此正是合用功處聖人所以為好古敏以求之又曰多聞擇其善者而從之多見而識之皆欲求其多也不然則聞見孤寡不足以為學矣時舉多聞闕疑慎言三件事節多聞多見自不是淺陋迫狹人又更闕疑又更慎其餘方聞見亦是互相發明如學干祿章言多聞闕疑慎言其餘多見闕殆慎行其餘聞固是主於言見固是主於行然亦有聞而行者見而言者不可泥而看也時舉問干祿章聞見字義曰聞是聞人之言見是見人之行聞亦屬自家言處見亦屬自家做處聞見當闕其疑殆而又勿易言易行之問聞見因書得之則又何別曰見古人説底話是聞見古人做底事而欲學之是見如舜之孝是也然就克己復禮論之則看孔子所言是聞只自家欲循此而為仁便是見此非本文大義然必欲區別聞見則然問此答干祿之語意類好色之對乎曰不干事孔子不教他干但云得祿之道在其中正是欲抹殺了他干字若太王好貨好色等語便欲比之孔子便做病了便見聖賢之分處一之或問慎其餘只是指無疑無殆處否曰固是義剛林叔恭問多聞如何闕疑多見如何闕殆曰若不多聞也無緣見得疑若不多見也無緣見得殆江西諸人才聞得一説便把做了看有甚麼話更入不得亦如何有疑殆到他説此一章卻云子張平日專務多聞多見故夫子告以闕疑是不欲其多聞多見此是甚説話且如一件事一人如此説自家也見未得須是大家都説出來這裏方見得果是如何這裏方可以將衆多之説相磨擦這裏方見得疑殆分明賀孫或問尤自外至悔自內出曰出言或至傷人故多尤行有不至己必先覺故多悔然此亦以其多少言之耳言而多尤豈不自悔行而多悔亦必至於傷人矣廣子張學干祿一章是教人不以干祿為意蓋言行所當謹非為欲干祿而然也若真能著實用功則惟患言行之有悔尤何暇有干祿之心耶銖徐問學干祿章曰此是三截事若人少聞寡見則不能參考得是處故聞見須要多若聞見已多而不能闕疑殆則胡亂把不是底也將來做是了既闕其疑殆而又未能慎其餘則必有尤悔又問尤悔如何分尤莫是見尤於人否曰是大凡言不謹則必見尤於人人既有尤自家安得無悔行不謹則己必有悔己既有悔則人安得不見尤此只是各將較重處對説又問祿在其中只此便可以得祿否曰雖不求祿若能無悔尤此自有得祿道理若曰耕也餒在其中矣耕本求飽豈是求餒然耕卻有水旱凶荒之虞則有時而餒學本為道豈是求祿然學既寡尤悔則自可以得祿如言直在其中矣父為子隱子為父隱本不是直然父子之道卻要如此乃是直凡言在其中矣者道理皆如此又問聖人不教人求祿又曰祿在其中如何曰聖人教人只是教人先謹言行卻把他那祿不做大事看須是體量得輕重始得子張學干祿夫子答之者聞主言見主事尤是罪自外至悔是理自內出凡事不要到悔時悔時已錯了祿在其中凡言在其中皆是不求而自至之意父子相隱本非直而直在其中如耕本要飽然有水旱之變便有餒在其中學本是要立身不是要干祿然言行能謹人自見知便有得祿之道大概是令他自理會身己上事不要先萌利祿之心又云若人見得道理分明便不為利祿動明作問子張在聖門忽然學干祿聖人但告之以謹其言行便是修其天爵而人爵自至曰修天爵而人爵自至説得重了此意重處只在言行若言行能謹便自帶得祿來時舉録作聖人之心只教他謹言行因帶祿説凡言在其中者皆不求或作期而自至之辭如耕本是求飽卻言餒在其中父子相為隱直卻在其中又為前面也説得深了聖人本意在謹言行又不可徒謹須用得學又須闕其疑而未信殆而未安者便將其餘信而安者做一處謹言而謹行之謂其察得可言與可行也南升時舉録小異子張學干祿祿固人之所欲但要去干卻不得子張恁地時已不是正底心了夫子卻掉開答他不教他如何地干也不教他莫干但言祿在其中凡言在其中者皆是求此而得彼之義如耕也餒在其中之類皆是君子求其在己而已然而德行既修名聲既顯則人自然來求祿不待干而自得如未有仁而遺其親未有義而後其君這豈是要計較他不遺不後後方為仁義但是為仁義時便自恁地這雖是不曾説利然使天下人皆不遺不後利孰大焉大抵計功之心也是害事所謂仁者先難而後獲才有計功之心便都不濟事義剛問學干祿章曰這也是一説然便是教人不要去求如程先生説使定其心而不為利祿所動是也論語凡言在其中皆是與那事相背且如父為子隱子為父隱本不干直事然直卻在其中耕本是得食然有水旱凶荒則有餒在其中切問近思本只是講學不是求仁底事然做得精則仁亦在其中如居處恭執事敬與人忠皆是切己去做方是求仁底事此皆是教人只從這一路做去且莫管那一邊然做得這一邊則那一邊自在其中也又曰惟是那君子謀道不謀食學也祿在其中耕也餒在其中一章説得最反覆周全如云君子謀道不謀食是將一句統説了中央又分兩腳説學也祿在其中耕也餒在其中又似教人謀道以求食底意思下面卻説憂道不憂貧便和根斬了燾哀公問何為則民服章陳仲蔚説何為則民服及使民敬忠以勸二章先生曰前章據本文夫子只恁地説未有貴窮理之意當時哀公舉措之權不在己問了只恁休了他若會問時夫子尚須有説義剛或問舉直錯諸枉曰是便是直非便是枉燾舉直錯枉集注謂大居敬而貴窮理曰若不居敬如何窮理不窮理如何識人為舉直錯枉之本又曰人最要見得是與不是方有下手處如今人都不見得是非分別不出又曰須是居敬窮理自做工夫銖録云此是自修工夫方能照得人破若心不在焉則視之而不見聽之而不聞以枉為直以直為枉矣明作銖同問哀公問何為則民服往往只是要得人畏服他聖人卻告之以進賢退不肖乃是治國之大本而人心自服者蓋好賢而惡不肖乃人之正性若舉錯得宜則人心豈有不服謝氏又謂若無道以照之則以直為枉以枉為直此君子大居敬而貴窮理此又極本原而言若人君無知人之明則枉直交錯而舉錯未必得宜矣曰説得分明季康子問使民敬忠以勸章問使民敬忠以勸曰莊只是一箇字上能端莊則下便尊敬至於孝慈則是兩事孝是以躬率之慈是以恩結之如此人方忠於己舉善而教不能若善者舉之不善者便去之誅之罰之則民不解便勸惟是舉其善者而教其不能者所以皆勸便是文字難看如這樣處當初只是大概看了便休而今思之方知集注説得未盡義剛問孝慈則忠何以能使之忠也曰孝以率之慈以結之所以使之忠也問孝慈主父子而言可乎曰如此安能便使之忠也此慈字兼內外而言若大學齊家章孝慈乃主父子而言也孝於親是做箇樣子慈於衆則推此意以及人兼此二者方能使民忠於己若徒孝於親而不能推及於衆若徒慈於衆而無孝親底樣子都不得明作孝是以身率之慈是以恩結之善者固可舉若不能者遽刑之罰之則彼何由勸舉善於前而教不能於後則是誘引之使趨於善也是以勸夔孫問康子之意必要使民能如此聖人但告之以己所當為而民自應者方其端莊孝慈舉善教不能不是要民如此而後為做得自己工夫則民不期然而然者曰也是如此或謂子奚不為政章惟孝友于兄弟謂孝然後友友然後政其序如此振問施於有政是使一家人皆孝友否曰刑于寡妻至于兄弟以御于家邦是也政一家之事也固不止是使之皆孝友耳然孝友為之本也一之推廣此心以為一家之政便是齊家緣下面有一箇是亦為政故不是國政又云在我者孝則人皆知孝在我者弟則人皆知弟其政豈不行於一家明作問惟孝友于兄弟可以施於有政曰此全在推字上言舉斯心加諸彼今人只為不能善推其所為耳范唐鑑言唐明皇能友愛兄弟而殺其三子正以其不能推此心耳銖問此夫子難以不仕之意告或人故托以告之然使夫子得時得位其為政之本也只就人倫上做將去曰文振看文義看得好更宜涵泳南升人而無信章問人而無信不知其可也曰人而無真實誠心則所言皆妄今日所言要往東明日走在西去這便是言不可行卓問先生但謂車無此二者則不可以行人而無信亦猶是也而不及無信之所以不可行何也曰若人無信則語言無實何處行得處家則不可行於家處鄉黨則不可行於鄉黨曰此與言不忠信雖州里行乎哉之意同曰然廣子張問十世可知章周問三代所因者不易而所損益可知如何曰此所謂不易也變易也三綱五常異古異今不可易至於變易之時與其人雖不可知而其勢必變易可知也蓋有餘必損不及必益雖百世之遠可知也猶寒極生暖暖甚生寒雖不可知其勢必如此可知也銖所因之禮是天做底萬世不可易所損益之禮是人做底故隨時更變燾所因謂大體所損益謂文為制度那大體是變不得底雖如秦之絶滅先王禮法然依舊有君臣有父子有夫婦依舊廢這箇不得義剛忠質文忠只是朴實頭白直做將去質則漸有形質制度而未及於文采文則就制度上事事加文采然亦天下之勢自有此三者非聖人欲尚忠尚質尚文也夏不得不忠商不得不質周不得不文彼時亦無此名字後人見得如此故命此名僩以下集注問忠與質如何分曰忠只是渾然誠確質與文對質便自有文了但文未盛比之文則此箇質耳銖或問忠與質如何分先生喜其善問答云質朴則未有文忠則渾然無質可言矣過或問忠與質異處曰此如人家初做得箇家計成人雖有許多動用其誠意直是質實到做得家計成次第便有動用器使其初務純朴不甚浮華及其漸久用度日侈駸駸然日趨於文而不容自已其勢然也子蒙行夫問三統曰諸儒之説為無據某看只是當天地肇判之初天始開當子位故以子為天正其次地始闢當丑位故以丑為地正惟人最後方生當寅位故以寅為人正即邵康節十二會之説當寅位則有所謂開物當戌位則有所謂閉物閉物便是天地之間都無了看他説便須天地翻轉數十萬年問天統地統人統之別曰子是一陽初動時故謂之天統丑是二陽故謂之地統寅是三陽故謂之人統因舉康節元會運世之説十二萬九千六百年為一元一元有十二會一萬八百年為一會一會有三十運三百六十年為一運一運有十二世以小推大以大推小箇箇一般謂歲月日時皆相配合也如第一會第二會時尚未生人物想得地也未硬在第三會謂之開物人物方生此時屬寅到得戌時謂之閉物乃人消物盡之時也大率是半明半晦有五六萬年好有五六萬年不好如晝夜相似到得一元盡時天地又是一番開闢問先生詩云前推更無始後際那有終如何曰惟其終而復始所以無窮也燾問子丑寅之建正如何曰此是三陽之月若秦用亥為正直是無謂大抵三代更易須著如此改易一番又問忠質文本漢儒之論今伊川亦用其説如何曰亦有此理忠是忠朴君臣之間一味忠朴而已才説質便與文對矣又問五運之説曰本起於五行萬物離不得五行五運之説亦有理於三代已前事經事所不載者甚多又問五運之説不知取相生相克曰取相生又問漢承秦水德之後而以火德繼之是如何先生曰或謂秦是閏位然事亦有適然相符合者如我太祖以歸德軍節度即位即是商丘之地此火德之符也事與高祖赤帝子一般去偽器之説損益曰勢自是如此有人主出來也只因這箇勢自住不得到這裏方看做是如何惟是聖人能順得這勢盡得這道理以下人不能識得損益之宜便錯了壞了也自是立不得因只是因這箇損益也是損益這箇宇以下總論叔蒙問十世所因損益曰綱常千萬年磨滅不得只是盛衰消長之勢自不可已盛了又衰衰了又盛其勢如此聖人出來亦只是就這上損其餘益其不足聖人做得來自是恰好不到有悔憾處三代以下做來不恰好定有悔憾雖做得不盡善要亦是損益前人底雖是人謀然大勢不得不出此但這綱常自要壞滅不得世間自是有父子有上下羔羊跪乳便有父子螻蟻統屬便有君臣或居先或居後便有兄弟犬馬牛羊成群連隊便有朋友始皇為父胡亥為子扶蘇為兄胡亥為弟這箇也泯滅不得器之問三代損益如衣服器用制度損益卻不妨如正朔是天時之常卻要改如何曰一番新民觀聽合如此如新知縣到任便變易號令一番住持入院改換行者名次相似宇此一章因字最重所謂損益者亦是要扶持箇三綱五常而已如秦之繼周雖損益有所不當然三綱五常終變不得君臣依舊是君臣父子依舊是父子只是安頓得不好爾聖人所謂可知者亦只是知其相因者也如四時之運春後必當是夏夏後必當是秋其間雖寒暑不能無繆戾然四時之運終改不得也康節詩云千世萬世中原有人正與此意合時舉這一段諸先生説得損益字不知更有箇因字不曾説因字最重程先生也只滾説將去三代之禮大概都相因了所損也只損得這些箇所益也只益得這些箇此所以百世可知也且如秦最是不善繼周酷虐無比然而所因之禮如三綱五常竟滅不得馬氏注所因謂三綱五常損益謂質文三統此説極好幹繼周百世可知秦繼周者也安得為可知然君臣父子夫婦依舊在只是不能盡其道爾淳問十世可知曰三綱五常雖衰亂大無道之世亦都在且如繼周者秦是大無道之世畢竟是始皇為君李斯等為臣始皇為父胡亥為子三綱五常地位占得大了便是損益亦不多至秦欲尊君便至不可仰望抑臣便至十分卑屈此段重在因字損益只些子南升致道問夫子繼周而作則忠質損益之宜如何曰孔子有作則併將前代忠質而為之損益卻不似商只損益得夏周只損益得二代又問孔子監前代而損益之及其終也能無弊否曰惡能無弊賀孫問其所闕者宜益其所多者宜損固事勢之必然但聖人於此處得恰好其他人則損益過差了曰聖人便措置一一中理如周末文極盛故秦興必降殺了周恁地柔弱故秦必變為強戾周恁地纖悉周緻故秦興一向簡易無情直情徑行皆事勢之必變但秦變得過了秦既恁地暴虐漢興定是寬大故云獨沛公素寬大長者秦既鑒封建之弊改為郡縣雖其宗族一齊削弱至漢遂大封同姓莫不過制賈誼已慮其害朝錯遂削一番主父偃遂以誼之説施之武帝諸侯王只管削弱自武帝以下直至魏末無非凛削宗室至此可謂極矣晉武起盡用宗室皆是因其事勢不得不然賀孫問本朝大勢是如何曰本朝監五代藩鎮兵也收了賞罰刑政一切都收了然州郡一齊困弱靖康之禍寇盜所過莫不潰散亦是失斟酌所致又如熙寧變法亦是當苟且惰弛之餘勢有不容已者但變之自不中道賀孫先生謂繼周百世可知諸公看繼周者是秦果如夫子之言否皆對以為秦不能繼周故所因所革皆不可考曰若説秦不能繼周則夫子之言不是始得夫子分明説百世可知看秦將先王之法一切掃除了然而所謂三綱五常這箇不曾泯滅得如尊君卑臣損周室君弱臣強之弊這自是有君臣之禮如立法説父子兄弟同室內息者皆有禁之類這自是有父子兄弟夫婦之禮天地之常經自商繼夏周繼商秦繼周以後皆變這箇不得秦之所謂損益亦見得周末許多煩文縟禮如此故直要損其太過益其欠處只是損益得太甚然亦是事勢合到這裏要做箇直截世界做箇沒人情底所為你才犯我法便死更不有許多勞勞攘攘如議親議賢議能議功之類皆不消如此只是白直做去他亦只為苟簡自便計到得漢興雖未盡變亡秦之政如高文之寬仁恭儉皆是因秦之苟刻驕侈而損益其意也大綱恁地寬厚到後便易得廢弛便有強臣篡奪之禍故光武起來又損益前後之制事權歸上而激厲士大夫以廉恥賀孫非其鬼而祭之章非其鬼而祭之如天子祭天地諸侯祭山川大夫祭五祀庶人祭其先上得以兼乎下下不得以兼乎上也庶人而祭五祀大夫而祭山川諸侯而祭天地此所謂非其鬼也僩問非其鬼而祭之如諸侯僭天子大夫僭諸侯之類又如士庶祭其旁親遠族亦是非其鬼否曰是又如今人祭甚麼廟神都是非其鬼問如用僧尼道士之屬都是非其鬼曰亦是問祭旁親遠族不當祭若無後者則如之何曰這若無人祭只得為他祭自古無後者合當祭於宗子之家今何處討宗子看古禮今無存者要一一行之也難賀孫問非其鬼而祭之尋常人家所當祭者只是祖先否曰然又問土地山川之神人家在所不當祭否曰山川之神季氏祭之尚以為僭況士庶乎如土地之神人家卻可祭之禮云庶人立一祀或立戶或立灶戶灶亦可祭也又問中霤之義如何曰古人穴居當土室中開一竅取明故謂之中霤而今人以中堂名曰中霤者所以存古之義也又云中霤亦土地之神之類五祀皆室神也燾問見義不為無勇莫是連上句意否曰不須連上句自説凡事見得是義便著做不獨説祭祀也賀孫子善問見義不為無勇這亦不為無所見但為之不力所以為無勇也曰固是見得是義而為之不力然也是先時見得未分明若已見得分明則行之自有力這般處著兩下並看就見義不為上看回見得知之而不能為若從源頭上看下來乃是知之未至所以為之不力賀孫恪録別出子善問見義不為無勇也曰此直説眼前事若見得合做底事且須勇決行之若論本原上看則只是知未至若知至則當做底事自然做將去恪
