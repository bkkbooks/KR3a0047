body:
  text: 朱子語類卷二十七論語九里仁篇下子曰參乎章問一以貫之曰且要沈潜理㑹此是論語中第一章若看未透且看後面去却時時将此章来提省不要忘却久當自明矣時舉問一貫曰恁地汎看不濟事須從頭子細章章理會夫子三千門人一旦惟呼曾子一人而告以此必是他人承當未得今自家却要便去理會這處是自處於孔門二千九百九十九人頭上如何而可道夫一以貫之猶言以一心應萬事忠恕是一貫底注脚一是忠貫是恕底事栱夀一是一心貫是萬事看有甚事来聖人只是這箇心從周或問一貫曰如一條索曾子都将錢十千數了成百只是未串耳若他人則零亂錢一堆未經數便把一條索與之亦無由得串得銖問一貫之說曰須是要本領是本領若是事事發出来皆是本領若不是事事皆不是也時舉或問一以貫之以萬物得一以生為説曰不是如此一只是一二三四之一一只是一箇道理胡泳一是忠貫是恕道夫一者忠也以貫之者恕也體一而用殊人傑忠恕一貫忠在一上恕則貫乎萬物之間只是一箇一分著便各有一箇一老者安之是這箇一少者懐之亦是這箇一朋友信之亦是這箇一莫非忠也恕則自忠而出所以貫之者也謨忠是一恕是貫忠只是一箇真實自家心下道理直是見得事事物物接於吾前便只把這箇真實應副將去自家若有一毫虚偽事物之来要去措置他便都不實便都不合道理若自家真實事物之来合小便小合大便大合厚便厚合薄便薄合輕便輕合重便重一一都隨他面分應副将去無一事一物不當這道理賀孫道夫竊謂夫子之道如太極天下之事如物之有萬物雖有萬而所謂太極者則一太極雖一而所謂物之萬者未嘗虧也至於曾子以忠恕形容一貫之妙亦如今人以性命言太極也不知是否曰太極便是一到得生兩儀時這太極便在兩儀中生四象時這太極便在四象中生八卦時這太極便在八卦中道夫忠恕而已矣不是正忠恕只是借忠恕字貼出一貫底道理人多說人已物我都是不曾理會聖人又幾曾須以已度人自然厚薄輕重無不適當忠恕違道不逺乃是正名正位閎祖問忠恕而已矣曰此只是借學者之事言之若論此正底名字使不得這忠恕字又云忠字在聖人是誠恕字在聖人是仁但說誠與仁則說開了惟忠恕二字相粘相連續少一箇不得燾盡己為忠推己為恕忠恕本是學者事曾子特借来形容夫子一貫道理今且粗解之忠便是一恕便是貫有這忠了便做出許多恕来聖人極誠無妄便是忠問聖人之忠即是誠否曰是聖人之恕即是仁否曰是問在學者言之則忠近誠恕近仁曰如此則已理會得好了若中庸所説便正是學者忠恕道不逺人者是也忠恕違道不逺施諸已而不願亦勿施於人只是取諸己而已問明道以天地變化草木蕃為充擴得去底氣象此是借天地之恕以形容聖人之恕否曰是維天之命於穆不已一元之氣流行不息處便是忠淳主於内為忠見於外為恕忠是無一毫自欺處恕是稱物平施處德明忠因恕見恕由忠出閎祖說忠恕先生以手向自己是忠却翻此手向外是恕泳忠只是一箇忠做出百千萬箇恕来閎祖忠恕只是一件事不可作兩箇㸔端䝉忠恕只是體用便是一箇物事猶形影要除一箇除不得若未曉且看過去却時復潜玩忠與恕不可相離一歩道夫忠是體恕是用只是一箇物事如口是體說出話便是用不可将口做一箇物事說話底又做一箇物事淳忠是本根恕是枝葉非是别有枝葉乃是本根中發出枝葉枝葉即是本根曾子為於此事皆明白但未知聖人是搃處發出故夫子語之可學在聖人本不消言忠恕廣聖人是不犯手脚底忠恕學者是著工夫底忠恕不可謂聖人非忠恕也閎祖天地是無心底忠恕聖人是無為底忠恕學者是求做底忠恕僴論恕云若聖人只是流出来不待推節聖人之恕與學者異者只争自然與勉强聖人却是自然擴充得去不費力學者須要勉强擴充其至則一也端蒙夫子之道忠恕此忠自心而言之為人謀而不忠此忠主事而言也自心言者言一心之統體主事言者主於事而已端䝉問曾子何必待孔子提醒曰他只見得一事一理不知只是一理曰使孔子不提之久還自知否曰知可學總論曾子已前是一物格一知至到忠恕時是無一物不格無一知不至聖人分上著忠恕字不得曾子借此為說方子曾子一貫是他逐件事一做得到及聞夫子之言乃知只是這一片實心所為如一庫散錢得一條索穿了方子問曾子於孔子一貫之道言下便悟先来是未曉也曰曾子先於孔子之教者日用之常禮文之細莫不學来惟未知其本出於一貫耳故聞一語而悟其他人於用處未曾用許多工夫豈可遽與語此乎大雅云觀曾子問一篇許多變禮皆理㑹過直如此細密想見用工多大雅問一以貫之只是其用不同其體則一一箇本貫許多末先生問如何是末曰孝弟忠信居處有禮此是末曰今人只得許多名字其實不曉如孝弟忠信只知得這殻子其實不曉也只是一箇空底物事須是逐件零碎理㑹如一箇桶須是先将木来做成片子却将一箇篐来篐歛若無片子便把一箇篐去篐歛全然盛水不得曾子零碎處盡曉得了夫子便告之曰參乎吾道一以貫之他便應之曰唯貫如散錢一是索子曾子時盡得許多散錢只是無這索子夫子便把這索子與他今人錢也不識是甚麽錢有幾箇孔良久曰公沒一文錢只有一條索子又曰不愁不理㑹得一只愁不理㑹得貫理㑹貫不得便言一時天資髙者流為佛老低者只成一團鶻突物事在這裏又曰孔門許多人夫子獨告曾子是如何惟曾子盡曉得許多道理但未知其體之一節復問已前聞先生言借學者之事以明之甚疑忠恕對一以貫之不過今日忽然㸔得来對得極過一以貫之即忠恕忠恕即一以貫之如忠是盡己推出去為恕也只是一箇物事推出去做許多即一以貫之節於此中又見得學者亦有以貫之夫子固是一以貫之學者能盡己而又推此以及物亦是一以貫之所以不同者非是事體不同夫子以天學者用力曰學者無一以貫之夫子之道似此處疑有闕誤學者只是這箇忠推出来乾道變化如一株樹開一樹花生一樹子裏面便自然有一箇生意又曰忠者天道恕者人道天道是體人道是用動以天之天只是自然節周公謹問在内為忠在外為恕忠即體恕即用曰忠恕是如此夫子曰吾道一以貫之何故曾子曰忠恕而已矣曰是曾子曉得一貫之道故以忠恕名之先生曰且去一貫上看忠恕公是以忠恕解一貫曰一貫只是一理其體在心事父即為孝事君即為敬交朋友即為信此只是一貫曰大槩亦是公更去子細玩味治國平天下有許多條目夫子何故只說吾道一以貫之公謹次日復問吾道一以貫之聖人之道見於日用之間精粗小大千條萬目未始能同然其通貫則一如一氣之周乎天地之間萬物散殊雖或不同而未始離乎氣之一曰别又看得甚意思出曰夫子之告曾子直是見他曉得所以告他曰是也所以告曾子時無他只縁他曉得千條萬目他人連箇千條萬目尚自曉不得如何識得一貫如穿錢一條索穿得方可謂之一貫如君之於仁臣之於忠父之於慈子之於孝朋友之於信皆不離於此問門人是夫子之門人否曰是也夫子說一貫時未有忠恕及曾子說忠恕時未有體用是後人推出来忠恕是大本達道所以為一貫公謹復問莫是曾子守約故能如此曰不然却是曾子件件曾做来所以知若不曾躬行踐履如何識得公謹復問是他用心於内所以如此曰只是朴實頭去做了夫子告人不是見他不曾識所以告他曾子只是曾經歴得多所以告他子貢是識得多所以告他忠如瓶中之水恕如瓶中㵼在盞中之水忠是洞然明白無有不盡恕是知得為君推其仁以待下為臣推其敬以事君泳或問一貫如何却是忠恕曰忠者誠實不欺之名聖人将此放頓在萬物上故名之曰恕一猶言忠貫猶言恕若子思忠恕則又降此一等子思之忠恕必待施諸已而不願而後勿施諸人此所謂違道不逺若聖人則不待施諸己而不願而後勿施諸人也或問曾子能守約故孔子以一貫語之曰非也曾子又何曾守約来且莫看他别事只如禮記曾子問一篇他甚底事不曾理㑹来却道他守約則不可只縁孟子論三子養勇将曾子比北宫黝與孟施舍則曾子為守約者爾後世不悟却道曾子之學專一守約别不理㑹他事如此則成甚學也曾子學力到聖人地位故孔子以一貫語之不可道為他只能守約故與語此也去偽問忠恕一貫曰不要先将忠恕說且看一貫底意思如堯之克明俊徳黎民於變時雍夫子立之斯立動之斯和這須從裏面發出来方㑹如此曾子工夫已到如事親從兄如忠信講習千條萬緒一身親歴之聖人一㸃他便醒元来只從一箇心中流出来如夜来守約之說只是曾子篤實毎事必反諸身所謂孝所謂禮必窮到底若只守箇約却没貫處忠恕本未是說一貫縁聖人告以一貫之說故曾子借此二字以明之忠恕是學者事如欲子之孝於我必當先孝於親欲弟之弟於我必當先敬其兄如欲人不慢於我須先不慢於人欲人不欺我須先不欺於人聖人一貫是無作為底忠恕是有作為底将箇有作為底明箇無作為底又曰曾子是事實上做出子貢是就識上見得看来曾子從實處做一直透上去子貢雖是知得較似滯在知識上㝢敬之問一貫曰一貫未好便将忠恕壓在上說因及器之夜来所問云曾子正不是守約這處只見聖人許多實行一一做工夫得到聖人度得如此遂告以吾只是從這心上流出只此一心之理盡貫衆理賀孫曾子答門人說忠恕只是解一以貫之看本文可見忠便貫恕恕便是那忠裏面流出来底聖人之心渾然一理盖他心裏盡包這萬理所以散出於萬物萬事無不各當其理履之問忠者天道恕者人道盖忠是未感而存諸中者所以謂之天道恕是已感而見諸事物所以謂之人道曰然或曰恐不可以忠為未感曰恁地說也不妨忠是不分破底恕是分破出来底仍舊只是這一箇如一碗水分作十盞這十盞水依舊只是這一碗水又曰這事難如今學者只是想像籠罩得是如此也想像得箇萬殊之所以一本一本之所以萬殊如一源之水流出為萬派一根之木生為許多枝葉然只是想像得箇意思如此其實不曾見得如曾㸃浴沂一段他却是真箇見得這道理而今學者只是想像得這一般意思知底又不實去做及至事上做得細㣲𦂳宻盛水不漏底又不曾見得那大本聖人教人都是教人實做将實事教人如格物致知以至灑掃應對無非就實地上指出教人僴義剛說忠恕一章畢先生良久曰聖人之應事接物不是各自有箇道理曾子見得似是各有箇道理故夫子告之如此但一貫道理難言故将忠恕来推明大要是說在已在物皆如此便見得聖人之道只是一胡叔器因問聖人是就理之體發来學者是就用上做工夫否曰不要恁地說只是一般聖人是天理上做學者也是就天理上做聖人也只是這一理學者也只是這一理不成是有兩箇天理但聖人底是箇渾淪底物事發出来便皆好學者是要逐一件去推然也是要全得這天理如一碗水聖人是全得水之用學者是取一盞喫了又取一盞喫其實都只是水忠便是就心上做底恕便是推出来底如那盡底也只一般但是聖人不待於推而學者尚要推耳義剛因問若把作體用說恐成兩截曰說體用便只是一物不成說香匙是火箸之體火箸是香匙之用如人渾身便是體口裏說話便是用不成說話底是箇物事渾身又是一箇物事萬殊便是這一本一本便是那萬殊義剛淳畧或問理一分殊曰聖人未嘗言理一多只言分殊盖能於分殊中事事物物頭頭項項理㑹得其當然然後方知理本一貫不知萬殊各有一理而徒言理一不知理一在何處聖人千言萬語教人學者終身從事只是理㑹這箇要得事事物物頭頭件件各知其所當然而得其所當然只此便是理一矣如顔子穎悟聞一知十固不甚費力曾子之魯逐件逐事一一根究著落到底孔子見他用功如此故告以吾道一以貫之若曾子元不曾理㑹得萬殊之理則所謂一貫者貫箇什麽盖曾子知萬事各有一理而未知萬理本乎一理故聖人指以語之曾子是以言下有得發出忠恕二字太煞分明且如禮儀三百威儀三千是許多事要理㑹做甚麽如曾子問一篇問禮之曲折如此便是理㑹得川流處方見得敦化處耳孔子於鄉黨從容乎此者也學者戒謹恐懼而謹獨所以存省乎此者也格物者窮究乎此者也致知者真知乎此者也能如此著實用功即如此著實到那田地而理一之理自森然其中一一皆實不虚頭說矣銖蜚卿問顔曾之學曰顔子大段聰明於聖人地位未達一間祗争些子耳其於聖人之言無所不曉所以聖人道囘也非助我者於吾言無所不說曾子遲鈍直是辛苦而後得之故聞一貫之說忽然猛省謂這箇物事元来只是恁地如人尋一箇物事不見終歳勤動一旦忽然撞著遂至驚駭到顔子只是平鋪地便見得没恁地差異道夫顔子聰明事事了了子貢聰明工夫粗故有闕處曾子魯却肯逐一用工捱去捱得這一件去便這一件是他底又捱一件去捱来捱去事事曉得被孔子一下喚醒云吾道一以貫之他便醒得盖他平日事理毎每被他看破事事到頭做便曉得一貫之語是實說也大學致知格物等說便是這工夫非虚謾也大雅子貢尋常自知識而入道人傑錄作自敏入道故夫子警之曰汝以予為多學而識之者歟對曰然非與曰非也予一以貫之盖言吾之多識不過一理爾曾子尋常自踐履入事親孝則真箇行此孝為人謀則真箇忠朋友交則真箇信故夫子警之曰汝平日之所行者皆一理耳惟曾子領略於片言之下故曰忠恕而已矣以吾夫子之道無出於此也我之所得者忠誠即此理安頓在事物上則為恕無忠則無恕盖本末體用也去偽以下兼論子貢章夫子於子貢見其地位故發之曾子已能行故只云吾道一以貫之子貢未能行故云賜汝以予為多學而識之可學所謂一貫者㑹萬殊於一貫如曾子是於聖人一言一行上一一踐履都子細理㑹過了不是黙然而得之觀曾子問中問喪禮之變曲折無不詳盡便可見曾子當時功夫是一一理㑹過来聖人知曾子許多道理都理㑹得便以一貫語之教他知許多道理却只是一箇道理曾子到此亦是他踐履處都理㑹過了一旦豁然知此是一箇道理遂應曰唯及至門人問之便云忠恕而已矣忠是大本恕是達道忠者一理也恕便是條貫萬殊皆自此出来雖萬殊却只一理所謂貫也子貢平日是於前言徃行上著工夫於見識上做得亦到夫子恐其亦以聖人為多學而識之故問之子貢方以為疑夫子遂以一貫告之子貢聞此别無語亦未見得子貢理㑹得理㑹不得自今觀之夫子只以一貫語此二人亦須是他承當得想亦不肯說與領㑹不得底人曾子是踐履篤實上做到子貢是愽聞强識上做到夫子舎二人之外别不曾說不似今人動便說一貫也所謂一者對萬而言今却不可去一上尋須是去萬上理㑹若只見夫子語一貫便将許多合做底事都不做只理㑹一不知却貫箇甚底㽦忠恕一以貫之曾子假忠恕二字以發明一貫之理盖曾子平日無所不學看禮記諸書曾子那事不理㑹来但未知所以一故夫子於此告之而曾子洞然曉之而無疑賀孫問告子貢一以貫之章集注云彼以行言此以知言是就二子所到上說如何曰看上下語脈是如此夫子告曾子曾子只說夫子之道忠恕而已矣這就行上說夫子告子貢乃云汝以予為多學而識之者與這是只就知上說賀孫因舉大學或問云心之為物實主於身其體則有仁義禮智信之性其用則有惻隠羞惡恭敬是非之情渾然在中隨感而應以至身之所具身之所接皆有當然之則而自不容已所謂理也元有一貫意思曰然施之君臣則君臣義施之父子則父子親施之兄弟則兄弟和施之夫婦則夫婦别都只由這箇心如今最要先理㑹此心又云通書一處說隂陽五行化生萬物五殊二實二本則一亦此意又云如千部文字萬部文字字字如此好面面如此好人道是聖賢逐一寫得如此聖人告之曰不如此我只是一箇印板印将去千部萬部雖多只是一箇印板又云且看論語如鄉黨等處待人接物千頭萬状是多少般聖人只是這一箇道理做出去明道說忠恕當時最錄得好賀孫曾子一貫忠恕是他於事物上各當其理日用之間這箇事見得一道理那箇事又見得一道理只是未曾湊合得聖人知其用力已到故以一貫語之問曾子於零碎曲折處都盡得只欠箇一以貫之否曰亦未都盡得但是大槩已得久則将自到耳問君子之道費而隠曾子於費處已盡得夫子以隠處㸃之否曰然問曾子篤實行處已盡聖人以一貫語之曾子便㑹曰忠恕而已矣子貢明敏只是知得聖人以一貫語之子貢尚未領畧曰然非與是有疑意曰子貢乃是聖人就知識學問語之曾子就行上語之語脈各不同須是見得夫子曰吾道一以貫之意思先就多上看然後方可說一貫此段恕字却好看方泝流以遡其源學者寜事事先了得未了得一字却不妨莫只懸空說箇一字作大罩了逐事事都未曾理㑹却不濟事所以程子道下學而上達方是實又云如人做塔先從下面大處做起到末梢自然合尖若從尖處做如何得僴問曾子一貫以行言子貢一貫以知言何也曰曾子發出忠恕是就行事上說孔子告子貢初頭說多學而識之便是就知上說曾子是就源頭上面流下来子貢是就下面推上去問曾子未聞一貫之前已知得忠恕未曰他只是見得聖人千頭萬緒都好不知都是這一心做来及聖人告之方知得都是從這一箇大本中流出如木千枝萬葉都好都是這根上生氣流注去貫也林問枝葉便是恕否曰枝葉不是恕生氣流注貫枝葉底是恕信是枝葉受生氣底恕是夾界半路来徃底信是定底就那地頭說發出忠底心便是信底言無忠便無信了淳謨錄云曾子一貫以行言子貢一貫以知言曾子言夫子忠恕只是就事上看夫子問子貢多學而識之便是知上說曾子見夫子所為千頭萬緒一一皆好譬如一樹枝葉花實皆可愛而其實則忠信根本恕猶氣之貫注枝葉若論信則又如花之必成實處忠信忠恕皆是體用恕如行将去信如到處所循物無違則是凡事皆實譬如水也夫子自源而下者也中庸所謂忠恕泝流而上者也或問夫子告曾子以吾道一以貫之與告子貢予一以貫之之說曰曾子是以行言子貢是以知言盖曾子平日於事上都積累做得来已周宻皆精察力行過了只是未透夫子才㸃他便透如孟子所謂有如時雨化之者是到這裏恰好著得一陣雨便發生滋榮無所凝滯子貢却是資質敏悟能曉得聖人多愛與他說話所以亦告之又問尹氏云此可見二子所學之淺深曰曾子如他與門人之言便有箇結纜殺頭亦見他符驗處子貢多是說過曉得了便休更没收殺大率子貢縁他曉得聖人多與他說話但都没收殺如子如不言處也没收殺或曰他言性與天道處却是他有得處否曰然燾今有一種學者愛說某自某月某日有一箇悟處後便覺不同及問他如何地悟又却不說便是曾子傳夫子一貫之道也須可說也須有箇来歴因做甚麽工夫聞甚麽說話方能如此今若云都不可說只是截自甚月甚日為始已前都不是已後都是則無此理已前也有是時已後也有不是時葢人心存亡之決只在一息之間此心常存則皆是此心才亡便不是聖賢教人亦只據眼前便著實做将去孟子猶自說箇存心養性若孔子則亦不說此様話但云學而時習之入則孝出則弟謹而信泛愛衆而親仁君子食無求飽居無求安敏於事慎於言就有道而正焉顔淵問仁則曰非禮勿視非禮勿聽非禮勿言非禮勿動仲弓問仁則曰出門如見大賓使民如承大祭已所不欲勿施於人司馬牛問仁則曰仁者其言也訒據此一語是司馬牛已分上欠闕底若使他從此著實做将去做得徹時亦自到他顔冉地位但學者初做時固不能無間斷做来做去做到徹處自然純熟自然光明如人喫飯相似今日也恁地喫明日也恁地喫一刻便有一刻工夫一時便有一時工夫一日便有一日工夫豈有截自某日為始前段都不是後段都是底道理又如曾子未聞一貫之說時亦豈全無是處他也須知得為人臣止於敬為人子止於孝為人父止於慈與國人交止於信如何是敬如何是孝如何是慈如何是信件件都實理㑹得了然後件件實做将去零零碎碎煞著了工夫也細摸得箇影了只是争些小在及聞一貫之說他便於言下将那實心来承當得體認得平日許多工夫許多様事千頭萬緒皆是此箇實心做将出来恰如人有一屋錢散放在地上當下将一條索子都穿貫了而今人元無一文錢却也要學他去穿這下穿一穿又穿不著那下穿一穿又穿不著似恁為學成得箇甚麽邊事如今誰不解說一以貫之但不及曾子者葢曾子是箇實底一以貫之如今人說者只是箇虚底一以貫之耳誠者物之終始不誠無物孔子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其参於前也在與則見其倚於衡也夫然後行只此是學只争箇做得徹與不徹耳孟子曰服堯之服誦堯之言行堯之行是堯而已矣服桀之服誦桀之言行桀之行是桀而已矣廣江西學者偏要說甚自得說甚一貫看他意思只是揀一箇儱侗底說話将来籠罩其實理㑹這箇道理不得且如曾子日用間做了多少工夫孔子亦是見他於事事物物上理㑹得這許多道理了却恐未知一底道理在遂来這裏提醒他然曾子却是已有這本領便能承當今江西學者實不曽有得這本領不知是貫箇甚麽嘗譬之一便如一條索那貫底物事便如許多散錢須是積得這許多散錢了却将那一條索来一串穿這便是一貫若陸氏之學只是要尋這一條索却不知道都無可得穿且其為說喫緊是不肯教人讀書只恁地摸索悟處譬如前面有一箇闗纔跳得過這一箇闗便是了此煞壊學者某老矣日月無多方待不說破来又恐後人錯以某之學亦與他相似今不奈何苦口說破某道他斷然是異端斷然是曲學斷然非聖人之道但學者稍肯低心向平實處下工夫那病痛亦不難見吾道一以貫之譬如聚得散錢已多将一條索来一串穿了所謂一貫須是聚箇散錢多然後這索亦易得若不積得許多錢空有一條索把甚麽来穿吾儒且要去積錢若江西學者都無一錢只有一條索不知把甚麽来穿又曰一只是一箇道理貫了或問忠恕曾子以前曾理㑹得否曰曾子於忠恕自是理㑹得了便将理㑹得底来解聖人之意其實借来直卿問一以貫之是有至一以貫之曰一只是一箇道理不用說至一問集注云聖人之心渾然一理泛應曲當用各不同此恐是聖人之心昭明融液無絲毫間斷隨事逐物泛應曲酬只是自然流出来曾子謂之忠恕雖是借此以曉學者然既能忠則心無欺曲無乂路即此推将去便是一已而至於自然而然則即聖人之所謂一矣曰如此則全在忠字上這段正好在恕字上看聖人之意正謂曾子每事已自做得是但事君只知是事君底道理事父只知是事父底道理事長只知是事長底道理未知其相貫通故孔子說我每日之間大事小事皆只是一箇道理而今却不識言意都倒說了且理㑹事事都要是若事都是不理㑹得那一不妨若事未是先去理㑹那一不濟事如做塔且從那低處濶處做起少間自到合尖處若只要從頭上做起却無著工夫處下學而上達下學方是實先生又云聖人與曾子說一貫處是說行與子貢說一貫處只說學問看多學而識之一句可見又問自此之外更無餘法亦無待於推矣惟只是推已之推否更無餘法是一理之外更無其他否曰聖人之忠恕自别不可将做尋常忠恕字看問才說恕字必須是推若不須推便是仁了曰聖人本不可說是忠恕曾子假借来說要之天地是一箇無心底忠恕聖人是一箇無為底忠恕學者是一箇著力底忠恕學者之忠恕方正定是忠恕且如不欺誑不妄誕是忠天地何嘗說我不可欺誑不可妄誕来如已所不欲勿施於人是恕天地何嘗說我要得性命之正然後使那萬物各正性命来聖人雖有心也自是不欺誑不妄誕我所不欲底事也自是不去做故程子曰天地無心而成化聖人有心而無為即是此意問程子言忠者天道恕者人道不是中庸所謂天道人道否曰不是大本便是天道達道便是人道這箇不可去泥定解他如子思說鳶飛戾天魚躍于淵相似只輕輕地傍邊傍說将去要之至誠無息一句已自剰了今看那一段不須字字去解亦不須言外求意自然裏面有許多道理今如此說倒鈍滯了所以聖人不胡亂說只說與曾子子貢二人曉得底其他如吾欲無言之類畧拈起些小来說都只是輕輕地說過說了便休若只管說来說去便自拖泥帶水胡泳下集注問曾子未知其體之一曰曾子偶未見得但見一箇事是一箇理不曾融㑹貫通然曾子於九分九釐九毫上都見得了即争這些子故夫子告之而今人却是因夫子之說又因後人說得分曉只是望見一貫影像便說體說用却不去下工夫而今只得逐件理㑹所以要格物致知䕫孫先生問坐間學者云吾道一以貫之如何是曾子但未知體之一處或云正如萬象森然者是曾子隨事精察力行處至於一元之氣所以為造化之妙者是曾子未知體之一處曰何故曾子既能隨事精察却不曉所以一處荅云曾子但能行其粗而未造其精曰不然聖人所以發用流行處皆此一理豈有精粗政如水相似田中也是此水池中也是此水海中也是此水不成說海水是精他處水是粗豈有此理縁他見聖人用處皆能隨事精察力行不過但見聖人之用不同而不知實皆此理流行之妙且如事君忠是此理事親孝也是此理交朋友也是此理以至精粗小大之事皆此一理貫通之聖人恐曾子以為許多般様故告之曰吾道一以貫之曾子真積力久工夫至到遂能契之深而應之速云而已矣者竭盡無餘之詞所以集注說自此之外固無餘法便是那竭盡無餘之謂聖人只是箇忠只是箇恕更無餘法學者則須推之聖人則不消如此只是箇至誠不息萬物各得其所而已這一箇道理從頭貫将去如一源之水流出為千條萬派不可謂下流者不是此一源之水人只是一箇心如事父孝也是這一心事君忠事長弟也只是這一心老者安少者懐朋友信皆是此一心精粗本末以一貫之更無餘法但聖人則皆自然流行出来學者則須是施諸己而不願而後勿施於人便用推将去聖人則動以天賢人則動以人耳又問盡己之忠聖人同此忠否曰固是學者與聖人所争只是這些箇自然與勉强耳聖人所行皆是自然堅牢學者亦有時做得如聖人處但不堅牢又㑹失却程子說孟子為孔子事業儘得只是難得似聖人如剪綵為花固相似只是無造化功龜山云孔子似知州孟子似通判權州譬得好又問先生解忠恕謂借學者盡己推己之目如程子說忠恕一以貫之則又自有聖人之忠恕曰這裏便自要理㑹得若曉得某說則曉程子之說矣又云忠是一恕是所以貫之中庸說忠恕違道不逺是下學上達之義即學者所推之忠恕聖人則不待推然學者但能盡己以推之於人推之既熟久之自能見聖人不待推之意而忠恕二字有不足言也明作壮祖錄云問一貫之㫖先生曰何故曾子能毎事精察而力行却未知其體之一趙兄曰曾子但見粗處未見精處先生曰若說精粗二字便壊了一貫之理譬之水在大江中固是此水流為池沼亦只是此水流為溝壑亦只是此水若曰池沼溝壑别是水之粗而大江中乃是水之精者其可哉夫子之道施之事父則為孝事君則為忠交朋則為信曾子見其事事曲當如此遂疑有許多般様而未知天下只是一箇大道理雖於逐事上有千般百緒只共是這一箇大道理曾子之所未達者尚有此耳一是忠所貫者恕忠是一箇實心萬法萬事皆自此出聖人只有這兩端外此更無餘事但聖人不待推學者須每事椎去但為之既熟則久之自能見聖人不待推之意而忠恕二字即不足言也問曾子未知其體之一用自體出體用不相離於其用處既已精察何故未知其體之一曰是他偶然未知曾子於九分九釐上皆透徹了獨此一釐未透今人只指箇見成底體用字来説却元不㑹下得工夫又問曾子借學者盡己推己之目而明之欲人之易曉曰這箇道理譬如一枝天然底花為人不識故作一枝假底花出来形容欲人識得箇模様又曰此章一項說天命一項說聖人一項說學者只是一箇道理又曰聖人是自然底忠恕學者是使然底忠恕儒相祖道錄云或問曾子一唯處如何曰曾子平日用功得九分九釐九毫都見得了只争這些子一聞夫子警省之便透徹了也又問未唯之前如何曰未唯之前見一事上是一箇理及唯之後千萬箇理只是一箇理又問以己及物推己及物如何曰在聖人都謂之仁在學者只是忠恕而已己欲立而立人己欲達而達人則是聖人之仁能近取譬便是學者之恕一箇是天然底道理一箇是人為底道理曾子以天然底難說只得把人為底說與他教他自此做得到盡處便是天然底所以如此説者要使當時問者曉得譬如将做底花去比生成底花自有優劣要之這一項說天命一項說聖人一項說學者其至只是一箇道理也欲為逐一分說如何是聖人底如何是學者底一向訓解未免有牴牾學者須是自體認始得或曰然則忠恕字如何㸔曰如此等字難為一一分說且去子細看得此様四五箇字透徹看他落在何界分将輕重參較久久自見今只說與終不濟事且如看地盤一般識得甲庚丙壬午子逐字捱将去永不差誤久之又曰要好時将此様十數箇字排在面前前賢所說逐一細看教心通意㑹便有所得也賜錄云問忠恕曰解此處大段用力一箇是天然底一箇是人為底譬如假花来形容生花一般為是生花難說故把假花形容引他意思出来然一項說天命一項說聖人一項說學者要之只是一箇道理問一貫注言葢已隨事精察而力行之但未知其體之一耳未知其體之一亦是前所說乎曰參也以魯得之他逐件去理㑹曾子問喪禮到人情委曲處無不講究其初見一事只是一事百件事是百件事得夫子一㸃醒百件事只是一件事許多般様只一心流出曾子至此方信得是一箇道理問自後學言之便道已知此是一理今曾子用許多積累工夫方始見得是一貫後學如何便曉得一貫曰後人只是想像說正如矮人看戯一般見前面人笑他也笑他雖眼不曽見想必是好笑便隨他笑又曰曾㸃所見不同方當侍坐之時見三子言志想見有些下視他幾箇作而言曰異乎三子者之撰看其意有鳳凰翔于千仞底氣象荘子中說孟子反于琴張喪側或琴或歌㸃亦只是此輩流渠若不得聖人為之依歸須一向流入莊老去㝢叔器問聖人之忠恕與學者之忠恕曰這不是說一貫便是忠恕忠恕自是那一貫底注脚只是曾子怕人曉那一貫不得後将這言語来形容不是說聖人是忠恕今若曉得一貫便曉得忠恕曉得忠恕便曉得一貫今且說那渾全道理便是忠那隨事逐物串歛来底便是恕今若要做那忠恕去湊成聖人忠恕做那忠恕去湊成一貫皆不是某分明說此只是曾子借此以推明之義剛而今不是一本處難認是萬殊處難認如何就萬殊上見得皆有恰好處又云到這裏只見得一本萬殊不見其他卓中心為忠如心為恕此語見周禮疏銖問如心為恕曰如此也比自家心推将去仁之與恕只争些子自然底是仁比而推之便是恕道夫蜚卿問恕字古人所說有不同處如巳所不欲勿施於人便與大學之絜矩程子所謂推已都相似如程子所引乾道變化各正性命及大學中說有諸己而後求諸人却兼通不得如何曰也只是一般但對副處别子細看便可見今人只是不曾子細看某當初似此類都逐項冩出一字對一字看少間紙上底通心中底亦脫然且如乾道變化各正性命各正性命底便如乾道變化底所以為恕直卿問程子言如心為恕如心之義如何曰萬物之心便如天地之心天下之心便如聖人之心天地之生萬物一箇物裏面便有一箇天地之心聖人於天下一箇人裏面便有一箇聖人之心聖人之心自然無所不到此便是乾道變化各正性命聖人之忠恕也如己所不欲勿施於人便是推己之心做到那物上賢者之忠恕也這事便是難且如古人云不廢困窮不虐無吿自非大無道之君孰肯廢虐之者然心力用不到那上便是自家廢虐之須是聖人方且㑹無一處不到又問以己及物仁也推己及物恕也上句是聖人之恕下句是賢者之恕否曰上箇是聖人之恕下箇賢者之仁聖人之恕便是衆人之仁衆人之仁便是聖人之恕道夫揚問以己推己之辯先生反問如何曰以己是自然底意思推己是反思底意思曰然以己是自然流出如孔子老者安之朋友信之少者懐之推己便有折轉意如己欲立而立人己欲達而達人㝢因問推廣得去則天地變化草木蕃推廣不去天地閉賢人隠如何曰亦只推己以及物推得去則物我貫通自有箇生生無窮底意思便有天地變化草木蕃氣象天地只是這様道理若推不去物我隔絶欲利於己不利於人欲己之富欲人之貧欲己之夀欲人之天似這氣象全然閉塞隔絶了便似天地閉賢人隠㝢問以己推己之辨曰以己是自然推己是著力己欲立而立人己欲達而達人是以己及人也近取諸身譬之他人自家欲立知得人亦欲立方去扶持他使立自家欲達知得人亦欲達方去扶持他使達是推己及人也淳胡問以己及物以字之義曰以己及物是大賢以上聖人之事聖人是因我這裏有那意思便去及人如未饑未見得天下之人饑未寒未見得天下之人寒因我之饑寒便見得天下之饑寒自然恁地去及他便是以己及物如賢人以下知得我既是要如此想人亦要如此而今不可不教他如此三反五折便是推己及物只是争箇自然與不自然義剛以己及物是自然及物己欲立便立人己欲達便達人推己及物則是要逐一去推出如我欲恁地便去推與人也合恁地方始有以及之如喫飯相似以己及物底便是我要喫自是教别人也喫不待思量推己及物底便是我喫飯思量道别人也合當喫方始與人喫義剛恕之得名只是推己故程先生只云推己之謂恕曾子言夫子之道忠恕此就聖人說却只是自然不待勉强而推之其字釋却一般端䝉以己及物仁也一以貫之是也推己及物恕也違道不逺是也葢是明道之說第一句只是懸空說一句違道不逺只粘著推己及物說䕫孫問程子謂以己及物仁也推己及物恕也違道不逺是也以己及物仁也與違道不逺不相闗莫只是以此分别仁恕否曰自是不相闗只是以此形容仁恕之定名端蒙問明道言忠者天道恕者人道何也曰忠是自然恕隨事應接略假人為所以有天人之辯壮祖忠者天道恕者人道此天是與人對之天若動以天也之天即是理之自然又曰聖賢之言夫子言一貫曾子言忠恕子思言小徳川流大徳敦化張子言理一分殊只是一箇卓問天道人道初非以優劣言自其渾然一本言之則謂之天道自其與物接者言之則謂之人道耳曰然此與誠者天之道誠之者人之道語意自不同閎祖一貫忠恕先生曰此是曾子平日用工於逐事逐物上都理㑹過了但未知一貫爾故夫子喚醒他忠者天道恕者人道忠者無妄恕者所以行乎忠也先生顧曰恕者所以行乎忠也一句好看又曰便與中庸大徳敦化小徳川流相似炎忠者盡己之心無少偽妄以其必於此而本焉故曰道之體恕者推己及物各得所欲以其必由是而之焉故曰道之用端䝉忠恕一段明道解得極分明其曰以己及物仁也推己及物恕也忠恕違道不逺是也分明自作一截說下面忠恕一貫之以下却是言聖人之忠恕故結云所以與違道不逺異者動以天爾若曰中庸之言則動以人爾端䝉忠恕違道不逺此乃畧下教人之意下學而上達也盡己之謂忠推己及物之謂恕忠恕二字之義只當如此說曾子說夫子之道而以忠恕為言乃是借此二字綻出一貫一貫乃聖人公共道理盡己推己不足以言之縁一貫之道難說與學者故以忠恕曉之賀孫忠恕違道不逺與夫子之道忠恕只消看他上下文便自可見如中庸施諸己而不願亦勿施諸人勿者禁止之辭豈非學者之事論語之言分明先有箇夫子之道字豈非聖人之事端蒙忠恕違道不逺正是說忠恕一以貫之之忠恕却是升一等髙一是忠貫是恕譬如一泓水聖人自然流出灌溉百物其他人須是推出来灌溉此一貫所以為天至子思忠恕只是人所以說違道不逺盡己之謂忠推己之謂恕才是他人便須是如此泳問到得忠恕己是道如何又云違道不逺曰仁是到忠恕正是學者著力下工夫處施諸己而不願亦勿施於人子思之說正為下工夫夫子之道忠恕而已矣却不是恁地曾子只是借這箇說維天之命於穆不已乾道變化各正性命便是天之忠恕純亦不已萬物各得其所便是聖人之忠恕施諸己而不願亦勿施於人便是學者之忠恕賀孫曾子忠恕與子思忠恕不同曾子忠恕是天子思忠恕尚是人在泳問忠恕而已矣與違道不逺己所不欲等處不同而程先生解釋各有異意如何曰先理㑹忠恕而已一句如明道說動以天之類只是言聖人不待勉强有箇自然底意思如己所不欲勿施於人施諸己而不願亦勿施諸人看箇勿字便是禁止之辭故明道曰以己及物仁也推己及物恕也正是如此分别或曰南軒解此云聖人全乎此天之道也曾子稱夫子忠恕是矣賢者求盡夫此人之道也子思稱忠恕是矣曰此亦說得好諸友却如何看謨曰集注等書所謂盡己為忠道之體也推己為恕道之用也忠為恕體是以分殊而理未嘗不一恕為忠用是以理一而分未嘗不殊此固甚明矣曰夫子只說吾道一以貫之曾子說此一自正是下箇注脚如何却横将忠恕入来解說一貫字程子解此又如何曰以己及物為仁推己及物為恕又却繼之曰此與違道不逺異者動以天爾如此却是剰了以己及物一句如何謨曰莫是合忠恕而言便是仁否先生稱善謨曰只於集注解第二節處得之如曰聖人至誠無息而萬物各得其所便是合忠恕是仁底意思曰合忠恕正是仁若使曾子便將仁解一貫字却失了體用不得謂之一貫爾要如此講貫方盡謨問論語中庸言忠恕不同之意曰盡己之謂忠推己之謂恕中庸言忠恕違道不逺是也此是學者事然忠恕功用到底只如此曾子取此以明聖人一貫之理耳文蔚錄云曾子借學者以形容聖人若聖人之忠恕只說得誠與仁字聖人渾然天理則不待推自然從此中流出也盡字與推字聖人盡不用得若學者則須推故明道云以己及物仁也推己及物恕也違道不逺是也自是兩端伊川說中庸則只說是下學上達又說是子思掠下教人明道說論語則曰一以貫之大本達道也與違道不逺異者動以天耳伊川曰維天之命於穆不已忠也乾道變化各正性命恕也此規模又别大雅云程先生說忠恕形容一貫之理在他人言則未必盡在曾子言之必是盡曰此說得最好然一字多在忠上多在恕上大雅云多在忠上曰然程子說得甚分明復將元說成段看後来多被學者将元說拆開分布在他處故意散亂不全難看大雅問維天之命於穆不已忠也乾道變化各正性命恕也曰恕字正在兩隔界頭只看程子說盡己之謂忠推己之謂恕便分明恕是推己及物使各得其所處盡物之謂信人傑劉問忠恕曰忠即是實理忠則一理恕則萬殊如維天之命於穆不已亦只以這實理流行發生萬物牛得之為牛馬得之而為馬草木得之而為草木卓維天之命於穆不已不其忠乎此是不待盡而忠也乾道變化各正性命不其恕乎此是不待推而恕也廣忠貫恕恕貫萬事維天之命於穆不已不其忠乎是不忠之忠乾道變化各正性命不其恕乎是不恕之恕天地何嘗道此是忠此是恕人以是名其忠與恕故聖人無忠恕所謂己所不欲勿施於人乃學者之事士毅曾子所言只是一箇道理但假借此以示門人如程子所言維天之命於穆不已乾道變化各正性命此天地無心之忠恕夫子之道一貫乃聖人無為之忠恕盡己推己乃學者著力之忠恕固是一箇道理在三者自有三様且如天地何嘗以不欺不妄為忠其化生萬物何嘗以此為恕聖人亦何嘗以在己之無欺無妄為忠若汎應曲當亦何嘗以此為恕但是自然如此故程子曰天地無心而成化聖人有心而無為此語極是親切若曉得曾子意思雖則是忠恕二字而發明一貫之㫖昭然但此話難說須自意㑹若只管說来說去便拖泥帶水又云夜来說忠恕論著忠恕名義自合依子思忠恕違道不逺是也曾子所說却是移上一階說聖人之忠恕到程子又移上一階說天地之忠恕其實只一箇忠恕須自看教有許多等級分明僴正淳問伊川云乾道變化各正性命恕也乾道變化猶是說上體事至各正性命方是恕否曰乾道變化各正性命正相夾界半路上說程子謂盡己之謂忠推己之謂恕又為盡物之謂信如乾道變化便是盡己處各正性命是推以及物處至於推到物上使物物各得其所處方是盡物便是信問侯師聖云草木蕃與各正性命如何曰尋常數家便說草木蕃是草木暢茂天造草昧之意故指来說恕字不甚著各正性命說推己及物然當時只是指此兩句来說㽦徐仁父問充擴得去則天地變化草木蕃充擴不去則天地閉賢人隠如何曰只管充擴将去則萬物只管各得其分只就已所不欲勿施於人上面擴充将去若充之於一家則一家得其所充之於一國則一國得其所無施而不得其所便是天地變化草木蕃若充擴不去則這裏出門便行不得便窒塞了如何更施諸人此便是天地閉賢人隠底道理卓賀孫錄同以下集義呉仁父問充擴得去則天地變化草木蕃充擴不去則天地閉賢人隠是氣象如此是實如此曰似恁地恕只是推得去推不去底人只要理㑹自己不管别人别人底事便說不關我事今如此人便為州為縣亦只理㑹自己百姓盡不管他直是推不去又問恕字恁地濶曰所以道一言而可以終身行之者其恕乎又曰也須是忠無忠把甚麽推出来節天地變化是忠忠則一草木蕃是恕恕則萬状天地閉賢人隠是理當如此非如人之不恕是有吝意恕如春不恕如冬節草木蕃如說草木暢茂人傑一譬如元氣八萬四千毛孔無不通貫是恕也又曰一以貫之只是萬事一理伊川謂言仁義亦得盖仁是統體義是分别某謂言禮樂亦得樂統同禮辯異言畢復抗聲而誦曰天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉道夫忠恕是工夫公平則是忠恕之効所以謂其致則公平致極至也道夫問吾道一以貫伊川云多在忠上看得来都在忠上貫之却是恕曰雖是恕却是忠流出貫之可學問盡物之謂恕與推己之謂恕如何推己只是忠中流出曰方流出未可謂之盡曰盡物之謂信是物實得此理故曰盡物曰然可學問侯氏云盡物之謂恕程子不以為然何也曰恕字上著盡字不得恕之得名只是推己盡物却是於物無所不盡意思自别端䝉衆朋友再說忠恕章畢先生曰将孔子說做一様看将曾子說做一様看将程子說又做一様看又曰聖人之恕無轍迹學者則做這一件是當了又把這様子去做那一件又把這様子去做十件百件千件都把這様子去做便是推到下梢都是這箇様子便只是一箇物或問先生與范直閣論忠恕還與集注同否曰此是三十嵗以前書大槩也是然說得不似而今看得又較别亞夫問忠恕而已矣曰此曾子借學者忠恕以明一貫之妙葢一貫自是難說得分明惟曾子将忠恕形容得極好學者忠恕便待推方得才推便有比較之意聖人更不待推但老者安之少者懐之朋友信之便是聖人地位如一泓水在此自然分流四出借學者忠恕以形容一貫猶所謂借粗以形容細趙至道云如所謂堯舜之道孝弟否曰亦是但孝弟是平說曾子說忠恕如說小徳川流大徳敦化一般自有交闗妙處當時門弟想亦未曉得惟孔子與曾子曉得自後千餘年更無人曉得惟二程說得如此分明其門人更不曉得惟侯氏謝氏曉得某向来只惟見二程之說却與胡籍溪范直閣說二人皆不以為然及後来見侯氏說得元来如此分明但諸人不曾子細看爾直卿云聖人之忠是天之天聖人之恕是天之人忠恕只是學者事不足以言聖人只是借言爾猶云亹亹文王文王自是純亦不已亹亹不足以言之然亹亹便有純亦不已意思又云忠猶木根恕猶枝葉條榦南升忠恕一貫聖人與天為一渾然只有道理自然應去不待盡己方為忠不待推己方為恕不待安排不待忖度不待覩當如水源滔滔流出分而為支派任其自然不待布置入那溝入這瀆故云曾子怕人曉不得一貫故借忠恕而言某初年看不破後得侯氏所收程先生語方曉得又云自孔子告曾子曾子說下在此千五百年無人曉得待得二程先生出方得明白前前後後許多人說今看来都一似說夢子善云初曉忠者天道恕者人道不得後畧曉得因以二句解之云天道是自然之理具人道是自然之理行直卿云就聖人身上說忠者天之天恕者天之人就學者身上說忠者人之天恕者人之人曰要之只是箇小徳川流大徳敦化意思賀孫方叔問忠恕一理却似說箇中和一般曰和是已中節了恕是方施出處且如忠恕如何是一貫曰無間斷便是一貫曰無物如何見得無間斷葢忠則一纔推出去便貫了此忠恕所以為一以貫之葢是孔子分上事如老者安之少者懐之朋友信之此孔子之忠恕餘人不得與焉忠恕一也然亦有分數若中庸所謂忠恕只是施諸己而不願亦勿施於人此則是賢人君子之所當力者程子觀之亦精矣然程門如尹氏輩亦多理㑹不曾到此若非劉質夫謝上蔡侯師聖之徒記得如此分曉則切要處都黑了大雅忠便是一恕便是貫自一身言之心便是忠應於事者便是恕龜山之說不然某舊時與諸公商量此段都說道龜山便是明道說某深以為不然更無路得分疏後来把程先生說自看来看去乃大分明以此知聽說話難須是心同意契纔說便領畧得龜山說得恁地差来不是他後来說得差是他當初與程先生對面說時領畧不得這意思如今諸公聽某說話若不領畧得茫然聽之只是徒然程先生那一段是劉質夫記想他須是領畧得兼此段可笑舊時語錄元自分而為兩自以己及物至違道不逺是也為一段自吾道一以貫之為一段若只據上文是看他意不出然而後云此與違道不逺異者動以天爾自說得分明正與違道不逺是也相應更一段說某事亦散而為三賀孫明道解忠恕章初本分為兩段後在籍溪家見却只是一段遂合之其義極完備此語是劉質夫所記無一字錯可見質夫之學其他諸先生如楊尹拘於中庸之說也自看明道說不曾破謝氏一作侯却近之然亦有見未盡處端䝉二程之門解此章者惟上蔡深得二先生之㫖其次則侯師聖其餘雖㳺楊尹皆說不透忠恕是足以貫道忠故一恕故貫也洽問忠雖已發而未及接物侯氏釋維天之命於穆不已乃云春生冬藏歳歳如此不誤萬物是忠如何曰天不春生冬藏時合有箇心公且道天未春生冬藏時有箇心在那裏這箇是天之生物之心無停無息春生冬藏其理未嘗間斷到那萬物各得其所時便是物物如此乾道變化各正性命各正性命是那一草一木各得其理變化是箇渾全底義剛問維天之命於穆不已不其忠乎曰今但以人觀天以天觀人便可見在天便是命在人便是忠要之便是至誠不息因論集義諸家忠恕之說曰若諸家所言却是曾子自不識其所謂一貫夫子之道却是二以分之不是一以貫之道夫吾道一以貫之今人都祖張無垢說合人己為一貫這自是聖人說這道理如此如何要合人己說得如所謂汝以予為多學而識之者與曰非也予一以貫之這箇又如何要将人己說得多是看聖賢文字不曾子細纔於半中央接得些小意思便道只是恁地又說及陳叔向也自說一様道理某嘗說這様說話得他自立箇說說道我自所見如此也不妨只是被他說出一様却将聖賢言語硬折入他窩窟裏面據他說底聖賢意思全不如此賀孫因有援引此類說忠恕者曰今日浙中之學正坐此弊多强将名義比類牽合而說要之學者須是將許多名義如忠恕仁義孝弟之類各分析區處如經緯相似使一一有箇著落将来這箇道理熟自有合處譬如大槩舉南康而言皆是南康人也却須去其間識得某人為誰某人在甚處然後謂之識南康人也去偽問或云忠恕只是無私已不責人曰此說可恠自有六經以来不曾說不責人是恕若中庸也只是說施諸己而不願亦勿施於人而已何嘗說不責人不成只取我好别人不好更不管他於理合管如子弟不才係吾所管者合責則須責之實可只說我是恕便了論語只說躬自厚而薄責於人謂之薄者如言不以己之所能必人之如已隨材責任耳何至舉而弃之大雅君子喻於義章問喻於義章曰小人之心只曉㑹得那利害君子之心只曉㑹得那義理見義理底不見得利害見利害底不見得義理卓君子喻於義小人喻於利君子只知得箇當做與不當做當做處便是合當如此小人則只計較利害如此則利如此則害君子則更不顧利害只看天理當如何宜字與利字不同子細看僴文振問此章曰義利只是箇頭尾君子之於事見得是合如此處處得其宜則自無不利矣但只是理㑹箇義却不曾理㑹下面一截利小人却見得下面一截利却不理㑹事之所宜往往兩件事都有利但那一件事之利稍重得分毫便去做那一件君子之於義見得委曲透徹故自樂為小人之於利亦是於曲折纎悉間都理㑹得故亦深好之也時舉南升錄見存問君子喻於義義者天理之所宜凡事只看道理之所宜為不顧已私利者人情之所欲得凡事只任私意但取其便於己則為之不復顧道理如何曰義利也未消說得如此重義利猶頭尾然義者宜也君子見得這事合當如此却那事合當如彼但裁處其宜而為之則何不利之有君子只理㑹義下一截利處更不理㑹小人只理㑹下一截利更不理㑹上一截義葢是君子之心虚明洞徹見得義分明小人只管計較利雖絲毫底利也自理㑹得南升君子喻於義小人喻於利只是一事上君子於此一事只見得是義小人只見得是利且如有白金遺道中君子過之曰此他人物不可妄取小人過之則便以為利而取之矣賀孫喻義喻利不是氣禀如此君子存得此心自然喻義小人陷溺此心故所知者只是利若說氣禀定了則君子小人皆由生定學力不可變化且如有金在地君子便思量不當得小人便認取去又云父母之年不可不知一則以喜一則以懼正如喻義喻利皆是一事上有兩段只此一物君子就上面自喻得義小人只是喻得利了父母之年孝子之心既喜其夀又懼其衰君子小人只共此一物上面有取不取明作喻義喻利只是這一事上君子只見得是義小人只見得是利如伯夷見飴曰可以養老盜跖見之曰可以沃户樞盖小人於利他見這一物便思量做一物事用他計較精宻更有非君子所能知者縁是他氣禀中自元有許多鏖糟惡濁底物所以纔見那物事便出来應他這一箇穿孔便對那箇穿孔君子之於義亦是如此或曰伊川云惟其深喻是以篤好若作惟其篤好是以深喻也得曰陸子静說便是如此僴居父問君子喻於義小人喻於利曰這只就眼前看且如今做官須是恁地㢘勤自君子為之只是道做官合著如此自小人為之他只道如此做可以得人說好可以求知於人昨有李某當夀皇登極之初上一書極說道學恁地不好那時某人在要路故以此說投之即得超升上州教官前日某方赴召到行在忽又上一書極稱道學之美他便道某有甚勢要便以此相投極好笑賀孫問集注謂義者天理之所宜仁說又謂義者宜之理意有異否曰只宜處便是義宜之理理之宜都一般但做文恁地變只如冷底水熱底水水冷底水熱底一般淳見賢思齊焉章見賢思齊焉見不賢而内自省也見人之善而尋己之善見人之惡而尋己之惡如此方是有益事父母幾諫章問幾諫曰幾㣲也只是漸漸細宻諫不恁峻暴硬要闌截内則下氣怡色柔聲以諌便是解此意淳問幾㣲也㣲還是見㣲而諫還是下氣怡色柔聲以諫曰幾㣲只得做下氣怡色柔聲以諫且如今人做事亦自驀地做出来那裏去討幾㣲處若要做見幾而諫除非就本文添一兩字始得賀孫又敬不違不違是主那諌上說敬已是順了又須委曲作道理以諫不違去了那幾諫之意也僴問集注舉内則與其得罪於鄉黨州閭寜熟諫将来說勞而不怨禮記說勞字似作勞力說如何曰諫了又諌被撻至於流血可謂勞矣所謂父母喜之愛而不忘父母惡之勞而不怨勞只是一般勞㝢問幾㣲也㣲諫者下氣怡色柔聲以諫也見得孝子深愛其親雖當諫過之時亦不敢伸己之直而辭色皆婉順也見志不從又敬不違才見父母心中不從所諫便又起敬起孝使父母歡恱不待父母有難從之辭色而後起敬起孝也若或父母堅不從所諫甚至怒而撻之流血可謂勞苦亦不敢疾怨愈當起敬起孝此聖人教天下之為人子者不惟平時有愉色婉容雖遇諫過之時亦當如此甚至勞而不怨乃是深愛其親也曰推得也好又云又敬不違者上不違㣲諫之意切恐唐突以觸父母之怒下不違欲諫之心務欲置父母於無過之地其心心念念只在於此若見父母之不從恐觸其怒遂止而不諫者非也欲必諫遂至觸其怒亦非也南問自幾諫章至喜懼章見得事親之孝四端具焉但覺得仁愛之意分外重所以孝弟為仁之本立愛自親始曰是如此惟是初發先是愛故較切所以告子見得不全便只把仁做中出便一向把義做外来看了賀孫問謝氏説幾諫章曰以敬孝易以愛孝難恐未安曰聖人荅人問孝多就人資質言之在子夏則少於愛在子游則少於敬不當遂斷難易也如謝氏所引兩句乃是荘子之說此與阮籍居喪飲酒食肉及至慟哭嘔血意思一般篾棄禮法專事情愛故也人傑集義父母在章問父母在不逺遊遊必有方曰為人子須是以父母之心為心父母愛子之心未嘗少置人子愛親之心亦當跬步不忘若是逺逰不惟父母思念之切人子去親庭既逺溫凊定省之禮自此間闊所以不逺逰如或有事勢須當逰亦必有定所欲親知己之所在而無憂召己則必至而無失父母之年章一則以喜一則以懼只是這一事上既喜其夀只這夀上又懼其来日之無多注中引既喜其夀又懼其衰㣲差些如此却是兩事矣僴古者言之不出章古者言之不出恥躬之不逮也此章緊要在恥字上若是無恥底人未曾做得一分便說十分矣僴人之所以易其言者以其不知空言無實之可恥也若恥則自是力於行而言之出也不敢易矣這箇只在恥上僴集注引范氏說最好只縁輕易說了便把那行不當事非踐履到底烏能言及此明作以約失之章以約失之者鮮約字是實字若約之于中約之于禮則約字輕明作問以約失之者鮮凡人須要檢束令入規矩準繩便有所據守方少過失或是侈然自肆未有不差錯曰說得皆分明南升以約失之者鮮矣凡事要約約底自是少失矣或曰恐失之吝嗇如何曰這約字又不如此只凡事自收歛若是吝嗇又當放開這箇要人自稱量看便得如老子之學全是約極而至於楊氏不肯㧞一毛以利天下其弊必至此然清虚寡慾這又是他好處文景之治漢曹參之治齊便是用此本朝之仁宗元祐亦是如此事事不敢做兵也不敢用財也不敢用然終是少失如熙豐不如此便多事僴君子欲訥於言章問言懼其易故欲訥訥者言之難出諸口也行懼其難故欲敏敏者力行而不惰也曰然南升徳不孤章問徳不孤必有鄰鄰是朋類否曰然非惟君子之徳有類小人之徳亦自有類僴徳不孤以理言必有鄰以事言僴論語中徳不孤是同聲相應同氣相求吉人為善便自有吉人相伴凶徳者亦有凶人同之是徳不孤必有鄰也易中徳不孤謂不只一箇徳盖内直而外方内外皆是徳故不孤是訓爻辭中大字若有敬而無義有義而無敬即孤矣㽦問徳不孤必有鄰曰此處恐不消得引易中来說語所說徳不孤必有鄰只云有如此之徳必有如此之類應如小人不為善必有不善之人應之易中言敬以直内須用義以方外義以方外須用敬以直内孤猶偏也敬義既立則徳不偏孤言徳盛若引易中来說恐将論語所說攪得没理㑹了南升問語云徳不孤必有鄰是與人同饒本作是說人之相從易云敬義立而徳不孤却是說徳不孤吝饒本作徳之大明道却指此作與物同如何曰亦未安可學徳不孤是善者以類應謝楊引繫辭簡易之文說得未是只用伊川說言徳不孤必有鄰是事之驗謨事君數章問集注引胡氏一段似專主諫而言恐交際之間如諂媚之類亦是數不止是諫曰若說交際處煩數自是求媚於人則索性是不好底事了是不消說以諫而數者却是意善而事未善耳故聖人特言之以警學者雉朱子語類卷二十七
