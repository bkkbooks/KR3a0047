body:
  text: 朱子語類卷八十六禮三周禮總論曹問周禮曰不敢教人學非是不可學亦非是不當學只為學有先後先須理㑹自家身心合做底學周禮却是後一截事而今且把來說㸔還有一句干渉吾人身心上事否今只有周禮儀禮可全信禮記有信不得處又曰周禮只疑有行未盡處㸔來周禮規模皆是周公做但其言語是他人做今時宰相提舉勅令豈是宰相一一下筆有不是處周公須與改至小可處或未及改或是周公晚年作此大抵說制度之書惟周禮儀禮可信禮記便不可深信周禮畢竟出於一家謂是周公親筆做成固不可然大綱却是周公意思某所疑者但恐周公立下此法却不曽行得盡文蔚僴録云周禮是一箇草夲尚未曾行問周禮曰未必是周公自作恐是當時如今日編修官之類為之又官名與他書所見多有不同恐是當時作此書成見設官太多遂不用亦如唐六典今存唐時元不曾用又笑曰禁治蝦蟇已專設一官豈不酷耶浩周禮胡氏父子以為是王莽令劉歆撰此恐不然周禮是周公遺典也徳明周禮一書好㸔廣大精宻周家法度在裏但未敢令學者㸔方子周禮一書也是做得來縝宻眞箇盛水不漏廣子升問周禮如何㸔曰也且循注䟽㸔去第一要見得聖人是箇公平底意思如陳君舉說天官之職如膳羞衣服之官皆属之此是治人主之身此說自是到得中間有官属相錯綜處皆謂聖人有使之相防察之意這便不是天官是正人主之身兼統百官地官主教民之事大綱已具矣春夏秋冬之官各有所掌如太史等官属之宗伯葢以祝史之事用之祭祀之故職方氏等属之司馬葢司馬掌封疆之政最是大行人等官属之司寇難曉葢儀禮覲禮諸侯行禮既畢出乃右肉袒于廟門之東王曰伯父無事歸寜乃邦然後再拜稽首出自屏此所謂懐諸侯則天下畏之是也所以属之司宼如此等處皆是合著如此初非聖人私意大綱要得如此看其間節目有不可曉處如官職之多與子由所疑三處之類只得且缺之所謂其詳不可得而聞也或謂周公作此書有未及盡行之者恐亦有此理只如今時法令其間頗有不曾行者木之因說舊時妄意㸔此書大綱是要人主正心修身齊家治國平天下使天下之氏無不被其澤又推而至於鳥獸草木無一不得其所而後已不如是不足以謂之裁成輔相參贊天地耳曰是恁地須要識公平意思因說如今學問不考古固不得若一向去採摭故事零碎湊合說出來也無甚益孟子慨然以天下自任曰當今之世舍我其誰到說制度處只說諸侯之禮吾未之學嘗聞其略也要之後世若有聖賢出來如儀禮等書也不應便行得如封建諸侯桞子厚之說自是當時却是他各自推戴為主聖人從而定之耳如今若要將一州一縣封某人為諸侯人亦未必安之兼數世之後其弊非一如鄉飲酒之禮若要教天下之人都如此行也未必能只後世太無制度若有聖賢為之就中定其尊卑隆殺之數使人可以通行這便是禮為之去其哇淫鄙俚之辭使之不失中和歡悅之意這便是樂木之周禮中多有說事之綱目者如屬民讀法其法不可知司馬職乃陳車徒如戰之陳其陳法亦不可見矣人傑周都豐鎬則王畿之内當有西北之戎如此則稍甸縣都如之何可為也曰周禮一書聖人姑為一代之法爾到不可用法處聖人須别有通變之道去偽今人不信周官若據某言却不恁地葢古人立法無所不有天下有是事他便立此一官但只是要不失正耳且如女巫之職掌宮中巫祝之事凡宮中所祝皆在此人如此則便無後世巫蠱之事矣道夫五峯以周禮為非周公致太平之書謂如天官冡宰却管甚宮閫之事其意只是見後世宰相請託宮闈交結近習以為不可殊不知此正人君治國平天下之夲豈可以後世之弊而併廢聖人之良法美意哉又如王后不當交通外朝之說他亦是懲後世之弊要之儀禮中亦分明自載此禮至若所謂女祝掌凡内禱祠禬禳之事使後世有此官則巫蠱之事安從有哉道夫五經中周禮䟽最好詩與禮記次之書易䟽亂道易䟽只是將王輔嗣注來虚說一片􅓌論近世諸儒說於丘子服處見陳徐二先生周禮制度菁華下半册徐元德作上半册即陳君舉所奏周官說先生云孝宗嘗問君舉聞卿博學不知讀書之法當如何陳奏云臣生平於周官粗嘗用心推考今周官數篇已属藁容臣退繕冩進呈遂冩進御大概推周官制度亦稍詳然亦有杜撰錯說處儒用録云但說官属不悉以類聚錯縱互見事必相關處却多含糊或者又謂有互相檢制之意此尤不然如云冡宰之職不特朝廷之事凡内而天子飲食服御宮掖之事無不畢管葢冡宰以道詔王格君心之非所以如此此說固是但云主客行人之官合属春官宗伯而乃掌於司寇儒用録云大行人司儀掌賔客之事當屬春官而乃領於司寇土地疆域之事合掌於司徒乃掌於司馬儒用録云懐方氏辨正封疆之事當属地官而乃領於司馬葢周家設六官互相檢制之意此大不然何聖人不以君子長者之道待其臣既任之而復疑之邪或問如何曰賔客属秋官者葢諸侯朝覲㑹同之禮既畢則降而肉袒請刑司寇主刑所以属之有威懐諸侯之意夏官掌諸侯土地封疆如職方氏皆属夏官葢諸侯有變則六師移之儒用録云不得有其土地司馬主兵有威懐諸侯之義故也所以属司馬也又問冬官司空掌何事曰次第是管土田之事葢司馬職方氏存儒用録作正其疆域之定制至於申書井田創置纎悉必属於司空而今亡矣又云陳徐周禮制度講三公宰相處甚詳然皆是自秦漢以下說起云漢承秦舊置三公之官若仍秦舊何不只倣秦為丞相太尉御史大夫却置司馬司徒司空者何故葢他不知前漢諸儒未見孔壁古文尚書有周官一篇說太師太傅太保為三公爾孔安國古文尚書藏之祕府諸儒專門伏生二十五篇一向不取孔氏所藏古文者及至魏晉間古文始出而行于世漢初亦只仍秦舊置丞相御史太尉為三公及武帝始改太尉為大司馬然武帝亦非是有意於復古但以衞霍功髙官大上面去不得故於驃騎大將軍之上加大司馬以寵異之如加階官冠軍之號爾其職無以異於大將軍也及何武欲改三公他見是時大司馬已典兵兼名號已正故但去大字而以丞相為司徒御史大夫為司空後漢仍舊改司馬為太尉而司徒司空之官如故然政事歸於臺閣三公備貟後來三公之職遂廢而侍中中書尚書之權獨重以至今日儒用畧君舉說井田道是周禮王制孟子三處說皆通他說千里不平直量四邊又突出圎算則是有千二百五十里說出亦自好㸔今考來乃不然周禮鄭氏自於匠人注内說得極仔細前面正說處却未見却於後面僻處說先儒這般極仔細君舉於周禮甚熟不是不知只是做箇新様好話謾人夲文自說百里之國五十里之國賀孫周禮有井田之制有溝洫之制井田是四數溝洫是十數今永嘉諸儒論田制乃欲混井田溝洫為一則不可行鄭氏注解分作兩項却是人傑溝洫以十為數井田以九為數決不可合永嘉必欲合之王制孟子武成分土皆言三等周禮乃有五等決不合永嘉必欲合之閎祖諸公之地封疆方五百里又云凡千里以方五百里封四公則是每箇方五百里甚是分明陳乃云方一百二十五里又以為合加地賞田附庸而言之何欺誑之甚閎祖先生以禮鑰授直卿令誦一遍畢先生曰他論封國將孟子說在前而後又引周禮諸公之地封疆方五百里說非是直卿問孟子所論五等之地是如何與周禮不合曰先儒說孟子所論乃夏商以前之制周禮是成王之制此說是了但又說是周斥大封域而封之其說又不是若是恁地每一國添了許多地便著移了許多人家社禝恐無此理這只是夏商以來漸漸相吞併至周自恁地大了周公也是不柰他何就見在封他且如當初許多國也不是先王要恁地封便如栁子厚說様他是各人占得這些子地先王從而命之以爵不意到後來相吞併得恁大了且如孟子說周公之封於魯也地非不足而儉於百里太公之封於齊也地非不足而儉於百里這也不是當時封許多功臣親戚也是要他因而藩衞王室他那舊時國都恁大了却封得恁地小教他與那大國雜居也於理勢不順據左傳所說東至於海西至於河南至於穆陵北至於無棣齊是恁地闊詩復周公之宇魯是恁地闊這箇也是勢著恁地陳君舉却說只是封疆方五百里四維每一面只百二十五里以徑言則只百二十五里某說若恁地則男國不過似一耆長如何建國職方氏說一千里封四伯一千里封六侯之類極分明這一千里縱横是四箇五百里便是破開可以封四箇伯他那筭得國數極定更無可疑君舉又却云一千里地封四伯外餘地只存留在那裏某說不知存留作甚麽恁地則一千里只將三十來同封了四伯那七十來同却不知留作何用直卿曰武王分土惟三則百里七十里五十里似是周制曰武王是初得天下事勢未定且大槩恁地如文王治岐那制度也自不同先生論至此蹙眉曰這箇也且大槩恁地說不知當時仔細是如何義剛問孟子想不見周禮曰孟子是不見周禮直卿曰觀子産責晉之辭則也恐不解封得恁地大曰子産是應急之說他一時急後且恁地放鵰云何故侵小這非是至論直卿曰府史胥徒則是庻人在官者不知如何有許多曰嘗㸔子由古史他疑三事其一謂府史胥徒太多這箇當時却都是兼官其實府史胥徒無許多直卿曰那司市一官更動誕不得法可謂甚嚴曰周公當時做得法大段齊整如市便不放教人四散去買賣他只立得一市在那裏要買物事便入那市中去不似而今要買物只於門首自有人擔來賣便是一日三次㑹合亦通人情㸔他所立法極是齊整但不知周公此書行得幾時耳義剛天官天官之職是緫五官者若其心不大如何包得許多事且冡宰内自王之飲食衣服外至五官庻事自大至小自夲至末千頭萬緒若不是大其心者區處應副事到面前便且區處不下况於先事措置思患預防是著多少精神所以記得此復忘彼佛氏只合下將那心頓在無用處纔動歩便踈脫所以吾儒貴窮理致知便須事事物物理㑹過舜明於庻物物即是物只是明便見皆有其則今文字在面前尚且㸔不得况許多事到面前如何奈得他須襟懐大底人始得又云後人皆以周禮非聖人書其間細碎處雖可疑其大體直是非聖人做不得賀孫周之天官統六卿之職亦是其大綱至其他卿則一人理一事然天官之職至於閽寺宮嬪醯醬魚塩之属無不領之道夫問古人命官之意莫是以其切於君身故使之領否曰然道夫周禮天官兼嬪御宦官飲食之人皆總之則其於飲食男女之欲所以制其君而成其德者至矣豈復有後世宦官之弊古者宰相之任如此問宮伯宮正所率之属五百人皆入宮中似不便否曰此只是宿衞在外不是入宮皆公卿王族之子弟為之不是兵卒淳宮伯宮正地官問司徒職在敬敷五教而地官言教者甚畧而言山林陵麓之事却甚詳曰也須是教他有飯喫有衣著五方之民各得其所方可去教他若不恁地教如何施但是其中言教也不畧如閭胥書其孝弟婣䘏属民讀法之類皆是義剛淳録云民無住處無物喫亦如何教得所以辨五方之宜以定民居使之各得其所而后教可行也直卿問司徒所謂教只是十二教否曰非也只是教民以六德六行六藝及歳時讀法之類淳周禮中說教民處止及於畿内之民都不及畿外之民不知如何豈應如此廣或問周禮以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂鄭注云日南謂立表處太南近日也日北謂立表處太北逺日也景夕謂日昳景乃中立表處太東近日也景朝謂日未中而景已中立表處太西逺日也曰景夕多風景朝多隂此二句鄭注不可曉疑說倒了㸔來景夕者景晚也謂日未中而景已中葢立表近南則取日近午前景短而午後景長也景朝者謂日已過午而景猶未中葢立表近北則取日逺午前長而午後短也問多風多隂之說曰今近東之地自是多風如海邉諸郡風極多毎如期而至如春必東風夏必南風不如此間之無定葢土地曠闊無髙山之限故風各以方至某舊在漳泉驗之早間則風已生到午而盛午後則風力漸㣲至晚則更無一㸃風色未嘗少差葢風隨陽氣生日方升則陽氣生至午則陽氣盛午後則陽氣㣲故風亦隨而盛衰如西北邊多隂非特山髙障蔽之故自是陽氣到彼處衰謝葢日到彼方午則彼己甚晚不乆則落故西邊不甚見日古語云蜀之日越之雪言見日少也所以蜀有漏天古語云巫峽多漏天老杜云鼓角漏天東言其地常雨如天漏然以此觀之天地亦不甚闊以日月所照及寒暑風隂觀之可以驗矣用之問天竺國去處又却極闊曰以崑崙山言之天竺直崑崙之正南所以土地闊而其所生亦多異人水經云崑崙去嵩髙五萬里㸔來不合如此逺葢中國至于闐二萬里于闐去崑崙無縁更有三萬里文昌雜録記于闐遣使來貢獻使者自言其國之西千三百餘里即崑崙山今中國在崑崙之東南而天竺諸國在其正南水經又云黄河自崑崙東北流入中國如此則崑崙當在西南上或又云西北不知如何恐河流曲折多入中國後方見其東北流爾佛經所說阿耨山即崑崙也云山頂有阿耨大池池水分流四面去為四大水入中國者為黄河入東海其三面各入南西北海如弱水黒水之類大抵地之形如饅頭其撚尖處則崑崙也問佛家天地四洲之說果有之否曰佛經有之中國為南潬部洲天竺諸國皆在南潬部内東弗十逮西瞿耶尼北鬰單越亦如鄒衍所說赤縣之類四洲統名娑婆世界如是世界凡有幾所而娑婆世界獨居其中其形正圓故所生人物亦獨圓正象其地形葢得天地之中氣其他世界則形皆偏側尖缺而環處娑婆世界之外縁不得天地之正氣故所生人物亦多不正此說便是葢天之說横渠亦主葢天不知如何但其言日初生時先照娑婆世界故其氣和其他世界則日之所照或正或昃故氣不和只據此說便自可破彼言日之所照必經歴諸世界了然後入地則一日之中須歴照四處方得周匝今纔照得娑婆一處即已曛矣若更照其他三處經多少時節如此則夜須極長何故今中國晝夜有均停時而冬夏漏刻長短相處亦不甚逺其說於是不通矣僴大司徒以土圭求地中今人都不識土圭鄭康成解亦誤圭只是量表影底尺長一尺五寸以玉為之夏至後立表視表影長短以玉圭量之若表影恰長一尺五寸此便是地之中晷長則表影短晷短則表影長冬至後表影長一丈三尺餘今之地中與古已不同漢時陽城是地之中夲朝嶽臺是地之中嶽臺在浚儀属開封府已自差許多問地何故有差曰想是天運有差地隨天轉而差今坐於此但知地之不動耳安知天運於外而地不隨之以轉耶天運之差如古今昏旦中星之不同是也又問厯所以數差古今豈無人考得精者曰便是無人攷得精細而不易所以數差若攷得精宻有箇定數永不㑹差伊川說康節厯不㑹差或問康節何以不造厯曰他安肯為此古人厯法踈闊而差少今厯愈宻而愈差因以兩手量桌邉云且如這許多闊分作四段被他界限闊便有差不過只在一段界限之内縱使極差出第二三段亦只在此四界之内所以容易推測便有差容易見今之厯法於這四界内分作八界於這八界内又分作十六界界限愈宻則差數愈逺何故以界限宻而踰越多也其差則一而古今厯法踈宻不同故爾㸔來都只是不曾推得定只是移來湊合天之運行所以當年合得不差明後年便差元不曾推得天運定只是旋將厯去合那天之行不及則添些過則減些以合之所以一二年又差如唐一行大衍厯當時最謂精宻只一二年後便差只有季通說得好當初造厯便合并天運所蹉之度都筭在裏幾年後蹉幾分幾年後蹉幾度將這蹉數都筭做正數直推到盡頭如此庻幾厯可以正而不差今人都不曽得箇大統正只管說天之運行有差造厯以求合乎天而厯愈差元不知天如何㑹有差自是天之運行合當如此此說極是不知當初因甚不曽筭在裏但堯舜以來厯至漢都喪失了不可攷縁如今是這大總記不正所以都無是處季通算得康節厯康節厯十一萬九千六百分大故宻今厯家所用只是萬分厯萬分厯已自是多了他如何肯用十二萬分只是今之厯家又說季通底用不得不知如何又曰一行大衍厯比以前厯他只是做得箇頭勢大敷衍得闊其實差數只一般正如百貫錢修一料藥與十文修一料藥其不能治病一也僴周禮注云土圭一寸折一千里天地四游升降不過三萬里土圭之影尺有五寸折一萬五千里以其在地之中故南北東西相去各三萬里問何謂四游曰謂地之四遊升降不過三萬里非謂天地中間相去止三萬里也春遊過東三萬里夏遊過南三萬里秋遊過西三萬里冬遊過北三萬里今厯家筭數如此以土圭測之皆合僴曰譬以大盆盛水而以虚器浮其中四邊定四方若器浮過東三寸以一寸折萬里則去西三寸亦如地之浮於水上蹉過東方三萬里則逺去西方三萬里矣南北亦然然則冬夏晝夜之長短非日晷出沒之所為乃地之游轉四方而然爾曰然用之曰人如何測得如此恐無此理曰雖不可知然厯家推筭其數皆合恐有此理僴土圭之法立八尺之表以尺五寸之圭横於地下日中則景蔽於圭此乃地中為然如浚儀是也今又不知浚儀果為地中否問何故以八尺為表曰此須用勾股法筭之南北無定中必以日中為中北極則萬古不易者也北方地形尖斜日長而夜短骨里幹國煮羊胛骨熟日已出矣至鐡勒則又北矣極北之地人甚少所傳有二千里松木禁人斫伐之外龍蛇交雜不可去女真起處有鴨緑江傳云天下有三處大水曰黄河曰長江并鴨緑是也若以浚儀與潁川為中則今之襄漢淮西等處為近中人傑嘗見季通云日晷有差如去一千里則差一寸到得極星却無差其初亦自曉不得後來仔細思之日之中各自不同如極東處日午以前須短日午以後須長極西處日午以前須長日午以後須短所以有差故周禮以為日北則景長多寒日南則景短多暑日東則景夕多風日西則景朝多隂此最分曉極星却到處視之以為南北之中了所以無差如涼傘然中心却小四簷却闊故如此某初疑其然及將周禮來檢㸔方見得決然是如此榦今謂周官非聖人之書至如比閭族黨之法正周公建太平之基夲他這箇一如碁盤相似枰布定後碁子方有放處因論保伍法道夫二十五家為閭閭吕也如身之有脊吕骨葢閭長之居當中而二十四家列於兩旁如身之脊吕骨當中而助骨分布兩旁也僴問六德智聖曰智是知得事理聖便髙似智皆無所不通明底意思伯羽五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂制旧里之法也五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此鄉遂出兵之法也故曰凡起徒役無過家一人既一家出一人則兵數冝甚多然只是擁衞王室如今禁衞相似不令征行也都鄙之法則九夫為井四井為邑四邑為丘四丘為甸然後出長轂一乗甲士三人歩卒七十二人以五百一十二家而共只出七十五人則可謂甚少然有征行則發此都鄙之兵悉調者不用而用者不悉調此二法所以不同而貢助之法亦異大率鄉遂以十為數是長連排去井田以九為數是一箇方底物事自是不同而永嘉必欲合之如何合得閎柤以下小司徒周制鄉遂用貢法故十夫治溝長底是十方底是百長底是千方底是萬都鄙用助法故八家同溝共井鄉遂則以五為數家出一人為兵以守衞王畿役次必簡如周禮惟挽匶則用之此役之最輕者都鄙則以四為數六七家始出一人故甸出甲士三人歩卒七十二人馬四匹牛三頭鄉遂所以必為溝洫而不為井者以欲起兵數故也五比五鄰五伍之後變五為四閭四里四兩者用四則成百之數復用五則自此竒零不整齊矣如曰周制皆井者此欺人之說不可行也因言永嘉之說受田則用溝洫起賦歛則依井方子下條問同問周制都鄙用助法八家同井鄉遂用貢法十夫有溝鄉遂所以不為井者何故曰都鄙以四起數五六家始出一人故甸出甲士三人歩卒七十二人鄉遂以五起數家出一人為兵以守衞王畿役次必簡故周禮惟挽匶則用之此役之最輕者近郊之民王之内地也共輦之事職無虚月追胥之比無時無之其受㕓為民者固與畿外之民異也七尺之征六十之舍王非姑息於邇民也逺郊之民王之外地也其溝洫之治各有司存野後之起不及其羨其受㕓為氓者固與内地之民異也六尺之征六十五之舍王非荼毒於遐民也園㕓二十而一若輕於近郊也而草木之毓夫家之聚不可以擾擾則不能以寜居是故二十而稅一漆林二十而五若重於逺郊也而器用之末作商賈之資利不可以輕輕則必至於忘夲是故二十而五係近郊逺郊勞逸所繫天子六卿故有六軍諸侯二卿故有三軍所謂五家為比比即伍也五比為閭閭即兩也四閭為族族即卒也則是夫人為兵矣至於九夫為井四井為邑四邑為丘四丘為甸甸出兵車一乗且以九夫言之中為公田只是八夫甸則五百一十二夫何其少於鄉遂也便是難曉以某觀之鄉遂之民以衞王畿凡有征討止用丘甸之民又學校之制所以取士者但見於鄉遂鄉遂之外不聞教飬之制亦可疑也人傑問都鄙四丘為甸甸六十四井出車一乗甲士三人歩卒七十二人不審鄉遂車賦則如何曰鄉遂亦有車但不可見其制六鄉一家出一人排門是兵都鄙七家而出一兵在内者役重而賦輕在外者役輕而賦重六軍只是六鄉之衆六遂不與六遂亦有軍但不可見其數大國三軍亦只是三郊之衆三遂不與大國三郊次國二郊小國一郊蔡季通說車一乗不止甲士三人歩卒七十二人此是輕車用馬馳者更有二十五人將重車在後用牛載糗糧戈甲衣裝見七書如魯頌公徒三萬亦具其說矣淳問鄭氏旁加一里之說是否曰如此方得數相合亦不見所慿據處今且大槩依他如此㸔淳以下小司徒注直卿問古以百歩為畆今如何曰今以二百四十歩為畆百畆當今四十一畆賀孫問司馬法車乗士徒之數與周禮不同如何曰古制不明皆不可考此只見於鄭氏注七書中司馬法又不是此林勲夲政書錯說以為文王治岐之政曰或以周禮乃常數司馬法乃調發時數是否曰不通處如何硬要通不須恁思量枉費心力淳先生與曹兄論井田曰當時須别有箇道理天下安得有箇王畿千里之也將鄭康成圖來安頓於上今㸔古人地制如豐鎬皆在山谷之間洛邑伊闕之地亦多是小溪澗不知如何措置卓豐鎬去洛邑三百里長安所管六百里王畿千里亦有横長處非若今世之為圖畫方也恐井田之制亦是類此不可執畫方之圖以定之人傑古者百畆之地収每畆一鍾為米四石六㪷以今量較之為米一石五㪷爾僴周家毎年一推排十六歳受田六十者歸田其後想亦不能無弊故蔡澤言商君決裂井田廢壊阡陌以静百姓之業而一其志唐制毎歲十月一日應受田者皆集於縣令廷中而升降之若縣令非才則是日乃胥吏之利耳方子古人學校教飬德行道藝選舉爵禄宿衞征伐師旅田獵皆只是一項事皆一理也僴鄉大夫問周禮德行道藝德行藝三者猶有可指名者道字當如何解曰舊嘗思之未甚曉㸔來道字只是曉得那道理而已大而天地事物之理以至古今治亂興亡事變聖賢之典䇿一事一物之理皆曉得所以然謂之道且如禮樂射御書數禮樂之文却是祝史所掌至於禮樂之理則須是知道者方知得如所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉之謂又德是有德行是有行藝是有藝道則知得那德行藝之理所以然也注云德行是賢者道藝是能者葢曉得許多事物之理所以属能僴内史掌䇿命諸侯及羣臣者鄉大夫既獻賢能之書王拜受登於天府其副夲則内史掌之以内史掌䇿命諸侯及群臣故也古之王者封建諸侯王坐使内史讀䇿命之非特命諸侯亦欲在廷詢其可否且如後世除拜百官亦合有䇿只是辭免了問祖宗之制亦如此否曰自唐以上皆如此今除宰相宣麻是其遺意王后以上用玉䇿其次皆用竹䇿漢常用䇿縁他近古其初亦不曾用自武帝立三王始用起文蔚問黨正一命齒于鄉里再命齒于父族三命不齒若據如此雖說鄉黨莫如齒到得爵尊後又不復序齒曰古人貴貴長長並行而不悖他雖說不序亦不相壓自别設一位如今之掛位然燾録云猶而今别設桌也文蔚黨正古制㣲細處今不可曉但觀其大槩如宅田士田賈田官田牛田賞田牧田鄭康成作一說鄭司農又作一說慿何者為是淳以下載師問商賈是官司令民為之抑民自為之邪曰民自為之亦受田但少耳如載師所謂賈田者是也淳問士人受田如何曰上士中士下士是有命之士已有禄如管子士鄉十五是未命之士若民皆為士則無農矣故鄉止十五亦受田但不多所謂士田者是也義剛近郊十一逺郊二十而三甸稍縣都皆無過十二此即是田稅然逺近輕重不等者葢近處如六鄉排門皆兵其役多故稅輕逺處如都鄙井法七家而賦一兵其役少故稅重所謂十二者是并雜稅皆無過此數也都鄙稅亦只納在采邑淳安卿問二十而一十一十二二十而三二十而五如何曰近處後重逺處役輕且如六鄉自是家家為兵至如稍縣都却是七家只出一兵直卿曰鄉遂用貢法都鄙用助法則是都鄙却成九一但鄭注二十而一等及九賦之類皆云是訃口出泉如此又近於太重曰便是難曉這箇今且理㑹得大槩若要盡依他行時也難似而今時節去封建井田尚煞逺淳録云因論封建井田曰大㮣是如此今只㸔箇大意若要行時須别立法制使簡易明白取於民者足以供上之用上不至於乏而下不至于苦則可矣今世取封建井田大段逺恰如某病後要思量白日上昇如何得今且醫得無事時已是好了如浙閩除了和買丁錢重處减些使一家但納百十錢只依而今稅賦放教寛無大故害民處淳録云如漳之塩錢罷了如此時便是小太平了前軰云夲朝稅輕於什一也只是向時可恁地說今何啻數倍縁上面自要許多用而今縣中若省解些月椿㸔州府不來打罵麽某在漳州解發銀子折了星兩運司來取被某不能管得判一箇可付一笑字聽他們自去理㑹似恁時節却要行井四如何行得伊川常言要必復井田封建及晚年又却言不必封建井田便也是㸔破了淳録云見暢潜道録想是他經歴世故之多見得事勢不可行且如封建自桞子厚之属論得來也是太過但也是行不得淳録云栁子厚說得世變也是但他只見得後來不好處不見得古人封建底好意如漢當初要封建後來便恁地狼狽若如主父偃之說天子使吏治其國而納其貢稅如此便不必封建也得淳録云若論主父偃後底封建則皆是王族貴驕之子不足以君國子民天子使吏治其國而已今且做把一百里地封一箇親戚或功臣教他去做其初一箇未必便不好但子孫決不能皆賢若有一箇在那裏無稽時不成教百姓論罷了一箇國君若只坐視他害民又不得却如何區處淳録云封建以大體言之却是聖人公共為民底意思是為正理以利害計之第一世所封之功臣猶做得好在第二世繼而立者箇箇定是不曉事則害民之事靡所不為百姓被苦來訴國君因而罷了也不是不與他理㑹亦不是末論别處如何只這一處利少而害多便自行不得更是人也自不肯去今且教一箇錢塘縣尉封他作静江國王鬰林國王淳録作桂國之君他定是不肯去淳録作他定以荒僻不樂於行寜肯作錢塘縣尉唐時理㑹一番襲封刺史人都不肯去淳録作一時功臣皆樂於在京而不肯行符秦也曾如此來人皆是戀京師快活都不肯去却要遣人押起淳録作符堅封功臣於數國不肯去廹之使去這箇決是不可行若是以大槩論之聖人封建却是正理但以利害言之則利少而害多子由古史論得也忒煩前後都不相照淳録作子由論封建引證又都不着想是子由老後昬眩說得恁地某嘗作說辨之得四五段不曾終了若東坡時便不如此他毎毎兩牢籠說他若是主這一邉說時那一邉害處都藏着不敢說破如子由便是只管說後說得更無理㑹因曰蘓氏之學喜於縱恣踈蕩東坡嘗作某州學記言井田封建皆非古但有學校尚有古意其間言舜逺矣不可及矣但有子産尚可稱也便是敢恁地說千古萬古後你如何知得無一箇人似舜義剛淳録作數條載師云凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征閭師又云凡民無職者出夫布前重後輕者前以待士大夫之有土者後方是待庻民宅不毛為其為亭臺也田不耕為其為池沼也凡民無職事者此是大夫家所飬浮泛之人也賀孫師氏居虎門司王朝虎門路寢門也正義謂路寢庭朝庫門外朝非常朝此是常朝故知在路門外文蔚問路寢庭朝庫門外朝如何不是常朝曰路寢庭在門之裏議政事則在此朝庫門外是國有大事詢及衆庻則在此處非毎日常朝之所若毎日常朝王但立於寢門外與群臣相揖而已然王却先揖揖群臣就位王便入只是揖亦不同如土揖庻姓時揖異姓天揖同姓之類各有髙下胡明仲嘗云近世朝禮毎日拜跪乃是秦法周人之制元不如此文蔚師氏古者教法禮樂射御書數不可闕一就中樂之教尤親切䕫教胄子只用樂大司徒之職也是用樂葢是教人朝夕從事於此拘束得心長在這上面葢為樂有節奏學他底急也不得慢也不得久之都換了他一副常情性植以下保氏周禮六書制字固有從形者然為義各不同却如何必欲說義理得龜山有辯荆公字說三十餘字荆公字說其說多矣止辯三十字何益哉又不去頂門上下一轉語而隨其後屑屑與之辯使其說轉則吾之說不行矣僴泉府掌以市之征布斂貨之不售者或買或賒或貸貸者以國服為息此能幾何而云凡國事之財用取具焉何也閎祖泉府問遂何以上地特加萊五十畆曰古制不明亦不可曉鄉之田制亦如此但此見於遂耳大抵鄉吏專主教遂吏專主耕淳以下遂人問鄉遂為溝洫用貢法都鄙為井田行助法何以如此分别曰古制不明亦不曉古人是如何遂人溝洫之法田不井授而以夫數制之歳時登其夫家之衆寡以令貢賦便是用貢法淳子約疑井田之法一鄉一遂為一萬有餘夫多溝洫川澮而匠人一同為九萬夫川澮溝洫反少者此以地有逺近故治有詳略也鄉遂近王都人衆稠宻家家勝兵不如此則不足以盡地利而飬民且又縱横為溝洫川澮所以寓設險之意而限車馬之衝突也故治近為甚詳若鄉遂之外則民少而地多欲盡開治則民力不足故其治甚略晉郤克帥諸國伐齊齊求盟晉人曰必以蕭同叔子為質而盡東其畆齊人曰唯吾子戎車是利無顧土冝云云晉謀遂塞蓋鄉遂之畆如中間是田兩邊是溝向東直去而前復有横畆向南溝復南流一東一南十字相交在此所以險阻多而非車馬之利也晉欲使齊盡東其畆欲為侵伐之利耳而齊覺之若盡東其畆則無縱横相御但一直向東戎馬可以長驅而來矣次日又曰昨夜說匠人九夫之制無許多溝洫其實不然適間檢㸔許多溝洫川澮與遂鄉之地一般乃是子約㸔不仔細耳僴田制須先正溝洫方定必大稍者稍稍之義言逐旋給與之也不特待使者凡百官廪禄皆然猶今官中給俸米僴稍人鄉遂雖用貢法然廵野觀稼以年之上中下出斂法則未嘗拘也閎祖司稼春官周禮載用赤璋白璧等歛此豈長䇿要是周公未思量耳觀季孫斯死用玉而孔子歴階言其不可則是孔子方思量到而周公思量未到也義剛典瑞黄問周禮祀天神地示人鬼之樂何以無商音曰五音無一則不成樂非是無商音只是無商調先儒謂商調是殺聲鬼神畏商調淳以下大司樂周禮不言祭地止於大司樂一處言之舊見陳君舉亦云社禝之祭乃是祭地却不曾問大司樂祭地祇之事人傑因說及夢曰聖人無所不用其敬雖至小沒𦂳要底物事也用其敬到得後世儒者方說得如此闊大沒収煞如周禮夢亦有官掌之此有甚𦂳要然聖人亦將做一件事某平生毎夢見故舊親戚次日若不接其書信及見之則必有人說及㸔來惟此等是正夢其他皆非正僴占夢夏官路門外有鼔謂之路鼔王崩則擊此鼓用以宣傳四方肺石其形若肺擊之有聲寃民許擊此石如今登聞鼔唐人亦有肺石文蔚太僕秋官人謂周公不言刑秋官有許多刑如何是不言刑淳問周禮五服之貢限以定名不問其地之有無與禹貢不合何故曰一代自有一代之制他大槩是近處貢重底物事逺處貢輕底物事恰如禹貢所謂納銍納秸之類義剛大行人冬官車所以揉木又以圍計者葢是用生成圓木揉而為之故堅耐堪馳騁閎祖輪人問侯國亦倣鄉遂都鄙之制否曰鄭氏說侯國用都鄙法然觀魯人三郊三遂及孟子請野九一而助國中什一使自賦則亦是如此義剛録作當亦是鄉遂同淳匠人注朱子語類卷八十六
