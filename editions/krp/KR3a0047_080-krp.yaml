body:
  text: 朱子語類卷八十詩一綱領只是思無邪一句好不是一部詩皆思無邪温柔敦厚詩之教也使篇篇皆是譏刺人安得温柔敦厚璘因論詩曰孔子取詩只取大意三百篇也有㑹做底有不㑹做底如君子偕老子之不淑云如之何此是顕然譏刺他到第二章已下又全然放寛豈不是亂道如載馳詩煞有首尾委曲詳盡非大段㑹底説不得又如鶴鳴做得極巧更含蓄意思全然不露如清廟一倡三歎者人多理㑹不得注下分明説一人倡之三人和之譬如今人挽歌之類今人解者又須要胡説亂道祖道問剛詩曰那曾見得聖人執筆剛那箇存這箇也只得就相傳上説去賀孫問詩次序是當如此否曰不見得只是楚茨信南山甫田大田諸詩元初却當作一片又曰如卷阿説豈弟君子是作賢者如洞酌説豈弟君子是作人君大抵詩中有可以比並㸔底有不可如此㸔自有這般様子賀孫説卷阿與詩傳不同以下論詩次序章句詩人只見他恁地重三疊四説将謂是無倫理次序不知他一句不胡亂下文蔚曰今日偶㸔棫樸一篇凡有五章前三章是説人歸附文王之徳後二章乃言文王有作人之功及紀綱四方之徳致得人歸附者在此一篇之意次第甚明曰然遐不作人却是説他鼔舞作興底事功夫細宻處又在後一章如曰勉勉我王綱紀四方四方便都在他線索内牽著都動文蔚曰勉勉即是純亦不已否曰然追琢其章金玉其相是那工夫到後文章真箇是盛美資質真箇是堅實文蔚恭父問詩章起於誰曰有故言者是指毛公無故言者皆是鄭康成有全章換一韻處有全押韻處如頌中有全篇句句是韻如殷武之類無兩句不是韻到稼穡匪解自欠了一句前軰分章都曉不得某細讀方知是欠了一句賀孫李善注文選其中多有韓詩章句常欲冩出易直子諒韓詩作慈良方子問王風是他風如此不是降為國風曰其辭語可見風多出於在下之人雅乃士夫所作雅雖有刺而其辭荘重與風異可學以下論風雅頌大序言一國之事係一人之本謂之風所以析衛為弼鄘衛曰詩古之樂也亦如今之歌曲音各不同衞有衛音鄘有鄘音弼有弼音故詩有鄘音者係之鄘有弼音者係之弼若大雅小雅則亦如今之商調宫調作歌曲者亦按其腔調而作爾大雅小雅亦古作樂之體格按大雅體格作大雅按小雅體格作小雅非是做成詩後旋相度其辭目為大雅小雅也大抵國風是民庶所作雅是朝廷之詩頌是宗廟之詩又云小序漢儒所作有可信處絶少大序好處多然亦有不滿人意處去偽器之問風雅與無天子之風之義先生舉鄭漁仲之説言出於朝廷者為雅出於民俗者為風文武之時周召之作者謂之周召之風東遷之後王畿之民作者謂之王風似乎大約是如此亦不敢為斷然之説但古人作詩體自不同雅自是雅之體風自是風之體如今人做詩曲亦自有體製不同者自不可亂不必説雅之降為風今且就詩上理㑹意義其不可曉處不必反倒因説嘗見蔡行之與陳君舉説春秋云須先㸔聖人所不書處方見所書之義見成所書者更自理㑹不得却又取不書者來理㑹少間只是説得竒巧木之詩有是當時朝廷作者雅頌是也若國風乃採詩者採之民間以見四方民情之美惡二南亦是採民言而被樂章爾程先生必要説是周公作以教人不知是如何某不敢從若變風又多是淫亂之詩故班固言男女相與歌詠以言其傷是也聖人存此亦以見上失其教則民欲動情勝其弊至此故曰詩可以觀也且詩有六義先儒更不曾説得明却因周禮説豳詩有豳雅豳頌即於一詩之中要見六義思之皆不然盖所謂六義者風雅頌乃是樂章之腔調如言仲呂調大石調越調之類至比興賦又别直指其名直叙其事者賦也本要言其事而虚用兩句釣起因而接續去者興也引物為況者比也立此六義非特使人知其聲音之所當又欲使歌者知作詩之法度也問豳之所以為雅為頌者恐是可以用雅底腔調又可用頌底腔調否曰恐是如此某亦不敢如此斷今只説恐是亡其二大雅問二雅所以分曰小雅是所係者小大雅是所係者大呦呦鹿鳴其義小文王在上於昭于天其義大問變雅曰亦是變用他腔調爾大抵今人説詩多去辨他序文要求著落至其正文闗闗雎鳩之義却不與理㑹王徳修云詩序只是國史一句可信如關睢后妃之徳此下即講師説如蕩詩自是説蕩蕩上帝序却言是天下蕩蕩賚詩自是説文王既勤止我應受之是説後世子孫頼其祖宗基業之意他序却説賚予也豈不是後人多被講師瞞耶曰此是蘓子由曾説來然亦有不通處如漢廣徳廣所及也有何義理却是下面無思犯禮求而不可得幾句却有理若某只上一句亦不敢信他舊曾有一老儒鄭漁仲更不信小序只依古本與疊在後面某今亦只如此令人虚心㸔正文久之其義自見盖所謂序者類多世儒之談不解詩人本意處甚多且如止乎禮義果能止禮義否中之詩禮義在何處王曰他要存戒曰此正文中無戒意只是直述他淫亂事爾若鶉之奔奔相䑕等詩却是譏罵可以為戒此則不然某今㸔得鄭詩自叔于田等詩之外如狡童子衿等篇皆淫亂之詩而説詩者誤以為刺昭公刺學校廢耳衞詩尚可猶是男子戯婦人鄭詩則不然多是婦人戯男子所以聖人尤惡鄭聲也出其東門却是箇識道理底人做大雅林子武問詩者中聲之所止曰這只是正風雅頌是中聲那變風不是伯恭堅要牽合説是然恐無此理今但去讀㸔便自有那輕薄底意思在了如韓愈説数句其聲浮且淫之類這正是如此義剛問比興曰説出那物事來是興不説出那物事是比如南有喬木只是説箇漢有游女奕奕寝廟君子作之只説箇他人有心予忖度之關睢亦然皆是興體比底只是從頭比下來不説破興比相近却不同周禮説以六詩教國子其實只是這賦比興三箇物事風雅頌詩之標名理㑹得那興比賦時裏面全不大段費解今人要細解不道此説為是如奕奕寝廟不認得意在那他人有心處只管解那奕奕寝廟植以下賦比興問詩中説興處多近比曰然如關睢麟趾相似皆是興而兼比然雖近比其體却只是興且如關關雎鳩本是興起到得下面説窈窕淑女此方是入題説那實事盖興是以一箇物事貼一箇物事説上文興而起下文便接説實事如麟之趾下文便接振振公子一箇對一箇説盖公本是箇好底人子也好孫也好族人也好譬如麟趾也好定也好角也好及比則却不入題了如比那一物説便是説實事如螽斯羽詵詵兮宜爾子孫振振兮螽斯羽一句便是説那人了下面宜爾子孫依舊是就螽斯羽上説更不用説實事此所以謂之比大率詩中比興皆類此僴比雖是較切然興却意較深逺也有興而不甚深逺者比而深逺者又係人之髙下有做得好底有拙底常㸔後世如魏文帝之徒作詩皆只是説風影獨曺操愛説周公其詩中屢説便是那曺操意思也是較别也是乖義剛比是以一物比一物而所指之事常在言外興是借彼一物以引起此事而其事常在下句但比意雖切而却淺興意雖闊而味長賀孫詩之興全無巴鼻振録云多是假他物舉起全不取其義後人詩猶有此體如青青陵上柏磊磊澗中石人生天地間忽如逺行客又如髙山有崕林木有枝憂來無端人莫之知青青河畔草綿綿思逺道皆是此體方子倪録同六義自鄭氏以來失之后妃自程先生以來失之后妃安知當時之稱如何可學以下六義或問詩六義注三經三緯之説曰三經是賦比興是做詩底骨子無詩不有才無則不成詩盖不是賦便是比不是比便是興如風雅頌却是裏靣横串底都有賦比興故謂之三緯燾器之問詩傳分别六義有未備處曰不必又只管滯却許多且㸔詩意義如何古人一篇詩必有一篇意思且要理㑹得這箇如柏舟之詩只説到静言思之不能奮飛緑衣之詩説我思古人實獲我心此可謂止乎禮義所謂可以怨便是喜怒哀樂發而皆中節處推此以觀則子之不得於父臣之不得於君朋友之不相信皆當以此意處之如屈原之懐沙赴水賈誼言歴九州而相其君何必懐此都也便都過當了古人胷中發出意思自好㸔著三百篇詩則後世之詩多不足觀矣木之問詩傅説六義以托物興辭為興與舊説不同曰覺舊説費力失本指如興體不一或借眼前物事説将起或别自将一物説起大抵只是将三四句引起如唐時尚有此等詩體如青青河畔草青青水中蒲皆是别借此物興起其辭非必有感有見於此物也有将物之無興起自家之所有将物之有興起自家之所無前輩都理㑹這箇不分明如何説得詩本指只伊川也自未見得㸔所説有甚廣大處子細㸔本指却不如此若上蔡怕曉得詩如云讀詩須先要識得六義體面這是他識得要領處問詩雖是吟咏使人自有興起固不専在文辭然亦須是篇篇句句理㑹著實見得古人所以作此詩之意方始於吟咏上有得曰固是若不得其真實吟咏箇甚麽然古人已多不曉其意如左傳所載歌詩多與本意元不相關問我将維天其右之既右享之今所解都作左右之右與舊不同曰周禮有享右祭祀之文如詩中此例亦多如既右烈考亦右文母之類如我将所云作保祐説更難方説維羊維牛如何便説保祐到伊嘏文王既右享之也説未得右助之右問振鷺詩不是正祭之樂歌乃獻助祭之臣未審如何曰㸔此文意都無告神之語恐是獻助祭之臣古者祭祀每一受胙主與賔尸皆有獻酬之禮既畢然後亞獻至獻畢復受胙如此禮意甚好有接續意思到唐時尚然今併受胙於諸獻既畢之後主與賔尸意思皆隔了古者一祭之中所以多事如季氏祭逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎古人祭禮是大段有節奏賀孫詩序起闗睢后妃之徳也止教以化之大序起詩者志之所之也止詩之至也敬仲以下大序聲發出於口成文而節宣和暢謂之音乃合於音調如今之唱曲合宫調商調之類敬仲詩大序亦只是後人作其間有病句國史方子詩纔説得宻便説他不著國史明乎得失之迹這一句也有病周禮禮記中史並不掌詩左傳說自分曉以此見得大序亦未必是聖人做小序更不須説他做小序不㑹寛説每篇便求一箇實事填塞了他有尋得著底猶自可通不然便與詩相礙那解底要就詩却礙序要就序却礙詩詩之興是劈頭説那没來由底兩句下面方説那事這箇如何通解鄭聲淫所以鄭詩多是淫佚之辭狡童将仲子之類是也今喚做忽與祭仲與詩辭全不相似這箇只是而今閒潑曲子南山有臺等數篇是燕享時常用底叙賔主相好之意一似今人致語又曰詩小序不可信而今㸔詩有詩中分明説是某人某事者則可知其他不曾説者而今但可知其説此等事而已韓退之詩曰春秋書王法不誅其人身高大序亦有未盡如發乎情止乎禮義又只是説正詩變風何嘗止乎禮義問止乎禮義曰如變風柏舟等詩謂之止乎禮義可也桑中諸篇曰止乎禮義則不可盖大綱有止乎禮義者㽦止乎禮義如泉水載馳固止乎禮義如桒中有甚禮義大序只是㨂好底説亦未盡㽦詩大序只有六義之説是而程先生不知如何又却説從别處去如小序亦間有説得好處只是杜撰處多不知先儒何故不虚心仔細㸔這道理便只恁説却後人又只依他那箇説出亦不㸔詩是有此意無若説不去處又須穿鑿説将去又詩人當時多有唱和之詞如是者有十數篇序中都説從别處去且如蟋蟀一篇本其風俗勤儉其民終嵗勤勞不得少休及嵗之暮方且相與燕樂而又遽相戒曰日月其除無已太康盖謂今雖不可以不為樂然不已過於樂乎其憂深思逺固如此至山有樞一詩特以和答其意而解其憂爾故説山則有樞矣隰則有榆矣子有衣裳弗曵弗婁子有車馬弗馳弗驅一旦宛然以死則他人藉之以為樂爾所以解勸他及時而樂也而序蟋蟀者則曰刺晉僖公儉不中禮盖風俗之變必由上以及下今謂君之儉反過於禮而民之俗猶知用禮則必無是理也至山有樞則以為刺晋昭公又大不然矣若魚藻則天子燕諸侯而諸侯美天子之詩也采菽則天子所以答魚藻矣至鹿鳴則燕享賔客也序頗得其意四牡則勞使臣也而詩序下文則妄矣皇皇者華則遣使臣之詩也棠棣則燕兄弟之詩也序固得其意伐木則燕朋友故舊之詩也人君以鹿鳴而下五詩燕其臣故臣受君之賜者則歌天保之詩以答其上天保之序雖畧得此意而古注言鹿鳴至伐木皆君所以下其臣臣亦歸美於上崇君之尊而福禄之以答其歌却説得尤分明又如行葦自是祭畢而燕父兄耆老之詩首章言開燕設席之初而慇懃篤厚之意已見於言語之外二章言侍御獻酬飲食歌樂之盛三章言既燕而射以為懽樂末章祝頌其既飲此酒皆得享夫長夀今序者不知本㫖見有勿踐履之説則便謂仁及草木見戚戚兄弟便謂親睦九族見黄耉台背便謂飬老見以祈黄耉便謂乞言見介爾景福便謂成其福禄細細碎碎殊無倫理其失為尤甚既醉則父兄所以答行葦之詩也鳬鷖則祭之明日繹而賔尸之詩也古者宗廟之祭皆有尸既祭之明日則煖其祭食以燕為尸之人故有此詩假樂則公尸之所以答鳬鷖也今序篇皆失之又曰詩即所謂樂章雖有唱和之意祗是樂工代歌亦非是君臣自歌也道夫詩書序當開在後面升卿以下小序敬之問詩書序曰古本自是别作一處如易大傳班固序傳並在後京師舊本揚子注其序亦摠在後徳明王徳修曰六經惟詩最分明曰詩本易明只被前面序作梗序出於漢儒反亂詩本意且只将四字成句底詩讀却自分曉見作詩集傳待取詩令編排放前面驅逐過後面自作一處文蔚詩序作而觀詩者不知詩意節詩序東漢儒林傳分明説道是衞宏作後來經意不明都是被他壊了某又㸔得亦不是衞宏一手作多是兩三手合成一序愈説愈踈浩云蘇子由却不取小序曰他雖不取下面言語留了上一句便是病根伯恭専信序又不免牽合伯恭凡百長厚不肯非毁前輩要出脱回䕶不知道只為得箇解經人却不曾為得聖人本意是便道是不是便道不是方得浩詩小序全不可信如何定知是美刺那人詩人亦有意思偶然而作者又其序與詩全不相合詩詞理甚順平易易㸔不如序所云且如葛覃一篇只是見葛而思歸寜序得却如此毛公全無序解鄭間見之序是衞宏作序極有難曉處多是附㑹如魚藻詩見有王在鎬之言便以為君子思古之武王似此類甚多因論詩歴言小序大無義理皆是後人杜撰先後增益湊合而成多就詩中採摭言語更不能發明詩之大㫖纔見有漢之廣矣之句便以為徳廣所及才見有命彼後車之言便以為不能飲食教載行葦之序但見牛羊勿踐便謂仁及草木但見戚戚兄弟便謂親睦九族見黄耉台背便謂飬老見以祈黄耉便謂乞言見介爾景福便謂成其福禄隨文生義無復倫理卷耳之序以求賢審官知臣下之勤勞為后妃之志事固不倫矣况詩中所謂嗟我懐人其言親暱太甚寜后妃所得施於使臣者哉桃夭之詩謂婚姻以時國無鰥民為后妃之所致而不知其為文王刑家及國其化固如此豈専后妃所能致耶其他變風諸詩未必是刺者皆以為刺未必是言此人必附㑹以為此人桑中之詩放蕩留連止是淫者相戯之辭豈有刺人之惡而反自陥於流蕩之中子衿詞意輕儇亦豈刺學校之辭有女同車等皆以為刺忽而作鄭忽不娶齊女其初亦是好底意思但見後來失國便将許多詩盡為刺忽而作考之於忽所謂淫昬暴虐之類皆無其實至遂目為狡童豈詩人愛君之意况其所以失國正坐柔懦闊踈亦何狡之有幽厲之刺亦有不然甫田諸篇凡詩中無詆譏之意者皆以為傷今思古而作其他謬誤不可勝説後世但見詩序巍然冠於篇首不敢復議其非至於解説不通多為飾辭以曲䕶之者其誤後學多矣大序却好或者謂補湊而成亦有此理書小序亦未是只如堯典舜典便不能通貫一篇之意堯典不獨為遜舜一事舜典到歴試諸艱之外便不該通了其他書序亦然至如書大序亦疑不是孔安國文字大抵西漢文章渾厚近古雖董仲舒劉向之徒言語自别讀書大序便覺軟慢無氣未必不是後人所作也謨詩序實不足信向見鄭漁仲有詩辨妄力詆詩序其間言語太甚以為皆是村野妄人所作始亦疑之後來子細㸔一兩篇因質之史記國語然後知詩序之果不足信因是㸔行葦賔之初筵抑數篇序與詩全不相似以此㸔其他詩序其不足信煞多以此知人不可亂説話便都被人㸔破了詩人假物興辭大率将上句引下句如行葦勿踐履戚戚兄弟莫逺具爾行葦是比兄弟勿字乃興莫字此詩自是飲酒㑹賔之意序者却牽合作周家忠厚之詩遂以行葦為仁及草木如云酌以大斗以祈黄耉亦是歡合之時祝夀之意序者遂以為飬老乞言豈知祈字本只是祝頌其髙夀無乞言意也抑詩中間煞有好語亦非刺厲王如於乎小子豈是以此指其君兼厲王是暴虐大惡之主詩人不應不述其事實只説謹言節語况厲王無道謗訕者必不容武公如何恁地指斥曰小子國語以為武公自警之詩却是可信大率古人作詩與今人作詩一般其間亦自有感物道情吟咏情性幾時盡是譏刺他人只縁序者立例篇篇要作美刺説将詩人意思盡穿鑿壊了且如今人見人纔做事便作一詩歌美之或譏刺之是甚麽道理如此一似里巷無知之人胡亂稱頌䛕説把持放鵰何以見先王之澤何以為情性之正詩中數處皆應答之詩如天保乃與鹿鳴為唱答行葦與既醉為唱答蟋蟀與山有樞為唱答唐自是晉未改號時國名自序者以為刺僖公便牽合謂此晉也而謂之唐乃有堯之遺風本意豈因此而謂之唐是皆鑿説但唐風自是尚有勤儉之意作詩者是一箇不敢放懐底人説今我不樂日月其除便又説無已太康職思其居到山有樞是答者便謂子有衣裳弗曵弗婁宛其死矣他人是愉子有鍾鼔弗鼔弗考宛其死矣他人是保這是答他不能享些快活徒恁地苦澁詩序亦有一二有憑據如清人碩人載馳諸詩是也昊天有成命中説成王不敢康成王只是成王何須牽合作成王業之王自序者恁地附㑹便謂周公作此以告成功他既作周公告成功便將成王字穿鑿説了又幾曾是郊祀天地被序者如此説後來遂生一塲事端有南北郊之事此詩自説昊天有成命又不曾説著地如何説道祭天地之詩設使合祭亦須㡬句説及后土如漢諸郊祀詩祭其神便説某事若用以祭地不應只説天不説地東萊詩記却編得仔細只是大本已失了更説甚麽向嘗與之論此如清人載馳一二詩可信渠却云安得許多文字證據某云無證而可疑者只當闕之不可據序作證渠又云只此序便是證某因云今人不以詩説却以序解詩是以委曲牽合必欲如序者之意寜失詩人之本意不恤也此是序者大害處賀孫詩序多是後人妄意推想詩人之美刺非古人之所作也古人之詩雖存而意不可得序詩者妄誕其説但疑見其人如此便以為是詩之美刺者必若人也如荘姜之詩却以為刺衞頃公今觀史記所述頃公竟無一事可紀但言某公卒子某公立而已都無其事頃公固亦是衛一不美之君序詩者但見其詩有不美之迹便指為刺頃公之詩此類甚多皆是妄生美刺初無其實至有不能攷者則但言刺詩也思賢妃也然此是汎汎而言如漢廣之序言徳廣所及此語最亂道詩人言漢之廣矣其言已分曉至如下面小序却説得是謂文王之化被于南國美化行乎江漢之域無思犯禮求而不可得也此數語却好又云㸔來詩序當時只是箇山東學究等人做不是箇老師宿儒之言故所言都無一事是當如行葦之序雖皆是詩人之言但却不得詩人之意不知而今做義人到這處将如何做於理決不順某謂此詩本是四章章八句他不知作八章章四句讀了如敦彼行葦牛羊勿踐履方苞方體惟葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几此詩本是興詩即是興起下四句言以行葦興兄弟勿踐履是莫逺意也又云鄭衛詩多是淫奔之詩鄭詩如将仲子以下皆鄙俚之言只是一時男女淫奔相誘之語如桑中之詩云衆散民流而不可止故樂記云桑間濮上之音亡國之音也其衆散其民流誣上行私而不可止也鄭詩自緇衣之外亦皆鄙俚如采蕭采艾青衿之類是也故夫子放鄭聲如抑之詩非詩人作以刺君乃武公為之以自警又有稱小子之言此必非臣下告君之語乃自謂之言無疑也卓問詩傳盡撤去小序何也曰小序如碩人定之方中等見於左傳者自可無疑若其他刺詩無所據多是世儒将他謚號不美者挨就立名爾今只考一篇見是如此故其他皆不敢信且如蘇公刺暴公固是姓暴者多萬一不見得是暴公則惟暴之云者只作一箇狂暴底人説亦可又如将仲子如何便見得是祭仲某由此見得小序大故是後世陋儒所作但既是千百年已往之詩今只見得大意便了又何必要指實得其人姓名於㸔詩有何益也大雅問詩傳多不解詩序何也曰某自二十嵗時讀詩便覺小序無意義及去了小序只玩味詩詞却又覺得道理貫徹當初亦嘗質問諸鄉先生皆云序不可廢而某之疑終不能釋後到三十嵗斷然知小序之出於漢儒所作其為謬戾有不可勝言東萊不合只因序講解便有許多牽強處某嘗與之言終不肯信讀詩記中雖多說序然亦有説不行處亦廢之某因作詩傳遂成詩序辨説一冊其他謬戾辨之頗詳煇鄭漁仲謂詩小序只是後人将史傳去揀并㸔謚却附㑹作小序美刺振伯恭黨得小序不好使人㸔著轉可惡振器之問詩叶韻之義曰只要音韻相叶好吟哦諷誦易見道理亦無甚要𦂳今且要将七分工夫理㑹義理三二分工夫理㑹這般去處若只管留心此處而於詩之義却見不得亦何益也又曰叶韻多用吴才老本或自以意補入木之以下論詩韻問詩叶韻是當時如此作是樂歌當如此曰當時如此作古人文字多有如此者如正考父鼎銘之類可學問先生説詩率皆叶韻得非詩本樂章播諸聲詩自然叶韻方諧律吕其音節木如是耶曰固是如此然古人文章亦多是叶韻因舉王制及老子叶韻處數段又曰周頌多不叶韻疑自有和底篇相叶清廟之瑟朱絃而疏越一唱而三歎歎即和聲也儒用詩之音韻是自然如此這箇與天通古人音韻寛後人分得宻後隔開了離騷注中發兩箇例在前朕皇考曰伯庸庚寅吾以降洪又重之以修能耐紉秋蘭以為佩後人不曉却謂只此兩韻如此某有楚詞叶韻作子厚名字刻在漳州方子叶韻恐當以頭一韻為準且如華字叶音敷如有女同車是第一句則第二句顔如舜華當讀作敷字然後與下文佩玉瓊琚洵美且都皆叶至如何彼穠矣唐棣之華是第一韻則當依本音讀而下文王姬之車却當作尺奢反如此方是今只從吴才老舊説不能又創得此例然楚詞紛余既有此内美兮又重之以以修能能音耐然後下文紉秋蘭以為佩叶若能字只從本音則佩字遂無音如此則又未可以頭一韻為定也閎祖呉才老補韻甚詳然亦有推不去者某煞尋得當時不曾記今皆忘之矣如外禦其務叶烝也無戎才老無尋處却云務字古人讀做䝉不知戎汝也汝戎二字古人通用是協音汝也如南仲太祖太師皇父整我六師以修我戎亦是協音汝也下民有嚴叶不敢怠遑才老欲音嚴為荘云避漢諱却無道理某後來讀楚辭天問見一嚴字乃押從荘字乃知是叶韻嚴讀作昂也天問才老豈不讀往往無甚意義只恁打過去也義剛饒何氏録云中庸奏格無言奏音族平聲音騣所以毛詩作騣字或問吴氏叶韻何據曰他皆有據泉州有其書每一字多者引十餘證少者亦兩三證他説元初更多後刪去姑存此耳然猶有未盡因言商頌天命降監下民有嚴不僣不濫不敢怠遑吳氏云嚴字恐是荘字漢人避諱改作嚴字某後來因讀楚辭天問見嚴字都押入剛字方字去又此間鄉音嚴作户剛反乃知嚴字自與皇字叶然吴氏豈不曾㸔楚詞想是偶然失之又如兄弟䦧于墻外禦其務毎有良朋烝也無戎呉氏復疑務當作䝉以叶戎字某却疑古人訓戎為汝如以佐戎辟戎雖小子則戎女音或通後來讀常武詩有云南仲太祖太師皇父整我六師以修我戎則與汝叶明矣因言古之謡諺皆押韻如夏諺之類散文亦有押韻者如曲禮安民哉叶音茲則與上面思辭二字叶矣又如将上堂聲必揚将入户視必下下叶音䕶禮運孔子閒居亦多押韻荘子中尤多至於易彖辭皆韻語也又云禮記五至三無處皆協廣知子之來扐之雜佩以贈入之此例甚多作字作做保字作補往近王舅近音既説文作誤冩作近㽦問詩叶韻有何所據而言曰叶韻乃呉才老所作某又續添減之盖古人作詩皆押韻與今人歌曲一般今人信口讀之全失古人詠歌之意煇詩音韻間有不可曉處因説如今所在方言亦自有音韻與古合處子升因問今陽字却與唐字通清字却與青字分之類亦自不可曉曰古人韻踈後世韻方嚴宻見某人好考古字却説青字音自是親如此類極多木之器之問詩曰古人情意温厚寛和道得言語自恁地好當時叶韻只是要便於諷詠而已到得後來一向於字韻上嚴切却無意思漢不如周魏晉不如漢唐不如魏晉本朝又不如唐如元微之劉禹錫之徒和詩猶自有韻相重宻本朝和詩便定不要一字相同不知却愈壞了詩木之論讀詩詩中頭項多一項是音韻一項是訓詁名件一項是文體若逐一根究然後討得些道理則殊不濟事須是通悟者方㸔得方子以下搃論讀詩之方聖人有法度之言如春秋書禮是也一字皆有理如詩亦要逐字将理去讀便都礙了淳問聖人有法度之言如春秋書與周禮字較實詩無理㑹只是㸔大意若要将序去讀便礙了問變風變雅如何曰也是後人恁地説今也只依他恁地説如漢廣汝墳皆是説婦人如此則是文王之化只及婦人不及男子只㸔他大意恁地拘不得㝢公不㑹㸔詩須是㸔他詩人意思好處是如何不好處是如何㸔他風土㸔他風俗又㸔他人情物態只㸔伐檀詩便見得他一箇清髙底意思㸔碩䑕詩便見他一箇暴歛底意思好底意思是如此不好底是如彼好底意思令自家善意油然感動而興起㸔他不好底自家心下如着創相似如此㸔方得詩意僴詩有説得曲折後好底有只恁平直説後是好底如燕燕末後一章這不要㸔上文考下章便知得是恁地意思自是髙逺自是説得那人著義剛林子武説詩曰不消得恁地求之太深他當初只是平説横㸔也好豎㸔也好今若要討箇路頭去裏面尋却怕廹窄了義剛讀詩之法且如白華菅兮白茅束兮之子之逺俾我獨兮盖言白華與茅尚能相依而我與子乃相去如此之逺何哉又如倬彼雲漢為章于天周王夀考遐不作人只是説雲漢恁地為章于天周王夀考豈不能作人也上兩句皆是引起下面説畧有些意思傍著不須深求只此讀過便得僴㸔詩且㸔他大意如衞諸詩其中有説時事者固當細考如鄭之淫亂底詩苦苦搜求他有甚意思一日㸔五六篇可也僴㸔詩義理外更好㸔他文章且如谷風他只是如此説出來然而叙得事曲折先後皆有次序而今人費盡氣力去做後尚做得不好義剛讀詩且只将做今人做底詩㸔或每日令人誦讀却從旁聼之其詁有未通者畧檢注解㸔却時時誦其本文便見其語脉所在又曰念此一詩既已記得其語却逐箇字将前後一様字通訓之今注解中有一字而兩三義者如假字有云大者有云至者只是隨處旋紐揑耳非通訓也㽦先生因言㸔詩須并叶韻讀便見得他語自整齊又更畧知叶韻所由來甚善又曰伊川有詩解數篇説到小雅以後極好盖是王公大人好生地做都是識道理人言語故它裏靣説得儘有道理好仔細㸔非如國風或出於婦人小夫之口但可觀其大槩也銖問以詩觀之雖千百載之逺人之情偽只此而已更無兩般曰以某㸔來須是别換過天地方别換一様人情釋氏之説固不足據然其書説盡百千萬劫其事情亦只如此而已况天地無終窮人情安得有異必大㸔詩不要死煞㸔了見得無所不包今人㸔詩無興底意思節以下論讀詩在興起讀詩便長人一格如今人讀詩何縁㑹長一格詩之興最不𦂳要然興起人意處正在興㑹得詩人之興便有一格長豐水有芑武王豈不仕盖曰豐水且有芑武王豈不有事乎此亦興之一體不必更注解如龜山説關睢處意亦好然終是説死了如此便詩眼不活必大問向見呂丈問讀詩之法呂丈舉横渠置心平易之説見教某遵用其説去誦味來固有箇涵泳情性底道理然終不能有所啓發程子謂興於詩便知有著力處今讀之止見其善可為法惡可為戒而已不知其他如何著力曰善可為法惡可為戒不特詩也他書皆然古人獨以為興於詩者詩便有感發人底意思今讀之無所感發者正是被諸儒解殺了死著詩義興起人善意不得如南山有䑓序云得賢則能為邦家立太平之基蓋為見詩中有邦家之基字故如此解此序自是好句但纔如此説定便局了一詩之意若果先得其本意雖如此説亦不妨正如易解若得聖人繫辭之意便横説竪説都得今斷以一義解定易便不活詩所以能興起人處全在興如山有樞隰有榆别無意義只是興起下面子有車馬子有衣裳耳小雅諸篇皆君臣燕飲之詩道主人之意以譽賔如今人宴飲有致語之類亦間有叙賔客答辭者漢書載客歌驪駒主人歌客毋庸歸亦是此意古人以魚為重故魚䴡南有嘉魚皆特舉以歌之儀禮載乃間歌魚䴡笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀本一套事後人移魚䴡附於鹿鳴之什截以嘉魚以下為成王詩遂失當時用詩之意故胡亂解今觀魚麗嘉魚南山有臺等篇辭意皆同菁莪湛露蓼蕭皆燕飲之詩詩中所謂君子皆稱賔客後人却以言人君正顛倒了如以湛露為恩澤皆非詩義故野有蔓草零露湑兮亦以為君之澤不下流皆局於一箇死例所以如此周禮以六詩教國子當時未有注解不過教之曰此興也此比也此賦也興者人便自作興㸔比者人便自作比㸔興只是興起謂下句直説不起故将上句帶起來説如何去上討義理今欲觀詩不若且置小序及舊説只将原詩虚心熟讀徐徐玩味候彷彿見箇詩人本意却從此推尋将去方有感發如人拾得一箇無題目詩再三熟㸔要須辨得出來若被舊説一局局定便㸔不出今雖説不用舊説終被他先入在内不期依舊從它去某向作詩解文字初用小序至解不行處亦曲為之説後來覺得不安第二次解者雖存小序間為辨破然終是不見詩人本意後來方知只盡去小序便自可通於是盡滌舊説詩意方活又曰變風中固多好詩雖其間有没意思者然亦須得其命辭遣意處方可觀後人便自做箇道理解説於其造意下語處元不及究只後代文集中詩亦多不解其辭意者樂府中羅敷行羅敷即使君之妻使君即羅敷之夫其曰使君自有婦羅敷自有夫正相戱之辭又曰夫婿從東來千騎居上頭觀其氣象即使君也後人亦錯解了須得其辭意方見好笑處必大學者當興於詩須先去了小序只将本文熟讀玩味仍不可先㸔諸家注解㸔得久之自然認得此詩是説箇甚事謂如拾得箇無題目詩説此花既白又香是盛寒開必是梅花詩也卷阿召康公戒成王其始只説箇好意思如豈弟君子皆指成王純嘏爾夀之類皆説優游享福之事至有馮有翼以下方説用賢大抵告人之法亦當如此須先令人歆慕此事則其肯從吾言必樂為之矣人傑讀詩正在於吟咏諷誦觀其委曲折旋之意如吾自作此詩自然足以感發善心今公讀詩只是将己意去包籠他如做時文相似中間委曲周旋之意盡不曾理㑹得濟得甚事若如此㸔只一日便可觀盡何用逐日只捱得數章而又不曾透徹耶且如人入城郭須是逐街坊里巷屋廬臺榭車馬人物一一㸔過方是今公等只是外面望見城是如此便説我都知得了如鄭詩雖淫亂然出其東門一詩却如此好女曰鷄鳴一詩意思亦好讀之真箇有不知手之舞足之蹈者僴以下論詩在熟讀玩味詩如今恁地注解了自是分曉易理㑹但須是沈潜諷誦玩味義理咀嚼滋味方有所益若只草草㸔過一部詩只三兩日可了但不得滋味也記不得全不濟事古人説詩可以興須是讀了有興起處方是讀詩若不能興起便不是讀詩因説永嘉之學只是要立新巧之説少間指摘東西闘湊零碎便立説去縱説得是也只無益莫道又未是木之讀詩之法只是熟讀涵泳自然和氣從胷中流出其妙處不可得而言不待安排措置務自立説只恁平讀著意思自足須是打疊得這心光蕩蕩地不立一箇字只管虚心讀他少間推來推去自然推出那箇道理所以説以此洗心便是以這道理盡洗出那心裏物事渾然都是道理上蔡曰學詩須先識得六義體面而諷詠以得之此是讀詩之要法㸔來書只是要讀讀得熟時道理自見切忌先自布置立説問學者誦詩每篇誦得幾遍曰也不曾記只覺得熟便止曰便是不得須是讀熟了文義都曉得了涵泳讀取百來遍方見得那好處那好處方出方見得精怪見公每日説得來乾燥元來不曾熟讀若讀到精熟時意思自説不得如人下種子既下得種了須是討水去灌溉他討糞去培擁他與他耘鋤方是下工夫養他處今却只下得箇種子了便休都無耘治培養工夫如人相見纔見了便散去都不曾交一談如此何益所以意思都不生與自家都不相入都恁地乾燥這箇貪多不得讀得這一篇恨不得常熟讀此篇如無那第二篇方好而今只是貪多讀第一篇了便要讀第二篇讀第二篇了便要讀第三篇恁地不成讀書此便是大不敬此句厲聲説須是殺了那走作底心方可讀書大凡讀書先曉得文義了只是常常熟讀如㸔詩不須得著意去裏靣訓解但只平平地涵泳自好因舉池之竭矣不云自頻泉之竭矣不云自中四句吟咏者久之又曰大雅中如烝民板抑等詩自有好底董氏舉侯芭常言衞武公作抑詩使人日誦於其側不知此出在何處他讀書多想見是如此又曰如孟子也大故分曉也不用解他熟讀滋味自出䕫孫先生問林子武㸔詩何處曰至大雅大聲曰公前日方㸔節南山如何恁地快恁地不得而今人㸔文字敏底一揭開板便曉但於意味却不曾得便只管㸔時也只是恁地但百遍自是强五十遍時二百遍自是強一百遍時題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生這箇㸔時也只是恁地但裏靣意思却有説不得底解不得底意思却在説不得底裏面又曰生民等篇也可見祭祀次第此與儀禮正相合義剛問時舉㸔文字如何曰詩傳今日方㸔得綱領要之𦂳要是要識得六義頭面分明則詩亦無難㸔者曰讀詩全在諷詠得熟則六義将自分明須使篇篇有箇下落始得且如子善向㸔易傳往往畢竟不曾熟如此則何縁㑹浃洽横渠云書須成誦精思多在夜中或静坐得之不記則思不起今學者㸔文字若記不得則何縁貫通時舉曰縁資性魯鈍全記不起曰只是貪多故記不得福州陳正之極魯鈍每讀書只讀五十字必三二百遍而後能熟積習讀去後來却赴賢良要知人只是不㑹耐苦耳凡學者要須做得人難做底事方好若見做不得便不去做要任其自然何縁做得事成切冝勉之時舉問㸔詩如何曰方㸔得關睢一篇未有疑處曰未要去討疑處只熟㸔某注得訓詁字字分明便却玩索涵泳方有所得若便要立議論往往裏靣曲折其實未曉只髣髴見得便自虚説耳恐不濟事此是三百篇之首可更熟㸔時舉先生謂學者曰公㸔詩只㸔集傳全不㸔古注曰某意欲先㸔了先生集傳却㸔諸家解曰便是不如此無却㸔底道理才説却理㑹便是悠悠語今見㸔詩不從頭㸔一過云且等我㸔了一箇了却㸔那箇幾時得再㸔如厮殺相似只是殺一陣便了不成説今夜且如此厮殺明日又重新殺一畨僴文蔚泛㸔諸家詩説先生曰某有集傳後只㸔集傳先生又曰曾㕘㸔諸家否曰不曾曰却不可文蔚解詩漢書傳訓皆與經别行三傳之文不與經連故石經書公羊傳皆無經文藝文志云毛詩經二十九卷毛詩詁訓傳三十卷是毛為詁訓亦不與經連也馬融為周禮註乃云欲省學者兩讀故具載本文然則後漢以來始就經為注未審此詩引經附傳是誰為之其毛詩二十九卷不知併何卷也毛鄭所謂山東老學究歐陽㑹文章故詩意得之亦多但是不合以今人文章如他底意思去㸔故皆局促了詩意古人文章有五七十里不回頭者蘇黄門詩說踈放覺得好振歐陽公有詩本義二十餘篇煞説得有好處有詩本末篇又有論云何者為詩之本何者為詩之末詩之本不可不理㑹詩之末不理㑹得也無妨其論甚好近世自集注文字出此等文字都不見了也害事如呂伯恭讀詩記人只是㸔這箇它上面有底便㸔無底更不知㸔了僴因言歐陽永叔本義而曰理義大本復明於世固自周程然先此諸儒亦多有助舊來儒者不越注疏而已至永叔原父孫明復諸公始自出議論如李㤗伯文字亦自好此是運數将開理義漸欲復明於世故也蘓明允說歐陽之文處形容得極好近見其奏議文字如回河等劄子皆説得盡誠如老蘓所言便如詩本義中辨毛鄭處文辭舒緩而其説直到底不可移易㽦程先生詩傳取義太多詩人平易恐不如此横渠云置心平易始知詩然横渠解詩多不平易程子説胡安定解九四作太子事云若一爻作一事只做得三百八十四事此真㸔易之法然易傳中亦有偏解作一事者林艾軒嘗云伊川解經有說得未的當處此文義間事安能一一皆是若大頭項則伊川底却是此善觀伊川者陸子静㸔得二程低此恐子静㸔其説未透耳譬如一塊精金却道不是金非金之不好盖是不識金也人傑必大録云横渠解悠悠蒼天此何人哉却不平易子由詩解好處多歐公詩本義亦好因説東萊改本書解無闕疑處只據意説去木之問書解誰底好㸔曰東坡解大綱也好只有説如説人心惟危這般處便説得差了如今㸔他底須是識他是與不是處始得木之問讀詩記序中雅鄭邪正之説未明曰向來㸔詩中鄭詩弼鄘衞詩便是鄭衞之音其詩大段邪淫伯恭直以謂詩皆賢人所作皆可歌之宗廟用之賔客此甚不然如國風中亦多有邪淫者又問思無邪之義曰此只是三百篇可蔽以詩中此言所謂無邪者讀詩之大體善者可以勸而惡者可以戒若以為皆賢人所作賢人決不肯為此若只一鄉一里中有箇恁地人専一作此怨刺恐亦不静至於皆欲被之絃歌用之宗廟如鄭衞之詩豈不䙝凟用以祭幽厲褒姒可也施之賔客燕饗亦待好賔客不得須衞靈陳幽乃可耳所謂詩可以興者使人興起有所感發有所懲創可以觀者見一時之習俗如此所以聖人存之不盡刪去便盡見當時風俗􅍇惡非謂皆賢人所作耳大序説止乎禮義亦可疑小序尤不可信皆是後人託之仍是不識義理不曉事如山東學究者皆是取之左傳史記中所不取之君隨其謚之美惡有得惡諡及傳中載其人之事者凡一時惡詩盡以歸之最是鄭忽可憐見鄭風中惡詩皆以為刺之伯恭又欲主張小序煅煉得鄭忽罪不勝誅鄭忽却不是狡若是狡時它却須結齊國之援有以鉗制祭仲之徒決不至於失國也謚法中如墮覆社稷曰頃便将柏舟一詩硬差排為衞頃公便云賢人不遇小人在側更無分疏處愿而無立曰僖衡門之詩便以誘陳僖愿而無立志言之如子矜只是淫奔之詩豈是學校中氣象褰裳詩中子恵思我褰裳渉溱至狂童之狂也且豈不是淫奔之辭只縁左傳中韓宣子引豈無他人便将做國人思大國之正已不知古人引詩但借其言以寓己意初不理㑹上下文義偶一時引之耳伯恭只詩綱領第一條便載上蔡之説上蔡費盡辭説只解得箇怨而不怒纔先引此便是先瞎了一部文字眼目㽦問今人自做一詩其所寓之意亦只自曉得前軰詩如何可盡解曰何况三百篇後人不肯道不㑹須要字字句句解得麽當時解詩時且讀本文四五十遍已得六七分却㸔諸人説與我意如何大綱都得之又讀三四十遍則道理流通自得矣或問詩曰詩幾年埋没被某取得出來做公們㸔得恁地搭滯㸔十年仍舊死了那一部詩今若有㑹讀書底人㸔某詩傳有不活絡處都塗了方好而今詩傳只堪減不堪添胡泳伯恭說詩太巧亦未必然古人直不如此今某説皆直靠直説揚李茂欽問先生曾與東萊辨論淫奔之詩東萊謂詩人所作先生謂淫奔者之言至今未曉其説曰若是詩人所作譏刺淫奔則婺州人如有淫奔東萊何不作一詩刺之茂欽又引他事問難先生曰未須别説只為我答此一句來茂欽辭窮先生曰若人家有隠僻事便作詩訐其短譏刺此乃今之輕薄子好作謔詞嘲鄉里之類為一鄉所疾害者詩人温醇必不如此如詩中所言有善有惡聖人兩存之善可勸惡可戒杞某解詩多不依他序縱解得不好也不過只是得罪於作序之人只依序解而不攷本詩上下文意則得罪於聖賢也揚因説學者解詩曰某舊時㸔詩數十家之説一一都從頭記得初間那裏敢便判斷那説是那説不是㸔熟久之方見得這説似是那説似不是或頭邊是尾説不相應或中間數句是兩頭不是或尾頭是頭邊不是然也未敢便判斷疑恐是如此又㸔久之方審得這説是那説不是又熟㸔久之方敢決定斷説這説是那説不是這一部詩并諸家解都包在肚裏公而今只是見已前人解詩便也要注解更不問道理只認捉著便據自家意思説於已無益於經有害濟得甚事凡先儒解經雖未知道然其盡一生之力縱未説得七八分也有三四分且湏熟讀詳究以審其是非而為吾之益今公纔㸔着便妄生去取肆以己意是發明得箇甚麽道理公且説人之讀書是要将作甚麽用所貴乎讀書者是要理㑹這箇道理以反之於身為我之益而已僴詩傳中或云姑從或云且從其説之類皆未有所攷不免且用其説拱夀詩傳只得如此説不容更著語工夫却在讀者必大問分詩之經詩之傳何也曰此得之於呂伯恭風雅之正則為經風雅之變則為傳如屈平之作離騷即經也如後人作反騷與夫九辯之類則為傳耳煇朱子語類卷八十
