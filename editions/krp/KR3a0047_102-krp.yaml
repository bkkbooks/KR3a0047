body:
  text: 朱子語類卷一百二楊氏門人羅仲素羅先生嚴毅清苦殊可畏道夫李先生言羅仲素春秋說不及文定葢文定才大設張羅落者大文定集有荅羅書可見方道夫言羅先生教學者靜坐中看喜怒哀樂未發謂之中未發作何氣象李先生以爲此意不惟於進學有力兼亦是養心之要而遺書有云既思則是已發昔嘗疑其與前所舉有礙細思亦甚緊要不可以不攷直卿曰此問亦甚切但程先生剖析毫釐體用明白羅先生探索本源洞見道體二者皆有大功於世善觀之則亦並行而不相悖矣况羅先生於靜坐觀之乃其思慮未萌虚靈不昧自有以見其氣象則初無害於未發蘇季明以求字爲問則求非思慮不可此伊川所以力辨其差也先生曰公雖是如此分解羅先生說終恐做病如明道亦說靜坐可以爲學謝上蔡亦言多著靜不妨此說終是小偏才偏便做病道理自有動時自有靜時學者只是敬以直内義以方外見得世間無處不是道理雖至微至小處亦有道理便以道理處之不可專要去靜處求所以伊川謂只用敬不用靜便說得平也是他經歴多故見得恁地正而不偏若以世之大叚紛擾人觀之若㑹靜得固好若講學則不可有毫髪之偏也如天雄附子冷底人喫得也好如要通天下喫便不可道夫蕭子莊先生問浦城有蕭先生顗受業於龜山之門不知所得如何道夫遂以蕭先生所答范公三書呈先生曰元來是箇天資自好朴實頭底人初非學問之力且如所謂人能𢎞道君子泰而不驕君子坦蕩蕩三者那人舉得本自不倫他又却從而贊美之也須思量道如何而能𢎞如何而能泰與坦蕩蕩却只恁說教人從何處下手况人能𢎞道本非此意如他所說却是士不可以不𢎞毅執德不𢎞今却以人能𢎞道言之自不干事又如第二書言士之所志舍仁義而何爲哉惟仁必欲熟義必欲精仁熟則造次顛沛有所不違義精則利用安身而德崇矣此數句說得儘好但仁固欲熟義固欲精也須道如何而能精如何而能熟却只隨他在後面說不知前面畢竟是如何又如舉孟子不動心養氣之說皆是汎說惟其如此故人亦謂伊川也只恁地所以豪傑之士皆傲聣不服又曰據公所見若有人問自家仁必欲熟義必欲精兩句如何地答這便是格物致知道夫曰莫是克去已私以明天理則仁自然熟義自然精曰此正程先生所謂涵養必以敬進學在致知之意也道夫廖用中或問爲善爲利處因舉龜山答廖用中書云龜山說得鶻突用中認得不子細後來於利害便不能分别紹興間秦老當國方主和議廖有召命自無所見却去扣其平日所友善之人鄭邦達邦達初不經意但言和亦是好事廖到闕即助和議遂爲中丞幸而不肯爲秦鷹犬秦嘗諷其論趙丞相不從遷工部尚書迄以此去儒用龜山與廖尚書說義利事廖云義利即是天理人欲龜山曰只怕賢錯認以利爲義也後來被召主和議果如龜山說廖初舉鄭厚與某人可見其賢此二人二人皆要上恐脫不字主和議及廖被召却不問此二人却去與葉孝先商量更輔之以主和及爲中丞又薦鄭轂然廖終與秦不合而出但初不能别義利之分亦是平時講之不熟也鄭博士某舊及見之年七十餘云嘗見上蔡先人甚敬之賀孫因言廖用中議和事云廖用中固非詭隨者但見道理不曾分曉當時龜山已嘗有語云恐子以利爲義者政爲是也夀昌胡德輝因說胡珵德輝所著文字問德輝何如人曰先友也晉陵人曾從龜山游故所記多龜山說話能詩文墨𨽻皆精好嘗見先人館中唱和一卷唯胡詩特佳趙忠簡公當國與張嵲巨山同爲史官及趙公去位張魏公獨相以爲元祐未必全是熈豐未必全非遂擢何掄仲李似表二人爲史官胡張所脩史皆摽出欲改之胡張遂求去及忠簡再入相遂去何李依舊用胡張爲史官成書奏上㺯得都成私意儒用尹氏門人王德脩先生云嚮日鄉間一親戚虞氏見仙里王德脩見教云學者要識一愧字與耻字此言却極好大雅一日侍坐學者問難紛然王德脩曰不必多問但去行取且如人理㑹惟精惟一允執厥中只管說如此是精如此是一臨了中却不見先生曰精一則中矣文蔚朱子語類卷一百二
