body:
  text: 朱子語類卷七十七周易十三說卦贊於神明猶言治於人相似謂為人所治也贊於神明神明所贊也聖人用於字恁地用不然只當説幽贊神明此却是説見助於神明淵贊只是贊化育之贊不解便說那贊命於神明這只説道他為神明所贊所以生出這般物事來與人做卦淵生蓍便是大衍之數五十如何恰限生出百莖物事教人做筮用到那三天兩地方是取數處看得來隂陽剛柔四字隂陽指二老剛柔指二少淵問參天兩地舊説以為五生數中天參地兩不知其説如何曰如此只是三天兩地不見參兩之意參天者參而三之兩地者兩之以二也以方員而言則七八九六之數都自此而起問以方員而言參兩如天之員徑一則以圍三而參之地之方徑一則以圍四而兩之否曰然榦問參天兩地而倚數曰天圓得數之三地方得數之四一畫中有三畫三畫中參之則為九此天之數也陽道常饒隂道常乏地之數不能為三止於兩而已三而兩之為六故六為坤去偽參天兩地而倚數一箇天參之為三一箇地兩之為二三三為九三二為六兩其三一其二為八兩其二一其三為七二老為隂陽二少為柔剛參不是三之數是徃參焉之參兼三才而兩之初剛而二柔按下二爻於三極為地三仁而四義按中二爻於三極為人五陽而上隂按上二爻於三極為天陽化為隂只恁地消縮去無痕迹故謂之化隂變為陽其勢浸長便較突兀有頭面故謂之變隂少於陽氣理數皆如此用全用半所以不同至參天兩地而倚數此在揲蓍上說參者元是箇三數底物事自家從而三之兩者元是箇兩數底物事自家從而兩之雖然却只是説得箇三在未見得成何數倚數云者似把幾件物事挨放這裏如已有三數更把箇三數倚在這裏成六又把箇三數物事倚在此成九兩亦如之淵一箇天參之則三一箇地兩之則二數便從此起此與大衍之數五十各自説一箇道理不須合來看然要合也合得一箇三一箇二衍之則成十便是五十淵天下之數都只始於三二謂如陽數九只是三三而九之隂數六只是三二而六之故孔子云三天兩地而倚數此數之本也康節却云非天地之正數是他見得不盡康節却以四為數端蒙倚數倚是靠在那裏且如先得箇三又得箇三只成六更得箇三方成九若得箇二却成八恁地倚得數出來有人説參作三謂一三五兩謂二四一三五固是天數二四固是地數然而這却是積數不是倚數淵問觀變於隂陽而立卦觀變是就蓍數上觀否曰恐只是就隂陽上觀未用說到蓍數處學履觀變於隂陽且統説道有幾畫隂幾畫陽成箇甚卦發揮剛柔却是就七八九六上説初間做這卦時未曉得是變與不變及至發揮出剛柔了方知這是老隂少隂那是老陽少陽淵問觀變於隂陽而立卦發揮於剛柔而生爻既有卦則有爻矣先言卦而後言爻何也曰自作易言之則有爻而後有卦此却似自後人觀聖人作易而言方其立卦時只見是卦及細别之則有六爻問隂陽剛柔一也而别言之何也曰觀變於隂陽近於造化而言發揮剛柔近於人事而言且如泰卦以卦言之只見得小徃大來隂陽消長之意爻裏面便有包荒之類榦問近見先生易詩云立卦生爻自有因兩儀四象已前陳因字之義如何曰卦爻因儀象而生立即兩儀生四象四象生八卦之意又問生爻指言重卦否曰然銖問和順道德而理於義是就聖人上説是就易上説曰是説易又問和順是聖人和順否曰是易去和順道德而理於義如吉凶消長之道順而無逆是和順道德也理於義則又極其細而言隨事各得其宜之謂也和順道德如極髙明理於義如道中庸學履和順道德而理於義是統説底窮理盡性至命是分説底上一句是離合言之下一句以淺深言之凡卦中所説莫非和順那道德不悖了他理於義是細分他逐事上各有箇義理和順字理字最好看聖人下這般字改移不得不似今時抹了却添幾字都不妨淵聖人作易時其中固是具得許多道理人能體之而盡則便似那易他説那吉凶悔吝處莫非和順道德理於義窮理盡性之事這一句本是説易之書如此後人説去學問上却是借他底然這上也有意思皆是自淺至深淵道理須是與自家心相契方是得他所以要窮理忠信進徳之類皆窮理之事易中自具得許多道理便是教人窮理循理淵窮理是理㑹得道理窮盡盡性是做到盡處如能事父然後盡仁之性能事君然後盡義之性閎祖窮理是窮得物盡得人性到得那天命所以説道性命之源淵窮理是知字上説盡性是仁字上説言能造其極也至於範圍天地是至命言與造化一般淵窮理盡性以至於命這物事齊整不亂其所從來一也人傑窮理盡性至於命本是就易上説易上皆説物理便是窮理盡性即此便是至命諸先生把來就人上説能窮理盡性了方至於命淳問窮理盡性以至於命曰此言作易者如此後來不合將做學者事看如孟子盡心知性知天之説豈與此是一丳却是學者事只於窮理上著工夫窮得理時性與命在其中矣横渠之説未當去偽或問窮理盡性以至于命程子之説如何曰理性命只是一物故知則皆知盡則皆盡不可以次序言但知與盡却有次第耳伯豐問窮理盡性以至於命程張之説孰是曰各是一説程子皆以見言不如張子有作用窮理是見盡性是行覺得程子是説得快了如為子知所以孝為臣知所以忠此窮理也為子能孝為臣能忠此盡性也能窮此理充其性之所有方謂之盡以至於命是拖脚却説得於天者盡性是我之所至也至命是説天之所以予我者耳昔嘗與人論舜事舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為人父子者定知此者是窮理者也能此者盡性者也􅓌昔者聖人之作易將以順性命之理聖人作易只是要發揮性命之理模寫那箇物事下文所説隂陽剛柔仁義便是性中有這箇物事順性命之理只是要發揮性命之理淵問將以順性命之理而下言立天地人之道乃繼之以兼三才而兩之此恐言聖人作易之由如觀鳥獸之文與地之宜始作八卦相似蓋聖人見得三才之理只是隂陽剛柔仁義故為兩儀四象八卦也只是這道理六畫而成卦也只是這道理曰聖人見得天下只是這兩箇物事故作易只是模寫出這底問模寫出來便所謂順性命之理性命之理便是隂陽剛柔仁義否曰便是順性命之理問兼三才如何分曰以一卦言之上兩畫是天中兩畫是人下兩畫是地兩卦各自看則上與三是天五與二為人四與初為地問以八卦言之則九三者天之陽六三者天之隂九二者人之仁六二者人之義初九者地之剛初六者地之柔不知是否曰恁地看也得如上便是天之隂三便是天之陽五便是人之仁二便是人之義四便是地之柔初便是地之剛榦問立天之道曰隂陽道理也隂陽氣也何故以隂陽為道曰形而上者謂之道形而下者謂之器明道以為須著如此説然器亦道道亦器也道未嘗離乎器道亦只是器之理如這交椅是器可坐便是交椅之理人身是器語言動作便是人之理理只在器上理與器未嘗相離所以一隂一陽之謂道曰何謂一曰一如一闔一闢謂之變只是一隂了又一陽此便是道寒了又暑暑了又寒這道理只循環不已維天之命於穆不已萬古只如此淳立天之道曰隂與陽是以氣言立地之道曰柔與剛是以質言立人之道曰仁與義是以理言端蒙隂陽是陽中之隂陽剛柔是隂中之隂陽剛柔以質言是有箇物了見得是剛底柔底隂陽以氣言淵問仁是柔如何却屬乎剛義是剛如何却屬乎柔曰蓋仁本是柔底物事發出來却剛但看萬物發生便自恁地奮迅出來有剛底意思義本是剛底物事發出來却柔但看萬物肅殺時便恁地收斂憔悴有柔底意思如人春夏間陽勝却有懈怠處秋冬間隂勝却有健實處又問揚子雲君子於仁也柔於義也剛如何曰仁體柔而用剛義體剛而用柔銖曰此豈所謂陽根隂隂根陽耶曰然銖隂陽剛柔仁義看來當曰義與仁當以仁對陽仁若不是陽剛如何做得許多造化義雖剛却主於收斂仁却主發舒這也是陽中之隂隂中之陽互藏其根之意且如今人用賞罰到賜與人自是無疑便做將去若是刑殺時便遲疑不肯果決這見得陽舒隂斂仁屬陽義屬隂處淵㬊問如何以仁比剛曰人施恩惠時心自是直無疑憚心行刑罰時心自是疑畏萬有一失則奈何且如春生則氣舒自是剛秋則氣收而漸衰自是柔學蒙兼三才而兩之兼貫通也通貫是理本如此兩之者隂陽剛柔仁義也方兼三才而兩之初剛而二柔三仁而四義五陽而六隂兩之如言加一倍本是一箇又各加一箇為兩方子問分隂分陽迭用柔剛隂陽剛柔只是一理兼而舉之否曰然榦問山澤通氣只為兩卦相對所以氣通曰澤氣升於山為雲為雨是山通澤之氣山之泉脉流於澤為泉為水是澤通山之氣是兩箇之氣相通學䝉山澤通氣水火不相射山澤一髙一下而水脉相為灌輸也水火下然上沸而不相滅息也或曰射音亦與斁同言相為用而不相厭也僴射猶犯也人傑射一音亦是不相厭之義一音食是不相害水火本相殺滅用一物隔著却相為用此二義皆通學蒙問射或音石或音亦孰是曰音石水火與風雷山澤不相類本是相剋底物事今却相應而不相害問若以不相厭射而言則與上文通氣相薄之文相類不知如何曰不相射乃下文不相悖之意不相悖乃不相害也水火本相害之物便如未濟之水火亦是中間有物隔之若無物隔之則相害矣此乃以其不害而明其相應也榦數徃者順這一段是從卦氣上看來也是從卦畫生處看來恁地方交錯成六十四淵易逆數也似康節説方可通但方圖則一向皆逆若以圓圖看又只一半逆不知如何學蒙雷以動之以下四句取象義多故以象言艮以止之以下四句取卦義多故以卦言又曰喚山以止之又不得只得云艮以止之學蒙後四卦不言象也只是偶然到後兩句説乾以君之坤以藏之却恁地説得好淵帝出乎震與萬物出乎震只這兩段説文王卦淵帝出乎震萬物發生便是他主宰從這裏出齊乎巽曉不得離中虚明可以為南方之卦坤安在西南不成西北方無地西方肅殺之地如何云萬物之所説乾西北也不可曉如何隂陽只來這裏相薄勞乎坎勞字去聲似乎慰勞之意言萬物皆歸藏于此去安存慰勞他學蒙問戰乎乾何也曰此處大抵難曉恐是箇肅殺收成底時節故曰戰乎乾問何以謂之隂陽相薄曰乾陽也乃居西北故曰隂陽相薄恐是如此也見端的未得榦問勞乎坎曰恐是萬物有所歸有箇勞徠安定他之意榦勞乎坎是説萬物休息底意成言乎艮艮在東北是説萬物終始處淵艮也者萬物之所以成終而成始也猶春冬之交故其位在東北方子帝出乎震以下何以知其為文王之卦位曰康節之説如此問仔細看此數段前兩段説伏羲卦位後兩段自帝出乎震以下説文王卦位自神者妙萬物而為言下有兩段前一段乃文王卦位後段乃伏羲底恐夫子之意以為伏羲文王所定方位不同如此然生育萬物既如文王所次則其方位非如伏羲所定亦不能變化既成萬物無伏羲底則做文王底不出竊恐文義如此説較分明曰如是則其歸却主在伏羲上恁地説也好但後兩段却除了乾坤何也曰竊恐著一句神者妙萬物而為言引起則乾坤在其中矣曰恐是如此問且如雷風水火山澤自不可喚做神曰神者乃其所以動所以撓者是也榦文王八卦坎艮震在東北離坤兊在西南所以分隂方陽方淵文王八卦不可曉處多如離南坎北離坎却不應在南北且做水火居南北兊也不屬金如今只是見他底慣了一似合當恁地相似淵文王八卦有些似京房卦氣不取卦畫只取卦名京房卦氣以復中孚屯為次復陽氣之始也中孚陽實在内而未發也屯始發而艱難也只取名義文王八卦配四方四時離南坎北震東兊西若卦畫則不可移換方子水火相逮一段又似與上面水火不相射同又自是伏羲卦淵八卦次序是伏羲底此時未有文王次序三索而為六子這自是文王底各自有箇道理淵震一索而得男一段看來不當專作揲蓍看揲蓍有不依這序時便說不通大槩只是乾求於坤而得震坎艮坤求於乾而得巽離兊一二三者以其畫之次序言也淵震一索而得男索字訓求字否曰是又曰非震一索而得男乃是一索得陽爻而後成震又曰一說是就變體上説謂就坤上求得一陽爻而成震卦一說乃是揲蓍求卦求得一陽後面二隂便是震求得一隂後面二陽便是巽學蒙乾坤三索則七八固有六子之象然不可謂之六子之䇿若謂少隂陽為六子之䇿則乾坤為無少隂陽乎淵卦象指文王卦言所以乾言為寒為氷淵為乾卦其究為躁卦此卦是巽下一爻變則為乾便是純陽而躁動此蓋言巽反為震震為決躁故為躁卦此亦不繫大綱領處無得工夫去㸃檢他這般處若恁地逐段理㑹得來也無意思淵至之問艮何以為手曰手去捉定那物便是艮又問捉物乃手之用不見取象正意曰也只是大槩略恁地安卿説麻衣以艮為鼻曰鼻者面之山晉管輅已如此説亦各有取象又問麻衣以巽為手取義於風之舞非是為股先生蹙眉曰亂道如此之甚義剛序卦問序卦或以為非聖人之書信乎曰此沙隨程氏之説也先儒以為非聖人之藴某以為謂之非聖人之精則可謂非易之藴則不可周子分精與藴字甚分明序卦却正是易之藴事事夾雜都有在裏面問如何謂易之精曰如易有太極是生兩儀兩儀生四象四象生八卦這是易之精問如序卦中亦見消長進退之義喚作不是精不得曰此正是事事夾雜有在裏面正是藴須是自一箇生出來以至於無窮便是精榦序卦自言天地萬物男女夫婦是因咸恒為夫婦之道說起非如舊人分天道人事之說大率上經用乾坤坎離為始終下經便當用艮兊巽震為始終淵問序卦中有一二處不可曉處如六十四卦獨不言咸卦何也曰夫婦之道即咸也問恐亦如上經不言乾坤但言天地則乾坤可見否曰然問不養則不可以動故受之以大過何也曰動則過矣故小過亦曰有其信者必行之故受之以小過問物不可以終壯故受之以晉壯與晉何别曰不但如此壯而已又更須進一步也榦問禮義有所錯錯字陸氏兩音如何曰只是作措字謂禮義有所施設耳􅓌問序卦中如所謂緩必有所失似此等事恐後人道不到曰然問緩字恐不是遲緩之緩乃是懈怠之意故曰解緩也曰緩是散漫意問如縱弛之類否曰然雜卦序卦雜卦聖人去這裏見有那無緊要底道理也説則箇了過去然雜卦中亦有説得極精處淵雜卦反對之義只是反覆則其吉凶禍福動静剛柔皆相反了曰是如此不知如何數卦又不對了大畜時也也曉不得又與无妄不相反是如何臨觀更有與求之義臨以二陽言之則二陽可以臨上四隂以卦爻言之則六五上六又以上而臨下觀自下而觀上則為觀是平聲自上而為物之觀是去聲噬嗑食也賁無色也義雖可通但不相反謙輕是以謙抑不自尊重女待男而行所以為漸謙輕而豫怠輕是卑小之義豫是悦之極便放倒了如上六㝠豫是也去偽伊川説未濟男之窮為三陽失位以為斯義得之成都隠者見張敬夫説伊川之在涪也方讀易有箍桶人以此問伊川伊川不能答其人云三陽失位火珠林上已有伊川不曾看雜書所以被他說動了朱子語類卷七十七
