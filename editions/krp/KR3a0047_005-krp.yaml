body:
  text: 朱子語類卷五性理二性情心意等名義問天與命性與理四者之别天則就其自然者言之命則就其流行而賦於物者言之性則就其全體而萬物所得以為生者言之理則就其事事物物各有其則者言之到得合而言之則天即理也命即性也性即埋也是如此否曰然但如今人説天非蒼蒼之謂據某看來亦捨不得這箇蒼蒼底賀孫以下論性命理者天之體命者理之用性是人之所受情是性之用道夫命猶誥勅性猶職事情猶施設心則其人也賀孫天所賦為命物所受為性賦者命也所賦者氣也受者性也所受者氣也㝢道即性性即道固只是一物然須看因甚唤做性因甚唤做道淳以下論性性即理也在心唤做性在事唤做理燾生之理謂性節性只是此理節性是合當底同性則純是善底同性則天生成許多道理同性是許多理散在處為性同問性既無形復言以理理又不可見曰父子有父子之理君臣有君臣之理節性是實理仁義禮智皆具徳明問性固是理然性之徳還是就人生禀得言之否曰繼之者善成之者性這箇理在天地間時只是善無有不善者生物得來方始名曰性要之這理在天則曰命在人則曰性淳鄭問先生謂性是未發善是已發何也曰纔成箇人影子許多道理便都在那人上其惻隠便是仁之善羞惡便是義之善到動極復靜處依舊只是理曰這善也是性中道理到此方見否曰這須就那地頭看繼之者善也成之者性也在天地言則善在先性在後是發出來方生人物發出來是善生人物便成箇性在人言則性在先善在後或舉孟子道性善曰此則性字重善字輕非對言也文字須活看此且就此説彼則就彼説不可死看牽此合彼便處處有礙淳性不是卓然一物可見者只是窮理格物性自在其中不須求故聖人罕言性徳明諸儒論性不同非是於善惡上不明乃性字安頓不着砥聖人只是識得性百家紛紛只是不識性字揚子鶻鶻突突荀子又所謂隔靴爬痒揚致道謂心為太極林正卿謂心具太極致道舉以為問先生曰這般處極細難説看來心有動靜其體則謂之易其理則謂之道其用則謂之神直卿退而發明曰先生道理精熟容易説出來須至極賀孫問其體則謂之易體是如何曰體不是體用之體恰似説體質之體猶云其質則謂之易理即是性這般所在當活看如心字各有地頭説如孟子云仁人心也仁便是人心這説心是合理説如説顔子其心三月不違仁是心為主而不違乎理就地頭看始得又云先生太極圖解云動靜者所乗之機也蔡季通聰明看得這般處出謂先生下此語最精盖太極是理形而上者隂陽是氣形而下者然理無形而氣却有迹氣既有動靜則所載之理亦安得謂之無動靜又舉通書動靜篇云動而無靜靜而無動物也動而無動靜而無靜神也動而無動靜而無靜非不動不靜也物則不通神妙萬物動靜者所乗之機也先生因云某向來分别得這般所在今心力短便是這般所在都説不到因云向要到雲谷自下上山半塗大雨通身皆濕得到地頭因思着天地之塞吾其體天地之帥吾其性時季通及某人同在那裡某因各人解此兩句自亦作兩句解後來看也自説得着所以迤邐便作西銘等解賀孫以下論心心之理是太極心之動靜是隂陽振惟心無對方子問靈處是心抑是性曰靈處只是心不是性性只是理淳問知覺是心之靈固如此抑氣之為邪曰不專是氣是先有知覺之理理未知覺氣聚成形理與氣合便能知覺譬如這燭火是因得這脂膏便有許多光燄問心之發處是氣否曰也只是知覺淳所知覺者是理理不離知覺知覺不離理節問心是知覺性是理心與理如何得貫通為一曰不須去著貫通本來貫通如何本來貫通曰理無心則無著處節所覺者心之理也能覺者氣之靈也節心者氣之精爽節心官至靈藏往知來燾發明心字曰一言以蔽之曰生而已天地之大徳曰生人受天地之氣而生故此心必仁仁則生矣力行心須兼廣大流行底意看又須兼生意看且如程先生言仁者天地生物之心只天地便廣大生物便流行生生不窮端䝉心與理一不是理在前面為一物理便在心之中心包蓄不住隨事而發因笑云説到此自好笑恰似那藏相似除了經函裏面㸃燈四方八面皆如此光明燦爛但今人亦少能看得如此廣問心之為物衆理具足所發之善固出於心至所發不善皆氣禀物欲之私亦出於心否曰固非心之本體然亦是出於心也又問此所謂人心否曰是子升因問人心亦兼善惡否曰亦兼説木之或問心有善惡否曰心是動底物事自然有善惡且如惻隠是善也見孺子入井而無惻隠之心便是惡矣離着善便是惡然心之本體未嘗不善又却不可説惡全不是心若不是心是甚麽做出來古人學問便要窮理知至直是下工夫消磨惡去善自然漸次可復操存是後面事不是善惡時事問明善擇善如何曰能擇方能明且如有五件好底物事有五件不好底物事將來揀擇方解理㑹得好底不擇如何解明謙心無間於已發未發徹頭徹尾都是那處截做已發未發如放僻邪侈此心亦在不可謂非心淳問形體之動與心相闗否曰豈不相闗自是心使他動曰喜怒哀樂未發之前形體亦有運動耳目亦有視聽此是心已發抑未發曰喜怒哀樂未發又是一般然視聽行動亦是心向那裏若形體之行動心都不知便是心不在行動都没理㑹了説甚未發未發不是漠然全不省亦常醒在這裡不恁地困淳問惻隠羞惡喜怒哀樂固是心之發曉然易見處如未惻隠羞惡喜怒哀樂之前便是寂然而静時然豈得塊然槁木其耳目亦必有自然之聞見其手足亦必有自然之舉動不審此時唤作如何曰喜怒哀樂未發只是這心未發耳其手足運動自是形體如此淳問先生前日以揮扇是氣節後思之心之所思耳之所聽目之所視手之持足之履似非氣之所能到氣之所運必有以主之者曰氣中自有箇靈底物事節虚靈自是心之本體非我所能虚也耳目之視聽所以視聽者即其心也豈有形象然有耳目以視聽之則猶有形象也若心之虚靈何嘗有物人傑問五行在人為五臓然心却具得五行之理以心虚靈之故否曰心屬火縁是箇光明發動底物所以具得許多道理僴問人心形而上下如何曰如肺肝五臓之心却是實有一物若今學者所論操舍存亡之心則自是神明不測故五臓之心受病則可用藥補之這箇心則非菖蒲茯苓所可補也問如此則心之理乃是形而上否曰心比性則㣲有迹比氣則自然又靈謨問先生嘗言心不是這一塊某竊謂滿體皆心也此特其樞紐耳曰不然此非心也乃心之神明升䧏之舍人有病心者乃其舍不寧也凡五臓皆然心豈無運用須常在軀殻之内譬如此建陽知縣須常在衙裡始管得這一縣也某曰然則程子言心要在腔子裡謂當在舍之内而不當在舍之外即曰不必如此若言心不可在脚脚又不可在手上只得在這些子上也義剛性猶太極也心猶隂陽也太極只在隂陽之中非能離隂陽也然至論太極自是太極隂陽自是隂陽惟性與心亦然所謂一而二二而一也韓子以仁義禮智信言性以喜怒哀樂言情盖愈於諸子之言性然至分三品却只説得氣不曾説得性砥以下總論心性問天之付與人物者為命人物之受於天者為性主於身者為心有得於天而光明正大者為明徳否曰心與性如何分别明如何安頓受與得又何以異人與物與身又何間别明徳合是心合是性曰性却實以感應虚明言之則心之意亦多曰此兩箇説著一箇則一箇隨到元不可相離亦自難與分别捨心則無以見性捨性又無以見心故孟子言心性每每相隨説仁義禮智是性又言惻隠之心羞惡之心辭遜是非之心更細思量或問心性之别曰這箇極難説且是難為譬喻如伊川以水喻性其説本好却使曉不得者生病心大概似箇官人天命便是君之性命便如職事一般此亦大概如此要自理㑹得如邵子云性者道之形體盖道只是合當如此性則有一箇根苗生出君臣之義父子之仁性雖虚都是實理心雖是一物却虚故能包含萬理這箇要人自體察始得學䝉方子録云性本是無却是實理心似乎有影象然其體却虚舊嘗以論心論性處皆類聚看看熟乆則自見淳性便是心之所有之理心便是理之所㑹之地一心字饒録作性升卿性是理心是包含該載敷施發用底䕫孫問心之動性之動曰動處是心動底是性㝢心以性為體心將性做饀子模様盖心之所以具是理者以有性故也盖卿心有善惡性無不善若論氣質之性亦有不善節鄭仲履問先生昨説性無不善心固有不善然本心則元無不善曰固是本心元無不善誰教你而今却不善了今人外面做許多不善却只説我本心之善自在如何得盖卿心性理拈著一箇則都貫穿惟觀其所指處輕重如何如養心莫善於寡欲雖有不存焉者寡矣存雖指理言然心自在其中操則存此存雖指心言然理自在其中端䝉或問人之生禀乎天之理以為性其氣清則為知覺而心又不可以知覺言當如何曰難説以天命之謂性觀之則命是性天是心心有主宰之義然不可無分别亦不可太説開成兩箇當熟玩而黙識其主宰之意可也髙説得出又名得出方是見得分明如心性所難説嘗曰性者心之理情者性之動心者性情之主徳明性對情言心對性情言合如此是性動處是情主宰是心大抵心與性似一而二似二而一此處最當體認可學有這性便發出這情因這情便見得這性因今日有這情便見得本來有這性方子性不可言所以言性善者只看他惻隠辭遜四端之善則可以見其性之善如見水流之清則知源頭必清矣四端情也性則理也發者情也其本則性也如見影知形之意力行在天為命禀於人為性既發為情此其脉理甚實仍更分明易曉唯心乃虚明洞徹統前後而為言耳據性上説寂然不動處是心亦得據情上説感而遂通處是心亦得故孟子説盡其心者知其性也文義可見性則具仁義禮智之端實而易察知此實理則心無不盡盡亦只是盡曉得耳如云盡曉得此心者由知其性也大雅景紹問心性之别曰性是心之道理心是主宰於身者四端便是情是心之發見處四者之萌皆出於心而其所以然者則是此性之理所在也道夫問滿腔子是惻隠心如何曰腔子是人之軀殻上蔡見明道舉經史不錯一字頗以自矜明道曰賢却記得許多可謂玩物䘮志矣上蔡見明道説遂滿面發赤汗流浹背明道曰只此便是惻隠之心公要見滿腔子之説但以是觀之問玩物之説主甚事曰也只是矜字道夫伯豐論性有已發之性有未發之性曰性纔發便是情情有善惡性則全善心又是一箇包總性情底大抵言性便須見得是元受命於天其所禀賦自有本根非若心可以一概言也却是漢儒解天命之謂性云木神仁金神義等語却有意思非苟言者學者要體㑹親切又嘆曰若不用明破只恁涵養自有到處亦自省力若欲立言示訓則須契勘教子細庻不背於古人大雅履之問未發之前心性之别曰心有體用未發之前是心之體已發之際乃心之用如何指定説得盖主宰運用底便是心性便是㑹恁地做底理性則一定在這裡到主宰運用却在心情只是㡬箇路子隨這路子恁地做去底却又是心道夫或問靜是性動是情曰大抵都主於心性字從心從生情字從心從青性是有此理且如天命之謂性要須天命箇心了方是性漢卿問心如箇藏四方八面都恁地光明皎潔如佛家所謂六牕中有一猴這邊呌也應那邊呌也應曰佛家説心處儘有好處前輩云勝於楊墨賀孫叔器問先生見教謂動處是心動底是性竊推此二句只在底處兩字上如榖種然生處便是榖生底却是那裡面些子曰若以榖譬之榖便是心那為粟為菽為禾為稻底便是性康節所謂心者性之郛郭是也包裹底是心發出不同底是性心是箇没思量底只㑹生又如喫藥喫得㑹治病是藥力或涼或寒或熱便是藥性至於喫了有寒證有熱證便是情義剛舊看五峰説只將心對性説一箇情字都無下落後來看横渠心統性情之説乃知此話有大功始尋得箇情字着落與孟子説一般孟子言惻隠之心仁之端也仁性也惻隠情也此是情上見得心又曰仁義禮智根於心此是性上見得心盖心便是包得那性情性是體情是用心字只一箇字母故性情字皆從心僴人多説性方説心看來當先説心古人制字亦先制得心字性與情皆從心以人之生言之固是先得這道理然才生這許多道理却都具在心裡且如仁義自是性孟子則曰仁義之心惻隠羞惡自是情孟子則曰惻隠之心羞惡之心盖性即心之理情即性之用今先説一箇心便教人識得箇情性底總腦教人知得箇道理存着處若先説性却似性中别有一箇心横渠心統性情語極好又曰合性與知覺有心之名則恐不能無病便似性外别有一箇知覺了或問心情性曰孟子説惻隠之心仁之端也一段極分曉惻隠羞惡是非辭遜是情之發仁義禮智是性之體性中只有仁義禮智發之為惻隠辭遜是非乃性之情也如今人説性多如佛老説别有一件物事在那裡至𤣥至妙一向説開去便入虚無寂滅吾儒論性却不然程子云性即理也此言極無病孟子道性善善是性合有底道理然亦要子細識得善處不可但隨人言話説了若子細下工夫子細尋䆒自然見得如今人全不曾理㑹才見一庸人妄説便從他去嘗得項平甫書云見陳君舉門人説儒釋只論其是處不問其同異遂敬信其説此是甚説話元來無所有底人見人底説話便惑將去若果有學如何謾得他如舉天下説生薑辣待我喫得真箇辣方敢信胡五峰説性多從東坡子由門見識説去謙問性情心仁曰横渠説得最好言心統性情者也孟子言惻隠之心仁之端羞惡之心義之端極説得性情心好性無不善心所發為情或有不善説不善非是心亦不得却是心之本體本無不善其流為不善者情之遷於物而然也性是理之總名仁義禮智皆性中一理之名惻隠羞惡辭遜是非是情之所發之名此情之出於性而善者也其端所發甚㣲皆從此心出故曰心統性情者也性不是别有一物在心裡心具此性情心失其主却有時不善如我欲仁斯仁至我欲不仁斯失其仁矣囘也三月不違仁言不違仁是心有時乎違仁也出入無時莫知其鄊存養主一使之不失去乃善大要在致知致知在窮理理窮自然知至要騐學問工夫只看所知至與不至不是要逐件知過因一事研磨一理乆乆自然光明如一鏡然今日磨些明日磨些不覺自光若一些子光工夫又歇仍舊一塵鏡已光處㑹昏未光處不復光矣且如仁之一字上蔡只説知仁孔子便説為仁是要做工夫去為仁豈可道知得便休今學問流而為禪上蔡為之首今人自無實學見得説這一般好也投䧏那一般好也投降許乆南軒在此講學諸公全無實得處混亂有一人入潭州城裡説人便靡然從之此是何道理學問只理㑹箇是與不是不要添許多無益説話今人為學多是為名又去安排討名全不顧義理説苑載證父者以為直及加刑又請代受以為孝孔子曰父一也而取二名此是宛轉取名之弊學問只要心裡見得分明便從上面做去如殺身成仁不是自家計較要成仁方死只是見得此事生為不安死為安便自殺身旁人見得便説能成仁此旁人之言非我之心要如此所謂經徳不囘非以干禄哭死而哀非為生也若有一毫為人之心便不是了南軒云為己之學無所為而然是也謙性情心惟孟子横渠説得好仁是性惻隠是情須從心上發出來心統性情者也性只是合如此底只是理非有箇物事若是有底物事則既有善亦必有惡惟其無此物只是理故無不善盖卿伊川性即理也横渠心統性情二句顛撲不破砥性是未動情是已動心包得已動未動盖心之未動則為性已動則為情所謂心統性情也欲是情發出來底心如水性猶水之静情則水之流欲則水之波瀾但波瀾有好底有不好底欲之好底如我欲仁之類不好底則一向奔馳出去若波濤翻浪大段不好底欲則滅却天理如水之壅決無所不害孟子謂情可以為善是説那情之正從性中流出來者元無不好也因問可欲之謂善之欲如何曰此不是情欲之欲乃是可愛之意銖明作録畧心主宰之謂也動靜皆主宰非是靜時無所用及至動時方有主宰也言主宰則混然體統自在其中心統攝性情非儱侗與性情為一物而不分别也端䝉性以理言情乃發用處心即管攝性情者也故程子曰有指體而言者寂然不動是也此言性也有指用而言者感而遂通是也此言情也端䝉心統性情故言心之體用嘗跨過兩頭未發已發處説仁之得名只專在未發上惻隠便是已發却是相對言之端䝉心者主乎性而行乎情故喜怒哀樂未發則謂之中發而皆中節則謂之和心是做工夫處端䝉心之全體湛然虚明萬理具足無一毫私欲之間其流行該徧貫乎動靜而妙用又無不在焉故以其未發而全體者言之則性也以其已發而妙用者言之則情也然心統性情只就渾淪一物之中指其已發未發而為言爾非是性是一箇地頭心是一箇地頭情又是一箇地頭如此懸隔也端䝉問人當無事時其中虚明不昧此是氣自然動處便是性曰虚明不昧便是心此理具足於中無少欠闕便是性感物而動便是情横渠説得好由太虚有天之名由氣化有道之名此是總説合虚與氣有性之名合性與知覺有心之名是就人物上説䕫孫問心性情之辨曰程子云心譬如榖種其中具生之理是性陽氣發生處是情推而論之物物皆然㽦因言心性情之分自程子張子合下見得定了便都不差如程子諸門人傳得他師現成底説却一齊差却或曰程子張子是他自見得門人不過只聽得他師現成説底話所以後來一向差曰只那聽得早差了也僴性主具有許多道理昭昭然者屬性未發理具已發理應則屬心動發則情所以存其心則養其性心該備通貫主宰運用吕云未發時心體昭昭程云有指體而言者有指用而言者李先生云心者貫幽明通有無方心如水情是動處愛即流向去處椿問意是心之運用處是發處曰運用是發了問情亦是發處何以别曰情是性之發情是發出恁地意是主張要恁地如愛那物是情所以去愛那物是意情如舟車意如人去使那舟車一般㝢以下兼論意心意猶有痕跡如性則全無兆朕只是許多道理在這理砥問意是心之所發又説有心而後有意則是發處依舊是心主之到私意盛時心也隨去曰固然士毅李夢先問情意之别曰情是㑹做底意是去百般計較做底意因有是情而後用䕫孫録云因是有情而後用其意義剛問情意如何體認曰性情則一性是不動情是動處意則有主向如好惡是情好好色惡惡臭便是意士毅未動而能動者理也未動而欲動者意也若海性者即天理也萬物禀而受之無一理之不具心者一身之主宰意者心之所發情者心之所動志者心之所之比於情意尤重氣者即吾之血氣而充乎體者也比於他則有形器而較粗者也又曰舍心無以見性舍性無以見心椿以下兼論志心之所之謂之志日之所之謂之時志字從之從心時字從之從日如日在午時在寅時制字之義由此志是心之所之一直去底意又是志之經營徃來底是那志底脚凡營為謀度徃來皆意也所以横渠云志公而意私問情比意如何曰情又是意底骨子志與意都屬情情字較大性情字皆從心所以説心統性情心兼體用而言性是心之理情是心之用僴問意志曰横渠云以意志兩字言則志公而意私志剛而意柔志陽而意隂卓志是公然主張要做底事意是私地潜行間發處志如伐意如侵升卿問情與才何别曰情只是所發之路陌才是㑹恁地去做底且如惻隠有懇切者有不懇切者是則才之有不同又問如此則才與心之用相類曰才是心之力是有氣力去做底心是管攝主宰者此心之所以為大也心譬水也性水之理也性所以立乎水之靜情所以行乎水之動欲則水之流而至於濫也才者水之氣力所以能流者然其流有急有緩則是才之不同伊川謂性稟於天才禀於氣是也只有性是一定情與心與才便合著氣了心本未嘗不同隨人生得來便别了情則可以善可以惡又曰要見得分曉但看明道云其體則謂之易其理則謂之道其用則謂之神易心也道性也神情也此天地之心性情也砥以下兼論才性者心之理情者心之動才便是那情之㑹恁地者情與才絶相近但情是遇物而發路陌曲折恁地去底才是那㑹如此底要之千頭萬緒皆是從心上來道夫問性之所以無不善以其出於天也才之所以有善不善以其出於氣也要之性出於天氣亦出於天何故便至於此曰性是形而上者氣是形而下者形而上者全是天理形而下者只是那渣滓至於形又是渣滓至濁者也道夫問才出於氣徳出於性曰不可才也是性中出徳也是有是氣而後有是徳人之有才者出來做得事業也是它性中有了便出來做得但温厚篤實便是徳剛明果敢便是才只為它氣之所禀者生到那裡多故為才䕫孫問能為善便是才曰能為善而本善者是才若云能為善便是才則能為惡亦是才也人傑論才氣曰氣是敢做底才是能做底徳明問天命之謂性充體謂氣感觸謂情主宰謂心立趨向謂志有所思謂意有所逐謂欲答云此語或中或否皆出臆度要之未可遽論且涵咏玩索乆之當自有見銖嘗見先生云名義之語極難下如説性則有天地之性氣質之性説仁則伊川有專言之仁偏言之仁此等且要黙識心通人傑問知與思於人身最𦂳要曰然二者也只是一事知與手相似思是交這手去做事也思所以用夫知也卓朱子語類卷五
