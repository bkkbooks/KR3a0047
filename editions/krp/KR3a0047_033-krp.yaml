body:
  text: 朱子語類卷三十三論語十五雍也篇四齊一變至於魯章問齊尚功利如何一變便能至魯曰功利變了便能至魯魯只是大綱好然裏面遺闕䖏也多淳行父問齊一變至魯魯一變至道曰太公之封扵齊也舉賢而尚功孔子曰後世必有簒弑之臣周公治魯親親而尊尊孔子曰後世寖微矣齊自太公初封已自做得不大段好至後威公管仲出来乃大變亂拆壊一畨魯雖是衰弱不振元舊底却不大段改換欲變齊則須先整理了已壊底了方始如魯方可以整頓起来這便隔了一重變魯只是扶衰振弱而已若論魯如左𫝊所載有許多不好事只是恰不曾被人拆壊恰似一間屋魯只如舊敝之屋其規模原在齊則已經拆壊了這非獨是聖人要如此損益亦是道理合當如此賀孫齊經小白法度盡壊今須一變方可至魯又一變方可至道魯却不曾變壊但典章廢墜而已若得人以修舉之則可以如王道盛時也謨齊一變至扵魯是他功利俗深管仲稱伯齊法壊盡功利自此盛然太公治齊尚功時便有些小氣象尚未見得只被管仲大段壊了又云管仲非不尊周攘夷如何不是王道只是功利駁雜其心耳明作語及齊一變至扵魯因云齊生得桓公管仲出来它要九合諸侯一匡天下其勢必至變太公之法不變便做不得這事若聖人變時自有道理大抵聖賢變時只是興其滯補其弊而已如租庸調變為彍騎長征之兵皆是變得不好了今日變時先變熈豐之政以復祖宗忠厚之意次變而復於三代也植問伊川謂齊自桓公之霸太公遺法變易盡矣魯猶存周公之法制㸔来魯自桓公以来閨門無度三君見弑三家分裂公室昭公至扵客死以至不視朔不朝聘與夫税畆丘甲用田賦變亂如此豈得是周公法制猶存乎曰齊魯初来氣象已自不同㸔太公自是與周公别到桓公管仲出来又不能遵守齊之初政却全然變易了一向盡在功利上魯却只是放倒了畢竟先世之遺意尚存如哀公用田賦猶使人来問孔子他若以田賦為是更何暇問惟其知得前人底是所以来問若桓公管仲却無這意思自道他底是了一向做去不顧問注謂施為緩急之序如何曰齊自伯政行其病多魯則其事廢墜不舉耳齊則先須理㑹他許多病改了方可及魯魯則修廢舉墜而已便可復周公之道問孔子治齊則當於何䖏下手曰莫須先從風俗上理㑹去然今相去逺亦不可細考但先儒多不信史記所載太公伯禽報政事然細考来亦恐畧有此意但傳者過耳廣問集注云云曰不獨齊有緩急之序魯亦有緩急之序如齊功利之習所當變便是急䖏魯紀綱所當振便是急䖏或問功利之習為是經桓公管仲所以如此否曰太公合下便有這意思如舉賢而尚功可見恪問施為緩急之序如何曰齊變只至扵魯魯變便可至道問如此則是齊變為緩而魯變為急否曰亦不必恁分如變齊則至魯在所急而至道在所緩至魯則成箇様子方就上出光采淳讀齊魯之變一章曰各有緩急如齊功利之習若不速革而便欲行王化魯之不振若不與之整頓而却理㑹其功利之習便是失其緩急之序如貢禹諫元帝令節儉元帝自有這箇何待爾説此便是不先其所急者也時舉問伊川曰夫子之時齊强魯弱云云吕氏曰齊政雖修未能用禮魯秉周禮故至扵道第二十三章凡八説伊川三説今從伊川吕氏之説伊川第二説曰此只説風俗以至於道觀之則不專指風俗乃論當時政治風俗固在其中然又别一節事又第三説曰言魯國雖衰而君臣父子之大倫猶在以魯觀之其大倫之不正乆矣然禮記明堂位以魯為君臣未嘗相弑而注家譏其近誣則此説亦恐未穏横渠謝㳺楊尹大抵同伊川故不録范氏曰齊一變可使如魯之治時其意謂齊魯相若故以謂治時齊之氣象乃伯政魯近王道不可疑其相若㸔魯秉周禮可見曰所疑范氏説亦無病榦觚不觚章古人之器多有觚如酒器便如今花瓶中間有八角者木簡是界方而六面即漢所謂操觚之士者也今淮上無紙亦用木寫字教小兒讀但却圎了所謂觚不觚古人所以恁地方時縁是頓得穏義剛第二十四章凡六説伊川兩説今從尹氏之説尹氏乃合伊川二説而為一説范呂楊氏説亦正伊川范氏謂不合法制呂氏楊氏謂失其名其實一也失其制則失其名可知矣謝氏是推説學者事榦無答語井有仁焉章問可欺是繼可逝而言不可罔是繼不可陷而言否曰也是如此但可逝不可陷是就這一事説可欺不可罔是總説不特此事如此他事皆然義剛叔器曰宰我只知有箇公共底道理却不知有義曰不惟不曉義也不曉那智了若似他説却只是箇獃人因云宰我見聖人之行聞聖人之言却尚有這般疑是怎生地縁自前無人説這箇物事到夫子方説出来所以時下都討頭不著似而今學者時便無這般疑了叔器又云聖人只説下學不説上達所以學者不曉曰這也無難曉䖏這未是説到那性命之微䖏只是宰我鈍如子貢便是箇曉了通達底所以説從那髙逺䖏去義剛問伊川曰宰我問仁者好仁不避難雖告之以赴井為仁亦從之乎夫子謂不然君子可使之有徃不可陷於不知可欺以其方不可罔以非其道呂氏曰井有仁焉猶言自投陷穽以施仁術也己巳自陷仁術何施當是時也君子可徃以思救不能自陷以求救可欺之以可救不可罔之使必救第二十五章凡七説明道兩説明道曰知井有仁者當下而從之否此說恐未當君子雖不逆詐而事之是非曉然者未嘗不先見也豈有仁者而在井乎雖有之君子不徃也范氏亦曰井有仁則将入井而從之盖此意也其從之也只合作從或者之言不宜作從井中之仁也謝氏謂宰我疑仁者之用心觀宰我之言亦足以見其好仁之切不宜深責之也楊氏謂宰我疑君子之不逆詐故問觀宰我之意好仁之切以謂仁者好仁雖患難不避故問非謂疑其不逆詐也尹氏用伊川説故不録范氏解逝字極未安與下句可欺也不類謂君子見不善可逝而去曰所論得之但此章文義諸先生説不甚明更詳考之為佳榦君子博學扵文章博學扵文考究時自是頭項多到得行時却只是一句所以為約若博學而不約之以禮安知不畔於道徒知要約而不博學則所謂約者未知是與不是亦或不能不畔扵道也僴博文約禮就這上進去只管是長進盖根脚已是了所以不畔道行夫問博文約禮曰博文條目多事事著去理㑹禮却只是一箇道理如視也是這箇禮聽也是這箇禮言也是這箇禮動也是這箇禮若博文而不約之以禮便是無歸宿䖏如讀書讀詩學易學春秋各自有一箇頭緒若只去許多條目上做工夫自家身已都無歸著便是離畔扵道也恪問博學於文約之以禮曰禮是歸宿處凡講論問辯亦只是要得箇正當道理而有所歸宿爾銖國秀問博文約禮曰如講明義理禮樂射御書數之類一一著去理㑹學須博求盡這箇道理若是約則不用得許多説話只守這一箇禮日用之問禮者便是非禮者便不是恪博文約禮聖門之要法博文所以驗諸事約禮所以體諸身如此用工則博者可以擇中而居之不偏約者可以應物而動皆有則如此則内外交相助而博不至扵汎濫無歸約不至扵流遁失中矣大雅君子博學扵文約之以禮聖人教人只是説箇大綱顔子是就此上做得深此䖏知説得淺䕫孫問博學扵文文謂詩書六藝之文否曰詩書六藝固文之顯然者如眼前理㑹道理及扵所為所行䖏審别是否皆是必大只是博文約禮四字博文是多聞多見多讀及收拾将来全無一事和敬字也没安頓䖏䕫孫博學亦非謂欲求異聞雜學方謂之博博之與約初學且只須作兩途理㑹一面博學又自一面持敬守約莫令兩下相靠作兩路進前用工塞斷中間莫令相通将来成時便自有㑹通䖏若如此兩下用工成甚次第大雅博文上欠工夫只管去約禮上求易得生煩升卿孔子之教人亦博學扵文如何便約得􅓌或問君子博學扵文約之以禮曰此是古之學者常事孔子教顔子亦只是如此且如行夏之時以下臨時如何做得須是平時曾理㑹来若非禮勿視等䖏方是約之以禮及他成功又自别有説䖏大雅博文工夫雖頭項多然扵其中尋将去自然有箇約䖏聖人教人有序未有不先扵博者孔門三千顔子固不須説只曾子子貢得聞一貫之誨謂其餘人不善學固可罪然夫子亦不呌来罵一頓教便省悟則夫子扵門人告之亦不忠矣是夫子亦不善教人致使宰我冉求之徒後来狼狽也要之無此理只得且待他事事理㑹得了方可就上面欠闕䖏告語之如子貢亦不是許多時只教他多學使它枉做工夫直到後来方傳以此秘妙正是待它多學之功到了可以言此耳必大或問博學於文約之以禮亦可以弗畔與顔子所謂博我以文約我以禮如何曰此只是一箇道理但功夫有淺深耳若自此做功夫到深䖏則亦顔子矣燾問博學扵文約之以禮與博我以文約我以禮固有淺深不同如孟子博學而詳説之将以反説約也似又一義如何曰論語中博約字是踐履兩字對説孟子中博約字皆主見而言且如學須要博既博學又詳説之所以如此者将以反説約也是如此後自然却説得約謂如博學詳説方有貫通䖏下句當㸔将以字若博學扵文約之以禮與博我以文約我以禮聖人之言本無甚輕重但人所造自有淺深若只是博學扵文能約之以禮則可以弗畔扵道雖是淺底及至顔子做到欲罷不能工夫亦只是這箇博文約禮如梓匠輪輿但能斵削者只是這斧斤規矩及至削鐻之神斵輪之妙者亦只是此斧斤規矩㽦問博文不約禮必至於汗漫如何曰博文而不約禮只是徒㸔得許多徒記得許多無歸宿䖏節以下集注集義問明道言博學扵文而不約之以禮必至扵汗漫所謂約之以禮者能守禮而由於規矩也未及知之也既能守禮而由規矩謂之未及扵知何也曰某亦不愛如此説程子説博我以文約我以禮為己知不須将知説亦可顔子亦只是這箇博文約禮但此説較粗顔子所説又向上然都從這工夫做来學者只此兩端既能博文又㑹約禮問約禮只是約其所博者否曰亦不須如此説有所未知便廣其知須是博學學既博又須當約禮到約禮更有何事所守在此理耳㝢或問博學扵文約之以禮亦可以弗畔曰博學是致知約禮則非徒知而已乃是踐履之實明道謂此一章與顔子説博文約禮䖏不同謂顔子約禮是知要恐此䖏偶見得未是約禮盖非但知要而已也此兩䖏自不必分别時舉問伊川言博學扵文約之以禮此言善人君子多識前言徃行而能不犯非禮者爾非顔子所以學扵孔子之謂也恐博文約禮只是一般未必有深淺曰某曉他説不得恐記録者之誤正叔曰此䖏須有淺深曰畢竟博只是這博約只是這約文只是這文禮只是這禮安得不同文蔚問横渠謂博學扵文只要得習坎心亨何也曰難䖏見得事理透便䖏斷無疑行之又果決便是習坎心亨凡事皆如此且以㸔文字一節論之見這説好見那説又好如此説有礙如彼説又有礙便是險阻䖏到這裏須討一路去方透便是習坎心亨淳博學扵文又要得習坎心亨如應事接物之類皆是文但以事理切磨講究自是心亨且如讀書每思索不通處則飜来覆去倒横直竪䖏䖏窒塞然其間須有一路可通只此便是許多艱難險阻習之可以求通通䖏便是亨也謨博學於文只是要習坎心亨不特有文義且如學這一件物事未學時心裏不曉既學得了心下便通曉得這一事若這一事曉不得扵這一事上心便黑暗僴問横渠曰博文約禮由至著入至簡故可使不得畔而去尹氏曰博學扵文約之以禮亦可以弗畔違扵道第二十六章凡八説伊川三説今從横渠尹氏之説明道曰博學扵文而不約之以禮必至扵汗漫范氏亦曰博學扵文而不約之以禮猶農夫之無疆埸也其不入扵異端邪説者鮮矣楊氏亦曰博學扵文而不知所以裁之則或畔矣此三説皆推不約禮之失謝氏曰不由博而徑欲趨約者恐不免扵邪遁也此則不博文之失二者皆不可無偏舉則不可明道又曰所謂約之以禮者能守禮而由扵規矩也伊川第一説曰博學而守禮第二説曰此言善人君子多識前言徃行而能不犯非禮約字恐不宜作守字訓若作守禮則與博學成二事非博文則無以為約禮不約禮則博文為無用約禮云者但前之博而今約之使就扵禮耳伊川之説文自文禮自禮更無一貫説㸔博約字與之以字有一貫意伊川又説顔子博約與此不同亦似太過博文約禮本無不同始乎由是以入徳斯可以不畔終乎由是以成徳欲罷而不能顔子與此不同䖏只在弗畔與欲罷不能上博約本無異伊川以顔子之約為知要以此章之約作約束之約恐未安此約字亦合作知要伊川第三説與第一第二説同但説大畧耳曰此説大槩多得之但此約字與顔子所言約字皆合只作約束之意耳又㸔顔子博我以文約我以禮既連著兩我字而此章之字亦但指其人而言非指所學之文而言也榦子見南子章諸先生皆以矢為陳否為否塞之否如此亦有甚意思孔子見南子且當從古注説矢誓也或問若作誓説何師生之間不相信如此曰只為下三句有似古人誓言如左氏言所不與舅氏之説故有誓之氣象謨或問此章曰且依集註説盖子路性直見子去見南子心中以為不當見便不説夫子似乎發呪模様夫子大故激得来躁然夫子却不當如此古書如此等曉不得䖏甚多古注亦云可疑祖道曰横渠説以為予所否厄者是天厭棄之此説如何曰大抵後来人講經只為要道聖人必不如此須要委曲遷就做一箇出路却不必如此横渠論㸔詩教人平心易氣求之到他説詩又却不然祖道問夫子欲見南子而子路不説何發扵言辭之間如此之驟曰這般所在難説如聖人須要見南子是如何想當時亦無必皆見之理如衞靈公問陳也且可以款款與他説又却明日便行齊景公欲以季孟之間待之也且從容不妨明日又便行季桓子受女樂也且可以教他不得受明日又便行㸔聖人這般所在其去甚果不知扵南子須欲見之到子路不説又費許多説話又如指誓只怕當時如這般去就自是時宜聖人既以為可見恐是道理必有合如此可與立未可與權吾人見未到聖人心下這般所在都難説或問伊川以矢字訓陳如何曰怕不是如此若説陳須是煞鋪陳教分明今却只恁地直指數句而已程先生謂子所以否而不見用乃天厭斯道亦恐不如此賀孫問子見南子曰此是聖人出格事而今莫要理㑹它向有人問尹彦明今有南子子亦見之乎曰不敢見曰聖人何為見之曰能磨不磷湼不緇則見之不妨䕫孫仕扵其國有見其小君之禮當夫子時想是無人行所以子路疑之若有人行時子路也不疑了孟子説仲尼不為己甚這様䖏便見義剛䕫孫録云孟子説仲尼不為己甚説得好集注問予所否者天厭之謂不合扵禮不由扵道則天實厭棄之曰何以謂不合扵禮不由扵道曰其見惡人聖人固謂在我者有可見之禮而彼之不善扵我何與焉惟聖人道大徳全方可為此曰今人出去仕宦遇一惡人亦須下門状見之它自為惡何與我事此則人皆能之何必孔子子善云此䖏當㸔聖人心聖人之見南子非為利禄計特以禮不可不見聖人本無私意曰如此㸔也好南升植録云先生難云子見南子既所謂合扵禮由其道夫人皆能何止夫子為然子善答云子見南子無一毫冀望之心他人則有此心矣曰㸔得好第二十七章凡七説伊川六説楊氏一説今從謝氏之説伊川第一説曰子路以夫子之被強也故不説第二説曰子路不説以孔子本欲見衛君行道反以非禮見迫竊謂夫人有見賔之禮孔子之見南子禮也子路非不知也子路之不説非以其不當見特以其不足見耳使其不當見夫子豈得而迫哉被強見迫恐未穏伊川第三説曰孔子之見南子禮也子路不説故夫子矢之第四説第六説同竊謂南子妾也無道也衛君以為夫人孔子不得不見其辱多矣子路以其辱也故不説夫子矢之曰使予之否塞至此者天厭之也使天不與否則衞君将致敬盡禮豈敢使夫子以見夫人之禮而見其無道之妾哉則子路不説之意盖以其辱夫子非以其禮不當見也使子路以南子之不當見則更須再問何至坐視夫子之非禮雖不説何益而夫子告之亦須别有説豈有彼以非禮問而此獨以天厭告則夫子受非禮之名而不辭似不可也盖子路知其禮所當見特以其辱夫子也故不説謝氏以為凂夫子之説極正伊川第四説設或人之問曰子路不説孔子何以不告之曰是禮也而必曰天厭之乎曰使孔子而得志則斯人何所容也楊氏兩説亦然恐非聖人意聖人但傷道之否在扵衞君不能致敬盡禮未必有欲正之之意恐成别添説伊川第五説穏但説大畧横渠亦只説大畧范氏以矢為誓非聖人氣象吕氏大意亦通但以為使我不得見賢小君天厭乎道也此亦非聖人意合只作使我見無道之小君天厭乎吾道也却穏尹氏同伊川故不辨曰以文義求之當如范氏之説但諸公避呪誓之稱故以矢訓陳耳若猶未安且闕以俟他日榦中庸之為徳章問中庸之為徳其至矣乎曰中庸之中是指那無過不及底説如中庸曰君子之中庸也君子而時中時中便是那無過不及之中本章之意是如此又問中者天下之正道庸者天下之定理恐道是摠括之名理是道裏面又有許多條目如天道又有日月星辰隂陽寒暑之條理人道又有仁義禮智君臣父子之條理曰這二句𦂳要在正字與定字上盖庸是箇常然之理萬古萬世不可變易底中只是箇恰好道理為是亘古今不可變易底故更著箇庸字燾中庸之為徳此䖏無過不及之意多庸是依本分不為恠異之事堯舜孔子只是庸夷齊所為都不是庸了䕫孫問中庸之為徳其至矣乎章曰只是不知理隨他偏長䖏做将去謹愿者則小廉曲謹放縱者則跌蕩不羈所以中庸説道之難明又説人莫不飲食鮮能知味只為是不知植問此章尹氏曰中庸天下之正理徳合乎中庸可謂至矣人知擇乎中庸而不能朞月守也故曰民鮮乆矣右第二十八章凡七説伊川兩説楊氏三説今從尹氏之説伊川第一説説乆字不出第二説雖盡而非本章意尹氏合而解之范氏説乆字不出吕氏説寛謝氏曰中不可過是以謂之至徳楊氏第三説亦曰出乎中則過未至則不及故惟中為至第一第二説同謝氏楊氏之説皆以至字對過不及説謂無過不及則為至也過不及只對中庸説不可對至字説至字只輕説如曰其大矣乎不宜説太深楊氏第二第三説推説髙明中庸䖏亦不能無疑侯氏説大畧曰當以伊川解為正中庸天下之正理也徳合乎中庸可謂至矣自世教衰民不興於行鮮有中庸之徳也自世教衰此四字正是説乆字意謝楊皆以過不及對中字而以中為至耳恐非如来説所疑也所破楊氏髙明中庸亦非是當更思之榦子貢曰如有博施扵民章子貢問仁是就功用籠罩説孔子是就心上答可學博施濟衆便喚做仁未得仁自是心端䝉何事於仁猶言何待於仁必也聖乎連下句讀謙之録云便見得意思出雖堯舜之聖猶病其難徧徳明何事扵仁猶言那裏更做那仁子僴問何事於仁先生以為恰似今日説何消得恁地一般曰博施濟衆何消得更説仁莭問何事於仁作何止於仁是如何曰只得作何止扵仁今人文字如此使者甚多何事亦如何為之意被子貢説得博施濟衆髙似扵仁了故孔子言何為於仁必也聖人乎堯舜其猶病諸是子貢問得不親切若如子貢之説則天下之為仁者少矣一介之士無復有為仁之理夫仁者已欲立而立人己欲達而達人已才欲立便也立人己才欲達便也達人立是存立䖏達則發用處扵此純是天理更無些子私意便是仁之體若能近取譬則私欲日消天理日見此為仁之方也南升何事扵仁只作豈但扵仁㽦謂必也聖乎聖如堯舜其尚有不足扵此曰薛士龍論語解此亦是如此只是渠遣得辭澁盖仁以道理言聖以地位言自是不同如博施濟衆為仁而利物愛人小小者亦謂之仁仁是直㸔直上直下只一箇道理聖字便横㸔有衆人有賢人有聖人便有節次只豈但扵仁盖博施濟衆雖聖如堯舜猶以為病耳㽦問子貢問博施濟衆恐仁之極處與聖之功用本不可分大小今言何止扵仁則仁聖若有小大之分曰此䖏不恁地讀必也聖乎語意未是煞處當急連下文讀去仁以理言聖以事業言子貢所問博施濟衆必有聖人之徳有天子之位而後可以當此堯舜恁地尚以為病仁本切已事大小都用得他問得空浪廣不切已了却成踈闊似此㸔仁字如何用得如何下得工夫中間㸔得一句常人固是做不得雖聖人尚以此為病此須活㸔㝢周兄問何事扵仁必也聖乎曰必也聖乎是属下文仁通乎上下聖是行仁極致之地言博施濟衆之事何止扵仁必是行仁極致之人亦有不能盡如堯舜之病諸是也必也聖乎盖以起下銖問必也聖乎堯舜其猶病諸曰此兩句當連㸔盖云便是聖人也有做不得處且如堯舜雖曰比屋可封然在朝亦有四㓙之惡又如孔子設教從游者甚衆孔子豈不欲人人至於聖賢之極然而人人亦各自皆有病痛燾亞夫問此章曰博施濟衆是無盡底地頭堯舜也做不了蓋仁者之心雖無窮而仁者之事則有限自是無可了之理若要就事上説便儘無下手䖏時舉敬之問欲立立人欲達達人苟有此心便有博施濟衆底功用曰博施濟衆是無了期底事故曰堯舜其猶病諸然若能果無私意已有此心仁則自心中流出来隨其所施之大小自可見矣時舉衆朋友説博施濟衆章先生曰仁以理言是箇徹頭徹尾底物事如一元之氣聖以地言也不是離了仁而為聖聖只是行仁到那極處仁便是這理聖便是充這理到極䖏不是仁上面更有箇聖而今有三等有聖人有賢人有衆人仁是通上下而言有聖人之仁有賢人之仁有衆人之仁所以言通乎上下仁字直聖字横博施濟衆是做到極處功用如此義剛言此章也是三節前面説仁之功用中間説仁之體後面説仁之方曰是如此己欲立而立人己欲達而達人仁者之存心常如此便未博施濟衆時這物事也自在裏面叔器問此兩句也是帶下面説否曰此是兩截如黄毅然適間説是三節極是夫仁者分明是喚起説已欲立而立人已欲達而達人是仁者能如此若是能近取譬則可以為仁之方子貢也是意思髙逺見得恁地却不知剗地尋不著義剛仁就心上説如一事仁也是仁如一理仁也是仁無一事不仁也是仁聖是就地位上説聖却是積累得到這田地索性聖了佐子貢問博施濟衆章先生以何事扵仁為一節以必也聖乎堯舜其猶病諸為一節其説以謂博施濟衆此固是仁然不是人人皆能做底事若必以聖人為能之則堯舜亦嘗以此為病此非是言堯舜不能盡仁道盖勢有所不能爾人之所能者下二節事是也己欲立便立人已欲達便達人此仁者之事也能近取譬此為仁之方也今人便以已欲立已欲達為能近取譬則誤矣蓋已欲立而立人己欲達而達人此不待施諸己而後加諸人也能近取譬却是施諸己之意故上二句直指仁者而言而下一句則止以為仁之方謨博施濟衆這箇是盡人之道極仁之功非聖人不能然聖人亦有所不足在仁固能博施濟衆然必得時得位方做得這事然堯舜雖得時得位亦有所不足己欲立便立人己欲達便達人此仁者之心自然如此不待安排不待勉強能近取譬則以己之欲立譬人之欲立以已之欲達譬人之欲達然後推己所欲以及於人使皆得其立皆得其達這便是為仁之術立是立得住達是行得去此是三節須逐節詳味㸔教分明林問己欲立而立人與己所不欲勿施於人地位如何曰且㸔道理理㑹地位作甚麽他髙者自髙低者自低何須去比並問博施濟衆曰此是仁者事若把此為仁則是中天下而立者方能如此便都無人做得仁了所以言己欲立而立人使人人皆可盡得道理必也聖乎當連下句説意在猶病上蓋此何但是仁除是聖人方做得然堯舜猶病尚自做不徹㝢夫仁者己欲立而立人己欲達而達人分明喚起仁者字自是仁者之事若下面能近取譬方是由此而推将去故曰仁之方何事扵仁必也聖乎不是聖大似仁仁只是一條正路聖是行到盡䖏欲立欲達是仁者之心如此能近取譬是學做仁底如此深淺不同仁通上下但克去己私復得天理便是仁何必博施而後為仁若必待如此則有終身不得仁者矣孔顔不得位不成做不得山林之士更無縁得仁也欲立欲達即絜矩之義子貢凡三問仁聖人三告之以推己度物想得子貢髙明於推己䖏有所未盡仁者欲立自然立人欲達自然達人如無加諸人更不待譬下截方言求仁之方蓋近取諸身以為譬明作問己欲立而立人己欲達而達人立達二字以事推之如何曰二者皆兼内外而言且如修徳欲徳有所成立做一件事亦欲成立如讀書要理㑹得透徹做事亦要做得行又曰立是安存底意思達是發用底意思植仁者己欲立而立人己欲達而達人與我不欲人之加諸我吾亦欲無加諸人意思一般學者須是强恕而行燾己欲立而立人己欲達而達人是以己及人仁之體也能近取譬是推已及人仁之方也徳明致道説仁者己欲立而立人己欲達而達人已纔要立便立别人已纔要達便達别人這更無甚著力下云能近取譬可謂仁之方這又是一意煞著比方安排與仁者異已欲立而立人己欲達而達人與我不欲人加諸我吾亦欲無加諸人一般都是以己及物事能近取譬可謂仁之方與己所不欲勿施扵人一般都是推己及物事曰然賀孫凡己之欲即以及人不待譬彼而後推之者仁也以我之不欲譬之而知其亦不欲者恕也端䝉問只仁之方亦可謂之仁否曰㸔得透時便是仁若循循做去到得至䖏回頭㸔前日所為亦喚做仁人傑或問博施濟衆一章言子貢馳騖髙逺不從低處做起故孔子教之從恕上求仁之方曰理亦是如此但語意有病且試説子貢何故揀這箇来問或云恐是子貢見孔子説仁多端又不曾許一箇人是仁故揀箇大底来説否曰然然而夫子答子貢曰己欲立而立人已欲達而達人至扵答顔子則曰克己復禮為仁分明一箇仁説兩般諸公試説這兩般説是如何或曰恐克己復禮占得地位廣否曰固是包得盡須知與那箇分别方得或曰一為心之徳一為愛之理曰是如此但只是一箇物事有時説這一面又有時説那一面人但要認得是一箇物事枅録云孔子説仁亦多有不同䖏向顔子説則以克己為仁此䖏又以立人達人為仁一自己上説一自人上説須扵這裏㸔得一般方可如己欲立而立人己欲達而達人便有那克己復禮底意思克己復禮便包那己欲立而立人己欲達而達人底意思只要人自分别而已然此亦是因子貢所問而説又問立字達字之義曰此是兼麄細説立是自家有可立達是推将去聖人所謂立之斯立動之斯来綏之斯和亦是這箇意也凡事不出立與達而已謂如在此住得穏便是立如行便要到便是達如身要成立亦是立學要通達亦是達事事皆然又問博施濟衆如何分别曰博施是施之多施之厚濟衆是及之廣燾問仁以理言通乎上下曰一事之仁也是仁全體之仁也是仁仁及一家也是仁仁及一國也是仁仁及天下也是仁只是仁及一家者是仁之小者仁及天下者是仁之大者如孔子稱管仲之仁亦是仁只是仁之功復問上是大下是小曰只是髙低又曰這箇是兼愛而言如博施濟衆及後面説手足貫通處復問貫通䖏曰才被私意截了仁之理便不行節集註問仁通上下而言曰有聖人之仁有賢人之仁仁如酒好聖如酒熟問仁是全體如日月至焉乃是偏曰當其至時亦備問孟武伯問三子却説其才何意曰只為未仁問管仲仁之功如何曰匡天下亦仁者之事如趙韓王一言至今天下安謂韓王為仁則不可然其所作乃仁者之功可學子上問仁通上下如何曰仁就䖏心䖏説一事上䖏心如此亦是仁商三仁未必到聖人處然就這䖏亦謂之仁博施濟衆何止扵仁必聖人能之然堯舜尚自有限量做不得仁者誠是不解做得此䖏病在求之太逺己欲立而立人己欲達而達人只教他從近䖏做淳問仁通上下如何曰聖是地位仁是徳問如此則一事上仁亦可謂之仁此之謂通上下其與全體之仁無乃不相似曰此一事純於仁故可謂之仁殷有三仁亦未見其全體只是扵去就之際純乎天理故夫子許之可學問仁通上下而言聖造其極而言否曰仁或是一事仁或是一䖏仁仁者如水有一杯水有一溪水有一江水聖便是大海水僴仁者己欲立而立人一章某當初也只做一統㸔後来㸔上面説夫仁者下面説可謂仁之方却相反方分作兩段説燾或問博施濟衆一段程子作一統説先生作二段如何曰某之説非異扵程子蓋程子之説足以包某之説程子之説如大屋一般某之説如在大屋之下分别㕔堂房室一般初無異也公且道子貢所問是何等大氣象聖人却只如此説了如是為仁必須博施濟衆便使中天下而立定四海之民如堯舜也做不得何况蓽門圭竇之士聖人所以提起夫仁者己欲立而立人己欲達而達人正指仁之本體盖己欲立則思處置他人也立己欲達則思處置他人也達放開眼目推廣心胸此是甚氣象如此安得不謂仁之本體若能近取譬者以我之欲立而知人之亦欲立以己之欲達而知人之亦欲達如此則止謂之仁之方而已此為仁則同但己欲立而立人欲達而達人是已到底能近取譬是未到底其次第如此彼子貢所問是就事上説却不就心上説龜山云雖博施濟衆也湏自此始某甚善其説先生曰又某所説過底要諸公有所省發則不枉了若只恁地聽過則無益也朋録云説許多話曉得底自曉得不曉得底是某自説話了乆之云如釋氏説如標月指月雖不在指上亦欲隨指見月須恁地始得乆之云二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也又云天有四時春夏秋冬風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也乆之又曰昔有人問話於一僧僧指面前花示之曰是甚麽其人云花也僧云吾無隠乎爾此不是他無見處但見説得来麄了孔子所謂吾無隠乎爾者居鄉黨便恂恂在宗廟朝廷便便便唯謹與上大夫言便誾誾與下大夫言便侃侃自有許多實事可見又曰程子説莊子説道體儘有妙處如云在谷滿谷在坑滿坑不是他無見處只是説得來作怪大抵荘老見得些影便将来作㺯矜詫又曰黄帝問扵廣成子云云吾欲官隂陽以遂群生東坡注云云是則是有此理如何便到這田地乆之又云昔在一山上坐㸔潮来凡溪澗小港中水皆如生蛇走入無不通透甚好㸔識得時便是一貫底道理又曰日月有明容光必照焉如日月雖些小孔竅無不照見此好識取祖道賜録云問博施濟衆程子全做仁之體先生却就上面分别箇體用便有用力䖏曰某説非破程子之説程子之説却兼得某説程説似渾淪一箇屋子某説如屋下分問架爾仁之方不是仁之體還是什麽物事今且㸔子貢之言與夫子之言如何地餘同而畧林聞一問博施濟衆章曰博施濟衆無下手䖏夫子故與之言仁夫仁者己欲立而立人己欲達而達人是能以己之所欲立者而立他人以己之所欲達者而達他人其所為出扵自然此乃是仁之體能近取譬者近取諸身知己之欲立欲達則亦當知人之欲立欲達是乃求仁之方也伊川全舉此四句而結之曰欲令如是觀仁可以得仁之體亦可以如此説與某之説初不相礙譬之扵水江海是水一勺亦是水程先生之説譬之一片大屋某却是就下面分出㕔堂房室其實一也又云子貢所問以事功而言於本體初無干渉故聖人舉此心之全體大用以告之以己之欲立者立人以己之欲達者達人以己及物無些私意如堯之克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍以至於欽若昊天厯象日月星辰敬授人時道理都擁出来又曰如周禮一書周公所以立下許多條貫皆是廣大心中流出某自十五六時聞人説這道理知道如此好但今日方識得如前日見人説鹽鹹今日食之方知是鹹説糖甜今日食之方知是甜人傑問己欲立而立人己欲達而達人所謂以己及人能近取譬近取諸身己所不欲勿施於人所謂推己及人如何曰夫子分明説夫仁者則是言仁之道如此可謂仁之方也已則是言求仁當如此若以為滚説則既曰夫仁者矣不當以可謂仁之方結之也又問程子説仁至難言至欲今如是觀仁可以得仁之體一段却是滚説曰程子雖不曾分説然其意亦無害大抵己欲立而立人己欲達而達人是自然工夫至扵能近取譬則是著力䖏所以不同人傑問己欲立而立人已欲達而達人注云扵此可以得仁之體是此處見得人與己相闗甚切便是生意相貫䖏否曰亦是只無私意理便流通然此䖏也是已對人説便恁地若只就自己説此又使不得盖此是仁之發出䖏若未發之前只一念之私便不是仁淳問遺書中取醫家言仁又一段云醫家以不識痛癢為不仁人以不知覺不認義理為不仁又却從知覺上説曰覺是覺扵理問與上蔡説同異曰異上蔡説覺纔見此心耳問南軒云上蔡説覺與佛家不同如何曰上蔡云自此心中流出與佛亦不大段異今説知痛癢能知覺皆好只是説得第二節説得用須當㸔如何識痛癢血脉從何而出知覺從何而至某云若不究見原本却是不見理只説得氣曰然伊川言榖種之性一段最好可學明道云認得為己何所不至認得箇什麽夫人者已欲立便立人已欲達便達人此即仁之體也能近取譬則是推己之恕故曰可謂仁之方夫仁者與可謂仁之方正相對説明道云欲令如是觀仁可以得仁之體先生再三舉似曰這䖏極好㸔仁又曰博施濟衆固仁之極功譬如東大洋海固是水但不必以東大洋海之水方為水只瓶中傾出来底亦便是水博施濟衆固是仁但那見孺子将入井時有怵惕惻隠之心亦便是仁此䖏最好㸔道夫林安卿問仁者以天地萬物為一體此即人物初生時驗之可見人物均受天地之氣而生所以同一體如人兄弟異形而皆出父母胞胎所以皆當愛故推老老之心則及人之老推幼幼之心則及人之幼惟仁者其心公溥實見此理故能以天地萬物為一體否曰不須問他從初時只今便是一體若必用從初説起則煞費思量矣猶之水然江河池沼溝渠皆是此水如以兩椀盛得水来不必教去尋討這一椀是那裏酌来那一椀是那裏酌来既都是水便是同體更何待尋問所從来如昨夜荘仲説人與萬物均受此氣均得此理所以皆當愛便是不如此愛字不在同體上説自不属同體事他那物事自是愛這箇是説那無所不愛了方能得同體若愛則是自然愛不是同體了方愛惟其同體所以無所不愛所以愛者以其有此心也所以無所不愛者以其同體也僴問明道曰醫書以手足痿痺為不仁云云可以得仁之體又曰能近取譬反身之謂也又曰博施濟衆非聖人不能何干仁事故特曰夫仁者立人達人能近取譬可謂仁之方也已使人求之自反便見得也雖然聖人豈不盡仁然教人不得如此指煞或問堯舜其猶病諸伊川曰聖人之心何時而已又曰聖乃仁之成徳謂仁為聖譬如雕木為龍木乃仁也龍乃聖也指木為龍可乎故博施濟衆乃聖人之事舉仁而言之則能近取譬是也謝氏曰博施濟衆亦仁之功用然仁之名不於此得也子貢直以聖為仁則非特不識仁併與聖而不識故夫子語之曰必也聖乎又舉仁之方也己欲立而立人己欲達而達人亦非仁也仁之方所而已知方所斯可以知仁猶觀天地變化草木蕃斯可以知天地之心矣第二十九章凡八説明道五説伊川十七説今從明道伊川謝氏之説大意與第一説同故不録明道第五説與伊川第二第十三説皆以恕為仁之方大意皆正但非解本文故不録伊川第一説曰惟聖人能盡仁道然仁可通上下而言故曰何事扵仁必也聖乎又第五説曰聖則無小大至扵仁則兼上下小大而言之又第八説曰孔子見子貢問得来事大故曰何止扵仁必也聖乎盖仁可以通上下言之聖則其極也又第十二説曰博施而能濟衆固仁也而仁不足以盡之故曰必也聖乎又第十四說曰仁在事不可以為聖此五説皆以何事扵仁作何止於仁故以仁為有小大上下若既是有小大上下則以此章為子貢指其大與上者問之亦可也又何以答之曰何事扵仁乎若聖人以仁為未足以盡博施濟衆則下又當别有説今乃論為仁之方恐上下意不貫伊川五説只説得到其猶病諸處住則下文論仁之方不相接不如木龍之説却與明道之意合明道以何事扵仁只作何干仁事則下文仁之方自相貫又功用字分明伊川第三説第四説第五第六説第十五説皆推説博施濟衆猶病即聖人之心何時而已之意故不録伊川第九第十一説皆論仁之方與謝氏方所之説相類此章聖人恐子貢便指作仁㸔故但以為若能由此而求之乃可以知仁故曰仁之方伊川第十七説乃統説仁字大意與明道第一説同故不録横渠曰必聖人之才能𢎞其道恐本文無能𢎞其道之意范氏曰以大為小是以仁為小聖為大也恐未穏餘説亦寛吕氏以博施為仁濟衆為聖未當楊氏之説亦正但謂仁者何事於博施濟衆又恐太過則明道所謂教人不得如此指然者但以仁聖須分説方見仁之體非以仁無與於聖也尹氏與伊川餘説同故不辨曰何事扵仁何止於仁也必也聖乎堯舜其猶病諸此兩句相連讀言雖聖人亦有所不能也己欲立而立人己欲達而達人仁也能近取譬恕也幹集義問程子曰謂仁為聖譬猶雕木為龍木乃仁也龍乃聖也指木為龍可乎此喻如何曰亦有理木可雕為龍亦可雕而為狗此仁所以可通上下而言者也龍乃物之貴者猶聖人為人倫之至也必大朱子語類卷三十三
