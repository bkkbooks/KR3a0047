body:
  text: 朱子語類卷二十四論語六為政篇下吾與回言章論語所載顔子語止有喟然之嘆與問仁兩章而已而夫子曰吾與回言終日不知是說甚麽惜乎其不傳也廣或問顔子終日不違如愚謂顔子心與聖人契曰此是前軰已自說了畢竟要見顔子因甚與聖人契問者無言文蔚曰孔子博他以文約他以禮他於天下之理無所不明所以於聖人之言無所不契曰孔子未博文約禮之前又如何文蔚曰顔子已具聖人體段曰何處是他具聖人體段文蔚無答曰顔子乃生知之次比之聖人已是九分九釐所爭處只爭一釐孔子只㸃他這些便與他相湊他所以深領其言而不再問也文蔚問顔子不違與孔子耳順相近否曰那地位大段髙不違是顔子於孔子說話都曉得耳順是無所不通淳李從之問顔子省其私不必指燕私只是他自作用處曰便是這意思但恐沒著落却如何省只是說燕私庶幾有箇著處方有可省處私不專在無人獨䖏之地或有人相對坐心意黙所趍向亦是私如謹獨之獨亦非特在幽隠人所不見處只他人所不知雖在衆中便是獨也察其所安安便是箇私處㽦問亦足以發是顔子於燕私之際將聖人之言發見於行事否曰固是雖未盡見於行事其理亦當有發見處然燕私之際尤見顔子踐履之實處㽦問顔子如愚曰夫子與言之時只是一箇獃底退而省其私之所為亦足以發明其意義似不獃如克已復禮他便知得克已復禮如博我以文約我以禮他皆知之便是足以發處卓不違如愚不須說了亦足以發是聽得夫子說話便能發明於日用躬行之間此夫子退而省察顔子之私如此且如說非禮勿視聽言動顔子便真箇不於非禮上視聽言動集注謂坦然由之而無疑是他真箇見得真箇便去做明作問亦足以發莫是所以發明夫子所言之㫖否曰然且如夫子吿以非禮勿視聽言動顔子受之不復更問如何是禮與非禮但是退而省察顔子之所為則直是視聽言動無非禮也此則足以發夫子之言也壯祖先生令㸔顔子亦足以發於何處見之是甚麽意思或云見得親切處於非禮勿視聽言動一章可見曰大槩是如此良久云於睟面盎背皆見之因舉程先生之言曰出門如見大賔使民如承大祭充之則睟面盎背此之謂也燾退而省其私亦足以發這些子便難看且如顔子甚麽䖏足以見退而省其私亦足以發如今著一箇人甚麽處足以發甚麽處便不足以發義剛問亦足以發是顔子退有所省發否曰不然集註已說得分明了盖與之言顔子都無可否似箇愚者及退而觀其所行皆夫子與之言者一一做得出來不差豈不是足以發明得夫子之道其語勢只如此恰如今人說與人做一器用方與他說箇尺寸髙低形製他聽之全然似不曉底及明日做得來却與昨日所說底更無分毫不似祖道亦足以發謂其能發已之言若不悱不發是以此而發彼也引而不發是引弓而不發矢也用字各有不同人傑如子貢子夏是曉了較不甚問辯若他人則三畨四畨說都曉不得獨夫子與顔子說時他却恁地曉得這處便當思量他因甚麽解恁地且如這一件物事我曽見來他也曾見來及我說這物事則他便曉得若其他人不曾見則雖說與他他也不曉義剛問顔子深潜淳粹曰深潜是深厚不淺露恁地時意思常藏在裏面燾集注問顔子深潜淳粹此只是指天資而言否曰是義剛問集注載李先生之說甚分明但所謂黙識心融觸處洞然自有條理便見顔子聞夫子之言自原本至於條目一一理會得所以與夫子意不相背及退省其私即見其日用語嘿動静之間皆足以發明夫子之道坦然由之而不疑便見得顔子不惟理會得夫子言語及退便行將去更無窒礙曰亦足以發一句最好㸔若麤說時便是行將去然須是子細㸔亦足以發一句南升問李先生謂顔子聖人體段已具體段二字莫只是言箇模様否曰然又問惟其具聖人模様了故能聞聖人之言黙識心融否曰顔子去聖人不爭多止隔一膜所以於吾言無所不說其所以不及聖人者只是須待聖人之言觸其機乃能通曉爾又問所以如此者莫只是渣滓化盡否曰聖人所至處顔子都見得只是未到仰之彌髙鑚之彌堅瞻之在前忽然在後這便顔子不及聖人處這便見得未達一間處且如於道理上才著緊又蹉過才放緩又不及又如聖人平日只是理㑹一箇大經大法又却有時而應變達權才去應變達權處㸔他又却不曾離了大經大法可仕而仕學他仕時又却有時而止可止而止學他止時又却有時而仕無可無不可學他不可又却有時而可學他可又却有時而不可終不似聖人事事做到恰好處又問程子說孟子雖未敢便道他是聖人然學已到聖處莫便是指此意而言否曰顔子去聖人尤近或云某於克已復禮動容貌兩章却理會得若是仰髙鑚堅瞻前忽後終是未透曰此兩章止說得一邊是約禮底事到顔子便說出兩脚來聖人之教學者不過博文約禮兩事爾博文是道問學之事於天下事物之理皆欲知之約禮是尊徳性之事於吾心固有之理無一息而不存今見於論語者雖只有問仁問為邦兩章然觀夫子之言有曰吾與回言終日想見凡天下之事無不講究來自視聽言動之際人倫日用當然之理以至夏之時商之輅周之冕舜之樂歴代之典章文物一一都理㑹得了故於此舉其大綱以語之而顔子便能領略得去若元不曾講究則於此必疑問矣蓋聖人循循善誘人才䟎到那有滋味處自然住不得故曰欲罷不能既竭吾才如有所立卓爾卓爾是聖人之大本立於此以酬酢萬變處顔子亦見得此甚分明只是未能到此爾又却䟎逼他不得他亦大段用力不得易曰精義入神以致用也利用安身以崇徳也過此以徃未之或知也窮神知化徳之盛也只是這一箇徳非於崇徳之外别有箇徳之盛也做來做去做到徹處便是廣問不違如愚章心融恐是功深力到處見得道理熟了故言入於心隨即融化更無渣滓故其發見於日用之間自然和順所以能發明聖人之道非生將道理體貼力行之也是否曰固是功夫至到亦是天資髙顔子自是隣於生知者也一之仲愚問黙識心融如何曰説箇融字最好如消融相似如雪在陽中若不融一句在肚裏如何發得出來如人喫物事若不消只生在肚裏如何能滋益體膚須是融化渣滓便下去精英便充於體膚故能肥潤如孔子告曾子一貫之語他人聞之只是箇一貫曾子聞之便能融化故發忠恕而已出來又問是曾子平昔工夫至此乎曰也是他資質自别一之器之問亦足以發伊川有天理昭著語與先生所說不同曰便只是這箇夫子所言他别㑹發明而行之伊川所謂天理昭著便是聖人所說底道理顔子便㑹一一與做且如對人言語他曉不得或曉得不分明少間只恁地悠悠漫漫雖然恁地說自將這言語無落著了到得顔子聖人與說一句他便去做那一句聖人與說兩句他便去做那兩句賀孫以下諸說問退而省其私曰私者他人所不知而囘之所自知者夫子能察之如心之所安燕居獨處之所為見識之所獨見皆是也又曰私字儘闊私與中庸慎獨之獨同大意只是初間與回言一似箇不通曉底人相似退而觀其所獨為又足以發明夫子所說之道且如克已復禮夫子告之矣退而察之則見其果然克已復禮因說范氏說私字作與門人言恐不是謝氏以不違作聲聞相通雖以耳聽而實以神受又較深只是無所不說便是不違幹視其所以章文振問視其所以一章曰此不惟可以觀人亦當以此自考時舉義剛錄云觀人固是如此觀已亦當如此問視其所以一章所以是大綱目㸔這一箇人是為善底人是為惡底人若是為善底人又須觀其意之所從來若是本意以為已事所當為無所為而為之乃為已若以為可以求知於人而為之則是其所從來處已不善了若是所從來處既善又須察其中心樂與不樂若是中心樂為善自無厭倦之意而有日進之益若是中心所樂不在是便或作或輟未免於偽以是察人是節節看到心術隠㣲處最是難事亦必在已者能知言窮理使心通乎道而能精别是非然後察人如聖人也曰於樂處便是誠實為善如好好色如惡惡臭不是勉强做來若以此觀人亦須以此自觀㸔自家為善果是為已果是樂否先生又云㸔文字須學文振每逐章挨近前去文振此兩三夜說話大故精細㸔論語方到一篇便如此直卿云先生說文振資質好南升所以是所為所由是如此做所安是所樂譬如讀書是所為豈不是好事然其去如此做又煞多般有為已而讀書者有為名而讀者有為利而讀者須觀其所由從如何其為已而讀者固善矣然或有出於勉强者故又觀其所樂端䝉問視其所以觀其所由察其所安三句前一句是兼善惡而言後二句是專言善尋常有一様人所為雖不善然其意之所發却不是要做不善而心終亦不安於不善似這般様人是如何曰這箇也自有於觀過知仁可見燾李伸實問視其所以者善者為君子惡者為小人知其小人不必論也所由所安亦以觀察君子之為善者爾曰譬如淘米其糠與沙其始也固淘去之矣再三淘之恐有未盡之沙粃耳人傑問察其所安云今人亦有做得不是底事心却不安又是如何曰此是良心終是微私欲終是盛微底須被他盛底勝將去微底但有端倪無力爭得出正如孟子說非無萌蘖之生一段意當良心與私欲交戰時須是在我大段著力與他戰不可輸與他只是殺賊一般一次殺不退只管殺殺數次時須被殺退了私欲一次勝他不得但教真箇知得他不好了立定脚根只管硬地自行從好路去待得熟時私欲自住不得因舉濓溪說果而確無難焉須是果敢勝得私欲方確然守得這道理不遷變問有何道理可助這箇果曰别無道理助得只是自著力戰退他明作視其所以一章炎問觀人之法論到此却是無遺先生微笑曰孟子觀人之法又自簡徑如曰胸中正則眸子瞭焉胸中不正則眸子眊焉便是炎問觀其所由謂意之所從來何也曰只是㸔他意思來處如何如讀書固是好然他意思來處亦有是為利者視其所以以用也為也為義為君子為利為小人方是且粗㸔如有一般人只安常守分不恁求利然有時意思亦是求利察其所安又㸔他心所安穏處一節深一節淳集註問觀其所由集註兩說如何曰意之所從來如讀書是好須㸔所讀何書行其所為或勉强有所為後說不如前說盖行其所為只是就上面細㸔過不如意之所從來是就他心術上㸔所安集註下得樂字不穏大率是他平日存主習熟處他本心愛如此雖所由偶然不如此終是勉强必竟所樂不在此次第依舊又從熟處去如平日愛踞傲勉强教他恭敬一時之間亦能恭敬次第依舊自踞傲了心方安吕氏一說謂所由是看他已前所為事所安是察他已後所為事亦通所謂知言窮理盖知言亦是窮理之一事然盖互舉也又云知人亦是窮理之一端且如因不失其親須知人方得明作問觀其所由集註言意之所從來如何曰如齊桓伐楚固義也然其意所從來乃因怒蔡姬而伐蔡蔡潰遂伐楚此則所為雖是而所由未是也銖察人之所安尤難故必如聖人之知言窮理方能之廣問視其所以觀其所由察其所安若聖人於人之善惡如見肺肝當不待如此著力曰這也為常人說聖人固不用得如此然聖人觀人也著恁地詳細如今人說一種長厚說話便道聖人不恁地只略略㸔便了這箇若不見教徹底善惡分明如何取舍且如今從學也有誠心來底也有為利來底又如今人讀書也有誠心去讀底也有為利讀底其初也却好漸漸見得他心下不恁地這須著知且如要從師須㸔得那人果是如何又如委託人事若是小小事要付託人尚可以隨其所長交付與他若是要成一件大事如何不見得這人了方付與如所謂可以託六尺之孤可以寄百里之命臨大節而不可奪若不真見這人是恁地如何這事託得他問伊川云視其所以是觀人之大槩若所由所安也只兼善惡說今集註只解向不好邊去恐似無過中求有過非聖人意曰這只是平心恁地㸔㸔得十分是如此若要長厚便恁地包含其初欲恕人而終於自恕少間漸漸將自己都沒理㑹了都不知若能於待人嚴到得於自身已也㑹嚴問觀人之道也有自善而入於惡亦有事雖惡而心所存本好曰這箇也自可見須是如此㸔方見好底鐵定是好人不好底鐵定是不好人讀書不可不仔細若不因公問某也不說到這裏初間才㸔善惡便曉然到觀其所由有不善這又勝得當下便不是底到察其所安有不善這又勝前二項人不是到這裏便做不好人㸔他只是不是他心肯意肯必不㑹有終今按此轉語方答得上所疑集註分明賀孫所以只是箇大槩所由便㸔他所從之道如為義為利又也㸔他所由處有是有非至所安處便是心之所以安方定得且如㸔得如此又須著自反㸔自家所以所由所安如何只是一箇道理吕氏以所以作今所自處所由作昔所經由所安作卒所歸宿却成前後事非是一時觀人不必如此說又問觀其所由曰視其所以者只是觀人之凡曰所由者便㸔他如何地做且如作士人作商賈此是所以至如讀書為利時又也不好如孝與忠若還孝而至於陷父于不義忠而至於阿諛順㫖其所以忠與孝則同而所由之道則别問曰如小人為利便是不好了又更觀其所由做甚曰為利固是為利畢竟便有一節話若還㸔得只是這人了更不須㸔幹集義温故而知新章温故只是時習廣温故知新謂温故書而知新義振温故方能知新不温而求新知則亦不可得而求矣礪問温故知新曰是就温故中見得這道理愈精勝似舊時所看銖温故而知新味其語意乃為温故而不知新者設不温故固是間斷了若果無所得雖温得亦不足以為人師所以温得又要知新惟温故而不知新故不足以為人師也這語意在知新上義剛問温故聞見之在外者知新義理之得於己者若温故而不知新則徒聞見而已惟知新則是在我之義理因温故而有以自得之其應無窮故可以為師乎曰然又問不離温故之中而知新其亦下學上達之理曰亦是漸漸上達之意一之問温故知新曰道理即這一箇道理論孟所載是這一箇道理六經所載也是這箇道理但理㑹得了時時温習覺滋味深長自有新得温字對冷字如一杯羮在此冷了将去温来又好南升温故而知新此處是知新重中庸温故而知新乃是温故重聖人言語自有意思一箇這頭重一箇那頭重又曰温故而不知新一句只是一句了夔孫温故知新不是易底新者只是故中底道理時習得熟漸漸發得出来且如一理㸔幾箇人来問就此一理上一人與說一箇理都是自家就此理上推究出来所以其應無窮且如記問之學記得一事更推第二事不去記得九事便說十事不出所以不足為人師明作集註記問之學不足為人師只縁這箇死殺了若知新則引而伸之觸類而長之則常活不死殺矣如記問之學記得十件只是十件記得百件只是百件知新則時復温習舊聞以知新意所以常活僴温故則能知新如所引學記則是温故而不知新只是記得箇硬本子更不解去裏面搜尋得道理義剛温故而知新是活底故可以為人師記問之學只是死底故不足以為人師振温故而知新可以為師矣先生曰此只是一件事却有兩箇義理如温故而不能知新諸先生把日知其所亡做知新似倒說了日知其所亡乃温故以前事日知其所未有如今日方做事業相似便方始月無忘其所能乃温故也既温故而知新謝氏說温故知新又說得髙逺了先生曰程先生說可以為師作只此一句可師不如便把做為師之師看此一句只說是人若不能温故知新便不可為人師守舊而不知新義便不活不足以應學者之求若温故而知新則從此儘推得去吕氏說師尚多聞只是泥孟子之語孟子初間也且恁地說吕氏便把來作引證不得大率聖人之言語闊被他把做恁地說也無礙理處幹集義仁父問温故而知新可以為師矣伊川謂此一言可師此一事可師切有未喻曰伊川見得亦差了這一句正對記問之學不足為人師一句若温習舊聞則義理日通無有窮已若記問之學雖是記得多雖是讀得多雖是聞得多雖是千卷萬卷只是千卷萬卷未有不窮然而這一句說師亦只說平常恁地師却不說是孔子這般師兼是這主意只為世上有不温故知新而便欲為人師故發此一句却不是說如此便可以為師言如此方可以為師以證人不如此而遽欲為師者伊川却只認這意一向要去分解以此知讀書儘著仔細伊川恁地工夫也自有這般處聖人語言極精宻無些子偏重亦無些子罅漏如說一言而䘮邦有諸曰惟其言而莫之違只消如此說亦得便須說道如不善而莫之違也不幾乎一言而䘮邦乎或曰以徳報怨何如㸔来也似好聖人便問他何以報徳以直報怨以徳報徳若以直報怨只是依直報之恰如無怨相似且如人有些侵我處若是我不是便休了若是他不是與他理㑹教是便了賀孫問以徳報怨非獨說道無以報徳只是以徳報怨也自不得曰然如此只是偽只是不誠賀孫君子不器章君子不器是不拘於一所謂體無不具人心原有這許多道理充足若慣熟時自然看要如何無不周遍子貢瑚璉只是廟中可用移去别處便用不得如原憲只是一箇喫菜根底人邦有道出来也做一事不得邦無道也不能撥亂反正夷清恵和亦只做得一件事明作或問君子不器如孔門徳行之外乃為器否曰若偏於徳行而其用不周亦是器君子者才徳出衆之名徳者體也才者用也君子之人亦具聖人之體用夔孫録云體無不備用無不周次於聖人者也但其體不如聖人之大而其用不如聖人之妙耳人傑君子不器事事有些非若一善一行之可名也賢人則器獲此而失彼長於此又短於彼賢人不及君子君子不及聖人夀昌問君子不器之㫖曰人心至靈均具萬理是以無所徃而不知然而仁義禮智之性苟以學力充之則無所施而不通謂之不器可也至於人之才具分明是各局於氣稟有能有不能又問如何勉强得曰君子者成徳之名也所貴乎君子者有以化其氣稟之性耳不然何足以言君子中庸言雖愚必明雖柔必强處正是此意壯祖問君子所以不器者縁是就格物致知上做工夫㸔得道理周遍精切及廓然貫通有以盡其心之全體故施之於用無所不冝非特一才一藝而已曰也是如此但說得著力了成徳之士自是不器南升君子不器君子是何等人曰此通上下而言有一般對小人而言底君子便是小底君子至如聖人吾不得而見之得見君子斯可矣便說大底君子便是聖人之次者問不器是那箇君子曰此是成徳全才之君子不可一偏㸔他問侯氏舉君子不可小知而可大受如何曰不可小知便是不可以一偏㸔他他却擔負得逺大底小人時便也有一才一藝可取故可小知問子貢女器也喚做不是君子得否曰子貢也是箇偏底可貴而不可賤冝於宗廟朝廷而不可退處此子貢之偏處問謝氏舉清和任也只是器否曰這是他成就得偏却不是器他本成就得來大如得百里之地而君之一段他自是大只是成就得来偏問諸先生多舉形而上形而下如何說曰可見底是器不可見底是道理是道物是器因指面前火爐曰此是器然而可以向火所以為人用便是道問謝氏以為顔閔有聖人之一體未必優於子夏子游子張然而具體也既謂之具體又說不如三子何也曰他意只道是顔子便都無許多事如古人說無所長既無所短安有所長底意他把來驅駕作文字便語中有病因問具體而㣲曰五峯說得牽强㸔來只是比似孔子較小今看顔子比孔子真箇小幹集義問范氏謝氏說如何曰天下道理皆㸔得透無一理之不知無一事之不明何器之有如范氏說也說得去然不消如此謝氏說得意思也好推其極乃大底不器伊尹伯夷栁下恵皆能有天下則器固大矣自一才一藝者觀之亦不可謂之器矣然自孔子可仕可止觀之則彼止在一邊亦器也孟子誠不肯學他底了一之子貢問君子章問先行其言而後從之曰此為子貢而發其實有徳者必有言若有此徳其言自足以發明之無有說不出之理夫子只云欲訥於言而敏於行敏於事而慎於言未嘗說無事於言人傑問先行其言而後從之苟能行矣何事於言曰只為子貢多言故告之如此若道只要自家行得說都不得亦不是道理聖人只說敏於事而慎於言敏於行而訥於言言顧行行顧言何嘗教人不言䕫孫徐仁甫問先行其言而後從之莫須将先行作一句否曰程子如此却未敢以為然恐其言而後從之不成一句若云而後其言從之方得不若以先行其言作一句而後從之作一句大意只說先行其所言而後言其所行讀書須是㸔出處主意如何此是子貢問君子孔子為子貢多言故以先行其言而後從之答之盖為子貢發也問先行其言謂人識得箇道理了可以說出来却不要只做言語說過須是合下便行将去而後從之者及行將去見得自家所得底道理歩歩著實然後說出來却不是杜撰意度須還自家自本至末皆說得有著實處曰此一章說得好南升君子周而不比章問周與比莫也相似否曰外面相似而裏面大差了如驕泰和同亦然故幾微之間不可不辨幹周是無不愛比是私也相比或二人相比也是植君子周而不比周是徧人前背後都如此心都一般不偏滯在一箇如老者安之朋友信之少者懷之亦是周徧忠信為周如這一箇人合當如何待那箇人又合如何待自家只㸔理無輕重厚薄便是周徧周是公底比比是私底周周是無所不比也如為臣則忠為子却不能孝便是偏比不周徧只知有君而不知有親按忠信為周他録别有定說淳問比周曰君子小人即是公私之間皆是與人親厚但君子意思自然廣大小人與人相親時便生計較與我善底做一般不與我善底做一般周與比相去不逺要須分别得大相逺處某集註中曾說此意君子與人相親也有輕重有厚薄但意思自是公南升問周而不比曰周者大而遍之謂比便小所謂兩兩相比君子之於人無一人使之不得其所這便是周小人之於人但見同於已者與之不同於已者惡之這便是比君子之於人非是全無惡人處但好善惡惡皆出於公用一善人於國則一國享其治用一善人於天下則天下享其治於一邑之中去一惡人則一邑獲其安於一鄉之中去一惡人則一鄉受其安豈不是周小人之心一切反是又云歐陽朋黨論說周武以三千為大朋商紂億兆之人離心離徳又云比周二字於易中所言又以比字為美如九五顯比取王用三驅失前禽之義皆美也如頑嚚不友相與比周又却是不好卓比之與周皆親厚之意周則無所不愛為諸侯則愛一國為天子則愛天下隨其親疏厚薄無不是此愛若比則只是㨂擇或以利或以勢一等合親底他却自有愛憎所以有不周處又云集註謂普徧是泛愛之意偏黨非特勢利大槩君子心公而大所以周普小人心狹而常私便親厚也只親厚得一箇明作問比周曰且如一鄉之中有箇惡人我這裏若可除去便須除去却得這一鄉都安此君子周而不比也至如小人於惡人則喜其與已合必須親愛之到得無惡之人每與已異必思傷害之此小人之比而不周也武三思嘗言如何是善人如何是惡人與予合者是善人與予不合者是惡人賀孫問比周曰周固是好然而有一種人是人無不周旋之使所周之人皆善固是好萬一有箇不好底人自家周旋他去這人㑹去作無窮之害此無他只是要人之同已所以為害君子則不然當親則親當疎則疎而已夔孫問註周言普徧豈汎愛衆而親仁之意歟曰亦是如此大抵君子立心自是周徧好惡愛憎一本於公小人惟偏比阿黨而已㝢集註問註云君子小人所以分則在公私之際毫釐之差耳何謂毫釐之差曰君子也是如此親愛小人也是如此親愛君子公小人私節問註云欲學者察乎兩間而審其取舍之幾當在思慮方萌之初與人交際之始於此審決之否曰致察於思慮固是但事上亦須照管動箴曰哲人知幾誠之於思志士勵行守之於為須著隨處照管不應道這裏失了後面更不去照管覺得思處失了便著去事上看便舍彼取此須著如此方得恪徐問比周曰只是公私周則徧及天下比則昵於親愛之間又問忠信為周阿黨為比如何曰忠信為周只縁左傳周爰咨詢指作忠信後人遂將來妄解最無道理且如易比卦言比吉也比輔也原筮元永貞無咎則比都是好大抵比於君子則為善比於小人則為惡須是㸔聖人說處本意如何據此周而不比比而不周只是公私集義問范氏說忠信為周恐未說到此曰忠信所以周也若面前背後不誠實則不周矣周是公底比無所不比也比是私底周周一邊背了一邊周則意思却照管得到極其至為臣則忠為子則孝是亦周也一之學而不思章問論語言學字多不同學而不思則罔此學字似主於行而言博學於文此學字似主乎知而言曰學而不思則罔此學也不是行問學字義如何曰學只是效未能如此便去效做問恐行意較多否曰只是未能如此便去學做如未識得這一箇理便去講究要識得也是學未識得這一箇書便去讀也是學未曉得這一件事去問人如何做便也是學問人便是依這本子做去不問人便不依本子只鶻突杜撰做去學是身去做思只是黙坐來思問學是學其事思是思其理否曰思只是思所學底事學而不思便都罔了問思而不學何以危殆曰硬将来拗縛捉住在這裏便是危殆只是杜撰恁地不恁自然便不安穏淳學與思須相連才學這事須便思量這事合如何學字甚大學效他聖賢做事南升學是學其事如讀書便是學須緩緩精思其中義理方得且如做此事是學然須思此事道理是如何只恁下頭做不思這事道理則昧而無得若只空思索却又不傍所做事上體察則心終是不安穏須是事與思互相發明明作學不止是讀書凡做事皆是學且如學做一事須是更經思量方得然只管思量而不學則自家心必不安穏便是殆也學而不思如讀書不思道理是如何思而不學如徒苦思索不依様子做植思而不學則殆雖用心思量不曽就事上習熟畢竟生硬不㑹妥帖銖問不求諸心則昏而無得不習其事則危而不安如何曰思與學字相對說學這事便思這事人說這事合恁地做自家不曽思量這道理是合如何則罔然而已罔似今人說罔兩既思得這事若不去做這事便不熟則臬兀不安如人學射雖習得弓箭裏許多模様若不曾思量這箇是合如何也不得既思得許多模様是合如何却不曾置得一張弓一隻箭向垜邊去射也如何得集註或問學而不思章引程子博學審問慎思明辨力行五者廢一非學何也曰凡學字便兼行字意思如講明義理學也効人做事亦學也孔子歩亦歩趨亦趨是効其所為才効其所為便有行意銖叔蒙問集註却舉中庸學問思辨與行之語據某看學與行是學之始終問思辨是思之始終曰然賀孫問思而不學則殆註身不親歴所謂親歴豈講求義理與躬行處均為親歴乎曰講求義理又似乎思但就見定事上學去話間因語及某人曰此正思而不學之人只一向㝷空去凡事須學方能進歩集註非定本㝢問諸先生說有外意者有說偏傍者也須看否曰也要見得他礙處因問楊氏說思則敬以直内義以方外如何曰敬自是存養底事義自是推行底事且說思與學也未須說存養推行處若把推行作學便不是中庸裏面博學力行自是兩件今人說學便都說到行處去且如讀書看這一句理㑹不得便須熟讀此便是學然學而不思便是按古本也無得䖏若徒然閉目静思而不學又也徒勞心不穏當然後推到行處問罔字作欺罔無實之罔如何曰不必如此說罔是昏昧底意問思而不學則殆只是尹氏勞而無所安底意否曰是勞便是其心勞不安便是於義理不安問謝氏窮大而失其所居如何曰只是不安幹集義攻乎異端章或問攻乎異端曰攻者是講習之謂非攻撃之攻這處須看他如何是異端如何是正道異端不是天生出來天下只是這一箇道理縁人心不正則流於邪說習於彼必害於此既入於邪必害於正異端不止是楊墨佛老這箇是異端之大者問攻字若作攻擊也如何便有害曰便是聖人若說攻撃異端則有害便也須更有說話在不肯只恁地說遂休了若從攻撃則吕氏之說近之不如只作攻治之攻較穏幹凡言異端不必攻者皆是為異端游說反間孟子謂能言距楊墨者聖人之徒也不必便能距楊墨但能說距楊墨亦是聖人之徒淳問集註云攻專治之也若為學便當專治之異端則不可專治也曰不惟說不可專治便畧去理㑹他也不得若是自家學有定止去看他病痛却得也是自家眼目髙方得若是恁地則也奈他不何如後來士大夫末年皆流入佛氏者縁是把自家底做淺底看便沒意思了所以流入他空寂𤣥妙之說去燾集註問程子曰佛氏之言近理所以害甚於楊墨㸔來為我疑於義兼愛疑於仁其禍已不勝言佛氏如何又却甚焉曰楊墨只是硬恁地做佛氏最有精㣲動得人處本朝許多極好人無不陷焉如李文靖王文正謝上蔡楊龜山㳺先生諸人賀孫問集註何以言佛而不言老曰老便只是楊氏人嘗以孟子當時只闢楊墨不闢老不知闢楊便是闢老如後世有隠遯長往而不來者皆是老之流他本不是學老只是自執所見與此相似淳味道問只說釋氏不說楊墨如何曰楊墨為我兼愛做出來也淡而不能惑人只為釋氏最能惑人初見他說出来自有道理從他說愈深愈是害人攻乎異端章曰楊氏為我㧞一毛而利天下不為墨氏兼愛至不知有父如此等事世人見他無道理自不去學他只如墨者夷之厚𦵏自打不過縁無道理自是行不得若佛氏則近理所以惑人此事難說觀其書可見明作吕氏曰君子反經而已矣經正斯無邪慝今惡乎異端而以力攻之適足以自蔽而已說得甚好但添得意思多了不敢保是聖人之意聖人之意分明只是以力攻之理㑹他底未得枉費力便將已業都荒了淳集義由誨女知之章問知之為知之章子路不應有以不知為知之病曰子路粗暴見事便自說是曉會得如正名一節便以為迂故和那不知處也不知耳銖問知之為知之曰子路氣象粗疎不能隨事精察或有不合於已雖於夫子亦艴然如子之迂也之類故夫子告之以此雉或問誨汝知之乎章曰惟伊川便說得盡别人只說得一邉知之為知之不知為不知則無自欺之蔽其知固自明矣若不說求其知一著則是使人安於其所不知也故程子又說出此意其說方完上不失於自欺下不失於自勉廣徐問上蔡之說如何曰上蔡說未是其說求為過髙要之聖人之言只是說緊切底事只為今人知之以為知将那不知者亦說是知終至於知與不知都無界限了若人能於其知者以為知於不知者以為不知而不强以為知便是知了只為子路性勇怕他把不知者亦說是知故為他說如此子張學干禄章戴智老說干禄章曰多聞多見二字人多輕說過了將以為偶然多聞多見耳殊不知此正是合用功處聖人所以為好古敏以求之又曰多聞擇其善者而從之多見而識之皆欲求其多也不然則聞見孤寡不足以為學矣時舉多聞闕疑慎言三件事節多聞多見自不是淺陋廹狹人又更闕疑又更慎其餘方聞見亦是互相發明如學干禄章言多聞闕疑慎言其餘多見闕殆慎行其餘聞固是主於言見固是主於行然亦有聞而行者見而言者不可泥而看也時舉問干禄章聞見字義曰聞是聞人之言見是見人之行聞亦屬自家言處見亦屬自家做處聞見當闕其疑殆而又勿易言易行之問聞見因書得之則又何别曰見古人說底話是聞見古人做底事而欲學之是見如舜之孝是也然就克已復禮論之則看孔子所言是聞只自家欲循此而為仁便是見此非本文大義然必欲區别聞見則然問此答干禄之語意類好色之對乎曰不干事孔子不教他干但云得禄之道在其中正是欲抹殺了他干字若夫王好貨好色等語便欲比之孔子便做病了便見聖賢之分處一之或問慎其餘只是指無疑無殆處否曰固是義剛林叔恭問多聞如何闕疑多見如何闕殆曰若不多聞也無縁見得疑若不多見也無縁見得殆江西諸人纔聞得一說便把做了看有甚麽話更入不得亦如何有疑殆到他說此一章却云子張平日專務多聞多見故夫子告以闕疑是不欲其多聞多見此是甚說話且如一件事一人如此說自家也見未得須是大家都說出來這裏方見得果是如何這裏方可以將衆多之說相磨擦這裏方見得疑殆分明賀孫或問尤自外至悔自内出曰出言或至傷人故多尤行有不至已必先覺故多悔然此亦以其多少言之耳言而多尤豈不自悔行而多悔亦必至於傷人矣廣子張學干禄一章是教人不以干禄為意盖言行所當謹非為欲干禄而然也若真能著實用功則惟患言行之有悔尤何暇有干禄之心耶銖徐問學干禄章曰此是三截事若人少聞寡見則不能参考得是處故聞見須要多若聞見已多而不能闕疑殆則胡亂把不是底也将來做是了既闕其疑殆而又未能慎其餘則必有尤悔又問尤悔如何分尤莫是見尤於人否曰是大凡言不慎則必見尤於人人既有尤自家安得無悔行不慎則已必有悔已既有悔則人安得不見尤此只是各將較重處對說又問禄在其中只此便可以得禄否曰雖不求禄若能無悔尤此自有得禄道理若曰耕也餒在其中矣耕本求飽豈是求餒然耕却有水旱凶荒之虞則有時而餒學本為道豈是求禄然學既寡尤悔則自可以得禄如言直在其中矣父為子隠子為父隠本不是直然父子之道却要如此乃是直凡言在其中矣者道理皆如此又問聖人不教人求禄又曰禄在其中如何曰聖人教人只是教人先謹言行却把他那禄不做大事看須是體量得輕重始得子張學干禄夫子答之者聞主言見主事尤是罪自外至悔是理自内出凡事不要到悔時悔時已錯了禄在其中凡言在其中皆是不求而自至之意父子相隠本非直而直在其中如耕本要飽然有水旱之變便有餒在其中學本是要立身不是要干禄然言行能謹人自見知便有得禄之道大槩是令他自理㑹身已上事不要先萌利禄之心又云若人見得道理分明便不為利禄動明作問子張在聖門忽然學干禄聖人但告之以謹其言行便是脩其天爵而人爵自至曰修天爵而人爵自至說得重了此意重處只在言行若言行能謹便自帶得禄來時舉録作聖人之心只教他謹言行因帶禄說凡言在其中者皆不求或作期而自至之辭如耕本是求飽却言餒在其中父子相為隠直却在其中又為前面也說得深了聖人本意在謹言行又不可徒謹須用得學又須闕其疑而未信殆而未安者便將其餘信而安者做一處謹言而謹行之謂其察得可言與可行也南升時舉録小異子張學干禄禄固人之所欲但要去干却不得子張恁地時已不是正底心了夫子却掉開答他不教他如何地干也不教他莫干但言禄在其中凡言在其中者皆不求此而得彼之義如耕也餒在其中之類皆是君子求其在已而已然而徳行既修名聲既顯則人自然來求禄不待干而自得如未有仁而遺其親未有義而後其君這豈是要計較他不遺不後後方為仁義但是為仁義時便自恁地這雖是不曾說利然使天下人皆不遺不後利孰大焉大抵計功之心也是害事所謂仁者先難而後獲纔有計功之心便都不濟事義剛問學干禄章曰這也是一說然便是教人不要去求如程先生說使定其心而不為利禄所動是也論語凡言在其中皆是與那事相背且如父為子隠子為父隠本不干直事然直却在其中耕本是得食然有水旱凶荒則有餒在其中切問近思本只是講學不是求仁底事然做得精則仁亦在其中如居處恭執事敬興人忠皆是切已去做方是求仁底事此皆是教人只從這一路做去且莫管那一邊然做得這一邊則那一邊自在其中也又曰惟是那君子謀道不謀食學也禄在其中耕也餒在在其中一章說得最反覆周全如云君子謀道不謀食是將一句統說了中央又分兩脚說學也禄在其中耕也餒在其中又似教人謀道以求食底意思下面却說憂道不憂貧便和根斬了燾哀公問何為則民服章陳仲蔚說何為則民服及使民敬忠以勸二章先生曰前章據本文夫子只恁地說未有貴窮理之意當時哀公舉錯之權不在已問了只恁休了他若㑹問時夫子尚須有說義剛或問舉直錯枉曰是便是直非便是枉燾舉直錯枉集註謂大居敬而貴窮理曰若不居敬如何窮理不窮理如何識人為舉直錯枉之本又曰人最要見得是與不是方有下手處如今人都不見得是非分别不出又曰須是居敬窮理自做工夫銖録云此是自修工夫方能照得人破若心不在焉則視之而不見聽之而不聞以枉為直以直為枉矣明作銖同問哀公問何為則民服徃徃只是要得人畏服他聖人却告之以進賢退不肖乃是治國之大本而人心自服者盖好賢而惡不肖乃人之正性若舉錯得義則人心豈有不服謝氏又謂若無道以照之則以直為枉以枉為直此君子大居敬而貴窮理此又極本原而言若人君無知人之明則枉直交錯而舉錯未必得冝矣曰說得分明季康子問使民敬忠以勸章問使民敬忠以勸曰莊只是一箇字上能端荘則下便尊敬至於孝慈則是兩事孝是以躬率之慈是以恩結之如此人方忠於已舉善而教不能若善者舉之不善者便去之誅之罰之則民不解便勸惟是舉其善者而教其不能者所以皆勸便是文字難看如這様處當初只是大槩看了便休而今思之方知集註說得未盡義剛問孝慈則忠何以能使之忠也曰孝以率之慈以結之所以使之忠也問孝慈主父子而言可乎曰如此安能便使之忠也此慈字兼内外而言若大學齊家章孝慈乃主父子而言也孝於親是做箇様子慈於衆則推此意以及人兼此二者方能使民忠於已若徒孝於親而不能推及於衆若徒慈於衆而無孝親底様子都不得明作孝是以身率之慈是以恩結之善者固可舉若不能者遽刑之罰之則彼何由勸舉善於前而教不能於後則是誘引之使趨於善也是以勸䕫孫問康子之意必要使民能如此聖人但告之以已所當為而民自應者方其端莊孝慈舉善教不能不是要民如此而後為做得自已工夫則民不期然而然者曰也是如此或謂子奚不為政章惟孝友于兄弟謂孝然後友友然後政其序如此振問施於有政是使一家人皆孝友否曰刑于寡妻至于兄弟以御于家邦是也政一家之事也固不止是使之皆孝友耳然孝友為之本也一之推廣此心以為一家之政便是齊家縁下面有一箇是亦為政故不是國政又曰在我者孝則人皆知孝在我者弟則人皆知弟其政豈不行於一家明作問惟孝友于兄弟可以施於有政曰此全在推字上言舉斯心加諸彼今人只為不能善推其所為耳范唐鑑言唐明皇能友愛兄弟而殺其三子正以其不能推此心耳銖問此夫子難以不仕之意告或人故托以告之然使夫子得時得位其為政之本也只就人倫上做將去曰文振看文義看得好更冝涵泳南升人而無信章問人而無信不知其可也曰人而無真實誠心則所言皆妄今日所言要徃東明日走在西去這便是言不可行卓問先生但謂車無此二者則不可以行人而無信亦猶是也而不及無信之所以不可行何也曰人若無信則語言無實何處行得處家則不可行於家處鄉黨則不可行於鄉黨曰此與言不忠信雖州里行乎哉之意同曰然廣子張問十世可知章周問三代所因者不易而所損益可知如何曰此所謂不易也變易也三綱五常亘古亘今不可易至於變易之時與其人雖不可知而其勢必變易可知也盖有餘必損不及必益雖百世之逺可知也猶寒極生煖煖甚生寒雖不可知其勢必如此可知也銖所因之禮是天做底萬世不可易所損益之禮是人做底故隨時更變燾所因謂大體所損益謂文為制度那大體是變不得底雖如秦之滅絶先王禮法然依舊有君臣有父子有夫婦依舊廢這箇不得義剛忠質文忠只是樸實頭白直做將去質則漸有形質制度而未及於文采文則就制度上事事加文采然亦天下之勢自有此三者非聖人欲尚忠尚質尚文也夏不得不忠商不得不質周不得不文彼時亦無此名字後人見得如此故命此名僴以下集註問忠與質如何分曰忠只是渾然誠確質與文對質便自有文了但文未盛比之文則此箇質耳銖或問忠與質如何分先生喜其善問答云質朴則未有文忠則渾然無質可言矣過或問忠與質異處曰此如人家初做得箇家計成人雖有許多動用其誠意直是質實到做得家計成次第便有動用噐使其初務純朴不甚浮華及其漸久用度日侈駸駸然日趨於文而不容自已其勢然也子蒙行夫問三統曰諸儒之說為無據某看只是當天地肇判之初天始開當子位故以子為天正其次地始闢當丑位故以丑為地正惟人最後方生當寅位故以寅為人正即邵康節十二㑹闕當寅位則有所謂開物當戌位則有所謂閉物閉物便是天地之間都無了看他說便須天地翻轉數十萬年問天統地統人統之别曰子是一陽初動時故謂之天統丑是二陽故謂之地統寅是三陽故謂之人統因舉康節元㑹運世之說十二萬九千六百年為一元一元有十二㑹一萬八百年為一㑹一㑹有三十運三百六十年為一運一運有十二世以小推大以大推小箇箇一般謂嵗月日時皆相配合也如第一㑹第二㑹時尚未生人物想得地也未硬在第三㑹謂之開物人物方生此時屬寅到得戌時謂之閉物乃人消物盡之時也大率是半明半晦有五六萬年好有五六萬年不好如晝夜相似到得一元盡時天地又是一畨開闢問先生詩云前推更無始後際那有終如何曰惟其終而復始所以無窮也燾問子丑寅之建正如何曰此是三陽之月若秦用亥為正直是無謂大抵三代更易須著如此改易一畨又問忠質文本漢儒之論今伊川亦用其說如何曰亦有此理忠是忠樸君臣之間一味忠樸而已才說質便與文對矣又問五運之說曰本起於五行萬物離不得五行五運之說亦有理如三代已前事經書所不載者甚多又問五運之說不知取相生相克曰取相生又問漢承秦水徳之後而以火徳繼之是如何先生曰或謂秦是閏位然事亦有適然相符合者如我太祖以歸徳軍節度即位即是商丘之地此火徳之符也事與髙祖赤帝子一般去偽器之說損益曰勢自是如此有人主出來也只因這箇勢自住不得到這裏方看做是如何惟是聖人能順得這勢盡得這道理以下人不能識得損益之冝便錯了壞了也自是立不得因只是因這箇損益也是損益這箇㝢以下總論叔蒙問十世所因損益曰綱常千萬年磨滅不得只是盛衰消長之勢自不可已盛了又衰衰了又盛其勢如此聖人出來亦只是就這上損其餘益其不足聖人做得来自是恰好不到有悔憾處三代以下做來不恰好定有悔憾雖做得不盡善要亦是損益前人底雖是人謀要大勢不得不出此但這綱常自要壞滅不得世間自是有父子有上下羔羊跪乳便有父子螻蟻統屬便有君臣或居先或居後便有兄弟犬馬牛羊成群連隊便有朋友始皇為父胡亥為子扶蘓為兄胡亥為弟這箇也氓滅不得器之問三代損益如衣服器用制度損益却不妨如正朔是天時之常却要改如何曰一畨新民觀聽合如此如新知縣到任便變易號令一番住持入院改換行者名次相似㝢此一章因字最重所謂損益者亦是要扶持箇三綱五常而已如秦之繼周雖損益有所不當然三綱五常終變不得君臣依舊是君臣父子依舊是父子只是安頓得不好耳聖人所謂可知者亦只是知其相因者也如四時之運春後必當是夏夏後必當是秋其間雖寒暑不能無繆戾然四時之運終改不得也康節詩云千世萬世中原有人正與此意合時舉這一段諸先生說得損益字不知更有箇因字不曾說因字最重程先生也只滚說將去三代之禮大槩都相因了所損也只損得這些箇所益也只益得這些箇此所以百世可知也且如秦最是不善繼周酷虐無比然而所因之禮如三綱五常竟滅不得馬氏註所因謂三綱五常損益謂質文三綂此說極好幹繼周百世可知秦繼周者也安得為可知然君臣父子夫婦依舊在只是不能盡其道爾淳問十世可知曰三綱五常雖衰亂大無道之世亦即在且如繼周者秦大無道之世畢竟是始皇為君李斯等為臣始皇為父胡亥為子三綱五常地位占得大了便是損益亦不多至秦欲尊君便至不可仰望抑臣便至十分卑屈此段重在因字損益只些子南升致道問夫子繼周而作則忠質損益之冝如何曰孔子有作則併將前代忠質而為之損益却不似商只損益得夏周只損益得二代又問孔子監前代而損益之及其終也能無弊否曰惡能無弊賀孫問其所闕者冝益其所多者冝損固事勢之必然但聖人於此處得恰好其他人則損益過差了曰聖人便措置一一中理如周末文極盛故秦興必降殺了周恁地柔弱故秦必變為强戾周恁地纎悉周緻故秦興一向簡易無情直情徑行皆事勢之必變但秦變得過了秦既恁地暴虐漢興定是寛大故云獨沛公素寛大長者秦既鍳封建之弊改為郡縣雖其宗族一齊削弱至漢遂大封同姓莫不過制賈誼已慮其害晁錯遂削一畨主父偃遂以誼之說施之武帝諸侯王只管削弱自武帝以下直至魏末無非剗削宗室至此可謂極矣晉武起盡用宗室皆是因其事勢不得不然賀孫問本朝大勢是如何曰本朝鍳五代藩鎮兵也收了賞罰刑政一切都收了然州郡一齊困弱靖康之禍冦盜所過莫不潰散亦是失斟酌所致又如熈寜變法亦是當苟且惰弛之餘勢有不容已者但變之自不中道賀孫先生謂繼周百世可知諸公看繼周者是秦果如夫子之言否皆對以為秦不能繼周故所因所革皆不可考曰若說秦不能繼周則夫子之言不是始得夫子分明說百世可知看秦將先王之法一切掃除了然而所謂三綱五常這箇不曾泯滅得如尊君卑臣損周室君弱臣强之弊這自是有君臣之禮如立法說父子兄弟同室内息者皆有禁之類這自是有父子兄弟夫婦之禮天地之常經自商繼夏周繼商秦繼周以後皆變這箇不得秦之所謂損益亦見得周末許多煩文縟禮如此故直要損其太過益其欠處只是損益得太甚然亦是事勢合到這裏要做箇直截世界做箇沒人情底所為爾才犯我法便死更不有許多勞勞攘攘如議親議賢議能議功之類皆不消如此只是白直做去他亦只為苟簡自便計到得漢興雖未盡變亡秦之政如髙文之寛仁恭儉皆是因秦之苛刻驕侈而損益其意也大綱恁地寛厚到後便易得廢弛便有强臣簒奪之禍故光武起來又損益前後之制事權歸上而激厲士大夫以亷耻賀孫非其鬼而祭之章非其鬼而祭之如天子祭天地諸侯祭山川大夫祭五祀庶人祭其先上得以兼乎下下不得以兼乎上也庶人而祭五祀大夫而祭山川諸侯而祭天地此所謂非其鬼也僴問非其鬼而祭之如諸侯僭天子大夫僭諸侯之類又如士庶祭其旁親逺族亦是非其鬼否曰是又如今人祭甚麽廟神都是非其鬼問如用僧尼道士之屬都是非其鬼曰亦是問祭旁親逺族不當祭若無後者則如之何曰這若無人祭只得為他祭自古無後者合當祭於宗子之家今何處討宗子看古禮今無存者要一一行之也難賀孫問非其鬼而祭之尋常人家所當祭者只是祖先否曰然又問土地山川之神人家在所不當祭否曰山川之神季氏祭之尚以為僭况士庻乎如土地之神人家却可祭之禮云庶人立一祀或立戸或立竈户竈亦可祭也又問中霤之義如何曰古人穴居當土室中開一竅取明故謂之中霤而今人以中堂名曰中霤者所以存古之義也又云中霤亦土地之神之類五祀皆室神也燾問見義不為無勇莫是連上章意否曰不須連上句自說凡事見得是義便著做不獨說祭祀也賀孫子善問見義不為無勇這亦不為無所見但為之不力所以為無勇也曰固是見得是義而為之不力然也是先時見得未分明若已見得分明則行之自有力這般處著兩下並看就見義不為上看固見得知之而不能為若從源頭上看下來乃是知之未至所以為之不力賀孫恪錄别出子善問見義不為無勇也曰此直說眼前事若見得合做底事且須勇決行之若論本原上看則只是知未至若知至則當做底事自然做將去恪朱子語類卷二十四
