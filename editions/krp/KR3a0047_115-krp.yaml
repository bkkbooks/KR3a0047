body:
  text: 朱子語類卷一百十五朱子十二訓門人三問曾㸃漆雕開己見大意曰曾㸃漆雕開是合下見得大了然但見大意未精密也因語人傑曰正淳之病大槩説得渾淪都不曾嚼破殻子所以多有纒縛不索性絲来線去更不直截無那精密潔白底意思若是實識得便自一言兩語斷得分眀如今工夫須是一刀兩段所謂一棒一條痕一摑一掌血如此做頭底方可無疑慮如項羽救趙既渡沈舡破釡持三日糧示士卒必死無還心故能破秦若更瞻前顧後便不可也因舉禪語云寸鐵可殺人無殺人手叚則載一車鎗刀逐件弄過畢竟無益以下訓人傑屡與人傑説謹思之一句言思之不謹便有枉用工夫處先生問别後工夫曰謹守教誨不敢失墜舊来於先生之説猶不能無疑自昨到五更後乃知先生之道斷然不可易近㸔中庸見得道理只從下面做起愈見愈實先生曰道理只是如此但今人須要説一般深妙直以為不可曉處方是道展轉相承只將一箇理㑹不得底物事互相欺謾如主管假㑹子相似如二程説經義直是平常多與舊説相似但意味不同伊川曰予年十七八時已曉文義讀之愈久但覺意味深長盖只是這箇物事愈説愈明愈㸔愈精非别有箇要妙不容言者也近見湖南學者非復欽夫之舊當来若到彼中須與整理一番恨不能遂此意耳㸔人傑論語疑義云正淳之病多要與衆説相反譬如一柄扇子衆人説這一面正淳便説那一面以詰之及衆人説那一面正淳却説這一面以詰之舊見欽夫解論語多有如此處某嘗語之云如此是别為一書與論語相詰難也先生問人傑學者多入於禪何也人傑答以彼盖厭吾儒窮格工夫所以要趨捷徑先生曰操則存舎則亡吾儒自有此等工夫然未有不操而存者今釋子謂我有箇道理能不操而存故學者靡然從之盖為主一工夫學者徒能言而不能行所以不能當抵他釋氏之説也人傑因曰人傑之所見却不徒言乃真得所謂操而存者曰畢竟有欠闕人傑曰工夫欠闕則有之然此心則未嘗不存也曰正淳只管来爭便是源頭有欠闕反覆教誨數十言人傑曰荷先生教誨然説人傑不著曰正淳自主張以為道理只如此然以某觀之有得者自然精眀不昧正淳更且靜坐思之能知所以欠闕則斯有進矣因言程門諸公如游楊者見道不甚分眀所以説著做工夫處都不緊切須是操存之際常㸔得在這裏則愈益精眀矣次日見先生曰昨日聞教誨方知實有欠闕先生曰聖人之心如一泓止水遇應事時但見箇影子所以發必中節若自心黑籠籠地則應事安能中節靜時見此理動時亦當見此理若靜時能見動時却見不得恰似不曾問索理未到精㣲處如何曰平日思慮夾雜不能虚眀用此昏底心欲以觀天下之理而斷天下之疑豈能䆒其精㣲乎人傑将行請教先生曰平日工夫須是做到極時四邊皆黑無路可入方是有長進處大疑則可大進若自覺有些長進便道我已到了是未足以為大進也顔子仰髙鑽堅瞻前忽後及至雖欲從之末由也已直是無去䖏了至此可以語進矣問每有喜好適意底事便覺有自私之心若欲見理莫當便與克下使其心無所喜好雖適意亦視為當然否曰此等事見得道理分眀自然消磨了似此迫切却生病痛學問亦無箇一超直入之理直是銖積寸累做将去某是如此喫辛苦從漸做来若要得知亦須是喫辛苦了做不是可以坐談僥倖而得正淳曰連日侍先生教自做工夫至要約貫通䖏似已詳盡先生曰只欠做㽦道夫以疑目質之先生其别有九其一曰涵飬體認致知力行雖云互相發眀然畢竟當於甚處著力曰四者據公㸔如何先後曰據道夫㸔學者當以致知為先曰四者本不可先後又不可無先後須當以涵飬為先若不涵飬而專於致知則是徒然思索若專於涵飬而不致知却鶻突去了以某觀之四事只是三事盖體認便是致知也二曰居常持敬於静時最好及臨事則厭倦或於臨事時著力則覺紛擾不然則於正存敬時忽忽為思慮引去是三者将何以勝之曰今人将敬来别做一事所以有厭倦為思慮引去敬只是自家一箇心常醒醒便是不可将来别做一事又豈可指擎跽曲拳塊然在此而後為敬又曰今人将敬致知来做兩事持敬時只塊然獨坐更不去思量却是今日持敬眀日去思量道理也豈可如此但一面自持敬一面去思慮道理二者本不相妨三曰人之心或為人激觸或為利欲所誘初時克得下不覺突起更不可禁禦雖痛遏之卒不能勝或勝之而已形於辭色此等為害不淺曰只是飬未熟爾四曰知言云天理人欲同體而異用同行而異情竊謂凡人之生粹然天地之心不與物為對是豈與人欲同體乎曰五峯同體而異用一句説得不是天理人欲如何同得故張欽夫嶽麓書院記只使他同行而異情一句却是他合下便見得如此他盖嘗曰凡人之生粹然天地之心道義完具無適無莫不可以善惡辨不可以是非分所以有天理人欲同體而異用之語只如粹然天地之心即是至善又如何不可分辯天理便是性人欲便不是性自是他合下見得如此當時無人與他理㑹故恁錯了五曰遺書云今志於義理而心不安樂者何也此則正是剰一箇助之長雖則心操之則存舎之則亡然而持之太甚便是必有事焉而正之也亦須且恁地去如此者只是德孤德不孤必有鄰到徳盛後自無窒礙左右逢其原也此一段多所未解曰這箇也自分眀只有且恁地去此一句難曉其意只是不可説道持之太甚便放下了亦須且恁持去德孤只是單丁有這些道理所以不可靠易為外物侵奪縁是處少不是處多若是處多不是處少便不為外物侵奪到德盛後自然左右逢其原也六曰南軒答吳晦叔書云反復其道正言消長往来乃是道也程子所謂聖人未嘗復故未嘗見其心盖有往則有復以天地言之陽氣之生所謂復也固不可指此為天地心然於其復也可見天地心焉盖所以復者是也在人有失則有復復賢者之事也於其復也亦可見其心焉竊謂聖人之心天地之心也天地之心可見則聖人之心亦可見况夫復之為卦一陽復於積隂之下乃天地生物之心也聖人雖無復然是心之用因時而彰故堯之不虐舜之好生禹之拯溺湯之救民於水火文王之視民如傷是皆以天地之心為心者也故聖賢之所推尊學者之所師慕亦以其心顯白而無暗曖之患耳而謂不可見何哉曰不知程子當時説如何欽夫却恁説大抵易之言隂陽有指君子小人而言有指天理人欲而言有指動静之機而言初不可以一偏而論如天下皆君子而無小人皆天理而無人欲其善無以加有若動不可以無静静不可以無動盖造化不能以獨成或者見其相資而不可相無遂以為天下不可皆君子而無小人不能皆天理而無人欲此得其一偏之論只如有不善未嘗不知知之未嘗復行此賢者之心因復而見者若聖人則無此故其心不可見然亦有因其動而見其心者正如公所謂堯之不虐舜之好生皆是因其動而見其心者只當時欽夫之語亦未分眀七曰李延平教學者於静坐時㸔喜怒哀樂未發之氣象為如何伊川謂既思即是已發道夫謂李先生之言主於體認程先生之言專在涵養其大要實相為表裏然於此不能無疑夫所謂體認者若曰體之於心而識之猶所謂黙㑹也信如斯言則未發自是一心體認又是一心以此一心認彼一心不亦膠擾而支離乎李先生所言決不至是曰李先生所言自是他當時所見如此問二先生之説何從曰也且只得依程先生之説八問邵康節男子吟曰康節詩乃是説先天圖中數之所從起處天根月窟指復姤二卦而言九問濓溪遺事載邵伯温記康節論天地萬物之理以及六合之外而伊川稱歎東見録云人多言天地外不知天地如何説内外外面畢竟是箇甚若言著外則須似有箇規模此説如何曰六合之外荘周亦云聖人存而不論以其難説故也舊嘗見漁樵問對問天何依曰依乎地地何附曰附乎天天地何所依附曰自相依附天依形地附氣其形也有涯其氣也無涯意者當時所言不過如此某嘗欲注此語於遺事之下欽夫苦不許細思無有出是説者因問向得此書而或者以為非康節所著先生曰其間儘有好處非康節不能著也以下訓道夫請問為學之要曰公所條者便是須於日用間下工夫只恁説歸虚空不濟事温凊定省這四事亦須實行方得只指摘一二事亦豈能盡若一言可盡則聖人言語豈止一事聖人言語眀白載之書者不過孝弟忠信其實精粗本末祗是一理聖人言致知格物亦豈特一二而已如此則便是德孤致推致也格到也亦須一一推到那裏方得又曰為人君止於仁姑息也是仁須當求其所以為仁為臣止於敬擎跽曲拳也是敬亦當求其所以為敬且如公自浦城来崇安亦須徧歷崇安境界方是到崇安人皆有是良知而前此未嘗知者只為不曾推去爾愛親從兄誰無是心於此推去則温凊定省之事亦不過是愛自其所知推而至於無所不知皆由人推耳子昂曰敢問推之之説曰且如孝只是從愛上推去凡所以愛父母者無不盡其至不然則曾子問孝至末梢却問子從父之令可以為孝乎盖父母有過已所當諍諍之亦是愛之所推不成道我愛父母姑從其令問向見先生教童蜚卿於心上著工夫數日来專一静坐澄治此心曰若如此塊然都無所事却如浮屠氏矣所謂存心者或讀書以求義理或分别是非以求至當之歸只那所求之心便是已存之心何俟塊然以處而後為存耶大率為學雖是立志然書亦不可不讀須将經傳本文熟復如仲思早来所説專一靜坐如浮屠氏塊然獨處更無酬酢然後為得吾徒之學正不如此遇無事則靜坐有書則讀書以至接物處事常教此心光􅀈􅀈地便是存心豈可凡百放下祗是静坐向日蜚卿有書亦説如此某答之云見有事自那裏過却不理㑹却只要如此如何是實下工夫大凡人須是存得此心此心既存則雖不讀書亦有一箇長進處纔一放蕩則放下書冊便其中無一㸃學問氣象舊来在某處朋友及今見之多茫然無進學底意思皆恁放蕩了道夫曰心不存雖讀萬卷亦何所用曰若能讀書就中却有商量只他連這箇也無所以無進處道夫曰以此見得孟子求放心之説緊要曰如程子所説敬字亦緊要也問尋常操存處覺纔著力則愈紛擾這莫是太把做事了曰自然是恁地能不操而常存者是到甚麽地位孔子曰操則存舎則亡操則便在這裏若著力去求便蹉過了今若説操存已是剰一箇存字亦不必深著力這物事本自在但自家畧加提省則便得必有事焉而勿正心勿忘勿助長也問處鄉黨宗族見他有礙理不安處且欲與之和同則又不便欲正已以逺之又失之孤介而不合中道如何曰這般處也是難也只得無忿疾之心爾先生一日謂飛卿與道夫曰某老矣公軰欲理㑹義理好著緊用工早商量得定将来自求之未必不得然早商量得定尤好道夫辭拜還侍先生曰更硬著脊梁骨道夫問劉季文所言心病道夫常恐其志不立故心為氣所動不然則志氣既立思慮凝静豈復有此曰此亦是不讀書不窮理故心無所用遂生出這病某昨日之言不曾與説得盡道夫因言季文自昔見先生後敦篤謹畏雖居於市井人罕有見之者自言向者先生教讀語孟後来於此未有所見深以自愧故今者復来曰得他恁地也好或然窮来窮去乆之自有所見亦是一事又曰讀書須是專一不可支蔓且如讀孟子其間引援詩書處甚多今雖欲檢本文但也只須㸔此一段便依舊自㸔本来章句庶幾此心純一道夫曰此非特為讀書之方抑亦存心養性之要法也問向者以書言仁雖䝉賜書有進教之意然仁道至大而道夫所見只以存心為要恐於此當更有恢廣功夫曰也且只得恁做去乆之自見頃之復曰這工夫忙不得只常将上来思量自能有見横渠云盖欲學者存意之不忘庶游心浸熟有一日脱然如大寐之得醒耳先生問别㸔甚文字曰只㸔近思録今日問箇眀日復将来温尋仔細熟㸔曰如適間所説元亨利貞是一箇道理之大綱目須當時復将来仔細研究如濓溪通書只是反復説這一箇道理盖那裏雖千變萬化千條萬緖只是這一箇做将去問敬而不能安樂者何也曰只是未熟在如飢而食喫得多則須飽矣問道夫在門下雖數年覺得病痛尚多曰自家病痛他人如何知得盡今但見得義理稍不安便勇決改之而已乆之復曰㸔来用心專一讀書仔細則自然㑹長進病痛自然消除於今為學之道更無他法但能熟讀精思乆乆自有見處尊所聞行所知則乆乆自有至處若海蜀本作道夫録仲思言正大之體難存曰無許多事古人已自説了言語多則愈支離如公昨来所問涵養致知力行三者便是以涵養做頭致知次之力行次之不涵養則無主宰如做事須用人纔放下或困睡這事便無人做主都由别人不由自家既涵養又須致知既致知又須力行若致知而不力行與不知同亦須一時並了非謂今日涵養眀日致知後日力行也要當皆以敬為本敬却不是将来做一箇事今人多先安一箇敬字在這裏如何做得敬只是提起這心莫教放散恁地則心便自眀這裏便窮理格物見得當如此便是不當如此便不是既見了便行将去今且将大學来讀便見為學次第初無許多屈曲又曰某於大學中所以力言小學者以古人於小學中已自把捉成了故於大學之道無所不可今人既無小學之功却當以敬為本驤為學之道在諸公自去著力且如這裏有百千條路都茅塞在裏湏自去揀一條大底行如仲思昨所問數條第一條涵養致知力行這便是為學之要驤讀書要須耐煩努力翻了巢穴譬如煎藥初煎時須猛著火待滚了却退著以慢火養之讀書亦須如此頃之復謂驤曰觀令弟却自耐煩讀書驤慤實有志而又才敏者可與為學道夫曰苟慤實有志則剛健有力如此雖愚必眀矣何患不敏曰要之也是恁地但慤實有志者於今實難得驤庚戌五月初見先生於臨漳問前此從誰學㝢答自少只在鄉里從學先生曰此事本無嶢﨑只讀聖賢書精心細求當自得之今人以為此事如何秘密不與人説何用如此問㸔易曰未好㸔易自難㸔易本因卜筮而設推原隂陽消長之理吉凶悔吝之道先儒講解失聖人意處多待用心力去求是費多少時光不如且先讀論語又問讀詩曰詩固可以興然亦自難先儒之説亦多失之某枉費許多年工夫近来於詩易略得聖人之意今學者不如且看大學語孟中庸四書且就見成道理精心細求自應有得待讀此四書精透然後去讀他經却易為力㝢舉子宜宗兄云人最怕拘迫易得小成且言聖賢規模如此其大曰未好説聖賢但随人資質亦多能成就如伯夷髙潔不害為聖人之清若做不徹亦不失為謹厚之士難為徇虚名以下訓㝢問初學精神易散静坐如何曰此亦好但不專在静處做工夫動作亦當體驗聖賢教人豈專在打坐上要是随處著力如讀書如待人處事若動若静若語若黙皆當存此無事時只合靜心息念且未説做他事只自家心如何令把捉不定恣其散亂走作何有於學孟子謂學問之道無他求其放心而已矣不然精神不收拾則讀書無滋味應事多齟齬豈能求益乎問有事時應事無事時心如何曰無事時只得無事有事時也如無事時模様只要此心常在所謂動亦定靜亦定也問程子言未有致知而不在敬者曰心若走作不定何縁見得道理如理㑹這一件事未了又要去理㑹那事少間都成無理㑹須是理㑹這事了方好去理㑹那事須是主一問思慮難一如何曰徒然思慮濟得甚事某謂若見得道理分曉自無閒雜思慮人所以思慮紛擾只縁未見道理耳天下何思何慮是無閒思慮也問程子常教人靜坐如何曰亦是他見人要多慮且教人收拾此心耳初學亦當如此先生謂㝢曰文字可汲汲㸔悠悠不得急㸔方接得前面㸔了底若放慢則與前面意思不相接矣莫學某㸔文字㸔到六十一嵗方略見得道理恁地賀孫録作方畧見得通透今老矣㸔得做甚使得學某不濟事公宜及早向前問如古人詠歌舞蹈到動盪血脉流通精神處今既無之專靠義理去研究恐難得悦樂不知如何曰只是㸔得未熟耳若熟㸔待浹洽則悦矣先生因説㝢讀書㸔義理須是開豁胷次令磊落明快恁地憂愁作甚底亦不可先責效才責效便見有憂愁底意思只管如此胷中結聚一餅子不散須是胷中寛閒始得而今且放置閒事不要閒思量只專心去玩味義理便㑹心精心精便㑹熟涵飬當用敬進學則在致知無事時且存飬在這裏提撕警覺不要放肆到那講習應接便當思量義理用義理做将去無事時便著存飬收拾此心問前夜先生所答一之動靜處曾舉云譬如與兩人同事須是相救始得㝢㸔来靜却救得動不知動如何救得靜曰人須通達萬變心常湛然在這裏亦不是閉門靜坐塊然自守事物来也須去應應了依然是靜㸔事物来應接去也不難便是安而後能慮動了静静了動動靜相生循環無端如人之嘘吸若只管噓氣絶了又須吸若只管吸氣無去處便不相接了嘘之所以為吸吸之所以為嘘尺蠖之屈以求伸也龍蛇之蟄以存身也屈伸消長闔闢往来其機不曾停息大處有大闔闢小處有小闔闢大處有大消長小處有小消長此理萬古不易如目有瞬時亦豈能常瞬定又須開不能常開定又須瞬瞬了又開開了又瞬至纎至㣲無時不然又問此説相救是就義理處説動静不知就應事接物處説動静如何曰應事得力則心地静心地靜應事分外得力便是動救静靜救動其本只在湛然純一素無私心始得無私心動靜一齊當理才有一毫之私便都差了淳録云徐問前夜説動静功用相救静可救得動動如何救得静曰須是眀得這理使無不盡直到萬理明徹之後此心湛然純一便能如此如静也不是閉門獨坐塊然自守事物来都不應若事物来亦須應既應了此心便又静心既静虚明洞徹無一毫之累便從這裏應将去應得便徹便不難便是安而後能慮事物之来須去處置他這一事合當恁地做便截然斷定便是慮而後能得得是静慮是動如艮其止止是静所以止之便是動如君止於仁臣止於敬仁敬是静所以思要止於仁敬便是動固是靜救動動救靜然其本又自此心湛然純一素無私始得心無私動静便一齊當理心若自私便都差了動了又靜靜了又動動静只管相生如循環之無端若要一於動静不得如人之嘘吸若一向嘘氣必絶了須又當吸若一向吸氣必滯了須又當嘘嘘之所以為吸吸之所以為嘘尺蠖之屈以求伸也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也一屈一伸一闔一闢一消一息一徃一来其機不曾停大處有大闔闢大消息小處有小闔闢小消息此理更萬古而不息如目豈能不瞬時亦豈能常瞬又須開開了定定了又瞬瞬了又定只管恁地去消息闔闢之機至纎至㣲無物不有㝢臨漳告歸禀云先生所以指教待歸仔細講求曰那處不可用功何待歸去用功古人於患難尤見得著力處今夜在此便是用功處居甫請歸作工夫曰即此處便是工夫可學居甫問平日只是於大體處未正曰大體只是合衆小理㑹成大體今不窮理如何便理㑹大體可學居甫敬之是一種病都縁是弱仁父亦如此定之亦如此只㸔他前日信中自説臨事而懼不知孔子自説行三軍自家平居無事只管恁地懼箇甚麽賀孫説定之之意是當先生前日在朝恐要從頭拆洗決裂做事故説此曰固是若論来如今事體合從頭拆洗合有決裂做處自是定著如此只是自家不曾當這地位自是要做不得若只管懼了到合説處都莫説賀孫居父如僧家禮懴今日禮多少拜説懴甚罪過眀日又禮多少拜又説懴甚罪過日日只管説如浙中朋友只管説某今日又如此眀日又説如此若是見得不是便須掀翻做教是當若只管恁地徒説何益如宿這客店不稳便眀日須進前去好處宿若又只在這裏住又只説不好豈不可笑賀孫洪慶將歸先生召入與語出前卷子云曰議論也平正兩日来反覆為㸔所説者非不是但其中言語多似不自胷中流出原其病只是淺耳故覺見枯燥不甚條達合下原頭欠少工夫今先須養其源始得此去且存飬要這箇道理分眀常在這裏乆自有覺覺後自是此物洞然通貫圓轉乃舉孟子求放心操則存兩節及明道語録中聖賢教人千言萬語下學上達一條云自古聖賢教人也只就這理上用功所謂放心者不是走作向别處去盖一瞬目間便不見纔覺得便又在面前不是苦難收拾公且自去提撕便見得又曰如今要下工夫且須端荘存養獨觀昭曠之原不須枉費工夫鑚紙上語待存養得此中昭眀洞達自覺無許多窒礙恁時方取文字来㸔則自然有意味道理自然透徹遇事時自然迎刃而解皆無許多病痛此等語不欲對諸人説恐他不肯去㸔文字又不實了且教他㸔文字撞来撞去將来自有撞著處公既年髙又做這般工夫不得若不就此上面著緊用工恐嵗月悠悠竟無所得又曰近来學者如漳泉人物於道理上發得都淺都是作文時文采發越粲然可觀謂堯卿至之浙間士夫又却好就道理上壁角頭著工夫如某人軰子善叔恭恐也是風聲氣習如此又云今之學者有三様人才一則資質渾厚却於道理上不甚透徹一則儘理㑹得道理又生得直是薄一則資質雖厚却飄然説得道理儘多又似承當不起要箇恰好底難得此間却有一兩箇朋友理㑹得好如公資質如此何不可為只為源頭處用功較少而今須喫緊著意做取尹和靖在程門直是十分鈍底被他只就一箇敬字上做工夫終被他做得成因説及陳後之陳安卿二人為學頗得蹊徑次第又曰顔子與聖人不爭多便是聖人地位但顔子是水初平風浪初靜時聖人則是水已平風恬浪静時又曰為學之道須先存得這箇道理方可講究若居處必恭執事必敬與人必忠要如顔子且須就視聽言動上警戒到復禮處仲弓出門如見大賔使民如承大祭是無時而不主敬如今亦不須較量顔子仲弓如何㑹如此只将他那事就自家切巳處便做他底工夫然後有益又曰為學之道如人耕種一般先須辦了一片地在這裏了方可在上耕種今却就别人地上鋪排許多種作底物色這田地元不是我底又如人作商亦須先安排許多財本方可運動若財本不贍則運動未得到論道處如説水只説是冷不能以不熱字説得如説湯只説是熱不能以不冷字説得又如飲食喫著酸底便知是酸底喫著鹹底便知是鹹底始得語多不能盡記姑述其大要者如此訓洪慶恪録云石子餘将告歸先生将子餘問目出曰兩日反覆與公㸔見得公所説非是不是其病痛處只是淺耳淺故覺得枯燥不恁條達只源頭處元不曾用工夫来今須是整肅主一存養得這箇道理分眀常在這裏持之已乆自然有得㸔文字自然通徹遇事自然圎轉不見費力乃舉孟子學問之道無他求其放心而已矣操則存舎則亡出入無時莫知其鄉二節及明道語録聖賢千言萬語只是欲人将已放之心約之使反復入身来下學而上達云自古聖賢教人只是就這箇道理上用功放心不是走作别處去一劄眼間即便不見才覺便又在面前不是難收拾公自去提撕便見得今要下工夫且獨觀昭曠之原不須枉用工夫鑽紙上語存得此中昭明條暢自覺無許多窒碍方取文字来㸔便見有味道理通透遇事則迎刃而解無許多病痛然此等語不欲對諸公説且教他自用工夫撞来撞去自然撞著公既年髙若不如此下工夫恐悠悠嵗月竟無所得又云某少時為學十六嵗便好理學十七嵗便有如今學者見識後得謝顯道論語甚喜乃熟讀先将朱筆抹出語意好處又熟讀得趣覺見朱抹處太煩再用墨抹出又熟讀得趣别用青筆抹出又熟讀得其要領乃用黄筆抹出至此自見所得處甚約只是一兩句上却日夜就此一兩句上用意玩味胷中自是洒落先生謂徐容父曰為學須是裂破藩籬痛底做去所謂一棒一條痕一摑一掌血使之歴歴落落分眀開去莫要含糊道夫訓容問學問之端緖曰且讀書依本分做去以下訓節問何以騐得性中有仁義禮智信先生怒曰觀公状貌不離乎嬰孩髙談每及於性命與衆人曰他只管来這裏摸這性性若是去捕捉他則愈逺理本實有條理五常之體不可得而測度其用則為五教孝於親忠於君又曰必有本如惻隱之類知其自仁中發事得其宜知其自義中出恭敬知其自禮中出是是非非知其自智中出信者實有此四者眼前無非性且於分眀處作工夫又曰體不可得而見且於用上著工夫則體在其中次夜曰吉甫昨晩問要見性中有仁義禮智無故不解發惻隱之類出来有仁義禮智故有惻隱之類問事有合理而有意為之如何曰事雖義而心則私如路好人行之亦是路賊行之亦是路合如此者是天理起計較便不是只是揮扇底只是不得背著他節問曰只順他曰只是循理問應事心便去了曰心在此應事不可謂之出在外問欲求大本以總括天下萬事曰江西便有這箇議論須是窮得理多然後有貫通處今理㑹得一分便得一分受用理㑹得二分便得二分受用若一以貫之儘未在陸子靜要盡掃去從簡易某嘗説且如做飯也須趁柴理㑹米無道理合下便要簡易以某觀之做箇聖賢千難萬難如釋氏則今夜痛説一頓有利根者當下便悟只是箇無星之秤耳將與人㸔不得公要討箇無聲無臭底道雖視之不見聽之不聞然却開眼便㸔見開口便説著雖無極而太極然只是眼前道理若有箇髙妙底道理而聖人隱之便是聖人大無状不忠不信聖人首先犯著問節嘗見張無垢解雍徹一章言夫子氣象雍容節又見眀道先生為人亦和節自後處事亦習寛緩然却至於廢事曰曾子剛毅立得牆壁在而後可傳之子思孟子伊川横渠甚嚴游楊之門倒塌了若天資大段髙則學眀道若不及眀道則且學伊川横渠問篤行允蹈皆是作為畢竟道自道人自人不能為一曰為一則聖人矣不勉而中不思而得從容中道又問顔子不逺復擇乎中庸顔子亦未到此地曰固是只為後人把做易了後遂流為異端問事事當理則必不能容能容則必不能事事當理曰容只是寛平不狭如這箇人當殺則殺之是理合當殺非是自家不容他不曾説教胡亂思説謹思問節昔以觀書為致知之方今又見得是養心之法曰較寛不急迫又曰一舉兩得這邊又存得心這邊理又到節復問心在文字則非僻之心自入不得先生應曰是問觀書或曉其意而不曉字義如從容字或曰横出為從寛容為容如何曰這箇見不得莫要管他横出包容只理㑹言意節初到一二日問君子義以為質一章曰不思量後只管去問人有甚了期向来某人自欽夫處来録得一冊将来㸔問他時他説道那時陳君舉将伊川易傳在㸔檢兩版又問一段檢兩版又問一段欽夫他又率畧只管為他説據某㸔来自當不答大抵問人必説道古人之説如此某㸔来是如此未知是與不是不然便説道據某㸔来不如此古人又如此説是如何不去思量只管問人恰如到人家見著椅子去問他道爾安頓這椅子是如何問精神收歛便昏是如何曰也不妨又曰昏畢竟是慢如臨君父淵崖必不如此又曰若倦且瞌睡些時無害問非是讀書過當倦後如此是纔收歛来稍乆便困曰便是精神短後如此朱子語類卷一百十五
