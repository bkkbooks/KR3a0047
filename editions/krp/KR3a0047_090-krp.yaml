body:
  text: 朱子語類卷第九十禮七祭如今士大夫家都要理㑹古禮今天下有二件極大底事恁地循襲其一是天地同祭於南郊其一是太祖不特立廟而與諸祖同一廟自東漢以來如此又錄云千五六百年無人整理子謂為芻靈也善謂為俑者不仁雖是前代已用物事到不是處也須改用教是始得賀孫以下天地之祭古時天地定是不合祭日月山川百神亦無合共一時祭享之禮當時禮數也簡儀從也省必是天子躬親行事豈有祭天便將下許多百神一齊排作一堆都祭只看郊䑓階級兩邊是踏過處中間自上排下都是神位更不通看賀孫問先朝南北郊之辨曰如禮說郊特牲而社稷太牢書謂用牲於郊牛二及社于新邑此其明騐也故夲朝後來亦甞分南北郊至徽宗時又不知何故却合為一又曰但周禮亦只是説祀昊天上帝不説祀后土故先儒説祭社便是又問周禮大司樂冬至奏樂於圜丘以禮天夏至奏樂于方丘以禮地曰周禮中止有此説更有禮大神享大鬼祭大祇之説餘皆無明文廣天地夲朝只是郊時合祭神宗甞南郊祭天矣未及次年祭地而上仙元祐間甞議分祭東坡議只合祭引詩郊祀天地為證劉元城逐件駁之秋冬祈榖之類亦是二祭而合言之東坡只是謂祖宗幾年合祭一旦分之恐致禍其説甚無道理元城謂子由在政府見其論無道理遂且罷議後張耒輩以衆説易當時文字徽宗時分祭祀后土皇地示漢時謂之媪神漢武明皇以南郊祭天為未足遂祭于泰山以北郊祭地為未足遂祭于汾隂立一后土廟真宗亦皆即泰山汾隂而祭焉先生曰分祭是揚先生因泛説祭祀以社祭為祀地諸儒云立大社王社諸侯國社侯社五峯有此説謂此即祭地之禮道夫録云五峯言無北郊只社便是祭地却説得好周禮他處不説只宗伯以黄琮禮地注謂夏至地神在崑崙典瑞兩圭有邸以祀地注謂祀於北郊大司樂夏日至於澤中方丘奏之八變則地示可得而禮矣他書亦無所考書云乃社于新邑牛一羊一豕一然禮云諸侯社稷皆少牢此處或不可曉賀孫如今郊禮合祭天地周禮有圜丘方澤之説後來人却只說地便是后土見於書傳言郊社多矣某看來不要如此也自還有方澤之祭但周禮其他處又都不説亦未可曉木之如今祀天地山川神塑貎像以祭極無義理木之堯卿問社主平時藏在何處曰向來沙隨説以所宜木刻而為主某甞辨之後來覺得却是但以所宜木為主如今世俗神樹模様非是將木來截作主也以木名社如櫟社枌榆社之類又問社稷神曰説得不同或云稷是山林原隰之神或云是榖神看來榖神較是社是土神又問社何以有神曰能生物便是神也又曰周禮亡國之神却用刑人為尸一部周禮却是看得天理爛熟也䕫孫以下社程沙隨云古者以木為主今以石為主非古也方子五祀行是道路之神伊川云是宇廊未必然門是門神戸是戸神與中霤竈凡五古聖人為之祭祀亦必有其神如孔子説祭如在祭神如神在是有這祭便有這神不是聖人若有若亡見得一半便自恁地但不如後世門神便畫一箇神像如此賀孫以下五祀叔器問五祀祭行之義曰行堂塗也古人無廊屋只于堂階下取兩條路五祀雖分四時祭然出則獨祭行及出門又有一祭作兩小山於門前烹狗置之山上祭畢却就山邊喫却推車從兩山間過盖取跋履山川之義舜功問祭五祀想也只是當如此致敬未必有此神曰神也者妙萬物而言者也盈天地之間皆神若説五祀無神處是甚麽道理叔器問天子祭天地諸侯祭山川大夫祭五祀士庶人祭其先此是分當如此否曰也是氣與他相關如天子則是天地之主便祭得那天地若是其他人與他本不相關後祭箇甚麽如諸侯祭山川也只祭得境内底如楚昭王病後卜云河為祟諸大夫欲祭河昭王自言楚之分地不及於河河非所以為祟孔子所以美之云昭王之不失國也宜哉這便見得境外山川與我不相關自不當祭又問如殺孝婦天為之旱如何曰這自是他一人足以感動天地若祭祀則分與他不相關如何祭得又問人而今去燒香拜天之類恐也不是曰天只在我更禱箇甚麽一身之中凡所思慮運動無非是天一身在天裏行如魚在水裏滿肚裏都是水某説人家還醮無意思一作最可笑豈有斟一盃酒盛兩箇餅要享上帝且説有此理無此理某在南康祈雨每日去天慶觀燒香某説且謾去一作且慢今若有箇人不經州縣便去天子那裏下狀時你嫌他不嫌他你須捉來打不合越訴而今祈雨却如何不祭境内山川如何便去告上帝義剛問竈可祭否曰人家飲食所繫亦可祭問竈尸曰想是以庖人為之問祭竈之儀曰亦略如祭宗廟儀淳問月令竈在廟門之外如何曰五祀皆在廟中竈在廟門之東凡祭五祀皆設席於奥而設主奠俎於其所祭之處已乃設饌迎尸於奥銖因説五祀伊川疑不祭井古人恐是同井曰然可學古者人有逺行者就路間祭所謂行神者用牲為兩㫁車過其中祭了却將喫謂之餞禮用兵時用犯軍法當死㡳人斬于路却兵過其中揚祖道之祭是作一土堆置犬羊於其上祭畢而以車碾從上過象行者無險阻之患也如周禮犯軷是也此是門外事門内又有行祭乃祀中之一也燾祈雨之類亦是以誠感其氣如祈神佛之類亦是其所居山川之氣可感今之神佛所居皆是山川之勝而靈者雨亦近山者易至以多隂也揚古人神位皆西坐東向故獻官皆西向拜而今皆南向了釋奠時獻官猶西向拜不知是如何以下祀先聖室中西南隅乃主位室中西牖東戸若宣聖廟室則先聖當東向先師南向如周人禘嚳郊稷嚳東向稷南向今朝廷宗廟之禮情文都自相悖不曉得古者主位東向配位南向故拜即望西今旣一列皆南向到拜時亦却望西拜都自相背古者用籩豆簠簋等陳於地當時只席地而坐故如此飲食為便今塑像髙髙在上而祭饌反陳于地情文全不相稱曩者某人來問白鹿塑像某答以州縣學是天子所立旣元用像不可更書院自不宜如此不如不塑像某處有列子廟却塑列子膝坐于地這必有古像行古禮須是參用今來日用常禮庻或饗之如太祖祭用簠簋籩豆之外又設牙盤食用椀楪之類陳于牀這也有意思到神宗時廢了元祐初復用後來變元祐之政故此亦遂廢賀孫夫子像設置於椅上已不是又復置在臺座上到春秋釋奠却乃陳簠簋籩豆於地是甚義理某幾畨説要塑宣聖坐于地上如設席模様祭時却自席地此有甚不可處每説與人都道差異不知如何某記在南康欲于學中整頓宣聖不能得後説與交代云宣聖夲不當設像春秋祭時只設主祭可也今不可行只得設像坐于地方始是禮㝢先聖冕服之制殊不同詹卿云衮冕畫龍於胷然則鷩冕之雉毳冕之宗彛皆畫于胷銖釋奠據開元禮只是臨時設位後來方有塑像顔孟配饗始亦分位于先聖左右後來方並坐于先聖之東西嚮當時所降指揮今亦無處尋討必大孔子居中顔孟當列東坐西向七十二人先是排東廡三十六人了却方自西頭排起當初如此自升曾子於殿上下面䟎一位次序都亂了此言漳州未知他處如何又云某經歴諸處州縣學都無一箇合禮序賀孫髙宗御製七十二子賛曾見他處所附封爵姓名多用唐封官號夲朝已經兩畨加封如何恁地賀孫謁宣聖焚香不是古禮拜進將捻香不當叩首只直上捻香了却出笏叩首而降拜賀孫釋奠散齋因云陳膚仲以書問釋奠之儀今學中儀乃禮院所班多參差不可用唐開元禮却好開寳禮只是全録開元禮易去帝號耳若政和五禮則甚錯今釋奠有伯魚而無子思又十哲亦皆差互仲弓反在上且如紹興中作七十二子賛只據唐爵號不知後來已經加封矣近甞申明之可學因論程沙隨辨五禮新儀下丁釋奠之説而曰政和中編此書時多非其人所以差誤如此續已有指揮改正唐開元禮旣失煩縟新儀又多脫略如親祠一項開元禮中自先説將升車執某物立車右到某處方説自車而降今新儀只載降車一節却無其先升車事前一段旣如此載後凡親祠處段段皆然今行禮時又俱無北面升降之儀必大孟子配享乃荆公請之配享只當論傳道合以顔子曾子子思孟子配甞欲於雲谷左立先聖四賢配右立二程諸先生後不曾及在南康時甞要入文字從祀伯魚以漸去任不欲入文字理㑹事但封與劉淳叟以其為學官可以言之揚在漳州日陳請釋奠禮儀到如今只恁地白休了子約為籍田令多少用意主張諸禮官都没理㑹了遂休坐客云想是從來不曾理㑹得故怕理㑹曰東坡曾云今為禮官者皆是自牛背上拖將來今看來是如此因問張舅忠甫家須更别有禮書令還鄉日詢求之致道云今以時文取官下梢這般所在全理㑹不得曰向時尚有開寳通禮科令其熟讀此書試時挑問後來又做出通禮如注釋一般如人要治此必須連此都記得如問云籩起於何時逐一説了後又反復論議一段如此亦自好漳州煞有文字皆不得冩如今朝廷頒行許多禮書如五禮新儀未是若是不識禮便做不識禮且只依夲冩在也得又去杜撰将古人處改了是日因看薛直老行状中有述其初為教官陳請改上丁釋奠事盖其見當時用下丁故請改之舊看古禮中有一處注云春用二月上丁秋用八月下丁今忘記出處向亦欲檢問象先及漳州陳請釋奠儀欲乞委象先又思量渠不是要理㑹這般事人故已之賀孫新書院告成明日欲祀先聖先師古有釋菜之禮約而可行遂檢五禮新儀令具其要者以呈先生終日董役夜歸即與諸生斟酌禮儀鷄鳴起平明徃書院以廳事未備就講堂禮宣聖像居中兖國公顔氏郕侯曾氏沂水侯孔氏鄒國公孟氏西向配北上並紙牌子濓溪周先生東一明道程先生西一伊川程先生東二康節邵先生西二司馬温國文正公東三横渠張先生西三延平李先生東四從祀亦紙牌子並設於地祭儀别録祝文别録先生為獻官命賀孫為賛直卿居甫分奠叔蒙賛敬之掌儀堂狹地濶頗有失儀但獻官極其誠意如或享之鄰曲長幼並來陪禮畢先生揖賔坐賔再起請先生就中位開講先生以坐中多年老不敢居中位再辭不獲諸生復請就講位説為學之要午飯後集衆賔飲至暮散賀孫李丈問太廟堂室之制曰古制是不可曉禮説士堂後一架為室盖甚窄架即梁也天子便待加得五七架亦窄狹不知周家三十以上神主位次相逼如何行禮室在堂後一間從堂内左角為戸而入西壁如今之墻上為龕太祖居之東向旁兩壁有牖羣昭列於北牖下而南向羣穆列於南牖下而北向堂又不為神位而為人所行禮之地天子設黼扆於中受諸侯之朝淳義剛録同以下天子宗廟之祭祖有功而宗有徳是為百世不遷之廟商六百年只三宗皆以有功徳當百世祀故其廟稱宗至後世始不復問其功徳之有無一例以宗稱之必大古人七廟恐是祖宗功徳者不遷胡氏謂如此則是子孫得以去取其祖宗然其論續諡法又謂謚乃天下之公義非子孫得以私之如此則廟亦然揚問漢諸儒所議禮如何曰劉歆説得較是他謂宗不在七廟中者謂恐有功徳者多則占了那七廟數也問文定七廟之説如何曰便是文定好如此硬説如何恁地説得且如商之三宗若不是别立廟後只是親廟時何不胡亂將三箇來立如何恰限取祖甲太戊髙宗為之祖有功宗有徳天下後世自有公論不以揀擇為嫌所謂名之曰幽厲雖孝子慈孫百世不能改那箇好㡳自是合當宗祀如何毁得如今若道三宗只是親廟則是少一箇親廟了便是書難理㑹且如成王崩後十餘日此自是成服了然顧命却説麻冕黼裳彤裳之属如此便是脱了那麻衣更來著色衣文定便説道是攝行踐阼之禮某道政事便可攝而行阼豈可攝而踐如今恁地硬説且如元年他便硬道不要年號而今有年號人尚去揩改契書之属若更無後當如何又問志壹則動氣是先天而天弗違氣壹則動志是後天而奉天時其意如何曰他是説春秋成後致麟先儒固亦有此説然亦安知是作起獲麟與文成致麟但某意恐不恁地這似乎不祥若是一箇麟出後被人打殺了也揜采因言馬子荘道袁州曾有一麟胡叔器云但是古老相傳舊日開江有一白駒先生曰馬説是二十年間事若白駒等説是起於禹如顔師古注啓母石之説政如此近時廣徳軍張大王分明是倣這一説義剛廟商七世周亦七世前漢初立三宗後王莽并後漢末又多加了宗字又一齊亂了唐十二廟本朝則韓持國本退之禘祫説祀僖祖又欲止起于太祖其議紛紛合起僖祖典禮都只將人情處了無一人㫁之以公自合只自僖祖起後世徳薄者祧之周廟文王在豐武王又在一處自合只同一處方是不知如何周廟后稷文武髙曾祖考七廟揚今之廟制出於漢明帝歴代相承不改神宗甞欲更張今見於陸農師集中史却不載可學問諸侯廟制太祖居北而南向昭廟二在其東南穆廟二在其西南皆南北相重不知當時每廟一處或共一堂各為位也曰古廟則自太祖以下各是一室陸農師禮象圖可考西漢時髙帝廟文帝顧成之廟猶各在一處但無法度不同一處至明帝謙貶不敢自當立廟祔于光武廟其後遂以為例至唐太廟及羣臣家廟悉如今制以西為上也至禰處謂之東廟只作一列今太廟之制亦然徳明鄧子禮問廟主自西而列何所據曰此也不是古禮如古時一代只奉之於一廟如后稷為始封之廟文王自有文王之廟武王自有武王之廟不曾混雜共一廟賀孫諸侯有四時之祫畢竟是祭有不及處方如此如春秋有事於太廟太廟便是羣祧之主皆在其中義剛或問逺廟為祧如何曰天子七廟如周文武之廟不祧文為穆則凡後之属乎穆者皆歸于文之廟武為昭則凡後之属乎昭者皆歸乎武之廟也時舉昭穆昭常為昭穆常為穆中間始祖太廟門向南兩邊分昭穆周家則自王季以上之主皆祧于后稷始祖廟之夾室自成王昭王以下則隨昭穆逓遷于昭穆之首廟至首廟而止如周則文王為穆之首廟武王為昭之首廟凡新崩者祔廟則看昭穆但昭則從昭穆則從穆不交互兩邊也又云諸廟皆有夾室闕堯卿問髙為穆之義曰新死之主新祔便在昭這一排且如諸侯五廟一是太祖便居中二昭二穆相對今新死者祔則髙過穆這一排對空坐禰在昭一排亦對空坐以某意推之當是如此但禮經難考今若看得一兩般書猶自得若看上三四般去便無討頭處如孟子當時自無可尋處了今看孟子考禮亦踈理㑹古制亦不甚得他只是大槩説且如説井田後舉詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也似這般證騐也不大故切安卿問孟子何故不甚與古合曰他只是據自家發放做相那箇時勢做又問鄭康成注王制以為諸侯封國與周禮小大不同盖王制是説夏商以前之制如何曰某便是不甚信此説恐不解有此理且如孟子説夏后氏五十而貢殷人七十而助周人百畆而徹某自不敢十分信了且如一家有五十畆田忽然説我要添與你作七十畆則要多少心力盖人家各為定業東阡西陌已自定了這五十畆中有溝洫有廬舍而今忽然變更又著分疆界制溝洫毁廬舍東邉住底移過西邉這裏住底遷過那裏一家添得二十畆田却勞動多少語至此大聲云恁地天下騷然不寕把幾多心力去做據某看來自古皆是百畆不解得恁地要而今解時只得就他下面説放那裏淳録云向解孟子且隨文如此解若理㑹著實行時大不如此義剛問井田今使一家得百畆而民生生無已後來者當如何給之先生笑曰今且據見在人數給如封建夏商以前只是百里到周方是諸公方五百里諸侯方四百里諸伯方三百里諸子方二百里諸男方百里恁地却取四國地來方添成一國那四國又要恁地却何處討那地來安卿曰或言夏商只有三千里周時乃是七千里曰便是亂説且當時在在是國自王畿至要荒皆然今若要封得較大似夏商時便著每國皆添地却於何處頓放此須是武王有縮地脉法始得恁地時便煞改徙著許多國元在這裏底今又著徙去那裏宗廟社稷皆著改易如此天下騷然他人各有定分土地便肯舍著從别處去討君舉説封疆方五百里只是周圍五百里徑只百二十五里四百里者徑百里三百里者徑七十五里一百里者只五十里如此看時尚似相合若是諸男之地方百里時以此法推之則止二十五里如此却只是一箇耆長某便道他説只是謾人他向來進此書甚為得意淳録云自竒其説與王制等合某甞作一篇文以闢之逐項破其説且當時説侯六百九淳録云夲文方千里之地以封侯則六侯以封伯則七伯以封子則二十五子以封男則百男其地已有定數此説如何可通如此則所封大國自少若是只皆百里而止便是一千里地只將三十同來封了那七十同却空放那裏却綿亘數百里皆無國又問三分去一之説如何曰便是不是他們只是不曉事解不行後便胡説且如川中有六七百里中置數州者那裏地平坦寸寸是地如這一路某甞登雲谷望之宻宻皆山其中間有些子罅隙中黄白底方是田恁地却如何去淳録云盖百分之二又如何三分去一註䟽多是如此有時到那解不行處便説從别處去義剛問先生向時説齊魯始封時皆七百里然孟子却説只是百里曰便是不如此今只據齊地是東至於海西至於河南至於穆陵北至于無棣魯地是跨許宋之境是有五七百里濶時勢也是著恁地且禹㑹諸侯于塗山執玉帛者萬國到周只有千八百國便是相并吞後那國都大了你却要只將百里地封他教他入那大國罅中去武王不奈何只得就封他當時也自無那閒地縁是滅了許多國如孟子説驅飛亷於海隅而戮之滅國者五十便是許多空地來封許多功臣同姓之属孟子謂一不朝則貶其爵再不朝則削其地如齊先是爽鳩氏居之後又是某氏居之如書所謂某氏徙于齊這便見得當時諸侯有過便削其地方始得那地來封後來㡳若不恁地時那太公周公也自無安頓處你若不恁地後要去取斂那地來封我功臣與同姓時他便敢起兵如漢晁錯時様子且如孟子當時也自理㑹那古制不甚得如曰諸侯之禮吾未之學然而軻也甞聞其略也恁地便是不曾知得子細他當時説諸國許多事也只是大槩説如此雖説湯以七十里文王以百里然及滕文公恁地時又却只説有王者起必來取法是為王者師也元不曾説道便可王以齊王猶反手也便是也要那國大底方做得小底也奈何不得而今且説道將百里地與你教你行王政看你做從何處起便是某道古時聖賢易做後世聖賢難做古時只是順那自然做將去而今大故費手淳録此下云漢髙祖與項羽紛争五年之間可謂甚窘欲殺他不能欲住又不得費多少心力想不似當初做亭長時較快活良久問諸生曰當劉項恁地紛争時設使堯舜湯武居其時當如何是戰好是不戰好安卿曰湯武是仁義素孚於民人自然歸服不待戰曰他而今不待你素孚秦當時收盡天下尺地一民皆為已有你仁義如何地得素孚淳録云何處計地來行仁政如何得素孚于民如髙祖之徒皆是起于田里若使湯武居之當如何地勝得秦安卿曰以至仁伐至不仁以至義伐至不義自是勝曰固是如此如秦可謂不仁不義當時所謂更遣長者扶義而西也是倣這意思做但當時諸侯入關皆被那章邯連併敗了及髙祖入去縁路教無得鹵掠如此之属也是恁地做了然他入去後又尚要設許多詭計誘那秦將之屬後方入得設使湯武居之還是恁地做不恁地做今且做秦是不仁不義可以勝那項籍出來紛争許多時却如何對他還是與他厮殺若不與厮殺便被他殺了若與他厮殺時還是不殺人麽當此時是天理是人欲恁地看來是未有箇道理湯武在那時也須著百端去思量與他區處但而今看來也未有箇道理胡叔器問太公呂后當時若被項羽殺了如何曰不特此一事當時皆是如此便是大費調護徐顧林擇之云項羽恁地麄暴當時捉得太公如何不殺了擇之曰羽也有斟酌他怕殺了反重其怨曰便是項羽也有南量髙祖也知他必不殺故放得心下項羽也是圖量了髙祖故不敢殺若是髙祖軟弱當時若敵他不過時他從頭殺來是定義剛曰孔明誘奪劉璋地也似不義或者因言渠雜學伯道所以後將申商之説教劉禪曰便是適問説後世聖賢難做動著便是恁地粘手惹脚次日言某夜來思量那髙祖其初入關後恁地鎮撫那人民及到㶚上又不入秦府庫取財貨美女之属皆是後來被項羽王他巴蜀漢中他也入去這箇也是未幾却出來定三秦已自侵占别人田地了但是那三降王不足以王秦却也是定若是奪得那闗中便也好住便且關了闗門守得那裏面底也得又不肯休又去尋得弑義帝説話出來這箇尋得也是若湯武也不肯放過但既尋得這箇説話便只依傍這箇做便是却又率五諸侯合得五十六萬兵走去彭城日日去喫酒取那美人更不理㑹却被項羽來殺得狼當走湯武便不肯恁地自此後名義壊盡了從此去便只是胡做胡殺了文定謂惜乎假之未久而遽歸者此也這若把與湯武做時須做得好定是不肯恁地義剛問髙祖因閉關後引得項羽怒若不閉時却如何先生笑曰只是見他頭勢來得惡後且權時關閉著看他如何地義剛淳録少異作數條禮宗廟只是一君一嫡后自錢惟演佞仁祖遂以一嫡同再立后更以仁祖所生后配後遂以為例而禮亂矣臣民禮亦只是一嫡配再正娶者亦尚可婢而生子者婢之子主祭只祭嫡正其所生當别祭揚古者各有始祖廟以藏祧主如適士二廟各有門堂寢各三間是十八間屋今士人如何要行得賀孫以下主古命士得立家廟家廟之制内立寢廟中立正廟外立門四面墻圍之非命士止祭於堂上只祭考妣伊川謂無貴賤皆祭自髙祖而下但祭有豐殺䟽數不同廟向南坐皆東嚮自天子以至于士皆然伊川於此不審乃云廟皆東向祖先位面東自廳側直東入其所反轉面西入廟中其制非是古人所以廟面東向坐者盖戸在東牖在西坐於一邉乃是奧處也揚唐大臣長安立廟後世子孫必其官至大臣乃得祭其廟此其法不善也只假一不理選限官與其子孫令祭其廟為是揚唐大臣皆立廟於京師夲朝惟文潞公法唐杜佑制立一廟在西京雖如韓司馬家亦不曾立廟杜佑廟祖宗時尚在長安揚問家廟在東莫是親親之意否曰此是人子不死其親之意問大成殿又却在學之西莫是尊右之義否曰未知初意如何夲朝因仍舊制反更率略較之唐制尤没理㑹唐制尤有近古處猶有條理可觀且如古者王畿之内髣髴如井田規畫中間一圏便是宫殿前圏中左宗廟右社稷其他百官府以次列居是為前朝後中圏為市不似如今市中家家自各賣買乃是官中為設一去處令凡民之賣買者就其處若今場務然無㳺民雜處其間更東西六圏以處六鄉六遂之民耕作則出就田中之廬農功畢則入此室處唐制頗放此最有條理城中幾坊每坊各有牆圍如子城然一坊共一門出入六街凡城門坊角有武候舖衞士分守日暮門閉五更二㸃鼓自内發諸街鼓振城坊市門皆啟姦盗自無所容盖坊内皆常居之民外面人來皆可知如殺宰相武元衡於靖安里門外分明載元衡入朝出靖安里賊乗暗害之亦可見坊門不可胡亂入只在大官街上被殺了如那時措置得好官街邊都無閒雜賣買汙穢雜揉故杜詩云我居巷南子巷北可恨鄰里間十日不一見顔色亦見出一坊入一坊非特特徃來不可賀孫問先生家廟只在廳事之側曰便是力不能辦古之家廟甚濶所謂寢不踰廟是也祭時移神主於正堂其位如何曰只是排列以西為上祫祭考妣之位如何曰太祖東向則昭穆之南向北向者以西方為上則昭之位次髙祖西而妣東祖西而妣東是祖母與孫並列於體為順若余正父之説則欲髙祖東而妣西祖東而妣西則是祖與孫婦並列于體為不順彼盖據漢儀中有髙祖南向吕后少西更不取證於經文而獨取傳注中之一二執以為是㫁不可回耳人傑先生云欲立一家廟小五架屋以後架作一長龕堂以板隔截作四龕堂堂置位牌堂外用簾子小小祭祀時亦可只就其處大祭祀則請出或堂或廳上皆可揚家廟要就人住居神依人不可離外做廟又在外時婦女遇雨時難出入揚問祧主當遷何地曰便是這事難處漢唐人多瘞于兩階之間然今人家廟亦無所謂兩階者兩階之間以其人跡不踏取其潔耳問各以昭穆瘞于祖宗之墳如何曰唐人亦有瘞于寝園者但今人墳墓又有太逺者恐難用耳頃在朝因僖祖之祧與諸公争辨幾至喧忿後來因是去國不然亦必為人論逐當時全不曽商議只見劉智夫崇之時為太常卿來言欲祧僖祖某問欲祧之何所劉曰正未有以處因此方詔集議某論卒不合後來竟為别廟于太廟之側奉僖祖宣祖祧主藏之於别廟不知祫禘時如何這都行不得若禘祫太祖之廟不成教祖宗來就子孫之廟若移太祖之主合禘於别廟則太祖復不得正東向之位都行不得治平間曾如此祧了及至熈寕章衡上疏論僖祖不當祧想其論是主王介甫然其論甚正介甫甞上䟽云皇家僖祖正如商周之稷契皆為始祖百世不遷之廟今替其祀而使下祔於子孫之夾室非所謂事亡如事存事死如事生而順祖宗之孝心也此論甚正後來復僖祖之廟某當時之論正用介甫之意某謂僖祖當為始祖百世不遷之廟如周之后稷而太祖太宗則比周之文武有何不可而趙丞相一向不從當時如樓大防陳君舉謝深甫力主其説而彭子夀孫從之之徒又從而和之或云太祖取天下何與僖祖事某應之曰諸公身自取富貴致位通顯然則何用封贈父祖邪又許及之上䟽云太祖皇帝開基而不得正東向之位雖三尺童子亦為之不平其鄙陋如此後來集議某度議必不合遂不曾與議却上一䟽論其事趙丞相又執之不下某數問之亦不從後來歸家亦數冩書去問之何故不降出亦不從後已南遷而事定矣僖祖翼祖順祖宣祖中間甞祧去翼祖所以不諱敬字得幾時及蔡京建立九廟遂復取還翼祖以足九廟之數後來渡江翼祖順祖廟已祧去若論廟數則自祧僖祖之外由宣祖以至孝廟方成九數乃併宣祖而祧之某甞聞某人云快便難逢不如祧了且得一件事了其不恭敬如此某為之駭然以下祧問祧禮曰天子諸侯有太廟夾室則祧主藏于其中今士人家無此祧主無可置處禮注説藏于兩階間今不得已只埋於墓所問有祭告否曰横渠説三年後祫祭於太廟因其祭畢還主之時遂奉祧主歸于夾室遷主新主皆歸于廟鄭氏周禮注大宗伯享先王處亦有此意今略放而行之問考妣入廟有先後則祧以何時曰妣先未得入廟考入廟則祧宗伯注曰魯禮三年喪畢而祫于太祖明年春禘于群廟自爾以後率五年而再殷祭一祫一禘王制注亦然義剛胡兄問祧主置何處曰古者始祖之廟有夾室凡祧主皆藏之於夾室自天子至于士庻皆然今士庻之家不敢僣立始祖之廟故祧主無安頓處只得如伊川説埋於兩階之間而已某家廟中亦如此兩階之間人跡不到取其潔爾今人家廟亦安有所謂兩階但擇浄處埋之可也思之不若埋于始祖墓邊縁無箇始祖廟所以難處只得如此僴問祧主諸侯於祫祭時祧今士人家無祫祭只於四時祭祧仍用祝詞告之可否曰黙地祧又不是也古者適士二廟廟是箇大臺特牲饋食禮有宗祝等許多官属祭祀時禮數大今士人家無廟亦無許大禮數淳春秋時宗法未亡如滕文公云吾宗國魯先君盖滕文之昭也文王之子武王旣為天子以次則周公為長故滕謂魯為宗國又如左氏傳載女喪而宗室于人何有如三桓之後公父文伯公鉏公為之類乃季氏之小宗南宫适之類孟氏之小宗今宗室中多帶皇兄皇叔皇伯等冠于官職之上非古者不得以戚戚君之意夲朝王定國甞言之欲令稱某王孫或曾孫或幾世孫有如越王𣲖下則當云越王幾世孫如此則族属易識且無戚君之嫌亦自好後來定國得罪反以此論為離間骨肉今宗室散無統紀名諱重疊字號都窮了更無安排處楊子直甞欲用季宗趙丞相以為季是叔季意不好遂不用賀孫以下宗法宗子只得立適雖庻長立不得若無適子則亦立庻子所謂世子之同母弟世子是適若世子死則立世子之親弟亦是次適也是庻子不得立也夲朝哲廟上仙哲廟弟有申王次端王次簡王乃哲廟親弟當時章厚欲立簡王是時向后猶在乃曰老身無子諸王皆云云當以次立申王目眇不足以視天下乃立端王是為徽宗章厚殊不知禮意同母弟便須皆是適子方可言既皆庻子安得不依次第今臣庻家要立宗也難只是宗室與襲封孔氏柴氏當立宗今孔氏柴氏襲封只是兄死弟繼只如而今門長一般大不是又曰今要立宗亦只在人有甚難處只是而今時節更做事不得奈何奈何如伊川當時要勿封孔氏要將朝廷所賜田五百頃一處給作一奉聖卿而吕原明便以為不可不知如何漢世諸王無子國除不是都無子只是無適子便除其國不知是如何恐只是漢世不奈諸侯王何幸因他如此便除了國賀孫余正甫前日堅説一國一宗某云一家有大宗有小宗如何一國却一人渠髙聲抗爭某檢本與之㸔方得口合賀孫大宗法既立不得亦當立小宗法祭自髙祖以下親盡則請出髙祖就伯叔位服未盡者祭之㛐則别處後其子私祭之今世禮全亂了揚祭祀須是用宗子法方不亂不然前面必有不可處置者揚呂與叔謂合族當立一空堂逐宗逐畨祭亦杜撰也揚父在主祭子出仕宦不得祭父没宗子主祭庻子出仕宦祭時其禮亦合減殺不得同宗子揚宗子法雖宗子庻子孫死亦許其子孫别立廟揚古者宗法有南宫北宫便是不分財也須異爨今若同爨固好只是少間人多了又却不齊整又不如異爨問陸子静家有百餘人喫飯曰近得他書已自别架屋便也是許多人無頓著處又曰見宋子蜚說廣西賀州有一人家共一大門門裏有兩廊皆是子房如學舍僧房每私房有人客來則自辦飲食引上大廳請尊長伴五盞後却囘私房别置酒恁地却有宗子意亦是異爨見説其族甚大又曰陸子静始初理㑹家法亦齊整諸父自做一處喫飯諸母自做一處喫飯諸子自做一處諸婦自做一處諸孫自做一處孫婦自做一處卑幼自做一處或問父子須異食否曰須是如此亦須待父母食畢然後可退而食問事母亦須然否曰須如此問有飲宴何如曰這須同處如大饗君臣亦同坐賀孫用之問祭用尸之意曰古人祭祀無不用尸非惟祭祀家先用尸祭外神亦用尸不知祭天地如何想惟此不敢為尸杜佑説古人用尸者盖上古朴陋之禮至聖人時尚未改文蔚録云是上古朴野之俗先王制禮是去不盡者相承用之至今世則風氣日開朴陋之禮已去不可復用去之方為禮而世之迂儒必欲復尸可謂愚矣杜佑之説如此今蠻夷猺洞中有尸之遺意每遇祭祀鬼神時必請鄉之魁梧姿美者為尸而一鄉之人相率以拜祭為之尸者語話醉飽每遇嵗時為尸者必連日醉飽此皆古之遺意甞見崇安余宰邵武人説他之鄉里有一村名宻溪去邵武數十里此村中有數十家事所謂中王之神甚謹所謂中王者每嵗以序輪一家之長一人為中王周而復始凡祭祀祈禱必請中王坐而祠之嵗終則一鄉之父老合樂置酒請新舊中王者講交代之禮此人旣為中王則一嵗家居寡出恭謹畏慎略不敢為非以副一村祈向之意若此村或有水旱災沴則人皆歸咎於中王以不善為中王之所致此等意思皆古之遺聞近來數年此禮已廢矣看來古人用尸自有深意非朴陋也陳丈云盖不敢死其親之意曰然用之云祭祀之禮酒殽豐潔必誠必敬所以望神之降臨乃歆饗其飲食也若立之尸則為尸者既已享其飲食鬼神豈復來享之如此却為不誠矣曰此所以為盡其誠也盖子孫旣是祖宗相傳一氣下來氣類固已感格而其語言飲食若其祖考之在焉則有以慰其孝子順孫之思而非恍惚無形想象不及之可比矣古人用尸之意所以深逺而盡誠盖為是耳今人祭祀但能盡誠其祖考猶來格况旣是他親子孫則其來格也益速矣因言今世鬼神之附著生人而説話者甚多亦有祖先降神于其子孫者又如今之師巫亦有降神者盖皆其氣類之相感所以神附著之也周禮祭墓則以冢人為尸亦是此意子蒙以下尸古人用尸夲與死者是一氣又以生人精神去交感他那精神是㑹附著歆享杜佑説古人質樸立尸為非禮今蠻夷中猶有用尸者李堯卿問今祭欲用尸如何曰古者男女皆有尸自周以來不見説有女尸想是漸次廢了這箇也嶢﨑古者君迎尸在廟門之外則全臣子之禮在廟門之内則君拜之杜佑説上古時中國但與夷狄一般後出聖人改之有未盡者尸其一也盖今蠻洞中猶有此但擇美丈夫為之不問族類事見杜佑所作理道要訣末篇義剛古者立尸必隔一位孫可以為祖尸子不可以為父尸以昭穆不可亂也義剛或問古人祫祭時每位有尸否曰固是周家旅酬六尸是每位皆一尸也古者主人獻尸尸酢主人開元禮猶如此每獻一位畢則尸便酢主人受酢已又獻第二位不知甚時縁甚事後廢了到夲朝都把這様禮數併省了問設尸法如何曰每一神位是一尸但不知設尸時主頓在何處祭時尸自食其物若獻罷則尸復勸主人而凡行禮等人與祭事者皆得食當初獻時尚自齊整至三獻後人皆醉了想見勞攘先生説至此笑曰便是古人之禮也不可曉所以夫子説禘自旣灌則不欲觀想只是灌時有些誠意且如祭祖自始祖外皆旅酬如此自是不解嚴肅如大夫雖無灌禮然亦只是其初祭時齊整後面自勞攘今按此條亦為後世言之耳若是古人祭祀自始至終一于誠敬無不嚴肅讀者不可泥也義則或問妣有尸否曰一處説無尸又有一處説有男尸有女尸亦不知廢於甚時古者不用尸則有隂厭書儀中所謂闔門垂簾是也欲使神靈厭飫之也廣男用男尸女用女尸隨祖先數目列祭若其家止有一人全無骨肉子孫之類又不知如何程先生言古人之用尸也質意謂今不用亦得揚神主之位東向尸在神主之北銖問山川之尸曰儀禮周公祭太山以召公為尸義剛問祭五祀皆有尸祀竈則以誰為尸曰今亦無可考者但如墓祭則以冢人為尸以此推之則祀竈之尸恐是膳夫之類祀門之尸恐是閽人之類又如祀山川則是虞衡之類問尸之坐立曰夏立尸商坐尸周旅酬六尸后稷之尸不旅酬問祭妣之尸曰婦人不立尸却有明文又曰古者以先王衣服藏之廟中臨祭則出以衣尸如后稷之衣到周時恐已不在亦不可曉儒用問程氏主式士人家可用否曰他云已是殺諸侯之制士人家用牌子曰牌子式當如何曰温公用大板子今但依程氏主式而勿陷其中可也淳以下主式伊川木主制度其剡刻開竅處皆有隂陽之數存焉信乎其有制禮作樂之具也方伊川制士庻不用主只用牌子看來牌子當如主制只不消做二片相合及竅其旁以通中賀孫問庻人家亦可用主否曰用亦不妨且如今人未仕只用牌子到仕後不中換了若是士人只用主亦無大利害又問祧主當如何曰當埋之於墓其餘祭儀諸家祭禮已備具矣如欲行之可自仔細考過堯卿問士牌子式曰晉人制長一尺二分博四寸五分亦太大不如只依程主外式然其題則不能如陷中之多矣義剛直卿問神主牌先生夜來説荀朂禮未終曰温公所製牌濶四寸厚五寸八分錯了據隋煬帝所編禮書有一篇荀朂禮乃是云濶四寸厚五寸八分大書某人神座不然只小楷書亦得後人相承誤了却作五寸八分為一句義剛無爵曰府君夫人漢人碑已有只是闕之辭府君如官府之君或謂之明府今人亦謂父為家府義剛淳同古人祭禮次喪禮盖謂從那始作重時重用木司馬儀用帛便做那祭底道理來後來人却移祭禮在喪之前不曉這箇意思植以下論家祭安卿問人於其親始死則復其魂魄又為重為主節次奠祭所以聚其精神使之不散若親死而其子幼稚或在他鄉不得盡其萃聚之事不知後日祭祀還更萃得他否曰自家精神自在這裏義剛問祭禮古今事體不同行之多窒礙如何曰有何難行但以誠敬為主其他儀則隨家豐約如一羮一飯皆可自盡其誠若温公書儀所説堂室等處貧家自無許多所在如何要行得據某看來苟有作者興禮樂必有簡而易行之理賀孫今之冠昏禮易行喪祭禮繁多所以難行使聖人復出亦必理㑹教簡要易行今之祭禮豈得是古人禮唐世三獻官隨獻各自飲福受胙至本朝便都只三獻後方始飲福受胙也是覺見繁了故如此某之祭禮不成書只是將司馬公者減却幾處如今人飲食如何得恁地多横渠説墓祭非古又自撰墓祭禮即是周禮上自有了賀孫古禮於今實是難行當祭之時獻神處少只祝酌奠卒祝迎尸以後都是人自食了主人獻尸尸又酢主人酢主婦酢祝及佐食宰賛衆賔等交相勸酬甚繁且久所以季氏之祭至於繼之以燭竊謂後世有大聖人者作與他整理一過令人蘇醒必不一一如古人之繁但放古人大意簡而易行耳温公儀人所憚行者只為閒辭多長篇浩瀚令人難讀其實行禮處無多某甞修祭儀只就中間行禮處分作五六段甚簡易曉後被人竊去亡之矣淳李丈問祭儀更有修改否曰大槩只是温公儀無修改處楊通老問祭禮曰極難且如温公所定者亦自費錢温公祭儀庻羞麺食米食共十五品今須得一簡省之法方可璘問舊甞收得先生一本祭儀時祭皆是卜日今聞却用二至二分祭如何曰卜日無定慮有不䖍温公亦云只用分至亦可問如此則冬至祭始祖立春祭先祖季秋祭禰此三祭如何曰覺得此箇禮數太逺似有僣上之意又問禰祭如何曰此却不妨廣問時祭用仲月清明之類或是先世忌日則如之何曰却不思量到古人所以貴于卜日也過家祭須致齊當官者只得在告一日若沿檄他出令以次人代祭可也必大遇大時節請祖先祭於堂或廳上坐次亦如在廟時排定祔祭旁觀者右丈夫左婦女坐以就裏為大凡祔於此者不從昭穆了只以男女左右大小分排在廟却各從昭穆祔揚排祖先時以客位西邊為上髙祖第一髙祖母次之只是正排看正面不曾對排曾祖祖父皆然其中有伯叔伯叔母兄弟嫂嫂無人主祭而我為祭者各以昭穆論如祔祭伯叔則祔於曾祖之傍一邊在位牌西邊安伯叔母則祔曾祖母東邊安兄弟嫂妻婦則祔於祖母之傍伊川云曾祖兄弟無主者亦不祭不知何所據而云伊川云只是以義起也揚古人祭祀只是席地今祭祀時須一椅一卓木主置椅上如一𣲖排不足只相對坐亦得然對其前不得拜謂所在窄了須逐位取出酒就外酹揚祭只三獻主人初獻嫡子亞獻或主婦庻子弟終獻或嫡孫執祭人排列皆從温公禮韓魏公禮不同揚賀孫録云未有主婦則弟為亞獻弟婦得為終獻朔旦家廟用酒菓望旦用茶重午中元九日之類皆名俗節大祭時每位用四味請出木主俗節小祭只就家廟止二味朔旦俗節酒止一上斟一盃揚問有田則祭無田則薦如何曰温公祭禮甚大今亦只是薦然古人薦用首月祭用仲月朝廷却用首月揚諸家禮皆云薦新用朔朔新如何得合但有新即薦於廟揚温公書儀以香代爇蕭楊子直不用以為香只是佛家用之義剛問酹酒是少傾是盡傾曰降神是盡傾然温公儀降神一節亦似僣禮大夫無灌獻亦無爇蕭灌獻爇蕭乃天子諸侯禮爇蕭欲以通陽氣今太廟亦用之或以為焚香可當爇蕭然焚香乃道家以此物氣味香而供養神明非爇蕭之比也義剛飲福受酢即尸酢主人之事無尸者則有隂厭陽厭旅酬從下面勸上下至直罍洗者皆得與獻酬之數方子問生時男女異席祭祀亦合異席今夫婦司席如何曰夫婦同牢而食文蔚夫祭妻亦當拜義剛先生每祭不燒紙亦不曾用帛先生家祭享不用紙錢凡遇四仲時祭隔日滌椅桌嚴戒辨次日侵晨已行事畢過問祭祀焚幣如何曰祀天神則焚幣祀人鬼則瘞幣人家祭祀之禮要焚幣亦無稽考處若是以尋常焚真衣之類為是便不當只焚真衣著事事做去焚但無意義只是焚黄若本無官方贈初品及贈到改服色處尋常人家做去焚然亦無義耳㽦或問祖宗非士人而子孫欲變其家風以禮祭之祖宗不曉却如何曰如何議論得恁地差異公曉得不曉得淳録云公曉得祖先便曉得義剛人家族衆不分合祭或主祭者不可以祭及叔伯之類則須令其嗣子别得祭之今且説同居同出於曾祖便有從兄弟及再從兄弟了祭時主於主祭者其他或子不得祭其父母若恁地滚做一處祭不得要好當主祭之嫡孫當一日祭其曾祖及祖及父餘子孫與祭次日却令次位子孫自祭其祖及父又次日却令又次位子孫自祭其祖及父此却有古宗法意古今祭禮這般處皆有之某後來更討得幾家要入未得如今要知宗法祭祀之禮須是在上之人先就宗室及世族家行了做箇様子方可使以下士大夫行之賀孫以下主祭某自十四嵗而孤十六而免喪是時祭祀只依家中舊禮禮文雖未備却甚齊整先妣執祭事甚䖍及某年十七八方考訂得諸家禮禮文稍備是時因思古人有八十嵗躬祭事拜跪如禮者常自期以為年至此時當亦能如此在禮雖有七十曰老而傳則祭祀不預之説然亦自期儻年至此必不敢不自親其事然自去年來跪拜已難至冬間益艱辛今年春間僅能立得住遂使人代拜今立亦不得了然七八十而不衰非特古人今人亦多有之不知某安得如此衰也僴問支子不祭曰不當祭問横渠有季父之喪三廢時祀却令竹監弟為之縁竹監在官無持喪之專如此則支子亦祭曰這便是横渠有礙處只得不祭因説古人持喪端的是持喪如不食粥淳問士祭服曰應舉者用襕衫幞頭不應舉者用皂衫幞頭問皂衫帽子如何曰亦可然亦只當涼衫中間朝廷一番行冠帶後却自朝官先廢了崇觀間莆人朱給事子入京父令過錢塘謁故人某大卿初見以衫帽及宴亦衫帽用大樂酒一行樂一作主人先釂遂兩手捧盞側勸客客亦釂主人捧盞不移義剛録云依舊側盞不移至樂罷而後下及五盞歇坐請解衫帶著背子不脱帽以終席來歸語其父父曰我所以令汝謁見者欲汝觀前輩禮儀也此亦可見前輩風俗今士大夫殊無有衫帽者甞有某人作郡作衫帽之禮監司不喜以他故按之淳義剛同士祭服叔器問士庻當祭幾代曰古時一代即有一廟其禮甚多今於禮制大段虧缺而士庻皆無廟但温公禮祭三代伊川祭自髙祖始疑其過要之既無廟又於禮煞缺祭四代亦無害義剛問東坡小宗之説如何曰便是祭四代盖自已成一代説起仲蔚問郵表畷不知為何神曰却不曾子細考東坡以為猶如戯又問中霤是何處曰上世人居土屋中間開一天窻此便是中霤後人易為屋不忘古制相承亦有中霤之名今之中霤但當於室中祭之張以道問蜡便是臘否曰模様臘自是臘蜡自是蜡義剛曰臘之名至秦方有義剛以下論士祭世數問天子七廟諸侯五廟大夫三廟士二廟官師一廟若只是一廟只祭得父母更不及祖矣無乃不盡人情曰位卑則流澤淺其理自然如此文蔚曰今雖士庻人家亦祭三代如此却是違禮曰雖祭三代却無廟亦不可謂之僣古之所謂廟者其體面甚大皆是門堂寢室勝如所居之宫非如今人但以室為之文蔚問祭禮曰古禮難行且依温公擇其可行者行之祭土地只用韓公所編秖一位祭祖自髙祖而下如伊川所論古者祗祭考妣温公祭自曾祖而下伊川以髙祖有服所當祭今見於遺書者甚詳此古禮所無創自伊川所以使人盡孝敬追逺之義驤問遺書云尋常祭及髙祖曰天子則以周人言上有太祖二祧大夫則干祫及其髙祖可學堯卿問始祖之祭曰古無此伊川以義起某當初也祭後來覺得僣遂不敢祭古者諸侯只得祭始封之君以上不敢祭大夫有大功則請於天子得祭其髙祖然亦止得祭一番常時不敢祭程先生亦云人必祭髙祖只是有䟽數耳又問今士庻亦有始基之祖莫亦只祭得四代但四代以上則可不祭否曰如今祭四代已為僣古者官師亦只得祭二代若是始基之祖莫亦只存得墓祭義剛以下祭始祖先祖余正父謂士大夫不得祭始祖此天子諸侯之禮若士大夫當祭則自古無明文又云大夫自無太祖先生因舉春秋如單氏尹氏王朝之大夫自上世至後世皆不變其初來姓號則必有太祖又如季氏之徒世世不改其號則亦必有太祖余正父謂此春秋時自是世卿不由天子都没理㑹先生云非獨是春秋時如詩裏説南仲太祖太師皇父南仲是文王時人到宣王時為太祖却不知古者世禄不世官之説如何又如周公之後伯禽已受封於魯而周家世有周公如春秋云宰周公這般所在自曉未得賀孫問冬至祭始祖是何祖曰或謂受姓之祖如蔡氏則蔡叔之類或謂厥初生民之祖如盤古之類曰立春祭先祖則何祖曰自始祖下之第二世及已身以上第六世之祖曰何以只設二位曰此只是以意享之而已淳李問至日始祖之祭初獻事曰家中尋常只作一番安排想古人也不恁地却有三奠酒或有脯醢之属因三奠中進遂問始祖是隨一姓有一始祖或只是一始祖曰此事亦不可得而見想開闢之時只是生一箇人出來淳畧用之問先生祭禮立春祭髙祖而上只設二位若古人祫祭須是逐位祭曰某只是依伊川説伊川禮更略伊川所定不是成書温公儀却是做成了賀孫伊川時祭止于髙祖髙祖而上則於立春設二位統祭之而不用主此説是也却又云祖又豈可厭多苟其可知者無逺近多少須當盡祭之疑是初時未曾討論故有此説道夫問祭先祖用一分如何曰只是一氣若影堂中各有牌子則不可可學家廟之制伊川只以元妃配享盖古者只是以媵妾繼室故不容與嫡並配後世繼室乃是以禮聘娶自得為正故唐㑹要中載顔魯公家祭有並配之儀必大以下配祭古人無再娶之禮娶時便有一副當人了嫡庶之分定矣故繼室於正室不可並配今人雖再娶然皆以禮聘同正室也祭於别室恐未安如伊川云奉祀之人是再娶所生則以所生母配如此則是嫡母不得祭矣此尤恐未安大抵伊川考禮文却不似横渠考得較仔細伯羽居父問祖妣配祭之禮先生檢古今祭禮唐元和一段示之賀孫妣者嫓也祭所生母只當稱母則畧有别砥祭生母無後之祭伊川説在古今家祭禮中閎祖以下祭無後者問無後祔食之位曰古人祭於東西廂今人家無東西廂某家只位於堂之兩邊祭食則一但正位三獻畢然後使人分獻一酌而已如今學中從祀然義剛李守約問祭殤幾代而止曰禮經無所見只程氏遺書一段説此亦是以義起義剛祭殤一之問長兄死有義嫂無子不持服歸父母未幾亦死于父母家嫂已去而無義亦不祀其嫂之主又有次兄年少未娶而死欲以二兄之主同為一櫝如何曰兄在日不去嫂兄死後嫂雖歸父母家又不嫁未得為絶不祀亦無謂若然是弟自去其嫂也兄弟亦何必同櫝乎淳以下雜論堯卿問荆婦有所生母在家間養百嵗後只歸祔於外家之塋如何曰亦可又問神主歸於婦家則婦家凌替仍祀於家之别室如何曰不便北人風俗如此上谷郡人謂伊川曰今日為我祀父母明日不復祀矣是亦祀於外家也然無禮經義剛叔器問行正禮則俗節之祭如何曰韓魏公道得好謂時節祠殺於正祭某家依而行之但七月十月之饌用浮屠某不用耳向南軒廢俗節之祭某問於午日能不食粽乎重陽能不飲茱茰酒乎不祭而自享於心安乎淳義剛同以下俗祭問行時祭則俗節如何曰某家且兩存之童闕簡於時祭否曰是要得不行須是自家亦不飲酒始得淳先生依婺源舊俗嵗暮二十六日烹豕一祭家先就中夕二鼓行禮次日召諸生餕李丈問曰夜來之祭飲福受胙否曰亦不講此婺源俗豕必方切大塊首蹄肝肺心膓肚尾腎等每件逐位皆均有亦炙肉及以魚佐之云是日甚忌有器皿之設淳先生以嵗前二十六夜祭先云是家間從來如此這又不是新安舊俗某甞在新安見祭享又不同只都安排了大男小女都不敢近夜亦不舉燭只黑地主祭一人自去燒香禱祝了祭饌不徹閉戸以待来早方徹其祭不止一日從二十六日連日只祭去大綱如今俗所謂喚福賀孫問先生除夜有祭否曰無祭先生有五祀之祭否曰不祭因説五祀皆設主而後迎尸其詳見月令注與宗廟一般遂舉先生語解中王孫賈一段先生曰當初因讀月令注方知王孫賈所問奥竈之説淳墓祭非古雖周禮有冢人為尸之文或是初間祭后土闕可知但今風俗皆然亦無大害國家不免亦随俗為之淳以下墓祭問墓祭有儀否曰也無儀大槩畧如家祭闕祭但是拜掃而已林擇之云唐有墓祭闕得在曰却不曾考或問墓祭祭后土否曰就墓上爲位而祭義剛淳少異問后土氏之祭曰極而言之亦似僣然此即古人中霤之祭而今之所謂土地者郊特牲取財於地取法於天是以尊天而親地教民美報焉故家主中霤而國主社也此則天不可祭而土神在民亦可祭盖自上古陶為宫室其當中處上為一竅以通明名之曰中霤及中古有宫室亦以室之中央為中霤存古之舊示不忘本雖曰土神而只以小者言之非如天子所謂祭皇天后土之大者也義剛同古無忌祭近日諸先生方考及此賀孫以下忌祭問忌日當哭否曰若是哀來時自當哭又問衣服之制曰某自有吊服絹衫絹巾忌日則服之廣忌日須用墨衣墨冠横渠却視祖先逺近為等差墨布帽墨布繒衣銖先生母夫人忌日著縿墨布衫其中亦然友仁問今日服色何謂曰公豈不聞君子有終身之喪友仁忌日祭只祭一位燾過每論士大夫家忌日用浮屠誦經追薦鄙闕旣無此理是使其先不血食也乙邜年見先生闕逺諱早起出主於中堂行三獻之禮闕家固闕祭祀食物則以待賔客考妣諱日祭罷裹生絹闕日晚到閣下尚裹白巾未除因答問者云夫之計過先生為無後叔祖忌祭未祭之前不見客賀孫問人在旅中遇有私忌於所舍設棹炷香可否曰這須是細處古人也不曾説若是無大礙於義理行之亦無妨燾同元徳記朱子語類卷九十
