body:
  text: 朱子語類卷一百三十五歴代二大亂之後易治戰國嬴秦漢初是也揚周太繁宻秦人盡掃了所以賈誼謂秦專用苟簡自恣之行秦又太苟簡自恣不曾竭其心思太史公董仲舒論漢事皆欲用夏之忠不知漢初承秦掃去許多繁文已是質了至後學䝉録漢承焚滅之却有忠質底意漢髙祖私意分数少唐太宗一切假仁借義以行其私若海漢興之初人未甚繁氣象剗地較好到武宣極盛時便有衰底意思人家亦然義剛或問髙祖為義帝發䘮是詐後如何却成事曰只縁當時人和詐也無如五伯假之亦是諸侯皆不能假故也祖道伯謨問汪公史評說酈食其說得好曰髙祖那時也謾教他去未必便道使得着又問聖人處太公事如何曰聖人須是外放教寛一面自進必不解如髙祖突出這般説話然髙祖也只是寛他劉項之際直是紛紛可畏度那時節有百十人有千來人皆成部落無䖏無之那時也無以為糧只是刼奪賀孫廣武之㑹太公既已為項羽所執髙祖若去求告他定殺了只得以兵攻之他却不敢殺時髙祖亦自知漢兵已强羽亦知殺得無益不若留之庶可結漢之懽心人傑録云使髙祖屈意事楚則有俱斃而已惟其急於攻楚所以致太公之歸也問舜棄天下猶敝屣曰如此則父子俱就戮爾亦救太公不得若分羮之語自是高祖説得不是㽦羮人傑録云分之說則大不可然豈宜以此責髙祖若以此責之全無是䖏也方子録却云杯羮之語只得如此問養虎自遺患事張良當時若放過恐大事去矣如何曰若只計利害即無事可言者當時若放過未取亦不出三年耳問機㑹之来間不容髪况沛公素無以繫豪傑之心放過即事未可知曰若要做此事先來便莫與項羽講解既已約和即不可為矣大抵張良多隂謀如入關之初賂秦将之為賈人者此類甚多問伊川却許以有儒者氣象豈以出䖏之際可觀邪曰為韓報仇事亦是是為君父報仇徳明或問太史公書項籍垓下之敗實被韓信布得陣好是以一敗而竟斃曰不特此耳自韓信左取燕齊趙魏右取九江英布收大司馬周殷而羽漸困于中而手足日翦則不待垓下之敗而其大勢盖已不勝漢矣壯祖伯豐因問善家令言尊太公事曰此等處髙祖自是理㑹不得但它見太公擁篲心却不安然如尊太公事亦古所未有耳㽦髙祖斬丁公赦季布非誠心欲伸大義特私意耳季布所以生盖欲示天下功臣是時功臣多故不敢殺季布既是明大義陳平信布皆項羽之臣信布何待反而誅之夀昌義剛説賜姓劉氏云古人族系不亂只縁姓氏分明自髙祖賜姓而譜系遂無稽攷姓氏遂紊亂但是族系紊亂也未害於治體但一有同姓異姓之私則非以天下為公之意今觀所謂劉氏冠非劉氏不王往往皆此一私意使天下後世有親踈之間而相戕相黨皆由此起先生曰古人是未有姓故賜他姓教他各自分别後来既有姓了又何用賜但一時欲以恩結之使之親附於己故賜之如髙祖猶少如唐夷狄来附者皆賜姓道理也是不是但不要似公様恁地起風作浪説義剛太史公三代本紀皆著孔子所損益四代之説髙祖紀又言色尚黄朝以十月此固有深意且以孔顔而行夏時乗商輅服周冕用韶舞則好以劉季為之亦未濟事在方子髙祖子房英項羽雄道夫嘗欲冩出蕭何韓信初見髙祖時一段鄧禹初見光武時一段武侯初見先主時一段将這數段語及王朴平邉䇿編為一卷雉程先生謂何追韓信髙祖通知亦有此理無垢謂申屠嘉責鄧通文帝亦通知恐未必然嘉乃髙祖時踏弩之卒想亦一樸直人文帝教做宰相便為他做有事當行便行大事記解題謂自嘉薨宰相權便輕了為以御史大夫副之也揚論三代以下人品皆稱子房孔明子房今日説了脱空眀日更無愧色畢竟只是黄老之學及後疑戮功臣時更尋討他不着㽦唐子西云自漢而下惟有子房孔明爾而子房尚黄老孔明喜申韓也說得好子房分明是得老子之術其䖏已謀人皆是孔明手寫申韓之書以授後主而治國以嚴皆此意也問邵子云智哉留侯善藏其用如何曰只燒絶棧道其意自在韓而不在漢及韓滅無所歸乃始歸漢則其事可見矣道夫問子房孔明人品曰子房全是黄老皆自黄石一編中來又問一編非今之三畧乎曰又有黄石公素書然大率是這様說話廣云觀他愽浪沙中事也甚竒偉曰此又忒煞不黄老為君報仇此是他資質好䖏後来事業則都是黄老了凢事放退一歩若不得那些清髙之意来縁飾遮盖則其從衡詭譎殆與陳平軰一律耳孔明學術亦甚雜廣云他雖甞學申韓却覺意思頗正大曰唐子西甞説子房與孔明皆是好人才但其所學一則從黄老中来一則從申韓中来又問崔浩如何曰也是箇博洽底人他雖自比子房然却學得子房獃了子房之辟榖姑以免禍耳他却眞箇要做廣子房多計数堪下處下揚張良一生在荆棘林中過只是殺他不得任他流血成川横屍萬里他都不知椿叔孫通為緜蕝之儀其効至於羣臣震恐無敢喧嘩失禮者比之三代燕享羣臣氣象便大不同盖只是秦人尊君卑臣之法人傑丶必大録云叔孫通制漢儀一時上下肅然震恐無敢喧嘩時以為善然不過尊君卑臣如秦人之意而已都無三代燕饗底意思了齊魯二生之不至亦是見得如此未必能傳孔孟之道只是它深知叔孫通之為人不肯從它耳􅓌漢之四皓元稹嘗有詩譏之意謂楚漢紛爭却不出只為吕氏以幣招之便出来只定得一箇恵帝結裹小了然觀四皓恐不是儒者只是智謀之士􅓌伯豐問四皓是如何人品曰是時人材都沒理㑹學術權謀混為一區如安期生蒯通盖公之徒皆合做一䖏四皓想只是箇權謀之士觀其對髙祖言語重如願為太子死亦脅之之意又問髙祖欲易太子想亦是知惠帝人才不能負荷曰固是然便立如意亦了不得盖題目不正諸將大臣不心服到後来吕氏横做了八年人心方憤悶不平故大臣誅諸吕之際因得以誅少帝少帝但非張后子或是後宫所出亦不可知史謂大臣隂謀以少帝非惠帝子意亦可見少帝畢竟是吕氏黨不容不誅耳杜牧之詩云南軍不袒左邊袖四老安劉是滅劉如唐中宗事致堂南軒皆謂五王合併廢中宗因誅武氏别立宗英然當時事勢中宗却未有過正縁無罪被廢又是太宗孫髙宗子天下之心思之為它不憤五王亦因此易於成功耳中宗後来所為固謬然當時便廢他不得􅓌召平髙於四皓但不知髙后時此四人在甚處蔡丈云康節謂事定後四人便自去了曰也不見得恐其老死亦不可知廣韓信反無證見閎祖問南軒甞對上論韓信諸葛之兵異曰韓都是詭詐無狀揚三代以下漢之文帝可謂恭儉之主道夫文帝曉事景帝不曉事文蔚文帝學申韓刑名黄老清静亦甚雜但是天資素高故所為多近厚至景帝以刻薄之資又輔以慘刻之學故所為不如文帝班固謂漢言文景帝者亦只是養民一節畧同亦如周人云成康康亦無大好䖏或者說關雎之詩正謂康后滛亂故作以譏之子䝉文帝不欲天下居三年䘮不欲以此勤民所為大綱類墨子賀孫或問文帝欲短䘮或者要為文帝遮護謂非文帝短䘮乃景帝之過曰恐不是恁地文帝當時遺詔教大功十五日小功七日服纖三日或人以為當時當服大功者只服十五日當服小功者只服七日當服纎者只三日恐亦不解恁地臣為君服不服則已服之必斬衰三年豈有此等級或者又說古者只是臣為君服三年服如諸侯為天子大夫為諸侯乃畿内之民服之於天下吏民無三年服道理必不可行此制必是秦人尊君卑臣却行這三年至文帝反而復之耳子䝉問文帝問陳平錢榖刑獄之數而平不對乃述所謂宰相之職或以為錢榖刑獄一得其理則隂陽和萬物遂而斯民得其所矣宰相之職莫大於是惜乎平之不知此也曰平之所言乃宰相之體此之所論亦是一說但欲執此以廢彼則非也要之相得人則百官各得其職擇一户部尚書則錢榖何患不治而刑部得人則獄事亦清平矣昔魏文侯與田子方飲文侯曰鍾聲不比乎左髙田子方笑文侯曰何笑子方曰臣聞之君明樂官不明樂音今君審於音臣恐其聾於官也陳平之意亦猶是爾盖知音而不知人則瞽者之職耳知人則音雖不知而所謂樂者固無失也本朝韓魏公為相或謂公之徳業無愧古人但文章有所不逮公曰某為相歐陽永叔為翰林學士天下之文章莫大於是自今觀之要說他自不識安能知歐陽永叔也得但他偶然自知亦奈他何道夫問周亞夫軍中聞將軍令不聞天子詔不知是否曰此軍法又問大凢為將之道首當使軍中尊君親上若徒知有將而不知有君則將皆亞夫固無害也設有姦將一萌非意則軍中之人豈容不知有君曰若說到反時更無說凢天子命將既付以一軍只當守法且如朝廷下州縣取一件公事亦須知州知縣肯放方可發去不然豈可輙易也自脩賈誼說教太子方說那承師問道等事却忽然說帝入太學之類後面又說太子文勢都不相干渉不知怎地賈誼文章大抵恁地無頭腦如後面說春朝朝日秋莫夕月亦然他方說太子又便從天子身上去某甞疑三代之禮一句合當作及其為天子字盖詳他意是謂為太子時教得如此及為天子則能如此它皆是引禮經全文以為證非是他自說如此義剛問賈誼新書云太子處位不端受業不敬言語不序聲音不應律聲音應律恐是以歌詠而言曰不是如此太子新生太師吹律以驗其啼所謂應律只是要看他聲音高下如大射禮舉旌以宫偃旌以商便是此類文蔚問賈誼新書立容言早立何謂早立曰不可曉如儀禮云疑立疑却是屹屹然而立也節問賈誼新書曰此誼平日記録藁草也其中細碎俱有治安䇿中所言亦多在焉方子賈誼新書除了漢書中所載餘亦難得粋者㸔來只是賈誼一雜記藁耳中間事事有些廣問賈誼五餌之說如何曰伊川甞言本朝正用此術契丹分明是被金帛買住了今日金人亦是如此昌父曰交隣國待夷狄固自有道五餌之說恐非仁人之用心曰固是但金人分明是遭餌但恐金帛盡則復來不為則已為則五餌須並用然以宗室之女妻之則大不可如烏孫公主之類令人傷痛然何必夷狄齊人歸女樂便是如此了如阿固達初破遼國勇銳無敵及既下遼席卷其子女而北肆意蠱惑行未至其國而死因笑謂趙曰頃年於吕季克處見一畫卷畫畨人與一女子並轡而語季克苦求詩某勉為之賦末兩句云却是燕姬解迎敵不教行到殺虎林正用阿固達事也僩文帝便是善人武帝却有狂底氣象陸子静省試策說武帝強文帝其論雖偏亦有此理文帝資質雖美然安於此而已其曰卑之無甚髙論令今可行題目只如此先王之道情願不要去做只循循自守武帝病痛固多然天資髙志向大足以有為使合下便得箇眞儒輔佐豈不大有可觀惜乎無眞儒輔佐不能勝其多欲之私做從那邊去了欲討匈奴便把吕后嫚書做題目要来揜盖其失他若知得此豈無脩文徳以來道理又如討西域初一番去不透又再去只是要得一馬此是甚氣力若移來就這邊做豈不可末年海内虗耗去秦始皇無㡬若不得霍光收拾成甚麽輪臺之悔亦是天資高方如此甞因人言太子仁柔不能用武答以正欲其守成若朕所為是襲亡秦之迹可見他當時已自知其罪向若能以仲舒為相汲黯為御史大夫豈不善先生歸後再有取答問日云狂者志髙可以有為狷者志潔有所不為而可以有守漢武狂然又不純一不足言也淳㝢録見狂狷章漢守髙祖無功不侯之法甚嚴武帝欲侯李廣利亦作計終破之法制之不足恃除得人方好因論子静取武帝曰取其英䧺乃其不好處㸔人不可如此又謂文帝雖只此然亦不是胷中無底觀與賈誼夜半前席之事則其論說甚多誼盖皆與帝背者帝只是應将去誼雖說得如厝火薪下之類如此之急帝觀之亦未見如此又云彼自見得當時之治亦且得安静不可撓揚武帝做事好揀好名目如欲逞兵立威必曰高皇帝遺我平城之憂若果以此為耻則須脩文徳以來之何用窮兵黷武驅中國生民於沙漠之外以償鋒鏑之慘道夫武帝征匈奴非為祖宗雪積年之忿但假此名而用兵耳夀昌王允云武帝不殺司馬遷使作謗書如封禪書所載祠祀事樂書載得神馬為太一歌汲黯進曰先帝百姓豈能知其音邪公孫𢎞曰黯誹謗聖制當族下面却忽然寫許多禮記又如律書說律又說兵又說文帝不用兵賛歎一場全似箇醉人東撞西撞觀此等處恐是有意閎祖漢儒董仲舒較穏劉向雖博洽而淺然皆不見聖人大道賈誼司馬遷皆駁雜大意是說權謀功利説得深了覺見不是又說一两句仁義然權謀已多了救不轉蘇子由古史前數卷好後亦合雜權謀了漢儒初不要窮究義理但是㑹讀記得多便是學揚漢儒注書只注難曉䖏不全注盡本文其辭甚簡揚問君臣之變不可不講且如霍光廢昌邑正與伊尹同然尹能使太甲自怨自艾而卒復辟光當時被昌邑說天子有爭臣七人两句後他更無轉側萬一被他更咆勃時也惡模様曰到這裏也不解恤得惡模様了義剛曰光畢竟是做得未宛轉曰做到這裏也不解得宛轉了良乆又曰人臣也莫願有此萬一有此時也十分使那宛轉不得義剛問霍光廢昌邑是否曰是使太甲終不明伊尹如之何曰亦有道理可學或問霍光不負社稷而終有許后之事馬援以口過戒子孫而他日有裹屍之禍先生曰采葑采菲無以下體取人之善為己師法不當如此論也若海問宣帝雜王伯之說曰須曉得如何是王如何是伯方可論此宣帝也不識王伯只是把寛慈底便喚做王嚴酷底便喚做伯明道王伯劄子說得後自古論王伯至此無餘藴矣義剛叔器問宣帝言漢雜王伯此說也似是曰這箇先須辨别得王伯分明方可去論它是與不是叔器云如約法三章為義帝發䘮之類做得也似好曰這箇是它有意無意叔器曰有意曰既有意便不是王義剛韓延夀傳云以期㑹為大事某舊讀漢書合下便喜他這一句直卿曰敬事而信也是這意曰然道夫問不疑誣金事徐節孝以金還人曰初也須與他至誠說是無看如何他人解便休若是硬執只得還他若皆不與之解説人才誣便還則是以不善與人而自為善其心有病矣揚楊惲坐上書怨謗要斬此法古無之亦是後人增添今觀其書謂之怨則有之何謗之有淳正淳論二䟽不合徒享爵位而去又不合不薦引剛直之士代己輔導太子先生曰䟽廣父子亦不必苛責之雖未盡出䖏之正然在當時親見元帝懦弱不可輔導它只得去亦是避禍而已觀渠自云不去懼貽後悔亦自是省事恬退底世間自有此等人它性自恬退又見得如此只得去若不去蕭望之便是様子望之即剛直之士又問元帝是時年十二如何便逆知其後来事曰若是狡者便難知如南北時有一王當面做好人背後即為非此等却難知若庸謬底人自是易見又問如何不以告宣帝或思所以救之曰若是恁地越不能得去便做告與宣帝教宣帝待如何㽦先生因言甞見一人云匡衡做得相業全然不是只是所上䟽議論甚好恐是收得好懐挟又云如答淮陽王求史遷書其辭甚好又曰如宣元間詔令及一戒諸侯王詔令皆好不知是何人做漢初時却無此議論漢初却未曾講貫得恁地又曰匡衡說詩關雎等䖏甚好亦是有所師授講䆒得到㽦事無有自做得成者光武要小小自做家活子亦是鄧禹先尋得許多人太宗便是房杜為尋得許多人今只要自做揚古人年三十時都理㑹得了便受用行将去今人都如此費力只如鄧禹十三嵗學於京師已識光武為非常人後来杖䇿謁軍門只以數言定天下大計徳明古之名将能立功名者皆是謹重周宻乃能有成如吳漢朱然終日欽欽常如對陳須學這様底方可如劉琨恃才傲物驕恣奢侈卒至父母妻子皆為人所屠今人率以才自負自待以英䧺以至恃氣傲物不能謹嚴以此臨事卒至於敗而已要做大功名底人越要謹宻未聞麄魯闊略而能有成者僴漢儒專以災異䜟緯與夫風角鳥占之類為内學如徐孺子之徒多能此反以義理之學為外學且如鍾離意傳所載脩孔子廟事說夫子若㑹覆射者然甚怪義剛徐孺子以綿漬酒藏之雞中云吊䘮便以水浸綿為酒以奠之便歸所以如此者是要用他自家酒不用别䖏底所以綿漬者盖路逺難用器皿盛故也燾或問黄憲可得似顔子曰畢竟是資禀好又問若得聖人為之依歸想是煞好曰又不知他志向如何顔子不是一箇衰善底人㸔他是多少聦明便敢問為邦孔子便告以四代禮樂因說至伯夷聖之清伊尹聖之任栁下恵聖之和都是箇有病痛底聖人又問伊尹似無病痛曰五就湯五就桀孔孟必不肯恁地只為他任得過又問伊尹莫是枉尺直尋曰伊尹不是恁地只學之者便至枉尺直尋賀孫亂世保身之難申屠蟠事可見郭林宗彰而獲免以稱人之美而不稱惡人不惡之陳仲弓分太守謗送宦者𦵏其為皆如此不送其𦵏亦得為之詭遇揚後漢魏桓不肯仕鄉人勉之曰干禄求進以行志也方今後宫千數其可損乎廐馬萬匹其可減乎左右權豪其可去乎慨然嘆曰使桓生行而死還於諸子何有㦲賀孫問器逺君舉說漢黨錮如何曰也只說當初所以致此止縁将許多達官要位付之宦官将許多儒生付之閒散無用之地所以激起得如此曰這時許多好官尚書也不是付宦官也是儒生只是不得人許多節義之士固是非其位之所當言宜足以致禍某常說只是上面欠一箇人若上有一箇好人用這一邉節義剔去那一邊小人大故成一箇好世界只是一轉關子賀孫說東漢誅宦官事云欽夫所說只是翻謄好看做文字則劇其實不曾説着當時事體到得那時節是甚麽時節雖倉公扁鵲所不能療如天下有必死之病喫熱藥也不得喫涼藥也不得有一人下一服熱藥便道他用藥錯了天下有必亡之勢這如何慢慢得若許多宦者未誅更恁地保養過㡬年更乖這只是胡說那時節是甚麽時節都無主了立箇渤海王之子纉纔七八嵗方說梁冀䟦扈便被弑了立蠡吾侯為桓帝方十五嵗外戚宦官手裏養得大你道他要誅他不要誅他東漢外戚宦官從来盤踞軌轍相衘未有若此之可畏養箇女子便頓放在宫中十餘年後便窮極富貴到得有些蹶跌便闔族誅滅無遺類欲為孤豚而不可得必亡之易未有若東漢末年伯謨問唐宦官與東漢末如何曰某甞說唐時天下尚可為唐時猶有餘策東漢末直是無着手䖏且是無主了如唐昭宗直要除許多宦官那時若有人似尚可為那時只宣宗便度得事勢不能捄便一向不問他也是老練了如此如伊川易解也失契勘說屯其膏云又非恬然不為若唐之僖昭也這兩人全不同一人是要做事一人是不要做與小黄門㗖果食度日呼田令孜為阿父不知東漢時若一向盡引得忠賢布列在内不知如何只那都無主可立天下大勢如人衰老之極百病交作略有些小變動便成大病如乳母也䀨噪一場如單超徐璜也作怪一場如張讓趙忠之徒纔有些小權柄便作怪一場這是甚麽時節伯謨云從那時直到唐太宗天下大勢方定疊曰這許多時節直是無着手䖏然亦有幸而不亡者東晉是也汪萃作詩史以為竇武陳蕃誅宦者不合前收鄭颯而未收曹節王甫侯覧若一時便收却四箇便了陽球誅宦者不合前誅王甫段頬而未誅曺節朱瑀若一時便誅却四箇亦自定矣此說是賀孫荀文若為宦官唐衡女壻見殺得士大夫厭了為免禍計耳升卿漢時宿衛皆是子弟不似而今用軍卒義剛漢有十三州一州建一刺史刺舉一路則諸侯郡守雜建諸侯甚大如齊七十餘城大率置官法度之類與天子等七國變後方漸削奪主父偃用賈誼䇿分王諸侯子孫方漸小了後漢亦雜建魏陵逼諸侯甚毎令人監之不得朝覲并親知往来曹丕待宗室如此晋大封同姓八王之亂以此元帝中興亦以此齊梁間削奪諸侯尤甚唐亦尚有之然只是遥領揚漢律康成注今和正文皆亡矣淳漢人斷獄辭亦如今之欵情一般具某罪引某法為斷淳今法中有保辜二字自後漢有此語想此二字是自古相傳淳朱子語類卷一百三十五
