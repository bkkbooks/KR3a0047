body:
  text: 朱子語類卷九學三論知行知行常相須如目無足不行足無目不見論先後知為先論輕重行為重閎祖論知之與行曰方其知之而行未及之則知尚淺既親歴其域則知之益明非前日之意味公謹聖賢説知便説行大學説如切如磋道學也便説如琢如磨自修也中庸説學問思辨便説篤行顔子説博我以文謂致知格物約我以禮謂克己復禮泳致知力行用功不可偏偏過一邊則一邊受病如程子云涵養須用敬進學則在致知分明自作兩脚説但只要分先後輕重論先後當以致知為先論輕重當以力行為重端䝉問南軒云致知力行互相發曰未須理㑹相發且各項做将去若知有未至則就知上理㑹行有未至則就行上理㑹少間自是互相發今人知不得便推説我行未到行得不是便説我知未至只管相推沒長進因説一朋友有書來見人説它説得不是却來説我只是踐履未至涵養未熟我如今且未須考究且理㑹涵養被他截斷教人與它説不得都只是這个病胡泳汪徳輔問須是先知然後行曰不成未明理便都不持守了且如曾㸃與曾子便是兩個様子曾㸃便是理㑹得底而行有不揜曾子便是合下持守旋旋明理到一唯處徳明聖賢千言萬語只是要知得守得節只有兩件事理㑹踐行節學者以玩索踐履為先道夫某與一學者言操存與窮格不解一上做了如窮格工夫亦須銖積寸累工夫到後自然貫通若操存工夫豈便能常操其始也操得一霎旋旋到一食時或走作亦無如之何能常常警覺久久自能常存自然光明矣人傑操存涵養則不可不緊進學致知則不可不寛祖道所謂窮理大底也窮小底也窮少間都成一個物事所謂持守者人不能不牽于物欲才覺得便收将來久之自然成熟非謂截然今日為始也䕫孫千言萬語説得只是許多事大槩在自家操守講究只是自家存得些在這裏便在這裏若放去便是自家放了道夫思索義理涵養本原儒用涵養中自有窮理工夫窮其所養之理窮理中自有涵養工夫養其所窮之理兩項都不相離才見成兩處便不得賀孫擇之問且涵養去久之自明曰亦須窮理涵養窮索二者不可廢一如車兩輪如鳥兩翼如温公只恁行将去無致知一段徳明人之為學如今雨下相似雨既下後到處濕潤其氣易得蒸欝才畧晴被日頭畧照又蒸得雨來前日亢旱時只緣久無雨下四面乾枯縱有些少都滋潤不得故更不能蒸欝得成人之于義理若見得後又有涵養底工夫日日在這裏面便意思自好理義也容易得見正如雨蒸欝得成後底意思若是都不去用力者日間只恁悠悠都不曾有涵養工夫設或理㑹得些小道理也滋潤他不得少間私欲起來又間斷去正如亢旱不能得雨相似也時舉學者工夫唯在居敬窮理二事此二事互相發能窮理則居敬工夫日益進能居敬則窮理工夫日益宻譬如人之兩足左足行則右足止右足行則左足止又如一物懸空中右抑則左昻左抑則右昻其實只是一事廣人須做工夫方有疑初做工夫時欲做此一事又碍彼一事便沒理㑹處只如居敬窮理兩事便相碍居敬是個收斂執持底道理窮理是個推尋究竟底道理只此二者便是相妨若是熟時則自不相碍矣廣主敬窮理雖二端其實一本闕持敬是窮理之本窮得理明又是養心之助夔孫學者若不窮理又見不得道理然去窮理不持敬又不得不持敬看道理便都散不聚在這裏淳持敬觀理如病人相似自將息固是好也要討些藥來服泳文字講説得行而意味未深者正要本源上加功須是持敬持敬以静為主此意須要于不做工夫時頻頻體察久而自熟但是著實自做工夫不干别人事為仁由己而由人乎哉此語得當更看有何病痛知有此病必去其病此便是療之之藥如覺言語多便用簡黙意思疎濶便加細宻覺得輕浮淺易便須深沈重厚程先生所謂矯輕警惰盖如此謨或問致知必須窮理持敬則須主一然遇事則敬不能持持敬則又為事所惑如何曰孟子云操則存捨則亡人才一把捉心便在這裏孟子云求放心己是説得緩了心不待求只警省處便見我欲仁斯仁至矣為仁由己而由人乎哉其快如此盖人能知其心不在則其心已在了更不待尋祖道致知敬克己此三事以一家譬之敬是守門户之人克己則是拒盜致知却是去推察自家與外來底事伊川言涵養須用敬進學則在致知不言克己盖敬勝百邪便自能克如誠則便不消言閑邪之意猶善守門户則與拒盜便是一等事不消更言别有拒盜底若以涵養對克己言之則各作一事亦可涵養則譬如將息克己則譬如服藥去病盖將息不到然後服藥將息則自無病何消服藥能純於敬則自無邪僻何用克己若有邪僻只是敬心不純只可責敬故敬則無己可克乃敬之效若初學則須是功夫都到無所不用其極端䝉學者喫緊是要理㑹這一個心那紙上説底全然靠不得或問心之體與天地同其大而其用與天地流通云云先生曰又不可一向去無形迹處尋更宜於日用事物經書指意史傳得失上做工夫即精粗表裏融㑹貫通而無一理之不盡矣闕為學先要知得分曉泳以下論知為先問致知涵養先後曰須先致知而後涵養問伊川言未有致知而不在敬如何曰此是大綱説要窮理須是著意不著意如何㑹理㑹得分曉文蔚堯卿問窮理集義孰先曰窮理為先然亦不是截然有先後曰窮是窮在物之理集是集處物之義否曰是淳萬事皆在窮理後經不正理不明看如何地持守也只是空道夫痛理㑹一畨如血戰相似然後涵養將去因自云某如今雖便静坐道理自見得未能識得涵養個甚徳明有人專要理㑹躬行此亦是孤去偽王子充問某在湖南見一先生只敎人踐履曰義理不明如何踐履曰它説行得便見得曰如人行路不見便如何行今人多敎人踐履皆是自立標致去敎人自有一般資質好底人便不須窮理格物致知聖人作個大學便使人齊入於聖賢之域若講得道理明時自是事親不得不孝事兄不得不弟交朋友不得不信幹而今人只管説治心修身若不見這個理心是如何地治身是如何地修若如此説資質好底便養得成只是個無能底人資質不好便都執縛不住了傅説云學于古訓乃有獲事不師古以克永世匪説攸聞古訓何消讀它做甚盖聖賢説出道理都在裏必學乎此而後可以有得又云惟學遜志務時敏厥修乃來允懐于茲道積于厥躬惟斆學半念終始典于學厥徳修罔覺自古未有人説學字自傅説説起它這幾句水潑不入便是説得宻若終始典于學則其徳不知不覺自進也夔孫義剛錄云人如何不博學得若不博學説道修身行己也猛撞做不得大學誠意只是説如好好色如惡惡臭及到説修身處時己自寛了到後面也自無甚事其大本只是理㑹致知格物若是不致知格物便要誠意正心修身氣質純底将來只做成一個無見識底獃人若是意思髙廣底将來遏不下便都顛了如劉淳叟之徒六經説學字自傅説方説起來王人求多聞時惟建事學于古訓乃有獲先生至此諷誦念終始典于學厥徳修罔覺曰這數句只恁地説而其曲折意思甚宻便是學時自不知不覺其徳自修而今不去講學要修身身如何地修見不可謂之虛見見無虛實行有虛實見只是見見了後却有行有不行若不見後只要硬做便所成者窄狹㽦學者須常存此心漸將義理只管去灌溉若卒乍未有進即且把見成在底道理將去㸔認認來認去更莫放著便只是自家底縁這道理不是外來物事只是自家本來合有底只是常常要㸃檢如人一家中合有許多家計也須常㸃認過若不如此被外人驀然捉将去也不知又曰温故而知新不是離了故底别有一個新須是常常将故底只管温習自有新意一則向時看與如今看明晦便不同一則上面自有好意思一則因這上面却别生得意思伊川云某二十以前讀論語己自解得文義到今來讀文義只一般只是意思别賀孫學聚問辨明善擇善盡心知性此皆是知皆始學之功也道夫以下專論知人為學須是要知個是處千定萬定知得這個徹底是那個徹底不是方是見得徹見得是則這心裡方有所主且如人學射若志在紅心上少間有時只射得那帖上志在帖上少間有時只射得那垜上志在垜上少間都射在别處去了卓只争個知與不知争個知得切與不切且如人要做好事到得見不好事也似乎可做方要做好事又似乎有個做不好事底心從後面牽轉去這只是知不切賀孫許多道理皆是人身自有底雖説道昏然又那曾頑然恁地暗也都知是善好做惡不好做只是見得不完全見得不的確所以説窮理便只要理㑹這些子賀孫以下窮理這個道理與生俱生今人只安頓放那空處都不理㑹浮生浪老也甚可惜要之理㑹出來亦不是差異底事不知如何理㑹個得恁少看它自是甘於無知了今既要理㑹也須理㑹取透莫要半青半黄下梢都不濟事道夫人生天地間都有許多道理不是自家硬把與它又不是自家鑿開它肚腸白放在裏而賀孫一心具萬理能存心而後可以窮理季札心包萬理萬理具于一心不能存得心不能窮得理不能窮得理不能盡得心揚窮理以虛心静慮為本淳虛心觀理方子或問而今看道理不出只是心不虛静否曰也是不曾去看㑹看底就看處自虛静這個互相發義剛而今看道理不見不是不知只是為物塞了而今粗法須是打疊了胸中許多惡雜方可張子云義理有疑則濯去舊見以來新意人多是被那舊見戀不肯舍除是大故聪明見得不是便翻了夔孫理不是在面前别為一物即在吾心人須是體察得此物誠實在我方可譬如修養家所謂鈆汞龍虎皆是我身内之物非在外也廣窮理如性中有個仁義禮智其發則為惻隠羞惡辭遜是非只是這四者任是世間萬事萬物莫不出此四者之内曹問有可一底道理否曰多見後自然貫又曰㑹之于心可以一得心便能齊但心安後便是義理卓器逺問窮事物之理還當窮究個總㑹處如何曰不消説總㑹凡是眼前底都是事物只管恁地逐項窮敎到極至處漸漸多自貫通然為之總㑹者心也賀孫凡看道理要見得大頭腦處分明下面節節只是此理㪚為萬殊如孔子敎人只是逐件逐事説個道理未嘗説出大頭腦處然四面八方合聚湊來也自見得個大頭腦若孟子便已指出敎人周子説出太極已是太煞分明矣且如惻隠之端從此推上則是此心之仁仁即所謂天徳之元元即太極之陽動如此節節推上亦自見得大總腦處若今看得太極處分明則必能見得天下許多道理條件皆自此出事事物物上皆有個道理元無虧欠也銖今之學者自是不知為學之要只要窮得這道理便是天理雖聖人不作這天理自在天地間天髙地下萬物散殊流而不息合同而化天地間只是這個道理流行周徧不應説道聖人不言這道理便不在這道理自是長在天地間只借聖人來説一遍過且如易只是一個隂陽之理而已伏羲始畫只是畫此理文王孔子皆是發明此理吉凶悔吝亦是從此推出及孔子言之則曰君子居其室出其言善則千里之外應之出其言不善則千里之外違之言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不謹乎聖人只要人如此且如書載堯舜禹許多事業與夫都俞吁咈之言無非是至理恪這道理若見得到只是合當如此如竹椅相似須著有四隻脚平平正正方可坐若少一隻脚決定是坐不得若不識得時只約摸恁地説兩隻脚也得三隻脚也得到坐時只是坐不得如穿牛鼻絡馬首這也是天理合當如此若絡牛首穿馬鼻定是不得如適來説克已伊川只説個敬今人也知道敬只是不常如此常常如此少間自見得是非道理分明若心下有些子不安穏便不做到得更有一項心下習熟底事却自以為安外來卒未相入底却有不安這便著將前聖所説道理所做様子看教心下是非分明賀孫人看得義理熟時自然好振心熟後自然有見理處熟則心精微不見理只縁是心粗辭達而已矣去偽今人口畧依稀説過不曾心曉淳學者理㑹道理當深沈潜思從周義理儘無窮前人恁地説亦未必盡須是自把來横看竪著儘入深儘有在士毅道理既知縫罅但當窮而又窮不可安于小成而遽止也方子今只是要理㑹道理若理㑹得一分便有一分受用理㑹得二分便有二分受用理㑹得一寸便是一寸一尺便是一尺漸漸理㑹去便多賀孫看得一件是未可便以為是且頓放一所又窮它語相次看得多相比並自然透得徳明道理無窮你要去做又做不辦極力做得三五件又倦了盖是不能包括得許多事人傑大凡義理積得多後貫通了自然見效不是今日理㑹得一件便要做一件用譬如富人積財積得多了自無不如意又如人學作文亦須廣看多後自然成文可觀不然讀得這一件却将來排凑做韓昌黎論為文便也要讀書涵味多後自然好柳子厚云本之于六經云云之意便是要将這一件做那一件便不及韓端䝉只守著一些地做得甚事須用開濶看去天下萬事都無阻礙方可從周大著心胸不可因一説相礙看教平濶四方八面都見方子理㑹道理到衆説紛然處却好定著精神看一看驤看理到快活田地則前頭自磊落地去淳道理有面前底道理平易自在説出来底便好説得出來﨑嶇底便不好節今日且将自家寫得出説得出底去窮䆒士毅今人凡事所以説得恁地支離只是見得不透看道理須是見得實方是有功效處若於上面添些𤣥妙竒特便是見它實理未透道夫理只要理㑹透徹更不理㑹文辭恐未達而便欲已也去偽或問如何是反身窮理曰反身是著實之謂向自家體分上求廣今之學者不曾親切見得而臆度揣摸為説皆助長之病也道理只平看意思自見不須先立説僩便是看義理難又要寛著心又要𦂳著心這心不寛則不足以見其規模之大不𦂳則不足以察其文理一作義之細宻若拘滯于文義少間又不見它大規模處以聖賢之意觀聖賢之書以天下之理觀天下之事人多以私見自去窮理只是你自家所見去聖賢之心尚逺在祖道自家既有此身必有主宰理㑹得主宰然後隨自家力量窮理格物而合做底事不可放過些子因引程子言如行兵當先做活計銖萬理洞開衆理參㑹如説思事親至不可不知天又事親乃能事天之類無不互備方不可去名上理㑹須求其所以然方子事要知其所以然指花斛曰此兩個花斛打破一個一個在若只恁地是人知得説得須知所以破所以不破者如何從周思索譬如穿井不解便得清水先亦須是濁漸漸刮將去却自㑹清賀孫這個物事廣録作道理宻分毫間便相争如不曾下工夫一時去旋揣摸它只是疎濶真個下工夫見得底人説出來自是膠粘旋揣摸得是亦何補士毅廣同只是見不透所以千言萬語費盡心力終不得聖人之意大學説格物都只是要人見得透且如楊氏為我墨氏兼愛它欲以此教人它豈知道是不是只是見不透如釋氏亦設教其徒它豈道自不是只是不曾見得到但知虛而不知虛中有理存焉此大學所以貴窮理也賀孫知只有個真與不真分别如説有一項不可言底知便是釋氏之悞士毅若曰須待見得個道理然後做去則利而行之勉强而行之工夫皆為無用矣頓悟之説非學者所宜盡心也聖人所不道人傑務反求者以博觀為外馳務博觀者以内省為狹隘墮于一偏此皆學者之大病也道夫朱子語類卷九
