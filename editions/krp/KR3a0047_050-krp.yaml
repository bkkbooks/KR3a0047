body:
  text: 朱子語類卷五十論語三十二堯曰篇堯曰咨爾舜章林恭甫問論語記門人問答之辭而堯曰一篇乃記堯舜湯武許多事何也曰不消恁地理㑹文字嘗見説堯曰一篇是夫子誦述前聖之言弟子類記於此先儒亦只是如此説然道理𦂳要却不在這裏義剛楊問簡在帝心何謂簡曰如天檢㸃數過一般善與罪天皆知之爾之有善也在帝心我之有罪也在帝心㝢問雖有周親注紂之至親雖多他衆叛親離那裏有至親曰紂之至親豈不多唯其衆叛親離所以不濟事故書謂紂有億兆夷人離心離德是也㝢興滅國繼絶世舉逸民此聖人之大賞兼弱攻昧取亂侮亡此聖人之大罰子張問政章問欲仁得仁又焉貪如何曰仁是我所固有而我得之何貪之有若是外物欲之則為貪此正與當仁不讓於師同意曰於問政及之何也曰治己治人其理一也廣問猶之與人也出納之吝何以在四惡之數曰此一惡比上三惡似輕然亦極害事葢此人乃是箇多猜嫌疑慮之人賞不賞罰不罰疑吝不決正如唐徳宗是也大雅猶之猶均之也均之猶言一等是如此史家多有此般字問出納之吝是不好所以謂之惡曰此吝字説得來又廣只是戒人多疑不決底意思當賞便用賞當做便用做若遲疑怠忽之間澁縮靳惜便誤事機如李絳勸唐憲宗速賞魏博將士曰若待其來請而後賞之則恩不歸上矣正是此意如唐家藩鎮之患新帥當立朝廷不即命之却待軍中自請而後命之故人不懐恩反致敗事若是有司出納之間吝惜而不敢自專却是本職當然只是人君為政大體則凡事皆不可如此當為處便果決為之僴不知命章論語首云學而時習之不亦說乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎終云不知命無以為君子也此深有意盖學者所以學為君子者不知命則做君子不成死生自有定命若合死於水火須在水火裏死合死於刀兵須在刀兵裏死㸔如何逃得此說雖甚麄然所謂知命者不過如此若這裏信不及才見利便趨見害便避如何得成君子閎祖朱子語類卷五十
