body:
  text: 朱子語類卷六十五易一綱領上隂陽隂陽只是一氣陽之退便是隂之生不是陽退了又别有箇隂生淳隂陽做一箇看亦得做兩箇㸔亦得做兩箇看是分隂分陽两儀立焉做一箇看只是一箇消長文蔚隂陽各有清濁偏正僩隂陽之理有㑹䖏有分䖏事皆如此今浙中學者只説合䖏混一䖏都不理㑹分䖏去偽天地間道理有局定底有流行底淵隂陽有箇流行底有箇定位底一動一静互為其根便是流行底寒暑往来是也分隂分陽兩儀立焉便是定位底天地上下四方是也易有兩義一是變易便是流行底一是交易便是對待底魂魄以二氣言陽是魂隂是魄以一氣言則伸為魂屈為魄義剛方子録云隂陽論推行底只是一箇對峙底則是两箇如日月水火之類是两箇隂陽有相對而言者如東陽西隂南陽北隂是也有錯綜而言者如晝夜寒暑一箇横一箇直是也伊川言易變易也只説得相對底隂陽流轉而已不説錯綜底隂陽交互之理言易須兼此二意體在天地後用起天地先對待底是體流行底是用體静而用動端䝉又一條云隂陽有相對言者如夫婦男女東西南北是也有錯綜言者如晝夜春夏秋冬弦望晦朔一箇間一箇輥去是也季通云陽氣只是六層只管上去上盡後下面空缺䖏便是隂方子方其有陽那裏知道有隂有乾卦那裏知道有坤卦天地間只是一箇氣自今年冬至到明年冬至是他地氣周匝把來折做兩截時前面底便是陽後面底便是隂又折做四截也如此便是四時天地間只有六層陽氣到地面上時地下便冷了只是這六位陽長到那第六位時極了無去䖏上面只是漸次消了上面消了些箇時下面便生了些箇那便是隂這只是箇嘘吸嘘是陽吸是隂喚做一氣固是如此然㸔他日月男女牝牡䖏方見得無一物無隂陽如至微之物也有箇背面若説流行䖏却只是一氣佐淵同徐元震問自十一月至正月方三陽是陽氣自地上而升否曰然只是陽氣既升之後㸔看欲絶便有隂生隂氣將盡便有陽生其已升之氣便散矣所謂消息之理其來無窮又問雷出地奮豫之後六陽一半在地下是天與地平分否曰若謂平分則天却包著地在此不必論因舉康節漁樵問對之説甚好㽦隂陽有以動静言者有以善惡言者如乾元資始坤元資生則獨陽不生獨隂不成造化周流須是並用如履霜堅氷至則一隂之生便如一賊這道理在人如何㸔直㸔是一般道理横㸔是一般道理所以謂之易道夫天地間無兩立之理非隂勝陽即陽勝隂無物不然無時不然寒暑晝夜君子小人天理人欲道夫隂陽不可分先後説只要人去其中自主静隂為主陽為客僩都是隂陽無物不是隂陽淳無一物不有隂陽乾坤至扵至微至細草木禽獸亦有牡牝隂陽康節云坤無一故無首乾無十故無後所以坤常是得一半砥天地之間無往而非隂陽一動一静一語一黙皆是隂陽之理至如揺扇便属陽住扇便属隂莫不有隂陽之理繼之者善是陽成之者性是隂隂陽只是此隂陽但言之不同如二氣迭運此兩相為用不能相無者也至以陽為君子隂為小人則又自夫剛柔善惡而推之以言其徳之異耳繼之者善是已發之理成之者性是未發之理自其接續流行而言故謂之已發以賦受成性而言則謂之未發及其在人則未發者固是性而其所發亦只是善凡此等䖏皆須各随文義所在變通而觀之才拘泥便相梗説不行譬如觀山所謂横㸔成嶺側成峰也謨問自一隂一陽見一隂一陽又各生一隂一陽之象以圖言之两儀生四象四象生八卦節節推去固容易見就天地間著實䖏如何驗得曰一物上又自各有隂陽如人之男女隂陽也逐人身上又各有這血氣血隂而氣陽也如晝夜之間晝陽而夜隂也而晝陽自午後又属隂夜隂自子後又是陽便是隂陽各生隂陽之象學履易字義只是隂陽閎祖易只消道隂陽二字括盡易只是箇隂陽荘生曰易以道隂陽亦不為無見如竒耦剛柔便只是隂陽做了易等而下之如醫技飬生家之説皆不離隂陽二者魏伯陽參同契恐希夷之學有些自其源流㽦至之曰正義謂易者變化之總號代換之殊稱乃隂陽二氣生生不息之理竊見此數語亦説得好曰某以為易字有二義有變易有交易先天圖一邊本都是陽一邊本都是隂陽中有隂隂中有陽便是陽往交易隂隂來交易陽兩邉各各相對其實非此往彼來只是其象如此然聖人當初亦不恁地思量只是畫一箇陽一箇隂毎箇便生兩箇就一箇陽上又生一箇陽一箇隂就一箇隂上又生一箇隂一箇陽只管恁地去自一為二二為四四為八八為十六十六為三十二三十二為六十四既成箇物事便自然如此齊整皆是天地本然之妙元如此但略假聖人手畫出來如乾一索而得震再索而得坎三索而得艮坤一索而得巽再索而得離三索而得兊初間畫卦時也不是恁地只是畫成八箇卦後便見有此象耳義剛問易有交易變易之義如何曰交易是陽交於隂隂交於陽是卦圖上底如天地定位山澤通氣云云者是也變易是陽變隂隂變陽老陽變為少隂老隂變為少陽此是占筮之法如晝夜寒暑屈伸往来者是也又問聖人仰觀俯察或説伏羲見天地竒耦自然之数扵是畫一以為竒所以象陽畫兩以為耦所以象隂恐於方圓之形見得否或説以天是渾淪圓底只是一箇物事地則便有闕陷分裂䖏否曰也不特如此天自是一地自是二凡物皆然盖天之形雖包乎地之外而其氣實透乎地之中地雖是一塊物事在天之中然其中實虚容得天許多氣或引先生注易陽一而實隂二而虚為證曰然所以易中言夫乾其静也專其動也直是以大生焉夫坤其静也翕其動也闢是以廣生焉乾之静專動直都是一底意思他這物事雖大然無間斷只是鶻淪一箇大底物事故曰大生地則静翕動闢便是两箇物事其翕也是两箇物事之聚其闢也是兩箇物事之開他這中間極闊盡容得那天之氣故曰廣生燾龜山過黄亭詹季魯家季魯問易龜山取一張紙畫箇圏子用墨塗其半云這便是易此説極好易只是一隂一陽做出許多般様淵諸公且試㸔天地之間别有甚事只是隂與陽兩箇字看是甚麽物事都離不得只就身上體看纔開眼不是隂便是陽宻拶拶在這裏都不著得别物事不是仁便是義不是剛便是柔只自家要做向前便是陽纔收退便是隂意思纔動便是陽纔静便是隂未消别㸔只是一動一静便是隂陽伏羲只因此畫卦以示人若只就一隂一陽又不足以該衆理於是錯綜為六十四卦三百八十四爻初只是許多卦爻後来聖人又繋許多辭在下如他書則元有這事方説出這箇道理易則未曾有此事先假託都説在這裏如書便有箇堯舜有箇禹湯文武周公出来做許多事便説許多事今易則元未曾有聖人預先説出待人占考大事小事無一能外於此聖人大抵多是垂戒又云雖是一隂一陽易中之辭大抵陽吉而隂凶間亦有陽凶而隂吉者何故盖有當為有不當為若當為而不為不當為而為之雖陽亦凶又云聖人因卦爻以垂戒多是利於正未有不正而利者如云夕惕若厲旡咎若占得這爻必是朝兢夕惕戒謹恐懼可以旡咎若自家不曾如此便自有咎又云直方大不習無不利若占得這爻須是将自身已體看是直是方是大去做某事必得其利若自家未是直不曾方不曾大則無所往而得其利此是本爻辭如此到孔子又自添説了如云敬以直内義以方外本来只是卜筮聖人為之辭以曉人便説許多道理在上今學易非必待遇事而占方有所戒只平居玩味看他所説道理於自家所䖏地位合是如何故云居則觀其象而玩其辭動則觀其變而玩其占孔子所謂學易正是平日常常學之想見聖人之所謂讀異乎人之所謂讀想見胸中洞然於易之理無纎毫蔽䖏故云可以無大過又曰聖人繋許多辭包盡天下之理止縁萬事不離乎隂陽故因隂陽中而推説萬事之理今要占考雖小小事都有如占得不利有攸往便是不可出路利渉大川便是可以乗舟此類不一賀孫問乾卦文言聖人所以重叠四截説在此見聖人學易只管體出許多意思又恐人曉不得故説以示教曰大意只管怕人曉不得故重叠説在裏大抵多一般如云陽在下也又云下也賀孫問聖人所以因隂陽説出許多道理而所説之理皆不離乎隂陽者盖縁所以為隂陽者元本於實然之理曰隂陽是氣纔有此理便有此氣纔有此氣便有此理天下萬物萬化何者不出於此理何者不出於隂陽賀孫問此程先生所以説道天下無性外之物曰如云天地間只是箇感應又如云誠者物之終始不誠無物賀孫程子言易中只是言反復往來上下這只是一箇道理隂陽之道一進一退一長一消反復往来上下於此見之道夫易中説到那陽䖏便扶助推移他到隂䖏便抑遏壅絶他淵問隂何以比小人曰有時如此平㸔之則都好以類言之則有不好然亦只是皮不好骨子却好大抵發生都則是一箇陽氣只是有消長陽長一分下面隂生一分又不是討箇隂来即是陽消䖏便是隂故陽来謂之復復者是本来物事隂来謂之姤姤是偶然相遇䕫孫天下之理單便動兩便静且如男必求女女必求男自然是動若一男一女居室後便定端䝉數石子餘問易數曰都不要説聖人之畫數何以如此譬之草木皆是自然恁地生不待安排數亦是天地間自然底物事才説道聖人要如何便不是了植問理與數曰有是理便有是氣有是氣便有是數盖數乃是分界限䖏又曰天一地二天三地四天五地六天七地八天九地十是自然如此走不得如水數六雪花便六出不是安排做底又曰古者用龜為卜龜背上紋中間有五箇两邉有八箇後有二十四箇亦是自然如此䕫孫問理與數其本也只是一曰氣便是數有是理便有是氣有是氣便有是数物物皆然如水數六雪片也六出這又不是去做將出来他是自恁地如那龜聖人所以獨取他來用時也是這箇物事分外靈嘗有朋友將龜殻來看背上中心有五條文出去成八外面又成二十四皆是自然恁地這又未為巧最是七八九六與一二三四極巧一是太陽餘得箇九在後面二是少隂後面便是八三是少陽後面便是七四是太隂後面便是六無如此恰好這皆是造化自然如此都遏他不住義剛至録云因一二三四便見六七八九在裏面老陽占了第一位便含箇九少隂占第二位便含箇八少陽占第三位便含箇七老隂占第四位便含箇六數不過十惟此一義先儒未曾發先儒但只説得他中間進退而已淵同某嘗問季通康節之數伏羲也曾理㑹否曰伏羲須理㑹過某以為不然伏羲只是據他見得一箇道理恁地便畫出幾畫他也那裏知得疊出來恁地巧此伏羲所以為聖若他也恁地逐一推排便不是伏羲天然意思史記曰伏羲至淳厚作易八卦那裏恁地巧推排賀孫按後劉砥先天圖一段亦與此意同大凡易數皆六十三十六對二十四三十二對二十八皆六十也以十甲十二辰亦湊到六十也鍾律以五聲十二律亦積為六十也以此知天地之數皆至六十為節大雅數三百六十六三百六十天地之正數也此更不可易自餘進退不過六故陽進不過六分人之善亦只進得許多惡亦只退得許多大體畢竟不可易端䝉季通云天下之萬聲出於一闔一闢聲音皆出於乾坤坤音麕以韻脚反之乃見天下之萬理出於一動一静天下之萬數出於一竒一耦天下之萬象出於一方一圓盡只起於乾坤二畫端蒙天下道理只是一箇包兩箇易便只説到八箇䖏住洪範説到十数住五行五箇便有十箇甲乙便是兩箇木丙丁便是兩箇火戊巳便是兩箇土金水亦然所謂兼三才而兩之便都是如此大學中明徳便包得格物致知誠意正心脩身五箇新民便包得齊家治國平天下三箇自暗室屋漏䖏做得去到得無所不周無所不徧都是這道理自一心之微以至於四方之逺天下之大也都只是這箇義剛數只有二只有易是老氏言三亦是二共生三三其子也三生萬物則自此無窮矣後人破之者非揚子雲是三數邵康節是四數皆不及易也楊康節数四孔子数八料得孔子之數又大也季通自謂畧已見之方有氣有形便有數物有衰旺推其始終便可知也有人指一樹問邵先生先生云推未得少頃一葉堕便由此推起盖其旺衰已見方可推其始終推亦只是即今年月日時以起數也楊河圖洛書先生謂甘叔懐曰曾㸔河圖洛書數否無事時好看雖未是要切䖏然玩此時且得自家心流轉得動廣河圖常数洛書變數淵河圖中宫天五乗地十而得七八九六因五得數積五竒五耦而為五十有五淵中數五衍之而各極其數以至於十者一箇衍成十箇五箇便是五十聖人説這數不是只説得一路他説出這箇物事自然有許多様通透去如五竒五耦成五十五又一説六七八九十因五得數是也淵河圖五十五是天地自然之數大衍五十是聖人去這河圖裏面取那天五地十衍出這箇數不知他是如何大槩河圖是自然底大衍是用以揲蓍求卦者淵天地生數到五便住那一二三四遇著五便成六七八九五却只自對五成十淵或問河圖自五之外如何一便成六七八九十曰皆從五過則一對五而成六二對五而成七三對五而成八四對五而成九到末梢五又撞著箇五便成十髙一二三四九八七六最妙一藏九二藏八三藏七四藏六徳明云一得九二得八三得七四得六皆為十也觀河圖可見丙丁合辛壬合之類皆自此推徳明二始者一為陽始二為隂始二中者五六二終者九十五便是十干所始六便是十二律所生圓者星也圓者河圖之數言無那四角底其形便圓以下皆啓䝉圖書淵一與六共宗盖是那一在五下便有那六底數二與七同位是那二在五邊便有七底數淵成數雖陽固亦本㬊作生字之隂也如子者父之隂臣者君之隂淵隂少於陽氣理數皆如此用全用半所以不同淵問前日承教云老陽少隂少陽老隂即除了本身一二三四便是九八七六之數今觀啟䝉陽退隂進之説似亦如此曰他進退亦是自然如此不是人去攅教他進退以十言之即如前説大故分曉若以十五言之九便對六七便對八曉得時也好則劇又問河圖此數控定了先生曰天地只是不㑹説倩他聖人出來説若天地自㑹説話想更説得好在如河圖洛書便是天地畫出底䕫孫所謂得五成六者一纔勾牽著五便是箇六下面都恁地淵老隂老陽所以變者無他到極䖏了無去䖏便只得變九上更去不得了只得變囬來做八六下來便是五生數了也去不得所以却去做七淵河圖洛書於八卦九立早無相著不知如何楊伏羲卦畫先天圖問先生説伏羲畫卦皆是自然不曾用些子心思智慮只是借伏羲手畫出爾唯其出於自然故以之占筮則靈驗否曰然自太極生两儀只管畫去到得後来更畫不迭正如磨麵相似四下都恁地自然撒出来廣伏羲當時畫卦只如擲珓相似無容心易只是隂一陽一其始一隂一陽而已有陽中陽陽中隂有隂中陽隂中隂陽中陽二看上面所得如何再得陽即是故乾一或得隂即是故兊二陽中隂亦看上所得如何或是陽即是所以離三或得隂即是所以震四隂中陽看上面所得如何或得陽即是所以巽五或得隂即是所以坎六隂中隂看上所得如何若得陽即是所以艮七再得隂即是所以坤八看他當時畫卦之意妙不可言文蔚問先天圖隂陽自两邉生若将坤為太極與太極圖不同如何曰他自據他意思說即不曾契勘濓溪底若論他太極中間虚者便是他亦自説圖從中起今不合被横圖在中間塞却待取出放外他两邉生者即是隂根陽陽根隂這箇有對從中出即無對文蔚先天圖如何移出方圖在下曰是某挑出泳又説康節方圖子自西北之東南便是自乾以之坤自東北以之西南便是否以至泰其間有咸恒損益既濟未濟所以又於此八卦見義盖為是自兩角尖射上與乾坤相對不知得怎生恁地巧某嘗説伏羲初只是畫出八卦見不到這裏蔡季通以為不然却説某與太史公一般某問云太史公如何説他云太史公云伏羲至淳厚畫八卦便是某這説㸔來也是聖人淳厚只據見定見得底畫出如伊川説若不因時則一箇聖人出来許多事便都做了砥所問先天圖曲折細詳圖意若自乾一横排至坤八此則全是自然故説卦云易逆數也皆自已生以得未生之卦若如圓圖則須如此方見隂陽消長次第震一陽離兊二陽乾三陽巽一隂坎艮二隂坤三隂雖似稍渉安排然亦莫非自然之理自冬至至夏至為順盖與前逆數者相反皆自未生而反得已生之卦自夏至至冬至為逆盖與前逆數者同其左右與今天文家説左右不同盖從中而分其初若有左右之勢爾自北而東為左自南而西為右灝四象不必説陽向上更合一畫為九方成老陽到兊便推不去了兊下一畫却是八卦不是四象淵隂陽老少以少者為主如震是少陽却竒一耦二淵老隂老陽交而生艮兊少隂少陽交而生震巽離坎不交各得本畫離坎之交是第二畫在生四象時交了老陽過去交隂老隂過來交陽便是兊艮第三畫少隂少陽交便生震巽上第三畫所以知其如此時他這位次相挨傍兼山謂聖人不分别隂陽老少卜史取動爻之後卦故分别老少若如此則卦遂無動占者何所用觀變而玩占淵一卦又各生六十四卦則本卦為内卦所生之卦為外卦是十二爻底卦淵問昨日先生説程子謂其體則謂之易體猶形體也乃形而下者易中只説箇隂陽交易而已然先生又嘗曰在人言之則其體謂之心又是如何曰心只是箇動静感應而已所謂寂然不動感而遂通者是也看那幾箇字便見得因言易是互相博易之義觀先天圖便可見東邊一畫隂便對西邊一畫陽盖東一邊本皆是陽西一邊本皆是隂東邊隂畫皆是自西邊來西邊陽畫都是自東邊来姤在西是東邊五畫陽過復在東是西邊五畫隂過互相博易而成易之變雖多般然此是第一變廣云程子所謂易中只説反復往來上下者莫便是指此言之否曰看得來程子之意又别邵子所謂易程子多理㑹他底不得盖他只據理而説都不曾去問他廣乾坤相為隂陽乾後面一半是陽中之隂坤前面一半是隂中之陽方乾巽一邊為上震随坤為下淵陽上交於隂隂下交於陽而生四象便是隂陽又各生兩畫了隂交剛陽交柔便是隂陽又各生兩畫了就乾兩畫邊看乾兊是老陽離震是少隂就坤兩畫邊看坤艮是老隂坎巽是少陽又各添一畫則八卦全了淵隂下交生陽陽上交生隂隂交陽剛交柔是博易之易這多變是變易之易所謂易者只此便是那箇是易之體這是易之用那是未有這卦底這是有這卦了底那箇喚做體時是這易從那裏生這箇喚做用時揲蓍取卦便是用䖏淵問邵先生説無極之前無極如何説前曰邵子就圖上說循環之意自姤至坤是隂含陽自復至乾是陽分隂復坤之間乃無極自坤反姤是無極之前驤無極之前一段問既有前後須有有無曰本無前後閎祖康節云動静之間是指冬至夏至閎祖安卿問先天圖説曰陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中皆順行何謂也曰圖左一邉属陽右一邉属隂左自震一陽離兊二陽乾三陽為陽在陽中順行右自巽一隂坎艮二隂坤三隂為隂在隂中順行坤無陽艮坎一陽巽二陽為陽在隂中逆行乾無隂兊離一隂震二隂為隂在陽中逆行又問先天圖心法也圖皆自中起萬化萬事生乎心何也曰其中白䖏者太極也三十二隂三十二陽者兩儀也十六隂十六陽者四象也八隂八陽八卦也問圖雖無文終日言之不離乎是何也曰一日有一日之運一月有一月之運一嵗有一嵗之運大而天地之終始小而人物之生死逺而古今之世變皆不外乎此只是一箇盈虚消息之理本是箇小底變成大底到那大處又變成小底如納甲法乾納甲坤納乙艮納丙兊納丁震納庚巽納辛離納壬坎納癸亦是此又如火珠林若占一屯卦則初九是庚子六二是庚寅六三是庚辰六四是戊午九五是戊申上六是戊戌亦是此又如道家以坎離為貴水火為六卦之主而六卦為坎離之用自月初三為震上弦為兊望日為乾望後為巽下弦為艮晦為坤亦不外此又曰乾之一爻属戊坤之一爻属已留戊就已方成坎離盖乾坤是大父母坎離是小父母義剛先天圖更不可易自復至乾為陽自姤至坤為隂以乾坤定上下之位次坎離列左右之門為正以象言之天居上地居下艮為山故居西北兊為澤故居東南離為日故居于東坎為月故居于西震為雷居東北巽為風居西南方子康節天地定位否泰相類詩八句是說方圖中兩交股底且如西北角乾東南角坤是天地定位便對東北角泰西南角否次乾是兊次坤是艮便對次否之咸次泰之損後四卦亦如是共十六卦淵康節乾南坤北離東坎西之說言人立時全見前面全不見後面東西只見一半便似他這箇意思淵先天圖直是精微不起於康節希夷以前元有只是秘而不傳次第是方士軰所相傳授底參同契中亦有些意思相似與厯不相應季通云紐捻将来亦相應也用六日七分某却不見康節説用六日七分䖏文王卦序亦不相應他只用義理排将去如復只用一陽生䖏此只是用物而此也不用生底次第也不應氣候揚雄太𤣥全模倣易他底用三數易却用四數他本是模易故就他模底句上看易也可略見得易意思温公集注中可見也康節云先天圖心法皆從中起且説圎圖又云文王八卦應地之方這是見他不用卦生底次第序四正卦出四角似那方底意思這箇只且恁地無大段分曉證佐未甚安淵易之精微在那兩儀生四象四象生八卦八卦生六十四卦萬物萬化皆從這裏流出緊要䖏在那復姤邉復是陽氣發動之初因舉康節詩冬至子之半六十四卦流布一嵗之中離坎震兊做得那二十四氣每卦當六十四分乾坤不在四正此以文王八卦言也淵先天圖八卦為一節不論月氣先後閎祖先天圖今所冩者是以一嵗之運言之若大而古今十二萬九千六百年亦只是這圏子小而一日一時亦只是這圏子都從復上推起去方子先天圖一日有一箇恁地道理一月有一箇恁地道理以至合元會運世十二萬九千六百嵗亦只是這箇道理且以月言之自坤而震月之始生初三日也至兊則月之上弦初八日也至乾則月之望十五日也至巽則月之始虧十八日也至艮則月之下弦二十三日也至坤則月之晦三十日也廣先天圖與納甲相應故季通言與參同契合以圖觀之坤復之間為晦震為初三一陽生初八日為兊月上弦十五日為乾十八日為巽一隂生二十三日為艮月下弦坎離為日月故不用參同契以坎離為藥餘者以為火候此圖自陳希夷傳來如穆李想只收得未必能曉康節自思量出来故墓誌云云参同契亦以乾坤坎離為四正故其言曰運轂正軸問先天圖卦位自乾一兊二離三右行至震四住揭起巽五作左行坎六艮七至坤八住接震四觀卦氣相接皆是左旋盖乾是老陽接巽末姤卦便是一隂生坤是老隂接震末復卦便是一陽生自復卦一陽生盡震四離三一十六卦然後得臨卦又盡兊二凡八卦然後得泰卦又隔四卦得大壮又隔大有一卦得夬夬卦接乾乾卦接姤自姤卦一隂生盡巽五坎六一十六卦然後得遯卦又盡艮七凡八卦然後得否又隔四卦得觀又隔比一卦得剥剥卦接坤坤接復周而復始循環無端卦氣左旋而一嵗十二月之卦皆有其序但隂陽初生各歴十六卦而後為一月又歴八卦再得一月至隂陽将極䖏只歴四卦為一月又歴一卦遂一併三卦相接其初如此之踈其末如此之宻此隂陽贏縮當然之理歟然此圖於復卦之下書曰冬至子中於姤卦之下書曰夏至午中此固無可疑者獨於臨卦之下書曰春分夘中則臨卦本為十二月之卦而春分合在泰卦之下又於遯卦之下書曰秋分酉中則遯卦本為六月之卦而秋分合在否卦之下昨侍坐復庵聞王講書所說卦氣之論皆世俗淺近之語初無義不可推竊意此圖春分夘中秋分酉中字或恐後人誤隨世俗卦氣之論遂差其次却與文王卦位相合矣不然則離兊之間所以為春坎艮之間所以為秋者必當别有其說曰伏羲易自是伏羲說話文王易自是文王說話固不可以交互求合所看先天卦氣贏縮極仔細某亦嘗如此理㑹來尚未得其說隂陽初生其氣固緩然不應如此之踈其後又却如此之宻大抵此圖布置皆出乎自然不應無說當更共思之謨問伏羲始畫八卦其六十四者是文王後來重之耶抑伏羲已自畫了耶看先天圖則有八卦便有六十四疑伏羲已有彷彿之畫矣如何曰周禮言三易經卦皆八其别皆六十有四便見不是文王漸畫又問然則六十四卦名是伏羲元有抑文王所立曰此不可攷子善問據十三卦所言恐伏羲時已有曰十三卦所謂盖取諸離盖取諸益者言結繩而為網罟有離之象非觀離而始有此也銖問伏羲畫卦恐未是教人卜筮曰這都不可知但他不教人卜筮畫作甚闕朱子語類卷六十五
