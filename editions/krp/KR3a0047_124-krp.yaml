body:
  text: 朱子語類卷一百二十四陸氏性質陸子美精神子静若海問陸梭山同異辨曰若本有却如何掃蕩得若本無却如何建立得他以佛氏亦曉得理如既曉得理後却將一箇空底物事來口頭説時佛不到今日了他自見得一箇道理只是空又日佛也只是理㑹這箇性吾儒也只理㑹這箇性只是他不認許多帶來底節陸子夀自撫來信訪先生於鈆山觀音寺子夀每談事必以論語為證如曰聖人教人居處恭執事敬又曰子所雅言詩書執禮皆雅言也弟子入則孝出則弟謹而信汎愛衆而親仁此等皆教人就實處行何嘗髙也先生曰某舊間持論亦好髙近來漸漸移近下漸漸覺實也如孟子却是將他已到底教人如言存心飬性知性知天有其説矣是他自知得餘人未到他田地如何知得他滋味卒欲行之亦未有入頭處若論語却是聖人教人存心飬性知性知天實涵飬處便見得便行得也大雅陸子夀㸔先生解中庸莫顯乎㣲云㡬微細事也因歎美其説之善曰前後説者連莫見乎隠一滚説了更不見切體處今如此分别却是使人有㸃檢處九齡自覺力弱㝷常非禮念慮因能常常警䇿不使萌於心然志力終不免有怠時此殆所謂㡬㣲處須㸃檢也先生曰固然大雅問曾見陸子夀志道據徳説否曰未也其説如何曰大槩亦好必大因説陸子静謂江南未有人如他八字著脚文蔚叔器問象山師承曰它們天資也髙不知師誰然也不問師傳學者多是就氣稟上做便解偏了義剛符舜功問陸子静君子喻於義口義曰子静只是拗伊川云惟其深喻是以篤好子静必要云好後方喻㸔來人之於義利喻而好也多若全不曉又安能好然好之則喻矣畢竟伊川説占得多璘因説陸先生每對人説有子非後學急務以其説不合有多節目不直截某因謂是比聖人言語較緊且如孝弟之人豈解犯上又更作亂曰人之品不同亦自有孝弟之人解犯上者自古亦有作亂者聖賢言語寛平不消如此急迫㸔振問象山言本立而道生多却而字曰聖賢言語一歩是一歩近來一種議論只是跳躑初則兩三歩做一歩甚則十數歩作一歩又甚則千百歩作一歩所以學之者皆顛狂方子先生問賀孫再㸔論語前面見得意思如何曰初㸔有未通處今㸔得通如孝弟為仁之本一章初㸔未甚透今却㸔得分曉先生曰如此等説話陸象山都不㸔凡是諸弟子之言便以為不是而不足㸔其無細心㸔聖賢文字如此凡説未得處便將箇硬説闢倒了不消㸔後生纔入其門便學得許多不好處便悖慢無禮便説亂道更無禮律只學得那許多凶暴可畏可畏不知如何學他許多不好恁地快賀孫又問孝弟為仁之本集注云學者務此則仁道自此而生此字亦只指孝悌先生曰覺此句亦欠本立字賀孫云上文已説孝弟乃是行仁之本先生曰此段若無程先生説終無人理㑹得透㸔楊謝諸説如何是理㑹得謝説更乖孝弟非仁乃近仁也不知孝弟非仁孝弟是甚麽物事孝弟便是仁非孝弟外别有仁非仁外别有孝弟如諸公説將體用一齊都沒理㑹了賀孫有自象山來者先生問子静多説甚話曰恰如時文相似只連片滚將去曰所説者何曰他只説天地之性人為貴人為萬物之靈人所以貴與靈者只是這心其説雖詳多只恁滚去先生曰信如斯言雖聖賢復生與人説也只得恁地自是諸公以時文之心觀之故見得它箇是時文也便若時文中説得恁地便是聖賢之言也公也須自反豈可放過道夫陸子静説良知良能四端等處且成片舉似經語不可謂不是但説人便能如此不假脩為存飬此却不得譬如旅寓之人自家不能送他回鄉但與説云你自有田有屋大段快樂何不便回去那人既無資送如何便回去得又如脾胃傷弱不能飲食之人却硬要將飯將肉塞入他口不問他喫得與喫不得若是一頓便理㑹得亦豈不好然非生知安行者豈有此理便是生知安行也須用學大抵子思説率性孟子説存心養性大段説破夫子更不曾説只説孝弟忠信篤敬盖能如此則道理更在其中矣人傑至之問告子不得於言勿求於心先生云陸子静不著言語其學正似告子故常諱這些子至之云陸常云人不惟不知孟子髙處也不知告子髙處先生語陸云試説㸔陸只鶻突説過先生因語諸生云陸子静説告子也髙也是他尚不及告子告子將心硬制得不動陸遇事未必皆能不動植子静常言顔子悟道後於仲弓又曰易繫決非夫子作又曰孟子無奈告子何陳正已錄以示人先生申言曰正已也乖道夫江西士風好為竒論恥與人同每立異以求勝如陸子静説告子論性强孟子又説荀子性惡之論甚好使人警發有縝宻之功昔荆公参政日作兵論藁壓之硯下劉貢父謁見值客徑坐於書院竊取視之可學錄云皆記得又頓放元處既而以未相見而坐書院為非遂出就客次及相見荆公問近作貢父近以作兵論對乃竊荆公之意而易其文以誦之可學錄云荆公出論兵貢父依荆公兵論説曰某䇿如此荆公退碎其硯下之藁以為所論同於人也可學錄作焚之好異惡同如此皆是江西之風如此淳可學錄畧金溪説充塞仁義其意之所指似别有一般仁義非若㝷常他人所言者也必大陸子静學者欲執喜怒哀樂未發之中不知如何執得那事來面前只得應他當喜便喜當怒便怒如何執得文蔚陸子静説只是一心一邊屬人心一邊屬道心那時尚説得好在節先生謂祖道曰陸子静闕賢書説箇簡易字却説錯了乾以易知坤以簡能是甚意思如何只容易説過了乾之體健而不息行而不難故易坤則順其理而不為故簡不是容易苟簡也祖道某向與子静説話子静以為意見某曰邪意見不可有正意見不可無子静説此是閒議論某曰閒議論不可議論合議論則不可不議論先生又曰大學不曾説無意而説誠意若無意見將何物去擇乎中庸將何物去察邇言論語無意只是要無私意若是正意則不可無先生又曰他之無意見則是不理㑹理只是胡撞將去若無意見成甚麽人在這裏節或問陸子静每見學者才有説話不曰此只是議論即曰此只是意見果如是則議論意見皆可廢乎曰既不尚議論則是黙然無言而已既不貴意見則是寂然無思而已聖門問學不應如此若曰偏議論私意見則可去不當槩以議論意見為可去也柄有一學者云學者須是除意見陸子静説顔子克己之學非如常人克去一切忿欲利害之私盖欲於意念所起處將來克去先生痛加誚責以為此三字誤天下學者自堯舜相傳至歴代聖賢書冊上並無此三字某謂除去不好底意見則可若好底意見須是存留如飢之思食渴之思飲合做底事思量去做皆意見也聖賢之學如一條大路甚次第分明縁有除意見横在心裏便更不去做如日間所行之事想見只是不得已去做才做便要忘了生怕有意見所以目視霄漢悠悠過日下梢只成得箇狂妄今只理㑹除意見安知除意見之心又非所謂意見乎人傑陸子静説克己復禮云不是克去己私利欲之類别自有箇克處又却不肯説破某嘗代之下語云不過是要言語道斷心行路絶耳因言此是䧟溺人之深坑學者切不可不戒廣因㸔金溪與胡季随書中説顔子克己處曰㸔此兩行議論其宗㫖是禪尤分曉此乃捉着真贓正賊惜方見之不及與之痛辯其説以忿欲等皆未是己私而思索講習却是大病乃所當先治者如禪家乾屎橛等語其上更無意義又不得别思義理將此心都禁遏定乆乆忽自有明快處方謂之得此之謂失其本心故下梢忿欲紛起恣意猖獗如劉淳叟軰所為皆彼自謂不妨者也杲老在徑山僧徒苦其使性氣沒頭腦甚惡之又戀着他禪嘗有一僧云好捉倒剝去衣服尋㸔他禪是在左脅下是在右脅下待㝷得見了好與奪下却趕將出門去杲老所喜皆是粗踈底人如張子韶唐立夫諸公是也汪聖錫吕居仁軰稍謹愿痛被他薄賤汪文為人淳厚趕張子韶軰不得又有許多記問經史典故又自有許多鶻突學問義理又戀著鶻突底禪羣疑塞胸都沒分曉不自反躬窮䆒只管上求下告問他討禪被他恣意相薄汪文嘗謂某云杲老禪學實自有好處某問之曰侍郎曾䆒見其好處否又却云不曾今金溪學問真正是禪欽夫伯恭縁不曾㸔佛書所以㸔他不破只某便識得他試將楞嚴圓覺之類一觀亦可粗見大意釋氏之學大抵謂若識得透應千罪惡即都無了然則此一種學在世上乃亂臣賊子之三窟耳王履道做盡無限過惡遷謫廣中剗地在彼説禪非細此正謂其所為過惡皆不礙其禪學爾必大舜功云陸子静不喜人説性曰怕只是自理㑹不曾分曉怕人問難又長大了不肯與人商量做一截截斷了然學而不論性不知所學何事璘聖賢教人有定本如博學審問謹思明辨篤行是也其人資質剛柔敏鈍不可一槩論其教則不易禪家教更無定今日説有定明日又説無定陸子静似之聖賢之教無内外本末上下今子静却要理㑹内不管外面却無此理硬要轉聖賢之説為他説寧若爾説且作爾説不可誣罔聖賢亦如此泳周公謹記陸子静云涵飬是主人翁省察是奴婢陳正已力排其説曰子静之説無定常要云今日之説自如此明日之説自不如此大抵他只要拗才見人説省察他便反而言之謂須是涵飬若有人向他説涵飬他又言須是省察以勝之自渠好為訶佛罵祖之説致令其門人以夫子之道反害夫子璘吾儒頭項多思量着得人頭痺似陸子静様不立文字也是省事只是那書也不是分外底物事都是説我這道理從頭理㑹過更好僴汪長孺説江西所説主静㸔其語是要不消主這静只我這裏動也静静也静先生曰若如其言天自春了夏夏了秋秋了冬自然如此也不須要輔相裁成始得賀孫江西之學無了惻隠辭遜之心但有羞惡之心然不羞其所當羞不惡其所當惡有是非之心然是其所非非其所是方子潘恭叔説象山説得如此待應事都應不是曰可知是他所學所説盡是杜撰都不依見成格法他應事也只是杜撰如何得合道理賀孫陸氏㑹説其精神亦能感發人一時被它聳動底亦便清明只是虚更無底簟思而不學則殆正謂無底簟便危殆也山上有木漸君子以居賢徳善俗有堦梯而進不患不到今其徒往往進時甚鋭然其退亦速纔到退時便如墜千仞之淵􅓌頃有一朋友作書與陸子静言立之學蕩而無所執陸復書言蕩本是好語君子坦蕩蕩堯蕩蕩無能名詩云蕩蕩上帝書云王道蕩蕩皆以蕩為善豈可以為不善邪其怪如此僴向見陸子静與王順伯論儒釋某嘗竊笑之儒釋之分只争虚實而已如老氏亦謂恍兮惚兮其中有物窈兮冥兮其中有精所謂物精亦是虛吾道雖有寂然不動然其中粲然者存事事有節先生問人傑别後見陸象山如何曰在都下相處一月議論間多不合因舉戊戌春所聞於象山者多是分别集義所生非義襲而取之兩句曰彼之病處正在此其説集義却是義襲彼之意盖謂學者頁是自得於己不為文義牽制方是集義若以此為義從而行之乃是求之於外是義襲而取之也故其弊自以為是自以為髙而視先儒之説皆與己不合至如與王順伯書論釋氏義利公私皆説不著盖釋氏之言見性只是虛見儒者之言性止是仁義禮智皆是實事今專以義利公私斷之宜順伯不以為然也人傑㽦錄詳問正淳陸氏之説如何曰癸卯相見某於其言不無疑信相半曰信是信甚處疑是疑甚處曰信其論學疑其訶詆古人曰須是當靣與它随其説上討箇分曉若一時不曾分䟽得乃欲續後於書問間議論只是説得皮外一層只是皮外答來越不分曉若是它論學處是則其它説話皆是便攻訶古人今人亦無有不是處若是它訶詆得古人不是便是它説得學亦不是向來見子静與王順伯論佛云釋氏與吾儒所見亦同只是義利公私之間不同此説不然如此却是吾儒與釋氏同一箇道理若是同時何緣得有義利不同只彼源頭便不同吾儒萬理皆實釋氏萬理皆空又曰它㝷常要説集義所生者其徒包敏道至説成襲義而取却不説義襲而取之它説如何正淳曰它説須是實得如義襲只是强探力取曰謂如人心知此義理行之得宜固自内發人性質有不同或有魯鈍一時見未到得别人説出來反之於心見得為是而行之是亦内也人心所見不同聖人方見得盡今陸氏只是要自渠心裏見得底方謂之内若别人説底一句也不是才自别人説出便指為義外如此乃是告子之説如生而知之與學而知之困而知之安而行之與利而行之勉强而行之及其知之行之則一也豈可一一須待自我心而出方謂之内所以指文義而求之者皆不為内故自家才見得如此便一向執著將聖賢言語便亦不信更不去講貫只是我底是其病痛只在此只是專主生知安行而學知以下一切皆廢又只管理會一貫理㑹一且如一貫只是萬理一貫無内外本末隠顯精粗皆一以貫之此政同歸殊塗百慮一致無所不備今却不教人恁地理㑹却只㝷箇一不知去那裏討頭處㽦必大錄云先生㸔正淳與金溪往復書云云釋氏皆空之下有曰學所以貴於􅊰書是要入細理㑹今陸氏只管説一貫夫一貫云者是舉萬殊而一貫之小大精粗隠顯本末皆在其中若都廢置不講却一貫箇甚麽學要大綱涵飬子細􅊰論嘗與金溪辨義外之説某謂事之合如此者雖是在外然於吾心以為合如此而行便是内也且如人有性質魯鈍或一時見不到因他人説出來見得為是從而行之亦内也金溪以謂此乃告子之見直須自得於己者方是若以他人之説為義而行之是求之於外也遂於事當如此處亦不如此不知此乃告子之見耳必大因言金溪有云不是教人不要讀書讀書自是􅊰學中一事纔説讀書已是剰此一句曰此語却是必大又言其學在踐履之説曰此言雖是然他意只是要踐履他之説耳禪學熾則佛氏之説大壊緣他本來是大段着工夫收拾這心性今禪説只恁地容易做去佛法固是本不見大底道理只就他本法中是大段細宻今禪説只一向麄暴陸子静之學㸔他千般萬般病只在不知有氣禀之雜把許多麄惡底氣都把做心之妙理合當恁地自然做將去向在鈆山得他書云㸔見佛之所以與儒異者止是他底全是利吾儒止是全在義某答他云公亦只見得第二著㸔他意只説儒者絶斷得許多利欲便是千了百當一向任意做出都不妨不知初自受得這氣禀不好今才恁意發出許多不好底也只都做好商量了只道這是胸中流出自然天理不知氣有不好底夾雜在裏一齊滚將去道害事不害事㸔子静書只見他許多麄暴底意思可畏其徒都是這様才説得㡬句便無大無小無父無兄只我胸中流出底是天理全不著得些工夫㸔來這錯處只在不知有氣稟之性又曰論性不論氣不備孟子不説到氣一截所以説萬章與告子㡬箇然終不得他分曉告子以後如荀揚之徒皆是把氣做性説了賀孫迎而距之謂陸氏不窮理方子子静應無所住以生其心閎祖子静尋常與吾人説話㑹避得箇禪字及與其徒却只説禪自脩呉仁父説及陸氏之學曰只是禪初間猶自以吾儒之説蓋覆如今一向説得熾不復遮䕶了渠自説有見於理到得做處一向任私意做去全不睹是人同之則喜異之則怒至任喜怒胡亂便打人罵人後生纔登其門便學得不遜無禮出來極可畏世道衰微千變百恠如此可畏可畏木之陸子静之學自是胸中無柰許多禪何㸔是甚文字不過假借以説其胸中所見者耳據其所見本不須聖人文字得他却須要以聖人文字説者此正如販鹽者上靣須得數片鮝魚遮盖方過得關津不被人捉了耳廣先生嘗説陸子静楊敬仲自是十分好人只似患浄潔病底又論説道理恰似閩中販私鹽底下靣是私鹽上靣以鮝魚盖之使人不覺盖謂其本是禪學却以吾儒説話遮掩過為學若不靠實便如釋老談空又却不如他説得索性又曰近來諸處學者談空浩瀚可畏可畏引得一軰江西士人都顛了浩陸子静好令人讀介甫萬言書以為渠此時未有異説不曉子静之意璘因言讀書之法曰一句有一句道理窮得一句便得這一句道理讀書須是曉得文義了便思量聖賢意指是如何要將作何用因坐中有江西士人問為學曰公門都被陸子静誤教莫要讀書誤公一生使公到今已老此心倀倀然如村愚瞽盲無知之人撞牆撞壁無所知識使得這心飛揚跳躑𣺌𣺌茫茫都無所主若渉大水浩無津涯少間便㑹失心去何故下此一等只㑹失心别無合殺也傅子淵便是如此子淵後以䘮心死豈有學聖人之道臨了却反有失心者是甚道理吁誤人誤人可悲可痛分明是被他塗其耳目至今猶不覺悟今教公之法只討聖賢之書逐日逐段分明理㑹且降伏其心遜志以求之理㑹得一句便一句理明理㑹得一段便一段義明積累乆之漸漸曉得近地有朋友便與近地朋友商量近地無朋友便逺求師友商量莫要閒過日子在此住得旬日便做旬日工夫公㸔此間諸公每日做工夫都是逐段逐句理㑹如此乆之須漸見些道理公今只是道聼塗説只要説得待若聖賢之道只是説得嬴何消做工夫只半日便説盡了博學審問謹思明辨是理㑹甚事公今莫問陸刪定如何只認問取自己便了陸刪定還替得公麽陸刪定他也須讀書來只是公那時見他不讀書便説他不讀書他若不讀書如何做得許多人先生吁誤人誤人又曰從陸子靜者不問如何箇箇學得不遜只纔從他門前過便學得悖慢無禮無長少之節可畏可畏僴象山死先生率門人往寺中哭之既罷良乆曰可惜死了告子此語得之文卿泳因論南軒欲曾節夫往見陸先生作書令去㸔陸如何有何説備寄來先生曰只須直説如此則便謂教我去㸔如何便不能有益了揚因問陸子静云這箇只争些子才差了便如此他只是差過去了更有一項却是不及若使過底抝轉來却好不及底䟎向上去却好只縁他纔髙了便不肯下纔不及了便不肯向上過底便道只是就過裏靣求箇中不及底也道只就不及裏靣求箇中初間只差了些子所謂差之毫釐繆以千里又曰如伯夷之清栁下恵之和孟子便説道隘與不恭君子不由如孔子説逸民伯夷叔齊這已是甚好了孔子自便道我則異於是無可無不可又曰某㸔近日學問髙者便説做天地之外去卑者便只管䧟溺髙者必入於佛老卑者必入於管商定是如此定是如此賀孫曹叔逺問陸子静教人合下便是如何曰如何便是公㸔經書中還有此様語否若云便是夫子當初引帶三千弟子日日説來説去則甚何不云你都是了各自去休也須是做工夫始得又問或有性識明底合下便是後如何曰須是有那地位方得如舜與木石俱與鹿豕遊及聞一善言見一善行沛然若決江河莫之能禦須是有此地位方得如堯舜之道孝悌不成説才孝悌便是堯舜須是誦堯言行堯行真箇能徐行後長方是下二條詳問陸象山道當下便是曰㸔聖賢教人曾有此等語無聖人教人皆從平實地上做去所以克己復禮天下歸仁須是先克去己私方得孟子雖云人皆可以為堯舜也須是服堯之服誦堯之言行堯之行方得聖人告顔子以克己復禮告仲弓以出門如見大賔使民如承大祭告樊遲以居處恭執事敬與人忠告子張以言忠信行篤敬這箇是説甚底話又平時告弟子也須道是學而時習行有餘力則以學文又豈曾説箇當下便是底語大抵今之為學者有二病一種只當下便是底一種便是如公平日所習底却是這中間一條路不曾有人行得而今人既不能知但有聖賢之言可以引路聖賢之言分分曉曉八字打開無些子回互隠伏説話卓或問陸象山大要説當下便是與聖人不同處是那裏曰聖人有這般説話否聖人不曾恁地説聖人只説克己復禮一日克己復禮天下歸仁而今截斷克己復禮一段便道只恁地便了不知聖人當年領三千來人積年累嵗是理㑹甚麽何故不説道才見得便教他歸去自理㑹便了子静如今也有許多人來從學亦自長乆相聚還理㑹箇甚麽何故不教他自歸去理㑹只消恁地便了且如説堯舜之道孝悌而已矣似易須是做得堯許多工夫方到得堯須是做得舜許多工夫方到得舜又曰某㸔來如今説話只有兩様自淮以北不可得而知自淮以南不出此兩者如説髙底便如當下便是之説世間事事都不管這箇本是專要成已而不要去成物少間只見得上靣許多道理切身要𦂳去處不曾理會而終亦不足以成已如那一項却去許多零零碎碎上理㑹事事要曉得這箇本是要成物而不及於成已少間只見得下靣許多羅羅嘈嘈自家自無箇本領自無箇頭腦了後去更不知得那箇直是是那箇直是非都恁地鶻鶻突突終於亦不足以成物這是兩項如此真正一條大路却都無人識這箇只逐一次第行將去那一箇只是過那一箇只是不及到得聖人大道只是箇中然如今人説那中也都説錯了只説道恁地含含胡胡同流合汙便喚做中這箇中本無他只是平日應事接物之間每事理㑹教盡教恰好無一毫過不及之意賀孫陸子静之學只管説一箇心本來是好底物事上靣著不得一箇字只是人被私欲遮了若識得一箇心了萬法流出更都無許多事他却是實見得箇道理恁地所以不怕天不怕地一向胡呌胡喊又曰如東萊便是如何云云不似他見得恁地直拔俊偉下梢東萊學者一人自執一説更無一人守其師説亦不知其師𦂳要處是在那裏都只恁地衰塌不起了其害小他學者是見得箇物事便都恁底胡呌胡説實是卒動他不得一齊恁地無大無小便是天上天下惟我獨尊若我見得我父不見得便是父不似我兄不見得便是兄不似我更無大小其害甚大不待至後世即今便是又曰南軒初年説却有些似他如嶽麓書院記却只恁地説如愛牛如赤子入井這箇便是真心若理㑹得這箇心了都无事後來説却不如此子静却雜些禪又有術數或説或不説南軒却平直恁地説却逢人便説又曰浙中之學一種只説道理底又不似他實見得若不識又不肯道我不識便含胡鶻突遮盖在這裏又因説人之喜怒憂懼皆是人所不能無者只是差些便不正所以學者便要於此處理㑹去其惡而全其善今他只説一箇心便都道是了如何得雖曾子顔子是著多少氣力方始庶㡬其萬一又曰孟子更説甚性善與浩然之氣孔子便全不説便是怕人有走作只教人克己復禮到克盡己私復還天理處自是實見得這箇道理便是貼實底聖賢他只是恁地了便是聖賢然無這般顛狂底聖賢聖人説克己復禮便是真實下工夫一日克己復禮施之於一家則一家歸其仁施之一鄉則一鄉歸其仁施之天下則天下歸其仁是真實從手頭過如飲酒必醉食飯必飽他們便説一日悟得克己復禮想見天下歸其仁便是想像飲酒便能醉人恰似説如飲醇醪意思又曰他是㑹説得動人使人都恁地快活便㑹使得人都恁地發顛發狂某也㑹恁地説使人便快活只是不敢怕壊了人他之説却是使人先見得這一箇物事了方下來做工夫却是上達而下學與聖人下學上達都不相似然他才見了便發顛狂豈肯下來做若有這箇直截道理聖人那裏教人恁地歩歩做上去賀孫許行父謂陸子静只要頓悟更無工夫曰如此説不得不曾見他病處説他不倒大抵今人多是望風便罵將去都不曾根䆒到底見他不是須子細推原怎生不是始得此便是窮理既知他不是處須知是處在那裏他既錯了自家合當如何方始有進子静固有病而今人却不曾似他用功如何便説得他所謂五穀不熟不如稊稗恐反為子静之笑也且如㸔史傳其間有多少不是處見得他不是便有箇是底在這裏所以無往非學閎祖先生問曾見陸子静否可學對以向在臨安欲往見或云吾友方學不可見見歸必學参禪先生曰此人言極有理吾友不去見亦是然更有一説須修身立命自有道理則自不走往他若自家無所守安知一旦立脚得牢正如人有屋可居見他人有屋宇必不起健羨若是自家自無住處忽見人有屋欲借自家自家雖欲不入安得不入切宜自作工夫可學守約問吾徒有往從陸子静者多是舉得這下些小細碎文義致得子静謂先生教人只是章句之學都無箇脱洒道理其實先生教人豈曾如此又有行不掩其言者愈招他言語先生曰不消得如此説是他行不掩言自家又奈何得他只是自㸃檢教行掩其言便得㸔自家平日是合當恁地不當恁地不是因他説自家行不掩言方始去行掩其言而今不欲窮理則己若欲窮理如何不在讀書講論今學者有㡬箇理㑹得章句也只是渾淪吞棗終不成又學他於章句外别撰一箇物事與他鬭又曰某也難説他有多多少少某都不敢説他只是因諸公問不得不説他是向一邊去抝不轉了又不信人言語又怎奈何他自家只是理㑹自家是合當做聖人説言忠信行篤敬居處恭執事敬與人忠等語都是實説鐡定是恁地無一句虛説只是教人就這上做工夫做得到便是道理賀孫學者須是培飬今不做培飬工夫如何窮得理程子言動容貎整思慮則自生敬敬只是主一也存此則自然天理明又曰整齊嚴肅則心便一一則自是無非僻之干此意但涵飬乆之則天理自然明今不曾做得此工夫胸中攪擾駁雜如何窮得理如它人不讀書是不肯去窮理今要窮理又無持敬工夫從陸子静學如楊敬仲軰持守得亦好若肯去窮理須窮得分明然它不肯讀書只任一己私見有似箇稊稗今若不做培飬工夫便是五榖不熟又不如稊稗也次日又言陸子静楊敬仲有為己工夫若肯窮理當甚有可觀惜其不改也徳明論子由古史言帝王以無為宗因言佛氏學只是任它意所為於事無有是處徳明云楊敬仲之學是如此先生曰佛者言但願空諸所有謹勿實諸所無事必欲忘却故曰但願空諸所有心必欲其空故曰謹勿實諸所無楊敬仲學於陸氏更不讀書是要不實諸所無已讀之書皆欲忘却是要空諸所有徳明至之舉似楊敬仲詩云有時父召急趨前不覺不知造淵奥此意如何曰如此却二了有箇父召急趨底心又有箇造淵奥底心纔二便生出無限病痛盖這箇物事知得是恁地便行將去豈可更帖著一箇意思在那上某舊見張子韶有箇文字論仁義之實云當其事親之時有以見其溫然如春之意便是仁當其從兄之際有以見其肅然如秋之意便是義某嘗對其説古人固有習而不察如今都是畧畧地習却加意去察古人固有由之而不知如今却是畧畧地由却加意去知因笑云李先生見某説忽然曰公適間説得好可更説一遍㸔道夫楊敬仲有易説雷霆事身上又安得有且要着實可學楊敬仲説陽爻一畫者在已隂爻一畫者應物底是先生云正是倒説了應物者却是陽泳楊敬仲言天下無掣肘底事沈叔晦言天下無不可教底人先生云此皆好立偏論者振楊敬仲有易論林黄中有易解春秋解專主左氏或曰林黄中文字可毁先生曰却是楊敬仲文字可毁泳撫學有首無尾婺學有尾無首禪學首尾皆無只是與人説泳有説悟者有説端倪者若説可欲是善不可欲是悪而必自㝷一箇道理以為善根脚虛矣非鄉人皆可為堯舜之意説悟者指金溪説端倪者指湖南人傑因論今之言學問者人自為説説出無限差異胡文定曰首有一二句記不詳諸子百家人肆其説誑惑衆生者是也謝上蔡曰諸子百家人人自生出一般見解欺誑衆生必大彭世昌守象山書院盛言山上有田可耕有圃可蔬池塘碓磑色色皆備先生曰既是如此下山來則甚世昌曰陸先生既有書院却不曾藏得書某此來為欲求書曰𦂳要書能消得㡬卷某向來亦愛如此後來思之這般物事聚者必散何必後於物世昌臨别贈之詩曰象山聞説是君開雲水參天瀑響雷好去山頭且堅坐等閒莫要下山來文蔚朱子語類卷一百二十四
