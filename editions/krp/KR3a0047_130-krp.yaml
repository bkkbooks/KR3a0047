body:
  text: 朱子語類卷一百三十本朝四自熈寧至靖康人物問荆公得君之故曰神宗聰明絶人與羣臣説話往往領畧不去才與介甫説便有於吾言無所不説底意思所以君臣相得甚懽向見何萬一之少年時所著數論其間有説云本朝自李文靖公王文正公當國以來廟論主於安靜凡有建明便以生事歸之馴至後來天下弊事極多此説甚好且如仁宗朝是甚次第時節國勢却如此緩弱事多不理英宗即位已自有性氣要改作但以聖躬多病不久晏駕所以當時諡之曰英神宗繼之性氣越𦂳尤欲更新之便是天下事難得恰好却又撞著介甫出來承當所以作壞得如此又曰介甫變法固有以召亂後來又却不别去整理一向放倒亦無縁治安儒用以下荆公論王荆公遇神宗可謂千載一時惜乎渠學術不是後來直壊到恁地問荆公初起便挾術數為後來如此曰渠初來只是要做事到後面為人所攻便無去就不觀荆公日錄無以知其本末它直是强辨邈視一世如文潞公更不敢出一語問溫公所作如何曰渠亦只見荆公不是便倒一邊如東坡當初議論亦要變法後來皆改了又問神宗元豐之政又却不要荆公曰神宗盡得荆公許多伎倆更何用他到元豐間事皆自做只是用一等庸人備左右趨承耳又問明道横渠初見時皆許以峻用後來乃如此莫是荆公説已行故然曰正如吾友適説徐子宜上殿極䝉褒奬然事却不行曰設使横渠明道用於當時神宗盡得其學他日還自做否曰不然使二先生得君却自君心上為之正要大家商量以此為根本君心既正他日雖欲自為亦不可又云富韓公召來只是要去語人云入見上坐亦不定豈能做事某云韓公當仁廟再用時與韓魏公在政府十餘年皆無所建明不復如舊時曰此事㸔得極好當記取又問使范文正公當此定不肯回曰文正却不肯回須更精宻似前日可學荆公初作江東提刑回來奏事上萬言書其間一節云今之小官俸薄不足以飬亷必當有以益之然當今財用匱乏而復為此論人必以為不可行然天下之財未嘗不足特不知生財之道無善理財之人故常患其不足神宗甚善其言後來纔作参政第二日便專措置理財徧置囬易庫以籠天下之利謂周禮泉府之職正是如此却不知周公之制只為天下之貨有不售則商旅留滯而不能行故以官錢買之使後來有欲買者官中却給與之初未嘗以此求利息也時舉云凡國之財用取具焉則是國家有大費用皆給於此豈得謂之不取利耶朝廷財用但可支常費耳設有變故之來定無可以應之曰國家百年承平其實規模未立特幸其無事耳若有大變豈能支耶神宗一日聞回易庫之細賣甚果子之類因云此非朝廷之體荆公乃曰國家分置有司正欲領其繁細若回易庫中雖一文之物亦當不惮出納乃有司之職非人君所當問若人君問及此則乃為繁碎而失體也其説甚髙故神宗信之時舉新法之行諸公實共謀之雖明道先生不以為不是盖那時也是合變時節但後來人情洶洶明道始勸之以不可做逆人情底事及王氏排衆議行之甚力而諸公始退散道夫問新法之行雖塗人皆知其有害何故明道不以為非曰自是王氏行得來有害若使明道為之必不至恁地狼狽問若專用韓富則事體如何曰二公也只守舊専用溫公如何曰他又别是一格又問若是二程出來擔負莫須别否曰若如明道十事須還他全别方得只㸔他當時薦章謂其志節慷慨云云則明道豈是循常蹈故塊然自守底人道夫吕氏家傳載荆公當時與申公極相好新法亦皆商量來故行新法時甚望申公相助又用明道作條例司皆是望諸賢之助是時想見其意好後來盡背了初意所以諸賢盡不從明道行狀不載條例司事此却好分明載其始末神宗嘗問明道云王安石是聖人否明道曰公孫碩膚赤舄几几聖人氣象如此王安石一身尚不能治何聖人為先生曰此言最説得荆公著荆公徳行學則非若海先生論荆公之學所以差者以其見道理不透徹因云洞視千古無有見道理不透徹而所説所行不差者但無力量做得來半上落下底則其害淺如庸醫不識病只胡亂下那沒𦂳要底藥便不至於殺人若荆公軰他硬見從那一邊去則如不識病證而便下大黄附子底藥便至於殺人燾劉叔通言王介甫其心本欲捄民後來㺯壊者乃過誤致然曰不然正如醫者治病其心豈不欲活人却將砒霜與人喫及病者死却云我心本欲捄其病死非我之罪可乎介甫之心固欲捄人然其術足以殺人豈可謂非其罪僴因語荆公陸子静云他當時不合於法度上理㑹語之云法度如何不理㑹只是他所理㑹非三代法度且居甫問荆公節儉恬退素行亦好曰他當時作此事已不合中如孔子於飲食衣服之間亦豈務滅裂它當初便只苟簡要似一苦行然某問明道共改之説亦是權曰是權若從所説縱未十分好亦不至如它日之甚問章子厚説溫公以母改子不是此説却好曰當時亦是溫公見得事急且把做題目問溫公當路却亦如荆公不通商量曰溫公亦只是見得前日不是己又已病急欲救世耳哲宗於宣仁有憾故子厚軰得入其説如親政次日即召中官范淳夫䟽拳拳君臣之間只説到此向上去不得其如之何問宣仁不還政如何曰王彦霖繫年錄一段可見當對宣仁論君子小人彦霖云太皇於宫中須説與皇帝曰亦屢説孫兒都未理㑹得觀此一節想是以未可分付故不放下宣仁性極剛烈蔡新州之事行遣極重曰當時若不得范忠宣救殺了他他日諸公禍又重曰頼有此耳又問韓師朴曾子宣建中事如何曰渠二人却要和曾子宣日錄極見渠心迹當時商量云左除却軾轍右除却京卞此意亦好後來元祐人漸多頗攻其短子宣却反悔師朴無如之何又問蔡京之來乃師朴所引欲以傾子宣曰京入朝師朴遣子迎之十里子宣却遣子迎之二十里京既入和二人皆打出可學或錄云韓師朴是箇鶻突的人薦蔡京欲使之排曾子宣云云汪聖錫嘗問某云了翁政日録其説是否應之曰不是曰如何不是曰若言荆公學術之繆見識之差誤神廟委任則可壯祖錄云若言荆公學術不正負神廟委任之意是非謬亂為神廟聖學之害則可却云日錄是蔡卞增加又云荆公自增加如此則是彼所言皆是但不合增加其辭以誣宗廟耳又以其言太祖用兵何必有名真宗矯誣上天為謗祖宗此只是把持他元不曾就道理上理㑹如何説得他倒方子伯豐問四明尊堯集曰只以討閙却不於道理上理㑹盖它止是於利害上見得於義理全踈如介甫心術隠微處都不曾攻得却只是把持如曰謂太祖濫殺有罪謂真宗矯誣上天皆把持語也龜山集中有政日錄數段却好盖龜山長於攻王氏然三經義辨中亦有不必辨者却有當辨而不曾辨者􅓌王氏新經儘有好處盖其極平生心力豈無見得著處因舉書中改古注㸃句數處云皆如此讀得好此等文字某嘗欲看一過與摭撮其好者而未暇賀孫三舍士人守得荆公學甚固銖陳後山説人為荆公學喚作轉般倉模畫手致無􅑿餘但有虧欠東坡云荆公之學未嘗不善只是不合要人同己此皆説得未是若荆公之學是使人人同己俱入於是何不可之有今却説未嘗不善而不合要人同成何説話若使彌望皆黍稷都無稂莠亦何不可只為荆公之學自有未是處耳銖荆公作字説時只在一禪寺中禪床前置筆硯掩一龕燈人有書翰來者拆封皮埋放一邊就倒禪床睡少時又忽然起來寫一兩字㸔來都不曾眠字本來無許多義理他要箇箇如此做出來又要照顧得前後要相貫通介甫解佛經亦不是解揭帝揭帝云揭其所以為帝者而示之不知此是胡語璘唐坰林夫力䟽荆公對神宗前叱荆公每誦其䟽一段竟又問云王安石是如此也無荆公力辨之坰云在陛下前尚如此不臣坰初附荆公荆公不曾收用故後詆之坰初欲言時就曾魯公借錢三百千以言荆公了必見逐貧用以作裹足曽以其作言事官借與之後得罪逐曾監取其錢而後放行揚蜚卿問荆公與坡公之學曰二公之學皆不正但東坡之徳行那裏得似荆公東坡初年若得用未必其患不甚於荆公但東坡後來見得荆公狼狽所以都自改了初年論甚生財後來見青苗之法行得狼狽便不言生財初年論甚用兵如曰用臣之言雖北取契丹可也後來見荆公用兵用得狼狽更不復言兵他分明有兩截底議論道夫荆公後來所以全不用許多儒臣也是各家都説得沒理㑹如東坡以前進説許多如均户口較賦役教戦守定軍制倡勇敢之類是煞要出來整理弊壊處後來荆公做出東坡又却盡底飜轉云也無一事可做如揀汰軍兵也説怕人怨削進士恩例也説士人失望恁地都一齊沒理㑹始得且如役法當時只怕道衙前之役易致破蕩當時於此合理㑹如何得㑹破蕩晁以道文集有論役法處煞好賀孫熈寧更法亦是勢當如此凡荆公所變更者初時東坡亦欲為之及見荆公做得紛擾狼狽遂不復言却去攻他如荆公初上底書所言皆是至後來却做得不是自荆公以改法致天下之亂人遂以因循為當然天下之弊所以未知所終也必大介甫初與吕吉甫好時常簡帖往來其一云勿令上知後來不足吕遂繳奏之神宗亦胡亂藏揜了介甫只好人奉已故與吕合若東坡們不順己硬要治他如何天生得恁地很義剛問萬世之下王臨川當作如何評品曰陸象山嘗記之矣何待它人問莫只是學術錯否曰天資亦有抝强處曰若學術是底此様天資却更有力也曰然琮介甫每得新文字窮日夜閲之喜食羊頭􅀈家人供至或值㸔文字信手撮入口不暇用筯過食亦不覺至於生患且道將此心應事安得㑹不錯不讀書時常入書院有外甥懶學怕他入書院多方討新文字得之只顧㸔文字不暇入書院矣文蔚因論王氏之學而曰元澤幼即頴悟嘗有人籠獐鹿各一以遺介甫元澤時俱未識也或問之曰孰為鹿孰為獐元澤曰獐邊者是鹿鹿邊者是獐其後解經大抵類此必大世上有依本分三字只是無人肯行且如蘓氏之學却成箇物事若王氏之學都不成物事人却偏要去學這便是不依本分近㸔博古圖更不成文理更不可理㑹也是怪其中説一旅字云王曰衆也這是自古解作衆他却要恁地説時是説王氏較香得些子這是要取奉那王氏但恁地也取奉得來不好義剛先生取荆公奏藁進鄴侯家傳者令人傑讀之廣錄云取荆公議府兵奏藁及鄴侯與徳宗議後府兵之説令諸生誦之曰如今得箇宰相如此甚好又讀益公跋先生曰如益公説則其事都不成做人傑云鄴侯有智略如勸肅宗先取范陽亦好曰此䇿誠善彼勸肅宗未可取兩京者欲以兩京縶其四將惜乎不用也人傑云荆公保甲行於畿甸其始固咈人情元祐諸公盡罷之却是壊其已成之法曰固是近張元徳亦有此議論寄來因言元祐諸公大略有偏處多如此人傑云如棄地與西夏亦未安曰當時如吕㣲仲自以為不然盖吕西人知其利害其他諸公所見恨不得納諸其懐其意待西夏倔强時只欲卑巽請和耳因言本朝飬兵蠧國更無人去源頭理㑹只管從枝葉上去添兵添將太祖初定天下將諸軍分𨽻州郡特寄飬耳故謂之第㡬指揮謂之禁軍明其為禁衛也其將校乃衙前今所謂都知兵馬使謂之教練乃其軍之將也若都監乃唐末監軍之遺制鈐轄都部署皆國初制也部署即今之總管今州鈐路鈐總管皆無職事但大閲時供職一兩日耳潭州有八指揮其制皆廢弛而飛虎一軍獨盛人皆謂辛幼安之力以某觀之當時何不整理親軍自是可用却别創一軍又增其費又今之江上屯駐祖宗時亦無之某之意欲使更戍於州郡可以漸汰將兵然這話難説又今之兩淮荆襄義勇皆可用但人多不之思耳人傑廣錄云京畿保甲之法荆公做十年方成至元祐時溫公廢了深可惜盖此是已成之事初時人固有怨者後來做得成想人亦安之矣却將來廢了可惜因言軍政後來因事而添者甚多添得新者却不理㑹舊時有者祖宗只有許多禁軍散在諸州謂之禁軍者乃天子所用之軍不許他役而今添得許多御前諸軍分屯了故諸州舊有禁軍皆不理㑹又如潭州縁置飛虎一軍了都不管那禁軍與親兵溫公可謂知仁勇他那活國救世處是甚次第其規模稍大又有學問其人嚴而正植以下溫公義剛曰溫公力行處甚篤只是見得淺曰是義剛子思所謂誠包得溫公所謂不妄語者溫公誠在子思誠裏閎祖曹兄問諸先生皆以為司馬公許多年居洛只成就得一部通鑑及到入朝却做得許多不好事曰道司馬公做得未善即是道司馬公之失却不是當時哲廟若有漢昭之明便無許多事又曰不知有聖人出來天下事如何處置因舉易云井洌不食行惻也求王明受福也卓溫公忠直而於事不甚通曉如争役法七八年間直是争此一事他只説不合令民出錢其實不知民自便之此是有甚大事却如何捨命争端䝉司馬溫公為諫官與韓魏公不合其後作祠堂記極稱其為人豈非自見熈豐之事故也韓公真難得廣大沉深可學司馬公憂國之心至垂絶猶未忘道鄉亦然竊謂到此無可柰何亦只得休矣先生曰全不念著却如釋氏之忘若二公者又似太過問夫子曳杖負手逍遥而歌却不然曰夫子猶言明王不興天下孰能宗予依舊是要做他底徳明與其得小人不若得愚人溫公晚年更歴之多為此説揚范蜀公作溫公墓誌乃是全用東坡行狀而後面所作銘多記當時姦黨事東坡令改之蜀公因令東坡自作因皆出蜀公名其後却無事若依范所作恐不免被小人掘了義剛涑水記聞吕家子弟力辨以為非溫公書盖其中有記吕文靖公數事如殺郭俊等某嘗見范太史之孫某説親收得溫公手寫藁本安得為非溫公書某編八朝言行錄吕伯恭兄弟亦來辨為子孫者只得分雪然必欲天下之人從已則不能也僴溫公省試作民受天地之中以生論以生為活其説以為民能受天地之中則能活也溫公集中自有一段如此説也説得好却説他人以生為生育之生者不然抝論如此某舊時這般文字及了齋集之類盡用子細㸔過其有論此等去處盡拈出看少年被病翁監㸔他不許人㸔要人讀其有議論好處被他監讀煞喫工夫又云了翁集後面説禪更沒討頭處病翁笑曰這老子後來説話如此想是病心風僴正獻為溫公言佛家心法只取其簡要此吕氏之學也方問明道論元祐事須並用熈豐之黨曰明道只是欲與此數人者共變其法且誘他入脚來做問如此却似任術曰處事亦有不能免者但明道是至誠為之此數人者亦不相疑忌然須是明道方能了此後來元祐諸公治得此黨太峻亦不待其服罪溫公論役法踈畧悉為章子厚所駁只一向罷逐不問所論是非却是太峻急然當時如蔡確軰留得在朝廷豈不害事徳明元祐諸公大綱正只是多踈所以後來熈豐諸人得以反倒揚元祐諸賢議論大率凡事有據見定底意思盖矯熈豐更張之失而不知其堕於因循既有箇天下兵須用練弊須用革事須用整頓如何一切不為得又曰元祐諸賢多是閉著門説道理底後來見諸行事如趙元鎮意思是其源流大畧可睹矣儒用熈豐時諸人生財治獄紛起可畏一人嘗以獄事累及吕申公申公時為樞宻其人帶吏直入樞府令申公供文字之類甚無禮後元祐間例治此等人申公遂以其嘗治已之故恐人以為私報之讎遂特輕之當時人以是美之先生曰只是莫過行遣至當得這般罪合與他行遣此處皆是病揚元祐特立一司名理訴所令熈豐間有所屈抑者盡來雪理此元祐人之過也後徽宗即位求言人盡言之後為蔡京將放有説熈豐不好者盡罪之以鍾世美第一蘓季明亦以此得罪揚范淳夫純粹精神短雖知尊敬程子而於講學處欠缺如唐鑑極好讀之亦不無憾道夫范淳夫論治道處極善到説義理處却有未精􅓌范淳夫説論語較麄要知却有分明好處如唐鑑文章議論最好不知當時也是此道將明如何便教諸公都恁地白直某嘗㸔文字見説得好處便尋他來歴便是出於好人之門賀孫范淳夫講義做得條暢此等正是他所長説得出能如此分曉必大范淳夫不可曉招李方叔教其子溫軰溫者不佳又嘗薦陳元輿自代若道要純謹李方叔初不純謹若道要學術議論元輿又不是這様人徳明韓持國趙清獻俱學佛向在衢州見清獻公家書雖佛尋常言語奉持亦謹居家清苦之甚韓持國卧病令家人奏樂於前就床上輾轉稱快以此而觀則清獻所得多矣徳明正淳問韓持國言道上無克此説猶可至説道無真假則誤甚矣曰正縁其謂道無真假所以言無克若知道有真假則知假者在所當克也必大南豐與兄㸔來是不足觀其兄與歐公帖可見義剛曾南豐初亦耿耿後連典數郡欲入而不得故在福建亦進荔子後得滄州過闕上殿劄子力為諛説謂本朝之盛自三代以下所無後面畧畧説要戒懼等語所謂勸百而諷一也然其文極妙曾子固初與介甫極厚善入館後出倅㑹稽今集中有詩云知者尚復然悠悠誰可語必是曾諫介甫來介甫不樂故其當國不曾引用後介甫罷相子固方召入又却專一進諛辭歸美神宗更新法度得箇中書舎人丁艱而歸不乆遂亡不知更活㡬年只做如何合殺子宣在後一向做出踈脱初子宣有意調停不主元祐亦不主元豐遂有建中靖國年號如豐相之陳瑩中鄒志完軰皆其所引却又被諸公時攻其短子宣不堪有斥之使去國者其弟子開有書與子宣云某人者皆時名流今置閒處盖為是也後韓忠彦欲擠子宣遂引蔡京入來子宣知之反欲通慇懃於京忠彦方遣其子迓京則子宣之子已將父命迎之於二十里外矣先時子宣攻京甚力至是遂不復誰何凡京有所論奏不曰京之言是則曰京之言善又不自知其踈脱載之日錄儒用問劉元城不知培植君子之黨才一小事便一向摶擊以致君子盡去而小人用矣此其過否曰過不在此是他見識有病不知言無以知人也是他不知言且如説伊川他只見得祖宗有典故才有不合便道不是渠不知輔導少主之理當如此故伊川一向被他論列是他見識只如此又如蔡新州事被他當時自謂有定䇿功宣仁亦甚惡之謂須與他痛治恐後來皇帝被人惑治他不得元城亦欲因其詩以治之當時執政侍從臺諫有不欲治蔡者一切逐去盖以詩治人自不正因此以治彼罪又不是詩胡説何足道定䇿謀他又不説了又無縁治得他都不消問了其本原只在開導人主心術使人主知不賞私恩不罰私怨之理則蔡何足慮元城亦不是私意只是言不當如此却不知以詩治人不當又欲絶其定䇿姦謀如此治之豈不使人主益疑後蔡死其家果訴冤謂蔡有定䇿功諸人忌之遂起大禍後治元祐諸公皆為蔡報怨也溫公治時必不如此揚問黄履邢恕少居太學邢固俊㧞黄亦謹厚力學後來二人却如此狼狽曰它固㑹讀書只是自做人不好然黄却是箇白直底人只是昏愚無見識又愛官職故為邢所誘壊邢則有意於為惡又濟之以才故罪過多僴邢恕本不定疊知随州時溫公猶未絶之與通書只是明道康節㸔得好康節詩云慎勿輕為西晉風明道語見上蔡錄中便不得下説處開封劊子事只是後來撰出當時無此事辨誣中有妄謂二字徳明問邢恕少年見諸公時亦似好先生曰自來便尖利出頭不確實到處裏去入作章惇用林希作御史希擊伊川只俟邢救便擊之恕言於哲宗臣於程某嘗事之以師友今便以程某斬作千段臣亦不救當時治恕者皆尋得明道行狀後所載説即本此治之恕過惡如此皆不問只在這一邉者有毫髮必治之揚邢恕令王直方父為髙忘其名做一脱宣仁欲廢哲宗事由文字令髙上之人初不知之直方臨死以文字籠分人籠中有其文字在其説謂宣仁欲立其所生神宗弟徐度侍郎云便是立神宗弟亦無不是揚蘓子容薦李清臣清臣一對便説繼述事蘓聞之駭然出蘓語李曰邦直將作好官振因論髙甲人及葉祖洽曰此人本無才能但時方尊尚介甫之學祖洽多用其説且因而推尊之故作第一人按編年上好讀孟子人未知之時廷試進士始用䇿葉祖洽鄉人黄履在禁從因以告之祖洽試䇿皆援引孟子故穪㫖擢為第一然其人品凡下又不敢望新進用事之人提㧞不起當時不甚擢用元祐固是無縁用他及至紹聖間復行紹述之説依舊在閒處無聊之甚遂自詭以為熈豐舊人知熈豐事為詳又謂趙挺之亦熈豐舊人嘗薦臣今蒙擢在言路乞召問之士大夫貪得患失固無所不至然未有若祖洽之甚者或謂此等人亦縁科第髙要做官職牽引得如此曰只是自家無志若是有志底自然牽引它不得盖他氣力大如大魚相似㸔是甚網都迸力出去才被這些子引動便是元無氣力底人如張子韶汪聖錫王龜齡一様底人如何牽得他儒用莊伸問本朝名公有説得好者於行上全不相應是如何曰有一等人能談仁義之道做事處却乖此與鬼念大悲咒一般更無柰何他處又曰只是知得不明之故筆談言士人們做文字問即不㑹用則不錯者皆是也豈可便以言取人然亦不可以人廢言説得好處須還他好始得如孟子取陽虎之言但其用意别耳友仁學中䇿問蘓程之學二家當時自相排斥蘓氏以程氏為姦程氏以蘓氏為縱横以某觀之只有荆公脩仁宗實錄言老蘓之書大抵皆縱横者流程子未嘗言也如遺書賢良一段繼之以得志不得志之説却恐是説他坡公在黄州猖狂放恣不得志之説恐指此而言道夫問坡公苦與伊洛相排不知何故曰他好放肆見端人正士以禮自持却恐他來檢㸃故恁詆訾道夫曰坡公氣節有餘然過處亦自此來曰固是又云老蘓辨姦初間只是私意如此後來荆公做不著遂中他説然荆公氣習自是一箇要遺形骸離世俗底模様喫物不知饑飽嘗記一書載公於飲食絶無所嗜惟近者必盡左右疑其為好也明日易以他物而置此品於逺則不食矣往往於食未嘗知味也至如食釣餌當時以為詐其實自不知了近世吕伯恭亦然面垢身汙似所不䘏飲食亦不知多寡要之即此便是放心辨姦以此等為姦恐不然也老蘓之出當時甚敬崇之惟荆公不以為然故其父子皆切齒之然老蘓詩云老態盡從愁裏過壯心偏傍醉中來如此無所守豈不為他荆公所笑如上韓公書求官職如此所為又豈不為他荆公所薄至如坡公著述當時使得盡行所學則事亦未可知從其逰者皆一時輕薄軰無少行檢就中如秦少㳺則其最也諸公見他説得去更不契勘當時若使盡聚朝廷之上則天下何由得平更是坡公首為無稽㳺從者從而和之豈不害事但其用之不乆故他許多敗壊之事未出兼是後來羣小用事又費力似他故覺得他箇好道夫以下三蘓及門人或問東坡若與明道同朝能從順否曰這也未見得明道終是和粹不甚嚴厲東坡穪濓溪只是在他前不與同時同事因説當時諸公之争㸔當時如此不當論相容與不相容只㸔是因甚麽不同各家所争是争箇甚麽東坡與荆公固是争新法東坡與伊川是争箇甚麽只㸔這處曲直自顯然可見何用别商量只㸔東坡所説云㡬時得與他打破這敬字㸔這説話只要奮手捋臂放意肆志無所不為便是只㸔這處是非曲直自易見論來若説争只争箇是與非是雖斬首宂胸亦有所不顧若不是雖日食萬錢日遷九官亦只是不是㸔來别無道理只有箇是非若不理㑹得是非分明便不成人若見得是非方做得人這箇是處便是人立脚底地盤向前去雖然更有裏面子細處要知大原頭只在這裏且要理㑹這箇教明白始得這箇是處便即是道便是所謂天命之謂性率性之謂道萬物萬事之所以流行只是這箇做得是便合道理纔不是便不合道理所謂學問也只在這裏所以大學要先格物致知一件物事固當十分好若有七分好三分不好也要分明這箇道理直是要分明細入於毫髮更無些子夾雜又云東坡如此做人到少間便都排廢了許多端人正士却一齊引許多不律底人來如秦黄雖是向上也只是不律因舉魯直飲食帖東坡雖然踈闊却無毒子由不做聲却險少㳺文字煞弱都不及衆人得與諸蘓並穪是如何子由初上書煞有變法意只當是時非獨荆公要如此諸賢都有變更意賀孫問二蘓之學得於佛老於這邉道理元無見處所以其説多走作曰㸔來只是不㑹子細讀書它見佛家之説直截簡易驚動人耳目所以都被引去聖賢之書非細心研䆒不足以見之某數日來因閒思聖人所以説箇格物字工夫盡在這裏今人都是無這工夫所以見識皆低然格物亦多般有只格得一兩分而休者有格得三四分而休者有格得四五分五六分者格到五六分者已為難得今人原不曾格物所以見識極卑都被他引將去二蘓所以主張箇一與中者只是要恁含糊不分别所以横説竪説善作惡作都不㑹道理也然當時人又未有能如它之説者所以都被他説動了故某嘗説今人容易為異説引去者只是見識低只要鶻突包藏不敢説破纔説破便露脚手所以都將一與中盖了則無面目無方所人不得而非之僴二蘓呼喚得名字都不是了振兩蘓既自無致道之才又不曾遇人指示故皆鶻突無是處人豈可以一己所見只管鑚去謂此是我自得不是聼得人底胡問東坡兄弟若用時皆無益於天下國家否曰就他分限而言亦各有用處論其極則亦不濟得事淳東坡議論大率前後不同如介甫未當國時是一様議論及後來又是一様議論公謹東坡只管罵王介甫介甫固不是但教東坡作宰相時引得秦少㳺黄魯直一隊進來壊得更猛淳或問張安道為人何如曰不好如攻范黨時他大節自虧了後來為溫公攻擊章凡六七上神宗不聼遂除溫公過翰林學士而張居職如故嘗見東坡為溫公神道碑叙溫公自翰林學士為御史中丞自御史中丞再為翰林學士心嘗疑之此一節必有所以後觀溫公集乃知溫公以攻安道之故再自御史過翰林而東坡兄弟懐其平日待遇之厚不問是非極力尊之故東坡刪去此一節不言其事遂令讀者有疑安道不好又劉公湖州人忘其名亦數章攻之而不見其首三章集中止有第四章大槩言臣攻方平之短已具於前數奏中記得是最言其不孝之罪可惜不見盖東坡尊方平而天下後世之人以東坡兄弟之故遂為東坡諱而隱其事併毁其䟽以滅蹤某嘗問劉公之孫某求之而其家亦已無本矣方平嘗托某人買妾其人為出數百千買妾方平受之而不償其直其所為皆此類也安道是箇秦不收魏不管底人他又為正人所惡那邉又為王介甫所惡盖介甫是箇修飭廉隅孝謹之人而安道之徒平日苟簡放恣慣了纔見禮法之士必深惡如老蘓作辨姦以譏介甫東坡惡伊川皆此類耳論來介甫初間極好他本是正人見天下之弊如此鋭意欲更新之可惜後來立脚不正壊了若論他甚様資質孝行這㡬箇如何及得他他們平日自恣慣了只見脩飭亷隅不與己合者即深詆之有何髙見卓溫公自翰林學士遷御史中丞累章論張方平所論不行自中丞復為翰林學士東坡作溫公神道碑只説自中丞復為翰林學士却節去論方平事為方平諱也某初時㸔更曉不得後來㸔得溫公文集方知是如此文蔚老蘓説得眼前利害事却好學䝉因説老蘓曰不能言而蹺蹊者有之未有言蹺蹊而其中不蹺蹊者揚三代節制之師老蘓權論不是謨東坡善議論有氣節若海東坡解經一作解尚書莫教説著處直是好盖是他筆力過人發明得分外精神東坡天資髙明其議論文詞自有人不到處如論語説亦煞有好處但中間須有些漏綻出來如作歐公文集序先説得許多天來底大恁地好了到結末處却只如此盖不止龍頭蛇尾矣當時若使他解虚心屈已煅煉得成甚次第來木之問東坡與韓公如何曰平正不及韓公東坡説得髙妙處只是説佛其他處又皆麄又問歐公如何曰淺乆之又曰大槩皆以文人自立平時讀書只把做考䆒古今治亂興衰底事要做文章都不曾向身上做工夫平日只是以吟詩飲酒戲謔度日義剛東坡平時為文論利害如主意在那一邉利處只管説那利其間有害處亦都知只藏匿不肯説欲其説之必行淳因論東坡刑賞論悉舉而歸之仁義如是則仁義乃是不得已而行之物只是作得一癡忠厚此説最碍理學者所當察可學東坡刑賞論大意好然意闊踈説不甚透只似刑賞全不柰人何相似須是依本文將罪疑惟輕功疑惟重作主意因論二蘓刑賞論極做得不是先生曰用刑聖人常有不得已之心用賞聖人常有不吝予之意此自是忠厚了若更於罪之疑者從輕於功之疑者從重這尤是忠厚此是兩截之事卓溫公墓碑云曰誠曰一人多議之然亦未有害誠者以其表裏言之一者以其始終言之人傑坡公作溫公神道碑叙事甚畧然其平生大致不踰於是矣這見得眼目髙處道夫曰某作富公碑甚詳曰溫公是他已為行狀若富公則異於是矣又曰富公在朝不甚喜坡公其子弟求此文恐未必得而坡公鋭然許之自今觀之盖坡公欲得此為一題目以發明己意耳其首論富公使金事豈苟然哉道夫曰向見文字中有云富公在青州活饑民自以為勝作中書令二十四考而使金之功盖不道也坡公之文非公意矣曰須要知富公不喜而坡公樂道而鋪張之意如何曰意者富公嫌夫中國衰弱而夷狄盛强其為此舉實為下䇿而坡公則欲救當時之弊故首以為言也先生良乆乃曰富公之䇿自知其下但當時無人承當故不得已而為之爾非其志也使其道得行如所謂選擇監司等事一一舉行則内治既强夷狄自服有不待於此矣今乃增幣通和非正甚矣坡公因紹聖元豐間用得兵來狼狽故假此説以發明其議論爾道夫東坡南安學記説古人井田封建不可行今只有箇學校而已其間説舜逺不可及得如鄭子産為鄉校足矣如何便決定了千萬世無人可以為舜只得為子産又説古人於射時因觀者羣聚遂行選士之法此似今之聚場相撲相戲一般可謂無稽之論自海外歸來大率立論皆如此淳或問東坡言逝者如斯而未嘗往也盈虗者如代而率莫消長也只是老子獨立而不改周行而不殆之意否曰然又問此語莫也無病曰便是不如此既是逝者如斯如何不往盈虗如代如何不消長既不往來不消長却是箇甚底物事這箇道理其來無盡其往無窮聖人但云維天之命於穆不已又曰逝者如斯夫只是説箇不已何嘗説不消長不往來它本要説得來髙逺却不知説得不活了既是往者如斯盈虗者如代便是這道理流行不已也東坡之説便是肇法師四不遷之説也又云盈虗者如代代字今多誤作彼字而吾與子之所共食食字多誤作樂字嘗見東坡手寫本皆作代字食字頃年蘓季真刻東坡文集嘗見問食字之義荅之云如食邑之食猶言享也吏書言食邑其中食其邑是這様食字今浙間陂塘之民謂之食利民户亦此意也又云碑本後赤壁賦夢二道士二字當作一字疑筆誤也僴須見得道理都透了而後能静東坡云定之生慧不如慧之生定較速此説得也好淳或言東坡雖説佛家語亦説得好先生曰他甚次第見識甚次第才智它見得那一道明早亦曾下工夫是以説得那一邉透今世説佛也不曾做得他工夫説道也不曾做得此邉工夫只是虗飄飄地沙魘過世謙草堂劉先生曾見元城云舊嘗與子瞻同在貢院早起洗面了遶諸房去胡説亂説被他撓得不成模様人皆不得㸔卷子及夜乃歸張燭一㸔數百副在贑上相㑹坐時已自瞌睡知其不永矣不知當時許多精神那裏去二公皆歸自嶺海東坡曾知貢舉揚東坡記賀水部事或云無此事盖喬同紿東坡以求詩爾僴東坡薦秦少㳺後為人所論他書不載只丁未錄上有嘗謂東坡見識如此若作相也㺯得成蔡京了李方叔如許東坡也薦他東坡聰明豈不曉覺得他晚年自知所學底倚靠不得及與李昭玘書有云黄秦軰挾有餘之資而騖於無涯之智必極其所如將安所歸宿哉念有以反之范淳夫當時持兩端兩邉都不惡他也只是不是如今説是説非都是閒説若使將身已頓放在蘓黄間未必不出其下須是自家强了他方説得他如孟子闢楊墨相似這道理只是一箇道理只理㑹自家身已是本其他都是閒物事縁自家這一身是天造地設底已盡擔負許多道理纔理㑹得自家道理則事物之理莫不在這裏一語一黙一動一静一飲一食皆有理纔不是便是違這理若盡得這道理方成箇人方可以柱天踏地方不負此生若不盡得此理只是空生空死空具許多形骸空受許多道理空喫了世間人飯見得道理若是世上許多閒物事都沒要緊要做甚麽又曰伊尹説天之生斯民也使先知覺後知使先覺覺後覺予天民之先覺者也予將以斯道覺斯民也非予覺之而誰也思天下之民匹夫匹婦有不與被堯舜之澤者若已推而納之溝中其自任以天下之重如此聖賢與衆人皆具此理衆人自不覺察耳又曰聖人之心如青天白日更無些子蔽翳又曰如今學者且要收放心又曰萬理皆具於吾心須就自家身已做工夫方始應得萬理萬事所以大學説在明明徳在新民賀孫先生因論蘓子由云學聖人不如學道他認道與聖人做兩箇物事不知道便是無軀殻底聖人聖人便是有軀殻底道學道便是學聖人學聖人便是學道如何將做兩箇物事㸔燾㸔子由古史序説聖人其為善也如水之必寒火之必熱其不為不善也如騶虞之不殺竊脂之不榖此等議論極好程張以後文人無有及之者盖聖人行事皆是胸中天理自然發出來不可已者不可勉强有為為之後世之論皆以聖人之事有所為而然周禮纎悉委曲去處却以聖人有邀譽於天下之意大段鄙俚此皆縁本領見處低了所以發出議論如此如陳君舉周禮説有畏天命即人心之語皆非是聖人意因説歐公文字大綱好處多晚年筆力亦衰曾南豐議論平正耐㸃檢李泰伯文亦明白好㸔木之問老蘓文議論不正當曰議論雖不是然文字亦自明白洞達木之子由古史論前後大槩多相背馳亦有引證不著是他老來精神短做這物事都忘前失後了淳近見蘓子由語錄大抵與古史相出入它也説要一以貫之但是他説得别他只是守那一説萬事都在一淳錄有外字然而又不把一去貫説一又别是一箇物事模様義剛因説欒城集曰舊時㸔他議論亦好近日㸔他文字煞有害處如劉原父髙才傲物子由與他書勸之謙遜下人此意甚好其間却云天下以吾辨而以辨乗我以吾巧而以巧困我不如以拙飬巧以訥飬辨如此則是怕人來困我故卑以下之此大段害事如東坡作刑賞忠厚之至論却説懼刑賞不足以勝天下之善惡故舉而歸之仁如此則仁只是箇鶻突無理㑹底物事故又謂仁可過義不可過大抵今人讀書不子細此兩句却縁疑字上靣生許多道理若是無疑罪須是罰功須是賞何須更如此或曰此病原起於老蘓曰㸔老蘓六經論則是聖人全是以術欺天下也子由晚年作待月軒記想他大段自説見得道理髙而今㸔得甚可笑如説軒是人身月是人性則是先生下一箇人身却外面㝷箇性來合湊著成甚義理雉子由深有物作潁濵遺老傳自言件件做得是如㧞用楊畏來之邵等事皆不載了當時有楊三變兩來之號門下侍郎甚近宰相范忠宣蘓子容軰在其下楊攻去一人當子由做不做又自其下用一人楊又攻去一人子由當做又不做又自其下㧞一人凡數畨如此皆不做楊曰蘓不足與矣遂攻之來亦攻之二人前攻人皆受其風㫖也後來居潁昌全不敢見一客一鄉人自蜀特來謁之不見候數日不見一日見在亭子上直突入子由無避處了見之云公何故如此云某特來見云可少候待某好出來相見歸不出矣揚劉大諌與劉草堂言子瞻却只是如此子由可畏謫居全不見人一日蔡京黨中有一人來見子由遂先㝷得京舊常賀生日一詩與諸小孫先去見人處嬉㸔及請其人相見諸孫曵之滿地子由急自取之曰某罪廢莫帶累他元長去京自此甚畏之揚龍川志序所載多得之劉貢父害蘓子羙者是一李定害東坡者又别是一李定蘓東坡時守湖州來攝東坡驚甚時陳伯脩為倅多調䕶事伯脩名師錫建陽人常作察院同了翁言蔡京後貶死東坡下御史獄考掠之甚蘓子容時尹開封勘陳世儒事有人言文潞公之徒嘗請託之類亦置獄子容與東坡連獄聞其有考掠之聲有詩云云世儒執中子也世儒所生張氏酷甚似是吕申公外甥世儒妻一日諷群婢云本官若丁憂汝軰要嫁底為好嫁要錢底與之錢羣婢以此遂藥殺之後置獄夫婦皆赴法其婦慧甚臨赴法時遂掣窓紙一片即搯成一畨字使人送與其夫云云揚蘓東坡子過范淳夫子溫皆出入梁師成之門以父事之然以其父名其籍中亦不得官職師成自謂東坡遺腹子待叔黨如親兄弟諭宅庫云蘓學士使一萬貫以下不須覆叔黨縁是多散金卒䘮其身又有某人亦以父事師成師成妻死溫與過當以母禮喪之方疑忌某人不得已衰絰而往則某人先衰絰在帷下矣可學東坡謚文忠時無太師曾誤寫作太師人與言之曰何妨遂因而贈之今行遣年月前後可攷揚論東坡之學曰當時逰其門者雖苦心極力學得他文詞言語濟得甚事如見識議論自是逺不及今東坡經解雖不甚純然好處亦自多其議論亦有長處但他只從尾梢處學所以只能如此富鄭公初甚欲見山谷及一見便不喜語人曰將謂黄某如何元來只是分武寧一茶客富厚重故不喜黄振黄山谷慈祥之意甚佳然殊不嚴重書簡皆及其婢妮艷詞小詩先已定以悦人忠信孝弟之言不入矣山谷使事多錯本㫖如作人墓誌云敬授來使病于夏畦本欲言皇恐之意却不知與夏畦相去闗甚事黄魯直以元祐黨貶得放還因為荆南甚寺作塔記人以此謀孽他故再貶所以蘓子由們皆閉門絶賔客有人自蜀來累日不得見詢其隣人云他十數日必一出門外小亭上坐其人遂日候其出才得一揖子由讓其坐且云待某入著衣服即入去一向不出黄魯直書浯溪碑是他最好底議論而沙随却説他不是盖云肅宗收復兩京再造王室其功甚大不可短他這事不如此肅宗之收復京師其功固可穪至不待父命而即位分明是簒功過當作兩項説不以相揜可也沙随之論大槩要考細碎制度不要人説義理與致堂説皆相反如云韓趙魏為諸侯不為不是盖為周室㣲弱不可不立他待自家强盛方可去治他又云晉之所以為三卿分者是其初不合併得地太大所以致得恁地若如此則周室為諸侯所陵亦謂之武王不合有此天下可乎漢匡衡當恭顯用事不敢有言至恭顯死後方論他遂為王尊所劾沙随以為人主之意不可回宰相不可以諌他反遭禍害又唐劉蕡云天子不可漏言他却誦言于庭使宦官之勢愈張沙随却云劉蕡以布衣應直言極諌科合如此説縱殺身猶可以得名豈有宰相與天子一體而不諌諍人主布衣却可出來説致堂説二䟽是見元帝不足傅相故持知止之義以求退㸔來是如此若蕭望之則不容於不死是不若二䟽之先見沙随乃云不然且引鄭忽之事為證又不著題皆不成議論先生㸔東都事畧文蔚問曰此文字如何曰只是説得箇影子適間偶㸔陳無已傳他好處都不載問曰他好處是甚事曰他最好是不見章子厚不著趙挺之綿襖傅欽之聞其貧甚懐銀子見他欲以賙之坐間聼他議論遂不敢出銀子如此等事他都不載如黄魯直傳魯直亦自有好處亦不曾載得文蔚問魯直好在甚處曰他亦孝友文蔚陳無已趙挺之邢和叔皆郭大夫壻陳在館職當侍祠郊丘非重裘不能禦寒氣無已止有其一其内子為於挺之家假以衣之無已詰所從來内以實告無已曰汝豈不知我不著渠家衣耶却之既而遂以凍病而死􅒜克家作其文集序中有云篋無副裘又云此豈易衣食者盖指此事必大揚錄云任伯作墓誌世也所載不明此豈可不白於後陳後山與趙挺之邢和叔為友壻皆郭氏壻也後山推尊蘓黄不服王氏故與和叔不協後山在館中差與南郊行禮親戚謂其妻曰登郊臺率以夜半時寒不可禁須多辦綿衣而後山家止有一裘其妻遂於邢家借得一裘以衣後山云我只有一裘已着此何處得來妻以實告後山不肯服亟令送還竟以中寒感疾而卒或曰非從邢借乃從趙借也故或人祭文有云囊無副衣即謂此也趙挺之初亦是煕豐黨中人附蔡元長以得進後來見得蔡氏做得事勢不好了却去攻他趙有三子曰闕誠曰思誠曰明誠明誠李易安之夫也文筆最髙金石錄煞做得好廣晁以道後來亦附梁師成有人以詩嘲之曰早赴朱張飯随𢋫蔡子詩此回休倔强凡事且從宜人傑張文潜軟郎當他所作詩前四五句好後數句胡亂填滿只是平仄韻耳想見作州郡時闒冗平昔議論宗蘓子由一切放倒無所為故秦檜喜之若其他豈肯無所為陳無已亦是以䇿言不用兵孝文和戎好檜亦喜之揚徐徳占為御史中丞不敢見人朝路見南豐叙致甚恭南豐待之甚踞云公是徐禧乆聞公名云云揚董敦逸在紹聖間為御史嘗命録問孟后事文字都上次日忽入文字云臣昨日錄問時覺得宮中人口中有無舌者臣恐有枉當時以御史錄問為重未上文室時能論列未必如是後來朝廷以其反覆罪之後曾子宣薦士皆一時名士董亦在其中名下注云臣履常疑其人履前時細行亦謹與邢恕同學未必不是為邢所誘也揚汪表民進言史臣不能發明神宗徳業其史不好諸小人遂執此以生事揚小人不可與君子同處於朝昔曾布當建中靖國初專欲涵飬許多小人漸漸被他得志一時諸君子皆為其所陷要之要出來做時小人若未可卒去亦須與分明開説是非善惡使彼依自家話時却以事付之若分明與説是非不依自家話時自家只得去了如何含含胡胡我也做些他也做些都不與問那箇是是那箇是非久之未有不為其所勝若與説得是非通透了他也自要做好人他若既知得是非又自要做人這須旋旋安頓與在外好差使吾人也無許多智巧對副他兼是才做一事自家便把許多精神智巧對副他自家心術已自壊了明道先生若大用雖是可以變化得小人然亦湏與明辨是非舜去四凶孔子誅少正夘當初也須與他説是非到得他自恃其髙不依聖人説話只得去了賀孫曾子宣初亦未嘗有甚惡元祐人之意被陳瑩中書之後遂乗勢作起徽宗攻治之亦以其與熙豐本合也子開嘗有書諌其兄莫如此并莫用蔡京之類子宣亦有荅書謂吾弟亦嘗不容於元祐今何故議論如此子開雖然所見亦鶻突揚曾子宣作相薦蔡京子開不樂之甚力諌其兄即乞出本不喜蔡京蔡京來去途中遇之避又不得不見又不得遂謁見之京公服秉笏􅒜云今此得還門下皆相公之力翰林之助子開聞其言愈不樂一切失措京秉笏􅒜之子開亦忘了笏只叉手答之子開因蔡確事被劉器之所逐後見其兄引薦繆遂多主元祐之人子宣書與之曰平日吾弟議論平正無所偏黨吾弟亦嘗不容於元祐今何故如此子宣後見蔡京事深自恨而敬服了翁揚或録云京致恭子開畧荅之忽出笏禀事因及子宣政事子開正色曰賢道家兄做得是邪曾子宣手記被曾揀出好底印行某於劉共父家借得全書㸔其間邪惡之論甚多或問若據布所記則元符間何為與章厚同在政府而能兩立曰便是恐不可全信然每奏事布必留身對必及厚厚獨對必及布哲宗欲兩聞其過失亦多詢及之至了翁以書達曾子宣子宣怒蹺足而讀陳曰此國家大事相公且平心無失待士之禮曾下足陳因此出揚了翁平生於取舍處㸔得極分明從此有入凡作文多好言此理嘗作一文祭李家人云熊掌我取天實予之所以平生所立如此陳了翁在貶竄中與蔡京軰争辯不已亦是他有智數盖不如此則必為京軰所殺矣人傑或錄云了翁固是好人亦有小小智數云云陳了翁氣剛才大惜其不及用也若海問元城了翁之剛孰為得中曰元城得中了翁後來有太過處元城只是居其位便極言無隱罪之即順受了翁後來做得都不從容了所以元城嘗論其尊堯集所言之過而戒之曰告君行已苟已無憾而今而後可以忘言矣僴了翁有濟時之才道卿純粹才不及也使了翁得志必有可觀道夫先生問潮州前此有遷客否徳明答以不知先生因言子由謫循州元城經行海州當時有言劉器之好命用事者擬竄某州云且與他試命後放還居南都尚康强宣和末年方沒只隔一年便有金人之禍使其不死必召用是時天下事被人作壊已如魚爛了如何整頓一場狼狽不小今日且是無人望元城在南都似箇銀山鐡壁地又當往來之衝過者必見歴歴為説平生出處無少回䕶羣小雖睥睨不敢動著他徳明􅓌錄云此老若在教他做時不知能救得如何鄒道卿奏議不見於世徳父嘗刋行家集龜山以公所彈擊之人猶在要路故今集中無奏議後來汪聖錫在三山刋龜山集求奏議於其家安止移書令勿刋可惜不知龜山猶以出處一事為疑故奏議不可不行於世安止判院聞之刋於延平徳明問劉元承撻鄒志完舟人事見目氏容語便當考曰道卿赴貶到某州元承為守舟人覆若載鄒正言不敢取一錢元承撻之因云元承當蔡京用事時煞做好官徳明揚錄云舟子不用錢碩載劉間之追舟子史一慎不得去載先生傷時世之不可為因歎曰忠臣殺身不足以存國讒人搆禍無罪就死後人徒為悲痛柰何劉莘老死亦不明今其行狀似云死後以木匣取其首或云服藥或云取首級皆無可考國史此事是先君修正云劉摯梁燾相繼死嶺表天下至今哀之初文潞公之子及甫以劉莘老當言路潞公欲除中書令諸公議恐事多易雜若致激駮反傷老成道只除平章軍國重事乃是為安潞公計耳渠家不悉反終以為怨及甫以書與邢恕有粉昆司馬昭等語邢恕收藏此柬待黨事發即以此嫁禍於劉梁本來粉昆之語乃指韓忠彦盖忠彦之弟嘉彦為駙馬都尉人呼為粉侯昆即兄也後事發文及甫下獄供穪司馬昭是説劉摯粉是説王巖叟以其面自如粉昆者兄也兄况也是説梁况之故王巖叟雖已死而二人皆以此重行貶竄以死賀孫劉摯梁燾諸公之死人皆疑之今其家子孫皆諱之然當時多遣使恐嚇之又州郡監司承風㫖皆然諸公多因此自盡劉元城屢被人嚇令自裁劉不畏曰君命死即死自死奚為寫遺嘱之類訖曰今死無難矣卒無恙劉只有過當處然此須學得他始得梁劉之死先吏部作實錄云梁燾劉摯同時死嶺表人皆寃之因論范淳夫及此揚廣錄云范淳夫死亦可疑雖其子孫偹載其死時詳細要之深可疑惟劉器之死得明白亦㡬不免只是他處得好杲老為張無盡所知一日語及元祐人才問相公以為如何張曰皆好如溫公大賢也杲曰如此則相公在言路時論他則甚張笑曰公便理㑹不得只是後生死急要官做後如此廣龜山作周憲之墓銘再三穪其劾童貫之疏但尚書當時亦少索性若海章子厚與溫公争役法雖子厚悖慢無禮諸公争排之然據子厚説底却是溫公之説前後自不相照應被他一一捉住病痛敲㸃出來諸公意欲救之所以排他出去又他是箇不好底人所以人皆樂其去耳儒用以下章蔡朝廷以議役法去章惇故惇後得以為言揚問章蔡之姦何如曰京之姦惡又過於惇方惇之再入相也京謁之於道袖出一軸以獻惇如學校法安飬院之類凡可以要結士譽買覔人情者具在惇辭曰元長可留他時自為之後京為相率皆建明時論往往歸之至詣學自嘗饅頭其中沒見識士人以手加額曰太師留意學校如此京之當國費侈無度趙挺之繼京為相便做不行挺之固庸人後張天覺亦復無所措手足京四次入相後至盲廢始終只用不患無財患不能理財之説其原自荆公又以鹽鈔茶引成櫃進入上益喜謂近侍曰此太師送到朕添支也由是内庭賜予不用金錢雖累巨萬皆不費力鈔法之行有朝為富商暮為乞丐者矣儒用蔡京誣王珪當時有不欲立哲宗之意珪無大惡然依違鶻突章惇則以不欲立徽宗之故故入姦黨皆為為臣不忠揚蔡京奏其家生芝上携鄆王等幸其第賜宴云朕三父子勸卿一盃酒是時太子却不在盖已有廢立之意矣義剛蔡京不見殺淵聖以嘗保佑東宮之故道君嘗喜嘉王王黼軰嘗揺東宫道君作事亦有大思慮者欲再立后前數人有寵者當次立道君一日盡召語之曰汝軰當立然皆有子立之恐東宫不安遂立鄭后鄭無子京當時不主廢立故欽宗獨治童貫等而京罪甚輕義剛問蔡京何故得全首領卒於潭州曰當時執政大臣皆他門下客如呉元忠軰亦其薦引不無牽制處金人初一畨退時是甚時節臺諫却别不曾理㑹得事三五箇月只反倒得京逐數百里慢慢移去結末方移儋州及到潭州遂死問李伯紀後來當國時京想已死否不然則必如張邦昌想已正典刑矣曰靖康名流多是蔡京晚年牢籠出來底人才伯紀亦所不免如李泰發是甚次第硬底人亦為京所羅致他可知矣今衡州所刋劉諫議文集中有一帖與泰發盖㣲諷之按遺史京之愛妾二曰慕容夫人曰小李夫人又童貫之子童五十者認以為妹生子翛復尚主小李出其下怏怏求出遂嫁宣賛舍人曹濟後為湖南兵馬都監京死潭州李氏殯之於一僧寺儒用蔡京靖康方貶死於潭州八十餘嵗自病死初不曾有行遣後張國安守潭治疊此等為埋之然有人見其無頭後來朝廷取㸔也揚蔡攸字居安京長子也王師入燕以功進少師領樞宻院事封英國公燕國公後欲相之既而悔之但進太保上將謀内禅親書傳立東宫字以授李邦彦邦彦却立不敢承白時中軰皆在列上躊躇四顧以付攸攸退屬其客給事中呉敏敏即約李綱共為之議遂定淵聖既貶之又欲誅之乃命陳述持詔即所在斬之述且行上又取詔書從旁批三字曰翛亦然於是兄弟及誅揚蔡絛又有鐡圍山語錄絛與攸雖不同然其用志又自乖攸只是䙝狎絛欲竊國柄必大許右丞在宣政間見奉上極於侈靡亦如龜山意歸咎於王氏鳬鷖之説因别解此詩以進云涇水最濁濁者所以厚民當時花石罁正盛許乃要將此等文字去攔截不知攔得住否必大范致虛初間本因同縣道士徐知常者皆建陽人薦之於徽宗遂擢為右正言徐本一庸凡人不知因甚得幸徽宗喜其㑹説話遂親幸之致虛未到即首疏云陛下若欲紹述熈豐之政非用蔡京為政不可京一到這許多事一變更遏捺不下雖為曾子宣論列一畨然如何遏得蔡京之勢呼嘯羣小之黨以致亂天下范一到便為驚世駭俗之論取他人之不敢言者無所忌憚而言之燾范某蜀公族人入宜州見魯直又見張懐素甚愛之一夜與之觀星曰熒惑如貫索東南必有獄范以告得官湯東野資之入京亦得官可學宣政間鄆州有數子弟好議論士大夫長短常聚州前邸店中每士人大夫過但以觜舒縮便是長短他時人目為猪觜以其狀似猪以觜掘土此數子弟因戱以其號自標為甚猪觜大夫猪觜郎之屬少間為人告以私置官屬有謀反之意興大獄鍛煉舊見一䇿子載今記不得近㸔長編有一段徽宗一日問執政東州逆黨何不為處分了都無事之首尾若是大反逆事合有首尾今㸔來只是此事想李燾也不曾見此事只大畧聞得此一項語言宣政末年論元祐學術事如徐秉哲孫覿軰説得更好後來全是此等人作過故曰天下有道盜其先變乎徳明因論賈生治安䇿中深計者謂之妖言曰宣政間凡危亡亂字皆不得用安得無後來之禍又云世間有一種却是妖言如葉夣得字文虛中二人所為極是亂道平日持論却甚正每進言必勸人主以正心脩身為先其言之辯裁雖前軰有説不及處正如鬼出來念大悲呪相似正所謂妖言也又曰此等人多是有才㑹説底若使有好人在上收拾將去豈不做好人只縁時節不好義理之心不足以勝其利欲之心遂由徑捷出無所不至若逢治世他擇利而行知為君子之為􆀆亦必知所趨向治世之才亦那得箇箇是好人但是好人多自是相夾持在裏面不敢為非耳又問邢和叔章子厚之才使其遇治世能為好人否曰好人多須不至如此狼狽然邢亦難識雖以富韓馬吕邵程亦㸔他不破曰康節亦識得他曰亦只是就他皮膚上畧㸃化耳又曰他家自有一本言行錄記他平日做作好處項於滄峽見其家有子弟在彼作税官以一本見遺㸔來富初亦有得他力處盖元豐末邢恕嘗説蔡持正變熈豐法召馬吕故言行錄多記此等事嘗見徐端立侍郎説邢和叔之於元祐猶陳勝吳廣之於漢以其首事而先起也儒用因言宇文虛中嘗從童貫開燕山随童貫亦多年末嘗有一言諫童貫之失後來徽宗與其弟粹中説聞卿云虛中也極善料事朕方欲令在政府而執政不可不得已出之虛中後為奉使金人留之尊為國師凡事必咨問甚敬信之凡金人制禮作樂創法建置皆虛中教之後來取其家眷秦檜盡發與之以其子某為河南安撫或者謂虛中雖在北朝乃為朝廷嘗探伺金動静來報這下多結豪傑欲為内應因其子為師又烏珠是時往䝉國國中空虛虛中遂欲叛剋日欲發烏珠聞之遂亟走歸殺虛中而盡滅其族或者以為秦檜知虛中消息宻令人報北朝云虛中欲叛故金人得先其未發誅之卓李宗嗣郭藥師其人甚狡獪靖康之難正原於此如李宗嗣此人只是㑹説却不似那郭底有謀那箇甚乖義剛因論靖康執政曰徐處仁曾忤蔡京來舊做方面亦有聲後却如此錯繆孫傅略得却又好六甲神兵時節不好人材往往如此又曰張孝純守太原被圍甚急朝廷遣其子灝揔師往救却徘徊不進坐視其父之危急而不䘏以至城䧟時節不好時首先是無了那三綱按封氏編年載此甚詳或曰京師再被圍時張叔夜首領勤王之師以入叔夜為人亦好曰他當時亦不合領兵入城只當駐在旁近以為牽制且伸縮自如一入城後便有許多掣肘處所以迄無成功至於扈從北狩儒用徐處仁字擇之南京人靖康間執政舊嘗作帥時早間理㑹公事飯後與屬官相見皆要穿執如法各人禀職事了相與久坐説話議論又各随其人問難教戒所以鞭䇿者甚至故有人為其屬者無不有所知曉事吕居仁亦嘗事之凡作事無不有規模雖小事亦然無苟作者只如支官吏酒當其支日以酒缸盛㕔前自往各嘗之或差出外處或辭去或初來官按歴令各人以瓶來取如數給之從小至大一様無分毫私偏先生又云小處好作州郡極佳不甚知大體嘗作疏上道君論太后不居禁中事如罵然道君曰徐許多問目教朕如何答他李伯紀乞得去後於今太上處納了揚張孝純靖康間守太原金人圍其城凡抵當半年守得極好金人攻之不能下本自好了後來却去降敵人做他官職是時淵聖以其圍急遣孝純之子張灝為河北招討使之屬令自招義兵往援之以言君命則甚急而不可違以言北河之地則國家所持以為根本以言其父則正在危難有垂亡之厄當晨夕倍道以救之灝受命了自走了世界不好都生得這般人出來可歎子䝉問圍城時李伯紀如何曰當時不使他更使誰士氣至此消索無餘它人皆不肯向前惟有渠尚不顧死且得倚仗之問姚平仲刼寨事是誰發曰人皆歸罪伯紀此乃是平仲之謀姚种皆西方將家師道已立功平仲恥之故欲以竒功取勝及刼不勝欽廟親批令伯紀䇿應或云當時若再刼可勝但無人敢主張問种師中河東之死或者亦歸罪伯紀曰不然嘗親見一將官説師之敗乃是為流矢所中非戰敗渠親見之甚可恠如种師道方為樞宻朝廷倚重遽死亦是氣數伯紀初管御營欽廟受以空名告身自觀察使以下使之自補師退只用一二小使臣告御批云大臣作福作威漸不可長及遣救河東伯紀度事勢不可辭不行御批云身為大臣遷延避事是時許松老為右丞與伯紀善書杜郵二字與之伯紀悟遂行當危急時反為姦臣所使豈能做事問种師道果可倚仗否曰師道為人口訥語言不能出上問和親曰臣執干戈以衛社稷不知其它遂去不能反覆力執大抵是時在上者無定説朝變夕改縱有好人亦做不得事可學論李仁甫通鑑長編曰近得周益公書亦疑其間考訂未甚精宻因寄得數條來某㸔他書靖康間事最踈畧如姚平仲刼寨則以為出於李綱之謀种師中赴敵而死則以為迫於許翰之令不知二事俱有曲折刼寨一事決於姚平仲僥倖之舉綱實不知按綱除知宻院辭免劄午云方脩戰具嚴守偹以俟援師乗便逼敵使進不得攻退無所掠勢窮而遁候其渡河半濟而擊勝可萬全而平仲引衆出城㡬敗乃事然平仲受節制於宣撫不闗白於行營二月八日夜半平仲之出种師道亦不知之在㣲臣實無所與時執政如耿南仲軰方極力沮綱幸其有以藉口遂合為一辭謂平仲之出綱為其謀師中之死亦非翰之故按中興遺史云河北制置副使种師中軍真定進兵解太原圍去榆次三十里金人乗間來突師中欲取銀賞軍而輜重未到故士心離散又嘗約如古張灝兩軍同進二人不至師中身被𢾗創裹創力戰又一時死之朝廷議失律兵將中軍統制官王從道朝服而斬於馬行市脱如所書則翰不度事宜移文督戰固為有罪師中身為大將握重兵豈有見樞府一紙書不量可否遂忿然赴敵以死此二事盖出於孫覿所紀故多失實問覿何如人曰覿初間亦説好話夷考其行不為諸公所與遂與王及之王時雍劉觀諸人附阿耿南仲以主和議後竄嶺表尤啣諸公見李伯紀軰望風惡之洪景盧在史舘時沒意思謂靖康諸臣覿尚無恙必知其事之詳奏乞下覿具所見聞進呈秉筆之際遂因而誣其素所不樂之人如此二事是也仁甫不審多采其説遂作正文書之其他紀載有可信者反為小字以疏其下殊無統紀遂令觀者信之不疑極是害事昔王允之殺蔡邕也謂不可使佞臣執筆在幼主旁使吾黨䝉訕議允之用心固自可誅然佞臣不可執筆則是不易之論儒用姚平仲刼寨事李伯紀不知當時廟堂問老种如何處置种云合再刼諸公不從种再云拜告种老將不㑹説盖金人不知吾再刼也當時欲俟立春出戰者待种師中來也徳明姚平仲出城刼寨不勝或問計於种師道曰再刼時不能從使再刼未必不勝也曾有人問尹和靖靖康中孰可以為將曰种師道又問孰可以為相良乆曰也只教他做閎祖因論姚平仲刼寨种師道令更刼曰金人以其不再來了再刼却是因説金怕人刼寨他那大勢定相殺時却不怕此中人輕佻刼寨時却㑹相殺却易困那人三四月只喫火燒之類此人半日不食便軟了後魏帝常言呉児長於斫營吾但三四十里下寨云云斫營便是刼寨是他最怕此也汪丈帥福時某亦在逆亮來時一日送劉寳去用兵汪丈問云今太尉去時如何曰與金人戰時第一陣决勝第二陣未可知第三陣殺他不去矣盖此中只有些精鋭在前彼敵不得他頑不動第三四陣已困於彼矣汪丈云劉大將如此説了却如何揚种師道字彛叔贈太傅世衡之孫也少從横渠學練古今事宜上曰今日之事卿意如何師道曰女真不知兵豈有孤軍深入人境而能善其歸乎上曰業已􅊰和矣對曰臣以軍旅之事事陛下餘非所敢知也拜檢校少傅同知樞宻院事為京畿河北河東路宣撫使以姚平仲為都統制諸道兵悉𨽻之師道時被病特命母拜許乗肩輿入朝家人掖升殿金使王芮素頡頏方入對望見師道拜跪稍如禮上顧笑曰彼為卿故也又請緩與金幣禁逰騎使不得逺接俟彼惰歸扼而殱諸河公薨于第年七十六閲月京師復受圍城䧟上慟哭曰朕不用种師道言以至於此初金之去也師道勸上乗其半渡擊之不從曰異日必為國患故上嗟嘆之建炎加贈少保揚昔人嘗問尹和靖世難如此孰可以當之者尹曰种師道可曰將則可矣孰可以相乆之曰亦只令師道做也好一日召師道來全不能言遂不用許翰時為諫議為徽宗言當今之世豈可令閒而不用上曰种老不堪用矣卿可自見种問之如何往見之种亦不言許曰上令某問公公無以某為書生某以為今日之兵云云要從其去而擊之意种方應謂彼云云今不可擊俟其過河擊之許為上備言其意方用之种闗西人其性寡黙與申朝士大夫不合一日因對淵聖曰朕已與和矣种於此全不能有所論但曰臣以甲兵之事事陛下其他非臣所與聞揚靖康之禍縱元城了翁諸人在亦了不得伯謨曰心腹潰了道夫問靖康之禍若得前軰者一二人莫可主張否曰也難主張胡文定謂龜山云當時若早用其言也須救得一半説得極公道道夫天下不可謂之無人才如靖康建炎間未論士大夫只如盜賊中是有多少人宗澤在東京收拾得諸路豪傑甚多力請車駕至京圖恢復只縁汪黄一力沮撓後既無糧食供應澤又死遂散而為盜非其本心自是當時不曾收拾得他致為饑寒所迫以苟旦夕之命後來諸將立功名者往往皆是此時招降底人所以成湯説萬方有罪在予一人聖人見得意思直是如此儒用卓録云因言靖康紹興間事曰天下不可謂之無人才如髙宗初興天下多少人才自是髙宗不能盡舉而用之未説士大夫只盜賊中有㡬箇人才朝廷既不能用皆散而為盜賊可惜宗澤在東京煞招收得諸路豪傑盜賊力請髙宗還都亦以圖恢復被汪黄讒讃一面放散了皆去而為盜賊當初髙宗能聼宗澤李伯紀軰猶有少進歩處所以古人云萬方有罪在予一人怪他不得你既不能用他又無糧食與他喫教他何如得其勢只得散為羣賊以苟旦夕之命而已其中有多少人才可惜可惜因論人物云浙人極弱却生得一宗汝霖至剛果某云明州近印忠簡遺事讀之使人感憤流涕如請駕還都之事皆偹載當時只是為汪黄所沮曰宗公奏劄云陛下於近處偶得二人為相當時駕既南下中原羣盜四起宗公使人招之聞其名皆來𨽻麾下欲請駕還都自將往河北討伐金敵廟堂却行下問所招人是何等色以沮其䇿遂至發病而死舊常見知宗子燾云髙宗在南京時有宗室十五太尉者名叔尚起兵於汝州有數萬人其謀主曰陳烈叔尚自稱大王已而下詔召之令以兵屬大將某人身赴行在叔尚願以兵屬宗澤陳烈曰朝廷不令屬宗澤而自欲屬之不可叔尚曰然則何以為䇿烈曰某有一䇿提兵過河北乃蕭王之舉是時詔下補烈通直郎叔尚既就召烈不受官而去終身不知所之子燾云向見叔尚時有一人常著道服随之疑即是陳烈可學問今日事因及石子重是以其官召者時為福州撫幹因史直翁薦被召知廟堂不肯休須著去先生曰雖是如此然亦濟得甚事因舉孟子言或逺或近或去或不去歸潔其身而已又舉了翁云在彼者是舉爾所知在我者是為仁由己遂言靖康初張邦昌僣位吕舜徒為其門下侍郎當時有言他人不足惜只舜徒可惜者胡文定記其事云舜徒雖為邦昌官却能勸邦昌收回偽赦迎太后垂簾皆其力也其人云終是難分雪文定記此只到終是難分雪處便住更無它語問只如狄梁公在武后時當時若無梁公更害事曰梁公只是薦得張柬之數人它已先死如梁公為周朝相舜徒為邦昌官皆不可以訓伊川論平勃謂當以王陵為正是也如舜徒軰一生踐履適遭變故不幸有此事今人合下便如此却不得徳明劉聘君言在太學時傳寫伊洛文字者皆就帳中寫以當時法禁重也揚靖康間士人陳規守徳安府城金人羣盜皆攻不破朝野僉載有規䟦甚好僴陳規唐弼父也守順昌先教市人做泥圑如今涼棚様閣之於上金人來一齊放下滿街泥團馬䧟皆不能動矣揚和州有官本忠義錄刻靖康以來忠義死節之人從實錄編出子䝉張以道曰京西漕魏安行計口􅀈牛每四人共田百畆只得一牛由是大擾時頴州倅李椿之攝郡與議不合遂和歸去來詞休官歸作見一亭而魏竟追官勒停李字彭年岳州人義剛朱子語類卷一百三十
