body:
  text: 朱子語類卷一百八朱子五論治道治道别無説若使人主恭儉好善有言逆于心必求諸道有言孫于志必求諸非道這如何㑹不治這别無説從古來都有見成様子真是如此賀孫天下事有大根本有小根本正君心是大本其餘萬事各有一根本如理財以飬民為本治兵以擇將為本天下事自有箇大根本處每事又各自有个緊要處端蒙天下事當從本理㑹不可從事上理㑹方論世事曰湏是心度大方包裏得過運動得行振為學是自博而反諸約為治是自約而致其博自修因論世俗不冠帶云今為天下有一日不可緩者有漸正之者一日不可緩者興起之事也漸正之者維持之事也方古者脩身與取才䘏民與飬兵皆是一事今遂分為四升卿自古有道術為天下裂之説今親見其弊矣自脩天下事湏是人主曉得通透了自要去做方得如一事八分是人主要做只有一二分是為宰相了做亦做不得廣問或言今日之告君者皆能言脩徳二字不知教人君從何處脩起必有其要曰安得如此説只看合下心不是私即轉為天下之大公將一切私底意盡屏去所用之人非賢即别搜求正人用之問以一人耳目安能盡知天下之賢曰只消用一箇好人作相自然推排出來有一好臺諌知他不好人自然住不得徳明井田之法要行湏是封建令逐國各自去理㑹如王畿之内亦各有都鄙家鄙漢人嘗言郡邑在諸國之外而逺役於中都非便問漢以王國雜見於郡縣間如何曰漢本無法度徳明封建實是不可行若論三代之世則封建好處便是君民之情相親可以乆安而無患不似後世郡縣一二年輙易雖有賢者善政亦做不成淳因言封建只是歴代循襲勢不容已栁子厚亦説得是賈生謂樹國必相疑之勢甚然封建後來自然有尾大不掉之勢成周盛時能得幾時到春秋列國强盛周之勢亦浸㣲矣後來到戰國東西周分治赧王但寄於西周公耳雖是聖人法豈有無弊者大人先生之意以為封建井田皆易得致弊廣問後世封建郡縣何者為得曰論治亂畢竟不在此以道理觀之封建之意是聖人不以天下為己私分與親賢共理但其制則不過大此所以為得賈誼於漢言衆建諸侯而少其力其後主父偃竊其説用之於武帝端䝉諸生論郡縣封建之弊曰大抵立法必有弊未有無弊之法其要只在得人若是箇人則法雖不善亦占分數多了若非其人則有善法亦何益於事且如説郡縣不如封建若封建非其人且是世世相繼不能得他去如郡縣非其人却只三兩年任滿便去忽然換得好底來亦無定范太史唐鑑議論大率皆歸於得人某初嫌他恁地説後來思之只得如此説又云革弊湏從原頭理㑹燾栁子厚封建論則全以封建為非胡明仲軰破其説則專以封建為是要之天下制度無全利而無害底道理但看利害分數如何封建則根本較固國家可恃郡縣則截然易制然來來去去無長乆之意不可恃以為固也如役法亦然荆公只見差役之害而免役之利先生云差役時皆土著家戸人州縣亦較可靠免役則皆浮浪之人靖康間州縣亦有守令要守而吏民皆散去無復可恃然其弊亦不勝其多揚先生言論間猶有不滿於五峯論封建井田數事嘗䟽其説以質疑先生云封建井田乃聖王之制公天下之法豈敢以為不然但在今日恐難下手設使强做得成亦恐意外别生弊病反不如前則難收拾耳此等事未湏深論他日讀書多歴事乆當自見之也枅因論封建曰此亦難行使膏梁之子弟不學而居士民上其為害豈有涯哉且以漢諸王觀之其荒縱滛虐如此豈可以治民故主父偃勸武帝分王子弟而使吏治其國故禍不及民所以後來諸王也都善弱盖漸染使然積而至於魏之諸王遂使人監守雖飲食亦皆禁制更存活不得及至晉懲其弊諸王各使之典大藩揔强兵相屠相戮馴致大亂僴云監防太宻則有魏之傷恩若寛去䋲勒又有晉之禍亂恐皆是無古人教飬之法故爾曰那箇雖教無人奈得他何或言今之守令亦善卓録起此作郭兄問語曰却無前代尾大不掉之患只是州縣之權太輕卓録作無權卒有變故更支撑不住僴因舉祖宗官制㳂革中説祖宗時州郡禁兵之額極多又有諸般名色錢可以贍飬及王介甫作相凡州郡兵財皆括歸朝廷而州縣益虚所以後來之變天下瓦解由州郡無兵無財故也曰只祖宗時州郡已自輕了如仁宗朝京西群盜横行破州屠縣無如之何淮南盜王倫破髙郵郡守晁仲約以郡無兵財遂開門犒之卓録作歛金帛以賂之使去富鄭公聞之大怒欲誅守臣曰豈有任千里之寄不能拒賊而反賂之范文正公争之曰州郡無兵無財俾之將何捍拒今守臣能權冝應變以全一城之生靈亦可矣豈可反以為罪耶然則彼時州郡已如此虚弱了如何盡責得介甫僴卓録今附于下介甫只是刮刷太甚凡州郡禁兵闕額盡令勿補填且如一州有千人禁軍額闕五百人則本郡不得招填每嵗樁留五百名之衣糧并二季衣賜之物令轉運使掌之而盡歸於朝廷如此煞得錢不可勝計陳丈云記得先生説教提刑掌之歸朝廷名曰封樁鉄額禁軍錢又云也怪不得州郡欲添兵誠無糧食給之其勢多招不得某守南康舊有千人禁軍額某到時纔有二百人而已然嵗已自闕供給本軍毎年有租米四萬六千石以三萬九千來上供所餘者止七千石僅能贍得三月之糧三月之外便用别擘畫措置如斛面加量之屬又盡則預於民間借支方借之時早榖方熟不得已出榜令民先將早米來納亦謂之租米俟冬則折除其租米亦當大米之數如此猶贍不給夀皇數數有指揮下來必欲招滿千人之額某申去云不難於招只是無討糧食處又行下云便不及千人亦湏招填五百人雖聖㫖如此然終無得錢糧處只得如此挨過日子而已想得自初千人之額自來不曽及數盖州郡只有許多米他無來處何以贍給之然上供外所餘七千石州郡亦不得用轉運使毎嵗行文字下來約束只教樁留在本州不得侵支顆粒那裏有年年侵使了毎監司使公吏下來檢視州郡又厚賂遺之使去全無顆粒怪不得若更不得支此米何從得贍軍然亦只贍得兩三月何况都無非天雨鬼輸何從得來某在彼時顔魯子王齊賢屢行文字下來令不得動某報去云累政即無顆粒見在雖上司約束分明奈嵗用支使何今來上司不若為之豁除其數若守此虚名而無實徒為胥吏軰賂賄之地又况州郡毎嵗靠此米支遣決不能如約束何似罷之更不聼督責愈急顔魯子又推王齊賢王齊賢又推顔魯子及王齊賢去顔依舊行下約束却被某不能管得只認支使了若以為罪則前後之為守者皆一様又何從根䆒其勢不奈何只得如此處卓居今之世若欲盡除今法行古之政則未見其利而徒有煩擾之弊又事體重大阻格處多決然難行要之因祖宗之法而精擇其人亦足以治只是要擇人范淳夫唐鑑其論亦如此以為因今郡縣足以為治某少時常鄙之以為苟簡因循之論以今觀之信然僴徳明録云問今日之治當以何為先曰只是要得人問先生所謂古禮繁文不可攷䆒欲取今見行禮儀増損用之庶其合於人情方為有益如何曰固是曰若是則禮中所載冠婚䘮祭等儀有可行者否曰如冠昏禮豈不可行但䘮祭有煩雜耳問若是則非理明義精者不足以與此曰固是曰井田封建如何曰亦有可行者如有功之臣封之一鄉如漢之鄉亭侯田税亦湏要均則經界不可以不行大綱在先正溝洫又如孝弟忠信人倫日用間事播為樂章使人歌之倣周禮讀法徧示鄉村裏落亦可代今粉壁所書條禁人傑問歐公本論謂今冠昏䘮祭之禮只行於朝廷宜令禮官講明頒行於郡縣此説如何曰向來亦曾頒行後來起告訐之訟遂罷然亦難得人教他問三代規模未能遽復且講䆒一箇粗法管領天下如社倉舉子之類先生曰譬如補鍋謂之小補可也若要做湏是一切重鑄今上自朝廷下至百司庶府外而州縣其法無一不弊學校科舉尤甚又云今之禮尚有見於威儀辭遜之際若樂則全是失了問朝廷合頒降禮樂之制令人講習曰以前日浙東之事觀之州縣直是視民如禽獸豐年猶多饑死者雖百后䕫亦呼召他和氣不來徳明制度易講如何有人行振立一个簡易之法與民由之甚好夏商井田法所以難廢者固是有聖賢之君繼作亦是法簡不似周法繁碎然周公是其時不得不恁地惟繁故易廢使孔子繼周必能通變使簡易不至如是繁碎今法極繁人不能變通只管築塞在這裏道夫呉伯英與黄直卿議溝洫先生徐曰今則且理㑹當世事尚未盡如刑罰則殺人者不死有罪者不刑税賦則有産者無税有税者無産何暇議古盖卿欲整頓一時之弊譬如常洗澣不濟事湏是善洗者一一拆洗乃不枉了庶幾有益過聖人固視天下無不可為之時然勢不到他做亦做不得燾因説理㑹天下彌文曰伊川云只患不得為不患不能為如有稱在此物來即輕重皆了何必先要一一等過天下之物方審㣲於未形御變於將來非知道者孰能燾㑹做事底人必先度事勢有必可做之理方去做燾不能則謹守常法燾天生一世人才自足一世之用自古及今只是這一般人但是有聖賢之君在上氣焰大薫蒸陶冶得别這箇自爭八九分只如時節雖不好但上面意思略轉下面便轉况乎聖賢是甚力量少間無狀底人自銷鑠改變不敢做出來以其平日為己之心為公家辦事自然修舉葢小人多是有才底人儒用或錄云問天地生一世人自足了一世用但患人不能盡用天地之才此其不能大治若以今世論之則人才之可數者亦可見矣果然足以致大治乎曰不然人只是這箇人若有聖賢出來只它氣焰自薫蒸陶冶了無限人才這箇自争八九分少間無狀者惡者自消爍不敢使出各求奮勵所長而化為好人矣而今朝廷意思略轉則天下之人便皆變動况有大聖賢者出是麽様氣魄那箇盡薰蒸了小人自是不敢放出無狀以其自私自利辦事之心而為上之用皆是有用之人矣荀悦曰教化之行挽中人而進於君子之域教化之廢推中人而墮於小人之塗若是舉世恁地各舉其職有不能者亦湏勉强去做不然也怕公議既無公議便舉無忌憚了䕫孫天下人不成盡廢之使不得從政只當講學庶得人漸有好者庶有可以為天下之理方今日人材湏是得箇有見識又有度量人便容受得今日人材將來截長補短使升卿後世只是無箇人樣徳明汎言人才曰今人只是兩種謹宻者多退避俊快者多粗疎道夫世間有才底人若能損那有餘勉其不足時節却做得事却出來擔當得事與那小㢘曲謹底不同貪汙者必以亷介者為不是趨競者必以恬退者為不是由此類推之常人莫不皆然人傑今人材舉業浸纎弱尖巧恐是風氣漸薄使然好人或出於荒山中方賀孫問先生出處因云氣數衰削區區愚見以為稍稍為善正直之人多就摧折困頓似皆佞䛕得志之時曰亦不可一向如此説只是無人一人出來湏得許多人大家合力做若是做不得方可歸之天方可喚做氣數今若有兩三人要做其他都不管他直教那兩三人摧折了便休賀孫有言世界無人管乆將脱去凡事未到手則姑晦之俟到手然後為有詰之者曰若不幸未及為而死吾志不白則如之何曰此亦不奈何吾軰蓋是折本做也先生曰如此則是一部孟子無一句可用也嘗愛孟子荅淳于髠之言曰嫂溺援之以手天下溺援之以道子欲手援天下乎吾人所以救世者以其有道也既自放倒矣天下豈一手可援哉觀其説縁餙得來不好安得似陸子静堂堂自在説成一个物事乎方子直卿云嘗與先生言如今有一等才能了事底人若不識義理終是難保先生不以為然以為若如此説却只是自家這下人使得不是自家這下人都不是人才賀孫荀彧歎無智謀之士看今來把誰做智謀之士伯謨云今時所推只永嘉人江西人又麄福建又無甚人先生不應因云南軒見義必為他便是没安排周遮要做便做人説道他勇便是勇這便是不可及歎息數聲賀孫浙中人大率以不生事撫循為知體先生謂便是枉尺直尋如此風俗議論至十年國家事都無人作矣常人以便文小人以容奸如此風大害事揚今世士大夫惟以苟且逐旋挨去為事挨得過時且過上下相咻以勿生事不要十分分明理㑹事且恁鶻突才理㑹得分明便做官不得有人少負能聲及少經挫抑却悔其大惺惺了了一切刓方為圓且恁隨俗苟且自道是年髙見識長進當官者大小上下以不見吏民不治事為得䇿曲直在前只不理㑹庶幾民自不來以此為止訟之道民有寃抑無處伸訴只得忍遏便有訟者半年周歲不見消息不得了決民亦只得休和居官者遂以為無訟之可聴風俗如此可畏可畏僴今日人才之壊皆由於詆排道學治道必本於正心脩身實見得恁地然後從這裏做出如今士大夫但説據我逐時恁地做也做得事業説道學説正心脩身都是閒説話我自不消得用此若是一人义手並脚便道是矯激便道是邀名便道是做崖岸湏是如市井底人拖泥帶水方始是通儒實才賀孫器逺問文中子安我者所以寧天下也存我者所以厚蒼生也看聖人恁地維持紀綱却與有是非無利害之説有不相似者曰只為人把利害之心去看聖人若聖人為治終不成掃蕩紀綱使天下自恁地頽壊廢弛方喚做公天下之心聖人只見得道理合恁地做有令天下在這裏湏著去保守湏著有許多維持紀綱這是決定著如此不如此便不得這只是箇暏是又問若如此説則陳丈就事物上理㑹也是合如此曰雖是合如此只是無自家身已做本領便不得又問事求可功求成亦是當如此曰只要去求可求成便不是聖人做事那曾不要可不要成只是先從這裏理㑹去却不曾恁地計較成敗利害如公所説只是要去理㑹許多汩董了方牽入這心來却不曾有從這裏流出在事物上底意思賀孫蔡季通因浙中主張史記常説道邵康節所推世數自古以降去後是不解㑹甚好只得就後世做規模以某看來則不然孔子修六經要為萬世標準若就那時商量别作箇道理孔子也不解修六經得如司馬遷亦是箇英雄文字中間自有好處只是他説經世事業只是第二三著如何守他議論如某退居老死無用之物如諸公都出仕官這國家許多命脉固自有所屬不直截以聖人為標準却要理㑹第二三著這事煞利害千萬細思之賀孫凡事求可功求成取必於智謀之末而不循天理之正者非聖賢之道燾古人立法只是大綱下之人得自為後世法皆詳宻下之人只是守法法之所在上之人亦進退下之人不得揚今世有二弊法弊時弊法弊但一切更改之却甚易時弊則皆在人人皆以私心為之如何變得嘉祐間法可謂弊矣王荆公未幾盡變之又别起得許多弊以人難變故也揚揚因論科舉法雖不可以得人然尚公曰銓法亦公然法至於盡公不在人便不是好法要可私而公方始好揚今日之法君子欲為其事以拘於法而不得騁小人却狥其私敢越於法而不之顧人傑今人只認前日所行之事而行之便謂之循典故也湏㨂箇是底始得學䝉被幾个秀才在這裏飜弄那吏人飜得來難看吏文只合直説某事是如何條貫是如何使人一看便見方是今只管弄閒言語説到緊要處又只恁地帶過去至今日天下且得箇姚崇李徳裕來措置看如何浩今日之事若向上尋求湏用孟子方法其次則孔明之治蜀曹操之屯田許下也徳明因論郡縣政治之乖曰民雖衆畢竟只是一个心甚易感也揚呉英茂實云政治當明其號令不必嚴刑以為威曰號令既明刑罰亦不可弛苟不用刑罰則號令徒掛墻壁爾與其不遵以梗吾治曷若懲其一以戒百與其覈實檢察於其終曷若嚴其始而使之無犯做大事豈可以小不忍為心言經界道夫因論經界曰只著一私字便生無限枝節或問程子與五十里采地之説如何曰人之心無窮只恐與五十里他又要一百里與一百里他又要二百里淳吾軰今經歴如此異時若有尺寸之柄而不能為斯民除害去惡豈不誠可罪耶某嘗謂今之世姑息不得直湏共他理㑹庶幾善弱可得存立道夫或問為政者當以寛為本而以嚴濟之曰某謂當以嚴為本而以寛濟之曲禮謂涖官行法非禮威嚴不行湏是令行禁止若曰令不行禁不止而以是為寛則非也人傑古人為政一本於寛今必湏反之以嚴盖必如是矯之而後有以得其當今人為寛至於事無統紀緩急予奪之權皆不在我下梢却是姦豪得志平民既不蒙其恵又反受殃矣若海今人説寛政多是事事不管某謂壊了這寛字人傑平易近民為政之本僴為政如無大利害不必議更張則所更一事未成必閧然成紛擾卒未已也至於大家且假借之故子産引鄭書曰安定國家必大焉先人傑問為政更張之初莫亦湏稍嚴以整齊之否曰此事難斷定説在人如何處置然亦何消要過於嚴今所難者是難得曉事底人若曉事底人歴練多事纔至面前他都曉得依那事分寸而施以應之人自然畏服今人徃徃過嚴者多半是自家不曉又慮人欺己又怕人慢己遂將大拍頭去拍他要他畏服若自見得何消過嚴便是這事難又曰難難僴因言處置天下事直是難救得這一弊少間就這救之之心又生那一弊如人病寒下熱藥少間又變成燥熱及至病熱下寒藥少間又變得寒到得這家計壊了更支捂不住僴問州縣間寛嚴事既已聞命矣若經世一事向使先生見用其將何先曰亦只是隨時如夀皇之初是一様中間又是一様只合隨時理㑹問今日之治奉行祖宗成憲然自太祖皇帝以來至今其法亦有弊而當更者曰亦只是就其中整理如何便超出做得如薦舉如科場如銓試就其中從長整理問向説諸州廂禁軍與屯戍大軍更互教閲如何曰亦只是就其法整理既而歎曰法度尚可移如何得人心變易各人將他心去行法且如薦舉一事雖多方措置隄防然其心只是要去私他親舊應副權勢如何得心變説了徳明起禀云數日聴尊誨敬當銘佩請出整衣拜辭遂出再入拜於床下三次扶掖先生俯身顰眉動色言曰後㑹未期朋友間多中道而畫者老兄却能拳拳于切己之學更勉力廣充以慰衰老之望徳明復致詞拜謝而出不勝悵然前一日先生云朋友赴官來相别某病如此時事又如此後此相見不知又如何道中追念斯言不覺涕下伯魯進求一言之誨先生云歸去且與廖丈商量昨日説得已詳大抵只是如此稱丈者為丈夫伯魯言徳明問治亂之機曰今看前古治亂那裏是一時做得少是四五十年多是一二百年醖釀方得如此遂俛首太息賀孫朱子語類卷一百八
