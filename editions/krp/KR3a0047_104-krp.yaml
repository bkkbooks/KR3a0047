body:
  text: 朱子語類卷一百四朱子一自論為學工夫某自丱角讀四書甚辛苦諸公今讀時文較易做工夫了敬仲以下讀書後生家好著些工夫子細看文字某向來看大學猶病於未子細如今愈看方見得精切因説前輩諸先生長者説話於大體處固無可議若看其他細碎處大有工夫未到木之某向丱角讀論孟自後欲一本文字髙似論孟者竟無之友仁某十數嵗時讀孟子言聖人與我同類者喜不可言以為聖人亦易做今方覺得難楊某舊時看文字一向看去一看數卷全不曾得子細於義理之文亦然極為病今日看中庸只看一叚子揚讀書須純一如看一般未了又要般渉都不濟事某向時讀書方其讀上句則不知有下句讀上章則不知有下章讀中庸則秪讀中庸讀論語則秪讀論語一日秪看一二章將諸家説看合與不合凡讀書到冷淡無味處尤當著力推考道夫讀書湏讀到不忍捨處方是見得真味若讀之數過略曉其義即厭之欲别求書看則是於此一卷書猶未得趣也盖人心之靈天理所在用之則愈明只提醒精神終日著意看得多少文字窮得多少義理徒為懶倦則精神自是憒憒只恁昏塞不通可惜某舊日讀書方其讀論語時不知有孟子方讀學而第一不知有為政第二今日看此一叚明日且更看此一叚看來看去直待無可看方換一叚看如此看文自然洞貫方為浹洽時下雖是鈍滯便一件了得一件將來却有盡理㑹得時若撩東劄西徒然看多事事不了日暮途逺將來荒忙不濟事舊見李先生説理㑹文字湏令一件融釋了後方更理㑹一件融釋二字下得極好此亦伊川所謂今日格一件明日又格一件格得多後自脱然有貫通處此亦是他真曾經歴來便説得如此分明今若一件未能融釋而又欲理㑹一件則第二件又不了推之萬事事不了何益大雅某是自十六七時下工夫讀書彼時四畔皆無津涯只自恁地硬著力去做至今日雖不足道但當時也是喫了多少辛苦讀了書今人卒乍便要讀到某田地也是難要湏積累著力方可某今老而將死所望者但願朋友勉力學問而已道夫器之問野有死麕曰讀書之法湏識得大義得他滋味没要緊處縱理㑹得也無益大凡讀書多在諷誦中見義理况詩又全在諷誦之功所謂清廟之瑟一唱而三嘆一人唱之三人和之方有意思又如今詩曲若只讀過也無意思湏是歌起來方見好處因説讀書湏是有自得處到自得處説與人也不得某舊讀仲氏任只其心塞淵終温且恵淑慎其身先君之思以朂寡人既破我斧又闕我斨周公東征四國是皇哀我人斯亦孔之將伊尹曰先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至於有萬邦兹惟艱哉如此等處直為之廢卷慨想而不能已覺得朋友間看文字難得這般意思某二十嵗前後已看得書大意如此如今但較精宻日月易得匆匆過了五十來年木之謂器之看詩病於草率器之云如今將先生數書循環看去曰都讀得了方可循環再看如今讀一件書湏是真箇理㑹得這一件了方可讀第二件讀這一叚湏是理㑹得這一叚了方可讀第二叚少間漸漸節次看去自解通透只五年間可以讀得經子諸書迤邐去看史傳無不貫通韓退之所謂沈潜乎訓義反覆乎句讀湏有沈潜反覆之功方得所謂審問之湏是表裏内外無一毫之不盡方謂之審恁地竭盡心力猶有見未到處却不奈何如今人不曾竭盡心力只見得三兩分了便草草揭過少間只是鶻突無理㑹枉著日月依舊似不曾讀相似只如韓退之老蘇作文章本自没要緊事然他大叚用功少間方㑹漸漸掃去那許多鄙俗底言語換了箇心胷説這許多言語出來如今讀書湏是加沈潜之功將義理去澆灌胷腹漸漸盪滌去那許多淺近鄙陋之見方㑹見識髙明因説讀詩惟是諷誦之功上蔡亦云詩湏是謳吟諷誦以得之某舊時讀詩也只先去看許多注解少間却被惑亂後來讀至半了却只將詩來諷誦至四五十過已漸漸得詩之意却去看注解便覺減了五分以上工夫更從而諷誦四五十過則胷中判然矣因説如今讀書多是不曾理㑹得一處通透了少間却多牽引前面疑難來説此最學者大病譬如一箇官司本自是鶻突了少間又取得許多鶻突底證見來證對却成一塲無理㑹去又有取後面未曾理㑹底來説却似如今只來建陽縣猶自未見得分曉却又將建寧府與南劔州事來説如何説得行少間弄來弄去只是胡説瞞人有人説話如此者某最怕之説甲未了又纒向乙上去説乙未了又纒向丙上去無一句著實正如斜風雨相似只管吹將去無一㸃著地竟有終日與他説不曾判斷得一件分曉徒費氣力耳木之先生因與朋友言及易曰易非學者之急務也某平生也費了些精神理㑹易與詩然其得力則未若語孟之多也易與詩中所得似雞肋焉壮祖問近看胡氏春秋初無定例止説歸忠孝處便為經義不知果得孔子意否曰某嘗説詩書是隔一重兩重説易春秋是隔三重四重説春秋義例易爻象雖是聖人立下今説者用之各信巳見然於人倫大綱皆通但未知曾得聖人當初本意否且不如讓渠如此説且存取大意得三綱五常不至廢墜足矣令欲直得聖人本意不差未湏理㑹經先湏於論語孟子中專意看他切不可忙虛心觀之不湏先自立見識徐徐以俟之莫立課程某二十年前得上蔡語録觀之初用銀朱畫出合處及再觀則不同矣乃用粉筆三觀則又用墨筆數過之後則全與元看時不同矣大抵老兄好去難處用工不肯向平易處用工故見如此難進今當於平易處用工大雅讀書貪多最是大病下梢都理㑹不得若到閑時無書讀時得一件書看更子細某向為同安簿滿到泉州候批書在客邸借文字只借得一冊孟子將來子細讀方尋得本意見看他初間如此問又如此答待再問又恁地答其文雖若不同自有意脉都相貫通句句語意都有下落賀孫看文字却是索居獨處好用功夫方精專看得透徹未湏便與朋友商量某徃年在同安日因差出體究公事處夜寒不能寐因看得子夏論學一叚分明後官滿在郡中等批書已遣行李無文字看於館人處借得孟子一冊熟讀方曉得飬氣一章語脉當時亦不暇冩出只逐叚以紙簽簽之云此是如此説簽了便看得更分明後來其間雖有修改不過是轉換處大意不出當時所見如謾人底議論某少年亦㑹説只是終不安直到尋箇慤實處方已􅓌某舊年思量義理未透直是不能睡初看子夏先傳後倦一章凡三四夜窮䆒到明徹夜聞杜鵑聲過問嘗聞先生為學者言讀書湏有箇悦處方進先生又自言某雖如此屢覺有所悦因禀曰此先生進徳日新工夫不知學者如何到得悦處曰亦只是時習時習故悦徳明某嘗説看文字湏似法家深刻方窮究得盡某直是下得工夫義剛某舊時讀書專要㨂好處看到平平泛泛處多闊略後多記不得自覺也是一箇病今有一般人看文字却只摸得些查滓到有深意好處却全不識此因有獻易説多失伊川精意而言賀孫凡看文字諸家説異同處最可觀某舊日看文字專看異同處如謝上蔡之説如彼楊龜山之説如此何者為得何者為失所以為得者是如何所以為失者是如何學䝉某尋常看文字都曾疑來如上蔡觀復堂記文定答曾吉甫書皆曾把做孔孟言語一般看乆之方見其未是每一次看透一件便覺意思長進不似他人只依稀一見謂其不似便不復看不特不見其長處亦不見其短處􅓌某尋常見是人文字未嘗敢輕易亦恐有好處鞭著工夫看它􅓌某所以讀書自覺得力者只是不先立論方子某自十五六時至二十嵗史書都不要看但覺得閑是閑非没要緊不難理㑹大率才看得此等文字有味畢竟麤心了吕伯恭教人看左傳不知何謂履孫學者難得都不肯自去著力讀書某登科後要讀書被人横截直截某只是不管一面自讀顧文蔚曰且如公有誰鞭辟畢竟是自要讀書文蔚看道理若只恁地説過一遍便了則都不濟事湏是常常把來思量始得看過了後無時無候又把起來思量一遍十分思量不透又且放下待意思好時又把起來看恁地將乆自然解透徹延平先生嘗言道理湏是日中理㑹夜裏却去静處坐地思量方始有得某依此説去做真箇是不同義剛以下窮理或問先生謂講論固不可無湏是自去體認如何是體認曰體認是把那聽得底自去心裏重複思量過伊川曰時復思繹浃洽於中則説矣某向來從師一日間所聞説話夜間如温書一般字字子細思量過才有疑明日又問廣問必有事焉而勿正心勿㤀勿助長曰此亦只是為公孫丑不識浩然之氣故教之飬氣工夫緩急云不必太急不要忘了亦非教人於無著摸處用工也某舊日理㑹道理亦有此病後來李先生説令去聖經中求義某後刻意經學推見實理始信前日諸人之誤也大雅器之問嘗讀孟子求放心章今毎覺心中有三病籠統不專一看義理毎覺有一重似簾幙遮蔽又多有苦心不舒快之意曰若論求此心放失有千般萬様病何止於三然亦别無道理醫治只在專一果能專一則静静則明明則自無遮蔽既無遮蔽須自有舒泰寛展處這也未㑹如此且收歛此心專一漸漸自㑹熟熟了自有此意看來百事只在熟且如百工技藝也只要熟熟則精精則巧器之又問先生徃時初學亦覺心有不專一否曰某初為學全無見成規模這邊也去理㑹尋討那邊也去理㑹尋討向時諸前軰毎人各是一般説話後來見李先生李先生較説得有下落説得較縝宻若看如今自是有見成下工夫處看來湏是先理㑹箇安着處譬如人治生也湏先理㑹箇屋子安著身已方始如何經營如何積累漸漸湏做成家計若先未有安著身已處雖然經營畢竟不濟事為學者不先存此心雖説要去理㑹東東西西都自無安著處孟子所以云收放心亦不是説只收放心便了收放心且收歛得箇根基方可以做工夫若但知收放心不做工夫則如近日江西所説則是守箇死物事故大學之書湏教人格物致知以至於誠意正心修身齊家治國平天下節節有工夫賀孫某所得處甚約只是一兩切要句上却日夜就此一兩句上用意玩味胷中自是灑落又云放心不必是走在别處去但一劄眼間便不見才覺得又便在面前不是難收拾自去提撕便見得是如此恪近日已覺向來説話太支離處反身以求正坐自己用功亦未切耳因此減去文字功夫覺得閑中氣象甚適毎勸學者亦且看孟子道性善求放心兩章著實體察收拾為要其餘文字且大概諷誦涵詠未湏大叚著力考索也舊在湖南理㑹乾坤乾是先知坤是踐履上是知至下是終之却不思今只理㑹箇知未審到何年月方理㑹終之也是時覺得無安居處常恁地忙又理㑹動静以為理是静吾身上出來便是動却不知未發念慮時静應物時動静而理感亦有動動時理安亦有静初尋得箇動静意思其樂甚乖然却一日舊似一日當時看明道答横渠書自不入也方舊來失了此物多時今收來尚未便入腔窠但當盡此生之力而後已自謂云爾方今日學者不長進只是心不在焉嘗記少年時在同安夜聞鐘鼓聲聴其一聲未絶而此心己自走作因此警懼乃知為學湏是專心致志又言人有一正念自是分曉又從旁别生一小念漸漸放闊去不可不察徳明這道理湏是見得是如此了驗之於物又如此驗之吾身又如此以至見天下道理皆端的如此了方得如某所見所言又非自㑹説出來亦是當初於聖賢與二程所説推之而又驗之於已見得真實如此道夫劉晏見錢流地上想是他計較得熟了如此某而今看聖人説話見聖人之心成片價從面前過胡泳某尋常莫説前軰只是長上及朋友稍稍説道理底某便不敢説他説得不是且將他説去研䆒及自家曉得却見得他底不是某尋常最居人後又曰尋常某最得此力節初師屏山籍溪籍溪學於文定又好佛老以文定之學為論治道則可而道未至然於佛老亦未有見屏山少年能為舉業官莆田接塔下一僧能入定數日後乃見了老歸家讀儒書以為與佛合故作聖傳論其後屏山先亡籍溪在某自見於此道未有所得乃見延平可學論傳授或説象山説克己復禮不但只是欲克去那利欲忿懥之私只是有一念要做聖賢便不可曰此等議論恰如小兒則劇一般只管要髙去聖門何常有這般説話人要去學聖賢此是好底念慮有何不可若以為不得則堯舜之兢兢業業周公之思兼三王孔子之好古敏求顔子之有為若是孟子之願學孔子之念皆當克去矣看他意思只是禪誌公云不起纎毫修學心無相光中常自在他只是要如此然豈有此理只如孔子答顔子克己復禮為仁據他説時只這一句已多了又况有下頭一落索只是顔子才問仁便與打出方是及至恁地説他他又却諱某嘗謂人要學禪時不如分明去學他禪和一棒一喝便了今乃以聖賢之言夾雜了説都不成箇物事道是龍又無角道是蛇又有足子静舊年也不如此後來弄得直恁地差異如今都教壊了後生箇箇不肯去讀書一味顛蹷没理㑹處可惜可惜正如荀子不睹是逞快胡罵亂罵教得箇李斯出來遂至焚書坑儒若使荀卿不死見斯所為如此必湏自悔使子静今猶在見後生軰如此顛蹷亦湏自悔其前日之非又曰子静説話常是兩頭明中間暗或問暗是如何曰是他那不説破處他所以不説破便是禪所謂鴛鴦繡出從君看莫把金針度與人他禪家自愛如此某年十五六時亦嘗留心于此一日在病翁所㑹一僧與之語其僧只相應和了説也不説是不是却與劉説某也理㑹得箇昭昭靈靈底禪劉後説與某某遂疑此僧更有要妙處在遂去扣問他見他説得也煞好及去赴試時便問他意思去胡説是時文字不似而今細宻由人麤説試官為某説動了遂得舉時年十九後赴同安任時年二十四五矣始見李先生與他説李先生只説不是某却倒疑李先生理㑹此未得再三質問李先生為人簡重却是不甚㑹説只教看聖賢言語某遂將那禪來權倚閣起意中道禪亦自在且將聖人書來讀讀來讀去一日復一日覺得聖賢言語漸漸有味却囬頭看釋氏之説漸漸破綻罅漏百出廣問擇之云先生作延平行狀言黙坐澄心觀四者未發已前氣象此語如何曰先生亦自説有病後復以問先生云學者不湏如此某少時未有知亦曾學禪只李先生極言其不是後來考究却是這邊味長才這邊長得一寸那邊便縮了一寸到今銷鑠無餘矣畢竟佛學無是處徳明某舊時亦要無所不學禪道文章楚詞詩兵法事事要學出入時無數文字事事有兩冊一日忽思之曰且慢我只一箇渾身如何兼得許多自此逐時去了大凡人知箇用心處自無縁及得外事揚某自十四五嵗時便覺得這物事是好底物事心便愛了某不敢自昧實以銖累寸積而得之方子與范直閣説忠恕是三十嵗時書大概也是然説得不似而今看得又較别淳三十年前長進三十年後長進得不多僴某今且勸諸公屏去外務䟎工夫專一去看這道理某年二十餘已做這工夫將謂下梢理㑹得多少道理今忽然有許多年紀不知老之至此也只理㑹得這些子嵗月易得蹉跎可畏如此賀孫因言讀書用功之難諸公覺得大故淺近不曾著心某舊時用心甚苦思量這道理如過危木橋子相去只在毫髪之間才失脚便跌落下去用心極苦五十嵗已後覺得心力短看見道理只争絲髪之間只是心力把不上所以大學中庸語孟諸文字皆是五十嵗已前做了五十已後長進得甚不多而今人看文字全然心粗未論説道理只是前軰一様文士亦是用幾多工夫方做得成他工夫更多若以他這心力移在道理上那裏得來如韓文公答李翊一書與老蘇上歐陽公書他直如此用工夫未有苟然而成者歐陽公則就作文上改換只管揩磨逐旋捱將去乆之漸漸揩磨得光老蘇則直是心中都透熟了方出之於書看他們用工夫更難可惜若移之於此大叚可畏看來前軰以至敏之才而做至鈍底工夫今人以至鈍之才而欲為至敏底工夫渉獵看過所以不及古人也故孔子曰參也魯湏是如此做工夫始得僴讀書湏是虚心方得他聖人説一字是一字自家只平著心去秤停他都不使得一毫杜撰只順他去某向時也杜撰説得終不濟事如今方見得分明方見得聖人一言一字不吾欺只今六十一嵗方理㑹得恁地若或去年死也則枉了自今夏來覺見得纔是聖人説話也不少一箇字也不多一箇字恰恰地好都不用一些穿鑿荘子云吾與之虚而委蛇既虚了又要隨他曲折恁地去今且與公説箇様子乆之自見今人大抵偪塞滿胷有許多伎倆如何便得他虚亦大是難分明道知至而後意誠盖知未至雖見人説終是信不過今説格物且只得一件兩件格將去及乆多後自然貫通信得道夫某覺得今年方無疑伯羽理㑹得時今老而死矣能受用得幾年然十數年前理㑹不得死又却可惜士毅丙辰冬先生多有不可為之歎漢卿曰前年侍坐聞先生云天下無不可為之事兵隨將轉將逐符行今乃謂不可為曰便是這符不在自家手裏或謂漢卿多禪語賀孫因云前承漢卿教訓似主静坐澄清之語漢卿云味道煞篤實云云先生曰静坐自是好近得子約書云湏是識得喜怒哀樂未發之本體此語儘好漢卿又問前年侍坐所聞似與今别前年云近方看得這道理透若以前死却亦是枉死了今先生忽發歎以為只如此不覺老了還當以前是就道理説今就勲業上説先生曰不如此自是覺得無甚長進於上面猶覺得隔一膜又云於上面但覺透得一半賀孫某當初講學也豈意到這裏幸而天假之年許多道理在這裏今年頗覺勝似去年去年勝似前年䕫孫某老矣無氣力得説時先生病當夜説話氣力比常時甚㣲看也看不得了行也行不盡了説也説不辦了諸公勉之僴敬子舉先生所謂傳命之脉及佛氏傳心傳髓之説曰便是要自家意思與他為一若心不在上面書自是書人自是人如何看得出孔子曰吾十有五而志於學只十五歲時便斷斷然以聖人為志矣二程自十五六時便慨然欲學聖人僴周敬王四十一年壬戌孔子卒至宋慶元三年丁巳一千六百七十六年先生是年正旦書於藏書閣下東楹人傑人之血氣固有强弱然志氣則無時而衰苟常持得這志縱血氣衰極也不由他如某而今如此老病衰極非不知每日且放晚起以飬病但自是心裏不穏只交到五更初目便睡不著了雖欲勉强睡然此心已自是箇起來底人不肯就枕了以此知人若能持得這箇志氣定不㑹被血氣奪凡為血氣所移者皆是自棄自暴之人耳僴以下雜記先生患氣痛脚弱泄㵼或勸晚起曰某自是不能晩起雖甚病纔見光亦便要起尋思文字纔稍晚便覺似宴安鴆毒便似箇懶惰底人心裏便不安湏是早起了却覺得心下鬆爽僴某氣質有病多在忿懥閎祖因語某人好作文曰平生最不喜作文不得已為人所託乃為之自有一等人樂於作詩不知移以講學多少有益符舜功曰趙昌父前日在此好作詩與之語道理如水投石可學戊辰年省試出剛中而應或云此句凡七出某將彖辭暗地黙數只有五箇其人堅執某又再誦再數只與説記不得只記得五出且隨某所記行文已而出院檢本果五出耳又云只記得大象便畫得卦銖先生每得未見書必窮日夜讀之嘗云向時得徽宗實録連夜看看得眼睛都疼一日得韓南澗集一夜與文蔚同看倦時令文蔚讀聴至五更盡卷曰一生做詩只有許多文蔚朱子語類卷一百四
