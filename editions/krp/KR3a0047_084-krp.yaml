body:
  text: 朱子語類卷八十四禮一論考禮綱領禮樂廢壊二千餘年若以大數觀之亦未為逺然已都無稽考處後來須有一箇大大底人出來盡數拆洗一畨但未知逺近在幾時今世變日下恐必有箇碩果不食之理必大禮學多不可考盖為其書不全考來考去考得更没下梢故學禮者多迂濶一縁讀書不廣兼亦無書可讀如周禮仲春教振旅如戰之陳只此一句其間有多少事其陳是如何安排皆無處可考究其他禮制皆然大抵存於今者只是箇題目在爾必大古禮繁縟後人於禮日益踈略然居今而欲行古禮亦恐情文不相稱不若只就今人所行禮中刪修令有節文制數等威足矣古樂亦難遽復且於今樂中去其噍殺促數之音并攷其律吕令得其正更令掌詞命之官製撰樂章其間畧述教化訓戒及賔主相與之情及如人主待臣下恩意之類令人歌之亦足以飬人心之和平周禮嵗時屬民讀法其當時所讀者不知云何今若將孝弟忠信等事撰一文字或半嵗或三月一次或於城市或於鄉村聚民而讀之就為解説令其通曉及所在立粉壁書冩亦須有益必大古禮於今實難行甞謂後世有大聖人者作與他整理一番令人甦醒必不一一盡如古人之繁但倣古之大意義剛古禮難行後世苟有作者必須酌古今之宜若是古人如此繁縟如何教今人要行得古人上下習熟不待家至戸曉皆如饑食而渴飲畧不見其為難本朝陸農師之徒大抵説禮都要先求其義豈知古人所以講明其義者盖縁其儀皆在其具並存耳聞目見無非是禮所謂三千三百者較然可知故於此論説其義皆有據依若是如今古禮散失百無一二存者如何懸空於上面説義是説得甚麽義須是且將散失諸禮錯綜參考令節文度數一一著實方可推明其義若錯綜得實其義亦不待説而自明矣賀孫胡兄問禮曰禮時為大有聖人者作必將因今之禮而裁酌其中取其簡易易曉而可行必不至復取古人繁縟之禮而施之於今也古禮如此零碎繁冗今豈可行亦且得隨時裁損爾孔子從先進恐已有此意或曰禮之所以亡正以其太繁而難行耳曰然蘓子由古史説忠質文處亦有此意只是發揮不出首尾不相照應不知文字何故如此其説云自夏商周以來人情日趨於文其終却云今須復行夏商之質乃可夫人情日趨於文矣安能復行夏商之質乎其意本欲如先進之説但辭不足以達之耳僴凶服古而吉服今不相抵接釋奠惟三獻法服其餘皆今服至録云文質之變相生百世以下有聖賢出必不踏舊本子必須斬新别做如周禮如此繁宻必不可行且以明堂位觀之周人每事皆添四重虞黻不過是一水擔相似夏火殷藻周龍章皆重添去若聖賢有作必須簡易䟽通使見之而易知推之而易行盖文質相生秦漢初已自趨於質了太史公董仲舒每欲改用夏之忠不知其初盖已是質也國朝文徳殿正衙常朝升朝官已上皆排班宰相押班再拜而出時歸班官甚苦之其後遂廢致王樂道以此攻魏公盖以人情趨於簡便故也方子聖人有作古禮未必盡用須别有箇措置視許多𤨏細制度皆若具文且是要理㑹大本大原曾子臨死丁寕説君子所貴乎道者三動容貎斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存上許多正是大本大原如今所理㑹許多正是籩豆之事曾子臨死教人不要去理㑹這箇夫子焉不學而亦何常師之有非是孔子如何盡做這事到孟子已是不説到細碎上只説諸侯之禮吾未之學也吾甞聞之矣三年之喪齊疏之服饘粥之食自天子達於庻人這三項便是大本大原又如説井田也不曽見周禮只據詩裏説雨我公田遂及我私由此觀之雖周亦助也只用詩意帶將去後面却説鄉田同井出入相友守望相助疾病相扶持八家皆私百畆同養公田只説這幾句是多少好這也是大本大原處看孟子不去理㑹許多細碎只理㑹許多大原大本又曰理㑹周禮非位至宰相不能行其事自一介論之更自逺在且要就切實理㑹受用處若做到宰相亦須上遇文武之君始可得行其志又曰且如孫呉專説用兵如他説也有箇本原如説一曰道道者與上同意可與之死可與之生有道之主將用其民先和而後造大事若使不合於道理不和於人神雖有必勝之法無所用之問器逺昨日又得書説得大綱也是如此只是某看仙鄉為學一言以蔽之只是説得都似須是理㑹到十分是始得如人射一般頁是要中紅心如今直要中的少間猶且不㑹中的若只要中帖只㑹中垜少間都是胡亂發枉了氣力二百歩外若不曽中的只是枉矢如今且要分别是非是底直是是非底直是非少間做出便㑹是若依稀底也喚作是便了下梢只是非須是要做第一等人若決是要做第一等人若才力不逮也只做得第四五等人今合下便要做第四五等人説道就他才地如此下梢成甚麽物事又曰須是先理㑹本領端正其餘事物漸漸理㑹到上面若不理㑹本領了假饒你百靈百㑹若有些子私意便粉碎了只是這私意如何卒急除得如顔子天資如此孔子也只教他克己復禮其餘弟子告之雖不同莫不以此意望之公書所説冉求仲由當初他是只要做到如此聖人教由求之徒莫不以曽顔望之無奈何他才質只做到這裏如可使治其賦可使為之宰他當初也不止是要恁地又曰胡氏開治道齋亦非獨只理㑹這些如所謂頭容直足容重手容恭許多説話都是本原又曰君舉所説某非謂其理㑹不是只不是次序如荘子云語道非其序則非道也自説得好如今人須是理㑹身心如一片地相似須是用力仔細開墾未能如此只管説種東種西其實種得甚麽物事又曰某甞說佛老也自有快活得人處是那裏只縁他打併得心下浄潔所以本朝如李文靖王文正楊文公劉元城呂申公都是恁麽地人也都去學他又曰論來那様事不著理㑹若本領是了少間如兩漢之所以盛是如何所以衰是如何三國分併是如何唐初間如何興起後來如何衰以至於本朝大綱自可理㑹若有工夫更就裏面看若更有工夫就裏面討些光采更好某之諸生度得他脚手也未可與拈盡許多只是且教他就切身處理㑹如讀虞夏商周之書許多聖人亦有説賞罰亦有説兵刑只是這箇不是本領問封建周禮説公五百里孟子説百里如何不同曰看漢儒注書於不通處即説道這是夏商之制大抵且要頼將去若將這説來看二項却怕孟子説是夏商之制孟子不詳考亦只説甞聞其畧也若夏商時諸處廣濶人各自聚為一國其大者止百里故禹合諸侯執玉帛者萬國到周時漸漸吞并地里只管添國數只管少到周時只千八百國較之萬國五分已滅了四分已上此時諸國已自大了到得封諸公非五百里不得如周公封魯七百里盖欲優於其他諸公如左氏説云大國多兼數圻也是如此後來只管併來併去到周衰便制他不得也是尾大了到孟子時只有七國這是時勢必到這裏雖有大聖大智亦不能遏其衝今人只説漢封諸侯王土地太過看來不如此不得初間髙祖定天下不能得韓彭英盧許多人來使所得地又未定是我底當時要殺項羽若有人説道中分天下與我我便與你殺項羽也没奈何與他到少間封自子弟也自要狹小不得須是教當得許多異姓過又曰公今且收拾這心下勿為事物所勝且如一日全不得去講明道理不得讀書只去應事也須使這心常常在這裏若不先去理㑹得這本領只要去就事上理㑹雖是理㑹得許多骨董只是添得許多雜亂只是添得許多驕吝某這説的定是恁地雖孔子復生不能易其説這道理只一而已今日百事無人理㑹姑以禮言之古禮既莫之考至於後世之沿革因襲者亦浸失其意而莫之知矣非止浸失其意以至名物度數亦莫有曉者差舛譌謬不堪著眼三代之禮今固難以盡見其畧幸散見於他書如儀禮十七篇多是士禮邦國人君者僅存一二遭秦人焚滅之後至河間獻王始得邦國禮五十六篇獻之惜乎不行至唐此書尚在諸儒注疏猶時有引為説者及後來無人説著則書亡矣豈不大可惜叔孫通所制漢儀及曹褒所修固已非古然今亦不存唐有開元顯慶二禮顯慶已亡開元襲隋舊為之本朝修開寳禮多本開元而頗加詳備及政和間修五禮一時姦邪以私智損益疏略牴牾更没理㑹又不如開寳禮僴漢儒説禮制有不合者皆推之以為商禮此便是没理㑹處必大南北朝是甚時節而士大夫間禮學不廢有考禮者説得亦自好義剛通典好一般書向來朝廷理㑹制度某道却是一件事後來只恁休了又曰通典亦自好設一科又曰通典中間一作後面數卷議亦好義剛甞見劉昭信云禮之趨翔登降揖遜皆須習也是如此漢時如甚大射等禮雖不行却依舊令人習人自傳得一般今雖是不能行亦須是立科令人習得也是一事論後世禮書開寳禮全體是開元禮但略改動五禮新儀其間有難定者皆稱御製以決之如禱山川者又只開元禮内有方子祖宗時有開寳通禮科學究試黙義須是念得禮熟是得禮官用此等人為之介甫一切罷去盡令做大義故今之禮官不問是甚人皆可做某甞謂朝廷須留此等專科如史科亦當有方子問五禮新儀曰古人於禮直如今人相揖相似終日周囬於其間自然使人有感發處後世安得如此可學横渠所制禮多不本諸儀禮有自杜撰處如温公却是本諸儀禮最為適古今之宜義剛叔器問四先生禮曰二程與横渠多是古禮温公則大槩本儀禮而㕘以今之可行者要之温公較穏其中與古不甚逺是七八分好若伊川禮則祭祀可用婚禮惟温公者好大抵古禮不可全用如古服古器今皆難用又問向見人設主有父在子死而主牌書父主祀字如何曰便是禮書中説得不甚分曉此類只得不寫若向上尊長則寫又問温公所作主牌甚大濶四寸厚五寸八分不知大小當以何者為是曰便是温公錯了他却本荀朂禮義剛呂與叔集諸家之説補儀禮以儀禮為骨方子福州有前軰三人皆以明禮稱王普字伯照劉藻字昭信任文薦字希純某不及見王伯照而觀其書其學似最優説得皆有證據儘有議論却不似今人杜撰胡説麻沙有王伯照文字三件合為一書廣王侍郎普禮學律厯皆極精深盖其所著皆據本而言非出私臆某細考其書皆有來歴可行攷訂精確極不易得林黄中屡稱王伯照他何甞得其髣髴都是杜撰或言福州黄繼道樞宻祖舜與伯照齊名曰不同黄只是讀書不曽理㑹這功夫是時福州以禮學齊名者三人王伯照任希純劉昭信某識任劉二公任搭乾不曉事問東答西不可曉劉説話極仔細有來歴可聽某嘗問以易說其觧亦有好處如云見險而止為需見險而不止為訟需訟下卦皆坎能通其變為隨不能通其變為蠱之類想有成書近來解易者多引之僴古者禮學是專門名家始終理㑹此事故學者有所傳授終身守而行之凡欲行禮有疑者輙就質問所以上自宗廟朝廷下至士庻鄉黨典禮各各分明漢唐時猶有此意如今直是無人如前者某人丁所生繼母憂禮經必有明文當時滿朝更無一人知道合當是如何大家打閧一場後來只説莫若從厚恰似無奈何本不當如此姑狥人情從厚為之是何所為如此豈有堂堂中國朝廷之上以至天下儒生無一人識此禮者然而也是無此人州州縣縣秀才與太學秀才治周禮者不曽理㑹得周禮治禮記者不曾理㑹得禮記治周易者不曾理㑹得周易以至春秋詩都恁地國家何頼焉因問張舅淳聞其已死再三稱歎且詢其子孫能守其家學否且云可惜朝廷不舉用之使典禮儀天叙有典自我五典五敦哉天秩有禮自我五禮五庸哉這箇典禮自是天理之當然欠他一毫不得添他一毫不得惟是聖人之心與天合一故行出這禮無一不與天合其間曲折厚薄淺深莫不恰好這都不是聖人白撰出都是天理決定合著如此後之人此心未得似聖人之心只得將聖人已行底聖人所傳於後世底依這様子做做得合時便是合天理之自然賀孫劉原父好古在長安偶得一周敦其中刻云弡中原父遂以為周張仲之器後又得一枚刻云弡伯遂以為張伯曰詩言張仲孝友則仲必有兄矣遂作銘述其事後來趙明誠金石録辨之云弡非張乃某字也今之説禮無所據而杜撰者此類也廣論修禮書問所編禮今可一一遵行否曰人不可不知此源流豈能一一盡行後世有聖人出亦須著變夏商周之禮已自不同今只得且把周之禮文行賀孫以下論修書大指禮時為大使聖賢有禮必不一切從古之禮疑只是以古禮減殺從今世俗之禮令稍有防範節文不至太簡而已觀孔子欲從先進又曰行夏之時乘殷之輅便是有意於損周之文從古之朴矣今所集禮書也只是略存古之制度使後人自去減殺求其可行者而已若必欲一一盡如古人衣服冠屨之纎悉畢備其勢也行不得問温公所集禮如何曰早是詳了又喪服一節也太詳為人子者方遭喪禍使其一一欲纎悉盡如古人制度有甚麽心情去理㑹古人此等衣服冠屨每日接熟於耳目所以一旦喪禍不待講究便可以如禮今却閒時不曾理㑹一旦荒迷之際欲旋講究勢必難行必不得已且得從俗之禮而已若有識禮者相之可也僴問賀孫所編禮書曰某嘗説使有聖王復興為今日禮怕必不能悉如古制今且要得大綱是若其小處亦難盡用且如喪禮冠服斬衰如此而吉服全不相似却到遭喪時方做一副當如此著也是咤異賀孫問今齊斬尚存此意而齊衰期便太輕大功小功以下又輕且無降殺今若得斟酌古今之儀制為一式庻幾行之無礙方始立得住曰上面旣如此下面如何盡整頓得這須是一齊都整頓過方好未説其他𤨏細處且如冠便須於祭祀當用如何底於軍旅當用如何底於平居當用如何底於見長上當用如何底於朝廷治事當用如何底天子之制當如何卿大夫之制當如何士當如何庻人當如何這是許多冠都定了更須理㑹衣服等差須用上衣下裳如佩玉之類只於大朝㑹大祭祀用之五服亦各用上衣下裳齊斬用麄布期功以下又各為降殺如上組衫一等紕繆鄙陋服色都除了如此便得大綱正今若只去零零碎碎理㑹些小不濟事如今若考究禮經須是一一自著考究教定賀孫楊通老問禮書曰看禮書見古人極有精宻處事無微細各各有義理然又須自家工夫到方看得古人意思出若自家工夫未到只見得度數文為之末如此豈能識得深意如將一碗乾硬底飯來喫有甚滋味若白地將自家所見揣摸他本來意思不如此也不濟事兼自家工夫未到只去理㑹這箇下梢溺於器數一齊都昏倒了如今度得未可盡曉其意且要識得大綱賀孫問聞郡中近已開六經曰已開詩書易春秋惟二禮未暇及詩書序各置於後以還其舊易用伯恭所定本周禮自是一書惟禮記尚有説話儀禮禮之根本而禮記乃其枝葉禮記乃秦漢上下諸儒觧釋儀禮之書又有他説附益於其間今欲定作一書先以儀禮篇目置於前而附禮記於後如射禮則附以射義似此類已得二十餘篇若其餘曲禮少儀又自作一項而以類相從若疏中有説制度處亦當采取以益之舊嘗以此例授潘恭叔渠亦曽整理數篇來今居喪無事想必下手儀禮舊與六經三傳並行至王介甫始罷去其後雖復春秋而儀禮卒廢今士人讀禮記而不讀儀禮故不能見其本末場屋中禮記義格調皆凡下盖禮記解行於世者如方馬之属源流出於熈豐士人作義者多讀此故然可學以下修書綱目問禮書曰惟儀禮是古全書若曲禮玉藻諸篇皆戰國士人及漢儒所裒集王制月令内則是成書要好自將説禮物處如内則王制月令諸篇附儀禮成一書如中間却將曲禮玉藻又附在末後不説禮物處如孔子閒居孔子燕居表記緇衣儒行諸篇却自成一書樂記文章頗粹怕不是漢儒做自與史記苟子是一套怕只是荀子作家語中説話猶得孔叢子分明是後來文字弱甚天下多少是偽書開眼看得透自無多書可讀賀孫周禮自是全書如今禮書欲編入又恐分拆了周禮殊未有所處因説周禮只是説禮之條目其間煞有文字如八法八則三易三兆之類須各自别有書子升問儀禮傳記是誰作曰傳是子夏作記是子夏以後人作子升云今禮書更附入後世變禮亦好曰有此意木之余正父欲用國語而不用周禮然周禮豈可不入國語辭多理寡乃衰世之書支離蔓衍大不及左傳看此時文章若此如何㑹興起國家坐間朋友問是誰做曰見説是左丘明做賀孫因理㑹所編禮書分經分傳而言曰經文精確峻潔傳文則詞語泛濫國語所載事跡多如此如今人作文因一件事便要泛濫成章人傑賀孫因問祭禮附祭義如説孝許多如何來得曰便是祭禮難附兼祭義前所説多是天子禮若儀禮所存唯少牢饋食特牲饋食禮是諸侯大夫禮兼又只是有饋食若天子祭便合有初間祭腥等事如所謂建設朝事燔燎羶薌若附儀禮此等皆無入頭處意間欲將周禮中天子祭禮逐項作一縂腦却以禮記附如疏中有説天子處皆編出因云某已衰老其間合要理㑹文字皆起得箇頭在及見其成與不見其成皆未可知萬一不及見此書之成諸公千萬勉力整理得成此書所係甚大問前日承教喻以五服之制乃上有制作之君其等差如此今在下有志之士欲依古禮行之旣不可若一向徇俗之鄙陋又覺大不經於心極不安如何曰非天子不議禮不制度不考文這事要整頓便著從頭整頓吉凶皆相稱今吉服旣不如古獨於喪服欲如古也不可古禮也須一一考究著所在在這裏却始酌今之宜而損益之若今便要理㑹一二項小小去處不濟事須大看世間都得其宜方好問如今父母喪且如古服如齊衰期乃兄弟祖父母伯叔父母此豈可從俗輕薄如此曰自聖賢不得位此事終無由正又云使鄭康成之徒制作也須略成箇模様未説待周公出制作如今全然没理㑹奈何若有考禮之人又須得上之人信得及這事行之天下亦不難且如冠制尊卑且以中梁為等差如今天子者用二十四如何安頓所以甚大而不宜要好天子以十二一品以九陞朝以七選人以五士以三庻人只用紗帛裹髻如今道人這自有些意思問且如權宜期喪當如何曰且依四脚帽子加絰此帽本只是巾前二脚縳於後後二脚反前縳於上今硬帽幞頭皆是後來漸變重遲不便於事如初用冠帶一時似好某必知其易廢今果如此若一箇紫衫涼衫便可懐袖間去見人又費輕如帽帶皂衫是多少費窮秀才如何得許多錢是應必廢也居父問期之服合如何用上領衫而加衰可乎曰上領衫已不是曰用深衣制而麄布加衰可乎曰深衣於古便服朝𤣥端夕深衣深衣是簡便之衣吉服依𤣥端制却於㓙服亦倣為之則宜矣問士禮如喪祭等可通行否古有命士有不命士今如之何曰喪祭禮節繁多今士人亦難行但古今士不同古時諸侯大夫皆可以用士如今簿尉之類乃邑宰之士節推判官之属則是太守之士只一縣一州之中有人才自家便可取將來使便是士如藩鎮之制尚存此意無奈何是如今將下面一齊都截了盡教做一門入盡教由科舉而得是將奈何歎息久之器之問國初衙前役用鄉戸曰客將次於太守其權甚重一州之兵皆其將之凡教閱出入皆主其事當時旣是大戸做亦自愛惜家産上下相體悉若做得好底且教他做更次一等戸便為公人各管逐項職事更次一等户為吏人掌文書簡牘極下戸為胥徒是今弓手節級奔走之属其終各各有弊英宗時有詔韓絳等要變不成王荆公做參政一變變了賀孫問禮書學禮首引舜命契為司徒敷五教命䕫典樂教胄子兩條文蔚竊謂古人教學不出此兩者契敷五教是欲使人明於人倫曉得這道理䕫典樂教胄子是欲使人飬其徳性而實有諸已此是一篇綱領曰固是如此後面只是明此一意如大司徒之教即是契敷教事大司樂之教即是䕫典樂事因曰直而温寛而栗直與寛本自是好但濟之以温與栗則盡善至如剛簡二字則微覺有弊故戒之以無虐無傲盖所以防其失也某所以特與分開欲見防其失者專為剛簡而設不䝉上直寛二句直寛但曰而温而栗至剛簡則曰無虐無傲觀其言意自可見文蔚曰教以人倫者固是又欲養其徳性要養徳性便只是下面詩言志歌永言聲依永律和聲四句上曰然諷誦歌詠之間足以和其心氣但上面三句抑揚髙下尚且由人到律和聲處直是不可走作所以詠歌之際深足養人情性至如播之金石被之管絃非是不和終是不若人聲自然故晉人孟嘉有言絲不如竹竹不如肉謂漸近自然至八音克諧無相奪倫神人以和此是言祭祀燕享時事又是一節文蔚或問禮書所引伊川言古者養士其公卿大夫士之子弟固不患於無養而庻人子弟之入學者亦皆有以養之不知是否曰恐不然此段明州諸公添入當删不然則注其下云今按程子之言未知何所據也古者教士其比閭之學則鄉老坐於門而察其出入其來學也有時既受學則退而習於其家及其升而上也則亦有時春夏耕耘餘時肄業未聞上之人復有以養之也夫既給之以百畆之田矣又給之以學粮亦安得許多粮給之耶周禮自有士田可攷史記言孔子養弟子三千人而子由古史亦遽信而取之恐不然也想得弟子來從學者則自賫粮而從孔子出遊列國者則食孔子之食耳然孔子亦安得許多粮想亦取之列國之饋爾孔子居衞最久所以於靈公孝公有交際公養之仕其所以奉孔子者必厚至他國則不然矣故晏子諌齊景公勿用孔子之言曰㳺説丐貸不可以為國孟子之時徒衆尤盛當時諸侯重士又非孔子之時之比春秋時人淳未甚有事故齊晉皆累世為覇主人莫敢争戰國之時人多姦詐列國紛争急於収拾人才以為用故不得不厚待士又曰古者三年大比興其賢者能者而進於天子大國三人中國二人小國一人不進則有罰看來數年後所進極多然天子之國亦小其員數亦有限不知如何用得許多人今以天下之大三年一番進士猶無安頓處何况當時白虎通曰古者諸侯進士一不當則有罰再不當則削其地三不當則罷之廢之而托於諸侯為寓公恐無此理盖出後世儒者之傅㑹進士不當有甚大過而遂廢其君絶其社稷耶或曰想得周家此法行之殊不能久成康數世之後諸侯擅政天子諸侯之公卿大夫皆為世臣盤據豈復容外人為之耶曰然兼當時諸侯國中亦自要人才用必不㑹再貢之於天子天子亦自擁虚器無用他處當時天子威令不行公卿大夫世襲諸侯之國猶寛故人才之窮而在下者多仕於諸侯之國及公室又弱而人才復多仕於列國之大夫當時為大夫之陪臣者其權甚重大夫執一國之權而陪臣復執大夫之權所以説禄去公室陪臣執國命又曰以爵位言之則大夫亦未甚尊以權勢言之則甚重自天子而下三等便至大夫又曰再命為士三命為大夫天子之大夫四命小國之大夫再命或一命一様小小官職皆無命他命禮極重又問當時庻民之秀者其進而上之不過為大夫極矣至於公卿之貴皆世臣世襲非若今之可以更進而代為也則士之生於斯時者亦可謂不幸矣曰然然當時之大夫宰臣其權甚重如晉楚齊諸國其大夫皆握天下之權操縱指麾天下莫不從之其宰臣復握大夫之權盖當時其重在下其輕在上今日則其重在内其輕在外故不同也僴禮編纔到長沙即欲招諸公來同理㑹後見彼事叢且不為久留計遂止後至都下庻㡬事體稍定做箇規模盡喚天下識禮者修書如余正父諸人皆教來今日休矣賀孫或問禮書修得有次第否曰散在諸處収拾不聚最苦每日應酬多工夫不得專一若得數月閒更一兩朋友相助則可畢矣頃在朝欲奏乞專創一局召四方朋友習禮者數人編修俟書成將上然後乞朝廷命之以官以酬其勞亦以少助朝廷蒐用遺才之意事未及舉而某去國矣僴泳居喪時嘗編次喪禮自始死以至終喪各立門目嘗以門目呈先生臨歸教以編禮亦不可中輟泳曰考禮無味故且放下先生曰横渠教人學禮呂與叔言如嚼木札今以半日看義理文字半日類禮書亦不妨後蒙賜書云所定禮編恨未之見此間所編喪禮一門福州尚未送來將來若得賢者持彼成書復來參訂庻幾詳審不至差互但恐相去之逺難遂此期耳福州謂黄直卿也庚申二月旣望先生有書與黄寺丞商伯云伯量依舊在門館否禮書近得黄直卿與長樂一朋友在此方得下手整頓但疾病昬倦時多又為人事書尺妨廢不能得就緒直卿又許了鄉人館未知如何若不能留尤覺失助甚恨鄉時不曽留得伯量相與協力若渠今年不作書㑹則煩為道意得其一來為數月留千萬幸也作書時去易簀只二十有二日故得書不及徃後來黄直卿属李敬子招徃成禮編又以昏嫁不得行昨寓三山􅀈志仁反復所成禮書具有本末若未即死尚幾有以遂此志也胡泳朱子語類卷八十四
