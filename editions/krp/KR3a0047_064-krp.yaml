body:
  text: 朱子語類卷六十四中庸三第二十章脩道以仁脩道便是言上文脩身之道自為政在人轉説將来脩道以仁仁是築底處試商量如何伯豐言克去己私復此天理然後得其脩曰固是然聖賢言仁字處便有箇温厚慈祥之意帶箇愛底道理下文便言親親為大􅓌問脩道以仁繼之以仁者人也何為下面又添説義禮曰仁便有義如陽便有隂親親尊賢皆仁之事親之尊之其中自有箇差等這便是義與禮親親在父子如此在宗族如彼所謂殺也尊賢有當事之者有當友之者所謂等也僴問仁亦是道如何却説脩道以仁曰道是汎說汎字疑是統字仁是切要底又問如此則這仁字是偏言底曰仁者人也親親為大如此説則此是偏言節問思脩身不可不事親思事親不可不知人思知人不可不知天曰此處却是倒㸔根本在脩身然脩身得力處却是知天知天是知至物格知得箇自然道理學若不知天便記得此又忘彼得其一失其二未知天見事頭緒多既知天了這裏便都定這事也定那事也定淳思事親不可不知人知人只如知人則哲之知不是思欲事親先要知人只是思欲事親更要知人若不好底人與它處豈不為親之累知天是知天道知天是起頭處能知天則知人事親脩身皆得其理矣聞見之知與徳性之知皆知也只是要知得到信得及如君之仁子之孝之類人所共知而多不能盡者非真知故也謨問知仁勇曰理㑹得底是知行得底是仁着力去做底是勇徳明問知仁勇之分曰大槩知底属知行底属仁勇是勇於知勇於行又云生知安行以知為主學知利行以仁為主困知勉行以勇為主燾問生知安行為知學知利行為仁困知勉行為勇此豈以等級言耶曰固是盖生知安行主於知而言不知如何行安行者只是安而行之不用着力然須是知得方能行得也故以生知安行為知學知利行主於行而言雖是學而知得然須是着意去力行則所學而知得者不為徒知也故以學知利行為仁銖退思所謂三者皆兼知行而言大知固生知非生知何以能安而行至仁固力行非學知何以能利而行勇固是知行不可廢翌日再問先生曰更須涵養問中庸以生知安行為知學知利行為仁何也曰論語説仁者安仁便是説得仁髙了知者利仁便是説得知低了此處説知便是仁在知中説得知大了盖既是生知必能安行若是學知便是知得淺須是力行方始至仁處此便是仁在知外譬如這箇卓子論語説仁便是此脚直處説知便是横處中庸説仁便是横處説知便是直處而今且將諸説録出來㸔㸔這一邊了又去㸔那一邊便自見得不相礙䕫孫賜録云問諸説皆以生知安行為仁學知利行為知先生獨反是何也曰論語説仁者安仁知者利仁與中庸説知仁勇意思自别生知安行便是仁在知中學知利行便是仁在知外既是生知必能安行所以謂仁在知中若是學知便是知得淺些了須是力行方始至仁處所以謂仁在知外問智仁勇曰理㑹得底是知行得底是仁着力去做底是勇仁則力行工夫多知則致知工夫多好學近乎知力行近乎仁意自可見道夫問力行近乎仁又似勇者不懼意思曰交互説都是三知都是知三行都是仁三近都是勇生知安行好學又是知學知利行力行又是仁困知勉行知耻又是勇淳吕與叔好學近仁一段好璘知耻如舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也既耻為鄉人進學安得不勇為學自是問勇方行得徹不屈懾若纔行不徹便是半塗而廢所以中庸説知仁勇三者勇本是没緊要物事然仁知了不是勇便行不到頭僴問為天下有九經若論天下之事固不止此九件此但舉其可以常行而不易者否曰此亦大槩如此説然其大者亦不出此又問吕氏以有此九者皆徳懐之事而刑不與焉豈以為此可以常行而刑則期於無刑所以不可常行而不及之歟曰也不消如此説若説不及刑則禮樂亦不及此只是言其大者而禮樂刑政固已行乎其間矣又問養士亦是一大者不言何也曰此只是大槩説若如此窮有甚了期若論養士如忠信重禄尊賢子庶民則教民之意固已具其中矣僴柔逺解作無忘賔旅孟子注賔客覉旅古者為之授節如照身憑子之類謹時度關皆給之因能授任以嘉其善謂願留於其國者也徳明問来百工則財用足曰既有箇國家則百工所為皆少不得都要用若百工聚則事事皆有豈不足以足財用乎如織紝可以足布帛工匠可以足器皿之類燾問餼廩曰餼牲餼也如今官員請受有生羊肉廩即廩給折送錢之類是也賜問送往迎来集注云授節以送其往曰逺人来至去時有節以授之過所在為照如漢之出入關者用繻唐謂之給過所賜問凡事豫則立以下四句只是泛舉四事或是包達道達徳九經之属曰上文言天下之達道五所以行之者三天下之達徳三所以行之者一凡為天下國家有九經所以行之者一遂言凡事豫則立則此凡事正指達道達徳九經可知素定是指先立乎誠可知中庸方言所以行之者一不應忽突出一語言凡事也銖豫先知也事未至而先知其理之謂豫凡事豫則立不豫則廢横渠曰事豫吾内求利吾外也又曰精義入神者豫而已皆一義也僴或問言前定則不躓曰句句着實不脱空也今人纔有一句言語不實便説不去賀孫事前定則不困閒時不曾做得臨時自是做不徹便至於困行前定則不疚若所行不前定臨時便易得屈折枉道以從人矣道前定則不窮這一句又包得大連那上三句都包在裏面是有箇妙用千變萬化而不窮之謂事到面前都理㑹得它人處置不得底事自家便處置得它人理㑹不得底事自家便理㑹得僴問反諸身不誠曰反諸身是反求於心不誠是不曾實有此心如事親以孝須是實有這孝之心若外面假為孝之事裏面却無孝之心便是不誠矣燾誠者天之道誠是實理自然不假修為者也誠之者人之道是實其實理則是勉而為之者也孟子言萬物皆備於我便是誠反身而誠便是誠之反身只是反求諸已誠只是萬物具足無所虧欠端䝉問誠者天之道誠之者人之道曰誠是天理之實然更無纎毫作為聖人之生其禀受渾然氣質清明純粹全是此理更不待修為而自然與天為一若其餘則須是博學審問慎思明辨篤行如此不已直待得仁義禮智與夫忠孝之道日用本分事無非實理然後為誠有一毫見得與天理不相合便於誠有一毫未至如程先生説常人之畏虎不如曾被虎傷者畏之出於誠實盖實見得也今於日用間若不實見得是天理之自然則終是於誠為未至也大雅問誠者真實無妄之謂天之道也此言天理至實而無妄指理而言也誠之者未能真實無妄而欲其真實無妄之謂人之道也此言在人當有真實無妄之知行乃能實此理之無妄指人事而言也盖在天固有真實之理在人當有真實之功聖人不思不勉而從容中道無非實理之流行則聖人與天如一即天之道也未至於聖人必擇善然後能實明是善必固執然後實得是善此人事當然即人之道也程子所謂實理者指理而言也所謂實見得是實見得非者指見而言也此有兩節意曰如此見得甚善銖中庸言天道處皆自然無節次不思不勉之類言人道處皆有下功夫節次擇善與固執是二節言天道如至誠之類皆有至字其次致曲却是人事久則徴是外人信之古注説好璘或問明善擇善何者為先曰譬如十箇物事互箇善五箇惡須揀此是善此是惡方分明從周聖賢所説工夫都只一般只是一箇擇善固執論語則論學而時習之孟子則説明善誠身只是隨它地頭所説不同下得字來各自精細真實工夫只是一般須是盡知其所以不同方知其所謂同也博學謂天地萬物之理脩己治人之方皆所當學然亦各有次序當以其大而急者為先不可雜而無統也先生屢説慎思之一句言思之不慎便有枉用工夫處人傑中庸言慎思之思之粗後不及固是不慎到思之過時亦是不慎所以他聖人不説深思不説别様思却説箇慎思道夫或問篤行是有急切之意否曰篤厚也是心之懇惻履孫有弗問問之弗知弗措也問而弗知弗可讓下須當研窮到底使答者詞窮理盡始得砥問博學之至明辨之是致知之事篤行則力行之事否曰然又問有弗學至行之弗篤弗措也皆是勇之事否曰此一段却只是虚説只是應上面博學之五句反説起如云不學則已學之而有弗能定不休如云有不戰戰必勝矣之類也弗措也未是勇事到得後面説人一已百人十已千方正是説勇處雖愚必明是致知之效雖柔必强是力行之效僴或問人一已百人十已千曰此是言下工夫人做得一分自己做百分節吕氏説博學審問慎思明辨篤行一段煞好皆是他平日做工夫底淳漢卿問哀公問政章曰舊時只零碎解某自初讀時只覺首段尾與次段首意相接如云政也者蒲盧也故為政在人取人以身修身以道修道以仁便説仁者人也親親為大義者宜也尊賢為大都接續説去遂作一段㸔始覺貫穿後因㸔家語乃知是本来只一段也中庸三十三章其次第甚宻古人著述便是不可及此只将别人語言鬬湊成篇本末次第終始總合如此縝宻賀孫廣録意同别出問中廣第二十章初㸔時覺得渙散收拾不得熟讀先生章句方始見血脉通貫處曰前軰多是逐段解去某初讀時但見思脩身段後便繼以天下之達道五知此三者段後便繼以為天下國家有九經似乎相接續自此推去疑只是一章後又讀家語方知是孔子一時間所説廣云豈獨此章今次讀章句乃知一篇首尾相貫只是説一箇中庸底道理曰固是它古人解做得這様物事四散收拾將来及併合聚則便有箇次序如此其次序又直如此縝宻廣問或問引大學論小人之隂惡陽善而以誠於中者目之且有為善也誠虚為惡也何實如之之語何也曰小人閒居為不善是誠心為不善也掩其不善而著其善是為善不誠因舉往年胡文定嘗説朱子發雖脩謹皆是偽為是時范濟美天資豪傑應云子發誠是偽為如公輩却是至誠文定遜謝曰某何敢當至誠二字濟美却戯云子發是偽於為善公却是至誠為惡也乃是此意徳明第二十一章自誠明謂之性此性字便是性之也自明誠謂之教此教字是學之也此二字却是轉一轉説與首章天命之謂性脩道之謂教二字義不同􅓌自誠明性之也自明誠充之也轉一轉説天命之謂性以下舉體統説人傑自誠明謂之性誠實然之理此堯舜以上事學者則自明誠謂之教明此性而求實然之理經禮三百曲禮三千無非使人明此理此心當提撕喚起常自念性如何善因甚不善人皆可為堯舜我因甚做不得立得此後觀書亦見理静坐亦見理森然於耳目之前可學以誠而論明則誠明合而為一以明而論誠則誠明分而為二夀昌第二十二章或問如何是唯天下至誠曰唯天下至誠言其心中實是天下至誠非止一家一國而已不須説至于實理之極才説箇至于則是前面有未誠底半截此是説聖人不説這箇未實底况聖人亦非向有未實處到這裏方實也賛化育與天地參是説地頭履孫唯天下至誠言做出天下如許大事底本領子至極也如易至神至變方問唯天下至誠為能盡其性一段且如性中有這仁便真箇盡得仁底道理性中有這義便真箇盡得義底道理云云曰如此説盡說不着且如人能盡父子之仁推而至於宗族亦無有不盡又推而至於鄉黨亦無不盡又推而至於一國至於天下亦無有不盡若只於父子上盡其仁不能推之於宗族便是不能盡其仁能推之於宗族而不能推之於鄉黨亦是不能盡其仁能推之於鄉黨而不能推之於一國天下亦是不能盡其仁能推於已而不能推於彼能盡於甲而不能盡於乙亦是不能盡且如十件事能盡得五件而五件不能盡亦是不能盡如兩件事盡得一件而一件不能盡亦是不能盡只這一事上能盡其初而不能盡其終亦是不能盡能盡於蚤而不能盡於暮亦是不能盡就仁上推來是如此義禮智莫不然然自家一身也如何做得許多事只是心裏都有這箇道理且如十件事五件事是自家平生曉得底或曾做来那五件平生不曾識也不曾做卒然至面前自家雖不曾做然既有此道理便識得破都處置得下無不盡得這箇道理如能盡人之性人之氣禀有多少般様或清或濁或昏或明或賢或鄙或夀或夭隨其所賦無不有以全其性而盡其宜更無些子欠闕處是它元有許多道理自家一一都要處置教是如能盡物之性如鳥獸草木有多少般様亦莫不有以全其性而遂其宜所以説唯天下之至誠為能盡人物之性盖聖人通身都是這箇真實道理了拈出来便是道理東邊拈出東邊也是道理西邊拈出西邊也是道理如一斛米初間量有十斗再量過也有十斗更無些子少欠若是不能盡其性如元有十斗再量過却只有七八斗少了二三斗便是不能盡其性天與你許多道理本自具足無些子欠闕只是人自去欠闕了它底所以中庸難㸔便是如此須是心地大段廣大方㸔得出須是大段精㣲方㸔得出精宻而廣濶方㸔得出或曰中庸之盡性即孟子所謂盡心否曰只差些子或問差處曰不當如此問今夜且歸去與衆人商量曉得箇至誠能盡人物之性分曉了却去㸔盡心少間差處自見得不用問如言黑白若先識得了同異處自見只當問黑白不當問黑白同異久之又曰盡心是就知上説盡性是就行上説或曰能盡得真實本然之全體是盡性能盡得虚靈知覺之妙用是盡心曰然盡心就所知上説盡性就事物上説事事物物上各要盡得它道理較零碎盡心則渾淪盖行處零碎知處却渾淪如盡心才知些子全體便都見又問盡心了方能盡性否曰然孟子云盡其心者知其性也知性則知天便是如此僴枅録别出問至誠盡性盡人盡物如何是盡曰性便是仁義禮智盡云者無所徃而不盡也盡於此不盡於彼非盡也盡於外不盡於内非盡也盡得這一件那一件不盡不謂之盡盡得頭不盡得尾不謂之盡如性中之仁施之一家而不能施之宗族施之宗族不能施之鄉黨施之鄉黨不能施之國家天下皆是不盡至於盡禮盡義盡智亦如此至於盡人則凡或仁或鄙或天或夀皆有以處之使之各得其所至於盡物則鳥獸蟲魚草木動植皆有以處之使之各得其宜盡性盡人盡物大槩如此又問盡心亦是如此否曰未要説同與不同且須自㸔如何是心如何是性便自見得不同處如問白黑且去認取那箇是白那箇是黑則不必問而自能知其不同矣因曰若説大槩則盡心是知盡性是行盡心是見得箇渾淪底盡性是於零碎事物上見盡心是見得許多條緒都包在裏許盡性則要隨事㸔無一之或遺且如人之一身雖未便要歴許多事十事盡得五事其餘五事心在那上亦要盡之其他事力未必能為而有能為之理亦是盡也至誠之人通身皆是實理無少欠闕處故於事事物物無不盡也枅問至誠盡人物之性是曉得盡否曰非特曉得盡亦是要處之盡其道若凡所以養人教人之政與夫利萬物之政皆是也故下文云賛天地之化育而與天地參矣若只明得盡如何得與天地參去這一箇是無不得底故曰與天地參而為三矣大雅盡人性盡物性性只一般人物氣禀不同人雖禀得氣濁善底只在那裏有可開通之理是以聖人有教化去開通它使復其善底物禀得氣偏了無道理使開通故無用教化盡物性只是所以處之各當其理且隨他所明處使之它所明處亦只是這箇善聖人便是用他善底如馬悍者用鞭策亦可乗然物只到得這裏此亦是教化是隨他天理流行發見處使之也如虎狼便只得䧟而殺之驅而逺之淳盡已之性如在君臣則義在父子則親在兄弟則愛之類已無一之不盡盡人之性如黎民時雍各得其所盡物之性如鳥獸草木咸若如此則可以賛天地之化育皆是實事非私心之倣像也人傑能盡其性則能盡人之性能盡人之性則能盡物之性只是恁地貫將去然却有箇則字在節賛天地之化育人在天地中間雖只是一理然天人所為各自有分人做得底却有天做不得底如天能生物而耕種必用人水能潤物而灌溉必用人火能熯物而薪㸑必用人裁成輔相須是人做非賛助而何程先生言參賛之義非謂賛助此説非是閎祖聖人賛天地之化育盖天下事有不恰好處被聖人做得都好丹朱不肖堯則以天下與人洪水汎濫舜尋得禹而民得安居桀紂暴虐湯武起而誅之程子説賛化處謂天人所為各自有分説得好淳問惟天下至誠為能盡其性曰此已到至處説着須如此説又須分許多節次只聖人之至誠一齊具備中庸於此皆分作兩截言至誠則渾然天成更無可説如下文却又云誠之者人之道其次致曲曲能有誠皆是教人做去如至誠無息一段諸儒説多不明却是古注是此是聖人之至誠天下久則見其如此非是聖人如此節次雖堯舜之徳亦久方著於天下問賛化育常人如何為得曰常人雖不為得亦各有之曰此事惟君相可為曰固然以下亦有其分如作邑而禱雨之類皆是可學問中庸兩處説天下之至誠而其結語一則曰賛天地之化育一則曰知天地之化育賛與知兩字如何分曰前一段是從裏靣説出後段是從下面説上如脩道之謂教也立天下之大本是静而無一息之不中知化育則知天理之流行賀孫録云或問賛化育與知化育何如曰盡其性者是從裡面説將出故能盡其性則能盡人物之性以賛天地之化育經綸天下之大經者是從下面説上去如修道之教是也云云第二十三章其次致曲先生云只縁氣禀不齊若至誠盡性則查滓便渾化不待如此炎曲是氣禀之偏如禀得木氣多便温厚慈祥從仁上去發便不見了發強剛毅就上推長充擴推而至於極便是致氣禀篤於孝便從孝上致曲使吾之徳渾然是孝而無分毫不孝底事至於動人而變化之則與至誠之所就者無殊升卿劉潜夫問致曲曰只為氣質不同故發見有偏如至誠盡性則全體著見次於此者未免為氣質所隔只如人氣質温厚其發見者必多是仁仁多便侵却那義底分數氣質剛毅其發見者必多是義義多便侵却那仁底分數因指面前燈籠曰且如此燈乃本性也未有不光明者氣質不同便如燈籠用厚紙糊燈便不甚明用薄紙糊燈便明似紙厚者用紗糊其燈又明矣撤去籠則燈之全體著見其理正如此也文蔚問致曲曰須件件致去如孝如悌如仁義須件件致得到誠處始得賜問致曲曰曲是逐事上着力事事上推致其極如事君則推致其忠事親則推致其孝與人交則推致其信皆事事上推致其極兼信問致曲莫是就其所長上推致否曰不只是所長謂就事上事事推致且如事父母便就這上致其孝處兄弟便致其恭敬交朋友便致其信此所謂致曲也能如此推致則能誠矣曲不是全體只是一曲洽問致曲是就偏曲處致力否曰如程子説或孝或弟或仁或義所偏發處推致之各造其極也問如此恐將来只就所偏處成就曰不然或仁或義或孝或弟更互而發便就此做致曲工夫徳眀問致曲伊川説從一偏致曰須件件致去如孝弟須件件致得到誠孝誠弟處如仁義須件件致到仁之誠義之誠處䕫孫問其次致曲注所謂善端發見之偏如何曰人所禀各有偏善或禀得剛強或禀得和柔各有一偏之善若就它身上更求其它好處又不能如此所以就其善端之偏而推極其全惻隠羞惡是非辭遜四端隨人所禀發出来各有偏重處是一偏之善㝢問其次致曲是就其善端發見之偏而悉推致之如何曰隨其善端發見於此便就此上推致以造其極發見於彼便就彼上推致以造其極非是止就其發見一處推致之也如孟子充其無欲害人之心而仁不可勝用充無穿窬之心而義不可勝用此正是致曲處東坡文中有一處説得甚明如從此惻隠處發便從此發見處推致其極從羞惡處發便就此發見處推致其極孟子所謂擴充其四端是也曲無不致則徳無不實而明著動變積而至於能化亦與聖人至誠無異矣銖問致曲曰伊川説得好將曲専做好處所以云或仁或義或孝或弟就此等處推致其極又問或問却作隨其所禀之厚薄而以伊川之言為未盡不可專就偏厚處説者如何曰不知舊時何故如此説或曰所禀自應有厚薄或厚於仁薄於義或厚於義薄於仁須是推致教它恰好則亦不害為厚薄矣曰然也有這般處然觀其下文曲能有誠一句則専是主好說盖上章言盡性則統體都是誠了所謂誠字連那盡性都包在裏面合下便就那根頭一盡都盡更無纎毫欠闕處其次致曲則未能如此須是事事上推致其誠逐旋做將去以至於盡性也曲能有誠一句猶言若曲處能盡其誠則誠則形形則著云云也盖曲處若不能有其誠則其善端之發見者或存或亡終不能實有諸已故須就此一偏發見處便推致之使有誠則不失也又問明動變化伊川以君子所過者化解動字是和那變化二字都説在裏面否曰動是方感動他變則己改其舊俗然尚有痕瑕在化則都消化了無復痕迹矣僴問前夜與直卿論致曲一段或問中舉孟子四端擴而充之直卿以為未安既是四端安得謂之曲曰四端先後互發豈不是曲孟子云知皆擴而充之則自可見若謂只有此一曲則是夷惠之偏如何得該徧聖人具全體一齊該了然而當用時亦只是發一端如用仁則義禮智如何上来得問聖人用時雖發一端然其餘只平鋪在要用即用不似以下人有先後間斷之異須待擴而後充曰然又問顔曾以下皆是致曲曰顔子體段已具曾子却是致曲一一推之至答一貫之時則渾合矣問所以必致曲者只是為氣禀隔必待因事逐旋發見曰然又問程子説致曲云於偏勝處發似未安如此則専主一偏矣曰此説甚可疑須於事上論不當於人上論可學問其次致曲與易中納約自牖之意亦略相類納約自牖是因人之明而導之致曲是因已之明而推之是如此否曰正是如此時舉元徳問其次致曲曲能有誠曰凡事皆當推致其理所謂致曲也如事父母便来這裏推致其孝事君便推致其忠交朋友便推致其信凡事推致便能有誠曲不是全體只是一曲人能一一推之以致乎其極則能通貫乎全體矣時舉子武問曲能有誠若此句属上句意則曲是能有誠若是属下句意則曲若能有誠則云云此有二意不知孰穏曰曲也是能有誠但要之不若属下意為善又問誠者自成道者自道曰自成是就理説自道是就我説有這實理所以有此萬物誠者所以自成也道却在我自道義剛曲能有誠有誠則不曲矣盖誠者圎成無欠闕者也方明則動伊川云明故能動人也振仲思問動非明則無所之明非動則無所用曰徒明不行則明無所用空明而已徒行不明則行無所向冥行而已伯羽明則動動則變變則化動與變化皆主乎外而言之人傑第二十四章問至誠之道可以前知曰在我無一毫私偽故常虚明自能見得如禎祥妖孽與蓍龜所告四體所動皆是此理已形見但人不能見耳聖人至誠無私偽所以自能見得且如蓍龜所告之吉㓙甚明但非至誠人却不能見也銖第二十五章問誠者自成也而道自道也曰誠者是箇自然成就底道理不是人去做作安排底物事道自道者道却是箇無情底道理却須是人自去行始得這兩句只是一様而義各不同何以見之下面便分説了又曰誠者自成如這箇草樹所以有許多根株枝葉條幹者便是它實有所以有許多根株枝葉條幹這箇便是自成是你自實有底如人便有耳目鼻口手足百骸都是你自實有底道理雖是自然底道理然却須你自去做始得僴誠者自成也而道自道也上句是孤立懸空説這一句四旁都無所倚靠盖有是實理則有是天有是實理則有是地如無是實理則便没這天也没這地凡物都是如此故云誠者自成盖本来自成此物到得道自道便是有這道在這裏人若不自去行便也空了賀孫問既説物之所以自成下文又云誠以心言莫是心者物之所存主處否曰誠以心言者是就一物上説凡物必有是心有是心然後有是事下面説誠者物之終始是解誠者自成一句不誠無物已是説着自道一句了盖人則有不誠而理則無不誠者恁地㸔覺得前後文意相應賀孫問誠者自成也而道自道也兩句語勢相似而先生之解不同上句工夫在誠字上下句工夫在行字上曰亦微不同自成若只做自道解亦得某因言妄意謂此兩句只是説箇為已不得為人其後却説不獨是自成亦可以成物先生未答久之復曰某舊説誠有病盖誠與道皆泊在誠之為貴上了後面却便是説箇合内外底道理若如舊説則誠與道成兩物也義剛問誠者自成便是鬼神體物而不可遺而道自道便是道不可離如何曰也是如此誠者物之終始説得来好廣誠者自成也下文云誠者物之終始不誠無物此二句便解上一句實有是理故有是人實有是理故有是事䕫孫誠者物之終始徹頭徹尾方問誠者物之終始㸔来凡物之生必實有其理而生及其終也亦是此理合到那裏盡了曰如人之生固具此理及其死時此理便散了因問朝聞夕死程子云皆實理也又云實理者合當決定是如此為子必孝為臣必忠決定是如此了燾誠者物之終始猶言體物而不可遺此是相表裏之句從頭起至結局便是有物底地頭着一些急不得又曰有一尺誠便有一尺物有一寸誠便有一寸物髙蜚卿嘗言誠字甚大學者未容驟語道夫以為誠者物之終始始學之士所當盡心而聖人之所以為聖人者亦不過如此正所謂徹上徹下之理也一日以語曹丈進叔曹曰如何曰誠者實然之理而已曹曰也説實然之理未得誠固實便將實来做誠却不是因具以告先生曰也未可恁地執定説了誠有主事而言者有主理而言者盖不誠無物是事之實然至於參賛化育則便是實然之理道夫問誠者物之終始不誠無物是實有是理而後有是物否曰且㸔他聖人説底正文語脉盖誠者物之終始却是事物之實理始終無有間斷自開闢以来以至人物消盡只是如此在人之心苟誠實無偽則徹頭徹尾無非此理一有間斷則就間斷處即非誠矣如聖人至誠便是自始生至没身首尾是誠顔子不違仁便是自三月之初為誠之始三月之末為誠之終三月以後便不能不間斷矣日月至焉只就至焉時便為終始至焉之外即間斷而無誠無誠即無物矣不誠則心不在焉視不見聽不聞是雖謂之無耳目可也且如禘自既灌而徃不欲觀是方灌時誠意存焉即有其祭祀之事物及其誠意一散則雖有升降威儀已非所以為祭祀之事物矣大雅閎祖録云不誠雖有物猶無物如禘自既灌誠意一散如不祭一般誠者物之終始来處是誠去處亦是誠誠則有物不誠則無物且如而今對人説話若句句説實皆自心中流出這便是有物若是脱空誑誕不説實話雖有兩人相對説話如無物也且如草木自萌芽發生以至枯死朽腐歸土皆是有此實理方有此物若無此理安得有此物僴誠者物之終始不誠無物誠便貫通乎物之終始若不誠則雖為其事與無事同炎誠者物之終始以理而言不誠無物以人而言不誠則有空闕有空闕則如無物相似節誠者物之終始不誠無物誠者事之終始不誠比不曾做得事相似且如讀書一遍至三遍無心讀四遍至七遍方有心讀八遍又無心則是三遍以下與八遍如不曾讀相似莭誠者物之終始不誠無物如讀書半版以前心在書上則此半版有終有始半版以後心不在焉則如不讀矣閎祖誠者物之終始物之終始皆此理也以此而始以此而終物事也亦是萬物不誠無物以在人者言之謂無是誠則無是物如視不明則不能見是物聽不聰則不能聞是物謂之無物亦可又如鬼怪妖邪之物吾以為無便無亦是今按無物謂不能聞見是物反以為無便無皆與章句不合姑存之德明正淳問誠者物之終始不誠無物此二句是汎説故君子誠之為貴此却説從人上去先生於不誠無物一句亦以人言何也曰誠者物之終始此固汎説若是不誠無物這箇不字是誰不它須是有箇人不它方得人傑問誠者物之終始恐是就理之實而言不誠無物恐是就人心之實此理而言曰非也如兩句通理之實人之實而言有是理則有是物天下之物皆實理之所為徹頭徹尾皆是此理所為未有無此理而有此物也無是理則雖有是物若無是物矣盖物之終始皆實理之所為也下文言君子誠之為貴方説人當實乎此理而言大意若曰實理為物之終始無是理則無是物故君子必當實乎此理也銖誠者物之終始不誠無物做萬物㸔亦得就事物上㸔亦得物以誠為體故不誠則無此物終始是徹頭徹尾底意問或問中云自其間斷之後雖有其事皆無實之可言何如曰此是説不誠無物如人做事未做得一半便棄了即一半便不成問楊氏云四時之運已即成物之功廢曰只為有這些子如無這些子其機關都死了再問為其至誠無息所以四時行百物生更無已時此所以維天之命於穆不已也曰然德明問不誠無物曰誠實也且如人為孝若是不誠恰似不曾誠便是事底骨子文蔚或問不誠無物曰誠實也且如為孝若不實是孝便是空説無這孝了便是不誠無物或問不誠無物曰孝而不誠於孝則無孝弟而不誠於弟則無弟推此類可見誠只是實然之理然有主於事而言者有主於理而言者主於事而言不誠無物是也主於理而言賛天地化育之類是也不誠無物人心無形影惟誠時方有這物事今人做事若初間有誠意到半截後意思懶散謾做将去便只是前半截有物後半截無了若做到九分這一分無誠意便是這一分無功問不誠無物曰實有此理便實有此事且如今日向人説我在東却走在西説在這一邊却自在那一邊便都成妄誕了幹問不誠無物曰不誠實則無此事矣如不雨言雨不晴言晴既無誠實却似不曾言一般銖誠者物之終始指實理而言君子誠之為貴指實心而言僴誠者非自成已而已此自成字與前面不同盖怕人只説自成故言非自成已乃所以成物故成已便以仁言成物便以知言盖成已成物固無内外之殊但必先成已然後能成物此道之所以當自行也䕫孫問誠者非自成已而已也所以成物也成已仁也成物知也曰誠雖所以成已然在我真實無偽自能及物自成已言之盡已而無一毫之私偽故曰仁自成物言之因物成就而各得其當故曰知此正與學不厭知也教不倦仁也相反然聖賢之言活當各隨其所指而言則四通八達矣仁如克己復禮皆是知如應變曲當皆是銖問成已合言知而言仁成物合言仁而言知何也曰克已復禮為仁豈不是成已知周乎萬物而道濟天下豈不是成物仁者體之存知者用之發燾成已仁也是體成物知也是用學不厭知也是體教不倦仁也是用閎祖學不厭所以成已而成已之道在乎仁教不倦所以成物而成物之功由乎知因㸔呂氏中庸解誠者自成章未辯論為下此語方問成已仁也成物知也成物如何説知曰須是知運用方成得物問時措之宜是顔稷閉户纓冠之義否曰亦有此意須是仁知具内外合然後有箇時指之冝又云如平康無事時是一般處置倉卒緩急時又有一般處置徳明第二十六章問至誠無息不息則久果有分别否曰不息只如言無息游楊氏分無息為至誠不息所以體乎誠非是銖問久則徴徴是徴驗發見於外否曰除是久然後有徴驗只一日兩日工夫如何有徴驗徳明或問以存諸中者而言則悠久在髙明博厚之前見諸用者而言則悠久在博厚髙明之後如何曰此所以為悠久也若始初悠久末梢不悠久便是不悠久矣燾博則能厚節問悠久博厚高明曰此是言聖人功業自徴則悠逺至博厚髙明無疆皆是功業著見於此故鄭氏云聖人之徳著於四方又致曲章明則動諸説多就性分上理㑹惟伊川云明則動是誠能動人也又説著則明如見面盎背是著若明則人所共見如令聞廣譽施於身之類徳明問至誠無息一章自是聖人與天為一處廣大淵微學者至此不免有望洋之歎曰亦不須如此豈可便道自家終不到那田地只是分别義理令分明旋做將去問悠逺博厚髙明章句中取鄭氏説謂聖人之徳著于四方豈以聖人之誠自近而逺自微而著如書稱堯光被四表格于上下者乎曰亦須㸔它一箇氣象自至誠無息不息則久積之自然如此徳明至誠無息一段鄭氏曰言至誠之徳著于四方是也諸家多將做進徳次第説只一箇至誠已該了豈復更有許多節次不須説入裏面来古註有不可易處如非天子不議禮一段鄭氏曰言作禮樂者必聖人在天子之位甚簡當閎祖問博厚髙明悠久六字先生解云所積者廣博而深厚則所發者髙大而光明是逐字觧至悠久二字却只做一箇説了據下文天地之道博也厚也髙也明也悠也久也則悠與久字其義恐亦各别先生良久曰悠長也悠是自今觀後見其無終窮之意久是就他骨子裏説鎮常如此之意翌早又云昨夜思量下得兩句悠是據始以要終久是隨處而常在廣吕氏説有如是廣博則其勢不得不髙有如是深厚則其精不得不明此兩句甚善章句中雖是用他意然當初只欲辭簡故反不似他説得分曉譬如為臺觀須是大做根基方始上面可以髙大又如萬物精氣蓄於下者深厚則其發越于外者自然光明廣或問天昭昭之多曰昭昭小明也管中所見之天也是天恁地大底也是天節問天斯昭昭是指其一處而言及其無窮是舉全體而言向来將謂天地山川皆因積累而後大曰舉此全體而言則其氣象功效自是如此銖天地山川由積累而後大讀中庸者不可以辭害意耳振問純亦不已曰純便不已若有間斷便是駁雜燾第二十七章大哉聖人之道此一段有大處做大處有細宻處做細宻處有渾淪處做渾淪處方子或問聖人之道發育萬物峻極于天曰即春生夏長秋收冬藏便是聖人之道不成須要聖人使他發育方是聖人之道峻極于天只是充塞天地底意思學䝉禮儀三百威儀三千優優大哉皆是天道流行發見為用處祖道優優大哉禮儀三百威儀三千一事不可欠闕才闕一事便是於全體處有虧也佛釋之學只説道無不存無適非道只此便了若有一二事差也不妨人傑聖人將那廣大底收拾向實處来教人從實處做將去老佛之學則説向高逺處去故都無工夫了聖人雖説本體如此及做時須事事着實如禮樂刑政文為制度觸處都是體用動静互换無端都無少許空闕處若於此有一毫之差則便於本體有虧欠處也洋洋乎禮儀三百威儀三千洋洋是流動充滿之意廣問苟不至徳至道不凝焉曰至徳固是誠但此章却漾了誠説若牽来説又亂了盖它此處且是要説道非徳不凝而下文遂言修德事或問大徳必得其位必得其禄必得其夀堯舜不聞子孫之盛孔子不享禄位之榮何也曰此或非常理今所説乃常理也因言董仲舒云固當受禄于天雖上面疊説將来不好只轉此句意思儘佳賀孫徳性猶言義理之性曰然閎祖不尊徳性則懈怠弛慢矣學問何從而進升卿問如何是徳性如何可尊曰玩味得却来商量祖道廣大似所謂理一精微似所謂分殊升卿致廣大謂心胷開濶無此疆彼界之殊極髙明謂無一毫人欲之私以累於已纔汨於人欲便卑汙矣賀孫問高明是以理言中庸是以事言否曰不是理與事極髙明是言心道中庸是言學底事立心超乎萬物之表而不為物所累是髙明及行事則恁地細宻無過不及是中庸淳問致廣大章句以為不以一毫私意自蔽極高明是不以一毫私欲自累豈以上面已説尊徳性是所以存心而極乎道體之大故於此畧言之歟曰也只得如此説此心本廣大若有一毫私意蔽之便狹小了此心本髙明若以一毫私欲累之便卑汚了若能不以一毫私意自蔽則其心開濶都無此疆彼界底意思自然能致廣大惟不以一毫私欲自累則其心峻潔決無汙下昏㝠底意思自然能極髙明因舉張子言曰陽明勝則徳性用隂濁勝則物欲行廣問章句云不以一毫私意自蔽不以一毫私欲自累如何是私意如何是私欲曰私意是心中發出来要去做底今人說人有意智但㸔此意字便見得是小所以不廣大私欲是耳目鼻口之欲今纔有欲則昏濁沉墜即不髙明矣某解此處下這般字義極費心思枅問注云不以一毫私意自蔽不以一毫私欲自累意是心之所發處言欲是指物之所接處言否曰某本意解廣大髙明不在接物與未接物上且㸔何處見得髙明廣大氣象此二句全在自蔽與自累上盖為私意所蔽時這廣大便被他隔了所以不廣大為私欲所累時沉墜在物欲之下故卑汙而無所謂髙明矣義剛問楊氏說極髙明而不知中庸之為至則道不行此知者過之也尊徳性而不知道問學則道不明此賢者過之也恐說得不相似否曰極髙明是就行處說言不為私欲所累耳楊氏將作知說不是大率楊氏愛將此等處作知說去尊德性致廣大極髙明温故敦厚皆是說行處道問學盡精㣲道中庸知新崇禮皆是説知處銖極髙明須要道中庸若欲髙明而不道中庸則將流入於佛老之學且如儒者逺庖厨佛老則好髙之過遂至戒殺食素儒者不邇聲色不殖貨利他是過於髙明遂至絶人倫及欲割已惠人之属如陸子静天資甚麽髙明却是不道中庸後其學便誤人某嘗說陸子静説道理有箇黑腰子其初説得瀾翻極是好聽少間到那緊處時又却藏了不説又别尋一箇頭緒瀾翻起来所以人都捉他那緊處不着義剛問極髙明而道中庸心體髙明如天超然於萬物之上何物染着得他然其行於事物之間如耳之於聲目之於色雖聖人亦不免此但盡其當然而已曰纔說得不免字便是聖人只勉強如此其説近於佛老且更仔細㸔這一句佐温故而知新温故有七分工夫知新有三分工夫其實温故則自然知新上下五句皆然人傑敦厚者本自厚就上更加增益底功升卿敦厚以崇禮厚是資質恁地朴實敦是愈加他重厚此是培其基本賀孫温故只是存得這道理在便是尊徳性敦厚只是箇朴實頭亦是尊徳性閎祖問温故而知新敦厚以崇禮而與以字義如何曰温故自知新而者順詞也敦厚者又須當崇禮始得以者反説上去也世固有一種人天資純厚而不曾去學禮而不知禮者問徳性問學廣大精微髙明中庸據或問中所論皆具大小二意如温故恐做不得大㸔曰就知新言之便是新来方理㑹得那枝分節解底舊来已見得大體與他温柔去亦有大小之意敦厚以崇禮謂質厚之人又能崇禮如云質直而好義問髙明中庸龜山每譏王氏心迹之判曰王氏處已處人之說固不是然髙明中庸亦須有箇分别徳明文蔚以所與李守約答問書請教曰大槩亦是如此只是尊徳性功夫却不在紙上在人自做自尊徳性至敦厚凡五件皆是徳性上工夫自道問學至崇禮皆是問學上工夫須是横截斷㸔問學功夫節目却多尊徳性功夫甚簡約且如伊川只說一箇主一之謂敬無適之謂一只是如此别更無事某向來自說得尊徳性一邉輕了今覺見未是上面一截便是一箇坯子有這坯子學問之功方有措處文蔚曰昔人多以前面三條分作兩截至温故而知新却說是問學事敦厚以崇禮却説是尊徳性事惟先生一徑截斷初若可疑子細看来却甚縝宻曰温故大段省力知新則所造益深敦厚是徳性上事纔説一箇禮字便有許多節文所以前面云禮儀三百威儀三千皆是禮之節文大哉聖人之道洋洋乎發育萬物峻極于天却是上面事下學上達雖是從下學始要之只是一貫文蔚問尊徳性而道問學何謂尊曰只是把做一件物事尊崇撎起它何謂道曰只是行如去做它相似這十件相類尊徳性致廣大極髙明温故敦厚只是尊徳性盡精微道中庸知新崇禮只是道問學如伊川言涵養須用敬進學則在致知道問學而不尊徳性則云云尊徳性而不道問學則云云節為學纎毫絲忽不可不察若小者分明大者越分明如中庸説發育萬物峻極于天大也禮儀三百威儀三千細也尊徳性致廣大極髙明温故敦厚此是大者五事道問學盡精微道中庸知新崇禮此是小者五事然不先立得大者不能盡得小者此理愈説愈無窮言不可盡如小徳川流大徳敦化亦此理千蹊萬壑所流不同各是一川須是知得然其理則一從周尊徳性致廣大極髙明温故敦厚是一頭項道問學盡精微道中庸知新崇禮是一頭項盖能尊徳性便能道問學所謂本得而末自順也其餘四者皆然本即所謂禮儀三百末即所謂威儀三千三百即大徳敦化也三千即小徳川流也夀昌聖賢之學事無大小道無精粗莫不窮究無餘至如事之切身者固未嘗不加意而事之未為緊要亦莫不致意焉所以中庸曰君子尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新敦厚以崇禮這五句十件事無些子空闕處又云聖賢所謂博學無所不學也自吾身所謂大經大本以至天下之事事物物甚而一字半字之義莫不在所當窮而未始有不消理㑹者雖曰不能盡䆒然亦只得隨吾聰明力量理㑹將去久久須有所至豈不勝全不理㑹者乎若截然不理㑹者雖物過乎前不識其名彼亦不管豈窮理之學哉燾問尊徳性而道問學一段曰此本是兩事細分則有十事其實只兩事兩事又只一事只是箇尊徳性却將箇尊徳性来道問學所以說尊徳性而道問學也枅尊徳性而道問學至敦厚以崇禮自有十件了固是一般然又須有許多節奏方備非如今人云略見道理了便無功夫可做也璘尊徳性道問學一段博我以文約我以禮兩邊做功夫都不偏問温故如何是存心之属曰言涵飬此已知底道理常在我也道中庸何以是致知之属曰行得到恰好處無些過與不及乃是知得分明事事件件理㑹得到一箇恰好處方能如此此足以見知與行互相發明滋飬處又問其言足以興興如何言興起在位曰此古注語興如興賢興能之興倍與背同言忠於上而不背叛也銖尊徳性而道問學一句是綱領此五句上截皆是大綱工夫下截皆是細宻工夫尊徳性故能致廣大極髙明温故敦厚温故是温習此敦厚是篤實此道問學故能盡精微道中庸知新崇禮其下言居上不驕為下不倍國有道其言足以興國無道其黙足以容舉此數事言大小精粗一齊理㑹過貫徹了後盛徳之效自然如此閎祖問尊徳性而道問學行意在先擇善而固執知意又在先如何曰此便是互相為用處大哉聖人之道洋洋乎發育萬物峻極于天是言道體之大處禮儀三百威儀三千是言道之細處只章首便分兩節来故下文五句又相因尊徳性至敦厚此上一截便是渾淪處道問學至崇禮此下一截便是詳宻處道體之大處直是難守細處又難窮䆒若有上面一截而無下面一截只管道是我渾淪更不務致知如此則茫然無覺若有下面一截而無上面一截只管要纎悉皆知更不去行如此則又空無所寄如有一般人實是敦厚淳朴然或箕踞不以為非便是不崇禮若只去理㑹禮文而不敦厚則又無以居之所以忠信之人可以學禮便是敦厚以崇禮淳廣謂洋洋乎發育萬物峻極于天此是指道體之形於氣化者言之優優大哉禮儀三百威儀三千此是指道體之形於人事者言之雖其大無外其小無内然必待人然後行曰如此説也得只説道自能如此也得須㸔那優優大哉底意思盖三千三百之儀聖人之道無不充足其中略無些子空闕處此便是語小天下莫能破也廣云此段中間説許多存心與致知底工夫了末後却只説居上不驕為下不倍國有道其言足以興國無道其黙足以容此所以為中庸之道曰固是更須㸔中間五句逐句兼小大言之與章首兩句相應工夫兩下皆要到尊徳性而道問學此句又是摠説又問二十九章君子之道本諸身以下廣㸔得第一第二句是以人已對言第三第六句是以古今對言第四第五句是以隠顯對言不知是否曰也是如此考諸三王而不謬百世以俟聖人而不惑猶釋子所謂以過去未来言也後面説知天知人處雖只舉後世與鬼神言其實是總結四句之義也中庸自首章以下多是對説將来不知它古人如何做得這様文字直是恁地整齊因言某舊年讀中庸都心煩㸔不得且是不知是誰做若以為子思做又却時復有箇子曰字更没理㑹處賀録云漢卿㸔文字忒快如今理㑹得了更要熟讀方有汁水某初㸔中庸都理㑹不得云云只管讀来讀去方見得許多章段分明盖某僻性讀書須先理㑹得這様分曉了方去涵泳它義理後来讀得熟後方見得是子思參取夫子之説著為此書自是沉潜反覆逐漸得其㫖趣定得今章句一篇其擺布得来直恁麽細宻又如太極圖賀孫録云經許多人不與他思量出自某逐一與他思索方見得他如此精宻若不分出許多節次来後人如何㸔得但未知後来讀者知其用功如是之至否賀孫録云亦知前人恁地用心否廣問居上不驕是指王天下者而言否曰以下章君子之道處觀之可見銖聖人説話中正不偏如揲蓍兩手皆有數不可謂一邊有道理一邊無道理它人議論才主張向這一邊便不信那邊有因論横渠呂氏尊徳性道問學一段及此􅓌第二十八章鄭康成解非天子不議禮云必聖人在天子之位然後可若解經得如此簡而明方好大雅有位無徳而作禮樂所謂愚而好自用有徳無位而作禮樂所謂賤而好自専居周之世而欲行夏殷之禮所謂居今之世反古之道道即指議禮制度考文之事議禮所以制行故行同倫制度所以為法故車同軌考文所以合俗故書同文問章句云倫是次序之體如何曰次序如等威節文之類禮如辨上下定民志君臣父子貴賤尊卑相接之體皆是天子制此禮通天下共行之故其次第之體等威節文皆如一也問中庸非天子不議禮不制度不考文注云文書名也何以謂之書名曰如大字喚做大字上字喚做上字下字喚做下字此之謂書名是那字底名又問數處小節曰不必泥此等處道理不在這様處便縱饒有道理寜有幾何如㸔此兩段須先識取聖人功用之大氣象規模廣大處非天子不議禮不制度不考文只㸔此數句是甚麽様氣象若使有王者受命而得天下改正朔易服色殊徽號天下事一齊被他改換一畨其切近處則自他一念之微而無毫釐之差其功用之大則天地萬物一齊被他剪截裁成過截然而不可犯須先㸔取這様大意思方有益而今區區執泥於一二沒緊要字之間果有何益又曰考文者古者人不甚識字字易得差所以每嵗一畨使大行人之属廵行天下考過這字是正與不正這般事有十来件每嵗如此考過都匝了則三嵗天子又自廵狩一畨須㸔它這般做作處僴第二十九章問王天下有三重章曰此章明白無可商量但三重説者多耳銖曰吕氏以三重為議禮制度考文無可疑曰但下焉者人亦多疑公㸔得如何銖曰只據文義上焉者指周公以前如夏商之禮已不可考下焉者指孔子雖有徳而無位又不當作亦自明白諸説以下焉者為霸者之事不知霸者之事安得言善曰如此說却是銖問建諸天地而不悖以上下文例之此天地似乎是形氣之天地盖建諸天地之間而其道不悖於我也曰此天地只是道耳謂吾建於此而與道不相悖也時舉問質諸鬼神而無疑只是龜從筮從與鬼神合其吉㐫否曰亦是然不専在此只是合鬼神之理問君子之道本諸身章句中云其道即議禮制度考文之事如何曰君子指在上之人上章言雖有徳苟無其位不敢作禮樂就那身上説只做得那般事者徳明第三十章問下襲水土是因土地之宜否曰是所謂安上敦乎仁故能愛無徃而不安文蔚大徳是敦那化底小徳是流出那敦化底出来這便如忠恕忠便是做那恕底恕便是流出那忠来底如中和中便是大徳敦化和便是小徳川流自古亘今都只是這一箇道理天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉聖人做出許多文章制度禮樂顛来倒去都只是這一箇道理做出来以至聖人之所以為聖賢人之所以為賢皆只是這一箇道理人若是理㑹得那源頭只是這一箇物事許多頭項都有歸着如天下雨一㸃一㸃都着在地上僴問此天地之所以為大也是説聖人如天地之大否曰此是巧説聖賢之言不如此此章言仲尼祖述堯舜憲章文武上律天時下襲水土此兩句兼本末内外精粗而言是言聖人功夫譬如天地之無不持載無不覆幬譬如四時之錯行如日月之代明是言聖人之徳如天地萬物並育而不相害道並行而不相悖小徳川流大徳敦化是言天地之大如此言天地則見聖人第三十一章問至誠至聖如何分曰至聖至誠只是以表裏言至聖是其徳之發見乎外者故人見之但見其溥博如天淵泉如淵見而民莫不敬言而民莫不信至凡有血氣者莫不尊親此其見於外者如此至誠則是那裏面骨子經綸大經立大本知化育此三句便是骨子那箇聰明睿知却是這裏發出去至誠處非聖人不自知至聖則外人只見得到這處自溥博如天至莫不尊親處或曰至誠至聖亦可以體用言否曰體用也不相似只是說得表裏僴安卿問仁義禮智之智與聰明睿知想是兩様禮智是自然之性能辨是非者睿知是説聖人聰明之徳無所不能者曰便只是這一箇物事禮智是通上下而言睿知是充擴得較大爐中底便是那禮智如睿知則是那照天燭地底聰明睿知足有臨也某初曉那臨字不得後思之大槩是有過人處方服得人且如臨十人須是強得那十人方得至於百人千人萬人皆然若臨天下便須強得天下方得所以道是亶聰明作元后又曰天生聰明又曰聰明文思又曰聰明時憲便是大故也要那聰明義剛睿只訓通對知而言知是體睿是深通處端蒙問文理宻察龜山解云理於義也曰便是怕如此説這一句了未得又添一句都不可曉此是聖人於至纎至悉處無不謹審且如一物初破作兩片又破作四片若未恰好又破作八片只管詳宻文是文章如物之文縷理是條理每事詳宻審察故曰足以有别徳明聰察便是知強毅便是勇季札溥博淵泉溥周徧博宏大淵深沉泉便有箇發達不已底意道夫問至聖章言如天如淵至誠章其天其淵不同何也曰此意當以表裏觀之至聖一章説發見處至誠一章説存主處聖以徳言誠則所以為徳也以徳而言則外人觀其表但見其如天如淵誠所以為徳故自家裏面却真箇是其天其淵惟其如天如淵故日月所照霜露所隊凡有血氣者莫不知尊而親之謂自其表而觀之則易也惟其天其淵故非聰明聖知達天徳者不足以知之謂自其裏而觀之則難也枅問上章言溥博如天淵泉如淵下章只言其淵其天章句中云不但如之而已如何曰此亦不是兩人事上章是以聖言之聖人徳業著見於世其盛大自如此下章以誠言之是就實理上説其天其淵實理自是如此徳明第三十二章魏材仲問唯天下至誠為能經綸以下曰從上文来經綸合是用立本合是體問知天地之化是與天地合否曰然又問四強哉矯欲駢合為一曰不然大雅云此是説強底體段若做強底工夫則須自學問思辨始曰固是智仁勇須是智能知仁能守斯可言勇不然則恃箇甚大雅問經綸皆治絲之事經者理其緒而分之綸者比其類而合之如何曰猶治絲者先須逐條理其頭緒而分之所謂經也然後比其類而合之如打絛者必取所分之緒比類而合為一所謂綸也天地化育如春夏秋冬日月寒暑無一息之差知化者真知其必然所謂知者言此至誠無偽有以黙契也肫肫其仁者人倫之間若無些仁厚意則父子兄弟皆不相管渉矣此三句從下説上知天地之化育故能立天下之大本然後能經綸天下之大經銖或問夫焉有所倚曰自家都是實理無些欠闕經綸自經綸立本自立本知化育自知化育不用倚靠他物事然後能如此所謂為仁由已而由人乎哉之意他這道更無些空闕經綸大經他那日用間底都是君臣父子夫婦人倫之理更不必倚着人只是從此心中流行於經綸人倫處便是法則此身在這裏便是立本知天地之化育則是自知得飽相似何用靠他物直卿云便是不思不勉之意思謂不更靠心力去思勉他這箇實理自然經綸大經立大本知化育更不用心力髙夫焉有所倚聖人自是無所倚若是學者須是靠定一箇物事做骨子方得聖人自然如此它纔發出来便經綸天下之大經立天下之大本僴林正卿問焉有所倚曰堂堂然流出来焉有倚靠節問唯天下至誠為能經綸天下之大經一章鄭氏注云唯聖人乃能知聖人恐上面聖人是人下面聖人只是聖人之道耳曰亦是人也惟有其人而後至誠之道乃始實見耳時舉第三十三章問絅衣之制曰古注以為禪衣所以襲錦衣者又問禪與單字同異曰同沈存中謂絅與檾同是用檾麻織䟽布為之不知是否廣問禪家禪字甚義曰他門禪字訓定尚絅注謂禪衣是甚衣曰此禪字訓單古人朝服必加絅雖未能曉其制想只如今上馬着白衫一般裘以皮為之袍如今夾襖㝢問衣錦尚絅章首段雖是再叙初學入徳之要然也只是說箇存養致知底工夫但到此說得来尤宻思量來衣錦尚絅之意大段好如今學者不長進都縁不知此理須是闇然而日章曰中庸後面愈説得向裏来凡人引詩一歩退似一歩都用那般不言不動不顯不大底字直説到無聲無臭則至矣廣賀孫録云賀孫云到此方還得他本體曰然問中庸首章只言戒懼謹獨存養省察兩節工夫而已篇末尚絅一章復發此兩條然學者須是立心之初真箇有為已篤實之心又能知得逺之近風之自微之顯方肯做下面謹獨存飬工夫不審知逺之近風之自微之顯已有窮理意思否曰也須是知得道理如此方肯去謹獨方肯去持飬故可與入徳矣但首章是自裏面説出外盖自天命之性說到天地位萬物育處末章却自外面一節收歛入一節直約到裏面無聲無臭處此與首章實相表裏也銖子武說衣錦章曰只是收歛向内工夫漸宻便自見得近之可逺風之自微之顯黄録無近之以下十字君子之道固是不暴著于外然曰惡其文之著亦不是無文也自有文在裏淡則可厭簡則不文温則不理而今却不厭而文且理只縁有錦在裏若上面着布衣裏面着布襖便是内外黑窣窣地明道謂中庸始言一理中散為萬事末復合為一理雖曰合為一理然自然有萬事在如云不動而敬不言而信也是自有敬信在極而至於無聲無臭然自有上天之載在盖是其中自有不是都無也賀孫義剛録云天下只是這道理走不得如佛老雖滅人倫然他却拜其師為父以其弟子為子長者謂之師兄少者謂之師弟只是護得箇假底問知風之自曰凡事自有箇来處所以與微之顯厮對着只如今日做一件事是也是你心下正一事不是也是你心下元不正推此類以往可見大雅人之得失即已之得失身之邪正即心之邪正知逺之近知風之自人傑知風之自好㸔如孟子所謂聞伯夷之風之類是也炎先生檢知風之自諸説令㸔孰是伯豐以吕氏略本正淳以游氏説對曰游氏説便移来知逺之近上説亦得吕氏雖近之然却是作用是性之意於學無所統攝此三句知逺之近是以已對物言之知在彼之是非由在我之得失如行有不得反求諸已知風之自是知其身之得失由乎心之邪正知微之顯又専指心説就裏来大抵游氏説話全無氣力説得徒膀浪都説不殺無所謂聽其言也厲氣象􅓌潜雖伏矣便覺有善有惡須用察相在爾室只是教做存飬工夫大雅亦孔之昭是謹獨意不媿屋漏是戒謹恐懼意謨李文問中庸末章引詩不顯之義只是形容前面戒謹不睹恐懼不聞而極其盛以言之否曰是也此所引與詩正文之義同義剛不大聲以色只是説至徳自無聲色今人説篤恭了便不用刑政不用禮樂豈有此理古人未嘗不用禮樂刑政但自有徳以感人不専靠他刑政爾學䝉問卒章引詩不大聲以色云聲色之於化民末也又推至徳輶如毛而曰毛猶有倫直至無聲無臭然後為至矣此意如何曰此章到篤恭而天下平已是極至結局處所謂不顯維徳者幽深𤣥逺無可得而形容雖不大聲以色徳輶如毛皆不足以形容直是無聲無臭到無迹之可尋然後已他人孰不恭敬又不能平天下聖人篤恭天下便平都不可測了問不顯維徳按詩中例是言豈不顯也今借引此詩便真作不顯説如何曰是箇幽深𤣥逺意是不顯中之顯此段自衣錦尚絅闇然日章漸漸收歛到後面一段宻似一段直到聖而不可知處曰無聲無臭至矣徳明中庸末章恐是説只要收歛近裏如此則工夫細宻而今人只是不收向裏做時心便麄了然而細宻中却自有光明發出来中庸一篇始只是一中間却事事有末後却復歸結於一義剛問末章自衣錦尚絅説至無聲無臭是從外做向内首章自天命之性説至天地位萬物育是從内做向外曰不特此也惟天下聰明睿知説到溥博淵泉是從内説向外惟天下至誠經綸天下之大經至肫肫其仁聰明聖智達天徳是從外説向内聖人發明内外本末小大巨細無不周徧學者當隨事用力也銖因問孔子空空顔子屢空與中庸所謂無聲無臭之理曰以某觀論語之意自是孔子叩鄙夫鄙夫空空非是孔子空空顔子簞瓢屢空自對子貢貨殖而言始自文選中説顔子屢空空心受道故䟽論語者亦有此説要之亦不至如今日學者直是懸空説入𤣥妙處去也中庸無聲無臭本是説天道彼其所引詩詩中自説須是儀刑文王然後萬邦作孚詩人意初不在無聲無臭上也中庸引之結中庸之義嘗細推之盖其意自言謹獨以修徳至詩曰不顯維徳百辟其刑之乃篤恭而天下平也後面節節賛嘆其徳如此故至予懐明徳以至徳輶如毛毛猶有倫上天之載無聲無臭至矣盖言天徳之至而微妙之極難為形容如此為學之始未知所有而遽欲一蹴至此吾見其倒置而終身迷亂矣大雅公晦問無聲無臭與老子所謂𤣥之又𤣥莊子所謂㝠㝠黙黙之意如何分别先生不答良久曰此自分明可子細㸔廣云此須㸔得那不顯底與明著底一般方可曰此須是自見得廣因曰前日與公晦論程子鳶飛魚躍活發潑地公晦問畢竟此理是如何廣云今言道無不在無適而非道固是只是説得死搭搭地若説鳶飛戾天魚躍于淵與必有事焉而勿正心勿忘勿助長則活潑潑地曰也只説得到這裏由人自㸔且如孔子説天何言哉四時行焉百物生焉如今只㸔天何言哉一句耶唯復是㸔四時行焉百物生焉兩句耶又曰天有四時春夏秋冬風雨霜露無非教也地載神氣神氣風霆風霆流行庶物露生無非教也聖人説得如是實廣賀孫録别出公晦問中庸末章説及本體微妙處與老子所謂𤣥之又𤣥荘子所謂冥冥黙黙之意同不知老荘是否先生不答良久曰此自分明可且自㸔某從前趂口答將去諸公便更不思量臨歸又請教曰開濶中又着細宻寛緩中又着謹嚴這是人自去做夜来所説無聲無臭亦不離這箇自不顯維徳引至這上豈時老荘説得恁地佛家也説得相似只是它箇虚大凢㸔文字要急廹亦不得有疑處且漸漸思量若一下便要理㑹得如何㑹見得意思出賀孫朱子語類卷六十四
