body:
  text: 朱子語類卷三十八論語二十鄉黨篇總論鄉黨記聖人動容周旋無不中禮泳如鄉黨說聖人容色䖏是以有事觀聖人如言燕居申申夭夭是以無事時觀聖人學者於此又知得聖人無時無䖏而不然燾鄉黨一篇自天命之謂性至道不可須臾離也皆在裏面許多道理皆自聖人身上迸出来惟聖人做得甚分曉故門人見之熟是以紀之詳也問看論語及鄉黨之半曰覺公看得淺未甚切已終了鄉黨篇更須從頭温一過許多說話盡在集注中賀孫問賀孫讀鄉黨已終覺得意思如何曰見得段段都是道理合着如此不如此定不得纔有些子不如此心下便不安曰聖賢一句是一箇道理要得教人識着都是要人収拾已放之心所謂學問之道無他求其放心而已非是學問只在求放心非把求放心為學問工夫乃是學問皆所以求放心如詩三百一言以蔽之曰思無邪大要皆欲使人思無邪而已賀孫第一節鄉黨宗廟朝廷言貌不同看鄉黨篇須以心體之孔子於鄉黨恂恂如也似不䏻言者如何是似不䏻言者宗廟朝廷便便言唯謹如何是便便言唯謹朝與下大夫言侃侃如也與上大夫言誾誾如也如何是侃侃如何是誾誾義剛錄云看鄉黨一篇須是想像他恂恂是如何誾誾是如何不可一滚看問先生解侃侃誾誾四字不與古注同古注以侃侃為和樂誾誾為中正曰衎字乃訓和樂與此侃字不同說文以侃為剛直後漢書中亦云侃然正色誾誾是和說而諍此意思甚好和說則不失事上之恭諍則又不失自家義理之正廣或問鄉黨如恂恂侃侃之類曰如此類解說則甚易須是以心體之真自見箇氣象始得士毅問孔子於鄉黨恂恂如也似不䏻言者或有大是非利害似不可不說所謂似不䏻言者恐但當以卑遜為主所以說似不䏻言曰不是全不說但較之宗廟朝廷為不敢多說耳問其在宗廟朝廷集注云宗廟禮法之所在在宗廟則毎事問固是禮法之所在不知聖人還已知之而猶問還以其名物制度之非古而因訂之曰便是這䖏某甞道是孔子初仕時如此若初来問一畨了後畨畨来畨畨問恐不如此孰謂鄹人之子知禮乎呼曰鄹人之子是與孔子父相識者有此語多應是孔子初年賀孫第二節在朝廷事上接下不同亞夫問朝與下大夫言侃侃如也與上大夫言誾誾如也曰侃侃是剛直貌以其位不甚尊故吾之言可得而直遂至於上大夫之前則雖有所諍必須有含蓄不盡底意思不如侃侃之發露得盡也閔子侍側一章義亦如此時舉問注云侃侃剛直誾誾是和恱而諍不知諍意思如何曰說道和恱終不成一向放倒了到合辨别䖏也須辨别始得内不失其事上之禮而外不至於曲從如古人用這般字不是只說字義須是想像這意思是如此如恂恂皆是有此意思方下此字如史記云魯道之衰洙泗之間齗齗如也齗誾字同這正見和恱而諍底意思當道化盛時斑白者不提挈不負戴於道路少壯者代其事到周衰少壯者尚欲執其任而老者自不肯安爭欲自提挈自負戴此正是和恱而諍賀孫誾誾說文云和恱而諍看得字義是一難底字縁有爭義漢志洙泗之間齗齗義一同兩齒相㫁泳漢書諸尚書爭一件事其中有云誾誾侃侃得禮之容緘嘿邪心非朝廷福泳第三節為君擯相問賔不顧矣曰古者賔退主人送出門外設兩拜賔更不顧而去國君於列國之卿大夫亦如此燾問君召使擯擯如其命數之半如上公九命則擯者五人以次傳命曰古者擯介之儀甚煩如九命擯五人介則如命數是九人賔主相見自擯以下列兩行行末相近如主人說一句主人之擯傳許多擯者訖又交過末介傳中介直至賔之上介方聞之賔賀孫古者相見之禮主人有擯賔有介賔傳命於上介上介傳之次介次介傳之末介末介傳之末擯末擯傳之次擯次擯傳之上擯上擯傳之主人然後賔主方相見又曰看来古人大故淳朴人君出命不甚㑹說話所以着人代他說話燾植舉注云揖左人則左其手揖右人則右其手揖左人傳命出也揖右人傳命入也曰然植集注引晁氏說謂孔子無使擯執圭之事正淳曰定公十年夾谷之㑹孔子相恐即擯相之相曰相自是相擯自是擯相是相其禮儀擯是傳道言語故擯用命數之半以次傳說必大今集注無第四節在朝之容立不中門行不履閾注云棖闑之間由闑右不踐閾只是自外入右邊門邊乃君出入之所闑如一木拄門如今人多用石墩當兩門中臣傍闑右邊出入此右字自内出而言賀孫棖如今衮頭相似闑當中礙門者今城門有之古人常揜左扉人君多出在門外見人所以當棖闑之間為君位泳問立不中門或問謂門之左右扉各有中其制可考否曰門之中有闑扉之兩旁有棖棖闑之間即中古人常闔左扉所謂中門者謂右扉之中也必大蕭問過位色勃如也位謂門屏之間人君宁立之䖏曰古今之制不同今之朝儀用秦制也古者朝會君臣皆立故史記謂秦王一旦捐賔客而不立朝君立於門屏之間屏者乃門間蕭墻也今殿門亦設之三公九卿以下設位於廷中故謂之三槐九棘者廷中有樹處公卿位當其下也雉過位注云君之虚位謂門屏之間曰如今人㕔門之内屏門之外似周禮所謂外朝也植問復其位踧踖如也曰此是到末梢又結筭則箇若衆人到末梢便撤了聖人則始乎敬終乎敬故到末梢又整頓則箇燾第五節為君聘上如揖下如授舊說亦好但此方說升堂時其容如此既升堂納圭於君前即不復執之以下故說做下堂不得所以只用平衡之說言之上下謂執圭之高低也必大執圭上如揖下如授前軰多作上階之上下階之下其實既下則已不用笏往往授介者只是高不過於揖故如揖下不低於授故如授賀孫享禮有容色曰聘但以圭至享則更用圭璧庭實植問聘享之禮曰正行聘禮畢而後行享禮聘是以命圭通信少間仍舊退還命圭享是獻其圭璧琮璜非命圭也幣皮輿馬之類皆拜跪以獻退而又以物獻其夫人凡三四次方畢所獻之物皆受但少間别有物回之又問庭實曰皮幣輿馬皆陳之扵庭實私覿是所遣之大夫既以君命行聘享之禮畢却行私禮参見他國之君也燾享禮有容色儀禮謂發氣滿容何故如此曰聘是初見時故其意極於恭肅既聘而享則用圭璧以通信有廷實以將其意比聘時漸紓也聘禮篇廣私覿愉愉曰聘者享禮乃其君之信私覿則聘使亦有私禮物與所聘之國君及其大臣植第六節衣服之制君子不以紺緅飾紅紫不以為䙝服今反以紅紫為朝服賀孫紺是而今深底鴉青色義剛紺深青揚赤色揚浮也植問緅以飾練服緅是絳色練服是小祥後喪服如何用絳色以為飾曰便是不可曉此箇制度差異絳是淺紅色紺是青赤色如今之閃青也廣問紅紫且近於婦人女子之服不知古之婦人女子亦多以紅紫為服否曰此亦不可知但據先儒如此說耳廣蒨纁絳朱此紅之染數一入為蒨再入為纁三入為絳四入為朱子䝉當暑袗絺綌必表而出之與蒙彼縐絺有兩說泳裘乃純用獸皮而加裏衣如今之貂裘或問狐白裘曰是集衆狐為之植第七節謹齋事眀衣即是箇布衫長一身有半欲蔽足爾又曰即浴衣也見玉藻注植問變食謂不飲酒不茹葷而今之致齋者有酒何也曰飲酒非也但禮中亦有飲不至醉之說廣問齋必變食曰葷是不食五辛㽦第八節飲食之制一言一語一動一作一坐一立一飯一食都有是非是底便是天理非底便是人欲如孔子失飪不食不時不食割不正不食不多食無非天理如口腹之人不時也食不正也食失飪也食便都是人慾便都是逆天理如只喫得許多物事如不當喫纔去貪喫不住都是逆天理看道理只管進只管細便好只管見上面只管有一重方好如一物相似剥一重又剥一重又有一重又剥一重剥到四五重剥得許多皮殻都盡方見真寔底今人不是不理㑹道理只是不肯仔細只守著自底便了是是非非一向都沒分别如詖淫邪遁之辭也不消得辨便說道是他自陷自蔽自如此且恁地和同過也不妨賀孫問割不正不食與席不正不坐此是聖人之心純正故日用間纔有不正䖏便與心不相合心亦不安曰聖人之心無毫釐之差謂如事當恁地做時便硬要恁地做且如不得其醤不食這一物合用醤而不得其醤聖人寧可不喫盖皆欲得其當然之則故也又問注云精鑿也曰是挿教那米白着燾不得其醤不食其字正𦂳要其醤如魚膾芥醤之類閑祖不得其醤非今所謂醤如禮記内則中有數般醤隨所用而不同植肉雖多不使勝食氣非特肉也凡蔬果之類皆不可勝食氣泳第十節居鄉之事問鄉人儺朝服而立於阼階集注云庶其依已而安或云存室神盖五祀之属子孫之精神即祖考之精神故祖考之精神依於已若門行戸竈之属吾身朝夕之所出䖏則鬼神亦必依已而存曰然一家之主則一家之鬼神属焉諸侯守一國則一國鬼神属焉天子有天下則天下鬼神属焉看来為天子者這一箇神眀是多少大如何有些子差忒得若縱欲無度天上許多星辰地下許多山川如何不變怪蔡云子陵足加帝腹便見客星侵帝座曰殷之未喪師克配上帝紂未做不好時便與天相配是甚細事賀孫第十一節與人交之誠意蘇實問問人於他邦再拜而送之曰古人重此禮遣使者問人於他邦則主人拜而送之從背脊後拜潘子善因言浙中若納婦嫁娶盛禮時遣人入傳語婚姻之家亦拜送之至反命則不拜也植問康子饋藥拜而受之看此一事見聖人應接之問義理發見極其周宻曰這般所在却是龜山看得仔細云大夫有賜拜而受之禮也未達不敢甞所以慎疾必告之直也直而有禮故其直不絞龜山為人粘泥故說之較宻賀孫第十三節事君之禮君祭先飯尋常則主人延客祭如世俗出坐之類今侍食於君君祭則臣先自喫飯若為君甞食然不敢當客禮也饍人取那飲食来請君祭泳問疾君視之方東首常時首當在那邊禮記自云寝常當東首矣平時亦欲受生氣恐不獨於疾時為然曰常時多東首亦有隨意卧時節如記云請席何向請袵何趾這見得有隨意向時節然多是東首故玉藻云居常當戸寝常柬首也常寝於北牖下君問疾則移南牖下賀孫問病者居北牖之義曰是就北牖下安牀睡因君来故遷之南牖下使以南面視已耳義剛第十四節交朋友之義問朋友死無所歸曰於我殯朋友之饋非祭肉不拜朋友之義固當如此後世同志者少而汎然交䖏者多只得隨其淺深厚薄度吾力量為之寧可過厚不可過薄曰朋友交㳺固有淺深若泛然之交一一要周旋也不可於自家情分稍厚自著如此須是情文相稱若泛泛施之却是曲意狥物古人於這般所在自分眀如交友稱其信也執友稱其仁也自有許多様又如於師吾哭諸寝朋友哭諸寝門之外所知哭於野恩義自有許多節賀孫第十五節容貌之變問記云若有疾風迅雷甚雨雖夜必興衣服冠而坐看来不如此定是不安但有終日之雷終夜之雨如何得常如此曰固當常如此但亦主於疾風迅雷甚雨若平平底雷風雨也不消如此問當應接之際無相妨否曰有事也只得應賀孫第十六節升車之容立之說車中不内顧一章曰立視五巂式視馬尾盖巂是車輪一轉之地車輪高六尺圍三徑一則闊丈八五轉則正為九丈矣立視雖逺亦不過此時舉朱子語類卷三十八
