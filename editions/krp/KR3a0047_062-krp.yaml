body:
  text: 朱子語類卷六十二中庸一綱領中庸一書枝枝相對葉葉相當不知怎生做得一个文字齊整方子中庸初學者未當理會升卿中庸之書難看中間説鬼説神都無理會學者須是見得箇道理了方可看此書將来印證賜䕫孫録云中庸之書如箇卦影相似中間云云問中庸曰而今都難恁理會某説箇讀書之序須是且著力去看大學又著力去看論語又著力去看孟子看得三書了這中庸半截都了不用問人只略略恁看過不可掉了易底却先去攻那難底中庸多説無形影如鬼神如天地参等類説得髙説下學處少説上達處多若且理會文義則可矣問中庸精粗本末無不兼備否曰固是如此然未到精粗本末無不備處淳問中庸大學之别曰如讀中庸求義理只是致知功夫如謹獨修省亦只是誠意問只是中庸直説到聖而不可知處曰如大學裏也有如前王不忘便是篤恭而天下平底事胡泳讀書先須看大綱又看㡬多間架如天命之謂性率性之謂道修道之謂教此是大綱夫婦所知所能與聖人不知不能處此類是間架譬人看屋先看他大綱次看㡬多間間内又有小間然後方得貫通銖問中庸名篇之義中者不偏不倚無過不及之名兼此二義包括方盡就道理上看固是有未發之中就經文上看亦先言喜怒哀樂未發之謂中又言君子之中庸也君子而時中先生曰他所以名篇者本是取時中之中然所以能時中者盖有那未發之中在所以先開説未發之中然後又説君子之時中至以下論名篇之義至之問中含二義有未發之中有隨時之中曰中庸一書本只是說隨時之中然本其所以有此隨時之中縁是有那未發之中後面方説時中去至之又問隨時之中猶日中之中何意曰本意只是説昨日看得是中今日看得又不是中然譬喻不相似亦未穩在直卿云在中之中與在事之中只是一事此是體彼是尾方子與上條盖同聞中庸之中本是無過無不及之中大㫖在時中上若推其中則自喜怒哀樂未發之中而為時中之中未發之中是體時中之中是用中字兼中和言之直卿云如仁義二字若兼義則仁是體義是用若獨説仁則義禮智皆在其中自兼體用言之蓋卿中庸之中是兼已發而中節無過不及者得名故周子曰惟中者和也中節也天下之達道也若不識得此理則周子之言更觧不得所以伊川謂中者天下之正道中庸章句以中庸之中實兼中和之義論語集注以中者不偏不倚無過不及之名皆此意也人傑中庸之中兼不倚之中曰便是那不倚之中流從裏出來炎問明道以不易為庸先生以常為庸二説不同曰言常則不易在其中矣惟其常也所以不易但不易二字則是事之已然者自後觀之則見此理之不可易若庸則日用常行者便是僴或問中庸二字伊川以庸為定理先生易以為平常據中之一字大段精微若以平常釋庸字則兩字大不相粘曰若看得不相粘便是相粘了如今説這物白這物黑便是相粘了廣因云若不相粘則自不須相對言得曰便是此理難説前日與季通説話終日惜乎不来聴東之與西上之與下以至扵寒暑晝夜生死皆是相反而相對也天地間物未甞無相對者故程先生嘗曰天地萬物之理無獨必有對皆自然而然非有安排也每中夜以思不知手之舞之足之蹈之也看得來真个好笑廣惟其平常故不可易若非常則不得久矣譬如飲食如五穀是常自不可易若是珍羞異味不常得之物則暫一食之可也焉能久乎庸固是定理若以為定理則却不見那平常底意思今以平常言則不易之定理自在其中矣廣因舉釋子偈有云世間萬事不如常又不驚人又久長曰便是它那道理也有極相似處只是説得来别故某於中庸章句序中著語云至老佛之徒出則彌近理而大亂真矣須是看得它那彌近理而大亂真處始得廣云程子自私二字恐得其要領但人看得此二字淺近了曰便是向日王順伯曾有書與陸子静辨此二字云佛氏割截身體猶自不顧如何却謂之自私得味道因舉明道答横渠書云大抵人患在自私而用智曰此却是説大凡人之任私意耳因舉下文豁然而大公物来而順應曰此亦是對説豁然而大公便是不自私物来而順應便是不用智後面説治怒處曰但於怒時遽忘其怒反觀理之是非則於道思過半矣忘其怒便是大公反觀理之是非便是順應都是對説盖其理自如此廣因云太極一判便有隂陽相對曰然廣惟其平常故不可易如飲食之有五穀衣服之有布帛若是竒羞異味錦綺組繡不久便須厭了庸固是定理若直解為定理却不見得平常意思今以平常言然定理自在其中矣公晦問中庸二字舊説依程子不偏不易之語今説得是不偏不倚無過不及而平常之理似以不偏不倚無過不及説中乃是精宻切至之語而以平常説庸恰似不相粘著曰此其所以粘著盖縁處得極精極宻只是如此平常若有些子咤異便不是極精極宻便不是中庸凡事無不相反以相成東便與西對南便與北對無一事一物不然明道所以云天下之物無獨必有對終夜思之不知手之舞之足之蹈之直是可觀事事如此賀孫與廣縁盖聞同問中庸不是截然為二庸只是中底常然而不易否曰是淳問明道曰惟中不足以盡之故曰中庸庸乃中之常理中自己盡矣曰中亦要得常此是一經一緯不可闕可學蜚卿問中庸之為徳程云不偏之謂中不易之謂庸曰中則直上直下庸是平常不差異中如一物竪置之常如一物横置之唯中而後常不中則不能常因問曰不惟不中則不能常然不常亦不能為中曰亦是如此中而後能常此以自然之理而言常而後能有中此以人而言問龜山言髙明則中庸也髙明者中庸之體中庸者髙明之用不知將體用對説如何曰只就中庸字上説自分曉不須如此説亦可又舉荆公髙明處已中庸處人之語為非是因言龜山有功於學者然就它説據它自有做工夫處髙明釋氏誠有之只縁其無道中庸一截又一般人宗族稱其孝鄉黨稱其弟故十項事其八九可稱若一向拘攣又做得甚事要知中庸髙明二者皆不可廢㝢或問中與誠意如何曰中是道理之模様誠是道理之實處中即誠矣又問智仁勇於誠如何曰智仁勇是做底事誠是行此三者都要實又問中庸曰中庸只是一事就那頭看是中就這頭看是庸譬如山與嶺只是一物方其山即是謂之山行著嶺路則謂之嶺非二物也方子録云問中庸既曰中又曰誠何如曰此古詩所謂横看成嶺側成峯也中庸只是一个道理以其不偏不倚故謂之中以其不差異可常行故謂之庸未有中而不庸者亦未有庸而不中者惟中故平常堯授舜舜授禹都是當其時合如此做做得来恰好所謂中也中即平常也不如此便非中便不是平常以至湯武之事亦然又如當盛夏極暑時須用飲冷就涼處衣葛揮扇此便是中便是平常當隆冬盛寒時須用飲湯就宻室重裘擁火此便是中便是平常若極暑時重裘擁火盛寒時衣葛揮扇便是差異便是失其中矣問中庸之庸平常也所謂平常者事理當然而無詭異也或問言既曰當然則自君臣父子日用之常以至堯舜之禪受湯武之放伐無適而非平常矣竊謂堯舜禪受湯武放伐皆聖人非常之變而謂之平常何也曰堯舜禪受湯武放伐雖事異常然皆是合當如此便只是常事如伊川説經權字合權處即便是經銖曰程易説大過以為大過者常事之大者耳非有過於理也聖人盡人道非過於理是此意否曰正是如此銖問道之常變舉中庸或問説曰守常底固是是然到守不得處只著變而硬守定則不得至變得来合理斷然著如此做依舊是常又問前日説經權云常自是著還他一箇常變自是著還他一箇變如或問舉堯舜之禪授湯武之放伐其變無窮無適而非常却又皆以為平常是如何曰是他到不得已處只得變變得是仍舊是平常然依舊著存一箇變燾有中必有庸有庸必有中兩箇少不得賜中必有庸庸必有中能究此而後可以發諸運用季札中庸該得中和之義庸是見於事和是發扵心庸該得和僴問中庸二字孰重曰庸是定理有中而後有庸問或問中言中立而無依則必至於倚如何是無依曰中立最難譬如一物植立於此中間無所依著久之必倒去問若要植立得住須用強矯曰大故要強立徳明向見劉致中説今世傳明道中庸義是與叔初本後為博士演為講義先生又云尚恐今解是初著後掇其要為解也方諸家解呂中庸文滂沛意浹洽方李先生説陳幾叟軰皆以楊氏中庸不如吕氏先生曰吕氏飽滿充實方龜山門人自言龜山中庸枯燥不如與叔浹洽先生曰與叔却似行到他人如登髙望逺方游楊吕侯諸先生解中庸只説他所見一面道理却不將聖人言語折衷所以多失游楊諸公解中庸引書語皆失本意理學最難可惜許多印行文字其間無道理底甚多雖伊洛門人亦不免如此如解中庸正説得數句好下面便有幾句走作無道理了不知是如何舊嘗看欒城集見他文勢甚好近日看全無道理如與劉原父書説藏巧若拙處前面説得儘好後面却說怕人来磨我且恁地鶻突去要他不来便不成説話又如蘇東坡忠厚之至論説舉而歸之於仁便是不奈他何只恁地做个鶻突了二蘇説話多是如此此題目全在疑字上謂如有人似有功又似無功不分曉只是從其功處重之有人似有罪又似無罪不分曉只得從其罪處輕之若是功罪分明定是行賞罰不可毫髪輕重而今説舉而歸之於仁更無理㑹或舉老蘇五經論先生曰説得聖人都是用術了明作游丈開問中庸編集得如何曰便是難説縁前軰諸公説得多了其間儘有差舛處又不欲盡駁難它底所以難下手不比大學都未曾有人説雉先生以中庸或問見授云亦有未滿意處如評論程子諸子説處尚多觕㽦問趙書記欲以先生中庸解鋟木如何先生曰公歸時煩説與切不可某為人遲鈍旋見得旋改一年之内改了數遍不可知又自笑云那得箇人如此著述浩章句序問先生説人心是形氣之私形氣則是口耳鼻目四肢之属曰固是問如此則未可便謂之私曰但此數件物事屬自家體段上便是私有底物不比道便公共故上面便有箇私底根本且如危亦未便是不好只是有箇不好底根本士毅問或生於形氣之私曰如飢飽寒暖之類皆生於吾身血氣形體而它人無與所謂私也亦未能便是不好但不可一向徇之耳植問人心本無不善發於思慮方始有不善今先生指人心對道心而言謂人心生於形氣之私不知是有形氣便有這箇人心否曰有恁地分别説底有不恁地説底如單説人心則都是好對道心説著便是勞攘物事㑹生病痛底䕫孫季通以書問中庸序所云人心形氣先生曰形氣非皆不善只是靠不得季通云形氣亦皆有善不知形氣之有善皆自道心出由道心則形氣善不由道心一付於形氣則為惡形氣猶船也道心猶柁也船無柁縱之行有時入於波濤有時入於安流不可一定惟有一柁以運之則雖入波濤無害故曰天生蒸民有物有則物乃形氣則乃理也渠云天地中也萬物過不及亦不是萬物豈無中渠又云浩然之氣天地之正氣也此乃伊川説然皆為養氣言養得則為浩然之氣不養則為惡氣卒走理不得且如今日説夜氣是甚大事専靠夜氣濟得甚事可學云以前看夜氣多略了足以兩字故然先生曰只是一理存是存此養是養此識得更無走作舜功問天理人欲畢竟須為分别勿令交闗先生曰五峯云性猶水善猶水之下也情猶瀾也欲猶水之波浪也波浪與瀾只爭大小欲豈可帶於情某問五峯云天理人欲同行而異情却是先生曰是同行者謂二人同行於天理中一人日從天理一人専徇人欲是異情下云同體而異用則大錯因舉知言多有不是處性無善惡此乃欲尊性不知却鶻突了它胡氏論性大抵如此自文定以下皆然如曰性善惡也性情才相接此乃説著氣非説著性向呂伯恭初讀知言以為只有二段是其後却云極妙過於正䝉可學問既云上智何以更有人心曰掐著痛抓著痒此非人心而何人自有人心道心一箇生於血氣一箇生於義理飢寒痛痒此人心也惻𨼆羞惡是非辭遜此道心也雖上智亦同一則危殆而難安一則微妙而難見必使道心常為一身之主而人心每聽命焉乃善也僴因鄭子上書来問人心道心先生曰此心之靈其覺於理者道心也其覺於欲者人心也可學竊尋中庸序以人心出於形氣道心本於性命盖覺於理謂性命覺於欲謂形氣云云可學近觀中庸序所謂道心常為一身之主而人心每聽命焉又知前日之失向来専以人可以有道心而不可以有人心今方知其不然人心出於形氣如何去得然人扵性命之理不明而専為形氣所使則流於人欲矣如其達性命之理則雖人心之用而無非道心孟子所以指形色為天性者以此若不明踐形之義則與告子食色之言又何以異操之則存捨之則亡心安有存亡此正人心道心交界之辨而孟子特指以示學者可學以為必有道心而後可以用人心而於人心之中又當識道心若専用人心而不知道心則固流入於放僻邪侈之域若只守道心而欲屏去人心則是判性命為二物而所謂道心者空虚無有將流於釋老之學而非虞書之所指者未知然否大雅云前軰多云道心是天性之心人心是人欲之心今如此交互取之當否曰既是人心如此不好則須絶滅此身而後道心始明且舜何不先説道心後説人心大雅云如此則人心生於血氣道心生於天理人心可以為善可以為不善而道心則全是天理矣曰人心是此身有知覺有嗜欲者如所謂我欲仁從心所欲性之欲也感於物而動此豈能無但為物誘而至於陷溺則為害爾故聖人以為此人心有知覺嗜欲然無所主宰則流而忘反不可據以為安故曰危道心則是義理之心可以為人心之主宰而人心據以為準者也且以飲食言之凡飢渴而欲得飲食以充其飽且足者皆人心也然必有義理存焉有可以食有不可以食如子路食於孔悝之類此不可食者又如父之慈其子子之孝其父常人亦能之此道心之正也苟父一虐其子則子必很然以悖其父此人心之所以危也惟舜則不然雖其父欲殺之而舜之孝則未嘗替此道心也故當使人心每聽道心之區處方可然此道心却雜出於人心之間微而難見故必須精之一之而後中可執然此又非有兩心也只是義理人欲之辨爾陸子静亦自説得是云舜若以人心為全不好則須説不好使人去之今止説危者不可據以爲安耳言精者欲其精察而不為所雜也此言亦自是今鄭子上之言都是但於道心下却一向説是箇空虚無有之物將流為釋老之學然則彼釋迦是空虚之魁飢能不欲食乎寒能不假衣乎能令無生人之所欲者乎雖欲滅之終不可得而滅也大雅章句問中庸始言一理中散為萬事末復合為一理云云曰如何説曉得一理了萬事都在裏面天下萬事萬物都要你逐一理㑹過方得所謂中散為萬事便是中庸近世如龜山之論便是如此以為反身而誠則天下萬物之理皆備於我萬物之理須你逐一去看理㑹過方可如何㑹反身而誠了天下萬物之理便自然備於我成个甚麽又曰所謂中散為萬事便是中庸中所説許多事如智仁勇許多為學底道理與為天下國家有九經與祭祀鬼神許多事聖人經書所以好看中間無些子罅隙句句是實理無些子空缺處僴問中庸始合為一理天命之謂性末復合為一理無聲無臭始合而開其開也有漸末後開而復合其合也亦有漸賜䕫孫録同第一章天命之謂性是専言理雖氣亦包在其中然説理意較多若云兼言氣便説率性之謂道不去如太極雖不離乎陰陽而亦不雜乎陰陽道夫用之問天命之謂性以其流行而付與萬物者謂之命以人物禀受者謂之性然人物禀受以其具仁義禮智而謂之性以貧賤夀夭而言謂之命是人又兼有性命曰命雖是恁地説然亦是兼付與而言賀孫問天命之謂性此只是從原頭説否曰萬物皆只同這一箇原頭聖人所以盡己之性則能盡人之性盡物之性由其同一原故也若非同此一原則人自人之性物自物之性如何盡得又問以健順五常言物之性如健順字亦恐有礙否曰如牛之性順馬之性健即健順之性虎狼之仁螻蟻之義即五常之性但只禀得来少不似人禀得来全耳燾問天命之謂性章句云健順五常之徳何故添却健順二字曰五行乃五常也健順乃陰陽二字某舊解未嘗有此後来思量既有隂陽須添此二字始得枅問木之神為仁火之神為禮如何見得曰神字猶云意思也且如一枝柴却如何見得他是仁只是他意思却是仁火那裏見得是禮却是他意思是禮僴古注率性之謂道鄭氏以金木水火土從天命之謂性説来要順從氣説来方可泳率性之謂道率字輕方子率字只是循字循此理便是道伊川所以謂便是仁者人也合而言之道也㽦率性之謂道率是呼喚字盖曰循萬物自然之性之謂道此率字不是用力字伊川謂合而言之道也是此義㽦安卿問率性曰率非人率之也伊川解率字亦只訓循到吕與叔説循性而行則謂之道伊川却便以為非是至其自言則曰循牛之性則不為馬之性循馬之性則不為牛之性乃知循性是循其理之自然爾伯羽率循也不是人去循之吕説未是程子謂通人物而言馬則為馬之性又不做牛底性牛則為牛之性又不做馬底性物物各有箇理即此便是道曰總而言之又只是一箇理否曰是淳率性之謂道只是隨性去皆是道吕氏説以人行道若然則未行之前便不是道乎淳問率性之謂道率循也此循字是就道上説還是就行道人上説曰諸家多作行道人上説以率性便作修為非也率性者只是説循吾本然之性便自有許多道理性是箇渾淪底物道是箇性中分𣲖條理循性之所有其許多分𣲖條理即道也性字通人物而言但人物氣禀有異不可道物無此理程子曰循性者牛則為牛之性又不做馬底性馬則為馬底性又不做牛底性物物各有這理只為氣禀遮蔽故所通有偏正不同然隨他性之所通道亦無所不在也銖問率性通人物而言則此性字似生之謂性之性兼氣禀言之否曰天命之謂性這性亦離氣禀不得率循也此循字是就道上説不是就行道人說性善只一般但人物氣禀有異不可道物無此理性是箇渾淪物道是性中分𣲖條理隨分𣲖條理去皆是道穿牛鼻絡馬首皆是隨它所通處仁義禮智物豈不有但偏耳隨它性之所通處道皆無所不在曰此性字亦是以理言否曰是又問鳶有鳶之性魚有魚之性其飛其躍天機自完便是天理流行發見之妙處故子思姑舉此一二以明道之無所不在否曰是淳孟子説性善全是説理若中庸天命之謂性己自是兼帶人物而言率性之謂道性似一箇渾淪底物道是支脉恁地物便有恁地道率人之性則為人之道率牛之性則為牛之道非謂以人循之若謂以人循之而後謂之道則人未循之前謂之無道可乎砥天命之謂性指逈然孤獨而言率性之謂道指著於事物之間而言又云天命之性指理言率性之道指人物所行言或以率性為順性命之理則謂之道如此却是道因人做方始有也䕫孫萬物禀受莫非至善者性率性而行各得其分者道端䝉天命之謂性率性之謂道性與道相對則性是體道是用又曰道便是在裏面做出底道義剛問天命之謂性率性之謂道伊川謂通人物而言如此却與告子所謂人物之性同曰據伊川之意人與物之本性同及至禀賦則異盖本性理也而本賦之性則氣也性本自然及至生賦無氣則乗載不去故必頓此性於氣上而後可以生及至已生則物自禀物之氣人自禀人之氣氣最難看而其可驗者如四時之間寒暑得宜此氣之正當寒而暑當暑而寒乃氣不得正氣正則為善氣不正則為不善又如同是此人有至昏愚者是其禀得此濁氣太深又問明道云論性不論氣不脩論氣不論性不明曰論性不論氣孟子也不備但少欠耳論氣不論性荀揚也不眀則大害事可學問孟子何不言氣曰孟子只是教人勇於為善前更無阻礙自學者而言則不可不去其窒礙正如將百萬之兵前有數萬兵韓白為之不過鼔勇而進至它人則須先去此礙後可吳宜之問學者治此氣正如人之治病曰亦不同須是明天理天理明則扵通書剛柔一段亦須著且先易其惡既易其惡則至其中在人間惡安得謂之剛曰此本是剛出来語畢先生又曰生之謂性伊川以為生質之性然告子此語亦未是再三請益曰且就伊川此意理㑹亦自好可學問天命之謂性率性之謂道皆是人物之所同得天命之性人受其全則其心具乎仁義禮智之全體物受其偏則随其品類各有得焉而不能通貫乎全體率性之謂道若自人而言之則循其仁義禮智之性而言之固莫非道自物而言之飛潜動植之類各正其性則亦各循其性於天地之間莫非道也如中庸或問所説馬首之可絡牛鼻之可穿等數句恐説未盡所舉或問非今本盖物之自循其性多有與人初無干渉多有人所不識之物無不各循其性於天地之間此莫非道也如或問中所説恐包未盡曰説話難若説得闊則人將来又只認目之扵色耳之於聲鼻之扵臭四肢之於安佚等做性却不認仁之於父子義之於君臣禮之於賔主智之於賢者聖人之於天道底是性因言解經立言須要得實如前軰説伊尹耕於有莘之野而樂堯舜之道是飢食渇飲夏葛冬裘為樂堯舜之道若如此説則全身已浸在堯舜之道中何用更説豈若吾身親見之哉如前軰説文武之道未墜於地以為文武之道常昭然在日用之間一似常有一物昭然在目前不㑹攧下去一般此皆是説得不實所以未墜於地者只言周衰之時文武之典章人尚傳誦得在未至淪没先生既而又曰某曉得公説底盖馬首可絡牛鼻可穿皆是就人看物處説聖人脩道之謂教皆就這様處如適間所說却也見得一箇大體至方子録云至之問率性之謂道或問只言馬首之可絡牛鼻之可穿都是説以人看物底若論飛潜動植各正其性與人不相干涉者何莫非道恐如此看方是先生曰物物固皆是道如螻蟻之㣲甚時胎甚時卵亦是道在立言甚難須是説得實如龜山説堯舜之道只夏葛冬裘飢食渴飲處便是如此則全身浸在堯舜之道裏他何必言豈若吾身親見之哉黄丈云若如此説則人心道心皆是道否先生曰相似目之於色耳之於聲鼻之於臭四肢之於安佚性也底却認做道仁之於父子義之於君臣禮之於賔主智之於賢者有性焉底却認不得如文武之道未墜於地在人李光祖乃曰日用之間昭然在是如此則只是説古今公共底何必指文武孔子盖是言周家典章文物未至淪没非是指十方常住者而言也久之復曰至之却亦看得一箇大體盖卿同問伊川云天命之謂性率性之謂道此亦通人物而言修道之謂教此專言人事曰是如此人與物之性皆同故循人之性則為人道循馬牛之性則為馬牛之道若不循其性令馬耕牛馳則失其性而非馬牛之道矣故曰通人物而言璘問率性之謂道通人物而言則修道之謂教亦通人物如服牛乗馬不殺胎不殀夭斧斤以時入山林此是聖人教化不特在人倫上品節防範而及於物否曰也是如此所以謂之盡物之性但於人較詳於物較略人上較多物上較少砥問集解中以天命之謂性率性之謂道通人物而言修道之謂教是專就人事上言否曰道理固是如此然修道之謂教就物上亦有箇品節先王所以咸若草木鳥獸使庶類蕃殖如周禮掌獸掌山澤各有官如周公驅虎豹犀象龍蛇如草木零落然後入山林昆虫未蟄不以火田之類各有箇品節使萬物各得其所亦所謂教也徳明問修道之謂教曰游楊説好謂修者只是品節之也明道之説自各有意去偽問明道曰道即性也若道外尋性性外尋道便不是如此即性是自然之理不容加工揚雄言學者所以修性故伊川謂楊雄為不識性中庸却言修道之謂教如何曰性不容修修是揠苗道亦是自然之理聖人於中為之品節以教人耳誰能便於道上行浩修道之謂教一句如今人要合後面自明誠謂之教却説作自修盖天命謂性之性與自誠明之性修道謂教之教與自明誠之教各自不同誠明之性堯舜性之之性明誠之教由教而入者也木之問中庸舊本不曾解可離非道一句今先生説云瞬息不存便是邪妄方悟本章可離與不可離道與非道各相對待而言離了仁便不仁離了義便不義公私善利皆然向来從龜山説只謂道自不可離而先生舊亦不曾為學者説破曰向来亦是看得太髙今按可離非道云瞬息不存便是邪妄與章句或問説不合更詳之徳明劉黻問中庸曰道不可須臾離伊川却云存無不在道之心便是助長何也曰中庸所言是日用常行合做底道理如為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信皆是不可已者伊川此言是為闢釋氏而發盖釋氏不理㑹常行之道只要空守著這一箇物事便喚做道與中庸自不同説畢又曰闢異端説話未要理㑹且理㑹取自家事自家事既明那箇自然見得與立楊通老問中庸或問引楊氏所謂無適非道之云則善矣然其言似亦有所未盡盖衣食作息視聴舉履皆物也其所以如此之義理準則乃道也曰衣食動作只是物物之理乃道也將物便喚做道則不可且如這箇椅子有四隻脚可以坐此椅之理也若除去一隻脚坐不得便失其椅之理矣形而上為道形而下為器説這形而下之器之中便有那形而上之道若便將形而下之器作形而上之道則不可且如這箇扇子此物也便有箇扇子底道理扇子是如此做合當如此用此便是形而上之理天地中間上是天下是地中間有許多日月星辰山川草木人物禽獸此皆形而下之器也然這形而下之器之中便各自有箇道理此便是形而上之道所謂格物便是要就這形而下之器窮得那形而上之道理而已如何便將形而下之器作形而上之道理得飢而食渴而飲日出而作日入而息其所以飲食作息者皆道之所在也若便謂食飲作息者是道則不可與龎居士神通妙用運水搬柴之頌一般亦是此病如徐行後長與疾行先長都一般是行只是徐行後長方是道若疾行先長便不是道豈可説只認行底便是道神通妙用運水搬柴須是運得水搬得柴是方是神通妙用若運得不是搬得不是如何是神通妙用佛家所謂作用是性便是如此他都不理㑹是和非只認得那衣食作息視聴舉履便是道説我這箇㑹説話底㑹作用底叫著便應底便是神通妙用更不問道理如何儒家則須是就這上尋討箇道理方是道禪老云赤肉團上有一無位真人在汝等諸人面門上出入云云他便是只認得這箇把来作弄或問告子之學便是如此曰佛家底又髙告子底死殺了不如佛家底活而今學者就故紙上理㑹也解説得去只是都無那快活和樂底意思便是和這佛家底也不曾見得似他佛家者雖是無道理然他却一生受用一生快活便是它就這形而下者之中理㑹得似那形而上者而今學者看来須是先曉得這一層却去理㑹那上面一層方好而今都是和這下面一層也不曾見得所以和那上面一層也理㑹不得又曰天地中間物物上有這箇道理雖至没緊要底物事也有這道理盖天命之謂性這道理却無形無安頓處只那日用事物上道理便在上面這兩箇元不相離凡有一物便有一理所以君子貴博學於文看来博學似箇没緊要物事然那許多道理便都在這上都從那源頭上来所以無精粗大小都一齊用理㑹過蓋非外物也都一齊理㑹方無所不盡方周遍無踈缺處又曰道不可須㬰離可離非道也所謂不可離者謂道也若便以日用之間舉止動作便是道則無所適而非道無時而非道然則君子何用恐懼戒謹何用更學道為為其不可離所以須是依道而行如人説話不成便以説話者為道須是有箇仁義禮智始得若便以舉止動作為道何用更説不可離得又曰大學所以説格物却不説窮理蓋説窮理則似懸空無捉摸處只説格物則只就那形而下之器上便尋那形而上之道便見得這箇元不相離所以只説格物天生蒸民有物有則所謂道者是如此何嘗説物便是則龜山便只指那物做則只是就這物上分精粗為物則如云目是物也目之視乃則也耳物也耳之聴乃則也殊不知目視耳聽依舊是物其視之明聽之聰方是則也龜山又云伊尹之耕於莘野此農夫田父之所日用者而樂在是如此則世間伊尹甚多矣龜山説話大槩有此病僴問道不可離只言我不可離這道亦還是有不能離底意思否曰道是不能離底然純說是不能離不成錯行也是道時舉録云叔重問道不可離自家固不可離然他也有不能離底意曰當参之扵心可離不能離之間純説不能離也不得不成錯行了也是道因問龜山言飢食渴飲手持足行便是道竊謂手持足履未是道手容恭足容重乃是道也目視耳聽未是道視明聽聰乃道也或謂不然其説云手之不可履猶足之不可持此是天職率性之謂道只循此自然之理耳不審如何曰不然桀紂亦㑹手持足履目視耳聽如何便喚做道若便以為道是認欲為理也伊川云夏葛冬裘飢食渴飲若著些私吝心便是廢天職須看著些私吝心字録時舉録云夜来與先之論此先之云手之不可履云云先生曰云云此道無時無之然體之則合背之則離也一有離之則當此之時失此之道矣故曰不可須㬰離君子所以戒慎不睹恐懼不聞則不敢以須臾離也端䝉戒謹不睹恐懼不聞即是道不可須㬰離處履孫問日用間如何是不聞不見處人之耳目聞見常自若莫只是念慮未起未有意於聞見否曰所不聞所不見不是合眼掩耳只是喜怒哀樂未發時凡萬事皆未萌芽自家便先恁地戒謹恐懼常要提起此心常在這裏便是防於未然不見是圖底意思徐問講求義理時此心如何曰思慮是心之發了伊川謂存養於喜怒哀樂未發之前則可求中於喜怒哀樂未發之前則不可淳㝢録云問講求義理便是此心在否曰講求義理属思慮心自動了是已發之心劉黻問不知無事時如何戒謹恐懼若只管如此又恐執持太過若不如此又恐都忘了曰也有甚麽矜持只不要昏了他便是戒懼與立戒謹乎其所不睹恐懼乎其所不聞這處難言大段著意又却生病只恁地略約住道著戒謹恐懼已是剰語然又不得不如此説賀孫戒謹恐懼是未發然只做未發也不得便是所以養其未發只是聳然提起在這裏這箇未發底便常在何曾發或問恐懼是已思否曰思又别思是思索了戒謹恐懼正是防閑其未發或問即是持敬否曰亦是伊川曰敬不是中只敬而無失即所以中敬而無失便是常敬這中底便常在淳問戒謹恐懼以此涵養固善然推之於事所謂開物成務之幾又當如何曰此却在博文此事獨脚做不得須是讀書窮理又曰只是源頭正發處自正只是這路子上来徃徳明問中庸所謂戒謹恐懼大學所謂格物致知皆是為學知利行以下底説否曰固然然聖人亦未嘗不戒謹恐懼惟聖罔念作狂惟狂克念作聖但聖人所謂念者自然之念狂者之念則勉強之念耳閎祖所謂不睹不聞者乃是從那盡處説来非謂於所睹所聞處不謹也如曰道在瓦礫便不成不在金玉義剛問道也者不可須臾離與莫見乎隠兩段分明極有條理何為前輩都作一段滚説去曰此分明是兩節事前段有是故字後段有故字聖賢不是要作文只是逐節次説出許多道理若作一段説亦成是何文字所以前輩諸公解此段繁雜無倫都不分明銖用之問戒懼不睹不聞是起頭處至莫見乎隠莫顯乎微又用緊一緊曰不可如此説戒謹恐懼是普説言道理偪塞都是無時而不戒謹恐懼到得隠微之間人所易忽又更用謹這箇却是喚起説戒懼無箇起頭處只是普遍都用如卓子有四角頭一齊用著工夫更無空缺處若説是起頭又遺了尾頭説是尾頭又遺了起頭若説属中間又遺了兩頭不用如此説只是無時而不戒謹恐懼只自做工夫便自見得曾子曰戰戰兢兢如臨深淵如履薄氷不成到臨死之時方如此戰戰兢兢他是一生戰戰兢兢到死時方了僴問舊㸔莫見乎隠莫顯乎微兩句只謂人有所愧歉於中則必見於顔色之間而不可揜昨聞先生云人所不知而已所獨知處自然見得愈是分曉如做得是時别人未見得是自家先見得是做得不是時别人未見得非自家先見得非如此説時覺得又親切曰事之是與非衆人皆未見得自家自是先見得分明問復小而辨於物善端雖是方萌只是昭昭靈靈地别此便是那不可揜處曰是如此只是明一明了不能接續得這意思去又暗了胡泳問莫見乎隠莫顯乎微程子舉弹琴殺心事是就人知處言吕游楊氏所説是就已自知處言章句只説已自知或疑是合二者而言否曰有動於中已固先自知亦不能掩人之知所謂誠之不可揜也銖問伊川以鬼神憑依語言為莫見乎隠莫顯乎微如何曰隠微之事在人心不可得而知却被他説出来豈非莫見乎隠莫顯乎微盖鬼神只是氣心中實有是事則感於氣者自然發見昭著如此文蔚問今人隠微之中有不善者甚多豈能一一如此曰此亦非常之事所謂事之變者文蔚曰且如人生積累愆咎感召不祥致有日月薄蝕山崩川竭水旱凶荒之變便只是此類否曰固是如此文蔚戒謹恐懼乎其所不睹不聞是從見聞處戒謹恐懼到那不睹不聞處這不睹不聞處是功夫盡頭所以謹獨則是専指獨處而言如莫見乎隠莫顯乎微是謹獨緊切處燾黄灝謂戒懼是統體做功夫謹獨是又於其中緊切處加功夫猶一經一緯而成帛先生以為然僴問謹獨曰是從見聞處至不睹不聞處皆戒謹了又就其中於獨處更加謹也是無所不謹而謹上更加謹也燾問不睹不聞者已之所不睹不聞也獨者人之所不睹不聞也如此看便見得此章分兩節事分明先生曰其所不睹不聞其之一字便見得是説已不睹不聞處只是諸家看得自不子細耳又問如此分兩莭工夫則致中致和工夫方各有著落而天地位萬物育亦各有歸著曰是銖戒慎一莭當分為兩事戒慎不睹恐懼不聞如言聽於無聲視於無形是防之於未然以全其體謹獨是察之於將然以審其幾端䝉問戒謹不睹恐懼不聞與謹獨兩段事廣思之便是惟精惟一底工夫戒謹恐懼持守而不失便是惟一底工夫謹獨則於善惡之㡬察之愈精愈宻便是惟精底工夫但中庸論道不可離則先其戒謹而後其謹獨舜論人心道心則先其惟精而後其惟一曰兩事皆少不得惟精惟一底工夫不睹不聞時固當持守然不可不察謹獨時固當致察然不可不持守廣人傑録云漢卿問云云先生曰不必分惟精惟一於兩段上但凢事察之貴精守之貴一如戒謹恐懼是事之未形處謹獨㡬之將然處不可不精察而謹守之也問戒謹不睹恐懼不聞與謹獨雖不同若下工夫皆是敬否曰敬只是常惺惺法所謂静中有箇覺處只是常惺惺在這裏静不是睡著了賀孫問不睹不聞與謹獨何别曰上一節説存天理之本然下一節説遏人欲於將萌又問能存天理了則下面謹獨似多了一截曰雖是存得天理臨發時也須㸃檢這便是他宻處若只説存天理了更不謹獨却是只用致中不用致和了又問致中是未動之前然謂之戒懼却是動了曰公莫看得戒謹恐懼太重了此只是略省一省不是恁驚惶震懼略是箇敬模様如此然道著敬字已是重了只略略收拾米便在這裏伊川所謂道箇敬字也不大段用得力孟子曰操則存操亦不是著力把持只是操一操便在這裏如人之氣才呼便出吸便入賜問中庸戒懼謹獨學問辨行用功之終始曰只是一箇道理説著要貼出来便有許多説話又問是敬否曰説著敬已多了一字但略略收拾来便在這裏䕫孫問不聞不睹與謹獨如何曰獨字又有箇形迹在這裏可謹不聞不見全然無形迹暗昧不可得知只於此時便戒謹了便不敢卓問謹獨是念慮初萌處否曰此是通説不止念慮初萌只自家自知處如小可没緊要處只胡亂去便是不謹謹獨是已思慮巳有些小事已接物了戒慎乎其所不睹恐懼乎其所不聞是未有事時在相在爾室尚不愧于屋漏不動而敬不言而信之時謹獨便已有形迹了潜雖伏矣亦孔之昭詩人言語只是大綱説子思又就裏面剔出這話来教人又較緊宻大抵前聖所説底後人只管就裏面發得精細如程子横渠所説多有孔孟所未説底伏羲畫卦只就隂陽以下孔子又就隂陽上發出太極康節又道須信畫前元有易濓溪太極圖又有許多詳備問氣化形化男女之生是氣化否曰凝結成箇男女因甚得如此都是隂陽無物不是隂陽問天地未判時下面許多都已有否曰事物雖未有其理則具㝢可學録云謹獨已見扵用孔子言語只是混合説子思恐人不曉又為之分别大凢古人説話一節開一節如伏羲易只就隂陽以下至孔子又推本扵太極然此曰易有太極而已至濓溪乃畫出一圗康節又論畫前之易問謹獨莫只是十目所視十手所指處也與那闇室不欺時一般否先生是之又云這獨也又不是恁地獨時如與衆人對坐自心中發一念或正或不正此亦是獨處椿問謹獨章迹雖未形幾則已動人雖不知已獨知之上兩句是程子意下兩句是游氏意先生則合而論之是否曰然兩事只是一理㡬既動則已必知之己既知則人必知之故程子論楊震四知曰天知地知只是一箇知廣問迹雖未形幾則已動㸔莫見莫顯則已是先形了如何却説迹未形㡬先動曰莫見乎隠莫顯乎微這是大綱説賀孫吕子約書来爭莫見乎隠莫顯乎微只管滚作一段㸔某答它書江西諸人將去㸔頗以其説為然彭子夀却㸔得好云前段不可須臾離且是大體説到謹獨處尤見於接物得力先生又云吕家之學重於守舊更不論理徳明問道不可須㬰離可離非道是言道之體段如此莫見乎隠莫顯乎微亦然下面君子戒謹恐懼君子必謹其獨方是做工夫皆以是故二字發之如何滚作一段㸔曰道不可須㬰離言道之至廣至大者莫見乎隠莫顯乎微言道之至精至密者徳明戒謹不睹恐懼不聞非謂於睹聞之時不戒懼也言雖不睹不聞之際亦致其謹則睹聞之際其謹可知此乃統同説承上道不可須臾離則是無時不戒懼也然下文謹獨既專就已發上説則此段正是未發時工夫只得説不睹不聞也莫見乎隠莫顯乎微故君子必謹其獨上既統同説了此又就中有一念萌動處雖至隠微人所不知而已所獨知尤當致謹如一片止水中間忽有一㸃動處此最緊要著工夫處閎祖問道也者不可須㬰離也以下是存養工夫莫見乎隠以下是檢察工夫否曰説道不可須㬰離是説不可不存養是故以下却是教人恐懼戒謹做存養工夫説莫見乎隠莫顯乎微是説不可不謹意故君子以下却是教人謹獨察其私意起處防之只看兩箇故字便是方説入身上来做工夫也聖人教人只此兩端大雅問戒謹乎其所不睹恐懼乎其所不聞或問中引聴於無聲視於無形如何曰不呼喚時不見時常準備著徳明指坐閤問曰此處便是耳目所睹聞隔窻便是不睹不聞也曰不然只謂照管所不到念慮所不及處正如防賊相似須盡塞其來路次曰再問不睹不聞終未瑩曰此須意㑹如或問中引不見是圖既是不見安得有圖只是要於未有朕兆無可睹聞時而戒懼耳又曰不睹不聞是提其大綱説謹獨乃審其微細方不聞不睹之時不惟人所不知自家亦未有所知若所謂獨即人所不知而已所獨知極是要戒懼自来人説不睹不聞與謹獨只是一意無分别便不是徳明問林子武以謹獨為後以戒懼為先謹獨以發處言覺得也是在後曰分得也好又問余國秀謂戒懼是保守天理謹獨是檢防人欲曰也得又問覺得戒謹恐懼與謹獨也難分動静静時固戒謹恐懼動時又豈可不戒謹恐懼曰上言道不可須㬰離此言戒懼其所不睹不聞與謹獨皆是不可離又問泳欲謂戒懼是其常謹獨是謹其所發曰如此説也好又曰言道不可須㬰離故言戒謹恐懼其所不睹不聞言莫見乎隠莫顯乎微故言謹獨又曰戒謹恐懼是由外言之以盡於内謹獨是由内言之以及於外問自所睹所聞以至於不睹不聞自發於心以至見於事如此方説得不可須㬰離出曰然胡泳問中庸工夫只在戒謹恐懼與謹獨但二者工夫其頭腦又在道不可離處若能識得全體大用皆具於心則二者工夫不待勉強自然進進不已矣曰便是有箇頭腦如天命之謂性率性之謂道修道之謂教古人因甚冠之章首盖頭腦如此若識得此理則便是勉強亦有箇著落矣又問費隠一章云夫婦之愚可以與知能行及其至也雖聖人有所不知不能先生嘗云此處難㸔近思之頗看得透侯氏説夫子問禮問官與夫子不得位堯舜病博施為不知不能之事說得亦粗止是尋得一二事如此元不曾說著及其至也之意此是聖人看得徹底故於此理亦有未肯自居處如所求乎子以事父未能之類真是聖人有未能處又如説黙而識之學而不厭誨人不倦何有於我哉是聖人不敢自以為知出則事公卿入則事父兄䘮事不敢不勉不為酒困何有於我哉此是聖人不敢自以為能處曰夫婦之與知能行是萬分中有一分聖人不知不能是萬分中欠得一分又問以實事言之亦有可言者但恐非立教之道先生問如何曰夫子謂事君盡禮人以為諂相定公時甚好及其受女樂則不免於行是事君之道猶有未孚於人者又如原壤登木而歌夫子為弗聞也者而過之待之自好及其夷俟則以杖叩脛近於太過曰這裏説得却差如原壤之歌乃是大惡若要理㑹不可但已且只得休至於夷俟之時不可教誨故直責之復叩其脛自當如此若如正淳説則是不要管他却非朋友之道矣人傑共父問喜怒哀樂未發謂之中發而皆中節謂之和曰中字是状性之體性具扵心發而中節則是性自心中發出来也是之謂情時舉以下中和荅徐彦章問中和云喜怒哀樂未發如處室中東西南北未有定向所謂中也及其既發如已出門東者不復能西南者不復能北然各因其事無所乖逆所謂和也升卿問喜怒哀樂之未發不偏不倚固其寂然之本體及其酬酢萬變亦在是焉故曰天下之大本發而皆中節則事得其宜不相淩奪固感而遂通之和也然十中其九一不中節則為不和便自有礙不可謂之達道矣曰然又問於學者如何皆得中節曰學者安得便一一恁地也須且逐件使之中節方得此所以貴於博學審問慎思明辨無一事之不學無一時而不學無一處而不學各求其中節此所以為難也道夫自喜怒哀樂未發謂之中至天地位焉萬物育焉道怎生地這箇心纔有這事便有這箇事影見纔有那事便有那箇事影見這箇本自虚靈常在這裏喜怒哀樂未發謂之中發而皆中節謂之和須恁地方能中節只恁地黒淬淬地在這裏如何要得發必中節賀孫中和亦是承上兩節説閎祖中性之徳和情之徳喜怒哀樂是隂陽發各有中節不中節又是四象㽦喜怒哀樂未發之中未是論聖人只是泛論衆人亦有此與聖人都一般或曰恐衆人未發與聖人異否曰未發只做得未發不然是無大本道理絶了或曰恐衆人於未發昏了否曰這裏未有昏明須是還他做未發若論原頭未發都一般只論聖人動静則全别動亦定静亦定自其未感全是未發之中自其感物而動全是中節之和衆人有未發時只是他不曾主静㸔不曾知得淳問惻隠羞惡喜怒哀樂固是心之發曉然易見處如未惻隠羞惡喜怒哀樂之前便是寂然而静時然豈得皆塊然如槁木其耳目亦必有自然之聞見其手足亦必有自然之舉動不審此時喚作如何㝢録云不知此處是已發未發曰喜怒哀樂未發只是這心未發耳其手足運動自是形體如此淳㝢録云其形體之行動則自若未發之前萬理備具纔渉思即是已發動而應事接物雖萬變不同能省察得皆合於理處盖是吾心本具此理皆是合做底事不容外面旋安排也今説為臣必忠為子必孝之類皆是已發然所以合做此事實具此理乃未發也人傑喜怒哀樂未發謂之中只是思慮未萌無纎毫私欲自然無所偏倚所謂寂然不動此之謂中然不是截然作二截如僧家塊然之謂只是這箇心自有那未發時節自有那已發時節謂如此事未萌於思慮要做時便須是中是體及發於思了如此做而得其當時便是和是用只管夾雜相滚若以為截然有一時是未發時一時是已發時亦不成道理今學者或謂每日將半日來静做工夫即是有此病也曰喜怒哀樂未發而不中者如何曰此却是氣質昏濁為私欲所勝客来為主其未發時只是塊然如頑石相似劈斫不開發来便只是那乖底曰如此則昏時是他不察如何曰言察便是吕氏求中却是已發如伊川云只平日涵養便是又曰㸔来人逐日未發時少已發時多曰然端䝉已發未發只是説心有已發時有未發時方其未有事時便是未發纔有所感便是已發却不要泥著謹獨是從戒謹恐懼處無時無處不用力到此處又須謹獨只是一串事不是兩節炎大本用涵養中節則須窮理之功方問發而皆中節是無時而不戒謹恐懼而然否曰是他合下把捉方能發而中節若信口說去信脚行去如何㑹中節燾問中庸一篇學者求其門而入固在於謹獨至下文言中之已發未發者此正根本處未發之時難以加毫末之功當發之時欲其中節不知若何而用功得非即其所謂戒謹恐懼莫見乎隠之心而乃底于中節否曰謹獨是結上文一節之意下文又自是一節發明中與常行之道欲其中節正當加謹於欲發之際佐問渾然在中恐是喜怒哀樂未發此心至虚都無偏倚停停當當恰在中間章句所謂獨立而不近四傍心之體地之中也曰在中者未動時恰好處時中者已動時恰好處才發時不偏於喜則偏於怒不得謂之在中矣然只要就所偏倚一事處之得恰好則無過不及矣蓋無過不及乃無偏倚者之所為而無偏倚者是所以能無過不及也銖問渾然不待勉強而自中乎當然之節曰事事有箇恰好處因言滎陽王哀樂過人以其哀時直是哀纔過而樂亦直是樂情性之變如此之易不恒其徳故也燾問未發之中寂然不動如何見得是中曰已發之中即時中也中節之謂也却易見未發更如何分别某舊有一説謂已發之中是已施去者未發是方来不窮者意思大故猛要之却是伊川説未發是在中之義最好大雅問伊川言未發之中是在中之義如何曰是言在裏面底道理非以在中釋中字問伊川又云只喜怒哀樂未發便是如何說不發曰是言不曾發時徳明伊川言喜怒哀樂之未發謂之中中也者言寂然不動者也故曰天下之大本喜怒哀樂未發無所偏倚此之謂中中性也寂然不動言其體則然也大本則以其無不該徧而萬事萬物之理莫不由是出焉發而皆中節謂之和和也者言感而遂通者也故曰天下之達道喜怒哀樂之發無所乖戾此之謂和和情也感而遂通言其事則然也達道則以其自然流行而理之由是而出者無不通焉先生後来説達道意不如此端䝉喜怒哀樂未發程子敬而無失之説甚好閎祖喜怒哀樂未發謂之中程子云敬不可謂之中敬而無失即所以中也未説到義理涵養處大抵未發已發只是一項工夫未發固要存飬已發亦要省察遇事時時復提起不可自怠生放過底心無時不存養無事不省察人傑因論吕與叔説中字大本差了曰他底固不是自家亦要見得他不是處文蔚曰喜怒哀樂未發之中乃在中之義他引虞書允執厥中之中是不知無過不及之中與在中之義本自不同又以為赤子之心又以為心為甚不知中乃喜怒哀樂未發而赤子之心已發心為甚孟子蓋謂心欲審輕重度長短甚於權度他便謂凢言心者便能度輕重長短權度有所不及尤非孟子之意即此便是差了曰如今㸃檢他過處都是自家却自要識中文蔚曰伊川云涵養於喜怒哀樂未發之前則發自中節矣今學者能戒謹恐懼於不睹不聞之中而謹獨於隠微之際則中可得矣曰固是如此亦要識得且如今在此坐卓然端正不側東不側西便是中底氣象然人説中亦只是大綱如此説比之大段不中者亦可謂之中非能極其中如人射箭期於中紅心射在貼上亦可謂中終不若他射中紅心者至如和亦有大綱喚做和者比之大段乖戾者謂之和則可非能極其和且如喜怒合喜三分自家喜了四分合怒三分自家怒了四分便非和矣文蔚問吕氏言中則性也或謂此與性即理也語意似同銖疑不然先生曰公意如何銖曰理者萬事萬物之道理性皆有之而無不具者也故謂性即理則可中者又所以言此理之不偏倚無過不及者故伊川只說狀性之體段曰中是虚字理是實字故中所以狀性之體段銖曰然則謂性中可乎曰此處定有脱誤性中亦説得未盡銖因言或問中此等處尚多略為説破亦好先生曰如何解一一嚼飯與人喫銖吕氏未發之前心體昭昭具在説得亦好徳明録云伊川不破此説淳問吕與叔云未發之前心體昭昭具在已發乃心之用南軒辨昭昭為已發恐太過否曰這辨得亦没意思敬夫太聰明㸔道理不子細伊川所謂凡言心者皆指已發而言吕氏只是辨此一句伊川後来又救前説曰凡言心者皆指已發而言此語固未當心一也有指體而言者寂然不動是也有指用而言者感而遂通是也惟觀其所見如何此語甚圎無病大抵聖賢之言多是略發箇萌芽更在後人推究引而伸觸而長然亦須得聖賢本意不得其意則從那處推得出來問心本是箇動物不審未發之前全是寂然而静還是静中有動意曰不是静中有動意周子謂静無而動有静不是無以其未形而謂之無非因動而後有以其可見而謂之有耳横渠心統性情之説甚善性是静情是動心則兼動静而言或指體或指用隨人所㸔方其静時動之理自在伊川謂當靜時耳無聞目無見然見聞之理在始得及動時又只是這静底淳舉伊川以動之端為天地之心曰動亦不是天地之心只是見天地之心如十月豈得無天地之心天地之心流行只自若元亨利貞元是萌芽初出時亨是長枝葉時利是成遂時貞是結實歸宿處下梢若無這歸宿處便也無這元了惟有這歸宿處元又從此起元了又貞貞了又元萬古只如此循環無窮所謂維天之命於穆不已説已盡了十月萬物收斂寂無蹤跡到一陽動處生物之心始可見曰一陽之復在人言之只是善端萌處否曰以善言之是善端方萌處以徳言之昏迷中有悔悟向善意便是復如睡到忽然醒覺處亦是復底氣象又如人之沉滯道不得行到極處忽少亨達雖未大行已有可行之兆亦是復這道理千變萬化隨所在無不渾淪淳先生問銖曰伊川説善觀者却於已發之時觀之尋常看得此語如何銖曰此語有病若只於已發處觀之恐無未發時存養工夫先生曰楊吕諸公説求之於喜怒哀樂未發之時伊川又説於已發處觀如此則是全無未發時放下底今且四平著地放下要得平帖湛然無一毫思慮及至事物来時隨宜應接當喜則喜當怒則怒當哀樂則哀樂喜怒哀樂過了此心湛然者還與未發時一般方是兩下工夫若只於已發處觀則是已發了又去已發展轉多了一層却是反鑑看来此語只説得聖人之止如君止於仁臣止於敬是就事物上説理却不曾説得未發時心後来伊川亦自以為未當銖曰此須是動静兩下用功而主静為本静而存養方始動而精明曰只為諸公不曾説得静中未發工夫如胡氏兄弟說得已發事太猛了銖曰先生中和舊說已發其義先生因言當時所見次第云云銖龜山説喜怒哀樂未發似求中於喜怒哀樂未發之前方㽦以所論湖南問答呈先生先生曰已發未發不必太泥只是既涵養又省察無時不涵養省察若戒懼不睹不聞便是通貫動静只此便是工夫至於謹獨又是或恐私意有萌處又加緊切若謂已發了更不須省察則亦不可如曾子三省亦是已發後省察今湖南諸説却是未發時安排如何涵養已發時旋安排如何省察必大録云存養省察是通貫乎已發未發功夫未發時固要存飬已發時亦要存養未發時固要省察已發時亦要省察只是要無時不做功夫若謂已發後不當省察不成便都不照管他胡季隨謂譬如射者矢傅弦上放欲求中則其不中也必矣某謂内志正外體直覷梁取親所以可中豈有便閉目放箭之理㽦再論湖南問答曰未發已發只是一件功夫無時不涵養無時不省察耳謂如水長長地流到髙處又略起伏則箇如恐懼戒謹是長長地做到謹獨是又提起一起如水然只是要不輟地做又如騎馬自家常常提掇及至遇險處便加些提控不成謂是大路便更都不管他任他自去之理正淳曰未發時當以理義涵養曰未發時著理義不得纔知有理有義便是已發當此時有理義之原未有理義條件只一箇主宰嚴肅便有涵養功夫伊川曰敬而無失便是然不可謂之中但敬而無失即所以中也正淳又曰平日無涵養者臨事必不能強勉省察曰有涵養者固要省察不曾涵養者亦當省察不可道我無涵養功夫後扵已發處更不管他若於發處能㸃檢亦可知得是與不是今言涵養則曰不先知理義底涵養不得言省察則曰無涵養省察不得二者相捱却成擔閣又曰如涵養熟者固是自然中節便做聖賢於發處亦須審其是非而行涵養不熟底雖未必能中節亦須直要中節可也要知二者可以交相助不可交相待㽦論中五峯與曾書吕書朱中庸説易傳説感物而動不可無動字自是有動有静據伊川言中者寂然不動已分明未發意亦與戒愼恐懼相連然似更提起自言此大本雖庸聖皆同但庸則憒憒聖則湛然某初言此者亦未嘗雜人欲而説庸也如説性之用是情心即是貫動静却不可言性之用在中只言喜怒哀樂未發是在中如言一箇理之本後方就時上事上說過與不及之中吕當初便説在中為此時中所以異也方在中之義大本在此此言包得也至如説亭亭當當直上直下亦有不偏倚氣象方問中庸或問曰若未發時純一無偽又不足以名之此是無形影不可見否曰未發時偽不偽皆不可見不特赤子如此大人亦如此淳曰只是大人有主宰赤子則未有主宰曰然淳問中庸或問説未發時耳目當亦精明而不可亂如平常著衣喫飯是已發是未發曰只心有所主著便是發如著衣喫飯亦有些事了只有所思量要恁地便是已發淳義剛同問或問中坤卦純陰不為無陽之説如何曰雖十月為坤十一月為復然自小雪後其下面一畫便有三十分之一分陽生至冬至方足得一爻成爾故十月謂之陽月盖嫌於無陽也自姤至坤亦然曰然則陽畢竟有盡時矣曰剥盡於上則復生於下其間不容息也廣問喜怒哀樂未發謂之中曰喜怒哀樂如東西南北不倚於一方只是在中間又問和曰只是合當喜合當怒如這事合喜五分自家喜七八分便是過其節喜三四分便是不及其節又問達字舊作感而遂通字看而今見得是古今共由意思曰也是通底意思如喜怒不中節便行不得了而今喜天下以為合當喜怒天下以為合當怒只是這箇道理便是通達意大本達道而今不必説得張皇只將動静看静時這箇便在這裏動時便無不是那底在人工夫却在致中和上又問致字曰而今略略地中和也喚做中和致字是要得十分中十分和又問㸔見工夫先須致中曰這箇也大段著脚手不得若大段著脚手便是已發了子思説戒慎不睹恐懼不聞已自是多了但不得不恁地説要人㑹得只是略略地約住在這裏又問發須中節亦是倚於一偏否曰固是因説周子云中也者和也天下之達道也别人也不敢恁地説君子而時中便是恁地㸔䕫孫以下致中和致中和須兼表裏而言致中欲其無少偏倚而又能守之不失致和則欲其無少差繆而又能無適不然銖致中和所謂致和者謂凡事皆欲中節若致中工夫如何便到其始也不能一一常在十字上立地須有偏過四旁時但久久純熟自别孟子所謂存心養性收其放心操則存此等處乃致中也至於充廣其仁義之心等處乃致和也人傑周樸純仁問致中和字曰致字是只管挨排去之義且如此煖閤人皆以火爐為中亦是須要去火爐中尋箇至中處方是的當又如射箭纔上紅心便道是中亦未是須是射中紅心之中方是如致和之致亦同此義致字工夫極精宻也自修問未發之中是渾淪底發而中節是渾淪底散開致中和注云致者推而至其極致中和想也别無用功夫處只是上戒謹恐懼乎不睹不聞與謹其獨便是致中和底工夫否曰致中和只是無些子偏倚無些子乖戾若大段用倚靠大段有乖戾底固不是有些子倚靠有些子乖戾亦未為是須無些子倚靠無些子乖戾方是致中和至存養是静工夫静時是中以其無過不及無所偏倚也省察是動工夫動時是和才有思為便是動發而中節無所乖戾乃和也其静時思慮未萌知覺不昧乃復所謂見天地之心静中之動也其動時發皆中節止於其則乃艮之不獲其身不見其人動中之静也窮理讀書皆是動中工夫祖道問中有二義不偏不倚在中之義也無過不及隨時取中也無所偏倚則無所用力矣如吕氏之所謂執楊氏之所謂驗所謂體是皆欲致力於不偏不倚之時故先生於或問中辨之最詳然而經文所謂致中和則天地位焉萬物育焉致之一字豈全無所用其力耶曰致者推至其極之謂凡言致字皆此意如大學之致知論語學以致其道是也致其中如射相似有中貼者有中垜者有中紅心之邊暈者皆是未致須是到那中心方始為致致和亦然更無毫釐絲忽不盡如何便不用力得問先生云自戒謹而約之以至於至静之中無所偏倚而其守不失則天地可位所謂約者固異於吕楊所謂執所謂驗所謂體矣莫亦只是不放失之意否曰固是不放失只是要存得問孟子所謂存其心養其性是此意否曰然伊川所謂只平日涵養底便是也枅僴録云問致字之義曰致者推至其極之謂云云問吕氏所謂執楊氏所謂驗所謂體或問辨之已詳延平却云黙坐澄心以驗夫喜怒哀樂未發之時氣象為如何驗字莫亦有吕楊之失否曰它只是要扵平日間知得這箇又不是昏昏地都不管也或問致中和位天地育萬物與喜怒哀樂不相干恐非實理流行處曰公何故如此看文字世間何事不係在喜怒哀樂上如人君喜一人而賞之而千萬人勸怒一人而罰之而千萬人懼以至哀矜鰥寡樂育英材這是萬物育不是以至君臣父子夫婦兄弟朋友長幼相處相接無不是這箇即這喜怒中節處便是實理流行更去那處尋實理流行子蒙問致中和天地位焉萬物育焉只君君臣臣父父子子之分定便是天地位否曰有地不得其平天不得其成時問如此則須專就人主身上説方有此功用曰規模自是如此然人各隨一箇地位去做不道人主致中和士大夫便不致中和學之為王者師問向見南軒上殿文字多是要扶持人主心術曰也要在下人心術是當方可扶持得問今日士風如此何時是太平曰即這身心亦未見有太平之時三公燮理隂陽須是先有箇胷中始得徳明天地位萬物育便是裁成輔相以左右民底工夫若不能致中和則山崩川竭者有矣天地安得而位胎天失所者有矣萬物安得而育升卿元思問致中和天地位萬物育此指在上者而言孔子如何曰孔子已到此地位可學問致中和天地位萬物育此以有位者言如一介之士如何得如此曰若致得一身中和便充塞一身致得一家中和便充塞一家若致得天下中和便充塞天下有此理便有此事有此事便有此理如一日克已復禮天下歸仁如何一日克已於家便得天下以仁歸之為有此理故也賜致中和天地位萬物育便是形和氣和則天地之和應今人不肯恁地説須要説入髙妙處不知這箇極髙妙如何做得到這處漢儒這㡬句本未有病只為説得廹切了他便説做其事即有此應這便致得人不信處佐問静時無一息之不中則陰陽動静各止其所而天地於此乎位矣言隂陽動静何也曰天髙地下萬物散殊各有定所此未有物相感也和則交感而萬物育矣問未能致中和則天地不得而位只是日食星隕地震山崩之𩔖否曰天變見乎上地變動乎下便是天地不位徳明問善惡感通之理亦及其力之所至而止耳彼達而在上者既日有以病之則夫灾異之變又豈窮而在下者所能救也哉如此則前所謂力者是力分之力也曰然又問但能致中和於一身則天下雖亂而吾身之天地萬物不害為安泰且以孔子之事言之如何是天地萬物安泰處曰在聖人之身則天地萬物自然安泰曰此莫是以理言之否曰然一家一國莫不如是廣問或問所謂吾身之天地萬物如何曰尊卑上下之大分即吾身之天地也應變曲折之萬端即吾身之萬物也銖朱子語𩔖卷六十二
