body:
  text: 朱子語類卷一百邵子之書康節學於李挺之請曰願先生微開其端毋竟其說又恐是李學於穆時說此意極好學者當然須是自理㑹出來便好方伊川之學於大體上瑩徹於小小節目上猶有踈處康節能盡得事物之變却於大體上有未瑩處用之云康節善談易一作說易極好見得透徹曰然伊川又輕之嘗有簡與横渠云堯夫說易好聽今夜試來聽它說看某嘗說此便是伊川不及孔子處只觀孔子便不如此僩廣同或言康節心胷如此快活如此廣大如何得似他曰它是甚麽樣做工夫僩問近日學者有厭拘檢樂舒放惡精詳喜簡便者皆欲慕邵堯夫之爲人曰邵子這道理豈易及哉他腹裏有這箇學能包括宇宙終始古今如何不做得大放得下今人却恃箇甚做敢如此因誦其詩云日月星辰高照耀皇王帝伯大鋪舒可謂人豪矣大雅厚之問康節只推到數曰然某問須亦窺見理曰雖窺見理却不介意了可學問康節學到不惑處否曰康節又别是一般聖人知天命以理他只是以術然到得術之精處亦非術之所能盡然其初只是術耳璘邵康節看這人須極會處置事被他神閑氣定不動聲氣須處置得精明他氣質本來清明又養得來純厚又不曾枉用了心他用那心時都在緊要上用被他靜極了看得天下之事理精明嘗於百原深山中闢書齋獨處其中王勝之常乘月訪之必見其燈下正襟危坐雖夜深亦如之若不是養得至靜之極如何見得道理如此精明只是他做得出來須差異季通常云康節若做定是四公八辟十六侯三十二卿六十四大夫都是加倍法想得是如此想見他看見天下之事才上手來便成四截了其先後緩急莫不有定動中機㑹事到面前便處置得下矣康節甚喜張子房以爲子房善藏其用以老子爲得易之體以孟子爲得易之用合二者而用之想見善處事問不知真箇用時如何曰先時說了須差異須有些機權術數也僩直卿問康節詩嘗有莊老之說如何曰便是他有些子這箇曰如此莫於道體有異否曰他嘗說老子得易之體孟子得易之用體用自分作兩截曰他又說經綸如何曰看他只是以術去處得這事恰好無過如張子房相似他所以極口稱賛子房也二程謂其粹而不雜以今觀之亦不可謂不雜曰他說風花雪月莫是曾㸃意思否曰也是見得眼前這箇好璘錄云舜功云堯夫似曾㸃曰他又有許多骨董曰意其有與自家意思一般之意曰也是它有這些子若不是却淺陋了道夫問程子謂康節空中樓閣曰是四通八達方子錄云言看得四通八達莊子比康節亦髣髴相似然莊子見較高氣較豪他是事事識得了又却蹴踏著以爲不足爲康節畧有規矩然其詩云賔朋莫怪無拘檢真樂攻心不奈何不知是何物攻他心佐康節之學近似釋氏但却又挨傍消息盈虛者言之問擊壤序中以道觀道等語是物各付物之意否曰然蓋自家都不犯手之意道是指隂陽運行者言之又問如此則性與心身都不相管攝亡者自亡存者自存否曰某固言其與佛學相近者此也又曰康節凡事只到半中央便止如看花切勿看離披是也如此則與張子房之學相近曰固是康節自有兩三詩稱贊子房曰然則與楊氏爲我之意何異先生笑而不言必大因論康節之學曰似老子只是自要尋箇寛閒快活處人皆害它不得後來張子房亦是如此方衆人紛拏擾擾時它自在背處人傑因問擊壤集序有以道觀性以性觀心以心觀身以身觀物治則治矣猶未離乎害也上四句自說得好却云未離乎害其下云不若以道觀道以性觀性以心觀心以身觀身以物觀物雖欲相傷其可得乎若然則以家觀家以國觀國以天下觀天下亦從而可知也恐如上四句似合聖人之中道以道觀道而下皆付之自然未免有差否曰公且說前四句曰性只是仁義禮智乃是道也心則統乎性身則主乎心此三句可解至於物則身之所資以爲用者也曰此非康節之意既不得其意如何議論它人傑因請教先生曰以道觀性者道是自然底道理性則有剛柔善惡參差不齊處是道不能以該盡此性也性有仁義禮智之善心却千思萬慮出入無時是性不能以該盡此心也心欲如此而身却不能如此是心有不能撿其身處以一身而觀物亦有不能盡其情状變態處此則未離乎害之意也且以一事言之若好人之所好惡人之所惡是以物觀物之意若以已之好惡律人則是以身觀物者也又問如此則康節以道觀道等說果爲無病否曰謂之無病不可謂之有病亦不可若使孔孟言之必不肯如此說渠自是一様意思如以天下觀天下其說出於老子又問如此則以道觀性以性觀心以心觀身三句義理有可通者但以身觀物一句爲不可通耳曰若論萬物皆備於我則以身觀物亦何不可之有人傑康節本是要出來有爲底人然又不肯深犯手做凡事直待可做處方試爲之纔覺難便拽身退正張子房之流必大問堯夫之學似揚雄如何曰以數言可學某看康節易了都看别人底不得他說太極生兩儀兩儀生四象又都無𤣥妙只是從來更無人識揚子太𤣥一𤣥三方九州二十七部八十一家亦只是這箇他却識只是他以三爲數皆無用了他也只是見得一箇麄底道理後來便都無人識老氏道生一一生二二生三亦剰說了一箇道便如太極生陽陽生隂至二生三又更都無道理後來五峯又說一箇云云便是太極函三爲一意思賀孫康節之學似揚子雲太元擬易方州部家皆自三數推之元爲之首一以生三爲三方三生九爲九州九生二十七爲二十七部九九乗之斯爲八十一家首之以八十一所以準六十四卦贊之以七百二十有九所以凖三百八十四爻無非以三數推之康節之數則是加倍之法謨康節其初想只是看得太極生兩儀兩儀生四象心只管在那上面轉久之理透想得一舉眼便成四片其法四之外又有四焉凡物才過到二之半時便煩惱了蓋已漸趨於衰也謂如見花方蓓蕾則知其將盛既開則知其將衰其理不過如此謂如今日戌時從此推上去至未有天地之始從此推下去至人消物盡之時蓋理在數内數又在理内康節是他見得一箇盛衰消長之理故能知之若只說他知得甚事如歐陽叔弼定諡之類此知康節之淺陋者也程先生有一柬說先天圖甚有理可試往聽他就看觀其意甚不把當事然自有易以來只有康節說一箇物事如此齊整如揚子雲太𤣥便令星補湊得可笑若不補又却欠四分之一補得來又却多四分之三如潜虛之數用五只似如今算位一般其直一畫則五也下横一畫則爲六横二畫則爲七蓋亦補湊之書也方子或問康節數學曰且未須理㑹數自是有此理有生便有死有盛必有衰且如一朶花含蘂時是將開畧放時是正盛爛熳時是衰謝又如看人即其氣之盛衰便可以知其生死蓋其學本於明理故明道謂其觀天地之運化然後頽乎其順浩然其歸若曰渠能知未來事則與世間占覆之術何異其去道遠矣其知康節者末矣蓋他玩得此理熟了事物到面前便見便不待思量又云康節以四起數疊疊推去自易以後無人做得一物如此整齊包括得盡想他每見一物便成四片了但才到二分以上便怕乾卦方終便知有箇姤卦來蓋縁他於起處推將來至交接處看得分曉廣云先生前日說康節之學與周子程子少異處莫正在此否若是聖人則處乾時自有箇處乾底道理處姤時自有箇處姤底道理否曰然廣問先生說邵堯夫看天下物皆成四片如此則聖人看天下物皆成兩片也曰也是如此只是隂陽而已廣論皇極經世乃一元統十二㑹十二㑹統三十運三十運統十二世一世統三十年一年統十二月一月統三十日一日統十二辰是十二與三十迭爲用也因云季通以十二萬九千六百之數爲日分植堯至今方三千年邵厯一萬年爲一㑹揚易是卜筮之書皇極經世是推歩之書經世以十二辟卦管十二㑹綳定時節却就中推吉凶消長堯時正是乾卦九五其書與易自不相干只是加一倍推將去方子􅀢問易與經世書同異曰易是卜筮經世是推歩是一分爲二二分爲四四分爲八八分爲十六十六分爲三十二又從裏面細推去節叔器問經世書水火土石石只是金否曰它分天地閒物事皆是四如日月星辰水火土石雨風露雷皆是相配又問金生水如石中出水是否曰金是堅凝之物到這裏堅實後自拶得水出來又問伯温解經世書如何曰他也只是說將去那裏面曲折精微也未必曉得康節當時只說與王某不曾說與伯温模様也知得那伯温不是好人義剛因論皇極經世曰堯夫以數推亦是心靜知之如董五經之類皆然曰程先生云須是用時知之曰用則推測因舉興化妙應知未來之事曰如此又有術可學皇極經世紀年甚有法史家多言秦廢太后逐穰侯經世書只言秦奪宣太后權伯恭極取之蓋實不曾廢方子康節漁樵問對無名公序與一兩篇書次第將來刋成一集節天何依曰依乎地地何附曰附乎天天地何所依附曰自相依附天依形地依氣所以重複而言不出此意者唯恐人於天地之外别尋去處故也天地無外所謂其形有涯而其氣無涯也爲其氣極緊故能扛得地住不然則墜矣氣外須有軀殻甚厚所以固此氣也今之地動只是一處動動亦不至遠也謨舜弼問天依地地依氣曰恐人道下面有物天行急地閣在中可學古今厯家只是推得箇隂陽消長界分爾如何得似康節說得那天依地地附天天地自相依附天依形地附氣底幾句向嘗以此數語附于通書之後欽夫見之殊不以爲然曰恐說得未是某云如此則試别說幾句來看廣云伊川謂自古言數者至康節方說到理上曰是如此如揚子雲亦畧見到理上只是不似康節精廣問康節云雨化物之走風化物之飛露化物之草雷化物之木此說是否曰想且是以大小推排匹配去問伊川云露是金之氣曰露自是有清肅底氣象古語云露結爲霜今觀之誠然伊川云不然不知何故蓋露與霜之氣不同露能滋物霜能殺物也又雪霜亦有異霜則殺物雪不能殺物也雨與露亦不同雨氣昬露氣清氣蒸而爲露如飯甑蓋之其氣蒸鬰而汗下淋漓氣蒸而爲霧如飯甑不蓋其氣散而不收霧與露亦微有異露氣肅而霧氣昬也僩或問康節云道爲太極又云心爲太極道指天地萬物自然之理而言心指人得是理以爲一身之主而言曰固是但太極只是箇一而無對者康節云一動一靜者天地之妙也一動一靜之間者天地人之妙也蓋天只是動地只是靜到得人便兼動靜是妙於天地處故曰人者天地之心論人之形雖只是器言其運用處却是道理㽦人身是形耳所具道理皆是形而上者蓋人者天地之心也康節所謂一動一靜之間天地人之至妙者歟人傑無極之前隂含陽也有象之後陽分隂也陽占却隂分數文蔚性者道之形體心者性之郛郭身者心之區宇物者身之舟車此語雖說得麄畢竟大槩好文蔚先生問性如何是道之形體淳曰道是性中之理先生曰道是泛言性是就自家身上說道在事物之間如何見得只就這裏驗之砥錄作反身而求性之所在則道之所在也道是在物之理性是在已之理然物之理都在我此理之中道之骨子便是性劉問性物我皆有恐不可分在已在物否曰道雖無所不在須是就已驗之而後見如父子有親君臣有義若不就已驗之如何知得是本有天叙有典典是天底自我驗之方知得五典五惇天秩有禮禮是天底自我驗之方知得五禮有庸淳問心是郛郭便包了性否先生首肯曰是也如横渠心統性情一句乃不易之論孟子說心許多皆未有似此語端的子細看便見其他諸子等書皆無依稀似此淳㝢同砥同正卿問邵子所謂道之形體如何曰諸先生說這道理却不似邵子說得最著實這箇道理纔說出只是虛空更無形影惟是說性者道之形體却見得實有不須談空說遠只反諸吾身求之是實有這箇道理還是無這箇道理故嘗爲之說曰欲知此道之實有者當求之吾性分之内邵子忽地於擊壤集序自說出幾句最說得好賀孫孫或問性者道之形體如何曰天之付與其理本不可見其緫要却在此蓋人得之於天理元無欠闕只是其理却無形象不於性上體認如何知得程子曰其體謂之道其用謂之神而其理屬之人則謂之性其體屬之人則謂之心其用屬之人則謂之情祖道道問性何以謂道之形體曰若只恁說道則𣺌茫無據如父子之仁君臣之義自是有箇模樣所以爲形體也謨性者道之形體此語甚好道只是懸空說統而言之謂道節性者道之形體今人只泛泛說得道不曾見得性椿性者道之形體性自是體道是行出見於用處才卿問性者道之形體曰道是發用處見於行者方謂之道性是那道骨子性是體道是用如云率性之謂道亦此意僩性者道之形體心者性之郛郭康節這數句極好蓋道即理也如父子有親君臣有義是也然非性何以見理之所在故曰性者道之形體仁義禮智性也理也而具此性者心也故曰心者性之郛郭砥器之問中庸首三句先生因舉性者道之形體之語器之云若說道者性之形體却分曉曰恁地看倒了蓋道者事物常行之路皆出於性則性是道之原本木之曰莫是性者道之體道者性之用否曰模樣是如此木之方賔王以書問云心者性之郛郭當是言存主統攝處可學謂郛郭是包括心具此理如郛郭中之有人曰方說句慢問以窮理爲用心於外是誰說曰是江西說又問發見說話未是如此則全頼此些時節如何倚靠曰湖南皆如此說曰孟子告齊王乃是欲因而成就之若只執此便不是曰然又問榖種之必生如人之必仁如此却是以生譬仁榖種之生乃生之理乃得此生理以爲仁曰必當爲有又解南軒發是心體無時而不發云及其既發則當事而存而爲之宰者也某謂心豈待發而爲之宰曰此一叚强解南軒說多差可學或問康節云能物物則吾爲物中之人伊川曰不必如此說人自是人物自是物伊川說得終是平先生曰自家但做箇好人不怕物不做物或誦康節詩云若論先天一事無後天方要著工夫先生問如何是一事無曰出於自然不用安排先生黙然廣云一事無處是太極先生曰嘗謂太極是箇藏頭底物事重重推將去更無盡期有時看得來頭痛廣云先生所謂迎之而不見其首隨之而不見其後是也廣邵子天地定位否泰反類一詩正是發明先天方圖之義先天圖傳自希夷希夷又自有所傳蓋方士技術用以修煉參同契所言是也方子何巨源以書問邵子詩須探月窟方知物未躡天根豈識人又先生贊邵子手探月窟足躡天根莫只是隂陽否先生答之云先天圖自復至乾陽也自姤至坤隂也陽主人隂主物手探足躡亦無甚意義但姤在上復在下上故言手探下故言足躡廣問康節云天根月窟閑來往三十六宫都是春蓋云天理流行而已常周旋乎其間天根月窟是箇緫㑹處如大明終始時乗六龍之意否曰是廣三十六宫都是春易中二十八卦翻䨱成五十六卦唯有乾坤坎離大過頥小過中孚八卦反覆只是本卦以二十八卦湊此八卦故言三十六也㝢康節詩儘好看道夫問舊無垢引心贊云廓然心境大無倫盡此規模有幾人我性即天天即性莫於微處起經綸不知如何曰是殆非康節之詩也林少頴云朱内翰作次第是子發也問何以辨曰若是真實見得必不恁地張皇道夫曰舊看此意似與性爲萬物之一原而心不可以爲限量同曰固是但只是摸空說無著實處如康節云天向一中分造化人從心上起經綸多少平易實見得者自别又問一中分造化曰本是一箇而消息盈虛便生隂陽事事物物皆恁地有消便有息有盈便有虛有箇面便有箇背曰這便是自然非人力之所能爲者曰這便是生兩儀之理道夫賀孫錄云廓然心境大無倫此四句詩正如貧子說金學佛者之論也康節煞有好說話近思錄不曾取入近看文鑑編康節詩不知怎生天向一中分造化人於心上起經綸底詩却不編入義剛康節以品題風月自負然寔强似皇極經世書方季通語康節之學其骨髓在皇極經世其花草便是詩直卿云其詩多說閑靜樂底意思太煞把做事了曰這箇未說聖人只顔子之樂亦不恁地看他詩篇篇只管說樂次第樂得來厭了聖人得底如喫飯相似只飽而已他却如喫酒又曰他都是有箇自私自利底意思所以明道有要之不可以治天下國家之說道夫邵堯夫詩雪月風花未品題此言事物皆有造化可學邵堯夫六十歲作首尾吟百三十餘篇至六七年間終渠詩玩侮一世只是一箇四時行焉百物生焉之意璘先生誦康節詩曰施爲欲似千鈞弩磨礪當如百鍊金或問千鈞弩如何曰只是不妄發如子房之在漢謾說一句當時承當者便須百碎道夫康節詩云幽暗巖崖生鬼魅清平郊野見鸞凰聖人道其常也只是就那光明處理㑹說與人那幽暗處知得有多少怪異僩康節曰思慮未起鬼神莫知不由乎我更由乎誰此閒有術者人來問事心下黙念則他說相應有人故意思别事不念及此則其說便不應問姓幾畫口中黙數則他說便著不數者說不著義剛因論學者輕俊者不美朴厚者好因說章惇邢恕當時要學數於康節康節見得他破不肯與之明道亦識得邢語錄中可見凢先生長者惜才不肯大段說破萬一其有回意揚因問當時邵傳與章邢使其知前程事時須不至如此之甚曰不可如此說後又問云使章邢先知之他更是放手做是虎而翼者也又因說康節當時只是窮得天地盈虚消息之理因以明得此數要之天地之理却自是當知數亦何必知之伊川謂雷自起處起何必推知其所起處惟有孟子見得曰莫非命也順受其正但有今日都不須問前面事但自盡明日死也不可知更二三十年在世也不可知只自修何必預知之楊康節謂章子厚曰以君之才於吾之學頃刻可盡但須相從放下一二十年使塵慮銷散胷中豁無一事乃可相授驤康節數學源流於陳希夷康節天資極高其學只是術數學後人有聰明能算亦可以推建陽舊有一村僧宗元一日走上徑山住得七八十日悟禪而歸其人聰敏能算法看經世書皆畧畧領㑹得揚朱子語類卷一百
