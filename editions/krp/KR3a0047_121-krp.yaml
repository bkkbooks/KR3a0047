body:
  text: 朱子語類卷一百二十一朱子十八訓門人九總訓門人而無名字者為此卷朋友乍見先生者先生每曰若要來此先看熹所觧書也過世昌問先生教人有何宗㫖曰某無宗㫖尋常只是教學者随分讀書文蔚讀書須是成誦方精熟今所以記不得説不去心下若存若亡皆是不精不熟之患若曉得義理又皆記得固是好若曉文義不得只背得少間不知不覺自然相觸發曉得這義理盖這一段文義横在心下自是放不得必曉而後已若曉不得又記不得更不消讀書矣横渠説讀書須是成誦今人所以不如古人處只争這些子古人記得故曉得今人鹵莾記不得故曉不得𦂳要處慢處皆須成誦自然曉得也今學者若已曉得大義但有一兩處阻礙説不去某這裏畧些数句發動自然曉得今諸公盡不曾曉得縱某多言何益無他只要熟看熟讀而已别無方法也卓僴畧一學者患記文字不起先生曰只是不熟不曾玩味入心但守得册子上言語所以見册子時記得纔放下便忘了若使自家實得他那意思如何㑹忘譬如人將一塊生薑來須知道是辣若將一塊砂糖來便不信是辣端䝉謂一士友日向嘗收書云讀書不用精熟又云不要思惟讀書正要精熟而言不用精熟學問正要思惟而言不可思惟只為此兩句在胷中做病根正如人食冷物留於脾胃之間十数年為害所以與吾友相别十年只如此者病根不除也蓋卿嘗見老蘓説他讀書孟子論語韓子及其他聖人之文兀然端坐終日以讀者十八年方其始也入其中而惶然博觀於其外而駭然以驚及其久也讀之益精而其胸中豁然以明若人之言固當然者猶未敢自出其言也時既乆胸中之言日益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣又韓退之荅李翊栁子厚荅韋中立書言讀書用功之法亦可見某嘗歎息以為此数人者但求文字言語聲響之工用了許多功夫費了許多精力甚可惜也今欲理㑹這箇道理是天下第一至大至難之事乃不曾用得旬月工夫熟讀得一卷書只是泛然發問臨時湊合元不曾記得本文及至問著元不曾記得一段首尾其能言者不過敷演已説與聖人言語初不相干是濟甚事今請歸家正襟危坐取大學論語中庸孟子逐句逐字分曉精切求聖賢之意切已體察著已踐履虚心體究如是兩三年然後方去尋師證其是非方有可商量有可議論方是就有道而正焉者入道之門是將自家身已入那道理中去漸漸相親乆之與已為一而今人道理在這裏自家身在外面全不曾相干渉因言及釋氏而曰釋子之心却有用處若是好叢林得一好長老他直是朝夕汲汲不捨所以無有不得之理今公等學道此心安得似他是此心元不曾有所用逐日流蕩放逐如無家之人思量一件道理不透便颺去聲棹放一壁不能管得三日五日不知拈起每日只是悠悠度日説閒話逐物而已敢説公等無一日心在此上莫説一日一時也無莫説一時頃刻也無悠悠漾漾似做不做從生至死忽然無得而已今朋友有謹飭不妄作者亦是他資禀自如此然其心亦無所用只是閒慢過日或云須是汲汲曰公只㑹説汲汲元不曾汲汲若是汲汲用功底人自别他那得工夫説閒話精專懇切無一時一息不在裏許思量一件道理直是思量得徹底透熟無一毫不盡今公等思量這一件道理思量到半間不界便掉了少間又㸔那一件那件㸔不得又掉了又㸔那一件如此沒世不濟事若真箇㸔得這一件道理透入得這箇門路以之推他道理也只一般只是公等不曾通得這箇門路每日只是在門外走所以都無入頭處都不濟事又曰若是大處入不得便從小處入東邊入不得便從西邊入及至入得了觸處皆是此理今公等千頭萬緒不曾理㑹得一箇透徹所以東觧西摸便無一箇入頭處又曰學道做工夫須是奮厲警發悵然如有所失不尋得則不休如自家有一大光明寳藏被人偷將去此心還肯放捨否定是去追捕尋捉得了方休做工夫亦須如此僴諸公來聼説話某所説亦不出聖賢之言然徒聼之亦不濟事須是便去下工夫始得近覺得學者所以不成頭項者只縁聖賢説得多了既欲為此又欲為彼如夜來説敬以直内義以方外若實下工夫見得真箇是敬立則内直義形而外方這終身可以受用今人却似見得這兩句好又見説克己復禮也好又見説出門如見大賔也好空多了少間却不把捉得一項周全賀孫今學者看文字不必自立説只記得前賢與諸家説便得而今看自家如何説終是不如前賢須盡記得諸家説方有箇襯簟處這義理根脚方牢這心也有殺泊處心路只在這上走久久自然曉得透熟今公軰看文字大槩都有箇生之病所以説得來不透徹只是去巴攬包籠他元無實見處某舊時看文字極難諸家説盡用記且如毛詩那時未似如今説得如此條暢古今諸家説盖用記取閒時將起思量這一家説得那字是那字不是那一家説得那字不是那字是那家説得全是那家説得全非所以是者是如何所以非者是如何只管思量少間這正當道理自然光明燦爛在心目間如指諸掌今公們只是紐揑巴攬來説都記得不熟所以這道理收拾他不住自家也使他不動他也不服自家使相聚得一朝半日又散去了只是不熟這箇道理古時聖賢也如此説今人也如此説説得大槩一般然今人説終是不似所争者只是熟與不熟耳縱使説得十分全似猶不似在何况和那十分似底也不曾看得出敬子云而今每日只是優㳺和緩分外看得㡬遍分外讀得㡬遍意思便覺得不同曰而今使未得優㳺和緩須是苦心竭力下工夫方得那箇優㳺和緩須是做得八分九分成了方使得優㳺和緩而今便説優㳺和緩只是泛泛而已矣這箇做工夫須是放大火中鍛煉鍛教他通紅溶成汁瀉成鋌方得今只是畧畧火面上熁得透全然生硬不屬自家使在濟得甚事須是縱横舒卷皆由自家使得方好搦成圑捺成匾放得去收得來方可某嘗思今之學者所以多不得力不濟事者只是不熟平生也費許多工夫看文字下梢頭都不得力者正縁不熟耳只縁一箇不熟少間無一件事理㑹得精吕居仁記老蘓説平生因聞升裏轉斗裏量之語遂悟作文章妙處這箇須是爛泥醬熟縱横妙用皆由自家方濟得事也僴某煞有話要與諸公説只是覺次序未到而今只是面前小小文義尚如此理㑹不透如何説得到其他事這箇事須是四方上下小大本末一齊貫穿在這裏一齊理㑹過其操存踐履處固是𦂳要不可間斷至於道理之大原固要理㑹纎悉委曲處也要理㑹制度文為處也要理㑹古今治亂處也要理會精粗大小無不當理㑹四邊一齊合起功夫無些鏬漏東邊見不得西邊須見得這下見不得那下須見得既見得一處則其他處亦可類推而今只從一處去攻擊他又不曾着力濟得甚事如坐定一箇地頭而他攴脚也須分布擺陣如大軍厮殺相似大軍在此坐以鎮之㳺軍依舊去别處邀截須如此作功夫方得而今都只是悠悠礙定這一路畧畧拂過今日走來挨一挨又退去明日亦是如此都不曾抓着那痒處何况更望搯着痛處所以五年十年只是恁地全不見長進這箇須是勇猛奮厲直前不顧去做四方上下一齊著到方有箇入頭孔子曰仁逺乎哉我欲仁斯仁至矣這箇全要人自去做孟子所謂奕秋只是争這些子一箇進前要做一箇不把當事某八九嵗時讀孟子到此未嘗不慨然奮發以為為學須如此做功夫當初便有這箇意思如此只是未知得那碁是如何著是如何做功夫自後更不肯休一向要去做功夫今學者不見有奮發底意思只是如此悠悠地過今日見他是如此明日見他亦是如此因建陽士人來請問先生曰公們如此做工夫大故費日子覺得今年只是去年前日只是今日都無昌大發越底意思這物事須教㸔得精透後一日千里始得而今都只泛泛在那皮毛上理㑹都不曾抓着那痒處濟得甚事做工夫一似穿井相似穿到水處自然流出來不住而今都乾燥只是心不在不曾着心如何説道出去一日便不曾做得工夫某常説正是出去路上好做工夫且如出十里外既無家事吵又無應接人客正好提撕思量道理所以學貴時習到時習自然説也如今不敢説時習須㸔得見那物事方能時習如今都㸔不見只是不曾入心所以在窓下㸔才起去便都忘了須是心心念念在上便記不得細注字也須時時提起經正文在心也争事而今都只在那皮毛上理㑹盡不曾抓着痒處若㸔得那物事熟時少間自轉動不得自家脚才動自然踏着那物事行又云須是得這道理入心不忘了然後時時以義理澆灌之而今這種子只在地面上不曾入地裏去都不曾與土氣相接著學者悠悠是大病今覺諸公都是進寸退尺每日理㑹些小文義都輕輕地拂過不曾動得皮毛上這箇道理規模大體靣闊須是四靣去包括方無走處今只從一靣去又不曾着力如何可得且如曾㸃漆雕開兩處漆雕開事言語少難理㑹曾㸃底須子細㸔他是樂箇甚底是如何地樂不只是聖人説這箇事可樂便信着他原是自見得箇可樂底依人口説不得又曰而今持守便打疊教浄潔㸔文字須著意思索應接事物都要是當四靣去討他自有一靣通處又曰如見陳厮殺擂着皷只是向前去有死無二莫更回頭始得胡泳或言在家滚滚但不敢忘書冊亦覺未免間斷曰只是無志若説家事又如何汩沒得自家如今有稍髙底人也須㑹擺脱得過山間坐一年半嵗是做得多少工夫只恁地也立得箇根脚若時徃應事亦無害較之一向在事務裏滚是争那裏去公今三五年不相見又只恁地悠悠人生有㡬箇三五年耶賀孫或有來省先生者曰别後讀何書曰雖不敢廢學然家間事亦多難得全功曰覺得公今未有箇地頭在光隂可惜不知不覺便是三五年如今又去赴官官所事尤多益難得餘力人生能得㡬箇三五年須是自强若㝷得箇僻静寺院做一兩年工夫須尋得箇地頭可以自上做將去若似此悠悠如何得進廣某見今之學者皆似箇無所作為無圖底人相似人之為學當如救火追亡猶恐不及如自家有箇光明寳藏被人奪去尋求趕捉必要取得始得今學者只是悠悠地無所用心所以兩年三年五年七年相别及再相見只是如此僴謂諸生曰公皆如此悠悠終不濟事今朋友着力理㑹文字一日有一日工夫然尚恐其理㑹得零碎不見得周匝若如諸公悠悠是要如何光隂易過一日減一日一嵗無一嵗只見老大忽然死着思量來這是甚則劇恁地悠悠過了賀孫某平日於諸友㸔文字相待甚寛且只令自㸔前日因病覺得無多時月於是大懼若諸友都只恁悠悠終於無益只要得大家盡心㸔得這道理教分明透徹所謂道理也只是將聖賢言語體認本意得其本意則所言者便只此道理一一理㑹令十分透徹無些鏬縫蔽塞方始住每思以前諸先生盡心盡力理㑹許多道理當時亦各各親近師承今㸔來各人自是一説本来諸先生之意初不体認得只各人挑載得些去自做一家説話本不曾得諸先生之心某今惟要諸公㸔得道理分明透徹無些小蔽塞某之心即諸公之心諸公之心即某之心都只是這箇心如何有人説到這地頭又如何有人説不得這地頭這是因甚恁地這須是自家大段欠處賀孫先生痛言諸生工夫悠悠云今人做一件事沒𦂳要底事也着心去做方始㑹成如何悠悠㑹做得事且如好寫字底人念念在此則所見之物無非是寫字底道理又如賈島學作詩只思推敲兩字在驢上坐把手作推敲勢大尹出有許多車馬人從渠更不見不覺犯了節只此推敲二字計甚利害他直得恁地用力所以後來做得詩來極是精髙今吾人學問是大小大事却全悠悠若存若亡更不着𦂳用力反不如他人做沒要𦂳底事可謂倒置諸公切宜勉之時舉諸友只有箇學之意都散漫不恁地勇猛空度了日子須著火急痛切意思嚴了期限䟎了工夫辦㡬箇月日氣力去攻破一過便就裏靣旋旋涵飬如攻寨須出萬死一生之計攻破了關限始得而今都打寨未破只循寨外走道理都咬不斷何時得透淳謂諸生曰公説欲遷善改過而不能只是公不自去做工夫若恁地安安排排只是做不成如人要赴水火這心才發便入裏面去若説道在這裏安排便只不成㸔公來此逐日只是相對黙坐無言恁地慢滕滕如何做事數日後復云坐中諸公有㑹做工夫底有病痛底某一一都㸔見逐一救正他惟公恁地循循黙黙都理㑹公心下不得這是幽冥暗弱這是大病若是剛勇底人見得善别還他做得透做不是處也顯然在人耳目人皆見之前日公説風雷益㸔公也無些子風意思也無些子雷意思賀孫某於相法却愛苦硬清癯底人然須是做得那苦硬底事若只要苦硬亦不知為學何貴之有而今朋友逺處來者或有意於為學眼前朋友大率只是㨿見定了更不求進歩而今莫説更做甚工夫只真箇㸔得百十字精細底也不見有或曰今之朋友大率多為作時文妨了工夫曰也不曾見做得好底時文只是剽竊亂道之文而已若要真箇做時文底也須深資廣取以自輔益以之為時文莫更好只是讀得那亂道底時文求合那亂道底試官為苟簡滅裂底工夫他亦不曾子細讀那好底時文和時文也有時不子細讀得某記少年應舉時嘗下視那試官説他如何曉得我底意思今人盡要去求合試官越做得那物事低了嘗見已前相識間做賦者甚麽様讀書無書不讀而今只念那亂道底賦有甚見識若見識稍髙讀書稍多議論髙人豈不更做得好文字出他見得底只是如此遂互相倣傚專為苟簡滅裂底工夫歎息者乆之僴㸔來如今學者之病多是箇好名且如讀書却不去子細考䆒義理教極分明只是纔㸔過便了只道自家已㸔得甚麽文字了都不思量於身上濟得甚事這箇只是做名聲其實又做得甚麽名聲下梢只得人説他已㸔得甚文字了這箇非獨卓丈如此㸔來都如此若恁地也是枉了一生賀孫今學者大抵不曾子細玩味得聖賢言意却要懸空妄立議論一似喫物事相似肚裏其實未曾飽却以手鼓腹向人説我已飽了只此乃是未飽若真箇飽者却未必説也人人好做甚銘做甚賛於已分上其實何益既不曾實讀得書玩味得聖賢言意則今日所説者是這箇話明日又只是這箇話豈得有新見邪切宜戒之時舉今朋友之不進者皆有彼善於此為足矣之心而無求為聖賢之志故皆有自恕之心而不能痛去其病故其病常随在依舊逐事物流轉將求其彼善於此亦不可得矣大雅昌父言學者工夫多間斷曰聖賢教人只是要救一箇間斷文蔚因説學者工夫間斷謂古山和尚自言喫古山飯阿古山矢只是㸔得一頭白水牯今之學者却不如他文蔚有一等朋友始初甚鋭意漸漸踈散終至於忘了如此是當初不立界分做去士毅今來朋友相聚都未見得大底道理還且謾恁地逐段㸔還要直截盡理會許多道理教身上沒些子虧欠若只恁地逐段㸔不理㑹大底道理依前不濟事這大底道理如曠闊底基址須是開墾得這箇些方始架造安排有頓放處見得大底道理方有立脚安頓處若不見得大底道理如人無箇居著趂得百十錢歸來也無頓放處况得明珠至寳安頓在那裏自家一身都是許多道理人人有許多道理蓋自天降𠂻萬理皆具仁義禮智君臣父子兄弟朋友夫婦自家一身都擔在這裏須是理㑹了體認教一一周足畧欠缺些子不得須要緩心直要理㑹教盡須是大作規模闊開其基廣闢其地少間到逐處即㸔逐處都有頓放處日用之間只在這許多道理裏面轉喫飯也在上面上床也在上面下床也在上面脱衣服也在上面更無些子空闕處堯舜禹湯也只是這道理如人刺繡花草不要看他繡得好須㸔他下針處如人寫字好不要看他寫得好只看他把筆處賀孫先生問諸公莫更有甚商量坐中有云此中諸公學問皆溺於髙逺無根近來方得先生發明未遽有問將來有所疑却寫去問先生曰却是以待來年然後已説話此只是不曾切已立志若果切已立志睡也不著起來理㑹所以發憤忘食終日不食終夜不寢去理㑹今人有兩般見識一般只是談虚説妙全不切已把做一塲説話了又有一般人説此事難理㑹只恁地做人自得譲與他們自理㑹如人交易情願批退帳待别人典買今人情願批退學問底多謙諸公數日㸔文字但就文字上理㑹不曾切已凡㸔文字非是要理㑹文字正要理㑹自家性分上事學者須要主一主一當要心存在這裏方可做工夫如人須㝷箇屋子住至於為農工商賈方惟其所之主者無箇屋子如小人趂得百錢亦無歸宿孟子説求其放心已是兩截如常知得心在這裏則心自不放又云無事時須要知得此心不知此心恰似縣困都不濟事今㸔文字又理㑹理義不出亦只緣主一工夫欠闕梳時舉同先生一日謂諸生曰某患學者讀書不求經㫖談説空妙故欲令先通曉文義就文求意下稍頭往往又只守定册子上言語却㸔得不切已須是將切已㸔玩味入心力去行之方有所益端䝉學者説文字或支離泛濫先生曰㸔教切已文蔚學者講學多是不疑其所當疑而疑其所不當疑不疑其所當疑故眼前合理㑹處多蹉過疑其所不當疑故枉費了工夫金溪之徒不事講學只將箇心來作㺯胡撞亂撞此間所以令學者入細觀書做工夫者正欲其熟考聖賢言語求箇的確所在今却攷索得如此支離反不濟事如某向來作或問蓋欲學者識取正意觀此書者當於其中見得此是當辨此不足辨刪其不足辨者令正意愈明白可也若更去外面生出許多議論則正意反不明矣今非特不見經文正意只諸家之説亦㸔他正意未著又曰中庸言慎思何故不言深思又不言勤思蓋不可枉費心去思之須是思其所當思者故曰慎思也必大或問向䝉見教讀書須要涵泳須要浹洽因㸔孟子千言萬語只是論心七篇之書如此㸔是涵泳工夫否曰某為見此中人讀書大段鹵莾所以説讀書須當涵泳只要子細㸔玩㝷繹令胸中有所得爾如吾友所説又襯貼一件意思硬要差排㸔書豈是如此或曰先生涵泳之説乃杜元凱優而柔之之意曰固是如此亦不用如此觧説所謂涵泳者只是子細讀書之異名與人説話便是難某只是説一箇涵泳一人硬來安排一人硬來觧説此是随語生觧支離延蔓閒説閒講少間展轉只是添得多説得逺却要做甚若是如此讀書如此聼人説話全不是自做工夫全無巴鼻可知是使人説學是空談此中人所問大率如此好理㑹處不理㑹不當理㑹處却支離去説説得全無意思蓋卿或解居處恭執事敬與人忠云須是從裏面做出來方得他外面如此曰公讀書便是多有此病這裏面又那得箇裏面做出來底説話來只是居處時便用恭執事便用敬與人時便用忠雖之夷狄不可棄也不過只是如此説大凡㸔書須只就他本文㸔教直截切忌如此支離蔓衍拖脚拖尾不濟淂事聖賢説話那一句不直截如利刃削成相似雖以孔子之語渾然温厚然他那句語更是斬截若如公説一句更用數十字去包他則聖賢何不逐句上更添㡬字教他分曉只㸔濓溪二程横渠們説話無不斬截有力語句自是恁地重無他所以㸔得如此寛緩無力者只是心念不整肅所以如此縁心念不整肅所以意思寛緩都湊泊他那意思不著説從别處去須是整肅心念㸔教他意思嚴𦂳説出來有力四方八面截然有界限始得如今説得如此支蔓都不成箇物事其病只在心念不整肅上僴讀書之法只要落窠槽今公們讀書盡不曾落得那窠槽只是走向外去思量所以都説差去如初間大水瀰漫少間水既退盡落低窪處方是入窠槽今盡是泛泛説從别處去某常以為書不難讀只要人𦂳貼就聖人言語上平心㸔他文義自見今都是硬差排思其所不當思疑其所不當疑辨其所不當辨盡是枉了濟得甚事僴某嘗説文字不難㸔只是讀者心自嶢﨑了㸔不出若大著意思反復熟㸔那正當道理自湧出來不要將那小意智私見識去間亂他如此無縁㸔得出如千軍萬馬從這一條大路去行伍紀律自是不亂若撥數千人從一小路去空攪亂了正當底行陣無益於事又曰㸔書且要依文㸔得大槩意思了却去攷䆒細碎處如今未曾㸔得正當底道理出便落草了堕在一隅一角上心都不活動這箇似轉水車相似只撥轉機關子他自是轉連那上面磨子篩籮一齊都轉自不費力而今一齊説得枯燥無些子滋味便更㸔二十年也只不濟事須教他心裏活動轉得若著在那角落頭處而今諸公㸔文字如一箇船閣在淺水上轉動未得無那活水泛將去更將外面事物搭載放上面越見動不得都是枉用了心力枉費日子天下道理更有㡬多若只如此㸔㡬時了得某而今一自與諸公們説不辨只覺得都無意思所願諸公寛著意思且㸔正當道理教他活動有長進處方有所益如一條死蛇㺯教他活而今只是㺯得一條死蛇不濟事僴學者須要無事時去做得功夫然後可來此剖決是非今才一不在此便棄了這箇至此又却臨時逐旋㝷得一兩句言語來問則又何益夀昌或曰某㝷常所學多於優㳺浹洽中得之曰若遽然便以為有所見亦未是大抵於博學審問謹思明辨且未可説篤行只這裏便是浹洽處孔子所以好古敏以求之其用力如此謨人合是疑了問公今却是揀難處來問教人如何描摸若説得公又如何便曉得若升髙必自下今人要入室奥須先入門入庭見路頭熟次第入中間來如何自階裏一造要做後門出伊川云學者須先就近處賀孫而今人聼人説話未盡便要争説亦須待他人説教盡了他人有説不出處更須反覆問教説得盡了這裏方有處置在賀孫或人請諸經之疑先生既答之復曰今雖盡與公説公盡曉得不於自家心地上做工夫亦不濟事道夫諸公所以讀書無長進縁不㑹疑某雖㸔至沒𦂳要底物事亦須致疑纔疑便須理㑹得徹頭僴或謂問難只是作話頭不必如此曰不然到無疑處不必問疑則不可不問今如此云云不是惡他人問便是自家讀書未嘗有疑可學讀語録玩了却不如乍見者勇於得此是病方諸生請問不切曰羣居最有益而今朋友乃不能相與講貫各有疑忌自私之意不知道學問是要理㑹箇甚麽若是切已做工夫底或有所疑便當質之朋友同共商量須有一人識得破者已是講得七八分却到某面前商量便易為力今既各自東西不相講貫如何得㑹長進欲為學問須要打透這些子放令開闊識得箇以能問於不能以多問於寡底意思方是切於為已時舉或問太極曰㸔如今人與太極多少逺近或人自説所讀書曰徒然説得一片恁地多不濟事如今且要虚心心若不虚雖然恁地問待别人恁地説自不入他聽之如不聞只是他自有箇物事横在心下如顔子人道他得一善則拳拳服膺而不失他不曾自知道得一善拳拳服膺而不失他見不善未嘗不知知之未嘗復行他不曾自知道見不善未嘗不知知之未嘗復行他不遷怒不貳過他不曾自知道不遷怒不貳過他只見箇道理當如此易曰君子以虚受人書曰惟學遜志舊有某人來問事略不虚心一味氣盈色滿當靣與他説他不全聽得賀孫天下之理有長有短有大有小當各随其義理㸔某㸔得學者有箇病於他人如此説處又討箇義理責其不如彼説於其如彼説處又責其不如此説因舉所執扇反復為喻曰此扇兩邉各有道理今學者待他人説此邉道理便翻轉那一邉難之及他説那一邉却又翻轉這一邉難之必大問氣質之害直是今人不覺非特讀書就他氣質上説只如每日聽先生説話也各以其所偏為主如十句有一句合他意便硬執定這一句曰是如此且如仲山甫一詩蘓子由專歎美既明且哲以保其身二句伯恭偏喜柔嘉維則一句某問何不將那柔亦不茹剛亦不吐以下四句做好某意裏又愛這四句問這四句如何曰也自剛了問剛底終是占得分數多曰也不得只是此柔又較争胡泳質敏不學乃大不敏有聖人之資必好學必下問若就自家杜撰更不學更不問便已是凡下了聖人之所以為聖也只是好學下問舜自耕稼陶漁以至于帝無非取諸人以為善孔子説禮吾聞諸老𥅆這也是學於老𥅆方知得這一事賀孫先生因學者少寛舒意曰公讀書恁地縝宻固是好但恁地逼截成一圑此氣象最不好這是偏處如一項人恁地不子細固是不成道理若一向蹙宻下梢却展拓不去明道一見謝顯道曰此秀才展拓得開下梢可望又曰於詞氣間亦見得人氣象如明道語言固無甚激昂㸔來便見寛舒意思龜山人只道恁地寛㸔來不是寛只是不解理會得不能理㑹得范純夫語解比諸公説理最平淺但自有寛舒氣象儘好賀孫因人之昏弱而箴之曰人做事全靠這些子精神節有言貧困不得專意問學者曰不干事世間豈有無事底人但十二時㸔那箇時間一時閒便做一時工夫一刻閒便做一刻工夫積累久自然别或又以離逺師席不見解注為説曰且如某之讀書那曾得師友專守在裏初又曷嘗有許多文字也只自著力耳或曰先生髙明某何敢望曰如此則全未知自責堯舜與人同耳曷嘗有異某嘗謂此皆是自恕之語最為病痛道夫或言氣禀昏弱難於為學曰誰道是公昏弱但反而思之便强便明這氣色打一轉日日做工夫日日有長進子䝉或問某欲克己而患未能曰此更無商量人患不知耳既已知之便合下手做更有甚商量為人由已而由人乎哉雉或言今且㸔先生動容周旋以自撿先生所著文義却自歸去理㑹曰文義只是目下所行底如何將文義别做一邉㸔若不去理㑹文義終日只管相守閒坐如何有這道理文義乃是躬行之門路躬行即是文義之事實賀孫或問人固欲事事物物理會然精力有限不解一一都理㑹得曰固有做不盡底但立一箇綱程不可先自放倒也須静着心實着意沉潜反覆終久自曉得去祖道或説居敬窮理曰都不須如此説如何説又怕居敬不得窮理有窮不去處豈有此意只是自家元不曾居敬元不曾窮理所以説得如此若真箇去窮底豈有窮不得之理若心堅便是石也穿豈有道理了窮不得之理而今説又怕有窮不得處又怕如何又計較如何都是枉了只恁勇猛堅決向前去做無有不得之理不當如此遲疑如人欲出路若有馬便騎馬去有車便乗車去無車便徒歩去只是從頭行將去豈有不到之理僴燾錄云問理有未窮且只持敬否曰不消恁地説持敬便只管持將去窮理便只管窮將去如説前靣萬一持不得窮不得處又去别生計較這箇都是枉了思量然亦只是不曾真箇持敬窮理若是真箇曾持敬窮理豈有此説譬如出路要乗轎便乗轎要乗馬便乗馬要行便行都不消思量前面去不得時又著如何但當勇猛堅決向前那裏要似公説屆敬不得處又著如何窮理不得處又著如何古人所謂心堅石穿蓋未嘗有做不得底事如公㡬年讀書不長進時皆縁公恁地所以搭滯了又曰聖人之言本自直截若裏靣有屈曲處聖人亦必説在上靣若上靣無底又何必思量從那屈曲處去都是枉了工夫或問格物一項稍支離曰公依舊是箇計較利害底心下在這裏公且試將所説行將去㸔何如若只管在這裏擬議如何見得如做得箇船且安排槳楫解了䋲放了索打將去㸔却自見涯岸若不放船去只管在這裏思量怕有風濤又怕有甚險如何得到岸公今恰似箇船全未曾放離岸只管計較利害聖賢之説那尚恁地子路有聞未之能行唯恐有聞如今説了千千萬萬却不曾去下得分寸工夫又曰聖人常説有殺身以成仁今㸔公那邉人教他殺身以成仁道他肯不肯決定是不肯才説著他也道是怪在又曰吾未見剛者聖人只是要討這般人須是有這般資質方可將來磨治詩云追琢其章金玉其相須是有金玉之質方始琢磨得出若是泥土之質假饒你如何去裝飾只是箇不好物事自是你根脚本領不好了又曰如讀書只是理㑹得便做去公却只管在這裏説道如何理㑹伊川云人所最可畏者便做賀孫先生問學者曰公今在此坐是主静是窮理久之未對曰便是公不曾做工夫若不是主静便是窮理只有此二者既不主静又不窮理便是心無所用閒坐而已如此做工夫豈有長進之理佛者曰十二時中除了着衣喫飯是别用心夫子亦云造次必於是顛沛必於是須是如此做工夫方得公等每日只是閒用心問閒事説閒話底時節多問𦂳要事䆒竟自己底事時節少若是真箇做工夫底人他自是無閒工夫説閒話問閒事聖人言語有㡬多𦂳要大節目都不曾理㑹小者固不可不理㑹然大者尤𦂳要僴或問致知當主敬又問當如先生説次第觀書曰此只是説話須要下工夫方得蓋卿諸公且自思量自朝至暮還曾有頃刻心從這軀殻裏思量過否僴賢軰但知有營營逐物之心不知有真心故識慮皆昏觀書察理皆草草不精眼前易曉者亦㸔不見皆由此心雜而不一故也所以前軰語初學者必以敬曰未有致知而不在敬者今未知反求諸心而胸中方且叢雜錯亂未知所守持此雜亂之心以觀書察理故凡工夫皆從一偏一角做去何縁㑹見得全理某以為諸公莫若且收歛身心盡掃雜慮令其光明洞達方能作得主宰方能見理不然亦終嵗而無成耳大雅諸公皆有志於學然持敬工夫大段欠在若不知此何以為進學之本程先生云涵飬須用敬進學則在致知此最切要游和之問不知敬如何持曰只是要收斂身心莫令走失而已今人精神自不曾定讀書安得精專凡㸔山㸔水風吹草動此心便自走失何以為學諸公切宜勉此南升先生語諸生曰人之為學五常百行豈能盡常常記得人之性惟五常為大五常之中仁尤為大而人之所以為是仁者又但當守敬之一字只是常求放心晝夜相承只管提撕莫令廢惰則雖不能常常盡記衆理而義禮智信之用自然随其事之當然而發見矣子細思之學者最是此一事為要所以孔門只是教人求仁也北祖或曰每常處事或思慮之發覺得發之正者心常安其不正者心常不安然義理不足以勝私欲之心少間安者却容忍不安者却依舊被私欲牽將去及至事過又却悔悔時依舊是本心發處否曰然只那安不安處便是本心之徳孔子曰志士仁人無求生以害仁有殺身以成仁求生如何便害仁殺身如何便成仁只是箇安與不安而已又曰不待接事時方流入於私欲只那未接物時此心已自流了須是未接物時也常剔抉此心教他分明少間接事便不至於流上蔡解為人謀而不忠云為人謀而忠非特臨事而謀至於平居静慮思所以處人者一有不盡則非忠矣此雖於本文説得來大過然却如此今人未到為人謀時方不忠只平居静慮閒思念時便自懐一箇利便於已將不好處推與人之心矣須是於此處常常照管得分明方得僴或問静時見得此心及接物時又不見曰心如何見得接物時只要求箇是應得是便是心得其正應得不是便是心失其正所以要窮理且如人唱喏須至誠還他喏人問何處來須㨿實説某處來即此便是應物之心如何更要見此心浙間有一般學問又是得江西之緒餘只管教人合眼端坐要見一箇物事如日頭相似便謂之悟此大可笑夫子所以不大段説心只説實事便自無病至孟子始説求放心然大槩只要人不馳䳱於外耳其弊便有這般底出來以此見聖人言語不可及學䝉或問覺得意思虛静時應接事物少有不中節者纔是意思不虛静少間應接事物便都錯亂曰然然公又只是守得那塊然底虚静雖是虛静裏靣黑漫漫地不曾守得那白底虛静濟得甚事所謂虚静者須是將那黑底打開成箇白底教他裏靣東西南北玲瓏透徹虛明顯敞如此方喚做虚静若只確守得箇黑底虛静何用也僴有問程門教人説敬却遺了恭中庸説篤恭而天下平又不説敬如何恭敬不同曰昔有人曾以此問上蔡上蔡云不同恭是平聲敬是側聲舉坐大笑先生曰不是如此理㑹随他所説處理㑹如只比並作箇問頭又何所益謙先生嘗語在坐者云學者常常令道理在胸中流轉過先生見學者觧説之際或似張大即語之曰説道理不要大驚小恠過今之學者只有兩般不是𤣥空髙妙便是膚淺外馳張洽因先生言近來學者多務髙逺不自近處著工夫因言近來學者誠有好髙之弊昔有問伊川如何是道伊川曰行處是又問明道如何是道明道令於君臣父子兄弟上求諸先生之言不曾有髙逺之説先生曰明道之説固如此然君臣父子兄弟之間各有箇當然之理此便是道因説今人學問云學問只是一箇道理不知天下説出㡬多言語來若内無所主一随人脚跟轉是壊了多少人吾人日夜要講明此學只為要理明學至不為邪説所害方是見得道理分明聖賢真可到言話真不誤人今人教人引得七上八下殊可笑謙或問左傳疑義曰公不求之於六經語孟之中而用功於左傳且左傳有甚麽道理縱有能幾何所謂棄却甜桃樹縁山摘酢梨天之所賦於我者如光明寳藏不㑹收得却上他人門呌化一兩錢豈不哀哉只㸔聖人所説無不是這箇大本如云天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉不然子思何故説箇天命之謂性率性之謂道脩道之謂教此三句是怎如此説是乃天地萬物之大本大根萬化皆從此出人若能體察得方見得聖賢所説道理皆從自己胸襟流出不假他求某向嘗見吕伯恭愛與學者説左傳某嘗戒之曰語孟六經許多道理不説恰限説這箇縱那上有些零碎道理濟得甚事伯恭不信後來又説到漢書若使其在不知今又説到甚處想益卑矣固宜為陸子静所笑也子静底是髙只是下面空踈無物事承當伯恭底甚低如何得似他又曰人須是於大原本上㸔得透自然心胸開闊見世間事皆𤨏𤨏不足道矣又曰每日開眼便見這四箇字在靣前仁義禮智只趯着脚指頭便是這四箇字若㸔得熟於世間道理沛然若決江河而下莫之能禦矣若㸔得道理透方見得每日所㸔經書無一句一字一㸃一畫不是道理之流行見天下事無大無小無一名一件不是此理之發見如此方見得這箇道理渾淪周遍不偏枯方見得所謂天命之謂性底全體今人只是随所見而言或見得一二分或見得二三分都不曾見那全體不曾到那極處所以不濟事僴浙中朋友一等底只理㑹上靣道理又只理㑹一箇空底物事都無用少間亦只是計較利害一等又只就下面理㑹事眼前雖粗有用又都零零碎碎了少間只見得利害如横渠説釋氏有兩末之學兩未兩頭也都是那中間事物轉闗處都不理㑹賀孫問如何是轉闗處曰如致知格物便是就事上理㑹道理理㑹上靣底却棄置事物為陳迹便只説箇無形影底道理然若還被他放下來更就事上理㑹又却易只是他已見得上靣一段物事不費氣力省事了又那肯下來理㑹理㑹下靣底又都細碎了這般道理須是規模大方理㑹得遂舉伊川説曾子易簀便與有天下行一不義殺一不辜不為一同後來説得來便無他氣象大底却可做小小底要做大却難小底就事與物細碎上理㑹賀孫先生問浙間事某曰浙間難得學問㑹説者不過孝悌忠信而己曰便是守此四字不得須是從頭理㑹來見天理從此流出便是炎謂邵武諸友公㸔文字㸔得𦂳切好只是邵武之俗不怕不㑹㸔文字不患㸔文字不切只怕少寛舒意思賀孫方伯謨以先生教人讀集注為不然蔡季通丈亦有此語且謂四方從學之士稍自負者皆不得其門而入去者亦多某因從容侍坐見先生舉以與學者云讀書須是自肯下工夫始得某向得之甚難故不敢輕説與人至於不得己而為注釋者亦是博採諸先生及前軰之精微寫出與人㸔極是簡要省了多少工夫學者又自輕㸔了依舊不得力蓋是時先生方獨任斯道之責如西銘通書易象諸書方出四方辨結紛然而江西一種學問又自善皷扇學者其於聖賢精義皆不暇深考學者樂於簡易甘於詭僻和之者亦衆然終不可與入堯舜之道故先生教人専以主敬窮理為主欲使學者自去窮究見得道理如此便自能立不待辨説而明此引而不發之意其為學者之心蓋甚切學者可不深味此意乎炎或問所謂窮理不知是反已求之於心惟復是逐物而求於物曰不是如此事事物物皆有箇道理窮得十分盡方是格物不是此心如何去窮理不成物自有箇道理心又有箇道理枯槁其心全與物不接却使此理自見萬無是事不用自家心如何别向物上求一般道理不知物上道理却是誰去窮得近世有人為學專要説空説妙不肯就實却説是悟此是不知學學問無此法才説一悟字便不可窮詰不可研䆒不可與論是非一味説入虛談最為惑人然亦但能謾得無學底人若是有實學人如何被他謾才説悟便不是學問奉勸諸公且子細讀書書不曾讀不見義禮乗虛接𣺌指摘一二句來問人又有漲開其説來問又有牽甲證乙來問皆是不曾有志朴實頭讀書若是有志朴實頭讀書從靠實些理會將去所疑直是疑亦有可荅不然彼已但把做是一場閒説話爾濟得甚事且如讀此一般書只從此一般書上窮究冊子外一箇字且莫兠攬來炒將來理明却將已曉得者去解得未曉者如今學者將未能觧説者却去參解説不得者鶻突好笑悠悠嵗月只若人耳謙或問所守所行似覺簡易然茫然未有所獲曰既覺得簡易自合有所得却曰茫然無所獲者如何曰比之以前為學多岐今來似覺簡畧耳愚殊不敢望得道只欲得一箇入頭處曰公之所以無所得者正坐不合簡易揚子雲曰以簡以易焉支焉離蓋支離所以為簡易也人須是博學之審問之慎思之明辨之篤行之然後可到簡易田地若不如此用工夫一蹴便到聖賢地位却大段易了古人何故如此博學審問慎思明辨篤行乎夫是五者無先後有緩急不可謂博學時未暇審問審問時未暇慎思慎思時未暇明辨明辨時未暇篤行五者從頭做將下去只微有少差耳初無先後也如此用工他日自然簡易去謨錄注云包顯道以書論此先生靣質如此孟子曰博學而詳説之將以反説約也語云博我以文約我以禮須是先博然後至約如何便先要約得人若先以簡易存心不知博學審問謹思明辨篤行將來便入異端去去偽謨同先生言此兩日甚思諸門生之留書院者不知在彼如何孔子在陳思魯之狂士孟子所記本亦只是此説狂狷即狂簡不忘其初即不知所以裁之當時随聖人在外底却逐日可照管他留魯者却不見得其所至如何然已説得成章了成章是有首有尾如異端亦然釋氏亦自説得有首有尾道家亦自説得有首有尾大抵未成者尚可救已成者為足慮時先生在郡中必大或云嘗見人説凡是外靣㝷討入來底都不是曰喫飯也是外靣㝷討入來若不是時須在肚裏做病如何又喫得安穏蓋飢而食者即是從裏靣出來讀書亦然書固在外讀之而通其義者却自是裏靣事如何都喚做外靣入來得必欲盡捨詩書而别求道理異端之説也琮天下道理自平易簡直人於其間只是為剖析人欲以復天理教明白洞達如此而已今不於明白處求却求之於偏旁處縱得些理其能㡬何今日諸公之弊却自要説一種話云我有此理他人不知安有此事只是一般理只是要明得安有人不能而我獨能之事如此則是錯了可學學者同在此一般講學及其後説出來便各有差誤要其所成有上截底無下截有下截底無上截有皮殻底無肚腸有肚腸底無皮殻不知是如何必大曰工夫有間斷亦是氣質之偏使然曰固是氣質然大患是不子細嘗謂今人讀書得如漢儒亦好漢儒各專一家㸔得極子細今人才㸔這一件又要㸔那一件下梢都不曾理㑹得必大㸔二十五條曰此正與前段相反却有上截無下截天資髙底固有能不為富貴所累然下此者亦必思所以處之貧而樂者固勝如無謟富而好禮者固勝如無驕若未能無謟無驕底亦須且於此做工夫頃見一文集云有一人天資善奕極髙遂入京見國手國手與之下了但云可随我諸處㸔我與人奕如此者半年遂遣之其人曰某随逐許時未䝉教得有所長國手曰汝碁本髙但未曾識低着却恐與人下時錯了我帶你去半年只是欲汝識低著耳因論碁又曰黙堂集中亦載一説有兩箇對奕方争一段甚危其人忽舎所争却别於閒處下一着衆所不曉既畢或問之曰所争處已是定此一着亦有利害不可不急去先下一着然對者固未必曉問者曰既見得其人未必曉又何用急去下曰在彼雖可忽在我者不可不盡耳天下事皆當如此不獨奕也􅓌政和有客同侍坐先生曰這下人全不讀書莫説道教他讀别書只是要𦂳如六經漢書唐書諸子也須着讀始得又不是大段費錢了不能得他讀只問人借將來讀也得如何一向只去讀時文如何擔當箇秀才名目在身己上既做秀才未説道要他理㑹甚麽髙深道理也須知得古聖賢所以垂世立教之意是如何古今盛衰存亡治亂事體是如何從古來人物議論是如何這許多眼前底都全不識如何做士人須是識得許多方始成得箇人又云向來人讀書為科舉計已自是末了如今又全不讀而赴科舉又末之末者若以今世之所習雖做得官貴窮公相也只是箇沒見識底人若依古聖賢所教做去雖極貧賤身自躬耕而胸次亦自浩然視彼汚濁卑下之徒曾犬彘之不若又曰如今人也須先立箇志趣始得還當自家要做甚麽人是要做聖賢是只要苟簡做箇人天教自家做人還只教恁地便是了閒時也須思量着聖賢還是元與自家一般還是有兩般天地交付許多與人不獨厚於聖賢而薄於自家是有這四端是無這四端只管在塵俗裏靣衮還曾見四端頭靣還不曾見四端頭靣且自去㸔最難説是意趣卑下都不見上靣許多道理公今如只管去喫魚鹹不知有芻豢之美若去喫芻豢自然見魚鹹是不好喫物事又云如論語説學而時習之公且自㸔平日是曾去學不曾去學曾去習不曾去習學是學箇甚麽習是習箇甚麽曾有説意思無説意思且去做好讀聖賢之書熟讀自見如孟子説亦有仁義而己這也不待注觧如何孟子須教人舎利而就義如今人如何只去義而趨利賀孫問曾㸃曰今學者全無曾㸃分毫氣象今整日理㑹一箇半箇字有下落猶未分曉如何敢望他他直是見得這道理活潑潑地快活若似而今諸公様做工夫如何得似它問學者須是打疊得世間一副當富貴利祿底心方可以言曾㸃氣象方有可用功處曰這箇大故是外靣粗處某常説這箇不難打疊極未有要𦂳不知别人如何正當是裏靣工夫極有細碎難理會處要人打疊得若只是外靣富貴利祿此何足道若不這處打一箇透説甚麽學正當學者裏靣工夫多有節病人亦多般様而今自家只見得這箇重便説難打疊它人病痛又有不在是者若人人將這箇去律它教須打併這箇了方可做那箇則其無此病者却覺得緩散無力急這一邉便緩却那一邉所以這道理極難要無所不用其力莫問他急緩先後只認是處便奉行不是處便𦂳閉教他莫要出來所以説是故君子無所不用其極是故君子戒慎乎其所不覩恐懼乎其所不聞莫見乎隠莫顯乎微又曰仁以為己任不亦重乎四方八靣盡要照管得到若一處疎闕那病痛便從那疎處入來如人厮殺凡山川途徑險阻要害無處不要防守如姜維守蜀它只知重兵守着正路以為魏師莫能來不知鄧艾却從隂平武都而入反出其後它當初也説那裏險阻人必來不得不知意之所不備處才有縫罅便被賊人來了做工夫都要如此所以這事極難只㸔是故君子無所不用其極一句便見而今人有終身愛官職不知厭足者又有做到中中官職便足者又有全然不要只恁地懶惰因循我也不要官職我也無力為善平平過者又有始間是好人末後不好者又有始間不好到末好者如此者多矣又有做到宰相了猶未知厭足更要經營久做者極多般様僴先生過信州一士子請見問為學之道曰道二仁與不仁而已矣聖人千言萬語只是要教人做人文蔚先生曰相随同歸者前靣未必程程可説話相送至此者一别又不知㡬年有話可早商量久而無人問先生遂云學者須要勇決須要思量須要著業又云此間學者只有過底無有不及底在大桂鋪説震與或人説公平日説甚剛氣到這裏為人所轉都屈了凡事若見得了須使堅如金石舊㸔不尚文華薄勢利之類説話便信以為然將謂人人如在後方知不然此在資質學者輕俊者不美朴厚者好振先生因言學者平居議論多頽塌臨事難望它做得事遂説一姓王學者後來狼狽是其平時議論亦專是回互有一處責曾子許多時用大夫之簀臨時不是童子説則㡬失易簀王便云這是曾子好處既受其簀若不用之必至取怒季孫故須且將來用大抵今之學者多此病如學夫子便學他微服過宋君命召不俟駕見南子與佛肸召之類有多少處不學只學他這箇胡泳大率為善須自有立今欲為善之人不可謂少然多頋浮議浮議何足恤蓋彼之是非干我何事亦是我此中不痛切耳若自着緊自痛切亦何暇恤它人之議哉大雅或言某人好善曰只是徇人情與世浮沉要教人道好又一種人見如此却欲矯之一味只是説人短長道人不是全不反已且道我是甚麽人它是如何人全不㸔他所為是如何我所為是如何一向只要胡亂説人此二等人皆是不知本領見歸一偏坐落在窠臼中不能得出聖賢便不如此謙因説而今人須是它曉得方可與它説話有般人説與眼前事尚不曉如何要他知得千百年英雄心事燾有一朋友輕慢去後因事偶語及之先生曰何不早説得某與他道坐中應曰不欲説曰他在却不欲説去後却後面説他越不是端蒙因論諸人為學曰到學得争綱争紀學却反成箇不好底物事揚曰大率是人小故然又各人合下有箇肚私見識世間書人無所不有又一切去附㑹上故皆偏側違道去先生甚然之揚門人有與人交訟者先生數責之云欲之甚則昏蔽而忘義理求之極則争奪而至怨仇賀孫每夜諸生㑹集有一長上纔坐定便閒話先生責曰公年已四十書讀未通纔坐便説别人事夜來諸公閒話至二更如何如此相聚不回光反照作自己工夫却要閒説歎息久之賀孫有侍坐而困睡者先生責之敬子曰僧家言常常提起此志令堅强則坐得自直亦不昏困纔一縱肆則嗒然頽放矣曰固是道家脩飬也怕昏困常要直身坐謂之生腰坐若昏困倒靠則是死腰坐矣因舉小南和尚少年從師參禪一日偶靠倚而坐其師見之叱曰得恁地無脊梁骨小南悚然自此終身不靠倚坐又舉徐處仁知北京日早晨㑹僚屬治事訖復穿秉㑹坐設㕔上徐多記覽多説平生履歴州郡利害政事得失及前言往行終日危坐僚屬甚苦之嘗暑月㑹坐有秦兵曹者瞌睡徐厲聲叱之起曰某在此説話公却瞌睡豈以某言為不足聼耶未論某是公長官只論鄉曲亦是公丈人行安得如此呌客將掇取秦兵曹坐椅子去問徐後來做宰相却無聲譽曰他只有治郡之才僴有學者每相揖畢輒縮左手袖中先生曰公常常縮着一隻手是如何也似不是舉止模様義剛先生讀書屏山書堂一日與諸生同行登臺見草盛命數兵耘草分作四段令各耘一角有一兵逐根㧞去耘得甚不多其它所耘處一齊了畢先生見耘未了者問諸生曰諸公看㡬箇耘草那箇快諸生言諸兵皆快獨指此一人以為鈍曰不然某㸔來此卒獨快因細視諸兵所耘處草皆去不盡悉復呼來再耘先生復曰那一兵雖不甚快㸔它甚子細逐根去令盡雖一時之難却只是一畨工夫便了這㡬箇又着從頭再用工夫只縁其初欲速苟簡致得費力如此㸔這處便是學者讀書之法㝢留丞相以書問詩集傳數處先生以書示學者曰他官做到這地位又年齒之髙如此雖在貶所亦不曾閒度日公等豈可不惜寸隂友仁先生氣疾作諸生連日皆無問難一夕遣介召入卧内諸生亦無所請先生怒曰諸公恁地閒坐時是怎生地恁地便歸去强不消得恁地逺來義剛大有事用理㑹在某今只是覺得後靣日子短促了精力有所不逮然力之所及亦不敢不勉思量着有萬千事要理㑹在自是不容己只是覺得後靣日子大故催促人可為慨歎耳先生言日來多病更無理㑹處恐必不久於世諸公全靠某不得須是自去做工夫始得且如㸔文字須要此心在上靣若心不在上靣便是不曾㸔相似所謂視之不見聼之不聞只是心不在焉耳時舉先生不出令入卧内相見云某病此畨甚重向時見文字也要議論而今都怕了諸友可各自努力全靠某不得時舉講學須要著實向來諸公多見得不明却要做一罩説語次云目前諸友亦多有識門户者某旦暮死耳不敢望大行且得接續三四十年説與後進令知亦好可舉先生一日腰疼甚時作呻吟聲忽曰人之為學如某腰疼方是在坐者皆不能問泳久而思之恐是為學工夫意思接續自然無頃刻之忽忘然後進進不已痛楚在身雖欲無之而不可得故以開諭學者其警人之意深矣胡泳因説工夫不可間斷曰某若臂痛常以手擦之其痛遂止若或時擦或時不擦無縁見效即此便是做工夫之法正叔退謂文蔚曰擦臂之喻最有味文蔚朱子語類卷一百二十一
