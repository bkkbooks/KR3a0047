body:
  text: 朱子語類卷二理氣下天地下天文有半邊在上面須有半邊在下面淵如何見得天有三百六十度甚麽人去量來只是天行得過處為度天之過處便是日之退處日月㑹為辰節有一常見不隱者為天之盖有一常隱不見者為天之底節叔器問天有幾道曰據厯家説有五道而今且將黃赤道説赤道正在天之中如合子縫模様黃道是在那赤道之間義剛問同度同道曰天有黃道有赤道天正如一圓匣相似赤道是那匣子相合縫處在天之中黃道一半在赤道之内一半在赤道之外東西兩處與赤道相交度却是將天横分為許多度數㑹時是日月在那黃道赤道十字路頭相交處厮撞著望時是月與日正相向如一箇在子一箇在午皆同一度謂如月在畢十一度日亦在畢十一度雖同此一度却南北相向日所以蝕於朔者月常在下日常在上既是相㑹被月在下靣遮了日故日蝕望時月蝕固是隂敢與陽敵然厯家又謂之暗虚盖火日外影其中實暗到望時恰當著其中暗處故月蝕僴問周天之度是自然之數是强分曰天左旋一晝一夜行一周而又過了一度以其行過處一日作一度三百六十五度四分度之一方是一周只將南北表看今日恁時看時有甚星在表邊明日恁時看這星又差逺或别是一星了胡泳天一日周地一遭更過一度日即至其所趕不上一度月不及十三度天一日過一度至三百六十五度四分度之一則及日矣與日一般是為一朞揚天行至健一日一夜一周天必差過一度日一日一夜一周恰好月却不及十三度有竒只是天行極速日稍遲一度月又遲十三度有竒耳因舉陳元滂云只似在圓地上走一人過急一步一人差不及一步又一人甚緩差數步也天行只管差過故厯法亦只管差堯時昏旦星中於午月令差於未漢晉以來又差今比堯時似差及四分之一古時冬至日在牽牛今却在斗徳明天最健一日一周而過一度日之健次於天一日恰好行三百六十五度四分度之一但比天為退一度月比日大故緩比天為退十三度有竒但厯家只筭所退之度却云日行一度月行十三度有竒此乃截法故有日月五星右行之説其實非右行也横渠曰天左旋處其中者順之少遲則反右矣此説最好書疏璣衡禮疏星回于天漢志天體沈括渾儀議皆可參考閎祖問天道左旋自西而東日月右行則如何曰横渠説日月皆是左旋説得好盖天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一正恰好比天進一度則日為退一度二日天進二度則日為退二度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退盡本數遂與天㑹而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退了十三度有竒進數為順天而左退數為逆天而右厯家以進數難筭只以退數筭之故謂之右行且曰日行遲月行速然則日行却得其正故揚子太𤣥首便説日云云向來乆不曉此因讀月令日窮于次疏中有天行過一度之説推之乃知其然又如書齊七政䟽中二三百字説得天之大體亦好後漢厯志亦説得好義剛錄云前漢厯志説道理處少不及東漢志較詳淳問月令䟽地冬上騰夏下降是否曰未便理㑹到此且看大綱識得後此處用度筭方知淳義剛同天左旋日月亦左旋但天行過一度日只在此當卯而卯當午而午某看得如此後來得禮記説暗與之合泳天道與日月五星皆是左旋天道日一周天而常過一度日亦日一周天起度端終度端故比天道常不及一度月行不及十三度四分度之一今人却云月行速日行遲此錯說也但厯家以右旋為說取其易見日月之度耳至問天道左旋日月星辰右轉曰自疏家有此説人皆守定某看天上日月星不曾右轉只是隨天轉天行健這箇物事極是轉得速且如今日日與月星都在這度上明日旋一轉天却過了一度日遲些便欠了一度月又遲些又欠了十三度如嵗星須一轉争了十三度要看厯數子細只是璇璣玉衡疏載王蕃渾天説一段極精宻可檢看便是説一个現成天地了月常光但初二三日照只照得那一邊過幾日漸漸移得正到十五日月與日正相望到得月中天時節日光在地下迸從四邊岀與月相照地在中間自遮不過今月中有影云是莎羅樹乃是地形未可知賀孫義剛言伯靖以為天是一日一周日則不及一度非天過一度也曰此説不是若以為天是一日一周則四時中星如何解不同更是如此則日日一般却如何紀嵗把甚麽時節做定限若以為天不過而日不及一度則趲來趲去將次午時便打三更矣因取禮記月令疏指其中説早晩不同及更行一度兩處曰此説得甚分明其他厯書都不如此説盖非不曉但是説滑了口後信口説習而不察更不去仔細檢㸃而今若就天裏看時只是行得三百六十五度四分度之一若把天外來説則是一日過了一度季通常有言論日月則在天裏論天則在太虚空裏若去太虚空裏觀那天自是日月滚得不在舊時處了先生至此以手畫輪子曰謂如今日在這一處明日自是又滚動著些子又不在舊時處了又曰天無體只二十八宿便是天體日月皆從角起天亦從角起日則一日運一周依舊只到那角上天則一周了又過角些子日日累上去則一年便與日㑹次日仲黙附至天説曰天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲故日行一日亦繞地一周而在天為不及一度積三百六十五日九百四十分日之二百三十五而與天㑹是一嵗日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日㑹十二㑹得全日三百四十八餘分之積又五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一嵗月行之數也嵗有十二月月有三十日三百六十日者一嵗之常數也故日與天㑹而多五日九百四十分日之二百三十五者為氣盈月與日㑹而少五日九百四十分日之五百九十二者為朔虚合氣盈朔虚而閏生焉故一嵗閏率則十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百單一五嵗再閏則五十四日九百四十分日之三百七十五十有九嵗七閏則氣朔分齊是為一章也先生以此示義剛曰此説也分明義剛天道左旋日月星並左旋星不是貼天天是隂陽之氣在上靣下人看見星隨天去耳㝢問經星左旋緯星與日月右旋是否曰今諸家是如此説横渠説天左旋日月亦左旋看來横渠之説極是只恐人不曉所以詩傳只載舊説或曰此亦易見如以一大輪在外一小輪載日月在内大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月似右轉了曰然但如此則厯家逆字皆著改做順字退字皆著改作進字僴晉天文志論得亦好多是許敬宗為之日月隨天左旋如横渠説較順五星亦順行厯家謂之緩者反是急急者反是緩厯數謂日月星所經歴之數揚問日是陽如何反行得遲如月曰正是月行得遲問日行一度月行十三度有竒曰厯家是將他退底度數為進底度數天至健故日常不及他一度月又遲故不及天十三度有竒且如月生於西一夜一夜漸漸向東便可見月退處問如此説則是日比天行遲了一度月比天行遲了十三度有竒曰厯家若如此説則筭著那相去處度數多今只以其相近處言故易筭聞季通云西域有九執厯却是順筭胡泳程子言日升降於三萬里是言黄赤道之間相去三萬里天日月星皆是左旋只有遲速天行較急一日一夜繞地一周三百六十五度四分度之一而又進過一度日行稍遲一日一夜繞地恰一周而於天為退一度至一年方與天相值在恰好處是謂一年一周天月行又遲一日一夜繞地不能匝而於天常退十三度十九分度之七至二十九日半强恰與天相值在恰好處是謂一月一周天月只是受日光月質常圓不曾缺如圓毬只有一面受日光望日日在酉月在卯正相對受光為盛天積氣上面勁只中間空為日月來徃地在天中不甚大四邊空有時月在天中央日在地中央則光從四旁上受於月其中昏暗便是地影望以後日與月行便差背向一畔相去漸漸逺其受光面不正至朔行又相遇日與月正緊相合日便蝕無光月或從上過或從下過亦不受光星亦是受日光但小耳北辰中央一星甚小謝氏謂天之機亦略有意但不似天之樞較切淳日月升降三萬里之中此是主黄道相去逺近而言若天之髙則里數又煞逺或曰八萬四千里未可知也立八尺之表以候尺有五寸之景寸當千里則尺有五寸恰當三萬里之半日去表有逺近故景之長短為可驗也厯家言天左旋日月星辰右行非也其實天左旋日月星辰亦皆左旋但天之行疾於日天一日一周更攙過一度日一日一周恰無贏縮以月受日光為可見月之望正是日在地中月在天中所以日光到月四畔更無虧欠唯中心有少黶翳處是地有影蔽者爾及日月各在東西則日光到月者止及其半故為上弦又減其半則為下弦逐夜增減皆以此推地在天中不為甚大只將日月行度折筭可知天包乎地其氣極緊試登極髙處驗之可見形氣相催緊束而成體但中間氣稍寛所以容得許多品物若一例如此氣緊則人與物皆消磨矣謂日月只是氣到寅上則寅上自光氣到卯上則卯上自光者亦未必然既曰日月則自是各有一物方始各有一名星光亦受於日但其體㣲爾五星之色各異觀其色則金木水火之名可辨衆星光芒閃爍五星獨不如此衆星亦皆左旋唯北辰不動在北極五星之旁一小星是也盖此星獨居天軸四面如輪盤環繞旋轉此獨為天之樞紐是也日月薄蝕只是二者交㑹處二者緊合所以其光掩没在朔則為日蝕在望則為月蝕所謂紓前縮後近一逺三如自東而西漸次相近或日行月之旁月行日之旁不相掩者皆不蝕唯月行日外而掩日於内則為日蝕日行月外而掩月於内則為月蝕所蝕分數亦推其所掩之多少而已謨日月升降三萬里中謂夏至謂冬至其間黄道相去三萬里夏至黄道髙冬至黄道低伊川誤認作闕相去之數形器之物雖天地之大亦有一定中處伊川謂天地無適而非中非是揚先生論及璣衡及黄赤道日月躔度潘子善言嵩山本不當天之中為是天形欹側遂當其中耳曰嵩山不是天之中乃是地之中黄道赤道皆在嵩山之北南極北極天之樞紐只有此處不動如磨臍然此是天之中至極處如人之臍帶也銖周髀法謂極當天中日月遶天而行逺而不可見者為盡此説不是問論語或問中云南極低入地三十六度北極髙出地三十六度如何曰圓徑七十二度極正居其中堯典疏義甚詳徳明季通嘗設一問云極星只在天中而東西南北皆取正於極而極星皆在其上何也某無以答後思之只是極星便是北而天則無定位義剛南極在下七十二度常隠不見唐書説有人至海上見南極下有數大星甚明此亦在七十二度之内義剛月體常圓無闕但常受日光為明初三四是日在下照月在西邊明人在這邊望只見在弦光十五六則日在地下其光由地四邊而射出月被其光而明月中是地影月古今人皆言有闕惟沈存中云無闕揚月無盈闕人看得有盈闕盖晦日則月與日相疊了至初三方漸漸離開去人在下面側看見則其光闕至望日則月與日正相對人在中間正看見則其光方圓因云禮運言播五行於四時和而後月生也如此則氣不和時便無月恐無此理其云三五而盈三五而闕彼必不曾以理推之若以理推之則無有盈闕也畢竟古人推䆒事物似亦不甚仔細或云恐是説元初有月時曰也説不得燾問弦望之義曰上弦是月盈及一半如弓之上弦下弦是月虧了一半如弓之下弦又問是四分取半否曰如二分二至也是四分取半因説厯家謂紓前縮後近一逺三以天之圍言之上弦與下弦時月日相看皆四分天之一僴問月本無光受日而有光季通云日在地中月行天上所以光者以日氣從地四旁周圍空處迸出故月受其光先生曰若不如此月何縁受得日光方合朔時日在上月在下則月面向天者有光向地者無光故人不見及至望時月面向人者有光向天者亦有光故見其圓滿若至弦時所謂近一逺三只合有許多光又云月常有一半光月似水日照之則水面光倒射壁上乃月照也問星受日光否曰星恐自有光徳明問月受日光只是得一邊光曰日月相㑹時日在月上不是無光光都載在上靣一邊故地上無光到得日月漸漸相逺時漸擦挫月光漸漸見於下到得望時月光渾在下面一邊望後又漸漸光向上去胡泳或問月中黑影是地影否曰前輩有此説㸔來理或有之然非地影乃是地形倒去遮了他光耳如鏡子中被一物遮住其光故不甚見也盖日以其光加月之魄中間地是一塊實底物事故光照不透而有此黑暈也問日光從四邊射入月光何預地事而礙其光曰終是被這一塊實底物事隔住故㣲有礙耳或録云今有剪紙人貼鏡中以火光照之則壁上圓光中有一人月為地所礙其黑暈亦猶是耳康節謂日太陽也月太隂也星少陽也辰少隂也辰非星也又曰辰弗集於房房者舍也故十二辰亦謂之十二舍上辰字謂日月也所謂三辰北斗去辰争十二來度日蝕是日月㑹合處月合在日之下或反在上故蝕月蝕是日月正相照伊川謂月不受日光意亦相近盖隂盛亢陽而不少讓陽故也又曰日月㑹合故初一初二月全無光初三漸開方㣲有弦上光是哉生明也開後漸亦光至望則相對故圓此後復漸相近至晦則復合故暗月之所以虧盈者此也伯羽問自古以日月之蝕為灾異如今厯家却自預先筭得是如何曰只大約可筭亦自有不合處厯家有以為當食而不食者有以為不當食而食者木之厯家之説謂日光以望時遥奪月光故月食日月交㑹日為月掩則日食然聖人不言月蝕日而以有食為文者闕於所不見閎祖日食是為月所掩月食是與日争敵月饒日些子方好無食揚日月交蝕暗虚道夫遇險謂日月相遇陽遇隂為險也振日月食皆是陽隂氣衰徽廟朝曾下詔書言此定數不足為灾異古人皆不曉厯之故揚横渠言日月五星亦隨天轉如二十八宿隨天而定皆有光芒五星逆行而動無光芒揚緯星是隂中之陽經星是陽中之隂蓋五星皆是地上木火土金水之氣上結而成却受日光經星却是陽氣之餘凝結者凝得也受日光但經星則閃爍開闔其光不定緯星則不然縱有芒角其本體之光亦自不動細視之可見僴莫要説水星盖水星貼著日行故半月日見泳夜明多是星月早日欲上未上之際已先鑠退了星月之光然日光猶未上故天欲明時一霎時暗揚星有墮地其光燭天而散者有變為石者揚分野之説始見於春秋時而詳於漢志然今左傳所載大火辰星之説又却只因其國之先曾主二星之祀而已是時又未有所謂趙魏晉者然後來占星者又却多驗殊不可曉廣叔重問星圖曰星圖甚多只是難得似圓圖説得頂好天彎紙却平方圖又却兩頭放小不得又曰那箇物事兩頭小中心漲又曰三百六十五度四分度之一想見只是説赤道兩頭小必無三百六十五度四分之一節風只如天相似不住旋轉今此處無風蓋或旋在那邊或旋在上面都不可知如夏多南風冬多北風此亦可見廣霜只是露結成雪只是雨結成古人説露是星月之氣不然今髙山頂上雖晴亦無露露只是自下蒸上人言極西髙山上亦無雨雪廣髙山無霜露却有雪某嘗登雲谷晨起穿林薄中並無露水沾衣但見烟霞在下茫然如大洋海衆山僅露峰尖烟雲環繞往來山如移動天下之竒觀也或問髙山無霜露其理如何曰上面氣漸清風漸緊雖微有露氣都吹散了所以不結若雪則只是雨遇寒而凝故髙寒處雪先結也道家有髙處有萬里剛風之説便是那裏氣清緊低處則氣濁故緩散想得髙山更上去立人不住了那裏氣又緊故也離騷有九天之説注家妄解云有九天據某觀之只是九重盖天運行有許多重數以手畫圖暈自内繞出至外其數九裏面重數較軟至外面則漸硬想到第九重只成硬殻相似那裏轉得又愈緊矣僴雪花所以必六出者盖只是霰下被猛風拍開故成六出如人擲一團爛泥於地泥必灒開成稜瓣也又六者隂數太隂𤣥精石亦六稜盖天地自然之數僴問龍行雨之説曰龍水物也其出而與陽氣交蒸故能成雨但尋常雨自是隂陽氣蒸欝而成非必龍之為也宻雲不雨尚往也盖止是下氣上升所以未能雨必是上氣蔽盖無發洩處方能有雨横渠正䝉論風雷雲雨之説最分曉木之問雷電程子曰只是氣相摩軋是否曰然或以為有神物曰氣聚則須有然纔過便散如雷斧之類亦是氣聚而成者但已有渣滓便散不得此亦屬成之者性張子云其來也幾㣲易簡其䆒也廣大堅固即此理也㽦雷如今之爆杖盖欝積之極而迸散者也方子問十月雷鳴曰恐發動了陽氣所以大雪為豐年之兆者雪非豐年盖為凝結得陽氣在地來年發達生長萬物敬仲雷雖只是氣但有氣便有形如蝃蝀本只是薄雨為日所照成影然亦有形能吸水吸酒人家有此或為妖或為祥義剛虹非能止雨也而雨氣至是已薄亦是日色射散雨氣了揚伊川説世間人説雹是蜥蜴做初恐無是理看來亦有之只謂之全是蜥蜴做則不可耳自有是上面結作成底也有是蜥蜴做底某少見十九伯説親見如此記在别録十九伯誠確人語必不妄又此間王三哥之祖參議者云嘗登五臺山山極髙寒盛夏攜綿被去寺僧曰官人帶被來少王甚恠之寺僧又為借得三兩條與之中夜之間寒甚擁數牀綿被猶不煖盖山頂皆蜥蜴含水吐之為雹少間風雨大作所吐之雹皆不見明日下山則見人言昨夜雹大作問皆如寺中所見者又夷堅志中載劉法師者後居隆興府西山修道山多蜥蜴皆如手臂大與之餅餌皆食一日忽領無限蜥蜴入庵井中之水皆為飲盡飲訖即吐為雹已而風雨大作所吐之雹皆不見明日下山則人言所下之雹皆如蜥蜴所吐者蜥蜴形狀亦如龍是隂屬是這氣相感應使作得他如此正是隂陽交争之時所以下雹時必寒今雹之兩頭皆尖有稜道凝得初間圓上面隂陽交争打得如此碎了雹字從雨從包是這氣包住所以為雹也古今厯家只推筭得个隂陽消長界分耳人傑厯太史公厯書是説太初然却是顓頊四分厯劉歆作三統厯唐一行大衍厯最詳備五代王朴司天考亦簡嚴然一行王朴之厯皆止用之二三年即差王朴厯是七百二十加去季通所用却依康節三百六十數人傑今之造厯者無定法只是趕趂天之行度以求合或過則損不及則益所以多差因言古之鍾律細筭寸分毫釐絲忽皆有定法如合符契皆自然而然莫知所起古之聖人其思之如是之巧然皆非私意撰為之也意古之厯書亦必有一定之法而今亡矣三代而下造厯者紛紛莫有定議愈精愈宻而愈多差由不得古人一定之法也季通嘗言天之運無常日月星辰積氣皆動物也其行度遲速或過不及自是不齊使我之法能運乎天而不為天之所運則其踈宻遲速或過不及之間不出乎我此虚寛之大數縱有差忒皆可推而不失矣何者以我法之有定而律彼之無定自無差也季通言非是天運無定乃其行度如此其行之差處亦是常度但後之造厯者其為數窄狹而不足以包之爾僴問厯法何以推月之大小曰只是以毎月二十九日半六百四十分日之二十九計之觀其合朔為如何如前月大則後月初二日月生明前月小則後月初三日月生明人傑閏餘生於朔不盡周天之氣周天之氣謂二十四氣也月有大小朔不得盡此氣而一嵗日子足矣故置閏揚中氣只在本月若趲得中氣在月盡後月便當置閏揚沈存中欲以節氣定晦朔不知交節之時適在亥此日當如何分方子或説厯四廢日曰只是言相勝者春是庚辛日秋是甲乙日温公潛虚亦是此意人傑五子六甲二五為干二六為支人傑先在先生處見一書先立春次驚蟄次雨水次春分次榖雨次清明云漢厯也揚子升問人言北朝厯與中國厯差一日是否曰只如子正四刻方屬今日子初自屬昨日今人纔交子時便喚做今日如此亦便差一日木之厯數微眇如今下漏一般漏管稍澁則必後天稍濶則必先天未子而子未午而午淵厯法季通説當先論天行次及七政此亦未善要當先論太虚以見三百六十五度四分度之一一一定位然後論天行以見天度加損虚度之嵗分嵗分既定然後七政乃可齊耳道夫或問季通厯法未是曰這都未理㑹得而今須是也㑹布筭也學得似他了把去推測方見得他是與不是而今某自不曾理㑹得如何説得他是與不是這也是康節説恁地若錯時也是康節錯了只是覺得自古以來無一箇人考得到這處然也只在史記漢書上自是人不去考司馬遷班固劉向父子杜佑説都一同不解都不是賀孫陳得一統元厯紹興七八年間作又云局中暗用紀元厯以統元為名文蔚渾儀可取盖天不可用試令主盖天者做一様子如何做只似个雨傘不知如何與地相附著若渾天須做得个渾天來賀孫或録云有能説盖天者欲令作一盖天儀不知可否或云似傘様如此則四旁須有漏風處故不若渾天之可為儀也先生嘗言數家有大小陽九道夫問果爾則有國有家者何貴乎修治曰在我者過得他一二分便足以勝之數道夫問周公定豫州為天地之中東西南北各五千里今北邊無極而南方交趾便際海道里長短夐殊何以云各五千里曰此但以中國地段四方相去言之未說到極邊與際海處南邊雖近海然地形則未盡如海外有島夷諸國則地猶連屬彼處海猶有底至海無底處地形方盡周公以土圭測天地之中則豫州為中而南北東西際天各逺許多至於北逺而南近則地形有偏爾所謂地不滿東南也禹貢言東西南北各二千五百里不知周公何以言五千里今視中國四方相去無五千里想他周公且恁大説教好看如堯舜所都冀州之地去北方甚近是時中國土地甚狹想只是畧相覊縻至夏商已後漸漸開闢如三苗只在今洞庭彭蠡湖湘之間彼時中國已不能到三苗所以也負固不服後來又見先生説崑崙去中國五萬里此為天地之中中國在東南未必有五萬里嘗見佛經説崑崙山頂有阿耨大池水流四靣去其東南入中國者為黄河其二分流為弱水黒水之類又曰自古無人窮至北海想北海只挨著天殻邊過縁北邊地長其勢北海不甚闊地之下與地之四邊皆海水周流地浮水上與天接天包水與地問天有形質否曰無只是氣旋轉得緊如急風然至上面極髙處轉得愈緊若轉纔慢則地便脱墜矣問星辰有形質否曰無只是氣之精英凝聚者或云如燈花否曰然僴地理人言北方土地髙燥恐暑月亦蒸濕何以言之月令云是月也土潤溽暑天氣下降地氣上騰想得春夏間天轉稍慢故氣候緩散昏昏然而南方為尤甚至秋冬則天轉益急故氣候清明宇宙澄曠所以説天髙氣清以其轉急而氣緊也僴海那岸便與天接或疑百川赴海而海不溢曰盖是乾了有人見海邊作旋渦吸水下去者直卿云程子大鑪鞴之説好方子海水無邊那邊只是氣蓄得住揚海水未嘗溢者莊周所謂沃焦土是也徳明潮之遲速大小自有常舊見明州人説月加子午則潮長自有此理沈存中筆談説亦如此徳明陸子静謂潮是子午月長沈存中續筆談之説亦如此謂月在地子午之方初一卯十五酉方子蔡伯靖曰山本同而末異水本異而末同義剛問先生前日言水隨山行何以驗之曰外面底水在山下行中間底水在脊上行因以指為喻曰外面底水在指縫中行中間底水在指頭上行又曰山下有水今浚井底人亦看山脉節冀都是正天地中間好箇風水山脉從雲中發來雲中正髙脊處自脊以西之水則西流入於龍門西河自脊以東之水則東流入于海前面一條黄河環繞右畔是華山聳立為虎自華來至中為嵩山是為前案遂過去為泰山聳於左是為龍淮南諸山是第二重案江南諸山及五嶺又為第三四重案淳義剛同堯都中原風水極佳左河東太行諸山相遶海島諸山亦皆相向右河南遶直至太山湊海第二重自蜀中出湖南出廬山諸山第三重自五嶺至明越又黑水之類自北纒繞至南海泉州常平司有一大圖甚佳揚河東地形極好乃堯舜禹故都今晉州河中府是也左右多山黄河繞之嵩華列其前廣上黨即今潞州春秋赤狄潞氏即其地也以其地極髙與天為黨故曰上黨上黨太行山之極髙處平陽晉州蒲坂山之盡頭堯舜之所都也河東河北諸州如太原晉陽等處皆在山之兩邊窠中山極髙濶伊川云太行千里一塊石山後是忻代諸州泰山却是太行之虎山又問平陽蒲坂自堯舜後何故無人建都曰其地磽瘠不生物人民朴陋儉嗇故惟堯舜能都之後世侈泰如何都得僴河東河北皆遶太行山堯舜禹所都皆在太行下揚太行山一千里河北諸州皆旋其趾潞州上黨在山脊最髙處過河便見太行在半天如黒雲然揚或問天下之山西北最髙曰然自關中一支生下函谷以至嵩山東盡泰山此是一支又自嶓冡漢水之北生下一支至揚州而盡江南諸山則又自岷山分一支以盡乎兩浙閩廣僴江西山皆自五嶺贑上來自南而北故皆逆閩中却是自北而南故皆順揚閩中之山多自北來水皆東南流江浙之山多自南來水多北流故江浙冬寒夏熱僴仙霞嶺在信州分水之右其脊脉發去為臨安又發去為建康義剛江西山水秀拔生出人來便要硬做升卿荆襄山川平曠得天地之中有中原氣象為東南交㑹處耆舊人物多最好卜居但有變則正是兵交之衝又恐無噍類義剛要作地理圖三箇様子一寫州名一寫縣名一寫山川名仍作圖時須用逐州正斜長短濶狹如其地厚糊紙葉子以剪振或問南北對境圖曰天下大川有二止河與江如淮亦小只是中間起北朝混同江却是大川李徳之問薛常州九域圖如何曰其書細碎不是著書手段予決九川距四海了却逐旋爬䟽小江水令至川此是大形勢盖卿先生謂張倅云向於某人家看華夷圖因指某水云此水將有入淮之勢其人曰今其勢已自如此先生因言河本東流入海後來北流當時亦有填河之議今乃向南流矣力行某説道後來黄河必與淮河相並伯恭説今已如此問他如何見得伯恭説見薛某説又曰元豐間河北流自後中原多事後來南流金人亦多事近來又北流見歸正人説或録云因看劉樞家中原圖黄河却自西南貫梁山泊迤邐入淮來祖宗時河北流故金人盛今却南來故其勢亦衰又曰神宗時行淤田䇿行得甚力差官去監那箇水也是肥只是未䝉其利先有衝頽廬舍之患潘子善問如何可治河決之患曰漢人之䇿令兩旁不立城邑不置民居存留些地步與他不與他争放教他寛教他水散漫或流從這邊或流從那邊不似而今作堤去扞他元帝時募善治河決者當時集衆議以此説為善又問河決了中心平處却低如何曰不㑹低他自擇一箇低處去又問雍州是九州那裏髙曰那裏無甚水又曰禹貢亦不可攷其次第却如經量門簿所謂門簿者載此一都有田若干有山若干節御河是太行之水出來甚清周世宗取三關是從御河裏去三四十日取了只曰御河之水清見底後來黄河水衝來濁了曰河北流是禹之故道又曰不是禹之故道近禹之故道節仲黙問有兩漢水如何有一水謂之西漢江曰而今如閬州等處便是東川東川却有一支出來便是西漢江即所謂嘉陵江也義剛南康郡治張齊賢所建盖兩江之咽喉古人做事都有意思又如利州路却有一州在劍閣外方子漢荆州刺史是守襄陽魏晉以後以江陵為荆州節呉大年曰吕䝉城在郢州其城方其中又有數重形址如井今猶存義剛道州即舂陵武帝封子為舂陵王後徙居鄧州至今鄧州亦謂之舂陵義剛漢時人仕宦於𤓰州者更極前面亦有人往長安西門至彼九千九百九十九里揚朱子語類卷二
