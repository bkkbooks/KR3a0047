body:
  text: 朱子語類卷九十八張子書之一凡入近思者為此卷張横渠語錄用關陜方言甚者皆不可曉近思錄所載皆易曉者揚問氣坱然太虛升降飛揚未嘗止息曰此張子所謂虛空即氣也葢天在四畔地居其中減得一尺地遂有一尺氣但人不見耳此是未成形者問虛實以隂陽言否曰以有無言及至浮而上降而下則已成形者若所謂山川之融結糟粕煨燼即是氣之查滓要之皆是示人以理道夫第一卷升降飛揚所以生人物者未嘗止息但人不見耳如望氣者凡氣之災祥皆能見之如龍成五色之類又如昔人有以五色線令人暗中學辨三年而後辨得因論精專讀書德明問此虛實動靜之機隂陽剛柔之始言機言始莫是說理否曰此本只是說氣理自在其中一箇動一箇靜便是機處無非教也教便是說理又曰此等言語都是經鍜鍊底語類熟念細看義剛問游氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義舊聞履之記先生語云游氣紛擾當横看隂陽兩端當直看方見得是否曰也似如此只是晝夜運而無息者便是隂陽之兩端其四邊散出紛擾者便是游氣以生人物之萬殊某常言正如麫磨相似其四邊只管層層撒出正如天地之氣運轉無已只管層層生出人物其中有麄有細故人物有偏有正有精有粗又問氣坱然太虛升降飛揚未嘗止息此是言一氣混沌之初天地未判之時爲復亘古今如此曰只是統說只今便如此問升降者是隂陽之兩端飛揚者是游氣之紛擾否曰此只是說隂陽之兩端下文此虛實動靜之機隂陽剛柔之始此正是說隂陽之兩端到得其感遇聚結爲雨露爲霜雪萬品之流形山川之融結以下却正是說游氣之紛擾者也問虛實動靜之機隂陽剛柔之始兩句欲云虛實動靜乘此氣以爲機隂陽剛柔資此氣以爲始可否曰此兩句只一般實與動便是陽虛與靜便是隂但虛實動靜是言其用隂陽剛柔是言其體而已問始字之義如何曰只是說如箇生物底母子相似萬物都從這裏生出去上文說升降飛揚便含這虛實動靜兩句在裏面了所以虛實動靜隂陽剛柔者便是這升降飛揚者爲之非兩般也至浮而上者陽之清降而下者隂之濁此兩句便是例疑是說生物底則例字問無非教也都是道理在上面發見曰然因引禮記中天道至教聖人至德一段與孔子予欲無言一段天地與聖人都一般精底都從那粗底上發見道理都從氣上流行雖至粗底物無非是道理發見天地與聖人皆然僴問游氣紛擾一段是說氣與理否曰此一段專是說氣未及言理游氣紛擾合而成質者生人物之萬殊此言氣到此已是查滓麄濁者去生人物葢氣之用也其動靜兩端循環不已者立天地之大義此說氣之本上章言氣坱然太虛一段亦是發明此意因說佛老氏却不說著氣以爲此已是查滓必外此然後可以爲道遂至於絶滅人倫外形骸皆以爲不足䘏也銖游氣隂陽隂陽即氣也豈隂陽之外又復有游氣所謂游氣者指其所以賦與萬物一物各得一箇性命便有一箇形質皆此氣合而成之也雖是如此而所謂隂陽兩端成片段滚將出來者固自若也亦猶論太極物物皆有之而太極之體未嘗不存也謨隂陽循環如磨游氣紛擾如磨中出者易曰隂陽相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑此隂陽之循環也乾道成男坤道成女此游氣之紛擾也閎祖循環不已者乾道變化也合而成質者各正性命也譬之樹木其根本猶大義散而成花結實一向發生去是人物之萬殊賀孫問游氣隂陽曰游是散殊比如一箇水車一上一下兩邊只管滚轉這便是循環不已立天地之大義底一上一下只管滚轉中間帯得水灌溉得所在便是生人物之萬殊天地之間二氣只管運轉不知不覺生出一箇人不知不覺又生出一箇物即他這箇斡轉便是生物時節道夫問游氣紛擾生人物之萬殊曰游氣是氣之發散生物底氣游亦流行之意紛擾者參錯不齊既生物便是游氣若是生物常運行而不息者二氣初無増損也㽦問游氣莫便是隂陽横渠如此說似開了曰此固是一物但渠所說游氣紛擾合而成質恰是指隂陽交㑹言之隂陽兩端循環不已却是指那分開底說葢隂陽只管混了闢闢了混故周子云混兮闢兮其無窮兮端䝉横渠言游氣紛擾季通云却不是說混沌未分乃是言隂陽錯綜相混交感而生物如言天地氤氲其下言隂陽兩端却是言分别底上句是體下句是用也端䝉游氣紛擾是隂陽二氣之緖餘循環不已是生生不窮之意㽦叔器問游氣一段曰游氣是裏面底譬如一箇扇相似扇便是立天地之大義底扇出風來便是生人物底義剛問隂陽游氣之辨曰游氣是生物底隂陽譬如扇子扇出風便是游氣義剛問游氣隂陽曰游氣是出而成質曰只是隂陽氣曰然便當初不道合而成質却似有兩般可學横渠言游氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義說得似稍支離只合云隂陽五行循環錯綜升降往來所以生人物之萬殊立天地之大義端䝉横渠謂天體物而不遺猶仁體事而無不在此數句是從赤心片片說出來荀揚豈能到士毅趙共父問天體物而不遺猶仁體事而無不在曰體物猶言爲物之體也葢物物有箇天理體事謂事事是仁做出來如禮儀三百威儀三千須是仁做始得凡言體便是做他那骨子時舉趙共父問天體物而不遺猶仁體事而無不在也以見物物各有天理事事皆有仁曰然天體在物上仁體在事上猶言天體於物仁體於事本是言物以天爲體事以仁爲體緣須著從上說故如此下語致道問與體物而不可遺一般否曰然曰先生易解將幹事說曰幹事猶言爲事之幹體物猶言爲物之體共父問下文云禮儀三百威儀三千無一物而非仁也曰禮儀三百威儀三千然須得仁以爲骨子賀孫問天體物而不遺猶仁體事而無不在何也曰理者物之體仁者事之體事事物物皆具天理皆是仁做得出來仁者事之體體物猶言幹事事之幹也禮儀三百威儀三千非仁則不可行譬如衣服必有箇人著方得且如坐如尸必須是做得凡言體者必是做箇基骨也昊天曰明及爾出王音往言往來游衍無非是理無一物之不體猶言無一物不將這箇做骨端䝉問仁體事而無不在曰只是未理㑹得仁字若理㑹得這一字了則到處都理㑹得今未理㑹得時只是於他處上下文有些相貫底便理㑹得到别處上下文隔遠處便難理㑹今且須記取做箇話頭賀孫錄云千萬記取此是箇話頭久後自然曉得或於事上見得或看讀别文義却自知得道夫賀孫同問物之初生氣日至而滋息此息只是生息之息非止息之息否曰然嘗看孟子言日夜之所息程子謂息字有二義某後來看只是生息道夫至之謂神以其伸也反之謂鬼以其歸也人死便是歸祖考來格便是伸死時便都散了僴横渠言至之謂神反之謂鬼固是然雷風山澤亦有神今之廟貌亦謂之神亦以方伸之氣爲言爾此處要錯綜周徧而觀之伸中有屈屈中有伸便看此意伸中有屈如人有魄是也屈中有伸如鬼而有靈是也問神之伸也其情状可得而知者鬼之歸也如洋洋乎如在其上如在其左右依人而行之類便是其情状否曰鬼神即一樣如何恁地看曰至之謂神如雨露風雷人物動植之類其情状可得而知反之謂鬼則無形状之可求故有此問曰祖考來格便是神之伸也這般處横渠有數說說得好又說得極宻某所以教公多記取前軰語記得多自是通貫又舉横渠謂曰以愽物洽聞之學以稽天窮地之思須是恁地方得用之問性爲萬物之一源曰所謂性者人物之所同得非惟己有是而人亦有是非惟人有是而物亦有是道夫横渠云一故神譬之人身四體皆一物故觸之而無不覺不待心使至此而後覺也此所謂感而遂通不行而至不疾而速也發於心達於氣天地與吾身共只是一團物事所謂鬼神者只是自家氣自家心下思慮纔動這氣即敷於外自然有所感通賀孫或問一故神曰一是一箇道理却有兩端用處不同譬如隂陽隂中有陽陽中有隂陽極生隂隂極生陽所以神化無窮去僞問一故神曰横渠說得極好須當子細看但近思錄所載與本書不同當時緣伯恭不肯全載故後來不曾與他添得一故神横渠親注云兩在故不測只是這一物却周行乎事物之間如所謂隂陽屈伸往來上下以至於行乎什伯千萬之中無非這一箇物事所以謂兩在故不測兩故化注云推行乎一凡天下之事一不能化惟兩而後能化且如一隂一陽始能化生萬物雖是兩箇要之亦是推行乎此一爾此說得極精須當與他子細看道夫林問一故神兩故化此理如何曰兩所以推行乎一也張子言一故神兩在故不測兩故化推行於一謂此兩在故一存也兩不立則一不可見一不可見則兩之用或幾乎息矣亦此意也如事有先後才有先便思量到末後一段此便是兩如寒則暑便在其中晝則夜便在其中便有一寓焉㝢一故神兩故化兩者隂陽消長進退兩者所以推行於一一所以爲兩一不立則兩不可得而見兩不可見則一之道息矣横渠此說極精非一則隂陽消長無自而見非隂陽消長則一亦不可得而見矣神化二字雖程子說得亦不甚分明惟是横渠推出來淵錄云前人都說不到推行有漸爲化合一不測爲神又曰一故神兩在故不測兩故化言兩在者或在隂或在陽在隂時全體都是隂在陽時全體都是陽化是逐一挨將去底一日復一日一月復一月節節挨將去便成一年這是化直卿云一故神猶一動一靜互爲其根兩故化猶動極而靜靜極復動方子横渠語曰一故神自注云兩在故不測又曰兩故化自注云推行於一是在陽又在隂無這一則兩便不能以推行兩便即是這箇消長又是化又是推行之意又曰横渠此語極精見李先生說云舊理㑹此叚不得終夜椅上坐思量以身去裏面體方見得平穩每看道理處皆如此某時爲學雖畧理㑹得有不理㑹得處便也恁地過了及見李先生後方知得是恁地下工夫又曰某今見得這物事了覺得見好則劇相似舊時未理㑹得是下了多少工夫而今學者却恁地泛泛然都没𦂳要不把當事只是謾學理㑹得時也好理㑹不得時也不妨恁地如何得須是如射箭相似把著弓須是射得中方得惟心無對心統性情二程却無一句似此切方子心統性情統猶兼也升卿心統性情性情皆因心而後見心是體發於外謂之用孟子曰仁人心也又曰惻隱之心性情上都下箇心字仁人心也是說體惻隱之心是說用必有體而後有用可見心統性情之義僴問心統性情曰性者理也性是體情是用性情皆出於心故心能統之統如統兵之統言有以主之也且如仁義禮智是性也孟子曰仁義禮智根於心惻隱羞惡辭遜是非本是情也孟子曰惻隱之心羞惡之心辭遜之心是非之心以此言之則見得心可以統性情一心之中自有動靜靜者性也動者情也卓問心統性情統如何曰統是主宰如統百萬軍心是渾然底物性是有此理情是動處又曰人受天地之中只有箇心性安然不動情則因物而感性是理情是用性靜而情動且如仁義禮智信是性然又有說仁心義心這是性亦與心通說惻隱羞惡辭遜是非是情然又說道惻隱之心羞惡之心是非之心這是情亦與心通說這是情性皆主於心故恁地通說問意者心之所發與情性如何曰意也與情相近問志如何曰志也與情相近只是心寂然不動方發出便喚做意横渠云志公而意私看這自說得好志便清意便濁志便剛意便柔志便有立作意思意便有潜竊意思公自子細看自見得意多是說私意志便說匹夫不可奪志賀孫心統性情者也寂然不動而仁義禮智之理具焉動處便是情有言靜處便是性動處是心如此則是將一物分作兩處了心與性不可以動靜言凡物有心而其中必虛如飲食中雞心猪心之屬切開可見人心亦然只這些虚處便包藏許多道理彌綸天地該括古今推廣得來葢天葢地莫不由此此所以爲人心之妙歟理在人心是之謂性性如心之田地充此中虚莫非是理而已心是神明之舍爲一身之主宰性便是許多道理得之於天而具於心者發於智識念慮處皆是情故曰心統性情也謨横渠云心統性情葢好善而惡惡情也而其所以好善而惡惡性之節也且如見惡而怒見善而喜這便是情之所發至於喜其所當喜而喜不過謂如人有三分合喜底事我却喜至七八分便不是怒其所當怒而怒不遷謂如人有一分合怒底事我却怒至三四分便不是以至哀樂愛惡欲皆能中節而無過這便是性道夫先生取近思錄指横渠心統性情之語以示學者力行問曰心之未發則屬乎性既發則情也曰是此意因再指伊川之言曰心一也有指體而言者有指用而言者力行季通云心統性情不若云心者性情之統名端蒙横渠言凡物莫不有性由通蔽開塞所以有人物之别由蔽有厚薄故有智愚之别似欠了生知之聖端䝉横渠此叚不如吕與叔分别得分曉吕曰蔽有淺深故爲昏明蔽有開塞故爲人物閎祖或問通蔽開塞張横渠吕芸閣說孰爲親切曰與叔倒分明似横渠之說看來塞中也有通處如猿狙之性即靈猪則全然蠢了便是通蔽不同處本乎天者親上本乎地者親下如人頭向上所以最靈草木頭向下所以最無知禽獸之頭横了所以無知猿狙稍靈爲他頭有時也似人故稍向得上履孫敬子問精義入神事豫吾内求利吾外也求字似有病便有箇先獲底心精義入神自然是能利吾外何待於求曰然當云所以利吾外也李又曰繫辭此已上四節都是說咸卦葢咸只是自家感之他便應非是有心於求人之應也如上文徃來屈伸皆是此意僴第二卷精熟義理而造於神事素定乎内而乃所以求利乎外也通達其用而身得其安素利乎外而乃所以致養其内也葢内外相應之理端䝉問精義入神一條曰入神是入至於微妙處此却似向内做工夫非是作用於外然乃所以致用於外也故嘗謂門人曰吾學既得於心則脩其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已横渠可謂精義入神横渠云隂陽二氣推行以漸謂化闔闢不測謂神伊川先生說神化等却不似横渠較說得分明賀孫事豫吾内事未至而先知其理之謂豫學履用之問德不勝氣性命於氣德勝於氣性命於德前日見先生說以性命之命爲聽命之命適見先生舊答潘恭叔書以命與性字只一般如言性與命也所以後面分言性天德命天理不知如何曰也是如此但命字較輕得些僴問若將性命作兩字看則於氣於徳字如何地說得來則當云性命皆由於氣由於徳始得曰横渠文自如此僴德性若不勝那氣稟則性命只由那氣德性能勝其氣則性命都是那德兩者相爲勝負葢其禀受之初便如此矣然亦非是元地頭不渾全只是氣禀之偏隔著故窮理盡性則善反之功也性天德命天理則無不是元來至善之物矣若使不用修爲之功則雖聖人之才未必成性然有聖人之才則自無不修爲之理端蒙問德不勝氣一章曰張子只是說性與氣皆從上面流下來自家之德若不能有以勝其氣則祗是承當得他那所賦之氣若是德有以勝其氣則我之所以受其賦予者皆是德故窮理盡性則我之所受皆天之德其所以賦予我者皆天之理氣之不可變者惟死生脩夭而已葢死生脩夭富貴貧賤這却還他氣至義之於君臣仁之於父子所謂命也有性焉君子不謂命也這箇却須由我不由他了道夫問窮理盡性則性天德命天理這處性命如何分别曰性是以其定者而言命是以其流行者而言命便是水恁地流底性便是將椀盛得來大椀盛得多小椀盛得少淨潔椀盛得清汙漫椀盛得濁賀孫横渠言形而後有氣質之性善反之則天地之性存焉又曰德不勝氣性命於氣德勝其氣性命於德又曰性天德命天理葢人生氣禀自然不同天非有殊人自異禀有學問之功則性命於德不能學問然後性命惟其氣禀耳曰從前看性命於德一句意謂此性由其德之所命今如此云則是性命二字皆是德也曰然力行横渠云所不可變者惟壽夭耳要之此亦可變但大㮣如此力行問莫非天也是兼統善惡而言否曰然正所謂善固性也然惡亦不可不謂之性二者皆出於天也陽是善隂是惡陽是强隂是弱陽便清明隂便昏濁大抵隂陽有主對待而言之者如陽是仁隂是義之類這又别是一様是專就善上說未有那惡時底說話頃之復曰程先生云視聽思慮動作皆天也人但於其中要識得真與妄爾道夫陽明勝則德性用隂濁勝則物欲行只將自家意思體騐便見得人心虚靜自然清明才爲物欲所蔽便隂隂地黑暗了此隂濁所以勝也謨大其心則能體天下之物世人之心止於見聞之狹故不能體天下之物唯聖人盡性故不以所見所聞牿其心故大而無外其視天下無一物非我他只是說一箇大與小孟子謂盡心則知性知天以此葢盡心則只是極其大心極其大則知性知天而無有外之心矣道夫問今未到聖人盡心處則亦莫當推去否曰未到那裏也須知說聞見之外猶有我不聞不見底道理在若不知聞見之外猶有道理則亦如何推得要之此亦是横渠之意然孟子之意則未必然道夫曰孟子本意當以大學或問所引爲正曰然孟子之意只是說窮理之至則心自然極其全體而無餘非是要大其心而後知性知天也道夫曰只如横渠所說亦自難下手曰便是横渠有時自要恁地說似乎只是懸空想像而心自然大至極處元只是格物多後自然豁然有箇貫通處這便是下學而上達也孟子之意只是如此道夫大其心則能遍體天下之物體猶仁體事而無不在言心理流行脉絡貫通無有不到苟一物有未體則便有不到處包括不盡是心爲有外葢私意間隔而物我對立則雖至親且未必能無外矣故有外之心不足以合天心端䝉問物有未體則心爲有外此體字是體察之體否曰須認得如何喚做體察今官司文書行移所謂體量體䆒是這様體字或曰是將自家這身入那事物裏面去體認否曰然猶云體羣臣也伊川曰天理二字却是自家體貼出來是這様體字僴問物有未體則心爲有外體之義如何曰此是置心在物中䆒見其理如格物致知之義與體用之體不同木之横渠云物有未體則心爲有外又曰有外之心不足以合天心葢天大無外物無不包物理所在一有所遺則吾心爲有外便與天心不相似道夫世人之心止於見聞之狹聖人盡性不以見聞牿其心伯豐問如何得不以見聞牿其心曰張子此說是說聖人盡性事如今人理㑹學須是有見聞豈能舍此先是於見聞上做功夫到然後脫然貫通葢尋常見聞一事只知得一箇道理若到貫通便都是一理曾子是已盡性是論聖人事􅓌問有外之心曰十分事做得七八分便是有外所以致知格物者要得無外也䕫孫或問如何是有外之心曰只是有私意便内外扞格只見得自家身已凡物皆不與已相關便是有外之心横渠此說固好然只管如此說相將便無規矩無歸著入於邪遁之說且如夫子爲萬世道德之宗都說得語意平易從得夫子之言便是無外之實若便要說天大無外則此心便瞥入虛空裏去了學䝉横渠言爲德辨爲感速辨猶子細感速言我之感發速也端䝉息有養瞬有存言一息之間亦有養一瞬之頃亦有存如造次顛沛必於是之意但說得太緊端蒙西銘一篇首三句却似人做破題天地之塞帥兩句恰似人做原題乃一篇緊要處民吾同胞至無告者也乃統論如此于時保之以下是做工夫䖏端䝉乾稱父坤稱母厲聲言稱字又曰以主上爲我家裏兄子得乎節西銘解義云乾者健而無息之謂坤者順而有常之謂問此便是陽動隂靜否曰此是陽動隂靜之理端䝉混然中處言混合無間葢此身便是從天地來端蒙天地之塞吾其體天地之帥吾其性塞如孟子說塞乎天地之間塞只是氣吾之體即天地之氣帥是主宰乃天地之常理也吾之性即天地之理賀孫吾其體吾其性有我去承當之意謨或問天地之帥吾其性先生解以乾健坤順爲天地之志天地安得有志曰復其見天地之心天地之情可見安得謂天地無心情乎或曰福善禍滛天之志否曰程先生說天地以生物爲心最好此乃是無心之心也人傑傑西銘大要在天地之塞吾其體天地之帥吾其性兩句塞是說氣孟子所謂以直養而無害則塞乎天地之間即用這箇塞字張子此篇大抵皆古人說話集來要知道理只有一箇道理中間句句叚叚只說事親事天自一家言之父母是一家之父母自天下言之天地是天下之父母通是一氣初無間隔民吾同胞物吾與也萬物雖皆天地所生而人獨得天地之正氣故人爲最靈故民同胞物則亦我之儕軰孟子所謂親親而仁民仁民而愛物其等差自然如此大抵即事親以明事天賀孫問兩銘之義曰緊要血脉盡在天地之塞吾其體天地之帥吾其性兩句上上面乾稱父至混然中處是頭下面民吾同胞物吾與也便是箇項下面便撒開說說許多大君者吾父母宗子云云盡是從民吾同胞物吾與也說來到得知化則善述其事窮神則善繼其志這志便只是那天地之帥吾其性底志爲人子便要述得父之事繼得父之志如此方是事親如事天便要述得天之事繼得天之志方是事天若是違了此道理便是天之悖德之子若害了這仁便是天之賊子若是濟惡不悛便是天之不才之子若能踐形便是天地克肖之子這意思血脉都是從天地之塞吾其體天地之帥吾其性說緊要都是這兩句若不是此兩句則天自是天我自是我有何干渉或問此兩句便是理一處否曰然僴問西銘自乾稱父坤稱母至民吾同胞物吾與也處是仁之體于時保之以下是做工夫處曰若言同胞吾與了便說著博施濟衆却不是所以只說教人做工夫處只在敬與恐懼故曰于時保之子之翼也能常敬而恐懼則這箇道理自在又曰因事親之誠以明事天之道只是譬喻出來下面一句事親一句事天如匪懈無忝是事親不愧屋漏存心養性是事天下面說事親兼常變而言如曾子是常舜伯竒之徒皆變此在人事言者如此天道則不然直是順之無有不合者又問理一而分殊言理一而不言分殊則爲墨氏兼愛言分殊而不言理一則爲楊氏爲我所以言分殊而見理一底自在那裏言理一而分殊底亦在不相夾雜子䝉林聞一問西銘只是言仁孝繼志述事曰是以父母比乾坤主意不是說孝只是以人所易曉者明其所難曉者耳木之問西銘說潁封人之錫類申生其恭二子皆不能無失處豈能盡得孝道曰西銘本不是說孝只是說事天但推事親之心以事天耳二子就此處論之誠是如此葢事親却未免有正有不正處若天道純然則無正不正之處只是推此心以奉事之耳㝢問西銘無所逃而待烹申生未盡子道何故取之先生曰天不到得似獻公也人有妄天則無妄若教自家死便是理合如此只得聽受之䕫孫答叔京參乎伯奇之語天命無妄父母之命有時而出於人欲之私方西銘要句句見理一而分殊文蔚西銘通體是一箇理一分殊一句是一箇理一分殊只先看乾稱父三字一篇中錯綜此意或問西銘理一而分殊曰今人說只說得中間五六句理一分殊據某看時乾稱父坤稱母直至存吾順事没吾寧也句句皆是理一分殊喚做乾稱坤稱便是分殊如云知化則善述其事是我述其事窮神則善繼其志是我繼其志又如存吾順事沒吾寧也以自家父母言之生當順事之死當安寧之以天地言之生當順事而無所違拂死則安寧也此皆是分殊處逐句渾淪看便見理一當中横截斷看便見分殊因問如先生後論云推親親之恩以示無我之公因事親之誠以明事天之實看此二句足以包括西銘一篇之統體可見得理一分殊處分曉曰然又云以人之自有父母言之則一家之内有許多骨肉宗族如民吾同胞物吾與也大君者吾父母宗子以下却是以天地爲一大父母與衆人所共底也燾道夫言看西銘覺得句句是理一分殊曰合下便有一箇理一分殊從頭至尾又有一箇理一分殊是逐句恁地又曰合下一箇理一分殊截作兩叚只是一箇天人道夫曰他說乾稱父坤稱母予兹藐焉乃混然中處如此則是三箇曰混然中處則便是一箇許多物事都在我身中更那裏去討一箇乾坤問塞之與帥二字曰塞便是充塞天地之塞帥便是志者氣之帥之帥問物吾與也莫是黨與之與曰然道夫西銘一篇始末皆是理一分殊以乾爲父坤爲母便是理一而分殊予兹藐焉混然中處便是分殊而理一天地之塞吾其體天地之帥吾其性分殊而理一民吾同胞物吾與也理一而分殊逐句推之莫不皆然某於篇末亦嘗發此意乾父坤母皆是以天地之大喻一家之小乾坤是天地之大父母是一家之小大君大臣是大宗子家相是小類皆如此推之舊嘗看此寫作旁通圖子分爲一截上下排布亦甚分明謨一之問西銘理一而分殊曰西銘自首至末皆是理一而分殊乾父坤母固是一理分而言之便見乾坤自乾坤父母自父母惟稱字便見異也又問自惡㫖酒至勇於從而順令此六聖賢事可見理一分殊乎曰惡㫖酒育英才是事天顧養及錫類則是事親每一句皆存兩義推類可見問天地之塞如何是塞曰塞與帥字皆張子用字之妙處塞乃孟子塞天地之間體乃孟子氣體之充者有一毫不滿不足之處則非塞矣帥即志氣之帥而有主宰之意此西銘借用孟子論浩然之氣處若不是此二句爲之關紐則下文言同胞言兄弟等句在他人中物皆與我初何干渉其謂之兄弟同胞乃是此一理與我相爲貫通故上說父母下說兄弟皆是其血脉過度處西銘解二字只說大㮣若要說盡須因起䟽注可也㝢問西銘分殊處曰有父有母有宗子有家相此即分殊也節西銘大綱是理一而分自爾殊然有二說自天地言之其中固自有分别自萬殊觀之其中亦自有分别不可認是一理了只滾做一看這裏各自有等級差别且如人之一家自有等級之别所以乾則稱父坤則稱母不可棄了自家父母却把乾坤做自家父母看且如民吾同胞與自家兄弟同胞又自别龜山疑其兼愛想亦未深曉西銘之意西銘一篇正在天地之塞吾其體天地之帥吾其性兩句上敬仲問西銘曰更須子細看他說理一而分殊而今道天地不是父母父母不是天地不得分明是一理乾道成男坤道成女則凡天下之男皆乾之氣凡天下之女皆坤之氣從這裏方徹上徹下都即是一箇氣都透過了又曰繼之者善便是公共底成之者性便是自家得底只是一箇道理不道是這箇是那箇不是如水中魚肚中水便只是外面水賀孫問西銘理一而分殊分殊莫是民吾同胞物吾與也之意否曰民物固是分殊須是就民物中又知得分殊不是伊川說破也難理㑹然看久自覺裏面有分别用之問西銘所以理一分殊如民物則分同胞吾與大君家相長幼殘疾皆自有等差又如所以事天所以長長幼幼皆是推事親從兄之心以及之此皆是分殊處否曰也是如此但這有兩種看這是一直看下更須横截看若只恁地看怕淺了民吾同胞同胞裏面便有理一分殊底意物吾與也吾與裏面便有理一分殊底意乾稱父坤稱母道是父母固是天氣而地質然與自家父母自是有箇親踈從這處便理一分殊了看見伊川說這意較多龜山便正是疑同胞吾與爲近於墨氏不知他同胞吾與裏面便自分理一分殊了如公所說恁地分别分殊殊得也不大叚這處若不子細分别直是與墨氏兼愛一般賀孫卓錄云劉用之問西銘理一而分殊若大君宗子大臣家相與夫民物等皆是理一分殊否曰如此看亦是但未深當截看如西銘劈頭來便是理一而分殊且乾稱父坤稱母雖以乾坤爲父母然自家父母自有箇親踈這是理一而分殊等而下之以至爲大君爲宗子爲大臣家相若理則一其分未嘗不殊民吾同胞物吾黨與皆是如此龜山正疑此一著便以民吾同胞物吾黨與近于墨氏之兼愛不知他同胞同與裏面便有箇理一分殊若如公所說恁地分别恐勝得他也不多這處若不分别直是與墨子兼愛一般問西銘句句是理一分殊亦只就事天事親處分否曰是乾稱父坤稱母只下稱字便别這箇有直說底意思有横說底意思理一而分殊龜山說得又别他只以民吾同胞物吾與及長長幼幼爲理一分殊曰龜山是直說底意思否曰是然龜山只說得頭一小截伊川意則闊大統一篇言之曰何謂横說底意思曰乾稱父坤稱母是也這不是即那事親底便是事天底曰横渠只是借那事親底來形容事天做箇様子否曰是淳問向日曾以西銘仁孝之理請問先生令截斷横看文蔚後來見得孝是發見之先仁是天德之全事親如事天即是孝自此推之事天如事親即仁矣老吾老幼吾幼自老老幼幼之心推之至於疲癃殘疾皆如吾兄弟顛連而無告方始盡故以敬親之心不欺闇室不愧屋漏以敬其天以愛親之心樂天循理無所不順以安其天方始盡性竊意横渠大意只是如此不知是否曰他不是說孝是將孝來形容這仁事親底道理便是事天底樣子人且逐日自把身心來體察一遍便見得吾身便是天地之塞吾性便是天地之帥許多人物生於天地之間同此一氣同此一性便是吾兄弟黨與大小等級之不同便是親踈遠近之分故敬天當如敬親戰戰兢兢無所不至愛天當如愛親無所不順天之生我安頓得好令我富貴崇高便如父母愛我當喜而不忘安頓得不好令我貧賤憂戚便如父母欲成就我當勞而不怨徐子融曰先生謂事親是事天底樣子只此一句說盡西銘之意矣文蔚西銘有箇劈下來底道理有箇横截斷底道理直卿疑之竊意當時語意似謂每句直下而觀之理皆在焉全篇中斷而觀之則上專是事天下專是事親各有攸屬方子聖人之於天地如孝子之於父母西銘升卿西銘說是形化底道理此萬物一源之性太極者自外而推入去到此極盡更没去處所以謂之太極謨問西銘帥揔心性言與如與國相與之類于時保之畏天不憂樂天賊賊子濟惡積惡化有迹神無迹㫖酒欲也不弛勞横渠解無施勞亦作弛豫如後漢書言天意未豫方龜山有論西銘一書皆非終不識理一至於稱物平施亦說不著易傳說是大抵西銘前三句便是綱要了得即句句上自有理一分殊後來已有一篇說了方云指其名者分之殊推其同者理之一方林子武問龜山語錄曰西銘理一而分殊知其理一所以爲仁知其分殊所以爲義先生曰仁只是流出來底便是仁各自成一箇物事或便是義仁只是那流行處義是合當做處仁只是發出來底及至發出來有截然不可亂處便是義且如愛其親愛兄弟愛親戚愛鄉里愛宗族推而大之以至於天下國家只是這一箇愛流出來而愛之中便有許多等差且如敬只是這一箇敬便有許多合當敬底如敬長敬賢便有許多分别又問禮先生曰以其事物之宜之謂義義之有節文之謂禮且如諸侯七廟大夫五廟士二這箇便是禮禮裏面便有義所以說天命之謂性率性之謂道修道之謂教如中庸集畧吕與叔所云自是合當恁地知得親之當愛子之當慈這便是仁至於各愛其親各慈其子這便是義這一箇物事分不得流出來底便是仁仁打一動便是義禮智信當來不是要仁使時仁來用要義使時義來用只是這一箇道理流出去自然有許多分别且如心性情而今只略略動著便有三箇物事在那裏其實只是一箇物虛明而能應物者便是心應物有這箇道理便是性㑹做出來底便是情這只一箇物事義剛龜山說理一似未透據老幼及人一句自將分殊都說了但其意以老幼互相推及所以然者同類也但施置有先後耳又因說我老老幼幼他亦老老幼幼互相推及天下豈有不治此便是絜矩之道方謝艮齋說西銘理一分殊在上之人當理㑹理一在下之人當理㑹分殊如此是分西銘做兩節了艮齋看得西銘錯先生以爲然泳問東銘曰此正如今法書所謂故失兩字因令道夫冩作圖子看戲言出於思也戲動作於謀也發於聲支見乎四謂非已心不明也欲人無已疑不能也過言非心也過動非誠也失於聲四體謬迷其謂已當然自誣也欲他人已從誣人也或者謂出于心者歸咎爲已戲失于思者自誣爲已誠不知戒其出汝者歸咎其不出汝者長遂且傲非不智孰甚焉問横渠語范巽之一叚如何曰惟是今人不能脫然如大寐之得醒只是捉道理說要之也說得去只是不透徹又曰正要常存意使不忘他釋氏只是如此然他逼拶得又緊直卿曰張子語比釋氏更有窮理工夫在曰工夫固自在也須用存意問直卿如何說存意不忘曰只是常存不及古人意曰設此語者只不要放倒此意爾道夫横渠未能立心惡思多之致疑此說甚好便見有次序處必犬錄云葢云事固當考索然心未有主却泛然理會不得若是思慮紛然趨向未定未有箇主宰如何地講學㽦問未知立心惡思多之致疑既知所以立惡講治之不精一章曰未知立心則或善或惡故胡亂思量惹得許多疑起既知所立則是此心已立於善而無惡便又惡講治之不精又却用思講治之思莫非在我這道理之内如此則雖勤而向厭所以急於可欲者葢急於可欲之善則便是無善惡之雜便是立吾心於不疑之地人之所以有疑而不果於爲善者以有善惡之雜今既有善而無惡則若決江河以利吾往矣遜此志務時敏雖是低下著這心以順他道理又却抖擻起那精神敏速以求之則厥脩乃來矣這下面云云只是說一敏字道夫心大則百物皆通通只是透得那道理去病則是窒礙了端䝉居甫問心小則百物皆病如何是小曰此言狹隘則事有窒礙不行如仁則流於姑息義則入於殘暴皆見此不見彼可學合内外平物我此見道之大端葢道只是致一公平之理而已端䝉問横渠物怪神姦書先生提出守之不失一句曰且要守那定底如精氣爲物游魂爲變此是鬼神定說又如孔子說非其鬼而祭之諂也敬鬼神而遠之等語皆是定底其他變處如未曉得且當守此定底如前晚說怪便是變處淳第三卷横渠所謂物怪神姦不必辨且只守之不失如精氣爲物游魂爲變此是理之常也守之勿失者以此爲正且恁地去他日當自見也若要之無窮求之不可知此又溺於茫昧不能以常理爲主者也伯有爲厲别是一種道理此言其變如世之語妖妄者也謨問顔子心麄之說恐太過否曰顔子比之衆人純粹比之孔子便麄如有不善未嘗不知知之未嘗復行是他細膩如此然猶有這不善便是麄伊川說未能不勉而中不思而得便是過一叚說得好淳近思錄云顔子心麄顔子尚有此語人有一毫不是便是心麄夀昌問横渠說客慮多而常心少習俗之心勝而實心未完所謂客慮與習俗之心有分别否曰也有分别客慮是泛泛思慮習俗之心便是從來習染偏勝底心實心是義理底心僴第四卷問敦篤虛靜者仁之本曰敦篤虛靜是爲仁之本僩問湛一氣之本攻取氣之欲曰湛一是未感物之時湛然純一此是氣之本攻取如目之欲色耳之欲聲便是氣之欲曰攻取是攻取那物否曰是淳第五卷問横渠謂世之病難行者以亟奪富人之田爲辭然處之有術期以數年不刑一人而可復不審井議之行於今果如何曰講學時且恁講若欲行之須有機㑹經大亂之後天下無人田盡歸官方可給與民如唐口分世業是從魏晉積亂之極至元魏及北齊後周乘此機方做得荀悅漢紀一叚正說此意甚好若平世則誠爲難行黄丈問東坡破此論只行限田之法如何曰都是胡說作事初如雷霆霹靂五年後猶放緩了况限田之法雖舉於今明年便淡似今年後年又淡似明年一年淡一年便寢矣若欲行之須是行井田若不能行則且如今之俗必欲舉限田之法此之謂戲論且役法猶行不得往年貴賤通差縣吏呈單子首曰第一都保正蔣芾因此不便竟罷况於田如何限得林勲本政書一生留意此事後在廣中作守畫作數井然廣中無人煙可以如此淳義剛錄别出第九卷安卿問横渠復井田之說如何曰這箇事某皆不曾敢深考而今只是差役尚有萬千難行處莫道便要奪他田他豈肯且如壽皇初要令官戸亦作保正其時蔣侍郎作保正遂令人書保正蔣芾後來此令竟不行且如今有一大寄居作保正縣道如何敢去追他家人或又說將錢問富人買田來均不知如何得許多錢荀悅便道行井田須是大亂之後如高光之時殺得無人後田便無歸從而來均此說也是義剛問東坡限田之說如何曰那箇只是亂說而今立法如霹靂後三五年去便放緩了今立限田時直是三二十年事到那時去又不知如何而今若要行井田則索性火急做若不行且依而今樣那限田只是箇戲論不可行林勲作本政書一生留意此事後守廣郡亦畫得數井然廣中無人煙可以如此義剛横渠若制井田畢竟繁使伊川爲之必簡易通暢觀古不必驗之言可見方問横渠言有無諸子之陋也曰無者無物却有此理有此理則有矣老氏乃云無生於有有生於無和理也無便錯了可學第十三卷朱子語類卷九十八
