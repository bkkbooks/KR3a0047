body:
  text: 朱子語類儒家類提要臣等謹案朱子語類一百四十卷宋咸淳庚午導江黎靖徳編初朱子與門人問荅之語門人各録成編嘉定乙亥李道傳輯廖徳明等三十二人所記為四十三卷又續增張洽録一卷刻于池州曰池録嘉熙戊戌道傳之弟性𫝊續蒐黄榦等四十二人所記為四十六卷刋于饒州曰饒録淳祐己酉蔡抗又裒楊方等三十二人所記為二十六卷亦刋于饒州曰饒後録咸淳乙丑吳堅採三録所餘者二十九家又增入未刋四家為二十卷刋于建安曰建録其分類編輯者則嘉定己卯黄士毅所編凡百四十卷史公説刋于眉州曰蜀本又淳祐壬子王佖續編四十卷刋于徽州曰徽本諸本既互有出入其後又翻刻不一訛舛滋多靖徳乃裒而編之刪除重複一千一百五十餘條分為二十六門頗清整易觀其中門人意為增減敘述不確者如包揚録中論胡子知言以書為溺心志之大穽之類槩為刋削亦深有功于朱子靖徳目録後記有曰朱子嘗言論語後十篇不及前六言六蔽不似聖人法語是孔門所記猶可疑而况後之書乎觀其所言則今他書間𫝊朱子之語而不見于語類者葢多為靖徳所刪削鄭任鑰不知此意乃以四書大全所引不見今本語類者指為或問小注之証其亦不考之甚矣乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀朱子語類原序晦庵朱先生所與門人問答門人退而私竊記之先生没其書始出記錄之語未必盡得師𫝊之本㫖而更相傳寫又多失其本真甚或輒自刪改雜亂訛舛幾不可讀李君道傳貫之自蜀來仕于朝博求先生之遺書與之游者亦樂為之搜訪多得記錄者之初本其後出守儀真持庾節於池陽又與潘時舉葉賀孫諸嘗從游於先生之門者互相讎校重複者削之訛謬者正之有别錄者有不必錄者隨其所得為卷帙次第凡三十有三家繼此有得者又將以附于後時以備散失廣其𫝊耳先生之著書多矣教人求道入德之方備矣師生函丈間往復詰難其辨愈詳其義愈精讀之竦然如侍燕閒承謦欬也厯千載而如㑹一堂合衆聞而悉歸一已是書之傳豈小補哉貫之既以鋟諸木以榦與聞次輯而俾述其意云嘉定乙亥十月朔旦門人黄榦謹書嘉定乙亥嵗仲兄文惠公持節江左取所傳朱文公先生語錄鋟木池陽凡三十有三家其書盛行性傳被命造朝益加搜訪由丙戌至今得四十有一家率多初本去其重複正其訛舛第其嵗月刻之鄱陽學宫復考池錄所餘多可傳者因取以附其末合池錄與今錄凡先生平生所與學者談經論事之語十得其九嗣有所得尚續刋之池錄之行也文肅黃公直卿既為之序其後書與伯兄乃殊不滿意且謂不可以隨時應荅之語易平生著述之書性傳謂記者易差自昔而然河南遺書以李端伯師說為首盖端伯所記伊川先生嘗稱其最得明道先生之㫖故也至論浩氣一條所謂以直養而無害云者伊川乃深不謂然端伯猶爾况於其他直卿之云真是也然嘗聞和靖先生稱伊川之語曰某在何必觀此書而文公先生之言則曰伊川在何必觀伊川亡則不可以不觀矣盖亦在乎學者審之而已先生家禮成於乾道庚寅通鑑綱目西銘解義成於壬辰太極通書義成於癸巳論孟註問詩集傳成於淳熈丁酉易本義啓蒙成於乙巳丙午之間大學中庸章句或問成書雖乆至己酉乃始序而傳之楚辭集註韓文考異成於慶元乙卯禮書雖有綱目脫藁者僅二十有三篇其著書嵗月次第可考也家禮編成而逸既殁而其書出與晩嵗之說不合先生盖未嘗為學者道也語孟中庸大學四書後多更定今大學誠意章盖未易簀前一夕所改也是四書者覃思最乆訓釋最精明道傳世無復遺藴至其他書盖未及有所筆削獨見於疑難荅問之際多所異同而易書為甚㬊淵所錄一編與本義異者十之三四大率多合先君文昭本傳之說文昭謂乾坤之用主於誠敬坎離之用主於誠明世未有通其義者而先生獨稱之其不執一說惟是之從如此故愚謂語錄與四書異者當以書為正而論難往復書所未及者當以語為助與詩易諸書異者在成書之前亦當以書為正而在成書之後者當以語為是學者類而求之斯得之矣不特此也先生平日論事甚衆規恢其一也至其暮年乃謂言規恢於紹興之間者為正言規恢於乾道以後者為邪非語錄所載後人安得而知之是編也真不為無益而學者不可以不之讀也先生又有别錄十卷所譚者炎興以來大事為其多省中語未敢𫝊而卯火亡之今所存者幸亦一二焉嘉熙戊戌月正元日後學三嵎李性傳書鄱陽所刋先師文公朱先生語錄固欲續池錄所未備然先師之言滿天下二錄所收亦豈能遽盡哉淳祐戊申抗將指江東鄱陽洪叔魯芹以其外大父吏部楊公方手所錄寒泉語見示既又於安仁湯叔遜次得其家藏包公揚所錄二公在師門為前輩所錄尚未編入則所遺者亦多矣繼而東陽王元敬佖亦以所集刋本見寄又得里中朋友所傳一二家乃悉以次編入為二十六卷先師之緒言雖未敢謂無復遺逸然所㑹稡益富矣獨念先師又有親自删定與先大父西山講論之語及性與天道之妙名曰翁季錄者久未得出以流行於世豈斯文之顯晦固自有時乎竊尤有感於此故輒併識其拳拳之意云淳祐己酉中秋日門人建安蔡抗書子朱子語錄行於世尚矣池錄三十有三家鄱本續錄四十有二家其三十四家池本所未有也再見者兩家錄餘凡六家又後錄二十三家其二十家亦池本所未有也再見者三家合三錄為八十七家及門之士固有如謝先生在程門無錄者其有錄可傳者既如此矣堅末學生晩嘉定癸未甲申間侍先君子官長沙帥西山真先生倅𢎞齋李先生常進之函丈又事長沙舒先生列岳麓諸生果齋李先生過潭又獲侍講席焉果齋先君子畏友也嘗介以登朱子之門堅繇是多見未行語錄手抄盈篋凡六十五家今四十年矣晚得池鄱本參攷刋者固已多然黄士毅所錄朱子親筆所改定者已見於輔廣錄中其所自錄及師言則亦三錄所未有若李壯祖張洽郭逍遥所錄亦未有也朅來閩中重加㑹稡以三錄所餘者二十九家及增入未刋者四家自為别集以附續錄後集之末泰華髙矣滄海深矣非有待增益也獨念蚤所聞於父師者罔敢失墜今幸是錄所已行者如此則其尚有所遺者敢付之一筆删去哉亦並行之可也抑堅聞之大易居行先以學聚問辯中庸篤行先以學問思辯程子以講明道義論古今人物為格物致知之首則學非問辯不明審矣朱子教人既有成書又不能忘言者為答問發也天地之所以髙厚一物之所以然其在成書引而不發者語錄所不可無也凡讀先生成書者兼攷乎語錄可也若但涉獵乎語錄而不玩味於成書幾何而不為入耳出口之資為已之學葢不然也書於篇端以諗同志抑以自警焉咸淳初元嘉平之月後學天台吳堅敬識右語類總成七十家除李侯貫之已刋外增多三十八家或病諸家所記互有重複乃類分而考之盖有一時之所同聞退各抄録見有等差則領其意者斯有詳略或能盡得於言而首尾該貫或不能盡得於言而語脉間斷或就其中粗得一二言而止今惟存一家之最詳者而它皆附于下至於一條之内無一字之不同者必抄録之際嘗相參校不則非其聞而得於傳録則亦惟存一家而注與某人同爾既以類分遂可繕寫而略為義例以為後先之次第有太極然後有天地有天地然後有人物有人物然後有性命之名而仁義禮智之理則人物所以為性命者也所謂學者求得夫此理而已故以太極天地為始乃及於人物性命之原與夫古學之定序次之以羣經所以明此理者也次之以孔孟周程朱子所以傳此理者也乃繼之以斥異端異端所以蔽此理而斥之者任道統之責也然後自我朝及歴代君臣法度人物議論亦略具焉此即理之行於天地設位之後而著於治亂興衰者也凡不可以類分者則雜次之而以作文終焉葢文以載道理明意達則辭自成文後世理學不明第以文辭為學固有竭終身之力精思巧製以務名家者然其學既非其理不明則其文雖工其意多悖故特次之於後深明夫文為末而理為本也然始焉妄易分類之意惟欲考其重複及今而觀之則夫理一而名殊問同而答異者淺深詳略一目在前互相發明思已過半至於羣經則又足以起或問之所未及校本義之所未定補書説之所未成而大學章句所謂髙入虛空卑流功利者皆灼然知其所指而不為近似所陷溺矣誠非小補者故嘗謂孔孟之道至周程而復明至朱子而大明自今以後雖斯道未能盛行於世而誦遺書私淑艾者必不乏人不至於千五百年之久絶而不續反復斯編抑自信云語類成編積百四十卷同志艱於傳錄而眉山史亷叔願鋟于木士毅之類次雖犯不韙而不復固辭者庶幾無傳録之艱也獨池本陳埴一家惟論仁一條按遺文乃答埴書不當取為類故今不載又輔廣所録以先生改本校之則去其所改而反存其所勾者合三十餘條今亦惟據改本自首連數至君子所貴乎道者三而注云自此以前皆先生親改亦傳聞之誤當時雜改定者八十餘條耳或有一條析為三四條如竇從周録所見先生語之類今則復其舊或士毅所傳本多於刋本如黃義剛者悉類入而不去文異者則姑注一二條云一本作某字以上皆與池本異者盖池本雖黄侯直卿之所次輯然李侯貫之惟據所傳以授直卿而直卿亦據所授以加讎校且有增改於已讎校之後者不與焉故近聞之直卿欲求元本刋改而未能也至於或出於追述或得於傳聞則文辭之間不無差誤凡此之類讀者詳考四書及他記録而折𠂻其所疑可也惟學類七卷雖出於臆見而實本先生教人之方後學於此三復而得夫入道之門則能總會是編而體之於身矣己卯九月望日門人莆田黄士毅謹識開禧中予始識輔漢卿于都城漢卿從朱文公最久盡得公平生語言文字每過予相與熟思誦味輒移晷弗去予既補外漢卿悉舉以相畀嘉定元年予留成都度周卿請刻本以幸後學予曰予非敢靳也所為弗敢𫝊者恐以誤後學耳周卿艴然曰奚至是予曰子知今之學者之病乎凡千數百年不得其傳者今諸儒先之講析既精後學之稡類亦廣而閩淛庸蜀之鋟刻者已徧於天下若稍捐貲用則立可以充厨牣几苟有小慧纎能涉其大指則亦能以綴説輯文或以語諸人則亦若稍嘗從事焉者奚必誦先聖書而後為學乎亦取諸此而足矣且張宣公以程子之意類聚孔孟言仁而文公猶恐長學者欲速好徑之心滋入耳出口之弊脱是書之行其無乃非公所云云者乎吾甚懼焉周卿繇是姑徐之後數年竟從予乞本刋諸青衣彼不過余所藏十之二三耳然予且謂周卿曰子其以此意著于篇端俾學者毋襲是弊也其後李貫之刋于江東則已十之六七今史亷叔所得黄子洪類本則公之説至是幾無復遺餘矣亷叔將板行以予有志於斯也屬叙所以作予為言嘗以告周卿者亷叔曰然則已諸曰已之無傷雖然安於小成甘於自棄者氣質之偏而無以矯之也而秉彝好德之心誰獨無之予前所憂葢為世之專事乎耳目口筆苟以譁衆取寵而無志乎逺且大者也儻不忍自薄其身則無寧深體熟玩以為求端用力之模準者乎今未可概以是為疑而閟其傳盍遂以此冠篇而併刻之將聽學者之自擇焉子洪名士毅姑蘇人嘗類文公集百五十卷今藏之策府又類注儀禮未成書云嘉定十三年九月丁亥朔臨卭魏了翁序論語一書乃聖門髙弟所集以記夫子之嘉言善行垂訓後世朱子語類之編其亦傚是意而為之者也或曰語必以類相從豈論語意歟曰學而一篇所記多務本之意里仁七章所記皆為仁之方若八佾之論禮樂鄉黨之記言行公冶長辨人物之賢否微子載聖賢之出處亦何嘗不以類哉天下之理同歸而殊塗一致而百慮非有以會而通之則祗見其異耳大傳曰觸類而長之天下之能事畢矣而伊川之誨學者亦必曰將聖賢言仁處類聚觀之然則語類之集其有功於學者多矣新安舊有紫陽書堂而紫陽之書未備也通守洪君勲教授張君文虎相與謀以蜀本語類刋之越二歲而書成郡侯謝工部坐屬余為跋其梗概余不得辭也因僭為之說曰理有可以類通而非可以類止是其然必有所以然學者因其類以䆒極朱子之全書使此理融會通貫不梏於一事一物而止則無愧於吾夫子觸類而長之訓也若夫憚煩勞安簡佚以為取足於此則朱子固嘗以是為學者病矣烏乎可抑二君推廣私淑之意亦賢矣哉淳祐壬子六月望日蔡抗序文公朱先生語類一百三十八卷壺山黄子洪取門人所錄語以類相從也先是池本饒本人各為錄間見錯出讀者病焉子洪既以類流傳便於玩索而微言精語猶有所遺佖每加訪求得所未見自是朋友知舊知其有心於纂輯亦頗互出所有以見示凡三十有餘家既裒以為婺錄而繼之者尚未艾也佖幽居無事葢嘗潛心而觀之審訂其複重參繹其端緒用子洪已定門目稡為續類凡四十卷或謂前類不為少矣又以續類附益之不已多乎竊謂學固戒於徒博然亦不可以不博而徑約也又況文公先生之道髙明廣大致極無遺學者正當盡博約之方而後精微中庸之趣始可漸而求佖每觀諸家所錄以其問有淺深故於教告亦有不同其視文公先生之精藴不能得其全者尚多有之必也篤信好學反復尋繹能知所盡心焉雖以前續之繁固將無所厭斁不然則雖先生平日已著為定論之書尚有所憚而不肯觀而況於此乎哉然則先生片言半語苟有所傳固不容有所忽而不䆒其所歸也新安魏史君葢鶴山先生之嗣也近以紫陽所刋語類為寄因以續類為請而慨然欲併刋之以全書院之傳布其樂於闡明文公先生之遺訓葢如此遂舉以屬之且竊識于後庶幾乎與願學之士從事於詳説反約之功云爾淳祐壬子上冬王佖序自帝王道化不行於天下而後孔孟道學之傳興孟氏既没其傳遂泯歴秦漢隋唐至於有宋周程張朱諸君子繼出而後道學復明焉然䆒其推演性命道德之精微剖析天人事物之藴奥而折衷羣聖賢之述作俾學者有所據依以為學則功未有盛於朱文公先生者也文公傳註成言至精至粹固已家傳人誦之矣而一時門人進而請益退而各記所聞者其語尤詳其詳辨博喻尤為易曉如此者殆百餘家蜀士李道傳始取而刻之為語録莆田黄士毅又因而類分之曰語類語録之外有續録後録别録語類之外有續類諸書並行錯出讀者病焉最後導江黎靖徳參校諸書去其重複謬誤因士毅門目以類附焉而名曰語類大全凡一百四十卷於是文公遺語備諸此矣惜乎板本今不復傳間有傳録者又不免乎亥豕之訛也三山陳君煒自天順庚辰第進士為御史屢欲訪求善本而不得成化庚寅副憲江右始訪於豫章胡祭酒頥庵先生家得印本中缺二十餘卷眀年分巡湖東又訪於崇仁吳聘君康齋家得全本而缺者尚一二合而校補遂成全書欲重刻以廣其傳謀於憲使嚴郡余公公喜倡諸同寅各捐俸餘并勸部民之好義者出貲以相其成自今春始工期以秋畢因寓書語予以其故并徴序焉愚謂文公遺語無非譚經論事明理之言也學者不循其言以求至乎聖賢之域則理有不明心無實得豈善學哉惟其不善學也是以性汨於氣私勝而理微注措云為鮮有不戾道者士習日以卑陋民風日以頽弊而治道不能復古有由然也竊嘗病此而力未能救恒用愧歎而已公暇覽閱秘書喜誦語類以自益因嘅見此不早且以不能人有是書為恨何則聖賢格言大訓世非不多而此尤明切易曉可為入道之指南故也陳君有見乎此乃力求是書刻而傳之以惠學者以端其習以為聖朝道化之助其用心豈淺淺者哉而是書之傳今自江右始抑非吾黨之士之幸歟幸矣而不自勉不可有志者誠以文公成言為主而以語類為助博觀精擇以求入道則塗轍正矣愼毋憚其浩博而止亦毋徒資其博而不實踐以要其成也因書篇首願與四方之士共勉焉成化九年癸巳秋九月朔旦彭時序朱子語類原序朱子語類門目理氣太極隂陽凡形於法象者二卷鬼神其别有三在天之鬼神隂陽造化是也在人之鬼神人死為鬼是也祭祀之鬼神神示祖考是也三者雖異其所以為鬼神者則同知其異又知其同斯可以語鬼神之道矣故合為一卷性理論性不論氣不備故先總論人物之性而繼以氣稟之性為一卷古人之學必先明夫名義故為學也易而求之不差後世名義不明故為學也難盖有終身昧焉而不察者又安能反而體之於身哉故以性情心意等之命名者為一卷仁義禮智等之命名者為一卷共三卷學先之以小學為一卷總論為學之方為一卷次論知行為一卷次專論讀書之法為二卷乃致知之一端也次則及夫持守為一卷又次則終以行事為一卷共七卷朱子教人之序如此因敢次第之即大學致知而后誠意正心脩身誠意正心脩身而后齊家治國平天下之道也從上聖賢相承定法不容變易如近世之逞虚言而不實踐乃學者之罪正原於知之未致非教之失也苟或懲此别立一法後致知而先行事則其始雖若有近效而其終之弊必至廢書而流於異端不然所見不充規模狹隘不過於循黙自守而已所謂經綸大經則無矣非理學之功用也大學五卷論語三十二卷孟子十一卷中庸三卷易十三卷易類悉本卦爻次第上下繫說序卦亦本古注分章今從本義惟綱領三卷則畧為義例氣數雖並行然有氣而後有數故先隂陽而數始次之物受形於氣數故圖書次之易本圖書而畫故伏羲六十四卦次之而原易之作則本教天下之占故卜筮次之而所以教天下之占者則假竒偶之體以象吉凶故象次之此伏羲之易朱子所謂本義也此則為二卷易始無辭更文王周公孔子而辭始備故三聖之易越千有餘年至程子而始演易之理邵子而始明易之數又至朱子而始推易之占故繼以三子之易然後總論夫讀易之方與夫卦爻等義可以類推而通者而復終之以人事以明易為人事用也凡後世之言易者其得失畧次于後使學者有考焉此則為一卷上經四卷下經二卷下繫三卷說序雜卦一卷書二卷詩二卷孝經一卷春秋一卷禮八卷樂一卷孔孟周程張邵朱子自孔子及顔曾弟子至孟子以周程張子共附為一卷周程所以上繼孔孟也然後分周子之書為一卷程子之書為三卷凡係入近思者皆依卷次第别為二卷其非入近思者以類而從别為一卷文集附焉張子之書為二卷亦别入近思者邵子之書為一卷程子門人為一卷楊氏尹氏門人為一卷羅氏胡氏門人為一卷朱子自論學工夫為一卷論注書為一卷已上諸經存者不入外任一卷内任一卷論治道一卷論取士一卷論兵刑一卷論民財一卷論官一卷訓門人九卷吕伯恭一卷陳葉一卷陸氏一卷老莊一卷釋氏一卷本朝六卷歴代三卷戰國漢唐諸子一卷雜類一卷作文二卷朱子語類姓氏廖德明字子晦南劍人癸巳以後所聞池録一饒録四十六輔廣字漢卿慶源人居嘉興甲寅以後所聞池録二余大雅字正叔上饒人戊戌以後所聞池録三陳文蔚字才卿上饒人戊申以後所聞池録四李閎祖字守約邵武人戊申以後所聞池録五李方子字公晦邵武人戊申以後所聞池録六葉賀孫字味道括蒼人居永嘉辛亥以後所聞池録七八九十十一潘時舉字子善天台人癸丑以後所聞池録十二饒録四十六董銖字叔重鄱陽人丙辰以後所聞池録十三饒録四十六竇從周字文卿丹陽人丙午以後所聞池録十四金去偽字敬直樂平人乙未所聞池録十五李季札字季子婺源人丙申乙卯所聞池録十六萬人傑字正淳興國人庚子以後所聞池録十七饒録四十六楊道夫字仲愚建寧人己酉以後所聞池録十八十九徐㝢字居父永嘉人庚戌以後所聞池録二十一二十饒録四十六林恪字叔恭天台人癸丑所聞池録二十二饒録四十六石洪慶字子餘臨漳人癸丑所聞池録二十三徐容字仁父永嘉人辛亥所聞池録二十四甘節字吉父臨川人癸丑以後所聞池録二十五黃義剛字毅然臨川人癸丑以後所聞池録二十六二十七饒録三十八㬊淵字亞夫涪陵人癸丑所聞池録二十八龔盖卿字夢錫闕甲寅所聞池録二十九廖謙字益仲衡陽人甲寅所聞池録三十孫自修字敬父宣城人甲寅所聞池録三十一潘履孫字坦翁婺源人居紹興甲寅所聞池録三十二湯泳字叔永丹陽人乙卯所聞池録三十三林䕫孫字子武三山人丁巳以後所聞池録三十四三十五陳埴録已削錢木之字子山晉陵人寓永嘉丁巳所聞池録三十六曾祖道字闕闕丁巳所聞池録三十七沈僴字杜仲永嘉人戊午以後所聞池録三十八三十九四十四十一郭友仁字徳元山陽人寓臨安戊午所聞池録四十二李儒用字仲秉岳陽人己未所聞池録四十三饒録三十黄榦字直卿閩縣人闕饒録一饒後録一何鎬字叔京邵武人乙未以前所聞饒録二程端蒙字正思鄱陽人己亥以後所聞饒録三周謨字舜弼南康人己亥以後所聞饒録四五潘柄字謙之三山人癸卯以後所聞饒録六魏椿字元夀建陽人戊申五夫所聞饒録七饒後録二十四吳必大字伯豐興國人戊申己酉所聞饒録八黃㽦字子耕分寧人戊申所聞饒録九十楊若海字闕子道夫之闕饒録十一楊驤字子昻道夫族兄己酉甲寅所聞饒録十二陳淳字安卿龍溪人庚戌己未所聞饒録十三十四章伯雨字蜚卿甌寧人庚戌所聞饒録十五鄭可學字子上莆田人辛亥所聞饒録十六滕璘字徳粹新安人辛亥所聞饒録十七王力行字近思同安人辛亥所聞饒録十八游敬仲字連叔南劍人辛亥所聞饒録十九不知何氏辛亥同舍共聞饒録二十黄升卿字闕闕辛亥所聞饒録二十一周明作字元興建陽人壬子以後所聞饒録二十二蔡㦛字行夫平陽人壬子所錄饒録二十三楊與立字闕夫浦城人道從兄壬子同劉闕龔栗諦見饒録二十四鄭南升字文相潮州人癸丑所聞饒録二十五歐陽謙之字晞遜闕癸丑所聞饒録二十六游倪字和之建寧人癸丑所聞饒録二十七楊至字至之泉州人癸丑甲寅所聞饒録二十八饒後錄二十五潘植字立之闕癸丑所聞饒録二十九王過字幼觀鄱陽人甲寅以後所聞饒録三十董拱夀字仁叔鄱陽人甲寅所聞饒録三十一林學蒙字正卿三山人甲寅以後所聞饒録三十二林賜字聞一闕乙卯以後所聞饒録三十三胡泳字伯量南康人戊午所聞饒録三十四吕燾字徳昭弟煥字徳逺南康人己未所聞饒錄三十六三十七不知何氏己未同舍共録饒録三十九不知何氏闕饒録四十四一四二吳夀昌字大年邵武人丙午同子浩録饒録四十三楊長孺字伯子廬陵人甲寅記見饒録四十四吳琮字仲方臨川人甲寅記見饒録四十五已上三家非㡳木覽者詳之楊方字子直汀州人庚寅所聞饒後録一間有可疑包揚字顯道建昌人癸卯甲辰乙巳所聞饒後録三四五六間有疑誤劉炎字闕闕己酉甲寅以後所聞饒後録七劉子寰字圻父建陽人己未所聞饒後録八邵浩字闕闕丙午所聞饒後録九劉砥字履之三山人庚戌所聞饒後録十劉礪字用之三山人己未所聞饒後録十一李煇字晦父闕闕饒後録十二陳芝字庭秀闕壬子所聞饒後録十三黄灝字商伯都昌人闕饒後録十四黄卓字徳美延平人闕饒後録十五汪徳輔字長孺鄱陽人壬子所聞饒後録十六呉振字闕闕闕饒後録十七呉雉字和中建陽人闕饒後録十八鍾震字春伯潭州人甲寅所聞饒後録十九林子蒙字闕闕闕饒後録二十林學履字闕闕己未所録饒後録二十一蕭佐字闕闕甲寅所聞饒後録二十二舒髙字闕闕甲寅所聞饒後録二十二李把字良仲平江人甲寅所聞饒後録二十六張洽字元徳清江人丁未癸丑所聞附池録後黄士毅字子洪莆田人闕蜀類徽續類李壯祖字處謙邵武人闕蜀類李公謹字闕闕闕蜀類一之闕蜀類枅闕徽續類郭逍遥字闕闕闕建别録十八不知何氏闕建别録十九二十
