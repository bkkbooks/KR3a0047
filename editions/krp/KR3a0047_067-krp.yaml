body:
  text: 朱子語類卷六十七易三綱領下上古之易方是利用厚生周易始有正德意如利貞是教人利於貞正貞吉是教人貞正則吉至孔子則說得道理又多閎祖道夫録云利貞貞吉文王說底方是教人隨時變易以從道乾之元亨利貞本是謂筮得此卦則大亨而利於守正而彖辭文言皆以為四德某嘗疑如此等類皆是别立說以發明一意至如坤之利牝馬之貞則發得不甚相似矣伏羲自是伏羲易文王自是文王易孔子自是孔子易伏羲分卦乾南坤北文王卦又不同故曰周易元亨利貞文王以前只是大亨而利於正孔子方觧作四德易只是尚占之書德明須是將伏羲畫底卦做一様看文王卦做一様看文王周公說底彖象做一様看孔子說底做一様看王輔嗣伊川說底各做一様看伏羲是未有卦時畫出來文王是就那見成底卦邊說畫前有易真箇是恁地這箇卦是畫不迭底那許多都在這裏了不是畫了一畫又旋思量一畫才一畫時畫畫都具淵壯祖録云須將伏羲畫卦文王重卦周公爻辭孔子繫辭及程氏傳各自看不要相亂或無牴牾處也問易曰聖人作易之初盖是仰觀俯察見得盈乎天地之間無非一隂一陽之理有是理則有是象有是象則其數便自在這裏非特河圖洛書為然葢所謂數者秖是氣之分限節度處得陽必竒得隂必偶凡物皆然而圖書為特巧而著耳於是聖人因之而畫卦其始也只是畫一竒以象陽畫一偶以象隂而已但纔有兩則便有四纔有四則便有八又從而再倍之便是十六葢自其無朕之中而無窮之數已具不待安排而其勢有不容已者卦畫既立便有吉㐫在裏葢是隂陽往來交錯於其間其時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辯而吉㐫見矣故曰八卦定吉㐫吉㐫既決定而不差則以之立事而大業自此生矣此聖人作易教民占筮而以開天下之愚以定天下之志以成天下之事者如此但自伏羲而上但有此六畫而未有文字可傳到得文王周公乃繫之以辭故曰聖人設卦觀象繫辭焉而明吉㐫葢是卦之未畫也因觀天地自然之法象而畫及其既畫也一卦自有一卦之象象謂有箇形似也故聖人即其象而命之名以爻之進退而言則如剥復之類以其形之肖似而言則如鼎井之類此是伏羲即卦體之全而立箇名如此及文王觀卦體之象而為之彖辭周公視卦爻之變而為之爻辭而吉㐫之象益著矣大率天下之道只是善惡而已但所居之位不同所處之時既異而其幾甚微只為天下之人不能曉㑹所以聖人因此占筮之法以曉人使人居則觀象玩辭動則觀變玩占不迷於是非得失之途所以是書夏商周皆用之其所言雖不同其辭雖不可盡見然皆太卜之官掌之以為占筮之用有所謂繇辭者左氏所載尤可見古人用易處葢其所謂象者皆是假此衆人共曉之物以形容此事之理使人知所取舍而已故自伏羲而文王周公雖自略而詳所謂占筮之用則一葢即那占筮之中而所以處置是事之理便在那裏了故其法若粗淺而隨人賢愚皆得其用葢文王雖是有定象有定辭皆是虚說此箇地頭合是如此處置初不黏着物上故一卦一爻足以包無窮之事不可只以一事指定說他裏面也有指一事說處如利建侯利用祭祀之類其他皆不是指一事說此所以見易之為用無所不該無所不徧但看人如何用之耳到得夫子方始純以理言雖未必是羲文本意而事上說理亦是如此但不可便以夫子之說為文王之說又曰易是箇有道理底卦影易以占筮作許多理便也在裏但是未便說到這處如楚詞以神為君以祀之者為臣以寓其敬事不可忘之意固是說君臣林録云但假托事神而說但是先且為他說事神然後及他事君意趣始得今人解說便直去解作事君底意思也不喚做不是他意但須先與結了那一重了方可及這裏方得本末周備易便是如此今人心性徧急更不待先說他本意便將道理來滚說了易如一箇鏡相似看甚物來都能照得如所謂潛龍只是有箇潛龍之象自天子至於庶人看甚人來都使得孔子說作龍德而隱不易乎世不成乎名便是就事上指殺說來然㑹看底雖孔子說也活也無不通不㑹看底雖文王周公說底也死了須知得他是假託說是包含說假託謂不惹著那事包含是說箇影象在這裏無所不包又曰卦雖八而數須是十八是隂陽數十是五行數一隂一陽便是二以二乘二便是四以四乘四便是八五行本只是五而有十者葢是一箇便包兩箇如木便包甲乙火便包丙丁土便包戊巳金便包庚辛水便包壬癸所以為十彖辭文王作爻辭周公作是先儒從來恁地說且得依他謂爻辭為周公者葢其中有說文王不應是文王自說也賀孫孔子之易非文王之易文王之易非伏羲之易伊川易傳又自是程氏之易也故學者且依古易次第先讀本爻則自見本㫖矣方子長孺問乾健坤順如何得有過不及曰乾坤者一氣運於無心不能無過不及之差聖人有心以為之主故無過不及之失所以聖人能贊天地之化育天地之功有待於聖人賀孫邵子易康節易數出於希夷他在靜中推見得天地萬物之理如此又與他數合所以自樂今道藏中有此卦數謂魏伯陽參同契魏東漢人德明王天恱雪夜見康節於山中猶見其儼然危坐葢其心地虚明所以推得天地萬物之理其數以隂陽剛柔四者為準四分為八八分為十六只管推之無窮有太陽太隂少陽少隂太剛太柔少剛少柔今人推他數不行所以無他胷中徳明康節也則是一生二二生四四生八淵康節只說六卦乾坤坎離四卦震巽含艮兊又說八卦乾坤坎離大過頤中孚小過其餘反對者二十八卦人傑聖人說數說得䟽到康節說得密了他也從一隂一陽起頭他却做隂陽太少乾之四象剛柔太少坤之四象又是那八卦他說這易將那元亨利貞全靠着那數三百八十四爻管定那許多數說得太密了易中只有箇竒耦之數是自然底大衍之數却是用以揲蓍底康節盡歸之數所以二程不肯問他學若是聖人用不過如大衍之數便是他須要先揲蓍以求那數起那卦數是恁地起卦是恁地求不似康節坐地黙想推將去便道某年某月某日當有某事聖人決不恁地此條有誤可詳之淵聖人說數說得簡畧髙遠䟽闊易中只有箇竒耦之數天一地二是自然底數也大衍之數是揲蓍底數也惟此二者而已康節却盡歸之數竊恐聖人必不為也因言或指一樹問康節曰此樹有數可推否康節曰亦可推也但須待其動爾頃之一葉落便從此推去此樹甚年生甚年當死凡起數靜則推不得須動方推得起方子高録畧程子易傳有人云草草看過易傳一遍後當詳讀曰不可此便是計功謀利之心若劈頭仔細看雖未知後面凡例而前看工夫亦不落他處方已前解易多只說象數自程門以後人方都作道理說了礪伊川晚年所見甚實更無一句懸空說底話今觀易傳可見何嘗有一句不著實大雅伯恭謂易傳理到語精平易的當立言無毫髮遺恨此乃名言今作文字不能得如此自是牽强處多一本云不能得如此自然閎祖易傳明白無難看但伊川以天下許多道理散入六十四卦中若作易看即無意味唯將來作事看即句句字字有用處問胡文定春秋曰他所說盡是正理但不知聖人當初是恁地不是恁地今皆見不得所以某於春秋不敢措一辭正謂不敢臆度爾道夫易傳須先讀他書理㑹得義理了方有箇入路見其精密處葢其所言義理極妙初學者未㑹使看不識其味都無啟發如遺書之類人看著却有啟發處非是易傳不好是不合使未當看者看須是已知義理者得此便可磨礲入細此書於學者非是啟發工夫乃磨礲工夫㽦易傳難看其用意精密道理平正更無抑揚若能看得有味則其人亦大段知義理矣葢易中說理是預先說下未曾有底事故乍看甚難不若大學中庸有箇準則讀著便令人識蹊徑詩又能興起人意思皆易看如謝顯道論語却有啟發人處雖其說或失之過識得理後却細密商量令平正也人傑伯恭多勸人看易傳一禁禁定更不得疑著局定學者只得守此箇義理固是好但縁此使學者不自長意智何縁㑹有聰明㽦看易傳若自無所得縱看數家反被其惑伊川教人看易只看王弼注胡安定王介甫解今有伊川傳且只看此尤妙闕易傳義理精字數足無一毫欠闕他人著工夫補綴亦安得如此自然只是於本義不相合易本是卜筮之書卦辭爻辭無所不包看人如何用程先生只說得一理闕問易傳如何看曰且只恁地看又問程易於本義如何曰程易不說易文義只說道理極處好看又問乾繇辭下解云聖人始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦㨿此說却是聖人始畫八卦每卦便是三畫聖人因而重之為六畫似與邵子一生兩兩生四四生八八生十六十六生三十二三十二生六十四為六畫不同曰程子之意只云三畫上叠成六畫八卦上叠成六十四卦與邵子說誠異葢康節此意不曾說與程子程子亦不曾聞之故一向只隨他所見去但他說聖人始畫八卦不知聖人畫八卦時先畫甚卦此處便曉他不得又問啟蒙所謂自太極而分兩儀則太極固太極兩儀固兩儀自兩儀而分四象則兩儀又為太極而兩儀又為四象以至四象生八卦節節推去莫不皆然可見一物各具一太極是如此否曰此只是一分為二節節如此以至於無窮皆是一生兩爾因問序所謂自本而榦自榦而支是此意否曰是又問以功用謂之鬼神以妙用謂之神二神字不同否曰鬼神之神此神字說得粗如繫辭言神也者妙萬物而為言此所謂妙用謂之神也言知鬼神之情狀此所謂功用謂之鬼神也只是推本繫辭說程易除去解易文義處只單說道理處則如此章說天專言之則道也以下數句皆極精録伊川只將一部易來作譬喻說了恐聖人亦不肯作一部譬喻之書朱震又多用伏卦互體說隂陽說陽便及隂說隂便及陽乾可為坤坤可為乾太走作近來林黄中又撰出一般翻筋斗互體一卦可變作八卦也是好笑据某看得來聖人作易專為卜筮後來儒者諱道是卜筮之書全不要恁他卜筮之意所以費力今若要說且可須用添一重卜筮意自然通透如乾初九潛龍兩字是初九之象勿用兩字即是告占者之辭如云占得初九是潛龍之體只是隱藏不可用作小象文言釋其所以為潛龍者以其在下也諸爻皆如此推看怕自分明又不須作設戒也浩易傳言理甚備象數却欠在又云易傳亦有未安處如无妄六二不耕耯不菑畬只是說一箇無所作為之意易傳却言不耕而穫不菑而畬謂不首造其事殊非正意閎祖易要分内外卦看伊川却不甚理㑹如巽而止則成蠱止而巽便不同葢先止後巽却是有根株了方巽將去故為漸㽦問伊川易說理太多曰伊川言聖人有聖人用賢人有賢人用若一爻止做一事則三百八十四爻止做得三百八十四事也說得極好然他解依舊是三百八十四爻止得三百八十四事用也淳義剛録云林擇之云伊川易說得理也太多先生曰伊川求之便是太深云云問程傳大槩將三百八十四爻做人説恐通未盡否曰也是則是不可粧定做人說看占得如何有就事言者有以時節言者有以位言者以吉㓙言之則為事以初終言之則為時以髙下言之則為位隨所值而看皆通繫辭云不可為典要惟變所適豈可粧定做人說學履伊川易煞有重叠處賀孫易傳說文義處猶有些小未盡處公謹學者須讀詩與易易尤難看伊川易傳亦有未盡處當時康節傳得數甚佳却輕之不問天地必有倚靠處如復卦先動而後順豫卦先順而後動故其彖辭極嚴似此處却閒過了可學詩書略看訓詁解釋文義令通而已却只玩味本文其道理只在本文下面小字儘說如何㑹過得他若易傳却可脫去本文程子此書平淡地慢慢委曲說得更無餘藴不是那敲磕逼拶出底義理平鋪地放在面前只如此等行文亦自難學如其他峭拔雄健之文却可做若易傳様淡底文字如何可及㽦問先儒讀書都不如先生精密如伊川解易亦甚踈曰伊川見得箇大道理却將經來合他這道理不是解易又問伊川何因見道曰他說求之六經而得也是於濓溪處見得箇大道理占地位了德輔易變易也隨時變易以從道正謂伊川這般說話難說葢他把這書硬定做人事之書他說聖人做這書只為世間人事本有許多變様所以做這書出來淵至微者理也至著者象也體用一原顯微無閒觀㑹通以行其典禮則辭無所不備此是一箇理一箇象一箇辭然欲理㑹理與象又須辭上理㑹辭上所載皆觀㑹通以行其典禮之事凡於事物須就其聚處理㑹尋得一箇通路行去若不尋得一箇通路只驀地行去則必有碍典禮只是常事㑹是事之合聚交加難分别處如庖丁解牛固是奏刀騞然莫不中節若至那難處便著些氣力方得通故莊子又說雖然每至於族吾見其難為怵然為戒視為止行為遲莊子說話雖無頭當然極精巧說得到今學者却於辭上看觀其㑹通以行典禮也賀孫體用一源體雖無迹中已有用顯微無閒者顯中便具微天地未有萬物已具此是體中有用天地既立此理亦存此是顯中有微節劉用之問易傳序觀㑹通以行典禮曰如堯舜揖遜湯武征伐皆是典禮只是常事賀孫求言必自近易於近者非知言者也此伊川喫力為人處㝢用龜山易參看易傳數段見其大小得失方婺州易傳聖字亦誤用王氏說聖字從王不當從王㽦朱子本義啟蒙看易先看某本義了却看伊川解以相參考如未看他易先看某說却易看也葢未為他說所汨故也燾方叔問本義何專以卜筮為主曰且須熟讀正文莫看注解葢古易彖象文言各在一處至王弼始合為一後世諸儒遂不敢與移動今難卒說且須熟讀正文久當自悟大雅某之易簡略者當時只是略搭記兼文義伊川及諸儒皆已說了某只就語脉中略牽過這意思礪聖人作易有說得極踈處甚散漫如爻象葢是汎觀天地萬物取得來濶往往只髣髴有這意思故曰不可為典要又有說得極密處無縫罅盛水不漏如說吉㓙悔吝處是也學者須是大著心胷方看得譬如天地生物有生得極細巧者又自有突兀麄拙者近趙子欽有書來云某說語孟極詳易說却太略譬之此燭籠添得一條骨子則障了一路明若能盡去其障使之統體光明豈不更好葢著不得詳說故也方子淵録云易中取象似天地生物有生得極細巧底有生得麄拙突兀底趙子欽云本義太畧此譬如燭籠添了一條竹片便障了一路明盡徹去了使它統體光明豈不更好葢是著不得詳說如此看來則取象處如何拘得啟䝉初間只因看歐陽公集内或問易大衍遂將來考算得出以此知諸公文集雖各自成一家文字中間自有好處縁是這道理人人同得看如何也自有人見得到底賀孫先生於詩傳自以為無復遺恨曰後世若有揚子雲必好之矣而意不甚滿於易本義葢先生之意只欲作卜筮用而為先儒說道理太多終是翻這窠臼未盡故不能不致遺恨云僴先生問時舉看易如何曰只看程易見其只就人事上說無非日用常行底道理曰易最難看須要識聖人當初作易之意且如泰之初九㧞芧茹以其彚征吉謂其引賢類進也都不正說引賢類進而云㧞茅何那如此之類要須思看某之啟䝉自說得分曉且試去看因云某少時看文字時凡見有說得合道理底須旁搜遠取必要看得他透今之學者多不如是如何時舉退看啟䝉晚往侍坐時舉曰向者看程易只就注解上生議論却不曾靠得易看所以不見得聖人作易之本意今日看啟蒙方見得聖人一部易皆是假借虚設之辭葢縁天下之理若正說出便只作一件用唯以象言則當卜筮之時看是甚事都來應得如泰之初九若正作引賢類進說則後便只作得引賢類進用唯以㧞茅茹之象言之則其他事類此者皆可應也啟䝉警學篇云理定既實事來尚虚用應始有體該本無便見得易只是虚設之辭看事如何應耳先生頷之因云程易中有甚疑處可更商量看時舉問坤六二爻傳云由直方而大竊意大是坤之本體安得由直方而後大耶曰直方大是坤有此三德若就人事上說則是敬義立而德不孤豈非由直方而後大耶時舉敬之問啟䝉理定既實事來尚虚用應始有體該本無稽實待虚存體應用執古御今以靜制動曰聖人作易只是說一箇理都未曾有許多事却待他甚麽事來湊所謂事來尚虚葢謂事之方來尚虚而未有若論其理則先自定固已實矣用應始有謂理之用實故有體該本無謂理之體該萬事萬物又初無形迹之可見故無下面云稽考實理以待事物之來存此理之體以應無窮之用執古古便是易書裏面文字言語御今今便是今日之事以靜制動理便是靜底事便是動底且如即鹿無虞人必陷於林中君子幾不如舍往吝其理謂將即鹿而無虞人必陷於林中若不舍而往是取吝之道這箇道理若後人做事如求官爵者求之不已便是取吝之道求財利者求之不已亦是取吝之道又如潛龍勿用其理謂當此時只當潛晦不當用若占得此爻凡事便未可做所謂君子動則觀其變而玩其占若是無事之時觀其象而玩其辭亦當知其理如此某每見前軰說易止把一事說某之說易所以異於前軰者正謂其理當人皆用之不問君臣上下大事小事皆可用前軰止縁不把做占說了故此易竟無用處聖人作易葢謂當時之民遇事都閉塞不知所為故聖人示以此理教他恁地做便㑹吉如此做便㑹㐫必恁地則吉而可為如此則㐫而不可為大傳所謂通天下之志是也通是開通之意是以易中止說道善則吉却未嘗有一句說不善亦㑹吉仁義忠信之事占得其象則吉却不曾說不仁不義不忠不信底事占得亦㑹吉如南蒯得黄裳之卦自以為大吉而不知黄中居下之義方始㑹元吉反之則㓙大傳說上下無常剛柔相易不可為典要惟變所適便見得易人人可用不是死法雖道是二五是中却其間有位二五而不吉者有當位而吉亦有當位而不吉者若揚雄太元皆排定了第幾爻便吉第幾爻便㐫然其規模甚散其辭又澁學者驟去理㑹他文義已自難曉又且不曾盡經歴許多事意都去湊他意不著所以孔子晩年方學易到得平常教人亦言興於詩立於禮成於樂却未曾說到易又云易之卦爻所以該盡天下之理一爻不止於一事而天下之理莫不具備不要拘執著今學者渉世未廣見理未盡湊他底不著所以未得他受用賀孫讀易之法易不可易讀沬說及讀易曰易是箇無形影底物不如且先讀詩書禮却緊要子所雅言詩書執禮皆雅言也淳問看易如何曰詩書執禮聖人以教學者獨不及於易至於假我數年五十以學易乃是聖人自說非學者事葢易是箇極難理㑹底物事非他書之比如古者先王順詩書禮樂以造士亦只是以此四者亦不及於易葢易只是箇卜筮書藏於太史太卜以占吉㐫亦未有許多說話及孔子始取而敷繹為十經彖象繫辭文言雜卦之類方說出道理來僴易只是空說箇道理只就此理㑹能見得如何不如詩書執禮皆雅言也一句便是一句一件事便是一件事如春秋亦不是難理㑹底一年事自是一年事且看禮樂征伐是自天子出是自諸侯出是自大夫出今人只管去一字上理㑹褒貶要求聖人之意千百年後如何知得他肚裏事聖人說出底猶自理㑹不得不曾說底更如何理㑹得淳人自有合讀底書如大學語孟中庸等書豈可不讀讀此四書便知人之所以不可不學底道理與其為學之次序然後更看詩書禮樂某纔見人說看易便知他錯了未嘗識那為學之序易自是别是一箇道理不是教人底書故記中只說先王崇四術順詩書禮樂以造士不說易也語孟中亦不說易至左傳國語方說然亦只是卜筮爾葢易本為卜筮作故夫子曰易有聖人之道四焉以言者尚其辭如程子所說是也以動者尚其變已是卜筮了易以變者占故曰若子居則觀其象而玩其辭動則觀其變而玩其占以制器者尚其象十三卦是也以卜筮者尚其占文王周公之詞皆是為卜筮後來孔子見得有是書必有是理故因那隂陽消長盈虚說出箇進退存亡之道理來要之此皆是聖人事非學者可及也今人才說伏羲作易示人以天地造化之理便非是自家又如何知得伏羲意思兼之伏羲畫易時亦無意思他自見得箇自然底道理了因借他手畫出來爾故用以占筮無不應其中言語亦煞有不可曉者然亦無用盡曉葢當時事與人言語自有與今日不同者然其中有那事今尚存言語有與今不異者則尚可曉爾如利用侵伐是事存而詞可曉者只如比卦初六有孚比之無咎有孚盈缶終來有他吉之類便不可曉某嘗語學者欲看易時且將孔子所作十翼中分明易曉者看如文言中元者善之長之類如中孚九二鳴鶴在隂其子和之亦不必理㑹鶴如何在隂其子又如何和且將那繫辭傳中所說言行處看此雖淺然却不到差了葢為學只要理㑹自已胷中事爾某嘗謂上古之書莫尊於易中古後書莫大於春秋然此兩書皆未易看今人才理㑹二書便入於鑿若要讀此二書且理㑹他大義易則是尊陽抑隂進君子而退小人明消息盈虚之理春秋則是尊王賤伯内中國而外夷狄明君臣上下之分廣問讀易未能浹洽何也曰此須是此心虛明寧靜自然道理流通方包羅得許多義理葢易不比詩書它是說盡天下後世無窮無盡底事理只一兩字便是一箇道理又人須是經歴天下許多事變讀易方知各有一理精審端正今既未盡經歴非是此心大段虚明寧靜如何見得此不可不自勉也銖敬之問易曰如今不曾經歴得許多事過都自湊他道理不著若便去看也卒未得他受用孔子晚而好易可見這書卒未可理㑹如春秋易都是極難看底文字聖人教人自詩禮起如鯉趨過庭曰學詩乎學禮乎詩是吟詠情性感發人之善心禮使人知得箇定分這都是切身工夫如書亦易看大綱亦似詩賀孫易與春秋難看非學者所當先葢春秋所言以為褒亦可以為貶亦可易如此說亦通如彼說亦通大抵不比詩書的確難看闕問易如何讀曰只要虚其心以求其義不要執已見讀其他書亦然一作平易求其義去偽看易須是看他卦爻未畫以前是怎模様却就這上見得他許多卦爻象數是自然如此不是杜撰且詩則因風俗世變而作書則因帝王政事而作易初未有物只是懸空說出當其未有此爻卦畫則渾然一太極在人則是喜怒哀樂未發之中一旦發出則隂陽吉㓙事事都有在裏面人須是就至虚靜中見得這道理周遮通瓏方好若先靠定一事說則滯泥不通了此所謂潔淨精微易之教也學履僴録云未渾畫之前在易只是然一理在人只是湛然一心都未有一物在便是寂然不動喜怒哀樂未發之中也忽然在這至虚至靜之中有箇象方發出許多象數吉㓙道理來所以靈所以說潔淨精微之謂易易只是箇潔淨精微若似如今人說得恁地拖泥𢃄水有甚理㑹處燾録云未畫以前便是寂然不動喜怒哀樂未發之中只是箇至虚淨而已忽然在這至虚至靜之中有箇象方說出許多象數吉㓙道理所以禮記曰潔淨精微易教也葢易之為書是懸空做出來底謂如書便真箇有這政事謀謨方做出書來詩便真箇有這人情風俗方做出詩來易却都無這已往底事只是懸空做底未有爻畫之先在易則渾然一理在人則渾然一心既有爻畫方見得這爻是如何這爻又是如何然而皆是就這至虚至靜中做許多象數道理出來此其所以靈若是似而今說得來恁地拖泥帯水便都没理㑹處了易難看不比他書易說一箇物非真是一箇物如說龍非真龍若他書則真是事實孝弟便是孝弟仁便是仁易中多有不可曉處如王用亨於西山此却是享字只看王用亨于帝吉則知此是祭祀山川底意思如公用亨于天子亦是享字葢朝覲燕饗之意易中如此類甚多後來諸公解只是以已意牽强附合終不是聖人意易難看葢如此賜易最難看其為書也廣大悉備包涵萬理無所不有其實是古者卜筮書不必只說理象數皆可說將去做道家醫家等說亦有初不曾滯於一偏某近看易見得聖人本無許多勞攘自是後世一向亂說妄意增減硬要作一說以强通其義所以聖人經㫖愈見不明且如解易只是添虚字去迎過意來便得今人解易廼去添他實字却是借他做已意說了又恐或者一說有以破之其勢不得不支離更為一說以䕶吝之說千說萬與易全不相干此書本是難看底物不可將小巧去說又不可將大話去說又云易難看不惟道理難尋其中或有用當時俗語亦有他事後人不知者且如樽酒簋貳今人硬說作二簋其實無二簋之實陸德明自注斷人自不曾去看如所謂貳乃是周禮大祭三貳之貳是副貳之貳此不是某穿鑿却有古本若是强為一說無來歴全不是聖賢言語葢卿易不須說得深只是輕輕地說過淵讀易之法先讀正經不曉則將彖象繫辭來解又曰易爻辭如籖解節看易且將爻辭看理㑹得後却看象辭若鶻突地看便無理㑹處又曰文王爻辭做得極精嚴孔子傳條暢要看上面一段莫便將傳拘了胡泳易中彖辭最好玩味說得卦中情狀出季札八卦爻義最好玩味祖道看易須著四日看一卦一日看卦辭彖象兩日看六爻一日統看方仔細因吳宜之記不起云然閎祖和靖學易從伊川一日只看一爻此物事成一片動著便都成片不知如何只看一爻得礪看易若是靠定象去看便滋味長若只恁地懸空看也沒甚意思燾季通云看易者須識理象數辭四者未嘗相離葢有如是之理便有如是之象有如是之象便有如是之數有理與象數便不能無辭易六十四卦三百八十四爻有自然之象不是安排出來且如潛龍勿用初便是潛陽爻便是龍不當事便是勿用見龍在田離潛便是見陽便是龍出地上便是田即鹿無虞惟入于林中此爻在六二六四之閒便是林中之象鹿陽物指五無虞無應也以此觸類而長之當自見得端䝉先就乾坤二卦上看得本意了則後面皆有通路礪繫辭中說是故字都是喚那下文起也有相連處也有不相連處淵欽夫說易謂只依孔子繫辭說便了如說公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也只如此說便了固是如此聖人之意只恁地說不得縁在當時只理㑹象數故聖人明之以理賀孫潔淨精微謂之易易自是不惹着事只懸空說一種道理不似它書便各著事上說所以後來道家取之與老子為類便是老子說話也不就事上說學䝉潔淨精微是不犯手又云是各自開去不相沾黏去聲方子佐録云是不沾着一箇物事問讀易若是從伊川之說恐太見成無致力思索處若用已意思索立說又恐渉狂易浩近學看易主以伊川之說參以横渠温公安定荆公東坡漢上之解擇其長者抄之或足以已意可以如此否曰吕伯恭教人只得看伊川易也不得致疑某謂若如此看文字有甚精神却要我做甚浩曰伊川不應有錯處曰他說道理決不錯只恐於文義名物也有未盡又曰公看得諸家如何浩曰各有長處曰東坡解易大體最不好然他却㑹作文識句法解文釋義必有長處浩總論卦彖爻古易十二篇人多說王弼改今本或又說費直初改只如乾卦次序後來王弼盡改彖象各從爻下近日吕伯恭却去後漢中尋得一處云是韓康伯改都不說王弼據某考之其實是韓康伯初改如乾卦次序其他是王弼改雉卦分明自將一片木畫卦於壁上所以為卦爻是兩箇交乂是交變之義所以為爻學履問見朋友記先生說伏羲只畫八卦未有六十四卦今看先天圖則是那時都有了不知如何曰不曾恁地說那時六十四卦都畫了又問云那時未有文字言語恐也只是卦畫未有那卦名否曰而今見不得學履問卦下之辭為彖辭左傳以為繇辭何也曰此只是彖辭故孔子曰智者觀其彖辭則思過半矣如元亨利貞乃文王所繫卦下之辭以斷一卦之吉㓙此名彖辭彖斷也陸氏音中語所謂彖之經也大哉乾元以下孔子釋經之辭亦謂之彖所謂彖之傳也爻下之辭如潛龍勿用乃周公所繋之辭以斷一爻之吉㓙也天行健君子以自强不息所謂大象之傳潛龍勿用陽在下也所謂小象之傳皆孔子所作也天尊地卑以下孔子所述繋辭之傳通論一經之大體凡例無經可附而自分上繫下繫也左氏所謂繇字從系疑亦是言繫辭繋辭者於卦下繋之以辭也銖八卦之性情謂之性者言其性如此又謂之情者言其發用處亦如此如乾之健本性如此用時亦如此淵卦體如内健外順内隂外陽之類卦德如乾健坤順之類淵有一例成卦之主皆說於彖詞下如屯之初九利建侯大有之五同人之二皆如此礪或說一是乾初畫某謂那時只是隂陽未有乾坤安得乾初畫初間只有一畫者二到有三畫方成乾卦淳問乾一畫坤兩畫如何曰觀乾一而實與坤二而虚之說可見本義繋辭上第六章乾只是一箇物事充實徧滿天所覆内皆天之氣坤便有開闔乾氣上來時坤便開從兩邊去如兩扇門相似正如扇之運風甑之蒸飯扇甑是坤風與蒸則乾之氣也僴録畧凡易一爻皆具兩義如此吉者不如此則㓙如此㓙者不如此則吉如出門同人須是自出去與人同方吉若以人從欲則㓙亦有分曉說破底婦人吉夫子㓙咸其腓雖㓙居吉君子得輿小人剥廬如需于泥致冦至更不決吉㓙夫子便象辭中說破云若敬慎則不敗也此是一爻中具吉㓙二義者如小過飛鳥以㓙若占得此爻則更無可避禍處故象曰不可如何也㽦六爻不必限定是說人君且如潛龍勿用若是庶人得之自當不用人君得之也當退避見龍在田若是衆人得亦可用事利見大人如今人所謂宜見貴人之類易不是限定底物伊川亦自說一爻當一事則三百八十四爻只當得三百八十四事說得自好不知如何到他解却恁地說淵易中緊要底只是四爻淵伊川云卦爻有相應看來不相應者多且如乾卦如其說時除了二與五之外初何嘗應四三何嘗應六坤卦更都不見相應此似不通淵伊川多說應多不通且如六三便夾些陽了隂則渾是不發底如六三之爻有陽所以言含章若無陽何由有章含章為是有陽半動半靜之爻若六四則渾是柔了所以括囊淵問王弼說初上無隂陽定位如何曰伊川說隂陽竒偶豈容無也乾上九貴而無位需上九不當位乃爵位之位非隂陽之位此說極好學履程先生曰卦者事也爻者事之時也先生曰卦或是時爻或是事都定不得卦爻象初無一定之例淵卦體卦變伊川不取卦變之說至柔來而文剛剛自外來而為主於内諸處皆牽强說了王輔嗣卦變又變得不自然某之說却覺得有自然氣象只是換了一爻非是聖人合下作卦如此只是卦成了自然有此象礪漢上易卦變只變到三爻而止於卦辭多有不通處某更推盡去方通如旡妄剛自外來而為主於内只是初剛自訟二移下來晉柔進而上行只是五柔自觀四挨上去此等類按漢上卦變則通不得與季通在旅邸推義剛卦有兩様生有從兩儀四象加倍生來底有卦中互換自生一卦底互換成卦不過換兩爻這般變卦伊川破之及到那剛來而得中却推不行大率是就義理上看不過如剛自外來而得中分剛上而文柔等處看其餘多在占處用也賁變節之象這須無緊要然後面有數處彖辭不如此看無來處解不得淵易上經始乾坤而終坎離下經始艮兊震巽而終坎離楊至之云上經反對凡十八卦下經反對亦十八卦先生曰林黄中等上下經隂陽爻適相等某筭來誠然方子問近略考卦變以彖辭考之說卦變者凡十九卦葢言成卦之由凡彖辭不取成卦之由則不言所變之爻程子專以乾坤言變卦然只是上下兩體皆變者可通若只一體變者則不通兩體變者凡七卦隨蠱賁咸恒漸渙是也一體變者兩卦訟旡妄是也七卦中取剛來下柔剛上柔下之類者可通至一體變者則以來為自外來故說得有礙大凡卦變須看兩體上下為變方知其所由以成之卦曰便是此處說得有礙且程傳賁卦所云豈有乾坤重而為泰又自泰而變為賁之理若其說果然則所謂乾坤變而為六子八卦重而為六十四皆由乾坤而變者其說不得而通矣葢有則俱有自一畫而二二而四四而八而八卦成八而十六十六而三十二三十二而六十四而重卦備故有八卦則有六十四矣此康節所謂先天者也若震一索而得男以下乃是已有此卦了就此卦生出此義皆所謂後天之學今所謂卦變者亦是有卦之後聖人見得有此象故發於彖辭安得謂之乾坤重而為是卦則更不可變而為他卦耶若論先天一卦亦無既畫之後乾一兊二離三震四至坤居末又安有乾坤變而為六子之理凡今易中所言皆是後天之易耳以此見得康節先天後天之說最為有功銖問乾坤大過頤坎離中孚小過八卦番覆不成兩卦是如何曰八卦便只是六卦乾坤坎離是四正卦兊便是番轉底巽震便是番轉底艮六十四卦只八卦是正卦餘便只二十八卦番轉為五十六卦學蒙録云自此八卦外只二十八卦畨轉為五十六卦就此八卦中又只是四正卦乾坤坎離是也中孚便是大底離小過是箇大底坎又曰中孚是箇雙夾底離小過是箇雙夾底坎大過是箇厚畫底坎頤是箇厚畫底離按三畫之卦只是六卦即六畫之卦以正卦八加反卦二十有八為三十有六六六三十六也邵子謂之暗卦小成之卦八即大成之卦六十四八八六十四也三十二與六十四同卦有反有對乾坤坎離是反艮兊震巽是對乾坤坎離倒轉也只是四卦艮兊震巽倒轉則為中孚頤小過大過其餘皆是對卦淵福州韓云能安其分則為需不能安其分則為訟能通其變則為隨不能通其變則為蠱此是說卦對然只是此數卦對得好其他底又不然淵文蔚録作險而能忍則為需險而不能忍則為訟劉名信說福唐人互體自左氏以言亦有道理只是今推不合處多可學王弼破互體朱子發用互體淵朱子發互體一卦中自二至五又自有兩卦這兩卦又伏兩卦林黄中便倒轉推成四卦四卦裏又伏四卦此謂互體這自那風於天於土上有箇艮之象來淵一卦互換是兩卦伏兩卦是四卦反看又是兩卦又伏兩卦共成八卦淵問易中互體之說共父以為雜物撰德辨是與非則非其中爻不備此是說互體先生曰今人言互體者皆以此為說但亦有取不得處也如頤卦大過之類是也王輔嗣又言納甲飛伏尤更難理㑹納甲是震納庚巽納辛之類飛伏是坎伏離離伏坎艮伏兊兊伏艮之類也此等皆支蔓不必深泥時舉辭義易有象辭有占辭有象占相渾之辭節彖辭極精分明是聖人所作魯可幾曰彖是總一卦之義曰也有别說底如乾彖却是專說天道夫凡彖辭象辭皆押韻銖象數義多難明振二卦有二中二隂正二陽正言乾之無中正者葢云不得兼言中正二五同是中如四上是陽不得為正葢卦中以隂居陽以陽居隂是位不當隂陽各居本位乃是正當到那正中中正又不可曉淵林安卿問伊川云中無不正正未必中如何曰如君子而時中則是中無不正若君子有時不中即正未必中葢正則骨子好了而所作事有未恰好處故未必中也義剛中重於正正未必中葢事之斟酌得宜合理處便是中則未有不正者若事雖正而處之不合時宜於理無所當則雖正而不合乎中此中未有不正而正未必中也燾中重於正正不必中一件物事自以為正却有不中在且如飢渴飲食是正若過些子便非中節中節處乃中也責善正也父子之間則不中泳㬊亞夫問中正二字之義曰中須以正為先凡人做事須是剖決是非邪正却就是與正處斟酌一箇中底道理若不能先見正處又何中之可言譬如欲行賞罰須是先看當賞與不當賞然後權量賞之輕重若不當賞矣又何輕重之云乎壯祖中重於正正不必中中能度量而正在其中可學凡事先理㑹得正方到得中若不正更理㑹甚中顯仁陵寢時要發掘旁近數百家墓差御史往相度有一人說且教得中曾文清說只是要理㑹箇是與不是不理㑹中若還不合如此雖一家不可發掘何處理㑹中且如今賞賜人與之百金為多五十金為少與七十金為中若不合與則一金不可與更商量甚中淵易中只言利貞未嘗謂不利貞亦未嘗言利不貞必大厲多是在陽爻裏說淵吉㓙悔吝聖人說得極密若是一向䟽去却不成道理若一向密去却又不是易底意思淵吉㓙悔吝吉過則悔既悔必吝吝又復吉如動而生陽動極復靜靜而生隂靜極復動悔属陽吝属隂悔是逞快做出事來了有錯失處這便生悔所以属陽吝則是那隈隈衰衰不分明底所以属隂亦猶驕是氣盈吝是氣歉淵問時與位古易無之自孔子以來驟說出此義曰易雖說時與位亦有無時義可說者歴舉易中諸卦爻無時義可言者德明仁父問時與義曰夏日冬日時也飲湯飲水義也許多名目須是逐一理㑹過少閒見得一箇却有一箇著落不爾都只恁地鶻突過賀孫問讀易貴知時今觀爻辭皆是隨時取義然非聖人見識卓絶盡得義理之正則所謂隨時取義安得不差曰古人作易只是為卜筮今說易者乃是硬去安排聖人隨時取義只事到面前審驗箇是非難為如此安排下也德明聖人說易逐卦取義如泰以三陽在内為吉至否又以在上為吉大槩是要壓他隂六三所以不能害君子亦是被陽壓了但包羞而已包羞是做得不好事只得慚惶更不堪對人說闕上下經上下繫上經猶可曉易解下經多有不可曉難解處不知是某看到末梢懶了解不得為復是難解礪六十四卦只是上經說得齊整下經便亂董董地繫辭也如此只是上繫好看下繫便没理㑹論語後十篇亦然孟子末後却剗地好然而如那般以追蠡様說話也不可曉淵論易明人事孔子之辭說向人事上者正是要用得淵須是以身體之且如六十四卦須做六十四人身上看三百八十四爻又做三百八十四人身上小底事看易之所說皆是假說不必是有恁地事假設如此則如此假設如彼則如彼假設有這般事來人處這般地位便當恁地應淵易中説卦爻多只是說剛柔這是半就人事上說去連那隂陽上面不全就隂陽上說卦爻是有形質了隂陽全是氣彖辭所說剛柔亦半在人事上此四件物事有箇精粗顯微分别健順剛柔之精者剛柔健順之麄者淵問横渠說易為君子謀不為小人謀葢自太極一判而來便已如此了曰論其極是如此然小人亦具此理只是他自反悖了君子治之不過即其固有者以正之而已易中亦有時而為小人謀如包承小人吉大人否亨言小人當否之時能包承君子則吉但此雖為小人謀乃所以為君子謀也廣若論隂陽則須二氣交感方成嵗功若論君子小人則一分隂亦不可須要去盡那小人盡用那君子方能成治賀孫漢書易本隱以之顯春秋推見至隱易與春秋天人之道也易以形而上者説出在那形而下者上春秋以形而下者説上那形而上者去僴論後世易象京房卦氣用六日七分季通云康節亦用六日七分但不見康節說處方子京房軰說數捉他那影象才發見處便筭將去且如今日一箇人來相見便就那相見底時節算得這箇是好人不好人用得極精密他只是動時便算得靜便算不得人問康節庭前樹算得否康節云也算得須是待他動時方可須臾一葉落地便就這裏筭出這樹是甚時生當在甚時死淵京房便有納甲之說參同契取易而用之不知天地造化如何排得如此巧所謂初三震受庚上弦兊受丁十五乾體就十八巽受辛下弦艮受丙三十坤受乙這都與月相應初三昏月在西上弦昏在南十五昏在東十八以後漸漸移來至三十晦光都不見了又曰他以十二卦配十二月也自齊整復卦是震在坤下一陽臨是兊在坤下二陽泰是乾在坤下三陽大壯是震在乾上四陽夬是兊在乾上五陽乾是乾在乾上六陽姤是乾在巽上一隂遯是乾在艮上二隂否是乾在坤上三隂觀是巽在坤上四隂剥是艮在坤上五隂坤是坤在坤上六隂仲黙問太𤣥如何曰聖人說天一地二天三地四天五地六天七地八天九地十甚簡易今太𤣥說得却支離太𤣥如它立八十一首却是分隂陽中間一首半是隂半是陽若看了易後去看那𤣥不成物事又問或云易是隂陽不用五曰它說天一地二天三地四時便也是五了又言揚雄也是學焦延壽推卦氣曰焦延壽易也不成物事又問關子明二十七象如何曰某嘗說二十七象最亂道若是關子明有見識必不做這箇若是他做時便是無見識今人說焦延壽卦氣不好是取太𤣥不知太𤣥却是學它義剛問太𤣥曰天地間只有隂陽二者而已便㑹有消長今太𤣥有三个了如冬至是天元到三月便是地元七月便是人元夏至却在地元之中都不成物事䕫孫太𤣥甚拙嵗是方底物他以三數乘之皆算不著太𤣥紀日而不紀月無弦望晦朔方子太𤣥中高處只是黄老故其言曰老子之言道德吾有取焉方子太𤣥之說只是老莊康節深取之者以其書亦挨傍隂陽消長來說道理必大太𤣥亦自莊老來惟寂惟寞可見泳問太𤣥中首陽氣潛藏於黄宫性無不在於中養首藏心于淵美厥靈根程先生云云曰所謂藏心于淵但是指心之虚靜言之也如此乃是無用之心與孟子言仁義之心異可學自晉以來解經者却改變得不同如王弼郭象軰是也漢儒解經依經演繹晋人則不然捨經而自作文方子潛虚只是吉㓙臧否平王相休囚死閎祖日家四廢之說温公潛虚只此而已㽦潛虚後截是張行成續不押韻見得閎祖歐陽公所以疑十翼非孔子所作者他童子問中說道仰以觀於天文俯以察於地理又說河出圖洛出書聖人則之只是說作易一事如何有許多般様又疑後面有許多子曰既言子曰則非聖人自作這箇自是它曉那前面道理不得了却只去這上面疑他所謂子曰者往往是弟子後來旋添入亦不可知近來胡五峰將周子通書盡除去了篇名却去上面各添一箇周子曰此亦可見其比淵廖氏論洪範篇大段闢河圖洛書之事以此見知於歐陽公葢歐公有無祥瑞之論歐公只見五代有偽作祥瑞故併與古而不信如河圖洛書之事論語自有此說而歐公不信祥瑞併不信此而云繫辭亦不足信且如今世間有石頭上出日月者人取為石屏又有一等石上分明有如枯樹者亦不足恠也河圖洛書亦何足恠義剛老蘇說易專得於愛惡相攻而吉㓙生以下三句他把這六爻似那累世相讎相殺底人相似看這一爻攻那一爻這一畫克那一畫全不近人情東坡見他恁地太麄踈却添得些佛老在裏面其書自做兩様亦間有取王輔嗣之說以補老蘇之說亦有不曉他說了亂填補處老蘇說底亦有去那物理上看得著處淵東坡易說六箇物事若相咬然此恐是老蘇意其他若佛說者恐是東坡揚易舉正亂道必大朱震說卦畫七八爻稱九六他是不理㑹得老隂老陽之變且如占得乾之初爻是少陽便是初七七是少不㑹變便不用了若占得九時九是老老便㑹變便占這變爻此言用九用六亦如此淵朱子發解易如百衲襖不知是說甚麽以此進讀教人主如何曉便曉得亦如何用必大曰致堂文字決烈明白却可開悟人主曰明仲說得開一件義理他便說成一片如善畫者只一㸃墨便幹淡得開如尹和靖則便說不出范氏講義於淺處亦說得出只不㑹深不㑹密又傷要說義理多如解孟子首章摠括古今言利之說成一大片却於本章之義不曾得分曉想當時在講延進讀人主未必曾理㑹得大抵范氏不㑹辯如孟子便長於辯亦不是對他人說話時方辯但於緊要處反復論難自是照管得緊范氏之說鐶鎖不牢處多極有踈漏者必大問藉溪見譙天授問易天授令先看見乃謂之象一說藉溪未悟他日又問天授曰公豈不思象之在方録作於道猶易之有太極耶此意如何曰如此教人只好聽耳使某答之必先教他將六十四卦自乾坤起至雜卦且熟讀曉得源流方可及此煇方録云先生云此不可曉其實見而未形有無之間為象形則為器也問藉溪見譙天授問易天授曰且看見乃謂之象一句通此一句則六十四卦三百八十四爻皆通藉溪思之不得天授曰豈不知易有太極者乎先生曰若做箇說話乍看似好但學易功夫不是如此學履録云他自是一家說能悞人其說未是不過熟讀精思自首至尾章章推究字字玩索以求聖人作易之意庶幾其可一言半句如何便了得他謨譙先生說見乃謂之象有云象之在道乃易之在太極其意想是說道念慮才動處便有箇做主宰底然看得繫辭本意只是說那動而未形有無之間者幾底意思幾雖是未形然畢竟是有箇物了淵涪人譙定受學於二郭載子厚為象學其說云易有象學數學象學非自有所見不可得非師所能傳也譙與原仲書云如公所言推為文辭則可若見處則未公豈不思象之在道乃易之有太極耶後云語直傷交幸冀亮察見字本當音現譙作如字意譙作牧牛圖其序略云學所以明心禮所以行敬明心則性斯見行敬則誠斯至草堂劉致中為作傳甚詳方先生因說郭子和易謂諸友曰且如揲蓍一事可謂小小只所見不明便錯了子和有蓍卦辨疑說前人不是不知䟽中說得最備只是有一二字錯更有一段在乾卦䟽中劉禹錫說得亦近柳子厚曾有書與之辨先生揲蓍辨為子和設葢卿向在南康見四家易如劉居士變卦每卦變為六十四却是按古如周三教及劉虚谷皆亂道外更有戴主簿傳得麻衣易乃是戴公偽為之葢嘗到其家見其所作底文其體皆相同南軒及李侍郎被他瞞遂為之䟦某嘗作一文字辨之矣義剛或言某人近注易曰縁易是一件無頭面底物故人人各以其意思去解說得近見一兩人所注說得一片道理也都好但不知聖人元初之意果是如何春秋亦然廣因說趙子欽名彦肅易說曰以某看來都不是如此若有此意思聖人當初解彖解象繋辭文言之類必須自說了何待後人如此穿鑿今將卦爻來用線牽或移上在下或挈下在上辛辛苦苦說得出來恐都非聖人作易之本意須知道理聖人作易還要做甚用若如此穿鑿則甚非易簡而天下之理得矣又云今人凡事所以說他恁地支離者只是見得不透如釋氏說空空亦未是不是但空裏面須有道理始得若只說道我見得箇空而不知他有箇實底道理却做甚用得譬如一淵清水清泠徹底看來一如無水相似他便道此淵只是空底却不曾將手去探看自冷而濕終不知道有水在裏面此釋氏之見正如此今學者須貴於格物格至也須要見得到底今人只是知得一斑半㸃見得些子所以不到極處也又云某病後自知日月已不多故欲力勉諸公不可悠悠天下只是一箇道理更無三般兩様若得諸公見得道理透使諸公之心便是某心某之心便是諸公之心見得不差不錯豈不濟事耶時舉因看趙子欽易說云讀古人書看古人意須是不出他本來格當須看古人所以為此書者何如初間是如何若如屈曲之說却是聖人做一箇謎與後人猜摶決不是如此聖人之意簡易條暢通達那尚恁地屈曲纒繞費盡心力以求之易之為書不待自家意起於此而其安排已一一有定位賀孫趙善譽說易云乾主剛坤主柔剛柔便自偏了某云若如此則聖人作易須得用那偏底在頭上則甚既是乾坤皆是偏底道理聖人必須作一箇中卦始得今二卦經傳又却都不說那偏底意思是如何剛天德也如生長處便是剛消退處便是柔如萬物自一陽生後生長將去便是剛長極而消便是柔以天地之氣言之則剛是陽柔是隂以君子小人言之則君子是剛小人是柔以理言之則有合當用剛時合當用柔時廣林黄中以互體為四象八卦德明林黄中來見論易有太極是生兩儀兩儀生四象四象生八卦就一卦言之全體為太極内外為兩儀内外及互體為四象又顛倒取為八卦先生曰如此則不是生却是包也始畫卦時只是箇隂陽竒耦一生兩兩生四四生八而已方其為太極未有兩儀也由太極而後生兩儀方其為兩儀未有四象也由兩儀而後生四象方其為四象未有八卦也由四象而後生八卦此之謂生若以為包則是未有太極已先有兩儀未有兩儀已先有四象未有四象已先有八卦矣林又曰太極有四象既曰易有太極則不可謂之無濓溪乃有無極之說何也曰有太極是有此理無極是無形器方體可求兩儀有象太極則無象林又言三畫以象三才曰有三畫方看見似箇三才模様非故畫以象之也閎祖問易聖人所以立道窮神則無易矣此是指易書曰然易中多是說易書又有一兩處說易理神如今人所謂精神發揮乃是變易之不可測處易書乃為易之理冩真可學關子明易麻衣易皆是偽書麻衣易是南康士人作今不必問其理但看其言語自非希夷作其中有云學易者當於羲皇心地上馳騁不知心地如何馳騁可學麻衣易是南康戴某所作太平州刋本第二䟦即其人也師卦象倒說了閎祖問麻衣易是偽書其論師卦地中有水師容民蓄衆之象此一義也若水行地中隨勢曲折如師行而隨地之利亦一義也曰易有精有藴如師貞丈人吉此聖人之精畫前之易不可易之妙理至於容民蓄衆等處因卦以發皆其藴也既謂之藴則包含衆義有甚窮盡儘推去儘有也大雅麻衣易南康戴主簿撰麻衣五代時人五代時文字多繁絮此易說只是今人文字南軒䟦不曾辨得其書甚謬李壽翁甚喜之開板於太平州周子中又開板於舒州此文乃不唧𠺕底禪不唧𠺕底修養法不唧𠺕底日時法闕麻衣易南康戴主簿作某親見其人甚稱此易得之隱者問之不肯言其人某適到其家見有一册雜録乃戴公自作其言皆與麻衣易說大略相類及戴主簿死子弟將所作易圖來看乃知真戴公所作也恪浩問李壽翁最好麻衣易與關子明易如何先生笑曰偶然兩書皆是偽書關子明易是阮逸作陳無已集中說得分明麻衣易乃是南康戴主簿作某知南康時尚見此人已垂老却也讀書博記一日訪之見他案上有册子問是甚文字渠云是某有見抄録因借歸看内中言語文勢大率與麻衣易相似自捉破又因問彼處人麻衣易從何處得來皆云從前不曾見只見戴主簿傳與人又可知矣仍是淺陋内有山是天上物落在地上之說此是何等語他只是見南康有落星寺便為此說若時復落一兩箇世間人都被壓作粉碎先生遂大笑後來戴主簿死了某又就渠家借所作易圖看皆與麻衣易言語相應逐卦將來牽合取象畫取圖子需卦畫共食之象以坎卦中一畫作卓兩隂爻作飲食乾三爻作三箇人向之而食訟卦則三人背飲食而坐蒙卦以筆牽合六爻作小児之象大率可笑如此某遂冩與伯恭伯恭轉聞壽翁時壽翁知太平謂如此戴簿亦是明易人却作書托某津遣來太平相見時戴已死又曰李壽翁看杜撰易渠亦自得杜撰受用浩晁說之謂易占隨日隨時變但守見辭者死法也闕沙隨云易三百八十四爻惟閏嵗恰三百八十四日正應爻數余曰聖人作易如此則惟三年方一度可用餘年皆用不得矣且閏月必小盡審如公言則閏年止有三百八十三日更剰一爻無用處矣或問沙隨何以答曰它執拗不回豈肯服也僴龍圖是假書無所用康節之易自兩儀四象八卦以至六十四卦皆有用處礪朱子語類卷六十七
