body:
  text: 朱子語類卷一百四十論文下詩或言今人作詩多要有出處曰闗闗雎䧱出在何處文蔚因説詩曰曺操作詩必説周公如云山不厭髙水不厭深周公吐哺天下歸心又苦寒行云悲彼東山詩他也是做淂箇賊起不惟竊國之柄和聖人之法也竊了䕫孫詩見得人如曺操雖作酒令亦説従周公上去可見是賊若曺丕詩但説飲酒古詩須㸔西晋以前如樂府諸作皆佳杜甫䕫州以前詩佳䕫州以後自出規模不可學蘇黄只是今人詩蘇才豪然一滚說盡無餘意黄費安排徳眀選中劉琨詩髙東晉詩已不逮前人齊梁益浮薄明逺才徤其詩乃選之變體李太白專學之如腰鎌刈葵藿倚杖牧鷄豚分明説出箇倔強不肯甘心之意如疾風衝塞起砂礫自飄揚馬尾縮如蝟角弓不可張分明説出邊塞之状語又俊徤方子淵明詩平淡出於自然後人學他平淡便相去逺矣某後生見人做得詩好鋭意要學遂将淵明詩平側用字一一依他做到一月後便解自做不要他本子方得作詩之法或問形夭無千嵗改作形天舞干戚如何曰山海經分明如此説惟周丞相不信改本向薌林家藏邵康節親寫陶詩一冊乃作形夭無千嵗周丞相遂䟦尾以康節手書為㨿以為後人妄改也向家子弟携来求䟦某細㸔亦不是康節親筆疑熈豊以後人寫盖贗本也盖康節之死在熈寧二三年間而詩中避畜諱則當是熈寧以後書然筆畫嫩弱非老人筆也又不欲破其前説遂還之雉蘇子由愛選詩亭臯木葉下隴首秋雲飛此正是子由慢底句法某却愛寒城一以眺平楚正蒼然十字却有力雉齊梁間之詩讀之使人四肢皆懶慢不收拾晉人詩惟謝靈運用古韻如祐字協燭字之類唐人惟韓退之桞子厚白居易用古韻如毛穎傳牙字資字毛字皆協魚字韻是也人傑唐明皇資禀英邁只㸔他做詩出来是什麽氣魄今唐百家詩首載明皇一篇早渡蒲津關多少飄逸氣槩便有帝王底氣燄越州有石刻唐朝臣送賀知章詩亦只有明皇一首好有曰豈不惜賢達其如髙尚心雉李太白詩不專是豪放亦有雍容和緩底如首篇大雅乆不作多少和緩陶淵明詩人皆説是平淡據某㸔他自豪放但豪放得来不覺耳其露出本相者是詠荆軻一篇平淡底人如何説得這様言語出来雉張以道問太白五十篇古風不似他詩如何曰太白五十篇古風是學陳子昻感遇詩其間多有全用他句處義剛杜詩初年甚精細晩年横逸不可當只意到處便押一箇韻如自秦州入蜀諸詩分明如畫乃其少作也李太白詩非無法度乃従容於法度之中蓋聖於詩者也古風両卷多效陳子昂亦有全用其句處太白去子昻不逺其尊慕之如此然多為人所亂有一篇分為三篇者有三篇合為一篇者方子佐同李太白終始學選詩所以好杜子美詩好者亦多是效選詩漸放手夔州諸詩則不然也雉或問李白清水出芙蓉天然去雕餙前輩多稱此語如何曰自然之好又不如芙蓉露下落楊桺月中踈則尤佳雉人多説杜子美䕫州詩好此不可曉䕫州詩却説得鄭重煩絮不如他秦中有一節詩好魯直一時固自有所見今人只見魯直説好便却説好如矮人㸔戱耳問韓退之潮州詩東坡海外詩如何曰却好東坡晚年詩固好只文字也多是信筆胡説全不㸔道理雉杜子美晚年詩都不可曉吕居仁嘗言詩字字要響其晚年詩都啞了不知是如何以為好否杜詩萬里戎王子何年别月支後説花云云今人只説道戎王子自月支帶得花来此中嘗有一人在都下見一蜀人遍舖買戎王子皆無曰是蜀中一藥為本草不曾收今遂無人蓄方曉杜詩所言文字好用經語亦一病老杜詩致逺思恐泥東坡寫此詩到此句云此詩不足為法璘杜詩最多誤字蔡興宗正異固好而未盡某嘗欲廣之作杜詩考異竟未暇也如風吹蒼江樹雨洒石壁来樹字無意思當作去字無疑去字對来字又如蜀有漏天以其西北隂盛常雨如天之漏也故杜詩云鼓角漏天東後人不曉其義遂改漏字為滿似此類極多雉天閲象緯逼蔡興宗作天闚近是蔡云古本作闚史以管窺天佐杜子美暗飛螢自照語只是巧韋蘇州云寒雨暗深更流螢度髙閣此景色可想但則是自在説了因言國史補稱韋為人髙潔鮮食寡欲所至之處掃地焚香閉閤而坐其詩無一字做作直是自在其氣象近道意常愛之問比陶如何曰陶却是有力但語徤而意閒隠者多是帶性負氣之人為之陶欲有為而不能者也又好名韋則自在其詩直有做不著處便到塌了底晉宋間詩多閒淡杜工部等詩常忙了陶云身有餘勞心有常閒乃禮記身勞而心閒則為之也方韋蘇州詩高於王維孟浩然諸人以其無聲色臭味也方韓詩平易孟郊喫了飽飯思量到人不到處聮句中被他牽得亦著如此做人不可無戒謹恐懼底心荘子説庖丁觧牛神妙然才到那族必心怵然為之一動然後解去心動便是懼處韓文鬭雞聮句云一噴一醒然再接再礪乃謂雖困了一以水噴之便醒一噴一醒即所謂懼也此是孟郊語也説得好又曰争觀雲填道助呌波翻海此乃退之之豪一噴一醒然再接再礪乃此是東野之工雉韓退之詩強懐張不滿弱力闕易盈上句是助長下句是歉雉退之木鵝詩末句云直割乖龍左耳来事見龍川志正是木鵝事李賀較恠得些子不如太白自在又曰賀詩巧義剛劉义詩斗柄寒垂地河流凍徹天介甫詩柳樹鳴蜩綠暗荷花落日紅酣王建田家留客云丁寕回語屋中妻有客莫令児夜啼方子詩須是平易不費力句法混成如唐人玉川子輩句語雖險恠意思亦自有混成氣象因舉陸務觀詩春寒催喚客嘗酒夜静卧聼兒讀書不費力好賜行年三十九嵗莫日斜時孟子心不動吾今其庶幾此樂天以文滑稽也然猶雅馴非若今之作者村裏雜劇也方子佐同白樂天琵琶行云嘈嘈切切錯雜弹大珠小珠落玉盤云云這是和而淫至凄凄不似向前聲滿坐重聞皆淹泣這是淡而傷道夫唐文人皆不可曉如劉禹錫作詩說張曲江無後及武元衡被刺亦作詩快之白樂天亦有一詩暢快李徳裕樂天人多説其清髙其實愛官職詩中凡及冨貴處皆說得口津津地涎出杜子美以稷契自許未知做得與否然子美却髙其救房琯亦正必大木蘭詩只似唐人作其間可汗可汗前此未有方子黄巢入京師其夜有人作詩貼三省門罵之次日盡搜京師識字者一切殺之詩莫盛於唐亦莫慘於唐也揚先生偶誦寒山數詩其一云城中娥眉女珠佩何珊珊鸚鵡花間弄琵琶月下彈長歌三日響短舞萬人㸔未必長如此芙蓉不耐寒云如此類煞有好處詩人未易到此公曾㸔否夀昌對亦嘗㸔来近日送浩来此灑掃時亦嘗書寒山一詩送行云飬子未經師不及都亭䑕何曾見好人豈聞長者語為染在薫蕕應須擇朋侣五月敗鮮魚勿令他笑汝夀昌因舉石曼卿詩極有好處如仁者雖無敵王師固有征無私乃時雨不殺是天聲長篇某舊於某人處見曼卿親書此詩大字氣象方嚴遒勁極可寳愛真所謂顏筋栁骨今人喜蘇子美字以曼卿字比之子美逺不及矣某常勸其人刻之不知今安在曼卿詩極雄豪而縝宻方嚴極好如籌筆驛詩意中流水逺愁外舊山青又樂意相闗禽對語生香不㫁樹交花之句極佳可惜不見其全集多於小説詩話中略見一二爾曼卿胷次極髙非諸公所及其為人豪放而詩詞乃方嚴縝宻此便是他好處可惜不曾得用雉子䝉同東坡作詩譏一昏闇之人有句云煙雨塞九竅黎矇子詩璘蜚卿問山谷詩曰精絶知他是用多少工夫今人卒乍如何及得可謂巧好無餘自成一家矣但只是古詩較自在山谷則刻意為之又曰山谷詩忒好了道夫陳後山初見東坡時詩不甚好到得為正字時筆力髙妙如題趙大年所畫髙軒過圖云晚知書畫真有益却悔嵗月来無多極有筆力其中云八二者乃大年行次也雉閉門覔句陳無己對客揮毫秦少游無己平時出行覺有詩思便急歸擁被臥而思之呻吟如病者或累日而後成真是閉門覔句如秦少游詩甚巧亦謂之對客揮毫者想他合下得句便巧張文潜詩只一筆寫去重意重字皆不問然好處亦是絶好淳陳博士在坡公之門逺不及諸公未說如秦黄之流只如劉景文詩云四海共知霜髩滿重陽曾挿菊花無陳詩無此句矣其雜文亦自不及備論道夫山谷集中贈覺範詩乃覺範自作又曰山谷詩乃洪駒父輩刪集義剛覺範詩如何及得參寥義剛張文潛詩有好底多但頗率爾多重用字如梁甫吟一篇筆力極徤如云永安受命堪垂涕手挈庸兒是天意等處説得好但結末差弱耳又曰張文潛大詩好崔徳符小詩好又曰蘇子由詩有數篇誤收在文潛集中雉崔徳符魚詩云小魚喜親人可釣亦可扛大魚自有神出没不可量如此等作甚好文鑑上却不收不知如何正道理不取只要巧潘邠老有一詩一句説一事更成甚詩必大古人詩中有句今人詩更無句只是一直説将去這般詩一日作百首也得如陳簡齋詩亂雲交翠壁細雨濕青林暖日薰楊桞濃隂醉海棠他是什麽句法雉髙宗最愛簡齋客子光隂詩卷裏杏花消息雨聲中又問坐間云簡齋墨梅詩何者最勝或以臯字韻一首對先生曰不如相逢京洛渾依舊惟恨緇塵染素衣雉劉叔通屢舉簡齋六經在天如日月萬事隨時更故新江南丞相浮雲壊洛下先生宰木春前謂荆公後謂伊川先生曰此詩固好然也須與他分一箇是非始得天下之理那有兩箇都是必有一箇非雉有人過昭陵題絶句云桑麻不擾嵗豐登邉将無功吏不能四十二年那忍説西風吹淚過昭陵後来人説是劉信叔詩也廣政爾雪峰千百衆澹然雲水一孤僧曾文清詩璘舉南軒詩云卧聼急雨打芭蕉先生曰此句不響曰不若作卧聞急雨到芭蕉又言南軒文字極易成嘗見其就腿上起草頃刻便就至劉叔通江文卿二人皆能詩叔通放體不拘束底詩好文卿有格律入規矩底詩好游開子䝉嘗和劉叔通詩昨夜劉郎叩角歌朔雲寒雪滿山阿文章無用乃如此富貴不来争奈何雉錄又四句云邴鄭鄉嘗依北海晁張今復事東坡吹嘘合有飛騰便未用溪頭買釣蓑此詩若遇蘇黄須提掇他文蔚雉錄云先生屢稱之曰詩須不費力方好此䓁使蘇黄見之當賞音人固有遇耳方伯謨詩不及其父錢監公豪壮黄子垕詩却老硬只是太枯淡徐斯遠玉山人與汝談比諸人較好斯逺乃程克俊之甥亦是有源流雉或問趙昌父徐斯逺韓仲止曰昌父較懇惻又問三兄詩文曰斯遠詩文雖小畢竟清文蔚力推獰龍借水飲手却猛虎奪石坐劉淳叟詩雲谷有虎挨石淳叟作此自以為好不可曉璘谷簾水所以好處某向欲作一首形容之然極難言大槩到口便空又􅉸然此両字亦説未出必大龍衮新天子羊裘老故人意味好道夫羣趨浴沂水遥集舞雩風同安日試風乎舞雩詩蔡京父子在京城之西兩坊對賜甲第四區極天下土木之工一曰太師第乃京之自居也二曰樞宻第乃攸之居也三曰駙馬第乃鞗之居也四曰殿監第乃攸子之居也攸妻劉乃明達明節之族有寵而二劉不能容乃出嫁鞗權寵之盛亞於京攸四第對開金碧相照嘗見上官仲恭詩一篇其間有城西曲言蔡氏奢侈敗亡之事最為豪健末云君不見喬木参天獨樂園至今猶是温公宅仲恭乃上官彦衡之子也惜乎其詩不行於世雉本朝婦人能文只有李易安與魏夫人李有詩大畧云兩漢本繼紹新室如贅疣云云所以嵇中散至死薄殷周中散非湯武得國引之以比王莽如此等語豈女子所能廣有鬼詩云鸎聲不逐春光老花影長隨日脚流廣有僧月夜㸔海潮得句云沙邉月趂潮回而無對因㸔風飄木葉乃云木末風隨葉下雖對不過亦且如此問曾慥所編百家詩曰只是他所見如此他要無不㑹詩詞文章字畫外更編道書八十卷又别有一書甚少名八段錦㸔了便真以為是神仙不死底人古樂府只是詩中間却添許多泛聲後来人怕失了那泛聲逐一聲添箇實字遂成長短句今曲子便是胡泳作詩間以數句適懐亦不妨但不用多作蓋便是陷溺爾當其不應事時􅊭淡自攝豈不勝如思量詩句至其真味發溢又却與尋常好吟者不同近世諸公作詩費工夫要何用元祐時有無限事合理㑹諸公却盡日唱和而已今言詩不必作且道恐分了為學工夫然到極處當自知作詩果無益必大今人所以事事做得不好者縁不識之故只如箇詩舉世之人盡命去奔去聲做只是無一箇人做得成詩他是不識好底将做不好底不好底将做好底這箇只是心裏閙不虗静之故不虗不静故不明不明故不識若虚静而明便識好物事雖百工技藝做得精者也是他心虚理明所以做得来精心裏閙如何見得僴詩社中人言詩皆原於賡歌今觀其詩如何有此意作詩先用㸔李杜如士人治本經本既立次第方可㸔蘇黄以次諸家詩廣敬仲同因林擇之論趙昌父詩曰今人不去講義理只去學詩文已落第二義况又不去學好底却只學去做那不好底作詩不學六朝又不學李杜只學那嶢﨑底今便學得十分好後把作甚麽用莫道更不好如近時人學山谷詩然又不學山谷好底只學得那山谷不好處擇之云後山詩恁地深他資質儘髙不知如何肯去學山谷曰後山雅徤強似山谷然氣力不似山谷較大但却無山谷許多輕浮底意思然若論叙事又却不及山谷山谷善叙事情叙得盡後山叙得較有踈處若散文則山谷大不及後山淳錄云後山詩雅徤勝山谷無山谷瀟洒輕揚之態然山谷氣力又較大叙事詠物頗盡事情其散文又不及後山擇之云歐公好梅聖俞詩然聖俞詩也多有未成就處曰聖俞詩不好底多如河豚詩當時諸公説道恁地好㨿某㸔来只似箇上門罵人底詩只似脱了衣裳上人門罵人父一般初無深逺底意思後山山谷好説文章臨作文時又氣餒了老蘇不曾説到下筆時做得却雄徤義剛淳畧今江西學者有両種有臨川来者則漸染得陸子静之學又一種自揚謝来者又不好子静門猶有所謂學不知窮年窮月做得那詩要作何用江西之詩自山谷一變至楊廷秀又再變遂至於此楊大年雖巧然巧之中猶有混成底意思便巧得来不覺及至歐公早漸漸要說出來然歐公詩自好所以他喜梅聖俞詩蓋枯淡中有意思歐公最喜一人送别詩両句云曉日都門道微涼草樹秋又喜王建詩曲徑通幽處禪房花木深歐公自言平生要道此語不得今人都不識這意思只要嵌事使難字便云好雉先生因説古人做詩不十分着題却好今人做詩愈著題愈不好或舉某人會做詩曰他是某人外甥他家都㑹做詩自有文種又云某嘗謂氣類近風土逺氣類才絶便從風土去且如北人居婺州後來皆出做婺州文章間有婺州鄉談在裏面者如吕子約輩是也燾或問倉頡作字亦非細人曰此亦非自撰出自是理如此如心性等字未有時如何撰得只是有此理自流出可學字附大凡字只聲形二者而已如楊字木是形昜是聲其餘多有只從聲者按六書中形聲其一􅓌凡字如楊柳字木是文昜邜是字如江河字水是文工可是字字者滋也謂滋添者是也揚因説叶韻先生曰此謂有文有字文是形字是聲文如從水從金從木從日從月之類字是皮可工奚之類故鄭漁仲云文眼學也字耳學也盖以形聲别也時舉壹貳叄肆皆是借同聲字㭍字本無此字唯有漆沮之漆漆字草書頗似㭍遂誤以為真洪氏𨽻釋辨不及此閎祖世字與太字古多互用如太子為世子太室為世室之類廣黄直卿云如傭僱之傭也只訓用以其我用他故将雇以還其力由此取義此皆是両通底字義剛夷狄字皆從禽獸旁苖本有反犬古人字通用無所碍義剛古人相形造字自是動不得如轡字後靣一箇車両邊從系即纒繩也前靣口字即馬口也馬口中銜著纒䋲也子蒙秦篆今皆無此本而今只是摹本自宋莒公已不見此本了義剛説文亦有誤解者亦有解不行者音是徐鉉作許氏本無必大玉篇偏傍多誤收者如者考老是也􅓌韻書難理㑹如昨日撿抑字玉篇説文中撿才及邑附皆不見後来在集韻中尋出乃云反印也却在印部尋得元来無挑才如此冩印義剛字之反切其字母同者便可互用如戎汝是也逝字從折故可與害字叶􅀈必大五方之民言語不通却有暗合處盖是風氣之中有自然之理便有自然之字非人力所能安排如福與備通洪州有一部洪韻太平州亦有一部韻家文字義剛二王書某曉不得㸔著只見俗了今有箇人書得如此好俗法帖上王帖中亦有寫唐人文字底亦有一釋名底此皆偽者揚字説自不須辯只㸔説文字類便見王氏無意思字類有六㑹意居其一方字被蘇黄胡亂冩壊了近見蔡君謨一帖字字有法度如端人正士方是字揚論書因及東坡少壮老字之異南康有人有一卷如此因説南軒喜字然不甚難辨因有一偽書東坡字不好南軒以端荘題之因論麻衣易不難辨南軒以快之故嘗勸其改一文曰改亦只如是不解更好了揚子瞻單勾把筆錢穆父見之曰尚未能把筆邪方山谷不甚理㑹得字故所論皆虚来者理㑹得故所論皆實嘉祐前前輩如此厚重胡安定於義理不分明然是甚氣象魯直論字學只好於印冊子上㸔若㸔碑本恐自未能如其所言必大字法直黑内黄魯直論得𤣥甚然其字却且如此揚筆力到則字皆好不曰有筆力如胷中别様即動容周旋中禮方寫字不要好時却好文蔚南海諸蕃書煞有好者字畫遒勁如古鍾鼎欵識諸國各不同風氣初開時此䓁事到處皆有開其先者不獨中國也或問古今字畫多寡之異曰古人篆刻筆畫雖多然無一筆可減今字如此簡約然亦不可多添一筆便是世變自然如此僩鄒徳父楷書大學今人寫得如此亦是難得只如黄魯直書自謂人所莫及自今觀之亦是有好處但自家既是寫得如此好何不教他方正須要得恁欹斜則甚又他也非不知端楷為是但自要如此寫亦非不知做人誠實端慤為是俱自要恁地放縦道夫問何謂書竆八法曰只一㸃一畫皆有法度人言永字體具八法行夫問張于湖字何故人皆重之曰也是好但是不把持愛放縦本朝如蔡忠惠以前皆有典則及至米元章黄魯直諸人出来便不肯恁地要之這便是世態衰下其為人亦然道夫言尋常見魯直亦説好話意謂他與少游諸人不同曰他也却説道理但到做處亦與少游不争多他一輩行皆是恁地道夫曰也是坡公做頭故他們從而和之曰然某昨日㸔他與李方叔一詩説他起屋有甚明窻浄几眼前景致末梢又只歸做好吟詩上去若是要只粗説也且説讀書竆䆒古今成敗之類亦可如何却專要吟詩便了道夫曰㸔他也是将這箇来做一箇要緊處曰他是将来做箇大事㸔了如唐韓桞皆是恁地道夫云嘗愛歐公詩云至哉天下樂終日在書案這般意思甚好曰他也是説要讀書只歐公却於文章似説不做亦無緊要如送徐無黨序所謂無異草木榮華之飄風鳥獸好音之過耳皆是這意思道夫曰前輩皆有一病如歐公又却疑繫辭非孔子作曰這也是他一時所見如繫辭文言若是孔子做如何又却有子曰字某嘗疑此䓁處如五峰刻通書相似去了本来所有篇名却於每篇之首加一周子曰字通書去了篇名有篇内無本篇字如理性命章者煞不可理㑹盖厥彰厥微匪靈弗瑩是説理剛善剛悪柔亦如之中焉止矣是説性自此以下却説命章内全無此三字及所加周子曰三字又却是本所無者次第易繋文言亦是門人弟子所勦入爾道夫問五峰於通書何故輙以己意加損曰他病痛多又寄居湖湘間士人希踈兼他自立得門庭又髙人既未必信他被他門庭髙人亦一向不来来到他處箇又是不如他底不能問難故絶無人與之講䆒故有許多事道夫曰如他説孟子道性善似乎好竒全不平帖曰他不是好竒只是㸔不破須著如此説又如疑孟辨别自做出一様文字温公疑得固自不是但他箇更無理㑹某嘗謂今只將前輩與聖賢説話来㸔便見自家不及他䖏今孟子説得平易如此温公所疑又見明白自家却説得恁地聱牙如何辨得他倒道夫曰如此則是他只見那一邊不知有這一邊了曰他都不知了只如楊氏為我只知為我都不知聖賢以天地萬物為一體公其心而無所私底意思了又如老氏之虗無清浄他只知箇虗無清浄今人多言釋氏本自見得這箇分明只是見人如何遂又别為一説某謂豈有此理只認自家説他不知便得先生以手指其下月曰他若知之則白處便須還是白黑處便須還是黑豈有知之而不言者此孟子所謂詖辭知其所蔽淫辭知其所䧟邪辭知其所離遁辭知其所竆辭之不平便是他蔽了蔽了便䧟䧟了便離離了便竆且如五峰疑孟辨忽出甚感物而動者衆人也感物而節者賢人也感物而通者聖人也劈頭便罵了箇動他之意是聖人之心雖感物只静在這裏感物而動便不好中間胡廣仲只管支離蔓衍説将去更説不回某一日讀文定春秋有何况聖人之心感物而動一語某執以問之曰若以為感物而動是不好底心則文定當時何故有此説廣仲遂語塞先生復笑而言曰盖他只管守著五峯之説不肯放某却又討得箇大似五峯者與他説只是以他家人自與之辨極好道理只是見不破彼便有許多病痛道夫拾遺編成而又有遺者萃此志氣清明思慮精一烱然不昩而常有以察於幾微之間則精矣立心之剛用力之篤毅然自守而常有以謹於毫釐之失則一矣人心之動變態不一所謂五分天理五分人欲者特以其善惡交戰而言爾有先發於天理者有先發於人欲者盖不可以一端盡也人心但以形氣所感者而言爾具形氣謂之人合義理謂之道有知覺謂之心便以動者為危亦未當若動於義理則豈得謂之危乎允執有常乆不變之意者得之此建别錄所載廣錄五條疑是荅學書語今入此寤寐者心之動静也有思無思者又動中之動静也思有善惡又動中動陽明隂濁也有夢無夢者又静中之動静也夢有邪正又静中動陽明隂濁也但寤陽而寐隂寤清而寐濁寤有主而寐無主故寂然感通之竗必於寤而言之寤則虚靈知覺之體燀然呈露如一陽復而萬物生意皆可見寐則虚靈知覺之體隠然潜伏如純坤月而萬物生性不可窺此答陳日書而詳問遺書忠信進徳終日以下是説此一理後言形氣今古人我皆一統神如在上在左右是道體徧滿誠字是實理如此射中鵠舞中節御中度無誠心則不中言多不記理義恱心是愜當玩理飬心則両進一是知而恱一是飬而恱當知用心緩急如大經大體是要先知用心以次乃可緩緩進曲能有誠有誠則不曲矣盖誠者圎成無欠闕者也萬物無一物失所是使之各得其分恰好處人心活則周流無偏係即活憂患樂好皆偏係也方謂無私意則循天之理自然周流事君有犯無隠事親有隠無犯有時而可分言事君親之心本同也只歸之自然則更無可觀更無可玩索上句謂不求其所以然只説一箇自然是顢頇也謂不可如此爾龜山荅人問赤子入井令求所以然一段好仁則固一一所以為仁言所以一者是仁也仁在事若不於事上㸔如何見仁退藏於宻宻是主静處萬化出焉者動中之静固是静又有大静萬化參然者㫁置言倒㫁措置也言四徳云不有其功常人而已者也不有其功言化育之無迹處為貞因言貞於五常為智孟子曰知斯二者勿去是也既知又曰弗去有両義又文言訓正固又於四時為冬冬有始終之義王氏亦云腎有両有龜有蛇所以朔易亦猶貞也又傳曰貞各穪其事問咸傳之九四説虚心貞一處全似敬荅云盖嘗有語曰敬心之貞也孔子既知桓魋不能害己又却微服過宋一段有盡人事回造化立命之意方知性善以忠信為本須是的然識得這箇物事然後從忠信做将去若不識得這箇不知是做甚麽故曰先立乎其大者問敬先於知然知至則敬愈分明曰此正如配義與道問心無私主有感皆通曰無私主也不是慏悻没理㑹只是公善則好之惡則惡之善則賞之惡則刑之此是聖人至公至神之化心無私主如天地一般寒則徧天下皆寒熱則徧天下皆熱便是有感皆通曰心無私主最難曰亦是克去已私心便無私主心有私主只是相契者便應不相契者便不應如好讀書人見書便愛不好讀書人見書便不愛㝢問應務不煩是如何曰閒時不曽理㑹得臨時旋理㑹則煩若豫先理㑹得則臨時事来便從自家理㑹得處理㑹将去如理㑹得禮則禮到面前便理㑹得如理㑹得樂則樂到面前便理㑹得更不煩也燾天機有不器於物者在方為方在圓為圓方先生曰自家理㑹得這道理使天下之人皆理㑹得這道理豈不是樂嘗言坐即靠倚後来捱三四日便坐得先生云氣不從處乃是天理人欲交戰處也季通方神乃氣之精明者耳有翼其臨翼敬也僂句成欺黄裳亦誤事見左傳問范氏言宋襄公出母事有生則致孝死則盡禮之説然出母既義不可迎之以歸則所謂致孝盡禮者恐只是遣使命往来問遺否曰恐只是如此如定省之類自是都做不得了因言宣姜全不成人却有賢女許穆夫人宋襄公母是也春秋時魯最號禮義之國然其間成甚風俗必大康節説形而上者不能出莊老形而下者則盡之矣因誦皇極書第一篇二先生説下者不盡亦不甚説關子明説形而上者亦荘老季通方朱子語類卷一百四十
