body:
  text: 朱子語類卷六十孟子十盡心上盡其心者章盡其心者知其性也者字不可不子細看人能盡其心者只為知其性知性却在先文蔚李問盡其心者知其性也曰此句文勢與得其民者得其心也相似雉人往往説先盡其心而後知性非也心性夲不可分况其語脉是盡其心者知其性心只是包着這道理盡知得其性之道理便是盡其心若只要理㑹盡心不知如何地盡㽦或問盡心知性曰性者吾心之實理若不知得盡却盡个甚麽盡其心者知其性也所以能盡其心者由先能知其性知性則知天矣知性知天則能盡其心矣不知性不能以盡其心物格而後知至道夫盡其心者由知其性也先知得性之理然後眀得此心知性猶格物盡心猶知至徳明知性者物格也盡心者知至也物字對性字知字對心字節知性然後能盡心先知然後能盡未有先盡而後方能知者盖先知得然後見得盡節王徳修問盡心然後知性曰以某觀之性情與心固是一理然命之以心却似包着這性情在裏面故孟氏語意却似説盡其心者以其知性故也此意横渠得知故説心統性情者也看得精邵堯夫亦云性者道之形體心者性之郛郭身者心之區宇物者身之舟車語極有理大雅云横渠言心禦見聞不𢎞扵性則又是心小性大也曰禦字不可作止字與當字解禦有梏之意云心梏於見聞反不𢎞於性耳大雅問横渠謂心能盡性人能𢎞道也性不知檢其心非道𢎞人也如孟子盡其心者知其性也先生謂盡其心者必其能知性者也知性是物格之事盡心是知至之事如何曰心與性只一般知與盡不同所以知便是心了問知是心之神眀似與四端所謂智不同曰此知字義又大然孔子多説仁智如元亨利貞元便是仁貞便是智四端仁智最大無貞則元無起䖏無智則如何是仁易曰大眀終始有終便有始智之所以為大者以其有知也廣問先生所解盡其心者知其性也正如云得其民者得其心也語意同先生曰固自分曉尋此様子亦好後見信州教授林徳乆未甚信此説過欲因以其易曉者譬之如欲盡其為教授者必知其職業乃能盡也先生云存其心恰如教授在此方理㑹得每日職業過問盡心者知至也曰知得到時必盡我這心去做如事君必要極扵忠為子必要極扵孝不是備禮如此既知得到這䖏若扵心有些子未盡䖏便打不過便不足賀孫專論盡心問盡心只是知得盡未説及行否曰某初間亦把做只是知得盡如大學知至一般未説及行後来子細看如大學誠意字模様是真个恁地盡如惡惡臭如好好色知至亦須兼誠意乃盡如知得七分自家去做只着得五分心力便是未盡有時放緩又不做了如知得十分真切自家須着過二十分心力實去恁地做便是盡盡其心者知其性也知性所以能盡心淳此段句意恐未真某前以孟子盡心為如大學知至今思之恐當作意誠說盖孟子當時特地説箇盡心煞須用功所謂盡心者言心之所存更無一毫不盡好善便如好好色惡惡便如惡惡臭徹底如此沒些虗偽不實童云如所謂盡心力而為之之盡否曰然砥黄先之問盡心曰盡心是竭盡此心今人做事那曾做得盡只盡得四五分心便道了若是盡心只是一心為之更無偏旁底心如惡惡臭如好好色必定是如此如云盡心力為之賀孫盡心知性知天工夫在知性上盡心只是誠意知性却是窮理心未有盡便有空闕如十分只盡得七分便是空闕了二三分須是如惡惡臭如好好色孝便極其孝仁便極其仁性即理理即天我既知得此理則所謂盡心者自是不容己如此説却不重疊既能盡心知性則胸中已是瑩白浄潔却只要時時省察恐有汚壊故終之以存養之事謨盡心者發必自慊而無有外之心即大學意誠之事也道夫問盡心莫是見得心體盡或只是如盡性池録作盡忠盡信之類否曰皆是徳明盡心以見言盡性以養言徳明盡心盡性之盡不是做功夫之謂盖言上面功夫已至至此方盡得耳中庸言唯天下至誠為能盡其性孟子言盡其心者知其性是也銖盡心就見處説見理無所不盡如格物致知之意然心無限量如何盡得物有多少亦如何窮得盡但到那貫通處則纔来便曉得是為盡也存心却是就持守處説端蒙説盡心云這事理㑹得那事又理㑹不得理㑹得東邉又不理㑹得西邉只是從来不曾盡這心但臨事恁地胡亂挨将去此心夲来無有些子不備無有些子不該須是盡識得許多道理無些子窒礙方是盡心如今人人有箇心只是不曾使得他盡只恁地苟簡鹵莾便道是了賀孫問季通説盡心謂聖人此心才見得盡則所行無有不盡故程子曰聖人無俟扵力行曰固是聖人有這般所在然所以為聖人也只説好問黙而識之好古敏以求之那曾説知了便了又曰盡心如明鏡無些子蔽翳只看鏡子若有些少照不見處便是夲身有些塵汚如今人做事有些子鶻突窒礙便只是自家見不盡此心夲来虗靈萬理具備事事物物皆所當知今人多是氣質偏了又為物欲所蔽故昏而不能盡知聖賢所以貴於窮理又曰萬理雖具於吾心還使教他知始得今人有箇心在這裡只是不曾使他去知許多道理少間遇事做得一邊又不知那一邊見得東遺却西少間只成私意皆不能盡道理盡得此心者洞然光明事事物物無有不合道理又曰學問之所以傳不傳者亦是能盡心與不能盡心問若曾子易簀之事此時若不能正也只是不盡得心曰然曾子既見得道理自然便改了若不便改了這心下便闕了些當時季孫之賜曾子如何失㸃檢去上睡是不是了童子既説起須着改始得若不説不及改也不妨才説便着改賀孫問先生解盡心知性處云心無體以性為體如何曰心是虗底物性是裏面穣肚饀草性之理包在心内到發時却是性底出来性不是有一箇物事在裏面喚做性只是理所當然者便是性只是人合當如此做底便是性惟孟子惻隠之心仁之端也這四句也有性也有心也有情與横渠心統性情一語好看震盡心謂事物之理皆知之而無不盡知性謂知君臣父子兄弟夫婦朋友各循其理知天則知此理之自然人傑盡心如何盡得不可盡者心之事可盡者心之理理既盡之後謂如一物初不曾識来到面前便識得此物盡吾心之理盡心之理便是知性知天去偽末二句恐誤黄敬之問盡心知性曰性是吾心之實理若不知得却盡箇甚麽又問知其性則知天矣曰倪録云知天是知源頭来處性以賦於我之分而言天以公共道理倪録作公共之夲原而言天便脱模是一箇大底人人便是一箇小底天吾之仁義禮智即天之元亨利貞凡吾之所有者皆自彼而来也故知吾性則自然知天矣倪録此下云又問存心養性曰存得父子之心盡方養得仁之性存得君臣之心盡方養得義之性時舉因看程子語録心小性大心不𢎞於性滯於知思説及上蔡云心有止説遂云心有何窮盡只得此夲然之體推而應事接物皆是故於此知性之無所不有知天亦以此因省李先生云盡心者如孟子見齊王問樂則便對云云言貨色則便對云云每遇一事便有以處置将去此是盡心舊時不之曉盖此乃盡心之效如此得此本然之心則皆推得去無窮也如見牛未見羊説苟見羊則亦便是此心矣方盡心知性知天此是致知存心養性事天此是力行泳盡知存養盡心知性以前看得知字放輕今觀之却是知字重盡字輕知性則心盡矣存養有行底意思可學問盡知存養四字如何分别曰盡知是知底工夫存養是守底工夫震問盡心盡性曰盡心云者知之至也盡性云者行之極也盡心則知性知天以其知之已至也若存心養性則是致其盡性之功也人傑孟子説知性是知得性中物事既知得須盡知得方始是盡心下面存其心養其性方始是做工夫處如大學説物格而後知至物格者物理之極處無不到知性也知至者吾心之所知無不盡盡心也至扵知至而後意誠誠則存其心飬其性也聖人説知必説行不可勝數泳蜚卿問盡心存心盡莫是極至地位存莫是初存得這心否曰盡心也未説極至只是凡事便須理㑹教十分周足無少闕漏處方是盡存也非獨是初工夫初間固是操守存在這裏到存得熟後也只是存這存字無終始只在這裏賀孫孟子説存其心雖是𦂳切却似添事盖聖人只為學者立下規矩守得規矩定便心也自定如言居處恭執事敬與人忠人能如是存守則心有不存者乎今又説存其心則與此為四矣如此處要人理㑹升卿存之養之便是事心性便是天故曰所以事天也徳明仲思問存心養性先後曰先存心而後養性養性云者養而勿失之謂性不可言存問存心養性以事天曰天教你父子有親你便用父子有親天教你君臣有義你便用君臣有義不然便是違天矣古人語言下得字都不苟如存其心養其性若作養其心存其性便不得問如何是天者理之所從出曰天便是那太虗但能盡心知性則天便不外是矣性便有那天問四十而不惑五十而知天命不惑謂知事物當然之理知天命謂知事物之所以然便是知天知性之説否曰然他那裏自看得箇血脉相牽連要自子細看龜山之説極好龜山問學者曰人何故有惻隠之心學者曰出扵自然龜山曰安得自然如此若體䆒此理知其所從来則仁之道不逺矣便是此説僴存其心則能養其性正其情養其性如不暴方存心便性得所養季通説存心雖是然語性已踈性有動静盖孟子本文甚切方夭夀不貳不以生死為吾心之悦戚也人傑問立命是竪立得這天之所命不以私意参雜倒了天之正命否曰然問莫非命也此一句是總説氣禀之命與天命謂性之命同否以孟子之意未説到氣禀孟子自来不甚説氣禀看是此句只是説人物之生吉凶禍福皆天所命人但順受其正若桎梏而死與立乎巖墻之下而死便是你自取不干天事未説到氣禀上僴敬之問夭夀至命也曰既不以夭夀貳其心又須修身以俟方始立得這命自家有百年在世百年之中須事事教是當自家有一日在世一日之内也須教事事是當始得若既不以夭夀動其心一向胡亂做又不可如佛氏以絶滅為事亦可謂之夭夀不貳然修身以俟一段全不曾理㑹所以做底事皆無頭腦無君無父亂人之大倫賀孫敬之問夭夀不貳修身以俟之所以立命也夀夭是天命修身是順天命安于天理之正無一毫人欲計較之私而天命在我方始流行曰夭夀不貳是不疑他若一日未死一日要是當百年未死百年要是當這便是立命夭夀不貳便是知性知天之力脩身以俟便是存心養性之功立命一句更用通下章看又問莫非命也順受其正若是人力所致者如何是命曰前面事都見不得若出門吉凶禍福皆不可知但有正不正自家只順受他正底自家身分無過恁地死了便是正命若立巖墻之下與桎梏而死便不是正命或如比干剖心又不可不謂之正命直卿説先生向嘗譬喻一似受差遣三年滿罷便是君命之正若嵗月間以罪去也是命便不是正底命先生曰若自家無罪便嵗月間去又不可不謂之正命子善問孟子謂知命者不立巖墻之下今人却道我命若未死縦立巖墻之下也不到壓死曰莫非命者是活絡在這裡看他如何来若先説道我自有命雖立巖墻之下也不妨即是先指定一箇命便是紂説我生不有命在天因舉横渠行同報異與氣遇等語伊川却道他説遇䖏不是又曰這一段文勢直是緊若精神鈍底真个趕他不上如龍虎變化直是捉搦他不住倪時舉略問由太虗云云曰夲只是一箇太虚漸漸細分説得宻耳且太虚便是這四者之搃體而不雜乎四者而言由氣化有道之名氣化是那隂陽造化寒暑晝夜雨露霜雪山川木石金水火土皆是只這个便是那太虗只是便雜却氣化説雖雜氣化而實不雜乎太虗未説到人物各具當然之理處問太虗便是太極圖上面底圎圈氣化便是圎圈裡隂静陽動否曰然又曰合虚與氣有性之名有這氣道理便隨在裡面無此氣則道理無安頓䖏如水中月須是有此水方映得那天上月若無此水終無此月也心之知覺又是那氣之虚靈底聪明視聽作為運用皆是有這知覺方運用得這道理所以横渠説人能𢎞道是心能盡性非道𢎞人是性不知檢心又邵子曰心者性之郛郭此等語皆秦漢以下人道不到又問人與鳥獸固有知覺但知覺有通塞草木亦有知覺否曰亦有如一盆花得些水澆灌便敷榮若摧抑他便枯悴謂之無知覺可乎周茂叔忩前草不除去云與自家意思一般便是有知覺只是鳥獸底知覺不如人底草木底知覺又不如鳥獸底又如大黄喫着便㑹㵼附子喫着便㑹熱只是他知覺只從這一路去又問腐敗之物亦有否曰亦有如火燒成灰将来泡湯喫也㷿苦因笑曰頃信州諸公正説草木無性今夜又説草木無心矣僴集註先生問合虗與氣有性之名如何看廣云虗只是理有是理斯有是氣曰如何説合字廣云恐是據人物而言曰有是物則有是理與氣故有性之名若無是物則不見理之所寓由太虗有天之名只是據理而言由氣化有道之名由氣之化各有生長消息底道理故有道之名既已成物則物各有理故曰合虚與氣有性之名廣由太虗有天之名都是箇自然底由氣化有道之名是虗底物在實上見無形底物因有形而見所謂道者如天道地道人道父子之道君臣之道率性之謂道是也合虚與氣有性之名自然中包得許多物事䕫孫由太虗有天之名這全説理由氣化有道之名這説着事物上如率性之謂道性只是理率性方見得是道這説着事物上且如君臣父子之道有那君臣父子方見這个道理合虗與氣有性之名虗字便説理理與氣合所以有人植問知覺是氣之陽明否曰由太虚有天之名合虚與氣有性之名天命之謂性管此両句由氣化有道之名率性之謂道管此一句合性與知覺有心之名此又是天命謂性這正管此一句賜問當無事時虗明不昧此是氣其中自然動䖏莫是性否曰虗眀不昧此理具乎其中無少虧欠感物而動便是情横渠説得好由太虚有天之名由氣化有道之名此是搃説合虗與氣有性之名合性與知覺有心之名此是就人上説賜問由氣化有道之名是自隂陽言曰方見其有許多節次可學林問氣化何以謂之道曰天地間豈有一物不由其道者問合虗與氣何以有性曰此語詳看亦得其意然亦有未盡䖏當言虗即是性氣即是人以氣之虗眀寓扵中故合虗與氣有性之名雖説畧盡而終有二意劉問如此則莫是性離扵道邪曰非此之謂到這䖏則有是名在人如何看然豈有性離於道之理㝢問合虗與氣有性之名曰惟五峯發明得両句好非性無物非氣無形燾問合虗與氣有性之名合性與知覺有心之名曰虗只是説理横渠之言大率有未瑩䖏有心則自有知覺又何合性與知覺之有盖卿由太虗有天之名至知覺有心之名横渠如此議論極精宻驤伊川云盡心然後知性此不然盡字大知字零星饒録無此七字却云盡心者以其知性若未知性便要盡心則懸空無下手䖏惟就知性上積累将去自然盡心學䝉集義問盡心知性不假存養其惟聖人乎佛本不假扵存養豈竊希聖人之事乎曰盡知存養吾儒釋氏相似而不同只是他所存所養所知所盡䖏道理皆不是如吾儒盡心只是盡君臣父子等心便見有是理性即是理也如釋氏所謂盡心知性皆歸扵空虗其所存養却是閉眉合眼全不理㑹道理去偽或問伊川云心具天徳心有未盡䖏便是天徳未能盡切嘗熟味其言意者在天為命在人為性性無形質而舍之於心故一心之中天徳具足盡此心則知性知天矣㳺氏以心無餘藴為盡心謝氏以擴充得去為盡心皆此意也然横渠范侍講之説則又不然范謂窮理者孟子之所謂盡心也横渠曰大其心則能體天下之物物有未體則心為有外不知窮理體物之説亦信然否如下一段言存心養性所以事天也㳺氏言之詳矣其言曰存其心者閑邪以存其誠也養其性者守静以復其本也存養如此則可以事天矣此言事天亦伊川所謂奉順之意其説恐不出乎此但不知存養之説謂存此以養彼耶亦既存本心又當養其性耶曰諸家解説盡心二字少有發眀得盡字出来者伊川最説得完全然亦不曾子細開説盡字大抵盡其心只是窮盡其在心之理耳窮得此又却不能窮得彼便不可喚做盡心范侍講言窮理却是言盡心以前底事謝上蔡言充廣得去却言盡心以後事若横渠大其心則能體天下之物之説此只是言人心要廣大耳亦不知未能盡得此心之理如何便能盡其心得兼大其心亦做盡心説不得㳺氏守静以復其本此語有病守静之説近於佛老吾聖人却無此説其言知天為智之盡事天為仁之至此却説得好事天只是奉順之而已非有他也所謂存心養性非二事存心所以養性也去偽問上蔡盡心知性一段曰説盡心不着可學問先生盡心説曰心者天理在人之全體又曰性者天理之全體此何以别曰分説時且恁地若将心與性合作一䖏説須有别淳莫非命也章盡其道而死者順理而吉者也桎梏死者逆理而凶者也以非義而死者固所自取是亦前定盖其所禀之惡氣有以致之也人傑問桎梏死者非正命也雖謂非正然亦以命言此乃自取如何謂之命曰亦是自作而天殺之但非正命耳使文王死扵羑里孔子死於桓魋却是命可學敬之問莫非命也曰在天言之皆是正命在人言之便是不正之命問有當然而或不然不當然而或然者如何曰如孔孟老死不遇須喚做不正之命始得在孔孟言之亦是正命然在天之命却自有差恪問莫非命也命是指氣言之否曰然若在我無以致之則命之夀夭皆是合當如此者如顔子之夭伯牛之疾是也廣問莫非命也順受其正因推惠廸吉從逆凶之意曰若是惠廸吉從逆凶自天觀之也得其正命自人得之也得其正命若惠廸而不吉則自天觀之却是失其正命如孔孟之聖賢而不見用於世而聖賢亦莫不順受其正這是於聖賢分上已得其正命若就天觀之彼以順感而此以逆應則是天自失其正命賀孫莫非命也順受其正直卿云如受得一邑之宰教做三年這是命到做得一年被罷去也是命曰有不以罪而枉罷者亦是命有罪而被罷者非正命無罪而被罷者是正命也賀孫孟子説命至盡心章方説得盡萬物皆備於我矣章黄先之問萬物皆備於我曰如今人所以害事䖏只是這些私意難除才有些私意隔着了便只見許多般賀孫萬物皆備於我須反身而實有之無虧無欠方能快活若反身而不誠雖是本来自足之物然物自物何干我事砥反身而誠孟子之意主於誠字言反身而實有此理也為父而實有慈為子而實有孝豈不快活若反身不誠是無此理既無此理但有恐懼而已豈得樂哉驤反身而誠見得本具是理而今亦不曾虧欠了他底恪或問反身而誠是要就身上知得許多道理否曰是這知見得最為要緊賀孫反身而誠則恕從這裏流出不用勉強未到恁田地須是勉强此因林伯松問強恕説淳所謂萬物皆備於我在學者也知得此理是備於我只是未能反身而誠若勉强行恕拗轉這道理来便是恕所謂勉強者猶未䏻恕必待勉強而後能也所謂恕者也只是去得私意盡了這道理便真實備扵我無欠闕僴或問萬物皆備扵我章後面説强恕而行求仁莫近焉如何曰恕便是推己及物恕若不是推己及物别不是个什麽然這个強恕者亦是他見得萬物皆備扵我了只争着一个反身而誠便須要強恕上做工夫所謂強恕盖是他心裏不能推己及人便須强勉行恕拗轉這道理然亦只是要去个私意而已私意既去則萬理自無欠闕䖏矣燾子武問萬物皆備於我章曰這章是両截工夫反身而誠盖知之已至而自然循理所以樂強恕而行是知之未至且恁把捉勉强去少間到純熟䖏便是仁木之問萬物皆備於我下文既云樂莫大焉何故復云强恕曰四句二段皆是䝉上面一句問反身而誠樂莫大焉是大賢以上事強恕求仁是學者身分上事否曰然問大賢以上是知與行俱到大賢以下是知與行相資發否曰然頃之復曰反身而誠只是个真知真實知得則滔滔行将去見得萬物與我為一自然其樂無涯所以伊川云異曰見卓爾有立於前然後不知手之舞足之蹈正此意也道夫強是勉強而行恕是推己及物強恕而行是要求至於誠去偽敬之説強恕只事事要擴充教是當雖是自家元未免有些病痛今且着事事勉强做去曰未至於反身而誠樂莫大焉䖏且逐事要推己及人庶㡬心公理得此䖏好更子細看賀孫問強恕而行曰此是其人元不曾恕在故當凡事勉強推己及人若反身而誠則無待於勉強矣又問莫須卓然立志方得曰也不須如此饑時便討飯喫䕫孫録云才見不恕時便須勉強如飢便吃飯初頭硬要做一餉少時却只恁消殺了倒沒意思儒用䕫孫同強恕而行求仁莫近不可将恕字低看了求仁莫近扵恕恕字甚緊盖卿問萬物皆備於我曰未當如此須従孟子見梁惠王看起却漸漸進歩如看論語豈可只理㑹吾道一以貫之一句須先自學而篇漸漸浸灌到純熟䖏其間義理却自然出季札問伊川説萬物皆備於我謂物亦然皆從這裡出去如何曰未須問此枉用工夫且於事上逐件窮着凡接物遇事見得一箇是䖏積習乆自然貫通便真箇見得理一禪者云如桶底脱相似可謂大悟到底不曾曉得才遇事又却迷去徳明集義或問明道説學者須先識仁仁者渾然與物同體孟子言萬物皆偹於我反身而誠則為大樂若反身未誠則猶是二物有對又安得樂訂頑意思乃備言此體横渠曰萬物皆備扵我言萬事皆有素扵我也反身而誠謂行無不慊於心則樂莫大焉如眀道之説則物只是物更不須作事且扵下文求仁之説意思貫串横渠解反身而誠為行無不慊之義又似来不得不唯以物為事如下文強恕而行求仁莫近焉如何通貫得為一意曰横渠之説亦好反身而誠實也謂實有此理更無不慊䖏則仰不愧俯不怍樂莫大焉強恕而行即是推此理以及人也我誠有此理在人亦各有此理能使人有此理亦如我焉則近扵仁矣如眀道這般説話極好只是説得大廣學者難入去偽銖同萬物皆偹於我矣反身而誠樂莫大焉萬物不是萬物之迹只是萬物之理皆俻於我如萬物莫不有君臣之義自家這裡也有萬物莫不有父子之親自家這裏也有萬物莫不有兄弟之爱自家這裡也有萬物莫不有夫婦之别自家這裡也有是這道理本来皆備於吾身反之於吾身於君臣必盡其義於父子必盡其親於兄弟必盡其愛於夫婦必盡其别莫不各盡其當然之實理而無一毫之不盡則仰不愧俯不怍自然是快活若是反之於身有些子未盡有些子不實則中心愧怍不能以自安如何得㑹樂横渠曰萬物皆備於我矣言萬物皆素定於我也行有不慊於心則餒矣故反身而誠樂莫大焉若不是實做工夫到這裏如何見得恁地賀孫萬物皆備於我横渠一段将来説得甚實所謂萬物皆在我者便只是君臣夲来有義父子夲来有親夫婦夲来有别之類皆是夲来在我者若事君有不足於敬事親有不足於孝以至夫婦無别兄弟不友朋友不信便是我不能盡之反身則是不誠其苦有不可言者安得所謂樂若如今世人説却是無實事如禪家之語只虗空打箇筋斗却無着力䖏㽦問樂莫大焉莫是見得萬物皆備於我所以樂否曰誠是實有此理檢㸃自家身命果無欠闕事君真箇忠事父真箇孝仰不愧於天俯不怍於人其樂孰大於此横渠謂反身而誠則不慊於心此説極有理去偽行之而不著焉章方行之際則眀其當然之理是行之而著既行之後則識其所以然是習矣而察初間是照管向前去後来是回顧後面看所行之道理如何如人喫飯方喫時知得飯當喫既喫後則知飯之飽如此僴著曉也察識也方其行之而不曉其所當然既習矣而猶不識其所以然人傑習矣而不察習字重察字輕可學習矣不察行矣不著如今人又不如此不曾去習便要説察不曾去行便要説著可與共學未可與適道今人未曾理㑹可與共學便要適道賀孫待文王而後興章待文王而後興者凡民也若夫豪傑之士雖無文王猶興豪傑質美生下来便見這道理何用費力今人至於沈迷而不反而聖人為之屡言之方始肯求已是下愚了況又不知求之則終於為禽獸而已盖人為萬物之靈自是與物異若迷其靈而昏之則是與禽獸何别大雅霸者之民章自王者之民皥皥如也而下至豈曰小補之哉皆説王者功用如此人傑所過者化只是身所經歴䖏如舜耕厯山陶河濵者是也略略做這裏過便自感化不待乆畱言其化之速也謙之云所存者神是心中要恁地便恁地否曰是上下與天地同流豈曰小補之哉小補只是逐片逐些子補綴上下與天地同流重新鑄一畨過相似恪問集注云所存主䖏便神妙不測所經厯䖏皆化如此即是民化之也非大而化之之化曰作大而化之化有病則是過了者化物未過時却凝滯於此只是所經厯䖏才霑着些便化也雷一震而萬物俱生動霜一降而萬物皆成實無不化者書曰俾予従欲以治四方風動亦是此意所存主䖏便神妙不測立之斯立道之斯行綏之斯来動之斯和莫知其所以然而然也問同流是與天地同其神化否曰此難言各有一分去聲在裏曰是箇参賛意思否曰亦不是参賛德眀存神過化程説甚精正得孟子夲意過是身所經厯䖏無不感動如黎民於變便是化存是存主䖏不是主宰是存這事這事便来應二程看文字最精宻如中庸説門人多不能曉其意淳集義過化存神伊川説好過只是經厯䖏以舜觀之可見存則存主䖏便如綏来動和之意都就事上説反覆此一段自可見端蒙所過者化程子經厯之説甚好盖不獨是所居乆䖏只曾經渉䖏便皆化所存者神存是自家主意䖏便不測亦是人見其如此㽦黄子功問伊川説過是經厯䖏是否曰只是過䖏人便化更不待乆問所存者神曰此才有所存彼便應言感應之速也所以荀子云仁人之兵所過者化所存者神只是簞食壺漿以迎王師䖏便是神子功曰如舞干羽于兩階七旬有苗格亦是此理曰然文蔚問經厯䖏則無不化不經厯䖏如何曰此言經厯䖏便化如在鄊則一鄉化在天下則天下化過者言其感人之速如此只被後来人説得太重了所存者神吾心之所存處便成就如神耳如書云従欲以治四方風動之意化是人化也神是事之成就如神也去偽君子所過者化伊川本䖏解略易傳大人虎變却説得詳荀子亦有仁人過化存神之語此必古語如克己復禮亦是古語左傳中亦引克己復禮仁也如崇徳脩慝辨惑亦是古語盖是兩次問了燾所過者化所存者神伊川解革卦言所過變化事理炳著所過謂身所經歴䖏也文蔚君子所過者化所存者神存是存主過是經厯聖人綏之斯来動之斯和才過便化横渠説却是兩截從周問過化存神有先後否曰初無先後便如横渠之説亦無先後去偽過化存神舊説所應之事過而不留便能所存者神神即神妙不測故上蔡云所過者化故所存者神所存者神故所過者化鄉里李欲才云譬如一面鏡先来照者既去不見了則後来者又可以照若先底只在則不復能照矣捋做一事説亦自好但據孟子本文則只是身所經厯處便化心所存主䖏便神如綏斯来動斯和又荀子亦言仁人之兵所過者化所存者神似是見成言語如金聲玉振之類故孟荀皆用之荀卿非孟子必不肯用其語也方子問尋常人説皆云所過者化便能所存者神曰他是就心説㩀孟子意乃是就事説問注引舜事如何曰舜在下只得如此及見用則賓四門之属皆是化聖人豈能家至戸曉盖在吾化中者皆是過問存神與過化如何别曰過化言所過即化存神便有嚮應意思問上蔡云所過者化便所存者神所存者神便所過者化曰此是就心説事来不畱於心便是存神存神便能過化横渠云性性為能存神物物為能過化亦是此説可學人之所不學而能者章至之問達之天下也方為仁義曰親親仁也敬長義也不待達之天下方始謂之仁義無他達之天下只説達之天下無别道理賀孫舜居深山之中章問舜聞善言見善行若決江河沛然莫能禦其未有所聞見時氣象如何曰湛然而已其理充塞具備一有所觸便沛然而不可禦問學者未有聞見之時莫須用持守而不可放逸否曰纔知持守巳自是聞善言見善行了道夫無為其所不為章敬之問無為其所不為無欲其所不欲曰人心至靈其所不當為不當欲之事何嘗不知但初間自知了到計較利害却自以為不妨便自冒昧為之欲之耳今既知其所不當為不當欲者便要来這裏截㫁㫁然不為不欲故曰如此而巳矣恪人之有徳慧術知章或問徳慧術知曰徳慧純粹術知聪眀須有朴實工夫方磨得出履孫廣土衆民章敬之問君子所性雖大行不加焉雖窮居不損焉君子但當自盡吾心之天理雖達而在上做出事業功名亦只似雲浮扵太虗之中於我何有哉曰中天下而立定四海之民固是人所欲與其䖏畎畆之中孰若進而得行其道使天下皆被其澤要得出行其道者亦是人之所欲但其用其舎扵我性分之内本不相關進而大行退而窮居於我性分之内無所加損賀孫問君子所性章曰只是這一箇道理雖達而為堯舜在上亦不是添加些子窮而為孔孟在下亦不是減少些子盖這一箇道理合下都定了更添減不得又云這所性字説得虗如堯舜性之之性字燾敬之問君子所性曰此是説生来承受之性仁義禮智根於心便見得四端着在心上相離不得才有些子私意便剗斷了那根便無生意譬如木根着在土上方㑹生其色也睟然都從那根上𤼵出来且性字從心便見得先有這心便有許多物在其中恪問仁義禮智根於心曰上説君子是通聖人言盖君子氣禀清眀無物欲之累故合下生時這箇根便着土所以生色形見於外衆人則合下生時便為氣禀物欲一重隔了這箇根便未着土在盖有殘忍底心便沒了仁之根有頑鈍底心便沒了義之根有忿狠底心便沒了禮之根有黑暗底心便沒了智之根都各有一重隔了而今人只要去其氣質物欲之隔教四者之根着土而已如堯舜性之便是根已著土了湯武反之便是元来未曾着土而今方移得来着土了燾問仁義禮智根扵心曰雖是自家合下都有這箇物若有些子私欲夹雜在其中便把好底和根都剗去了賀孫安卿問仁義禮智根於心何謂根曰養得到見得眀便自然生根此是人功夫做来義剛看文字當看大意又看句語中何字是切要孟子謂仁義禮智根於心只根字甚有意如此用心義理自出季札問四體不言而喻曰是四體不待命令而自如此謂手容恭不待自家教他恭而自然恭足容重不待自家教也重而自然重不待教化如此而自如此也燾孔子登東山而小魯章逰於聖人之門者難為言學而不從這裡則所為雖善要為好事終是有不是䖏因言舊見劉子澄作某䖏學記其中有雖不能為向上事亦可以做向下一等之意大槩是要退如此便不得人傑至之問孔子登東山而小魯一節曰此一章如詩之有比興比者但比之以他物而不説其事如何興則引物以發其意而終説破其事也如孔子登東山而小魯至逰於聖人之門者難為言此興也觀水有術必觀其瀾至容光必照焉此比也流水之為物也至不成章不達此又是興也比者如鶴鳴于九臯之類興者如他人有心予忖度之上引毚兎柔木之類是也流水之為物也不盈科不行君子之志於道也不成章不達盖人之為學須是務實乃能有進若這裡工夫欠了些分毫定是要透過那裡不得時舉問必觀其瀾是因其瀾䖏便見其夲耶抑觀其瀾知其有本了又須窮其本之所自来曰若論水之有原夲則觀其流必知其有原然流䖏便是那原夲更去那裏别討夲只那瀾便是那夲了若非夲何䖏有那流若説觀其瀾又須觀其夲則孟子何不曰必觀其本他説觀其瀾便是就瀾䖏便見其本僴雞鳴而起章敬之問利與善之間也這箇利非是有心於為利只見理不明才差些便入那邊去曰然才差向利邊去只見利之為美賀孫或問利與善之間曰間是兩者相並在這裡一條路做這邊去一條路做那邊去所以謂之間利與善之間不是冷水便是熱湯無那中間温吞煖䖏也僴利善若只是利善則易理㑹今人所為䖏都是利只管硬差排道是善今人直是差䖏多只一條大路其餘千差萬别皆是私路因舉張子韶小説云云賀孫利與善之間若才有心要人知要人道好要以此求利禄皆為利也這箇極多般様雖所為皆善但有一毫歆慕外物之心便是利了如一塊潔白物事上面只着一㸃黑便不得為白矣又如好底物事如腦子之属上面只着一㸃糞穢便都壊了不得為香矣若是糞穢上面假饒着一堆腦麝亦不濟事做善須是做到極盡䖏方喚做善僴用之問舜孳孳為善未接物時只主於敬便是為善以此觀之聖人之道不是黙然無言聖人之心純亦不已雖無事時也常有箇主宰在這裡固不是放肆亦不是如槁木死灰曰這便如夜来説只是有操而已一段如今且須常存箇誠敬做主學問方有所歸着如有屋舍了零零碎碎方有頓䖏不然却似無家舎人雖有千萬之寳亦無安頓䖏今日放在東邊草裡眀日放在西邊草裡終非己物賀孫或問為善為利䖏因舉龜山荅廖尚書用中一段曰龜山説得鶻突廖公認得不子細後来於利害上頗不分别紹興間秦氏主和建議不決召廖公来他懵然不知却去問他平日所友善之人如鄭邦達軰邦達亦不思量便云和是好事故廖公到闕即主和議遂為中丞然他亦不肯為秦氏鷹犬秦嘗諷令言趙公鼎廖竟不従而出燾楊子取為我章楊朱乃老子弟子其學專為已列子云伯成子高㧞一毛而利天下不為其言曰一毛安能利天下使人人不㧞一毛不利天下則天下自治矣問老子似不與楊朱同曰老子窺見天下之事却討便宜置身於安閒之地云清静自治豈不是與朱同又問伊川説老子謂先語大道後却渉些姦詐如云知其雄守其雌知其白守其黑之類曰孔孟亦知天下有許多事何故不厭他曰孔孟見實理把作合做底看他不見實理把做無故不肯為問孔子曾見他書否曰未必見厚之問孔子何為問禮於他曰他本周家史官自知禮只是以為不足道故一切掃除了曾子問中自見孔子問他䖏邵康節亦有些小似他問淵源録中何故有康節傳曰書坊自增耳可學問墨氏兼愛楊氏為我夫兼愛雖無差等不合聖人之正道乃是割己為人滅去己私猶足立教若為我乃小己自私之事果何足以立教耶曰莊子數稱楊子朱之為人恐楊氏之學如今道流修煉之士其保嗇神氣雖一句話也不妄與人説正孟子所謂㧞一毛而利天下不為是也柄問楊墨固是皆不得中至子莫又要安排討箇中執之曰子莫見楊墨皆偏在一䖏要就二者之中而執之正是安排尋討也原其意思固好只是見得不分眀依舊不是且如三過其門而不入在禹稷之時則可在顔子則不可居陋巷在顔子之時則是中在禹稷之時則非中矣居陋巷則似楊氏三過其門而不入則似墨氏要之禹稷似兼愛而非兼愛顔子似為我而非為我道夫云常記先生云中一名而函二義這箇中要與喜怒哀樂未發之中異與時中之中同曰然道夫堯舜性之也章性之是合下如此身之是做到那田地端䝉堯舜性之也性字似禀字湯武身之也是将這道理做成這箇渾身將這渾身做出這道理五伯假之也久假而不歸惡知其非有也舊時看此句甚費思量有數様説今所留二説也自倒斷不下僴黄仁卿問性善之善與堯舜性之之性如何曰性善之性字實性之之性字虗性之只是合下禀得合下便得来受用又曰反之是先失着了反之而後得身之是把来身上做起節聖人之心不曽有箇起頭處堯舜性之合下便恁地去初無箇頭到湯武反之早是有頭了但其起處甚㣲五伯則甚大或問仁人心也若假借為之焉能有諸已哉而孟子却云五伯久假而不歸烏知其非有何也曰此最難説前軰多有辨之者然卒不得其説烏知二字為五伯設也如云五伯自不知也五伯乆假而不歸安知其亦非已有也去偽問乆假不歸烏知其非有舊解多謂使其能乆假而不歸烏知終非其有曰諸家多如此説遂引惹得司馬温公東坡来闢孟子問假之之事如責楚包茅不貢與夫初命三命之類否曰他從頭都是無一事不是如齊桓尚自白直恁地假将去至晉文公做了千般蹺蹊所以夫子有正譎之論愽議説譎正處甚好但說得来連自家都不好了又曰假之非利之之比若要識得假與利只看真與不真切與不切如好好色如惡惡臭正是利之之事也道夫云安仁便是性之利仁便是反之假之之規模自與此别曰不干涉如勉強而行亦非此比安利勉強皆是真切但有熟不熟耳頃之嘆曰天下事誰不恁地且如漢祖三軍縞素為義帝發䘮他何嘗知所謂君臣之義所當然者但受教三老假此以為名而濟其𣣔爾問如夫子稱管仲如其仁也是従假字上説来否曰他只是言其有仁之功未説到那假字上在且如孺子入井有一人取得出来人且稱其仁亦未説到那納交要譽惡其聲而然道夫問如此説則如字如何觧曰此直深許其有仁耳人多説是許其似仁而非仁以文勢觀之恐不恁地只是許其仁耳道夫云假之之事真所謂幽沉仁義非獨為害當時又且流毒後世曰此孟子所以不道桓文而卑管晏也且如興滅繼絶誅殘禁暴懐諸侯而尊周室百般好事他都做只是無惻怛之誠心他夲𣣔他事之行又恰有這題目入得故不得不舉行道夫云此邵子所以有功之首罪之魁之論曰他合下便是恁地道夫王子墊問曰章王子墊問士尚志一段中間反覆説仁義二字都有意須思量得僴桃應問曰章問瞽瞍殺人在臯陶則只知有法而不知有天子之父在舜則只知有父而不知有天下此只是聖賢之心坦然直截當事主一不要生枝節否曰孟子只是言聖賢之心耳聖賢之心合下是如此權制有未暇論然到極不得已處亦須變而通之盖法者天下公共在皐陶亦只得執之而已若人心不許舜棄天下而去則便是天也皐陶亦安能違天法與理便即是人心底亦須是合下有如此底心方能為是權制今人於事合下無如此底心其初便従權制去則不可淳桃應之問孟子之對楊氏有議貴之説如何曰使舜𣣔為天子又𣣔免瞽瞍則生議貴之法矣人傑孟子自范之齊章問孟子言居移氣養移體後却只論居不論養豈非居䏻移人之氣亦如養之能移人之體乎曰有是居則有是養居公卿則自有公卿底奉養居貧賤則自有居貧賤底奉養言居則養在其中去偽形色天性章至之問形色曰有這形便自有這色所以下文只説踐形盖色便在形裏面色猶言容貌也時舉問形色自是兩字否曰固是時舉敬之問形色天性形是耳目口鼻之類色是如何曰一顰一笑皆有至理時舉録云凡一顰一笑一語一黙無非天理形字重色字輕故下面但云惟聖人可以踐形直卿云形是動容貌色是正顔色曰固是南升問色字如何曰有形便有色如動容周旋中禮則色自正如祭祀則必有敬之色臨䘮則必有哀之色故下文只言踐形㽦問形色天性下只説踐形而不云色何也曰有此形則有此色如鳥獸之形自有鳥獸顔色草木之形自有草木顔色言形則色在其中矣去偽形色上便有天性視便有視之理聽便有聽之理閎祖踐形是有這箇物事脚實踏着不闕了他箇有是形便有是理盡得這箇理便是踐得這箇形耳目本有這箇聪明若不盡其聪眀時便是闕了這箇形不曾踐得恪惟聖人可以踐形踐非踐履之謂盖言聖人所為便踏着這箇形色之性耳道夫論踐形云天生形色便有夲来天理在内賢人踐之而未盡聖人則歩歩踏着来路也方人之有形有色無不各有自然之理所謂天性也惟聖人能盡其性故即形即色無非自然之理所以人皆有是形而必聖人然後可以踐其形而無歉也踐如踐言之踐伊川以為充人之形是也人傑盡性性有仁須盡得仁有義須盡得義無一些欠闕方是盡踐形人有形形必有性耳形也必盡其聪然後能踐耳之形目形也必盡其眀然後能踐目之形踐形如踐言之踐伊川云踐形是充人之形盡性踐形只是一事閎祖蜚卿問既是聖人如何却方可以踐形曰踐如掩覆得過底模様如伊川説充其形色自是説得好了形只是這形體色如臨䘮則有哀色介胄則有不可犯之色之類天之生人人之得於天其具耳目口鼻者莫不皆有此理耳便必當無有不聪目便必當無有不眀口便必能盡别天下之味鼻便必能盡别天下之臭聖人與常人都一般惟衆人有氣禀之雜物欲之累雖同是耳也而不足於聪雖同是目也而不足於眀雖同是口也而不足以别味雖同是鼻也而不足以别臭是雖有是形惟其不足故不能充踐此形惟聖人耳則十分聪而無一毫之不聪目則十分眀而無一毫之不眀以至於口鼻莫不皆然惟聖人如此方可以踐此形惟衆人如彼自不可以踐此形賀孫君子所以教者五章或問君子之所以教者諸先生説得如何曰諸先生不曾説得分眀曾子學到孔子田地故孔子與他說一貫之道此所謂如時雨化之者也時雨云者不先不後適當其時而已成徳如顔淵閔子騫者是也達材如冉有季路是也答問如孟子與公孫丑萬章之徒是也有私淑艾者横渠謂正己而物正非然也此五者一節輕似一節大人正己而物正大是大事不應安排在荅問之下以某觀之此言為不曾親聖人者設也彼雖不曽承聖人之誨私得於善治孔子之道者亦足以發也故又在答問之下去偽成徳成就其徳如孔子於冉閔徳則天資純粹者達材通達其才如孔子於由賜才是眀敏者答問則早費言語私淑艾却是不曾及門聞風而善者端蒙伯豐問横渠云顔子私淑艾以教人隠而未見之仁也如何曰舊解有私淑艾者謂自善其身而示教於人故横渠如此説然考孟子所謂予未得為孔子徒也予私淑諸人也此人者是孟子指其師友子思之類以謂予不得親見孔子而師之只是我私竊傳其善於人如有私淑艾者却是君子所以教者五然亦有次叙有如時雨化之者他地位已到因而發之孔子於顔曾是也其次成徳達材又随人資材成就有答問者未及師承只是来相答問而已私淑艾者未嘗親見面授只是或聞其風而師慕之或私竊傳其善言善行學之以善於其身是亦君子之教誨也横渠集中有祭文云私淑祖考之遺訓説得文義却順㽦公孫丑曰道則高矣美矣章引而不發引引弓也發發矢也躍如如踴躍而出猶言活潑潑地也人傑君子引而不發躍如也下三字属君子言雖引而不發而其言意中躍躍然㑹動如所謂活潑潑地也及入解又云躍躍然於動静語黙之間方躍如是道理活潑潑底發出在面前如甲中躍出升卿君子引而不發躍如也須知得是引箇甚麽是怎生地不發又是甚麽物事躍在面前湏是聳起這心與他看教此心精一無些子夹雜方見得他那精㣲妙䖏又曰道理散在天下事物之間聖賢也不是不説然也全説不得自是那妙䖏不容説然雖不説只才挑動那頭了時那箇物事自跌落在面前如張弓十分滿而不發箭雖不發箭然已知得真箇是中這物事了須是精一其心無些子他慮夹雜方看得出僴引而不發躍如也與舉一隅不以三隅反同意否曰這般有問答䖏儘如看這見得恁地問便恁地答最是酬酢處見意思且自去看賀孫或問范謂君子之射引而不發以待彀與的之相偶心欲必中故躍如也此説如何曰范氏此説最好笑豈有君子之射常引而不發者乎只管引而不發却成甚射也引而不發之語只縁上文說射故有此語此只是言君子之教人但開其端以示人而已其中自有箇躍如底道理學者須是識得這箇道理方知君子教人為甚忠故下文中道而立能者從之去偽於不可已而已章進鋭退速其病正在意氣方盛之時已有易衰之勢不待意氣已衰之後然後見其失也知者無不知也章知者無不知也問知在先否曰也是如此亦不專如此固是用知得審若知不審以賢為否以否為賢少間那仁上便安頓不着僴正淳問急先務一段何如曰人人各有當務之急或勞心或勞力勞心者治人勞力者治於人此各有所急也堯以不得舜為己憂舜以不得禹臯陶為己憂此聖人之所急也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情若學圃學稼則是不急今人讀書中亦自有合着急處若是稍慢處理㑹未得也且放過不妨緊要處須着理㑹又問急親賢也急先務也治天下莫過於親賢知却随時因事為之故不指言如舜之舉相去凶是舜之先務禹之治水是禹之先務何如曰大略是如此下文云此之謂不知務須是凡事都有輕重緩急如眼下脩緝禮書固是合理㑹若只知有這个都困了也不得又須知自有要緊處乃是當務又如孟子答今之樂猶古之樂這裡且要得他與百姓同樂是緊急若就這裡便與理㑹今樂非古樂便是不知務賀孫人傑録别出問如舜舉皐陶湯舉伊尹所謂親賢者乃治天下者不易之務若當務之急是随其時勢之不同堯之厯象治水舜之舉相去凶湯之伐夏救民皆所務之急者曰也是如此然當務之急如所謂勞心者治人勞力者治於人堯舜之治天下豈無所用其心亦不用於耕耳又如夫子言務民之義應係所當為者皆是也漢卿問不能三年之䘮而緦小功之察放飯流歠而問無齒決是之謂不知務却止説智不説仁曰便是併與仁説所謂急親賢之為務豈不為仁乎先生因推言學者亦有當務如孟子論今樂古樂則與民同樂乃樂之夲學者所當知也若欲眀其聲音節奏特樂之一事耳又如修緝禮書亦是學者之一事學者須要窮其源本放得大水下来則如海潮之至大船小船莫不浮泛若上面無水来則大船小船都動不得如講學既能得其大者則小小文義自是該通若只於淺䖏用功則必不免沉滯之患矣人傑朱子語類卷六十
