body:
  text: 朱子語類卷一百三十三本朝七盜賊蜀中有趙教授者因二蘇斥逐以此揺動人心遂反當時也自響應但未幾而哲宗上仙事體皆變了所以做得来也沒巴鼻蜀人大故强悍易反成都嘗有一通判要反已自與府中都吏客將皆有謀了不知如何一婢走出来告云日逐有官員来議事帥因下簾令辨府中人則皆每日所見合謀者其事遂敗義剛方臘起向薌林時為小官言今無䇿只有起劉元城陳了翁作相則必不戰而自平揚伊川嘗説今人都柔了葢自祖宗以来多尚寛仁不曾用大剛之屬由此人皆柔軟四方無盜賊後来靖康時多盜葢敵難方急朝廷無暇治之耳且如紹聖之後山東河北連年大饑而盜作也皆隨即仆滅但見長上云若更遲四五年敵人不来盜亦難禁止葢是饑荒極了義剛方臘之亂愚民望風響應其間聚黨刼掠者皆假竊臘之名字人人曰方臘来矣所至瓦解臘之婦紅裝盛飾如后妃之象以鏡置胸懐間就日中行則光彩爛然競傳以為祥瑞儒用論及楊幺云當時也無甚大賊不過只是盜賊而已如李成之徒也只是刼掠若無計則不過自食人皆不是做事底義剛建賊范汝為本無技能為盜亦非其本心其叔積中却素有包蔵隂結徒黨置兵器滿倉箱中其徒勸之舉事每每猶豫若有所待有不快於中者輙火十數家且殺人因刼之為首其人終不肯但曰時未可我決不能為汝輩可别推一人為主衆遂擁戴汝為勢乃猖獗建之士如歐陽穎士施逵吳琮者善文章多材藝或已登科皆望風往從之置偽官日以蕭曹房杜自相標置以漢祖唐宗頌其功徳汝為愚人偃然當之朝廷遣官軍来平賊時秋稼已熟賊聞官軍且至放水灌田又以禾穟相結連已而決塍去水官軍至不諳其山川道路賊縱之入山山路險隘騎卒不能前賊覺官軍已疲困乃出平原以誘官軍官軍出山爭趨田中既為結穟牽絆又陷泥淖賊因四面鏖擊之官軍大敗乗勝據建州三年累降累叛竟遣韓世忠来方能𠞰除之汝為自縊尸為衆所焚弗獲初建人陸棠謝尚有鄉曲之譽陸乃龜山壻為士人時極端重頗似有徳器者賊聲言使二人来招我吾降矣朝廷遣之既而賊有二心乃拘繫久之歐陽輩又説之日益切因循遂為賊用賊敗歐陽穎士吳琮先誅死陸謝施逵以檻車送行在至中途逵謂二人曰吾輩至必死與其戮於市朝且極痛楚曷若早自裁二人曰何可得自死逵曰易爾乃宻令人為藥三丸小大形色俱相似一乃無毒者逵取無毒者服之餘二人服即死逵既至行在歸罪于二人理官無所考證迄從末減但編置湖南某州中途又逃去或為道人或為行者或為人典庫藏後迤邐望淮去有喜其材者以女妻之住數月復北走降敵改名宜生登偽科後擢用甚峻逆亮將犯淮時猶為之奉使比来時黄尚書通老為館伴黄幼與之同筆硯雅相好至是不欲見其人以故辭遂改名張子公宜生猶問子公通老安在子公以實對欲扣北庭事不可得因登六和塔子公領客宜生先登亟問之曰奉使得無首丘之念乎宜生曰必来言方終而介使至宜生色為之變既歸即為敵所誅龍泉尉施慶之乃其族也常舉宜生十數詩内入使時題都亭驛詩云江梅的皪未全開老倦無心上將䑓人在江南望江北斷鴻聲裏送潮来又按蕭閑集注宜生字朋望建安浦城人宣政間為潁州教授與宗室趙德麟友善後仕劉豫豫廢歸其國歴南臺郎中剌隰深二州召為禮侍累遷侍講道號三住道人儒用一士人見龜山容貌甚端莊坐不動每来必如是以此喜之一日引入書院久坐忽報有客龜山出接士人獨坐凝然不動如故宅眷壁外窺之大段驚異士人别去家人以實告皆稱其如此好人愈為所取後以女妻之乃陸棠也及范汝為作亂棠入其黨見矯情飾貌之難信也過李楫冦廣西出榜約不收民税十年故從叛者如雲稱之為李王反謂官兵為賊以此知今日取民太重深是不便廣瀘州之事朝廷既是命委清强官體究帥司若有謀只那裏究官便是捉賊官且如揀差體究官帥司秪宻著一不下司文字與之令到地頭體究隨宜便與處分若體究官到彼他見朝廷之意未十分来煎迫亦須開門放入但只與之言今日之事既是如此若大兵四合勦滅亦不難今亦未能如是但你這頭首人合當出来陳説始初是如何及其既至則收而梟之事即定矣若遽然進兵掩捕則事勢須激城中之人不可保而州郡必且殘破道夫夷狄西夏李繼遷本夷狄姓托跋後賜姓李五代時有其地國初世襲太宗欲取之遂召繼遷歸京師以别人代之一日繼遷逃歸朝廷費無限心力不能得遂以其兄繼隆知夏州令招之其兄遂隂與之合每奏朝廷謂已無事後朝廷又召其兄歸繼遷遂復有其地靈州屬朝廷又在西夏之外為西夏截斷又以兵圗之使不得通朝廷靈州絶逺難救援又其地渾沙無水不可掘每兵行則用水以自隨渴殺了多少人行其沙地上皆動陷了數百人馬只見不在太宗心欲棄之而不言時參政張洎南唐亡國之臣専以諂敗其主歸又以諂遭遇揣知上意即進可棄之説上問宰相吕端又令各進説端言如此則各有説非僉議合謀之意洎即詆端避事端言洎不過揣合上意後洎即進説端不曾進上謂洎揣合果如端言封還其説朝廷遂詔靈州守臣出兵與接漸漸離去棄之張齊賢以為不可如此則被夏人掩殺須是與之戰勝則得之不勝則漸漸引去方議未定忽報靈州已為夏人所破矣因而為彼所有後来朝廷費了幾多氣力去取韓范輩用兵後徐禧永樂之敗是也張魏公舊官於陜西嘗登髙望見西夏界外則西夏土地亦不甚濶如何强盛被他守得如此好祖宗時兵每出輙敗今依舊五州全又更取過那邉去了土地合濶矣只見强盛金人亦不奈何當時亦曾敗於彼揚因論西夏事曰當時事不可曉㸔来韓范亦無素定基本只是逐旋做出且如當時覆軍敗將這下方且失利他之勢甚張忽然自来納欵求和這全不可曉後来不久元昊遂死不知他不死數年又必有甚姦謀大未可知且如當時朝廷必欲他稱臣遂使契丹號令之契丹方自以為功朝廷正未有所處又却二國自相侵凌不爾則當時又須費力大抵西人勇健喜鬬三五年必一次為邊害本朝韓范張魏公諸人他只是一箇秀才於這般事也不大段㑹只是被他忠義正當故做得恁地道夫或問范文正公經理西事㸔得多是收拾人才曰然如滕子京孫元規之徒素無行節范公皆羅致之幕下後犯法又極力救解之如劉滬張亢亦然葢此等人是有才底做事時須要他用但要㑹用得他又云范公嘗立一軍為龍猛軍皆是招收前後作過黥配底人後来甚得其用時人目范公為龍猛指揮使又曰方范公起用事時軍政全無統紀從頭與他整頓一番其後却只務經理内地養威持重專行淺攻之䇿以為得寸則吾之寸得尺則吾之尺卒以此牽制夏人遣使請和儒用問本朝建國何故不都關中曰前代所以都關中者以黄河左右旋繞所謂臨不測之淵是也近東獨有函谷關一路通山東故可據以為險又關中之山皆自蜀漢而來至長安而盡池録作關中之山皆自西而東若横山之險乃山之極闕石木本朝則自横山以北盡為西夏所有山河之固與吾共之反據髙以臨我是以不可都也神宗鋭意欲取横山葢得横山則可據髙以臨彼然取横山之要又在永樂故永樂之城夏人以死爭之我師大敗神宗聞喪師大慟聖躬由是不豫按編年重和元年童貫命种師道劉延慶等取夏國永和等寨大敗夏人而還六月夏人納欵初夏人恃横山諸險以抗中國慶歴中王嗣宗范仲淹建議取之㑹元昊納欵而止元豐中李憲建議又㑹王師失利神宗厭兵不克行貫常從憲得其規摹政和初議進築至是十餘年遂得横山之地夏人失援故納欵然國家是時已建下燕之䇿益以多故其後西夏與女真通乙巳冬女真圍太原夏人犯河外則是横山之取有以結怨於彼也又曰神宗初即位富韓公為相問為治之要富公曰須是二十年不説著用兵二字此一句便與神宗意不合已而擢用王介甫首以用兵等説稱上㫖君臣相得甚懽時建昌軍司户王韶上平戎䇿介甫力薦之初為秦鳳路經畧司機宜後知通逺軍遂一戰而復熈河捷書聞上大喜解白玉帶以賜介甫賞其知人又加韶為龍圗閣待制以為熈河帥熈河本鎮洮軍因復其地改為熈州只是廣漠之鄉有之不加益無之不加損狃於一勝之後廟論一意主於用兵三敗至於永樂極矣永樂之敗徐禧死之禧師川之父黄魯直之妹夫也能文章好談兵也有進䇿行於世文字甚好二蘇之文未出學者爭傳誦之儒用神宗其初要結髙麗去共攻契丹髙麗如何去得契丹自是大國髙麗朝貢於彼如何敢去犯他義剛人主好勤逺畧底也是無意思當初髙麗遣使来朝廷只就他使者以禮答遣之神宗却要别差兩使去縁他那裏知文故兩使皆侍從皆是文人髙麗自是臣屬之國如何比得契丹契丹自是敵國義剛嘗見韓無咎説髙麗入貢時神宗喻其進先秦古書及進来内有六經不曾焚者神宗喜即欲頒行天下王介甫恐壊他新經遂奏云真偽未可知萬一刋行後為他所欺豈不𫝊笑夷夏神宗遂止本亦不傳以某觀之未必有是事盖招徕髙麗時介甫已不在相位且神宗是甚次第剛明設使所進真有契於上心亦豈介甫所能止之又記文昌雜録中説髙麗所進孝經門上下一二句記未真緯經只是䜟緯之書必無進先秦古書之事但嘗聞尤延之云孟子仁也者人也章下髙麗本云義也者宜也禮也者履也智也者知也信也者實也合而言之道也此説近是儒用或問髙麗風俗好曰終帶蠻夷之風後来遣子弟入辟雍及第而歸者甚多嘗見先人同年小録中有賔貢者即其所貢之士也賔貢二字更須訂證當時宣賜幣帛之外又賜介甫新經三十本盛以黒函黄帕其外得者皆寳蔵之儒用國家方與女真和時髙麗遣使来求近上醫師二人上召老醫擇二人遣往至則日夕厚禮皆不問醫而多問禁中事二醫怪而問之髙麗主曰我有𦂳宻事欲達宋皇恐所遣使不能宻故欲得宋皇親近之人而分付之所以問公禁中事者欲以見公是所親信耳二人因問之髙麗主曰聞宋皇欲與女真和夹攻契丹此非良䇿葢我國與女真陸路相通常使人察之女真不是好人勝契丹後必及宋而我國亦不能自存此合當思所以備之二人問所以備之之説曰女真作一陣法甚好我今思得一法勝之因令觀教其女真陣葢如拐子馬之類二人歸奏上怒召老醫而責之其一人出門吐血後不死其一人歸即死義剛儒用録云先生嘗見玉山汪丈云得之御史臺一老吏方徽宗通好女真為滅遼之約髙麗有所聞欲納忠誠不可得遂托病遣使求醫於本朝且願得供奉内庭上所親信者遂擇二國醫以往至則館御供帳具禮甚厚但經月無引見之㫖二醫怪之私有請於館伴者一日得㫖入見引至内庭盡屏左右諭二醫曰寡人非病也顧有誠欵願効於上國欲得附卿奏之幸宻以聞二醫許諾則曰女真人面獸心貪婪如豺狼安可與之共事今不早圖之後悔無及聞其訓練國人皆為精兵累嵗有事于燕每戰轉勝小國得一二陣法可與之角如欲得之敢不唯命諭畢乃厚為之禮而遣之二醫歸具奏本末徽宗聞之滋不樂且懼其語泄丞相童蔡輩乃為食於家召二醫以食之食畢而斃髙麗與女真相接不被女真所滅者多是有術以制之髙麗要五十餘主今此方為權臣所篡而易姓義剛又一條云髙麗得四十主今已易姓姓王金之舊治在㑹寜府四時遷徙無常春則往鴨緑江獵夏則往一山忘其名極冷避暑秋亦往一山如何冬往一山射虎今都燕山矣揚燕山之北古有大山嶺為隔但有一路傍險水後来石晉以與耶律則其險路在其度内矣揚燕山是古幽州石晉割賂契丹契丹既為金人所滅其種之桀者遂来據燕其主死其妻蕭太后主之童貫蔡攸往取之番番兵敗後金人自取之朝廷求之遂盡載數州之物婦女之類而去更索厚資賣之朝廷以其所索之物與之遂得數州空地朝廷空内資以守之郭藥師者燕將初歸本朝金人来取燕遂歸金郭只留守燕及本朝得燕郭又迎降金人一日大節冬至之類官吏都集賀郭郭留飲盡取各人家屬之類盡来飲少頃金人兵至無一人得脱者自此遂入冦矣朝廷與大遼結好百十年矣一日忽與金人約共攻遼而本朝無一人往是時方十三起童貫自這邊来了遂不及往既失約後取燕又是金人金人見本朝屢敗兵於燕遂有入冦之心是時相王黼主其事童貫主兵蔡攸副之蔡京不主作詩送其子云百年信約宜堅守六月師徒早罷休京作事都作兩下取燕有功則其子在無功則渠不曾主又有一子絛上書言其父不是聞亦是其父之謀也金冦初圍城時京云有一䇿可使敵人一兵不反朝廷使人問之云見上方可言冦去人問之云決汴河可以灌之後冦再来未至時已決之矣西北數千里渺然巨浸東南遂為冦所據四方音問一信不通以此故也揚尼雅滿圍太原一年有餘姚師古輩皆為其戰退遂破太原張孝純守太原一年多少辛苦及城破拚一死不得遂降後為劉豫處官太原既破遂一直圍京城揚李若水勸欽宗出李謂金人可信醉後枕人睡熟以此信之揚金人初起時初未立將臨發兵召集庭下問之有能言其䇿之善者即授以將使往及成功而歸又集庭下問衆人而賞之金幾多衆人言未得又加之賞罰如此分明安得不成事揚金人有一謀時聚諸尊長於一屋内全不言只用一物畫地謀了便各去做如其事難決便出野外無人處去商量揚烏珠征䝉死於道有三䇿獻於其主一則以汴京立淵聖欲招致江南之人二則以近上宗室守邉三則講和曰若行前二者也被他攪又曰道君有子四十人只放二十人歸来這二十人親王也要物事供他燾金至紹興守臣李鄴降金及駕至明州張俊大殺一番駕泛海金人走明州人令呼俊張俊不乗時殺去可大勝遂休了辛巳逆亮来時一隊自海中来李寳自膠西殺敗李鄴既降與金酋並馬出有一衞士赴駕不及尚留紹興見之以一大方磚逐打其酋幾中因被害死之今立一廟在其所賜旌忠額後人皆於其廟賣酒某至一切逐去之説與王書令崇奉之先生又云某在時更為大其廟其衞士姓唐揚劉豫来冦朝廷只管謀避計李伯紀云自南京退維揚遂失河東北自維揚退金陵遂失京東西一番退一番失設若是金人来柰熱不得亦著去不能久留今又只是劉豫只是這邊人渠得一邑守一邑得一郡守一郡如何只管逺避揚逆亮入冦時劉信叔在楊州亮欲至劉盡焚城外居屋盡用石灰白了城多冩完顔亮死於此字亮多忌見而惡之遂居龜山人多不可容必致變果死滅揚王仲衡云北朝大臣有過時用紫茸氊鋪地令伏其上杖之嘗有一宰相一駙馬受杖駙馬因此悒怏而死非恨其杖也恨不得紫茸氊也又曰甞有一官人出有一吏人来至其花園中背上黄袱袱得一束文字某問何文字曰史書也那官人伊是史官某問可借否曰不妨遂開看内有一段云詔曰宰相姓名某謀南伐若以為是合盡心以贊其謀以為不是合盡忠極力以諫之不可依違以敗成筭今某人畧畧諫之可杖六十揚揚噶克大師阿固達揚噶克之子武奇邁阿固達之弟完顔亶武奇邁之子完顔亮完顔雍葛王璟斡里雅布烏里温烏珠皆阿固達兄弟也阿固達既死諸酋立其弟武奇邁武奇邁死國人欲立阿固達之子按班貝勒此五字不知如何記不得按班貝勒名宗盤北朝謂大官人也按班者大也貝勒者官人也大官人者即所謂太子也諸酋不肯復立武奇邁之子完顔亶而以按班貝勒為相按班貝勒實懷怨望云已當為主亶覺之遂殺宗盤一日遂盡誅二十七王烏實亦被誅貝勒亦在其中二十七王皆其黨與兄弟也連蔓宗族親舊皆殺了亶又為亮所弑自立葛王先名褎後以其字似衰字遂改名雍亶亮皆兄弟也亶之父行名皆從宗兄弟名皆從二尼雅滿亦阿固達族人嘗為相初入中國破京師斡里雅布尼雅滿也斡里雅布早死烏里温後亦早死尼雅滿後來勸立劉豫内則蕭慶主其事蕭慶用事久及烏珠達蘭廢劉豫而誅蕭慶尼雅滿争之不能得亶遂忌之尼雅滿悒怏而死後來獨烏珠得後死初敵入中國問何姓最大中原人答以王姓最大敵人呼王為完顏自是王者之後遂姓完顔又問敵人今漸衰替曰卒急倒他未得被他立得箇頭勢大若十分中做得一兩分事便足以扶持振起除是大無道殘暴酷虐則不知如何若是如此做將去無大段殘暴之事恐卒消磨他未得葢其勢易以振起也卓論及北庭事當初起時如山林虎豹縱於原野豈有異伯謨曰當時曲端獻䇿不出十年彼必以酒色死方可取先生曰阿固達纔得幽州便死曽見有人論北人無事權在其主用兵權在將故敵主不用兵此説是大抵當初出時如虎狼及志得意滿與我何異因與某人欲請邉郡自效先生曰易曰知進退存亡而不失其正者其惟聖人乎上之人不欲用兵而我自欲為之是不識時問恢復之事多始勤終怠如何曰只以私意為之不以復讐為念可學葛王大故㑹他所以要和親者葢恐用兵時諸將執兵權或得要已不如和親可坐享萬乘之樂其初雖是利於用兵到後来惟恐我来與他厮殺義剛葛王便是㑹底他立得年號也强謂之大定義剛葛王懲逆亮之敗一向以仁政自居先生喟然嘆曰某要見復中原今老矣不及見矣或者説葛王在位專行仁政中原之人呼他為小堯舜曰他能尊行堯舜之道要做大堯舜也由他又曰他豈變夷狄之風恐只是天資髙偶合仁政耳友仁南渡之後説復讐者惟胡氏父子説得無病其餘並是半上落下説雖魏公要用兵其實亦不能明大義所以高宗只以區區成敗進退之列秦檜主和金歸河南上下欣然便只説得地之美更不説大義若無范伯達如圭則陵寢一向為乏主魏公時責永州亦入文字只説莫與之和如何感動魏公傾五路兵為富平之敗又潰於淮上若無氣力也是做不得事韓魏公煞是箇人物然亦適是人事恰做得若更向上且怕難擔當賀孫論規恢復檜死上即位正大有為之大機㑹揚邵𢎞取泗州胡昉取海州邵公人時家明角揚采人唐鄧汝三州皆官軍取之王師駸駸到南京矣而諸將虜掠媍女之類不可言吳玠更要人錢敵騎来走歸矣金人一畨圍泗州𢎞力扼之後村兵至方解揚泗海唐鄧四州皆可取西京中原之地逆亮来時用兵僅取得此四州而湯思退無故與之惜哉揚晉人下吳却是已得蜀從蜀一造船直抵南岸周世宗只圖江南是時襄漢蜀中别有主所以屯淮上開河抵江今蜀中出兵可以入武關從襄漢樊鄧可以擣汝洛繇淮上可以取徐州辛巳間官軍已奪宿州國家若大舉只用十五萬精兵徳明江州皇甫將名倜曾領兵守信陽作山寨三年云由其山接金房諸山而出取西京中原云國家用事某願當此一路去都不用國家兵糧沿路人皆自願為兵且與糧其人忠醇能同甘苦得士心不附内貴然亦未必能以律御兵而戰也揚陳問復讐之義禮記疏云穀梁春秋許百世復讐又某書庶人許五世復讐又云國君許九世復讐又某人引魯桓公為齊襄公所殺其子莊公與齊桓公㑹盟春秋不譏自桓至定公九世孔子相定公㑹齊侯于夾谷是九世不復讐也此説如何曰謂復百世之讐者是亂說許五世復讐者謂親親之恩欲至五世而斬也春秋許九世復讐與春秋不譏春秋美之之事皆是解春秋者亂説春秋何嘗説不譏與美他来聖人作春秋不過直書其事美惡人自見後世言春秋者動引譏美為言不知他何從見聖人譏美之意又曰事也多様國君復讐之事又不同僴云如本朝夷狄之祻雖百世復之可也曰這事難説久之曰凡事貴謀始也要及早乘勢做才放冷了便做不得如魯莊公之事他親見齊襄公殺其父既不能復又親與之宴㑹又與之主婚築王姬之館於東門之外使周天子之女去嫁他所為如此豈特不能復而已既親與讐人如此如何更責他報齊桓公况更欲責定公夾谷之㑹爭那裏去見讐在面前不曾報得更欲報之於其子若孫非惟事有所不可也自沒氣勢無意思了又况齊桓公率諸侯尊周室以義而舉莊公雖欲不赴其盟㑹豈可得哉事又當權箇時勢義理輕重若桓公不是尊王室無事自来召諸侯如此則莊公不赴可也今桓公名為尊王室若莊公不赴非是叛齊乃叛周也又况桓公做得氣勢如此盛大自家如何便復得讐若欲復讐則襄公殺其父之時莊公當以不共戴天之故告之天子方伯連率必以復讐為事殺得襄公而後已如此方快今既不能然又親與之同㑹與之主婚於其正當底讐人尚如此則其子何罪又况其子承其被殺後而入國又做得國来自好莊公之所不如宜其不能復而俛首事之也陳問若莊公能殺襄公了復與桓公為㑹可否曰既殺襄公則兩家之事已了兩邊方平自與桓公為㑹亦何妨但莊公若能殺襄公則九合諸侯一正天下之功將在莊公而不在齊桓矣惟其不能所以只得屈服事之也只要乘氣勢方急時便做了方好才到一世二世後事便冷了假使自家欲如此做也自鼓氣不振又况復讐須復得親殺吾父祖之讐方好若復其子孫有甚意思漢武帝引春秋九世復讐之説遂征胡狄欲為髙祖報讐春秋何處如此説諸公讀此還信否他自好大喜功欲攘伐夷狄姑托此以自詭耳如本朝靖康金人之祻看来只是高宗初年乘烏珠尼雅滿斡里雅布及阿固達未死之時人心憤怒之日以父兄不共戴天之讐就此便打疊了他方快人意孝宗即位鋭意雪恥然事已經隔與吾敵者非親殺吾父祖之人自是鼓作人心不上所以當時號為端人正士者又以復讐為非和議為是而乘時喜功名輕薄巧言之士則欲復讐彼端人正士豈故欲忘此讐葢度其時之不可而不足以激士心也如王公明炎虞斌父之徒百方勸用兵孝宗盡被他説動其實無能用著輙敗只志在脱賺富貴而已所以孝宗盡被這様底欺做事不成葢以此耳僩云但不能殺其主耳若而今捉得其人来殺之少報父祖之怨豈不快意曰固是好只是已不干他事自是他祖父事你若捉得他父祖来殺豈不快人意而今是他子孫干他甚事又問疏中又引君以無辜殺其父其子當報父之讐如此則是報君豈有此理曰疏家胡説豈有此理又引伍子胥事説聖人是之曰聖人何嘗有明文是子胥来今之為春秋者都是如此胡問疏又引子思曰今之君子退人若將墜諸淵毋為戎首不亦善乎言當執之但勿為兵首從人以殺之可也曰盡是胡解子思之意葢為或人問禮為舊君有服禮歟子思因云人君退人無禮如此他不為戎首来殺你已自好了何况更望其為你服此乃自人君而言葢甚之之辭非言人臣不見禮於其君便可以如此也讀書不可窒塞須看他大意僴恢復之計須是自家喫得些辛苦少做十年或二十年多做三十年豈有安坐無事而大功自致之理哉道夫今朝廷之議不是戰便是和不和便戰不知古人不戰不和之間亦有箇且硬相守底道理却一面自作措置亦如何便侵軼得我今五六十年間只以和為可靠兵又不曾練得財又不曾蓄得説恢復底都是亂説耳㽦某嘗謂恢復之計不難惟移浮靡不急之費以為養兵之資則敵首可梟矣道夫近見吳公濟㑹中朋友讀時文䇿其間有問道徳功術者二篇一篇以功術為不好一篇以為有道徳則功術乃道徳之功術無道徳則功術不好前篇不如後篇某常見一宰相説上甚有愛人之心不合被近日諸公愛説恢復某應之曰公便説得不是公何不曰愛人乃所以為恢復恢復非愛人不能因説為政篇道徳政刑與此一般有道徳則刑政乃在其中不可道刑政不好但不得專用政刑耳本朝禦戎始終為和字壊後来人見景徳之和無恙遂只管守之殊不知當時本朝全盛抵得住後来與女真彼此之勢如何了揚和戎問不能自强則聽天所命脩徳行仁則天命在我因説靖康之禍云云終始為講和所誤金人至城下攻城猶説講和及高宗渡江亦只欲講和問秦檜之所以力欲講和者亦以髙宗之意自欲和也曰然是他知得金人之意是欲厭用兵他當初自北朝来時已知得金人厭兵故這裏迎合髙宗之意那箇又投合金人之意金人是時子女玉帛已自充滿厭足非復曩時長驅中原之鋭矣又被這邉殺一兩陳怕了兼金之創業之主已死他那邉兄弟自相屠戮這邉兵勢亦稍稍强所以他亦欲和卓秦檜自北朝歸見金人溺於聲色宴安得之中國者日夜爛熳亦有厭兵意秦得此意遂歸来主和其初亦是矣然屈已奉之蕩不為一毫計使其和中自治有䇿後當逆亮之亂一掃而復中原一大機㑹也惜哉揚秦檜講和時嵗幣絹二萬五千匹銀二萬五千兩今嵗絹減五千匹銀減五千兩此定數每常往来人事禮數皆用金銀器盛腦子貴藥之類率所費不貲大約等絹三千五百文一匹銀二千五百文一兩大數一百二十萬緡彼来時只是些羊巴匹段之類甚微揚朱子語類卷一百三十三
