body:
  text: 朱子語類卷一百十三朱子十訓門人一問氣質弱者如何涵飬到剛勇曰只是一箇勉强然變化氣質最難以下訓徳明今學者皆是就冊子上鑚却不就本原處理㑹只成講論文字與自家身心都無干渉湏是将身心做根柢徳明問向承見教湏一面講䆒一面涵飬如車兩輪廢一不可曰今只就文字理㑹不知涵飬便是一輪轉一輪不轉問今只論涵飬却不講䆒雖能閑邪存誠懲忿窒慾至處事差失則奈何曰未説到差處且如所謂居處恭執事敬若不恭敬便成放肆如此類不難知人却放肆不恭敬如一箇大公至正之路甚分明不肯行却尋得一線路與自家私道合便稱是道理今人毎毎如此問涵飬於未發之初令不善之端旋消則易為力若發後則難制曰聖賢之論正要就發處制惟子思説喜怒哀樂未發謂之中孔孟教人多從發處説未發時固當涵飬不成發後便都不管徳明云這處最難因舉横渠戰退之説曰此亦不難只要明得一箇善惡毎日遇事湏是體驗見得是善從而保飬取自然不肯走在惡上去次日又云雖是涵飬於未發源清則流清然源清却未見得被它流出來已是濁了湏是因流之濁以驗源之未清就本原處理㑹未有源之濁而流之能清者亦未有流之濁而源清者今人多是偏重了只是涵飬於未發而已發之失乃不能制是有得於静而無得於動只知制其已發而未發時不能涵飬則是有得於動而無得於静也問看先生所解文字略通大義只是意味不如此浹洽曰只要熟看又云且将正文熟誦自然意義生有所不解因而記録它日却有反復徳明問編䘮祭禮當依先生指授以儀禮為經戴記為傳周禮作旁證曰和通典也湏看就中却有議論更革處語畢却云子晦正合且做切己工夫只管就外邊文字上走支離雜擾不濟事孔子曰操則存舍則亡孟子曰學問之道無他求其放心而已矣湏如此做家計程子曰心要在腔子裏不可騖外此箇心湏是管著他始得且如曽子於禮上纎細無不理㑹過及其語孟敬子則曰動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存湏有緩急先後之序湏有本末湏将操存工夫做本然後逐段逐義去看方有益也湏有倫序只管支離雜看都不成事去行有餘力則以學文志於道㨿於徳依於仁然後㳺於藝今只就冊子上理㑹所以毎毎不相似又云正要克己上做工夫先生舉遺書云根本湏先培擁然後可立趨向又云學者湏敬守此心不可急廹當栽培深厚涵泳於其間然後可以自得今且要收歛此心常提撕省察且如坐間説時事逐人説幾件若只管説有甚是處便截斷了提撕此心令在此凡遇事應物皆然問當官事多膠膠擾擾奈何曰他自膠擾我何與焉濂溪云定之以中正仁義而主静中與仁是發動處正是當然定理處義是截斷處常要主静豈可只管放出不收歛截斷二字最緊要又云湏培壅根本令豐壮以此去理㑹學三代以下書古今世變治亂存亡皆當理㑹今只看此數書又半上落下且如編禮書不能就亦是此心不壮湏是培飬令豐碩吕子約讀三代以下書之説亦有謂大故有書要讀有事要做問五典之彛四端之性推尋根源既知為我所固有日用之間大倫大端自是不爽少有差失只是為私欲所撓其要在窒慾曰有一分私慾便是有一分見不盡見有未盡便勝他私慾不過若見得脱然透徹私欲自不能留大要湏是知至才知至便到意誠心正一向去又舉虎傷事當時再三深思所見及推太極動静隂陽五行與夫仁義中正之所以主静者求教曰據説亦只是如此思索亦只到此然亦無可思索此乃雖欲從之末由也已處只要時習常讀書常講貫令常在目前久久自然見得問山居頗適讀書罷臨水登山覺得甚樂曰只任閒散不可湏是讀書又言上古無閒民其説甚多不曽記録大意似謂閒散是虚樂不是實樂因説某人開廣可喜甚難得只是讀書全未有是處學者湏是有業次竊疑諸公亦未免如此徳明與張顯父在坐竦然聴教先生言前軰諸賢多只是略綽見得箇道理便休少有苦心理㑹者湏是專心致意一切從原頭理㑹過且如讀堯舜典厯象日月星辰律度量衡五禮五玉之類禹貢山川洪範九疇湏一一理㑹令透又如禮書冠婚䘮祭王朝邦國許多制度逐一講䆒因言趙丞相論廟制不取荆公之説編奏議時已編作細注不知荆公所論深得三代之制又不曽講䆒毁廟之禮當是時除拆已甚不應儀禮可笑子直一生工夫只是編奏議今則諸人之學又只是做奏議以下工夫一種稍勝者又只做得西漢以下工夫無人就堯舜三代原頭處理㑹來又與敬之説且如做舉業亦湏苦心理㑹文字方可以決科讀書若不苦心去求不成業次終不濟事臨别再言學者湏是有業次湏專讀一書了又讀一書徳明起禀數日侍行極䝉教誨若得師友常提撕警省自見有益曰如今日議論某亦得温起一遍問前承先生書云李先生云頼天之靈常在目前如此安得不進盖李先生為黙坐澄心之學持守得固後來南軒深以黙坐澄心為非自此學者工夫愈見散漫反不如黙坐澄心之專先生曰只為李先生不出仕做得此工夫若是仕宦湏出來理㑹事向見呉公濟為此學時方授徒終日在裏黙坐諸生在外都不成模様盖一向如此不得問龜山之學云以身體之以心驗之從容自得於燕閒静一之中李先生學於龜山其源流是如此曰龜山只是要閒散然却讀書尹和靖便不讀書初七日禀辭因求一言為終身佩服先生未答且出晚謁再請先生曰早間所説用功事細思之只是昨日説戒慎不睹恐懼不聞是要切工夫佛氏説得甚相似然而不同佛氏要空此心道家要守此氣皆是安排子思之時異端並起所以作中庸發出此事只是戒慎恐懼便自然常存不用安排戒慎恐懼雖是四箇字到用著時無他只是緊鞭約令歸此窠臼來問佛氏似亦能慎獨曰他只在静處做得與此不同佛氏只是占便宜討閒静處去老荘只是占姦要他自身平稳先生又自言二三年前見得此事尚鶻突為他佛説得相似近年來方見得分曉只是戒慎所不睹恐懼所不聞如顔子約禮事是如此佛氏却無此叚工夫先生極論戒謹恐懼以為學者切要工夫因問遺書中敬義夾持直上達天徳之語亦是切要工夫曰不理㑹得時凡讀書語言各各在一處到底只是一事又問必有事焉而勿正一叚亦是不安排亦是戒謹恐懼則心自存之意曰此孟子言飬氣之事必有事焉謂集義也集義則氣自長亦難正他亦難助他長必有事而勿㤀於集義則積漸自長去安卿問前日先生與廖子晦書云道不是有一箇物事閃閃爍爍在那裏固是如此但所謂操則存捨則亡畢竟也湏有箇物事曰操存只是教爾收歛教那心莫胡思亂想幾曽捉定有一箇物事在裏又問顧諟天之明命畢竟是箇甚麽曰只是説見得道理在面前不被物事遮障了立則見其參於前在輿則見其倚於衡皆是見得理如此不成是有一塊物事光輝輝地在那裏義剛廖子晦得書來云有本原有學問某初不曉得後來看得他們都是把本原處是别有一塊物來模様聖人教人只是致知格物不成真箇是有一箇物事如一塊水銀様走來走去那裏這便是禪家説赤肉團上自有一箇無位真人模様義剛以前看得心只是虛蕩蕩地而今看得來湛然虚明萬理便在裏面向前看得便似一張白紙今看得便見紙上都是字廖子晦們便只見得是一張紙義剛直卿言廖子晦作宰不庭參當時忤了上位但此一節最可服先生曰庭參底固不是然待上位來争到底也不是義剛廖徳明赴潮倅來告别臨行求一安樂法曰聖門無此法或問誠敬二字云云先生曰也是如此但不去做工夫徒説得不濟事且如公一日間曽有幾多時節去體察理㑹來若不曽如此下工夫只據冊上寫底把來口頭説雖説得是何益某常説與學者此箇道理湏是用工夫自去體䆒講論固不可闕若只管講不去體䆒濟得甚事盖此義理儘廣大無窮盡今日恁他説亦未必是又恐他只説到這裏入深也更有在若便領略将去不過是皮膚而已又不入思慮則何縁㑹進湏是把來横看豎看子細窮䆒都理㑹不得底固當去看便是領略得去者亦當如此看看來看去方有疑處也此箇物事極宻毫釐間便相争如何恁地踈略説得若是那真箇下工夫到田地底人説出來自别漢卿所問雖若近似也則看得淺湏是理㑹來理㑹去理㑹得意思到似被膠漆粘住時方是長進也因問誠敬二字如何看廣云先敬然後誠曰且莫理㑹先後敬是如何誠是如何廣曰敬是把捉工夫誠則到自然處曰敬也有把捉時也有自然時誠也有勉為誠時亦有自然誠時且説此二字義敬只是箇收歛畏懼不縱放誠只是箇朴直慤實不欺誑初時湏著如此不縱放不欺誑到得工夫到時則自然不縱放不欺誑矣以下訓廣廣云昨日聞先生教誨做工夫底道理自看得來所以無長進者政縁不曽如此做工夫故於看文字時不失之膚淺則入於穿鑿今若據先生之説便如此著實下工夫去則一日湏有一日之功一月湏有一月之功決不到虚度光隂矣先生曰昨日也偶然説到此某将謂凡人讀書都是如此用工後來看得却多不如此盖此箇道理問也問不盡説也説不盡頭緒儘多湏是自去看看來看去則自然一日深似一日一日分曉似一日一日簡易似一日只是要熟孟子曰仁亦在乎熟之而已熟則一喚在面前不熟時纔被人問著便湏旋去尋討迨尋討得來時意思已不如初矣先生謂廣看文字傷太快恐不子細雖是理㑹得底更湏将來看此不厭熟熟後更看方始滋味出因笑曰此是做偽學底工夫先生諭廣曰今講學也湏如此更湏於主一上做工夫若無主一工夫則所講底義理無安著處都不是自家物事若有主一工夫則外面許多義理方始為我有都是自家物事工夫到時才主一便覺意思好卓然精明不然便緩散消索了沒意思廣云到此侍教誨三月雖昏愚然亦自覺得與前日不同方始有箇進修底田地歸去當閉戸自做工夫曰也不問在這裏不在這裏也不説要如何頓段做工夫只自脚下便做将去固不免有散緩時但才覺便收歛将來漸漸做去但得收歛時節多散緩之時少便是長進處故孟子説學問之道無他求其放心而已所謂求放心者非是别去求箇心來存著只才覺放心便在此孟子又曰鷄犬放則知求之心放則不知求某常謂鷄犬猶是外物才放了湏去外面捉将來若是自家心便不用别求才覺便在這裏鷄犬放猶有求不得時自家心則無求不得之理因言横渠説做工夫處更精切似二程二程資禀髙潔浄不大段用工夫横渠資禀有偏駁夾雜處他大段用工夫來觀其言曰心清時少亂時多其清時視明聼聦四體不待覊束而自然恭謹其亂時反是説得來大段精切先生又謂廣見得義理雖稍快但言動之間覺得輕率處多子曰仁者其言也訒仁者之言自不恁地容易謝氏曰視聼言動不可易易則多非禮須時時自省覺自收歛稍緩縱則失之矣翌日廣請曰先生昨日言廣言動間多輕率無那其言也訒底意思此深中廣之病盖舊年讀書到適然有感發處不過贊嘆聖言之善耳都不能玩以飬心自到師席之下一日見先生泛説義理不是面前物皆吾心固有者如道家説存想法所謂鈆汞龍虎之屬皆人身内所有之物又數日因廣誦義理又向外去先生云前日説與公道皆吾心固有非在外之物廣不覺怵然有警於心又一日侍坐見先生説如今學者大要在喚醒上自此方知得做工夫底道理而今於静坐時讀書玩味時則此心常在一與事接則心便緩散了所以輕率之病見於言動之間有不能掩者今得先生警誨自此更當於此處加省察收攝之功然待教只數日在更望先生痛加教飾先生良乆舉伊川説曰人心有主則實無主則虚又一説却曰有主則虚無主則實公且説看是如何廣云有主則實謂人具此實然之理故實無主則實謂人心無主私欲為主故實先生曰心虚則理實心實則理虚有主則實此實字是好盖指理而言也無主則實此實字是不好盖指私欲而言也以理為主則此心虚明一毫私意著不得譬如一泓清水有少許砂土便見或問人之思慮有邪有正若是大段邪僻之思却容易制惟是許多無頭面不緊要之思慮不知何以制之曰此亦無他只是覺得不當思慮底便莫要思便從脚下做将去乆乆純熟自然無此等思慮矣譬如人坐不定者兩脚常要行但纔要行時便自少覺莫要行乆乆純熟亦自然不要行而坐得定矣前軰有欲澄治思慮者於坐處置兩器毎起一善念則投白豆一粒於器中毎起一惡念則投黑豆一粒於器中初時白豆少黑豆多後白豆多黑豆少後來遂不復有黑豆最後則雖白豆亦無之矣然此只是箇死法若更加以讀書窮理底工夫則去那般不正當底思慮何難之有又如人有喜做不要緊事如寫字作詩之屬初時念念要做更遏捺不得若能将聖賢言語來玩味見得義理分曉則漸漸覺得此重彼輕乆乆不知不覺自然剥落消殞去何必横生一念要得别尋一捷徑盡去了意見然後能如此隔夕嘗有為去意見之説者此皆是不耐煩去脩治他一箇身心了作此見解譬如人做官則當至誠去做職業却不耐煩去做湏要尋箇倖門去鑚道鑚得這裏透時便可以超躐将去今欲去意見者皆是這箇心學者但當就意見上分真妄存其真者去其妄者而已若不問真妄盡欲除之所以游游蕩蕩虚度光隂都無下工夫處因舉中庸曰喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大本和也者天下之逹道致中和天地位焉萬物育焉只如喜怒哀樂皆人之所不能無者如何要去得只是要發而中節爾所謂致中如孟子之求放心與存心飬性是也所謂致和如孟子論平旦之氣與充廣其仁義之心是也今却不耐煩去做這様工夫只管要求捷徑去意見只恐所謂去意見者正未免為意見也聖人教人如一條大路平平正正自此直去可以到聖賢地位只是要人做得徹做得徹時也不大驚小怪只是私意剥落浄盡純是天理融明爾又曰興於詩立於禮成於樂聖人做出這一件物事來使學者聞之自然歡喜情願上這一條路去四方八面攛掇他去這路上行又曰所謂致中者非但只是在中而已纔有些子偏倚便不可湏是常在那中心十字上立方是致中譬如射雖射中紅心然在紅心邊側亦未當湏是正當紅心之中乃為中也廣云此非常存戒謹恐懼底工夫不可曰固是只是箇戒謹恐懼便是工夫廣云數日敬聼先生教誨做工夫處左右前後内外本末無不周宻所謂盛水不漏曰博我以文約我以禮聖門教人只此兩事湏是互相發明約禮底工夫深則博文底工夫愈明博文底工夫至則約禮底工夫愈宻廣請於先生求居敬窮理四字曰自向裏做工夫何必此因言昔羅隠從錢王廵錢塘城見樓櫓之屬陽為不曉而問曰此何等物錢曰此為樓櫓又問何用錢曰所以禦冦曰果能爾則當移向内施之盖風之以㓂在内故也先生問廣到此幾日矣廣云八十五日曰來日得行否廣曰來早拜辭曰有疑更問廣云今亦未有疑自此做工夫去湏有疑却得拜書請問曰且自勉做工夫學者最怕因循莫説道一下便要做成今日知得一事亦得行得一事亦得只不要間斷積累之乆自解做得徹去若有疑處且湏自去思量不要倚靠人道待去問他若無人可問時不成便休也人若除得箇倚靠人底心學也湏㑹進先生語漢卿有疑未決可早較量答云眼下亦無所疑且看做去有礙方敢請問先生因云人説道頓段做工夫亦難得頓叚工夫莫説道今日做未得且待來日做若做得一事便是一事工夫若理㑹得這些子便有這些子工夫若見處有積累則見處自然貫通若存飬處有積累則存飬處自然透徹賀孫大雅謁先生於鈆山觀音寺納贄拜謁先生問所學大雅因質所見先生曰所謂事事物物各得其所乃所謂時中之義但所説大意却錯雜據如此説乃是欲求道於無形無象之中近世學者大底皆然聖人語言甚實且即吾身日用常行之間可見惟能審求經義将聖賢言語虚心以觀之不必要著心去看他乆之道理自見不必求之太髙也今如所論却只於𣺌𣺌茫茫處想見一物懸空在更無捉摸處将來如何頓放更沒收殺如此則與身中日用自然判為二物何縁得有諸己只看論語一書何嘗有懸空説底話只為漢儒一向尋求訓詁更不看聖賢意思所以二程先生不得不發明道理開示學者使激昻向上求聖人用心處故放得稍髙不期今日學者乃捨近求逺處下窺髙一向懸空説了扛得兩脚都不著地其為害反甚於向者之未知尋求道理依舊在大路上行今之學者却求捷徑遂至鑚山入水吾友要知湏是與他古本相似者方是本分道理若不與古本相似盡是亂道以下訓大雅臨别請教以為服膺之計曰老兄已自歴練但目下且湏省閒事就簡約上做工夫若舉業亦是本分事且如前日令老兄作告子未嘗知義論其説亦自好但終是摶量非實見得如今人説人文字辭太多不是辭多自縁意少若據某所見義内即是行有不慊於心則餒便自見得義在内若徹頭徹尾一篇説得此理明便是吾人日用事豈特一篇時文而已再見因言去冬請違之後因得一詩云三見先生道愈尊言提切切始能安如今決破本根説不作從前料想看有物有常湏自盡中倫中慮覺猶難願言克己工夫熟要得周旋事仰鑚看畢云甚好大雅云近却盡去得前病又覺全然安了忒煞無疑恐難進歩且如南軒説無適無莫適是有所必莫是無所主便見得不妥貼程氏謂無所徃無所不徃且要義之與比處重便安了曰此且做得一箇麄麄底基址在尚可加工但古人訓釋字義無用適字為徃字者此適字當為吾誰適從之適音的是端的之意言無所定亦無不定耳張欽夫云無適無莫釋氏謂有適莫此亦可通問如何是麄麄底基址曰無所徃亦無所不徃亦無深害但認得義字重亦是所謂麄者如匠人出治材料且成樸在然後刻畫可加也如云義字豈可便止湏要見之於事那裏是義那裏是不義不可謂心安於此便是義如宰我以食稻衣錦為安不成便是義今所以要於聖賢語上精加考䆒從而分别輕重辨明是非見得粲然有倫是非不亂方是所謂文理宻察是也自此應事接物各當事幾而不失之過不失之不及此皆精於義理之效也問此是精義入神以致用否曰所謂精義入神不過要思索令精之又精則見於日用自然合理所謂入神即此便是非此外别有入神處也如老兄詩云中倫中慮只恁汎説何益倫慮只是箇倫理所在要使言行有倫理爾湏是平時精考後躬行之使凡一言一行皆出乎此理則這邉自重所謂仰不愧俯不怍浩然之氣亦從是生若用工如此方有進處若如此進時一齊俱進聖賢見處雖卒未可遽盡然進進不已自當隨力量有到處若非就這上見得義理之正則非特所學不可見於行亦非此道之至因問苟不至徳至道不凝焉離事物舍躬行以為道則道自道我自我尚不能合一安得有進曰然再見即問曰三年不相見近日如何對云獨學悠悠未見進處曰悠悠於學者最有病某前此説話亦覺悠悠而學於某者皆不作切己工夫故亦少見特然可恃者且如孟子初語滕文公只道性善善學者只就這上便做工夫自應有得及後再見孟子則不復更端矣只説世子疑吾言乎夫道一而已矣顔淵曰舜何人也予何人也有為者亦若是以至若藥不瞑眩厥疾弗瘳其言激切如此只是欲其著緊下工夫耳又如語曹交一段意亦同此大抵為學湏是自家發憤振作皷勇做去直是要到一日湏見一日之效一月湏見一月之效諸公若要做便從今日做去不然便截從今日斷不要務為説話徒無益也大雅云從前但覺寸進不見特然之效曰正為此便不曽離得舊窟何縁變化得舊氣質又曰學者做切己工夫要得不差先湏辨義利所在如思一事非特財利利欲只每事求自家安利處便是推些便不可入堯舜之道切湏勤勤提省察之於纎㣲毫忽之間不得放過如此便不㑹錯用工夫問程先生云周羅事者先有周羅之病在心多疑者先有疑病在心大雅則浩然無疑但不免有周羅事之心曰此正是無切己工夫故見他人事湏攬一分若自己曽實做工夫則如忍痛然我自痛且忍不暇何暇管他人事自己若把得重則彼事自輕因論古今聖賢千言萬語不過只要賭是爾曰賭是固好然却只是結末一著要得賭是湏去求其所以大雅曰不過致知窮理曰實做去便見得所以處再見即曰吾軰此箇事世俗理㑹不得凡欲為事豈可信世俗之言為去就彼流俗何知所以王介甫一切屏之他做事雖是過然吾軰自守所學亦豈可為流俗所梗如今浙東學者多陸子静門人類能卓然自立相見之次使毅然有不可犯之色自家一軰朋友又覺不振一似㤀相似彼則又似助長又曰大抵事只有一箇是非是非既定却揀一箇是處行将去必欲囬互得人人道好豈有此理然事之是非乆却自定時下湏是在我者無慊仰不愧俯不怍别人道好道惡管他臨别請益曰大要只在求放心此心流亂無所收拾将甚處做管轄處其他用工揔閒慢先湏就自心上立得定決定不雜則自然光明四達照用有餘凡所謂是非美惡亦不難辨矣况天理人欲不兩立湏得全在天理上行方見得人欲消盡義之與利不待分辨而明至若所謂利者凡有分毫求自利便處皆是便與克去不待顯著方謂之利此心湏令純純只在一處不可令有外事參雜遇事而發合道理處便與果决行去勿顧慮若臨事見義方復遲疑則又非也仍湏勤勤把将做事不可俄頃放寛日日時時如此便湏見驗人之精神習乆自成大凡人心若勤緊收拾莫令放寛縱逐物安有不得其正者若真箇提得緊雖半月見驗可也再見首見教云今日用功且當以格物為事不曰窮理却説格物者要得就事物上看教道理分明見得是處便斷然行将去不要遲疑将此格物逐日做一叚工夫勿令作輟夫是之謂集義天下只要一箇是若不研䆒得分曉如何行得書所謂惟精惟一最要是他上聖相傳來底只是如此問吾軰之貧者令不學子弟經營莫不妨否曰止經營衣食亦無甚害陸家亦作舖買賣因指其門閾云但此等事如在門限裏一動著脚便在此門限外矣縁先以利存心做時雖本為衣食不足後見利入稍優便多方求餘遂生萬般計較做出礙理事來湏思量止為衣食為仰事俯育耳此計稍足便湏收歛莫令出元所思處則粗可救過因令看利用安身以崇徳也大雅云利者義之和也順利此道以安此身則徳亦從而進矣曰孔子遭許多困厄身亦危矣而徳亦進何也大雅云身安而後徳進者君子之常孔子遭變權之以宜寧身不安徳則湏進曰然答曰然意似未盡劉仲升云横渠説精義入神事豫吾内求利吾外也利用安身素利吾外致飬吾内也曰他説自分明正叔有支蔓之病先生毎求其偏正叔因習静坐後復有請謂因此遂有厭書冊之意先生曰豈可一向如此只是令稍稍虚閒依舊自要讀書文蔚朱子語類卷一百十三
