body:
  text: 朱子語類卷三十一論語十三雍也篇二子華使於齊章子升問冉子請粟聖人不與之辨而與之益之曰聖人寛洪可以予可以無予予之亦無害但不使傷惠耳木之冉子與之粟五秉聖人亦不大段責他而原思辭禄又謂與爾隣里鄉黨㸔来聖人與處却寛恪張子曰於斯二者可見聖人之用財雖是小處也莫不恰好便是一以貫之處䕫孫義剛録云聖人扵小䖏也區䖏得恁地盡便是一以貫之䖏聖人做事着地頭范氏曰夫子之道循理而已故周急不繼富以為天下之通義使人可繼也㳺氏曰餼廩稱事所以食功也今原思為之宰而辭禄不受則食功之義廢矣盖義所當得則雖萬鍾不害其為亷借使有餘猶可以及隣里鄉黨盖隣里鄉黨有相周之義尹氏曰赤之適齊也乗肥馬衣輕裘而冉求乃資之與之釡者所以示不當與也求不達其意而請益與之五秉故夫子非之又曰原思之辭常禄使其苟有餘則分諸隣里鄉黨者凡取子一適扵義而已第四章凡七説今從范氏㳺氏尹氏之説伊川謂師使弟子不當有所請其説雖正然恐非本意據冉求乃為其母請其意欲資之也使冉求為子華請則猶可責之以弟子之禮若為其母請則止欲附益之故責之以繼富恐或外生一意非夫子責冉求之意范氏第二説與楊氏謝氏之説大率以辭受取舍順理合義為文只説大綱其間曲折詳備則不如尹氏之深切呂氏曰富而與人分之則廉者無辭扵富造語未盡不能無差向使不義之富可以分人廉者所必辭也富之可辭與不可辭在扵義不義而不在扵分人與不分人也謝氏曰與之釡與之庾意其禄秩所當得者此説恐未穏使禄秩當得夫子不待冉子之請而與之禄有常數夫子何心輕重扵其間哉為其母請粟觀其文勢非禄秩也明矣曰為其母請即為子華請也吕氏説只據原思辭禄而言非謂不義之富也榦子謂仲弓章問子謂仲弓曰犂牛之子騂且角伊川謂多一曰字意以仲弓為犂牛子也考之家語仲弓生於不肖之父其説可信否曰聖人必不肯對人子説人父不善謨犂牛之子范氏蘇氏得之榦問此章前後作用人不以世類南軒以仲弓言焉知賢才之故故孔子教之用人此説牽合然亦似有理脈曰横渠言大者苟立雖小未純人所不棄也今欽夫此説無他只是要回互不欲説仲弓之父不肖耳何不虚心平氣與他㸔古人賢底自賢不肖底自不肖稱其賢可以為法語其不肖可以為戒或曰恐是因仲弓之父不肖而微其辭曰聖人已是説了此亦何害大抵人被人説惡不妨但要能改過過而能改則前愆頓釋昔日是箇不好底人今日有好事自不相干何必要回互然又要除却曰字此曰字留亦何害如子謂顔淵曰吾見其進也不成是與顔淵説况此一篇大率是論他人不必是與仲弓説也只蘇氏却説此乃論仲弓之徳非是與仲弓言也大雅子曰回也章問三月不違仁曰仁與心本是一物被私欲一隔心便違仁去却為二物若私欲既無則心與仁便不相違合成一物心猶鏡仁猶鏡之明鏡本来明被塵垢一蔽遂不明若塵垢一去則鏡明矣顔子三箇月之乆無塵垢其餘人或日一次無塵垢少間又暗或月一次無塵垢二十九日暗亦不可知南升問三月不違仁曰三月只是言乆爾非謂三月後必違也此言顔子能乆扵仁爾雖念慮之間間有不善䖏却能知之而未嘗復行也去偽問三月不違仁三月後亦有違否曰畢竟乆亦有間斷曰這間斷亦甚微否曰是如不貳過過便是違仁非禮勿視聽言動四句照管不到便是過淳問日月至焉曰日至是一日一次至此月至是一月一次至此言其疎也閒時都思量别處又問思量事不到不好然却只是閒事如何曰也不是視便要思明聽便思聰纔思量便要在正理上如何可及閒事銖問如何是日至月至曰某舊説其餘人有一日不違仁有一月不違仁者近思之一日不違仁固應有之若一月不違似亦難得近得一説有一日一畨見得到有一月一番見得到比之一日猶勝如一月之逺若顔子方能三月不違天理純然無一毫私偽間雜夫子所以獨稱之㝢義剛説回也其心三月不違仁集注云仁者心之徳竊推此義以為天生一人只有一心這腔子裏面更無些子其他物事只有一箇渾全底道理更無些子欠缺所謂仁也曰莫只将渾全底道理説須㸔教那仁親切始得義剛顔子三月不違只是此心常存無少間斷自三月後却未免有毫髪私意間斷在但顔子纔間斷便覺當下便能接續将去雖當下便能接續畢竟是曾間斷来若無這些子却便是聖人也日月至焉㸔得来却是或一日一至或一月一至這亦難説今人若能自朝至暮此心洞然表裏如一直是無纎毫私意間斷這地位豈易及惟實曾去下工夫方自見得横渠内外賔主之説極好三月不違那箇是主人是長在家裏坐底三月後或有一畨出去却便㑹歸来日月至焉那箇是客是從外面到底然亦是徹底曾到一畨却不是髣髴見得箇恁地或日一到這裏或月一到這裏便又出去以月較日又疎到了正卿問集注不知其仁也云雖顔子之賢猶不能不違扵三月之後如何曰不是三月以後一向差去但於這道理乆後畧斷一斷便接續去只是有些子差便接了若無些子間斷便全是天理便是聖人所以與聖人一間者以此舊説只做有一月至者有一日至者與顔淵三月至者有次第㸔来道理不如此顔子地位比諸子煞有優劣如賜也聞一以知二回也聞一以知十此事争多少此是十分争七八分張子云這道理譬如一屋子是自家為主朝朝夕夕時時只在裏面如顔子三月不能不違只是畧暫出去便又歸在裏面是自家常做主若日至者一日一畨至是常在外為客一日一畨暫入裏面来又便出去月至亦是常在外為客一月一畨入裏面来又便出去又云三月不違者如人通身都白只有一㸃子黒日月至焉者如人通身都黒只有一㸃白又云顔子一身巳自不見其身日用之間只見許多道理賀孫今集注不知其仁章無此説問如今之學者一日是幾遍存省當時門人乃或日一至焉或月一至焉不應如是疎畧恐仁是渾然天理無纎毫私欲䖏今日之學者雖曰存省亦未到這境界他孔門弟子至便是至境界否曰今人能存得亦是這意思但觸動便不得被人呌一聲便走了他當那至時應事接物都不差又不知至時乆近如何那裏煞有曲折日至者却至得頻數恐不甚乆月至者或旬日或一二日皆不可知又問横渠云云文蔚竊謂三月不違者天理為主人欲為賔日月至焉者人欲為主天理為賔學者工夫只得勉勉循循以克人欲存天理為事其成與不成至與不至則非我可必矣曰是如此文蔚問伊川言不違是有纎毫私欲横渠言要知内外賔主之辨曰前後説是如此劉仲升云愈乆而不息者氣象逈别大雅云乆而不息自是聖人事曰三月不違是自家已有之物三月之乆忽被人借去自家旋即取回了日月至焉是本無此物暫時問人借得来便被人取去了大雅至之問横渠言始學之要當知三月不違止過此幾非在我者曰且以屋喻之三月不違者心常在内雖間或有出時然終是在外不穏便纔出即便入盖心安扵内所以為主日月至焉者心常在外雖間或有入時然終是在内不安纔入即便出盖心安扵外所以為賔日至者一日一至此月至者一月一至此自外而至也不違者心常存日月至者有時而存此無他知有至未至意有誠未誠知至矣雖驅使為不善亦不為知未至雖軋勒使不為此意終迸出来故貴扵見得透則心意勉勉循循自不能已矣過此幾非在我者猶言過此以徃未之或知言過此則自家着力不得待他自長進去又曰三月不違之違猶白中之黒日月至焉之至猶黒中之白今須且将此一段反覆思量渙然冰釋怡然理順使自㑹淪肌浹髓夫子謂君子上達小人下達只在這些子若拗不轉便下達去了又曰此正如誠意章相似知善之可好而好之極其篤知不善之可惡而惡之極其深以至扵慊快充足方始是好䖏道夫問三月不違仁先生曰如何是心如何是仁曰心是知覺底仁是理曰耳無有不聰目無有不明心無有不仁然耳有時不聰目有時不明心有時不仁問莫是心與理合而為一曰不是合心自是仁然私欲一動便不仁了所以仁人心也學理㑹甚麽事只是理㑹這些子又問張子之説莫是三月不違者是仁常在内常為主日月至焉者是仁常在外常為賔曰此倒説了心常在内常為主心常在外常為客如這一間屋主常在此居客雖在此不乆着去問如此則心不違仁者是心在仁内曰不可言心在仁内畧略地是恁地意思又曰便是難説問過此幾非在我者如何曰不用着力如決江河水至而舟自浮如説學只説到説處住以上不用説至説處則自能尋将上去不到説䖏是不曾時習時習則相將自然説又曰人只是一箇不肯學須是如喫酒自家不愛喫硬将酒来喫相将自然要喫不待強他如喫藥人不愛喫硬強他喫節問横渠説内外賔主之辨若以顔子為内與主不成其他門人之所學便都只在外曰他身巳是都在道外恰似客一般譬之一箇屋聖人便常在屋裏坐顔子也在屋裏只有時誤行出門外然便覺不是他住䖏便回来其他却常在外面有時入来不是他活䖏少間又自出去了而今人硬把心制在這裏恰似人在路上做活計百事都安在外雖是他自屋舎時暫入来見不得他活處亦自不安又自走出了雖然也須漸漸把捉終不成任他如何又曰日月至焉者是有一日得一畨至有一月得一畨至賀孫問日月至焉一句曰㸔得来日却是乆底月却是暫時底因説横渠内外賔主之辨曰顔子一似主人長在家裏三月以後或有出去時節便㑹向歸其餘是賔或一日一至或一月一至以日較月月又却疎又曰不違者是在内至焉者是在外来又問幾非在我者曰舎三月不違去做工夫都是在我外不在我這裏了謙之問横渠内外賔主之説曰主是仁賔却是巳身不違仁者已住在此屋子内了日月至焉者時暫到此又出去是乃賔也後數日又因一學者舉此段為問而曰仁譬如此屋子顔子在此裏面住但未免間有出去時他人則或入来住得一日或入来住得一月不能乆䖏此此即内外賔主之辨過此幾非在我者謂學者但當勉勉循循做工夫而已舍是則他無所事也必大或問横渠内外賔主之辨一段云仁在内而我為主仁在外而我為客如何曰此兩句又是後人解横渠之語盖三月不違底是仁為主私欲為客諸子日月至焉者是私欲為主仁只為客譬如人家主人常在屋中出外時少便出去也不乆須歸来日月至焉者則常常在外做客暫時入屋来又出去出去之時多在屋之時少或一月一畨至或一日一畨至終是不是主人故常在外然那客亦是主人只是以其多在外故謂之客敬則常在屋中住得不要出外乆之亦是主人既是主人自是出去時少也佛經中貧子寳珠之喻亦當三月不違者我為主而常在内也日月至焉者我為客而常在外也仁猶屋心猶我常在屋中則為主出入不常為主則客也過此幾非在我者如水漲船行更無着力處銖問横渠内外之説曰譬如一家有二人一人常在家一人常在外在家者出外常少在外者常不在家間有歸家時只是在外多謨三月不違仁是在屋底下做得主人多時日月至焉是有時從外面入来屋子底下横渠所謂内外賔主之辨者是也又曰學者須是識得屋子是我底始得儒用問内外賔主之辨曰不違仁者仁在内而為主然其未熟亦有時而出於外日月至焉者仁在外而為賔雖有時入扵内而不能乆也廣三月不違主有時而出日月至焉賔有時而入人固有終身為善而自欺者不特外面盖有心中欲為善而常有一箇不肯底意便是自欺從周叔器未達内外賔主之辨一句曰日月至焉底便是我被那私欲挨出在外面是我勝那私欲不得又問使心意勉勉循循不能已曰不能已是為了又為為得好後只管為如欲罷不能相似蔡仲黙云如生則惡可已也之類曰是義剛問三月不違仁曰仁即是心心如鏡相似仁便是箇鏡之明鏡從来自明只為有少間隔便不明顔子之心巳純明了所謂三月不違只縁也曾有間隔處又問張子謂使心意勉勉循循而不能已過此幾非在我者是如何曰學者只要勉勉循循而不能已才能如此便後面雖不用大段着力也自做去如推箇輪車相似才推得轉了他便滔滔自去所謂學而時習之不亦悦乎者正謂説後不待着力而自不能已也時舉張子言勉勉循循而不能已須是見得此心自不能已方有進䖏過此幾非在我謂過三月不違非工夫所能及如末由也巳真是着力不得又云勉勉循循之説須是真箇到那田地實知得那滋味方自不能已要住不得自然要去過此幾非在我言不由我了如推車子相似才着手推動輪子了自然運轉不停如人喫物既得滋味自然愛喫日月至焉者畢竟也是曾到来但不乆耳明作或問張子幾非在我者曰既有循循勉勉底工夫自然住不得幾非在我者言不待用力也如易傳中説過此以徃未之或知也之意為學正如推車子相似才用力推得動了便自轉将去更不費力故論語首章只説箇學而時習之不亦悦乎便言其効驗者盖學至説䖏則自不容已矣廣南升録别出問幾非在我之義曰非在我言更不着得人力也人之為學不能得心意勉勉循循而不已若能如是了如車子一般初間着力推得行了後来只是滚将去所謂學而時習之不亦説乎若得説了自然不能休得如種樹一般初間栽培灌溉及既成樹了自然抽枝長葉何用人力南升味道問過此幾非在我者疑横渠止謂始學之要唯當知内外賔主之辨此外非所當知曰不然學者只要撥得這車輪轉到循循勉勉䖏便無着力䖏自㑹長進去如論語首章言學只到不亦説乎䖏住下面便不説學了盖到説時此心便活因言韓退之蘇明允作文只是學古人聲響盡一生死力為之必成而後止今之學者為學曾有似他下工夫到豁然貫通䖏否可學周貴卿問幾非在我者曰如推車子様初推時須要我着力及推發了後却是被他車子移将去也不由在我了某嘗説學而時習之不亦説乎若是做到這裏後自不肯住了而今人只是不能得到説䖏義剛問過此幾非在我者曰過此即是過此以徃未之或知底意思若工夫到此盖有用力之所不能及自有不可已䖏雖要用力亦不能得又問内外賔主之辨曰三月不違為主日月至焉為賔主則常在其中賔則徃来無常盖存主之時少在外之時多日月至焉為其時暫而不能乆若能致其賔主之辨而用其力則工夫到䖏自有不可息者㝢問何謂幾非在我者曰此即過此以徃未之或知之意盖前頭事皆不由我我不知前面之分寸也不知前面之淺深只理㑹這裏工夫使内外賔主之辨常要分曉使心意勉勉循循不已只如此而已便到顔子既竭吾才如有所立卓爾之地雖欲從之末由也巳也只恁地淳過此幾非在我者到此則進進不能己亦無著力䖏拱夀子升問過此幾非在我莫是過此到聖人之意否曰不然盖謂工夫到此則非我所能用其力而自然不能己如車已推而勢自去如船已發而䌫自行若不能辨内外賔主不能循循不已則有時而問斷矣孟子所謂夫仁亦在乎熟之而已矣此語説得盡了木之問過此幾非在我者莫只見許多道理不見自身巳如何曰這只是説循循勉勉便自住不得便自不由自身已只是這箇闗難過纔過得自要住不得如顔子所謂欲罷不能這箇工夫入頭都只在窮理只這道理難得便㑹分明又云今學者多端固有説得道理是却自不着身只把做言語用了固有要去切己做工夫却硬理㑹不甚進者又云㸔得道理透少間見聖賢言語句句是為自家身己設又云内外賔主只是如今人多是不能守得這心譬如一間屋日月至焉者是一日一畨入裏面来或有一月一畨入裏面来他心自不着這裏便又出去了若説在内譬如自家自在自屋裏作主心心念念只在這裏行也在這裏坐也在這裏睡卧也在這裏三月不違是時復又暫出外去便覺不是自家屋便歸来今舉世日夜營營扵外直是無人守得這心若能收這心常在這裏便與一世都背馳了某嘗説今學者别無他只是要理㑹這道理此心元初自具萬物萬事之理須是理㑹得分明賀孫問三月不違仁伊川舉得一善則拳拳服膺仁乃全體何故以善稱曰仁是合衆善一善尚不棄况萬善乎可學集義問不違仁是此心純然天理其所得在内得一善則服膺而弗失恐是所得在外曰得一善則服膺弗失便是三月不違仁䖏又問是如何曰所謂善者即是收拾此心之理顔子三月不違仁豈真恁虚空湛然常閉門合眼静坐不應事不接物然後為不違仁也顔子有事亦須應須飲食須接賔客但只是無一毫私欲耳道夫問伊川謂日月至焉與乆而不息者所見規模雖畧相似其意味逈别㸔来日月至與不息者全然别伊川言畧相似何也曰若論到至處却是與乆而不息底一般只是日月至者至得不長乆不息者純然無間斷㝢問伊川曰三月言其乆天道小變之節盖言顔子經天道之變而為仁如此其終乆扵仁也又曰三月不違仁盖言其乆然非成徳事范氏曰回之扵仁一時而不變則其乆可知其餘則有時而至焉不若回愈乆而弗失也夫子之扵仁慎其所以取與人者至矣有能一日用其力於仁矣乎猶不得見焉惟獨稱顔子三月不違其可謂仁也已謝氏曰回之為人語其所知雖出扵學然鄰扵生知矣語其成功雖未至扵從容亦不可謂勉強矣三月不違仁仁矣特未可以語聖也亦未達一間之稱耳三月特以其乆故也古人三月無君則弔去國三月則復詩人以一日不見如三月兮夫子聞韶三月不知肉味皆乆之意右第六章凡九説今從伊川范氏謝氏之説伊川第二説以得一善則服膺弗失作三月不違仁未甚切第二説曰三月言其乆過此則聖人也呂氏亦曰以身之而未能信性乆則不能不懈又曰至扵三月之乆猶不能無違又曰至於三月之乆其氣不能無衰雖欲勉而不違仁不可得也楊氏曰三月不違仁未能無違也侯氏亦曰三月不違仁便是不逺而復也過此則通天通地無有間斷尹氏亦曰三月言其乆若聖人則渾然無問矣此五説皆同而有未安惟呂氏為甚竊謂此章論顔子三月不違仁其立言若曰能乆不違仁而已其餘日月至焉者亦若曰至扵仁而不乆而已若以為顔子三月不違既過三月則違之何以為顔子此呂氏之説為未安楊氏亦此意伊川侯氏尹氏之説亦與呂氏楊氏相類特不顯言之耳故愚以三月特以其乆不必泥三月字顔子視孔子為未至者聖人則不思不勉顔子則思勉也諸子視顔子為未至者則以乆近不同耳若謂顔子三月則違恐未安伊川第三説與横渠同皆説學者事但横渠内外賔主四字不知如何説恐只是以三月不違者為有諸己故曰内曰主日月至焉者若存若亡故曰外曰賔否游氏説仁字甚切恐於本文不甚宻先生曰能乆不違仁不知能終不違耶亦有時而違耶顔子若能終不違仁則又何思勉之有易傳復之初九爻下有論此䖏可更思之㳺氏引仁人心也則仁與心一物矣而曰心不違仁何也榦季康子問仲由章問求之藝可得而聞否曰㸔他既為季氏聚斂想見是有藝問龜山解以為知禮樂射御書數然後謂之藝曰不止是禮樂射御書數㝢求也藝扵細微上事都理㑹得縁其材如此故用之扵聚斂必有非他人所及者惜乎其有才而不善用之也㽦問集註以從政例為大夫果何所據然則子游為武城宰仲弓為季氏宰之類皆不可言政歟曰冉子退於季氏之朝夫子曰其事也如有政雖不吾以吾其與聞之亦自可見壮祖吕氏曰果則有斷達則不滯藝則善裁皆可使從政也右第七章凡六説今從呂説伊川曰人各有所長能取其長皆可用也尹氏亦用此意若謂從政則恐非人人可能范氏惟説三子之失恐就本文解則未須説失䖏謝氏論季氏之意以為陋儒所短正在此亦恐季氏未必有此意其問至扵再三乃是有求人才之意使季氏尚疑其短則其問不必至反覆再三也楊氏論果藝達三徳不如吕氏謹嚴曰此段所説得之但破范説非是榦正淳問范氏解季康子問三子可使從政章曰人固有病然不害其為可用其材固可用然不掩其為有病必大曰范氏之説但舉三子具臣貨殖之病却不言其材之為可用者曰范氏議論多如此説得這一邊便忘却那一邊唐鑑如此處甚多以此見得世間非特十分好人難得只好書亦自難得必大問謝氏三子扵克己獨善雖季氏亦知其有餘之説曰世間固有一種號為好人然不能從政者但謝氏言克己獨善説得太重當云脩己自好可也必大季氏使閔子騫為費宰章或問閔子不仕季氏而由求仕之曰仕扵大夫家為僕家臣不與大夫齒那上等人自是不肯做若論當時侯國皆用世臣自是無官可做不仕扵大夫除是終身不出如曾閔方得燾第八章五説今取謝氏之説伊川范楊尹氏四説大率皆同只略説大綱曰謝氏固好然辭氣亦有不平和䖏榦謝氏説得也麄某所以寫放這裏也是可以警那懦底人若是常常記得這様在心下則可以亷頑立懦不至倒了今倒了底也多義剛伯牛有疾章侯氏曰夫子嘗以徳行稱伯牛矣扵其将亡也宜其重惜之故再歎曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也言非可愈之疾亦不幸短命之意尹氏曰牖牖下也包氏謂有惡疾不欲人知恐其不然也右第九章五説今從尹氏侯氏之説范氏曰冉伯牛盡其道而死故曰命楊氏亦曰不知謹疾則其疾有以致之而至者伯牛無是也故曰命矣夫此説於義理正當但就本文㸔説命矣夫較深聖人本意只是惜其死歎之曰命也若曰無可奈何而安之命爾方将問人之疾情意悽愴何暇問其盡道與否也况下文以為斯人有斯疾則以為不當有此疾也豈有上文稱其盡道而死下文復歎其不當疾而疾文勢亦不相聨屬謝氏同尹氏謹嚴先生曰此説非是更思之榦賢哉回也章問顔子不改其樂莫是樂箇貧否曰顔子私欲克盡故樂却不是専樂箇貧須知他不干貧事元自有箇樂始得時舉伯豐問顔子之樂不是外面别有甚事可樂只顔子平日所學之事是矣見得既分明又無私意扵其間自然而樂是否曰顔子見得既盡行之又順便有樂底滋味㽦問顔子樂䖏恐是工夫做到這地位則私意脱落天理洞然有箇樂䖏否曰未到他地位則如何便能知得他樂䖏且要得就他實下工夫䖏做下梢亦須㑹到他樂時節㝢叔器問顔子樂䖏莫是樂天知命而不以貧窶累其心否曰也不干那樂天知命事這四字也拈不上淳録云又加却樂天知命四字加此四字又壊了這樂顔子胷中自有樂地雖在貧窶之中而不以累其心不是将那不以貧窶累其心底改樂義剛問這樂正如不如樂之者之樂曰那説從樂天知命上去底固不是了這説從不如樂之上来底也不知那樂是樂箇什麽物事樂字只一般但要人識得這須是去做工夫涵養得乆自然見得因言通書數句論樂䖏也好明道曰百官萬務金革百萬之衆曲肱飲水樂亦在其中觀它有扈游山詩是甚麽次第陳安卿云它那昔也未甚有年曰也是有箇見成底樂義剛淳録此下云樂只是恁地樂更不用解只去做工夫到那田地自知道讀一小集見李偲祭明道文謂明道當初欲著樂書而不及因笑曰既是樂何用書説甚問顔子之樂只是天地間至富至貴底道理樂去求之否曰非也此以下未可便知須是窮究萬理要極徹已而曰程子謂将這身来放在萬物中一例㸔大小大快活又謂人於天地間並無窒礙大小大快活此便是顔子樂䖏這道理在天地間須是直窮到底至纎至悉十分透徹無有不盡則與萬物為一無所窒礙胷中泰然豈有不樂淳問顔子不改其樂是私欲既去一心之中渾是天理流行無有止息此乃至富至貴之理舉天下之物無以尚之豈不大有可樂曰周子所謂至富至貴乃是對貧賤而言今引此説恐淺只是私欲未去如口之扵味耳之於聲皆是欲得其欲即是私欲反為所累何足樂若不得其欲只管求之扵心亦不樂惟是私欲既去天理流行動静語黙日用之問無非天理胷中廓然豈不可樂此與貧窶自不相干故不以此而害其樂直卿云與浩然之氣如何曰也是此意但浩然之氣説得較麄又問説樂道便不是是如何曰才説樂道只是冒罩説不曾説得親切又云伊川所謂其字當玩味是如何曰是元有此樂又云見其大則心泰周子何故就見上説曰見便是識此味南升問不改其樂與樂在其中矣二者輕重如何曰不要去孔顔身上問只去自家身上討敬仲以下論孔顔之樂恭父問孔顔之分固不同其所樂䖏莫只一般否曰聖人都忘了身只有箇道理若顔子猶照管在恪行夫問不改其樂曰顔子先自有此樂到貧䖏亦不足以改之曰夫子自言疏食飲水樂在其中其樂只一般否曰雖同此樂然顔子未免有意到聖人則自然賀孫子善謂夫子之樂雖在飯疏食飲水之中而忘其樂顔子不以簞瓢陋巷改其樂是外其簞瓢陋巷曰孔顔之樂大綱相似難就此分淺深唯是顔子止説不改其樂聖人却云樂亦在其中不改字上恐與聖人畧不相似亦只争些子聖人自然是樂顔子僅能不改如云得與不失得是得了若説不失亦只是得但説不失則僅能不失耳終不似得字是得得穏此亦有内外賔主之意或問與不違仁如何曰僅能不違賀孫呈囬也不改其樂與樂在其中矣一段問目先生曰説得雖巧然子細㸔来不須如此分亦得向見張敬夫亦要如此説某謂不必如此所謂樂之深淺乃在不改上面所謂不改便是方能免得改未如聖人從来安然譬之病人方得無病比之從来安樂者便自不同如此㸔其深淺乃好時舉叔器問不改其樂與不能改其樂如何分曰不改其樂者僅能不改其樂而已不能改其樂者是自家有此樂它無奈自家何以此見得聖賢地位某嘗謂明道之言初見便好轉㸔轉好伊川之言初㸔似未甚好乆㸔方好某作六先生贊伯恭云伊川贊尤好盖某是當初見得箇意思恁他所謂布帛之文菽粟之味知徳者希孰識其貴也被伯恭㸔得好又云伯恭敬夫二人使至今不死大段光明義剛聖人之樂且粗言之人之生各具此理但是人不見此理這裏都黒窣窣地如猫子狗兒相似飢便求食困便思睡一得富貴便極聲色之娛窮四體之奉一遇貧賤則憂戚無聊所謂樂者非其所可樂所謂憂者非其所可憂也聖人之心直是表裏精粗無不昭徹方其有所思都是這裏流出所謂徳盛仁熟從心所欲不踰矩莊子所謂人貌而天盖形骸雖是人其實是一塊天理又焉得而不樂又曰聖人便是一片赤骨立底天理顔子早是有箇物包褁了但其皮薄剥去容易聖人一為指出這是天理這是人欲他便洞然都得了䕫孫問顔子樂䖏曰顔子之樂亦如曾㸃之樂但孔子只説顔子是恁地樂曾㸃却説許多樂底事来㸃之樂淺近而易見顔子之樂深㣲而難知㸃只是見得如此顔子是工夫到那裏了從本原上㸔方得賜顔子之樂平淡曾㸃之樂己勞攘了至邵康節云真樂攻心不奈何樂得大段顛蹶或曰顔子之樂只是心有這道理便樂否曰不須如此説且就實䖏做工夫學䝉問自有其樂之自字曰自字對簞瓢陋巷言言簞瓢陋巷非可樂盖自有其樂耳節集注問周子令程子尋顔子所樂何事而周子程子終不言不審先生以為所樂何事曰人之所以不樂者有私意耳克己之私則樂矣節問程子云周茂叔令尋顔子仲尼樂䖏所樂何事竊意孔顔之學固非若世俗之著扵物者但以為孔顔之樂在於樂道則是孔顔與道終為二物要之孔顔之樂只是私意浄盡天意昭融自然無一毫繫累耳曰然但今人説樂道説得来淺了要之説樂道亦無害道夫曰觀周子之問其為學者甚切曰然頃之復曰程子云人能克己則心廣體胖仰不愧俯不怍其樂可知有息則餒矣道夫問濓溪教程子尋孔顔樂䖏盖自有其樂然求之亦甚難曰先賢到樂䖏已自成就向上去了非初學所能求况今之師非濓溪之師所謂友者非二程之友所以説此事却似莽廣不如且就聖賢著實用工䖏求之如克己復禮致謹扵視聽言動之間乆乆自當純熟充逹向上去㝢義剛説程子曰周子每令求顔子樂䖏所樂何事夫天理之流行無一毫間斷無一息停止大而天地之變化小而品彚之消息微而一心之運用廣而六合之彌綸渾融通貫只是這一箇物事顔子博文約禮工夫縝宻從此做去便能尋得箇意脈至扵竭盡其才一旦豁然貫通見得這箇物事分明只在面前其樂自有不能己者曰也不要説得似有一箇物事様道是箇公共底道理不成真箇有一箇物事在那裏被我見得只是這箇道理萬事萬物皆是理但是安頓不能得恰好而今顔子便是向前見不得底今見得向前做不得底今做得所以樂不是説把這一箇物事来恁地快活義剛堯卿問不改其樂注克己復禮改作博文約禮如何曰説博文時和前一段都包得克己復禮便只是約禮事今若是不博文時便要去約也如何約得住義剛問叔器㸔文字如何曰兩日方思量顔子樂䖏先生疾言曰不用思量他只是博我以文約我以禮後見得那天理分明日用間義理純熟後不被那人欲来苦楚自恁地快活你而今只去博文約禮便自見得今却去索之扵杳𡨕無朕之際你去何䖏討将次思量得人成病而今一部論語説得恁分明自不用思量只要着實去用工如前日所説人心道心便只是這兩事只去臨時思量那箇是人心那箇是道心便顔子也只是使得人心聽命於道心後不被人心勝了道心你而今便須是常揀擇教精使道心常常在裏面如箇主人人心如客様常常如此無間斷則便能允執厥中義剛鮮于侁言顔子以道為樂想侁必未識道是箇何物且如此莽莽對故伊川答之如此必大集義問昔鄒道卿論伊川所見極高䖏以謂鮮于侁問於伊川曰顔子不改其樂不知所樂者何事伊川曰尋常道顔子所樂者何事曰不過説顔子所樂者道伊川曰若有道可樂便不是顔子豈非顔子工夫至到道體渾然與之為一顔子之至樂自黙存扵心人見顔子之不改其樂而顔子不自知也曰正謂世之談經者徃徃有前所説之病本卑而抗之使髙本淺而鑿之使深本近而推之使逺本明而必使之至扵晦且如伊尹耕於有莘之野由是以樂堯舜之道未嘗以樂道為淺也直謂顔子為樂道有何不可盖卿或問程先生不取樂道之説恐是以道為樂猶與道為二物否曰不消如此説且説不是樂道是樂箇甚底説他不是又未可為十分不是但只是他語拙説得来頭撞公更添説與道為二物愈不好了而今且只存得這意思須是更子細㸔自理㑹得方得燾去偽録云謂非以道為樂到底所樂只是道非道與我為二物但熟後便樂也問伊川謂使顔子而樂道不足為顔子如何曰樂道之言不失只是説得不精切故如此告之今便以為無道可樂走作了問鄒侍郎聞此謂吾今始識伊川面已入禪去曰大抵多被如此㸔因舉張思叔問子在川上曰便是無窮伊川曰如何一箇無窮便了得他曰無窮之言固是但為渠道出不親切故以為不可可學劉黻問伊川以為若以道為樂不足為顔子又却云顔子所樂者仁而已不知道與仁何辨曰非是樂仁唯仁故能樂爾是他有這仁日用間無些私意故能樂也而今却不要如此論須求他所以能不改其樂者是如何縁能非禮勿視非禮勿聽非禮勿言非禮勿動這四事做得實頭工夫透自然至此問程子謂使顔子以道為樂則非顔子通書顔子章又却似言以道為樂曰顔子之樂非是自家有箇道至富至貴只管把来弄後樂見得這道理後自然樂故曰見其大則心泰心泰則無不足無不足則富貴貧賤䖏之一也節問明道曰簞瓢陋巷非可樂盖自有其樂耳其字當玩味自有深意伊川曰顔子之樂非樂簞瓢陋巷也不以貧窶累其心而改其所樂也故夫子稱其賢又曰天下有至樂惟反身者得之而極天下之欲不與存焉又曰顔子簞瓢非樂也忘也呂氏曰禮樂悦心之至不知貧賤富貴可為吾之憂樂右第十章八説今從明道伊川呂氏之説明道第二説伊川第二第三第七説范氏説皆是推説扵本文未甚宻伊川第四説答鮮于侁曰使顔子以道為樂而樂之則非顔子矣竊意伊川之説謂顔子與道為一矣若以道為可樂則二矣不知然否謝氏曰囘也心不與物交故無所欲不與物交恐説太深㳺氏用伊川説楊氏之説亦穏但無甚緊要發明䖏尹氏謂不以衆人之所憂改其樂不如伊川作不以貧窶累其心而改其所樂盖聖人本意在簞瓢陋巷上見得顔子賢䖏人不堪其憂特輔一句伊川之説乃其本意而尹氏乃取其輔句説顔子賢䖏未甚緊曰所論答鮮于侁語大槩得之而未仔細更就實事上㸔心不與物交非謂太深盖無此理雖大聖人之心亦不能不交物也榦朱子語類卷三十一
