body:
  text: 朱子語類卷三鬼神因説鬼神曰鬼神事自是第二着那箇無形影是難理會底未消去理會且就日用𦂳切處做工夫子曰未能事人焉能事鬼未知生焉知死此説盡了此便是合理㑹底理㑹得将間鬼神自有見處若合理㑹底不理㑹只管去理㑹沒𦂳要底將間都沒理㑹了淳義剛聞同别出義剛將鬼神問目呈畢先生曰此事自是第二着未能事人焉能事鬼此説盡了今且須去理㑹眼前事那箇鬼神事無形無影莫要枉費心力理㑹得那箇來時將乆我著實處皆不曉得所謂詩書執禮皆雅言也這箇皆是面前事做得一件便是一件如易便自難理㑹了而今只據我恁地推測不知是與不是亦須逐一去㸔然到極處不過只是這箇義剛或問鬼神有無曰此豈卒乍可説便説公亦豈能信得及湏於衆理㸔得漸明則此惑自解樊遲問知子曰務民之義敬鬼神而遠之可謂知矣人且理㑹合當理㑹底事其理㑹未得底且推向一邊待日用常行處理㑹得透則鬼神之理將自見得乃所以爲知也未能事人焉能事鬼意亦如此必大天下大底事自有箇大底根本小底事亦自有箇𦂳切處若見得天下亦無甚事如鬼神之事聖賢説得甚分明只將禮熟讀便見二程初不説無鬼神但無如今世俗所謂鬼神耳古來聖人所制祭祀皆是他見得天地之理如此去僞神伸也鬼屈也如風雨雷電初發時神也及至風止雨過雷住電息則鬼也鬼神不過隂陽消長而已亭毒化育風雨晦㝠皆是在人則精是魄魄者鬼之盛也氣是魂魂者神之盛也精氣聚而爲物何物而無鬼神逰魂爲變魂逰則魄之降可知升卿鬼神只是氣屈伸徃來者氣也天地間無非氣人之氣與天地之氣常相接無間斷人自不見人心才動必達於氣便與這屈伸徃來者相感通如卜筮之類皆是心自有此物只説你心上事才動必應也恪問鬼神便只是此氣否曰又是這氣裏面神靈相似燾問先生説鬼神自有界分如何曰如日為神夜為鬼生為神死為鬼豈不是界分義剛叔器問先生前説日爲神夜爲鬼所以鬼夜出如何曰間有然者亦不能皆然夜屬隂且如妖鳥皆隂類皆是夜鳴義剛淳同雨風露雷日月晝夜此鬼神之迹也此是白日公平正直之鬼神若所謂有嘯於梁觸於胸此則所謂不正邪暗或有或無或去或來或聚或散者又有所謂禱之而應祈之而獲此亦所謂鬼神同一理也世間萬事皆此理但精粗小大之不同爾又曰以功用謂之鬼神即此便見道夫鬼神死生之理定不如釋家所云世俗所見然又有其事昭昭不可以理推者此等處且莫要理㑹揚因説神怪事曰人心平鋪著便好若做㺯便有鬼怪出來方理有明未盡處如何得意誠且如鬼神事今是有是無因説張仲隆曾至金沙堤見巨人迹此是如何揚謂册子説并人傳説皆不可信湏是親見揚平昔見册子上并人説得滿頭滿耳只是都不曾目見先生曰只是公不曾見畢竟其理如何南軒亦只是硬不信有時戱説一二如禹鼎鑄魑魅魍魎之屬便是有這物深山大澤是彼所居處人徃占之豈不爲祟邵先生語程先生世間有一般不有不無底人馬程難之謂鞍轡之類何處得如邵意則是亦以爲有之邵又言蜥蜴造雹程言雹有大者彼豈能爲之豫章曾有一劉道人嘗居一山頂結菴一日衆蜥蜴入來如手臂大不怕人人以手撫之盡吃菴中水少頃菴外皆堆成雹明日山下果有雹此則是册子上所載有一妻伯劉丈致中兄其人甚樸實不能妄語云嘗過一嶺稍晚了急行忽聞溪邊林中響甚徃㸔之乃無數蜥蜴在林中各把一物如水晶㸔了去未數里下雹此理又不知如何造化若用此物爲雹則造化亦小矣又南劍鄧徳喻嘗爲一人言嘗至餘杭大滌山中常有龍骨人徃來取之未入山洞見一陣青煙出少頃一陣火出少頃一龍出一鬼隨後大段盡人事見得破方是不然不信中有一㸃疑在終不得又如前生後生死復爲人之説亦須要見得破又云南軒拆廟次第亦未到此湏是使民知信末梢無疑始得不然民倚神爲主拆了轉使民信向怨望舊有一邑泥塑一大佛一方尊信之後被一無狀宗子斷其首民聚哭之頸上泥木出舍利泥木豈有此物只是人心所致先生謂一僧云問龍行雨如何曰不是龍口中吐出只是龍行時便有雨隨之劉禹錫亦嘗言有人在一髙山上見山下雷神龍鬼之類行雨此等之類無限實要見得破問敬鬼神而逺之則亦是言有但當敬而遠之自盡其道便不相闗曰聖人便説只是如此嘗以此問李先生曰此處不湏理㑹先生因曰蜥蜴爲雹亦有如此者非是雹必要此物爲之也揚因論薛士龍家見鬼曰世之信鬼神者皆謂實有在天地間其不信者斷然以爲無鬼然却又有真箇見者鄭景望遂以薛氏所見爲實理不知此特虹霓之類耳必大因問虹霓只是氣還有形質曰既能啜水亦必有腸肚只纔散便無了如雷部神物亦此類必大因説鬼怪曰木之精夔魍魎䕫只一脚魍魉古有此語若果有必是此物淳氣聚則生氣散則死泳以下並在人鬼神兼論精神䰟魄問死生有無之説人多惑之曰不湏如此疑且作無主張因問識環記井之事古復有此何也曰此又别有説話力行問生死鬼神之理明作録云問鬼神生死雖知得是一理然未見得端的曰精氣爲物逰䰟爲變便是生死底道理未達曰精氣一則爲人散則爲鬼又問精氣凝時此理便附在氣上否曰天道流行發育萬物有理而後有氣雖是一時都有畢竟以理爲主人得之以有生明作録云然氣則有清濁氣之清者爲氣濁者爲質明作録云清者属陽濁者属隂知覺運動陽之爲也形體明作録作骨肉皮毛隂之爲也氣曰魂體曰魄髙誘淮南子註曰魂者陽之神魄者隂之神所謂神者以其主乎形氣也人所以生精氣聚也人只有許多氣湏有箇盡時明作録云醫家所謂隂陽不升降是也盡則魂氣歸於天形魄歸於地而死矣人將死時熱氣上出所謂魂升也下體㳺冷所謂魄降也此所以有生必有死有始必有終也夫聚散者氣也若理則只泊在氣上初不是凝結自爲一物但人分上所合當然者便是理不可以聚散言也然人死雖終歸於散然亦未便散盡故祭祀有感格之理先祖世次遠者氣之有無不可知然奉祭祀者既是他子孫畢竟只是一氣所以有感通之理然已散者不復聚釋氏却謂人死爲鬼鬼復爲人如此則天地間常只是許多人來來去去更不由造化生生必無是理至如伯有爲厲伊川謂别是一般道理盖其人氣未當盡而強死自是能爲厲子産爲之立後使有所歸遂不爲厲亦可謂知鬼神之情狀矣問伊川言鬼神造化之迹此豈亦造化之迹乎曰皆是也若論正理則似樹上忽生出花葉此便是造化之迹又如空中忽然有雷霆風雨皆是也但人所常見故不之怪忽聞鬼嘯鬼火之屬則便以爲怪不知此亦造化之迹但不是正理故爲怪異如家語云山之怪曰夔魍魎水之怪曰龍罔象土之怪羵羊皆是氣之雜揉乖戾所生亦非理之所無也専以爲無則不可如冬寒夏熱此理之正也有時忽然夏寒冬熱豈可謂無此理但既非理之常便謂之怪孔子所以不語學者亦未須理㑹也因舉似南軒不信鬼神而言閎祖賜録云問民受天地之中以生中是氣否曰中是理理便是仁義禮智曷嘗有形象來凡無形者謂之理若氣則謂之生也清者是氣濁者是形氣是魂謂之精血是魄謂之質所謂精氣爲物湏是此兩個相交感便能成物㳺䰟爲變則所謂氣至此已盡䰟升於天魄降於地陽者氣也歸於天隂者質也魄則降於地謂之死也知生則便知死只是此理夫子告子路非拒之是先後節次如此因説鬼神造化之迹且如起風做雨震雷花生始便有終也又問人死則魂魄升降日漸散而不復聚矣然人之祀祖先却有所謂來假來享此理如何曰若是誠心感格彼之魂氣未盡散豈不來享又問如周以后稷爲始祖以帝嚳爲所自出之帝子孫相去未遠尚可感格至於成康以後千有餘年豈復有未散者而來享之乎曰夫聚散者氣也若理則只泊在氣上初不是凝結爲一物而爲性也但人分上所合當者便是理氣有聚散理則不可以聚散言也人死氣亦未便散得盡故祭祖先有感格之理若世次乆遠氣之有無不可知然奉祭祀者既是他子孫畢竟只是這一氣相傳下來若能極其誠敬則亦有感通之理釋氏謂人死爲鬼鬼復爲人如此則天地間只是許多人來來去去更不由造化生生都廢却無是理也曰然則羊叔子識環之事非邪曰史傳此等事極多要之不足信便有也不是正理又問世之見鬼神者甚多不審有無如何曰世間人見者極多豈可謂無但非正理耳如伯有爲厲伊川謂别是一理盖其人氣未當盡而強死魂魄無所歸自是如此昔有人在淮上夜行見無數形像似人非人旁午充斥出没於雨水之間乆之纍纍不絶此人明知其鬼不得已躍跳之衝之而過之下却無礙然亦無他詢之此地乃昔人戰塲也彼皆死於非命啣寃抱恨固宜未散又問知鬼神之情狀何縁知得曰伯有爲厲子産爲之立後使有所歸遂不爲厲可謂知鬼神之情狀矣又問伊川言鬼神者造化之迹此豈爲造化之迹乎曰若論正理則庭前樹木數日春風便開花此豈非造化之迹又如雷霆風雨皆是也但人常見故不知怪忽聞鬼呌則以爲怪不知此亦是造化之迹但非理之正耳又問世人多為精怪迷惑如何曰家語曰山之怪曰夔魍魎水之怪曰龍罔象土之怪羵羊皆是氣之雜揉乖亂所生專以爲無則不可如冬寒夏熱春榮秋枯此理之正也忽冬月開一朶花豈可謂無此理但非正耳故謂之怪孔子所以不語學者未須理㑹也坐間或云鄉間有李三者死而爲厲鄉曲凡有祭祀佛事必設此人一分或設黄籙大醮不曾設他一分齋食盡爲所汚後因爲人放爆杖焚其所依之樹自是遂絶曰是他枉死氣未散被爆杖驚散了設醮請天地山川神祗却被小鬼汚却以此見設醮無此理也明作録云如起風做雨震雷閃電花生花結非有神而何自不察耳才見説鬼事便以爲怪世間自有個道理如此不可謂無特非造化之正耳此為得隂陽不正之氣不湏驚惑所以夫子不語怪以其明有此事特不語耳南軒説無便不是餘同才卿問來而伸者爲神徃而屈者爲鬼凡隂陽魂魄人之嘘吸皆然不獨死者爲鬼生者爲神故横渠云神祗者歸之始歸徃者來之終曰此二句正如俗語罵鬼云你是已死我我是未死你楚詞中説終古亦是此義去終古之所之兮今逍遥而來東羌靈魂之欲歸兮何須㬰而忘反用之云既屈之中恐又自有屈伸曰祭祀既得鬼神來格便是就既屈之氣又能伸也僴問魂氣則能既屈而伸若祭祀來格是也若魄既死恐不能復伸矣曰也能伸盖他來則俱來如祭祀報魂報魄求之四方上下便是皆有感格之理用之問遊魂爲變聖愚皆一否曰然僴問天神地祗人鬼地何以曰祗曰祗字只是示字盖天垂三辰以著象如日月星辰是也地亦顯草木山川以示人所以曰地示用之云人之禱天地山川是以我之有感彼之有子孫之祭先祖是以我之有感他之無曰神祗之氣常屈伸而不已人鬼之氣則消散而無餘矣其消散亦有乆速之異人有不伏其死者所以既死而此氣不散爲妖爲怪如人之凶死及僧道既死多不散僧道務養精神所以凝聚不散若聖賢則安於死豈有不散而爲神怪者乎如黄帝堯舜不聞其既死而爲靈怪也嘗見輔漢卿説某人死其氣温温然熏蒸滿室𢾗日不散是他氣盛所以如此劉元城死時風雷轟於正寢雲霧晦㝠少頃辨色而公已端坐逝矣他是甚麽様氣魄用之曰莫是元城忠誠感動天地之氣否曰只是元城之氣自散爾他養得此氣剛大所以散時如此祭義云其氣發揚於上為昭明焄蒿悽愴此百物之精也此數句説盡了人死時其魂氣發揚於上昭明是人死時自有一般光景焄蒿即前所云温温之氣也悽愴是一般肅然之氣令人悽愴如漢武帝時神君來則風肅然是也此皆萬物之精既死而散也僴淳録云問其氣發揚於上何謂也曰人氣本騰上這下面盡則只管騰上去如火之烟這下面薪盡則烟只管騰上去淳云終乆必消了曰然問鬼神便是精神魂魄如何曰然且就這一身㸔自㑹笑語有許多聰明知識這是如何得恁地虚空之中忽然有風有雨忽然有雷有電這是如何得恁地這都是隂陽相感都是鬼神㸔得到這裡見一身只是個軀殻在這裡内外無非天地隂陽之氣所以夜來説道天地之塞吾其體天地之帥吾其性思量來只是一箇道理又云如魚之在水外面水便是肚裡面水鱖魚肚裡水與鯉魚肚裡水只一般仁父問魂魄如何是隂陽曰魂如火魄如水賀孫因言魂魄鬼神之説曰只今生人便自一半是神一半是鬼了但未死以前則神為主已死之後則鬼為主縱横在這裡以屈伸徃來之氣言之則來者為神去者為鬼以人身言之則氣為神而精為鬼然其屈伸徃來也各以漸僴饒録云若以對待言一半是氣一半是精問魂魄曰氣質是實底魂魄是半虚半實底鬼神是虚分數多實分數少底賜問魂魄曰魄是一㸃精氣氣交時便有這神魂是發揚出來底如氣之出入息魄是如水人之視能明聽能聰心能強記底有這魄便有這神不是外面入來魄是精魂是氣魄主静魂主動又曰草木之生自有箇神它自不能生在人則心便是所謂形既生矣神發知矣是也又問生魂死魄曰古人只説三五而盈三五而闕近時人方推得他所以圓闕乃是魄受光處魄未嘗無也人有魄先衰底有魂先衰底如某近來覺重聽多忘是魄先衰又曰一片底便是分做兩片底兩片底便是分做五片底做這萬物四時五行只是從那太極中來太極只是一箇氣迤邐分做兩箇氣裡面動底是陽静底是隂又分做五氣又散為萬物植先儒言口鼻之嘘吸為魂耳目之聰明為魄也只説得大概却更有箇母子這便是坎離水火煖氣便是魂冷氣便是魄魂便是氣之神魄便是精之神㑹思量計度底便是魂㑹記當去底便是魄又曰見於目而明耳而聰者是魄之用老氏云載營魄營是晶熒之義魄是一箇晶光堅凝物事釋氏之地水火風其説云人之死也風火先散則不能為祟盖魂先散而魄尚存只是消磨未盡少間自塌了若地水先散而風火尚遲則能為祟盖魂氣猶存爾又曰無魂則魄不能以自存今人多思慮役役魂都與魄相離了老氏便只要守得相合所謂致虚極守静篤全然守在這裡不得動又曰專氣致柔不是守字却是專字便只是專在此全不放出氣便細若放些子出便粗了隂陽之始交天一生水物生始化曰魄既生魄煖者為魂先有魄而後有魂故魄常為主為幹僴人生初間是先有氣既成形是魄在先形既生矣神發知矣既有形後方有精神知覺子産曰人生始化曰魄既生魄陽曰魂數句説得好淳動者魂也静者魄也動静二字括盡魂魄凡能運用作為皆魂也魄則不能也今人之所以䏻運動都是魂使之爾魂若去魄則不能也今魄之所以䏻運體便死矣月之黑暈便是魄其光者乃日加之光耳他本無光也所以說哉生魄旁死魄荘子曰日火外影金水内影此便是魂魄之說僴有脫誤耳目之聰明為魄魄是鬼某自覺氣盛則魄衰童男童女死而魄去化升卿魄是耳目之精魂是口鼻呼吸之氣眼光落地所謂體魄則降也或問口鼻呼吸者為魂耳目之聰明為魄曰精氣為物魂乃精氣中無形迹底淮南子注云魂者陽之神魄者隂之神釋氏四大之説亦是竊見這意思人之一身皮肉之類皆屬地涕唾之類皆屬水暖氣為火運動為風地水隂也火風陽也或問氣之出入者為魂耳目之聰明為魄然則魄中復有魂魂中復有魄耶曰精氣周流充滿於一身之中噓吸聰明乃其發而易見者耳然既周流充滿於一身之中則鼻之知臭口之知味非魄乎耳目之中皆有暖氣非魂乎推之遍體莫不皆然佛書論四大處似亦粗述此意問先生嘗言體魄自是両物然則魂氣亦為兩物耶曰將魂氣細推之亦有精粗但其為精粗也甚微非若體魄之懸殊耳問以目言之目之輪體也睛之明魄也耳則如何曰竅即體也聰即魄也又問月魄之魄豈只指其光而言之而其輪則體耶曰月不可以體言只有魂魄耳月魄即其全體而光處乃其魂之發也魂屬木魄屬金所以説三魂七魄是金木之數也人之能思慮計畫者魂之為也能記憶辨别者魄之為也僩人有盡記得一生以來履歴事者此是智以藏往否曰此是魄強所以記得多徳明問魂氣升於天莫只是消散其實無物歸於天上否曰也是氣散只是才散便無如火將滅也有烟上只是便散去縁木之性已盡無以繼之人之將死便氣散即是這裡無箇主子一散便死大率人之氣常上且如説話氣都出上去夔孫魂散則魄便自沉了今人説虎死則眼光入地即是如此問人死時是當初禀得許多氣氣盡則無否曰是曰如此則與天地造化不相干曰死生有命當初禀得氣時便定了便是天地造化只有許多氣能保之亦可延且如我與人俱有十分俱已用出二分我才用出二分便収囬及収囬二分時那人已用出四分了所以我便能少延此即老氏作福意老氏惟見此理一向自私其身淳問黄寺丞云氣散而非無泳竊謂人禀得隂陽五行之氣以生到死後其氣雖散只反本還原去曰不須如此説若説無便是索性無了惟其可以感格得來故只説得散要之散也是無了問燈焰衝上漸漸無去要之不可謂之無只是其氣散在此一室之内曰只是他有子孫在便是不可謂之無胡泳問有人死而氣不散者何也曰他是不伏死如自刑自害者皆是未伏死又更聚得這精神安於死者便自無何曾見堯舜做鬼來死而氣散泯然無迹者是其常道理恁地有托生者是偶然聚得氣不散又怎生去湊著那生氣便再生然非其常也伊川云左傳伯有之為厲又别是一理言非死生之常理也人傑録畧伯有為厲之事自是一理謂非生死之常理人死則氣散理之常也它却用物宏取精多族大而強死故其氣未散耳㽦光祖問先生所答崧卿書云云如伊川又云伯有為厲别是一理又如何曰亦自有這般底然亦多是不得其死故強氣未散要之乆之亦不㑹不散如漳州一件公事婦殺夫宻埋之後為祟事旋發覺當時便不為祟此事恐奏裁免死遂於申諸司狀上特批了後婦人斬與婦人通者絞以是知刑獄裡面這般事若不與決罪償命則死者之寃必不觧又曰氣乆必散人説神仙一代説一項漢世説甚安期生至唐以來則不見説了又説鍾離權吕洞賔而今又不見説了㸔得來他也只是飬得分外夀考然終乆亦散了賀孫問伯有之事别是一理如何曰是别是一理人之所以病而終盡則其氣散矣或遭刑或忽然而死者氣猶聚而未散然亦終於一散釋道所以自私其身者便死時亦只是留其身不得終是不甘心死銜寃憤者亦然故其氣皆不散浦城山中有一道人常在山中燒丹後因一日出神乃囑其人云七日不返時可燒我未滿七日其人焚之後其道人歸呌罵取身亦能於壁間寫字但是墨較淡不乆又无揚嘗聞張天覺有一事亦然鄧隠峰一事亦然其人只管討身隠峰云説底是甚麽其人悟謝之而去揚問逰魂為變間有為妖孽者是如何得未散曰逰字是漸漸散若是為妖孽者多是不得其死其氣未散故欝結而成妖孽若是尫羸病死底人這氣消耗盡了方死豈復更欝結成妖孽然不得其死者乆之亦散如今打麪做糊中間自有成小塊核不散底乆之漸漸也自㑹散又如其取精多其用物宏如伯有者亦是卒未散也横渠曰物之初生氣日至而滋息物生既盈氣日反而逰散至之謂神以其伸也反之謂鬼以其歸也天下萬物萬事自古及今只是箇隂陽消息屈伸横渠將屈伸説得貫通上蔡説却似不説得循環意思宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也注謂口鼻噓吸為氣耳目聰明為魄氣屬陽魄屬隂而今有人説眼光落這便是魄降今人將死有云魄落若氣只升而散故云魂氣歸於天形魄歸於地道家修養有這説與此大段相合賀孫萇宏死三年而化為碧此所謂魄也如虎威之類宏以忠死故其氣凝結如此廣鬼神憑依言語乃是依憑人之精神以發問伊川記金山事如何曰乃此婢子想出問今人家多有怪者曰此乃魑魅魍魎之為建州有一士人行遇一人只有一脚問某人家安在與之同行見一脚者入某人家數日其家果死一子可學鄭説有人寤寐間見鬼通刺甚騐者曰如此則是不有不無底紙筆淳論及巫人治鬼而鬼亦效巫人所為以敵之者曰後世人心奸詐之甚感得奸詐之氣做得鬼也奸巧淳厚之問人死為禽獸恐無此理然親見永春人家有子耳上有猪毛及猪皮如何曰此不足怪向見籍溪借事一兵胸前有猪毛睡時作猪鳴此只是禀得猪氣可學或問鬼神曰且類聚前軰説鬼神處㸔要湏自理㑹得且如祭天地祖考直是求之㝠漠然祖考却去人未乆求之似易先生又笑曰如此説又是作怪了也祖道以下論祭祀祖考神示問性即是理不可以聚散言聚而生散而死者氣而已所謂精神魂魄有知有覺者氣也故聚則有散則無若理則亘古今常存不復有聚散消長也曰只是這箇天地隂陽之氣人與萬物皆得之氣聚則為人散則為鬼然其氣雖已散這箇天地隂陽之理生生而不窮祖考之精神魂魄雖已散而子孫之精神魂魄自有些小相屬故祭祀之禮盡其誠敬便可以致得祖考之魂魄這箇自是難説㸔既散後一似都無了能盡其誠敬便有感格亦縁是理常只在這裡也賀孫問鬼神以祭祀而言天地山川之屬分明是一氣流通而兼以理言之人之先祖則大概以理為主而亦兼以氣魄言之若上古聖賢則只是專以理言之否曰有是理必有是氣不可分説都是理都是氣那箇不是理那箇不是氣問上古聖賢所謂氣者只是天地間公共之氣若祖考精神則畢竟是自家精神否曰祖考亦只是此公共之氣此身在天地間便是理與氣凝聚底天子統攝天地負荷天地間事與天地相闗此心便與天地相通不可道他是虚氣與我不相干如諸侯不當祭天地與天地不相闗便不能相通聖賢道在萬世功在萬世今行聖賢之道傳聖賢之心便是負荷這物事此氣便與他相通如釋奠列許多籩豆設許多禮儀不成是無此姑謾為之人家子孫負荷祖宗許多基業此心便與祖考之心相通祭義所謂春禘秋嘗者亦以春陽來則神亦來秋陽退則神亦退故於是時而設祭初間聖人亦只是略為禮以達吾之誠意後來遂加詳宻義剛自天地言之只是一箇氣自一身言之我之氣即祖先之氣亦只是一箇氣所以才感必應周問何故天曰神地曰祗人曰鬼曰此又别氣之清明者為神如日月星辰之類是也此變化不可測祗本示字以有迹之可示山河草木是也比天象又著者至人則死為鬼矣又問既曰徃為鬼何故謂祖考來格曰此以感而言所謂來格亦略有些神底意思以我之精神感彼之精神盖謂此也祭祀之禮全是如此且天子祭天地諸侯祭山川大夫祭五祀皆是自家精神抵當得他過方能感召得他來如諸侯祭天地大夫祭山川便沒意思了雉陳後之問祖宗是天地間一箇統氣因子孫祭享而聚散曰這便是上蔡所謂若要有時便有若要無時便無是皆由乎人矣鬼神是本有底物事祖宗亦只是同此一氣但有箇總腦處子孫這身在此祖宗之氣便在此他是有箇血脉貫通所以神不歆非類民不祀非族只為這氣不相關如天子祭天地諸侯祭山川大夫祭五祀雖不是我祖宗然天子者天下之主諸侯者山川之主大夫者五祀之主我主得他便是他氣又總統在我身上如此便有箇相關處義剛淳同問人之死也不知魂魄便散否曰固是散又問子孫祭祀却有感格者如何曰畢竟子孫是祖先之氣他氣雖散他根却在這裡盡其誠敬則亦能呼召得他氣聚在此如水波様後水非前水後波非前波然却通只是一水波子孫之氣與祖考之氣亦是如此他那箇當下自散了然他根却在這裡根既在此又却能引聚得他那氣在此此事難説只要人自㸔得問下武詩三后在天先生解云在天言其既没而精神上合於天此是如何曰便是又有此理用之云恐只是此理上合於天耳曰既有此理便有此氣或曰想是聖人禀得清明純粹之氣故其死也其氣上合於天曰也是如此這事又㣲妙難説要人自㸔得世間道理有正當易見者又有變化無常不可窺測者如此方㸔得這箇道理活又如云文王陟降在帝左右如今若説文王真箇在上帝之左右真箇有箇上帝如世間所塑之像固不可然聖人如此説便是有此理如周公金縢中乃立壇墠一節分明是對鬼若爾三王是有丕子之責於天以旦代某之身此一段先儒都解錯了只有晁以道説得好他解丕子之責如史傳中責其侍子之責盖云上帝責三王之侍子侍子指武王也上帝責其來服事左右故周公乞代其死云以旦代某之身言三王若有侍子之責於天則不如以我代之我多才多藝能事上帝武王不若我多才多藝不能事鬼神不如且留他在世上定你之子孫與四方之民文意如此伊川却疑周公不應自説多才多藝不是如此他止是要代武王之死爾用之問先生答廖子晦書云氣之已散者既化而無有矣而根於理而日生者則固浩然而無窮也故上蔡謂我之精神即祖考之精神盖謂此也問根於理而日生者浩然而無窮此是説天地氣化之氣否曰此氣只一般周禮所謂天神地示人鬼雖有三様其實只一般若説有子孫底引得他氣來則不成無子孫底他氣便絶無了他血氣雖不流傳他那箇亦自浩然日生無窮如禮書諸侯因國之祭祭其國之無主後者如齊太公封於齊便用祭甚爽鳩氏季萴逢伯陵蒲姑氏之屬盖他先主此國來禮合祭他然聖人制禮惟繼其國者則合祭之非在其國者便不當祭便是理合如此道理合如此便有此氣如晋侯夢康叔云相奪子饗盖晋後都帝丘夏后相亦都帝丘則都其國自合當祭不祭宜其如此又如晋侯夢黄熊入寢門以為鯀之神亦是此類不成説有子孫底方有感格之理便使其無子孫其氣亦未嘗亡也如今祭勾芒他便是逺然既合當祭他便有些池作此氣要之通天地人只是這一氣所以説洋洋乎如在其上如在其左右虚空偪塞無非此理自要人㸔得活難以言曉也所以明道答人鬼神之問云要與賢説無何故聖人却説有要與賢説有賢又來問某討説只説到這裡要人自㸔得孔子曰未能事人焉能事鬼而今且去理㑹𦂳要道理少間㸔得道理通時自然曉得上蔡所説已是煞分曉了僴問鬼神是有兩様天地之間二氣氤氲無非鬼神祭祀交感是以有感有人死為鬼祭祀交感是以有感無曰是所以道天神人鬼神便是氣之伸此是常在底鬼便是氣之屈便是已散了底然以精神去合他又合得在問不交感時常在否曰若不感而常有則是有餒鬼矣又曰先輩説魂魄多不同左傳説魄先魂而有㸔來也是以賦形之初言之必是先有此體象方有陽氣來附他人鬼神以主宰言然以物言不得又不是如今泥塑底神之類只是氣且如祭祀只是你聚精神以感之祖考是你所承流之氣故可以感揚蔡行夫問事鬼神曰古人交神明之道無些子不相接處古人立尸便是接鬼神之意時舉問祭祀之理還是有其誠則有其神無其誠則無其神否曰鬼神之理即是此心之理恪祭祀之感格或求之隂或求之陽各從其類來則俱來然非有一物積於空虚之中以待子孫之求也但主祭祀者既是他一氣之流傳則盡其誠敬感格之時此氣固寓此也僴問子孫祭祀盡其誠意以聚祖考精神不知是合他魂魄只是感格其魂氣曰􅌊蕭祭脂所以報氣灌用欝鬯所以招魂便是合他所謂合鬼與神教之至也又問不知常常恁地只是祭祀時恁地曰但有子孫之氣在則他便在然不是祭祀時如何得他聚人人死雖是魂魄各自飛散要之魄又較定須是招魂來復這魄要他相合復不獨是要他活是安聚他魂魄不教便散了聖人教人子孫常常祭祀也是要去聚得他人問祖考精神既散必須三日齋七日戒求諸陽求諸隂方得他聚然其聚也倐然其聚到得禱祀既畢誠敬既散則又忽然而散曰然子䝉問死者精神既散必須生人祭祀盡誠以聚之方能凝聚若相奪予享事如伊川所謂别是一理否曰他夢如此不知是如何或是他有這念便有這夢也不可知子䝉問死者魂氣既散而立主以主之亦須聚得些子氣在這裡否曰古人自始死弔魂復魄立重設主便是常要接續他些子精神在這裡古者釁龜用牲血便是覺見那龜乆後不靈了又用些子生氣去接續他史記上龜筮傳占春將雞子就上面開卦便也是將生氣去接他便是釁龜之意又曰古人立尸也是將生人生氣去接他子䝉問祭天地山川而用牲幣酒醴者只是表吾心之誠耶抑真有氣來格也曰若道無物來享時自家祭甚底肅然在上令人奉承敬畏是甚物若道真有雲車擁從而來又妄誕淳以下論祭祀神示漢卿問天神地示之義曰注疏謂天氣常伸謂之神地道常黙以示人謂之示人傑地祗者周禮作示字只是示見著見之義地之神只是萬物發生山川出靈之類振説鬼神舉明道有無之説因斷之曰有若是無時古人不如是求七日戒三日齋或求諸陽或求諸隂須是見得有如天子祭天地定是有箇天有箇地諸侯祭境内名山大川定是有箇名山大川大夫祭五祀定是有箇門行戸竈中霤今廟宇有靈底亦是山川之氣㑹聚處乆之被人掘鑿損壊於是不復有靈亦是這些氣過了賀孫問鬼者隂之靈神者陽之靈司命中霤竈與門行人之所用者有動有靜有作有止故亦有隂陽鬼神之理古人所以祀之然否曰有此物便有此鬼神盖莫非隂陽之所為也五祀之神若細分之則户竈屬陽門行屬隂中霤兼統隂陽就一事之中又自有隂陽也壯祖或言鬼神之異曰世間亦有此等事無足怪味道舉以前日魂氣歸天體魄降地人之出入氣即魂也魄即精之鬼故氣曰陽魄曰隂人之死則氣散於空中之説問人死氣散是無蹤影亦無鬼神今人祭祀從何而求之曰如子祭祖先以氣類而求以我之氣感召便是祖先之氣故想饒本作祭之如在此感通之理也味道又問子之於祖先固是如此若祭其他鬼神則如之何有來享之意否曰子之於祖先固有顯然不易之理若祭其他亦祭其所當祭祭如在祭神如神在如天子則祭天是其當祭亦有氣類烏得而不來歆乎諸侯祭社稷故今祭社亦是從氣類而祭烏得而不來歆乎今祭孔子必於學其氣類亦可想長孺因説祭孔子不當以塑像只當用木主曰向日白鹿洞欲塑孔子像於殿某謂不必但置一空殿臨時設席祭之不然只塑孔子坐於地下則可用籩豆簠簋今塑像髙髙在上而設器皿於地甚無義理㦛汪徳輔問祖考精神便是自家精神故齋戒祭祀則祖考來格若祭旁親及子亦是一氣猶可推也至於祭妻及外親則其精神非親之精神矣豈於此但以心感之而不以氣乎曰但所祭者其精神魂魄無不感通盖本從一源中流出初無間隔雖天地山川鬼神亦然也壯祖問人祭祖先是以己之精神去聚彼之精神可以合聚盖為自家精神便是祖考精神故能如此諸侯祭國國之主與自家不相闗然而也呼唤得他聚盖為天地之氣便是他氣底毋就這毋上聚他故亦可以感通曰此謂無主後者祭時乃可以感通若有主後者祭時却也不感通用之曰若理不相闗則聚不得他若理相闗則方可聚得他曰是如此又曰若不是因國也感他不得盖為他元是這國之主自家今主他國土地他無主後合是自家祭他便可感通子䝉問天地山川是有箇物事則祭之其神可致人死氣已散如何致之曰只是一氣如子孫有箇氣在此畢竟是因何有此其所自來盖自厥初生民氣化之祖相傳到此只是此氣問祭先賢先聖如何曰有功徳在人人自當報之古人祀五帝只是如此後世有箇新生底神道縁衆人心邪向它它便盛如狄仁傑只留呉太伯伍子胥廟壊了許多廟其鬼亦不能為害縁是他見得無這物事了因舉上蔡云可者欲人致生之故其鬼神不可者欲人致死之故其鬼不神夔孫賜録畧或問世有廟食之神緜歴數百年又何理也曰浸乆亦能散昔守南康縁乆旱不免遍禱於神忽到一廟但有三間敝屋狼藉之甚彼人言三五十年前其靈如響因有人來而帷中有神與之言者昔之靈如彼今之靈如此亦自可見壯祖風俗尚鬼如新安等處朝夕如在鬼窟某一畨歸鄉里有所謂五通廟最靈怪衆人捧擁謂禍福立見居民纔出門便帶紙片入廟祈祝而後行士人之過者必以名紙稱門生某人謁廟某初還被宗人煎迫令去不往是夜㑹族人徃官司打酒有灰乍飲遂動臟腑終夜次日又偶有一蛇在堦旁衆人閧然以為不謁廟之故某告以臓腑是食物不著闗他甚事莫枉了五通中有某人是向學之人亦來勸徃云亦是從衆某告以從衆何為不意公亦以此語某幸歸此去祖墓甚近若能為禍福請即𦵏某於祖墓之旁甚便又云人做州郡須去淫祠若係勑額者則未可輕去賀孫論鬼神之事謂蜀中灌口二郎廟當初是李冰因開離堆有功立廟今來現許多靈怪乃是他第二兒子出來初間封為王後來徽宗好道謂他是甚麽真君遂改封為真君向張魏公用兵禱於其廟夜夢神語云我向來封為王有血食之奉故威福用得行今號為真君雖尊凡祭我以素食無血食之養故無威福之靈今須復封我為王當有威靈魏公遂乞復其封不知魏公是有此夢還是一時用兵托為此説今逐年人戸賽祭殺數萬來頭羊廟前積骨如山州府亦得此一項税錢利路又有梓潼神極靈今二箇神似乎割據了兩川大抵鬼神用生物祭者皆是假此生氣為靈古人釁鐘釁龜皆此意漢卿云季通説有人射虎見虎後數人隨著乃是為虎傷死之人生氣未散故結成此形先生曰仰山廟極壯大亦是占得山川之秀寺在廟後却幽靜廟基在山邊此山亦小但是來逺到此溪邊上外面羣山皆來朝寺基亦好大抵僧家寺基多是好處徃徃佛法入中國他們自㑹尋討今深山窮谷好處只得做僧寺若人家居必不可因言僧家虚誕向過雪峰見一僧云法堂上一木毬纔施主來做功徳便㑹熱某向他道和尚得恁不脱灑只要戀著這木毬要熱做甚因説路當可向年十嵗道人授以符印父兄知之取而焚之後來又自有漢卿云後來也疎脱先生曰人只了得每日與鬼做頭底是何如此無心得則鬼神服若是此心洞然無些子私累鬼神如何不服賀孫淳同論及請紫姑神吟詩之事曰亦有請得正身出見其家小女子見不知此是何物且如衢州有一箇人事一箇神只録所問事目於紙而封之祠前少間開封而紙中自有答語這箇不知是如何義剛問嘗問紫姑神云云曰是我心中有故應得應不得者是心中亦不知曲折也方問道理有正則有邪有是則有非鬼神之事亦然世間有不正之鬼神謂其無此理則不可曰老子謂以道蒞天下者其鬼不神若是王道修明則此等不正之氣都消鑠了人傑方録云老子云以道治世則其鬼不神此其理行正當事人自不作怪棄常則妖興朱子語類卷三
