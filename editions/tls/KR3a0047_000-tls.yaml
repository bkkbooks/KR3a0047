body:
  text: 朱熹與朱子語類朱熹字元晦生於宋高宗建炎四年一一三年祖籍徽州今安徽歙縣婺源今屬江西人他的父親朱松在福建南劍今南平的尤溪縣做縣尉時他出生在尤溪宋寧宗慶元六年一二年死於建陽朱熹十九歲中進士做過五任地方官二十四歲在泉州同安縣任主簿二十八歲去職自此以後一直到五十歲以前他只擔任過一些有官無職的閒差事五十歲時任知南康軍約兩年五十二歲任提舉兩浙東路常平茶鹽約一年因彈劾唐仲友與宰相王淮不和辭職六十一歲知漳州推行經界清丈田地為當地豪強所阻任職一年多就卸任了六十五歲知潭州半年後被召至朝廷任煥章閣待制兼侍講歷時僅四十天因上疏告韓侂冑被免職還鄉六十七歲又被胡紘沈繼祖彈劾宣揚偽學而落職罷祠因學術思想連掛名的官也丟了七十一歲時在學禁的空氣壓力下去世朱熹一生實際從政的時間並不多正如宋史朱熹傳所概括的熹登第五十年仕於外者僅九考立朝才四十日他的大半生都從事於學術研究和教育工作他任同安縣主簿時就有青年跟隨學習一直到五十歲以前從學的弟子為數不多他五十歲任知南康軍復建白鹿洞書院經常與諸生質疑問難誨誘不倦五十四歲在福建崇安武夷山下建武夷精舍四方士友來者甚眾六十一歲知漳州刊印四經四子書經常到州學訓誘諸生六十五歲知潭州修復嶽麓書院治郡事甚勞夜則與諸生講論隨問而答略無倦色後來回到建陽考亭修建滄州精舍學者益眾以上引文見朱子年譜最多曾達到數百人這時他已安心在此講學終生曾寫滄州歌一首抒懷其中有句云春盡五湖煙浪秋夜一天雲月此外盡悠悠永棄人間事吾道付滄州朱文公文集卷十水調歌頭朱子語類中的問答語錄就是他一生從事教育所保存下來的師生問答的記錄一在中國哲學思想的發展中朱熹首先是作為宋明客觀唯心主義理學集大成的人物著稱的他的哲學思想從宋代末一直到清代晚期為止的七百年中都占有統治地位成為幾個封建王朝的官方哲學朱子語類中相當多的卷數都是直接闡述他的哲學觀點的從世界觀說他認為宇宙的最高存在或本體就是太極整個世界萬物都是太極產生的所以說上天之載無聲無臭而實造化之樞紐品彙之根柢也太極圖說解宇宙的本體就其具有無聲無臭之妙不能為感性認識所把握而言叫做無極就其能產生世界作為天地萬物的根源而言叫做太極太極是無限的永恆的絕對的所以說太極只是個一而無對者語類卷一百太極又是至善的所以說太極祇是個極好至善的道理是天地人物萬善至好的表德語類卷九四太極有動有靜靜即太極之體也動即太極之用也同上一動一靜而兩儀分一變一合而五行具從而人物生生變化無窮矣太極圖說解太極是絕對的本體從而必然產生陰陽天地萬物這是就宇宙的本源說的若就具體事物的構成說則太極與陰陽不可分所以說自現在之事物而觀之則陰陽函太極推其本則太極生陰陽語類卷七五具體事物生成時太極與陰陽相結合而不可分這也就是說天下未有無理之氣亦未有無氣之理語類卷一朱熹認為理與氣不可分似乎是一種二元論但他又說在理氣的關係中究竟是以理為本有是理便有是氣但理是本同上再則照朱熹的看法理為不生不滅語類卷一二六而氣卻是有生有滅並不斷由理產生氣然氣之已散者既化而無有矣其根於理而日生者則固浩然而無窮也朱文公文集卷四五答廖子晦至于理與事的關係他更明確提出未有這事先有這理語類卷九五由此可見朱熹的哲學體系為客觀唯心主義的理一元論還是很清楚的朱熹的另一個重要觀點是理一分殊他說祇是此一個理萬物分之以為體萬物之中又各具一理所謂乾道變化各正性命然總又祇是一個理此理處處皆渾淪語類卷九四這也就是他所說的物物有一太極人人有一太極同上朱熹所謂理一的理與分殊的理之間的關係既不是一般和特殊的關係也不是全體和部分的關係而是一種帶有神秘主義性質的類似大宇宙與小宇宙的關係這種關係他無法運用邏輯分析加以說明而只能借用月印萬川的比喻來描述他說釋氏云一月普現一切水一切水月一月攝這是那釋氏也窺得這些道理語類卷十八實際上朱熹引用玄覺禪師的永嘉證道歌並不僅僅是玄覺也窺得這些道理而是他和程頤吸收了玄覺等的一即一切一切即一的思想作為他的太極說的一個根本觀點從朱熹主張理一分殊和理雖不生不滅而氣有生有滅的這些觀點看過去有些學者將朱熹的理氣學說與亞里士多德所謂形式和質料作類比並不完全恰當朱熹的世界觀的這些基本觀點追溯源流他的太極說來自周敦頤他的理一元論來自二程他又吸收了張載關于氣的某些觀點並將氣表面上列在與理同等地位他編輯近思錄與伊洛淵源錄將周程張邵等並列表明他繼承和綜合了他們的各種觀點組成一個龐大的體系因此在語類中有不少卷數記載他與弟子們討論他們的著作和思想的語錄實際上也是對他自己的哲學觀點的闡述從認識論說他繼承了程頤格物窮理的思想認為言欲致吾之知在即物而窮其理也補大學格物傳他所謂的格物就是指或考之事為之著或察之念慮之微或求之文字之中或索之講論之際大學或問他所謂的窮理就是自其一物之中莫不有以見其所當然而不容已與其所以然而不可易者同上格物窮理的認識過程又可以分為兩個階段第一階段是今日格一物焉明日又格一物焉的漸進階段在這個階段既包括直接接觸事物的格物以事之詳略言理會一件又一件從而獲得感性認識又包括運用邏輯推理的窮理以理之深淺言理會一重又一重因其已知而及其所未知因其所已達而及其所未達從而獲得理性認識第二階段是豁然貫通的頓悟階段至於用力之久而一旦豁然貫通焉則眾物之表裏精粗無不到而吾心之全體大用無不明矣補格物傳到了這個階段就格物說則已格盡事物之理不是只認識部分的理而是認識理的全體他說若是窮得三兩分未便是格物須是窮理得到十分方是格物語類卷十五就致知說則已達到無所不知的知至若只是部分的知片面的知都不是知至他說若知一而不知二知大而不知細知高遠而不知幽深皆非知之至也要須四至八到無所不知乃謂至耳同上這就是格物與致知的統一窮理與盡心的統一格物窮理必須將漸進階段與頓悟階段結合起來才能達到完整的認識根據這個觀點他批判當時兩派不同的思想一派是以呂伯恭為代表只求博觀實際上要求只通過漸進階段窮盡天下的理一派是以陸九淵為代表只務反求實際上要求只通過頓悟階段發明本心這都是片面的他說今人務博者即要盡窮天下之理務約者又謂反身而誠則天下之物無不在我者皆不是語類卷十八他又批評說伯恭失之多因為只務博求多就流於支離子靜失之寡因為只務約求寡就陷入空疏只有他的格物窮理的學說由博返約才是全面的正確的認識途徑語類中保存了從不同角度對這兩派思想方法的批評有助於我們更細緻更深入地了解他的認識論的觀點朱熹的道德觀與他的認識論是密切相連的操存涵養與進學窮理既有區別又相互聯系就二者的區別說他很贊揚程頤的兩句話涵養須用敬進學則在致知因此他提出操存涵養則不可不緊進學致知則不可不寬語類卷九但他認為二者又相互聯繫相互促進所以說涵養中自有窮理工夫窮其所養之理窮理中自有涵養工夫養其所窮之理語類卷九這種相互關係也可以叫做尊德性與道問學的關係在二者相互聯系相互促進的關係中他早年著重將兩者並列而晚年則感到過去對尊德性的重視不夠而肯定應該以尊德性為主所以說尊德性工夫甚簡約且如伊川祇說一個主一之謂敬無適之謂一祇是如此更無別事某向來祇說得尊德性一邊輕了今覺見未是語類卷六四致知與涵養的關係也與知行關係密切相關朱熹在知行關係中是明確主張知先于行行重于知的他說知行常相須如目無足不行足無目不見論先後知為先論輕重行為重語類卷九在這裏他也強調知行相互聯系相互依賴有如目與足的關係一樣所以他也說徒明不行則明無所用空明而已徒行不明則行無所向冥行而已語類卷七三朱熹認為理表現在人身上就叫做性他繼承程頤性即理也的基本思想但他比程頤更明確地將性區分為兩種一即天地之性係專指理言一即氣質之性係以理與氣雜而言之天地之性為天所命所以又叫天命之性天命之性與氣質之性不相分離才有天命便有氣質語類卷四天命之性是善的氣質之性則受氣所累而有不善稟氣之清者為聖為賢稟氣之濁者為愚為不肖人的目的從性方面說就是要變化氣質克服氣質之性帶來的不善因素恢復天命之性的至善從心方面來說未發之前是心的本體也就是天命之性已發之際是心的作用也就是情所以說性者心之理情者性之動心者性情之主語類卷四性是善的情則有善有不善流於不善即受物欲的引誘與蒙蔽本體的心是天理的顯現叫做道心人心可善可不善流於不善即是人欲人的目的從心方面說就是要使人心服從道心存天理而滅人欲朱熹根據他的人性論的根本觀點批評佛老的學說儒家以性為實有主張性即理也而理為不不滅道家之說是半截有半截無佛家之說則是全無儒家以氣聚則生氣散則死順之而已語類卷百二十六而老氏貪生釋氏畏死同上儒家只是存天理更無分毫私見而佛氏之失出於自私之厭老氏之失出於自私之巧同上語類中記錄許多這一類對佛老的批評比他文集中的理論分析更能擊中要害二現在的朱子語類是南宋度宗咸淳六年一二七年黎靖德編輯出版的當南宋理宗景定四年一二六三年時黎靖德根據南宋寧宗嘉定八年一二一五年李道傳編輯的池州刊朱子語錄南宋理宗嘉熙二年一二三八年李性傳編輯的饒州刊朱子語續錄南宋理宗淳祐九年一二四九年蔡抗編輯的饒州刊朱子語後錄三種按記錄人編排為不同卷次的語錄和南宋寧宗嘉定十二年一二一九年黃士毅編輯的眉州刊朱子語類南宋理宗淳祐十二年一二五二年王佖編輯的徽州刊朱子語續類兩種按主題類別編排為不同卷次的語錄綜合起來刪除其文字和記錄人完全重複的條目後乃按黃士毅編輯的朱子語類所用的主題類別加以編排出版了比較完整的景定本朱子語類南宋度宗咸淳元年一二六五年吳堅編輯出版建州刊朱子語別錄黎靖德又將這本朱子語別錄中的一些新條目編入景定本朱子語類中於南宋度宗咸淳六年一二七年出版這就是現在這本朱子語類的初版朱子語類編集了朱熹死後七十年間所保存的語錄在當時雖然是較完備的但仍有一部分重要材料在這期間已經散失了李性傳談到先生又有別錄十卷所譚者炎興以來大事為其多省中語未敢傳而卯火亡之今所存者幸亦一二焉饒州刊朱子語續錄後序蔡抗也提到有一本朱熹親自刪定他與蔡元定的論學記錄翁季錄久未得出以流行於世饒州刊朱子語後錄後序現存朱熹適孫朱鑑所輯集的朱文公易說和文公詩傳遺說中有些條目也是這本語類所未列入的從這些情況以及其他有關材料推測魏了翁所說則公之說至是幾無復遺餘矣眉州刊朱子語類序即使應用到黎靖德所編的這個本子也是不完全切合實際的朱子語類綜合了九十七家所記載的朱熹語錄其中有無名氏四家輔廣所錄的一部分曾經朱熹本人審閱朱子語類後序其他各家則未經朱熹過目雖然如此但這本語類將朱熹許多同一次談話因記錄人不同而留下數條詳略不同的記錄稿都保存下來這樣編輯增加了這些條目的可靠性有助於我們更好地了解朱熹的原意黎靖德編輯這部書時也將每個人記錄的語錄的年代都保存下來自宋孝宗乾道六年一一七年開始到宋寧宗慶元五年一一九九年朱熹逝世前為止歷時共約三十年在九十七家記錄人之中記錄朱熹六十歲以後的語錄多達六十四人因而更詳盡地保存朱熹許多晚年定論這是朱子語類的特點和具有更高參考價值的所在關於朱子語類在研究朱熹思想中的作用當宋嘉定八年一二一五年第一部池州刊朱子語錄出版時就有不同的意見黃榦為該書作序時就曾提到記錄之語未必盡得師傳之本旨池州刊朱子語錄後序事後他又寫信給該書的編輯者李道傳說不可以隨時應答之語易平生著作之書饒州刊朱子語續錄後序引對語錄的出版殊不滿意但李道傳的弟弟李性傳編輯饒州刊朱子語續錄時就引用朱熹本人對編輯程頤語錄必要性的說明加以辯解伊川在何必觀伊川亡則不可以不觀矣蓋亦在乎學者審之而已同上此後各種朱熹語錄陸續出版終於引導黎靖德綜合起來出版這部比較完備的朱子語類清朝初年在研究朱熹思想的過程中關於語錄的地位和作用問題又重新提了出來康熙時李光地等奉旨編纂的朱子全書採用語錄甚多但在凡例中仍說語類一篇係門弟子記錄中間不無訛誤冗複雜而未理對朱熹思想研究比較細緻並編寫朱子年譜的王懋竑也認為其中不可信的部分頗多他說語類中楊方包揚兩錄昔人已言其多可疑而其他錄訛誤亦多即以同聞別出言之大意略同而語全別可知各記其意而多非朱子之本語矣程子遺書朱子已謂其傳誦道說玉石不分況朱子語類十倍於程子後人但欲以增多為美而不復問其何人安可盡信耶王箴聽先考王公府君行狀引白田草堂存稿附錄李穆堂編輯朱子晚年全論時也不採用語錄聲稱善學朱子者毋惑於門人訛誤之詞而細觀其晚年所著述庶不為世俗爛時文破講章所愚也穆堂別稿古訓考只有與王懋竑同時的朱止泉崇奉朱熹思想卻極重視語錄認為記載了朱熹晚年精要的見解即使其中雜有不確之處若善於分析運用就是研究朱熹思想不可忽視的材料他說語類一書晚年精要語甚多五十以前門人未盛錄者僅三四家自南康浙東歸來學者甚眾誨諭極詳凡文詞不能暢達者講說之間滔滔滾滾盡言盡意義理之精微工力之曲折無不暢明厥旨誦讀之下謦咳如生一片肫懇精神洋溢紙上是安可不細心審思而概以門人記錄之不確而忽之耶朱止泉文集答喬星渚從總的方面來說朱止泉這樣評價並不過分特別是語錄中有些晚年的思想糾正他早期著作中某些意見更可看出語錄的價值何況語錄中所涉及的許多問題在他的文集中有敘述簡略甚至完全缺如的語錄的重要性就更明顯具體說來像李性傳所採取的態度還是比較穩妥的故愚謂語錄與四書異者當以書為正而論難往復書所未及者當以語為助與詩易諸書異者在成書之前亦當以書為正而在成書之後者當以語為是學者類而求之斯得之矣饒州刊朱子語續錄後序三朱子語類所談到的內容全部一百四十卷中四書占五十一卷五經占二十九卷哲學專題如理氣知行等專人如周程老釋等以及個人治學方法等約占四十卷歷史政治文學等約占二十卷雖然李性傳所說語錄與四書異者當以書為正似乎語錄對研究朱熹有關四書的見解只具有輔助的作用但有些問題只有通過語錄才能獲得比較完整的認識首先結合語錄和文集我們了解四書集注的成書過程表明他的確曾用平生精力進行工作第一步是收集關於四書的各種注解特別是二程及其門徒的注解反復選擇編成精義要義或集義然後從集義中選出他認為正確的解釋加入集注並在此基礎上發揮他的觀點再作或問來闡述他所以如此注解的理由解答別人可能提出的問題對於四書所涉及的音讀訓詁名物制度仍多採用漢魏人的注疏正如他自已所評述的漢魏諸儒正音讀通訓詁考制度辨名物其功博矣朱文公文集語孟集義序他則著重推敲字句發揮他的哲學觀點李性傳稱贊他的四書集注覃思最久訓釋最精明道傳世無復餘蘊饒州刊朱子語錄後序從成書的過程及朱熹的主觀要求來看是反映了一些客觀事實的從論孟集注的成書看朱熹三十四歲時編寫論語要義和論語訓蒙口義四十三歲時編寫語孟精義刊於建陽四十七歲時他與黃榦談到已編寫論語略解語類卷十九在這些著作的基礎上四十八歲時他完成論孟集注與論孟或問這個初稿本未經他同意曾被刊行這就是他在語錄中所說為鄉人遂不告而刊的初刊本語類卷十九五十一歲時他將論孟精義改寫成論孟要義刊於南康這本書後又改名論孟集義在這個材料的基礎上他修改論孟集注初稿六十一歲時刊於臨漳四子書中六十三歲時編成孟子要略臨漳本論孟集注經修改後約於紹熙四年他六十四歲前又在南康刊出所以六十七歲時曾說南康語孟是後來所定本然比讀之尚有合改定處未及下手朱文公文集卷六十三答孫敬甫看來以後他仍在不斷修改所以六十八歲時他對曾祖道說某所解語孟和訓詁注在下面要人精粗本末字字為咀嚼過此書某自三十歲便下工夫到今改猶未了不是草草看者語類卷一一六大學中庸章句的成書情況也相類似朱熹三十八歲時已寫有大學解初稿四十五歲時曾將大學中庸章句及大學或問稿寄呂祖謙五十六歲時談到大學中庸章句修改甚多五十七歲尚與邵浩談到中庸解尚不擬刊出某為人遲純旋見得旋改一年之內改了數遍語類卷六十二又說大學中庸屢改終未能到無可改處朱文公文集卷五十四答應仁仲六十一歲時他在漳州將大學中庸章句刊出於四子書中又與陳淳談到大學解據某而今自謂穩矣祇恐數年後又見不穩語類卷十四紹熙四年前有人將他的四子書在南康刻出所以他在給劉德脩的信中又說某所為大學論孟說近有為刻本南康者後頗復有所刊正朱文公別集卷一六十五歲後他尚與王過說大學則一面看一面疑未有愜意所以改削不已語類卷十九因而一直到慶元六年臨終前仍在修改誠意章其次由於他集中平生精力編寫四書集注因此他教導學生時要求他們認真學習對於語孟集注六十四歲時他說某語孟集注添一字不得減一字不得公子細看語類卷十九對於中庸章句六十五歲時他說中庸解每番看過不甚有疑語類卷十九對於大學章句六十九歲時他說某于大學用工甚多溫公作通鑑言臣平生精力盡在此書某于大學亦然語類卷十四關於論孟或問四十八歲他寫成後一直未修改六十六歲時他對學生說論語或問不須看因為寫得太支離語類卷一五至於對大學或問則極為重視六十歲後尚說看大學且逐章理會須先讀本文念得次將章句來解本文又將或問來參章句須逐一令記得反覆尋究待他浹洽語類卷十四六十二歲他更具體指出此一書之間要緊祇在格物兩字認得這裏看則許多說自是閒了初看須用這本子認得要害處本子自無可用語類卷十四在語類中關於大學或問的語錄就有兩卷朱熹認為大學一書要緊祇在格物兩字因而在大學或問中系統列舉了格物的九條意義分析程頤以外對格物的各種解釋和缺點的所在在語類中又指出各重解釋的代表人物進一步闡述了格物窮理的意義使我們能結合當時具體歷史背景全面地了解朱熹關於格物窮理的思想最後通過語類我們能更清楚地看到朱熹對四書的評價和在經學中的地位對於四書本身的特點五十九歲後他說中庸一書枝枝相對葉葉相當不知怎生做得一個文字整齊語類卷六十二六十八歲時他談到論語時又說聖人說話磨棱合縫盛水不漏語類卷十九四書與六經相比他認為前者的重要性遠在後者之上他說語孟工夫少得效多六經工夫多得效少語類卷十九六十三歲後有一次他甚至將易經與詩經比做雞肋食之無味棄之可惜易非學者之急務也某平生也費了些精神理會易與詩然其得力則未若語孟之多也易與詩中所得似雞肋焉語類一百四朱熹將四書的地位置於六經之上除語類所記載的這些語錄外也從他所寫的書臨漳所刊四子後一文中得到證實河南程夫子之教人必先使之用力乎大學論語中庸孟子之言然後及乎六經蓋其難易遠近大小之序固如此而不可亂也朱文公文集卷八十二根據這個標準我們看語類中陳淳所記錄的一條說近思錄好看四子六經之階梯近思錄四子之階梯語類卷一百五其中所說以四子為六經的階梯這與朱熹上述意見是一致的但所說近思錄為四子的階梯既不符合這裡所說難易遠近之序的標準也與他人記載的語錄有相互矛盾處例如葉賀孫所記載的朱熹六十二歲後的語錄說或問近思錄曰且熟看大學了即讀語孟近思錄又難看語類卷一百五與朱熹關係更為密切並長期在朱熹身邊的黃榦曾說真文所刻近思小學皆已得之後語亦得拜讀先近思而後四子卻不見朱先生有此語陳安卿所謂近思四子之階梯亦不知何所據而云勉齋集復李公晦書從這些情況看語類中有些記錄材料因記錄人的不同的確間有相互矛盾之處但這並沒有嚴重減低語類的史料價值反之只要在運用時對語錄進行全面比較分析參考其他材料仍舊可以了解朱熹本人的確切見解四四書經朱熹的注解和提倡在元明清時代成為科舉考試的標準教科書逐漸代替了過去考試經義時五經的地位但朱熹也從事五經的整理研究並取得了很大的成就從元明到清初官方的五經注疏即以朱熹的指導思想為主正如清末皮錫瑞所說宋學至朱子而集大成於是朱學行數百年經學歷史頁二八一他的某些見解也對清代的考據具有啟發作用朱子語類對於了解朱熹的經學思想比對於四書來說可能更為重要對於易經朱熹四十八歲時已編寫易本義但晚年對易本義甚不滿意他在六十九歲時他的學生沈僩曾說他這時甚不滿於易本義蓋先生之意祇欲作卜筮用而為先儒說道理太多終是翻這窠臼未盡故不能不致遺恨云語類卷六十七七十歲時他又與人談到易本義說某之謬說本未成書往時為人竊去印賣更加錯誤殊不可讀朱文公別集卷六答楊伯起可見從指導思想說他晚年已不同意他的易本義甚至認為這書殊不可讀對於易經卦爻辭的具體注釋語類也記載許多晚年成熟的思想與易本義有很大的不同例如比彖傳比吉也易本義說此三字疑衍文語類則說也字羨當云比吉語類卷七十又如大壯六五爻辭喪羊於易易本義的解釋是易容易之易言忽然不覺其亡也語類則說喪羊於易不若疆埸之易漢書食貨志疆埸之正作易蓋後面有喪牛於易亦同此義今本義所注祇是從前所說如此祇且仍舊耳語類卷七十二這些改變都是很明顯的又如賁六四爻辭賁如皤如白馬翰如易本義說四與初相賁者乃為九三所隔而不得遂故皤如而其往求之心如飛翰之疾也語類則說白馬翰如言此爻無所賁飾其馬亦白也言無飾之象如此語類卷七十一這條解釋易本義沿漢注疏及程傳的舊說語類則已改變將皤白解釋為無飾即崇素返質之義其他如比九五觀六三噬嗑六二頤六二晉上九等卦的爻詞都是如此由此可見即就許多具體注釋而言研究朱熹關於易經的思想不參看語類是可能得出許多錯誤結論的關於詩集傳通過語類我們知道這也是他多年研究工作的結果他的艱苦的探索精神和謹嚴的治學方法在這項工作中也具體表現出來六十九歲時他對學生沈僩說某舊時看詩數十家之說一一都從頭記得初間那裏便敢判斷那說是那說不是看熟久之方見得這說似是那說似不是語類卷八十同時我們知道在這過程中他對詩經的基本觀點不斷變化他的書稿也幾經修改開始時多沿襲舊說最後終於產生獨立的新解六十歲時他說到這個過程某向作詩解文字初用小序至解不行處亦曲為之說後來覺得不安第二次解者雖存小序間為辨破然終是不見詩人本意後來方知祇盡去小序便自可通於是盡滌舊說詩意方活語類卷八十大約六十五歲時他又談到詩集傳的不同版本詩傳兩本煩為以新本校舊本其不同者依新本改正朱文公續集卷八與葉彥忠書他的詩集傳序是四十八歲時用小序解詩的序朱熹適孫朱鑑在文公詩傳遺說的注解中也指出這一點現存宋本中有不收這篇序文者這正反映了詩集傳數經修改的情況有些通行本將這篇序置於詩集傳之前表明若忽視朱子語類不了解朱熹關於詩說的變化發展情況就可能造成這種錯誤朱熹擺脫小序的束縛後發現國風中的鄭衛之音不是政治諷喻詩而是民間的戀歌這是他對詩經最具有創造性的見解當然他仍舊是站在封建主義的立場這樣說的鄭衛之樂皆為淫聲衛猶為男悅女之辭而鄭皆為女感男之語詩集傳卷四關於詩經孔子也有評論說詩三百一言以蔽之曰思無邪論語為政這樣的解釋本來無法運用到鄭衛的情詩在論語集注中他還從字面上解釋這一句話故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣但在語類中卻又有一個巧妙的解釋說祇是思無邪一句好不是一部詩皆思無邪語類卷八這樣的解釋可以說明一部詩經是包括許多不同的題材表現各種不同的情感與意願的在五經中易與詩是朱熹本人做了注解對於研究朱熹的有關學說語類都有像上面所說那樣顯著的幫助至於書禮春秋等朱熹本人並未編寫完整的注疏語類的作用就更大了對於書經朱熹的弟子黃士毅李相祖等曾記錄編選他的書說可惜現在已散失了在傳世的蔡沈書傳中引用朱熹的說法更多但蔡沈說這書凡引用師說不復識別書經集傳序這樣就更顯得語類對於研究朱熹本人關於書經學說的可貴朱熹對書經的創見是懷疑書小序非孔子作孔安國序與傳非孔安國作特別是指出古文尚書平易與今文尚書的艱澀相對甚為可疑開清代古文尚書辨偽的先聲這在語類中保存有他的具體說明伏生書多艱澀難曉孔安國壁中書卻平易易曉或者謂伏生口授女子故多錯誤此不然今古書傳中所引書語已皆如此不可曉語類卷七八他還認為尚書本來就是一些斷簡殘篇的古代文件不能解釋的字句甚多不要對此附會穿鑿知尚書收拾於殘缺之餘卻必要句句義理相通必至穿鑿不若且看他分明處其他難曉者姑闕之可也語類卷七八表現他實事求是的治學態度尚書經過清代許多學者的整理古文尚書為偽作已成定論今文尚書也有一些可貴的成果但也有新的穿鑿的注疏專治古代史的權威學者王國維尚說詩書為人人誦習之書然於六藝中最難讀以弟之愚闇于書所不能解者殆十之五于詩亦十之一二此非獨弟所不能解也漢魏以來諸大師未嘗不強為之說然其說終不可通以是知先儒亦不能解也觀堂集林卷一與友人論詩書中成語書朱熹的見解與王國維的見解是完全一致的對於禮經他說明儀禮與禮記的關係儀禮禮之根本而禮記乃其枝葉禮記仍秦漢上下諸儒解釋儀禮之書語類卷八四他這樣以儀禮為經禮記為傳還是切合歷史上實際情況的至於重修禮制他也主張因時制宜禮時為大有聖人者作必將因今之禮而裁酌其中取其簡易易曉而可行語類卷八四關於禮經的這些見解朱熹的語類也比他的文集有更具體的發揮至於春秋他反對今文學家以一字定褒貶的說法春秋祇是直載當時之事要見當時治亂興衰非是於一字上定褒貶語類卷八三他也反對古文學家凡例變例的說法春秋傳例多不可信聖人記事安有許多義例同上對於左傳與公羊的優缺點他也有折衷的見解左氏傳是個博記人做祇是以世俗見識斷當他是皆功利之說公穀雖陋亦有是處但皆得於傳聞多訛謬語類卷八三因此他感到春秋經文太略諸說太煩矛盾太多以故未嘗敢輒措一詞於其間但他領導編寫的資治通鑑綱目凡例由其手定卻自附於春秋筆法充分表現他做為道學家的迂腐之處與他上述學術上比較實事求是的見解成為顯明的對照這種情況並非完全不可理解實際上朱熹的整個思想都存在這個矛盾當他以道學家自命宣傳聖賢的道統死守經典的教條積極為封建專制服務時有時顯得迂腐甚至殘酷當他從事教育和學術研究時又必須服從於客觀實際採取實事求是的態度提出不少精到的見解取得許多有價值的成果語類產生於師生相互研究學問之時氣氛比較自由態度比較真切因而常常更能發出一些燦爛的火花朱熹對於文學和史學的貢獻在語類中也有所保存語類有關這方面問題的談話雖然很散漫但卻極廣泛其中片言隻語可能是他多年研究的結論往往擊中要害發人深思現在祇舉兩個例子一個例子是關於文學的他評論陶淵明的詩說淵明詩平淡出於自然後人學他平淡便相去遠矣語類卷一四他又說陶淵明詩人皆說是平淡據某看他自豪放但豪放得來不覺耳其露出本相者是詠荊軻一篇平淡的人如何說得這樣言語出來同上這樣的結論不是深入研究陶詩的人是不可能達到的魯迅也論到陶淵明詩被論客贊賞著採菊東籬下悠然見南山的陶潛先生在後人的心目中實在飄逸得太久了就是詩除論客所佩服的悠然見南山之外也還有精衛銜微木將以填滄海刑天舞干戚猛志固常在之類的金剛怒目式在證明著他並非整天整夜的飄飄然魯迅全集卷六題未定草六朱熹的觀點與魯迅的這個結論完全相同甚至還同樣欣賞陶淵明的詠荊軻由此可見朱熹雖不是以文學家出名但對於文學家陶淵明的了解與做為革命文學家的魯迅達到了同樣的高度而為一般的文人所不及另一個例子是關於史學的他有幾句評論唐史的話唐源流出於夷狄故閨門失禮之事不以為異語類卷百三十六陳寅恪曾評論這條語錄說朱子之語頗為簡要其意未能詳知然即此簡略之語句亦含有種族及文化二問題而此二問題實李唐一代史事關鍵之所在治唐史者不可忽視者也唐代政治史序論稿第一頁陳寅恪的唐代政治史序論稿一書即以朱熹這條語錄做為指導思想進行具體的論述由此可見朱熹也不是以史學家最為人稱道但對於唐史的論斷也與專治唐史的史學家達到同樣的深度從這兩個例證就可以說明朱子語類在研究中國的文學和史學方面也保存有許多尚待深入挖掘的精美的礦石鄧艾民一九八一年六月重刻朱子語類序子朱子平生所著述如小學近思錄四書章句集注詩易傳義諸書固已昭垂前世如日月經天江河行地矣文集語類卷帙浩繁見者往往生畏不能卒業顧文集猶或寓目且尚有傳布至語錄當時三錄二類搜刻非一厥後一百四十卷始編定於黎氏而元明以來重刻者絕少無論購求匪易世士率未之睹或并不知有此書幸而有意於學亦多以門人記錄不能無失而置之薛文清深得朱子之學者也乃謂讀朱子語錄斷不若讀其手筆之書而陳剩夫亦云語類皆門人退錄豈盡得朱子之心是皆以語類尚有差謬恐學者不知抉擇亦可謂慮之深矣是意也原序多詳言之然以此而謂語類遂不可讀則大不然朱子當日不刻程子遺書乎不更刻外書乎夫朱子之學固以程子為宗然竊意其得力所自亦未必不在於遺書外書如此又何疑於語類但朱子所謂主敬立本窮理致知者讀程書之法即讀語類之法是在學者立志何如耳果於朱學深嗜而篤好之既以小學近思錄章句集注傳義諸書熟讀精思而體之於身亦斷未有不求語類者遍參互證益見發揮久之亦將默契乎精微嚴密之旨而明辨乎深淺疑信之間其於朱子之心亦庶乎有以得之蓋語類既無所不有又多門人晚年所聞或經朱子親手刪定其言義理工夫尤為透切明暢意味無窮較之文集間有少壯之作者尚不同陸清獻所謂傳注損益之妙往往見於文集語類手筆之書有得語類而益明者豈不信然乎哉熊愚齋直詆為駁雜汗漶之書則有激之論亦見其或未嘗潛心遜志於斯也是書國朝惟呂氏有刊本然好者既少故書肆罕見近友朋間知好之矣仍難其得且不可以不廣傳也乃屬門下劉昇之東初并文集刻於吾邑而是書先成其間訛字已改與疑字而不敢遽改者別為正訛記疑兩卷附刻於後以俟後之君子所改顯誤更不記司校諸子朝邑楊鳳詔信甫閿鄉韓止敬惺臣華陰王守恭遜卿李蔚坤匪莪大荔扈森仲榮興平馬鑒原養之澄城連春魁梅軒三原靳浩子直曹如壎子伯監刻張怡繩宜堂王守模小泉劉懷璽爾玉宜堂子濬汝深皆三原人例得並書光緒庚辰十二月既望清麓賀瑞麟謹序朱子語類大全語錄池州所刊語錄四十三卷續增張洽錄一卷饒州所刊語續錄四十六卷饒州所刊語後錄二十六卷建甯新刊別錄二十卷新附入語類蜀中所刊語類一百四十卷徽州所刊語續類四十卷池州刊朱子語錄後序晦菴朱先生所與門人問答門人退而私竊記之先生沒其書始出記錄之語未必盡得師傳之本旨而更相傳寫又多失其本真甚或輒自刪改雜亂訛舛幾不可讀李君道傳貫之自蜀來仕於朝博求先生之遺書與之游者亦樂為之搜訪多得記錄者之初本其後出守儀真持庾節於池陽又與潘時舉葉賀孫諸嘗從游於先生之門者互相讎校重複者削之訛謬者正之有別錄者有不必錄者隨其所得為卷帙次第凡三十有三家繼此有得者又將以附於後特以備散失廣其傳耳先生之著書多矣教人求道入德之方備矣師生函丈問往復詰難其辨愈詳其義愈精讀之竦然如侍燕閒承謦欬也歷千載而如會一堂合眾聞而悉歸一己是書之傳豈小補哉貫之既以鋟諸木以榦與聞次輯而俾述其意云嘉定乙亥十月朔旦門人黃榦謹書饒州刊朱子語續錄後序嘉定乙亥歲仲兄文惠公持節江左取所傳朱文公先生語錄鋟木池陽凡三十有三家其書盛行性傳被命造朝益加搜訪由丙戌至今得四十有一家率多初本去其重複正其訛舛第其歲月刻之鄱陽學宮復考池錄所餘多可傳者因取以附其末合池錄與今錄凡先生平生所與學者談經論事之語十得其九嗣有所得尚續刊之池錄之行也文肅黃公直卿既為之序其後書與伯兄乃殊不滿意且謂不可以隨時應答之語易平生著述之書性傳謂記者易差自昔而然河南遺書以李端伯師說為首蓋端伯所記伊川先生嘗稱其最得明道先生之旨故也至論浩氣一條所謂以直養而無害云者伊川乃深不謂然端伯猶爾況於其他直卿之云真是也然嘗聞和靖先生稱伊川之語曰某在何必觀此書而文公先生之言則曰伊川在何必觀伊川亡則不可以不觀矣蓋亦在乎學者審之而已先生家禮成於乾道庚寅通鑑綱目西銘解義成於壬辰太極通書義成於癸巳論孟註問詩集傳成於淳熙丁酉易本義啟蒙成於乙巳丙午之間大學中庸章句或問成書雖久至己酉乃始序而傳之楚辭集註韓文考異成於慶元乙卯禮書雖有綱目脫者僅二十有三篇其著書歲月次第可考也家禮編成而逸既歿而其書出與晚歲之說不合先生蓋未嘗為學者道也語孟中庸大學四書後多更定今大學誠意章蓋未易簀前一夕所改也是四書者覃思最久訓釋最精明道傳世無復遺蘊至其他書蓋未及有所筆削獨見於疑難答問之際多所異同而易書為甚淵所錄一編與本義異者十之三四大率多合先君文昭本傳之說文昭謂乾坤之用主於誠敬坎離之用主於誠明世未有通其義者而先生獨稱之其不執一說惟是之從如此故愚謂語類與四書異者當以書為正而論難往復書所未及者當為助與詩易諸書異者在成書之前亦當以書為正而在成書之後者當以語為是學者類而求之斯得之矣不特此也先生平日論事甚眾規恢其一也至其暮年乃謂言規恢於紹興之間者為正言規恢於乾道以後者為邪非語錄所載後人安得而知之是編也真不為無益而學者不可以不之讀也先生又有別錄十卷所譚者炎興以來大事為其多省中語未敢傳而卯火亡之今所存者幸亦一二焉嘉熙戊戌月正元日後學三嵎李性傳書饒州刊朱子語後錄後序鄱陽所刊先師文公朱先生語錄固欲續池錄所未備然先師之言滿天下二錄所收亦豈能遽盡哉淳祐戊申杭將詣江東鄱陽洪叔魯芹以其外大父吏部楊公方手所錄寒泉語見示既又於安仁湯叔遜次得其家藏包公揚所錄二公在師門為前輩所錄尚未編入則所遺者亦多矣既而東陽王元敬佖亦以所集刊本見寄又得里中朋友所傳一二家乃悉以次編入為二十六卷先師之緒言雖未敢謂無復遺逸然所會粹益富矣獨念先師又有親自刪定與先大父西山講論之語及性與天道之妙名曰翁季錄者久未得出以流行於世豈斯文之顯晦固自有時乎竊尤有感於此故輒併識其拳拳之意云淳祐己酉中秋日門人建安蔡杭書建安刊朱子語別錄後序子朱子語錄行於世尚矣池錄三十有三家鄱本續錄四十有二家其三十四家池本所未有也再見者兩家綠餘凡六家又後錄二十三家其二十家亦池本所未有也再見者三家合三錄為八十七家及門之士固有如謝先生在程門無錄者其有錄可傳者既如此矣堅末學生晚嘉定癸未甲申間侍先君子官長沙帥西山真先生倅宏齋李先生常進之函丈又侍長沙舒先生列岳麓諸生果齋李先生過潭又獲侍講席焉果齋先君子畏友也嘗介以登朱子之門堅由是多見未行語錄手抄盈篋凡六十五家今四十年矣晚得池鄱本參考刊者固已多然黃士毅所錄朱子親筆所改定者已見於輔廣錄中其所自錄及師言則亦三錄所未有若李壯祖張洽郭逍遙所錄亦未有也朅來閩中重加會粹以三錄所餘者二十九家及增入未刊者四家自為別集以附續綠後集之末泰華高矣滄海深矣非有待增益也獨念早所聞於父師者罔敢失墜今幸是錄所已行者如此則其尚有所遺者敢付之一筆刪去哉亦並行之可也抑堅聞之大易居行先以學聚問辯中庸篤行先以學問思辯程子以講明道義論古今人物為格物致知之首則學非問辯不明審矣朱子教人既有成書又不能忘言者為答問發也天地之所以高厚一物之所以然其在成書引而不發者語錄所不可無也凡讀先生成書者兼考乎語錄可也若但涉獵乎語錄而不玩味於成書幾何而不為入耳出口之資為己之學蓋不然也書於篇端以諗同志抑以自警焉咸淳初元嘉平之月後學天台吳堅敬識朱子語類後序黃士毅右語類總成七十家除李侯貫之已刊外增多三十八家或病諸家所記互有重複乃類分而考之蓋有一時之所同聞退各抄錄見有等差則領其意者斯有詳略或能盡得於言而首尾該貫或不能盡得於言而語脈間斷或就其中粗得一二言而止今惟存一家之最詳者而它皆附於下至於一條之內無一字之不同者必抄錄之際嘗相參校不則非其聞而得於傳錄則亦惟存一家而注與某人同爾既以類分遂可繕寫而略為義例以為後先之次第有太極然後有天地有天地然後有人物有人物然後有性命之名而仁義禮智之理則人物所以為性命者也所謂學者求得夫此理而已故以太極天地為始乃及於人物性命之原與夫古學之定序次之以群經所以明此理者也次之以孔孟周程朱子所以傳此理者也乃繼之以斥異端異端所以蔽此理而斥之者任道統之責也然後自我朝及歷代君臣法度人物議論亦略具焉此即理之行於天地設位之後而著於治亂興衰者也凡不可以類分者則雜次之而以作文終焉蓋文以載道理明意達則辭自成文後世理學不明第以文辭為學固有竭終身之力精思巧製以務名家者然其學既非其理不明則其文雖工其意多悖故特次之於後深明夫文為末而理為本也然始焉妄易分類之意惟欲考其重複及今而觀之則夫理一而名殊問同而答異者淺深詳略一目在前互相發明思已過半至於群經則又足以起或問之所未及校本義之所未定補書說之所未成而大學章句所謂高入虛空卑流功利者皆灼然知其所指而不為近似所陷溺矣誠非小補者故嘗謂孔孟之道至周程而復明至朱子而大明自今以後雖斯道未能盛行於世而誦遺書私淑艾者必不乏人不至於千五百年之久絕而不續反復斯編抑自信云又語類成編積百四十卷同志艱於傳錄而眉山史廉叔願鋟於木士毅之類次雖犯不韙而不復固辭者庶幾無傳錄之艱也獨池本陳埴一家惟論仁一條按遺文乃答埴書不當取為類故今不載又輔廣所錄以先生改本校之則去其所改而反存其所勾者合三十餘條今亦惟據改本自首連數至君子所貴乎道者三而注云自此以前皆先生親改亦傳聞之誤當時雜改定者八十餘條耳或有一條析為三四條如竇從周錄所見先生語之類今則復其舊或士毅所傳本多於刊本如黃義剛者悉類入而不去文異者則姑注一二條云一本作某字以上皆與池本異者蓋池本雖黃侯直卿之所次輯然李侯貫之惟據所傳以授直卿而直卿亦據所授以加讎校且有增改於已讎校之後者不與焉故近聞之直卿欲求元本刊改而未能也至於或出於追述故得於傳聞則文辭之間不無差誤凡此之類讀者詳考四書及他記錄而折衷其所疑可也惟學類七卷雖出於臆見而實本先生教人之方後學於此三復而得夫入道之門則能總會是編而體之於身矣己卯九月望日門人莆田黃士毅謹識眉州刊朱子語類序開禧中予始識輔漢卿於都城漢卿從朱文公最久盡得公平生語言文字每過予相與熟復誦味輒移晷弗去予既補外漢卿悉舉以相畀嘉定元年予留成都度周卿請刻本以幸後學予曰予非敢靳也所為弗敢傳者恐以誤後學耳周卿艴然曰奚至是予曰子知今之學者之病乎凡千數百年不得其傳者今諸儒先之講析既精後學之粹類亦廣而閩浙庸蜀之鋟刻者已遍於天下若稍損貲用則立可以充廚牣凡茍有小惠纖能涉其大指則亦能以綴說緝文或以語諸人則亦若稍嘗從事焉者奚必誦先聖書而後為學乎亦取諸此而足矣且張宣公以程子之意類聚孔孟言仁而文公猶恐長學者欲速好徑之心滋入耳出口之弊脫是書之行其無乃非公所云云者乎吾甚懼焉周卿由是姑徐之後數年竟從予乞本刊諸青衣彼不過予所藏十之二三耳然予且謂周卿曰子其以此意著於篇端俾學者毋襲是弊也其後李貴之刊於江東則已十之六七今史廉叔所得黃子洪類本則公之說至是幾無復遺餘矣廉叔將板行以予有志於斯也屬敘所以作予為言嘗以告周卿者廉叔曰然則已諸曰已之無傷雖然安於小成甘於自棄者氣質之偏而無以矯之也而秉彝好德之心誰獨無之予前所憂蓋為世之專事乎耳目口筆茍以譁眾取寵而無志乎遠且大者也儻不忍自薄其身則無寧深體熟玩以為求端用力之模準者乎今未可概以是為疑而閟其傳盍遂以此冠篇而併刻之將聽學者之自擇焉子洪名士毅姑蘇人嘗類文公集百五十卷今藏之策府又類注儀禮未成書云嘉定十三年九月丁亥朔臨卬魏了翁序徽州刊朱子語類後序蔡杭論語一書乃聖門高第所集以記夫子之嘉言善行垂訓後世朱子語類之編其亦傚是意而為之者也或曰語必以類相從豈論語意歟曰學而一篇所記多務本之意里仁七章所記皆為仁之方若八佾之論禮樂鄉黨之記言行公冶長辨人物之賢否微子載聖賢之出處亦何嘗不以類哉天下之理同歸而殊塗一致而百慮非有以會而通之則祇見其異耳大傳曰觸類而長之天下之能事畢矣而伊川之誨學者亦必曰將聖賢言仁處類聚觀之然則語類之集其有功於學者多矣新安舊有紫陽書堂而紫陽之書未備也通守洪君勳教授張君文虎相與謀以蜀本語類刊之越二歲而書成郡侯謝工部坐屬余為跋其梗概予不得辭也因僭為之說曰理有可以類通而非可以類止是其然必有所以然學者因其類以究極朱子之全書使此理融會通貫不梏於一事一物而止則無愧於吾夫子觸類而長之訓也若夫憚煩勞安簡佚以為取足於此則朱子固嘗以是為學者病矣烏乎可抑二君推廣私淑之意亦賢矣哉淳祐壬子六月望日徽州刊朱子語續類後序王佖文公朱先生語類一百三十八卷壺山黃子洪取門人所錄語以類相從也先是池本饒本人各為錄間見錯出讀者病焉子洪既以類流傳便於玩索而微言精語猶有所遺佖每加訪求得所未見自是朋友知舊知其有心於纂輯亦頗互出所有以見示凡三十有餘家既裒以為婺錄而繼之者尚未艾也佖幽居無事蓋嘗潛心而觀之審訂其複重參繹其端緒用子洪已定門目粹為續類凡四十卷或謂前類不為少矣又以續類附益之不已多乎竊謂學固戒於徒博然亦不可以不博而徑約也又況文公先生之道高明廣大致極無遺學者正當盡博約之方而後精微中庸之趣始可漸而求佖每觀諸家所錄以其問有淺深故於教告亦有不同其視文公先生之精蘊不能得其全者尚多有之必也篤信好學反復尋繹能知所盡心焉雖以前續之繁固將無所厭斁不然則雖先生平日已著為定論之書尚有所憚而不肯觀而況於此乎哉然則先生片言半語苟有所傳固不容有所忽而不究其所歸也新安魏史君蓋鶴山先生之嗣也近以紫陽所刊語類為寄因以續類為請而慨然欲併刊之以全書院之傳布其樂於闡明文公先生之遺訓蓋如此遂舉以屬之且竊識於後庶幾乎與願學之士從事於詳說反約之功云爾淳祐壬子上冬朱子語錄姓氏廖德明字子晦南劍人癸巳以後所聞池錄一饒錄四十六輔廣字漢卿慶源人居嘉興甲寅以後所聞池錄二余大雅字正叔上饒人戊戌以後所聞池錄三陳文蔚字才卿上饒人戊申以後所聞池錄四李閎祖字守約邵武人戊申以後所聞池錄五李方子字公晦邵武人戊申以後所聞池錄六葉賀孫字味道括蒼人居永嘉辛亥以後所聞池錄七八九十十一潘時舉字子善天台人癸丑以後所聞池錄十二饒錄四十六董銖字叔重鄱陽人丙辰以後所聞池錄十三饒錄四十六竇從周字文卿丹陽人丙午以後所聞池錄十四金去偽字敬直樂平人乙未所聞池錄十五李季札字季子婺源人丙申乙卯所聞池錄十六萬人傑字正淳興國人庚子以後所聞池錄十七饒錄四十六楊道夫字仲愚建甯人己酉以後所聞池錄十八十九徐宇字居父永嘉人庚戌以後所聞池錄二十廿一饒錄四十六林恪字叔恭天台人癸丑所聞池錄廿二饒錄四十六石洪慶字子餘臨漳人癸丑所聞池錄廿三徐容字仁父永嘉人辛亥所聞池錄廿四甘節字吉父臨川人癸丑以後所聞池錄廿五黃義剛字毅然臨川人癸丑以後所聞池錄廿六廿七饒錄四十六淵字亞夫涪陵人癸丑所聞池錄廿八襲蓋卿字夢錫常寧人甲寅所聞池錄廿九廖謙字益仲衡陽人甲寅所聞池錄三十孫自修字敬父宣城人甲寅所聞池錄三一潘履孫字坦翁婺源人居紹興甲寅所聞池錄三二湯泳字叔永丹陽人乙卯所聞池錄三三林夔孫字子武三山人丁巳以後所聞池錄三四三五陳埴錄已削錢木之字子山晉陵人寓永嘉丁巳所聞池錄三六曾祖道字擇之寧都人丁巳所聞池錄三七沈僩字杜仲永嘉人戊午以後所聞池錄三八三九四十四一郭友仁字德元山陽人寓臨安戊午所聞池錄四二李儒用字仲秉岳陽人己未所聞池錄四三饒錄三十黃榦字直卿三山人饒錄一饒後錄二何鎬字叔京邵武人乙未以前所聞饒錄二程端蒙字正思鄱陽人己亥以後所聞饒錄三周謨字舜弼南康人己亥以後所聞饒錄四五潘柄字謙之三山人癸卯以後所聞饒錄六魏椿字元壽建陽人戊申五夫所聞饒錄七饒後錄二十四吳必大字伯豐興國人戊申己酉所聞饒錄八黃字子耕豫章人戊申所聞饒錄九十楊若海字道夫之子饒錄十一楊驤字子昂道夫族中己酉甲寅所聞饒錄十二陳淳字安卿臨漳人庚戌己未所聞饒錄十三十四童伯羽字蜚卿甌甯人庚戌所聞饒錄十五鄭可學字子上莆田人辛亥所聞饒錄十六滕璘字德粹新安人辛亥所聞饒錄十七王力行字近思同安人辛亥所聞饒錄十八游敬仲字連叔南劍人辛亥所聞饒錄十九不知何氏辛亥同舍共聞饒錄二十黃升卿辛亥所聞饒錄廿一周明作字元興建陽人壬子以後所聞饒錄廿二蔡錄字行夫平陽人壬子所錄饒錄廿三楊與立字子權浦城人道夫從兄壬子同劉龔栗譚見饒錄廿四鄭南升字文相潮州人癸丑所聞饒錄廿五歐陽謙之字晞遜癸丑所聞饒錄廿六游倪字和之建甯人癸丑所聞饒錄廿七楊至字至之泉州人癸丑甲寅所聞饒錄廿八饒後錄二十五潘植字立之癸丑所聞饒錄廿九王過字幼觀鄱陽人甲寅以後所聞饒錄三十董拱壽字仁叔鄱陽人甲寅所聞饒錄三一林學蒙字正卿三山人甲寅以後所聞饒錄三二林賜字聞一乙卯以後所聞饒錄三三胡泳字伯量南康人戊午所聞饒錄三四呂燾字德昭弟煥字德遠南康人己未所聞饒錄三六三七不知何氏己未同舍共錄饒錄三九不知何氏饒錄四十四一四二吳壽昌字大年邵武人丙午同子浩錄饒錄四三楊長孺字伯子廬陵人甲寅記見饒錄四四吳琮字仲方臨川人甲寅記見饒錄四五已上三家非柢本覽者詳之楊方字子直汀州人庚寅所聞饒後錄一間有可疑包揚字顯道建昌人癸卯甲辰乙巳所聞饒後錄三四五六間有疑誤劉炎字潛夫邵武人己酉甲寅以後所聞饒後錄七劉子寰字所父建陽人己未所聞饒後錄八邵浩字叔義金華人丙午所聞饒後錄九劉砥字履之三山人庚戌所聞饒後錄十劉礪字用之三山人己未所聞饒後錄十一李煇字晦父饒後錄十二陳芝字庭秀壬子所聞饒後錄十三黃灝字商伯都昌人饒後錄十四黃卓字先之饒後錄十五汪德輔字長孺鄱陽人壬子所聞饒後錄十六吳振字伯起饒後錄十七吳雉字和中建陽人饒後錄十八鍾震字春伯潭州人甲寅所聞饒後錄十九林子蒙饒後錄二十林學履字安卿永福人己未所錄饒後錄廿一蕭佐字定夫湘鄉人甲寅所聞饒後錄廿二舒高甲寅所聞饒後錄廿三李杞字良仲平江人甲寅所聞饒後錄廿六張洽字元德清江人丁未癸丑所聞附池錄後黃士毅字子洪莆田人蜀類徽續類李壯祖字處謙邵武人蜀類李公謹名文子字公謹邵武人蜀類一之蜀類枅徽續類郭逍遙建別錄十八不知何氏建別錄十九二十朱子遺語之行於世也盛矣蓋本其舊者有三而從以類者二靖德嘗受讀而病其難也昔朱子嘗次程子之書矣著記錄者主名而稍第其所聞歲月且以精擇審取戒後之學者李公道傳之刊池錄也蓋用此法黃公榦既序之矣后乃不滿意蓋亦懼夫讀者之不得其方也二公之心其亦韓子所謂堯舜之利民也大而禹之慮民也深者乎是以黃公不自出其所錄其後李公性傳刊續錄於饒以備池錄之所未蔡公杭刊後錄又益富矣然饒錄最後三家李公嘗附致其疑而其四十二卷元題文說者以靖德考之疑包公揚所錄蓋公之子尚書恢嘗刻公所輯文說一編視此卷雖略而饒後錄所刊包公錄中往往有此卷中語是知此為公所錄亡疑獨所載胡子知言一章謂書為溺心志之大阱者最為疑忌後學使不知者謂為先生語是當削去亡疑而李公不能察也語錄之難讀如此黃公之慮豈為過哉語之從類黃子洪士毅始為之史廉叔公說刻之蜀近歲徽州又刻之王公佖為續類徽州又刻之昔張宣公類洙泗言仁祖程子意也而朱子以滋學者入耳出口之弊疑之魏公了翁援是為學者慮當矣蔡公乃曰論語諸篇記亦以類則議者亦莫能破也然三錄二類凡五書者並行而錯出不相統壹蓋蜀類增多池錄三十餘家饒錄增多蜀類八九家而蜀類續類又有池饒三錄所無者王公謂蜀類作於池饒各為錄之後者蓋失之而今池錄中語尚多蜀類所未收則不可曉已豈池錄嘗再增定邪抑子洪猶有遺邪子洪所定門目頗精詳為力矣廉叔刻之不復讎校故文字甚差脫或至不可讀徽本附以饒錄續類又增前類所未入亦為有功惜其雜亂重複讀者尤以為病而饒後錄新增數家王公或未之見未及收也靖德忘其晚陋輒合五書而參校之因子洪門目以續類附焉饒後錄入焉遺者收之誤者正之考其同異而削其複者一千一百五十餘條越數歲編成可繕寫顧文字浩博猶不敢謂亡舛誤覽者幸哀其劬而正之其或一二字可疑則元錄之訛無別本可訂定固不得輒改也諸公序語列之篇端合而考之黃公謂歷千載而如會一堂合眾聞而悉歸一己所以志學者之幸李公謂語錄與諸書異者當以歲月先後求之亦確論也獨論記者易差而謂李端伯猶爾則不然蓋以至大至剛以直為句者乃伊川之說端伯不誤也讀書之難豈獨語錄朱子嘗言論語後十篇不及前六言六蔽不似聖人法語是孔門所記猶可疑也而況後之書乎讀者誠能服膺乎精擇審取之訓以為讀語類之法而又以滋入耳出口之弊云者為讀語類之戒則庶乎可與共學矣景定癸亥秋八月戊申朔後學導江黎靖德書李公性傳敘饒錄謂先生有別錄多談炎興大事未敢傳而亡於火猶幸存一二頃嘗問諸其家則所云存者亦不存矣甚可惜也因讀蔡公所刻包公錄已四卷其一卷既與元題文說者相出入而他三卷所言大抵多炎興間事疑即李公昔藏而今亡者但略無互見於諸家之所錄則與其子樞密所跋文說謂公所錄多且詳與世所傳大概無異故藏而不出云者不相似樞密又謂公所錄已亡於建安之火不復存而湯氏乃有藏本是皆不能使人亡疑焉者靖德來盱江樞密甫下世恨不及質之也近歲吳公堅在建安又刊別錄二冊蓋收池饒三錄所遺而亦多已見他錄者併參校而附益之粗為定編靖德適行郡事因輒刻之郡齋與學者共之咸淳庚午正月辛亥靖德再書考訂池僥三錄最號精善然猶不免誤字其可知者已輒改某詳則姑仍之覽者擇焉可也黃子洪云池本陳埴錄乃答埴書不當取為錄今觀廖德明錄中猶有答符舜功書一條饒本周謨錄有答謨書數條又程端蒙錄論知言養氣處全寫或問二段徽續類載呂燾錄孟子三條乃全寫集注今皆削諸家所記重複者既以類聚乃易見蓋池錄饒錄有自複出者饒錄有已見池錄者饒後錄有饒錄已見者如揚錄與不知何氏錄重複者甚多蜀類自有複見者徽續類尤多前類所已見者又自有複出者建別錄又多諸書所已見者刪去之餘十存二三耳蜀類與池饒錄文異者從其文義之長蜀類條目精詳然猶有誤入類者徽續類之誤尤多今悉刊正徽類雖翻蜀本已增入饒錄九家然亦有差誤今刊正徽類續類會粹當無遺矣然池錄中猶有十餘條未入饒錄中遺者尤多今增入諸錄中語有可疑者輒削之建別錄第十九卷不知何氏錄中有師字乃趙恭父也二十卷中有礪曰字乃劉用之也此二卷或二人所錄朱子語類門目理氣太極陰陽凡形於法象者二卷鬼神其別有三在天之鬼神陰陽造化是也在人之鬼神人死為鬼是也祭祀之鬼神神示祖考是也三者雖異其所以為鬼神者則同知其異又知其同斯可以語鬼神之道矣故合為一卷性理論性不論氣不備故先總論人物之性而繼以氣稟之性為一卷古人之學必先明夫名義故為學也易而求之不差後世名義不明故為學也難蓋有終身昧焉而不察者又安能反而體之於身哉故以性情心意等之命名者為一卷仁義禮智等之命名者為一卷共三卷學先之以小學為一卷總論為學之方為一卷次論知行為一卷次專論讀書之法為二卷乃致知之一端也次則及夫持守為一卷又次則終以行事為一卷共七卷朱子教人之序如此因敢次第之即大學致知而后誠意正心修身誠意正心修身而后齊家治國平天下之道也從上聖賢相承定法不容變易如近世之逞虛言而不實踐乃學者之罪正原於知之未致非教之失也茍或懲此別立一法後致知而先行事則其始雖若有近效而其終之弊必至廢書而流於異端不然所見不充規模狹隘不過於循默自守而已所謂經綸大經則無矣非理學之用也大學五卷論語三十二卷孟子十一卷中庸三卷易易類悉本卦爻次第上下繫說序雜卦亦本古注分章今從本義惟綱領三卷則略為義例氣數雖並行然有氣而後有數故先陰陽而數始次之物受形於氣數故圖書次之易本圖書而畫故伏羲六十四卦次之而原易之作則本教天下之占故卜筮次之而所以教天下之占者則假奇偶之體以象吉凶故象次之此伏羲之易朱子所謂本義也此則為二卷易始無辭更文王周公孔子而辭始備故三聖易次之越千有餘年至程子而始演易之理邵子而始明易之數又至朱子而始推易之占故繼以三子之易然後總論夫讀易之方與夫卦爻等義可以類推而通者而復終之以人事以明易為人事用也凡後世之言易者其得失略次於後使學者有考焉此則為一卷上經四卷下經二卷上下繫三卷說序雜卦一卷書二卷詩二卷孝經一卷春秋一卷禮八卷樂一卷孔孟周程張邵朱子自孔子及顏曾弟子至孟子繼以周程張子用附為一卷周程所以上繼孔孟也然後分周子之書為一卷程子之書為三卷凡繫入近思者皆依卷次第別為二卷其非入近思者以類而從別為一卷文集附焉張子之書為二卷亦別入近思者邵子之書為一卷程子門人為一卷楊氏尹氏門人為一卷羅氏胡氏門人為一卷朱子自論學工夫為一卷論注書為一卷已上諸經存者不入外任一卷內任一卷論治道一卷論取士一卷論兵刑一卷論民財一卷論官一卷訓門人九卷呂伯恭一卷陳葉一卷陸氏一卷老氏一卷釋氏一卷本朝七卷歷代三卷戰國漢唐諸子一卷雜類一卷作文二卷
