body:
  text: 朱子語類卷第一百二楊氏門人羅仲素羅先生嚴毅清苦殊可畏道夫李先生言羅仲素春秋說不及文定蓋文定才大設張羅落者大文定集有答羅書可見方道夫言羅先生教學者靜坐中看喜怒哀樂未發謂之中未發作何氣象李先生以為此意不惟於進學有力兼亦是養心之要而遺書有云既思則是已發昔嘗疑其與前所舉有礙細思亦甚緊要不可以不考直卿曰此問亦甚切但程先生剖析毫釐體用明白羅先生探索本源洞見道體二者皆有大功於世善觀之則亦並行而不相悖矣況羅先生於靜坐觀之乃其思慮未萌虛靈不昧自有以見其氣象則初未害於未發蘇季明以求字為問則求非思慮不可此伊川所以力辨其差也先生曰公雖是如此分解羅先生說終恐做病如明道亦說靜坐可以為學謝上蔡亦言多著靜不妨此說終是小偏才偏便做病道理自有動時自有靜時學者只是敬以直內義以方外見得世間無處不是道理雖至微至小處亦有道理便以道理處之不可專要去靜處求所以伊川謂只用敬不用靜便說得平也是他經歷多故見得恁地正而不偏若以世之大段紛擾人觀之若會靜得固好若講學則不可有毫髮之偏也如天雄附子冷底人喫得也好如要通天下喫便不可道夫蕭子莊先生問浦城有蕭先生顗受業於龜山之門不知所得如何道夫遂以蕭先生所答范公三書呈先生曰元來是箇天資自好朴實頭底人初非學問之力且如所謂人能弘道君子泰而不驕君子坦蕩蕩三者那人舉得本自不倫他又卻從而贊美之也須思量道如何而能弘如何而能泰與坦蕩蕩卻只恁說教人從何處下手況人能弘道本非此意如他所說卻是士不可以不弘毅執德不弘今卻以人能弘道言之自不干事又如第二書言士之所志舍仁義而何為哉惟仁必欲熟義必欲精仁熟則造次顛沛有所不違義精則利用安身而德崇矣此數句說得儘好但仁固欲熟義固欲精也須道如何而能精如何而能熟卻只隨他在後面說不知前面畢竟是如何又如舉孟子不動心養氣之說皆是汎說惟其如此故人亦謂伊川也只恁地所以豪傑之士皆傲睨不服又曰據公所見若有人問自家仁必欲熟義必欲精兩句如何地答這便是格物致知道夫曰莫是克去己私以明天理則仁自然熟義自然精曰此正程先生所謂涵養必以敬進學在致知之意也道夫廖用中或問為善為利處因舉龜山答廖用中書云龜山說得鶻突用中認得不子細後來於利害便不能分別紹興間秦老當國方主和議廖有召命自無所見卻去扣其平日所友善之人鄭邦達邦達初不經意但言和亦是好事廖到闕即助和議遂為中丞幸而不肯為秦鷹犬秦嘗諷其論趙丞相不從遷工部尚書迄以此去儒用龜山與廖尚書說義利事廖云義利即是天理人欲龜山曰只怕賢錯認以利為義也後來被召主和議果如龜山說廖初舉鄭厚與某人可見其賢此二人二人皆要上恐脫不字主和議及廖被召卻不問此二人卻去與葉孝先商量更輔之以及為中丞又薦鄭轂然廖終與秦不合而出但初不能別義利之分亦是平時講之不熟也鄭博士某舊及見之年七十餘云嘗見上蔡先人甚敬之賀孫因言廖用中議和事云廖用中固非詭隨者但見道理不曾分曉當時龜山已嘗有語云恐子以利為義者政為是也壽昌胡德輝因說胡珵德輝所著文字問德輝何如人曰先友也晉陵人曾從龜山游故所記多龜山說話能詩文墨隸皆精好嘗見先人館中唱和一卷唯胡詩特佳趙忠簡公當國與張嵲巨山同為史官及趙公去位張魏公獨相以為元祐未必全是熙豐未必全非遂擢何掄仲李似表二人為史官胡張所修史皆標出欲改之胡張遂求去及忠簡再入相遂去何李依舊用胡張為史官成書奏上弄得都成私意儒用尹氏門人王德修先生云嚮日鄉間一親戚虞氏見仙里王德修見教云學者要識一愧字與恥字此言卻極好大雅一日侍坐學者問難紛然王德修曰不必多問但去行取且如人理會惟精惟一允執厥中只管說如此是精如此是一臨了中卻不見先生曰精一則中矣文蔚
