body:
  text: 朱子語類卷第六十六易二綱領上之下卜筮易本為卜筮而作古人淳質初無文義故畫卦爻以開物成務故曰夫易何為而作也夫易開物成務冒天下之道如斯而已此易之大意如此謨古人淳質遇事無許多商量既欲如此又欲如彼無所適從故作易示人以卜筮之事故能通志定業斷疑所謂開物成務者也人傑上古民淳未有如今士人識理義嶢崎蠢然而已事事都曉不得聖人因做易教他占吉則為凶則否所謂通天下之志定天下之業斷天下之疑者即此也及後來理義明有事則便斷以理義如舜傳禹曰朕志先定鬼神其必依龜筮必協從已自吉了更不用重去卜吉也周公營都意主在洛矣所卜澗水東瀍水西只是對洛而言其他事惟盡人謀未可曉處方卜故遷國立君大事則卜洪範謀及乃心謀及卿士盡人謀然後卜筮以審之淳且如易之作本只是為卜筮如極數知來之謂占莫大乎蓍龜是興神物以前民用動則觀其變而玩其占等語皆見得是占筮之意蓋古人淳質不似後世人心機巧事事理會得古人遇一事理會不下便須去占占得乾時元亨便是大亨利貞便是利在於正古人便守此占知其大亨卻守其正以俟之只此便是開物成務若不如此何緣見得開物成務底道理即此是易之用人人皆決於此便是聖人家至戶到以教之也若似後人事事理會得亦不待占蓋元亨是示其所以為卦之意利貞便因以為戒耳又曰聖人恐人一向只把做占筮看便以義理說出來元亨利貞在文王之辭只作二事止是大亨以正至孔子方分作四件然若是坤元亨利牝馬之貞不成把利字絕句後云主利卻當如此絕句至於他卦卻只作大亨以正後人須要把乾坤說大於他卦畢竟在占法卻只是大亨以正而已問易以卜筮設教卜筮非日用如何設教曰古人未知此理時事事皆卜筮故可以設教後來知此者眾必大事方卜可學魏丙材仲問元亨利貞曰夫易開物成務冒天下之道蓋上古之時民淳俗樸風氣未開於天下事全未知識故聖人立龜以與之卜作易以與之筮使之趨利避害以成天下之事故曰開物成務然伏羲之卦又也難理會故文王從而為之辭於其間無非教人之意如曰元亨利貞則雖大亨然亦利於正如不貞雖有大亨之卦亦不可用如曰潛龍勿用則陽氣在下故教人以勿用童蒙則又教人以須是如童蒙而求資益於人方吉凡言吉則不如是便有箇凶在那裏凡言不好則莫如是然後有箇好在那裏他只是不曾說出耳物只是人物務只是事務冒只是罩得天下許多道理在裏自今觀之也是如何出得他箇道夫易本卜筮之書後人以為止於卜筮至王弼用老莊解後人便只以為理而不以為卜筮亦非想當初伏羲畫卦之時只是陽為吉陰為凶無文字某不敢說竊意如此後文王見其不可曉故為之作彖辭或占得爻處不可曉故周公為之作爻辭又不可曉故孔子為之作十翼皆解當初之意今人不看卦爻而看繫辭是猶不看刑統而看刑統之序例也安能曉今人須以卜筮之書看之方得不然不可看易嘗見艾軒與南軒爭而南軒不然其說南軒亦不曉節八卦之畫本為占筮方伏羲畫卦時止有奇偶之畫何嘗有許多說話文王重卦作繇辭周公作爻辭亦只是為占筮設到孔子方始說從義理去如乾元亨利貞坤元亨利牝馬之貞與後面元亨利貞只一般元亨謂大亨也利貞謂利於正也占得此卦者則大亨而利於正耳至孔子乃將乾坤分作四德說此亦自是孔子意思伊川云元亨利貞在乾坤為四德在他卦只作兩事不知別有何證據故學易者須將易各自看伏羲易自作伏羲易看是時未有一辭也文王易自作文王易周公易自作周公易孔子易自作孔子易看必欲牽合作一意看不得今學者諱言易本為占筮作須要說做為義理作若果為義理作時何不直述一件文字如中庸大學之書言義理以曉人須得畫八卦則甚周官唯太卜掌三易之法而司徒司樂師氏保氏諸子之教國子庶民只是教以詩書教以禮樂未嘗以易為教也廣或問易解伊川之外誰說可取曰如易某便說道聖人只是為卜筮而作不解有許多說話但是此說難向人道人不肯信向來諸公力來與某辨某煞費氣力與他分析而今思之只好不說只做放那裏信也得不信也得無許多氣力分疏且聖人要說理何不就理上直剖判說何故恁地回互假托教人不可曉又何不別作一書何故要假卜筮來說又何故說許多吉凶悔吝此只是理會卜筮後因其中有些子理故從而推明之所以大象中只是一句兩句子解了但有文言與繫辭中數段說得較詳然也只是取可解底來解如不可曉底也不曾說而今人只是眼孔小見他說得恁地便道有那至理只管要去推求且孔子當時教人只說詩書執禮只說學詩乎與興於詩立於禮成於樂只說人而不為周南召南詩三百一言以蔽之曰思無邪元不曾教人去讀易但有一處說假我數年五十以學易可以無大過矣這也只是孔子自恁地說不會將這箇去教人如周公做一部周禮可謂纖悉畢備而周易卻只掌於太卜之官卻不似大司樂教成均之屬樣恁地重緣這箇只是理會卜筮大概只是說箇陰陽因陰陽之消長卻有些子理在其中伏羲當時偶然見得一便是陽二便是陰從而畫放那裏當時人一也不識二也不識陰也不識陽也不識伏羲便與他剔開這一機然才有箇一二後來便生出許多象數來恁地時節他也自遏他不住然當初也只是理會罔罟等事也不曾有許多嶢崎如後世經世書之類而今人便要說伏羲如神明樣無所不曉伏羲也自純樸也不曾去理會許多事來自他當時剔開這一箇機後世間生得許多事來他也自不奈何他也自不要得恁地但而今所以難理會時蓋緣亡了那卜筮之法如周禮太卜掌三易之法連山歸藏周易便是別有理會周易之法而今卻只有上下經兩篇皆不見許多法了所以難理會今人卻道聖人言理而其中因有卜筮之說他說理後說從那卜筮上來做什麼若有人來與某辨某只是不答次日義剛問先生昨言易只是為卜筮而作其說已自甚明白然先生於先天後天無極太極之說卻留意甚切不知如何曰卜筮之書如火珠林之類淳錄云公謂卜筮之書便如今火珠林樣許多道理依舊在其間但是因他作這卜筮後卻去推出許多道理來他當初做時卻只是為卜筮畫在那裏不是曉盡許多道理後方始畫這箇道理難說向來張安國兒子來問某與說云要曉時便只似靈棋課模樣有一朋友言恐只是以其人未能曉而告之以此說某云是誠實恁地說良久曰通其變遂成天下之文極其數遂定天下之象安卿問先天圖有自然之象數伏羲當初亦知其然否曰也不見得如何但圓圖是有些子造作模樣如方圖只是據見在底畫淳錄云較自然圓圖便是就這中間拗做兩截淳錄云圓圖作兩段來拗曲恁地轉來底是奇恁地轉去底是耦便有些不甚依他當初畫底然伏羲當初也只見太極下面有陰陽便知是一生二二又生四四又生八恁地推將去做成這物事淳錄云不覺成來卻如此齊整想見伏羲做得這箇成時也大故地喜歡目前不曾見箇物事恁地齊整因言夜來有一說說不曾盡通書言聖人之精畫卦以示聖人之蘊因卦以發精是聖人本意蘊是偏旁帶來道理如春秋聖人本意只是載那事要見世變禮樂征伐自諸侯出臣弒其君子弒其父如此而已就那事上見得是非美惡曲折便是因以發底如易有太極是生兩儀兩儀生四象四象生八卦這四象生八卦以上便是聖人本意底如彖辭文言繫辭皆是因而發底不可一例看今人只把做占去看便活若是的定把卦爻來作理看恐死了國初講筵講飛龍在天利見大人太祖遽云此書豈可令凡民見之某便道是解易者錯了這大人便是飛龍言人若占得此爻便利於見那大人謂如人臣占得此爻則利於見君而為吉也如那見龍在田利見大人有德者亦謂之大人言人若尋師若要見好人時淳錄作求師親賢占得此爻則吉然而此兩箇利見大人皆言君德也者亦是說有君德而居下者今卻說九二居下位而無應又如何這箇無頭無面又如何見得應與不應如何恁地硬說得若是把做占看時士農工商事事人用得這般人占得便把做這般用那般人占得便把做那般用若似而今說時便只是秀才用得別人都用不得了而今人便說道解明理事來便看道理如何後作區處古時人蠢蠢然事事都不曉做得是也不知做得不是也不知聖人便作易教人去占占得恁地便吉恁地便凶所謂通天下之志定天下之業斷天下之疑者即此是也而今若把作占說時吉凶悔吝便在我看我把作甚麼用皆用得今若把作文字解便是硬裝了安卿問如何恁地曰而今把作理說時吉凶悔吝皆斷定在九二六四等身上矣淳錄云彼九二六四無頭無面何以見得如此亦只是在人用得也如此則吉凶悔吝是硬裝了便只作得一般用了林擇之云伊川易說得理也太多曰伊川求之太深嘗說三百八十四爻不可只作三百八十四爻解其說也好而今似他解時依舊只作得三百八十四般用安卿問彖象莫也是因爻而推其理否曰彖象文言繫辭皆是因而推明其理叔器問吉凶是取定於揲蓍否曰是然則洪範龜從筮從又要卿士庶民從如何曰決大事也不敢不恁地競謹如遷國立君之類不可不恁地若是其他小事則亦取必於卜筮而已然而聖人見得那道理定後常不要卜且如舜所謂胼志先定詢謀僉同鬼神其依龜筮協從若恁地便是自家所見已決而卜亦不過如此故曰卜不習吉且如周公卜宅云我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食瀍澗只在洛之旁這便見得是周公先自要都洛後但夾將瀍澗來卜所以每與洛對說而兩卜所以皆言惟洛食以此見得也是人謀先定後方以卜來決之擇之言筮短龜長不如從長看來龜又較靈曰揲蓍用手又不似鑽龜較自然只是將火一鑽便自成文卻就這上面推測叔器問龜卜之法如何曰今無所傳看來只似而今五兆卦此間人有五兆卦將五莖茅自竹筒中寫出來直向上底為木橫底為土向下底為水斜向外者為火斜向內者為金便如文帝兆得大橫橫土也所以道予為天王夏啟以光蓋是得土之象義剛淳錄略易所以難讀者蓋易本是卜筮之書今卻要就卜筮中推出講學之道故成兩節工夫賀孫易乃是卜筮之書古者則藏於太史太卜以占吉凶亦未有許多說話及孔子始取而敷繹為文言雜卦彖象之類乃說出道理來學履易只是箇卜筮之書孔子卻就這上依傍說些道理教人雖孔子也只得隨他那物事說不敢別生說僩易為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦略舉一端以見凡例而已易本為卜筮作古人質朴作事須卜之鬼神孔子恐義理一向沒卜筮中故明其義至如曰義無咎也義弗乘也只是一箇義方民可使由之不可使知之上古聖人不是著此垂教只是見得天地陰陽變化之理畫而為卦使因卜筮而知所修為避忌至周公孔子一人又說多了一人某不敢教人看易為這物闊大且不切己兼其間用字與今人皆不同如說田獵祭祀侵伐疾病皆是古人有此事去卜筮故爻中出此今無此事了都曉不得礪看繫辭須先看易自大衍之數以下皆是說卜筮若不是說卜筮卻是說一無底物今人誠不知易可學云今人只見說易為卜筮作便群起而爭之不知聖人乃是因此立教曰聖人丁寧曲折極備因舉大畜九三良馬逐讀易當如筮相似上達鬼神下達人道所謂冒天下之道只如此說出模樣不及作為而天下之道不能出其中可學云今人皆執畫前易皆一向亂說曰畫前易亦分明居則玩其占有不待占而占自顯者可學易書本原於卜筮又說邵子之學只把元會運世四字貫盡天地萬物友仁易本是卜筮之書若人卜得一爻便要人玩此一爻之義如利貞之類只是正者便利不正者便不利不曾說道利不貞者人若能見得道理已十分分明則亦不須更卜如舜之命禹曰官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉其猶將也言雖未卜而吾志已是先定詢謀已是僉同鬼神亦必將依之龜筮亦必須協從之所以謂卜不習吉者蓋習重也這箇道理已是斷然見得如此必是吉了便自不用卜若卜則是重矣時舉劉用之問坤卦直方大不習無不利曰坤是純陰卦諸爻皆不中正五雖中亦以陰居陽惟六二居中得正為坤之最盛者故以象言之則有三者之德而不習無不利占者得之有是德則吉易自有一箇本意直從中間過都不著兩邊須要認得這些子分曉方始橫三豎四說得今人不曾識得他本意便要橫三豎四說都無歸著文蔚曰易本意只是為占筮曰便是如此易當來只是為占筮而作文言彖象卻是推說做義理上去觀乾坤二卦便可見孔子曰聖人設卦觀象繫辭焉而明吉凶若不是占筮如何說明吉凶且如需九三需于泥致寇至以其逼近坎險有致寇之象象曰需于泥災在外也自我致寇敬慎不敗也孔子雖說推明義理這般所在又變例推明占筮之意需于泥災在外占得此象雖若不吉然能敬慎則不敗又能堅忍以需待處之得其道所以不凶或失其剛健之德又無堅忍之志則不能不敗矣文蔚曰常愛先生易本義云伏羲不過驗陰陽消息兩端而已只是一陰一陽便分吉凶了只管就上加去成八卦以至六十四卦無非是驗這兩端消息曰易不離陰陽千變萬化只是這兩箇莊子云易道陰陽他亦自看得文蔚僩錄詳用之問坤六二直方大不習無不利學須用習然後至於不習曰不是如此聖人作易只是說卦爻中有此象而已如坤六二直方大不習無不利自是他這一爻中有此象人若占得便應此事有此用也未說到學者須習至於不習在學者之事固當如此然聖人作易未有此意在用之曰然不習無不利此成德之事也曰亦非也未說到成德之事只是卦爻中有此象而已若占得便應此象都未說成德之事也某之說易所以與先儒世儒之說皆不同正在於此學者須曉某之正意然後方可推說其他道理某之意思極直只是一條路徑去若才惹著今人便說差錯了便非易之本意矣池錄云如過劍門相似須是驀直攛過脫得劍門了卻以之推說易之道理橫說豎說都不妨若纔挨近兩邊觸動那劍便是攛不過便非易之本意矣才卿云先生解易之本意只是為卜筮爾曰然據某解一部易只是作卜筮之書今人說得來太精了更入麤不得如某之說雖麤然卻入得精精義皆在其中若曉得某一人說則曉得伏羲文王之易本是作如此用元未有許多道理在方不失易之本意今未曉得聖人作易之本意便先要說道理縱饒說得好池錄云只是無情理只是與易元不相干聖人分明說昔者聖人之作易觀象設卦繫辭焉以明吉凶幾多分曉某所以說易只是卜筮書者此類可見易只是說箇卦象以明吉凶而已更無他說如乾有乾之象坤有坤之象人占得此卦者則有此用以斷吉凶那裏說許多道理今人讀易當分為三等伏羲自是伏羲之易文王自是文王之易孔子自是孔子之易讀伏羲之易如未有許多彖象文言說話方見得易之本意只是要作卜筮用如伏羲畫八卦那裏有許多文字言語只是說八箇卦有某象乾有乾之象而已其大要不出於陰陽剛柔吉凶消長之理然亦嘗說破只是使人知卜得此卦如此者吉彼卦如此者凶今人未曾明得乾坤之象便先說乾坤之理所以說得都無情理及文王周公分為六十四卦添入乾元亨利貞坤元亨利牝馬之貞早不是伏羲之意已是文王周公自說他一般道理了然猶是就人占處說如卜得乾卦則大亨而利於正耳及孔子繫易作彖象文言則以元亨利貞為乾之四德又非文王之易矣到得孔子盡是說道理然猶就卜筮上發出許多道理欲人曉得所以凶所以吉卦爻好則吉卦爻不好則凶若卦爻大好而己德相當則吉卦爻雖吉而己德不足以勝之則雖吉亦凶卦爻雖凶而己德足以勝之則雖凶猶吉反覆都就占筮上發明誨人底道理如云需于泥致寇至此卦爻本自不好而象卻曰自我致寇敬慎不敗也蓋卦爻雖不好而占之者能敬慎畏防則亦不至於敗蓋需者待也需有可待之時故得以就需之時思患預防而不至於敗也此則聖人就占處發明誨人之理也又曰文王之心已自不如伏羲寬闊急要說出來孔子之心不如文王之心寬大又急要說出道理來所以本意浸失都不顧元初聖人畫卦之意只認各人自說一副當道理及至伊川又自說他一樣微似孔子之易而又甚焉故其說易自伏羲至伊川自成四樣某所以不敢從而原易之所以作而為之說為此也用之云聖人作易只是明箇陰陽剛柔吉凶消長之理而已曰雖是如此然伏羲作易只畫八卦如此也何嘗明說陰陽剛柔吉凶之理然其中則具此道理想得箇古人教人也不甚說只是說箇方法如此使人依而行之如此則吉如此則凶如此則善如此則惡未有許多言語又如舜命夔教冑子亦只是說箇寬而栗柔而立之法教人不失其中和之德而已初未有許多道理所謂民可使由之不可使知之亦只要你不失其正而已不必苦要你知也又曰某此說據某所見且如此說不知後人以為如何因笑曰東坡注易畢謂人曰自有易以來未有此書也僩蜀錄析為三池錄文差略易中言占者有其德則其占如是言無其德而得是占者卻是反說如南蒯得黃裳元吉疑吉矣而蒯果敗者蓋卦辭明言黃裳則元吉無黃裳之德則不吉也又如適所說直方大不習無不利占者有直方大之德則不習而無不利占者無此德即雖習而不利也如奢侈之人而得共儉則吉之占明不共儉者是占為不吉也他皆放此如此看自然意思活銖論易云其他經先因其事方有其文如書言堯舜禹湯伊尹武王周公之事因有許多事業方說到這裏若無這事亦不說到此若易只則是箇空底物事未有是事預先說是理故包括得盡許多道理看人做甚事皆撞著他又曰易無思也無為也易是箇無情底物事故寂然不動占之者吉凶善惡隨事著見乃感而遂通又云易中多言正如利貞貞吉利永貞之類皆是要人守正又云人如占得一爻須是反觀諸身果盡得這道理否坤之六二直方大不習無不利須看自家能直能方能大方能不習無不利凡皆類此又云所謂大過如當潛而不潛當見而不見當飛而不飛皆是過又曰如坤之初六須知履霜堅冰之漸要人恐懼修省不知恐懼修省便是過易大概欲人恐懼修省又曰文王繫辭本只是與人占底書至孔子作十翼方說君子居則觀其象而玩其辭動則觀其變而玩其占又曰夫子讀易與常人不同是他胸中洞見陰陽剛柔吉凶消長進退存亡之理其贊易即就胸中寫出這道理味道問聖人於文言只把做道理說曰有此氣便有此理又問文言反覆說如何曰如言潛龍勿用陽在下也又潛龍勿用下也只是一意重疊說伊川作兩意未穩時舉聖人作易本為欲定天下之志斷天下之疑而已不是要因此說道理也如人占得這爻便要人知得這爻之象是吉是凶吉便為之凶便不為然如此理卻自在其中矣如剝之上九碩果不食君子得輿小人剝廬其象如此謂一陽在上如碩大之果人不及食而獨留於其上如君子在上而小人皆載於下則是君子之得輿也然小人雖載君子而乃欲自下而剝之則是自剝其廬耳蓋唯君子乃能覆蓋小人小人必賴君子以保其身今小人欲剝君子則君子亡而小人亦無所容其身如自剝其廬也且看自古小人欲害君子到害得盡後國破家亡其小人曾有存活得者否故聖人象曰君子得輿民所載也小人剝廬終不可用也若人占得此爻則為君子之所為者必吉而為小人之所為者必凶矣其象如此而理在其中矣卻不是因欲說道理而後說象也時舉植錄云易只是說象初未有後人所說許多道理堆架在上面蓋聖人作易本為卜筮設上自王公而下達于庶人故曰以通天下之志以定天下之業以斷天下之疑但聖人說象則理在其中矣因舉剝之上九碩果不食五陰在下來剝一陽一陽尚在如碩大之果不食君子得輿是君子在上為小人所載乃下五陰載上一陽之象小人剝廬者言小人既剝君子其廬亦將自剝看古今小人既剝君子而小人亦死亡滅族豈有存者聖人之象只如是後人說易只愛將道理堆架在上面聖人本意不解如此先之問易曰坤卦大抵減乾之半據某看來易本是箇卜筮之書聖人因之以明教因其疑以示訓如卜得乾卦云元亨利貞本意只說大亨利於正若不正便會凶如卜得爻辭如潛龍勿用便教人莫出做事如卜得見龍在田便教人可以出做事如說利見大人一箇是五在上之人一箇是二在下之人看是甚麼人卜得天子自有天子利見大人處大臣自有大臣利見大人處群臣自有群臣利見大人處士庶人自有士庶人利見大人處當時又那曾有某爻與某爻相應那自是說這道理如此又何曾有甚麼人對甚麼人說有甚張三李四中間都是正吉不曾有不正而吉大率是為君子設非小人盜賊所得竊取而用如黃裳元吉須是居中在下方會大吉不然則大凶此書初來只是如此到後來聖人添許多說話也只是怕人理會不得故就上更說許多教分明大抵只是因以明教若能恁地看都是教戒恁地看來見得聖人之心洞然如日星更無些子屈曲遮蔽故曰聖人以通天下之志以定天下之業以斷天下之疑又曰看他本來裏面都無這許多事後來人說不得便去白撰箇話若做卜筮看說這話極是分明某如今看來直是分明若聖人有甚麼說話要與人說便分明說了若不要與人說便不說不應恁地千般百樣藏頭伉腦無形無影教後人自去多方推測聖人一箇光明盛大之心必不如此故曰君子居則觀其象而玩其辭動則觀其變而玩其占看這般處自分曉如今讀書恁地讀一番過了須是常常將心下溫過所以孔子說學而時習之若只看過便住自是易得忘了故須常常溫習方見滋味賀孫易只是古人卜筮之書如五雖主君位而言然實不可泥人傑易本為卜筮設如曰利涉大川是利於行舟也利有攸往是利於啟行也後世儒者鄙卜筮之說以為不足言而所見太卑者又泥於此而不通故曰易者難讀之書也不若且從大學做工夫然後循次讀論孟中庸庶幾切己有益也義剛易爻只似而今發課底卦影相似如云初九潛龍勿用這只是戒占者之辭解者遂去這上面生義理以初九當潛龍勿用九二當利見大人初九是箇甚麼如何會潛如何會勿用試討這箇人來看九二爻又是甚麼人他又如何會見龍在田利見大人嘗見林艾軒云世之發六壬課者以丙配壬則吉蓋火合水也如卦影云朱鳥翾翾歸于海之湄吉這箇只是說水火合則吉爾若使此語出自聖人之口則解者必去上面說道理以為朱鳥如何海湄如何矣僩問易中也有偶然指定一兩件實事言者如亨干岐山利用征伐利遷國之類是也曰是如此亦有兼譬喻言者利涉大川則行船之吉占而濟大難大事亦如之賜學履古人凡事必占如田獲三禽則田獵之事亦占也僩說卦中說許多卜筮今人說易卻要掃去卜筮如何理會得易每恨不得古人活法只說得箇半死半活底若更得他那箇活法卻須更看得高妙在古人必自有活法且如筮得之卦爻卻與所占底事不相應時如何他到這裏又須別有箇活底例子括將去不只恁死殺著或是用支干相合配處或是因他物象揲蓍雖是占筮只是後人巧去裏面見箇小小底道理旁門曲徑正理不只如此淵今之說易者先掊擊了卜筮如下擊說卜筮是甚次第某所恨者不深曉古人卜筮之法故今說處多是想象古人如此若更曉得須更有奧義可推或曰布蓍求卦即其法也曰爻卦與事不相應則推不去古人於此須有變通或以支干推之方子熟讀六十四卦則覺得繫辭之語直為精密是易之括例要之易書是為卜筮而作如云定天下之吉凶成天下之亹亹者莫大乎蓍龜又云天生神物聖人則之則專為卜筮也魯可幾曰古之卜筮恐不如今日所謂火珠林之類否曰以某觀之恐亦自有這法如左氏所載則支干納音配合之意似亦不廢如云得屯之比既不用屯之辭亦不用比之辭卻自別推一法恐亦不廢這理也道夫易以卜筮用道理便在裏面但只未說到這處如楚辭以神為君祀之者為臣以見其敬奉不可忘之義固是說君臣但假託事神而說今也須與他說事神然後及他事君之意今解直去解作事君也未為不是但須先為他結了事神一重方及那處易便是如此今人心性褊急更不待先說他本意便將理來羇說了學履大凡人不曾著實理會則說道理皆是懸空如讀易不曾理會揲法則說易亦是懸空如周禮所載蒐田事云如其陣之法便是古人自識了陣法所以更不載今人不曾理會陣法則談兵亦皆是脫空道夫問今之揲蓍但見周公作爻辭以後之揲法不知當初只有文王彖辭又如何揲曰他又須別有法只是今不可考耳且如周禮所載則當時煞有文字如今所見占法亦只是大概如此其間亦自有無所據底只是約度如此大抵古人法度今皆無復存者只是這些道理人尚胡亂說得去嘗愛陸機文賦有曰意翻空而易奇文質實而難工道理人卻說得去法度卻杜撰不得且如樂今皆不可復考今人只會說得凡音之生由人心也人心之動物使之然也到得制度便都說不去問通書注云而其制作之玅真有以得乎聲氣之元不知而今尚可尋究否曰今所爭祇是黃鍾一宮耳這裏高則都高這裏低則都低蓋難得其中耳問胡安定樂如何曰他亦是一家榦以四約之者揲之以四之義也以下啟蒙占門淵五四為奇各是一箇四也九八為偶各是兩箇四也淵老陰老陽為乾坤然而皆變少陰少陽亦為乾坤然而皆不變淵老陰老陽不專在乾坤上亦有少陰少陽如乾坤六爻皆動底是老六爻皆不動底是少六卦上亦有老陰老陽淵所以到那三畫變底第三十二卦以後占變卦彖爻之辭者無他到這裏時離他那本卦分數多了到四畫五畫則更多淵問卜卦二爻變則以二變爻占仍以上爻為主四爻變則以之卦二不變爻占仍以下爻為主曰凡變須就其變之極處看所以以上爻為主不變者是其常只順其先後所以以下爻為主亦如陰陽老少之義老者變之極處少者便只是初賀孫學履錄云變者下至上而止不變者下便是不變之本故以之為主內卦為貞外卦為悔因說生物只有初時好凡物皆然康節愛說僩貞悔即占用二之謂貞是在裏面做主宰底悔是做出了末後闌珊底貞是頭邊淵問內卦為貞外卦為悔貞悔何如曰此出於洪範貞看來是正悔是過意凡悔字都是過了方悔這悔字是過底意思亦是多底意思下三爻便是正卦上三爻似是過多了恐是如此這貞悔亦似今占卜分甚主客問兩爻變則以兩變爻占仍以下爻為主何也曰卦是從下生占事都有一箇先後首尾賀孫陳日善問內卦為貞外卦為悔是何義曰貞訓正事方正如此悔是事已如此了凡悔吝者皆是事過後方有悔吝內卦之占是事方如此外卦之占是事之已然者如此二字又有始終之意雉貞是事之始悔是事之終貞是事之主悔是事之客貞是在我底悔是應人底三爻變則所主不一以二卦彖辭占而以本卦為貞變卦為悔六爻俱不變則占本卦彖辭而以內卦為貞外卦為悔凡三爻變者有二十卦前十卦為貞後十卦為悔後十卦是變盡了又反來有圖見啟蒙義剛叔器問內卦為貞外卦為悔曰貞悔出洪範貞是正底便是體悔是過底動則有悔又問一貞八悔曰如乾夬大有大壯小畜需大畜泰內體皆乾是一貞外體八卦是八悔餘放此義剛問貞悔不止一說如六十四卦則每卦內三畫為貞外三畫為悔如揲蓍成卦則正卦為貞之卦為悔如八卦之變則純卦一為貞變卦七為悔曰是如此過問卦爻凡初者多吉上者多凶曰時運之窮自是如此內卦為貞外卦為悔貞是貞正底意悔是事過有追不及底意礪占法陽主貴陰主富淵悔陽而吝陰方子巽離兌乾之所索乎坤者震坎艮坤之所索乎乾者本義揲蓍之說恐不須恁地方子凡爻中言人者必是其人嘗占得此卦如大橫庚庚必啟未歸時曾占得淵易中言帝乙歸妹箕子明夷高宗伐鬼方之類疑皆當時帝乙高宗箕子曾占得此爻故後人因而記之而聖人以入爻也如漢書大橫庚庚余為天王夏啟以光亦是啟曾占得此爻也火珠林亦如此僩今人以三錢當揲蓍不能極其變此只是以納甲附六爻納甲乃漢焦贛京房之學可學火珠林猶是漢人遺法方子問筮短龜長如何曰筮已費手可學筮短龜長近得其說是筮有筮病纔一畫定便只有三十二卦永不到是那三十二卦又二畫便只有十六卦又三畫便只有八卦又四畫便只有四卦又五畫便只有二卦這二卦便可以著意揣度了不似龜纔鑽拆便無救處全不可容心賀孫因言筮卦曰卦雖出於自然然一爻成則止有三十二卦二爻成則止有十六卦三爻成則止有八卦四爻成則止有四卦五爻成則止有二卦是人心漸可以測知不若卜龜文一兆則吉凶便見更無移改所以古人言筮短龜長廣因言浙人多尚龜卜雖盜賊亦取決於此曰左傳載臧會卜信與僭僭吉此其法所以不傳聖人作易示人以吉凶卻無此弊故言利貞不言利不貞貞吉不言不貞吉言利禦寇不言利為寇也廣易占不用龜而每言蓍龜皆具此理也筮即蓍也筮短龜長不如從長者謂龜有鑽灼之易而筮有扐揲之煩龜之卦一灼便成亦有自然之意洪範所謂卜五占用二者卜五即龜用二即蓍曰雨曰霽曰蒙曰驛曰克即是五行雨即水霽即火蒙即土驛即木克即金曰貞曰悔即是內外卦也謨占龜土兆大橫木兆直或曰火兆直只周禮曰木兆直金兆從右邪上火兆從左邪上或曰木兆從左邪上水兆曲以大小長短明暗為吉凶或占凶事又以短小為吉又有旋者吉大橫吉大橫庚庚庚庚是豹起恁地庚庚然不是金兆也賀孫程沙隨說大橫庚庚為金兆取庚辛之義他都無所據只云得之卜者不知大橫只是土兆蓋橫是土言文帝將自諸侯而得天下有大土之象也庚庚乃是龜文爆出也卜兆見洪範疏云橫者為土燾漢卿說鑽龜法云先定四嚮欲求甚紋兆順則為吉逆則為凶正淳云先灼火然後觀火之紋而定其吉凶曰要須先定其四向而後求其合從逆則凶如亦惟洛食乃先以墨畫定看食墨如何筮短龜長古人固重此洪範謂龜從筮逆若龜筮共違于人則用靜吉用作凶漢卿云今為賊者多卜龜以三龜連卜皆順則往賀孫云若石祁子兆衛人以龜為有知此卻是無知也曰所以古人以易而捨龜往往以其難信易則有貞吉無不貞吉利禦寇不利為寇賀孫卜必先以墨畫龜看是卜何事要得何兆都有定例或火或土便以墨畫之要拆鑽處拆痕依此墨然後灼之以火鑽鑽鑽略過久求其兆拆痕順食此墨畫之處謂之食振南軒家有真蓍云破宿州時得之又曰卜易卦以錢擲以甲子起卦始於京房璘象嘗謂伏羲畫八卦只此數畫該畫天下萬物之理陽在下為震震動也在上為艮艮止也陽在下自動在上自止歐公卻說繫辭不是孔子作所謂書不盡信言不盡意者非蓋他不會看立象以盡意一句惟其言不盡意故立象以盡之學者於言上會得者淺於象上會得者深廣伊川說象只似譬喻樣說看得來須有箇象如此只是如今曉他不出淵某嘗作易象說大率以簡治繁不以繁御簡煇前輩也會說易之取象似詩之比興如此卻是虛說恐不然如田有禽須是此爻有此象但今不可考數則只是大衍之數五十與天數五地數五兩段大衍之數是說蓍天地之數是說造化生生不窮之理除此外都是後來人推說出來底淵以上底推不得只可從象下面說去王輔嗣伊川皆不信象如今卻不敢如此說只可說道不及見這箇了且從象以下說免得穿鑿淵問易之象似有三樣有本畫自有之象如奇畫象陽偶畫象陰是也六十四卦之爻一爻各是一象有實取諸物之象如乾坤六子以天地雷風之類象之是也有只是聖人以意自取那象來明是義者如白馬翰如載鬼一車之類是也實取諸物之象決不可易若聖人姑假是象以明義者當初若別命一象亦通得不知是如此否曰聖人自取之象也不見得如此而今且只得因象看義若恁地說則成穿鑿了學履他所以有象底意思不可見卻只就他那象上推求道理不可為求象不得便喚做無如潛龍便須有那潛龍之象淵取象各不同有就自己身上取底有自己當不得這卦象卻就那人身上取如潛龍勿用是就占者身上言到那見龍自家便當不得須把做在上之大人九五飛龍便是人君大人卻是在下之大人淵易之象理會不得如乾為馬而乾之卦卻專說龍如此之類皆不通恪易中取象不如卦德上命字較親切如蒙險而止復剛動而順行此皆親切如山下出泉地中有雷恐是後來又就那上面添出所以易中取象處亦有難理會者學履易畢竟是有象只是今難推如既濟高宗伐鬼方在九三未濟卻在九四損十朋之龜在六五益卻在六二不知其象如何又如履卦歸妹卦皆有跛能履皆是兌體此可見問諸家易除易傳外誰為最近曰難得其間有一二節合者卻多如渙其群伊川解卻成渙而群卻是東坡說得好群謂小隊渙去小隊使合於大隊問孔子專以義理說易如何曰自上世傳流至此象數已分明不須更說故孔子只於義理上說伊川亦從孔子今人既不知象數但依孔子說只是說得半截不見上面來歷大抵去古既遠書多散失今且以占辭論之如人占婚姻卻占得一病辭如何用似此處聖人必有書以教之如周禮中所載今皆亡矣問左氏傳卜易與今異曰亦須有所傳向見魏公在揆路敬夫以易卜得睽卦李壽翁為占曰離為戈兵兌為說用兵者不成講和者亦不成其後魏公罷相湯思退亦以和反致虜寇而罷問康節於易如何曰他又是一等說話問渠之學如何曰專在數上卻窺見理曰可用否曰未知其可用但與聖人之學自不同曰今世學者言易多要入玄妙卻是遺書中有數處如不只是一部易書之類今人認此意不著故多錯了曰然可學嘗得郭子和書云其先人說不獨是天地雷風水火山澤謂之象只是卦畫便是象亦說得好學蒙川壅為澤坎為川兌為澤澤是水不流底坎下一畫閉合時便成兌卦便是川壅為澤之象淵易象自是一法如離為龜則損益二卦皆說龜易象如此者甚多僩凡卦中說龜底不是正得一箇離卦必是伏箇離卦如觀我朵頤是也兌為羊大壯卦無兌恐便是三四五爻有箇兌象這說取象底是不可曉處也多如乾之六爻象皆說龍至說到乾卻不為龍龍卻是變化不測底物須著用龍當之如夫征不復婦孕不育此卦是取離為大腹之象本卦雖無離卦卻是伏得這卦淵或說易象云果行育德育德有山之象果行有水之象振民育德則振民有風之象育德有山之象先生云此說得好如風雷益則遷善當如風之速改過當如雷之決山下有澤損則懲忿有摧高之象窒慾有塞水之象次第易之卦象都如此不曾一一推究又云遷善工夫較輕如己之有善以為不足而又遷於至善若夫改過者非有勇決不能貴乎用力也人傑卦中要看得親切須是兼象看但象不傳了鄭東卿易專取象如以鼎為鼎革為爐小過為飛鳥亦有義理其他更有好處亦有杜撰處礪鄭東卿少梅說易象亦有是者如鼎卦分明是鼎之象他說革是爐之象亦恐有此理澤中有火革上畫如爐之口五四三是爐之腹二是爐之下口初是爐之底然亦偶然此兩卦如此耳廣鄭東卿說易亦有好處如說中孚有卵之象小過有飛鳥之象孚字從爪從子如鳥以爪抱卵也蓋中孚之象以卦言之四陽居外二陰居內外實中虛有卵之象又言鼎象鼎形革象風爐亦是此義此等處說得有些意思但易一書盡欲如此牽合附會少閒便疏脫學者須是先理會得正當道理了然後於此等些小零碎處收拾以相資益不為無補若未得正路脈先去理會這樣處便疏略僩文蔚同程沙隨以井卦有井谷射鮒一句鮒蝦蟆也遂說井有蝦蟆之象木上有水井云上前兩足五頭也四眼也三與二身也初後兩足也其穿鑿一至於此某嘗謂之曰審如此則此卦當為蝦蟆卦方可如何卻謂之井卦廣
