body:
  text: 朱子語類卷第八學二總論為學之方這道體饒本作理浩浩無窮道體用雖極精微聖賢之言則甚明白若海聖人之道如飢食渴飲人傑聖人之道有高遠處有平實處道夫夫道若大路然豈難知哉人病不由耳道夫道未嘗息而人自息之非道亡也幽厲不由也道夫聖人教人大概只是說孝弟忠信日用常行底話人能就上面做將去則心之放者自收性之昏者自著如心性等字到子思孟子方說得詳因說象山之學儒用聖人教人有定本舜使契為司徒教以人倫父子有親君臣有義夫婦有別長幼有序朋友有信夫子對顏淵曰克己復禮為仁非禮勿視非禮勿聽非禮勿言非禮勿動皆是定本人傑聖門日用工夫甚覺淺近然推之理無有不包無有不貫及其充廣可與天地同其廣大故為聖為賢位天地育萬物只此一理而已常人之學多是偏於一理主於一說故不見四旁以起爭辨聖人則中正和平無所偏倚人傑聖賢所說工夫都只一般只是一箇擇善固執論語則說學而時習之孟子則說明善誠身只是隨他地頭所說不同下得字來各自精細其實工夫只是一般須是盡知其所以不同方知其所謂同也僩這箇道理各自有地頭不可只就一面說在這裏時是恁地說在那裏時又如彼說其賓主彼此之勢各自不同僩學者工夫但患不得其要若是尋究得這箇道理自然頭頭有箇著落貫通浹洽各有條理如或不然則處處窒礙學者常談多說持守未得其要不知持守甚底說擴充說體驗說涵養皆是揀好底言語做箇說話必有實得力處方可所謂要於本領上理會者蓋緣如此謨為學須先立得箇大腔當了卻旋去裏面修治壁落教綿密今人多是未曾知得箇大規模先去修治得一間半房所以不濟事僩識得道理原頭便是地盤如人要起屋須是先築教基址堅牢上面方可架屋若自無好基址空自今日買得多少木去起屋少間只起在別人地上自家身己自沒頓放處賀孫須就源頭看教大底道理透闊開基廣開址如要造百間屋須著有百間屋基要造十間屋須著有十間屋基緣這道理本同甲有許多乙也有許多丙也有許多賀孫學須先理會那大底理會得大底了將來那裏面小底自然通透今人卻是理會那大底不得只去搜尋裏面小小節目植學問須是大進一番方始有益若能於一處大處攻得破見那許多零碎只是這一箇道理方是快活然零碎底非是不當理會但大處攻不破縱零碎理會得些少終不快活曾點漆雕開已見大意只緣他大處看得分曉今且道他那大底是甚物事天下只有一箇道理學只要理會得這一箇道理這裏纔通則凡天理人欲義利公私善惡之辨莫不皆通或問氣質之偏如何救得曰才說偏了又著一箇物事去救他偏越見不平正了越討頭不見要緊只是看教大底道理分明偏處自見得如暗室求物把火來便照見若只管去摸索費盡心力只是摸索不見若見得大底道理分明有病痛處也自會變移不自知不消得費力賀孫成己方能成物成物在成己之中須是如此推出方能合義理聖賢千言萬語教人且從近處做去如灑掃大廳大廊亦只是如灑掃小室模樣掃得小處淨潔大處亦然若有大處開拓不去即是於小處便不曾盡心學者貪高慕遠不肯從近處做去如何理會得大頭項底而今也有不曾從裏做得底外面也做得好此只是才高以智力勝將去中庸說細處只是謹獨謹言謹行大處是武王周公達孝經綸天下無不載小者便是大者之驗須是要謹行謹言從細處做起方能克得如此大又曰如今為學甚難緣小學無人習得如今卻是從頭起古人於小學小事中便皆存箇大學大事底道理在大學只是推將開闊去向來小時做底道理存其中正似一箇坯素相似明作學者做工夫莫說道是要待一箇頓段大項目工夫後方做得即今逐些零碎積累將去才等待大項目後方做即今便蹉過了學者只今便要做去斷以不疑鬼神避之需者事之賊也至如今學問未識箇入路就他自做倒不覺惟既識得箇入頭卻事事須著理會且道世上多多少少事江文卿云只先生一言一語皆欲為一世法所以須著如此曰不是說要為世法既識得路頭許多事都自是合著如此不如此不得自是天理合下當然賀孫若不見得入頭處緊也不可慢也不得若識得些路頭須是莫斷了若斷了便不成待得再新整頓起來費多少力如雞抱卵看來抱得有甚煖氣只被他常常恁地抱得成若把湯去盪便死了若抱才住便冷了然而實是見得入頭處也自不解住了自要做去他自得些滋味了如喫果子相似未識滋味時喫也得不消喫也得到識滋味了要住自住不得賀孫待文王而後興者凡民也若夫豪傑之士雖無文王猶興豪傑質美生下來便見這道理何用費力今人至於沉迷而不反聖人為之屢言方始肯來已是下愚了況又不知求之則終於為禽獸而已蓋人為萬物之靈自是與物異若迷其靈而昏之則與禽獸何別大雅學問是自家合做底不知學問則是欠闕了自家底知學問則方無所欠闕今人把學問來做外面添底事看了廣聖賢只是做得人當為底事盡今做到聖賢止是恰好又不是過外祖道凡人須以聖賢為己任世人多以聖賢為高而自視為卑故不肯進抑不知使聖賢本自高而己別是一樣人則早夜孜孜別是分外事不為亦可為之亦可然聖賢稟性與常人一同既與常人一同又安得不以聖賢為己任自開闢以來生多少人求其盡己者千萬人中無一二只是羇同枉過一世詩曰天生烝民有物有則今世學者往往有物而不能有其則中庸曰尊德性而道問學極高明而道中庸此數句乃是徹首徹尾人性本善只為嗜慾所迷利害所逐一齊昏了聖賢能盡其性故耳極天下之聰目極天下之明為子極孝為臣極其忠某問明性須以敬為先曰固是但敬亦不可混淪說須是每事上檢點論其大要只是不放過耳大抵為己之學於他人無一毫干預聖賢千言萬語只是使人反其固有而復其性耳可學學者大要立志所謂志者不道將這些意氣去蓋他人只是直截要學堯舜孟子道性善言必稱堯舜此是真實道理世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣這些道理更無走作只是一箇性善可至堯舜別沒去處了下文引成阀顏子公明儀所言便見得人人皆可為也學者立志須教勇猛自當有進志不足以有為此學者之大病謨世俗之學所以與聖賢不同者亦不難見聖賢直是真箇去做說正心直要心正說誠意直要意誠修身齊家皆非空言今之學者說正心但將正心吟詠一晌說誠意又將誠意吟詠一晌說修身又將聖賢許多說修身處諷誦而已或掇拾言語綴緝時文如此為學卻於自家身上有何交涉這裏須要著意理會今之朋友固有樂聞聖賢之學而終不能去世俗之陋者無他只是志不立爾學者大要立志纔學便要做聖人是也謨學者須是立志今人所以悠悠者只是把學問不曾做一件事看遇事則且胡亂恁地打過了此只是志不立雉問人氣力怯弱於學有妨否曰為學在立志不干氣稟強弱事又曰為學何用憂惱但須令平易寬快去宇舉聖門弟子唯稱顏子好學其次方說及曾子以此知事大難曰固是如此某看來亦有甚難有甚易只是堅立著志順義理做去他無蹺欹也宇英雄之主所以有天下只是立得志定見得大利害如今學者只是立得志定講究得義理分明賀孫立志要如飢渴之於飲食才有悠悠便是志不立祖道為學須是痛切懇惻做工夫使飢忘食渴忘飲始得砥這箇物事要得不難如飢之欲食渴之欲飲如救火如追亡似此年歲間看得透活潑潑地在這裏流轉方是僩學者做工夫當忘寢食做一上使得些入處自後方滋味接續浮浮沉沉半上落下不濟得事振而今緊要且看聖人是如何常人是如何自家因甚便不似聖人因甚便只是常人就此理會得透自可超凡入聖淳為學須思所以超凡入聖如何昨日為鄉人今日便為聖人須是竦拔方始有進砥為學須覺今是而昨非日改月化便是長進砥今之學者全不曾發憤升卿為學不進只是不勇燾不可倚靠師友方子不要等待方子今人做工夫不肯便下手皆是要等待如今日早間有事午間無事則午間便可下手午間有事晚間便可下手卻須要待明日今月若尚有數日必直待後月今年尚有數月不做工夫必曰今年歲月無幾直須來年如此何緣長進因康叔臨問致知先生曰如此說得不濟事蓋卿道不能安坐等其自至只待別人理會來放自家口裏淳學者須是奈煩奈辛苦方子必須端的自省特達自肯然後可以用力莫如下學而上達也去偽凡人便是生知之資也須下困學勉行底工夫方得蓋道理縝密去那裏捉摸若不下工夫如何會了得敬仲今之學者本是困知勉行底資質卻要學他生知安行底工夫便是生知安行底資質亦用下困知勉行工夫況是困知勉行底資質文蔚大抵為學雖有聰明之資必須做遲鈍工夫始得既是遲鈍之資卻做聰明底樣工夫如何得伯羽今人不肯做工夫有先覺得難後遂不肯做有自知不可為公然遜與他人如退產相似甘伏批退自己不願要蓋卿為學勿責無人為自家剖析出來須是自家去裏面講究做工夫要自見得道夫小立課程大作工夫可學工夫要趲期限要寬從周且理會去未須計其得德明纔計於得則心便二頭便低了至嚴立功程寬著意思久之自當有味不可求欲速之功道夫自早至暮無非是做工夫時節道夫人多言為事所奪有妨講學此為不能使船嫌溪曲者也遇富貴就富貴上做工夫遇貧賤就貧賤上做工夫兵法一言甚佳因其勢而利導之也人謂齊人弱田忌乃因其弱以取勝今日三萬灶明日二萬灶後日一萬灶又如韓信特地送許多人安於死地乃始得勝學者若有絲毫氣在必須進力除非無了此氣只口不會說話方可休也因舉浮屠語曰假使鐵輪頂上旋定慧圓明終不失力行聖賢千言萬語無非只說此事須是策勵此心勇猛奮發拔出心肝與他去做如兩邊擂起戰鼓莫問前頭如何只認捲將去如此方做得工夫若半上落下半沉半浮濟得甚事僩又如大片石須是和根拔今只於石面上薄削濟甚事作意向學不十日五日又懶孟子曰一日暴之十日寒之可學宗杲云如載一車兵器逐件取出來弄弄了一件又弄一件便不是殺人手段我只有寸鐵便可殺人且如項羽救趙既渡沈船破釜持三日糧示士必死無還心故能破秦若瞻前顧後便做不成如居燒屋之下如坐漏船之中可學為學極要求把篙處著力到工夫要斷絕處又更增工夫著力不放令倒方是向進處為學正如上水船方平穩處儘行不妨及到灘脊急流之中舟人來這上一篙不可放緩直須著力撐上不一步不緊放退一步則此船不得上矣洽學者為學譬如煉丹須是將百十斤炭火鍛一餉方好用微微火養教成就今人未曾將百十斤炭火去鍛便要將微火養將去如何得會成恪今語學問正如煮物相似須爇猛火先煮方用微火慢煮若一向只用微火何由得熟欲復自家元來之性乃恁地悠悠幾時會做得大要須先立頭緒頭緒既立然後有所持守書曰若藥弗瞑眩厥疾弗瘳今日學者皆是養病可學譬如煎藥先猛火煎教百沸大羇直至湧坌出來然後卻可以慢火養之須磨礪精神去理會天下事非燕安杤豫之可得淳萬事須是有精神方做得振陽氣發處金石亦透精神一到何事不成驤凡做事須著精神這箇物事自是剛有鋒刃如陽氣發生雖金石也透過賀孫人氣須是剛方做得事如天地之氣剛故不論甚物事皆透過人氣之剛其本相亦如此若只遇著一重薄物事便退轉去如何做得事從周方子錄云天地之氣雖至堅如金石無所不透故人之氣亦至剛蓋其本相如此學者識得箇脈路正便須剛決向前若半青半黃非惟無益因舉酒云未嘗見有衰底聖賢德明學者不立則一齊放倒了升卿不帶性氣底人為僧不成做道不了方因言前輩也多是背處做幾年方成振進取得失之念放輕卻將聖賢格言處研窮考究若悠悠地似做不做如捕風捉影有甚長進今日是這箇人明日也是這箇人季札學者只是不為己故日間此心安頓在義理上時少安頓在閑事上時多於義理卻生於閑事卻熟方子今學者要緊且要分別箇路頭要緊是為己為人之際為己者直拔要理會這箇物事欲自家理會得不是漫恁地理會且恁地理會做好看教人說道自家也曾理會來這假饒理會得十分是當也都不闕自身己事要須先理會這箇路頭若分別得了方可理會文字賀孫學者須是為己譬如喫飯寧可逐些喫令飽為是乎寧可鋪攤放門外報人道我家有許多飯為是乎近來學者多是以自家合做底事報與人知又言此間學者多好高只是將義理略從肚裏過卻翻出許多說話舊見此間人做婚書亦說天命人倫男婚女嫁自是常事蓋有厭卑近之意故須將日用常行底事裝荷起來如此者只是不為己不求益只是好名圖好看亦聊以自誑如南越王黃屋左纛聊以自娛爾方子近世講學不著實常有夸底意思譬如有飯不將來自喫只管鋪攤在門前要人知得我家裏有飯打疊得此意盡方有進振今人為學多只是謾且恁地不曾真實肯做方子今之學者直與古異今人只是強探向上去古人則逐步步實做將去廣只是實去做工夫議論多轉鬧了德明每論諸家學及己學大指要下學著實方為學須是切實為己則安靜篤實承載得許多道理若輕揚淺露如何探討得道理縱使探討得說得去也承載不住銖入道之門是將自家身己入那道理中去漸漸相親久之與己為一而今入道理在這裏自家身在外面全不曾相干涉僩或問為學曰今人將作箇大底事說不切己了全無益一向去前人說中乘虛接渺妄取許多枝蔓只見遠了只見無益於己聖賢千言萬語儘自多了前輩說得分曉了如何不切己去理會如今看文字且要以前賢程先生等所解為主看他所說如何聖賢言語如何將己來聽命於他切己思量體察就日用常行中著衣喫飯事親從兄盡是問學若是不切己只是說話今人只憑一己私意瞥見些子說話便立箇主張硬要去說便要聖賢從我言語路頭去如何會有益此其病只是要說高說妙將來做箇好看底物事做弄如人喫飯方知滋味如不曾喫只要攤出在外面與人看濟人濟己都不得謙或問為學如何做工夫曰不過是切己便的當此事自有大綱亦有節目常存大綱在我至於節目之間無非此理體認省察一毫不可放過理明學至件件是自家物事然亦須各有倫序問如何是倫序曰不是安排此一件為先此一件為後此一件為大此一件為小隨人所為先其易者闕其難者將來難者亦自可理會且如讀書三禮春秋有制度之難明本末之難見且放下未要理會亦得如書詩直是不可不先理會又如詩之名數書之盤誥恐難理會且先讀典謨之書雅頌之詩何嘗一言一句不說道理何嘗深潛諦玩無有滋味只是人不曾子細看若子細看裏面有多少倫序須是子細參研方得此便是格物窮理如遇事亦然事中自有一箇平平當當道理只是人討不出只隨事羇將去亦做得卻有掣肘不中節處亦緣鹵莽了所以如此聖賢言語何曾誤天下後世人自學不至耳謙佛家一向撤去許多事只理會自身己其教雖不是其意思卻是要自理會所以他那下常有人自家這下自無人今世儒者能守經者理會講解而已看史傳者計較利害而已那人直是要理會身己從自家身己做去不理會自身己說甚別人長短明道曰不立己後雖向好事猶為化物不得以天下萬物撓己己立後自能了當得天下萬物只是從程先生後不再傳而已衰所以某嘗說自家這下無人佛家有三門曰教曰律曰禪禪家不立文字只直截要識心見性律本法甚嚴毫髮有罪如云不許飲水纔飲水便有罪過如今小院號為律院乃不律之尤者也教自有三項曰天台教曰慈恩教曰延壽教延壽教南方無傳有些文字無能通者其學近禪故禪家以此為得天台教專理會講解慈恩教亦只是講解吾儒家若見得道理透就自家身心上理會得本領便自兼得禪底講說辨討便自兼得教底動由規矩便自兼得律底事事是自家合理會顏淵問為邦看他陋巷簞瓢如此又卻問為邦之事只是合當理會看得是合做底事若理會得入頭意思一齊都轉若不理會得入頭少間百事皆差錯若差了路頭底亦多端有纔出門便錯了路底有行過三兩條路了方差底有略差了便轉底有一向差了煞遠終於不轉底賀孫不可只把做面前物事看了須是向自身上體認教分明如道家存想有所謂龍虎亦是就身上存想士毅為學須是專一吾儒惟專一於道理則自有得砥既知道自家患在不專一何不便專一去逍遙須是在己見得只是欠闕他人見之卻有長進方可僩人白睚不得要將聖賢道理扶持振為學之道須先存得這箇道理方可講究事情今人口略依稀說過不曾心曉淳發得早時不費力升卿有資質甚高者一了一切了即不須節節用工也有資質中下者不能盡了卻須節節用工振博學謂天地萬物之理修己治人之方皆所當學然亦各有次序當以其大而急者為先不可雜而無統也今之學者多好說得高不喜平殊不知這箇只是合當做底事節譬如登山人多要至高處不知自低處不理會終無至高處之理德明於顯處平易處見得則幽微底自在裏許德明且於切近處加功升卿著一些急不得方子學者須是直前做去莫起計獲之心如今說底恰似畫卦影一般吉凶未應時一場鶻突知他是如何到應後方始知元來是如此廣某適來因澡浴得一說大抵揩背須從頭徐徐用手則力省垢可去若於此處揩又於彼處揩用力雜然則終日勞而無功學問亦如此若一番理會不了又作一番理會終不濟事蓋卿學者須是熟熟時一喚便在目前不熟時須著旋思索到思索得來意思已不如初了士毅道理生便縛不住淳見須是見得確定淳須是心廣大似這箇方包裹得過運動得行方子學者立得根腳闊便好升卿須是有頭有尾成箇物事方子徹上徹下無精粗本末只是一理賜最怕粗看了便易走入不好處去士毅學問不只於一事一路上理會振貫通是無所不通未有耳目狹而心廣者其說甚好振帖底謹細做去所以能廣振大凡學者無有徑截一路可以教他了得須是博洽歷涉多方通振不可涉其流便休方子天下更有大江大河不可守箇土窟子謂水專在是力行學者若有本領相次千枝萬葉都來湊著這裏看也須易曉讀也須易記方子大本不立小規不正可學刮落枝葉栽培根本可學大根本流為小根本舉前說因先說欽夫學大本如此則發處不能不受病方學問須嚴密理會銖分毫析道夫因論為學曰愈細密愈廣大愈謹確愈高明僩開闊中又著細密寬緩中又著謹嚴廣如其窄狹則當涵泳廣大氣象頹惰則當涵泳振作氣象方子學者須養教氣宇開闊弘毅升卿常使截斷嚴整之時多膠膠擾擾之時少方好德明只有一箇界分出則便不是廣義理難者便不是振體認為病自在即好振須是玩味方子咬得破時正好咀味文蔚若只是握得一箇鶻崙底果子不知裏面是酸是鹹是苦是澀須是與他嚼破便見滋味易曰學以聚之問以辨之寬以居之仁以行之語曰執德不弘信道不篤焉能為有焉能為亡學問之後繼以寬居信道篤而又欲執德弘者人之為心不可促迫也人心須令著得一善又著一善善之來無窮而吾心受之有餘地方好若只著得一善第二般來又未便容得如此無緣心廣而道積也洽自家猶不能怏自家意如何他人卻能盡怏我意要在虛心以從善升卿虛心順理學者當守此四字人傑聖人與理為一是恰好其他以心處這理卻是未熟要將此心處理可學今人言道理說要平易不知到那平易處極難被那舊習纏繞如何便擺脫得去譬如作文一般那箇新巧者易作要平淡便難然須還他新巧然後造於平淡又曰自高險處移下平易處甚難端蒙人之資質有偏則有縫罅做工夫處蓋就偏處做將去若資質平底則如死水然終激作不起謹愿底人更添些無狀便是鄉原不可以為知得些子便了燾只聞下學而上達不聞上達而下學德明今學者之於大道其未及者雖是遲鈍卻須終有到時唯過之者便不肯復回來耳必大或人性本好不須矯揉教人一用此極害理又有讀書見義理釋書義理不見亦可慮可學學者議論工夫當因其人而示以用工之實不必費辭使人知所適從以入於坦易明白之域可也若泛為端緒使人迫切而自求之適恐資學者之病人傑師友之功但能示之於始而正之於終爾若中間三十分工夫自用喫力去做既有以喻之於始又自勉之於中又其後得人商量是正之則所益厚矣不爾則亦何補於事道夫或論人之資質或長於此而短於彼曰只要長善救失或曰長善救失不特教者當如此人自為學亦當如此曰然燾凡言誠實都是合當做底事不是說道誠實好了方去做不誠實不好了方不做自是合當誠實僩言必忠信言自合著忠信何待安排有心去要恁地便不是活便不能久矣若如此便是剩了一箇字在信見邊自是著不得如事親必於孝事長必於弟孝弟自是道理合當如此何須安一箇必字在心頭念念要恁地做如此便是辛苦如何得會長久又如集義久然後浩然之氣自生若著一箇意在這裏等待氣生便為害今日集得許多又等待氣生卻是私意了必有事焉而勿正正便是期必也為學者須從窮理上做工夫若物格知至則意自誠意誠則道理合做底事自然行將去自無下面許多病痛也擴然而大公物來而順應切須去了外慕之心力行有一分心向裏得一分力有兩分心向裏得兩分力文蔚須是要打疊得盡方有進從周看得道理熟後只除了這道理是真實法外見世間萬事顛倒迷妄耽嗜戀著無一不是戲劇真不堪著眼也又答人書云世間萬事須臾變滅皆不足置胸中惟有窮理修身為究竟法耳僩大凡人只合講明道理而謹守之以無愧於天之所與者若乃身外榮辱休戚當一切聽命而已驤因說索麵曰今人於飲食動使之物日極其精巧到得義理卻不理會漸漸昏蔽了都不知廣
