body:
  text: 朱子語類卷第七十二易八咸否泰咸恒損益既濟未濟此八卦首尾皆是一義如咸皆是感動之義之類咸內卦艮止也何以皆說動曰艮雖是止然咸有交感之義都是要動所以都說動卦體雖是動然才動便不吉動之所以不吉者以內卦屬艮也僩咸就人身取象看來便也是有些取象說咸上一畫如人口中三畫有腹背之象下有人腳之象艮就人身取象便也似如此上一陽畫有頭之象中二陰有口之象所以艮其輔於五爻言之內卦以下亦有足象礪問本義以為柔上剛下乃自旅來旅之六五上而為咸之上六旅之上九下而為咸之九五此謂柔上剛下與程傳不同先生問所以不同何也銖曰易中自有卦變耳曰須知程子說有不通處必著如卦變說方見得下落此等處當錄出看銖山上有澤咸當如伊川說水潤土燥有受之義又曰上若不虛如何受得又曰上兌下艮兌上缺有澤口之象兌下二陽畫有澤底之象艮上一畫陽有土之象下二陰畫中虛便是滲水之象礪問君子以虛受人伊川注云以量而容之擇合而受之以量莫是要著意容之否曰非也以量者乃是隨我量之大小以容人便是不虛了又問貞吉悔亡易傳云貞者虛中無我之謂本義云貞者正而固不同何也曰某尋常解經只要依訓詁說字如貞字作正而固仔細玩索自有滋味若曉得正而固則虛中無我亦在裏面又問憧憧往來朋從爾思莫是此感彼應憧憧是添一箇心否曰往來固是感應憧憧是一心方欲感他一心又欲他來應如正其義便欲謀其利明其道便欲計其功又如赤子入井之時此心方怵惕要去救他又欲他父母道我好這便是憧憧底病僩厚之問憧憧往來朋從爾思曰往來自不妨天地間自是往來不絕只不合著憧憧了便是私意德明錄云如暑往寒來日往月來皆是常理只著個憧憧字便鬧了又問明道云莫若廓然而大公物來而順應如何曰廓然大公便不是憧憧物來順應便不是朋從爾思此只是比而不周周而不比之意這一段舊看易惑人近來看得節目極分明可學往來是感應合當底憧憧是私感應自是當有只是不當私感應耳淵憧憧往來朋從爾思聖人未嘗不教人思只是不可憧憧這便是私了感應自有箇自然底道理何必思他若是義理卻不可不思淵問咸傳之九四說虛心貞一處全似敬曰蓋嘗有語曰敬心之貞也方易傳言感應之理咸九四盡矣方問伊川解屈伸往來一段以屈伸為感應屈伸之與感應若不相似何也曰屈則感伸伸則感屈自然之理也今以鼻息觀之出則必入出感入也入則必出入感出也故曰感則有應應復為感所感復有應屈伸非感應而何洽或問易傳說感應之理曰如日往則感得那月來月往則感得那日來寒往則感得那暑來暑往則感得那寒來一感一應一往一來其理無窮感應之理是如此曰此以感應之理言之非有情者云有動皆為感似以有情者言曰父慈則感得那子愈孝子孝則感得那父愈慈其理亦只一般文蔚周易傳有感必有應是如何曰凡在天地間無非感應之理造化與人事皆是且如雨暘雨不成只管雨便感得箇暘出來暘不成只管暘暘已是應處又感得雨來是感則必有應所應復為感寒暑晝夜無非此理如人夜睡不成只管睡至曉須著起來一日運動向晦亦須常息凡一死一生一出一入一往一來一語一默皆是感應中人之性半善半惡有善則有惡古今天下一盛必有一衰聖人在上兢兢業業必日保治及到衰廢自是整頓不起終不成一向如此必有興起時節唐貞觀之治可謂甚盛至中間武后出來作壞一番自恁地塌塌底去至五代衰微極矣國之紀綱國之人才舉無一足恃一旦聖人勃興轉動一世天地為之豁開仁宗時天下稱太平眼雖不得見想見是太平然當時災異亦數有之所以馴至後來之變亦是感應之常如此又問感應之理於學者工夫有用處否曰此理無乎不在如何學者用不得精義入神以致用也利用安身以崇德也亦是這道理研精義理於內所以致用於外利用安身於外所以崇德於內橫渠此處說得更好精義入神事豫吾內求利吾外利用安身素利吾外致養吾內此幾句親切正學者用功處宇林一之問凡有動皆為感感則必有應曰如風來是感樹動便是應樹拽又是感下面物動又是應如晝極必感得夜來夜極又便感得晝來曰感便有善惡否曰自是有善惡曰何謂心無私主則有感皆通曰心無私主不是溟涬沒理會也只是公善則好之惡則惡之善則賞之惡則刑之此是聖人至神之化心無私主如天地一般寒則遍天下皆寒熱則遍天下皆熱便是有感皆通曰心無私主最難曰只是克去己私便心無私主若心有私主只是相契者應不相契者則不應如好讀書人見讀書便愛不好讀書人見書便不愛淳器之問程子說感通之理曰如晝而夜夜而復晝循環不窮所謂一動一靜互為其根皆是感通之理木之問所謂天下之理無獨必有對便是這話否曰便是天下事那件無對來陰與陽對動與靜對一物便與一理對君可謂尊矣便與民為對人說碁盤中間一路無對某說道便與許多路為對因舉寒往則暑來暑往則寒來與屈伸消長之說邵氏擊壤集云上下四方謂之宇古往今來謂之宙因說易咸感處伊川說得未備往來自還他有自然之理惟正靜為主則吉而悔亡至於憧憧則私為主而思慮之所及者朋從所不及者不朋從矣是以事未至則迎之事已過則將之全掉脫不下今人皆病於無公平之心所以事物之來少有私意雜焉則陷於所偏重矣木之趙致道問感通之理曰感是事來感我通是自家受他感處之意時舉問程子說感應在學者日用言之則如何曰只因這一件事又生出一件事便是感與應因第二件事又生出第三件事第二件事又是感第三件事又是應如王文正公平生儉約家無姬妾自東封後真宗以太平宜共享令直省官為買妾公不樂有沈倫家鬻銀器花籃火筒之屬公嚬蹙曰吾家安用此其後姬妾既具乃復呼直省官求前日沈氏銀器而用之此買妾底便是感買銀器底便是應淳繫辭解咸九四據爻義看上文說貞吉悔亡貞字甚重程子謂聖人感天下如雨暘寒暑無不通無不應者貞而已矣所以感人者果貞矣則吉而悔亡蓋天下本無二理果同歸矣何患乎殊塗果一致矣何患乎百慮所以重言何思何慮也如日月寒暑之往來皆是自然感應如此日不往則月不來月不往則日不來寒暑亦然往來只是一般往來但憧憧之往來者患得患失既要感這箇又要感那箇便自憧憧忙亂用其私心而已屈伸相感而利生焉者有晝必有夜設使長長為晝而不夜則何以息夜而不晝安得有此光明春氣固是和好只有春夏而無秋冬則物何以成一向秋冬而無春夏又何以生屈伸往來之理所以必待迭相為用而後利所由生春秋冬夏只是一箇感應所應復為感所感復為應也春夏是一箇大感秋冬則必應之而秋冬又為春夏之感以細言之則春為夏之感夏則應春而又為秋之感秋為冬之感冬則應秋而又為春之感所以不窮也尺蠖不屈則不可以伸龍蛇不蟄則不可以藏身今山林冬暖而蛇出者往往多死此即屈伸往來感應必然之理夫子因往來兩字說得許多大又推以言學所以內外交相養亦只是此理而已橫渠曰事豫吾內求利吾外素利吾外致養吾內此下學所當致力處過此以上則不容計功所謂窮神知化乃養盛自至非思勉所及此則聖人事矣謨或說貞吉悔亡憧憧往來朋從爾思云一往一來皆感應之常理也加憧憧焉則私矣此以私感彼以私應所謂朋從爾思非有感必通之道矣先生然之又問往來是心中憧憧然往來猶言往來於懷否曰非也下文分明說日往則月來月往則日來寒往則暑來暑往則寒來安得為心中之往來伊川說微倒了所以致人疑一往一來感應之常理也自然如此又問是憧憧於往來之間否曰亦非也這箇只是對那日往則月來底說那箇是自然之往來此憧憧者是加私意不好底往來憧憧只是加一箇忙迫底心不能順自然之理猶言助長正心與計獲相似方往時又便要來方來時又便要往只是一箇忙又曰方做去時是往後面來底是來如人耕種下種是往少間禾生是來問憧憧往來如霸者以私心感人便要人應自然往來如王者我感之也無心而感其應我也無心而應周遍公溥無所私係是如此否曰也是如此又問此以私而感恐彼之應者非以私而應只是應之者有限量否曰也是以私而應如自家以私惠及人少間被我之惠者則以我為恩不被我之惠者則不以我為恩矣王者之感如云王用三驅失前禽去者不以為恩獲者不以為怨如此方是公正無私心又問天下何思何慮人固不能無思慮只是不可加私心欲其如此否曰也不曾教人不得思慮只是道理自然如此感應之理本不消思慮空費思量空費計較空費安排都是枉了無益於事只順其自然而已因問某人在位當日之失便是如此不能公平其心翕受敷施每廣坐中見有這邊人即加敬與語其他皆不顧以至差遣之屬亦有所偏重此其所以收怨而召禍也曰這事便是難說今只是以成敗論人不知當日事勢有難處者若論大勢則九分九釐須還時節或其人見識之深淺力量之廣狹病卻在此以此而論卻不是前輩有云牢籠之事吾不為也若必欲人人面分上說一般話或慮其人不好他日或為吾患遂委曲牢籠之此卻是憧憧往來之心與人說話或偶然與這人話未終因而不暇及其他如何逐人面分問勞他得李文靖為相嚴毅端重每見人不交一談或有諫之者公曰吾見豪俊跅弛之士其議論尚不足以起發人意今所謂通家子弟每見我語言進退之間尚周章失措此等有何識見而足與語徒亂人意耳王文正李文穆皆如此不害為賢相豈必人人皆與之語耶宰相只是一箇進賢退不肖若著一毫私心便不得前輩嘗言做宰相只要辦一片心辦一雙眼心公則能進賢退不肖眼明則能識得那箇是賢那箇是不肖此兩言說盡做宰相之道只怕其所好者未必真賢其所惡者未必真不肖耳若真箇知得更何用牢籠且天下之大人才之眾可人人牢籠之耶或問如一樣小人涉歷既多又未有過失自家明知其不肖將安所措之曰只恐居其位不久若久少間此等小人自然退聽不容他出來也今之為相者朝夕疲精神於應接書簡之間更何暇理會國事世俗之論遂以此為相業然只是牢籠人住在那裏今日一見明日一請或住半年周歲或住數月必不得已而後與之其人亦以為宰相之顧我厚令我得好差遣而去賢愚同滯舉世以為當然有一人焉略欲分別善惡杜絕干請分諸闕於部中己得以免應接之煩稍留心國事則人爭非之矣且以當日所用之才觀之固未能皆賢然比之今日為如何今日之謗議者皆昔之遭擯棄之人也其論固何足信此下逸兩句若牢籠得一人則所謂小人者豈止此一人與一人則千百皆怨矣且吾欲牢籠之能保其終不畔己否已往之事可以鑒矣如公之言卻是憧憧往來之心也其人之失處卻不在此卻是他未能真知賢不肖之分耳或曰如某人者也有文采也廉潔豈可棄之耶曰公欲取賢才耶取文采耶且其廉一己之事耳何足以救其利口覆邦家之禍哉今世之人見識一例低矮所論皆卑某嘗說須是盡吐瀉出那肚裏許多鏖糟惡濁底見識方略有進處譬如人病傷寒在上則吐在下則瀉如此方得病除或曰近日諸公多有為持平之說者如何曰所謂近時惡濁之論此是也不成議論某嘗說此所謂平者乃大不平也不知怎生平得僩問胡文定說元祐某人建議欲為調停之說者云但能內君子而外小人天下自治何必深治之哉此能體天理人欲者也此語亦似持平之論如何曰文定未必有此論然小人亦有數般樣若一樣可用底也須用或有事勢危急翻轉後其禍不測或只得隱忍權以濟一時之急耳然終非常法也明道當初之意便是如此欲使諸公用熙豐執政之人與之共事令變熙豐之法或他日事翻則其罪不獨在我他正是要使術然亦拙謀諺所謂掩目捕雀我卻不見雀不知雀卻看見我你欲以此術制他不知他之術更高你在所以後來溫公留章子厚欲與之共變新法卒至簾前悖詈得罪而去章忿叫曰他日不能陪相公喫劍得便至如此無可平之理盡是拙謀某嘗說今世之士所謂巧者是大拙無有能以巧而濟者都是枉了空費心力只有一箇公平正大行將去其濟不濟天也古人間有如此用術而成者都是偶然不是他有意智要之都不消如此決定無益張子房號為有意智者以今觀之可謂甚疏如勸帝與項羽和而反兵伐之此成甚意智只是他命好使一番了第二番又被他使得勝又曰古人做得成者不是他有智只是偶然只有一箇正其誼不謀其利明其道不計其功其他費心費力用智用數牢籠計較都不濟事都是枉了又曰本朝以前宰相見百官皆以班見國忌拈香歸來回班以見宰相見時有刻數不知過幾刻便喝相公尊重用屏風攔斷也是省事攔截了幾多干請私曲底事某舊見陳魏公湯進之為相時那時猶無甚人相見每見不過五六人十數人他也隨官之崇卑做兩番請今則不勝其多為宰相者每日只了得應接更無心理會國事如此者謂之有相業有精神秦會之也是會做嚴毅尊重不妄發一談其答人書只是數字今宰相答人書凛地委曲詳盡人皆翕然稱之只是不曾見已前事只見後來習俗遂以為例其有不然者便群起非之矣溫公作相日有一客位榜分作三項云訪及諸君若睹朝政闕遺庶民疾苦欲進忠言請以奏牘聞於朝廷某得與同僚商議擇可行者取旨行之若但以私書寵喻終無所益若光身有過失欲賜規正則可以通書簡分付吏人傳入光得內自省訟佩服改行至於理會官職差遣理雪罪名凡于身計並請一面進狀光得與朝省眾官公議施行若在私第垂訪不請語及此皆前輩做處又曰伊川云祢俗雷同不喚做隨時惟嚴毅特立乃隨時也而今人見識低只是祢流俗之論流俗之論便以為是是可歎也公們只是見那向時不得差遣底人說他自是怨他若教公去做看方見得難且如有兩人焉自家平日以一人為賢一人為不肖若自家執政定不肯捨其賢而舉其不肖定是舉其賢而捨其不肖若舉此一人則彼一人怨必矣如何盡要他說好得只怕自家自認不破賢者卻以為不肖不肖者卻以為賢如此則乖若認得定何害又有一樣人底半間不界可進可退自家卻以此為賢以彼為不肖此尤難認便是難又曰舜有大功二十以其舉十六相而去四凶也若如公言卻是舜有大罪二十矣僩問咸之九五傳曰感非其所見而說者此是任貞一之理則如此曰武王不泄邇不忘遠是其心量該遍故周流如此是此義也方罱恒恒是箇一條物事徹頭徹尾不是尋常字古字作其說象一隻船兩頭靠岸可見徹頭徹尾值履之問常非一定之謂一定則不能恒矣曰物理之始終變易所以為恒而不窮然所謂不易者亦須有以變通乃能不窮如君尊臣卑分固不易然上下不交也不得父子固是親親然所謂命士以上父子皆異宮則又有變焉惟其如此所以為恒論其體則終是恒然體之常所以為用之變用之變乃所以為體之恒道夫恒非一定之謂故晝則必夜夜而復晝寒則必暑暑而復寒若一定則不能常也其在人冬日則飲湯夏日則飲水可以仕則仕可以止則止今日道合便從明日不合則去又如孟子辭齊王之金而受薛宋之餽皆隨時變易故可以為常也道夫能常而後能變能常而不已所以能變及其變也常亦只在其中伊川卻說變而後能常非是僩正便能久天地之道恒久而不已這箇只是說久淵物各有箇情有箇人在此決定是有那羞惡惻隱是非辭讓之情性只是箇物事情卻多般或起或滅然而頭面卻只一般長長恁地這便是觀其所恒而天地萬物之情可見之義乃若其情只是去情上面看淵叔重說浚恒貞凶恐是不安其常而深以常理求人之象程氏所謂守常而不能度勢之意曰未見有不安其常之象只是欲深以常理求人耳時舉問恒其德貞婦人吉夫子凶德指六謂常其柔順之德固貞矣然此婦人之道非夫子之義蓋婦人從一而終以順為正夫子則制義者也若從婦道則凶曰固是如此然須看得象占分明六五有恒其德貞之象占者若婦人則吉夫子則凶大底看易須是曉得象占分明所謂吉凶者非爻之能吉凶爻有此象而占者視其德而有吉凶耳且如此爻不是既為婦人又為夫子只是有恒其德貞之象而以占者之德為吉凶耳又如恒固能亨而無咎然必占者能久於其道方亨而無咎又如九三不恒其德非是九三能不恒其德乃九三有此象耳占者遇此雖正亦吝若占者能恒其德則無羞吝銖遯問遯卦遯字雖是逃隱大抵亦取遠去之意天上山下相去甚遼絕象之以君子遠小人則君子如天小人如山相絕之義須如此方得所以六爻在上漸遠者愈善也曰恁地推亦好此六爻皆是君子之事學履問遯亨遯而亨也分明是說能遯便亨下更說剛當位而應與時行也是如何曰此其所以遯而亨也陰方微為他剛當位而應所以能知時而遯是能與時行不然便是與時背也礪問小利貞浸而長也是見其浸長故設戒令其貞正且以寬君子之患然亦是他之福曰是如此此與否初二兩爻義相似同問小利貞以彖辭小利貞浸而長也之語觀之則小當為陰柔小人如小往大來小過小畜之小言君子能遯則亨小人則利於守正不可以浸長之故而浸迫於陽也此與程傳遯者陰之始長君子知微故當深戒而聖人之意未遽已故有與時行小利貞之教之意不同曰若如程傳所云則於剛當位而應與時行也之下當云止而健陰進而長故小利貞今但言小利貞浸而長也而不言陰進而長則小指陰小之小可知況當遯去之時事勢已有不容正之者程說雖善而有不通矣又問遯尾厲勿用有攸往者言不可有所往但當晦處靜俟耳此意如何曰程傳作不可往謂不可去也言遯已後矣不可往往則危往既危不若不往之為無梨某竊以為不然遯而在後尾也既已危矣豈可更不往乎若作占辭看尤分明先生又言執之用黃牛之革莫之勝說此言象而占在其中六二亦有此德也說吐活反九四君子吉小人否否方九反銖伊川說小利貞云尚可以有為陰已浸長如何可以有為所說王允謝安之於漢晉恐也不然王允是算殺了董卓謝安是乘王敦之老病皆是他衰微時節不是浸長之時也兼他是大臣亦如何去此為在下位有為之兆者則可以去大臣任國安危君在與在君亡與亡如何去又曰王允不合要盡殺梁州兵所以致敗礪遯尾厲到這時節去不迭了所以危厲不可有所往只得看他如何賢人君子有這般底多淵問畜臣妾吉伊川云待臣妾之道君子之待小人亦不如是如何曰君子小人更不可相對更不可與相接若臣妾是終日在自家腳手頭若無以係之則望望然去矣又曰易中詳識物情備極人事都是實有此事今學者平日只在燈涜下習讀不曾應接世變一旦讀此皆看不得某舊時也如此即管讀得不相入所以常說易難讀礪問九五嘉遯以陽剛中正漸向遯極故為嘉美未是極處故戒以貞正則吉曰是如此便是剛當位而應處是去得恰好時節小人亦未嫌自家只是自家合去莫見小人不嫌卻與相接而不去便是不好所以戒他貞正礪大壯問大壯大者正與正大不同上大字是指陽下正大是說理曰亦緣上面有大者正一句方說此學履大壯利貞利於正也所以大者以其正也既正且大則天地之情不過於此燾問雷在天上大壯君子以非禮弗履伊川云云其義是否曰固是君子之自治須是如雷在天上恁地威嚴猛烈方得若半上落下不如此猛烈果決濟得甚事僩或問伊川自勝者為強之說如何曰雷在天上是甚威嚴人之克己能如雷在天上則威嚴果決以去其惡而必於為善若半上落下則不濟事何以為君子須是如雷在天上方能克去非禮燾此卦如九二貞吉只是自守而不進九四藩決不羸壯於大輿之輹卻是有可進之象此卦爻之好者蓋以陽居陰不極其剛而前遇二陰有藩決之象所以為進非如九二前有三四二陽隔之不得進也又曰喪羊于易不若作疆埸之易漢食貨志疆埸之埸正作易蓋後面有喪羊于易亦同此義今本義所注只是從前所說如此只且仍舊耳上六取喻甚巧蓋壯終動極無可去處如羝羊之角掛於藩上不能退遂然艱則吉者畢竟有可進之理但必艱始吉耳銖問大壯本好爻中所取卻不好睽本不好爻中所取卻好如六五對九二處非其位九四對上九本非相應都成好爻不知何故曰大壯便是過了纔過便不好如睽卦之類卻是易之取爻多為占者而言占法取變爻便是到此處變了所以困卦雖是不好然其間利用祭祀之屬卻好問此正與群龍無首利水貞一般曰然卻是變了故如此榦此卦多說羊羊是兌之屬季通說這箇是夾住底兌卦兩畫當一畫淵晉康侯似說寧侯相似用錫馬之用只是箇虛字說他得這箇物事淵晝日是那上卦離也晝日為之是此意淵問初六晉如摧如象也貞吉占辭曰罔孚裕無咎又是解上兩句恐貞吉說不明故又曉之又問受茲介福於其王母指六五以為享先妣之吉占何也曰恐是如此蓋周禮有享先妣之禮又問眾允悔亡曰眾允象也悔亡占也又問晉其角維用伐邑本義作伐其私邑程傳以為自治如何曰便是程傳多不肯說實事皆以為取喻伐邑如墮費墮郈之類是也大抵今人說易多是見易中有此一語便以為通體事當如此不知當其時節地頭其人所占得者其象如何若果如今人所說則易之說有窮矣又如摧如愁如易中少有此字疑此爻必有此象但今不可曉耳銖晉六三如何見得為眾所信處既不中正眾方不信雖能信之又安能悔亡曰晉之時二陰皆欲上進三處地較近故二陰從之以進問如何得悔亡曰居非其位本當有悔以其得眾故悔可亡榦問六五悔亡失得勿恤往吉無不利伊川以為六以柔居尊位本當有悔以大明而下皆順附故其悔亡下既同德順附當推誠委任盡眾人之才通天下之志勿復自任其明恤其失得如此而往則吉而無不利此說是否曰便是伊川說得太深據此爻只是占者占得此爻則不必恤其失得而自亦無所不利耳如何說得人君既得同德之人而委任之不復恤其失得如此則蕩然無復是非而天下之事亂矣假使其所任之人或有作亂者亦將不恤之乎雖以堯舜之聖皋夔益稷之賢猶云屢省乃成如何說既得同心同德之人而任之則在上者一切不管而任其所為豈有此理且彼所為既失矣為上者如何不恤得聖人無此等說話聖人所說卦爻只是略略說過以為人當著此爻則大勢已好雖有所失得亦不必慮而自無所不利也聖人說得甚淺伊川說得太深聖人所說短伊川解得長久之又云失得勿恤只是自家自作教是莫管他得失如士人發解做官這箇卻必不得只得盡其所當為者而已如仁人正其誼不謀其利明其道不計其功相似僩失得勿恤此說失也不須問他得也不須問他自是好猶言勝負兵家之常云爾此卦六爻無如此爻吉淵晉上九剛進之極以伐私邑安能吉而無咎曰以其剛故可伐邑若不剛則不能伐邑矣但易中言伐邑皆是用之於小若伐國則其用大矣如高宗伐鬼方之類維用伐邑則不可用之於大可知雖用以伐邑然亦必能自危厲乃可以吉而無咎過剛而能危厲則不至於過剛矣榦看伯豐與廬陵問答內晉卦伐邑說曰晉上九貞吝吝不在克治正以其克治之難而言其合下有此吝耳貞吝之義諸義只云貞固守此則吝不應於此獨云於正道為吝也明夷明夷未是說闇之主只是說明而被傷者乃君子也上六方是說闇君子出門庭言君子去闇尚遠可以得其本心而遠去文王箕子大概皆是晦其明然文王外柔順是本分自然做底箕子晦其明又云艱是他那佯狂底意思便是艱難底氣象爻說貞而不言艱者蓋言箕子則艱可見不必更言之淵君子用晦而明晦地象明日象晦則是不察察若晦而不明則晦得沒理會了故外晦而內必明乃好學履明夷初二二爻不取爻義曰初爻所傷地遠故雖傷而尚能飛問初爻比二爻似二爻傷得淺初爻傷得深曰非也初尚能飛但垂翼耳榦問明夷曰下三爻皆說明夷是明而見傷者六四爻說者卻以為姦邪之臣先蠱惑其君心而後肆行於外殊不知上六是暗主六五卻不作君說六四之與上六既非正應又不相比又況下三爻皆說明夷是好底何獨比爻卻作不好說故某於此爻之義未詳但以意觀之六四居暗地尚淺猶可以得意而遠去故雖入於幽隱之處猶能獲明夷之心於出門庭也故小象曰獲心意也上六不明晦則是合下已是不明故初登於天可以照四國而不免後入於地則是始於傷人之明而終於自傷以墜其命矣呂原明以為唐明皇可以當之蓋言始明而終暗也銖家人問家人彖辭不盡取象曰注中所以但取二五不及他象者但只因彖傳而言耳大抵彖傳取義最精象中所取卻恐有假合處榦問風自火出曰謂如一爐火必有氣衝上去便是風自火出然此只是言自內及外之意燾學履錄云是火中有風如一堆火在此氣自薰蒸上出王假有家言到這裏方且得許多物事有妻有妾方始成箇家淵問王假有家曰有家之有只是如夙夜浚明有家亮采有邦之有謂有三德者則夙夜浚明於其家有六德者則亮采於其邦有是虛字非如奄有四方之有也銖或問易傳云正家之道在於正倫理篤恩義今欲正倫理則有傷恩義欲篤恩義又有乖於倫理如何曰須是於正倫理處篤恩義篤恩義而不失倫理方可柄睽睽皆言始異終同之理淵問君子以同而異曰此是取兩象合體為同而其性各異在人則是和而不同之意蓋其趨則同而所以為同則異如伯夷柳下惠伊尹三子所趨不同而其歸則一彖辭言睽而同大象言同而異在人則出處語默雖不同而同歸於理講論文字為說不同而同於求合義理立朝論事所見不同而同於忠君本義所謂二卦合體者言同也而性不同者言異也以同而異語意與用晦而明相似大凡讀易到精熟後顛倒說來皆合不然則是死說耳又問睽卦無正應而同德相應者何曰無正應所以為睽當睽之時當合者既離其離者卻合也銖問君子以同而異作理一分殊看如何曰理一分殊是理之自然如此這處又就人事之異上說蓋君子有同處有異處如所謂周而不比群而不黨是也大抵易中六十四象下句皆是就人事之近處說不必深去求他此處伊川說得甚好學履過舉程子睽之象君子以同而異解曰不能大同者亂常咈理之人也不能獨異者隨俗習非之人也要在同而能異爾又如今之言地理者必欲擇地之吉是同也不似世俗專以求富貴為事惑亂此心則異矣如士人應科舉則同也不曲學以阿世則異矣事事推去斯得其旨過馬是行底物初間行不得後來卻行得大率睽之諸爻都如此多說先異而後同淵問睽見惡人其義何取曰以其當睽之時故須見惡人乃能無咎榦天合作而剃鬚也篆文天作而作淵宗如同人于宗之宗淵載鬼一車等語所以差異者為他這般事是差異底事所以卻把世間差異底明之世間自有這般差異底事淵蹇蹇利西南是說坤卦分曉但不知從何插入這坤卦來此須是箇變例聖人到這裏看見得有箇做坤底道理大率陽卦多自陰來陰卦多自陽來震是坤第一畫變坎是第二畫變艮是第三畫變易之取象不曾確定了他淵蹇無坤體只取坎中爻變如沈存中論五姓一般蹇利西南謂地也據卦體艮下坎上無坤而繇辭言地者往往只取坎中爻變變則為坤矣沈存中論五姓自古無之後人既如此呼喚即便有義可推淵潘謙之書曰蹇與困相似君子致命遂志君子反身修德亦一般殊不知不然象曰澤無水困是盡乾燥處困之極事無可為者故只得致命遂志若山上有水蹇則猶可進步如山下之泉曲折多艱阻然猶可行故教人以反身修德豈可以困為比只觀澤無水困與山上有水蹇二句便全不同學履僩同問往蹇來譽曰來往二字唯程傳言上進則為往不進則為來說得極好今人或謂六四往蹇來連是來就三九三往蹇來反是來就二上六往蹇來碩是來就五亦說得通但初六來譽則位居最下無可來之地其說不得通矣故不若程傳好只是不往為佳耳不往者守而不進故不進則為來諸爻皆不言吉蓋未離乎蹇中也至上六往蹇來碩吉卻是蹇極有可濟之理既是不往惟守於蹇則必得見九五之大人與共濟蹇而有碩大之功矣銖問蹇九五何故為大蹇曰五是為蹇主凡人臣之蹇只是一事至大蹇須人主當之礪問大蹇朋來之義曰處九五尊位而居蹇之中所以為大蹇所謂遺大投艱於朕身人君當此則須屈群策用群力乃可濟也學履僩同解先生舉無所往其來復吉程傳以為天下之難已解而安平無事則當修復治道正紀綱明法度復先代明王之治夫禍亂既平正合修明治道求復三代之規模卻只便休了兩漢以來人主還有理會正心誠意否須得人主如窮閻陋巷之士治心修身講明義理以此應天下之務用天下之才方見次第因言神廟大有為之主勵精治道事事要理會過是時卻有許多人才若專用明道為大臣當大段有可觀明道天資高又加以學誠意感格聲色不動而事至立斷當時用人參差如此亦是氣數舛逆德明天地解而雷雨作陰陽之氣閉結之極忽然迸散出做這雷雨只管閉結了若不解散如何會有雷雨作小畜所以不能成雷雨者畜不極也雷便是如今一箇爆杖淵六居三大率少有好底負且乘聖人到這裏又見得有箇小人乘君子之器底象故又於此發出這箇道理來淵問解而拇朋至斯孚曰四與初皆不得正四能解而拇者以四雖陰位而才則陽與初六陰柔則為有間所以能解去其拇故得陽剛之朋類至而相信矣銖射隼于高墉聖人說易大概是如此不似今人說底向來欽夫書與林艾軒云聖人說易卻則恁地此卻似說得易了淵損二簋與簋貳字不同可見其義亦不同淵懲忿如救火窒欲如防水大雅問懲忿窒慾忿怒易發難制故曰懲懲是戒於後慾之起則甚微漸漸到熾處故曰窒窒謂塞於初古人說情竇竇是罅隙須是塞其罅隙曰懲也不專是戒於後若是怒時也須去懲治他始得所謂懲者懲於今而戒於後耳窒亦非是真有箇孔穴去塞了但遏絕之使不行耳又曰山下有澤損君子以懲忿窒慾風雷益君子以見善則遷有過則改觀山之象以懲忿觀澤之象以窒慾慾如汙澤然其中穢濁解汙染人須當填塞了如風之迅速以遷善如雷之奮發以改過廣云觀山之象以懲忿是如何曰人怒時自是恁突兀起來故孫權曰令人氣湧如山廣問山下有澤損君子以懲忿窒慾風雷益君子以見善則遷有過則改曰伊川將來相牽合說某不曉看來人自有遷善時節自有改過時節不必只是一件事某看來只是懲忿如摧山窒慾如填壑遷善如風之迅改過如雷之烈又曰聖人取象亦只是箇大約彷彿意思如此若纔著言語窮他便有說不去時如後面小象若更教孔子添幾句也添不去僩酌損之在損之初下猶可以斟酌也淵問損卦三陽皆能益陰而二與上二爻則曰弗損益之初則曰酌損之何邪曰這一爻難解只得用伊川說又云易解得處少難解處多今且恁地說去到那占時又自別消詳有應處難立為定說也學履三人行損一人三陽損一一人行得其友一陽上去換得一陰來淵或益之十朋之龜為句淵得臣無家猶言化家為國相似得臣有家其所得也小矣無家則可見其大淵問損卦下三爻皆損己益人四五兩爻是損己從人上爻有為人上之象不待損己而自有以益人曰下三爻無損己益人底意只是盛到極處去不得自是損了四爻損其疾只是損了那不好了便自好五爻是受益也無損己從人底意礪益問木道乃行程傳以為木字本益字之誤如何曰看來只是木字渙卦說乘木有功中孚說乘木舟虛以此見得只是木字又問或擊之曰或字眾無定主之辭言非但一人擊之也立心勿恒勿字只是不字非禁止之辭此處亦可疑且闕之銖木道乃行不須改木字為益字只木字亦得見一朋友說有八卦之金木水火土有五行之金木水火土如乾為金易卦之金也兌之金五行之金也巽為木是卦中取象震為木乃東方屬木五行之木也五行取四維故也去偽某昨日思風雷益君子以遷善改過遷善如風之速改過如雷之猛祖道曰莫是才遷善便是改過否曰不然遷善字輕改過字重遷善如慘淡之物要使之白改過如黑之物要使之白用力自是不同遷善者但見是人做得一事強似我心有所未安即便遷之儒用錄云只消當下遷過就他底若改過須是大段勇猛始得又曰公所說蒙與蠱二象卻有意思如山下有澤損君子以懲忿窒慾必是降下山以塞其澤便是此象六十四卦象皆如此祖道儒用同問遷善改過曰風是一箇急底物見人之善己所不及遷之如風之急雷是一箇勇決底物己有過便斷然改之如雷之勇決不容有些子遲緩賜元吉無咎吉凶是事咎是道理蓋有事則吉而理則過差者是之謂吉而有咎淵享于帝吉是祭則受福底道理淵益之用凶事猶書言用降我凶德嘉績於朕邦淵伊川說易亦有不分曉處甚多如益之用凶事說作凶荒之凶直指刺史郡守而言在當時未見有這守令恐難以此說某謂益之用凶事者言人臣之益君甚難必以危言鯁論恐動其君而益之雖以中而行然必用圭以通其信若不用圭以通之又非忠以益於君者也中行與依見不得是指誰淵利用遷國程昌寓守壽春虜人來占得此爻遷來鼎州後平楊么有功淵方子錄云守蔡州益損二卦說龜一在二一在五是顛倒說去未濟與既濟說伐鬼方亦然不知如何未濟看來只陽爻便好陰爻便不好但六五上九二爻不知是如何蓋六五以得中故吉上九有可濟之才又當未濟之極可以濟矣卻云不吉更不可曉學蒙大抵損益二卦諸爻皆互換損好益卻不好如損六五卻成益六二損上九好益上九卻不好淵夬用之說夬卦云聖人於陰消陽長之時亦如此戒懼其警戒之意深矣曰不用如此說自是無時不戒慎恐懼不是到這時方戒懼不成說天下已平治可以安意肆志只才有些放肆便弄得靡所不至僩揚于王庭孚號有厲若合開口處便雖有劍從自家頭上落也須著說但使功罪各當是非顯白於吾何慊道夫夬卦中號字皆當作戶羔反唯孚號古來作去聲看來亦只當作平聲僩壯于前趾與大壯初爻同此卦大率似大壯只爭一畫淵王子獻卜遇夬之九二曰惕號莫夜有戎勿恤吉卜者告之曰必夜有驚恐後有兵權未幾果夜遇寇旋得洪帥淵問九三壯于頄曰君子之去小人不必悻悻然見於面目至於遇雨而為所濡濕雖為眾陽所慍然志在決陰必能終去小人故亦可得無咎也蓋九三雖與上六為應而實以剛居剛有能決之象故壯于頄則有凶而和柔以去之乃無咎如王允之於董卓溫嶠之於王敦是也又曰彖云利有攸往剛長乃終今人以為陽不能無陰中國不能無夷狄君子不能無小人故小人不可盡去今觀剛長乃終之言則聖人豈不欲小人之盡去耶但所以決之者自有道耳又問夬卦辭言孚號九二言惕號上九言無號取象之義如何曰卦有兌體兌為口故多言號也又問以五陽決一陰君子盛而小人衰之勢而卦辭則曰告自邑不利即戎初九壯于前趾則往不勝九二惕號則有戎勿恤壯于頄則凶牽羊則悔亡中行無咎豈去小人之道須先自治而嚴厲戒懼不可安肆耶曰觀上六一爻則小人勢窮無號有凶之時而君子去之之道猶當如此嚴謹自做手腳蓋不可以其勢衰而安意自肆也其為戒深矣銖九三壯于頄看來舊文本義自順不知程氏何故欲易之有慍也是自不能堪正如顏杲卿使安祿山受其衣服至道間與其徒曰吾輩何為服此歸而借兵伐之正類此也卦中與復卦六四有獨字此卦諸爻皆欲去陰獨此一爻與六為應也是惡模樣礪伊川改九三爻次序看來不必改淵這幾卦都說那臀不可曉淵牽羊悔亡其說得於許慎之淵莧陸是兩物莧者馬齒莧陸者章陸一名商陸皆感陰氣多之物藥中用商陸治水腫其子紅淵錄云其物難乾學履中行無咎言人能剛決自勝其私合乎中行則得無咎無咎但能補過而已未是極至處這是說那微茫間有些箇意思斷未得釋氏所謂流注想荀子所謂偷則自行便是這意思照管不著便走將去那裏去爻雖無此意孔子作象所以裨爻辭之不足如自我致寇敬慎不敗之類甚多中行無咎易中卻不恁地看言人占得此爻者能中行則無咎不然則有咎淵中行無咎中未光也事雖正而意潛有所係吝荀子所謂偷則自行佛家所謂流注不斷皆意不誠之本也淵姤不是說陰漸長為女壯乃是一陰遇五陽淵大率姤是一箇女遇五陽是箇不正當底如人盡夫也之事聖人去這裏又看見得那天地相遇底道理出來淵姤是不好底卦然天地相遇品物咸章剛遇中正天下大行卻又甚好蓋天地相遇又是別取一義剛遇中正只取九五或謂亦以九二言非也銖問姤之時義大矣哉本義云幾微之際聖人所謹與伊川之說不同何也曰上面說天地相遇至天下大行也正是好時節而不好之漸已生於微矣故當謹於此學履金柅或以為止車物或以為絲羇不可曉廣又不知此卦如何有魚象或說離為鱉為蟹為蠃為蚌為龜魚便在裏面了不知是不是此條未詳淵包無魚又去這裏見得箇君民底道理陽在上為君陰在下為民淵有隕自天言能回造化則陽氣復自天而隕復生上來都換了這時節淵萃大率人之精神萃於己祖考之精神萃於廟淵順天命說道理時彷彿如伊川說也去得只是文勢不如此他是說豐萃之時若不用大牲則便是那以天下儉其親相似也有此理這時節比不得那利用禴之事他這彖辭散漫說說了王假有廟又說利見大人又說用大牲吉大率是聖人觀象節節地看見許多道理看到這裏見有這箇象便說出這一句來又看見那箇象又說出那一箇理來然而觀象則今不可得見是如何地觀矣淵問澤上於地萃君子以除戎器戒不虞曰大凡物聚眾盛處必有爭故當預為之備又澤本當在地中今卻上出於地上則是水盛長有潰決奔突之憂故取象如此僩不知如何地說箇一握底句出來淵孚乃利用禴說如伊川固好但若如此卻是聖人說箇影子卻恐不恁地想只是說祭升卦同淵問九五萃有位以陽剛居中正當萃之時而居尊位安得又有匪孚曰此言有位而無德則雖萃而不能使人信故人有不信當修其元永貞之德而後悔亡也又曰王假有廟是祖考精神聚於廟又為人必能聚己之精神然後可以至於廟而承祖考今人擇日祀神多取神在日亦取聚意也銖問九五一爻亦似甚好而反云未光也是如何曰見不得讀易似這樣且恁地解去若強說便至鑿了學履升升南征吉巽坤二卦拱得箇南如看命人虛拱底說話礪地中生木升君子以順德積小以高大木之生也無日不長一日不長則木死矣人之學也一日不可已不日而已則心必死矣人傑地中生木升汪丈嘗云曾考究得樹木之生日日滋長若一日不長便將枯瘁便是生理不接學者之於學不可一日少懈大抵德須日日要進若一日不進便退近日學者才相疏便都休了問升萃二卦多是言祭享萃固取聚義不知升何取義曰人積其誠意以事鬼神有升而上通之義又曰六五貞吉升階與萃九五萃有位匪孚元永貞悔亡皆謂有其位必當有其德若無其德則萃雖有位而人不信雖有升階之象而不足以升矣銖元德問王用亨于岐山云只是享字古文無享字所謂亨享烹只是通用又曰乾元亨利貞屯之元亨利貞只一般聖人借此四字論乾之德本非四件事也時舉亨于岐山與亨于西山只是說祭山川想不到得如伊川說淵
