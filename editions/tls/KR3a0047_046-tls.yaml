body:
  text: 朱子語類卷第四十六論語二十八季氏篇季氏將伐顓臾章問焉用彼相曰看扶持兩字恐只是相瞽者之義舊見一人亦如此說又問相夫子之義曰相亦是贊相之義瞽者之相亦是如此問集注顓臾在魯地七百里之中從孟子百里之說則魯安得七百里之地曰七百里是禮記如此說封周公曲阜之地七百里如左傳也有一同之說某每常疑此處若是百里無此間龍溪漳浦縣地又如何做得侯國如何又容得顓臾在其中所謂錫之山川土田附庸其勢必不止於百里然此處亦難考究只得且依禮記恁地說宇砥錄云周禮國語皆說五百里禮記說七百里若如孟子說百里則未若今之一邑何以為國又如何容得一箇顓臾在肚裏問諸家多把虎兕喻季氏龜玉喻公室是否曰文義未有此意且是答他二臣者皆不欲之意虎在山上龜玉在他處不干典守者事今在柙中走了在櫝中毀了便是典守者之過上面冉求分疏言夫子欲之吾二臣者皆不欲也孔子責他以比典守者之過此伐顓臾實二子與謀之過答問間方且隨話恁地說未說到季氏公室處不必又生枝蔓仲思問獨責求何也曰想他與謀較多一向倒在他身上去亦可知也宇問蕭牆蕭字為義如何曰也不曾考究但據舊說云諸侯至屏內當有肅敬之意亦未知是否燾益者三樂章問樂節禮樂曰此說得淺只是去理會禮樂理會得時自是有益燾味道問損者三樂曰惟宴樂最可畏所謂宴安酖毒是也時舉問三者損益相反佚遊則傲惰而惡聞善如何與樂道人之善相反曰樂道人之善則心常汲汲於好善若是佚遊則是放蕩閑過了日子雖所損稍輕亦非是小害又問樂道人之害則有勉思企及之意佚遊則一向懶惰無向善之心此所以見其相反曰三者如驕樂只是放恣侈靡最害事到得宴樂便須狎近小人疏遠君子賀孫侍於君子有三愆章問未見顏色而言謂之瞽莫是未見事實否曰未見顏色是不能察言觀色曰如此則顏色是指所與言者曰向時范某每奏事未嘗看著聖容時某人為宰相云此公必不久居此未幾果以言不行而去人或問之云若看聖容安能自盡其言自是說得好但某思之不如此對人主言也須看他意思是如何或有至誠傾聽之意或不得已貌為許可自家這裏也須察言觀色因而盡誘掖之方不可汎然言之使泛然受之而已固是有一般小人伺侯人主顏色迎合趨湊此自是大不好但君子之察言觀色用心自不同耳若論對人主要商量天下事如何不看著顏色只恁地說將去便了賀孫君子有三戒章或問君子三戒曰血氣雖有盛衰君子常當隨其偏處警戒勿為血氣所役也因論血氣移人曰疾病亦能移人呂伯恭因病後讀躬自厚而薄責於人忽有見遂一意向這下來大雅問注引范氏說血氣志氣之辨曰到老而不屈者此是志氣時舉問君子有三戒章謝曰簞食豆羹呼爾而與之有所不就蹴爾而與之有所不屑此非義心勝血氣壯故也恐是義心之勝非血氣之壯謝又曰萬鍾與不得則死遠矣有不辨禮義而受之者血氣衰故也恐是不辨禮義則受奚必血氣之衰曰謝說只是傷急闕三數字當云此非特義心自勝亦血氣之壯故也蓋血氣助得義心起來人之血氣衰時則義心亦從而衰夫子三戒正為血氣而言又問謝氏以血氣為氣質曰氣只是一箇氣便浩然之氣也只是這箇氣但只是以道義充養起來及養得浩然卻又能配助義與道也必大君子有三畏章畏天命三字好是理會得道理便謹去做不敢違便是畏之也如非禮勿視聽言動與夫戒慎恐懼皆所以畏天命也然亦須理會得天命是恁地方得燾問大人是指有位者言之否曰不止有位者是指有位有齒有德者皆謂之大人問此三句要緊都在畏天命上曰然纔畏天命自是於大人聖言皆畏之問固是當先畏天命但要緊又須是知得天命天命即是天理若不先知這道理自是懵然何由知其可畏此小人所以無忌憚曰要緊全在知上纔知得便自不容不畏問知有淺深大抵纔知些道理到得做事有少差錯心也便惕然這便見得不容於不畏曰知固有淺深然就他淺深中各自有天然不容已者且如一件事是合如此是不合如此本自分曉到臨事又卻不如此道如此也不妨如此也無害又自做將去這箇是雖知之而不能行然亦是知之未盡知之未至所以如此聖人教人於大學中劈初頭便說一箇格物致知物格而後知至最是要知得至人有知不善之不當為及臨事又為之只是知之未至人知烏喙之殺人不可食斷然不食是真知之也知不善之不當為而猶或為之是特未能真知之也所以未能真知者緣於道理上只就外面理會得許多裏面卻未理會得十分瑩淨所以有此一點黑這不是外面理會不得只是裏面骨子有些見未破所以大學之教使人即事即物就外面看許多一一教周遍又須就自家裏面理會體驗教十分精切也賀孫洛錄云味道問畏天命是箇總頭否曰固是人若不畏這個道理以下事無緣會做得又問若不知得這箇道理如何會畏曰須是先知得方會畏但知得有淺深工夫便隨深淺做去事事物物皆有箇天命若知得盡自是無所不畏惟恐走失了君子有九思章問九思曰不是雜然而思當這一件上思這一件或問君子有九思曰公且道色與貌可以要得他溫要得他恭若是視聽如何要得他聰明曰這只是意誠了自會如此曰若如公說都沒些事了便是聖人教人意思不如此有物必有則只一箇物自各家有箇道理況耳目之聰明得之於天本來自合如此只為私欲蔽惑而失其理聖人教人不是理會一件其餘自會好須是逐一做工夫更反復就心上看方知得外面許多費整頓元來病根都在這裏這見聖人教人內外夾持起來恁地積累成熟便會無些子滲漏如公所說意誠便都無事今有人自道心正了外面任其箕踞無禮是得不得亦有人心下已自近正外面視聽舉止自大段有病痛公道如何視會明聽會聰也只是就視聽上理會視遠惟明聽德惟聰如有一件可喜底物事在眼前便要看他這便被他蔽了到這時節須便知得有箇義理在所可喜此物在所不當視這便是見得道理便是見得遠不蔽於眼前近底故曰視遠惟明有無益之言無稽之言與夫諂諛甘美之言有仁義忠信之言仁義忠信之言須是將耳常常聽著那許多不好說話須莫教他入耳故曰聽德惟聰賀孫問程子曰九者各專其一曰專一者非雜然而思也或曰是主一之義否曰然又云忿思難如一朝之忿忘其身及其親此不思難之故也燾見善如不及章行義以達其道所行之義即所達之道也未行則蘊諸中行則見諸事也燾問行義以達其道莫是所行合宜否曰志是守所達之道道是行所求之志隱居以求之使其道充足行義是得時得位而行其所當為臣之事君行其所當為而已行所當為以達其所求之志又問如孔明可以當此否曰也是如伊尹耕於有莘之野而樂堯舜之道是隱君以求其志及幡然而起使是君為堯舜之君使是民為堯舜之民是行義以達其道蜚卿曰如漆雕開之未能自信莫是求其志否曰所以未能信者但以求其志未說行義以達其道又曰須是篤信如讀聖人之書自朝至暮及行事無一些是則曰聖人且如此說耳這卻是不能篤信篤信者見得是如此便決然如此做孔子曰篤信好學守死善道學者須是篤信驤曰見若鹵莽便不能篤信曰是如此須是一下頭見得是然篤信又須好學若篤信而不好學是非不辨其害卻不小既已好學然後能守死以善其道又問如下文所言莫是篤信之力否曰既是信得過危邦便不入亂邦便不居天下有道便不隱天下無道便不見決然是恁地做驤問見善如不及見不善如探湯上一截是進德之事下一截是成德之事兼出處有非人力所能為者故曰未見其人曰公只管要粧兩句恁地好做甚麼這段緊要卻不在吾見其人未見其人上若將見善如不及見不善如探湯與隱居以求其志行義以達其道這幾句意思涵泳是有多少意思公看文字有箇病不只就文字裏面看卻要去別生閑意大抵看文字須是只就他裏面看儘有意思公今未見得本意是如何卻將一兩句好言語裹了一重沒理會在裏面此是讀書之大病須是且就他本文逐字剔碎了見這道理直透過無些子窒礙如此兩段淺深自易見賀孫問楊氏引達可行於天下解隱居以求其志行義以達其道或問以為未穩何也曰解經當取易曉底句語解難曉底句不當反取難曉底解易曉者隱居以求其志行義以達其道此兩句本自易理會今引達可行於天下解之則所引之句反為難曉天民者達可行於天下而後行之者也橫渠所謂必德覆生民而後出伊呂是也若只是澤被一國道行一鄉此人亦不輕出謂之天民者蓋謂不是尋常之人乃天之民耳天民之云亦猶曰天下之善士云爾與隱居以求其志行義以達其道者又不同必大
