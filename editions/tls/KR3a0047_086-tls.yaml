body:
  text: 朱子語類卷第八十六禮三周禮總論曹問周禮曰不敢教人學非是不可學亦非是不當學只為學有先後先須理會自家身心合做底學周禮卻是後一截事而今且把來說看還有一句干涉吾人身心上事否今只有周禮儀禮可全信禮記有信不得處又曰周禮只疑有行未盡處看來周禮規模皆是周公做但其言語是他人做今時宰相提舉敕令豈是宰相一一下筆有不是處周公須與改至小可處或未及改或是周公晚年作此大抵說制度之書惟周禮儀禮可信禮記便不可深信周禮畢竟出於一家謂是周公親筆做成固不可然大綱卻是周公意思某所疑者但恐周公立下此法卻不曾行得盡文蔚僩錄云周禮是一箇草本尚未曾行問周禮曰未必是周公自作恐是當時如今日編修官之類為之又官名與他書所見多有不同恐是當時作此書成見設官太多遂不用亦如唐六典今存唐時元不曾用又笑曰禁治蝦蟆已專設一官豈不酷耶浩周禮胡氏父子以為是王莽令劉歆撰此恐不然周禮是周公遺典也德周禮一書好看廣大精密周家法度在裏但未敢令學者看方子周禮一書也是做得縝密真箇盛水不漏廣子升問周禮如何看曰也且循注疏看去第一要見得聖人是箇公平底意思如陳君舉說天官之職如膳羞衣服之官皆屬之此是治人主之身此說自是到得中間有官屬相錯綜處皆謂聖人有使之相防察之意這便不是天官是正人主之身兼統百官地官主教民之事大綱已具矣春夏秋冬之官各有所掌如太史等官屬之宗伯蓋以祝史之事用之祭祀之故職方氏等屬之司馬蓋司馬掌封疆之政最是大行人等官屬之司寇難曉蓋儀禮覲禮諸侯行禮既畢出乃右肉袒於廟門之東王曰伯父無事歸寧乃邦然後再拜稽首出自屏此所謂懷諸侯則天下畏之是也所以屬之司寇如此等處皆是合著如此初非聖人私意大綱要得如此看其間節目有不可曉處如官職之多與子由所疑三處之類只得且缺之所謂其詳不可得而聞也或謂周公作此書有未及盡行之者恐亦有此理只如今時法令其間頗有不曾行者木之因說舊時妄意看此書大綱是要人主正心修身齊家治國平天下使天下之民無不被其澤又推而至於鳥獸草木無一不得其所而後已不如是不足以謂之裁成輔相參贊天地耳曰是恁地須要識公平意思因說如今學問不考古固不得若一向去採摭故事零碎湊合說出來也無甚益孟子慨然以天下自任曰當今之世舍我其誰到說制度處只說諸侯之禮吾未之學嘗聞其略也要之後世若有聖賢出來如儀禮等書也不應便行得如封建諸侯柳子厚之說自是當時卻是他各自推戴為主聖人從而定之耳如今若要將一州一縣封某人為諸侯人亦未必安之兼數世之後其弊非一如鄉飲酒之禮若要教天下之人都如此行也未必能只後世太無制度若有聖賢為之就中定其尊卑隆殺之數使人可以通行這便是禮為之去其哇淫鄙俚之辭使之不失中和歡悅之意這便是樂木之周禮中多有說事之綱目者如屬民讀法其法不可知司馬職乃陳車徒如戰之陳其陳法亦不可見矣人傑周都豐鎬則王畿之內當有西北之戎如此則稍甸縣都如之何可為也曰周禮一書聖人姑為一代之法爾到不可用法處聖人須別有通變之道去偽今人不信周官若據某言卻不恁地蓋古人立法無所不有天下有是事他便立此一官但只是要不失正耳且如女巫之職掌宮中巫祝之事凡宮中所祝皆在此人如此則便無後世巫蠱之事矣道夫五峰以周禮為非周公致太平之書謂如天官冢宰卻管甚宮閫之事其意只是見後世宰相請託宮闈交結近習以為不可殊不知此正人君治國平天下之本豈可以後世之弊而併廢聖人之良法美意哉又如王后不當交通外朝之說他亦是懲後世之弊要之儀禮中亦分明自載此禮至若所謂女祝掌凡內禱祠禬禳之事使後世有此官則巫蠱之事安從有哉道夫五經中周禮疏最好詩與禮記次之書易疏亂道易疏只是將王輔嗣注來虛說一片論近世諸儒說於丘子服處見陳徐二先生周禮制度菁華下半冊徐元德作上半冊即陳君舉所奏周官說先生云孝宗嘗問君舉聞卿博學不知讀書之法當如何陳奏云臣生平於周官粗嘗用心推考今周官數篇已屬斓容臣退繕寫進呈遂寫進御大概推周官制度亦稍詳然亦有杜撰錯說處儒用錄云但說官屬不悉以類聚錯綜互見事必相關處卻多含糊或者又謂有互相檢制之意此尤不然如云冢宰之職不特朝廷之事凡內而天子飲食服御宮掖之事無不畢管蓋冢宰以道詔王格君心之非所以如此此說固是但云主客行人之官合屬春官宗伯而乃掌於司寇儒用錄云大行人司儀掌賓客之事當屬春官而乃領於司寇土地疆域之事合掌於司徒乃掌於司馬儒用錄云懷方氏辨正封疆之事當屬地官而乃領於司馬蓋周家設六官互相檢制之意此大不然何聖人不以君子長者之道待其臣既任之而復疑之邪或問如何曰賓客屬秋官者蓋諸侯朝覲會同之禮既畢則降而肉袒請刑司寇主刑所以屬之有威懷諸侯之意夏官掌諸侯土地封疆如職方氏皆屬夏官蓋諸侯有變則六師移之儒用錄云不得有其土地司馬主兵有威懷諸侯之義故也所以屬司馬也又問冬官司空掌何事曰次第是管土田之事蓋司馬職方氏存儒用錄作正其疆域之定制至於申畫井田創置纖悉必屬於司空而今亡矣又云陳徐周禮制度講三公宰相處甚詳然皆是自秦漢以下說起云漢承秦舊置三公之官若仍秦舊何不只倣秦為丞相太尉御史大夫卻置司馬司徒司空者何故蓋他不知前漢諸儒未見孔壁古文尚書有周官一篇說太師太傅太卻為三公爾孔安國古文尚書藏之祕府諸儒專門伏生二十五篇一向不取孔氏所藏古文者及至魏晉間古文者始出而行於世漢初亦只仍秦舊置丞相御史太尉為三公及武帝始改太尉為大司馬然武帝亦非是有意於復古但以衛霍功高官大上面去不得故於驃騎大將軍之上加大司馬以寵異之如加階官冠軍之號爾其職無以異於大將軍也及何武欲改三公他見是時大司馬已典兵兼名號已正故但去大字而以丞相為司徒御史大夫為司空後漢仍舊改司馬為太尉而司徒司空之官如故然政事歸於臺閣三公備員後來三公之職遂廢而侍中中書尚書之權獨重以至今日儒用略君舉說井田道是周禮王制孟子三處說皆通他說千里不平直量四邊又突出圓算則是有千二百五十里說出亦自好看今考來乃不然周禮鄭氏自於匠人注內說得極仔細前面正說處卻未見卻於後面僻處說先儒這般極仔細君舉於周禮甚熟不是不知只是做箇新樣好話謾人本文自說百里之國五十里之國賀孫周禮有井田之制有溝洫之制井田是四數溝洫是十數今永嘉諸儒論田制乃欲混井田溝洫為一則不可行鄭氏注解分作兩項卻是人傑溝洫以十為數井田以九為數決不可合永嘉必欲合之王制孟子武成分土皆言三等周禮乃有五等決不合永嘉必欲合之閎祖諸公之地封疆方五百里又云凡千里以方五百里封四公則是每箇方五百里甚是分明陳乃云方一百二十五里又以為合加地賞田附庸而言之何欺誑之甚閎祖先生以禮鑰授直卿令誦一遍畢先生曰他論封國將孟子說在前而後又引周禮諸公之地封疆方五百里說非是直卿問孟子所論五等之地是如何與周禮不合曰先儒說孟子所論乃夏商以前之制周禮是成王之制此說是了但又說是周斥大封域而封之其說又不是若是恁地每一國添了許多地便著移了許多人家社稷恐無此理這只是夏商以來漸漸相吞併至周自恁地大了周公也是不柰他何就見在封他且如當初許多國也不是先王要恁地封便如柳子厚說樣他是各人占得這些子地先王從而命之以爵不意到後來相吞併得恁大了且如孟子說周公之封於魯也地非不足而儉於百里太公之封於齊也地非不足而儉於百里這也不是當時封許多功臣親戚也是要他因而藩衛王室他那舊時國都恁大了卻封得恁地小教他與那大國雜居也於理勢不順據左傳所說東至於海西至於河南至於穆陵北至於無棣齊是恁地闊詩復周公之宇魯是恁地闊這箇也是勢著恁地陳君舉卻說只是封疆方五百里四維每一面只百二十五里以徑言則只百二十五里某說若恁地則男國不過似一耆長如何建國職方氏說一千里封四伯一千里封六侯之類極分明這一千里縱橫是四箇五百里便是破開可以封四箇伯他那算得國數極定更無可疑君舉又卻云一千里地封四伯外餘地只存留在那裏某說不知存留作甚麼恁地則一千里只將三十來同封了四伯那七十來同卻不知留作何用直卿曰武王分土惟三則百里七十里五十里似是周制曰武王是初得天下事勢未定且大概恁地如文王治岐那制度也自不同先生論至此蹙眉曰這箇也且大概恁地說不知當時仔細是如何義剛問孟子想不見周禮曰孟子是不見周禮直卿曰觀子產責晉之辭則也恐不解封得恁地大曰子產是應急之說他一時急後且恁地放鵰云何故侵小這非是至論直卿曰府史胥徒則是庶人在官者不知如何有許多曰嘗看子由古史他疑三事其一謂府史胥徒太多這箇當時卻都是兼官其實府史胥徒無許多直卿曰那司市一官更動誕不得法可謂甚嚴曰周公當時做得法大段齊整如市便不放教人四散去買賣他只立得一市在那裏要買物事便入那市中去不似而今要買物只於門首自有人擔來賣更是一日三次會合亦通人情看他所立法極是齊整但不知周公此書行得幾時耳義剛天官天官之職是總五官者若其心不大如何包得許多事且冢宰內自王之飲食衣服外至五官庶事自大至小自本至末千頭萬緒若不是大其心者區處應副事到面前便且區處不下況於先事措置思患預防是著多少精神所以記得此復忘彼佛氏只合下將那心頓在無用處纔動步便疏脫所以吾儒貴窮理致知便須事事物物理會過舜明於庶物物即是物只是明便見皆有其則今文字在面前尚且看不得況許多事到面前如何柰得他須襟懷大底人始得又云後人皆以周禮非聖人書其間細碎處雖可疑其大體直是非聖人做不得賀孫周之天官統六卿之職亦是其大綱至其他卿則一人理一事然天官之職至於閽寺宮嬪醯醬魚鹽之屬無不領之道夫問古人命官之意莫是以其切於君身故使之領否曰然道夫周禮天官兼嬪御宦官飲食之人皆總之則其於飲食男女之欲所以制其君而成其德者至矣豈復有後世宦官之弊古者宰相之任如此問宮伯宮正所率之屬五百人皆入宮中似不便否曰此只是宿衛在外不是入宮皆公卿王族之子弟為之不是兵卒淳宮伯宮正地官問司徒職在敬敷五教而地官言教者甚略而言山林陵麓之事卻甚詳曰也須是教他有飯喫有衣著五方之民各得其所方可去教他若不恁地教如何施但是其中言教也不略如閭胥書其孝弟姻卹屬民讀法之類皆是義剛淳錄云民無住處無物喫亦如何教得所以辨五方之宜以定民居使之各得其所而後教可行也直卿謂司徒所謂教只是十二教否曰非也只為教民以六德六行六藝及歲時讀法之類淳周禮中說教民處止及於畿內之民都不及畿外之民不知如何豈應如此廣或問周禮以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰鄭注云日南謂立表處太南近日也日北謂立表處太北遠日也景夕謂日昳景乃中立表處太東近日也景朝謂日未中而景已中立表處太西遠日也曰景夕多風景朝多陰此二句鄭注不可曉疑說倒了看來景夕者景晚也謂日未中而景已中蓋立表近南則取日近午前景短而午後景長也景朝者謂日已過午而景猶未中蓋立表近北則取日遠午前長而午後短也問多風多陰之說曰今近東之地自是多風如海邊諸郡風極多每如期而至如春必東風夏必南風不如此間之無定蓋土地曠闊無高山之限故風各以方至某舊在漳泉驗之早間則風已生到午而盛午後則風力漸微至晚則更無一點風色未嘗少差蓋風隨陽氣生日方升則陽氣生至午則陽氣盛午後則陽氣微故風亦隨而盛衰如西北邊多陰非特山高障蔽之故自是陽氣到彼處衰謝蓋日到彼方午則彼已甚晚不久則落故西邊不甚見日古語云蜀之日越之雪言見日少也所以蜀有漏天古語云巫峽多漏天老杜云鼓角漏天東言其地常雨如天漏然以此觀之天地亦不甚闊以日月所照及寒暑風陰觀之可以驗矣用之問天竺國去處又卻極闊曰以崑崙山言之天竺直崑崙之正南所以土地闊而其所生亦多異人水經云崑崙取嵩高五萬里看來不會如此遠蓋中國至于闐二萬里于闐去崑崙無緣更有三萬里文昌雜錄記于闐遣使來貢獻使者自言其國之西千三百餘里即崑崙山今中國在崑崙之東南而天竺諸國在其正南水經又云黃河自崑崙東北流入中國如此則崑崙當在西南上或又云西北不知如何恐河流曲折多入中國後方見其東北流爾佛經所說阿耨山即崑崙也云山頂有阿耨大池池水分流四面去為四大水入中國者為黃河入東海其三面各入南西北海如弱水黑水之類大抵地之形如饅頭其撚尖處則崑崙也問佛家天地四洲之說果有之否曰佛經有之中國為南潬部洲天竺諸國皆在南潬部內東弗于逮西瞿耶尼北鬱單越亦如鄒衍所說赤縣之類四洲統名娑婆世界如是世界凡有幾所而娑婆世界獨居其中其形正圓故所生人物亦獨圓正象其地形蓋得天地之中氣其他世界則形皆偏側尖缺而環處娑婆世界之外緣不得天地之正氣故所生人物亦多不正此說便是蓋天之說橫渠亦主蓋天不知如何但其言日初生時先照娑婆世界故其氣和其他世界則日之所照或正或昃故氣不和只他此說便自可破彼言日之所照必經歷諸世界了然後入地則一日之中須歷照四處方得周匝今纔照得娑婆一處即已曛矣若更照其他三處經多少時節如此則夜須極長何故今中國晝夜有均停時而冬夏漏刻長短相去亦不甚遠其說於是不通矣僩大司徒以土圭求地中今人都不識土圭鄭康成解亦誤圭只是量表影底尺長一尺五寸以玉為之夏至後立表視表影長短以玉圭量之若表影恰長一尺五寸此便是地之中晷長則表影短晷短則表影長冬至後表影長一丈三尺餘今之地中與古已不同漢時陽城是地之中本朝嶽臺是地之中嶽臺在浚儀屬開封府已自差許多問地何故有差曰想是天運有差地隨天轉而差今坐於此但知地之不動耳安知天運於外而地不隨之以轉耶天運之差如古今昏旦中星之不同是也又問曆所以數差古今豈無人考得精者曰便是無人考得棈細而不易所以數差若考得精密有箇定數永不會差伊川說康節曆不會差或問康節何以不造曆曰他安肯為此古人曆法疏闊而差少今曆愈密而愈差因以兩手量桌邊云且如這許多闊分作四段被他界限闊便有差不過只在一段界限之內縱使極差出第二三段亦只在此四界之內所以容易推測便有差容易見今之曆法於這四界內分作八界於這八界內又分作十六界界限愈密則差數愈遠何故以界限密而踰越多也其差則一而古今曆法疏密不同故爾看來都只是不曾推得定只是移來湊合天之運行所以當年合得不差明後年便差元不曾推得天運定只是旋將曆去合那天之行不及則添些過則減些以合之所以一二年又差如唐一行大衍曆當時最謂精密只一二年後便差只有季通說得好當初造曆便合并天運所差之度都算在裏幾年後差幾分幾年後差幾度將這差數都算做正數直推到盡頭如此庶幾曆可以正而不差今人都不曾得箇大統正只管說天之運行有差造曆以求合乎天而曆愈差元不知天如何會有差自是天之運行合當如此此說極是不知當初因甚不曾算在裏但堯舜以來曆至漢都喪失了不可考緣如今是這大總紀不正所以都無是處季通算得康節曆康節曆十二萬九千六百分大故密今曆家所用只是萬分曆萬分曆已自是多了他如何肯用十二萬分只是今之曆家又說季通底用不得不知如何又曰一行大衍曆比以前曆他只是做得箇頭勢大敷衍得闊其實差數只一般正如百貫錢修一料藥與十文修一料藥其不能治病一也僩周禮注云土圭一寸折一千里天地四遊升降不過三萬里土圭之影尺有五寸折一萬五千里以其在地之中故南北東西相去各三萬里問何謂四遊曰謂地之四遊升降不過三萬里非謂天地中間相去止三萬里也春遊過東三萬里夏遊過南三萬里秋遊過西三萬里冬遊過北三萬里今曆家算數如此以土圭測之皆合僩曰譬以大盆盛水而以虛器浮其中四邊定四方若器浮過東三寸以一寸折萬里則去西三寸亦如地之浮於水上差過東方三萬里則遠去西方三萬里矣南北亦然然則冬夏晝夜之長短非日晷出沒之所為乃地之遊轉四方而然爾曰然用之曰人如何測得如此恐無此理曰雖不可知然曆家推算其數皆合恐有此理僩土圭之法立八尺之表以尺五寸之圭橫於地下日中則景蔽於圭此乃地中為然如浚儀是也今又不知浚儀果為地中否問何故以八尺為表曰此須用勾股法算之南北無定中必以日中為中北極則萬古不易者也北方地形尖斜日長而夜短骨里幹國煮羊胛骨熟日已出矣至鐵勒則又北矣極北之地人甚少所傳有二千里松木禁人斫伐此外龍蛇交雜不可去女真起處有鴨綠江傳云天下有三處大水曰黃河曰長江并鴨綠是也若以浚儀與潁川為中則今之襄漢淮西等處為近中人傑嘗見季通云日晷有差如去一千里則差一寸到得極星卻無差其初亦自曉不得後來仔細思之日之中各自不同如極東處日午以前須短日午以後須長極西處日午以前須長日午以後須短所以有差故周禮以為日北則景長多寒日南則景短多暑日東則景夕多風日西則景朝多陰此最分曉極星卻到處視之以為南北之中了所以無差如涼傘然中心卻小四簷卻闊故如此某初疑其然及將周禮來檢看方見得決然是如此榦今謂周官非聖人之書至如比閭族黨之法正周公建太平之基本他這箇一如碁盤相似枰布定後碁子方有放處因論保五法道夫二十五家為閭閭呂也如身之有脊呂骨蓋閭長之居當中而二十四家列於兩旁如身之脊呂骨當中而肋骨分布兩旁也僩問六德智聖曰智是知得事理聖便高似智蓋無所不通明底意思伯羽五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂制田里之法也五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此鄉遂出兵之法也故曰凡起徒役無過家一人既一家出一人則兵數宜甚多然只是擁衛王室如今禁衛相似不令征行也都鄙之法則九夫為井四井為邑四邑為丘四丘為甸然後出長轂一乘甲士三人步卒七十二人以五百一十二家而共只出七十五人則可謂甚少然有征行則發此都鄙之兵悉調者不用而用者不悉調此二法所以不同而貢助之法亦異大率鄉遂以十為數是長連排去井田以九為數是一箇方底物事自是不同而永嘉必欲合之如何合得閎祖以下小司徒周制鄉遂用貢法故十夫治溝長底是十方底是百長底是千方底是萬都鄙用助法故八家同溝共井鄉遂則以五為數家出一人為兵以守衛王畿役次必簡如周禮惟挽鮴則用之此役之最輕者都鄙則以四為數六七家始出一人故甸出甲士三人步卒七十二人馬四匹牛三頭鄉遂所以必為溝洫而不為井者以欲起兵數故也五比五鄰五伍之後變五為四閭四里四兩者用四則成百之數復用五則自此奇零不整齊矣如曰周制皆井者此欺人之說不可行也因言永嘉之說受田則用溝洫起賦斂則依井方子下條聞同問周制都鄙用助法八家同井鄉遂用貢法十夫有溝鄉遂所以不為井者何故曰都鄙以四起數五六家始出一人故甸出甲士三人步卒七十二人鄉遂以五起數家出一人為兵以守衛王畿役次必簡故周禮惟挽鮴則用之此役之最輕者近郊之民王之內地也共輦之事職無虛月追胥之比無時無之其受吗為民者固與畿外之民異也七尺之征六十之舍王非姑息於邇民也遠郊之民王之外地也其溝洫之治各有司存野役之起不及其羨其受吗為氓者固與內地之民異也六尺之征六十五之舍王非荼毒於遐民也園吗二十而一若輕於近郊也而草木之毓夫家之聚不可以擾擾則不能以寧居是故二十而稅一漆林二十而五若重於遠郊也而器用之末作商賈之資利不可以輕輕則必至於忘本是故二十而五係近郊遠郊勞逸所繫天子六鄉故有六軍諸侯三鄉故有三軍所謂五家為比比即伍也五比為閭閭即兩也四閭為族族即卒也則是夫人為兵矣至於九夫為井四井為邑四邑為丘四丘為甸甸出兵車一乘且以九夫言之中為公田只是八夫甸則五百一十二夫何其少於鄉遂也便是難曉以某觀之鄉遂之民以衛王畿凡有征討止用丘甸之民又學校之制所以取士者但見於鄉遂鄉遂之外不聞教養之制亦可疑也人傑問都鄙四丘為甸甸六十四井出車一乘甲士三人步卒七十二人不審鄉遂車賦則如何曰鄉遂亦有車但不可見其制六鄉一家出一人排門是兵都鄙七家而出一兵在內者役重而賦輕在外者役輕而賦重六軍只是六鄉之眾六遂不與六遂亦有軍但不可見其數侯國三軍亦只是三郊之眾三遂不與大國三郊次國二郊小國一郊蔡季通說車一乘不止甲士三人步卒七十二人此是輕車用馬馳者更有二十五人將重車在後用牛載糗糧戈甲衣裝見七書如魯頌公徒三萬亦具其說矣淳問鄭氏旁加一里之說是否曰如此方得數相合亦不見所憑據處今且大概依他如此看淳以下小司徒注直卿問古以百步為畝今如何曰今以二百四十步為畝百畝當今四十一畝賀孫問司馬法車乘士徒之數與周禮不同如何曰古制不明皆不可考此只見於鄭氏注七書中司馬法又不是此林勳本政書錯說以為文王治岐之政曰或以周禮乃常數司馬法乃調發時數是否曰不通處如何硬要通不須恁思量枉費心力淳先生與曹兄論井田曰當時須別有箇道理天下安得有箇王畿千里之地將鄭康成圖來安頓於上今看古人地制如豐鎬皆在山谷之間洛邑伊闕之地亦多是小溪澗不知如何措置卓豐鎬去洛邑三百里長安所管六百里王畿千里亦有橫長處非若今世之為圖畫方也恐井田之制亦是類此不可執畫方之圖以定之人傑古者百畝之地收皆畝一鍾為米四石六斗以今量較之為米一石五斗爾僩周家每年一推排十六歲受田六十者歸田其後想亦不能無弊故蔡澤言商君決裂井田廢壞阡陌以靜百姓之業而一其志唐制每歲十月一日應受田者皆集於縣令廷中而升降之若縣令非才則是日乃胥吏之利耳方子古人學校教養德行道藝選舉爵祿宿衛征伐師旅田獵皆只是一項事皆一理也僩鄉大夫問周禮德行道藝德行藝三者猶有可指名者道字當如何解曰舊嘗思之未甚曉看來道字只是曉得那道理而已大而天地事物之理以至古今治亂興亡事變聖賢之典策一事一物之理皆曉得所以然謂之道且如禮樂射御書數禮樂之文卻是祝史所掌至於禮樂之理則須是知道者方知得如所謂天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉之謂又德是有德行是有行藝是有藝道則知得那德行藝之理所以然也注云德行是賢者道藝是能者蓋曉得許多事物之理所以屬能僩內史掌策命諸侯及群臣者卿大夫既獻賢能之書王拜受登於天府其副本則內史掌之以內史掌策命諸侯及群臣故也古之王者封建諸侯王坐使內史讀策命之非特命諸侯亦欲在廷詢其可否且如後世除拜百官亦合有策只是辭免了問祖宗之制亦如此否曰自唐以上皆如此今除宰相宣麻是其遺意立后以上用玉策其次皆用竹策漢常用策緣他近古其初亦不曾用自武帝立三王始用起文蔚問黨正一命齒於鄉里再命齒於父族三命不齒若據如此雖說鄉黨莫如齒到得爵尊後又不復序齒曰古人貴貴長長並行而不悖他雖說不序亦不相壓自別設一位如今之掛位然燾錄云猶而今別設桌也文蔚黨正古制微細處今不可曉但觀其大概如宅田士田賈田官田牛田賞田牧田鄭康成作一說鄭司農又作一說憑何者為是淳以下載師問商賈是官司令民為之抑民自為之邪曰民自為之亦受田但少耳如載師所謂賈田者是也淳問士人受田如何曰上士中士下士是有命之士已有祿如管子士鄉十五是未命之士若民皆為士則無農矣故鄉止十五亦受田但不多所謂士田者是也義剛近郊十一遠郊二十而三甸稍縣都皆無過十二此即是田稅然遠近輕重不等者蓋近處如六鄉排門皆兵其役多故稅輕遠處如都鄙井法七家而賦一兵其役少故稅重所謂十二者是并雜稅皆無過此數也都鄙稅亦只納在采邑淳安卿問二十而一十一十二二十而三二十而五如何曰近處役重遠處役輕且如六鄉自是家家為兵至如稍縣都卻是七家只出一兵直卿曰鄉遂用貢法都鄙用助法則是都鄙卻成九一但鄭注二十而一等及九賦之類皆云是計口出泉如此又近於太重曰便是難曉這箇今且理會得大概若要盡依他行時也難似而今時節去封建井田尚煞爭淳錄云因論封建井田曰大概是如此今只看箇大意若要行時須別立法制使簡易明白取於民者足以供上之用上不至於乏而下不至於苦則可矣今世取封建井田大段遠恰如某病後要思量白日上昇如何得今且醫得無事時已是好了如浙間除了和買丁錢重處減些使一家但納百十錢只依而今稅賦放教寬無大故害民處淳錄云如漳之鹽錢罷了如此時便是小太平了前輩云本朝稅輕於什一也只是向時可恁地說今何啻數倍緣上面自要許多用而今縣中若省解些月樁看州府不來打罵麼某在漳州解發銀子折了星兩運司來取被某不能管得判一箇可付一笑字聽他們自去理會似恁時節卻要行井田如何行得伊川常言要必復井田封建及晚年又卻言不必封建井田便也是看破了淳錄云見暢潛道錄想是他經歷世故之多見得事勢不可行且如封建自柳子厚之屬論得來也是太過但也是行不得淳錄云柳子厚說得世變也是但他只見得後來不好處不見得古人封建底好意如漢當初要封建後來便恁地狼狽若如主父偃之說天子使吏治其國而納其貢稅如此便不必封建也得淳錄云若論主父偃後底封建則皆是王族貴驕之子不足以君國子民天子使吏治其國而已今且做把一百里地封一箇親戚或功臣教他去做其初一箇未必便不好但子孫決不能皆賢若有一箇在那裏無稽時不成教百姓論罷了一箇國君若只坐視他害民又不得卻如何區處淳錄云封建以大體言之卻是聖人公共為民底意思是為正理以利害計之第一世所封之功臣猶做得好在第二世繼而立者箇箇定是不曉事則害民之事靡所不為百姓被苦來訴國君因而罷了也不是不與他理會亦不是未論別處如何只這一處利少而害多便自行不得更是人也自不肯去今且教一箇錢塘縣尉封他作靜江國王鬱林國王淳錄作桂國之君他定是不肯去淳錄作他定以荒僻不樂於行寧肯作錢塘縣尉唐時理會一番襲封刺史人都不肯去淳錄作一時功臣皆樂於在京而不肯行符秦也曾如此來人皆是戀京師快活都不肯去卻要遣人押起淳錄作符堅封功臣於數國不肯去迫之使去這箇決是不可行若是以大概論之聖人封建卻是正理但以利害言之則利少而害多子由古史論得也忒煩前後都不相照淳錄作子由論封建引證又都不著想是子由老後昏眩說得恁地某嘗作說辨之得四五段不曾終了若東坡時便不如此他每每兩牢籠說他若是主這一邊說時那一邊害處都藏著不敢說破如子由便是只管說後說得更無理會因曰蘇氏之學喜於縱恣疏蕩東坡嘗作某州學記言井田封建皆非古但有學校尚有古意其間言舜遠矣不可及矣但有子產尚可稱他便是敢恁地說千古萬古後你如何知得無一箇人似舜義剛淳錄作數條載師云凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征閭師又云凡民無職者出夫布前重後輕者前以待士大夫之有土者後方是待庶民宅不毛為其為亭臺也田不耕為其為池沼也凡民無職事者此是大夫家所養浮泛之人也賀孫師氏居虎門司王朝虎門路寢門也正義謂路寢庭朝庫門外朝非常朝此是常朝故知在路門外文蔚問路寢庭朝庫門外朝如何不是常朝曰路寢庭在門之裏議政事則在此朝庫門外是國有大事詢及眾庶則在此處非每日常朝之所若每日常朝王但立於寢門外與群臣相揖而已然王卻先揖揖群臣就位王便入只是揖亦不同如土揖庶姓時揖異姓天揖同姓之類各有高下胡明仲嘗云近世朝禮每日拜跪乃是秦法周人之制元不如此文蔚師氏古者教法禮樂射御書數不可闕一就中樂之教尤親切夔教冑子只用樂大司徒之職也是用樂蓋是教人朝夕從事於此拘束得心長在這上面蓋為樂有節奏學他底急也不得慢也不得久之都換了他一副當情性植以下保氏周禮六書制字固有從形者然為義各不同卻如何必欲說義理得龜山有辯荊公字說三十餘字荊公字說其說多矣止辯三十字何益哉又不去頂門上下一轉語而隨其後屑屑與之辯使其說轉則吾之說不行矣僩泉府掌以市之征布斂貨之不售者或買或賒或貸貸者以國服為息此能幾何而云凡國之財用取具焉何也閎祖泉府問遂何以上地特加萊五十畝曰古制不明亦不可曉鄉之田制亦如此但此見於遂耳大抵鄉吏專主教遂吏專主耕淳以下遂人問鄉遂為溝洫用貢法都鄙為井田行助法何以如此分別曰古制不明亦不曉古人是如何遂人溝洫之法田不井授而以夫數制之歲時登其夫家之眾寡以令貢賦便是用貢法淳子約疑井田之法一鄉一遂為一萬有餘夫多溝洫川澮而匠人一同為九萬夫川澮溝洫反少者此以地有遠近故治有詳略也鄉遂近王都人眾稠密家家勝兵不如此則不足以盡地利而養民且又縱橫為溝洫川澮所以寓設險之意而限車馬之衝突也故治近為甚詳若鄉遂之外則民少而地多欲盡開治則民力不足故其治甚略晉郤克帥諸國伐齊齊來盟晉人曰必以蕭同叔子為質而盡東其畝齊人曰唯吾子戎車是利無顧土宜云云晉謀遂塞蓋鄉遂之畝如中間是田兩邊是溝向東直去而前復有橫畝向南溝復南流一東一南十字相交在此所以險阻多而非車馬之利也晉欲使齊盡東其畝欲為侵伐之利耳而齊覺之若盡東其畝則無縱橫相銜但一直向東戎馬可以長驅而來矣次日又曰昨夜說匠人九夫之制無許多溝洫其實不然適間檢看許多溝洫川澮與鄉遂之地一般乃是子約看不子細耳僩田制須先正溝洫方定必大稍者稍稍之義言逐旋給與之也不特待使者凡百官廩祿皆然猶今官中給俸米僩稍人鄉遂雖用貢法然巡野觀稼以年之上中下出斂法則亦未嘗拘也閎祖司稼春官周禮載用赤璋白璧等斂此豈長策要是周公未思量耳觀季孫斯死用玉而孔子歷階言其不可則是孔子方思量到而周公思量未到也義剛典瑞黃問周禮祀天神地谀人鬼之樂何以無商音曰五音無一則不成樂非是無商音只是無商調先儒謂商調是殺聲鬼神畏商調淳以下大司樂周禮不言祭地止於大司樂一處言之舊見陳君舉亦云社稷之祭乃是祭地卻不曾問大司樂祭地祇之事人傑因說及夢曰聖人無所不用其敬雖至小沒緊要底物事也用其敬到得後世儒者方說得如此闊大沒收殺如周禮夢亦有官掌之此有甚緊要然聖人亦將做一件事某平生每夢見故舊親戚次日若不接其書信及見之則必有人說及看來惟此等是正夢其他皆非正僩占夢夏官路門外有鼓謂之路鼓王崩則擊此鼓用以宣傳四方肺石其形若肺擊之有聲冤民許擊此石如今登聞鼓唐人亦有肺石文蔚太僕秋官人謂周公不言刑秋官有許多刑如何是不言刑淳問周禮五服之貢限以定名不問其地之有無與禹貢不合何故曰一代自有一代之制他大概是近處貢重底物事遠處貢輕底物事恰如禹貢所謂納銍納秸之類義剛大行人冬官車所以揉木又以圍計者蓋是用生成圓木揉而為之故堅耐堪馳騁閎祖輪人問侯國亦倣鄉遂都鄙之制否曰鄭氏說侯國用都鄙法然觀魯人三郊三遂及孟子請野九一而助國中什一使自賦則亦是如此義剛錄作當亦是鄉遂淳匠人注
