body:
  text: 朱子語類卷第十一學五讀書法下人之為學固是欲得之於心體之於身但不讀書則不知心之所得者何事道夫讀書窮理當體之於身凡平日所講貫窮究者不知逐日常見得在心目間否不然則隨文逐義趕汚期限不見悅處恐終無益人常讀書庶幾可以管攝此心使之常存橫渠有言書所以維持此心一時放下則一時德性有懈其何可廢蓋卿初學於敬不能無間斷只是才覺間斷便提起此心只是覺處便是接續某要得人只就讀書上體認義理日間常讀書則此心不走作或只去事物中羇則此心易得汨沒知得如此便就讀書上體認義理便可喚轉來賀孫本心陷溺之久義理浸灌未透且宜讀書窮理常不間斷則物欲之心自不能勝而本心之義理自安且固矣須是存心與讀書為一事方得方子人心不在軀殼裏如何讀得聖人之書只是杜撰鑿空說元與他不相似僩讀書須將心貼在書冊上逐句逐字各有著落方始好商量大凡學者須是收拾此心令專靜純一日用動靜間都無馳走散亂方始看得文字精審如此方是有本領今人看文字多是以昏怠去看所以不子細故學者且於靜處收拾教意思在裏然後虛心去看則其義理未有不明者也祖道昔陳烈先生苦無記性一日讀孟子學問之道無他求其放心而已矣忽悟曰我心不曾收得如何記得書遂閉門靜坐不讀書百餘日以收放心卻去讀書遂一覽無遺僩學者讀書多緣心不在故不見道理聖賢言語本自分曉只略略加意自見得若是專心豈有不見文蔚心不定故見理不得今且要讀書須先定其心使之如止水如明鏡暗鏡如何照物伯羽立志不定如何讀書芝讀書有箇法只是刷刮淨了那心後去看若不曉得又且放下待他意思好時又將來看而今卻說要虛心心如何解虛得而今正要將心在那上面義剛讀書須是要身心都入在這一段裏面更不問外面有何事方見得一段道理出如博學而篤志切問而近思如何卻說箇仁在其中蓋自家能常常存得此心莫教走作則理自然在其中今人卻一邊去看文字一邊去思量外事只是枉費了工夫不如放下了文字待打疊教意思靜了卻去看祖道學者觀書多走作者亦恐是根本上功夫未齊整只是以紛擾雜亂心去看不曾以湛然凝定心去看不若先涵養本原且將已熟底義理玩味待其浹洽然後去看書便自知只是如此老蘇自述其學為文處有云取古人之文而讀之始覺其出言用意與己大異及其久也讀之益精胸中豁然以明若人之言固當然者此是他於學文上功夫有見處可取以喻今日讀書其功夫亦合如此又曰看得一兩段卻且放心胸寬閑不可貪多又曰陸子靜嘗有旁人讀書之說亦可且如此凡人看文字初看時心尚要走作道理尚見得未定猶沒奈他何到看得定時方入規矩又只是在印板上面說相似都不活不活則受用不得須是玩味反覆到得熟後方始會活方始會動方有得受用處若只恁生記去這道理便死了時舉不可終日思量文字恐成硬將心去馳逐了亦須空閑少頃養精神又來看淳讀書閑暇且靜坐教他心平氣定見得道理漸次分曉季札錄云庶幾心平氣和可以思索義理這箇卻是一身總會處且如看大學在明明德一句須常常提醒在這裏他日長進亦只在這裏人只是一箇心做本須存得在這裏識得他條理脈絡自有貫通處賜季札錄云問伊川見人靜坐如何便歎其善學曰這卻是一箇總要處又云大學在明明德一句當常常提撕能如此便有進步處蓋其原自此發見人只一心為本存得此心於事物方知有脈絡貫通處大凡讀書且要讀不可只管思口中讀則心中閑而義理自出某之始學亦如是爾更無別法節學者讀書須要斂身正坐緩視微吟虛心涵泳切己省一作體察又云讀一句書須體察這一句我將來甚處用得又云文字是底固當看不是底也當看精底固當看粗底也當看震讀書須是虛心切己虛心方能得聖賢意切己則聖賢之言不為虛說看文字須是虛心莫先立己意少刻多錯了又曰虛心切己虛心則見道理明切己自然體認得出舉聖人言語皆天理自然本坦易明白在那裏只被人不虛心去看只管外面捉摸及看不得便將自己身上一般意思說出把做聖人意思淳聖賢言語當虛心看不可先自立說去撐拄便喎斜了不讀書者固不足論讀書者病又如此淳凡看書須虛心看不要先立說看一段有下落了然後又看一段須如人受詞訟聽其說盡然後方可決斷泳看前人文字未得其意便容易立說殊害事蓋既不得正理又枉費心力不若虛心靜看即涵養究索之功一舉而兩得之也時舉大抵義理須是且虛心隨他本文正意看必大讀書遇難處且須虛心搜討意思有時有思繹底事卻去無思量處得敬仲問如先生所言推求經義將來到底還別有見處否曰若說如釋氏之言有他心通則無也但只見得合如此爾再問所說尋求義理仍須虛心觀之不知如何是虛心曰須退一步思量次日又問退一步思量之旨曰從來不曾如此做工夫後亦是難說今人觀書先自立了意後方觀盡率古人語言入做自家意思中來如此只是推廣得自家意思如何見得古人意思須得退步者不要自作意思只虛此心將古人語言放前面看他意思倒殺向何處去如此玩心方可得古人意有長進處且如孟子說詩要以意逆志是為得之逆者等待之謂也如前途等待一人未來時且須耐心等待將來自有來時候他未來其心急切又要進前尋求卻不是以意逆志是以意捉志也如此只是牽率古人言語入做自家意中來終無進益大雅某嘗見人云大凡心不公底人讀書不得今看來是如此如解說聖經一向都不有自家身己全然虛心只把他道理自看其是非恁地看文字猶更自有牽於舊習失點檢處全然把一己私意去看聖賢之書如何看得出賀孫或問看文字為眾說雜亂如何曰且要虛心逐一說看去看得一說卻又看一說看來看去是非長短皆自分明譬如人欲知一箇人是好人是惡人且隨他去看隨來隨去見他言語動作便自知他好惡又曰只要虛心又云濯去舊聞以來新見觀書當平心以觀之大抵看書不可穿鑿看從分明處不可尋從隱僻處去聖賢之言多是與人說話若是嶢崎卻教當時人如何曉節觀書須靜著心寬著意思沈潛反覆將久自會曉得去儒用放寬心以他說看他說以物觀物無以己觀物道夫以書觀書以物觀物不可先立己見讀書須要切己體驗不可只作文字看又不可助長方學者當以聖賢之言反求諸身一一體察須是曉然無疑積日既久當自有見但恐用意不精或貪多務廣或得少為足則無由明耳祖道讀書不可只專就紙上求理義須反來就自家身上以手自指推究秦漢以後無人說到此亦只是一向去書冊上求不就自家身上理會自家見未到聖人先說在那裏自家只借他言語來就身上推究始得淳今人讀書多不就切己上體察但於紙上看文義上說得去便了如此濟得甚事何必讀書然後為學子曰是故惡夫佞者古人亦須讀書始得但古人讀書將以求道不然讀作何用今人不去這上理會道理皆以涉獵該博為能所以有道學俗學之別因提案上藥囊起曰如合藥便要治病終不成合在此看如此於病何補文字浩瀚難看亦難記將已曉得底體在身上卻是自家易曉易做底事解經已是不得已若只就注解上說將來何濟如畫那人一般畫底卻識那人別人不識須因這畫去求那人始得今便以畫喚做那人不得宇或問讀書工夫曰這事如今似難說如世上一等人說道不須就書冊上理會此固是不得然一向只就書冊上理會不曾體認著自家身己也不濟事如說仁義禮智曾認得自家如何是仁自家如何是義如何是禮如何是智須是著身己體認得如讀學而時習之自家曾如何學自家曾如何習不亦說乎曾見得如何是說須恁地認始得若只逐段解過去解得了便休也不濟事如世上一等說話謂不消得讀書不消理會別自有箇覺處有箇悟處這箇是不得若只恁地讀書只恁地理會又何益賀孫學須做自家底看便見切己今人讀書只要科舉用已及第則為雜文用其高者則為古文用皆做外面看淳讀書之法有大本大原處有大綱大目處又有逐事上理會處又其次則解釋文義雉玩索窮究不可一廢升卿或問讀書未知統要曰統要如何便會知得近來學者有一種則舍去冊子卻欲於一言半句上便要見道理又有一種則一向汎濫不知歸著處此皆非知學者須要熟看熟思久久之間自然見箇道理四停八當而所謂統要者自在其中矣履孫凡看文字專看細密處而遺卻緩急之間者固不可專看緩急之間而遺卻細密者亦不可今日之看所以為他日之用須思量所以看者何為非只是空就言語上理會得多而已也譬如拭桌子只拭中心亦不可但拭四弦亦不可須是切己用功使將來自得之於心則視言語誠如糟粕然今不可便視為糟粕也但當自期向到彼田地爾方子學者有所聞須便行始得若得一書須便讀便思便行豈可又安排停待而後下手且如得一片紙便來一片紙上道理行之可也履孫讀書便是做事凡做事有是有非有得有失善處事者不過稱量其輕重耳讀書而講究其義理判別其是非臨事即此理可學真理會得底便道真理會得真理會不得底便道真理會不得真理會得底固不可忘真理會不得底須看那處有礙須記那緊要處常勿忘所謂智者利仁方其求時心固在此不求時心亦在此淳學得此事了不可自以為了恐怠意生如讀得此書須終身記之壽昌讀書推類反求固不害為切己但卻又添了一重事不若且依文看逐處各自見箇道理久之自然貫通不須如此費力也學者理會文義只是要先理會難底遂至於易者亦不能曉學記曰善問者如攻堅木先其易者後其節目所謂攻瑕則堅者瑕攻堅則瑕者堅不知道理好處又卻多在平易處璘只看自家底不是自家底枉了思量燾凡讀書且須從一條正路直去四面雖有可觀不妨一看然非是緊要方子看書不由直路只管枝蔓便於本意不親切淳看文字不可相妨須各自逐一著地頭看他指意若牽窒著則件件相礙矣端蒙看文字且逐條看各是一事不相牽合讀書要周遍平正夔孫看文字不可落於偏僻須是周匝看得四通八達無些窒礙方有進益又云某解語孟訓詁皆存學者觀書不可只看緊要處閑慢處要都周匝今說求放心未問其他只此便是博學而篤志切問而近思仁在其中矣博學而篤志切問而近思方是讀書卻說仁在其中蓋此便是求放心也人傑看文字且依本句不要添字那裏元有縫罅如合子相似自家只去抉開不是渾淪底物硬去鑿亦不可先立說牽古人意來湊且如逆詐億不信與先覺之辨逆詐是那人不曾詐我先去揣摩道那人必是詐我億不信是那人未有不信底意便道那人必是不信先覺則分明見得那人已詐我不信我如高祖知人善任使亦是分明見其才耳讀書若有所見未必便是不可便執著且放在一邊益更讀書以來新見若執著一見則此心便被此見遮蔽了譬如一片淨潔田地若上面纔安一物便須有遮蔽了處聖人七通八達事事說到極致處學者須是多讀書使互相發明事事窮到極致處所謂本諸身徵諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑直到這箇田地方是語云執德不弘易云寬以居之聖人多說箇廣大寬洪之意學者要須體之廣看書不可將自己見硬參入去須是除了自己所見看他冊子上古人意思如何如程先生解直方大乃引孟子雖是程先生言畢竟迫切節看文字先有意見恐只是私意謂如粗厲者觀書必以勇果強毅為主柔善者觀書必以慈祥寬厚為主書中何所不有人傑凡讀書先須曉得他底言詞了然後看其說於理當否當於理則是背於理則非今人多是心下先有一箇意思了卻將他人說話來說自家底意思其有不合者則硬穿鑿之使合廣學者不可用己意遷就聖賢之言德明讀書如問人事一般欲知彼事須問彼人今卻不問其人只以己意料度謂必是如此揚看人文字不可隨聲遷就我見得是處方可信須沉潛玩繹方有見處不然人說沙可做飯我也說沙可做飯如何可喫謙大凡讀書不要般涉但溫尋舊底不妨不可將新底來攙道夫文字不可硬說但當習熟漸漸分明凡看聖賢言語不要迫得太緊振大凡看文字要急迫不得有疑處且漸漸思量若一下便要理會得也無此理廣看文字須是退步看方可見得若一向近前迫看反為所遮蔽轉不見矣力行學者觀書病在只要向前不肯退步看愈向前愈看得不分曉不若退步卻看得審大概病在執著不肯放下正如聽訟心先有主張乙底意思便只尋甲底不是先有主張甲底意思便只見乙底不是不若姑置甲乙之說徐徐觀之方能辨其曲直橫渠云濯去舊見以來新意此說甚當若不濯去舊見何處得新意來今學者有二種病一是主私意一是舊有先入之說雖欲擺脫亦被他自來相尋學者不可只管守從前所見須除了方見新意如去了濁水然後清者出焉力行到理會不得處便當濯去舊見以來新意仍且只就本文看之伯羽某向時與朋友說讀書也教他去思索求所疑近方見得讀書只是且恁地虛心就上面熟讀久之自有所得亦自有疑處蓋熟讀後自有窒礙不通處是自然有疑方好較量今若先去尋箇疑便不得又曰這般也有時候舊日看論語合下便有疑蓋自有一樣事被諸先生說成數樣所以便著疑今卻有集注了且可傍本看教心熟少間或有說不通處自見得疑只是今未可先去疑著賀孫看文字且自用工夫先已切至方可舉所疑與朋友講論假無朋友久之自能自見得蓋蓄積多者忽然爆開便自然通此所謂何天之衢亨也蓋蓄極則通須是蓄之極則通人傑錄云讀書須是先看一件了然後再看一件若是蓄積處多忽然爆開來時自然所得者大易所謂何天之衢亨是也讀書無疑者須教有疑有疑者卻要無疑到這裏方是長進道夫問看理多有疑處如百氏之言或疑其為非又疑其為是當如何斷之曰不可強斷姑置之可也人傑人之病只知他人之說可疑而不知己說之可疑試以詰難他人者以自詰難庶幾自見得失必大因求講學言論傳之答曰聖賢之言明如日月又曰人有欲速之病舊嘗與一人讀詩集每略過題一行不看題目卻成甚讀詩也又嘗見龔實之轎中只著一冊文字看此其專靜也且云尋常出外轎中著三四冊書看一冊厭又看一冊此是甚功夫也方因僉出文字偶失僉字遂不能記云舊有人老不識字然隔年谓谓出入皆心記口數之既為寫下覆之無差蓋其人忠寔又專一無他事所以記得今學者不能記又往往只靠著筆墨文字所以愈忘之也方先生戲引禪語云一僧與人讀碑云賢讀著總是字某讀著總是禪溈山作一書戒僧家整齊苴有一川僧最讀此書云似都是說我善財五十三處見善知識問皆如一云我已發三藐三菩提心而未知如何行菩薩行成菩薩道問讀諸經之法曰亦無法只是虛心平讀去淳以下讀諸經法學不可躐等不可草率徒費心力須依次序如法理會一經通熟他書亦易看閎祖聖人千言萬語只是說箇當然之理恐人不曉又筆之於書自書契以來二典三謨伊尹武王箕子周公孔孟都只是如此可謂盡矣只就文字間求之句句皆是做得一分便是一分工夫非茫然不可測也但患人不子細求索之耳須要思量聖人之言是說箇甚麼要將何用若只讀過便休何必讀明作讀六經時只如未有六經只就自家身上討道理其理便易曉敬仲讀書只就一直道理看剖析自分曉不必去偏曲處看易有箇陰陽詩有箇邪正書有箇治亂皆是一直路逕可見別無嶢崎宇人惟有私意聖賢所以留千言萬語以掃滌人私意使人人全得惻隱羞惡之心六經不作可也裏面著一點私意不得節許多道理孔子恁地說一番孟子恁地說一番子思又恁地說一番都恁地懸空掛在那裏自家須自去體認始得賀孫為學須是先立大本其初甚約中間一節甚廣大到末梢又約孟子曰博學而詳說之將以反說約也故必先觀論孟大學中庸以考聖賢之意讀史以考存亡治亂之昙跡讀諸子百家以見其駁雜之病其節目自有次序不可踰越近日學者多喜從約而不於博求之不知不求於博何以考删其約如某人好約今只做得一僧了得一身又有專於博上求之而不反其約今日考一制度明日又考一制度空於用處作工夫其病又甚於約而不博者要之均是無益可學學者只是要熟工夫純一而已讀時熟看時熟玩味時熟如孟子詩書全在讀時工夫孟子每章說了又自解了蓋他直要說得盡方住其言一大片故後來老蘇亦拖他來做文章說須熟讀之便得其味今觀詩既未寫得傳且除了小序而讀之亦不要將做好底看亦不要將做惡底看只認本文語意亦須得八九人做功課若不專一東看西看則此心先已散漫了如何看得道理出須是看論語專只看論語看孟子專只看孟子讀這一章更不看後章讀這一句更不得看後句這一字理會未得更不得看下字如此則專一而功可成若所看不一汎濫無統雖卒歲窮年無有透徹之期某舊時文字只是守此拙法以至於今思之只有此法更無他法僩凡讀書須有次序且如一章三句先理會上一句待通透次理會第二句第三句待分曉然後將全章反覆紬繹玩味如未通透卻看前輩講解更第二番讀過須見得身分上有長進處方為有益如語孟二書若便恁地讀過只一二日可了若要將來做切己事玩味體察一日多看得數段或一兩段耳又云看講解不可專祢他說不求是非便道前賢言語皆的當如遺書中語豈無過當失實處亦有說不及處又云初看時便先斷以己意前聖之說皆不可入此正當今學者之病不可不知宇人只讀一書不得謂其傍出多事禮記左傳最不可不讀揚看經書與看史書不同史是皮外物事沒緊要可以劄記問人若是經書有疑這箇是切己病痛如人負痛在身欲斯須忘去而不可得豈可比之看史遇有疑則記之紙邪僩浩曰趙書記云自有見後只是看六經語孟其他史書雜學皆不必看其說謂買金須問賣金人雜賣店中那得金銀不必問也曰如此即不見古今成敗便是荊公之學書那有不可讀者只怕無許多心力讀得六經是三代以上之書曾經聖人手全是天理三代以下文字有得失然而天理卻在這邊自若也要有主覷得破皆是學浩向時有一截學者貪多務得要讀周禮諸史本朝典故一向盡要理會得許多沒緊要底工夫少刻身己都自恁地顛顛倒倒沒頓放處如喫物事相似將甚麼雜物事不是時節一頓都喫了便被他撐腸拄肚沒奈何他賀孫看經傳有不可曉處且要旁通待其浹洽則當觸類而可通矣人傑經旨要子細看上下文義名數制度之類略知之便得不必大段深泥以妨學問理明後便讀申韓書亦有得方子以下雜論諸先生立言有差處如橫渠知言當知其所以差處不宜一切委之所以自廣其志自進其知也讀書理會道理只是將勤苦捱將去不解得不成文王猶勤而況寡德乎今世上有一般議論成就後生懶惰如云不敢輕議前輩不敢妄立論之類皆中怠惰者之意前輩固不敢妄議然論其行事之是非何害固不可鑿空立論然讀書有疑有所見自不容不立論其不立論者只是讀書不到疑處耳將精義諸家說相比並求其是便自有合辨處璘因言讀書法曰且先讀十數過已得文義四五分然後看解又得三二分又卻讀正文又得一二分向時不理會得孟子以其章長故也因如此讀元來他章雖長意味卻自首末相貫又問讀書心多散亂曰便是心難把捉處知得此病者亦早少了向時舉中庸誠者物之終始不誠無物說與直卿云且如讀十句書上九句有心記得心不走作則是心在此九句內是誠是有其物故終始得此九句用若下一句心不在焉便是不誠便無物也明作以下論看注解大凡人讀書且當虛心一意將正文熟讀不可便立見解看正文了卻著深思熟讀便如己說如此方是今來學者一般是專要作文字用一般是要說得新奇人說得不如我說得較好此學者之大病譬如聽人說話一般且從他說盡不可勦斷他說便以己意見抄說若如此全不見得他說是非只說得自家底終不濟事久之又曰須是將本文熟讀字字咀嚼教有味若有理會不得處深思之又不得然後卻將注解看方有意味如人飢而後食渴而後飲方有味不飢不渴而強飲食之終無益也又曰某所集注論語至於訓詁皆子細者蓋要人字字與某著意看字字思索到莫要只作等閑看過了又曰讀書第一莫要先立箇意去看他底莫要才領略些大意不耐煩便休了祖道學者觀書先須讀得正文記得注解成誦精熟注中訓釋文意事物名義發明經指相穿紐處一一認得如自己做出來底一般方能玩味反覆向上有透處若不如此只是虛設議論如舉業一般非為己之學也曾見有人說詩問他關雎篇於其訓詁名物全未曉便說樂而不淫哀而不傷某因說與他道公而今說詩只消這八字更添思無邪三字共成十一字便是一部毛詩了其他三百篇皆成渣滓矣因憶頃年見汪端明說沈元用問和靖伊川易傳何處是切要尹云體用一源顯微無間此是切要處後舉似李先生先生曰尹說固好然須是看得六十四卦三百八十四爻都有下落方始說得此話若學者未曾子細理會便與他如此說豈不誤他某聞之悚然始知前日空言無實不濟事自此讀書益加詳細云此一段係先生親書示書堂學者凡人讀書若窮得到道理透處心中也替他饒本作替地快活若有疑處須是參諸家解熟看看得有差互時此一段終是不穩在心頭不要放過敬仲凡看文字諸家說有異同處最可觀謂如甲說如此且撏扯住甲窮盡其詞乙說如此且撏扯住乙窮盡其詞兩家之說既盡又參考而窮究之必有一真是者出矣學蒙經之有解所以通經經既通自無事於解借經以通乎理耳理得則無俟乎經今意思只滯在此則何時得脫然會通也且所貴乎簡者非謂欲語言之少也乃在中與不中爾若句句親切雖多何害若不親切愈少愈不達矣某嘗說讀書須細看得意思通融後都不見注解但見有正經幾箇字在方好大雅句心方子看注解時不可遺了緊要字蓋解中有極散緩者有緩急之間者有極緊要者某下一字時直是稱輕等重方敢寫出上言句心即此意方子且尋句內意方子凡讀書須看上下文意是如何不可泥著一字如揚子於仁也柔於義也剛到易中又將剛來配仁柔來配義如論語學不厭智也教不倦仁也到中庸又謂成己仁也成物智也此等須是各隨本文意看便自不相礙淳問一般字卻有淺深輕重如何看曰當看上下文節讀書須從文義上尋次則看注解今人卻於文義外尋索蓋卿傳注惟古注不作文卻好看只隨經句分說不離經意最好疏亦然今人解書且圖要作文又加辨說百般生疑故其文雖可讀而經意殊遠程子易傳亦成作文說了又說故今人觀者更不看本經只讀傳亦非所以使人思也大雅以下附論解經解經謂之解者只要解釋出來將聖賢之語解開了庶易讀泳聖經字若箇主人解者猶若奴僕今人不識主人且因奴僕通名方識得主人畢竟不如經字也泳隨文解義方子解經當如破的方子經書有不可解處只得闕若一向去解便有不通而謬處今之談經者往往有四者之病本卑也而抗之使高本淺也而鑿之使深本近也而推之使遠本明也而必使至於晦此今日談經之大患也蓋卿後世之解經者有三一儒者之經一文人之經東坡陳少南輩是也一禪者之經張子韶輩是也解書須先還他成句次還他文義添無緊要字卻不妨添重字不得今人所添者恰是重字端蒙聖賢說出來底言語自有語脈安頓得各有所在豈似後人胡亂說了也須玩索其旨所以學不可以不講講學固要大綱正然其間子細處亦不可以不講只緣當初講得不子細既不得聖賢之意後來胡亂執得一說便以為是只胡亂解將去必大錄此下云古人似未嘗理會文義今觀其說出底言語不曾有一字用不當者解經若於舊說一向人情他改三字不若改兩字改兩字不若且改一字至於甚不得已乃始改這意思終為害升卿凡學者解書切不可與他看本看本則心死在本子上只教他恁地說則他心便活亦且不解失忘了壽昌學者輕於著書皆是氣識淺薄使作得如此所謂聖雖學作兮所貴者資便儇皎厲兮去道遠而蓋此理醲厚非便儇皎厲不克負荷者所能當子張謂執德不弘人多以寬大訓弘字大無意味如何接連得焉能為有焉能為亡文義相貫蓋弘字有深沉重厚之意橫渠謂義理深沉方有造非淺易輕浮所可得也此語最佳問集注解此謂守所得而心不廣則德孤如何曰孤只是孤單所得只是這些道理別無所有故謂之德孤謨論著書編次文字須作草簿抄記項頭如此則免得用心去記他兵法有云車載糗糧兵仗以養力也編次文字用簿抄記此亦養心之法廣論編次文字今人讀書未多義理未至融會處若便去看史書考古今治亂理會制度典章譬如作陂塘以溉田須是陂塘中水已滿然後決之則可以流注滋殖田中禾稼若是陂塘中水方有一勺之多遽決之以溉田則非徒無益於田而一勺之水亦復無有矣讀書既多義理已融會胸中尺度一一已分明而不看史書考治亂理會制度典章則是猶陂塘之水已滿而不決以溉田若是讀書未多義理未有融會處而汲汲焉以看史為先務是猶決陂塘一勺之水以溉田也其涸也可立而待也廣以下讀史先看語孟中庸更看一經卻看史方易看先讀史記史記與左傳相包次看左傳次看通鑑有餘力則看全史只是看史不如今之看史有許多嶢崎看治亂如此成敗如此與治同道罔不興與亂同事罔不亡知得次第節今人只為不曾讀書祇是讀得粗書凡讀書先讀語孟然後觀史則如明鑑在此而妍醜不可逃若未讀徹語孟中庸大學便去看史胸中無一箇權衡多為所惑又有一般人都不曾讀書便言我已悟得道理如此便是惻隱之心如此便是羞惡之心如此便是是非之心渾是一箇私意如近時祧廟可見杞問讀史之法曰先讀史記及左氏卻看西漢東漢及三國志次看通鑑溫公初作編年起於威烈王後又添至共和後又作稽古錄始自上古然共和以上之年已不能推矣獨邵康節卻推至堯元年皇極經世書中可見編年難得好者前日周德華所寄來者亦不好溫公於本朝又作大事記若欲看本朝事當看長編若精力不及其次則當看國紀國紀只有長編十分之二耳時舉史亦不可不看看通鑑固好然須看正史一部卻看通鑑一代帝紀更逐件大事立箇綱目其間節目疏之於下恐可記得人傑饒宰問看通鑑曰通鑑難看不如看史記漢書史記漢書事多貫穿紀裏也有傳裏也有表裏也有志裏也有通鑑是逐年事逐年過了更無討頭處道夫錄云更無蹤跡饒廷老曰通鑑歷代具備看得大概且未免求速耳曰求速卻依舊不曾看得須用大段有記性者方可且如東晉以後有許多小國夷狄姓名頭項最多若是看正史後卻看通鑑見他姓名卻便知得他是某國人某舊讀通鑑亦是如此且草草看正史一上然後卻來看他芝問讀通鑑與正史如何曰好且看正史蓋正史每一事關涉處多只如高祖鴻門一事本紀與張良灌嬰諸傳互載又卻意思詳盡讀之使人心地懽洽便記得起通鑑則一處說便休直是無法有記性人方看得又問致堂管見初得之甚喜後見南軒集中云病敗不可言又以為專為檜設豈有言天下之理而專為一人者曰儘有好處但好惡不相掩爾曰只如頭一章論三晉事人多不以為然自今觀之只是祖溫公爾曰誠是祖但如周王不分封也無箇出場道夫讀史當觀大倫理大機會大治亂得失節凡觀書史只有箇是與不是觀其是求其不是觀其不是求其是然後便見得義理壽昌史且如此看讀去待知首尾稍熟後卻下手理會讀書皆然讀史有不可曉處劄出待去問人便且讀過有時讀別處撞著有文義與此相關便自曉得義剛問讀史曰只是以自家義理斷之大概自漢以來只是私意其間有偶合處爾只如此看他已得大概范唐鑑亦是此法然稍疏更看得密如他尤好然得似他亦得了端蒙讀史亦易見作史者意思後面成敗處他都說得意思在前面了如陳蕃殺宦者但讀前面許多疏脫都可見了甘露事亦然賀孫問芝史書記得熟否蘇丞相頌看史都在手上輪得他那資性直是會記芝曰亦緣多忘曰正緣如此也須大約記得某年有甚麼事某年有甚麼事纔記不起無緣會得浹洽芝云正緣是不浹洽曰合看兩件且看一件若兩件是四百字且二百字有何不可芝人讀史書節目處須要背得始得如讀漢書高祖辭沛公處義帝遣沛公入關處韓信初說漢王處與史贊過秦論之類皆用背得方是若只是略綽看過心下似有似無濟得甚事讀一件書須心心念念只在這書上令徹頭徹尾讀教精熟這說是如何那說是如何這說同處是如何不同處是如何安有不長進而今人只辦得十日讀書下著頭不與閑事管取便別莫說十日只讀得一日便有功驗人若辦得十來年讀書世間甚書讀不了今公們自正月至臘月三十日管取無一日專心致志在書上又云人做事須是專一且如張旭學草書見公孫大娘舞劍器而悟若不是他專心致志如何會悟楊志之患讀史無記性須三五遍方記得而後又忘了曰只是一遍讀時須用功作相別計止此更不再讀便記得有一士人讀周禮疏讀第一板訖則焚了讀第二板則又焚了便作焚舟計若初且草讀一遍準擬三四遍讀便記不牢又曰讀書須是有精力至之曰亦須是聰明曰雖是聰明亦須是靜方運得精神昔見延平說羅先生解春秋也淺不似胡文定後來隨人入廣在羅浮山住三兩年去那裏心靜須看得較透淳錄云那裏靜必做得工夫有長進處只是歸來道死不及叩之某初疑解春秋干心靜甚事後來方曉蓋靜則心虛道理方看得出義剛曰前輩也多是在背後處做幾年方成曰也有不恁地底如明道自二十歲及第一向出來做官自恁地便好了義剛
