body:
  text: 朱子語類卷第七十四易十上繫上繫辭或言造化以及易或言易以及造化不出此理上下繫辭說那許多爻直如此分明他人說得分明便淺近聖人說來卻不淺近有含蓄所以分在上下繫也無甚意義聖人偶然去這處說又去那處說嘗說道看易底不去理會道理卻只去理會這般底譬如讀詩者不去理會那四字句押韻底卻去理會十五國風次序相似淵問第一章第一節蓋言聖人因造化之自然以作易曰論其初則聖人是因天理之自然而著之於書此是後來人說話又是見天地之實體而知易之書如此如見天之尊地之卑卻知得易之所謂乾坤者如此如見天之高地之下卻知得易所分貴賤者如此又曰此是因至著之象以見至微之理天尊地卑至變化見矣是舉天地事理以明易自是故以下卻舉易以明天地間事人傑天尊地卑乾坤定矣觀天地則見易也僩天尊地卑上一截皆說面前道理下一截是說易書聖人做這箇易與天地準處如此如今看面前天地便是他那乾坤卑高便是貴賤聖人只是見成說這箇見得易是準這箇若把下面一句說做未畫之易也不妨然聖人是從那有易後說來淵天尊地卑乾坤定矣上句是說天地造化實體以明下句是說易中之事天尊地卑故易中之乾坤定矣楊氏說得深了易中固有屈伸往來之乾坤處然只是說乾坤之卦在易則有乾坤非是因有天地而始定乾坤天尊地卑章上一句皆說天地下一句皆說易如貴賤是易之位剛柔是易之變化類皆是易不必專主乾坤二卦而言方以類聚物以群分方只是事訓術訓道善有善之類惡有惡之類各以其類而聚也謨卑高以陳貴賤位矣此只是上句說天地間有卑有高故易之六爻有貴賤之位也故曰列貴賤者存乎位問方以類聚物以群分曰物各有類善有善類惡有惡類吉凶於是乎出又曰方以事言物以物言礪人傑錄云方猶事也方以類聚物以群分楊氏之說為方字所拘此只是物有本末事有終始之意隨其善惡而類聚群分善者吉惡者凶而吉凶亦由是而生耳伊川說是亦是言天下事物各有類分故存乎易者吉有吉類凶有凶類問方以類聚物以群分曰方向也所向善則善底人皆來聚所向惡則惡底人皆來聚物又是通天下之物而言是箇好物事則所聚者皆好物事也若是箇不好底物事則所聚者皆不好底物事也燾在天成象在地成形變化見矣上是天地之變化下是易之變化蓋變化是易中陰陽二爻之變化故曰變化者進退之象也變化只進退便是如自坤而乾則為進自乾而坤則為退進退在已變未定之間若已定則便是剛柔也問不知變化二字以成象成形者分言之不知是羇同說學履錄云問不知是變以成象化以成形為將是變化二字同在象形之間曰不必如此分曰莫分不得變化二字下章說得最分曉文蔚曰下章云變化者進退之象如此則變是自微而著化是自盛而衰曰固是變是自陰而陽化是自陽而陰易中說變化惟此處最親切如言剛柔者立本者也變通者趨時者也剛柔是體變通不過是二者盈虛消息而已此所謂變化故此章亦云剛柔者晝夜之象也變化者進退之象也剛柔者晝夜之象所謂立本變化者進退之象所謂趨時又如言吉凶者失得之象悔吝者憂虞之象悔吝便是吉凶底交互處悔是吉之漸吝是凶之端文蔚問變化是分在天地上說否曰難為分說變是自陰而陽自靜而動化是自陽而陰自動而靜漸漸化將去不見其跡又曰橫渠云變是倏忽之變化是逐旋不覺化將去恐易之意不如此說既而曰適間說類聚群分也未見說到物處易只是說一箇陰陽變化陰陽變化便自有吉凶下篇說得變化極分曉剛柔者晝夜之象也剛柔便是箇骨子只管恁地變化礪摩是那兩箇物事相摩济盪則是圜轉推盪將出來摩是八卦以前事盪是八卦以後為六十四卦底事盪是有那八卦了團旋推盪那六十四卦出來漢書所謂盪軍是團轉去殺他磨轉他底意思淵問剛柔相摩八卦相盪竊謂六十四卦之初剛柔兩畫而已兩而四四而八八而十六十六而三十二三十二而六十四皆是自然生生不已而謂之摩盪何也曰摩如物在一物上面摩旋底意思亦是相交意思如今人磨子相似下面一片不動上面一片只管摩旋推盪不曾住自兩儀生四象則老陽老陰不動而少陰少陽則交自四象生八卦則乾坤震巽不動而兌離坎艮則交自八卦而生六十四卦皆是從上加去下體不動每一卦生八卦故謂之摩盪銖剛柔相摩八卦相盪方是說做這卦做這卦了那鼓之以雷霆與風雨日月寒暑之變化皆在這卦中那成男成女之變化也在這卦中見造化關捩子才動那許多物事都出來易只是模寫他這箇淵鼓之以雷霆潤之以風雨此已上是將造化之實體對易中之理此下便是說易中卻有許多物事乾道成男坤道成女通人物言之如牡馬之類在植物亦有男女如有牡麻及竹有雌雄之類皆離陰陽剛柔不得乾知大始坤作成物知者管也乾管卻大始大始即物生之始乾始物而坤成之也謨或問乾知大始坤作成物乾以易知坤以簡能如何是知曰此知字訓管字不當解作知見之知大始是萬物資始乾以易故管之成物是萬物資生坤以簡故能之大抵談經只要自在不必泥於一字之間蓋卿乾知大始知主之意也如知縣知州乾為其初為其萌芽坤作成物坤管下面一截有所作為乾以易知乾陽物也陽剛健故作為易成坤以簡能坤因乾先發得有頭腦特因而為之故簡節乾以易知坤以簡能他是從上面乾知大始坤作成物處說來文蔚曰本義以知字作當字解其義如何曰此如說樂著大始大始就當體而言言乾當此大始然亦自有知覺之義文蔚曰此是那性分一邊事曰便是他屬陽坤作成物卻是作那成物乃是順乾乾以易知坤以簡能易簡在乾坤易則易知簡則易從卻是以人事言之兩箇易字又自不同一箇是簡易之易一箇是難易之易要之只是一箇字但微有毫釐之間因論天地間只有一箇陰陽故程先生云只有一箇感與應所謂陰與陽無處不是且如前後前便是陽後便是陰又如左右左便是陽右便是陰又如上下上面一截便是陽下面一截便是陰文蔚曰先生易說中謂伏羲作易驗陰陽消息兩端而已此語最盡曰陰陽雖是兩箇字然卻只是一氣之消息一進一退一消一長進處便是陽退處便是陰長處便是陽消處便是陰只是這一氣之消長做出古今天地間無限事來所以陰陽做一箇說亦得做兩箇說亦得文蔚問乾知是知坤作是行否曰是又問通乾坤言之有此理否曰有如何是易簡曰他行健所以易易是知阻難之謂人有私意便難簡只是順從而已若外更生出一分如何得簡今人多是私意所以不能簡易易故知之者易簡故從之者易有親者惟知之者易故人得而親之此一段通天人而言祖道乾以易知乾惟行健其所施為自是容易觀造化生長則可見只是這氣一過時萬物皆生了可見其易要生便生更無凝滯要做便做更無等待非健不能也僩乾德剛健他做時便通透徹達攔截障蔽他不住人剛健者亦如此乾以易知只是說他恁地做時不費力淵坤以簡能坤最省事更無勞攘他只承受那乾底生將出來他生將物出來便見得是能陰只是一箇順若不順如何配陽而生物淵易簡一畫是易兩畫是簡泳問乾坤易簡曰易簡只看健順可見又曰且以人論之如健底人則遇事時便做得去自然覺易易只是不難又如人稟得性順底人及其作事便自省事自然是簡簡只是不繁然乾之易只管得上一截事到下一截卻屬坤故易坤只是承乾故不著做上一截事只做下面一截故簡如乾以易知坤以簡能知便是做起頭能便是做了只觀隤然確然亦可見得易簡之理伯豐問簡易曰只是健順如人之健者做事自易順承者自簡靜而不繁只看下繫確然隤然自分曉易者只做得一半簡者承之又如乾恒易以知險坤恒簡以知阻因登山而知之高者視下可見其險有阻在前簡靜者不以為難人傑伯謨問乾坤簡易曰易只是要做便做簡是都不入自家思惟意思惟順他乾道做將去又問乾健德行常易以知險坤順德行常簡以知阻曰自上臨下為險自下升上為阻故乾無自下升上之義坤無自上降下之理賀孫問乾坤易簡曰簡字易曉易字難曉他是健了饒本云逐日被他健了自然恁地不勞氣力才從這裏過要生便生所謂因行不妨掉臂是這樣說話繫辭有數處說易簡皆是這意子細看便見又問健不是他要恁地是實理自然如此在人則順理而行便自容易不須安排曰順理自是簡底事所謂易便只是健健自是易學蒙乾以易知坤以簡能以上是言乾坤之德易則易知以下是就人而言言人兼體乾坤之德也乾以易知者乾健不息惟主於生物都無許多艱深險阻故能以易而知大始坤順承天惟以成物都無許多繁擾作為故能以簡而作成物大抵陽施陰受乾之生物如瓶施水其道至易坤惟承天以成物別無作為故其理至簡其在人則無艱阻而白直故人易知順理而不繁擾故人易從易知則人皆同心親之易從則人皆協力而有功矣有親可久則為賢人之德是就存主處言有功可大則為賢人之業是就做事處言蓋自乾以易知便是指存主處坤以簡能便是指做事處故易簡而天下之理得則與天地參矣銖問乾以易知坤以簡能本義云乾健而動故以易而知大始坤順而靜故以簡而作成物若以學者分上言之則廓然大公者易也物來順應者簡也不知是否曰然乾之易致知之事也坤之簡力行之事也問恐是下文易則易知簡則易從故知其所分如此否曰他以是而能知故人亦以是而知之所以坤之六二便只言力行底事榦天行健故易地承乎天柔順故簡簡易故無艱難敬仲問易則易知簡則易從曰乾坤只是健順之理非可指乾坤為天地亦不可指乾坤為二卦在天地與卦中皆是此理易知易從不必皆指聖人但易時自然易知簡時自然易從謨去偽同問如何是易知曰且從上一箇易字看看得易字分曉自然易知久之又曰簡則有箇睹當底意思看這事可行不可行可行則行不可行則止所以謂之順易則都無睹當無如何若何只是容易行將去如口之欲語如足之欲行更無因依口須是說話足須是行履如虎嘯風冽龍興致雲自然如此更無所等待非至健何以如此這箇只就健字上看惟其健所以易雖天下之至險亦安然行之如履平地此所以為至健坤則行到前面遇著有阻處便不行了此其所以為順僩問易則易知先作樂易看今又作容易如何曰未到樂易處礪曰容易如何便易知曰不須得理會易知且理會得易字了下面自然如破竹又曰這處便無言可解說只是易又曰只怕不健若健則自易易則是易知這如龍興而雲從虎嘯而風生相似又曰這如鴻毛之遇順風巨魚之縱大壑初不費氣力又曰簡便如順道理而行卻有商量易知則有親易從則有功惟易則人自親之簡則人自從之蓋艱阻則自是人不親繁碎則自是人不從人既親附則自然可以久長人既順從則所為之事自然廣大若其中險深不可測則誰親之做事不繁碎人所易從有人從之功便可成若是頭項多做得事來艱難底必無人從之只為易知易從故可親可久如人不可測度者自是難親亦豈能久煩碎者自是難從何緣得有功也謨易繫解易知易從云知則同心從則協力一於內故可久兼於外故可大如何曰既易知則人皆可以同心既易從則人皆可以協力一於內者謂可久是賢人之德德則得於己者兼於外者謂可大是賢人之業事業則見於外者故爾謨蕭兄問德業曰德者得也得之於心謂之德如得這箇孝則為孝之德業是做得成頭緒有次第了不然汎汎做只是俗事更無可守蓋卿德是得之於心業是事之有頭緒次第者方子黃子功問何以不言聖人之德業而言賢人之德業曰未消理會這箇得若恁地理會亦只是理會得一段文字良久乃曰乾坤只是一箇健順之理人之性無不具此雖千萬人吾往矣便是健雖褐寬博吾不惴焉便是順如剛果奮發謙遜退讓亦是所以君子富貴不能淫貧賤不能移威武不能屈非是剛強健之理如此至於出門如見大賓使民如承大祭非是巽懦順之理如此但要施之得其當施之不當便不是乾坤之理且如孝子事親須是下氣怡色起敬起孝若用健便是悖逆不孝之子事君須是立朝正色犯顏敢諫若用順便是阿諛順旨中庸說君子而時中時中之道施之得其宜便是文蔚曰通書云性者剛柔善惡中而已此一句說得亦好先生點頭曰古人自是說得好了後人說出來又好徐子融曰上蔡嘗云一部論語只是如此看今聽先生所論一部周易亦只消如此看先生默然文蔚可久則賢人之德可大則賢人之業楊氏可而已之說亦善又問不言聖人是未及聖人事否曰成位乎其中便是說抵著聖人張子所謂盡人道並立乎天地以成三才則盡人道非聖人不能程子之說不可曉按楊氏曰可而已非其至也故為賢人之德業本義謂法乾坤之事賢於人之賢易簡理得只是淨淨潔潔無許多勞擾委曲端蒙伯豐問成位乎其中程子張子二說孰是曰此只是說聖人程子說不可曉右第一章聖人設卦觀象至生變化三句是題目下面是解說這箇吉凶悔吝自大說去小處變化剛柔自小說去大處吉凶悔吝說人事變化剛柔說卦畫從剛柔而為變化又自變化而為剛柔所以下箇變化之極者未到極處時未成這箇物事變似那一物變時從萌芽變來成枝成葉化時是那消化了底意思淵剛柔相推是說陰陽二氣相推八卦相盪是說奇耦雜而為八卦在天則剛柔相推在易則八卦相盪然皆自易言一說則剛柔相推而成八卦八卦相盪而成六十四卦吉凶者失得之象悔吝者憂虞之象變化者進退之象剛柔者晝夜之象四句皆互換往來乍讀似不貫穿細看來不勝其密吉凶與悔吝相貫悔自凶而趨吉吝自吉而趨凶進退與晝夜相貫進自柔而趨乎剛退自剛而趨乎柔謨繫辭一字不胡亂下只人不子細看如吉凶者失得之象四句中間兩句悔是自凶而向乎吉吝是自吉而趨乎凶進是自柔而向乎剛退是自剛而趨乎柔又如乾知險坤知阻何故乾言險坤言阻舊因登山曉得自上而下來方見險處故以乾言自下而上去方見阻處故以坤言淳吉凶悔吝四者正如剛柔變化相似四者循環周而復始悔了便吉吉了便吝吝了便凶凶了便悔正如生於憂患死於安樂相似蓋憂苦患難中必悔悔便是吉之漸及至吉了少間便安意肆志必至做出不好可羞吝底事出來吝便是凶之漸矣及至凶矣又卻悔只管循環不已正如剛柔變化剛了化化了柔柔了變變便是剛亦循環不已吉似夏吝似秋凶似冬悔似春僩問本義說悔吝者憂虞之象以為悔自凶而趨吉吝自吉而向凶竊意人心本善物各有理若心之所發鄙吝而不知悔這便是自吉而向凶曰不然吉凶悔吝正是對那剛柔變化說剛極便柔柔極便剛這四箇循環如春夏秋冬相似凶便是冬悔便是春吉便是夏吝便是秋秋又是冬去又問此以配陰陽則其屬當如此於人事上說則如何曰天下事未嘗不生於憂患而死於安樂若這吉處不知戒懼自是生出吝來雖未至於凶畢竟是向那凶路上去又曰日中則昃月盈則食自古極亂未嘗不生於極治學蒙吉凶悔吝之象吉凶是兩頭悔吝在中間悔自凶而趨吉吝自吉而趨凶夔孫悔吝悔是做得過便有悔吝是做得這事軟了下梢無收殺不及故有吝端蒙悔者將自惡而入善吝者將自善而入惡節剛過當為悔柔過當為吝節過便悔不及便吝變化者進退之象是剛柔之未定者剛柔者晝夜之象是剛柔之已成者蓋柔變而趨於剛是退極而進剛化而趨於柔是進極而退既變而剛則晝而陽既化而柔則夜而陰猶言子午卯酉卯酉是陰陽之未定子午是陰陽之已定又如四象之有老少故此兩句惟以子午卯酉言之則明矣然陽化為柔只恁地消縮去無痕跡故曰化陰變為剛是其勢浸長有頭面故曰變此亦見陰半陽全陽先陰後陽之輕清無形而陰之重濁有跡也銖曰陰陽以氣言剛柔以質言既有卦爻可見則當以質言而不得以陰陽言矣故彖辭多言剛柔不言陰陽不知是否曰是銖問變化者進退之象與化而裁之存乎變曰這變化字又相對說那化而裁之存乎變底變字又說得來重如云幽則有鬼神鬼神本皆屬幽然以鬼神二字相對說則鬼又屬幽神又自屬明變化相對說則變是長化是消問消長皆是化否曰然也都是變更問此兩句疑以統體言則皆是化到換頭處便是變若相對言則變屬長化屬消化則漸漸化盡以至於無變則驟然而長變是自無而有化是自有而無問頃見先生說變是自陰而陽化是自陽而陰亦此意否曰然只觀出入息便見又問氣之發散者為陽收斂者為陰否曰也是如此如鼻氣之出入出者為陽收回者為陰入息如螺螄出殼了縮入相似是收入那出不盡底若只管出去不收便死矣問出入息畢竟出去時漸漸消到得出盡時便死否曰固是如此然那氣又只管生僩或問變化二字曰變是自陰之陽忽然而變故謂之變化是自陽之陰漸漸消磨將去故謂之化自陰而陽自是長得猛故謂之變自陽而之陰是漸漸消磨將去問變者化之漸化者變之成如昨日是夏今日是秋為變到那全然天涼沒一些熱時是化否曰然又問這箇變化字卻與變化者進退之象不同如何曰這又別有些意思是言剛化為柔柔變為剛蓋變是自無而有化是自有而無也燾問本義解吉凶者失得之象也一段下云剛柔相推而生變化變化之極復為剛柔流行乎一卦六爻之中而占者得因其所值以為吉凶之決竊意在天地之中陰陽變化無窮而萬物得因之以生生在卦爻之中九六變化無窮而人始得因其變以占吉凶曰易自是占其變若都變了只一爻不變則反以不變者為主或都全不變則不變者又反是變也學蒙繫辭中如吉凶者失得之象一段解得自有功恐聖人本意未必不如此問聖人以此洗心一段亦恐非先儒所及曰也且得如此說不知畢竟是如何榦問所居而安者易之序也與居則觀其象之居不同上居字是總就身之所處而言下居字是靜對動而言曰然學履問所居而安者易之序也曰序是次序謂卦及爻之初終如潛見飛躍循其序則安又問所樂而玩者爻之辭曰橫渠謂每讀每有益所以可樂蓋有契於心則自然樂居則觀其象玩其辭動則觀其變玩其占如何曰若是理會不得卻如何占得必是閒常理會得此道理到用時便占右第二章悔吝二義悔者將趨於吉而未至於吉吝者將趨於凶而未至於凶又問所謂小疵者只是以其未便至於吉凶否曰悔是漸好知道是錯了便有進善之理悔便到無咎吝者喑嗚說不出心下不足沒分曉然未至大過故曰小疵然小疵畢竟是小過齊小大者存乎卦齊猶分辨之意一云猶斷也小謂否睽之類大謂泰謙之類如泰謙之辭便平易睽困之辭便艱險故曰卦有小大辭有險易此說與本義異人傑齊小大者存乎卦曰齊字又不是整齊自有箇如準如協字是分辨字泰為大否為小辭有險易直是吉卦易凶卦險泰謙之類說得平易睽蹇之類說得艱險問憂悔吝者存乎介悔吝未至於吉凶是那初萌動可以向吉凶之微處介又是悔吝之微處介字如界至界限之界是善惡初分界處於此憂之則不至悔吝矣曰然學蒙憂悔吝者存乎介震無咎者存乎悔悔吝固是吉凶之小者介又是幾微之間慮悔吝之來當察於幾微之際無咎者本是有咎善補過則為無咎震動也欲動而無咎當存乎悔爾悔吝在吉凶之間悔是自凶而趨吉吝是自吉而之凶悔吝小於吉凶而將至於吉凶者也謨問卦有小大舊說謂大畜小畜大過小過如此則只說得四卦曰看來只是好底卦便是大不好底卦便是小如復如泰如大有如夬之類是好底卦如睽如困如小過底盡不好底譬如人光明磊落底便是好人昏昧迷暗底便是不好人所以謂卦有小大辭有險易大卦辭易小卦辭險即此可見學履問卦有小大辭有險易陽卦為大陰卦為小觀其爻之所向而為之辭如休復吉底辭自是平易如困於葛藟底辭自是險曰這般處依約看也是恁地自是不曾見得他底透只得隨眾說如所謂吉凶者失得之象一段卻是徹底見得聖人當初作易時意似這處更移易一字不得其他處不能盡見得如此所以不能盡見得聖人之心學蒙右第三章問易與天地準故能彌綸天地之道曰易道本與天地齊準所以能彌綸之凡天地間之物無非易之道故易能彌綸天地之道而聖人用之也彌如封彌之彌糊合便無縫罅綸如綸絲之綸自有條理言雖是彌得外面無縫罅而中則事事物物各有條理彌如大德敦化綸如小德川流彌而非綸則空疏無物綸而非彌則判然不相干此二字見得聖人下字甚密也學履問易與天地準故能彌綸天地之道曰凡天地有許多道理易上都有所以與天地齊準而能彌綸天地之道彌字若今所謂封彌試卷之彌又若彌縫之彌是恁地都無縫底意思解作遍滿也不甚似又曰天地有不了處易卻彌縫得他學蒙彌綸天地之道彌字如封彌之義惟其封彌得無縫罅所以能遍滿也僩仰以觀天文俯以察地理是故知幽明之故注云天文則有晝夜上下地理則有南北高深不知如何曰晝明夜幽上明下幽觀晝夜之運日月星辰之上下可見此天文幽明之所以然南明北幽高明深幽觀之南北高深可見此地理幽明之所以然又云始終死生是以循環言精氣鬼神是以聚散言其實不過陰陽兩端而已學履仰以觀於天文俯以察於地理天文是陽地理是陰然各有陰陽天之晝是陽夜是陰日是陽月是陰地如高屬陽下屬陰平坦屬陽險阻屬陰東南屬陽西北屬陰幽明便是陰陽問似以觀於天文俯以察於地理是以此易書之理仰觀俯察否曰所以仰以觀天文俯以察地理是故知幽明之故幽明便是陰陽剛柔凡許多說話只是說一箇陰陽南便是明北便是幽日出地上便是明日入地下便是幽仰觀俯察便皆知其故觀文察理以至知鬼神之情狀皆是言窮理之事直是要知得許多然後謂之窮理謨正卿問原始反終故知死生之說曰人未死如何知得死之說只是原其始之理將後面摺轉來看便見得以此之有知彼之無問反字如何曰推原其始而反其終謂如方推原其始初卻摺轉一摺來如回頭之義是反回來觀其終也人傑錄云卻回頭轉來看其終精氣為物是合精與氣而成物精魄而氣魂也變則是魂魄相離雖獨說遊魂而不言魄而離魄之意自可見矣學蒙林安卿問精氣為物遊魂為變曰此是兩箇合一箇離精氣合則魂魄凝結而為物離則陽已散而陰無所歸故為變精氣為物精陰也氣陽也仁者見之謂之仁智者見之謂之智仁陽也智陰也人傑義剛同問尹子解遊魂一句為鬼神如何曰此只是聚散聚而為物者神也散而為變者鬼也鬼神便有陰陽之分只於屈伸往來觀之橫渠說精氣自無而有遊魂自有而無其說亦分曉然精屬陰氣屬陽然又自有錯綜底道理然就一人之身將來橫看生便帶著箇死底道理人身雖是屬陽而體魄便屬陰及其死而屬陰又卻是此氣便亦屬陽蓋死則魂氣上升而魄形下降古人說徂落二字極有義理便是謂魂魄徂者魂升於天落者魄降於地只就人身便亦是鬼神如祭祀求諸陽便是求其魂求諸陰便是求其魄祭義中宰我問鬼神一段說得好注解得亦好問與天地相似故不違曰上面是說與天地準這處是說聖人與天地相似又曰與天地相似方且無外凡事都不出這天地範圍之內所以方始得知周乎萬物而道又能濟天下旁行也不走作與天地相似故不違上文言易之道與天地相似此言聖人之道與天地準也惟其人不違所以與天地相似若此心有外則與天地不相似矣此下數句皆是與天地相似之事也上文易與天地準下數句皆易與天地準之事也旁行而不流言其道旁行而不流於偏也範圍天地之化而不過自有大底範圍又自有小底範圍而今且就身上看一事有一箇範圍通乎晝夜之道而知通訓兼言兼晝與夜皆知也僩與天地相似是說聖人第一句汎說知周乎萬物而道濟天下是細密底工夫知便直要周乎萬物無一物之遺道直要濟天下知周乎萬物便是知幽明死生鬼神之理問注云知周萬物者天也道濟天下者地也是如何曰此與後段仁者見之謂之仁知者見之謂之知又自不同此以清濁言彼以動靜言智是先知得較虛故屬之天道濟天下則普濟萬物實惠及民故屬之地旁行不流樂天知命故不憂此兩句本皆是知之事蓋不流便是貞也不流是本旁行是應變處無本則不能應變能應變而無其本則流而入變詐矣細分之則旁行是知不流屬仁其實皆是知之事對下文安土敦乎仁故能愛一句專說仁也學履知周萬物是體旁行是可與權乃推行處樂天知命是自處三節各說一理淵旁行而不流曰此小變而不失其大常然前後卻有故字又相對此一句突然易中自時有恁地處頗難曉問樂天知命云通上下言之又曰聖人之知天命則異於此某竊謂樂天知命便是說聖人曰此一段亦未安樂天知命便是聖人異者謂與不知命無以為君子自別可學安土敦乎仁對樂天知命言之所寓而安篤厚於仁更無夾雜純是天理自易與天地準而下皆發明陰陽之理人傑問安土敦乎仁故能愛曰此是與上文樂天知命對說樂天知命是知崇安土敦仁是禮卑安是隨所居而安在在處處皆安若自家不安何以能愛敦只是篤厚去盡己私全是天理更無夾雜充足盈滿方有箇敦厚之意只是仁而又仁敦厚於仁故能愛惟安土敦仁則其愛自廣安土者隨所寓而安若自擇安處便只知有己不知有物也此厚於仁者之事故能愛也去偽安土敦乎仁故能愛聖人說仁是恁地說不似江西人說知覺相似此句說仁最密淵範圍天地之化範是鑄金作範圍是圍裹如天地之化都沒箇遮攔聖人便將天地之道一如用範來範成箇物包裹了試舉一端如在天便做成四時十二月二十四氣七十二候之類以此做箇塗轍更無過差此特其小爾問範圍天地之化而不過曰天地之化滔滔無窮如一爐金汁鎔化不息聖人則為之鑄瀉成器使人模範匡郭不使過於中道也曲成萬物而不遺此又是就事物之分量形質隨其大小闊狹長短方圓無不各成就此物之理無有遺闕範圍天地是極其大而言曲成萬物是極其小而言範圍如大德敦化曲成如小德川流學履問範圍天地之化而不過如天之生物至秋而成聖人則為之斂藏人之生也欲動情勝聖人則為之教化防範此皆是範圍而使之不過之事否曰範圍之事闊大此亦其一事也今且就身上看如何或曰如視聽言動皆當存養使不過差此便是否曰事事物物無非天地之化皆當有以範圍之就喜怒哀樂而言喜所當喜怒所當怒之類皆範圍也能範圍之不過曲成之不遺方始見得這神無方易無體若範圍有不盡曲成有所遺神便有方易便有體矣學蒙通乎晝夜之道而知既曰通又曰知似不可曉然通是兼通若通晝不通夜通生不通死便是不知便是神有方易有體了學蒙通乎晝夜之道而知通字只是兼乎晝夜之道而知其所以然大抵此一章自易與天地準以下只是言箇陰陽仁者見之謂之仁仁亦屬陽知者見之謂之知知亦屬陰此就人氣質有偏處分陰陽如繼之者善成之者性便於造化流行處分陰陽因問尹子鬼神情狀只是解遊魂為變一句即是將神字亦作鬼字看了程張說得甚明白尹子親見伊川何以不知此義曰尹子見伊川晚又性質朴鈍想伊川亦不曾與他說神無方而易無體神便是忽然在陰又忽然在陽底易便是或為陰或為陽如為春又為夏為秋又為冬交錯代換而不可以形體拘也學履神無方易無體神自是無方易自是無體方是四方上下神卻或在此或在彼故云無方易無體者或自陰而陽或自陽而陰無確定底故云無體自與那其體則謂之易不同各自是說一箇道理若恁地滾將來說少間都說不去他那箇是說上天之載無聲無臭其體則謂之易這只是說箇陰陽動靜闢闔剛柔消長不著這七八箇字說不了若喚做易只一字便了易是變易陰陽無一日不變無一時不變莊子分明說易以道陰陽要看易須當恁地看事物都是那陰陽做出來淵易無體這箇物事逐日各自是箇頭面日異而時不同淵右第四章分章今依本義一陰一陽之謂道陰陽何以謂之道曰當離合看可學一陰一陽之謂道陰陽是氣不是道所以為陰陽者乃道也若只言陰陽之謂道則陰陽是道今曰一陰一陽則是所以循環者乃道也一闔一闢謂之變亦然驤問一陰一陽之謂道曰此與一闔一闢謂之變相似陰陽非道也一陰又一陽循環不已乃道也只說一陰一陽便見得陰陽往來循環不已之意此理即道也又問若爾則屈伸往來非道也所以屈伸往來循環不已乃道也先生頷之銖道須是合理與氣看理是虛底物事無那氣質則此理無安頓處易說一陰一陽之謂道這便兼理與氣而言陰陽氣也一陰一陽則是理矣猶言一闔一闢謂之變闔闢非變也一闔一闢則是變也蓋陰陽非道所以陰陽者道也橫渠言由氣化有道之名合虛與氣有性之名意亦以虛為理然虛卻不可謂之理理則虛爾亦猶敬則虛靜不可把虛靜喚作敬端蒙問本義云道具於陰而行乎陽竊意道之大體云云是則動靜無端陰陽無始要之造化之初必始於靜曰既曰無端無始如何又始於靜看來只是一箇實理動則為陽靜則為陰云云今之所謂動者便是前面靜底末梢其實靜前又動動前又靜只管推上去更無了期所以只得從這處說起或問一陰一陽之謂道曰以一日言之則晝陽而夜陰以一月言之則望前為陽望後為陰以一歲言之則春夏為陽秋冬為陰從古至今恁地滾將去只是箇陰陽是孰使之然哉乃道也從此句下又分兩腳此氣之動為人物渾是一箇道理故人未生以前此理本善所以謂繼之者善此則屬陽氣質既定為人為物所以謂成之者性此則屬陰學蒙問一陰一陽之謂道曰一陰一陽此是天地之理如大哉乾元萬物資始乃繼之者善也乾道變化各正性命此成之者性也這一段是說天地生成萬物之意不是說人性上事謨去偽同一陰一陽之謂道太極也繼之者善生生不已之意屬陽成之者性各正性命之意屬陰通書第一章可見如說純粹至善卻是統言道理人傑一陰一陽之謂道就人身言之道是吾心繼之者善是吾心發見惻隱羞惡之類成之者性是吾心之理所以為仁義禮智是也人傑問孟子只言性善易繫辭卻云一陰一陽之謂道繼之者善也成之者性也如此則性與善卻是二事曰一陰一陽是總名繼之者善是二氣五行事成之者性是氣化已後事去偽流行造化處是善凝成於我者即是性繼是接續綿綿不息之意成是凝成有主之意大雅造化所以發育萬物者為繼之者善各正其性命者為成之者性榦繼之者善也元亨是氣之方行而未著於物也是上一截事成之者性也利貞是氣之結成一物也是下一截事節繼之者善方是天理流行之初人物所資以始成之者性則此理各自有箇安頓處故為人為物或昏或明方是定若是未有形質則此性是天地之理如何把做人物之性得端蒙繼之者善成之者性性便是善可學繼之者善如水之流行成之者性如水之止而成潭也椿問繼之者善成之者性是道是器曰繼之成之是器善與性是道人傑易大傳言繼善是指未生之前孟子言性善是指已生之後雖曰已生然其本體初不相離也銖或問成之者性曰性如寶珠氣質如水水有清有汙故珠或全見或半見或不見又問先生嘗說性是理本無是物若譬之寶珠則卻有是物曰譬喻無十分親切底蓋卿問仁者見之至鮮矣曰此言萬物各具是性但氣稟不同各以其性之所近者窺之故仁者只見得他發生流動處便以為仁知者只見得他貞靜處便以為知下此一等百姓日用之間習矣而不察所以君子之道鮮矣學蒙顯諸仁藏諸用二句只是一事顯諸仁是可見底便是繼之者善也藏諸用是不可見底便是成之者性也藏諸用是顯諸仁底骨子正如說一而二二而一者也張文定公說事未判屬陽已判屬陰亦是此意顯諸仁藏諸用亦如元亨利貞錄云是元亨誠之通利貞誠之復元亨是發用流行處利貞便是流行底骨子又曰顯諸仁德之所以盛藏諸用業之所以成譬如一樹一根生許多枝葉花實此是顯諸仁處及至結實一核成一箇種子此是藏諸用處生生不已所謂日新也萬物無不具此理所謂富有也僩顯諸仁藏諸用二句本只是一事藏諸用便在那顯諸仁裏面正如昨夜說一故神雨故化相似只是一事顯諸仁是可見底藏諸用是不可見底顯諸仁是流行發用處藏諸用是流行發見底物顯諸仁是千頭萬緒藏諸用只是一箇物事藏諸用是顯諸仁底骨子譬如一樹花皆是顯諸仁及至此花結實則一花自成一實方眾花開時共此一樹共一箇性命及至結實成熟後一實又自成一箇性命如子在魚腹中時與母共是一箇性命及子既成則一子自成一性命顯諸仁千變萬化藏諸用則只是一箇物事一定而不可易張乖崖說公事未判時屬陽已判後屬陰便是這意公事未判生殺輕重皆未定及已判了更不可易顯諸仁便是繼之者善也藏諸用便是成之者性也天下之事其燦然發見處皆是顯然者然一事自是一事一物自是一物如元亨利貞元亨是發用流行處貞便是流行底骨子流行箇甚麼只是流行那貞而已或曰正如乾道變化各正性命否曰顯諸仁似恕藏諸用似忠顯諸仁似貫藏諸用似一如水流而為川止而為淵激而為波浪雖所居不同然皆是水也水便是骨子其流處激處皆顯者也顯諸仁如惻隱之心藏諸用似仁也惻隱羞惡辭遜是非顯諸仁也仁義禮智藏諸用也只是這箇惻隱隨事發見及至成那事時一事各成一仁此便是藏諸用其發見時在這道理中發去及至成這事時又只是這箇道理一事既各成一道理此便是業業是事之已成處事未成時不得謂之業盛德便是顯諸仁處顯諸仁者德之所以盛藏諸用者業之所以成鼓萬物而不與聖人同憂此正是顯諸仁藏諸用底時節盛德大業便是顯仁藏用成就處也又曰耳之能聽目之能視口之能言手之能執足之能履皆是發處也畢竟怎生會恁地發用釋氏便將這些子來暪人秀才不識便被他瞞又云一叢禾他初生時共這一株結成許多苗葉花實共成一箇性命及至收成結實則一粒各成一箇性命只管生生不已所謂日新也富有之謂大業言萬物萬事無非得此理所謂富有也日新是只管運用流行生生不已道家修養有納甲之法皆只用乾坤艮巽震兌六卦流行運用而不用坎離便是那六卦流行底骨子所以流行運用者只流行此坎離而已便是顯諸仁藏諸用之說顯諸仁是流行發見處藏諸用是流行發見底物正如以穀喻仁是藏諸用也及發為親親仁民愛物一事又各自成一仁顯諸仁是用底跡藏諸用是仁底心問本義云顯者陽之仁也德之發也藏者陰之知也業之成也按此問是據未定本竊意以為天地之理動而陽則萬物之發生者皆其仁之顯著靜而陰則其用藏而不可見其顯諸仁則是德之發見其藏諸用則萬物各得以為性是業之成也曰不如此這處極微難說又曰顯諸仁易說藏諸用極難說這用字如橫渠說一故神神字用字一樣顯諸仁如春生夏長發生彰露所可見者藏諸用是所以生長者藏在裏面而不可見又這箇有作先後說處如元亨利貞之類有作表裏說處便是這裏又曰元亨利貞也可作表裏說所謂流行者別無物事只是流行這箇又曰譬之仁發出來便是惻隱之心便是顯諸仁仁便是藏諸用又曰仁便藏在惻隱之心裏面仁便是那骨子到得成就得數件事了一件事上自是一箇仁便是那業處又曰流行時便是公共一箇到得成就處便是各具一箇又曰惻隱之心方是流行處到得親親仁民愛物方是成就處但盛德便屬之顯諸仁大業便屬之藏諸用又曰如此一穗禾其始只用一箇母子少間成穀一箇各自成得一箇將去種植一箇又自成一穗又開枝開葉去所以下文謂富有之謂大業又曰須是去靜坐體認方可見得四時運行萬物終始若道有箇物行又無形影若道無箇物又怎生會恁地鼓萬物而不與聖人同憂此言造化之理如聖人則只是人安得而無憂謨天地造化是自然聖人雖生知安行然畢竟是有心去做所以說不與聖人同憂淵問鼓萬物而不與聖人同憂曰明道兩句最好天地無心而成化聖人有心而無為無心便是不憂成化便是鼓萬物天地鼓萬物亦何嘗有心來去偽盛德大業至矣哉是贊歎上面顯諸仁藏諸用淵盛德大業以下都是說易之理非指聖人而言盛德大業一章曰既說盛德大業又說他只管恁地生去所以接之以生生之謂易是漸漸說入易上去乾只略成一箇形象坤便都呈見出許多法來到坤處都細了萬法一齊出見效字如效順效忠效力之效極數知來之謂占占出這事人便依他這箇做便是通變之謂事看來聖人到這處便說在占上去則此書分明是要占矣陰陽不測之謂神是總結這一段不測者是在這裏又在那裏便是這一箇物事走來走去無處不在六十四卦都說了這又說三百八十四爻許多變化只是這一箇物事周流其間學蒙先說箇富有方始說日新此與說宇宙相似先是有這物事了方始相連相續去自富有至效法是說其理如此用處卻在那極數知來與通變上面蓋說上面許多道理要做這用淵問日新之謂盛德生生之謂易陰陽不測之謂神要思而得之明道提此三句說意是如何曰此三句也是緊要須是看得本文方得問德是得於己底業是發出來底德便是本生生之謂易便是體成象之謂乾效法之謂坤便只是裏面交錯底曰乾坤其易之蘊易是一塊乾坤是在裏面往來底聖人作易便是如此又問陰陽不測之謂神便是妙用處曰便是包括許多道理夔孫成象之謂乾此造化方有些顯露處效法之謂坤以法言之則大段詳密矣效字難看如效力效誠之效有陳獻底意思乾坤只是理理本無心自人而觀猶必待乾之成象而後坤能效法然理自如此本無相待且如四時亦只是自然迭運春夏生物初不道要秋冬成之秋冬成物又不道成就春夏之所生皆是理之所必然者爾謨成象之謂乾效法之謂坤依舊只是陰陽凡屬陽底便是只有箇象而已象是方做未成形之意已成便屬陰成象謂如日月星辰在天亦無箇實形只是箇懸象如此乾便略坤便詳效如陳效之效若今人言效力之類法是有一成己定之物可以形狀見者如條法亦是實有已成之法效法之謂坤到這箇坤時都仔細詳審了一箇是一箇模樣效猶呈一似說效犬效羊效牛效馬言呈出許多物大概乾底只是做得箇形象到得坤底則漸次詳密資始資生於此可見淵效呈也如曲禮效犬者左牽之之效猶言效順效忠效力也蓋乾只是成得箇大象坤便呈出那法來成象之謂乾謂風霆雨露日星只是箇象效者效力之效效法則效其形法而可見也人傑右第五章夫易廣矣大矣止靜而正是無大無小無物不包然當體便各具此道理靜而正須著工夫看徐又曰未動時便都有此道理都是真實所以下箇正字以言乎邇則靜而正以言乎天地之間則備矣靜而正謂觸處皆見有此道不待安排不待措置雖至小至近至鄙至陋之事無不見有隨處皆見足無所欠闕只觀之人身便見見有見足之見賢遍反僩其動也闢大抵陰是兩件如陰爻兩畫闢是兩開去翕是兩合如地皮上生出物來地皮須開今論天道包著地在然天之氣卻貫在地中地卻虛有以受天之氣下文有大生廣生云者大是一箇大底物事廣便是容得許多物事大字實廣字虛其靜也翕其動也闢地到冬間氣都翕聚不開至春則天氣下入地地氣開以迎之又曰陰陽與天地自是兩件物事陰陽是二氣天地是兩箇有形質底物事如何做一物說得不成說動為天而靜為地無此理正如鬼神之說僩乾靜專動直而大生坤靜翕動闢而廣生這說陰陽體性如此卦畫也髣彿似恁地淵乾坤二卦觀之亦可見乾畫奇便見得其靜也專其動也直坤畫耦便見得其靜也翕其動也闢直卿端蒙天體大是以大生焉地體虛是以廣生焉廣有虛之義如河廣漢廣之廣敬仲本義云乾一而實故以質言而曰大坤二而虛故以量言而曰廣學者請問曰此兩句解得極分明蓋曰以形言之則天包地外地在天中所以說天之質大以理與氣言之則地卻包著天天之氣卻盡在地之中地盡承受得那天之氣所以說地之量廣天只是一箇物事一故實從裏面便實出來流行發生只是一箇物事所以說乾一而實地雖是堅實然卻虛所以天之氣流行乎地之中皆從地裏發出來所以說坤二而虛用之云地形如肺形質雖硬而中本虛故陽氣升降乎其中無所障礙雖金石也透過去地便承受得這氣發育萬物曰然要之天形如一箇鼓价天便是那鼓价外面皮殼子中間包得許多氣開闔消長所以說乾一而實地只是一箇物事中間盡是這氣升降來往緣中間虛故容得這氣升降來往以其包得地所以說其質之大以其容得天之氣所以說其量之廣非是說地之形有盡故以量言也只是說地盡容得天之氣所以說其量之廣耳今治曆家用律呂候氣其法最精氣之至也分寸不差便是這氣都在地中透上來如十一月冬至黃鐘管距地九寸以葭灰實其中至之日氣至灰去晷刻不差又云看來天地中間此氣升降上下當分為六層十一月冬至自下面第一層生起直到第六層上極至天是為四月陽氣既生足便消下面陰氣便生只是這一氣升降循環不已往來乎六層之中也問月令中天氣下降地氣上騰此又似天地各有氣相交合曰只是這一氣只是陽極則消而陰生陰極則消而陽生天氣下降便只是冬至復卦之時陽氣在下面生起故云天氣下降或曰據此則卻是陰消於上而陽生於下卻見不得天氣下降曰也須是天運一轉則陽氣在下故從下生也今以天運言之則一日自轉一匝然又有那大轉底時候須是大著心腸看始得不可拘一不通也蓋天本是箇大底物事以偏滯求他不得僩問陰耦陽奇就天地之實形上看如何見得曰天是一箇渾淪底物雖包乎地之外而氣則迸出乎地之中地雖一塊物在天之中其中實虛容得天之氣迸上來繫辭云乾靜也專動也直是以大生焉坤靜也翕動也闢是以廣生焉大生是渾淪無所不包廣生是廣闊能容受得那天之氣專直則只是一物直去翕闢則是兩箇翕則闔闢則開此奇耦之形也又曰陰偏只是一半兩箇方做得一箇學履易不是象乾坤乾坤乃是易之子目下面一壁子是乾一壁子是坤蓋說易之廣大是這乾便做他那大坤便做他那廣乾所以說大時塞了他中心所以大坤所以說廣時中間虛容得物所以廣廣是說他廣闊著得物常說道地對天不得天便包得地在中心然而地卻是中虛容得氣過容得物便是他廣天是一直大底物事地是廣闊底物有坳處有陷處所以說廣這箇只是說理然也是說書有這理便有這書書是載那道理底若死分不得大概上面幾句是虛說底這箇配天地四時日月至德是說他實處淵陰陽雖便是天地然畢竟天地自是天地廣大配天地時這箇理與他一般廣大淵廣大配天地變通配四時陰陽之義配日月以易配天易簡之善配至德以易配人之至德人傑問易簡之善配至德曰此是以易中之理取外面一事來對謂易之廣大故可配天地易之變通如老陽變陰老陰變陽往來變化故可配四時陰陽之義便是日月相似易簡之善便如在人之至德問廣大配天地變通配四時這配字是配合底意思否曰只是相似之意又問易簡之善配至德曰也是易上有這道理如人心之至德也學履林安卿問廣大配天地配莫是配合否曰配只是似且如下句云變通配四時四時如何配合四時自是流行不息所謂變通者如此又問易簡之善配至德曰易簡是常行之理至德是自家所得者又問伊川解知微知彰知柔知剛云知微則知彰知柔則知剛如何曰只作四截看較闊言君子無所不知良久笑云向時有箇人出此語令楊大年對楊應聲云小人不恥不仁不畏不義無如此恰好義剛問廣大變通是易上自有底道理是易上所說造化與聖人底曰都是他易上說底又曰配是分配之義是分這一半在那上面問曰如此便全無配之底意曰也有些子分此以合彼意思欲見其廣大則於天地乎觀之欲見其變通則於四時乎觀之欲知其陰陽之義則觀於日用可見欲知其簡易則觀於聖人之至德可見右第六章崇德廣業知崇天也是致知事要得高明禮卑地也是踐履事卑是事事都要踐履過凡事踐履將去業自然廣禮卑是卑順之意卑便廣地卑便廣高則狹了人若只揀取高底做便狹兩腳踏地做方得若是著件物事填教一二尺高便不穩了如何會廣地卑便會廣世上更無卑似地底又曰地卑是從貼底謹細處做將去所以能廣淵知崇禮卑一段云地至卑無物不載在地上縱開井百尺依舊在地上是無物更卑得似地所謂德言盛禮言恭禮是要極卑故無物事無箇禮至於至微至細底事皆當畏懼戒謹戰戰兢兢惟恐失之這便是禮之卑處曲禮曰毋不敬自上東階先右足上西階先左足羹之有菜者用梜無菜者不用梜無所不致其謹這便都是卑處又曰似這處不是他特地要恁地是他天理合如此知識日多則知日高這事也合理那事也合理積累得多業便廣學蒙或錄詳見下禮極是卑底物事如地相似無有出其下者看甚麼物事他盡載了縱穿地數十丈深亦只在地之上無緣更有卑於地者也知卻要極其高明而禮則要極於卑順如禮儀三百威儀三千纖悉委曲無非至卑之事如羹之有菜者用梜其無菜者不用梜主人升東階客上西階皆不可亂然不是強安排皆是天理之自然如上東階則先右足上西階則先左足蓋上西階而先右足則背卻主人上東階而先左足則背卻客自是理合如此又曰知崇者德之所以崇禮卑者業之所以廣蓋禮纔有些不到處這便有所欠闕業便不廣矣惟是極卑無所欠闕所以廣知崇禮卑知是知處禮是行處知儘要高行卻自近起可學知識貴乎高明踐履貴乎著實知既高明須放低著實做去銖學只是知與禮他這意思卻好禮便細密中庸致廣大盡精微等語皆只是說知禮淵知崇禮卑這是兩截知崇是智識超邁禮卑是須就切實處行若知不高則識見淺陋若履不切則所行不實知識高便是象天所行實便是法地識見高於上所行實於下中間便生生而不窮故說易行乎其中成性存存道義之門大學所說格物致知是知崇之事所說誠意正心修身齊家治國平天下是禮卑之事賀孫上文言知崇禮卑崇效天卑法地人崇其知須是如天之高卑其禮須如地之廣天地設位一句只是引起要說知崇禮卑人之知禮能如天地便能成其性存其存道義便自此出所謂道義便是易也成性存存不必專主聖人言去偽成性猶言見成底性這性元是好了但知崇禮卑則成性便存存學蒙成性只是本來性節成性不曾作壞底存謂常在這裏存之又存泳成性如名明德如表德相似天命都一般泳或問成性存存是不忘其所存曰眾人多是說到聖人處方是性之成看來不如此成性只是一箇渾淪之性存而不失便是道義之門便是生生不已處卓成性與成之者性也止爭些子不同成之者性便從上說來言成這一箇物成性是說已成底性如成德成說之成然亦只爭些子也如正心心正誠意意誠相似賀孫成性存存道義之門只是此性萬善畢具無有欠闕故曰成性成對虧而言成之者性則是成就處無非性猶曰誠斯立焉橫渠伊川說成性似都就人為處說恐不如此橫渠有習以成性底意思伊川則言成其性存其所存端蒙橫渠謂成其性存其存伊川易傳中亦是存其存卻是遺書中說作生生之謂易意思好必大錄云成性如言成就存存是生生不已之意知禮成性而道義出程子說成性謂是萬物自有成性存存便是生生不已這是語錄中說此意卻好及他解易卻說成其性存其存又似不恁地前面說成性謂如成事成法之類是見成底性橫渠說成性別且如堯舜性之是其性本渾成學者學之須是以知禮做也到得他成性處道義出謂這裏流行道體也義用也又曰性是自家所以得於天底道義是眾人公共底夔孫橫渠言成性與古人不同他所說性雖是那箇性然曰成性則猶言踐形也又曰他是說去氣稟物欲之私以成其性道夫知崇禮卑則性自存橫渠之說非是如云性未成則善惡混當亹亹而繼之以善云云又云纖惡必除善斯成性矣皆是此病知禮成性則道義出先生本義中引此而改成為存又曰橫渠言成性猶孟子云踐形此說不是夫性是本然已成之性豈待習而後成邪他從上文繼之者善也成之者性也便是如此說來與孔子之意不相似僩橫渠知崇天也一段言知識高明如天形而上指此理通乎晝夜而知通猶兼也兼陰陽晝夜之道而知知晝而不知夜知夜不知晝則知皆未盡也合知禮而成性則道義出矣知禮行處也端蒙問橫渠知禮成性之說曰橫渠說成性謂是渾成底性知禮成性如習與性成之意同又問不以禮性之曰如堯舜性之相似但他言語艱意是如此夔孫右第七章
