body:
  text: 朱子語類卷第十二學六持守自古聖賢皆以心地為本士毅聖賢千言萬語只要人不失其本心夔孫古人言志帥心君須心有主張始得升卿心若不存一身便無所主宰祖道纔出門便千岐萬轍若不是自家有箇主宰如何得是道夫心在群妄自然退聽文蔚人只有箇心若不降伏得做甚麼人一作如何做得事成僩人只一心識得此心使無走作雖不加防閑此心常在季札人精神飛揚心不在殼子裏面便害事節未有心不定而能進學者人心萬事之主走東走西如何了得砥只外面有些隙罅便走了問莫是功夫間斷心便外馳否曰只此心纔向外便走了端蒙人昏時便是不明纔知那昏時便是明也廣人心常炯炯在此則四體不待羈束而自入規矩只為人心有散緩時故立許多規矩來維持之但常常提警教身入規矩內則此心不放逸而炯然在矣心既常惺惺又以規矩繩檢之此內外交相養之道也升卿今人心聳然在此尚無惰慢之氣況心常能惺惺者乎故心常惺惺自無客慮升卿古人瞽史誦詩之類是規戒警誨之意無時不然便被他恁地炒自是使人住不著大抵學問須是警省且如瑞巖和尚每日間常自問主人翁惺惺否又自答曰惺惺今時學者卻不如此文蔚人之本心不明一如睡人都昏了不知有此身須是喚醒方知恰如磕睡彊自喚醒喚之不已終會醒某看來大要工夫只在喚醒上然如此等處須是體驗教自分明士毅人有此心便知有此身人昏昧不知有此心便如人困睡不知有此身人雖困睡得人喚覺則此身自在心亦如此方其昏蔽得人警覺則此心便在這裏廣學者工夫只在喚醒上或問人放縱時自去收斂便是喚醒否曰放縱只為昏昧之故能喚醒則自不昏昧不昏昧則自不放縱矣廣心只是一箇心非是以一箇心治一箇心所謂存所謂收只是喚醒廣人惟有一心是主要常常喚醒敬仲須是猛省淳人不自知其病者是未嘗去體察警省也升卿只是頻頻提起久之自熟文蔚學者常用提省此心使如日之升則群邪自息他本自光明廣大自家只著些子力去提省照管他便了不要苦著力著力則反不是伯羽試定精神看一看許多暗昧魍魎各自冰散瓦解太祖月詩曰未離海底千山黑才到天中萬國明日未上時黑漫漫地才一絲線路上便明伯羽人常須收斂箇身心使精神常在這裏似擔百十斤擔相似須硬著筋骨擔賀孫大抵是且收斂得身心在這裏便已有八九分了卻看道理有窒礙處卻於這處理會為學且要專一理會這一件便只且理會這一件若行時心便只在行上坐時心便只在坐上賀孫學者須常收斂不可恁地放蕩只看外面如此便見裏面意思如佛家說只於都看得見才高須著實用工少間許多才都為我使都濟事若不細心用工收斂則其才愈高而其為害愈大又曰昔林艾軒在臨安曾見一僧與說話此僧出入常頂一笠眼視不曾出笠影外某所以常道他下面有人自家上面沒人賀孫學者為學未問真知與力行且要收拾此心令有箇頓放處若收斂都在義理上安頓無許多胡思亂想則久久自於物欲上輕於義理上重須是教義理心重於物欲如秤令有低昂即見得義理自端的自有欲罷不能之意其於物欲自無暇及之矣苟操舍存亡之間無所主宰縱說得亦何益銖今於日用間空閑時收得此心在這裏截然這便是喜怒哀樂未發之中便是渾然天理事物之來隨其是非便自見得分曉是底便是天理非底便是逆天理常常恁地收拾得這心在便如執權衡以度物賀孫人若要洗刷舊習都淨了卻去理會此道理者無是理只是收放心把持在這裏便須有箇真心發見從此便去窮理敬仲大概人只要求箇放心日夕常照管令在力量既充自然應接從容敬仲今說求放心說來說去卻似釋老說入定一般但彼到此便死了吾輩卻要得此心主宰得定方賴此做事業所以不同也如中庸說天命之謂性即此心也率性之謂道亦此心也修道之謂教亦此心也以至於致中和贊化育亦只此心也致知即心知也格物即心格也克己即心克也非禮勿視聽言動勿與不勿只爭毫髮地爾所以明道說聖賢千言萬語只是欲人將已放之心收拾入身來自能尋向上去今且須就心上做得主定方驗得聖賢之言有歸著自然有契如中庸所謂尊德性致廣大極高明蓋此心本自如此廣大但為物欲隔塞故其廣大有虧本自高明但為物欲係累故於高明有蔽若能常自省察警覺則高明廣大者常自若非有所增損之也其道問學盡精微道中庸等工夫皆自此做儘有商量也若此心上工夫則不待商量賭當即今見得如此則更無閑時行時坐時讀書時應事接物時皆有著力處大抵只要見得收之甚易而不難也大雅學者須是求放心然後識得此性之善人性無不善只緣自放其心遂流於惡天命之謂性即天命在人便無不善處發而中節亦是善不中節便是惡人之一性完然具足二氣五行之所稟賦何嘗有不善人自不向善上去茲其所以為惡爾韓愈論孟子之後不得其傳只為後世學者不去心上理會堯舜相傳不過論人心道心精一執中而已天下只是善惡兩端譬如陰陽在天地間風和日暖萬物發生此是善底意思及群陰用事則萬物彫悴惡之在人亦然天地之理固是抑遏陰氣勿使常勝學者之於善惡亦要於兩夾界處攔截分曉勿使纖惡間絕善端動靜日用時加體察持養久之自然成熟謨求放心乃是求這物克己則是漾著這一物也端蒙許多言語雖隨處說得有淺深大小然而下工夫只一般如存其心與持其志亦不甚爭存其心語雖大卻寬持其志語雖小卻緊只持其志便收斂只持其志便內外肅然又曰持其志是心之方漲處便持著賀孫再問存心曰非是別將事物存心賜錄云非是活捉一物來存著孔子曰居處恭執事敬與人忠便是存心之法如說話覺得不是便莫說做事覺得不是便莫做亦是賜錄作只此便是存心之法季札賜同存得此心便是要在這裏常常照管若不照管存養要做甚麼用問存心曰存心不在紙上寫底且體認自家心是何物聖賢說得極分曉孟子恐後人不識又說四端於此尤好玩索季札或問存心曰存心只是知有此身謂如對客但知道我此身在此對客方子記得時存得一霎時濟得甚事文蔚但操存得在時少間他喜怒哀樂自有一箇則在祖道心存時少亡時多存養得熟後臨事省察不費力祖道平日涵養之功臨事持守之力涵養持守之久則臨事愈益精明平日養得根本固善若平日不曾養得臨事時便做根本工夫從這裏積將去若要去討平日涵養幾時得又曰涵養之則凡非禮勿視聽言動禮儀三百威儀三千皆是僩明底人便明了其他須是養養非是如何椎鑿用工只是心虛靜久則自明士毅持養之說言之則一言可盡行之則終身不窮榦或言靜中常用存養曰說得有病一動一靜無時不養僩惜取那無事底時節因說存養儒用人之一心當應事時常如無事時便好人傑平居須是儼然若思升卿三國時朱然終日欽欽如在行陣學者持此則心長不放矣升卿或問初學恐有急迫之病曰未要如此安排只須常恁地執持待到急迫時又旋理會賀孫學者須敬守此心不可急迫當栽培深厚栽只如種得一物在此但涵養持守之功繼繼不已是謂栽培深厚如此而優游涵泳於其間則浹洽而有以自得矣苟急迫求之則此心已自躁迫紛亂只是私己而已終不能優游涵泳以達於道端蒙大凡氣俗不必問心平則氣自和惟心粗一事學者之通病橫渠云顏子未至聖人猶是心粗一息不存即為粗病要在精思明辨使理明義精而操存涵養無須臾離無毫髮間則天理常存人欲消去其庶幾矣哉大雅人能操存此心卓然而不亂亦自可與入道況加之學問探討之功豈易量耶蓋卿人心本明只被物事在上蓋蔽了不曾得露頭面故燭理難且徹了蓋蔽底事待他自出來行兩匝看他既喚做心自然知得是非善惡伯羽或問此心未能把得定如何曰且論是不是未須論定不定此人曾學禪柄心須常令有所主做一事未了不要做別事心廣大如天地虛明如日月要閑心卻不閑隨物走了不要閑心卻閑有所主人須將那不錯底心去驗他那錯底心不錯底是本心錯底是失其本心廣心得其正方能知性之善祖道今說性善一日之間動多少思慮萌多少計較如何得善可學學者工夫且去翦截那浮泛底思慮文蔚人心無不思慮之理若當思而思自不當苦苦排抑反成不靜異端之學以性自私固為大病然又不察氣質情欲之偏率意妄行便謂無非至理此尤害事近世儒者之論亦有流入此者不可不察凡學須要先明得一箇心然後方可學譬如燒火相似必先吹發了火然後加薪則火明矣若先加薪而後吹火則火滅矣如今時人不求諸六經而貪時文是也壽昌人亦須是通達萬變方能湛然純一砥一者其心湛然只在這裏伯羽把定生死路頭方子扶起此心來鬥方子聖人相傳只是一箇字堯曰欽明舜曰溫恭聖敬日躋君子篤恭而天下平節以下論敬堯是初頭出治第一箇聖人尚書堯典是第一篇典籍說堯之德都未下別字欽是第一箇字如今看聖賢千言萬語大事小事莫不本於敬收拾得自家精神在此方看得道理盡看道理不盡只是不曾專一或云主一之謂敬敬莫只是主一曰主一又是敬字注解要之事無小無大常令自家精神思慮盡在此遇事時如此無事時也如此伯羽孔子所謂克己復禮中庸所謂致中和尊德性道問學大學所謂明明德書曰人心惟危道心惟微惟精惟一允執厥中聖賢千言萬語只是教人明天理滅人欲天理明自不消講學人性本明如寶珠沉溷水中明不可見去了溷水則寶珠依舊自明自家若得知是人欲蔽了便是明處只是這上便緊緊著力主定一面格物今日格一物明日格一物正如遊兵攻圍拔守人欲自消鑠去所以程先生說敬字只是謂我自有一箇明底物事在這裏把箇敬字抵敵常常存箇敬在這裏則人欲自然來不得夫子曰為仁由己而由人乎哉緊要處正在這裏銖聖賢言語大約似乎不同然未始不貫只如夫子言非禮勿視聽言動出門如見大賓使民如承大祭言忠信行篤敬這是一副當說話到孟子又卻說求放心存心養性大學則又有所謂格物致知正心誠意至程先生又專一發明一箇敬字若只恁看似乎參錯不齊千頭萬緒其實只一理道夫曰泛泛於文字間祇覺得異實下工則貫通之理始見曰然只是就一處下工夫則餘者皆兼攝在裏聖賢之道如一室然雖門戶不同自一處行來便入得但恐不下工夫爾道夫因歎敬字工夫之妙聖學之所以成始成終者皆由此故曰修己以敬下面安人安百姓皆由於此只緣子路問不置故聖人復以此答之要之只是箇修己以敬則其事皆了或曰自秦漢以來諸儒皆不識這敬字直至程子方說得親切學者知所用力曰程子說得如此親切了近世程沙隨猶非之以為聖賢無單獨說敬字時只是敬親敬君敬長方著箇敬字全不成說話聖人說修己以敬曰敬而無失曰聖敬日躋何嘗不單獨說來若說有君有親有長時用敬則無君親無長之時將不敬乎都不思量只是信口胡說僩問二程專教人持敬持敬在主一浩熟思之若能每事加敬則起居語默在規矩之內久久精熟有從心所欲不踰矩之理顏子請事四者亦只是持敬否曰學莫要於持敬故伊川謂敬則無己可克省多少事然此事甚大亦甚難須是造次顛沛必於是不可須臾間斷如此方有功所謂敏則有功若還今日作明日輟放下了又拾起幾時得見效修身齊家治國平天下都少箇敬不得如湯之聖敬日躋文王小心翼翼之類皆是只是他便與敬為一自家須用持著稍緩則忘了所以常要惺惺地久之成熟可知道從心所欲不踰矩顏子止是持敬浩因說敬曰聖人言語當初未曾關聚如說出門如見大賓使民如承大祭等類皆是敬之目到程子始關聚說出一箇敬來教人然敬有甚物只如畏字相似不是塊然兀坐耳無聞目無見全不省事之謂只收斂身心整齊純一不恁地放縱便是敬浩程子只教人持敬孔子告仲弓亦只是說如見大賓如承大祭此心常存得便見得仁夔孫敬只是收斂來程夫子亦說敬孔子說行篤敬敬以直內義以方外聖賢亦是如此只是工夫淺深不同聖賢說得好人生而靜天之性也感物而動性之欲也物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣節為學有大要若論看文字則逐句看將去若論為學則自有箇大要所以程子推出一箇敬字與學者說要且將箇敬字收斂箇身心放在模匣子裏面不走作了然後逐事逐物看道理嘗愛古人說得學有緝熙於光明此句最好蓋心地本自光明只被利欲昏了今所以為學者要令其光明處轉光明所以下緝熙字緝如緝麻之緝連緝不已之意熙則訓明字心地光明則此事有此理此物有此理自然見得且如人心何嘗不光明見他人做得是便道是做得不是便知不是何嘗不光明然只是才明便昏了又有一種人自謂光明而事事物物元不曾照見似此光明亦不濟得事今釋氏自謂光明然父子則不知其所謂親君臣則不知其所謂義說他光明則是亂道雉今說此話卻似險難說故周先生只說一者無欲也然這話頭高卒急難湊泊尋常人如何便得無欲故伊川只說箇敬字教人只就這敬字上捱去庶幾執捉得定有箇下手處縱不得亦不至失要之皆只要人於此心上見得分明自然有得爾然今之言敬者乃皆裝點外事不知直截於心上求功遂覺累墜不快活不若眼下於求放心處有功則尤省力也但此事甚易只如此提醒莫令昏昧一二日便可見效且易而省力只在念不念之間耳何難而不為大雅敬字前輩都輕說過了唯程子看得重人只是要求放心何者為心只是箇敬人纔敬時這心便在身上了義剛人之為學千頭萬緒豈可無本領此程先生所以有持敬之語只是提撕此心教他光明則於事無不見久之自然剛健有力驤而今只是理會箇敬一日則有一日之效一月則有一月之效因問或問中程子謝尹所說敬處曰譬如此屋四方皆入得若從一方入到這裏則那三方入處都在這裏了夔孫程先生所以有功於後學者最是敬之一字有力人之心性敬則常存不敬則不存如釋老等人卻是能持敬但是他只知得那上面一截事卻沒下面一截事覺而今恁地做工夫卻是有下面一截又怕沒那上面一截那上面一截卻是箇根本底卓今人皆不肯於根本上理會如敬字只是將來說更不做將去根本不立故其他零碎工夫無湊泊處明道延平皆教人靜坐看來須是靜坐蓋卿敬字工夫乃聖門第一義徹頭徹尾不可頃刻間斷敬之一字真聖門之綱領存養之要法一主乎此更無內外精粗之間先立乎其大者持敬方敬則萬理具在節仲思問敬者德之聚曰敬則德聚不敬則都散了伯羽敬勝百邪泳只敬則心便一賀孫敬只是此心自做主宰處人常恭敬則心常光明道夫敬則天理常明自然人欲懲窒消治方人能存得敬則吾心湛然天理粲然無一分著力處亦無一分不著力處方敬是箇扶策人底物事人當放肆怠惰時才敬便扶策得此心起常常會恁地雖有些放僻邪侈意思也退聽賀孫敬不是只恁坐地舉足動步常要此心在這裏淳敬非是塊然兀坐耳無所聞目無所見心無所思而後謂之敬只是有所畏謹不敢放縱如此則身心收斂如有所畏常常如此氣象自別存得此心乃可以為學砥敬不是萬事休置之謂只是隨事專一謹畏不放逸耳敬只是一箇畏字燾敬無許多事方敬只是收斂來又曰敬是始終一事節問敬曰一念不存也是間斷一事有差也是間斷問敬何以用工曰只是內無妄思外無妄動柄心走作不在此便是放夫人終日之間如是者多矣博學審問慎思明辨力行皆求之之道也須是敬問敬曰不用解說只整齊嚴肅便是升卿持敬之說不必多言但熟味整齊嚴肅嚴威儼恪動容貌整思慮正衣冠尊瞻視此等數語而實加工焉則所謂直內所謂主一自然不費安排而身心肅然表裏如一矣升卿或問主敬只存之於心少寬四體亦無害否曰心無不敬則四體自然收斂不待十分著意安排而四體自然舒適著意安排則難久而生病矣何丞說敬不在外但存心便是敬先生曰須動容貌整思慮則生敬已而曰各說得一邊方坐如尸立如齊頭容直目容端足容重手容恭口容止氣容肅皆敬之目也升卿今所謂持敬不是將箇敬字做箇好物事樣塞放懷裏只要胸中常有此意而無其名耳振元思問持敬易散漫如何曰只喚著便在此可學或問持敬患不能久當如何下功夫曰某舊時亦曾如此思量要得一箇直截道理元來都無他法只是習得熟熟則自久銖問人於誠敬有作輟曰只是在人人須自責如為仁由己作與輟都不干別人事須是自家肯做又問如此時須是勉強曰然去偽或問先持敬令此心惺惺了方可應接事物何如曰不然伯靜又問須是去事物上求曰亦不然若無事物時不成須去求箇事物來理會且無事物之時要你做甚麼賀孫動出時也要整齊平時也要整齊方問乃是敬貫動靜曰到頭底人言語無不貫動靜者方問敬通貫動靜而言然靜時少動時多恐易得撓亂曰如何都靜得有事須著應人在世間未有無事時節要無事除是死也自早至暮有許多事不成說事多撓亂我且去靜坐敬不是如此若事至前而自家卻要主靜頑然不應便是心都死了無事時敬在裏面有事時敬在事上有事無事吾之敬未嘗間斷也且如應接賓客敬便在應接上賓客去後敬又在這裏若厭苦賓客而為之心煩此卻是自撓亂非所謂敬也故程子說學到專一時方好蓋專一則有事無事皆是如此程子此段這一句是緊要處僩學者當知孔門所指求仁之方日用之間以敬為主不論感與未感平日常是如此涵養則善端之發自然明著少有間斷而察識存養擴而充之皆不難乎為力矣造次顛沛無時不習此心之全體皆貫乎動靜語默之間而無一息之間斷其所謂仁乎敬且定下如東西南北各有去處此為根本然後可明若與萬物並流則如播糠眯目上下四方易位矣如伊川說聰明睿知皆由是出方曰敬中有誠立明通道理曰然方大率把捉不定皆是不仁人心湛然虛定者仁之本體把捉不定者私欲奪之而動搖紛擾矣然則把捉得定其惟篤於持敬乎直卿端蒙問主敬時私欲全不萌此固是仁或於物慾中打一覺悟是時私慾全無天理盡見即此便是仁之全體否曰便是不如此且如在此靜坐時固敬應事接物能免不差否只才被人叫時自家便隨他去了須於應事接物上不錯方是這箇便是難僩問人如何發其誠敬消其欲曰此是極處了誠只是去了許多偽敬只是去了許多怠慢欲只是要窒去偽誠敬寡欲不可以次序做工夫數者雖則未嘗不串然其實各是一件事不成道敬則欲自寡卻全不去做寡欲底功夫則是廢了克己之功也但恐一旦發作又卻無理會譬如平日慎起居節飲食養得如此了固是無病但一日意外病作豈可不服藥敬只是養底功夫克己是去病須是俱到無所不用其極端蒙敬如治田而灌溉之功克己則是去其惡草也端蒙問持敬與克己工夫曰敬是涵養操持不走作克己則和根打併了教他盡淨又問敬齋箴曰此是敬之目說有許多地頭去處僩問且如持敬豈不欲純一於敬然自有不敬之念固欲與己相反愈制則愈甚或謂只自持敬雖念慮妄發莫管他久將自定還如此得否曰要之邪正本不對立但恐自家胸中無箇主若有主邪自不能入又問不敬之念非出於心如忿慾之萌學者固當自克雖聖賢亦無如之何至於思慮妄發欲制之而不能曰纔覺恁地自家便挈起了但莫先去防他然此只是自家見理不透做主不定所以如此大學曰物格而后知至知至而后意誠才意誠則自然無此病問嘗學持敬讀書心在書為事心在事如此頗覺有力只是瞑目靜坐時支遣思慮不去或云只瞑目時已是生妄想之端讀書心在書為事心在事只是收聚得心未見敬之體曰靜坐而不能遣思慮便是靜坐時不曾敬敬只是敬更尋甚敬之體似此支離病痛愈多更不曾做得工夫只了得安排杜撰也人傑大凡學者須先理會敬字敬是立腳去處程子謂涵養須用敬進學則在致知此語最妙或問持敬易間斷如何曰常要自省得才省得便在此或以為此事最難曰患不省察爾覺得間斷便已接續何難之有操則存舍則亡只在操舍兩字之間要之只消一箇操字到緊要處全不消許多文字言語若此意成熟雖操字亦不須用習矣不察人多錯看此一語人固有事親孝事兄弟交朋友亦有信而終不識其所以然者習矣而不察也此察字非察物之察乃識其所以然也習是用功夫處察是知識處今人多於察字用功反輕了習字才欲作一事卻又分一心去察一心胸中擾擾轉覺多事如張子韶說論語謂察其事親從兄之心靄然如春則為仁肅然似秋則為義只要自察其心反不知其事親從兄為如何也故夫子教人只說習如克己復禮是說習也視聽言動亦是習請事斯語亦是習孟子恐人不識方說出察字而察字最輕習字最重也次日陳一之求先生書涵養須用敬進學則在致知字以為觀省之益曰持敬不用判公憑終不肯寫謨或問一向把捉待放下便覺恁衰颯不知當如何曰這箇也不須只管恁地把捉若要去把捉又添一箇要把捉底心是生許多事公若知得放下不好便提掇起來便是敬曰靜坐久之一念不免發動當如何曰也須看一念是要做甚麼事若是好事合當做底事須去幹了或此事思量未透須著思量教了若是不好底事便不要做自家纔覺得如此這敬便在這裏賀孫敬莫把做一件事看只是收拾自家精神專一在此今看來諸公所以不進緣是但知說道格物卻於自家根骨上煞欠闕精神意思都恁地不專一所以工夫都恁地不精銳未說道有甚底事分自家志慮只是觀山玩水也煞引出了心那得似教他常在裏面好如世上一等閑物事一切都絕意雖似不近人情要之如此方好賀孫敬有死敬有活敬若只守著主一之敬遇事不濟之以義辨其是非則不活若熟後敬便有義義便有敬靜則察其敬與不敬動則察其義與不義如出門如見大賓使民如承大祭不敬時如何坐如尸立如齊不敬時如何須敬義夾持循環無端則內外透徹從周涵養須用敬處事須是集義道夫敬義只是一事如兩腳立定是敬才行是義合目是敬開眼見物便是義從周方未有事時只得說敬以直內若事物之來當辨別一箇是非不成只管敬去敬義不是兩事德明敬者守於此而不易之謂義者施於彼而合宜之謂夔孫敬要回頭看義要向前看壽昌敬義義是其間物來能應事至能斷者是方明道教人靜坐李先生亦教人靜坐蓋精神不定則道理無湊泊處又云須是靜坐方能收斂佐以下論靜靜坐無閑雜思慮則養得來便條暢淳或問疲倦時靜坐少頃可否曰也不必要似禪和子樣去坐禪方為靜坐但只令放教意思好便了僩始學工夫須是靜坐靜坐則本原定雖不免逐物及收歸來也有箇安頓處譬如人居家熟了便是出外到家便安如茫茫在外不曾下工夫便要收斂向裏面也無箇著落處士毅或問不拘靜坐與應事皆要專一否曰靜坐非是要如坐禪入定斷絕思慮只收斂此心莫令走作閑思慮則此心湛然無事自然專一及其有事則隨事而應事已則復湛然矣不要因一事而惹出三件兩件如此則雜然無頭項何以得他專一只觀文王雝雝在宮肅肅在廟不顯亦臨無射亦保便可見敬只是如此古人自少小時便做了這工夫故方其灑掃時加帚之禮至於學詩學樂舞學弦誦皆要專一且如學射時心若不在何以能中學御時心若不在何以使得他馬書數皆然今既自小不曾做得不奈何須著從今做去方得若不做這工夫卻要讀書看義理恰似要立屋無基地且無安頓屋柱處今且說那營營底心會與道理相入否會與聖賢之心相契否今求此心正為要立箇基址得此心光明有箇存主處然後為學便有歸著不錯若心雜然昏亂自無頭當卻學從那頭去又何處是收功處故程先生須令就敬字上做工夫正為此也大雅人也有靜坐無思念底時節也有思量道理底時節豈可畫為兩塗說靜坐時與讀書時工夫迥然不同當靜坐涵養時正要體察思繹道理只此便是涵養不是說喚醒提撕將道理去卻那邪思妄念只自家思量道理時自然邪念不作言忠信行篤敬立則見其參於前在輿則見其倚於衡只是常常見這忠信篤敬在眼前自然邪妄無自而入非是要存這忠信篤敬去除那不忠不敬底心今人之病正在於靜坐讀書時二者工夫不一所以差僩一之問存養多用靜否曰不必然孔子卻都就用處教人做工夫今雖說主靜然亦非棄事物以求靜既為人自然用事君親交朋友撫妻子御僮僕不成捐棄了只閉門靜坐事物之來且曰候我存養又不可只茫茫隨他事物中走二者須有箇思量倒斷始得頃之復曰動時靜便在這裏動時也有靜順理而應則雖動亦靜也故曰知止而後有定定而後能靜事物之來若不順理而應則雖塊然不交於物以求靜心亦不能得靜惟動時能順理則無事時能靜靜時能存則動時得力須是動時也做工夫靜時也做工夫兩莫相靠使工夫無間斷始得若無間斷靜時固靜動時心亦不動動亦靜也若無工夫則動時固動靜時雖欲求靜亦不可得而靜靜亦動也動靜如船之在水潮至則動潮退則止有事則動無事則靜此段徐居甫錄說此次日見徐云事來則動事過了靜如潮頭高船也高潮頭下船也下雖然動靜無端亦無截然為動為靜之理如人之氣吸則靜噓則動又問答之際答則動也止則靜矣凡事皆然且如涵養致知亦何所始但學者須自截從一處做去程子為學莫先於致知是知在先又曰未有致知而不在敬者則敬也在先從此推去只管恁地砥心於未遇事時須是靜及至臨事方用重道此二字便有氣力如當靜時不靜思慮散亂及至臨事已先倦了伊川解靜專處云不專一則不能直遂閑時須是收斂定做得事便有精神心要精一方靜時須湛然在此不得困頓如鏡樣明遇事時方好心要收拾得緊如顏子請事斯語便直下承當及犯而不校卻別從周靜便定熟便透義剛靜為主動為客靜如家舍動如道路不翕則不能直遂僩靜時不思動動時不思靜文蔚靜中動起念時動中靜是物各付物方人身只有箇動靜靜者養動之根動者所以行其靜動中有靜如發而皆中節處便是動中之靜祖道問動靜兩字人日間靜時煞少動時常多曰若聖人動時亦未嘗不靜至眾人動時卻是膠擾亂了如今人欲為一事未嘗能專此一事處之從容不亂其思慮之發既欲為此又欲為彼此是動時卻無那靜也端蒙為人君止於仁為人臣止於敬止於仁敬者靜也要止於仁與敬者便是動只管是一動一靜循環無端所以謂動極復靜靜極復動如人噓吸若噓而不吸則須絕吸而不噓亦必壅滯著不得噓者所以為吸之基尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也大凡這箇都是一屈一信一消一息一往一來一闔一闢大底有大底闔闢消息小底有小底闔闢消息皆只是這道理砥古人唯如此所以其應事敏不失機今人躁擾卻失機今隨事匆匆是以動應動物交物也以靜應兵家亦言主靜點著便有方因看心生道也云不可以湖南之偏而廢此意但當於安靜深固中涵養出來此以靜應動湖南以動應動動靜相涵應物物與我心中之理本是一物兩無少欠但要我應之爾方謂沖漠無朕一章通此物心共此理定是靜應者是動通書云無欲則靜虛動直靜虛則明明則通動也動直則公公則溥其致公平靜也不可無應者動處亦是仁定者是義亦是各正性命所謂貞也如木開花結實實成脫離則又是本來一性命元無少欠方云人自是一箇天地木實不能自知而物則如此人靈能知之者矣方吳公濟云逐日應接事物之中須得一時辰寧靜以養衛精神要使事愈繁而心愈暇彼不足而我有餘其言雖出於異說然試之亦略有驗豈周夫子所謂主靜者邪道夫被異端說虛靜了後直使今學者忙得更不敢睡方問心存時也有邪處曰如何泳曰有人心道心如佛氏所謂作用是性也常常心存曰人心是箇無揀擇底心道心是箇有揀擇底心佛氏也不可謂之邪只是箇無揀擇底心到心存時已無大段不是處了胡泳要得坐忘便是坐馳道夫靜坐久時昏困不能思起去又鬧了不暇思德明與好諧戲者處即自覺言語多為所引也方
