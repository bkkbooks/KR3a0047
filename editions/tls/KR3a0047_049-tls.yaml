body:
  text: 朱子語類卷第四十九論語三十一子張篇執德不弘章舜功問執德不弘曰言其不廣也纔狹隘則容受不得不特是不能容人自家亦自不能容故纔有片善必自矜見人之善必不喜人告之以過亦不受從狹隘上生萬般病痛問子張以為焉能為有焉能為亡世間莫更有不好人曰渠德亦自執道亦自信只是不弘不篤不足倚靠耳通老云亦有人將此二句於道德上說曰不然先儒說弘字多只說一偏可學執德須弘不可道已得此道理不信更有道理須是既下工夫又下工夫已理會又理會若只理會得三二分便謂只消恁地也得如此者非是無只是不弘故子張云焉能為有焉能為亡弘便知道理儘有自家心下儘有地步寬闊著得在執德不弘弘是深潛玩味之意不弘是著不得明道云所貴者資便儇皎厲兮去道遠而此說甚好可學亞夫問如何是執德不弘底樣子曰子貢若只執貧而無諂富而無驕之德而不聞夫子樂與好禮之說子路若只執不恥縕袍之德而不聞夫子何足以臧之說則其志皆未免止於此蓋義理無窮心體無限賀孫信道篤如何得他信得篤須是你自去理會始得而今人固有與他說他信不篤者須要你自信始得僩魏才仲問執德不弘信道不篤曰此須著下兩句此兩句似若相反蓋弘是廣大之意若信道不篤則容受太廣後隨人走作反不能守正理信道篤而不弘則是確信其一說而或至於不通故須著下兩句弘篤猶言弘毅相似璘問執德不弘信道不篤一章還合看得否曰各自是一箇病世固有自執其小善者然不害其為信道之篤亦有信道不篤然卻有兼取眾善之意者自不相害也時舉問焉能為有焉能為亡曰有此人亦不當去聲得是有無此人亦不當得是無言皆不足為輕重淳子夏之門人問交於子張章汎交而不擇取禍之道故子張之言汎交亦未嘗不擇蓋初無拒人之心但其間自有親疏厚薄爾和靖非以子張為不擇也鎬雖小道必有可觀章小道不是異端小道亦是道理只是小如農圃醫卜百工之類卻有道理在只一向上面求道理便不通了若異端則是邪道雖至近亦行不得淳小道易行易見效漢文尚黃老本朝李文靖便是以釋氏之學致治孔孟之道規模大若有理會得者其致治又當如何廣日知其所亡章知其所亡無忘所能檢校之意方問日知其所亡月無忘其所能曰知其所亡便是一日之間知得所未知月無忘其所能便是長遠後也記得在這裏而今學者今日知得過幾日又忘了若不真在此做工夫如何會到一月後記得謙之周問月無忘其所能還是溫故否曰此章與溫故知新意卻不同溫故知新是溫故之中而得新底道理此卻是因新知而帶得溫故雉問月無忘其所能積累多則如何溫習曰也須漸漸溫習如得一善則拳拳服膺而弗失之矣子路有聞未之能行惟恐有聞若是如此則子路只做得一件事顏子只著得一件事節問既恁地卻如何曰且思量節子夏學煞高自曾子外說他看他答問處如博學而篤志切問而近思如日知其所亡月無忘其所能等處可見泳博學而篤志章問博學而篤志切問而近思仁在其中矣曰此全未是說仁處方是尋討箇求仁門路當從此去漸見效在其中謂有此理耳問明道言學者須先識仁識得仁以敬養不須防檢曰未要看此不如且就博學篤志切問近思做去宇問博學而篤志切問而近思何以言仁在其中曰此四事只是為學功夫未是為仁必如夫子所以語顏冉者乃正言為仁耳然人能博學而篤志切問而近思則心不放逸天理可存故曰仁在其中必大節錄云心存理得元昭問博學而篤志切問而近思何以言仁在其中曰只是為學工夫反求之己必如克己復禮乃正言為仁論語言在其中只是言其可至耳明道云學要鞭辟近裏可學楊至之問博學篤志章曰明道常說學只要鞭辟近裏著己而已若能如此便是心在已有七八分仁了南升問博學而篤志切問而近思如何謂之仁曰非是便為仁大抵聖人說在其中矣之辭如祿在其中直在其中意言行寡尤悔非所以干祿而祿在其中父子相為隱非所以為直而直在其中博學而篤志切問而近思雖非所以為仁然學者用力於此仁亦在其中矣去偽問如何切問近思則仁便在其中曰這有四事博學篤志切問近思四者俱至本止是講學未是如克己復禮然求仁而仁已在其中凡論語言在其中皆是反說如耕也則餒在其中耕非能餒也然有旱乾水溢則餒在其中學也祿在其中學非干祿也然學則祿在其中父為子隱子為父隱本非直也而直已在其中若此類皆是反說驤問明道謂學者須當思而得之了此便是徹上徹下底道理莫便是先生所謂從事於此則心不外馳而所存自熟之意曰然於是四者中見得箇仁底道理便是徹上徹下道理也問博學而篤志切問而近思仁在其中矣了此便是徹上徹下道理此是深說也恁地淺說也恁地否先生首肯曰是徹上徹下只是這箇道理深說淺說都恁地淳蜚卿問伊川謂近思只是以類推去曰程子說得推字極好問比類莫是比這一箇意思推去否曰固是如為子則當止於孝為臣當止於忠自此節節推去然只一愛字雖出於孝畢竟千頭萬緒皆當推去須得驤有問伊川曰如何是近思曰以類而推今人不曾以類而推蓋謂不曾先理會得一件卻理會一件若理會得一件逐件件推將去相次亦不難須是劈初頭要理會教分曉透徹且如煮物事合下便用熳火養便似煮肉卻煮得頑了越不能得軟政如義理只理會得三二分便道只恁地得了卻不知前面撞頭搕腦人心裏若是思索得到時遇事自不難須是將心來一如鏖戰一番見行陳便自然向前得去如何不教心經履這辛苦若是經一番便自知得許多路道方透徹楊問程子曰近思以類而推何謂類推曰此語道得好不要跳越望遠亦不是縱橫陡頓只是就這裏近傍那曉得處挨將去如這一件事理會得透了又因這件事推去做那一件事知得亦是恁地如識得這燈有許多光便因這燈推將去識得那燭亦恁地光如升階升第一級了便因這一級進到第二級又因第三級進到四級只管恁地挨將去只管見易不見其難前面遠處只管會近若第一級便要跳到第三級舉步闊了便費力只管見難只管見遠如要去建寧須從第一鋪便去到柳營江柳營江便去到魚峬驛只管恁地去這處進得一程那處又減得一程如此雖長安亦可到矣不然只要一日便到如何得如讀書讀第一段了便到第二段第二段了便到第三段只管挨將去次第都能理會得若開卷便要獵一過如何得直卿問是理會得孝便推去理會得弟否曰只是傍易曉底挨將去如理會得親親便推類去仁民仁民是親親之類理會得仁民便推類去愛物愛物是仁民之類如刑于寡妻便推類去至于兄弟至于兄弟便推類去御于家邦如修身便推去齊家齊家便推去治國只是一步了又一步學記謂善問者如攻堅木先其易者後其節目此說甚好且如中央一塊堅硬四邊軟不先就四邊攻其軟便要去中央攻那硬處宇錄云其中堅硬被那軟處抨在這裏如何攻得枉費了氣力那堅硬底又只在須是先就四邊旋旋抉了軟處中央硬底自走不得兵書所謂攻瑕則堅者瑕攻堅則瑕者堅亦是此意宇錄云不會問底人先去節目處理會枉費了工夫這箇堅又只在問博學與近思亦不相妨否曰博學是都要理會過近思是注心著力處博學是箇大規模近思是漸進工夫如明明德於天下是大規模其中格物致知誠意正心修身齊家等便是次序宇錄云格物正心修身齊家等循次序都著學豈可道是理會得一件其他皆不去理會然亦須理會一件了又去理會一件博學亦豈是一旦硬要都學得了如博學亦豈一日便都學得了亦是漸漸學去問篤志未說到行處否曰篤志只是至誠懇切以求之不是理會不得又掉了若只管汎汎地外面去博學更無懇切之志反看這裏便成放不知求底心便成頑麻不仁底死漢了那得仁惟篤志又切問近思便有歸宿處這心便不汎濫走作只在這坎窠裏不放了仁便在其中橫渠云讀書以維持此心一時放下則一時德性有懈淳寓錄同道夫錄略問以類而推是如何曰只是就近推將去曰如何是就近推去曰且如十五志學至四十不惑學者尚可以意會若自知命以上則雖苦思力索終摸索不著縱然說得亦只是臆度除是自近而推漸漸看將去則自然見得矣廣百工居肆章問集注所引二說云二說相須其義始備曰前說蓋謂居肆方能做得事成不居肆則做事不成君子學便可以致其道不學則不能致其道然而居肆亦有不能成其事如閑坐打鬨過日底學亦有不能致其道如學小道與夫中道而廢之類故後說云居肆必須務成其事學必須務致其道是皆各說得一邊故必相須而其義始備也燾問百工居肆二說合如何看曰君子不學固不足以致道然亦有學而不知道者多矣此二說要合為一又不欲揜先輩之名故姑載尹氏之本文雉大德不踰閑章大德不踰閑小德出入可也大節是當小節無不可者若大節未是小節何緣都是謨小德出入可也此自是可與權之事謂之出入則似有不得已之意非德盛者不能如嫂溺不援是豺狼也嫂溺是所當援也更著可也字不得所以吳氏謂此章有弊道夫問大德小德曰大德小德猶言大節小節大節既定小節有差亦所不免然吳氏謂此章不能無弊學者正不可以此自恕一以小差為無害則於大節必將有枉尋而直尺者矣謨問伊川謂小德如援溺之事更推廣之吳氏謂此章不能無弊如何曰恁地推廣援溺事卻是大處嫂溺不援是豺狼這處是當做更有甚麼出入隨他們說如湯武征伐三分天下有其二都將做可以出入恁地卻是大處非聖人不能為豈得謂之小德乃是道之權也子夏之意只為大節既是了小小處雖未盡善亦不妨然小處放過只是力做不徹不當道是可也宇大德不踰閑小德出入可也如橫渠之說時中卻是一串說如小德出入亦把做好了若是時中卻是合當如此如何卻只云可也只是且恁地也得之意且如嫂溺援之以手亦是合當如此卻說道可也不得大抵子夏之說自有病只是他力量有行不及處然既是有力不及處不免有些小事放過者已是不是豈可謂之可也卻是垂訓於人教人如此則甚不可耳蓋子夏為人不及其質亦弱夫子亦每捉他如汝為君子儒無為小人儒無欲速無見小利之類子夏亦自知之故每亦要做夾細工夫只這子細便是他病處徐彥章以子夏為狷介只是把論交處說子夏豈是狷介只是弱耳子夏之門人小子章孔門除曾子外只有子夏守得規矩定故教門人皆先洒掃應對進退所以孟子說孟施舍似曾子北宮黝似子夏文蔚君子之道孰以末為先而可傳孰以本為後而倦教蓋學者之質不同如草木之區別耳德明問子夏門人洒掃應對進退一段曰人只是將上達意思壓在頭上故不明子夏之意但云君子之道孰為當先而可傳孰為可後而倦不傳譬諸草木區以別矣只是分別其小大耳小子之學但當如此非無本末之辨祖道古人初學只是教他洒掃應對進退而已未便說到天理處子夏之教門人專以此子游便要插一本在裏面民可使由之不可使知之只是要他行矣而著習矣而察自理會得須是匡之直之輔之翼之使自得之然後從而振德之今教小兒若不匡不直不輔不翼便要振德只是撮那尖利底教人非教人之法淳問有始有卒乃竭兩端之教否曰此不是說聖人教人事乃是聖人分上事惟聖人道頭便知尾下學便上達若教學者則須循其序也必大子夏門人小子一章明道說是集注第一條區是分限自然有大小自有分限也不必言人去畦分之方集注問子夏之門人小子洒掃應對進退章曰某少時都看不出將謂無本末無大小雖如此看又自疑文義不是如此後來在同安作簿時因睡不著忽然思得乃知卻是有本末小大然不得明道說君子教人有序四五句也無緣看得出聖人有始有卒者不是自始做到終乃是合下便始終皆備洒掃應對精義入神便都在這裏了若學者便須從始做去方得聖人則不待如此做也時舉問洒掃應對章程子四條曰此最難看少年只管不理會得理無大小是如何此句與上條教人有序都相反了多問之前輩亦只似謝氏說得高妙更無捉摸處因在同安時一日差入山中檢視夜間忽思量得不如此其曰理無小大無乎不在本末精粗皆要從頭做去不可揀擇此所以為教人有序也非是謂洒掃應對便是精義入神更不用做其他事也雉亞夫問伊川云洒掃應對便是形而上者理無大小故也故君子只在慎獨又曰聖人之道更無精粗從洒掃應對與精義入神貫通只一理雖洒掃應對只看所以然如何曰某向來費無限思量理會此段不得如伊川門人都說差了且是不敢把他底做不是只管就他底解說解來解去只見與子夏之說相反常以為疑子夏正說有本有末如何諸公都說成末即是本後在同安出往外邑定驗公事路上只管思量方思量得透當時說與同官某人某人亦正思量此話起頗同所疑今看伊川許多說話時復又說錯了所謂洒掃應對與精義入神貫通只一理雖洒掃應對只看所以然如何此言洒掃應對與精義入神是一樣道理洒掃應對必有所以然精義入神亦必有所以然其曰通貫只一理言二者之理只一般非謂洒掃應對便是精義入神固是精義入神有形而上之理即洒掃應對亦有形而上之理亞夫問集注云始終本末一以貫之惟聖人為然此解得已分明但聖人事是甚麼樣子曰如云下學而上達當其下學時便上達天理是也賀孫齊卿問程子云云故君子只在慎獨何也曰事有小大理卻無小大合當理會處便用與他理會故君子只在慎獨不問大事小事精粗巨細盡用照管盡用理會不可說箇是粗底事不理會只理會那精底既是合用做底事便用做去又不可說洒掃應對便是精義入神洒掃應對只是粗底精義入神自是精底然道理都一般須是從粗底小底理會起方漸而至於精者大者所以明道曰君子教人有序先傳以近者小者而後教以大者遠者非先傳以近小而後不教以遠大也或云洒掃應對非道之全體只是道中之一節曰合起來便是道之全體非大底是全體小底不是全體也問伊川言凡物有本末不可分作兩段曰須是就事上理會道理非事何以識理洒掃應對末也精義入神本也不可說這箇是末不足理會只理會那本這便不得又不可說這末便是本但學其末則本便在此也僩洒掃應對精義入神事有大小而理無大小池錄作精粗下同事有大小故其教有等而不可躐理無大小故隨所處而皆不可不盡池錄作故唯其所在而皆不可不用其極謝氏所謂不著此心如何做得者失之矣道夫問程子曰洒掃應對便是形而上者理無大小故君子只在慎獨此只是獨處少有不慎則形而上下便相間斷否曰亦是蓋不能慎獨只管理會大處小小底事便照管不到理無小大大處小處都是理小處不到理便不周匝淳問洒掃應對即是精義入神之理此句如何曰皆是此理其為上下大小不同而其理則一也問莫只是盡此心而推之自小以至大否曰謝顯道卻說要著心此自是說理之大小不同未可以心言也洒掃應對是此理而其精義入神亦是此理洒掃應對是小學事精義入神是大學事精究其義以入神正大學用功以至于極致處也若子夏之門人止當為洒掃應對而已以上又未暇也因問洒掃應對是其然必有所以然者如何曰所以然者亦只是理也惟窮理則自知其皆一致此理惟延平之說在或問格物中與伊川差合雖不顯言其窮理而皆體此意後先生一番說伊川是其然為伊川只舉得一邊在此是其然洒掃應對與精義入神皆是是其然必有所以然洒掃應對與精義入神皆有所以然之理宇問洒掃應對是其然必有所以然所以然者是如何曰若無誠意如何洒掃應對節是其然必有所以然治心修身是本洒掃應對是末皆其然之事也至於所以然則理也理無精粗本末皆是一貫升卿義剛呈問目云子游知有本而欲棄其末子夏則以本末有先後之序程子則合本末以為一而言之詳味先生之說則所謂洒掃應對固便是精義入神事只知於洒掃應對上做工夫而不復深究精義入神底事則亦不能通貫而至於渾融也惟是下學之既至而上達益加審焉則本末透徹而無遺矣曰這是說洒掃應對也是這道理若要精義入神須是從這裏理會將去如公說則似理會了洒掃應對了又須是去理會精義入神卻不得程子說又便是子夏之說義剛先傳後倦明道說最好伊川與上蔡說須先理會得子夏意方看得閎祖集義伯豐問程子曰洒掃應對與佛家默然處合何也曰默然處只是都無作用非是取其說但借彼明此洒掃應對即無聲無臭之理也問洒掃應對與盡性至命是一統底事無有本末精粗在理固無本末精粗而事須有本末精粗否曰是淳一日夜坐聞子規聲先生曰舊為同安簿時下鄉宿僧寺中衾薄不能寐是時正思量子夏之門人小子章聞子規聲甚切文蔚錄云思量此章理會不得橫解豎解更解不行又被杜鵑叫不住聲今纔聞子規啼便記得是時當時亦不能問泳續檢尋集注此章乃是程子諸說多是明精粗本末分雖殊而理則一似若無本末無小大獨明道說君子教人有序等句分曉乃是有本末小大在學者則須由下學乃能上達惟聖人合下始終皆備耳此是一大統會當時必大有所省所恨愚闇不足以發師誨耳胡泳仕而優則學章問仕而優則學曰某嘗見一親戚說得好謂子夏此語蓋為仕而不問學者設爾優當作暇字解去偽問仕而優則學曰此為世族子弟而設有少年而仕者元不曾大故學故職事之暇可以學時舉錄云到職事了辦後也著去學學而優則仕無可說者謙之問仕而優則學曰有一鄉人作縣尉請教於太守沈公云某欲修學先讀何書沈答云公且去做了縣尉歸家去款款讀書此說亂道居官豈無閒暇時可讀書且如轎中亦可看冊子但不可以讀書而廢居官之事耳雉孟莊子之孝章孟莊子之孝其他可能言其他只尋常是難能也這箇則不可及蓋莊子父獻子自賢渠卻能用父之人守父之政而不變夫子所以稱之端蒙問孟莊子之孝當然事何以為難能曰為是人多不能所以為難然若用人立政未是又不可以不改銖問孟莊子何以謂之難能曰這箇便是難能處人固有用父之臣者然稍拂他私意便自容不得亦有行父之政者於私欲稍有不便處自行不得古今似此者甚多如唐太宗為高宗擇許多人如長孫無忌褚遂良之徒高宗因立武昭儀事便不能用又季文子相三君無衣帛之妾無食粟之馬到季武子便不如此便是不能行父之政以此知孟莊子豈不為難能和之因問唐太宗當初若立魏王泰時如何魏王泰當時也自英武曰他當初卻有心傾太子承乾只此心便不好然亦未知果是賢與不賢且看隋煬帝劈初如何下梢又如何問為天下得人謂之仁又有嫡長之說此事不知如何處曰所謂可與立未可與權此事最要權輕重若是聖賢便處得須是見他嫡長真是不賢庶真賢方得大賢以上方了得此事如太王立王季之事是也如他人見不到不如且守嫡長之說如晉獻公溺於驪姬要去申生漢高祖溺於戚姬要立趙王如意豈是真見得他賢否倪錄云倪曰若嫡長不賢便只得付之命先生曰是先生又云兩漢而下多有英武之資為用事者所忌如清河王是也時舉倪同衛公孫朝問於子貢章或問文武之道未墜於地是掃地否曰未墜地非掃地掃地則無餘矣此只是說未墜落於地而猶在人且賢者則能記其道之大者不賢者則能記其道之小者皆有文武之道夫子皆師之也大雅賢者識其大者不賢者識其小者大者如周禮所載皆禮之大綱領是也小者如國語所載則只是零碎條目是也燾叔孫武叔語大夫章子貢賢於仲尼聖人固自難知如子貢在當時想是大段明辨果斷通曉事務歆動得人孔子自言達不如賜勇不如由賀孫或問夫子之牆數仞不得其門而入夫子之道高遠故不得其門而入也曰不然顏子得入故能仰之彌高鑽之彌堅至于在前在後如有所立卓爾曾子得入故能言夫子之道忠恕子貢得入故能言性與天道不可得聞文章可得而聞他人自不能入耳非高遠也七十子之徒幾人入得譬如與兩人說話一人理會得一人理會不得會得者便是入得會不得者便是入不得且孔子之教眾人與教顏子何異顏子自入得眾人自入不得多少分明大雅陳子禽謂子貢章立之斯立如五畝之宅樹之以桑之類蓋此有以立之便自立得住也動之斯和如又從而振德之振德有鼓舞之意宇錄云使之歡喜踴躍遷義遠罪而不自知如舜之從欲以治惟動丕應徯志便是動而和處問伊川云夫子之言性與天道不可得而聞是就聖人聰明上說立斯立綏斯來是就德性上說如何曰聰明是言聖人見處高常人所不能測識德性是言其精粹純一本領深厚其間自如此道夫寓錄云言性與天道是所見直恁地高人自描摸他不著差見得是聰明言德性是就本原處說根基深厚德盛仁熟便能如此便是所過者化
