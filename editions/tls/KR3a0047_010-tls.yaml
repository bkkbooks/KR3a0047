body:
  text: 朱子語類卷第十學四讀書法上讀書乃學者第二事方子讀書已是第二義蓋人生道理合下完具所以要讀書者蓋是未曾經歷見許多聖人是經歷見得許多所以寫在冊上與人看而今讀書只是要見得許多道理及理會得了又皆是自家合下元有底不是外面旋添得來至學問就自家身己上切要處理會方是那讀書底已是第二義自家身上道理都具不曾外面添得來然聖人教人須要讀這書時蓋為自家雖有這道理須是經歷過方得聖人說底是他曾經歷過來佐學問無賢愚無小大無貴賤自是人合理會底事且如聖賢不生無許多書冊無許多發明不成不去理會也只當理會今有聖賢言語有許多文字卻不去做師友只是發明得人若不自向前師友如何著得力謙為學之道聖賢教人說得甚分曉大抵學者讀書務要窮究道問學是大事要識得道理去做人大凡看書要看了又看逐段逐句逐字理會仍參諸解傳說教通透使道理與自家心相肯方得讀書要自家道理浹洽透徹杜元凱云優而柔之使自求之厭而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也椿今讀書緊要是要看聖人教人做工夫處是如何如用藥治病須看這病是如何發合用何方治之方中使何藥材何者幾兩何者幾分如何炮如何炙如何製如何切如何煎如何喫只如此而已淳讀書以觀聖賢之意因聖賢之意以觀自然之理節做好將聖人書讀見得他意思如當面說話相似賀孫聖賢之言須常將來眼頭過口頭轉心頭運方子開卷便有與聖賢不相似處豈可不自鞭策祖道聖人言語一重又一重須入深去看若只要皮膚便有差錯須深沉方有得從周人看文字只看得一重更不去討他第二重僩讀書須是看著他縫罅處方尋得道理透徹若不見得縫罅無由入得看見縫罅時脈絡自開植文字大節目痛理會三五處後當迎刃而解學者所患在於輕浮不沉著痛快方子學者初看文字只見得箇渾淪物事久久看作三兩片以至於十數片方是長進如庖丁解牛目視無全牛是也人傑讀書須是窮究道理徹底如人之食嚼得爛方可嚥下然後有補杞看文字須逐字看得無去處譬如前後門塞定更去不得方始是從周關了門閉了戶把斷了四路頭此正讀書時也道夫學者只知觀書都不知有四邊方始有味學者讀書須是於無味處當致思焉至於群疑並興寢食俱廢乃能驟進因歎驟進二字最下得好須是如此若進得些子或進或退若存若亡不濟事如用兵相殺爭得些兒小可一二十里地也不濟事須大殺一番方是善勝為學之要亦是如此賀孫看文字須大段著精彩看聳起精神樹起筋骨不要困如有刀劍在後一般就一段中須要透擊其首則尾應擊其尾則首應方始是不可按冊子便在掩了冊子便忘卻看注時便忘了正文看正文又忘了注須這一段透了方看後板淳看文字須要入在裏面猛滾一番要透徹方能得脫離若只略略地看過恐終久不能得脫離此心又自不能放下也時舉人言讀書當從容玩味此乃自怠之一說若是讀此書未曉道理雖不可急迫亦不放下猶可也若徜徉終日謂之從容卻無做工夫處譬之煎藥須是以大火煮滾然後以慢火養之卻不妨人傑須是一棒一條痕一摑一掌血看人文字要當如此豈可忽略看文字須是如猛將用兵直是鏖戰一陣如酷吏治獄直是推勘到底決是不恕他方得夔孫看文字正如酷吏之用法深刻都沒人情直要做到底若只恁地等閑看過了有甚滋味大凡文字有未曉處須下死工夫直要見得道理是自家底方住賜看文字如捉賊須知道盜發處自一文以上贓罪情節都要勘出若只描摸箇大綱縱使知道此人是賊卻不知何處做賊賜看文字當如高大艑順風張帆一日千里方得如今只纔離小港便著淺了濟甚事文字不通如此看僩讀書看義理須是胸次放開磊落明快恁地去第一不可先責效纔責效便有憂愁底意只管如此胸中便結聚一餅子不散今且放置閑事不要閑思量只專心去玩味義理便會心精心精便會熟淳讀書放寬著心道理自會出來若憂愁迫切道理終無緣得出來讀書須是知貫通處東邊西邊都觸著這關捩子方得只認下著頭去做莫要思前算後自有至處而今說已前不曾做得又怕遲晚又怕做不及又怕那箇難又怕性格遲鈍又怕記不起都是閑說只認下著頭去做莫問遲速少間自有至處既是已前不曾做得今便用下工夫去補填莫要瞻前顧後思量東西少間擔閣一生不知年歲之老僩天下書儘多在只恁地讀幾時得了須大段用著工夫無一件是合少得底而今只是那一般合看過底文字也未看何況其他僩讀書須是遍布周滿某嘗以為寧詳毋略寧下毋高寧拙毋巧寧近毋遠方子讀書之法先要熟讀須是正看背看左看右看看得是了未可便說道是更須反覆玩味時舉少看熟讀反覆體驗不必想像計獲只此三事守之有常夔孫太凡看文字少看熟讀一也不要鑽研立說但要反覆體驗二也埋頭理會不要求效三也三者學者當守此人傑書宜少看要極熟小兒讀書記得大人多記不得者只為小兒心專一日授一百字則只是一百字二百字則只是二百字大人一日或看百板不恁精專人多看一分之十今宜看十分之一寬著期限緊著課程淳讀書只逐段逐些子細理會小兒讀書所以記得是渠不識後面字只專讀一進耳今人讀書只羇羇讀去假饒讀得十遍是讀得十遍不曾理會得底書耳得寸則王之寸也得尺則王之尺也讀書當如此璘讀書小作課程大施功力如會讀得二百字只讀得一百字卻於百字中猛施工夫理會子細讀誦教熟如此不會記性人自記得無識性人亦理會得若泛泛然念多只是皆無益耳讀書不可以兼看未讀者卻當兼看已讀者璘讀書不可貪多且要精熟如今日看得一板且看半板將那精力來更看前半板兩邊如此方看得熟直須看得古人意思出方好洽讀書不要貪多向見州郡納稅數萬鈔總作一結忽錯其數更無推尋處其後有一某官乃立法三二十鈔作一結觀此則讀書之法可見可學讀書不可貪多常使自家力量有餘正淳云欲將諸書循環看曰不可如此須看得一書徹了方再看一書若雜然並進卻反為所困如射弓有五斗力且用四斗弓便可拽滿己力欺得他過今舉者不忖自己力量去觀書恐自家照管他不過讀書只恁逐段子細看積累去則一生讀多少書若務貪多則反不曾讀得又曰須是緊著工夫不可悠悠又不須忙只常抖搜得此心醒則看愈有力道夫不可都要羇去如人一日只喫得三碗飯不可將十數日飯都一齊喫了一日只看得幾段做得多少工夫亦有限不可羇去都要了淳讀書只看一箇冊子每日只讀一段方始是自家底若看此又看彼雖從眼邊過得一遍終是不熟履孫今人讀書看未到這裏心已在後面纔看到這裏便欲舍去了如此只是不求自家曉解須是徘徊顧戀如不欲去方會認得至某最不要人摘撮看文字須是逐一段一句理會賀孫讀書是格物一事今且須逐段子細玩味反來覆去或一日或兩日只看一段則這一段便是我底腳踏這一段了又看第二段如此逐旋捱去捱得多後卻見頭頭道理都到這工大須用行思坐想或將已曉得者再三思省卻自有一箇曉悟處出不容安排也書之句法義理雖只是如此解說但一次看有一次見識所以某書一番看有一番改亦有已說定一番看一番見得穩當愈加分曉故某說讀書不貴多只貴熟爾然用工亦須是勇做進前去莫思退轉始得大雅讀書且就那一段本文意上看不必又生枝節看一段須反覆看來看去要十分爛熟方見意味方快活令人都不愛去看別段始得人多是向前趲去不曾向後反覆只要去看明日未讀底不曾去紬繹前日已讀底須玩味反覆始得用力深便見意味長意味長便受用牢固又曰不可信口依希略綽說過須是心曉宇大凡讀書須是熟讀熟讀了自精熟精熟後理自見得如喫果子一般劈頭方咬開未見滋味便喫了須是細嚼教爛則滋味自出方始識得這箇是甜是苦是甘是辛始為知味又云園夫灌園善灌之夫隨其蔬果株株而灌之少間灌溉既足則泥水相和而物得其潤自然生長不善灌者忙急而治之擔一擔之水澆滿園之蔬人見其治園矣而物未嘗沾足也又云讀書之道用力愈多收功愈遠先難而後獲先事而後得皆是此理又云讀書之法須是用工去看先一書費許多工夫後則無許多矣始初一書費十分工夫後一書費八九分後則費六七分又後則費四五分矣卓因說進德居業進字居字曰今看文字未熟所以鶻突都只見成一片黑淬淬地須是只管看來看去認來認去今日看了明日又看早上看了晚間又看飯前看了飯後又看久之自見得開一箇字都有一箇大縫罅今常說見得又豈是懸空見得亦只是玩味之久自見得文字只是舊時文字只是見得開如織錦上用青絲用紅絲用白絲若見不得只是一片皂布賀孫讀書須是專一讀這一句且理會這一句讀這一章且理會這一章須是見得此一章徹了方可看別章未要思量別章別句只是平心定氣在這邊看亦不可用心思索太過少間卻損了精神前輩云讀書不可不敬敬便精專不走了這心其始也自謂百事能其終也一事不能言人讀書不專一而貪多廣閱之弊僩泛觀博取不若熟讀而精思道夫大抵觀書先須熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心然後可以有得爾然熟讀精思既曉得後又須疑不止如此庶幾有進若以為止如此矣則終不復有進也書須熟讀所謂書只是一般然讀十遍時與讀一遍時終別讀百遍時與讀十遍又自不同也履孫為人自是為人讀書自是讀書凡人若讀十遍不會則讀二十遍又不會則讀三十遍至五十遍必有見到處五十遍暝然不曉便是氣質不好今人未嘗讀得十遍便道不可曉力行李敬子說先生教人讀書云既識得了須更讀百十遍使與自家相乳入便說得也響今學者本文尚且未熟如何會有益方子讀書不可記數數足則止矣壽昌誦數以貫之古人讀書亦必是記遍數所以貫通也又曰凡讀書且從一條正路直去四面雖有好看處不妨一看然非是要緊佐溫公答一學者書說為學之法舉荀子四句云誦數以貫之思索以通之為其人以處之除其害以持養之荀子此說亦好誦數云者想是古人誦書亦記遍數貫字訓熟如習貫如自然又訓通誦得熟方能通曉若誦不熟亦無可得思索廣山谷與李幾仲帖云不審諸經諸史何者最熟大率學者喜博而常病不精汎濫百書不若精於一也有餘力然後及諸書則涉獵諸篇亦得其精蓋以我觀書則處處得益以書博我則釋卷而茫然先生深喜之以為有補於學者若海讀書理會一件便要精這一件看得不精其他文字便亦都草草看了一件看得精其他亦易看山谷帖說讀書法甚好淳學者貪做工夫便看得義理不精讀書須是子細逐句逐字要見著落若用工粗鹵不務精思只道無可疑處非無可疑理會未到不知有疑爾大抵為學老少不同年少精力有餘須用無書不讀無不究竟其義若年齒向晚卻須擇要用功讀一書便覺後來難得工夫再去理會須沉潛玩索究極至處可也蓋天下義理只有一箇是與非而已是便是是非便是非既有著落雖不再讀自然道理浹洽省記不忘譬如飲食從容咀嚼其味必長大嚼大咽終不知味也謨書只貴讀讀多自然曉今即思量得寫在紙上底也不濟事終非我有只貴乎讀這箇不知如何自然心與氣合舒暢發越自是記得牢縱饒熟看過心裏思量過也不如讀讀來讀去少間曉不得底自然曉得已曉得者越有滋味若是讀不熟都沒這般滋味而今未說讀得注且只熟讀正經行住坐臥心常在此自然曉得嘗思之讀便是學夫子說學而不思則罔思而不學則殆學便是讀讀了又思思了又讀自然有意若讀而不思又不知其意味思而不讀縱使曉得終是卼臲不安一似倩得人來守屋相似不是自家人終不屬自家使喚若讀得熟而又思得精自然心與理一永遠不忘某舊苦記文字不得後來只是讀今之記得者皆讀之功也老蘇只取孟子論語韓子與諸聖人之書安坐而讀之者七八年後來做出許多文字如此好他資質固不可及然亦須著如此讀只是他讀時便只要模寫他言語做文章若移此心與這樣資質去講究義理那裏得來是知書只貴熟讀別無方法僩讀書之法讀一遍了又思量一遍思量一遍又讀一遍讀誦者所以助其思量常教此心在上面流轉若只是口裏讀心裏不思量看如何也記不子細又云今緣文字印本多人不著心讀漢時諸儒以經相授者只是暗誦所以記得牢故其所引書句多有錯字如孟子所引詩書亦多錯以其無本但記得耳僩今人所以讀書苟簡者緣書皆有印本多了如古人皆用竹簡除非大段有力底人方做得若一介之士如何置所以後漢吳恢欲殺青以寫漢書其子吳祐諫曰此書若成則載之車兩昔馬援以薏苡興謗王陽以衣囊徼名正此謂也如黃霸在獄中從夏侯勝受書凡再踰冬而後傳蓋古人無本除非首尾熟背得方得至於講誦者也是都背得然後從師受學如東坡作李氏山房藏書記那時書猶自難得晁以道嘗欲得公穀傳遍求無之後得一本方傳寫得今人連寫也自厭煩了所以讀書苟簡銖講論一篇書須是理會得透把這一篇書與自家羇作一片方是去了本子都在心中皆說得去方好敬仲莫說道見得了便休而今看一千遍見得又別看一萬遍看得又別須是無這冊子時許多節目次第都恁地歷歷落落在自家肚裏方好方子放下書冊都無書之意義在胸中升卿歐公言作文有三處思量枕上路上廁上他只是做文字尚如此況求道乎今人對著冊子時便思量冊子不在心便不在如此濟得甚事義剛今之學者看了也似不曾看不曾看也似看了方子看文字於理會得了處更能看過尤妙過看文字須子細雖是舊曾看過重溫亦須子細每日可看三兩段不是於那疑處看正須於那無疑處看蓋工夫都在那上也廣聖人言語如千花遠望都見好須端的真見好處始得須著力子細看工夫只在子細看上別無術淳聖人言語皆枝枝相對葉葉相當不知怎生排得恁地齊整今人只是心粗不子細窮究若子細窮究來皆字字有著落道夫某自潭州來其他盡不曾說得只不住地說得一箇教人子細讀書節讀書不精深也只是不曾專一子細伯羽看文字有兩般病有一等性鈍底人向來未曾看看得生卒急看不出固是病又有一等敏銳底人多不肯子細易得有忽略之意不可不戒賀孫為學讀書須是耐煩細意去理會切不可粗心若曰何必讀書自有箇捷徑法便是誤人底深坑也未見道理時恰如數重物色包裹在裏許無緣可以便見得須是今日去了一重又見得一重明日又去了一重又見得一重去盡皮方見肉去盡肉方見骨去盡骨方見髓使粗心大氣不得廣觀書初得味即坐在此處不復精研故看義理則汗漫而不別白遇事接物則頹然而無精神揚讀書只要將理會得處反覆又看夔孫今人讀書看未到這裏心已在後面才看到這裏便欲捨去如今只是不求自家曉解須是徘徊顧戀如不欲捨去方能體認得又曰讀書者譬如觀此屋若在外面見有此屋便謂見了即無緣識得須是入去裏面逐一看過是幾多間架幾多窗櫺看了一遍又重重看過一齊記得方是講筵亦云氣象匆匆常若有所迫逐方子看書非止看一處便見道理如服藥相似一服豈能得病便好須服了又服服多後藥力自行道夫讀書著意玩味方見得義理從文字中迸出季札讀得通貫後義理自出方子讀書須看他文勢語脈芝看文字要便有得看文字若便以為曉得則便住了須是曉得後更思量後面尚有也無且如今有人把一篇文字來看也未解盡知得他意況於義理前輩說得恁地雖是易曉但亦未解便得其意須是看了又看只管看只管有義剛讀者不可有欲了底心才有此心便心只在背後白紙處了無益揚大抵學者只在是白紙無字處莫看有一箇字便與他看一箇如此讀書三年無長進處則如趙州和尚道截取老僧頭去節人讀書如人飲酒相似若是愛飲酒人一盞了又要一盞喫若不愛喫勉強一盞便休泳讀書不可不先立程限政如農功如農之有畔為學亦然今之始學者不知此理初時甚銳漸漸懶去終至都不理會了此只是當初不立程限之故廣曾裘父詩話中載東坡教人讀書小簡先生取以示學者曰讀書要當如是按裘父詩話載東坡與王郎書云少年為學者每一書皆作數次讀之當如入海百貨皆有人之精力不能兼收盡取但得其所欲求者爾故願學者每次作一意求之如欲求古今興亡治亂聖賢作用且只作此意求之勿生餘念又別作一次求事跡文物之類亦如之他皆放此若學成八面受敵與慕涉獵者不可同日而語方子尹先生門人言尹先生讀書云耳順心得如誦己言功夫到後誦聖賢言語都一似自己言語良久曰佛所謂心印是也印第一箇了印第二箇只與第一箇一般又印第三箇只與第二箇一般惟堯舜孔顏方能如此堯老遜位與舜教舜做及舜做出來只與堯一般此所謂真同也孟子曰得志行乎中國若合符節不是且恁地說廣讀書須教首尾貫穿若一番只草草看過不濟事某記舅氏云當新經行時有一先生教人極有條理時既禁了史書所讀者止是荀揚老莊列子等書他便將諸書劃定次第初入學只看一書讀了理會得都了方看第二件每件須要貫穿從頭到尾皆有次第既通了許多書斯為必取科第之計如刑名度數也各理會得些天文地理也曉得些五運六氣也曉得些如素問等書也略理會得又如讀得聖製經便須於諸書都曉得些聖製經者乃是諸書節略本是昭武一士人作將去獻梁師成要粮官爵及投進累月不見消息忽然一日只見內降一書云御製聖製經令天下皆誦讀方伯謨尚能記此士人姓名又云是時既禁史學更無人敢讀史時奉使叔祖教授鄉里只就蒙求逐事開說本末時人已相尊敬謂能通古今有一士人以犯法被黥在都中因計會在梁師成手裏直書院與之打併書冊甚整齊師成喜之因問其故他以情告遂與之補官令常直書院一日傳聖駕將幸師成家師成遂令此人打併裝疊書冊此人以經史次第排極可觀師成來點檢見諸史亦列桌上因大駭急移下去云把這般文字將出來做甚麼此非獨不好此想只怕人主取去看見興衰治亂之端耳賀孫近日真箇讀書人少也緣科舉時文之弊也纔把書來讀便先立箇意思要討新奇都不理會他本意著實纔討得新奇便準擬作時文使下梢弄得熟只是這箇將來使雖是朝廷甚麼大典禮也胡亂信手捻合出來使不知一撞百碎前輩也是讀書某曾見大東萊呂居仁之兄他於六經三傳皆通親手點注並用小圈點注所不足者並將疏楷書用朱點無點畫草某只見他禮記如此他經皆如此諸呂從來富貴雖有官多是不赴銓亦得安樂讀書他家這法度卻是到伯恭打破了自後既弄時文少有肯如此讀書者賀孫精神長者博取之所得多精神短者但以詞義簡易者涵養中年以後之人讀書不要多只少少玩索自見道理千載而下讀聖人之書只看得他箇影象大概路脈如此若邊旁四畔也未易理會得燾
