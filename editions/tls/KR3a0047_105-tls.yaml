body:
  text: 朱子語類卷第一百五朱子二論自注書總論傅至叔言伊洛諸公文字說得不恁分曉至先生而後大明先生曰他一時間都是英才故撥著便轉便只須恁地說然某於文字卻只是依本分解注大抵前聖說話雖後面便生一箇聖人有未必盡曉他說者蓋他那前聖是一時間或因事而言或主一見而立此說後來人卻未見他當時之事故不解得一一與之合且如伊川解經是據他一時所見道理恁地說未必便是聖經本旨要之他那箇說卻亦是好說且如易之元亨利貞本來只是大亨而利於正雖有亨若不正則那亨亦使不得了當時文王之意祇是為卜筮設故祇有元亨更無有不元亨祇有利貞更無不利貞後來夫子於彖既以元亨利貞為四德又於文言復以為言故後人祇以為四德更不做大亨利貞說了易只是為卜筮而作故周禮分明言太卜掌三易連山歸藏周易古人於卜筮之官立之凡數人秦去古未遠故周易亦以卜筮得不焚今人纔說易是卜筮之書便以為辱累了易見夫子說許多道理便以為易只是說道理殊不知其言吉凶悔吝皆有理而其教人之意無不在也夫子見文王所謂元亨利貞者把來作四箇說道理亦自好故恁地說但文王當時未有此意今若以元者善之長亨者嘉之會利者義之和貞者事之幹與來卜筮者言豈不大糊塗了他要之文王者自不妨孔子之說孔子者自不害文王之說然孔子卻不是曉文王意不得但他又自要說一樣道理也道夫某釋經每下一字直是稱等輕重方敢寫出方子某解書如訓詁一二字等處多有不必解處只是解書之法如此亦要教人知得看文字不可忽略賀孫某所改經文字者必有意不是輕改當觀所以改之之意節每常解文字諸先生有多少好說話有時不敢載者蓋他本文未有這般意思在道夫問先生解經有異於程子說者如何曰程子說或一句自有兩三說其間必有一說是兩說不是理一而已安有兩三說皆是之理蓋其說或後嘗改之今所以與之異者安知不曾經他改來蓋一章而眾說叢然若不平心明目自有主張斷入一說則必無眾說皆是之理大雅方伯謨勸先生少著書曰在世間喫了飯後全不做得些子事無道理伯謨曰但發大綱曰那箇毫釐不到便有差錯如何可但發大綱小學之書問小學云德崇業廣曰德是得之於心業是見之於事燾問小學舞勺舞象曰勺是周公樂象是武王樂曰注勺籥也是如何曰而今也都見不得淳問衣不帛襦苎恐太溫傷陰氣也曰是如此今醫家亦說小兒子不要太煖內則亦是小兒不要著好物事璘問小學舉內則篇四十始仕方物出謀發慮先生注云方物出謀則謀不過物方物發慮則慮不過物請問不過物之義曰方物謀慮大概只是隨事謀慮植方物出謀發慮方猶對也只是比並那物如窮理一般也淳和之所問小學方物之義乃是第二條莫只且看到此某意要識得下面許多事和之因問五御中逐水曲及過君表等處先生既答曰而今便治禮記者他也不看蓋是他將這箇不干我事無用處便且鹵莽讀過了和之云後當如先生所教且將那頭放輕曰便放輕也不得須是見得這頭有滋味時那頭自輕時舉問小學立教篇大司徒六行孝友睦姻任恤後面八刑糾萬民卻無不友之刑雖有不弟之刑又注云不敬師長如何曰也不須恁地看且看古之聖人教人之法如何而今全無這箇且天降下民作之君作之師作之君便是作之師倪楊尹叔問嚴威儼恪非所以事親也注恪為恭敬如何曰恭敬較寬便都包許多解恪字亦未盡恪是恭敬中朴實緊切處今且恁地解若就恭敬說則恭敬又別恭主容敬主事如居處恭執事敬之類安卿問恪非所以事親只是有嚴意否曰太莊太嚴厲了宇問小學明倫一篇見得盡是節文事親之實曰其中極有難行處曰愛敬與倪為一自無難行曰此便是愛敬尺度須是把他去量度方見得愛敬倪葉兄問小學君師父三節曰劉表遣韓嵩至京師嵩曰嵩至京師天子假嵩一職則成天子之臣將軍之故吏耳在君為君不復為將軍死也便是此意卓問林兄看小學如何林舉小學父慈而教子孝而箴先生曰人既自有這良能良知了聖賢又恁地說直要人尋教親切父慈而教子孝而箴看我是能恁地不恁地小學所說教人逐一去上面尋許多道理到著大學亦只是這道理又教人看得就切實如此不是胡亂恁地說去子蒙問疑事毋質經文只說疑事而小學注云毋得成言之何也曰質成也成言之皆古注文謂彼此俱疑不要將己意斷了問直而勿有亦只是上意否曰是從上文來都是教人謙退遜讓賀孫問小學實明倫篇何以無朋友一條曰當時是眾編類來偶無此爾淳安卿問曲禮外言不入於閫內言不出於閫一段甚切何故不編入小學曰此樣處漏落也多又曰小學多說那恭敬處少說那防禁處義剛近思錄修身大法小學備矣義理精微近思錄詳之閎祖近思錄好看四子六經之階梯近思錄四子之階梯淳近思錄逐篇綱目一道體二為學大要三格物窮理四存養五改過遷善克己復禮六齊家之道七出處進退辭受之義八治國平天下之道九制度十君子處事之方十一教學之道十二改過及人心疵病十三異端之學十四聖賢氣象振近思錄大率所錄雜逐卷不可以一事名如第十卷亦不可以事君目之以其有人教小童在一段揚近思錄一書無不切人身救人病者壽昌鄭言近思錄中語甚有切身處曰聖賢說得語言平如中庸大學論語孟子皆平易近思錄是近來人說話便較切賀孫卓同或問近思錄曰且熟看大學了即讀語孟近思錄又難看賀孫近思錄首卷難看某所以與伯恭商量教他做數語以載於後正謂此也若只讀此則道理孤單如頓兵堅城之下卻不如語孟只是平鋪說去可以游心道夫看近思錄若於第一卷未曉得且從第二第三卷看起久久後看第一卷則漸曉得過問蜚卿近思錄看得如何曰所疑甚多曰今猝乍看這文字也是難有時前面恁地說後面又不是恁地這裏說得如此那裏又卻不如此子細看來看去卻自中間有箇路陌推尋通得四五十條後又卻只是一箇道理伊川云窮理豈是一日窮得盡窮得多後道理自通徹驤因論近思錄曰不當編易傳所載問如何曰公須自見意謂易傳已自成書文蔚因說近思續錄曰如今書已儘多了更有卻看不辦論語或問張仁叟問論語或問曰是五十年前文字與今說不類當時欲修後來精力衰那箇工夫大後掉了節先生說論語或問不須看請問曰支離泳孟子要指先生因編孟子要指云孟子若讀得無統也是費力某從十七八歲讀至二十歲只逐句去理會更不通透二十歲已後方知不可恁地讀元來許多長段都自首尾相照管脈絡相貫串只恁地熟讀自見得意思從此看孟子覺得意思極通快亦因悟作文之法如孟子當時固不是要作文只言語說出來首尾相應脈絡相貫自是合著如此又曰某當初讀自暴自棄章只恁地鶻突讀去伊川易傳云拒之以不信絕之以不為當初也匹似閑看過後因在舟中偶思量此將孟子上下文看乃始通串方始說得是如此亦溫故知新之意又曰看文字不可恁地看過便道了須是時復玩味庶幾忽然感悟到得義理與踐履處融會方是自得這箇意思與尋常思索而得意思不同賀孫問孟子首章是先剖判箇天理人欲令人曉得其托始之意甚明若先生所編要略卻是要從源頭說來所以不同曰某向時編此書今看來亦不必只孟子便直恁分曉示人自是好了時舉曰孟子前面多是分明說與時君且如章首說上下交征利其害便至於不奪不饜說仁義便云未有遺其親後其君次章說賢者便有此樂不賢者便不能有此樂都是一反一正言其效驗如此亦欲人君少知恐懼之意耳曰也不是要人君知恐懼但其效自必至此孟子之書明白親切無甚可疑者只要日日熟讀須教他在吾肚中轉作千百回便自然純熟某當初看時要逐句去看他便但覺得意思促迫到後來放寬看卻有條理然此書不特是義理精明又且是甚次第底文章某因熟讀後便見自此也知作文之法時舉敬之問看要略見先生所說孟子皆歸之仁義如說性反以後諸處皆然曰是他見得這道理通透見得裏面本來都無別物事只有箇仁義到得說將出都離這箇不得不是要安排如此道也是離這仁義不得舍仁義不足以見道如造化只是箇陰陽捨陰陽不足以明造化問古人似各有所主如曾子只守箇忠恕子思只守箇誠孟子只守箇仁義其實皆一理也曰也不是他安排要如此是他見得道理做出都是這箇說出也只是這箇只各就地頭說不是把定這箇將來做如堯舜是多少道理到得後來衣缽之傳只說人心惟危道心惟微惟精惟一允執厥中緊要在上三句說會如此方得箇中方得箇恰好這也到這地頭當說中便說箇中聖賢言語初不是著意安排只遇著這字便說出這字也賀孫因整要略謂孟子發明許多道理都盡自此外更無別法思惟這箇先從性看看得這箇物事破了然後看入裏面去終不甚費力要知雖有此數十條是古人已說過不得不與他理會到得做工夫時卻不用得許多難得勇猛底人直截便做去賀孫敬之問要指不取杞柳一章曰此章自分曉更無可玩索不用入亦可卻是生之謂性一段難曉說得來反恐鶻突故不編入賀孫中庸集略大凡文字上古聖賢說底便不差到得周程張邵們說得亦不差其他門人便多病某初要節一本中庸集略更下手不得其間或有一節說得好第二節便差底又有說得似好而又說從別處去底然而看得他們說多卻覺煞得力義剛仁說仁說只說得前一截好閎祖問仁者天地生物之心曰天地之心只是箇生凡物皆是生方有此物如草木之萌芽枝葉條榦皆是生方有之人物所以生生不窮者以其生也才不生便乾枯殺了這箇是統論一箇仁之體其中又自有節目界限如義禮智又自有細分處也問偏言則一事專言則包四者曰以專言言之則一者包四者以偏言言之則四者不離乎一者僩問先生仁說說存此者也不失此者也如說行此則仁在其中非仁也曰謂之仁固不可謂之非仁則只得恁地說如孟子便去解這仁字孔子卻不恁地節敬齋箴問持敬與克己工夫曰敬是涵養操持不走作克己則和根打併了教他盡淨問敬齋箴曰此是敬之目說有許多地頭去處僩守口如瓶是言語不亂出防意如城是恐為外所誘道夫守口如瓶不妄出也防意如城閑邪之入也蟻封乃小巷屈曲之地是折旋中矩不妄動也敬仲周旋中規折旋中矩周旋是直去卻回來其回轉處欲其圓如中規也折旋是直去了復橫去如曲尺相似其橫轉處欲其方如中矩也又問敬齋箴蟻封曰蟻垤也北方謂之蟻樓如小山子乃蟻穴地其泥墳起如丘垤中間屈曲如小巷道古語云乘馬折旋於蟻封之間言蟻封之間巷路屈曲狹小而能乘馬折旋於其間不失其馳驟之節所以為難也鸛鳴于垤垤即蟻封也天陰雨下則蟻出故鸛鳴于垤以俟蟻之出而喙食之也王荊公初解垤為自然之丘不信蟻封之說後過北方親見有之遂改其說僩問主一曰心只要主一不可容兩事一件事了更加一件便是貳一件事了更加兩件便是參勿貳以二勿參以三是不要二三不東以西不南以北是不要走作淳問勿貳以二勿參以三不東以西不南以北如何分別曰都只是形容箇敬敬須主一初來有一箇事又添一箇便是來貳他成兩箇元有一箇又添兩箇便是來參他成三箇不東以西不南以北只一心做東去又要做西去做南去又要做北去皆是不主一上面說箇心不二三下面說箇心不走作宇或問敬齋箴後面少些從容不迫之意欲先生添數句曰如何解迫切今未曾下手在便要從容不迫卻無此理除非那人做工夫大段嚴迫然後勸他勿迫切如人相殺未曾交鋒便要引退今未曾做工夫在便要開後門然亦不解迫切只是不曾做做著時不患其迫切某但常覺得緩寬底意思多耳李曰先生猶如此說學者當如何也僩六君子贊勇撤皋比說講易事閎祖通鑑綱目說編通鑑綱目尚未成文字因言伯恭大事記忒藏頭亢腦如摶謎相以又解題之類亦大多問正統之說自三代以下如漢唐亦未純乎正統乃變中之正者如秦西晉隋則統而不正者如蜀東晉則正而不統者曰何必恁地論只天下為一諸侯朝覲獄訟皆歸便是得正統其有正不正又是隨他做如何恁地論有始不得正統而後方得者是正統之始有始得正統而後不得者是正統之餘如秦初猶未得正統及始皇并天下方始得正統晉初亦未得正統自泰康以後方始得正統隋初亦未得正統自滅陳後方得正統如本朝至太宗并了太原方是得正統又有無統時如三國南北五代皆天下分裂不能相君臣皆不得正統義剛錄作此時便是無統某嘗作通鑑綱目有無統之說此書今未及修後之君子必有取焉溫公只要編年號相續此等處須把一箇書帝書崩而餘書主書殂既不是他臣子又不是他史官只如旁人立看一般何故作此尊奉之態此等處合只書甲子而附注年號於其下如魏黃初幾年蜀章武幾年吳青龍幾年之類方為是又問南軒謂漢後當以蜀漢年號繼之此說如何曰如此亦得他亦以蜀漢是正統之餘如東晉亦是正統之餘也問東周如何曰必竟周是天子問唐後來多藩鎮割據義剛錄云唐末天子不能有其土地亦可謂正統之餘否則如何曰唐之天下甚闊所不服者只河北數鎮之地而已義剛錄云安得謂不能有其土地淳義剛同溫公通鑑以魏為主故書蜀丞相亮寇何地從魏志也其理都錯某所作綱目以蜀為主後劉聰石勒諸人皆晉之故臣故東晉以君臨之至宋後魏諸國則兩朝平書之不主一邊年號只書甲子問綱目主意曰主在正統問何以主在正統曰三國當以蜀漢為正而溫公乃云某年某月諸葛亮入寇是冠履倒置何以示訓緣此遂欲起意成書推此意修正處極多若成書當亦不下通鑑許多文字但恐精力不逮未必能成耳若度不能成則須焚之大雅問宋齊梁陳正統如何書曰自古亦有無統時如周亡之後秦未帝之前自是無所統屬底道理南北亦只是並書又問東晉如何書曰宋齊如何比得東晉又問三國如何書曰以蜀為正蜀亡之後無多年便是西晉中國亦權以魏為正又問後唐亦可以繼唐否曰如何繼得賜綱目於無正統處並書之不相主客通鑑於無統處須立一箇為主某又參取史法之善者如權臣擅命多書以某人為某王某公范曄卻書曹操自立為魏公綱目亦用此例方子問武后擅唐則可書云帝在房陵呂氏在漢所謂少帝者又非惠帝子則宜何書曰彼謂非惠帝子者乃漢之大臣不欲當弒逆之名耳既云後宮美人子則是明其非正嫡元子耳大雅或問武后之禍曰前輩云當廢武后所出別立太宗子孫曰此論固善但當時宗室為武后殺盡存者皆愚暗豈可恃因說通鑑提綱例凡逆臣之死皆書曰死至狄仁傑則甚疑之李氏之復雖出仁傑然畢竟是死於周之大臣不柰何也教相隨入死例書云某年月日狄仁傑死也大雅
