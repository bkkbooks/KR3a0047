body:
  text: 朱子語類卷第十六大學三傳一章釋明明德問克明德曰德之明與不明只在人之克與不克耳克只是真箇會明其明德節問明德明命曰便是天之所命謂性者人皆有此明德但為物欲之所昏蔽故暗塞爾自人受之喚做明德自天言之喚做明命今人多鶻鶻突突一似無這箇明命若常見其在前則凜凜然不敢放肆見許多道理都在眼前又曰人之明德即天之明命雖則是形骸間隔然人之所以能視聽言動非天而何問苟日新日日新曰這箇道理未見得時若無頭無面如何下工夫才剔撥得有些通透處便須急急躡蹤趲鄉前去又曰周雖舊邦其命維新文王能使天下無一民不新其德即此便是天命之新又云天視自我民視天聽自我民聽或問此若有不同如何曰天豈曾有耳目以視聽只是自我民之視聽便是天之視聽如帝命文王豈天諄諄然命之只是文王要恁地便是理合恁地便是帝命之也又曰若一件事民人皆以為是便是天以為是若人民皆歸往之便是天命之也又曰此處甚微故其理難看賀孫顧諟天之明命諟是詳審顧諟見得子細僩顧諟天之明命只是照管得那本明底物事在燾顧諟天之明命便是常見這物事不教昏著今看大學亦要識此意所謂顧諟天之明命無他求其放心而已方子佐同先生問顧諟天之明命如何看答云天之明命是天之所以命我而我之所以為德者也然天之所以與我者雖曰至善苟不能常提撕省察使大用全體昭晰無遺則人欲益滋天理益昏而無以有諸己矣曰此便是至善但今人無事時又卻恁昏昏地至有事時則又隨事逐物而去都無一箇主宰這須是常加省察真如見一箇物事在裏不要昏濁了他則無事時自然凝定有事時隨理而處無有不當道夫顧諟天之明命古註云常目在之說得極好非謂有一物常在目前可見也只是長存此心知得有這道理光明不昧方其靜坐未接物也此理固湛然清明及其遇事而應接也此理亦隨處發見只要人常提撕省察念念不忘存養久之則是理愈明雖欲忘之而不可得矣孟子曰學問之道無他求其放心而已矣所謂求放心只常存此心便是存養既久自然信向決知堯舜之可為聖賢之可學如菽粟之必飽布帛之必煖自然不為外物所勝若是若存若亡如何會信如何能必行又曰千書萬書只是教人求放心聖賢教人其要處皆一苟通得一處則觸處皆通矣僩問顧諟天之明命言常目在之如何曰顧諟是看此也目在是如目存之常知得有此理不是親眼看立則見其參於前在輿則見其倚於衡便是這模樣只要常常提撕在這裏莫使他昏昧了子常見得孝父常見得慈與國人交常見得信宇問顧謂常目在之天命至微恐不可目在之想只是顧其發見處曰只是見得長長地在面前模樣立則見其參於前在輿則見其倚於衡豈是有物可見義剛問常目在之意先生以手指曰如一件物在此惟恐人偷去兩眼常常覷在此相似友仁問如何目在之曰常在視瞻之間蓋言存之而不忘宇因說天之明命曰這箇物事即是氣便有許多道理在裏人物之生都是先有這箇物事便是天當初分付底既有這物事方始具是形以生便有皮包裹在裏若有這箇無這皮殼亦無所包裹如草木之生亦是有箇生意了便會生出芽櫱芽櫱出來便有皮包裹著而今儒者只是理會這箇要得順性命之理佛老也只是理會這箇物事老氏便要常把住這氣不肯與他散便會長生久視長生久視也未見得只是做得到也便未會死佛氏也只是見箇物事便放得下所以死生禍福都不動只是他去作弄了又曰各正性命保合太和聖人於乾卦發此兩句最好人之所以為人物之所以為物都是正箇性命保合得箇和氣性命便是當初合下分付底保合便是有箇皮殼包裹在裏如人以刀破其腹此箇物事便散卻便死夔孫而今人會說話行動凡百皆是天之明命人心惟危道心惟微也是天之明命夔孫傳二章釋新民苟日新一句是為學入頭處而今為學且要理會苟字苟能日新如此則下面兩句工夫方能接續做去而今學者只管要日新卻不去苟字上面著工夫苟日新苟者誠也泳苟誠也要緊在此一字賀孫苟日新須是真箇日新方可日日新又日新泳舊來看大學日新處以為重在後兩句今看得重在前一句苟字多訓誠字璘苟字訓誠古訓釋皆如此乍見覺差異人誠能有日新之功則須日有進益若暫能日新不能接續則前日所新者卻間斷衰頹了所以不能日日新又日新也人傑苟日新新是對舊染之汙而言日日新又日新只是要常常如此無間斷也新與舊非是去外面討來昨日之舊乃是今日之新道夫云這正如孟子操存舍亡說存與亡非是有兩物曰然只是在一念間爾如顧諟天之明命上下文都說明德這裏卻說明命蓋天之所以與我便是明命我之所得以為性者便是明德命與德皆以明為言是這箇物本自光明顯然在裏我卻去昏蔽了他須用日新說得來又只是箇存心所以明道云聖賢千言萬語只是欲人將已放之心約之使反覆入身來自能尋向上去下學而上達也道夫湯日日新書云終始惟一時乃日新這箇道理須是常接續不已方是日新才有間斷便不可盤銘取沐浴之義蓋為早間盥濯才了晚下垢汙又生所以常要日新德明徐仁父問湯之盤銘曰日日新繼以作新民日新是明德事而今屬之作新民之上意者申言新民必本於在我之自新也曰然莊子言語道而非其序則非道矣橫渠云如中庸文字直須句句理會過使其言互相發今讀大學亦然某年十七八時讀中庸大學每早起須誦十遍今大學可且熟讀賀孫鼓之舞之之謂作如擊鼓然自然使人跳舞踴躍然民之所以感動者由其本有此理上之人既有以自明其明德時時提撕警策則下之人觀瞻感發各有以興起其同然之善心而不能已耳僩周雖舊邦其命維新自新新民而至於天命之改易可謂極矣必如是而後為止於至善也僩其命維新是新民之極和天命也新大雅傳三章釋止於至善緡蠻黃鳥止于丘隅物亦各尋箇善處止可以人而不如鳥乎德明於緝熙敬止緝熙是工夫敬止是功效收殺處宇或言大學以知止為要曰如君便要止於仁臣便要止於敬子便止於孝父便止於慈若不知得何緣到得那地位只這便是至善處道夫問至善是無過不及恰好處否曰只是這夾界上些子如君止於仁若依違牽制懦而無斷便是過便不是仁臣能陳善閉邪便是敬若有所畏懼而不敢正君之失便是過便不是敬道夫問至善如君之仁臣之敬父之慈子之孝者固如此就萬物中細論之則其類如何曰只恰好底便是坐如尸便是坐恰好底立如齊便是立恰好底淳宇同周問注云究其精微之蘊而又推類以通其餘何也曰大倫有五此言其三蓋不止此究其精微之蘊是就三者裏面窮究其蘊推類以通其餘是就外面推廣如夫婦兄弟之類淳謨錄云須是就君仁臣敬子孝父慈與國人信上推究精微各有不盡之理此章雖人倫大目亦只舉得三件必須就此上推廣所以事上當如何所以待下又如何尊卑大小之間處之各要如此問如切如磋者道學也如琢如磨者自修也此是詩人美武公之本旨耶姑借其詞以發學問自修之義耶曰武公大段是有學問底人抑之一詩義理精密詩中如此者甚不易得儒用至善一章工夫都在切磋琢磨上泳既切而復磋之既琢而復磨之方止於至善不然雖善非至也節傳之三章緊要只是如切如磋如琢如磨如切可謂善矣又須當磋之方是至善如琢可謂善矣又須當磨之方是至善一章主意只是說所以止於至善工夫為下不可諠兮之語拖帶說到道盛德至善民不能忘又因此語一向引去大概是反覆嗟詠其味深長他經引詩或未甚切只大學引得極細密賀孫魏元壽問切磋琢磨之說曰恰似剝了一重又有一重學者做工夫消磨舊習幾時便去教盡須是只管磨礱教十分淨潔最怕如今於眼前道理略理會得些便自以為足便不著力向上去這如何會到至善田地賀孫骨角卻易開解玉石儘著得磨揩工夫賀孫瑟矜莊貌僩武貌恂慄嚴毅貌古人直是如此嚴整然後有那威儀烜赫著見德明問解瑟為嚴密是就心言抑就行言曰是就心言問心如何是密處曰只是不粗疏恁地縝密宇僩武毅之貌能剛強卓立不如此怠惰闒颯僩問瑟者武毅之貌恂慄戰懼之貌不知人當戰懼之時果有武毅之意否曰人而懷戰懼之心則必齋莊嚴肅又烏可犯壯祖問恂慄何以知為戰懼曰莊子云木處則恂慄危懼廣大率切而不磋亦未到至善處琢而不磨亦未到至善處瑟兮僩兮則誠敬存於中矣未至於赫兮喧兮威儀輝光著見於外亦未為至善此四句是此段緊切處專是說至善蓋不如此則雖善矣未得為至善也至於民之不能忘若非十分至善何以使民久而不能忘古人言語精密有條理如此銖民之不能忘也只是一時不忘亦不是至善又曰瑟兮僩兮赫兮喧兮者有所主於中而不能發於外亦不是至善務飾於外而無主於中亦不是至善銖問前王不忘云云曰前王遠矣盛德至善後人不能忘之君子賢其賢如堯舜文武之德後世尊仰之豈非賢其所賢乎親其親如周后稷之德子孫宗之以為先祖先父之所自出豈非親其所親乎宇問君子賢其賢而親其親曰如孔子仰文武之德是賢其賢成康以後思其恩而保其基緒便是親其親木之或問至善章曰此章前三節是說止字中一節說至善後面烈文一節又是詠歎此至善之意銖傳四章釋本末問聽訟吾猶人也必也使無訟乎曰固是以修身為本只是公別底言語多走作如云凡人聽訟以曲為直以直為曲所以人得以盡其無實之辭聖人理無不明明無不燭所以人不敢如此卻是聖人善聽訟所以人不敢盡其無實之辭正與經意相反聖人正是說聽訟我也無異於人當使其無訟之可聽方得若如公言則當云聽訟吾過人遠矣故無情者不敢盡其辭始得聖人固不會錯斷了事只是它所以無訟者卻不在於善聽訟在於意誠心正自然有以薰炙漸染大服民志故自無訟之可聽耳如成人有其兄死而不為衰者聞子皋將至遂為衰子皋何嘗聽訟自有以感動人處耳僩使他無訟在我之事本也恁地看此所以聽訟為末泳無情者不得盡其辭便是說那無訟之由然惟先有以服其心志所以能使之不得盡其虛誕之辭義剛大畏民志者大有以畏服斯民自欺之志卓傳五章釋格物致知劉圻父說人心之靈莫不有知而天下之物莫不有理恐明明德便是性曰不是如此心與性自有分別靈底是心實底是性靈便是那知覺底如向父母則有那孝出來向君則有那忠出來這便是性如知道事親要孝事君要忠這便是心張子曰心統性情者也此說得最精密次日圻父復說過先生曰性便是那理心便是盛貯該載敷施發用底問表裏精粗無不到曰表便是外面理會得底裏便是就自家身上至親至切至隱至密貼骨貼肉處今人處事多是自說道且恁地也不妨這箇便不是這便只是理會不曾到那貼底處若是知得那貼底時自是決然不肯恁地了義剛子寰同問因其已知之理推而致之以求至乎其極是因定省之孝以至於色難養志因事君之忠以至於陳善閉邪之類否曰此只說得外面底須是表裏皆如此若是做得大者而小者未盡亦不可做得小者而大者未盡尤不可須是無分毫欠闕方是且如陸子靜說良知良能四端根心只是他弄這物事其他有合理會者渠理會不得卻禁人理會鵝湖之會渠作詩云易簡工夫終久大彼所謂易簡者苟簡容易爾全看得不子細乾以易知者乾是至健之物至健者要做便做直是易坤是至順之物順理而為無所不能故曰簡此言造化之理至於可久則賢人之德可久者日新而不已可大則賢人之業可大者富有而無疆易簡有幾多事在豈容易苟簡之云乎人傑任道弟問致知章前說窮理處云因其已知之理而益窮之且經文物格而后知至卻是知至在後今乃云因其已知而益窮之則又在格物前曰知先自有才要去理會便是這些知萌露若懵然全不向著便是知之端未曾通才思量著便這箇骨子透出來且如做些事錯才知道錯便是向好門路卻不是方始去理會箇知只是如今須著因其端而推致之使四方八面千頭萬緒無有些不知無有毫髮窒礙孟子所謂知皆擴而充之若火之始然泉之始達擴而充之便是致字意思賀孫致知則理在物而推吾之知以知之也知至則理在物而吾心之知已得其極也或問理之表裏精粗無不盡而吾心之分別取舍無不切既有箇定理如何又有表裏精粗曰理固自有表裏精粗人見得亦自有高低淺深有人只理會得下面許多都不見得上面一截這喚做知得表知得粗又有人合下便看得大體都不就中間細下工夫這喚做知得裏知得精二者都是偏故大學必欲格物致知到物格知至則表裏精粗無不盡賀孫問表裏精粗曰須是表裏精粗無不到有一種人只就皮殼上做工夫卻於理之所以然者全無是處又有一種人思慮向裏去又嫌眼前道理粗於事物上都不理會此乃談玄說妙之病其流必入於異端銖問表裏曰表者人物之所共由裏者吾心之所獨得表者如父慈子孝雖九夷八蠻也出這道理不得裏者乃是至隱至微至親至切切要處因舉子思云語大天下莫能載語小天下莫能破又說裏字云莫見乎隱莫顯乎微此箇道理不惟一日間離不得雖一時間亦離不得以至終食之頃亦離不得夔孫傅問表裏之說曰所說博我以文約我以禮便是博我以文是要四方八面都見得周匝無遺是之謂表至於約我以禮又要逼向身己上來無一毫之不盡是之謂裏子升云自古學問亦不過此二端曰是但須見得通透木之問精粗曰如管仲之仁亦謂之仁此是粗處至精處則顏子三月之後或違之又如充無欲害人之心則仁不可勝用充無欲穿窬之心則義不可勝用害人與穿窬固為不仁不義此是粗底然其實一念不當則為不仁不義處夔孫周問大學補亡心之分別取舍無不切曰只是理徹了見善端的如不及見不善端的如探湯好善便端的如好好色惡不善便端的如惡惡臭此下須連接誠意看此未是誠意是醞釀誠意來淳謨錄云此只是連著誠意說知之者切則見善真如不及見不善真如探湯而無纖毫不實故爾李問吾之所知無不切曰某向說得較寬又覺不切今說較切又少些寬舒意所以又說道表裏精粗無不盡也自見得切字卻約向裏面賀孫安卿問全體大用曰體用元不相離如人行坐坐則此身全坐便是體行則此體全行便是用道夫問格物章補文處不入敬意何也曰敬已就小學處做了此處只據本章直說不必雜在這裏壓重了不淨潔宇問所補致知章何不效其文體曰亦曾效而為之竟不能成劉原父卻會效古人為文其集中有數篇論全似禮記必大傳六章釋誠意誠其意只是實其意只作一箇虛字看如正字之類端蒙說許多病痛都在誠意章一齊要除了下面有些小為病痛亦輕可若不除去恐因此滋蔓則病痛自若泳問誠意是如何曰心只是有一帶路更不著得兩箇物事如今人要做好事都自無力其所以無力是如何只為他有箇為惡底意思在裏面牽繫要去做好事底心是實要做不好事底心是虛被那虛底在裏面夾雜便將實底一齊打壞了賀孫詣學升堂云云教授請講說大義曰大綱要緊只是前面三兩章君子小人之分卻在誠其意處誠於為善便是君子不誠底便是小人更無別說琮器遠問物格知至了如何到誠意又說毋自欺也毋者禁止之辭曰物既格知既至到這裏方可著手下工夫不是物格知至了下面許多一齊掃了若如此卻不消說下面許多看下面許多節節有工夫賀孫自欺亞夫問欲正其心者先誠其意此章當說所以誠意工夫當如何曰此繼於物格知至之後故特言所謂誠其意者毋自欺也若知之已至則意無不實惟是知之有毫末未盡必至於自欺且如做一事當如此決定只著如此做而不可以如彼若知之未至則當做處便夾帶這不當做底意在當如此做又被那要如彼底心牽惹這便是不實便都做不成賀孫問知不至與自欺者如何分曰小人閒居為不善無所不至見君子而后厭然揜其不善而著其善只為是知不至耳問當其知不至時亦自不知其至於此然其勢必至於自欺曰勢必至此頃之復曰不識不知者卻與此又別論他箇又卻只是見錯故以不善為善而不自知耳其與知不至而自欺者固是五十步笑百步然卻又別問要之二者其病源只是欠了格物工夫曰然道夫問劉棟看大學自欺之說如何曰不知義理卻道我知義理是自欺先生曰自欺是箇半知半不知底人知道善我所當為卻又不十分去為善知道惡不可作卻又是自家所愛舍他不得這便是自欺不知不識只喚欺不知不識卻不喚做自欺道夫或問誠其意者毋自欺曰譬如一塊物外面是銀裏面是鐵便是自欺須是表裏如一便是不自欺然所以不自欺須是見得分曉譬如今人見烏喙之不可食知水火之不可蹈則自不食不蹈如寒之欲衣飢之欲食則自是不能已今人果見得分曉如烏喙之不可食水火之不可蹈見善如飢之欲食寒之欲衣則此意自實矣祖道自欺非是心有所慊外面雖為善事其中卻實不然乃自欺也譬如一塊銅外面以金裹之便不是真金人傑所謂誠其意者毋自欺也注云心之所發陽善陰惡則其好善惡惡皆為自欺而意不誠矣而今說自欺未說到與人說時方謂之自欺只是自家知得善好要為善然心中卻覺得微有些沒緊要底意思便是自欺便是虛偽不實矣正如金已是真金了只是鍛鍊得微不熟微有些渣滓去不盡顏色或白或青或黃便不是十分精金矣顏子有不善未嘗不知便是知之至知之未嘗復行便是意之實又曰如顏子地位豈有不善所謂不善只是微有差失便能知之才知之便更不萌作只是那微有差失便是知不至處僩所謂自欺者非為此人本不欲為善去惡但此意隨發常有一念在內阻隔住不放教表裏如一便是自欺但當致知分別善惡了然後致其慎獨之功而力割去物欲之雜而后意可得其誠也壯祖只今有一毫不快於心便是自欺也道夫看如今未識道理人說出道理便恁地包藏隱伏他元不曾見來這亦是自欺亦是不實想他當時發出來心下必不安穩賀孫國秀問大學誠意看來有三樣一則內全無好善惡惡之實而專事掩覆於外者此不誠之尤也一則雖知好善惡惡之為是而隱微之際又苟且以自瞞底一則知有未至隨意應事而自不覺陷於自欺底曰這箇不用恁地分只是一路都是自欺但有深淺之不同耳燾次早云夜來國秀說自欺有三樣底後來思之是有這三樣意思然卻不是三路只是一路有淺深之不同又因論以假託換掩覆字云假託字又似重了掩覆字又似輕不能得通上下底字又因論誠與不誠不特見之於外只裏面一念之發便有誠偽之分譬如一粒粟外面些皮子好裏面那些子不好如某所謂其好善也陰有不好者以拒於內其惡惡也陰有不惡者以挽其中蓋好惡未形時已有那些子不好不惡底藏在裏面了燾人固有終身為善而自欺者不特外面有心中欲為善而常有箇不肯底意思便是自欺也須是要打疊得盡蓋意誠而後心可正過得這一關後方可進拱壽問自慊曰人之為善須是十分真實為善方是自慊若有六七分為善又有兩三分為惡底意思在裏面相牽便不是自慊須是如惡惡臭如好好色方是卓自慊如惡惡臭如好好色此之謂自慊慊者無不足也如有心為善更別有一分心在主張他事即是橫渠所謂有外之心不可以合天心也祖道自慊之慊大意與孟子行有不慊相類子細思之亦微有不同孟子慊訓滿足意多大學訓快意多橫渠云有外之心蜀錄作自慊不足以合天心初看亦只一般然橫渠亦是訓足底意思多大學訓快意多問大學說自慊且說合做處便做無牽滯於己私且只是快底意少間方始心下充滿孟子謂行有不慊只說行有不滿足則便餒耳曰固是夜來說此極子細若不理會得誠意意思親切也說不到此今看來誠意如惡惡臭如好好色只是苦切定要如此不如此自不得賀孫字有同一義而二用者慊字訓足也吾何慊乎哉謂心中不以彼之富貴而懷不足也行有不慊於心謂義須充足於中不然則餒也如忍之一字自容忍而為善者言之則為忍去忿慾之氣自殘忍而為惡者言之則為忍了惻隱之心慊字一從口如胡孫兩嗛皆本虛字看懷藏何物於內耳如銜字或為銜恨或為銜恩亦同此義誠意章皆在兩箇自字上用功人傑自欺自慊問毋自欺是誠意自慊是意誠否小人閒居以下是形容自欺之情狀心廣體胖是形容自慊之意否曰然後段各發明前說但此處是箇牢關今能致知知至而意誠矣驗以日用間誠意十分為善矣有一分不好底意思潛發以間於其間此意一發便由斜徑以長這箇卻是實前面善意卻是虛矣如見孺子入井救之是好意其間有些要譽底意思以雜之如薦好人是善意有些要人德之之意隨後生來治惡人是好意有些狼疾之意隨後來前面好意都成虛了如垢卦上五爻皆陽下面只一陰生五陽便立不住了荀子亦言心臥則夢偷則自行使之則謀見解蔽篇彼言偷者便是說那不好底意若曰使之則謀者則在人使之如何耳謀善謀惡都由人只是那偷底可惡故須致知要得早辨而豫戒之耳大雅或問自慊自欺之辨曰譬如作蒸餅一以極白好麵自裏包出內外更無少異所謂自慊也一以不好麵做心卻以白麵作皮務要欺人然外之白麵雖好而易窮內之不好者終不可揜則乃所謂自欺也壯祖問誠其意者毋自欺也近改注云自欺者心之所發若在於善而實則未能不善也若字之義如何曰若字只是外面做得來一似都善其實中心有些不愛此便是自欺前日得孫敬甫書他說自慊字似差了其意以為好善如好好色惡惡如惡惡臭如此了然後自慊看經文語意不是如此此之謂自慊謂如好好色惡惡臭只此便是自慊是合下好惡時便是要自慊了非是做得善了方能自慊也自慊正與自欺相對不差毫髮所謂誠其意便是要毋自欺非至誠其意了方能不自欺也所謂不自欺而慊者只是要自快足我之志願不是要為他人也誠與不誠自慊與自欺只爭這些子毫髮之間耳又曰自慊則一自欺則二自慊者外面如此中心也是如此表裏一般自欺者外面如此做中心其實有些子不願外面且要人道好只此便是二心誠偽之所由分也僩問誠意章曰過此關方得道理牢固或云須無一毫自欺方能自慊必十分自慊方能不自欺故君子必慎獨曰固是然欲誠其意者先致其知知若未至何由得如此蓋到物格知至後已是意誠八九分了只是更就上面省察如用兵禦寇寇雖已盡翦除了猶恐林谷草莽間有小小隱伏者或能間出為害更當搜過始得銖問知至而後意誠則知至之後無所用力意自誠矣傳猶有慎獨之說何也曰知之不至則不能慎獨亦不肯慎獨惟知至者見得實是實非灼然如此則必戰懼以終之此所謂能慎獨也如顏子請事斯語曾子戰戰兢兢終身而後已彼豈知之不至然必如此方能意誠蓋無放心底聖賢惟聖罔念作狂一毫少不謹懼則已墮於意欲之私矣此聖人教人徹上徹下不出一敬字也蓋知至而後意誠則知至之後意已誠矣猶恐隱微之間有所不實又必提掇而謹之使無毫髮妄馳則表裏隱顯無一不實而自快慊也銖慎獨問或言知至後煞要著力做工夫竊意致知是著力做工夫處到知至則雖不能無工夫然亦無大段著工夫處曰雖不用大段著工夫但恐其間不能無照管不及處故須著防閑之所以說君子慎其獨也行夫問先生常言知既至後又可以驗自家之意誠不誠先生久之曰知至後意固自然誠但其間雖無大段自欺不誠處然亦有照管不著所在所以貴於慎其獨至於有所未誠依舊是知之未真若到這裏更加工夫則自然無一毫之不誠矣道夫光祖問物格知至則意無不誠而又有慎獨之說莫是當誠意時自當更用工夫否曰這是先窮得理先知得到了更須於細微處用工夫若不真知得到都恁地鶻鶻突突雖十目視十手指眾所共知之處亦自七顛八倒了更如何地慎獨賀孫知至而後意誠已有八分恐有照管不到故曰慎獨節致知者誠意之本也慎獨者誠意之助也致知則意已誠七八分了只是猶恐隱微獨處尚有些子未誠實處故其要在慎獨銖誠意章上云必慎其獨者欲其自慊也下云必慎其獨者防其自欺也蓋上言如惡惡臭如好好色此之謂自慊故君子必慎其獨者欲其察於隱微之間必吾所發之意好善必如好好色惡惡必如惡惡臭皆以實而無不自慊也下言小人閒居為不善而繼以誠於中形於外故君子必慎其獨者欲其察於隱微之間必吾所發之意由中及外表裏如一皆以實而無少自欺也銖誠意者好善如好好色惡惡如惡惡臭皆是真情既是真情則發見於外者亦皆可見如種麻則生麻種穀則生穀此謂誠於中形於外又恐於獨之時有不到處故必慎獨節或說慎獨曰公自是看錯了如惡惡臭如好好色此之謂自慊已是實理了下面故君子必慎其獨是別舉起一句致戒又是一段工夫至下一段又是反說小人之事以致戒君子亦豈可謂全無所為且如著衣喫飯也是為飢寒大學看來雖只恁地滔滔地說去然段段致戒如一下水船相似也要柂要楫夔孫或問在慎獨只是欲無間先生應節問誠意章句所謂必致其知方肯慎獨方能慎獨曰知不到田地心下自有一物與他相爭鬥故不會肯慎獨銖問自欺與厭然揜其不善而著其善之類有分別否曰自欺只是於理上虧欠不足便胡亂且欺謾過去如有得九分義理雜了一分私意九分好善惡惡一分不好不惡便是自欺到得厭然揜著之時又其甚者原其所以自欺又是知不至不曾見得道理精至處所以向來說表裏精粗字如知為人子止於孝這是表到得知所以必著孝是如何所以為孝當如何這便是裏見得到這般處方知決定是著孝方可以用力於孝又方肯決然用力於孝人須是埽去氣稟私欲使胸次虛靈洞徹木之以下論揜其不善問意誠曰表裏如一便是但所以要得表裏如一卻難今人當獨處時此心非是不誠只是不柰何他今人在靜處非是此心要馳騖但把捉他不住此已是兩般意思至如見君子而後厭然詐善時已是第二番罪過了祖道誠意只是表裏如一若外面白裏面黑便非誠意今人須於靜坐時見得表裏有不如一方是有工夫如小人見君子則掩其不善已是第二番過失人傑此一箇心須每日提撕令常惺覺頃刻放寬便隨物流轉無復收拾如今大學一書豈在看他言語正欲驗之於心如何如好好色如惡惡臭試驗之吾心好善惡惡果能如此乎閒居為不善見君子則掩其不善而著其善是果有此乎一有不至則勇猛奮躍不已必有長進處今不知為此則書自書我自我何益之有大雅問誠於中形於外是實有惡於中便形見於外然誠者真實無妄安得有惡有惡不幾於妄乎曰此便是惡底真實無妄善便虛了誠只是實而善惡不同實有一分惡便虛了一分善實有二分惡便虛了二分善淳誠於中形於外大學和惡字說此誠只是實字也惡者卻是無了天理本然者但實有其惡而已方凡惡惡之不實為善之不勇外然而中實不然或有所為而為之或始勤而終怠或九分為善尚有一分苟且之心皆不實而自欺之患也所謂誠其意者表裏內外徹底皆如此無纖毫絲髮苟且為人之弊如飢之必欲食渴之必欲飲皆自以求飽足於己而已非為他人而食飲也又如一盆水徹底皆清瑩無一毫砂石之雜如此則其好善也必誠好之惡惡也必誠惡之而無一毫強勉自欺之雜所以說自慊但自滿足而已豈有待於外哉是故君子慎其獨非特顯明之處是如此雖至微至隱人所不知之地亦常慎之小處如此大處亦如此顯明處如此隱微處亦如此表裏內外精粗隱顯無不慎之方謂之誠其意孟子曰人能充無欲害人之心而仁不可勝用也夫無欲害人之心人皆有之閑時皆知惻隱及到臨事有利害時此心便不見了且如一堆金寶有人曰先爭得者與之自家此心便欲爭奪推倒那人定要得了方休又如人皆知穿窬之不可為雖稍有識者亦不肯為及至顛冥於富貴而不知恥或無義而受萬鍾之祿便是到利害時有時而昏所謂誠意者須是隱微顯明小大表裏都一致方得孟子所謂見孺子入井時怵惕惻隱非惡其聲而然非為內交要譽而然然卻心中有內交要譽之心卻向人說我實是惻隱羞惡所謂為惡於隱微之中而詐善於顯明之地是所謂自欺以欺人也然人豈可欺哉人之視己如見其肺肝然則欺人者適所以自欺而已誠於中形於外那箇形色氣貌之見於外者自別決不能欺人祇自欺而已這樣底永無緣做得好人為其無為善之地也外面一副當雖好然裏面卻踏空永不足以為善永不濟事更莫說誠意正心修身至於治國平天下越沒干涉矣僩以下全章之旨問誠意章自欺注今改本恐不如舊注好曰何也曰今注云心之所發陽善陰惡則其好善惡惡皆為自欺而意不誠矣恐讀書者不曉又此句或問中已言之卻不如舊注云人莫不知善之當為然知之不切則其心之所發必有陰在於惡而陽為善以自欺者故欲誠其意者無他亦曰禁止乎此而已矣此言明白而易曉曰不然本經正文只說所謂誠其意者毋自欺也初不曾引致知兼說今若引致知在中間則相牽不了卻非解經之法又況經文誠其意者毋自欺也這說話極細蓋言為善之意稍有不實照管少有不到處便為自欺未便說到心之所發必有陰在於惡而陽為善以自欺處若如此則大故無狀有意於惡非經文之本意也所謂心之所發陽善陰惡乃是見理不實不知不覺地陷於自欺非是陰有心於為惡而詐為善以自欺也如公之言須是鑄私錢假官會方為自欺大故是無狀小人此豈自欺之謂邪又曰所謂毋自欺者正當於幾微毫釐處做工夫只幾微之間少有不實便為自欺豈待如此狼當至於陰在為惡而陽為善而後謂之自欺邪此處語意極細不可草草看此處工夫極細未便說到那粗處所以前後學者多說差了蓋為牽連下文小人閒居為不善一段看了所以差也又問今改注下文云則無待於自欺而意無不誠也據經文方說毋自欺毋者禁止之辭若說無待於自欺恐語意太快未易到此曰既能禁止其心之所發皆有善而無惡實知其理之當然使無待於自欺非勉強禁止而猶有時而發也若好善惡惡之意有一毫之未實則其發於外也必不能掩既是打疊得盡實於為善便無待於自欺矣如人腹痛畢竟是腹中有些冷積須用藥驅除去這冷積則其痛自止不先除去冷積而但欲痛之自止豈有此理僩敬子問所謂誠其意者毋自欺也注云外為善而中實未能免於不善之雜某意欲改作外為善而中實容其不善之雜如何蓋所謂不善之雜非是不知是知得了又容著在這裏此之謂自欺曰不是知得了容著在這裏是不柰他何了不能不自欺公合下認錯了只管說箇容字不是如此容字又是第二節緣不柰他何所以容在這裏此一段文意公不曾識得它源頭在只要硬去捺他所以錯了大概以為有纖毫不善之雜便是自欺自欺只是自欠了分數恰如淡底金不可不謂之金只是欠了分數如為善有八分欲為有兩分不為此便是自欺是自欠了這分數或云如此則自欺卻是自欠曰公且去看又曰自欺非是要如此是不柰它何底荀子曰心臥則夢偷則自行使之則謀某自十六七讀時便曉得此意蓋偷心是不知不覺自走去底不由自家使底倒要自家去捉它使之則謀這卻是好底心由自家使底李云某每常多是去捉他如在此坐心忽散亂又用去捉它曰公又說錯了公心粗都看這說話不出所以說格物致知而後意誠裏面也要知得透徹外面也要知得透徹便自是無那箇物事譬如果子爛熟後皮核自脫落離去不用人去咬得了如公之說這裏面一重不曾透徹在只是認得箇容著硬遏捺將去不知得源頭工夫在所謂誠其意者毋自欺也此是聖人言語之最精處如箇尖銳底物事如公所說只似箇樁頭子都粗了公只是硬要去強捺如水恁地滾出來卻硬要將泥去塞它如何塞得住又引中庸論誠處而曰一則誠雜則偽只是一箇心便是誠才有兩箇心便是自欺好善如好好色惡惡如惡惡臭他徹底只是這一箇心所以謂之自慊若才有些子間雜便是兩箇心便是自欺如自家欲為善後面又有箇人在這裏拗你莫去為善欲惡惡又似有箇人在這裏拗你莫要惡惡此便是自欺因引近思錄如有兩人焉欲為善云云一段正是此意如人說十句話九句實一句脫空那九句實底被這一句脫空底都壞了如十分金徹底好方謂之真金若有三分銀便和那七分底也壞了又曰佛家看此亦甚精被他分析得項數多如云有十二因緣只是一心之發便被他推尋得許多察得來極精微又有所謂流注想他最怕這箇所以溈山禪師云某參禪幾年了至今不曾斷得這流注想此即荀子所謂偷則自行之心也僩次早又曰昨夜思量敬子之言自是但傷雜耳某之言卻即說得那箇自欺之根自欺卻是敬子容字之意容字卻說得是蓋知其為不善之雜而又蓋庇以為之此方是自欺謂如人有一石米卻只有九斗欠了一斗此欠者便是自欺之根自家卻自蓋庇了嚇人說是一石此便是自欺謂如人為善他心下也自知有箇不滿處他卻不說是他有不滿處卻遮蓋了硬說我做得是這便是自欺卻將那虛假之善來蓋覆這真實之惡某之說卻說高了移了這位次了所以人難曉大率人難曉處不是道理有錯處時便是語言有病不是語言有病時便是移了這步位了今若只恁地說時便與那小人閒居為不善處都說得貼了僩次日又曰夜來說得也未盡夜來歸去又思看來如好好色如惡惡臭一段便是連那毋自欺也說言人之毋自欺時便要如好好色如惡惡臭樣方得若好善不如好好色惡惡不如惡惡臭此便是自欺毋自欺者謂如為善若有些子不善而自欺時便當斬根去之真箇是如惡惡臭始得如小人閒居為不善底一段便是自欺底只是反說閒居為不善便是惡惡不如惡惡臭見君子而後厭然揜其不善而著其善便是好善不如好好色若只如此看此一篇文義都貼實平易坦然無許多屈曲某舊說忒說闊了高了深了然又自有一樣人如舊說者欲節去之又可惜但終非本文之意耳僩看誠意章有三節兩必慎其獨一必誠其意十目所視十手所指言小人閒居為不善其不善形於外者不可揜如此德潤身心廣體胖言君子慎獨之至其善之形於外者證驗如此銖問十目所視十手所指曰此承上文人之視己如見其肺肝底意不可道是人不知人曉然共見如此淳十目所視以下魏元壽問十目所視止心廣體胖處曰十目所視十手所指不是怕人見蓋人雖不知而我已自知自是甚可皇恐了其與十目十手所視所指何以異哉富潤屋以下卻是說意誠之驗如此時舉心廣體胖心本是闊大底物事只是因愧怍了便卑狹便被他隔礙了只見得一邊所以體不能常舒泰僩伊川問尹氏讀大學如何對曰只看得心廣體胖一句甚好又問如何尹氏但長吟心廣體胖一句尹氏必不會嚇人須是它自見得今人讀書都不識這樣意思問尹和靖云心廣體胖只是樂伊川云這裏著樂字不得如何曰是不勝其樂德明問心廣體胖曰無愧怍是無物欲之蔽所以能廣大指前面燈云且如此燈後面被一片物遮了便不見一半了更從此一邊用物遮了便全不見此屋了如何得廣大夔孫問誠意章結注云此大學一篇之樞要曰此自知至處便到誠意兩頭截定箇界分在這裏此便是箇君子小人分路頭處從這裏去便是君子從那裏去便是小人這處立得腳方是在天理上行後面節目未是處卻旋旋理會宇居甫問誠意章結句云此大學之樞要樞要說誠意是說致知曰上面關著致知格物下面關著四五項上須是致知能致其知知之既至方可以誠得意到得意誠便是過得箇大關方始照管得箇身心若意不誠便自欺便是小人過得這箇關便是君子又云意誠便全然在天理上行意未誠以前尚汨在人欲裏賀孫因說誠意章曰若如舊說是使初學者無所用其力也中庸所謂明辨誠意章而今方始辨得分明夔孫讀誠意一章炎謂過此一關終是省事曰前面事更多自齊家以下至治國則其事已多自治國至平天下則其事愈多只是源頭要從這裏做去又曰看下章須通上章看可見炎傳七章釋正心修身或問正心章說忿懥等語恐通不得誠意章曰這道理是一落索才說這一章便通上章與下章如說正心誠意便須通格物致知說大學於格物誠意章都是鍊成了到得正心修身處都易了夔孫問先生近改正心一章方包括得盡舊來說作意或未誠則有是四者之累卻只說從誠意去曰這事連而卻斷斷而復連意有善惡之殊意或不誠則可以為惡心有得失之異心有不正則為物所動卻未必為惡然未有不能格物致知而能誠意者亦未有不能誠意而能正心者人傑或問正心誠意章先生令他說曰意誠則心正曰不然這幾句連了又斷斷了又連雖若不相粘綴中間又自相貫譬如一竿竹雖只是一竿然其間又自有許多節意未誠則全體是私意更理會甚正心然意雖誠了又不可不正其心意之誠不誠直是有公私之辨君子小人之分意若不誠則雖外面為善其意實不然如何更問他心之正不正意既誠了而其心或有所偏倚則不得其正故方可做那正心底工夫廣亞夫問致知誠意曰心是大底意是小的心要恁地做卻被意從後面牽將去且如心愛做箇好事又被一箇意道不須恁地做也得且如心要孝又有不孝底意思牽了所謂誠意者譬如飢時便喫飯飽時便休自是實要如此到飽後又被人請去也且胡亂與他喫些子便是不誠須是誠則自然表裏如一非是為人而做求以自快乎己耳如飢之必食渴之必飲無一毫不實之意這箇知至意誠是萬善之根有大底地盤方立得腳住若無這箇都靠不得心無好樂又有箇不無好樂底在後心無忿懥又有箇不無忿懥底在後知至後自然無恪敬之問誠意正心誠意是去除得裏面許多私意正心是去除得外面許多私意誠意是檢察於隱微之際正心是體驗於事物之間曰到得正心時節已是煞好了只是就好裏面又有許多偏要緊最是誠意時節正是分別善惡最要著力所以重複說道必慎其獨若打得這關過已是煞好了到正心又怕於好上要偏去如水相似那時節已是淘去了濁十分清了又怕於清裏面有波浪動蕩處賀孫問意既誠而有憂患之類何也曰誠意是無惡憂患忿懥之類卻不是惡但有之則是有所動節意既誠矣後面忿懥恐懼好樂憂患親愛賤惡只是安頓不著在便是苟志於仁矣無惡也泳問心體本正發而為意之私然後有不正今欲正心且須誠意否未能誠意且須操存否曰豈容有意未誠之先且放他喜怒憂懼不得其正不要管它直要意誠後心卻自正如此則意終不誠矣所以伊川說未能誠意且用執持大雅誠意是真實好善惡惡無夾雜又曰意不誠是私意上錯了心不正是公道上錯了又曰好樂之類是合有底只是不可留滯而不消化無留滯則此心便虛節問忿懥恐懼憂患好樂皆不可有否曰四者豈得皆無但要得其正耳如中庸所謂喜怒哀樂發而中節者也去偽心有喜怒憂樂則不得其正非謂全欲無此此乃情之所不能無但發而中節則是發不中節則有偏而不得其正矣端蒙好樂憂懼四者人之所不能無也但要所好所樂皆中理合當喜不得不喜合當怒不得不怒節四者人所不能無也但不可為所動若順應將去何不得其正之有如顏子不遷怒可怒在物顏子未嘗為血氣所動而移於人也則豈怒而心有不正哉端蒙正心卻不是將此心去正那心但存得此心在這裏所謂忿懥恐懼好樂憂患自來不得賀孫問忿懥恐懼好樂憂患皆以有所為言則是此心之正不存而是四者得以為主於內曰四者人不能無只是不要它留而不去如所謂有所則是被他為主於內心反為它動也道夫大學七章看有所二字有所憂患憂患是合當有若因此一事而常留在胸中便是有有所忿懥因人之有罪而撻之才撻了其心便平是不有若此心常常不平便是有恐懼好樂亦然泳心有所忿懥則不得其正忿懥已自粗了有事當怒如何不怒只是事過便當豁然便得其正若只管忿怒滯留在這裏如何得心正心有所好樂則不得其正如一箇好物色到面前真箇是好也須道是好或留在這裏若將去了或是不當得他底或偶然不得他底便休不可只管念念著他賀孫問伊川云忿懥恐懼好樂憂患人所不能無者但不以動其心既謂之忿懥憂患如何不牽動他心曰事有當怒當憂者但過了則休不可常留在心顏子未嘗不怒但不遷耳因舉樓中果怒在此不可遷之於彼德明心不可有一物喜怒哀樂固欲得其正然過後須平了且如人有喜心若以此應物便是不得其正人傑看心有所喜怒說曰喜怒哀樂固欲中節然事過後便須平了謂如事之可喜者固須與之喜然別遇一事又將此意待之便不得其正蓋心無物然後能應物如一量稱稱物固自得其平若先自添著些物在上而以之稱物則輕重悉差矣心不可有一物亦猶是也四者心之所有但不可使之有所私爾才有所私便不能化梗在胸中且如忿懥恐懼有當然者若定要他無直是至死方得但不可先有此心耳今人多是才忿懥雖有可喜之事亦所不喜才喜雖有當怒之事亦不復怒便是蹉過事理了便視而不見聽而不聞食而不知其味了蓋這物事才私便不去只管在胸中推盪終不消釋設使此心如太虛然則應接萬務各止其所而我無所與則便視而見聽而聞食而真知其味矣看此一段只是要人不可先有此心耳譬如衡之為器本所以平物也今若先有一物在上則又如何稱頃之復曰要之這源頭卻在那致知上知至而意誠則如好好色如惡惡臭好者端的是好惡者端的是惡某常云此處是學者一箇關過得此關方始是實又曰某常謂此一節甚異若知不至則方說惡不可作又有一箇心以為為之亦無害以為善不可不為又有一箇心以為不為亦無緊要譬如草木從下面生出一箇芽子這便是不能純一這便是知不至之所為或問公私之別曰今小譬之譬如一事若係公眾便心下不大段管若係私己便只管橫在胸中念念不忘只此便是公私之辨道夫忿懥好樂恐懼憂患這四者皆人之所有不能無然有不得其正者只是應物之時不可夾帶私心如有一項事可喜自家正喜驀見一可怒底事來是當怒底事卻以這喜心處之和那怒底事也喜了便是不得其正可怒事亦然惟誠其意真箇如鑑之空如衡之平妍媸高下隨物定形而我無與焉這便是正心因說前在漳州見屬官議一事數日不決卻是有所挾後忽然看破了道這箇事不可如此一向判一二百字盡皆得這意思此是因事上見這心親切賀孫錄別出先之問心有所好樂則不得其正曰心在這一事不可又夾帶那一事若自家喜這一項事了更有一事來便須放了前一項只平心就後一項理會不可又夾帶前喜之之心在這裏有件喜事不可因怒心來忘了所當喜處有件怒事不可因喜事來便忘了怒且如人合當行大門出卻又有些回避底心夾帶在裏面卻要行便門出雖然行向大門出念念只有箇行便門底心在這裏少刻或自拗向便門去學者到這裏須是便打殺那要向便門底心心如何不會端正這般所在多是因事見得分明前在漳州有一公事合恁地直截斷緣中間情有牽制被他撓數日忽然思量透便斷了集同官看覺當時此心甚正要知此正是正心處賀孫敬之問正心章云人之心要當不容一物曰這說便是難才說不容一物卻又似一向全無相似只是這許多好樂恐懼忿懥憂患只要從無處發出不可先有在心下看來非獨是這幾項如此凡是先安排要恁地便不得如人立心要恁地嚴毅把捉少間只管見這意思到不消恁地處也恁地便拘逼了有人立心要恁地慈祥寬厚少間只管見這意思到不消恁地處也恁地便流入於姑息苟且如有心於好名遇著近名底事便愈好之如有心於為利遇著近利底事便貪欲賀孫人心如一箇鏡先未有一箇影象有事物來方始照見妍醜若先有一箇影象在裏如何照得人心本是湛然虛明事物之來隨感而應自然見得高下輕重事過便當依前恁地虛方得若事未來先有一箇忿懥好樂恐懼憂患之心在這裏及忿懥好樂恐懼憂患之事到來又以這心相與滾合便失其正事了又只苦留在這裏如何得正賀孫葉兄又問忿懥章曰這心之正卻如稱一般未有物時稱無不平才把一物在上面便不平了如鏡中先有一人在裏面了別一箇來便照不得這心未有物之時先有箇主張說道我要如何處事才遇著事便以是心處之便是不正且如今人說我做官要抑強扶弱及遇著當強底事也去抑他這便也是不正卓喜怒憂懼都是人合有底只是喜所當喜怒所當怒便得其正若欲無這喜怒憂懼而後可以為道則無是理小人便只是隨這喜怒憂懼去所以不好了義剛問忿懥章曰只是上下有不恰好處便是偏可學問忿懥曰是怒之甚者又問忿懥比恐懼憂患好樂三者覺得忿懥又類過於怒者曰其實也一般古人既如此說也不須如此去尋討履孫問喜怒憂懼人心所不能無如忿懥乃戾氣豈可有也曰忿又重於怒心然此處須看文勢大意但此心先有忿懥時這下面便不得其正如鏡有人形在裏面第二人來便照不得如稱子釘盤星上加一錢則稱一錢物便成兩錢重了心若先有怒時更有當怒底事來便成兩分怒了有當喜底事來又減卻半分喜了先有好樂也如此先有憂患也如此若把忿懥做可疑則下面憂患好樂等皆可疑問八章謂五者有當然之則如敖惰之心則豈可有也曰此處亦當看文勢大意敖惰只是一般人所為得人厭棄不起人敬畏之心若把敖惰做不當有則親愛敬畏等也不當有淳寓錄略劉圻父說正心章謂不能存之則四者之來反動其心曰是當初說時添了此一節若據經文但是說四者之來便撞翻了這坐子耳又曰只爭箇動不動又曰若當初有此一節時傳文須便說在那裏了他今只恁地說便是無此意卻是某於解處說絮著這些子義剛今不是就靜中動將去卻是就第二重動上動將去如忿懥好樂之類德明敬之問心有所好樂則不得其正章云心不可有一毫偏倚才有一毫偏倚便是私意便浸淫不已私意反大似身己所以視而不見聽而不聞食而不知其味曰這下是說心不正不可以修身與下章身不修不可以齊家意同故云莫知其子之惡莫知其苗之碩視聽是就身上說心不可有一物外面酬酢萬變都只是隨其分限應去都不關自家心事才係於物心便為其所動其所以係於物者有三或是事未來而自家先有這箇期待底心或事已應去了又卻長留在胸中不能忘或正應事之時意有偏重便只見那邊重這都是為物所係縛既為物所係縛便是有這箇物事到別事來到面前應之便差了這如何會得其正聖人之心瑩然虛明無纖毫形跡一看事物之來若小若大四方八面莫不隨物隨應此心元不曾有這箇物事且如敬以事君之時此心極其敬當時更有親在面前也須敬其親終不成說敬君但只敬君親便不須管得事事都如此聖人心體廣大虛明物物無遺賀孫正叔見先生言明心定心等說因言心不在焉則視而不見聽而不聞食而不知其味曰這箇三歲孩兒也道得八十翁翁行不得伯羽黃丈云舊嘗問視而不見聽而不聞只是說知覺之心卻不及義理之心先生曰才知覺義理便在此才昏便不見了方子學蒙錄別出直卿云舊嘗問視之不見聽之不聞處此是收拾知覺底心收拾義理底心先生曰知覺在義理便在只是有深淺學蒙夜來說心有喜怒不得其正如某夜間看文字要思量改甚處到上床時擦腳心都忘了數天明擦時便記得蓋是早間未有一事上心所以記得孟子說平旦之氣其好惡與人相近者幾希幾希不遠也言人都具得此但平日不曾養得猶於夜間歇得許多時不接於事天明方惺便恁地虛明光靜然亦只是些子發出來少間又被物欲梏亡了孟子說得話極齊整當對如這處他一向說後去被後人來就幾希字下注開了便覺意不連賀孫問誠意正心二段只是存養否曰然宇說心不得其正章曰心全德也欠了些箇德便不全故不得其正又曰心包體用而言又問意與情如何曰欲為這事是意能為這事是情子蒙傳八章釋修身齊家忿懥恐懼好樂憂患皆不能無而親愛畏敬哀矜敖惰賤惡亦有所不可無者但此心不為四者所動乃得其正而五者皆無所偏斯足以為身之修也人傑或問正心章說忿懥恐懼好樂憂患修身章說親愛賤惡畏敬哀矜敖惰如何曰是心卓然立乎此數者之外則平正而不偏辟自外來者必不能以動其中自內出者必不至於溺於彼或問畏敬如何曰如家人有嚴君焉吾之所當畏敬者也然當不義則爭之若過於畏敬而從其令則陷於偏矣若夫賤惡者固當賤惡然或有長處亦當知之下文所謂好而知其惡惡而知其美者天下鮮矣此是指點人偏處最切當人傑心須卓立在八九者之外謂忿懥之類而勿陷於八九者之中方得其正聖人之心周流應變而不窮只為在內而外物入不得及其出而應接又不陷於彼夔孫問七章八章頗似一意如何曰忿懥之類心上理會親愛之類事上理會心上理會者是見於念慮之偏事上理會者是見於事為之失去偽正卿問大學傳正心修身莫有深淺否曰正心是就心上說修身是就應事接物上說那事不從心上做出來如修身如絜矩都是心做得出但正心是萌芽上理會若修身及絜矩等事卻是各就地頭上理會恪問正心章既說忿懥四者修身章又說之其所親愛之類如何曰忿懥等是心與物接時事親愛等是身與物接時事廣正心修身今看此段大概差錯處皆未在人欲上這箇皆是人合有底事皆恁地差錯了況加之以放辟邪侈分明是官街上錯了路賀孫子升問修身齊家章所謂親愛畏敬以下說凡接人皆如此不特是一家之人否曰固是問如何修身卻專指待人而言曰修身以後大概說向接物待人去又與只說心處不同要之根本之理則一但一節說闊一節去木之第八章人謂眾人之猶於也之其亦如於其人即其所向處泳之其所親愛之之猶往也銖問大學譬音改僻如何曰只緣人心有此偏僻問似此恐於修身在正其心處相類否曰略相似宇問古注辟作譬似窒礙不通曰公亦疑及此某正以他說之其所敖惰而譬焉敖惰非美事如何譬得故今只作僻字說便通況此篇自有僻字如辟則為天下僇矣之類是也大雅親愛賤惡畏敬哀矜敖惰各自有當然之則只不可偏如人飢而食只合當食食纔過些子便是偏渴而飲飲才過些子便是偏如愛其人之善若愛之過則不知其惡便是因其所重而陷於所偏惡惡亦然下面說人莫知其子之惡莫知其苗之碩上面許多偏病不除必至於此泳人之其所親愛而僻焉如父子是當主於愛然父有不義子不可以不爭如為人父雖是止於慈若一向僻將去則子有不肖亦不知責而教焉不可人之其所賤惡而僻焉人固自有一種可厭者然猶未至於可賤惡處或尚可教若一向僻將去便賤惡他也不得人之其所畏敬而僻焉如事君固是畏敬然說大人則藐之又不甚畏敬孟子此語雖稍粗然古人正救其惡與陳善閉邪責難於君也只管畏敬不得賀孫問齊家段辟作僻曰人情自有偏處所親愛莫如父母至於父母有當幾諫處豈可以親愛而忘正救所敬畏莫如君父至於當直言正諫豈可專持敬畏而不敢言所敖惰處如見那人非其心之所喜自懶與之言即是忽之之意問敖惰惡德也豈君子宜有曰讀書不可泥且當看其大意縱此語未穩亦一兩字失耳讀書專留意小處失其本領所在最不可宇問章句曰人於五者本有當然之則然敖之與惰則氣習之所為實為惡德至若哀矜之形正良心苗裔偏於哀矜不失為仁德之厚又何以為身不修而不可以齊其家者乎曰敖惰謂如孔子之不見孺悲孟子不與王驩言哀矜謂如有一般大姦大惡方欲治之被它哀鳴懇告卻便恕之道夫云這只是言流為姑息之意曰這便是哀矜之不得其正處道夫或問之其所敖惰而辟焉曰親者則親愛之賢者則畏敬之不率者則賤惡之無告者則哀矜之有一般人非賢非親未見其為不率又不至於無告則是泛然沒緊要底人見之豈不敖惰雖聖賢亦有此心然亦豈可一向敖惰他一向敖惰便是辟了畏敬親愛賤惡哀矜莫不皆然故下文曰愛而知其惡惡而知其美如所敖惰之人又安知其無善之可愛敬所謂敖惰者只是闊略過去高問敖惰曰大抵是一種沒要緊底半上落下底人且如路中撞見如此等人是不足親愛畏敬者不成強與之相揖而致其親愛畏敬敖惰是人之所不能無者又問敖惰二字恐非好事曰此如明鑑之懸妍者自妍醜者自醜隨所來而應之不成醜者至前須要換作妍者又敖惰是輕賤惡是重既得賤惡如何卻不得敖惰然聖人猶戒其僻則又須點檢不可有過當處履孫蔡問敖惰之說曰有一般人上未至於可親愛下未至於可賤惡只是所為也無甚好處令人懶去接他是謂敖惰此敖惰不是惡德淳文蔚錄云非如常人傲忽惰慢只是使人見得他懶些或問敖惰是凶德而曰有當然之則何也曰古人用字不如此敖惰未至可賤可惡但見那一等沒緊要底人自是恁地然一向去敖惰他也不可如此問君子亦有敖惰於人者乎曰人自有苟賤可厭棄者德明問敖惰曰敖便是惰敖了便惰敖了都不管它便是惰義剛因學者問大學敖惰處而曰某嘗說如有人問易不當為卜筮書詩不當去小序不當協韻及大學敖惰處皆在所不答僩或問之其所親愛哀矜畏敬而辟焉莫是君子用心過於厚否曰此可將來觀過知仁處說不可將來此說蓋不必論近厚近薄大抵一切事只是才過便不得觀過知仁乃是因此見其用心之厚故可知其仁然過則終亦未是也大凡讀書須要先識認本文是說箇甚麼須全做不曾識他相似虛心認他字字分明復看數過自然會熟見得分明譬如與人乍相見其初只識其面目再見則可以知其姓氏鄉貫又再見則可以知其性行如何只恁地識認久後便一見理會得今學者讀書亦且未要便懸空去思他中庸云博學之審問之方言慎思之若未學未問便去思他是空勞心耳又云切須記得識認兩字時舉問大學釋修身齊家章不言修身何也曰好而不知其惡惡而不知其美是以好為惡以曲為直可謂之修身乎節大學最是兩章相接處好看如所謂修身在正其心者且如心不得其正則視而不見聽而不聞食而不知其味若視而見聽而聞食而知味則心得其正矣然於親愛敖惰五者有所僻焉則身亦不可得而修矣嘗謂修身更多少事不說卻說此五者何謂子細看來身之所以不修者無不是被這四五箇壞又云意有不誠時則私意為主是主人自為賊了到引惹得外底人來四方八面無關防處所以要得先誠其意子蒙欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物五者其實則相串而以做工夫言之則各自為一事故物格而後知至知至而後意誠意誠而後心正心正而後身修著而字則是先為此而後能為彼也蓋逐一節自有一節功夫非是儱侗言知至了意便自誠意誠了心便自正身便自修中間更不著功夫然但只是上面一截功夫到了則下面功夫亦不費力耳先生曰亦有天資高底人只頭正了便都正去若夾雜多底也不能如此端蒙問正心修身章後注云此亦當通上章推之蓋意或不誠則無能實用其力以正其心者云云曰大學所以有許多節次正欲學者逐節用工非如一無節之竹使人才能格物則便到平天下也夫人蓋有意誠而心未正者蓋於忿懥恐懼等事誠不可不隨事而排遣也蓋有心正而身未修者故於好惡之間誠不可不隨人而節制也至於齊家以下皆是教人節節省察用功故經序但言心正者必自誠意而來修身者必自正心而來非謂意既誠而心無事乎正心既正而身無事乎修也且以大學之首章便教人明明德又為格物以下事目皆為明明德之事也而平天下方且言先謹乎德等事亦可見矣壯祖大學如正心章已說盡了至修身章又從頭說起至齊家治國章又依前說教他何也蓋要節節去照管不成卻說自家在這裏心正身修了便都只聽其自治夔孫說大學誠意章曰如今人雖欲為善又被一箇不欲為善之意來妨了雖欲去惡又被一箇尚欲為惡之意來妨了蓋其知之不切故為善不是他心肯意肯去惡亦不是他心肯意肯這箇便是自欺便是不誠意才不誠則心下便有許多忿懥恐懼憂患好樂而心便不正心既不正則凡有愛惡等事莫不倚於一偏如此如何要家齊國治天下平惟是知得切則好善必如好好色惡惡必如惡惡臭是非為人而然蓋胸中實欲如此而後心滿意愜賀孫傳九章釋家齊國治或問齊家一段是推將去時較切近否曰此是言一家事然而自此推將去天下國家皆只如此又問所畏敬在家中則如何曰一家之中尊者可畏敬但是有不當處亦合有幾諫時不可道畏敬之便不可說著若如此惟知畏敬卻是辟也祖道或問不出家而成教於國曰孝以事親而使一家之人皆孝弟以事長而使一家之人皆弟慈以使眾而使一家之人皆慈是乃成教於國者也人傑李德之問不出家而成教於國不待推也曰不必言不待推玩其文義亦未嘗有此意只是身修於家雖未嘗出而教自成於國爾蓋卿孝者所以事君弟者所以事長慈者所以使眾此道理皆是我家裏做成了天下人看著自能如此不是我推之於國泳劉潛夫問家齊章並言孝弟慈三者而下言康誥以釋使眾一句不及孝弟何也曰孝弟二者雖人所固有然守而不失者亦鮮唯有保赤子一事罕有失之者故聖賢於此特發明夫人之所易曉者以示訓正與孟子言見赤子入井之意同壯祖心誠求之者求赤子之所欲也於民亦當求其有不能自達此是推其慈幼之心以使眾也節問治國在齊其家曰且只說動化為功未說到推上後章方全是說推如保赤子一節只是說慈者所以使眾一句保赤子慈於家也如保赤子慈於國也保赤子是慈如保赤子是使眾直卿云這箇慈是人人自然有底慈於家便能慈於國故言一家仁一國興仁一家讓一國興讓宇一家仁以上是推其家以治國一家仁以下是人自化之也節問九章本言治國何以曰堯舜率天下以仁而民從之都是說治天下之事也至言君子有諸己而後求諸人無諸己而後非諸人又似說修身如何曰聖人之言簡暢周盡修身是齊家之本齊家是治國之本如言一家仁一國興仁一家讓一國興讓之類自是相關豈可截然不相入也謨去偽同問有諸己而後求諸人曰只從頭讀來便見得分曉這箇只是躬自厚而薄責於人攻其惡無攻人之惡卓問有諸己而後求諸人雖曰推己以及人是亦示人以反己之道曰這是言己之為法於人處道夫吳仁甫問有諸己而後求諸人無諸己而後非諸人曰此是退一步說猶言溫故知新而可以為人師以明未能如此則不可如此非謂溫故知新便要求為人師也池本不可下云為人師耳若曰有諸己而後求諸人以明無諸己不可求諸人也無諸己而後非諸人以明有諸己即不可非諸人也然此意正為治國者言大凡治國禁人為惡而欲人為善便求諸人非諸人然須是在己有善無惡方可求人非人也或問范忠宣以恕己之心恕人此語固有病但上文先言以責人之心責己則連下句亦未害曰上句自好下句自不好蓋才說恕己便已不是若橫渠云以愛己之心愛人則盡仁以責人之心責己則盡道語便不同蓋恕己與愛己字不同大凡知道者出言自別近觀聖賢言語與後世人言語自不同此學者所以貴於知道也銖有諸己而後求諸人無諸己而後非諸人是責人之恕絜矩與己所不欲勿施於人是愛人之恕又曰推己及物之謂恕聖人則不待推而發用於外者皆恕也己所不欲勿施於人則就愛人上說聖人之恕則不專在愛人上見如絜矩之類是也高問所藏乎身不恕處恕字還只就接物上說如何曰是就接物上見得忠只是實心直是真實不偽到應接事物也只是推這箇心去直是忠方能恕若不忠便無本領了更把甚麼去及物程子說維天之命於穆不已忠也便是實理流行乾道變化各正性命恕也便是實理及物守約問恁地說又與夫子之道忠恕而已矣之忠恕相似曰只是一箇忠恕豈有二分聖人與常人忠恕也不甚相遠又曰盡己不是說盡吾身之實理自盡便是實理此處切恐有脫誤若有些子未盡處便是不實如欲為孝雖有七分孝只中間有三分未盡固是不實雖有九分孝一作弟只略略有一分未盡亦是不實賀孫李德之問齊家治國平天下三章看來似皆是恕之功用曰如治國平天下兩章是此意治國章乃責人之恕平天下章乃愛人之恕齊家一章但說人之偏處蓋卿仁甫問治國在齊其家曰這箇道理卻急迫不得待到他日數足處自然通透這箇物事只是看得熟自然有條理上面說不出家而成教於國此下便說其所以教者如此這三者便是教之目後面卻是說須是躬行方會化得人此一段只此兩截如此賀孫因講禮讓為國曰一家仁一國興仁一家讓一國興讓自家禮讓有以感之故民亦如此興起自家好爭利卻責民間禮讓如何得他應東坡策制敦教化中一段說得也好雖說得粗道理卻是如此敦教化云欲民之知信莫若務實其言欲民之知義莫若務去其貪云云看道理不要玄妙只就粗處說得出便是如今官司不會制民之產民自去買田又取他牙稅錢古者群飲者殺今置官誘民飲酒惟恐其不來如何得民興於善淳問齊家治國之道斷然是父子兄弟足法而後人法之然堯舜不能化其子而周公則上見疑於君下不能和其兄弟是如何曰聖人是論其常堯舜是處其變看他烝烝乂不格姦至於瞽瞍底豫便是他有以處那變處且如他當時被那兒子恁地他處得好不將天下與兒子卻傳與賢便是他處得那兒子好若堯當時把天下與丹朱舜把天下與商均則天下如何解安他那兒子如何解寧貼如周公被管蔡恁地他若不去致辟于商則周如何不擾亂他後來盡死做這一著時也是不得已著恁地但是而今且去理會常倫而今如何便解有箇父如瞽瞍有箇兄弟如管蔡未論到那變處賀孫傳十章釋治國平天下或問大學既格物致知了又卻逐件各有許多工夫在曰物格知至後其理雖明到得後來齊家治國平天下逐件事又自有許多節次須逐件又徐徐做將去如人行路行到一處了又行一處先來固是知其所往了到各處又自各有許多行步若到一處而止不進則不可未到一處而欲踰越頓進一處亦不可璘味道問平天下在治其國曰此節見得上行而下效又見得上下雖殊而心則一道夫問平天下在治其國章曰此三句見上行下效理之必然又以見人心之所同是以君子有絜矩之道所以以己之心度人之心使皆得以自盡其興起之善心若不絜矩則雖躬行於上使彼有是興起之善心而不可得遂亦徒然也又曰因何恁地上行下效蓋人心之同然所以絜矩之道我要恁地也使彼有是心者亦得恁地全章大意只反覆說絜矩如專利於上急征橫斂民不得以自養我這裏雖能興起其善心濟甚事若此類皆是不能絜矩賀孫才卿問上老老而民興孝恐便是連那老眾人之老說曰不然此老老長長恤孤方是就自家身上切近處說所謂家齊也民興孝興弟不倍此方是就民之感發興起處說治國而國治之事也緣為上行下效捷於影響可以見人心之所同者如此是以君子必有絜矩之道也此一句方是引起絜矩事下面方解說絜矩而結之云此之謂絜矩之道蓋人心感發之同如此所以君子須用推絜矩之心以平天下此幾多分曉若如才卿說則此便是絜矩何用下面更絮說許多才卿不合誤曉老老長長為絜矩所以差也所謂文王之民無凍餒之老者此皆是絜矩已後事如何將做老老說得僩老老興孝長長興弟恤孤不倍這三句是說上行下效底道理是以君子有絜矩之道這卻是說到政事上是以二字是結上文猶言君子為是之故所以有絜矩之道既恁地了卻須處置教他得所使之各有以遂其興起之心始得所謂絜矩者矩者心也我心之所欲即他人之所欲也我欲孝弟而慈必欲他人皆如我之孝弟而慈不使一夫之不獲者無一夫不得此理也只我能如此而他人不能如此則是不平矣人傑問絜矩之道語脈貫穿如何久思未通上面說人心之所同者既如此是以君子見人之心與己之心同故必以己度人之心使皆得其平下面方說所以絜矩如此賀孫問上老老而民興孝下面接是以君子有絜矩之道也似不相續如何曰這箇便是相續絜矩是四面均平底道理教他各得老其老各得長其長各得幼其幼不成自家老其老教他不得老其老長其長教他不得長其長幼其幼教他不得幼其幼便不得宇仁甫問絜矩曰上之人老老長長恤孤則下之人興孝興弟不倍此是說上行下效到絜矩處是就政事上言若但興起其善心而不有以使之得遂其心則雖能興起終亦徒然如政煩賦重不得以養其父母又安得以遂其善心須是推己之心以及於彼使之仰足以事父母俯足以育妻子方得如詩裏說大夫行役無期度不得以養其父母到得使下也須教他內外無怨始得如東山出車杕杜諸詩說行役多是序其室家之情亦欲使凡在上者有所感動又曰這處正如齊宣王愛牛處一般見牛之觳觫則不忍之心已形於此若其以釁鍾為不可廢而復殺之則自家不忍之心又只是空所以以羊易之則已形之良心不至於窒塞而未見之羊殺之亦無害是乃仁術也術是做得巧處謂之術又曰己欲立而立人己欲達而達人是兩摺說只以己對人而言若絜矩上之人所以待己己又所以待人是三摺說如中庸所求乎子以事父未能也所求乎臣以事君未能也一類意又曰晁錯言人情莫不欲壽三王能生之而不傷云云漢詔云云孝心闕焉皆此意賀孫問絜矩一條此是上下四方度量而知民之好惡否曰知在前面這處是推老老而民興孝長長而民興弟恤孤而民不倍這處便已知民之好惡與己之好惡相似是以君子有絜矩之道便推將去緊要在毋以字上又曰興謂興起其善心遂謂成遂其事又曰為國絜矩之大者又在於財用所以後面只管說財如今茶鹽之禁乃是人生日用之常卻反禁之這箇都是不能絜矩賀孫上老老而民興孝是化絜矩處是處置功用處振問絜矩之道曰能使人興起者聖人之心也能遂其人之興起者聖人之政事也廣平天下謂均平也所惡於上毋以使下所惡於下毋以事上此與中庸所謂所求乎臣以事君未能者同意但中庸是言其所好者此言其所惡者也問前後左右何指曰譬如交代官相似前官之待我者既不善吾毋以前官所以待我者待後官也左右如東鄰西鄰以鄰國為壑是所惡於左而以交於右也俗語所謂將心比心如此則各得其平矣問章句中所謂絜矩之道是使之各得盡其心而無不平也如何曰此是推本上老老而民興孝上長長而民興弟上恤孤而民不倍須是留他地位使人各得自盡其孝弟不倍之心如八十者其家不從政廢疾非人不養者一子不從政是使其各得自盡也又如生聚蕃息無令父子兄弟離散之類德明所惡於上所惡於下所惡於前所惡於後所惡於右所惡於左此數句皆是就人身切近處說如上文老老長長恤孤之意至於毋以使下毋以事上毋以先後毋以從前毋以交於左毋以交於右方是推以及物之事僩問絜矩曰只把上下前後左右等句看便見絜度也不是真把那矩去量度只是自家心裏暗度那箇長那箇短所謂度長絜大上下前後左右都只一樣心無彼己之異只是將那頭折轉來比這頭在我之上者使我如此而我惡之則知在我下者心亦似我如此故更不將所責上底人之心來待下人如此則自家在中央上面也占許多地步下面也占許多地步便均平正方若將所責上底人之心來待下便上面長下面短不方了下之事我如此而我惡之則知在我之上者心亦似我如此若將所責下底人之心更去事上便又下面長上面短了左右前後皆然待前底心便折轉來待後待左底心便折轉來待右如此便方每事皆如此則無所不平矣宇所謂絜矩者如以諸侯言之上有天子下有大夫天子擾我使我不得行其孝弟我亦當察此不可有以擾其大夫使大夫不得行其孝弟且如自家有一丈地左家有一丈地右家有一丈地左家侵著我五尺地是不矩我必去訟他取我五尺我若侵著右家五尺地亦是不矩合當還右家只是我也方上也方下也方左也方右也方前也方後也方不相侵越如伐冰之家不畜牛羊亞夫云務使上下四方一齊方不侵過他人地步曰然節或問絜矩曰譬之如左邊有一人侵我地界是他不是了我又不可去學他侵了右邊人底界前人行擁住我我行不得我又不可學他擁了後人後人趕逐我不了又不可學他去趕前人上下亦然椿云此一人卻是中立也曰是椿絜矩如自家好安樂便思他人亦欲安樂當使無老稚轉乎溝壑壯者散而之四方之患制其田里教之樹畜皆自此以推之閎祖問論上下四旁長短廣狹彼此如一而無不方在矩則可以如此在人則有天子諸侯大夫士庶人之分何以使之均平曰非是言上下之分欲使之均平蓋事親事長當使之均平上下皆得行上之人得事其親下之人也得以事其親上之人得長其長下之人也得以事其長節問絜矩六節如所惡於上無以使下及左右前後常指三處上是一人下是一人我居其中故解云如不欲上之無禮於我則我亦不以無禮使其下其下五節意皆類此先生曰見曾子之傳發明恕子上下四旁無不該也過恕亦是絜矩之意振陶安國問絜矩之道是廣其仁之用否曰此乃求仁工夫此處正要著力若仁者則是舉而措之不待絜矩而自無不平者矣銖曰仁者則己欲立而立人己欲達而達人不待推矣若絜矩正恕者之事也先生頷之銖德元問我不欲人加諸我吾亦欲無加諸人與絜矩同否曰然但子貢所問是對彼我說只是兩人絜矩則是三人爾後世不復知絜矩之義惟務竭民財以自豐利自一孔以上官皆取之故上愈富而下愈貧夫以四海而奉一人不為不厚矣使在上者常有厚民之心而推與共之猶慮有不獲者況皆不恤而惟自豐殖則民安得不困極乎易損上益下曰益損下益上曰損所以然者蓋邦本厚則邦寧而君安乃所以益也否則反是僩李丈問盡得絜矩是仁之道恕之道曰未可說到那裏且理會絜矩是如何問此是我不欲人之加諸我吾亦欲無加諸人意否曰此是兩人須把三人看便見人莫不有在我之上者莫不有在我之下者如親在我之上子孫在我之下我欲子孫孝於我而我卻不能孝於親我欲親慈於我而我卻不能慈於子孫便是一畔長一畔短不是絜矩宇絜矩非是外面別有箇道理只是前面正心修身推而措之又不是他機巧變詐權謀之說賀孫絜矩之說不在前數章卻在治國平天下之後到這裏也是節次成了方用得道夫君子先慎乎德一條德便是明德之德自家若意誠心正身修家齊了則天下之人安得不歸於我如湯武之東征西怨則自然有人有土賀孫或問爭鬥其民而施以劫奪之教曰民本不是要如此惟上之人以德為外而急於貨財暴征橫斂民便效尤相攘相奪則是上教得他如此賀孫或問爭民施奪曰是爭取於民而施之以劫奪之教也媢疾以惡之是徇其好惡之私節斷斷者是絜矩媢疾者是不能唯仁人放流之是大能絜矩底人見賢而不能舉舉而不能先是稍能絜矩好人之所惡者是大不能絜矩節舉而不能先先是早底意思不能速用之意泳君子有大道必忠信以得之驕泰以失之平天下一章其事如此廣闊然緊要處只在這些子其粗說不過如此若細說則如操則存克己復禮等語皆是也僩趙唐卿問十章三言得失而章句云至此而天理存亡之機決矣何也曰他初且言得眾失眾再言善不善意已切矣終之以忠信驕泰分明是就心上說出得失之由以決之忠信乃天理之所以存驕泰乃天理之所以亡宇問仁者以財發身曰不是特地散財以取名買教人來奉己只是不私其有則人自歸之而身自尊只是言其散財之效如此賀孫仁者以財發身但是財散民聚而身自尊不在於財不仁者只管多聚財不管身之危亡也卓蜚卿問未有上好仁而下不好義如何上仁而下便義曰這只是一箇在上便喚做仁在下便喚做義在父便謂之慈在子便謂之孝直卿云也如孝慈則忠曰然道夫雖有善者善如而今說會底閎祖國不以利為利如秦發閭左之戍也是利墮名城殺豪傑銷鋒鏑北築長城皆是自要他利利不必專指財利所以孟子從頭截斷只說仁義說到未有仁而遺其親未有義而後其君這裏利卻在裏面所以說義之所安即利之所在蓋惟義之安則自無不利矣泳問末章說財處太多曰後世只此一事不能與民同可學第九章十章齊家治國既已言化平天下只言措置之理絜度也矩所以為方也方者如用曲尺為方者也何謂是以君子有絜矩之道上面人既自有孝弟下面民亦有孝弟只要使之自遂其孝弟之心於其下便是絜矩若拂其良心重賦橫斂以取之使他不得自遂其心便是不方左右前後皆然言是以者須是如此後面說民之父母所好所惡皆是要與民同利之一事且如食祿之家又畜雞豚牛羊卻是與民爭利便是不絜矩所以道以義為利者義以方外也泳問絜矩以好惡財用媢疾彥聖為言何也曰如桑弘羊聚許多財以奉武帝之好若是絜矩底人必思許多財物必是侵過著民底滿著我好民必惡言財用者蓋如自家在一鄉之間卻專其利便是侵過著他底便是不絜矩言媢疾彥聖者蓋有善人則合當舉之使之各得其所今則不舉他便失其所是侵善人之分便是不絜矩此特言其好惡財用之類當絜矩事事亦當絜矩節問自致知至於平天下其道至備其節目至詳至悉而反覆於終篇者乃在於財利之說得非義利之辨其事尤難而至善之止於此尤不可不謹歟不然則極天命人心之向背以明好惡從違之得失其丁寧之意何其至深且切耶曰此章大概是專從絜矩上來蓋財者人之所同好也而我欲專其利則民有不得其所好者矣大抵有國有家所以生起禍亂皆是從這裏來道夫云古注絜音戶結反云結也曰作結字解亦自得蓋荀子莊子注云絜圍束也是將一物圍束以為之則也又曰某十二三歲時見范丈所言如此他甚自喜以為先儒所未嘗到也道夫或問絜矩之義如何只說財利曰必竟人為這箇較多所以生養人者所以殘害人者亦只是這箇且如今官司皆不是絜矩自家要賣酒便教人不得賣酒自家要榷鹽便教人不得賣鹽但事勢相迫行之已久人不為怪其實理不如此學蒙因論治國平天下章財用處曰財者人之所好自是不可獨占須推與民共之未論為天下且以作一縣言之若寬其賦斂無征誅之擾民便歡喜愛戴若賦斂稍急又有科敷之擾民便生怨決然如此又曰寧過於予民不可過於取民且如居一鄉若屑屑與民爭利便是傷廉若饒潤人些子不害其為厚孟子言可以取可以無取取傷廉可以與可以無與與傷惠他主意只是在取傷廉上且將那與傷惠來相對說其實與之過厚些子不害其為厚若才過取便傷廉便不好過與畢竟當下是好意思與了再看之方見得是傷惠與傷廉不同所以子華使於齊冉子與之粟五秉聖人雖說他不是然亦不大故責他只是才過取便深惡之如冉求為之聚斂而欲攻之是也僩問平天下章言財用特詳當是民生日用最要緊事耳曰然孟子首先所言其原出此子升問此章所言反覆最詳之意曰要之始終本末只一理但平天下是一件最大底事所以推廣說許多如明德新民至善之理極精微至治國平天下只就人情上區處又極平易蓋至於平而已耳後世非無有志於天下國家之人卻只就末處布置於本原上全不理會因言莊子不知他何所傳授卻自見得道體蓋自孟子之後荀卿諸公皆不能及如說語道而非其序非道也此等議論甚好度亦須承接得孔門之徒源流有自後來佛氏之教有說得好處皆出於莊子但其知不至無細密工夫少間都說得流了所謂賢者過之也今人亦須自理會教自家本領通貫卻去看他此等議論自見得高下分曉若一向不理會得他底破少間卻有見識低似他處因說曾點之徒氣象正如此又問論語集注說曾點是雖堯舜事業亦優為之莫只是堯舜事業亦不足以芥蔕其心否曰堯舜事業也只是這箇道理又問他之所為必不中節曰本領處同了只是無細密工夫木之人治一家一國尚且有照管不到處況天下之大所以反反覆覆說不是大著箇心去理會如何照管得泳
