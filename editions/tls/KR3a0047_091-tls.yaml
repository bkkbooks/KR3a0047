body:
  text: 朱子語類卷第九十一禮八雜儀自三代後車服冠冕之制前漢皆不說只後漢志內略載又多不可曉以下服古者有祭服有朝服祭服所謂鷩冕之類朝服所謂皮弁玄端之類天子諸侯各有等差自漢以來祭亦用冕服朝服則所謂進賢冠絳紗袍隋煬帝時始令百官戎服唐人謂之便服又謂之從省服乃今之公服也祖宗以來亦有冕服車騎黃綠作旗之類而不常用惟大典禮則用之然將用之時必先出許多物色於庭所持之人又須有賞賜黃錄云所付之人又須有以易也於是將用之前有司必先入文字取指揮例降旨權免夔孫義剛同今朝廷服色三等乃古間服此起於隋煬帝時然當時亦只是做戎服當時以巡幸煩數欲就簡便故三品以上服紫五品服緋六品以下服綠他當時又自有朝服今亦自有朝服大祭祀時用之然不常以朝到臨祭時取用卻一齊都破損了要整理又須大費一巡只得恁地包在那裏賀孫今之朝服乃戎服蓋自隋煬帝數遊幸令百官以戎服從二品紫五品朱六品青皂靴乃上馬鞋也後世循襲遂為朝服然自唐人朝服猶著禮服机頭圓頂軟腳今之吏人所冠者是也桶頂帽子乃隱士之冠宣和末京師士人行道間猶著衫帽至渡江戎馬中乃變為白敘衫紹興二十年間士人猶是白敘衫至後來軍興又變為紫衫皆戎服也義剛唐人法服猶施之朝廷今日惟祭祀不得已乃用不復施之朝廷矣且如今之冕嵯峨而不安於首古者佩玉右徵角左宮羽今必不然方子祖宗時有大朝會如元正冬至有之天子被法服群臣皆有其服籍溪在某州為解頭亦嘗預元正朝班又舊制在京升朝官以上每日赴班如上不御殿宰相押班所以韓魏公不押班為臺諫所論籍溪云士服著白羅衫青緣有裙有佩紹興間韓勉之知某州於信州會樣來製士服正如此某後來看祖宗實錄乃是教大晟樂時士人所服方知出處今朝廷所頒緋衫乃有司之服也人傑廣錄略政和間嘗令天下州學生習大晟樂者皆著衣裳如古之制及漆紗帽但無頂爾及諸州得解舉首貢至京師皆若此赴元日朝或曰蒼梧雜志載背子近年方有舊時無之只汗衫襖子上便著公服女人無背只是大衣命婦只有橫帔直帔之異爾背子乃婢妾之服以其在背後故謂之背子先生曰見說國初之時至尊常時禁中常只裹帽著背子不知是如何又見前輩說前輩子弟平時家居皆裹帽著背不裹帽便為非禮出門皆須且冠帶今皆失了從來人主常朝君臣皆公服孝宗簡便平時著背常朝引見臣下只是敘衫今遂以為常如講筵早朝是公服晚朝亦是敘衫問今冠帶起於何時曰看角抵圖所畫觀戲者盡是冠帶立底屋上坐底皆戴帽繫帶樹上坐底也如此那時猶只是軟帽搭在頭上帶只是一條小皮穿幾箇孔用那跨子縛住至賤之人皆用之今來帽子做得恁高硬帶做得恁地重大既不便於從事又且是費錢皂衫更費重某從向時見此三物疑其必廢如今果是人罕用也是貧士如何要辦得自家竭力辦得著去那家那家自無了教他出來相接也不得所以其弊必廢大凡事不商量後都是如此問古人制深衣正以為士之貴服且謂完且弗費極是好上至天子亦服之不知士可以常服否曰可以擯相可以治軍旅如此貴重怨不可常服曰朝玄端夕深衣已是從簡便了且如深衣有大帶了又有組以束之今人已不用組了凡是物事纔是有兩件定是廢了一件又云薄太后以帽絮提文帝則帽已自此時有了從來也多喚做巾子机頭或云唐莊宗取伶官者用之但未有腳或云太祖廟方用想此時方制得如此長腳賀孫符舜功曰去年初得官欲冠帶參先生中以顯道言而止今思之亦是失禮先生曰畢竟是君命良久笑曰顯道是出世間法某初聞劉諫議初仕時冠帶乘敘轎還人事往往前輩皆如此今人都不理會其間有如此者遂哂之要之冠帶為禮某在同安作簿時朝廷亦有文字令百官皆戴帽某時坐轎有礙後於轎頂上添了一圈竹義剛上領服非古服看古賢如孔門弟子衣服如今道服卻有此意古畫亦未有上領者惟是唐時人便服此蓋自唐初已雜五胡之服矣賀孫因言服制之變前輩無著背子者雖婦人亦無之士大夫常居常服紗帽皂衫革帶無此則不敢出背子起殊未久或問婦人不著背子則何服曰大衣問大衣非命婦亦可服否曰可僩因舉胡德輝雜志云背子本婢妾之服以其行直主母之背故名背子後來習俗相承遂為男女辨貴賤之服曰然然嘗見前輩雜說中載上御便殿著紗帽背子則國初已有背子矣皆不可曉又曰後世禮服固未能猝復先王之舊且得華夷稍有辨別猶得今世之服大抵皆胡服如上領衫靴鞋之類先王冠服掃地盡矣中國衣冠之亂自晉五胡後來遂相承襲唐接隋隋接周周接元魏大抵皆胡服問今公服起於何時曰隋煬帝游幸令群臣皆以戎服從三品以上服紫五品以上服緋六品以下服綠只從此起遂為不易之制又問公服何故如許闊曰亦是積漸而然初不知所起嘗見唐人畫十八學士裹机頭公服極窄畫裴晉公諸人則稍闊及畫晚唐王鐸輩則又闊相承至今又益闊也嘗見前輩說紹興初某人欲製公服呼針匠計料匠云少三尺許某人遂寄往都下製造及得之以示針匠匠曰此不中格式某不敢為也某人問其故曰但看袖必短據格式袖合與下襜齊至地不然則不可以入閤門彼時猶守得這意思今亦不復存矣唐人有官者公服机頭不離身以此為常服又別有朝服如進賢冠中單服之類其下又有省服服為常服今之公服即唐之省服服也又問机頭所起曰亦不知所起但諸家小說中時班駮見一二如王彥輔麈史猶略言之某少時尚見唐時小說極多今皆不復存矣唐人机頭初止以紗為之後以其軟遂斫木作一山子在前襯起名曰軍容頭其說以為起於魚朝恩一時人爭傚士大夫欲為机頭則曰為我斫一軍容頭來及朝恩被誅人以為語讖其先机頭四角有腳兩腳繫向前兩腳繫向後後來遂橫兩腳以鐵線張之然惟人主得裹此世所畫唐明皇已裹兩腳者但比今甚短後來藩鎮遂亦僭用想得士大夫因此亦皆用之但不知幾時展得如此長嘗見禪家語錄載唐莊宗問一僧云朕收中原得一寶未有人酬賈僧曰略借陛下寶看莊宗以手展机頭兩腳示之如此則五代時猶是惟人君得裹兩腳者然皆莫可考也桐木山子相承用至本朝遂易以藤織者而以紗冒之近時方易以漆紗嘗見南劍沙溪一士夫家尚收得上世所藏机頭猶是藤織坯子唐製又有兩腳上下者亦莫可曉僩而今衣服未得復古且要辨得華夷今上領衫與靴皆胡服本朝因唐唐因隋隋因周周因元魏隋煬帝有游幸遂令臣下服戎服三品以上服紫五品以上服緋六品以下服綠皆戎服也至唐有三等服有朝服又有公服治事時著便是法服有衣裳佩玉等又有常時服便是今時公服則無時不服唐初年服袖甚窄全是胡服中年漸寬末年又寬但看人家畫古賢可見唐初頭上裹四腳軟巾至魚朝恩以桐木為冠如山形安於髻上方裹巾後人漸學他至本朝漸變為机頭方用漆紗做本來唐時四腳軟巾只人主後面二帶用物事穿得橫臣下不敢用後藩鎮之徒僭竊用今則朝廷一例如此學蒙與上條聞同爵弁赤少黑多如今深紫色饥以皮為之如今水檐相似蓋古人未有衣服時且取鳥獸之皮來遮前面後面後世聖人制服不去此者示不忘古也今則又以帛為之耳饥中間有頸兩頭有肩肩以革帶穿之革帶今有胯子古人卻是環子釘於革帶其勢垂下如今人釘鉸串子樣鐫鐩之類結放上面今之胯子便是倣他形像古人帶甚輕卻帶得許多物今人帶枉做得恁地重如机頭靴之類亦然机頭本是偃腳垂下要束得緊今卻做長帶問橫渠說唐莊宗因取伶官机頭帶之後遂成例曰不是恁地莊宗在位亦未能便變化風俗兼是伶人所帶士大夫亦未必肯帶之見畫本唐明皇已帶長腳机頭或云藩鎮僭禮為之後遂皆為此樣或云乃是唐宦官要得常似新机頭故以鐵線插帶中又恐壞其中以桐木為一机頭骨子常令机頭高起如新謂之軍容頭後來士大夫學之令匠人為我斫箇軍容頭來蓋以木為之故謂之斫及唐末宦者之禍人皆以此語為讖王彥輔麈史說如此說得有來歷恐是如此後人覺得不安到本朝太宗時又以藤做骨子以紗糊於上後又覺見不安到仁宗時方以漆紗為之嘗見南劍沙縣人家尚有藤骨子可見此事未久蓋此非一朝一夕之故其變必有漸夔孫摯是初見君時用以獻君二生一死皆是抱羔鴈雉真物以獻如今笏卻是古人記事手板王述倒執手板插之帶間今人笏卻是用行禮記事但其私記也今之公服皆古之戎服古公服是法服朱衣皂緣冠則三公用貂蟬御史用獬在衣之上則係帶帶劍之類六七件隋煬帝南遊命群臣以戎服從大臣紫中緋小綠今之成群成隊試進士詩賦亦煬帝法也金銀魚乃古人以合符臣之得魚符者用袋之腰間今無合符事卻尚用魚又不用袋魚魚袋事出唐書輿服志高武中睿時揚今衣服無章上下混淆某嘗謂縱未能大定經制且隨時略加整頓猶愈於不為如小衫令各從公衫之色服紫者小衫亦紫服緋綠者小衫亦緋綠服白則小衫亦白胥吏則皆烏衣餘皆倣此庶有辨別也閎祖古人戴冠郭林宗時戴巾溫公幅巾是其類也古人衣冠大率如今之道士道士以冠為禮不戴巾婦人環髻今之特髻是其意也不戴冠揚今官員執笏最無道理笏者只是君前記事恐事多須以紙粘笏上記其頭緒或在君前不可以手指人物須用笏指之此笏常插在腰間不執在手中夫子攝齊升堂何曾手中有笏攝齊者畏謹恐上階時踏著裳有顛仆之患執圭者圭自是贄見之物只是捧至君前不是如執笏所以執圭時便足縮縮如有循緣手中有圭不得攝齊亦防顛仆明作古人言人跪坐雖有拱璧而先乘馬不如坐進此道謂跪而獻之也如文帝不覺膝之前蓋亦是跪坐跪坐故兩手下為拜拜字從兩手下古者初冠母子相拜婦初見舅姑舅姑答拜不特君臣相答拜也方子以下拜古人坐於地未必是盤足必是跪以其慣了故腳不痛所以拜時易也古人之拜正如今道士拜二膝齊下唐人先下一膝謂之雅拜似有罪是不恭也今人不然明作安卿問古者天子拜其臣想亦是席地而坐只略為之俛首便是拜否曰太甲拜手稽首成王拜手稽首疏言稽留之意是首至地之久也蓋其尊師傅如此後來晉元帝亦拜王導至其家亦拜其妻如法帖中元帝與王導帖皆稱頓首不知如何義剛問虞禮子為尸父拜之曰古人大抵如此如子冠母先拜之子卻答拜而今這處都行不得看來古人上下之際雖是嚴而情意甚相通如禹拜昌言王拜手稽首之類到漢以來皇帝見丞相在坐為起在輿為下贊者曰皇帝為丞相起尚有這意思到六朝以來君臣逐日相與說話如宋文帝明日欲殺某人晚間更與他說話不能得他去其間有入朝去從人即分散去到晚他方出到唐尚有坐說話底意思而今宰相終年立地不曾得一日坐人主或終日不曾得見面壽皇求治之初中間學士固是直宿又分講官亦直宿又令從官亦得入賜坐從容講論而今未論朝廷如古人州郡之間亦自如此如羅池碑云柳子厚與牙將歐陽翼共飲法帖中有顏真卿與蔡明遠帖都書名牙將即是客將蔡明遠亦是衙前他卻與之情意如此而今州郡與小官也不如此了夔孫問看禮中說婦人吉拜雖君賜肅拜此則古人女子拜亦伏地也曰古有女子伏拜者乃太祖問范質之姪杲古者女子拜如何他遂舉古樂府云長跪問故夫以為古婦女皆伏拜自則天欲為自尊之計始不用伏拜今看來此說不然樂府只說長跪問故夫不曾說伏拜古人坐也是跪一處云直身長跪若拜時亦只低手祗揖便是肅拜故禮肅拜注云肅俯手也蓋婦人首飾盛多如副笄六珈之類自難以俯伏地上古人所以有父母拜其子舅姑答婦拜者蓋古坐時只跪坐在地拜時亦容易又不曾相對拜各有向當答拜亦然大祝九拜稽首拜頭至地頓首拜頭叩地空首拜頭至手所謂拜手也振動戰栗變動之拜吉拜拜而後稽顙凶拜稽顙而後拜也奇拜一拜褒拜再拜褒讀為報肅拜但俯下手今時抬傳云介者不拜敢肅使者是也賀孫問古者婦人以肅拜為正何謂肅拜曰兩膝齊跪手至地而頭不下為肅拜拜手亦然為喪主則頭亦至地不肅拜南北朝有樂府詩說婦人云伸腰再拜跪問客今安否伸腰亦是頭不下也周宣帝令命婦朝見皆跪伏朝見如男子之儀但不知婦人膝不跪地而變為今之拜者起於何時此等小小禮文皆無所稽考程泰之以為始於武后亦非也古者男子拜亦兩膝齊屈如今之道士拜杜子春注周禮奇拜以為先屈一膝如今之雅拜漢人雅拜即今之拜是也淳婦人有肅拜拜手稽顙肅拜者兩膝跪地歛手放低拜手者膝亦跪而手至地也稽顙頭至地也為夫與長子喪亦如之燾拜親時須合坐受叔伯母亦合坐受兄只立受嫂叔同一家不可不拜亦須對拜夫婦對拜揚團拜須打圈拜若分行相對則有拜不著處廣今人契拜父母兄弟極害義理揚古人跪坐立乘方子以下坐問盤坐於理有害否曰古人席地亦只是盤坐又有跪坐者宇錄云古人亦只跪坐未有盤坐君前臣跪父前子跪兩膝頭屈前著地觀畫圖可見古人密處未見得其疏即是如此宇錄云古人樽節處自如此密管寧坐一木榻積五十年未嘗箕股其榻上當膝處皆穿今人有椅子若對賓客時合當垂足坐若獨居時垂足坐難久盤坐亦何害淳寓錄少異族長至己之家必以族長坐主位無親疏皆然北人以姑夫之類外姓之人亦坐主位無此義揚燕居父子同坐亦得惟對客不得揚古人屋黃作室無廊廡三公露立於槐下九卿露立於棘下當其朝會有雨則止曾子問諸侯見天子入門而雨霑服失容則廢淳義剛錄略以下朝廷之儀因論朝禮云如周禮所說古之朝禮君臣皆立至漢時所謂皇帝見丞相起尚有此禮不知後來如何廢了然所謂朝不坐又也有坐底燾三代之君見大臣多立乘車亦立漢初猶立見大臣如贊者云天子為丞相起後世君太尊臣太卑德明古者天子見群臣有禮先特揖三公次揖九卿又次揖左右然後泛揖百官所謂天揖同姓之類有許多等級義剛因問欲使士人為宰相吏升降揖遜不佳否曰古人皆有此禮本朝廢之又問古人何故受拜曰不然孔子須拜衛靈公魯哀公舊制宰相在堂上御史中丞為班首與對拜於階下又聖節日百官盡揖宰相於何處揚古時隔品則拜謂如八品見六品六品見四品則拜宰相禮絕百僚則皆拜之若存得此等舊禮亦好卻有等殺今著公令從事郎以下庭參不拜則以上者不庭參可知豈有京朝官復降階之禮今朝士見宰相只是客禮見監司郡守如何卻降階問若客司揖請降階則如何曰平立不降可也同官雖皆降階吾獨不降可也是時將赴莆田問此先生又云古者庭參官令錄以下往往皆拜惟職官不拜所以著令如此德明子晦將赴莆陽請於先生今屬邑見郡守不問官序例階墀如何曰若欲自行其志勿從俗可也因云今多相尚如此以此去事人固是無見識且是為官長者安受而不疑更是怪坐客云趙丞相帥某處經過某處而屬邑宰及同僚皆於船頭迎望拜接後卻指揮不要此般禮數這般所在須先戒飭客將或云今人見宰相欲有所言未及出口已為客將按住云相公尊重至有要取覆而客將抗聲云不得取覆者先生曰若是有此等無奈何須叱之可也賀孫開元禮有刺史弔吏民之禮略如古者國君弔臣禮本朝刪去此條方子問左右必竟孰為尊曰漢初右丞相居左丞相之上史中有言曰朝廷無出其右者則是右為尊也到後來又卻以左為尊而老子有曰上將軍處右而偏將軍處左喪事尚左兵凶器也故以喪禮處之如此則吉事尚右矣漢初豈習於戰國與暴秦之所為乎廣以下雜論古父子異宮宮如今人四合屋雖各一處然四面共牆圍揚古謂之宮只是牆蓋古人無今廊屋燾因論戟古人戰爭出入部從用之今只置之於門唐時私家得用戟如官幾品得幾戟燾今之表啟是下諛其上今之制誥是君諛其臣道夫今之書簡使上覆以為重於啟也然用啟字則有義理用覆字卻無義理啟乃開啟之啟覆為審覆之覆如三覆奏謂已有指揮更為再三審覆之也廣問今人書簡未嘗拜而言拜未嘗瞻仰而言瞻仰如何曰瞻仰字去之無害但拜字承用之久若遽除去恐不免譏罵前輩只云某啟啟是開白之義法帖中有頓首韓文中有再拜其來已久問啟又訓跪如秦王問范睢有跽而請之曰古人席地而坐有問於人則略起身時其膝至地或謂之跪若婦人之拜在古亦跪古樂府云伸腰拜手跪則婦人當跪而拜但首不至地耳不知婦人之不跪起於何代或謂唐武后時方如此亦未可知周天元令命婦為男子之拜以稱賀及天元薨遂改其制想史官書之以表其異則古者婦人之拜其首不至地可知也然則婦人之拜當以深拜頗合於古人傑有士大夫來謁各以坐次推遜不已先生曰吾人年至五十後莫論官休自修大抵前輩禮數極周詳鄭重不若今人之苟簡以今人律之先王之禮則今人為山鹿野麋矣然某尚及見前輩禮數之周今又益薄矣僩
