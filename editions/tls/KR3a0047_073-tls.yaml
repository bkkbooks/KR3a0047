body:
  text: 朱子語類卷第七十三易九困困卦難理會不可曉易中有數卦如此繫辭云卦有小大辭有險易辭也者各指其所之困是箇極不好底卦所以卦辭也做得如此難曉如蹇剝否睽皆是不好卦林錄云卻不好得分明故易曉只有剝卦分明是剝所以分曉困卦林云雖是極不好卦是箇進退不得窮極底卦所以難曉林錄云所以卦辭亦恁地不好難曉其大意亦可見又曰看易不當更去卦爻中尋求道理當如何處置這箇與人卜筮以決疑惑若道理當為固是便為之若道理不當為自是不可做何用更占卻是有一樣事或吉或凶成兩岐道理處置不得所以用占若是放火殺人此等事終不可為不成也去占又如做官贓污邪僻由徑求進不成也去占僩學履錄略不失其所亨這句自是說得好淵李敬子問致命遂志曰致命如論語見危授命與士見危致命之義一般是送這命與他自家但遂志循義都不管生死不顧身命猶言致死生於度外也僩池本云澤無水困君子道窮之時但當委致其命以遂吾之志而已致命猶送這命與他不復為我之有雖委致其命而志則自遂無所回屈伊川解作推致其命雖說得通然論語中致命字都是委致之致事君能致其身與士見危致命見危授命皆是此意授亦致字之意言將這命授與之也問臀困於株木如何曰在困之下至困者也株木不可坐臀在株木上其不安可知又問伊川將株木作初之正應不能庇他如何曰恐說臀字不去學履問困於酒食本義作饜飫於所欲如何曰此是困於好底事在困之時有困於好事者有困於不好事者此爻是好爻當困時則為困於好事如感時花濺淚恨別鳥驚心花鳥好娛戲底物這時卻發人不好底意思是因好物而困也酒食饜飫亦如此又問象云中有慶也是如何曰他下面有許多好事在學履問朱紱方來利用享祀曰以之事君則君應之以之事神則神應之燾朱紱赤紱若如伊川說使書傳中說臣下皆是赤紱則可詩中卻有朱芾斯皇一句是說方叔於理又似不通某之精力只推得到這裏淵問困二五皆利用祭祀是如何曰他得中正又似取無應而心專一底意思學履祭祀享祀想只說箇祭祀無那自家活人卻享他人祭之說淵六三陽之陰上六陰之陰故將六三言之則上六為妻淵井井象只取巽入之義不取木義淵井是那掇不動底物事所以改邑不改井淵汔至亦未繘井羸其瓶凶汔至作一句亦未繘井羸其瓶是一句意謂幾至而止如綆未及井而瓶敗言功不成也學履木上有水井說者以為木是汲器則後面卻有瓶瓶自是瓦器此不可曉怕只是說水之津潤上行至那木之杪這便是井水上行之象問恐是桔鍛之類曰亦恐是如此又云禾上露珠便是下面水上去大抵裏面水氣上則外面底也上淵用之問木上有水井曰巽在坎下便是木在下面漲得水上上來如桶中盛得兩斗水若將大一斗之木沈在水底則木上之水亦長一斗便是此義如草木之生津潤皆上行直至樹末便是木上有水之義雖至小之物亦然如菖蒲葉每晨葉葉尾皆有水池本作皆潮水珠如珠顆雖藏之密室亦然非露水也池本云或云嘗見野老說芋葉尾每早亦含水珠須日出照乾則無害若太陽未照為物所挨落則芋實焦枯無味或生蟲此亦菖蒲潮水之類爾曰然問如此則井字之義與木上有水何預曰木上有水便如井中之水水本在井底卻能汲上來給人之食故取象如此用之又問程子汲水桶之說是否曰不然木上有水是木穿水中漲上那水若作汲桶則解不通矣且與後面羸其瓶凶之說不相合也僩學履同而略又注云後親問先生先生云不曾說木在下面漲得水來這箇話是別人說不是義理如此鮒程沙隨以為蝸牛如今廢井中多有之淵九三可用汲以上三句是象下兩句是占大概是說理決不是說汲井淵若非王明則無以收拾人才淵收雖作去聲讀義只是收也淵革問革二女志不相得與睽不同行有異否曰意則一但變韻而協之爾學履易言順乎天而應乎人後來人盡說應天順人非也佐問革之象不曰澤在火上而曰澤中有火蓋水在火上則水滅了火不見得水決則火滅火炎則水涸之義曰中有火則二物並在有相息之象否曰亦是恁地學履澤中有火水能滅火此只是說陰盛陽衰火盛則克水水盛則克火此是澤中有火之象便有那四時改革底意思君子觀這象便去治曆明時林艾軒說因革卦得曆法云曆須年年改革不改革便差了天度此說不然天度之差蓋緣不曾推得那曆元定卻不因不改而然曆豈是那年年改革底物治曆明時非謂曆當改革蓋四時變革中便有箇治曆明時底道理淵澤中有火革蓋言陰陽相勝復故聖人治曆明時向林艾軒嘗言聖人於革著治曆者蓋曆必有差須時改革方得此不然天度固必有差須在吾術中始得如度幾年當差一分便就此添一分去乃是又云曆數微眇如今下漏一般漏管稍澀則必後天稍闊則必先天未子而子未午而午淵澤中有火自與治曆明時不甚相干聖人取象處只是依稀地說不曾確定指殺只是見得這些意思便說淵革言三就言三番結裹成就如第一番商量這箇是當革不當革說成一番又更如此商量一番至於三番然後說成了卻不是三人來說淵問革下三爻有謹重難改之意上三爻則革而善蓋事有新故革者變故而為新也下三爻則故事也未變之時必當謹審於其先上三爻則變而為新事矣故漸漸好曰然又云乾卦到九四爻謂乾道乃革也是到這處方變了學履未占有孚伊川於爻中占字皆不把做卜筮尚其占說淵或問大人虎變是就事上變君子豹變是就身上變曰豈止是事上也從裏面做出來這箇事卻不只是空殼子做得文王其命維新也是他自新後如此堯克明俊德然後黎民於變大人虎變正如孟子所謂所過者化所存者神上下與天地同流豈曰小補之哉補只是箇裏破補這一些如世人些小功只是補如聖人直是渾淪都換過了如鑪价相似補底只是錮露聖人卻是渾淪鑄過或曰孟子說得恁地想見做出來應是新人耳目曰想亦只是從五畝之宅樹之以桑起看他三四次只恁地說又曰如那如其禮樂以俟君子意思孟子都無這便是氣癞處又曰未見得做得與做不得只說著教人歡喜胡泳僩錄云因說革卦曰革是更革之謂到這裏須盡翻轉更變一番所謂上下與天地同流豈曰小補之哉小補之者謂扶衰救弊逐些補緝如錮鑑家事相似若是更革則須徹底重新鑄造一番非止補其罅漏而已湯武順天應人便是如此孟子所說王政其效之速如此想見做出來好看只是太癞些又少些如其禮樂以俟君子底意思或曰不知他如何做曰須是從五畝之宅百畝之田雞豚桑麻處做起兩三番如此說想不過只是如此做鄭少梅解革卦以為風爐亦解得好初爻為爐底二爻為爐眼三四五爻是爐腰處上爻是爐口鼎正位凝命恐伊川說得未然此言人君臨朝也須端莊安重一似那鼎相似安在這裏不動然後可以凝住那天之命如所謂協於上下以承天休淵用之解鼎顛趾利出否無咎或曰據此爻是凡事須用與他翻轉了卻能致福曰不然只是偶然如此此本是不好底爻卻因禍致福所謂不幸中之幸蓋鼎顛趾本是不好卻因顛仆而傾出鼎中惡穢之物所以反得利而無咎非是故意欲翻轉鼎趾而求利也或言浙中諸公議論多是如此云凡事須是與他轉一轉了卻因轉處與他做教好曰便是浙中近來有一般議論如此若只管如此存心未必真有益先和自家心術壞了聖賢做事只說箇正其誼不謀其利明其道不計其功凡事只如此做何嘗先要安排扭掜須要著些權變機械方喚做做事又況自家一布衣天下事那裏便教自家做知他臨事做出時如何卻無故平日將此心去扭掜揣摩先弄壞了聖人所說底話光明正大須是先理會箇光明正大底綱領條目且令自家心先正了然後於天下之事先後緩急自有次第逐旋理會道理自分明今於在明明德未曾理會得便要先理會新民工夫及至新民又無那親其親長其長底事卻便先萌箇計功計獲底心要如何濟他如何有益少間盡落入功利窠窟裏去固是此理無外然亦自有先後緩急之序今未曾理會得正心修身便先要治國平天下未曾理會自己上事業便先要開物成務都倒了孔子曰可與立未可與權亦是甚不得已方說此話然須是聖人方可與權若以顏子之賢恐也不敢議此磨而不磷涅而不緇而今人纔磨便磷纔涅便緇如何更說權變功利所謂未學行先學走也而今諸公只管講財貨源流是如何兵又如何民又如何陳法又如何此等事固當理會只是須識箇先後緩急之序先其大者急者而後其小者緩者今都倒了這工夫子路問君子子曰修己以敬曰如斯而已乎曰修己以安人顏淵問仁子曰克己復禮仲弓問仁子曰出門如見大賓使民如承大祭己所不欲勿施於人曾子將死宜有切要之言及孟敬子問之惟在於辭氣容貌之間此數子者皆聖門之高第及夫子告之與其所以告人者乃皆在於此是豈遺其遠者大者而徒告以近者小者耶是必有在矣某今病得一生九死已前數年見浙中一般議論如此亦嘗竭其區區之力欲障其末流而徒勤無益不知瞑目以後又作麼生可畏可歎僩得妾以其子得妾是無緊要其重卻在以其子處顛趾利出否伊川說是得妾以其子無咎彼謂子為王公在喪之稱者恐不然淵問鼎耳革是如何曰他與五不相應五是鼎耳鼎無耳則動移不得革是換變之義他在上下之間與五不相當是鼎耳變革了不可舉移雖有雉膏而不食此是陽爻陰陽終必和故有方雨之吉學履刑剭班固使來若作形渥卻只是澆濕渾身淵六五金鉉只為上已當玉鉉了卻下取九二之應來當金鉉蓋推排到這裏無去處了淵震震亨止不喪匕鬯作一項看後面出可以為宗廟社稷又做一項看震便自是亨震來虩虩是恐懼顧慮而後便笑言啞啞震驚百里便不喪匕鬯文王語已是解震亨了孔子又自說長子事文王之語簡重精切孔子之言方始條暢須拆開看方得礪言人常似那震來時虩虩地便能笑言啞啞到得震驚百里時也不喪匕鬯這箇相連做一串說下來淵震未便說到誠敬處只是說臨大震懼而不失其常主器之事未必彖辭便有此意看來只是傳中方說震來虩虩是震之初震得來如此淵億喪貝有以億作噫字解底淵震六二不甚可曉大概是喪了貨貝又被人趕上高處去只當固守便好六五是生於憂患而死於安樂上六不全好但能恐懼於未及身之時可得無咎然亦不免他人語言厲艮艮其背背字是止字彖中分明言艮其止止其所也從周錄云極解得好又言艮其背一句是腦故彖中言是以不獲其身行其庭不見其人四句只略對方子艮其背背只是言止也人之四體皆能動惟背不動取止之義各止其所則廓然而大公德明艮其背便不獲其身不獲其身便不見其人行其庭對艮其背只是對得輕身是動物不道動都是妄然而動斯妄矣不動自無妄淵因說不獲其身曰如君止於仁臣止於忠但見得事之當止不見此身之為利為害才將此身預其間則道理便壞了古人所以殺身成仁舍生取義者只為不見身方能如此學履艮其背渾只見得道理合當如此入自家一分不得著一些私意不得不獲其身不干自家事這四句須是說艮其背了靜時不獲其身動時不見其人所以彖辭傳中說是以不獲其身至無咎也周先生所以說定之以仁義中正而主靜這依舊只是就艮其背邊說下來不是內不見己外不見人這兩卦各自是一箇物不相秋采淵趙共甫問艮其背不獲其身曰不見有身也行其庭不見其人曰不見有人也曰不見有身不見有人所見者何物曰只是此理過時止則止時行則行止固是止池本行固非止然行而不失其正池本作理乃所以為止也僩問艮之象何以為光明曰定則明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定而天光發是也學履艮卦是箇最好底卦動靜不失其時其道光明又剛健篤實輝光日新其德皆艮之象也艮居外卦者八而皆吉厲錄云居八卦之上凡上九爻皆好惟蒙卦半吉半凶如賁之上九白賁無咎上得志也大畜上九何天之衢道大行也蟲上九不事王侯志可則也頤上九由頤厲吉大有慶也損上九弗損益之大得志也艮卦敦艮之吉以厚終也蒙卦上九擊蒙不利為寇利禦寇雖小不利然卦爻亦自好蓋上九以剛陽居上擊去蒙蔽只要恰好不要太過太過則於彼有傷而我亦失其所以擊蒙之道如人合喫十五棒若只決他十五棒則彼亦無辭而足以御寇若再加五棒則太過而反害人矣為寇者為人之害也禦寇者止人之害也如人有疾病醫者用藥對病則彼足以袪病而我亦得為醫之道若藥不對病則反害他人而我亦失為醫之道矣所以象曰利用禦寇上下順也惟如此則上下兩順而無害也僩八純卦都不相與只是艮卦是止尤不相與內不見己是內卦外不見人是外卦兩卦各自去淵守約問易傳艮其背之義曰此說似差了不可曉若據夫子說止其所也只是物各有所止之意伊川又卻於解艮其止止其所也又自說得分明恐上面是失點檢木之易傳云能使天下順治非能為物作則也惟止之各於其所而已此說甚當至謂艮其背為止於所不見竊恐未然據彖辭自解得分曉曰艮其止止其所也上句止字便是背字故下文便繼之云是以不獲其身更不再言艮其背也止是當止之處下句止字是解艮字所字是解背字蓋云止於所當止也所即至善之地如君之仁臣之敬之類不獲其身是無與於已不見其人是亦不見人無己無人但見是此道理各止其所也艮其背是止於止行其庭不見其人是止於動故曰時止則止時行則行伯豐問如舜禹不與如何曰亦近之繼曰未似若遺書中所謂百官萬務金革百萬之眾飲水曲肱樂在其中萬變皆在人其實無一事是此氣象大概看易須謹守彖象之言聖人自解得精密平易後人看得不子細好用自己意解得不是若是虛心去熟看便自見如乾九五文言同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹夫子因何於此說此數句只是解飛龍在天利見大人睹字分明解出見字聖人作便是飛龍在天萬物睹便是人見之如占得此爻則利於見大人也九二見龍在田亦是在下賢德已著之人雖未為世用然天下已知其文明亦是他人利見之非是此兩爻自利相見凡易中利者多為占得者設蓋活人方有利不利若是卦畫何利之有屯卦言利建侯屯只是卦如何去利建侯蓋是占得此卦者之利耳晉文公占得屯豫皆得此辭後果能得國若常人占得亦隨高下自有箇主宰道理但古者占卜立君卜大遷是事體重者故爻辭以其重者言之又問屯何以利建侯曰屯之初爻以貴下賤有得民之象故其爻辭復云利建侯又問如何便是爻辭與所占之事相應曰自有此道理如世之抽籤者尚多有與所占之事相契又曰何以見得易專為占筮之用如王用亨于岐山于西山皆是亨字古字多通用若卜人君欲祭山川占得此即吉公用亨於天子若諸侯占得此卦則利於近天子耳凡占若爻辭與所占之事相應即用爻辭斷之萬一占病卻得利建侯又須別於卦象上討義正淳謂二五相應二五不相應如何曰若得應爻則所祈望之人所指望之事皆相應如人臣即有得君之義不相應則亦然昔敬夫為魏公占得睽之蹇六爻俱變此二卦名義自是不好李壽翁斷其占云用兵之人亦不得用兵講和之人亦不成講和睽上卦是離離為甲胄為戈兵有用兵之象卻變為坎坎險阻在前是兵不得用也兌為口舌又悅也是講和之象卻變為艮艮止也是議和者亦無所成未幾魏公既敗湯思退亦敗皆如所占人傑錄見下伯豐問兼山所得於程門者云艮內外皆止是內止天理外止人欲又如門限然在外者不得入在內者不得出此意如何曰何故恁地說因論艮其背彖云止其所便是解艮其背蓋人之四肢皆能運轉惟背不動止其所之義也程傳解作止於所不見恐未安若是天下之事皆止其所己何與焉人亦何與焉此所謂不獲其身行其庭不見其人也問莫是舜有天下而不與之意否曰不相似如所謂百官萬務金革百萬之眾飲水曲肱樂在其中萬變皆在人其實無一事是也又云艮其背靜而止也行其庭動而止也萬物皆止其所只有理而已不獲其身不見其人也因論彖象文言解得易直是分曉精密但學者虛心讀之便自可見如利見大人文言分明解聖人作而萬物睹之類是也爻辭只是占得此卦爻之辭看作何用謂如屯卦之利建侯屯自是卦畫何嘗有建侯意思如晉文公占之便有用也又如王用亨于岐山亨字合作享字是王者有事於山川之卦以此推之皆可見矣人傑不獲其身不得其身也猶言討自家身己不得又曰欲出於身人才要一件物事便須以身己去對副他若無所欲則只恁地平平過便似無此身一般又曰伊川解艮其背一段若別做一段看卻好只是移放易上說便難通須費心力口舌方始說得出又曰上下敵應不相與猶言各不相管只是各止其所又曰明道曰與其非外而是內不若內外之兩忘也說得最好便是不獲其身行其庭不見其人不見有物不見有我只見其所當止也如為人君止於仁不知下面道如何只是我當止於仁為人臣止於敬不知上面道如何只是我當止於敬只認我所當止也以至父子兄弟夫婦朋友大事小事莫不皆然從伊川之說到不獲其身處便說不來至行其庭不見其人越難說只做止其所止更不費力賀孫艮其背不獲其身只是道理所當止處不見自家身己李錄云也不知是疼不知是痛不知是利不知是害不見利不見害不見痛痒只見道理如古人殺身成仁舍生取義皆是見道理所當止處故不見其身行其庭不見其人只是見得道理合當恁地處置李錄云只見道理不見那人皆不見是張三與是李四襲錄云但見義理之當止不見吾之身但見義理之當為不知為張三李四問易傳說艮其背是止於所不見曰伊川之意如說閑邪存誠如所謂制之於外以安其內如所謂姦聲亂色不留聰明淫樂慝禮不接心術襲錄云凡可欲者皆置在背後之意外物不接內欲不萌之際欽夫謂當去之際二字今按易傳已無之際二字此意亦自好但易之本意未必是如此伯恭又錯會伊川之意謂止於所不見者眼雖見而心不見恐無此理伊川之意卻不如此劉公度問老子所謂不見可欲使心不亂是程子之意否曰李錄有不然字老子之意是要得使人不見故溫公解此一段認得老子本意李錄云溫公解云不見可欲是防閑民使之不見與上文不貴難得之貨相似聖人之治虛其心是要得人無思無欲李錄云是使之無思算無計較實其腹是要得人充飽李錄云是使之充飽無餒弱其志是要得人不爭李錄要得並作使之強其骨是要得人作勞後人解得皆過高了從周李錄云溫公之說止於如此後人推得太高此皆是言聖人治天下事與易傳之言不同錄云通書云背非見也亦似伊川說止非為也亦不是易本意語錄中有云周茂叔謂看一部華巖經不如看一艮卦下面注云各止其所他這裏卻看得止字好方子淵蓋卿錄互有詳略易傳艮其背一段只是非禮勿視聽言動則止於所不見無欲以亂其心不獲其身者蓋外既無非禮之視聽言動則內自不見有私己之欲矣外物不接便是姦聲亂色不留聰明淫樂慝禮不接心術慢惰邪僻之氣不設於身體之意又曰艮其背不獲其身行其庭不見其人易中只是說艮其止止其所人之四肢百骸皆能動作惟背不能動止於背是止得其當止之所明道答橫渠定性書舉其語是此意伊川說卻不同又是一說不知伊川解艮其止止其所也又說得分曉卻解艮其背又自有異想是照顧不到周先生通書之說卻與伊川同也或問不見可欲此心不亂與艮其背之說何如曰老氏之說非為自家不見可欲看他上文皆是使民人如此如虛其心亦是使他無思無欲實其腹亦是使他飽滿溫公注如此解蔡丈說不然又曰艮其背看伊川說只是非禮勿視聽言動今人又說得深少間恐便走作如釋老氏之說屏去外物也又因說止於所不見曰非禮之事物須是常去防閑他不成道我恁地了便一向去事物裏面羇賀孫亦與上條同聞問艮其背不獲其身是靜中之止行其庭不見其人是動中之止伊川云內欲不萌外物不接如是而止乃得其正似只說得靜中之止否曰然此段分作兩截艮其背不獲其身為靜之止行其庭不見其人為動之止總說則艮其背是止之時當其所而止矣所以止時自不獲其身行時自不見其人此三句乃艮其背之效驗所以彖辭先說止其所也上下敵應不相與也卻云是以不獲其身行其庭不見其人也又問止有兩義得所止之止是指義理之極行止之止則就人事所為而言曰然時止之止止字小得其所止之止止字大此段工夫全在艮其背上人多是將行其庭對此句說便不是了行其庭是輕說過緣艮其背既盡得了則不獲其身行其庭不見其人矣學履問伊川解外物不接內欲不萌此說如何曰只外物不接意思亦難理會尋常如何說這句某詳伊川之意當與人交之時只見道理合當止處外物之私意不接於我曰某嘗問伯恭來伯恭之意亦如此然據某所見伊川之說只是非禮勿視聽言動底意思問先生如何解行其庭不見其人曰如在此坐只見道理不見許多人是也曰如此則與非禮勿視聽言動之意不協曰固是不協伊川此處說恐有可疑處看彖辭艮其止止其所也此便是釋艮其背之文艮其止便是引艮其背經文或背字誤作止字或止字誤作背字或以止字解背字不可知伊川於此下解云聖人所以能使天下順治非能為物作則也惟止之各於其所而已此意卻最解得分明艮其背恐當只如此說萬物各有所止著自家私意不得艮其背不獲其身只見道理不見自家行其庭不見其人只見道理不見他人也洽問伊川艮其背傳看來所謂止者正謂應事接物之時各得其所也今云止於所不見又云不交於物則是無所見無所交方得其所止而安若有所見有所交時是全無可止之處矣曰這處無不見底意思周先生也恁地說是它偶看這一處錯了相傳如此但看孔子釋彖之辭云艮其止止其所也蓋此一句即是說艮其背人身皆動惟背不動這便是所當止處此句伊川卻說得好若移此處說它腦子便無許多勞攘夔孫問易傳云止於其所不見則無欲以亂其心又云外物不接內欲不萌如是而止乃得止之道竊恐外物無有絕而不接之理若拘拘然務絕乎物而求以不亂其心是在我都無所守而外為物所動則奈何曰此一段亦有可疑外物豈能不接但當於非禮勿視勿聽勿言勿動四者用力佐艮云外物不接內欲不萌始須如此視箴中知言說刦而養之終耳順從心此亦是始終之道方問伊川曰止於所不見則須遺外事物使其心如寒灰槁木而後可得無與釋氏所謂面壁工夫者類乎竊謂背者不動也艮其背者謂止於不動之地也心能不為事物所動則雖處紛拏之地事物在前此心淡然不為之累雖見猶不見如好色美物人固有觀之而若無者非以其心不為之動乎易所謂行其庭不見其人者意或以此先生批云艮其背下面彖傳云艮其止止其所也上下敵應不相與也解得也極分明程傳於此說亦已得之不知前面何故卻如此說今移其所解傳文之意上解經文則自無可疑矣經作背傳作止蓋以止解背義或是一處有誤字也枅咸艮皆以人身為象但艮卦又差一位榦艮其腓咸其腓二卦皆就人身上取義而皆主靜如艮其趾能止其動便無咎艮其腓腓亦是動物故止之不拯其隨是不能拯止其隨限而動也所以其心不快限即腰所在初六咸其拇自是不合動六二咸其腓亦是欲隨股而動動則凶若不動則吉艮其限是截做兩段去淵漸山上有木木漸長則山漸高所以為漸學履漸九三爻雖不好夫征不復婦孕不育卻利禦寇今術家擇日利婚姻底日不宜用兵利相戰底日不宜婚嫁正是此意蓋用兵則要相殺相勝婚姻則要和合故用不同也學履僩同卦中有兩箇孕婦字不知如何取象不可曉淵順相保也言須是上下同心協力相保聚方足以禦寇僩歸妹歸妹未有不好只是說以動帶累他淵兩終字伊川說未安淵月幾望是說陰盛淵豐豐亨王假之須是王假之了方且勿憂宜日中若未到這箇田地更憂甚底王亦未有可憂宜照天下是貼底閑句淵或問豐宜日中宜照天下人君之德如日之中乃能盡照天下否曰易如此看不得只是如日之中則自然照天下不可將作道理解他日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎自是如此物事到盛時必衰雖鬼神有所不能違也問此卦後面諸爻不甚好曰是他忒豐大了這物事盛極去不得了必衰也人君於此之時當如奉盤水戰兢自持方無傾側滿溢之患若才有纖毫騎矜自滿之心即敗矣所以此處極難崇寧中群臣創為豐亨豫大之說當時某論某人曰當豐亨豫大之時而為因陋就簡之說君臣上下動以此藉口於是安意肆志無所不為而大禍起矣僩天地盈虛與時消息而況於人乎況於鬼神乎天地是舉其大體而言鬼神是舉其中運動變化者通上徹下而言如雨風露雷草木之類皆是曰驟雨不終朝自不能久而況其小者乎又曰豐卦彖許多言語其實只在日中則昃月盈則食天地盈虛與時消息數語上這盛得極常須謹謹保守得日中時候方得不然便是偃仆傾壞了又曰這處去危亡只是一間耳須是兢兢如奉盤水方得又曰須是謙抑貶損方可保得又曰這便是康節所謂酩酊離披時候如何不憂危謹畏宣政間有以奢侈為言者小人卻云當豐亨豫大之時須是恁地侈泰方得所以一面放肆如何得不亂王假之尚大也只是王者至此一箇極大底時節所尚者大事耳仲思問動非明則無所之明非動則無所用曰徒明不行則明無所用空明而已徒行不明則行無所向冥行而已伯羽問豐九四近幽暗之君所以有豐其蔀日中見斗之象亦是他本身不中正所致故象云位不當也曰也是如此學蒙豐其屋天際翔也似說如翬斯飛樣言其屋高大到於天際卻只是自蔽障闊或作自是自障礙學蒙淵同九三爻解得便順九四上六二爻不可曉看來聖人會得九四上六爻文義又與三爻不同旅不知聖人特地做一箇卦說這旅則甚淵明慎用刑而不留獄卻只是火在山上之象又不干旅事淵資斧有做齎斧說底這資斧在巽上說也自分曉然而旅中亦豈可無備禦底物事次第這便是淵旅六五上逮也不得如伊川說一矢亡之亡字如秦無亡矢遺鏃之亡不是如伊川之說易中凡言終吉者皆是初不甚好也又曰而今只如這小小文義亦無人去解析得學蒙巽巽卦是於重巽上取義重巽所以為申命淵問重巽重字之義曰只是重卦八卦之象皆是如此問申字是兩番降命令否曰非也只是丁寧反復說便是申命巽風也風之吹物無處不入無物不鼓動詔令之入人淪肌浹髓亦如風之動物也僩學履錄云如命令之丁寧告戒無所不至也問巽順以入於物必極乎下有命令之象而風之為物又能鼓舞萬類所以君子觀其象而申命令曰風便也是會入物事因言丘墓中棺木能翻動皆是風吹蓋風在地中氣聚出地面又散了九二得中所以過於巽為善用史巫紛若吉看來是箇盡誠以祭祀之吉占九三頻巽不比頻復復是好事所以頻復為無咎巽不是甚好底事九三別無伎倆只管今日巽了明日巽自是可吝六四田獲三品伊川主張作巽於上下說說得較牽強無初有終也彷彿是伊川說始未善是無初更之而善是有終自貞吉悔亡以下都是這一箇意思一如坤卦先迷後得以下都只是一箇意思淵九五先庚三日後庚三日不知是如何看來又似設此為卜日之占模樣蠱之先甲三日是辛後甲三日是丁此卦先庚三日亦是丁後庚三日是癸據丁與辛皆是古人祭祀之日但癸日不見用處先庚後庚是說那後面變了底一截淵兌兌說若不是剛中便成邪媚下面許多道理都從這箇剛中柔外來說以先民如利之而不庸順天應人革卦就革命上說兌卦就說上說後人都做應天順人說了到了順天應人是言順天理應人心胡致堂管見中辨這箇也好淵說若不剛中便是違道干譽淵兌巽卦爻辭皆不端的可以移上移下如剝卦之類皆確定移不得不知是如何如和兌商兌之類皆不甚親切為復是解書到末梢會懶了看不子細為復聖人別有意義但先儒解亦皆如此無理會九五只是上比於陰故有此戒渙問萃言王假有廟是卦中有萃聚之象故可以為聚祖考之精神而為享祭之吉占渙卦既散而不聚本象不知何處有可立廟之義將是卦外立義謂渙散之時當聚祖考之精神邪為復是下卦是坎有幽隱之義因此象而設立廟之義邪曰坎固是有鬼神之義然此卦未必是因此為義且作因渙散而立廟說大抵這處都見不得學履此卦只是卜祭吉又更宜涉川王乃在中是指廟中言宜在廟祭祀伊川說得那道理多了他見得許多道理了不肯自做他說須要寄搭放在經上淵渙是散底意思物事有當散底號令當散積聚當散群隊當散淵渙卦亦不可曉只以大意看則人之所當渙者莫甚於己私其次須便渙散其小小群隊合成其大其次便渙散其號令與其居積以用於人其次便渙去患害但六四一爻未見其大好處今爻辭卻說得恁地浩大皆不可曉剛來不窮是九三來做二柔得位而上同是六二上做三此說有些不隱卻為是六三不喚做得位然而某這箇例只是一爻互換轉移無那隔驀兩爻底淵問剛來而不窮窮是窮極來處乎中不至窮極否曰是居二為中若在下則是窮矣學履渙奔其机以卦變言之九二自三來居二得中而不窮所以為安如机之安也六三是自二往居三未為得位以其上同於四所以為得位象辭如此說未密若云六三上應上九為上同恐如此跳過了不得此亦是依文解義說終是不見得九來居二之為安二之於三為得位是如何學蒙奔其机也只是九來做二人事上說時是來就那安處淵渙其躬志在外也是舍己從人意思老蘇云渙之九四曰渙其群元吉夫群者聖人之所欲渙以混一天下者也此說雖程傳有所不及如程傳之說則是群其渙非渙其群也蓋當人心渙散之時各相朋黨不能混一惟九四能渙小人之私群成天下之公道此所以元吉也老蘇天資高又善為文章故此等說話皆達其意大抵渙卦上三爻是以渙濟渙也道夫渙其群乃取老蘇之說是散了小小底群隊併做一箇東坡所謂合小以為大合大以為一又曰如太祖之取蜀取江南皆是渙其群渙有丘之義但不知四爻如何當得此義渙其群言散小群做大群如將小物事幾把解來合做一大把東坡說這一爻最好緣他會做文字理會得文勢故說得合淵渙汗其大號號令當散如汗之出千毛百竅中迸散出來這箇物出不會反卻不是說那號令不當反只是取其如汗之散出自有不反底意思淵渙汗其大號聖人當初就人身上說一汗字為象不為無意蓋人君之號令當出乎人君之中心由中而外由近而遠雖至幽至遠之處無不被而及之亦猶人身之汗出於中而浹於四體也道夫散居積須是在他正位方可淵渙王居無咎象只是節做四字句伊川泥其句所以說得王居無咎差了上九象亦自節了字則此何疑節說以行險伊川之說是也說則欲進而有險在前進去不得故有止節之義又曰節便是阻節之意天地節而四時成天地轉來到這裏相節了更沒去處今年冬盡了明年又是春夏秋冬到這裏冢匝了更去不得這箇折做兩截兩截又折做四截便是春夏秋冬他是自然之節初無人使他聖人則因其自然之節而節之如修道之謂教天秩有禮之類皆是天地則和這箇都無只是自然如此聖人法天做這許多節指出來淵戶庭是初爻之象門庭是第二爻之象戶庭未出去在門庭則已稍去矣就爻位上推戶庭主心門庭主事淵問君子之道貴乎得中節之過雖非中道然愈於不節者如何便會凶九二不出門庭雖是失時亦未失為恬退守節者乃以為凶何也先生沉思良久曰這處便使局定不得若以占言之且只寫下少間自有應處眼下皆未見得若以道理言之則有可為之時乃不出而為之這便是凶之道不是別更有凶又曰時乎時不再來如何可失安節是安穩自在甘節是不辛苦喫力底意思甘便對那苦甘節與禮之用和為貴相似不成人臣得甘節吉時也要節天下大率人一身上各自有箇當節底淵節卦大抵以當而通為善觀九五中正而通本義云坎為通豈水在中間必流而不止邪曰然又問觀節六爻上三爻在險中是處節者也故四在險初而節則亨五在險中而節則甘上在險終雖苦而無悔蓋節之時當然也下三爻在險外是未至於節而預知所節之義初知通塞故無咎二可行而反節三見險在前當節而又以陰居剛不中正而不能節所以三爻凶而有咎不知是如此否曰恁地說也說得然九二一爻看來甚好而反云凶終是解不穩學履中孚問中孚孚字與信字恐亦有別曰伊川云存於中為孚見於事為信說得極好因舉字說孚字從爪從子如鳥抱子之象今之乳字一邊從孚蓋中所抱者實有物也中間實有物所以人自信之學履中孚小過兩卦鶻突不可曉小過尤甚如云弗過防之則是不能過防之也四字只是一句至弗過遇之與弗遇過之皆是兩字為絕句意義更不可曉學蒙中孚與小過都是有飛鳥之象中孚是箇卵象是鳥之未出殼底孚亦是那孚膜意思所以卦中都說鳴鶴翰音之類翰音登天言不知變者蓋說一向恁麼去不知道去不得這兩卦十分解不得且只依稀地說豚魚吉這卦中他須見得有豚魚之象今不可考占法則莫須是見豚魚則吉如鳥占之意象若十分理會著便須穿鑿淵柔在內剛得中這箇是就全體看則中虛就二體看則中實他都見得有孚信之意故喚作中孚伊川這二句說得好他只遇著這般齊整底便恁地說去若遇不齊整底便說不去淵問澤上有風中孚風之性善入水虛而能順承波浪洶湧惟其所感有相信從之義故為中孚曰也是如此風去感他他便相順有相孚之象又曰澤上有風中孚須是澤中之水海即澤之大者方能信從乎風若溪湍之水則其性急流就下風又不奈他何議獄緩死只是以誠意求之澤上有風感得水動議獄緩死則能感人心淵問中孚是誠信之義議獄緩死亦誠信之事故君子盡心於是曰聖人取象有不端確處如此之類今也只得恁地解但是不甚親切九二爻自不可曉看來我有好爵吾與爾靡之是兩箇都要這物事所以鶴鳴子和是兩箇中心都愛所以相應如此因云潔淨精微之謂易自是懸空說箇物在這裏初不惹著那實事某嘗謂說易如水上打毬這頭打來那頭又打去都不惹著水方得今人說都打入水裏去了胡泳錄云讀易如水面打毬不沾著水方得若著水便不活了今人都要按從泥裏去如何看得學履鶴鳴子和亦不可曉好爵爾靡亦不知是說甚底繫辭中又說從別處去淵問中孚六三大義是如何曰某所以說中孚小過皆不可曉便是如此依文解字看來只是不中不正所以歌泣喜樂都無常也學履小過中孚有卵之象小過中間二畫是鳥腹上下四陰為鳥翼之象鳥出乎卵此小過所以次中孚也學蒙小過大率是過得不多如大過便說獨立不懼小過只說這行喪用都只是這般小事伊川說那禪讓征伐也未說到這箇大概都是那過低過小底飛鳥遺音雖不見得遺音是如何大概且恁地說淵小過是過於慈惠之類大過則是剛嚴果毅底氣象淵小過小者過而亨不知小者是指甚物事學蒙飛鳥遺之音本義謂致飛鳥遺音之應如何曰看這象似有羽蟲之孽之意如賈誼鵩鳥之類學履山上有雷小過是聲在高處下來是小過之義飛鳥遺之音也是自高處放聲下來學履小過是小事又是過於小如行過乎恭喪過乎哀用過乎儉皆是過於小退後一步自貶底意思燾行過恭用過儉皆是宜下之意學履初六飛鳥以凶只是取其飛過高了不是取遺音之義學蒙三父四祖五便當妣過祖而遇妣是過陽而遇陰然而陽不可過則不能及六五卻反回來六二上面淵九四弗過遇之過遇猶言加意待之也上六弗遇過之疑亦當作弗過遇之與九三弗過防之文體正同淵九四弗過遇之一句曉不得所以下兩句都沒討頭處又曰此爻小象恐不得如伊川說以長字為上聲勿用永貞便是不可長久勿用永貞是莫常常恁地又曰莫一向要進終不可長也爻義未明此亦當闕僩密雲不雨大概是做不得事底意思淵弋是俊壯底意卻只弋得這般物事淵問協韻曰小過初六不可如何也六二臣不可過也九三凶如何也自是協了九四又轉韻若仍從平聲位不當也終不可長也便是協了六五已上也上字作平聲上六已亢也便也是平聲疑自當字以下不然蓋十一唐中上字無平聲若從側聲但終不可長也長字作音仗則當字上字亢字皆協矣皆在四十一漾韻中既濟亨小當作小亨大率到那既濟了時便有不好去所以說小亨如唐時貞觀之盛便向那不好去淵既濟是已濟了大事都亨只小小底正在亨通若能戒懼得常似今日便好不然便一向不好去伊川意亦是如此但要說做亨小所以不分曉又曰若將濟便是好今已濟便只是不好去了學蒙初吉終亂便有不好在末後底意思淵高宗伐鬼方疑是高宗舊日占得此爻故聖人引之以證此爻之吉凶如箕子之明夷利貞帝乙歸妹皆恐是如此又曰漢去古未遠想見卜筮之書皆存如漢文帝之占大橫庚庚都似左傳時人說話又曰夏啟以光想是夏啟曾占得此卦學蒙問三年克之憊也言用兵是不得已以高宗之賢三年而克鬼方亦不勝其憊矣曰言兵不可輕用也學履問既濟上三爻皆漸漸不好去蓋出明而入險四有衣袽之象曰有所疑也便是不好底端倪自此已露五殺牛則已自過盛上濡首則極而亂矣不知如何曰然時運到那裏都過了康節所謂飲酒酩酊開花離披時節所以有這樣不好底意思出來學履六四以柔居柔能慮患豫防蓋是心低小底人便能慮事柔善底人心不癞慮事細密剛果之人心癞不解如此淵既濟初九義無咎也咎字上聲六二以中道也道亦上聲音斗九三換平聲憊字通入備字改作平聲則音皮六四有所疑九五不如西鄰之時又吉大來也來字音黎上六何可久也久與己通己字平聲為期未濟取狐為象上象頭下象尾淵問未濟所以亨者謂之未濟便是有濟之理但尚遲遲故謂之未濟而柔得中又自有亨之道曰然小狐汔濟汔字訓幾與井卦同既曰幾便是未濟未出坎中不獨是說九二爻通一卦之體皆是未出乎坎險所以未濟學履本注云士毅本記此段尤詳但今未見黃本不續終也是首濟而尾濡不能濟蓋不相接續去故曰不續終也狐尾大濡其尾則濟不得矣學履易不是說殺底物事只可輕輕地說若是確定一爻吉一爻凶便是揚子雲太玄了易不恁地兩卦各自說濡尾濡首不必拘說在此言首在彼言尾大概既濟是那日中衙晡時候盛了只是向衰去未濟是五更初時只是向明去聖人當初見這箇爻裏有這箇意思便說出這一爻來或是從陰陽上說或是從卦位上說他這箇說得散漫不恁地逼拶他他這箇說得疏到他密時盛水不漏到他疏時疏得無理會若只要就名義上求他便是今人說易了大失他易底本意周公做這爻辭只依稀地見這箇意便說這箇事出來大段散漫趙子欽尚自嫌某說得疏不知如今煞有退削了處譬如箇燈籠安四箇柱這柱已是礙了明若更剔去得豈不更是明亮所以說不可為典要可見得他散漫淵未濟與既濟諸爻頭尾相似中間三四兩爻如損益模樣顛倒了他曳輪濡尾在既濟為無咎在此卦則或吝或貞吉這便是不同了淵曳輪濡尾是只爭些子時候是欲到與未到之間不是不欲濟是要濟而未敢輕濟如曹操臨敵意思安閑如不欲戰老子所謂猶若冬涉川之象涉則必竟涉只是畏那寒了未敢便涉淵初六亦不知極也極字猶言極則又曰猶言界至也亦不知極也極字未詳考上下韻亦不協或恐是敬字今且闕之僩未濟九四與上九有字皆不可曉只得且依稀如此說又曰益損二卦說龜一卦在二爻一卦在五爻是顛倒此卦與既濟說伐鬼方亦顛倒不知是如何學蒙看來未濟只陽爻便好陰爻便不好但六五上九兩爻不如此六五謂其得中故以為吉上九有可濟時之才又當未濟之極可以濟矣亦云不吉更曉不得學蒙問未濟上九以陽居未濟之極宜可以濟而反不善者竊謂未濟則當寬靜以待九二九四以陽居陰皆當靜守上九則極陽不中所以如此曰也未見得是如此大抵時運既當未濟雖有陽剛之才亦無所用況又不得位所以如此學履問居未濟之時未可動作初六柔不能固守而輕進故有濡尾之吝九二陽剛得中得正曳其輪而不進所以貞吉曰也是如此大概難曉某解也且備禮依眾人解說又曰坎有輪象所以說輪大概未濟之下卦皆是未可進用濡尾曳輪皆是此意六三未離坎體也不好到四五已出乎險方好上九又不好又曰濡首分明是狐過水而濡其首今象卻云飲酒濡首皆不可曉嘗有人著書以彖象文言為非聖人之書只是而今也著與孔子分疏本云只是似這處貴分疏所以有是說既濟未濟所謂濡尾濡首分明是說野狐過水今孔子解云飲酒濡首亦不知是如何只是孔子說人便不敢議他人便恁地不得厲
