body:
  text: 朱子語類卷第一百一程子門人總論問程門誰真得其傳曰也不盡見得如劉質夫朱公掞張思叔輩又不見他文字看程門諸公力量見識比之康節橫渠皆趕不上義剛程子門下諸公便不及所以和靖云見伊川不曾許一人或問伊川稱謝顯道王佐才有諸和靖云見伊川說謝顯道好只是不聞王佐才之語劉子澄編續近思錄取程門諸公之說某看來其間好處固多但終不及程子難於附入璘必大錄云程門諸先生親從二程子何故看他不透子澄編近思續錄某勸他不必作蓋接續二程意思不得伊川之門謝上蔡自禪門來其說亦有差張思叔最後進然深惜其早世使天予之年殆不可量其他門人多出仕宦四方研磨亦少楊龜山最老其所得亦深謙謂思叔持守不及和靖乃伊川語非特為品藻二人蓋有深意和靖舉以語人亦非自是乃欲人識得先生意耳若以其自是之嫌而不言則大不是將無處不窒礙矣鎬呂與叔文集煞有好處他文字極是實說得好處如千兵萬馬飽滿伉壯上蔡雖有過當處亦自是說得透龜山文字卻怯弱似是合下會得易某嘗說看文字須以法家深刻方窮究得盡某直是得下工閎祖上蔡多說過了龜山巧又別是一般巧得又不好范諫議說得不巧然亦好和靖又忒不巧然意思好振問尹和靖立朝議論曰和靖不觀他書只是持守得好它語錄中說涵養持守處分外親切有些朝廷文字多是呂稽中輩代作問龜山立朝卻有許多議論曰龜山雜博是讀多少文字德明看道理不可不子細程門高弟如謝上蔡游定夫楊龜山輩下梢皆入禪學去必是程先生當初說得高了他們只見一截少下面著實工夫故流弊至此義剛游楊謝三君子初皆學禪後來餘習猶在故學之者多流於禪游先生大是禪學德明一日論伊川門人云多流入釋氏文蔚曰只是游定夫如此恐龜山輩不如此曰只論語序便可見文蔚龜山少年未見伊川時先去看莊列等文字後來雖見伊川然而此念熟了不覺時發出來游定夫尤甚羅仲素時復亦有此意洛問程門諸公親見二先生往往多差互如游定夫之說多入於釋氏龜山亦有分數曰定夫極不濟事以某觀之二先生衣缽似無傳之者又問上蔡議論莫太過曰上蔡好於事上理會理卻有過處又問和靖專於主敬集義處少曰和靖主敬把得定亦多近傍理龜山說話頗淺狹范淳夫雖平正而亦淺又問嘗見震澤記善錄彼親見伊川何故如此之差曰彼只見伊川面耳曰中無倚著之語莫亦有所自來曰卻是伊川語可學游楊謝諸公當時已與其師不相似卻似別立一家謝氏發明得較精彩然多不穩貼和靖語卻實然意短不似謝氏發越龜山語錄與自作文又不相似其文大故照管不到前面說如此後面又都反了緣他只依傍語句去皆是不透龜山年高與叔年四十七他文字大綱立得腳來健有多處說得好又切若有壽必煞進游定夫學無人傳無語錄他晚年嗜佛在江湖居多有尼出入其門他眼前分曉信得及底儘踐履得到其變化出入處看不出便從釋去亦是不透和靖在虎丘每旦起頂禮佛鄭曰亦念金剛經他因趙相入侍講筵那時都說不出都柰何不得人責他事業答曰每日只講兩行書如何做得致君澤民事業高宗問程某道孟子如何答曰程某不敢疑孟子如此則是孟子亦有可疑處只不敢疑爾此處更當下兩語卻住了他也因患難後心神耗了龜山那時亦不應出侯師聖太粗疏李先生甚輕之來延平看親羅仲素往見之坐少時不得只管要行此亦可見其粗疏處張思叔敏似和靖伊川稱其朴茂然亦狹無展拓氣象收得他雜文五六篇其詩都似禪緣他初是行者出身郭沖晦有易文字說易卦都從變上推問一二卦推得豈可都要如此近多有文字出無可觀周恭叔謝用休趙彥道鮑若雨那時溫州多有人然都無立作王信伯乖鄭問它說中無倚著又不取龜山不偏說何也曰他謂中無偏倚故不取不偏說鄭曰胡文定只上蔡處講得些子來議論全似上蔡如獲麟以天自處等曾漸又胡文定處講得些子曰文定愛將聖人道理張大說都是勉強如此不是自然流出曾漸多是禪淳學者氣質上病最難救如程門謝氏便如師也過游與楊便如商也不及皆是氣質上病向見無為一醫者善用鍼嘗云是病可以鍼而愈惟胎病為難治必大蔡云不知伊川門人如此其眾何故後來更無一人見得親切或云游楊亦不久親炙曰也是諸人無頭無尾不曾盡心存上面也各家去奔走仕宦所以不能理會得透如邵康節從頭到尾極終身之力而後得之雖其不能無偏然就他這道理所謂成而安矣如茂叔先生資稟便較高他也去仕宦只他這所學自是從合下直到後來所以有成某看來這道理若不是生盡死去理會終不解得書曰若藥不瞑眩厥疾不瘳須喫些苦極方得蔡云上蔡也雜佛老曰只他見識又高蔡云上蔡老氏之學多龜山佛氏之說多游氏只雜佛呂與叔高於諸公曰然這大段有筋骨惜其早死若不早死也須理會得到蔡又因說律管云伊川何不理會想亦不及理會還無人相共理會然康節所理會伊川亦不理會曰便是伊川不肯理會這般所在賀孫程門諸子在當時親見二程至於釋氏卻多看不破是不可曉觀中庸說中可見如龜山云吾儒與釋氏其差只在秒忽之間某謂何止秒忽直是從源頭便不同伯豐問崇正辨如何曰崇正辨亦好伯豐曰今禪學家亦謂所辨者皆其門中自不以為然曰不成吾儒守三綱五常若有人道不是亦可謂吾儒自不以為然否又問此書只論其跡曰論其跡亦好伊川曰不若只於跡上斷畢竟其跡是從那裏出來胡明仲做此書說得明白若五峰說話中辨釋氏處卻糊塗闢他不倒皇王大紀中亦有數段亦不分曉上蔡之學初見其無礙甚喜之後細觀之終不離禪底見解如洒掃應對處此只是小子之始學程先生因發明雖始學然其終之大者亦不離乎此上蔡於此類處便說得大了道理自是有小有大有初有終若如此說時便是不安於其小者初者必知其中有所謂大者方安為之如曾子三省處皆只是實道理上蔡於小處說得亦大了記二先生語云才得後便放開不然只是守此語記亦未備得了自然開如何由人放開此便是他病處諸家語錄自然要就所錄之人看上蔡大率張皇不妥帖更如游楊解書之類多使聖人語來反正如解不亦樂乎便云學之不講為憂有朋友講習豈不樂乎之類亦不自在大率諸公雖親見伊川皆不得其師之說振程門弟子親炙伊川亦自多錯蓋合下見得不盡或後來放倒蓋此理無形體故易差有百般滲漏去偽程門諸高弟覺得不快於師說只為他自說得去文蔚古之聖賢未嘗說無形影話近世方有此等議論蓋見異端好說玄說妙思有以勝之故亦去玄妙上尋不知此正是他病處如孟子說反身而誠本是平實伊川亦說得分明到後來人說時便如空中打箇筋斗然方其記錄伊川語元不錯及自說出來便如此必是聞伊川說時實不得其意耳必大問郭沖晦何如人曰西北人氣質重厚淳固但見識不及如兼山易中庸義多不可曉不知伊川晚年接人是如何問游楊諸公早見程子後來語孟中庸說先生猶或以為疏略何也曰游楊諸公皆才高又博洽略去二程處參較所疑及病敗處各能自去求雖其說有疏略處然皆通明不似兼山輩立論可駭也德明周恭叔學問自是靠不得方朱公掞文字有幅尺是見得明也方南軒云朱公掞奏狀說伊川不著先生云不知如何方是說著大意只要說得實便好如伊川說物便到四凶上及呂與叔中庸皆說實話也方李朴先之大概是能尊尚道學但恐其氣剛亦未能遜志於學問道夫學者宜先看遺書次看和靖文字後乃看上蔡文字以發光彩且亦可不迷其說也方季通語呂與叔呂與叔惜乎壽不永如天假之年必所見又別程子稱其深潛縝密可見他資質好又能涵養某若只如呂年亦不見得到此田地矣五福說壽為先者此也友仁有為呂與叔挽詩云曲禮三千目躬行四十年方呂與叔中庸義典實好看又有春秋周易解方呂與叔云聖人以中者不易之理故以之為教如此則是以中為一好事用以立教非自然之理也先生曰此是橫渠有此說所以橫渠沒門人以明誠中子謚之與叔為作謚議蓋支離也西北人勁直才見些理便如此行去又說出時其他又無人曉只據他一面說去無朋友議論所以未精也振呂與叔本是箇剛底氣質涵養得到所以如此故聖人以剛之德為君子柔為小人若有其剛矣須除去那剛之病全其與剛之德相次可以為學若不剛終是不能成有為而言卓看呂與叔論選舉狀立士規以養德厲行更學制以量才進藝定貢法以取賢斂才立試法以試用養才立辟法以興能備用立舉法以覆實得人立考法以責任考功先生曰其論甚高使其不死必有可用呂與叔後來亦看佛書朋友以書責之呂云某只是要看他道理如何其文集上雜記亦多不純想後來見二程了卻好呂與叔集中有與張天驥書是天驥得一書與他云我心廣大如天地視其形體之身但如螻蟻此也不足辨但偶然是有此書張天驥便是東坡與他做放鶴亭記者即雲龍處士徐州人心廣大後方能體萬物蓋心廣大則包得那萬物過故能體此體猶體群臣之體義剛呂與叔論顏子等處極好龜山云云未是可學呂與叔有一段說輪回可學謝顯道上蔡高邁卓絕言論宏肆善開發人若海上蔡語雖不能無過然都是確實做工夫來道夫問人之病痛不一各隨所偏處去上蔡才高所以病痛盡在矜字曰此說是人傑謝氏謂去得矜字後來矜依舊在說道理愛揚揚地淳或問謝上蔡以覺言仁是如何曰覺者是要覺得箇道理須是分毫不差方能全得此心之德這便是仁若但知得箇痛癢則凡人皆覺得豈盡是仁者耶醫者以頑痺為不仁以其不覺故謂之不仁不覺固是不仁然便謂覺是仁則不可時舉問上蔡說仁本起於程先生引醫家之說而誤曰伊川有一段說不認義理最好只以覺為仁若不認義理只守得一箇空心覺何事可學上蔡以知覺言仁只知覺得那應事接物底如何便喚做仁須是知覺那理方是且如一件事是合做與不合做覺得這箇方是仁喚著便應抉著便痛這是心之流注在血氣上底覺得那理之是非這方是流注在理上底喚著不應抉著不痛這箇是死人固是不仁喚得應抉著痛只這便是仁則誰箇不會如此須是分作三截看那不關痛癢底是不仁只覺得痛癢不覺得理底雖會於那一等也不便是仁須是覺這理方是植問謝氏以覺訓仁謂仁為活物要於日用中覺得活物便見仁體而先生不取其說何也曰若是識得仁體則所謂覺所謂活物皆可通也但他說得自有病痛畢竟如何是覺又如何是活物又卻別將此箇意思去覺那箇活物方寸紛擾何以為仁如說克己復禮己在何處克又如何豈可以活物覺之而已也謨問上蔡以覺訓仁莫與佛氏說異若張子韶之說則與上蔡不同曰子韶本無定論只是迅筆便說不必辨其是非某云佛氏說覺卻只是說識痛癢曰上蔡亦然又問上蔡說覺乃是覺其理曰佛氏亦云覺理此一段說未盡客至起可學上蔡云釋氏所謂性猶吾儒所謂心釋氏所謂心猶吾儒所謂意此說好閎祖問上蔡說佛氏目視耳聽一段比其它說佛處此最當曰固是但不知渠說本體是何性若不指理卻錯了可學因論上蔡語錄中數處如云見此消息不下工夫之類乃是謂佛儒本同而所以不同但是下截耳龜山亦如此某謂明道云以吾觀於佛疑於無異然而不同曰上蔡有觀復堂記云莊列之徒云云言如此則是聖人與莊列同只是言有多寡耳觀它說復又卻與伊川異似以靜處為復湖州刻伊川易傳後有謝跋云非全書伊川嘗約門人相聚共改未及而沒使當初若經他改豈不錯了龜山又有一書亦改刪伊川易遺書中謝記有一段下注云鄭轂親見轂嘗云曾見上蔡每說話必覆巾掀髯攘臂方錄云鄭轂言上蔡平日說話到掀舉處必反袖以見精采某曰若他與朱子發說論語大抵是如此曰以此語學者不知使之從何入頭可學上蔡觀復齋記中說道理皆是禪學底意思義剛問上蔡學佛欲免輪回一段曰答辭似不甚切可學上蔡語錄論佛處乃江民表語民表為諫官甚有可觀只是學佛當初是人寫江語與謝語共一冊遂誤傳作謝語唯室先生陳齊之有辨辨此甚明璘國秀問上蔡說橫渠以禮教人其門人下梢頭低只溺於刑名度數之間行得來困無所見處如何曰觀上蔡說得又自偏了這都看不得禮之大體所以都易得偏如上蔡說橫渠之非以為欲得正容謹節這自是好如何廢這箇得如專去理會刑名度數固不得又全廢了這箇也不得如上蔡說便非曾子籩豆則有司存本末並見之意後世如有作者必不專泥於刑名度數亦只整頓其大體如孟子在戰國時己自見得許多瑣碎不可行故說喪服經界諸處只是理會大體此便是後來要行古禮之法賀孫問上蔡云陰陽交而有神形氣離而有鬼知此者為智事此者為仁上兩句只是說伸而為神歸而為鬼底意思曰是如此問事此者為仁只是說能事鬼神者必極其誠敬以感格之所以為仁否曰然問謝又云可者使人格之不使人致死之可者是可以祭祀底否曰然問禮謂致生為不知此謂致生為知曰那只是說明器如三日齋七日戒直是將做箇生底去祭他方得問謝又云致死之故其鬼不神曰你心不向他便無了問且如淫祠自有靈應如何便會無曰昔一僧要破地獄人教他念破地獄沟偏無討這沟處一僧與云遍觀法界性四句便是或云只是一切惟心造曰然又問齋戒只是要團聚自家精神然自家精神即祖考精神不知天地山川鬼神亦只以其來處一般否曰是如此天子祭天地諸侯祭封內山川是他是主如古人祭墓亦只以墓人為尸胡泳鬼神上蔡說得好只覺得陰陽交而有神之說與後神字有些不同只是他大綱說得極好如曰可者使人格之不使人致死之可者是合當祭如祖宗父母只須著盡誠感格之不要人便做死人看待他不可者使人遠之不使人致生之不可者是不當祭如閑神野鬼聖人便要人遠之不要人做生人看待他可者格之須要得他來不可者遠之我不管他便都無了精氣為物遊魂為變天地陰陽之氣交合便成人物到得魂氣歸於天體魄降於地是為鬼便是變了說魂則魄可見賀孫叔器問上蔡說鬼神云道有便有道無便無初看此二句與有其誠則有其神無其誠則無其神一般而先生前夜言上蔡之語未穩如何曰有其誠則有其神無其誠則無其神便是合有底我若誠則有之不誠則無之道有便有道無便無便是合有底當有合無底當無上蔡而今都說得粗了合當道合有底從而有之則有合無底自是無了便從而無之今卻只說道有便有道無便無則不可義剛上蔡言鬼神我要有便有以天地祖考之類要無便無以非其鬼而祭之者你氣一正而行則彼氣皆散矣揚上蔡曾有手簡云大事未辦李先生謂不必如此死而後已何時是辦方上蔡曰人不可無根便是難所謂根者只管看便是根不是外面別討箇根來上蔡說先有知識以敬涵養似先立一物了方上蔡云誠是實理不是專說是理後人便只於理上說不於心上說未是可學上蔡言無窮者要當會之以神是說得過當只是於訓詁處尋繹踐履去自然下學上達賀孫上蔡云見於作用者心也謂知而動者便是先生云本體是性動者情兼體動靜者心性靜情動心方以下數條方問上蔡語錄養心不如悅心先生云不如字恐有之淺近字恐伊川未必爾此錄已傳兩手可疑悅心說更舉出處看理義是本有自能悅心在人如行慊於心心之窮物有盡而天者無盡先生云得其本則用之無窮不須先欲窮知其無窮也放開只守追記語中說得頗別似謂放開是自然豁開乃得之效未得則只是守此錄中語不安敬則與事為一先生云此與明道伊川說別今胡文定一派要身親格者是宗此意說何思何慮處伊川本不許上蔡卻自擔當取也讀語錄及易傳可見這同上上蔡家始初極有好玩後來為克己學盡舍之後來有一好硯亦把與人方曾恬天隱嘗問上蔡云云上蔡曰用得底便是以其說絮故答以是又嘗問恭敬字同異曰異如何異曰恭平聲敬仄聲上蔡英發故胡文定喜之想見與游楊說話時悶也揚如今人說道愛從高妙處說便說入禪去自謝顯道以來已然向時有一陳司業名可中專一好如此說如說如何是伊尹樂堯舜之道他便去下面下一語云江上一犁春雨如此等類煞有亦煞有人從它只是不靠實自是說他一般話謙楊中立龜山天資高朴實簡易然所見一定更不須窮究某嘗謂這般人皆是天資出人非假學力如龜山極是簡易衣服也只據見定終日坐在門限上人犯之亦不較其簡率皆如此道夫榦嘗聞先生云坐在門外石坐子上今云門限記之誤也方錄云龜山有時坐門限上李先生云某即斷不敢龜山解文字著述無綱要方龜山文字議論如手捉一物正緊忽墜地此由其氣弱龜山詩文說道理之類才說得有意思便無收殺揚曰是道理不透否曰雖然亦是氣質弱然公平無病五峰說得卻緊然卻有病程先生少年文字便好如養魚記顏子論之類揚龜山言天命之謂性人欲非性也天命之善本是無人欲不必如此立說知言云天理人欲同體而異用同行而異情自是它全錯看了德明龜山與范濟美言學者須當以求仁為要求仁則剛毅木訥近仁一言為要先生曰今之學者亦不消專以求仁為念相將只去看說仁處他處盡遺了須要將一部論語粗粗細細一齊理會去自然有貫通處卻會得仁方好又今人說曾子只是以魯得之蓋曾子是資質省力易學設使如今人之魯也不濟事范濟美博學高才俊甚故龜山只引剛毅木訥告之非定理也問龜山言道非禮則蕩而無止禮非道則梏於器數儀章之末則道乃是一虛無恍惚無所準則之物何故如此說道字曰不可曉此類甚多因問如此說則似禪矣曰固是其徒如蕭子莊李西山陳默堂皆說禪龜山沒西山嘗有佛經疏追薦之唯羅先生卻是著實子細去理會某舊見李先生時說得無限道理也曾去學禪李先生云汝恁地懸空理會得許多而面前事卻又理會不得道亦無玄妙只在日用間著實做工夫處理會便自見得後來方曉得他說故今日不至無理會耳銖龜山彈蔡京亦是只不迅速擇之曰龜山晚出一節亦不是曰也不干晚出事若出來做得事也無妨他性慢看道理也如此平常處看得好緊要處卻放緩了做事都渙散無倫理將樂人性急粗率龜山卻恁寬平此是間氣然其粗率處依舊有土風在義剛或問龜山晚年出處不可曉其召也以蔡京然在朝亦無大建明曰以今觀之則可以追咎當時無大建明若自家處之不知當時所以當建明者何事或云不過擇將相為急曰也只好說擇將相固是急然不知當時有甚人可做當時將只說种師道相只說李伯紀然固皆嘗用之矣又況自家言之彼亦未便見聽據當時事勢亦無可為者不知有大聖賢之才如何爾僩問龜山晚年出得是否曰出如何不是只看出得如何當初若能有所建明而出則勝於不出曰渠用蔡攸薦蔡老令攸薦之亦未是曰亦不妨當時事急且要速得一好人出來救之只是出得來不濟事耳觀渠為諫官將去猶惓惓於一對已而不得對及觀其所言第一正心誠意意欲上推誠待宰執第二理會東南綱運當時宰執皆庸繆之流待亦不可不行亦不可不告以窮理而告以正心誠意賊在城外道途正梗縱有東南綱運安能達所謂雖有粟安得而食諸當危急之時人所屬望而著數乃如此所以使世上一等人笑儒者以為不足用正坐此耳可學草堂先生及識元城龜山龜山之出時已七十歲卻是從蔡攸薦出他那時覺得這邊扶持不得事勢也極故要附此邊人所以薦龜山初緣蔡攸與蔡子應說令其薦舉人才答云太師用人甚廣又要討甚麼人曰緣都是勢利之徒恐緩急不可用有山林之人可見告他說某只知鄉人鼓山下張觷字柔直其人甚好蔡攸曰家間子姪未有人教可屈他來否此人即以告張張即從之及教其子弟儼然正師弟子之分異於前人得一日忽開諭其子弟以奔走之事其子弟駭愕即告之曰若有賊來先及汝等汝等能走乎子弟益驚駭謂先生失心以告老蔡老蔡因悟曰不然他說得是蓋京父子此時要喚許多好人出已知事變必至即請張公叩之張言天下事勢至此已不可救只得且收舉幾箇賢人出以為緩急倚仗耳即令張公薦人張公於是薦許多人龜山在一人之數今龜山墓誌云會有告大臣以天下將變宜急舉賢以存國於是公出正謂此張後為某州縣丞到任即知虜人入寇必有自海道至者於是買木為造船之備踰時果然虜自海入寇科州縣造舟倉卒擾擾油灰木材莫不踊貴獨張公素備不勞而辦以此見知於帥憲知南劍會葉鐵入寇民大恐他即告諭安存之率城中諸富家令出錢米沽酒買肉為蒸糊之類遂分民兵作三替逐替燕犒酒食授以兵器先一替出城與賊接戰即犒第二替出先替未倦而後替即得助之民大喜遂射殺賊首富民中有識葉鐵者即厚勞之勿令執兵只令執長鎗上懸白旗令見葉鐵即以白旗指向之眾上了弩即其所指而發遂中之後都統任某欲爭功亦讓與之其餘諸盜卻得都統之力放賊之叔父以成反間賀孫儒用錄別出問龜山出處之詳曰蔡京晚歲漸覺事勢狼狽亦有隱憂其從子應之文蔚錄云君謨之孫與他敘譜自興化來因訪問近日有甚人才應之愕然曰今天下人才盡在太師陶鑄中某何人敢當此問京曰不然覺得目前盡是面諛脫取官職去底人恐山林間有人才欲得知應之曰太師之問及此則某不敢不對福州有張觷字柔直者抱負不苟觷平日與應之相好時適赴吏部應之因舉其人以告遂賓致之為塾客然亦未暇與之相接柔直以師道自尊待諸生嚴厲異於他客諸生已不能堪一日呼之來前曰汝曹曾學走乎諸生曰某尋常聞先生長者之教但令緩行柔直曰天下被汝翁作壞了早晚賊發火起首先到汝家若學得走緩急可以逃死諸子大驚走告其父曰先生忽心恙云云京聞之矍然曰此非汝所知也即入書院與柔直傾倒因訪策焉柔直曰今日救時已是遲了只有收拾人才是第一義京因叩其所知遂以龜山為對龜山自是始有召命今龜山墓誌中有是時天下多故或說當世貴人以為事至此必敗宜引耆德老成置諸左右開道上意云者蓋為是也柔直後守南劍設方略以拒范汝為全活一城甚得百姓心其去行在所也買冠梳雜碎之物不可勝數從者莫測其所以後過南劍老稚迎拜者相屬於道柔直一一拊勞之且以所置物分遺至今廟食郡中陳德本云柔直與李丞相極厚善其卒也丞相以詩哭之云中原未恢復天乃喪斯人儒用按鄉先生羅祕丞日錄柔直嘗知鼎州祕丞罷舒州士曹避地於鄉之石牛寨與之素昧平生時方道梗柔直在湖南乃宛轉寄詩存問云曾聞避世門金馬何事投身寨石牛千里重湖方鼎沸可能同上岳陽樓則其汲汲人物之意亦可見矣是詩夷堅志亦載但以為袁司諫作非也又按玉溪文集云柔直嘗知贛州招降盜賊云蔡京在政府問人材於其族子蔡子應端明之孫以張柔直對張時在部注擬京令子應招之授以問館張至以師禮自尊京之子弟怪之一日張教京家子弟習走其子弟云從來先生教某們慢行今令習走何也張云乃公作相久敗壞天下相次盜起先殺汝家人惟善走者可脫何得不習家人以為心風白京京愀然曰此人非病風召與語問所以扶救今日之道及人材可用者張公遂言龜山楊公諸人姓名自是京父子始知有楊先生德明問龜山當時何意出來曰龜山做人也苟且是時未免祿仕故胡亂就之苟可以少行其道龜山之志也然來得已不是及至又無可為者只是說得那沒緊要底事當此之時苟有大力量咄嗟間真能轉移天下之事來得也不枉既不能然又只是隨眾鶻突及欽宗即位為諫議大夫因爭配享事為孫仲益所攻孫言楊某曩常與蔡京諸子游今眾議攻京而楊某曰慎毋攻居安云云龜山遂罷又曰蔡京當國時其所收拾招引非止一種諸般名色皆有及淵聖即位在朝諸人盡攻蔡京且未暇顧國家利害朝廷若索性貶蔡京過嶺也得一事了今日去幾官分司西京明日去幾官又移某州後日又移某州至潭州而京病死自此一年間只理會得箇蔡京這後面光景迫促了虜人之來已不可遏矣京有四子攸絛翛鞗鞗尚主絛曾以書諫其父徽宗怒令京行遣一家弄得不成模樣更不堪說攸翛後被斬是時王黼童貫梁師成輩皆斬此數人嘗欲廢立欽宗平日不平之故也及高宗初立時猶未知辨別元祐熙豐之黨故用汪黃不成人才汪黃又小人中之最下最無能者及趙丞相居位方稍能辨別亦緣孟后居中力與高宗說得透了高宗又喜看蘇黃輩文字故一旦覺悟而自惡之而君子小人之黨始明僩龜山裂裳裹足自是事之變在家亦無可為雖用治蠱之說然文定云若從其言亦救得一半先生云若用其言則議論正議論正則小人不得用然龜山亦言天下事當時排正論者耿南仲馮澥二人之力為多二人竟敗國南仲上言或者以王氏學不可用陛下觀祖宗時道德之學人才兵力財用能如熙豐時乎陛下安可輕信一人之言以變之批答云頃以言者如何如何今聞師傅之臣言之如此若不爾幾誤也前日指揮更不施行方問龜山晚歲一出為士子詬罵果有之否曰他當時一出追奪荊公王爵罷配享夫子且欲毀劈三經板士子不樂遂相與聚問三經有何不可輒欲毀之當時龜山亦謹避之問或者疑龜山此出為無補於事徒爾紛紛或以為大賢出處不可以此議如何曰龜山此行固是有病但只後人又何曾夢到他地位在惟胡文定以柳下惠援而止之而止比之極好道夫龜山之出人多議之惟胡文定之言曰當時若能聽用決須救得一半此語最公蓋龜山當此時雖負重名亦無殺活手段若謂其懷蔡氏汲引之恩力庇其子至有謹勿擊居安之語則誣矣幸而此言出於孫覿人自不信儒用坐客問龜山立朝事曰胡文定論得好朝廷若委吳元忠輩推行其說決須救得一半不至如後來狼狽然當時國勢已如此虜初退後便須急急理會如救焚拯溺諸公今日論蔡京明日論王黼當時姦黨各已行遣了只管理會不休擔閣了日子如吳元忠李伯紀向來亦是蔡京引用免不得略遮庇只管喫人議論龜山亦被孫覿輩窘擾德明問龜山云消息盈虛天且不能暴為之去小人亦不可驟如何曰只看時如何不可執天亦有迅雷風烈之時德明伯夷微似老子胡文定作龜山墓誌主張龜山似柳下惠看來是如此僩孫覿見龜山撰曾內翰行狀曰楊中立卻會做文字先生曰龜山曾理會文字來李先生嘗云人見龜山似不管事然甚曉事也方李先生言龜山對劉器之言為貧文定代云竿木云云不若龜山之遜避也汪書延李初至見便問之未竟李疾作方龜山張皇佛氏之勢說橫渠不能屈之為城下之盟亦如李鄴張皇金虜也龜山嘗稱李奉使還云金人上馬如龍步行如虎度水如獺登城如猿時人目為四如給事方問橫浦語錄載張子韶戒殺不食蟹高抑崇相對故食之龜山云子韶不殺抑崇故殺不可抑崇退龜山問子韶周公何如人對曰仁人曰周公驅猛獸兼夷狄滅國者五十何嘗不殺亦去不仁以行其仁耳先生曰此特見其非不殺耳猶有未盡須知上古聖人制為罔罟佃漁食禽獸之肉但君子遠庖廚不暴殄天物須如此說方切事情德明龜山銘誌不載高麗事他引歐公作梅聖俞墓誌不載希文詩事辨得甚好孰能識車中之狀意欲施之事見韓詩外傳道夫龜山墓誌首尾卻是一篇文字後來不曾用方游定夫游定夫德性甚好升卿游定夫徽廟初為察院忽申本臺乞外如所請志完駭之定夫云公何見之晚如公亦豈能久此方侯希聖胡氏記侯師聖語曰仁如一元之氣化育流行無一息間斷此說好閎祖李先生云侯希聖嘗過延平觀其飲啗粗疏人也方尹彥明和靖在程門直是十分鈍底被他只就一箇敬字做工夫終被他做得成節和靖守得緊但不活蓋卿和靖持守有餘而格物未至故所見不精明無活法升卿和靖才短說不出只緊守伊川之說去偽和靖諦當又云就諸先生立言觀之和靖持守得不失然才短推闡不去遇面生者說得頗艱方和靖守得謹見得不甚透如俗語說他只是抱得一箇不哭底孩兒義剛問和靖言先生教人只是專令用敬以直內一段未盡曰和靖才力短伊川就上成就它它亦據其所聞而守之便以為是可學自其上者言之有明未盡處自其下者言之有明得一半便謂只是如此尹氏亦只是明得一半便謂二程之教止此孔孟之道亦只是如此惟是中人之性常常著力照管自家這心要常在須是窮得透徹方是敬仲和靖只是一箇篤實守得定如涪州被召祭伊川文云不背其師則有之有益於世則未也因言學者只守得某言語已自不易少間又自轉移了炎言和靖說主一與祈居之云如人入神廟收斂精神何物可入得有所據守方和靖主一之功多而窮理之功少故說經雖簡約有益學者但推說不去不能大發明在經筵進講少開悟啟發之功紹興初入朝滿朝注想如待神明然亦無大開發處是時高宗好看山谷詩尹云不知此人詩有何好處陛下看它作什麼只說得此一言然只如此說亦何能開悟人主大抵解經固要簡約若告人主須有反覆開導推說處使人主自警省蓋人主不比學者可以令他去思量如孔子告哀公顏子好學之問與答季康子詳略不同此告君之法也銖和靖當經筵都說不出張魏公在蜀中一日招和靖語之人有不為也而後可以有為此孟子至論和靖曰未是張曰何者為至和靖曰好善優於天下為至先生曰此和靖至論極中張病然正好發明惜但此而止耳張初不喜伊洛之學故諫官有言和靖適召至九江見其文辭之張皇恐再薦和靖持守甚確凡遇飲手足在一處醉後亦然揚胡文定初疑尹和靖後見途中辭召表方知其真有得表言臣師程某今來亦不過守師之訓變所守又何取云云之意時陳公輔論伊川學故途中進此表尹亦只得如此辭文定以此取之亦未可見尹所得處揚尹子之學有偏處渠初見伊川將朱公掞所抄語錄去呈想是他為有看不透處故伊川云某在何必觀此書蓋謂不如當面與它說耳尹子後來遂云語錄之類不必看不知伊川固云某在不必觀今伊川既不在如何不觀又如云易傳是伊川所自作者其他語錄是學者所記故謂只當看易傳不當看語錄然則夫子所自作者春秋而已論語亦門人所記也謂學夫子者只當看春秋不當看論語可乎尹和靖疑伊川之說多其所未聞璘王德修相見先生問德修和靖大概接引學者話頭如何德修曰先生只云在力行曰力行以前更有甚功夫德修曰尊其所聞行其所知曰須是知得方始行得德修曰自吾十有五而志於學以至從心所欲不踰矩皆是說行曰便是先知了然後志學文蔚問天地設位而易行乎其中矣和靖言行錄云易行乎其中聖人純亦不已處莫說得太拘天地設位而易行乎其中矣如言天高地下萬物散殊而禮制行乎其中無適而非也今只言聖人純亦不已莫太拘了曰亦不是拘他說得不是陰陽升降便是易易者陰陽是也文蔚和靖與楊畏答問一段語殊無血脈謂非本語極是龜山說得固佳然亦出於程子羈靮以御馬而不以制牛胡不乘牛而服馬之說鎬人之所畏不得不畏此是和靖見未透處亦是和靖不肯自欺屈強妄作處鎬和靖赴樂會聽曲子皆知之亦歡然但拱手安足處終日未嘗動也在平江時累年用一扇用畢置架上凡百嚴整有常有僧見之云吾不知儒家所謂周孔為如何然恐亦只如此也方王德修言一日早起見和靖使人傳語令且坐候看經了相見少頃和靖出某問曰先生看甚經曰看光明經某問先生何故看光明經曰老母臨終時令每日看此經一部今不敢違老母之命先生曰此便是平日闕卻那諭父母於道一節便致得如此文蔚張思叔張思叔與人做思堂記言世間事有當思者有不當思者利害生死不當思也如見某物而思終始之云云此當思也方郭立之子和郭子和傳其父學又兼象數其學已雜又被謝昌國拈掇得愈不是了且如九圖中性善之說性豈有兩箇善又安有內外故凡惡者皆氣質使然若去其惡則見吾性中當來之善語又問郭以兼山學自名是其學只一艮卦曰易之道一箇艮卦可盡則不消更有六十三卦又曰謝昌國論西銘理一而分殊尤錯了去偽郭子和性論與五峰相類其言曰目視耳聽性也此語非也視明而聽聰乃性也箕子分明說視曰明聽曰聰若以視聽為性與僧家作用是性何異五峰曰好惡性也君子好惡以道小人好惡以欲君子小人者天理人欲而已矣亦不是蓋好善惡惡乃性也璘胡康侯雖非門人而嘗見謝楊今附子姪附或問胡文定之學與董仲舒如何曰文定卻信得於己者可以施於人學於古者可以行於今其他人皆謂得於己者不可施於人學於古者不可行於今所以淺陋然文定比似仲舒較淺仲舒比似古人又淺又曰仲舒識得本原如云正心修身可以治國平天下如說仁義禮樂皆其具此等說話皆好若陸宣公之論事卻精密第恐本原處不如仲舒然仲舒施之臨事又卻恐不如宣公也學蒙文定大綱說得正微細處五峰尤精大綱卻有病方胡文定說較疏然好五峰說密然有病問文定言人常令胸中自在云克己無欲方文定氣象溫潤卻似貴人方原仲說文定少時性最急嘗怒一兵士至親毆之兵輒抗拒無可如何遂回入書室中作小冊盡寫經傳中文有寬字者於冊上以觀玩從此後遂不性急矣方胡文定云知至故能知言意誠故能養氣此語好又云豈有見理已明而不能處事者此語亦好夔孫胡文定公傳家錄議論極有力可以律貪起懦但以上工夫不到如訓子弟作郡處末後說道將來不在人下便有克伐之意子升云有力行之意多而致知工夫少曰然木之問文定靖康第二劄如何云君相了得亦不必定其規模不然亦須定其大綱專戰專和專守之類可定揚文定論時事要掃除故跡乘勢更張龜山論時用其蠱卦說且扶持苟完龜山語見答胡康侯第八書中止謂役法冗官二事而已非盡然也伊川有從本言者有從末言者從末言小變則小益大變則大益包荒傳云以含洪之體為剛果之用方胡文定公云世間事如浮雲流水不足留情隨所寓而安也寅近年卻於正路上有箇見處所以立朝便不碌碌與往日全不同往時虛憍恃氣今則平心觀理矣振曾吉甫答文定書中天理人欲之說只是籠罩其實初不曾見得文定便許可之它便只如此住了胡文定初得曾文清時喜不可言然已仕宦駸駸了又參禪了如何成就得他揚向見籍溪說文定當建炎間兵戈擾攘寓荊門擬遷居適湘中有兩士人協力具舟楫往迎文定其一人乃黎才翁文定始亦有遲疑之意及至湘中則舍宇動用便利如歸處之極安又聞范丈說文定得碧泉甚愛之有本亭記所謂命門弟子往問津焉即才翁也佐胡致堂之說雖未能無病然大抵皆太過不會不及如今學者皆是不及學蒙以下明仲胡致堂說道理無人及得他以他才氣甚麼事做不得只是不通檢點如何做得事成我欲做事事未起而人已檢點我矣僩胡致堂議論英發人物偉然向嘗侍之坐見其數盃後歌孔明出師表誦張才叔自靖人自獻於先王義陳了翁奏狀等可謂豪傑之士也讀史管見乃嶺表所作當時並無一冊文字隨行只是記憶所以其間有牴牾處有人好誦佛書致堂因集史傳中虜人姓名揭之一處其人果收去念誦此其戲也又嘗解論語舉直錯諸枉章云是時哀公威權已去不知何以為舉錯但能以是權付之孔子斯可矣人傑胡氏管見有可刪者慕容超說昭帝說南軒言胡明仲有三大功一言太上即尊位事二行三年喪三云云先生云南軒見得好設使不即位只以大元帥討賊徽廟升遐率六軍縞素是甚麼模樣氣勢後來一番難如一番今日有人做亦得只是又較難些子揚胡籍溪人物好沈靜謹嚴只是講學不透賀孫以下原仲藉溪教諸生於功課餘暇以片紙書古人懿行或詩文銘贊之有補於人者粘置壁間俾往來誦之咸令精熟若海籍溪廳上大榜曰文定書堂籍溪舊開藥店胡居士熟藥正鋪并諸藥牌猶存振明仲甚畏仁仲議論明仲亦自信不及先生云人不可不遇敵己之人仁仲當時無有能當之者故恣其言說出來然今觀明仲說較平正揚以下仁仲游楊之後多為秦相所屈胡文定剛勁諸子皆然和仲不屈於秦仁仲直卻其招不往揚仁仲見龜山求教龜山云且讀論語問以何為要云熟讀方五峰善思然思過處亦有之道夫知言形容道德只是如畫卦影到了後方理會得何益方東萊云知言勝似正蒙先生曰蓋後出者巧也方子振錄云正蒙規摹大知言小知言疑義大端有八性無善惡心為已發仁以用言心以用盡不事涵養先務知識氣象迫狹語論過高方做出那事便是這裏有那理凡天地生出那物便都是那裏有那理五峰謂性立天下之有說得好情效天下之動效如效死效力之效是自力形出也淳五峰說心妙性情之德不是他曾去研窮深體如何直見得恁地夔孫心妙性情之德妙是主宰運用之意升卿仲思問五峰中誠仁如何曰中者性之道言未發也誠者命之道言實理也仁者心之道言發動之端也又疑道字可改為德字曰亦可德字較緊然他是特地下此寬字伊川答與叔書中亦云中者性之德近之伯恭云知言勝正蒙似此等處誠然但不能純如此處爾又疑中誠仁一而已何必別言曰理固未嘗不同但聖賢說一箇物事時且隨處說他那一箇意思自是他一箇字中便有箇正意義如此不可混說聖賢書初便不用許多了學者亦宜各隨他說處看之方見得他所說字本相如誠如中如仁若便只混看則下梢都看不出伯羽砥錄別出仲思問天之所以命乎人者實理而已故言誠者命之道中者性之道如何曰未發時便是性曰如此則喜怒哀樂未發便是性既發便是情曰然此三句道得極密伯恭道知言勝似正蒙如這處也是密但不純恁地又問道字不如德字曰所以程子云中者性之德為近之但言其自然則謂之道言其實體則謂之德德字較緊道字較寬但他故下這寬字不要挨拶著他又問言中則誠與仁亦在其內否曰不可如此看若可混併則聖賢已自混併了須逐句看他言誠時便主在實理發育流行處言性時便主在寂然不動處言心時便主在生發處砥堯卿問誠者性之德此語如何曰何者不是性之德如仁義禮智皆性之德恁地說較不切不如胡氏誠者命之道乎說得較近傍義剛問誠者物之終始而命之道曰誠是實理徹上徹下只是這箇生物都從那上做來萬物流形天地之間都是那底做五峰云誠者命之道中者性之道仁者心之道此數句說得密如何大本處卻含糊了以性為無善惡天理人欲都混了故把作同體或問同行語如何曰此卻是只就事言之直卿曰它既以性無善惡何故云中者性之道曰它也把中做無善惡李維申說合於心者為仁曰卻是從義上去不如前日說存得此心便是仁卻是因舉五峰語云人有不仁心無不仁說得極好雉胡五峰云人有不仁心無不仁此說極好人有私欲遮障了不見這仁然心中仁依舊只在如日月本自光明雖被雲遮光明依舊在裏又如水被泥土塞了所以不流然水性之流依舊只在所以克己復禮為仁只是克了私欲仁依舊只在那裏譬如一箇鏡本自光明只緣塵都昏了若磨去塵光明只在明作五峰曰人有不仁心無不仁既心無不仁則巧言令色者是心不是如巧言令色則不成說道巧言令色底不是心別有一人巧言令色如心無不仁則孔子何以說回也其心三月不違仁蕭佐曰我欲仁斯仁至矣這箇便是心無不仁曰回心三月不違仁如何說問者默然久之先生曰既說回心三月不違仁則心有違仁底違仁底是心不是說我欲仁便有不欲仁底是心不是節五峰謂人有不仁心無不仁此語有病且如顏子其心三月不違仁若纔違仁其心便不仁矣豈可謂心無不仁定夫云恐是五峰說本心無不仁曰亦未是譬如人今日貧則說昔日富不得震伊川初嘗曰凡言心者皆指已發而言後復曰此說未當五峰卻守其前說以心為已發性為未發將心性二字對說知言中如此處甚多人學當勉不可據見定蓋道理無窮人之思慮有限若只守所得以為主則其或墮於偏者不復能自明也如五峰只就其上成就所學亦只是忽而不詳細反復也方問知言有云佛家窺見天機有不器於物者此語莫已作兩截曰亦無甚病方錄作此語甚得之此蓋指妙萬物者而不知萬物皆在其中聖人見道體正如對面見人其耳目口鼻髮眉無不見佛家如遠望人只見髣象初不知其人作何形狀問佛家既如此說而其說性乃指氣卻是兩般曰渠初不離此說但既差了則自然錯入別處去可學因言久不得胡季隨諸人書季隨主其家學說性不可以善言本然之善本自無對才說善時便與那惡對矣才說善惡便非本然之性矣本然之性是上面一箇其尊無比僩錄但云季隨主其家學說性不可以善言本然之性是上面一箇其尊無對善是下面底才說善時便與惡對非本然之性矣孟子道性善非是說性之善只是贊歎之辭說好箇性如佛言善哉此文定之說某嘗辨之云本然之性固渾然至善不與惡對僩錄作無善可對此天之賦予我者然也然行之在人則有善有惡做得是者為善做得不是者為惡豈可謂善者非本然之性只是行於人者有二者之異然行得善者便是那本然之性也若如其言有本然之善僩錄作性又有善惡相對之善僩錄作性則是有二性矣方其得於天者此性也及其行得善者亦此性也只是纔有箇善底僩錄作行得善底便有箇不善底所以善惡須著對說不是元有箇惡在那裏等得他來與之為對只是行得錯底便流入於惡矣此文定之說故其子孫皆主其說而致堂五峰以來其說益差遂成有兩性本然者是一性善惡相對者又是一性他只說本然者是性善惡相對者不是性豈有此理然文定又得於龜山龜山得之東林常摠摠龜山鄉人與之往來後住廬山東林龜山赴省又往見之摠極聰明深通佛書有道行龜山問孟子道性善說得是否摠曰是又問性豈可以善惡言摠曰本然之性不與惡對此語流傳自他然摠之言本亦未有病蓋本然之性是本無惡及至文定遂以性善為贊歎之辭到得致堂五峰輩遂分成兩截說善底不是性若善底非本然之性卻那處得這善來既曰贊歎性好之辭便是性矣僩錄作便是性本善矣若非性善何贊歎之有如佛言善哉善哉為贊美之辭亦是說這箇道好所以贊歎之也二蘇論性亦是如此嘗言孟子道性善猶云火之能熟物也荀卿言性惡猶云火之能焚物也龜山反其說而辨之曰火之所以能熟物者以其能焚故耳若火不能焚物何從熟蘇氏論性說自上古聖人以來至孔子不得已而命之曰一寄之曰中未嘗分善惡言也自孟子道性善而一與中始支矣盡是胡說他更不看道理只認我說得行底便是諸胡之說亦然季隨至今守其家說因問文定卻是卓然有立所謂非文王猶興者曰固是他資質好在太學中也多聞先生師友之訓所以能然嘗得潁昌一士人忘其姓名問學多得此人警發後為荊門教授龜山與之為代因此識龜山因龜山方識游謝不及識伊川自荊門入為國子博士出來便為湖北提舉是時上蔡宰本路一邑文定卻從龜山求書見上蔡既到湖北遂遣人送書與上蔡上蔡既受書文定乃往見之入境人皆訝知縣不接監司論理上蔡既受他書也是難為出來接他既入縣遂先修後進禮見之畢竟文定之學後來得於上蔡者為多他所以尊上蔡而不甚滿於游楊二公看來游定夫後來也是郎當誠有不滿人意處頃嘗見定夫集極說得醜差盡背其師說更說伊川之學不如他之所得所以五峰臨終謂彪德美曰聖門工夫要處只在箇敬字游定夫所以卒為程門之罪人者以其不仁不敬故也誠如其言卓僩錄略胡氏說善是贊美之辭其源卻自龜山龜山語錄可見胡氏以此錯了故所作知言並一齊恁地說本欲推高反低了蓋說高無形影其勢遂向下去前日說韓子云何謂性仁義禮智信此語自是卻是他已見大意但下面便說差了荀子但只見氣之不好而不知理之皆善揚子是好許多思量安排方要把孟子性善之說為是又有不善之人方要把荀子性惡之說為是又自有好人故說道善惡混溫公便主張揚子而非孟子程先生發明出來自今觀之可謂盡矣賀孫龜山往來太學過廬山見常摠摠亦南劍人與龜山論性謂本然之善不與惡對後胡文定得其說於龜山至今諸胡謂本然之善不與惡對與惡為對者又別有一善常摠之言初未為失若論本然之性只一味是善安得惡來人自去壞了便是惡既有惡便與善為對今他卻說有不與惡對底善又有與惡對底善如近年郭子和九圖便是如此見識上面書一圈子寫性善字從此牽下兩邊有善有惡或云恐文定當來未有甚差後來傳襲節次訛舛曰看他說善者贊美之辭不與惡對已自差異文蔚問性無善惡之說從何而始曰此出於常摠摠住廬山龜山入京枉道見之留數日因問孟子識性否曰識曰何以言之曰善不與惡對言他之意乃是謂其初只有善未有惡其後文定得之龜山遂差了今湖南學者信重知言某嘗為敬夫辨析甚諱之渠當初唱道湖南偶無人能與辨論者可惜可惜又讀至彪居正問心一段先生曰如何可學謂不於原本處理會卻待些子發見曰孟子此事乃是一時間為齊王耳今乃欲引之以上他人之身便不是了良久又云以放心求心便不是纔知求心便已回矣安得謂之放可學因論湖湘學者崇尚知言曰知言固有好處然亦大有差失如論性卻曰不可以善惡辨不可以是非分既無善惡又無是非則是告子湍水之說爾如曰好惡性也君子好惡以道小人好惡以己則是以好惡說性而道在性外矣不知此理卻從何而出問所謂探視聽言動無息之本可以知性此猶告子生之謂性之意否曰此語亦有病下文謂道義明著孰知其為此心物欲引誘孰知其為人欲便以道義對物欲卻是性中本無道義逐旋於此處攙入兩端則是性亦可以不善言矣如曰性也者天地鬼神之奧也善不足以名之況惡乎孟子說性善云者歎美之辭不與惡對其所謂天地鬼神之奧言語亦大故誇逞某嘗謂聖賢言語自是平易如孟子尚自有些險處孔子則直是平實不與惡對之說本是龜山與摠老相遇因論孟子說性曾有此言文定往往得之龜山故有是言然摠老當時之語猶曰渾然至善不與惡對猶未甚失性善之意今去其渾然至善之語而獨以不與惡對為歎美之辭則其失遠矣如論齊王愛牛此良心之苗裔因私欲而見者以答求放心之問然雞犬之放則固有去而不可收之理人之放心只知求之則良心在此矣何必等待天理發見於物欲之間然後求之如此則中間空闕多少去處正如屋下失物直待去城外求也愛牛之事孟子只就齊王身上說若施之他人則不可況操存涵養皆是平日工夫豈有等待發見然後操存之理今胡氏子弟議論每每好高要不在人下纔說心便不說用心以為心不可用至如易傳中有連使用心字處皆塗去用字某以為孟子所謂堯舜之治天下豈無所用其心哉何獨不可以用言也季隨不以為然遂檢文定春秋中有連使用心字處質之方無語大率議論文字須要親切如伊川說顏子樂道為不識顏子者蓋因問者元不曾親切尋究故就其人而答欲其深思而自得之爾後人多因程子之言愈見說得高遠如是則又不若樂道之為有據伊尹樂堯舜之道亦果非樂道乎湖湘此等氣象乃其素習無怪今日之尤甚也謨五峰知言大抵說性未是自胡文定胡侍郎皆說性未是其言曰性猶水也善其水之下乎情其水之瀾乎欲其水之波浪乎乍看似亦好細看不然如瀾與波浪何別渠又包了情欲在性中所以其說如此又云性好惡也君子以道小人以欲君子小人天理人欲而已矣伯恭舊看知言云只有兩段好其餘都不好一段能攻人實病能受人實攻一段以天下與人而無人德我之望有人之天下而無取人之嫌後來卻又云都好不知伯恭晚年是如何地看某舊作孟子或問云人說性不肯定說是性善只是欲推尊性於性之上虛立一箇善字位子推尊其性耳不知尊之反所以失之璘五峰云好惡性也此說未是胡氏兄弟既闢釋氏卻說性無善惡便似說得空了卻近釋氏但當云好善而惡惡性也謂好惡情也曰只是好惡卻好惡箇甚底伯豐謂只君子好惡以道亦未穩曰如此道卻在外旋好惡之也直卿言五峰說性云好惡性也本是要說得高不知卻反說得低了曰依舊是氣質上說某常要與他改云所以好惡者性也宇好惡性也既有好即具善有惡即具惡若只云有好惡而善惡不定於其中則是性中理不定也既曰天便有天命天討方知言云凡人之生粹然天地之心道義全具無適無莫不可以善惡辨不可以是非分無過也無不及也此中之所以名也即告子性無善無不善之論也惟伊川性即理也一句甚切至閎祖問知言萬事萬物性之質也如何曰此句亦未有害最是好惡性也大錯既以好惡為性下文卻云君子好惡以道則是道乃旋安排入來推此其餘皆可見問與告子說話莫同否曰便是湍水之說又問粹然完具云云卻說得好又云不可以善惡言不可以是非判曰渠說有二錯一是把性作無頭面物事二是云云失記可學五峰言天命不囿於善不可以人欲對曰天理固無對然有人欲則天理便不得不與人欲對為消長善亦本無對然既有惡則善便不得不與惡對為盛衰且謂天命不囿於物可也謂不囿於善則不知天之所以為天矣謂惡不足以言性可也謂善不足以言性則不知善之所從來矣升卿好善而惡惡人之性也為有善惡故有好惡善惡字重好惡字輕君子順其性小人拂其性五峰言好惡性也君子好惡以道小人好惡以欲是好人之所惡惡人之所好亦是性也而可乎或問天理人欲同體異用之說如何曰當然之理人合恁地底便是體故仁義禮智為體如五峰之說則仁與不仁義與不義禮與無禮智與無智皆是性如此則性乃一箇大人欲窠子其說乃與東坡子由相似是大鑿脫非小失也同行異情一句卻說得去方子或問天理人欲同體而異用同行而異情曰胡氏之病在於說性無善惡體中只有天理無人欲謂之同體則非也同行異情蓋亦有之如口之於味目之於色耳之於聲鼻之於臭四肢之於安佚聖人與常人皆如此是同行也然聖人之情不溺於此所以與常人異耳人傑謂聖賢不視惡色不聽惡聲此則非同行者曰彼亦就其同行處說耳某謂聖賢立言處處皆通必不若胡氏之偏也龜山云天命之謂性人欲非性也胡氏不取其說是以人欲為性矣此其甚差者也人傑問天理人欲同體而異用同行而異情如何曰下句尚可上句有病蓋行處容或可同而其情則本不同也至於體用豈可言異觀天理人欲所以不同者其本原元自不同何待用也胡氏之學大率於大本處看不分曉故銳於闢異端而不免自入一腳也如說性便說性本無善惡發然後有善惡孟子說性善自是歎美之辭不與惡為對大本處不分曉故所發皆差蓋其說始因龜山問摠老而答曰善則本然不與惡對言本然猶可今曰歎美之辭則大故差了又一學者問以放心求放心如何他當時問得極緊他一向鶻突應將去大抵心只操則存捨則放了俄頃之間更不喫力他卻說得如此周遮大雅問天理人欲同行而異情胡氏此語已精若所謂同體而異用則失之混而無別否曰胡氏論性無善惡此句便是從這裏來本原處無分別都把做一般所以便謂之同體他看道理儘精微不知如何只一箇大本卻無別了淳或問天理人欲同體異用曰如何天理人欲同體得如此卻是性可以為善亦可以為惡卻是一團人欲窠子將甚麼做體卻是韓愈說性自好言人之為性有五仁義禮智信是也指此五者為性卻說得是性只是一箇至善道理萬善總名才有一毫不善自是情之流放處如何卻與人欲同體今人全不去看謙問天理人欲同體而異用先生以為未穩是否曰亦須是實見此句可疑始得又曰今人於義利處皆無辨直恁鶻突去是須還他是不是還他不是若都做得是猶自有箇淺深自如此說必有一箇不是處今則都無理會矣宇何丞辨五峰理性何異修性蓋五峰以性為非善惡乃是一空物故云理也方看知言彪居正問仁一段云極費力有大路不行只行小徑至如操而存之等語當是在先自孟子亦不專以此為學者入德之門也且齊王人欲蔽固故指其可取者言之至如說自牖開說亦是為蔽固而言若吾儕言語是是非非亦何須如此而五峰專言之則偏也又云居正問以放心求放心可乎既知其放又知求之則此便是良心也又何求乎又何必俟其良心遇事發見而後操之乎方五峰曾說如齊宣王不忍觳觫之心乃良心當存此心敬夫說觀過知仁當察過心則知仁二說皆好意思然卻是尋良心與過心也不消得只此心常明不為物蔽物來自見從周五峰作皇王大紀說北極如帝星紫微等皆不動說宮聲屬仁不知宮聲卻屬信又宮無定體十二律旋相為宮帝星等如果不動則天必擘破不知何故讀書如此不子細人傑五峰說得宮之用極大殊不知十二律皆有宮又宮在五行屬土他說得其用如此大猶五常之仁宮自屬土亦不為仁也又其云天有五帝座星皆不動今天之不動者只有紫微垣北極五帝座不動其他帝座如天市垣太微垣大火中星帝座與大角星帝座皆隨天動安得謂不動卓五峰論樂以黃鍾為仁都配屬得不是它此等上不曾理會卻都要將一大話包了論五峰說極星有三箇極星不動殊不可曉若以天運譬如輪盤則極星只是中間帶子處所以不動若是三箇不動則不可轉矣又言雖形器之事若未見得盡亦不可輕立議論須是做下學工夫雖天文地理亦須看得他破方可議之又曰明仲嘗畏五峰議論精確五峰亦嘗不有其兄嘗欲焚其論語解并讀史管見以今觀之殊不然如論語管見中雖有粗處亦多明白至五峰議論反以好高之過得一說便說其實與這物事都不相干涉便說得無著落五峰辨疑孟之說周遮全不分曉若是恁地分疏孟子凛地沈淪不能得出世五峰疾病彪德美問之且求教焉五峰曰游定夫先生所以得罪於程氏之門者以其不仁不敬而已先生云言其習不著行不察悠悠地至於無所得而歸釋氏也其子德華謂汪聖錫云定夫於程氏無所得後見某長老乃有得也此與呂居仁雜記語同大率其資質本好者卻不用力所以悠悠如上蔡文定器質本駁偏所以用力尤多方五峰有本亭記甚好理固是好其文章排佈之類是文人之文此其所居也其所極好在嶽山下當時託二學生謀得之文定本居籍溪恐其當衝世亂或不免遂去居湖北侯師聖令其遷謂亂將作乃遷衡嶽山下亦有一人侯令其遷不從後不免文定以識時知幾薦侯亂兵謂宗汝霖所招勤王者宗死其兵散走為亂湖北靡孑遺矣揚五峰說區以別矣用禮記勾萌字音林少穎亦曾說與黃祖舜來如此方胡氏議論須捉一事為說如后妃幽閒貞淑卻只指不妒忌為至伯夷氣象如此卻只指不失初心為就文王去武王之事大要不論體只論發出來處類如此也方胡說有三箇物事一不動一動一靜相對振問湖南以身格物則先亦是行但不把行做事爾曰湖南病正在無涵養無涵養所以尋常盡發出來不留在家方因說湖南學先體察云不知古人是先學洒掃應對為復先體察方湖南一派譬如燈火要明只管挑不添油便明得也即不好所以氣局小長汲汲然張筋努脈方謂胡季隨曰文定五峰之學以今竊議來只有太過無不及季隨而今卻但有不及又曰為學要剛毅果決悠悠不濟事方子林學蒙錄云為學要剛毅果決悠悠不濟事且如發憤忘食樂以忘憂是甚麼樣精神骨肋注云因說胡季隨或說胡季隨才敏曰也不濟事須是確實有志而才敏方可若小小聰悟亦徒然學蒙五峰諸子不著心看文字恃其明敏都不虛心下意便要做大某嘗語學者難得信得及就實上做工夫底人賀孫
