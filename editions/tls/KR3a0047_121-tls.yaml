body:
  text: 朱子語類卷第一百二十一朱子十八訓門人九總訓門人而無名氏者為此卷朋友乍見先生者先生每曰若要來此先看熹所解書也過世昌問先生教人有何宗旨曰某無宗旨尋常只是教學者隨分讀書文蔚讀書須是成誦方精熟今所以記不得說不去心下若存若亡皆是不精不熟之患若曉得義理又皆記得固是好若曉文義不得只背得少間不知不覺自然相觸發曉得這義理蓋這一段文義橫在心下自是放不得必曉而後已若曉不得又記不得更不消讀書矣橫渠說讀書須是成誦今人所以不如古人處只爭這些子古人記得故曉得今人鹵莽記不得故曉不得緊要處慢處皆須成誦自然曉得也今學者若已曉得大義但有一兩處阻礙說不去某這裏略些數句發動自然曉得今諸公盡不曾曉得縱某多言何益無他只要熟看熟讀而已別無方法也卓僩略一學者患記文字不起先生曰只是不熟不曾玩味入心但守得冊子上言語所以見冊子時記得纔放下便忘了若使自家實得他那意思如何會忘譬如人將一塊生薑來須知道是辣若將一塊砂糖來便不信是辣端蒙謂一士友日向嘗收書云讀書不用精熟又云不要思惟讀書正要精熟而言不用精熟學問正要思惟而言不可思惟只為此兩句在胸中做病根正如人食冷物留於脾胃之間十數年為害所以與吾友相別十年只如此者病根不除也蓋卿嘗見老蘇說他讀書孟子論語韓子及其他聖人之文兀然端坐終日以讀者七八年方其始也入其中而惶然博觀於其外而駭然以驚及其久也讀之益精而其胸中豁然以明若人之言固當然者猶未敢自出其言也時既久胸中之言日益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣又韓退之答李翊柳子厚答韋中立書言讀書用功之法亦可見某嘗歎息以為此數人者但求文字言語聲響之工用了許多功夫費了許多精力甚可惜也今欲理會這箇道理是天下第一至大至難之事乃不曾用得旬月功夫熟讀得一卷書只是泛然發問臨時湊合元不曾記得本文及至問著元不曾記得一段首尾其能言者不過敷演己說與聖人言語初不相干是濟甚事今請歸家正襟危坐取大學論語中庸孟子逐句逐字分曉精切求聖賢之意切己體察著己踐履虛心體究如是兩三年然後方去尋師證其是非方有可商量有可議論方是就有道而正焉者入道之門是將自家身己入那道理中去漸漸相親久之與己為一而今人道理在這裏自家身在外面全不曾相干涉因言及釋氏而曰釋子之心卻有用處若是好叢林得一好長老他直是朝夕汲汲不捨所以無有不得之理今公等學道此心安得似他是此心元不曾有所用逐日流蕩放逐如無家之人思量一件道理不透便颺去聲掉放一壁不能管得三日五日不知拈起每日只是悠悠度日說閑話逐物而已敢說公等無一日心在此上莫說一日一時也無莫說一時頃刻也無悠悠漾漾似做不做從生至死忽然無得而已今朋友有謹飭不妄作者亦是他資稟自如此然其心亦無所用只是閑慢過日或云須是汲汲曰公只會說汲汲元不曾汲汲若是汲汲用功底人自別他那得工夫說閑話精專懇切無一時一息不在裏許思量一件道理直是思量得徹底透熟無一毫不盡今公等思量這一件道理思量到半間不界便掉了少間又看那一件那件看不得又掉了又看那一件如此沒世不濟事若真箇看得這一件道理透入得這箇門路以之推他道理也只一般只是公等不曾通得這箇門路每日只是在門外走所以都無入頭處都不濟事又曰若是大處入不得便從小處入東邊入不得便從西邊入及至入得了觸處皆是此理今公等千頭萬緒不曾理會得一箇透徹所以東解西模便無一箇入頭處又曰學道做工夫須是奮厲警發悵然如有所失不尋得則不休如自家有一大光明寶藏被人偷將去此心還肯放捨否定是去追捕尋捉得了方休做工夫亦須如此僩諸公來聽說話某所說亦不出聖賢之言然徒聽之亦不濟事須是便去下工夫始得近覺得學者所以不成頭項者只緣聖賢說得多了既欲為此又欲為彼如夜來說敬以直內義以方外若實下工夫見得真箇是敬立則內直義形而外方這終身可以受用今人卻似見得這兩句好又見說克己復禮也好又見說出門如見大賓也好空多了少間卻不把捉得一項周全賀孫今學者看文字不必自立說只記得前賢與諸家說便得而今看自家如何說終是不如前賢須盡記得諸家說方有箇襯簟處這義理根腳方牢這心也有殺泊處心路只在這上走久久自然曉得透熟今公輩看文字大概都有箇生之病所以說得來不透徹只是去巴攬包籠他元無實見處某舊時看文字極難諸家說盡用記且如毛詩那時未似如今說得如此條暢古今諸家說蓋用記取閑時將起思量這一家說得那字是那字不是那一家說得那字不是那字是那家說得全是那家說得全非所以是者是如何所以非者是如何只管思量少間這正當道理自然光明燦爛在心目間如指諸掌今公們只是扭掜巴攬來說都記得不熟所以這道理收拾他不住自家也使他不動他也不服自家使相聚得一朝半日又散去了只是不熟這箇道理古時聖賢也如此說今人也如此說說得大概一般然今人說終是不似所爭者只是熟與不熟耳縱使說得十分全似猶不似在何況和那十分似底也不曾看得出敬子云而今每日只是優游和緩分外看得幾遍分外讀得幾遍意思便覺得不同曰而今便未得優游和緩須是苦心竭力下工夫方得那箇優游和緩須是做得八分九分成了方使得優游和緩而今便說優游和緩只是泛泛而已矣這箇做工夫須是放大火中鍛煉鍛教他通紅溶成汁瀉成鋌方得今只是略略火面上熁得透全然生硬不屬自家使在濟得甚事須是縱橫舒卷皆由自家使得方好搦成團捺成匾放得去收得來方可某嘗思今之學者所以多不得力不濟事者只是不熟平生也費許多功夫看文字下梢頭都不得力者正緣不熟耳只緣一箇不熟少間無一件事理會得精呂居仁記老蘇說平生因聞升裏轉斗裏量之語遂悟作文章妙處這箇須是爛泥醬熟縱橫妙用皆由自家方濟得事也僩某煞有話要與諸公說只是覺次序未到而今只是面前小小文義尚如此理會不透如何說得到其他事這箇事須是四方上下小大本末一齊貫穿在這裏一齊理會過其操存踐履處固是緊要不可間斷至於道理之大原固要理會纖悉委曲處也要理會制度文為處也要理會古今治亂處也要理會精粗大小無不當理會四邊一齊合起功夫無些罅漏東邊見不得西邊須見得這下見不得那下須見得既見得一處則其他處亦可類推而今只從一處去攻擊他又不曾著力濟得甚事如坐定一箇地頭而他支腳也須分布擺陣如大軍冢殺相似大軍在此坐以鎮之游軍依舊去別處邀截須如此作工夫方得而今都只是悠悠礙定這一路略略拂過今日走來挨一挨又退去明日亦是如此都不曾抓著那痒處何況更望掐著痛處所以五年十年只是恁地全不見長進這箇須是勇猛奮厲直前不顧去做四方上下一齊著到方有箇入頭孔子曰仁遠乎哉我欲仁斯仁至矣這箇全要人自去做孟子所謂奕秋只是爭這些子一箇進前要做一箇不把當事某八九歲時讀孟子到此未嘗不慨然奮發以為為學須如此做工夫當初便有這箇意思如此只是未知得那碁是如何著是如何做工夫自後更不肯休一向要去做工夫今學者不見有奮發底意思只是如此悠悠地過今日見他是如此明日見他亦是如此因建陽士人來請問先生曰公們如此做工夫大故費日子覺得今年只似去年前日只是今日都無昌大發越底意思這物事須教看得精透後一日千里始得而今都只泛泛在那皮毛上理會都不曾抓著那痒處濟得甚事做工夫一似穿井相似穿到水處自然流出來不住而今都乾燥只是心不在不曾著心如何說道出去一日便不曾做得工夫某常說正是出去路上好做工夫且如出十里外既無家事炒又無應接人客正好提撕思量道理所以學貴時習到時習自然說也如今不敢說時習須看得見那物事方能時習如今都看不見只是不曾入心所以在窗下看才起去便都忘了須是心心念念在上便記不得細注字也須時時提起經正文在心也爭事而今都只在那皮毛上理會盡不曾抓著痒處若看得那物事熟時少間自轉動不得自家腳才動自然踏著那物事行又云須是得這道理入心不忘了然後時時以義理澆灌之而今這種子只在地面上不曾入地裏去都不曾與土氣相接著學者悠悠是大病今覺諸公都是進寸退尺每日理會些小文義都輕輕地拂過不曾動得皮毛上這箇道理規模大體面闊須是四面去包括方無走處今只從一面去又不曾著力如何可得且如曾點漆雕開兩處漆雕開事言語少難理會曾點底須子細看他是樂箇甚底是如何地樂不只是聖人說這箇事可樂便信著他原是自見得箇可樂底依人口說不得又曰而今持守便打疊教淨潔看文字須著意思索應接事物都要是當四面去討他自有一面通處又曰如見陳冢殺擂著鼓只是向前去有死無二莫更回頭始得胡泳或言在家羇羇但不敢忘書冊亦覺未免間斷曰只是無志若說家事又如何汨沒得自家如今有稍高底人也須會擺脫得過山間坐一年半歲是做得多少工夫只恁地也立得箇根腳若時往應事亦無害較之一向在事務裏羇是爭那裏去公今三五年不相見又只恁地悠悠人生有幾箇三五年耶賀孫或有來省先生者曰別後讀何書曰雖不敢廢學然家間事亦多難得全功曰覺得公今未有箇地頭在光陰可惜不知不覺便是三五年如今又去赴官官所事尤多益難得餘力人生能得幾箇三五年須是自強若尋得箇僻靜寺院做一兩年工夫須尋得箇地頭可以自上做將去若似此悠悠如何得進廣某見今之學者皆似箇無所作為無圖底人相似人之為學當如救火追亡猶恐不及如自家有箇光明寶藏被人奪去尋求趕捉必要取得始得今學者只是悠悠地無所用心所以兩年三年五年七年相別及再相見只是如此僩謂諸生曰公皆如此悠悠終不濟事今朋友著力理會文字一日有一日工夫然尚恐其理會得零碎不見得周匝若如諸公悠悠是要如何光陰易過一日減一日一歲無一歲只見老大忽然死著思量來這是甚則劇恁地悠悠過了賀孫某平日於諸友看文字相待甚寬且只令自看前日因病覺得無多時月於是大懼若諸友都只恁悠悠終於無益只要得大家盡心看得這道理教分明透徹所謂道理也只是將聖賢言語體認本意得其本意則所言者便只此道理一一理會令十分透徹無些罅縫蔽塞方始住每思以前諸先生盡心盡力理會許多道理當時亦各各親近師承今看來各人自是一說本來諸先生之意初不體認得只各人挑載得些去自做一家說話本不曾得諸先生之心某今惟要諸公看得道理分明透徹無些小蔽塞某之心即諸公之心諸公之心即某之心都只是這箇心如何有人說到這地頭又如何有人說不得這地頭這是因甚恁地這須是自家大段欠處賀孫先生痛言諸生工夫悠悠云今人做一件事沒緊要底事也著心去做方始會成如何悠悠會做得事且如好寫字底人念念在此則所見之物無非是寫字底道理又如賈島學作詩只思推敲兩字在驢上坐把手作推敲勢大尹出有許多車馬人從渠更不見不覺犯了節只此推敲二字計甚利害他直得恁地用力所以後來做得詩來極是精高今吾人學問是大小大事卻全悠悠若存若亡更不著緊用力反不如他人做沒要緊底事可謂倒置諸公切宜勉之時舉諸友只有箇學之意都散漫不恁地勇猛恐度了日子須著火急痛切意思嚴了期限趲了工夫辦幾箇月日氣力去攻破一過便就裏面旋旋涵養如攻寨須出萬死一生之計攻破了關限始得而今都打寨未破只循寨外走道理都咬不斷何時得透淳謂諸生曰公說欲遷善改過而不能只是公不自去做工夫若恁地安安排排只是做不成如人要赴水火這心才發便入裏面去若說道在這裏安排便只不成看公來此逐日只是相對默坐無言恁地慢滕滕如何做事數日後復云坐中諸公有會做工夫底有病痛底某一一都看見逐一救正他惟公恁地循循默默都理會公心下不得這是幽冥暗弱這是大病若是剛勇底人見得善別還他做得透做不是處也顯然在人耳目人皆見之前日公說風雷益看公也無些子風意思也無些子雷意思賀孫某於相法卻愛苦硬清虞底人然須是做得那苦硬底事若只要苦硬亦不知為學何貴之有而今朋友遠處來者或有意於為學眼前朋友大率只是據見定了更不求進步而今莫說更做甚工夫只真箇看得百十字精細底也不見有或曰今之朋友大率多為作時文妨了工夫曰也不曾見做得好底時文只是剽竊亂道之文而已若要真箇做時文底也須深資廣取以自輔益以之為時文莫更好只是讀得那亂道底時文求合那亂道底試官為苟簡滅裂底工夫他亦不曾子細讀那好底時文和時文也有時不子細讀得某記少年應舉時嘗下視那試官說他如何曉得我底意思今人盡要去求合試官越做得那物事低了嘗見已前相識間做賦者甚麼樣讀書無書不讀而今只念那亂道底賦有甚見識若見識稍高讀書稍多議論高人豈不更做得好文字出他見得底只是如此遂互相倣傚專為苟簡滅裂底工夫歎息者久之僩看來如今學者之病多是箇好名且如讀書卻不去子細考究義理教極分明只是纔看過便了只道自家已看得甚麼文字了都不思量於身上濟得甚事這箇只是做名聲其實又做得甚麼名聲下梢只得人說他已看得甚文字了這箇非獨卓丈如此看來都如此若恁地也是枉了一生賀孫今學者大抵不曾子細玩味得聖賢言意卻要懸空妄立議論一似喫物事相似肚裏其實未曾飽卻以手鼓腹向人說我已飽了只此乃是未飽若真箇飽者卻未必說也人人好做甚銘做甚贊於己分上其實何益既不曾實講得書玩味得聖賢言意則今日所說者是這箇話明日又只是這箇話豈得有新見邪切宜戒之時舉今朋友之不進者皆有彼善於此為足矣之心而無求為聖賢之志故皆有自恕之心而不能痛去其病故其病常隨在依舊逐事物流轉將求其彼善於此亦不可得矣大雅昌父言學者工夫多間斷曰聖賢教人只是要救一箇間斷文蔚因說學者工夫間斷謂古山和尚自言喫古山飯阿古山矢只是看得一頭白水牯今之學者卻不如他文蔚有一等朋友始初甚銳意漸漸疏散終至於忘了如此是當初不立界分做去士毅今來朋友相聚都未見得大底道理還且謾恁地逐段看還要直截盡理會許多道理教身上沒些子虧欠若只恁地逐段看不理會大底道理依前不濟事這大底道理如曠闊底基址須是開墾得這箇些方始架造安排有頓放處見得大底道理方有立腳安頓處若不見得大底道理如人無箇居著趁得百十錢歸來也無頓放處況得明珠至寶安頓在那裏自家一身都是許多道理人人有許多道理蓋自天降衷萬里皆具仁義禮智君臣父子兄弟朋友夫婦自家一身都擔在這裏須是理會了體認教一一周足略欠缺些子不得須要緩心直要理會教盡須是大作規模闊開其基廣闊其地少間到逐處即看逐處都有頓放處日用之間只在這許多道理裏面轉喫飯也在上面上床也在上面下床也在上面脫衣服也在上面更無些子空闕處堯舜禹湯也只是這道理如人刺繡花草不要看他繡得好須看他下針處如人寫字好不要看他寫得好只看他把筆處賀孫先生問諸公莫更有甚商量坐中有云此中諸公學問皆溺於高遠無根近來方得生生發明未遽有問將來有所疑卻寫去問先生曰卻是以待來年然後已說話此只是不曾切己立志若果切己立志睡也不著起來理會所以發憤忘食終日不食終夜不寢去理會今人有兩般見識一般只是談虛說妙全不切己把做一場說話了又有一般人說此事難理會只恁地做人自得讓與他們自理會如人交易情愿批退帳待別人典買今人情愿批退學問底多謙諸公數日看文字但就文字上理會不曾切己凡看文字非是要理會文字正要理會自家性分上事學者須要主一主一當要心存在這裏方可做工夫如人須尋箇屋子住至於為農工商賈方惟其所之主者無箇屋子如小人趁得百錢亦無歸宿孟子說求其放心已是兩截如常知得心在這裏則心自不放又云無事時須要知得此心不知此心卻似睡困都不濟事今看文字又理會理義不出亦只緣主一工夫欠闕植時舉同先生一日謂諸生曰某患學者讀書不求經旨談說空妙故欲令先通曉文義就文求意下梢頭往往又只守定冊子上言語卻看得不切己須是將切己看玩味入心力去行之方有所益端蒙學者說文字或支離泛濫先生曰看教切己文蔚學者講學多是不疑其所當疑而疑其所不當疑不疑其所當疑故眼前合理會處多蹉過疑其所不當疑故枉費了工夫金溪之徒不事講學只將箇心來作弄胡撞亂撞此間所以令學者入細觀書做工夫者正欲其熟考聖賢言語求箇的確所在今卻考索得如此支離反不濟事如某向來作或問蓋欲學者識取正意觀此書者當於其中見得此是當辨此不足辨刪其不足辨者令正意愈明白可也若更去外面生出許多議論則正意反不明矣今非特不見經文正意只諸家之說亦看他正意未著又曰中庸言慎思何故不言深思又不言勤思蓋不可枉費心去思之須是思其所當思者故曰慎思也必大或問向蒙見教讀書須要涵泳須要挾洽因看孟子千言萬語只是論心七篇之書如此看是涵泳工夫否曰某為見此中人讀書大段鹵莽所以說讀書須當涵泳只要子細看玩尋繹令胸中有所得爾如吾友所說又襯貼一件意思硬要差排看書豈是如此或曰先生涵泳之說乃杜元凱優而游之之意曰固是如此亦不用如此解說所謂涵泳者只是子細讀書之異名與人說話便是難某只是說一箇涵泳一人硬來安排一人硬來解說此是隨語生解支離延蔓閑說閑講少間展轉只是添得多說得遠卻要做甚若是如此讀書如此聽人說話全不是自做工夫全無巴鼻可知是使人說學是空談此中人所問大率如此好理會處不理會不當理會處卻支離去說說得全無意思蓋或問居處恭執事敬與人忠云須是從裏面做出來方得他外面如此曰公讀書便是多有此病這裏面又那得箇裏面做出來底說話來只是居處時便用恭執事便用敬與人時便用忠雖之夷狄不可棄也不過只是如此說大凡看書須只就他本文看教直截切忌如此支離蔓衍拖腳拖尾不濟得事聖賢說話那一句不直截如利刃削成相似雖以孔子之語渾然溫厚然他那句語更是斬截若如公說一句更用數十字去包他則聖賢何不逐句上更添幾字教他分曉只看濂溪二程橫渠們說話無不斬截有力語句自是恁地重無他所以看得如此寬緩無力者只是心念不整肅所以如此緣心念不整肅所以意思寬緩都湊泊他那意思不著說從別處去須是整肅心念看教他意思嚴緊說出來有力四方八面截然有界限始得如今說得如此支蔓都不成箇物事其病只在心念不整肅上僩讀書之法只要落窠槽今公們讀書盡不曾落得那窠槽只是走向外去思量所以都說差去如初間大水瀰漫少間水既退盡落低窪處方是入窠槽今盡是泛泛說從別處去某常以為書不難讀只要人緊貼就聖人言語上平心看他文義自見今都是硬差排思其所不當思疑其所不當疑辨其所不當辨盡是枉了濟得甚事僩某嘗說文字不難看只是讀者心自嶢崎了看不出若大著意思反復熟看那正當道理自湧出來不要將那小意智私見識去間亂他如此無緣看得出如千軍萬馬從這一條大路去行伍紀律自是不亂若撥數千人從一小路去空攪亂了正當底行陣無益於事又曰看書且要依文看得大概意思了卻去考究細碎處如今未曾看得正當底道理出便落草了墮在一隅一角上心都不活動這箇是轉水車相似只撥轉機關子他自是轉連那上面磨子篩籮一齊都轉自不費力而今一齊說得枯燥無些子滋味便更看二十年也只不濟事須教他心裏活動轉得莫著在那角落頭處而今諸公看文字如一箇船閣在淺水上轉動未得無那活水泛將去更將外面事物搭載放上面越見動不得都是枉用了心力枉費日子天下道理更有幾多若只如此看幾時了得某而今一自與諸公們說不辨只覺得都無意思所願諸公寬著意思且看正當道理教他活動有長進處方有所益如一條死蛇弄教他活而今只是弄得一條死蛇不濟事僩學者須要無事時去做得工夫然後可來此剖決是非今才一不在此便棄了這箇至此又卻臨時逐旋尋得一兩句言語來問則又何益壽昌或曰某尋常所學多於優游浹洽中得之曰若遽然便以為有所見亦未是大抵於博學審問慎思明辨且未可說篤行只這裏便是浹洽處孔子所以好古敏以求之其用力如此謨人合是疑了問公今卻是揀難處來問教人如何描摸若說得公又如何便曉得若升高必自下今人要入室奧須先入門入庭見路頭熟次第入中間來如何自階裏一造要做後門出伊川云學者須先就近處賀孫而今人聽人說話未盡便要爭說亦須待他人說教盡了他人有說不出處便須反覆問教說得盡了這裏方有處置在賀孫或人請諸經之疑先生既答之復曰今雖盡與公說公盡曉得不於自家心地上做工夫亦不濟事道夫諸公所以讀書無長進緣不會疑某雖看至沒緊要底物事亦須致疑纔疑便須理會得徹頭僩或謂問難只是作話頭不必如此曰不然到無疑處不必問疑則不可不問今如此云云不是惡他人問便是自家讀書未嘗有疑可學讀語錄玩了卻不如乍見者勇於得此是病方諸生請問不切曰群居最有益而今朋友乃不能相與講貫各有疑忌自私之意不知道學問是要理會箇甚麼若是切己做工夫底或有所疑便當質之朋友同其商量須有一人識得破者已是講得七八分卻到某面前商量便易為力今既各自東西不相講貫如何得會長進欲為學問須要打透這些子放令開闊識得箇以能問於不能以多問於寡底意思方是切於為己時舉或問太極曰看如今人與太極多少遠近或人自說所讀書曰徒然說得一片恁地多不濟事如今且要虛心心若不虛雖然恁地問待別人恁地說自不入他聽之如不聞只是他自有箇物事橫在心下如顏子人道他得一善則拳拳服膺而不失他不曾自知道得一善拳拳服膺而不失他見不善未嘗不知知之未嘗復行他不曾自知道見不善未嘗不知知之未嘗復行他不遷怒不貳過他不曾自知道不遷怒不貳過他只見箇道理當如此易曰君子以虛受人書曰惟學遜志舊有某人來問事略不虛心一味氣盈色滿當面與他說他全不聽得賀孫天下之理有長有短有大有小當各隨其義理看某看得學者有箇病於他人如此說處又討箇義理責其不如彼說於其如彼說處又責其不如此說因舉所執扇反復為喻曰此扇兩邊各有道理今學者待他人說此邊道理便翻轉那一邊難之及他說那一邊卻又翻轉這一邊難之必大問氣質之害直是今人不覺非特讀書就他氣質上說只如每日聽先生說話也各以其所偏為主如十句有一句合他意便硬執定這一句曰是如此且如仲山甫一詩蘇子由專歎美既明且哲以保其身二句伯恭偏喜柔嘉維則一句某問何不將那柔亦不茹剛亦不吐以下四句做好某意裏又愛這四句問這四句如何曰也自剛了問剛底終是占得分數多曰也不得只是比柔又較爭胡泳質敏不學乃大不敏有聖人之資必好學必下問若就自家杜撰更不學更不問便已是凡下了聖人之所以為聖也只是好學下問舜自耕稼陶漁以至於帝無非取諸人以為善孔子說禮吾聞諸老聃這也是學於老聃方知得這一事賀孫先生因學者少寬舒意曰公讀書恁地縝密固是好但恁地逼截成一團此氣象最不好這是偏處如一項人恁地不子細固是不成道理若一向蹙密下梢卻展拓不去明道一見謝顯道曰此秀才展拓得開下梢可望又曰於詞氣間亦見得人氣象如明道語言固無甚激昂看來便見寬舒意思龜山人只道恁地寬看來不是寬只是不解理會得不能理會得范純夫語解比諸公說理最平淺但自有寬舒氣象儘好賀孫因人之昏弱而箴之曰人做事全靠這些子精神節有言貧困不得專意問學者曰不干事世間豈有無事底人但十二時看那箇時閑一時閑便做一時工夫一刻閑便做一刻工夫積累久自然別或又以離遠師席不見解注為說曰且如某之讀書那曾得師友專守在裏初又曷嘗有許多文字也只自著力耳或曰先生高明某何敢望曰如此則全未知自責堯舜與人同耳曷嘗有異某嘗謂此皆是自恕之語最為病痛道夫或言氣稟昏弱難於為學曰誰道是公昏弱但反而思之便強便明這氣色打一轉日日做工夫日日有長進子蒙或問某欲克己而患未能曰此更無商量人患不知耳既已知之便合下手做更有甚商量為仁由己而由人乎哉雉或言今且看先生動容周旋以自檢先生所著文義卻自歸去理會曰文義只是目下所行底如何將文義別做一邊看若不去理會文義終日只管相守閑坐如何有這道理文義乃是躬行之門路躬行即是文義之事實賀孫或問人固欲事事物物理會然精力有限不解一一都理會得曰固有做不盡底但立一箇綱程不可先自放倒也須靜著心實著意沉潛反覆終久自曉得去祖道或說居敬窮理曰都不須如此說如何說又怕居敬不得窮理有窮不去處豈有此意只是自家元不曾居敬元不曾窮理所以說得如此若真箇去窮底豈有窮不得之理若心堅便是石也穿豈有道理了窮不得之理而今說又怕有窮不得處又怕如何又計較如何都是枉了只恁勇猛堅決向前去做無有不得之理不當如此遲疑如人欲出路若有馬便騎馬去有車便乘車去無車便徒步去只是從頭行將去豈有不到之理僩燾錄云問理有未窮且只持敬否曰不消恁地說持敬便只管持將去窮理便只管窮將去如說前面萬一持不得窮不得處又去別生計較這箇都是枉了思量然亦只是不曾真箇持敬窮理若是真箇曾持敬窮理豈有此說譬如出路要乘轎便乘轎要乘馬便乘馬要行便行都不消思量前面去不得時又著如何但當勇猛堅決向前那裏要似公說居敬不得處又著如何窮理不得處又著如何古人所謂心堅石穿蓋未嘗有做不得底事如公幾年讀書不長進時皆緣公恁地所以搭滯了又曰聖人之言本自直截若裏面有屈曲處聖人亦必說在上面若上面無底又何必思量從那屈曲處去都是枉了工夫或問格物一項稍支離曰公依舊是箇計較利害底心下在這裏公且試將所說行將去看何如若只管在這裏擬議如何見得如做得箇船且安排槳楫解了繩放了索打將去看卻自見涯岸若不放船去只管在這裏思量怕有風濤又怕有甚險如何得到岸公今恰似箇船全未曾放離岸只管計較利害聖賢之說那尚恁地子路有聞未之能行唯恐有聞如今說了千千萬萬卻不曾去下得分寸工夫又曰聖人常說有殺身以成仁今看公那邊人教他殺身以成仁道他肯不肯決定是不肯才說著他也道是怪在又曰吾未見剛者聖人只是要討這般人須是有這般資質方可將來磨治詩云追琢其章金玉其相須是有金玉之質方始琢磨得出若是泥土之質假饒你如何去裝飾只是箇不好物事自是你根腳本領不好了又曰如讀書只是理會得便做去公卻只管在這裏說道如何理會伊川云人所最可畏者便做賀孫先生問學者曰公今在此坐是主靜是窮理久之未對曰便是公不曾做工夫若不是主靜便是窮理只有此二者既不主靜又不窮理便是心無所用閑坐而已如此做工夫豈有長進之理佛者曰十二時中除了著衣喫飯是別用心夫子亦云造次必於是顛沛必於是須是如此做工夫方得公等每日只是閑用心問閑事說閑話底時節多問緊要事究竟自己底事時節少若是真箇做工夫底人他自是無閑工夫說閑話問閑事聖人言語有幾多緊要大節目都不曾理會小者固不可不理會然大者尤緊要僩或問致知當主敬又問當如先生說次第觀書曰此只是說話須要下工夫方得蓋卿諸公且自思量自朝至暮還曾有頃刻心從這軀殼裏思量過否僩賢輩但知有營營逐物之心不知有真心故識慮皆昏觀書察理皆草草不精眼前易曉者亦看不見皆由此心雜而不一故也所以前輩語初學者必以敬曰未有致知而不在敬者今未知反求諸心而胸中方且叢雜錯亂未知所守持此雜亂之心以觀書察理故凡工夫皆從一偏一角做去何緣會見得全理某以為諸公莫若且收斂身心盡掃雜慮令其光明洞達方能作得主宰方能見理不然亦終歲而無成耳大雅諸公皆有志於學然持敬工夫大段欠在若不知此何以為進學之本程先生云涵養須用敬進學則在致知此最切要游和之問不知敬如何持曰只是要收斂身心莫令走失而已今人精神自不曾定讀書安得精專凡看山看水風吹草動此心便自走失何以為學諸公切宜勉此南升先生語諸生曰人之為學五常百行豈能盡常常記得人之性惟五常為大五常之中仁尤為大而人之所以為是仁者又但當守敬之一字只是常求放心晝夜相承只管提撕莫令廢惰則雖不能常常盡記眾理而義禮智信之用自然隨其事之當然而發見矣子細思之學者最是此一事為要所以孔門只教人求仁也閎祖或曰每常處事或思慮之發覺得發之正者心常安其不正者心常不安然義理不足以勝私欲之心少間安者卻容忍不安者卻依舊被私欲牽將去及至事過又卻悔悔時依舊是本心發處否曰然只那安不安處便是本心之德孔子曰志士仁人無求生以害仁有殺身以成仁求生如何便害仁殺身如何便成仁只是箇安與不安而已又曰不待接事時方流入於私欲只那未接物時此心已自流了須是未接物時也常剔抉此心教他分明少間接事便不至於流上蔡解為人謀而不忠云為人謀而忠非特臨事而謀至於平居靜慮思所以處人者一有不盡則非忠矣此雖於本文說得來大過然卻如此今人未到為人謀時方不忠只平居靜慮閑思念時便自懷一箇利便於己將不好處推與人之心矣須是於此處常常照管得分明方得僩或問靜時見得此心及接物時又不見曰心如何見得接物時只要求箇是應得是便是心得其正應得不是便是心失其正所以要窮理且如人唱喏須至誠還他喏人問何處來須據實說某處來即此便是應物之心如何更要見此心浙間有一般學問又是得江西之緒餘只管教人合眼端坐要見一箇物事如日頭相似便謂之悟此大可笑夫子所以不大段說心只說實事便自無病至孟子始說求放心然大概只要人不馳騖於外耳其弊便有這般底出來以此見聖人言語不可及學蒙或問覺得意思虛靜時應接事物少有不中節者纔是意思不虛靜少間應接事物便都錯亂曰然然公又只是守得那塊然底虛靜雖是虛靜裏面黑漫漫地不曾守得那白底虛靜濟得甚事所謂虛靜者須是將那黑底打開成箇白底教他裏面東西南北玲瓏透徹虛明顯敞如此方喚做虛靜若只確守得箇黑底虛靜何用也僩有問程門教人說敬卻遺了恭中庸說篤恭而天下平又不說敬如何恭敬不同曰昔有人曾以此問上蔡上蔡云不同恭是平聲敬是側聲舉坐大笑先生曰不是如此理會隨他所說處理會如只比並作箇問頭又何所益謙先生嘗語在坐者云學者常常令道理在胸中流轉過先生見學者解說之際或似張大即語之曰說道理不要大驚小怪過今之學者只有兩般不是玄空高妙便是膚淺外馳張洽因先生言近來學者多務高遠不自近處著工夫因言近來學者誠有好高之弊昔有問伊川如何是道伊川曰行處是又問明道如何是道明道令於君臣父子兄弟上求諸先生之言不曾有高遠之說先生曰明道之說固如此然君臣父子兄弟之間各有箇當然之理此便是道因說今人學問云學問只是一箇道理不知天下說出幾多言語來若內無所主一隨人腳跟轉是壞了多少人吾人日夜要講明此學只謂要理明學至不為邪說所害方是見得道理分明聖賢真可到言話真不誤人今人被人引得七上八下殊可笑謙或問左傳疑義曰公不求之於六經語孟之中而用功於左傳且左傳有甚麼道理縱有能幾何所謂棄卻甜桃樹緣山摘醋梨天之所賦於我者如光明寶藏不會收得卻上他人門教化一兩錢豈不哀哉只看聖人所說無不是這箇大本如云天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉不然子思何故說箇天命之謂性率性之謂道修道之謂教此三句是怎如此說是乃天地萬物之大本大根萬化皆從此出人若能體察得方見得聖賢所說道理皆從自己胸襟流出不假他求某向嘗見呂伯恭愛與學者說左傳某嘗戒之曰語孟六經許多道理不說恰限說這箇縱那上有些零碎道理濟得甚事伯恭不信後來又說到漢書若使其在不知今又說到甚處想益卑矣固宜為陸子靜所笑也子靜底是高只是下面空疏無物事承當伯恭底甚低如何得似他又曰人須是於大原本上看得透自然心胸開闊見世間事皆瑣瑣不足道矣又曰每日開眼便見這四箇字在面前仁義禮智只趯著腳指頭便是這四箇字若看得熟於世間道理沛然若決江河而下莫之能禦矣若看得道理透方見得每日所看經書無一句一字一點一畫不是道理之流行見天下事無大無小無一名一件不是此理之發見如此方見得這箇道理渾淪周遍不偏枯方見得所謂天命之謂性底全體今人只是隨所見而言或見得一二分或見得二三分都不曾見那全體不曾到那極處所以不濟事僩浙中朋友一等底只理會上面道理又只理會一箇空底物事都無用少間亦只是計較利害一等又只就下面理會事眼前雖粗有用又都零零碎碎了少間只見得利害如橫渠說釋氏有兩末之學兩末兩頭也卻是那中間事物轉關處都不理會賀孫問如何是轉關處曰如致知格物便是就事上理會道理理會上面底卻棄置事物為陳跡便只說箇無形影底道理然若還被他放下來更就事上理會又卻易只是他已見到上面一段物事不費氣力省事了又那肯下來理會理會下面底又都細碎了這般道理須是規模大方理會得遂舉伊川說曾子易簀便與有天下行一不義殺一不辜不為一同後來說得來便無他氣象大底卻可做小小底要做大卻難小底就事物細碎上理會賀孫先生問浙間事某曰浙間難得學問會說者不過孝悌忠信而已曰便是守此四字不得須是從頭理會來見天理從此流出便是炎謂邵武諸友公看文字看得緊切好只是邵武之俗不怕不會看文字不患看文字不切只怕少寬舒意思賀孫方伯謨以先生教人讀集注為不然蔡季通丈亦有此語且謂四方從學之士稍自負者皆不得其門而入去者亦多某因從容侍坐見先生舉以與學者云讀書須是自肯下工夫始得某向得之甚難故不敢輕說與人至於不得已而為注釋者亦是博採諸先生及前輩之精微寫出與人看極是簡要省了多少工夫學者又自輕看了依舊不得力蓋是時先生方獨任斯道之責如西銘通書易象諸書方出四方辨詰紛然而江西一種學問又自善鼓扇學者其於聖賢精義皆不暇深考學者樂於簡易甘於詭僻和之者亦眾然終不可與入堯舜之道故先生教人專以主敬窮理為主欲使學者自去窮究見得道理如此便自能立不待辨說而明此引而不發之意其為學者之心蓋甚切學者可不深味此意乎炎或問所謂窮理不知是反己求之於心惟復是逐物而求於物曰不是如此事事物物皆有箇道理窮得十分盡方是格物不是此心如何去窮理不成物自有箇道理心又有箇道理枯槁其心全與物不接卻使此理自見萬無是事不用自家心如何別向物上求一般道理不知物上道理卻是誰去窮得近世有人為學專要說空說妙不肯就實卻說是悟此是不知學學問無此法才說一悟字便不可窮詰不可研究不可與論是非一味說入虛談最為惑人然亦但能謾得無學底人若是有實學人如何被他謾才說悟便不是學問奉勸諸公且子細讀書書不曾讀不見義理乘虛接渺指摘一二句來問人又有漲開其說來問又有牽甲證乙來問皆是不曾有志朴實頭讀書若是有志朴實頭讀書真箇逐些理會將去所疑直是疑亦有可答不然彼己無益只是一場閑說話爾濟得甚事且如讀此一般書只就此一般書上窮究冊子外一箇字且莫兜攬來炒將來理明卻將已曉得者去解得未曉者如今學者將未能解說者卻去參解說不得者鶻突好笑悠悠歲月只若人耳謙或問所守所行似覺簡易然茫然未有所獲曰既覺得簡易自合有所得卻曰茫然無所獲者如何曰比之以前為學多岐今來似覺簡略耳愚殊不敢望得道只欲得一箇入頭處曰公之所以無所得者正坐不合簡易揚子雲曰以簡以易焉支焉離蓋支離所以為簡易也人須是博學之審問之慎思之明辨之篤行之然後可到簡易田地若不如此用工夫一蹴便到聖賢地位卻大段易了古人何故如此博學審問慎思明辨篤行乎夫是五者無先後有緩急不可謂博學時未暇審問審問時未暇慎思慎思時未暇明辨明辨時未暇篤行五者從頭做將下去只微有少差耳初無先後也如此用工他日自然簡易去謨錄注云包顯道以書論此先生面質如此孟子曰博學而詳說之將以反說約也語云博我以文約我以禮須是先博然後至約如何便先要約得人若先以簡易存心不知博學審問慎思明辨篤行將來便入異端去去偽謨同先生言此兩日甚思諸生之留書院者不知在彼如何孔子在陳思魯之狂士孟子所記本亦只是此說狂狷即狂簡不忘其初即不知所以裁之當時隨聖人在外底卻逐日可照管他留魯者卻不見得其所至如何然已說得成章了成章是有首有尾如異端亦然釋氏亦自說得有首有尾道家亦自說得有首有尾大抵未成者尚可救已成者為足慮時先生在郡中必大或云嘗見人說凡是外面尋討入來底都不是曰喫飯也是外面尋討入來若不是時須是肚裏做病如何又喫得安穩蓋飢而食者即是從裏面出來讀書亦然書固在外讀之而通其義者卻自是裏面事如何都喚做外面入來得必欲盡捨詩書而別求道理異端之說也琮天下道理自平易簡直人於其間只是為剖析人欲以復天理教明白洞達如此而已今不於明白處求卻求之於偏旁處縱得些理其能幾何今日諸公之弊卻自要說一種話云我有此理他人不知安有此事只是一般理只是要明得安有人不能而我獨能之事如此則是錯了可學學者同在此一般講學及其後說出來便各有差誤要其所成有上截底無下截有下截底無上截有皮殼底無肚腸有肚腸底無皮殼不知是如何必大曰工夫有間斷亦是氣質之偏使然曰固是氣質然大患是不子細嘗謂今人讀書得如漢儒亦好漢儒各專一家看得極子細今人才看這一件又要看那一件下梢都不曾理會得必大看二十五條曰此正與前段相反卻有上截無下截天資高底固有能不為富貴所累然下此者亦必思所以處之貧而樂者固勝如無諂富而好禮者固勝如無驕若未能無諂無驕底亦須且於此做工夫頃見一文集云有一人天資善弈極高遂入京見國手國手與之下了但云可隨我諸處看我與人弈如此者半年遂遣之其人曰某隨逐許時未蒙教得有所長國手曰汝碁本高但未曾識低著卻恐與人下時錯了我帶你去半年只是欲汝識低著耳因論碁又曰默堂集中亦載一說有兩箇對弈方爭一段甚危其人忽舍所爭卻別於閑處下一著眾所不曉既畢或問之曰所爭處已自定此一著亦有利害不可不急去先下一著然對者固未必曉問者曰既見得其人未必曉又何用急去下曰在彼雖可忽在我者不可不盡耳天下事皆當如此不獨弈也政和有客同侍坐先生曰這下人全不讀書莫說道教他讀別書只是要緊如六經漢書唐書諸子也須著讀始得又不是大段直錢了不能得他讀只問人借將來讀也得如何一向只去讀時文如何擔當箇秀才名目在身己上既做秀才未說道要他理會甚麼高深道理也須知得古聖賢所以垂世立教之意是如何古今盛衰存亡治亂事體是如何從古來人物議論是如何這許多眼前底都全不識如何做士人須是識得許多方始成得箇人又云向來人讀書為科舉計已自是末了如今又全不讀而赴科舉又末之末者若以今世之所習雖做得官貴窮公相也只是箇沒見識底人若依古聖賢所教做去雖極貧賤身自躬耕而胸次亦自浩然視被污濁卑下之徒曾犬彘之不若又曰如今人也須先立箇志趣始得還當自家要做甚麼人是要做聖賢是只要苟簡做箇人天教自家做人還只教恁地便是了閑時也須思量著聖賢還是元與自家一般還是有兩般天地交付許多與人不獨厚於聖賢而薄於自家是有這四端是無這四端只管在塵俗裏面羇還曾見四端頭面還不曾見四端頭面且自去看最難說是意趣卑下都不見上面許多道理公今如只管去喫魚鹹不知有芻豢之美若去喫芻豢自然見魚鹹是不好喫物事又云如論語說學而時習之公且自看平日是曾去學不曾去學曾去習不曾去習學是學箇甚麼習是習箇甚麼曾有說意思無說意思且去做好讀聖賢之書熟讀自見如孟子說亦有仁義而已這也不待注解如何孟子須教人舍利而就義如今人如何只去義而趨利賀孫問曾點曰今學者全無曾點分毫氣象今整日理會一箇半箇字有下落猶未分曉如何敢望他他直是見得這道理活潑潑地快活若似而今諸公樣做工夫如何得似它問學者須是打疊得世間一副當富貴利祿底心方可以言曾點氣象方有可用功處曰這箇大故是外面粗處某常說這箇不難打疊極未有要緊不知別人如何正當是裏面工夫極有細碎難理會處要人打疊得若只是外面富貴利祿此何足道若更這處打不箇透說甚麼學正當學者裏面工夫多有節病人亦多般樣而今自家只見得這箇重便說難打疊它人病痛又有不在是者若人人將這箇去律它教須打併這箇了方可做那箇則其無此病者卻覺得緩散無力急這一邊便緩卻那一邊所以這道理極難要無所不用其力莫問他急緩先後只認是處便奉行不是處便緊閉教他莫要出來所以說是故君子無所不用其極是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微又曰仁以為己任不亦重乎四方八面盡要照管得到若一處疏闕那病痛便從那疏處入來如人冢殺凡山川途徑險阻要害無處不要防守如姜維守蜀它只知重兵守著正路以為魏師莫能來不知鄧艾卻從陰平武都而入反出其後它當初也說那裏險阻人必來不得不知意之所不備處才有縫罅便被賊人來了做工夫都要如此所以這事極難只看是故君子無所不用其極一句便見而今人有終身愛官職不知厭足者又有做到中中官職便足者又有全然不要只恁地懶惰因循我也不要官職我也無力為善平平過者又有始間是好人末後不好者又有始間不好到末好者如此者多矣又有做到宰相了猶未知厭足更要經營久做者極多般樣僩先生過信州一士子請見問為學之道曰道二仁與不仁而已矣聖人千言萬語只是要教人做人文蔚先生曰相隨同歸者前面未必程程可說話相送至此者一別又不知幾年有話可早商量久而無人問先生遂云學者須要勇決須要思量須要著緊又云此間學者只有過底無有不及底在大桂鋪說震與或人說公平日說甚剛氣到這裏為人所轉都屈了凡事若見得了須使堅如金石舊看不尚文華薄勢利之類說話便信以為然將謂人人如在後方知不然此在資質學者輕俊者不美朴厚者好振先生因言學者平居議論多頹塌臨事難望它做得事遂說一姓王學者後來狼狽是其平時議論亦專是回互有一處責曾子許多時用大夫之簀臨時不是童子說則幾失易簀王便云這是曾子好處既受其簀若不用之必至取怒季孫故須且將來用大抵今之學者多此病如學夫子便學他微服過宋君命召不俟駕見南子與佛肸召之類有多少處不學只學他這箇胡泳大率為善須自有立今欲為善之人不可謂少然多顧浮議浮議何足恤蓋彼之是非干我何事亦是我此中不痛切耳若自著緊自痛切亦何暇恤它人之議哉大雅或言某人好善曰只是徇人情與世浮沉要教人道好又一種人見如此卻欲矯之一味只是說人短長道人不是全不反己且道我是甚麼人它是如何人全不看他所為是如何我所為是如何一向只要胡亂說人此二等人皆是不知本領見歸一偏坐落在窠臼中不能得出聖賢便不如此謙因說而今人須是它曉得方可與它說話有般人說與眼前事尚不曉如何要他知得千百年英雄心事燾有一朋友輕慢去後因事偶語及之先生曰何不早說得某與他道坐中應曰不欲說曰他在卻不欲說去後卻後面說他越不是端蒙因論諸人為學曰到學得爭綱爭紀學卻反成箇不好底物事揚曰大率是人小故然又各人合下有箇肚私見識世間書人無所不有又一切去附會上故皆偏側違道去先生甚然之揚門人有與人交訟者先生數責之云欲之甚則昏蔽而忘義理求之極則爭奪而至怨仇賀孫每夜諸生會集有一長上纔坐定便閑話先生責曰公年已四十書讀未通纔坐便說別人事夜來諸公閑話至二更如何如此相聚不回光反照作自己工夫卻要閑說歎息久之賀孫有侍坐而困睡者先生責之敬子曰僧家言常常提起此志令堅強則坐得自直亦不昏困纔一縱肆則嗒然頹放矣曰固是道家修養也怕昏困常要直身坐謂之生腰坐若昏困倒靠則是死腰坐矣因舉小南和尚少年從師參禪一日偶靠倚而坐其師見之叱曰得恁地無脊梁骨小南悚然自此終身不靠倚坐又舉徐處仁知北京日早辰會僚屬治事訖復穿衣會坐談廳上徐多記覽多說平生履歷州郡利害政事得失及前言往行終日危坐僚屬甚苦之嘗暑月會坐有秦兵曹者瞌睡徐厲聲叱之起曰某在此說話公卻瞌睡豈以某言為不足聽耶未論某是公長官只論鄉曲亦是公丈人行安得如此叫客將掇取秦兵曹坐椅子去問徐後來做宰相卻無聲譽曰他只有治郡之才僩有學者每相揖畢輒縮左手袖中先生曰公常常縮著一隻手是如何也似不是舉止模樣義剛先生讀書屏山書堂一日與諸生同行登臺見草盛命數兵耘草分作四段令各耘一角有一兵逐根拔去耘得甚不多其它所耘處一齊了畢先生見耘未了者問諸生曰諸公看幾箇耘草那箇快諸生言諸兵皆快獨指此一人以為鈍曰不然某看來此卒獨快因細視諸兵所耘處草皆去不盡悉復呼來再耘先生復曰那一兵雖不甚快看他甚子細逐根去令盡雖一時之難卻只是一番工夫便了這幾箇又著從頭再用工夫只緣其初欲速苟簡致得費力如此看這處便是學者讀書之法宇留丞相以書問詩集傳數處先生以書示學者曰他官做到這地位又年齒之高如此雖在貶所亦不曾閑度日公等豈可不惜寸陰友仁先生氣疾作諸生連日皆無問難一夕遣介召入臥內諸生亦無所請先生怒曰諸公恁地閑坐時是怎生地恁地便歸去強不消得恁地遠來義剛大有事用理會在某今只是覺得後面日子短促了精力有所不逮然力之所及亦不敢不勉思量著有萬千事要理會在自是不容已只是覺得後面日子大故催促人可為慨歎耳先生言日來多病更無理會處恐必不久於世諸公全靠某不得須是自去做工夫始得且如看文字須要此心在上面若心不在上面便是不曾看相似所謂視之不見聽之不聞只是心不在焉耳時舉先生不出令入臥內相見云某病此番甚重向時見文字也要議論而今都怕了諸友可各自努力全靠某不得時舉講學須要著實向來諸公都見得不明卻要做一罩說語次云目前諸友亦多有識門戶者某旦暮死耳不敢望大行且得接續三四十年說與後進令知亦好時舉先生一日腰疼甚時作呻吟聲忽曰人之為學如某腰疼方是在坐者皆不能問泳久而思之恐是為學工夫意思接續自然無頃刻之忽忘然後進進不已痛楚在身雖欲無之而不可得故以開諭學者其警人之意深矣胡泳因說工夫不可間斷曰某若臂痛常以手擦之其痛遂止若或時擦或時不擦無緣見效即此便是做工夫之法正叔退謂文蔚曰擦臂之喻最有味文蔚
