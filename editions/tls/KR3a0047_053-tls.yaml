body:
  text: 朱子語類卷第五十三孟子三公孫丑上之下以力假仁章彝叟問行仁與假仁如何曰公且道如何是行仁假仁曰莫是誠與不誠否曰這箇自分曉不須問得如由仁義行非行仁義處卻好問如行仁便自仁中行出皆仁之德若假仁便是恃其甲兵之強財賦之多足以欺人是假仁之名以欺其眾非有仁之實也故下文言伯必有大國其言可見又曰成湯東征西怨南征北怨皆是拯民於水火之中此是行仁也齊桓公時周室微弱夷狄強大桓公攘夷狄尊王室九合諸侯不以兵車這只是仁之功終無拯民塗炭之心謂之行仁則不可卓問以力假仁以德行仁曰以力假仁仁與力是兩箇以德行仁仁便是德德便是仁問霸字之義曰霸即伯也漢書引哉生魄作哉生霸古者霸伯魄三字通用夔孫以德行仁者王所謂德者非止謂有救民於水火之誠心這德字又說得闊是自己身上事都做得是無一不備了所以行出去便是仁僩問以德行仁者王曰且如成湯不邇聲色不殖貨利德懋懋官功懋懋賞用人惟己改過不吝克寬克仁彰信兆民是先有前面底方能彰信兆民救民於水火之中若無前面底雖欲救民於水火之中不可得也武王亶聰明作元后是亶聰明方能作元后救民於水火之中若無這亶聰明雖欲救民其道何由燾仁則榮章仁則榮不仁則辱此亦只是為下等人言若是上等人他豈以榮辱之故而後行仁哉伊川易傳比彖辭有云以聖人之心言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡至矣蓋且得他畏危亡之禍而求所以比附其民猶勝於全不顧者政此謂也僩尊賢使能章市廛而不征問此市在何處曰此都邑之市人君國都如井田樣畫為九區面朝背市左祖右社中間一區則君之宮室宮室前一區為外朝凡朝會藏庫之屬皆在焉後一區為市市四面有門每日市門開則商賈百物皆入焉賦其廛者謂收其市地錢如今民間之舖面錢蓋逐末者多則賦其廛以抑之少則不廛而但治以市官之法所以招徠之也市官之法如周禮司市平物價治爭訟譏察異服異言之類市中惟民乃得入凡公卿大夫有爵位及士者皆不得入入則有罰如國君過市則刑人赦夫人過市則罰一幕世子過市則罰一欒命夫命婦過市則罰一蓋帷之類左右各三區皆民所居而外朝一區左則宗廟右則社稷在焉此國君都邑規模之大概也僩或問法而不廛謂治以市官之法如何是市官之法曰周禮自有如司市之屬平價治爭訟謹權量等事皆其法也又問市廛而不征法而不廛曰市廛而不征謂使居市之廛者各出廛賦若干如今人賃舖面相似更不征稅其所貨之物法而不廛則但治之以市官之法而已雖廛賦亦不取之也又問古之為市者以其所有易其所無者有司者治之耳此便是市官之法否曰然如漢之獄市軍市之類皆是古之遺制蓋自有一箇所在以為市其中自有許多事廣市廛而不征法而不廛伊川之說如何曰伊川之說不可曉橫渠作二法其說卻似分明謨問廛無夫里之布周禮宅不毛者有里布民無職事出夫家之征鄭氏謂宅不種桑麻者罰之使出一里二十五家之布不知一里二十五家之布是如何曰亦不可考又問鄭氏謂民無常業者罰之使出一夫百畝之稅一家力役之征如何罰得恁地重曰後世之法與此正相反農民賦稅丁錢卻重而遊手浮浪之民泰然都不管他因說浙間農民丁錢之重民之彫困不可開眼至人皆有不忍人之心章人皆有不忍人之心者是得天地生物之心為心也蓋無天地生物之心則沒這身才有這血氣之身便具天地生物之心矣燾人皆有不忍人之心人皆自和氣中生天地生人物須是和氣方生要生這人便是氣和然後能生人自和氣中生所以有不忍人之心天地以生物為心天包著地別無所作為只是生物而已异古异今生生不窮人物則得此生物之心以為心所以箇箇肖他本不須說以生物為心緣做箇語句難做著箇以生物為心僩問天地以生物為心而所生之物因各得夫天地之心以為心所以人皆有不忍人之心曰天地生物自是溫暖和煦這箇便是仁所以人物得之無不有慈愛惻怛之心又曰人物皆得此理只緣他上面一箇母子如此所以生物無不肖他又曰心如界方一面青一面赤一面白一面黑青屬東方仁也赤屬南方禮也白屬西方義也黑屬北方智也又如寅卯辰屬東方為春巳午未屬南方為夏申酉戌屬西方為秋亥子丑屬北方為冬寅卯辰是萬物初生時是那生氣方發這便是仁至巳午未則萬物長茂只是那生氣發得來盛及至申酉戌則那生氣到此生得來充足無餘那物事只有許多限量生滿了更生去不得須用收斂所以秋訓揫揫斂也揫斂箇什麼只是生氣到這裏都揫斂耳若更生去則無合殺矣及至亥子丑屬冬冬終也終藏也生氣到此都終藏了然那生底氣早是在裏面發動了可以見生氣之不息也所以說復見天地之心也胡泳天地以生物為心譬如甄蒸飯氣從下面滾到上面又滾下只管在裏面滾便蒸得熟天地只是包許多氣在這裏無出處滾一番便生一番物他別無勾當只是生物不似人便有許多應接所謂為心者豈是切切然去做如云天命之豈諄諄然命之也但如磨子相似只管磨出這物事人便是小胞天地是大胞人首圓象天足方象地中間虛包許多生氣自是惻隱不是為見人我一理後方有此惻隱而今便教單獨只有一箇人也自有這惻隱若謂見人我一理而後有之便是兩人相夾在這裏方有惻隱則是仁在外非由內也且如乍見孺子入井時有惻隱若見他人入井時也須自有惻隱在池錄作若未見孺子入井亦自是惻隱問怵惕莫是動處因怵惕而後惻隱否曰不知孟子怎生尋得這四箇字恁地好夔孫孟子赤子入井章間架闊須恁地看夔孫說仁只看孺子將入井時尤好體認季札問如何是發之人心而不可已曰見孺子將入井惻隱之心便發出來如何已得此樣說話孟子說得極分明世間事若出於人力安排底便已得若已不得底便是自然底祖道方其乍見孺子入井時也著腳手不得縱有許多私意要譽鄉黨之類也未暇思量到但更遲霎時則了不得也是非辭遜羞惡雖是與惻隱並說但此三者皆自惻隱中發出來因有惻隱後方有此三者惻隱比三者又較大得些子義剛非惡其聲非惡其有不救孺子之惡聲也升卿問惡其聲而然何為不可曰惡其聲已是有些計較乍見而惻隱天理之所發見而無所計較也惡其聲之念一形則出於人欲矣人欲隱於天理之中其幾甚微學者所宜體察燾或問非內交要譽惡其聲而怵惕惻隱形焉是其中心不忍之實也若內交要譽惡其聲之類一毫萌焉則為私欲蔽其本心矣據南軒如此說集注卻不如此說曰這當作兩截看初且將大界限看且分別一箇義利了卻細看初看惻隱便是仁若恁地殘賊便是不仁羞惡是義若無廉恥便是不義辭遜是禮若恁地爭奪便是無禮是非是知若恁地顛顛倒倒便是不知且恁地看了又卻於惻隱羞惡上面看有是出於至誠如此底有不是出於本來善心底賀孫先生問節曰孺子入井如何不推得羞惡之類出來只推得惻隱出來節應曰節以為當他出來曰是從這一路子去感得他出來節如孺子入井如何不推得其他底出來只推得惻隱之心出來蓋理各有路如做得穿窬底事如何令人不羞惡偶遇一人衣冠而揖我我便亦揖他如何不恭敬事有是非必辨別其是非試看是甚麼去感得他何處一般出來節孟子論乍見孺子將入於井怵惕惻隱一段如何說得如此好只是平平地說去自是好而今人做作說一片只是不如他又曰怵惕惻隱羞惡都是道理自然如此不是安排合下制這仁字纔是那傷害底事便自然惻隱合下制這義字纔見那不好底事便自然羞惡這仁與義都在那惻隱羞惡之先未有那惻隱底事時已先有那愛底心了未有那羞惡底事時已先有那斷制裁割底心了又曰日用應接動靜之間這箇道理從這裏迸將出去如箇寶塔那毫光都從四面迸出去僩或問滿腔子是惻隱之心曰此身軀殼謂之腔子而今人滿身知痛處可見銖池錄作疾痛痾癢舉切吾身何處不有問滿腔子是惻隱之心曰此身軀殼謂之腔子能於此身知有痛便見於應接方知有箇是與不是季札問滿腔子是惻隱之心只是此心常存纔有一分私意便闕了他一分曰只是滿這箇軀殼都是惻隱之心纔築著便是這箇物事出來大感則大應小感則小應恰似大段痛傷固是痛只如針子略挑些血出也便痛故日用所當應接更無些子間隔癢痾疾痛莫不相關纔是有些子不通便是被些私意隔了賀孫問滿腔子是惻隱之心或以為京師市語食飽時心動呂子約云曰不然此是為動字所拘腔子身裏也言滿身裏皆惻隱之心心在腔子裏亦如云心只是在身裏問心所發處不一便說惻隱如何曰惻隱之心渾身皆是無處不發如見赤子有惻隱之心見一蟻子亦豈無此心可學問如何是滿腔子皆惻隱之心曰腔只是此身裏虛處問莫是人生來惻隱之心具足否曰如今也恁地看事有箇不穩處便自覺不穩這便是惻隱之心林擇之嘗說人七尺之軀一箇針劄著便痛問吾身固如此處事物亦然否曰此心應物不窮若事事物物常是這箇心便是仁若有一事不如此便是這一處不仁了問本心依舊在否曰如今未要理會在不在論著理來他自是在那裏只是這一處不恁地便是這一處不在了如率土之濱莫非王臣忽然有一鄉人自不服化稱王稱伯便是這一處無君君也只在那裏然而他靠不得不可道是天理只在那裏自家這私欲放行不妨王信伯在館中范伯達問人須是天下物物皆歸吾仁王指涜櫺問范曰此涜還歸仁否范默然某見之當答曰此涜不歸仁何故不打壞了如人處事但箇箇處得是便是事事歸仁且如涜也要糊得在那裏教好不成沒巴鼻打壞了問仁者以萬物為一體如事至物來皆有以處之如事物未至不可得而體者如何曰只是不在這裏然此理也在這裏若來時便以此處之榦問滿腔子是惻隱之心如何是滿腔子曰滿腔子是只在這軀殼裏腔子乃洛中俗語又問惻隱之心固是人心之懿因物感而發見處前輩令以此操而存之充而達之不知如何要常存得此心曰此心因物方感得出來如何強要尋討出此心常存在這裏只是因感時識得此體平時敬以存之久久會熟善端發處益見得分曉則存養之功益有所施矣又問要惻隱之心常存莫只是要得此心常有發生意否曰四端中羞惡辭讓是非亦因事而發爾此心未當起羞惡之時而強要憎惡那人便不可如惻隱亦因有感而始見欲強安排教如此也不得如天之四時亦因發見處見得欲於冬時要尋討箇春出來不知如何尋到那陽氣發生萬物處方見得是春耳學者但要識得此心存主在敬四端漸會擴充矣宇滿腔子是惻隱之心不特是惻隱之心滿腔子是羞惡之心滿腔子是辭遜之心滿腔子是是非之心彌滿充實都無空闕處滿腔子是惻隱之心如將刀割著固是痛若將針劄著也痛如爛打一頓固是痛便輕掐一下也痛此類可見僩滿腔子是惻隱之心腔子猶言郭此是方言指盈於人身而言因論方言難曉如橫渠語錄是呂與叔諸公隨日編者多陝西方言全有不可曉者惻隱之心頭尾都是惻隱三者則頭是惻隱尾是羞惡辭遜是非若不是惻隱則三者都是死物蓋惻隱是箇頭子羞惡辭遜是非便從這裏發來夔孫既仁矣合惻隱則惻隱合羞惡則羞惡節不成只管惻隱須有斷制德明惻隱羞惡也有中節不中節若不當惻隱而惻隱不當羞惡而羞惡便是不中節淳仁義禮智性也且言有此理至惻隱羞惡辭遜是非始謂之心德明惻隱羞惡辭讓是非情也仁義禮智性也心統情性者也端緒也因情之發露而後性之本然者可得而見季札四端本諸人心皆因所寓而後發見季札王丈說孟子惻隱之心一段論心不論性曰心性只是一箇物事離不得孟子說四端處最好看惻隱是情惻隱之心是心仁是性三者相因橫渠云心統性情此說極好閎祖王德修解四端謂和靖言此只言心不言性如操則存舍則亡出入無時莫知其鄉亦只是言心曰固是言心畢竟那仁義禮智是甚物仁義禮智是性端便是情纔說一箇心字便是著性情果判然是二截如何此處疑有闕誤德修曰固是心統性情孟子於此只是說心文蔚問四端之端集解以為端緒向見季通說端乃尾如何曰以體用言之有體而後有用故端亦可謂之尾若以始終言之則四端是始發處故亦可以端緒言之二說各有所指自不相礙也廣四端未是盡所以只謂之端然四端八箇字每字是一意惻是惻然有此念起隱是惻然之後隱痛比惻是深羞者羞己之非惡者惡人之惡辭者辭己之物讓者讓與他人是非自是兩樣分明但仁是總名若說仁義便如陰陽若說四端便如四時若分四端八字便如八節又曰天地只是一氣便自分陰陽緣有陰陽二氣相感化生萬物故事物未嘗無對天便對地生便對死語默動靜皆然以其種如此故也所以四端只舉仁義言亦如陰陽故曰立天之道曰陰與陽立人之道曰仁與義明作四端皆是自人心發出惻隱本是說愛愛則是說仁如見孺子將入井而救之此心只是愛這孺子惻隱元在這心裏面被外面事觸起羞惡辭遜是非亦然格物便是從此四者推將去要見裏面是甚底物事賜仁言惻隱之端如水之動處蓋水平靜而流則不見其動流到灘石之地有以觸之則其勢必動動則有可見之端如仁之體存之於心若愛親敬兄皆是此心本然初無可見及其發而接物有所感動此心惻然所以可見如怵惕於孺子入井之類是也卓或問四端曰看道理也有兩般看得細時卻見得義理精處看得粗時卻且見得大概處四端未見精細時且見得惻隱便是仁不惻隱而殘忍便是不仁羞惡便是義貪利無廉恥便是不義辭遜便是禮攘奪便是非禮是非便是智大段無知顛倒錯謬便是不智若見得細時雖有惻隱之心而意在於內交要譽亦是不仁了然孟子之意本初不如此只是言此四端皆是心中本有之物隨觸而發方孺子將入於井之時而怵惕惻隱之心便形於外初無許多涯涘卓惻隱羞惡是仁義之端惻隱自是情仁自是性性即是這道理仁本難說中間卻是愛之理發出來方有惻隱義卻是羞惡之理發出來方有羞惡禮卻是辭遜之理發出來方有辭遜智卻是是非之理發出來方有是非仁義禮智是未發底道理惻隱羞惡辭遜是非是已發底端倪如桃仁杏仁是仁到得萌芽卻是惻隱又曰分別得界限了更須日用常自體認看仁義禮智意思是如何又曰如今因孟子所說惻隱之端可以識得仁意思因說羞惡之端可以識得義意思因說恭敬之端可以識得禮意思因說是非之端可以識得智意思緣是仁義禮智本體自無形影要捉模不著一作得只得將他發動處看卻自見得恰如有這般兒子便知得是這樣母程子云以其惻隱知其有仁此八字說得最親切分明也不道惻隱便是仁又不道掉了惻隱別取一箇物事說仁譬如草木之萌芽可以因萌芽知得他下面有根也不道萌芽便是根又不道掉了萌芽別取一箇根又曰孟子說性不曾說著性只說乃若其情則可以為善看得情善則性之善可知又曰惻隱羞惡多是因逆其理而見惟有所可傷這裏惻隱之端便動惟有所可惡這裏羞惡之端便動若是事親從兄又是自然順處見之又曰人須擴而充之人誰無惻隱只是不能常如此能常如此便似孟子說火之始然泉之始達苟能充之足以保四海若不能常如此恰似火相似自去打滅了水相似自去淤塞了如草木之萌芽相似自去踏折了便死了更無生意又曰孟子云仁義禮智根於心心統性情故說心亦得賀孫問喜怒哀樂未發已發之別曰未發時無形影可見但於已發時照見謂如見孺子入井而有怵惕惻隱之心便照見得有仁在裏面見穿窬之類而有羞惡之心便照見得有義在裏面蓋這惻隱之心屬仁必有這仁在裏面故發出來做惻隱之心羞惡之心屬義必有這義在裏面故發出來做羞惡之心譬如目屬肝耳屬腎若視不明聽不聰必是肝腎有病若視之明聽之聰必是肝腎之氣無虧方能如此然而仁未有惻隱之心只是箇愛底心義未有羞惡之心只是箇斷制底心惟是先有這物事在裏面但隨所感觸便自是發出來故見孺子入井便是惻隱之心見穿窬之類便有羞惡之心見尊長之屬便有恭敬之心見得是便有是之之心見得非便有非之之心從那縫罅裏迸將出來恰似寶塔裏面四面毫光放出來又云孟子此一章其初只是匹自閒容易說出來然說得來連那本末內外體用精粗都包在裏面無些欠闕處如孔子許多門弟都不曾恁地說得分曉想是曾子子思後來講來講去講得精所以孟子說得來恁地若子思亦只說得箇大體分曉而已燾問前面專說不忍之心後面兼說四端亦是仁包四者否曰然道夫問惻隱之心如何包得四端曰惻隱便是初動時羞惡是非恭敬亦須是這箇先動一動了方會恁地只於動處便見譬如四時若不是有春生之氣夏來長箇甚麼秋時又把甚收冬時又把甚藏時舉惻隱是箇腦子羞惡辭遜是非須從這裏發來若非惻隱三者俱是死物了惻隱之心通貫此三者賜因說仁義禮智之別曰譬如一箇物自然有四界而仁則又周貫其中以四端言之其間又自有小界限各各是兩件事惻是惻然發動處隱是漸漸及著隱痛處羞是羞己之非惡是惡人之惡辭是辭之於己遜是遜之於人是非固是兩端雉問四端之根於心覺得一者纔動三者亦自次第而見曰這四箇界限自分明然亦有隨事相連而見者如事親孝是愛之理才孝便能敬兄便是義問有節文便是禮知其所以然便是智曰然問據看來多是相連而至者如惻隱於所傷便惡於其所以傷這是仁帶義意思惡於其所以傷便須惜其本來之未嘗傷這是義帶仁意思曰也是如此嘗思之孟子發明四端乃孔子所未發人只道孟子有闢楊墨之功殊不知他就人心上發明大功如此看來此說那時若行楊墨亦不攻而自退闢楊墨是扞邊境之功發明四端是安社稷之功若常體認得來所謂活潑潑地真箇是活潑潑地賀孫伊川常說如今人說力行是淺近事惟知為上知最為要緊中庸說知仁勇把知做擗初頭說可見知是要緊賀孫問孟子四端何為以知為後曰孟子只循環說智本來是藏仁義禮惟是知恁地了方恁地是仁禮義都藏在智裏面如元亨利貞貞是智貞卻藏元亨利意思在裏面如春夏秋冬冬是智冬卻藏春生夏長秋成意思在裏面且如冬伏藏都似不見到一陽初動這生意方從中出也未發露十二月也未盡發露只管養在這裏到春方發生到夏一齊都長秋漸成漸藏冬依舊都收藏了只是大明終始亦見得無終安得有始所以易言先生以至日閉關商旅不行后不省方賀孫孟子四端處極好思索玩味只反身而自驗其明昧深淺如何升卿著意讀孟子四端之類切要處其他論事處且緩不妨仔細看孟子說四端處兩段未發明一段處意思便與發明底同又不是安排須是本源有方發得出來著實見得皆是當為底道理又不是外面事如此知得果性善便有賓有主有輕有重又要心為主心把得定人慾自然沒安頓處孟子言仁人心也一段兩句下只說心祖道至問凡有四端於我者知皆擴而充之矣莫是知得了方能擴而充之否曰知皆擴而充之即是苟能知去擴充則此道漸漸生長如火之始然泉之始達中間矣字文意不斷充是滿其本然之量卻就上有擴字則是方知去推擴要充滿他所以如火之始然泉之始達問知皆擴而充之矣知字是重字還是輕字曰不能擴充者正為不知都只是冷過了若能知而擴充其勢甚順如乘快馬放下水船相似文蔚劉居之問知皆擴而充之章兩說充字寬夫未曉曰上只說知皆擴而充之只說知得了要推廣以充滿此心之量下云苟能充之足以保四海是能充滿此心之量上帶知皆擴字說下就能充滿說推擴而後能充能充則不必說擴也賀孫劉居之問人皆有不忍人之心一節曰隱之心仁之端也乍見孺子入井此只是一件事仁之端只是仁萌芽處如羞惡辭遜是非方是義禮智之萌芽處要推廣充滿得自家本然之量不特是孺子入井便恁地其他事皆恁地如羞惡辭遜是非不特於一件事上恁地要事事皆然方是充滿慊足無少欠闕也知皆擴而充之矣知方且是知得如此至說到苟能充之足以保四海即掉了擴字只說充字蓋知字與始然始達字相應充字與保四海相應才知得便自不能已若火始然便不可遏泉才達便涓涓流而不絕時舉問知皆擴而充之曰上面言擴而充之是方知要擴充到下面苟能充之便掉了箇擴字蓋充字是充滿得了知已到地頭相似擴字是方在箇路裏相似時舉知皆擴而充之南軒把知做重文勢未有此意知字只帶擴充說知皆擴而充之與苟能充之句相應上句是方知去充下句是真能恁地充淳問知皆擴而充之曰這處與於止知其所止語意略同上面在知字上下在能字上既知得則皆當擴而充之如惻隱之心是仁則每事皆當擴而為仁羞惡之心是義則每事皆當擴而為義為禮為知亦各如此今有一種人雖然知得又道是這箇也無妨而今未能理會得又且恁地如知這事做得不是到人憎面前也自皇恐識得可羞又卻不能改如今人受人之物既知是不當受便不受可也心裏又要卻說是我且受去莫管這便是不能充但當於知之之初便一向從這裏充將去便廣大如火之始然泉之始達始然始達能有幾多於這裏便當擴開放出使四散流出去便是能擴如怵惕孺子入井之心這一些子能做得甚事若不能充今日這些子發了又過卻明日這些子發了又過卻都只是閒若能擴充於這一事發見知得這是惻隱之心是仁於別底事便當將此心充去使事事是仁如不欲害人這是本心這是不忍處若能充之於每事上有害人之處便不可做這也是充其惻隱如齊宣王有愛牛之心孟子謂是乃仁術也若宣王能充著這心看甚事不可做只是面前見這一牛這心便動那不曾見底便不如此了至於興甲兵危士臣構怨於諸侯這是多少傷害只為利心一蔽見得土地之美卻忘了這心故孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所不愛及其所愛且如土地無情之物自是不當愛自家不必愛之愛他作甚梁惠王其始者愛心一萌縻爛其民以戰已自不是了又恐不勝盡驅所愛子弟以徇之這是由其不愛之心反之以至害其所愛處這又是反著那心處子蒙凡有四端於我者知皆擴而充之只是要擴而充之而今四端之發甚有不整齊處有惻隱處有合惻隱而不惻隱處有羞惡處又有合羞惡而不羞惡處且如齊宣不忍於一牛而卻不愛百姓呼爾之食則知惡而弗受至於萬鍾之祿則不辨禮義而受之而今則要就這處理會夔孫人於仁義禮智惻隱羞惡辭遜是非此四者須當日夕體究令分曉精確此四者皆我所固有其初發時毫毛如也及推廣將去充滿其量則廣大無窮故孟子曰知皆擴而充之且如人有當惻隱而不惻隱當羞而不羞當惡而不惡當辭而不辭當遜而不遜是其所非非其所是者皆是失其本心此處皆當體察必有所以然也只此便是日用間做工夫處廣人只有箇仁義禮智四者是此身綱紐其他更無當於其發處體驗擴充將去惻隱羞惡是非辭遜日間時時發動特人自不能擴充耳又言四者時時發動特有正不正耳如暴戾愚狠便是發錯了羞惡之心含糊不分曉便是發錯了是非之心如一種不遜便是發錯了辭遜之心日間一正一反無往而非四端之發方子子武問四端須著逐處擴充之曰固是纔常常如此推廣少間便自會密自會闊到得無間斷少問卻自打合作一片去木之問如何擴而充之曰這事恭敬那事也恭敬事事恭敬方是節問推四端而行亦無欠闕曰無欠闕只恐交加了合惻隱底不惻隱合羞惡底不羞惡是是非非交加了四端本是對著他後流出來恐不對窠臼子問不對窠臼子莫是為私意隔了曰也是私意也是不曉節又問恭敬卻無當不當曰此人不當拜他自家也去拜他便不是節問推字與充字曰推是從這裏推將去如老吾老以及人之老幼吾幼以及人之幼到得此充則填得來滿了注水相似推是注下水去充則注得這一器滿了蓋仁義之性本自充塞天地若自家不能擴充則無緣得這箇殼子滿只是箇空殼子又曰充是占得這地位滿推是推吐雷反向前去僩問推四端無出乎守曰學者須見得守底是甚底物事人只是一箇心識得箇心卓然在這裏無走作雖不守亦自在學者且恁守將去賜問知皆擴而充之若火之始然至以事父母曰此心之量本足以包括天地兼利萬物只是人自不能充滿其量所以推不去或能推之於一家而不能推之於一國或能推之于一國而不足以及天下此皆是未盡其本然之量須是充滿其量自然足以保四海僩胡問擴充之義曰擴是張開充是放滿惻隱之心不是只見孺子時有事事都如此今日就第一件事上推將去明日又就第二件事上推將去漸漸放開自家及國自國及天下至足以保四海處便是充得盡問擴充亦是盡己推己否曰只是擴而充之那曾有界限處如手把筆落紙便自成字不可道手是一樣字又是一樣孺子入井在彼惻隱之心在我只是一箇物事不可道孺子入井是他底惻隱之心是我底義剛問前日承教令於日用間體認仁義禮知意思且如朋友皆異鄉人一日會聚思意便自相親這可見得愛之理形見處同門中或有做不好底事或有不好底人便使人惡之這可見得羞惡之理形見處每時升堂尊卑序齒秩然有序而不亂這可見得恭敬之理形見處聽先生教誨而能辨別得真是真非這可見得是非之理形見處凡此四端時時體認不使少有間斷便是所謂擴充之意否曰如此看得好這便是尋得路踏著了賀孫問體認四端擴充之意如朋友相親充之而無間斷則貧病必相卹患難必相死至於仁民愛物莫不皆然則仁之理得矣如朋友責善充之而無間斷則見惡必如惡惡臭以至於除殘去穢戢暴禁亂莫不皆然則義之理得矣如尊卑秩序充之而無間斷則不肯一時安於不正以至於正天下之大倫定天下之大分莫不皆然則禮之理得矣如是是非非充之而無間斷則善惡義利公私之別截然而不可亂以至於分別忠佞親君子遠小人莫不皆然則智之理得矣曰只要常常恁地體認若常常恁地體認則日用之間匝匝都滿密拶拶地問人心陷溺之久四端蔽於利欲之私初用工亦未免間斷曰固是然義理之心纔勝則利欲之念便消且如惻隱之心勝則殘虐之意自消羞惡之心勝則貪冒無恥之意自消恭敬之心勝則驕惰之意自消是非之心勝則含糊苟且頑冥昏謬之意自消賀孫楊至之云看孟子見得一箇大意是性之本體仁義之良心到戰國時君臣上下都一齊埋沒了孟子所以推明發見之端緒教人去體認擴充曰孟子高他都未有許多意思今說得一體認字蚤是遲鈍了孟子孟子大段見得敏見到快他說話恰似箇獅子跳躍相似且如他說箇惻隱之心便是仁之端羞惡之心便是義之端只他說在那裏底便是似他說時見得聖賢大段易做全無許多等級所以程子云孟子才高學之無可依據道夫周季儼云在興化攝學事因與諸生說得一部孟子先生因問孟子裏面大綱目是如何答云要得人充擴惻隱羞惡許多固要充擴如說無欲害人無穿窬之心亦要充擴先生曰人生本來合有許多好底到得被物遮蔽了卻把不好處做合著做底事周云看孟子說性只是道順底是纔逆便不是曰止緣今人做不好事卻順因問孟子以下諸人言性誰說得庶幾周云似乎荀子以為惡卻索性只荀子有意於救世故為此說先生久之曰韓公之意人多看不出他初便說所以為性者五曰仁義禮智信所以為情者七曰喜怒哀懼愛惡欲下方說三品看其初語豈不知得性善他只欠數字便說得出黃嵩老云韓子欠說一箇氣稟不同曰然他道仁義禮知信自是了只說到三品不知是氣稟使然所以說得不盡賀孫因云自孟子說已是欠了下意所以費無限言語先生即舉程子之言論性不論氣不備論氣不論性不明若如說性惡性善惡混都只說得氣如孟子韓子之言便是不論氣所以不全賀孫或問性中只有四端信是如何曰且如惻隱羞惡實是惻隱羞惡便信在其中祖道問四端不言信周子謂五性動而善惡分如信之未發時如何已發時如何曰如惻隱真箇惻隱羞惡真箇羞惡此便是信曰此卻是已發時方有這信曰其中真箇有此理賜問四端不言信如何曰公潑了碗中飯卻去碗背拾振問四端便是明德曰此是大者節問明明德只是擴充得他去曰不昏著他節四端是理之發七情是氣之發問看得來如喜怒愛惡欲卻似近仁義曰固有相似處廣或問孟子言四端處有二大抵皆以心為言明道卻云惻隱之類皆情也伊川亦云人性所以善者於四端之情可見一以四端屬諸心一以四端屬諸情何也曰心包情性者也自其動者言之雖謂之情亦可也去偽集義黃景申嵩老問仁兼四端意思理會不透曰謝上蔡見明道先生舉史文成誦明道謂其玩物喪志上蔡汗流浹背面發赤色明道云此便見得惻隱之心公且道上蔡聞得過失恁地慚皇自是羞惡之心如何卻說道見得惻隱之心公試思久之先生曰惟是有惻隱之心方會動若無惻隱之心卻不會動惟是先動了方始有羞惡方始有恭敬方始有是非動處便是惻隱若不會動卻不成人若不從動處發出所謂羞惡者非羞惡所謂恭敬者非恭敬所謂是非者非是非天地生生之理這些動意未嘗止息看如何梏亡亦未嘗盡消滅自是有時而動學者只怕間斷了賀孫問何謂惻隱曰惻惻然也隱痛也又問明道先生以上蔡面赤為惻隱之心何也曰指其動處而言之只是羞惡之心然惻隱之心必須動則方有羞惡之心如肅然恭敬其中必動羞惡恭敬是非之心皆自仁中出故仁專言則包四者是箇帶子無仁則麻痺死了安有羞惡恭敬是非之心仁則有知覺癢則覺得癢痛則覺得痛癢痛雖不同其覺則一也又問若指動言仁則近禪曰這箇如何占得斷是天下公共底釋氏也窺見些子只是他只知得這箇合惻隱底不惻隱合羞惡底不羞惡合恭敬底不恭敬又問他卻無惻隱羞惡恭敬是非曰然節仁言惻隱之端程云端如水之動處蓋水平靜則不見其動流愛親敬兄皆是此心本然初無可見及其發而接物有所感動此心惻然所以可見如怵惕於孺子入井之類是也卓按集義不見程說四端伊川云聖人無端故不見其心今按遺書中止云復非天地心復則見天地心聖人無復故未嘗見其心今云無端義亦不通恐誤閎祖龜山答人問赤子入井令求所以然一段好方矢人豈不仁於函人章問仁天之尊爵先生解曰仁者天地生物之心得之最先如何是得之最先曰人得那生底道理所謂心生道也有是心斯具是形以生也廣仁者如射但那發時毫釐不可差子路人告以有過則喜章禹聞善言則拜猶著意做舜與人同是自然氣象聖人之拜固出於誠意然拜是容貌間未見得行不行若舜則真見於行事處己未善則舍己之未善而從人之善人有善則取人之善而為己之善人樂於見取便是許助他為善也淳問是與人為善當其取人之際莫未有助之之意否曰然曰三者本意似只是取人但有淺深而與人為善乃是孟子再疊一意以發明之否曰然道夫大舜樂取諸人以為善是成己之善是與人為善也是著人之善端蒙與人為善蓋舜不私己如為人為此善一般升卿伯夷非其君不事章問進不隱賢必以其道曰不隱賢謂不隱避其賢如己當廉卻以利自汙己當勇卻以怯自處之類乃是隱賢是枉道也又問所以不解作蔽賢謂其下文云必以其道若作不蔽賢說則下文不同矣曰然人傑至問集注云進不隱賢不枉道也似少字曰進不隱賢便是必以其道人有所見不肯盡發出尚有所藏便是枉道至云尋常看此二句只云進雖不敢自隱其賢凡有所蘊皆樂於發用然而卻不妄進二句做兩意看曰恁地看也得伯夷不屑就已注云屑潔也潔猶美也苟以其辭命禮意之美而就之是切切於是也然伯夷雖有善其辭命而至者亦不肯就而況不道而無禮者固速去之矣世之所謂清者不就惡人耳若善辭令而來者固有時而就之惟伯夷不然此其所以為聖之清也柳下惠不屑之意亦然夷隘惠不恭不必言效之而不至者其弊乃如此只二子所為已有此弊矣僩不屑去說文說屑字云動作切切也只是不汲汲於就不汲汲於去屑字卻是重必大錄云不以就為重而切切急於就不以去為重而切切急於去問伯夷隘柳下惠不恭莫是後來之弊至此否曰伯夷自是有隘處柳下惠自是有不恭處且如雖袒裼裸裎於我側分明是不將人做人看了去偽問柳下惠不恭是待人不恭否曰是他玩世不把人做人看如袒裼裸裎於我側是已邵堯夫正是這意思如皇極經世書成封做一卷題云文字上呈堯夫或問明道云此非瑕疵夷惠之語言其弊必至於此今觀伯夷與惡人處如以朝衣朝冠坐於塗炭則伯夷果似隘者柳下惠雖袒裼裸裎於我側爾焉能浼我哉柳下惠果似不恭者豈得謂其弊必至於此哉曰伯夷既清必有隘處柳下惠既和必有不恭處道理自是如此孟子恐後人以隘為清以不恭為和故曰隘與不恭君子不由也去偽
