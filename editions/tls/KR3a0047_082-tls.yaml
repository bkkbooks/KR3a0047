body:
  text: 朱子語類卷第八十二孝經因說孝經是後人綴緝問此與尚書同出孔壁曰自古如此說且要理會道理是與不是適有問重卦并彖象者某答以且理會重卦之理不必問此是誰作彼是誰作因言學者卻好聚語孟禮書言孝處附之於後士毅問孝經一書文字不多先生何故不為理會過曰此亦難說據此書只是前面一段是當時曾子聞於孔子者後面皆是後人綴緝而成問如天地之性人為貴人之行莫大於孝恐非聖人不能言此曰此兩句固好如下面說孝莫大於嚴父嚴父莫大於配天則豈不害理儻如此則須是如武王周公方能盡孝道尋常人都無分盡孝道也豈不啟人僭亂之心其中煞有左傳及國語中言語或問莫是左氏引孝經中言語否曰不然其言在左氏傳國語中即上下句文理相接在孝經中卻不成文理見程沙隨說向時汪端明亦嘗疑此書是後人偽為者廣古文孝經亦有可疑處自天子章到孝無終始而患不及者未之有也便是合下與曾子說底通為一段只逐章除了後人所添前面子曰及後面引詩便有首尾一段文義都活自此後卻似不曉事人寫出來多是左傳中語如以順則逆民無則焉不在於善而皆在於凶德是季文子之辭卻云雖得之君子所不貴不知論孝卻得箇甚底全無交涉如言斯可道行期可樂一段是北宮文子論令尹之威儀在左傳中自有首尾載入孝經都不接續全無意思只是雜史傳中胡亂寫出來全無義理疑是戰國時人鬥湊出者又曰胡氏疑是樂正子春所作樂正子春自細膩卻不如此說古文孝經卻有不似今文順者如父母生之續莫大焉又著一箇子曰字方說不愛其親而愛他人者謂之悖德兼上更有箇子曰亦覺無意思此本是一段以子曰分為二恐不是溫公家範以父子兄弟夫婦等分門卻成一箇文字但其間有欠商量未通行者耳本作一段聯寫去今印者分作小段無意思伯恭閫範無倫序其所編書多是如此賀孫孝經疑非聖人之言且如先王有至德要道此是說得好處然下面都不曾說得切要處著但說得孝之效如此如論語中說孝皆親切有味都不如此士庶人章說得更好只是下面都不親切賜問向見先生說孝莫大於嚴父嚴父莫大於配天非聖人之言必若此而後可以為孝豈不啟人僭亂之心而中庸說舜武王之孝亦以尊為天子富有四海之內言之如何曰中庸是著舜武王言之何害若汎言人之孝而必以此為說則不可廣器之問嚴父配天曰嚴父只是周公於文王如此稱纔是成王便是祖此等處儘有理會不得處大約必是郊時是后稷配天明堂則以文王配帝孝經亦是湊合之書不可盡信但以義起亦是如此因說孝經只有前一段後皆云廣至德廣要道都是湊合來演說前意但其文多不全只是諫諍五刑喪親三篇稍是全文如配天等說亦不是聖人說孝來歷豈有人人皆可以配天豈有必配天斯可以為孝如禮記煞有好處可附於孝經賀孫問恐後人湊合成孝經時亦未必見禮記如曲禮少儀之類猶是說禮節若祭義後面許多說孝處說得極好豈不可為孝經曰然今看孝經中有得一段似這箇否賀孫問郊祀后稷以配天宗祀文王於明堂以配上帝此說如何曰此自是周公創立一箇法如此將文王配明堂永為定例以后稷郊推之自可見後來妄將嚴父之說亂了賜問配天配上帝帝只是天天只是帝卻分祭何也曰為壇而祭故謂之天祭於屋下而以神祇祭之故謂之帝宇明察是彰著之義能事父孝則事天之理自然明能事母孝則事地之理自然察道夫
