body:
  text: 朱子語類卷第九十四周子之書太極圖太極圖無極而太極上一圈即是太極但挑出在上泳太極一圈便是一畫只是撒開了引教長一畫泳太極圖只是一箇實理一以貫之端蒙太極分開只是兩箇陰陽括盡了天下物事易有太極是生兩儀四象八卦皆有形狀至於太極有何形狀故周子曰無極而太極蓋云無此形狀而有此道理耳無極而太極只是一句如沖漠無朕畢竟是上面無形象然卻實有此理圖上自分曉到說無極處便不言太極只言無極之真真便是太極無極而太極蓋恐人將太極做一箇有形象底物看故又說無極言只是此理也端蒙無極而太極只是說無形而有理所謂太極者只二氣五行之理非別有物為太極也又云以理言之則不可謂之有以物言之則不可謂之無僩無極而太極只是無形而有理周子恐人於太極之外更尋太極故以無極言之既謂之無極則不可以有底道理強搜尋也問太極始於陽動乎曰陰靜是太極之本然陰靜又自陽動而生一靜一動便是一箇闢闔自其闢闔之大者推而上之更無窮極不可以本始言問無極而太極固是一物有積漸否曰無積漸曰上言無極下言太極竊疑上言無極無窮下言至此方極曰無極者無形太極者有理也周子恐人把作一物看故云無極曰太極既無氣氣象如何曰只是理可學周子所謂無極而太極非謂太極之上別有無極也但言太極非有物耳如云上天之載無聲無臭故云無極之真二五之精既言無極則不復別舉太極也若如今說則此處豈不欠一太極字耶端蒙原極之所以得名蓋取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以大一作著夫無聲無臭之妙也升卿問太極解引上天之載無聲無臭此上天之載即是太極否曰蒼蒼者是上天理在載字上淳問無極而太極如何曰子細看便見得問先生之意不正是以無極太極為理曰此非某之說他道理自如此著自家私意不得太極無形象只是理他自有這箇道理自家私著一字不得問既曰太極又有箇無極如何曰太極本無極要去就中看得這箇意出方得公只要去討他不是處與他鬥而今只管去檢點古人不是處道自家底是便是識見不長劉曰要得理明不得不如此曰且可去放開胸懷讀書看得道理明徹自然無歉吝之病無物我之私自然快活宇無極是有理而無形如性何嘗有形太極是五行陰陽之理皆有不是空底物事若是空時如釋氏說性相似又曰釋氏只見得箇皮殼裏面許多道理他卻不見他皆以君臣父子為幻妄節無極而太極不是太極之外別有無極無中自有此理又不可將無極便做太極無極而太極此而字輕無次序故也動而生陽靜而生陰動即太極之動靜即太極之靜動而後生陽靜而後生陰生此陰陽之氣謂之動而生靜而生則有漸次也一動一靜互為其根動而靜靜而動闢闔往來更無休息分陰分陽兩儀立焉兩儀是天地與畫卦兩儀意思又別動靜如晝夜陰陽如東西南北分從四方去一動一靜以時言分陰分陽以位言方渾淪未判陰陽之氣混合幽暗及其既分中間放得寬闊光朗而兩儀始立康節以十二萬九千六百年為一元則是十二萬九千六百年之前又是一箇大闢闔更以上亦復如此直是動靜無端陰陽無始小者大之影只晝夜便可見五峰所謂一氣大息震蕩無垠海宇變動山勃川湮人物消盡舊跡大滅是謂洪荒之世常見高山有螺蚌殼或生石中此石即舊日之土螺蚌即水中之物下者卻變而為高柔者變而為剛此事思之至深有可驗者陽變陰合而生水火木金土陰陽氣也生此五行之質天地生物五行獨先地即是土土便包含許多金木之類天地之間何事而非五行五行陰陽七者滾合便是生物底材料五行順布四時行焉金木水火分屬春夏秋冬土則寄旺四季如春屬木而清明後十二日即是土寄旺之時每季寄旺十八日共七十二日唯夏季十八日土氣為最旺故能生秋金也以圖象考之木生火金生水之類各有小畫相牽連而火生土土生金獨穿乎土之內餘則從旁而過為可見矣五行一陰陽也陰陽一太極也太極本無極也此當思無有陰陽而無太極底時節若以為止是陰陽陰陽卻是形而下者若只專以理言則太極又不曾與陰陽相離正當沉潛玩索將圖象意思抽開細看又復合而觀之某解此云非有離乎陰陽也即陰陽而指其本體不雜乎陰陽而為言也此句自有三節意思更宜深考通書云靜而無動動而無靜物也動而無動靜而無靜神也當即此兼看之謨可學錄別出舜弼論太極云陰陽便是太極曰某解云非有離乎陰陽也即陰陽而指其本體不雜乎陰陽而言耳此句當看今於某解說句尚未通如何論太極又問無極而太極因而字故生陸氏議論曰而字自分明下云動而生陽靜而生陰說一生字便是見其自太極來今曰而則只是一理無極而太極言無能生有也某問自陽動以至於人物之生是一時俱生且如此說為是節次如此曰道先後不可然亦須有節次康節推至上十二萬八千云云不知已前又如何太極之前須有世界來正如昨日之夜今日之晝耳陰陽亦一大闔闢也但當其初開時須昏暗漸漸乃明故有此節次其實已一齊在其中又問今推太極以前如此後去又須如此曰固然程子云動靜無端陰陽無始此語見得分明今高山上多有石上蠣殼之類是低處成高又蠣須生於泥沙中今乃在石上則是柔化為剛天地變遷何常之有又問明道云陰陽亦形而下者而曰道只此兩句截得上下分明截字莫是斷字誤曰正是截字形而上形而下只就形處離合分別此正是界至處若止說在上在下便成兩截矣可學李問無極之真與未發之中同否曰無極之真是包動靜而言未發之中只以靜言無極只是極至更無去處了至高至妙至精至神更沒去處濂溪恐人道太極有形故曰無極而太極是無之中有箇至極之理如皇極亦是中天下而立四方輻湊更沒去處移過這邊也不是移過那邊也不是只在中央四畔合湊到這裏又指屋極曰那裏更沒去處了問南軒說無極而太極言莫之為而為之如何曰他說差道理不可將初見便把做定伊川解文字甚縝密也是他年高七十以上歲見得道理熟呂與叔言語多不縝密處是他不滿五十歲若使年高看道理必煞縝密宇太極無方所無形體無地位可頓放若以未發時言之未發卻只是靜動靜陰陽皆只是形而下者然動亦太極之動靜亦太極之靜但動靜非太極耳或錄云動不是太極但動者太極之用耳靜不是太極但靜者太極之體耳故周子只以無極言之無形而有理未發固不可謂之太極然中含喜怒哀樂喜樂屬陽怒哀屬陰四者初未著而其理已具若對已發言之容或可謂之太極然終是難說此皆只說得箇髣彿形容當自體認問無極而太極極是極至無餘之謂無極是無之至至無之中乃至有存焉故云無極而太極曰本只是箇太極只為這本來都無物事故說無極而太極如公說無極恁地說卻好但太極說不去曰有字便是太字地位曰將有字訓太字不得太極只是箇理曰至無之中乃萬物之至有也曰亦得問動而生陽靜而生陰注太極者本然之妙動靜者所乘之機太極只是理理不可以動靜言惟動而生陽靜而生陰理寓於氣不能無動靜所乘之機乘如乘載之乘其動靜者乃乘載在氣上不覺動了靜靜了又動曰然又問動靜無端陰陽無始那箇動又從上面靜生下上面靜又是上面動生來今姑把這箇說起曰然又問以質而語其生之序不是相生否只是陽變而助陰故生水陰合而陽盛故生火木金各從其類故在左右曰水陰根陽火陽根陰錯綜而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又如甲乙丙丁戊己庚辛壬癸都是這箇物事因曰這箇太極是箇大底物事四方上下曰宇古往今來曰宙無一箇物似宇樣大四方去無極上下去無極是多少大無一箇物似宙樣長遠异古异今往來不窮自家心下須常認得這意思問此是誰語曰此是古人語象山常要說此語但他說便只是這箇又不用裏面許多節拍卻只守得箇空蕩蕩底公更看橫渠西銘初看有許多節拍卻似狹充其量是甚麼樣大合下便有箇乾健坤順意思自家身己便如此形體便是這箇物事性便是這箇物事同胞是如此吾與是如此主腦便是如此尊高年所以長其長慈孤弱所以幼其幼又是做工夫處後面節節如此于時保之子之翼也樂且不憂純乎孝者也其品節次第又如此橫渠這般說話體用兼備豈似他人只說得一邊問自其節目言之便是各正性命充其量而言之便是流行不息曰然又問聖人定之以中正仁義而主靜曰此是聖人修道之謂教處因云今且須涵養如今看道理未精進便須於尊德性上用功於德性上有不足處便須於講學上用功二者須相趲逼庶得互相振策出來若能德性常尊便恁地廣大便恁地光輝於講學上須更精密見處須更分曉若能常講學於本原上又須好覺得年來朋友於講學上卻說較多於尊德性上說較少所以講學處不甚明了賀孫或問太極曰太極只是箇極好至善底道理人人有一太極物物有一太極周子所謂太極是天地人物萬善至好底表德謙太極非是別為一物即陰陽而在陰陽即五行而在五行即萬物而在萬物只是一箇理而已因其極至故名曰太極廣才說太極便帶著陰陽才說性便帶著氣不帶著陰陽與氣太極與性那裏收附然要得分明又不可不拆開說宇因問太極圖所謂太極莫便是性否曰然此是理也問此理在天地間則為陰陽而生五行以化生萬物在人則為動靜而生五常以應萬事曰動則此理行此動中之太極也靜則此理存此靜中之太極也洽問先生說太極有是性則有陰陽五行云云此說性是如何曰想是某舊說近思量又不然此性字為稟於天者言若太極只當說理自是移易不得易言一陰一陽之謂道繼之者則謂之善至於成之者方謂之性此謂天所賦於人物人物所受於天者也宇問即陰陽而指其本體不雜於陰陽而言之是於道有定位處指之曰然一陰一陽之謂道亦此意可學自太極至萬物化生只是一箇道理包括非是先有此而後有彼但統是一箇大源由體而達用從微而至著耳端蒙某常說太極是箇藏頭底動時屬陽未動時又屬陰了方子太極自是涵動靜之理卻不可以動靜分體用蓋靜即太極之體也動即太極之用也譬如扇子只是一箇扇子動搖便是用放下便是體才放下時便只是這一箇道理及搖動時亦只是這一箇道理梁文叔云太極兼動靜而言曰不是兼動靜太極有動靜喜怒哀樂未發也有箇太極喜怒哀樂已發也有箇太極只是一箇太極流行於已發之際斂藏於未發之時問太極動而生陽靜而生陰見得理先而氣後曰雖是如此然亦不須如此理會二者有則皆有問未有一物之時如何曰是有天下公共之理未有一物所具之理德明問太極之有動靜是靜先動後否曰一動一靜循環無端無靜不成動無動不成靜譬如鼻息無時不噓無時不吸噓盡則生吸吸盡則生噓理自如此德明問太極動然後生陽則是以動為主曰纔動便生陽不是動了而後生這箇只得且從動上說起其實此之所以動又生於靜上面之靜又生於動此理只循環生去動靜無端陰陽無始賀孫太極動而生陽靜而生陰不是動後方生陽蓋纔動便屬陽靜便屬陰動而生陽其初本是靜靜之上又須動矣所謂動靜無端今且自動而生陽處看去時舉太極動而生陽靜而生陰非是動而後有陽靜而後有陰截然為兩段先有此而後有彼也只太極之動便是陽靜便是陰方其動時則不見靜方其靜時則不見動然動而生陽亦只是且從此說起陽動以上更有在程子所謂動靜無端陰陽無始於此可見端蒙國秀說太極曰公今夜說得卻似只是說太極是一箇物事不得說太極中便有陰陽也不得他只說太極動而生陽動極而靜靜而生陰公道未動以前如何曰只是理曰固是理只不當對動言未動即是靜未靜又即是動未動又即是靜伊川云動靜無端陰陽無始惟知道者識之動極復靜靜極復動還當把那箇做擗初頭始得今說太極動而生陽是且推眼前即今箇動斬截便說起其實那動以前又是靜靜以前又是動如今日一晝過了便是夜夜過了又只是明日晝即今晝以前又有夜了昨夜以前又有晝了即今要說時日起也只且把今日建子說起其實這箇子以前豈是無了賀孫問太極動而生陽是有這動之理便能動而生陽否曰有這動之理便能動而生陽有這靜之理便能靜而生陰既動則理又在動之中既靜則理又在靜之中曰動靜是氣也有此理為氣之主氣便能如此否曰是也既有理便有氣既有氣則理又在乎氣之中周子謂五殊二實二本則一一實萬分萬一各正大小有定自下推而上去五行只是二氣二氣又只是一理自上推而下來只是此一箇理萬物分之以為體萬物之中又各具一理所謂乾道變化各正性命然總又只是一箇理此理處處皆渾淪如一粒粟生為苗苗便生花花便結實又成粟還復本形一穗有百粒每粒箇箇完全又將這百粒去種又各成百粒生生只管不已初間只是這一粒分去物物各有理總只是一箇理曰鳶飛魚躍皆理之流行發見處否曰固是然此段更須將前後文通看淳或問太極曰未發便是理已發便是情如動而生陽便是情問太極動而生陽是陽先動也今解云必體立而用得以行如何曰體自先有下言靜而生陰只是說相生無窮耳可學太極動而生陽陽變陰合自有先後且以人之生觀之先有陽後有陰陽在內而陰包於外故心知思慮在內陽之為也形體陰之為更須錯綜看如臟腑為陰膚革為陽此見素問端蒙太極者如屋之有極天之有極到這裏更沒去處理之極至者也陽動陰靜非太極動靜只是理有動靜理不可見因陰陽而後知理撘在陰陽上如人跨馬相似才生五行便被氣質拘定各為一物亦各有一性而太極無不在也統言陰陽只是兩端而陰中自分陰陽陽中亦有陰陽乾道成男坤道成女男雖屬陽而不可謂其無陰女雖屬陰亦不可謂其無陽人身氣屬陽而氣有陰陽血屬陰而血有陰陽至如五行天一生水陽生陰也而壬癸屬水壬是陽癸是陰地二生火陰生陽也而丙丁屬火丙是陽丁是陰通書聖學章一便是太極靜虛動直便是陰陽明通公溥便是五行大抵周子之書才說起便都貫穿太極許多道理謨動而生陽元未有物且是如此動蕩所謂化育流行也靜而生陰陰主凝然後萬物各正性命問繼之者善之時此所謂性善至成之者性然後氣質各異方說得善惡曰既謂之性則終是未可分善惡德明問動靜是太極動靜是陰陽動靜曰是理動靜問如此則太極有模樣曰無問南軒云太極之體至靜如何曰不是問又云所謂至靜者貫乎已發未發而言如何曰如此則卻成一不正當尖斜太極可學鄭仲履云吳仲方疑太極說動極而靜靜極復動之說大意謂動則俱動靜則俱靜曰他都是胡說仲履云太極便是人心之至理曰事事物物皆有箇極是道理之極至蔣元進曰如君之仁臣之敬便是極曰此是一事一物之極總天地萬物之理便是太極太極本無此名只是箇表德蓋卿問陰陽動靜以大體言則春夏是動屬陽秋冬是靜屬陰就一日言之晝陽而動夜陰而靜就一時一刻言之無時而不動靜無時而無陰陽曰陰陽無處無之橫看豎看皆可見橫看則左陽而右陰豎看則上陽而下陰仰手則為陽覆手則為陰向明處為陽背明處為陰正蒙云陰陽之氣循環迭至聚散相盪升降相求絪縕相揉相兼相制欲一之不能蓋謂是也德明太極未動之前便是陰陰靜之中自有陽動之根陽動之中又有陰靜之根動之所以必靜者根乎陰故也靜之所以必動者根乎陽故也問必至於互為其根方分陰陽曰從動靜便分曰分陰分陽是帶上句曰然可學問自太極一動而為陰陽以至於為五行為萬物無有不善在人則才動便差是如何曰造化亦有差處如冬熱夏寒所生人物有厚薄有善惡不知自甚處差將來便沒理會了又問惟人才動便有差故聖人主靜以立人極歟曰然廣問動靜者所乘之機曰理撘於氣而行可學問動靜者所乘之機曰太極理也動靜氣也氣行則理亦行二者常相依而未嘗相離也太極猶人動靜猶馬馬所以載人人所以乘馬馬之一出一入人亦與之一出一入蓋一動一靜而太極之妙未嘗不在焉此所謂所乘之機無極二五所以妙合而凝也銖周貴卿問動靜者所乘之機曰機是關捩子踏著動底機便挑撥得那靜底踏著靜底機便挑撥得那動底義剛動靜者所乘之機機言氣機也詩云出入乘氣機端蒙動靜無端陰陽無始今以太極觀之雖曰動而生陽畢竟未動之前須靜靜之前又須是動推而上之何自見其端與始道夫動靜無端陰陽無始說道有有無底在前說道無有有底在前是循環物事敬仲陰陽本無始但以陽動陰靜相對言則陽為先陰為後陽為始陰為終猶一歲以正月為更端其實姑始於此耳歲首以前非截然別為一段事則是其循環錯綜不可以先後始終言亦可見矣端蒙問動靜無端陰陽無始曰這不可說道有箇始他那有始之前畢竟是箇甚麼他自是做一番天地了壞了後又恁地做起來那箇有甚窮盡某自五六歲便煩惱道天地四邊之外是什麼物事見人說四方無邊某思量也須有箇盡處如這壁相似壁後也須有什麼物事其時思量得幾乎成病到而今也未知那壁後池本作天外夔孫錄作四邊是何物或舉天地相依之說云只是氣曰亦是古如此說了素問中說黃帝曰地有憑乎岐伯曰火氣乘之是說那氣浮得那地起來夔孫錄云謂地浮在氣上這也說得好義剛夔孫錄略陽變陰合初生水火水火氣也流動閃鑠其體尚虛其成形猶未定次生木金則確然有定形矣水火初是自生木金則資於土五金之屬皆從土中旋生出來德明厚之問陽變陰合如何是合曰陽行而陰隨之可學問太極圖兩儀中有地五行中又有土如何分別曰地言其大概閎祖錄作全體土是地之形質問太極兩儀五行曰兩儀即陰陽陰陽是氣五行是質立天之道曰陰與陽立地之道曰柔與剛亦是質又如人魂是氣體魄是質云太極生兩儀兩儀生四象此如母生子子在母外之義若兩儀五行卻是子在母內曰是如此陰陽五行萬物各有一太極又云太極動而生陽只是如一長物不免就中間截斷說起其實動之前未嘗無靜靜之前又未嘗無動如繼之者善也亦是就此說起譬之俗語謂自今日為頭已前更不受理意思蓋卿太極陰陽五行只將元亨利貞看甚好太極是元亨利貞都在上面陰陽是利貞是陰元亨是陽五行是元是木亨是火利是金貞是水端蒙或問太極圖之說曰以人身言之呼吸之氣便是陰陽軀體血肉便是五行其性便是理又曰其氣便是春夏秋冬其物便是金木水火土其理便是仁義禮智信又曰氣自是氣質自是質不可滾說義剛問五行之生各一其性理同否曰同而氣質異曰既說氣質異則理不相通曰固然仁作義不得義作仁不得可學或問圖解云五行之生隨其氣質而所稟不同所謂各一其性也曰氣質是陰陽五行所為性則太極之全體但論氣質之性則此全體在氣質之中耳非別有一性也銖或問太極圖五行之中又各有五行如何曰推去也有只是他圖未說到這處然而他圖也只得到這處住了義剛某許多說話是太極中說已盡太極便是性動靜陰陽是心金木水火土是仁義禮智信化生萬物是萬事又云無極之真二五之精妙合而凝此數句甚妙是氣與理合而成性也賀孫或錄云真理也精氣也理與氣合故能成形無極二五妙合而凝凝只是此氣結聚自然生物若不如此結聚亦何由造化得萬物出來無極是理二五是氣無極之理便是性性為之主而二氣五行經緯錯綜於其間也得其氣之精英者為人得其渣滓者為物生氣流行一滾而出初不道付其全氣與人減下一等與物也但稟受隨其所得物固昏塞矣而昏塞之中亦有輕重者昏塞尤甚者於氣之渣滓中又復稟得渣滓之甚者爾謨問無極而太極先生謂此五字添減一字不得而周子言無極之真卻又不言太極曰無極之真已該得太極在其中真字便是太極又問太極動而生陽靜而生陰靜極復動則動復生陽靜復生陰不知分陰陽以立兩儀在靜極復動之前為復在後曰動而生陽靜而生陰則陰陽分而兩儀立矣靜極復動以後所以明混闢不窮之妙子蒙或問太極圖下二圈固是乾道成男坤道成女是各有一太極也曰乾道成男坤道成女方始萬物化生易中卻云有天地然後有萬物有萬物然後有男女是如何曰太極所說乃生物之初陰陽之精自凝結成兩箇後來方漸漸生去萬物皆然如牛羊草木皆有牝牡一為陽一為陰萬物有生之初亦各自有兩箇故曰二五之精妙合而凝陰陽二氣更無停息如金木水火土是五行分了又三屬陽二屬陰然而各又有一陰一陽如甲便是木之陽乙便是木之陰丙便是火之陽丁便是火之陰只這箇陰陽更無休息形質屬陰其氣屬陽金銀坑有金礦銀礦便是陰其光氣為陽賀孫天地之初如何討箇人種自是氣蒸池作凝結成兩箇人後方生許多萬物所以先說乾道成男坤道成女後方說化生萬物當初若無那兩箇人如今如何有許多人那兩箇人便如而今人身上蝨是自然變化出來楞嚴經後面說大劫之後世上人都死了無復人類卻生一般禾穀長一尺餘天上有仙人下來喫見好後只管來喫喫得身重遂上去不得世間方又有人種此說固好笑但某因此知得世間卻是其初有箇人種如他樣說義剛氣化是當初一箇人無種後自生出來底形生卻是有此一箇人後乃生生不窮底義剛問氣化形化曰此是總言物物自有牝牡只是人不能察耳或問萬物各具一太極此是以理言以氣言曰以理言銖形既生矣形體陰之為也神發知矣神知陽之為也蓋陰主翕凡斂聚成就者陰為之也陽主闢凡發暢揮散者陽為之也端蒙問五行之生各一其性五性感動而善惡分此性字是兼氣稟言之否曰性離氣稟不得有氣稟性方存在裏面無氣稟性便無所寄撘了稟得氣清者性便在清氣之中這清氣不隔蔽那善稟得氣濁者性在濁氣之中為濁氣所蔽五行之生各一其性這又隨物各具去了淳問五性感動而善惡分曰天地之性是理也才到有陰陽五行處便有氣質之性於此便有昏明厚薄之殊得其秀而最靈乃氣質以後事去偽問如何謂之性曰天命之謂性又問天之所命者果何物也曰仁義禮智信又問太極圖何為列五者於陰陽之下曰五常是理陰陽是氣有理而無氣則理無所立有氣而後理方有所立故五行次陰陽又問如此則是有七曰義智屬陰仁禮屬陽按太極圖列金木水火土於陰陽之下非列仁義禮智信於陰陽之下也以氣言之曰陰陽五行以理言之曰健順五行之性此問似欠分別節問聖人定之以中正仁義何不曰仁義中正曰此亦是且恁地說當初某看時也疑此只要去強說又說不得後來子細看乃知中正即是禮智無可疑者時舉中正仁義而已矣言生之序以配水火木金也又曰仁義中正而已矣以聖人之心言之猶孟子言仁義禮智也直卿端蒙問太極圖何以不言禮智而言中正莫是此圖本為發明易道故但言中正是否曰亦不知是如何但中正二字較有力閎祖問周子不言禮智而言中正如何曰禮智說得猶寬中正則切而實矣且謂之禮尚或有不中節處若謂之中則無過不及無非禮之禮乃節文恰好處也謂之智尚或有有正不正若謂之正則是非端的分明乃智之實也銖問中正即禮智何以不直言禮智而曰中正曰禮智字不似中正字卻實且中者禮之極正者智之體正是智親切處伊川解貞字謂正而固也一正字未盡必兼固字所謂智之實知斯二者弗去是也智是端的真知恁地便是正弗去便是固所以正字較親切淳聖人立人極不說仁義禮智卻說仁義中正者中正尤親切中是禮之得宜處正是智之正當處自氣化一節以下又節節應前面圖說仁義中正應五行也大抵天地生物先其輕清以及重濁天一生水地二生火二物在五行中最輕清金木復重於水火土又重於金木如論律呂則又重濁為先宮最重濁商次之角次之徵又次之羽最後謨問中即禮正即智正如何是智曰於四德屬貞智要正可學知是非之正為智故通書以正為智節問智與正何以相契曰只是真見得是非便是正不正便不喚做智了問只是真見得是真見得非若以是為非以非為是便不是正否曰是淳宇同問周子言仁義中正亦甚大今乃自偏言止是屬於陽動陰靜曰不可如此看反覆皆可問仁為用義為體若以體統論之仁卻是體義卻是用曰是仁為體義為用大抵仁義中又各自有體用可學中正仁義一節仁義自分體用是一般說仁義中正分體用又是一般說偏言專言者只說仁便是體才說義便是就仁中分出一箇道理如人家有兄弟只說戶頭上言兄足矣才說弟便更別有一人仁義中正只屬五行為其配元亨利貞也元是亨之始亨是元之盡利是貞之始貞是利之盡故曰元亨誠之通利貞誠之復謨聖人定之以中正仁義正字義字卻是體中仁卻是發用處問義是如何曰義有箇斷制一定之體又問仁卻恐是體曰隨這事上說在這裏仁卻是發用只是一箇仁都說得問處之也正裁之也義處與裁字二義頗相近曰然處是居之裁是就此事上裁度又曰處字作居字即分曉必大問聖人定之以中正仁義曰本無先後此四字配金木水火而言中有禮底道理正有智底道理如乾之元亨利貞元即仁亨即中利即義貞即正皆是此理至於主靜是以正與義為體中與仁為用聖人只是主靜自有動底道理譬如人說話也須是先沉默然後可以說話蓋沉默中便有箇言語底意思去偽問聖人定之以中正仁義而主靜何也曰中正仁義分屬動靜而聖人則主於靜蓋正所以能中義所以能仁克己復禮義也義故能仁易言利貞者性情也元亨是發用處必至於利貞乃見乾之實體萬物到秋冬收斂成實方見得他本質故曰性情此亦主靜之說也銖聖人定之以中正仁義此四物常在這裏流轉然常靠著箇靜做主若無夜則做得晝不分曉若無冬則做得春夏不長茂如人終日應接卻歸來這裏空處少歇便精神較健如生物而無冬只管一向生去元氣也會竭了中仁是動正義是靜通書都是恁地說如云禮先而樂後義剛周貴卿說定之以仁義中正而主靜先生曰如那克處便是義非禮勿視聽言動那禁止處便是義或曰正義方能靜謂正義便是靜卻不得曰如何恁地亂說今且粗解則分外有精神且如四時有秋冬收斂則春夏方能生長若長長是春夏只管生長將去卻有甚了期便有許多元氣故復其見天地之心乎這便是靜後見得動恁地好這中正只是將來替了那禮智字皆不離這四般但是主靜義剛問中正仁義而主靜中仁是動正義是靜如先生解曰非此心無欲而靜則何以酬酢事物之變而一天下之動哉今於此心寂然無欲而靜處欲見所以正義者何以見曰只理之定體便是又曰只是那一箇定理在此中截然不相侵犯雖然就其中又各有動靜如惻隱是動仁便是靜羞惡是動義便是靜淳義剛同問聖人定之以中正仁義而主靜曰中正仁義皆謂發用處正者中之質義者仁之斷中則無過不及隨時以取中正則當然之定理仁則是惻隱慈愛之處義是裁制斷決之事主靜者主正與義也正義便是利貞中是亨仁是元德明今於皆謂發用及之處之事等語皆未曉更考問太極主靜之說是先靜後動否曰動靜無端陰陽無始雖是合下靜靜而後動若細推時未靜時須先動來所謂如環無端互為其根謂如在人人之動作及其成就卻只在靜便如渾淪未判之前亦須曾明盛一番來只是這道理層層流轉不可窮詰太極圖中盡之動極生靜亦非是又別有一箇靜來繼此動但動極則自然靜靜極則自然動推而上之沒理會處主靜看夜氣一章可見德明問又言無欲故靜何也曰欲動情勝則不能靜德濂溪言主靜靜字只好作敬字看故又言無欲故靜若以為虛靜則恐入釋老去季通端蒙聖人定之以中正仁義而主靜正是要人靜定其心自作主宰程子又恐只管靜去遂與事物不相交涉卻說箇敬云敬則自虛靜須是如此做工夫德明問聖人定之以中正仁義而主靜是聖人自定是定天下之人曰此承上章惟人也得其秀而最靈言之形生神發五性感動而善惡分故定之以中正仁義而主靜以立人極又問此恐非中人以下所可承當曰二程教學者所以只說一箇敬字正是欲無智愚賢不肖皆得力耳久之又曰此一服藥人人皆可服服之便有效只是自不肯服耳子寰問周先生說靜與程先生說敬義則同而其意似有異曰程子是怕人理會不得他靜字意便似坐禪入定周子之說只是無欲故靜其意大抵以靜為主如禮先而樂後賀孫太極圖首尾相因脈絡貫通首言陰陽變化之原其後即以人所稟受明之自唯人也得其秀而最靈所謂最靈純粹至善之性也是所謂太極也形生神發則陽動陰靜之為也五性感動則陽變陰合而生水火木金土之性也善惡分則成男成女之象也萬事出則萬物化生之義也至聖人定之以中正仁義而主靜立人極焉則又有以得乎太極之全體而與天地混合而無間矣故下又言天地日月四時鬼神四者無不合也端蒙太極首言性命之源用力處卻在修吉悖凶其本則主於靜端蒙林問太極原始反終故知死生之說南軒解與先生解不同如何曰南軒說不然恐其偶思未到周子太極之書如易六十四卦一一有定理毫髮不差自首至尾只不出陰陽二端而已始處是生生之初終處是已定之理始有處說生已定處說死死則不復變動矣因舉張乖崖說斷公事以為未判底事皆屬陽已判之事皆屬陰以為不可改變通書無非發明此二端之理宇問太極圖自一而二自二而五即推至於萬物易則自一而二自二而四自四而八自八而十六自十六而三十二自三十二而六十四然後萬物之理備西銘則止言陰陽洪範則止言五行或略或詳皆不同何也曰理一也人所見有詳略耳然道理亦未始不相值也閎祖或問太極西銘曰自孟子已後方見有此兩篇文章問先生謂程子不以太極圖授門人蓋以未有能受之者然而孔門亦未嘗以此語顏曾是如何曰焉知其不曾說曰觀顏曾做工夫處只是切己做將去曰此亦何嘗不切己皆非在外乃我所固有也曰然此恐徒長人億度料想之見曰理會不得者固如此若理會得者莫非在我便可受用何億度之有廣濂溪著太極圖某若不分別出許多節次來如何看得未知後人果能如此子細去看否人傑或求先生揀近思錄先生披數板云也揀不得久之乃曰無極而太極不是說有箇物事光輝輝地在那裏只是說這裏當初皆無一物只有此理而已既有此理便有此氣既有此氣便分陰陽以此生許多物事惟其理有許多故物亦有許多以小而言之則此下疑有脫句無非是天地之事以大而言之則君臣父子夫婦朋友無非是天地之事只是這一箇道理所以君子修之吉小人悖之凶而今看他說這物事這機關一下撥轉後卒乍攔他不住聖人所以一日二日萬幾兢兢業業如臨深淵如履薄冰只是大化恁地流行隨得是便好隨得不是便喝他不住存心養性所以事天也夭壽不貳修身以俟之所以立命也所以昨日說西銘都相穿透所以太極圖說五行一陰陽也陰陽一太極也二氣交感所以化生萬物這便是天地之塞吾其體天地之帥吾其性只是說得有詳略有急緩只是這一箇物事所以萬物到秋冬時各自收歛閉藏忽然一下春來各自發越條暢這只是一氣一箇消一箇息只如人相似方其默時便是靜及其語時便是動那箇滿山青黃碧綠無非是這太極所以仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣皆是那一陰一陽之謂道繼之者善也成之者性也所以周先生太極通書只是滾這許多句繼之者善是動處成之者性是靜處繼之者善是流行出來成之者性則各自成箇物事繼善便是元亨成性便是利貞及至成之者性各自成箇物事恰似造化都無可做了及至春來又流行出來又是繼之者善譬如禾穀一般到秋斂冬藏千條萬穟自各成一箇物事了及至春又各自發生出以至人物以至禽獸皆是如此且如人方其在胞胎中受父母之氣則是繼之者善及其生出又自成一箇物事成之者性也既成其性又自繼善只是這一箇物事今年一年生了明年又生出一副當物事來又繼之者善又成之者性只是這一箇物事滾將去所以仁者見之謂之仁只是見那發生處智者見之謂之智只是見那成性處到得百姓日用而不知則不知這事物矣所以易只是箇陰陽交錯千變萬化故曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業聖人所以說出來時只是使人不迷乎利害之途又曰近思錄第二段說誠無為幾善惡誠無為只是自然有實理恁地不是人做底都不犯手勢只是自然一箇道理恁地幾善惡則是善裏面便有五性所以為聖所以為賢只是這箇又曰下面說天下大本天下達道未發時便是靜已發時便是動方其未發便有一箇體在那裏了及其已發便有許多用出來少間一起一倒無有窮盡若靜而不失其體便是天下之大本動而不失其用便是天下之達道然靜而失其體則天下之大本便錯了動而失其用則天下之達道便乖了說來說去只是這一箇道理義剛時紫芝亦曾見尹和靖來嘗注太極圖不知何故渠當時所傳圖本第一箇圈子內誤有一點紫芝於是從此起意謂太極之妙皆在此一點亦有通書解無數凡百說話揚通書周子留下太極圖若無通書卻教人如何曉得故太極圖得通書而始明大雅通書一部皆是解太極說這道理自一而二二而五如誠無為幾善惡德以下便配著太極陰陽五行須是子細看直卿云通書便可上接語孟曰此語孟較分曉精深結搆得密語孟說得較闊方子通書覺細密分明論孟又闊高誠上問誠者聖人之本曰此言本領之本聖人所以聖者誠而已銖誠者聖人之本言太極大哉乾元萬物資始誠之源言陰陽五行乾道變化各正性命誠斯立焉言氣化純粹至善者通繳上文故曰一陰一陽之謂道解誠者聖人之本繼之者善也解大哉乾元以下成之者性也解乾道變化以下元亨誠之通言流行處利貞誠之復言學者用力處大哉易也性命之源又通繳上文人傑大哉乾元萬物資始誠之源也此統言一箇流行本源乾道變化各正性命誠之流行出來各自有箇安頓處如為人也是這箇誠為物也是這箇誠故曰誠斯立焉譬如水其出只一源及其流出來千派萬別也只是這箇水端蒙問舉一陰一陽之謂道以下三句是證上文否曰固是一陰一陽之謂道一句通證誠之源大哉乾元至誠斯立焉二節繼之者善又證誠之源一節成之者性證誠斯立焉一節植問誠上篇舉易一陰一陽之謂道三句曰繼成二字皆節那氣底意思說性善二字皆只說理但繼之者善方是天理流行處成之者性便是已成形有分段了植問一陰一陽之謂道是太極否曰陰陽只是陰陽道是太極程子說所以一陰一陽者道也問知言云有一則有三自三而無窮矣又云一陰一陽之謂道謂太極也陰陽剛柔顯極之幾至善以微孟子所謂可欲者也如何曰知言只是說得一段文字好皆不可曉問純粹至善者也與繼之者善同否曰是繳上三句卻與繼之者善不同繼之者善屬陽成之者性屬陰問陽實陰虛繼之者善是天命流行成之者性是在人物疑人物是實曰陽實陰虛又不可執只是陽便實陰便虛各隨地步上說如揚子說於仁也柔於義也剛今周子卻以仁為陽義為陰要知二者說得都是且如造化周流未著形質便是形而上者屬陽才麗於形質為人物為金木水火土便轉動不得便是形而下者屬陰若是陽時自有多少流行變動在及至成物一成而不返謂如人之初生屬陽只管有長及至長成便只有衰此氣逐旋衰減至於衰盡則死矣周子所謂原始反終只於衰盡處可見反終之理又曰嘗見張乖崖云未押字時屬陽已押字屬陰此語疑有得於希夷未可知問濂溪論性自氣稟言卻是上面已說太極誠不妨如孔子說性相近習相遠不成是不識如荀揚便不可曰然他已說純粹至善可學繼之者善也周子是說生生之善程子說作天性之善用處各自不同若以此觀彼必有窒礙人傑元亨繼之者善也陽也利貞成之者性也陰也節問繼之者善也成之者性也竊謂妙合之始便是繼乾道成男坤道成女便是成曰動而生陽之時便有繼底意及至靜而生陰方是成如六十四卦之序至復而繼德明問陽動是元亨陰靜是利貞但五行在陰陽之下人物又在五行之下如何說繼善成性曰陰陽流於五行之中而出五行無非陰陽可學問陰陽氣也何以謂形而下者曰既曰氣便是有箇物事此謂形而下者又問繼之者善成之者性何以分繼善成性為四截曰繼成屬氣善性屬理性已兼理氣善則專指理又曰理受於太極氣受於二氣五行植問元亨誠之通利貞誠之復元亨是春夏利貞是秋冬秋冬生氣既散何以謂之收斂曰其氣已散收斂者乃其理耳曰冬間地下氣暖便也是氣收斂在內曰上面氣自散了下面暖底乃自是生來卻不是已散之氣復為生氣也時舉先生出示答張元德書問通復二字先生謂誠之通是造化流行未有成立之初所謂繼之者善誠之復是萬物已得此理而皆有所歸藏之時所謂成之者性在人則感而遂通者誠之通寂然不動者誠之復時舉因問明道謂今人說性只是說繼之者善是如何曰明道此言卻只是就人上說耳時舉直卿問利貞誠之復如先生注下言復如伏藏先生曰復只是回來這箇是周先生添此一句孔子只說乾道變化各正性命又曰這箇物事又記是氣字流行到這裏來這裏住著卻又復從這裏做起又曰如母子相似未生之時母無氣不能生其子既生之後子自是子母自是母又曰如樹上開一花結一子未到利貞處尚是運下面氣去蔭又記是養字他及他到利貞處自不用養又記是恁他字又問自一念之萌以至於事之得其所是一事之元亨利貞先生應之曰他又自這裏做起所謂生生之謂易也是恁地又記曰氣行到這裏住著便立在這裏既立在這裏則又從這裏做起節問元亨誠之通便是陽動利貞誠之復便是陰靜注卻云此已是五行之性如何曰五行便是陰陽但此處已分作四可學利貞誠之復乃回復之復如人既去而回在物歸根復命者也不遠而復乃反復之復反而歸其元地頭也誠復就一物一草一木看得復善則如一物截然到上面窮了卻又反歸到元地頭誠復只是就去路尋得舊跡回來因論復卦說如此更詳之俟他日問端蒙誠下問誠是五常之本曰誠是通體地盤方子誠下一章言太極之在人者人傑問誠五常之本同此實理於其中又分此五者之用曰然可學問果而確果者陽決確者陰守曰此只是一事而首尾相應果而不確即無所守確而不果則無決二者不可偏廢猶陰陽不可相無也銖誠幾德通書誠無為章說聖賢神三種人恐有記誤銖誠無為誠實理也無為猶寂然不動也實理該貫動靜而其本體則無為也幾善惡幾者動之微動則有為而善惡形矣誠無為則善而已動而有為則有善有惡端蒙光祖問誠無為幾善惡曰誠是當然合有這實理所謂寂然不動者幾便是動了或向善或向惡賀孫曾問誠無為幾善惡曰誠是實理無所作為便是天命之謂性喜怒哀樂未發之謂中幾者動之微微動之初是非善惡於此可見一念之生不是善便是惡孟子曰道二仁與不仁而已矣是也德者有此五者而已仁義禮智信者德之體曰愛曰宜曰理曰通曰守者德之用卓濂溪言誠無為幾善惡才誠便行其所無事而幾有善惡之分於此之時宜當窮察識得是非其初有毫忽之微至於窮察之久漸見充越之大天然有箇道理開裂在那裏此幾微之決善惡之分也若於此分明則物格而知至知至而意誠意誠而心正身修而家齊國治天下平如激湍水自已不得如田單火牛自止不住宇道夫言誠者自然之實理無俟營為及幾之所動則善惡著矣善之所誠則為五常之德聖人不假修為安而全之賢者則有克復之功要之聖賢雖有等降然及其成功則一而已故曰發微不可見充周不可窮之謂神曰固是如此但幾是動之微是欲動未動之間便有善惡便須就這處理會若至於發著之甚則亦不濟事矣更怎生理會所以聖賢說戒慎乎其所不睹恐懼乎其所不聞蓋幾微之際大是要切又問以誠配太極以善惡配陰陽以五常配五行此固然但陽變陰合而生水火木金土則五常必不可謂共出於善惡也此似祇是說得善之一腳曰通書從頭是配合但此處卻不甚似如所謂剛善剛惡柔善柔惡則確然是也道夫問誠無為幾善惡一段看此與太極圖相表裏曰然周子一書都是說這道理又舉喜怒哀樂未發謂之中一章及心一也一章程子承周子一派都是太極中發明曰然問此都是說這道理是如此工夫當養於未發曰未發有工夫既發亦用工夫既發若不照管也不得也會錯了但未發已發其工夫有箇先後有箇輕重賀孫或舉季通語通書誠無為幾善惡與太極惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分二說似乎相背既曰無為矣如何又卻有善惡之幾恐是周子失照管處如何曰當寂然不動時便是誠無為有感而動即有善惡幾是動處大凡人性不能不動但要頓放得是於其所動處頓放得是時便是德愛曰仁宜曰義頓放得不是時便一切反是人性豈有不動但須於中分得天理人欲方是祖道人傑問季通說誠無為幾善惡德愛曰仁一段周子亦有照管不到處既曰誠無為則其下未可便著善惡字如何曰正淳如何看人傑曰若既誠而無為則恐未有惡若學者之心其幾安得無惡曰當其未感五性具備豈有不善及其應事才有照顧不到處這便是惡古之聖賢戰戰兢兢過了一生正謂此也顏子有不善未嘗不知亦是如此因言仲弓問焉知賢才而舉之程子以為便見仲弓與聖人用心之小大推此義則一心可以興邦一心可以喪邦只在公私之間且看仲弓之問未見其為私意然其心淺狹欠闕處多其流弊便有喪邦之理凡事微有過差才有安頓不著處便是惡人傑問若是未發便是都無事了如何更有幾二者之間其幾甚微莫是指此心未發而言否曰說幾時便不是未發幾正是那欲發未發時當來這裏致謹使教自慊莫教自欺又問莫是說一毫不謹則所發流於惡而不為善否曰只是說心之所發要常常省察莫教他自欺耳人心下自是有兩般所以要謹謹時便知得是自慊是自欺而不至於自欺若是不謹則自慊也不知自欺也不知義剛或以善惡為男女之分或以為陰陽之事凡此兩件相對說者無非陰陽之理分陰陽而言之或說善惡或說男女看他如何使故善惡可以言陰陽亦可以言男女謨或問有陰陽便有善惡曰陰陽五行皆善又曰陰陽之理皆善又曰合下只有善惡是後一截事又曰豎起看皆善橫看後一截方有惡又曰有善惡理卻皆善又記是無惡字節德愛曰仁至守曰信德者人之得於身者也愛宜理通守者德之用仁義禮智信者德之體理謂有條理通謂通達守謂確實此三句就人身而言誠性也幾情也德兼性情而言也直卿端蒙性焉安焉之謂聖是就聖人性分上說發微不可見充周不可窮之謂神是他人見其不可測耳夔孫問性者獨得於天如何言獨得曰此言聖人合下清明完具無所虧失此是聖人所獨得者此對了復字說復者已失而反其初便與聖人獨得處不同安字對了執字說執是執持安是自然大率周子之言稱等得輕重極是合宜因問周子之學是自得於心還有所傳授否曰也須有所傳授渠是陸詵婿溫公涑水記聞載陸詵事是箇篤實長厚底人銖發微不可見充周不可窮之謂神言其發也微妙而不可見其充也周遍而不可窮發字充字就人看如性焉安焉執焉復焉皆是人如此微不可見周不可窮卻是理如此神只是聖之事非聖外又有一箇神別是箇地位也端蒙發微不可見充周不可窮之謂神神即聖人之德妙而不可測者非聖人之上復有所謂神也發動也微幽也言其不疾而速一念方萌而至理已具所以微而不可見也充廣也周遍也言其不行而至蓋隨其所寓而理無不到所以周而不可窮也此三句就人所到地位而言即盡夫上三句之理而所到有淺深也端蒙問通書言神者五三章四章九章十一章十六章其義同否曰當隨所在看曰神只是以妙言之否曰是且說感而遂通者神也橫渠謂一故神兩在故不測因指造化而言曰忽然在這裏又忽然在那裏便是神曰在人言之則如何曰知覺便是神觸其手則手知痛觸其足則足知痛便是神神應故妙淳聖寂然不動者誠也又曰大哉乾元萬物資始誠之源也須如此大哉乾元萬物資始以上更有寂然不動端蒙幾善惡言眾人者也動而未形有無之間也言聖人毫釐發動處此理無不見寂然不動者誠也至其微動處即是幾幾在誠神之間端蒙林問入德莫若以幾此最要否曰然問通書說幾如何是動靜體用之間曰似有而未有之時在人識之爾宇幾雖已感卻是方感之初通則直到末梢皆是通也如推其極到協和萬邦黎民於變時雍亦只是通也幾卻只在起頭一些子閎祖通書多說幾太極圖上卻無此意曰五性感動動而未分者便是直卿云通書言主靜審幾慎獨三者循環與孟子夜氣平旦之氣晝旦所為相似方子問誠精故明先生引清明在躬志氣如神釋之卻是自明而誠曰便是看得文字粗疏周子說精字最好誠精者直是無些夾雜如一塊銀更無銅鉛便是通透好銀故只當以清明釋之志氣如神即是至誠之道可以前知之意也人傑因曰凡看文字緣理會未透所以有差若長得一格便又看得分明曰便是說倒了人傑安卿問神誠幾學者當從何入曰隨處做工夫淳錄云本在誠著力在幾誠是存主處發用處是神幾是決擇處淳錄云在二者之間然緊要處在幾砥淳同慎動問動而正曰道用而和曰德卻是自動用言曰猶言合也若看做道德題目卻難通曰然自是人身上說可學動而正曰道言動而必正為道否則非也用而和曰德德有熟而不喫力之意人傑師問通書中四象剛柔善惡皆是陰陽曰然可學問性者剛柔善惡中而已曰此性便是言氣質之性四者之中去卻兩件剛惡柔惡卻又剛柔二善中擇中而主池作立焉去偽正淳問通書注中字處引允執厥中曰此只是無過不及之中書傳中所言皆如此只有喜怒哀樂未發之中一處是以體言到中庸字亦非專言體便有無過不及之意問解云剛柔即易之兩儀各加善惡即易之四象疑善惡二字是虛字如易八卦之吉凶今以善惡配為四象不知如何曰更子細讀未好便疑凡物皆有兩端如此扇便有面有背自一人之心言之則有善有惡在其中便是兩物周子止說到五行住其理亦只消如此自多說不得包括萬有舉歸於此康節卻推到八卦太陽太陰少陽少陰太陽太陰各有一陰一陽少陽少陰亦有一陰一陽是分為八卦也問前輩以老陰老陽為乾坤又分六子以為八卦是否曰六子之說不然宇問通書解論周子止於四象以為水火金木如何曰周子只推到五行如邵康節不又從一分為二極推之至於十二萬四千縱橫變動無所不可如漢儒將十二辟卦分十二月康節推又別可學幸人之生不幸不聞過大不幸無恥此兩句只是一項事知恥是由內心以生聞過是得之於外人須知恥方能過而改故恥為重僩思問無思本也思通用也無思而無不通為聖人不知聖人是有思耶無思耶曰無思而無不通是聖人必思而後無不通是睿時舉云聖人寂然不動是無思才感便通特應之耳曰聖人也不是塊然由人撥後方動如莊子云推而行曳而止之類只是才思便通不待大故地思索耳時舉因云如此則是無事時都無所思事至時才思而便通耳時舉睿有思有不通聖無思無不通又曰聖人時思便通非是塊然無思撥著便轉恁地時聖人只是箇瓠子說無思本也節幾是事之端緒有端緒方有討頭處這方是用得思植思一章幾機二字無異義舉易一句者特斷章取義以解上文人傑舉通書言通微無不通舉李先生曰梁惠王說好色孟子便如此說說好貨便如此說說好勇便如此說皆有箇道理便說將去此是盡心道理當時不曉今乃知是無不通底道理方志學問聖希天若論聖人自是與天相似了得非聖人未嘗自以為聖雖已至聖處而猶戒慎恐懼未嘗頃刻忘所法則否曰不消如此說天自是天人自是人終是如何得似天自是用法天明王奉若天道建邦設都無非法天者大事大法天小事小法天僩竇問志伊尹之志學顏子之學所謂志者便是志於行道否曰志伊尹之所志不是志於私大抵古人之學本是欲行伊尹耕於有莘之野而樂堯舜之道凡所以治國平天下者無一不理會但方處畎畝之時不敢言必於用耳及三聘幡然便向如此做去此是堯舜事業看二典之書堯舜所以卷舒作用直如此熟因說耿守向曾說用之則行舍之則藏惟我與爾有是夫此非專為用舍行藏凡所謂治國平天下之具惟夫子顏子有之用之則抱持而往不用則卷而懷之曰某不敢如此說若如此說即是孔顏胸次全無些洒落底氣象只是學得許多骨董將去治天下又如龜山說伊尹樂堯舜之道只是出作入息飢食渴飲而已即是伊尹在莘郊時全無些能解及至伐夏救民逐旋叫喚起來皆說得一邊事今世又有一般人只道飽食暖衣無外慕便如此涵養去亦不是須是一一理會去德明耿名秉竇又問志伊尹之志乃是志於行曰只是不志於私今人仕宦只為祿伊尹卻祿之天下弗顧繫馬千駟弗視也又云雖志於行道若自家所學元未有本領如何便能舉而措之天下又須有那地位若身處貧賤又如何行然亦必自修身始修身齊家然後達諸天下也又曰此箇道理緣為家家分得一分不是一人所獨得而專者經世濟物古人有這箇心若只是我自會得自卷而懷之卻是私德明志伊尹之所志學顏子之所學志固是要立得大然其中又自有先後緩急之序致廣大而盡精微若曰未到伊尹田地做未得不成塊然喫飯都不思量天下之事若是見州郡所行事有不可人意或百姓遭酷虐自家寧不惻然動心若是朝夕憂慮以天下國家為念又那裏教你恁地來或曰聖賢憂世之志樂天之誠蓋有並行而不相悖者如此方得曰然便是怕人倒向一邊去今人若不塊然不以天下為志便又切切然理會不干己事如世間一樣學問專理會典故世務便是如此古之欲明明德於天下者合下學便是學此事既曰欲明明德於天下不成只恁地空說裏面有幾多工夫僩問過則聖及則賢若過於顏子則工夫又更絕細此固易見不知過伊尹時如何說曰只是更加些從容而已過之便似孔子伊尹終是有擔當底意思多僩動靜動而無靜靜而無動者物也此言形而下之器也形而下者則不能通故方其動時則無了那靜方其靜時則無了那動如水只是水火只是火就人言之語則不默默則不語以物言之飛則不植植則不飛是也動而無動靜而無靜非不動不靜此言形而上之理也理則神而莫測方其動時未嘗不靜故曰無動方其靜時未嘗不動故曰無靜靜中有動動中有靜靜而能動動而能靜陽中有陰陰中有陽錯綜無窮是也又曰水陰根陽火陽根陰水陰火陽物也形而下者也所以根陰根陽理也形而上者也直卿云兼兩意言之方備言理之動靜則靜中有動動中有靜其體也靜而能動動而能靜其用也言物之動靜則動者無靜靜者無動其體也動者則不能靜靜者則不能動其用也端蒙問動而無動靜而無靜曰此說動而生陽動極而靜靜而生陰靜極復動此自有箇神在其間不屬陰不屬陽故曰陰陽不測之謂神且如晝動夜靜在晝間神不與之俱動在夜間神不與之俱靜神又自是神神卻變得晝夜晝夜卻變不得神神妙萬物如說水陰根陽火陽根陰已是有形象底是說粗底了又曰靜者為主故以蒙艮終云植問動而無動靜而無靜神也此理如何曰譬之晝夜晝固是屬動然動卻來管那神不得夜固是屬靜靜亦來管那神不得蓋神之為物自是超然於形器之表貫動靜而言其體常如是而已矣時舉動靜章所謂神者初不離乎物如天地物也天之收斂豈專乎動地之發生豈專乎靜此即神也閎祖問動而無靜靜而無動物也靜而無靜動而無動神也所謂物者不知人在其中否曰人在其中曰所謂神者是天地之造化否曰神即此理也問物則拘於有形人則動而有靜靜而有動如何卻同萬物而言曰人固是靜中動動中靜亦謂之物凡言物者指形器有定體而言然自有一箇變通底在其中須知器即道道即器莫離道而言器可也凡物皆有此理且如這竹椅固是一器到適用處便有箇道在其中又問神曰神在天地中所以妙萬物者如水為陰則根陽火為陽則根陰云云先生曰文字不可泛看須是逐句逐段理會此一段未透又去看別段便鶻突去如何會透徹如何會貫通且如此段未說理會到十分亦且理會七分看來看去直至無道理得說卻又再換一段看疏略之病是今世學者通患不特今時如此前輩看文字蓋有一覽而盡者亦恐只是無究竟問經書須逐句理會至如史書易曉只看大綱如何曰較之經書不同然亦自是草率不得須當看人物是如何治體是如何國勢是如何皆當子細因舉上蔡看明道讀史逐行看過不差一字宇至之問水陰根陽火陽根陰與五行陰陽陰陽太極為一截四時運行萬物終始與混兮闢分其無窮兮為一截混兮是利貞誠之復闢兮是元亨誠之通注下自五而一自五而萬之說則是太極常在貞上恐未穩先生大以為然曰便是猶有此等硬說處直卿云自易說元亨利貞直到濂溪康節始發出來方子混兮闢兮混言太極闢言為陰陽五行以後故末句曰其無窮兮言既闢之後為陰陽五行為萬物無窮盡也人傑樂通書論樂意極可觀首尾有條理只是淡與不淡和與不和前輩所見各異邵康節須是二四六八周子只是二四中添一上為五行如剛柔添善惡又添中於其間周子之說也可學問通書注云而其制作之妙真有以得乎聲氣之元不知而今尚可尋究否曰今所爭祇是黃鍾一宮耳這裏高則都高這裏低則都低蓋難得其中耳問胡安定樂如何曰亦是一家榦聖學問伊川云為士必志於聖人周子乃云一為要一者無欲也何如曰若注釋古聖賢之書恐認當時聖賢之意不親切或有誤處此書乃周子自著不應有差一者無欲一便是無欲今試看無欲之時心豈不一又問比主一之敬如何曰無欲之與敬二字分明要之持敬頗似費力不如無欲撇脫人只為有欲此心便千頭萬緒此章之言甚為緊切學者不可不知問一是純一靜虛是此心如明鑑止水無一毫私欲填於其中故其動也無非從天理流出無一毫私欲撓之靜虛是體動直是用曰也是如此靜虛易看動直難看靜虛只是伊川云中有主則虛虛則邪不能入是也若物來奪之則實實則暗暗則塞動直只是其動也更無所礙若少有私欲便礙便曲要恁地做又不要恁地做便自有窒礙便不是直曲則私私則狹端蒙或問聖可學乎云云一為要這箇是分明底一不是鶻突底一問如何是鶻突底一曰須是理會得敬落著處若只塊然守一箇敬字便不成箇敬這箇亦只是說箇大概明通在己也公溥接物也須是就靜虛中涵養始得明通方能公溥若便要公溥定不解得靜虛明通精義入神也動直公溥利用安身也又曰一即所謂太極靜虛明通即圖之陰靜動直公溥即圖之陽動賀孫問聖學章一者是表裏俱一純徹無二少有纖毫私欲便二矣內一則靜虛外一則動直而明通公溥則又無時不一也一者此心渾然太極之體無欲者心體粹然無極之真靜虛者體之未發豁然絕無一物之累陰之性也動直者用之流行坦然由中道而出陽之情也明屬火通屬木公屬金溥屬水明通則靜極而動陰生陽也公溥則動極而靜陽生陰也而無欲者又所以貫動靜明通公溥而統於一則終始表裏一太極也不審是否曰只四象分得未是此界兩邊說明屬靜邊通屬動邊公屬動邊溥屬靜邊明是貞屬水通是元屬木公是亨屬火溥是利屬金只恁地循環去明是萬物收斂醒定在這裏通是萬物初發達公是萬物齊盛溥是秋來萬物溥遍成遂各自分去所謂各正性命曰在人言之則如何曰明是曉得事物通是透徹無窒礙公是正無偏陂溥是溥遍萬事便各有箇理去直卿曰通者明之極溥者公之極曰亦是如後所謂誠立明通意又別彼處以明字為重立如三十而立通則不惑知天命耳順也淳安卿問明通公溥於四象曷配曰明者明於己水也正之義也通則行無窒礙木也元之義也公者公於己火也亨之義也溥則物各得其平之意金也利之義也利如乾道變化各正性命之意明通者靜而動公溥者動而靜砥問履之記先生語以明配水通配木公配火溥配金溥何以配金曰溥如何配金溥正是配水此四者只是依春夏秋冬之序相配將去明配木仁元通配火禮亨公配金義利溥配水智貞想是他錯記了僩問明通公溥於四象何所配曰只是春夏秋冬模樣曰明是配冬否曰似是就動處說曰便似是元否曰是然這處亦是偶然相合不是正恁地說又曰也有恁地相似處吉凶者失得之象也悔吝者憂虞之象也悔便是悔惡向善意如曰震無咎者存乎悔非如迷復字意吝是未至於惡只管吝漸漸惡剛柔者晝夜之象也變化者進退之象也變是進化是退便與悔吝相似且以一歲言之自冬至至春分是進到一半所以謂之分自春分至夏至是進到極處故謂之至進之過則退至秋分是退到一半處到冬至也是退到極處天下物事皆只有此兩箇問人只要全得未極以前底否曰若以善惡配言則聖人到那善之極處又自有一箇道理不到得履霜堅冰至處若以陰陽言則他自是陰了又陽陽了又陰也只得順他易裏才見陰生便百種去裁抑他固是如此若一向是陽則萬物何由得成他自是恁地國家氣數盛衰亦恁地堯到七十載時也自衰了便所以求得一箇舜分付與他又自重新轉過若一向做去到死後也衰了文武恁地到成康也只得恁地持盈守成到這處極了所以昭王便一向衰扶不起漢至宣帝以後便一向衰直至光武又只得一二世便一向扶不起國統屢絕劉曰光武便如康節所謂秋之春時節曰是賀孫理性命彰言道之顯微言道之隱匪靈弗瑩言彰與微須靈乃能了然照見無滯礙也此三句是言理別一本靈作虛義短剛善剛惡柔亦如之中焉止矣此三句言性二氣五行以下並言命實是實理人傑厥彰厥微只是說理有大小精粗如人事中自有難曉底道理如君仁臣忠父慈子孝此理甚顯然若陰陽性命鬼神往來則不亦微乎端蒙問五殊二實曰分而言之有五總而言之只是陰陽節鄭問理性命章何以下分字曰不是割成片去只如月映萬川相似淳萬一各正小大有定言萬箇是一箇一箇是萬箇蓋體統是一太極然又一物各具一太極所謂萬一各正猶言各正性命也端蒙問五殊二實一段先生說了又云中庸如天之無不覆幬地之無不持載止是一箇大底包在中間又有四時錯行日月代明自有細小去處道並行而不相悖萬物並育而不相害並行並育便是那天地覆載不相悖不相害便是那錯行代明底小德川流是說小細底大德敦化是那大底大底包小底小底分大底千五百年間不知人如何讀這箇都似不理會得這道理又云一實萬分萬一各正便是理一分殊處植問理性命章注云自其本而之末則一理之實而萬物分之以為體故萬物各有一太極如此則是太極有分裂乎曰本只是一太極而萬物各有稟受又自各全具一太極爾如月在天只一而已及散在江湖則隨處而見不可謂月已分也謨顏子問顏子能化而齊曰此與大而化之之化異但言消化卻富貴貧賤之念方能齊齊亦一之意去偽師友杜斿問濂溪言道至貴者不一而足曰周先生是見世間愚輩為外物所搖動如墮在火坑中不忍見他故如是說不一世人心不在殼子裏如發狂相似只是自不覺浙間只是權譎功利之淵藪三二十年後其風必熾為害不小某六七十歲居此世不久旦夕便死只與諸君子在此同說後來必驗節勢問極重不可反知其重而亟反之可也曰是說天下之勢如秦至始皇強大六國便不可敵東漢之末宦官權重便不可除紹興初只斬陳少陽便成江左之勢重極則反之也難識其重之機而反之則易人傑文辭文所以載道一章之大意輪轅飾而人弗庸徒飾也言有載道之文而人弗用也況虛車乎此不載道之文也自篤其實至行而不遠是輪轅飾而人庸之者也自不賢者至強之不從也是弗庸者也自不知務道德至藝而已虛車也端蒙聖蘊或問發聖人之蘊教萬世無窮者顏子也曰夫子之道如天惟顏子盡得之夫子許多大意思盡在顏子身上發見譬如天地生一瑞物即此物上盡可以見天地純粹之氣謂之發乃亦足以發之發不必待顏子言然後謂之發也去偽精蘊聖人之精畫卦以示聖人之蘊因卦以發濂溪看易卻須看得活方子精謂心之精微也蘊謂德所蘊蓄也端蒙聖人之蘊因卦以發易本未有許多道理因此卦遂將許多道理搭在上面所謂因卦以發者也至問聖人之精聖人之蘊曰精是精微之意蘊是包許多道理又問伏羲始畫而其蘊亦已發見於此否曰謂之已具於此則可謂之已發見於此則不可方其初畫也未有乾四德意思到孔子始推出來然文王孔子雖能推出意思而其道理亦不出伏羲始畫之中故謂之蘊蘊如衣敝蘊袍之蘊是包得在裏面砥饒錄云方其初畫出來未有今易中許多事到文王孔子足得出來而其理亦不外乎始畫精是聖人本意蘊是偏旁帶來道理如春秋聖人本意只是載那事要見世變禮樂征伐自諸侯出臣弒其君子弒其父如此而已就那事上見得是非美惡曲折便是因卦以發底如易有太極是生兩儀兩儀生四象四象生八卦是聖人本意底如文王繫辭等孔子之言皆是因而發底不可一例作重看淳乾損益動通書曰乾乾不息者懲忿窒慾遷善改過不息是也節乾乾不息者體日往月來寒往暑來者用有體則有用有用則有體不可分先後說僩第一句言乾乾不息第二句言損第三句言益者蓋以解第一句若要不息須著去忿慾而有所遷改中乾之用其善是其字疑是莫字蓋與下兩句相對若只是其字則無義理說不通人傑問此章前面懲忿窒慾遷善改過皆是自修底事後面忽說動者何故曰所謂懲忿窒慾遷善改過皆是動上有這般過失須於方動之時審之方無凶悔吝所以再說箇動僩蒙艮問艮其背背非見也曰這也只如非禮勿視非謂耳無所聞目無所見也姦聲亂色不留聰明淫樂慝禮不接心術艮其背者只如此耳程子解艮其背謂止於所不見恐如此說費力所謂背者只是所當止也人身四體皆動惟背不動所當止也看下文艮其止止字解背字所以謂之止其所止所當止如人君止於仁人臣止於敬全是天理更無人欲則內不見己外不見人只見有理所以云艮其背不獲其身行其庭不見其人正謂此也砥寓錄別出問艮其背背非見也曰只如非禮勿視姦聲亂色不留聰明淫樂忒禮不接心術非是耳無所聞目無所見程子解艮其背謂止於其所不見即是此說但易意恐不如此卦彖下止便是去止那上面止艮其止一句若不是止字誤本是背字便是艮其止句解艮其背一句艮其止是止於所當止如大學君止於仁臣止於敬之類程子解此不及卻好不知止如何又恁地說人之四肢皆能動惟背不動有止之象艮其背是止於所當止之地不獲其身行其庭不見其人萬物各止其所便都純是理也不見己也不見有人都只見道理宇問止非為也為不止矣何謂也曰止便不作為作為便不是止曰止是以心言否曰是淳舉易傳內欲不萌外物不接曰即是這止淳後錄濂溪言寡欲以至於無蓋恐人以寡欲為便得了故言不止於寡欲而已必至於無而後可耳然無底工夫則由於能寡欲到無欲非聖人不能也曰然則欲字如何曰不同此寡欲則是合不當如此者如私欲之類若是飢而欲食渴而欲飲則此欲亦豈能無但亦是合當如此者端蒙誠立明通立字輕只如三十而立之立明字就見處說如知天命以上之事端蒙劉問心既誠矣固不用養然亦當操存而不失否曰誠是實也到這裏已成就了極其實決定恁地不解失了砥錄云誠實也存養到實處則心純乎理更無些子夾雜又如何持守何用養何用操存又問反身而誠曰此心純一於理徹底皆實無夾雜亦無虛偽宇砥少異問會元之期曰元氣會則生聖賢如歷家推朔旦冬至夜半甲子所謂元氣會亦是此般模樣宇拙賦拙賦天下拙刑政徹其言似莊老謨
