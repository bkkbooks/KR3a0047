body:
  text: 朱子語類卷第九十禮七祭如今士大夫家都要理會古禮今天下有二件極大底事恁地循襲其一是天地同祭於南郊其一是太祖不特立廟而與諸祖同一廟自東漢以來如此又錄云千五六百年無人整理子謂為芻靈者善謂為俑者不仁雖是前代已用物事到不是處也須改用教是始得賀孫以下天地之祭古時天地定是不合祭日月山川百神亦無合共一時祭享之禮當時禮數也簡儀從也省必是天子躬親行事豈有祭天便將下許多百神一齊排作一堆都祭只看郊臺階級兩邊是踏過處中間自上排下都是神位更不通看賀孫問先朝南北郊之辨曰如禮說郊特牲而社稷太牢書謂用牲於郊牛二及社于新邑此其明驗也故本朝後來亦嘗分南北郊至徽宗時又不知何故卻合為一又曰但周禮亦只是說祀昊天上帝不說祀后土故先儒說祭社便是又問周禮大司樂冬至奏樂於圜丘以禮天夏至奏樂於方丘以禮地曰周禮中止有此說更有禮大神享大鬼祭大祇之說餘皆無明文廣天地本朝只是郊時合祭神宗嘗南郊祭天矣未及次年祭地而上仙元祐間嘗議分祭東坡議只合祭引詩郊祀天地為證劉元城逐件駁之秋冬祈穀之類亦是二祭而合言之東坡只是謂祖宗幾年合祭一旦分之恐致禍其說甚無道理元城謂子由在政府見其論無道理遂且罷議後張耒輩以眾說易當時文字徽宗時分祭祀后土皇地谀漢時謂之媼神漢武明皇以南郊祭天為未足遂祭於泰山以北郊祭地為未足遂祭於汾陰立一后土廟真宗亦皆即泰山汾陰而祭焉先生曰分祭是揚先生因泛說祭祀以社祭為祀地諸儒云立大社王社諸侯國社侯社五峰有此說謂此即祭地之禮道夫錄云五峰言無北郊只社便是祭地卻說得好周禮他處不說只宗伯以黃琮禮地注謂夏至地神在崑崙典瑞兩圭有邸以祀地注謂祀於北郊大司樂夏日至於澤中方丘奏之八變則地谀可得而禮矣他書亦無所考書云乃社于新邑牛一羊一然禮云諸侯社稷皆少牢此處或不可曉賀孫如今郊禮合祭天地周禮有圜丘方澤之說後來人卻只說地便是后土見於書傳言郊社多矣某看來不要如此也自還有方澤之祭但周禮其他處又都不說亦未可曉木之如今祀天地山川神塑貌像以祭極無義理木之堯卿問社主平時藏在何處曰向來沙隨說以所宜木刻而為主某嘗辨之後來覺得卻是但以所宜木為主如今世俗神樹模樣非是將木來截作主也以木名社如櫟社枌榆社之類又問社稷神曰說得不同或云稷是山林原隰之神或云是穀神看來穀神較是社是土神又問社何以有神曰能生物便是神也又曰周禮亡國之神卻用刑人為尸一部周禮卻是看得天理爛熟也夔孫以下社程沙隨云古者社以木為主今以石為主非古也方子五祀行是道路之神伊川云是宇廊未必然門是門神戶是戶神與中霤灶凡五古聖人為之祭祀亦必有其神如孔子說祭如在祭神如神在是有這祭便有這神不是聖人若有若亡見得一半便自恁地但不如後世門神便畫一箇神象如此賀孫以下五祀叔器問五祀祭行之義曰行堂塗也古人無廊屋只於堂階下取兩條路五祀雖分四時祭然出則獨祭行及出門又有一祭作兩小山於門前烹狗置之山上祭畢卻就山邊喫卻推車從兩山間過蓋取跋履山川之義舜功問祭五祀想也只是當如此致敬未必有此神曰神也者妙萬物而言者也盈天地之間皆神若說五祀無神處是甚麼道理叔器問天子祭天地諸侯祭山川大夫祭五祀士庶人祭其先此是分當如此否曰也是氣與他相關如天子則是天地之主便祭得那天地若似其他人與他人不相關後祭箇甚麼如諸侯祭山川也只祭得境內底如楚昭王病後卜云河為祟諸大夫欲祭河昭王自言楚之分地不及於河河非所以為祟孔子所以美之云昭王之不失國也宜哉這便見得境外山川與我不相關自不當祭又問如殺孝婦天為之旱如何曰這自是他一人足以感動天地若祭祀則分與他不相關如何祭得又問人而今去燒香拜天之類恐也不是曰天只在我更禱箇甚麼一身之中凡所思慮運動無非是天一身在天裏行如魚在水裏滿肚裏都是水某說人家還醮無意思一作最可笑豈有斟一盃酒盛兩箇餅要享上帝且說有此理無此理某在南康祈雨每日去天慶觀燒香某說且謾去一作且慢今若有箇人不經州縣便去天子那裏下狀時你嫌他不嫌他你須捉來打不合越訴而今祈雨卻如何不祭境內山川如何更去告上帝義剛問灶可祭否曰人家飲食所繫亦可祭問灶尸曰想是以庖人為之問祭灶之儀曰亦略如祭宗廟儀淳問月令灶在廟門之外如何曰五祀皆在廟中灶在廟門之東凡祭五祀皆設席於奧而設主奠俎於其所祭之處已乃設饌迎尸於奧銖因說五祀伊川疑不祭井古人恐是同井曰然可學古者人有遠行者就路間祭所謂行神者用牲為兩斷車過其中祭了卻將喫謂之餞禮用兵時用犯軍法當死底人斬於路卻兵過其中揚祖道之祭是作一堆土置犬羊於其上祭畢而以車碾從上過象行者無險阻之患也如周禮犯軷是也此是門外事門內又有行祭乃祀中之一也燾祈雨之類亦是以誠感其氣如祈神佛之類亦是其所居山川之氣可感今之神佛所居皆是山川之勝而靈者雨亦近山者易至以多陰也揚古人神位皆西坐東向故獻官皆西向拜而今皆南向了釋奠時獻官猶西向拜不知是如何以下祀先聖室中西南隅乃主位室中西牖東戶若宣聖廟室則先聖當東向先師南向如周人禘嚳郊稷嚳東向稷南向今朝庭宗廟之禮情文都自相悖不曉得古者主位東向配位南向故拜即望西今既一列皆南向到拜時亦卻望西拜都自相背古者用籩豆簠簋等陳於地當時只席地而坐故如此飲食為便今塑像高高在上而祭饌反陳於地情文全不相稱曩者某人來問白鹿塑像某答以州縣學是天子所立既元用像不可更書院自不宜如此不如不塑像某處有列子廟卻塑列子膝坐於地這必有古像行古禮須是參用今來日用常禮庶或饗之如太祖祭用簠簋籩豆之外又設牙盤食用碗楪之類陳於床這也有意思到神宗時廢了元祐初復用後來變元祐之政故此亦遂廢賀孫夫子像設置於椅上已不是又復置在臺座上到春秋釋奠卻乃陳簠簋籩豆於地是甚義理某幾番說要塑宣聖坐於地上如設席模樣祭時卻自席地此有甚不可處每說與人都道差異不知如何某記在南康欲於學中整頓宣聖不能得後說與交代云云宣聖本不當設像春秋祭時只設主祭可也今不可行只得設像坐於地方始是禮宇先聖冕服之制殊不同詹卿云羇冕畫龍於胸然則鷩冕之雉毳冕之宗彝皆畫於胸銖釋奠據開元禮只是臨時設位後來方有塑像顏孟配饗始亦分位於先聖左右後來方並坐於先聖之東西嚮當來所降指揮今亦無處尋討必大孔子居中顏孟當列東坐西向七十二人先是排東廡三十六人了卻方自西頭排起當初如此自升曾子於殿上下面趲一位次序都亂了此言漳州未知他處如何又云某經歷諸處州縣學都無一箇合禮序賀孫高宗御製七十二子贊曾見他處所附封爵姓名多用唐封官號本朝已經兩番加封如何恁地賀孫謁宣聖焚香不是古禮拜進將捻香不當叩首只直上捻香了卻出笏叩首而降拜賀孫釋奠散齋因云陳膚仲以書問釋奠之儀今學中儀乃禮院所班多參差不可用唐開元禮卻好開寶禮只是全錄開元禮易去帝號耳若政和五禮則甚錯今釋奠有伯魚而無子思又十哲亦皆差互仲弓反在上且如紹興中作七十二子贊只據唐爵號不知後來已經加封矣近嘗申明之可學因論程沙隨辨五禮新儀下丁釋奠之說而曰政和中編此書時多非其人所以差誤如此續已有指揮改正唐開元禮既失煩縟新儀又多脫略如親祠一項開元禮中自先說將升車執某物立車右到某處方說自車而降今新儀只載降車一節卻無其先升車事前一段既如此載後凡親祠處段段皆然今行禮時又俱無此升降之儀必大孟子配享乃荊公請之配享只當論傳道合以顏子曾子子思孟子配嘗欲於雲谷左立先聖四賢配右立二程諸先生後不曾及在南康時嘗要入文字從祀伯魚以漸去任不欲入文字理會事但封與劉淳叟以其為學官可以言之揚在漳州日陳請釋奠禮儀到如今只恁地白休了子約為藉田令多少用意主張諸禮官都沒理會了遂休坐客云想是從來不曾理會得故怕理會曰東坡曾云今為禮官者皆是自牛背上拖將來今看來是如此因問張舅忠甫家須臾別有禮書令還鄉日詢求之致道云今以時文取官下梢這般所在全理會不得曰向時尚有開寶通禮科令其熟讀此書試時挑問後來又做出通禮如注釋一般如人要治此必須連此都記得如問云籩起於何時逐一說了後又反復論議一段如此亦自好漳州煞有文字皆不得寫如今朝廷頒行許多禮書如五禮新儀未是若是不識禮便做不識禮且只依本寫在也得又去杜撰將古人處改了是日因看薛直老行狀中有述其初為教官陳請改上丁釋奠事蓋其見當時用下丁故請改之舊看古禮中有一處注云春用二月上丁秋用八月下丁今忘記出處向亦欲檢問象先及漳州陳請釋奠儀欲乞委象先又思量渠不是要理會這般事人故已之賀孫新書院告成明日欲祀先聖先師古有釋菜之禮約而可行遂檢五禮新儀令具其要者以呈先生終日董役夜歸即與諸生斟酌禮儀雞鳴起平明往書院以廳事未備就講堂禮宣聖像居中兗國公顏氏郕侯曾氏沂水侯孔氏鄒國公孟氏西向配北上並紙牌子濂溪周先生東一明道程先生西一伊川程先生東二康節邵先生西二司馬溫國文正公東三橫渠張先生西三延平李先生東四從祀亦紙牌子並設於地祭儀別錄祝文別錄先生為獻官命賀孫為贊直卿居甫分奠叔蒙贊敬之掌儀堂狹地潤頗有失儀但獻官極其誠意如或享之鄰曲長幼並來陪禮畢先生揖賓坐賓再起請先生就中位開講先生以坐中多年老不敢居中位再辭不獲諸生復請遂就位說為學之要午飯後集眾賓飲至暮散賀孫李丈問太廟堂室之制曰古制是不可曉禮說士堂後一架為室蓋甚窄架即也天子便待加得五七架亦窄狹不知周家三十以上神主位次相逼如何行禮室在堂後一間後堂內左角為戶而入西壁如今之牆上為龕太祖居之東向旁兩壁有牖群昭列於北牖下而南向群穆列於南牖下而北向堂又不為神位而為人所行禮之地天子設黼扆於中受諸侯之朝淳義剛錄同以下天子宗廟之祭祖有功而宗有德是為百世不遷之廟商六百年只三宗皆以有功德當百世祀故其廟稱宗至後世始不復問其功德之有無一例以宗稱之必大古人七廟恐是祖宗功德者不遷胡氏謂如此則是子孫得以去取其祖宗然其論續諡法又謂諡乃天下之公義非子孫得以私之如此則廟亦然揚問漢諸儒所議禮如何曰劉歆說得較是他謂宗不在七廟中者謂恐有功德者多則占了那七廟數也問文定七廟之說如何曰便是文定好如此硬說如何恁地說得且如商之三宗若不是別立廟後只是親廟時何不胡亂將三箇來立如何恰限取祖甲太戊高宗為之祖有功宗有德天下後世自有公論不以揀擇為嫌所謂名之曰幽厲雖孝子慈孫百世不能改那箇好底自是合當宗祀如何毀得如今若道三宗只是親廟則是少一箇親廟了便是書難理會且如成王崩後十餘日此自是成服了然顧命卻說麻冕黼裳彤裳之屬如此便是脫了那麻衣更來著色衣文定便說道是攝行踐阼之禮某道政事便可攝而行阼豈可攝而踐如何恁地硬說且如元年他便硬道不要年號而今有年號人尚去揩改契書之屬若更無後當如何又問志一則動氣是先天而天弗違氣一則動志是後天而奉天時其意如何曰他是說春秋成後致麟先儒固亦有此說然亦安知是作起獲麟與文成致麟但某意恐不恁地這似乎不祥若是一箇麟出後被人打殺了也揜采因言馬子莊道兗州曾有一麟胡叔器云但是古老相傳舊日開江有一白駒先生曰馬說是二十年間事若白駒等說是起於禹如顏師古注啟母石之說政如此近時廣德軍張大王分明是倣這一說義剛廟商七世周亦七世前漢初立三宗後王莽并後漢末又多加了宗字又一齊亂了唐十二廟本朝則韓持國本退之禘祫說祀僖祖又欲止起於太祖其議紛紛合起僖祖典禮都只將人情處了無一人斷之以公自合只自僖祖起後世德薄者祧之周廟文王在豐武王又在一處自合只同一處方是不知如何周廟后稷文武高曾祖考七廟揚今之廟制出於漢明帝歷代相承不改神宗嘗欲更張今見於陸農師集中史卻不載可學問諸侯廟制太祖居北而南向昭廟二在其東南穆廟二在其西南皆南北相重不知當時每廟一處或共一室各為位也曰古廟則自太祖以下各是一室陸農師禮象圖可考西漢時高帝廟文帝顧成之廟猶各在一處但無法度不同一處至明帝謙貶不敢自當立廟祔於光武廟其後遂以為例至唐太廟及群臣家廟悉如今制以西為上也至禰處謂之東廟只作一列今太廟之制亦然德明鄧子禮問廟主自西而列何所據曰此也不是古禮如古時一代只奉之於一廟如后稷為始封之廟文王自有文王之廟武王自有武王之廟不曾混雜共一廟賀孫諸侯有四時之祫畢竟是祭有不及處方如此如春秋有事於太廟太廟便是群祧之主皆在其中義剛或問遠廟為祧如何曰天子七廟如周文武之廟不祧文為穆則凡後之屬乎穆者皆歸于文之廟武為昭則凡後之屬乎昭者皆歸乎武之廟也時舉昭穆昭常為昭穆常為穆中間始祖太廟門向南兩邊分昭穆周家則自王季以上之主皆祧於后稷始祖廟之夾室自成王昭王以下則隨昭穆遞遷於昭穆之首廟至首廟而止如周則文王為穆之首廟武王為昭之首廟凡新崩者祔廟則看昭穆但昭則從昭穆則從穆不交互兩邊也又云諸廟皆有夾室堯卿問高為穆之義曰新死之主新祔便在昭這一排且如諸侯五廟一是太祖便居中二昭二穆相對今新死者祔則高過穆這一排對空坐禰在昭一排亦對空坐以某意推之當是如此但禮經難考今若看得一兩般書猶自得若看上三四般去便無討頭處如孟子當時自無可尋處了今看孟子考禮亦疏理會古制亦不甚得他只是大概說且如說井田後舉詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也似這般證驗也不大故切安卿問孟子何故不甚與古合曰他只是據自家發放做相那箇時勢做又問鄭康成注王制以為諸侯封國與周禮小大不同蓋王制是說夏商以前之制如何曰某便是不甚信此說恐不解有此理且如孟子說夏后氏五十而貢殷人七十而助周人百畝而徹某自不敢十分信了且如一家有五十畝田忽然說我要添與你作七十畝則要多少心力蓋人家各為定業東阡西陌已自定了這五十畝中有溝洫有廬舍而今忽然變更又著分疆界制溝洫毀廬舍東邊住底移過西邊這裏住底遷過那裏一家添得二十畝田卻勞動多少語至此大聲云恁地天下騷然不寧把幾多心力去做據某看來自古皆是百畝不解得恁地而今解時只得就他下面說放那裏淳錄云向解孟子且隨文如此解若理會著實行時大不如此義剛問井田今使一家得百畝而民生生無已後來者當如何給之先生笑曰今且據見在人數給如封建夏商以前只是百里到周方是諸公方五百里諸侯方四百里諸伯方三百里諸子方二百里諸男方百里恁地卻取四國地來方添成一國那四國又要恁地卻何處討那地來安卿曰或言夏商只有三千里周時乃是七千里曰便是亂說且當時在在是國自王畿至要荒皆然今若要封得較大似夏商時便著每國皆添地卻於何處頓放此須是武王有縮地脈法始得恁地時便煞改徙著許多國元在這裏底今又著徙去那裏宗廟社稷皆著改易如此天下騷然他人各有定分土地便肯舍著從別處去討君舉說封疆方五百里只是周圍五百里徑只百二十五里四百里者徑百里三百里者徑七十五里一百里者只五十里加此看時尚似相合若是諸男之地方百里時以此法推之則止二十五里如此卻只是一箇耆長某便道他說只是謾人他向來進此書甚為得意淳錄云自奇其說與王制等合某嘗作一篇文以闢之逐項破其說且當時說侯六伯七淳錄云本文方千里之地以封侯則六侯以封伯則七伯以封子則二十五子以封男則百男其地已有定數此說如何可通如此則所封大國自少若是只皆百里而止便是一千里地只將三十同來封了那七十同卻空放那裏卻綿异數百里皆無國又問三分去一之說如何曰便是不是他們只是不曉事解不行後便胡說且如川中有六七百里中置數州者那裏地平坦寸寸是地如這一路某嘗登雲谷望之密密皆山其中間有些子罅隙中黃白底方是田恁地卻如何去淳錄云蓋百分之二又如何三分去一注疏多是如此有時到那解不行處便說從別處去義剛問先生向時說齊魯始封時皆七百里然孟子卻說只是百里曰便是不如此今只據齊地是東至於海西至於河南至於穆陵北至於無棣魯地是跨許宋之境是有五七百里闊時勢也是著恁地且禹會諸侯於塗山執玉帛者萬國到周只有千八百國便是相并吞後那國都大了你卻要只將百里地封他教他入那大國罅中去武王不柰何只得就封他當時也自無那閑地緣是滅了許多國如孟子說驅飛廉於海隅而戮之滅國者五十便是得許多空地來封許多功臣同姓之屬孟子謂一不朝則貶其爵再不朝則削其地如齊先是爽鳩氏居之後又是某氏居之如書所謂某氏徙於齊這便見得當時諸侯有過便削其地方始得那地來封後來底若不恁地時那太公周公也自無安頓處你若不恁地後要去取斂那地來封我功臣與同姓時他便敢起兵如漢晁錯時樣子且如孟子當時也自理會那古制不甚得如曰諸侯之禮吾未之學然而軻也嘗聞其略也恁地便是不曾知得子細他當時說諸國許多事也只是大概說如此雖說湯以七十里文王以百里然及滕文公恁地時又卻只說有王者作必來取法是為王者師也元不曾說道便可王以齊王猶反手也便是也要那國大底方做得小底也柰何不得而今且說道將百里地與你教你行王政看你做從何處起便是某道古時聖賢易做後世聖賢難做古時只是順那自然做將去而今大故費手淳錄此下云漢高祖與項羽紛爭五年之間可謂甚窘欲殺他不能欲住又不得費多少心力想不似當初做亭長時較快活良久問諸生曰當劉項恁地紛爭時設使堯舜湯武居其時當如何是戰好是不戰好安卿曰湯武是仁義素孚於民人自然歸服不待戰曰他而今不待你素孚秦當時收盡天下尺地一民皆為己有你仁義如何地得素孚淳錄云何處討地來行仁政如何得素孚於民如高祖之徒皆是起於田里若使湯武居之當如何地勝得秦安卿曰以至仁伐至不仁以至義伐至不義自是勝曰固是如此如秦可謂不仁不義當時所謂更遣長者扶義而西也是倣這意思做但當時諸侯入關皆被那章邯連併敗了及高祖入去緣路教無得鹵掠如此之屬也是恁地做了然他入去後又尚要設許多詭計誘那秦將之屬後方入得設使湯武居之還是恁地做不恁地做今且做秦是不仁不義可以勝那項籍出來紛爭許多時卻如何對他還是與他冢殺若不與冢殺便被他殺了若與他冢殺時還是不殺人麼當此時是天理是人欲恁地看來是未有箇道理湯武在那時也須著百端去思量與他區處但而今看來也未有箇道理胡叔器問太公呂后當時若被項羽殺了如何曰不特此一事當時皆是如此便是太費調護徐顧林擇之云項羽恁地粗暴當時捉得太公如何不殺了擇之曰羽也有斟酌他怕殺了反重其怨曰便是項羽也有商量高祖也知他必不殺故放得心下項羽也是團量了高祖故不敢殺若是高祖軟弱當時若敵他不過時他從頭殺來是定義剛曰孔明誘奪劉璋地也似不義或者因言渠雜學伯道所以後將申商之說教劉禪曰便是適間說後世聖賢難做動著便是恁地粘手惹腳次日言某夜來思量那高祖其初入關後恁地鎮撫那人民及到灞上又不入秦府庫取財貨美女之屬皆是後來被項羽王他巴蜀漢中他也入去這箇也是未幾便出來定三秦已自侵占別人田地了但是那三降王不足以王秦卻也是定若是奪得那關中便也好住便且關了關門守得那裏面底也得又不肯休又去尋得弒義帝說話出來這箇尋得也是若湯武也不肯放過但既尋得這箇說話便只依傍這箇做便是卻又率五諸侯合得五十六萬兵走去彭城日日去喫酒取那美人更不理會卻被項羽來殺得狼當走湯武便不肯恁地自此後名義壞盡了從此去便只是胡做胡殺了文定謂惜乎假之未久而遽歸者此也這若把與湯武做時須做得好定是不肯恁地義剛問高祖因閉關後引得項羽怒若不閉時卻如何先生笑曰只是見他頭勢來得惡後且權時關閉著看他如何地義剛淳錄少異作數條禮宗廟只是一君一嫡后自錢惟演佞仁祖遂以一嫡同再立后更以仁主所生后配後遂以為例而禮亂矣臣民禮亦只是一嫡配再正娶者亦尚可婢而生子者婢之子主祭只祭嫡正其所生當別祭揚古者各有始祖廟以藏祧主如適士二廟各有門堂寢各三間是十八間屋今士人如何要行得賀孫以下士古命士得立家廟家廟之制內立寢廟中立正廟外立門四面牆圍之非命士止祭於堂上只祭考妣伊川謂無貴賤皆祭自高祖而下但祭有豐殺疏數不同廟向南坐皆東向自天子以至於士皆然伊川於此不審乃云廟皆東向祖先位面東自廳側直東入其所反轉面西入廟中其制非是古人所以廟面東向坐者蓋戶在東牖在西坐於一邊乃是奧處也揚唐大臣長安立廟後世子孫必其官至大臣乃得祭其廟此其法不善也只假一不理選限官與其子孫令祭其廟為是揚唐大臣皆立廟於京師本朝惟文潞公法唐杜佑制立一廟在西京雖如韓司馬家亦不曾立廟杜佑廟祖宗時尚在長安揚問家廟在東莫是親親之意否曰此是人子不死其親之意問大成殿又卻在學之西莫是尊右之義否曰未知初意如何本朝因仍舊制反更率略較之唐制尤沒理會唐制猶有近古處猶有條理可觀且如古者王畿之內髣彿如井田規畫中間一圈便是宮殿前圈中左宗廟右社稷其他百官府以次列居是為前朝後中圈為市不似如今市中家家自各賣買乃是官中為設一去處令凡民之賣買者就其處若今場務然無游民雜處其間更東西六圈以處六鄉六遂之民耕作則出就田中之廬農功畢則入此室處唐制頗放此最有條理城中幾坊每坊各有牆圍如子城然一坊共一門出入六街凡城門坊角有武侯鋪衛士分守日暮門閉五更二點鼓自內發諸街鼓城振坊市門皆啟若有姦盜自無所容蓋坊內皆常居之民外面人來皆可知如殺宰相武元衡於靖安里門外分明宰元衡入朝出靖安里賊乘暗害之亦可見坊門不可胡亂入只在大官街上被殺了如那時措置得好官街邊都無閑雜賣買汙穢雜揉所以杜詩云我居巷南子巷北可恨鄰里間十日不見一顏色亦見出一坊入一坊非特特往來不可賀孫問先生家廟只在廳事之側曰便是力不能辦古之家廟甚闊所謂寢不踰廟是也祭時移神主於正堂其位如何曰只是排例以西為上祫祭考妣之位如何曰太祖東向則昭穆之南向北向者以西方為上則昭之位次高祖西而妣東祖西而妣東是祖母與孫並列於體為順若余正父之說則欲高祖東而妣西祖東而妣西則是祖與孫婦並列於體為不順彼蓋據漢儀中有高祖南向呂后少西更不取證於經文而獨取傳注中之一二執以為是斷不可回耳人傑先生云欲立一家廟小五架屋以後架作一長龕堂以板隔截作四龕堂堂置位牌堂外用簾子小小祭祀時亦可只就其處大祭祀則請出或堂或廳上皆可揚家廟要就人住居神依人不可離外做廟又在外時婦女遇雨時難出入揚問祧主當遷何地曰便是這事難處漢唐人多瘞於兩階之間然今人家廟亦無所謂兩階者兩階之間以其人跡不踏取其潔耳問各以昭穆瘞於祖宗之墳如何曰唐人亦有瘞於寢園者但今人墳墓又有太遠者恐難用耳頃在朝因僖祖之祧與諸公爭辨幾至喧忿後來因是去國不然亦必為人論逐當時全不曾商議只見劉智夫崇之時為太常卿來言欲祧僖祖某問欲祧之何所劉曰正未有以處因此方詔集議某論卒不合後來竟為別廟于太廟之側奉僖祖宣祖祧主藏之於別廟不知祫禘時如何這都行不得若禘祫太祖之廟不成教祖宗來就子孫之廟若移太祖之主合禘於別廟則太祖復不得正東向之位都行不得治平間曾如此祧了及至熙寧章衡上疏論僖祖不當祧想其論是主王介甫然其論甚正介甫嘗上疏云皇家僖祖正如周家之稷契皆為始祖百世不遷之廟今替其祀而使下祔於子孫之夾室非所謂事亡如事存事死如事生而順祖宗之孝心也此論甚正後來復僖祖之廟某當時之論正用介甫之意某謂僖祖當為始祖百世不遷之廟如周之后稷而太祖太宗則比周之文武有何不可而趙丞相一向不從當時如樓大防陳君舉謝深甫力主其說而彭子壽孫從之之徒又從而和之或云太祖取天下何與僖祖事某應之曰諸公身自取富貴致位通顯然則何用封贈父祖邪又許及之上疏云太祖皇帝開基而不得正東向之位雖三尺童子亦為之不平其鄙陋如此後來集議某度議必不合遂不曾與議卻上一疏論其事趙丞相又執之不下某數問之亦不從後來歸家亦數寫書去問之何故不降出亦不從後已南遷而事定矣僖祖翼祖順祖宣祖中間嘗祧去翼祖所以不諱敬字得幾時及蔡京建立九廟遂復取還翼祖以足九廟之數後來渡江翼祖順祖廟已祧去若論廟數則自祧僖祖之外由宣祖以至孝廟方成九數乃併宣祖而祧之某嘗聞某人云快便難逢不如祧了且得一件事了其不恭敢如此某為之駭然以下祧問祧禮曰天子諸侯有太廟夾室則祧主藏於其中今士人家無此祧主無可置處禮注說藏於兩階間今不得已只埋於墓所問有祭告否曰橫渠說三年後祫祭於太廟因其祭畢還主之時遂奉祧主歸於夾室遷主新主皆歸於廟鄭氏周禮注大宗伯享先王處亦有此意今略放而行之問考妣入廟有先後則祧以何時曰妣先未得入廟考入廟則祧宗伯注曰魯禮三年喪畢而祫於太祖明年春禘於群廟自爾以後率五年而再幾祭一祫一禘王制注亦然義剛胡兄問祧主置何處曰古者始祖之廟有夾室凡祧主皆藏之於夾室自天子至於士庶皆然今士庶之家不敢僭立始祖之廟故祧主無安頓處只得如伊川說埋於兩階之間而已某家廟中亦如此兩階之間人跡不到取其潔爾今人家廟亦安有所謂兩階但擇淨處埋之可也思之不若埋於始祖墓邊緣無箇始祖廟所以難處只得如此僩問祧主諸侯於祫祭時祧今士人家無祫祭只於四時祭祧仍用祝詞告之可否曰默地祧又不是也古者適士二廟廟是箇大臺特牲饋食禮有宗祝等許多官屬祭祀時禮數大今士人家無廟亦無許大禮數淳春秋時宗法未亡如滕文公云吾宗國魯先君蓋滕文之昭也文王之子武王既為天子以次則周公為長故滕謂魯為宗國又如左氏傳載女喪而宗室於人何有如三桓之後公父文伯公鉏公為之類乃季氏之小宗南宮适之類孟氏之小宗今宗室中多帶皇兄皇叔皇伯等冠於官職之上非古者不得以戚戚君之意本朝王定國嘗言之欲令稱某王孫或曾孫或幾世孫有如越王派下則當云越王幾世孫如此則族屬易識且無戚君之嫌亦自好後來定國得罪反以此論為離間骨肉今宗室散無統紀名諱重疊字號都窮了更無安排處楊子直嘗欲用季宗趙丞相以為季是叔季意不好遂不用賀孫以下宗法宗子只得立適雖庶長立不得若無適子則亦立庶子所謂世子之同母弟世子是適若世子死則立世子之親弟亦是次適也是庶子不得立也本朝哲廟上仙哲廟弟有申王次端王次簡王乃哲廟親弟當時章厚欲立簡王是時向后猶在乃曰老身無子諸王皆云云當以次立申王目眇不足以視天下乃立端王是為徽宗章厚殊不知禮意同母弟便須皆是適子方可言既皆庶子安得不依次第今臣庶家要立宗也難只是宗室與襲封孔氏柴氏當立宗今孔氏柴氏襲封只是兄死弟繼只如而今門長一般大不是又曰今要立宗亦只在人有甚難處只是而今時節更做事不得柰何柰何如伊川當時要勿封孔氏要將朝廷所賜田五百頃一處給作一奉聖鄉而呂原明便以為不可不知如何漢世諸王無子國除不是都無子只是無適子便除其國不知是如何恐只是漢世不柰諸侯王何幸因他如此便除了國賀孫余正甫前日堅說一國一宗某云一家有大宗有小宗如何一國卻一人渠高聲抗爭某檢本與之看方得口合賀孫大宗法既立不得亦當立小宗法祭自高祖以下親盡則請出高祖就伯叔位服未盡者祭之泽則別處令其子私祭之今世禮全亂了揚祭祀須是用宗子法方不亂不然前面必有不可處置者揚呂與叔謂合族當立一空堂逐宗逐番祭亦杜撰也揚父在主祭子出仕宦不得祭父沒宗子主祭庶子出仕宦祭時其禮亦合減殺不得同宗子揚宗子法雖宗子庶子孫死亦許其子孫別立廟揚古者宗法有南宮北宮便是不分財也須異爨今若同爨固好只是少間人多了又卻不齊整又不如異爨問陸子靜家有百餘人喫飯曰近得他書已自別架屋便也是許多人無頓著處又曰見宋子蜚說廣西賀州有一人家共一大門門裏有兩廊皆是子房如學舍僧房每私房有人客來則自辦飲食引上大廳請尊長伴五盞後卻回私房別置酒恁地卻有宗子意亦是異爨見說其族甚大又曰陸子靜始初理會家法亦齊整諸父自做一處喫飯諸母自做一處喫飯諸子自做一處諸婦自做一處諸孫自做一處孫婦自做一處卑幼自做一處或問父子須異食否曰須是如此亦須待父母食畢然後可退而食問事母亦須然否曰須如此問有飲宴何如曰這須同處如大饗君臣亦同坐賀孫用之問祭用尸之意曰古人祭祀無不用尸非惟祭祀家先用尸祭外神亦用尸不知祭天地如何想惟此不敢為尸杜佑說古人用尸者蓋上古朴陋之禮至聖人時尚未改文蔚錄云是上古朴野之俗先王制禮是去不盡者相承用之至今世則風氣日開朴陋之禮已去不可復用去之方為禮而世之迂儒必欲復尸可謂愚矣杜佑之說如此今蠻夷猺洞中有尸之遺意每遇祭祀鬼神時必請鄉之魁梧姿美者為尸而一鄉之人相率以拜祭為之尸者語話醉飽每遇歲時為尸者必連日醉飽此皆古之遺意嘗見崇安余宰邵武人說他之鄉里有一村名密溪去邵武數十里此村中有數十家事所謂中王之神甚謹所謂中王者每歲以序輪一家之長一人為中王周而復始凡祭祀祈禱必請中王坐而祠之歲終則一鄉之父老合樂置酒請新舊中王者講交代之禮此人既為中王則一歲家居寡出恭謹畏慎略不敢為非以副一村祈向之意若此村或有水旱災沴則人皆歸咎於中王以不善為中王之所致此等意思皆古之遺聞近來數年此禮已廢矣看來古人用尸自有深意非朴陋也陳丈云蓋不敢死其親之意曰然用之云祭祀之禮酒肴豐潔必誠必敬所以望神之降臨乃歆嚮其飲食也若立之尸則為尸者既已享其飲食鬼神豈復來享之如此卻為不誠矣曰此所以為盡其誠也蓋子孫既是祖宗相傳一氣下來氣類固已感格而其語言飲食若其祖考之在焉則有以慰其孝子順孫之思而非恍惚無形想象不及之可比矣古人用尸之意所以深遠而盡誠蓋為是耳今人祭祀但能盡誠其祖考猶來格況既是他親子孫則其來格也益速矣因言今世鬼神之附著生人而說話者甚多亦有祖先降神於其子孫者又如今之師巫亦有降神者蓋皆其氣類之相感所以神附著之也周禮祭墓則以墓人為尸亦是此意子蒙以下尸古人用尸本與死者是一氣又以生人精神去交感他那精神是會附著歆享杜佑說古人質朴立尸為非禮今蠻夷中猶有用尸者李堯卿問今祭欲用尸如何曰古者男女皆有尸自周以來不見說有女尸想是漸次廢了這箇也嶢崎古者君迎尸在廟門之外則全臣子之禮在廟門之內則君拜之杜佑說上古時中國但與夷狄一般後出聖人改之有未盡者尸其一也蓋今蠻洞中猶有此但擇美丈夫為之不問族類事見杜佑所作理道要訣末篇義剛古者立尸必隔一位孫可以為祖尸子不可以為父尸以昭穆不可亂也義剛或問古人祫祭時每位有尸否曰固是周家旅酬六尸是每位皆一尸也古者主人獻尸尸酢主人開元禮猶如此每獻一位畢則尸便酢主人受酢已又獻第二位不知甚時緣甚事後廢了到本朝都把這樣禮數併省了問設尸法如何曰每一神位是一尸但不知設尸時主頓在何處祭時尸自食其物若獻罷則尸復勸主人而凡行禮等人與祭事者皆得食當初獻時尚自齊整至三獻後人皆醉了想見勞攘先生說至此笑曰便是古人之禮也不可曉所以夫子說禘自既灌則不欲觀想只是灌時有些誠意且如祭祖自始祖外皆旅酬如此自是不解嚴肅如大夫雖無灌禮然亦只是其初祭時齊整後面自勞攘今按此條亦為後世言之耳若是古祭祀自始至終一於誠敬無不嚴肅讀者不可泥也義剛或問妣有尸否曰一處說無尸又有一處說有男尸有女尸亦不知廢於甚時古者不用尸則有陰厭書儀中所謂闔門垂簾是也欲使神靈厭飫之也廣男用男尸女用女尸隨祖先數目列祭若其家止有一人全無骨肉子孫之類又不知如何程先生言古人之用尸也質意謂今不用亦得揚神主之位東向尸在神主之北銖問山川之尸曰儀禮周公祭太山以召公為尸義剛問祭五祀皆有尸祀灶則以誰為尸曰今亦無可考者但如墓祭則以塚人為尸以此推之則祀灶之尸恐是膳夫之類祀門之尸恐是閽人之類又如祀山川則是虞衡之類問尸之坐立曰夏立尸商坐尸周旅酬六尸后稷之尸不旅酬問祭妣之尸曰婦人不立尸卻有明文又曰古者以先王衣服藏之廟中臨祭則出以衣尸如后稷之衣到周時恐已不在亦不可曉儒用問程氏主式士人家可用否曰他云已是殺諸侯之制士人家用牌子曰牌子式當如何曰溫公用大板子今但依程氏古式而勿陷其中可也淳以下主式伊川木主制度其剡刻開竅處皆有陰陽之數存焉信乎其有制禮作樂之具也方伊川制士庶不用主只用牌子看來牌子當如主制只不消做二片相合及竅其旁以通中賀孫問庶人家亦可用主否曰用亦不妨且如今人未仕只用牌子到仕後不中換了若是士人只用主亦無大利害又問祧主當如何曰當埋之於墓其餘祭儀諸家祭禮已備具矣如欲行之可自仔細考過堯卿問士牌子式曰晉人制長一尺二分博四寸五分亦太大不如只依程主外式然其題則不能如陷中之多矣義剛直卿問神主牌先生夜來說荀勗禮未終曰溫公所製牌闊四寸厚五寸八分錯了據隋煬帝所編禮書有一篇荀勗禮乃是云闊四寸厚五寸八分大書某人神座不然只小楷書亦得後人相承誤了卻作五寸八分為一句義剛無爵曰府君夫人漢人碑已有只是尊神之辭府君如官府之君或謂之明府今人亦謂父為家府義剛淳同古人祭禮次喪禮蓋謂從那始作重時重用木司馬儀用帛用做那祭底道理來後來人卻移祭禮在喪之前不曉這箇意思植以下論家祭安卿問人於其親始死則復其魂魄又為重為主節次尊祭所以聚其精神使之不散若親死而其子幼稚或在他鄉不得盡其萃聚之事不知後日祭祀還更萃得他否曰自家精神自在這裏義剛問祭禮古今事體不同行之多窒礙如何曰有何難行但以誠敬為主其他儀則隨家豐約如一羹一飯皆可自盡其誠若溫公書儀所說堂室等處貧家自無許多所在如何要行得據某看來苟有作者興禮樂必有簡而易行之理賀孫今之冠昏禮易行喪祭禮繁多所以難行使聖人復出亦必理會教簡要易行今之祭禮豈得是古人禮唐世三獻官隨獻各自飲福受胙至本朝便都只三獻後方始飲福受胙也是覺見繁了故如此某之祭禮不成書只是將司馬公者減卻幾處如今人飲食如何得恁地多橫渠說墓祭非古又自撰墓祭禮即是周禮上自有了賀孫古禮於今實是難行當祭之時獻神處少只祝酌奠卒祝迎尸以後都是人自食了主人獻尸尸又酢主人酢主婦酢祝及佐食宰贊眾賓等交相勸酬甚繁且久所以季氏之祭至於繼之以燭竊謂後世有大聖人者作與他整理一過令人蘇醒必不一一如古人之繁但放古人大意簡而易行耳溫公儀人所憚行者只為閑辭多長篇浩瀚令人難讀其實行禮處無多某嘗修祭儀只就中間行禮處分作五六段甚簡易曉後被人竊去亡之矣淳李丈問祭儀更有修收否曰大概只是溫公儀無修改處楊通老問祭禮曰極難且如溫公所定者亦自費錢溫公祭儀庶羞麵食米食共十五品今須得一簡省之法方可璘問舊嘗收得先生一本祭儀時祭皆是卜日今聞卻用二至二分祭如何曰卜日無定慮有不虔溫公亦云只用分至亦可問如此則冬至祭始祖立春祭先祖季秋祭禰此三祭如何曰覺得此箇禮數太遠似有僭上之意又問禰祭如何曰此卻不妨廣問時祭用仲月清明之類或是先世忌日則如之何曰卻不思量到古人所以貴於卜日也過家祭須致齊當官者只得在告一日若沿檄他出令以次人代祭可也必大遇大時節請祖先祭於堂或廳上坐次亦如在廟時排定祔祭旁親者右丈夫左婦女坐以就裏為大凡祔於此者不從昭穆了只以男女左右大小分排在廟卻各從昭穆祔排祖先時以客位西邊為上高祖第一高祖母次之只是正排看正面不曾對排曾祖祖父皆然其中有伯叔伯叔母兄弟嫂婦無人主祭而我為祭者各以昭穆論如祔祭伯叔則祔於曾祖之傍一邊在位牌西邊安伯叔母則祔曾祖母東邊安兄弟嫂妻婦則祔於祖母之傍伊川云曾祖兄弟無主者亦不祭不知何所據而云伊川云只是以義起也揚古人祭祀只是席地今祭祀時須一椅一桌木主置椅上如一派排不足只相對坐亦得然對其前不得拜謂所在窄了須逐位取出酒就外酹揚祭只三獻主人初獻嫡子亞獻或主婦庶子弟終獻或嫡孫執祭人排列皆從溫公禮韓魏公禮不同揚賀孫錄云未有主婦則弟為亞獻弟婦得為終獻朔旦家廟用酒果望旦用茶重午中元九日之類皆名俗節大祭時每位用四味請出木主俗節小祭只就家廟止二味朔旦俗節酒止一上斟一盃揚問有田則祭無田則薦如何曰溫公祭禮甚大今亦只是薦然古人薦用首月祭用仲月朝廷卻用首月揚諸家禮皆云薦新用朔朔新如何得合但有新即薦於廟揚溫公書儀以香代爇蕭楊子直不用以為香只是佛家用之義剛問酹酒是少傾是盡傾曰降神是盡傾然溫公儀降神一節亦似僭禮大夫無灌獻亦無爇蕭灌獻爇蕭乃天子諸侯禮爇蕭欲以通陽氣今太廟亦用之或以為焚香可當爇蕭然焚香乃道家以此物氣味香而供養神明非爇蕭之比也義剛飲福受酢即尸酢主人之事無尸者則有陰厭陽厭旅酬從下面勸上下至直罍洗者皆得與獻酬之數方子問生時男女異席祭祀亦合異席今夫婦同席如何曰夫婦同牢而食文蔚夫祭妻亦當拜義剛先生每祭不燒紙亦不曾用帛先生家祭享不用紙錢凡遇四仲時祭隔日滌椅桌嚴辦次日侵晨已行事畢過問祭祀焚幣如何曰祀天神則焚幣祀人鬼則瘞幣人家祭祀之禮要焚幣亦無稽考處若是以尋常焚真衣之類為是便不當只焚真衣著事事做去焚但無意義只是焚黃若本無官方贈初品及贈到改服色處尋常人家做去焚然亦無義耳或問祖宗非士人而子孫欲變其家風以禮祭之祖宗不曉卻如何曰如何議論得恁地差異公曉得不曉得淳錄云公曉得祖先便曉得義剛人家族眾不分合祭或主祭者不可以祭及叔伯之類則須令其嗣子別得祭之今且說同居同出於曾祖便有從兄弟及再從兄弟了祭時主於主祭者其他或子不得祭其父母若恁地滾做一處祭不得要好當主祭之嫡孫當一日祭其曾祖及祖及父餘子孫與祭次日卻令次位子孫自祭其祖及父又次日卻令又次位子孫自祭其祖及父此卻有古宗法意古今祭禮這般處皆有之某後來更討得幾家要入未得如今要知宗法祭祀之禮須是在上之人先就宗室及世族家行了做箇樣子方可使以下士大夫行之賀孫以下主祭某自十四歲而孤十六而免喪是時祭祀只依家中舊禮禮文雖未備卻甚齊整先妣執祭事甚虔及某年十七八方考訂得諸家禮禮文稍備是時因思古人有八十歲躬祭事拜跪如禮者常自期以為年至此時當亦能如此在禮雖有七十曰老而傳則祭祀不預之說然亦自期儻年至此必不敢不自親其事然自去年來拜跪已難至冬間益艱辛今年春間僅能立得住遂使人代拜今立亦不得了然七八十而不衰非特古人今人亦多有之不知某安得如此衰也僩問支子不祭曰不當祭問橫渠有季父之喪三廢時祀卻令竹監弟為之緣竹監在官無持喪之專如此則支子亦祭曰這便是橫渠有礙處只得不祭因說古人持喪端的是持喪如不食粥淳問士祭服曰應舉者用襴衫机頭不應舉者用皂衫机頭問皂衫帽子如何曰亦可然亦只當敘衫中間朝廷一番行冠帶後卻自朝官先廢了崇觀間莆人朱給事子入京父令過錢塘謁故人某大卿初見以衫帽及宴亦衫帽用大樂酒一行樂一作主人先釂遂兩手捧盞側勸客客亦釂主人捧盞不移義剛錄云依舊側盞不移至樂罷而後下及五盞歇坐請解衫帶著背子不脫帽以終席來歸語其父父曰我所以令汝謁見者欲汝觀前輩禮儀也此亦可見前輩風俗今士大夫殊無有衫帽者嘗有某人作郡作衫帽之禮監司不喜以他故按之淳義剛同士祭服叔器問士庶當祭幾代曰古時一代即有一廟其禮甚多今於禮制大段虧缺而士庶皆無廟但溫公禮祭三代伊川祭自高祖始疑其過要之既無廟又於禮煞缺祭四代亦無害義剛問東坡小宗之說如何曰便是祭四代蓋自己成一代說起仲蔚問郵表畷不知為何神曰卻不曾子細考東坡以為猶如戲又問中霤是何處曰上世人居土屋中間開一天窗此便是中霤後人易為屋不忘古制相承亦有中霤之名今之中霤但當於室中祭之張以道問蜡便是臘否曰模樣臘自是臘蜡自是蜡義剛曰臘之名至秦方有義剛以下論士祭世數問天子七廟諸侯五廟大夫三廟士二廟官師一廟若只是一廟只祭得父母更不及祖矣無乃不盡人情曰位卑則流澤淺其理自然如此文蔚曰今雖士庶人家亦祭三代如此卻是違禮曰雖祭三代卻無廟亦不可謂之僭古之所謂廟者其體面甚大皆是門堂寢室勝如所居之宮非如今人但以室為之文蔚問祭禮曰古禮難行且依溫公擇其可行者行之祭土地只用韓公所編祇一位祭祖自高祖而下如伊川所論古者祇祭考妣溫公祭自曾祖而下伊川以高祖有服所當祭今見於遺書者甚詳此古禮所無創自伊川所以使人盡孝敬追遠之義驤問遺書云尋常祭及高祖曰天子則以周人言上有太祖二祧大夫則於祫及其高祖可學堯卿問始祖之祭曰古無此伊川以義起某當初也祭後來覺得僭遂不敢祭古者諸侯只得祭始封之君以上不敢祭大夫有大功則請於天子得祭其高祖然亦止得祭一番常時不敢祭程先生亦云人必祭高祖只是有疏數耳又問今士庶亦有始基之祖莫亦只祭得四代但四代以上則可不祭否曰如今祭四代已為僭古者官師亦只得祭二代若是始基之祖莫亦只存得墓祭義剛以下祭始祖先祖余正父謂士大夫不得祭始祖此天子諸侯之禮若士大夫當祭則自古無明文又云大夫自無太祖先生因舉春秋如單氏尹氏王朝之大夫自上世至後世皆不變其初來姓號則必有太祖又如季氏之徒世世不改其號則亦必有太祖余正父謂此春秋時自是世卿不由天子都沒理會先生云非獨是春秋時如詩裏說南仲太祖太師皇父南仲是文王時人到宣王時為太祖不知古者世祿不世官之說如何又如周公之後伯禽已受封於魯而周家世有周公如春秋云宰周公這般所在自曉未得賀孫問冬至祭始祖是何祖曰或謂受姓之祖如蔡氏則蔡叔之類或謂厥初生民之祖如盤古之類曰立春祭先祖則何祖曰自始祖下之第二世及己身以上第六世之祖曰何以只設二位曰此只是以意享之而已淳李問至日始祖之祭初獻事曰家中尋常只作一番安排想古人也不恁地卻有三奠酒或有脯醢之屬因三奠中進遂問始祖是隨一姓有一始祖或只是一始祖曰此事亦不可得而見想開闢之時只是生一箇人出來淳略用之問先生祭禮立春祭高祖而上只設二位若古人祫祭須是逐位祭曰某只是依伊川說伊川禮更略伊川所定不是成書溫公儀卻是做成了賀孫伊川時祭止於高祖高祖而上則於立春設二位統祭之而不用主此說是也卻又云祖又豈可厭多苟其可知者無遠近多少須當盡祭之疑是初時未曾討論故有此說道夫問祭先祖用一分如何曰只是一氣若影堂中各有牌子則不可可學家廟之制伊川只以元妃配享蓋古者只是以媵妾繼室故不容與嫡並配後世繼室乃是以禮聘娶自得為正故唐會要中載顏魯公家祭有並配之儀必大以下配祭古人無再娶之禮娶時便有一副當人了嫡庶之分定矣故繼室於正室不可並配今人雖再娶然皆以禮聘皆正室也祭於別室恐未安如伊川云奉祀之人是再娶所生則以所生母配如此則是嫡母不得祭矣此尤恐未安大抵伊川考禮文卻不似橫渠考得較仔細伯羽砥同居父問祖妣配祭之禮先生檢古今祭禮唐元和一段示之賀孫妣者媲也祭所生母只當稱母則略有別砥祭生母無後之祭伊川說在古今家祭禮中閎祖以下祭無後者問無後祔食之位曰古人祭於東西廂今人家無東西廂某家只位於堂之兩邊祭食則一但正位三獻畢然後使人分獻一酌而已如今學中從祀然義剛李守約問祭殤幾代而止曰禮經無所見只程氏遺書一段說此亦是以義起義剛祭殤一之問長兄死有義嫂無子不持服歸父母未幾亦死於父母家嫂已去而無義亦不祀其嫂之主又有次兄年少未娶而死欲以二兄之主同為一櫝如何曰兄在日不去嫂兄死後嫂雖歸父母家又不嫁未得為絕不祀亦無謂若然是弟自去其嫂也兄弟亦何必同櫝乎淳以下雜論堯卿問荊婦有所生母在家間養百歲後只歸祔於外氏之塋如何曰亦可又問神主歸於婦家則婦家凌替欲祀於家之別室如何曰不便北人風俗如此上谷郡君謂伊川曰今日為我祀父母明日不復祀矣是亦祀其外家也然無禮經義剛叔器問行正禮則俗節之祭如何曰韓魏公處得好謂之節祠殺於正祭某家依而行之但七月十五素饌用浮屠某不用耳向南軒廢俗節之祭某問於端午能不食粽乎重陽能不飲茱萸酒乎不祭而自享於汝安乎淳義剛同以下俗祭問行時祭則俗節如何曰某家且兩存之童問莫簡於時祭否曰是要得不行須是自家亦不飲酒始得淳先生依婺源舊俗歲暮二十六日烹豕一祭家先就中堂二鼓行禮次日召諸生餕李丈問曰夜來之祭飲福受胙否曰亦不講此婺源俗豕必方切大塊首蹄肝肺心腸肚尾腎等每件逐位皆均有亦炙肉及以魚佐之云是日甚忌有器皿之設淳先生以歲前二十六夜祭先云是家間從來如此這又不是新安舊俗某嘗在新安見祭享又不同只都安排了大男小女都不敢近夜亦不舉燭只黑地主祭一人自去燒香禱祝了祭饌不徹閉戶以待來早方徹其祭不止一日從二十六日連日只祭去大綱如今俗所謂喚福賀孫問先生除夜有祭否曰無祭先生有五祀之祭否曰不祭因說五祀皆設主而後迎尸其詳見月令注與宗廟一般遂舉先生語解中王孫賈一段先生曰當初因讀月令注方知王孫賈所問奧灶之說淳墓祭非古雖周禮有墓人為尸之文或是初間祭后土亦未可知但今風俗皆然亦無大害國家不免亦十月上陵淳以下墓祭問墓祭有儀否曰也無儀大概略如家祭唐人亦不見有祭但是拜掃而已林擇之云唐有墓祭通典載得在曰卻不曾考或問墓祭祭后土否曰就墓外設位而祭義剛淳少異問后土氏之祭曰極而言之亦似僭然此即古人中霤之祭而今之所謂土地者郊特牲取財於地取法於天是以尊天而親地教民美報焉故家主中霤而國主社觀此則天不可祭而土神在民亦可祭蓋自上古陶為土室其當中處上為一竅以通明名之曰中霤及中古有宮室亦以室之中央為中霤存古之舊示不忘本雖曰土神而只以小者言之非如天子所謂祭皇天后土之大者也義剛同古無忌祭近日諸先生方考及此賀孫以下忌祭問忌日當哭否曰若是哀來時自當哭又問衣服之制曰某自有弔服絹衫絹巾忌日則服之廣忌日須用墨衣墨冠橫渠卻視祖先遠近為等差墨布冠墨布繒衣銖先生母夫人忌日著縿墨布衫其巾亦然友仁問今日服色何謂曰公豈不聞君子有終身之喪友仁忌日祭只祭一位燾過每論士大夫家忌日用浮屠誦經追薦鄙俚可怪既無此理是使其先不血食也乙卯年見先生家凡值遠諱早起出主於中堂行三獻之禮一家固自蔬食其祭祀食物則以待賓客考妣諱日祭罷裹生絹幓巾終日一日晚到閣下尚裹白巾未除因答問者云聞內弟程允夫之訃過先生為無後叔祖忌祭未祭之前不見客賀孫同人在旅中遇有私忌於所舍設桌炷香可否曰這般微細處古人也不曾說若是無大礙於義理行之亦無害燾元德同
