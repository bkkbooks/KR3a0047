body:
  text: 朱子語類卷七十二易八咸否㤗咸恒損益既濟未濟此八卦首尾皆是一義如咸皆是感動之義之類咸内卦艮止也何以皆説動曰艮雖是止然咸有交感之義都是要動所以都說動卦體雖是動然才動便不吉動之所以不吉者以内卦属艮也僴咸就人身取象看來便也是有些取象説咸上一畫如人口中三畫有腹背之象下有人脚之象艮就人身取象便也似如此上一陽畫有頭之象中二隂有口之象所以艮其輔扵五爻言之内卦以下亦有足象礪問本義以為柔上剛下乃自旅來旅之六五上而為咸之上六旅之上九下而為咸之九五此謂柔上剛下與程傳不同先生問所以不同何也銖曰易中自有卦變耳曰須知程子説有不通處必著如卦變説方見得下落此等䖏當録出看銖山上有澤咸當如伊川說水潤土燥有受之義又曰土若不虚如何受得又曰上兊下艮兊上缺有澤口之象兊下二陽畫有澤底之象艮上一畫陽有土之象下二隂畫中虚便是渗水之象礪問君子以虚受人伊川注云以量而容之擇交而受之以量莫是要著意容之否曰非也以量者乃是随我量之大小以容人便是不虚了又問貞吉悔亡易傳云貞者虚中無我之謂本義云貞者正而固不同何也曰某尋常觧經只要依訓詁説字如貞字作正而固仔細玩索自有滋味若曉得正而固則虚中無我亦在裏靣又問憧憧往來朋從爾思莫是此感彼應憧憧是添一箇心否曰往來固是感應憧憧是一心方欲感他一心又欲他來應如正其義便欲謀其利明其道便欲計其功又如赤子入井之時此心方怵惕要去救他又欲他父母道我好這便是憧憧底病僴厚之問憧憧往來朋從爾思曰往來自不妨天地間自是往來不絶只不合著憧憧了便是私意德明錄云如暑往寒來日往月來皆是常理只著个憧憧字便閙了又問明道云莫若廓然而大公物來而順應如何曰廓然大公便不是憧憧物來順應便不是朋從爾思此只是比而不周周而不比之意這一段舊看易惑人近來看得節目極分明可學往來是感應合當底憧憧是私感應自是當有只是不當私感應耳淵憧憧往來朋從爾思聖人未嘗不教人思只是不可憧憧這便是私了感應自有箇自然底道理何必思他若是義理却不可不思淵問咸傳之九四説虛心貞一處全似敬曰盖嘗有語曰敬心之貞也方易傳言感應之理咸九四盡矣方問伊川觧屈伸往來一段以屈伸為感應屈伸之與感應若不相似何也曰屈則感伸伸則感屈自然之理也今以鼻息觀之出則必入出感入也入則必出入感出也故曰感則有應應復為感所感復有應屈伸非感應而何洽或問易傳說感應之理曰如日往則感得那月來月往則感得那日來寒往則感得那暑來暑往則感得那寒來一感一應一往一來其理無窮感應之理是如此曰此以感應之理言之非有情者云有動皆為感似以有情者言曰父慈則感得那子愈孝子孝則感得那父愈慈其理亦只一般文蔚問易傳言有感必有應是如何曰凡在天地間無非感應之理造化與人事皆是且如雨暘雨不成只管雨便感得箇暘出來暘不成只管暘暘已是應處又感得雨來是感則必有應所應復為感寒暑晝夜無非此理如人夜睡不成只管睡至曉須著起來一日運動向晦亦須當息凡一死一生一出一入一往一來一語一黙皆是感應中人之性半善半惡有善則有惡古今天下一盛必有一衰聖人在上兢兢業業必日保治及到衰廢自是整頓不起終不成一向如此必有興起時節唐貞觀之治可謂甚盛至中間武后出來作壞一畨自恁地塌塌底去至五代衰微極矣國之紀綱國之人才舉無一足恃一旦聖人勃興轉動一世天地為之豁開仁宗時天下稱太平眼雖不得見想見是太平然當時灾異亦數有之所以馴至後來之變亦是感應之常如此又問感應之理扵學者工夫有用䖏否曰此理無乎不在如何學者用不得精義入神以致用也利用安身以崇德也亦是這道理研精義理扵内所以致用扵外利用安身扵外所以崇德扵内横渠此處説得更好精義入神事豫吾内求利吾外利用安身素利吾外致飬吾内此㡬句親切正學者用功處㝢林一之問凡有動皆為感感則必有應曰如風來是感樹動便是應樹拽又是感下靣物動又是應如晝極必感得夜來夜極又便感得晝來曰感便有善惡否曰自是有善惡曰何謂心無私主則有感皆通曰心無私主不是溟涬沒理㑹也只是公善則好之惡則惡之善則賞之惡則刑之此是聖人至神之化心無私主如天地一般寒則徧天下皆寒熱則徧天下皆熱便是有感皆通曰心無私主最難曰只是克去已私便心無私主若心有私主只是相契者應不相契者則不應如好讀書人見讀書便愛不好讀書人見書便不愛淳器之問程子説感通之理曰如晝而夜夜而復晝循環不窮所謂一動一静互為其根皆是感通之理木之問所謂天下之理無獨必有對便是這話否曰便是天下事那件無對来隂與陽對動與静對一物便與一理對君可謂尊矣便與民為對人説碁盤中間一路無對某說道便與許多路為對因舉寒往則暑來暑往則寒來與屈伸消長之説邵氏擊壤集云上下四方謂之宇古往今來謂之宙因說易咸感處伊川說得未備往來自還他有自然之理惟正静為主則吉而悔亡至扵憧憧則私為主而思慮之所及者朋從所不及者不朋從矣是以事未至則迎之事已過則將之全掉脱不下今人皆病扵無公平之心所以事物之來少有私意雜焉則陷扵所偏重矣木之趙致道問感通之理曰感是事來感我通是自家受他感處之意時舉問程子說感應在學者日用言之則何如曰只因這一件事又生出一件事便是感與應因第二件事又生出第三件事第二件事又是感第三件事又是應如王文正公平生儉約家無姬妾自東封後真宗以太平宜共享令直省官為買妾公不樂有沈倫家鬻銀器花藍火筒之屬公嚬蹙曰吾家安用此其後姬妾既具乃復呼直省官求前日沈氏銀器而用之此買妾底便是感買銀器底便是應淳繫辭觧咸九四據爻義看上文説貞吉悔亡貞字甚重程子謂聖人感天下如雨暘寒暑無不通無不應者貞而已矣所以感人者果貞矣則吉而悔亡盖天下本無二理果同歸矣何患乎殊塗果一致矣何患乎百慮所以重言何思何慮也如日月寒暑之往來皆是自然感應如此日不往則月不來月不往則日不來寒暑亦然往來只是一般往來但憧憧之往來者患得患失既要感這箇又要感那箇便自憧憧忙亂用其私心而已屈伸相感而利生焉者有晝必有夜設使長長為晝而不夜則何以息夜而不晝安得有此光明春氣固是和好只有春夏而無秋冬則物何以成一向秋冬而無春夏又何以生屈伸往來之理所以必待迭相為用而後利所由生春秋冬夏只是一箇感應所應復為感所感復為應也春夏是一箇大感秋冬則必應之而秋冬又為春夏之感以細言之則春為夏之感夏則應春而又為秋之感秋為冬之感冬則應秋而又為春之感所以不窮也尺蠖不屈則不可以伸龍蛇不蟄則不可以藏身今山林冬暖而蛇出者往往多死此即屈伸往來感應必然之理夫子因往來兩字説得許多大又推以言學所以内外交相養亦只是此理而已横渠曰事豫吾内求利吾外素利吾外致飬吾内此下學所當致力處過此以上則不容計功所謂窮神知化乃飬盛自至非思勉所及此則聖人事矣謨或說貞吉悔亡憧憧往來朋從爾思云一往一來皆感應之常理也加憧憧焉則私矣此以私感彼以私應所謂朋從爾私非有感必通之道矣先生然之又問往來是心中憧憧然往來猶言往來扵懐否曰非也下文分明説日往則月來月往則日來寒往則暑來暑往則寒來安得為心中之往來伊川說微倒了所以致人疑一往一來感應之常理也自然如此又問是憧憧扵往來之間否曰亦非也這箇只是對那日往則月來底説那箇是自然之往來此憧憧者是加私意不好底往來憧憧只是加一箇忙廹底心不䏻順自然之理猶言助長正心與計獲相似方往時又便要來方來時又便要往只是一箇忙又曰方做去時是往後靣來底是來如人耕種下種是往少間禾生是來問憧憧往來如伯者以私心感人便要人應自然往來如王者我感之也無心而感其應我也無心而應周徧公溥無所私便是如此否曰也是如此又問此以私而感恐彼之應者非以私而應只是應之者有限量否曰也是以私而應如自家以私惠及人少間被我之惠者則以我為恩不被我之惠者則不以我為恩矣王者之感如云王用三驅失前禽去者不以為恩獲者不以為怨如此方是公正無私心又問天下何思何慮人固不能無思慮只是不可加私心欲其如此否曰也不曾教人不得思慮只是道理自然如此感應之理本不消思慮空費思量空費計較空費安排都是枉了無益扵事只順其自然而已因問某人在位當日之失便是如此不能公平其他翕受敷施毎廣坐中見有這邉人即加敬與語其他皆不顧以至差遣之屬亦有所偏重此其所以收怨而召禍也曰這事便是難說今只是以成敗論人不知當日事勢有難處者若論大勢則九分九釐須還時節或其人見識之深淺力量之廣狹病却在此以此而論却不是前軰有云牢籠之事吾不為也若必欲人人靣分上說一般話或慮其人不好他日或為吾患遂委曲牢籠之此却是憧憧往來之心與人說話或偶然與這人話未終因而不暇及其他如何逐人靣分問勞他得李文靖為相嚴毅端重毎見人不交一談或有諫之者公曰吾見豪俊跅弛之士其議論尚不足以起發人意今所謂通家子弟毎見我語言進退之間尚周章失措此等有何識見而足與語徒亂人意耳王文正吕文穆皆如此不害為賢相豈必人人皆與之語耶宰相只是一箇進賢退不肖若著一毫私心便不得前軰嘗言做宰相只要辦一片心辦一䨇眼心公則能進賢退不肖眼眀則能識得那箇是賢那箇是不肖此兩言說盡做宰相之道只怕其所好者未必真賢其所惡者未必真不肖耳若真箇知得更何用牢籠且天下之大人才之衆可人人牢籠之耶或問如一様小人渉歴既多又未有過失自家明知其不肖将安所措之曰只恐居其位不乆若乆少間此等小人自然退聽不容他出來也今之為相者朝夕疲精神扵應接書簡之間更何暇理㑹國事世俗之論遂以此為相業然只是牢籠人住在那裏今日一見明日一請或住半年周嵗或住数月必不得已而後與之其人亦以為宰相之顧我厚令我得好差遣而去賢愚同滯舉世以為當然有一人焉畧欲分别善惡杜絶干請分諸闕扵部中已得以免應接之煩稍留心國事則人争非之矣且以當日所用之才觀之固未能皆賢然比之今日為如何今日之謗議者皆昔之遭擯棄之人也其論固何足信此下逸兩句若牢籠得一人則所謂小人者豈止此一人與一人則千百皆怨矣且吾欲牢籠之能保其終不畔已否已往之事可以鍳矣如公之言却是憧憧往來之心也其人之失處却不在此却是他未䏻真知賢不肖之分耳或曰如某人者也有文采也廉潔豈可棄之耶曰公欲取賢才耶取文采耶且其亷一已之事耳何足以救其利口覆邦家之禍哉今世之人見識一例低矮所論皆卑某嘗説須是盡吐瀉出那肚裏許多鏖糟惡濁底見識方畧有進處譬如人病傷寒在上則吐在下則瀉如此方得病除或曰近日諸公多有為持平之說者如何曰所謂近時惡濁之論此是也不成議論某嘗說此所謂平者乃大不平也不知怎生平得僴問張文定說元祐某人建議欲為調停之說者云但能内君子而外小人天下自治何必深治之哉此能體天理人欲者也此語亦似持平之論如何曰文定未必有此論然小人亦有数般様若一様可用底也須用或有事勢危急翻轉後其禍不測或只得隠忍權以濟一時之急耳然終非常法也明道當初之意便是如此欲使諸公用熈豐執政之人與之共事令變熈豐之法或他日事翻則其罪不獨在我他正是要使術然亦拙謀諺所謂掩目捕雀我却不見雀不知雀却看見我你欲以此術制他不知他之術更髙你在所以後來温公留章子厚欲與之共變新法卒至簾前悖詈得罪而去章忿呌曰他日不能陪相公喫劍得便至如此無可平之理盡是拙謀某嘗說今世之士所謂巧者是大拙無有能以巧而濟者都是枉了空費心力只有一箇公平正大行將去其濟不濟天也古人間有如此用術而成者都是偶然不是他有意智要之都不消如此決定無益張子房號為有意智者以今觀之可謂甚踈如勸帝與項羽和而反兵伐之此成甚意智只是他命好使一畨了第二畨又被他使得勝又曰古人做得成者不是他有智只是偶然只有一箇正其誼不謀其利明其道不計其功其他費心費力用智用數牢籠計較都不濟事都是枉了又曰本朝以前宰相見百官皆以班見國忌拈香歸來回班以見宰相見時有刻數不知過幾刻便喝相公尊重用屏風攔斷也是省事攔截了㡬多干請私曲底事某舊見陳魏公湯進之為相時那時猶無甚人相見毎見不過五六人十数人他也随官之崇卑做兩畨請今則不勝其多為宰相者毎日只了得應接更無心理㑹國事如此者謂之有相業有精神秦㑹之也是㑹做嚴毅尊重不妄發一談其答人書只是数字今宰相荅人書剗地闕詳盡人皆翕然稱之只是不曾見已前事只見後來習俗遂以為例其有不然者便羣起非之矣温公作相日有一客位榜分作三項云訪及諸君若覩朝政闕遺庻民疾苦欲進忠言請以奏牘聞扵朝廷某得與同僚商議擇可行者取㫖行之若但以私書寵喻終無所益若光身有過失欲賜規正則可以通書簡分付吏人傳入光得内自省訟佩服改行至扵理㑹官職差遣理雪罪名凡干身計並請一靣進状光得與朝省衆官公議施行若在私第垂訪不請語及此皆前軰做處又曰伊川云狥俗雷同不喚做随時惟􅃊毅特立乃随時也而今人見識低只是狥流俗之論流俗之論便以為是是可歎也公們只是見那向時不得差遣底人説他自是怨他若教公去做看方見得難且如有兩人焉自家平日以一人為賢一人為不肖若自家執政定不肯捨其賢而舉其不肖定是舉其賢而捨其不肖若舉此一人則彼一人怨必矣如何盡要他説好得只怕自家自認不破賢者却以為不肖不肖者却以為賢如此則乖若認得定何害又有一様人底半間不界可進可退自家却以此為賢以彼為不肖此尤難認便是難又曰舜有大功二十以其舉十六相而去四凶也若如公言却是舜有大罪二十矣僴問咸之九五傳曰感非其所見而說者此是任貞一之理則如此曰武王不泄邇不㤀逺是其心量該遍故周流如此是此義也方恒恒是箇一條物事徹頭徹尾不是尋常字古字作恒其說象一隻船兩頭靠岸可見徹頭徹尾植履之問常非一定之謂一定則不能恒矣曰物理之始終變易所以為恒而不窮然所謂不易者亦須有以變通乃能不窮如君尊臣卑分固不易然上下不交也不得父子固是親親然所謂命士以上父子皆異宫則又有變焉惟其如此所以為恒論其體則終是恒然體之常所以為用之變用之變乃所以為體之恒道夫恒非一定之謂故晝則必夜夜而復晝寒則必暑暑而復寒若一定則不能常也其在人冬日則飲湯夏日則飲水可以仕則仕可以止則止今日道合便從明日不合則去又如孟子辭齊王之金而受薛宋之餽皆随時變易故可以為常也道夫能常而後能變能常而不已所以能變及其變也常亦只在其中伊川却說變而後能常非是僴正便䏻乆天地之道恒乆而不已這箇只是說乆淵物各有箇情有箇人在此決定是有那羞惡惻隠是非辭讓之情性只是箇物事情却多般或起或滅然而頭靣却只一般長長恁地這便是觀其所恒而天地萬物之情可見之義乃若其情只是去情上面看淵叔重說浚恒貞凶恐是不安其常而深以常理求人之象程氏所謂守常而不能度勢之意固未見有不安其常之象只是欲深以常理求人耳時舉問恒其德貞婦人吉夫子凶徳指六謂常其柔順之徳固貞矣然此婦人之道非夫子之義盖婦人從一而終以順為正夫子則制義者也若從婦道則凶曰固是如此然須看得象占分明六五有恒其徳貞之象占者若婦人則吉夫子則凶大底看易須是曉得象占分明所謂吉凶者非爻之能吉凶爻有此象而占者視其徳而有吉凶耳且如此爻不是既為婦人又為夫子只是有恒其德貞之象而以占者之德為吉凶耳又如恒固能亨而無咎然必占者能乆扵其道方亨而無咎又如九三不恒其徳非是九三能不恒其德乃九三有此象耳占者遇此雖正亦吝若占者能恒其徳則無羞吝銖遯問遯卦遯字雖是逃隠大抵亦取逺去之意天上山下相去甚遼絶象之以君子逺小人則君子如天小人如山相絶之義須如此方得所以六爻在上漸逺者愈善也曰恁地推亦好此六爻皆是君子之事學履問遯亨遯而亨也分明是說能遯便亨下更說剛當位而應與時行也是如何曰此其所以遯而亨也隂方微為他剛當位而應所以能知時而遯是能與時行不然便是與時背也礪問小利貞浸而長也是見其浸長故設戒令其貞正且以寛君子之患然亦是他之福曰是如此此與否初二両爻義相似僴問小利貞以彖辭小利貞浸而長也之語觀之則小當為隂柔小人如小往大來小過小畜之小言君子能遯則亨小人則利扵守正不可以浸長之故而浸迫扵陽也此與程傳遯者隂之始長君子知微故當深戒而聖人之意未遽已故有與時行小利貞之教之意不同曰若如程傳所言則於剛當位而應與時行也之下當云止而健隂進而長故小利貞今但言小利貞浸而長也而不言隂進而長則小指隂小之小可知况當遯去之時事勢已有不容正之者程説雖善而有不通矣又問遯尾厲勿用有攸徃者言不可有所徃但當晦處静俟耳此意如何曰程傳作不可徃謂不可去也言遯已後矣不可徃徃則危徃既危不若不徃之為無灾某切以為不然遯而在後尾也既已危矣豈可更不徃乎若作占辭看尤分眀先生又言執之用黄牛之革莫之勝説此言象而占在其中六二亦有此徳也説吐活反九四君子吉小人否方九反銖伊川説小利貞云尚可以有為隂已浸長如何可以有為所説王允謝安之於漢晉恐也不然王允是筭殺了董卓謝安是乗桓温之老病皆是他衰㣲時節不是浸長之時也兼他是大臣亦如何去此為在下位有為之兆者則可以去大臣任國安危君在與在君亡與亡如何去又曰王允不合要盡殺涼州兵所以致敗礪遯尾厲到這時節去不迭了所以危厲不可有所徃只得看他如何賢人君子有這般底多淵問畜臣妾吉伊川云待臣妾之道君子之待小人亦不如是如何曰君子小人更不可相對更不可與相接若臣妾是終日在自家脚手頭若無以係之則望望然去矣又曰易中詳識物情備極人事都是實有此事今學者平日只在燈牕下習讀不曾應接世變一旦讀此皆看不得某舊時也如此即管讀得不相入所以常説易難讀礪問九五嘉遯以陽剛中正漸向遯極故為嘉美未是極處故戒以貞正則吉曰是如此便是剛當位而應處是去得恰好時節小人亦未嫌自家只是自家合去莫見小人不嫌却與相接而不去便是不好所以戒他貞正礪大壯問大壯大者正與正大不同上大字是指陽下正大是説理曰亦縁上面有大者正一句方説此學履大壯利貞利於正也所以大者以其正也既正且大則天地之情不過於此燾問雷在天上大壯君子以非禮弗履伊川云云其義是否曰固是君子之自治須是如雷在天上恁地威嚴猛烈方得若半上落下不如此猛烈果決濟得甚事僴或問伊川自勝者為强之説如何曰雷在天上是甚威嚴人之克已能如雷在天上則威嚴果決以去其惡而必於為善若半上落下則不濟事何以為君子須是如雷在天上方能克去非禮燾此卦如九二貞吉只是自守而不進九四藩決不羸壯于大輿之輹却是有可進之象此卦爻之好者盖以陽居隂不極其剛而前遇二隂有藩決之象所以為進非如九二前有三四二陽隔之不得進也又曰䘮羊于易不若作彊塲之易漢食貨志彊場之場正作昜盖後面有䘮羊于易亦同此義今本義所注只是從前所説如此只且仍舊耳上六取喻甚巧盖壯終動極無可去處如羝羊之角掛于藩上不能退遂然艱則吉者畢竟有可進之理但必艱始吉耳銖問大壯本好爻中所取却不好暌本不好爻中所取却好如六五對九二處非其位九四對上九本非相應都成好爻不知何故曰大壯便是過了才過便不好如睽卦之類却是易之取爻多為占者而言占法取變爻便是到此處變了所以困卦雖是不好然其間利用祭祀之属却好問此正與羣龍无首利永貞一般曰然却是變了故如此幹此卦多説羊羊是兌之属季通説這箇是夹住底兌卦兩畫當一畫淵晉康侯似説寜侯相似用錫馬之用只是箇虚字説他得這箇物事淵晝日是那上卦離也晝日為之是此意淵問初六晉如摧如象也貞吉占辭曰罔孚裕無咎又是解上兩句恐貞吉説不眀故又曉之又問受兹介福于其王母指六五以為享先妣之吉占何也曰恐是如此盖周禮有享先妣之禮又問衆允悔亡曰衆允象也悔亡占也又問晉其角維用伐邑本義作伐其私邑程傳以為自治如何曰便是程傳多不肯説實事皆以為取喻伐邑如墮費墮郈之類是也大抵今人説易多是見易中有此一語便以為通體事當如此不知當其時節地頭其人所占得者其象如何若果如今人所説則易之説有窮矣又如摧如愁如易中少有此字疑此爻必有此象但今不可曉耳銖晉六三如何見得為衆所信處既不中正衆方不信雖能信之又安能悔亡曰晉之時二隂皆欲上進三處地較近故二隂從之以進問如何得悔亡曰居非其位本當有悔以其得衆故悔可亡榦問六五悔亡失得勿恤徃吉無不利伊川以為六以柔居尊位本當有悔以大眀而下皆順附故其悔亡下既同徳順附當推誠委任盡衆人之才通天下之志勿復自任其眀恤其失得如此而徃則吉而無不利此説是否曰便是伊川説得太深據此爻只是占者占得此爻則不必恤其失得而自亦無所不利耳如何説得人君既得同徳之人而委任之不復恤其失得如此則蕩然無復是非而天下之事亂矣假使其所任之人或有作亂者亦将不恤之乎雖以堯舜之聖臯䕫益稷之賢猶云屢省乃成如何説既得同心同徳之人而任之則在上者一切不管而任其所為豈有此理且彼所為既失矣為上者如何不恤得聖人無此等説話聖人所説卦爻只是畧畧説過以為人當著此爻則大勢已好雖有所失得亦不必慮而自無所不利也聖人説得甚淺伊川説得太深聖人所説短伊川解得長久之又云失得勿恤只是自家自作教是莫管他得失如士人發解做官這箇却必不得只得盡其所當為者而已如仁人正其誼不謀其利眀其道不計其功相似僴失得勿恤此説失也不須問他得也不須問他自是好猶勝負兵家之常云爾此卦六爻無如此爻吉淵晉上九剛進之極以伐私邑安能吉而無咎曰以其剛故可伐邑若不剛則不能伐邑矣但易中言伐邑皆是用之於小若伐國則其用大矣如髙宗伐鬼方之類維用伐邑則不可用之於大可知雖用以伐邑然亦必能自危厲乃可以吉而无咎過剛而能危厲則不至於過剛矣榦看伯豐與廬陵問荅内晉卦伐邑説曰晉上九貞吝吝不在克治正以其克治之難而言其合下有此吝耳貞吝之義諸義只云貞固守此則吝不應於此獨云於正道為吝也㽦明夷眀夷未是説闇之主只是説眀而被傷者乃君子也上六方是説闇君子出門庭言君子去闇尚逺可以得其本心而逺去文王箕子大槩皆是晦其眀然文王外柔順是本分自然做底箕子晦其眀又云艱是他那佯狂底意思便是艱難底氣象爻説貞而不言艱者盖言箕子則艱可見不必更言之淵君子用晦而眀晦地象眀日象晦則是不察察若晦而不眀則晦得沒理㑹了故外晦而内必眀乃好學履眀夷初二二爻不取爻義曰初爻所傷地逺故雖傷而尚能飛問初爻比二爻似二爻傷得淺初爻傷得深曰非也初尚能飛但垂翼耳榦問眀夷曰下三爻皆説眀夷是眀而見傷者六四爻説者却以為是姦邪之臣先蠱惑其君心而後肆行於外殊不知上六是暗主六五却不作君説六四之與上六既非正應又不相比又况下三爻皆説眀夷是好底何獨此爻却作不好説故某於此爻之義未詳但以意觀之六四居暗地尚淺猶可以得意而逺去故雖入於幽隠之處猶能獲眀夷之心于出門庭也故小象曰獲心意也上六不眀晦則是合下已是不眀故初登于天可以照四國而不免後入于地則是始于傷人之眀而終于自傷以墜其命矣吕原眀以為唐眀皇可以當之盖言始眀而終暗也銖家人問家人彖辭不盡取象曰注中所以但取二五不及他象者但只因彖傳而言耳大抵彖傳取義最精象中所取却恐有假合處榦問風自火出曰謂如一爐火必有氣衝上去便是風自火出然此只是言自内及外之意燾學履録云是火中有風如一堆火在此氣自薰蒸上出王假有家言到這裏方且得許多物事有妻有妾方始成箇家淵問王假有家曰有家之有只是如夙夜浚眀有家亮采有邦之有謂有三徳者則夙夜浚眀於其家有六徳者則亮采於其邦有是虚字非如奄有四方之有也銖或問易傳云正家之道在於正倫理篤恩義今欲正倫理則有傷恩義欲篤恩義又有乖於倫理如何曰須是於正倫理處篤恩義篤恩義而不失倫理方可柄睽睽皆言始異終同之理淵問君子以同而異曰此是取兩象合體為同而其性各異在人則是和而不同之意盖其趨則同而所以為同則異如伯夷栁下恵伊尹三子所趨不同而其歸則一彖辭言睽而同大象言同而異在人則出處語黙雖不同而同歸於理講論文字為説不同而同於求合義理立朝論事所見不同而同於忠君本義所謂二卦合體者言同也而性不同者言異也以同而異語意與用晦而眀相似大凡讀易到精熟後顛倒説来皆合不然則是死説耳又問睽卦無正應而同徳相應者何曰無正應所以為睽當睽之時當合者既離其離者却合也銖問君子以同而異作理一分殊看如何曰理一分殊是理之自然如此這處又就人事之異上説盖君子有同處有異處如所謂周而不比羣而不黨是也大抵易中六十四象下句皆是就人事之近處説不必深去求他此處伊川説得甚好學履過舉程子睽之象君子以同而異解曰不能大同者亂常咈理之人也不能獨異者隨俗習非之人也要在同而能異爾又如今之言地理者必欲擇地之吉是同也不似世俗専以求富貴為事惑亂此心則異矣如士人應科舉則同也不曲學以阿世則異矣事事推去斯得其㫖過馬是行底物初間行不得後来却行得大率睽之諸爻都如此多説先異而後同淵問睽見惡人其義何取曰以其當睽之時故須見惡人乃能无咎榦天合作而剃鬚也篆文天作丙而作而淵宗如同人于宗之宗淵載鬼一車等語所以差異者為他這般事是差異底事所以却把世間差異底眀之世間自有這般差異底事淵蹇蹇利西南是説坤卦分曉但不知從何挿入這坤卦来此須是箇變例聖人到這裏看見得有箇做坤底道理大率陽卦多自隂来隂卦多自陽来震是坤第一畫變坎是第二畫變艮是第三畫變易之取象不曾確定了他淵蹇無坤體只取坎中爻變如沈存中論五姓一般蹇利西南謂地也據卦體艮下坎上無坤而繇辭言地者徃徃只取坎中爻變變則為坤矣沈存中論五姓自古無之後人既如此呼喚即便有義可推淵潘謙之書曰蹇與困相似君子致命遂志君子反身修徳亦一般殊不知不然象曰澤無水困是盡乾燥處困之極事無可為者故只得致命遂志若山上有水蹇則猶可進歩如山下之泉曲折多艱阻然猶可行故教人以反身修徳豈可以困為比只觀澤無水困與山下有水蹇二句便全不同學履僴同問徃蹇来譽曰来徃二字唯程傳言上進則為徃不進則為来説得極好今人或謂六四徃蹇来連是来就三九三徃蹇来反是来就二上六徃蹇来碩是来就五亦説得通但初六来譽則位居最下無可来之地其説不得通矣故不若程傳好只是不徃為佳耳不徃者守而不進故不進則為米諸爻皆不言吉盖未離乎蹇中也至上六徃蹇来碩吉却是蹇極有可濟之理既是不徃惟守於蹇則必得見九五之大人與共濟蹇而有碩大之功矣銖問蹇九五何故為大蹇曰五是為蹇主凡人臣之蹇只是一事至大蹇須人主當之礪問大蹇朋来之義曰處九五尊位而居蹇之中所以為大蹇所謂遺大投艱于朕身人君當此則屈羣策用羣力乃可濟也學履僴同解先生舉無所徃其来復吉程傳以為天下之難已解而安平無事則當修復治道正紀綱眀法度復先代眀王之治夫禍亂既平正合修眀治道求復三代之規模却只便休了兩漢以来人主還有理㑹正心誠意否須得人主如窮閻陋巷之士治心修身講眀義理以此應天下之務用天下之才方見次第因言神廟大有為之主勵精治道事事要理㑹過是時却有許多人才若専用眀道為大臣當大段有可觀眀道天資髙又加以學誠意感格聲色不動而事至立斷當時用人參差如此亦是氣數舛逆徳明天地解而雷雨作隂陽之氣閉結之極忽然迸散出做這雷雨只管閉結了若不解散如何會有雷雨作小畜所以不能成雷雨者畜不極也雷便是如今一箇爆杖淵六居三大率少有好底負且乗聖人到這裏又見得有箇小人乗君子之器底象故又於此發出這箇道理来淵問解而拇朋至斯孚曰四與初皆不得正四能解而拇者以四雖隂位而才則陽與初六隂柔則為有間所以能解去其拇故得陽剛之朋類至而相信矣銖射隼于髙墉聖人説易大槩是如此不似今人説底向来敬夫書與林艾軒云聖人説易却則恁地此却似説得易了淵損二簋與簋貳字不同可見其義亦不同淵懲忿如救火窒欲如防水大雅問懲忿窒慾忿怒易發難制故曰懲懲是戒於後慾之起則甚㣲漸漸到熾處故曰窒窒謂塞於初古人説情竇竇是罅隙須是塞其罅隙曰懲也不専是戒於後若是怒時也須去懲治他始得所謂懲者懲於今而戒於後耳窒亦非是真有箇孔穴去塞了但遏絶之使不行耳又曰山下有澤損君子以懲忿窒慾風雷益君子以見善則遷有過則改觀山之象以懲忿觀澤之象以窒慾慾如汙澤然其中穢濁解汙染人須當填塞了如風之迅速以遷善如雷之奮發以改過廣云觀山之象以懲忿是如何曰人怒時自是恁突兀起来故孫權曰令人氣湧如山廣問山下有澤損君子以懲忿窒慾風雷益君子以見善則遷有過則改曰伊川将来相牽合説某不曉看来人自有遷善時節自有改過時節不必只是一件事某看来只是懲忿如摧山窒慾如填壑遷善如風之迅改過如雷之烈又曰聖人取象亦只是箇大約彷彿意思如此若纔著言語窮他便有説不去時如後面小象若更教孔子添幾句也添不去僴酌損之在損之初下猶可以斟酌也淵問損卦三陽皆能益隂而二與上二爻則曰弗損益之初則曰酌損之何邪曰這一爻難解只得用伊川説又云易解得處少難解處多今且恁地説去到那占時又自别消詳有應處難立為定説也學履三人行損一人三陽損一一人行得其友一陽上去換得一隂来淵或益之十朋之龜為句淵得臣无家猶言化家為國相似得臣有家其所得也小矣无家則可見其大淵問損卦下三爻皆損己益人四五兩爻是損己從人上爻有為人上之象不待損己而自有以益人曰下三爻無損己益人底意只是盛到極處去不得自是損了四爻損其疾只是損了那不好了便自好五爻是受益也無損己從人底意礪益問木道乃行程傳以為木字本益字之誤如何曰看来只是木字渙卦説乗木有功中孚説乗木舟虚以此見得只是木字又問或擊之曰或字衆無定主之辭言非但一人擊之也立心勿恒勿字只是不字非禁止之辭此處亦可疑且闕之銖木道乃行不須改木字為益字只木字亦得見一朋友説有八卦之金木水火土有五行之金木水火土如乾為金易卦之金也兊之金五行之金也巽為木是卦中取象震為木乃東方属木五行之木也五行取四維故也去偽某昨日思風雷益君子以遷善改過遷善如風之速改過如雷之猛祖道曰莫是才遷善便是改過否曰不然遷善字輕改過字重遷善如慘淡之物要使之白改過如黑之物要使之白用力自是不同遷善者但見是人做得一事強似我心有所未安即便遷之儒用録云只消當下遷過就他底若改過須是大段勇猛始得又曰公所說䝉與蠱二象却有意思如山下有澤損君子以懲忿窒慾必是降下山以塞其澤便是此象六十四卦象皆如此祖道儒用同問遷善改過曰風是一箇急底物見人之善己所不及遷之如風之急雷是一箇勇決底物己有過便斷然改之如雷之勇決不容有些子遲緩賜元吉无咎吉凶是事咎是道理盖有事則吉而理則過差者是之謂吉而有咎淵享于帝吉是祭則受福底道理淵益之用凶事猶書言用降我凶徳嘉績于朕邦淵伊川說易亦有不分曉處甚多如益之用凶事説作凶荒之凶直指刺史郡守而言在當時未見有這守令恐難以此說某謂益之用凶事者言人臣之益君甚難必以危言鯁論恐動其君而益之雖以中而行然必用圭以通其信若不用圭以通之又非忠以益於君者也中行與依見不得是指誰淵利用遷國程昌㝢守夀春虜人來占得此爻遷來鼎州後平楊公有功淵方子録云守蔡州益損二卦說龜一在二一在五是顛倒說去未濟與既濟說伐鬼方亦然不知如何未濟㸔來只陽爻便好隂爻便不好但六五上九二爻不知是如何盖六五以得中故吉上九有可濟之才又當未濟之極可以濟矣却云不吉更不可曉學蒙大抵損益二卦諸爻皆互換損好益都不好如損六五却成益六二損上九好益上九却不好淵夬用之説夬卦云聖人於隂消陽長之時亦如此戒懼其警戒之意深矣曰不用如此説自是無時不戒謹恐懼不是到這時方戒懼不成説天下已平治可以安意肆志只才有些放肆便弄得靡所不至僴揚于王庭孚號有厲若合開口處便雖有劍從自家頭上落也須着説但使功罪各當是非顯白於吾何慊道夫夬卦中號字皆當作户羔反唯孚號古来作去聲看来亦只當作平聲僴壯于前趾與大壯初爻同此卦大率似大壯只争一畫淵王子獻卜遇夬之九二曰惕號莫夜有戎勿恤吉卜者告之曰必夜有驚恐後有兵權未幾果夜遇冦旋得洪帥淵問九三壯于頄曰君子之去小人不必悻悻然見於面目至於遇雨而為所濡濕雖為衆陽所愠然志在決隂必能終去小人故亦可得无咎也盖九三雖與上六為應而實以剛居剛有能決之象故壯于頄則有凶而和柔以去之乃无咎如王允之於董卓温嶠之於王敦是也又曰彖云利有攸徃剛長乃終今人以為陽不能無隂中國不能無夷狄君子不能無小人故小人不可盡去今觀剛長乃終之言則聖人豈不欲小人之盡去耶但所以決之者自有道耳又問夬卦辭言孚號九二言惕號上九言无號取象之義如何曰卦有兊體兊為口故多言號也又問以五陽決一隂君子盛而小人衰之勢而卦辭則曰告自邑不利即戎初九壯于前趾則徃不勝九二惕號則有戎勿恤壯于頄則凶牽牛則悔亡中行无咎豈去小人之道湏先自治而嚴厲戒懼不可安肆耶曰觀上六一爻則小人勢窮旡號有凶之時而君子去之之道猶當如此嚴謹自做手脚盖不可以其勢衰而安意自肆也其為戒深矣銖九三壯于頄看来舊文本義自順不知程氏何故欲易之有愠也是自不能堪正如顔杲卿使安祿山受其衣服至道間與其徒曰吾輩何為服此歸而借兵伐之正類此也卦中與復卦六四有獨字此卦諸爻皆欲去隂獨此一爻與六為應也是惡模様礪伊川改九三爻次序看来不必改淵這幾卦多説那臀不可曉淵牽羊悔亡其説得於許慎之淵莧陸是兩物莧者馬齒莧陸者章陸一名商陸皆感隂氣多之物藥中用商陸治水腫其子紅淵録云其物難乾學履中行无咎言人能剛決自勝其私合乎中行則得无咎无咎但能補過而己未是極至處這是説那㣲茫間有些箇意思斷未得釋氏所謂流注想荀子所謂偷則自行便是這意思照管不著便走将去那裏去爻雖無此意孔子作象所以禆爻辭之不足如自我致冦敬慎不敗之類甚多中行无咎易中却不恁地看言人占得此爻者能中行則无咎不然則有咎淵中行无咎中未光也事雖正而意潜有所係吝荀子所謂偷則自行佛家所謂流注不斷皆意不誠之本也淵姤不是説隂漸長為女壯乃是一隂遇五陽淵大率姤是一箇女遇五陽是箇不正當底如人盡天地之事聖人去這裡又看見得那天地相遇底道理出来淵姤是不好底卦然天地相遇品物咸章剛遇中正天下大行却又甚好盖天地相遇又是别取一義剛遇中正只取九五或謂亦以九二言非也銖問姤之時義大矣哉本義云幾㣲之際聖人所謹與伊川之説不同何也曰上面説天地相遇至天下大行也正是好時節而不好之漸已生於㣲矣故當謹於此學履金柅或以為止車物或以為絲衮不可曉廣又不知此卦如何有魚象或説離為鱉為蟹為蠃為蚌為龜魚便在裏面了不知是不是此條未詳淵包無魚又去這裏見得箇君民底道理陽在上為君隂在下為民淵有隕自天言能回造化則陽氣復自天而隕復生上来都換了這時節淵萃大率人之精神萃於已祖考之精神萃於廟淵順天命説道理時彷彿如伊川説也去得只是文勢不如此他是説豐萃之時若不用大牲則便是那以天下儉其親相似也有此理這時節比不得那利用禴之事他這彖辭散漫説説了王假有廟又説利見大人又説用大牲吉大率是聖人觀象節節地看見許多道理看到這裏見有這箇象便説出這一句来又看見那箇象又説出那一箇理来然而觀象則今不可得見是如何地觀矣淵問澤上於地萃君子以除戎器戒不虞曰大凡物聚衆盛處必有争故當預為之備又澤本當在地中今却上出於地上則是水盛長有潰決奔突之憂故取象如此僴不知如何地説箇一握底句出来淵孚乃利用禴説如伊川固好但若如此却是聖人説箇影子却恐不恁地想只是説祭升卦同淵問九五萃有位以陽剛居中正當萃之時而居尊位安得又有匪孚曰此言有位而無徳則雖萃而不能使人信故人有不信當脩其元永貞之徳而後悔亡也又曰王假有廟是祖考精神聚於廟又為人必能聚已之精神然後可以至於廟而承祖考今人擇日祀神多取神在日亦取聚意也銖問九五一爻亦似甚好而反云未光也是如何曰見不得讀易似這様且恁地解去若强説便至鑿了學履升升南征吉巽坤二卦拱得箇南如看命人虚拱底説話礪地中生木升君子以順徳積小以髙大木之生也無日不長一日不長則木死矣人之學也一日不可已一日而已則心必死矣人傑地中生木升汪丈甞云曾考究得樹木之生日日滋長若一日不長便将枯瘁便是生理不接學者之於學不可一日少懈大抵徳須日日要進若一日不進便退近日學者才相疎便都休了㽦問升萃二卦多是言祭享萃固取聚義不知升何取義曰人積其誠意以事鬼神有升而上通之義又曰六五貞吉升階與萃九五萃有位匪孚元永貞悔亡皆謂有其位必當有其徳若無其徳則萃雖有位而人不信雖有升階之象而不足以升矣銖元徳問王用亨于岐山云只是享字古文無享字所謂亨享烹只是通用又曰乾元亨利貞屯之元亨利貞只一般聖人借此四字論乾之徳本非四件事也時舉亨于岐山與亨于西山只是説祭山川想不到得如伊川説淵朱子語類卷七十二
