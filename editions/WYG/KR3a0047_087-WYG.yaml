body:
  text: 朱子語類卷八十七禮四小戴禮總論問看禮記語孟孰先曰禮記有説宗廟朝廷説得逺後雜亂不切於日用若欲觀禮須將禮記節出切於日用常行者看節出玉藻内則曲禮少儀看節問讀禮記曰禮記要兼儀禮讀如冠禮喪禮鄉飲酒禮之類儀禮皆載其事禮記只發明其理讀禮記而不讀儀禮許多理皆無安著處讀禮記須先讀儀禮嘗欲編禮記附於儀禮但須著和注寫徳輔云如曲禮檀弓之類如何附曰此類自編作一處又云祖宗時有三禮科學究是也雖不曉義理却尚自記得自荆公廢了學究科後来人都不知有儀禮又云荆公廢儀禮而取禮記舎本而取末也徳輔學禮先看儀禮儀禮是全書其他皆是講説如周禮王制是制度之書大學中庸是説理之書儒行樂記非聖人之書乃戰國賢士為之又云人不可以不莊嚴所謂君子莊敬日强安肆日偷又曰智崇禮卑人之智識不可以不髙明而行之在乎小心如大學之格物致知是智崇處正心修身是禮卑處卓禮記只是解儀禮如喪服小記便是解喪服傳推之毎篇皆然惟大傳是總解徳明許順之説人謂禮記是漢儒説恐不然漢儒最純者莫如董仲舒仲舒之文最純者莫如三䇿何嘗有禮記中説話来如樂記所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒如何説得到這裏想必是古来流傳得此箇文字如此廣方子録云以是知禮記亦出於孔門之徒無疑順之此言極是問禮記正義載五養老七養老之禮曰漢儒説制度有不合者多推従殷禮去大抵古人制度恐不便於今如鄉飲酒禮節文甚繁今强行之畢竟無益不若取今之禮酌而行之人傑問禮記古注外無以加否曰鄭注自好看注看疏自可了大雅文蔚録云問二禮制度如何可了曰只注疏白了得鄭康成是箇好人考禮名數大有功事事都理㑹得如漢律令亦皆有注儘有許多精力東漢諸儒煞好廬植也好淳義剛録云康成也可謂大儒王肅議禮必反鄭𤣥賀孫禮記有王肅注煞好人太史公樂書載樂記全文注家兼存得王肅又鄭𤣥説覺見好禮書如陸農師禮象陳用之禮書亦該博陳底似勝陸底後世禮樂全不足録但諸儒議禮頗有好處此不可廢當别類作一書方好看六朝人多是精於此畢竟當時此學自專門名家朝廷有禮事便用此等人議之如今刑法官只用試大法人做如本生父母事却在隋書劉子翼傳江西有士人方庭堅引起今言者得以引用賜䕫孫同或曰經文不可輕改曰改經文固啓學者不敬之心然舊有一人専攻鄭康成解禮記不合改其文如蛾子時術之亦不改只作蠶蛾子云如蠶種之生循環不息是何義也且如大學云舉而不能先命也若不改成甚義理大雅方馬二解合當參考儘有説好處不可以其新學而黜之如君賜衣服服以拜賜絶句是以辟之命銘為烝彛鼎舊㸃以辟之為一句極無義辟乃君也以君之命銘彛鼎最是又如陸農師㸃人生十年曰幼作一句學作一句下放此亦有理聖人作作一句為禮以教人學記大學之教也作一句時敎必有正業退息必有居學乃言底可績三載皆當如此不在此位也呂與叔作豈不在此位也是後看家語乃無不字當從之賀孫禮記荀莊有韻處多龔實之云嘗官於泉一日問陳宜中云古詩有平仄否陳云無平仄龔云有辨之久不決遂共往決之於李漢老陳問古詩有平仄否李云無平仄只是有音韻龔大然之謂之無有皆不是謂之音韻乃是揚曲禮曲禮必須别有一書協韻如弟子職之類如今篇首若思定辭民哉兹及上堂聲必揚入户必下户皆是韻今上下二篇却是後人補湊而成不是全篇做底若夫等處文意都不接内則却是全篇做底但曽子曰一段不是方子問曲禮首三句是從源頭説来此三句固是一篇綱領要之儼若思安定辭又以毋不敬為本曰然又曰只是下面兩句便是毋不敬今人身上大節目只是一箇容貌言語便如君子所貴乎道者三這裏只是不曾説正顏色要之顏色容貌亦不爭多只是顏色有箇誠與偽簡録云箕子九疇其要只在五事文蔚問艾軒解儼若思訓思字作助語然否曰訓思字作助語尚庶幾至以辭字亦為助語則全非也他們大率偏枯把心都在邊角上用煇賢者狎而敬之狎是狎熟狎愛如晏平仲善與人交久而敬之既愛之而又敬之也畏而愛之如畏天命畏大人畏聖人之言之畏畏中有愛也狠毋求勝狠亦是兩家事注云鬭䦧也如與人爭鬭分辨曲直便令理明不必求勝在我也分毋求多分物毋多自與欲其平也僩若夫坐如尸立如齊本大戴禮之文上言事親因假説此乃成人之儀非所以事親也記曲禮者撮其言反帶若夫二字不成文理而鄭康成又以丈夫解之益謬他也是解書多後更不暇仔細此亦猶子曰好學近乎智力行近乎仁知耻近乎勇家語答問甚詳子思取入中庸而刪削不及反衍子曰兩字義剛問禮聞取於人不聞取人禮聞来學不聞往教呂與叔謂上二句學者之道下二句教者之道取猶致也取於人者我為人所取而教之在教者言之則来學者也取人者我致人以教已在教者言之則往教者也此説如何曰道理亦大綱是如此只是説得不甚分曉據某所見都只就教者身上説取於人者是人来求我我因而教之取人者是我求人以教今欲下一轉語取於人者便是有朋自逺方来童䝉求我取人者便是好為人師我求童䝉文蔚班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊以誠莊對威嚴則涖官當以威嚴為本然恐其太嚴又當以寛濟之徳明問七十老而傳則嫡子嫡孫主祭如此則廟中神主都用改換作嫡子嫡孫名奉祀然父母猶在於心安乎曰然此等也難行也且得躬親耳又問嫡孫主祭則便須祧六世七世廟主自嫡孫言之則當祧若叔祖尚在則乃是祧其髙曾祖於心安乎曰也只得如此聖人立法一定而不可易兼當時人習慣亦不以為異也又問先生舊時立春祭先祖冬至祭始祖後来廢之何故曰覺得忒煞過當和禘祫都包在裏面了恐太僭遂廢之僩問年長以倍則父事之這也是同類則可曰他也是説得年輩當如此又問如此則不必問德之髙下但一例如此否曰德也隱微難見德行底人人也自是尊敬他又問如此則不必問年之髙下但有德者皆尊敬之曰若是師他則又不同若朋友中德行底也自是較尊敬他義剛為人子者居不主奥古人室在東南隅開門東北隅為窔西北隅為屋漏西南為奥人纔進便先見東北隅却到西北隅然後始到西南隅此是至深宻之地銖尸用無父母者為之故曰食饗不為槩祭祀不為尸文蔚父召無諾唯而起唯速於諾文蔚問禮云父不祭子夫不祭妻何也曰便是此一説被人解得都無理㑹了據某所見此二句承上面餕餘不祭説盖謂餕餘之物雖父不可将去祭子夫不可将去祭妻且如孔子君賜食必正席先嘗之君賜腥必熟而薦之君賜腥則非餕餘矣雖熟之以薦先祖可也賜食則或為餕餘但可正席先嘗而已固是不可祭先祖雖妻子至卑亦不可祭也文蔚餕餘不祭父不祭子夫不祭妻先儒自為一説横渠又自為一説㸔來只是祭祀之祭此因餕餘起文謂父不以是祭其子夫不以是祭其妻舉其輕者言則他可知矣雉餕餘不祭父不祭子夫不祭妻古注説不是今思之只是不敢以餕餘又将去祭神雖以父之尊亦不可以祭其子之卑夫之尊亦不可以祭其妻之卑盖不敢以鬼神之餘復以祭也祭非飲食必有祭之祭賀孫凡有一物必有一箇則如羮之有菜者用挾祖道問君言不宿於家曰只是受命即行不停留於家也那數句是説數項事燾凡御車皆御者居中乘者居左惟大将軍之車将自居中所謂鼓下大将自擊此鼓為三軍聽他節制雖王親征亦自擊鼓文蔚居喪初無不得讀書之文古人居喪不受業者業謂簨虡上一片板不受業謂不敢作樂耳古人禮樂不離身惟居喪然後廢樂故曰喪復常讀樂章周禮有司業者謂司樂也僴檀弓檀弓恐是子游門人作其間多推尊子游必大人傑録云多説子游之知禮子思不使子上䘮其出母以儀禮攷之出妻之子為父後者自是為出母無服或人之問子思自可引此正條答之何故却自費辭恐是古者出母本自無服逮德下衰時俗方制此服故曰伋之先君子無所失道即謂禮也道隆則從而隆道汙則從而汙是聖人固用古禮亦有隨時之義時如伯魚之喪出母是也子思自謂不能如此故但守古之禮而已然則儀禮出妻之子為母齊衰杖期必是後世沿情而制者雖疑如此然終未可如此斷定必大孔子令伯魚喪出母而子上不喪者盖猶子繼祖與祖為體出母既得罪於祖則不得入祖廟不喪出母禮也孔子時人喪之故亦令伯魚子思喪之子上時人不喪之故子上守法亦不喪之其實子上是正禮孔子却是變禮也故曰道隆則從而隆道汙則從而汙方子問子上不喪出母曰今律文甚分明又問伯魚母死期而猶哭如何曰既期則當除矣而猶哭是以夫子非之又問道隆則從而隆道汙則從而汙曰以文意觀之道隆者古人為出母無服迨德下衰有為出母制服者夫子之聽伯魚喪出母隨時之義也若子思之意則以為我不能效先君子之所為亦從古者無服之義耳人傑問不喪出母曰子思所答與喪禮都不相應不知何故據其問意則以孔子嘗令子思喪之却不令子上喪之故疑而問之也子思之母死孔子令其哭於廟盖伯魚死其妻再嫁於衛子思答以道之汙隆則以孔子之時可以隨俗而今據正禮則為伋妻者則為白母不為伋妻者是不為白母爾禮為父後者為出母無服只合以此答之僴問稽顙而后拜拜而后稽顙曰兩手下地曰拜拜而后稽顙先以兩手伏地如常然後引首向前扣地稽顙而後拜開兩手先以首扣地却交手如常頓首亦是引首少扣地稽首是引首稍久在地稽者稽留之意胡泳稽顙而後拜謂先以頭至地而後下手此喪拜也若拜而後稽顙則今人常用之拜也人傑稽顙而後拜稽顙者首觸地也拜字從兩手下人傑申生不辨驪姬㸔來亦未是若辨而後走恐其他公子或可免於難方子脱驂於舊館人之喪惡其涕之無從也今且如此説萬一無驂可脱時又如何必大施問每疑夫子言我非生而知之若聖與仁則吾豈敢及至夢奠兩楹之間則曰太山其頺乎梁木其壞乎哲人其萎乎由前似太謙由後似太髙曰檀弓出於漢儒之雜記恐未必得其真也㝢曾子襲裘而弔子游裼裘而弔裘似今之襖子裼衣似今背子襲衣似今涼衫公服襲裘者冒之不使外見裼裘者袒其半而以襌衣襯出之緇衣羔裘素衣麑裘黄衣狐裘緇衣素衣黄衣即裼衣襌衣也欲其相稱也僴幼名冠字五十以伯仲死謚周道也所謂以伯仲者盖古者初冠而字便有伯某父仲某父三字了及到得五十即除了下面兩字猶今人不敢斥尊者呼為幾丈之類今日偶㸔儀禮䟽中却云既冠之時即是權以此三字加之實未嘗稱也到五十方才稱此三字某初疑其不然却去取禮記㸔見其䟽中正是如前説盖當時䟽是兩人做孔頴達賈公彦故不相照管䕫孫死謚周道也史云夏商以上無諡以其號為謚如堯舜禹之類㸔來堯舜禹為謚也無意義堯字從三土如土之堯然而髙舜只是花名所謂顔如舜華之舜禹者獸跡今篆文禹字如獸之跡若死而以此為謚號也無意義况虞舜側㣲時已云有鰥在下曰虞舜則不得為死而後加之謚號矣㸔來堯舜禹只是名非號也僴從母之夫舅之妻二夫人相為服這恰似難曉往往是外甥在舅家見得嫕與姨夫相為服其本來無服故異之賀孫黄文問從母之夫舅之妻皆無服何也曰先王制禮父族四故由父而上為從曾祖服緦麻姑之子姊妹之子女子之子皆有服皆由父而推之故也母族三母之父母之母母之兄弟恩止於舅故從母之夫舅之妻皆不為服推不去故也妻族二妻之父妻之母乍㸔時似乎雜亂無紀仔細㸔則皆有義存焉又言吕與叔集中一婦人墓誌言凡遇功緦之喪皆蔬食終其身此可為法又言生布加碾治者為功方子姊妹呼兄弟之子為姪兄弟相呼其子為從子禮記云喪服兄弟之子猶子也以為己之子與為兄之子其喪服一也為己之次子期兄弟之子亦期也今人呼兄弟之子為猶子非是揚姪對姑而言今人於伯叔父前皆以為猶子盖禮記者主喪服言如夫子謂回也視予猶父若以姪謂之猶子則亦可以師為猶父矣漢人謂之從子却得其正盖叔伯皆從父也道夫問嫂叔無服而程先生云後聖有作須為制服曰守禮經舊法此固是好纔説起定是那箇不穏然有禮之權處父道母道亦是無一節安排㸔推而逺之便是合有服但安排不得故推而逺之若果是鞠養於嫂恩義不可已是他心自住不得又如何無服得直卿云當如所謂同㸑緦可也今法從小功居父問姨母重於舅服曰姊妹於兄弟未嫁朞既嫁則降為大功姊妹之身却不降也故姨母重於舅也賀孫嫂婦無類不當制他服皆以類從兄弟又太重弟婦亦無服嫂婦於伯叔亦無服今皆有之姪婦却有服皆報服也揚喪禮只二十五月是月禫徙月樂文蔚檀弓下反哭升堂反諸其所作也主婦入於室反諸其所養也須知得這意思則所謂踐其位行其禮等事行之自安方見得繼志述事之事銖延陵季子左袒右旋其封曰便有老荘之意端䝉問延陵季子之於禮也其合矣乎不知聖人何以取之曰旅中之禮只得如此變禮也只得如此燾問子貢曽子入弔修容事曰未必恁地䕫孫池本云不知又出來作箇甚嘴臉王制問一夫均受田百畝而有食九人八人七人六人五人多少之不等者何以能均曰田均受百畝此等數乃言人勤惰之不齊耳上農夫勤於耕則可食得九人下不勤底則可食得五人故庻人在官者之禄亦準是以為差也淳王制四海之内九州州方千里及論建國之數恐只是諸儒做箇如此筭法其實不然建國必因其山川形勢無截然可方之理又冀州最濶今河東河北數路都屬冀州雍州亦闊陜西秦鳳皆是至青徐兖豫四州皆相近做一處其疆界又自窄小其間山川險夷又自不同難槩以三分去一言之如三代封建其間若前代諸侯先所有之國土亦難為無故去減削他所以周公之封魯太公之封齊去周室皆逺是近處難得空地偶有此處空隙故取以封二公不然何不只留封近地以夾輔王室左氏載齊本爽鳩氏之地其後蒲姑氏因之而後太公因之又史記載太公就封萊人與之争國當時若不得蒲姑之地太公亦未有安頓處又如襄王以原田賜晉文公原是王畿地正以他無可取之處故也然原人尚不肯服直至用兵伐之然後能取盖以世守其地不肯遽以予人若封建之初於諸侯有所減削奪彼予此豈不致亂聖人處事決不如此若如此則是王莽所為也王莽變更郡國如以益歲以南付新平以雍丘以東付陳定以封丘以東付治亭以陳留以西付祈隧故當時陳留已無有郡矣其大尹太尉皆詣行在所此尤可笑必大人傑録云漢儒之説只是立下一箇筭法非惟施之當今有不可行求之昔時亦有難曉云云王制説王畿采地只是内諸侯之禄後來如祭公單父劉子尹氏亦皆是世嗣然其沾王教細宻人物皆好劉康公所謂民受天地之中以生都是識這道理想當時識這道理者亦多所以孔子亦要行一遭問禮於老聃淳問畿内采地只是仕於王朝而食禄退則無此否曰采地不世襲所謂外諸侯嗣也内諸侯禄也然後來亦各占其地競相侵削天子只得鄉遂而已淳王制祭法廟制不同以周制言之恐王制為是閎祖王制特禴祫禘祫嘗祫烝之説此沒理㑹不知漢儒何處得此説來禮家之説大抵自相矛盾如禘之義恐只趙伯循之説為是必大問天子犆礿祫禘祫嘗祫烝正義所解數段曰此亦難曉礿祭以春物未成其禮稍輕須著逐廟各祭祫禘之類又却合為一處則犆反詳而祫反略矣又據正義禘禮是四處各序昭穆而大傳謂不王不禘王者禘其祖之所自出以其祖配之若周人禘嚳配以后稷是也如此則説禘又不可通矣又云春秋書禘于太廟用致夫人又不知禘於太廟其禮如何太廟是周公之廟先儒有謂魯亦有文王廟左氏載鄭祖厲王諸侯不敢祖天子而當時越禮如此故公廟設於私家皆無理㑹處又問諸侯礿則不禘一段注謂是歲朝天子廢一時祭曰春秋朝㑹無節必大録云若從征伐或經歲方歸豈止廢一時祭而已哉不然則或有世子或大臣居守豈不可以攝事人傑必大録略五方之民言語不通却有暗合處盖是風氣之中有自然之理便有自然之字非人力所能安排如福與備通闕月令月令比堯之厯象已不同今之厯象又與月令不同人傑明堂想只是一箇三間九架屋子賀孫論明堂之制者非一某竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右个東之北為青陽左个南之中為明堂太廟南之東即東之南為明堂左个南之西即西之南為明堂右个西之中為總章太廟西之南即南之西為總章左个西之北即北之西為總章右个北之中為𤣥堂太廟北之東即東之北為𤣥堂右个北之西即西之北為𤣥堂左个中央為太廟太室凡四方之太廟異方所其左个右个則青陽之右个乃明堂之左个明堂之右个乃總章之左个也總章之右个乃𤣥堂之左个𤣥堂之右个乃青陽之左个也但隨其時之方位開門耳太廟太室則每季十八日居焉古人制事多用井田遺意此恐也是砥曹問春行秋令之類不知是天行令是人行令曰是人行此令則召天之災闕戊巳土律中黄鍾之宫詹卿以為陽生於子至午而盡到未又生出一黄鍾這箇只可說話某思量得不是恁地盖似些元亨利貞黄鍾略畧似箇乾字宫是在中字中間又似是非在惻隱之前其他春音角夏音徴秋音商冬音羽此惟説宫聲如京房律準十三絃中一絃為黄鍾不動十二絃便拄起應十二月䕫孫庚之言更也辛之言新也見月令孟秋之月其日庚辛下注銖直卿云今仲冬中星乃東璧義剛問禮注䟽中所說祀五帝神名如靈威仰赤熛怒白招拒叶光紀之類果有之否曰皆是妄說漢時已祀此神漢是火德故祀赤熛怒謂之感生帝本朝火德亦祀之問感生之義曰如𤣥鳥卵大人跡之類耳漢赤帝子事果有之否曰豈有此理盡是鄙俗相傳傅㑹之談又問五行相生相勝之說歴代建國皆不之廢有此理否曰須也有此理只是他前代推得都沒理㑹如秦以水德漢却黜秦為閏而自以火德繼周如漢初張蒼自用水德後來賈誼公孫臣輩皆云當用土德引黄龍見為證遂用土德直至漢末方申火德之説及光武以有赤伏符之應遂用火德歴代相推去唐用土德後梁繼之以金及至後唐又自以為唐之後復用土德而不繼梁後晉以金繼土後漢以水後周以木本朝以火是時諸公皆爭以為本朝當用土德改正五代之序而去其一以承周至引太祖初生時胞衣如菡萏徧體如真金色以為此真土德之瑞一時煞争議後來卒用火德此等皆沒理㑹且如五代僅有三四年者亦占一德此何足以繫存亡之數若以五代為當繫則豈應黜秦為閏皆有不可曉者不知如何又曰五行之建於國家初無利害但臘日則用此推之耳如本朝用戌日為臘是取此義又曰如秦以水德以為水者刻深遂專尚殺罰此却大害事僴文王世子師保疑丞疑字曉不得想只是有疑即問他之意公與公族燕則異姓為賓注曰同宗無相賔客之道銖公族有罪無宫刑不翦其類也纎剸於甸人特不以示衆耳刑固不可免今之法乃殺人不死祖宗時宗室至少又聚於京師犯法絶寡故立此法今散於四方萬里與常人無異乃縱之殺人是何法令不可不革可學禮運禮運言三王不及上古事人皆謂其說似莊老先生曰禮運之說有理三王自是不及上古胡明仲言恐是子游撰以前有言偃云云揚問禮運似與老子同曰不是聖人書胡明仲云禮運是子游作樂記是子貢作計子游亦不至如此之淺可學孔子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉我欲觀殷道是故之宋而不足徵也吾得坤乾焉說者謂夏小正與歸藏然聖人讀此二書必是大有發明處歸藏之書無傳然就使今人得二書讀之豈能有聖人意思也人傑楊問禮運故百姓則君以自治也云云注則字作明字不知可從否曰只得作明字㝢問六經中注家所更定字不知盡從之否曰亦有不可依他處㝢問禮記主人既祖填池鄭氏作奠徹恐只是填池是殯車所用者曰如魚躍拂池固是如此但見葬車用此恐殯車不用此此處亦有疑又問其慎也盖殯也慎改為引如何曰若此處皆未可曉㝢用人之知去其詐用人之勇去其怒用人之仁去其貪知與詐勇與怒固相類仁却如何貪盖是仁只是愛愛而無義以制之便事事都愛好物事也愛好官爵也愛錢也愛事事都愛所以貪諸家解都不曾恁地㸔得出又問雖是偏不是有一邉無一邉曰那一邉也是闕了胡泳智與詐相近勇與怒相似然仁却與貪不相干盖南方好也好行貪狠北方惡也惡行亷貞盖好便有貪底意思故仁屬愛愛便有箇貪底意思又云大率慈善底人多於財上不分曉能亷者多是峻刻悍悻䀨噪人底人燾用人之仁去其貪盖人之性易得偏仁縁何貪盖人善底人便有好便宜底意思今之亷介者便多是那剛硬底人燾問喜怒哀懼愛惡欲是七情論來亦自性發只是怒自羞惡發出如喜與愛欲恰都自惻隱上發曰哀懼是那箇發看來也只是從惻隠發盖懼亦是怵惕之甚者但七情不可分配四端七情自於四端横貫過了賀孫問喜愛欲發於陽怒哀懼惡發於隂否曰也是如此問怒如何屬隂曰怒畢竟屬義義屬隂怒與惡皆羞惡之發所以屬隂愛與欲相似欲又較深愛是說這物事好可愛而已欲又是欲得之於己他這物事又自分屬五行問欲屬水喜屬火愛屬木惡與怒屬金哀與懼亦屬水否曰然僴劉圻父問七情分配四端曰喜怒愛惡是仁義哀懼主禮欲屬水則是智且麄恁地說但也難分義剛問喜愛欲三者不同如何分别曰各就他地頭看如誠只是實就他本來說喚做誠就自家身上說誠又自與本來不同如信就本然之理說是信就自家身上說信又不同就物上說又不同要知也只是一箇實如曰主忠信之類皆是自家身上說也賀孫問愛與欲何以别曰愛是汎愛那物欲則有意於必得便要拏將來淳問欲與慾字有何分别曰無心欲字虚有心慾字實有心慾字是無心欲字之母此兩字亦通用今人言滅天理而窮人慾亦使此慾字㬊曰方動者慾行出來者欲節問慾與欲之異曰也只一般只是這慾字指那物事而言說得較重這欲字又較通用得凡有所愛皆是欲燾記云人者鬼神之㑹又云致愛則存致慤則著祭義皆說得好䕫孫天秉陽垂日星地秉隂竅於山川播五行於四時和而後月生也隂陽變化一時撒出非今日生此明日生彼但論其先後之序則當如此耳横渠云神為不測故緩辭不足以盡神化為難知故急辭不足以體化因說雷斧舉横渠云其來也幾微易簡其䆒也廣大堅固閎祖問人者天地之心曰謂如天道福善禍淫乃人所欲也善者人皆欲福之淫者人皆欲禍之又曰教化皆是人做此所謂人者天地之心也燾禮器經禮三百便是儀禮中士冠諸侯冠天子冠禮之類此是大節有三百條如始加再加三加又如坐如尸立如齊之類皆是其中之小目便有三千條或有變禮亦是小目呂與叔云經便是常行底緯便是變底恐不然經中自有常有變緯中亦自有常有變闕人只是讀書不多今人所疑古人都有說了只是不曾讀得鄭康成註經禮三百云是周禮曲禮三千云是儀禮某嘗疑之近看臣瓉注漢書云經禮三百乃冠昏喪祭周官只是官名云云乃知臣瓉之說已非康成之説矣盖經禮三百只是冠昏喪祭之類如冠禮之中便天子冠士冠禮他類皆然豈無三百事但儀禮五十六篇今皆亡闕只存十七篇故不全爾曲禮三千乃其中之小目如冠禮中筮日筮賔三加之類又如上於東階則先右足上於西階則先左足皆是也子䝉陳叔晉云經禮如天子七廟士二廟之類當别有一書今亡矣曲禮如威儀之類至録云是威儀纎悉處今曲禮儀禮是也恨不及問之方子禮器出人情亦是人情用可學天道至教聖人至德動静語黙之間無非教人處孔子於鄉黨便恂恂朝廷便便便到處皆是人様更無精粗本末何嘗有隱砥郊特牲諸侯不得祖天子然魯有文王廟左氏亦云鄭祖厲王何也此必周衰諸侯僭肆做此違條礙法事故公廟設於私家必大問蜡祭何以言仁之至義之盡曰如迎猫虎等事雖至㣲至細處亦有所不違故曰仁之至義之盡去偽問昏禮不賀人之序也曰婦既歸姑與之為禮喜於家事之有承替也僴録作有傳也姑反置酒一分以勸飲婦姑坐客位而婦坐主位僴録云姑為客婦為主姑降自西階婦降自阼階卓僴同商人求諸陽故尚聲周人求諸隂故尚臭灌用鬰鬯然周人亦求諸陽如大司樂言圜鍾八變則天神可得而禮可見古人察得義理精㣲用得樂便與他相感格䕫孫録云大抵天人無間如云聖人之道洋洋乎發育萬物峻極于天聖人能全體得所以參天地贊化育只是有此理以粗底言如荀子云云此廼降神之樂如舞雲門乃是獻神之樂荀子謂伯牙鼓琴而六馬仰秣瓠巴鼓瑟而㳺魚出聽粗者亦有此理又如虞美人草聞人歌虞美人詞興呉詞則自動䕫孫録云聞唱虞美人詞則自拍亦不特是虞美人詞凡呉調者皆然以手近之亦能如此雖艸木亦如此又曰今有箇新立底神廟縁衆人心邪向他他便盛如狄仁傑廢了許多廟亦不能為害只縁他見得無這物事了上蔡云可者欲人致生之故其鬼神不可者欲人致死之故其鬼不神先生每見人説世俗神廟可怪事必問其處形勢如何賜䕫孫少異安卿問禮記魂氣歸於天與横渠反原之説何以别曰魂氣歸於天是消散了正如火煙騰上去處何歸只是消散了論理大槩固如此然亦有死而未遽散者亦有寃恨而未散者然亦不皆如此亦有寃死而魂即散者叔器問聖人死如何曰聖人安於死魂即消散義剛内則偪屨著綦綦鞋口帶也古人皆旋繫今人只從簡易輟之於上如假帶然不有敬事不敢袒裼不涉不撅看來此三句文義一様古注誤作兩段解言尊長之前有敬事方敢袒裼敬事如習射之類射而袒裼乃為敬若非敬事而以勞倦袒裼則是不敬惟涉水而後撅若不涉而撅則為不敬如云勞毋袒暑無褰裳若非敬事雖勞亦不敢袒惟涉水乃可褰裳若非涉水雖盛暑亦不敢褰裳也僴玉藻君子登車有光一節養出好意思來方子笏者忽也所以備忽忘也天子以球玉諸侯以象大夫以魚須文竹士竹本象可也漢書有秉笏奏事又曰執薄亦笏之類本只是為備遺忘故手執眼觀口誦或於君前有所指畫不敢用手故以笏指畫今世遂用以為常執之物周禮典瑞王搢大圭執鎮圭大圭不執只是搢於腰間却執鎮圭用藻藉以朝日而今郊廟天子皆執大圭大圭長三尺且重執之甚難古者本非執大圭也僴問禮記九容問論語九思一同本原之地固欲存養於容貌之間又欲隨事省察曰即此便是涵養本原這裏不是存養更於甚處存養明堂位問明堂位一篇是有此否曰看魯人有郊禘也是有此問當時周公制禮父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫不成周公制禮使其子亂之㸔來子思前如此說後却説郊社之禮禘嘗之義治國其如示諸掌乎怕是子思以此譏魯之僭禮曰子思自是稱武王周公之達孝不曾是譏魯劉曰孔子言魯之郊禘非禮也周公其衰矣孔子尚有此説曰孔子後來是如此譏之先生因曰㸔文字最不可都要合作一處説又曰這箇自是周公死了成王賜伯禽不干周公事堯之有丹朱舜之有商均不肖子弟亦有之成王伯禽猶似可問當時不曾封公只是封侯如何曰天子之宰二王之後方封公伯禽勢不得封公楊問秦檜之當時云云曰他當時有震主之勢出於己只是跳一步便是這物事如吳王濞時既立丞相御史大夫百官與天子不相逺所以起不肖之心周公當時七年天子之位其勢成王所以賜之天子之禮樂砥㝢録同無揚問以下喪服小記問三年而後葬者必再祭鄭元注以為只是練祥祭無禫曰不必禮經上下文如何道㸔見也是如此賀孫問大夫士不祔於諸侯祔於諸祖父之為大夫士者亡則中一而祔祔必以其昭穆曰中間也間而祔者以祖為諸侯既不可祔則間一而上祔於髙祖只取昭穆之行同而不紊其昭穆之序也如魯昭公冠於衞成公之廟亦只是取其行同耳因問卒哭而祔何義曰只是祔於其行相似吿報祖考云銖問妾母之稱曰恐也只得稱母他無可稱在經只得云妾母不然無以别於他母也又問弔人妾母之死合稱云何曰恐也只得隨其子平日所稱而稱之或曰五峰稱妾母為少母南軒亦然據爾雅亦有少姑之文五峰想是本此先生又曰為人後者為其父母服本朝濮王之議欲加皇考字引此為證當時雖是衆人争得住然至今士大夫猶以為未然盖不知禮經中若不稱作為父母别無箇稱呼只得如此説也僴凡文字有一兩本參對則義理自明如禮記中喪服小記喪服大傳都是解注儀禮喪服小記云庶子不祭禰明其宗也又曰庶子不祭祖明有宗也注謂不祭禰者父之庶子不祭祖者其父為庶子說得繁碎大傳只說庶子不祭則祖禰皆在其中矣某所以於禮書中只載大傳説僴大傳吳斗南説禮不王不禘王如來王之王四夷黄録作要荒之君世見中國一世王者立則彼一番來朝故王者行禘禮以接之彼本國之君一世繼立則亦一番來朝故歸國則亦行禘禮此説亦有理所謂吉禘於莊公者亦此類非五年之禘也淳義剛同諸侯奪宗大夫不可奪宗泳别子為祖繼别為宗是諸侯之庶子與他國之人在此邦居者皆為别子則其子孫各自以為太祖如魯之三家季友季氏之太祖也慶父孟氏之太祖也公子牙叔孫氏之太祖也僴問有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者曰此説公子之宗道謂如人君有三子一嫡而二庶則庶宗其嫡是謂有大宗而無小宗皆庶則宗其庶長是謂有小宗而無大宗止有一人則無人宗之己亦無所宗焉是謂無宗亦莫之宗也下云公子之公為其士大夫之庶者宗其士大夫之嫡者此正觧有大宗而無小宗一句之公之公猶君也人傑少儀毋跋來毋報往報音赴跋是急走倒從這邊來赴又是急再還倒向那邊去來往只是向背之意此二句文義猶云其就義若熱則其去義若渴言人見有箇好事火急歡喜去做這様人不耐久少間心懶意闌則速去之矣所謂其進銳者其退速也僴不窺宻正無測未至曰許多事都是一箇心若見得此心誠實無欺偽方始能如此心苟渙散無主則心皆逐他去了更無一箇主觀此則求放心處全在許多事上將許多事去欄截此心教定無測未至未至之事自家不知不當先測今日未可便説道明日如何子䝉學記九年知類通達横渠説得好學者至於能立則教者無遺恨矣此處方謂大成盖學者既到立處則教者亦不消得管他自住不得故横渠又云學者能立則自强不反而至於聖人之大成矣但今學者不能得扶持到立處嘗謂此段是箇致知之要如云一年視離經辨志古註云離經斷絶句也此且是讀得成句辨志是知得這箇是為己那箇是為人這箇是義那箇是利三年敬業樂羣敬業是知得此是合當如此做樂羣是知得滋味好與朋友切磋五年博習親師博習是無所不習親師是所見與其師相近了七年論學取友論學是他論得有頭緒了取友是知賢者而取之此謂之小成九年知類通達此謂之大成横渠説得推類兩字最好如荀子倫類不通不足謂之善學而今學者只是不能推類到得知類通達是無所不曉便是自强不反這幾句都是上兩字説學下兩字説所得處如離經便是學辨志便是所得處他皆倣此賜䕫孫同子武問宵雅肄三官其始也曰聖人教人合下便是要他用便要用賢以治不賢舉能以教不能所以公卿大夫在下也思各舉其職不似而今上下都恁地了使窮困之民無所吿訴聖賢生斯世若是見似而今都無理㑹他豈不為之惻然思有以救之孔子三月無君則皇皇如也但不可枉尺直尋以利言之天生一人便須管得天地間事如人家有四五子父母養他豈不要他使但其間有不㑹底則㑹底豈可不出來為他擔當一家事韓退之云盖畏天命而憫人窮也這也説得好説得聖賢心出義剛問不學雜服不能安禮鄭注謂服是皮弁冕服横渠謂服事也如洒掃應對沃盥之類曰恐只如鄭説古人服各有等降若理㑹得雜服則於禮亦思過半矣如冕服是天子祭服皮弁是天子朝服諸侯助祭於天子則服冕服自祭於其廟則服弁冕大夫助祭於諸侯則服𤣥冕自祭於其廟則服皮弁又如天子常朝則服皮弁朔旦則服𤣥冕無旒之冕也諸侯常朝則用𤣥端朔旦則服皮弁大夫私朝亦用𤣥端夕深衣士則𤣥端以祭上士𤣥裳中士黄裳下士雜裳前𤣥後黄也庶人深衣僴呻其佔畢多其訊多其訊如公榖所謂何者是也廣問使人不由其誠莫只是教他記誦而中心未嘗自得否曰若是逼得他𦂳他便來厮瞞便是不由誠嘗見横渠作簡與某人謂其子日來誦書不熟且教他熟誦盡其誠與材文蔚曰便是他解此兩句只作一意解其言曰人之材足以有為但以其不由於誠則不盡其材若曰勉卒以為之豈有由其誠也哉曰固是既是他不由誠自是材不盡文蔚善問者如攻堅木先其易者而後其難今人多以難中有道理而不知通其易則難自通此不可不曉可學問善問者如攻堅木一段曰此説最好若先其難者理㑹不得更進步不去須先其易者難處且放下少間見多了自然相證而解説字人以為悅恐只是説字說證之義也解物為解自解釋為解恐是相證而曉解善問者如攻堅木先其易者後其節目非特善問讀書求義理之法皆然置其難處先理㑹其易處易處通則堅節自迎刃而解矣若先其難者則刃頓斧傷而木終不可攻縱使能攻而費工竭力無自然相說而解之功終亦無益於事也問相說而解古注說音悅解音佳買反曰說只當如字而解音蟹盖義理相說之久其難處自然觸發解散也僴樂記㸔樂記大段形容得樂之氣象當時許多形名度數是人人曉得不消説出故只説樂之理如此其玅今來許多度數都没了却只有許多樂之意思是好只是沒箇頓放處如有帽却無頭有箇鞋却無脚雖則是好自無頓放處司馬温公舊與范蜀公事事争到底這一項事却不相思量著賀孫古者禮樂之書具在人皆識其器數至録云人人誦習識其器數却怕他不曉其義故教之曰凡音之起由人心生也又曰失其義陳其數者祝史之徒也今則禮樂之書皆亡學者却但言其義至於器數則不復曉盖失其本矣方子至同朱絃練絲絃䟽越下面濶璘一倡而三歎謂一人唱而三人和也今之解者猶以為三歎息非也僴人生而静天之性未嘗不善感物而動性之欲此亦未是不善至於物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣方是惡故聖賢説得惡字煞遲端蒙問人生而静天之性也静非是性是就所生指性而言先生應問知知字曰上知字是致知之知又曰上知字是體下知字是用上知字是知覺者問反躬曰反躬是囘頭省察又曰反躬是事親孝事君忠這箇合恁地那箇合恁地這是反躬節物之感人無窮而人之好惡無節此説得工夫極宻兩邊都有些罪過物之誘人固無窮然亦是自家好惡無節所以被物誘去若自有箇主宰如何被他誘去此處極好玩味且是語意渾粹僴問禮勝則離樂勝則流才是勝時不惟至於流與離即禮樂便不在了曰這正在勝字𦂳要只才有些子差處則禮失其節樂失其和盖這些子正是交加生死岸頭又云禮樂者皆天理之自然節文也是天理自然有底和樂也是天理自然有底然這天理本是儱侗一直下來聖人就其中立箇界限分成段子其本如此其末亦如此其外如此其裏亦如此但不可差其界限耳才差其界限則便是不合天理所謂禮樂只要合得天理之自然則無不可行也又云無禮之節則無樂之和惟有節而後有和也燾問禮勝則離樂勝則流既云離與流則不特謂之勝禮樂已亡矣曰不必如此説正好就勝字上㸔只争這些子禮纔勝些子便是離了樂纔勝些子便是流了知其勝而歸之中即是禮樂之正正好就勝字上㸔不可云禮樂已亡也僴此等禮古人目熟耳聞凡其周旋曲折升降揖遜無人不曉後世盡不得見其詳却只有箇說禮處云大禮與天地同節云云又如樂盡亡了而今却只空留得許多説樂處云流而不息合同而化云云只如周易許多占卦淺近底物事盡無了却空有箇繫辭説得神出鬼沒僴問明則有禮樂幽則有鬼神曰禮主減樂主盈鬼神亦只是屈伸之義禮樂鬼神一理德明明則有禮樂幽則有鬼神禮樂是可見底鬼神是不可見底禮是收縮節約底便是鬼樂是發揚底便是神故云人者鬼神之㑹説得自好又云至愛則存至慤則著亦説得好賜問明則有禮樂幽則有鬼神曰此是一箇道理在聖人制作處便是禮樂在造化處便是鬼神或云明道云天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也不知天地尊卑是禮鼓之潤之是樂否先生乃引樂記天尊地卑至樂者天地之和也一段云此意思極好再三歎息又云鬼神只是禮樂底骨子人傑去偽録畧樂由天作屬陽故有運動底意禮以地制如由地出不可移易升卿或問天髙地下萬物散殊一段先生因歎此數句意思極好非孟子以下所能作其文如中庸必子思之辭左傳子太叔亦論此夫禮天之經地之義民之行天地之經而民實則之云舊見伯恭愛教人㸔只是説得麄文意不溜亮不如此説之純粹通暢他只是説人做這箇去合那天之度數如云為六畜五牲三犧以奉五味云云之類都是做這箇去合那天都無那自然之理如云天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉皆是自然合當如此僴問春作夏長仁也秋歛冬藏義也此易所謂人道天道之位歟曰此即通書所謂二氣五行之說去偽問禮樂極於天而蟠乎地行乎隂陽而通乎鬼神窮極髙逺而測深厚此是言一氣之和無所不通否曰此亦以理言有是理即有是氣亦如説天髙地下萬物散殊而禮制行矣文蔚曰正義却有甘露降醴泉出等語曰大綱亦是如此縁先有此理末梢便有這徵驗文蔚樂樂其所自生禮反其所自始亦如樂由中出禮自外作樂是和氣從中間直出無所待於外禮却是始初有這意思外面却做一箇節文抵當他却是人做底雖説是人做元不曾杜撰因他本有這意思故下文云樂章德禮報情反始也文蔚問如何是章德曰和順積諸中英華發諸外便是章著其内之德横渠説樂則得其所樂即是樂也更何所待是樂其所自成説得亦好只是樂其所自成與樂其所自生用字不同爾文蔚問禮樂偩天地之情如隂陽之闔闢升降天地萬物之髙下散殊窮本知變樂之情如五音六律之相生無窮著誠去偽禮之經如品藻節文之不可淆亂否曰也不消如此分這兩箇物事只是一件禮之誠便是樂之本樂之本便是禮之誠若細分之則樂只是一體周流底物禮則是兩箇相對著誠與去偽也禮則相刑相尅以此克彼樂則相生相長其變無窮樂如晝夜之循環隂陽之闔闢周流貫通而禮則有向背明暗論其本則皆出於一樂之和便是禮之誠禮之誠便是樂之和只是禮則有誠有偽須以誠克去偽則誠著所以樂記内外同異只管相對説翻來覆去只是這兩説又曰偩依象也窮本知變如樂窮極到本原處而其變生無窮問降興上下之神是説樂凝是精粗之體是説禮否曰不消如此分禮也有降興上下之神時節如祭肝祭心之類僴問樂以治心禮以治躬曰心要平易無艱深險阻所以説不和不樂則鄙詐之心入之矣不莊不敬則慢易之心入之矣節讀書自有可得參考處如易直子諒之心一句子諒從來說得無理㑹却因見韓詩外傳子諒作慈良字則無可疑木之子武問天則不言而信莫只是實理神則不怒而威莫只是不可測知否曰也是恁地神便是箇動底物事義剛問樂記以樂為先與濓溪異曰他却將兩者分開了可學祭法李丈問四時之祫髙祖有時而在穆曰某以意推之如此無甚𦂳要何必理㑹禮書大槩差舛不可曉如祭法一篇即國語柳下惠説祀爰居一段但文有先後如祀稷祀契之類只是祭祖宗耳末又説有功則祀之若然則祖宗無功不祀乎淳義剛録畧或問祭法云鯀障洪水而殛死禹能修鯀之功所以舉鯀莫是因言禹後併及之耶曰不然去偽官師諸有司之長也官師一廟止及禰却於禰廟併祭祖適士二廟即祭祖祭禰皆不及髙曾大夫三廟一昭一穆與太祖廟而三大夫亦有始封之君如魯季氏則公子友仲孫氏則公子慶父叔孫氏則公子牙是也銖一廟者得祭祖禰古今祭禮中江都集禮内有説時舉祭義春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂雨露既濡君子履之必有怵惕之心如將見之樂以迎來哀以送往故禘有樂而嘗無樂盖春陽氣發來人之魂魄亦動故禘有樂以迎來如楚辭大招中亦有魂來之語秋陽氣退去乃鬼之屈故嘗不用樂以送往問孝子有終身之喪忌日之謂也不知忌日合著如何服曰唐時士大夫依舊孝服受弔五代時某人忌日受弔某人弔之遂於坐間刺殺之後來只是受人慰書而不接見須隔日預辦下謝書俟有來慰者即以謝書授之不得過次日過次日謂之失禮服亦有數等考與祖曾祖髙祖各有降殺妣與祖妣服亦不同大槩都是黲衫黲巾後來横渠制度又别以為男子重乎首女子重乎帶考之忌日則用白巾之類疑亦是黲巾而不易帶妣之忌日則易帶而不改巾服亦隨親踈有隆殺問先生忌日何服曰某只著白絹涼衫黲巾不能做許多様服得問黲巾以何為之曰紗絹皆可某以紗又問誕辰亦受子弟壽酒否曰否衣服易否曰否一例不受人物事某家舊時常祭立春冬至季秋祭禰三祭後以立春冬至二祭近禘祫之祭覺得不安遂去之季秋依舊祭禰而用某生日祭之適值某生日在季秋遂用此日九月十五日又問在官所還受人壽儀否曰否然也有行不得處如作州則可以不受盖可以自由若有監司所在只得按例與之受盖他生日時又用還他某在潭州如此在南康漳州不受亦不送又問黲巾之制曰如帕複相似有四隻帶若當幞頭然僴問惟聖人為能饗帝曰惟聖方能與天合德又曰這也是難須是此心蕩蕩地方與天相契若有些黑暗便不能與天相契矣燾夫子答宰我鬼神説處甚好氣者神之盛也魄者鬼之盛也人死時魂氣歸於天精魄歸於地所以古人祭祀燎以求諸陽灌以求諸隂曰其氣發揚於上為昭明焄蒿悽愴此百物之精神之著也何謂也曰人氣本騰上這下面盡則只管騰上去如火之煙這下面薪盡則煙只管騰上去曰終久必消否曰是淳問氣也者神之盛也魄也者鬼之盛也豈非以氣魄未足為鬼神氣魄之盛者乃為鬼神否曰非也大凡説鬼神皆是通生死而言此言盛者則是指生人身上而言所以後面説骨肉斃於下隂為野土但説體不説魄也問頃聞先生言耳目之精明者為魄口鼻之噓吸者為魂以此語是而未盡耳目之所以能精明者為魄口鼻之所以能噓吸者為魂是否曰然㸔來魄有箇物事形象在裏面恐如水晶相似所以發出來為耳目之精明且如月其黑暈是魄也其光是魂也想見人身魂魄也是如此人生時魂魄相交死則離而各散去魂為陽而散上魄為隂而降下又曰隂主藏受陽主運用凡能記憶皆魄之所藏受也至於運用發出來是魂這兩箇物事本不相離他能記憶底是魄然發出來底便是魂能知覺底是魄然知覺發出來底又是魂雖各自分屬隂陽然隂陽中又各自有隂陽也或曰大率魄屬形體魂屬精神曰精又是魄神又是魂又曰魄盛則耳目聰明能記憶所以老人多目昏耳聵記事不得便是魄衰而少也老子云載營魄是以魂守魄盖魂熱而魄冷魂動而魄静能以魂守魄則魂以所守而亦静魄以魂而有生意魂之熱而生涼魄之冷而生暖惟二者不相離故其陽不燥其隂不滯而得其和矣不然則魂愈動而魄愈静魂愈熱而魄愈冷二者相離則不得其和而死矣又云水一也火二也以魄載魂以二守一則水火相濟而不相離所以能永年也養生家説盡千言萬語説龍説虎説鈆説汞説坎説離其術止是如此而已故云載魄抱魂能勿離乎專氣致柔能如嬰兒乎今之道家只是馳騖於外安識所謂載魄守一能勿離乎康節云莊子得易之體孟子得易之用康節之學意思微似莊老或曰老子以其不能發用否曰老子只是要收藏不放散燾問陽魂為神隂魄為鬼祭義曰氣也者神之盛也魄也者鬼之盛也而鄭氏曰氣噓吸出入者也耳目之聰明為魄然則隂陽未可言鬼神隂陽之靈乃鬼神也如何曰魄者形之神魂者氣之神魂魄是形氣之精英謂之靈故張子曰二氣之良能二氣即隂陽也良能是其靈處問眼體也眼之光為魄耳體也何以為耳之魄曰能聽者便是如鼻之知臭舌之知味皆是但不可以知字為魄纔説知便是主於心也心但能知若甘苦鹹淡要從舌上過如老人耳重目昏便是魄漸要散潘問魄附於體氣附於魂可作如此㸔否曰也不是附魂魄是形氣之精英銖問陽主伸隂主屈鬼神隂陽之靈不過指一氣之屈伸往來者而言耳天地之間隂陽合散何物不有所以錯綜㸔得曰固是今且説大界限則周禮言天曰神地曰祇人曰鬼三者皆有神而天獨曰神者以其常常流動不息故專以神言之若人亦自有神但在人身上則謂之神散則謂之鬼耳鬼是散而静了更無形故曰往而不返又問子思只舉齊明盛服以下數語發明體物而不可遺之驗只是舉神之著者而言何以不言鬼曰鬼是散而静更無形故不必言神是發見此是鬼之神如人祖考氣散為鬼矣子孫精誠以格之則洋洋如在其上如在其左右豈非鬼之神耶銖䰟􅅎禮記古注甚明云魂氣之所出入者是魄精明所寓者是問孔子答宰我鬼神一段鄭注云氣謂噓吸出入者也耳目之聰明為魄竊謂人之精神知覺與夫運用云為皆是神但氣是充盛發於外者故謂之神之盛四肢九竅與夫精血之類皆是魄但耳目能視能聽而精明故謂之鬼之盛曰是如此這箇只是就身上説又曰燈似魂鏡似魄燈有光熖物來便燒鏡雖照見只在裏面又火日外影金水内影火日是魂金水是魄又曰運用動作底是魂不運用動作底是魄又曰動是魂静是魄胡泳問其氣發揚於上為昭明焄蒿悽愴曰此是隂陽乍離之際髣髴如有所見有這箇聲氣昭明焄蒿是氣之升騰悽愴是感傷之意文蔚問其氣發揚於上為昭明焄蒿悽愴曰昭明是所謂光景者想像其如此焄蒿是騰升底氣象悽愴是能令人感動模様墟墓之間未施哀而民哀是也洋洋乎如在其上如在其左右正謂此德明昭明是光耀底焄蒿是滚上底悽愴是凛然底今或有人死氣盛者亦如此賜曾見人説有人死其室中皆温暖便是氣之散禮記云其氣發揚於上為昭明焄蒿悽愴此百物之精也昭明是精光焄蒿是暖氣悽愴是慘栗者如漢書李少君招魂云其氣肅然焄蒿是鬼神精氣交感處注家一處説升騰悽愴則漢武郊祀記所謂其風肅然或問今人聚數百人去祭廟必有些影響是如何曰衆心輻湊處這些便熱又問郊焉而天神假廟焉而人鬼享如何曰古時祭祀都是正無許多邪誕古人只臨時為壇以祭此心發處則彼以氣感纔了便散今人不合做許多神像只兀兀在這裏坐又有許多夫妻子母之屬如今神道必有一名謂之張太保李太保甚可笑自修賀孫同問昭明焄蒿悽愴之義如何曰此言鬼神之氣所以感觸人者昭明乃光景之屬焄蒿氣之感觸人者悽愴如漢書所謂神君至其風颯然之意廣問中庸或問取鄭氏説云口鼻之嘘吸者為魂耳目之精明者為魄先生謂此盖指血氣之類言之口鼻之噓吸是以氣言之耳目之精明是以血言之目之精明以血言可也耳之精明何故亦以血言曰醫家以耳屬腎精血盛則聽聰精血耗則耳聵矣氣為魂血為魄故骨肉歸於地隂為野土若夫魂氣則無不之也廣云是以易中説逰魂為變曰易中又却只説一邉精氣為物精氣聚則成物精氣散則氣為魂精為魄魂升為神魄降為鬼易只説那升者廣云如徂落之義則是兼言之曰然廣云今愚民於村落杜撰立一神祠合衆以禱之其神便靈曰可知衆心之所輻湊處便自暖故便有一箇靈底道理所以祭神多用血肉者盖要得藉他之生氣耳聞蜀中灌口廟一年嘗殺數萬頭羊州府亦頼此一項税羊錢用又如古人釁鐘釁龜之意皆是如此廣云人心聚處便有神故古人郊則天神格廟則人鬼享亦是此理曰固是但古人之意正故其神亦正後世人心先不正了故所感無由得正因言古人祭山川只是設壇位以祭之祭時便有祭了便無故不䙝瀆後世却先立箇廟貌如此所以反致惑亂人心倖求非望無所不至廣因言今日淫祠之非禮與釋氏之所以能服鬼神之類曰人心苟正表裏洞達無纎毫私意可以對越上帝則鬼神焉得不服故曰思慮未起鬼神莫知又曰一心定而鬼神服廣問其氣發揚於上為昭明焄蒿悽愴此百物之精也神之著也如何曰神氣屬陽故謂之人精魄屬隂故謂之鬼然方其生也而隂陽之理已附其中矣又曰今且未要理㑹到鬼神處大凡理只在人心此心一定則萬理畢見亦非能自見也心苟是矣試一察之則是是非非自然别得且如惻隱羞惡辭讓是非固是良心苟不存養則發不中節顛倒錯亂便是私心又問既加存養則未發之際不知如何曰未發之際便是中便是敬以直内便是心之本體又問於未發之際欲加識别使四者各有著落如何曰如何識别也只存得這物事在這裏便恁地涵養將去既熟則其發見自不差所以伊川説德無常師主善為師善無常主協於克一須是協一方得問善字不知主何而言曰這只主良心道夫問聖人凡言鬼神皆只是以理之屈伸者言也至言鬼神禍福凶吉等事亦只是以理言盖人與鬼神天地同此一理而理則無有不善人能順理則吉逆理則凶於其禍福亦然豈謂天地鬼神一一下降於人哉如書稱天道福善禍淫易言鬼神害盈而福謙亦只是這意思祭義宰我曰吾聞鬼神之名不知其所謂孔子曰氣也者神之盛也魄也者鬼之盛也又曰衆生必死死必歸土是之謂鬼骨肉斃於下隂為野土其氣發揚於上為昭明焄蒿悽愴百物之精神之著也魄既歸土此則不問其曰氣曰精曰昭明又似有物矣既只是理則安得有所謂氣與昭明者哉及觀禮運論祭祀則曰以嘉魂魄是謂合莫注謂莫無也又曰上通無莫此説又似與祭義不合曰如子所論是無鬼神也鬼神固是以理言然亦不可謂無氣所以先王祭祀或以燔燎或以鬰鬯以其有氣故以類求之爾至如禍福吉凶之事則子言是也謨哀公問哀公問中訪字去聲讀只是方字山東人呼方字去聲漢書中説文帝舅駟釣處上文云訪髙后時即山東音也其義只是方字按此篇無訪字乃録誤當攷僴仲尼燕居領惡全好楊至之記云領管領使之不得動又云領治也治去其惡也節孔子閒居禮記耆欲將至有開必先家語作有物將至其兆必先却是疑有物訛為耆欲其兆訛為有開故耆下日亦似有開上門亦似兆若説耆欲則又成不好底意義剛表記朝極辨不繼之以倦辨治也泳問君子莊敬日强是志强否曰志也强體力也强今人放肆則日怠惰一日那得强伊川云人莊敬則日就規矩莊敬自是耐得辛苦自不覺其日就規矩也㝢禮記與仁同過之言説得大巧失於迫切人傑問表記伊川曰禮記多有不純處如至孝近乎王至弟近乎覇直是可疑如此則王無兄覇無父也曰表記言仁有數義有長短大小此亦有未安處今且只得如注説去偽問鄉道而行中道而廢其意安在曰古人只恁地學將去有時到方子録作倒了也不定今人便筭時度日去計功效又問詩之正意仰字當重㸔夫子之言行字當重㸔曰不是髙山景行又仰箇什麽又行箇什麽髙山景行便是那仁至方子同深衣具父母衣純以青偏親既無明文亦當用青也繢者可以青純畫雲雲字見沈存中筆談必大深衣用䖍布但而今䖍布亦未依法當先有事其縷無事其布方未經布時先砑其縷非織了後砑也衣服當適於體康節向温公説某今人著今之服亦未是泳鄉飲酒鄉飲酒義三讓之義注䟽以為月三日而成魄魄三月而成時之義不成文理説倒了他和書哉生魄也不曾曉得然亦不成譬喻或云當作月三日而成明乃是泳鄉飲酒禮堂上主客列兩邉主人一拜客又答一拜又拜一拜又答一拜却不交拜又也皆北向拜不相對不知是如何某赴省試時衆士人拜知舉知舉受拜了却在堂上令衆人少立使人大喝云知舉答拜方拜二拜是古拜禮猶有存者近年問人則便已交拜是二三十年間此禮又失了賀孫明州行鄉飲酒禮其儀乃是髙抑崇撰如何不曾㸔儀禮只將禮記鄉飲酒義做這文字似乎編入國史實録果然是貽笑千古者也儀禮有拜迎拜至拜送拜既拜送謂迎賔拜至謂至階拜送謂既酌酒送酒也拜既卒爵而拜也此禮中四節如此今其所定拜送乃是送客拜兩拜客去又拜兩拜謂之拜既豈非大可笑禮既飲左執爵祭脯醢所以左執爵者謂欲用右手取脯醢從其便也他却改祭脯醢作薦脯醢自教一人在邊進脯醢右手自無用却將左手只管把了爵將右順便手却縮了是可笑否賀孫紹興初為鄉飲酒禮朝廷行下一儀制極乖陋此時乃髙抑崇為禮官㸔他為慎終喪禮是煞㸔許多文字如儀禮一齊都考得仔細如何定鄉飲酒禮乃如此踈繆更不識著儀禮只把禮記鄉飲酒義鋪排教人行且試舉一項如鄉飲酒文云拜至拜洗拜受拜送拜既拜至乃是賔升主人阼階上當楣北面再拜謝賔至堂是為拜至主人既洗酌卒洗升賔拜洗是為拜洗主人取爵實之獻賔賔西階上拜是為拜受若拜送乃是賔進受爵主人阼階上拜如今云送酒是為拜送爵賔復西階上位方有拜告㫖拜執爵及酢主人之禮他乃將拜送作送之門外再拜為拜送門外兩拜了又兩拜為拜既不知如何恁地不仔細拜既爵亦只是堂上禮又曰古禮㸔説許多節目若甚繁縟到得行時節只頃刻可了以舊時所行鄉飲酒㸔之煞見得不費時節又曰開元禮煞可看唯是五禮新儀全然不是當時做這文字時不曾用得識禮底人只是胡亂變易古文白撰全不考究天子乘車古者君車將駕則僕御執䇿立於馬前既効駕君雖未升僕御者先升則奮衣由右上以君位在左故避君空位五禮新儀却漏了僕人登車一項至駐車處却有僕人下車之文這是一處錯他處都錯了又云五禮新儀固未是至如今又皆不理㑹如朝報上云執綏官則是無僕人之禮古者執綏自是執綏僕人乃是受綏如何今却以執綏官代僕人兼古者有敬事則必式盖縁立於車上故憑衡式則是磬折是為致敬今却在車上用椅子坐則首與前衡髙下不多若憑手則是傲慢這般所在都不是如所謂僕人乃立於車柱之外後角又恐立不住却以采帛繫於柱上都不成模様兼前面乃以内侍二人立於兩旁是大非禮同子參乘袁絲變色豈有以内侍同載而前後皆安之眼前事纔拈一件起來勘當著所在便不成模様神宗嘗欲正此禮數王安石答以先理㑹得學問了這般事自有人出理㑹遂止如荆公門人陸農師自是煞能考禮渠後來却自不曾用他又曰婦人之拜據古樂府云出門長跪問故夫又云直身長跪余正父云周禮有肅拜恐只是如今之俯首加敬而已不知夫人如何喪禮婦人唯舅之䘮則跪拜於他人又不知其拜如何古禮殘闕這般所在皆無可考賀孫鄉射與為人後者不入與為人後者謂大宗已有後而小宗復為之後却無意思因言李光祖嘗為人後其家甚富其父母死竭家貲以葬之而光祖遂至於貧雖不中節然意思却好人傑射中則得為諸侯不中則不得為諸侯此等語皆難信書謂庶頑讒説侯以明之然中間若有羿之能又如何以此分别恐大意略以射審定非專以此去取也賀孫射觀德擇人是凡與射者皆賢者可以助祭之類但更以射擇之如卜筮決事然其人賢不肖不是全用射擇之也小人更是㑹射今俗射有許多法與古法多少别小人儘㑹學後之説者説得太過了謂全用此射以擇諸侯并助祭之人非也大率禮家説話多過了無殺合揚拾遺古人祭酒於地祭食於豆間有版盛之卒食撤去人傑有體有俎祭享體半邉也俎以骨為斷卓木豆為豆銅豆為登登本作證道夫几是坐物有可以按手者如今之三清椅明作門是外門雙扇户是室中之户隻扇觀儀禮中可見義剛王出户則宗祝隨之出門則巫覡隨之文蔚天子視學以齒嘗為臣者弗臣或疑此句未純恐其終使人不臣如蔡卞之扶植王安石也曰天子自有尊師重道之意亦豈可遏只為蔡卞是小人王安石未為大賢蔡卞只是扶他以證其邪説故喫人議論如了翁論他也是若真有伊周之德雖是故臣稍加尊敬亦何害天子入學父事三老兄事五更便是以齒不臣之也如或人之論則廢此禮可也朱子語類卷八十七
