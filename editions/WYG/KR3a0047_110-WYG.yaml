body:
  text: 朱子語類卷一百十朱子七論兵今州郡無兵無權先王之制内有六鄉六遂都鄙之兵外有方伯連帥之兵内外相維緩急相制賀孫本强則精神折衝不强則招殃致凶僴或言古人之兵當如子弟之衛父兄而孫吴之徒必曰與士卒同甘苦而後可是子弟必待父兄施恩而後報也先生曰廵而拊之三軍之士皆如挾纊此意也少不得賀孫木之同凡為守帥者止教閲将兵足矣程其年力汰斥癃老衰弱招補壮徤足可為用何必更添寨置軍其間衣糧或厚或薄遂致偏廢如此間将兵則皆差出接送矣方子辛棄疾頗諳曉兵事云兵老弱不汰可慮向在湖南收茶冦令統領揀人要一可當十者押得來便看不得盡是老弱問何故如此云只揀得如此間有稍壮者諸處借事去州郡兵既弱皆以大軍可恃又如此為今之計大叚著揀汰但所汰者又未有頓處某向見張魏公説以分兵殺敵之勢只縁敵人調發極難完顔要犯江南整整兩年方調發得聚彼中雖是號令簡無此間許多周遮但彼中人纔逼廹得太急亦易變所以要調發甚難只有㳂淮有許多捍禦之兵為吾之計莫若分幾軍趨闗陜他必擁兵於關陜又分幾軍向西京他必擁兵於西京又分幾軍望淮北他必擁兵於淮北其他去處必空弱又使海道兵擣海上他又著擁兵捍海上吾宻揀精兵幾萬在此度其勢力既分於是乘其稍弱處一直收山東虜人首尾相應不及再調發來添助彼卒未聚而吾已據山東纔據山東中原及燕京自不消得大叚用力盖精鋭萃於山東而敵勢已截成兩叚去又先下明詔使中原豪傑自為響應是時魏公答以某只受一方之命此事恐不能主之蔡云今兵政如此終當如何曰湏有道理蔡曰莫著改更法制曰這如何得如同父云将今法制重新洗換一番方好某看來若便使改換得井牧其田民皆為兵若無人統率之其為亂道一也然則如之何曰只就這腔裏自有道理這極易只呼吸之間便可以弱為强變怯為勇振柔為剛易敗為勝直如反掌耳賀孫先生云當今要復太祖兵法方可復中原又云諸州禁軍皆不可用幾年説要揀冗兵但只説得各圖苟且安便無有為者故新者來舊者又不去來而又來相将積得皆不可用如澄冗官見這人不可用便除一人而今不可用者又復留而不去故軍冗不練官冗不澄夀昌問今日之軍政只有君相上下一心揀之又揀如太祖時方好曰只有揀練便用太祖時即用如揀而飬十數年又老了依舊無用揚今兵官愈多兵愈不精道夫今日兵不濟事兵官不得人專務刻削兵且驕弱安飬不知勞苦一旦如何用某嘗言宜散京師之兵却練諸郡之兵依太祖法毎年更戍䟎去淮上衛邊謂如福建之兵䟎去饒州饒州之兵䟎去衢信衢信䟎去行在迤邐䟎去淮上今年如此明年又䟎去則京師全無飬兵之費豈不大好㦛言今兵政之弊曰唐制節度兵觀察財處置等使即節鎮也使持節某州諸軍事兵某州刺史民即支郡也支郡𨽻於節鎮而節鎮支郡各有衙前左右押衙管軍都頭並掌兵事又皆是士人為之其乆則根勢深固反視節度有客主之勢至有誅逐其上而更代為之凡陸梁䟦扈之事因兹而有惟是節度得人方能率服人心歸命朝廷若論唐初兵力最盛斥地最廣乃在於統兵者簡約而無牽制之患然自唐末大抵節鎮之患深如人之病外强中乾其勢必有以通其變而後可故太祖皇帝知其病而䟽理之於是削其支郡以斷其臂指之勢當時至有某州某縣直𨽻京師而不屬節度者置通判以奪其政命都監監押以奪其兵立倉場庫務之官以奪其財向之所患今皆無憂矣其後又有路分鈐轄緫管等員神宗時又增置三十七将亂離之後又有都統統領統制之名大抵今日之患又却在於主兵之員多朝廷雖知其無用姑存其名日費國家之財不可勝計又刻剥士卒使士卒困怨於下若更不變而通之則其害未艾也要之此事但可責之郡守他分明謂之郡将若使之練習士卒修治器甲築固城壘以為一方之守豈不隠然有備而可畏古人謂生之者衆食之者寡為之者疾用之者舒今一切反之道夫問後世雖飬長征兵然有緩急依舊徴發於民終是離民兵不得兼長征兵終不足靠如杜子美石壕吏詩可見曰自秦漢以下至六朝皆未有長征兵都是徴發於民及唐府衛法壊然後方有長征兵因論荆襄義勇州縣官吏反擾之當時朝廷免徴科官吏不得役使今徴科既不得免民反倍有所費又官吏役使如故曰某當初見劉共父説他制得義勇極好且是不屬官吏官不得擾之某應之曰無縁有不屬州縣之理固疑其末流如此僴兵甲詭名不可免善兵者亦不於此理㑹纔有一人可用便令其兼數人之料軍中若無此便不足以使人故朝廷只是擇将以其全數錢米與之只責其成功不來此屑屑計較近來刮刷得都盡朝廷方以為覈實得好先生云聞前軰云云揚兵法以能分合為變不獨一陣之間有分合天下之兵皆然今日之兵分者便不可合合者便不可分本朝舊來只郡國禁兵而已但在西北者差精鋭耳渡江後又添上御前軍却是張韓軰自起此項兵後來既不可得而去只得如此聚屯今以不如祖宗時財賦飬祖宗時所無之兵安得不窮也􅓌唐時州縣上供少故州縣富兵在藩鎮朝廷無甚養兵之費自本朝罷了藩鎮州郡之財已多歸於上熈豐間又令州郡見看軍額幾人折了者不得補却以其費椿管上供而朝廷得錢物甚多今天下兵約四五十萬又皆羸弱無用之人所費不可計今若要理㑹湏從此起揚論財賦曰財用不足皆起於飬兵十分八分是飬兵其他用度止在二分之中古者刻剥之法本朝皆備所以有靖康之亂已前未有池揚江鄂之兵止謂張宣撫兵某人兵今増添許多兵合當精練禁兵汰其老弱以為廂兵節今朝廷盡力飬兵而兵常有不足之患自兵農既分之後計其所費却是無日不用兵也時舉今天下財用費於飬兵者十之八九一百萬貫飬一萬人此以一歲計僴今日民困正縁㳂江屯兵費重只有屯田可減民力見説襄漢間儘有荒地某云當用甚人耕墾曰兵民兼用各自為屯彼地沃衍收榖必多若做得成敵人亦不敢窺伺兵民得利既多且耕且戰便是金城湯池兵食既足可省漕運民力自蘇然後盡驅州郡所飬歸明北軍徃彼就食則州郡自寛遲之十年其效必著湏是擇帥既得其人專一委任許令辟召寮屬同心措置勿數更易庶幾有濟浩屯田范伯達有文字説淮上屯田湏與畫成一井中為公田以給軍令軍中子弟分耕取公田所入以給軍徳明因言淮上屯田前此朝廷嘗差官理㑹其人到彼都不曽敢起人所閒者却只令人築起㳂江門地以為屯此亦太不立大抵世事湏是出來擔當不可如此放倒人是天地中最靈之物天能覆而不能載地能載而不能覆恁地大事聖人猶能裁成輔相之况於其他因舉齊景公答夫子君君臣臣之語又與晏子言美哉室之語皆放倒説話且如五代時兵驕甚矣周世宗髙平一戰既敗却忽然誅不用命者七十餘人三軍大振遂復合戰而克之凡事都要人有志壮祖屯田湏是分而屯之統帥屯某州緫司屯甚州漕司屯甚州以户部尚書為屯田使使各考其所屯之多少以為殿最則無不可行者今則不然毎欲行一文字則經由數司僉押相牽制事何由成道夫趙昌父相見因論兵事先生曰兵以用而見其强弱将以用而見其能否且如本朝諸公游陜西者多知邊事此亦是用兵之故今日諸生坐於屋下何以知其能縱有韓白復生亦何由辨之可學擇将帥問選擇将帥之術曰當無事之時欲識得将湏是具大眼力如蕭何識韓信方得不然邊警之時兩兵相抗恁時人才自急且如國家中興張韓劉岳突然而出豈平時諸公所嘗識者不過事期到此厮拶出來耳道夫不令宦官賣統軍官職是今日軍政第一義方今日将官全無意思只似人家驕子弟了襃衣博帶談道理説詩書冩好字事發遣如此何益於事謙今諸道帥臣只曽作一二任監司即以除之有警則又欲其親督戰士此最不便萬一為賊所虜為之奈何彼固不足䘏然失一帥其勢豈不張大前軰謂祖宗用帥取以二路一是曽歴邊郡一是帥臣子弟曽諳兵事者此最有理或謂戎幕宜用文武三四員此意亦好盖經歴知得此等利害向後皆可為帥然必湏精選而任不可泛濫也道夫或問諸公論置二大帥以統諸路之帥如何曰不消如此只是擇得一箇人了君相便專意委任他却使之自擇參佐事便歸一今若更置大帥以監臨之少間必有不相下之意徒然紛擾湏是得一箇人委任他聴他自漸漸理㑹許多軍政将來自有條理恪蜀逺朝廷萬有餘里擇帥湏用嚴毅素有威名足以畏壓人心則喜亂之徒不敢作矣道夫或問古今治亂者先生言古今禍亂必有病根漢宦官后戚唐藩鎮皆病根也今之病根在歸正人忽然放教他來州縣如何奈得他何所幸老者已死少者無彼中人氣象似此間人一般無能為矣謙邊防馬政甚弊廬州舊夾肥水而城今只築就一邊揚論刑天下事最大而不可輕者無過於兵刑臨陳時是胡亂錯殺了幾人所以老子云夫佳兵者不祥之器聖人不得已而用之獄訟面前分曉事易看其情偽難通或旁無佐證各執兩説繫人性命處湏喫緊思量猶恐有誤也僴論刑云今人説輕刑者只見所犯之人為可憫而不知被傷之人尤可念也如刼盜殺人者人多為之求生殊不念死者之為無辜是知為盜賊計而不為良民地也若如酒税偽㑹子及飢荒竊盜之類猶可以情原其輕重大小而處之時舉今之法家惑於罪福報應之説多喜出人罪以求福報夫使無罪者不得直而有罪者得倖免是乃所以為惡爾何福報之有書曰欽哉欽哉惟刑之恤哉所謂欽恤者欲其詳審曲直令有罪者不得免而無罪者不得濫刑也今之法官惑於欽恤之説以為當寛人之罪而出其死故凡罪之當殺者必多為可出之塗以俟奏裁則率多減等當斬者配當配者徒當徒者杖當杖者笞是乃賣弄條貫舞法而受賕者耳何欽恤之有罪之疑者從輕功之疑者從重所謂疑者非法令之所能決則罪從輕而功從重惟此一條為然耳非謂凡罪皆可以從輕而凡功皆可以從重也今之律令亦有此條謂法所不能決者則俟奏裁今乃明知其罪之當死亦莫不為可生之塗以上之惟夀皇不然其情理重者皆殺之僴李公晦問恕字前軰多作愛人意思説如何曰畢竟愛人意思多因云人命至重官司何故斬之於市盖為此人曽殺那人不斬他則那人之寃無以伸這愛心便歸在被殺者一邊了然古人罪疑惟輕與其殺不辜寧失不經雖愛心只在被殺者一邊却又溢出這一邊些子佐朱子語類卷一百十
