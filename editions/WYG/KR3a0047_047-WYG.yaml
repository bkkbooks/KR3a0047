body:
  text: 朱子語類卷四十七論語二十九陽貨篇陽貨欲見孔子章或問陽貨矙亡以饋孔子孔子矙亡而徃拜之陽貨之矙亡此不足責如孔子亦矙亡而徃則不幾於不誠乎曰非不誠也據道理合當如此彼人矙亡來我亦矙亡徃一徃一來禮甚相稱但孔子不幸遇諸塗耳去偽亞夫問揚子雲謂孔子於陽貨敬所不敬為詘身以信道不知渠何以見聖人為詘身處曰陽貨是惡人本不可見孔子乃見之亦近於詘身却不知聖人是理合去見他不為詘矣到與他說話時只把一兩字答他辭氣温厚而不自失非聖人㫁不能如此也時舉性相近章性相近以氣質言性善以理言祖道問性相近是本然之性是氣質之性曰是氣質之性本然之性一般無相近程子曰性與聖不可一概論節性相近唤做近便是兩箇物事這便是說氣質之性若是降衷底便是没那相近了箇箇都只一般佐性相近是通善惡智愚說上智下愚是就中摘出懸絶者說僴問性相近習相逺惟上智與下愚不移書中謂惟聖罔念作狂惟狂克念作聖又有移得者如何曰上智下愚不移如狂作聖則有之既是聖人決不到得作狂此只是言其人不可不學又問或言人自不移耳此說如何曰此亦未是有一般下愚底人直有不可移者問雖愚必明又是如何曰那箇是做甚次第工夫人一能之已百之人十能之已千之去偽問此章曰此所謂性亦指氣質之性而言性習逺近與上智下愚本是一章子曰二字衍文也蓋習與性成而至於相遠則固有不移之理然人性本善雖至惡之人一日而能從善則為一日之善人夫豈有終不可移之理當從伊川之說所謂雖强戾如商辛之人亦有可移之理是也謨先生問木之前日所說氣質之性理㑹得未對曰雖知其說終是胷中未見得通透兼集註上智下愚章先生與程子說未理會得合處曰便是莫要只管求其合且㸔聖人所說之意聖人所言各有地頭孔子說相近至不移便定是不移了人之氣質實是有如此者如何必說道變得所以謂之下愚而其所以至此下愚者是怎生這便是氣質之性孔子說得都渾成伊川那一段却只說到七分不說到底孟子却只說得性善其所言地頭各自不同正如今喫茶相似有喫得盡底有喫得多底少底必要去牽合便成穿鑿去木之問集註謂氣質相近之中又有一定而不可易者復舉程子無不可移之說似不合曰且㸔孔子說底如今却自有不移底人如堯舜之不可為桀紂桀紂之不可使為堯舜夫子說底只如此伊川却又推其說須知其異而不害其為同因說氣化有不可曉之事但終未理會得透不能無疑釋氏之學只是定静少間亦自有明識處或問他有靈怪處是如何曰多是真偽相雜人都貪財好色都重死生却被他不貪財不好色不重死生這般處也可以降服得鬼神如六祖衣鉢說移不動底這只是胡說果然如此何不鳴鼔集衆白晝發去却夜間發去做甚麽曰如今賢者都信他向上底說下愚人都信他禍福之說曰最苦是世間所謂聰明之人却去推演其說說到神妙處如王介甫蘇東坡一世所尊尚且為之推波助瀾多矣今若得士大夫間把得論定猶可耳木之子之武城章問君子學道則愛人小人學道則易使曰君子學道是曉得那已欲立而立人已欲達而達人與乾稱父坤稱母底道理方能愛人小人學道不過曉得孝弟忠信而已故易使也燾公山弗擾章夫子曰吾其為東周乎興東周之治也孔子之志在乎東周然苟有用我者亦是天命如何爾聖人胷中自有處置非可執定本以議之也人傑問吾其為東周乎使聖人得行其志只是就齊魯東方做起否曰也只得就這裏做又問其如周何曰這般處難說只㸔挨到臨時事勢如何若使天命人心有箇響合處也自不由聖人了使周家修其禮物作賔於王家豈不賢於赧王之自獻其邑而滅亡乎問孔子猶說著周至孟子則都不說了曰然只是當時六國如此强盛各自擡夯得箇身已如此大了勢均力敵如何地做不知孟子奈何得下奈何不下想得也須滅一兩箇方做得㸔来六國若不是秦始皇出來從頭打疊一番做甚合殺問王者雖曰不殺一不辜行一不義事勢到不得已處也只得如此做曰然湯東征西怨南征北怨武王滅國五十便是如此只是也不唤做殺不辜行不義我這裏方行仁義之師救民於水火之中你却抗拒不服如何不伐得聖人做處如此到得後來都不如此了如劉先主不取劉琮而取劉璋更不成舉措當初劉琮孱弱為曹操奪而取之若乘此時明劉琮之孱弱將為曹操所圖起而取之豈不正當到得臨了却淬淬地去取劉璋全不光明了當初孔明便是教他先取荆州他却不從或曰終是先主規模不大索性或進或退所以終做事不成曰然又曰唐太宗殺諸盗如竇建徳猶自得而殺之惟不殺王世充後却宻使人殺之便不成舉措蓋當初王世充立越王於東都髙祖立代王於闗中皆是叛煬帝立少主以輔之事體一般故髙祖負愧而不敢明殺世充也此最好笑負些子曲了更擡頭不起又曰漢髙祖之起與唐太宗之起不同髙祖是起自匹夫取秦所以無愧唐却是為隋之官因其資而取之所以負愧也要之自秦漢而下須用作兩節㸔如太宗都莫㸔他初起一節只取他濟世安民之志他這意思又却多若要檢㸃他初起時事更不通㸔或曰若以義理㸔太宗更無三兩分人曰然僴問諸家皆言不為東周集注却言興周道於東方何如曰這是古注如此說其字乎字只是閒字只是有用我者我便也要做些小事如釋氏言竿木隨身逢場作戯相似那處是有不為東周底意這與二十年之後呉其為沼乎辭語一般亦何必要如此翻轉文字須寛㸔仔細玩味方見得聖人語言如小人之中庸分明這一句是解上文人見他偶然脱一箇反字便恁地硬說去小人中庸做小人自為中庸下面文勢且直解兩句未有那自以為中庸底意亦何必恁地翻轉㝢問公山弗擾果能用夫子夫子果徃從之亦不過勸得他改過自新舎逆從順而已亦如何能興得周道曰便是理會不得良乆却曰聖人自不可測且是時名分亦未定若謂公山弗擾既為季氏臣不當畔季氏所謂改過者不過令其臣順季氏而已此只是常法聖人須别有措置問如此則必大有所更張否曰聖人做時須驚天動地然卒於不徃者亦料其做不得爾夫子為魯司冦齊人來歸女樂夫子便行以人情論之夫子何不畧說令分曉却只黙黙而去此亦不可曉處且說齊人歸女樂夫子所以便行者何也說論語者謂受女樂則必怠於政事然以史記觀之又以夫子懼其䜛毁而去如曰彼婦之口可以出走是以魯仲連論帝秦之害亦曰彼又將使其子女䜛妾為諸侯妃處梁之宫梁君安得晏然而已乎想當時列國多此等事夫子不得不星夜急走又曰夫子墮三都亦是瞞著三家了做如季氏已墮術中及圍成公歛處父不肯曰若無成是無孟氏也遂連季氏唤醒夫子亦便休且說聖人處事何故亦有做不成者必大以夫子之得邦家為對曰有土有民便伸縮在我若靠他人則只是羇旅之臣若不見信用便只得縮手而退又曰陽虎云吾欲張公室也人曰家臣而欲張公室罪莫大焉此是當時一種議論必大人傑錄頗異别出伯豐問夫子欲從公山之召而曰如有用我者吾其為東周乎如何曰理㑹不得便是不可測度處人傑問墮三都事費郈已墮而成不可墮是不用夫子至於此否曰既不用却何故圍成當時夫子行乎季孫三月不違則費郈之墮出於不意及公歛處父不肯墮成次第喚醒了叔季二家便做這事不成又齊人以女樂歸之遂行不然當别有處置也問女樂既歸三日不朝夫子自可明言於君相之前討箇分曉然後去亦未晩何必匆遽如此曰此亦難曉然據史記之說却是夫子恐其害己故其去如此之速魯仲連所謂秦將使其子女讒妾為諸侯妃則當時列國蓋有是事也又云夫子能墮費郈而不能墮成雖聖人亦有做不成底事伯豐謂如夫子之得邦家者所謂立之斯立云云曰固是須是有土有民方能做得若羇旅之臣靠着他人便有所牽制做事不成又問是時三家衰㣲陪臣執命故陽虎奔齊有吾欲張公室之語或謂家臣而欲張公室罪莫大焉曰便是當時有此一種議論視大夫專命以為固然又問舊見人議論子産叔向輩之賢其議論遠過先軫舅犯之徒然事實全不及他曰如元祐諸臣愛說一般道理相似又云衛靈公最無道夫子何故戀戀其國有欲扶持之意更不可曉人傑子張問仁章問恭寛信惠固是求仁之方但敏字於求仁工夫似不甚親切莫是仁之為事才悠悠則此心便間㫁之時多亦易得走失若能勤敏去做便此心不至間㫁走失之時少故敏亦為求仁之一是如此否曰不止是悠悠蓋不敏於事則便有怠忽之意才怠忽便心不存而間㫁多便是不仁也時舉或問信則人任焉曰任是人靠得自家如謂任俠者是能為人擔當事也燾任是堪倚靠僴佛肸召章焉能繫而不食古注是㽦夫子於佛肸之召但謂其不能凂我而已於公山之召却真箇要去做必大味道問佛肸與公山弗擾召孔子孔子欲徃此意如何曰此是二子一時善意聖人之心適與之契所以欲徃然更思之則不徃矣蓋二子暫時有尊賢向善之誠心故感得聖人欲徃之意然違道叛逆終不能改故聖人亦終不徃也譬如重隂之時忽畧開霽有些小光明又被重隂遮閉了曰陽貨欲見孔子却終不許他是如何曰陽貨全無善意來時便已不好了故亦不能畧感聖人也時舉賀孫録詳别出聖人見萬物不得其所皆陷於塗炭豈不為深憂思欲出而救之但時也要出不得亦只得且住聖人於斯世固不是苟且枉道以徇人然世俗一種說話便謂聖人泊然不以入其心這亦不然如孔子云天下有道丘不與易也這箇是十分要做不得亦有不能自已之意如說聖人無憂世之心固不可謂聖人視一世未治常恁戚戚憂愁無聊過日亦非也但要出做不得又且放下其憂世之心要出仕者聖人愛物之仁至於天命未至亦無如之何如云君子之仕也行其義也道之不行已知之矣若就道之不行已知之矣上㸔恰似一向没理會明知不可以行道且漫去做㸔這便不得須㸔行其義也便自是去就出處之大義亦在這裏賀孫因舉公山佛肸之召皆欲徃而終不徃者度得是時終不可為其人終不可與有為如南軒云守身之常法體道之大權又云欲徃者愛物之仁終不徃者知人之智這處說得分明曰然但聖人欲徃之時是當他召聖人之時有這些好意來接聖人聖人當時亦接他這些好意思所以欲徃然他這箇人終是不好底人聖人待得重理會過一番他許多不好又只在所以終於不可去如隂雨蔽翳重結不解忽然有一處畧畧開霽雲收霧斂見得青天白日這處自是好賀孫子曰由也章問好信不好學其蔽也賊曰只為不擇是我要恁地便恁地終是害事燾楊問好信不好學何故便到賊害於物處曰聖人此等語多有相類如恭而無禮則勞處一般此皆是就子路失處正之昔劉大諫從温公學溫公教之誠謂自不妄語始劉公篤守其說及調洛州司法時運使呉守禮至州欲按一司户贓以問劉公公對以不知吳遂去而公常心自不足謂此人實有贓而我不以誠告其違溫公教乎後因讀楊子避礙通諸理始悟那處有礙合避以通之若只好信不好學固守不妄語之說直說那人有贓其人因此得罪豈不是傷害於物李謂亦有自賊之理淳道夫録云問好信不好學如何便至於相賊害曰其父攘羊而子證之是也昔劉忠定云云六言六蔽五美等話雖其意亦是然皆不與聖人常時言語一様家語此様話亦多大抵論語後數篇間不類以前諸篇淳問集注云剛者勇之體勇者剛之發曰春秋傳云使勇而無剛者嘗冦則勇者發見於外者也人傑謂以五常揆之則專言勇者勇屬於義言剛柔則剛屬於仁曰便是這箇物事㸔他用處如何不可以一定名之揚子雲說君子於仁也柔於義也剛亦只是一說人傑謂以仁為柔以義為剛止說得箇情狀體段耳曰然人傑小子何莫學夫詩章問詩如何可以興曰讀詩見其不美者令人羞惡見其美者令人興起節子謂伯魚章問為周南召南曰為字如固哉髙叟之為詩之為只是謂講論爾横渠所謂近試令家人為周南召南之事不知其如何地為必大亞夫問不為周南召南其猶正牆面而立曰不知所以修身齊家則不待出門便已動不得了所以謂之正牆面者謂其至近之地亦行不得故也時舉問正牆面而立曰修身齊家自家最近底事不待出門便有這事去這箇上理㑹不得便似那當牆立時眼既無所見要動也行不去植問先生解正牆面而立曰言即其至近之地而一物無所見一歩不可行人若不知修身齊家則自然推不去是一歩不可行也如何是一物無所見曰自家一身一家已自都理㑹不得又況其逺者乎問此可見知與行相須之義否曰然廣明道謂二南人倫之本王化之基苟不為之其猶正牆面而立是才出門便不知便錯了士毅色厲内荏章問色厲而内荏何以比之穿窬曰為他意只在要瞞人故其心常怕人知如做賊然大雅不直心而私意如此便是穿窬之類又云裏面是如此外面却不如此外面恁地裏面却不恁地燾鄉原徳之賊章李問鄉原徳之賊曰最是孟子說得數句好曰生斯世也為斯世也善斯可矣此是鄉原本情雉或問鄉原引荀子愿慤之說何也曰鄉原無甚見識其所謂愿亦未必真愿乃卑陋而隨俗之人耳義剛云去冬請問鄉愿比老子如何䝉賜教謂老子害倫理鄉原却只是箇無見識底人今春又問色取仁而行違比鄉愿如何䝉賜教謂色取仁而行違底是大拍頭揮人鄉原是不做聲不做氣做罪過底人深玩二說㣲似不同先生笑云便是世間有這一般半間不界底人無見識不顧理之是非一味謾人㸔時也似是箇好人然背地裏却乖却做罪過義剛敬之問鄉原徳之賊曰鄉原者為他做得好便人皆稱之而不知其有無窮之禍如五代馮道者此真鄉原也本朝范質人謂其好宰相只是欠為世宗一死爾如范質之徒却最敬馮道輩雖蘇子由議論亦未免此本朝忠義之風却是自范文正公作成起来也時舉問鄉原一章曰此章賊字棄字說得重而有力蓋鄉原只知偷合苟容似是而非而人皆稱之故曰徳之賊道聴塗說者纔聴來便說了更不能蓄既不能有之於心不能行之於身是棄其徳也故曰徳之棄必大古者民有三疾章問古之矜也廉曰亷是側邊廉隅這側是那分處所謂廉者為是分得那義利去處譬如物之側稜兩下分去植惡紫之奪朱章問紫之奪朱曰不但是易於惑人蓋不正底物事自常易得勝那正底物事且如以朱染紫一染了便退不得朱却不能變得紫也紫本亦不是易惑人底只為他力勢大了便易得勝又如孔子云惡莠之亂苗莠又安能惑人但其力勢易盛故苗不能勝之耳且一邦一家力勢也甚大然被利口之人說一兩句便有傾覆之患此豈不可畏哉時舉紫近黒色蓋過了那朱既為紫了便做朱不得便是奪了元只是一箇色做出來紫是過則箇鄭雅也只是一箇樂雅較平淡鄭便過而為淫哇蓋過了那雅便是亂雅植問范氏謂天下之理正而勝者常少不正而勝者常多曰此當以時運言之譬如一日與人一生能有幾多好底時節廣予欲無言章問予欲無言一章恐是言有所不能盡故欲無言否曰不是如此只是不消得說蓋已都撒出來了如四時行焉百物生焉天又更說箇甚底若是言不能盡便是有未盡處聖人言處也盡做處也盡動容周旋無不盡惟其無不盡所以不消得說了燾先生問林擇之天何言哉四時行焉百物生焉此三句何句較好對曰四時行百物生二句好先生因說擇之㸔得是只四時行百物生所謂天何言哉已在其中矣徳問尹氏之說曰尹氏自說得不緊要了又辨其不緊要話愈更不緊要矣必大孺悲欲見孔子章先生云南康一士人云聖賢亦有不誠處如取瑟而歌出弔東郭之類說誠不如只說中某應之曰誠而中君子而時中不誠而中小人之無忌憚閎祖宰我問三年之喪章問鑽燧改火直卿曰若不理㑹細碎便無以盡精微之義若一向細碎去又無以致廣大之理曰須是大細兼舉淳問宰我問三年之喪為自居喪時問或為大綱問也曰必是他居喪時問成布曰成布是稍細成布初來未成布也問縓縁曰縓今淺絳色小祥以縓為縁㸔古人小祥縓縁者不入謂縓禮有四入之說亦是漸漸加深色耳然古人亦不專把素色為凶蓋古人常用皮弁皮弁純白自今言之則為大凶矣劉問布升數曰八十縷為一升古尺一幅只濶二尺二寸算來斬衰三升如今網一般又云如今漆布一般所以未為成布也如深衣十五升布似如今極細絹一般這處升數又曉未得古尺大短於今尺若盡一千二百縷須是一幅濶不止二尺二寸方得如此所謂布帛精麤不中數不鬻於市又如何自要濶得這處亦不可曉㝢亞夫問宰我問短喪處曰此處聖人責之至嚴植録云聖人尋常未嘗輕許人以仁亦未嘗絶人以不仁所謂予之不仁者便謂他之良心已死了也前輩多以他無隱於聖人而取之蓋無隱於聖人固是他好處然却不可以此而掩其不仁之罪也時舉飽食終日章問飽食終日無所用心難矣哉心體本是運動不息若頃刻間無所用之則邪僻之念便生聖人以為難矣哉言其至危而難安也曰心若有用則心有所主只㸔如今纔讀書心便主於讀書纔冩字心便主於冩字若是悠悠蕩蕩未有不入於邪僻賀孫君子尚勇乎章子路之勇夫子屢箴誨之是其勇多有未是處若知勇於義知大勇則不如此矣又其勇有見得到處便行將去如事孔悝一事却是見不到蓋不以出公之立為非觀其謂正名為迂斯可見矣人傑㽦録若是勇於義已不仕季氏君子亦有惡乎章問惡勇而無禮者惡果敢而窒者勇與果敢如何分曰勇是以氣加人故易至於無禮果敢是率然敢為蓋果敢而不窒則所為之事必當於理窒而不果敢則於理雖不通然亦未敢輕為惟果敢而窒者則不論是非而率然妄作此聖人所以惡之也時舉朱子語類卷四十七
