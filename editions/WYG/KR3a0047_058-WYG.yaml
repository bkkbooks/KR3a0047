body:
  text: 朱子語類卷五十八孟子八萬章上問舜徃于田章并下章黄先之説舜事親處見得聖人所以孝其親者全然都是天理略無一毫人欲之私所以舉天下之物皆不足以解憂惟順於父母可以解憂曰聖人一身渾然天理故極天下之至樂不足以動其事親之心極天下之至苦不足以害其事親之心一心所慕惟知有親看是甚麽物事皆是至輕施於兄弟亦然但知我是兄合當友愛其弟更不問如何且如父母使之完廪待上去又捐階焚廪到得免死下来當如何父母教他去浚井待他入井又従而掩之到得免死出来又當如何若是以下等人處此定是喫不過非獨以下人雖平日極知當孝其親者到父母以此施於己此心亦喫不過定是動了象為弟日以殺舜為事若是别人如何也須與他理㑹也須喫不過舜只知我是兄惟知友愛其弟那許多不好景象都自不見了這道理非獨舜有之人皆有之非獨舜能為人人皆可為所以大學只要窮理舜明於庶物察於人倫唯是於許多道理見得極盡無有些子未盡但舜是生知不待窮索如今須着窮索教盡莫説道只消做六七分那兩三分不消做盡也得賀孫林子淵説舜事親處曰自古及今何故衆人都不㑹恁地獨有舜恁地是何故須就這裏剔抉看出来始得黙然乆之曰聖人做出純是道理更無些子隔礙是他合下渾全都無欠闕衆人却是已虧損了須加脩治之功如小學前面許多恰似勉强使人為之又須是恁地勉強到大學工夫方知箇天理當然之則如世上固是無限事然大要也只是幾項大頭項如為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信須看見定是着如此不可不如此自家何故却不如此意思如何便是天理意思如何便是私慾天理發見處是如何却被私慾障蔽了賀孫叔噐問舜不能掩父母之惡如何是大孝曰公要如何與他掩他那箇頑嚚己是天知地聞了如何得掩公須與他思量得箇道理始得如此便可以責舜義剛問象憂亦憂象喜亦喜事曰象謀害舜者舜隨即化了更無一毫在心但有愛象之心常有今人被弟激惱便常以為恨而愛弟之心減少矣舜誠信而喜象周公誠信而任管叔此天理人倫之至其用心一也燾象日以殺舜為事章或問仁之至義之盡是仁便包義何如曰自是兩義如舜封象于有庳不藏怒宿怨而富貴之是仁之至使吏治其國而納其貢稅是義之盡因舉明皇長枕大被欲為仁而非仁云云賀孫不知何氏録詳别出仁與義相拗禮與智相拗問云須是仁之至義之盡方無一偏之病曰雖然如此仁之至自是仁之至義之盡自是義之盡舜之於象便能如此封之有庳富貴之也便是仁之至使吏治其國而納其貢賦便是義之盡後世如景帝之於梁王始則縦之太過不得謂之仁後又窘治之甚峻義又失之皆不足道唐明皇於諸王為長枕大衾雖甚親愛亦是無以限制之無足觀者舜之於象是平日見其不肖故處之得道封之有庳但富貴之而已周公於管蔡又别盖管蔡初無不好㡳心後来被武庚煽惑至此使先有此心周公必不使之也燾咸丘蒙問章以意逆志此句最好逆是前去追迎之之意盖是将自家意思去前面等候詩人之志来又曰謂如等人来相似今日等不来眀日又等須是等得来方自然相合不似而今人便将意去捉志也燾董仁叔問以意逆志曰此是教人讀書之法自家虚心在這裏看他書道理如何来自家便迎接将来而今人讀書都是去捉他不是逆志學䝉董仁叔問以意逆志曰是以自家意去等候他譬如有一客来自家去迎他他来則接之不来則已若必去捉他来則不可盖卿問堯以天下與舜章董仁叔問堯薦舜於天曰只是要付他事看天命如何又問百神享之曰只隂陽和風雨時便是百神享之佐問百神享之云如祈晴得晴祈雨得雨之類盖卿問人有言章荘仲問莫之致而至者命也曰命有兩般得之不得曰有命自是一様天命之謂性又自是一様雖是兩様却只是一箇命文蔚問得之不得曰有命是所賦之分天命之謂性是所賦之理曰固是天便如君命便如命令性便如職事條貫君命這箇人去做這箇職事其俸禄有厚薄歳月有逺近無非是命天之命人有命之以厚薄修短有命之以清濁偏正無非是命且如舜禹益相去乆逺是命之在外者其子之賢不肖是命之在内者聖人窮理盡性以至於命便能賛化育堯之子不肖他便不傳與子傳與舜夲是箇不好底意思却被他一轉轉得好文蔚問莫之致而至者命也如比干之死以理論之亦可謂之正命若以氣論之恐非正命曰如何恁地説得盡其道而死者皆正命也當死而不死却是失其正命此等處當活看如孟子説桎梏而死者非正命須是看得孟子之意如何且如公治長雖在縲紲非其罪也若當時公冶長死於縲紲不成説他不是正命有罪無罪在我而已古人所以殺身以成仁且身已死亡矣又成箇甚底直是要看此處孟子謂舎生取義又云志士不忘在溝壑勇士不忘䘮其元學者須是於此處見得定臨利害時便將自家斬剉了也須壁立萬仭始得而今人有小利害便生計較説道恁地死非正命如何得賜䕫孫録云問人或死於干戈或死扵患難如比干之類亦是正命乎曰固是正命問以理論之則謂之正命以死生論之則非正命曰如何恁地説下同問外丙二年仲壬四年先生兩存趙氏程氏之説則康莭之説亦未可據耶曰也恁生便信得他又問如此則堯即位於甲辰亦未可據也曰此却據諸歴書如此説恐或有之然亦未可必問若如此則二年四年亦可推矣曰却為中間年代不可紀自共和以後方可紀則湯時自無由可推此類且當闕之不必深考廣問外丙二年仲壬四年二說孰是曰今亦如何知得然觀外丙仲壬必是立二年四年不㑹不立如今人都被書序誤書序云成湯既没太甲元年故以為外丙仲壬不曾立殊不知書序是後人所作豈可憑也子蒙問伊尹以割烹要湯章問竇従周云如何是伊尹樂堯舜之道竇對以饑食渴飲鑿井耕田自有可樂曰龜山答胡文定書是如此説要之不然須是有所謂堯舜之道如書云人心惟危道心惟㣲惟精惟一允執厥中此便是堯舜相傳之道如克明峻徳以親九族至恊和萬邦黎民於變時雍如欽明文思温恭允塞之類伊尹在莘郊時須曾一一學来不是每日只耕鑿食飲過了徳明問看伊尹升陑之事亦是曾學兵法曰古人皆如此如東漢李膺為度遼将軍必是曾親履行陳竇問傅説版築亦讀書否曰不曾讀書如何有説命三篇之文舜居深山之中與木石居與鹿豕逰後来乃能作股肱元首之歌便如顔子亦大段讀書其問為邦夫子告以行夏之時乗殷之輅服周之冕樂則韶舞顔子平時於四代禮樂夏小正之類須一一曾理㑹来古人詳於禮樂之事當時自有一種書後世不得而見如孟子説葛伯事以為有童子以黍肉餉殺而奪之便是孟子時有此等書今書中只有葛伯仇餉一句上古無書可讀今既有書亦須是讀此由博以反約之義也徳明問伊尹樂堯舜之道集注作誦其詩讀其書乃是指其實事而言曰然或謂耕田鑿井便是堯舜之道此皆不實不然何以有豈若吾身親見之哉一句若是不着實只是脱空今人有一等杜撰學問皆是脱空狂妄不濟一錢事如天下歸仁只管自説天下歸仁須是天下説歸仁方是非禮勿視非禮勿聽非禮勿言非禮勿動只管去説到念慮起處却又是非禮此皆是妄論子韶之學正如此須是居䖏恭執事敬坐如尸立如齊方是禮不然便不是禮履孫龜山説伊尹樂堯舜之道云日用飲食出作入息便是樂堯舜之道這箇似説得渾全却不思他下面説豈若吾身親見之哉這箇便是真堯舜却不是泛説底道皆堯舜之道如論文武之道未墜於地此亦真箇指文武之道而或者便説日用間皆是文武之道殊不知聖賢之言自實後来如荘子便説在坑滿坑在谷滿谷及佛家出来又不當說底都説了佐理不外物若以物便為道則不可如龜山云寒衣饑食出作入息無非道伊尹耕於有莘之野以樂堯舜之道夫堯舜之道豈有物可玩哉即耕扵有莘之野是已恁地説却有病物只是物所以為物之理乃道也閎祖龜山以饑食渴飲便是道是言噐而遺道言物而遺則也燾伊尹是二截人方其耕於莘野若将終身焉是一截人及湯三聘翻然而往便以天下之重為己任是一截人燾伊尹之耕於莘也傅説之築於傅巖也太公之釣於渭濵也其於天下非事事而究其利病也非人人而訪其賢否也明其在己者而已矣及其得志行乎天下舉而措之而已鎬伊尹孔明必待三聘三顧而起者踐坤順也先知者因事而知先覺者因理而覺知者因事因物皆可以知覺則是自心中有所覺悟敬仲先覺後覺之覺是自悟之覺似大學説格物致知豁然貫通處今人知得此事講解得這箇道理皆知之之事及其自悟則又自有箇見解處先知覺後知先覺覺後覺中央兩箇覺字皆訓喚醒是我喚醒他僴道夫問覺曰程子云知是知此事覺是覺此理盖知是知此一事覺是忽然自理㑹得又問思曰睿曰視曰明是視而便見之謂眀聴曰聦是聴而便聞之謂聦思曰睿是思而便通謂之睿道夫問或謂孔子於衛章進以禮揖讓辭遜退以義果決㫁割閎祖論進以禮退以義曰三揖而進一辭而退道夫萬章下伯夷目不視惡色章厚之問三聖事是當初如此是後来如此曰是知之不至三子不惟清不能和和不能清但於清處和處亦皆過如射者皆中而不中鵠某問既是如此何以為聖人之清和曰却是天理中流出無駁雜雖是過當直是無纎毫查滓曰三子是資禀如此否曰然可學問伯夷栁下惠伊尹謂之清和任孟子云皆古聖人如何曰清和任已合於聖人問如孟子言只是得一莭曰此言其所得之極耳可學夷清惠和皆得一偏他人學之便有隘不恭處使懦夫學和愈不恭鄙夫學清愈隘也可為百世師謂能使薄者寛鄙者敦懦者立君子不由不由其隘與不恭謨或問如伯夷之清而不念舊惡栁下惠之和而不以三公易其介此其所以為聖之清聖之和也但其流弊則有隘與不恭之失曰這也是諸先生恐傷觸二子所以説流弊今以聖人觀二子則二子多有欠闕處才有欠闕處便有弊所以孟子直説他隘與不恭不曾説其末流如此如不念舊惡不以三公易其介固是清和處然十分只救得一分救不得那九分清和之偏處了如何避嫌只要回互不說得大率前軰之論多是如此堯舜之禪授湯武之放伐分明有優劣不同却要都回護教一般少間便説不行且如孔子謂韶盡美矣又盡善也武盡羙矣未盡善也分明是武王不及舜文王三分天下有其二以服事殷武王勝殷殺紂分明是不及文王泰伯三以天下讓其可謂至徳也矣分眀太王有剪商之志是太王不及泰伯盖天下有萬世不易之常理又有權一時之變者如君君臣臣父父子子此常理也有不得已處即是變也然畢竟還那常理底是今却要以變来壓着那常底説少間只見説不行説不通了若是以常人去比聖賢則説是與不是不得若以聖賢比聖賢則自有是與不是處須與他分箇優劣今若隠避回互不説亦不可又云如可與立可與權若能可與立時固是好然有不得已處只得用權盖用權是聖人不得已處那裏是聖人要如此又問堯舜揖遜雖是盛徳亦是不得已否曰然敬之問伊尹之任曰伊尹之任是自任以天下之重雖云禄以天下弗顧繫馬千駟弗視然終是任處多如栁下惠不以三公易其介固是介然終是和處多恪敬之問伊尹聖之任非獨扵自任以天下之重處看如所謂禄之以天下弗顧繫馬千駟弗視非其義非其道一介不以與人一介不以取諸人這般也見得任處曰不要恁底看所謂任只説他治亦進亂亦進䖏看其自任以天下之重如此若如公説却又與伯夷之清相類問聖人若處伊尹之地如何曰夫子若處此地自是不同不如此着意或問伊尹治亦進亂亦進無可無不可似亦可以為聖之時曰伊尹終是有任底意思在賀孫問伊川云伊尹終有任底意思在謂他有擔當作為底意思只這些意思便非夫子氣象否曰然然此處極難看且放那裏乆之看道理熟自見强説不得若謂伊尹有這些意思在為非聖人之至則孔孟皇皇汲汲去齊去魯之梁之魏非無意者其所以異伊尹者何也僴問孔子時中所謂隨時而中否曰然問三子之徳各偏於一亦各盡其一徳之中否曰非也既云偏則不得謂之中矣三子之徳但各至於一偏之極不可謂之中如伯夷雖有善其辭命而至者不受也此便是偏處若善其辭命而至受之亦何妨只觀孔子便不然問既云一偏何以謂之聖曰聖只是做到極至處自然安行不待勉强故謂之聖聖非中之謂也所謂智譬則巧聖譬則力猶射於百歩之外其至爾力也其中非爾力也中便是中處如顔子之學則己知夫中處但力未到且若更加之功則必中矣盖渠所知己不差也如人學射發矢已直而未中者人謂之箭苗言其已善發箭雖未至的而必能中的若更開拓則必能中也僴云顔子則己知中處而力未至三子力有餘而不知中處否曰然僴問孔子集大成曰孔子無所不該無所不備非特兼三子之所長而已但與三子比並説時亦皆兼其所長問始終條理如所謂始作翕如也皦如也繹如也以成之類否言八音克諧不相奪倫各有條理脉絡也曰不然條理脉絡如一把草従中縳之上截為始條理下截為終條理若上截少一莖則下截亦少一莖上截不少則下截亦不少此之謂始終條理又問始條理者智之事終條理者聖之事功夫緊要處全在智字上三子所以各極於一偏縁他合下少却致知工夫看得道理有偏故其終之成也亦各至於一偏之極孔子合下盡得致知工夫看得道理周徧精切無所不盡故其徳之成也亦兼該畢備而無一徳一行之或闕故集注云所以偏者由其蔽于始是以闕扵終所以全者由其知之至是以行之盡智譬則巧聖譬則力三子則力有餘而巧不足何以見之只觀其清和之徳行之便到其極無所勉強所以謂之聖使其合下工夫不倚於一偏安知不如孔子也曰然更子細看僴問孔子之謂集大成此一節在知行兩字上面源頭若見得偏了便徹底是偏源頭若知得周匝便下来十全而無虧所謂始終條理者集注謂條理猶言脉絡莫是猶一條路相似初間下歩時纔差便行得雖力終乆是差否曰始條理猶箇絲線頭相似孔子是挈得箇絲頭故許多條絲都在這裏三子者則是各拈得一邉耳問孟子又以射譬喻最親切孔子是望得那準的正了又發得正又射得到故能中能至三子者是望得箇的不正又發得不正故雖射得到只是不中耳然不知有望得正發得正而射不至者否曰亦有之如所謂遵道而行半塗而廢者是也如顔子却是㑹恁地去只是天不與之以年故亦不能到也時舉問金聲玉振舊説三子之偏在其初不曽理㑹得許多洪纎髙下而遽以玉振之今又却以金聲玉振盡為孔子事而三子無與如何曰孟子此一句只是專指孔子而言若就三子身上説則三子自是失於其始所以虧於其終所謂聖之清只是就清上聖所謂聖之和只是就和上聖聖之任亦然盖合下便就這上面徑行将去更不回頭不自覺其為偏也所以偏處亦只是有些私意却是一種義理上私意見得這清和任是箇好道理只管主張這一邉重了亦是私意謨問三子之清和任於金聲亦得其一而玉振亦得其一否曰金聲玉振只是解集大成聲猶聲其罪之聲古人作樂擊一聲鐘衆音遂作又擊一聲鐘衆音又齊作金所以發衆音末則以玉振之所以收合衆音在裏靣三子亦有金聲玉振但少爾不能管攝衆音盖伯夷合下只見得清底其終成就亦只成就得清底伊尹合下只見得任底其終成就亦只成就得任底栁下惠合下只見得和底其終成就亦只成就得和底淳至之問金聲玉振先生因説及樂金聲初打聲高其後漸低於衆樂之作必以此聲之玉聲先後一般初打恁地響到作時也恁地響但玉聲住時截然便住於衆樂之終必以此振之賀孫金聲玉振金聲有洪殺始震終細玉聲則終始如一叩之其聲詘然而止僴金聲玉振一章甚好然某亦不見作樂時如何亦只是想象説兒寛金聲者考其條貫之是非玉振者斷而歸一節或問始終條理章曰集義一段便緊要如這一段未理㑹也未害如今樂之始作先撞鐘是金聲之也樂終擊磬是玉振之也始終如此而中間乃大合樂六律五聲八音一齊莫不偹舉孟子以此譬孔子如伯夷聖之清伊尹聖之任栁下惠聖之和都如樂噐有一件相似是金聲底従頭到尾只是金聲是玉聲底従頭到尾只是玉聲是絲竹聲底従頭到尾只是絲竹之聲賀孫問始終條理曰條理條目件項也始終條理夲是一件事但是上一截為始下一截為終始是知終是行節始條理是致知終條理是力行如中庸説博學審問慎思明辨與大學物格知至這是始條理如篤行與誠意正心脩身以下這是終條理賀孫敬之問智譬則巧聖譬則力此一章智却重曰以緩急論則智居先若把輕重論則聖為重且如今有一等資質好底人忠信篤實却於道理上未甚通曉又有一様資質淺薄底人却自㑹曉得道理這須是還資質忠厚底人做重始得賀孫問聖知曰知是知得到聖是行得到盖卿問巧力曰伯夷伊尹栁下惠力已至但射不巧孔子則既聖且智巧力兼全故孔子箭箭中的三子者皆中垜也大雅黄子功問其至爾力其中非爾力還是三子只有力無智否曰不是無智知處偏故至處亦偏如孔子則箭箭中紅心三子則每人各中一邉縁他當初見得偏故至處亦偏子功曰如此則三子不可謂之聖曰不可謂之聖之大成畢竟那清是聖之清和是聖之和雖使聖人清和亦不過如此顔子則巧處功夫已至㸃㸃皆可中但只是力不至耳使顔子力至便與孔子一般文蔚問集大成章以智比聖智固未可以言聖然孟子以智譬巧以聖譬力力既不及於巧則是聖必由於智也明矣而尹和靖乃曰始條理者猶可以用智終條理則智不容於其間矣則是以聖智淺深而言與孟子之意似相戾惟伊川引易知至至之知終終之其意若曰夫子所以能集三子而大成者由其始焉知之之深也盖知之至行之必至三子之智始焉知之未盡故其後行之雖各極其至終未免各失於一偏非終條理者未到以其始條理者已差之矣不知伊川之意是如此否曰甚好金聲者洪纎髙下有許多節目玉振者其始末如一兒寛亦引金聲玉振欲天子自致其知是時未有孟子之書此必古曲中有此語非孟子知徳之奥焉能語此去偽或問玉振金聲伊川以喻始終或者之意以此有變有不變其説孰是曰二説相關不可偏廢金聲固是喻其始然始則有變玉振固是喻其終至終則無變也去偽北宫錡問曰章問孟子所答周室班爵禄與周禮王制不同曰此也難考然畢竟周禮底是盖周禮是箇全書經聖人手作必不㑹差孟子之時典籍已散亡想見沒理㑹何以言之太公所封東至於海西至扵河南至扵穆陵北至于無棣穆陵今近徐州無棣今棣州也這中間多少濶豈止百里孟子説太公之封於齊也地非不足也而儉於百里恐也不然又問天子六卿諸侯大國三卿次國二卿小國孤卿一國之土地為卿大夫士分了國君所得殊不多曰君十卿禄禄者猶今之俸禄盖君所得得為私用者至於貢賦賔客朝覲祭饗交聘往来又别有財儲為公用非所謂禄也如今之太守既有料錢至扵貢賦公用又自别有錢也僴問百畆之田可食九人其次八人七人又其次六人五人此等差别是地有肥瘠耶抑糞灌之不同耶曰皆人力之不同耳然亦大約如此縁有此五等之禄故百畝所食有此五等問府史胥徒不知皆民為之抑别募游手為之曰不可曉想只是民為之然府史胥徒各自有禄以代耕則又似别募㳺手矣以周禮考之人數極多亦安得許多閒禄給之某嘗疑周禮一書亦是起草未曾得行盖左氏所紀當時官號職位甚詳而未嘗及于府史胥徒則疑其方出於周公草定之夲而未經施行也使其有之人數極多何不略見於他書如至没要緊職事亦破人甚多不知何故但嘗觀自漢以来及前代題名碑所帯人従胥吏亦甚多又不知如何皆不可曉僴孟子論三代制度多與周禮不合盖孟子後出不及見王制之詳只是大綱約度而説廣萬章曰敢問交際章殷受夏周受殷所不辭也言受天下所不辭則舜受天下不為泰於今為烈是暴烈之烈如宣王承厲王之烈人傑為之兆也兆是事之端猶縫鏬也僴問孔子於季桓子見行可之仕孔子仕扵定公而言桓子何也曰當時桓子執國柄定公亦自做主不起孔子之相皆由桓子受女樂孔子便行矣如陳常弑齊君孔子沐浴而告魯公又告桓子事勢可見問堕三都季氏何以不怨曰季氏是時自不柰陪臣何故假孔子之力以去之及既堕三都而三桓之勢遂衰所以桓子甚悔臨死謂康子曰使仲尼之去而魯不終治者由我故也正如五代羅紹威不柰魏博牙軍何假朱温之勢以除之既除牙軍而魏博之勢大弱紹威大悔正此類也孔子是時也失了這機㑹不曾做得成僴子升問孔子仕季氏之義曰此亦自可疑有難説處因言三家後来亦被陪臣撓也要得夫子来整頓孔子却因其機而為之如堕邑之事若漸漸掃除得去其勢亦自削弱可復正也孟氏不肯堕成遂不能成功因説如今且據史傳所載亦多可疑處如魯國司徒司馬司空之官乃是三家世為之不知聖人如何得做司冦又問群弟子皆仕家臣聖人亦不甚責之曰當時列國諸臣皆世其官無挿手處故諸子不擇地而為之耳木之仕非為貧章説位卑而言髙罪也曰此只是説為貧而仕聖賢在當時只要在下位不當言責之地亦是聖賢打乖處若是合言處便須當説非是教人都不得言若立乎人之夲朝而道不行則耻矣故辭尊居卑辭富居貧􅓌位卑而言髙罪也以君臣之分言之固是如此然時可以言而言亦豈得謂之出位曰前世固有草茅韋布之士獻言者然皆有所因皆有次第未有無故忽然犯分而言者縦言之亦不見聽徒取辱耳若是明君自無壅蔽之患有言亦見聽不然豈可不循分而徒取失言之辱哉如史記説商鞅范睢之事彼雖小人然言皆有序不肯妄發商鞅初説孝公以帝道次以王道而後及覇道彼非能為帝王之事也特借是為漸進之媒而後吐露其胷中之所欲言先説得孝公動了然後方深説范睢欲奪穰侯之位以擅權未敢便深説穰侯之惡先言外事以探其君曰穰侯越韓魏而取齊之剛壽非計也昭王信之然後漸漸深説彼小人之言尚有次序如此君子之言豈可妄發也某嘗説賈誼固有才文章亦雄偉只是言語急廹失進言之序看有甚事都一齊説了宜絳灌之徒不説而文帝謙讓未遑也且如一間破屋教自家修須有先後緩急之序不成一齊拆下雜然並修看他㑹做事底人便别如韓信鄧禹諸葛孔眀軰無不有一定之規模漸漸做将去所以所為皆卓然有成這様人方是有定力㑹做事如賈誼胷次終是閙着事不得有些子在心中盡要迸出来只管跳躑爆趠不已如乗生駒相似制御他未下所以言語無序而不能有所為也易曰艮其輔言有序悔亡聖人之意可見矣僴萬章問士不託諸侯章至之問孟子所以出處去就辭受都従禮門也義路也惟君子能由是路出入是門也做出曰固是不出此二者然所謂義所謂禮裏面煞有節目至録云其中毫厘必辨如往役義也往見不義也周之則受賜之則不受之類便都是義之節目如云廩人繼粟庖人繼肉不以君命將之之類都是禮之節目此便是禮以君命將之使己僕僕爾亟拜也便不是禮又如於齊王餽兼金一百而不受於宋餽五十鎰而受於薛餽七十鎰而受這箇都有箇則都有義君子於細㣲曲折一一都要合義所以易中説精義入神以致用也義至扵精則應事接物之間無一非義不問小事大事千變萬化改頭換面出来自家應副他如利刀快劍相似迎刃而解件件剖作兩片去孟子平日受用便是得這箇氣力今觀其所言所行無不是這箇物事初見梁恵王劈初頭便劈作兩邊去賀孫至錄云孟子是義精所以不放過義是一柄利刃凡事到靣前便割成兩片所以精之集義者盖毫厘㣲細各有義入神以致用也所以要精義入神者盖欲以致用也朱子語類卷五十八
