body:
  text: 朱子語類卷十五大學二經下器逺問致知者推知事物之理還當就甚麽様事推致其理曰眼前凡所應接底都是物事事都有箇極至之理便要知得到若知不到便都沒分明若知得到便著定恁地做更無第二著第三著止緣人見道理不破便恁地苟簡且恁地做也得都不做得第一義曹問如何是第一義曰如為人君止扵仁為人臣止於敬為人子止於孝之類決定著恁地不恁地便不得又如在朝須著進君子退小人這是第一義有功決定著賞有罪決定著誅更無小人可用之理更無包含小人之理惟見得不破便道小人不可去也有可用之理這都是第二義第三義如何㑹好若事事窮得盡道理事事占得第一義做甚麽剛方正大且如為學決定是要做聖賢這是第一義便漸漸有進歩處若便道自家做不得且随分依稀做些子這是見不破所以説道不以舜之所以事堯事君賊其君者也不以堯之所以治民治民賊其民者也謂吾身不能者自賊者也賀孫卓錄云曹兄問格物窮理須是事事物物上理㑹曰也須是如此但窮理上須是見得十分徹底窮到極處須是見得第一著方是不可只到第三第四著便休了若窮不得只道我未窮得到底只得如此這是自恕之言亦非善窮理也且如事君便須是進思盡忠退思補過道合則從不合則去也有義不可得而去者不可不知又云如不以舜之所以事堯事君賊其君者也不以堯之所以治民治民賊其民者也這皆是極處以下致知致知所以求為真知真知是要徹骨都見得透道夫問致知莫只是致察否曰如讀書而求其義處事而求其當接物存心察其是非邪正皆是也㝢因鄭仲履之問而言曰致知乃夲心之知如一靣鏡子夲全體通明只被昬翳了而今逐旋磨去使四邊皆照見其明無所不到盖卿致知有甚了期方致知工夫亦只是且據所已知者玩索推廣將去具於心者夲無不足也格物者格盡也須是窮盡事物之理若是窮得三兩分便未是格物須是窮盡得到十分方是格物賀孫以下格物兼論窮理居甫問格物工夫覺見不周給曰須是四方八靣去格可學格物格猶至也如舜格于文祖之格是至于文祖處芝問格物還是事未至時格事既至然後格曰格是到那般所在也有事至時格底也有事未至時格底芝格物者如言性則當推其如何謂之性如言心則當推其如何謂之心只此便是格物砥窮理格物如讀經㸔史應接事物理㑹箇是處皆是格物只是常教此心存莫教他門沒勾當處公且道如今不去學問時此心頓放那處賀孫格物須是從切已處理㑹去待自家者已定疊然後漸漸推去這便是能格物道夫格物二字最好物謂事物也須窮極事物之理到盡處便有一箇是一箇非是底便行非底便不行凡自家身心上皆須體騐得一箇是非若講論文字應接事物各各體騐漸漸推廣地歩自然寛濶如曽子三省只管如此體驗去徳明文振問物者理之所在人所必有而不能無者何者為切曰君臣父子兄弟夫婦朋友皆人所不能無者但學者須要窮格得盡事父母則當盡其孝處兄弟則當盡其友如此之類須是要見得盡若有一毫不盡便是窮格不至也人傑格物莫先於五品方子格物是窮得這事當如此那事當如彼如為人君便當止於仁為人臣便當止於敬又更上一著便要窮究得為人君如何要止於仁為人臣如何要止於敬乃是銖格物者格其孝當考論語中許多論孝格其忠必將順其美匡救其惡不幸而仗節死義古人愛物而伐木亦有時無一些子不到處無一物不被其澤盖緣是格物得盡所以如此節格物須真見得決定是如此為子豈不知是要孝為臣豈不知是要忠人皆知得是如此然須當真見得子決定是合當孝臣決定是合當忠決定如此做始得㝢如今説格物只晨起開目時便有四件在這裏不用外尋仁義禮智是也如才方開門時便有四人在門裏僴子淵説格物先從身上格去如仁義禮智發而為惻隠羞惡辭讓是非須從身上體察常常守得在這裏始得曰人之所以為人只是這四件須自認取意思是如何所謂惻隠者是甚麽意思且如赤子入井一井如彼深峻入者必死而赤子將入焉自家見之此心還是如何有一事不善在自家身上做出這裏定是可羞在别人做出這裏定是惡他利之所不當得或雖當得而吾心有所未安便是謙遜辭避不敢當之以至等閒禮數人之施於已者或過其分便要辭將去讓與别人定是如此事事物物上各有箇是有箇非是底自家心裏定道是非底自家心裏定道非就事物上㸔是底定是是非底定是非到得所以是之所以非之却只在自家此四者人人有之同得於天下不待問别人假借堯舜之所以為堯舜也只是這四箇桀紂夲來亦有這四箇如今若認得這四箇分曉方可以理㑹别道理只是孝有多少様有如此為孝如此而為不孝忠固是忠有如此為忠又有如此而不喚做忠一一都著斟酌理㑹過賀孫問格物最難日用間應事處平直者却易見如交錯疑似處要如此則彼礙要如彼則此礙不審何以窮之曰如何一頓便要格得恁地且要見得大綱且著箇大胚模是恁地方就裏靣旋旋做細如樹初間且先斫倒在這裏逐旋去皮方始出細若難曉易曉底一齊都要理㑹得也不解恁地但不失了大綱理㑹一重了裏靣又見一重一重了又見一重以事之詳略言理㑹一件又一件以理之淺深言理㑹一重又一重只管理㑹須有極盡時博學之審問之慎思之明辯之成四節次第恁地方是㝢或問格物是學者始入道處當如何著力曰遇事接物之間各須一一去理㑹始得不成是精底去理㑹粗底又放過了大底去理㑹小底又不問了如此終是有欠闕但随事遇物皆一一去窮極自然分明又問世間有一種小有才底人於事物上亦能考究得仔細如何却無益於已曰他理㑹底聖人亦理㑹但他理㑹底意思不是彼所為者但欲人説他人理㑹不得者我理㑹得他人不能者我能之却不切已也又曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉聖人何事不理㑹但是與人自不同祖道𫝊問而今格物不知可以就吾心之發見理㑹得否曰公依舊是要安排而今只且就事物上格去如讀書便就文字上格聽人説話便就説話上格接物便就接物上格精粗大小都要格它久後㑹通粗底便是精小底便是大這便是理之一夲處而今只管要從發見處理㑹且如見赤子入井便有怵惕惻隠之心這箇便是發了更如何理㑹若須待它自然發了方理㑹它一年都能理㑹得多少聖賢不是教人去黑淬淬裏守著而今且大著心胷大開著門端身正坐以觀事物之來便格它䕫孫世間之物無不有理皆須格過古人自幼便識其具且如事親事君之禮鐘鼓鏗鏘之節進退揖遜之儀皆目熟其事躬親其禮及其長也不過只是窮此理因而漸及於天地鬼神日月隂陽草木鳥獸之理所以用工也易今人皆無此等禮數可以講習只靠先聖遺經自去推究所以要人格物主敬便將此心去體㑹古人道理循而行之如事親孝自家既知所以孝便將此孝心依古禮而行之事君敬便將此敬心依聖經所説之禮而行之一一須要窮過自然浹洽貫通如論語一書當時門人弟子記聖人言行動容周旋揖遜進退至為纎悉如鄉黨一篇可見當時此等禮數皆在至孟子時則漸已放棄如孟子一書其説已寛亦有但論其大理而已僴問竇從周曽㸔格物一段否因言聖人只説格物二字便是要人就事物上理㑹且自一念之微以至事事物物若靜若動凡居處飲食言語無不是事無不各有箇天理人欲須是逐一騐過雖在靜處坐亦須騐箇敬肆敬便是天理肆便是人欲如居處便須騐得恭與不恭執事便須騐得敬與不敬有一般人專要就寂然不動上理㑹及其應事却七顛八倒到了又牽動他寂然底又有人專要理㑹事却於根夲上全無工夫須是徹上徹下表裏洞徹如居仁便自能由義由義便是居仁敬以直内便能義以方外能義以方外便是敬以直内徳明才仲問格物是小學已有開明處了便從大學做將去推致其極曰人也不解無箇發明處才有些發見處便從此挨將去漸漸開明只如一箇事我才發心道我要做此事只此便是發見開明處了便從此做將去五代時有一將官年大而不識字既貴遂令人於每件物事上書一名字帖之渠子細㸔久之漸漸認得㡬箇字從此推將去遂識字璘問格物則恐有外馳之病曰若合做則雖治國平天下之事亦是已事周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦不成也説道外馳又問若如此則恐有身在此而心不在此視而不見聽而不聞食而不知其味有此等患曰合用他處也著用又問如此則不當論内外但當論合為與不合為先生頷之節若格物則雖不能盡知而事至物來大者増些子小者減些子雖不中不逺矣節問格物工夫未到得貫通亦未害否曰這是甚説話而今學者所以學便須是到聖賢地位不到不肯休方是但用工做向前去但見前路茫茫地白莫問程途少間自能到如何先立一箇不解做得便休底規模放這裏了如何做事且下手要做十分到了只做得五六分下手做五六分到了只做得三四分下手做三四分便無了且諸公自家裏來到建陽直到建陽方休未到建陽半路歸去便是不到建陽聖賢所為必不如此如所謂君子遵道而行半塗而廢忘身之老也不知年數之不足也俛焉日有孳孳斃而後已又曰舜為法於天下可傳於後世我由未免為鄉人也是則可憂也憂之如何如舜而已矣卓人多把這道理作一箇懸空底物大學不説窮理只説箇格物便是要人就事物上理㑹如此方見得實體所謂實體非就事物上見不得且如作舟以行水作車以行陸今試以衆人之力共推一舟於陸必不能行方見得舟果不能以行陸也此之謂實體徳明問道之不明盖是後人舎事迹以求道曰所以古人只道格物有物便有理若無事親事君底事何處得忠孝節窮理二字不若格物之為切便就事物上窮格如漢人多推秦之所以失漢之所以得故得失易見然彼亦無那格底意思若格之而極其至則秦猶有餘失漢亦當有餘得也又云格謂至也所謂實行到那地頭如南劍人徃建寜須到得郡􅆹上方是至若只到建陽境上即不謂之至也徳明格物不説窮理却言格物盖言理則無可捉摸物有時而離言物則理自在自是離不得釋氏只說見性下梢尋得一箇實洞無稽底性亦由他説於事上更動不得賀孫所謂窮理者事事物物各自有箇事物底道理窮之須要周盡若見得一邊不見一邊便不該通窮之未得更須欵曲推明盖天理在人終有明處大學之道在明明徳謂人合下便有此明徳雖為物欲掩蔽然這些明底道理未嘗泯絶須從明處漸漸推將去窮到是處吾心亦自有準則窮理之初如攻堅物必尋其罅隙可入之處乃從而撃之則用力為不難矣孟子論四端便各自有箇靶柄仁義禮智皆有頭緒可尋即其所發之端而求其可見之體莫非可窮之理也謨格物窮理有一物便有一理窮得到後遇事觸物皆撞著這道理事君便遇忠事親便遇孝居處便恭執事便敬與人便忠以至参前倚衡無徃而不見這箇道理若窮不至則所見不真外靣雖為善而内實為惡是兩箇人做事了外靣為善是一箇人裏面又有一箇人説走我不好如今須勝得那一箇不好底人去方是豈有學聖人之書為市井之行這箇窮得箇甚道理而今説格物窮理須是見得箇道理親切了未解便能脫然去其舊習其始且見得箇道理如此那事不是亦不敢為其次見得分曉則不肯為又其次見得親切則不為之而舊習都忘之矣子蒙不是要格那物來長我聰明見識了方去理㑹自是不得不理㑹大學説一格物在裏却不言其所格者如何學者欲見下工夫處但㸔孟子便得如説仁義禮智便窮到惻隠羞惡辭讓是非之心説好貨好色好勇便窮到太王公劉文武説古今之樂便窮到與民同樂處説性便格到纎毫未動處這便見得他孟子胷中無一毫私意蔽窒得也故其知識包宇宙大無不該細無不燭道夫居甫問格物窮理但理自有可以彼此者曰不必如此㸔理有正有權今學者且須理㑹正如娶妻必告父母學者所當守至於不告而娶自是不是到此處别理㑹如事君匡救其惡是正理伊川説納約自牖又是一等今於此一段未分明却先為彼引走如孔子説危行言孫當春秋時亦自如此今不理㑹正當處纔見聖人書中有此語便要守定不移駸駸必至扵行孫矣此等風俗浙江甚盛殊可慮可學問格物之義固要就一事一物上窮格然如吕氏楊氏所發明大本處學者亦須兼考曰識得即事事物物上便有大本不知大夲是不曽窮得也若只説大夲便是釋老之學徳明致知格物只是一箇道夫以下致知格物致知格物一胯底事先生舉左右指來比竝泳格物是逐物格將去致知則是推得漸廣賜剡伯問格物致知曰格物是物物上窮其至理致知是吾心無所不知格物是零細説致知是全體説時舉張仁叟問致知格物曰物莫不有理人莫不有知如孩提之童知愛其親及其長也知敬其兄以至於飢則知求食渴則知求飲是莫不有知也但所知者止於大畧而不能推致其知以至於極耳致之為義如以手推送去之義凡經傳中云致者其義皆如此時舉問知如何致物如何格曰孩提之童莫不知愛其親及其長也莫不知敬其兄人皆有是知而不能極盡其知者人欲害之也故學者必須先克人欲以致其知則無不明矣致字如推開去譬如暗室中見些子明處便尋從此明處去忽然出到外靣見得大小大明人之致知亦如此也格物是為人君止於仁為人臣止於敬之類事事物物各有箇至極之處所謂止者即至極之處也然須是極盡其理方是可止之地若得八分猶有二分未盡也不是須是極盡方得又曰知在我理在物祖道黄去私問致知格物曰致字有推出之意前軰用致字多如此人誰無知為子知孝為父知慈只是知不盡須是要知得透底且如一穴之光也喚做光然逐旋開剗得大則其光愈大物皆有理人亦知其理如當慈孝之類只是格不盡但物格扵彼則知盡扵此矣又云知得此理盡則此箇意便實若有知未透處這裏靣便黒了人傑劉圻父説格物致知曰他所以下格字致字者皆是為自家元有是物但為他物所蔽耳而今便要從那知處推開去是因其所已知而推之以至於無所不知也義剛郭叔雲問為學之初在乎格物物物有理第恐氣禀昏愚不能格至其理曰人箇箇有知不成都無知但不能推而致之耳格物理至徹底處又云致知格物只是一事非是今日格物明日又致知格物以理言也致知以心言也恪問致知是欲扵事理無所不知格物是格其所以然之故此意通否曰不須如此説只是推極我所知須要就那事物上理㑹致知是自我而言格物是就物而言若不格物何緣得知而今人也有推極其知者却只泛泛然竭其心思都不就事物上窮究如此則終無所止義剛曰只是説所以致知必在格物曰正是如此若是極其所知去推究那事物則我方能有所知義剛致知格物固是合下工夫到後亦離這意思不得學者要𦂳在求其放心若收拾得此心存在已自㸔得七八分了如此則夲領處是非善惡已自分曉惟是到那變處方難處到那裏便用子細研究若那分曉底道理却不難見只是學者見不親切故信不及如漆雕開所謂吾斯之未能信若見得親切自然信得及㸔得大學了閒時把史傳來㸔見得古人所以處事變處儘有短長賀孫人之一心夲自光明常提撕他起莫為物欲所蔽便將這箇做夲領然後去格物致知如大學中條目便是材料聖人教人將許多材料來脩治平此心令常常光明耳按脩治字疑伊川云我使他思時便思如此方好儻臨事不醒只爭一餉時便為他引去且如我兩眼光􅀈􅀈又白日裏在大路上行如何㑹别被人引去草中只是我自昬睡或暗地裏行便被别人混亂引去耳但只要自家常醒得他做主宰出乎萬物之上物來便應易理㑹底便理㑹得難理㑹底思量久之也理㑹得若難理㑹底便理㑹不得是此心尚昬未明便用提醒他驤問致知在格物曰知者吾自有此知此心虚明廣大無所不知要當極其至耳今學者豈無一斑半㸃只是為利欲所昬不曽致其知孟子所謂四端此四者在人心發見扵外吾友還曽平日的見其有此心須是見得分明則知可致今有此心而不能致臨事則昬惑有事則膠擾百種病根皆自此生又問凡日用之間作事接人皆是格物窮理曰亦須知得要夲若不知得只是作事只是接人何處為窮理致知分數多如博學審問慎思明辨四者皆致知只力行一件是行言致言格是要見得到盡處若理有未格處是於知之之體尚有未盡格物不獨是仁孝慈敬信五者此只是大約説耳且如説父子須更有母在更有夫婦在凡萬物萬事之理皆要窮但窮到底無復餘藴方是格物大雅致知格物便是志於道據於徳却是討得箇匡格子義剛格物致知是極粗底事天命之謂性是極精底事但致知格物便是那天命之謂性底事下等事便是上等工夫義剛曹又問致知格物曰此心愛物是我之仁此心要愛物是我之義若能分别此事之是此事之非是我之智若能别尊卑上下之分是我之禮以至扵萬物萬事皆不出此四箇道理其實只是一箇心一箇根柢出來抽枝長葉卓蔣端夫問致知在格物胷中有見然後扵理無不見曰胷中如何便有所見譬如嬰兒學行今日學歩明日又歩積習既久方能行天地萬物莫不有理手有手之理足有足之理手足若不舉行安能盡其理格物者欲究極其物之理使無不盡然後我之知無所不至物理即道理天下初無二理震問知至意誠求知之道必須存神索至不思則不得誠是否曰致知格物亦何消如此説所謂格物只是眼前處置事物酌其輕重究極其當處便是亦安用存神索至只如吾胷中所見一物有十分道理若只見三二分便是見不盡須是推來推去要見盡十分方是格物既見盡十分便是知止震或問致知須要誠既是誠了如何又説誠意致知上夲無誠字如何强安排誠字在上靣説為學之始須在致知不致其知如何知得欲致其知須是格物格物云者要窮到九分九釐以上方是格讌若不格物致知那箇誠意正心方是􅎄在這裏不是自然若是格物致知便自然不用强􅎄元昭問致知格物只作窮理説曰不是只作窮理説格物所以窮理又問格物是格物與人知物與人之異然後可作工夫曰若作致知在格物論只是亂説既知人與物異後待作甚合殺格物是格盡此物如有一物凡十瓣已知五瓣尚有五瓣未知是為不盡如一鏡焉一半明一半暗是一半不盡格盡物理則知盡如元昭所云物格知至當如何説子上問向見先生答江徳功書如此説曰渠如何説已忘却子上云渠作接物曰又更錯陳問大學次序在聖人言之合下便都能如此還亦須從致知格物做起但他義理昭明做得來恐易曰也如此學只是聖人合下體段已具義理都曉得畧畧恁地勘驗一過其實大夲處都盡了不用學只是學那沒緊要底如中庸言及其至也雖聖人有所不知不能焉人多以至為道之精妙處若是道之精妙處有所不知不能便與庸人無異何足以為聖人這至只是道之盡處所不知不能是沒緊要底事他大夲大根元無欠闕只是古今事變禮樂制度便也須學㝢子善問物格曰物格是要得外靣無不盡裏靣亦清徹無不盡方是不走作恪以下物格上而無極太極下而至於一草一木一昆蟲之微亦各有理一書不讀則闕了一書道理一事不窮則闕了一事道理一物不格則闕了一物道理須要逐一件與他理㑹過道夫叔文問格物莫須用合内外否曰不須恁地説物格後他内外自然合盖天下之事皆謂之物而物之所在莫不有理且如草木禽獸雖是至微至賤亦皆有理如所謂仲夏斬陽木仲冬斬隂木自家知得這箇道理處之而各得其當便是且如鳥獸之情莫不好生而惡殺自家知得是恁地便須見其生不忍見其死聞其聲不忍食其肉方是要之今且自近以及逺由粗以至精道夫㝢錄别出問格物須合内外始得曰他内外未嘗不合自家知得物之理如此則因其理之自然而應之便見合内外之理目前事事物物皆有至理如一草一木一禽一獸皆有理草木春生秋殺好生惡死仲夏斬陽木仲冬斬隂木皆是順隂陽道理砥錄作皆是智仁底道理自家知得萬物均氣同體見生不忍見死聞聲不忍食肉非其時不伐一木不殺一獸不殺胎不妖夭不覆巢此便是合内外之理㝢砥錄畧知至謂天下事物之理知無不到之謂若知一而不知二知大而不知細知高逺而不知幽深皆非知之至也要須四至八到無所不知乃謂至耳因指燈曰亦如燈燭在此而光照一室之内未嘗有一些不到也履孫以下知至知至謂如親其所親長其所長而不能推之天下則是不能盡之扵外欲親其所親欲長其所長而自家裏靣有所不到則是不能盡之於内須是其外無不周内無不具方是知至履孫子升問知止便是知至否曰知止就事上説知至就心上説知止知事之所當止知至則心之知識無不盡木之知止就事上説知至就心上説舉其重而言閎祖問致知之致知至之至有何分别曰上一致字是推致方為也下一至字是已至先著至字旁著人字為致是人從旁推致節格物只是就事上理㑹知至便是此心透徹廣格物便是下手處知至是知得也徳明致知未至譬如一箇鐡片亦割得物事只是不如磨得芒刃十分利了一鍤便破若知得切了事事物物至靣前莫不迎刄而解賀孫未知得至時一似捕龍蛇捉虎豹相似到知得至了却恁地平平做將去然節次自有許多工夫到後來絜矩雖是自家所為皆足以興起斯民又須是以天下之心審自家之心以自家之心審天下之心使之上下四靣都平均齊一而後可賀孫鄭仲履問某觀大學知至見得是乾知道理曰何用説乾知只理㑹自家知底無不盡便了盖卿知至如易所謂極深惟深也故能通天下之志這一句畧相似能慮便是研㡬如所謂惟㡬也故能成天下之務這一句却相似䕫孫問定靜安慮得與知至意誠心正是兩事只要行之有先後據先生解安定慮得與知至似一般如何曰前靣只是大綱且如此説後靣却是學者用力處去偽致知不是知那人不知底道理只是人靣前底且如義利兩件昨日雖㸔義當為然而却又説未做也無害見得利不可做却又説做也無害這便是物未格知未至今日見得義當為決為之利不可做決定是不做心下自肯自信得及這便是物格便是知得至了此等説話為無恁地言語册子上寫不得似恁地説出却較見分曉植以下物格知至問格物窮理之初事事物物也要見到那裏了曰固是要見到那裏然也約摸是見得直到物格知至那時方信得及㝢守約問物格知至到曽子悟忠恕扵一唯處方是知得至否曰亦是如此只是就小處一事一物上理㑹得到亦是知至賀孫或問物格而后知至一句或謂物格而知便至如此則與下文而后之例不同曰㸔他文勢只合與下文一般説但且謂之物格則不害其為一事一物在到知則雖萬物亦只是一箇知故必理無不窮然後知方可盡今或問中却少了他這意思大學物格知至處便是凡聖之闗物未格知未至如何住也是凡人須是物格知至方能循循不已而入於聖人之域縱有敏鈍遲速之不同頭勢也都自向那邊去了今物未格知未至雖是要過那邊去頭勢只在這邊如門之有限猶未過得在問伊川云非樂不足以語君子便是物未格知未至未過得闗否曰然某嘗謂物格知至後雖有不善亦是白地上黑㸃物未格知未至縱有善也只是黑地上白㸃伯羽以下論格物致知誠意是學者之闗格物是夢覺闗格得來是覺格不得只是夢誠意是善惡闗誠得來是善誠不得只是惡過得此二闗上靣工夫却一節易如一節了到得平天下處尚有些工夫只為天下濶須要如此㸃檢又曰誠意是轉闗處又曰誠意是人鬼闗誠得來是人誠不得是鬼䕫孫致知誠意乃學者兩箇闗致知乃夢與覺之闗誠意乃惡與善之闗透得致知之闗則覺不然則夢透得誠意之闗則善不然則惡致知誠意以上工夫較省逐旋開去至於治國平天下地歩愈濶却須要照顧得到人傑知至意誠是凡聖界分闗隘未過此闗雖有小善猶是黑中之白已過此闗雖有小過亦是白中之黑過得此闗正好着力進歩也道夫大學所謂知至意誠者必須知至然後能誠其意也今之學者只説操存而不知講明義理則此心憒憒何事於操存也某嘗謂誠意一節正是聖凡分别闗隘去處若能誠意則是透得此闗透此闗後滔滔然自在去為君子不然則﨑嶇反側不免為小人之歸也致知所以先於誠意者如何曰致知者須是知得盡尤要親切尋常只將知至之至作盡字説近來㸔得合作切至之至知之者切然後貫通得誠意底意思如程先生所謂真知者是也謨論誠意曰過此一闗方是人不是賊又曰過此一闗方㑹進一夲云過得此闗道理方牢固方子鍾唐傑問意誠曰意誠只是要情願做工夫若非情願亦强不得未過此一闗猶有七分是小人盖卿意誠心正過得此闗義理方稳不然七分是小人在又曰意不誠底是私過心不正底是公過方子深自省察以致其知痛加剪落以誠其意升卿致知誠意知與意皆出於心知是知覺處意是發念處閎祖致知無毫釐之不盡守其所止無須㬰之或離致知如一事只知得三分這三分知得者是真實那七分不知者是虚偽為善須十分知善之可好若知得九分而一分未盡只此一分未盡便是鶻突苟且之根少間説便為惡也不妨便是意不誠所以貴致知窮到極處謂之致或得於小而失於大或得於始而失於終或得於此而失於彼或得於己而失於人極有深淺惟致知則無一事之不盡無一物之不知以心驗之以身體之逐一理㑹過方堅實僴説為學次第曰夲末精粗雖有先後然一齊用做去且如致知格物而後誠意不成説自家物未格知未至且未要誠意須待格了知了却去誠意安有此理聖人亦只説大綱自然底次序是如此拈著底須是逐一旋旋做將去始得常説田子方説文侯聽樂處亦有病不成只去明官不去明音亦須畧去理㑹始得不能明音又安能明官或以宫為商以角為徴自家緣何知得且如籩豆之事則有司存非謂都不用理㑹籩豆但比似容貌顔色辭氣為差緩耳又如官名在孔子有甚緊要處聖人一聽得郯子㑹便要去學盖聖人之學夲末精粗無一不備但不可輕夲而重末也今人閒坐過了多少日子凡事都不肯去理㑹且如儀禮一節自家立朝不曉得禮臨事有多少利害雉吴仁甫問誠意在致知格物後如何曰源頭只在致知知至之後如從靣上放水來已自迅流湍決以是臨時又要畧畧撥剔莫令壅滯爾銖問誠意莫只是意之所發制之於初否曰若説制便不得須是先致知格物方始得人莫不有知但不能致其知耳致其知者自裏靣㸔出推到無窮盡處自外靣㸔入來推到無去處方始得了意方可誠致知格物是原頭上工夫㸔來知至便自心正不用誠意兩字也得然無此又不得譬如過水相似無橋則過不得意有未誠也須著力不應道知已至不用力知若至則意無不誠若知之至欲著此物亦留不住東西南北中央皆著不得若是不誠之人亦不肯盡去亦要留些子在泳知至意誠問知至到意誠之間意自不聮屬須是别識得天理人欲分明盡去人欲全是天理方誠曰固是這事不易言須是格物精熟方到此居常無事天理實然有纎毫私欲便能識破他自來㸃檢慣了譬有賊來便識得便捉得他不曽用工底與賊同眠同食也不知大雅周震亨問知至意誠云有知其如此而行又不如此者是如何曰此只是知之未至問必待行之皆是而後騐其知至歟曰不必如此説而今説與公是知之未至公不信且去就格物窮理上做工夫窮來窮去末後自家真箇見得此理是善與是惡自心甘意肯不去做此方是意誠若猶有一毫疑貳底心便是知未至意未誠久後依舊去做然學者未能便得㑹恁地須且致其知工夫積累方㑹知至知至而后意誠須是真知了方能誠意知苟未至雖欲誠意固不得其門而入矣惟其胷中了然知得路逕如此知善之當好惡之當惡然後自然意不得不誠心不得不正因指燭曰如㸃一條蠟燭在中間光明洞達無處不照雖欲將不好物事來亦沒安頓處自然著他不得若是知未至譬如一盞燈用罩子盖住則光之所及者固可見光之所不及處則皆黑暗無所見雖有不好物事安頓在後靣固不得而知也炎錄云知既至則意可誠如燈在中間纔照不及處便有賊潜藏在彼不可知若四方八靣都光明了他便無著身處所以貴格物如佛老之學它非無長處但它只知得一路其知之所以及者則路逕甚明無有差錯其知所不及處則皆顛倒錯亂無有是處緣無格物工夫也問物未格時意亦當誠曰固然豈可説物未能格意便不用誠自始至終意常要誠如人適楚當南其轅豈可謂吾未能到楚且北其轅但知未至時雖欲誠意其道無由如人夜行雖知路從此去但黑暗行不得所以要得致知知至則道理坦然明白安而行之今人知未至者也知道善之當好惡之當惡然臨事不如此者只是實未曽見得若實見得自然行處無差僴欲知知之真不真意之誠不誠只㸔做不做如何真箇如此做底便是知至意誠道夫問知至而后意誠曰知則知其是非到意誠實則無不是無有非無一毫錯此已是七八分人然又不是今日知至意亂發不妨待明日方誠如言孔子七十而從心不成未七十心皆不可從只是説次第如此白居易詩云行年三十九嵗暮日斜時孟子心不動吾今其庶幾詩人玩弄至此可學璘錄别出舜功問致知誠意是如何先後曰此是當初一發同時做底工夫及到成時知至而后意誠耳不是方其致知則脱空妄語猖狂妄行及到誠意方始旋收拾也孔子三十而立亦豈三十嵗正月初一日乃立乎白樂天有詩吾年三十九嵗暮日斜時孟子心不動吾今其庶幾此詩人滑稽耳璘學者到知至意誠便如髙祖之闗中光武之河内芝問知至而后意誠故天下之理反求諸身實有於此似從外去討得來云云曰仁義禮智非由外鑠我也我固有之也弗思耳矣厲聲言弗思二字又笑曰某常説人有兩箇兒子一箇在家一箇在外去幹家事其父却説道在家底是自家兒子在外底不是節或問知至以後善惡既判何由意有未誠處曰克己之功乃是知至以後事惟聖罔念作狂惟狂克念作聖一念纔放下便是失其正自古無放心底聖賢然一念之微所當深謹纔説知至後不用誠意便不是人心惟危道心惟微毫釐間不可不子細理㑹纔説太快便失却此項功夫也銖問椿知極其至有時意又不誠是如何椿無對曰且去這裏子細窮究一日禀云是知之未極其至先生曰是則是今有二人一人知得這是善這是惡又有一人真知得這是善當為惡不可為然後一人心中如何見得他是真知處椿亦無以應先生笑曰且放下此一段緩緩尋思自有超然見到處椿誠意方能保䕶得那心之全體以下誠意問實其心之所發欲其一於理而無所雜曰只為一便誠二便雜如惡惡臭如好好色一故也小人閒居為不善至著其善二故也只要㸔這些便分曉二者為是真底物事却著些假攙放裏便成詐偽如這一盞茶一味是茶便是真才有些别底滋味便是有物夾雜了便是二䕫孫意誠後推盪得渣滓靈利心盡是義理閎祖以下意誠意誠如蒸餅外靣是白麺透著是白麺意不誠如蒸餅外靣雖白裏靣却只是粗麺一般閎祖心言其統體意是就其中發處正心如戒懼不睹不聞誠意如謹獨又曰由小而大意小心大閎祖正心誠意康叔臨問意既誠矣心安有不正曰誠只是實雖是意誠然心之所發有不中節處依舊未是正亦不必如此致疑大要只在致知格物上如物格知至上鹵莽雖見得似小其病却大自脩身以往只是如破竹然逐節自分明去今人見得似難其實却易人入徳處全在致知格物譬如適臨安府路頭一正着起草鞋便㑹到未須問所過州縣那箇在前那箇在後那箇是繁盛那箇是荒索工夫全在致知格物上謙論格物致知誠意正心以下問心夲也意特心之所發耳今欲正其心先誠其意似倒説了曰心無形影教人如何撐拄須是從心之所發處下手先須去了許多惡根如人家裡有賊先去了賊方得家中寜如人種田不先去了草如何下種須去了自欺之意意誠則心正誠意最是一段中緊要工夫下靣一節輕一節或云致知格物也緊要曰致知知之始誠意行之始䕫孫或問意者心之所發如何先誠其意曰小底却㑹牽動了大底心之所以不正只是私意牽去意才實心便自正聖賢下語一字是一字不似今人作文字用這一字也得改做那一字也得格物者知之始也誠意者行之始也意誠則心正自此去一節易似一節拱夀致知誠意兩節若打得透時已自是箇好人其它事一節大如一節病敗一節小如一節自脩格物者窮事事物物之理致知者知事事物物之理無所不知知其不善之必不可為故意誠意既誠則好樂自不足以動其心故心正恪格物致知正心誠意不可着纎毫私意在其中椿錄云便不是矣致知格物十事格得九事通透一事未通透不妨一事只格得九分一分不透最不可凡事不可著箇且字且字其病甚多格物致知誠意正心雖是有許多節次然其進之遲速則又随人資質敏鈍履孫大學於格物誠意都煆煉成了到得正心脩身處只是行將去都易了䕫孫致知誠意正心知與意皆從心出來知則主於别識意則主扵營為知近性近體意近情近用端䝉敬之問誠意正心脩身曰若論淺深意思則誠意工夫較深正心工夫較淺若以大小㸔則誠意較緊細而正心脩身地位又較大又較施展賀孫誠意正心脩身意是指已發處㸔心是指體㸔意是動心又是􅔜動靜身對心而言則心正是内能如此身脩是内外都盡若不各自做一節功夫不成説我意已誠矣心將自正則恐懼好樂忿懥引將去又却邪了不成説心正矣身不用管則外靣更不顧而遂心迹有異矣須是無所不用其極端䝉或問意者聽命於心者也今曰欲正其心先誠其意意乃在心之先矣曰心字卒難模索心譬如水水之體夲澄湛却為風濤不停故水亦揺動必須風濤既息然後水之體靜人之無狀汙穢皆在意之不誠必須去此然後能正其心及心既正後所謂好惡哀矜與脩身齊家中所説者皆是合有底事但當時時省察其固滯偏勝之私耳僴壯祖錄疑同聞别出問心者身之主意者心之發意發於心則意當聽命於心今曰意誠而后心正則是意反為心之管束矣何也曰心之夲體何嘗不正所以不得其正者盖由邪惡之念勃勃而興有以動其心也譬之水焉夲自瑩淨寧息盖因波濤洶湧水遂為其所激而動也更是大學次序誠意最要學者苟扵此一節分别得善惡取舎是非分明則自此以後凡有忿懥好樂親愛畏敬等類皆是好事大學之道始不可勝用矣壯祖問心如何正曰只是去其害心者端䝉或問正心脩身曰今人多是不能去致知處著力此心多為物欲所陷了惟聖人能提出此心使之光明外來底物欲皆不足以動我内中發出底又不陷了祖道心纔不正其終必至於敗國亡家僴誠意正心章一説能誠其意而心自正一説意誠矣而心不可不正問脩身齊家亦然否曰此是交㑹處不可不㸔又曰誠意以敬為先泳或問正心修身莫有淺深否曰正心是就心上説脩身是就應事接物上説那事不自心做出來如脩身如絜矩都是心做出來但正心却是萌芽上理㑹若脩身與絜矩等事却是各就地頭上理㑹毅然問家齊而后國治天下平如堯有丹朱舜有瞽瞍周公有管蔡却能平治何也曰堯不以天下與丹朱而與舜舜能使瞽瞍不格姦周公能致辟于管蔡使不為亂便是措置得好了然此皆聖人之變處想今人家不解有那瞽瞍之父丹朱之子管蔡之兄都不須如此思量且去理㑹那常處淳壹是一切也漢書平帝紀一切顔師古注猶如以刀切物取其整齊泳李從之問壹是皆以脩身為夲何故只言脩身曰脩身是對天下國家説脩身是夲天下國家是末凡前靣許多事便是理㑹脩身其所厚者薄所薄者厚又是以家對國説􅓌問大學解所厚謂家若誠意正心亦可謂之厚否曰不可此只言先後緩急所施則有厚薄節問大學之書不過明徳新民二者而已其自致知格物以至平天下乃推廣二者為之條目以發其意而傳意則又以發明其為條目者要之不過此心之體不可不明而致知格物誠意正心乃其明之之工夫耳曰若論了得時只消明明徳一句便了不用下靣許多聖人為學者難曉故推説許多節目今且以明徳新民互言之則明明徳者所以自新也新民者所以使人各明其明徳也然則雖有彼此之間其為欲明之徳則彼此無不同也譬之明徳却是材料格物致知誠意正心脩身却是下工夫以明其明徳耳於格物致知誠意正心脩身之際要得常見一个明徳隠然流行于五者之間方分明明徳如明珠常自光明但要時加拂拭耳若為物欲所蔽即是珠為泥涴然光明之性依舊自在大雅以下縂論綱領條目大學在明明徳在新民在止於至善此三箇是大綱做工夫全在此三句内下靣知止五句是説效驗如此上靣是服藥下靣是説藥之效驗正如説服到幾日效如此又服到幾日效又如此㸔來不須説效亦得服到日子滿時自然有效但聖人須要説到這田地教人知明明徳三句後靣又分析開八件致知至脩身五件是明明徳事齊家至平天下三件是新民事至善只是做得恰好後靣傳又立八件詳細剖析八件意思大抵閒時喫緊去理㑹須要把做一件事㸔横在胸中不要放下若理㑹得透徹到臨事時一一有用處而今人多是閒時不喫緊理㑹及到臨事時又不肯下心推究道理只説且放過一次亦不妨只是安于淺陋所以不能長進終於無成大抵是不曽立得志枉過日子且如知止只是閒時窮究得道理分曉臨事時方得其所止若閒時不曽知得臨事如何了得事親固是用孝也須閒時理㑹如何為孝見得分曉及到事親時方合得這道理事君亦然以至凡事都如此又問知止是萬事萬物皆知得所止或只指一事而言曰此徹上徹下知得一事亦可謂之知止又問上達天理便是事物當然之則至善處否曰只是合禮處便是天理所以聖人教人致知格物亦只要人理㑹得此道理又問大學表裏精粗如何曰自是如此粗是大綱精是裏靣曲折處又曰外靣事要推闡故齊家而后治國平天下裏靣事要切已故脩身正心必先誠意致知愈細宻又問真知曰曽被虎傷者便知得是可畏未曽被虎傷底須逐旋思量箇被傷底道理見得與被傷者一般方是明作格物致知是求知其所止誠意正心脩身齊家治國平天下是求得其所止物格知至是知所止意誠心正身脩家齊國治天下平是得其所止大學中大抵虚字多如所謂欲其而后皆虚字明明徳新民止於至善致知格物誠意正心脩身齊家治國平天下是實字今當就其緊要實處著工夫如何是致知格物以至于治國平天下皆有節目須要一一窮究著實方是道夫自欲明明徳於天下至先致其知皆是隔一節所以言欲如此者必先如此致知在格物知與物至切近正相照在格物所以致知物才格則知已至故云在更無次第也閎祖大學明明徳於天下以上皆有等級到致知格物處便較親切了故文勢不同不曰致知者先格其物只曰致知在格物也意誠而后心正不説是意誠了便心正但無詐偽便是誠心不在焉便不正或謂但正心不須致知格物便可以脩身齊家却恐不然聖人教人窮理只道是人在善惡中不能分别得故善或以為惡惡或以為善善可以不為不妨惡可以為亦不妨聖人便欲人就外靣攔截得緊見得道理分明方可正得心誠得意不然則聖人告顔子如何不道非禮勿思却只道勿視聽言動如何又先道居處恭執事敬而後與人忠敬字要體得親切似得箇畏字銖記先生嘗因諸生問敬宜何訓曰是不得而訓也惟畏庶㡬近之銖云以畏訓敬平淡中有滋味曰然幹欲明明徳於天下者先治其國至致知在格物欲與先字謂如欲如此必先如此是言工夫節次若致知在格物則致知便在格物上㸔來欲與先字差慢得些子在字又緊得些子履孫大學言物格而后知至至天下平聖人説得寛不説道能此即能彼亦不説道能此而後可學彼只是如此寛説後靣逐段節節更説只待人自㸔得如何振蔡元思問大學八者條目若必待行得一節了旋進一節則沒世窮年亦做不徹㸔來日用之間須是随其所在而致力遇著物來靣前便用格知之所至便用致意之發便用誠心之動便用正身之應接便用脩家便用齊國便用治方得曰固是他合下便説古之欲明明徳於天下便是就這大規模上説起只是細推他節目緊要處則須在致知格物誠意迤邐做將去云云又曰有國家者不成説家未齊未能治國且待我去齊得家了却來治國家未齊者不成説身未脩且待我脩身了却來齊家無此理但細推其次序須著如此做若随其所遇合當做處則一齊做始得僴大學自致知以至平天下許多事雖是節次如此須要一齊理㑹不是説物格後方去致知意誠後方去正心若如此説則是當意未誠心未正時有家也不去齊如何得且如在下位不獲乎上數句意思亦是如此若未獲乎上更不去治民且一向去信朋友若未信朋友時且一向去悦親掉了朋友不管須是多端理㑹方得許多節次聖人亦是畧分箇先後與人知不是做一件淨盡無餘方做一件若如此做何時得成又如喜怒上做工夫固是然亦須事事照管不可專於喜怒如易損卦懲忿窒慾益卦見善則遷有過則改似此説話甚多聖人却去四頭八靣説來須是逐一理㑹身上許多病痛都要防閑明作問知至了意便誠抑是方可做誠意工夫曰也不能恁地説得這箇也在人一般人自便能如此一般人自當循序做但知至了意誠便易且如這一件事知得不當如此做末梢又却如此做便是知得也未至若知得至時便決不如此如人既知烏喙之不可食水火之不可蹈豈肯更試去食烏喙蹈水火若是知得未至時意決不能誠問知未至之前所謂謹獨亦不可忽否曰也不能恁地説得規模合下皆當齊做然這裏只是説學之次序如此説得來快無恁地勞攘且當循此次序初間欲明明徳於天下時規模便要恁地了既有恁地規模當有次序工夫既有次序工夫自然有次序功效物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平只是就這規模恁地廣開去如破竹相似逐節恁地去㝢説大學次序曰致知格物是窮此理誠意正心脩身是體此理齊家治國平天下只是推此理要做三節㸔雉大學一篇却是有兩箇大節目物格知至是一箇誠意脩身是一箇才過此二闗了則便可直行將去泳物格知至是一截事意誠心正身脩是一截事家齊國治天下平又是一截事自知至交誠意又是一箇過接闗子自脩身交齊家又是一箇過接闗子賀孫自格物至脩身自淺以及深自齊家至平天下自内以及外敬仲或問格物致知到貫通處方能分别取舎初間亦未嘗不如此但較生澁勉强否曰格物時是窮盡事物之理這方是區處理㑹到得知至時却已自有箇主宰㑹去分别取舎初間或只見得表不見得裏只見得粗不見得精到知至時方知得到能知得到方㑹意誠可者必為不可者決不肯為到心正則胸中無些子私蔽洞然光明正大截然有主而不亂此身便脩家便齊國便治而天下可平賀孫格物致知比治國平天下其事似小然打不透則病痛却大無進歩處治國平天下規模雖大然這裡縱有未盡處病痛却小格物致知如知及之正心誠意如仁能守之到得動之不以禮處只是小小未盡善盖卿方子錄云格物誠意其事似乎小然若打不透却是大病痛治國平天下規模雖大然若有未到處其病却小盖前靣大夲領已自正了學者若做到物格知至處此是十分以上底人問㸔來大學自格物至平天下凡八事而心是在當中擔著兩下者前靣格物致知誠意是理㑹箇心後靣身脩家齊國治天下平是心之功用曰據他夲經去脩身上截斷然身亦是心主之士毅自明明徳至於治國平天下如九層寳塔自下至上只是一箇塔心四靣雖有許多層其實只是一箇心明徳正心誠意脩身以至治國平天下雖有許多節次其實只是一理須逐一從前靣㸔來㸔後靣又推前靣去故曰知至而后意誠意誠而后心正也子蒙問古之欲明明徳於天下者至致知在格物詳其文勢似皆是有為而後為者曰皆是合當為者經文既自明徳説至新民止於至善下文又却反覆明辨以見正人者必先正已孟子曰天下之夲在國國之夲在家家之夲在身亦是此意道夫問古之欲明明徳於天下至致知在格物向疑其似於為人今觀之大不然盖大人以天下為度者也天下苟有一夫不被其澤則於吾心為有慊而吾身於是八者有一毫不盡則亦何以明明徳於天下耶夫如是則凡其所為雖若為人其實則亦為己而已先生曰為其職分之所當為也道夫朱子語類卷十五
