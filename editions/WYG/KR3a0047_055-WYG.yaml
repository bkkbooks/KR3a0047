body:
  text: 朱子語類卷五十五孟子五滕文公上滕文公為世子章孟子道性善言必稱堯舜須㸔因何理㑹箇性善作甚底賜性善故人皆可為堯舜必稱堯舜所以騐性善之實徳眀孔子罕言性孟子見滕文公便道性善必稱堯舜恰似孟子告人躐等相似然他亦欲人先知得一箇本原則為善必力去惡必勇今扵義理須是見得了自然循理有不得不然若説我要做好事所謂這些意䏻得㡬時子端䝉劉棟問人未能便至堯舜而孟子言必稱之何也曰道性善與稱堯舜二句正相表裏盖人之所以不至扵堯舜者是他力量不至固無可奈何然人須當以堯舜為法如射者之於的箭箭皆欲其中其不中者其技藝未精也人到得堯舜地位方做得一箇人無所欠闕然也只是本分事這便是止於至善道夫問孟子言性何必於其已發䖏言之曰未發是性已發是善可學孟子道性善其發於外也必善無惡惡非性也性不惡矣節問孟子道性善不曾説氣禀曰是孟子不曾思量到這裏但説本性善失却這一節問氣禀是偶然否曰是偶然相值着非是有安排等待問天生聰眀又似不偶然曰便是先来説主宰底一般忽生得箇人恁地便是要他出来作君作師書中多説聰眀盖一箇説白一箇説黒若不是聰眀底如何遏伏得他衆人所以中庸亦云惟天下至聖為䏻聪眀睿知足以有臨且莫説聖賢只如漢髙祖光武唐憲宗武宗他更自了得某甞説韓退之可憐憲宗也自知他只因佛骨一事忤意未一年而憲宗死亦便休了盖只有憲宗㑹用得他池録作憲宗也㑹用人或曰用李絳亦如此曰憲宗初年許多伎倆是李絳教他絳本傳説得詳然絳自有一書名論事記記得更詳如李徳裕獻替録之類䕫孫李仲實問注云惟堯舜為䏻無物欲之蔽而充其性人盖有恬於嗜欲而不䏻充其性者何故曰不蔽於彼則蔽於此不蔽於此則蔽於彼畢竟須有蔽處物欲亦有多少般如白日須是雲遮方不見若無雲豈應不見耶此等䖏𦂳要在性字上今且合思量如何是性在我為何物反求吾心有蔽無蔽䏻充不能充不必論堯如何舜又如何如此方是讀書閎祖或問孟子道性善章㸔来孟子言赤子将入井有􅇶惕惻隠之心此只就情上見亦只説得時暫發見處如言孩提之童無不愛其親亦只是就情上説得他人事初無預於己若要㸔得自己日用工夫惟程子所謂天下之理原其所自未有不善喜怒哀樂未發何甞不善發而中節即無往而不善發不中節然後不善此語最為親切學者知此當扵喜怒哀樂未發加持敬工夫於喜怒哀樂已發加省察功夫方為切己曰不消分這箇是親切那箇是不親切如此則成兩截了盖是四者未發時那􅇶惕惻隠與孩提愛親之心皆在裏面了少間發出来即是未發底物事静也只是這物事動也只是這物事如孟子所説正要人扵發動䖏見得是這物事盖静中有動者存動中有静者存人但要動中見得静静中見得動若説動時見得是一般物事静時又見得别是一般物事静時見得是這般物事動時又見得不是這般物事没這説話盖動時見得是這物事即是静時所養底物事静時若存守得這物事則日用流行即是這物事而今學者且要識得動静只是一箇物事燾性圖惡惡不可謂從善中直下来只是不䏻善則偏於一邊為惡性善性無不善善發而中節無往不善孟子初見滕世子想是見其資質好遂即其本原一切為他啟廸了世子若是負荷得時便只是如此了及其復見孟子孟子見其領畧未得更不説了只是發他志但得於此勉之亦可以至彼若更説便漏逗了當時啟廸之言想見甚好惜其不全記不得一觀揚問集注云云曰大槩是如此孟子七篇論性䖏只此一䖏已説得盡須是日日認一過只是要熟又曰程子説才與孟子説才自不同然不相妨須是子細㸔始得賀孫問三子之事成覸則若参較彼己顔子則知聖人學之必可至公眀儀則篤信好學者也三者雖有淺深要之皆是尚志曰也畧有箇淺深恁地㸔文字且須㸔他大意又曰大抵㸔文字不恁地子細分别出来又却鶻突到恁地細碎分别得出来不曾㸔得大節目䖏又只是在落草䖏尋道夫曰這般𦂳要節目其初在道性善其中在夫道一而已矣其終在若藥不瞑眩厥疾不瘳曰然道夫符舜功問滕世子從孟子言何故後来不濟事曰亦是信不篤如自楚反復問孟子孟子已知之曰世子疑吾言乎則是知性不的他當時地歩狭本難做又識見卑未甞立定得志且如許行之術至淺下且延之舉此可見可學或問孟子初教滕文公如此似好後来只恁休了是如何曰滕國小絶長補短止五十里不過如今一鄉然孟子與他説時也只説猶可以為善國而已終不成以所告齊梁之君者告之兼又不多時便為宋所滅因言程先生説孔子為乗田則為乗田為委吏則為委吏為司冦則為司冦無不可者至孟子則必得賔師之位方能行道此便是他能大而不能小䖏惟聖人則無不遍大小方圓無所不可又曰如孟子説諸侯之禮吾未之學也此亦是講學之有闕盖他心量不及聖人之大故扵天下事有包括不盡䖏天下道理儘無窮人要去做又做不辦極力做得一兩件又困了惟是聖人便事事窮到徹底包括浄盡無有或遺正淳曰如夏商之禮孔子皆能言之却是當時杞宋之國文獻不足不足取以證聖人之言耳至孟子則曰吾未之學也而已甞聞其畧也而已廣滕定公薨章今欲處世事於陵夷之後乃一向討論典故亦果何益孟子扵滕文公乃云諸侯之禮吾未之學便説與齊䟽之服飦粥之食哭泣盡哀大綱先正了可學古宗法如周公兄弟之為諸侯者則皆以魯國為宗至戰國時滕猶稱魯為宗國也廣滕文公問為國章因説今日田賦利害曰某甞疑孟子所謂夏后氏五十而貢殷人七十而助周人百畝而徹恐不觧如此先王疆理天下之初做許多畎溝澮洫之類大段費人力了若自五十而增為七十自七十而增為百畝則田間許多疆理都合更改恐無是理孟子當時未必親見只是傳聞如此恐亦難盡信也廣孟子説夏后氏五十而貢殷人七十而助周人百畝而徹恐亦難如此移改禮記正義引劉氏皇氏之説正是獃人説話盖田地一方溝洫廬舍成之亦難自五十里而改為七十里既是七十里却改為百里便都着那䟎動此擾亂之道如此則非三代田制乃王葬之制矣必大孟子説貢助徹亦有可疑者若夏后氏既定五十而貢之制不成商周再分其田逓相增補豈不大擾聖人舉事恐不如此如王莾之封國割某地屬某國至扵淮陽太守無民可治来歸京師此尤可笑正義引劉氏皇氏㷱氏説皆是臆度迂僻之甚人傑孟子説制度皆舉其綱而已如田之十一䘮之自天子達之類方世禄是食公田之人問鄰長比長之屬有禄否曰恐未必有問士者之學如何曰亦農隙而學孰與教之曰鄉他録作卿大夫有徳行而致其仕者俾教之徳眀孟子只把雨我公田證周亦有公田讀書亦不須究盡細微因論永嘉之學於制度名物上致詳方子問滕文公為善如何行王道不得只可為後法曰他當時大故展拓不去只有五十里如何做得事㸔得来渠國亦不甚久便亡問所謂小國七年者非是封建小國恐是燕韓之類曰然可學請野九一而助國中什一使自賦如古注之説如何曰若将周禮一一求合其説亦難此二句大率有周禮制度野謂甸稍縣都行九一法國中什一以在王城豐凶易察去偽或問耕野九一而助國中什一使自賦曰國中行鄉遂之法如五家為比五比為閭四閭為族五族為黨五黨為州又如五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍皆是五五相連属所以行不得那九一之法故只得什一使自賦如鄉遂却行井牧之法次第是一家出一人兵且如五家為比比便有一箇長了井牧之法次第是三十家方出得士十人徒十人井田之法孟子説夏五十而貢殷七十而助周百畝而徹此都是孟子拗䖏先是五十後是七十又是一百便是一畨打碎一畨想聖人䖏事必不如是勞擾又如先儒説封建古者公侯百里伯七十里子男五十里至周公則斥大疆界始大封侯國公五百里侯四百里伯三百里子男百里如此則是将那小底移動添封為大國豈有此理禹塗山之㑹執玉帛者萬國當時所謂國者如今溪洞之類如五六十家或百十家各立箇長自為一䖏都来朝王想得禮數大段藞苴後来到夏商衰時皆相吞併漸漸大了至周時只有千八百國便是萬國吞併為千八百國不及五分之一矣可見其又大了周畢竟是因而封之豈有移去許多小國却封為大國然聖人立法亦自有低昻不如此截然謂如封五百里國這一段四面大山如太行却有六百里不成是又挑出那百里外加封四百里這一段却有三百五十里不成又去别䖏討一段子五十里来添都不如此殺定盖孟子時去周已七八百年如今去隋時既無人記得又無載籍可攷所以難見得端的又周封齊魯之地是誅紂伐奄滅國者五十所以封齊魯之地極廣如魯地方千里如齊東至海西至河南至穆陵北至無棣是多少廣闊燾問圭田餘夫之田是在公田私田之外否曰卿受田六十邑乃當二百四十井此外又有圭田五十畝也餘夫二十五畝乃十六嵗以前所受在一夫百畝之外也孟子亦只是言大槩耳未必曾見周禮也時舉有為神農之言章徳脩觧君民並耕以為有體無用曰如何是有體無用這箇連體都不是徳脩曰食豈可無但以君民並耕而食則不可不成因君民不可並耕却不耕耕食自不可無此是體以君民並耕則無用曰有大人之事有小人之事若是以君民並耕畢竟體己不是文蔚排淮泗而注之江淮自不與江通大綱如此説去謨問振徳是施惠之意否曰是然不是財恵之惠只是施之以教化上文匡直輔翼等事是也彼既自得之復從而教之放勛曰曰字不當音馹㽦墨者夷之章夷子以謂愛無差等施由親始似知所先後者其説如何曰人多疑其知所先後而不知此正是夷子錯䖏人之有愛本由親立推而及物自有等級今夷子先以為愛無差等而施之則由親始此夷子所以二本矣夷子但以此解厚葬其親之言而不知愛無差等之為二本也去偽亞夫問愛無差等施由親始與親親而仁民仁民而愛物相類否曰既是愛無差等何故又施由親始這便是有差等又如施由親始一句乃是夷之臨時譔出来揍孟子意却不知愛無差等一句已不是了他所謂施由親始便是把愛無差等之心施之然把愛人之心推来愛親是甚道理時舉問愛有差等此所謂一本盖親親仁民愛物具有本末也所謂二本是如何曰愛無差等何止二本盖千萬本也退與彦忠論此彦忠云愛吾親又兼愛他人之親是二愛並立故曰二本徳眀或問一本曰事他人之親如己之親則是兩箇一樣重了如一本有兩根也燾問人只是一父母所生如木只是一根株夷子却視他人之親猶己之親如牽彼樹根强合此樹根曰愛無差等便是二本至曰命之矣之字作夷子名㸔方成句法若作虛字㸔則不成句法曰是至尹氏曰何以有是差等一本故也無偽也既是一本其中便自然有許多差等二本則二者並立無差等矣墨子是也僴滕文公下陳代曰不見諸侯章問枉尺直尋曰援天下以道若枉己便己枉道則是己失援天下之具矣更説甚事自家身既已壊了如何直人恪招虞人以旌不至将殺之刀鋸在前而不避非其氣不餒如何强得閎祖詭遇是做人不當做底行險是做人不敢做底方子子路則範我馳驅而不獲者也管仲之功詭遇而獲禽耳燾射者御者都合法度方中嬖奚不䏻正射王良以詭御就之故良不貴之御法而今尚可尋但是今人尋得亦無用䖏故不肯侯景反時士大夫無人㑹騎此時御法尚存今射亦有法一學時便要合其法度若只是胡亂射将来又學其法不得某舊學琴且亂彈謂待㑹了却依法元来不然其後遂學不得知學問安可不謹厥始揚景春曰公孫衍張儀章敬之問居天下之廣居立天下之正位行天下之大道曰大槩只是無些子偏曲且如此心廓然無一毫私意直與天地同量這便是居天下之廣居便是居仁到得自家立身更無些子不當於理這便是立天下之正位便是守禮及推而見於事更無些子不合於義這便是行天下之大道便是由義論上兩句則居廣居是體立正位是用論下兩句則立正位是體行大道是用要知能居天下之廣居自然能立天下之正位行天下之大道恪居之問廣居正位大道曰廣居是廓然大公無私欲之蔽正位是所立䖏都無差過大道是事事做得合冝居字是就心上説擇之云廣居就存心上説先生曰是也立字是就身上説行字是就施為上説賀孫居之問廣居正位大道曰廣居是不狭隘以天下為一家中國為一人何廣如之正位大道只是不僻曲正位就䖏身上説大道就䖏事上説植居者心之所存廣居無私意也才有私意則一分為二二分為四四分為八只見分小著立者身之所䖏正位者當為此官則為此官當在此則在此行者事之所由大道者非偏旁之徑荆棘之塲人生只是此三事節居天下之廣居立天下之正位行天下之大道惟集義養氣方到此地位富貴不䏻淫貧賤不䏻移威武不能屈以浩然之氣對着他便能如此彼以其富我以吾仁彼以其爵我以吾義在彼者皆我之所不為也在我者皆古之制也吾何畏彼哉閎祖問居廣居立正位行大道是浩然之氣否曰然浩然之氣須是養有下工夫䖏居廣居以下是既有浩然之氣方能如此大雅問居天下之廣居云云如欲授孟子室養弟子以萬鍾孟子若去那裏立便不是正位林擇之云如不與驩言之事亦是正位曰然公孫丑問不見諸侯章問公孫丑言孟子不見諸侯何故千里来見梁惠王曰以史記考之此是梁恵王招之而至其曰千里而来者亦是勞慰之辭爾孟子出䖏必不錯了如平日在諸侯國内雖不為臣亦有時去見他若諸侯来召則便不去盖孟子以賓師自䖏諸侯有謀則就之如孟子一日将見王王不合使人来道我本就見縁有疾不可以風不知可以来見否孟子才聞此語便不肯去時坐間有楊方縣丞者云弟子稱其師不見諸侯必是其師尋常如此其見梁恵王亦須有説但今人不肯便信他説話只管信後人言語所以疑得孟子如此謨孟子之時時君重士為士者不得不自重故必待時君致敬盡禮而後見自是當時做得箇規模如此定了如史記中列國之君擁篲先迎之類却非是當世輕士而孟子有意於矯之以自髙也因説孟子不見諸侯及此僴至云㸔得孟子於辭受取舍進退去就莫非天理時中之妙無一毫人欲之私無一毫過不及之病如謂段干木踰垣而避之泄栁閉門而不納是皆已甚廹斯可以見矣充仲子之操則蚓而後可謂非其有而取之者盜也充類至義之盡辭曰聞戒餽贐可受則受之皆無一毫過不及無一毫私意曰道理固是恁地而今有此事到面前這道理又却那裏安頓至公都子問好辯章居之問孟子豈好辯章先生令看大意曰此段最好㸔㸔見諸聖賢遭時之變各行其道是這般時節其所以正救之者是這般様子這見得聖賢是甚麽様大力量恰似天地有闕齾䖏得聖賢出来補得教周全補得周全後過得稍久又不免有闕又得聖賢出来補這見聖賢是甚力量直有闔闢乹坤之功賀孫堯晚年方遭水堯之水最可疑禹治之尤不可曉胡安定説不可信掘地注海之事亦不知如何掘盖堯甚以為儆必不是未有江河而然滔天之水如何掘以注海只是不曽見中原如何此中江河皆有路通常疑恐只是治黄河費許多力黄河今由梁山泊入清河楚州振問孔子作春秋空言無補亂臣賊子何縁便懼且何足為春秋之一治曰非説當時便一治只是存得箇治法使這道理光眀燦爛有能舉而行之為治不難當時史書掌扵史官想人不得見及孔子取而筆削之而其義大眀孔子亦何甞有意説用某字使人知勸用某字使人知懼用某字有甚微詞奥義使人曉不得足以褒貶榮辱人来不過如今之史書直書其事善者惡者了然在目觀之者知所懲勸故亂臣賊子有所畏懼而不犯耳近世説春秋者太巧皆失聖人之意又立為凡例加某字其例為如何去某字其例為如何盡是胡説問孔子所書辭嚴義簡若非三傳詳著事迹也曉它筆削不得曰想得孔子作書時事迹皆在門人弟子皆曉得聖人筆削之意三家懼其久而泯没也始皆筆之於書流傳既久是以不無訛謬然孔子已自直書在其中如云夫人姜氏㑹齊侯于某公與夫人姜氏㑹齊侯于某公薨于齊公之䘮至自齊夫人孫于齊此等顯然在目雖無傳亦可曉且如楚子侵中國得齊桓公與之做頭抵攔遏住他使之不得侵齊桓公死又得晋文公攔遏住如横流泛濫硬做隄防不然中國為渰浸必矣此等義何難曉問讀春秋之法曰無它法只是據經所書之事迹準折之以先王之道某是某非某人是底猶有未是䖏不是底又有彼善於此䖏自将道理折衷便見如㸔史記秦之所以失如何漢之所以得如何楚漢交爭楚何以亡漢何以興其所以為是非得失成敗盛衰者何故只将自家平日講眀底道理去折衷㸔便見㸔春秋亦如此只是聖人言語細宻要人子細斟量考索耳問胡文定春秋解如何曰説得太深蘇子由教人㸔左傳不過只是㸔它事之本末而以義理折衷去取之耳僴孟子苦死要與楊墨辯是如何與他有甚寃惡所以闢之如不共戴天之讐能言距楊墨者聖人之徒也才説道要距楊墨便是聖人之徒如人逐賊有人見了自不與捉這便喚做是賊之黨賊是人情之所當惡若説道賊當捉當誅這便是主人邊人若説道賊也可捉可恕這只喚做賊邊人賀孫問孟子好辯一節曰當時如縱横刑名之徒孟子却不管他盖他只壊得箇麤底若楊墨則害了人心須着與之辯時舉謂當時人心不正趨向不一非孟子力起而闢之則聖人之道無自而眀是時真箇少孟子不得曰孟子於當時只在私下恁地説所謂楊墨之徒也未怕他到後世却因其言而知聖人之道為是知異端之學為非乃是孟子有功於後世耳時舉因居之㸔好辯一章曰墨氏愛無差等故視其父如路人楊氏只理㑹自己所謂修其身而外天下國家者故至於無君要之楊墨即是逆理不循理耳如一株木順生向上去是順理今一枝乃逆下生来是逆理也如水本潤下今洪水乃横流是逆理也禹掘地而注之海乃順水之性使之潤下而已暴君壊宫室以為汚池棄田以為園囿民有屋可居有地可種桑麻今乃壊而棄之是逆理也湯武之舉乃是順理如楊墨逆理無父無君邪説誣民仁義充塞便至於率獸食人人相食此孟子極力闢之亦只是順理而已此一段多推本先生意非全語植敬之問楊墨曰楊墨只是差了些子其末流遂至於無父無君盖楊氏見世間人營營扵名利埋没其身而不自知故獨潔其身以自髙如荷簣接輿之徒是也然使人皆如此潔身而自為則天下事教誰理㑹此便是無君也墨氏見世間人自私自利不能及人故欲兼天下之人人而盡愛之然不知或有一患難在君親則當先救在他人則後救之若君親與他人不分先後則是待君親猶他人也便是無父此二者之所以為禽獸也孟子之辯只縁是放過不得今人見佛老家之説者或以為其説似勝吾儒之説或又以為彼雖説得不是不用管他此皆是看他不破故不䏻與之辯若真箇見得是害人心亂吾道豈容不與之辯所謂孟子好辯者非好辯也自是住不得也南升問墨氏兼愛何遽至於無父曰人也只孝得一箇父母那有七手八脚愛得許多䏻飬其父無闕則已難矣想得他之所以養父母者粗衣糲食必不䏻堪盖他既欲兼愛則其愛父母也必踈其孝也不周至非無父而何墨子尚儉惡樂所以説里號朝歌墨子回車想得是箇淡泊枯槁底人其事父母也可想見又問率獸食人亦探其弊而極言之非真有此事也曰不然即他之道便䏻如此楊氏自是箇退歩愛身不理㑹事底人墨氏兼愛又弄得没合殺使天下倀倀然必至於大亂而後已非率獸食人而何如東晉之尚清談此便是楊氏之學楊氏即老荘之道少間百事廢弛遂啟夷狄亂華其禍豈不惨於洪水猛獸之害又如梁武帝事佛至於社稷坵墟亦其驗也如近世王介甫其學問髙妙出入於老佛之間其政事欲與堯舜三代争衡然所用者盡是小人聚天下輕薄無頼小人作一䖏以至遺禍至今他初間也何甞有夷狄亂華率獸食人之意只是本原不正義理不眀其終必至於是耳或云若論其修身行己人所不及曰此亦是他一節好其他狠厲偏僻招合小人皆其資質學問之差亦安得以一節之好而盖其大節之惡哉吁可畏可畏僴問墨氏兼愛疑於仁此易見楊氏為我何以疑於義曰楊朱㸔来不似義他全是老子之學只是箇逍遥物外僅足其身不屑世務之人只是他自愛其身界限齊整不相侵越微似義耳然終不似也僴論楊墨餘見端類盡心上及異孟子言我欲正人心盖人心正然後可以有所為今人心都不正了如何可以理㑹朱子語類卷五十五
