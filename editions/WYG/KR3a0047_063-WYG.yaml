body:
  text: 朱子語類卷六十三中庸第三章或問君子之中庸也君子而時中曰君子只是説箇好人時中只是説做得箇恰好底事義剛問時中曰自古来聖賢講學只是要尋討這箇物事語訖若有所思然他日又問先生曰從来也只有六七箇聖人把得定炎君子而時中與易傳中所謂中重於正正者未必中之意同正者且是分别箇善惡中則是恰好處䕫孫問諸家所説時中之義惟横渠説所以能時中者其説得之時中之義甚大須精義入神始得觀其㑹通以行其典禮此方真是義理也行其典禮而不達㑹通則有時而不中者矣君子要多識前言徃行以蓄其徳者以其看前言徃行熟則自能見得時中此是窮理致知功夫惟如此乃能擇乎中庸否曰此説亦是横渠行状述其言云吾學既得於心則修其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已矣他意謂須先説得分明然後方行得分明今人見得不明故説得自儱侗如何到行處分明銖問有君子之徳而又能随時以處中盖君子而能擇善者曰有君子之徳而不能随時以處中則不免為賢知之過故有君子之徳而又能随時以處中方是到恰好處又問然則小人而猶知忌憚還可似得愚不肖之不及否曰小人固是愚所為固是不肖然畢竟大抵是不好了其有忌憚無忌憚只争箇大膽小膽耳然他本領不好猶知忌憚則為惡猶較得些程先生曰語惡有淺深則可謂之中庸則不可也以此知王肅本作小人反中庸為是所以程先生亦取其説銖問如何是君子之徳與小人之心曰為善者君子之徳為惡者小人之心君子而處不得中者有之小人而不至於無忌憚者亦有之惟其反中庸則方是其無忌憚也廣至之疑先生所解有君子之徳又能随時以得中曰當看而字既是君子又要時中既是小人又無忌憚過以性情言之謂之中和以禮義言之謂之中庸其實一也以中對和而言則中者體和者用此是指已發未發而言以中對庸而言則又折轉来庸是體中是用如伊川云中者天下之正道庸者天下之定理是也此中却是時中執中之中以中和對中庸而言則中和又是體中庸又是用端䝉或問子思稱夫子為仲尼曰古人未嘗諱其字眀道嘗云予年十四五從周茂叔本朝先軰尚如此伊川亦嘗呼明道表徳如唐人尚不諱其名杜甫詩云白也詩無敵李白詩云飯顆山頭逢杜甫卓近看儀禮見古人祭祀皆穪其祖為伯某甫可以釋所疑子思不字仲尼之説灝第四章問道之不明不行曰今人都説得差了此正分明交互説知者恃其見之髙而以道為不足行此道所以不行賢者恃其行之過而以道為不足知此道之所以不明如舜之大知則知之不過而道所以行如回之賢則行之不過而道所以明舜聖矣而好問好察邇言則非知者之過執兩端用其中則非愚者之不及回賢矣而能擇乎中庸非賢者之過服膺勿失則非不肖者之不及銖問知者如何却説不行賢者如何却説不明曰知者縁他見得過髙便不肯行故曰不行賢者資質既好便不去講學故云不明知如佛老皆是賢如一種天資好人皆是炎子武問道之不行也一章這受病處只是知有不至所以後面説鮮能知味曰這箇各有一般受病處今若説道之不明也知者過之愚者不及也道之不行也賢者過之不肖者不及也恁地便説得順今却恁地蹺説時縁是智者過於明他只去窮高極逺後只要見得便了都不理㑹行如果老之属他便只是要見得未見得時是恁地及見得後也只恁地都不去行又有一般人却只要苦行後都不去明如老子之属他便只是説不要明只要守得自家底便了此道之所以不明也義剛問楊氏以極髙明而不道中庸為賢知之過道中庸而不極髙明為愚不肖之不及曰賢者過之與知者過之自是兩般愚者之不及與不宵者之不及又自是兩般且先理㑹此四項令有着落又與極髙明道中庸之義全不相關况道中庸最難若能道中庸即非不及也必大第六章舜固是聰明睿知然又能好問而好察邇言樂取諸人以為善併合將来所以謂之大知若只據一已所有便有窮盡廣賀孫同問隠惡而揚善曰其言之善者播揚之不善者隠而不宣則善者愈樂告以善而不善者亦無所愧而可復言也若其言不善我又揚之於人説他底不是則其人愧耻不復敢以言来告矣此其求善之心廣大如此人安得不盡以其言来告而吾亦安有不盡聞之言乎盖舜本自知能合天下之知為一人之知而不自用其知此其知之所以愈大若愚者既愚矣又不能求人之知而自任其愚此其所以愈愚惟其知也所以能因其知以求人之知而知愈大惟其愚也故自用其愚而不復求人之知而愈愚也僴執其兩端之執如俗語謂把其兩頭節執其兩端是摺轉来取中節愚按定説在後或問執其兩端而用其中曰如天下事一箇人説東一箇説西自家便把東西來斟酌看中在那裏燾兩端如厚薄輕重執其兩端用其中於民非謂只於二者之間取中當厚而厚即厚上是中當薄而薄即薄上是中輕重亦然閎祖兩端不専是中間如輕重或輕處是中或重處是中炎兩端未是不中且如賞一人或謂當重或謂當輕於此執此兩端而求其恰好道理而用之若以兩端為不中則是無商量了何用更説執兩端義剛問執兩端而量度以取中當厚則厚當薄則薄為中否曰舊見欽夫亦要恁地説某謂此句只是將兩端来量度取一箇恰好處如此人合與之百錢若與之二百錢則過與之五十則少只是百錢便恰好若當厚則厚自有恰好處上面更過厚則不中而今這裏便説當厚則厚為中却是躐等之語或問伊川曰執謂執持使不得行如何某説此執字只是把此兩端來量度取中曰此執字只是把来量度至問註云兩端是衆論不同之極致曰兩端是両端盡處如要賞一人或言萬金或言千金或言百金或言十金自家須從十金審量至萬金酌中看當賞他㡬金賜才卿問兩端謂衆論不同之極致且如衆論有十分厚者有一分薄者取極厚極薄之二説而中折之則此為中矣曰不然此乃子莫執中也安得謂之中兩端只是箇起止二字猶云起這頭至那頭也自極厚以至極薄自極大以至極小自極重以至極輕於此厚薄大小輕重之中擇其説之是者而用之是乃所謂中也若但以極厚極薄為兩端而中折其中間以為中則其中間如何見得便是中盖或極厚者説得是則用極厚之説極薄之説是則用極薄之説厚薄之中者説得是則用厚薄之中者之説至於輕重大小莫不皆然盖惟其説之是者用之不是棄其兩頭不用而但取兩頭之中者以用之也且如人有功當賞或説合賞萬金或説合賞千金或有説合賞百金或又有説合賞十金萬金者其至厚也十金其至薄也則把其兩頭自至厚以至至薄而精權其輕重之中若合賞萬金便賞萬金合賞十金也只得賞十金合賞千金便賞千金合賞百金便賞百金不是棄萬金十金至厚至薄之説而折取其中以賞之也若但欲去其兩頭而只取中間則或這頭重那頭輕這頭偏多那頭偏少是乃所謂不中矣安得謂之中才卿云或問中却説當衆論不同之際未知其孰為過孰為不及而為中也故必兼摠衆説以執其不同之極處而半折之然後可以見夫上一端之為過下一端之為不及而兩者之間之為中如先生今説則或問半折之説亦當改曰便是某之説未精以此見作文字難意中見得了了及至筆下依舊不分明只差些子便意思都錯了合改云故必兼摠衆説以執其不同之極處而審度之然後可以識夫中之所在而上一端之為過下一端之為不及云云如此語方無病或曰孔子所謂我叩其兩端與此同否曰然竭其兩端是自精至粗自大至小自上至下都與它説無一毫之不盡舜之執兩端是取之於人者自精至粗自大至小摠括包盡無一善之或遺僴一作才卿問或問以程子執把兩端使民不行為非而先生所謂半折之上一端為過下一端為不及而兩者之間為中悉無以異於程説曰非是如此隠惡揚善惡底固不問了就衆説善者之中執其不同之極處以量度之如一人云長八尺一人云長九尺又一人云長十尺皆長也又皆不同也不可便以八尺為不及十尺為過而以九尺為中也盖中處或在十尺上或在八尺上不可知必就三者之説子細量度看那説是或三者之説皆不是中自在七尺上亦未可知然後有以見夫上一端之為過下一端之為不及而三者之間為中也半折之説誠為有病合改云云云舜其大知知而不過兼行説仁在其中矣回擇乎中庸兼知説索隠行怪不能擇不知半塗而廢不能執不仁依乎中庸擇不見知而不悔執問舜是生知如何謂之擇善曰聖人也須擇豈是全無所作為他做得更宻生知安行者只是不似他人勉強耳堯稽于衆舜取諸人豈是信来行將去某常見朋友好論聖賢等級看来都不消得如此聖人依舊是這道理如千里馬也須使四脚行駑駘也是使四脚行不成説千里馬都不用動脚便到千里只是它行得較快爾又曰聖人説話都只就學知利行上説賜䕫孫録云問舜大知章是行底意多回擇中章是知底意多曰是又問擇字舜分上莫使不得否曰好問好察執其兩端豈不是擇嘗見諸友好論聖賢等級這都不消得它依舊是這道理且如説聖人生知安行只是行得較容易如千里馬云只是他行得較快爾而今且學他如何動脚第八章問顔子擇中與舜用中如何曰舜本領大不大故着力䕫孫正淳問呂氏云顔子求見聖人之止或問以為文義未安人傑録云若曰求得聖人之中道如何曰此語亦無大利害但橫渠錯認未見其止為聖人極至之地位耳作中道亦得或只作極字亦佳僴吕氏説顔子云随其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可為像求見聖人之止欲罷而不能也此處甚縝宻無些滲漏淳第九章中庸不可能章是賢者過之之事但只就其氣禀所長處着力做去而不知擇乎中庸也銖問天下國家可均此三者莫是智仁勇之事否曰它雖不曾分看来也是智仁勇之事只是不合中庸若合中庸便盡得智仁勇且如顔子瞻前忽後亦是未到中庸處問卓立處是中庸否曰此方是見到從之處方是行又如知命耳順方是見得盡從心所欲方是行得盡賜公晦問天下國家可均也爵禄可辭也白刃可蹈也謂資質之近於智而力能勉者皆足以能之若中庸則四邊都無所倚着浄浄潔潔不容分毫力曰中庸便是三者之間非是别有箇道理只於三者做得那恰好處便是中庸不然只可謂之三事賀孫徐孟寳問中庸如何是不可能曰只是説中庸之難行也急些子便是過慢些子便不及且如天下國家雖難均捨得便均得今按捨字恐悮爵禄雖難辭捨得便辭得蹈白刅亦然只有中庸却便如此不得所以難也徐曰如此也無難只心無一㸃私則事事物物上各有箇自然道理便是中庸以此公心應之合道理順人情處便是恐亦無難曰若如此時聖人却不必言致知格物格物者便是要窮盡物理到箇是處此箇道理至難揚子雲説得是窮之益逺測之益深分明是徐又曰只以至公之心為大本却將平曰學問積累便是格物如此不輟終須自有到處曰這箇如何當得大本若使如此容易天下聖賢煞多只公心不為不善此只做得箇稍稍賢於人之人而已聖賢事業大有事在須是要得此至公之心有歸宿之地事至物來應之不錯方是徐又曰為人君止於仁為人臣止於敬為人子止於孝至如止於慈止於信但只言止便是心止宿之地此又皆是人當為之事又如何㑹錯曰此處便是錯要知所以仁所以敬所以孝所以慈所以信仁少差便失於姑息敬少差便失於沽激毫釐之失謬以千里如何不是錯大雅第十章忍耐得便是南方之强僴問南方之强君子居之此君子字稍稍輕否曰然僴問南北方之强是以風土言君子強者居之是以氣質言和而不流以下是學問做出来曰是夔孫風俗易變惟是通衢所在盖有四方人雜往来於中自然易得變遷若僻在一隅則只見得這一窟風俗如此最難變如西北之強勁正如此時因論南方之强而言此義剛問寛柔以教不報無道恐是風氣資禀所致以比北方之强是所謂不及乎强者未得為理義之強何為君子居之曰雖未是理義之强然近理也人能寛柔以教不報無道亦是箇好人故為君子之事又問和而不流中立而不倚國有道不變未達之所守國無道至死不變此四者勇之事必如此乃能擇中庸而守之否曰非也此乃能擇後工夫大知之人無俟乎守只是安行賢者能擇能守無俟乎强勇至此様資質人則能擇能守後須用如此自勝方能徹頭徹尾不失又問以舜聰明睿智由仁義行何待好問好察邇言隠惡揚善又須執兩端而量度以取中曰此所以為舜之大知也以舜之聰明睿智如此似不用着力乃能下問至察邇言又必執兩端以用中非大知而何蓋雖聖人亦合用如此也銖和而不流中立而不倚如和便有流若是中便自不倚何必更説不倚後思之中而不硬健便難獨立解倒了若中而獨立不有所倚尤見硬健處本録云柔弱底中立則必欹倚若能中立而不倚方見硬健處義剛中立久而終不倚所以為强閎祖中立而不倚凡或勇或辨或聲色貨利執著一邊便是倚著立到中間久久而不偏倚非強者不能震或問中立而不倚曰當中而立自是不倚然人多有所倚靠如倚於勇倚於智皆是偏倚處若中道而立無所偏倚把捉不住久後畢竟又靠取一偏處此所以要強矯工夫硬在中立無所倚也謙問中立而不倚曰凡人中立而無所依則必至於倚著不東則西惟強壮有力者乃能中立不待所依而自無所倚如有病底人氣弱不能自持它若中立必有一物憑依乃能不倚不然則傾倒而偃仆矣此正説强處強之為言力有以勝人之謂也銖強哉矯賛歎之辭古注矯強貌人傑強哉矯矯強貌非矯揉之矯詞不如此問國有道不變塞焉國無道至死不變曰國有道則有達之理故不變其未達之所守若國無道則有不幸而死之理故不變其平生之所守不變其未達之所守易不變其平生之所守難僴塞未達未達時要行其所學既達了却變其所學當不變未達之所守可也泳第十一章問漢藝文志引中庸云索隠行怪後世有述焉素隠作索隠似亦有理鈎索隠僻之義素索二字相近恐誤作素不可知曰素隠從来解不分曉作索隠讀亦有理索隠是知者過之行恠是賢者過之徳明問索隠集注云深求隠僻之理如漢儒灾異之類是否曰漢儒灾異猶自有説得是處如戰國鄒衍推五徳之事後漢䜟緯之書便是隠僻賜素隠行恠不能擇半塗而廢不能執依乎中庸能擇也不見知而不悔能執也閎祖問遵道而行半塗而廢何以為知及之而仁不能守曰只為他知處不曾親切故守得不曾安穏所以半塗而廢若大知之人一下知了千了萬當所謂吾弗能已者只是見到了自住不得耳又曰依乎中庸遯世不見知而不悔此兩句結上文兩節意依乎中庸便是吾弗為之意遯世不見知而不悔便是吾弗能已之意銖第十二章費道之用也隠道之體也用則理之見於日用無不可見也體則理之隠於其内形而上者之事固有非視聽之所及者問或説形而下者為費形而上者為隠如何曰形而下者甚廣其形而上者實行乎其間而無物不具無處不有故曰費費言其用之廣也就其中其形而上者有非視聴所及故曰隠隠言其體微妙也銖費是形而下者隠是形而上者或曰季丈謂費是事物之所以然某以為費指物而言隠指物之理而言曰這箇也硬殺装定説不得須是意㑹可矣以物與理對言之是如此只以理言之是如此看来費是道之用隠是道之所以然而不可見處燾問形而上下與費而隠如何曰形而上下者就物上説費而隠者就道上説人傑君子之道費而隠和亦有費有隠不當以中為隠以和為費得其名處雖是效亦是費君子之道四亦是費節費而隠只費之中理便是隠費有極意至意自夫婦之愚不肖有所能知能行以至於極處聖人亦必有一兩事不能知不能行如夫子問官名學禮之類是也若曰理有已上難曉者則是聖人亦只曉得中間一截道理此不然也端䝉問至極之地聖人終於不知終於不能何也不知是過此以往未之或知之理否曰至盡也論道而至於盡處若有小小閒慢亦不必知不必能亦可也㝢或問聖人不知不能曰至者非極至之至盖道無不包若盡論之聖人豈能纎悉盡知伊川之説是去偽聖人不能知不能行者非至妙處聖人不能知不能行天地間固有不緊要底事聖人不能盡知緊要底則聖人能知之能行之若至妙處聖人不能知不能行粗處却能之非聖人乃凡人也故曰天地之大也人猶有所憾節及其至也程門諸公都愛説𤣥妙㳺氏便有七聖皆迷之説設如把至作精妙説則下文語大語小便如何分諸公親得程子而師之都差了淳問以孔子不得位為聖人所不能竊謂禄位名夀此在天者聖人如何能必得曰中庸明説大徳必得其位孔子有大徳而不得其位如何不是不能又問君子之道四丘未能一此是大倫大法所在何故亦作聖人不能先生曰道無所不在無窮無盡聖人亦做不盡天地亦做不盡此是此章緊要意思侯氏所引孔子之類乃是且將孔子装影出来不必一一較量銖問語小天下莫能破是極其小而言之今以一髪之微尚有可破而為二者所謂莫能破則足見其小注中謂其小無内亦是説其至小無去處了曰然至莫能破只是至小無可下手處破它不得賜問至大無外至小無内曰如云天下莫能載是無外天下莫能破是無内謂如物有至小而尚可破作兩邊者是中着得一物在若云無内則是至小更不容破了燾問其大無外其小無内二句是古語是自做曰楚詞云其小無内其大無垠至鳶飛魚躍胡亂提起這兩件來説人傑問鳶有鳶之性魚有魚之性其飛其躍天機自完便是天理流行發見之妙處故子思姑舉此一二以明道之無所不在否曰是淳問鳶飛魚躍之説曰盖是分明見得道體隨時發見處察者著也非察察之察去偽録作非審察之察詩中之意本不為此中庸只是借此兩句形容道體詩云遐不作人古注并諸家皆作逺字甚無道理記注訓胡字最妙謨鳶飛魚躍道體隨處發見謂道體發見者猶是人見得如此若鳶魚初不自知察只是著天地明察亦是著也君子之道造端乎夫婦之細微及其至也著乎天地至謂量之極至去偽鳶飛魚躍兩句問曰莫只是鳶飛魚躍無非道體之所在猶言動容周旋無非至理出入語黙無非妙道言其上下察也此一句只是解上面如何曰固是又曰恰似禪家云青青緑竹莫匪真如粲粲黄花無非般若之語端蒙皆是費如鳶飛亦是費魚躍亦是費而所以為費者試討箇費来看又曰鳶飛可見魚躍可見而所以飛所以躍果何物也中庸言許多費而不言隠者隠在費之中節問鳶飛魚躍集注一段曰鳶飛魚躍費也必有一箇什麽物使得它如此此便是隠在人則動静語黙無非此理只從這裏收一収謂心這箇便在賜問鳶飛魚躍如何與它勿忘勿助長之意同曰孟子言勿忘勿助長本言得粗程子却説得細恐只是用其語句耳如明道之説却不曾下勿字盖謂都没耳其曰正當處者謂天理流行處故謝氏亦以此論曾㸃事其所謂勿忘勿助長者亦非立此在四邊做防檢不得犯着盖謂俱無此而皆天理之流行耳欽夫論語中誤認其意遂曰不當忘也不當助長也如此則拘束得曾㸃更不得自在却不快活也必大活潑潑地所謂活者只是不滯於一隅徳明邠老問鳶飛戾天魚躍于淵詩中與子思之言如何曰詩中只是興周王夀考遐不作人子思之意却是言這道理昭著無乎不在上面也是恁地下面也是恁地曰程子却於勿忘勿助長處引此何也曰此又是見得一箇意思活潑潑地曰程子又謂㑹不得時只是弄精神何也曰言實未㑹得而揚眉瞬目自以為㑹也弄精神亦本是禪語端蒙子合以書問中庸鳶飛魚躍處明道云㑹得時活潑潑地不㑹得只是弄精神惟上蔡看破先生引君臣父子為言此吾儒之所以異於佛者如何曰鳶飛魚躍只是言其發見耳釋氏亦言發見但渠言發見却一切混亂至吾儒須辨其定分君臣父子皆定分也鳶必戾於天魚必躍於淵可學鳶飛魚躍某云其飛其躍必是氣使之然曰所以飛所以躍者理也氣便載得許多理出来若不就鳶飛魚躍上看如何見得此理問程子云若説鳶上面更有天在説魚下面更有地在是如何先生黙然微誦曰天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也便覺有悚動人處炎鳶飛魚躍上文説天地萬物處皆是洋洋乎發育萬物峻極于天也道體無所不在也又有無窮意思又有道理平放在彼意思上鳶下魚見者皆道應之者便是明道荅横渠書意是勿忘勿助長即是私意著分毫之力是也弄精神是操切做作也所以説知此則入堯舜氣象不與天下事對時育物意思也理㑹鳶飛魚躍只上蔡語二段明道語二段看上蔡言與㸃意只是不矜負作為也五峯説妙處只是弄精神意思察字亦作明字説欽夫却只説飛躍意與上文不貫方問先生舊説程先生論子思喫緊為人處與必有事焉而勿正心之意同活潑潑地只是程先生借孟子此兩句形容天理流行之妙初無凝滯倚着之意今説却是將必有事焉作用功處説如何曰必是如此方能見得這道理流行無礙也銖問中庸言費而隠文蔚謂中庸㪚於萬事即所謂費惟誠之一字足以貫之即所謂隠曰不是如此費中有隠隠中有費凡事皆然非是指誠而言文蔚曰如天道流行化育萬物其中無非實理洒掃應對酬酢萬變莫非誠意寓於其間是所謂費而隠也曰不然也鳶飛魚躍上下昭著莫非至理但人視之不見聽之不聞分将出来不得須是於此自有所見因謂明道言此引孟子必有事焉而勿正心勿忘勿助長為證謝上蔡又添入夫子與㸃一事且謂二人之言各有著落文蔚曰明道之意只說天理自然流行上蔡則形容曾㸃見道而樂底意思先生黙然又曰今且要理㑹必有事焉將自見得又曰非是有事於此却見得一箇物事在彼只是必有事焉便是本色文蔚曰於有事之際其中有不能自已者即此便是曰今且虚放在此未須強説如虚著一箇紅心時復射一射久後自中子思説鳶飛魚躍今人一等忘却乃是不知它那飛與躍有事而正焉又是迭教它飛捉教它躍皆不可又曰如今人所言皆是説費隠元説不得所謂天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流行庶物露生無非教也孔子謂天何言哉四時行焉百物生焉吾無行而不與二三子是也文蔚問必有事焉在孟子論養氣只是謂集義也至程子以之説鳶飛魚躍之妙乃是言此心之存耳曰孟子所謂必有事焉者言飬氣當用工夫而所謂工夫則集義是也非便以此句為集義之訓也至程子則借以言是心之存而天理流行之妙耳只此一句已足然又恐人大以為事得重則天理反塞而不得行故又以勿正心言之然此等事易説得近禪去廣云所謂易説得近禪者莫是如程子所謂事則不無擬心則差之説否曰也是如此廣云若只以此一句説則易得近禪若以全章觀之如費而隠與造端乎夫婦兩句便自與禪不同矣曰須是事事物物上皆見得此道理方是他釋氏也説佛事門中不遺一法然又却只如此説看他做事却全不如此廣云舊来説多以聖人天地之所不知不能及鳶飛魚躍為道之隠所以易入於禪唯謝氏引夫子與㸃之事以明之實為精切故程子謂浴乎沂風乎舞雩詠而歸言樂而得其所也盖孔子之志在於老者安之朋友信之少者懐之要使萬物各得其性曾㸃知之故孔子喟然歎曰吾與㸃也曰曾㸃他於事事物物上真箇見得此道理故随所在而樂廣云若釋氏之説鳶可以躍淵魚可以戾天則反更逆理矣曰是他須要把道理來倒説方是𤣥妙廣云到此已兩月䝉先生教誨不一而足近来静坐時収歛得心意稍定讀書時亦覺頗有意味但廣老矣望先生痛加教誨先生笑曰某亦不敢不盡誠如今許多道理也只得恁地説然所以不如古人者只欠箇古人真見爾且如曾子説忠恕是他開眼便見得真箇可以一貫忠為體恕為用萬事皆可以一貫如今人須是對冊子上安排對副方始説得近似少間不説又都不見了所以不濟事正淳云某雖不曾理㑹禪然看得来聖人之説皆是實理故君君臣臣父父子子夫夫婦婦皆是實理流行釋氏則所見偏只管向上去只是空理流行爾曰他雖是説空理然真箇見得那空理流行自家雖是説實理然却只是説耳初不曾真箇見得那實理流行也釋氏空底却做得實自家實底却做得空緊要處只争這些子如今伶俐者雖理㑹得文義又却不曾真見質朴者又和文義都理㑹不得譬如撑舡著淺者既已著淺了㸔如何撑無縁撑得動此須是去源頭決開放得那水來則船無大小無不浮矣韓退之説文章亦説到此故曰氣水也言浮物也水大則物之大小皆浮氣盛則言之短長與聲之髙下皆宜廣云所謂源頭工夫莫只是存養修治底工夫否曰存養與窮理工夫皆要到然存養中便有窮理工夫窮理中便有存飬工夫窮理便是窮那存得底存飬便是飬那窮得底廣問語録云鳶飛戾天魚躍于淵此與必有事焉而勿正心之意同或問中論此云程子離人而言直以此形容天理自然流行之妙上蔡所謂察見天理不用私意盖小失程子之本意據上蔡是言學者用功處必有事焉而勿正心之時平鋪放著無少私意氣象正如此所謂魚川泳而鳥雲飛也不審是如此否曰此意固是但他説察字不是也徳明楊氏解鳶飛魚躍處云非體物者孰能識之此是見處不透如上蔡即云天下之至顯也而楊氏反微之矣方問或問中謂循其説而體騐之若有以使人神識飛揚眩瞀迷惑無所底止所謂其説者莫是指楊先生非體物不遺者其孰能察之之説否曰然不知前軰讀書如何也恁鹵莾據體物而不遺一句乃是論鬼神之徳為萬物之體幹耳此乃以為體察之體其可耶廣問上下察是此理流行上下昭著下面察乎天地是察見天地之理或是與上句察字同意曰與上句察字同意言其昭著徧滿於天地之間至問上下察與察乎天地兩箇察字同異曰只一般此非觀察之察乃昭著之意如文理宻察天地明察之察經中察字義多如此廣閎祖録云事地察天地明察上下察察乎天地文理宻察皆明著之意亞夫問中庸言造端乎夫婦何也曰夫婦者人倫中之至親且宻者夫人所為盖有不可告其父兄而悉以告其妻子者昔宇文泰遺蘇綽書曰吾平生所為盖有妻子所不能知者公盡知之然則男女居室豈非人之至親且宻者歟苟於是而不能行道則面前如有物蔽焉既不能見且不能行也所以孔子有言人而不為周南召南其猶正墻面而立也歟北祖造端乎夫婦言至微至近處及其至也言極盡其量端䝉或問中庸説道之費隠如是其大且妙後面却只歸在造端乎夫婦上此中庸之道所以異於佛老之謂道也曰須更看所謂優優大哉禮儀三百威儀三千處聖人之道彌滿充塞無少空闕處若於此有一毫之差便於道體有虧欠也若佛則只説道無不在無適而非道政使於禮儀有差錯處亦不妨故它於此都理㑹不得荘子却理㑹得又不肯去做如天下篇首一段皆是説孔子恰似快刀利劒斫將去更無些子窒礙又且句句有着落如所謂易以道隂陽春秋以道名分可煞説得好雖然如此又却不肯去做然其才亦儘髙正所謂知者過之曰㸔得荘子比老子倒無老子許多機械曰亦有之但老子則猶自守箇規模子去做到得荘子出来將他那窠窟盡底掀番了故他自以為一家老子極勞攘荘子較平易廣公晦問君子之道費而隠云許多章都是説費處却不説隠處莫所謂隠者只在費中否曰惟是不説乃所以見得隠在其中舊人多分畫將聖人不知不能處做隠覺得下面都説不去且如鳶飛戾天魚躍于淵亦何嘗隠来又問此章前説得恁地廣大末梢却説造端乎夫婦乃是指其切實做去此吾道所以異於禪佛曰又須看經禮三百威儀三千聖人説許多廣大處都收拾做實處來佛老之學説向髙處便無工夫聖人説箇本體如此待做處事事着實如禮樂刑政文為制度觸處都是縁他本體充滿周足有些子不是便虧了它底佛是説做去便是道道無不存無適非道有一二事錯也不妨賀孫第十三章問道不逺人人之為道而逺人不可以為道莫是一章之綱目否曰是如此所以下面三節又只是解此三句義剛人之為道而逺人如為仁由己之為不可以為道如克已復禮為仁之為閎祖君子以人治人改而止未改以前却是失人道既改則便是復得人道了更何用治它如水本東流失其道而西流從西邊遮障得歸来東邊便了䕫孫問君子以人治人改而止其人有過既改之後或為善不已或止而不進皆在其人非君子之所能預否曰非然也能改即是善矣更何待别求善也天下只是一箇善惡不善即惡不惡即善如何説既能改其惡更用别討箇善只改底便是善了這須看他上文它緊要處全在道不逺人一句言人人有此道只是人自逺其道非道逺人也人人本自有許多道理只是不曾依得這道理却做從不是道理處去今欲治之不是别討箇道理治他只是将他元自有底道理還以治其人如人之孝他本有此孝它却不曾行得這孝却亂行從不孝處去君子治之非是别討箇孝去治它只是與他説你這箇不是你本有此孝却如何錯行從不孝處去其人能改即是孝矣不是將他人底道理去治他又不是分我底道理與他他本有此道理我但因其自有者還以治之而已及我自治其身亦不是將它人底道理来治我亦只是將我自思量得底道理自治我之身而已所以説執柯伐柯其則不逺執柯以伐柯不用更别去討法則只那手中所執者便是則然執柯以伐柯睨而視之猶以為逺若此箇道理人人具有纔要做底便是初無彼此之别放去收囬只在這些子何用别處討故中庸一書初間便説天命之謂性率性之謂道此是如何只是説人人各具此箇道理無有不足故耳它從上頭説下来只是此意又曰所求乎子以事父未能也每常人責子必欲其孝於我然不知我之所以事父者果孝否以我責子之心而反推己之所以事父此便是則也所求乎臣以事君未能也常人責臣必欲其忠於我然不知我之事君者盡忠否以我責臣之心而反求之於我則其則在此矣又曰所求乎子以事父未能也須要如舜之事父方盡得子之道若有一毫不盡便是道理有所欠闕便非子之道矣所求乎臣以事君未能也須要如舜周公之事君若有一毫不盡便非臣之道矣無不是如此只縁道理當然自是住不得僴問以衆人望人則易從曰道者衆人之道衆人所能知能行者今人自做未得衆人耳此衆人不是説不好底人銖問以衆人望人則易從此語如何曰此語似亦未穏時舉蜚卿問忠恕即道也而曰違道不逺何耶曰道是自然底人能忠恕則去道不逺道夫施諸已而不願亦勿施於人此與已所不欲勿施於人一般未是自然所以違道不逺正是學者事我不欲人之加諸我也吾亦欲無加諸人此是成徳事凢人責人處急責已處緩愛已則急愛人則緩若拽轉頭来便自道理流行因問施諸已而不願亦勿施諸人此只是恕何故子思將作忠恕説曰忠恕兩箇離不得方忠時未見得恕及至恕時忠行乎其間施諸已而不願亦勿施諸人非忠者不能也故曰無忠做恕不出来銖第十四章行險僥倖本是連上文不願乎其外説言強生意智取所不當得僴第十六章問鬼神之徳如何曰自是如此此言鬼神實然之理猶言人之徳不可道人自為一物其徳自為徳力行有是實理而後有是物鬼神之徳所以為物之體而不可遺也升卿問體物而不可遺是有此物便有鬼神凡天下萬物萬事皆不能外夫鬼神否曰不是有此物時便有此鬼神説倒了乃是有這鬼神了方有此物及至有此物了又不能違夫鬼神也體物而不可遺用拽轉㸔將鬼神做主將物做賔方㸔得出是鬼神去體那物鬼神却是主也僴誠者實有之理體物言以物為體有是物則有是誠端䝉鬼神主乎氣而言只是形而下者但對物而言則鬼神主乎氣為物之體物主乎形待氣而生盖鬼神是氣之精英所謂誠之不可掩者誠實也言鬼神是實有者屈是實屈伸是實伸屈伸合散無非實者故其發見昭昭不可掩如此銖問鬼神上言二氣下言祭祀是如何曰此體物不可遺也體物是與物為體炎林一之問萬物皆有鬼神何故只於祭祀言之曰以人具是理故於人言又問體物何以引幹事曰體幹是主宰按體物是興物為體幹事是與事為幹皆倒文可學精氣就物而言魂魄就人而言鬼神離乎人而言不曰屈伸往来隂陽合㪚而曰鬼神則鬼神盖與天地通所以為萬物之體而物之終始不能遺也銖或問鬼神體物而不可遺只是就隂陽上説末後又却以祭祀言之是如何曰此是就其親切著見者言之也若不如此説則人必將風雷山澤做一般鬼神㸔將廟中祭享者又做一般鬼神㸔故即其親切著見者言之欲人㑹之為一也廣問鬼神之徳其盛矣乎此止説嘘吸聰明之鬼神末後却歸向齋明盛服以承祭祀洋洋乎如在其上是如何曰惟是齋戒祭祀之時鬼神之理著若是他人亦是未曉得它須道風雷山澤之鬼神是一般鬼神廟中泥塑底又是一般鬼神只道有兩様鬼神所以如此説起又歸向親切明著處去庶㡬人知得不是二事也漢卿問鬼神之徳如何是良能功用處曰論来只是隂陽屈伸之氣只謂之隂陽亦可也然必謂之鬼神者以其良能功用而言也今又須從良能功用上求見鬼神之徳始得前夜因漢卿説箇修飬人死時氣衝突知得焄蒿之意親切謂其氣襲人知得悽愴之意分明漢武李夫人祠云其風肅然今鄉村有衆户還賽祭享時或有肅然如陣風俗呼為旋風者即此意也因及修飬且言萇𢎞死藏其血於地三年化為碧此亦是漢卿所説虎威之類賀孫云應人物之死其魄降於地皆如此但或散或微不似此等之精悍所謂伯有用物精多則魂魄强是也曰亦是此物稟得魄最盛又如今醫者定魄藥多用虎睛助魂藥多用龍骨魄属金金西方主肺與魄虎是隂属之最强者故其魄最盛魂属木木東方主肝與魂龍是陽属之最盛者故其魂最强龍能駕雲飛騰便是與氣合虎嘯則風生便是與魄合雖是物之最强盛然皆墮於一偏惟人獨得其全便無這般磊磈因言古時所傳安期生之徒皆是有之也是被他煉得氣清皮膚之内肉骨皆已融化為氣其氣又極其輕清所以有飛昇脱化之説然久之漸漸消磨亦澌盡了渡江以前説甚呂洞賓鍾離權如今亦不見了因言鬼火皆是未散之物如馬血人戰鬬而死被兵之地皆有之某人夜行淮甸間忽見明滅之火橫過来當路頭其人頗勇直衝過去見其皆似人形髣髴如廟社泥塑未裝飾者亦未散之氣不足畏宰我問鬼神一章最精密包括得盡亦是當時弟子記録得好賀孫問中庸鬼神章首尾皆主二氣屈伸往来而言而中間洋洋如在其上乃引其氣發揚于上為昭明焄蒿悽愴此乃人物之死氣似與前後意不合何也曰死便是屈感召得来便是伸問昭明焄蒿悽愴是人之死氣此氣㑹消了曰是問伸㡳只是這既死之氣復来伸否曰這裏便難恁地説這伸底又是别新生了問如何㑹别生曰祖宗氣只存在子孫身上祭祀時只是這氣便自然又伸自家極其誠敬肅然如在其上是甚物那得不是伸此便是神之著也所以古人燎以求諸陽灌以求諸隂謝氏謂祖考精神便是自家精神已説得是淳問洋洋如在其上如在其左右似亦是感格意思是自然如此曰固是然亦須自家有以感之始得上下章自恁地説忽然中間挿入一段鬼神在這裏也是鳶飛魚躍底意思所以末梢只説微之顯誠之不可掩也如此䕫孫㣲之顯誠之不可掩如此夫皆實理也僴問鬼神是功用良能曰但以一屈一伸看一伸去便生許多物事一屈来更無一物了便是良能功用間便是隂陽去来曰固是問在天地為鬼神在人為魂魄否曰死則謂之魂魄生則謂之精氣天地公共底謂之鬼神是恁地模様又問體物而不可遺曰只是這一箇氣入毫釐絲忽裏去也是這隂陽包羅天地也是這隂陽問是在虚實之間否曰都是實無箇虚底有是理便有是氣有是氣便有是形無非實者又云如夏月嘘出固不見冬月嘘出則可見矣問何故如此曰春夏陽秋冬隂以陽氣㪚在陽氣之中如以熱湯入放熱湯裏去都不覺見秋冬則這氣如以熱湯攙放水裏去便可見又問使天下之人齊明盛服以承祭祀若有以使之曰只是這箇氣所謂昭明焄蒿悽愴者便只是這氣昭明是光景焄蒿是蒸衮悽愴是有一般感人使人慘慄如所謂其風肅然者問此章以太極圖言是所謂妙合而疑也曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義便是體物而不可遺䕫孫章句或問鬼神者造化之跡曰風雨霜露四時代謝又問此是迹可得而見又曰視之不可得見聴之不可得聞何也曰説道無又有説道有又無物之生成非鬼神而何然又去那裏見得鬼神至於洋洋乎如在其上是又有也其氣發揚于上為昭明焄蒿悽愴猶今時惡氣中人使得人恐懼悽愴此百物之精爽也賀孫蕭增光問鬼神造化之迹曰如日月星辰風雷皆造化之迹天地之間只是此一氣耳来者為神往者為鬼譬如一身生者為神死者為鬼皆一氣耳雉鬼神者造化之迹造化之妙不可得而見於其氣之往来屈伸者是以見之㣲鬼神則造化無迹矣横渠物之始生一章尤説得分曉端䝉鬼神者二氣之良能是説往来屈伸乃理之自然非有安排布置故曰良能也端䝉伊川謂鬼神者造化之迹却不如横渠所謂二氣之良能直卿問如何曰程子之説固好但在渾淪在這裏張子之説分明便見有箇隂陽在曰如所謂功用則謂之鬼神也與張子意同曰只為他渾淪在那裏閭邱曰明則有禮樂幽則有鬼神曰只這數句便要理㑹明便如何説禮樂幽便如何説鬼神須知樂便属神禮便属鬼它此語落着主在鬼神直卿曰向讀中庸所謂誠之不可揜處竊疑謂鬼神為隂陽屈伸則是形而下者若中庸之言則是形而上者矣曰今且只就形而下者説来但只是他皆是實理處發見故未有此氣便有此理既有此理必有此氣道夫問鬼神者造化之迹也此莫是造化不可見唯於其氣之屈伸往来而見之故曰迹鬼神者二氣之良能此莫是言理之自然不待安排曰只是如此端䝉鬼神者造化之迹神者伸也以其伸也鬼者歸也以其歸也人自方生而天地之氣只管增添在身上漸漸大漸漸長成極至了便漸漸衰耗漸漸散言鬼神自有迹者而言之言神只言其妙而不可測識賀孫以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼一氣即隂陽運行之氣至則皆至去則皆去之謂也二氣謂隂陽對峙各有所属如氣之呼吸者為魂魂即神也而属乎陽耳目鼻口之類為魄魄即鬼也而属乎隂精氣為物精與氣合而生者也遊魂為變則氣散而死其魄降矣謨陽魂為神隂魄為鬼鬼隂之靈神陽之靈此以二氣言也然二氣之分實一氣之運故凢氣之来而方伸者為神氣之往而既屈者為鬼陽主伸隂主屈此以一氣言也故以二氣言則隂為鬼陽為神以一氣言則方伸之氣亦有伸有屈其方伸者神之神其既屈者神之鬼既屈之氣亦有屈有伸其既屈者鬼之鬼其来格者鬼之神天地人物皆然不離此氣之往来屈伸合散而已此所謂可錯綜言者也因問精氣為物隂精陽氣聚而成物此總言神游魂為變魂游魄降散而成變此總言鬼疑亦錯綜而言曰然此所謂人者鬼神之㑹也銖問性情功效固是有性情便有功效有功效便有性情然所謂性情者莫便是張子所謂二氣之良能否所謂功效者莫便是程子所謂天地之功用否曰鬼神視之而不見聽之而不聞人須是於那良能與功用上認取其徳廣視之而不見聽之而不聞是性情體物而不可遺是功效燾問性情功效性情乃鬼神之情一不審所謂功效者何謂曰能使天下之人齊明盛服以承祭祀便是功效問魄守體有所知否曰耳目聰明為魄安得謂無知問然則人之死也魂升魄降是兩處有知覺也曰孔子分明言合鬼與神教之至也當祭之時求諸陽又求諸隂正為此况祭亦有報魄之説徳明問鬼神之為徳只是言氣與理否曰猶言性情也問章句説功效如何曰鬼神㑹做得這般事因言鬼神有無聖人未嘗決言之如言之死而致死之不仁之死而致生之不知於彼乎於此乎之類與明道語上蔡恐賢問某尋之意同問五廟七廟逓遷之制恐是世代浸逺精爽消亡故廟有遷毁曰雖是如此然祭者求諸隂求諸陽此氣依舊在如嘘吸之則又来若不如此則是之死而致死之也盖其子孫未絶此氣接續亦未絶又曰天神地祗山川之神有此物在其氣自在此故不難曉惟人已死其事杳茫所以難説徳明問南軒鬼神一言以蔽之曰誠而已此語如何曰誠是實然之理鬼神亦只是實理若無這理則便無鬼神無萬物都無所該載了鬼神之為徳者誠也徳只是就鬼神言其情状皆是實理而已侯氏以徳别為一物便不是問章句謂性情功效何也曰此與情狀字只一般曰横渠謂二氣之良能何謂良能曰屈伸往来是二氣自然能如此曰伸是神屈是鬼否先生以手圈卓上而直指其中曰這道理圓只就中分别恁地氣之方来皆属陽是神氣之反皆属隂是鬼日自午以前是神午以後是鬼月自初三以後是神十六以後是鬼章伯羽問日月對言之日是神月是鬼否曰亦是草木方發生来是神彫殘衰落是鬼人自少至壮是神衰老是鬼鼻息呼是神吸是鬼淳舉程子所謂天尊地卑乾坤定矣鼔之以雷霆潤之以風雨曰天地造化皆是鬼神古人所以祭風伯雨師問風雷鼔動是神收歛處是鬼否曰是魄属鬼氣属神如析木煙出是神滋潤底性是魄人之語言動作是氣属神精血是魄属鬼發用處皆属陽是神氣定處皆属隂是魄知識處是神記事處是魄人初生時氣多魄少後来魄漸盛到老魄又少所以耳聾目昏精力不強記事不足某今覺陽有餘而隂不足事多記不得小兒無記性亦是魄不足好戯不定疊亦是魄不足淳侯師聖解中庸鬼神之為徳謂鬼神為形而下者鬼神之徳為形而上者且如中庸之為徳不成説中庸為形而下者中庸之徳為形而上者文蔚問侯氏中庸曰摠攝天地斡旋造化闔闢乾坤動役鬼神日月由之而晦明萬物由之而死生者誠也此語何謂曰這箇亦是實有這理便如此若無這理便都無天地無萬物無鬼神了不是實理如何㣲之顯誠之不可揜問鬼神造化之迹何謂迹曰鬼神是天地間造化只是二氣屈伸往来神是陽鬼是隂往者屈来者伸便有箇迹恁地淳因舉謝氏歸根之説先生曰歸根本老氏語畢竟無歸這箇何曾動問性只是天地之性當初亦不是自彼来入此亦不是自此往歸彼只是因氣之聚散見其如此耳曰畢竟是無歸如月影映在這盆水裏除了這盆水這影便無了豈是這飛上天去歸那月裏去又如這花落便無了豈是歸去那裏明年復来生這枝上問人死時這知覺便散否曰不是散是盡了氣盡則知覺亦盡問世俗所謂物怪神姦之説則如何斷曰世俗大抵十分有八分是胡説二分亦有此理多有是非命死者或溺死或殺死或暴病卒死是它氣未盡故憑依如此又有是乍死後氣未消盡是它當初禀得氣盛故如此然終久亦消了盖精與氣合便生人物游魂為變便無了如人説神仙古來神仙皆不見只是説後來神仙如左傳伯有為厲此鬼今亦不見問自家道理正則自不能相干曰亦須是氣能配義始得若氣不能配義便餒了問謝氏謂祖考精神便是自家精神如何曰此句已是説得好祖孫只一氣極其誠敬自然相感如這大樹有種子下地生出又成樹便即是那大樹也淳或問顔子死而不亡之説先生既非之矣然聖人制祭祀之禮所以事鬼神者恐不止謂但有此理須有實事曰若是見理明者自能知之明道所謂若以為無古人因甚如此説若以為有又恐賢問某尋其説甚當人傑問中庸十二章子思論道之體用十三章言人之為道不在乎逺當即夫衆人之所能知能行極乎聖人之所不能知不能行第十四章又言人之行道當隨其所居之分而取足於其身曰此兩章大綱相似曰第十五章又言進道當有序第十六章方言鬼神之道費而隠盖論君子之道則即人之所行言之故但及其費而隠自存論鬼神之道則本人之所不見不聞而言故先及其隠而後及於費曰鬼神之道便是君子之道非有二也廣第十七章問因其材而篤焉曰是因材而加厚些子節問氣至而滋息為培氣反而㳺散曰覆曰物若扶植種在土中自然生氣湊泊他若已傾倒則生氣無所附着從何處來相接如人疾病此自有生氣則藥力之氣依之而生意滋長若已危殆則生氣㳺㪚而不復相湊矣銖問舜之大徳受命止是為善得福而已中庸却言天之生物栽培傾覆何也賀孫録云漢卿問栽培傾覆以氣至氣反説上言徳而受福而以氣為言何也曰只是一理此亦非是有物使之然但物之生時自節節長將去恰似有物扶持也及其衰也則自節節消磨將去恰似箇物推倒它理自如此唯我有受福之理故天既佑之又申之董仲舒曰為政而宜于民固當受禄于天雖只是叠將來説然玩味之覺他説得自有意思賀孫録云上靣雖是疊將來此数語却轉得意思好又曰嘉樂詩下章又却不説其他但願其子孫之多且賢耳此意甚好然此亦其理之常若堯舜之子不肖則又非常理也廣賀孫録同第十八章問舜徳為聖人尊為天子固見得天道人道之極致至文王以王季為父武王為子此殆非人力可致而以為無憂何也曰文王自公劉太王積功累仁至文王適當天運恰好處此文王所以言無憂如舜大徳而禄位名夀之必得亦是天道流行正得恰好處耳又曰追王之事今無可證姑闕之可也如三年之䘮諸家説亦有少不同然亦不必如吕氏說得太宻大槩只是説三年之䘮通乎天子云云本無别意銖問身不失天下之顯名與必得其名須有些等級不同曰游楊是如此説尹氏又破其説然㸔來也是有此意如堯舜與湯武真箇争分數有等級只㸔聖人説謂韶盡美矣又盡善也謂武盡美矣未盡善也處便見燾問周公成文武之徳追王太王王季考之武成金縢禮記大傳武成言太王肇基王迹王季其勤王家我文考文王金縢冊乃告太王王季大傳言牧野之奠追王太王王季歴文王昌疑武王時已追王曰武王時恐且是呼喚作王至周公制禮樂方行其事如今奉上􅁽寳之類然無可證姑闕之可也又問上祀先公以天子之禮是周公制禮時方行無疑曰禮家載祀先王服衮冕祀先公服鷩冕鷩冕諸侯之服蓋雖上祀先公以天子之禮然不敢以天子之服臨其先公但鷩冕旒王與諸侯不同天子之旒十二玉蓋雖與諸侯同是七旒但天子七旒十二玉諸侯七旒七玉耳銖問古無追王之禮至周之武王周公以王業肇於太王王季文王故追王三王至於組紺以上則止祀以先公之禮所謂塟以士祭以大夫之義也曰然周禮祀先王以衮冕祀先公以鷩冕則祀先公依舊止用諸侯之禮但乃是天子祭先公之禮耳問諸儒之説以為武王未誅紂則稱文王為文考以明文王在位未嘗稱王之證及至誅紂乃稱文考為文王然既曰文考則其諡定矣若如其言將稱為文公耶曰此等事無證佐皆不可曉闕之可也僴問䘮祭之禮至周公然後備夏商而上想甚簡略曰然親親長長貴貴尊賢夏商而上大槩只是親親長長之意到得周來則又添得許多貴貴底禮數如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟期之䘮天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降姊妹嫁諸侯者則亦不絶不降此皆貴貴之義上世想皆簡略未有許多降殺貴貴底禮數凡此皆天下之大經前世所未備到得周公搜剔出來立為定制更不可易僴三年之䘮達於天子中庸之意只是主為父母而言未必及其它者所以下句云父母之䘮無貴賤一也因言大凡禮制欲行於今須有一箇簡易底道理若欲盡拘古禮則繁碎不便於人自是不可行不曉他周公當時之意是如何孔子嘗曰如用之則吾從先進想亦是厭其繁文蔚問伯叔父母古人皆是期䘮今禮又有所謂百日制周期服然則期年之内當服其服往往今人於此多簡略曰居家則可居官便不可行所以當時横渠為見天祺居官凡祭祀之類盡令天祺代之他居家服䘮服當時幸而有一天祺居官故可為之萬一無天祺則又當如何便是動輙窒礙難行文蔚曰今不居官之人欲於百日之内略如居父母之䘮期年之内則服其服如何曰私居亦可行之文蔚正淳問三年之䘮父母之䘮吕氏却作兩般曰吕氏所以如此説者蓋見左氏載周穆后薨太子壽卒謂周一嵗而有三年之䘮二焉左氏説禮皆是周末衰亂不經之禮方子録云左氏定禮皆當時鄙野之談據不得無足取者君舉所以説禮多錯者縁其多本左氏也賀孫云如陳鍼子送女先配後祖一段更是没分曉古者那曾有這般禮數曰便是他記禮皆差某嘗言左氏不是儒者只是箇曉事該博㑹做文章之人若公榖二子却是箇不曉事底儒者故其説道理及禮制處不甚差下得語恁地鄭重廣録云只是説得忒煞鄭重滯泥正如世俗所謂山東學䆒是也賀孫因舉公羊所斷謂孔父義形於色仇牧不畏強禦荀息不食言最是斷得好曰然賀孫又云其間有全亂道處恐是其徒挿入如何曰是他那不曉事底見識便寫出來亦不道是不好若左氏便巧便文飾回互了或云以蔡仲廢君為行權衞輙拒父為尊祖都不是曰是它不曉事底見識只知道有所謂嫡孫承重之義便道孫可以代祖而不知子不可以不父其父嘗謂學記云多其訊註云訊猶問也公榖便是多其訊没緊要處也便説道某言者何某事者何賀孫廣録同方子録略問中庸解載游氏辨文王不稱王之説正矣先生却曰此事更當考是如何曰説文王不稱王固好但書中不合有惟九年大統未集一句不知所謂九年自甚時數起若謂文王固守臣節不稱王則三分天下有其二亦為不可又書言太王肇基王迹則到太王時周家已自強盛矣今史記於梁惠王三十七年書襄王元年而竹書紀年以為後元年想得當時文王之事亦類此故先儒皆以為自虞芮質成之後為受命之元年廣第十九章旅酬者以其家臣或鄉吏之属大夫則有鄉吏一人先舉觶獻賔賔飲畢即以觶授于執事者則以獻於其長逓逓相承獻及於沃盥者而止焉沃盥謂執盥洗之事至賤者也故曰旅酬下為上所以逮賤也廣旅酬是客先勸主人主人復勸客客又勸次客次客又勸第三客以次傳去如客多則兩頭勸起義剛問酬導飲也曰儀禮主人酌賔曰獻賔飲主人又自酌而復飲賔曰酬賔受之奠於席前至旅而後舉主人飲二盃賔只飲一盃疑後世所謂倍食於賔者此也銖問如何是導飲曰主人酌以獻賔賔酬主人曰酢主人又自飲而復飲賔曰酬其主人又自飲者是導賔使飲也諺云主人倍食于賔疑即此意但賔受之却不飲奠於席前至旅時亦不舉又自别舉爵不知如何又問行旅酬時祭祀已畢否曰其大節目則已了亦尚有零碎禮數未竟又問想必須在飲福受胙之後曰固是古人酢賔便是受胙胙與酢昨字古人皆通用廣漢卿問導飲是如何先生歴舉儀禮獻酬之禮旅酬禮下為上交勸先一人如鄉吏之属升觶或二人舉觶獻賔賔不飲却以獻執事執事一人受之以獻于長以次獻至於沃盥所謂逮賤者也旅酬後樂作獻酬之爼未徹賔不敢旅酬酬酒賔奠不舉至旅酬亦不舉更自有一盞在右為旅盞也受胙者古者胙字與酢字通受胙者猶神之酢已也周禮中胙席又作昨昔之昨謂初未設只跪拜徹後方設席周禮王享先公亦如之又舉尸飲酢之禮其特祭每獻酬酢甚詳不知合享如何周禮旅酬六尸古者男女皆有尸女尸不知廢於何代杜佑乃謂古無女尸女尸乃本夷虜之属後來聖人革之賀孫因舉儀禮士虞禮云男男尸女女尸是古男女皆有尸也先生因舉陶侃廟南昌南康每年祭祀堂上設神位兩廂設生人位凡為勸首者至祭時具公服設馬乘儀状甚盛至于廟各就兩廂之位其奉祭者獻飲食一同神位之禮又某處擇一鄉長状貌甚魁偉者為之至諸處祭皆請與同享此人遇冬春祭多時節每日大醉也厭祭是不用尸者古者必有為而不用如祭殤隂厭陽厭是也賀孫問燕毛所以序齒也曰燕時擇一人為上賔不與衆賔齒餘者皆序齒燾問吕氏分修其祖廟以下一節作繼志序昭穆以下一節作述事恐不必如此分曰㸔得追王與所制祭祀之禮兩節皆通上下而言吕氏考訂甚詳卻似不曾言得此意又問吕氏又分郊社之禮作立天下之大本處宗廟之禮言正天下之大經處亦不消分曰此不若游氏説郊社之禮所謂惟聖人為能享帝禘嘗之義謂惟孝子為能享親意思甚周宻銖問楊氏曰玉幣以交神明祼鬯以求神於幽豈以天神無聲臭氣類之可感止用玉幣表自家之誠意人鬼有氣類之可感故用芬香之酒耶曰不然自是天神髙而在上鬰鬯之酒感它不着盖灌鬯之酒却瀉入地下去了所以只可感人鬼而不可以交天神也僴或問中説廟制處所謂髙祖者何也曰四世祖也世與太字古多互用如太子為世子太室為世室之類廣林安卿問中庸二昭二穆以次向南如何曰太祖居中坐北而向南昭穆以次而出向南某人之説如此乃是如䟽中謂太祖居中昭穆左右分去列作一排若天子七廟恐太長闊又曰大率論廟制劉歆之説頗是義剛孫毓云外為都宫太祖在北二昭二穆以次而南出江都集禮向作或問時未見此書只以意料後来始見乃知學不可以不博也銖朱子語類卷六十三
