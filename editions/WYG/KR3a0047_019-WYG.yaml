body:
  text: 朱子語類卷十九論語一語孟綱領語孟工夫少得效多六經工夫多得效少大雅以下六經四子語孟用三二年工夫看亦須兼看大學及書詩所謂興於詩諸經諸史大抵皆不可不讀德明某論語集注已改公讀令大學十分熟了却取去看論語孟子都是大學中肉菜先後淺深參差互見若不把大學做箇匡殻子卒亦未易看得賀孫或云論語不如中庸曰只是一理若看得透方知無異論語是每日零碎問譬如大海也是水一勺也是水所説千言萬語皆是一理須是透得則推之其它道理皆通又曰聖賢所説只一般只是一箇擇善固執之論語則說學而時習之孟子則説明善誠身下得字各自精細真實工夫只一般須是知其所以不同方知其所謂同也而今須是窮究得一物事透徹方知如入箇門方知門裏宇舍間架若不親入其門户在外遥望説我皆知得則門裏事如何知得僴論語只説仁中庸只説智聖人拈起来底便説不可以例求泳論語易曉孟子有難曉處語孟中庸大學是熟飯看其它經是打禾為飯節古書多至後面便不分曉語孟亦然節夫子教人零零星星説来説去合来合去合成一箇大物事節以下孔孟教人且如孔門教人亦自有等聖人教人何不都教他做顔曽底事業而子貢子路之徒所以止於子貢子路者是其才止於此且如克己復禮雖止是教顔子如此説然所以教他人亦未甞不是克己復禮底道理卓孔門教人甚寛今日理㑹些子明日又理㑹些子久則自貫通如耕荒田今日耕些子明日又耕些子久則自周匝雖有不到處亦不出這理節問孔子教人就事上做工夫孟子教人就心上做工夫何故不同曰聖賢教人立箇門户各自不同節孟子教人多言理義大體孔子則就切實做工夫處教人端䝉孔子教人只從中間起使人便做工夫去久則自能知向上底道理所謂下學上達也孟子始終都舉先要人識心性著落却下功夫做去端䝉論語不説心只説實事節録作只就事實上説孟子説心後来遂有求心之病方子孟子所謂集義只是一箇是字孔子所謂思無邪只是一箇正字不是便非不正便邪聖賢教人只是求箇是底道理夔孫孔子教人極直截孟子較費力孟子必要充廣孔子教人合下便有下手處問孔子何故不令人充廣曰居處恭執事敬非充廣而何節孔子教人只言居處恭執事敬與人忠含蓄得意思在其中使人自求之到孟子便指出了性善早不似聖人了祖道孔子只説忠信篤敬孟子便發出性善直是漏洩德明孟子言存心養性便説得虚至孔子教人居處恭執事敬與人忠等語則就實行處做功夫如此則存心養性自在端䝉孔子之言多且是汎説做工夫如居處恭執事敬言忠信行篤敬之類未説此是要理㑹甚麽物待學者自做得工夫透徹却就其中見得體段是如此至孟子則恐人不理㑹得又䟎進一著説如惻隠之心與學問之道求放心之類説得漸漸親切今人將孔孟之言都只恁地草率看過了雉問論語一書未甞説一心字至孟子只管拈人心字説来説去曰推是心曰求放心曰盡心曰赤子之心曰存心莫是孔門學者自知理㑹箇心故不待聖人苦口到孟子時世變既逺人才漸漸不如古故孟子極力與言要他從箇本原處理㑹否曰孔門雖不曾説心然荅弟子問仁處非理㑹心而何仁即心也但當時不説箇心字耳此處當自思之亦未是大疑處枅蜚卿問論語之言無所不包而其所以示人者莫非操存涵養之要七篇之指無所不究而其所以示人者類多體驗充廣之端曰孔子體面大不用恁地説道理自在裏面孟子多是就發見處盡説與人終不似夫子立得根本住所以程子謂其才髙學之無可依據要之夫子所説包得孟子孟子所言却出不得聖人疆域且如夫子都不説出但教人恁地去做則仁便在其中如言居處恭執事敬與人忠果能此則心便在到孟子則不然曰惻隠之心仁之端也今人乍見孺子將入井皆有怵惕惻隠之心都教人就事上推究道夫問如孟子所謂求放心集義所生莫是立根本處否曰他有恁地處終是説得來寛曰他莫是以其所以做工夫者告人否曰固是也是他所見如此自後世觀之孔顔便是漢文帝之躬修𤣥黙而其效至於㡬致刑措孟子便如唐太宗天下之事無所不為極力去做而其效亦幾致刑措道夫端䝉錄一條疑同聞見集注讀語孟法看文字且須看其平易正當處孔孟教人句句是樸實頭人能充無受爾汝之實實字將作心字看須是我心中有不受爾汝之實處如仁義是也祖道孟子比孔子時説得髙然孟子道性善言必稱堯舜又見孟子説得實因論南軒奏議有過當處方子或問孟子說仁字義甚分明孔子都不曽分曉説是如何曰孔子未甞不説只是公自不㑹看耳譬如今沙糖孟子但説糖味甜耳孔子雖不如此説却只將那糖與人喫人若肯喫則其味之甜自不待説而知也廣聖人説話磨稜合縫盛水不漏如云一言䘮邦以直報怨自是細宻孟子説得便麤如云今樂猶古樂大王好色公劉好貨之類横渠説孟子比聖人自是麤顔子所以未到聖人處亦只是心麤夔孫孟子要熟讀論語却費思索孟子熟讀易見盖縁是它有許多荅問發揚賀孫讀語孟看孟子與論語不同論語要冷看孟子要熟讀論語逐文逐意各是一義故用子細靜觀孟子成大段首尾通貫熟讀文義自見不可逐一句一字上理㑹也雉沉浸專一於論孟必待其自得讀論語如無孟子讀前一段如無後一段不然方讀此又思彼擾擾於中這般人不惟無得於書胷中如此做事全做不得大凡看經書看論語如無孟子看上章如無下章看學而時習之未得不須看有朋自逺方来且專精此一句得之而後已又如方理㑹此一句未得不須雜以别説相似者次第亂了和此一句亦曉不得振人有言理㑹得論語便是孔子理㑹得七篇便是孟子子細看亦是如此盖論語中言語真能窮究極其纎悉無不透徹如從孔子肚裏穿過孔子肝肺盡知了豈不是孔子七篇中言語真能窮究透徹無一不盡如從孟子肚裏穿過孟子肝肺盡知了豈不是孟子淳講習孔孟書孔孟往矣口不能言須以此心比孔孟之心將孔孟心作自己心要須自家説時孔孟㸃頭道是方得不可謂孔孟不㑹説話一向任己見説將去若如此説孟子時不成説孟子只是説王子也又若更不逐事細看但以一箇字包括此又不可此名包子又不是孟子也力行論語多門弟子所集故言語時有長長短短不類處孟子疑自著之書故首尾文字一體無些子瑕疵不是自下手安得如此好若是門弟子集則其人亦甚髙不可謂軻死不傳孔門問答曽子聞得底話顔子未必與聞顔子聞得底話子貢未必與聞今却合在論語一書後世學者豈不幸事但患自家不去用心儒用讀論語問論語近讀得如何昨日所讀底今日再讀見得如何榦曰尚看未熟曰這也使急不得也不可慢所謂急不得者功效不可急所謂不可慢者工夫不可慢榦問叔噐論語讀多少曰兩日只雜看曰恁地如何㑹長進看此一書且須專此一書便待此邊冷如氷那邊熱如火亦不可捨此而觀彼淳問林恭甫看論語至何處曰至述而曰莫要恁地快這箇使急不得須是緩緩理㑹須是逐一章去搜索候這一章透徹後却理㑹第二章乆後通貫却事事㑹看如喫飯様喫了一口又喫一口喫得滋味後方解生精血若只恁地吞下去則不濟事義剛論語難讀日只可看一二段不可只道理㑹文義得了便了須是子細玩味以身體之見前後晦明生熟不同方是切實賀孫論讀書之法擇之云甞作課程看論語日不得過一段曰明者可讀兩段或三段如此亦所以治躁心近日學者病在好髙讀論語未問學而時習便説一貫孟子未言梁王問利便説盡心易未看六十四卦便先讀繫辭德明人讀書不得攙前去下梢必無所得如理㑹論語只得理㑹論語不得存心在孟子如理㑹里仁一篇且逐章相挨理㑹了然後從公冶長理㑹去如此便是去偽論語一日只看一段大故明白底則看兩段須是專一自早至夜雖不讀亦當涵泳常在胷次如有一件事未了相似到晩却把來商量但一日積一段日日如此年嵗間自是裏面通貫道理分明榦問看論語了未廣云已看一遍了曰太快若如此看只是理㑹文義不見得他底深長意味所謂深長意味又也别無說話只是涵泳久之自見得廣論語愈看愈見滋味出若欲草草去看儘說得通恐未能有益凡看文字須看古人下字意思是如何且如前輩作文一篇中須看它用意在那裏舉杜子美詩云更覺良工用心苦一般人看盡只見得是畵一般識底人看便見得它精神妙處知得它用心苦也㝢王子充問學曰聖人教人只是箇論語漢魏諸儒只是訓詁論語須是玩味今人讀書傷快須是熟方得曰論語莫也須揀箇緊要底看否曰不可須從頭看無精無粗無淺無深且都玩味得熟道理自然出曰讀書未見得切須見之行事方切曰不然且如論語第一便教人學便是孝弟求仁便戒人巧言令色便三省也可謂甚切榦莫云論語中有緊要底有汎說底且要著力緊要底便是揀别若如此則孟子一部可刪者多矣聖賢言語粗說細說皆著理㑹教透徹盖道體至廣至大故有說得易處說得難處說得大處說得小處若不盡見必定有窒礙處若謂只言忠信行篤敬便可則自漢唐以來豈是無此等人因甚道統之傳却不曽得亦可見矣㽦先生問論語如何看淳曰見得聖人言行極天理之實而無一毫之妄學者之用工尤當極其實而不容有一毫闕是如此然就裏面詳細處須要十分透徹無一不盡淳或講論語因曰聖人說話開口見心必不只說半截藏著半截學者觀書且就本文上看取正意不須立說别生枝蔓唯能認得聖人句中之意乃善必大聖人之言雖是平說自然周徧停停當當都有許多四方八面不少了些子意思若門人弟子之言便有不能無偏處如夫子言文質彬彬自然停當恰好子貢文猶質也質猶文也便說得偏夫子言行有餘力則以學文自然有先後輕重而子夏雖曰未學吾必謂之學便有廢學之弊端蒙人之為學也是難若不從文字上做工夫又茫然不知下手處若是字字而求句句而論不於身心上著切體認則又無所益且如說我欲仁斯仁至矣何故孔門許多弟子聖人竟不曽以仁許之雖以顔子之賢而尚難不違於三月之後聖人乃曰我欲斯至盍亦於日用體騐我若欲仁其心如何仁之至不至其意又如何又如說非禮勿視聽言動盍亦每事省察何者為非禮而吾又何以能勿視勿聽若每日如此讀書庶㡬看得道理自我心而得不為徒言也壯祖徳先問孟子曰孟子說得段段痛切如檢死人相似必有箇致命痕孟子段段有箇致命處看得這般處出方有精神須看其說與我如何與今人如何須得其切處今一切看得都困了揚讀孟子學問之道無他求其放心而已又曰有是四端於我者知皆擴而充之孟子說得最好人之一心在外者又要收入來在内者又要推出去孟子一部書皆是此意又以手作推之狀曰推須是用力如此又曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰世間只有箇闔闢内外人須自體察取祖道人傑録云心在外者要收向裏心在内者却推出去孟子云學問求放心四端擴而充之一部孟子皆是此意大抵一收一放一闔一闢道理森然賜録云因說仁義曰只有孟子說得好如曰學問之道無他求其放心而已此是從外面收入裏來如曰人之有是四端知皆擴而充之又要從裏面發出去凡此出入往來皆由箇心又曰所謂立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義都是恁地讀孟子非惟看它義理熟讀之便曉作文之法首尾照應血脈通貫語意反覆明白峻潔無一字閒人若能如此作文便是第一等文章僴孟子之書明白親切無甚可疑者只要日日熟讀須教它在吾肚中先千百轉便自然純熟某初看時要逐句去看它便覺得意思淺迫至後來放寛看却有條理然此書不特是義理精明又且是甚次第文章某因讀亦知作文之法植孟子全讀方見得意思貫某因讀孟子見得古人作文法亦有似今人間架淳孟子文章妙不可言文蔚曰他每叚自有一二句綱領其後只是解此一二句曰此猶是淺者其他自有妙處惟老蘇文深得其妙文蔚孟子之文恐一篇是一人作又疑孟子親作不然何其妙也豈有如是人出孟子之門而沒世不聞耶方集注且須熟讀記得方子集注語吳仁父曰某語孟集注添一字不得減一字不得公子細看又曰不多一箇字不少一箇字節論語集注如秤上稱來無異不髙些不低些自是學者不肯用心看如看得透存養熟可謂甚生氣質友仁某於論孟四十餘年理㑹中間逐字稱等不教偏些子學者將注處冝子細看又曰解說聖賢之言要義理相接去如水相接去則水流不碍後又云中庸解每畨看過不甚有疑大學則一而看一而疑未甚惬意所以改削不已過讀書别無法只管看便是法正如獃人相似捱來捱去自家都未要先立意見且虚心只管看看來看去自然曉得某那集注都詳備只是要人看無一字閒那箇無𦂳要閒底字越要看自家意裏說是閒字那箇正是𦂳要字上蔡云人不可無根便是難所謂根者只管看便是根不是外面别討箇根來僴前軰解說恐後學難曉故集注盡撮其要已說盡了不須更去注脚外又添一段說話只把這箇熟看自然曉得莫枉費心去外面思量問集注引前軰之說而増損改易本文其意如何曰其說有病不欲更就下面安注脚又問解文義處或用者字或用謂字或用猶字或直言其輕重之意如何曰直言直訓如此猶者猶是如此又問者謂如何曰是恁地節集注中有兩說相似而少異者亦要相資有說全别者是未定也淳或問集注有兩存者何者為長曰使某見得長底時豈復存其短底只為是二說皆通故并存之然必有一說合得聖人之本意但不可知爾復曰大率兩說前一說勝拱夀問語解胡氏為誰曰胡明仲也向見張敬夫殊不取其說某以為不然他雖有未至處若是說得是者豈可廢廣集注中曽氏是文清公黄氏是黄祖舜晁氏是晁以道李氏是李光祖廣程先生經解理在解語内某集注論語只是發明其辭使人玩味經文理皆在經文内易傳不看本文亦是自成一書杜預左傳解不看經文亦自成一書鄭箋不識經大㫖故多隨句解論語集注盖某十年前本為朋友間傳去鄉人遂不告而刋及知覺則已分裂四出而不可收矣其間多所未穏然誤看讀要之聖賢言語正大明白本不須恁地𫝊註正所謂記其一而遺其百得其粗而遺其精者也道夫或述孟子集注意義以問曰大㮣如此只是要熟須是日日認過述大學以問曰也只如此只是要日日認過讀新底了反轉看舊底教十分熟後自别有意思又曰如雞伏卵只管日日伏自㑹成賀孫初解孟子時見自不明隨著前軰說反不自眀不得其要者多矣方集注乃集義之精髓道夫集注集義問孟子比論語却易看但其間數段極難曉曰只盡心篇語簡了便難理㑹且如養氣一章被它說長了極分曉只是人不熟讀問論語浩博須作年嵗間讀然中間切要處先理㑹如何曰某近來作論語略解以精義太詳說得沒緊要處多似空費工夫故作此書而今看得若不看精義只看略解終是不浹洽因舉五峯舊見龜山問為學之方龜山曰且看論語五峯問論語中何者為要龜山不對久之曰熟讀先生因曰如今且只得挨將去榦諸朋友若先看集義恐未易分别得又費工夫不如看集注又恐太易了這事難說不奈何且須看集注教熟了可更看集義集義多有好處某却不編出者這處却好商量却好子細看所以去取之意如何須是看得集義方始無疑某舊日只恐集義中有未曉得義理費盡心力看來看去近日方始都無疑了賀孫因說吾與回言一章曰便是許多緊要底言語都不曽說得出且說精義是許多言語而集注能有幾何言語一字是一字其間有一字當百十字底公都把做等閒看了聖人言語本自眀白不須解說只為學者看不見所以做出注解與學者省一半力若注解上更看不出却如何看得聖人意出又曰凡看文字端坐熟讀久久於正文邊自有細字注脚迸出來方是自家見得親切若只於外面捉摸箇影子說終不濟事聖人言語只熟讀玩味道理自不難見若果曽著心而看他道理不出則聖賢為欺我矣如老蘇軰只讀孟韓二子便翻繹得許多文章出來且如攻城四面牢北若攻得一面破時這城子已是自家底了不待更攻得那三面方入得去初學固是要看大學論孟若讀得大學一書透徹其他書都不費力觸處便見喟然嘆者久之曰自有這箇道理說與人不信問近看論語精義不知讀之當有何法曰别無方法但虚心熟讀而審擇之耳人傑集義因論集注論語曰於學者難說看衆人所說七縱八横如相戰之類於其中分别得甚妙然精神短者又難教如此只教看集義又皆平易了興起人不得振問要看精義不知如何看曰只是逐段子細玩味公記得書否若記不得亦玩味不得横渠云讀書須是成誦又曰某近看學者須是專一譬如服藥須是專服一藥方見有效榦問精義有說得髙逺處不知如何看曰也須都子細看取子却在自家若以為髙逺而畧之便鹵莽了榦讀書且須熟讀玩味不必立說且理㑹古人說教通透如語孟集義中所載諸先生語須是熟讀一一記放心下時時將來玩味久久自然理㑹得今有一般學者見人恁麽說不窮究它說是如何也去立一說來攙說何益於事只贏得一箇理㑹不得爾廣讀書須痛下工夫須要細看心粗性急終不濟事如看論語粗義且只將諸說相比並看自然比得正道理岀來如識髙者初見一條便能判其是非如未能且細看如看按欵相似雖未能便斷得它按然已是經心盡知其情矣只管如此將來粗急之心亦磨礲得細宻了横渠云文欲宻察心欲洪放若不痛做工夫終是難入徳明看精義須寛著心不可看殺了二先生說自有相闗透處如伊川云有主則實又云有主則虚如孟子云生於其心害於其政發於其政害於其事又云作於其心害於其事作於其事害於其政自當隨文隨時隨事看各有通徹處徳明讀論語須將精義看先看一段次看第二段將兩段比較孰得孰失孰是孰非又將第三段比較如前又緫一章之說而盡比較之其間須有一說合聖人之意或有兩說有三說有四五說皆是又就其中比較踈宻如此便是格物及看得此一章透徹則知便至或自未有見識只得就這裏挨一章之中程子之說多是門人之說多非然初看時不可先萌此心門人所說亦多有好處蜚卿曰只將程子之說為主如何曰不可只得以理為主然後看它底看得一章直是透徹了然後看第二章亦如此法若看得三四篇此心便熟數篇之後迎刃而解矣某嘗苦口與學者說得口破少有依某去著力做工夫者且如格物致知之章程子與門人之說某初讀之皆不敢疑後來編出細看見得程子諸說雖不同意未嘗不貫其門人之說與先生盖有大不同者矣驤讀書考義理似是而非者難辨且如精義中惟程先生說得確當至其門人非惟不盡得夫子之意雖程子之意亦多失之今讀語孟不可便道精義都不是都廢了須借它做階梯去尋求將來自見道理知得它是非方是自己所得處如張無垢文字淺近却易見也問如何辨得似是而非曰遺書所謂義理栽培者是也如此用工久之自能辨得徳明論語中程先生及和靖說只於本文添一兩字甚平淡然意味深長須當子細看要見得它意味方好淳問精義中尹氏說多與二程同何也曰二程說得已明尹氏只說出問謝氏之說多華掞曰胡侍郎嘗教人看謝氏論語以其文字上多有發越處敬仲先生問尋常精義自二程外孰得曰自二程外諸說恐不相上下又問蜚卿答曰自二程外惟龜山勝曰龜山好引證未說本意且將别說折過人若看它本說未分眀併連所引失之此亦是一病又問仲思答曰據某恐自二程外惟和靖之說為簡當曰以某觀之却是和靖說得的當雖其言短淺時說不盡然却得這意思頃之復曰此亦大綱偶然說到此不可以為定也明道說道理一看便好愈看而愈好伊川猶不無難明處然愈看亦愈好上蔡過髙多說人行不得底說話楊氏援引十件也要做十件引上來范氏一箇寛大氣象然說得走作便不可曉端䝉上蔡論語解言語極多看得透時它只有一兩字是緊要賜問謝氏說多過不如楊氏說最實曰尹氏語言最實亦多是處但看文字亦不可如此先懐權斷於胷中如謝氏說十分有九分過處其間亦有一分說得恰好處豈可先立定說今且須虚心玩理大雅問理如何玩曰今當以小說明之一人欲學相氣色其師與五色線一串令入暗室中認之云辨得此五色出方能相氣色看聖人意㫖亦要如此精専方得之到自得處不從說來雖人言亦不信盖開導雖假人言得處須是自得人則無如之何也孔子言語簡若欲得之亦非用許多工夫不得孟子之言多若欲得之亦合用許多工夫孔子言簡故意廣無失孟子言多意長前呼後喚事理俱眀亦無失若他人語多則有失某今接士大夫答問多轉覺辭多無益大雅原父論語解緊要處只是莊老必大諸家觧先生問曽文清有論語解曽見否曰嘗見之其言語簡曰其中極有好處亦有先儒道不到處某不及識之想是一精確人故解書言多簡某曰聞之文清每日早必正衣冠讀論語一篇曰此所謂學而時習之與今日學者讀論語不同可學建安吳才老作論語十說世以為定夫作者非也其功淺其害亦淺又為論語考異其功漸深而有深害矣至為語解即以己意測度聖人謂聖人為多詐輕薄人矣徐蒧為刋其書越州以行方學者解論語多是硬說須習熟然後有箇入頭處季札孟子疏乃邵武士人假作蔡季通識其人當孔頴達時未尚孟子只尚論語孝經爾其書全不似䟽様不曽解出名物制度只繞纒趙岐之說耳璘問伊川說讀書當觀聖人所以作經之意與聖人所以用心一條曰此條程先生說讀書最為親切今人不㑹讀書是如何只緣不曽求聖人之意纔拈得些小便把自意硬入放裏面胡說亂說故教它就聖人意上求看如何問易其氣是如何曰只是放教寛慢今人多要硬把捉教住如有箇難理㑹處便要刻畫百端討出來枉費心力少刻只說得自底那裏見聖人意又曰固是要思索思索那曽恁地又舉闕其疑一句歎美之賀孫集注讀論孟法先生嘗舉程子讀論孟切已之說且如學而時習之切已看時曽時習與否句句如此求之則有益矣余正甫云看中庸大學只得其綱而無目如衣服只有領子過當時不曽應後欲問謂之綱者以其目而得名謂之領者以其衣而得名若無目則不得謂之綱矣故先生編禮欲以中庸大學學記等篇置之卷端為禮本正甫未之從過問孔子言語句句是自然孟子言語句句是事實曰孔子言語一似沒緊要說出來自是包含無限道理無些滲漏如云道之以政齊之以刑道之以徳齊之以禮數句孔子初不曽著氣力只似沒緊要說出來自是委曲詳盡說盡道理更走它底不得若孟子便用著氣力依文按本據事實說無限言語方說得出此所以為聖賢之别也孟子說話初間定用兩句說起箇頭下面便分開兩段說去正如而今人做文字相似僩論語之書無非操存涵養之要七篇之書莫非體驗擴充之端盖孔子大㮣使人優游饜飫涵泳諷味孟子大槩是要人探索力討反己自求故伊川曰孔子句句是自然孟子句句是事實亦此意也如論語所言居處恭執事敬與人忠出門如見大賔使民如承大祭非禮勿視聽言動之類皆是存養底意思孟子言性善存心養性孺子入井之心四端之發若火始然泉始達之類皆是要體認得這心性下落擴而充之於此等類語玩味便自可見端䝉問齊景公欲封孔子以尼谿之田晏嬰不可楚昭王欲封孔子以書社之地子西不可使無晏嬰子西則夫子還受之乎曰既仕其國則須有采地受之可也人傑集注序說楚昭王招孔子孔子過陳蔡被圍昭王之招無此事鄒魯間陋儒尊孔子之意如此設使是昭王招陳蔡乃其下風耳豈敢圍張無垢所謂者非朱子語類卷十九
