body:
  text: 朱子語類卷十一學五讀書法下人之為學固是欲得之於心體之於身但不讀書則不知心之所得者何事道夫讀書窮理當體之於身凡平日所講貫窮究者不知逐日常見得在心目間否不然則隨文逐義趕趂期限不見悦處恐終無益人常讀書庶幾可以管攝此心使之常存横渠有言書所以維持此心一時放下則一時徳性有懈其何可廢盖卿初學於敬不能無間斷只是才覺間斷便提起此心只是覺處便是接續某要得人只就讀書上體認義理日間常讀書則此心不走作或只去事物中滚則此心易得汨沒知得如此便就讀書上體認義理便可喚轉來賀孫本心陷溺之久義理浸灌未透且宜讀書窮理常不間斷則物欲之心自不能勝而本心之義理自安且固矣須是存心與讀書為一事方得方子人心不在軀殻裏如何讀得聖人之書只是杜撰鑿空說元與他不相似僴讀書須將心貼在書册上逐句逐字各有著落方始好商量大凡學者須是收拾此心令專静純一日用動静間都無馳走散亂方始看得文字精審如此方是有夲領今人看文字多是以昏怠去看所以不子細故學者且於静處收拾敎意思在裏然後虚心去看則其義理未有不明者也祖道昔陳烈先生苦無記性一日讀孟子學問之道無他求其放心而已矣忽悟曰我心不曾收得如何記得書遂閉門静坐不讀書百餘日以收放心却去讀書遂一覽無遺僴學者讀書多緣心不在故不見道理聖賢言語本自分曉只畧畧加意自見得若是專心豈有不見文蔚心不定故見理不得今且要讀書須先定其心使之如止水如明鏡暗鏡如何照物伯羽立志不定如何讀書芝讀書有個法只是刷刮浄了那心後去看若不曉得又且放下待它意思好時又將來看而今却説要虚心心如何觧虚得而今正要將心在那上靣義剛讀書須是要身心都入在這一段裏靣更不問外靣有何事方見得一段道理出如博學而篤志切問而近思如何却説個仁在其中盖自家能常常存得此心莫教走作則理自然在其中今人却一邊去看文字一邊去思量外事只是枉費了工夫不如放下了文字待打疊教意思静了却去看祖道學者觀書多走作者亦恐是根本上功夫未齊整只是以紛擾雜亂心去看不曾以湛然凝定心去看不若先涵養夲原且將已熟底義理玩味待其浃洽然後去看書便自知只是如此老蘇自述其學為文處有云取古人之文而讀之始覺其出言用意與已大異及其久也讀之益精胸中豁然以明若人之言固當然者此無他於學文上功夫有見處可取以喻今日讀書其功夫亦合如此又曰看得一兩段却且放心胸寛閒不可貪多又曰陸子静嘗有旁人讀書之説亦可且如此凡人看文字初看時心尚要走作道理尚見得未定猶沒柰他何到看得定時方入規矩又只是在印板上靣説相似都不活不活則受用不得須是玩味反覆到得熟後方始㑹活方始㑹動方有得受用處若只恁生記去這道理便死了時舉不可終日思量文字恐成硬將心去馳逐了亦須空閒少頃養精神又來看淳讀書閒暇且静坐教他心平氣定見得道理漸次分曉季札錄云庶幾心平氣和可以思索義理這個却是一身縂㑹處且如看大學在明明徳一句須常常提醒在這裏他日長進亦只在這裏人只是一箇心做本須存得在這裏識得他條理脉絡自有貫通處賜季札錄云問伊川見人静坐如何便嘆其善學曰這却是一箇縂要處又云大學在明明徳一句當常常提撕能如此便有進歩處盖其原自此發見人只一心為本存得此心于事物方知有脉絡貫通處大凡讀書且要讀不可只管思口中讀則心中閒而義理自出某之始學亦如是爾更無别法節學者讀書須要斂身正坐緩視微吟虚心涵泳切已省一作體察又云讀一句書須體察這一句我將來甚處用得又云文字是底固當看不是底也當看精底固當看粗底也當看震讀書須是虚心切已虚心方能得聖賢意切已則聖賢之言不為虚説看文字須是虚心莫先立已意少刻都錯了又曰虚心切已虚心則見道理明切已自然體認得出舉聖人言語皆天理自然本坦易明白在那裏只被人不虚心去看只管外靣捉摸及看不得便將自已身上一般意思説出把做聖人意思淳聖賢言語當虚心看不可先自立説去撐住便喎斜了不讀書者固不足論讀書者病又如此淳凡看書須虚心看不要先立説看一段有下落了然後又看一段須如人受詞訟聽其説盡然後方可決斷泳看前人文字未得其意便容易立説殊害事盖既不得正理又枉費心力不若虚心静看即涵養究索之功一舉而兩得之也時舉大抵義理須是且虚心随他本文正意看必大讀書遇難處且須虚心捜討意思有時有思繹底事却去無思量處得敬仲問如先生所言推求經義將來到底還别有見處否曰若説如釋氏之言有他心通則無也但只見得合如此爾再問所説尋求義理仍須虚心觀之不知如何是虚心曰須退一歩思量次日又問退一歩思量之㫖曰從來不曾如此做工夫後亦自難説今人觀書先自立了意後方觀盡率古人語言入做自家意思中來如此只是推廣得自家意思如何見得古人意思須得退歩者不要自作意思只虚此心將古人語言放前靣看他意思倒殺向何處去如此玩心方可得古人意有長進處且如孟子説詩要以意逆志是為得之逆者等待之謂也如前途等待一人未來時且須耐心等待將來自有來時候他未來其心急切又要進前尋求却不是以意逆志是以意捉志也如此只是牽率古人言語入做自家意中來終無進益大雅某嘗見人云大凡心不公底人讀書不得今看來是如此如觧説聖經一向都不有自家身已全然虚心只把他道理自看其是非恁地看文字猶更自有牽於舊習失㸃檢處全然把一已私意去看聖賢闕如何看得出賀孫或問看文字為衆説雜亂如何曰且要虚心逐一説看去看得一説却又看一説看來看去是非長短皆自分明譬如人欲知一箇人是好人是惡人且隨他去看隨來隨去見他言語動作便自知他好惡又曰只要虚心又云濯去舊聞以來新見觀書當平心以觀之大抵看書不可穿鑿看從分明處不可尋從隠僻處去聖賢之言多是與人説話若是嶢﨑却教當時人如何曉節觀書須静着心寛着意思沈潜反覆將久自㑹曉得去儒用放寛心以他説看他説以物觀物無以已觀物道夫以書觀書以物觀物不可先立已見讀書須要切已體驗不可只作文字看又不可助長方學者當以聖賢之言反求諸身一一體察須是曉然無疑積日既久當自有見但恐用意不精或貪多務廣或得少為足則無由明耳祖道讀書不可只專就紙上求理義須反來就自家身上以手自指推究秦漢以後無人説到此亦只是一向去書册上求不就自家身上理㑹自家見未到聖人先説在那裏自家只借他言語來就身上推究始得淳今人讀書多不就切已上體察但於紙上看文義上説得去便了如此濟得甚事何必讀書然後為學子曰是故惡夫佞者古人亦須讀書始得但古人讀書將以求道不然讀作何用今人不去這上理㑹道理皆以渉獵該博為能所以有道學俗學之别因提案上藥嚢起曰如合藥便要治病終不成合在此看如此於病何補文字浩瀚難看亦難記將已曉得底體在身上却是自家易曉易做底事觧經已是不得已若只就注觧上説將來何濟如畫那人一般畫底却識得那人别人不識須因這畫去求那人始得今便以畫喚做那人不得㝢或問讀書工夫曰這事如今似難説如世上一等人説道不須就書册上理㑹此固是不得然一向就書册上理㑹不曾體認著自家身已也不濟事如説仁義禮智曾認得自家如何是仁自家如何是義如何是禮如何是智須是著身已體認得如讀學而時習之自家曾如何學自家曾如何習不亦説乎曾見得如何是説須恁地認始得若只逐叚觧過去觧得了便休也不濟事如世上一等説話謂不消得讀書不消理㑹别自有箇覺處有箇悟處這箇是不得若只恁地讀書只恁地理㑹又何益賀孫學須做自家底著便見切已今人讀書只要科舉用已及第則為雜文用其高者則為古人用皆做外靣看淳讀書之法有大本大原處有大綱大目處又有逐事上理㑹處又其次則觧釋文義雉玩索窮究不可一廢升卿或問讀書未知統要曰統要如何便㑹知得近來學者有一種則舎去册子却欲於一言半句上便要見道理又有一種則一向汎濫不知歸著處此皆非知學者須要熟看熟思久久之間自然見箇道理四停八當而所謂統要者自在其中矣履孫凡看文字專看細宻處而遺却緩急之間者固不可專看緩急之間而遺却細宻者亦不可今日之看所以為他日之用須思量所以看者何為非只是空就言語上理㑹得多而已也譬如拭桌子只拭中心亦不可但拭四弦亦不可須是切已用功使將來自得之於心則視言語誠如糟粕然今不可便視為糟粕也但當自期向到彼田地爾方學者有所聞須便行始得若得一書須便讀便思便行豈可又安排停待而後下手且如得一片紙便來一片紙上道理行之可也履孫讀書便是做事凡做事有是有非有得有失善處事者不過稱量其輕重耳讀書而講究其義理判别其是非臨事即此理可學真理㑹得底便道真理㑹得真理㑹不得底便道真理㑹不得真理㑹得底固不可忘真理㑹不得底須看那處有礙須記那緊要處常勿忘所謂智者利仁方其求時心固在此不求時心亦在此淳學得此事了不可自以為了恐怠意生如讀得此書須終身記之夀昌讀書推類反求固不害為切已但却又添了一重事不若且依文看逐處各自見箇道理久之自然貫通不須如此費力也學者理㑹文義只是要先理㑹難底遂至於易者亦不能曉學記曰善問者如攻堅木先其易者後其節目所謂攻瑕則堅者瑕攻堅則瑕者堅不知道理好處又却多在平易處璘只看自家底不是自家底枉了思量燾凡讀書且須從一條正路直去四靣雖有可觀不妨一看然非是緊要方子看書不由直路只管枝蔓便於夲意不親切淳看文字不可相妨須各自逐一著地頭看他指意若牽窒著則件件相礙矣端蒙看文字且逐條看各是一事不相牽合讀書要周遍平正夔孫看文字不可落於偏僻須是周匝看得四通八達無些窒礙方有進益又云某觧語孟訓詁皆存學者觀書不可只看緊要處閒慢處要都周匝今説求放心未問其它只此便是博學而篤志切問而近思仁在其中矣博學而篤志切問近思方是讀書却説仁在其中盖此便是求放心也人傑看文字且依本句不要添字那裏元有縫罅如合子相似自家只去抉開不是渾淪物硬去鑿不可先立說牽古人意來湊如逆詐億不信與先覺之辨逆詐是那人不曾詐我先去揣摩道那人必是詐我億不信是那人未有不信意便道那人必是不信先覺則分明見得那人已詐我不信我如高祖知人善任使是分明見其才耳讀書若有所見未必便是不可便執著且放在一邊益更讀書以來新見若執著一見則此心便被此見遮蔽了譬如一片浄潔田地若上靣纔安一物便須有遮蔽了處聖人七通八達事事説到極致處學者須是多讀書使互相發明事事窮到極致處所謂本諸身徴諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑直到這箇田地方是語云執徳不𢎞易云寛以居之聖人多説箇廣大寛洪之意學者要須體之廣看書不可將自已見硬參入去須是除了自已所見看他冊子上古人意思如何如程先生觧直方大乃引孟子雖是程先生言畢竟廹切節看文字先有意見恐只是私意謂如粗厲者觀書必以勇果强毅為主柔善者觀書必以慈祥寛厚為主書中何所不有人傑凡讀書先須曉得他底言詞了然後看其説於理當否當於理則是背於理則非今人多是心下先有一箇意思了却將他人説話來説自家底意思其有不合者則硬穿鑿之使合廣學者不可用已意遷就聖賢之言徳明讀書如問人事一般欲知彼事須問彼人今却不問其人只以已意料度謂必是如此揚看人文字不可随聲遷就我見得是處方可信須沈潜玩繹方有見處不然人説沙可做飯我也説沙可做飯如何可喫謙大凡讀書不要般渉但温尋舊底不妨不可將新底來攙道夫文字不可硬説但當習熟漸漸分明凡看聖賢言語不要廹得太緊振大凡看文字要急廹不得有疑處且漸漸思量若一下便要理㑹得也無此理廣看文字須是退歩看方可見得若一向近前廹看反為所遮蔽轉不見矣力行學者觀書病在只要向前不肯退歩看愈向前愈看得不分曉不若退歩却看得審大槩病在執著不肯放下正如聽訟心先有主張乙底意思便只尋甲底不是先有主張甲底意思便只見乙底不是不若姑置甲乙之説徐徐觀之方能辨其曲直横渠云濯去舊見以来新意此説甚當若不濯去舊見何處得新意來今學者有二種病一是主私意一是舊有先入之説雖欲擺脱亦被他自來相尋㽦學者不可只管守從前所見須除了方見新意如去了濁水然後清者出焉力行到理㑹不得處便當濯去舊見以來新意仍且只就本文看之伯羽某向時與朋友説讀書也教它去思索求所疑近方見得讀書只是且恁地虚心就上靣熟讀久之自有所得亦自有疑處盖熟讀後自有窒礙不通處是自然有疑方好較量今若先去尋箇疑便不得又曰這般也有時候舊日看論語合下便有疑盖自有一様事被諸先生説成數様所以便著疑今却有集注了且可傍本看教心熟少間或有説不通處自見得疑只是今未可先去疑著賀孫看文字且自用工夫先已切至方可舉所疑與朋友講論假無朋友久之自能自見得盖蓄積多者忽然爆開便自然通此所謂何天之衢亨也盖蓄極則通須是蓄之極則通㽦人傑錄云讀書須是先看一件了然後再看一件若是蓄積處多忽然爆開來時自然所得者易易所謂何天之衢亨是也讀書無疑者須教有疑有疑者却要無疑到這裏方是長進道夫問看理多有疑處如百氏之言或疑其為非又疑其為是當如何斷之曰不可强斷姑置之可也人傑人之病只知他人之説可疑而不知已説之可疑試以詰難它人者以自詰難庶幾自見得失必大因求講學言論傳之荅曰聖賢之言明如日月又曰人有欲速之病舊嘗與一人讀詩集每畧過題一行不看題目却成甚讀詩也又嘗見龔實之轎中只著一冊文字看此其專静也且云尋常出外轎中著三四冊書看一冊厭又看一冊此是甚功夫也方因僉出文字偶失僉子遂不能記云舊有人老不識字然隔年瑣瑣出入皆心記口數之既為寫下覆之無差盖其人忠實又專一無他事所以記得今學者不能記又徃徃只靠著筆墨文字所以愈㤀之也方先生􅃧引禅語云一僧與人讀碑云賢讀著縂是字某讀著搃是禅溈山作一書戒僧家整齊有一川僧最䖃苴讀此書云似都是説我善財五十三處見善知識問皆如一云我已發三藐三菩提心而未知如何行菩薩行成菩薩道問諸讀經之法曰亦無法只是虚心平讀去淳以下讀諸經法學不可躐等不可草率徒費心力須依次序如法理㑹一經通熟他書亦易看閎祖聖人千言萬語只是説箇當然之理恐人不曉又筆之于書自書契以來二典三謨伊尹武王箕子周公孔孟都只是如此可謂盡矣只就文字間求之句句皆是做得一分便是一分工夫非茫然不可測也但患人不子細求索之耳須要思量聖人之言是説箇甚麽要將何用若只讀過便休何必讀明作讀六經時只如未有六經只就自家身上討道理其理便易曉敬仲讀書只就一直道理看剖析自分曉不必去偏曲處看易有箇隂陽詩有箇邪正書有箇治亂皆是一直路逕可見别無嶢﨑㝢人惟有私意聖賢所以留千言萬語以掃滌人私意使人人全得惻隠羞惡之心六經不作可也裏靣著一㸃私意不得節許多道理孔子恁地説一畨孟子恁地説一畨子思又恁地説一畨都恁地懸空掛在那裏自家須自去體認始得賀孫為學須是先立大本其初甚約中間一節甚廣大到末梢又約孟子曰博學而詳説之將以反説約也故必先觀論孟大學中庸以考聖賢之意讀史以考存亡治亂之迹讀諸子百家以見其駁雜之病其節目自有次序不可踰越近日學者多喜從約而不於博求之不知不求於博何以考驗其約如某人好約今只做得一僧了得一身又有專於博上求之而不反其約今日考一制度明日又考一制度空於用處作工夫其病又甚於約而不博者要之均是無益可學學者只是要熟工夫純一而已讀時熟看時熟玩味時熟如孟子詩書全在讀時工夫孟子每章説了又自觧了盖他直要説得盡方住其言一大片故後來老蘇亦拖他來做文章説須熟讀之便得其味今觀詩既未寫得傳且除了小序而讀之亦不要將做好底看亦不要將做惡底看只認夲文語意亦須得八九㽦人做功課若不專一東看西看則此心先已散漫了如何看得道理出須是看論語專只看論語看孟子專只看孟子讀這一章更不看後章讀這一句更不得看後句這一字理㑹未得更不得看下字如此則專一而功可成若所看不一汎濫無統雖卒嵗窮年無有透徹之期某舊時文字只是守此拙法以至於今思之只有此法更無他法僴凡讀書須有次序且如一章三句先理㑹上一句待通透次理㑹第二句第三句待分曉然後將全章反覆納繹玩味如未通透却看前軰講觧更第二畨讀過須見得身分上有長進處方為有益如語孟二書若便恁地讀過只一二日可了若要將來做切已事玩味體察一日多看得數段或一兩段耳又云看講觧不可專狥他説不求是非便道前賢言語皆的當如遺書中語豈無過當失實處亦有説不及處又云初看時便先斷以已意前聖之説皆不可入此正當今學者之病不可不知㝢人只讀一書不得謂其傍出多事禮記左傳最不可不讀揚看經書與看史書不同史是皮外物事沒緊要可以劄記問人若是經書有疑這箇是切已病痛如人負痛在身欲斯須忘去而不可得豈可比之看史遇有疑則記之紙邪僩浩曰趙書記云自有見後只是看六經語孟其他史書雜學皆不必看其説謂買金須問賣金人雜賣店中那得金銀不必問也曰如此即不見古今成敗便是荆公之學書那有不可讀者只怕無許多心力讀得六經是三代以上之書曽經聖人手全是天理三代以下文字有得失然而天理却在這邊自若也要有主覷得破皆是學浩向時有一截學者貪多務得要讀周禮諸史本朝典故一向盡要理㑹得許多沒緊要底工夫少刻身已都自恁地顛顛倒倒沒頭放處如喫物事相似將甚麽雜物事不是時節一頓都喫了便被他撐腸拄肚沒柰何他賀孫看經傳有不可曉處且要旁通待其浃洽則當觸類而可通矣人傑經㫖要子細看上下文義名數制度之類畧知之便得不必大段深泥以妨學問理明後便讀申韓書亦有得方子以下雜論諸先生立言有差處如横渠知言當知其所以差處不宜一切委之所以自廣其志自進其知也讀書理㑹道理只是將勤苦捱將去不觧得不成文王猶勤而况寡徳乎今世上有一般議論成就後生􅂴惰如云不敢輕議前軰不敢妄立論之類皆中怠惰者之意前軰固不敢妄議然論其行事之是非何害固不可鑿空立論然讀書有疑有所見自不容不立論其不立論者只是讀書不到疑處耳將精義諸家説相比並求其是便自有合辨處璘因言讀書法曰且先讀十數過已得文義四五分然後看觧又得三二分又却讀正文又得一二分向時不理㑹得孟子以其章長故也因如此讀元來它章雖長意味却自首末相貫又問讀書心多散亂曰便是心難把捉處知得此病者亦早少了向時舉中庸誠者物之終始不誠無物説與直卿云且如讀十句書上九句有心記得心不走作則是心在此九句内是誠是有其物故終始得此九句用若下一句心不在焉便是不誠便無物也明作以下論看注觧大凡人讀書且當虚心一意將正文熟讀不可便立見觧看正文了却著深思熟讀便如已説如此方是今來學者一般是專要作文字用一般是要説得新竒人説得不如我説得較好此學者之大病譬如聽人説話一般且從他説盡不要勦斷他説並以已意見抄説若如此全不見得他説是非只説得自家底終不濟事久之又曰須是將本文熟讀字字咀嚼教有味若有理㑹不得處深思之又不得然後却將註觧看方有意味如人飢而後食渴而後飲方有味不飢不渴而强飲食之終無益也又曰某所集注論語至扵訓詁皆子細者盖要人字字與某著意看字字思索到莫要只作等閒看過了又曰讀書第一莫要先立箇意去看它底莫要才領畧些大意不耐煩便休了祖道學者觀書先須讀得正文記得注觧成誦精熟注中訓釋文意事物名義發明經指相穿紐處一一認得如自已做出來底一般方能玩味反覆向上有透處若不如此只是虚設議論如舉業一般非為已之學也曾見有人説詩問他闗睢篇於其訓詁名物全未曉便説樂而不滛哀而不傷某因説與他道公而今説詩只消這八字更添思無邪三字共成十一字便是一部毛詩了其他三百萹皆成渣滓矣因憶頃年見汪端明説沈元用問和靖伊川易傳何處是切要尹云體用一源顯微無間此是切要處後舉似李先生先生曰尹説固好然須是看得六十四卦三百八十四爻都有下落方始説得此話若學者未曾子細理㑹便與他如此説豈不誤他某聞之悚然始知前日空言無實不濟事自此讀書益加詳細云此一段係先生親書示書堂學者凡人讀書若窮得到道理透處心中也替他饒本作便是快活若有疑處須是参諸家觧熟看看得有差互時此一段終是不穏在心頭不要放過敬仲凡看文字諸家説有異同處最可觀謂如甲説如此且撏扯住甲窮盡其詞乙説如此且撏扯住乙窮盡其詞兩家之説既盡又参攷而窮究之必有一真是者出矣學䝉經之有觧所以通經經既通自無事於觧借經以通乎理耳理得則無俟乎經今意思只滯在此則何時得脱然㑹通也且所貴乎簡者非謂欲語言之少也乃在中與不中爾若句句親切雖多何害若不親切愈少愈不達矣某嘗説讀書須細看得意思通融後都不見注觧但見有正經幾箇字在方好大雅句心方子看注觧時不可遺了緊要字盖觧中有極散緩者有緩急之間者有極緊要者某下一字時直是稱輕等重方敢寫出上言句心即此意方子且尋句内意方子凡讀書須看上下文意是如何不可泥着一字如揚子於仁也柔於義也剛到易中又將剛來配仁柔來配義如論語學不厭智也教不倦仁也到中庸又謂成已仁也成物智也此等須是各随夲文意看便自不相礙淳問一般字却有淺深輕重如何看曰當看上下文節讀書須從文義上尋次則看注解今人却扵文義外尋索盖卿傳注惟古注不作文却好看只随經句分説不離經意最好䟽亦然今人解書且圖要作文又加辨説百般生疑故其文雖可讀而經意殊逺程子易傳亦成作文説了又説故今人觀者更不看本經只讀傳亦非所以使人思也大雅以下附論解經解經謂之解者只要解釋出來將聖賢之語解開了庶易讀泳聖經字若個主人解者猶若奴僕今人不識主人且因奴僕通名方識得主人畢竟不如經字也泳随文解義方子解經當如破的方子經書有不可解處只得闕若一向去解便有不通而謬處闕今之談經者徃徃有四者之病本卑也而抗之使高本淺也而鑿之使深本近也而推之使逺本明也而必使至於晦此今日談經之大患也盖卿後世之解經者有三一儒者之經一文人之經東坡陳少南軰是也一禅者之經張子韶軰是也解書須先還他成句次還他文義添無緊要字却不妨添重字不得今人所添者惟是重字端䝉聖賢説出來底言語自有語脉安頓得各有所在豈似後人任意説了也須玩索其旨所以學不可以不講講學固要大綱正然其間子細處亦不可以不講只緣當初解得不子細既不得聖賢之意後來任意執得一説便以為是只任意解將去㽦必大錄此下云古人似未嘗理㑹文義今觀其説出底言語不曾有一字用不當者解經若於舊説一向人情它改三字不若改兩字改兩字不若且改一字至於甚不得已乃始改這意思終為害升卿凡學者解書切不可與它看本看本則心死在本子上只教他恁地説則它心便活亦且不解失忘了夀昌學者輕於著書皆是氣識淺薄使作得如此所謂聖雖學作兮所貴者資便儇皎厲兮去道逺而盖此理醲厚非便儇皎厲不克負荷者所能當子張謂執徳不𢎞人多以寛大訓𢎞字大無意味如何接連得焉能為有焉能為亡文義相貫盖𢎞字有深沉重厚之意横渠謂義理深沉方有造非淺易輕浮所可得也此語最佳問集注解此謂守所得而心不廣則徳孤如何曰孤只是孤單所得只是這些道理别無所有故謂之徳孤謨論著書編次文字須作草簿抄記項頭如此則免得用心去記它兵法有云車載糗糧兵仗以養力也編次文字用簿抄記此亦養心之法廣論編次文字今人讀書未多義理未至融㑹處若便去看史書考古今治亂理㑹制度典章譬如作陂塘以溉田須是陂塘中水已滿然後決之則可以流注滋殖田中禾稼若是陂塘中水方有一勺之多遽決之以溉田則非徒無益於田而一勺之水亦復無有矣讀書既多義理已融㑹胸中尺度一一已分明而不看史書考治亂理㑹制度典章則是猶陂塘之水已滿而不決以漑田若是讀書未多義理未有融㑹處而汲汲焉以看史為先務是猶決陂塘一勺之水以漑田也其涸也可立而待也廣以下讀史先看語孟中庸更看一經却看史方易看先讀史記史記與左傳相包次看左傳次看通鑑有餘力則看全史只是看史不如今之看史有許多嶢崎看治亂如此成則如此與治同道罔不興與亂同事罔不亡知得次第節今人只為不曾讀書秪是讀得粗書凡讀書先讀語孟然後觀史則如明鑑在此而妍醜不可逃若未讀徹語孟中庸大學便去看史胸中無一箇權衡多為所惑又有一般人都不曾讀書便言我已悟得道理如此便是惻隠之心如此便是羞惡之心如此便是是非之心渾是一箇私意如近時祧廟可見杞問讀史之法曰先讀史記及左氏却看西漢東漢及三國志次看通鑑温公初作編年起於威烈王後又添至共和後又作稽古錄始自上古然共和以上之年已不能推矣獨邵康節却推至堯元年皇極經世書中可見編年難得好者前日周徳華所寄來者亦不好温公于本朝又作大事記若欲看本朝事當看長編若精力不及其次則當看國紀國紀只有長編十分之二耳時舉史亦不可不看看通鑑固好然須看正史一部却看通鑑一代帝紀更逐件大事立箇綱目其間節目䟽之于下乃可記得人傑饒宰問看通鑑曰通鑑難看不如看史記漢書史記漢書事多貫穿紀裏也有傳裏也有表裏也有志裏也有通鑑是逐年事逐年過了更無討頭處道夫錄云更無蹤跡饒廷老曰通鑑歴代具備看得大槩且未免求速耳曰求速却依舊不曾看得須用大段有記性者方可且如東晋以後有許多小國夷狄姓名頭項最多若是看正史後却看通鑑見它姓名却便知得它是某國人某舊讀通鑑亦是如此且草草看正史一上然後却來看它芝問讀通鑑與正史如何曰好且看正史盖正史每一事闗渉處多只如高祖鴻門一事本紀與張良灌嬰諸傳互載又却意思詳盡讀之使人心地歡洽便記得起通鑑則一處説便休直是如法有記性人方看得又問致堂管見初得之甚喜後見南軒集中云病敗不可言又以為專為檜設豈有言天下之理而專為一人者曰儘有好處但好惡不相掩爾曰只如頭一章論三晋事人多不以為然自今觀之只是怕温公爾曰誠是怕但如周王不分封也無箇出場道夫讀史當觀大倫理大機㑹大治亂得失節凡觀書史只有箇是與不是觀其是求其不是觀其不是求其是然後便見得義理夀昌史且如此看讀去待知首尾稍熟後却下手理㑹讀書皆然讀史有不可曉處劄出待去問人便且讀過有時讀别處撞著有文義與此相闗便自曉得義剛問觀史曰只是以自家義理斷之大槩自漢以來只是私意其間有偶合處爾只如此看它已得大槩范唐鑑亦是此法然稍踈更看得宻如它尤好然得似它亦得了端䝉讀史亦易見作史者意思後靣成敗處它都説得意思在前靣了如陳蕃殺宦者但讀前靣許多踈脱都可見了甘露事亦然賀孫問芝史書記得熟否蘇丞相頌看史都在手上輪得它那資性直是㑹記芝曰亦緣多忘曰正縁如此也須大約記得某年有甚麽事某年有甚麽事才記不起無緣㑹得浃洽芝云正緣是不浃洽曰合看兩件且看一件若兩件是四百字且二百字有何不可芝人讀史書節目處須要背得始得如讀漢書高祖辭沛公處義帝遣沛公入闗處韓信初説漢王處與史賛過秦論之類皆用背得方是若只是畧踔看過心下似有似無濟得甚事讀一件書須心心念念只在這書上令徹頭徹尾讀教精熟這説是如何那説是如何這説同處是如何不同處是如何安有不長進而今人只辦得十日讀書下着頭不與閑事管取便别莫説十日只讀得一日便有功驗人若辦得十來年讀書世間甚書讀不了今公們自正月至臘月三十日管取無一日專心致志在書上又云人做事須是專一且如張旭學草書見公孫大娘舞劍器而悟若不是它專心致志如何㑹悟楊志之患讀史無記性須三五遍方記得而後又忘了曰只是一遍讀時須用功作相别計止此更不再讀便記得有一士人讀周禮䟽讀第一板訖則焚了讀第二板則又焚了便作焚舟計若初且草讀一遍準擬三四遍讀便記不牢又曰讀書須是有精力至之曰亦須是聪明曰雖是聪明亦須是静方運得精神昔見延平説羅先生解春秋也淺不似胡文定後來随人入廣在羅浮山住三兩年去那裏心静須看得較透淳錄云那裡静必做得工夫有長進處只是歸來道死不及叩之某初疑解春秋干心静甚事後來方曉盖静則心虚道理方看得出義剛曰前軰也多是在背後處做㡬年方成曰也有不恁地底如明道自二十嵗及第一向出來做官自恁地便好了義剛朱子語類卷十一
