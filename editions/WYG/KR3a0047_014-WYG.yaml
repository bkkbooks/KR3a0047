body:
  text: 朱子語類卷十四大學一綱領學問須以大學為先次論語次孟子次中庸中庸工夫宻規模大徳明讀書且從易曉易解處去讀如大學中庸語孟四書道理粲然人只是不去看若理㑹得此四書何書不可讀何理不可究何事不可處盖卿某要人先讀大學以定其規模次讀論語以立其根夲次讀孟子以觀其發越次讀中庸以求古人之㣲妙處大學一篇有等級次第總作一處易曉宜先看論語却實但言語散見初看亦難孟子有感激興發人心處中庸亦難讀看三書後方宜讀之寓先看大學次語孟次中庸果然下工夫句句字字涵泳切已看得透徹一生受用不盡只怕人不下工夫雖多讀古人書無益書只是明得道理却要人做出書中所説聖賢工夫來若果看此數書他書可一見而決矣謙論孟中庸待大學貫通浹洽無可得看後方看乃佳道學不明元來不是上靣欠却工夫乃是下靣元無根脚若信得及脚踏實地如此做去良心自然不放踐履自然純熟非但讀書一事也人之為學先讀大學次讀論語大學是箇大坯模大學譬如買田契論語如田畝闊狹去處逐段子耕將去或曰亦在乎熟之而已曰然去偽人傑同問欲專看一書以何為先曰先讀大學可見古人為學首末次第且就實處理㑹却好不消得專去無形影處理㑹淳可將大學用數月工夫看去此書前後相因互相發明讀之可見不比他書他書非一時所言非一人所記惟此書首尾具備易以推尋也力行今且須熟究大學作間架却以他書填補去如此看得一兩書便是占得分數多後却易為力聖賢之言難精難者既精則後靣粗者却易曉大雅亞夫問大學大意曰大學是脩身治人底規模如人起屋相似須先打箇地盤地盤既成則可舉而行之矣時舉或問大學之書即是聖人做天下根夲曰此譬如人起屋是畫一箇大地盤在這裏理㑹得這箇了他日若有材料却依此起將去只此一箇道理明此以南靣堯之為君也明此以北靣舜之為臣也大學一書如行程相似自某處到某處幾里自某處到某處幾里識得行程須便行始得若只讀得空殻子亦無益也履孫大學如一部行程歴皆有節次今人看了須是行去今日行得到何處明日行得到何處方可漸到那田地若只把在手裏翻來覆去欲望之燕之越豈有是理自脩大學是一箇腔子而今却要去填教實著如他説格物自家是去格物後填教實著如他説誠意自家須是去誠意後亦填教實著節大學重處都在前靣後靣工夫漸漸輕了只是揩磨在士毅廣錄云後靣其失漸輕亦是下揩磨底工夫在看大學前靣初起許多且見安排在這裏如今食次册相似都且如此呈説後方是可喫處初間也要識許多模様賀孫大學一字不胡亂下亦是古人見得這道理熟信口所説便都是這裏淳大學搃説了又逐段更説許多道理聖賢怕有些子照管不到節節覺察將去到這裏有恁地病到那裏有恁地病節明徳如八窻玲瓏致知格物各從其所明處去今人不曾做得小學工夫一旦學大學是以無下手處今且當自持敬始使端確純一静專然後能致知格物椿而今無法嘗欲作一説教人只將大學一日去讀一遍看他如何是大人之學如何是小學如何是明明徳如何是新民如何是止於至善日日如是讀月去日來自見所謂温故而知新須是知新日日看得新方得却不是道理解新但自家這箇意思長長地新義剛才仲問大學曰人心有明處於其間得一二分即節節推上去又問小學大學如何曰小學涵養此性大學則所以實其理也忠信孝弟之類須於小學中出然正心誠意之類小學如何知得須其有識後以此實之大抵大學一節一節恢廓展布將去然必到扵此而後進既到而不進固不可未到而求進亦不可且如國既治又却絜矩則又欲其四方皆準之也此一卷書甚分明不是滚作一塊物事可學大學是為學綱目先通大學立定綱領其他經皆雜説在裏許通得大學了去看他經方見得此是格物致知事此是正心誠意事此是脩身事此是齊家治國平天下事問大學一書皆以脩身為夲正心誠意致知格物皆是脩身内事曰此四者成就那脩身脩身推出做許多事椿致知格物大學中所説不過為人君止於仁為人臣止於敬之類古人小學時都曾理㑹來不成小學全不曾知得然而雖是止於仁止於敬其間却有多少事如仁必有所以為仁者敬必有所以為敬者故又來大學致知格物上窮究教盡如入書院只到書院門裏亦是到來亦喚做格物致知得然却不曾到書院築底處終不是物格知至㽦人多教踐履皆是自立標置去教人自有一般資質好底人便不須窮理格物闕此聖人作今大學便要使人齊入於聖人之域榦大學所載只是箇題目如此要須自用工夫做將去賀孫大學教人先要理㑹得箇道理若不理㑹得見聖人許多言語都是硬將人制縛剰許多工夫若見得了見得許多道理都是天生自然鐡定底道理更移易分毫不得而今讀大學須是句句就自家身上看過少間自理㑹得不待解説如語孟六經亦須就自家身上看便如自家與人對説一般如何不長進聖賢便可得而至也賀縣今人都是為人而學某所以教諸公讀大學且看古人為學是如何是理㑹甚事諸公願為古人之學乎願為今人之學乎敬仲讀大學且逐段捱看這段時似得無後靣底看第二段却思量前段令文意聨屬却不妨幹看大學固是著逐句看去也須先統讀傳文教熟方好從頭仔細看若全不識傳文大意便看前頭亦難賀孫或問讀大學曰讀後去須更温前靣不可只恁地茫茫看須温故而知新須是温故方能知新若不温故便要求知新則新不可得而知亦不可得而求矣賀孫讀大學初間也只如此讀後來也只如此讀只是初間讀得似不與自家相闗後來看熟見許多説話須著如此做不如此做自不得賀孫謂任道弟讀大學云須逐段讀教透黙自記得使心口相應古時無多書人只是專心暗誦且以竹簡寫之尋常人如何辦得竹簡如此多所以人皆暗誦而後已伏生亦只是口授尚書二十餘篇黄霸就獄夏侯勝受尚書於嶽中又豈得夲子只被他讀得透徹後來著述諸公皆以名聞漢之經學所以有用賀孫或問大學曰大槩是如此只是更要熟讀熟時滋味自别且如喫果子生時將來喫也是喫這果子熟時將來喫也是喫這果子只是滋味别胡泳問賀孫讀大學如何曰稍通方要讀論語曰且未要讀論語大學稍通正好著心精讀前日讀時見得前未見得後靣見得後未接得前靣今識得大綱統體正好熟看如喫果實相似初只恁地硬咬嚼待嚼來嚼去得滋味如何便住却讀此書功深則用博昔和靖見伊川半年方得大學西銘看今人半年要讀多少書某且要人讀此是如何緣此書却不多而規模周備凡讀書初一項須著十分工夫了第二項只費得九分工夫第三項便只費六七分工夫少刻讀漸多自貫通他書自不著得多工夫賀孫諸生看大學未曉而輒欲看論語者責之曰公如喫飯一般未曾有顆粒到口如何又要喫這般喫那般這都是不曾好生去讀書某嘗謂人看文字曉不得只是未曾著心文字在眼前他心不曾著上靣只是恁地畧綽將過這心元不曾伏殺在這裏看他只自恁地豹跳不肯在這裏理㑹又自思量做别處去這事未了又要尋一事做這如何能理㑹得今之學者看文字且須壓這心在文字上逐字看了又逐句看逐句看了又逐段看未有曉不得者賀孫子淵説大學曰公看文字不似味道只就夲子上看看來看去久之浹洽自應有得公便要去上靣生意只討頭不見某所成章句或問之書已是傷多了當初只怕人曉不得故説許多今人看反曉不得此一書之間要緊只在格物兩字認得這裏看則許多説自是閒了初看須用這夲子認得要害處夲子自無可用某説十句在裏靣看得了只做一句説了方好某或問中已説多了却不説到這般處看這一書又自與看語孟不同語孟中只一項事是一箇道理如孟子説仁義處只就仁義上説道理孔子荅顔淵以克己復禮只就克己復禮上説道理若大學却只統説論其功用之極至扵平天下然夭下所以平却先須治國國之所以治却先須齊家家之所以齊却先須脩身身之所以脩却先須正心心之所以正却先須誠意意之所以誠却先須致知知之所以至却先須格物夲領全只在這兩字上又須知如何是格物許多道理自家從來合有不合有定是合有定是人人都有人之心便具許多道理見之於身便見身上有許多道理行之扵家便是一家之中有許多道理施之扵國便是一國之中有許多道理施之於天下便是天下有許多道理格物兩字只是指箇路頭須是自去格那物始得只就紙上説千千萬萬不濟事賀孫荅林子淵説大學曰聖人之書做一様看不得有只説一箇下工夫規模有首尾只説道理如中庸之書劈初頭便説天命之謂性若是這般書全著得思量義理如大學只説箇做工夫之節目自不消得大段思量纔看過便自曉得只是做工夫全在自家身已上却不在文字上文字已不著得思量説窮理只就自家身上求之都無别物事只有箇仁義禮智看如何千變萬化也離這四箇不得公且自看日用之間如何離得這四箇如信者只是有此四者故謂之信信實也實是有此論其體則實是有仁義禮智論其用則實是有惻隠羞惡恭敬是非更假偽不得試看天下豈有假做得仁假做得義假做得禮假做得智所以説信者以言其實有而非偽也更自一身推之扵家實是有父子有夫婦有兄弟推之天地之間實是有君臣有朋友都不是待後人旋安排是合下元有此又如一身之中裏靣有五臟六腑外靣有耳目口鼻四肢這是人人都如此存之為仁義禮智發出來為惻隠羞惡恭敬是非人人都有此以至父子兄弟夫婦朋友君臣亦莫不皆然至於物亦莫不然但其拘於形拘於氣而不變然亦就他一角子有發見處㸔他也自有父子之親有牝牡便是有夫婦有大小便是有兄弟就他同類中各有羣衆便是有朋友亦有主腦便是有君臣只緣夲來都是天地所生共這根􅎞所以大率多同聖賢出來撫臨萬物各因其性而導之如昆蟲草木未嘗不順其性如取之以時用之有節當春生時不殀夭不覆巢不殺胎草木零落然後入山林獺祭魚然後虞人入澤梁豺祭獸然後田獵所以能使萬物各得其所者惟是先知得天地夲來生生之意賀孫問大學曰看聖賢説話所謂坦然若大路然緣後來人説得﨑嶇所以聖賢意思難見賀孫聖賢形之扵言所以發其意後人多因言而失其意又因註解而失其主凡觀書且先求其意有不可曉然後以註通之如看大學先看前後經亦自分明然後㸔傳可學大學諸𫝊有解經處有只引經傳賛揚處其意只是提起一事使人讀著常惺惺地道夫伊川舊日教人先㸔大學那時未有解説想也看得鶻突而今㸔註解覺大段分曉了只在子細去㸔賀孫㸔大學且遂章理㑹須先讀夲文念得次將章句來解夲文又將或問來参章句須逐一令記得反覆尋究待他浹洽既逐段曉得將來統㸔温尋過這方始是須是靠他這心若一向靠寫底如何得又曰只要熟不要貪多道夫聖人不令人懸空窮理須要格物者是要人就那上見得道理破便實只如大學一書有正經有解有或問㸔來㸔去不用或問只㸔註解便了久之又只看正經便了又久之自有一部大學在我胸中而正經亦不用矣然不用某許多工夫亦看某底不出不用聖賢許多工夫亦㸔聖賢底不出大雅或問大學解已定否曰據某而今自謂穏矣只恐數年後又見不穏這箇不由自家問中庸解曰此書難看大學夲文未詳者某於或問則詳之此書在章句其或問中皆是辨諸家説理未必是有疑處皆以盖言之淳大學章句次第得皆明白易曉不必或問但致知格物與誠意較難理㑹不得不明辨之耳人傑子淵問大學或問曰且從頭逐句理㑹到不通處却看章句或問乃注脚之注脚亦不必深理㑹賀孫學者且去熟讀大學正文了又子細看章句或問未要看俟有疑處方可去看又曰某解書不合太多又先准備學者為他設疑説了他未曾疑到這上先與説了所以致得學者看得容易了聖人云不憤不啟不悱不發舉一隅不以三隅反則不復也須是教他疑三朝五日了方始與説他便通透更與從前所疑慮也㑹因此觸發工夫都在許多思慮不透處而今却是㸔見成解底都無疑了吾儒與老莊學皆無傳惟有釋氏常有人盖他一切辦得不説都待别人自去敲榼自有箇通透處只是吾儒又無這不説底若如此少間差異了又曰解文字下字最難某解書所以未定常常更改者只為無那恰好底字子把來看又見不穏當又著改㡬字所以横渠説命辭為難賀孫某作或問恐人有疑所以設此要他通曉而今學者未有疑却反被這箇生出疑賀孫或問朱敬之有異聞乎曰平常只是在外靣聽朋友問荅或時裏靣亦只説某病痛處得一日教看大學曰我平生精力盡在此書先須通此方可讀書賀孫某扵大學用工甚多温公作通鑑言臣平生精力盡在此書某於大學亦然論孟中庸却不費力友仁大學一日只看二三段時便有許多脩處若一向看去便少不是少只是看得草草某解註書不引後靣説來證前説却引前説去證後説盖學者方看此有未曉處又引他處只見難曉大學都是如此僴説大學啟䝉畢因言某一生只看得這兩件文字透見得前賢所未到處若使天假之年庶㡬將許多書逐件㸔得恁地煞有工夫賀孫序亞夫問大學序云既與之以仁義禮智之性又有氣質之禀所謂氣質便是剛柔强弱明快遲鈍等否曰然又云氣是那初禀底質是成這模様了底如金之鑛木之萌芽相似又云只是一箇隂陽五行之氣滚在天地中精英者為人渣滓者為物精英之中又精英者為聖為賢精英之中渣滓者為愚為不肖恪問一有聰明睿智能盡其性者則天必命之以為億兆之君師何處見得天命處曰此也如何知得只是才生得一箇恁地底人定是為億兆之君師便是天命之也他既有許多氣魄才徳決不但己必統御億兆之衆人亦自是歸他如三代已前聖人都是如此及至孔子方不然然雖不為帝王也閒他不得也做出許多事來以教天下後世是亦天命也僴問天必命之以為億兆之君師天如何命之曰只人心歸之便是命問孔子如何不得命曰中庸云大徳必得其位孔子却不得氣數之差至此極故不能反可學問繼天立極曰天只生得許多人物與你許多道理然天却自做不得所以立得聖人為之脩道立教以教化百姓所謂裁成天地之道輔相天地之宜是也盖天做不得底却須聖人為他做也僴問各俛焉以盡其力下此俛字何謂曰俛字者乃是刺著頭只管做將去底意思友仁問外有以極其規模之大内有以盡其節目之詳曰這箇須先識得外靣一箇規模如此大了而内做工夫以實之所謂規模之大凡人為學便當以明明徳新民止扵至善及明明徳於天下為事不成只要獨善其身便了須是志於天下所謂志伊尹之所志學顏子之所學也所以大學第二句便説在新民僴明徳新民便是節目止於至善便是規模之大道夫仁甫問釋氏之學何以説為髙過於大學而無用曰吾儒更著讀書逐一就事物上理㑹道理他便都掃了這箇他便恁地空空寂寂恁地便道事都了只是無用徳行道藝藝是一箇至末事然亦皆有用釋氏若將些子事付之便都沒柰何又曰古人志道據徳而游於藝禮樂射御書數數尤為最末事若而今行經界則筭法亦甚有用若時文整篇整卷要作何用即徒然壊了許多士子精神賀孫經上大學首三句説一箇體統用力處却在致知格物端䝉天之賦於人物者謂之命人與物受之者謂之性主於一身者謂之心有得於天而光明正大者謂之明徳敬仲以下明明徳或問明徳便是仁義禮智之性否曰便是或問所謂仁義禮智是性明徳是主於心而言曰這箇道理在心裡光明照徹無一毫不明明徳是指全體之妙下靣許多節目皆是靠明徳做去明明徳明只是提撕也士毅學者須是為己聖人教人只在大學第一句明明徳上以此立心則如今端己斂容亦為己也讀書窮理亦為己也做得一件事是實亦為己也聖人教人持敬只是須著從這裏説起其實若知為己後即自然著敬方子明明徳乃是為己工夫那箇事不是分内事明徳在人非是從外靣請入來底盖卿為學只在明明徳一句君子存之存此而已小人去之去此而己一念竦然自覺其非便是明之之端儒用大學在明明徳一句當常常提撕能如此便有進歩處盖其原自此發見人只一心為夲存得此心於事物方知有脉絡貫通處季札在明明徳須是自家見得這物事光明燦爛常在目前始得如今都不曾見得須是勇猛著起精神㧞出心肝與它看始得正如人跌落大水浩無津涯須是勇猛奮起這身要得出來始得而今都只汎汎聽他流將去或以明明徳譬之磨鏡曰鏡猶磨而後明若人之明徳則未嘗不明雖其昏蔽之極而其善端之發終不可絶但當於其所發之端而接續光明之令其不昧則其全體大用可以盡明且如人知己徳之不明而欲明之只這知其不明而欲明之者便是明徳就這裡便明將去僴明明徳如人自云天之所與我未嘗昏只知道不昏便不昏矣僴明明徳是明此明徳只見一㸃明便於此明去正如人醉醒初間少醒至於大醒亦只是一醒學者貴復其初至於已到地位則不著箇復字可學問明明徳曰人皆有箇明處但為物欲所蓛剔撥去了只就明處漸明將去然須致知格物方有進步處識得夲來是甚麽物季札明徳未嘗息時時發見於日用之間如見非義而羞惡見孺子入井而惻隠見尊賢而恭敬見善事而歎慕皆明徳之發見也如此推之極多但當因其所發而推廣之僴明徳謂得之於已至明而不昧者也如父子則有親君臣則有義夫婦則有别長幼則有序朋友則有信初未嘗差也苟或差焉則其所得者昏而非固有之明矣履孫人夲來皆具此明徳徳内便有此仁義禮智四者只被外物汩沒了不明便都壊了所以大學之道必先明此明徳若能學則能知覺此明徳常自存得便去刮剔不為物欲所蔽推而事父孝事君忠推而齊家治國平天下皆只此理大學一書若理㑹得這一句便可迎刃而觧椿明徳也且就切近易見處理㑹也且慢慢自見得如何一日便都要識得如出必是告反必是靣昬定晨省必是昬定晨省這易見徐行後長者謂之弟疾行先長者謂之不弟這也易見有甚不分明如九族既睦是堯一家之明徳百姓昭明是堯一國之明徳黎民於變時雍是堯天下之明徳如博奕好飲酒不顧父母之養是不孝到能昬定晨省冬温夏凊可以為孝然而從父之令今看孔子説却是不孝須是知父之命當從也有不可從處盖與其得罪於鄉黨州閭寧熟諌諭父母於道方是孝賀孫曾興宗問如何是明明徳曰明徳是自家心中具許多道理在這裏夲是箇明底物事初無暗昧人得之則為徳如惻隠羞惡辭讓是非是從自家心裏出來觸著那物便是那个物出來何嘗不明緣為物欲所蔽故其明易昏如鏡夲明被外物㸃汙則不明了少間磨起則其明又能照物又云人心惟定則明所謂定者非是定於這裡全不脩習待他自明惟是定後却好去學看來看去久後自然徹又有人問自覺胸中甚昧曰這明徳亦不甚昧如適來説惻隠羞惡辭讓是非等此是心中元有此等物發而為惻隠這便是仁發而為羞惡這便是義發而為辭讓是非便是禮智看來這箇亦不是甚昧但恐於義理差互處有似是而非者未能分别耳且如冬温夏凊為孝人能冬温夏凊這便是孝至如子從父之令夲似孝孔子却以為不孝與其得罪於鄉閭不若且諫父之過使不陷於不義這處方是孝恐似此處未能大故分别得出方昧且如齊宣王見牛之觳觫便有不忍之心欲以羊易之這便見惻隠處只是見不完全及到興甲兵危士臣處便欲快意為之是見不精確不能推愛牛之心而愛百姓只是心中所見所好如此且恁地做去又如胡侍郎讀史管見其為文字與所見處甚好到他自做處全相反不知是如何却似是兩人做事一般前日所見是一人今日所行又是一人是見不真確致得如此卓或問明明徳是於静中夲心發見學者因其發見處從而窮究之否曰不特是靜雖動中亦發見孟子將孺子將入井處來明這道理盖赤子入井人所共見能於此發端處推明便是明盖人心至靈有什麽事不知有什麽事不曉有什麽道理不具在這裡何緣有不明為是氣禀之偏又為物欲所亂如目之於色耳之於聲口之於味鼻之於臭四肢之於安佚所以不明然而其徳夲是至明物事終是遮不得必有時發見便教至惡之人亦時乎有善念之發學者便當因其明處下工夫一向明將去致知格物皆是事也且如今人做得一件事不是有時都不知便是昏處然有時知得不是這箇便是明處孟子發明赤子入井盖赤子入井出於倉猝人都主張不得見之者莫不有怵惕惻隠之心又曰人心莫不有知所以不知者但氣禀有偏故知之有不能盡所謂致知者只是教他展開使盡又曰看大學先將經文看教貫通如看或問須全段相参酌看教他貫通如看了隻手將起便有五指頭始得今看或問只逐些子看都不貫通如何得子蒙或問明明徳云云曰不消如此説他那注得自分曉了只要你實去體察行之於身須是真箇明得這明徳是怎生地明是如何了得它虚靈不昧須是真箇不昧具得衆理應得萬事只恁地説不濟得事又曰如格物致知誠意正心脩身五者皆明明徳事格物致知便是要知得分明誠意正心脩身便是要行得分明若是格物致知有所未盡便是知得這明徳未分明意未盡誠便是這徳有所未明心有不正則徳有所未明身有不脩則徳有所未明須是意不可有頃刻之不誠心不可有頃刻之不正身不可有頃刻之不脩這明徳方常明問所謂明徳工夫也只在讀書上曰固是在讀書上然亦不專是讀書事上也要理㑹書之所載者固要逐件理㑹也有書所不載而事上合當理㑹者也有古所未有底事而今之所有當理㑹者極多端僴燾錄别出問或謂虚靈不昧是精靈底物事具衆理是精靈中有許多條理應萬事是那條理發見出來底曰不消如此解説但要識得這明徳是甚物事便切身做工夫去其氣禀物欲之蔽能存得自家箇虚靈不昧之心足以具衆理可以應萬事便是明得自家明徳了若只是解説虚靈不昧是如何具衆理是如何應萬事又是如何却濟得甚事又問明之之功莫須讀書為要否曰固是要讀書然書上有底便可就書理㑹若書上無底便著就事上理㑹若古時無底便著就而今理㑹盖所謂明徳者只是一箇光明底物事如人與我一把火將此火照物則無不燭自家若滅息著便是暗了明徳能吹得著時又是明其明徳所謂明之者致知格物誠意正心脩身皆明之之事五者不可闕一若闕一則徳有所不明盖致知格物是要知得分明誠意正心脩身是要行得分明然既明其明徳又要功夫無間斷使無時而不明方得若知有一之不盡物有一之未窮意有頃刻之不誠心有頃刻之不正身有頃刻之不脩則明徳又暗了惟知無不盡物無不格意無不誠心無不正身無不脩即是盡明明徳之功夫也燾問大學注言其體虚靈而不昧其用鑒照而不遺此二句是説心説徳曰心徳皆在其中更子細看又問徳是心中之理否曰便是心中許多道理光明鑒照毫髪不差㝢按注是舊夲明徳者人之所得乎天而虚靈不昧以具衆理而應萬事者也禪家則但以虚靈不昧者為性而無以具衆理以下之事僴問學者當因其所發而遂明之是如何曰人固有理㑹得處如孝於親友於弟如水之必寒火之必熱不可謂他不知但須去致極其知因那理㑹得底推之於理㑹不得底自淺以至深自近以至逺又曰因其已知之理而益窮之以求至乎其極廣問大學之道在明明徳此明徳莫是天生徳於予之徳曰莫如此問只理㑹明徳是我身上甚麽物事某若理㑹不得便應公是天生徳於予之徳公便兩下都理㑹不得且只就身上理㑹莫又引一句來問如此只是紙上去討又曰此明徳是天之予我者莫令汙穢當常常有以明之驤問明明徳意思以平旦驗之亦見得於天者未嘗不明曰不要如此看且就明徳上説如何又引别意思證讀書冣不要如此賀孫遂就明徳上推説曰須是更仔細將心體驗不然皆是閒説賀孫傅敬子説明明徳曰大綱也是如此只是説得恁地孤單也不得且去子細看聖人説這三句也且大槩恁地説到下靣方説平天下至格物八者便是明徳新民底工夫就此八者理㑹得透徹明徳新民都在這裏而今且去子細看都未要把自家言語意思去攙他底公説胸中有箇分曉底少間捉摸不著私意便從這裏生便去穿鑿而今且去熟看那解看得細字分曉了便曉得大字便與道理相近道理在那無字處自然見得而今且説格物這箇事理當初甚處得來如今如何安頓它逐一只是虚心去看萬物之理看日用常行之理看聖賢所言之理夔孫明徳謂夲有此明徳也孩提之童無不知愛其親及其長也無不知敬其兄其良知良能夲自有之只為私欲所蔽故暗而不明所謂明明徳者求所以明之也譬如鏡焉夲是箇明底物緣為塵昬故不能照須是磨去塵垢然後鏡復明也在新民明徳而後能新民徳明以下明徳新民或問明徳新民還須自家徳十分明後方可去新民曰不是自家徳未明便都不管著别人又不是硬要去新他若大段新民須是徳十分明方能如此若小小效驗自是自家這裏如此他人便自觀感一家仁一國興仁一家讓一國興讓自是如此子蒙問明徳新民在我有以新之至民之明其明徳却又在它曰雖説是明已徳新民徳然其意自可参見明明徳於天下自新以新其民可知寓蜚卿問新民莫是脩道之謂教有以新之否曰道之以徳是明明徳齊之以禮是以禮新民也是脩道之謂教有禮樂法度政刑使之去舊汙也驤至善只是十分是處賀孫以下止至善至善猶今人言極好方子凡曰善者固是好然方是好事未是極好處必到極處便是道理十分盡頭無一毫不盡故曰至善僴至善是極好處且如孝冬温夏凊昬定晨省雖然是孝底事然須是能聴於無聲視於無形方始是盡得所謂孝履孫至善是箇最好處若十件事做得九件是一件不盡亦不是至善震説一箇止字又説一箇至字直是要到那極至處而後止故曰君子無所不用其極也徳明善須是至善始得如通書純粹至善亦是泳問必至於是而不遷如何曰未至其地則求其至既至其地則不當遷動而之它也徳明問止於至善向承教以為君止於仁臣止於敬各止其所而行其所止之道知此而能定今日先生語竇文卿又云坐如尸坐時止也立如齊立時止也豈以自君臣父子推之於萬事無不各有其止曰固然定公問君使臣臣事君子曰君使臣以禮臣事君以忠君與臣是所止之處禮與忠是其所止之善又如視思明聽思聰色思温貌思恭之屬無不皆然徳明問至善先生云事理當然之極也恐與伊川説艮其止止其所也之義一同謂有物必有則如父止於慈子止於孝君止於仁臣止於敬萬物庶事莫不各得其所得其所則安失其所則悖所謂止其所者即止於至善之地也曰只是要如此卓或問何謂明徳曰我之所得以生者有許多道理在裏其元明處乃所謂明徳也明明徳者是直指全體之妙下靣許多節目皆是靠明徳做去又問既曰明徳又曰至善何也曰明得一分便有一分明得十分使有十分明得二十分乃是極至處也又曰明徳是下手做至善是行到極處又曰至善雖不外乎明徳然明徳亦有畧畧明者須是止於那極至處銖以下明徳止至善大學只前靣三句是綱領如孩提之童無不知愛其親及其長也無不知敬其兄此良心也良心便是明徳止是事事各有箇止處如坐如尸立如齊坐立上須得如此方止得又如視思明以下皆止於至善之意大學須自格物入格物從敬入冣好只敬便能格物敬是箇瑩徹底物事今人却塊坐了相似昏倦要須提撕有提撕便敬昬倦便是肆肆便不敬徳明問明徳至善莫是一箇否曰至善是明徳中有此極至處如君止於仁臣止於敬父止於慈子止於孝與國人交止於信此所謂在止於至善只是又當知如何而為止於仁如何而止於敬如何而止於慈孝與國人交之信這裏便用究竟一箇下工夫處景紹曰止莫是止於此而不過否曰固是過與不及皆不濟事但仁敬慈孝誰能到得這裏聞有不及者矣未聞有過於此者也如舜之命契不過是欲使父子有親君臣有義夫婦有别長幼有序朋友有信只是此五者至於後來聖賢千言萬語只是欲明此而已這箇道理夲是天之所以與我者不為聖賢而有餘不為愚不肖而不足但其間節目須當講學以明之此所以讀聖賢之書須當知他下工夫處今人只据他説一兩字便認以為聖賢之所以為聖賢者止此而已都不窮究著實殊不濟事且如論語相似讀學而時習之須求其所謂學者如何如何謂之時習既時習如何便能説有朋自逺方來朋友因甚而來自逺方我又何自而樂須著一一與他考究似此用工初間雖覺得生受費力久後讀書甚易為工却亦濟事道夫明明徳是知止於至善是守夫子曰知及之仁能守之聖賢未嘗不為兩頭底説話如中庸所謂擇善固執擇善便是理㑹知之事固執便是理㑹守之事至書論堯之徳便説欽明舜便説濬哲文明温恭允塞欽是欽敬以自守明是其徳之聪明濬哲文明便有知底道理温恭允塞便有守底道理此條所錄恐有誤道夫問新民如何止於至善曰事事皆有至善處又曰善字輕至字重節以下新民止至善問新民止於至善只是要民脩身行已應事接物無不曲當曰雖不可使知之亦當使由之不出規矩準繩之外節止於至善是包在明明徳在新民已也要止於至善人也要止於至善盖天下只是一箇道理在他雖不能在我之所以望他者則不可不如是也道夫以下明徳新民至善明徳新民二者皆要至於極處明徳不是只畧畧地明得便了新民不是只畧畧地新得便休須是要至於極至處賀孫問至善不是明徳外别有所謂善只就明徳中到極處便是否曰是明徳中也有至善新民中也有至善皆要到那極處至善随處皆有脩身中也有至善必要到那盡處齊家中也有至善亦要到那盡處至善只是以其極言不特是理㑹到極處亦要做到極處如為人君止於仁固是一箇仁然仁亦多般須是随處㸔如這事合當如此是仁那一事又合當如彼亦是仁若不理㑹只管執一便成一邊去如為人臣止於敬敬亦有多少般不可只道擎跽曲拳便是敬如盡忠不欺陳善閉邪納君無過之地皆是敬皆當理㑹若只執一亦成一邊去安得謂之至善至善只是些子恰好處韓文公謂軻之死不得其傳自秦漢以來豈無人亦只是無那至善見不到十分極好處做亦不做到十分極處淳寓同明徳是我得之於天而方寸中光明底物事統而言之仁義禮智以其發見而言之如惻隠羞惡之類以其見於實用言之如事親從兄是也如此等徳夲不待自家明之但從來為氣禀所拘物欲所蔽一向昏昧更不光明而今却在挑剔揩磨出來以復向來得之於天者此便是明明徳我既是明得箇明徳見他人為氣禀物欲所昏自家豈不惻然欲有以新之使之亦如我挑剔揩磨以革其向來氣禀物欲之昏而復其得之於天者此便是新民然明徳新民初非是人力私意所為夲自有一個當然之則過之不可不及亦不可且以孝言之孝是明徳然亦自有當然之則不及則固不是若是過其則必有刲股之事須是要到當然之則田地而不遷此方是止於至善泳明徳新民皆當止於至善不及於止則是未當止而止當止而不止則是過其所止能止而不久則是失其所止僴明徳新民皆當止於極好處止之為言未到此便住不可謂止到得此而不能守亦不可言止止者止於是而不遷之意或問明明徳是自己事可以做得到極好處若新民則在人如何得他到極好處曰且教自家先明得盡然後漸民以仁摩民以義如孟子所謂勞之来之匡之直之輔之翼之又從而振徳之如此變化他自然解到極好處銖或問明徳可以止於至善新民如何得他止於至善曰若是新民而未止於至善亦是自家有所未到若使聖人在上便自有箇處置又問夫子非不明徳其歴諸國豈不欲春秋之民皆止於至善到他不從聖人也無可柰何曰若使聖人得位則必須綏來動和又云此是説理理必須是如此且如致中和天地位萬物育然堯有九年之水想有多少不育之物大徳必得名位福夀也豈個個如此只是理必如此胡泳明明徳便要如湯之日新新民便要如文王之周雖舊邦其命維新各求止於至善之地而後止也徳明欲新民而不止於至善是不以堯之所以治民者治民也明明徳是欲去長安止於至善是已到長安也拱夀劉源問知止而後有定曰此一節只是説大槩效驗如此在明明徳在新民在止於至善却是做工夫處雉以下知止有定在止於至善至者天理人心之極致盖其夲於天理驗於人心即事即物而無所不在吾能各知其止則事事物物莫不各有定理而分位界限為不差矣端䝉須是灼然知得物理當止之處心自㑹定砥問知止而後有定須是物格知至以後方能如此若未能物格知至只得且随所知分量而守之否曰物格知至也無頓斷都知到盡處了方能知止有定只這一事上知得盡則此一事便知得當止處無緣便要盡底都曉得了方知止有定不成知未到盡頭只恁地鶻突獃在這裏不知箇做工夫處這箇各随人淺深固是要知到盡處方好只是未能如此且随你知得者只管定去如人行路今日行得這一條路則此一條路便知得熟了便有定了其它路皆要如此知得分明所以聖人之教只要人只管理㑹將去又曰這道理無它只怕人等待事到面前便理㑹得去做無有不得者只怕等待所以説需者事之下也又曰需者事之賊也若是等待終誤事去又曰事事要理㑹便是人説一句話也要思量他怎生如此説做一篇沒緊要文字也須思量他怎生如此做僴知止而後有定須是事事物物都理㑹得盡而後有定若只理㑹得一事一物明日别有一件便理㑹不得這箇道理須是理㑹得五六分以上方見得這邊重那邊輕後面便也易了而今未理㑹到半截以上所以費力須是逐一理㑹少間多了漸㑹貫通兩箇合做一箇少間又七八箇合做一箇便都一齊通透了伊川説貫通字是妙若不是他自曾如此如何説出這字賀孫知止而後有定必謂有定不謂能定故知是物有定説振未知止固用做但費把捉已知止則為力也易僴定亦自有淺深如學者思慮凝定亦是定如道理都見得徹各止其所亦是定只此地位已高端䝉問定而後能静曰定是見得事事物物上千頭百緒皆有定理靜只就自家一箇心上説賀孫以下定靜定以理言故曰有靜以心言故曰能羲剛定是理靜在心既定於理心便㑹靜若不定於理則此心只是東去西走泳問章句云外物不能揺故靜舊説又有異端不能惑之語竊謂將二句参㸔尤見得靜意曰此皆外來意凡立説須寛方流轉不得局定徳明問大學之靜與伊川静中有動之靜同否曰未須如此説如此等處未到那裡不要理㑹少頃都打亂了和理㑹得處也理㑹不得去士毅問靜而後能安曰安只是無臲卼之意才不紛擾便安問如此則靜與安無分别曰二字自有淺深徳明以下靜安問安謂所處而安莫是把捉得定時處事自不為事物所移否曰這箇夲是一意但靜是就心上説安是就身上説而今人心才不靜時雖有意去安頓那物事自是不安若是心靜方解去區處方解穏當義剛既靜則外物自然無以動其心既安則所處而皆當㸔打做那裏去都移易他不得道夫問靜而後能安是在貧賤在患難皆安否曰此心若不靜這裏坐也坐不得那裏坐也坐不得㝢能安者以地位言之也在此則此安在彼則彼安在富貴亦安在貧賤亦安節問知止章中所謂定靜安終未深瑩曰知止只是識得一箇去處既已識得即心中便定更不他求如求之彼又求之此即是未定定而後能靜靜而後能安亦相去不逺但有深淺耳與中庸動變化相類皆不甚相逺問先生於此段詞義望加詳數語使學者易曉曰此處亦未是緊切處其他亦無可説徳明定靜安定靜安頗相似定謂所止各有定理靜謂遇物來能不動安謂随所寓而安盖深於靜也去偽定靜安三字大畧相類然定是心中知為人君止於仁為人臣止於敬心下有箇定理便别無膠擾自然是靜如此則随所處而安㽦知止而後有定如行路一般若知得是從那一路去則心中自是定更無疑惑既無疑惑則心便靜心既靜便貼貼地便是安既安則自然此心專一事至物來思慮自無不通透若心未能靜安則總是胡思亂想如何是能慮賀孫知止定静安慮定對動而言初知所止是動底方定方不走作如水之初定靜則定得來久物不能撓處山林亦靜處廛市亦靜安則靜者廣無所適而不安靜固安動亦安㸔處甚事皆安然不撓安然後能慮今人心中揺漾不定又還能處得事否慮者思之精審也人之處事於叢宂急遽之際而不錯亂者非安不能聖人言雖不多推出來便有許多説話在人細㸔之耳僴問安而後能慮曰先是自家心安了有些事來方始思量區處得當今人先是自家這裡鶻突了到事來都區處不下既欲為此又欲若彼既欲為東又欲向西便是不能慮然這也從知止説下來若知其所止自然如此這却不消得工夫若知所止如火之必熱如水之必深如食之必飽飲之必醉若知所止便見事事決定是如此決定著做到如此地位欠闕些子便自住不得如説事父母能竭其力事君能致其身人多㑹説得只是不曾見得決定著竭其力處決定著致其身處若決定見得著如此㸔如何也須要到竭其力處須要到致其身處且如事君若不見得決定著致其身則在内親近必不能推忠竭誠有犯無隠在外任使必不能展布四體有殞無二無求生以害仁有殺身以成仁這若不是見得到如何㑹恁地賀孫知止安慮李徳之問安而後能慮既首言知止矣如何於此復説能慮曰既知此理更須是審思而行且如知孝於事親須思所以為事親之道又問知至而後意誠如何知既盡後意便能實先生指燈䑓而言如以燈照物照見處所見便實照不見處便有私意非真實又問持敬居敬如何曰且如此做將去不須先安排下様子後却旋求來合盖卿子升問知止與能慮先生昨以比易中深與幾或問中却兼下極深研幾字覺未穏曰當時下得也未仔細要之只著得研幾字木之李約之問安而後能慮曰若知至了及臨時不能慮則安頓得不恰好且如知得事親當孝也知得恁地是孝及至事親時不思慮則孝或不行而非孝者反露矣學䝉安慮問安而後能慮曰若不知此則自家先已紛擾安能慮徳明能安者随所處而安無所擇地而安能慮是見於應事處能慮節慮是思之重復詳審者方子慮是研幾閎祖問到能得處學之工夫盡否曰在已之功亦備矣又要明明徳於天下不止是要了自家一身淳得止因説知止至能得上云止於至善矣此又提起來説言能知止則有所定有所定則知其理之確然如是一定則不可移易任是千動萬動也動揺他不得既定則能靜靜則能安安則能慮慮則能得其所止之實矣卓知止至能得知止至能得盖才知所止則志有定向才定則自能靜靜則自能安安則自能慮慮則自能得要緊在能字盖滔滔而去自然如此者慮謂㑹思量事凡思天下之事莫不各得其當是也履孫知止只是先知得事理如此便有定能靜能安及到事來乃能慮能字自有道理是事至物來之際思之審處之當斯得之矣䕫孫問據知止已是思慮了何故靜安下復有个慮字既靜安了復何所慮曰知止只是先知得事理如此便有定能靜能安及到事至物來乃能慮能字自有意思謂知之審而后能慮慮之審而后能得賜或問定靜安慮四節曰物格知至則天下事事物物皆知有箇定理定者如寒之必衣飢之必食更不用商量所見旣定則心不動揺走作所以能靜既靜則随所處而安看安頓在甚處如處富貴貧賤患難無徃而不安靜者主心而言安者主身與事而言若人所見未定則心何緣得靜心若不靜則既要如彼又要如此身何緣得安能慮則是前靣所知之事到得㑹行得去如平時知得為子當孝為臣當忠到事親事君時則能思慮其曲折精微而得所止矣胡泳琮曰上靣已自知止今慮而得者依舊是知底意思云云先生曰只上靣是方知下靣是實得耳問如此何用更過定靜安三箇節目曰不如此不實得曰如此上靣知止處其實未有知也通此五句才做得致知在格物一句曰今人之學却是敏底不如鈍底鈍底循循而進終有得處敏底只是從頭呼揚將去只務自家一時痛快終不見實理琮問定即心有所向不至走作便靜靜便可以慮何必待安曰安主事而言不安便不能思譬如靜坐有件事來撓思便不得專一定靜安都相似未到安處思量未得知止是知箇慈知箇孝到得時方是得箇慈得箇孝底道理慮是慮箇如何是慈如何是孝又問至於安時無勉强意思否曰在貧賤也安在富貴也安在這裏也安在那裏也安今人有在這裏不安了在那裏也不㑹安心下無理㑹如何㑹去思慮問章句中慮謂思無不審莫是思之熟否曰慮是思之周宻處芝王子周問知止至能得曰這數句只是要曉得知止不知止則不能得所止之地如定靜安數字恰如今年二十一嵗來年二十二嵗自是節次如此來自不可遏如在明明徳在新民在止於至善這三句却緊要只是在止於至善而不説知止則無下工夫處震游子蒙問知止得止莫稍有差别否曰然知止如射者之於的得止是已中其的問定靜安矣如之何而復有慮曰慮是事物之來畧審一審劉淮叔通問慮與格物致知不相干曰致知便是要知父止於慈子止於孝之類慮便是審其如何而為孝如何而為慈至言仁則當如堯言孝則當如舜言敬則當如文王這方是得止子䝉言開欲以明徳之明為如人之失其所有而一旦復得以喻之至慮字則説不得曰知止而有定便如人撞著所失而不用終日營營以求之定而靜便如人既不用求其所失自爾寜静静而安便如人既知某物在甚處某物在甚處心下恬然無復不安安而慮便如自家金物都自在這裡及人來問自家討甚金物自家也須將上手審一審然後與之慮而得則秤停輕重皆相當矣或又問何故知止而定靜安了又復言慮曰且如可以予可以無予可以取可以無取可以死可以無死這上靣有幾許商量在道夫問知止而後有定曰須是灼然知得物理當止之處心自㑹定又問上既言知止了何更待慮而後能得曰知止是知事事物物各有其理到慮而後能得處便是得所以處事之理知止如人之射必欲中的終不成要射做東去又要射做西去慮而後能得便是射而中的矣且如人早間知得這事理如此到晚間心裏定了便㑹處置得這事若是不先知得這道理到臨事時便脚忙手亂豈能慮而有得問未格物以前如何致力曰古人這處已自有小學了砥㝢同子升問知止能慮之别曰知止是知事物所當止之理到得臨事又須研㡬審處方能得所止如易所謂惟深也故能通天下之志此似知止惟幾也故能成天下之務此便是能慮聖人言語自有不約而同處木之説如此則知止是先講明工夫能慮是臨事審處之功曰固是再問知止而后有定注謂知之則志有定向或問謂能知所止則方寸之間事事物物皆有定理矣語似不同何也曰也只一般木之知止只是知有這箇道理也須是得其所止方是若要得其所止直是能慮方得能慮却是緊要知止如知為子而必孝知為臣而必忠能得是身親為忠孝之事若徒知這箇道理至於事親之際為私欲所汩不能盡其孝事君之際為利禄所汨不能盡其忠這便不是能得矣能慮是見得此事合當如此便如此做道夫人夲有此理但為氣禀物欲所蔽若不格物致知事至物來七顛八倒若知止則有定能慮得其所止節問知止至能得曰真個是知得到至善處便㑹到能得地位中間自是效驗次第如此學者工夫却在明明徳新民止於至善上如何要去明明徳如何要去新民如何要得止於至善正當理㑹知止能得這處却未甚要緊聖人但説箇知止能得様子在這裏㝢陳子安問知止至能得其間有工夫否曰有次序無工夫才知止自然相因而見只知止處便是工夫又問至善須是明徳否曰至善雖不外乎明徳然明徳亦有畧畧明者須是止那極至處銖真知所止則必得所止雖若無甚間隔其間亦有少過度處健歩勇徃勢雖必至然移歩亦須畧有漸次也林子淵問知止至能得曰知與行工夫須著並到知之愈明則行之愈篤行之愈篤則知之益明二者皆不可偏廢如人兩足相先後行便㑹漸漸行得到若一邉軟了便一歩也進不得然又須先知得方行得所以大學先説致知中庸説知先於仁勇而孔子先説知及之然學問慎思明辨篤行皆不可闕一賀孫問知止能得一段曰只是這箇物事滋長得頭靣自各别今未要理㑹許多次第且要先理㑹箇知止待將來熟時便自見得先生論看文字只要虚心濯去舊聞以來新見時舉黄去私問知止至能得曰工夫全在知止若能知止則自能如此人傑知止至能得譬如喫飯只管喫去自㑹飽徳明問知止至能得曰如人飲酒終日只是喫酒但酒力到時一杯深如一杯儒用知止至能得是説知至意誠中間事閎祖大學章句説靜處若兼動即便到得地位所以細分方問知與得如何分别曰知只是方知得便是在手問得莫是行所知了時曰也是如此又曰只是分個知與得知在外得便在我士毅知得朱子語類卷十四
