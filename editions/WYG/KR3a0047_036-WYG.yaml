body:
  text: 朱子語類卷三十六論語十八子罕篇上子罕言利章行夫問子罕言利與命與仁曰罕言者不是不言又不可多言特罕言之耳罕言利者盖凡做事只循這道理做去利自在其中矣如利渉大川利用行師聖人豈不言利但所以罕言者正恐人求之則害義矣罕言命者凡吉凶禍福皆是命若儘言命恐人皆委之於命而人事廢矣所以罕言罕言仁者恐人輕易看了不知切已上做工夫然聖人若不言則人又理㑹不得如何是利如何是命如何是仁故不可不言但雖不言利而所言者無非利雖不言命而所言者無非命雖不言仁而所言者無非仁恪問子罕言利與命與仁曰這利字是箇監平聲界鏖糟的物事若說全不要利又不成特地去利而就害若纔說著利少間便使人生計較又不成模様所以孔子於易只說利者義之和又曰利物足以和義只說到這裏住又曰只認義和䖏便是利不去利上求利了孟子只說箇仁義未有仁而遺其親未有義而後其君只說到箇義字時早是掉了那利字不說了縁他是箇裏外牽連底物事纔牽着這一邊便動那一邊所以這字難說命字亦是如此也是箇監界物事孔子亦非不說如云不知命之類只是都不說著便又使人都不知箇限量若只說著時便又使人百事都放倒了不去做只管說仁之弊於近世胡氏父子見之踢著脚指頭便是仁少間都使人不去窮其理是如何只是口裏說箇仁字便有此等病出来僴子罕言利與命與仁非不言罕言之爾利誰不要才専說便一向向利上去命不可専恃若専恃命則一向胡做去仁學者所求非不說但不常常把来口裏說泳問子罕言利曰利最難言利不是不好但聖人方要言恐人一向去趨利方不言不應是教人去就害故但罕言之耳盖利者義之和義之和䖏便利老蘇甞以為義剛而不和惟有利在其中故和此不成議論盖義之和即是利却不是因義之不和而遂用些小利以和之後来東坡解易亦用此說更不成議論也時舉問子罕言利孔子自不曾說及利豈但罕言而已曰大易一書所言多矣利只是這箇利若只管說與人未必曉得以義為利之意却一向只管營營貪得計較孟子曰未有仁而遺其親未有義而後其君這箇是說利但人不可先計其利惟知行吾仁非為不遺其親而行仁惟知行吾義不為不後其君而行義賀孫文振問子罕言利與命與仁曰命只是一箇命有以理言者有以氣言者天之所以賦與人者是理也人之所以夀夭窮通者是氣也理精微而難言氣數又不可盡委之而至於廢人事故聖人罕言之也仁之理至大數言之不惟使人躐等亦使人有玩之之心盖舉口便說仁人便自不把當事了時舉命有二天命之命固難說只貴賤得䘮委之於命亦不可仁在學者力行利亦不是不好底物事才専說利便廢仁泳問子罕言仁論語何以說仁亦多曰聖人也不容易說與人只說與幾箇向上底淳問子所罕言之命恐只是指夫人之窮通者言之今范楊尹氏皆以盡性知性為言不求之過否曰命只是窮通之命必大集義問或曰罕言利是何等利楊氏曰一般云云竊謂夫子罕言者乃放於利而行之利若利用出入乃義之所安䖏却不可以為一般曰利用出入之利亦不可去尋討尋討著便是放於利之利如言利物足以和義只去利物不言自利又曰只元亨利貞之利亦不可計較計較著即害義為義之人只知有義而已不知利之為利必大或問龜山都一般之說似可疑曰易所言利字謂當做底若放於利而行之利夫子誠罕言二利字豈可做一般㽦正淳問尹氏子罕一章曰尹氏命字之說誤此只是不知命無以為君子之命故曰計利則害義言命則廢事也必大麻冕禮也章麻冕緇布冠也以三十升布為之升八十縷則其經二千四百縷矣八十􅈁四十杪也泳純儉絲也不如用絲之省約泳子絶四章絶四是徹上徹下這意字正是計較底私意僴問意如何毋得曰凡事順理則意自正毋意者主理而言不順理則只是自家私意可學必在事先固在事後固只是滯不化徳明必在事先固在事後如做一件事不是了即管固執道我做得是植意私意之發必在事先固在事後我私意成就四者相因如循環閎祖徐問意必固我曰意是要如此聖人只看理當為便為不當為便不為不曾道我要做我不要做只容一箇我便是意了曰必固之私輕意我之私重否曰意必固我只一套去意是初創如此有私意便到那必䖏必便到固滯不通䖏固便到有我之私䖏意是我之發端我是意之成就曰我是有人已之私否曰人自是人已自是已不必把人對說我只是任己私去做便於我者則做不便於我者則不做只管就已上計較利害與人何相闗人多要人我合一人我如何合得吕銘曰立己與物私為町畦他們都說人已合一克己只是克去己私如何便說到人已為一䖏物我自有一等差只是仁者做得在這裏了要得人也如此便推去及人所以親親而仁民仁民而愛物人我只是理一分自不同淳㝢同余國秀問毋意必固我曰意是發意要如此必是先事而期必固是事過而執滯到我但知有我不知有人必之時淺固之時長譬如士人赴試須要必得到揭榜後便已必不得了但得則喜喜不䏻得化不得則愠愠亦不䏻得化以此知固時久也意是始我是終必固在中間亦是一節重似一節也又云言必信行必果言自合着信行自合著果何待安排才有心去必他便是不活便不䏻久矣又云意是絲毫我是成一山嶽也時舉意必固我亦自有先後凡起意作一事便用必期之望所期之事或未至或已過又執滯而留於心故有有我之患意是為惡先鋒我是為惡成就正如四徳貞是好底成就䖏我是惡底成就䖏人傑意者有我之端我則意之效先立是意要如此而為之然後有必有固而一向要毎事皆已出也聖人作事初無私意或為或不為不在己意而惟理之是從又何固必有我哉力行問意私意也我私己也看得来私己是箇病根有我則有意曰意是初發底意思我則結撮成箇物事矣有我則又起意展轉不已此四事一似那元亨利貞但元亨利貞是好事此是不好事廣呉仁父問意必固我曰須知四者之相生凡人做事必先起意不問理之是非必期欲事成而已事既成是非得失已定又復執滯不化是之謂固三者只成就得一箇我及至我之根源愈大少間三者又從這裏生出我生意意又生必必又生固又歸宿於我正如元亨利貞元了亨亨了又利利了又貞循環不已僴呉伯英問意必固我曰四者始於我而終於我人惟有我故任私意既任私意百病俱生故事未至而有期必之心事既已過則有固滯之患凡若此者又只是成就一箇我耳壮祖絶四先生曰此四者亦是相因底始於有私意有私意定是有期必既期必又生固滯却結裹做箇有我出来炎無意必固我而凝然中立者中也端䝉必在事先固在事後有意必固三者乃成一箇我如道是我恁地做盖固滯而不化便成一箇我横渠曰四者有一焉則與天地不相似植集注問横渠謂四者有一焉則與天地不相似畧有可疑曰人之為事亦有其初未必出於私意而後来不䏻化去者若曰絶私意則四者皆無則曰子絶一便得何用更言絶四以此知四者又各是一病也時舉問意必固我有無次第曰意是私意始萌既起此意必是期要必行固是既行之後滯而不化我是縁此後便只知有我此四者似有終始次序必者迎之於前固者滯之於後此四者正與元亨利貞四者相類元者善之長貞是箇善底成就䖏意是造作始萌我是箇惡底成就䖏又問敬則無己可克若學之始則須從絶四去如何曰敬是成已之敬可知無己可克此四者須是始學亦須便要絶去之又問復於喜怒哀樂未發之前曰此語尹子已辨之疑記錄有差䖏又問意必固我既亡之後學者所宜盡心如何曰所謂學者所宜盡心於此事而學之非謂意必固我既亡之後始盡心耳又問横渠云四者既亡則以直養而無害曰此直字說得重了觀孟子所說䖏說得觕直只是自反而縮後人求之太深說得忒夾細了㽦集義問君子之學在於意必固我既亡之後而復於喜怒哀樂未發之前如何曰不然尹和靖一段好意必固我是要得無未發之前衆人俱有却是要發而中節與此不相類又問若自學者而言欲絶意必固我到聖人地位無此四者則復於未發之前復於未發之前盖全其天理耳曰固是如此但發時豈不要全因命敬之取和靖語錄来檢看又云他意亦好却說不好可學君子之學在意必固我既亡之後而復於喜怒哀樂未發之前何也曰意必固我既亡之後盡心於學所言是也喜怒哀樂自有發時有未發時各隨䖏做工夫如何强復之於未發尹氏語錄中辨此甚詳必大求之於喜怒哀樂未發之前而體之於意必固我既亡之後如此說着便害義理此二句不可相對說喜怒哀樂未發之前固無可求及其既發亦有中節不中節之異發若中節者有何不可至如意必固我則斷不可有二者焉得而對語哉横渠謂意必固我自始學至成徳竭兩端之教者謂夫子教人絶此四者故皆以毋字為禁止之辭或謂意必固我既亡之後必有事焉者曰意必固我既亡便是天理流行鳶飛魚躍何必更任私意也謨問意必固我既亡之後必有事焉所謂有事者如何曰横渠亦有此說若既無此天理流出亦須省着可學問意必固我伊川以發而當者理也發而不當者私意也此語是否曰不是如此所謂毋意者是不任已意只看道理如何見得道理是合當如此做便順理做將去自家更無些子私心所以謂之毋意若才有些安排布置底心便是任私意若元不見得道理只是任自家意思做將去便是私意縱使發而偶然當理也只是私意未說到當理在伊川之語想是被門人錯記了不可知僴張子曰意有思也未安意却是箇有為底意思為此一事故起此一意也必大我有方也方所也猶言有限隔也端䝉守約問横渠說絶四之外心可存䖏必有事焉聖不可知也曰這句難理㑹舊見横渠理窟見他裏面說有這様大意說無是四者了便當自有箇所嚮所謂聖不可知只是道這意思難說横渠儘㑹做文章如西銘及應用之文如百椀燈詩甚敏到說話却如此難曉怕是關西人語言自是如此賀孫問張子曰云云或問謂此條語意簡奥若不可曉竊以張子下數條語考之似以必有事焉為理義之精微䖏其意大抵謂善不可以有心為雖夷清惠和猶為偏倚未得謂之精義故謂絶四之外下頭有一不犯手勢自然底道理方真是義孟子之言盖謂下頭必有此道理乃聖而不可知䖏此說於孟子本意殊不合然未審張子之說是如此否曰横渠此說又拽退孟子數重自說得深古聖賢無此等議論若如此說將使讀者終身理㑹不得其流必有弊必大横渠之意以絶為禁止之詞是言聖人將這四者使學者禁絶而勿為毋字亦是禁止之意故曰自始學至成徳竭兩端之教也必是事之未来䖏固是事之已過䖏道夫伯豐問張子曰毋意必固我然後䏻範圍天地之化曰固是如此四者未除如何䏻範圍天地但如此說話終是稍寛耳㽦子畏於匡章文不在兹乎言在兹便是天未䘮斯文淳後死者夫子自謂也死字對沒字泳問天之將䘮斯文未䘮斯文文即是道否曰既是道安得有䘮未䘮文亦先王之禮文聖人於此極是留意盖古之聖人既竭心思焉將行之萬世而無弊者也故常恐其䘮失而不可攷大雅後死者是對上文文王言之如曰未亡人之類此孔子自謂也與天生徳於予意思一般斯文既在孔子孔子便做著天在孔子此語亦是被匡人圍得緊後方說出来又問孔子萬一不䏻免匡人之難時如何曰孔子自見得了㽦子畏於匡一節看来夫子平日不曾如此說往往多謙抑與此不同先生笑云此却是真箇事急了不覺說將出来炎敬之問眀道舎我其誰是有所受命之辭匡人其如予何是聖人自做着天裏孟子是論世之盛衰已之去就故聽之於天孔子言道之盛衰自應以已任之未審此說如何曰不消如此看眀道這說話固是說未盡如孔子云天之將䘮斯文天之未䘮斯文看此語也只看天如何只是要緊不在此䖏要緊是看聖賢所以出䖏大節賀孫問程子云夫子免於匡人之圍亦苟脫也此言何謂曰謂當時或為匡人所殺亦無十成某云夫子自言匡人其如予何程子謂知其必不䏻違天害已何故却復有此說曰理固如是事則不可知必大問吕氏曰文者前後聖之所脩道則出乎天而已故孔子以道之廢興付之命以文之得䘮任諸己曰道只是有廢興却喪不得文如三代禮樂制度若喪便掃地㽦太宰問於子貢章先生曰太宰云夫子聖者與何其多能也是以多能為聖也子貢對以夫子固天縱之將聖又多能也是以多能為聖人餘事也子曰吾少也賤故多能鄙事君子多乎哉不多也是以聖為不在於多能也三者之說不同諸君且道誰說得聖人地位著諸生多主夫子之言先生曰太宰以多能為聖固不是若要形容聖人地位則子貢之言為盡盖聖主於徳固不在多能然聖人未有不多能者夫子以多能不可以律人故言君子不多尚徳而不尚藝之意其實聖人未甞不多䏻也柄問太宰初以多能為夫子之聖子貢所答方正說得聖人體段夫子聞之數語却是謙辭及有多能非所以率人之意曰固是子貢說得聖人夲分底聖人所說乃謙辭植太宰知我乎以下煞有曲折意思聖人不直謂太宰不足以知我只說太宰也知我這便見聖人待人恁地温厚又曰聖人自是多能今若只去學多能則只是一箇雜骨董底人所以說君子多乎哉不多也義剛問夫子多材多藝何故能爾曰聖人本領大故雖是材藝他做得自别只如禮聖人動容周旋俯仰升降自是與它人不同如射亦然天生聖人氣禀清眀自是與它人不同列子甞言聖人力䏻拓闕雖未可信然要之聖人本領大後事事做得出来自别銖問吾不試故藝曰想見聖人事事㑹但不見用所以人只見它小小技藝若使其得用便做出大功業来不復有小小技藝之可見矣問此亦是聖人賢於堯舜䖏否曰也不須如此說聖人賢於堯舜䖏却在於収拾累代聖人之典章禮樂制度義理以垂於世不在此等小小䖏此等䖏非所以論聖人之優劣也横渠便是如此說以為孔子窮而在下故做得許多事如舜三十便徴庸了想見舜於小事也煞有不㑹䖏雖是如此也如此說不得舜少年耕稼陶漁也事事去做来所以人無縁及得聖人聖人事事從手頭更歴過来所以都曉得而今人事事都不㑹最急者是禮樂樂固不識了只是日用常行吉凶之禮也都不曾講得僴問天縱之將聖縱猶肆也言不為限量何如曰天放縱聖人做得恁地不去限量它問如此愚不肖是天限量之乎曰看氣象亦似天限量它一般如這道理聖人知得盡得愚不肖要增進一分不得硬拘定在這裏㝢集注將聖殆也殆庶幾也如而今說將次將字訓大䖏多詩中亦孔之將之類多訓大詩裏多叶韻所以要如此等字使若論語中只是平說泳吾有知乎哉章問吾有知乎哉與吾無隠乎爾意一般否曰那箇說得濶這主答問而言或曰那箇兼動靜語黙說了曰然燾林恭甫問此章曰這空空是指鄙夫言聖人不以其無所有而畧之故下句更用我字喚起義剛問竭兩端䖏疑與不憤不啓一段相反不憤不啓聖人待人自理㑹方啓發他空空鄙夫必着竭兩端告之如何曰兩端就一事而言說這淺近道理那箇深逺道理也便在這裏如舉一隅以四角言這桌子舉起一角便有三角在兩端以兩頭言之凡言語便有兩端文字不可類看這䖏與那䖏說又别須是看他語脈論這主意在吾有知乎哉無知也此聖人謙辭言我無所知空空鄙夫来問我又盡情說與他凡聖人謙辭未有無因而發者這上面必有說話門人想記不全須求這意始得如達巷黨人稱譽聖人博學而無所成名聖人乃曰吾執御矣皆是因人譽已聖人方承之以謙此䖏想必是人稱道聖人無所不知誨人不倦有這般意思聖人方道是我無知識亦不是誨人不倦但鄙夫来問我則盡情向他說若不如此聖人何故自恁地謙自今觀之人無故說謙話便似要人知模様㝢問伊川謂聖人之言必降而自卑不如此則人不親賢人之言必引而自高不如此則道不尊此是賢人聖人氣象不同耶抑據其地位合當如此曰聖人極其高大人自難企及若更不俯就則人愈畏憚而不敢進賢人有未熟䖏人未甚信服若不引而自高則人也必為淺近不足為孟子人皆以為迂濶把做無用使孟子亦道我底誠迂濶無用則何以起人慕心所以與他爭辨不是要人尊己直使人知斯道之大庶幾竦動著力去做孔子甞言如有用我者期月而已可也又言吾其為東周乎只作平常閒說孟子言如欲平治天下當今之世舎我其誰便說得廣是勢不得不如此又問如程子說話亦引而自高否曰不必如此又生枝節且就此本文上看一段須反覆看来看去要爛熟方見意味快樂令人都不欲看别段始得淳㝢錄云程子曰聖人之言必降而自卑不如此則人不親賢人之言必引而自髙不如此則道不尊不審這䖏形容聖賢氣象不冋或據其地位合著如此耶曰地位當如此聖人極其高大人皆疑之以為非我所䏻及若更不恁地俯就則人愈畏憚而不敢進孟子於道雖已見到至䖏然做䖏畢竟不似聖人熟人不䏻不疑其所未至若不引而自高則人必以為淺近而不足為孟子人皆以為迂濶把他無用了若孟子也道是我底誠迂濶無用如何使得所以與人辯與人爭亦不是要人尊己只要人知得斯道之大庶幾使人竦動警覺夫子常言如有用我者期月而已可又言吾其為東周乎只平常如此說孟子便道如欲平治天下當今之世舎我其誰也便說得恁地奢遮其勢不得不如此這話從来無人㑹如此說非程先生見得透如何敢鑿空恁地説出來正淳問執兩端與竭兩端如何曰兩端也只一般猶言頭尾也執兩端方識得一箇中竭兩端言徹頭徹尾都盡也問只此是一言而盡這道理如何曰有一言而盡者有數言而盡者如樊遲問仁曰愛人問知曰知人此雖一言而盡推而逺之亦無不盡如子路正名之論直說到無所措手足如子路問政哀公問政皆累言而盡但只聖人之言上下本末始終小大無不兼舉端蒙鳳鳥不至章鳳鳥不至聖人尋常多有謙詞有時亦自諱不得泳子見齊衰者章康叔臨問作與趨者敬之貌也何為施之於齊衰與瞽者曰作與趨固是敬然敬心之所由發則不同見冕衣裳者敬心生焉而因用其敬見齊衰者瞽者則哀矜之心動於中而自加敬也吕刑所謂哀敬折獄正此意也盖卿震錄疑聞同叔臨問雖少必作過之必趨欲以作字趨字說做敬不知如何曰固是敬須是看這敬心所從發䖏如見齊衰是敬心生於哀見瞽者是敬心生於憫震問作與趨如何見得聖人哀矜之心曰只見之過之而變容動色便是哀矜之豈真涕泣而後謂之哀矜也燾顔淵喟然嘆章學者說顔子喟然嘆曰一章曰公只消理㑹顔子因何見得到這裏是見箇甚麽物事衆無應者先生遂曰要緊只在夫子循循然善誘人博我以文約我以禮三句上須看夫子循循然善誘底意思是如何聖人教人要緊只在格物致知克己復禮這箇窮理是開天聪眀是甚次第賀孫夫子教顔子只是博文約禮兩事自堯舜以来便自如此說惟精便是博文惟一便是約禮義剛博我以文約我以禮聖門教人只此兩事須是互相發眀約禮底工夫深則博文底工夫愈眀博文底工夫至則約禮底工夫愈宻廣博我以文約我以禮聖人教人只此兩事博文工夫固多約禮只是這些子如此是天理如此是人欲不入人欲則是天理禮者天理之節文節謂等差文謂文采等差不同必有文以行之鄉黨一篇乃聖人動容周旋皆中禮䖏與上大夫言自然誾誾與下大夫言自然侃侃若與上大夫言却侃侃與下大夫言却誾誾便不是聖人在這地位知這則様莫不中節今人應事此心不熟便解忘了又云聖賢於節文䖏描畫出這様子令人依本子去學譬如小兒學書其始如何便寫得好須是一筆一畫都依他底久久自然好去又云天理人欲只要認得分眀便喫一盞茶時亦要知其孰為天理孰為人欲人傑安卿問博文是求之於外約禮是求之於内否曰何者為外博文也是自内裏做出来我本来有此道理只是要去求知須是致物須是格雖是說裏然求来求去終歸於一理乃所以約禮也易所謂尺蠖之屈以求伸也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也而今尺蠖蟲子屈得一寸便䏻伸得一寸来許他之屈乃所以為伸龍蛇於冬若不蟄則凍殺了其蟄也乃所以存身也精義入神乃所以致用也利用安身乃所以崇徳也欲罷不能如人行歩左脚起了不由得右脚不起所謂過此以往未之或知也若是到那窮神知化則須是徳之盛也方能顔子其初見得聖人之道尚未甚定所以說彌高彌堅在前在後及博文約禮工夫既到則見得如有所立卓爾但到此却用力不得了只待他熟後自到那田地義剛國秀問所以博文約禮格物致知是教顔子就事物上理㑹克已復禮却是顔子有諸己曰格那物致吾之知也便是㑹有諸己賀孫因論博我以文曰固是要就書册上理㑹然書册上所載者是許多書册載不盡底又是多少都要理㑹僴正淳問顔淵喟然嘆曰一段曰吾人未到他地位畢竟未識說箇甚麼再問乃曰瞻之在前忽然在後是沒捉摸䖏是他顔子見得恁地如有所立卓爾是聖人已到顔子未到䖏㽦以下縂論顔淵喟然嘆䖏是顔子見得未定只見得一箇大物事後奈不何節顔子仰之彌高鑚之彌堅瞻之在前忽然在後不是别有箇物事只是做来做去只管不到聖人䖏若做得緊又太過了若放慢做又不及聖人則動容周旋都是這道理義剛或問顔子鑚仰曰顔子鑚仰前後只得摸索不着意思及至盡力以求之則有所謂卓然矣見聖人氣象大槩如此然到此時工夫細宻從前篤學力行底麄工夫全無所用盖當此時只有些子未安樂但須涵養將去自然到聖人地位也力行仰高鑚堅瞻前忽後此猶是見得未親切在如有所立卓爾方始親切雖欲從之末由也已只是脚歩未到盖不䏻得似聖人從容中道也閎祖瞻之在前忽然在後是猶見得未定及所立卓爾則已見得定但未到爾只是天理自然底不待安排所以着力不得時盖為安排着便不自然便與他底不相似這箇卓爾事事有在裏面亦如一以貫之相似佐或問瞻前忽後章曰此是顔子當初尋討不着時節瞻之却似在前及到着力趕上又却在後及鑚得一重了又却有一重及仰之又却煞高及至上得一層了又有一層到夫子教人者又却循循善誘既博之以文又約之以禮博之以文是事事物物皆窮䆒約之以禮是使之復禮却只如此教我循循然去下工夫久而後見道體卓爾立在這裏此已見得親切䖏然雖欲從之却又末由也已此是顔子未達一間時此是顔子說已當初捉摸不着時事祖道問顔子此說亦是立一箇則例與學者求道用力䖏故程子以為學者須學顔子有可依據孟子才大難學者也曰然祖道周元興問顔子當鑚仰瞻忽時果何所見曰顔子初見聖人之道廣大如此欲向前求之轉覺無下手䖏退而求之則見聖人所以循循然善誘之者不過博文約禮於是就此䖏竭力求之而所見始親切的當如有所立卓爾在前而嘆其峻絶着力不得也又問顔子合下何不便做博文約禮工夫曰顔子氣禀高眀合下見得聖人道大如此未肯便向下學中求及其用力之久而後知其真不外此故只於此䖏着力爾銖問顔子瞻忽事為其見得如此所以欲罷不能曰只為夫子博之以文約之以禮所以欲罷不能問瞻忽前後是初見時事仰高鑚堅乃其所用力䖏曰只是初見得些小未䏻無礙奈何他不得夫子又只告以博文約禮顔子便服膺拳拳弗失緊要是博文約禮問顔子後来用力見得如有所立卓爾何故又曰雖欲從之末由也已曰到此亦無所用力只是博文約禮積久自然見得徳眀問顔子喟然嘆䖏莫正是未達一間之意夫顔子無形顯之過夫子稱其三月不違仁所謂違仁莫是有纎毫私欲發見否曰易傳中說得好云既未能不勉而中所欲不踰矩是有過也瞻前忽後是顔子見聖人不可及無捉摸䖏如有所立卓爾却是真箇見得分眀又曰顔子纔有不順意䖏有要着力䖏便是過人傑夫子之教顔子只是博文約禮二事至於欲罷不能既竭吾才如有所立卓爾䖏只欠箇熟所謂過此以往未之或知也窮神知化徳之盛也人傑問顔淵喟然嘆章曰仰鑚瞻忽四句是一箇關如有所立卓爾䖏又是一箇關不是夫子循循善誘博文約禮便雖見得高堅前後亦無下手䖏惟其如此所以過得這一關欲罷不能非止是約禮一節博文一節䖏亦是欲罷不能博文了又約禮約禮了又博文恁地做去所以欲罷不能至於如有所立去䖏見得大段親切了那末由也已一節却自著力不得著力得䖏顔子自着力了愽文約禮是著力得䖏也又曰顔子為是先見得這箇物事了自高堅前後做得那卓爾䖏一節親切如一節了如今學者元不曾識那箇高堅前後底是甚物事更怎望他卓爾底植問瞻之在前四句曰此段有兩重關此䖏顔子非是都不曾見得顔子已是到這裏了比他人都不曾到問聖人教人先博文而後約禮横渠先以禮教人何也曰學禮中也有博文如講眀制度文為這都是文那行䖏方是約禮也䕫孫欲罷不能是住不得䖏惟欲罷不能故竭吾才不惟見得顔子善學聖人亦見聖人曲盡誘掖之道使他歡喜不知不覺者到氣力盡䖏如人飲酒飲得一盃好只管飲去不覺醉郎當了䕫孫大率看文字且看從實䖏住如喟然嘆一章且看到那欲罷不䏻䖏如後面只自家工夫到那田地自見得都不必如此去賛詠想像籠罩燾問如有所立卓爾只是說夫子之道高眀如此或是似有一物卓然可見之意否曰亦須有箇模様問此是聖人不思不勉從容自中之地顔子鑚仰瞻忽既竭其才嘆不能到曰顔子鑚仰瞻忽初是捉摸不着夫子不就此啟發顔子只博之以文約之以禮令有用功䖏顔子做這工夫漸見得分曉至於欲罷不能已是住不得及夫既竭吾才如此精専方見得夫子動容周旋無不中䖏皆是天理之流行卓然如此分曉到這裏只有箇生熟了顔子些小未能渾化如夫子故曰雖欲從之末由也已徳眀問如有所立卓爾是聖人不思不勉從容自中䖏顔子必思而後得勉而後中所以未至其地曰顔子竭才便過之問如何過曰才是思勉便過不思勉又不及顔子勉而後中便有些小不肯底意心知其不可故勉强擺回此等意義懸空逆料不得須是親到那地位方自知問集注解瞻之在前忽然在後作無方體曰大槩亦是如此徳眀恭父問顔子平日深潜純粹觸䖏從容只於喟然之嘆見得他煞苦切䖏揚子云顔苦孔之卓恐也是如此到這裏見得聖人直是峻極要進這一歩不得便覺有懇切䖏曰顔子到這裏也不是大段着力只他自覺得要着力自無所容其力賀孫恪錄云恭父問顔子平日深潜純粹到此似覺有苦心極力之象只縁他工夫到後視聖人一地位卓然只在目前只這一歩峻絶直是難進故其時勇猛奮發不得不如此觀揚子雲言顔苦孔之卓似乎下得箇苦字亦甚親切但顔子只這一時勇猛如此却不見廹切到末由也已亦只得放下曰看他别自有一箇道理然兹苦也茲其所以為樂也程子曰到此地位工夫尤難直是峻絶又大段著力不得所以著力不得縁聖人不勉而中不思而得了賢者若著力要不勉不思便是思勉了此所以說大段著力不得今日勉之眀日勉之勉而至於不勉今日思之眀日思之思而至於不思自生而至熟正如寫字一般㑹寫底固是㑹不㑹寫底須學他寫今日寫眀日寫自生而至熟自然寫得泳集注問程子曰到此地位至著力不得何謂也曰未到這䖏須是用力到這䖏自要用力不得如孔子六十而耳順七十而從心這䖏如何用力得只熟了自然恁地去横渠曰大可為也化不可為也在熟之而已過此以往未之或知也窮神知化徳之盛也淳㝢錄同洽錄云到這裏直待他自熟且如熟還可着力否問顔淵喟然嘆一段高堅前後可形容否曰只是說難學要學聖人之道都摸索不著要如此學不得要如彼學又不得方取他前又見在後這䖏皆是譬喻如此其初恁地難到循循善誘方略有箇近傍䖏呉氏以為卓爾亦不出乎日用行事之間問如何見得曰是他見得恁地定見得聖人定體規模此䖏除是顔子方見得問程子言到此大段著力不得胡氏又曰不怠所從必欲至乎卓立之地何也曰末由也已不是到此便休了不用力但工夫用得細不似初間用許多麄氣力如博學審問慎思眀辨篤行之類這䖏也只是循循地養將去顔子與聖人大抵爭些子只有些子不自在聖人便不勉而中不思而得這䖏如何大段著力得才著力又成思勉去也只恁地養熟了便忽然落在那窠窟裏眀道謂賢毋謂我不用力我更著力淳錄云眀道謂賢看顥如此顥煞用工夫人見眀道是從容然眀道却自有着力䖏但細膩了人見不得㝢正淳問集注顔子喟然而嘆一章不用程子而用張子之說曰此章經文自有次第若不如張子說須移如有所立卓爾向前始得必大蜚卿問博約之說程子或以為知要或以為約束如何曰博我以文約我以禮與博學於文約之以禮一般但博學於文約之以禮孔子是汎言人能博文而又䏻約禮可以弗畔夫道而顔子則更深於此耳侯氏謂博文是致知格物約禮是克已復禮極分曉而程子却作兩様說便是某有時曉他老先生說話不得孟子曰博學而詳說之將以反說約也這却是知要盖天下之理都理㑹透到無可理㑹䖏便約盖博而詳所以方䏻說到要約䖏約與要同道夫曰漢書要求字讀如約束曰然頃之復曰知崇禮卑聖人這四字如何説到那地位道夫曰知崇便是博禮卑便是約否曰博然後崇卑然後約物理窮盡卓然於事物之表眼前都攔自家不住如此則所謂崇戒謹恐懼一舉一動一言一行無不著力如此則是卑問卑法地曰只是極其卑爾又問知崇如天禮卑如地而後人之理行乎曰知禮成性而天理行乎其間矣道夫集義問横渠說顔子三段却似說顔子未到中䖏曰可知是未到從容中道如瞻之在前忽焉在後便是横渠指此做未能及中盖到這裏又著力不得才緊著便過了稍自放慢便逺了到此不爭分毫間只是做得到了却只涵養既竭吾才如有所立卓爾便是未到不思而得䖏雖欲從之末由也已便是未到不勉而中䖏㽦問横渠說顔子發嘆䖏曰高眀不可窮是說仰之彌高博厚不可極是說鑚之彌堅中道不可識則瞻之在前忽然在後至其欲罷不䏻既竭吾才則方見如有所立卓爾謂之如是則於聖人中道所爭不多才着力些便過才放慢些便不及直是不容着力人傑所謂瞻之在前忽然在後這只是箇中庸不可能盖聖人之道是箇恰好底道理所以不可及自家纔着意要去做不知不覺又蹉過了且如恭而安這是聖人不可及䖏到得自家纔著意去學時便恭而不安了此其所以不可能只是難得到恰好䖏不着意又失了纔著意又過了所以難横渠曰高眀不可窮博厚不可極則中道不可識盖顔子之嘆也雖說得拘然亦自說得好或曰伊川過不及之說亦是此意否曰然盖方見聖人之道在前自家要去趕著他不知不覺地蹉過了那聖人之道又却在自家後了所謂忽然在後也只是箇中庸不可能夫子循循然善誘人非特以博文約禮分先後次序博文中亦自有次序約禮中亦自有次序有箇先後淺深欲罷不能便只是就這博文約禮中做工夫合下做時便是下這十分工夫去做到得這歎時便是欲罷不能之效衆人與此異者只是爭這箇欲罷不能做来做去不知不覺地又住了顔子則雖欲罷而自有所不能不是勉強如此此其所以異於人也又曰顔子工夫到此已是七八分了到得此是㴞㴞地做將去所以欲罷不能如人過得箇闗了便平地行將去僴伯豐問顔子求龍徳正中而未見是庸言之信庸行之謹閑邪存其誠聖人從容中道地位否曰然又問極其大而後中可求如何曰此言執其兩端用其中於民正如程子室中􅆹中國中之說不極其大則不得其中也又問止其中而後大可有如何曰在中間便盡得四邊若偏向這一邊即照管那一邊不得張子此語甚好若云未見其止却使得不是未見其止只是不息非得其所止之止㽦子疾病章問久矣哉由之行詐是不特指那一事言也曰是指從来而言問人苟知未至意未誠則此等意慮時復發露而不自覺曰然廣問由之行詐如何曰見子路要尊聖人恥於無臣而為之一時不䏻循道理子路本心亦不知其為詐然而子路尋常亦是有不眀䖏知死孔悝之難是致死有見不到只有一毫不誠便是詐也饒夲作子路平日強其所不知以為知故不以出公為非㽦問子路使門人為臣一章曰世間有一種事分眀是不好人也皆知其不好謂如子路使門人為臣此等事未有不好亦未為欺天但子路見不透却把做好事去做了不知其實却不是了燾子貢曰有美玉章子貢只是如此設問若曰此物色是只藏之惟復將出用之耳亦未可議其言之是非也必大子欲居九夷章問子欲居九夷使聖人居之真有可變之理否曰然或問九夷前軰或以箕子為證謂朝鮮之類是否曰此亦未見得古者中國亦有夷狄如魯有淮夷周有伊雒之戎是也又問此章與乗桴浮海莫是戯言否曰只是見道不行偶然發此嘆非戯言也因言後世只管說當時人君不能用聖人不知亦用不得毎國有世臣把住了如何容外人来做如魯有三桓齊有田氏晉有六卿比比皆然如何容聖人挿手雉出則事公卿章䘮事不敢不勉不為酒困此等䖏聖人必有為而言燾問不為酒困何有於我哉曰語有兩䖏如此說皆不可曉尋常有三般說話一以為上數事我皆無有一說謂此數事外我皆復何有一說云於我何有然皆未安某今闕之去偽集注今有定說正淳問出則事公卿一段及范氏以燕而不亂為不為酒困如何曰此說本卑非有甚高之行然工夫却愈精宻道理却愈無窮故曰知崇禮卑又曰崇徳廣業盖徳知雖高然踐履却只是卑則愈廣又曰徳言盛禮言恭謙也者致恭以存其位者也此章之義似說得極低然其實則說得極重范氏似以不為酒困為不足道故以燕飲不亂當之過於深矣必大子在川上章問逝者如斯曰逝只訓往斯字方指川流說植或問子在川上曰逝者如斯夫不舎晝夜曰古說是見川流因歎大抵過去底物不息猶天運流行不息如此亦警學者要當如此不息盖聖人之心純亦不已所以能見之去偽問注云天地之化往者過来者續無一息之停乃道體之本然也其可指而易見者莫如川流故於此發以示人其反而求之身心固生生而不息氣亦流通而不息二者皆得之於天與天地為一體者也然人之不䏻不息者有二一是不知後行不得二是役於欲後行不得人須是下窮理工夫使無一理之不眀下克己工夫使無一私之或作然此兩段工夫皆歸在敬上故眀道云其要只在謹獨曰固是若不謹獨便去隠微䖏間斷了能謹獨然後無間斷若或作或輟如何得與天地相似廣士毅錄云此只要常常相續不間斷了集注或問天地之化往者過来者續此道體之本然也如何曰程子言之矣天運而不已日往則月来云云皆與道為體與道為體此句極好某常記得舊作觀瀾記兩句云觀湍流之不息悟有本之無窮人傑祖道錄别出或問子在川上曰此是形容道體伊川所謂與道為體此一句最妙某甞為人作觀瀾詞其中有二句云觀川流之不息兮悟有本之無窮又問眀道曰其要只在謹獨如何曰䏻謹獨則無間斷而其理不窮若不謹獨便有欲来參入裏靣便間斷了也如何却㑹如川流底意又問眀道云自漢以来諸儒皆不識此如何曰是他不識如何却要道他識此事除了孔孟猶是佛老見得些形象譬如畫人一般佛老畫得些模様後来儒者於此全無相着如何教他兩箇不做大祖道曰只為佛老從心上起工夫其學雖不是然却有本儒者只從言語文字上做有知此事是合理㑹者亦只做一塲話說過了所以輸與他曰彼所謂心上工夫本不是然却勝似儒者多公此說却是祖道問注云此道體之本然也後又曰皆與道為體向見先生說道無形體却是這物事盛載那道出来故可見與道為體言與之為體也這體字較粗如此則與本然之體微不同曰也便在裏面只是前面體字說得来較濶連本末精粗都包在裏面後面與道為體之體又說出那道之親切底骨子恐人說物自物道自道所以指物以見道其寔這許多物事湊合来便都是道之體便在這許多物上只是水上較親切易見僴公晦問子在川上注體字是體用之體否曰只是這箇體道之體只是道之骨子節問如何是與道為體曰與那道為形體這體字却粗只是形體問猶云性者道之形體否曰然僴問注云此道體也下面云是皆與道為體與字其義如何曰此等䖏要緊與道為體是與那道為體道不可見因從那上流出来若無許多物事又如何見得道便是許多物事與那道為體水之流而不息最易見者如水之流而不息便見得道體之自然此等䖏閑時好玩味炎與道為體此四字甚精盖物生水流非道之體乃與道為體也學䝉先生舉程子與道為體之語示過言道無形體可見只看日往月来寒往暑来水流不息物生不窮顯顯者乃是與道為體過問伊川曰此道體也天運而不已至皆與道為體如何曰形而上者謂之道形而下者謂之器道本無體此四者非道之體也但因此則可以見道之體耳那無聲無臭便是道但尋從那無聲無臭䖏去如何見得道因有此四者方見得那無聲無臭底所以說與道為體劉用之曰如炭與火相似曰也略是如此義剛徐問程子曰日往則月来至皆與道為體何謂也曰日月寒暑等不是道㝢錄云日往月来寒往暑来水流不息物生不窮云是道然無這道便也無這箇了惟有這道方始有這箇既有這箇則就上面便可見得道這箇是與道做骨子問張思叔說此便是無窮伊川曰一箇無窮如何便了得何也曰固是無窮然須看因其恁地無窮須見得所以無窮䖏始得若說天只是高地只是厚便也無說了須看所以如此者是如何淳㝢同周元興問與道為體曰天地日月隂陽寒暑皆與道為體又問此體字如何曰是體質道之本然之體不可見觀此則可見無體之體如隂陽五行為太極之體又問太極是體二五是用曰此是無體之體叔重曰如其體則謂之易否曰然又問有天徳便可語王道曰有天徳則便是天理便做得王道無天徳則做王道不成又曰無天徳則是私意是計較後人多無天徳所以做王道不成節伊川說水流而不息物生而不窮皆與道為體這箇體字似那形體相似道是虚底道理因這箇物事上面方看見如厯家說二十八宿為天之體天高逺又更運轉不齊不記這幾箇經星如何見得他經禮三百曲禮三千無一事之非仁經禮曲禮便是與仁為體高至之問逝者如斯夫不舎晝夜便是純亦不已意思否曰固是然此句在吾輩作如何使楊曰學者當體之以自強不息曰只是要得莫間斷程子謂此天徳也有天徳便可語王道其要只在謹獨謹獨與這裏何相闗只少有不謹便斷了㝢又曰天理流行之妙若少有私欲以間之便如水被些障塞不得㴞㴞地流去問程子謂自漢以来儒者皆不識此義曰是不曾識得佛氏却略曾窺得上面些箇影子儒用問注中有天徳而後可以語王道先生云只是無些子私意子在川上一段注此道體之本然也欲學者時時省察而無毫髪之間斷才不省察便間斷此所以其要只在謹獨人多於獨䖏間斷泳因說此章問曰今不知吾之心與天地之化是兩箇物事是一箇物事公且思量良久乃曰今諸公讀書只是去理㑹得文義更不去理㑹得意聖人言語只是發眀這箇道理這箇道理吾身也在裏面萬物亦在裏面天地亦在裏面通同只是一箇物事無障蔽無遮礙吾之心即天地之心聖人即川之流便見得也是此理無往而非極致但天命至正人心便邪天命至公人心便私天命至大人心便小所以與天地不相似而今講學便要去得與天地不相似䖏要與天地相似又曰虚空中都是這箇道理聖人便隨事物上做出来又曰如今識得箇大原了便見得事事物物都從本根上發出来如一箇大樹有箇根株便有許多芽蘖枝葉牽一箇則千百箇皆動䕫孫因說子在川上章問眀道曰天地設位而易行乎其中只是敬也敬則無間斷也是這意思曰固是天地與聖人一般但眀道說得寛䕫孫問見大水必觀焉是何意曰只川上之歎恐是夫子本語孟荀之言或是傳聞之訛必大吾未見好徳如好色章至之問好徳如好色此即大學如好好色之意要得誠如此然集注載衛靈公事與此意不相應何也曰書不是恁地讀除了靈公事便有何發眀存靈公事在那上便有何相礙此皆沒緊要聖人當初只是恁地嘆未見好徳如那好色者自家當虚心去看又要反求思量自已如何便是好徳如何便是好色方有益若只管去校量他與聖人意思愈見差錯聖人言語自家當如奴僕只去隨他教住便住教去便去今却如與做師友一般只去與他校如何得大學之說自是大學之意論語之說自是論語之意論語只是說過去尾重則首輕這一頭低那一頭昻大學只將兩句平頭說去說得尤力如何要合兩䖏意来做一說得淳蜀錄作林一之問文少異叔重問何謂招搖曰如翺翔節語之而不惰章讀語之而不惰曰惟於行上見得他不惰時舉陳仲亨問語之而不惰於甚䖏見得曰如得一善則拳拳服膺而不失之矣欲罷不能皆是其不惰䖏義剛問如何是不惰䖏曰顔子聽得夫子說話自然住不得若他人聽過了半疑半信若存若亡安得不惰雉問語之不惰曰看来不惰只是不說沒要緊底話盖是那時也沒心性說得沒緊要底話了燾子謂顔淵章問未見其止曰如横渠之說以為止是止於中亦說得但死而不活盖是顔子未到那䖏未到那成就結果䖏盖顔子一箇規模許多大若到那収因結果必有大段可觀者也燾苖而不秀章徐問苗而不秀秀而不實何所喻曰皆是勉人進學如此這箇道理難當只管恁地勉強去苗而不秀秀而不實大槩只說物有生而不到長養䖏有長養而不到成就䖏淳苗須是秀秀須是實方成不然何所用學不至實亦何所用後生可畏章問後生可畏是方進者也四十五十而無聞是中道而止者也曰然朱子語類卷三十六
