body:
  text: 朱子語類卷八十一詩二周南關睢兼論二南詩未論音律且如讀二南與鄭衞之詩相去多少問程氏云詩有二南猶易有乾坤莫只是以功化淺深言之曰不然問莫是王者諸侯之分不同曰今只㸔大序中説便可見大序云關睢麟趾之化王者之風故繋之周公鵲巢騶虞之徳諸侯之風先王之所以教故繋之召公只㸔那化字與徳字及所以教字便見二南猶乾坤也文蔚前輩謂二南猶易之乾坤其詩粹然無非道理與他詩不同曰須是寛中㸔𦂳底意思因言匡衡漢儒㡬語亦自説得好曰便是他做處却不如此炎闗睢一詩文理深奥如乾坤卦一般只可熟讀詳味不可説至如葛覃卷耳其言廹切主於一事便不如此了又曰讀詩須得他六義之體如風雅頌則是詩人之格後人説詩以為雜雅頌者縁釋七月之詩者以為備風雅頌三體所以啓後人之説如此又曰興之為言起也言興物而起其意如青青陵上栢青青河畔草皆是興物詩也如藁砧今何在何當大刀頭皆是比詩體也卓敬子説詩周南曰他大綱領處只在戒謹恐懼上只自闗關雎鳩便從這裏做起後面只是漸漸推得濶僴讀關睢之詩便使人有齊荘中正意思所以冠于三百篇與禮首言毋不敬書首言欽明文思皆同㽦問二南之詩真是以此風化天下否曰亦不須問是要風化天下與不風化天下且要從關關雎鳩在河之洲云云裏靣㸔義理是如何今人讀書只是説向外面去却於本文全不識木之關雎之詩非民俗所可言度是宫闈中所作問程子云是周公作曰也未見得是木之關雎㸔來是妾媵做所以形容得寤寐反側之事外人做不到此明作樂得淑女以配君子憂在進賢不淫其色天理人欲方説后妃多失却文王了今以君子為文王伊川詩説多未是璘問器逺君舉所説詩謂關雎如何曰謂后妃自謙不敢當君子謂如此之淑女方可為君子之仇匹這便是后妃之徳曰這是鄭氏也如此説了某㸔來恁地説也得只是覺得偏主一事無正大之意關睢如易之乾坤意思如何得恁地無方際如下面諸篇却多就一事説這只反覆形容后妃之徳而不可指説道甚麽是徳只恁地渾淪説這便見后妃徳盛難言處賀孫問曹兄云陳丈説闗睢如何曹云言關睢以美夫人有謙退不敢自當君子之徳曰如此則淑女又别是一箇人也曹云是如此先生笑曰今人説經多是恁地回互説去如史丞相説書多是如此説祖伊恐奔告於受處亦以紂為好人而不殺祖伊若他人則殺之矣先生乃云讀書且虚心去㸔未要自去取舍且依古人書恁地讀去久後自然見得義理卓魏兄問左右芼之曰芼是擇也左右擇而取之也卓解詩如抱橋柱浴水一般終是離脫不得鳥獸草木今在眼前識得底便可窮究且如雎鳩不知是箇甚物亦只得從他古説道是摯而有别之類魏才仲問詩闗睢注摯至也至先生作切至説似形容其美何如曰也只是恁地問芼字曰擇也讀詩只是将意思想像去㸔不如他書字字要捉縛教定詩意只是叠叠推上去因一事上有一事一事上又有一事如關睢形容后妃之徳如此又當知君子之徳如此又當知詩人形容得意味深長如此必不是以下底人又當知所以齊家所以治國所以平天下人君則必當如文王后妃則必當如太姒其原如此賀孫雎鳩毛氏以為摯而有别一家作猛摯説謂雎鳩是鶚之屬鶚自是沈鷙之物恐無和樂之意盖摯與至同言其情意相與深至而未嘗狎便見其樂而不淫之意此是興詩興起也引物以起吾意如雎鳩是摯而有别之物荇菜是潔浄和柔之物引此起興猶不甚逺其他亦有全不相類只借它物而起吾意者雖皆是興與關睢又畧不同也時舉古説關睢為王睢摯而有别居水中善捕魚説得來可畏當是鷹鸇之類做得勇武氣象恐后妃不然某見人説淮上有一般水禽名王睢雖兩兩相隨然相離每逺此説却與列女傳所引義合浩王鳩嘗見淮上人説淮上有之状如此間之鳩差小而長常是雌雄二箇不相失雖然二箇不相失亦不曽相近而立處須是隔丈來地所謂摯而有别也人未嘗見其乗居而匹處匹處謂兩箇同處也只是二箇相隨既不失其偶又未嘗近而相狎所以為貴也余正甫云宵行自是夜光之蟲夜行於地熠燿言其光耳非螢也􅉮今之苦藚賀孫卷耳問卷耳與前篇葛覃同是賦體又似畧不同盖葛覃直叙其所嘗經歴之事卷耳則是託言也曰亦安知后妃之不自采卷耳設使不曾經歴而自言我之所懐者如此則亦是賦體也若螽斯則只是比盖借螽斯以比后妃之子孫衆多宜爾子孫振振兮却自是説螽斯之子孫不是説后妃之子孫也盖比詩多不説破這意然亦有説破者此前數篇賦比興皆已備矣自此推之令篇篇各有著落乃好時舉因云螽只是春秋所書之螽竊疑斯字只是語辭恐不可把螽斯為名曰詩中固有以斯為語者如鹿斯之奔湛湛露斯之類是也然七月詩乃云斯螽動股則恐螽斯即便是名也時舉樛木問樛木詩樂只君子作后妃亦無害否曰以文義推之不得不作后妃若作文王恐太隔越了某所著詩傳盖皆推尋其脉理以平易求之不敢用一毫私意大抵古人道言語自是不泥著某云詩人道言語皆發乎情又不比他書曰然可學螽斯不妬忌是后妃之一節關睢所論是全體方子兎罝問兎罝詩作賦㸔得否曰亦可作賦㸔但其辭上下相應恐當為興然亦是興之賦可學漢廣問文王時紂在河北政化只行於江漢曰然西方亦有玁狁可學漢廣游女求而不可得行露之男不能侵陵正女豈當時婦人䝉化而男子則非亦是偶有此様詩説得一邊淳問漢之廣矣不可泳思江之永矣不可方思此是興何如曰主意只説漢有游女不可求思兩句六句是反復説如奕奕寝廟君子作之秩秩大猷聖人莫之他人有心予忖度之躍躍毚兎遇犬獲之上下六句亦只興出他人有心兩句賀孫詩傳今作興而比汝墳君舉詩言汝墳是已被文王之化者江漢是聞文王之化而未被其澤者却有意思麟趾問麟趾騶虞之詩莫是當時有此二物出來否曰不是只是取以為比云即此便是麟便是騶虞又問詩序説麟趾之時無義理曰此語有病木之時舉説雖衰世之公子皆信厚如麟趾之時似亦不成文理曰是時舉召南鵲巢問召南之有鵲巢猶周南之有關雎關雎言窈窕淑女則是明言后妃之徳也惟鵲巢三章皆不言夫人之徳如何曰鳩之為物其性専静無比可借以見夫人之徳也時舉采蘩問采蘋蘩以供祭祀采枲耳以備酒漿后妃夫人恐未必親為之曰詩人且是如此説徳明器之問采蘩何故存兩説曰如今不見得果是如何且與兩存從來説蘩所以生蠶可以供蠶事何必底死説道只為奉祭事不為蠶事木之問采蘩詩若只作祭事説自是曉然若作蠶事説雖與葛覃同類而恐實非也葛覃是女功采蘩是婦職以為同類亦無不可何必以蠶事而後同耶曰此説亦姑存之而已時舉殷其靁問殷其靁比君子于役之類莫是寛緩和平故入正風曰固然但正變風亦是後人如此分别當時亦只是大約如此取之聖人之言在春秋易書無一字虚至于詩則發乎情不同可學摽有梅問摽有梅何以入於正風曰此乃當文王與紂之世方變惡入善未可全責備可學問摽有梅之詩固出于正只是如此急廹何耶曰此亦是人之情嘗見晉宋間有怨父母之詩讀詩者於此亦欲達男女之情文蔚江有汜器之問江有汜序勤而無怨之説曰便是序不可信如此詩序自是兩三人作今但信詩不必信序只㸔詩中説不我以不我過不我與便自見得不與同去之意安得勤而無怨之意因問器之此詩召南詩如何公方㸔周南便又説召南讀書且要逐處沈潜次第理㑹不要班班剥剥指東摘西都不濟事若能沈潜専一㸔得文字只此便是治心養性之法木之何彼穠矣問何彼穠矣之詩何以録于召南曰也是有些不稳當但先儒相傳如此説也只得恁地就他説如定要分箇正經及變詩也自難考據如頌中儘多周公説話而風雅又未知如何賀孫雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等只是一句其語拙耳璘騶虞騶虞之詩盖于田獵之際見動植之蕃庶因以贊詠文王平昔仁澤之所及而非指田獵之事為仁也禮曰無事而不田曰不敬故此詩彼茁者葭仁也一發五豝義也必大仁在一發之前使庶類蕃殖者仁也一發五豝者義也人傑于嗟乎騶虞㸔來只可解做獸名以于嗟麟兮類之可見若解做騶虞官終無甚意思僴􅆁栢舟問汎彼栢舟亦汎其流注作比義㸔來與關關雎鳩在河之洲亦無異彼何以為興曰他下面便説淑女見得是因彼興此此詩纔説栢舟下面更無貼意見得其義是比時舉陳器之疑栢舟詩解日居月諸胡迭而㣲太深又屢辨賦比興之體曰賦比興固不可以不辨然讀詩者須當諷味㸔他詩人之意是在甚處如栢舟婦人不得於其夫冝其怨之深矣而其言曰我思古人實獲我心又曰静言思之不能奮飛其詞氣忠厚惻怛怨而不過如此所謂止乎禮義而中喜怒哀樂之節者所以雖為變風而繼二南之後者以此臣之不得於其君子之不得于其父弟之不得於其兄朋友之不相信處之皆當以此為法如屈原不忍其憤懐沙赴水此賢者過之也賈誼云歴九州而相其君兮何必懐此都也則又失之逺矣讀詩須合如此㸔所謂詩可以興可以觀可以羣可以怨是詩中一箇大義不可不理㑹得也閎祖器之問静言思之不能奮飛似猶未有和平意曰也只是如此説無過當處既有可怨之事亦須還他有怨底意思終不成只如平時却與土木相似只㸔舜之號泣旻天更有甚於此者喜怒哀樂但發之不過其則耳亦豈可無聖賢處憂患只要不失其正如緑衣言我思古人實獲我心這般意思却又分外好木之緑衣或問緑衣卒章我思古人實獲我心二句曰言古人所為恰與我合只此便是至善前乎千百世之已往後乎千百世之未來只是此箇道理孟子所謂得志行乎中國若合符節政謂是爾胡泳燕燕或問燕燕卒章戴媯不以荘公之已死而勉荘姜以思之可見温和惠順而能終也亦縁他之心塞實淵深所禀之厚故能如此曰不知古人文字之美詞氣温和義理精宻如此秦漢以後無此等語某讀詩於此數句讀書至先王肇修人紀從諌弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至於有萬邦茲惟艱哉深誦嘆之胡泳時舉説燕燕詩前三章但見荘姜拳拳于戴媯有不能己者及四章乃見荘姜于戴媯非是情愛之私由其有塞淵温惠之徳自能淑謹其身又能以先君之思而勉己以不忘則見戴媯平日于荘姜相勸勉以善者多矣故於其歸而愛之若此無非情性之正也先生頷之時舉日月終風又說日月終風二篇據集注云當在燕燕之前以某觀之終風當在先日月當次之燕燕是荘公死後之詩當居最後盖詳終風之辭荘公于荘姜猶有往来之時但不暴則狎荘姜不能堪耳至日月則見荘公已絶不顧荘姜而荘姜不免㣲怨矣以此觀之則終風當先而日月當次曰恐或如此時舉式㣲器之問式㣲詩以為勸耶戒耶曰亦不必如此㸔只是隨它當時所作之意如此便與存在也可以見得有羈旅狼狽之君如此而方伯連帥無救䘏之意今人多被止乎禮義一句泥了只管去曲説且要平心㸔詩人之意如北門只是説官卑禄薄無可如何又如摽有梅女子自言婚姻之意如此㸔來自非正理但人情亦自有如此者不可不知向見伯恭麗澤詩有唐人女言兄嫂不以嫁之詩亦自鄙俚可惡後來思之亦自是見得人之情處為父母者能於是而察之則必使之及時矣此所謂詩可以觀子升問麗澤詩編得如何曰大綱亦好但自據他之意揀擇大率多喜深巧有意者若平淡底詩則多不取問此亦有接續三百篇之意否曰不知他亦須有此意木之簡兮問簡兮詩張子謂其迹如此而其中固有以過人者夫能卷而懷之是固可以為賢然以聖賢出處律之恐未可以為盡善曰古之伶官亦非甚賤其所執者猶是先王之正樂故獻工之禮亦與之交酢但賢者而為此則自不得志耳時舉泉水問駕言出遊以冩我憂注云安得出遊于彼而冩其憂哉恐只是因思歸不得故欲出遊於國以冩其憂否曰夫人之遊亦不可輕出只是思遊於彼地耳時舉北門問北門詩只作賦説如何曰當作賦而比當時必因出北門而後作此詩亦有比意思可學問莫赤匪狐莫黑匪烏狐與烏不知詩人以比何物曰不但指一物而言當國将危亂時凡所見者無非不好底景象也時舉静女問静女注以為淫奔期㑹之詩以静為閒雅之意不知淫奔之人方相與狎溺又何取乎閒雅曰淫奔之人不知其為可醜但見其為可愛耳以女而俟人於城隅安得謂之閒雅而此曰静女者猶日月詩所謂徳音無良也無良則不足以為徳音矣而此曰徳音亦愛之之辭也時舉二子乘舟問二子乗舟注取太史公語謂二子與申生不明驪姬之過同其意似取之未知如何曰太史公之言有所抑揚謂三人皆惡傷父之志而終于死之其情則可取雖於理為未當然視夫父子相殺兄弟相戮者則大相逺矣時舉因説宣姜生衞文公宋桓夫人許穆夫人衞夀朔以此觀之則人生自有秉彛不係氣類燾干旄問文蔚彼姝者子指誰而言文蔚曰集傳言大夫乘此車馬以見賢者賢者言車中之人徳美如此我将何以告之曰此依舊是用小序説此只是傍人見此人有好善之誠曰彼姝者子何以告之盖指賢者而言也如此說方不費力今若如集傳説是説斷了再起覺得費力文蔚淇澳文蔚曰淇澳一篇衞武公進徳成徳之序始終可見一章言切磋琢磨則學問自修之功精宻如此二章言威儀服飾之盛有諸中而形諸外者也三章言如金鍚圭璧則煅煉以精温純深粹而徳器成矣前二章皆有瑟僴赫咺之詞三章但言寛綽戯謔而已於此可見不事矜持而周旋自然中禮之意曰說得甚善衞武公學問之功甚不苟年九十五嵗猶命羣臣使進規諫至如抑詩是他自警之詩後人不知遂以為戒厲王畢竟周之卿士去聖人近氣象自是不同且如劉康公謂民受天地之中以生便說得這般言語出文蔚君子陽陽君子陽陽先生不作淫亂說何如曰有箇君子于役如何别将這箇做一様說由房只是人出入處古人屋於房處前有壁後無壁所以通内所謂馬得諼草言樹之背蓋房之北也賀孫狡童兼論鄭詩鄭衞皆淫奔之詩風雨狡童皆是又豈是思君子剌忽忽愚何以為狡振經書都被人說壊了前後相仍不覺且如狡童詩是序之妄安得當時人民敢指其君為狡童况忽之所為可謂之愚何狡之有當是男女相怨之詩浩問狡童剌忽也古注謂詩人以狡童指忽而言前輩嘗舉春秋書忽之法且引碩䑕以況其義先生詩解取程子之言謂作詩未必皆聖賢則其言豈免小疵孔子刪詩而不去之者特取其可以為後戒耳琮謂鄭之詩人果若指斥其君目以狡童其疵大矣孔子自應刪去曰如何見得曰似不曾以狡童指忽且今所謂彼者它人之義也所謂子者爾之義也他與爾似非共指一人而言今詩人以維子之故使我不能餐兮為憂忽之辭則彼狡童兮自應别有所指矣曰却是指誰曰必是當時擅命之臣曰不與我言兮却是如何曰如祭仲賣國受盟之事國人何嘗與知琮因是以求碩䑕之義烏知必指其君而非指其任事之臣哉曰如此解經盡是詩序悞人鄭忽如何做得狡童若是狡童自㑹託婚大國而借其助矣謂之頑愚可也許多鄭風只是孔子一言斷了曰鄭聲淫如将仲子自是男女相與之辭却干祭仲共叔段甚事如褰裳自是男女相咎之辭却干忽與哭爭國甚事但以意推㸔狡童便見所指是何人矣不獨鄭風詩序大率皆然問每篇詩名下一句恐不可無自一句而下却似無用曰蘓氏有此說且如卷耳如何是后妃之志南山有臺如何是樂得賢甚至漢廣之詩寜闕是文王之道以下至求而不可得也尚自不妨却如徳廣所及也一句成甚説話又問大序如何曰其間亦自有鑿説處如言國史明乎得失之迹按周禮史官如大史小史内史外史其職不過掌書無掌詩者不知明得失之迹却干國史甚事曰舊聞先生不取詩序之說未能領受今聼一言之下遂活却一部毛詩琮江疇問狡童剌忽也言其疾之太重曰若以當時之暴斂於民觀之為言亦不為重盖民之於君聚則為君臣散則為仇讐如孟子所謂君之視臣如草芥則臣視君如冦讎是也然詩人之意本不如此何曾言狡童是剌忽而序詩者妄意言之致得人如此說聖人言鄭聲淫者盖鄭人之詩多是言當時風俗男女淫奔故有此等語狡童想說當時之人非刺其君也又曰詩辭多是出於當時鄉談鄙俚之語雜而為之如鴟鴞云拮据捋荼之語皆此類也又曰此言乃周公為之周公不知其人如何然其言皆聱牙難攷如書中周公之言便難讀如立政君奭之篇是也最好者惟無逸一書中間用字亦有譸張為幻之語至若周官蔡仲等篇却是官様文字必出於當時有司潤色之文非純周公語也又曰古人作詩多有用意不相連續如嘒彼小星三五在東釋者皆云小星者是在天至小之星也三五在東者是五緯之星應在於東也其言全不相貫卓問碩鼠狡童之刺其君不已甚乎曰碩鼠刺君重斂盖暴取虐民民怨之極則将視君如冦仇故發為怨上之辭至此若狡童詩本非是剌忽纔做剌忽便費得無限杜撰説話鄭忽之罪不至已甚往往如宋襄這般人大言無當有甚狡處狡童剌忽全不近傍些子若鄭突却是狡詩意本不如此聖人云鄭聲淫盖周衰惟鄭國最為淫俗故諸詩多是此事東萊将鄭忽深文詆斥得可畏賀孫曹云陳先生以此詩不是剌忽但詩人說他人之言如彼狡童兮不與我言兮㣲子之故使我不能餐兮言狡童不與我言則己之曰又去裏面添一箇休字也這只是鄭人當時淫奔故其言鄙俚如此非是為君言也卓鷄鳴問鷄鳴詩序却似不妨詩中却要理㑹其曰鷄既鳴矣朝既盈矣匪鷄則鳴蒼蠅之聲舊注謂夫人以蠅聲為鷄聲所以警戒所恃以感君聼者言有誠實而已今鷄本未鳴乃借蠅聲以紿之一夕偶然其君尚以為非信它夕其復敢言乎是曰莫是要作推托不肯起之意在否鄙見政謂是酬答之辭曰如此說亦可琮著問著是刺何人曰不知所刺但覺是親迎底詩古者五等之爵朝祭祀似皆以充耳亦不知是說何人親迎所說尚之以青黄素瓊瑶瑛大抵只是押韻如衞詩說良馬六此是天子禮衞安得而有之㸔來只是押韻不知古人充耳以瑱或用玉或用象不知是塞于耳中為復是塞在耳外㸔來恐只是以線穿垂在當耳處子䝉園有桃園有桃似比詩升卿蟋蟀問如蟋蟀之序全然鑿說固不在言然詩作于晉而風係於唐却須有說曰本是唐及居晉水方改號晉琮曰莫是周之班籍只有唐而無晉否曰文侯之命書序固稱晉矣曰書序想是紀事之詞若如春秋書晉之法乃在曲沃既命之後豈亦係詩之意乎曰恁地説忒𦂳恰似舉子做時文去蟋蟀自做起底詩山有樞自做到底詩皆人所自作升卿豳七月問豳詩本風而周禮籥章氏祈年於田祖則吹豳雅蜡祭息老物則吹豳頌不知就豳詩觀之其孰為雅孰為頌曰先儒因此說而謂風中自有雅自有頌雖程子亦謂然似都壊了詩之六義然有三說一說謂豳之詩吹之其調可以為風可為雅可為頌一說謂楚茨大田甫田是豳之雅噫嘻載芟豐年諸篇是豳之頌謂其言田之事如七月也如王介甫則謂豳之詩自有雅頌今既亡矣數說皆通恐其或然未敢必也道夫問古者改正朔如以建子月為首則謂之正月抑只謂之十一月曰此亦不可攷如詩之月數即今之月孟子七八月之間旱乃今之五六月十一月徒杠成十二月輿梁成乃今之九十月國語夏令曰九月成杠十月成梁即孟子之十一月十二月若以為改月則與孟子春秋相合而與詩書不相合若以為不改月則與詩書相合而與孟子春秋不相合如秦元年以十月為首末又有正月又似不改月義剛問東萊曰十月而曰改嵗三正之通于民俗尚矣周特舉而迭用之耳據詩如七月流火之類是用夏正一之日觱發之類是周正即不見其用商正而呂氏以為舉而迭用之何也曰周歴夏商其未有天下之時固用夏商之正朔然其國僻逺無純臣之義又自有私紀其時月者故三正皆曾用之也時舉無純臣語恐記誤問躋彼公堂稱彼兕觥民何以得升君之堂曰周初國小君民相親其禮樂法制未必盡備而民事之艱難君則盡得以知之成王時禮樂備法制立然但知為君之尊而未必知為國之初此等意思故周公特作此詩使之因是以知民事也時舉鴟鴞因論鴟鴞詩問周公使管叔監殷豈非以愛兄之心勝故不敢疑之耶曰若説不敢疑則已是有可疑者矣蓋周公以管叔是吾之兄事同一體今既克商使之監殷又何疑焉非是不敢疑乃是即無可疑之事也不知他自差異造出一件事周公為之奈何哉叔重因云孟子所謂周公之過不亦冝乎者正謂此也曰然時舉或問既取我子無毁我室解者以為武庚既殺我管蔡不可復亂我王室不知是如此否畢竟當初是管蔡挾武庚為亂武庚是紂子豈有父為人所殺而其子安然視之不報讐者曰詩人之言只得如此不成歸怨管蔡周公愛兄只得如此說自是人情是如此不知當初何故忽然使管蔡去監他做出一場大疎脱合天下之力以誅紂了却使出屋裏人自做出這一場大疎脫這是周公之過無可疑者然當初周公使管蔡者想見那時好在必不疑他後來有這様事管蔡必是被武庚與商之頑民每日将酒去灌啗它乗醉以語言離間之曰你是兄却出來在此周公是弟反執大權以臨天下管蔡獃想被這㡬箇唆動了所以流言說公将不利于孺子這都是武庚與商之頑民教他使得管蔡如此後來周公所以做酒誥丁寜如此必是當日因酒做出許多事其中間思煞有説話而今書傳只載得大槩其中更有㡬多機變曲折在僴東山問東山詩序前後都是只中間挿大夫美之一句便知不是周公作矣曰小序非出一手是後人旋旋添續往往失了前人本意如此類者多矣時舉詩曲盡人情方其盛時則作之于上東山是也及其衰世則作之於下伯兮是也燾破斧破斧詩㸔聖人這般心下詩人直是形容得出這是答東山之詩古人做事苟利國家雖殺身為之而不辭如今人箇箇計較利害㸔你四國如何不安也得不寜也得只是䕶了我斨我斧莫得闕壊了此詩説出極分明毛注却云四國是管蔡商奄詩裏多少處說四國如正是四國之類猶言四海他却不照這例自恁地說賀孫破斧詩須㸔那周公東征四國是皇見得周公用心始得這箇却是箇好話頭義剛問破斧詩傳何以謂被堅執銳皆聖人之徒曰不是聖人之徒便是盜賊之徒此語大槩是如此不必恁粘皮帶骨㸔不成說聖人之徒便是聖人且如孳孳為善是舜之徒然孳孳為善亦有多少淺深淳義剛録詳别出安卿問破斧詩傳云被堅執鋭皆聖人之徒似未可謂聖人之徒曰不是聖人之徒時便是賊徒公多年不相見意此來必有大題目可商量今却恁地如何做得工夫恁地細碎安卿因呈問目先生曰程子言有讀了後全然無事者有得一二句喜者到這一二句喜處便是入頭處如此讀将去将久自解踏著他關捩了倐然悟時聖賢格言自是句句好須知道那一句有契於心著實理㑹得那一句透如此推來推去方解有得今只恁地包罩說道好如喫物事相似事事道好若問那般較好其好是如何却又不知如此濟得甚事因云如破斧詩却是一箇好話頭而今却只去理㑹那聖人之徒便是不曉義剛先生謂淳曰公當初說破斧詩某不合截得𦂳了不知更有甚疑曰當初只是疑被堅執鋭是麄人如何謂之聖人之徒曰有麄底聖人之徒亦有讀書識文理底盜賊之徒淳破斧詩最是箇好題目大有好理㑹處安卿適來只說那一句沒𦂳要底淳曰此詩見得周公之心分明天地正大之情只被那一句礙了曰只泥一句便是未見得他意味淳九罭寛厚温柔詩教也若如今人説九罭之詩乃責其君之辭何處討寛厚温柔之意賀孫九罭詩分明是東人願其東故致願留之意公歸豈無所於汝但暫寓信宿耳公歸将不復來於汝但暫寓信處耳是以有衮衣兮是以兩字如今都不說盖本謂縁公暫至於此是以此間有被衮衣之人無以我公歸兮無使我心悲兮其為東人願留之詩豈不甚明白止縁序有刺朝廷不知之句故後之說詩者悉委曲附㑹之費多少辭語到底鶻突某嘗謂死後千百年須有人知此意自㸔來直是盡得聖人之心賀孫鴻飛遵渚公歸無所鴻飛遵陸公歸不復飛歸叶是句腰亦用韻詩中亦有此體方子狼䟦狼跋其胡載㚄其尾此興是反說亦有些意義略似程子之説但程子説得深如云狼性貪之類公孫碩膚如言幸虜營及北狩之意言公之被毁非四國之流言乃公自遜此大美爾此古人善於辭命處必大問公孫碩膚注以為此乃詩人之意言此非四國之所為乃公自讓其大美而不居耳盖不使䜛邪之口得以加乎公之忠聖此可見其愛公之深敬公之至云云㸔來詩人此意也回互委曲却大傷巧得來不好曰自是作詩之體當如此詩人只得如此說如春秋公孫于齊不成説昭公出奔聖人也只得如此書自是體當如此僴問公孫碩膚集傳之說如何曰魯昭公明是為季氏所逐春秋却書云公孫于齊如其自出云耳是此意必大二雅小雅恐是燕禮用之大雅須饗禮方用小雅施之君臣之間大雅則止人君可歌必大大雅氣象宏闊小雅雖各指一事說得精切至到嘗見古人工歌宵雅之三將作重事近嘗令孫子誦之則見其詩果是􅈤至如鹿鳴之詩見得賓主之間相好之誠如徳音孔昭以燕樂嘉賔之心情意􅈤切而不失義理之正四牡之詩古注云無公義非忠臣也無私情非孝子也此語甚切當如既云王事靡盬乂云不遑将母皆是人情少不得底説得􅈤切如皇皇者華即首云每懐靡及其後便須咨詢咨謀㸔此詩不用小序意義自然明白㽦鹿鳴諸篇問鹿鳴四牡皇皇者華三詩儀禮皆以為上下通用之樂不知為君勞使臣謂王事靡盬之類庶人安得而用之曰鄉飲酒亦用而大學始教宵雅肄三官其始也正謂習此盖入學之始須教他便知有君臣之義始得又曰上下常用之樂小雅如鹿鳴以下三篇及南有嘉魚魚麗南山有臺三篇風則是關睢卷耳采蘩采蘋等篇皆是然不知當初何故獨取此數篇也時舉常棣雖有兄弟不如友生未必其人實以兄弟為不如友生也猶言喪亂既平之後乃謂反不如友生乎盖疑而問之辭也時舉蘓宜又問常棣詩一章言兄弟之大畧二章言其死亡相收三章言其患難相救四章言不幸而兄弟有䦧猶能外禦其侮一節輕一節而其所以著夫兄弟之義者愈重到得喪亂既平便謂兄弟不如友生其於所厚者薄如此則亦不足道也六章七章就他逸樂時良心發處指出謂酒食備而兄弟有不具則無以共其樂妻子合而兄弟有不翕則無以久其樂盖居患難則人情不期而相親故天理常易復處逸樂則多為物欲所轉移故天理常隠而難尋所以詩之卒章有是究是圖亶其然乎之句反復玩味真能使人孝友之心油然而生也曰所謂生于憂患死于安樂那二章正是遏人欲而存天理須是恁地㸔胡泳聖人之言自是精粗輕重得宜呂伯恭常棣詩章説聖人之言大小高下皆宜而左右前後不相悖此句説得極好銖伐木問伐木大意皆自言待朋友不可不加厚之意所以感發之也曰然又問釃酒云縮酌用茅是此意否恐茅乃以酹曰某亦嘗疑今人用茅縮酒古人芻狗乃酹酒之物則茅之縮酒乃今以醡酒也想古人不肯用絹帛故以茅縮酒也幹問神之聼之終和且平曰若能盡其道於朋友雖鬼神亦必聼之相之而錫之以和平之福燾天保何福不除義如除戎器之除必大問如松柏之茂無不爾或承承是繼承相接續之謂如何曰松栢非是葉不凋但舊葉凋時新葉已生木犀亦然燾問天保上三章天以福鍚人君四章乃言其先君先王亦錫爾以福五章言民亦徧為爾徳則福莫大於此矣故卒章畢言之曰然幹時舉說第一章至第三章皆人臣頌祝其君之言然辭䌓而不殺者以其愛君之心無已也至四章則以祭祀先公為言五章則以徧為爾徳為言盖謂人君之徳必上無媿於祖考下無媿於斯民然後福禄愈逺而愈新也故末章終之以無不爾或承先生頷之叔重因云蓼蕭詩云令徳夀豈亦是此意盖人君必有此徳而後可以稱是福也曰然時舉采􅅔又説采􅅔首章略言征夫之出蓋以玁狁不可不征故舍其室家而不遑寜處二章則既出而不能不念其家三章則竭力致死而無還心不復念其家矣四章五章則惟勉於王事而欲成其戰伐之功也卒章則言其事成之後極陳其勞苦憂傷之情而念之也其序恐如此曰雅者正也乃王公大人所作之詩皆有次序而文意不苟極可玩味風則或出於婦人小子之口故但可觀其大畧耳時舉出車問先生詩傳舊取此詩與關雎詩論非天下之至静不足以配天下之至健處今皆削之豈亦以其太精巧耶曰正為後來㸔得如此故削去曰關雎詩今引匡衡說甚好曰呂氏亦引但不如此詳便見古人㸔文字亦寛博如此銖子善問詩畏此簡書簡書有二說一説簡書戒命也隣國有急則以簡書相戒命一說䇿命臨遣之詞曰後說為長當以後說載前前説只據左氏簡書同惡相恤之謂然此是天子戒命不得謂之隣國也又問胡不斾斾東萊以為初出軍時旌旗未展為卷而建之引左氐建而不斾故曰此旗何不斾斾而飛揚乎盖以命下之初我方憂心悄悄而僕夫憔悴亦若人意之不舒也曰此說精巧然胡不斾斾一句語勢似不如此胡不猶言遐不作人言豈不斾斾乎但我自憂心悄悄而僕夫又況瘁耳如此却自平正伯恭詩太巧詩正怕如此㸔古人意思自寛平何嘗如此纎細拘廹銖魚麗文武以天保以上治内采薇以下治外始於憂勤終於逸樂這四句儘說得好道夫南有嘉魚子善問南有嘉魚詩中汕汕字曰是以木葉捕魚今所謂魚花園是也問枸曰是機枸子建陽謂之皆拱子俗謂之癩漢指頭味甘而解酒毒有人家酒房一柱是此木而醖酒不成左右前後有此則亦醖酒不成節蓼蕭時舉說蓼蕭湛露二詩曰文義也只如此却更須要諷詠實見他至誠和樂之意乃好時舉六月六月詩既成我服不失机于三十里常度方律采芑時舉說采芑詩曰宣王南征蠻荆想不甚費力不曾大段戰鬭故只極稱其軍容之盛而已時舉車攻時舉說車攻吉日二詩先生曰好田臘之事古人亦多刺之然宣王之田乃是因此見得其車馬之盛紀律之嚴所以為中興之勢者在此其所謂田異乎尋常之田矣庭燎時舉說庭燎有煇曰煇火氣也天欲明而見其烟光相雜此是吴才老之說説此一字極有功也時舉斯干楊問横渠説斯干兄弟冝相好不要相學指何事而言曰不要相學不好處且如兄去友弟弟却不能恭其兄兄豈可學弟之不恭而遂亦不友為兄者但當盡其友可也為弟能恭其兄兄乃不友其弟為弟者豈可亦學兄之不友而遂忘其恭為弟者但當知其盡恭而已如冦萊公撻倒用印事王文正公謂他底既不是則不可學他不是亦是此意然詩之本意猶字作相圖謀說㝢載弄之瓦瓦紡磚也紡時所用之物舊見人畵列女傳漆室乃手執一物如今銀子様意其為紡磚也然未可必時舉節南山自古小人其初只是它自竊國柄少間又自不奈何引得别人來一齊不好了如尹氏太師只是它一箇不好少間到那𤨏瑣姻婭處是幾箇人不好了義剛秉國之均均本當從金所謂如泥之在鈞者不知鈞是何物時舉曰恐只是為瓦器者所謂車盤是也盖運得愈急則其成器愈快恐此即是鈞曰秉國之鈞只是此義今集傳訓平者此物亦惟平乃能運也時舉小弁問小弁詩古今説者皆以為此詩之意與舜怨慕之意同竊以為只我罪伊何一句與舜於我何哉之意同至後面君子秉心維其忍之與君子不惠不舒究之分明是怨其親却與舜怨慕之意似不同曰作小弁者自是未到得舜地位盖亦常人之情耳只我罪伊何上面說何辜于天亦一似自以為無罪相似未可與舜同日而語也問莫髙匪山莫浚匪泉君子無易由言耳屬于垣集傳作賦體是以上兩句興下兩句耶曰此只是賦盖以為莫髙如山莫浚如泉而君子亦不可易其言亦恐有人聞之也又曰㸔小雅雖未畢且併㸔大雅小雅後數篇大槩相似只消兼㸔因言詩人所見極大如巧言詩奕奕寝廟君子作之秩秩大猷聖人莫之他人有心予忖度之躍躍毚兎遇犬獲之此一章本意只是惡巧言䜛譛之人却以奕奕寝廟與秩秩大猷起興葢以其大者興其小者便見其所見極大形於言者無非義理之極致也時舉云此亦是先王之澤未冺理義根於其心故其形於言者自無非義理先生頷之時舉大東有饛簋飱有捄棘七詩傳云興也問似此等例却全無義理曰興有二義有一様全無義理炎東有啟明西有長庚庚續也啟明金星長庚水星金在西故日将出則東見水在日東故日将没則西見泳楚茨楚茨一詩精深宏博如何做得變雅方子問神保是饗詩傳謂神保是鬼神之嘉號引楚詞語思靈保兮賢姱但詩中既説先祖是皇又說神保是饗似語意重複如何曰近見洪慶善説靈保是巫今詩中不說巫當便是尸却是向來解錯了此兩字文蔚甫田子善問甫田詩志大心勞曰小序說志大心勞已是說他不好人若能循序而進求之以道則志不為徒大心亦何勞之有人之所期固不可不逺大然下手做時也須一步斂一步著實做始得若徒然心務髙逺而不下著實之功亦何益哉銖驕驕張王之意猶曰暢茂桀敖耳桀桀與驕驕之義同今田畆間莠㝡硬搶必大瞻彼洛矣問瞻彼洛矣洛水或云兩䖏曰只是這一洛有統言之有説小地名東西京共千里東京六百里西京四百里賀孫問韎韐有奭韎韐毛鄭以為祭服王氏以為戎服曰只是戎服左傳云有韎韋之跗注是也又曰詩多有酬酢應答之篇瞻彼洛矣臣歸美其君君子指君也當時朝㑹於洛水之上而臣祝其君如此裳裳者華又是君報其臣桑扈鴛鴦皆然賀孫車牽問烈女傳引詩辰彼碩女作展彼碩女先生以為然且云向来煞尋得方子賓之初筵或問賓之初筵詩是自作否曰有時亦是因酒之後作此自戒也未可知卓漸漸之石周家初興時周原膴膴堇荼如飴苦底物事亦甜及其衰也牂羊墳首三星在罶人可以食鮮可以飽直恁地蕭索文蔚大雅文王大雅非聖賢不能為其間平易明白正大光明㽦問周受命如何曰命如何受於天只是人與天同然觀周自后稷以來積仁累義到此時人心奔赴自有不可已又問太王翦商左氏云太伯不從是以不嗣莫是此意曰此事難明但太王居於夷狄之邦強大已久商之政令亦未必行於周大要天下公器所謂有徳者易以興無徳者易以亡使紂無道太王取之何害今必言太王不取則是武王為亂臣賊子若文王之事則分明是盛徳過人處孔子於泰伯亦云至徳可學文王詩直說出道理振帝命文王豈天諄諄然命之耶只文王要恁地便是理合如此便是帝命之也礪問先生解文王陟降在帝左右文王既沒精神上與天合㸔來聖人禀得清明純粹之氣其生也既有以異於人則其散也其死與天為一則其聚也其精神上與天合一陟一降在帝左右此又别是一理與衆人不同曰理是如此若道真有箇文王上上下下則不可若道詩人只胡亂恁地說也不可子䝉在帝左右察天理而左右也古注亦如此左氏傳天子所右寡君亦右之所左亦左之之意人傑馬節之問無遏爾躬曰無自遏絶於爾躬如家自毁國自伐蓋卿緜虞芮質厥成文王蹶厥生蹶動也生是興起之意當時一日之間虞芮質成而來歸者四十餘國其勢張盛一時見之如忽然跳起又曰麄說時如今人言軍勢益張義剛舊嘗見横渠詩傳中說周至太王辟國已甚大其所據有之地皆是中國與夷狄夾界所空不耕之地今亦不復見此書矣意者周之興與元魏相似初自極北起來漸漸強大到得後來中原無主被他取了廣棫樸問棫樸何以見文王之能官人曰小序不可信類如此此篇與前後數詩同為稱揚之辭作序者為見棫樸近箇人材底意思故云能官人也行葦序尤可笑第一章只是起興何與仁及草木以祈黄耈是願頌之詞如今人舉酒稱夀底言語只見有祈字便說是乞言㽦棫樸序只下能官人三字便晦了一篇之意楚茨等十來篇皆是好詩如何見得是傷今思古只被亂在變雅中便被後人如此想像如東坡說某處猪肉衆客稱美之意㽦倬彼雲漢為章於天周王夀考遐不作人先生以為無甚義理之興或解云云先生曰解書之法只是不要添字追琢其章者以金玉其相故也勉勉我王者以綱紀四方故也瑟彼玉瓉黄流在中豈弟君子福禄攸降此是比得齊整好者也璘詩無許多事大雅精宻遐是何字以彚雅得之又曰解詩多是推類得之方子遐不作人古注并諸家皆作逺字甚無道理禮記注訓胡字甚好人傑去偽録注云道隨事着也皇矣周人詠文王伐崇伐宻事皆以帝謂文王言之若曰此盖天意云爾文王既戡黎又伐崇伐宻已做得事勢如此只是尚不肯伐紂故曰至徳必大時舉説皇矣詩先生謂此詩稱文王徳處是從無然畔援無然歆羨上説起後面却説不識不知順帝之則見得文王先有這箇工夫此心無一毫之私故見於伐崇伐宻皆是道理合著恁地初非聖人之私怒也問無然畔援無然歆羨竊恐是說文王生知之資得於天之所命自然無畔援歆羨之意後面不識不知順帝之則乃是文王做工夫處曰然時舉下武昭茲來許漢碑作昭哉洪氏𨽻釋茲哉叶韻栢梁臺詩末句韻亦同方子文王有聲問鎬至豐邑止二十五里武王何故自豐遷鎬曰此只以後來事推之可見秦始皇營朝宫渭南史以為咸陽人多先王之宫庭小故作之想得遷鎬之意亦是如此周得天下諸侯盡來朝覲豐之故宫不足以容之爾廣生民生民詩是叙事詩只得恁地盖是叙那首尾要盡下武文王有聲等詩却有反復歌詠底意思義剛問履帝武敏曰此亦不知其何如但詩中有此語自歐公不信祥瑞故後人纔見說祥瑞皆闢之若如後世所謂祥瑞固多偽妄然豈可因後世之偽妄而併真實者皆以為無乎鳯鳥不至河不出圖孔子之言不成亦以為非廣時舉說履帝武敏歆攸介攸止處曰敏字當為絶句蓋作母鄙反叶上韻耳履巨跡之事有此理且如契之生詩中亦云天命𤣥鳥降而生商盖以為稷契皆天生之耳非有人道之感非可以常理論也漢髙祖之生亦類此此等不可以言盡當意㑹之可也時舉既醉時舉說既醉詩古人祝頌多以夀考及子孫衆多為言如華封人祝堯願聖人夀願聖人多男子亦此意曰此兩事孰有大於此者乎曰觀行葦及既醉二詩見古之人君盡其誠敬於祭祀之時極其恩義於燕飲之際凡父兄耆老所以祝望之者如此則其獲福也冝矣此所謂禍福無不自己求之者也先生頷之時舉子善問釐爾女士曰女之有士行者銖曰荆公作向后冊云唯昔先王釐厥士女士女與女士義自不同蘓子由曾論及曰恐它只是倒用了一字耳因言荆公誥詞中唯此冊做得極好後人皆學之不能及銖曰曾子固作皇太子冊亦放此曰子固誠是學它只是不及耳子固却是後面㡬箇誥詞好國朝之制外而三公三少内而皇后太子貴妃皆有冊但外自三公而下内自嬪妃而下皆聼其辭免一辭即免惟皇后太子用冊銖假樂干禄百福子孫千億是願其子孫之衆多穆穆皇皇冝君冝王不愆不忘率由舊章是願其子孫之賢道夫舜功問不愆不忘率由舊章是勿忘勿助長之意曰不必如此說不愆是不得過不忘是不得忘能如此則能率由舊章可學此詩末章則承上章之意故上章云四方之綱而下章即繼之曰之綱之紀盖張之為綱理之為紀下面百辟卿士至於庶民皆是頼君以為綱所謂不解於位者盖欲綱常張而不弛也時舉公劉問第二章說既庶既繁既順乃宣而第三章方言居邑之成不知未成邑之時何以得民居之繁庶也曰公劉始於草創而人從之者已若是其盛是以居邑由是而成也問第四章君之宗之處曰東萊以為為之立君立宗恐未必是如此只是公劉自為羣臣之君宗耳盖此章言其一時燕饗恐未說及立宗事也問徹田為糧處先生以為徹通也之說乃是横渠説然孟子考之只曰八家皆私百畆同養公田又公羊云公田不治則非民私田不治則非吏似又與横渠之說不同盖未必是計畆而分也又問此詩與豳七月詩皆言公劉得民之盛想周家自后稷以來至公劉始稍盛耳曰自后稷之後至於不窋盖已失其官守故云文武不先不窋至於公劉乃始復修其業故周室由是而興也時舉時舉說公劉詩鞞琫容刀注云或曰容刀如言容臭謂鞞琫之中容此刀也如何謂之容臭曰如今香囊是也時舉卷阿時舉說卷阿詩畢以為詩中凡稱頌人君之夀考福禄者必歸於得人之盛故既醉詩云君子萬年介爾景福而必曰朋友攸攝攝以威儀假樂詩言受天之禄與干禄百福而必曰率由羣匹與百辟卿士媚于天子盖人君所以致福禄者未有不自得人始也先生頷之時舉民勞時舉竊謂每章上四句是刺厲王下六句是戒其同列曰皆只是戒其同列鋪叙如此便自可見故某以為古人非是直作一詩以刺其王只陳其政事之失自可以為戒時舉因謂第二章末謂無棄爾勞以為王休盖以為王者之休莫大於得人惟羣臣無弃其功然後可以為王者之休羙至第三章後二句謂敬慎威儀以近有徳盖以為既能拒絶小人必須自反於已又不可以不親有徳之人不然則雖欲絶去小人未必有以服其心也後二章無俾正敗無俾正反尤見詩人憂慮之深盖正敗則惟敗壊吾之正道而正反則全然反乎正矣其憂慮之意盖一章切於一章也先生頷之時舉板昊天曰明及爾出王昊天曰旦及爾游衍旦與明祗一意這箇豈是人自如此皆有來處纔有些放肆他便知賀孫録云這裏若有些違理恰似天知得一般所以曰日監在茲又曰敬天之怒無敢戯豫敬天之渝無敢馳驅問渝字如何曰變也如迅雷風烈必變之變但未至怒道夫賀孫録同道夫言昨來所論昊天曰明云云至游衍此意莫祗是言人之所以為人者皆天之所為故雖起居動作之頃而所謂天者未嘗不在也曰公說天體物不遺既說得是則所謂仁體事而無不在者亦不過如此今所以理㑹不透祗是以天與仁為有二也今須将聖賢言仁處就自家身上思量久之自見記曰兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦爼序其禮樂備其百官如此而後君子知仁焉又曰賔入大門而奏肆夏示易以敬也卒爵而樂闋孔子屢嘆之道夫曰如此則是合正理而不紊其序便是仁曰恁地猜終是血脉不貫且反復熟㸔道夫時舉說板詩問天體物而不遺是指理而言仁體事而無不在是指人而言否曰體事而無不在是指心而言也天下一切事皆此心發見爾因言讀書窮理當體之於身凡平日所講貫窮究者不知逐日常見得在吾心目間否不然則隨文逐義趕趂期限不見悦處恐終無益時舉餘見張子書顃蕩時舉說首章前四句有怨天之辭後四句乃解前四句謂天之降命本無不善惟人不以善道自終故天命亦不克終如疾威而多邪僻也此章之意既如此故自次章以下托文王言紂之辭而皆就人君身上說使知其非天之過如女興是力爾徳不明與天不湎爾以酒匪上帝不時之類皆自發明首章之意先生頷之時舉抑抑非刺厲王只是自警嘗攷衞武公生於厲王末年安得有刺厲王之詩據國語只是自警詩中辭氣若作自警甚有理若作刺厲王全然不順伯恭却謂國語非是浩抑小序衞武公刺厲王亦以自警不應一詩既刺人又自警之理且厲王無道一旦被人言提其耳以小子呼之必不索休且厲王監謗暴虐無所不至此詩無限大過都不問著却只㸃檢威儀之末此決不然以史記考之武公即位在厲王死之後宣王之時說者謂是追刺尤不是伯恭主張小序又云史記不可信恐是武公必曾事厲王若以為武公自警之詩則其意味甚長國語云武公九十餘嵗作此詩其間匪我言耄可以為據又如謹而侯度注家云所以制侯國之度只是侯國之度耳曰喪厥國則是諸侯自謂無疑盖武公作此詩使人日夕諷誦以警已耳所以有小子告爾之類皆是箴戒作文之體自指耳後漢侯芭亦有此説㽦先生說抑詩煞好鄭謂東萊硬要做刺厲王縁以爾汝字礙曰如幕中之辨人反以汝為叛臺中之評人反以汝為傾等類亦是自謂古人此様多大抵他說詩其原生於不敢異先儒将詩去就那序被這些子礙便轉來穿鑿胡説更不向前來廣大處去或有兩三說則俱要存之如一句或為興或為比或為賦則曰詩兼備此體某謂既取興體則更不應又取比體既取比體則更不應又取賦體說狡童便引石虎事證且要有字不曵白南軒不解詩道詩不用解諸先生說好了南軒却易曉說與他便轉淳衛武公抑詩自作懿戒也中間有嗚呼小子等語自呼而告之也其警戒持循如是所以詩人美其如切如磋方雲漢問雲漢詩乃他人述宣王之意然責己處太少曰然可學崧髙問崧髙烝民二詩是皆遣大臣出為諸侯築城曰此也曉不得封諸侯固是大事㸔黍苗詩當初召伯帶領許多車從人馬去也自勞攘古人做事有不可曉者如漢築長安城都是去别處調發人來又只是數日便休詩云溥彼韓城燕師所完注家多說是燕安之衆某説即召公所封燕國之師不知當初何故不只教本土人築又須去别處發人來豈不大勞攘古人重勞民如此等事又却不然更不可曉強說便成穿鑿又曰㸔烝民詩及左傳國語周人説底話多有好處也是文武周公立學校教養得許多人所以傳得這些言語如烝民詩大故細膩劉子曰人受天地之中以生皆說得好䕫孫義剛録小異烝民問烝民詩解云仲山甫盖以冢宰兼太保何以知之曰其言式是百辟則是為宰相可知其曰保茲天子王躬是保則是為太保可知此正召康公之舊職廣仲山甫之徳柔嘉維則詩傳中用東萊呂氏説先生曰記得他甚主張那柔字文蔚曰他後一章云柔亦不茹剛亦不吐此言仲山甫之徳剛柔不偏也而二章首舉仲山甫之徳獨以柔嘉維則蔽之崧高稱申伯番番終論其徳亦曰柔惠且直然則入徳之方其可知矣曰如此則乾卦不用得了人之資禀自有柔徳勝者自有剛徳勝者如本朝范文正公冨鄭公輩是以剛徳勝如范忠宣范淳夫趙清獻蘓子容輩是以柔徳勝只是他柔却柔得好今仲山甫令儀令色小心翼翼却是柔但其中自有骨子不是一向如此柔去便是人㸔文字要得言外之意若以仲山甫柔嘉維則必要以此為入徳之方則不可人之進徳須用剛健不息文蔚既明且哲以保其身曰只是上文肅肅王命仲山甫将之邦國若否仲山甫明之便是明哲所謂明哲者只是曉天下事理順理而行自然災害不及其身可以保其禄位今人以邪心讀詩謂明哲是見㡬知㣲先去占取便宜如揚子雲說明哲煌煌旁燭無疆遜於不虞以保天命便是占便宜底說話所以它一生被這㡬句誤然明哲保身亦只是常法若到那舍生取義處又不如此論文蔚問既明且哲以保其身有些小委曲不正處否曰安得此只是見得道理分明事事處之得其理有可全之道便有委曲處亦是道理可以如此元不失正特不直犯之耳若到殺身成仁處亦只得死古人只是平說中庸無一理不明即是明哲若只見得一偏便有蔽便不能見得理盡便不可謂之明哲學至明哲只是依本分行去無一事不當理即是保身之道今人皆将私看了必至於孔光之徒而後已周頌清廟假以溢我當從左氏作何以恤我何遐通轉而為假也方子昊天有成命昊天有成命詩成王不敢康詩傳皆斷以為成王誦某問下武言成王之孚如何曰這箇且只得做武王説炎我将問我将乃祀文王於明堂之樂章詩傳以謂物成形於帝人成形於父故季秋祀帝於明堂而以父配之取其成物之時也此乃周公以義起之非古禮也不知周公以後将以文王配耶以時王之父配耶曰諸儒正持此二議至今不決㸔來只得以文王配且周公所制之禮不知在武王之時在成王之時若在成王則文王乃其祖也亦自可見又問繼周者如何曰只得以有功徳之祖配之僴敬之日就月将是日成月長就成也将大也節絲衣繹祭之明日也賔尸以賔客之禮燕為尸者敬仲魯頌泮水泮宫小序詩傳不取或言詩中既作泮宫則未必非修也直卿云此落成之詩佐閟宫太王翦商武王所言中庸言武王纉太王王季文王之緒是其事素定矣横渠亦言周之於商有不純臣之義盖自其祖宗遷豳遷岐皆其僻逺自居非商之所封土也楊商頌商頌簡奥方子伯豐問商頌恐是宋作曰宋襄一伐楚而已其事可攷安有莫敢不來王等事又問恐是宋人作之追述往事以祀其先代若是商時所作商尚質不應商頌反多於周頌曰商頌雖多如周頌覺得文勢自别周頌雖簡文自平易商頌之辭自是奥古非宋襄可作乂問頌是告于神明却魯頌中多是頌當時之君如戎狄是膺荆舒是懲僖公豈有此事曰是頌願之辭又問戎狄是膺荆舒是懲孟子引以為周公如何曰孟子引經自是不仔細又問或謂魯頌非三百篇之類夫子姑附於此耳曰思無邪一句正出魯頌㽦𤣥鳥問𤣥鳥詩吞卵事亦有此否曰當時恁地說必是有此今不可以聞見不及定其為必無淳長發湯降不遲聖敬日躋天之生湯恰好到合生時節湯之修徳又無一日間斷㽦朱子語類卷八十一
