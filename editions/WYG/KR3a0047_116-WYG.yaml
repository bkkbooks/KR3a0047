body:
  text: 朱子語類卷一百十六朱子十三訓門人四問平時處事當未接時見得道理甚分眀及做著又便錯了不知如何恁地曰這是難事但須是知得病痛處便去著力若是易為則天下有無數聖賢了以下訓義剛問打坐也是工夫否曰也有不要打坐底如果若之屬他最説打坐不是又問而今學者去打坐後坐得瞌睡時心下也大故定曰瞌睡時却不好問氣質昏䝉作事多悔有當下便悔時有過後思量得不是方悔時或經乆所為因事機觸得悔時方悔之際惘然自失此身若無所容有時恚恨至於成疾不知何由可以免此曰既知悔時第二次莫恁地便了不消得常常地放在心下那未見能見其過而内自訟底便是不悔底今若信意做去後蕩然不知悔固不得若既知悔後次改便了何必常常恁地悔淳録云既知悔便住了莫更如此做只管悔之又悔作甚世間只是這箇道理譬如晝日當空一念之間合著這道理則皎然眀白更無纎毫窒礙故曰天命之謂性不只是這處有處處皆有只是尋時先從自家身上尋起所以説性者道之形體也此一句最好盖是天下道理尋討將去那裏不可體驗只是就自家身上體驗一性之内便是道之全體千人萬人一切萬物無不是這道理不特自家有它也有不特甲有乙也有天下事都恁地書有合講處有不必講處如主一處定是如此了不用講只是便去下工夫不要放肆不要戯慢整齊嚴肅便是主一便是敬聖賢説話多方百面須是如此説但是我恁地説他箇無形無狀去何處證驗只去切已理㑹此等事乆自㑹得問説漆雕開章云云先生不應又説與㸃章云云先生又不應乆之却云公那江西人只管要理㑹那漆雕開與曾㸃而今且莫要理㑹所謂道者只是君之仁臣之敬父之慈子之孝便是而今只去理㑹言忠信行篤敬博學而篤志切問而近思仁在其中矣須是歩歩理㑹坐如尸便須要常常如尸立如齋便須要常常如齋而今却只管去理㑹那流行底不知是箇甚麽物事又不是打破一桶水隨科隨坎皆是義剛啟曰向時請問平生多悔之病蒙賜教謂第二畨莫為便了也不必常常存在胷中義剛固非欲悔但作一事時千思萬量若思量不透處又與朋友相度合下做時自謂做得圎密了及事纔過又便猛省著有欠缺處纔如此思著則便被氣動了志便是三兩日精神不定不知此病生於何處曰便是難便是難不能得到恰好處顔子仰之彌髙鑽之彌堅瞻之在前忽焉在後便是如此便是不能得見這箇物事定帖這也無著力處聖人教人但不過是博文約禮須是平時只管去講眀講眀得熟時後却解漸漸不做差了又問格物工夫至為浩大如義剛氣昏也不解泛然格得欲且將書細讀就上面研䆒義理如何曰書上也便有面前道理在義剛又言古人為學皆是自小得人教之有方所以長大来易入於道義剛日前只是習作舉業好書皆不曾講䆒而今驟收其放心覺用力倍難今欲将小學等書理㑹從洒掃應對進退禮樂書數射御從頭再理㑹起不知如何曰也只是事事致謹常常持飬莫教放慢了便是若是自家有箇操柄時便自不解到得十分走作了義剛啟曰半年得侍洒掃曲䝉提誨自此得免小人之歸但氣質昏䝉自覺易為流俗所遷今此之歸且欲閉門不出刻意讀書皆未知所向欲乞指示先生曰只杜門便是所向别也無所向只是就書上仔細玩味考䆒義理便是義剛之初拜先生也具述平日之非與所以逺来之意力求陶鑄及所以為學之序先生曰人不自訟則没奈何他今公既自知其過則講書窮理便是為學也無他陶鑄處問讀書以何者為先曰且将論語大學共㸔至是又請曰大學已㸔了先生解得分眀也無甚疑論語已㸔九篇今欲㸔畢此書更㸔孟子如何曰好孟子也分眀甚易㸔侍教半年仰蒙提誨自正月間㸔論語覺得略得入頭處先生所以教人只要逐章逐句理㑹不要揀擇敬遵眀訓但此畨歸去恐未便得再到侍下如語孟中設有大疑則無可問處今欲於此數月揀出頭叚来請教不知可否曰好先生問㬊淵平日如何做工夫㸔甚文字曰舊治春秋幷史書曰春秋如何㸔曰只用劉氏説㸔曰公數千里来見某其志欲如何曰既拜先生只從先生之教曰春秋是學者末後事惟是理明義精方見得春秋是言天下之事今不去理㑹身已上事却去理㑹天下之事到理㑹得天下事於身已上却不曾處置得所以學者讀書先要理㑹自己本分上事又言劉德脩向時章疏中説道學字用錯了先生因論德脩向時之事不合将許多條法與壽皇㸔暴露了被小人知之却做了脚手某以為大率若小人勢弱時節只用那虚聲便可恐得他去若小人勢盛時節便不可如此暴露被他先做脚手雖然德脩亦自好當時朝廷大故震動訓淵㬊亞夫將上趙子直黄文叔二書呈先生先生曰公有志於當世亦自好但若要從自家身上做将来須是捨其所已學從其所未學恪先生語㬊亞夫云亞夫歸去且須杜門安坐數年虚心玩味他義理教專與自家心契合若恁底時病痛自去義理自明大抵靜方可㸔義理佐須是靜方可為學謂亞夫曰公既歸可且杜門潛心數年方子蓋卿録云亞夫禀辭先生勉之曰歸後且杜門􅅗心二三年仍須虚心以讀書甲寅八月三日蓋卿以書見先生于長沙郡齋請隨諸生遇晚聽講是晚請教者七十餘人或問向䝉見教讀書須要涵泳須要浹洽因㸔孟子千言萬語只是論心七篇之書如此㸔是涵泳工夫否曰某為見此中人讀書大段鹵莽所以説讀書須當涵泳只要仔細尋繹令胷中有所得爾如吾友所説又襯貼一件意思硬要差排㸔書豈是如此又一士友曰先生涵泳之説乃杜元凱優而柔之之意曰固是如此亦不用如此解説所謂涵泳者只是仔細讀書之異名也大率與人説話便是難某只説一个涵泳一人硬来差排一人硬来解説此是隨語生解支離延蔓閒説閒講少間展轉只是添得多説得逺如此講書如此聽人説話全不是自做工夫全無巴鼻可知是使人説學是空談此中人所問大率如此好理㑹處不理㑹不當理㑹處却支離去説説得全無意思以下訓蓋卿蓋卿因言致知格物工夫既到然後應事接物始得其宜若工夫未到雖於應事接物之際未盡合宜亦只得隨時為應事接物之計也曰固是如此若學力未到時不成不去應事接物且如某在長沙時處之固有一箇道理今在路途道理又别人若學力未到其於應事接物之間且隨吾學力所至而處之善乎眀道之言曰學者全體此心學雖未盡若事物之来不可不應但隨分限應之雖不中不逺矣蓋卿禀辭且乞贈言先生曰逐日所相與言者宜著工夫不用重説曰尚得為逺謁函丈之計曰人事不可預期歸日宜一靣著實做工夫初見先生云某自到此與朋友亦無可説古人學問只是為己而已聖賢教人具有倫理學問是人合理㑹底事學者須是切己方有所得今人知為學者聽人説一席好話亦解開悟到切己工夫却全不曾做所以悠悠嵗月無可理㑹若使切己下工聖賢言語雖散在諸書自有箇通貫道理須實有見處自然休歇不得如人趁養家一般一日不去趁便受饑餓今人事無小大皆潦草過了只如讀書一事頭邊㸔得兩段便揭過後面或㸔得一二段或㸔得三五行殊不曾仔細理㑹如何㑹有益或問人講學不眀用處全差了曰不待酬酢應變時若學不切己自家一箇渾身自無處著雖三魂七魄亦不知下落何待用時方差坐間有言及傅子囦者曰人雖見得他偏見得他不是此邊却未有肯著力做自家工夫如何不為他所謾近世人大被人謾可笑見人胡亂一言一動便被降下了只縁自無工夫所以如此便又有不讀書之説可以誘人宜乎陷溺者多先生又云彼一般説話雖是説禪却能鞭逼得人緊後生於此邊既無所得一溺其説便把做件事做如何可回終竟他底不是愈傳愈壊了人或又云近世學者多躐等亦曰更有不及等人以下訓謙問謙曾與戴肖望相處如何曰亦只商量得舉子程文曰此是一厄人過了此一厄當理㑹學問今人過了此一厄又去理㑹應用之文作古文作詩篇亦是一厄須是打得破方得問為學工夫以何為先曰亦不過如前所説專在人自立志既知這道理辦得堅固心一味向前何患不進只患立志不堅只恁聽人言語㸔人文字終是無得於己或云須是做工夫方覺言語有益曰别人言語亦當仔細窮䆒孟子説我知言我善養吾浩然之氣知言便是窮䆒别人言語他自邪説何與我事被他謾過理㑹不得便有陷溺所謂生於其心害於其政作於其政害於其事盖謂此也德之㸔文字尖新如見得一路光眀便射從此一路去然為學讀書寧詳毋略寧近毋逺寧下毋髙寧拙毋巧若一向罩過不加仔細便㸔書也不分曉然人資質亦不同有愛趨髙者亦有好務詳者雖皆有得然詳者終是㸔得溥博浹洽又言大學等書向来人只説某説得詳如何不略説使人自致思此事大不然人之為學只是爭箇肯不肯耳他若無得不肯向這邊略亦不解致思他若肯向此一邊自然有味愈詳愈有意味生知之聖不待學而自至若非生知須要學問學問之先止是致知所知果致自然透徹不患不進謙請云知得須要踐履曰不眞知得如何踐履得若是眞知自住不得不可似他們只把来説過了又問今之言學者滿天下家誦中庸大學語孟之書人習中庸大學語孟之説䆒觀其實不惟應事接物與所學不相似而其為人舉足動歩全不類學者所為或做作些小氣象或專治一等議論專一欺人此豈其學使然歟抑踐履不至歟抑所學之非歟曰此何足以言學某與人説學問止是説得大槩要人自去下工譬如寳藏一般其中至寳之物何所不有某止能指與人説此處有寳若不下工夫自去討終是不濟事今人為學多是為名不肯切己某甚不滿於長沙士友胡季隨特地来一見却只要相閃不知何故南軒許乆與諸公商量到如今只如此是不切己之過寥兄請曰某逺来求教獲聽先生雅言至論退而涵泳發省甚多旅中只㸔得先生大學章句或問一過所以誨人者至矣為學入德之方無以加此敢不加心眀日欲别誨席更乞一言之賜曰他無説只是自下工夫便有益此事元不用許多安排等待所謂造次顛沛必於是也人只怕有悠悠之患廖復對曰學者之病多在悠悠極荷提䇿曰見得分曉便當下工夫時難得而易失不可只恁地過了蓋卿先生問前此得書甚要講學今有可説否自脩云適值先生去國匆匆不及欵承教誨曰自家莫匆匆便了訓自脩問平日工夫泳對理㑹時文先生曰時文中亦自有工夫請讀何書曰㸔大學以下訓泳説大學首章不當意先生説公讀書如騎馬不㑹鞭䇿得馬行撐船不㑹使得船動讀大學必次論孟及中庸兼㸔近思録先生曰書讀到無可㸔處恰好㸔先生與泳説㸔文字罷常且靜坐問而今㸔道理不出只是心不虚靜否曰也是不曾去㸔㑹㸔底就㸔處自虚靜這箇互相發以下訓䕫孫先生謂䕫孫云公既乆在此可将一件文字與衆人共理㑹立箇程限使敏者不得而先鈍者不得而後且如這一件事或是甲思量不得乙或思量得這便是朋友切磋之義䕫孫請所㸔底文字曰且将西銘㸔及㸔畢䕫孫依先生解説過先生曰而今解得分曉了便易㸔當初直是難説䕫孫請再㸔底文字索近思録披數板云也揀不得便漏了他底也不得遂云無極而太極而今人都想像有箇光眀閃爍底物事在那裏那不知本是説無這物事只是有箇理解如此動靜而已及至一動一靜便是隂陽一動一靜循環無端太極動而生陽亦只是從動處説起其實動之前又有靜靜之前又有動推而上之其始無端推而下之以至未来之際其卒無終自有天地便只是這物事在這裏流轉一日便有一日之運一月便有一月之運一嵗便有一嵗之運都只是這箇物事滚滚将去如水車相似一箇起一箇倒一箇上一箇下其動也便是中是仁其靜也便是正是義不動則靜不靜則動如人不語則黙不黙則語中間更無空處又如善惡不是善便是惡不是惡便是善聖人定之以中正仁義便是主張這箇物事葢聖人之動便是元亨其靜便是利貞都不是閒底動靜所謂繼天地之志述天地之事便是如此如知得恁地便生知得恁地便死知得恁地便消知得恁地便長此皆是繼天地之志隨地恁地進退消息盈虚與時偕行小而言之饑食渇飲出作入息大而言之君臣便有義父子便有仁此都是述天地之事只是這箇道理所以君子修之便吉小人悖之便凶這物事機關二下撥轉便攔他不住如水車相似才踏發這機更住不得所以聖賢兢兢業業一日二日萬幾戰戰兢兢至死而後知免大化恁地流行只得隨他恁地故曰存心養性所以事天也夭壽不貳修身以俟之所以立命也這與西銘都相貫穿只是一箇物事如云五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉便只是天地之塞吾其體天地之帥吾其性只是説得有詳畧緩急耳而今萬物到秋冬時各自歛藏便恁枯瘁忽然一下春来各自發生條暢這只是一氣一箇消一箇息那箇滿山青黄碧緑無非天地之化流行發見而今自家吃他著他受用他起居食息都在這裏離他不得所以仁者見之便謂之仁智者見之便謂之智無非是此箇物事繼之者善便似日日装添模様成之者性便恰似造化都無可做了與造化都不相關相似到得成之者性就那上流行出来又依前是繼之者善譬如榖既有个穀子裏靣便有米米又㑹生出来如果子皮裏便有核核裏便有仁那仁又㑹發出来人物莫不如此如人方其在胞胎中受那父母之氣則是繼之者善及其生出来便自成一箇性了便自㑹長去這後又是繼之者善只管如此仁者謂之仁便是見那發生處智者謂之智便是見那收歛處百姓日用而不知便是不知所謂發生亦不知所謂收歛醉生夣死而已周先生太極通書便只是滚這幾句易之為義也只是如此只是隂陽交錯千變萬化皆從此出故曰易有太極這一箇便生兩箇兩箇便生四箇四箇便生八箇八箇便生十六箇十六箇便生三十二箇三十二箇便生六十四箇故八卦定吉凶吉凶生大業聖人所以説出時只是使人不迷於利害之途耳少頃又舉誠幾德一章説云誠無為只是自然有實理恁地不是人做底都不曾犯手勢幾善惡便是心之所發處有箇善有箇惡了德便只是善底為聖為賢只是這材料做又舉第三大本達道章説云未發時便是那靜已發時便是那動方其靜時便是有箇體在裏了如這桌子未用時已有這桌子在了及其已發便有許多用一起一倒無有窮盡若靜而不失其體便是天下之大本立焉動而不失其用便是天下之達道行焉若其靜而或失其體則天下之大本便昏了動而或失其用則天下之達道便乖了説来説去只是這一箇道理䕫孫問云此箇道理孔子只説一隂一陽之謂道繼之者善成之者性都不曽分别出性是如何孟子乃分别出説是有此四者然又只是以理言到周先生説方始盡方始見得人必有是四者這四者亦有所附著先生曰孔子説得細膩説不曾了孟子説得麄疎畧只是説成之者性不曾從原頭推説来然其界分自孟子方説得分曉陳仲蔚因問龜山説知其理一所以為仁知其分殊所以為義仁便是體義便是用否曰仁只是流出来底義是合當做底如水流動處是仁流為江河匯為池沼便是義如惻隠之心便是仁愛父母愛兄弟愛鄉黨愛朋友故舊有許多等差便是義且如敬只是一箇敬到敬君敬長敬賢便有許多般様禮也是如此如天子七廟諸侯五廟這箇便是禮其或七或五之不同便是義禮是理之節文義便是事之所宜處吕與叔説天命之謂性云自斬而緦䘮服異等而九族之情無所憾自王公至皂𨽻儀章異制而上下之分莫敢爭自是天性合如此且如一堂有十房父子到得父各慈其子子各孝其父而人不嫌者自是合如此也其慈其孝這便是仁各親其親各子其子這便是義這箇物事分不得流出來便是仁仁打一動義禮智便隨在這裏了不是要仁使時義却留在後面少間放出來其實只是一箇道理論著界分便有許多分别且如心性情虚明應物知得這事合恁地那事合恁地這便是心當這事感則這理應當那事感則那理應這便是性出頭露面來底便是情其實只是一箇物事而今這裏略略動這三箇便都在仔細看來亦好則劇又舉邵子性者道之形體處曰道雖無所不在然如何地去尋討他只是囘頭來看都在自家性分之内自家有這仁義禮智便知得他也有仁義禮智千人萬人一切萬物無不是這道理推而廣之亦無不是這道理他説道之形體便是説得好林子武初到時先生問義剛云在何處安下曰未曾移入堂長房曰它便是有思量底蘇子容押花字常要在下面後有一人官在其上却挨得他花字向上面去他遂終身悔其初無思量不合押花字在下及包顯道等來遂命子武作堂長後竟不改義剛問承先生賜教讀書之法如今㸔来聖賢言行本無相違其間所以有可疑者只是不逐處研䆒得通透所以見得牴牾若真箇逐處逐節逐段見得精切少間却自到貫通地位曰固是如今若苟簡㸔過只一處便自未曾理㑹得了却要别生疑義徒勞無益訓木之慶元丁巳三月見先生於考亭先生曰甚荷逺来然而不是時節公初從何人講學曰少時從劉衡州問學曰見衡州如何曰衡州開眀大體使人知所向慕曰如何做工夫曰却是無下手處曰向来亦見廬陵諸公有問目之類大綱寛緩不是斬釘截鉄真箇可疑可問彼此只做一場話説休了若如此悠悠恐虚過嵗月某已前與朋友往来亦是如此後来欽夫説道凡肯向此者吾二人只如此放過了不特使人汎然来行一遭便道我曾從某人處講論一向胡説反為人取笑亦是壊了多少好氣質底若只悠悠地去可惜今後須是截下㸔晚年要成就得一二人不妨是吾軰事業自後相過者這直是不放過也祖道又曰頃年亦嘗見陸象山先生笑曰這却好商量公且道象山如何曰象山之學祖道曉不得更是不敢學曰如何不敢學曰象山與祖道言目能視耳能聽鼻能知香臭口能知味心能思手足能運動如何更要甚存誠持敬硬要将一物去治一物須要如此做甚詠歸舞雩自是吾子家風祖道曰是則是有此理恐非初學者所到地位象山曰吾子有之而必欲外鑠以為本可惜也祖道曰此恐只是先生見處今使祖道便要如此恐成猖狂妄行蹈乎大方者矣象山曰纒遶舊習如落陷穽卒除不得先生曰陸子靜所學分眀是禪又曰江西人大抵秀而能文若得人㸃化是多少眀快蓋有不得不任其責者然今黨事方起能無所畏乎忽然被他来理㑹礙公進取時如何曰此是自家身已上進取何足議曰可便遷入精舎以下訓祖道先生謂祖道曰讀書且去鑽研求索及反覆認得時且䝉頭去做乆乆須有功效吾友㸔文字忒快了却不沉濳見得他仔細意思莫要一領他大意便去摶摸此最害事且熟讀就他注解為他説一畨説得行時却又為他精思乆乆自落窠臼略知瞥見便立見解終不是實恐他時無把捉虚費心力問進德之方曰大率要修身窮理若修身上未有工夫亦無窮理處問修身如何曰且先收放心如心不在無下手處要去體察爾平昔用心是為己為人若讀書計較利禄便是為人資禀純厚者須要就上面做工夫問如何曰人生與天地一般無些欠缺處且去仔細㸔秉彛常性是如何将孟子言性善處㸔是如何善須精細㸔来一日拜别先生曰歸去各做工夫他時相見却好商量也某所解語孟和訓詁注在下面要人精粗本末字字為咀嚼過此書某自三十嵗便下工夫到而今改猶未了不是草草㸔者且歸仔細曾兄問讀大學已知綱目次第了然大要用工夫恐在敬之一字前見伊川説敬以直内義以方外處先生曰能敬以直内矣亦須義以方外能知得是非始格得物不以義方外則是非好惡不能分别物亦不可格又問恐敬立則義在其中伊川所謂弸諸中彪諸外是也曰雖敬立而義在也須認得實方見得今有人雖胷中知得分明説出来亦是見得千了百當及應物之時顛倒錯謬全是私意亦不知聖人所謂敬義處全是天理安得有私意今釋老能立箇門户恁地亦是它從旁窺得近似他所謂敬時亦却是能敬更有箇笠影之喻某嘗喜那鈍底人他若是做得工夫透徹時極好却煩惱那敏底只是略綽㸔過不曾深去思量當下説也理㑹得只是無滋味工夫不耐乆如荘仲便是如此某嘗煩惱這様底少間不濟事敏底人又却要做那鈍底工夫方得以下訓僴問尋常遇事時也知此為天理彼為人欲及到做時乃為人欲引去事已却悔如何曰此便是無克己工夫這様處極要與他掃除打叠方得如一條大路又有一條小路眀知合行大路然小路面前有箇物引著自家不知不覺行從小路去及至前面荆棘蕪穢又却生悔此便是天理人欲交戰之機須是遇事之時便與克下不得苟且放過此須明理以先之勇猛以行之若是上智聖人底資質不用著力自然存天理而行不流於人欲若賢人資質次於聖人者到遇事時固不㑹錯只是先也用分别教是而後行之若是中人之資質須大段著力無一時一刻不照管克治始得曾子曰仁以為己任不亦重乎死而後已不亦逺乎又曰戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子直是恁地用功方得問每日做工夫處曰每日做工夫只是常常喚醒如程子所謂主一之謂敬謝氏所謂常惺惺法是也然這裏便有致知底工夫程子曰涵養須用敬進學則在致知須居敬以窮理若不能敬則講學又無安頓處問色容莊持乆甚難曰非用功於外也心肅而容荘問若非聖人説下許多道理則此身四肢耳目更無安頓處曰然古人固嘗言之非禮則耳目手足無所措道理極是細膩公們心都麄大入那細底不得公而今只是説他人短長都不自反已㸔如公適間説學者来此不講誦蚤来莫去是理㑹甚事自初来至去是有何所得聽得某説話有何警發每日靠甚麽做本從那裏做去公却㑹説得箇頭勢如此大及至末梢又却只是檢㸃他人某事某事元未有緊要那人亦如何服公説且去理㑹自己身心煞有事在今公掀然有飛揚之心以為治國平天下如指諸掌不知自家一箇身心都安頓未有下落如何説功名事業怎生治人古時英雄豪傑不如此張子房不問著他不説諸葛孔眀甚麽様端嚴公浙中一般學是學為英雄之學務為跅弛豪縱全不㸃檢身心某這裏須是事事從心上理㑹起舉止動歩事事有箇道理一毫不然便是欠闕了他道理固是天下事無不當理㑹只是有先後緩急之序須先立其本方以次推及其餘今公們學都倒了緩其所急先其所後少間使得這身心飛揚悠逺全無收拾處而今人不知學底他心雖放然猶放得近今公雖曰知為學然却放得逺少間㑹失心去不可不覺讀書之法既先識得他外靣一箇皮殻了又須識得他裏面骨髄方好如公㸔詩只是識得箇模像如此他裏面好處全不見得自家此心都不曾與他相黏所以眊燥無汁漿如人開溝而無水如此讀得何益未論讀古人書且如一近世名公詩也須知得他好處在那裏如何知得他好處亦須吟哦諷詠而後得之今人都不曾識好處也不識不好處也不識不好處以為好者有之矣好者亦未必以為好也其有知得某人詩好某人詩不好者亦只是見已前人如此説便承虚接響説取去如矮子㸔戯相似見人道好他也道好及至問著他那裏是好處元不曾識舉世皆然只是不曾讀熟讀後自然見得人而不為周南召南其猶正牆面而立也歟今公讀二南了還能不正墻面而立否意思都不曾相黏濟得甚事前日所舉韓退之蘇眀允二公論作文處他都是下這般工夫實見得那好處方做出這般文章他都是將三代以前文字熟讀後故能如此如向者吕子約書来説近来㸔詩甚有味録得一冊来書是冩他讀詩有得處及觀之盡是説詩序如關睢只是説一箇后妃之德也葛覃只是説得箇后妃之本與化天下以婦道也自關關睢鳩葛之覃兮已下更不説著如此讀詩是讀箇甚麽吕伯恭大事紀亦是如此盡是編排詩序書序在上面他們讀書盡是如此草草以言事則不實以立辭則害意問鳶飛魚躍南軒云鳶飛魚躍天地之中庸也曰只㸔公如此説便是不曾理㑹得了莫依傍他底説只問取自家是真實見得不曾自家信是信得箇甚麽這箇道理精粗小大上下四方一齊要著到四邊合圍起理㑹莫令有些子走透少間方從一邊理㑹得些小有箇見處有箇入頭處若只靠一邊去理㑹少間便偏枯了尋捉那物事不得若是如此悠悠只從一路去攻擊他而又不曾著力何益於事李敬子曰覺得已前都是如此悠悠過了曰既知得悠悠何不便莫要悠悠便是覺意思都不曾痛切每日㸔文字只是輕輕地拂過寸進尺退都不曾依傍築磕舂那物事来此間説時旋紐揑湊合説得些小才過了又便忘了或他日被人問起又遂旋紐揑説得些小過了又忘記了如此濟得甚事早間説如負痛相似因言持敬如書所云若一疾如此方謂之持敬如人負一箇大痛念念在此日夜求所以去之之術理㑹這一件物須是徹頭徹尾全文記得始是如此末是如此中間是如此如此謂之是如此謂之非須是理㑹教透徹無些子疑滯方得若只是如此輕輕拂過是濟甚事如兩軍厮殺兩邊擂起鼓了只得􅂸命進前有死無二方有箇生路更不容放慢若纔放慢便被他殺了友仁初參拜畢出疑問一􅁽皆大學語孟中庸平日所疑者先生畧顧之謂友仁曰公今須是逐一些仔細理㑹始得不可如此鹵莽公之意自道此是不曉者故問然其他不問者恐亦未必是豈能便與聖賢之意合須是理㑹得底也来整理過方可以下訓友仁問邦畿千里惟民所止曰此是大率言物各有所止之處且如公其心雖止得是其迹則未在心迹須令為一方可豈有學聖人之道服非法之服享非禮之祀者程先生謂文中子言心迹之判便是亂説者此也友仁曰舎此則無資身之䇿曰君子謀道不謀食豈有為人而憂此者先生曰公向道甚切也曾學禪来曰非惟學禪如老荘及釋氏教典亦曾渉獵自説法華經至要處乃在是法非思量分别之所能解一句先生曰我這裏正要思量分别能思量分别方有豁然貫通之理如公之學也不易因以手指書院曰如此屋相似只中間潔淨四邊也未及未能博學便要約禮窮理處不曾用功守約處豈免有差若差之毫忽便有不可勝言之弊又顧同舎曰德元却於此理見得彷彿惜乎不曾多讀得書却謂友仁曰更須痛下工夫讀書始得公今所㸔大學或問格物致知傳程子所説許多説話都一一記得方有可思索玩味張問先生論語或問甚好何故不肯刋行曰便是不必如此文字儘多學者愈不將做事了只㸔得集注儘得公還盡記得集注説話否非惟集注恐正文亦記不全此皆是不曾仔細用工夫且如邵康節始學於百原堅苦刻厲冬不爐夏不扇夜不就席者有年公們曾如此否論語且莫説别處只如説仁處這裏是如此説那裏是如此説還㑹合得否友仁曰先生有一處解仁字甚曉然言仁者人心之全德必欲以身體而力行之可謂重矣一息尚存此志不容少懈可謂逺矣先生不應次日却問公昨夜所舉解仁説在何處曰在曾子言仁以為己任章先生曰德元㸔文字却能記其𦂳要處有萬千人㸔文字者却不能於𦂳要處理㑹只於𤨏細處用工前日他問中庸或問不一其内無以制其外不齊其外無以養其中靜而不存無以立其本動而不察無以勝其私此皆是切要處學者若能於切要處做工夫又於細微處不遺闕了乆之自然有得拜辭先生曰公識性明精力短每日文字不可多㸔又記性鈍但用功不輟自有長進矣因誨郭兄云讀書者當将此身𦵏在此書中行住坐卧念念在此誓以必曉徹為期㸔外面有甚事我也不管只恁一心在書上方謂之善讀書若但欲来人面前説得去不求自熟如此濟得甚事須是著起精神字字與他㸔過不惟念得正文注字要自家暗地以俗語解得方是如今自家精神都不曾與書相入念本文注字猶記不得如何曉得卓僴同讀書須立下硬寨定要通得這一書方㸔第二書若此書既曉未得我寧死也不㸔那箇如此立志方成工夫郭得元言記書不得曰公不可欲速且讀一小段若今日讀不得眀日又讀眀日讀不得後日又讀須被自家讀得若只記得字義訓釋或其中有一兩字漏落便是那腔子不曾填得滿如一箇物事欠了尖角處相似少間自家做出文字便也有所欠缺不成文理嘗見蕃人及武臣文字常不成文理便是如此他心中也知得要如此説只是字義有所欠缺下得不是這箇便是不得於言勿求於心之患是他心有所蔽故如此司馬遷史記用字也有下得不是處賈誼亦然如治安䇿説教太子處云太子少長知妃色則入於學這下面承接便用解説此義忽然掉了却説上學去云學者所學之官也又説帝入東學上親而貴仁一段了却方説上太子事云及太子既冠成人免於保傅之嚴云云都不成文義更無段落他只是乗才快胡亂冩去這般文字也不可學董仲舒文字却平正只是仄困董仲舒匡衡劉向諸人文字皆善弱無氣燄司馬遷賈生文字雄豪可愛只是逞快下字時有不稳處段落不分眀匡衡文字却細密他㸔得經書極仔細能向裏做工夫只是做人不好無氣節仲舒讀書不如衡仔細疎略甚多然其人純正開闊衡不及也又曰荀子云誦數以貫之思索以通之誦數即今人讀書記遍數也古人讀書亦如此只是荀卿做得那文字不帖律處也多僴郭得元告行先生曰人若於日間閒言語省得一兩句閒人客省見得一兩人也濟事若渾身都在閙場中如何讀得書人若逐日無事有見成飯喫用半日靜坐半日讀書如此一二年何患不進僴朱子語類卷一百十六
