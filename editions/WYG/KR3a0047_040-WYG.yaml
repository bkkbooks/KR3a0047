body:
  text: 朱子語類卷四十論語二十二先進篇下季子然問仲由冉求章問據賀孫看來仲由冉求氣質不同恐冉求未必可保仲由終是不屈曰不要論他氣質只這君臣大義他豈不知聖人也是知他必可保然死於禍難是易事死於不可奪之節是難事才出門去事君這身已便不是自家底所謂事君能致其身是也如做一郡太守一邑之宰一尉之任有盗賊之虞這不成休了便當以死守之亦未為難惟卒遇君臣大變利害之際只争些子這誠是難今處草茅説這般事似未為切已看史䇿所載簒易之際直是難處簒弑之賊你若不從他他便殺了你你從他便不死既是貪生惜死何所不至賀孫問孔門弟子如由求皆仕於季氏何也曰只仕便是病了儘髙底便不肯仕如閔子曾子是也但當時不仕則已仕則必出於季氏盖當時魯君用舍之權皆歸於季氏也又問子路未易屈者當時亦仕於季氏盖他雖不能行其道亦稍知尊敬之曰説道他尊敬不得才不當仕時便教他尊敬也不當仕次日見先生先生又曰夜來説尊敬話這處認不得當下便做病而今説被他敬去仕他若是箇賊來尊敬自家自家還從他不從他但看義如何耳䕫孫因説仕於季氏之門者仲弓為季氏宰亦未是叛臣只是乗魯之弱招權聚財歸已而已然終不敢簒如曺操故昭公出許多時季氏卒不敢取至於三卿分晉亦必俟天子之命乃安只是當時魯君自做不行弱則常如此强則為昭公若孔子處之則必有道矣如墮三都是乗他要墮而墮之三都墮而三家之所恃者失矣故其勢自弱如羅崇勲殺牙兵初惡其為亂既殺之又自弱璘因言三家自不相能如門雞之事可見曰三家急之則合緩之又自不相能璘問以道事君不可則止忠告而善道之不可則止張子韶解此謂當其微有不可則隨即止之無待其事之失過之形而後用力以止之也曰子韶之説不通與上下文義不相貫近世學者多取此説愛其新竒而不察其不當於理此甚害事不可不知也謨子路使子羔為費宰章問何必讀書然後為學曰子路當初使子羔為費宰意不知如何本不是如此只犬言來荅故孔子惡其佞問此恐失之偏否曰亦須是講學方可如此做左𫝊子産説學而後從政未聞以政學一段説得好如子路却是以政學者也淳子路曾晳冉有公西華侍坐章讀曾晳言志一章曰此處正要理會如子路説比及三年可使有勇冉有云可使足民不知如何施設得便如此曾晳意思固是髙逺須是看他如何得如此若子細體認得這意思分明令人消得無限利禄鄙吝之心須如此看方有意味時舉冉求公西赤言皆退讓却是見子路被哂後計較如此説子路是真此四人氣象好看升卿曾㸃之志如鳯凰翔於千仭之上故其言曰異乎三子者之撰道夫曾㸃是見他箇道理大原了只就眼前景致上説將去其行有不掩者是他先見得大了自然是難掩廣曾㸃見得事事物物上皆是天理流行良辰美景與幾箇好朋友行樂他看那幾箇説底功名事業都不是了他看見日用之間莫非天理在在處處莫非可樂他自見得那春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸處此是可樂天理植林恭甫問浴沂事曰想當時也真是去浴但古人上已祓禊只是盥濯手足不是觧衣浴也義剛恭甫問曾㸃詠而歸意思如何曰曾㸃見處極髙只是工夫踈畧他狂之病處易見却要看他狂之好處是如何縁他日用之間見得天理流行故他意思常恁地好只如莫春浴沂數句也只是畧畧地説將過又曰曾㸃意思與莊周相似只不至如此跌蕩荘子見處亦髙只不合將來玩弄了時舉敬之又問曾㸃章曰都不待着力説只是他見得許多自然道理流行發見眼前觸處皆是㸃但舉其一事而言之耳只看他鼓瑟希鏗爾舍瑟而作從容優裕悠然自得處無不是這箇道理此一段都是這意思今人讀之只做等閒説了當時記者亦多少子細曾㸃見子路冉有公西華幾箇所對都要着力出来做他肚裡自覺得不足為若以次對當於子路對後便問他聖人見他鼓瑟意思恁地自得且問從别人上去待都説了却問他又曰這道理處處都是事父母交朋友都是這道理接賔客是接賔客道理動静語黙莫非道理天地之運春夏秋冬莫非道理人之一身便是天地只縁人為人欲隔了自看此意思不見如曾㸃却被他超然看破這意思夫子所以喜之日月之盈縮晝夜之晦明莫非此理賀孫曾㸃之志夫子當時見他髙於三子故與之要之觀夫子不知所以裁之之語則夫子正欲共他理會在道夫曾㸃言志當時夫子只是見他説幾句索性話令人快意所以與之其實細宻工夫却多欠闕便似荘列如季武子死倚其門而歌打曾參仆地皆有些狂恠人傑恭父問曾㸃説詠而歸一段恐是他已前實事因舉以見志曰他只是説出箇意思要如此若作已前事説亦不可知人只見説曽㸃狂看夫子特與之之意須是大段髙縁他資質明敏洞然自見得斯道之體看天下甚麽事能動得他他大綱如莊子明道亦稱莊子云有大底意思又云莊生形容道體儘有好處邵康節晚年意思正如此把造物世事都做雜劇看曾㸃見得大意然裏面工夫却踈畧明道亦云荘子無禮無本賀孫或問如或知爾則何以哉待諸子以可用對而曾㸃獨不荅所問夫子乃許之何也曰曾㸃意思見得如此自與諸子别看他意思若做時上面煞有事在或問如何煞有事曰曾㸃見得如此時若子路冉求公西華之所為曾㸃為之有餘又曰只怕曾㸃有荘老意思或問曾㸃是實見得如此還是偶然説著曰這也只是偶然説得如此他也未到得便做荘老只怕其流入於荘老又問東萊説曾㸃只欠寛以居之這是如何曰他是太寛了却是工夫欠細宻因舉明道説康節云堯夫豪傑之士根本不貼貼地又曰今人却怕做莊老却不怕做管商可笑賀孫問夫子令四子言志故三子皆言用夫子卒不取而取無用之曾㸃何也曰三子之志趣皆止於所能而曾㸃氣象又大志趣又别極其所用當不止此也又曰曾㸃雖是如此於用工夫處亦欠細宻卓子路曾晳等言志觀其所對只住在所做工夫上故聖人與㸃又以進諸子如告子路何足以臧亦此意端蒙問四子言志曰曾㸃與三子只是争箇粗細曾㸃與漆雕閒只是争箇生熟曾㸃説得驚天動地開較穏貼三子在孔門豈是全不理會義理只是較粗不如曾㸃之細又曰子路使民非若後世之孫吳冉有足民非若後世之管商子路品格甚髙若打疉得些子過謂麄暴便是曾㸃氣象升卿曾㸃於道見其逺者大者而視其近小皆不足為故其言超然無一毫作為之意唯欲樂其所樂以終身焉耳道夫敬之問曾㸃言志見得天理流行獨於其間認取這許多作自家受用曰不用恁地説曾㸃只是見得許多都是道理發見觸處是道理只縁這道理本來到處都是賀孫或問曾㸃之言如何曰公莫把曾㸃作面前人看縱説得是也無益須是自家做曾㸃便見得曾㸃之心學䝉問曾㸃浴沂氣象與顔子樂底意思相近否曰顔子底較恬静無許多事曾㸃是自恁説却也好若不已便成釋老去所以孟子謂之狂顔子是孔子稱他樂他不曾自説道我樂大凡人自説樂時便已不是樂了淳或問曾晳言志既是知得此樂便如顔子之樂同曾晳行又不掩何也曰程子説曾㸃漆雕開已見大意他只是見得這大綱意思於細宻處未必便理㑹得如千兵萬馬他只見得這个其中隊伍未必知如佛氏不可謂他無所見但他只見得箇大渾淪底道理至於精細節目則未必知且君臣父子夫婦兄弟他知道理發出來然至為人君止於仁為人臣止於敬為人子止於孝之類却未必知也植林正卿問曾㸃只從髙處見破却不是次第做工夫來曰某以為頗與荘列之徒相似但不恁地跌蕩耳又問曾㸃漆雕開已見大意開却實用工夫曰開覺得細宻恪漢卿舉叔重疑問曰曾㸃已見大意但是他無細宻工夫或謂㸃曾做工夫而未至如何曰且只理會曾㸃如何見得到這裏不須料度他淺深徒費心思也人傑或問曾晳曰是他見得到日用之間無非天理流行如今便是不能得恁地充其見便是孔子老者安之朋友信之少者懐之意思聖賢做出便只是這箇物事更不用安排如今將文字看也説得是如此只是做不能得恁地漢卿再請前所問必有事焉䝉教曰人須常常收歛此心但不可執持太過便倒塞了然此處最難畧看差了便是禅此意如何曰這便是難言正淳謂云云先生曰固是如此便是難學者固當尋向上去只是向上去便怕易差只吾儒與禅家説話其深處止是毫忽之争到得不向上尋又只畫住在淺處須是就源頭看若理㑹得只是滔㴞地去如操舟尋得大港水脉便一直溜去不問三尺船也去得五尺船也去得一丈二丈船也去得若不就源頭尋得只三五尺船子便只閣在淺處積年過代無縁得進賀孫先生令叔重讀江西嚴時亨歐陽希遜問目皆問曾㸃言志一段以為學之與事初非二致學者要須􅉼飬到清明在躬志氣如神之地則無事不可為也先生曰此都説得偏了學固着學然事亦豈可廢也若都不就事上學只要便如曾㸃様快活將來却恐狂了人去也學者要須常有三子之事業又有曾㸃襟懐方始不偏盖三子是就事上理會曾㸃是見得大意曾㸃雖見大意却少事上工夫三子雖就事上學又無曾㸃底脱洒意思若曾子之學却與曾㸃全然相反往往曾㸃這般説話曾子初間却理會不得他但夫子説東便去學東説西便去學西説南便去學南説北便去學北到學來學去一旦貫通却自得意思也時舉蕭問曾㸃言志章程子云云先生曰集注内載前軰之説於句下者是解此句文義載前軰之説於章後者是説一章之大㫖及反覆此章之餘意今曾㸃説底不曾理會得又如何理會得後面底雉以下集注所謂天理流行一句須是先自盡於一心然後及物則能隨寓而樂如曾㸃只是他先自分内見得箇道理如莫春以下是无可説只就眼前境界便説出來也得又曰曾㸃曾參父子却相背曾㸃是先見得大了曾參却細孔子見他着細工夫到遂告以一貫那時參言下一唯見得都實如曾㸃則行有不掩是他先見得大了自然是難掩士毅問集注云曾㸃之學有以見乎日用之間莫非天理流行之妙日用之間皆人所共曾㸃見處莫是於饑食渴飲冬裘夏葛以至男女居室之類在曾㸃見則莫非天理在他人則只以濟其嗜欲曰固是同是事是者便是天理非者便是人欲如視聼言動人所同也非禮勿視聼言動便是天理非禮而視聼言動便是人欲植曰即是五峯所謂天理人欲同行異情否曰是植周貴卿問先生教人每令就下學上用功而子路曾晳冉有公西華侍坐一章乃云其視三子區區於事為之末者有間矣如何曰三子於事為上也見不曾透如為國以禮他正縁見那為國以禮底道理未透所以後來恁地今觀三子雖不可盡見然大槩也可知如子路便是那些子客氣未消磨得盡冉求畢竟有才要做事為仕意重公西華較細膩得些子但也見不透又問曾晳似説得髙逺不就事實曰某甞説曾晳不可學他是偶然見得如此夫子也是一時被他説得恁地也快活人故與之今人若要學他便會狂妄了他父子之學正相反曾子是一歩一歩踏着實地去做直到那參乎吾道一以貫之曾子曰唯方是䕫孫録作已是得了然他到這裏也只是唯而已也不曾恁地差異從此後也只是安穏帖帖恁地去到臨死尚曰而今而後吾知免夫小子也依舊是戰戰兢兢不曾恁地自在䕫孫録云未死以前戰戰兢兢未甞少息豈曾如此狂妄顛蹷曾晳不曾見他工夫只是天資髙後自説着如夫子説吾黨之小子狂簡斐然成章不知所以裁之這便是狂簡如荘列之徒皆是他自説得恁地好䕫孫録云也是他見得如此所以夫子要歸裁正之若是不裁只管聼他恁地今日也浴沂詠歸明日也浴沂詠歸却做箇甚麽合殺義剛䕫孫畧夫子與㸃以其無所係着無所作為皆天理之流行夫何為哉恭已正南面而已天叙有典勅我五典五惇哉天秩有禮自我五禮五庸哉天命有徳五服五章哉天討有罪五刑五用哉即此氣象夫子以其所見極髙明了所以與之如今人見學者議論拘滯忽有一箇説得索性快活亦須喜之然未見得其做事時如何若只如此忽畧恐却是病其流即莊老耳如季武子之死倚門而歌事及家語所載芸瓜事雖未必然但如此放曠九伯事何故都當入聲在他身上所以孟子以之與琴張牧皮同稱狂士又莊子載子桑户孟子反子琴張事雖是寓言未足憑然何故不别言一人孔門如曾㸃只見識髙未見得其後成就如何如曾參却是篤實細宻工夫到程子論三子言志自是實事一段甚好及論夫子與㸃一段意却少異所以集注兩載之必大孔子與㸃與聖人之志同者盖都是自然底道理安老懐少信朋友自是天理流行天理流行觸處皆是暑往寒來川流山峙父子有親君臣有義之類無非這理如學而時習之亦是窮此理孝弟仁之本亦是實此理所以貴乎格物者是物物上皆有此理此聖人事㸃見得到盖事事物物莫非天理初豈是安排得來安排時便湊合不着這處更有甚私意來自是着不得私意聖人見得只當閒事曾㸃把作一件大事來説他見得這天理随處發見處處皆是天理所以如此樂植植舉曾㸃言志明道云盖與聖人之志同先生詰云曾㸃與聖人志同在那裏植云曾㸃浴沂詠歸樂而得其所與聖人安老懐少信朋友使萬物各遂其性處同曰也未湊盡得因座中諸友皆不合先生曰立之底只争這些子潘子善以為㸃只是樂其性分而已日用間見得天理流行才要着私意去安排便不得曰他不是道我不要着私意安排私意自着不得這箇道理是天生自然不待安排盖道理流行無􅉻無欠是天生自然如此與聖人安老懐少信朋友底意思相似聖人見老者合安便安之朋友合信便信之少者合懐便懐之惟曾㸃見得到這裏聖人做得到這裏植時舉略問曾㸃言志如何是有堯舜氣象曰明道云萬物各遂其性此一句正好看堯舜氣象且看莫春時物態舒暢如此曾㸃情思又如此便是各遂其性處堯舜之心亦只是要萬物皆如此爾孔子之志欲得老者安之少者懐之朋友信之亦是此意又問上蔡云子路冉有公西華皆未免有意必之心曾㸃却不願仕故孔子與之此説如何曰亦是但此意逼窄爾又問曾㸃之狂如何曰他雖知此理只是踐履未至謨曾㸃之志所謂達可行於天下而後行之程子謂便是堯舜氣象為他見處大故見得世間細小功業皆不足以入其心道夫問程子謂便是堯舜氣象如何曰曾㸃却只是見得未必能做得堯舜事孟子所謂狂士其行不掩焉者也其見到處直是有堯舜氣象如荘子亦見得堯舜分曉或問天王之用心何如便説到天徳而出寜日月照而四時行若晝夜之有經雲行而雨施以是知他見得堯舜氣象出曽㸃見識儘髙見得此理洞然只是未曾下得工夫曾㸃曾參父子正相反以㸃如此髙明參却魯鈍一向低頭捱將去直到一貫方始透徹是時見識方到曾㸃地位然而規模氣象又别㝢問集注謂曾㸃氣象從容便是鼔瑟處詞意洒落便是下面荅言志雖堯舜事業亦優為之處否曰且道堯舜是甚麽様事何不説堯舜之心恰限説事業盖富有之謂大業至如平章百姓明目達聰納大麓皆是事也此分明説事業縁曾㸃見得道理大所以堯舜事業優為之視三子規規於事為之末固有間矣是他見得聖人氣象如此雖超乎事物之外而實不離乎事物之中是箇無事無為底道理却做有事有為底功業天様大事也做得針様小事也做得此所謂大本所謂忠所謂一者是也㸃操得柄欛據着源頭諸子則從支派上做工夫諸子底做得小他底髙大曾㸃合下便見得聖人大本是如此但於細微工夫却不曾做得所以未免為狂縁他資禀髙見得這箇大不肯屑屑做那小底工夫是他合下一見便了於細微節目工夫却有欠闕與後世佛老近似但佛老做得忒無狀耳又云曾參曾㸃父子兩人絶不類曾子隨事上做細微曲折做得極爛熟了才得聖人指撥一悟即了當㸃則不然合下便見得如此却不曾從事曲折工夫所以聖人但説吾與㸃而已若傳道則還曾子也學者須是如曽子做工夫㸃自是一種天資不可學也伊川説曾㸃漆雕開已見大意㸃則行不掩開見此箇大意了又却要補填滿足於未能信一句上見之此與一貫兩處是大節目當時時經心始得又曰只看異乎三子者之撰一句便是從容洒落處了又曰諸子之欲為國也是他實做得方如此説明作集注非定本呉兄問曾子言志一段先生曰何謂視其氣象雖堯舜事業亦可為吳兄無對先生曰曾㸃但開口説一句異乎三子者之撰時便自髙了盖三子所志者雖皆是實然未免局於一國一君之小向上更進不得若曾㸃所見乃是大根大本使推而行之則將無所不能雖其功用之大如堯舜之治天下亦可為矣盖言其所志者大而不可量也譬之於水曾㸃之所用力者水之源也三子之所用力者水之流也用力於派分之處則其功止於一派用力於源則放之四海亦猶是也然使㸃遂行其志則恐未能掩其言故以為狂者也某甞謂曾㸃父子為學每每相反曾㸃天資髙明用志逺大故能先見其本往徃於事為之間有不屑用力者焉是徒見其忠之理而不知其恕之理也曾子一日三省則隨事用力而一貫之説必待夫子告之而後知是先於恕上得之而忠之理則其初盖未能會也然而一唯之後本末兼該體用全偹故其傳道之任不在其父而在其子則其虚實之分學者其必有以察之壮祖問曾㸃言志雖堯舜事業亦優為之曰曾㸃為人髙爽日用之間見得這天理流行之妙故堯舜事業亦不過自此做將去然有不同處堯舜便是實有之踏實做將去曾㸃只是偶然綽見在譬如一塊寳珠堯舜便實有在懐中曾㸃只看見在然他人亦不曾見得某甞謂曾㸃父子正相拗曾子先未曾見得箇大統體只是從事上積累做將去後來方透徹曾㸃都未曾去做却先曉得了更教他如曾子恁地細宻做將去何可比也只縁他見得快後不當事所以只見得了便休故他言志亦不是要去做事底只是心裏要恁地快活過日而已又云學者須如曾子逐歩做將去方穏實燾或問曾㸃氣象曰曾㸃氣象固是従容洒落然須見得他因甚得如此始得若見得此意自然見得他做得堯舜事業處銖廖子晦李唐卿陳安卿共論三子言志及顔子喟然之嘆録其語質諸先生先生曰覺見諸公都説得枝蔓此等處不通如此説在人自活看方得若云堯舜事業非曾㸃所能又逐一稱説堯舜来比並都不是如此曾㸃只是箇髙爽底人他意思偶然自見得只見得了便休堯舜則都見得了又都踏著這箇物事行此其不同處耳要之只説得箇見得天理明所以如此只説得到此住已上説不去了要人自見得只􅃹推説已是枝蔓或問程子云子路只縁曉不得為國以禮底道理若曉得便是此氣象如公西冉求二子語言之間亦自謙遜可謂達禮者矣何故却無曾㸃氣象曰二子只是曉得那禮之皮膚曉不得那裏靣微妙處他若曉得便須見得天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉底自然道理矣曾㸃却有時見得這箇氣象只是他見得了便休縁他見得快所以不將當事他若見得了又從頭去行那裏得来曾參則元來未見這箇大統體先從細微曲折處行都透了見得箇大體曾氏父子二人極不同世間自有一様人如此髙洒見得底學不得也學者須是學曾子逐歩做將去方穏實又問子路氣象須較開濶如二子曰然又曰看来他們都是合下不曾從實地做工夫去却只是要想像已攬説箇形象如此所以不實某甞説學者只是依先儒注解逐句逐字與我理會著實做將去少間自見最怕自立説籠罩此為學者之大病世間也只有這一箇方法路徑若才不從此去少間便落草不濟事只依古人所説底去做少間行出来便是我底何必别生意見此最是學者之大病不可不深戒僴問論語只有箇顔子曾子傳聖人之學其大概既得聞命矣敢問曾㸃浴沂處注云有堯舜氣象夫子固於此與㸃矣而子路為國以禮處亦注云達得時便是這氣象如何曰子路所言底他亦是無私意但是不遜讓時便不是也曾㸃見處豈不曰與堯舜同但是他做不得此事如今人在外看屋一般知得有許大許髙然其中間廊廡㕔舘戸牖房闥子細曲折却是未必看得子細也然看到此也是大故難或曰程子云曾㸃漆雕開已見得大意如何曰曾㸃見得較髙開只是朴實其才雖不及㸃然所見也是不苟或曰曾㸃既見得天理流行胸中洒落矣而行有不掩何也曰盖為他天資髙見得這物事透徹而做工夫却有欠闕如一箇大屋様他只見得四靣墻壁髙低大小都定只是裏面許多間架殊不見得如漆雕開見大意則不如㸃然却是他肯去做㸃雖見得却又不肯去做到盡處且如邵康節只縁他見得如此便把来做幾大作弄更不加細宻工夫某甞謂曾子父子正相反曾參初頭都不㑹只從頭自一事一物上做去及四方八靣都做了却到大處及他見得大處時其他小處一一都了也㸃合下見得大處却不肯去做小底終不及他兒子也祖道賜録一條見漆雕開章疑同開問使子路知禮如何便得似曾晳氣象曰此亦似乎隔驀然亦只争箇知不知見不見耳若達得則便是這氣象也曾㸃只縁他見得箇大底意思了據他所説之分只得如此説能如此則達而在上便可做得堯舜事業隨所在而得其樂矣又曰公且更説曾㸃意思廣云㸃是已見得大意其所言者無非天理之流行都不為事物所累曰亦不必説不為事物所累只是縁他髙明自見得箇大底意思曰既見得這意思如何却行有不掩曰縁他見得了不去下工夫所以如此譬如人須以目見以足行見得方能行得然亦有見得了不肯行者亦有未見得後强力以進者如顔子則見與行皆到也又曰曾㸃父子學問却如此不同曾㸃是未行而先見得此意思者曾子其初却都未能見但一味履踐將去到得後来真積力久夫子知其將有所得始告之以一貫之説曾子方領畧得然縁他工夫在先故一見便了更無窒碍處若是曾晳則須是更去行處做工夫始得若不去做工夫則便入於釋老去也觀季武子死曾㸃倚其門而歌他雖未是好人然人死而歌是甚道理此便有些荘老意思程子曰曾㸃漆雕開已見大意看得来漆雕開為人却有規矩不肯只恁地休故曰吾斯之未能信廣問子路若達便是曾㸃氣象莫是子路無曾㸃從容意思否曰子路見處極髙只是有些粗縁他勇便粗若不是勇又不會變得如此快這勇却不曾去得如人得這箇藥去病却不曾去得藥毒若去得盡即達為國以禮道理顧文蔚曰子路與冉有公西華如何文蔚曰只是小大不同曰二子終無子路所見問何以驗之曰觀他平日可見文蔚陳仲亨説子路只是不達為國以禮道理數句未明先生曰子路地位髙品格亦大故髙但其病是有些子粗縁如此所以便有許多粗暴踈率處他若能消磨得這些子去却能恁地退遜則便是這箇氣象了盖是他資質大段髙不比冉求公西華那二子雖如此謙退然却如何及得子路譬之如一箇坑跳不過時只在這邉一跳過便在那邉若逹那為國以禮道理便是這般氣象意正如此求也退故進之冉求之病乃是子路底藥子路底病乃是冉求底藥義剛李守約問子路達時便是此氣象意謂禮是天理子路若識得便能為國合得天理曰固是只更有節奏難説聖人只為他其言不讓故發此語如今看来終不成才會得讓底道理便與曾㸃氣象相似似未會如此如今且平看若更去説程子之説却又是説上添説子思言鳶飛魚躍與孟子言勿忘勿助長此兩處皆是喫緊為人處但語意各自别後人因喫緊為人一句却只管去求他同處遂至牽合木之問孔子語子路為國以禮只是以子路不遜讓故發此言程先生云云如何曰到為國以禮分上便是理明自然有曾㸃氣象可學伊川謂子路之志亞於曾㸃盖子路所言却是實地二子却鑒他子路為夫子所哂故退後説道夫問再看浴沂章程子云曽㸃狂者也未必能為聖人之事而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在於老者安之朋友信之少者懐之使萬物莫不遂其性曾㸃知之故孔子喟然嘆曰吾與㸃也若如程子之説看則事皆切實若只從曾㸃見得箇大底意思看恐易入於虚無先生曰此一段唯上蔡見得分曉盖三子只就事上見得此道理曾㸃是去自己心性上見得那本原頭道理使曾㸃做三子事未必做得然曾㸃見處雖堯舜事業亦不過以此為之而已程子所説意思固好但所録不盡其意看得来上面須别有説話在必先說曾㸃已見此道理了然後能如此則體用具偹若如今恁地說則有用無體便覺偏了因說一貫之㫖忠恕之說程先生門人中亦只上蔡領畧得他意思餘皆未曉浴沂一章解向来亦曾改過但今尋未見在問先生謂三子從事上見得此道理必如此說然後見得程子所謂只縁子路不達為國以禮道理若達則便是這氣象之説三子皆是去事上見得此道理而子路之言不讓則便是不知不覺違了這箇道理處故夫子哂之也曰然二子亦因夫子之哂子路故其言愈加謙譲皆非其自然盖有所警也廣上蔡說鳶飛魚躍因云知勿忘勿助長則知此知此則知夫子與㸃之意看来此一段好當入在集注中舞雩後僴以下集義問前輩說鳶飛魚躍與曾㸃浴沂一事同不知曾㸃之事何縁與子思之說同曰曾㸃見日用之間莫非天理問何以見曾㸃見日用之間莫非天理曰若非見得日用之間無非天理只恁地空樂也無意思又曰諸子有安排期必至曾㸃只以平日所樂處言之曾㸃不說道欲做那事不做那事又曰曾㸃以樂於今日者對諸子以期於異日者對又曰某今日見得又别節次日問節取先生所注一段看不見與昨日之說異曰前日不曾說諸子有安排期必至曾㸃無之節朱子語類卷四十
