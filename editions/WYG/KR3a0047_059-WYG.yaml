body:
  text: 朱子語類卷五十九孟子九告子上性猶杞栁章問告子謂以人性為仁義猶以杞栁為桮棬何也曰告子只是認氣為性見得性有不善須拗他方善此惟是程先生斷得定所謂性即理也至孟子與告子論杞栁處大槩只是言杞栁桮棬不可比性與仁義杞栁必矯揉而為桮棬性非矯揉而為仁義孟子辯告子數處皆是辯倒着告子便休不曾説盡道理節桮棬想如今卷杉台子模様杞栁只是而今做合箱底栁北人以此為箭謂之栁箭即蒲栁也義剛性猶湍水章人性無不善雖桀紂之為窮㓙極惡也知此事是惡恁地做不柰何此便是人欲奪了銖生之謂性章生之謂氣生之理謂性閎祖性孟子所言理告子所言氣同問生之謂性曰告子只説那生來底便是性手足運行耳目視聽與夫心有知覺之類他却不知生便屬氣禀自氣禀而言人物便有不同處若説理之謂性則可然理之在人在物亦不可做一等説植問生之謂性曰他合下便錯了他只是説生處精神魂魄凢動用處是也正如禪家説如何是佛曰見性成佛如何是性曰作用是性盖謂目之視耳之聼手之捉執足之運奔皆性也説來説去只説得箇形而下者故孟子闢之曰生之謂性也猶白之謂白歟又闢之曰犬之性猶牛之性牛之性猶人之性歟三節謂猶戯謔然只得告子不知所答便休了竟亦不曾説得性之本體是如何或問董仲舒言性者生之質也曰其言亦然大雅蜚卿問生之謂性莫止是以知覺運動為性否曰便是此正與食色性也同意孟子當時辨得不恁地平鋪就他蔽處撥啓他却一向窮詰他止從那一角頭攻將去所以如今難理㑹若要解煞用添言語犬牛人謂其得於天者未嘗不同惟人得是理之全至於物止得其偏今欲去犬牛身上全討仁義便不得告子止是不曾分曉道這子細到這裏説不得却道天下是有許多般性牛自是牛之性馬自是馬之性犬自是犬之性則又不是又曰所以謂性即理便見得惟人得是理之全物得是理之偏告子止把生為性更不説及理孟子却以理言性所以見人物之辨賀孫生之謂性只是就氣上説得盖謂人也有許多知覺運動物也有許多知覺運動人物只一般却不知人之所以異於物者以其得正氣故具得許多道理如物則氣昏而理亦昏了或問如螻蟻之有君臣橋梓之有父子此亦是理曰他只有這些子不似人具得全然亦不知如何只是這㡬般物具得些子或曰恐是元初受得氣如此所以後來一直是如此曰是氣之融結如此燾告子説生之謂性二程都説他説得是只下面接得不是若如此説却如釋氏言作用是性乃是説氣質之性非性善之性文蔚問形色天性如何曰此主下文惟聖人可以踐形而言因問孔子言性相近也習相逺也亦是言氣質之性王徳修曰據某所見此是孔子為陽貨而説人讀論語多被子曰字隔上下便不接續曰若如此説亦是説氣質之性文蔚犬牛禀氣不同其性亦不同節問犬牛之性與人之性不同天下如何解有許多性曰人則有孝悌忠信犬牛還能事親孝事君忠也無問濓溪作太極圖自太極以至萬物化生只是一箇圈子何嘗有異曰人物本同氣禀有異故不同又問是萬為一一實萬分又如何説曰只是一箇只是氣質不同問中庸説能盡其性則能盡人之性能盡人之性則能盡物之性何故却將人物滚作一片説曰他説能盡其性則能盡人之性能盡人之性則重聲言兩則字能盡物之性初未嘗一片説節或説告子生之謂性章曰説得也是不須别更去討説只是子細看子細認分數各有隊伍齊整不紊始得今只是恁地説過去被人詰難便説不得知覺運動人物皆異而其中却有同處仁義禮智是同而其中却有異處須是子細與㸔梳理教有條理又曰物也有這性只是禀得來偏了這性便也随氣轉了又曰畜獸禀得昬塞底氣然間或稟得些小清氣便也有明處只是不多義剛因説生之謂性曰既知此説非是便當曵翻看何者為是即道理易見也閎祖孟子闢告子生之謂性處亦傷急要他倒只就他言語上拶將去已意却不曾詳説非特當時告子未必服後世亦未能便理㑹得孟子意也􅓌孟子答告子生之謂性與孟季子敬叔父乎敬弟乎兩段語終覺得未盡却是少些子直指人心見性成佛底語空如許撈攘重復不足以折之也只有長者義乎長之者義乎此二語折得他親切僴食色性也章衆朋友説食色性也先生問告子以知覺處為性如何與彼長而我長之相干皆未及對先生曰告子只知得人心却不知有道心他覺那趨利避害饑寒飽煖等處而不知辨别那利害等處正是本然之性所以道彼長而我長之盖謂我無長彼之心由彼長故不得不長之所以指義為外也義剛問告子已不知性如何知得仁為内曰他便以其主於愛者為仁故曰内以其制是非者為義故曰外又問他説義固不是説仁莫亦不是曰固然可學告子謂仁愛之心自我而出故謂之内食色之可甘可悦由彼有此而後甘之悦之故謂之外又云上面食色性也自是一截下面仁内義外自是一截故孟子辨告子只謂何以謂仁内義外也愛便是仁之心宜處便是義又云彼白而我白之言彼是白馬我道這是白馬如着白衣服底人我道這人是着白言之則一若長馬長人則不同長馬則是口頭道箇老大底馬若長人則是誠敬之心發自於中推誠而敬之所以謂内也子䝉白馬之白也無以異於白人之白也看來孟子此語答之亦未盡謂白馬白人不異亦豈可也畢竟彼白而我白之我以為白則亦出於吾心之分别矣僴李時可問仁内義外曰告子此説固不是然近年有欲破其説者又更不是謂義專在内只發於我之先見者便是如夏日飲水冬日飲湯之類是己若在外面商量如此便不是義乃是義襲其説如此然不知飲水飲湯固是内也如先酌鄉人與敬弟之類若不問人怎生得知今固有人素知敬父兄而不知鄉人之在所當先者亦有人平日知弟之為卑而不知其為尸之時乃祖宗神靈之所依不可不敬者若不因講問商量何縁㑹自從裏面發出其説乃與佛氏不得擬議不得思量直下便是之説相似此大害理又説義襲二字全不是如此都把文義説錯了只細㸔孟子之説便自可見時舉性無善無不善章告子曰性無善無不善也或曰性可以為善可以為不善或曰有性善有性不善此三者雖同為説氣質之性然兩或之説猶知分别善惡使其知以性而兼言之則無病矣惟告子無善無不善之説最無狀他就此無善無惡之名渾然無所分别雖為惡為罪總不妨也與今世之不擇善惡而顛倒是非稱為本性者何以異哉僴告子説性無善無不善非惟無善并不善亦無之謂性中無惡則可謂無善則性是何物節性無善無不善告子之意謂這性是不受善不受惡底物事受字饒本作管他説食色性也便見得他只道是手能持足能履目能視耳能聼便是性釋氏説在目曰視在耳曰聞在手執捉在足運奔便是他意思植乃若其情則可以為善性無定形不可言孟子亦説天下之言性者則故而已矣情者性之所發節問乃若其情曰性不可説情却可説所以告子問性孟子却答他情盖謂情可為善則性無有不善所謂四端者皆情也仁是性惻隐是情惻隠是仁發出來底端芽如一箇榖種相似榖之生是性發為萌芽是情所謂性只是那仁義禮智四者而已四件無不善發出來則有不善何故殘忍便是那惻隐反底冒昧便是那羞惡反底植問乃若其情則可以為善矣曰孟子道性善性無形容處故説其發出來底曰乃若其情可以為善則性善可知若夫為不善非才之罪也是人自要為不善耳非才之不善也情本不是不好底李翺滅情之論乃釋老之言程子情其性性其情之説亦非全説情不好也璘徳粹問孟子道性善又曰若其情可以為善是如何曰且道性情才三者是一物是三物徳粹云性是性善情是反於性才是才料曰情不是反於性乃性之發處性如水情如水之流情既發則有善有不善在人如何耳才則可為善者也彼其性既善則其才亦可以為善今乃至於為不善是非才如此乃自家使得才如此故曰非才之罪某問下云惻隐羞惡辭遜是非之心亦是情否曰是情舜功問才是能為此者如今人曰才能曰然李翺復性則是云滅情以復性則非情如何可滅此乃釋氏之説䧟於其中不自知不知當時曾把與韓退之看否可學問孟子言情才皆善如何曰情本自善其發也未有染汚何嘗不善才只是資質亦無不善譬物之白者未染時只是白也徳明孟子論才亦善者是説本來善底才淳孟子言才不以為不善盖其意謂善性也只發出來者是才若夫就氣質上言才如何無善惡端䝉問孟子論才專言善何也曰才本是善但為氣所染故有善不善亦是人不能盡其才人皆有許多才聖人却做許多事我不能做得些子出故孟子謂或相倍蓰而無筭者不能盡其才者也砥或問不能盡其才之意如何曰才是能去恁地做底性本是好發於情也只是好到得動用去做也只是好不能盡其才是發得畧好便自阻隔了不順他道理做去若盡其才如盡惻隐之才必當至於博施濟衆盡羞惡之才則必當至於一介不以與人一介不以取諸人禄之千乗弗顧繫馬千駟弗視這是本來自合恁地淊滔做去止縁人為私意阻隔多是略有些發動後便遏折了天便似天子命便似將告勑付與自家性便似自家所受之職事如縣尉職事便在捕盜主簿職事便在掌簿書情便似去親臨這職事才便似去動作行移做許多工夫邵康節擊壤集序云性者道之形體也心者性之郛郭也身者心之區宇也物者身之舟車也賀孫天生烝民有物有則盖視有當視之則聽有當聽之則如是而視如是而聽便是不如是而視不如是而聽便不是謂如視逺惟明聽徳惟聰能視逺謂之明所視不逺不謂之明能聽徳謂之聰所聼非徳不謂之聰視聽是物聰明是則推至於口之於味鼻之於臭莫不各有當然之則所謂窮理者窮此而已又舉天生烝民云云孔子曰為此詩者其知道乎故有物必有則民之秉彛也故好是懿徳聖人所謂道者是如此何嘗説物便是則或問集注言才猶材質才與材字之别如何曰才字是就理義上説材字是就用上説孟子上説人見其濯濯也則以為未嘗有材是用木旁材字便是指適用底説非天之降才爾殊便是就理義上説又問才字是以其能解作用底説材質是合形體説否曰是兼形體説便是説那好底材又問如説材料相似否曰是義剛孟子言人之才本無不善伊川言人才所遇之有善有不善也道夫問孟子言才與程子異莫是孟子只將元本好處説否曰孟子言才正如言性不曾説得殺故引出荀楊來到程張説出氣字然後説殺了士毅先生言孟子論才是本然者不如程子之備蜚卿曰然則才亦禀於天乎曰皆天所為但理與氣分為兩路又問程子謂才禀於氣如何曰氣亦天也道夫曰理純而氣則雜曰然理精一故純氣粗故雜道夫問孟程所論才同異曰才只一般能為之謂才問集注説孟子尃指其出於性者言之程子兼指其禀於氣者言之又是如何曰固是要之才只是一个才才之初亦無不善縁他氣禀有善惡故其才亦有善惡孟子自其同者言之故以為出於性程子自其異者言之故以為禀於氣大抵孟子多是專以性言故以為性善才亦無不善到周子程子張子方始説到氣上要之須兼是二者言之方備只縁孟子不曾説到氣上覺得此段話無結殺故有後來荀楊許多議論出韓文公亦見得人有不同處然亦不知是氣禀之異不妨有百千般様不同故不敢大段説開只説性有三品不知氣禀不同豈三品所得盡耶廣孟子説才皆是指其資質可以為善處伊川所謂才禀於氣氣清則才清氣濁則才濁此與孟子説才小異而語意尤宻不可不考乃若其情非才之罪也以若訓順者未是猶言如論其情非才之罪也盖謂情之發有不中節處不必以為才之罪爾退之論才之品有三性之品有五其説勝荀揚諸公多矣説性之品便以仁義禮智言之此尤當理説才之品若如此推究則有千百種之多姑言其大槩如此正是氣質之説但少一箇氣字耳伊川謂論氣不論性不明論性不論氣不備正謂如此如性習逺近之類不以氣質言之不可正是二程先生發出此理濓溪論太極便有此意漢魏以來忽生文中子已不多得至唐有退之所至尤髙大抵義理之在天地間初無泯滅今世無人曉此道理他時必有曉得底人金問公都子問性首以情對如曰乃若其情則可以為善矣是也次又以才對如曰若夫為不善非才之罪是也繼又以心對如曰惻隐羞惡之類是也其終又結之曰或相倍蓰而無筭者不能盡其才者也所問者性而所對者曰才曰情曰心更無一語及性何也明道曰禀於天為性感為情動為心伊川則又曰自性之有形者謂之心自性之動者謂之情如二先生之説則情與心皆自夫一性之所發彼問性而對以情與心則不可謂不切所問者然明道以動為心伊川以動為情自不相侔不知今以動為心是耶以動為情是耶或曰情對性言静者為性動者為情是説固然也今若以動為情是則明道何得却云感為情動為心哉横渠云心綂性情者也既是心綂性情伊川何得却云自性之有形者謂之心自性之有動者謂之情耶如伊川所言却是性統心情者也不知以心綂性情為是耶性綂心情為是耶此性情心道者未有至當之論也至若伊川論才則與孟子立意不同孟子此章言才處有曰非才之罪也又曰不能盡其才者也又曰非天之降才爾殊也又曰以為未嘗有才焉如孟子之意未嘗以才為不善而伊川却説才有善有不善其言曰氣清則才善氣濁則才惡又曰氣清則才清氣濁則才濁意者以氣質為才也以氣質為才則才固有善不善之分也而孟子却止以才為善者何也伊川又曰孟子言非才之罪者盖公都子正問性善孟子且答他正意不暇一一辨之也審如是説則孟子云非天之降才爾殊與夫以為未嘗有才焉者豈皆答公都子之正問哉其後伊川又引萬章之問為證謂孟子嘗問象殺舜事孟子且答他這下意未暇與他辨完廪浚井之非夫完廪浚井自是萬章不能燭理輕信如此孟子且答正問未暇與他言此猶可言也如此篇論才處盡是孟子自家説得如此即非公都子之言其曰未暇一一辨之却是孟子自錯了未暇辨也豈其然乎又説孟子既又答他正意亦豈容有一字之錯若曰錯了一字不惟啓公都子之詰難傳之後世豈不惑亂學者哉此又才之一字未有至當之論也曰近思録中一段云心一也有指體而言者注云寂然不動是也有指用而言者注云感而遂通天下之故是也夫寂然不動是性感而遂通是情故横渠云心統性情者也此説最為稳當如前二先生説話恐是記録者誤耳如明道感為情動為心感與動如何分得若伊川云自性而有彤者謂之心某直理㑹他説不得以此知是門人記録之誤也若孟子與伊川論才則皆是孟子所謂才止是指本性而言性之發用無有不善處如人之有才事事做得出來一性之中萬善完備發將出來便是才也又云惻隠羞惡是心也能惻隠羞惡者才也如伊川論才却是指氣質而言也氣質之性古人雖不曽説着考之經典却有此意如書云惟人萬物之靈亶聰明作元后與夫天乃錫王勇智之説皆此意也孔子謂性相近也習相逺也孟子辨告子生之謂性亦是説氣質之性近世被濓溪拈掇出來而横渠二程始有氣質之性之説此伊川論才所以云有善不善者盖主此而言也如韓愈所引越椒等事若不着箇氣質説後如何説得他韓愈論性比之荀揚最好將性分三品此亦是論氣質之性但欠一箇氣字耳謨此下去偽人傑錄皆云又問既是孟子指本性而言則孟子謂才無不善乃為至論至伊川却云未暇與公都子一一辨者何也曰此伊川一時被他們逼且如此説了伊川如此等處亦多不必泥也問尹叔問伊川曰語其才則有下愚之不移與孟子非天之降才爾殊語意似不同曰孟子之説自是與程子之説小異孟子只見得是性善便把才都做善不知有所謂氣禀各不同如后稷岐嶷越椒知其必滅若敖是氣禀如此若都把做善又有此等處須説到氣禀方得孟子已見得性善只就大本處理㑹更不思量這下面善惡所由起處有所謂氣禀各不同後人㸔不出所以惹得許多善惡混底説來相炒程子説得較宻因舉論性不論氣不備論氣不論性不明二之則不是雖如此兼性與氣説方盡此論盖自濓溪太極言隂陽五行有不齊處二程因其説推出氣質之性來使程子生在周子之前未必能發明到此又曰才固是善若能盡其才可知是善是好所以不能盡其才處只縁是氣禀恁地問才與情何分别情是才之動否曰情是這裏以手指心發出有箇路脉曲折随物恁地去才是能主張運用做事底同這一事有一人㑹發揮得有不㑹發揮得同這一物有人㑹做得有人不㑹做此可見其才又問氣出於天否曰性與氣皆出於天性只是理氣則已屬於形象性之善固人所同氣便有不齊處因指天氣而言如天氣晴明舒豁便是好底氣禀得這般氣豈不好到隂沉黯淡時便是不好底氣禀得這般氣如何㑹好畢竟不好底氣常多好底氣常少以一嵗言之一般天氣晴和不寒不暖却是好能有㡬時如此㸔來不是夏寒便是冬暖不是愆陽便是伏隂所以昬愚㓙狠底人常多又曰人之貧富貴賤夀夭不齊處都是被氣滚亂了都沒理㑹有清而薄者有濁而厚者顔夭而跖夀亦是被氣滚亂汨沒了堯舜自禀得清明純粹底氣又禀得極厚所以為聖人居天子之位又做得許大事業又享許大福夀又有許大名譽如孔子之聖亦是禀得清明純粹然他是當氣之衰禀得來薄了但有許多名譽所以終身栖栖為旅人又僅得中夀到顔子又自沒興了淳㝢司伊川性即理也自孔孟後無人見得到此亦是從古無人敢如此道驤集注伊川性即理也四字攧撲不破實自已上見得出來其後諸公只聼得便説將去實不曾就已上見得故多有差處道夫論性不論氣不備論氣不論性不明盖本然之性只是至善然不以氣質而論之則莫知其有昬明開塞剛柔強弱故有所不備徒論氣質之性而不自本原言之則雖知有昬明開塞剛柔強弱之不同而不知至善之源未嘗有異故其論有所不明須是合性與氣觀之然後盡盖性即氣氣即性也若孟子專於性善則有些是論性不論氣韓愈三品之説則是論氣不論性端䝉問程子論性不論氣不備論氣不論性不明如孟子性善是論性不論氣荀揚異説是論氣則昧了性曰程子只是立説未指孟子然孟子之言却是專論性過問氣者性之所寄故論性不論氣則不備性者氣之所成故論氣不論性則不明曰如孟子説性善是論性不論氣也但只認説性善雖説得好終是欠了下面一截自荀揚而下便秪論氣不論性了道夫曰子雲之説雖兼善惡終只論得氣曰他不曾説着性道夫論氣不論性荀子言性惡揚子言善惡混是也論性不論氣孟子言性善是也性只是善氣有善不善韓愈説生而便知其惡者皆是合下禀得這惡氣有氣便有性有性便有氣節論性不論氣不備論氣不論性不明孟子終是未備所以不能杜絶荀揚之口厚之問氣禀如何曰禀得木氣多則少剛強禀得金氣多則少慈祥推之皆然可學問二之則不是曰不可分作兩段説性自是性氣自是氣如何不可分作兩段説他所以説不備不明須是兩邊都説理方明備故云二之則不是二之者正指上兩句也㽦録云論性不論氣論氣不論性便是二之或問明道説生之謂性云性即氣氣即性便是不可分兩段説曰那箇又是説性便在氣禀上禀得此氣理便搭附在上面故云性即氣氣即性若只管説氣便是性性便是氣更沒分曉矣僴或問二之則不是曰若只論性而不論氣則收拾不盡孟子是也若只論氣而不論性則不知得那原頭荀揚以下是也韓愈也説得好只是少箇氣字若只説一箇氣而不説性只説性而不説氣則不是又曰須是去分别得他同中有異異中有同始得其初那理未嘗不同才落到氣上便只是那麄處相同如飢食渴飲趨利避害人能之禽獸亦能之若不識箇義理便與他一般也又曰惟皇上帝降𠂻於下民民之秉彛這便是異處庻民去之君子存之須是存得這異處方能自别於禽獸不可道蠢動含靈皆有佛性與自家都一般義剛性氣二字兼言方備孟子言性不及氣韓子言氣不及性然韓不知為氣亦以為性然也横渠曰形而後有氣質之性善反之則天地之性存焉如禀得氣清明者這道理只在裏面禀得氣昏濁者這道理亦只在裏面只被這昬濁遮蔽了譬之水清底裏面纎㣲皆可見渾底裏面便見不得孟子説性善只見得大本處未説到氣質之性細碎處程子謂論性不論氣不備論氣不論性不明二之則不是孟子只論性不知論氣便不全備若三子雖論性却不論得性都只論得氣性之本領處又不透徹荀子只見得不好人底性便説做惡揚子只見得半善半惡人底性便説做善惡混韓子見得天下有許多般人故立為三品説得較近其言曰仁義禮智信性也喜怒哀樂愛惡欲情也似又知得性善荀揚皆不及只是過接處少一箇氣字淳問横渠言氣質之性去偽終未曉曰性是天賦與人只一同氣質所禀却有厚薄人只是一般人厚於仁而薄於義有餘於禮而不足於智便自氣質上來去偽富嵗子弟多賴章心之所同然者謂理也義也孟子此章自富嵗子弟多賴之下逐漸譬喻至此其意謂人性本善其不善者䧟溺之爾同然之然如然否之然不是虚字當從上文看盖自口之同嗜耳之同聼而言謂人心豈無同以為然者只是理義而已故理義悦心猶芻豢之悦口㽦問理義之悦我心理義是何物心是何物曰此説理義之在事者節理義之悦我心章云人之一身如目之於色耳之於聲口之於味莫不皆同於心豈無所同心之所同然者理也義也且如人之為事自家處之當於義人莫不以為然無有不道好者如子之於父臣之於君其分至尊無加於此人皆知君父之當事我能盡忠盡孝天下莫不以為當然此心之所同也今人割股救親其事雖不中節其心發之甚善人皆以為美又如臨難赴死其心本於愛君人莫不悦之而皆以為不易且如今處一件事苟當於理則此心必安人亦以為當然如此則其心悦乎不悦乎悦於心必矣先生曰諸友而今聼某這説話可子細去思量看認得某這話可以推得孟子意思子䝉黄先之問心之所以同然者何也謂理也義也聖人先得我心之所同然耳先生問諸公且道是如何所應皆不切先生曰若恁地看亦字某決定道都不曾將身去體看孟子這一段前面説許多只是引喻理義是人所同有那許多既都相似這箇如何㑹不相似理只是事物當然底道理義是事之合宜處程先生曰在物為理處物為義這心下看甚麽道理都有之如此做人人都道是好才不恁地做人人都道不好如割股以救母固不是王道之中然人人都道是好人人皆知愛其親這豈不是理義之心人皆有之諸公適來都説不切當都是不曾體之於身只畧説得通便道是了賀孫器之問理義之悦我心猶芻豢之悦我口顔子欲罷不能便是此意否曰顔子固是如此然孟子所説正是為衆人説當就人心同處看我恁地他人也恁地只就麄淺處看自分曉却有受用若必討箇顔子來證如此只是顔子㑹恁地多少年來更無人㑹恁地看得細了却無受用㝢器之問理義人心之同然以顔子之樂見悦意曰不要髙看只就眼前看便都是義理都是衆人公共物事且如某歸家來見説某人做得好便歡喜某人做得不好便意思不樂見説人做官做得如何見説好底自是快活見説不好底自是使人意思不好豈獨自家心下如此别人都是如此這只縁人心都有這箇義理都好善都惡不善賀孫或問口耳目皆心官也不知天所賦之氣質不昬明清濁其口耳目而獨昬明清濁其心何也然夷惠伊尹非拘於氣禀者處物之義乃不若夫子之時豈獨是非之心不若聖人乎曰口耳目等亦有昏明清濁之異如易牙師曠之徒是其最清者也心亦由是而已夷惠之徒正是未免於氣質之拘者所以孟子以為不同而不願學也牛山之木章孟子激發人説放心良心諸處説得人都汗流問牛山之木一章曰日夜之所息底是良心平旦之氣自是氣是兩件物事夜氣如雨露之潤良心如萌蘖之生人之良心雖是有梏亡而彼未嘗不生梏如被他禁械在那裏更不容他轉動亡如將自家物失去了又曰日夜之所息却是心夜氣清不與物接平旦之時即此良心發處惟其所發者少而旦晝之所梏亡者展轉反覆是以夜氣不足以存矣如睡一覺起來依前無狀又曰良心當初本有十分被他展轉梏亡則他長一分自家止有九分明日他又進一分自家又退止有八分他日㑹進自家日㑹退此章極精㣲非孟子做不得許多文章别人縱有此意亦形容不得老蘓們只就孟子學作文不理㑹他道理然其文亦實是好賀孫或問日夜之所息舊兼止息之義今只作生息之義如何曰近看得只是此義問凡物日夜固有生長若良心既放而無操存之功則安得自能生長曰放之未遠者亦能生長但夜間長得三四分日間所為又放了七八分却摺轉來都消磨了這些子意思所以至於梏亡也吳仁父問平旦之氣曰氣清則能存固有之良心如旦晝之所為有以汨亂其氣則良心為之不存矣然暮夜止息稍不紛擾則良心又復生長譬如一井水終日攪動便渾了那水至夜稍歇便有清水出所謂夜氣不足以存者便是攪動得太甚則雖有止息時此水亦不能清矣銖節録别出仁父問平旦之氣曰心之存不存係乎氣之清不清氣清則良心方存立得良心既存立得則事物之來方不惑如先立乎其大者則小者弗能奪也又曰大者既立則外物不能奪又問平旦之氣何故如此曰歇得這些時後氣便清良心便長及旦晝則氣便濁良心便著不得如日月何嘗不在天上却被些雲遮了便不明吴知先問夜氣如何存曰孟子不曾教人存夜氣只是説歇得些時氣便清又曰他前面説許多這裏只是教人操存其心又曰若存得此心則氣常時清不特平旦時清若不存得此心雖歇得些時氣亦不清良心亦不長又曰睡夢裏亦七撈八攘如井水不打他便清只管去打便濁了節平旦之氣只是夜間息得許多時節不與事物接才醒來便有得這些自然清明之氣此心自恁地虚静少間才與物接依舊又汩沒了只管汨沒多雖夜間休息是氣亦不復存所以有終身昏沉展轉流蕩危而不復者賀孫器之問平旦之氣其初生甚㣲如何道理能養得長曰亦只逐日漸漸積累工夫都在旦晝之所為今日長得一分夜氣便養得一分明日又長得一分明夜又養得兩分便是兩日事日日積累嵗月既久自是不可禦今若壊了一分夜氣漸薄明日又壊便壊成兩分漸漸消只管無故曰旦晝之所為有梏亡之矣梏之反覆夜氣不足以存到消得多夜氣益薄雖息一夜也存不得又以愛惜錢物為喻逐日省節積累自多賀孫㝢録别出器之問孟子平旦之氣甚㣲小如何㑹養得完全曰不能存得夜氣皆是旦晝所為壊了所謂好惡與人相近者㡬希今只要得去這好惡上理㑹日用間於這上見得分曉有得力處夜氣方與你存夜氣上却未有工夫只是去旦晝理㑹這兩字是箇大闗鍵這裏有工夫日間進得一分道理夜氣便添得一分到第二日更進得一分道理夜氣便添得二分第三日更進得一分道理夜氣便添得三分日間只管進夜間只管添添來添去這氣便盛恰似使錢相似日間使百錢使去九十錢留得這十錢這裏第二日百錢中使去九十錢又積得二十錢第三日如此又積得三十錢積來積去被自家積得多了人家便從容日間悠悠地過無工夫不長進夜間便減了一分氣第一日無工夫夜間又減了二分氣第三日如此又減了三分氣如此梏亡轉深夜氣轉虧損了夜氣既虧愈無根脚日間愈見作壊這處便是梏之反覆其違禽獸不遠矣亦似使錢一日使一百却侵了一百十錢所有底便自減了只有九十第二日侵了百二十所留底又減了只有八十使來使去轉多這裏底日日都消磨盡了因舉老子言治人事天莫若嗇夫惟嗇是謂早復早復謂之重積徳重積徳則無不克大意也與孟子意相似但他是就養精神處説其意自别平旦之氣便是旦晝做工夫底様子日用間只要此心在這裏㝢器逺問平旦之氣縁氣弱易為事物所勝如何曰這也别無道理只是漸漸捱將去自有力這處只是志不果復説第一義云如這箇只有箇進歩捱將去底道理這只是有這一義若於此不見得便又説今日做不得且待來日這事做不得且備員做些子這都是第二第三義賀孫問平旦之氣少頃便為事物所奪氣禀之弱如何可以得存曰這箇不容説只是自去照顧久後自慣便自然别卓敬子問旦晝不梏亡則養得夜氣清明曰不是靠氣為主盖要此氣去養那仁義之心如水之養魚水多則魚鮮水涸則魚病養得這氣則仁義之心亦好氣少則仁義之心亦㣲矣僴問夜氣一章又説心又説氣如何曰本是多説心若氣清則心得所養自然存得清氣濁則心失所養便自濁了賀孫或問夜氣旦氣如何曰孟子此段首尾止為良心設爾人多將夜氣便做良心説了非也夜氣不足以存盖言夜氣至清足以存得此良心爾平旦之氣亦清亦足以存吾良心故其好惡之公猶與人相近但此心存得不多時也至旦晝之所為則梏亡之矣所謂梏者人多謂梏亡其夜氣亦非也謂旦晝之為能梏亡其良心也謨夜氣不足以存是存箇甚人多説只是夜氣非也這正是説那本然底良心且如氣不成夜間方㑹清日間都不㑹清今人日用間良心亦何嘗不發見為他又梏亡了若存得這箇心則氣自清氣清則養得這箇心常存到夜氣不足以存則此心陷溺之甚雖是夜氣清時亦不足以存之矣此章前面譬諭甚切到得後面歸宿處極有力今之學者最當於此用功問夜氣一節曰今人只説夜氣不知道這是因説良心來得這夜氣來涵養自家良心又便被他旦晝所為梏亡之旦晝所為交滚得沒理㑹到那夜氣涵養得好時清明如一箇寳珠相似在清水裏轉明徹若頓在濁水中尋不見了又曰旦晝所為壊了清明之氣夜氣㣲了旦晝之氣越盛一箇㑹盛一箇㑹㣲消磨得盡了便與禽獸不逺植景紹問夜氣平旦之氣曰這一段其所主却在心某嘗謂只有伊川説夜氣之所存者良知也良能也諸家解注惟此説為當仁義之心人所固有但放而不知求則天之所以與我者始有所汨沒矣是雖如此然其日夜之所休息至於平旦其氣清明不為利慾所昏則本心好惡猶有與人相近處至其旦晝之所為又有以梏亡之梏之反覆則雖有這些夜氣亦不足以存養其良心反覆只是循環夜氣不足以存則雖有人之形其實與禽獸不逺故下文復云苟得其養無物不長苟失其養無物不消良心之消長只在得其養與失其養爾牛山之木嘗美矣是喻人仁義之心郊於大國斧斤伐之猶人之放其良心日夜之所息雨露之所潤非無萌蘖之生便是平旦之氣其好惡與人相近處旦晝之梏亡則又所謂牛羊又從而牧之雖芽蘖之萌亦且戕賊無餘矣道夫問此莫是心為氣所動否曰然章未所問疑有未盡道夫問夜氣曰夜氣静人心毎日梏於事物斵喪戕賊所餘無㡬惟夜氣静庻可以少存耳至夜氣之静而猶不足以存則去禽獸不逺言人理都喪也前軰皆無明説某因將孟子反覆熟讀毎一段三五十過至此方看得出後看程子却説夜氣之所存者良知良能也與臆見合以此知觀書不可苟須熟讀深思道理自見大雅問夜氣一章曰氣只是這箇氣日裏也生夜間也生只是日間生底為物欲梏之随手又耗散了夜間生底只聚得在那裏不曾耗散所以養得那良心且如日間目視耳聼口裏説話手足運動若不曾操存得無非是耗散底時節夜問則停留得在那裏如水之流夜間則閘得許多水住在這裏這一池水便滿次日又放乾了到夜裏又聚得些小若從平旦起時便接續操存而不放則此氣常生而不已若日間不存得此心夜間雖聚得些小又不足以勝其旦晝之梏亡少間這氣都乾耗了便不足以存其仁義之心如箇舡閤在乾燥處轉動不得了心如箇寳珠氣如水若水清則寳珠在那裏也瑩徹光明若水濁則和那寳珠也昏濁了又曰夜氣不足以存非如公説心不存與氣不存是此氣不足以存其仁義之心伊川云夜氣所存良知良能也這存字是箇保養䕶衛底意又曰此段專是主仁義之心説所以此豈山之性也哉下便接云雖存乎人者豈無仁義之心哉又曰此章不消論其他𦂳要處只在操則存上僴問兩日作工夫如何某答畧如舊所對曰夜氣章如何答以萌蘖生上便見得無止息本初之理若完全底人此氣無時不清明却有一等日間營營梏亡了至夜中静時猶可收拾若於此更不清明則是真禽獸也曰今用何時氣曰總是一氣若就孟子所説用平旦氣曰夜氣不足以存先儒解多未是不足以存此心耳非謂存夜氣也此心虚明廣大却被他梏亡日間梏亡既甚則夜一霎時静亦不存可見其都壊了可學盖卿問夜氣一章曰夜氣是母所息者是子盖所息者本自㣲了旦晝只管梏亡今日梏一分明日梏一分所謂梏之反覆而所息者泯夜氣亦不足以存若能存便是息得仁義之良心又曰夜氣只是不與物接時植問夜氣之説曰只是借夜氣來滋養箇仁義之心炎夜氣存則清過這邊來閎祖子上問夜氣曰此段緊要在苟得其養無物不長苟失其養無物不消璘牛山之木譬人之良心句句相對極分明天地生生之理本自不息惟旦晝之所為有所梏亡然雖有所梏亡而夜氣之所息平旦之氣自然有所生長自此漸能存養則良心漸復惟其於梏亡之餘雖畧略生長得些子至日用間依舊汩於物欲又依然壊了則是梏之反覆雖夜間休息其氣只恁地昏亦不足以存此良心故下面又説苟得其養無物不長苟失其養無物不消見得雖梏亡之餘有以養之則仁義之心即存縁是此心本不是外面取來乃是與生俱生下又説存養之要舉孔子之言操則存舎則亡見此良心其存亡只在眇忽之間才操便在這裏才舎便失去若能知得常操之而勿放則良心常存夜之所息益有所養夜之所養愈深則旦晝之所為無非良心之發見矣又云氣與理本相依旦晝之所為不害其理則夜氣之所養益厚夜之所息既有助於理則旦晝之所為益無不當矣日間梏亡者寡則夜氣自然清明虚静至平旦亦然至旦晝應事接物時亦莫不然賀孫人心於應事時只如那無事時方好又舉孟子夜氣一章云氣清則心清其日夜之所息是指善心滋長處言之人之善心雖已放失然其日夜之間亦必有所滋長又得夜氣澄静以存養之故平旦氣清時其好惡亦得其同然之理旦晝之所為有梏亡之矣此言人纔有此善心便有不善底心來勝了不容他那善底滋長耳又曰今且看那平旦之氣自别廣云如童䝉誦書到氣昏時雖讀數百遍愈念不得及到明早又却自念得此亦可見平旦之氣之清也曰此亦只就氣上説故孟子末後收歸心上去曰操則存舎則亡盖人心能操則常存豈特夜半平旦又云惻隐羞惡是已發處人須是於未發時有工夫始得廣問良心與氣合下雖是相資而生到得後來或消或長畢竟以心為主曰主漸盛則客漸衰主漸衰則客漸盛客盛然後勝這主故曰志動氣者十九氣動志者十一賀孫云若是客勝得主畢竟主先有病賀孫再三説夜氣一章曰氣清則心清其日夜之所息平旦之氣盖是静時有這好處發見縁人有不好處多所以纔有好處便被那不好處勝了不容他好處滋長然孟子此説只為常人言之其實此理日間亦有發見時不止夜與平旦所以孟子收拾在操則存舍則亡上盖為此心操之則存也人傑劉用之問夜氣之説曰他大意只在操則存舍則亡兩句上心一放時便是斧斤之戕牛羊之牧一收斂在此便是日夜之息雨露之潤他要人於旦晝時不為事物所汨文蔚問夜氣一章曰這病根只在放其良心上盖心既放則氣必昏氣既昏則心愈亡兩箇互相牽動所謂梏之反覆如下文操則存舍則亡却是用功緊切處是箇生死路頭又云梏之反覆都不干别事皆是人之所為有以致之燾孟子言操則存舍則亡出入無時莫知其鄉只是狀人之心是箇難把捉底物事而人之不可不操出入便是上面操存舍亡入則是在這裏出則是亡失了此大約泛言人心如此非指已放者而言亦不必要於此論心之本體也端䝉操則存舍則亡只是人能持此心則心在若捨之便如去失了求放心不是别有一物在外旋去收拾囘來只是此心頻要省察才覺不在便收之爾按先生他語只操便存只求便是不放如復卦所謂出入無疾出只是指外而言入只是指内而言皆不出乎一卦孟子謂出入無時心豈有出入只要人操而存之耳明道云聖賢千言萬語只要人收已放之心釋氏謂一大藏教只是一箇注脚所謂聖賢千言萬語亦只是一箇注脚而已謨問操則存曰心不是死物須把做活物看不爾則是釋氏入定坐禪操存者只是於應事接物之時事事中理便是存若處事不是當便是心不在若只管兀然守在這裏驀忽有事至于吾前操底便散了却是舍則亡也仲思問於未應接之時如何曰未應接之時只是戒謹恐懼而已又問若戒謹恐懼便是把持曰也須是持但不是硬捉在這裏只要提教他醒便是操不是塊然自守砥人心操則存舎則亡須是常存得造次顛沛必於是不可有一息間斷於未發之前須是得這虚明之本體分曉及至應事接物時只以此處之自然有箇界限節制湊著那天然恰好處廣操則存舍則亡非無也逐於物而忘返耳子上問操則存舍則亡曰若不先明得性善有興起必為之志恐其所謂操存之時乃舍亡之時也璘操則存須於難易間驗之若見易為力則真能操也難則是别似一物操之未真也伯羽某嘗謂這心若未正時雖欲强教他正也卒乍未能得他正若既正後雖欲邪也卒乍邪未得雖曰操則存舍則亡也不得恁地快自是他勢恁地伯羽操則存舍則亡出入無時莫知其鄉人更不知去操舍上做工夫只去出入上做工夫孟子言操舍存亡都不言所以操存求放之法只操之求之便是知言問以放心求心如何問得來好他答不得只舉齊王見牛事殊不知只覺道我這心放了底便是心何待見牛時方求得伯羽盖卿以為操則存便是心未嘗放舍則亡便是此心已放曰是如此盖求放操存皆兼動静而言非塊然黙守之謂道夫操存舍亡只在瞬息之間不可不常常着精采也又曰孟子求放心語已是寛若居處恭執事敬二語更無餘欠賀孫操則存舍則亡出入無時莫知其鄉惟心之謂與為仁由已而由人乎哉這箇只在我非他人所能與也非禮勿視聼言動勿與不勿在我而已今一箇無狀底人忽然有覺曰我做得無狀了便是此心存處孟子言求其放心亦説得慢了人傑問注云出入無定時亦無定處既云操則常存則疑若有一定之所矣曰此四句但云本心神明不測不存即亡不出即入本無定所如今處處常要操存安得有定所某常説操則存克己復禮敬以直内等語不須講量不須論辨只去操存克復便了只今眼下便是用功處何待擬議思量與辨論是非講究道理不同若此等處只下着頭做便是不待問人僴因操舍而有存亡出入僴入不是已放之心入來升卿觸物而放去是出在此安坐不知不覺被他放去也是出故學先求放心升卿道夫言嘗與子昂論心無出入子昂謂心大無外固無出入道夫因思心之所以存亡者以放下與操之之故非真有出入也曰言有出入也是一箇意思言無出入也是一箇意思但今以夫子之言求之他分明道出入無時且㸔自家今汨汩沒沒在這裏非出入而何惟其神明不測所以有出入惟其能出入所以神明不測道夫或問出入無時非真有出入只是以操舍言曰出入便是存亡操便存舍便亡又曰有人言無出入説得是好某看來只是他偶然天姿粹美不曾大段流動走作所以自不見得有出入要之心是有出入此亦只可以施於他一身不可為衆人言衆人是有出入聖賢立教通為衆人言不為一人言賀孫操則存舍則亡程子以為操之之道惟在敬以直内而已如今做工夫却只是這一事最𦂳要這主一無適底道理却是一箇大底其他道理搃包在裏面其他道理已具所謂窮理亦止是自此推之不是從外面去尋討一似有箇大底物事包得百來箇小底物事既存得這大底其他小底只是逐一為他㸃過看他如何模様如何安頓如今做工夫只是這箇最緊要若是閒時不能操而存之這箇道理自是間斷及臨事方要窮理從那裏捉起惟是平時常操得存自然熟了將這箇去窮理自是分明事已此心依前自在又云雖是識得箇大底都包得然中間小底又須着逐一㸃掇過賀孫集義夜氣之説常在日間舊看此不分明後來看伊川語有云夜氣不足以存良知良能也方識得破可學云此一段首末自是論心曰然可學人心縁境出入無時如看一物心便在外看了即便在此随物者是浮念此是本心浮念斷便在此其實不是出入但欲人知出入之故耳無出入是一種人有出入是一種人所以云淳夫女知心而不知孟子此女當是完實不勞攘故云無出入而不知人有出入者多猶無病者不知人之疾痛也方伯豐問淳夫女子雖不識孟子却識心如何曰試且看程子當初如何説及再問方曰人心自是有出入然亦有資禀好底自然純粹想此女子自覺得他箇心常湛然無出入故如此説只是他一箇如此然孟子之説却大乃是為天下人説盖心是箇走作底物伊川之意只謂女子識心却不是孟子所引夫子之言耳㽦范淳夫之女謂心豈有出入伊川曰此女雖不識孟子却能識心此一段説話正要人看孟子舉孔子之言曰出入無時莫知其鄉此别有説伊川言淳夫女却能識心心却易識只是不識孟子之意去偽魚我所欲章問舍生取義曰此不論物之輕重只論義之所安耳時舉義在於生則舍死而取生義在於死則舍生而取死上蔡謂義重於生則舍生而取義生重於義則當舍義而取生既曰義在於生又豈可言舍義取生乎蜚卿問生人心義道心乎曰欲生惡死人心也惟義所在道心也權輕重却又是義明道云義無對或曰義與利對道夫問若曰義者利之和則義依舊無對曰正是恁地道夫上蔡謂義重於生則舍生取義生重於義則舍義取生此説不然義無可舍之理當死而死義在於死不當死而死義在於不死無徃而非義也閎祖因論夜氣存養之説曰某嘗見一種人汲汲營利求官職不知是勾當甚事後來思量孟子説所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有之賢者能勿喪耳他原來亦有此心只是他自失了今却别是一種心所以不見義理文蔚云他雖是如此想羞惡之心亦須萌動亦自見得不是但不能勝利欲之心耳曰只是如此濟甚事今夜愧恥明日便不做方是若愧恥後又却依舊自做何濟於事文蔚或曰萬鍾於我何加焉他日或為利害所昏當反思其初則不為所動矣曰此是克之之方然所以克之者須是有本領後臨時方知克去得不然臨時比並又却只是擇利處去耳璘仁人心也章仁人心也是就心上言義人路也是就事上言伯羽問仁人心義人路路是設譬喻仁却是直指人心否曰路字非譬喻恐人難曉故謂此為人之路在所必行爾謨或問仁人心義人路曰此猶人之行路爾心即人之有知識者路即賢愚之所共由者孟子恐人不識仁義故以此喻之然極論要歸只是心爾若於此心常得其正則仁在其中故自捨正路而不由放其心而不知求以下一向説從心上去大雅敬之問仁人心也曰仁是無形迹底物事孟子恐人理會不得便説道只人心便是却不是把仁來形容人心乃是把人心來指示仁也所謂放其心而不知求盖存得此心便是仁若此心放了又更理㑹甚仁今人之心静時昏動時擾亂便皆是放了時舉問揚氏謂孟子言仁人心也最為親切竊謂以心之徳為仁則可指人心即是仁恐未安曰仁人心也義人路也此指而示之近縁人不識仁義故語之以仁只在人心非以人心訓仁義只人之所行者是也必大孟子説仁人心也此語最親切心自是仁底物事若能保養存得此心不患他不仁孔門學者問仁不一聖人答之亦不一亦各因其人而不同然大槩不過要人保養得這物事所以學者得一句去便能就這一句上用功今人只説仁是如何求仁是如何待他尋得那道理出來却不知此心已自失了程子榖種之喻甚善若有這種種在這裏何患生理不存人有鷄犬放則知求之有放心而不知求某以為鷄犬放則有未必可求者惟是心纔求則便在未有求而不可得者道夫孟子盖謂鷄犬不見尚知求之至於心則不知求鷄犬之出或遭傷害或有去失且有求而不得之時至於此心無有求而不得者便求便在更不用去尋討那失底自是失了這後底又在節節求節節在只恐段段恁地失去便不得今日這段失去了明日那段又失一向失却便不是子䝉或問求放心曰此心非如鷄犬出外又着去捉他但存之只在此不用去捉他放心不獨是走作喚做放才昏睡去也是放只有些昏惰便是放格録恪或問求放心愈求則愈昏亂如何曰即求者便是賢心也知求則心在矣今以已在之心復求心即是有兩心矣雖曰譬之鷄犬鷄犬却須尋求乃得此心不待宛轉尋求即覺其失覺處即心何更求為自此更求自然愈失此用力甚不多但只要常知提醒爾醒則自然光明不假把捉今言操之則存又豈在用把捉亦只是説欲常常醒覺莫令放失便是此事用力極不多只是些子力爾然功成後却應事接物觀書察理事事賴他如推車子初推他用些力車既行後自家却賴他以行大雅放心只是知得便不放如雞犬之放或有隔一宿求不得底或有被人殺終身求不得底如心則才知是放則此心便在這裏五峯有一段説得甚長然説得不是他説齊王見牛為求放心如終身不見此牛不成此心便常不見只消説知其為放而求之則不放矣而求之三字亦剰了從周或問求放心曰知得心放此心便在這裏更何用求適見道人題壁云苦海無邊囘頭是岸説得極好知言中或問求放心答語舉齊王見牛事某謂不必如此説不成不見牛時此心便求不得若使某答之只曰知其放而求之斯不放矣而求之三字亦自剰了學䝉季成問為學當求放心曰若知放心而求之則心不放矣知之則心已在此但不要又放了可也然思之尚多了而求之三字盖卿從旁而言曰盖卿嘗以為操則存便是心未嘗放舍則亡便是此心已放曰是如此盖卿人心纔覺時便在孟子説求放心求字早是遲了䕫孫求放心只覺道我這心如何放了只此念纔起此言未出口時便在這裏不用擬議别去求之但常省之而勿失耳伯羽求放心也不是在外面求得箇放心來只是求時便在我欲仁斯仁至矣只是欲仁便是仁了義剛求放心非以一心求一心只求底便是已收之心操則存非以一心操一心只操底便是已存之心心雖放千百里之逺只一收便在此他本無去來也伯羽季成問放心曰如求其放心主一之謂敬之類不待商量便合做起若放遲霎時則失之如辨明是非經書有疑之類則當商量盖卿孟子言求放心你今只理㑹這物事常常在時私欲自無着處且須持敬祖道收放心只是收物欲之心如理義之心即良心切不須收須就這上看教熟見得天理人欲分明從周叔重問所謂求放心者不是但低眉合眼死守此心而已要須常使此心頓放在義理上曰也須是有專静之功始得時舉因云自來見得此理真無内外外面有跬歩不合道理便覺此心慊然前日侍坐深有得於先生醒之一字曰若長醒在這裏更須看惻隐羞惡是非恭敬之心所發處始得當一念慮之發不知是屬惻隐耶羞惡是非恭敬耶須是見得分明方有受用處時舉心兼攝性情則極好然出入無時莫知其鄉難制而易放則又大不好所謂求其放心又只是以心求其心心求心説易入謝氏有物之説要識得端䝉求放心初用求後來不用求所以病翁説既復其初無復之者文蔚學問之道無他求其放心而已不是學問之道只有求放心一事乃是學問之道皆所以求放心如聖賢一言一語都是道理賀孫學問之道無他求其放心而已諸公為學且須於此着切用工夫且學問固亦多端矣而孟子直以為無他盖身如一屋子心如一家主有此家主然後能灑掃門户整頓事務若是無主則此屋不過一荒屋爾實何用焉且如中庸言學問思辨四者甚切然而放心不收則以何者而學問思辨哉此事其要諸公毎日若有文字思量未透即可存着此事若無文字思量即收歛此心不容一物乃是用功也壯祖學問之道孟子斷然説在求放心學者須先收拾這放心不然此心放了博學也是閒審問也是閒如何而明辨如何而篤行銖學須先以求放心為本致知是他去致格物是他去格正心是他去正無忿懥等事誠意是他自省悟勿夾帶虚偽修身是他為之主不使好惡有偏伯羽學問之道無他求其放心而已舊看此只云但求其放心心正則自定近看儘有道理須是看此心果如何須是心中明盡萬理方可不然只欲空守此心如何用得如平常一件事合放重今乃放輕此心不樂放重則心樂此可見此處乃與大學致知格物正心誠意相表裏可學謂若不於窮理上作工夫遽謂心正乃是告子不動心如何守得曰然又問舊看放心一段第一次看謂不過求放心而已第二次看謂放心既求儘當窮理今聞此説乃知前日第二説已是隔作兩段須是窮理而後求得放心不是求放心而後窮理曰然可學問孟子只説學問之道在求放心而已不曾欲他為曰上面煞有事在注下説得分明公但去看又曰説得太緊切則便有病孟子此説太緊切便有病節上有學問二字在不只是求放心便休節孟子曰求其放心而已矣當於未放之前看如何已放之後看如何復得了又看是如何作三節看後自然習熟此心不至於放季札孟子説學問之道無他求其放心而已矣可煞是説得切子細看來却反是説得寛了孔子只云居處恭執事敬與人忠出門如見大賔使民如承大祭若能如此則此心自無去處自不容不存此孟子所以不及孔子問先生向作仁説大率以心具愛之理故謂之仁今集注仁人心也只以為酬酢萬變之主如何曰不要如此看且理㑹箇仁人心也須見得是箇酬酢萬變之主若只管以彼較此失了本意看書且逐段看如喫物相似只咀嚼看如何向為人不理㑹得仁故做出此等文字今却反為學者争論竇云先生之文似藥方服食却在學者曰治病不治病却在藥方服食見效不見效却在人竇問心中湛然清明與天地相流通此是仁否曰湛然清明時此固是仁義禮智綂㑹處今人説仁多是把做空洞底物看却不得當此之時仁義禮智之苖脉已在裏許只是未發動及有箇合親愛底事來便發出惻隐之心有箇可厭惡底事來便發出羞惡之心禮本是文明之理其發便知有辭遜智本是明辨之理其發便知有是非又曰仁是惻隐之母惻隐是仁之子又仁包義禮智三者仁似長兄管屬得義禮智故曰仁者善之長徳明集注蜚卿問孟子説求放心從仁人心也説將來莫是收此心便是仁存得此心可以存此仁否曰也只是存得此心可以存此仁若只收此心更無動用生意又濟得甚麽所以明道又云自能尋向上去這是已得此心方可做去不是道只塊然守得這心便了問放心還當將放了底心重新收來還只存此心便是不放曰看程先生所説文義自是如此意却不然只存此心便是不放不是將已縱出了底依舊收將轉來如七日來復終不是已徃之陽重新將來復生舊底已自過去了這裏自然生出來這一章意思最好須將來日用之間常常體認看這箇初無形影忽然而存忽然而亡誠無為㡬善惡通書説此一段尤好誠無為只是常存得這箇實理在這裏惟是常存得實理在這裏方始見得㡬方始識得善惡若此心放而不存一向反覆顛錯了如何别認得善惡以此知這道理雖然説得有許多頭項看得熟了都自相貫通聖賢當初也不是有意説許多頭項只因事而言賀孫明道説聖賢千萬言語云云只是大槩説如此若已放之心這箇心已放去了如何㑹收得轉來只是莫令此心逐物去則此心便在這裏不是如一件物事放去了又收囘來且如渾水自流過去了如何㑹收得轉後來自是新底水周先生曰誠心復其不善之動而已只是不善之動消於外則善便實於内操則存舍則亡只是操則此心便存孟子曰人有鷄犬放則知求之有放心而不知求可謂善喻然鷄犬猶有放失求而不得者若心則求着便在這裏只是知求則心便在此未有求而不可得者池本作便是反覆入身來賀孫孟子説學問之道無他求其放心而已矣此最為學第一義也故程子云聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去某近因病中兀坐存息遂覺有進歩處大抵人心流濫四極何有定止一日十二時中有㡬時在軀殻内與其四散閒走無所歸着何不收拾令在腔子中且今縱其營營思慮假饒求有所得譬如無家之商四方營求得錢雖多若無處安頓亦是徒費心力耳大雅問明道云聖賢千言萬語只是收放心曰所謂講學讀書固是然要知所以講學所以讀書所以致知所以力行以至習禮習樂事親從兄無非只是要收放心孟子之意亦是為學問者無他皆是求放心爾此政與思無邪一般所謂詩三百一言以蔽之曰詩無邪使人知善而勸知惡而戒亦只是一箇思無邪耳㽦明道云聖賢千言萬語只要人將已放之心反復入身來自能尋向上去下學而上達也伊川云人心本善流而為惡乃放也初看亦自疑此兩處諸公道如何須看得此兩處自不相礙乃可二先生之言本不相礙只是一時語體用未甚完備大意以為此心無不善止縁放了苟纔自知其已放則放底便斷心便在此心之善如惻隐羞惡恭敬是非之端自然全得也伊川所謂人心本善便正與明道相合惟明道語未明白故或者錯看謂是收拾放心遂如釋氏守箇空寂不知其意謂收放心只存得善端漸能充廣非如釋氏徒守空寂有體無用且如一向縱他去與事物相靡相刄則所謂惻隐羞惡恭敬是非之善端何縁存得賀孫明道曰聖賢千言萬語只是教人將已放底心反復入身來自能尋向上去下學而上達池本下云看下二句必不至空守此心無所用也問伊川曰心本善流入於不善須理㑹伊川此語若不知心本善只管去把定這箇心教在裏只可静坐或如釋氏有體無用應事接物不得流入不善池本云四端備於吾心心存然後能擴而充之心放則顛㝠莫覺流入不善云云是失其本心如向為身死而不受今為妻妾之奉為之若此類是失其本心又如心有忿懥恐懼好樂憂患則不得其正池本下云心不在焉亦是放二説未嘗相礙賀孫問程子説聖人千言萬語云云此下學上達工夫也竊謂心若已放了恐未易收拾不審其義如何曰孟子謂出入無時莫知其鄉心豈有出入出只指外而言入只指内而言只是要人操而存之耳非是如物之散失而後收之也煇文字極難理㑹孟子要畧内説放心處又未是前夜方思量得出學問之道皆所以求放心不是學問只有求放心一事程先生説得如此自家自看不出問賀孫曉得否曰如程子説吾作字甚敬只此便是學這也可以收放心非是要字好也曰然如灑掃應對博學審問慎思明辨皆所以求放心賀孫福州陳烈少年讀書不上因見孟子求放心一段遂閉門黙坐半月出來遂無書不讀亦是有力量人但失之怪耳因曰今人有養生之具一失之便知求之心却是與我同生者因甚失而不求或云不知其失耳曰今聖賢分明説向你教你求又不求何也孟子於此段再三提起説其諄諄之意豈苟然哉今初求須猛勇作力如煎藥初用猛火既沸之後方用慢火養之久之須自熟也大雅人之於身也章孟子文義自分曉只是熟讀教他道理常在目前胷中流轉始得又云飲食之人無有失也則口腹豈適為尺寸之膚哉此數句被恁地説得倒了也自難曉意謂使飲食之人真箇無所失則口腹之養本無害然人屑屑理㑹口腹則必有所失無疑是以當知養其大體而口腹底他自㑹去討喫不到得餓了也賀孫公都子問鈞是人也章耳目之官不能思故蔽於物耳目一物也外物一物也以外物而交乎耳目之物自是被他引去唯心之官則思故思則得之不思則不得惟在人思不思之間耳然此物乃天之與我者所謂大者也君子當於思處用工能不妄思是能先立其大者也立字下得有力夫然後耳目之官小者弗能奪也是安得不為大人哉大雅耳目亦物也不能思而交於外物只管引將去心之官固是主於思然須是思方得若不思却倒把不是做是是底却做不是心雖主於思又須着思方得其所思若不思則邪思雜慮便順他做去却害事賀孫問不思而蔽於物蔽是遮蔽否曰然又問如目之視色從他去時便是為他所蔽若能思則視其所當視不視其所不當視則不為他所蔽矣曰然若不思則耳目亦只是一物故曰物交物則引之而已矣廣問物交物曰上箇物字主外物言下箇物字主耳目言孟子説得此一段好要子細看耳目謂之物者以其不能思心能思所以謂之大體問官字如何曰官是主心主思故曰先立乎其大者昔汪尚書見焦先生問為學如何焦先生只説一句先立乎其大者祖道心之官則思固是元有此思只恃其有此任他如何却不得須是去思方得之不思則不得也此最要緊下云先立乎其大者即此思也心元有思須是人自主張起來賀孫孟子説先立乎其大者則其小者不能奪也此語最有力且看他下一箇立字昔汪尚書問焦先生為學之道焦只説一句曰先立乎其大者以此觀之他之學亦自有要卓然竪起此心方子録云立者卓然竪起此心便是立所謂敬以直内也故孟子又説學問之道無他求其放心而已矣求放心非是心放出去又討一箇心去求他如人睡着覺來睡是他自睡覺是他自覺只是要常惺惺趙昌父云學者只縁斷續處多曰只要學一箇不斷續文蔚先立乎大者則小者不能奪今忘前失後心不主宰被物引將去致得膠擾所以窮他理不得徳明此天之所以與我者古本此皆作比趙岐注亦作比方天之與我者則心為大耳目為小其義則一般但孟子文恐不如此比字不似此字較好廣問集注所載范浚心銘不知范曾從誰學曰不曾從人但他自見得到説得此件物事如此好向見吕伯恭甚忽之問須取他銘則甚曰但見他説得好故取之曰似恁説話人也多説得到曰正為少見有人能説得如此者此意盖有在也廣有天爵者章問脩其天爵而人爵從之曰從不必作聼從之從只修天爵人爵自從後面來如禄在其中矣之意修其天爵自有箇得爵禄底道理與要求者氣象故大相逺去偽黄先之問此章曰那般處也自分曉但要自去體認那箇是内那箇是外自家是向那邊去那邊是是那邊是不是須要實見得如此賀孫問古人尚修天爵以要人爵今人皆廢天爵以要人爵曰便是如此賀孫欲貴者人之同心章看欲貴人之同心説曰大槩亦是然如此説時又只似一篇文字却説不殺如孟子於此只云弗思耳三字便實知功夫只在這裏㽦仁之勝不仁也章仁之勝不仁也猶水勝火以理言之則正之勝邪天理之勝人欲甚易而邪之勝正人慾之勝天理若甚難以事言之則正之勝邪天理之勝人慾甚難而邪之勝正人慾之勝天理却甚易盖纔是蹉失一兩件事便被邪來勝將去若以正勝邪則須是做得十分工夫方勝得他然猶自恐怕勝他未盡在正如人身正氣稍不足邪便得以干之矣僴五榖種之羙者章一日舉孟子五榖者種之美者也苟為不熟不如稊稗誨諸生曰和尚問話只是一言兩句稊稗之熟者也儒者明經若通徹了不用費辭亦一言兩句義理便明白否則却是五榖不熟不如稊稗謨苟為不熟不如稊稗君子之志於道也不成章不達如今學者要緊也成得一箇坯模定了出冶工夫却在人只是成得一箇坯模了到做出冶工夫却最難正是天理人欲相勝之地自家這裏勝得一分他那箇便退一分自家這裏退一分他那箇便進一分如漢楚相持於成臯滎陽間只争這些子賀孫告子下任人有問屋廬子章親迎則不得妻不親迎則得妻如古者國有荒㓙則殺禮而多昏周禮荒政十二條中亦有此法盖貧窮不能備親迎之禮法許如此僴曹交問曰章孟子道人皆可以為堯舜何曾便道是堯舜更不假修為且如銀坑有鑛謂鑛非銀不可然必謂之銀不可須用烹煉然後成銀椿堯舜之道孝弟而已矣這只是對那不孝不弟底説孝弟便是堯舜之道不孝不弟便是桀紂僴歸而求之有餘師須是做工夫若茫茫恁地只是如此如前夜説讀書正是要自理㑹如在這裏如此讀書若歸去也須如此讀書㸔孟子此一段發意如此大却在疾行徐行上面要知工夫須是自理㑹不是别人干預得底事賀孫淳于髠曰先名實者章乃孔子則欲以㣲罪行不欲為苟去謂孔子於受女樂之後而遂行則言之似顕君相之過不言則已為苟去故因燔肉不至而行則吾之去國以其不致燔為得罪於君耳人傑魯欲使慎子為將軍章毅然問孟子説齊魯皆封百里而先生向説齊魯始封七百里者何邪曰此等處皆難考如齊東至於海西至于河南至于穆陵北至于無捸魯跨許宋之境皆不可謂非五七百里之濶淳問王制與孟子同而周禮諸公之地封疆方五百里諸侯方四百里伯三百里子二百里男百里鄭氏以王制為夏商制謂夏商中國方三千里周公斥而大之中國方七千里所以不同曰鄭氏只文字上説得好㸔然甚不曉事情且如百里之國周人欲増到五百里須併四箇百里國地方做得一國其所併四國又當别裂地以封之如此則天下諸侯東遷西移改立宗廟社稷皆為之騷動矣若如此䟎去不數大國便無地可容了許多國何以處之恐其不然竊意其初只方百里後來吞并遂漸漸大如禹㑹諸侯於塗山執玉帛者萬國到周時只有千八百國自非吞併如何不見許多國武王時諸侯地已大武王亦不柰何只得就而封之當時封許多功臣之國縁當初滅國者五十得許多空地可封不然則周公太公亦自無安頓處若割取諸國之地則寧不謀反如漢晁錯之時乎然則孟子百里之説亦只是大綱如此説不是實考得見古制淳古者制國土地亦廣非如孟子百里之説如齊地東至于海西至于河南至穆陵北至無棣土地儘濶禹㑹塗山執玉帛者萬國後來更相吞噬到周初只有千八百國是不及五分之一矣想得併來儘大周封新國若只用百里之地介在其間豈不為大國所吞亦縁誅紂伐奄滅國者五十得許多土地方封許多人問周禮所載諸公之國方五百里諸侯之國方四百里云云者是否曰㸔來怕是如此孟子之時去周初已六七百年既無載籍可考見不得端的如五十而貢七十而助此説自是難行問王制䟽載周初封建只是百里後來滅國漸廣方添至數百里曰此説非是諸國分地先來定了若後來漸添便須移動了㡬國徙去别處方得豈不勞擾僴舜發於􅅵畝章動心忍性者動其仁義禮智之心忍其聲色臭味之性銖困心衡慮徴色發聲謂人之有過而能改者如此困心衡慮者心覺其有過徴色發聲者其過形於外人傑明道曰自舜發於􅅵畆之中云云若要熟也須從這裏過只是要事事經歴過賀孫問若要熟也須從這裏過人須從貧困艱苦中做來方堅牢曰若不從這裏過也不識所以堅牢者正緣不曾親歴了不識似一條路須每日從上面往來行得熟了方認得許多險阻去處若素不曾行忽然一旦撞行將去少間定堕坑落塹去也僴教亦多術矣章予不屑之教誨也者趙氏曰屑潔也考孟子不屑就與不屑不潔之言屑字皆當作潔字解所謂不屑之教誨者當謂不以其人為潔而教誨之如坐而言不應隐几而卧之類大抵解經不可便亂説當觀前後字義也人傑朱子語類卷五十九
