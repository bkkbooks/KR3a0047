body:
  text: 朱子語類卷四十一論語二十三顔淵篇上顔淵問仁章顔子生平只是受用克己復禮四箇字不遷不貳三月不違不改其樂道夫顔子克己如紅爐上一㸃雪道夫克己復禮間不容髪無私便是仁道夫克己復禮如通溝渠壅塞仁乃水流也可學克己復禮如火烈烈則莫我敢遏若海克己亦别無巧法譬如孤軍猝遇強敵只得盡力舍死向前而已尚何問哉謨龔郯伯説克去己私後却方復禮曰克己復禮一如将水去救火相似又似一件事又似兩件事時舉植同克己則禮自復閑邪則誠自存非克己外别有復禮閑邪外别有存誠賀孫此非定説克己復禮所以言禮者謂有規矩則防範自嚴更不透漏必大克己復禮為仁與可以為仁矣之為如謂之相似與孝弟為仁之本為仁由己之為不同節一於禮之謂仁只是仁在内為人欲所蔽如一重膜遮了克去己私復禮乃見仁仁禮非是二物可學問克己復禮如見大賔之時指何者為仁曰存得心之本體節因說克己或曰若是人欲則易見但恐自說是天理處却是人欲所以為難曰固是如此且從易見底克去又却理㑹難見底如剥百合須去了一重方始去那第二重今且將義利兩字分箇界限緊緊走從這邊來其間細碎工夫又一靣理㑹如做屋柱一般且去了一重麄皮又慢慢出細今人不曽做得第一重便要做第二重工夫去如中庸說戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨此是尋常工夫都做了故又說出向上一層工夫以見義理之無窮耳不成十目所視十手所指處不慎便只去慎獨無此理也雉元翰問克去己私最是難事如今且於日用間每事尋箇是處只就心上驗之覺得是時此心便安此莫是仁否曰此又似說義却未見得仁又况做事只要靠着心但恐己私未克時此心亦有時解錯認了不若日用間只就事上子細思量體認那箇是天理那箇是人欲著力除去了私底不要做一味就理上去做次第漸漸見得道理自然純熟仁亦可見且如聖賢千言萬語雖不同都只是說這道理且將聖賢說底㸔一句如此說一句如彼說逐句把來湊看次第合得都是這道理或說如今一等非理事固不敢做只在書院中時亦自有一般私意難識所謂孜孜為善孜孜為利於善利之中却解錯認曰且做得一重又做一重大槩且要得界限分明遂以手畫扇中間云這一邊是善這一邊是利認得善利底界限了又却就這一邊體認纎悉不是處克將去聖人所以下箇克字譬如相殺相似定要克勝得他大率克己工夫是自著力做底事與他人殊不相干緊緊閉門自就身上子細體認覺得才有私意便克去故曰為仁由已而由人乎哉夫子說得大段分曉吕與叔克己銘却有病他說須於與物相對時克若此則是併物亦克也己私可克物如何克得去己私是自家身上事與物未相干在明作林安卿問克復工夫全在克字上蓋是就發動處克將去必因有動而後天理人欲之幾始分方知所決擇而用力也曰如此則未動以前不消得用力只消動處用力便得如此得否且更子細次早問看得如何林舉注中程子所言克己復禮乾道主敬行恕坤道為對只這箇也只是微有些如此分若論敬則自是徹頭徹尾要底如公昨夜之說只是發動方用克則未發時不成只在這裏打瞌睡懞憧等有私欲來時旋捉來克如此得否又曰若待發見而後克不亦晚乎發時固是用克未發時也須致其精明如烈火之不可犯始得僴或問克己之私有三氣稟耳目鼻口之欲及人我是也不知那箇是夫子所指者曰三者皆在裏然非禮勿視聽言動則耳目口鼻之欲較多又問克者勝也不如以克訓治較穏曰治字緩了且如捱得一分也是治捱得二分也是治勝便是打疊殺了他學蒙或曰克己是勝己之私之謂克否曰然曰如何知得是私後克將去曰隨其所知者漸漸克去或曰南軒作克己齋銘不取子雲之說如何曰不知南軒何故如此說恐只是一時信筆冩將去殊欠商量曰聞學中今已開又曰悔不及矣去偽克己復禮不可將理字來訓禮字克去己私固即能復天理不成克己後便都没事惟是克去己私了到這裏恰好著精細底工夫故必又復禮方是仁聖人却不只說克己為仁須說克己復禮為仁見得禮便事事有箇自然底規矩準則克己須著復於禮賀孫問非天理便是人欲克盡人欲便是天理如何却說克己了又須著復於禮曰固是克了己便是理然亦有但知克己而不能復於禮故聖人對說在這裏却不只道克己為仁須著箇復禮庻幾不失其則下文云非禮勿聽非禮勿視非禮勿言非禮勿動縁本來只有此禮所以克己是要得復此禮若是佛家儘有能克己者雖謂之無己私可也然却不曾復得禮也聖人之教所以以復禮為主若但知克己則下梢必堕於空寂如釋氏之為矣亞夫又問曰如坐如尸立如齊此是理如箕踞跛倚此是非禮去其箕踞跛倚宜若便是理然未能如尸如齊尚是己私賀孫此下三條疑聞同錄異而植錄尤詳亞夫問克己復禮章曰今人但說克己更不說復禮夫子言非禮勿視聽言動即是克己復禮之目也顔子㑹問夫子㑹答答得來包括得盡己字與禮字正相對說禮便有規矩凖繩且以坐立言之己便是箕踞禮便是坐如尸已便是跛倚禮便是立如齊但如此看便見又曰克己是大做工夫復禮是事事皆落腔窠克己便能復禮歩歩皆合規矩準繩非是克己之外别有復禮工夫也釋氏之學只是克己更無復禮工夫所以不中節文便至以君臣為父子父子為君臣一齊亂了吾儒克己便復禮見得工夫精細聖人說得來本末精粗具舉下靣四箇勿字便是克與復工夫皆以禮為準也克己復禮便是捉得病根對證下藥仲弓主敬行恕是且涵養將去是非猶未定涵養得到一歩又進一歩方添得許多見識克己復禮便剛決克除將去南升亞夫問克己復禮疑若克己後便己是仁不知復禮還又是一重工夫否曰已與禮對立克去已後必復於禮然後為仁若克去己私便無一事則克之後須落空去了且如坐當如尸立當如齊此禮也坐而倨傲立而跛倚此己私也克去己私則不容倨傲而跛倚然必使之如尸如齊方合禮也故克己者必須復此身於規矩準繩之中乃所以為仁也又問若以禮與已對看當從禮說去禮者天理之節文起居動作莫非天理起居動作之間莫不渾全是禮則是仁若皆不合節文便都是私意不可謂仁曰不必皆不合節文但才有一處不合節文便是欠闕若克去己私而安頓不著便是不入他腔窠且如父子自是父子之禮君臣自是君臣之禮若把君臣做父子父子做君臣便不是禮又問克己復禮與主敬行恕之别曰仲弓方始是養在這裏中間未見得如何顔子克己復禮便規模大精粗本末一齊該貫在這裏又問克己復禮如何分精粗曰若以克去己私言之便克己是精底工夫到禮之節文有所欠闕便是粗者未盡然克己又只是克去私意若未能有細密工夫一一入他規矩準繩之中便未是復禮如此則復禮却乃是精處時舉因問夜來先生謂坐如尸立如齊是禮倨傲跛倚是己有知倨傲跛倚為非禮而克之然乃未能如尸如齊者便是雖已克己而未能復禮也曰跛倚倨傲亦未必盡是私意亦有性自坦率者伊川所謂人雖無邪心苟不合正理乃邪心也佛氏之學超出世故無足以累其心不可謂之有私意然只見他空底不見實理所以都無規矩準繩曰佛氏雖無私意然源頭是自私其身便是有箇大私意了曰他初間也未便盡是私意但只是見得偏了時舉曰先生向所作克齋記云克己者所以復禮非克己之外别有所謂復禮之功是如何曰便是當時也說得忒快了明道謂克己則私心去自能復禮雖不學禮文而禮意已得如此等語也說忒髙了孔子說克己復禮便都是實曰如此則克己復禮分明是兩節工夫曰也不用做兩節看但不㑹做工夫底克己了猶未能復禮㑹做工夫底才克己便復禮也先生因言學者讀書須要體認靜時要體認得親切動時要别白得分明如此讀書方為有益時舉曰㬊問克己復禮曰人只有天理人欲兩途不是天理便是人欲即無不屬天理又不屬人欲底一節且如坐如尸是天理跛倚是人欲克去跛倚而未能如尸即是克得未盡却不是未能如尸之時不係人欲也須是立箇界限將那未能復禮時底都把做人欲斷定先生又曰禮是自家本有底所以說箇復不是待克了己方去復禮克得那一分人欲去便復得這一分天理來克得那二分己去便復得這二分禮來且如箕踞非禮自家克去箕踞稍稍端坐雖未能如尸便復得這些箇來又問如磨昏鏡相似磨得一分塵埃去復得一分明白便是如此然而世間却有能克己而不能復禮者佛老是也佛老不可謂之有私欲只是他元無這禮克己私了却空蕩蕩地他是見得這理元不是當克己了無歸著處又問所以喚做禮而不謂之理者莫是禮便是實了有準則有著實處曰只說理却空去了這箇禮是那天理節文教人有準則處佛老只為元無這禮克來克去空了只如曾㸃見處便見這意思又問曾㸃見得了若能如顔子實做工夫去如何曰曾㸃與顔子見處不同曾㸃只是見他精英底却不見那粗底顔子天資髙精粗本末一時見得透了便知得道合恁地下學上達去只是被他一時見透所以恁做將去曽㸃但只見得這向上底道理所以胷中自在受用處從容因問曽㸃資質莫是與顔子相反曰不是與顔子相反却與曾參相反他父子間為學大不同曾參是逐些子推將去曾㸃是只見他向上底了便不肯做又問子路若達為國以禮道理如何便是這氣象曰若達時事事都見得是自然底天理既是天理無許多費力生受又問子路就使達得却只是事為之末如何比得這箇曰理㑹得這道理雖事為之末亦是道理莫春者春服既成何嘗不是事為來又問三子皆事為之末何故子路達得便是這氣象曰子路才氣去得他雖麄暴些纔理㑹這道理便就這箇比及三年可使有勇且知方上靣却是這箇氣象求赤二子雖似謹細却只是安排來底又更是他才氣小了子路是甚麽様才氣先生又曰曽㸃之學無聖人為之依歸便是佛老去如琴張曾晳已做出這般事來又曰其克己往往吾儒之所不及但只他無那禮可復㬊再舉未能至於復禮以前皆是己私未盡克去曰這是旋克將去㬊因說夜來說浴乎沂等數句意在言外本為見得此數句只是見得曾㸃受用自在處却不曾見得曽㸃見那道理處須當分明先從這數句上體究出曽㸃所以如此灑落因箇甚麽曰這數句只是見得曽㸃從容自在處見得道理處却不在此然而却當就這看出來又曰只為三子見得低了曽㸃恁地說出來夫子所以與之然而終不似說顔子時說他只說是狂者正為只見得如此做來却不恁地又曰為國以禮之禮却不只是繁文末節㬊問莫便是那克己復禮之禮曰禮是那天地自然之理理㑹得時繁文末節皆在其中禮儀三百威儀三千却只是這箇道理千條萬緒貫通來只是一箇道理夫子所以說吾道一以貫之曾子曰忠恕而已矣是也盖為道理出來處只是一源散見事物都是一箇物事做出底一草一木與他夏葛冬裘渴飲饑食君臣父子禮樂器數都是天理流行活潑潑地那一件不是天理中出來見得透徹後都是天理理㑹不得則一事各自是一事一物各自是一物草木各自是草木不干自己事倒是莊老有這般說話莊子云言而足則終日言而盡道言而不足則終日言而盡物㬊因問這禮字恁地重看曰只是這箇道理有說得開朗底有說得細宻底復禮之禮說得較細宻博文約禮知崇禮卑禮字都說得細宻知崇是見得開朗禮卑是要確守得底又曰早間與亞夫說得那克己復禮是克已便是復禮不是克己了方待復禮不是做兩截工夫就這裏克將去這上靣便復得來明道說那克己則私心去自能復禮雖不學禮文而禮意已得這箇說得不相似又曰克己復禮是合掌說底植孔子告顔淵只說克己復禮若是克得已復得禮便自見仁分曉如往長安元不曾說與長安有甚物事如何但向說向西去少間他到長安自見得䕫孫因論克己復禮洽歎曰為學之艱未有如私欲之難克也先生曰有奈他不得時有與他做一片時洽謙之録云有言私欲難去曰難有時忘了他有時便與人為一片了非禮即已克己便復禮克己復禮便是仁天下歸仁天下以仁歸之閎祖問克己復禮即仁乎曰克己復禮當下便是仁非復禮之外别有仁也此間不容髪無私便是仁所以謂一日克己復禮天下歸仁若真箇一日打併得淨潔便是仁如昨日病今日愈便不是病伯羽一日克己復禮則一日天下歸仁二日克己復禮則二日天下歸仁䕫孫或問天下歸仁曰一日克己復禮使天下於此皆稱其仁又問一日之間安能如此曰非是一日便能如此只是有此理節或問一日克己復禮天下何故以仁與之曰今一日克己復禮天下人來㸃檢他一日内都是仁底事則天下都以仁與之一月能克己復禮天下人來㸃檢他一月内都無不仁底事則一月以仁與之若今日如此明日不如此便不㑹以仁與之也銖問一日克己天下歸仁若是聖人固無可克其餘則雖是大賢亦須着工夫如何一日之間便能如此雖顔子亦須從事於四勿曰若是果能克己復禮了自然能如此吕氏曰一日有是心則一日有是德廣因問一日克己復禮曰吕氏說得兩句最好云一日有是心則一日有是德盖一日真箇能克己復禮則天下之人須道我這箇是仁始得若一日之内事事皆仁安得天下不以仁歸之雉祖道録云事事皆仁故曰天下歸仁一日存此心則一日有此德一日克己復禮天下歸仁不是恁地略用工夫便一日自能如此須是積工夫到這裏若道是一日克己復禮天下便一向歸其仁也不得若一日克己復禮則天下歸其仁明日若不克己復禮天下又不歸仁賀孫問天下歸仁先生言一日能克己復禮天下皆以仁之名歸之與前說不同何也曰所以克己復禮者是先有為仁之實而後人以仁之名歸之也卓問一日克己復禮如何使天下便能歸仁曰若真能一日克己復禮則天下有歸仁之理這處亦如在家無怨在邦無怨意思在家無怨一家歸其仁在邦無怨一邦歸其仁就仲弓告止於邦家顔子體段如此便以其極處告之又曰歸猶歸重之意㝢問克己復禮為仁曰克去己私復此天理便是仁只克己復禮如以刀割物刀是自己刀就此便割物不須更借别人刀也天下歸仁天下之人以仁稱之也解釋經義須是實歴其事方見着實如說反身而誠樂莫大焉所謂誠者必須實能盡得此理仁義禮智無一些欠闕他底如何不樂既無實得樂自何而生天下歸仁之義亦類此既能克己復禮豈更有人以不仁見稱之理謨或問克己復禮則事事皆仁曰人能克己則日間所行事事皆無私意而合天理耳問顔淵問仁孔子對以克己復禮顔淵請問其目則對以非禮勿視聽言動看得用力只在勿字上曰亦須是要睹當得是禮與非禮文蔚非禮勿視說文謂勿字似旗脚此旗一麾三軍盡退工夫只在勿字上纔見非禮來則以勿字禁止之纔禁止便克己纔克去便能復禮又云顔子力量大聖人便就他一刀截斷若仲弓則是閉門自守不放賊入來底然敬恕上更好做工夫明作或問非禮勿視聽言動曰目不視邪色耳不聽淫聲如此類工夫却易視逺惟明才不逺便是不明聽德惟聰才非德便是不聰如此類工夫却難視聽言動但有些箇不循道理處便是非禮非禮勿視勿聽姦聲亂色不留聰明淫樂慝禮不接心術非是耳無所聞目無所視㝢元翰問非禮勿視聽言動看來都在視上曰不専在視上然聽亦自不好只縁先有視聽便引惹得言動所以先說視聽後說言動佛家所謂視聽甚無道理且謂物雖視前我元不曾視與我自不相干如此却是將眼光逐流入閙可也聽亦然天下豈有此理坐間舉佛書亦有克己底說話先生曰所以不可行者却無復禮一段事既克己若不復禮如何得東坡說思無邪有數語極好他說纔有思便有邪無思時又只如死灰却要得無思時不如死灰有思時却不邪明作敬之問上靣克己復禮是要克盡己私下靣四勿是嚴立禁制使之用力曰此一章聖人說只是要他克己復禮一日克己復禮則天下歸仁是言克己復禮之效為仁由己而由人乎哉是言克己復禮工夫處在我而不在人下靣請問其目則是顔子更欲聖人詳言之耳盖非禮勿視便是要在視上克己復禮非禮勿聽是要在聽上克己復禮非禮勿言是要在言上克己復禮非禮勿動是要在動上克己復禮前後反復只說這四箇字若如公說却是把做兩截意思看了時舉問顔淵問仁子曰非禮勿視聽言動嘗見南軒云勿字雖是禁止之辭然中須要有主宰始得不然則將見禁止於西而生於東禁止於此而發於彼盖有力不暇給者矣主宰云何敬而已矣先生曰不須更添字又是兩沓了先生問祖道曰公見南軒如何曰初學小生何足以窺大賢君子曰試一言之曰南軒大本完具資禀粹然却恐玩索處更欠精密曰未可如此議之某嘗論未發之謂中字以為在中之義南軒深以為不然及某再書論之書未至而南軒遣書來以為是南軒見識純粹踐行誠實使人望而敬畏之某不及也祖道問顔淵孔子未告以克己復禮當如何用工夫曰如博我以文約我以禮等可見又問云云曰只消就克己復禮上理㑹便了只管如此說甚麽賀孫問論語顔淵問仁與問為邦畢竟先是問仁先是問為邦曰看他自是有這克己復禮底工夫後方做得那四代禮樂底事業卓顔子聞克己復禮又問其目直是詳審曾子一唯悟道直是直截如何曰顔子資質固髙於曾子顔子問日却是初學時曽子一唯年老成熟時也謨人須㑹問始得砥録作為學須善問聖門顔子也是㑹問他問仁曰克己復禮為仁聖人恁地答他若今人到這裏須問如何謂之克己如何謂之復禮顔子但言請問其目到聖人答他非禮勿視非禮勿聽非禮勿言非禮勿動他更不再問非禮是如何勿視是如何勿聽是如何勿言勿動又是如何但言回雖不敏請事斯語矣這是箇答問底様子到司馬牛問得便乖聖人答他問仁處他說其言也訒斯謂之仁矣乎他心都向外去未必將來做切已工夫所以問得如此又謂不憂不懼斯謂之君子矣乎恰似要與聖人相拗底說話砥録云却不向裏思量只管問出外來正明道所謂塔前說塔也這處亦是箇不㑹問様子㝢孔門弟子如仁字義字之說己各各自曉得文義但看答問中不曾問道如何是仁只問如何行仁夫子答之亦不曾說如何是仁只說道如何可以至仁如顔子之問孔子答以克己復禮仲弓之問孔子答以出門如見大賔使民如承大祭已所不欲勿施於人司馬牛之問孔子答以仁者其言也訒樊遲之問孔子答以居處恭執事敬與人忠想是仁字都自解理㑹得但要如何做賀孫國秀問聖人言仁處如克己復禮一句最是言得仁之全體否曰聖人告人如居處恭執事敬與人忠之類無非言仁若見得時則何處不是全體何嘗見有半體底仁但克己復禮一句却尤親切時舉曺問一日克己復禮便是仁否曰今日克己復禮是今日事明日克己復禮是明日事克己復禮有幾多工夫在須日日用工聖人告顔淵如此告仲弓如此告樊遲又曰居處恭執事敬與人忠各隨人說出來須着究竟然大槩則一聖人之意千頭萬緒終歸一理林正卿問夫子答顔淵克己復禮為仁之問說得細密若其他弟子問多是大綱說如語仲弓以己所不欲勿施於人之類先生大不然之曰以某觀之夫子答羣弟子却是細密答顔子者却是大綱盖顔子純粹無許多病痛所以大綱告之至於請問其目答以四勿亦是大綱說使答其他弟子者如此必無入頭處如答司馬牛以其言也訒是隨其病處使之做工夫若能訒言即牛之克己復禮也至於答樊遲答仲弓之類由其言以行之皆克己復禮之功也人傑或問仁之全體在克己上曰若論全體是處可見且如其言也訒若於此理㑹得透徹亦見得全體須是知得那親切處如求生以害仁殺身以成仁須理㑹得害箇甚麽成箇甚麽趙師夏云莫只要不失這道理而滿足此心先生曰如求生以害仁言身雖生已是傷壊了這箇心殺身以成仁身雖死這箇心却自完全得在孔子告顔子以克己復禮語雖切看見不似告樊遲居處恭執事敬與人忠更詳細盖為樊遲未㑹見得箇已是甚禮是甚只分曉說教恁地做去顔子便理㑹得只未敢便領略却問其目待說得上下周匝了方承當去賀孫子壽言孔子答羣弟子所問隨其材答之不使聞其不能行之說故所成就多如克己復禮為仁唯以分付與顔子其餘弟子不得與聞也今教學者說著便令克己復禮幾乎以顔子望之矣今釋子接人猶能分上中下三根云我則隨其根器接之吾軰却無這箇先生曰此說固是如克己之說却縁衆人皆有此病須克之乃可進使肯相從却不誤他錯行了路今若教他釋子軰來相問吾人使之克己復禮他還相從否子壽云他不從矣曰然則彼所謂根器接人者又如何見得是與不是解后却錯了不可知大雅或問顔子克己復禮曰公且未要理㑹顔子如何克己復禮且要理㑹自家身已如何須着克己復禮這也有時須曽思量到這裏顔子如何苦死要克己復禮自家如何不要克己復禮如今說時也自說得儘通只是不曽關自家事也有被别人只管說說來說去無奈何去克己少間又忘了這裏須思量顔子如何心肯意肯要克己復禮自家因何不心肯意肯去克己復禮這處須有病根先要理㑹這路頭方好理㑹所以克之之方須是識得這病處須是見得些小功名利達真箇是輕克己復禮事真箇是重真箇是不恁地不得梁謙問克己復禮曰莫問顔子克己復禮且就自家己身上說顔子當時却不觧做别事只恁地克己復禮作甚顔子聞一知十又不是箇不聰明底人而今須是獨自做工夫說要自家已身見得便如上蔡聞程先生之言自然靣赤汗流却是見得他從前不是處而今却能遷善改過這箇便是透處卓問一日克己復禮天下歸仁向來徐誠叟說此是克己工夫積習有素到得一日果能克己復禮然後天下歸仁如何曰不必如此說只是一日用其力之意問有人一日之中克己復禮安得天下便歸仁曰只為不曽克己復禮一日克己復禮即便有一日之仁顔子三月不違仁只是拳拳服膺而弗失惟聖罔念作狂惟狂克念作聖今日克念即可作聖明日罔念即為狂矣曰到顔子地位其德已成恐不如此曰顔子亦只是有不善未嘗不知知之未嘗復行除是夫子七十而從心所欲不踰矩方可說此德明問顔子已是知非禮人如何聖人更恁地向他說曰也只得恁地做榦黄達才問顔子如何尚要克己先生厲聲曰公而今去何處勘驗他不用克己旣是夫子與他說時便是他要這箇工夫却如何硬道他不用克己這只是公那象山先生好恁地說道顔子不似他人様有偏處要克只是心有所思便不是了嘗見他與某人一書說道才是要克己時便不是了這正是禪家之說如杲老說不可說不可思之類他說到那險處時又却不說破却又將那虚處說起來如某所說克己便是說外障如他說是說裏障他所以嫌某時只縁是某捉着他緊處别人不曉禪便被他謾某却曉得禪所以被某看破了夫子分明說非禮勿視非禮勿聽非禮勿言非禮勿動顔子分明是請事斯語却如何恁地說得又問上蔡先從偏處克將去其說如何曰也不特恁地夫子說非禮勿視聽言動便盡包得了如偏底固是要克也有不偏而事為有不穏當底也當克且如偏於嚴克而就寛那寛中又有多少不好處要克今看顔子說夫子循循然善誘人博我以文約我以禮便是也要博文博文又是前一段事博文須是窮究得箇事理都明方解去克己復禮若不博文則自家行得是與不是皆不知所以大學先要致知格物方去正心誠意博學之審問之慎思之明辨之篤行之前面四項只是理㑹這物事理㑹得後方去行今若不博文只要撮箇尖底也不解說得親切也只是大槩綽得終不的當又問天下歸仁曰只是天下稱其仁而今若能克己復禮天下自是稱他是仁人這也不須理㑹只去理㑹那頭一件如喫飯相似只管喫自解飽若不去喫只想箇飽也無益義剛問天下歸仁集注云歸猶與也謂天下皆與其仁後面却載伊川語天下歸仁謂事事皆仁恰似兩般如何曰為其事事皆仁所以天下歸仁文蔚集注問克己復禮為仁這為字便與子路為仁之為字同否曰然又問程先生云須是克盡己私皆歸於禮方始是仁恐是仁字與為仁字意不相似曰克去那箇便是這箇盖克去己私便是天理克己復禮所以為仁也仁是地頭克己復禮是工夫所以到那地頭底又問天下歸仁曰自家既事事是仁則天下之人見自家事事合仁亦皆曰是仁若自家設有一事未是仁有一箇人來說不是仁時便是天下不曽皆與以仁在又問孔子答問仁之說甚多惟此說克己復禮恐是僴録作說得仁之全體曰只見得破做得徹都是全體若見不破做不徹時便是克己復禮也是閒說僴録云若真見得則孔子所答無非是全體若見不得雖是克己復禮也只没理會燾問程先生云克己復禮則事事皆仁故曰天下歸仁如何曰不若他更有一說云一日克己復禮則天下稱其仁為是大雅問程子曰事事皆仁故曰天下歸仁一日之間如何得事事皆仁曰一日克己復禮了雖無一事亦不害其為事事皆仁雖不見一人亦不害其為天下歸仁植聖人說話甚實不作今人談空故伊川說天下歸仁只作天下之人以仁與之此是微言惟顔子足以當之浩問謝氏說克己須從性偏難克處克將去此性是氣質之性否曰然然亦無難易凢氣質之偏處皆須從頭克去謝氏恐人只克得裏靣小小不好底氣質而忘其難者故云然僴問勿者勝私復禮之機曰主在勿字上纔覺非禮意思萌作便提却這勿字一刀兩段己私便可去私去則能復禮而仁矣都是自用著力使他人不著故曰為仁由己而由人乎哉或問顔子地位有甚非禮處何待下此四勿工夫曰只心術間微有些子非禮處也須用淨盡截㫁了他力量大聖人便教他索性克去譬如賊來顔子是進歩與之厮殺教仲弓以敬恕是教他堅壁清野截㫁路頭不教賊來銖因問克己復禮乾道也主敬行恕坤道也乾道是健決意坤道是確守意曰顔子是近前與他一刀兩㫁仲弓是一面自守乆而賊自遁去此亦只是一箇道理聖人教人因其資之髙下故不同要之用功成德則一耳先生因曰今人只爭箇勿字常記胡侍郎云我與顔子只爭一箇勿字顔子非禮便勿視我非禮亦視所以不及顔子因舉說文云勿字勢似旗旗是麾止禁止之物勿者欲人揮止禁約其私欲也銖問伊川四箴曰這箇須着子細去玩味因言工夫也只恁地做將去也别無道理拘廹得他譬如做酒只是用許多麯時日到時便自迸酒出來凢看文字只要温故知新只温箇故底便新意自出若捨了故底别要討箇新意便不得也時舉由乎中而應乎外這是勢之自然制於外所以養其中這是自家做工夫處道夫由乎中而應乎外制於外所以養其中上句是說視聽言動皆由中出㽦録作自此心形見下句是用功處㽦録作即是克己工夫問須是識别得如何是禮如何是非禮曰固是用分别得然緊要在勿字上不可放過閎祖㽦畧讀伯豐克己復禮為仁說曰只克己便是復禮克己復禮便似著誠去偽之類盖己私既克無非天理便是禮大凡才有些私意便非禮若截為兩段中間便有空闕處必大録此云著誠去偽不彼即此非克己之後中間又空一節須用復禮也伊川說由乎中而應乎外是說視聽言動四者皆由此心制乎外所以養其中却是就視聽言動上克去己私做工夫必大録此云上句言其理下句是工夫如尹彦明書四箴却云由乎中所以應乎外某向見傳本上句初無所以字㽦先生顧炎曰程子曰制於外所以養其中這一句好看炎直卿問制於外所以養其中此是說仁之體而不及用曰制於外便是用又曰視聽自外入言動自内出聖人言語緊密如此聖人於顔子仲弓都是就綱領出說其他則是就各人身上說道夫問由乎中而應乎外制於外所以養其中克己工夫從内靣做去反說制於外如何曰制却在内又問視箴何以特說心聽箴何以特說性曰互換說也得然諺云開眼便錯視所以就心上說人有秉彛本乎天性道理本自好在這裏却因雜得外面言語來誘化聽所以就理上說植操之有要視為之則只是人之視聽言動視最在先為操心之準則此兩句未是不好至蔽交於前方有非禮而視故制之於外以安其内則克己而復禮也如是工夫無間斷則乆而自從容不勉矣故曰乆而誠矣端蒙或問非禮勿視聽言動程子以為制之於外以安其内却是與克伐怨欲不行底相似曰克己工夫其初如何便得㑹自然也須着禁制始得到養得熟後便私意自漸漸消磨去矣今人須要揀易底做却不知若不自難處入如何得到易處所謂非禮勿者只要勿為耳眼前道理善惡是非阿誰不知只是自冒然去做若於眼前底識得分明既不肯去做便却旋旋見得細密底道理盖天下事有似是而實非者亦有似非而實是者這處要得講究若不從眼前明白底做將來這箇道理又如何得㑹自見時舉李問伊川云制乎外以安其内顔子心齋坐忘都無私意似更不必制於外曰顔子若便恁地聖人又何必向他說克己復禮便是他也更有些私意莫把聖人另做一箇人看便只是這様人如有周公之才之美使驕且吝若驕吝便不是周公惟聖罔念作狂若使堯舜為桀紂之行便狂去便是桀紂賀孫問四箴曰視是將這裏底引出去所以云以安其内聽是聽得外靣底來所以云閑邪存誠又問四者還有次第否曰視為先聽次之又曰哲人知幾誠之於思此是動之於心志士勵行守之於為此是動之於身雉問聽箴人有秉彛云云前靣亦大槩說至後兩句言閑邪存誠非禮勿聽不知可以改聽字作視箴用得否曰看他視箴說又較力視最在先開眼便是所以說得乃至於聽處却又較輕也㝢問知誘物化遂忘其正這箇知是如何曰樂記云人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣人莫不有知知者所當有也物至則知足以知之而有好惡這是自然如此到得好惡無節於内知誘於外方始不好去賀孫賀孫說顔淵問仁章集註之意曰如此只就上面說又須自家肚裏實理㑹得始得固是說道不依此說去外面生意不可若只誦其文而自不實曉認得其意亦不可又曰且依許多說話常常諷詠下稍自有得又曰四箴意思都該括得盡四箇箴有說多底有說少底多底減不得少底添不得如言箴說許多也是人口上有許多病痛從頭起至吉㓙榮辱惟其所召是就身上謹傷易則誕至出悖來違是當謹於接物間都說得周備哲人知幾誠之於思志士勵行守之於為這說兩般人哲人只於思量間便見得合做與不合做志士便於做出了方見得雖則是有兩様大抵都是順理便安裕從欲便危險集注所録都說得意思盡了此外亦無可說只是須要自實下工夫實見是如何看這意思都說去己私無非禮之視無非禮之聽無非禮之言無非禮之動這是甚麽氣象這便是渾然天理這便是仁須識認得這意思賀孫問視聽之間或明知其不當視而自接乎目明知其不當聽而自接乎耳這將如何曰視與看見不同聽與聞不同如非禮之色若過目便過了只自家不可有要視之之心非禮之聲若入耳也過了只自家不可有要聽之之心然這般所在也難古人於這處亦有以禦之如云姦聲亂色不留聰明淫樂慝禮不接心術賀孫間承誨言箴自人心之動因言以宣至吉凶榮辱惟其所召是謹諸己以下是說接物許多病痛曰上四句是就身上最緊切處須是不躁妄方始靜専纔不靜専自家這心自做主不成如何去接物下云矧是樞機興戎出好四句都是說謹言底道理下四句却說四項病傷易則誕傷煩則支已肆則物忤出悖則來違賀孫問如今所以難克也是習於私欲之深今雖知義理而舊所好樂未免沈伏於方寸之間所以外物纔誘裏面便為之動所以要緊只在克字上克者勝也日用之間只要勝得他天理纔勝私欲便消私欲纔長天理便被遮了要緊最是勝得去始得曰固是如此如權衡之設若不低便昻不昻便低凡天地隂陽之消長日月之盈縮莫不皆然又云這克己復禮事體極大非顔子之聰明剛健不足以擔當故獨以告顔子若其他所言如出門如見大賔使民如承大祭如仁者其言也訒又如居處恭執事敬都是克己事都是為仁事但且就一事說然做得工夫到也一般問仲弓問仁一章曰看聖人言只三四句便說得極謹密說出門如見大賔使民如承大祭下靣便又說己所不欲勿施於人都無些闕處尋常人說話多是只說得半截問看此意思則體用兼備曰是如此自家身已上常是持守到接物又如此則日用之間無有間隙私意直是何所容可見聖人說得如此極密問集注云事斯語而有得則固無己之可克矣此固分明下云學者審已而自擇焉可也未審此意如何曰看自家資質知何夫子告顔淵之言非大段剛明者不足以當之苟為不然只且就告仲弓處著力告仲弓之言只是淳和底人皆可守這兩節一似易之乾一似易之坤聖人於乾說忠信所以進德也修辭立其誠所以居業也說得煞廣闊於坤只說敬以直内義以方外只縁乾是純剛健之德坤是純和柔之德又云看集義聚許多說話除程先生外更要揀幾句在集注裏都拈不起看諸公說除是上蔡說得猶似如游楊說直看不得賀孫問哲人知幾誠之於思志士勵行守之於為此是兩般人否曰非也只是誠之於思底却覺得速守之於為者及其形於事為早是見得遲了此却是覺得有遲速不可道有兩般却兩脚做功夫去端蒙尹叔問哲人知幾誠之於思志士勵行守之於為四句莫有優劣否曰㝢録云只是兩項思是動之微為是動之著這箇是該動之精粗為處動思處亦動思是動於内為是動於外蓋思於内不可不誠為於外不可不守然専誠於思而不守於為不可専守於為而不誠於思亦不可又曰看文字須是得箇骨子諸公且道這動箴那句是緊要道夫云順理則裕莫是緊要否曰更連從欲則危兩句都是這是生死路頭又曰四者惟視為切所以先言視而視箴之說尤重於聽也道夫程子曰人能克己則仰不愧俯不怍心廣體胖其樂可知有息則餒矣如今見得直如此說得好儒用閎祖録云此說極有味集義問克己復禮章外書有曰不能克己是為楊氏之為我不能復禮是為墨氏之兼愛故曰親親而仁民仁民而愛物曰克己復禮只是一事外書所載殊覺支離此必記録之誤向來所以别為一編而目之曰外書者蓋多類此故也伊川嘗曰非禮處便是私意既是私意如何得仁須是克盡己私皆歸於禮方始是仁此說最為的確謨正淳問程子曰禮即理也不是天理便是人欲尹氏曰禮者理也去人欲則復天理或問不取尹說以為失程子之意何也曰某之意不欲其只說復禮而不說禮字蓋說復禮即說得着實若說作理則懸空是箇甚物事如謝氏曰以我視以我聽以我言以我動夫子分明說是非禮勿視聽言動謝氏却以以我言之此則自是謝氏之意非夫子所以告顔淵者矣又如游氏曰顔淵事斯語至於非禮勿動則不離於中其誠不息而可久將幾箇好字總聚在此雖無甚病終不是本地頭話問游氏専說非禮勿動遺却視聽言三事曰此却只是提此一語以槩其餘又問謝氏前篇謂曾㸃胷中無一事此章乃云仁者心與事一無一忘一助之失曰心與事一只是做此一事則主在此一事如此說亦無礙惟其心與事一故能胷中無一事也必大聖人只說做仁如克己復禮為仁是做得這箇模様便是仁上蔡却說知仁識仁煞有病節問天下歸仁曰只是天下以仁稱之又問謝說如何曰只是他見得如此大抵謝與范只管就見處却不若行上做工夫只管管扛扛得大下稍直是没着處如夫子告顔子非禮勿視聽言動只是行上做工夫去偽天下歸仁言天下皆與其仁伊川云稱其仁是也此却說得實至楊氏以為天下皆在吾之度内則是謂見得吾仁之大如此而天下皆囿於其中則說得無形影呂氏克己銘如洞然八荒皆在我闥之類同意端蒙問克己復禮天下歸仁南軒謂克盡己私天理渾然斯為仁矣天下歸仁者無一物之不體也故克己銘謂洞然八荒皆在我闥近得先生集注却云一日克己復禮則天下之人皆與其仁似與諸公之意全不相似程子曰克己復禮則事事皆仁故曰天下歸仁此意又是如何曰某向日也只同欽夫之說看得來文義不然今解却是從伊川說孔子直是以二帝三王之事許顔子此是微言自可意㑹孔子曰雍也可使南面當其問仁亦以在邦無怨在家無怨告之浩某解顔淵問仁章畢先生曰克是克去己私己私既克天理自復譬如塵垢既去則鏡自明瓦礫既掃則室自清如呂與叔克己銘則初未嘗說克去己私大意只說物我對立須用克之如此則只是克物非克己也枅克己銘不合以己與物對說謨呂與叔說克己從那己物對處克此說雖好然不是夫子與顔子說底意夫子說底是說未與物對時若與物對時方克他却是自家已倒了幾多所謂己只是自家心上不合理底便是不待與物對方是又曰呂與叔克己銘只說得一邊佐包詳道言克去勝心忌心先生曰克己有兩義物我亦是己私欲亦是己呂與叔作克己銘只說得一邊方子問公便是仁否曰非公便是仁盡得公道所以為仁耳求仁處聖人說了克己復禮為仁須是克盡己私以復乎禮方是公公所以能仁問克己銘痒痾疾痛舉切吾身不知是這道理否曰某見前輩一項論議說忒髙了不只就身上理㑹便說要與天地同其體同其大安有此理如初無吝驕作我蟊賊云云只說得克己一邊却不說到復禮處須先克己私以復於禮則為仁且仁譬之水公則譬之溝渠要流通此水須開浚溝渠然後水方流行也㝢問或問深論克己銘之非何也曰克己之己未是對人物言只是對公字說猶曰私耳呂與叔極口稱楊遂以己既不立物我並觀則雖天下之大莫不皆在於吾仁之中說得來恁大故人皆喜其快纔不恁說便不滿意殊不知未是如此道夫云如此則與叔之意與下文克己之目全不干渉此自是自修之事未是道着外面在曰須是恁地思之公且道視聽言動干人甚事又問天下歸仁曰克己復禮則事事皆是天下之人聞之見之莫不皆與其為仁也又曰有幾處被前輩說得來大今收拾不得謂如君子所過者化本只言君子所居而人自化所存者神本只言所存主處便神妙横渠却云性性為能存神物物為能過化至上蔡便道惟能所存者神是以所過者化此等言語人皆爛熟以為必須如此說纔不如此說便不快意矣道夫林正卿問天下歸仁曰痒痾疾痛舉切吾身只是存想天下歸仁恁地則不須克己只坐定存想月十日便自天下歸仁豈有此理時舉問程先生曰事事皆仁故曰天下歸仁是如何曰事事皆仁所以天下歸仁於這事做得恁地於那事亦做得恁地所以天下皆稱其仁若有一處做得不是必被人看破了時舉林正卿問呂與叔云痒痾疾痛舉切吾身不知此語說天下歸仁如何曰聖人尋常不曾有這般說話近來人被佛家說一般大話他便做這般底話去敵他此天下歸仁與在邦無怨在家無怨一般此兩句便是歸仁様子又問怨是人怨己怨曰人怨恪問克己銘只說得公底意思曰克己銘不曾說着本意揚子雲曰勝己之私之謂克克字本虚如何専以勝己之私為訓鄭伯克段于鄢豈亦勝己之私耶閎祖上蔡說先難便生受如伊川便說制之於外以安其内其說平方以我視以我聽若以為心先有主則視聽不好事亦得大不便也方以我視以我聽恐怕我也没理㑹方游定夫有論語要旨天下歸仁引龎居士云云黄簡肅親見其手筆閎祖曾天游見陳幾叟曰克己復禮舊曉不得因在京師委巷中下轎渉泥看謁方悟有箇快活處後舉以問薛文薛昻曽之外甥薛云情盡性復正是如此陳曰又問薛丈做甚曾又曰又嘗以問游丈亦以為然陳復曰又更問那游丈蓋定夫以克己復禮與釋氏一般只存想此道理而已舊南本游氏語解中全用佛語解此一段某已削之若只以想像言克復則與下截非禮勿視四句有何干渉朱子語類卷四十一
