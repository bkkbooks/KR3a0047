body:
  text: 朱子語類卷六十九易五乾下文言上不必大故求道理看来只是恊韻説將去潜龍勿用何謂也以下大槩各就他要説處便説不必言專説人事天道伊川説乾之用乾之時乾之義也難分别到了時似用用似義淵問程易乾之用乾之時乾之義看来恐可移易説曰凡説經若移易得便不是本意看此三段只是聖人反復賛咏乾之徳耳如潜龍勿用陽在下也便是第二段陽氣潜藏便是上段龍徳而隠者也聖人反覆發眀以示人耳銖問伊川分乾之時乾之義如何曰也是覺得不親切聖人只是敷衍其義又兼要押韻那裏恁地分别礪庸言庸行盛徳之至到這裡不消得恁地猶自閑邪存誠便是無射亦保雖無厭斁亦當保也保者持守之意淵常言既謹常行既信但用閑邪怕他入来此正是無射亦保之意僴問閑邪莫是為防閑抵拒那外物使不得侵近否曰固是凡言邪皆自外至者也然只視聽言動無非禮便是閑端䝉九二處得其中都不著費力庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化而已若九三則剛而不中過髙而危故有乾乾之戒人傑利見大人君徳也兩處説這箇君徳却是要發眀大人即是九二孔子怕人道别是箇大人故如此互相發使三百八十四爻皆恁地湊著豈不快活人只為中間多有湊不著底不可曉淵利見大人君徳也夫子怕人不把九二做大人别討一箇大人所以去這裏説箇君徳也兩處皆如此説龍徳正中以下皆君徳言雖不當君位却有君徳所以也做大人伊川却説得這箇大人做兩様淵黄有開問乾之九二是聖人之徳坤之六二是賢人之徳如何曰只謂乾九二是見成底不待脩為如庸言之信庸行之謹善世不伐徳博而化此即聖人之徳也坤六二直方大不習无不利須是敬以直内義以方外如此方能徳不孤即是大矣此是自直與方以至於大修為之序如此是賢人之徳也甞謂乾之一卦皆聖人之徳非是自初九以至上九漸漸做来盖聖人自有見成之徳所居之位有不同爾徳無淺深而位有髙下故然昔者聖人作易以為占筮故設卦假乾以象聖人之徳如勿用无咎利見大人有悔皆是占辭若人占遇初九則是潜龍之時此則當勿用如見龍在田之時則宜見大人所謂大人即聖人也問九二説聖人之徳已備何故九三又言進徳修業知至至之曰聖人只逐爻取象此不是言修徳節次是言居地位節次六爻皆是聖人之徳只所處之位不同初爻言不易乎世不成乎名至濳龍也已是説聖人之徳了只是濳而未用耳到九二却恰好其化已能及人矣又正是臣位所以處之而安到九三居下卦之上位已髙了那時節無可做只得恐懼進徳修業乾乾惕息恐懼此便是伊周地位㝢錄無此七字九四位便乖這處進退不由我了或躍在淵伊川謂淵者龍之所安恐未然田是平所在縱有水淺淵是深處不可測躍已離乎行而未至乎飛行尚以足躍則不以足一跳而起足不踏地跳得便上天去不得依舊在淵裏皆不可測下離乎行上近乎飛上不在天下不在田中不在人故或之或之者疑之也不似九二安穏自在此時進退不得皆不由我只聽天矣以聖人言之便是舜歴試文王三分天下有二湯武鳴條牧野時㝢錄云九三是伊周地位已自離了到上九又亢了看来人處大運中無一時閒㝢錄云跳得時便做有徳無位做不徹亦不失為潜龍吉凶悔吝一息不曾停如大車輪一般一恁滚將去聖人只隨他恁地去看道理如何這裏則將這道理處之那裏則將那道理處之淳㝢同進徳修業這四箇字煞包括道理徳是就心上説業是就事上説忠信是自家心中誠實修辭立其誠是説處有真實底道理進徳修業最好玩味淵忠信所以進徳忠信實也然從知上来吾心知得是非端的是如此心便實實便忠信吾心以為實然從此做去即是進徳修辭處立誠又是進徳事銖問忠信進徳莫只是實理否曰此説實理未得只是實心有實心則進徳自無窮學履忠信所以進徳實便光眀如誠意之潤身方子忠信進徳便是意誠處至如惡惡臭如好好色然後有地可據而無私累牽擾之患其進徳孰禦道夫徳者得之於心如得這孝之徳在自家心裏行出来方見這便是行忠信是真實如此淵忠信是根有此根便能發生枝葉業是外面有端緒者震忠信所以進徳忠信説實理信如吾斯之未能信忠信進徳就心上説居業就事上説端䝉問修辭立其誠何故獨説辭得非只舉一事而言否曰然也是言處多言是那發出来處人多是將言語做沒緊要容易説出来若一一要實這工夫自是大立其誠便是那後面知終終之可與存義也僴問九二閑邪存誠與九三修辭立誠相似否曰他地位自别閑邪存誠不大段用力修辭立誠大段著氣力又問進徳修業欲及時如何曰君子進徳修業不但為一身亦欲有為於天下及時是及時而進䕫孫問居業當兼言行言之今獨曰修辭何也曰此只是上文意人多因言語上便不忠信不忠信首先是言語因言忠信進徳便只是大學誠意之説如惡惡臭如好好色有此根本徳方可進修辭只是言顧行行顧言之意必大或問修業徳亦有進否曰進徳只就心上言居業是就事上言忠信如惡惡臭如好好色直是事事物物皆見得如此純是天理則徳日進不成只如此了却修辭立誠就事上理㑹所以居業也進則日見其新居則常而不厭賀孫問進徳修業進徳只一般説至修業却又言居業何也曰未要去理㑹居字修字且須理㑹如何是徳如何是業曰徳者本於内而言業者見於外而言曰内外字近之徳者得之於心者也業乃事之就緒者也如古人所謂業已如此是也且如事親之誠心真箇是得之於吾心而後見於事親之際方能有所就緒然却須是忠信方可進徳盖忠信則無一事不誠實猶木之有根其生不已佐忠信所以進徳只是著實則徳便自進居只是常常守得常常做去業只是這箇業今日修辭立其誠眀日又修辭立其誠淵林安卿問修業居業之别曰二者只是一意居守也逐日修作是修常常如此是守義剛亞夫問進徳脩業復云居業所以不同曰徳則日進不已業如屋宇未修則當修之既修則居之盖卿進徳修業進是要日新又新徳須是如此業却須著居修業便是要居他居如人之居屋只住在這裏面便是居不成道修些箇了便了修辭便是立誠如今人持擇言語丁一確二一字是一字一句是一句便是立誠若還脫空亂語誠如何立伊川說這箇做兩字眀道只做一箇説眀道説這般底説得條直淵伊川云忠信所以進徳聖人之事敬以直内賢人之事一便恁地剛健一便恁地柔順賀孫或問乾是聖人之事坤是賢人之事曰此但指乾之君子忠信進徳處與坤之敬以直内義以方外處問如此則賢者更不可做乾之事曰忠信進徳這箇如惡惡臭如好好色表裏無一毫不實處及修辭立誠見得精粗本末直恁地做將去有那剛健底意思若敬以直内義以方外便是謹守闕忠信所以進徳修辭立其誠所以居業如何是乾徳只是健底意思恁地做去㝢錄云硬立脚做去敬以直内義以方外如何是坤徳只是順底意思恁地收斂㝢錄云恁地收斂做去淳忠信所以進徳是乾健工夫蓋是剛健粹精兢兢業業日進而不自已如活龍然精彩氣焰自有不可及者直内方外是坤順工夫蓋是固執持守依文按本底做將去所以為學者事也又云説易只是隂陽説乾坤只是健順如此議論更無差錯人傑忠信進徳修辭立誠與敬以直内義以方外分屬乾坤盖取健順二體修辭立誠自有剛徤主立之體敬義便有静順之體進修便是箇篤實敬義便是箇虚静故曰陽實隂虚㽦問忠信所以進徳修辭立誠這是知得此理後全無走作了故直㧞恁地勇猛剛健做將去便是乾道資敬義夹持之功不敢有少放慢這是坤道曰意思也是恁地但乾便帶了箇知底意思帶了箇健底意思所謂進徳又是他心中已得這箇道理了到坤便有箇順底意思便只䝉乾之知更不説箇知字只説敬義夹持做去底已後事道夫問敬以直内若無義以方外也不得然所謂義以方外者只是見得這箇道理合當恁地便只斬截恁地做將去否曰見不分曉則圓後糊塗便不方了義以方外只那界限便分眀四面皆恁平正道夫履之問忠信進徳修辭立誠以居業乾道也敬以直内義以方外坤道也乾道恐是有進修不已之意坤道是安静正固之意否曰大畧也是如此但須識得忠信所以進徳是如何仲思曰恐只是發已自盡循物無違曰此是言應事接物者却又依舊是修辭立其誠了伯羽曰恐是存主誠實以為進徳之地曰如何便能忠信仲思所説固只是見於接物蜚卿所説也未見下落處直卿曰恐作内外分説如中庸所謂大徳敦化小徳川流曰也不必説得恁地髙這只是如惡惡臭如好好色則其獨自慎乾固是健然硬要他健也不得譬如不健底人只有許多精力如何强得乾從知處説坤從守處説生知者是合下便見得透忠信便是他更無使之忠信者大凡人學須是見到自住不得處方有功所以聖人説得恁地寛須是人自去裏面尋之須是知得方能忠信誠之者人之道看誠之字全只似固執意思然下文必先説擇善而後可固執也伯羽問忠信進徳修辭立誠乾道也敬以直内義以方外坤道也修辭恐是顔子非禮勿言之類敬義是確守貞一如仲弓問仁之類修省言辭等處是剛健進前一刀兩斷功夫故屬乎陽而曰乾道敬義夹持是退歩收歛確實静定工夫故曰坤道不知可作如此看否曰如此看得極是又問程子又云修省言辭乃是體當自家敬以直内義以方外之實事恐此所謂乾道坤道處亦不可作兩事看曰固皆是修已上事但若分言則須如此分别大抵看道理要看得他分合各有著落方是仔細銖問君子進徳修業曰乾卦連致知格物誠意正心都説了坤卦只是説持守坤卦是箇無頭物事只有後面一節只是一箇持守柔順貞固而已事事都不能為首只是循規蹈矩依而行之乾父坤母意思可見乾如創業之君坤如守成之君乾如蕭何坤如曹參所以坤元亨利牝馬之貞都是説箇順底道理又云先迷後得先迷者無首也前面一項事他都迷不曉只知順從而已後獲者迷於先而獲於後也乾則不言所利坤則利牝馬之貞毎毎不同所以康節云乾無十坤無一乾至九而止竒數也坤數偶無竒數也用之云乾無十者有坤以承之坤無一者有乾以首之曰然僴坤只説得持守一邉事如乾九三言忠信所以進徳修辭立其誠所以居業便連致知持守都説了坤從首至尾皆去却一箇頭如云後得主而有常或從王事無成有終皆是無頭文蔚曰此見聖人賢人之分不同處曰然文蔚用之問忠信進徳有剛健不已底意思所以屬乾道敬義是持守底意思所以屬之坤道曰乾道更多得上面半截坤只是後面半截忠信進徳前面更有一段工夫也子䝉伊川説内積忠信積字説得好某實其善之説雖宻不似積字見得積在此而未見於事之意學履内積忠信一言一動必忠必信是積也知至至之全在知字知終終之在著力守之賀孫伊川解修辭立誠作擇言篤志説得来寛不如眀道説云修其言辭正為立己之誠意乃是體當自家敬以直内義以方外之實事學履眀道論修辭立其誠所以居業説得来洞洞流轉若伊川以篤志解立其誠則緩了髙擇言是修辭篤志是立誠大率進徳修業只是一事進徳是就心上説修業是就事上説道夫問内積忠信是誠之於内擇言篤志是誠之於外否曰内積忠信是實心擇言篤志是實事又問知至至之是致知知終終之是力行固是如此然細思恐知至與知終屬致知至之終之屬力行二者自相兼帶曰程子云知至至之主知知終終之主行然某却疑似亦不必如此説只將忠信所以進徳修辭立其誠所以居業説自得盖無一念之不誠所以進其徳也徳謂之進則是見得許多又進許多無一言之不實所以居其業也業謂之居便是知之至此又有以居之也道夫内積忠信所以進徳也擇言篤志所以居業也擇言便是修省言辭篤志便是立誠知至至之便是知得進前去又曰知至便是真實知得如惡惡臭如好好色至之便是真箇求到如惡惡臭如好好色之地知終便是知得進到這處了如何保守得便終保守即便是終之如修辭立其誠便是知終終之可與幾是未到那裏先見得箇事幾便是見得到那裏可與存義便似守得箇物事在一箇是進一箇是居進如日知其所亡只管進前去居如月無忘其所能只管日日恁地做賀孫問本義云忠信主於心者無一念之不實既無不實則是成徳恐非進徳之事曰忠信所以進徳忠信者無一毫之不實若有一毫之不實如捕風捉影更無下工夫處徳何由進須是表裏皆實無一毫之偽然後有以為進徳之地徳方日新矣又問修辭云無一言之不實此易曉居業如何實曰日日如此行從生至死常如此用工夫無頃刻不相似池錄云本義說見扵事者又曰知崇禮卑亦是此意知崇進徳之事也禮卑居業之事也池錄云進謂日見其新居謂常而不厭僴問文言六爻皆以聖人眀之有隠顯而無淺深但九三一爻又似説學者事豈聖人亦有待於學邪所謂忠信進徳修辭立誠在聖人分上如何曰聖人亦是如此進徳亦是如此居業只是在學者則勉强而行之在聖人則自然安而行之知至知終亦然又問如庸言之信庸行之謹在聖人則自然如此為盛徳之至閑邪存其誠在聖人則為無斁亦保是此意否曰謹信存誠是裏面工夫無迹忠信進徳修辭居業是外面事㣲有迹在聖人分位皆做得自别銖蜚卿舉聖賢所説忠信處以求其同異曰公所舉許多忠信只是一箇但地頭不同直卿問乾之忠信與他處所謂忠信正猶夫子之忠恕與子思所謂違道不逺之忠恕相似曰不然此非有等級但地頭各别耳正如伊川所謂無妄之謂誠不欺其次也不欺也是誠但是次於無妄耳先生復問昨所説如何曰先生昨舉如好好色如惡惡臭説忠信所以進徳曰只是如此何不以此思之適所舉忠信只是對人言之者乾之忠信是專在已上言之者乾卦分眀是先見得這箇透徹便一直做將去如忠信所以進徳至可與存義也都是徑前做去有勇猛嚴厲斬截剛果之意須是見得方能恁地又如樂則行之憂則違之確乎其不可㧞亦是這般剛決意思所以生知者分眀是合下便見得透故其健自然如此更著力不得坤卦則未到這地位敬以直内義以方外未免緊帖把捉有持底意不似乾卦見得来透徹道夫問易傳云内積忠信所以進徳也積字又也似用力如何曰正是用力不用力如何得乾卦雖如此亦是言學但乾是先知得透故勇猛嚴厲其進莫之能禦履之問易之忠信莫只是實理曰此説實理未得只是實心有實心則進徳自無窮已又曰實心便是學者之闗中河内必先有此而後可以有為若無此則若存若亡而已烏能有得乎有諸已之謂信意正謂此又曰程子謂一心之中如有兩人焉將為善有惡以間之為不善又有愧耻之心此正交戰之驗程子此語正是言意不誠心不實處大凡意不誠分眀是吾之賊我要上他牽下来我要前他拖教去後此最學者所宜察道夫問君子進徳修業忠信所以進徳修辭立誠所以居業曰這忠信二字正是中庸之反諸身而誠孟子之反身而誠様誠字是知得真實了知得決然是如此更攧撲不碎了只欠下手去做忠信是知得到那真實極至處修辭立誠是做到真實極至處若不是真實知得進箇甚麽前頭黑淬淬地如何地進得去既知得若不真實去做那箇道理也只懸空在這裏無箇安泊處所謂忠信也只是虚底道理而已這裏極難説須是合中庸反諸身而誠與孟子反身而誠諸處看舊又見先生説孟子有諸已之謂信亦是易中所謂忠信非主忠信之忠信也若看不透且休待他時看而今正是這忠信所以進徳一節看未得所以那修辭立誠一段也看未得又問所以只説修辭者只是工夫之一件否曰言是行之表凡人所行者無不發出来也是一件大事又曰忠信是始修辭立誠是終知至至之是忠信進徳之事知終終之是居業之事問至之是已至其處否曰未在是知得那至處方有箇向望處正要行進去知終終之是已至其處終之而不去又問忠信所以進徳至居業也可以做聖人事否曰不可所以進徳正是做工夫處聖人則不消説忠信了只説得至誠問如此則皆是學者事曰然這裏大槩都是學者事問頃見某人言乾卦是聖人事坤卦是賢人事不知是否曰某不見得如此便是這物事勞攘好説他是聖人事又有説學者處如初九云潜龍勿用子曰云云也可以做聖人事九二曰云云也可以做聖人説及至九三便説得勞攘只做得學者事矣問内卦以徳學言外卦以時位言此却定曰然僴問忠信所以進徳修辭立其誠所以居業疑忠信是指言行發於外者而言如為人謀而不忠與朋友交而不信皆是發見於外者如何却言進徳修辭立誠與忠信果何異又指為居業何也曰忠信是心中朴實頭見得道理如此故其徳日進而不已猶孟子所謂有諸己者是也故指進徳而言修辭立誠却是就言語上説又問立誠不就制行上説而特指修辭何也曰人不誠處多在言語上柄君子進徳至存義也忠信猶言實其善之謂非主忠信與朋友交而有信之忠信能實其為善之意自是住不得徳不期進而自進猶饑之欲食自是不可已進徳則所知所行自進而不已居業則只在此住了不去只看進字居字可見進者日新而不已居者一定而不易忠信進徳修辭立誠居業工夫之條件也知至至之可與幾知終終之可與存義工夫之功程也此一段只是説終日乾乾而已學履敬之問忠信至存義也上面忠信與修辭立誠未是工夫到下面方是工夫否曰忠信所以進徳修辭立其誠所以居業如何未是工夫只上面忠信與修辭立誠便是材料下面知至知終惟有實了方會如此大抵以忠信為本忠信只是實若無實如何會進如播種相似須是實有種子下在泥中方㑹日日見發生若把箇空殻下在裏面如何㑹發生即是空道理須是實見得若徒將耳聽過將口説過濟甚事忠信所以為實者且如孝須實是孝方始那孝之徳一日進一日如弟須實是弟方始那弟之徳一日進一日若不實却自無根了如何㑹進今日覺是恁地去眀日便漸能熟眀日方見有一二分後日便見有三四分意思自然覺得不同立其誠誠依舊便是上面忠信修辭是言語照管得到那裏面亦須照管得到居業是常常如此不少間斷徳是得之於心業是見之於事進徳是自覺得意思日强似一日日振作似一日不是外面事只是自見得意思不同業是徳之事也徳則欲日進業要終始不易居是存而不失之意可與幾是見得前面箇道理便能日進向前去存義是守這箇義只是這箇道理常常存在這裏可是心肯意肯之義譬如昨日是無柰何勉强去為善今日是心肯意肯要去為善賀孫問忠信進徳一段曰忠信是心中所發真見得道理如此如惡惡臭好好色一般修辭立誠是就事上説欲無一言之不實也問修辭也是舉一端而言否曰言者行之表故就言上説又云知至至之是属忠信進徳上説盖真見得這道理遂求以至之知終終之是属修辭立誠上説盖事是已行到那地頭了遂守之而不失又云忠信進徳是見箇修辭立誠底道理修辭立誠是行箇忠信進徳底道理學履問忠信所以進徳曰忠信某甞説是如好好色如惡惡臭是決定徹底恁地這便㑹進人之所以一脚進前一脚退後只是不曾真實做如何得進知至至之是見得恁地一向做去故可與幾忠信進徳與知至至之可與幾也這幾句都是去底字修辭立誠與知終終之可與存義都是住底字進徳是日日新居業是日日如此又云進徳是營度方架這屋相似居業是據見成底屋而居之忠信二字與别處説不同因舉破釜甑燒廬舎持三日糧示士卒必死無還心如此方會厮殺忠信便是有這心如此方㑹進徳䕫孫問忠信所以進徳一段曰這忠信如反身而誠如惡惡臭如好好色恁地底地位是主學者而言在聖人則為至誠忠信不足以言之也忠信是真箇見得這道理決然是如此既見得如此便有箇進處不然則黑淬淬地進箇甚麽此其所以進徳修辭立誠便是真箇做得如此去做所以曰居業然而忠信便是見得修辭立誠底許多道理修辭立誠便是居那忠信底許多道理盖是見得分眀方有箇進處若不曾見得則從何處進分眀黑淬淬地進箇甚麽然見得箇道理是如此却不去做便是空見得如不曾見相似知至至之如忠信進徳底意思盖是見得在那裏如望見在那裏相似便要到那裏所以曰可與幾也知終終之如修辭立誠底意思盖已是在這裏做決要做到那裏所以曰可與存義若只見得不去行時也如何存得許多道理惟是見得而又能行方可以存義也又問知至至之知終終之恐是大率立箇期限如此曰這只是箇始終燾符問知至至之可與幾也知終終之可與存義也曰忠信所以進徳也修辭立其誠所以居業也方説知至至之可與幾也知終終之可與存義也知至是知得到至處至之謂意思也隨他到那處這裏便可與理㑹幾㣲處知終是知得到終處終之謂意思也隨他到那裏這裏便可與存義存謂存主今日也存主在這裏眀日也存主在這裏賀孫知至至之知謂進徳者也知終終之此知謂居業者也進徳者日日新又日新進進而不已也居業者日日守定在此也然必内有忠信方能修辭心不在時如何修得於乾言忠信者有健而無息之意於坤言敬者有順而有常之意祖道知至雖未做到那裏然已知道業可居心心念念做将去修辭立其誠以終他終便是居了進徳知至可與幾是一類事這般處説得精便與那崇徳廣業知崇禮卑一般若是那始條理終條理底説得麄淵知至至之主在至上知終終之主在終上至是要到那處而未到之辭如去長安未到長安却先知道長安在那裏從後行去這便是修徳之事進徳是要日新又新只管要進去便是要至之故説道可與幾未做到那裏先知得如此所以説可與幾進字貼着那幾字至字又貼著那進字終則只是要守業只是這業今日如此眀日又如此所以下箇居字壮祖錄云知終終之是居業意修辭立其誠今日也只做此事明日也只做此事更無住底意故曰可與存義也終者只這裏終居字貼著那存字終字又貼著那居字徳是心上説義是那業上底道理淵用之問知至至之可與幾也知終終之可與存義也曰上至字是至處下至字是到那至處知終是終處終之是終之而不去盖求必終於是而守之不去也先知為幾如人欲徃長安雖未到長安然已知長安之所在所謂可與幾也若已到彼則不謂之幾幾也先知之謂也存者守而勿失既知得箇道理如此則堅守之而勿失所謂可與存義也僴林問知至與知終終字至字其義相近如何曰這處人都作兩段滚将去所以難得分曉知至與至之知終與終之分作四截説知至是知得到處知終是終其到處至之是須著行去到那處終之是定要守到那處上兩箇知字却一般舉遺書所謂知至至之主知也知終終之主終也均一知也上却主知下却主終要得守故如此㝢知至至之知至則知字是輕至字是到那處至之則至字是實之字是虚如知得要到臨安是知至須是行到那裏方是至之大學知至知字重至字輕賀孫知至是要知所至之地至之便是至那地頭了知終是知得合如此終之便須下終底工夫幾字是知之初方是見得事幾便須是至之存義是守得定方存得這義礪知至至之知其可至而行至之也知終終之知其可住而止之祖道問知至至之致知也知終終之力行也雖是如此知至知終皆致知事至之終之皆力行事然知至至之主於知故可與幾知終終之主於行故可與存義如何曰知至至之者言此心所知者心真箇到那所知田地雖行未到而心已到故其精㣲幾宻一齊在此故曰可與幾知終終之者既知到極處便力行進到極處此真實見於行事故天下義理都無走失故曰可與存義所謂知者不似今人畧知得而已其所知處此心真箇一一到那上也知至至之進徳之事以知得端的如此此心自實從此實處去便是做進徳處也銖可與幾可與存義是旁人説如可與立可與權之可與同礪可與存義也存字似不甚貼義字然亦且作存字看所以伊川云守之在後端䝉乾忠信進徳修省言辭立誠是終身事知至以下是節次知終終之用力處也坤直方大是浩然不習無不利不疑其所行乃是不動心方體無剛柔位有貴賤因他這貴賤之位隨緊慢説有那難處有那易處九三處一卦之盡所以説得如此九二位正中便不恁地淵問乾卦内卦以徳學言外卦以時位言否曰此正説文言六段盖雖言徳學而時位亦在其中非徳學何以處時位此是子曰以下分説其後却錯雜説了僴上下無常非為邪進退無恒非離羣是不如此只要得及時又云如此説也好淵君子進徳修業欲及時者進徳修業九三已備此則欲其及時以進耳銖飛龍在天利見大人文言分眀言同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩他分眀是以聖人為龍以作言飛以萬物覩解利見大人只是言天下利見夫大徳之君也今人却别做一説恐非聖人本意道夫天下所患無君不患無臣有是君必有是臣雖使而今無少間也必有出来雲從龍風從虎只怕不是真箇龍虎若是真龍虎必生風致雲也僴看来大人只是這大人無不同處伊川之病在那二五相見處卦畫如何㑹有相見之理只是説人占得這爻利於見大人萬物覩之覩便是見字且如學聚問辨説箇君徳前一處也説君徳盖説道雖非君位而有君徳下面説許多大人者言所以為大人者如此今却説二五相見却湊不著他這語脉且如先迷後得主利西南得朋東北䘮朋只是説先時不好後来却好西南便合著東北便合不著豈是説卦爻只是説占底人常觀解易底惟是東坡㑹做文字了都湊著他語脉如渙其羣元吉諸家皆云渙散了却成羣都不成語句唯東坡説道渙散他小小羣聚合成一大羣如那天下混一之際破散他小羣成一大羣如此方成文理淵問乾皆聖人事坤皆賢人事否曰怕也恁地殺斷説不得如乾初九似説聖人矣九二學聚問辨則又不然上九又説賢人在下位則又指五為賢矣看来聖人不恁地死殺説只逐義隨事説道理而已闕味道問聖人於文言只把做道理説曰有此氣便有此理又問文言反覆説如何曰如言潛龍勿用陽在下也又潛龍勿用下也只是一意重疊説伊川作兩意未穏也植問乾元用九天下治也曰九是天徳健中便自有順用之則天下治如下文乃見天則則便是天徳與上文見羣龍無首又别作一様看礪乾元者始而亨一段始而亨是生出去利貞是收斂聚方見性情所以言元亨誠之通利貞誠之復道夫問一陽動於下乃天地生物之心如何利貞處乃為乾之性情曰元亨者發見流行之處利貞乃其本體無所作用之實性情猶言情状於其收斂無所作用方見他情状真實銖問利貞者性情也曰此只是對元亨説此性情只是意思體質盖元亨是動發用在外利貞是静而伏藏於内㽦利貞者性情也是乾元之性情始而亨時是乾之發作處共是一箇性情到那利貞處一箇有一箇性情百榖草木皆有箇性情了元亨方是他開花結子時到這利貞時方見得他底性情就這上看乾之性情便見得這是那利貞誠之復處淵正淳問利貞者性情曰此是與元亨相對説性情如言本體人傑錄云性情猶情性是説本體元亨是發用處利貞是收斂歸本體處體却在下用却在上盖春便生夏便長茂條達秋便有箇收斂撮聚意思直到冬方成問復見天地心曰天地之心别無可做大徳曰生只是生物而已謂如一樹春榮夏敷至秋乃實至冬乃成雖曰成實若未經冬便種不成直是受得氣足便是将欲相離之時却将千實来種便成千樹如碩果不食是也方其自小而大各有生意到冬時疑若樹無生意矣不知却自收斂在下每實各具生理更見生生不窮之意這箇道理直是自然全不是安排得只是聖人便窺見機緘發眀出来伊川易傳解四徳便只就物上説元者萬物之始亨者萬物之長利也萬物之遂貞也萬物之成解得遂字最好通書曰元亨誠之通利貞誠之復通即發用復即本體也㽦人傑錄少異不言所利是不得説似坤時利牝馬之貞但説利貞而已淵不言所利眀道説云不有其功常久而不已者乾也此語説得好淵問乾不言所利程易謂無所不利故不言利如何曰是也乾則無所不利坤只利牝馬之貞則有利不利矣銖大哉乾乎陽氣方流行固已包了全體隂便在裏了所以説剛健中正然不可道這裏却夹雜些隂柔所以却説純粹精淵剛健中正純粹精也觀其文勢只是言此四者又純粹而精耳程易作六徳解未安銖問乾剛健中正或謂乾剛無柔不得言中正先生甞言天地之間本一氣之流行而有動静耳以其流行之統體而言則但謂之乾而無所不包以動静分之然後有隂陽剛柔之别所謂流行之統體指乾道而言耶曰大哉乾元萬物資始乾道變化各正性命只乾便是氣之統體物之所資始物之所正性命豈非無所不包但自其氣之動而言則為陽自其氣之静而言則為隂所以陽常兼隂隂不得兼陽陽大隂小隂必附陽皆是此意也銖剛健中正為其嫌於不中正所以説箇中正陽剛自是全體豈得不中正這箇因近日趙善譽者著一件物事説道只乾坤二卦更偏了乾只是剛底一邊坤只是柔底一邊某説與他道聖人做一部易如何却将兩箇偏底物事放在劈頭如何不討箇混淪底放在那裏注中便是破他説淵徳者行之本君子以成徳為行言徳則行在其中矣道夫問行而未成如何曰只是事業未就又問乾六爻皆聖人事安得有未成伊川云未成是未著莫是如此否曰雖是聖人畢竟初九行而未成問此只論事業不論徳否曰不消如此費力且如伊尹居有莘之時便是行而未成文學聚問辯聖人説得寛這箇便是下面所謂君徳兩處説君徳皆如此淵乾之九三以過剛不中而處危地當終日乾乾夕惕若則雖危無咎矣聖人正意只是如此若旁通之則所謂對越在天等説皆可通大抵易之卦爻上自天子下至庶人皆有用處若謂乾之九三君徳已著為危疑之地則只做得舜禹事使人傑問先天而天弗違後天而奉天時聖人與天為一安有先後之殊曰只是聖人意要如此天便順從先後相應不差毫釐也因説人常云如雞覆子啐啄同時不知是如此否時舉云家間養雞時舉為兒童日候其雛之出見他母初未甞啄盖氣數才足便自横迸裂開有時見其出之不利因用手畧助之則其子下来便不長進以此見得這裏一毫人力有不能與先生笑而然之時舉又問天專言之則道也又曰天地者道也不知天地即道耶抑天地是形所以為天地乃道耶曰伊川此句某未敢道是天地只以形言先天而天弗違如禮雖先王未之有而可以義起之類雖天之所未為而吾意之所為自與道契天亦不能違也後天而奉天時如天叙有典天秩有禮之類雖天之所已為而理之所在吾亦奉而行之耳盖大人無私以道為體此一節只是釋大人之徳其曰與天地合其徳與日月合其眀與四時合其序與鬼神合其吉凶将天地對日月鬼神説便只是指形而下者言銖淳立問程子曰天専言之則道也天且弗違是也又曰天地者道也此語何謂曰程子此語某亦未敢以為然天且弗違此只是上天曰知性則知天此天便是専言之則道者否曰是問胡文定公云舜先天而天弗違志壹則動氣也孔子後天而奉天時氣壹則動志也如何先生曰先天而弗違者舜先作韶樂而鳳凰来儀後天而奉天時者孔子因獲麟而作春秋志壹動氣氣壹動志皆借孟子之言形容天地感格之意謨乾卦有兩箇其惟聖人乎王肅本却以一箇做愚人此必其自改得恁地亂道如中庸王肅作小人反中庸這却又改得是賀孫坤主利不是謂坤主利萬物是占者主利砥利牝馬之貞言利於柔順之正而不利於剛健之正利是箇虚字西南得朋固是好了東北䘮朋亦自不妨為有慶坤比乾都是折一半用底淵利牝馬之貞本無四徳底意彖中方有之彖中説四徳自不分曉前數説元亨處却説得分眀後面幾句無理會牝馬地類行地無疆便是那柔順利貞君子攸行本連下面緣他趂押韻後故説在此這般底難十分理㑹先迷失道却分曉只是説坤道池本無先迷至此十二字先迷後得東北西南大槩是陰主減池本有爲字陽一半就前後言沒了前一截就四方言沒了東北一截陽却是全體安貞之吉他這分段只到這裏若更妄作以求全時便㐫了在人亦當如此伊川説東北䘮朋處但不知這處添得許多字否此是用王輔嗣説闕又論坤卦利牝馬之貞曰乾卦元亨利貞便都好到坤只一半好全好故云利永貞一半好故云利牝馬之貞即是亦有不利者只西南得朋東北䘮朋雖伊川亦解做不好殊不知西南得朋乃以類行豈是不好至於東北是坤卦到西南則好到東北實是䘮朋亦非是凶只是自然不容不䘮朋雖然䘮朋却終有慶耳西南得地與類行自是好東北不得地自然䘮朋然其終亦如此等説恐難依舊説㽦牝馬之貞伊川只為泥那四徳所以如此説不通淵問牝馬取其柔順健行之象坤順而言健何也曰守得這柔順亦堅確故有健象柔順而不堅確則不足以配乾矣問柔順利貞君子攸行如何曰柔順利貞坤之徳也君子而能柔順堅正則其所行雖先迷而後得雖東北䘮朋反之西南則得朋而有慶盖陽大隂小陽得兼隂隂不得兼陽坤徳常只得乾之半故常減於乾之半也闕問君子有攸徃何也曰此是虚句意在下句伊川只見彖傳辭押韻有柔順利貞君子攸行之語遂解云君子所行柔順而利且貞恐非也盖言君子有所徃先迷後得主利也問東北䘮朋西南得朋曰隂不比陽隂只理會得一半不似陽兼得隂故無所不利隂半用故得於西南䘮於東北先迷後得亦然自王輔嗣以下皆不知此多錯解了銖乾主義坤便主利占得這卦便主利這事不是坤道主利萬物乃是此卦占得時主有利淵隂體柔躁只為他柔所以躁剛便不躁躁是那欲動而不得動之意剛則便動矣柔躁不能自守所以説安貞吉淵資乾以始便資坤以生不争得霎時間乾底亨時坤底亦亨生是生物池本云坤之所生即乾之所始者淵徐煥云天之行健一息不停而坤不能順動以應其行則造化生生之功或幾乎息矣此語亦無病萬物資乾以始而有氣資坤以生而有形氣至而生生即坤元徐説亦通淵未有乾行而坤止此説是且如乾施物坤不應則不能生物既㑹生物便是動若不是他健後如何配乾只是健得来順淵東北非隂之位隂柔至此既䘮其朋自立脚不得必須歸本位故終有慶又曰牝是柔順故先迷而䘮朋然馬健行却後得而有慶牝馬不可分為二今姑分以見其義礪東北䘮朋乃終有慶既言終有慶則有慶不在今矣為他是箇柔順底物東北陽方非他所安之地如慢水中魚去急水中不得自是䘮朋䘮朋於東北則必反於西南是終有慶也正如先迷後得為他柔順故先迷柔順而不失乎健故後得所以卦下言利牝馬之貞䘮朋先迷便是牝有慶後得便是馬将牝馬字分開却形容得這意思文蔚曰大抵柔順中正底人做越過分底事不得只是循常守分時又却自做得他底事曰是如此文蔚問坤言地勢猶乾言天行天行健猶言地勢順然大象乾不言乾而言健坤不言順而言坤説者雖多究竟如何曰此不必論只是當時下字時偶有不同必欲求説則穿鑿却反晦了當理會底問地勢猶言髙下相因之勢以其順且厚否曰髙下相因只是順若厚又是一箇道理然惟其厚所以上下只管相因去只見得他順若是薄底物髙下只管相因則傾陷了不能如此之無窮矣惟其髙下相因無窮所以為至順也君子體之惟至厚為能載物天行甚健故君子法之以自强不息地勢至順故君子體之以厚徳載物銖地之勢常有順底道理且如這箇平地前面便有坡陁處突然起底也自順淵隂爻稱六與程傳之説大不同這是就四象看便見得分曉隂陽一段只説通例此兩物相無不得且如天晴幾日後無雨便不得十二箇月六月是隂六月是陽一日中陽是晝隂是夜淵坤六爻雖有重輕大槩皆是持守收斂畏謹底意礪問履霜堅氷何以不著占象曰此自分曉占者目前未見有害却有未萌之禍所宜戒謹礪問履霜堅氷至曰隂陽者造化之本所不能無但有淑慝之分盖陽淑而隂慝陽好而隂不好也猶有晝必有夜有暑必有寒有春夏必有秋冬人有少必有老其消長有常人亦不能損益也但聖人參天地賛化育於此必有道故觀履霜堅氷至之象必有謹㣲之意所以扶陽而抑隂也銖直方大是他隂爻居隂位無如此之純粹爻辭云直方大者言占者直方大則不習無不利却不是説坤徳直方大也且如元亨利貞象裏面説底且隨他説做一箇事後面説底四事又儘隨他説去如某之説爻無許多勞攘淵問坤之道直方大六二純正能得此以為徳否曰不可説坤先有是道而後六二得之以為徳坤是何物六二是何物畢竟只是一箇坤只因這一爻中正便見得直方大如此學履六二不當説正要説也説得行不若除了淵問坤六二聖人取象何故説得恁地大都與坤徳不相似曰如何見得不相似曰以隂陽反對觀之直方大者皆非隂之属也曰坤六爻中只此一爻最重六五雖居尊位然却是以隂居陽六二以隂居隂而又居下卦所以如此問坤之順恐似此處順只是順理不是柔順之順曰也是柔順只是他都有力乾行健固是有力坤雖柔順亦是決然恁地順不是柔弱放倒了所以聖人亦説坤至柔而動也剛至静而徳方榦問六四括囊注云六四重隂不中故其象占如此重隂不中何以見其有括囊之象曰隂而又隂其結塞不開即為括囊矣又問占者必當括囊則无咎何也曰當天地閉賢人隠之時若非括囊則有咎矣榦坤六四爻不止言大臣事凡得此爻在位者便當去未仕者便當隠伯豐因問比干事曰此又别是一義雖㓙无咎㽦問坤二五皆中爻二是就盡得地道上説且是就著見於文章事業上説否曰不可説盡得地道他便是坤道也二在下方是就工夫上説文言云不疑其所行是也五得尊位則是就他成就處説所以云美在其中而暢於四支發於事業美之至也學履黄裳元吉不過是在上之人能以柔順之道黄中色裳是下體之服能似這箇則無不吉淵黄裳元吉這是那居中處下之道乾之九五自是剛健底道理坤之六五自是柔順底道理各隨他隂陽自有一箇道理其為九六不同所以在那五處亦不同這箇五之柔順從那六裏来淵問黄裳元吉伊川解作聖人示戒並舉女媧武后之事今考本爻無此象這又是象外立教之意否曰不曉這意若伊川要立議論教人可向别處説不可硬配在易上説此爻何曾有這義都是硬入這意所以説得絮了因舉云邵溥謂伊川因宣仁垂簾事有怨母后之意故此爻義特為他發固是他後生妄測度前輩然亦因此説而後發也學履問坤上六隂極盛而與陽戰爻中乃不言㐫且乾之上九猶言有悔此却不言何耶曰戰而至於俱傷其血元黄不言而凶可知矣時舉子耕問龍戰于野曰乾無對只是一箇物事至隂則有對待大抵隂常虧於陽人傑問乾上九只言亢坤上六却言戰何也曰乾無對待只有乾而已故不言坤坤則不可無乾隂體不足常虧欠若無乾便沒上截大抵隂陽二物本别無隂只陽盡處便是隂㽦問如乾初九潜龍是象勿用是占辭坤六五黄裳是象元吉是占辭甚分眀至若坤初六履霜堅氷至六二直方大不習无不利六三含章可貞或從王事無成有終上六龍戰于野其血元黄皆是舉象而占意已見於象中此又别是一例如何曰象占例不一有占意只見於象中者亦自可見如乾初九坤六四此至分眀易見者如直方大惟直方故能大所謂敬義立而徳不孤六二有直方大之象占者有此徳而得此爻則不習而無不利矣言不待學習而無不利也故謂直方大為象不習无不利為占辭亦可然直方故能大故不習无不利象既如此占者亦不離此意矣六三隂居陽位本是隂帶些陽故為含章之象又貞以守則為隂象矣或從王事者以居下卦之上不終含藏故有或時出從王事之象无成有終者不居其成而能有終也在人臣用之則為不居其成而能有終之象在占者用之則為始進無成而能有終也此亦占意己見於象中者六四重隂不中故有括囊之象无咎无譽亦是象中己見占意因問程易云六四近君而不得於君為上下間隔之時與重隂不中二説如何曰只是重隂不中故當謹宻如此銖用六永貞以大終也陽為大隂為小如大過小過之類皆是以隂陽而言坤六爻皆隂其始本小到此隂皆變為陽矣所謂以大終也言始小而終大也文蔚坤至柔而動也剛坤只是承天如一氣之施坤則盡能發生承載非剛安能如此僴問坤至柔而動也剛至静而徳方程傳云坤道至柔而動則剛坤體至静而徳則方柔與剛相反静與方疑相似曰静無形方有體方謂生物有常言其徳方正一定確然不易而生物有常也静言其體則不可見方言其徳則是其著也銖隂陽皆自㣲至著不是隂便積著陽便合下具足此處亦不説這箇意履霜堅氷只是説從㣲時便須着慎来所以説盖言慎也由辯之不早辯李光祖云不早辯他且到得郎當了却方辯剗地激成事来此説最好淵敬以直内最是緊切工夫賀孫敬以直内是持守工夫義以方外是講學工夫升卿敬以直内義以方外直是直上直下胷中無纎毫委曲方是割截方整之意方疑是齊徳眀敬以直内義以方外只是此二句格物致知是義以方外䕫孫敬以直内便能義以方外非是别有箇義敬譬如鏡義便是能照底徳眀敬立而内自直義形而外自方若欲以敬要去直内以義要去方外即非矣銖問義形而外方曰義是心頭斷事底心斷於内而外便方正萬物各得其宜㝢先之問敬以直内義以方外曰説只恁地説須自去下工夫方見得是如此敬以直内是無纎毫私意胷中洞然徹上徹下表裏如一義以方外是見得是處決定是恁地不是處決定不恁地截然方方正正須是自将去做工夫聖門學者問一句聖人答他一句便領畧将去實是要行得如今説得儘多只是不曾就身己做看某之講學所以異於科舉之文正是要切已行之若只恁地説箇依舊不濟事若實是把做工夫只是敬以直内義以方外八箇字一生用之不窮賀孫問君子敬以直内義以方外伊川謂主一之謂敬無適之謂一而不涵義之意則須於應事接物間無徃而不主一則義亦在其中矣如此則當眀敬中有義義自敬中出之意方好曰亦不必如此説主一之謂敬只是心專一不以他念亂之毎遇事與至誠專一做去即是主一之義但既有敬之名則須還他敬字既有義之名則須還他義字二者相濟則無失此乃理也若必欲駢合謂義自敬中出則聖人何不只言敬字便了既又言義字則須與尋義字意始得大雅景紹問敬義曰敬是立已之本義是處事截然方正各得其宜道夫曰敬以直内義以方外莫是合内外之道否曰久之則内外自然合又問敬以直内後便能義以方外還是更用就上做工夫曰雖是如此也須是先去敬以直内然後能義以方外景紹曰敬與誠如何曰敬是戒謹恐懼之義誠是實然之理如實於為善實於不為惡便是誠只如敬亦有誠與不誠有人外若謹畏内實縱弛這便是不誠於敬只不誠便不是這箇物道夫問前所説敬義誠三者今思之敬以直内義以方外是箇交相養之理至於誠則合一矣曰誠只是實有此理如實於為敬實於為義皆是誠不誠則是無此所以中庸謂不誠無物因問舊甞聞有人問不誠無物先生答曰秉彞不存謂之無人可也中和不存謂之無禮樂可也還是先生所言否曰不記有無此語只如此説也却無病道夫敬以直内義以方外敬義立而徳不孤此在坤六二之爻論六二之徳聖人本意謂人占得此爻若直方大則不習而无不利夫子遂從而解之以敬解直以義解方又須敬義皆立然後徳不孤将不孤来解大字然有敬而無義不得有義而無敬亦不得只一件便不可行便是孤必大錄云敬而無義則做出事来必錯了只義而無敬則無本何以為義皆是孤也須是敬義立方不孤施之事君則忠於君事親則悦於親交朋友則信於朋友皆不待習而旡一之不利也又問方是如何曰方是處此事皆合宜截然區處得如一物四方在面前截然不可得而移易之意若是圓時便轉動得㽦坤六二末乃言不疑所行不疑方可入乾知處方朱子語類巻六十九
