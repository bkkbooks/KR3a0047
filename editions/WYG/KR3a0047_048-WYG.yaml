body:
  text: 朱子語類卷四十八論語三十微子篇微子去之章問箕子當時何必佯狂曰他已為囚奴做人不成了故只得佯狂受辱又問若箕子地位尚可以諫想亦未肯住在必是既已為囚奴則不復可諫矣曰既已為囚奴如何更可以諫廣問殷有三仁曰而今也難㸔或是孔子當時見他事實問或去或奴或諫不同如何同歸於仁曰三子皆詣其至理故謂之仁如箕子亦是諫諫至於極有所不行故若此也木之三仁且只據他去就死生論之然以此一事推及其他則其所為之當理無私亦可知矣閎祖問三仁不知易地而施皆能遂其本心否曰都自各就他分上做自今觀之微子去之尚在活地上如箕子之囚比干之死便是在死地上了較之尤難箕子雖不死然便死却又到了惟是被囚不死不活這地位如何處直是難㸔三仁惓惓憂國之心直是念念不㫁若如避世之徒一齊割㫁高舉逺引這却無難故孔子曰果哉末之難矣若果於忘世是不難賀孫問三仁之事必不可偏廢否曰也不必如此㸔只是微子是商之元子商亡在旦暮必著去之以存宗祀若箕子比干則自當諫其死與奴特適然耳又問當時若只有㣲子一人當如何曰亦自著去吳仁甫問夷齊之事如伯夷己逃去叔齊以父命與宗社之重亦自可立否曰叔齊却難處子升問便當時無中子可立國祀當如何曰亦須自有宗室等人子升問令尹子文陳文子之事集注云未知其心果出於天理而無人欲之私又其他行事多悖於道理但許其忠清而不許其仁若其心果出於天理之公而行事又不悖於道則可以謂之仁否曰若果能如此亦可以謂之仁子升又問令尹子文陳文子之事則原其心而不與其仁至管仲則以其功而許其仁若有可疑曰管仲之功自不可泯没聖人自許其有仁者之功且聖人論人功過自不相掩功自還功過自還過所謂彼善於此則有之矣若以管仲比伊周固不可同日語若以當時大夫比之則在所當取當是之時楚之勢駸駸可畏治之少緩則中國皆為夷狄故曰微管仲吾其被髪左袵矣如本朝趙韓王若論他自身煞有不是處只輔佐太祖區處天下收許多藩鎮之權立國家二百年之安豈不是仁者之功使聖人當時說管仲無克伐怨欲而一純於天理之仁則不可今亦不過稱其九合諸侯一正天下之事耳因說㸔文字不要般逓來說方說這一事未了又取那一事來比並說般來愈多愈理㑹不得少間便撰出新竒說話來說將去元不是真實道理最不要如此木之問三仁皆出於至誠惻怛之公若箕子不死而為之奴何以見惻怛之心曰箕子與比干心只一般箕子也嘗諫紂偶不逢紂大怒不殺他也不是要為奴只被紂囚係在此因佯狂為奴然亦不須必死於事蓋比干既死若更死諫也無益適足長紂殺諫臣之罪故因得佯狂然他處此最難㣲子去却易比干則索性死他在半上半下處最是難所以易中特說箕子之明夷利艱貞晦其明也内難而能正其志外雖佯狂而心却守得定淳㝢録云㝢問註言三子之行不同而同出於至誠惻怛之意㣲子之去欲存宗祀比干之死欲紂改行可見其至誠惻怛處不知箕子至誠惻怛何以見曰箕子比干都是一様心箕子偶然不衝著紂之怒自不殺他然他見比干恁地死若更死諫無益於國徒使人君有殺諫臣之名就他處此最難微子去却易比干一向諫死又却索性箕子在半上落下最是難處被他監繫在那裏不免佯狂所以易中特說箕子之明夷可見其難處故曰利艱貞晦其明也内難而能正其志箕子以之外雖狂心則定也或問比干不止是一事之仁先生嘗有此語莫是他分上大節目處有見得做得徹頭徹尾與一時一事之仁不同但未可望聖人之全仁耳曰箕子微子夷齊之仁亦是此類各隨他分上或去或奴或譲底亦皆可見其終身大體處又曰諸子之仁雖如此料得縝宻工夫純粹體段未如顔子之仁是從實地上做來又曰曾子啟手足易簀時底心見得時便是曾子之仁更以求仁害仁處參之便見三仁夷齊所以全其心徳者而堯卿所問管仲之事亦可見也觀鳳一羽則知五色之備三仁僴栁下惠為士師章問栁下惠為士師曰三黜非君子之所能免但不去便是他失於和處時舉亞夫問栁下惠三黜曰栁下惠瑩然處皆與伯夷一般伯夷如一顆寶珠只常要在水裏栁下惠亦如一寶珠在水裏也得在泥裏也得時舉問栁下惠直道而事人焉徃而不三黜枉道而事人何必去父母之邦雖可以見其必以其道而不失焉者然亦便有箇不恭底意思故記者以孔子兩事序於其後觀孔子之事則知栁下惠之事亦未得為中道曰也是如此惟是孟子說得好曰聖人之行或逺或近或去或不去歸潔其身而已矣下惠之行雖不比聖人合於中道然歸潔其身則有餘矣問或逺或近是相去之逺近否曰不然謂其去人有逺近若伯夷則直是去人逺矣廣齊景公待孔子章㬊問齊景公待孔子雖欲以李孟之間乃以虚禮待之非舉國以聴孔子故曰吾老矣不能用也遂行如齊王欲以孟子為矜式亦是虚禮非舉國以聴孟子曰固是植齊人歸女樂章問齊人歸女樂季桓子纔受孔子不安便行孔子向來相定公做得許多事業亦是季桓子聴孔子之所為方且做得曰固是又曰當時若致膰胙孔子去得更從容惟其不致故孔子便行植問史記載魯今且郊如致膰於大夫則吾可以止設若致膰則夫子果止否曰也須去只是不若此之速必别討一事故去且不致膰亦不是大段失禮處聖人但因此且求去爾㝢問今欲出來作事亦須成敗有命無必成之理曰固是且如孔子所作亦須見有必成處但有小人沮之則不可乃是天孔子當時在魯全屬季桓子其墮三都乃是乘其機而為之亦是難女樂事論語所載與史記異若如論語所載似太匆遽魯是父母之國君大夫豈得不直告之告之不從而行亦未晩今乃去得如此其急此事未易輕議當闕可學楚狂接輿章問楚狂接輿等伊川謂荷蓧稍髙曰以其尚可告語若接輿則全不可曉問當亂世必如孔子之才可以救世而後可以出其他亦何必出曰亦不必如此執定君子之仕行其義也亦不可一向滅迹山林然仕而道不行則當去耳可學子路從而後章問不仕無義曰仕則可以行其義不仕則無以行其義便無這君臣之義了又問下文所謂君臣之義即是這義否曰然燾君子之仕也行其義也義便有進退去就在裏如丈人直是截㫁只見一邊閎祖亞夫問君子之仕也行其義也曰這時雖大綱做行不行亦自有小小從違處所謂義也如孟子迎之致敬以有禮則就之禮貎衰則去之之意不如長沮桀溺之徒纔見大綱行不得便去了植問集注云仕所以行君臣之義故雖知道之不行而不可廢末云亦非忘義徇禄也此義字似有兩意曰如何是有兩意只是一意纔說義便是摠去就都說道合則從不合則去即此是義非但只說要出仕為義然道合則從不合則去惟是出仕方見得不仕無義纔說不仕便都無了這義聖人憂世之心固是急欲得君行道到得靈公問陳明日遂行景公以季孟之間待之曰吾老矣不能用也孔子行季桓子受女樂孔子行無一而非義賀孫亞夫問集注云謂之義則事之可否身之去就誠有不苟然者曰舊時人說此段只説道合出仕纔仕便是義殊不知所謂仕不是埋頭一向只要仕如孟子說所就三所去三與孔子有見行可之仕有際可之仕有公養之仕雖是未嘗不欲仕亦未嘗不顧其義之如何賀孫逸民章孔子論逸民先伯夷道夫朱子語類卷四十八
