body:
  text: 朱子語類卷一百三十四歴代一司馬遷才髙識亦髙但麄率閎祖代以下歴史太史公書踈爽班固書宻塞振司馬子長動以孔子為証不知是見得亦且是如此説所以伯恭每發明得非細只恐子長不敢承領耳史記亦疑當時不曾得刪改脱藁髙祖紀記迎太公處稱髙祖此様䖏甚多髙祖未崩安得髙祖之號漢書盡改之矣左傳只有一䖏云陳桓公有寵於王曹器逺説伯夷傳得孔子而名益彰云云先生曰伯夷當初何嘗指望孔子出來發揮他又云黄屋左纛朝以十月葬長陵此是大事所以書在後先生曰某嘗謂史記恐是箇未成底文字故記載無次序有踈闊不接續䖏如此等是也閎祖因言班固作漢書不合要添改史記字行文亦有不識當時意思䖏如七國之反史記所載甚踈略却都是漢道理班固所載雖詳便却不見此意思吕東萊甚不取班固如載文帝建儲詔云楚王季父也春秋髙閲天下之義理多矣明於國家之大體吴王於朕兄也惠仁以好徳淮南王弟也秉徳以陪朕豈不為豫哉固遂節了吴王一段只於淮南王下添皆字云皆秉徳以陪朕盖陪字訓貳以此言弟則可言兄可乎今史記中却載全文又曰屏山却云固作漢紀有學春秋之意其叙傳云為春秋攷紀又曰遷史所載皆是随所得者載入正如今人草藁如酈食其踞洗前面已載一段末後又載與前説不同盖是两䖏説已冩入了又㩀所得冩入一段耳顔師古注前漢書如此詳猶有不可曉者况其他史無注者漢宣渭上詔令單于母謁范升劾周黨伏而不謁謁不知是何禮數無注疑是君臣之禮見而自通其名然不可考矣方子禮必大録云想謁必又重漢書有秀才做底文章有婦人做底文字亦有載當時獄辭者秀才文章便易曉當時文字多碎句難讀尚書便有如此底周官只如今文字太齊整了漢書言幾者動之㣲吉凶之先見者也又如豈若匹夫匹婦之為諒自經於溝瀆而人莫之知也添一箇人字甚分曉道夫解雜亂絲糾者不控拳拳音絭攘臂繩今之骨袖手圈也言解鬬者當善解之不可牽引絭繩也批亢擣虗亢音剛喉嚨也言與人鬬者不扼其喉拊其背未見其能勝也僩沈存中以班固律厯志定言數䖏為脛説是小説中脛廟之意盖不曉筭法而言爾人傑漢書引繩排拫音㾗不附已者今人誤讀拫為根注云猶今言拫㭲音户谷反之類盖關中俗語如此拫㭲猶云抵拒擔閣也引䋲排拫如以繩扞拒然僴劉昭補志於冠幘車服尤詳前史所無方子晉書皆為許敬宗胡冩入小説又多改壊了東坡言孟嘉傳陶淵眀之自然今改云使然更有一二䖏饒何氏録作比類甚多東坡此文亦不曾見揚因問晉書説得晉人風流䖏好先生云云又云世説所載説得較好今皆改之矣揚載記所紀夷狄祖先之類特甚此恐其故臣追記而過譽之舊唐書一傳載乞加恩相王事其文曰恩加四海宋景文為改作恩加骨肉五代史畧假借太原以劉知逺之後非僣竊辭較直也揚五代舊史温公通鑑用之歐公盖以此作文因有失寔䖏如宦者張居翰當時但言緩取一日則一日固二日則二日固歐公直将作大忠説得太好了問班史通鑑二氏之學如何曰讀其書自可見又曰温公不取孟子取楊子至謂王伯無異道夫王伯之不侔猶碔砆之於美玉故荀卿謂粹而王駁而伯孟子為齊梁之君力判其是非者以其有異也又温公不喜權謀至脩書時頗刪之奈當時有此事何只得與他存在若每䖏刪去數行只讀着都無血脉意思何如存之却别做論説以斷之驤通鑑文字有自改易者仍皆不用漢書上古字皆以今字代之南北史除了通鑑所取者其餘只是一部好笑底小説明仲㸔節通鑑文定問當是温公節否明仲云豫讓好䖏是不以死生二其心故簡子云真義士也今節去之是無見識必非温公節也方温公無自節通鑑今所有者乃偽本序亦偽作通鑑例毎一年或數次改年號者只取後一號故石晋冬始簒而以此年繫之曾問吕丈吕丈曰到此亦須悔然多了不能改得某只以甲子繫年下面注所改年號通鑑告姦者與斬敵首同賞不告姦者與降敵同罰史記商君議更法首便有斬敵首降敵両條賞罰後面方有此兩句比類之法其實秦人上戰功故以此二條為更法之首温公却節去之只存後兩句比類之法遂使讀之者不見来歴温公修書凢與己意不合者即節去之不知他人之意不如此通鑑此類多矣僴通鑑事末利及怠而貧者舉以為収孥謂収之為奴婢不得比良民有罪則民得以告之官而自殺之僴温公論才徳䖏未盡如此則才都是不好底物矣僴或問温公才徳之辨曰温公之言非不是但語脉有病耳才如何全做不好人有剛明果決之才此自是好徳亦有所謂昬徳若塊然無能為亦何取於徳徳是得諸己才是所能為若以才徳兼全為聖人却是聖人又夾雜箇好不好也銖才有好底有不好底徳有好底有不好底徳者得之於己才者能有所為如温公所言才是不好底既才是不好底又言才徳兼全謂之聖人則聖人一半是不好底温公之言多説得偏謂之不是則不可節問温公言聪明強毅之謂才聪明恐只是才不是徳曰温公之言便是有病堯舜皆曰聪明又曰欽明又曰文明豈可只謂之才如今人不聪明便将何者喚作徳也銖温公以正直中和為徳聪明強毅為才先生曰皆是徳也聖人以仁智勇為徳聪明便是智強毅便是勇賜陳仲亨問諸儒才徳之説曰合下語自不同如説才難須是那有徳底才髙陽氏才子八人這須是有徳而有才底若是将才對徳説則如周公之才之美様便有是才更要徳這箇合下説得自不同又問智伯五賢曰如説射御足力之類也可謂之才義剛温公通鑑不信四皓輔太子事謂只是叔孫通諫得行意謂子房如此則是脅其父曰子房平生之術只是如此唐太宗從諌亦只是識利害非誠實髙祖只是識事機明利害故見四皓者輔太子便知是得人心可以為之矣叔孫通嫡庻之説如何動得他又謂髙祖平生立大功業過人只是不殺人温公乃謂髙祖殺四人甚異事見攷異其後一䖏所在又却載四人又不信􅇵孟事意謂劇孟何以為輕重然又載周丘其人極無行自請於吴去去呼召得數萬人助吴如子房􅇵孟皆温公好惡所在然著其事而立論以明之可也豈可以有無其事為褒貶温公此様䖏議論極純因論章惇言温公義理不透曰温公大䖏占得多章小黠何足以知大䖏揚温公謂魏為正綂使當三國時便去仕魏矣升卿胡致堂云通鑑乆未成書或言温公利餐錢故遲遲温公遂急結末了故唐五代多繁冗見管見後唐荘宗六月甲午條下方温公之言如桑麻榖粟且如稽古録極好看常思量教太子諸王恐通鑑難看且看一部稽古録人家子弟若先看得此便是一部古今在肚裏了學䝉稽古録有不備者當以通鑑補之温公作此書想在忙裡做成元無義例閎祖稽古録一書可備講筵官僚進讀小兒讀六經了令接續讀去亦好末後一表其言如蓍龜一一皆騐宋莒公歴年通譜與此書相似但不如温公之有法也髙氏小史亦好一書但難得本子髙峻唐人通鑑中亦多取之方子康衡𫝊司馬公史論稽古録范唐鑑不可不讀賀孫致堂管見方是議論唐鑑議論弱又有不相應䖏前面説一項事末又説别䖏去唐鑑欠處多看底辨得出時好唐鑑多説得散開無収殺如姚崇論擇十道使患未得人它自説得意好不知范氏何故却貶其説􅓌范唐鑑第一段論守臣節䖏不圓要做一書補之不曾做得范此文草草之甚其人資質渾厚説得都如此平正只是踈多不入理終守臣節䖏於此亦須有些䖏置豈可便如此休了如此議論豈不為英雄所笑揚録云程門此人最好然今看都只是氣質吕與叔𦂳范唐鑑首一段專是論太宗本原然亦未盡太宗後来做䖏儘好只為本領不是與三代便别問歐陽以除隋之亂比迹湯武致治之美庶幾成康賛之無乃太過曰只為歐公一軰人尋常亦不曾理㑹本領䖏故其言如此端䝉范氏以武王釋箕子封比干事比太宗誅髙徳儒此亦㩀他眼前好䖏恁地比並也未論到他本原䖏似此様且寛看若一一責以全則後世之君不復有一事可言端䝉唐鑑白馬之祻歐公論不及此唐鑑議論覺似迂緩不切考其意盖王介甫秉政造新法神考專意信之以為真可以振起國勢一新其􅃇故范氏之論每以為此惟在人主身心之間而不在法如言豐財在於節用神考曰豈有着破皁襖破皮鞋即能致國富邪公謹唐鑑意正有踈䖏孫之翰唐論精練説利害如身䖏親歴之但理不及唐鑑耳閎祖伯恭晚年謂人曰孫之翰唐論勝唐鑑要之也是切於事情只是大綱却不正了唐鑑也有緩而不精確䖏如言租庸調及楊炎二税之法説得都無収殺只云在於得人不在乎法有這般苟且䖏審如是則古之聖賢徒法云爾他也是見熈寧間詳於制度故有激而言要之只那有激便不平正道夫或説二氣五行錯揉萬變曰物乆自有弊壊秦漢而下二氣五行自是較昏濁不如太古之清明純粹且如中星自堯時至今已自差五十度了秦漢而下自是弊壊得箇光武起整得畧畧地後又不好了又得箇唐太宗起来整得畧畧地後又不好了終不能如太古或云本然底亦不壊曰固是䕫孫代論歴周自東遷之後王室益弱畿内疆土皆為世臣㩀襲莫可誰何而畿外土地亦皆為諸侯争㩀天子雖欲分封而不可得如封鄭桓公都是先用計指射鄶地罔而取之亦是無討土地䖏此後王室子孫豈復有疆土分封某常以為郡縣之事已萌於此矣至秦時是事勢窮極去不得了必湏如此做也僩權重䖏便有弊宗室權重則宗室作亂漢初及晉是也外戚權重則外戚作亂两漢是也春秋之君多逐宗族晉恵公得國便不納羣公子文公之入即殺懐公此乃異曰六卿分晉之兆必大問春秋時良法美意尚有存者曰去古愈近便古意愈多升卿秋以下春成周之時卿士甚小到後来鄭武公們為王卿士便是宰相恰如後世侍中中書令一般論周稱卿士不同在周官六卿之属言之則卿士乃是六卿之士也徒幾人士幾人如皇父卿士畨維司徒如周人将􅂌虢公政亦卿士卿士惟月衞武公為平王卿士之類則這般之職不知如何子䝉封建世臣賢者無頓身䖏初間亦未甚至春秋時孔子事如何可學楚地最廣今之襄漢皆是儘是強大齊晉若不更伯楚必吞周而有天下縁他極強大所以齊桓晉文責之皆是沒𦂳要底事桓公豈不欲将僣王猾夏之事責之但恐無收殺故只得如此至如晉文城濮之戰依舊委曲還他許多禮数亦如桓公之意然此䖏亦足以見先王不忍􅆷民之意未泯也設使桓文所以責之者不少假借他定不肯服兵連祻結何時而已到得戰國斬首動是數萬無復先王之意矣僴問揚管仲子産如何揚謂管仲全是功利心不好子産較近道理聖人稱子産有君子之道四然只就得如此如何是本原頭有病否曰是本原雜問傅全美謂范文正所為似子産謂細膩是否曰文正䟱決不相似亦麄曰只是雜揚管仲内政士鄉十五乃戰士也所以教之孝悌忠信尊君親上之義夫子曰以不教民戰是謂棄之故雖霸者之道亦必如此人傑問晋伐原以示信大蒐以示禮此是信禮否曰此是假禮信之名以欺人欲舉而用之非誠心也如湯之於葛葛云無以供粢盛湯使亳衆往為之耕葛云無以供犧牲湯使人遺之牛羊至於不得已而後征之非是以此餌之而圗以殺之也又云司馬遷云文王之治岐耕者九一仕者世禄皆是降隂徳以分紂之天下不知文王之心誠於為民者若此又云漢髙祖取天下所謂仁義者豈有誠心哉其意本謂項羽背約及到新城遇三老董公遮道之言方假此之名以正彼之罪所謂縞素發䘮之舉其意何在似此之謀㸔當時未必不是欲項羽殺之而後罪之也卓因論寗武子義剛言春秋時識義理者多曰也是那時多世臣君臣之分宻其情自不能相舍非是皆曉義理古時君臣都易得相親天下有天下之君臣淳録云大䖏有大君臣小䖏有小君臣一國有一國之君臣一家有一家之君臣自秦漢以来便都遼絶今世如士人猶畧知有君臣之分若是田夫去京師動数千里它曉得甚麽君臣本朝但制兵却有古意太祖軍法曰一階一級皆歸服事之儀故軍中階級却嚴有定分義剛畧淳録鬻拳只是箇粗豪人其意則忠而其事皆非理不足言也僴子升問伍子胥曰父不受誅子復讎可也謂之亂臣賊子亦未可又問還是以其出亡在外而言亦可以為通論否曰古人自有這般事如不為舊君服之義可見後世天下一家事體又别然亦以其出亡之故若曾臣事之亦不可也又問父死非其罪子亦可仕否曰不可孫曾如何曰世数漸逺終是漸輕亦有可仕之理但不仕者正也可仕者權也木之越棲㑹稽本在平江楚破越其種散史記故後號為百越此間䖏䖏有之山上多有小小城郭故壘皆是諸越舊都邑也春秋末楚地㝡廣盖自初間并吞諸蠻而有其地如淮南之舒宿亳之蓼皆是初間若不得齊威管仲㸔他氣勢定是吞周室以此觀之孔子稱管仲之功豈溢美哉吳之所以得破楚也是楚平以後日就衰削又恰限使得吳子胥如此先又有申公巫臣徃吳教之射御戰陣這两人所以不向齊晉那邊去也是見得齊晉都破壊了兼那時如闔閭夫差勾踐㡬人皆是蠻夷中之豪傑今浙間是南越地平曠閩廣是東越地狭多阻南豐送李栁州誤謂栁為南越賀孫越都㑹稽今東在外所門土地只如今闊狭後并吳了却移都平江亦名㑹稽秦後于平江立㑹稽郡吳越國勢人物亦不争多越尚着許多氣力今敵何止於吳所以圖之者又不及越如何濟事今做時亦須着喫些艱辛如越始得范蠡文種未是難二人皆在越籠絡中此是難某在紹興想像越當時事亦自快人越止一小國當時亦未甚大段冨貴在越自克如此亦未是難事然自越之後後来不曾見更有一人似之信立事之難也揚范蠡載西子以往王銍性之言歴攷文書無此事其原出杜牧之詩云西子下吳㑹一舸随鴟夷王解此意又不然曰王性之不成器如這般發事渠讀書多攷究得甚精且多也揚義剛論田子方貧賤驕人之説雖能折子擊却非知道者之言不成我貧賤便可􅇒人此豈忘乎貧賤冨貴者哉陳仲亨不以為然次日請問先生曰他是為子擊語意而發但子方却别有箇意思它後面説言不用行不合則納履而去此是説我只是貧賤不肯自詘説大人則藐之孟子也如此説雖曰聖人無小大無敢慢不肯如此説但視那為冨貴權勢所移者有間矣聖人氣象固不如此若大賢以下則未免如是戰以下國趙武靈王也是有英氣所以做得恁地也縁是他肚裡事㑹恁地做得但他不合只倚這些子如後来立後一乖也是心不正後感召得這般事来義剛問樂毅伐齊文中子以為善藏其用東坡則責其不合妄效王者事業以取敗二説孰是曰這是他們愛去立說後都不去攷教子細這只是那田單㑹守後不奈他何當時樂毅自是兼秦魏之師又因人怨湣王之暴故一旦下齊七十餘城及既殺了湣王則人心自是休了它又怕那三國来分他底連忙發遣了它以燕之力量也只做得恁地更是那田單也忠義盡死節守那二城樂毅不是不要取它也煞費氣力被它善守後不奈他何樂毅也只是戰國之士又何甞是王者之師它當時也恣意去鹵掠正如孟子所謂毁其宗廟遷其重噐不過如此舉措它當時那鼎也去扛得来他豈是不要他底但是田單與他皆㑹兩箇相遇智勇相角至相持三年便是樂毅也煞費氣力但取不得及騎刼用則是大段無能後被田單使一箇小術數子便乘勢殺将去便是國不可以無人如齊但有一田單盡死節恁地守便不柰他何義剛常先難而後易不然則難将至矣如樂毅用兵始常懼難乃心謹畏不敢忽易故戰則雖大國堅城無有不破者及至勝則自驕膽大而恃兵强因去攻二城亦攻不下夀昌樂毅莒即墨之圍乃用師之道當如此用速做不得又齊湣王人多叛之及死而其子立于莒則人復惜之不忍盡亡其國即墨又有田單故下之難使毅得盡其䇿必不失之光武下一城不得明帝謂下之太速揚義剛曰藺相如其始能勇於制秦其終能和以待亷頗可謂賢矣但以義剛觀之使相如能以待亷之術待秦乃為善謀盖柔乃能制剛弱乃能勝强今乃欲以匹夫之勇恃區區之趙而鬬强秦若秦奮其虎狼之威将何以䖏之今能使秦不加兵者特幸而成事耳先生曰子由有一段説大故取它説它不是戰國之士此説也太過其實它只是戰國之士龜山亦有一説大槩與公説相似説相如不合要與秦争那璧要之恁地説也不得和氏璧也是趙國相傳以此為寳若當時驟然被人将去則國勢也解不振古人傳國皆以寳玉之属為重若子孫不能謹守便是不孝當時秦也是强但相如也是料得秦不敢殺他後方恁地做若其它人則是怕秦殺了便不敢去如藺相如豈是孟浪恁地做它須是料度得那秦過了戰國時如此等也多黄歇取楚太子也是如此當時被它取了秦也不曾做聲只恁休了義剛春秋時相殺甚者若相罵然長平坑殺四十萬人史過言不足信敗則有之若謂之盡坑四十萬人将㡬多所在又趙卒都是百戰之士豈有四十萬人肯束手受死決不可信又謂秦十五年不敢出兵窺山東之類何甞有此等事皆史之溢言常疑四十萬人死恐只司馬遷作文如此未必能盡坑得許多人徳明常思孫臏料龎涓暮當至馬陵如何料得如此好僴曰使其不燭火㸔白書則如之何曰臏料龎涓是箇絮底人必㸔無疑此有三様上智底人他曉得必不㸔下智獃底人亦必不㸔中智底人必㸔㸔則堕其機矣嘗思古今智士之謀畧詭譎固不可及然記之者能如是曲折書之而不失其意則其智亦不可及矣燕丹知燕必亡故為荆軻之舉徳明術至韓非説難精宻至矣蘇張亦尚䟱陳仲亨問合從便不便曰温公是說合從為六國之便觀當時合從時秦也是懼盖天下盡合為一而秦獨守關中一片子地也未是長䇿但它㡬箇心難一如何有箇人兠攬得他也是難這箇却須是如孟子之說方得如有不嗜殺人者則天下之人皆引領而望之師文王大國五年小國七年必為政於天下孟子只是責辦于己設使當時有仁政則如大旱之望雲霓民自歸之秦雖强亦無如我何義剛問蘇秦激怒張儀如秦人皆說它術髙切以為正是失䇿處曰某謂未必有此事所謂激怒者只是蘇秦當時做得稱意後去欺那張儀而今若說是蘇秦怕秦來敗從所以激張儀入秦庻秦不来敗從那張儀與你有甚人情這只是蘇秦之徒見他做倒了這一着後粧㸃出此事来謾人義剛曰䕫孫録云因説蘇秦激張儀入秦事某甞疑不恁地做得拙蘇秦豈不知張儀入秦㑹翻了他想是蘇秦輸了這一籌其徒遂装撰此等說話人傑録云常疑蘇秦資送張儀入秦事恐無此理當時范睢蔡澤之徒多是乘人間隙而奪之位何常立得事功吳起務在富國强兵破遊説之言縦横者若是立脚務實自不容此軰紛紜撓亂也問關中形勝周用以興到得後来秦又用以興曰此亦在人做當春秋時秦亦為齊晋所軋不得伸到戰國時六國又皆以夷狄擯之使不得與中國㑹盟及孝公因此發憤致得商鞅而用之遂以强大後来又得恵文武昭襄皆是㑹做底故相繼做起来若其間有一二君昬庸則依舊做壊了以此見得形勝也須是要人相副因言昭王因范睢傾穰侯之故却盡收得許多權柄秦遂益强豈不是㑹廣秦陳仲亨以義剛所疑問云商鞅說孝公帝王道不從乃說以伯道鞅亦不曉帝王道但是先將此說在前者渠知孝公決不能從且恁地說庶可以堅後面伯道之說耳先生曰鞅又如何理㑹得帝王之道但是大拍頭去揮那孝公耳他知孝公是行不得他恁地說只是欲人知道我無所不曉義剛問不知温公削去前一截是如何曰他說無此事不肯信又問如子房招四皓伊川取之以為得納約自牗之義而温公亦削之如何曰是他意裏不愛不合他意底則削去某常說陳平說髙祖曰項王能敬人故多得亷節之士大王慢侮人故亷節之士多不為用然亷節士終不可得臣願得數萬斤金以間䟽楚君臣這便是商鞅說孝公底一般他知得髙祖決不能不嫚侮以求亷節之士但直說他則恐未必便從故且將去嚇他一嚇等他不從後却說之此政與商鞅之術同而温公也削去若是有此一段時見得他說得有意思今削去了則都無情意他平白無事教把許多金来用問髙祖便肯如此等類被他削去底多如何恁地得善善惡惡是是非非皆着存得在那裏其間自有許多事若是不好底便不載時孔子一部春秋便都不是了那裏面何所不有義剛公元本云商鞅先以帝王說孝此只是大拍頭揮他底它知孝公必不能用得這說話且說這大話了却放出那本色底来通鑑削去前一節温公之意謂鞅無那帝王底道理遂除去了温公便是不曉這般底人如條侯擊吳楚到洛陽得􅇵孟隠若一敵國亦不信他說道如何得一箇侠士便隠若一敵國不知這般人得之未必能成事若為盜所得煞㑹撓人盖是他自有這般賔客那一般人都信向他若被他一下鼓動得去直是能生事又如陳平說髙帝謂項王下人能得亷節之士大王慢侮人故嗜利無恥者歸之大王誠能去而短集而長則云云然大王恣侮慢必不得亷節之士故勸捐數萬斤金以間楚君臣這也是度得髙祖必不能下士故先說許多話教髙祖亦自知做不得了方説他本謀来故能使人聽信某説此正與商鞅之術同而温公亦削了䕫孫録同但云温公性朴直便是不曉這般底人得􅇵孟事也不信謂世間都無這般底人以今觀之秦取六國當甚易而秦甚難之以古来無此様不敢輕易因説後世簒奪難大凡事前未有様者不易做揚仲亨問開阡陌曰阡陌便是井田陌百也阡千也東西曰阡南北曰陌或謂南北曰阡東西曰陌未知孰是但却是一箇横一箇直耳如百夫有遂遂上有涂這便是陌若是十箇涂恁地直在横頭又作一大溝謂之洫洫上有路這便是阡阡陌只是疆界自阡陌之外有空地則只恁地閒在那裏所以先王要如此者也只是要正其疆界怕人相侵互而今商鞅却開破了遇可做田䖏便墾作田更不要恁地齊整這開字非開創之開乃開闢之開蔡澤傳曰破壊井田決裂阡陌觀此可見這两句自是合掌說後人皆不曉唐時却説寛鄉為井田狭鄉為阡陌東莱論井田引蔡澤𫝊両句然又却多方回互說從那開阡陌之意上去義剛問井田阡陌曰已前人都錯㸔了某嘗攷来盖陌者百也阡者千也井田一夫百畝則為遂遂上有徑此是縱為陌十夫千畝則為溝溝上有畛此是横為阡積此而徃百夫萬􅒪則為洫洫上有涂涂縦又為陌千夫十萬畝則為澮澮上有道道横又為阡商鞅開之乃是當時井田既不存便以此物為無用一切破蕩了蔡澤傳云商君決裂阡陌乃是如此非謂變井田為阡陌也䕫孫田僴録云人皆謂廢古井開今阡陌云云阡陌是井田路其路甚大廢田遂一齊開小了作田故謂之破井田開阡陌揚伯恭言秦變法後世雖屢更數易終不出秦如何曰此意好但使伯恭為相果能盡用三代法度否問後有聖賢者出如何曰必須别有規模不用前人硬本子升卿黄仁卿問自秦始皇變法之後後世人君皆不能易之何也曰秦之法盡是尊君卑臣之事所以後世不肯變且如三皇稱皇五帝稱帝三王稱王秦則兼皇帝之號只此一事後世如何肯變又問賈生仁義攻守之説恐秦如此亦難以仁義守之曰它若延得數十年亦可扶持整頓只是犯衆怒多下面逼得来𦂳所以不旋踵而亡如三皇五帝三王以来皆以封建治天下秦一切掃除不留種子秦視六國之君如坑嬰兒今年捉一人明年捉両人絶滅都盡所以犯天下衆怒當時但聞秦字不問智愚男女盡要起而亡之陳渉便做陳王張耳便做趙王更阻遏它不住漢髙祖自小路入秦由今襄陽金商藍田入關節録作從長安角上入闗項羽自河北大路入關及項羽盡殺秦人想得秦人亦悔不且留取子嬰在也銖秦以水徳王故數用六為紀振五徳相承古人所説皆不定謂周為木徳後秦以鄒衍之説推之乃以為火徳故秦以所不勝者承周號水徳漢又承周不承秦後又有謂漢非火徳者王莽又有云云三代而上未有此論則東坡謂威侮五行怠棄三正者又未必是揚咸陽在渭北漢在渭南秦建十月已乆通鑑不曾契勘𫝊朱子語類卷一百三十四
