body:
  text: 朱子語類卷十三學七力行學之之博未若知之之要知之之要未若行之之實祖道以踐行善在那裏自家却去行它行之久則與自家為一為一則得之在我未能行善自善我自我節人言匹夫無可行便是亂説凡日用之間動止語黙皆是行處且須於行處警省須是戰戰兢兢方可若悠悠泛汎地過則又不可升卿若不用躬行則是説得便了則七十子之從孔子只用兩日説便盡何用許多年随著孔子不去不然則孔門諸子皆是獃無能底人矣恐不然也古人只是日夜皇皇汲汲去理㑹這箇身心到得做事業時只随自家分量以應之如由之果賜之達冉求之藝只此便可以從政不用它求若是大底功業便用大聖賢做小底功業便用小底賢人做各随它分量做出來如何强得僴這箇事説只消兩日説了只是工夫難人於道理不能行只是在我之道理有未盡耳不當咎其不可行當反而求盡其道璘為學就其偏處著工夫亦是其平正道理自在若一向矯枉過直又成偏去如人偏於柔自可見只就這裏用工須存平正底道理雖要致知然不可恃書曰知之非艱行之惟艱工夫全在行上振問大抵學便要踐履如何曰固然是易云學以聚之問以辨之既探討得是當又且放頓寛大田地待觸類自然有㑹合處故曰寛以居之何嘗便説仁以行之謨某此間講説時少踐履時多事事都用你自去理㑹自去體察自去涵養書用你自去讀道理用你自去究索某只是做得箇引路底人有疑難處同商量而已僴書冊中説義理只説得一靣今人之所謂踐履者只做得箇皮草如居屋室中只在門户邊立地不曾深入到後靣一截人傑放教脚下實文蔚人所以易得流轉立不定者只是脚根不㸃地㸃平聲僴問學如登塔逐一層登將去上靣一層雖不問人亦自見得若不去實踏過却懸空妄想便和最下底層不曾理㑹得升卿學者如行路一般要去此處只直去此處更不可去路上左過右過相將一齊到不得夀昌有箇天理便有箇人欲盖緣這箇天理須有箇安頓處才安頓得不恰好便有人欲出來夔孫以下理欲義利是非之辨天理人欲分數有多少天理本多人欲便也是天理裏靣做出來雖是人欲人欲中自有天理問莫是本來全是天理否曰人生都是天理人欲却是後來沒巴鼻生底幹人之一心天理存則人欲亡人欲勝則天理滅未有天理人欲夾雜者學者須要於此體認省察之椿大抵人能於天理人欲界分上立得脚住則儘長進在祖道天理人欲之分只爭些子故周先生只管説㡬字然辨之又不可不早故横渠每説豫字大雅天理人欲㡬微之間燾或問先生言天理人欲如硯子上靣是天理下一靣是人欲曰天理人欲常相對節問飲食之間孰為天理孰為人欲曰飲食者天理也要求美人欲也節有天理自然之安無人欲䧟溺之危燾不為物欲所昬則渾然天理矣道夫天理人欲無硬定底界至是兩界分上功夫這邊功夫多那邊不到占過來若這邊功夫少那邊必侵過來燾人只有箇天理人欲此勝則彼退彼勝則此退無中立不進退之理凡人不進便退也譬如劉項相拒於滎陽成臯間彼進得一歩則此退一歩此進一歩則彼退一歩初學則要牢劄定脚與它捱捱得一毫去則逐旋捱將去此心莫退終須有勝時勝時甚氣象祖道儒用畧人只是此一心今日是明日非不是將不是底換了是底今日不好明日好不是將好底換了不好底只此一心但看天理私欲之消長如何爾以至千載之前千載之後與天地相為始終只此一心讀書亦不須牽連引證以為工如此纒繞皆只是為人若實為己則須是將己心驗之見得聖賢説底與今日此心無異便是工夫大雅學者須是革盡人欲復盡天理方始是學今去讀書要去看取句語相似不相似便方始是讀書讀書須要有志志不立便衰而今只是分别人欲與天理此長彼必短此短彼必長夀昌未知學問此心渾為人欲既知學問則天理自然發見而人欲漸漸消去者固是好矣然克得一層又有一層大者固不可有而纎微尤要宻察謨凡一事便有兩端是底即天理之公非底乃人欲之私須事事與剖判極處即克治擴充功夫随事著見然人之氣禀有偏所見亦徃徃不同如氣禀剛底人則見剛處多而處事必失之太剛柔底人則見柔處多而處事必失之太柔須先就氣禀偏處克治閎祖義理身心所自有失而不知所以復之富貴身外之物求之唯恐不得縱使得之於身心無分毫之益况不可必得乎若義理求則得之能不䘮其所有可以為聖為賢利害甚明人心之公每為私欲所蔽所以更放不下但常常以此兩端體察若見得時自須猛省急擺脱出來閎祖徐子融問水火明知其可畏自然畏之不待勉强若是人欲只緣有愛之之意雖知之而不能不好之柰何曰此亦未能真知而已又問真知者還當真知人欲是不好物事否曰如克伐怨欲却不是要去就克伐怨欲上面要知得到只是自就道理這邉看得透則那許多不待除而自去若實是看得大底道理要去求勝做甚麽要去矜夸它人做甚麽求仁而得仁又何怨怨箇甚麽耳目口鼻四肢之欲惟分是安欲箇甚麽見得大處分明這許多小小病痛都如氷消凍解無有痕迹矣賀孫今人日中所為皆苟而已其實只將講學做一件好事求異於人然其設心依舊只是為利其視不講者又何以大相逺天下只是善惡兩言而已於二者始分之中須著意看教分明及其流出去則善者一向善但有淺深爾如水清冷便有極清處有稍清處惡者一向惡惡亦有淺深如水渾濁亦有極渾處有稍渾處問此善惡分處只是天理之公人欲之私耳曰此却是己有説後方有此名只執此為説不濟事要須驗之此心真知得如何是天理如何是人欲幾微間極索理㑹此心常常要惺覺莫令頃刻悠悠憒憒大雅云此只是持敬為要曰敬不是閉眼黙坐便為敬須是随事致敬要有行程去處如今且未論齊家治國平天下只截自格物致知誠意正心脩身為説此行程也方其當格物時便敬以格之當誠意時便敬以誠之以至正心脩身以後節節常要惺覺執持令此心常在方是能持敬今之言持敬者只是説敬非是持敬若此心常在軀殻中為主便須常如烈火在身有不可犯之色事物之來便成兩畔去又何至如是纒繞大雅學無淺深並要辨義利祖道看道理須要就那箇大處看須要前靣䦕濶不要就那壁角裏去而今須要天理人欲義利公私分别得明白將自家日用底與它勘驗須漸漸有見處若不去那大壇場上行理㑹得一句透只是一句道理小了義剛人貴剖判心下令其分明善理明之惡念去之若義利若善惡若是非母使混殽不别於其心譬如處一家之事取善舎惡又如處一國之事取得舎失處天下之事進賢退不肖蓄疑而不決者其終不成洽或問義利之别曰只是為己為人之分纔為己這許多便自做一邊去義也是為己天理也是為己若為人那許多便自做一邊去須於日用間令所謂義了然明白或言心安處便是義亦有人安其所不當安豈可以安為義也升卿義利之辨初時尚相對在若少間主義功深後那利如何著得如小小竊盜不勞而却矣祖道事無小大皆有義利今做好底事了其間更包得有多少利私在所謂以善為之而不知其道皆是也祖道才卿問應事接物别義利如何得不錯曰先做切己工夫喻之以物且須先做了本子本子既成便是就這夲子上理㑹不然只是懸空説易器之問義利之分臨事如何辨曰此須是工夫到義理精方曉然未能至此且據眼前占取義一邊放令分數多占得過這下來縱錯亦少大雅才有欲順適底意思即是利祖道仁義根於人心之固有利心生於物我之相形燾人只有一箇公私天下只有一箇邪正敬仲將天下正大底道理去處置事便公以自家私意去處之便私僴且以眼前言虚實真偽是非處且要剔脱分明祖道只是理㑹箇是與不是便了又曰是便是理節凡事只去看箇是非假如今日做得一件事自心安而無疑便是是處一事自不信便是非處夀昌閒居無事且試自思之其行事有於所當是而非當非而是當好而惡當惡而好自察而知之亦是工夫士毅講學固不可無須是更去自己分上做工夫若只管説不過一兩日都説盡了只是工夫難且如人須知此事不是不可為忽然無事又自起此念又如臨事時須知其不義不要做又却不知不覺自去做了是如何又如好事初心本自要做又却終不肯做是如何盖人心本善方其見善欲為之時此是真心發見之端然纔發便被氣禀物欲随即蔽錮之不教它發此須自去體察存養看得此最是一件大工夫廣學者工夫只求一箇是天下之理不過是與非兩端而已從其是則為善狥其非則為惡事親須是孝不然則非事親之道事君須是忠不然則非事君之道凡事皆用審箇是非擇其是而行之聖人教人諄諄不已只是發明此理十五志學所志只在此三十而立所立只在此四十而不惑又不是别有一般道理只是見得明行得到為賢為聖皆只在此聖人恐人未悟故如此説又如彼説這裏既説那裏又説學者可不知所擇哉今讀書而不能盡知其理只是心粗意廣凡解釋文義須是虚心玩索聖人言語義理該貫如絲髪相通若只恁大綱看過何緣見得精微出來所以失聖人之意也謨所謂道不須别去尋討只是這箇道理非是别有一箇道被我忽然看見攫拏得來方是見道只是如日用底道理恁地是恁地不是事事理㑹得箇是處便是道也近時釋氏便有箇忽然見道底説話道又不是一件甚物可摸得入手㽦學大抵只是分别箇善惡而去就之爾道夫論隂陽則有隂必有陽論善惡則一毫著不得節學者要學得不偏如所謂無過不及之類只要講明學問如善惡兩端便要分别理㑹得善惡分明後只從中道上行何緣有差子思言中而謂之中庸者庸只訓常日用常行事事要中所以謂中庸不可能謨凡事莫非心之所為雖放僻邪侈亦是此心善惡但如反覆手翻一轉便是惡只安頓不著亦便是不善道夫人未説為善先須疾惡能疾惡然後能為善今人見不好事都只恁不管它民之秉彛好是懿徳不知這秉彛之良心做那裏去也是可怪與立有問好惡曰好惡是情好善惡惡是性性中當好善當惡惡泛然好惡乃是私也謙聖人之於天地猶子之於父母以下係人倫佛經云佛為一大事因緣出現於世聖人亦是為這一大事出來這箇道理雖人所固有若非聖人如何得如此光明盛大你不曉得底我説在這裏教你曉得你不㑹做底我做下様子在此與你做只是要扶持這箇道理教它常立在世間上拄天下拄地常如此端正才一日無人維持便傾倒了少間脚拄天頭拄地顛倒錯亂便都壊了所以説天佑下民作之君作之師惟其克相上帝寵綏四方天只生得你付得這道理你做與不做却在你做得好也由你做得不好也由你所以又為之立君師以作成之既撫養你又教導你使無一夫不遂其性如堯舜之時真箇是寵綏四方只是世間不好底人不定叠底事才遇堯舜都安帖平定了所以謂之克相上帝盖助上帝之不及也自秦漢以來講學不明世之人君固有因其才智做得功業然無人知明徳新民之事君道間有得其一二而師道則絶無矣卓僴同問聖人兼三才而兩之曰前日正與學者言佛經云我佛為一大事因緣出現於世聖人亦是為一大事出現於世上至天下至地中間是人塞於兩間者無非此理須是聖人出來左提右挈原始要終無非欲人有以全此理而不失其夲然之性天佑下民作之君作之師只是為此道理所以作箇君師以輔相裁成左右民使各全其秉彞之良而不失其夲然之善而已故聖人以其先得諸身者與民共之只是為這一箇道理如老佛窺見這箇道理莊子神鬼神帝生天生地釋氏所謂能為萬象主不逐四時凋它也窺見這箇道理只是它説得驚天動地聖人之學則其作用處與它全不同聖人之學則至虚而實實至無而實有有此物則有此理僴錄此下云須一一與它盡得佛氏則只見得如此便休了所以不同又問輔相裁成若以學者言之日用處也有這様處否曰有之如饑則食渴則飲寒則裘鑿井而飲耕田而食作為耒耜網罟之類皆輔相左右民事卓僴同道者古今共由之理如父之慈子之孝君仁臣忠是一箇公共底道理徳便是得此道於身則為君必仁為臣必忠之類皆是自有闕已方解恁地堯所以修此道而成堯之徳舜所以修此道而成舜之徳自天地以先羲黄以降都即是這一箇道理亘古今未嘗有異只是代代有一箇人出來做主做主便即是得此道理於已不是堯自是一箇道理舜又是一箇道理文王周公孔子又别是一箇道理老子説先道而後徳它都不識分做兩箇物事便將道做一箇空無底物事看吾儒説只是一箇物事以其古今公共是這一箇不著人身上説謂之道徳即是全得此道扵已它説先道而後徳先徳而後仁先仁而後義若離了仁義便是無道理了又更如何是道賀孫聖人萬善皆備有一毫之失此不足為聖人常人終日為不善偶有一毫之善此善心生也聖人要求備故大舜無一毫釐不是此所以為聖人不然又安足謂之舜哉夀昌聖人不知己是聖人振天下之理至虚之中有至實者存至無之中有至有者存夫理者寓於至有之中而不可以目擊而指數也然而舉天下之事莫不有理且臣之事君便有忠之理子之事父便有孝之理目之視便有明之理耳之聽便有聰之理貌之動便有恭之理言之發便有忠之理只是常常恁地省察則理不難知也壯祖學者實下功夫須是日日為之就事親從兄接物處事理㑹取其有未能益加勉行如此之久則日化而不自知遂只如常事做將去端蒙父子欲其親云云曰非是欲其如此盖有父子則便自然有親有君臣則便自然有敬因指坐門揺扇者曰人熱自㑹揺扇不是欲其揺扇也雉問父母之扵子有無窮憐愛欲其聰明欲其成立此謂之誠心邪曰父母愛其子正也愛之無窮而必欲其如何則邪矣此天理人欲之間正當審決葉誠之問人不幸處繼母異兄弟不相容當如何曰從古來自有這様子公看舜如何後來此様事多有只是為人子止扵孝賀孫君臣之際權不可畧重纔重則無君且如漢末天下唯知有曹氏而已魏末唯知有司馬氏而已魯當莊僖之際也得箇季友整理一畨其後季氏遂執其權歴三四世魯君之勢全無了但有一季氏而已賀孫問也是合下君臣之間其識慮不逺曰然所以聖人垂戒謂臣弑君子弑父非一夕一朝之故其所由來者漸矣由辨之不早辨也這箇事體初間只争些小到後來全然只有一邊聖人所以一日二日萬幾常常戒謹恐懼詩稱文王之盛於後便云殷之未䘮師克配上帝宜鑒于殷峻命不易此處甚多賀孫用之問忠只是實心人倫日用皆當用之何獨只於事君上説忠字曰父子兄弟夫婦皆是天理自然人皆莫不自知愛敬君臣雖亦是天理然是義合世之人便自易得苟且故須於此説忠却是就不足處説如莊子説命也義也天下之大戒看這説君臣自是有不得已意思賀孫問君臣父子同是天倫愛君之心終不如愛父何也曰離畔也只是庶民賢人君子便不如此韓退之云臣罪當誅兮天王聖明此語何故程子道是好文王豈不知紂之無道却如此説是非欺誑衆人直是有説須是有轉語方説得文王心出看來臣子無説君父不是底道理此便見得是君臣之義處莊子云天下之大戒二命也義也子之扵父無適而非命也臣之於君無適而非義也無所逃於天地之間舊嘗題䟦一文字曾引此語以為莊子此説乃楊氏無君之説似它這意思便是沒柰何了方恁地有義却不知此是自然有底道理又曰臣之視君如冦讎孟子説得來怪差却是那時説得如云三月無君則弔等語似是逐旋去尋箇君與今世不同而今却是只有進退如有去之之理只得退去又有一種退不得底人如貴戚之卿是也賈生弔屈原文云歴九州而相其君兮何必懐此都也又為懐王傅王墜馬死誼自傷傅王無狀悲泣而死張文潜有詩譏之當時誼何不去直是去不得看得誼當初年少也只是胡説賜臣子無愛身自佚之理升卿問妻有七出此却是正當道理非權也曰然卓蜚卿問安卿問目以孝弟推説君臣等事不須如此得否曰惟有此理固當有此事如人入扵水則死而魚生於水此皆天然合當如此底道理問朋友之義自天子至於庶人皆須友以成而安卿只説以類聚莫未該朋友之義否曰此亦只説本來自是如此自天子至扵庶人未有不須友以成乃是後來事説朋友功効如此人自與人同類相求牛羊亦各以類相從朋友乃彛倫之一今人不知有朋友之義者只緣但知有四箇要緊而不知朋友亦不可闕賀孫朋友之於人倫所關至重驤問與朋友交後知其不善欲絶則傷恩不與之絶則又似匿怨而友其人曰此非匿怨之謂也心有怨於人而外與之交則為匿怨若朋友之不善情意自是當䟽但䟽之以漸若無大故則不必峻絶之所謂親者毋失其為親故者毋失其為故者也淳問人倫不及師何也曰師之義即朋友而分則與君父等朋友多而師少以其多者言之又問服中不及師何也曰正是難處若論其服則當與君父等故禮謂若䘮父而無服又曰平居則絰卓李問人倫不及師曰師與朋友同類而勢分等於君父唯其所在而致死焉曾云如在君旁則為君死在父旁則為父死曰也是如此如在君雖父有罪不能為父死賀孫教導後進須是嚴毅然亦須有以興起開發之方得只恁嚴徒拘束之亦不濟事道夫某嘗言今教導之法皆失真無一箇人曉得説道理底盡説錯了説從别處去做文章底也只學做那不好底文章做詩底也不識好詩以至説禪底也不是它元來佛祖底禪修養者也非老莊之道無有是者僴古人上下之分雖嚴然待臣僕如子弟待子弟如臣僕伯玉之使孔子與之坐陶淵明籃輿用其子與門人子路之負米子貢之埋馬夫子之釣弋有若之三踊於魯大夫之庭冉有用矛却齊以入其軍而樊須雖少能用命也古之人執干戈衛社稷窮耕稼與陶漁之事皆是也後世驕侈日甚反以臣子之職為恥此風日變不可復也士君子知此為學者言之以漸率其子弟庶幾可少變乎人傑耳目口鼻之在人尚各有攸司况人在天地間自農商工賈䓁而上之不知其幾皆其所當盡者小大雖異界限截然本分當為者一事有闕便廢夫職居處恭執事敬與人忠推是心以盡其職者無以易諸公之論但必知夫所處之職乃天職之自然而非出於人為則各司其職以辦其事者不出於勉强不得已之意矣大雅以下雜論處心立事有是理方有這物事如草木有箇種子方生出草木如人有此心去做這事方始成這事若無此心如何㑹成這事夔孫事無非學文蔚或説事多曰世事無時是了且揀大段無甚緊要底事不要做又逐旋就小者又揀出無緊要底不要做先去其粗却去其精磨去一重又磨一重天下事都是如此且如中庸説戒慎乎其所不覩恐懼乎其所不聞先且就睹處與聞處做了然後就不睹不聞處用工方能細宻而今人每每跳過一重做事覩處與聞處元不曾有工夫却便去不睹不聞處做可知是做不成下梢一齊擔閣且如屋漏暗室中工夫如何便做得須從十目所視十手所指處做起方得明作且須立箇麤底根脚却正好著細處工夫今人扵無義理底言語儘説了無義理底事儘做了是扵麤底根脚猶未立却求深微縱理㑹得干已甚事升卿多是要求濟事而不知自身已不立事決不能成人自心若一毫私意未盡皆足以敗事如上有一㸃黑下便有一撲黑上有一毫差下便有尋文差今若見得十分透徹待下梢遇事轉移也只做得五六分若今便只就第四五著理㑹下梢如何賀孫聖賢勸人做底必是人有欠闕處戒人莫為底必是自家占得一分在其間祖道要做好事底心是實要做不好事底心是虚被那虚底在裏夾雜便將實底一齊打壊了賀孫須是信得及這件物事好笑不信便了不得士毅這一邊道理熟那一邊俗見之類自破常先難而後易不然則難將至矣如樂毅用兵始常懼難乃心謹畏不敢忽易故戰則雖大國堅城無不破者及至勝則自驕膽大而恃兵强因去攻二城亦攻不下夀昌今人未有所見時直情做去都不見得一有所見始覺所為多有可寒心處砥今人多是安扵所不安做些事明知是不好只説恁地也不妨正所謂月攘一鷄以待來年者也賀孫作事若顧利害其終未有不陷扵害者可學無所為於前無所冀於後燾古人臨事所以要回互時是一般國家大事係死生存亡之際有不可直情徑行處便要權其輕重而行之今則事事用此一向回互至於枉尋直尺而利亦可為歟是甚意思璘問學者講明義理之外亦須理㑹時政凡事當一一講明使先有一定之説庶它日臨事不至墻靣曰學者若得胸中義理明從此去量度事物自然泛應曲當人若有堯舜許多聰明自做得堯舜許多事業若要一一理㑹則事變無窮難以逆料随機應變不可預定今世文人才士開口便説國家利害把筆便述時政得失終濟得甚事只是講明義理以淑人心使世間識義理之人夕夕則何患政治之不舉耶柄因論人好習古今治亂典故等學曰亦何必苦苦扵此用心古今治亂不過進君子退小人愛人利物之類今人都看巧去了揚某看人也須是剛雖則是偏然較之柔不同易以陽剛為君子隂柔為小人若是柔弱不剛之質少間都不㑹振奮只㑹困倒了賀孫天下事亦要得危言者亦要得寛緩者皆不可少随其人所見看其人議論如狄梁公辭雖緩意甚􅈤切如中邊皆緩則不可翕受敷施九徳咸事聖人便如此做去偽今人大抵皆先自立一箇意見若其性寛大便只管一向見得一箇寛大底路若性嚴毅底人便只管見得一箇㢘介底路更不平其心看事物自有合寛大處合嚴毅處賀孫人最不可曉有人奉身儉嗇之甚充其操上食槁壤下飲黄泉底却只愛官職有人奉身清苦而好色它只緣私欲不能克臨事只見這箇重都不見别箇了或云似此等人分數勝已下底曰不得如此説才有病便不好更不可以分數論它只愛官職便弑父與君也敢夔孫李問世間有一種人慈恵温厚而扵義不足作事無斷制是如何曰人生得多般様這箇便全是氣禀如唐明皇為人它於父子夫婦君臣分上極忍無狀然終始扵兄弟之情不衰這只緣寧王讓它位所以如此寧王見它有功自度不可居儲嗣遂力讓它緣這一節感動得它所以終始恩重不衰胡兄説它見它兄讓它所以如此友重曰不是如此自是它裏靣有這箇道理得它兄感動發出來得一箇物事承接得在耳若其中元無此道理如何㑹感動得來人之氣禀極多般様或有餘扵此不足扵彼這箇不干道理事皆氣禀所為也古人尊貴奉之者愈備則其養徳也愈善後之奉養備者賊之而已矣方容貌辭氣乃徳之符也燾血氣之怒不可有義理之怒不可無燾為氣血所使者只是客氣惟扵性理説話涵泳自然臨事有别處季札須是慈祥和厚為夲如勇决剛果雖不可無然用之有處所因論仁及此徳明周旋回䕶底議論最害事升卿事至於過當便是偽楊丞通老云陸子静門人某人常裹頭巾洗靣先生因言此燾學常要親細務莫令心麤江西人大抵用心麄祖道向到臨安或云建夲誤宜用浙夲後來觀之不如用建夲謂浙俗好作長厚可學避俗只是見不透方問避嫌是否曰合避豈可不避如𤓰田不納履李下不整冠豈可不避如君不與同姓同車與異姓同車不同服皆是合避處又問世有刑人不娶如上世不賢而子孫賢則如何曰犁牛之子騂且角雖欲勿用山川其舎諸所謂不娶者是世世為惡不能改者非指一世而言如䘮父長子不娶一句却可疑若然則無父之女不復嫁此不可曉義剛叔蒙問程子説避嫌之事賢者且不為况聖人乎若是有一項合委曲而不可以直遂者這不可以為避嫌曰自是道理合如此如避嫌者却是又怕人道如何這却是私意如十起與不起便是私這便是避嫌只是它見得這意思已是大段做工夫大段㑹省察了又如人遺之千里馬雖不受後來薦人未嘗忘之後亦竟不薦不薦自是好然扵心終不忘便是喫它取奉意思不過這便是私意又如如今立朝明知這箇是好人當薦舉之却緣平日與自家有恩意徃來不是説親戚親戚自是礙法但以相熟遂避嫌不舉它又如有某人平日與自家有怨到得當官彼却有事當治却怕人説道因前怨治它遂休了如此等皆蹉過多了賀孫因説人心不可狹小其待人接物胷中不可先分厚簿有所别異曰惟君子為能通天下之志放令規模寛濶使人人各得盡其情多少快活大雅問待人接物随其情之厚薄輕重而為酬酢邪一切不問而待之以厚邪曰知所以處心持己之道則所以接人待物自有準則人傑事有不當耐者豈可全學耐事升卿學耐事其弊至扵苟賤不㢘升卿學者須要有㢘隅墻壁便可擔負得大事去如子路世間病痛都沒了親於其身為不善直是不入此大者立也問子路此箇病何以終在曰當時也須大段去做工夫來只打疊不能得盡冉求比子路大争升卿恥有當忍者有不當忍者升卿人須是有㢘恥孟子曰恥之於人大矣恥便是羞惡之心人有恥則能有所不為今有一様人不能安貧其氣銷屈以至立脚不住不知㢘恥亦何所不至因舉吕舎人詩云逢人即有求所以百事非人言今人只見曾子唯一貫之㫖遂得道統之傳此雖固然但曾子平日是箇剛毅有力量壁立千仭底人觀其所謂士不可以不𢎞毅可以託六尺之孤可以寄百里之命臨大節而不可奪晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉底言語可見雖是做工夫處比顔子覺麤然緣它資質剛毅先自把捉得定故得卒傳夫子之道後來有子思孟子其傳亦永逺又如論語必先説富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也然後説君子去仁惡乎成名必先教取舍之際界限分明然後可做工夫不然則立脚不定安能有進又云學者不於富貴貧賤上立定則是入門便差了也廣人之所以戚戚於貧賤汲汲於富貴只緣不見這箇道理若見得這箇道理貧賤不能損得富貴不曾添得只要知這道理若沮人之輕富貴者下梢便愈更卑下一齊衰了升卿學者當常以志士不忘在溝壑為念則道義重而計較死生之心輕矣况衣食至微末事不得未必死亦何用犯義犯分役心役志營營以求之耶某觀今人因不能咬菜根而至於違其夲心者衆矣可不戒哉大雅困厄有輕重力量有小大若能一日十二辰檢㸃自己念慮動作都是合宜仰不愧俯不怍如此而不幸填溝壑䘮軀殞命有不暇恤只得成就一箇是處如此則方寸之間全是天理雖遇大困厄有致命遂志而已亦不知有人之是非向背惟其是而已大雅因説貧曰朋友若以錢相恵不害道理者可受分明説其交也以道其接也以禮斯孔子受之若以不法事相委却以錢相恵此則斷然不可明作味道問死生是大闗節處須是日用間雖小事亦不放過一一如此用工夫當死之時方打得透曰然貪生畏死一至於此可學以小恵相濡沫覺見氣象不好方某人立説不須作同異見人作事皆入一分先生曰不曾参得此無礙禪天下事安可必同安可必異且如為子須孝為臣須忠我又如何異於人若是不好事又安可必同只是有理在可學作事先要成所以常匆匆方每常令兒子們作事只是説箇大綱與它以為那小小處置處也易曉不須説也得後來做得有不滿人意處未有不由那些子説不要區處處起義剛問見有吾軰臨終多以不能終養與卒學為恨若大段以為恨也是不順理否曰也是如此因言悔字難説旣不可常存在胷中以為悔又不可不悔若只説不悔則今畨做錯且休明畨做錯又休不成説話問如何是著中底道理曰不得不悔但不可留滯旣做錯此事它時更遇此事或與此事相類便須懲戒不可再做錯了胡泳輕重是非它人最學者大病是是它是非是它非於我何所預且管自家可學品藻人物須先看它大規模然後看它好處與不好處好處多與少不好處多與少又看某長某短某有某無所長所有底是緊要與不緊要所短所無底是緊要與不緊要如此互將來品藻方定得它分數優劣燾今來專去理㑹時文少間身已全做不是這是一項人又有一項人不理㑹時文去理㑹道理少間所做底事却與所學不相闗又有依夲分就所見定是要躬行也不須去講學這箇少間只是做得㑹差亦不至大狼狽只是如今如這般人已是大段好了賀孫以下論科舉之學義理人心之所同然人去講求却易為力舉業乃分外事倒是難做可惜舉業壊了多少人賀孫士人先要分别科舉與讀書兩件孰輕孰重若讀書上有七分志科舉上有三分猶自可若科舉七分讀書三分將來必被它勝却况此志全是科舉所以到老全使不著盖不闗為己也聖人教人只是為己泳或以不安科舉之業請教曰道二仁與不仁而已二者不能兩立知其所不安則反其所不安以就吾安爾聖賢千言萬語只是教人做人而已前日科舉之習盖未嘗不談孝弟忠信但用之非爾若舉而反之扵身見於日用則安矣又問初學當讀何書曰六經語孟皆聖賢遺書皆當讀但初學且須知緩急大學語孟最是聖賢為人切要處然語孟却是随事荅問難見要領唯大學是曾子述孔子説古人為學之大方門人又傳述以明其㫖體統都具玩味此書知得古人為學所鄉讀語孟便易入後靣工夫雖多而大體已立矣大雅專做時文底人它説底都是聖賢説話且如説㢘它且㑹説得好説義它也㑹説得好待它身做處只自不㢘只自不義緣它將許多話只是就紙上説㢘是題目上合説㢘義是題目上合説義都不闗自家身已些子事賀孫告或人曰看今人心下自成兩様如何却專向功名利祿底心去却全背了這箇心不向道理邊求公今赴科舉是幾年公文字想不為不精以公之專一理㑹做時文宜若一舉便中高科登顯仕都了到今又却不得亦可自見得失不可必如此若只管沒溺在裏靣都出頭不得下梢只管衰搨若將這箇自在一邉須要去理㑹道理是要緊待去取功名却未必不得孟子曰自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也非禮義是專道禮義是不好世上有這般人惡人做好事只道人做許多模様是如何這是它自恁地麤暴了這箇更不通與它説到得自棄底也自道義理是好也聽人説也受人説只是我做不得任你如何只是我做不得這箇是自棄終不可與有為故伊川説自暴者拒之以不信自棄者絶之以不為拒之以不信只是説道沒這道理絶之以不為是知有道理自割斷了不肯做自暴者有强悍意自棄者有懦弱意今按自暴謂簏暴及再問所荅不然賀孫語或人曰公且道不去讀書專去讀些時文下梢是要做甚麽人赴試屢試不得到老只恁地衰颯了沉浮鄉曲間若因時文做得一箇官只是恁地鹵莽都不説著要為國為民興利除害盡心奉職心心念念只要做得向上去便逐人背後鑽刺求舉覔薦無所不至賀孫專一做舉業功夫不待不得後枉了氣力便使能竭力去做又得到狀元時亦自輸却這邊工夫了人扵此事從來只是强勉不能捨命去做正似今人强勉來學義理然某平生窮理惟不敢自以為是伯羽若欲學俗儒作文字縱攫取大魁因撫所坐椅曰已自輸了一著力行或謂科舉害人曰此特一事耳若自家工夫到後那邉自輕自脩士人亦有略知向者然那下重掉不得如何知此下事如今凝神静慮積日累月如此尚只今日見得一件明日見得一件未有廓然貫通處况彼千頭萬緒支離其心未嘗一日用其力於此者耶方説修身應舉重輕之序因謂今有恣於不忠不孝冒㢘恥犯條貫非獨它自身不把作差異事有司也不把作差異事到得鄉曲鄰里也不把作差異事不知風俗如何壊到這裏可畏某都為之寒心賀孫不赴科舉也是匹似閒事如人人纔説不赴舉便把做掀天底大事某看來才着心去理㑹道理少間於那邊便自沒緊要不知是如何看許多富貴榮達都自輕了如郭子儀二十四考中書做許大功名也只是如此賀孫科舉累人不淺人多為此所奪但有父母在仰事俯育不得不資於此故不可不勉爾其實甚奪人志道夫問科舉之業妨功曰程先生有言不恐妨功惟恐奪志若一月之間著十日事舉業亦有二十日修學若被它移了志則更無醫處矣大雅以科舉為為親而不為為己之學只是無志以舉業為妨實學不知曾妨飲食否只是無志也方或以科舉作舘廢學自咎者曰不然只是志不立不曾做工夫爾孔子曰不怨天不尤人自是不當怨尤要你做甚耶伊川曰學者為氣所勝習所奪只可責志正為此也若志立則無處無工夫而何貧賤患難與夫夷狄之間哉伯羽舉業亦不害為學前軰何嘗不應舉只緣今人把心不定所以有害才以得失為心理㑹文字意思都别了閎祖嘗論科舉云非是科舉累人自是人累科舉若髙見逺識之士讀聖賢之書據吾所見而為文以應之得失利害置之度外雖日日應舉亦不累也居今之世使孔子復生也不免應舉然豈能累孔子邪自有天資不累於物不須多用力以治之者某於科舉自小便見得輕初亦非有所見而輕之也正如人天資有不好啖酒者見酒自惡非知酒之為害如何也又人有天資不好色者亦非是有見如何自是它天資上看見那物事無緊要若此者省得工夫去治此一項今或未能知此須用力勝治方可伯羽宜之云許叔重太貪作科舉文字曰既是家貧親老未免應舉亦當好與它做舉業舉業做不妨只是先以得失横置胷中却害道可學父母責望不可不應舉如遇試則入去據己見寫了出來節或問科舉之學曰做舉業不妨只是把它格式櫽括自家道理都無那追逐時好回避忌諱底意思便好學蒙譚兄問作時文曰畧用體式而櫽括以至理節南安黄謙父命之入郡學習舉業而徑來見先生先生曰既是父要公習舉業何不入郡學日則習舉業夜則看此書自不相妨如此則兩全硬要咈父之命如此則兩敗父子相夷矣何以學為讀書是讀甚底舉業亦有何相妨一旬便做五日修舉業亦有五日得暇及此若説踐履涵養舉業儘無相妨只是精神昬了不得講究思索義理然也怎奈之何淳向來做時文只麤踈恁地直説去意思自周足且是有氣魄近日時文屈曲纎巧少刻堕在裏靣只見意氣都衰塌了也是教化衰風俗壊到這裏是怎生賀孫今人皆不能脩身方其為士則役役求仕旣仕則復患禄之不加趨走奔馳無一日閒何如山林布衣之士道義足於身道義旣足於身則何物能嬰之哉夀昌以下論仕諸葛武侯未遇先主只得退藏一向休了也沒柰何孔子弟子不免事季氏亦事勢不得不然捨此則無以自活如今世之科舉亦然如顔閔之徒自把得住自是好不可以一律看人之出處最可畏如漢晉之末漢末之所事者止有箇曹氏晉末之事者止有箇司馬氏皆逆賊耳直卿問子路之事輒與樂正子從子敖相似曰不然從子敖更無説賀孫當官勿避事亦勿侵事升卿人須辦得去托身於人仕宦升卿名義不正則事不可行無可為者有去而已然使聖人當之又不知如何恐於義未精也方三哥問汀冦姜大老捉四廵檢以去人當此時如何曰事君則致其身委質為臣身非我有矣有道理殺得他時即殺之如被它拘一處都不問亦須問它朝廷差我來你拘我何為如全無用智力處只是死孟子言捨生而取義只看義如何當死便須死古人當此即是尋常今人看著是大事揚朱子語類卷十三
