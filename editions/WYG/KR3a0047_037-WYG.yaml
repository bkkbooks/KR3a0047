body:
  text: 朱子語類卷三十七論語十九子罕篇下法語之言章法語之言巽與之言巽謂巽順與他說都是教他做好事如有言遜于汝志重䖏在不改不繹聖人謂如此等人與他說得也不濟事故曰吾末如之何也已端䝉植說此章集注云法語人所敬憚故必從然不改則面從而已如漢武帝見汲黯之直深所敬憚至帳中可其奏可謂從矣然黯論武帝内多慾而外施仁義豈非面從集注云巽言無所乖忤故必恱然不繹又不足以知其微意之所在如孟子論太王好色好貨齊王豈不恱若不知繹則徒知古人所謂好色不知其䏻使内無怨女外無曠夫徒知古人所謂好貨不知其䏻使居者有積倉行者有褁糧先生因曰集注中舉楊氏說亦好植三軍可奪帥章志若可奪則如三軍之帥被人奪了做官奪人志志執得定故不可奪執不牢也被物欲奪去志真箇是不可奪泳衣敝緼袍章衣敝緼袍是裏面夾衣有綿作胎底義剛衣敝緼袍也有一等人資質自不愛者然如此人亦難得泳先生曰李閎祖云忮是疾人之有求是恥已之無吕氏之說亦近此意然此說又分曉㽦問子路終身誦之曰是自有一般人着破衣服在好衣服中亦不管者子路自是不把這般當事㽦問子路却是能克治如願車馬衣輕裘與朋友共敝之而無憾曰子路自是恁地人有好物事猶要與衆人共用了上蔡論語中說管仲小器䖏一段極好㽦問子路終身誦之此子路所以不及顔淵䖏盖此便是願車馬衣輕裘與朋友共敝之而無憾底意思然他將来自誦便是無那無伐善施勞意思曰所謂終身誦之亦不是他矜伐只是將這箇做好底事終身誦之要常如此便别無長進矣又問吕氏貧與富交強者必忮弱者必求之語曰世間人見富貴底不是心裏妬嫉他便羨慕他只是這般見識爾僴謝教問子路終身誦之夫子何以見得終其身也曰只是以大勢恁地這䖏好只不合自擔當了便止於此便是自畫大凡十分好底事纔自擔便也壊了所謂有其善喪厥善淳道怕擔了何足以臧可學知者不惑章知者不惑真見得分曉故不惑泳道夫問仁者不憂曰仁者通體是理無一㸃私心事之来者雖無窮而此之應者各得其度所謂建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑何憂之有驤仁者不憂仁者天下之公私欲不萌而天下之公在我何憂之有泳或問仁者不憂但不憂似亦未是仁曰今人學問百種只是要克己復禮若能克去私意日間純是天理自無所憂如何不是仁義剛陳仲亨說仁者不憂云此非仁體只是說夫子之事先生曰如何又生出這一項情節恁地則那兩句也須恁地添一說始得這只是統說仁者便是不憂義剛勇者不懼氣足以助道義故不懼故孟子說配義與道無是餒也今有見得道理分曉而反懾怯者氣不足也泳或問勇者不懼舉程子眀理可以治懼之說曰眀理固是能勇然便接那不懼未得盖爭一節在所以聖人曰勇者不懼燾李閎祖問論語所說勇者不懼䖏作有主則不懼恐有主字眀勇字不出曰也覺見是如此多是一時間下字未穏又且恁地備員去因云前輩言解經命字為難近人解經亦間有好䖏但是下語親切說得分曉若前軰所說或有不大故分曉䖏亦不好如近来耿氏說易女子貞不字伊川說作字育之字耿氏說作許嫁笄而字之字言女子貞不字者謂其未許嫁也却與昏媾之義相通亦說得有理又云伊川易亦有不分曉䖏甚多如益之用凶事作凶荒之凶直指刺史郡守而言在當時未見有刺史郡守豈可以此說某謂益之用凶事者言人臣之益君是責難於君之時必以危言鯁論恐動其君而益之雖以中而行然必用圭以通其信若不用圭而通又非忠以益扵君也卓行夫說仁者不憂一章曰勇者不懼勇是一箇果勇必行之意說不懼也易見知者不惑知是一箇分辨不亂之意說不惑也易見惟是仁如何㑹不憂這須思之行夫云仁者順理故不憂若只順這道理做去自是無憂曰意思也是如此更須細思之久之行夫復云云曰畢竟也說得麄仁者所以無憂者止縁仁者之心便是一箇道理看是甚麽事来不問大小改頭換面来自家此心各各是一箇道理應副去不待事来方始安排心便是理了不是方見得道理合如此做不是方去恁地做賀孫恪錄别出蔡行夫問仁者不憂一章曰知不惑勇不懼却易理㑹仁者不憂須思量仁者如何㑹不憂蔡云莫只是無私否方子錄云或曰仁者無私心故樂天而不憂曰固是無私然所以不憂者須看得透方得楊至之云是人欲淨盡自然樂否曰此亦只是貌說洪慶問先生說是如何曰仁者心便是理看有甚事来便有道理應他所以不憂方子録云仁者理即是心心即是理有一事来便有一理以應之所以無憂恪錄一作仁者心與理一心純是這道理看甚麽事来自有這道理在䖏置他自不煩惱人所以憂者只是卒然遇事未有一箇道理應他便不免有憂恪錄一作今人有這事却無這理便䖏置不来所以憂從周錄云人所以有憂者只是䖏未得恪方毅父問知者不惑眀理便䏻無私否曰也有人眀理而不能去私慾者然去私慾必先眀理無私慾則不屈於物故勇惟聖人自誠而眀可以先言仁後言知至扵教人當以知為先銖時舉少異先生說知者不惑章惟不惑不憂便生得這勇来植問知者不惑章曰有仁知而後有勇然而仁知又少勇不得盖雖曰仁䏻守之只有這勇方䏻守得到頭方䏻接得去若無這勇則雖有仁知少間亦恐㑹放倒了所以中庸說仁知勇三者勇本是箇沒緊要底物事然仁知不是勇則做不到頭半塗而廢燾或問仁者不憂知者不惑勇者不懼何以與前面知者不惑仁者不憂勇者不懼次序不同曰成徳以仁為先進學以知為先此誠而眀眀而誠也中庸言三徳之序如何曰亦為學者言也問何以勇皆在後曰末後做工夫不退轉此方是勇銖或問人之所以憂惑懼者只是窮理不盡故如此若窮盡天下之理則何憂何懼之有因其無所憂故名之曰仁因其無所惑故名之曰知因其無所懼故名之曰勇不知二說孰是曰仁者隨所寓而安自是不憂知者所見眀自是不惑勇者所守定自是不懼夫不憂不惑不懼自有次第或曰勇於義是義理之勇如孟施舍北宫黝皆血氣之勇人傑問云或曰勇是勇於義或是武勇之勇曰大槩統言之如孟施舎北宫黝皆血氣之勇曰三者也須窮理克復方得只如此說不濟事去偽問知者不惑集注知以知之仁以守之勇以終之看此三句恐知是致知格物仁是存養勇是克治之功先生首肯曰是勇是持守堅固問中庸力行近乎仁又似勇者不懼意思曰交互說都是如或生而知之或學而知之或困而知之三知都是知或安而行之或利而行之或勉強而行之三行都是仁好學近乎知力行近乎仁知恥近乎勇三近都是勇㽦可與共學章可與共學有志於此可與適道已看見路脈可與立能有所立可與權遭變事而知其宜此只是大綱如此說可學問可與適道章曰這箇只說世人可與共學底未必便可與適道可與適道底未必便可與立可與立底未必便可與權學時須便教可適道適道便更教立去立便須教權去植或問可與立是如嫂叔不通問可與權是嫂溺援之以手曰然燾問權地位如何曰大賢已上可學權是稱量教子細著閎祖問權便是義否曰權是用那義底問中便是時措之宜否曰以義權之而後得中義似秤權是將這秤去稱量中是物得其平䖏僴經自經權自權但經有不可行䖏而至扵用權此權所以合經也如湯武事伊周事嫂溺則援事常如風和日暖固好變如迅雷烈風若無迅雷烈風則都旱了不可以為常泳蘇宜久問可與權曰權與經不可謂是一件物事畢竟權自是權經自是經但非漢儒所謂權變權術之說聖人之權雖異於經其權亦是事體到那時合恁地做方好植時舉同可與立未可與權亦是甚不得已方說此話然須是聖人方可與權若以顔子之賢恐也不敢議此磨而不磷涅而不緇而今人才磨便磷才􅄺便緇如何更說權變所謂未學行先學走也僴先生因說可與立未可與權權䖏是道理上面更有一重道理如君子小人君子固當用小人固當去然方當小人進用時猝乍要用君子也未得當其深根固蒂時便要去他反為所害這裏須斟酌時宜便知箇緩急深淺始得或言本朝人才過於漢唐而治效不及者縁漢唐不去攻小人本朝専要去小人所以如此曰如此說所謂内君子外小人古人且胡亂恁地說不知何等議論永嘉學問専去利害上計較恐出此又曰正其義不謀其利眀其道不計其功正其義則利自在眀其道則功自在専去計較利害定未必有利未必有功㝢叔重問程子云權者言秤錘之義也何物以為權義是也然也只是說到義義以上更難說在人自看如何此意如何看曰此如有人犯一罪性之剛者以為可誅性之寛者以為可恕槩之以義皆未是合宜此則全在權量之精審然後親審不差欲其權量精審是他平日涵養本原此心虚眀純一自然權量精審伊川常云敬以直内則義以方外義以為質則禮以行之時舉問經權之别曰經與權須還他中央有箇界分如程先生說則無界分矣程先生權即經之說其意盖恐人離了經然一滚来滚去則經與權都鶻突沒理㑹了又問權是秤錘也秤衡是經否曰這箇以物譬之難得親切久之曰稱得平不可增加些子是經到得物重衡昻移退是權依舊得平便是合道故反經亦須合道也燾問經權曰權者乃是到這地頭道理合當恁地做故雖異於經而寔亦經也且如冬月便合着綿向火此是經忽然一日暖則亦須使扇當風坐此便是權伊川謂權只是經意亦如此但說經字太重若偏了漢儒反經合道之說却說得經權兩字分曉但他說權遂謂反了經一向流於變詐則非矣義剛用之問權也者反經而合於道此語亦好曰若淺說亦不妨伊川以為權便是經某以為反經而合於道乃所以為經如征伐視揖遜放廢視臣事豈得是常事但終是正也賀孫或問伊川云權即是經漢儒云反經合道其說如何曰伊川所說權是說這䖏合恁地做便是正理須是曉得他意漢儒語亦未十分有病但他意却是横說一向不合道理胡做了人曰男女授受不親是常經合恁地嫂溺援之以手亦是道理合恁地但不是毎常底道理了譬如冬月衣裘附火是常理也忽然天氣做熱便須衣夾揮扇然便不是毎常底常理了公羊就宋人執祭仲䖏說得權又怪異了又曰經是已定之權權是未定之經義剛呉伯英問伊川言權即是經何也曰某常謂不必如此說孟子分眀說男女授受不親禮也嫂溺援之以手者權也權與經豈容無辨但是伊川見漢儒只管言及經是權恐後世無忌憚者皆得借權以自飾因有此論耳然經畢竟是常權畢竟是變又問某欲以義字言權如何曰義者宜也權固是宜經獨不宜乎壯祖問經權不同而程子云經即權也曰固是不同經是萬世常行之道權是不得已而用之大槩不可用時多又曰權是時中不中則無以為權矣賜或問反經合道之說程先生不取乃云不必說權權即是經如何曰某常以為程先生不必如此說是多說了經者道之常也權者道之變也道是箇統體貫乎經與權如程先生之說則鶻突了所謂經衆人與學者皆䏻循之至於權則非聖賢不䏻行也燾或有書来問經權先生曰程子固曰權即經也人須着仔細看此項大段要仔細經是萬世常行之道權是不得已而用之須是合義也如湯放桀武王伐紂伊尹放太甲此是權也若日日時時用之則成甚世界了或云權莫是中否曰是此一時之中不中則無以為權矣然舜禹之後六七百年方有湯湯之後又六七百年方有武王權也是難說故夫子曰可與立未可與權到得可與權時節也是地位太煞高了也祖道或問經與權之義曰公羊以反經合道為權伊川以為非若平看反經亦未為不是且如君臣兄弟是天地之常經不可易者湯武之誅桀紂却是以臣殺君周公之誅管蔡却是以弟殺兄豈不是反經但時節到這裏道理當恁地做雖然反經却自合道理但反經而不合道理則不可若合道理亦何害於經乎又曰合於權便是經在其中正甫謂權義舉而皇極立權義只相似曰義可以縂括得經權不可將来對權義當守經則守經義當用權則用權所以謂義可以總括得經權若可權義竝言如以兩字對一字當云經權舉乃可伊川曰惟義無對伊川所謂權便是經亦少分别須是分别經權自是兩物到得合於權便自與經無異如此說乃可恪問可與立如何是立曰立是見得那正當底道理分眀了不為事物所遷惑又問程子謂權只是經先生謂以孟子援嫂之事例之則權與經亦當有辨莫是經是一定之理權則是隨事以取中既是中則與經不異否曰經是常行道理權則是那常理行不得䖏不得已而有所通變底道理權得其中固是與經不異畢竟權則可暫而不可常如堯舜揖遜湯武征誅此是權也豈可常行乎觀聖人此意畢竟是未許人用權字學者須當先理㑹這正底道理且如朝廷之上辨别君子小人君子則進之小人則去之此便是正當底道理今人不去理㑹此却說小人亦不可盡去須放他一路不爾反䏻害人自古固有以此而濟事者但終非可常行之理若是君子小人常常竝進則豈可也廣亞夫問可與立未可與權曰漢儒謂反經合道為權伊川說權是經所不及者權與經固是兩義然論權而全離乎經則不是盖權是不常用底物事如人之病熱病者當服涼藥冷病者當服熱藥此是常理然有時有熱病却用熱藥去發他病者亦有冷病却用冷藥去發他病者此皆是不可常論者然須是下得是方可若有毫釐之差便至於殺人不是則劇然若用得是便是少他不得便是合用這箇物事既是合用此權也所以為經也大抵漢儒說權是離了箇經說伊川說權便道權只在經裏面且如周公誅管蔡與唐太宗殺建成元吉其推刃於同氣者雖同而所以殺之者則異盖管蔡與商之遺民謀危王室此是得罪於天下得罪於宗廟盖不得不誅之也若太宗則分眀是爭天下故周公可以謂之權而太宗不可謂之權孟子曰有伊尹之志則可無伊尹之志則簒也故在伊尹可以謂之權而在他人則不可也權是最難用底物事故聖人亦罕言之自非大賢以上自見得這道理合是恁地了不得也時舉因論經權二字曰漢儒謂權者反經合道却是權與經全然相反伊川非之是矣然却又曰其實未甞反經權與經又却是一箇略無分别恐如此又不得權固不離於經看可與立未可與權及孟子嫂溺援之以手事毫釐之間亦當有辨文蔚曰經是常行之理權是適變䖏曰大綱說固是如此要就程子說中分别一箇異同須更精微文蔚曰權只是經之用且如秤衡有許多星兩一定而不可易權往来稱物使輕重恰好此便是經之用曰亦不權得大綱都是只爭些子伊川又云權是經所不及者此說方盡經只是一箇大綱權是那精微曲折䖏且如君仁臣忠父慈子孝此是經常之道如何動得其間有該不盡䖏須是用權權即細宻非見理大段精審不䏻識此可與立便是可與經却未可與權此見經權毫􅁵之間分别䖏荘子曰小變而不失其大常或曰荘子意思又别曰他大槩亦是如此但未知他將甚做大常文蔚僴錄别出經與權之分諸人說皆不合曰若說權自權經自經不相干渉固不可若說事須用權經須權而行權只是經則權與經又全無分别觀孔子曰可與立未可與權孟子曰嫂溺援之以手則權與經須有異䖏雖有異而權實不離乎經也這裏所爭只毫釐只是諸公心粗看不仔細伊川說權只是經恐也未盡甞記龜山云權者經之所不及這說却好盖經者只是存得箇大法正當底道理而已至精微曲折䖏固非經之所䏻盡也所謂權者於精微曲折䖏曲盡其宜以濟經之所不及耳所以說中之所貴者權權者即是經之要妙䖏也如漢儒說反經合道此語亦未甚病盖事也有那反經底時節只是不可說事事要反經又不可說全不反經如君令臣從父慈子孝此經也若君臣父子皆如此固好然事有必不得已䖏經所行不得䖏也只得反經依舊不離乎經耳所以貴乎權也孔子曰可與立未可與權立便是經可與立則䏻守箇經有所執立矣却說未可與權以此觀之權乃經之要妙微宻䖏非見道理之精宻透徹純熟者不足以語權也又曰荘子曰小變而不失其大常便是經權之别或曰恐荘子意思又别曰他大槩亦是如此只不知他把甚麽做大常人云事有緩急理有小大這様䖏皆須以權稱之僴問子莫執中程子之解經便是權則權字又似海說如云時措之宜事事皆有自然之中則似事事皆用權以孟子嫂溺援之以手言之則權字須有别曰執中無權這權字稍輕可以如此說嫂溺援之以手之權這權字却又重亦有深淺也僴問伊川謂權只是經如何曰程子說得却不活絡如漢儒之說權却自曉然曉得程子說底知得權也是常理曉不得他說底經權却鶻突了某之說非是異程子之說只是須與他分别經是經權是權且如冬日則飲湯夏日則飲水此是經也有時天之氣變則冬日須着飲水夏日須着飲湯此是權也權是礙着經行不得䖏方使用得然却依前是常理只是不可數數用如舜不告而娶豈不是怪差事以孟子觀之那時合如此䖏然使人人不告而娶豈不亂大倫所以不可常用賜䕫孫錄詳别出問經權曰冬日則飲湯夏日則飲水此是經也有時行不得䖏冬日須飲水夏日則飲湯此是權也此又依前是經但經是可常之理權是礙着經行不得䖏方始用權然當那時却是常理如舜不告而娶是箇怪差底事然以孟子觀之却也是常理只是不可常用如人人不告而娶大倫都亂了因推說湯武事伊川說權却是經却說得死了不活如某說非是異伊川說即是須為他分别經是經權是權如漢儒反經之說却經權曉然在眼前伊川說曉得底却知得權也是常理曉不得底却鶻突了如大過卦說道無不中無不常聖人有小過無大過某謂不須恁地說聖人既說有大過直是有此事但云大過亦是常理則得因舉晉州蒲事云某舊不曉文定之意後以問其孫伯逢他言此䖏有意思但難說出如左氏分眀有稱君君無道之說厲公信有罪但廢之可也欒書中行偃直殺之則不是然畢竟厲公有罪故難說出後必有曉此意者䕫孫問可與立未可與權看来權字亦有兩様伊川以權只是經盖毎日事事物物上稱量箇輕重䖏置此權也權而不離乎經也若論堯舜禪遜湯武放伐此又是火底權是所謂反經合道者也曰只一般但有小大之異耳如堯舜之禪遜是遜與人遜一盆水也是遜湯武放伐是爭爭一箇彈丸也是爭康節詩所謂唐虞玉帛煙光紫湯武干戈草色萋大小不同而已矣堯夫非是愛吟詩正此意也伊川說經權字將經做箇大底物事經却包得那箇權此說本好只是據聖人說可與立未可與權須是還他是兩箇字經自是經權自是權若如伊川說便用廢了那權字始得只是雖是權依舊不離那經權只是經之變如冬日須向火忽然一日大熱須著使扇這便是反經今須是曉得孔子說又曉伊川之說方得若相把做一說如兩脚相併便行不得須還他是兩隻脚雖是兩隻依舊是脚又曰若不是大聖賢用權少間出入便易得走作僴恭父問可與立未可與權曰可與立者能䖏置得常事可與權者即能䖏置得變事雖是䖏變事而所謂䖏置常事意思只在井以辨義巽以行權此說義與權自不同漢儒有反經之說只縁將論語下文偏其反而誤作一章解故其說相承曼衍且看集義中諸儒之說莫不連下文獨是范純夫不如此說蘇氏亦不如此說自以唐棣之華為下截程子所說漢儒之誤固是如此要之反經合道一句細思之亦通縁權字與經字對說纔說權便是變却那箇須謂之反可也然雖是反那經却不悖於道雖與經不同而其道一也因知道伊川之說㫁然經自是經權亦是經漢儒反經之說不是此說不可不知然細與權考其言亦無害此說亦不可不知義字大自包得經與權自在經與權過接䖏如事合當如此區䖏是常法如此固是經若合當如此亦是義當守其常事合當如此區䖏却變了常法恁地區䖏固是權若合當恁地亦是義當通其變文中子云權義舉而皇極立若云經權舉則無害今云權義舉則義字下不得何故却是將義来當權不知經自是義權亦是義義字兼經權而用之若以義對經恰似將一箇包兩物之物對着包一物之物行夫云經便是權曰不是說經便是權經自是經權自是權但是雖反經而䏻合道却無背於經如人兩脚相似左脚自是左脚右脚自是右脚行時須一脚先一脚後相待而行方始行得不可將左脚便喚做右脚右脚便喚做左脚繫辭既說井以辨義又說井居其所而遷井是不可動底物事水却可隨所汲而徃如道之正體却一定於此而隨事制宜自莫不當所以說井以辨義又云井居其所而遷賀孫唐棣之華章問唐棣之華偏其反而曰此自是一篇詩與今棠棣之詩别常音裳爾雅棣栘似白楊江東呼夫栘常棣棣子如櫻桃可食自是兩般物此逸詩不知當時詩人思箇甚底東坡謂思賢而不得之詩看来未必是思賢但夫子大槩止是取下面兩句云人但不思思則何逺之有初不與上面說權䖏是一段唐棣之華而下自是一段縁漢儒合上文為一章故誤認偏其反而為反經合道所以錯了晉書扵一䖏引偏字作翩反作平聲言其花有翩反飛動之意今無此詩不可考據故不可立為定說去偽或問未之思也夫何逺之有一章時舉因云人心放之甚易然反之亦甚易曰反之固易但恐不䏻得他久存爾時舉朱子語類卷三十七
