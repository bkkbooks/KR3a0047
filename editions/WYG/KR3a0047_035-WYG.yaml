body:
  text: 朱子語類卷三十五論語十七泰伯篇泰伯其可謂至徳章泰伯得稱至徳為人所不䏻為可學問泰伯可謂至徳曰這是於民無得而稱焉處見人都不去看這一句如此則夫子只說至徳一句便了何必更下此六箇字公更仔細去看這一句煞有意思義剛言夫子稱泰伯以至徳稱文王亦以至徳稱武王則曰未盡善若以文王比武王則文王為至徳若以泰伯比文王則泰伯為至徳文王三分天下有其二比泰伯已是不得全這一心了曰是如此義剛又言泰伯若居武王時牧野之師也自不容已盖天命人心到這裏無轉側處了曰却怕泰伯不肯恁地做聖人之制行不同或逺或近或去或不去雖是說他心只是一般然也有做得不同䖏范益之問文王如何曰似文王也自不肯恁地做了縱使文王做時也須做得較詳緩武王做得大故麄暴當時紂既投火了武王又却親自去斫他頭来梟起若文王恐不肯恁地這也難說武王當時做得也有未盡䖏所以東坡說他不是聖人雖說得太過然畢竟是有未盡䖏義剛曰武王既殺了紂有微子賢可立何不立之而必自立何也先生不答但蹙眉再言這事也難說義剛陳仲亨說至徳引義剛前所論者為疑曰也不是不做這事但他做得較雍容和緩不似武王様暴泰伯則是不做底若是泰伯當紂時他也只是為諸侯太王翦商自是他周人恁地說若無此事他豈肯自誣其祖左氏分眀說泰伯不從不知不從甚麽事東坡言三分天下有其二文王只是不管他此說也好但文王不是無思量觀他戡黎伐崇之類時也顯然是在經營又曰公劉時得一土做得盛到太王被狄人苦楚時又衰了太王又旋来那岐山下做起家計但岐山下却亦是商經理不到䖏亦是空地當時邠也只是一片荒凉之地所以他去那裏輯理起来義剛問泰伯之讓知文王將有天下而讓之乎抑知太王欲傳之季歴而讓之乎曰泰伯之意却不是如此只見太王有翦商之志自是不合他意且度見自家做不得此事便掉了去左傳謂泰伯不從是以不嗣不從即是不從太王翦商事耳泰伯既去其勢只傳之季歴而季歴傳之文王泰伯初来思量正是相反至周得天下又都是相成就䖏看周内有泰伯虞仲外有伯夷叔齊皆是一般所見不欲去圖商㝢問泰伯知太王有取天下之志而王季又有聖子故讓去曰泰伯惟是不要太王有天下或問太王有翦商之志果如此否曰詩裏分眀說實始翦商又問恐詩是推本得天下之由如此曰若推本說不應下實始翦商看左氏云泰伯不從是以不嗣這甚分眀這事也難說他無所據只是將孔子稱泰伯可謂至徳也已矣是與稱文王一般泰伯文王伯夷叔齊是行一不義殺一不辜而得天下不為底道理太王湯武是弔民伐罪為天下除殘賊底道理常也是道理合如此變也是道理合如此其實只是一般又問堯之讓舜禹之傳子湯伐桀武王伐紂周公誅管蔡何故聖人所遇都如此先生笑曰後世將聖人做模範却都如此差異信如公問然所遇之變如此到聖人䖏之皆恁地所以為聖人故曰遭變事而不失其常孔子曰可與適道未可與立可與立未可與權公且就平平正正䖏看賀孫呉伯英問泰伯知太王欲傳位季歴故斷髪文身逃之荆蠻示不復用固足以遂其所志其如父子之情何曰到此却顧䘏不得父子君臣一也太王見商政日衰知其不久是以有翦商之意亦至公之心也至於泰伯則惟知君臣之義截然不可犯也是以不從二者各行其心之所安聖人未甞說一邉不是亦可見矣或曰斷髪文身乃仲雍也泰伯則端委以治呉然呉之子孫皆仲雍之後泰伯盖無後也壮祖問泰伯事曰這事便是難若論有徳者興無徳者亡則天命已去人心已離便當有革命之事畢竟人之大倫聖人且要守得這箇看聖人反覆嘆咏泰伯及文王事而於武又曰未盡善皆是微意䕫孫因說泰伯讓曰今人纔有些子讓便惟恐人之不知伯豐問集注云太王因有翦商之志恐魯頌之說只是推本之辭今遂據以為說可否曰詩中分眀如此說又問如此則太王為有心於圖商也曰此是難說書亦云太王肇基王迹又問太王方為狄人所侵不得已而遷岐當時國勢甚弱如何便有意於取天下曰觀其初遷底規模便自不同規模才立便張大如文王伐崇伐密氣象亦可見然文王猶服事商所以為至徳㽦集注泰伯章所引其心即夷齊之心而事之難䖏有甚焉者不是說遜國事自是說夷齊諌武王不信便休無甚利害若泰伯不從翦商之志却是一家内事與諌武王不同所以謂之難䖏非說遜國事也集注說亦未分曉耳眀作泰伯之心即伯夷叩馬之心太王之心即武王孟津之心二者道並行而不相悖然聖人稱泰伯為至徳謂武為未盡善亦自有抑揚盖泰伯夷齊之事天地之常經而太王武王之事古今之通義但其間不無些子高下若如蘇氏用三五百字罵武王非聖人則非矣於此二者中須見得道並行而不悖䖏乃善因問泰伯與夷齊心同而謂事之難䖏有甚焉者何也曰夷齊䖏君臣間道不合則去泰伯䖏父子之際又不可露形迹只得不分不眀且去某書謂太王有疾泰伯採藥不返疑此時去也銖問泰伯讓天下與伯夷叔齊讓國其事相類何故夫子一許其得仁一許其至徳二者豈有優劣耶曰亦不必如此泰伯初未甞無仁夷齊初未甞無徳壮祖問三以天下讓程言不立一也逃之二也文身三也不知是否曰據前軰說亦難考他當時或有此三節亦未可知但古人辭必至再三想此只是固讓㝢集注恭而無禮章禮只是理只是看合當恁地若不合恭後却必要去恭則必勞若合當慎後慎則不葸若合當勇後勇則不亂若不當直後却須要直如證羊之類便是絞義剛問故舊不遺則民不偷盖人皆有此仁義之心篤於親是仁之所發故我篤於親則民興仁篤故舊是義之發故不遺故舊則民興義是如此否曰看不偷字則又似仁大槩皆是厚底意思不遺故舊固是厚這不偷也是厚却難把做義說義剛問君子篤於親與㳟慎勇直䖏意自别横渠說如何曰横渠這說且與存在某未敢决以為定若做一章說就横渠說得似好他就大䖏理㑹便知得品節如此問横渠說知所先後先䖏是篤於親與故舊不遺曰然問他却將恭慎等䖏入在後段說是如何曰就他說人䏻篤於親與不遺故舊他大䖏自䏻篤厚如此節文䖏必不至大段有失他合當恭而恭必不至於勞謹慎必不至於畏縮勇直䖏亦不至於失節若不知先後要做便做更不問有六親眷屬便是證父攘羊之事㝢集注鄭齊卿問集注舉横渠說之意曰他要合下靣意所以如此說盖有禮與篤親不遺故舊在先則不葸不勞不亂不絞與興仁不偷之效在後耳要之合分為二章又問直而無禮則絞曰絞如䋲兩頭絞得緊都不寛舒則有證父攘羊之事矣木之張子之說謂先且篤於親不遺故舊此其大者則恭慎勇直不至難用力此說固好但不若呉氏分作兩邉說為是眀作問横渠知所先後之說其有所節文之謂否曰横渠意是如此篤於親不遺故舊是當先者恭慎之類却是後必大曾子有疾謂門弟子章正卿問曾子啟手足章曰曾子奉持遺體無時不戒謹恐懼直至啟手足之時方得自免這箇身已直是頃刻不可不戒謹恐懼如所謂孝非止是尋常奉事而已當念慮之微有毫髪差錯便是悖理傷道便是不孝只看一日之間内而思慮外而應接事物是多多少少這箇心畧不㸃檢便差失了看世間是多少事至危者無如人之心所以曾子常常恁地戰戰兢兢如臨深淵如履薄氷賀孫問曾子戰兢曰此只是戒謹恐懼常恐失之君子未死之前此心常恐保不得便見得人心至危且說世間甚物事似人心危且如一日之間内而思慮外而應接千變萬化劄眼中便走失了劄眼中便有千里萬里之逺所謂人心惟危道心惟微只理㑹這箇道理分曉自不危惟精惟一便是守在這裏允執厥中便是行將去恪曾子曰戰戰兢兢如臨深淵如履薄氷此乃敬之法此心不存則常昏矣今人有昏睡者遇身有痛痒則蹶然而醒盖心所不䏻已則自不至於忘中庸戒謹恐懼皆敬之意洽時舉讀問目曰依舊有過高傷巧之病切須放令平實曾子啟手足是如此說固好但就他保身上面看自極有意思也時舉曾子有疾孟敬子問之章問正顔色斯近信矣此其形見於顔色者如此之正則其中之不妄可知亦可謂信實矣而只曰近信何故曰聖賢說話也寛也怕有未便恁地底義剛問正顔色斯近信如何是近於信曰近是其中有這信與行䖏不違背多有人見於顔色自恁地而中却不恁地者如色厲而内荏色取仁而行違皆是外面有許多模様所存却不然便與信逺了只將不好底對看便見㝢出辭氣斯逺鄙倍是脩辭立其誠意思賀孫出辭氣人人如此工夫却在下面如非禮勿視非禮勿聽人人皆然工夫却在勿字上泳毅父問逺暴慢章曰此章暴慢鄙倍等字須要與他看暴是麄厲慢是放肆盖人之容貌少得和平不暴則慢暴是剛者之過慢是寛柔者之過鄙是凡淺倍是背理今人之議論有見得雖無甚差錯只是淺近者此是鄙又有說得甚高而實背於理者此是倍不可不辨也時舉仲蔚說動容貌章曰暴慢底是大故麄斯近信矣這須是裏靣正後顔色自恁地正方是近信若是色取仁而行違則不是信了倍只是倍於理出辭氣時須要看得道理如何後方出則不倍於理問三者也似只一般様曰是各就那事上說又問要恁地不知如何做工夫曰只是自去持守池錄作只是随事去持守義剛君子所貴乎道者三一章是成就䖏升卿以下縂論君子所貴乎道者三此三句說得太快大槩是養成意思較多賜陳寅伯問君子所貴乎道者三曰且只看那所貴二字莫非道也如籩豆之事亦是道但非所貴君子所貴只在此三者動容貌斯逺暴慢矣斯字来得甚緊動容貌便須逺暴慢正顔色便須近信出辭氣便須逺鄙倍人之容貌只有一箇暴慢雖淺深不同暴慢則一如人狼戾固是暴稍不温恭亦是暴如人倨肆固是慢稍或怠緩亦是慢正顔色而不近信却是色荘信實也正顔色便須近實鄙便是說一様卑底說話倍是逆理辭氣只有此二句因曰不易孟敬子當時焉得如此好或云想曾子病亟門人多在傍者曰恐是如此因說看文字須是熟後到自然脫落䖏方是某初看此都安排不成按得東頭西頭起按得前面後面起到熟後全不費力要緊䖏却在那斯字矣字這般閒字上此一段程門只有尹和靖看得出孔子曰學而時習之不亦說乎若熟後真箇使人說今之學者只是不深好後不得其味只是不得其味後不深好文蔚敬之問此章曰君子所貴乎道者三是題目一句下面要得動容貌便䏻逺暴慢要得正顔色便近信出辭氣便逺鄙倍要此須是從前做工夫植問君子所貴乎道者三曰此言君子存養之至然後䏻如此一出辭氣便自䏻逺鄙倍一動容貌便自䏻逺暴慢正顔色便自䏻近信所以為貴若學者則雖未䏻如此當思所以如此然此亦只是說效騐若作工夫則在此句之外雉楊問君子所貴乎道者三若未至此如何用工曰只是就容貌辭色之間用工更無别法但上面臨時可做下面臨時做不得須是熟後䏻如此初間未熟時雖蜀本淳錄作須字是動容貌到熟後自然逺暴慢雖是正顔色到熟後自然近信雖是出辭氣到熟後自然逺鄙倍㝢淳錄此下云辭是言語氣是聲音出是從這裡出去三者是我身上事要得如此籩豆雖是末亦道之所在不可不謹然此則有司之事我亦只理㑹身上事動容貌斯逺暴慢正顔色斯近信出辭氣斯逺鄙倍須要理㑹如何得動容貌便㑹逺暴慢正顔色便㑹近信出辭氣便㑹逺鄙倍須知得曾子如此說不是到動容貌正顔色出辭氣時方自㑹恁地須知得工夫在未動容貌未正顔色未出辭氣之前又云正顔色若要相似說合當着得箇逺虚偽矣動出都說自然惟正字却似方整頓底意思盖縁是正顔色亦有假做恁地内實不然者若容貌之動辭氣之出却容偽不得賀孫問君子所貴乎道者三曰看来三者只是非禮勿視非禮勿聽非禮勿言非禮勿動又問要之三者以涵飬為主曰涵養便是只這三者便是涵養地頭但動容貌逺暴慢便是不逺暴慢便不是顔色近信便是不近信便不是燾君子所貴乎道者三或云須是工夫持久方䏻得如此否曰不得人之資禀各不同資質好者纔知得便把得定不改變資質遲慢者須大段着力做工夫方得因舉徐仲車從胡安定學一日頭容少偏安定忽厲聲云頭容直徐因思不獨頭容直心亦要直自此不敢有邪心又舉小南和尚偶靠倚而坐其師見之厲聲叱之曰恁地無脊梁骨小南聞之聳然自此終身不靠倚坐這様人都是資質美所以一撥便轉終身不為僴問所謂暴慢鄙倍皆是指在我者言否曰然曰所以動容貌而暴慢自逺者工夫皆在先與曰此只大綱言人合如此固是要平日曾下工夫然即今亦須随事省察不令間斷廣叔京来問所貴乎道者三因云正動出時也要整齊平時也要整齊方云乃是敬貫動靜曰恁頭底人言語無不貫動靜者方或問逺與近意義如何曰曾子臨終何甞又安排下這字如此但聖賢言語自如此耳不須推尋不要緊䖏動容貌斯逺暴慢是為得人好正顔色斯近信是顔色寔出辭氣斯逺鄙倍是出得言語是動正出三字皆是輕說過君子所貴於此者皆平日功夫所至非臨事所䏻揑合籩豆之事雖亦莫非道之所在然須先擇切已者為之如有闗睢麟趾之意便可行周官法度又如盡得皇極之五事便有庶徴之應以籩豆之事告孟敬子必其所為有以煩碎為務者謨君子所貴乎道者三言道之所貴者有此三事便對了道之所賤者籩豆之事非不是道乃道之末耳如動容貌正顔色出辭氣須是平日先有此等工夫方如此効騐動容貌斯逺暴慢矣須只做一句讀斯字只是自然意思楊龜山解此一句引曾子脩容閽人避之事却是他人恭慢全說不着人傑問君子所貴乎道者三至籩豆之事則有司存曰以道言之則不可謂此為道彼為非道然而所貴在此則所賤在彼矣其本在此則其末在彼矣人傑君子所貴乎道者三乃是切於身者若籩豆之事特有司所職掌耳今人於制度文為一一致察未為不是然却於大體上欠闕則是棄本而求末也人傑問君子所貴乎道者三曰學者觀此一段須看他兩節先看所貴乎道者是如何這箇是所貴所重者至於一籩一豆皆是理但這箇事自有人管我且理㑹箇大者且如今人講眀制度名器皆是當然非不是學但是於自己身上大䖏却不曾理㑹何貴於學先生因言近来學者多務高逺不自近䖏着工夫有對者曰近来學者誠有好高之弊有問伊川如何是道伊川曰行䖏是又問眀道如何是道眀道令於父子君臣兄弟上求諸先生言如此初不曾有高逺之說曰眀道之說固如此然父子兄弟君臣之間各有一箇當然之理是道也謙之義剛說君子所貴乎道者三一章畢因曰道雖無所不在而君子所重則止此三事而已這也見得窮理則不當有小大之分行已則不䏻無緩急先後之序先生曰這様䖏也難說聖賢也只大槩說在這裏而今說不可無先後之序固是但只㨂得幾件去做那小底都不照管也不得義剛因言義剛便是也疑以為古人事事致謹如所謂克勤小物豈是盡視為小而不管曰這但是說此三事為最重耳若是其他也不是不管只是說人於己身上事都不照管却只去理㑹那籩豆等小事便不得言這箇自有司在但責之有司便得若全不理㑹將見以籩為豆以豆為籩都無理㑹了田子方謂魏文侯曰君明樂官不明樂音此說固好但某思之人君若不曉得那樂却如何知得那人可任不可任這也須曉得方解去任那人方不被他謾如籩豆之類若不曉如何解任那有司若籩裏盛有汁底物事豆裏盛乾底物事自是不得也須着曉始得但所重者是上面三事耳義剛舜功問君子所貴乎道者三曰動容貌則䏻逺暴慢正顔色則䏻近信出辭氣則䏻逺鄙倍所貴者在此至於籩豆之事雖亦道之所寓然自有人管了君子只脩身而已盖常人容貌不暴則多慢顔色易得近色荘言語易得鄙而倍理前人愛說動字出字正字上有工夫看得来不消如此璘正卿問正顔色之正字獨重於動與出字何如曰前軰多就動正出三字上說一向都將三字重了若從今說便三字都輕却不可於中自分兩様某所以不以彼說為然只縁看文勢不恁地君子所貴乎道者三是指夫道之所以可貴者為說故云道之所以可貴者有三事焉故下數其所以可貴之實如此若禮文器數自有官守非在所當先而可貴者舊說所以未安者且看世上人雖有動容貌者而便辟足恭不䏻逺暴慢雖有正顔色者而色取仁而行違多是虚偽不䏻近信雖有出辭氣者而巧言飾辭不䏻逺鄙倍這便未見得道之所以可貴矣道之所以可貴者惟是動容貌自然便㑹逺暴慢正顔色自然便㑹近信出辭氣自然便㑹逺鄙倍此所以貴乎道者此也又云三句最是正顔色斯近信見得分眀賀孫或問君子所貴乎道者三如何曰動容貌正顔色出辭氣前軰不合將做用工䖏此只是涵養已成效驗䖏暴慢鄙倍近信皆是自己分内事惟近信不好理㑹盖君子才正顔色自有箇誠實底道理異乎色取仁而行違者也所謂君子所貴乎道者三道雖無乎不在然此三者乃修身之要為政之本故可貴容貌是舉一身而言顔色乃見於面顔者而言又問三者固是效驗䖏然不知於何䖏用工曰只平日涵養便是去偽某病中思量曾子當初告孟敬子人之將死其言也善只說出三事曾子當時有多少好話到急䖏都說不辦只撮出三項如此這三項是最緊要底若說這三事上更做得工夫上面又大段長進便不長進也做得箇聖賢坯模雖不中不逺矣恪所貴乎道者三禮亦是道但道中所貴此三者在身上李先生云曾子臨死空洞中只餘此念方或講所貴乎道者三曰不必如此說得巧曾子臨死時話說必不暇如此委曲安排必大注云暴粗厲也何謂粗厲曰粗不精細也節集注問先生舊解以三者為脩身之驗為政之本非其平日荘敬誠實存省之功積之有素則不䏻也専是做效驗說如此則動正出三字只是閒字後来改本以驗為要非其以下改為學者所當操存省察而不可有造次頃刻之違者也如此則工夫却在動正出三字上如上蔡之說而不可以效驗言矣某疑動正出三字不可以為做工夫字正字尚可說動字出字豈可以為工夫耶曰這三字雖不是做工夫底字然便是做工夫䖏正如着衣喫飯其着其喫雖不是做工夫然便是做工夫䖏此意所爭只是絲髪之間要人自認得舊来解以為效驗語似有病故改從今說盖若専以為平日荘敬持養方䏻如此則不成未荘敬持養底人便不要逺暴慢近信逺鄙倍便是舊說效驗字太深有病僴君子所貴乎道者三以下三節是要得恁地須是平日荘敬工夫到此方䏻恁地若臨時做工夫也不解恁地植因問明道動容周旋中禮正顔色則不忘出辭氣正由中出又仍是以三句上半截是工夫下半截是功效曰不是所以恁地也是平日荘敬工夫植問動也正也出也不知是心要得如此還是自然發見氣象曰上蔡諸人皆道此是做工夫䖏看来只當作成效說涵養荘敬得如此工夫已在前了此是效驗動容貌若非涵養有素安䏻便逺暴慢正顔色非荘敬有素安䏻便近信信是信寔表裏如一色有色厲而内荏者色荘也色取仁而行違者苟不近寔安䏻表裏如一乎問正者是着力之辭否曰亦着力不得若不到近寔䖏正其顔色但見作偽而已問逺之字義如何曰逺便是無復有這氣象問正顔色既是功效到此則宜自然而信却言近信何也曰這也是對上逺字說㝢集義問君子道者三章謝氏就動正出上用工竊謂此三句其要緊䖏皆是斯字上盖斯者便自然如此也才動容貌便自然逺暴慢非平昔涵養之熟何以至此此三句乃以效言非指用功地歩也曰是如此柄舜功問動容貌如何逺暴慢曰人之容貌非暴則慢得中者極難須是逺此方可此一段上蔡說亦多有未是䖏問其言也善何必曾子天下自有一等人臨死言善通老云聖賢臨死不亂曰聖賢豈可以不亂言曾子到此愈極分眀易簀事可見然此三句亦是由中以出不是外向鬬撰成得可學動容貌出辭氣先生云只伊川語解平平說未有如此張筋弩力意思謂上蔡語方子曾子以䏻問於不䏻章陳仲亨說以䏻問於不䏻章曰想是顔子自覺得有未䏻䖏但不比常人十事曉得九事那一事便不肯問人觀顔子無伐善無施勞看他也是把此一件做工夫又問君子人與是才徳出衆之君子曰託六尺之孤寄百里之命才者䏻之臨大莭而不可奪則非有徳者不䏻也義剛舉問犯而不校曰不是着意去容他亦不是因他犯而遂去自反盖其所存者廣大故人有小小觸犯䖏自不覺得何暇與之校耶時舉不校是不與人比校强弱勝負道我勝你負我强你弱如上言以䏻問於不䏻之類皆是不與人校也燾子善問犯而不校恐是且㸃檢自家不暇問他人曰不是如此是他力量大見有犯者如蚊䖝蝨子一般何足與校如汪汪萬頃之波澄之不清撓之不濁亞夫問黄叔度是何様底人曰當時亦是衆人扛得如此看来也只是篤厚深逺底人若是有所見亦須說出来且如顔子是一箇不說話底人有箇孔子說他好若孟子無人印證他他自發出許多言語豈有自孔孟之後至東漢黄叔度時已是五六百年若是有所見亦須發眀出来安得言論風㫖全無聞亞夫云郭林宗亦主張他曰林宗何足慿且如元徳秀在唐時也非細及就文粹上看他文章乃是說佛南升顔子犯而不校是成徳事孟子三自反却有着力䖏學者莫若且理㑹自反却見得自家長短若遽學不校却恐儱侗都無是非曲直下梢於自已分却恐無益端䝉或問犯而不校若常持不校之心如何曰此只看一箇公私大小故伊川云有當校者順理而已方子大丈夫當容人勿為所容顔子犯而不校子䝉問如此已是無我了集注曰非幾於無我者不䏻何也曰聖人則全是無我顔子却但是不以我去壓人却尚有箇人與我相對在聖人和人我都無義剛問幾於無我幾字莫只是就從事一句可見耶抑併前五句皆可見耶犯而不校則亦未䏻無校此可見非聖人事矣曰顔子正在着力未着力之間非但此䖏可見只就從事上看便分眀不須更說無校也曾子曰可以託六尺之孤章聖人言語自渾全温厚曾子便恁地剛有孟子氣象如可以託六尺之孤可以寄百里之命臨大節而不可奪等語見得曾子直是峻厲淳問可以託六尺之孤云云不知可見得伊周事否曰伊周亦未足道此只說有才志氣節如此亦可為君子之事又問下此一等如平勃之入北軍迎代王霍將軍之擁昭立宣可當此否曰這也隨人做聖人做出是聖人事業賢人做出是賢人事業中人以上是中人以上事業這通上下而言君子人與君子人也上是疑詞如平勃當時這䖏也未見得若誅諸吕不成不知果䏻死節否古人這䖏怕亦是幸然如此如藥殺許后事光後来知却含糊過似這般所在解臨大節而不奪否恐未必然因言今世人多道東漢名節無補於事某謂三代而下惟東漢人才大義根於其心不顧利害生死不變其節自是可保未說公卿大臣且如當時郡守懲治宦官之親黨雖前者既為所治而来者復蹈其迹誅殛竄戮項背相望略無所創今士大夫顧惜畏懼何望其如此平居暇日琢磨淬厲緩急之際尚不免於退縮况㳺談聚議習為軟熟卒然有警何以得其仗節死義乎大抵不顧義理只計較利害皆奴婢之態殊可鄙厭又曰東坡議論雖不䏻無偏頗其氣節直是有高人䖏如說孔北海曺操使人凛凛有生氣又曰如前代多有幸而不敗者如謝安桓温入朝已自無䇿從其廢立九錫已成但故為遷延以俟其死不幸而病小甦則將何以䖏之擁重兵上流而下何以當之於此看謝安果可當仗節死義之資乎㝢曰坦之倒持手板而安從容閑雅似亦有執者曰世間自有一般心膽大底人如廢海西公時他又不䏻拒廢也得不廢也得大節在那裏㝢砥錄畧正卿問可以託六尺之孤至君子人也此夲是兼才節說然緊要䖏却在節操上曰不然三句都是一般說須是才節兼全方謂之君子若無其才而徒有其節雖死何益如受人託孤之責自家雖無欺之之心却被别人欺了也是自家不了事不䏻受人之託矣如受人百里之寄自家雖無竊之之心却被别人竊了也是自家不了事不䏻受人之寄矣自家徒䏻臨大節而不可奪却不䏻了得他事雖䏻死也只是箇枉死漢濟得甚事如晉之荀息是也所謂君子者豈是斂手束脚底村人耶故伊川說君子者才徳出衆之名孔子曰君子不器既曰君子須是事事理㑹得方可若但有節而無才也喚做好人只是不濟得事僴正卿問託六尺之孤一章曰百里之命只更命令之命託六尺之孤謂輔幼主寄百里之命謂攝國政曰如霍光當得此三句否曰霍光亦當得上面兩句至如許后之事則大節已奪了曰託孤寄命雖資質髙者亦可及臨大節而不可奪非學問至者恐不䏻曰資質高底也都做得學問到底也都做得大抵是上兩句易下一句難譬如說有猷有為有守託孤寄命是有猷有為臨大節而不可奪却是有守霍光雖有為有猷矣只是無所守恪託六尺之孤寄百里之命是才臨大節不可奪是徳如霍光可謂有才然其毒許后事便以愛奪了燕慕容恪是慕容暐之霍光其輔幼主也好然知慕容評當去而不去之遂以亂國此也未是惟孔眀䏻之賜䕫孫同問君子人與君子人也曰所謂君子這三句都是不可少底若論文勢却似臨大節不可奪一句為重然而須是有上面託六尺之孤寄百里之命却臨大節而不可奪方足以為君子此所以有結語也燾問可以託六尺之孤可以寄百里之命又䏻臨大節而不可奪方可謂之君子是如此看否曰固是又問若徒䏻臨大節不可奪而才力短淺做事不得如荀息之徒僅䏻死節而不䏻止難要亦不可謂之君子曰也是不可謂之君子義剛問胡文定以荀息為可以託六尺之孤寄百里之命臨大節而不可奪如何曰荀息便是不可以託孤寄命了問聖人書荀息與孔父仇牧同辭何也曰聖人也且是要存得箇君臣大義䕫孫問君子才徳出衆之名曰有徳而有才方見於用如有徳而無才則不䏻為用亦何足為君子君子人與章伊川說燾曾子曰士不可以不𢎞毅章𢎞毅二字𢎞雖是寛廣却被人只把做度量寛容看了便不得且如執徳不𢎞之𢎞便見此𢎞字謂為人有許多道理及至學来下梢却做得狹窄了便是不𢎞盖縁只以已為是凡他人之言便做說得天花亂墜我亦不信依舊只執已是可見其狹小何縁得𢎞須是不可先以别人為不是凡他人之善皆有以受之集衆善之謂𢎞伯豐問是寛以居之否曰然如人䏻𢎞道却是以𢎞為開廓𢎞字却是作用㽦專論𢎞問𢎞毅之𢎞曰𢎞是寛廣事事著得道理也著得事物也著得事物逆来也著得順来也著得富貴也著得貧賤也著得看甚麽物事来掉在裏面都不見形影了僴𢎞字只將隘字看便見得如看文字相似只執一說見衆說皆不復取便是不𢎞若是𢎞底人便包容衆說又非是於中無所可否包容之中又為判别此便是𢎞植𢎞有耐意如有一行之善便道我善了更不要進䏻些小好事便以為只如此足矣更不向前去皆是不𢎞之故如此其小安䏻擔當得重任淳所謂𢎞者不但是放令公平寛大容受得人須是容受得許多衆理若執着一見便自以為是他說更入不得便是滯於一隅如何得𢎞須是容受軋捺得衆理方得謙之恭甫問𢎞是心之體毅是心之力曰心體是多少大大而天地之理纔要思量便都在這裏若是世上淺心私已底人有一兩件事便着不得賀孫問如何是𢎞曰計較小小利害小小得失褊隘如公欲執両事終身行之皆是不𢎞說道自家不敢承當說道且據自己所見皆是不𢎞莭士不可以不𢎞毅這曾子一箇人只恁地他肚裏却著得無限今人微有所得欣然自以為得祖道毅是立脚䖏堅忍强厲擔負得去底意升卿以下兼論毅敬之問𢎞是容受得衆理毅是勝得箇重任曰𢎞乃䏻勝得重任毅便是䏻擔得逺去𢎞而不毅雖勝得任却恐去前面倒了時舉問𢎞是寛容之義否曰固是但不是寛容人乃寛容得義理耳毅字曾子以任重言之人之狹隘者只守得一義一理便自足既滯一隅却如何䏻任重必䏻容納吞受得衆理方是𢎞也必大仲蔚問𢎞毅曰𢎞不只是有度量䏻容物之謂正是執徳不𢎞之𢎞是無所不容心裏無足時不說我徳已如此便住如無底之谷擲一物於中無有窮盡若有滿足之心便不是𢎞毅是忍耐持守着力去做義剛問𢎞毅曰𢎞是寛廣耐事事事都著得道理也著得多人物也著得多若着得這一箇著不得那一箇便不是𢎞且如有兩人相爭須是寛著心都容得始得若便分别一人是一人非便不得或兩人都是或兩人都非或是者非非者是皆不可知道理自是箇大底物事無所不備無所不包若小著心如何承載得起𢎞了却要毅𢎞則都包得在裏面了不成只恁地寛廣裏面又要分别是非有規矩始得若只恁地𢎞便沒倒斷了任重是擔子重非如任天下之任又曰若纔小着這心便容兩箇不得心裏只着得一箇這兩箇便相挂碍在這裏道理也只着得一說事事都只着得一邊僴問曾子𢎞毅䖏不知為學工夫久方㑹恁地或合下工夫便着恁地曰便要恁地若不𢎞不毅難為立脚問人之資禀偏駁如何便要得恁地曰既知不𢎞不毅便警醒令𢎞毅如何討道理教他莫恁地𢎞毅䖏固未見得若不𢎞不毅䖏亦易見不𢎞便急廹狹隘不容物只安於卑陋不毅便傾東倒西既知此道理當恁地既不䏻行又不䏻守知得道理不當恁地却又不䏻割捨除却不𢎞便是𢎞除了不毅便是毅這䖏亦須是見得道理分曉磊磊落落這箇都由我䖏置要𢎞便𢎞要毅便毅如多財善賈須多蓄得在這裏看我要買也得要賣也得若只有十文錢在這裏如何䖏置得去又曰聖人言語自渾全温厚曾子便有圭角如士不可以不𢎞毅如可以託六尺之孤云云見得曾子直是恁地剛硬孟子氣象大抵如此㝢淳錄云徐問𢎞毅是為學工夫久方䏻如此抑合下便當如此曰便要𢎞毅皆不可一日無曰人之資禀有偏何以便䏻如此曰只知得如此便警覺那不如此更那裏别尋討方法去醫治他𢎞毅䖏亦難見不𢎞不毅却易見不𢎞便淺廹便窄狹不容物便安於卑陋不毅便倒東墜西見道理合當如此又不䏻行不䏻守見道理不當如此又不䏻捨不䏻去只除了不𢎞便是𢎞除了不毅便是毅非别討一𢎞毅来然亦須是見道理極分曉磊磊落落在這裏無遁情病痛来便都由自家䖏置要𢎞便𢎞要毅便毅如多財善賈都蓄在這裏要買便買要賣便賣若止有十文錢在此則如何䖏置得砥錄云居父問士不可不𢎞毅學者合下當便𢎞毅將徳盛業成而後至此曰合下便當𢎞毅不可一日無也又問如何得𢎞毅曰但只去其不𢎞不毅便自然𢎞毅𢎞毅雖難見自家不𢎞不毅䖏却易見常要檢㸃若卑狹淺隘不䏻容物安於固陋便是不𢎞不毅䖏病痛更多知理所當為而不為知不善之不可為而不去便是不毅又曰孔子所言自渾全温厚如曾子所言便有孟子氣象問士不可以不𢎞毅曰𢎞是事事着得如進學者要𢎞接物也要𢎞事事要𢎞若不𢎞只是見得這一邊不見那一邊便是不𢎞只得些了便自足便不𢎞毅却是發䖏勇猛行得来强忍是他發用䖏問後面只說仁以為己任是只成就這箇仁否曰然許多道理也只是這箇仁人也只要成就這箇仁須是擔當得去又問死而後已是不休歇否曰然若不毅則未死已前便有時倒了直到死方住又曰古人下字各不同如剛毅勇猛等字雖是相似其義訓各微不同如適間說推與充相似僴仁以為已任不亦重乎死而後已不亦逺乎須是認得箇仁又將身體驗之方真箇知得這擔子重真箇是難世間有兩種有一種全不知者固全無摸索䖏又有一種知得仁之道如此大而不肯以身任之者今自家全不曾擔著如何知得他重與不重所以學不貴徒說須要實去驗而行之方知僴士不可以不𢎞毅毅者有守之意又云曾子之學大抵如孟子之勇觀此𢎞毅之說與夫臨大節不可奪與孟子彼以其富我以吾仁之說則其勇可知若不勇如何主張得聖道住如論語載曾子之言先一章云以䏻問於不䏻則見曾子𢎞䖏又言臨大節不可奪則見他毅䖏若孟子只得他剛䖏却少𢎞大底氣象謨𢎞而不毅如近世龜山之學者其流與世之常人無以異毅而不𢎞如胡氏門人都恁地撑腸拄肚少間都沒頓着䖏賀孫𢎞寛廣也是事要得寛闊毅强忍也如云擾而毅是馴擾而却毅强而有守底意思𢎞字如今講學須大着箇心是者從之不是者也且寛心去究而今人才得一善便說道自家底是了别人底都不是便是以先入為主了雖有至善無由見得如執徳不𢎞須是自家要𢎞始得若容民蓄衆底事也是𢎞但是外面事而今人說𢎞字多做容字說了則這𢎞字裏面無用工䖏可以此意推之又云𢎞是開闊周遍䕫孫集注程子說𢎞字曰寛廣最說得好此是儘耐得工夫不急廹如做一件今日做未得又且耐眀日做䕫孫問毅訓强忍粗而言之是硬擔當着做將去否楊氏作力行說正此意但說得不猛厲明白若不足以形容毅字氣象至程子所謂𢎞而無毅則無規矩而難立其說固不可易第恐毅字訓義非可以有規矩言之如何曰毅有忍耐意思程子所云無規矩是說目今難立是說後来必大士不可以不𢎞毅先生舉程先生語曰重擔子須是硬着脊梁骨方擔荷得去燾興於詩章或問興於詩立於禮成於樂曰興於詩便是箇小底立於禮成於樂便是箇大底興於詩初間只是因他感發興起得来到成䖏却是自然後恁地又曰古人自小時習樂誦詩學舞不是到後来方始學詩學禮學樂如云興於詩立於禮成於樂非是初學有許多次第乃是到後来方䏻如此不是說用工夫次第乃是得效次第如此又曰到得成於樂是甚次第幾與理為一看有甚放僻邪侈一齊都滌盪得盡不留些子興於詩是初感發這些善端起来到成於樂是刮来刮去凡有毫髪不善都盪滌得盡了這是甚氣象又曰後世去古既逺禮樂蕩然所謂成於樂者固不可得然看得来只是讀書理㑹道理只管將来涵泳到浹洽貫通熟䖏亦有此意思致道云讀孟子熟儘有此意曰也是只是孟子較感發得麄其他書都是如此賀孫因云如大學傳知止章及齊家章引許多詩語涵泳得熟誠有不自己䖏賀孫亞夫問此章曰詩禮樂初學時都已學了至得力時却有次第樂者䏻動盪人之血氣使人有些小不善之意都着不得便純是天理此所謂成於樂譬如人之服藥初時一向服了服之既久則耳聪目眀各自得力此興詩立禮成樂所以有先後也時舉古人學樂只是収斂身心令入規矩使心細而不麄久久自然養得和樂出来又曰詩禮樂古人學時本一齊去學了到成就得力䖏却有先後然成於樂又見無所用其力升卿興於詩立於禮成於樂聖人做出這一件物事来使學者聞之自然懽喜情願上這一條路去四方八面攛掇他去這路上行廣敬之問興於詩立於禮成於樂覺得和悦之意多曰先王教人之法以樂官為學校之長便是教人之本末都在這裏時舉正卿說興於詩立於禮成於樂曰到得成於樂自不消恁地淺說成於此是大段極至賀孫只是這一心更無他說興於詩興此心也立於禮立此心也成於樂成此心也今公讀詩是興起得箇甚麽僴或問成於樂曰樂有五音六律䏻通暢人心今之樂雖與古異若無此音律則不得以為樂矣力行因舉樂記云耳目聪眀血氣和平曰須看所以聪眀和平如何不可只如此說過力行成於樂曰而今作俗樂聒人也聒得人動况先王之樂中正平和想得足以感動人燾問立於禮禮尚可依禮經服行詩樂皆廢不知興詩成樂何以致之曰豈特詩樂無禮也無今只有義理在且就義理上講究如分别得那是非邪正到感慨䖏必䏻興起其善心懲創其惡志便是興於詩之功涵養徳性無斯須不和不樂直恁地和平便是成於樂之功如禮古人這身都只在禮之中都不由得自家今既無之只得硬做些規矩自恁地収拾如詩須待人去歌誦至禮與樂自稱定在那裏只得自去做荀子言禮樂法而不說更無可說只得就他法之而已荀子此語甚好又問志於道據於徳依於仁與此相表裏否曰也不爭多此却有㳺藝一脚子㝢淳錄云徐問立於禮猶可用力詩今難曉樂又無何以興成乎曰今既無此家具只有理義在只得就理義上講究如分别是非到感慨䖏有以興起其善心懲創其惡志便是興於詩之功也涵養和順無斯須不和不樂恁地和平便是成於樂之功也如禮今亦無只是便做些規矩自恁地収歛古人此身終日都在禮之中不由自家古人興於詩猶有言語以諷誦禮全無說話只是恁地做去樂更無說話只是聲音節奏使人聞之自然和平故荀子曰禮樂法而不說曰此章與志於道相表裏否曰彼是言徳性道理此是言事業工夫此却是㳺於藝脚子道夫錄云居父問立於禮猶可用力詩樂既廢不知今何由興成之曰既無此家具也只得以義理養其心若精别義理使有以感發其善心懲創其惡志便是興於詩涵養從容無斯須不和不樂便是成於樂今禮亦不似古人完具且只得自存箇規矩収斂身心古人終日只在禮中欲少自由亦不可得又曰詩猶有言語可諷誦至於禮只得夾定做去樂只是使它聲音節奏自然和平更無說話荀子又云禮樂法而不說只有法更無說也或問此章與志道據徳依仁㳺藝如何曰不然彼就徳性上說此就工夫上說只是㳺藝一脚意思興於詩此三句上一字謂成功而言也非如志於道四句上一字以用功而言也椿仲蔚問興於詩與㳺於藝先後不同如何曰興立成是言其成志據依㳺是言其用功䖏䕫孫錄云志據依是用力䖏興立成是成效䖏但詩較感發人故在先禮則難執守這須常常執守始得樂則如太史公所謂動盪血氣流通精神者所以涵養前所得也問消融渣滓如何曰渣滓是他勉强用力不出於自然而不安於為之之意聞樂則可以融化了然樂今却不可得而聞矣義剛子夀言論語所謂興於詩又云詩可以興盖詩者古人所以詠歌情性當時人一歌詠其言便䏻了其義故善心可以興起今人須加訓詁方理㑹得又失其歌詠之律如何一去看着便䏻興起善意以今觀之不若熟理㑹論語方䏻興起善意也大雅問注言樂有五聲十二律云云以至於義精仁熟而自和順於道徳不知聲音節奏之末如何便䏻使義精仁熟和順於道徳曰人以五聲十二律為樂之末淳録云不可謂樂之末若不是五聲十二律如何見得這樂便是無樂了淳錄云周旋揖遜不可謂禮之末若不是周旋揖遜則為無禮矣何以見得禮五聲十二律皆有自然之和氣古樂不可見要之聲律今亦難見然今之歌曲亦有所謂五聲十二律方做得曲亦似古樂一般如彈琴亦然只他底是邪古樂是正所以不同又問五聲十二律作者非一人不知如何䏻和順道徳曰如金石絲竹匏土革木雖是有許多却打成一片清濁高下長短大小更唱迭和皆相應渾成一片有自然底和氣淳錄云所以聽之自䏻義精仁熟和順於道徳樂於歌舞不是各自為節奏樂只是此一節奏歌亦是此一節奏舞亦是此一節奏不是各自為節奏歌者歌此而已舞者舞此而已所以聽之可以和順道徳者須是先有興詩立禮工夫然後用樂以成之問古者十有三年學樂誦詩二十而冠始學禮與這䖏不同如何曰這䖏是大學終身之所得如十嵗學幼儀十三學樂誦詩從小時皆學一畨了做箇骨子在這裏到後来方得他力禮小時所學只是學事親事長之節乃禮之小者年到二十所學乃是朝廷宗廟之禮乃禮之大者到立於禮始得禮之力樂小時亦學了到成於樂時始得樂之力不是大時方去學詩却是初間便得力說善說惡却易曉可以勸可以戒禮只捉住在這裏樂便難精淳錄云直是工夫至到方能有成詩有言語可讀禮有節文可守樂是他人作與我有甚相闗如人唱曲好底凡有聞者人人皆道好樂雖作於彼而聽者自然竦動感發故䏻義精仁熟而和順道徳舜命䕫典樂教胄子直而温寛而栗剛而無虐簡而無傲定要教他恁地至其教之之具又却在於詩言志歌永言聲依永律和聲䖏五聲十二律不可謂樂之末猶揖遜周旋不可謂禮之末若不揖遜周旋又如何見得禮在那裏又問成於樂䖏古人之學有可證者否曰不必恁地支離這䖏只理㑹如何是興於詩如何是立於禮如何是成於樂律吕雖有十二用時只用七箇自黄鐘下生至姑洗便住了若更要挿一箇便拗了如今之作樂亦只用七箇如邊頭寫不成字者即是古之聲律若更添一聲便不成樂㝢集注問注云樂有五聲十二律更唱迭和恐是迭為賔主否曰書所謂聲依永律和聲盖人聲自有高下聖人制五聲以括之宫聲洪濁其次為商羽聲輕清其次為徴清濁洪纎之中為角此五聲之别以括人聲之高下聖人又制十二律以節五聲故五聲中又各有高下毎聲又分十二等謂如以黄鍾為宫則是太蔟為商姑洗為角林鍾為徴南吕為羽還至無射為宫便是黄鍾為商太蔟為角中吕為徴林鍾為羽然而無射之律只長四寸六七分而黄鍾長九寸太蔟長八寸林鍾長六寸則宫聲槩下面商角羽三聲不過故有所謂四清聲夾鍾大吕黄鍾太蔟是也盖用其半數謂如黄鍾九寸只用四寸半餘三律亦然如此則宫聲可以槩之其聲和矣不然則其聲不得其和看来十二律皆有清聲只說四者意其取數之甚多者言之餘少者尚庶幾焉某人取其半數為子聲謂宫律之短餘則用子聲某人又破其說曰子聲非古有也然而不用子聲則如何得其和畢竟須着用子聲想古人亦然但無可考耳而今俗樂多用夾鍾為黄鍾之宫盖向上去聲愈清故也又云今之琴第六七絃是清聲如第一二絃以黄鍾為宫太蔟為商則第六七絃即是黄鍾太蔟之清盖只用兩清聲故也燾正淳問謝氏謂樂則存養其善心使義精仁熟自和順於道徳遺其音而專論其意如何曰樂字内自括五音六律了若無五音六律以何為樂必大集義民可使由之章問民可使由之曰所謂雖是他自有底却是聖人使之由如道之以徳齊之以禮教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信豈不是使之由問不可使知之曰不是愚黔首是不可得而使之知也吕氏謂知之未至適所以啟機心而生惑志說得是問此不知與百姓日用不知同否曰彼是自不知此是不䏻使之知淳植云民可使之仰事俯育而不可使之知其父子之道為天性可使之奔走服役而不可使之知其君臣之義為當然及諸友舉畢先生云今晚五人看得都無甚走作植或問民可使由之不可使知之曰聖人只使得人孝足矣使得人弟足矣却無縁又上門逐箇與他解說所以當孝者是如何所以當弟者是如何自是無縁得如此頃年張子韶之論以為當事親便當體認取那事親者是何物方識所謂仁當事兄便當體認取那事兄者是何物方識所謂義某說若如此則前面方推這心去事親随手又便去背後尋摸取這箇仁前面方推此心去事兄随手又便着一心去尋摸取這箇義是二心矣禪家便是如此其為說曰立地便要你究得恁地便要你究得他所以撑眉弩眼使棒使喝都是立地便拶教你承當識認取所以謂之禪機若必欲使民知之少間便有這般病某甞舉子韶之說以問李先生曰當事親便要體認取箇仁當事兄便要體認取箇義如此則事親事兄却是沒緊要底事且姑借此来體認取箇仁義耳李先生笑曰不易公看得好或問上蔡愛說箇覺字便是有此病了曰然張子韶初間便是上蔡之說只是後来又展上蔡之說說得来放肆無収煞了或曰南軒初間也有以覺訓仁之病曰大槩都是自上蔡䖏来又曰吕氏解民可使由之不可使知之云不可使知非以愚民盖知之不至適以起機心而生惑志也此說亦自好所謂機心便是張子韶與禪機之說方纔做這事便又使此心去體認少間便啟人機心只是聖人說此語時却未有此意在向姑舉之或問不欲附集注或曰王介甫以為不可使知盖聖人愚民之意曰申韓荘老之說便是此意以為聖人置這許多仁義禮樂都是殃人考淮南子有一段說武王問太公曰寡人伐紂天下謂臣殺主下伐上吾恐用兵不休爭鬬不已為之奈何太公善王之問教之以繁文滋禮以持天下如為三年之䘮令類不蓄厚𦵏久䘮以亶音丹其家其意大槩說使人行三年之䘮庶幾生子少免得人多為亂之意厚葬久䘮可以破産免得人富以啓亂之意都是這般無稽之語僴民可使由之一章舊取楊氏說亦未精審此章之義自與盤誥之意不同商盤只說遷都周誥只言代商此不可不與百姓說令分曉况只是就事上說聞者亦易曉解若義理之精微則如何說得他曉必大好勇疾貧章好勇疾貧固是作亂不仁之人不䏻容之亦必致亂如東漢之黨錮泳如有周公之才之美章周公之才之美此是為有才而無徳者言但此一段曲折自有數般意思驕者必有吝吝者必有驕非只是吝於財凡吝於事吝於為善皆是且以吝財言之人之所以要吝者只縁我散與人使他人富與我一般則無可矜誇於人所以吝某甞見兩人只是無緊要閒事也抵死不肯說於人只縁他要說自㑹以是驕誇人故如此因曾親見人如此遂曉得這驕吝兩字只是相匹配得在故相靠得在池錄作相比配相靠在這裏義剛驕吝是挾其所有以誇其所無挾其所有是吝誇其所無是驕而今有一様人㑹得底不肯與人說又却將来驕人僴正卿問驕如何生於吝曰驕却是枝葉發露䖏吝却是根本藏蓄䖏且以淺近易見者言之如說道理這自是世上公共底物事合當大家說出来世上自有一般人自恁地吝惜不肯說與人這意思是如何他只怕人都識了却沒詫異所以吝惜在此獨有自家㑹别人都不㑹自家便驕得他便欺得他如貨財也是公共底物事合使便着使若只恁地吝惜合使不使只怕自家無了别人却有無可强得人所以吝惜在此獨是自家有别人無自家便做大便欺得他又云為是要驕人所以吝賀孫或問驕吝曰驕是傲於外吝是靳惜於中驕者吝之所發吝者驕之所藏祖道某昨見一箇人學得些子道理便都不肯向人說其初只是吝積蓄得這箇物事在肚裏無奈何只見我做大便要陵人只此是驕恪聖人只是平說云如有周公之才美而有驕吝也連得才美功業壞了况無周公之才美而驕吝者乎甚言驕吝之不可也至於程子云有周公之徳則自無驕吝與某所說驕吝相為根本枝葉此又是發餘意解者先說得正意分曉然後却說此方得賀孫先生云一學者来問伊川云驕是氣盈吝是氣歉歉則不盈盈則不歉如何却云使驕且吝試商量看伯豐對曰盈是加於人䖏歉是存於已者粗而喻之如勇於為非則怯於遷善眀於責人則暗於恕已同是一箇病根先生曰如人曉些文義吝惜不肯與人說便是要去驕人非驕無所用其吝非吝則無以為驕㽦問驕氣盈吝氣歉氣之盈歉如何曰驕與吝是一般病只隔一膜驕是放出底吝吝是不放出底驕正如人病寒熱攻注上則頭目痛攻注下則腰腹痛熱發出外似驕寒包縮在内似吝因舉顯道克己詩試於清夜深思省剖破藩籬即大家問當如何去此病曰此有甚法只莫驕莫吝便是剖破藩籬也覺其為非從源頭䖏正我要不行便不行要坐便還我坐莫非由我更求甚方法㝢集注云驕吝雖不同而其勢常相因先生云孔子之意未必如此某見近来有一種人如此其說又有所為也炎驕者吝之枝葉吝者驕之根本某甞見人吝一件物便有驕意見得這兩字如此吝者驕之根本驕者吝之枝葉是吝為主盖吝其在我則謂我有你無便是驕人也燾讀驕吝一段云亦是相為先後時舉三年學章問不至於榖欲以至為及字說謂不暇及於祿免改為志得否曰某亦只是疑作志不敢必其然盖此䖏解不行作志則略通不可又就上面撰便越不好了或又引程子說曰說不行不如莫解解便不好如解白為黑一般問三年學而不至於榖是無所為而為學否曰然燾篤信好學章學者須以篤信為先劉子澄說端䝉篤信故䏻好學守死故䏻善道惟善道故䏻守死惟好學故䏻篤信毎推夫子之言多如此徳眀惟篤信故䏻好學惟守死故䏻善道善如善吾生善吾死之善不壊了道也然守死生於篤信善道由於好學徒篤信而不好學則所信者或非所信徒守死而不䏻推以善其道則雖死無補升卿篤信須是好學但要好學也須是篤信善道須是守死而今若是不䏻守死臨利害又變了則亦不䏻善道但守死須是善道若不善道便知守死也無益所以人貴乎有學篤信方䏻守死好學方䏻善道義剛恪錄云此両句相闗自是四事惟篤信故䏻守死惟好學故䏻善道危邦不入是未仕在外則不入亂邦不居是已仕在内見其紀綱亂不䏻從吾之諌則當去之淳危邦不入舊說謂已在官者便無可去之義若是小官恐亦可去當責任者則不容去也必大或問危邦固是不可入但或有見居其國則當與之同患難豈復可去曰然到此無可去之理矣然其失則在於不䏻早去當及其方亂未危之時去之可也僴天下無道譬如天之將夜雖未甚暗然此自只向暗去知其後来必不可支持故亦須見幾而作可也時舉不在其位章馬荘甫問不在其位不謀其政曰此各有分限田野之人不得謀朝廷之政身在此間只得守此如縣尉豈可謀他主簿事纔不守分限便是犯他疆界馬曰如縣尉可與他縣中事否曰尉佐官也既以佐名官有繁難只得伴他謀但不可侵他事權大雅師摰之始章徐問闗雎之亂何謂樂之卒章曰自關關雎鳩至鐘鼓樂之皆是亂想其初必是已作樂只無此詞到此䖏便是亂淳或問關睢之亂亂何以訓終曰既奏以文又亂以武節亂曰者亂乃樂終之雜聲也亂出國語史記又曰闗睢恐是亂聲前面者恐有聲而無辭揚狂而不直章狂是好高大便要做聖賢宜直侗是愚模様不解一事底人宜謹愿悾悾是拙模様無䏻為底人宜信有是徳則有是病有是病必有是徳有是病而無是徳則天下之棄才也泳問狂而不直之狂恐不可以進取之狂當之欲目之以輕率可否曰此狂字固卑下然亦有進取意思敢為大言下梢却無収拾是也必大問侗者同也於物同然一律無所識别之謂悾者空也空而又空無一長之實之謂先生以為此亦因舊說而以字義音訓推之恐或然爾此類只合大槩看不須苦推究也學如不及章學如不及猶恐失之如今學者却恁地慢了譬如捉賊相似須是着起氣力精神千方百計去趕捉他如此猶恐不獲今却只在此安坐熟視他不管他如何奈得他何只快時起来行得三兩歩􅂴時又坐恁地如何做得事成巍巍乎章看巍巍乎舜禹之有天下至禹吾無間然四章先生云舜禹與天下不相闗如不曾有這天下相似都不曾把一毫来奉已如今人纔富貴便被他勾惹此乃為物所役是自卑了若舜禹直是高首出庶物高出萬物之表故夫子稱其巍巍又曰堯與天為一䖏民無䏻名所䏻名者事業禮樂法度而已正卿問舜禹有天下而不與莫是物各付物順天之道否曰據本文說只是崇高富貴不入其心雖有天下而不與耳巍巍是至高底意思大凡人有得些小物事便覺累其心今富有天下一似不曾有相似豈不是高恪不與只是不相干之義言天下自是天下我事自是我事不被那天下来移着義剛正淳論不以位為樂恐不特舜禹為然曰不必如此說如孟子論禹湯一段不成武王不執中湯却泄邇忘逺此章之㫖與後章禹無間然之意同是各舉他身上一件切底事言之必大因論舜禹有天下而不與之義曰此等䖏且玩味本文看他語意所重落向何䖏眀道說得義理甚閎闊集注却說得小然觀經文語意落䖏却恐集注得之必大大哉堯之為君章惟天為大惟堯則之只是尊堯之詞不必謂獨堯䏻如此而他聖人不與也淳惟堯則之一章曰雖蕩蕩無䏻名也亦有巍巍之成功可見又有煥乎之文章可覩謨大哉堯之為君炎謂呉才老書解說驩兠共工軰在堯朝堯却䏻容得他舜便容他不得可見堯之大䖏舜終是不若堯之大曰呉解亦自有說得好䖏舜自側微而興以至即帝位此三四人終是有不服底意舜只得行遣故曰四罪而天下咸服炎舜有臣五人章魏問集注云惟唐虞之際乃盛於此此恐將舜有臣五人一句閒了曰寧可將上一句存在這裏若從元注說則是亂臣十人却多於前於今為盛却是舜臣五人不得如後来盛賀孫李問至徳曰三分天下有其二天命人心歸之自可見其徳之盛了然如此而猶且不取乃見其至䖏雉問三分天下有其二以服事商使文王更在十三四年將終事紂乎抑為武王牧野之舉乎曰看文王亦不是安坐不做事底人如詩中言文王受命有此武功既伐於崇作邑於豐文王烝哉武功皆是文王做来詩載武王武功却少但卒其武功耳觀文王一時氣勢如此度必不終竟休了一似果實文王待他十分黄熟自落下来武王却似生拍破一般㝢或問以為文王之時天下已二分服其化使文王不死數年天下必盡服不俟武王征伐而天下自歸之矣曰自家心如何測度得聖人心孟子曰取之而燕民不恱則勿取古之人有行之者文王是也聖人已說底話尚未理㑹得何况聖人未做底事如何測度得後再有問者先生乃曰若紂之惡極文王未死也只得征伐救民僴問文王受命是如何曰只是天下歸之問太王翦商是有此事否曰此不可考矣但據詩云至於太王實始翦商左傳云泰伯不從是以不嗣要之周自日前積累以来其勢日大又當商家無道之時天下趨周其勢自爾至文王三分有二以服事殷孔子乃稱其至徳若非文王亦須取了孔子稱至徳只二人皆可為而不為者也周子曰天下勢而已矣勢輕重也周家基業日大其勢已重民又日趨之其勢愈重此重則彼自輕勢也璘因說文王事商曰文王但是做得從容不廹不便去伐商太猛耳東坡說文王只是依本分做諸侯自歸之或問此有所據否曰這也見未得在但是文王伐崇戡黎等事又自顯然書說王季勤勞王家詩云太王翦商都是他子孫自說不成他子孫誣其父祖春秋分眀說泰伯不從是不從甚底事若泰伯居武王之世也只是為諸侯但時措之宜聖人又有不得已䖏横渠云商之中世都棄了西方之地不管他所以戎狄復進入中國太王所以遷於岐然岐下也只是箇荒涼之地太王自去立箇家訃如此䕫孫問文王三分天下有其二一段據本意只是說文王或問中載胡氏說文兼武王而言以為武王之間以服事商如何曰也不消如此說某也謾載放那裏這箇難說而今都回互箇聖人說得忒好也不得如東坡罵武王不是聖人又也無禮只是孔子便說得来平如武未盡善此等䖏未消理㑹且存放那裏僴禹吾無間然章范益之問五峯說禹無間然矣章云是禹以鯀遭殛死而不忍享天下之奉此說如何曰聖人自是薄於奉已而重於宗廟朝廷之事若只恁地說則較狹了後来著知言也不曾如此說義剛黻蔽膝也以韋為之韋熟皮也有虞氏以革夏后氏以山殷火周龍章祭服謂之黻朝服謂之韠左氏帶裳韠舄泳朱子語類卷三十五
