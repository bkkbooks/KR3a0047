body:
  text: 朱子語類卷二十論語二學而篇上今讀論語且熟讀學而一篇若明得一篇其餘自然易曉夀昌學而篇皆是先言自􅁱而後親師友有朋自逺方来在時習之後而親仁在入則孝出則弟之後就有道而正焉在食無求飽居無求安之後毋友不如己者在不重則不威之後今人都不去自脩只是専靠師友説話璘入道之門是將自家身已入那道理中去漸漸相親久之與已為一而今人道理在這裏自家身在外面全不曾相干涉僴子曰學而時習之章劉問學而時習之曰今且理㑹箇學是學箇甚底然後理㑹習字時字盖人只有箇心天下之理皆聚於此此是主張自家一身者若心不在那裏得理来惟學之久則心與理一而周流泛應無不曲當矣且說為學有多少事孟子只說學問之道求其放心而已矣盖為學之事雖多有頭項而為學之道則只在求放心而已心若不在更有甚事雉學習書也只是熟讀常記在心頭便得雖孔子教人也只是學而時習之若不去時習則人都不奈爾何只是孔門弟子編集把這箇作第一件若能時習將次自曉得十分難曉底也解曉得義剛或問學而時習不是詩書禮樂曰固不是詩書禮樂然無詩書禮樂亦不得聖人之學與俗學不同亦只争這些子聖賢教人讀書只要知所以為學之道俗學讀書便只是讀書更不理㑹為學之道是如何淳問注云學之為言效也效字所包甚廣曰是如此博學審問慎思明辨篤行皆學效之事也驤容録云人凡有可效處皆當放之呉知先問學習二字曰學是未理㑹得時便去學習是已學了又去重學非是學得了頓放在一處却又去習也只是一件事如鳥數飛只是飛了又飛所謂鷹乃學習是也先生因言此等處添入集注中更好銖未知未能而求知求能之謂學己知己能而行之不已之謂習義剛讀書講論修飭皆要時習銖學而時習之雖是講學力行平說然看他文意講學意思終較多觀則以學文雖曰未學則可見伯羽或問學而時習之曰學是學别人行是自家行習是行未熟須在此習行之也履問時習是温尋其義理抑習其所行曰此句所包廣只是學做此一件事便須習此一件事且如學克己復禮便須朝朝暮暮習這克己復禮學效也是效其人未能孔子便效孔子未能周公便效周公巫醫亦然淳學習須是只管在心常常習若習得專一定是脫然通解賀孫且如今日說這一段文字了明日又思之一畨思了又第二第三畨思之便是時習今學者才說了便休學䝉問如何是時習曰如冩一箇上字冩了一箇又冩一箇又冩一箇當時先生亦逐一書此上字於掌中節國秀問格物致知是學誠意正心是習學是知習是行否曰伊川云時復思繹浹洽於中則說也這未說到行知自有知底學自有知底習行自有行底學自有行底習如小兒冩字知得字合恁地冩這是學便須將心思量安排這是習待將筆去冩成㡬箇字這是行底學今日冩一紙明日冩一紙又明日寫一紙這是行底習人於知上不習便要去行如何得人於知上不習非獨是知得不分曉終不能有諸己賀孫問程子二說一云時復思繹是就知上習所學在我是就行上習否曰是如此柄浹洽二字宜子細看凡於聖賢言語思量透徹乃有所得譬之浸物於水水若未入只是外面稍濕裏面依前乾燥必浸之久則透内皆濕程子言時復思繹浹洽於中則說極有深意闕此生令諸生同講學而時習之不亦說乎須以近者譬得分曉乃可如小子初授讀書是學也令讀百數十遍是時習也既熟則不煩惱覆背得此便是說也書字亦然或問中云學是未知而求知底工夫習是未能而求能底工夫以此推之意可得矣雜說載魏帝三三横兩兩縱誰能辨之賜金鍾之令答者云呉人没水自云工屠兒割肉與稱同伎兒擲繩在虚空盖有類三句陳思王見三人答後却云臣解得是習字亦善謔矣皆說習熟之意先生然之過學而時習之若伊川之說則專在思索而無力行之功如上蔡之說則專於力行而廢講究之義似皆偏了道夫問程云習重習也時復思繹浹洽於中則說也㸔来只就義理處說後添入上蔡坐如尸一段此又就躬行處說然後盡時習之意曰某備兩說某意可見兩段各只說得一邊尋繹義理與居處皆當習者也後又問習鳥數飛也如何是數飛之義曰此是說文習字從羽月令鷹乃學習只是飛来飛去也㝢問學而時習之伊川說習字就思上說范氏㳺氏說都就行上說集注多用思意而附謝氏坐如尸立如齊一段為習於行據賀孫看不思而行則未必中道思得慣熟了却行無不當者曰伊川意是說習於思天下事若不先思如何㑹行得說習於行者亦不是外於思思與行亦不可分說賀孫坐如尸立如齊學時是知得坐如尸立如齊及做時坐常是如尸立常是如齊此是習之事也卓上蔡謂坐如尸坐時習立如齊立時習只是儱侗說成一箇物恁地習以見立言最難某謂須坐常常照管教如尸方始是習立常常照管教如齊方始是習逐件中各有一箇習若恁散說便寛了淳坐如尸立如齊謝氏說得也疎率這箇須是說坐時常如尸立時常如齊便是今謝氏却只將這兩句来儱侗說了不知這兩句裏而尚有多少事逐件各有箇習在立言便也是難義剛方叔弟問平居時習而習中每覺有愧何也曰如此只是工夫不接續也要習須常令工夫接續始得又問尋求古人意思曰某嘗謂學者須是信又須不信久之却自尋得箇可信底道理則是真信也大雅學而時習之須是自己時習然後知心裏說處祖道說或問不亦說乎曰不但只是學道有說處今人學冩字初間冩不好到後来一旦冩得好時豈不歡喜又如人習射初間都射不中到後来射得中時豈不歡喜大抵學到說時已是進一步了只說後便自住不得且如人過險處過不得得人扶持將過纔過得險處了見一條平坦路便自歡喜行將去矣時舉問集注謂中心喜恱其進自不能已曰所以欲諸公將文字熟讀方始經心方始謂之習習是常常去習今人所以或作或輟者只縁是不曽到說處若到說處自住不得看来夫子只用說學而時習一句下面事自節節可見眀作問有朋自逺方来莫是為學之驗否曰不必以驗言大抵朋友逺来能相信從吾既與他共知得這箇道理自是樂也或問說與樂如何曰說是自家心裏喜說人却不知樂則發散於外也謨朋自逺方来鄭齊卿問以善及人而信從者衆故可樂曰舊嘗有云信從者衆足以驗己之有得然己既有得何待人之信從始為可樂須知己之有得亦欲他人之皆得然信從者但一二亦未能愜吾之意至於信之從之者衆則豈不可樂又曰此段工夫專在時習上做時習而至於說則自不能已後面工夫節節自有来人傑問以善及人而信從者衆是樂其善之可以及人乎是樂其信從者衆乎曰樂其信從者衆也大抵私小底人或有所見則不肯告人持以自多君子存心廣大己有所得足以及人若己能之以教諸人而人不能是多少可悶今既信從者自逺而至其衆如是安得不樂又云緊要在學而時習之到說處自不能已今人學而不能久只是不到可說處到學而不能自已則久久自有此理祖道問以善及人而信從者衆曰須是自家有這善方可及人無這善如何及得人看聖人所言多少寛大氣象常人褊廹但聞得些善言冩得些文字便自寳藏之以為己物皆他人所不得知者成甚模様今不必說朋来逺方是以善及人如自家寫得片文隻字而歸人有求者須當告之此便是以善及人處只是待他求方可告之不可登門而告之若登門而告之是往教也便不可如此卓問以善及人而信從者衆語初學將自謀不暇何以及得人曰謂如傳得師友些好說話好文字歸與朋友亦喚做及人如有好說話得好文字緊緊藏在籠篋中如何得及人客或問有朋自逺方来程先生云推己之善以及人有舜善與人同底意不必如此思量推廣添將去且就此上看此中學問大率病根在此不特近時為然自彪徳美来已如此盖三十餘年矣向来記得與他說中庸鬼神之事也須要說此非功用之鬼神乃妙用之鬼神滚纒說去更無了期只是向髙乗虚接渺說了此正如看屋不向屋裏看其間架如何好惡如何堂奥如何只在外畧一綽過便說更有一箇好屋在又說上面更有一重好屋在又如喫飯不喫在肚裏却向上家討一椀来比下家討一椀来比濟得甚事且如讀書直是將一般書子細沈潜去理㑹有一看而不曉者有再㸔而不曉者其中亦有再看而可曉者看得來多不可曉者自可曉果是不曉致疑方問人今来所問皆是不曽子細㸔書又不曽從頭至尾㸔只是中間接起一句一字來備禮發問此皆是應故事来問底於己何益將来何用此最學者大病謙程氏云以善及人而信從者衆故樂此說是若楊氏云與共講學之類皆不是我既自未有善可及人方資人相共講學安得有朋自逺方来璘吳仁父問非樂不足以語君子曰惟樂後方能進這一歩不樂則何以為君子時舉云說在己樂有與衆共之之意曰要知只要所學者在我故說人只争這一句若果能恱則樂與不愠自可以次而進矣時舉說在心樂主發散在外說是中心自喜說樂便是說之發於外者僴說樂說是感於外而發於中樂則充於中而溢於外道夫人不知而不愠不亦君子乎自是不相干涉要他知做甚自家為學之初便是不要人知了至此而後真能不要人知爾若煆鍊未能得十分如此成熟心裏固有時被它動及到這裏方真箇能人不我知而不愠也僴人不知不愠人不知而不愠為善乃是自己當然事於人何與譬如喫飯乃是要得自家飽我既在家中喫飽了何必問外人知與不知盖與人初不相干也拱壽問人不知而不愠曰今有一善便欲人知不知則便有不樂之意不特此也人有善而人或不知之初不干己事而亦為之不平况其不知己乎此則不知不愠所以爲難時舉尹氏云學在己知不知在人何愠之有此等句極好君子之心如一泓清水更不起些㣲波人傑問學者稍知為己則人之知不知自不相干而集注何以言不知不愠者逆而難曰人之待己平平恁地過亦不覺若被人做箇全不足比數底人看待心下便不甘便是愠愠非忿怒之謂賀孫或問不亦樂乎與人不知而不愠曰樂公而愠私君子有公共之樂無私己之愠時舉樂不愠有朋自逺方来而樂者天下之公也人不知而愠者一已之私也以善及人而信從者衆則樂人不己知則不愠樂愠在物不在己至公而不私也銖或問謂朋来講習之樂為樂曰不似伊川說得大葢此箇道理天下所公共我獨曉之而人曉不得也自悶人若有朋自逺方来則信向者衆故可樂若以講習為樂則此方有資於彼而後樂則其為樂也小矣這箇地位大故是髙了人不知而不愠說得容易只到那地位自是難不愠不是大故怒但心裏畧有些不平底意思便是愠了此非得之深飬之厚者不能如此夔孫義剛録同見訓揚聖賢言語平鋪地說在裏如夫子說學而時習之自家是學何事便須著時習習之果能說否有朋自逺方来果能樂不樂今人之學所以求人知之不見知果能不愠否道夫緫論問學而時習之不亦說乎到熟後自然說否曰見得漸漸分曉行得漸漸熟便說又問人不知而不愠此是所得深後外物不足為輕重學到此方始是成否曰此事極難愠非勃然而怒之謂只有些小不快活處便是正叔曰上蔡言此一章是成徳事曰習亦未是成徳事到人不知而不愠處方是成徳文蔚呉子常問學而時習一章曰學只是要一箇習習到熟後自然喜說不能自已今人學所以便住了只是不曽習熟不見得好此一句却係切己用功處下句即因人矣又曰以善及人而信從者衆善不是自家獨有人皆有之我習而自得未能及人雖說未樂銖黄問學而首章是始中終之序否曰此章須看如何是學而時習之便不亦說乎如何是有朋自逺方來便不亦樂乎如何是人不知而不愠便不亦君子乎裏面有許多意思曲折如何只要將三字来包了若然則只消此三字更不用許多話向日君舉在三山請某人學中講說此謂第一節是心與理一第二節是己與人一第三節是人與天一以為竒論可謂作怪淳黄録詳别出問學而首章把作始中終之序看時如何曰道理也是恁地然也不消恁地說而今且去看學而時習之是如何有朋自逺方来是如何若把始中終三箇字括了時便是了更讀箇甚麽公有一病好去求竒如適間說文子只是他有這一長故諡之以文未見其他不好處今公却恁地去看這一箇字如何解包得許多意思大㮣江西人好拗人說臭它須要說香如告子不如孟子若只恁地說時便人與我一般我須道告子強似孟子王介甫嘗作一篇兵論在書院中硯下是時他已參政劉貢父見之值客直入書院見其文遂言庶官見大参不應直入其書院且出少頃㕔上相見問劉近作劉遂將適間之文意換了言語答他王大不樂退而碎其紙盖有兩箇道此則是我說不竒故如此因言福州嘗有姓林者解學而時習是心與理為一有朋自逺方来是已與人為一人不知而不愠是人與天為一君舉大竒之這有甚好處要是它們科舉之習未除故說得如此義剛問横渠解學而時習之云潜心於學忽忽為他慮引去者此氣也震㸔得為他慮所引必是意不誠心不定便如此横渠却以為氣如何曰人誰不要此心定到不定時也不奈何得如人擔一重擔盡力擔到前面忽擔不去縁何如此只為力量不足心之不定只是合下無工夫曰所以不曽下得工夫病痛在何處曰須是有所養曰所謂養者以直養否曰未到以直養處且持其志無暴其氣可也若我不放縱此氣自然心定震又云其初用力把捉此心時未免難不知用力久後自然熟否曰心是把捉人底人如何去把捉得他只是以義理養之久而自熟震諸說范說云習在已而有得於内朋友在人而有得於外恐此語未穏先生問如何卓云得雖在人而得之者在我又安有内外之别曰此說大段不是正與告子義外之說一般卓再見因呈所撰論語精義備說觀二章畢即曰大抵看聖賢語言不須作課程但平心定氣熟看將来自有得處今看老兄此書只是拶成文字元不求自得且如學而時習一章諸家說各有長處亦有短處如云鷹乃學習之謂與時復思繹浹洽於中則說矣此程說最是的當處如云以善及人而信從者衆故可樂此程說正得夫子意如云學在己知不知在人尹子之言當矣如㳺說宜其令聞廣譽施於身而人乃不知焉是有命不知命無以為君子此最是語病果如此說則是君子為人所不知退而安之於命付之無可奈何却如何見得真不愠處出来且聖人之意儘有髙逺處轉窮究轉有深義今作就此書則遂不復看精義矣自此隔下了見識止如此上面一截道理更不復見矣大抵看聖賢言語須徐徐俟之待其可疑而後疑之如庖丁解牛他只尋罅隙處㳺刃以徃而衆理自解芒刃亦不頓今一看文字便就上百端生事謂之起疑且解牛而用斧鑿鑿開成痕所以刃屢鈍如此如何見得聖賢本意且前輩講求非不熟初學須是自處於無能遵禀他前輩說話漸見實處今一看未見意趣便争手奪脚近前争說一分以某觀之今之作文者但口不敢說耳其意直是謂聖賢說有未至他要說出聖賢一頭地曽不知於自己本無所益鄉令老兄虚心平氣看聖人語言不意今如此支離大抵中年以後為學且須愛惜精神如某在官所亦不敢屑屑留情細務者正恐耗了精神忽有大事来則無以待之大雅問學而一章曰看精義須看諸先生說學字誰說得好時習字誰說得好說字誰說得好須恁地看林擴之問多把習字作行字說如何曰看古人說學字習字大意只是講習亦不必須是行榦問謝氏㳺氏說習字似分曉曰據正文意只是講習㳺謝說乃推廣習字畢竟也在裏面㳺氏說得雖好取正文便較迂曲些問伊川解不亦說作說在心范氏作說自外至似相反曰這在人自忖度榦曰既是思繹浹洽於中則說必是在内曰范氏這一句較疎說自是在心說便如暗歡喜相似樂便是箇發越通暢底氣象問范氏下面樂由中出與伊川發散在外之說却同曰然問范氏以不亦說乎作比於說猶未正夫說如何曰不必如此說問范氏㳺氏皆以人不知而不愠不亦君子乎作不知命無以為君子乎如何曰此也是小可事也未說到命處為學之意本不欲人知學在己知不知在人何愠之有問謝氏知我者希之說如何曰此老子語也亦不必如此說榦蕭定夫說胡致堂云學者何仁也曰學字本是無定底字若止云仁則漸入無形體去了所謂學者每事皆當學便實如上蔡所謂坐如尸坐時習也立如齊立時習也以此推之方是學某到此見學者都無南軒鄉来所說一字幾乎斷絶了盖縁學者都好髙說空說悟定夫又云南軒云致堂之說未的確曰便是南軒主胡五峯而抑致堂某以為不必如此致堂亦自有好處凡事好中有不好不好中又有好沙中有金玉中有石要自家辨得始得震致堂謂學所以求仁也仁是無頭面底若將實字来解求仁則可若以求仁解學字又没理㑹了直卿云若如此說一部論語只將求仁二字說便了也先生又曰南軒只說五峯說底是致堂說底皆不是安可如此致堂多有說得好處或有文定五峯說不到處盖卿有子曰其為人也孝弟章問有子言孝悌處先生謂有子言語似有些重複處然是其誠實踐履之言細咀嚼之益有味振因說陸先生每對人說有子非後學急務又云以其說不合有節目多不直截某因謂是比聖人言語較緊且如孝弟之人豈尚解犯上又更作亂曰人之品不同亦自有孝弟之人解犯上者自古亦有作亂者聖賢言語寛平不消如此急迫㸔振陸伯振云象山以有子之說為未然仁乃孝弟之本也有子說君子務本本立而道生起頭說得重却得孝弟也者其為仁之本與却說得輕了先生曰上兩句汎說下兩句却說行仁當自孝弟始所以程子云謂孝弟為行仁之本則可謂是仁之本則不可所謂親親而仁民也聖賢言仁不同此是說為仁若巧言令色鮮矣仁却是近裏說因言有子說數段話都說得反覆曲折惟盍徹一段說得直截耳想是一箇重厚和易底人當時弟子皆服之所以夫子没後欲以所事夫子者事之也人傑其為人也孝弟此說資質好底人其心和順柔遜必不好犯上仁便從此生鮮是少對下文未之有也上下文勢如此若巧言令色鮮矣仁鮮字則是絶無君子務本本立而道生此兩句泛說凡事是如此與上下不相干下文却言孝弟也者方是應上文也故集注著箇大凡也明作或說世間孝弟底人發於他事無不和順曰固是人若不孝弟便是這道理中間斷了下面更生不去承接不来所以說孝弟仁之本李敬子曰世間又有一種孝慈人却無剛斷曰人有幾多般此属氣禀如唐眀皇為人於父子夫婦君臣分上煞無状却終始愛兄弟不衰只緣寕王讓他位所以如此這一節感動終始友愛不衰或謂明皇因寕王而後能如此這也是他裏面有這道理方始感發得出来若其中元無此理如何㑹感發得僴問干犯在上之人如疾行先長者之類曰然干犯便是那小底亂到得作亂則為争鬬悖逆之事矣問人子之諫父母或貽父母之怒此不為干犯否曰此是孝裏面事安得為犯然諫又自下氣怡色柔聲以諫亦非凌犯也又問諫争扵君如事君有犯無隱如勿欺也而犯之此犯字如何曰此犯字又說得輕如君有不是須直與他說此之謂犯上人臣之諫君亦有箇宛轉底道理若暴揚其惡言語不遜呌喚狂悖此便是干犯矣故曰人臣之事君當熟諫僴問有犯上者己自不好又何至於作亂可見其益逺孝弟之所為曰只言其無此事論来犯上乃是少有拂意便是犯不必至陵犯處乃為犯也若作亂謂之未之有也絶無可知㝢犯上者鮮矣是對那未之有而言故有淺深若鮮矣仁則是專言這非只是少直是無了但聖人言得慢耳義剛犯上者鮮矣之鮮與鮮矣仁之鮮不同鮮矣仁是絶無了好犯上者鮮則猶有在下面未之有也方是都無僴問君子務本注云凡事專用力於根本如此則孝弟為仁之本乃是舉其一端而言曰否本是說孝弟上面務本是且引来上面且泛言下面是收入来說曰君臣父子夫婦兄弟皆是本否曰孝弟較親切事親孝故忠可移於君事兄弟故順可移於長便是本㝢問合當說本立而末生有子何故却說本立而道生曰本立則道隨事而生如事親孝故忠可移於君事兄弟故順可移於長節問本立道生曰此甚分明曰如人能孝能弟漸漸和於一家以至親戚以至故舊漸漸通透賀孫孝弟固具於仁以其先發故是行仁之本可學以下孝弟仁之本子上說孝弟仁之本是良心曰不須如此說只平穏就事上觀有子言其為人孝弟則必須柔恭柔恭則必無犯上作亂之事是以君子專致力於其本然不成如此便止故曰本立而道生孝弟也者其為仁之本歟盖能孝弟了便須從此推去故能愛人利物也昔人有問孝弟為仁之本不知義禮智之本先生答曰只孝弟是行仁之本義禮智之本皆在此使其事親從兄得宜者行義之本也事親從兄有節文者行禮之本也知事親從兄之所以然者智之本也不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮舍孝弟則無以本之矣璘可學録别出問孝弟是良心之發見因其良心之發見為仁甚易曰此說固好但無執著觀此文意只是云其為人孝弟則和遜温柔必能齊家則推之可以仁民務者朝夕為此且把這一箇作一把頭處可學或問孝弟為仁之本曰這箇仁是愛底意思行愛自孝弟始又曰親親仁民愛物三者是為仁之事親親是第一件事故孝弟也者其為仁之本與又曰知得事親不可不孝事長不可不弟是為義之本知事親事長之節又為禮之本知事親事長為智之本張仁叟問義亦可為心之徳曰義不可為心之徳仁是專徳便是難說某也只說到這裏又曰行仁之事又曰此仁字是偏言底不是專言底又曰此仁是仁之一事節胡兄說嘗見世間孝弟底人少間發出来於他事無不和順慈愛處自有次第道理曰固是人若不孝弟便是這箇道理中間跌斷了下面生不去承接不来了所以說孝弟也者其為仁之本歟問孝弟為仁之本是事父母兄既盡道乃立得箇根本則推而仁民愛物方行得有條理曰固是但孝弟是合當底事不是要仁民愛物方從孝弟做去可學云如草木之有本根方始枝葉繁茂曰固是但有本根則枝葉自然繁茂不是要得枝葉繁茂方始去培植本根南升陳敬之說孝弟為仁之本一章三四日不分明先生只令子細看全未與說數日後方作一員圖示之中寫仁字外一重寫孝弟字又外一重寫仁民字又外一重寫愛物字謂行此仁道先自孝弟始親親長長而後次第推去非若兼愛之無分别也過問孝弟為仁之本曰此是推行仁道如發政施仁之仁固非克己復禮為仁之仁故伊川謂之行仁學者之為仁只一念相應便是仁然也只是這一箇道理為仁之本就事上說克己復禮就心上說又論本字云此便只是大學其本亂而未治者否矣意思理一而分殊雖貴乎一視同仁然不自親始也不得伯羽問孝弟仁之本今人亦有孝弟底而不盡仁何故莫是志不立曰亦其端本不究所謂由之而不知習矣而不察彼不知孝弟便是仁却把孝弟作一般善人且如此過却昏了又問伊川言仁是本孝弟是用所謂用莫是孝弟之心油然而生發見於外曰仁是理孝弟是事有是仁後有是孝弟可學直卿說孝弟為仁之本云孔子以求仁為先學者湏是先理㑹得一箇心字上古聖賢自堯舜以来便是說人心道心集注所謂心之徳愛之理須理㑹得是箇甚底物學問方始有安頓處先生曰仁義禮智自天之生人便有此四件如火爐便有四角天便有四時地便有四方日便有晝夜昏旦天下道理千枝萬葉千條萬緒都是這四者做出来四者之用便自各有許多般様且如仁主於愛便有愛親愛故舊愛朋友底許多般道理義主於敬如貴貴則自敬君而下以至與上大夫下大夫言許多般如尊賢便有師之者友之者許多般禮智亦然但是愛親愛兄是行仁之本仁便是本了上面更無本如水之流必過第一池然後過第二池第三池未有不先過第一池而能及第二第三者仁便是水之原而孝弟便是第一池不惟仁如此而為義禮智亦必以此為本也夔孫仁如水之源孝弟是水流底第一坎仁民是第二坎愛物則三坎也銖問孝弟為仁之本便是物有本末事有終始知所先後之意曰然過問孝弟為仁之本此是專言之仁偏言之仁曰此方是偏言之仁然二者亦都相闗說著偏言底専言底便在裏面說專言底則偏言底便在裏面雖是相闗又要看得界限分明如此章所言只是從愛上說如云惻隠之心仁之端正是此類至於說克己復禮為仁仁者其言也訒居處恭執事敬與人忠仁人心也此是說專言之仁又自不同然雖說專言之仁所謂偏言之仁亦在裏面孟子曰仁之實事親是也此便是都相闗說又要人自看得界限分明僴問孝弟為仁之本曰論仁則仁是孝弟之本行仁則當自孝弟始又云孟子曰仁之實事親是也義之實從兄是也智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者是也以此觀之豈特孝弟為仁之本四端皆本於孝弟而後見也然四端又在學者子細省察祖道問有子以孝弟為仁之本是孝弟皆由於仁矣孟子却說仁之實事親是也義之實從兄是也却以弟属義何也曰孝於父母更無商量僴仁者愛之理只是愛之道理猶言生之性愛則是理之見於用者也盖仁性也性只是理而已愛是情情則發於用性者指其未發故曰仁者愛之理情即已發故曰愛者仁之用端䝉集註愛之理仁者愛之理理是根愛是苖仁之愛如糖之甜醋之酸愛是那滋味方子仁是根愛是苖不可便喚苖做根然而這箇苖却定是從那根上来佐仁是未發愛是已發節仁父問仁者愛之理曰這一句只將心性情看便分眀一身之中渾然自有箇主宰者心也有仁義禮智則是性發為惻隠羞惡辭遜是非則是情惻隠愛也仁之端也仁是體愛是用又曰愛之理愛自仁出也然亦不可離了愛去說仁問韓愈博愛之謂仁曰是指情為性了問周子說愛曰仁與博愛之說如何曰愛曰仁猶曰惻隠之心仁之端也是就愛處指出仁若博愛之謂仁之謂便是把博愛做仁了終不同問張無垢說仁者覺也曰覺是智以覺為仁則是以智為仁覺也是仁裏面物事只是便把做仁不得賀孫說仁者愛之理曰仁自是箇和柔底物事譬如物之初生自較和柔及至夏間長茂方始稍堅硬秋則收結成實冬則斂藏然四時生氣無不該貫如程子說生意處非是說以生意為仁只是說生物皆能發動死物則都不能譬如榖種蒸殺則不能生也又曰以榖種譬之一粒榖春則發生夏則成苖秋則結實冬則收藏生意依舊包在裏面每箇榖子裏有一箇生意藏在裏面種而後生也仁義禮智亦然又曰仁與禮自是有箇發生底意思義與智自是有箇斂藏底意思雉愛之理能包四徳如孟子言四端首言不忍人之心便是不忍人之心能包四端也伯羽仁是愛之理愛是仁之用未發時只喚做仁仁却無形影既發後方喚做愛愛却有形影未發而言仁可以包義禮智既發而言惻隠可以包恭敬辭遜是非四端者端如萌芽相似惻隠方是從仁裏面發出来底端程子曰因其惻隠知其有仁因其外面發出来底便知是性在裏面植問先生前日以為仁之本之仁是偏言底是愛之理以節觀之似是仁之事非愛之理曰親親仁民愛物是做這愛之理又問節常以專言則包四者推之於體上推不去於用上則推得去如無春則無夏秋冬至於體則有時合下齊有却如何包得四者曰便是難說又曰用是恁地時體亦是恁地問直卿已前說仁義禮智皆是仁仁是仁中之切要底此說如何曰全謂之仁亦可只是偏言底是仁之本位節問仁者心之徳義禮智亦可為心之徳否曰皆是心之徳只是仁專此心之徳淳心之徳知覺便是心之徳端蒙仁只是愛底道理此所以為心之徳泳愛之理心之徳問心之徳愛之理曰愛是箇動物事理是箇静物事賀孫愛是惻隠惻隠是情其理則謂之仁心之徳徳又只是愛謂之心之徳却是愛之本柄賀孫心之徳是統言愛之理是就仁義禮智上分說如義便是宜之理禮便是别之理智便是知之理但理㑹得愛之理便理㑹得心之徳又曰愛雖是情愛之理是仁也仁者愛之理愛者仁之事仁者愛之體愛者仁之用道夫心之徳是兼四端言之愛之理只是就仁體叚說其發為愛其理則仁也仁兼四端者都是這些生意流行賀孫其為仁也孝弟章心之徳愛之理戴云仁者仁此者也義者宜此者也禮者履此者也智者知此者也只是以孝弟為主仁義禮智只是行此孝弟也先生曰某尋常與朋友說仁為孝弟之本義禮智亦然義只是知事親如此孝事長如此弟禮亦是有事親事長之禮知只是知得孝弟之道如此然仁為心之徳則全得三者而有之又云此言心之徳如程先生專言則包四者是也愛之理如所謂偏言則一事者也又云仁之所以包四者只是感動處便見有感而動時皆自仁中發出来仁如水之流及流而成大池小池方池圓池池雖不同皆由水而為之也卓愛之理是偏言則一事心之徳是專言則包四者故合而言之則四者皆心之徳而仁為之主分而言之則仁是愛之理義是宜之理禮是恭敬辭遜之理知是分别是非之理也時舉以心之徳而專言之則未發是體已發是用以愛之理而偏言之則仁便是體惻隠是用端蒙問仁者心之徳愛之理聖賢所言又或不同如何曰聖賢言仁有就心之徳說者如巧言令色鮮矣仁之類有就愛之理說者如孝弟為仁之本之類過楊問仁者愛之理看孔門答問仁多矣如克己等類愛字恐未足以盡之曰必著許多所以全得那愛所以能愛如克己復禮如居處恭執事敬這處豈便是仁所以喚醒那仁這裡須醒覺若私欲昏蔽這裏便死了沒這仁了又問心之徳義禮智皆在否曰皆是但仁專一心之徳所統又大安卿問心之徳以專言愛之理以偏言曰固是愛之理即是心之徳不是心之徳了又别有箇愛之理偏言專言亦不是兩箇仁小處也只在大裏面淳録云仁只是一箇仁不是有一箇大底仁其中又有一箇小底仁嘗粗譬之仁恰似今福州太守兼帶福建路安撫使以安撫使言之則統一路州軍以太守言之泉州太守漳州太守都是一般太守但福州較大耳然太守即是這安撫使隨地施用而見㝢或問仁者心之徳愛之理曰愛之理便是心之徳公且就氣上㸔如春夏秋冬須看他四時界限又却看春如何包得三時四時之氣温涼寒熱涼與寒既不能生物夏氣又熱亦非生物之時惟春氣温厚乃見天地生物之心到夏是生氣之長秋是生氣之斂冬是生氣之藏若春無生物之意後面三時都無了此仁所以包得義禮智也明道所以言義禮智皆仁也今且粗譬喻福州知州便是福建路安撫使更無一箇小底做知州大底做安撫也今學者須是先自講明得一箇仁若理㑹得後在心術上看也是此理在事物上看也是此理若不先見得此仁則心術上言仁與事物上言仁判然不同了又言學者克己復禮上做工夫到私欲盡後便粹然是天地生物之心須常要有那温厚底意思方好時舉仁者愛之理是將仁来分作四段看仁便是愛之理至於愛人愛物皆是此理義便是宜之理禮便是恭敬之理智便是分别是非之理理不可見因其愛與宜恭敬與是非而知有仁義禮智之理在其中乃所謂心之徳乃是仁能包四者便是流行處所謂保合太和是也仁是箇生理若是不仁便死了人未嘗不仁只是為私欲所昬才克己復禮仁依舊在直卿曰私欲不是别有箇私欲只心之偏處便是汪正甫問三仕三已不為仁管仲又却稱仁是如何曰三仕三已是獨自底管仲出来畢竟是做得仁之功且如一箇人坐亡立化有一箇人仗節死義畢竟還仗節死義底是坐亡立化濟得甚事㬊亞夫問殺身成仁求生害仁曰求生畢竟是心不安理當死即得殺身身雖死而理即在亞夫云要將言仁處類聚看曰若如此便是趕縛得急却不好只依次序看若理㑹得一段了相似忘却忽又理㑹一段覺見得意思轉好南升或問仁者心之徳曰義禮智皆心之所有仁則渾然分而言之仁主乎愛合而言之包是三者或問仁有生意如何曰只此生意心是活物必有此心乃能知辭遜必有此心乃能知羞惡必有此心乃能知是非此心不生又烏能辭遜羞惡是非且如春之生物也至於夏之長則是生者長秋之遂亦是生者遂冬之成亦是生者成也百榖之熟方及七八分若斬斷其根則生者䘮矣其榖亦只得七八分若生者不䘮須及十分收而藏之生者似息矣只明年種之又復有生諸子問仁不同而今曰愛之理云者克己復禮亦只要存得此愛非以克己復禮是仁友其士之仁者事其大夫之賢者亦只是要見得此愛其餘皆然力行問愛之理心之徳曰理便是性緣裏面有這愛之理所以發出来無不愛程子曰心如榖種其生之性乃仁也生之性便是愛之理也嘗譬如一箇物有四面一面青一面紅一面白一面黑青属東方則仁也紅属南方禮也白属西方義也黑属北方智也然這箇物生時却從東方左邊生起故寅卯辰属東方便是這仁萬物得這生氣方生及至已午未南方萬物盛大便是這生氣已充滿及申酉戌西方則物又只有許多限量生滿了更生不去故生氣到此自是收斂若更生去則無收殺了又至亥子丑北方生氣都收藏然雖是收斂早是又在裏面發動了故聖人說復見天地之心可見生氣之不息也所以仁貫四端只如此看便見僴問渾然無私便是愛之理行仁而有得於己便是心之徳否曰如此解釋文義亦可但恐本領上未透徹爾少頃問濓溪中正仁義之說先生遽曰義理才覺有疑便劄定脚歩且與究竟到底謂如說仁便要見得仁是甚物如義如智如禮亦然識得道理一一分曉了然如在目中則自然浹洽融㑹形之言語自别若只仿像測度才說不通便走作向别處去是終不能貫通矣且如仁字有多少好商量處且子細玩索謨退而講曰一性禀於天而萬善皆具仁義禮智所以分統萬善而合為一性者也方寂然不動此理完然是為性之本體及因事感發而見於中節之時則一事所形一理隨著一理之當一善之所由得仁固性也而見於事親從兄之際莫非仁之發也有子謂孝弟行仁之本說者於是以愛言仁而愛不足以盡之以心喻仁而心實宰之必曰仁者愛之理然後仁之體眀曰仁者心之徳然後仁之用顯學者識是愛之理而後可以全此心之徳如何曰大意固如此然說得未明只看文字意脈不接續處便是見得未親切曰莫是不合分體用言之否曰然只是一箇心便自具了仁之體用喜怒哀樂未發處是體發於惻隠處便却是情因舉天地萬物同體之意極問其理曰須是近裏著身推究未干天地萬物事也須知所謂心之徳者即程先生榖種之說所謂愛之理者則正謂仁是未發之愛愛是已發之仁爾只以此意推之不須外邊添入道理若於此處認得仁字即不妨與天地萬物同體若不㑹得便將天地萬物同體為仁却轉無交渉矣孔門之教說許多仁却未曽正定說出葢此理直是難言若立下一箇定說便該括不盡且只於自家身分上體究久之自然通達程先生曰四徳之元猶五常之仁偏言則一事專言則包四者須是統看仁如何却包得數者又却分看義禮智信如何亦謂之仁大抵於仁上見得盡須知發於剛果處亦是仁發於辭遜是非亦是仁且欵曲研究識盡全體正猶觀山所謂横看成嶺直看成峯若自家見他不盡初謂只是一嶺及少時又見一峯出来便是未曽盡見全山到底無定據也此是學者緊切用功處宜加意焉此一條中間初未看得分眀後復以書請問故發明緊切處兼載書中之語謨問愛之理實具于心心之徳發而為愛否曰解釋文義則可實下功夫當如何曰據其已發之愛則知其為心之徳指其未發之仁則知其爲愛之理曰某記少時與人講論此等道理見得未真又不敢斷定觸處問人自為疑惑皆是臆度所致至今思之可笑須是就自巳實做工夫處分眀見得這箇道理意味自别如克己復禮則如何為仁居處恭執事敬與出門如見大賓之類亦然克己復禮本非仁却須從克己復禮中尋究仁在何處親切貼身體驗出来不須向外處求謨曰平居持養只克去己私便是本心之徳流行發見無非愛而已曰此語近之正如䟽導溝渠初為物所壅蔽才䟽導得通則水自流行克己復禮便是䟽導意思流行處便是仁謨先生嘗曰仁者心之徳愛之理論孟中有專就心之徳上說者如克己復禮承祭見賔與答樊遲居處恭仁人心也之類有就愛之理上說者如孝弟為仁之本與愛人惻隠之心之類過續與朋友講此因曰就人心之徳說者有是心之徳陳㢘夫云如此轉語方得先生嘗說如有所譽者其有所試矣蔡季通曰如雍也可使南面是也先生極然之楊至之嘗疑先生君子而時中解處恐不必說而又字先生曰只是未理㑹此意過曰正如程子易傳云正不必中中重於正之意曰固是既君子又須時中彼既小人矣又無忌憚先生語輔漢卿曰所看文字於理㑹得底更去看又好過孝弟為仁之本注中程子所說三段須要看得分曉仁就性上說孝弟就事上說僴集注程子說孝弟如何謂之順徳且如義之羞惡羞惡則有違逆處惟孝弟則皆是順義剛伊川說為仁以孝弟為本論性則以仁為孝弟之本此言最切須子細看方知得是解經宻察處非若今人自看得不子細只見於我意不合便胡罵古人也銖仁是性孝弟是用用便是情情是發出来底論性則以仁為孝弟之本論行仁則孝弟為仁之本如親親仁民愛物皆是行仁底事但須先從孝弟做起舍此便不是本所載程子曰兩段分曉可觀語録所載他說却未須看如語録所載盡得孝弟便是仁此一段㝡難曉不知何故如此説明作為仁以孝弟為本即所謂親親而仁民仁民而愛物論性則以仁為孝弟之本孩提之童無不知愛其親及其長也無不知敬其兄是皆發於心徳之自然故論性以仁為孝弟之本為仁以孝弟為本這箇仁字是指其周遍及物者言之以仁為孝弟之本這箇仁字是指其本體發動處言之否曰是道理都自仁裏發出首先是發出為愛愛莫切於愛親其次便到弟其兄又其次便到事君以及於他皆從這裏出如水相似愛是箇源頭漸漸流出賀孫問孝根原是從仁来仁者愛也愛莫大於愛親於是乎有孝之名既曰孝則又當知其所以孝子之身得之於父母父母全而生之子全而歸之故孝不特是承順養志為孝又當保其所受之身體全其所受之徳性無忝乎父母所生始得所以為人子止於孝曰凡論道理須是論到極處以手指心曰本只是一箇仁愛念動出来便是孝程子謂為仁以孝弟為本論性則以仁為孝弟之本仁是性孝弟是用性中只有箇仁義禮智曷嘗有孝弟来譬如一粒粟生出為苖仁是粟孝弟是苖便是仁為孝弟之本又如木有根有榦有枝葉親親是根仁民是榦愛物是枝葉便是行仁以孝弟為本淳由孝弟可以至仁一段是劉安節記最全備問把孝弟喚做仁之本却是把枝葉做本根曰然賀孫由孝弟可以至仁則是孝弟在仁之外也孝弟是仁之一事也如仁之發用三段孝弟是第一段也仁是箇全體孝弟却是用凡愛處皆属仁愛之發必先自親親始親親而仁民仁民而愛物是行仁之事也問孝弟為仁之本或人之問由孝弟可以至仁是仁在孝弟之中程子謂行仁自孝弟始是仁在孝弟之外曰如何看此不子細程先生所答煞分曉據或人之問仁不在孝弟之中乃在孝弟之外如此建陽去方行到信州程子正說在孝弟之中只一箇物事如公所說程子之意孝弟與仁却是兩箇物事豈有此理直卿曰正是倒看却曰孝弟不是仁更把甚麽做仁前日戯與趙子欽說須畫一箇圏子就中更畫大小次第作圈中間圈子寫一性字自第二圈以下分界作四去各寫仁義禮智四字仁之下寫惻隠惻隠下寫事親事親下寫仁民仁民下寫愛物義下寫羞惡羞惡下寫從兄從兄下寫尊賢尊賢下寫貴貴於禮下寫辭遜辭遜下寫節文智下寫是非是非下寫辨别直卿又謂但將仁作仁愛看便可見程子說仁主於愛此語最切曰要從裏面說出来仁是性發出来是情便是孝弟孝弟仁之用以至仁民愛物只是這箇仁行仁自孝弟始便是從裏面行將去這只是一箇物事今人看道理多要說做裏面去不要說從外面来不可曉深處還他深淺處還他淺㝢行仁自孝弟始葢仁自事親從兄以至親親仁民仁民愛物無非仁然初自事親從兄行起非是便能以仁遍天下只見孺子入井這裏便有惻隠欲救之心只恁地做將去故曰安土敦乎仁故能愛只是就這裏當愛者便愛盖卿問節如何仁是性孝弟是用曰所以當愛底是仁曰不是曰仁是孝弟之母子有仁方發得孝弟出来無仁則何處得孝弟先生應次日問曰先生以節言所以當愛底不是未達曰當字不是又曰未說著愛在他㑹愛如目能視雖瞑目不動他却能視仁非愛他却能愛又曰愛非仁愛之理是仁心非仁心之徳是仁節舉程子說云性中只有箇仁義禮智何嘗有孝弟来說得甚險自未知者觀之其說亦異矣然百行各有所属孝弟是属於仁者也因問仁包四者之義曰仁是箇生底意思如四時之有春彼其長於夏遂於秋成於冬雖各具氣候然春生之氣皆通貫於其中仁便有箇動而善之意如動而有禮凡其辭遜皆禮也然動而禮之善者則仁也曰義曰智莫不皆然又如慈愛恭敬果毅知覺之属則又四者之小界分也譬如普天之下莫非王土固也然王畿之内是王者所居大而諸路王畿之所轄也小而州縣市鎮又諸路之所轄也若王者而居州鎮亦是王土然非其所居矣又云智亦可以包四者知之在先故也人傑孝弟便是仁仁是理之在心孝弟是心之見於事性中只有箇仁義禮智曷嘗有孝弟見於愛親便喚做孝見於事兄便喚做弟如親親而仁民仁民而愛物都是仁性中何嘗有許多般只有箇仁自親親至於愛物乃是行仁之事非是行仁之本也故仁是孝弟之本推之則義為羞惡之本禮為恭敬之本智為是非之本自古聖賢相傳只是理㑹一箇心心只是一箇性性只是有箇仁義禮智都無許多般様見於事自有許多般様仁是理之在心者孝弟是此心之發見者孝弟即仁之属但方其未發則此心所存只是有愛之理而己未有所謂孝弟各件故程子曰何曽有孝弟来必大問眀道曰孝弟有不中理或至犯上既曰孝弟如何又有不中理曰且如父有争子一不中理則不能承意遂至於犯上問眀道曰孝弟本其所以生乃為仁之本如何曰此是不忘其所由生底意故下文便接孰不為事事親事之本来說其他愛字皆推向外去此箇愛字便推向裏来玩味此語儘好問或人問伊川曰孝弟為仁之本此是由孝弟可以至仁否伊川曰非也不知如何曰仁不可言至仁者義理之言不是地位之言地位則可以言至又不是孝弟在這裏仁在那裏便由孝弟以至仁無此理如所謂何事於仁必也聖乎聖却是地位之言程先生便只說道盡得仁斯盡得孝弟盡得孝弟便是仁又曰孝弟仁之一事問曰仁是義理之言盖以仁是自家元本有底否曰固是但行之亦有次序所以莫先於孝弟問伊川曰仁是性也仁便是性否曰仁性也仁人心也皆如所謂乾卦相似卦自有乾坤之類性與心便有仁義禮智却不是把性與心便作仁看性其理情其用心者兼性情而言兼性情而言者包括乎性情也孝弟者性之用也惻隠羞惡辭讓是非皆情也問伊川何以謂仁是性孟子何以謂仁人心曰要就人身上說得親切莫如就心字說心者兼體用而言程子曰仁是性惻隠是情若孟子便只說心程子是分别體用而言孟子是兼體用而言問伊川曰仁主乎愛愛便是仁否曰仁主乎愛者仁發出来便做那慈愛底事某嘗說仁主乎愛仁須用愛字說被諸友四面攻道不是吕伯恭亦云說得米太易了愛與惻隠本是仁底事仁本不難見緣諸儒說得米淺近了故二先生便說道仁不是如此說後人又却說得来髙逺没理㑹了又曰天之生物便有春夏秋冬隂陽剛柔元亨利貞以氣言則春夏秋冬以徳言則元亨利貞在人則為仁義禮智是箇坯樸裏便有這底天下未嘗有性外之物仁則為慈愛之類義則為剛斷之類禮則為謙遜智則為明辨信便是真箇有仁義禮智不是假謂之信問如何不道鮮矣義禮智只道鮮矣仁曰程先生易傳說四徳之元猶五常之仁專言則包四者偏言之則主一事如仁者必有勇便義也在裏面知覺謂之仁便智也在裏面如孝弟為仁之本便只是主一事主愛而言如巧言令色鮮矣仁汎愛衆而親仁皆偏言也如克己復禮為仁却是專言纔有私欲則義禮智都是私愛也是私愛譬如一路數州必有一帥自一路而言便是一帥自一州而言只是一州之事然而帥府之属縣便較易治若要治属郡之縣却隔一手了故仁只主愛而言又曰仁義禮智共把来看便見得仁譬如四人分作四處住㸔了三箇則那一箇定是仁不看那三箇只去求一箇如何討得著又曰仁主乎愛如燈有光若把光做燈又不得謝氏曰設若不知仁則只知克己復禮而已豈有知克己復禮而不知仁者謝氏這話都不甚穏問知覺是仁否曰仁然後有知覺問知覺可以求仁否曰不可問謝氏曰試察吾事親從兄之時此心如之何知此心則知仁何也曰便是這些話心煩人二先生却不如此說問謝氏曰人心之不偽者莫如事親從兄如何曰人心本無偽如何只道事親從兄是不偽曰恐只以孝弟是人之誠心否曰也不然人心那箇是不誠底皆是誠如四端不言信盖四端皆是誠實底問四肢痿痺為不仁莫把四肢喻萬物否曰不特喻萬物他有數處說有喻萬物底有只是頃刻不相應便是不仁如病風人一肢不仁兩肢不仁為其不省悟也似此等語被上蔡說便似忒過了他專把省察做事省察固是好如三省吾身只是自省㸔這事合恁地不合恁地却不似上蔡諸公說道去那上面察探要見這道理道理自在那裡何用如此等候察探他且如上蔡說仁曰試察吾事親從兄時此心如之何便都似剰了仁者便有所知覺不仁者便無所知覺恁地却說得若曰心有知覺之謂仁却不得仁字最難言故孔子罕言仁仁自在那裡夫子却不曽說只是教人非禮勿視聽言動與居處恭執事敬與人忠便是說得仁前面話仁者其言也訒仁者先難而後獲仁者樂山之類便是說得仁後面話只是這中間便著理㑹仁之體仁義禮智只把元亨利貞春夏秋冬看便見知覺自是智之事在四徳是貞字而知所以近乎仁者便是四端循環處若無這智便起這仁不得問先生作克己齋銘有曰求之於機警危迫之際想正為此設曰後来也改却不欲說到那裏然而他說仁說知覺分眀是說禪又曰如湖南五峯多說人要識心心自是箇識底却又把甚底去識此心且如人眼自是見物却如何見得眼故學者只要去其物欲之蔽此心便眀如人用藥以治眼然後眼眀他而今便把孟子愛牛入井做主說却不知孟子他此說盖為有那一般極愚昧底人便著恁地向他說道是心本如此不曽把做主說諸公於此便要等候探知這心却恐不如此榦集義或疑上蔡孝弟非仁也一句先生曰孝弟滿體是仁内自一念之微以至萬物各得其所皆仁也孝弟是其和合做底事若說孝弟非仁不知何從得来上蔡之意盖謂别有一物是仁如此則是性外有物也或曰知此心則知仁矣此語好曰聖門只說為仁不說知仁或録云上蔡說仁只從知覺上說不就為仁處說聖人分明說克己復禮為仁不曽說知覺底意上蔡一變云云盖卿録云孔門只說為仁上蔡却說知仁只要見得此心便以為仁至上蔡一轉云云上蔡一變而為張子韶上蔡所不敢衝突者張子韶出来盡衝突了盖卿録云子韶一轉而為陸子静近年陸子静又衝突出張子韶之上盖卿録云子韶所不敢衝突者子静盡衝突方子問孝弟是行仁之本則上面生字恐著不得否曰亦是仁民愛物都從親親上生去孝弟也是仁仁民愛物也是仁只孝弟是初頭事從這裏做起問為仁只是推行仁愛以及物不是去做那仁否曰只是推行仁愛以及物不是就這上求仁如謝氏說就良心生来便是求仁程子說初看未曉似悶人看熟了真攧撲不破淳問孝弟為仁之本曰上蔡謂事親從兄時可以知得仁是大不然盖為仁便是要做這一件事從孝弟上做將去曰就事親從兄上知得仁却是只借孝弟来要知箇仁而已不是要為仁也上蔡之病患在以覺為仁但以覺為仁只將針来刺股上才覺得痛亦可謂之仁矣此大不然也時舉巧言令色章或問巧言令色鮮矣仁曰只心在外便是不仁也祖道録云他自使去了此心在外如何得仁不是别更有仁雉巧言令色鮮矣仁只争一箇為己為人且如動容貌正顔色是合當如此何害於事若做這模様務以恱人則不可或以巧言為言不誠曰據某所見巧言即所謂花言巧語如今世舉子弄筆端做文字者便是看做這般模様時其心還在腔子裏否文蔚問巧言令色鮮矣仁記言辭欲巧詩言令儀令色者何也曰看文字不當如此記言辭欲巧非是要人機巧盖欲其辭之委曲耳如論語言夫子為衛君乎答曰吾將問之入曰伯夷叔齊何人也之類是也詩人所謂令色者仲山甫之正道自然如此非是做作恁地何不看取上文仲山甫之徳令儀令色此徳之形於外者如此與鮮矣仁者不干事去偽問巧言令色是詐偽否曰諸家之說都無詐偽意思但馳心於外便是不仁若至誠巧令尤逺於仁矣人傑巧言令色鮮矣仁聖人說得直截專言鮮則絶無可知但辭不廹切有含容之意若云鮮矣仁者猶有些在則失聖人之意矣人傑問鮮矣仁集注以為絶無仁恐未至絶無處否曰人多解作尚有些箇仁便粘滯咬不斷了子細看巧言令色心皆逐物於外大體是無仁了縱有些箇仁亦成甚麽所以程子以巧言令色為非仁絶無二字便是述程子之意淳問鮮矣仁先生云絶無何也曰只是心在時便是仁若巧言令色之人一向逐外則心便不在安得謂之仁顔子三月不違仁也只是心在伊川云知巧言令色之非仁則知仁矣謂之非仁則絶無可知南升問鮮矣仁程子却說非仁何也曰鮮字若對上面說如不好犯上而好作亂者鮮這便是少若只單說便是無了巧言令色又去那裏討仁道夫人有此心以其有是徳也此心不在便不是仁巧言令色此雖未是大段姦惡底人然心已務外只求人恱便到惡處亦不難程子曰知巧言令色之非仁則知仁矣此說極盡若能反觀此心才收拾得不走作務外便自可與前章程子曰兩條若理㑹得則論語一書凡論仁處皆可通矣論語首章載時習便列兩章說仁次之其意深矣明作問鮮矣仁章諸先生說都似迂曲不知何說為正曰便是這一章都生受惟楊氏後說近之然不似程說好更子細玩味問㳺氏說誠字如何曰他却說成巧言令色鮮矣誠不是鮮矣仁說仁須到那仁處便安排一箇仁字安頓放教却好只消一字亦得不然則三四字亦得又須把前後說来相參子細玩味看道理貫通與不貫通便見得如洙泗言仁一書却只緫来恁地看却不如逐段看了来相參自然見得先生因問曰曽理㑹得伊川曰論性則仁為孝弟之本否榦曰有這性便有這仁仁發出来方做孝弟曰但把這底看巧言令色鮮矣仁便見得且如巧言令色人盡是私欲許多有底便都不見了私慾之害豈特是仁和義禮智都不見了問何以不曰鮮矣義禮智而只曰鮮矣仁曰程先生曰五常之仁如四徳之元偏言之則主一事專言之則包四者先生又曰仁與不仁只就向外向裏看便見得且如這事合恁地方中理必可以求仁亦不至於害仁如只要人知得恁地便是向外問謝氏說如何曰謝氏此一段如亂􅁝須逐一剔撥得言語異同巧言字如何不同又須見得有箇搃㑹處且如辭欲巧便與遜以出之一般逞顔色與仲山甫之令儀令色都是自然合如此不是旋做底惡訐以為直也是箇巧言令色底意思巧言令色便要人道好他便要人道直色厲而内荏乂是令色之尤者也榦朱子語類卷二十
