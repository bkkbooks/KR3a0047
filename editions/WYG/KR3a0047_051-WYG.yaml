body:
  text: 朱子語類卷五十一孟子一題辭陳文言孟子趙岐所注者却做得好曰做得絮氣悶人東漢文章皆如此卓解書難得分曉趙岐孟子拙而不眀王弼周易巧而不眀梁惠王上孟子見梁恵王章希真説孟子對梁恵王以仁義章曰凡事不可先有箇利心才説着利必害於義聖人做處只向義邊做然義未甞不利但不可先説道利不可先有求利之心盖縁本来道理只有一箇仁義更無别物事義是事事要合宜賀孫説義利處曰聖賢之言所以要辨别教分眀但只要向義邊一直去更不通思量第二着才説義乃所以為利固是義有大利存焉若行義時便説道有利則此心只邪向那邊去固是未有仁而遺其親未有義而後其君纔於為仁時便説要不遺其親為義時便説要不後其君則是先有心於為利聖賢要人止向一路做去不要做這一邊又思量那一邊仲舒所以分眀説不謀其利不計其功賀孫孟子大綱都剖析得分眀如説義利等處如答宋牼處見得事只有箇是非不通去説利害㸔来惟是孟子説得斬釘截鐡賀孫正淳問仁者心之徳愛之理義者心之制事之宜徳與理俱以體言制與冝俱以用言否曰心之徳是渾淪説愛之理方説到親切處心之制却是説義之體程子所謂處物為義是也揚雄言義以冝之韓愈言行而宜之之謂義若只以義為冝則義有在外意須如程子言處物為義則是處物者在心而非外也又云大概説道理只渾淪説又使人無捉摸處若要説得親切又却局促有病如伊川説仁者天下之公善之本也説得渾淪開闊無病知言説理是要親切所以多病賀孫或問心之徳愛之理以體言心之制事之冝以用言曰也不是如此義亦只得如此説事之宜雖若在外然所以制其義則在心也程子曰處物為義非此一句則後人恐未免有義外之見如義者事之冝事得其宜之謂義皆説得未分曉盖物之宜雖在外而所以處之使得其冝者則在内也曰仁言心之徳便見得可包四者義言心之制却只是説義而已曰然程子説仁者天下之公善之本也固是好然説得太渾淪只恐人理㑹不得大抵説得寛廣自然不受指㸃若説得親切又覺得意思局促不免有病知言則是要説得親切而不免有病者也又曰也須説教親切因言漢唐諸人説義理只與説夢相似至程先生兄弟方始説得分眀唐人只有退之説得近旁然也只似説夢但不知所謂劉迅者如何曰迅是知㡬之子據本傳説迅甞注釋六經以為舉世無可語者故盡焚之曰想只是他理㑹不得若是理㑹得自是著説與人廣至問心之徳是就專言之統體上説愛之理是就偏言之一體上説雖言其體而用未嘗不包在其中心之制是説義之主於中事之冝是説義之形於外合内外而言之也曰心之制亦是就義之全體處説事之冝是就千條萬緒各有所冝處説事之宜亦非是就在外之事説㸔甚麽事来這裏面便有箇宜處這便是義又舉伊川曰在物為理處物為義又曰義似一柄利刀㸔甚物来皆割得去非是刀之割物處是義只這刀便是義時舉録畧别出至之問義者心之制事之宜曰事之宜也是説在外底事之宜但我才見箇事来便知這箇事合恁地處此便是事之冝也義如刀相似其鋒可以割制他物才到面前便割将去然鋒與刀則初未甞相離也時舉義者心之制事之冝所謂事之宜方是指那事物當然之理未説到䖏置合冝䖏也僴問心之制是裁制曰是裁制問莫是以制其心曰心自有這制心自是有制制如快利刀斧事来劈将去可底從這一邊去不可底從那一邊去節梁恵王問利國便是為己只管自家國不管他人國義利之分其争毫釐范氏只為説不到聖賢地位上盖義者利之和也謨集義王立於沼上章徳修説王立於沼上一章引齊宣王見孟子於雪宫事云梁恵王其辭遜齊宣王其辭誇先生曰此説好乂説寡人願安承教一章有和氣致祥􅆾氣致異之説曰恐孟子之意未到此文蔚寡人之於國章移民移粟荒政之所不廢也燾晉國天下莫强焉章問孟子告梁王省刑罰薄稅斂便可以撻秦椘之甲兵夫魏地廹近於秦無時不受兵割地求城無虚日孟子之言似大容易否曰自是響應如此當時之人焦熬已甚率歡欣鼔舞之民而征之自是見効速後来公子無忌縞素一舉直擣至函谷關可見徳眀孟子亦是作為底人如云彼䧟溺其民王往而征之夫誰與王敵非不用兵也特其用兵不若當時戰國之無義理耳如五畝之宅樹之以桑而下為政之實行之既至則視當時無道之國豈可但已哉人傑孟子見梁襄王章問望之不似人君此語孔子還道否曰孔子不説孟子忍不住便説安卿煞不易他㑹㸔文字疑得都是合疑䖏若近思固不能疑蜚卿又疑得曲折多無事生出事又曰公疑得太過都落從小路去了伯羽齊宣王問齊桓晉文之事章無道桓文之事事者營覇之事儒者未甞講求如桓公覇諸侯一匡天下則誰不知至於經營覇業之事儒者未甞言也謨或問仁術字當何訓曰此是齊王見牛觳觫而不忍之心萌故以羊易之孟子所謂無傷盖􅀎䕶得齊王仁心發見䖏術猶方便也履孫仁術謂已将牛去殺是其仁心無可為䖏了却令以羊易之又却存得那仁心此是為其仁之術也振陳希周問仁術曰術未必便是全不好且如仁術見牛之觳觫是仁心到這裏䖏置不得無術以䖏之是自家這仁心抑遏不得流行故以羊易之這是用術處有此術方得自家仁心流行植時舉録詳陳希周問仁術曰術字本非不好底字只縁後来把做變詐㸔了便道是不好却不知天下事有難䖏䖏須着有箇巧底道理始得當齊王見牛之時惻隠之心已發乎中又見釁鐘事大似住不得只得以所不見者而易之乃是他既周旋得那事又不抑遏了這不忍之心此心乃得流行若當時無箇措置便抑遏了這不忍之心遂不得而流行矣此乃所謂術也時舉見牛未見羊也未字有意味盖言其體則無限量言其用則無終窮充擴得去有甚盡時要都盡是有限量方問先生解物皆然心為甚曰人心應物其輕重長短之難齊而不可不度以本然之權度又有甚於物者不知如何是本然之權度曰本然之權度亦只是此心此心本然萬理皆具應物之時須是仔細㸔合如何便是本然之權度也如齊宣王見牛而不忍之心見此是合權度處及至興甲兵危士臣構怨於諸侯又却忍為之便是不合權度失其本心又問莫只是無所為而發者便是本心曰固是然人又多是忘了問如何忘了曰當惻隠時却不惻隠是也問此莫是養之未至否曰亦是察之未精廣黄先之問物皆然心為甚曰物之輕重長短之差易見心之輕重長短之差難見物之差無害心之差有害故曰心為甚又曰物易見心無形度物之輕重長短易度心之輕重長短難度物差了只是一事差心差了時萬事差所以心為甚又曰以本然之權度度心又曰愛物冝輕仁民冝重此是權度以此去度節問孟子論齊王事考之史記後来無一不效曰雖是如此已是見得遲了須㸔他一部書見得句句的確有必然之效方是徳眀至云㸔孟子已㸔到七八章見孟子於義利之辨王覇之辨其剖判為甚嚴至於顧鴻雁麋鹿之樂與好世俗之樂此亦是人情之常故孟子順而導之以與民同樂之意至於誤認移民移粟以為盡心而不能制民之産以行仁政徒有愛牛之心而不􅀎推廣以行仁政故開導誘掖以先王之政可謂詳眀至皆未見所疑處只伊川説孟子説齊梁之君行王政王者天下之義主也聖賢亦何心哉視天命之改與未改爾於此數句未甚見得眀先生却問至云天命之改與未改如何見得曰莫是周末時禮樂征伐皆不出於天子生民塗炭而天王不能正其權以救之否曰如何三晉猶尚請命於周曰三晉請命既不是而周王與之亦不是如温公所云云便是天王已不能正其權曰如何周王與之不是便以為天命之改曰至見得未甚明舊曾記得程先生説譬如一株花可以栽培則須栽培莫是那時已是栽培不得否曰大勢已去了三晉請命於周亦不是知尊周謾假其虛聲耳大抵人心已不復有愛戴之實自入春秋以来二百四十年間那時猶自可整頓不知周之子孫何故都無一人䏻眀目張膽出来整頓到孟子時人心都已去曰程子説天命之改莫是大勢已去曰然至集義梁恵王下莊暴見孟子章孟子開導時君故曰今之樂猶古之樂至於言百姓聞樂音欣欣然有喜色處則關閉得甚宻如好色好貨亦此類也謨齊宣王問文王之囿章孟子言文王由百里興亦未必然問孟子謂文王之囿方七十里先生以為三分天下有其二以後事若只百里如何有七十里之囿然孟子所謂傳有之者如何曰想他須有據但孟子此説其意亦只主在風齊宣王爾若文王之囿果然縱一切人往則雖七十里之大不過㡬時亦為赤地矣又焉得有林木鳥獸之長茂乎周之盛時雖天下山林猶有厲禁豈有君之􅁐囿反縱芻獵恣往而不禁乎亦無是理漢武帝規上林􅁐只有二三十里當時諸臣已皆以為言豈有文王之囿反如是之大問交鄰國有道章湯事葛文王事昆夷昆夷不可考大抵湯之事葛文王事昆夷其本心所以事之之時猶望其有悔悟之心必待伐之豈得已哉亦所當然耳謨問仁者為䏸以大事小是仁者之心寛洪惻怛便是小國不恭亦撓他不動智者為能以小事大盖智者見得利害甚眀故祗得事大曰也不特是見得利害眀道理自合恁地小之事大弱之事强皆是道理合恁地至問樂天者保天下畏天者保其國曰只是説其規模氣象如此時舉録作有大小耳至問樂天畏天者曰樂天是聖人氣象畏天是賢人氣象孟子只是説大概聖賢氣象如此使智者當以大事小時也必以大事小使仁者當以小事大處也必以小事大不可将大王文王交互立説便失了聖賢氣象此自是兩層事孟子之説是前面一層又須是㸔得後面一層所以貴乎不以文害辭者正是此類人須見得言外意好去偽問人皆謂我毁明堂章問孟子以公劉大王之事告其君恐亦是委曲誘掖之意曰這兩事却不是告以好色好貨乃是告以公劉大王之事如此兩事㸔来却似易待去做時多少難大凡文字須将心體認㸔這箇仔細㸔来甚是難如孟子又説子服堯之服誦堯之言行堯之行是堯而已矣㸔来也似易這如何便得相似又如説徐行後長者謂之弟疾行先長者謂之不弟堯舜之道孝弟而已矣㸔来也似易賀孫問孟子語好貨好色事使孔子肯如此答否曰孔子不如此答但不知作如何答問孟子答梁王問利直掃除之此䖏又却如此引導之曰此處亦自分義利特人不察耳可學問湯放桀章賊仁者無愛心而殘忍之謂也賊義者無羞惡之心之謂也節先生舉賊仁者謂之賊賊義者謂之殘問何以别近思云賊仁是害心之理賊義是見於所行處傷其理曰以義為見於所行便是告子義外矣義在内不在外義所以度事亦是心度之然此果何以别盖賊之罪重殘之罪輕仁義皆是心仁是天理根本處賊仁則大倫大法虧滅了便是殺人底人一般義是就一節一事上言一事上不合宜便是傷義似手足上損傷一般所傷者小尚可以補淳㝢録同問孟子言賊仁賊義如何力行曰譬之伐木賊仁乃是伐其本根賊義只是殘害其一枝一葉人而賊仁則害了本心曰賊仁便是将三綱五常天叙之典天秩之理一齊壊了義随事制宜賊義只是於此一事不是更有他事在力行問賊仁是絶滅天理賊義是傷敗彛倫如臣弑君子弑父及齊襄公鳥獸之行等事皆人倫大惡不審是絶滅天理是傷敗彛倫曰傷敗彛倫只是小小傷敗常理若此等乃是絶害天理了義剛録云傷敗彛倫只是小小傷敗常理如不以禮食不親迎之類若紾兄之臂踰東家墻底便是絶滅天理丹書怠勝敬者滅即賊仁者謂之賊意欲勝義者凶即賊義者謂之殘意賊義是就一事上説賊仁是就心上説其實賊義便即是賊那仁底但分而言之則如此淳義剛録同為巨室章問教玉人彫琢玉集注云不敢自治而付之能者愛之甚也治國家則不能用賢而徇私欲是愛國家不如玉也此莫是餘意否曰正意是如何曰正意只是説玉人自㑹琢玉何消教他賢者自有所學何用教他舎其所學後譬只是申觧前譬曰兩譬又似不相似不知如何做得恁地嵯峨齊人伐燕勝之章齊人伐燕孟子以為齊宣史記以為湣王温公平生不喜孟子及作通鑑却不取史記而獨取孟子皆不可曉荀子亦云湣王伐燕然則非宣王眀矣問孟子必不誤曰想得湣王後来做得不好門人為孟子諱故改為宣王爾問湣王若此之暴豈能慙於孟子曰既做得不是説得他底是他亦豈不愧也温公通鑑中自移了十年據史記湣王十年伐燕今温公信孟子改為宣王遂硬移進前十年温公硬拗如此又云史記魏恵王三十六年惠王死襄王立襄王死哀王立今汲冢竹書不如此以為魏惠王先未稱王時為侯三十六年乃稱王遂為後元年又十六年而惠王卒即無哀王恵王三十六年了便是襄王史記誤以後元年為哀王立故又多了一哀王汲冢是魏安釐王冡竹書記其本國事必不㑹錯温公取竹書不信史記此一段却是僴此條有誤當従春秋觧後序居之問取之而燕民悦則取之至文王是也竊疑文王豈有革商之念曰此等難説孔子謂可與立未可與權到那時事勢自是要住不得後人把文王説得忒恁地却做一箇道行㸔着不做聲不做氣如此形容文王都没情理以詩書考之全不是如此如詩自從太王王季説来如云至于太王實始剪商如下武之詩文王有聲之詩都説文王做事且如伐崇一事是做甚麽又不是一項小小侵掠乃是大征伐詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉此見大段動衆岐山之下與崇相去自是多少因甚如此這般處要做文王無意取天下他録作出做事都不得又如説侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池這裏見都自據有其土地自是大段施張了或曰紂命文王得專征伐紂不得已命之文王不得已受之横渠云不以聲色為政不以革命有中國黙順帝則而天下歸焉其惟文王乎若如此説恰似内無純臣之義外亦不属於商這也未必如此只是事勢自是不可已只當商之季七顛八倒上下崩頽忽於岐山下突出許多人也是誰當得文王之事惟孟子識之故七篇之中所以告列國之君莫非勉之以王道賀孫滕文公問滕小國也章問孟子答滕文公三段皆是無可柰何只得勉之為善之辭想見滕國至弱都主張不起故如此曰只是如此只是吾得正而斃焉之意盖滕是必亡無可疑矣况王政不是一日行得底事他又界在齊楚之間二國視之猶太山之壓雞卵耳若教他粗成次第此二國亦必不見容也當時湯與文王之興皆在空閒之地無人来覷他故日漸盛大若滕則實是難保也立之云若教他䏻舉國以聴孟子如何曰他若能用得孟子至二三十年使鄰國之民仰之若父母則大國亦想不能動他但世間事直是難得恰好耳齊梁之國甚强可以有為而孟子與其君言恬然不恤滕文公却有善意又以國小主張不起以此知機㑹真不易得也時舉魯平公將出章魯平公極是箇衰弱底人不知孟子要去見他是如何孟子平生大機㑹只可惜齊宣一節這箇不相遇其他也應是無可成之理如見滕文公説許多井田也是一塲踈脱云有王者起必来取法孟子也只是説得在這裏滕也只是做不得賀孫朱子語類卷五十一
