body:
  text: 朱子語類卷一百三十六歴代三因論三國形勢曰曺操合下便知㩀河北可以為取天下之資既被袁紹先説了他又不成出他下故為大言以誑之胡致堂説史臣後来代為文辭以欺後世㸔来只是一時無説了大言耳此着被袁紹先下了後来﨑嶇萬状尋得箇獻帝来為挟天子令諸侯之舉此亦是第二大着若孫權㩀江南先主㩀蜀皆非取天下之勢僅足自保耳雉曺操用兵煞有那幸而不敗䖏却極能料如征烏桓便能料得劉表不從其後来端䝉問先主為曺操所敗請救於吴若非孫權用周瑜以敵操亦殆矣曰孔明之請救知其不得不救孫權之救帝須着救他必大録云孫權與劉備同禦曺操亦是其勢不得不合不如此便當迎操矣此亦非好相識勢使然也及至先主得荆州權遂遣吕䝉擒關侯才到利害所在便不相顧人傑録必大小異先主之敗於陸遜雖言不合􅁿敵亦是自不合連營七百餘里先自做了敗形是時孔明在成都督運餉後云法孝直若在不使主上有此行孔明先不知曾諫止與否今皆不可考但孔明雖正然盆去聲法孝直輕快必有術以止之必大諸葛孔明大綱資質好但病於粗踈孟子以後人物只有子房與孔明子房之學出於黄老孔明出於申韓如授後主以六韜等書與用法嚴䖏可見若以比王仲淹則不以其細宻他却事事理㑹過来當時若出来施設一畨亦須可觀木之或問孔明曰南軒言其體正大問學未至此語也好但孔明本不知學全是駁雜子房却有儒者氣象後世誠無他比升卿問孔明興禮樂何如曰也不見得孔明都是禮樂中人也只是粗底禮樂㝢是淳錄云孔明也粗若興禮樂也粗禮樂砥録云孔明是禮樂中人但做時也麄踈忠武侯天資髙所為一出於公若其規模并寫申子之類則其學只是伯程先生云孔明有王佐之心然其道則未盡其論極當魏延請從間道出關中侯不聼侯意中原已是我底物事何必如此故不從不知先主當時只從孔明不知孔明如何取荆取蜀若更從魏延間道出闗中所守者只是庸人從此一出是甚聲勢如拉朽然侯竟不肯為之揚致道問孔明出䖏曰當時只有蜀先主可與有為耳如劉表劉璋之徒皆了不得曺操自是賊既不可從孫權又是両間底人只有先主名分正故只得從之時舉問王猛從苻堅如何曰苻堅事自難㸔觀其殺苻生與東海公陽分明是特地殺了而史中歴數苻生酷惡之罪東海公之死云是太后在甚樓子上見它門前車馬甚盛欲害苻堅故令人殺之此皆不近人情盖皆是已子不應便專愛堅而特使人殺東海公也此皆是史家要出脱苻堅殺兄之罪故装㸃許多此史所以難㸔也時舉諸葛亮之事其於荆蜀亦合取當日草廬亦是商量準擬在此但此時不當恁地若是恁地取時全不成舉措如二人視魏而不伐自合當取兼在是時捨此無以為資若能聲其罪用兵而取之却正但當時劉焉父子亦得人情恐亦未易取伯豐問聖人處此合如何曰亦須别有箇道理若似如此寧可事不成只為後世事欲苟成功欲苟就便有許多事亮大綱却好只為如此便有斑駁處㽦縁方子録云孔明執劉璋盖事求可功求成故如此曰然則寧事之不成曰然器遠問諸葛武侯殺劉璋是如何曰這只是不是初間教先主殺劉璋先主不從到後来先主見事勢迫也打不過便從他計要知不當恁地行計殺了他若明大義聲罪致討不患不服㸔劉璋欲從先主之招傾城人民願留之那時郡國乆長能得人心如此賀孫毅然問孔明誘奪劉璋似不義曰便是後世聖賢難做動着便粘手惹脚淳諸葛孔明天資甚美氣象宏大但所學不盡純正故亦不能盡善取劉璋一事或以為先主之謀未必是孔明之意然在當時多有不可盡曉䖏如先主東征之類不見孔明一語議論後来壊事却追恨法孝直若在則䏻制主上東行孔明得君如此猶有不能盡言者乎先主不忍取荆州不得已而為劉璋之圗若取荆州雖不為當然劉表之後君弱勢孤必為他人所取較之取劉璋不若得荆州之為愈也學者皆知曺氏為漢賊而不知孫權之為漢賊也若孫權有意興復漢室自當與先主協力并謀同正曺氏之罪如何先主纔整頓得起便與壊倒如襲取闗侯之類是也權自知與操同是竊㩀漢土之人若先主事成必滅曺氏且復滅吴矣權之姦謀盖不可掩平時所與先主交通姑為自全計爾或曰孔明與先主俱留益州獨令闗侯在外遂為陸遜所襲當時只先主在内孔明在外如何曰正當經理西向宛洛孔明如何可出此特闗畧恃才踈侯自取其敗㩀當時處置如此若無意外齟齬曺氏不足平両路進兵何可當也此亦漢室不可復興天命不可再續而已深可惜㦲謨直卿問孔明出師每乏糧古人做事須有道理須先立些根本曰孔明是殺賊不得不急如人有箇大家被賊来占了趕出在外墻下住殺之豈可緩一纔緩人便一切都忘了孔明亦自言一年死了㡬多人不得不急為之意司馬懿甚畏孔明便使得辛毗来遏令不出兵其實是不敢出也國家只管與講和聘使往来賀正賀節稱叔稱侄只是見鄰國不知是讎了又問勾踐謀吴二十年又如何曰事體不同諸侯各有國未便伐吳則越亦自在如此謀乃是揚孔明出師表文選與三國志所載字多不同互有得失五月渡瀘是説前事如孟獲之七縱七擒正其時也渡瀘是先理㑹南方許多去處若不先理㑹許多去處到向北去終是被他在後乗間作撓既理㑹得了非惟不被他来撓又却得他兵衆来使賀孫誦武侯之言曰治世以大徳不以小恵從周問武侯寧静致逺之説曰静便飬得根本深固自可致逺淳孔明治蜀不曾立史官陳夀險甚揚録作撿拾而為蜀志故甚略孔明極是子細者亦恐是當時經理王業之急有不暇及此諸葛亮臨陣對敵意思安閒如不欲戰而符堅踴躍不􅄰而行師此其敗不待至淝水而決矣方㸔史䇿自有該載不盡處如後人多説武侯不過子午谷路往往那時節必有重兵守這處不可過今只見子午谷易過而武侯自不過史只載魏延之計以為夏侯楙是曺操壻怯而無謀守長安甚不足畏這般所在只是該載不盡亮以為此危計不如安從坦道又揚聲由斜谷又使人㨿箕谷此可見未易過賀孫先生説八陣圗法人傑因云尋常人説戰陣事多用變詐恐王者之師不如此曰王者勢嚮大自不須用變詐譬如孟賁與童子相搏自然勝他孟賁不得且如諸葛武侯七縱七擒事令孟獲觀其營壘分明教你㸔見只是不可犯若用變詐已是其力不敵須假些意智勝之又今之戰者只靠前列後面人更着力不得前列勝則勝前列敗則敗如八陣之法每軍皆有用處天衝地軸龍飛虎翼蛇鳥風雲之類各為一陣有專於戰鬭者有專於衝突者又有纒繞之者然未知如何用之又問垓下之戰曰此却分曉又問淮隂多多益辦程子謂分数明如何曰此御衆以寡之法且如十萬人分作十軍則每軍有一萬人大将之所轄者十將而已一萬又分為十軍一軍分作十卒則一將所管者十卒而已卒正自管二十五人則所管者三䘚正耳推而下之両司馬雖管二十五人然所自將者五人又管四伍長伍長所管四人而已至於大将之權專在旗鼓大将把小旗撥發官執大旗三軍視之以為進退若李光弼旗麾至地令諸軍死生以之是也若又陣圖自古有之周官所謂如戰之陳盖是此法握㡬文雖未必風后所作然由来須遠武侯立石於江邊乃是水之囬洑處所以水不能漂蕩其擇地之善立基之堅如此此其所以為善用兵也又問隂符經有絶利一源用師十倍三反晝夜用師萬倍之説如何曰絶利者絶其二三一源者一其原本三反晝夜者更加詳審豈惟用兵凡事莫不皆然倍如事半古之人功必倍之之謂上文言瞽者善聴聾者善視則其專一可知注隂符者分為三章上言神仙抱一之道中言冨國安民之法下言强兵戰勝之術又有人每章作三事解釋後来一書吏竊而獻之髙宗高宗大喜賜號渾成其人後以强横害物為知饒州汪某斷配人傑或問季通八陣圗説其間所著陳法是否曰皆是元来有底但季通分開許多方圓陳法不相混雜稍好又問史記所書高祖垓下之戰季通以為正合八陳之法曰此亦後人好奇之論大凢有兵須有陳不成有許多兵馬相戰鬭只衮作一團又只排作一行必須左右前後歩伍行陣各有條理方得今且以数人相撲言之亦須擺布得所而後相角今人但見史記所書甚詳漢書則略之便以司馬遷為曉兵法班固為不曉此皆好竒之論不知班固以為行陣乃用兵之常故略之從省文爾㸔古来許多陳法遇征戰亦未必用得所以張廵用兵未嘗倣古兵法不過使兵識将意将識士情盖未論臨機應變方略不同只如地圓則須布圎陣地方則湏布方陣亦豈容槩論也又曰常見老将説大要臨陣又在畨休逓上分一軍為数替将戰則食第一替人既飽遣之入陣便食第二替人覺第一替人力将困即調發第二替人往代第三替亦如之只管如此更畨則士常飽健而不至於困乏鄉来張柔直守南劍戰退范汝為只用此法方汝為之来冦也柔直起鄉兵與之戰令城中殺羊牛豕作肉串仍作飯分鄉兵為数替以入陣之先後更迭食之士䘚力皆有餘遂勝汝為又云劉信叔順昌之勝鄉見張仲隆云親得之信叔大槩亦是如此時極暑探報人至云北騎至矣信叔令一䘚擐甲立之烈日中少頃問甲熱乎曰熱矣可着手乎則曰熱甚不可着手矣時城中軍亦不甚多信叔嘗有宿戒遇戰則分為数替如是下令軍中可依次飲食士䘚更畨而上又多合暑藥往者歸者皆飲之人情胥快元城劉師閔向張魏公督軍暑藥以薑麺為之與今氷壺散方大槩相似故能大敗金人盖方我之甲士甲熱不堪着手則彼騎被甲来者其熱可知又未免有困餒之患於此時而擊之是以勝也或曰是戰也信叔戒甲士人帶一竹筒其中實以煮豆入陣則割弃竹筒狼籍其豆於下彼馬饑聞豆香低頭食之又多為竹筒所滚脚下不得地以故士馬俱斃曰此則不得而知但聞多遣輕銳之䘚以大刀斫馬足每折馬一足則和人皆仆又有相蹂踐者大率一馬仆則從旁而斃不下十数人儒用八陣圗敵國若有一二萬人自家止有両三千人雖有法何所用之蔡云勢不敵則不與鬭先生􅀏曰只辦着走便了蔡云這是箇道理譬如一箇十分雄壮底人與一箇四五分底人厮打雄壮底只有力四五分底却識相打法對副雄壮底便不費力只指㸃将去這見得八陣之法有以寡敵衆之理先生曰也須是多寡强弱相侔可也又須是人雖少須勇力齊一始得蔡云終不是使病人與壮人鬭也賀孫陣者定也八陣圖中有竒正前面雖未整猝然遇敵次列便已成正軍矣季通語方用之問諸葛武侯不死與司馬仲達相持終如何曰少間只管算来筭去㸔那箇錯了便輸輸贏䖏也不在多只是争些子季通云㸔諸葛亮不解輸曰若諸葛亮輸時輸得少司馬懿輸時便狼狽賀孫諸葛公是忠義底司馬懿司馬懿是無状底諸葛公劉禪備位而已道大羊陸相遺問只是敵國相傾之謀欲以氣相勝非是好意思人傑録云觀陸抗正是彰其徳於祜之言斯可見矣如漢文修尉佗祖墓及石勒脩祖逖母墓事皆相近必大王儀為司馬昭軍師昭殺之雖無辜裒仕晉猶有可説而裒不仕乃過於厚者稽康魏臣而晉殺之紹不當仕晉明矣蕩隂之忠固可取亦不相贖事讎之過自不相掩司馬公云使無蕩隂之忠殆不免君子之譏不知君子之譏初不可免也􅓌昭人傑録云儀甞仕而昭誅之云云晉元帝無意復中原却託言糧運不繼誅督運令史淳于伯而還行刑者以血栻柱血為之􅊇流天人幽顕不隔絲毫閎祖湯執中立賢無方東晉時所用人才皆中州浮誕者之後惟顧榮賀循有人望不得已而用之人傑王導為相只周旋人過一生甞有坐客二十餘人逐一穪讃獨不及一胡僧并一臨海人二人皆不恱導徐顧臨海人曰自公之来臨海不復有人矣又謂胡僧曰蘭奢蘭奢乃胡語之褒譽者也於是二人亦恱人傑問老子之道曺參文帝用之皆有效何故以王􅒜之力量反做不成曰王導􅒜安又何曾得老子玅處淳録云人常以王導比􅒜安然􅒜安又勝王導石林説王導只是随波逐流底人􅒜安却較有建立也煞有心於中原王導自渡江来只是恁地都無取中原之意此説也是但􅒜安也被這清虗絆了都做不得又問孔子惡鄉原如老子可謂鄉原否曰老子不似鄉原鄉原却尚在倫理中行那老子却是出倫理之外它自處得雖甚卑不好聲不好色又不要官做然其心却是出于倫理之外其説煞害事如鄉原便却只是箇無見識底好人未害倫理在義剛􅒜安之待桓温本無䇿温之来廢了一君幸而要討九錫要理資序未至大甚猶是半和秀才若它便做箇二十分賊如朱全忠之類更進一步安亦無如之何王儉平日自比􅒜安王儉是已敗闕底􅒜安􅒜安特幸未踈脱底王儉耳安比王儉只是有些英氣符堅之来亦無措置前軰云非晉人之善乃符堅之不善耳然堅只不合擁衆来􅒜安必有以料之兼秦人國内自亂晉亦必知之故安得以鎮静待之堅之来在安亦只得彂兵去迎敵當来符堅若不以大衆来只以輕兵時擾晉邉便坐見狼狽因問正淳曰桓温移晉祚時安能死節否曰必不能却須逃去曰逃将安往若非死節即北靣事賊耳到這裏是築底處中間更無空地因説韋孝寛智略如此當楊堅篡周時尉遲迥等皆死孝寛乃獻金熨斗始甞疑之既不與它為異亦何必如此附結之元来到這地位便不與辨亦不免死既不能死便只得失節耳又曰􅒜安之與符堅如近世陳魯公之於完顔亮幸而睚得它死耳伯豐問㓂莱公澶淵事如何曰當来它却有措處然到此只得向前不可退後也㽦温太真處王敦事難先生云亦不佳某做不得揚王祥孝感只是誠發於此物感於彼或以為内感或以為自誠中来皆不然王祥自是王祥魚自是魚今人論理只要包合一箇渾淪底意思雖是直截両物亦湏衮合説正不必如此世間事雖千頭萬緒其實只一箇道理理一分殊之謂也到感通處自然首尾相應或自此彂出而感於外或自外来而感於我皆一理也謨淵明所説者荘老然辭却簡古堯夫辭極卑道理却宻升卿陶淵明古之逸民若海問符堅立國之勢亦堅牢治平許多年百姓愛戴何故一敗塗地更不可救曰他是掃土而来所以一敗更救不得又問他若欲滅晋遣一良將提数萬之兵以臨之有何不可必掃境而来曰他是急要做正統恐後世以其非正統故急欲亾晉此人性也急躁初令王猛滅燕猛曰既委臣陛下不必親臨及猛入燕忽然堅至盖其心又恐猛之功大故親来分其功也便是他器量小所以後来如此僴王猛事苻堅煞有事節苻堅之兄乃其謀殺之賀孫桓温入三秦王猛来見眼中不識人却謂三秦豪傑未有至何也三秦豪傑非猛而誰可􅀏揚晉任宗室以八王之亂自宋而後皆殺兄弟宗室以至召去知其不好途中見人哭問如何死曰病死曰病後何哭至有臨刑時平日念佛者皆合掌願後世莫生王侯家揚蘇綽立租庸等法亦是天下人殺得少了故行得易三代而下以義為之只有一箇諸葛孔明若魏鄭公全只是利李宻起有一道士説宻即東都縛煬帝獨夫天下必應揚謂宻不足道漢唐之興皆是為利須是有湯武之心始做得太宗亦只是為利亦做不得先生曰漢高祖見始皇出謂丈夫當如此耳項羽謂彼可取而代也其利心一也郭汾陽功名愈大而心愈小意思好易𫝊及諸葛次及郭汾陽揚漢高祖取天下却正當為他直截恁地做去無許多委曲唐初隋大亂如此髙祖太宗因羣盜之起直截如此做去只是誅獨夫為他心中打不過又立恭帝假援回䕶委曲如此亦何必爾所以不及漢之創業也端䝉高祖辭得九錫却是端䝉高祖與裴叔最昵宫人私侍之説未必非高祖自為之而史家反以此文飾之也端䝉因論唐事先生曰唐待諸國降王不合道理竇建徳所行亦合理忽然而亾不可曉王世充却不殺當初高祖起太原入闗立代王遂即位世充於東都亦立越王二人一様故且赦之至殺蕭銑則大無理他自是梁子孫元非叛臣某問唐史臣論高祖殺蕭銑不成議論曰然通老問以宫人侍髙祖在太宗不當為曰它在當時只要得事成本無救世之心何暇顧此唐有天下三百年唐宗室最少屢經大盜殺之又多不出閤只消磨盡了可學唐太宗以晉陽宫人侍髙祖是致其父於必死之地便無君臣父子夫婦之義漢髙祖亦自粗踈惟光武差細宻却曾讀書来問晉元帝所以不能中興者其病安在曰元帝與王導元不曽有中原志收拾吳中人情惟欲宴安江沱耳問祖逖摧鋒越河所向震動使其不死當有可觀曰當是時王導已不愛其如此使戴若思軰監其軍可見如何得他事成問紹興初岳軍已向汴都秦相從中制之其事頗相類曰建炎初宗澤留守東京招徕羣盜数百萬使一舉而取河北数郡即當時事便可整頓乃為汪黄所制怏怏而死京師之人莫不號慟於是羣盜分散四出為山東淮南􅇵賊徳明唐源流出於夷狄故閨門失禮之事不以為異祖道太宗奏建成元吉髙祖云明當鞫問汝宜早参及次早建成入朝兄弟相遇遂相殺尉遲敬徳着甲持刄見髙祖髙祖在一處泛舟程可乆謂既許明早理㑹又却去泛舟此處有闕文或為隠諱先生曰此定是添入此一段與前後無情理太宗決不曽奏既奏了高祖見三児要相殺如何尚去泛舟此定是加建成元吉罪處又謂太宗先奏了不是全不説太宗誅建成比於周公誅管蔡只消以公私㫁之周公全是以周家天下為心太宗則假公義以濟私欲者也端䝉太宗殺建成元吉比周公誅管蔡何如比得太宗無周公之心只是顧身然當時亦不合為官屬所廹兼太宗亦自心不穏温公此處亦㸔不破乃云待其先發而應之亦只便是鄭伯克段于鄢須是有周公之心則可問曰范大史云是髙祖處得不是曰今論太宗且責太宗論高祖又自責高祖不成只責高祖太宗全無可責又問不知太宗當時要處得是合如何曰為太宗孝友從来無了却只要来此一事上使亦如何使得先生又曰高祖不数日軍國事便付與太宗亦只是不得已唐世内禪者三如肅宗分明不是只如睿宗之於𤣥宗亦只為其誅韋氏有功了事亦不得已尔端䝉又論太宗事云太宗功髙天下所係屬亦自無安頓處只髙祖不善處置了又建成乃欲立功盖之如𤣥宗誅􅅊氏有功睿宗欲立宋王成器宋王成器便理㑹得事堅不受端䝉因及王魏事問論後世人不當盡繩以古人禮法畢竟高祖不當立建成曰建成既如此王魏何故不見得又何故不知太宗如此便須莫事建成亦只是望僥倖問二人如此機敏何故不見得曰王魏亦只是直揚因問太宗殺建成事及王魏教太子立功結君後又不能死難曰只為秪見得功利全不知以義理處之端䝉太宗納巢刺王妃魏鄭公不能深諫范純夫論亦不盡純夫議論大率皆只從門前過資質極平正㸃化得甚次第不知伊川當時如何不曾㸃化他先生嘗語吕丈云范純夫平生於書册皆只從忙中攝過了所以諷吕丈也太宗從魏鄭公仁義之說只是利心意謂如此便可以安居民上漢文帝資質較好然皆老氏術也揚或謂史賛太宗止言其功烈之盛至於功徳兼隆則傷夫自古未之有曰恐不然史臣正賛其功徳之美無貶他意其意亦謂除隋之亂是功致治之美是徳自道學不明故曰功徳者如此分别以聖門言之則此兩事不過是功未可謂之徳驤問胡氏管見㫁武后於高宗非有婦道合稱高祖太宗之命数其九罪廢為庶人而賜之死竊恐立其子而殺其母未為穩否曰這般處便是難理㑹處在唐室言之則武后當殺在中宗言之乃其子也宰相大臣今日殺其母明日何以相見問南軒欲别立宗室如何曰以後来言之則中宗不了以當時言之中宗又未有可廢之事天下之心皆屬望中宗髙宗又别無子不立中宗又恐失天下之望此最是難處不知孟子當此時作如何處今生在数百年之後只㨿史傳所載不見得當時事情亦難如此㫁定須身在當時親看那時節及事情如何若人心在中宗只得立中宗若人心不在中宗方别立宗室是時承乾亦有子在若率然妄舉失人心做不行又事多㸔道理未須便将此様難處来䦨㫁了須要通其他更有好理㑹處事事通透後此様處亦易義剛先生問人傑姚崇擇十道使患未得人如何曰只姚崇説患未得人便見它真能精擇曰固是然唐鑑却貶之唐鑑議論大綱好欠商量處亦多又云范文正冨文忠當仁宗時條天下事亦只説擇監司為治只此是要矣人傑退之云凡此蔡功惟㫁乃成今須要知他㫁得是與不是古今煞有以㫁而敗者如唐徳宗非不㫁却生出事来要之只是任私意帝剛愎不明理不納人言惟憲宗知蔡之不可不討知裴度之不可不任若使他理自不明胸中無所見則何以知裴公之可任若只就㫁字上㸔而遺其左右前後殊不濟事道夫周荘仲曰憲宗當時表也㸔如退之潮州表上一見便憐之有復用之意曰憲宗聦明事事都㸔近世如孝宗也事事㸔義剛李白見永王璘反便從㬰之文人之没頭惱乃爾後来流亱郎是被人捉着罪過了剗地作詩自辨被廹脅李白詩中說王說霸當時人必謂其果有智略不知其莽蕩立見踈脫必大顔魯公只是有忠義而無意智底人當時去那裏見使者来不知是賊便下两拜後来知得方罵義剛史以陸宣公比賈誼誼才高似宣公宣公諳練多學更純粋大抵漢去戰國近故人才多是不粋道夫陸宣公奏議極好㸔這人極㑹議論事理委曲說盡更無渗漏雖至小底事被他處置得亦無不盡如後面所説二税之弊極佳人言陸宣公口說不出只是寫得出今觀奏議中多云今日早面奉聖㫖云云臣退而思之云云疑或然也問陸宣公比諸葛武侯如何曰武侯氣象較大恐宣公不及武侯當面便説得如説孫權一段雖辨士不及其細宻處不知此宣公如何只是武侯也宻如橋梁道路井竈圊溷無不脩繕市無醉人更是宻只是武侯宻得来嚴其氣象剛大嚴毅僩陸宣公奏議末数卷論税事極盡纎悉是他都理㑹来此便是經濟之學淳問陸宣公既貶避謗闔户不著書秪為古今集驗方曰此亦未是豈無聖經賢傳可以玩索可以討論終不成和這箇也不得理㑹人傑或問維州事温公以徳裕所言為利僧儒所言為義如何曰徳裕所言雖以利害言然意却全在為國僧儒所言雖義然意却全濟其己私且徳裕既受其降矣雖義有未安也須别做置處乃縛送悉怛謀使之恣其殺戮果何為也升卿牛僧儒何縁去結得箇杜牧之後為渠作墓志今通鑑所載維州等有些事好底皆是揚説者謂陽城居諫職與屠沽出沒果然則豈能使其君聴其言哉若楊綰用而大臣損音樂減騶御則人豈可不有以養素自重耶銖方伯謨云使如甘露之禍成唐必亡無疑夀昌唐租庸調大抵改新法度是世界一齊更新之初方做得如漢衰魏代只是漢舊物事晉代魏亦只用這箇以至六朝相代亦是遞相祖述弊法䘚亦變更不得直到得元魏北齊後周居中原時中原生靈死於兵冦㡬盡所以宇文泰蘇綽出来便做得租庸調故隋唐因之賀孫唐六典載唐官制甚詳古禮自秦漢已失北周宇文泰及蘇綽有意復古官制頗詳盡如租庸調府兵之類皆是蘇綽之制唐遂因之唐之東宫官甚詳某以前上封事亦言欲復太子官屬如唐之舊因論唐府兵之制曰永嘉諸公以為兵農之分反自唐府兵始却是如此盖府兵家出一人以戰以戍并分畨入衞則此一人便不復為農矣僩唐口分是八分世業是二分有口則有口分有家則有世業古人想亦似此様淳世義剛録云唐口分是二分業是八分有口則有口分寡闕皆無􅂈十二云云唐節度使收税皆入其家所以節度冨淳杜佑可謂有意於世務者問理道要訣曰是一箇非古是今之書理道要訣亦是杜佑書是一箇通典節要方子朱梁不乆而滅無人為他藏掩得故諸惡一切發見若更稍乆掩得一半揚後唐荘宗善音律好寵伶優其䘚也得鷹坊人善友歛樂器而焚之所謂君以此始必以此終豈欺我哉夀昌周世宗天資髙於人才中尋得箇王朴来用不数年間做了許多事業且如禮樂律歴等事想見他都㑹得故能用其説成其事又如本朝太祖直是明達故當時創法立度其節拍一一都是盖縁都曉得許多道理故也一本此下云所謂神聖其臣莫及趙普軰皆不及之廣問世宗果賢主否曰㸔来也是好問當時也曾制禮作樂曰只是四年之間煞做了事問今刑統亦是他所作曰開寳通禮當時做不曾成後来太祖足成了而今一邊征伐一邊制禮作樂自無害事自是有人来與他做今人鄉一邊便不對那一邊才理㑹征伐便將禮樂做閒慢了世宗胸懐又較大胡泳五代時甚麽様周世宗一出便振收三闗是王朴死後事模様世宗未死時須先取了燕冀則雲中河東皆在其内矣本朝收河東契丹常以重兵援其後契丹嫌劉氏不援始取之揚周世宗亦可謂有天下之量纔見元稹均田圗便慨然有意周世宗大均天下之田元稹均田圗世未之見徳明周世宗規模雖大然性廹無甚寛大氣象做好事亦做教顯顯地都無些含洪之意亦是数短而然揚晉悼公幼年聦慧如周世宗只是世宗却得太祖接續他做将去雖不是一家人以公天下言之畢竟是得人接續所做許多規模不枉却且如周武帝一時也自做得好只是後嗣便如此弱了後来雖得一箇隋文帝終是不甚濟事文蔚朱子語類卷一百三十六
