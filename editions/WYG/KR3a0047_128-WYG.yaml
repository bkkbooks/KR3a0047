body:
  text: 朱子語類卷一百二十八本朝二法制唐殿庭間種花栁故杜詩云香飄合殿春風轉花覆千官淑景移又云退朝花底散國朝惟植槐楸欝然有嚴毅氣象又唐制天子坐朝有二宫嬪引至殿上故前詩起句云户外昭容紫綬垂雙瞻御座引朝儀至敬宗時方罷止用小黄門引導至今是如此按岑參詩花迎劔佩星初落栁拂旌旗露未乾亦殿庭種花栁之一證也又杜贈田澄舍人有舍人退食收封事宫女開函進御筵亦可為二宫嬪之證儒用舊時主上每日不御正殿然自升朝官以上凡在京者皆著去立候宰相奏事罷却來押班拜兩拜方了日日如此後來韓魏公不知如何偶然忘了不及押班便歸第御史中丞王陶即彈之然遂去國溫公代為中丞先奏云前王陶以彈宰相不押班而去國今若宰相更不押班則中丞無以為職須是令宰相押班某方就職如此便是不押班也不是義剛方子録云國初文徳殿正衙常朝升朝官以上皆排班宰相押班再拜而出時歸班官甚苦之其後遂廢致王樂道以此攻魏公盖亦以人情趨於簡便故也祖宗於古制雖不能守然守得家法却極謹舊時朝見皆是先引見閤門閤門方引從殿下舞蹈後方得上殿而今都省了本來朝見底皆是用一榜子上於閤門閤門奏上方始引見而今却於引見時閤門積得這榜子俟放見時却一併上則都省了許多只是殿下拜兩拜便上殿這非惟是在下之人􅂴亦是人主不能恁地等得㸔他在恁地舞手㺯脚更是閤門也􅂴能教得他及它有失儀又著彈奏而今都是從簡易處去了義剛引見上殿是兩事今閤門引見便用舞蹈近日多是放見只是上殿拜於堦下直前奏事而已惟授告門謝有舞蹈文蔚近日上殿禮簡如所謂舞蹈等事皆無之只是直至殿下拜一雙上殿奏事退又拜即退這也是閤門要省事故如此夀皇初間得㡬時見羣臣皆許只用紫衫後來有人説道太簡後不如此賀孫問朝見舞蹈之禮曰不知起於何時元魏末年方見説那舞然恐或是夷狄之風廣近日拜表之禮甚異論禮班首合跪進上面却有人來跪受但進表後進者因跪而拜今則進表者先拜却跪進其受者亦拜此禮不可曉文蔚皇太子參決時見宰相侍從以賔主之禮餘官不然又曰獨宰相為正拜者盖餘官謝恩在殿下拜侍從以上雖拜殿上亦只偏拜獨宰相正拜故云敬仲宫中有内尚書主文字文字皆過他處天子亦頗禮之或賜之坐不係嬪御亦掌印璽多代御批行出底文字只到三省文蔚問本朝十一室則九廟七廟之制如何曰孝宗未祔廟僖祖宣祖未祧遷時為十二室是九世今既祔宣祖又祧僖祖却祔孝宗正是八世進不及九退不及七當時且祧宣祖存得九廟却待後世商量猶得直如此怱忙何也人傑今景靈宫乃叔孫通所謂原廟是也叔孫通言原廟則是衣冠月出逰之地只一月一次到彼初無神坐今則一一有之又只似太廟了恐非叔孫通所謂原廟之意今景靈宮謂之朝獻太廟謂之大享子䝉問景靈起於何代曰起於真廟初只祀聖祖諸帝后神御散於諸寺其後神宗始祀聖祖於前殿帝后於後殿似此等禮數唐人亦無且如唐人配廟只一后餘后立别廟本朝諸后俱配問人家配如何先儒説只用元妃伊川謂若所祭人是次妃生即配以次妃曰此未安古者諸侯一娶九女元妃卒次妃奉事所謂次妃者乃元妃之妾固不可同坐若如後世士大夫家或三娶皆人家女雖同祀何害所謂禮以義起也唐人已如此可學云唐人立廟院重氏族固能如此曰唐人極有可取處可學因言五禮云今諸后位數多至尊拜跪勞古人一帝只以一后配其餘自别立廟庶㡬不亂嫡妾之分今皆配不是唐人有言人家夫婦却不同盖古者天子諸侯不再娶故次后與正后有名分若人家則再娶亦妻也故可同祭伊川祭儀祭繼室於别廟恐未穏璘三后並配自本朝真廟始其初議者皆以歸咎於錢惟演後既習見為常亦無復有議之者矣古人雖以子貴然庶母無係於先君之禮如左傳書僖公成風晋書簡文太后皆以係於其子而别制廟以祀之必大𤣥朗諱起於真廟朝王欽若之徒推得出這也無攷鏡處義剛某常疑本朝諱得那舊諱無謂且如宣帝舊名病已何曾諱平帝舊名亦不曾諱北朝諱得又嶢﨑偏旁皆諱謂諱敬字立人傍底也諱下面著言字底也諱近日朝廷祧了㡬箇祖諱却是然𤣥朗却不祧那聖祖莫較逺似宣祖些麽義剛張以道曰秦王陵在汝州太祖以下八朝陵在永安軍瞿興瞿俊父子嘗提兵至此乏水興禱之天無雨小溪平白湧洪流六軍遂得水用義剛古者車只六尺六寸今五路甚大嘗見人説秦太師制此又髙於京師舊日者上面耀葉三層皆髙於舊日三寸成尺二寸周輅孔子猶以為侈要乗殷輅今輅只是極其侈靡因問陳庭秀臨安人曰今大禮命從官一人立玉輅側以帛維之名何官以名偹顧問官又曰執綏官先生笑曰然徧檢古今郊禮安有所謂備顧問官執綏官者盖此本太僕卿即執御之職古者君將升車則御者先升執轡中立以綏度左肩而雙垂之綏如圓轡君以兩手援綏而升立車之左以左為尊魏公子無忌有駕虚左方以迎侯生是也行大禮不敢坐車行數歩止中書令宣詔命千牛將軍千牛擇武力者為之執長刀立車之右以防非常所謂驂乗也既升車復行望郊壇數歩復少駐千牛將軍乃降立道左車復行則執長刀前導而行此唐制也及政和修禮脱千牛升車一節而但有降車立道左之文初未嘗登何降之有所謂太僕卿執御之職遂訛曰執綏官備顧問官然又不執綏却立于輅側恐其傾跌以物維之雖今之典禮官亦但曰執綏官備顧問官也今為太常少卿者便撥數日工夫將禮書細閲一過亦須畧曉而直為此鹵莾也周洪道嘗記渠作執綏官事自云考訂精博某問周何謂執綏官渠亦莫曉又綏本人君升車之所執御者但授與君則御者亦不可謂之執綏官語曰升車必正立執綏謂乗車者爾又曰今玉輅太重轉動極難兼雕刻既多反不堅牢不知何用許多金玉裝􅎖為也所以聖人欲乗殷之輅取其堅質而輕便耳仁宗神宗兩朝造玉輅皆以重大致壓壊本朝尚存唐一玉輅聞小而輕捷而稳諸輅之行此必居先或置之後則隐隐作聲既有此輅乗此足矣何以更為聞後來此輅亦入北朝僴南渡以前士大夫皆不甚用轎如王荆公伊川皆云不以人代畜朝士皆乗馬或有老病朝廷賜令乗轎猶力辭後受自南渡後至今則無人不乗轎矣因言物纔數年不用便忘之祖宗時升朝官出入有柱斧其制是水精小斧頭子在轎前至宣政間方罷之今人遂不識此物亦不聞其名矣如祖宗時人畵像有執柱斧者璘冊命之禮始於漢武封三王後遂不廢古自有此禮至武帝始復之耳郊祀宗廟太子皆有玉冊皇后用金冊記不審宰相貴妃皆用竹冊凡宰相宣麻非是宣與宰相乃是揚告王庭令百官皆聼問以其人可用與否首則稱道之文後乃警戒之詞如今云於􅃧以下數語是也末乃云主者施行所謂施行者行冊拜之禮也此禮唐以來皆用之至本朝宰相不敢當冊拜之禮遂具辭免三辭然後許只命書麻詞于誥以賜之便當冊文不復宣麻于庭便是書以賜宰相乃是獨宣誥命於宰相而他人不得與聞失古意矣僴因論今宗室與漢差别漢宗室只是天子之子封王王子封侯嫡子世襲支庶以下皆同百姓只是免其繇戍如漢光武皆是起於民間也燾今南班宗室多帶皇兄皇叔等冠於官職之上非古者不得以戚戚君之意王定國嘗言之神廟欲令只帶某王孫或曾孫或㡬世孫且如越王下當云越王㡬世孫廣錄云此説却是不惟可免戚君之非禮又可因而見其世系梢全得些宗法後來定國得罪指以為離間骨肉今宗室散無統紀若使當時從定國之説却有次序可攷也人傑廣同古者三公坐而論道方可子細説得如今莫説教宰執坐奏對之時頃刻即退文字懐於袖間只説得㡬句便將文字對上宣讀過那得子細指㸃且説無坐位也須有箇案子令開展在上指畫利害上亦知得子細今頃刻便退君臣如何得同心理㑹事六朝時尚有對案畵勑之語若有一案猶使大臣畧憑倚細説如今公吏們呈文字相似亦得子細又云直要理㑹事且如一事屬吏部其官長奏對時下面許多屬官一齊都著在殿下逐事付與某人某人便著有箇區處當時便可參考是非利害即時施行此一事便了其他諸部有事皆如此豈不了事如今只随例送下某部㸔詳遷延推托無時得了或一二月或四五月或一年或兩三年如何得了某在漳州要理㑹某事集諸同官商量皆逡廵泛泛無敢向前如此㡬時得了於是即取紙來某自先寫起教諸同官各随所見寫出利害只就這裏便見得分明便了得此一事少間若更有甚商量亦只是就這上理㑹寫得在這裏定了便不到推延若只將口説來説去何時得了朝廷萬事只縁各家都不説要了但随時延嵗月作履歴遷轉耳那得事了古者人君自朝至于日中昃不遑暇食用咸和萬民一日二日萬㡬如今羣臣進對頃刻而退人主可謂甚逸古人豈是故為多事又云漢唐時御史彈劾人多抗聲直數其罪於殿上又如要劾某人先榜於闕外直指其名不許入朝這須是如此如今要説一事要去一人千委百曲多方為計而後敢説説且不盡是甚模様六朝所載對案畫勑下又云後來不如此有同譛愬㸔如今言事者雖所言皆是亦只類譛愬賀孫本朝祖宗積累之深無意外倉卒之變惟無意外之變所以都不為意外之防今樞宻院號為典兵倉卒之際要得一馬使也沒討處今樞宻要發兵須用去御前畫㫖下殿前司然後可發若有緊急事變如何待得許多節次漢三公都帶司馬及將軍所以倉卒之際便出得手立得事扶得傾危今幸然無意外之變若或有之樞宻且倉卒下手未得苖劉之事今人多責之朱吕當時他也是自做未得古人定大難者不知是如何不知范文正冦萊公人物生得如何氣貎是如何平日飲食言語是如何様底人今不復得親身㸔且得箇依稀様子㸔是如何地如今有志節擔當大事人亦須有平闊廣大之意始得致道云若做不得只得繼之以死而已曰固是事極也不愛一死但􅂸却一死於自身道理雖僅得益然恐無益於事其危亡傾頽自若柰何如靖康李忠愍死於金手亦可謂得其死但當時使金人感慨謂中國有忠臣義士如此可以不必相擾引兵而退如此却於宗社有益若自身既死事變只如此濟得甚事當死而死自是無可疑者賀孫因説歴代承襲之弊曰本朝鑒五代藩鎮之弊遂盡奪藩鎮之權兵也收了財也收了賞罰刑政一切收了州郡遂日就困弱靖康之禍金騎所過莫不潰散因及熈寜變法曰亦是當苟且廢弛之餘欲振而起之但變之不得其中爾賀孫本朝官制與唐大槩相似其曲折却也不同義剛神宗用唐六典改官制頒行之介甫時居金陵見之大驚曰上平日許多事無不商量來只有此一大事却不曾商量盖神宗因見唐六典遂斷自宸𠂻鋭意改之不日而定却不曾與臣下商量也僴唐初每事先經由中書省中書做定將上得㫖再下中書中書付門下或有未當則門下􅌳駁又上中書中書又將上得㫖再下中書中書又下門下若事可行門下即下尚書省尚書省但主書填奉行而已故中書之權獨重本朝亦最重中書盖以造命可否進退皆由之也門下雖有􅌳駁依舊經由中書故中書權獨重及神宗倣唐六典三省皆依此制而事多稽滯故渡江以來執政事皆歸一獨諸司吏曹二十四曹依舊分額各屬三省吏人自分所屬而其上之綱領則不分也舊時三省事各自由不相侵越不相聞知中書自理㑹中書事尚書自理㑹尚書事門下自理㑹門下事如有除授則宰執同共議定當筆宰執判過授中書舍人做上去再下中書中書下門下門下下尚書書行給舍繳駁猶州郡行下事須幕職官僉押如有不是得以論執中書行下門下皆用門下省官屬僉押事有未當則官屬得以執奏僴舊制門下省有侍中有門下侍郎中書省有中書令中書侍郎改官制神宗除去侍中中書令只置門下中書侍郎後併尚書左右丞門下中書侍郎四員為恭政官或云始者昭文館大學士兼同中書門下平章事富鄭公等為之後改為左右僕射則蔡京王黼首居是選及改為左右丞相則某人等為之名愈正而人愈不逮前亦何預名事曰只是實不正使名既正而實亦正豈不尤佳又曰人言王安石以正名之説馴致禍亂且正名是孔子之言如何便道王安石説得不是使其名果正豈不更佳僴問何故起居郎却大屬門下省起居舍人却小屬中書省曰不知當初何故只是胡亂牽挐得來底便是起居郎居左起居舍人居右故如此分大小只縁改官制時初無斬新排到理㑹底説故如此牽拖舊職不成倫序僴給事中初置時盖欲其在内給事不差除有不當用捨有不是要在裏面整頓了不欲其宣露於外今則不然或有除授小報纔出逺近皆知了給舍方􅌳駁乃是給事外也這般所在都沒理㑹賀孫問或言六尚書得論臺諫之失是否曰舊來左右丞得紏臺諫嘗見長老言神宗建尚書省中為令聼兩旁則左右僕射左右丞左右司郎中蔡京得政奏言土地神在某方是居人位所以宰相累不利建議將尚書省拆去因言蔡氏以紹述二字箝天下士大夫之口其實神宗良法美意變更殆盡它人拆尚書省便如何了得徳明初蔡京更定幕職推判官謂之分曹建院以為節度使觀察使在唐以治兵治財今則皆是閒稱呼初無職事而推判官猶襲節度觀察之名甚無謂又古者以軍興故置恭軍今恭軍等職皆治民事而猶循用恭軍之號亦無意謂故分曹建院推判等官改為司士曹事司儀曹事此䫫有六恭軍之屬改為某院某院而盡除去節度恭軍之名㸔來改得自是又如婦人封號有夫為秦國公而妻為魏國夫人者亦有封兩國者秦檜妻封兩國范伯達笑之曰一妻而為兩國夫人是甚義理故京皆改随其夫號如夫封建安郡則妻封建安郡夫人夫封秦國則妻亦封秦國夫人侯伯子男皆然㸔來随其夫稱極是如淑人碩人宜人孺人之類亦京所定各随其夫官帶之後人謂淑人碩人非婦人所宜稱㸔來稱碩人亦無妨惟淑人則非所宜爾但只有一節未善有夫方封某郡伯而妻已先封為某國夫人者此則與京所改者相值齟齬不可行盖其封贈格法如此當初合并格法也與整頓過則無病矣遂使人得以咎之謂其法自相違戾亦是京不仔細乗勢麄改後人以其出於京也遂不問是非一切反之又如神宗所改官制舊制凡通判太守出去皆帶吏部員外郎吏部郎中其見居職者則加以判流内銓流外銓豈有吏部官而可帶出治州郡者故神宗皆為諸郎如朝奉郎朝散郎朝奉大夫朝散大夫之類所以朝散以下謂之員郎盖本員外郎之資叙朝奉大夫方謂之正郎盖吏部郎中資叙也朝散郎朝奉大夫之類有二十四階分為三等每等八階以别異雜流有出身無出身人故有前行中行後行又問知縣通判知州資叙曰在法做兩任知縣有闗陞狀方得做通判兩任通判有闗陞狀方得為知州兩任知州有闗陞狀方得為提刑提刑又有一節方得為轉運今巧宦者欲免州縣之勞皆經營六院盖既為六院便可經營寺監簿丞為寺監簿丞出來便可得小郡又不肯作􅇿便欲經營為郎官郎官非作郡不得除故又經營權郎却自權郎徑除卿監長貳則已在正郎官之右矣又如法中非作縣不得作郡故不作縣者必經營為臨安倅盖既為臨安倅則必得郡更不復問先曾為縣否也人君深居九重安知外間許多曲折宰相雖知又且苟簡可以應副親舊若是人君知得都與除了這般體例苟不作縣雖為臨安倅亦不免便使權卿監苟不作郡定不得除郎為卿監者亦須已作郡人方得做不得以寺監丞簿等官權之則人無僥倖之心矣只縁當初立法不肯公心明白留得這般掩頭藏倖底路徑所以使人趨之嘗記歐公説舊制觀文殿大學士壓資政殿大學士資政殿大學士壓觀文殿學士觀文殿學士壓資政殿學士後來改觀文兩學士都壓資政兩學士議者以見任者難為改動歐公以為此不難己任者勿改而自今除者始可也以今觀之亦何須如此勞攘將見任者皆與改定又何妨不過寫換數字而已又不㑹痛當時疑慮顧忌已如此只縁自來立法建事不肯光明正大只是如此委曲回䕶其弊至於今日畧欲觸動一事則議者紛然以為壊祖宗法故神宗憤然欲一新之要改者便改孝宗亦然但又傷於太鋭少商量僴唐制某鎮節度使某州刺史觀察使此藩鎮所稱使持節某州軍州事此屬州軍所􅁛其屬官則云某州軍事判官某州軍事推官今尚如此若節鎮屬官則云節度推判官以自異於屬州使與州各分曹案使院有觀察判官觀察推官州院有知錄糾六曹官為六曹之長凡兵事則屬使院民事則屬州院刑獄則屬司理院三者分屬不相侵越司法專檢法司户專掌倉庫然司理既結獄須推判官簽押方為圓備不然則不敢結斷本朝併省州院使院為一如署衘但云知某州軍州事軍州事則使院之職也自併省三院而州郡六曹之職頗為淆亂司法司理司户三者尚仍舊知錄管州院事專主教民今乃管倉庫獨為不得其職所以六曹官惟知錄免二日衙以其職尊故優異之此等事史書並不載惟雜説中班駁見一二舊嘗疑州院即是司理院後閲范文正公集有云如使院州院宜併省歸一方知不然因曉州院使院之别使院今之僉㕔也凡諸幕職官皆謂之常職官如唐書所云有事當罰則詔云自當職官以下以次受罰有事當賞則云當職官以下以次受賞謂自推判官而下也又曰後來蔡京改六曹官名頗得舊職為不淆亂渡江以來以其出於京也皆罷之又問長史何官曰六朝時長史甚輕次第只是奔走長官之前有君臣之分不得坐至唐則甚重盖皇子既遥領正大帥其郡臣出為藩鎮者則稱云副大帥某州長史韓文董晋官位可見至唐中葉而長史司馬别駕皆為貶官不事事盖節度使既得自辟置官屬如節度觀察推判官之屬此既重則彼皆輕矣僴蔡元道所為祖宗官制舊典他只知懲創後來之禍遂皆歸咎神宗不合輕改官制事事以祖宗官制為是便説此是百王不可易之典殊不知後來所以放行踰越任用小人自是執法者偏私何闗改官制事如武臣諸節度副總管諸使所以恩禮隆異俸給優厚者盖太祖初奪諸鎮兵權恐其謀叛故直諸節度使隆恩異數極其優厚以收其心而杜其異志及太宗真宗以後則此軰或以老死又無兵權後來除授者自可殺其禮數減其俸給降其事權而猶襲一時權宜苟且之制為子孫不可易之常典豈不過哉然祖宗時放行極艱其選不過一二人二三人後來小人用事凡宰相除罷及武臣寵倖宦者之徒無不得之實法制不善有以啓之耳及經變故乃追咎輕越祖宗法度之過不知此既開其可入之塗彼孰不為可入之塗以求合乎僴唐沈既濟之説已如此新添改官制而舊職名不除所以愈見重複然唐時猶自歸一如藩鎮節度使觀察使民事兵事一人皆了今既有帥又有家居節度使便用費許多錢飬他見任事者請俸却寡而家居守門名者請俸却大節度使請俸月千餘緡又節度印古者所以置旌節以為儀衛而重其權今却令帶之家居請重俸是甚意今為福州安撫使而反不如威武軍節度使之請俸僴祖宗置資格自立僥倖之門如武臣横行最為超捷纔除横行便可越過諸使許多等級皆不須歴一向上去然今人又不用除横行横行猶用守這數級只落借官則無所不可祖宗之法本欲人遵守資格謹重名器而不知自置許多僥倖之路令人脱過是甚意思除是執法者大段把得定不輕放過一箇半箇無一毫私方執得住不然便不可禁遏矣不知當初立法何故如此今獃底人便只守此為不可易之典才觸動著便説是變動祖宗法制也須賭箇是始得僴趙表之生做文官纔到封王封安定郡王便用換武豈文官不可封王而須武官耶又今宗正須以宗室武官為之文官也只做得世間一様愚人便以此等制度為百王不可易之法僴只改儒林文林之屬其他皆可通行文官猶有古名如武官諸階稱呼多有無意義者又曰四廂都指揮使又有甚諸色使皆是虚名只有三衙都指揮使真有職事又曰元豐以前武臣無宫觀故武臣無閒者見武臣乞解軍職必出藩府及元豐介甫相置宫觀方有門者僴本朝先未有祠禄但有主管某宫某觀公事者皆大官帶之真箇是主管本宮本觀御容之屬其他多只是監當差遣雖嘗為諫議官亦有為監當者如監船場酒務之屬自王介甫更新法慮天下士大夫議論不合欲一切彈擊罷黜又恐駭物論於是創為宫觀祠祿以待新法異議之人然亦難得惟監司郡守以上眷禮優渥者方得之自郡守以下則盡送部中與監當差遣後來漸輕今則又輕皆可以得之矣僴華州雲臺觀南京鴻慶宫有神宗神像在使人主管猶有説若武夷山沖佑觀臨安府洞霄宫知他主管箇甚麽今太廟室深而堂淺一代為一室堂則雖在室前而實同為一堂古人大抵室事尚東向堂事尚西向賀孫皇城使有親兵數千人今八廂貎士之屬是也以武臣二員并物侍都知二員掌之本朝只此一項令宦者掌兵而以武臣參之因笑曰此項又以制殿前都指揮之兵也僴今之三衙即舊日之指揮使朱溫由宣武節度使簒唐疑忌他人自用其宣武指揮使為殿前指揮使管禁衛諸軍以至今日其權益重嘗見歐陽公記其為某官時殿帥之權猶輕見從官不接坐但傳語不及獻茶及再入為執政則禮數大異矣問何故如此曰也是積漸致然是他權重後自然如此僴問唐之人主喜用宦者監軍何也曰是他信諸將不過故用其素所親信之人後來一向踈外諸將盡用宦者本朝太宗令王繼恩平李順有功宰相擬以宣徽使賞之太宗怒切責宰相以為太重盖宣徽亞執政也遂創宣政使處之朝臣諸將中豈無可任者須得用宦者彼既有功則爵賞不得吝矣然猶守得這些意思恐起宦者權重之患及熈豐用兵遂皆用宦者李憲在西權任如大將馴至後來遂有童貫譚禎之禍宦者其初只是走馬承受之類浸漸用事遂至如此僴今之總管乃國初之部署後避英廟諱改焉都監乃是唐之監軍不知何時轉了廣太祖收諸鎮節度兵權置諸州指揮使大州十數員次州六七員又次州三四員每員管兵四五百人本州自置營招兵而軍員管之每遇遷陞則宻院出宣付之用紙一大幅題其上曰宣付指揮使某却不押號而以御前大寳印之軍員得此極重有一人而得數宣者盖營中亦有數等品級遷轉也指揮有㕔有射場只在營中升降不得出官僴總領一司乃趙忠簡所置當時之意甚重盖緣韓岳統兵權重方欲置副貳又恐啓他之疑故特置此一司以總制財賦為名却專切報發御前兵馬文字盖欲隂察之也或謂總領之職自可併歸漕司曰財賦散在諸路漕司却都呼吸不來亦如坑冶須是創立都大提㸃方始呼吸得聚道夫運使本是愛民之官今以督辦財賦反成殘民之職提刑本是仁民之官今以經總制錢反成不仁之具淳祖宗凡升朝官在京未有職事者每日赴班纔有差遣則已廣今羣臣以罪去者不能全其退處之節凡有辭避必再三不允直待章䟽劾之遂從罷黜人傑舊制遷謫人詞頭當日命下當日便要不許隔宿便與詞頭報行而今縁有信劄故詞頭有一兩月不下者中書以此覺得事多此皆軍興後事多故如此國朝舊制煞有因軍興後廢格而未復者廣舊法貶責人若是庶官亦須帶别駕或司馬無有帶階官者今吕子約却是帶階官安置人傑今日作史左右史有起居注宰執有時政記臺官有日厯並送史館著作處参改入實錄作史大抵史皆不實𦂳切處不敢上史亦不闗報椿史甚弊因神宗實錄皆不敢寫傳聞只據人自錄來者才對者便要所上文字并奏對語上史館揚今之修史者只是依本子寫不敢增減一字盖自紹聖初章惇為相蔡卞修國史將欲以史事中傷諸公前史官范純夫黄魯直已去職各令於開封府界内居住就近報國史院取㑹文字諸所不樂者逐一條問黄范又須䟽其所以然至無可問方令去後來史官因此懲創故不敢有所增損也按實録是時史官趙彦若亦同於府界居住後趙安置豐州范永州黄黔州儒用先生問􅓌有山谷陳留對問否曰無之曰聞當時秦少㳺最争得峻惜乎亦不見之陸農師却有當來對問其間云嘗與山谷争入王介甫無使上知之語又云當時史官因論溫公改詩賦不是某云司馬光那得一件是皆是自叙與諸公争辨之語􅓌道君欽宗實錄數百卷吕丈月十日修了云只是得大節目百十條問云何不入文字展日曰便不是吕丈規模振本朝國紀好㸔雖畧然大綱却都見長編太詳難㸔熊子復編九朝要畧不甚好國紀徐端立編僴聖政編年一書起太祖止紹興九年書坊人做非好書振今之學規非胡安定所撰者仁宗置州縣學取湖學䂓矩頒行之湖學之規必有義理不如是其陋也如第一條謗訕朝政之類其出於蔡京行舍法之時有所改易乎當時如徐節孝為楚州教官乃罷之而易以其黨大抵本朝經王氏及蔡京用事後舊章蕩然可勝歎哉人傑問學究一科㳂革之故曰此科即唐之明經是也進士科則試文字學究科但試墨義有才思者多去習進士科有記性者則應學究科凡試一大經者兼一小經每段舉一句令寫上下文以通不通為去取應者多是齊魯河朔間人只務熟讀和注文也記得故當時有董五經黄二傳之稱但未必曉文義正如和尚轉經相似又有司待之之禮亦不與進士等進士入試之日主文則設案焚香垂簾講拜至學究則徹幕以防傳義其法極嚴有渴至飲硯水而黔其口者當時傳以為笑歐公亦有詩云焚香禮進士徹幕待諸生或云徹幕乃瞑目字亦非歐詩其取厭薄如此則公所以惡而罷之但自此科一罷之後人多不肯去讀書儒用熙寧三舍法李定所定崇觀三舍法蔡京所定胡徳輝珵嘗作記學者所以學為忠與孝也今欲訓天下士以忠孝而學校之制乃出於不忠不孝之人不亦難乎儒用大學舍法壊人多龜山嘗立論髙抑崇曾見龜山太學初興召為司業善類頗屬望到彼一切放倒三舍法却在渠手中成莫負了龜山否王子合曰聞那時只是取法於一舊老吏浩曰秦㑹之是舊大學中人想是據他向日所行了曰髙公不合與承當髙公大率不立五峯嘗有書責他浩先生因論本朝南渡以來其初立法甚放寛盖欲聚人不知後來放𦂳便不得燾今之法大槩用唐法淳問今三代之法或可見於律中否曰律自秦漢以來歴代修改皆不可得而見矣如漢律文簡奥後代修改今亦不可見矣淳律是歴代相傳勑是太祖時修律輕而勑重如勑中刺面編配律中無之只是流若干里即今之白面編管是也勑中上刑重而下刑輕如律中杖一百實有一百勑中則折之為二十五折一今世斷獄只是勑勑中無方用律同因言律極好律即刑統後來勑令格式罪皆太重不如律乾道淳熈新書更是雜亂一時法官不識制法本意不合於理者甚多又或有是計囑妄立條例者如母已出嫁欲賣産業必須出母著押之類此皆非理必是當時有計囑而創此條也孝宗不喜此書嘗令修之不知修得如何僴刑統大字是歴代相傳注字是世宗時修淳舊來勑令文辭典雅近日殊淺俗裏面是有㡬多病痛方子宋莒公曰應從而違堪供而闕此六經之亞文也謂子不從父不義之命及力所不能飬者古人皆不以不孝坐之義當從而不從力可供而不供然後坐以不孝之罪淳或問勑令格式如何分别曰此四字乃神宗朝定法時綱領本朝止有編勑後來乃命羣臣脩定元豐中執政安燾等上所定勑令上喻燾曰設於此而逆彼之至謂之格設於此而使彼效之謂之式禁於未然謂之令治其已然謂之勑脩書者要當如此若其書完具政府總之有司守之斯無事矣此事載之已仰録時出示學者國記其文如此然恐有脱誤處神廟天資絶人觀此數語直是分别得好格如五服制度某親當某服某服當某時各有限極所謂設於此而逆彼之至之謂也式如磨勘轉官求恩澤封贈之類只依箇様子寫去所謂設於此而使彼效之之謂也令則條令禁制其事不得為某事違者有罰之類所謂禁於未然者勑則是已結此事依條斷遣之類所謂治其已然者格令式在前勑在後則有教之不改而後誅之底意思今但欲尊勑字以勑居前令格式在後則與不教而殺者何異殊非當時本指又問伊川云介甫言類是八分書是他見得如此何故曰律是刑統此書甚好疑是歴代所有傳襲下來至周世宗命竇儀注解過名曰刑統即律也今世却不用律只用勑令大槩勑令之法皆重於刑統刑統與古法相近故曰八分書介甫之見畢竟髙於世俗之儒此亦伊川語因論祧廟及之儒用某事合當如何這謂之令如某功得㡬等賞某罪得㡬等罪這謂之格凡事有箇様子如今家保狀式之類這謂之式某事當如何斷某事當如何行這謂之勑今人呼為勑令格式㨿某㸔合呼為令格式勑勑是令格式所不行處故斷之以勑某在漳州曾編得户緡兩門法賀孫本合是先令而後勑先教後刑之意自荆公用事以來方定為勑令格式之序徳明唐藩鎮權重為朝廷之患今日州郡權輕却不能生事又却無以制盜賊或曰此亦縁介甫刮刷州郡太甚曰也不專是介甫且如仁宗時淮南盜賊發趙仲約知髙郵軍反以金帛牛酒使人買覔他去富鄭公欲誅其人范文正公謂他既無錢又無兵却教他將甚去殺賊得他和解得去不殘破州郡亦自好只是介甫後來又甚州郡禁軍有闕額處都不補錢糧盡欲解發歸朝廷謂之封樁闕額禁軍錢係提刑司管文蔚經制錢宣和間用兵經制使所創總制錢紹興初用兵總制使所創二人不記姓名應于税錢物雜色場務納錢每貫刻五十文作頭子錢括之為二色錢以分毫積計大計多况其大者闕經制錢陳亨伯所創盖因方臘反童貫討之亨伯為随軍轉運使朝廷以其權輕又重為經制使患軍用不足創為此名以收州縣之財當時大獲其利然立此制時明言軍罷而止其後遂因而不改至紹興四年韓球又創總制錢大畧倣經制為之十一年經界法行民間印契多倍有所得朝廷遂以此年立額至次年則其數大􅃜乃令州縣添補解發自後州縣大困朝廷亦知之議者乃請就三年中取中制以立額却不知中制者乃所添補之嵗其額猶為重也因仍至今頃年得江西憲時陛對曰亦嘗為孝宗言之盖此政是憲司職事又曰亨伯創經制錢時其兄弟有名某者勸止之不從乃率其子姪哭於家廟以為作俑之罪祖先將不祀矣廣徳粹語婺源納銀之弊方伯謨因問和買先生言其初曰今日惟紹興最重舊抛和買數時兩浙運使乃紹興人朝廷抛降三十萬匹與浙東紹興受十四萬是時都吏乃㑹稽縣人㑹稽又受多惟餘姚令不肯受為其民以瓦礫擲之不得已受歸而其數少恨不記其名滕云婺源乃汪内翰鄉邑汪知鄉郡朝廷初降月樁時㑹諸縣令于廷婺源令偶言丹楊鄉民頑汪本此鄉人以令為譏之先勒令受十分之四分三釐至於今為害先生曰疇昔創封樁時本無實數只是頼州縣且如常平中一項錢亦許樁數提舉司錢今日又解明日又解解必有限彼豈不來争以此觀之事皆係作始不是可學祖宗立法催科只是九分才破這一分便不催但破得一百貫謂之破分便住自曾丞相仲欽為户部時便不用這法須要催盡至今所以如此恪所在上供銀皆分配諸縣獨建寧因呉公路作憲筭就鹽綱上納雖是筭在綱上中間作舊科數諸縣甚者至科民間買納後沈公雅來却檢㑹前時行下指揮遂罷買上供銀道夫張定叟尚書云青城每郊用木十五萬緡縛幕屋事已撤去皆諸璫得之其費出於臨安渠知府日嘗奏乞從本府出錢盖屋庶免逐郊費用不從閎祖朱子語類卷一百二十八
