body:
  text: 朱子語類卷一百二十七本朝一太祖朝漢髙祖本朝太祖有聖人之材必大或言太祖受命盡除五代弊法用能易亂為治曰不然只是去其甚者其他法令條目多仍其舊大凡做事底人多是先其大綱其他節目可因則因此方是英雄手段如王介甫大綱都不曾理㑹却纎悉於細微之間所以弊也儒用問藝祖平定天下如破竹而河東獨難取何耶以為兵强則一時政事所為皆有敗亡之勢不知何故如此曰這却本是他家底郭威乗其主幼而奪之劉氏遂㨿有并州若使柴氏淂天下則劉氏必不服所以太祖以書喻之謂本與他無讎隙渠荅云不忍劉氏之不血食也此其意可見矣被他辭直理順了所以難取幹國初下江南一年攻城不下是時江州亦城守三年盖其國小君臣相親故能得人心如此因説先世理平公仕江南死事及此徳明因説今官府文移之煩先生曰國初時事甚簡徑無許多虚文嘗見太祖時樞宻院一卷公案行遣得簡徑畢竟英雄底人做事自别甚様索性聞畨中却如此文移極少且如駕過景靈宫差從官一人過盞子有甚難事只消宰相㸃下便了須要三省下吏部吏部下太常太常擬差申部部申省動是月十日不能得了所差又即是眼前人趙丞相在位甚有意要去此等弊然十不能去一二可見上下皆然太祖時公案乃是蜀中一州軍變後申來乞差􅃹攝軍馬樞宻院具已經差使使臣及未經差使姓名内一人姓樊注云樊愛能孫只有一人注此人清亷可使太祖就此人姓上㸃一㸃就下批四字云只教他去後面有券狀云雜随四人某甲某乙太祖又批其下云只帶兩人去小底二人某童某童大紫騮馬一疋并鞍轡小紫騮馬一疋并鞍轡太祖又批其下云不須帶紫騮馬只騎騮馬去又乞下銓曹疾速差知州後面有銓曹擬差狀約只隔得一二日又有到任申狀其兵馬監押纔到時其知州亦到了其行遣得簡徑健速如此雅秀才好立虚論事朝廷纔做一事閧閧地閧過了事又只休且如黄河事合即其處㸔其勢如何朝夕只在朝廷上閧河東決西決揚錄云害㡬多了此中論要導向處亦未住凡作一事皆然漢時在上重唐亦多為虚論所沮如憲宗討蔡不是憲宗如何做得刺武元衡傷裴度憲宗決為之乃成凡作一事皆然太祖當時亦無秀才全無許多閒説只是今日何處㸔脩器械明日何處㸔習水戰又明日何處教閲日日著實做故事成問開寳九年不待踰年而遂改元何也曰這是開國之初一時人材麄踈理㑹不得當時藝祖所以立得許多事也未有許多秀才説話牽制他到這般處又忒欠得㡬箇秀才説話幹太宗真宗朝才卿問秦漢以下無一人知講學明理所以無善治曰然因泛論歴代以及本朝太宗真宗之朝可以有為而不為太宗每日㸔太平廣記數卷若能推此心去講學那裏得來不過寫字作詩君臣之間以此度日而已真宗東封西祀縻費巨萬計不曾做得一事仁宗有意於為治不肯安於小成要做極治之事只是資質慈仁却不甚通曉用人驟進驟退終不曾做得一事然百姓戴之如父母契丹初陵中國後來却服仁宗之徳也是慈仁之效縁它至誠惻怛故能動人如此卓氣有盛衰盛時便做得未是亦不大段覺如真宗時遼人直至澶州旋又無事亦是氣正盛靖康時直㺯得到這般田地前漢如此之盛至光武再興亦只得三四分後來一切扶不起亦氣衰故揚仁宗朝問章獻不如宣仁然章獻輔仁宗後來却無事曰亦是仁宗資質好後來亦是太平日乆宫中太寛如雇乳母事宣仁不知此一事便反不及章獻可學英宗朝亞夫問濮議曰歐公説不是韓公曾公亮和之溫公王珪議是范鎮吕晦范純仁吕大防皆彈歐公但溫公又於濮王一邊禮數太薄須於中自有斟酌可也歐公之説斷不可且如今有為人後者一日所後之父與所生之父相對坐其子來喚所後父為父終不成又喚所生父為父這自是道理不可試坐仁宗於此亦坐濮王於此使英宗過焉終不成都喚兩人為父只縁衆人道是死後為鬼神不可考胡亂呼都不妨都不思道理不可如此先時仁宗有詔云朕皇兄濮安懿王之子猶朕之子也此甚分明當時只以此為㨿足矣亞夫問古禮自何壊起曰自定陶王時已壊了盖成帝不立弟中山王以為禮兄弟不得相入廟乃立定陶王盖子行也孔光以尚書盤庚殷之兄王争之不獲當時濮廟之争都是不争好好讀古禮見得古人意思為人後為之子其義甚詳賀孫濮議之争結殺在王陶擊韓公蔣之竒論歐公伊川代彭中丞奏議似亦未為允當其後無收殺只以濮國主其祀可見天理自然不由人安排方子前代許多大疑禮都措置未得如濮廟事英宗以皇伯之子入繼大統後只令嗣王奉祭祀天子則無文告賀孫神宗朝神宗鋭意為治用人便一向傾信他初用富鄭公甚傾信及論兵鄭公曰願陛下二十年不可道着用兵二字神宗只要做鄭公只要不做説不合後來傾信王介甫終是坐此病只􅃹好用兵用得又不著費了無限財榖殺了無限人殘民蠧物之政皆從此起西蕃小小擾邊只是打一陣退便了却去深入侵他疆界才奪得鄯州等空城便奏捷朝廷不審便命官發兵去守依舊只是空城城外皆是畨人及不能得歸朝廷又發兵去迎歸多少費力熈河之敗䘮兵十萬神宗臨朝大慟自得疾而終後來蔡京用事又以為不可棄用兵復不利又事幽燕此亦自神宗啟之遂至中朝傾覆反思鄭公之言豈不為天下至論義剛神宗極聰明於天下事無不通曉真不世出之主只是頭頭做得不中節拍如王介甫為相亦是不世出之資只縁學術不正當遂悞天下使神宗得一真儒而用之那裏得來此亦氣數使然天地生此人便有所偏了可惜可惜卓神宗大槩好用生事之人如呉居厚在京西括民買鑊官司鑄許多鑊令民四口買一五口則買二其後民怨㡬欲殺之呉覺而免然卒稱㫖其後如蔡京欲舉行神宗時政而所舉行者皆熈寧之政非元豐神祖自行之政也故了翁摭摘其失以為京但行得王安石之政而欺蔽不道實不曾紹復元豐之政也義剛神宗事事留心熈寧初闢闊京城至四十餘里盡修許多兵備每門作一庫以備守城如射法之屬皆造過但造得太文軍人剗地不曉義剛熈寧作陣法令將士讀之未厮殺時已被將官打得不成模様了義剛論及木圖云神宗大故留心邊事自古人主何曾恁地留心義剛神宗理㑹得文字極喜陳殿院師錫建人文嘗於太學中取其程文閲之每得則貯之錦囊中及殿試編排卷子奏御神宗疑非師錫之文從頭閲之至中間見一卷子曰此必陳某之文也寘之第三已而果然儒用溫公日錄中載厚陵事甚詳林子中雜記載裕陵事甚詳方子哲宗朝哲宗常使一舊桌子不好宣仁令換之又只如此再問之云是爹爹用底宣仁大慟知其有紹述意也又劉摯嘗進君子小人之名欲宣仁常常喻哲宗使知之宣仁曰常與孫子説然未曾了得宣仁亦是見其如此故皆不肯放下哲宗甚啣之紹述雖是其本意亦是激於此也揚哲宗春秋尚富平日寡言一旦講筵説書至乂用三徳發問云只是此三者還更有這也問得無情理然若有人㑹荅時就這裏推原却煞有好説話當時被忽然問後都荅不得義剛紹聖四年長安民家得秦璽改元元符是時下公卿雜議莫有知者李伯時號多識辨其果秦璽遂降八寳赦徳明徽宗朝欽聖當時諭宰執有廢劉再立孟之意曾子宣兩存之後蔡京以曾欲廢劉治之蔡為相弟卞為樞宻入文字謂任伯雨曾謂臣欲謀廢宣仁臣無此事欲案治遂治任伯雨其他一二十人當時言事官不及此事者亦因以治之揚徽廟初上蔡初召上殿問對語不少然上蔡云多不誠遂退只求監局之䫫去或謂建中年號與徳宗同不佳上蔡云恐亦不免一播後下獄事不知方徽宗因見星變即令衛士仆黨碑云莫待明日引得蔡京又來吵明日蔡以為言又下詔云今雖仆碑而黨籍却仍舊義剛蔡京謀取􅙉鄯費四千萬緡楊今㸔着徽宗朝事更無一着下得是古之大國之君猶有一二著下得是而大勢不可支吾那時更無一小著下得是使無金人之猖獗亦不能安以當時之勢不知有伊吕之才能轉得否恐也不可轉嘗試思之無著可下手事㺯得極了反為金人所持當初約女真同滅契丹既女真先滅了契丹王師到日惟有空城金帛子女已為女真席卷而去遂竭府庫問女真換此空城又以嵗幣二百萬貫而為每嵗空額是時帑藏空竭遂斂敷民間云免百姓往燕山打粮草每人科錢三十貫以充免役之費民無從得錢遂命監司郡守親自徵督必足而後已亦煞得錢共科得六百餘萬貫然奉金亦不多恣為用事者侵使更無稽攷及結局日任事者遂㷊簿歴朝廷亦不問又契丹相郭藥師以常勝軍來降朝廷處之河北諸路近邊塞上後又有契丹甚人來降亦有一軍名義勝軍亦處之河北諸路皆厚廩給是時中國已空竭而邊上屯戍之兵餼廩乆絶飢寒欲死而常勝義勝兩軍安坐而享厚祿故中國屯戍之兵数罵詈之云我為中國戰闘守禦㡬年矣今反受飢寒汝軰皆降蕃有何功而享厚俸久之兩邊遂相殺及後來金入中國常勝義勝兩軍先往降之二軍散處中國盡知河北諸路險要虚實去處遂為金鄉導長驅入中原又徽宗先與阿固達盟誓兩邊不得受叛降中國雖得契丹空城而無一人又逺屯戍中原之兵以守之飛芻轉餉不勝其擾又契丹敗亡餘將数数引兵來降朝廷又皆受之盖不受又恐其為盜金人已有怨言又金中有張㲄者知平州欲降徽宗親寫詔書以招之中間路往又為金所得而張㲄已來降矣金益怨又契丹亡國之主天祚者在金中徽宗又親寫招之若歸中國當以皇兄之禮相待賜甲第極所以奉飬者天祚大喜欲歸中國又為金所得天祚故為金人所殺由是金人大怒云始與我盟誓如此今乃寫詔書招納我叛亡遂移檄來責問檄外又有甚檄文極所以罵詈之語今實錄中皆不敢載徽宗大恐遂招引到張㲄來不柰何斬其首與金人又作道理分雪天祚之事遂啓其輕侮之心然阿固達却乖他常以守信義為説其諸將欲請起兵問罪阿固達每不可曰吾與大宋盟誓已定豈可敗盟夷狄猶能守信義而我之所以敗盟失信取怒於夷狄之類如此每讀其書㸔得人頭痛更無一版有一件事做得應節拍卓宣和内禪惟有呉敏有中橋居士記錄説得最詳銖老内侍黄節夫事徽宗言道人林靈素有幻術其實也無如溫革言見鬼神者皆稗官某不曾見所作天人示現記皆集衆人之妄史部親見節夫聞其言如此方子欽宗朝淵聖即位時日重暈相軋太祖陳橋即位時亦然淵聖即位三四日後昏霧四塞豈耿南仲邪説有以䝉蔽之乎揚欽宗勤儉慈仁出於天資當時親出詔荅所論事理皆是但於臣下賢否邪正辨别不分明又無剛健勇決之操纔説着用兵便恐懼遂致播遷之禍言之使人痛心如詔㫖付主帥論用兵事亦儘有商量處置但其後須有更當子細不可悞事之語又嘗在李先生家藥方冊子上見箇御筆其冊子是朝廷紙做乃是當時議臣中有請授祖宗科舉之法上既俞之矣明日耿南仲馮澥軰又論神宗法制當紹述不可改故降御筆云昨來因議臣論奏失於不審遂行出今得師傅大臣之言深合朕心所有前降㫖揮更不施行當時只縁紹述做得如此了猶且不悟故李伯紀煞與欽宗論説但却不合因綱罷而太學生及軍民伏闕乞留之自後君臣遂生間隙疑其軍民脅已方圍閉時降空名告身千餘道令其便冝補授其官上至節度使綱只書填了數名小使臣餘者悉􅌳回而欽宗已有近日人臣擅作威福漸不可長之語如此教人如何做事廣曰自漢唐來惟有本朝臣下最難做事故議論勝而功名少曰議論勝亦自仁廟後而蔓衍於熈豐若是太祖時雖有議論亦不過説當時欲行之事耳無許多閒言語也靖康所用依舊皆熈豐紹聖之黨欽宗欲褒贈溫公范純仁以畏徽廟遂抹純仁字改作仲淹遂贈文正太師揚言及靖康之禍曰本朝全盛之時如慶歴元祐間只是相共扶持這箇天下不敢做事不敢動被夷狄侮也只忍受不敢與較亦不敢施設一事方得天下稍寧積而至於靖康一旦所為如此安得天下不亂卓髙宗朝二聖北狩時遣曹真中道歸於背心生領上寫云可便即來救父母義剛胡明仲初召至揚州久之未得對忽聞鄰居有一衛士語一衛士云今夜次第去了胡聞之急去問之云官家亦去胡只聞得一句便歸呌僕糴數斗米造飯裹囊夜出候城門暗中見數騎出謂上也遂出逐後得舟渡江乃見一人擁氊坐石上乃上也揚渡揚州時煞殺了人那不得過來底切骨怨當時人骨肉相散失㳂路皆帖榜子店中都滿樹上都是這邊却放得㡬箇宦者恁地一日康履與諸宦者出觀潮帳設塞街軍人皆憤惋不平後成苗劉之變王淵也是善戰然未為有大功不及當時諸老將一旦簽書樞宻人皆不服一日早只見街上閧閧地人不敢開門從隙中窺但見人馬皆滿路見苗傅左手提得王淵頭右手提一劍以徇衆少頃盡宦官者逃在人家夾壁中底也一齊捉出來殺朱勝非却也未為大乖當時被苖劉做得來可畏了不柰何只得且隠忍去調䕶他却未㡬而義兵至這事便都休了是他無狀時不合説他調䕶甚有功被義兵來剗地壊了他事是他要自居其功這箇却乖當時若不殺了苗劉也無了當他若尚在那裏終是休不得義剛苗傅乃一愚夫劉正彦本文士先欲投中官唐某唐云子乃文臣吾其如子何子換武而來乃可劉既換武唐不顧之専主王淵正彦遂鼓扇傅是時命淵簽書武將皆憤怒故起此禍張魏公在平江湯東野作守有傳云除書到湯訪于魏公公云可遣一識文理人先去拆㸔乃遣教授行果明受赦是時恐諸軍變魏公乃與湯商量先搬出犒賞錢使人將舊赦書於樓上宣之既而韓世忠軍至遂同謀起兵吕丞相在建康推為盟主問朱丞相之功如何曰在城中亦只得如此但設有它變渠亦不能死節要之亦有功其後苖劉出走到臨平為魏公等所敗朱乃全諱此一節未是今朝天門乃是其所造隆祐自禁中乗簥以出金人䧟京師亦取隆祐適瑶華失火步歸孟氏得免可學苗傅并一姓張人不記其名乃教苗起事人走至武夷新村張諭人捉之苗衘之遂言於捉者曰某却是苗太尉然今捉某却是張則汝功已被張分之矣捉者即殺張時韓世忠收范汝為尚在建州韓欲得苗而其人乃􅄙送建守李李送行在韓勢盛遂入文字以苖為某得被其人奪了其捉人遂編管建守亦罷官其功遂為韓所揚文字所載皆言韓收苗但此中人知之以此知天下事多如此文字上如何可全信義云劉正彦結王淵王淵結康便更官者其事皆正彦教苖為之揚髙宗行達㑹稽樓寅亮待次某縣丞寓㑹稽村落中出奏書乞建儲髙宗時年二十六七大喜即日除監察御史遣黄院子懐勑牒物色授之中使至其家家人聞倉卒有聖恩以為得罪且死相與環泣寅亮出使者自懐中出勅命寅亮拜受與使者俱詣行在所此事國史不載先生嘗欲聞於太史俾之編入而不果每以為恨方子樓寅亮明州人太上朝入文字云自太宗傳子之後至今太祖之後有類庶姓者今金未悔過中原未復云云乞立太祖後承大統太上喜遂用樓為察院振曾光祖論及中興遺史載孟后過贑州時事與鄉老所傳甚合云太后至城中遭某賊放火城中且救火連日不止城外又有一隊賊來圍了城曰其時也是無䇿金人是破了潭州後過來分隊至諸州皆是緣港上來太后先至洪州時此間王修撰在彼作帥覺得事勢不是遂白扈駕執政太后乃去後三四日金果至王乃走城中百姓相率推一大寄居作首而降金進賢姓傅者言是李侍郎曰不必更説他名字又曰信州先降金撫州守姓王聞信守降亦降義剛先生脚疼卧息樓下吟咏杜子美古栢行三數遍賀孫侍立先生云偶㸔中興小記載勾龍如淵入争和議時言語若果有此言如何夾持前進以取中原最可恨者初來魏公既勸車駕到建康當紹興七年時金主已簒髙慶裔諸人相繼或誅或死劉豫既見疑於金二子又大敗而歸北方更無南向意如何魏公纔因吕祉事見黜趙丞相忽然一旦發回蹕臨安之議一坐定著竟不能動不知其意是如何因歎息久之云為大臣謀國一至於此自今觀之為大可恨若在建康則與中原氣勢相接北靣顧瞻則宗廟父兄生靈塗炭莫不在目雖欲自已有不能自已者惟是轉來臨安南北聲迹寖逺上下宴安都不覺得外靣事事變之來皆不及知此最利害方建康未回蹕時胡文定公方被召㳂江而下將去聞車駕已還臨安遂穪疾轉去㸔來若不在建康也是徒然出來做得甚事是時有陳無玷者字筠叟在荆鄂間為守聞車駕還臨安即令人齎錢酒之屬往接胡文定吏人云胡給事赴召去多日兼江面闊船多如何去尋得陳云江面雖闊都是下去船你但望見有逆水上來底船便是給事船已而果然當時講和本意上不為宗社下不為生靈中不為息兵待時只是怯懼為苟嵗月計從頭到尾大事小事無一件措置得是當然到今日所以長乆安寧者全是宗社之靈㸔當時措置可驚可笑賀孫建康形勢勝於臨安張魏公欲都建康適值淮西兵變魏公出而趙相入遂定都臨安饒東南論都所以必要都建康者以建康正諸方水道所湊一望則諸要害地都在面前有相應處臨安如入屋角房中坐視外靣殊不相應武昌亦不及建康然今之武昌非昔之武昌呉都武昌乃今武昌縣地勢迫窄只恃前一水為險耳鄂州正今之武昌亦是好形勢上可以通闗陜中可以向許洛下可以通山東若臨安進只可通得山東及淮北而已義剛前軰當南渡初有言定都建康者人云建康非昔之建康亦不可都雖勝似坐杭州如在深窟裏然要得出近外不若都鄂渚應接得蜀中上一邊事體㸔來其説也是如今杭州一向偏在東南終不濟事記得岳飛初勵兵於鄂渚有㫖令移鎮江陵飛大㑹諸將與謀徧問諸將皆以為可獨任士安不應飛頗怒之任曰大將所以移鎮江陵若是時某安敢不説某為見移鎮不是所以不敢言據某㸔這裏已自成規模已自好了此地可以阻險而守若往江陵則失長江之利非某之所敢知飛遂與申奏乞止留軍鄂渚建康舊都所以好却以石頭城為險此城之下上流之水湍急必渡得此水上這岸方得所以建業可守屯軍於此城之上金兵不可向矣賀孫建康形勢雄壯然攻破著淮則只隔一水欲進取則可都建康欲自守則莫若都臨安或問江陵曰江陵低在水中心全憑堤被他殺守堤之吏便乖那堤一年一次築只是土節張戒見髙宗髙宗問㡬時得見中原戒對曰古人居安思危陛下居危思安陳同父極愛此對方子太上曰朕恨不手斬耿南仲揚岳飛嘗面奏金人欲立欽宗子來南京欲以變換南人耳目乞皇子出閤以定民心時孝宗方十餘嵗髙宗云卿將兵在外此事非卿所當預是時有参議姓王者在候班見飛呈劄子時手震及飛退上謂王曰岳飛將兵在外却來干與此等事卿縁路來見他曾與甚麽人交王曰但見飛沿路學小書甚宻無人得知但以此推脱了但此等事甚緊切不知上何故恁地説如飛武人能慮及此亦大故是有見識某向來在朝與君舉商量欲拈出此等事㝷数件相類者一併上之將其後裔乞加些官爵以顯之未及而罷義剛范伯達如圭盡裒仁宗時論立英宗許多文字進呈一日太上謂陳康伯曰范某近進一文字亦好朕此意定已久遂命陳公論立太子事一時盡定振昭慈小不快髙廟問疾因話間曰有一事乆欲説與官家髙廟請其故曰宣仁廢立之説皆是子厚之徒撰造中間雖嘗辯白然載在國史者尚未嘗改可令史官重議刪脩以昭明聖母之徳於萬世時趙忠簡當國遂薦元祐故家子弟如范如圭數人方始改得正然亦頗有偏處才是元祐事便都是熈豐時事便都不是後趙罷張魏公繼之又欲脩改動盖魏公亦不甚主張元祐事令史官某等簽出未及改而又罷趙復相遂以為言而辭趙張因是有不協處是時又有人上書乞禁錮子厚子孫親戚者髙廟欲從之趙有文字説但禁其子孫足矣恐不可及其親戚上批以為省所奏可見仁恕更宜子細無貽後悔未㡬趙復罷謝祖信為諫官遂排擊之不遺餘力嶺表之貶實祖信之力也祖信邵武人乃子厚之壻因言當時若非髙廟要辯别邪正如此則一代史冊被他糊塗萬世何以取信廣太上出使時至磁州磁人不欲其往諫不從宗忠簡欲假神以拒之曰此有崔府君廟甚靈可以卜珓仍其廟有馬能如何遂入燒香其馬啣車輦等物塞了去路宗曰此可以見神之意矣遂止不往後太上感其事以為車輦是即位之兆不曾闗白中書只令内官就玉津園路口造崔府君廟令曹詠作記一日北使來秦出接過玉津園見歸之奏所見太廟不知是何神太上因語之秦曰金以為功今却歸功於神恐金使見之不便即日拆之秦全是倚金脅太上每取㫖時只是説過一日除周葵作何官太上曰周葵為彼官未乆且令在彼秦不應下來即批勅除之政府一人云適間上意未允秦曰此等事只是奏過便了遂除之取綦崇禮御批事徐惇立作一宰相拜罷記載其事秦欲毁之行文字令天下盡投官焚其書徐先不喜於秦矣又以此書懼不可言一日只見一使來下書并封文字一束徐視之乃直省舊吏送其所作書藁也小人中有好人如此揚璘錄云檜末年作事皆與光堯争勝光堯作崔府君廟於玉津園路口檜設計移之曹筠言水漲光堯逐之檜遂除他從官今上奏邊事檜遽闍其俸殿中侍御史周葵欲言户部尚書梁汝嘉梁結中書舍人林侍聘林宻禱於檜檜遂除周葵起居郎不待光堯應之便改除可學錄云周葵為御史欲按知臨安府某人某人遂結一從官厚於檜者曰端公將揺動公早朝其人遂直入檜幕中再三懇告檜先奏事遽擢葵為起居郎葵不得上至省中與某從官相見袖中出所欲上章奏乃是臨安尹某從官方悟其黠靖康建炎太上未立時有一宗室名叔向秦王位下人自山中出來招數十萬人欲為之忽太上即位南京欲歸朝廷然不肯以其兵與朝廷欲與宗澤其謀主陳烈曰大王若歸朝廷則當以其兵與朝廷不然即提兵過河迎復二聖叔向卒歸朝廷後亦加官之類拘於一寺中亦與陳烈官烈棄之而去竟不知所之烈去叔向隂被害揚張子韶人物甚偉髙廟時除講筵嘗有所奏陳上云朕只是一箇至誠張奏云陛下對羣臣時如此退居禁中時不知如何云亦只是箇誠又問對宫嬪時如何上方經營荅語間張便奏云只此便是不誠先生云髙宗容諫故臣下得以盡言張侍郎一生學佛此是用老禪機鋒徳明論及黄察院劾王醫師先生曰今此東百官宅乃王醫師芲園後來籍為百官宅直卿曰中貴只合令入大内住庶可免闗節之類先生曰他若出來外面與人打闗節也得更是今大内甚窄無去處便是而今都不是古古人置宦者正以他絶人道後可入宫今却皆有妻妾居大第都與常人無異這都不是出入又乗大轎記得京師全盛時百官皆只乗馬雖侍從亦乗馬惟是元老大臣老而有疾底方賜他乗轎然也尚辭遜未敢便乗今却百官不問大小盡乗轎而宦者將命之類皆乗轎見説北朝却不如此中貴出入宫禁只獨自若有命令只是自勒馬亦無人引裹一幞頭却取落兩隻脚在懐裏自勒馬去這却大故省徑且如祖宗朝百官都無屋住雖宰執亦是賃屋自神宗置東西府宰相方有第今却宦者亦作大屋以祖宗全盛之天下而猶省費如此今却不及祖宗天下之半而耗費却如此安得不空乏義剛逆亮臨江百官中不挈家走者惟陳魯公與黄瑞明耳是時廖剛請駕幸閩中以為閩中天險人民忠義是時閩中盜賊正充斥乃降㫖令開閩中路闊丈五尺又宿州之戰髙宗已遜位日雇夫五百人立殿廷下人日支一千足各偹擔索髙宗懲維揚之禍故百官搬家者皆不問揚錄云逆亮犯順時朝士皆辦去惟陳魯公黄通老不動當時亦有言者令止之太上曰任之揚州時悔不先令其去多壊了人問庚辰親征詔舊聞出於洪景盧之手近施慶之云劉共甫實為之乃翁嘗從共甫見其草本未知孰是曰是時陳魯公當國命二公人為一詔後遂合二公之文而一之前段用景盧者後段用共甫者問此詔如何曰亦做得欠商量盖名義未正故也記得汪丈嘗以此相問某荅曰此只當以淵聖為辭盖前時屈己請和也猶以鸞輅在北之故今其禍變若此天下之所痛憤復􅄷之義自不容己以此播告則名正言順如八陵廢祀等説此事隔闊已久許多時去那裏來儒用孝宗朝孝宗小年極鈍髙宗一日出對廷臣云夜來不得睡或問何故云㸔小兒子讀書凡二三百遍更念不得甚以為憂某人進云帝王之學只要知興亡治亂初不在記誦上意方少解後來却恁聰明試文字有不如法者舉官必被責邵武某人作省元五母鷄用畆字孝宗大怒欲駁放了後又不行問夀皇為皇子本末曰本一上殿官樓寅亮上言舉英宗故事且謂太祖受命而子孫無為帝王者當於太祖之下選一人飬宮中他日皇子生只添一節度使耳繼除臺官趙忠簡遂力贊於外當時宫中亦有齟齬故飬兩人後來皆是髙宗自主張未禪位前數日忽批云宗室其可追贈秀王諡安喜先已安排了若不然夀皇如何處置可學髙宗將禪位先追贈秀王可謂能盡父子之道者矣僴髙宗初張魏公奏事論恢復中外皆言上神武不可及後來講和了便休夀皇初年要恢復只要年嵗做成問夀皇時人才已不及髙宗時曰髙宗也無人當時有許多有名底人而今㸔也只如此問岳侯若做事何如張韓曰張韓所不及却是它識道理了又問岳侯以上者當時有誰曰次第無人胡泳上初恢復之志甚鋭及符離之敗上方大慟曰將謂畨人易殺遂用湯思退再和之後又敗盟揚夀皇合下若有一人夾持定十五六年做多少事道夫夀皇直是有志於天下要用人嘗歎自家不如箇孫仲謀能得許多人賀孫某嘗謂士大夫不能盡言於夀皇真為自負蓋夀皇儘受人言未嘗有怒色但不樂時止與人分䟽辨析爾道夫夀皇晚來極為和易某嘗因奏對言檢旱天語云檢放之弊惟在於後時而失實只這四字盡得其要領又言經緫制錢則曰聞巧為名色以取之民其於天下事極為諳悉道夫問或言孝宗於内殿置御屏書天下監司帥臣郡守姓名作揭貼于其上果否曰有之孝宗是甚次第英武劉共甫奏事便殿嘗見一馬在殿廷間不動疑之一日問王公明公明曰此刻木為之者上萬㡬之暇即御之以習據鞍騎射故也又曰某嘗以浙東常平事入見奏及賑荒上曰其弊只在後時失實此四字極切荒政之病儒用嵗旱夀皇禁中祈雨有應一日引宰執入見恭父奏云此固陛下至誠感通然天人之際其近如此若他事一有不至則其應亦當如此願陛下深加聖慮則天下幸甚恭父斯語頗得大臣體因言梁丞相白蓮事道夫因言孝宗末年之政先生曰某嘗作孝宗挽辭得一聫云乾坤歸獨御日月要重光雉因論夀皇最後所用宰執多是庸人如某人不知於上前説何事可學云某人却除大職名與小郡又有被批出與職名外恁却是知他不足取曰夀皇本英鋭於此等皆照見只是向前為人所誤後來欲安静厭人喚起事端且如此打過至於大甚則又厭之正如惡駿馬之奔踶而求一善馬騎之至其駑鈍不前則又不免加以鞭䇿薛補闕曾及某人夀皇云亦屡以意導之而不去舉此亦可見大抵作事不出於義理而出于血氣乆之未有不消鑠者向來封事中亦嘗言此可學髙宗大行夀皇三年戴布幞頭着衣衫遵行古禮可謂上正千年之失當時宰相不學三日後便服朝服雖夀皇謙徳不欲以此喻羣臣然臣子自不當如此可謂有父子而無君臣賜孝宗居髙宗䘮常朝時裹白幞頭著布袍當時臣下却依舊著紫衫周洪道要著涼衫王季海不肯止於紫衫上繫皂帶今上登極常時著白綾背子臣下却著涼衫頗不失禮而君之服遂失其舊人傑廣錄云今上居孝宗䘮臣下都著涼衫方正得臣為君服人主之服却有未盡頃在潭州聞孝宗訃三日後易服心下殊不稳不免使人傳語官員且著涼衫後來朝廷行下文字來方始敢出榜曉示寧宗朝上即位踰月留揆以一二事忤㫖特批逐之人方服其英斷先生被召至上饒聞之有憂色曰人心易驕如此某今方知可懼黄問曰某人專恣當逐何懼之有曰大臣進退亦當存其體貎豈宜如此又問恐是廟堂諸公難其去故以此勸上逐之曰亦不可如此何不使其徒諭之以物論不唯恐丞相久勞機務或欲均佚俟其請去而後許之則善矣幼主新立豈可導之以輕逐大臣耶且如陳源之徒論其罪惡須是斬之乃善然人主新立復教以殺人某亦不敢如此做也至向改慶元年號時先擬隆平某云向來改隆興時有人議破以為隆字近降字今既説破則不可用又曰淳熈本作純字時人有言此字必改言未既而改文字至盖純字有屯字在旁又曰真宗時揚大年擬進豐亨字上曰為子不了不用義剛朱子語類卷一百二十七
