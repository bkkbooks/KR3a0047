body:
  text: 朱子語類卷一百三十九論文上有治世之文有衰世之文有亂世之文六經治世之文也如國語委靡繁絮真衰世之文耳是時語言議論如此冝乎周之不能振起也至扵亂世之文則戰國是也然有英偉氣非衰世國語之文之比也饒録云國語說得絮只是氣衰又不如戰國文字更有些精彩楚漢間文字真是竒偉豈易及也又曰國語文字極困善振作不起戰國文字豪傑便見事情非你殺我則我殺你黄云觀一時氣象如此如何遏捺得住所以啟漢家之治也僩楚詞不甚怨君今被諸家解得都成怨君不成模様九歌是托神以為君言人間隔不可企及如已不得親近扵君之意以此觀之他便不是怨君至山鬼篇不可以君為山鬼又倒説山鬼欲親人而不可得之意今人解文字不㸔大意只逐句解意却不貫楚詞問離騷卜居篇内字曰字義從来曉不得但以意㸔可見如突梯滑稽只是軟熟逢迎随人倒随人起底意思如這般文字更無些小窒礙想只是信口恁地說皆自成文林艾軒甞云班固揚雄以下皆是做文字已前如司馬遷司馬相如等只是恁地說出今㸔来是如此古人有取扵登髙能賦這也須是敏須是㑹說得通暢如古者或以言揚說得也是一件事後世只就紙上做如就紙上做則班揚便不如己前文字當時如蘇秦張儀都是㑹說史記所載想皆是當時說出又云漢末以後只做屬對文字直至後来只管弱如蘇頲著力要變變不得直至韓文公出来盡掃去了方做成古文然亦止做得未屬對合偶以前體格然當時亦無人信他故其文亦變不盡纔有一二大儒略相效以下並只依舊到得陸宣公奏議只是䨇闗做去又如子厚亦自有䨇闗之文向来道是他初年文字後将年譜㸔乃是晚年文字盖是他效世間模様做則劇耳文氣衰弱直至五代竟無能變到尹師魯歐公幾人出来一向變了其間亦有欲變而不能者然大槩都要變所以做古文自是古文四六自是四六却不滚雜賀孫楚些沈存中以些為呪語如今釋子念娑婆訶三合聲而巫人之禱亦有此聲此却說得好盖今人只求之於雅而不求之於俗故下一半都曉不得道夫離騷叶韻到篇終前面只發兩例後人不曉却謂只此兩韻如此至楚詞注下事皆無這事是他曉不得後却就這語意撰一件事為證都失了他那正意如淮南子山海經皆是如此義剛髙斗南解楚詞引瑞應圖周子充說館閣中有此書引得好他更不問義理之是非但有出處便說好且如天問云啟棘賔商山海經以為啟上三嬪于天因得九歎九辨以歸如此是天亦好色也栁子厚天對以為胷嬪說天以此樂相博換得某以為棘字是夣字商字是古文篆天字如鄭康成解記衣衰作齊衰云是壊字也此亦是擦壊了盖啟夣賔天如趙簡子夣上帝之類賔天是為之賔天與之以是樂也今人不曾讀古書如這般等䖏一回恁地過了陶淵明詩形夭無千嵗曽氏攷山海經云當作形天舞干戚㸔来是如此周子充不以為然言只是說精衛也此又不用出處了䕫孫古人文章大率只是平說而意自長後人文章務意多而酸澁如離騷初無竒字只恁說将去自是好後来如魯直恁地著力做却自是不好方子道夫録云古今擬騷之作惟魯直為無謂古賦雖熟㸔屈宋韓栁所作乃有進歩䖏入本朝来騷學殆絶秦黄晁張之徒不足學也雉荀卿諸賦縝宻盛得水住歐公蟬賦其名曰蟬這数句也無味雉楚詞平易後人學做者反艱深了都不可曉漢初賈誼之文質實晁錯說利害䖏好答制策便亂道董仲舒之文緩弱其答賢良䇿不答所問切䖏至無𦂳要䖏又累數百言東漢文章尤更不如漸漸趨扵對偶如楊震輩皆尚䜟緯張平子非之然平子之意又却理㑹風角鳥占何愈扵䜟緯陵夷至扵三國兩晉則文氣日卑矣古人作文作詩多是模倣前人而作之盖學之既乆自然純熟如相如封禪書模倣極多栁子厚見其如此却作貞符以反之然其文體亦不免乎蹈襲也人傑漢文司馬遷文雄健意思不帖帖有戰國文氣象賈誼文亦然老蘇文亦雄健似此皆有不帖帖意仲舒文實劉向文又較實亦好無些虗氣象比之仲舒仲舒較滋潤發揮大抵武帝以前文雄健武帝以後便實到杜欽谷永書又太弱無歸宿了匡衡書多有好䖏漢明經中皆不似此淳仲舒文大槩好然也無精彩淳林艾軒云司馬相如賦之聖者揚子雲班孟堅只填得他腔子佐録作腔子滿如何得似他自在流出左太沖張平子竭盡氣力又更不及可學問吕舍人言古文衰自谷永曰何止谷永鄒陽獄中書已自皆作對子了又問司馬相如賦似作之甚易曰然又問髙適焚舟決勝賦甚淺陋曰文選齊梁間江揔之徒賦皆不好了因說神宗修汴城成甚喜曰前代有所作時皆有賦周美成聞之遂撰汴都賦進上大喜因朝降出宰相每有文字降出時即合誦一遍宰相不知是誰知古賦中必有難字遂傳與第二人以次傳至尚書右丞王和甫下無人矣和甫即展開琅然誦一遍上喜既退同列問如何識許多字和甫曰某也只是讀傍文揚録作一邉吕編文鑑要尋一篇賦冠其首又以美成賦不甚好遂以梁周翰五鳯樓賦為首美成賦亦在其後賔戲解嘲劇秦貞符諸文字皆祖宋玉之文進學解亦此類陽春白雪云云者不記其名皆非佳文揚夜来鄭文振問西漢文章與韓退之諸公文章如何某說而今難説便與公說某人優某人劣公亦未必信得及須是自㸔得這一人文字某䖏好某處有病識得破了却㸔那一人文字便見優劣如何若㸔這一人文字未破如何定得優劣便説與公優劣公亦如何便見其優劣䖏但子細自㸔自識得破而今人所以識古人文字不破只是不曾子細㸔又兼是先将自家意思横在胷次所以見従那偏處去説出来也都是横說又曰人做文章若是子細㸔得一般文字熟少間做出文字意思語脉自是相似讀得韓文熟便做出韓文底文字讀得蘇文熟便做出蘇文底文字若不曾子細㸔少間却不得用向來初見擬古詩將謂只是學古人之詩元來却是如古人說灼灼園中花自家也做一句如此遲遲澗畔松自家也做一句如此磊磊澗中石自家也做一句如此人生天地間自家也做一句如此意思語脉皆要似他底只換却字某後來依如此做得二三十首詩便覺得長進盖意思句語血脉勢向皆效它底大率古人文章皆是行正路後來杜撰底皆是行狭隘邪路去了而今只是依正底路脉做将去少間文章自㑹髙人又云蘇子由有一段論人做文章自有合用底字只是下不著又如鄭齊叔云做文字自有穏底字只是人思量不著横渠云發明道理惟命字難要之做文字下字實是難不知聖人說出來底也只是這㡬字如何鋪排得恁地安穏或曰子瞻云都來這㡬字只要㑹安排然而人之文章也只是三十嵗以前氣格都定但有精與未精耳然而掉了底便荒䟽只管用功底又較精向見韓無咎說它晚年做底文字與他三十嵗以前做底文字不甚相逺此是他自驗得如此人到五十嵗不是理㑹文章時節前面事多日子少了若後生時每日便偷一兩時閒做這般工夫若晚年如何有工夫及此或曰人之晚年知識却㑹長進曰也是後生時都定便長進也不㑹多然而能用心扵學問底便㑹長進若不學問只縦其客氣底亦如何㑹長進日見昬了有人後生氣盛時說盡萬千道理晚年只恁地闒靸底或引程先生曰人不學便老而衰曰只這一句說盡了又云某人晚年日夜去讀書某人戲之曰吾丈年老讀書也須還讀得入不知得入如何得出謂其不能發揮出来為做文章之用也其說雖麄似有理又云人晚年做文章如秃筆冩字全無鋒鋭可觀又云某四十以前尚要學人做文章後來亦不暇及此矣然而後来做底文字便只是二十左右嵗做底文字又云劉季章近有書云他近來㸔文字覺得心平正某答他令更掉了這箇虗心㸔文字盖他向来便是硬自執他說而今又是将這一説來罩正是未理㑹得在大率江西人都是硬執他底横説如王介甫陸子静都只是横説且如陸子静說文帝不如武帝豈不是横説又云介甫諸公取人如資質淳厚底他便不取㸔文字穏底他便不取如那決裂底他便取說他轉時易大率都是硬執他底燾張以道曰眄庭柯以怡顔眄讀如俛讀作盻者非義剛韓文力量不如漢文漢文不如先秦戰國揚大率文章盛則國家却衰如唐貞觀開元都無文章及韓昌黎栁河東以文顯而唐之治已不如前矣汪聖錫云國初制詔雖粗却甚好又如漢髙八年詔與文帝即位詔只三數句今人敷衍許多無過只是此箇柱子若海韓栁先生方修韓文考異而學者至因曰韓退之議論正規模闊大然不如栁子厚較精宻如辨鶡冠子及說列子在荘子前及非國語之類辨得皆是黄達才言栁文較古曰栁文是較古但却易學學便似他不似韓文規模闊學栁文也得但㑹衰了人文字義剛䕫孫録云韓文大綱好栁文論事却較精覈如辨鶡冠子之類非國語中儘有好處但韓難學栁易學揚因論韓文公謂如何用功了方能辨古書之真偽曰鶡冠子亦不曾辨得栁子厚謂其書乃冩賈誼鵩賦之類故只有此處好其他皆不好栁子厚㸔得文字精以其人刻深故如此韓較有些王道意思每事較含洪便不能如此揚退之要說道理又要雜劇有平易䖏極平易有險竒處極險竒且教他在潮州時好止住得一年栁子厚却得永州力也栁學人處便絶似平淮西雅之類甚似詩詩學陶者便似陶韓亦不必如此自有好䖏如平淮西碑好揚陳仲蔚問韓文禘祫議説獻懿二廟之事當否曰說得好其中所謂興聖廟者乃是涼武昭王之廟乃唐之始祖然唐又封臯陶為帝又尊老子為祖更無理㑹又問韓栁二家文體孰正曰栁文亦自髙古但不甚醇正又問子厚論封建是否曰子厚說封建非聖人意也勢也亦是但說到後面有偏䖏後人辨之者亦失之太過如廖氏所論封建排子厚太過且封建自古便有聖人但因自然之理勢而封之乃見聖人之公心且如周封康叔之類亦是古有此制因其有功有徳有親當封而封之却不是聖人有不得已處若如子厚所說乃是聖人欲吞之而不可得乃無可奈何而為此不知所謂勢者乃自然之理勢非不得已之勢也且如射王中肩之事乃是周末征伐自諸侯出故有此等事使征伐自天子出安得有是事然封建諸侯却大故難制御且如今日蠻洞能有幾大若不循理朝廷亦無如之何若古時有許多國自是難制如隠公時原之一邑乃周王不奈他何賜與鄭鄭不能制到晉文公時周人将與晉而原又不服故晉文公伐原且原之為邑甚小又在東周王城之側而周王與晉鄭俱不能制盖渠自有兵不似今日太守有不法處便可以降官放罷古者大率動便是征伐所以孟子曰三不朝則六師移之在周官時已是如此了便是古今事勢不同便是難說因言孟子所謂五等之地與周禮不同孟子葢說夏以前之制周禮乃是成周之制如當時封周公於魯乃七百里於齊尤闊如所謂東至於海西至於河南至於穆陵北至於無棣以地理考之大段闊所以禹在塗山萬國來朝至周初但千八百國又曰譬如一樹枝葉太繁時本根自是衰枯如秦始皇則欲削去枝葉而自留一榦亦自不可義剛有一等人専扵為文不去讀聖賢書又有一等人知讀聖賢書亦自㑹作文到得說聖賢書却别做一箇詫異模様說不知古人為文大抵只如此那得許多詫異韓文公詩文冠當時後世未易及到他上宰相書用菁菁者莪詩注一齊都冩在裏面若是他自作文豈肯如此作最是說載沉載浮沉浮皆載也可笑載是助語分明彼如此説了他又如此用賀孫韓文退之除崔羣侍郎制最好但只有此制别更無不知如何義剛或問伯夷頌萬世標準與特立獨行雖足以明君臣之大義適權通變又當循夫理之當然者也先生曰說開了當云雖武王周公為萬世標準然伯夷叔齊惟自特立不顧又曰古本云一凡人沮之譽之與彼夫聖人是一對其文意尤有力椿退之送陳彤秀才序多一不字舊嘗疑之只㸔過了後見謝子暢家本乃後山傳歐陽本圏了此不字韓退之墓誌有怪者先生喜韓文宴喜亭記及韓𢎞碑碑老年筆方唐僧多從士大夫之有名者討詩文以自華如退之送文暢序中所說又如劉禹錫自有一卷送僧詩或云退之雖闢佛也多要引接僧徒曰固是他所引者又却都是那破頼底僧如靈師惠師之徒及晚年見大顛扵海上說得來闊大勝妙自然不得不服人多要出脫退之也不消得恐亦有此理也廣先軰好做詩與僧僧多是求人詩序送行劉禹錫文集自有一冊送僧詩韓文公亦多與僧交渉又不曾見好僧都破落户然各家亦被韓文公說得也狼狽文公多只見這般僧後却撞着一箇大顛也是異事人多説道被大顛說下了亦有此理是文公不曾理㑹他病痛被他纔説得髙便道是好了所以有頗聦明識道理實能外形骸以理自勝之語賀孫才卿問韓文李漢序頭一句甚好曰公道好某㸔來有病陳曰文者貫道之器且如六經是文其中所說皆是這道理如何有病曰不然這文皆是從道中流出豈有文反能貫道之理文是文道是道文只如喫飯時下飯耳若以文貫道却是把本為末以末為本可乎其後作文者皆是如此因說蘇文害正道甚於老佛且如易所謂利者義之和却解為義無利則不和故必以利濟義然後合扵人情若如此非惟失聖言之本指又且䧟溺其心先生正色曰某在當時必與他辯却笑曰必被他無禮方栁文局促有許多物事却要就些子䖏安排簡而不古更說些也不妨封建論并數長書是其好文合尖氣短如人火忙火急來說不及又便了了揚栁文栁子厚文有所模倣者極精如自解諸書是倣司馬遷與任安書劉原父作文便有所倣宫沉羽振錦心繡口栁子厚語璘韓千變萬化無心變歐有心變杜祁公墓誌說一件未了又說一件韓董晉行状尚稍長權徳輿作宰相神道碑只一板許歐蘇便長了蘇體只是一類栁伐原議極局促不好東萊不知如何喜之陳後山文如仁宗飛白書記大段好曲折亦好墓誌亦好有典有則方是文章其他文亦有太局促不好者如題太白像髙軒過古詩是晚年做到平易䖏髙軒過恐是絶筆又一條云後山仁宗飛白書記其文曲折甚多過得自在不如栁之局促緫論韓栁歐蘇諸公東坡文字明快老蘇文雄渾儘有好䖏如歐公曾南豐韓昌黎之文豈可不㸔栁文雖不全好亦當擇合數家之文擇之無二百篇下此則不須㸔恐低了人手段但採他好䖏以為議論足矣若班馬孟子則是大底文字道夫韓文髙歐陽文可學曾文一字挨一字謹嚴然太迫又云今人學文者何曾作得一篇枉費了許多氣力大意主乎學問以明理則自然發為好文章詩亦然國初文章皆嚴重老成嘗觀嘉祐以前誥詞等言語有甚拙者而其人才皆是當世有名之士盖其文雖拙而其辭謹重有欲工而不能之意所以風俗渾厚至歐公文字好底便十分好然猶有甚拙底未散得他和氣到東坡文字便已馳騁忒巧了及宣政間則窮極華麗都散了和氣所以聖人取先進扵禮樂意思自是如此國朝文劉子澄言本朝只有四篇文字好太極圖西銘易傳序春秋傳序因言杜詩亦何用曰是無意思大部小部無萬數益得人甚事因傷時文之弊謂張才叔書義好自靖人自獻扵先王義胡明仲醉後每誦之又謂劉棠舜不窮其民論好歐公甚喜之其後姚孝寧易義亦好夀昌録云或問太極西銘曰自孟子以後方見有此两篇文章李泰伯文實得之經中雖淺然皆自大䖏起議論首卷潛書民言好如古潛夫論之類周禮論好如宰相掌人主飲食男女事某意如此今其論皆然文字氣象大段好甚使人愛之亦可見其時節方興如此好老蘇父子自史中戰國䇿得之故皆自小處起議論歐公喜之李不軟貼不為所喜范文正公好處歐不及李晚年須參道有一記說達摩宗𣲖甚詳須是大段去參究来又曰以李視今日之文如三日新婦然某人軰文字乃蛇鼠之見先生讀宋景文張廵賛曰其文自成一家景文亦服人甞見其寫六一瀧岡阡表二句云求其生而不得則死者與我皆無恨也温公文字中多取荀卿助語六一文一倡三歎今人是如何作文六一文有斷續不接處如少了字模様如秘演詩集序喜為歌詩以自娱十年間两節不接六一居士傳意凢文弱仁宗飛白書記文不佳制誥首尾四六皆治平間所作非其得意者恐當時亦被人催促加以文思緩不及子細不知如何然有紆餘曲折辭少意多玩味不能已者又非辭意一直者比黄夣升墓誌極好問先生所喜者云豐樂亭記楊陳同父好讀六一文甞編百十篇作一集今刋行豐樂亭記是六一文之最佳者却編在拾遺歐公文字鋒刄利文字好議論亦好甞有詩云玉顔自古為身累肉食何人為國謀以詩言之是第一等好詩以議論言之是第一等議論拱夀敬夫文字不甚改改後往往反不好亞夫曰歐公文字愈改愈好曰亦有改不盡處如五代史宦者傳末句云然不可不戒當時必有載張承業等事在此故曰然不可不戒後既不欲載之扵此而移之扵後則此句當改偶忘削去故也方子因改謝表曰作文自有穏字古之能文者纔用便用著這様字如今不免去捜索修改又言歐公為蒋穎叔軰所誣既得辨明謝表中自叙一段只是自胷中流出更無些窒礙此文章之妙也又曰歐公文亦多是修改到妙處頃有人買饒録作見得他醉翁亭記藁初説滁州四面有山凡數十字末後改定只曰環滁皆山也五字而已饒録云有數十字序滁州之山忽大圈了一邊注環滁皆山也一句如尋常不經思慮信意所作言語亦有絶不成文理者不知如何廣前軰見人皆通文字先生在同安甞見六一與人文字三卷子是以平日所作詩文之類楷書以獻之振歐公文章及三蘇文好處只是平易說道理初不曾使差異底字換却那尋常底字儒用文字到歐曾蘇道理到二程方是暢荆公文暗歐公文字敷腴温潤曾南豐文字又更峻潔雖議論有淺近處然却平正好到得東坡便傷扵巧議論有不正當處後来到中原見歐公諸人了文字方稍平老蘇尤甚大抵已前文字都平正人亦不㑹大段巧說自三蘇文出學者始日趨扵巧如李泰伯文尚平正明白然亦已自有些巧了廣問荆公之文如何曰他却似南豐文但比南豐文亦巧荆公曾作許氏世譜冩與歐公㸔歐公一日因曝書見了将㸔不記是誰作意中以為荆公作又曰介甫不解做得恁地恐是曽子固所作廣又問後山文如何曰後山煞有好文字如黄樓銘館職䇿皆好又舉數句説人不怨暗君怨明君䖏以為說得好廣又問後山是宗南豐文否曰他自說曽見南豐于襄漢間後見一文字說南豐過荆襄後山携所作以謁之南豐一見愛之因留欵語適欲作一文字事多因托後山為之且授以意後山文思亦澁窮日之力方成僅数百言明日以呈南豐南豐云大略也好只是冗字多不知可為略刪動否後山因請改竄但見南豐就坐取筆抹數處每抹䖏連一两行便以授後山凡削去一二百字後山讀之則其意尤完因嘆服遂以為法所以後山文字簡潔如此廣因舉秦丞相教其子孫作文說中說後山䖏曰他都記錯了南豐入史館時止為檢討官是時後山尚未有官後來入史館嘗薦邢和叔雖亦有意薦後山以其未有官而止廣揚録云秦作后山叙謂南豐辟陳為史官陳元祐間始得官秦說誤因言文士之失曰今曉得義理底人少間被物慾激搏猶自一强一弱一勝一負如文章之士下梢頭都靠不得且如歐陽公初間做本論其説已自大段拙了然猶是一片好文章有頭尾它不過欲封建井田與冠婚喪祭蒐田燕饗之禮使民朝夕從事扵此少間無工夫被佛氏引去自然可變其計可謂拙矣然猶是正當議論也到得晚年自做六一居士𫝊冝其所得如何却只說有書一千卷集古録一千卷琴一張酒一壺碁一局與一老人為六更不成說話分明是自納敗闕如東坡一生讀盡天下書說無限道理到得晚年過海做昌化峻靈王廟碑引唐肅宗時一尼恍惚升天見上帝以寳玉十三枚賜之云中國有大災以此鎮之今此山如此意其必有寳云云更不成議論似喪心人說話其他人無知如此說尚不妨你平日自視為如何說盡道理却說出這般話是可怪否觀扵海者難為水㳺扵聖人之門者難為言分明是如此了便㸔他們這般文字不入僴問坡文不可以道理并全篇㸔但當㸔其大者曰東坡文說得透南豐亦說得透如人㑹相論底一齊指摘說盡了歐公不盡說含蓄無盡意又好因謂張定夫言南豐祕閣諸序好曰那文字正是好峻靈王廟碑無見識伏波廟碑亦無意思伏波當時蹤跡在廣西不在彼中記中全無發明揚曰不可以道理㸔他然二碑筆健曰然又問潜真閣銘好曰這般閒戲文字便好雅正底文字便不好如韓文公廟碑之類初㸔甚好讀子細㸃檢踈漏甚多又曰東坡令其姪學渠兄弟蚤年應舉時文字揚人老氣衰文亦衰歐陽公作古文力變舊習老来照管不到為某詩序文四六對偶依舊是五代文習東坡晚年文雖健不衰然亦䟽魯如南安軍學記海外歸作而有弟子揚觶序㸃者三之語序㸃是人姓名其䟽如此淳六一記菱谿石東坡記六菩薩皆寓意防人取去然氣象不類如此老蘇之文髙只議論乖角燾老蘇文字初亦喜看看後覺得自家意思都不正當以此知人不可㸔此等文字固冝以歐曾文字為正東坡子由晚年文字不然然又皆議論衰了東坡初進䇿時只是老蘇議論坡文雄健有餘只下字亦有不貼實䖏道夫坡文只是大勢好不可逐一字去㸃檢義剛東坡墨君堂記只起頭不合說破竹字不然便似毛穎傳必大東坡歐陽公文集叙只恁地文章儘好但要說道理便㸔不得首尾皆不相應起頭甚麽様大末後却說詩賦似李白記事似司馬遷賀孫統領商榮以温公神道碑為餉先生命吏約道夫同視且曰坡公此文說得来恰似山摧石裂道夫問不知既說誠何故又說一曰這便是他㸔道理不破處頃之直卿至復問若說誠之則說一亦不妨否曰不用恁地說盖誠則自能一問大凡作這般文字不知還有布置否曰㸔他也只是據他一直恁地說將去初無布置如此等文字方其説起頭時自未知後面說甚麽在以手指中間曰到這裏自說盡無可説了却忽然說起來如退之南豐之文却是布置某舊㸔二家之文復㸔坡文覺得一段中欠了句一句中欠了字又曰向甞聞東坡作韓文公廟碑一日思得頗乆饒録云不能得一起頭起行百十遭忽得兩句云匹夫而為百世師一言而為天下法遂掃将去道夫問㸔老蘇文似勝坡公黄門之文又不及東坡曰黄門之文衰逺不及也只有黄樓賦一篇爾道夫因言歐陽公文平淡曰雖平淡其中却自美麗有好䖏有不可及䖏却不是闒茸無意思又曰歐文如賔主相見平心定氣說好話相似坡公文如說不辦後對人閙相似都無恁地安詳蜚卿問范太史文曰他只是㩀見定說将去也無甚做作如唐鑑雖是好文字然多照管不及評論緫意不盡只是文字本體好然無精神所以有照管不到處無氣力到後面多脱了道夫因問黄門古史一書曰此書儘有好處道夫曰如他論西門豹投巫事以為他本循良之吏馬遷列之扵滑稽不當似此議論甚合人情曰然古史中多有好處如論荘子三四篇譏議夫子䖏以為決非荘子之書乃是後人截㫁荘子本文攙入此其考據甚精宻由今觀之荘子此數篇亦甚鄙俚道夫或問蘇子由之文比東坡稍近理否曰亦有甚道理但其說利害處東坡文字較明白子由文字不甚分曉要之學術只一般因言東坡所薦引之人多輕儇之士若使東坡為相則此等人定皆布滿要路國家如何得安静賀孫諸公祭温公文只有子由文好歐公大段推許梅聖俞所注孫子㸔得来如何得似杜牧注底好以此見歐公有不公䖏或曰聖俞長扵詩曰詩亦不得謂之好或曰其詩亦平淡曰他不是平淡乃是枯槁拱壽范淳夫文字純粹下一箇字便是合當下一箇字東坡所以服他東坡輕文字不将為事若做文字時只是胡亂冩去如後面恰似少後添節後来如汪聖錫制誥有温潤之氣曾問某人前軰四六語孰佳荅云莫如范淳夫因舉作某王加恩制云周尊公旦地居四輔之先漢重王蒼位列三公之上若昔仁祖尊事荆王顧予沖人敢後茲典自然平正典重彼工扵四六者却不能及徳明劉原父才思極多湧将出来每作文多法古絶相似有幾件文字學禮記春秋說學公榖文勝貢父振劉貢父文字工扵摹倣學公羊儀禮若海蘇子容文慢義剛南豐文字確實道夫問南豐文如何曰南豐文却近質他初亦只是學為文却因學文漸見些子道理故文字依傍道理做不為空言只是闗鍵𦂳要處也說得寛緩不分明縁他見處不徹本無根本工夫所以如此但比之東坡則較質而近理東坡則華艶處多或言某人如摶謎子更不可曉曰然尾頭都不說破頭邊做作掃一片去也好只到尾頭便没合殺只恁休了篇篇如此不知是甚意思或曰此好竒之過曰此安足為竒觀前軰文章如賈誼董仲舒韓愈諸人還有一篇如此否夫所貴乎文之足以傳逺以其議論明白血脉指意曉然可知耳文之最難曉者無如栁子厚然細觀之亦莫不自有指意可見何嘗如此不説破其所以不説破者只是吝惜欲我獨㑹而他人不能其病在此大槩是不肯蹈襲前人議論而務為新竒惟其好為新竒而又恐人皆知之也所以吝惜僴曽所以不及歐䖏是紆徐揚録作餘曲折處曽喜模擬人文字擬峴䑓記是倣醉翁亭記不甚似南豐擬制内有數篇雖雜之三代誥命中亦無愧必大南豐作冝黄筠州二學記好說得古人教學意出義剛南豐列女傳序說二南䖏好南豐范貫之奏議序氣脉渾厚說得仁宗好東坡趙清獻神道碑說仁宗䖏其文氣象不好第一流人等句南豐不說子由挽南豐詩甚服之两次舉南豐集中范貫之奏議序末文之備盡曲折處方南豐有作郡守時榜之類為一集不曾出先生舊喜南豐文為作年譜問甞聞南豐令後山一年㸔伯夷傳後悟文法如何曰只是令他㸔一年則自然有自得䖏江西歐陽永叔王介甫曾子固文章如此好至黄魯直一向求巧反累正氣必大陳後山之文有法度如黄樓銘當時諸公都歛袵佐録云便是今人文字都無他抑揚頓挫因論當卋人物有以文章記問為能而好㸃檢它人不自㸃檢者曰所以聖人説益者三樂樂節禮樂樂道人之善樂多賢友至館職䇿陳無己底好李清臣文飽滿雜說甚有好議論李清臣文比東坡較實李舜舉永洛敗死墓誌說得不分不明㸔来是不敢說桐隂舊話載王銍云李邦直作韓太保惟忠墓誌乃孫巨源文也先生曰巨源文温潤韓碑徑只是邦直文也揚論胡文定公文字字皆實但奏議每件引春秋亦有無其事而遷就之者大抵朝廷文字且要論事情利害是非令分曉今人多先引故事如論青苖只是東坡兄弟說得有精神他人皆說從别處去徳明胡侍郎萬言書好令後生讀先生舊親冩一冊又曰上殿劄子論元老好無逸解好請行三年喪劄子極好諸奏議外制皆好陳㡬道存誠齊銘某初得之見其都是好義理堆積更看不辦後子細誦之却見得都是湊合與聖賢說底全不相似其云又如月影散落萬川定相不分處處皆圎這物事不是如此若是如此孔孟却隠藏着不以布施是何心哉乃知此物事不當恁地說㽦張子韶文字沛然猶有氣開口見心索性說出使人皆知近来文字開了又闔闔了又開開闔七八番到結末䖏又不說只恁地休了至文章輕重可見人夀夭不在美惡上白鹿洞記力輕韓元吉雖只是胡說然有力吳逵文字亦然楊韓無咎文做著儘和平有中原之舊無南方啁哳之音佐王龜齡奏議氣象大曾司直大故㑹做文字大故馳騁有法度裘父大不及他裘父文字澁說不去義剛陳君舉西掖制詞殊未得體王言温潤不尚如此胡明仲文字却好義剛或言陳蕃叟武不喜坡文戴肖望溪不喜南豐文先生曰二家之文雖不同使二公相見曾公須道坡公底好坡公須道曾公底是道夫徳粹語某人文章先生曰紹興間文章大抵麄成段時文然今日太細膩流扵委靡問賢良先生曰賢良不成科目天下安得許多議論可學以下論近世之文諸公文章馳騁好異止縁好異所以見異端新竒之說從而好之這也只是見不分曉所以如此㸔仁宗時制詔之文極朴固是不好㸔只是它意思氣象自恁地深厚乆長固是拙只是他所見皆實㸔他下字都不甚恰好有合當下底字却不下也不是他識了不下只是他當初自思量不到然氣象儘好非如後来之文一味纎巧不實且如進卷方是二蘇做出恁地壮偉發越已前不曾如此㸔張方平進䇿更不作文只如說鹽鐡一事他便從鹽鐡原頭直說到如今中間却載著甚麽年甚麽月後面更不說措置如今只是将虗文漫演前面說了後面又将這一段翻轉這只是不曾見得所以不曾見得只是不曾虗心㸔聖賢之書固有不曾虗心㸔聖賢書底人到得要去㸔聖賢書底又先把他自一副當排在這裏不曾見得聖人意待做出又只是自底某如今看来惟是聦明底人難讀書難理㑹道理盖縁他先自有許多一副當聖賢意思自是難入因說陳叔向是白撰一箇道理某嘗說教他據自底所見恁地說也無害只是又把那說来壓在這裏文字上他也自見得自底虗了行不得故如此然如何将兩箇要揑做一箇得一箇自方一箇自圎如何緫合得這箇不是他要如此止縁他合下見得如此如楊墨楊氏終不成自要為我墨氏終不成自要兼愛只縁他合下見得錯了若不是見得如此定不解常如此做楊氏壁立萬仭毫髪不容較之墨氏又難若不是他見得如此如何心肯意肯陳叔向所見咤異它說目視己色耳聴己聲口言己事足循己行有目固當視天下之色有耳固當聴天下之聲有口固能言天下之事有足固當循天下之行他却如此説㸔他意思是如此只要黙然静坐是不㸔眼前物事不聴别人説話不說别人是非不管别人事又如說言忠信行篤敬一章便說道𦂳要只在立則見其參扵前在輿則見其倚扵衡問道見是見箇甚麽物事他便說見是見自家身已某與說立是自家身已立在這裏了參扵前又是自家身已在輿是自家身已坐在這裏了倚扵衡又是自家身已却是有兩箇身已又説格物做心云格住這心方㑹知得到未嘗見人把物做心與他恁地說他只是自底是以此知人最是知見為急聖人尚說學之不講是吾憂也若只恁地死守得這箇心便了聖人又須要人講學何故若只守此心㩀自家所見做将去少間錯䖏都不知賀孫今人作文皆不足為文大抵專務節字更易新好生面辭語至說義理處又不肯分曉觀前軰歐蘇諸公作文何嘗如此聖人之言坦易明白因言以明道正欲使天下後世由此求之使聖人立言要教人難曉聖人之經定不作矣若其義理精奧䖏人所未曉自是其所見未到耳學者須玩味深思乆之自可見何嘗如今人欲說又不敢分曉說不知是甚所見畢竟是自家所見不明所以不敢深言且鶻突說在裏㝢前軰文字有氣骨故其文壮浪歐公東坡亦皆扵經術本領上用功今人只是扵枝葉上粉澤爾如舞訝鼓然其間男子婦人僧道雜色無所不有但都是假底舊見徐端立言石林嘗云今卋安得文章只有箇減字換字法爾如言湖州必須去州字只稱湖此減字法也不然則稱霅上此換字法也方子盖卿録云今人做文字却是胭脂膩粉粧成自是不壮浪無骨氣如舞訝鼓相似也有男児也有婦女也有僧道秀才但都是假底甞見徐端立言石林嘗云今世文章只是用換字減字法如說湖州只說湖此減字法不然則稱霅上此換字法嘗見張安道進卷其文皆有直氣謙録云今来文字至無氣骨向来前軰雖是作時文亦是朴實頭鋪事實朴實頭引援朴實頭道理㸔著雖不入眼却有骨氣今人文字全無骨氣便似舞訝鼓者塗眉畫眼僧也有道也有婦人也有村人也有俗人也有官人也有士人也有只不是本様人然皆足以惑衆真好笑也或云此是禁懐挟所致曰不然自是時節所尚如此只是人不知學全無本柄被人引動尤而效之且如而今作件物事一箇做起一人學起有不崇朝而徧天下者本來合當理㑹底事全不理㑹直是可惜貫穿百氏及經史乃所以辨驗是非明此義理豈特欲使文詞不陋而已義理既明又能力行不倦則其存諸中者必也光明四達何施不可發而為言以宣其心志當自發越不凡可愛可傳矣今執筆以習研鑚華采之文務悦人者外而已可耻也矣人傑以下論作文道者文之根本文者道之枝葉惟其根本乎道所以發之扵文皆道也三代聖賢文章皆從此心冩出文便是道今東坡之言曰吾所謂文必與道俱則是文自文而道自道待作文時旋去討箇道来入放裏面此是它大病處只是它每常文字華妙包籠将去到此不覺漏逗說出他本根病痛所以然處縁他都是因作文却漸漸說上道理來不是先理㑹得道理了方作文所以大本都差歐公之文則稍近扵道不為空言如唐禮樂志云三代而上治出扵一三代而下治出扵二此等議論極好盖猶知得只是一本如東坡之說則是二本非一本矣僴才要作文章便是枝葉害著學問反兩失也夀昌詩筆雜文不須理㑹科舉是無可奈何一以門户一以父兄在上責望科舉却有了時詩文之類㸔無出時節芝一日說作文曰不必著意學如此文章但須明理理精後文字自典實伊川晩年文字如易傳直是盛得水住蘇子瞻雖氣豪善作文終不免踈漏處大雅問要㸔文以資筆勢言語須要助發義理曰可㸔孟子韓文韓不用科段直便説起去至終篇自然純粹成體無破綻如歐曾却各有一箇科段舊曽學曽為其節次定了今覺得要說一意須待節次了了方說得到及這一路定了左右更去不得又云方之文有澁䖏因言陳阜卿教人㸔栁文了却㸔韓文不知㸔了栁文便自壞了如何更㸔韓文方因論文曰作文字須是靠實說得有條理乃好不可架空細巧大率要七分實只二三分文如歐公文字好者只是靠實而有條理如張承業及宦者等傳自然好東坡如靈璧張氏園亭記最好亦是靠實秦少㳺龍井記之類全是架空説去殊不起發人意思時舉文章要理㑹本領謂理前軰作者多讀書亦随所見理㑹今皆倣賢良進卷胡作每論著述文章皆要有綱領文定文字有綱領龜山無綱領如字説三經辨之類方前軰做文字只依定格依本分做所以做得甚好後来人却厭其常格則變一般新格做本是要好然未好時先差去聲異了又云前軰用言語古人有說底固是用如世俗常説底亦用後来人都要别撰一般新竒言語下梢與文章都差異了却将差異底說話換了那尋常底說話燾問舍弟序子文字如何進工夫云云曰㸔得韓文熟饒録云看一學者文字曰好好讀得韓文熟又曰要做好文字須是理㑹道理更可以去韓文上一截如西漢文字用工問史記如何曰史記不可學學不成却顛了不如且理㑹法度文字問後山學史記曰後山文字極有法度幾於太法度了然做許多碎句子是學史記又曰後世人資禀與古人不同今人去學左傳國語皆一切踏踏地說去沒收煞揚文字竒而穏方好不竒而穏只是闒靸燾作文何必苦留意又不可太頽塌只略教整齊足矣文蔚前軰作文者古人有名文字皆模擬作一篇故後有所作時左右逢原因論詩曰嘗見傅安道說為文字之法有所謂筆力有所謂筆路筆力到二十嵗許便定了便後來長進也只就上面添得些子筆路則常拈弄時轉開拓不拈弄便荒廢此說本出扵李漢老㸔来做詩亦然雉因說伯恭所批文曰文章流轉變化無窮豈可限以如此某因說陸教授謂伯恭有箇文字腔子才作文字時便将來入箇腔子做文字氣脉不長先生曰他便是眼髙見得破至之以所業呈先生先生因言東萊教人作文當看獲麟解也是其間多曲折又曰某舊最愛㸔陳無己文他文字也多曲折謂諸生曰韓栁文好者不可不㸔道夫人要㑹作文章須取一本西漢文與韓文歐陽文南豐文燾因論今日舉業不佳曰今日要做好文者但讀史漢韓栁而不能便請斫取老僧頭去甞與後生說若㑹将漢書及韓栁文熟讀不到不㑹做文章舊見某人作馬政䇿云觀戰竒也觀戰勝又竒也觀騎戰勝又大竒也這雖是麄中間却有好意思如今時文一两行便做萬千屈曲若一句題也要立两脚三句題也要立两脚這是多少衰氣賀孫後人專做文字亦做得衰不似古人前軰云言衆人之所未甞任大臣之所不敢多少氣魄今成甚麽文字節人有才性者不可令讀東坡等文有才性人便須收入規矩不然蕩将去因論今人作文好用字子如讀漢書之類便去收拾三兩箇字洪邁又較過人亦但逐三兩行文字筆勢之類好者讀㸔因論南豐尚解使一二字歐蘇全不使一箇難字而文章如此好揚凡人做文字不可太長照管不到寕可說不盡歐蘇文皆說不曾盡東坡雖是宏闊瀾翻成大片滚将去他裏面自有法今人不見得他裏面藏得法但只管學他一滚做将去文字或作做事無大綱領拈掇不起某平生不㑹做補接底文字補湊得不濟事方子前軰云文字自有穏當底字只是始者思之不精又曰文字自有一箇天生成腔子古人文字自貼這天生成腔子節因論今卋士大夫好作文字論古今利害比並為説曰不必如此只要明義理義理明則利害自明古今天下只是此理所以今人做事多暗與古人合者只為理一故也大雅人做文字不著只是說不著説不到說自家意思不盡燾㸔陳蕃叟同合録序文字艱澁曰文章須正大須教天下後世見之明白無疑揚因說作應用之文此等苛禮無用亦可但人所共用亦不可廢曹宰問云尋常人徇人情做事莫有牽制否曰孔子自有條法從衆從下惟其當爾謙大率諸義皆傷淺短鋪陳略盡便無可說不見反覆辨論節次發明工夫讀之未終已無餘味矣此學不講之過也抄漳浦課簿道夫顯道云李徳逺侍郎在建昌作解元做本强則精神折衝賦其中一聮云虎在山而藜藿不採威令風行金鑄鼎而魑魅不逢姦邪影滅試官大喜之乃是全用汪玉谿相黄潜善麻制中語後來士人經禮部訟之時樊茂實為侍郎乃云此一對當初汪内翰用時却未甚好今被李解元用此賦中見得工訟者遂無語而退徳逺縁此見知扵樊先生因舉舊有人作仁人之安宅賦一聮云智者反之若去國念田園之樂衆人自棄如病狂昧宫室之安朱子語類卷一百三十九
