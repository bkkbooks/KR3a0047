body:
  text: 朱子語類卷一百二十三陳君舉陳同父葉正則附先生問徳粹去年何處作考官對以永嘉問曾見君舉否曰見之曰説甚話曰説洪範及左傳曰洪範如何説曰君舉以為讀洪範方知孟子之道性善如前言五行五事則各言其徳性而未言其失及過於皇極則方辨其失曰不然且各還他題目一則五行二則五事三則八政四則五紀五則皇極至其後庶徵五福六極乃權衡聖道而著其驗耳又問春秋如何説滕云君舉云世人疑左丘明好惡不與聖人同謂其所載事多與經異此則有説且如晉先蔑奔人但謂先蔑奔秦耳此乃先蔑立嗣不定故書奔以示貶曰是何言語先蔑實是奔秦如何不書奔且書奔秦謂之示貶不書奔則此事自不見何以為褒昨説與吾友所謂專於博上求之不反於約乃謂此耳是乃於穿鑿上益加穿鑿疑誤後學可學因問左氏識見如何曰左氏乃一箇趨利避害之人要置身於穏地而不識道理於大倫處皆錯觀其議論往往皆如此且大學論所止便只説君臣父子五件左氏豈知此如云周鄭交質而曰信不由中質無益也正如田客論主而責其不請喫茶使孔子論此肯如此否尚可謂其好惡同聖人哉又如論宋宣公事曰宋宣公可謂知人矣立穆公其子饗之命以義夫是何等言談可學曰此一事公羊議論却好曰公羊乃儒者之言可學又問林黄中亦主張左氏如何曰林黄中却㑹占便宜左氏踈脱多在君子曰渠却把此殃苦劉歆昔吕伯恭亦多勸學者讀左傳嘗語之云論孟聖賢之言不使學者讀反使讀左傳伯恭曰讀論孟使學者易向外走因語之云論孟却向外走左氏却不向外走讀論孟且先正人之見識以参他書無所不可此書自傳恵公元妃孟子起便沒理㑹大抵春秋自是難㸔今人説春秋有九分九釐不是何以知聖人之意是如此平日學者問春秋且以胡文定傳語之可學陳君舉得書云更望以雅頌之音消鑠羣慝章句訓詁付之諸生問他如何是雅頌之音今只有雅頌之辭在更沒理㑹又去那裏討雅頌之音便都只是瞞人又謂某前畨不合與林黄中陸子静諸人辨以為相與詰難竟無深益蓋刻畫太精頗傷易簡矜持已甚反渉吝驕不知更何如方是深益若孟子之闢楊墨也只得恁地闢他説刻畫太精便只是某不合説得太分曉不似他只恁地含糊他是理會不得被衆人擁從又不肯道我不識又不得不説説又不識所以不肯索性開口道這箇是甚物事又只恁鶻突了子静雖占姦不説然他見得成箇物事説話間便自然有箇痕跡可見只是人理㑹他底不得故見不得然亦易見子静只是人未從他便不説及鈎致得來便直是説方始與你理㑹至如君舉胸中有一部周禮都撑腸拄肚頓着不得如逰古山詩又何消説着他只是他稍理㑹得便自要説又説得不着如東坡子由見得箇道理更不成道理又却便開心見膽説教人理㑹得又曰他那得似子静子静却是見得箇道理却成一部禪他和禪識不得賀孫金溪之學雖偏然其初猶是自説其私路上事不曽侵過官路來後來於不知底亦要彊説便説出無限亂道前軰如歐公諸人為文皆善用其所長凡所短處更不拈出來説所以不見踈脱今永嘉又自説一種學問更沒頭沒尾又不及金溪大抵只説一截話終不説破是箇甚麽然皆以道藝先覺自處以此傳授君舉到湘中一收收盡南軒門人胡季随亦從之問學某向見季随固病其不能自立其胷中自空空無主人所以纔聞他人之説便動季随在湖南頗自尊大諸人亦多宗之凡有議論季随便為之判斷孰是孰非此正猶張天師不問長少賢否只是世襲做大正淳曰湖南之從南軒者甚衆且久何故都無一箇得其學曰欽夫言自有弊諸公只去學他説話凡説道理先大拍下然欽夫後靣却自有説諸公却只學得那大拍頭必大因説鄉里諸賢文字以為皆不免有藏頭亢腦底意思有學者來問便當直説與之在我不可不説若其人半間不界與其人本無求益之意故意來磨難則不宜説外此説儘無害我畢竟説從古聖賢已行底道理不是為姦為盜怕説與人不知我説出便有甚罪過諸賢所見皆如此秪縁怕人譏笑遂以此為戒便藏頭不説某與林黄中争辨一事至今亦只是説不以為悔夫道若大路然何掩蔽之有打空説及某人鄉里皆推其有所見其與朋友書言學不至於不識不知順帝之則處則學為無用先生曰近來人自要向髙説一等話要知初學及此是為躐等詩人這句自是形容文王聖徳不可及處聖人教人何嘗不由知由識入來㝢或曰永嘉諸公多喜文中子曰然只是小它自知定學做孔子不得了才見箇小家活子便悦而趨之譬如泰山之髙它不敢登見箇小土堆子便上去只是小僴因説永嘉之學曰張子韶學問雖不是然他却做得來髙不似今人卑汚又曰上蔡多説知覺自上蔡一變而為張子韶學䝉古人紀綱天下凡措置許多事都是心法從這裏流出是多少正大今若去逐些子捜抉出來評議恐不得凡㸔文字也須待自有忽然湊合見得異同處若先去逐些安排比並便不是因問君舉説漢唐好處與三代暗合是如何曹曰亦只是事上㸔如漢初待羣臣不專執其權畧堂陛之嚴不恁地操切如財散於天下之類曰這也自是事勢到這裏見得秦時君臣之勢如此間隔故漢初待宰相如此然而蕭何是多少功勞㡬年宰相一旦繋獄這喚做操切不操切又如周勃終身有功後來也下獄對問又如賈誼書中所説是如何財用那時自寛曉不得不散在郡縣且如而今要散在郡縣得也不得上靣又不儲蓄財賦閒在那裏只是每年合天下之所入不足以供一年之用一月之入不足以供一月之用逐時挨展將去將漢初來㸔要散之郡縣得否這只是閒説第一項最是飬許多坐食之兵其費最廣州郡自是州郡底如許多大軍見如何區處無祖宗天下之半而有祖宗所無之兵如州郡兵還飬在何用若留心太守又㑹去教他攀些弓射些弩教他做許多模様也只是不忍將許多錢糧白與他到有厮殺時你道他與你去厮殺否只是徒然問君舉曾要如何措置曰常常憂此但措置亦未曾説出問㸔唐事如何曰聞之陳先生説唐初好處也是將三省推出在外這却從魏晉時自有裏靣一項唐初却盡屬之外要成一體如唐經禍變後便都有諸王出來克復如肅宗事及代宗後來雖是郭子儀也有箇主出來曰三省在外怕自隋時已如此只唐時併屬之宰相諸王克復代宗事只是郭子儀怕别無諸王唐官㸔他六典將前代許多官一齊盡置得徧官如何不冗今只㸔漢初時官如何到得元成間如何又㸔東漢初如何到東漢末時如何到三國魏晉以後如何只管添只管雜賀孫器逺言鄉間諸先生所以要教人就事上理㑹教著實縁是向時諸公多是清談終於敗事曰便是而今自恁地説某尚及見前軰都不曾有這話是三十年前如此不曾將這箇分作兩事如所謂推倒墻撞倒壁如此麄話那時都恁地麄却有好處南渡時有許多人出來做得事經變故後將許多人都摧折了到而今却是氣卑弱了凡事都無些子正大只是細巧曰陳先生要人就事上理會教實之意盖怕下梢用處不足如司馬公居洛六稔只理㑹得箇通鑑到元祐出來做事却有未盡處所以激後來之禍如今須先要較量教盡曰便是如今都要恁地説話如溫公所做今只論是與不是合當做與不合當做如何説他激得後禍這是全把利害去説溫公固是有從初講䆒未盡處也是些小事如役法變得未盡只是東南不便他西北自便之那時節已自極了只得如此做若不得溫公如此做更自有一場出醜今只將紙上語去㸔便道溫公做得過當子細㸔那時節若非溫公如何做溫公是甚氣勢天下人心甚麽様感動溫公直有旋乹轉坤之功溫公此心可以質天地通幽明豈容易及後來吕微仲范堯夫用調停之説兼用小人更無分别所以成後日之禍今人却不歸咎於調停反歸咎於元祐之政若真是見得君子小人不可雜處如何要委曲遮䕶得蔡確也是卒急難去也是猾他置獄傾一從官得從官置獄傾一参政得参政置獄傾一宰相得宰相㸔溫公那時已自失委曲了如王安石罪既已明白後既加罪於蔡確之徒論來安石是罪之魁却於其死又加太傅及贈禮皆備想當時也道要委曲周旋他如今㸔來這般却煞不好要好便合當顯白其罪使人知得是非邪正所謂明其為賊敵乃可服須是明顯其不是之狀若更加旌賞却惹得後來許多羣小不服今又都沒理㑹怕道要做朋黨那邊用㡬人這邊用㡬人不問是非不别邪正下稍還要如何某㸔來天下事須先論其大處如分别是非邪正君子小人端的是如何了方好於中間酌量輕重淺深施用賀孫器逺言陳文大意説格君且令於事上轉移他心下歸於正如蕭何事漢令散財於外可以去其侈心成其愛民之心説北齊宣帝云云曰欲事君者豈可以此為法自元魏以下至北齊最為無綱紀法度自家却以為事君法賀孫永嘉㸔文字大字平白處都不㸔偏要去注疏小字中㝷節目以為博只如韋𤣥成傳廟議渠自不理㑹得却引周禮守桃掌守先王先公之廟祧注去先公之遷主藏於后稷之廟先王之遷主藏於文武之廟遂謂周后稷别廟殊不知太祖與三昭三穆皆各自為廟豈獨后稷别廟又云后稷不為太祖甚可怪也閎祖季通及敬之皆云永嘉貌敬甚至及與官祠乃繳之云朱某素來迂闊臣所不取但陛下進退人才不當如此以問先生先生云不曾見此文字怎見得閎祖徳粹問陳君舉福州事曰無此只是過當作一添倅而一州之事皆欲為之益之初九曰利用為大作元吉無咎象曰下不厚事也初九欲為九四作事在下本不當處厚事以為上之所任故為之而致元吉乃為之又不然不惟己不安而亦累於上璘錄云初九上為四所任而作大事必盡善而後无咎若所作不盡善未免有咎也故孔子釋之曰下不厚事也盖在下之人不當重事若在下之人為在上之人作事未能盡善自應有咎向編近思錄説與伯恭此一段非常有不必入伯恭云既云非常有則有時而有豈可不書以為戒及後思之果然可學璘錄少異陳同父縱横之才伯恭不直治之多為諷説反被他玩揚陳同父説同父因謂吕伯恭烏得為無罪恁地横論却不與他剖説打教破却和他都自被包裹在裏今來伯恭門人却亦有為同父之説者二家打成一片可怪君舉只道某不合與説只是他見不破天下事不是是便是非直截兩邊去如何恁地含糊鶻突某鄉來與説許多豈是要眼前好㸔青天白日在這裏而今人雖不見信後世也須有人㸔得此説也須回轉得㡬人又嘆息久之云今有一等自恁地髙出聖人之上一等自恁䧟身汙濁要擔頭出不得賀孫同父才髙氣粗故文字不明瑩要之自是心地不清和也道夫先生説㸔史只如㸔人相打相打有甚好㸔處陳同父一生被史壊了直卿亦言東萊教學者㸔史亦被史壊泳陳同父祭東萊文云在天下無一事之可少而人心有萬變之難明先生曰若如此則鷄鳴狗盜皆不可無因舉易曰天下之動貞夫一者也天下何思何慮同歸而殊塗一致而百慮天下何思何慮又云同父在利欲膠漆盆中閎祖鄭厚藝圃折𠂻當時以為邪説然尚自占取地歩但不知權其説之行猶使人知君臣之義如陳同父議論却乖乃不知正曹丕既簒乃曰舜禹之事吾知之矣此乃以已而窺聖人謂舜禹亦只是簒而文之以揖遜爾同父亦是於漢唐事迹上㝷討箇仁義出來便以為此即王者事何異於此必大因言陳同父讀書譬如人㸔刼盗公案㸔了須要斷得他罪及防備禁制他教做不得它却不要斷他罪及防備禁制他只要理㑹得許多做刼盜底道理待學他做廣或謂同父口説皇王帝霸之畧而一身不能自保先生曰這只是見不破只説箇是與不是便了若做不是恁地依阿苟免以保其身此何足道若做得是便是委命殺身也是合當做底事賀孫陳同父學已行到江西浙人信向已多家家談王伯不説蕭何張良只説王猛不説孔孟只説文中子可畏可畏可學陸子静分明是禪但却成一箇行户尚有箇㨿處如葉正則説則只是要教人都曉不得嘗得一書來言世間有一般魁偉底道理自不亂於三綱五常既説不亂三綱五常又説别是箇魁偉底道理却是箇甚麽物事也是亂道他不説破只是籠統恁地説以謾人及人理㑹得來都無效驗時他又説你是未曉到這裏他自也曉不得他之説最誤人世間獃人都被他瞞不自知義剛葉正則葉正則説話只是杜撰㸔他進卷可見大畧泳葉進卷待遇集毁板亦毁得是淳葉正則作文論事全不知些著實利害只虛論因及許多云云又見一文論社倉事戴肖望尚有些實説然不是如此葉則都是閒説振見或人所作講義不知如何如此聖人見成言語明明白白人尚曉不得如何須要立一文字令深於聖賢之言如何教人曉得戴肖望比見其湖南説話却平正只為説得太容易了兼未免有意於弄文賀孫江西之學只是禪浙學却專是功利禪學後來學者摸索一上無可摸索自㑹轉去若功利則學者習之便可見效此意甚可憂朱子語類卷一百二十三
