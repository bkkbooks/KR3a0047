body:
  text: 朱子語類卷一百十四朱子十一訓門人二先生問看甚文字曰看論語看得論語如何曰自看論語後覺得做工夫緊不似每常悠悠曰做甚工夫曰只是存養曰自見住不得時便是某怕人説我要做這箇事見飯便喫見路便行只管説我要做這箇事何益文蔚又言近來有一進處畏不義見不義事覺不敢做曰甚好但亦要識得義與不義若不曾覩當得是顛前錯後依舊是胡做又曰須看大學聖賢聽言皆是自家元有此理但人不肯著意看若稍自著意便自見得却不是自家無此理他鑿空撰來以下訓文蔚問私意竊發随即鉏治雖去枝葉本根更在感物又發如何曰只得如此所以曾子戰戰兢兢如臨深淵如履薄氷一日侍食先生曰只易中節飲食三字人不曾行得子融才卿是許多文字㸔過今更廵一徧所謂温故再巡一徧又湏較見得分曉如人有多田地須自照管曾耕得不曾耕得若有荒廢處須用耕墾子融曰每自思之今亦不可謂不知但知之未至不可謂不誠但其誠未至不可謂不行但行之未至若得這三者皆至便是了得此事曰須有一箇至底道理因説僧家有規矩嚴整士人却不循禮曰他却是心有用處今士人雖有好底不肯為非亦是他資質偶然如此要之其心實無所用每日閒慢時多如欲理㑹道理理㑹不得便掉過三五日半月日不當事鑚不透便休了既是來這一門鑚不透又須别尋一門不從大處入須從小處入不從東邊入便從西邊入及其入得却只是一般今頭頭處處鑚不透便休了如此則無説矣有理㑹不得處須是皇皇汲汲然無有理㑹不得者譬如人有大寳珠失了不著緊尋如何㑹得謂文蔚曰公却是見得一箇物事只是不光彩一日呈所送崇甫序觀畢曰前日說公不光彩且如這般文字亦不光彩問色容莊最難曰心肅則容荘非是外面做那荘出来陳才卿亦説九容次早才卿以右手拽涼衫左袖口偏於一邉先生曰公昨夜說手容恭今却如此才卿赧然急乂手鞠躬曰忘了先生曰為己之學有忘耶向徐節孝見胡安定退頭容少偏安定忽厲聲云頭容直節孝自思不獨頭容要直心亦要直自此便無邪心學者須是如此始得友仁次日相見先生偶脚氣發因蘇冝乆欲歸先生蹙然曰觀某之疾如此非乆於世間者只是一兩年間人亦欲接引後軰一兩人傳續此道荷公們逺来亦欲有所相補助只是覺得如此苦口都無一分相啓發處不知如何横説竪説都説不入如昨夜才卿問程先生如此謹嚴何故諸門人皆不謹嚴因隔夜說有問諸弟子及後来失節者某答云是程先生自謹嚴諸門人自不謹嚴干程先生何事某所以發此者正欲才卿深思而得反之於身如針之劄身皇恐發憤無地自存思其所以然之故却再問某李先生資質如何全不相干渉非惟不知針之劄身便是刀鋸在身也不知痛了每日讀書心全不在上只是要自説一叚文義便了如做一篇文義相似心中全無所作為恰似一箇無圖之人飽食終日無所用心若是心在上面底人説得話来自别自相湊合敢説公們無一日心在上面莫説一日便十日心也不在莫説十日便是數月心也不在莫説數月便是整年心也不在每日讀書只是讀過了便不知將此心去體㑹所以説得来如此踈先生意甚不樂僴陳才卿説詩先生曰謂公不曉文義則不得只是不見那好處正如公適間説窮理也知事事物物皆具此理随事精察便是窮理只是不見所謂好處所謂民生日用而不知所謂小曉得而大曉不得這箇便是大病此句厲聲説某也只説得到此要公自去㑹得久之又曰大凢事物須要説得有滋味方見有功而今随文解義誰人不解須要見古人好處如昔人賦梅云疎影横斜水清淺暗香浮動月黄昏這十四箇字誰人不曉得然而前軰直恁地稱歎説他形容得好是如何這箇便是難説須要自得言外之意始得須是㸔得那物事有精神方好若㸔得有精神自是活動有意思跳躑呌喚自然不知手之舞足之蹈這箇有兩重曉得文義是一重識得意思好處是一重若只是曉得外面一重不識得他好底意思此是一件大病如公㸔文字都是如此且如公㸔詩自宣王中興諸詩至此至節南山公於其他詩都説来中間有一詩最好如白駒是也公却不曾説這箇便見公不曾㸔得那物事出謂之無眼目若是具眼底人此等詩如何肯放過只是㸔得無意思不見他好處所以如此又曰須是踏飜了船通身都在那水中方㸔得出僴建别録文蔚録云文蔚一日説太極通書不説格物致知工夫先生甚訝之後數日文蔚拈起中間三語先生曰趯翻却舡通身下水裏去文蔚始有所悟今池録却將文蔚别話頭合作一段記者誤矣袁州臨别請教先生曰守約兄弟皆太拘謹更少放寛謹固好然太拘則見道理不盡處事亦徃往急迫道理不只在一邊須是四方八面㸔始盡訓閎祖邵武人箇箇急迫此是氣禀如此學者先須除去此病方可進道先生謂方子曰觀公資質自是寡過然開闊中又須縝密寛緩中又須謹敬訓方子又問如孟子言勿忘勿助長却簡易而今要細碎做去怕不能貫通曰孟子言勿忘勿助長處自是言養氣試取孟子説處子細㸔便見大凡為學最切要處在吾身心其次便是做事此是的實緊切䖏學者須是把聖人之言来窮䆒見得身心要如此做事要如此天下自有一箇道理在若大路然聖人之言便是一箇引路底李公晦問忠恕曰初讀書時且從易處㸔待得熟後難者自易理㑹如捉賊先擒盡弱者則賊魁自在這裏不容脱也且㸔論語前靣所説分曉處盖卿前日得公書備悉雅意聖賢見成事迹一一可考而行今日之来若捨六經之外求所謂𤣥妙之説則無之近世儒者不將聖賢言語為切己之事必於上面求新竒可喜之論屈曲纒繞詭秘變怪不知聖賢之心本不如此既以自欺又轉相授受復以欺人某嘗謂雖使聖人復生亦只將六經語孟之所載者循而行之必不更有所作為伏羲再出依前只畫八卦文王再出依前只衍六十四卦禹再出依前只是洪範九疇此外更有甚詫異事如今要緊只是将口讀底便做身行底説出底便是心存底居父相聚幾一年覺得渠只怕此事有難者某終曉渠意不得以下訓賀孫問在卿如何讀書賀孫云少失怙恃凡百失教既壯所從師友不過習為科舉之文然終不肯安心於彼常欲讀聖賢之書自初得先生所編論孟精義讀之至今不敢忘然中間未能有所決擇故未有定見先生曰大凡人欲要去從師然未及從師之時也須先自用力做工夫及六七分到得聞緊切説話易得長進若是平時不曾用力終是也難一頓下手今須先正路頭眀辨為己為人之别直見得透却旋旋下工夫則思慮自通知識自眀踐履自正積日累月漸漸熟漸漸自然若見不透路頭錯了則讀書雖多為文日工終做事不得比見浙間朋友或自謂能通左傳或自謂能通史記将孔子置在一壁却將左氏司馬遷駁雜之文鑚研推尊謂這箇是盛衰之由這箇是成敗之端反而思之干爾身已甚事爾身已有多多少少底事合當理㑹有多多少少底病未曾去却来説甚盛衰興亡治亂這箇眞是自欺仁父味道却是别立得一箇志趨却正下工夫却易先生因學者少寛舒意曰公讀書恁地縝密固是好但恁地逼截成一團此氣象最不好這是偏處如一項人恁地不子細固是不成箇道理若一向蹙密下梢却展拓不去明道一見顯道曰此秀才展拓得開下梢可望又曰於辭氣間亦見得人氣象如明道語言固無甚􅈭昂㸔来便見寛舒意思龜山人只道恁地寛㸔来不是寛只是不解理㑹得不能理㑹得范純夫語解比諸公説理最平淺但自有寛舒氣象最好問㸔大學覺得未透心也尚麄在曰這麄便是細只是恁地㸔熟了自通透公往前在陳君舉處如何㸔文字曰也只就事上理㑹将古人所説来商量須教可行曰怕恁地不得古人見成法度不用於今自是如今有用不得處然不可將古人底析合來就如今為可用之計如鄭康成所説井田固是難得千里平地如此方正可疆理溝洫之類但古人意思必是如此方得不應零零碎碎做得成古人事事先去理㑹大處正處到不得已䖏方有變通今却先要去理㑹變通之説問初學心下恐空閒未得試驗之平日常常㸔書否則便思索義理其他邪妄不見来才心下稍空閒便思量别所在去這當奈何曰才要閒便不閒才要靜便不静某向来正如此可將明道答横渠書㸔因舉其間非外是内之説問前日承教辨是非只交游中便有是有非自家須分别得且不須誦言這莫是只説尋常泛交若朋友則有責善琢磨之義曰固是若是等閒人亦自不可説只自家胷次便要得是非分眀事事物物上都有箇道理都有是有非所以舜好問而好察邇言雖淺近閒言語中莫不有理都要見得破隠惡而揚善自家這裏善惡便分眀然以聖明昭鑒纔見人不好便説出来也不得只是揚善那惡底自有不得掩之理纔説揚善自家已自分眀這亦聖人與人為善之意又云一件事走過眼前匹似閒也有箇道理也有箇是非縁天地之間上蟠下際都無别事都只是這道理如今理㑹道理且要識得箇頭若不識得箇頭只恁地散散逐叚説不濟事假饒句句説得叚叚記得有甚精微奥妙都理㑹得也都是閒話若識得箇頭上有源頭下有歸著㸔聖賢書便句句著實句句為自家身已設如此方可以講學要知這源頭是甚麽只在身已上㸔許多道理盡是自家固有底仁義禮智知皆擴而充之若火之始然泉之始達這箇是源頭見得這箇了方可講學方可㸔聖賢説話恰如人知得合當行只假借聖賢言語作引路一般不然徒記得説得都是外靣閒話聖賢急急教人只在這些子纔差過那邊去便都無些子著身已都是要將去附合人都是為别人全不為自家身已纔就這邊来便是自工夫這正是為己為人處公今且要理㑹志趣是要如何若不見得自家身已道理分明㸔聖賢言語那裏去捉摸又云如今見得這道理了到得進處有用力慤實緊密者進得快有用力慢底便進得鈍何况不見得這源頭道理便緊密也徒然不濟事何况慢慢地便全然是空如今拽轉亦快如舡遭逆風吹向别䖏去若得風翻轉是這一載不問甚麽物色一齊都拽轉若不肯轉時一齊都不轉見説毋不敬便定定著毋不敬始得見説思無邪便定定著思無邪始得書上説毋不敬自家口讀毋不敬身心自恁地怠慢放肆詩上説思無邪自家口讀思無邪心裏却胡思亂想這不是讀書口即是心心即是口又如説足容重須著重是天理合下付與自家便當重自家若不重便自壊了天理手容恭須著恭是天理合下付與自家便當恭自家若不恭便自壊了天理目容端口容止聲容静頭容直氣容肅立容德色容莊云云把聖賢説話將来學便是要補填得元初底教好又如説非禮勿視自是天理付與自家䨇眼不曾教自家視非禮纔視非禮便不是天理非禮勿聽自是天理付與自家䨇耳不曾教自家聽非禮纔聽非禮便不是天理非禮勿言自是天理付與自家一箇口不曾教自家言非禮纔言非禮便不是天理非禮勿動自是天理付與自家一箇身心不曾教自家動非禮纔動非禮便不是天理賀孫請問語聲末後低先生不聞因云公仙鄉人何故聲氣都恁地説得箇起頭後靣懶將去孔子曰聽其言也厲公只管恁地下稍不好見道理不分眀將漸入於幽暗含含胡胡不能到得正大光眀之地説話須是一字是一字一句是一句便要見得是非先生謂賀孫也只是莫巧公鄉間有時文之習易得巧問往前承誨只就窮理説較多此来如尊德性致廣大極髙眀上一截數數蒙提警此意是如何曰已前也説了只是夾雜説如大學中亦自説但覺得近日諸公去理㑹窮理工夫多又自漸漸不著身已嘗見陸子静説且恁地依傍㸔思之此語説得好公㸔文字亦且就分明注解依傍㸔教熟待自家意思與他意思相似自通透也自有一般人敏捷都要㸔過都㑹通曉若不恁地只是且就曉得䖏依傍㸔如公讀論語還當文義曉得了未若文義未曉得又且去㸔某家如此説某家如彼説少間都攪得一場没理㑹尹和靖只是依傍伊川許多説話只是他也沒變化然是守得定辭先生同黄敬之歸鄉赴舉先生曰仙里士人在外孰不經營偽牒二公獨逕還鄉試殊強人意先生問赴試用甚文字賀孫以春秋對曰春秋為仙鄉陳蔡諸公穿鑿得盡諸經時文愈巧愈鑿獨春秋為尤甚天下大抵皆爲公鄉里一變矣先生問時舉觀書如何時舉自言常苦於粗率無精密之功不知病根何在曰不要討甚病根但知道粗率便是病在這上便更加仔細便了今學者亦多来求病根某向他説頭痛灸頭脚痛灸脚病在這上只治這上便了更别討甚病根也以下訓時舉又讀回也三月不違仁一段曰工夫既能向裏只要常提醒此心心才在這裏外面許多病痛自然不見問管仲之器小哉處説及王伯之所以異先生曰公㸔文字好立議論是先以己意㸔他却不以聖賢言語来澆灌胷次中這些子不好自後只要白㸔乃好先生歷言諸生之病甚切謂時舉㸔文字也却細膩親切也却去身上做工夫但只是不去正處㸔却去偏傍䖏㸔如與人説話相似不向靣前㸔他却去背後尋索以為靣前説話皆不足道此亦不是些小病痛想見日用工夫也只去小處理㑹此亦是立心不定故爾切宜戒之先生問云子善别後做甚工夫時舉云自去年書院㸔孟子至告子歸後雖日在憂患中然夜間亦須㸔一二章至今春㸔了却㸔中庸見讀程易此讀書工夫如此若裏面工夫尚多間斷未接續成片段將如之何先生曰書所以維持此心若一時放下則一時德性有懈若能時時讀書則此心庶可無間斷矣因問日夜之所息舊兼止息之義今只作生息之義如何曰近㸔得只是此義時舉云凡物日夜固有生長若良心既放而無操存之功則安得自能生長曰放去未逺故亦能生長但夜間長得三四分日間所為又做了七八分却摺轉来都消磨了這些子意思此所以終至於梏亡也早拜朔先生説諸友相聚已半年光隂易過其間㸔得文義分眀者所見亦未能超詣不滿人意兼是為學須是已分上做工夫有本領方不作言語説若無存飬儘説得明自成兩片亦不濟事况未必説得明乎要須發憤忘食痛切去做身分上功夫莫荏苒嵗月可惜也是日問時舉㸔詩外别㸔何書時舉答欲一面㸔近思録曰大凢為學有兩様一者是自下面做上去一者是自上靣做下来自下面做上者便是就事上旋尋箇道理湊合将去得到上靣極處亦只一理自上面做下者先見得箇大體却自此而觀事物見其莫不有箇當然之理此所謂自大本而推之達道也若㑹做工夫者須從大本上理㑹將去便好昔眀道在扶溝謂門人曰爾軰在此只是學某言語盍若行之謝顯道請問焉却云且静坐時舉因云雷在地中復先王以至日閉關商旅不行后不省方在學者分上説便是要安靜涵養這些子善端耳曰若著實做工夫要知這説話也不用説若㑹做工夫便一字也来這裏使不著此説某不欲説與人却恐學者聽去便做虚空認了且如程門中如游定夫後来説底話大段落空無理㑹處未必不是在扶溝時只恁地聽了時舉因言平日學問次第云云先生曰此心自不用大段拘束他他既在這裏又要向那裏討他要知只是争箇醒與睡著耳人若醒時耳目聰眀應事接物便自然無差錯處若被私慾引去便一似睡著相似只更與他喚醒才醒又便無事矣時舉因云釋氏有豁然頓悟之説不知使得否不知倚靠得否曰某也曾見叢林中有言頓悟者後来㸔這人也只尋常如陸子靜門人初見他時常云有所悟後来所為却更顛倒錯亂㸔来所謂豁然頓悟者乃是當時略有所見覺得果是浄潔快活然稍乆則却漸漸淡去了何嘗倚靠得時舉云舊時也有這般狂底時節以為聖人便即日可到到後来果如先生所云漸漸淡了到今日却只得逐旋挨去然早上聞先生賜教云諸生工夫不甚超詣時舉退而思之不知如何便得超詣曰只從大本上理㑹亦是逐旋挨去自㑹超詣且如今學者考理一如在淺水上撐舡相似但覺辛苦不能嚮前須是從上面放得些水来添便自然撐得動不用費力滔滔然去矣今有學者在某門者其於考理非不精當説得来置水不漏直是理㑹得好然所為却顛倒錯繆全然與所知者相反人只管道某不合引他如今被他累却不知渠實是理㑹得某如何不與他説他凡所説底話今世俗人往往有全曉不得者他之所説非不精眀然所為背馳者只是不曾在源頭上用力故也往往他一時眀敏隨處理㑹便自曉得分眀然源頭上不曾用功只是徒然耳時舉因云如此者不是知上工夫欠乃是行上全然欠耳曰也縁知得不實故行得無力時舉云惟其不見於行是以知不能實時舉嘗謂知與行互相發明之説誠不可易之論先生又云此心虚明萬理具足外面理㑹得者即裏面本来有底只要自大本而推之達道耳先生又謂時舉曰朋友相處要得更相規戒有過則告時舉應喏先生曰然小過只嘵嘵底説又似没緊要相似大底過失又恐他已深痼不容易説要知只盡公之誠意耳又云本領上欠了工夫外面都是閒須知道大本若立外面應事接物上道理都是大本上發出如人折這一枝花只是這花根本上物事問乆侍師席今將告違氣質偏蔽不能自知尚望賜以一言使終身知所佩服曰凢前此所講論者不過如此亦别無他説但於大本上用力凡讀書窮理須要㸔得親切某少年曾有一畨專㸔親切處其他器數都未暇考此雖未為是却與今之學者汎然讀過者似亦不同丙午四月五日見先生坐定問從何来某云自丹陽来問仙鄉莫有人講學某説鄉里多理㑹文辭之學問公如何用心某説收放心慕顔子克己氣象㳺判院教某常收放心常察忘與助長曰固是前軰煞曾講説差之毫釐繆以千里今之學者理㑹經書便流為傳註理㑹史學便流為功利不然即入佛老最怕差錯問公留意此道幾年何故向此某説先妣不幸某憂痛無所措身因讀西銘見説乾父坤母終篇皆見説得是遂自此棄科舉某十年願見先生縁家事為累今家事盡付妻子於世務絶無累又無功名之念正是侍教誨之時先生説公已得操心之要問公常讀何書答云㸔伊川易傳語孟精義程氏遺書近思録先生説語孟精義皆諸先生講論其間多異同非一定文字又在人如何㸔公畢竟如何用心某説仰慕顔子見其氣象極好如三月不違仁得一善則拳拳服膺如克己之目某即察私心欲去盡然而極難頃刻不存則忘才著意又助長覺得甚難先生云且只得恁地先生問君十年用功莫須有見䖏某謝資質愚鈍未有見處望先生教誨先生云也只是這道理先軰都説了問仙鄉莫煞有人講學某説鄉里多從事文詞先生説早来説底學經書者多流為傳注學史者多流為功利不則流入釋老某即説㳺判院説釋氏亦格物亦有知識但所見不精先生説近學佛者又生出許多知解各立知見又却都不如它佛元来説得直截問都不曾見誰某説只見游判院薛象先略曾見先生説聞説薛象先甚好只是不相識曾有何説某説薛太博教某居仁由義仁者人之安宅義者人之正路别有何説某説薛太博論顔子克己之目舉伊川四箴某又説薛太博説近多時不聞人説這話謂某學問實頭但不須與人説退之言不可公傳道之在孟子己私淑諸人先生云却不如此孟子説君子之教者五上四者皆親教誨之如私淑艾乃不曾親見私傳此道自治亦猶我教之一等如私淑諸人乃孟子説我未得為孔子徒也但私傳孔子之道淑諸人又説與同座二客如竇君説話與公别池録作此公却别不用心於外晩見先生同坐廖教授子晦敬之先生説向来人見尹和靖云諸公理㑹得箇學字否只是學做箇人人也難做如堯舜方是做得箇人某説天地人謂之三極人才有些物欲害處便不與天地流通如何得相似誠為難事先生曰是問鎮江耿守如何某説民間安土樂業云見説好只是不相識先生説與廖子晦適間文卿説明道語學者要鞭逼近裏切問而近思仁在其中矣又曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行只此是學質羙者明得盡查滓便渾然却與天地同體其次荘敬持養及其至則一也明得盡時查滓已自化了荘敬持養未能與已合以下訓從周先生問曾理㑹敬字否曰程先生説主一之謂敬無適之謂一曰畢竟如何見得這敬字曰端荘嚴肅則敬便存曰須是將敬来做本領涵養得貫通時才敬以直内便義以方外義便有敬敬便有義如居仁便由義由義便居仁某説敬莫只是涵養義便分别是非曰不湏恁地説不敬時便是不義學者理㑹道理當深沉􅅗思又曰讀書如煉丹初時烈火鍛煞然後漸漸慢火養又如煑物初時烈火煑了却須慢火養讀書初勤敏著力仔細窮究後来却須緩緩温尋反復玩味道理自出又不得貪多欲速直須要熟工夫自熟中出文卿病在貪多欲速公㸔道理失之太寛譬如小物而用大籠罩終有轉動又如一物上下四旁皆有所添引如此則必不精矣當如射者專心致志只㸔紅心若㸔紅心又覷四邊必不能中列子説一射者懸蝨於户視之三年大如車輪想當時用心專一不知有他雖實無這事要當如此所見方精某説克伐怨欲此四事自察得却絶少昨日又思量剛字先聖所取甚重曰吾未見剛者某驗之於身亦庶幾焉且如有邪正二人欲某曲言之雖死不可先生曰不要恁地説惟天性剛强之人不為物欲所屈如克伐怨欲亦不要去尋来勝他如此則胷中随從者多反害事只此便是克伐怨欲只是虚心㸔物物来便知是與非事事物物皆有箇透徹無隔礙方是才一事不透便做病且如公説不信隂陽家説亦只孟浪不信夜来説神仙事不能得了當究竟知否某對未知的當請問先生曰伊川曾説地美神靈安子孫盛如不為五者今之隂陽家却不知惟近世呂伯恭不信然亦是横説伊川言方為至當古人卜其宅兆是有吉凶方卜譬如草木理㑹根源則知千條萬葉上各有箇道理事事物物各有一線相通須是曉得敬夫説無神仙也不消得便有也有甚竒異彼此無相干又管他什麽却須要理㑹是與非且如説閒話多亦是病尋不是處去勝他亦是病便將来做克伐怨欲㸔了一切掃除若此心湛然常如明鏡物来便見方是如公前日有些見處只管守著歡喜則甚如漢髙祖得關中若見寳貨婦女喜後便住則敗事矣又如既取得項羽只管喜後不去經畫天下亦敗事正如過渡既已上岸則當向前不成只管讃歎渡舡之功聖人言語一重又一重須入深處㸔若只見皮膚便有差錯須深沉方有得夜来所説是終身規模不可便要使便有安頓先生問如何理㑹致知格物從周曰涵養主一使心地虚明物来當自知未然之理曰恁地則兩截了先生問竇云尋常㸔敬字如何曰心主於一而無有它適先生曰只是常要提撕令胷次湛然分明若只塊然獨坐守著箇敬却又昏了須是常提撕事至物来便曉然判别得箇是非去竇云每常胷次湛然清明時覺得可悦曰自是有可悦之理只是敬好敬以直内便能義以方外有箇敬便有箇不敬常如此戒懼方不睹不聞未有私欲之際已是戒懼了及至有少私意發動又却謹獨如此即私意不能為吾害矣德明竇問讀大學章句或問雖大義明白然不似聽先生之教親切曰既曉得此意思須持守相稱方有益誠敬二字是涵養它底徳明竇自言夢想顛倒先生曰魂與魄交而成寐心在其間依舊能思慮所以做成夢因自言數日病只管夢解書向在官所只管夢為人判狀竇曰此猶是日中做底事曰只日中做底事亦不合形於夢德明朱子語類卷一百十四
