body:
  text: 朱子語類卷二十九論語十一公冶長下子路有聞章問子路有聞未之能行惟恐有聞因舉子路數事以明子路好學如此而仕衛之出䖏乃如彼曰今只當就子路有聞上考究不須如此牽二三説不知要就此䖏學子路未之能行惟恐有聞還只要求子路不是處如此㸔恐将本意失了就此言之見得子路勇於為善䖏他這䖏直是見得如此分明到得聞其正名䖏却鶻突學者正要㸔他這䖏在衛又是别項説話也又曰可見古人為己之實䖏子路急於為善唯恐行之不徹譬如人之飲食有珍羞異饌須是喫得盡方好若喫不透亦徒然子路不急扵聞而急於行今人惟恐不聞既聞得了冩在冊子上便了不去行䖏着工夫賀孫㝢録畧子貢問曰孔文子章問孔文子孔姞之事如此不好便敏而好學不恥下問濟得甚事而聖人取之何也曰古人諡法甚寛所謂節以一惠言只有一善亦取之節者節略而取其一善也孔文子固是不好只節此一惠則敏學下問亦是它好䖏銖問孔文子之謚曰古人有善雖多而舉一以為諡如有十事皆善只舉一善可以包之如九事不善只有一善則亦可以一善為謚皆無一善而後名之曰幽厲凡二字謚非禮也如貞惠文子睿聖武公皆是饒兩字了周末王亦有二字謚淳問勤學好問為文謚之以文莫是見其躬行之實不足否曰不要恁地説不成文王便是不能武武王便是不能文謚以尊名節以壹惠如有十事不善云云同淳録至名之曰幽厲它而今是能勤學好問便謚之以文如何見得它躬行之不足那不好底自是不好而今既謚之以文便見得它有這一長如何便説道是将這一字來貶它又問孫宣公力言雙字謚之非不知雙字謚起扵何時曰謚以尊名節以壹惠便是只以一字謚為惠而今若加二字或四字皆是分外有了若如文王之徳如此却将幾箇字謚方盡如雙字謚自周已是如此了如威烈王慎靚王皆是義剛孔文子何以謂之文也此一段專論謚故注云非經天緯地之文也周禮謚只有二十八字如文字文王謚曰文周公亦謚為文今孔文子亦謚為文不成説孔文子與文王一般盖人有善多者則摘其尤一事為謚亦有只有一善則取一善為謚而隠其他惡者如孔文子事是也僴吉甫問經天緯地之文曰經天緯地是有文理一横一直皆有文理故謂之文孔文子之文是其小者如本朝楊文公之属亦謂之文盖卿問經天緯地曰文曰經是直底緯是横底理㑹得天下事横者直者各當其䖏皆有條理分曉便是經天緯地其次如文辭之類亦謂之文但是文之小者耳直卿云伊川謂倫理明順曰文此言甚好佐問文如何經天緯地曰如織布絹經是直底緯是横底或問文之大者莫是唐虞成周之文曰裁成天地之道輔相天地之宜此便是經天緯地之文問文只是發見于外者為文曰䖏事有文理是䖏是文節因論孔文子曰聖人寛腸大度所以責人也寛燾問孔文子敏而好學與顔子之好學如何曰文子與顔子所以不同者自是顔子所好之學不同不干以能問扵不能事使文子以能問於不能亦只是文子之學伯羽子謂子産章問子産温良慈愷莫短於才否曰孔子稱子産有君子之道四安得謂短於才子産政事盡做得好不專愛人做得不是他須以法治之孟子所言惠而不知為政者偶一事如此耳僴問使民也義是教民以義先生應節問其使民也義如都鄙有章上下有服田有溝洫廬井有伍之類謂為之裁䖏得是當使之得其定分也曰義字説得未是義字有剛斷之意其養民則惠使民則義惠字與義字相反便見得子産之政不専在於寛就都鄙有章䖏㸔得見義字在子産上不在民上南升吉甫問都鄙有章上下有服曰有章是有章程條法有服是貴賤衣冠各有制度鄭國人謂取我田疇而伍之取我衣冠而褚之是子産為國時衣服有定制不敢着底皆收之囊中故曰取而褚之至盖卿録云有章一都一鄙各有規矩有服是衣冠服用皆有等級髙卑臧文仲居蔡章山節藻棁為藏龜之室以瀆鬼神便是不知古人卜筮之事固有之但一向靠那上去便是無意智了如祀爰居是見一鳥飛来便去祀他豈是有意智㸔他三不知皆是瀆鬼神之事山節藻棁不是僭若是僭時孔子當謂之不仁臧文仲在當時既没其言立人皆説是非常底人孔子直是見他不是處此篇最好㸔便見得聖人微顯闡幽䖏南升時舉録見下文振問臧文仲季文子令尹子文陳文子數段曰此數段是聖人微顯闡幽䖏惟其似是而非故聖人便分明説出来要人理㑹得如臧文仲人皆以為知聖人便説道它既惑於鬼神安得為知盖卜筮之事聖人固欲使民信之然藏蓍龜之地須自有箇合當底去䖏今文仲乃為山節藻棁以藏之便是它心一向倒在卜筮上了如何得為知古説多道它僭某以為若是僭則不止謂之不知便是不仁了聖人今只説他不知便是只主不知而言也時舉問居蔡之説如集注之云則是藏龜初未為失而山節藻棁亦未為僭臧文仲所以不得為知者特以其惑於鬼神而作此室以藏龜爾曰山節藻棁恐只是華飾不見得其制度如何如夫子只譏其不知便未是僭所謂作虛器而已大夫不藏龜禮家乃因此立説必大臧文仲無大段善可稱但他不好䖏如論語中言居蔡之事左氏言不仁不知者三却占頭項多了然他是箇㑹説道理底人如教行父事君之禮如宋大水魯遣使歸言宋君之意臧曰宋其興乎成湯罪已其興也勃焉桀紂罪人其亡也忽焉皆是他㑹説燾子張問曰令尹子文章或問令尹子文之忠若其果無私意出於至誠惻怛便可謂之仁否曰固是然不消泥他事上説須㸔他三仕三己還是當否以舊政告新令尹又須㸔他告得是否只縁他大體既不是了故其小節有不足取如管仲之三歸反坫聖人却與其仁之功者以其立義正也故管仲是天下之大義子文是一人之私行耳譬如仗節死義之人視坐亡而立化者雖未必如他之翛然然大義却是彼雖去得好却不足取也時舉三仕三己所以不得為仁盖不知其事是如何三仕之中是有無合當仕否三己之中又不知有無合當己否明作黄先之問子文文子二節曰今人有些小利害便至於頭紅面赤子文却三仕三己畧無喜愠有些小所長便不肯輕以告人而子文乃盡以舊政告之新尹此豈是容易底事其地位亦甚髙矣今人有一毫係累便脱洒不得而文子有馬十乗乃棄之如敝屣然此亦豈是易事常人豈能做得後人因孔子不許他以仁便以二子之事為未足道此却不可須當思二子所為如此髙絶而聖人不許之以仁者因如何未足以盡仁就此䖏子細㸔便見得二子不可易及而仁之體段實是如何切不可容易㸔也時舉履之説子文文子曰公推求得二子太苛刻不消如此某注中亦説得甚平不曾如公之説聖人之語本自渾然不當如此搜索他後手今若有箇人能三仕三巳無喜愠也是箇甚麽様人這箇強不得若強得一畨無喜愠第二畨定是動了又如有馬十乗也自是箇巨室有力量人家誰肯棄而違之文子却脱然掉了去也自是箇好人更有多少人􅂸捨去不得底所以聖人亦許其忠與清只説未知焉得仁聖人之語本自渾然不當如此苛刻搜人過惡兼也未消論到他後来在僴燾録别出或問令尹子文一章曰如子文之三仕三已而無喜愠已是難了不可説他只無喜愠之色有喜愠之心若有喜愠之心只做得一畨過如何做得兩三畨過舊令尹之政必告新令尹亦不可説他所告是私意只説未知所告者何事陳文子有馬十乗亦是大家他能棄而去之亦是大段放得下了亦不可説他是避利害如此割舎且當時有萬千􅂸捨不得不去底如公之論都侵過説太苛刻了聖人是平説本自渾然不當如此搜索他後手燾問令尹子文之事集注言未知皆出於天理而無人欲之私故聖人但以忠許之竊詳子文告新令尹一節若言徒知有君而不知有天子徒知有國而不知有天下推之固見其不皆出於天理也至於三仕無喜三已無愠分明全無私欲先生何以識破他有私䖏曰也不曾便識破但是夫子既不許之以仁必是三仕三已之間猶或有未善也壮祖集注問先生謂當理而無私心則仁矣先言當理而後言無私心者莫只是指其事而言之歟曰然廣或問子文文子未得為仁如何曰仁者當理而無私心二子各得其一蓋子文之無喜愠是其心固無私而於事則未盡善文子潔身去亂其事善矣然未能保其心之無私也仁須表裏心事一一中理乃可言聖人辭不迫切只言未知如何而得仁則二子之未仁自可見銖此説可疑問集注論忠清與本文意似不同曰二子忠清而未盡當理故止可謂之忠清而未得為仁此是就其事上着實研究出来若不如此即不知忠清與仁有何分别此須做箇題目入思議始得未易如此草草説過賜問子文之忠文子之清聖人只是就其一節可取如仁却是全體所以不許他曰也恁地説不得如三仁聖人也只是就他一節上説畢竟一事做得是時自可以見其全體古人謂觀鳳一羽足以知其五色之備如三仁之事皆不可見聖人當時許之必是有以見得他透徹若二子之事今皆可考其病敗亦可見以表證裏則其裏也可知矣燾問子文之忠文子之清未知焉得仁曰此只就二子事上説若比干伯夷之忠清是就心上説若論心時比干伯夷己是仁人若無讓國諫紂之事亦只是仁人盖二子忠清元自仁中出若子文文子夫子當時只見此兩件事是清與忠不知其如何得仁也又曰夫欲論仁如何只将一兩件事便識得此人破須是盡見得他表裏方識得破去偽夷齊之忠清是本有底故依舊是仁子文文子之忠清只得喚做忠清賜問子文若能止僭王猾夏文子去就若明是仁否曰若此却是以事上論曰注中何故引此曰但見其病耳可學師䢼問云云曰大槩㸔得也是若就二子言之則文子資禀甚髙只縁他不講學故失䖏亦大子文文子一章事上迹上是忠清上蔡解見䖏是仁子文只是忠不可謂之仁若比干之忠見得時便是仁也容有質厚者能之若便以為仁恐子張識忠清而不識仁也方集義五峯説令尹子文陳文子䖏以知為重説未知焉得仁知字絶句今知言中有兩章説令尹䖏云楚乃古之建國令尹為相不知首出庶物之道若如此則是謂令尹為相徒使其君守僭竊之位不能使其君王天下耳南軒謂恐意不如此然南軒當時與五峯相與徃復亦只是講得箇大體南軒只做識仁體認恐不盡領㑹五峯意耳五峯疑孟之説周遮全不分曉若是恁地分疏孟子剗地沈淪不能得出㽦問五峯問南軒陳文子之清令尹子文之忠初無私意如何聖人不以仁許之枅嘗思之而得其説曰仁之體大不可以一善名須是事事盡合於理方謂之仁若子文之忠雖不加喜愠於三仕三巳之時然其君僭王竊號而不能正救文子之清雖棄十乗而不顧然崔氏無君其惡已著而畧不能遏止之是盡於此而不盡扵彼能扵其小而不能於其大者安足以語仁之體乎曰讀書不可不子細如公之説只是一説非聖人當日本意夫仁者心之徳使二子而果無私心則其仕已而無喜愠當不特謂之忠而謂之仁棄十乗而不居當不特謂之清而謂之仁聖人所以不許二子者正以其事雖可觀而其本心或有不然也枅令尹子文陳文子等是就人身上説仁若識得仁之統體即此等不難曉矣或曰南軒解此謂有一毫私意皆非仁如令尹子文陳文子以終身之事求之未能無私所以不得為仁曰孔子一時答他亦未理㑹到他終身事只據子張所問底事未知是出於至誠惻怛未知是未能無私孔子皆不得而知故曰未知焉得仁非是以仕巳無喜愠與棄而違之為非仁也這要在心上求然以心論之子文之心勝文子之心只是心中有些小不慊快䖏便不是仁文蔚曰所以孔子稱夷齊曰求仁而得仁又何怨曰便是要見得到此文蔚季文子三思而後行章問季文子三思而後行章曰思之有未得者須着子細去思到思而得之這方是一思雖見得已是又須平心更着思一遍如此則無不當者矣若更過思則如秤子稱物相似推来推去輕重却到不定了時舉季文子三思而後行子曰再斯可矣曰聖人也只是大槩如此説謂如明理底人便思三兩畨亦不到得私意起又如魯鈍底人思一両畨不得第三四畨思得之無定然而多思大率流而入私意底多雖此是聖人就季文子身上説然而聖人之言自是渾厚占得地位濶再斯可矣是常法大槩當如此燾季文子三思而後行程子所謂三則私意起而反惑如何曰這是某當問公底某云若是思之未透雖再三思之何害先生曰不然且如凡事初一上商量已得成箇體段了再思一畨與之審處當行不當行便自可決斷了若扵其中又要思量那箇是利那箇是害則避害就利之心便起如何不是私炎問㸔雍也更有何商量處賀孫曰向㸔公冶長一篇如㣲生髙季文子三思二章覺得扵人情未甚安曰是如何未安如今㸔得如何曰向㸔得如乞醯事也道是着如此委曲三思事也道是着如此審細如今㸔来乃天理人欲相勝之機曰便是這般所在本是平直易㸔只縁被人説得支蔓故學者多㸔不見這般所在如一件物事相似自恁地平平正正更不着得些子蹺欹是公鄉里人去説這般所在却都勞攘了凡事固是着審細才審一畨又審一畨這道理是非己自分曉少間纔去計較利害千思百筭不能得了少間都滚得一齊没理㑹了問這差䖏是初間畧有些意差後来意上生意不能得了曰天下事那裏被你筭得盡才計較利害莫道三思雖百思也只不濟事如今人須要計較到有利無害處所以人欲只管熾義理只管滅横渠説聖人不教人避凶而趨吉只教人以正信勝之此可破世俗之論這不是他㸔這道理洞徹如何説得到這裏若不是他堅勁峭絶如何説得到這裏又云聖人於㣲䖏一一指㸃出来教人他人㸔此二章也只道是似閒賀孫又問乞醯及三思章曰三思是亂了是非天下事固有難易易底是非自易見若難事初間審一審未便決得是非更審一審這是非便自㑹分明若只管思量利害便紛紛雜雜不能得了且如只是思量好事若思得紛雜雖未必皆邪巳自不正大漸漸便入扵邪僻况初来原頭自有些子私意了如乞醯若無便説無若恁地曲意周旋這不過要人道好不過要得人情本是要周旋不知這心下都曲小了若無便説無是多少正大至若有大急難非己可成明告扵衆以共濟其急難這又自不同若如乞醯務要得人情這便與孟子所謂士未可以言而言可以言而不言是皆穿窬之類也同意易比之九五云顯比王用三驅失前禽邑人不誡吉聖人之於人来者不拒去者不追如何一一要曲意周旋纔恁地便滯扵一偏况天理自不如此賀孫寗武子邦有道則知章問寗武子章曰武子不可不謂知但其知時人可得而及南升問寗武子曰此無甚可疑邦有道安分做去故無事可稱邦無道則全身退聽非難人皆能如此惟其不全身退聽却似愚然又事事䖏置得去且不自表著其能此所以謂其愚不可及也賜寗俞邦有道則智邦無道則愚邦雖無道是他只管向前做那事去又却能沉晦不露是非避事以免禍也言不可及亦猶荘子之難能深子之之辭端䝉通老問寗武子之愚曰愚非愚魯之謂但是有才不自暴露觀衛侯為晉文公所執他委曲調護此豈愚者所能為故文公以為忠而免之忠豈愚之謂當亂世而能如此此其所以免禍也可學寗武子當衛成公出奔時煞曾經營着力来愚只是沈晦不認為己功故不可及若都不管國家事以是為愚豈可以為不可及也去偽問寗武子其愚不可及曰他人扵邦無道之時要正救者不能免患要避患者又却偷安若寗武子之愚既能韜晦以免患又自䖏不失其正此所以為不可及因舉晉人有送酒者云可力飲此勿預時事如此之愚則人皆能之也人傑寗武子邦無道則愚曰愚有兩節有一般愚而冒昧向前底少間都做壊了事如寗武子雖冒昧向前不露圭角只猝猝做将去然少間事又都做得了此其愚不可及也燾器之問當衞之無道武子却不明進退之義而乃周旋其間不避艱險是如何曰武子九世公族與國同休戚要與尋常無干渉人不同若無干渉人要去也得住也得若要去時須早去始得到那艱險時節却要去是甚道理㝢問寗武子世臣他人不必如此曰然又㸔事如何若羈旅之臣見幾先去則可若事已爾又豈可去此事最難當權其輕重可學問寗武子愚䖏曰盖不自表暴而能周旋成事伊川所謂沈晦以免患是也木之集注問先生謂武子仕成公無道之君云云此其愚之不可及也後面又取程子之説曰邦無道能沈晦以免患故曰不可及也亦有不當愚者比干是也若所謂亦有不當愚者固與先生之意合若所謂沈晦以免患者却似與先生意異曰武子不避艱險以濟其君愚也然卒能全其身者知也若當時不能沈晦以自䖏則為人所害矣尚何君之能濟哉故當時稱知又稱其愚也廣周元興問寗武子曰武子當文公有道之時不得作為然它亦無事可見此其知可及也至成公無道失國若智巧之士必且去深僻䖏隠避不肯出来武子竭力其間至誠懇惻不避艱險卻能擺脱禍患卒得兩全非它能沈晦何以致此若比以智自免之士武子郤似箇愚底人但其愚得来好若使别人䖏之縱免禍患不失扵此則失扵彼此武子之愚所以不可及若比干諫而死㸔来似不㑹愚底人然它於義却不當愚只得如此䖏又與武子不同故伊川説亦有不當愚者比干是也銖問比干何以不當愚曰世間事做一律㸔不得聖人不是要人人學寗武子但如武子亦自可為法比干却是父族微子既去之後比干不容扵不諫諫而死乃正也人當武子之時則為武子當比干之時則為比干執一不得也時舉子在陳章斐然成章也是自成一家了做得一章有頭有尾且如狂簡真箇了得狂簡底事不是半上落下雖與聖賢中道不同然畢竟是他做得一項事完全與今學者有頭無尾底不同聖人不得中道者與之故不得已取此等狂狷之人尚有可裁節使過不及歸于中道不似如今人不曾成得一事無下手脚裁節䖏且如真箇了得一箇狂簡地位己自早不易得釋老雖非聖人之道却被他做得成一家明作成章是做得成片段有文理可觀盖他狂也是做得箇狂底人成不是做得一上又放掉了狷也是他做得狷底成不是但是今日狷明日又不狷也如孝真箇是做得孝成忠真箇是做得忠成子貢之辯子路之勇都是真箇做得成了不是半上落下今日做得明日又休也僴斐然成章狂簡進取是做得透徹有成就了成章謂如樂章五聲變成文之謂如五采成文之謂章言其做得成就只恐過了所以欲裁之若是半青半黄不至成就却如何裁得子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章當時從行者朝夕有商量無可憂者但留在魯國之人惟其狂簡故各自成章有頭有尾不知裁度若異端邪説釋老之學莫不自成一家此最害義如坐井觀天彼自以為所見之盡盖窟在井裏所見自以為足及到井上又却尋頭不着寧可理㑹不得却自無病人傑先之問孔子在陳小子狂簡欲歸而裁之然至後来曾晳之徒吊喪而歌全似老荘不知聖人既裁之後何故如此曰裁之在聖人而聽不聽在他也時舉問孔子在陳曰歸歟歸歟此盖夫子歴聘諸國見當時不能行其道也故欲歸而𫝊之門人狂簡者立髙逺之志但過髙而忽畧恐流扵異端故孔子思歸将以裁正之也曰孟子謂不忘其初便是只管一向過髙了又曰文振説文字大故細南升或問子在陳一章㸔得夫子行道之心切於𫝊道之心曰也不消如此説且如人而今做事還是做目前事還是做後面事盖道行扵時自然𫝊扵後然行之於時而𫝊之扵後則𫝊之尤廣也或曰如今日無非堯舜禹湯之道曰正此謂也又問裁之為義如物之不正須裁割令正也曰自是如此且如狂簡底人不裁之則無所收檢而流入扵異端盖這般人只管是要他身髙都不理㑹事所以易入扵異端大率異端皆是遯世髙尚底人素隠行怪之人其流為佛老又曰遯世髙尚皆是苦行底人而今所以無異端縁那様人都便入佛老去了且如孟之反不伐是他自占便宜䖏便如老氏所謂不為天下先底意思子桑子死琴張弔其喪而歌是不以生死芥蔕便如釋氏子桑户不衣冠而處夫子譏其同人道扵牛馬或問又云皆老氏之流也如此等人雖是志意髙逺然非聖人有以裁正之則一向狂去更無收煞便全不濟事了又云仁民愛物固是好事若流入扵墨氏摩頂放踵而利天下為之則全不好了此所以貴裁之也燾蜚卿問孔子在陳何故只思狂士不説狷者曰狷底已自不濟事狂底却有箇驅殻可以鞭䇿斐只是自有文采詩云有斐君子萋兮斐兮成章是自有箇次第自成箇模様賀孫問集注謂文理成就而著見是只就他意趍自成箇模様䖏説又云志大而畧扵細是就他志髙逺而欠實做工夫説否曰然狷者只是自守得些便道是了所謂言必信行必果者是也賀孫集注問先生解云斐文貌成章言其文理成就有可觀者不知所謂文是文辭邪亦指事理言之邪曰非謂文辭也言其所為皆有文理可觀也又問狂簡既是志大而畧扵事又却如何得所為成章曰隨他所見所習有倫有序有首有尾也便是異端雖與聖人之道不同然做得成就底亦皆隨他所為有倫序有首尾可觀也廣問集注謂文理成就如何曰雖是狂簡非中然却做得這箇道理成箇物事自有可觀不是半上落下故聖人雖謂其狂簡而不知所裁然亦取其成一箇道理大率孔門弟子隨其資質各能成就如子路之勇真箇成一箇勇冉求之藝真箇成一箇藝言語徳行之科皆然一齊被它做得成就了銖符舜功問集注釋狂簡之狂皆作高逺之意不知罔念作狂之狂與此狂字如何曰也不干事又問狂而不直如何曰此却畧相近狂而不直己自是不好了但尚不為惡狂若罔念作狂則是如桀紂様迷惑了義剛問恐其過中失正而或流扵異端如荘列之徒莫是不得聖人為之依歸而無所取裁者否曰也是恁地又問子夏教門人就洒掃應對上用工亦可謂實然不一再傳而便流為荘周何故曰也只是韓退之恁地説漢書也説得不甚詳人所見各不同只是這一箇道理才㸔得别便從那别處去義剛問狂簡䖏先生云古来異端只是遁世髙尚之士其流遂至扵釋老如子桑户死琴張臨其喪而歌是不以死生芥蔕胷次孟之反不伐便如道家所謂三寶一曰不敢為天下先是也似此等人雖則志意高遠若不得聖人裁定亦不濟事節伯夷叔齊章伯夷叔齊不念舊惡要見得他胷中都是義理拱壽文振問不念舊惡怨是用希曰此與顔子不遷怒意思相似盖人之有惡我不是惡其人但是惡其惡耳到他既改其惡便自無可惡者今人見人有惡便惡之固是然那人既改其惡又從而追惡之此便是因人一事之惡而遂惡其人却不是惡其惡也時舉南升録云此與不遷怒一般其所惡者因其人之可惡而惡之而所惡不在我及其能改只見他善䖏不見他惡䖏聖賢之心皆是如此不念舊惡非惡其人也惡其人之無狀處昨日為善今日為惡則惡之而不好矣昨日為惡今日為善則好之而不惡矣皆非為其人也聖人大率如此但伯夷平日以隘聞故特明之方子問伯夷不念舊惡曰這箇也只是恰好只是當然且如人之有惡自家合當怒之人既改了便不當更怒之然伯夷之清也却是箇介僻底人宜其惡惡直是惡之然能不念舊惡却是他清之好處燾問蘇氏言二子之出意其父子之間有違言焉若申生之事歟不念舊惡莫是父子之間有違言處否曰然問孟子所言伯夷事自是如此孤潔諌武王伐商又都是伯夷而叔齊之事不可得見未知其平時行事如何却並以不念舊惡稱之曰讓國二子同心度其當時必是有怨惡處問父欲立叔齊不立伯夷在叔齊何有怨惡曰孤竹君不立伯夷而立叔齊想伯夷當時之意亦道我不當立我弟却當立叔齊須云兄當立不立却立我兄弟之間自不能無此意問兄弟既遜讓安得有怨曰只見得他後來事當其初豈無怨惡之心夫子所以兩處皆説二子無怨問某看怨是用希之語不但是兄弟間怨希這人孤立易得與世不合至此無怨人之心此其所以為伯夷叔齊歟曰是如此㝢或問問蘇氏父子違言之説恐未穏否曰蘇氏之説以為已怨而希字猶有些怨在然所謂又何怨則絶無怨矣又不相合恐只得從伊川説怨是人怨舊惡如衣冠不正望望然去之類盖那人有過自家責他他便生怨然他過能改即止不復責他便不怨矣其所怨者只是至愚無識不能改過者耳淳孰謂微生高直章醯至易得之物尚委曲如此若臨大事如何當有便道有無便道無才枉其小便害其大此皆不可謂誠實也去偽只乞諸其隣而與之便是屈曲處又問或朋友間急來覔一物自家若無與他去鄰家覔之却分明説與可否曰這箇便是自家要做一面人情盖謂是我為你乞得燾問看孔子説微生高一章雖一事之微亦可見王霸心術之異處一便見得皥皥氣象一便見得驩虞氣象曰然伊川解顯比一段説最詳賀孫問微生高不過是曲意徇物掠美市恩而已所枉雖小害直甚大聖人觀人每於微處便察見心術不是曰所謂曲意徇物掠美市恩其用心要作甚南升集注問范氏言千駟萬鍾從可知焉莫是説以非義而予必有非義而取否曰不是説如此予必如此取只看他小事尚如此到處千駟萬鍾亦只是這模様微生高用心也是怪醯有甚難得之物我無了那人有教他自去求可矣今却轉乞與之要得恩歸於己若教他自就那人乞恩便歸那人了此是甚心術淳錄云若是𦂳要底物我無則求與之猶自可若曰宛轉濟人急難則猶有説今人危病轉求丹藥之類則有之問取予二字有輕重否㝢以為寜過於予必嚴於取如何曰如此却好然看一介不以與人一介不以取人本不分輕重今看予自是予他人不是入己寜過些不妨却不干我事取則在己取之必當嚴楊問文中子言輕施者必好奪如何曰此說得亦近人情㝢問張子韶有一片論乞醯不是不直上蔡之説亦然曰此無他此乃要使人囘互委曲以為直爾噫此鄉原之漸不可不謹推此以往而不為枉尺直尋者幾希大雅行夫問此一章曰人煞有將此一段做好説謂其不如此抗直猶有委曲之意自張子韶為此説今煞有此説昨見戴少望論語講義亦如此説這一段下連巧言令色足恭都是一意當初孔門編排此書已從其類只自看如今有人來乞些醯亦是閒底事只是與他説自家無鄰人有之這是多少正大有何不可須要自家取來却做自底與之是甚氣象這本心是如何凡人欲恩由己出皆是偏曲之私恩由己出則怨將誰歸賀孫巧言令色足恭章義剛説足恭云只是過於恭曰所謂足者謂本當只如此我却以為未足而添足之故謂之足若本當如此而但如此則自是足了乃不是足凡制字如此類者是皆有兩義義剛問足恭曰足之為義湊足之謂也謂如合當九分却要湊作十分意謂其少而又添之也才有此意便不好燾足去聲讀求足乎恭也是加添之意盖能恭則禮已止矣若又去上面加添些子求足乎恭便是私欲也僴巧言令色足恭與匿怨皆不誠實者也人而不誠實何所不至所以可恥與上文乞醯之義相似去偽燾錄云這便是乞醯意思一般所以記類於此問巧言令色足恭是既失本心而外為諂媚底人匿怨而友其人是内懷險詖而外與人相善底人曰門人記此二事相連若是微生高之心弄來弄去便做得這般可恥事出來南升問左丘明謝氏以為古之聞人則左𫝊非丘明所作曰左丘是古有此姓名明自是一人作𫝊者乃左氏别自是一人是撫州鄧大著名世字元亞如此説他自作一書辨此義剛丘明所恥如此左𫝊必非其所作顔淵季路侍章問無伐善無施勞善與勞如何分别曰善是自家所有之善勞是自家做出來底燾問施勞之施是張大示誇意否曰然淳問老者安之朋友信之少者懷之孔子只舉此三者莫是朋友則是其等輩老者則是上一等人少者則是下一等此三者足以該盡天下之人否曰然廣問安老懷少恐其閒多有節目今只統而言之恐流兼愛曰此是大槩規模未説到節目也人傑顔淵季路侍一段子路所以不如顔淵者只是工夫粗不及顔淵細宻工夫粗便有不周徧隔礙處又曰子路只是願車馬衣服與人共未有善可及人也僴問願車馬衣輕裘與朋友共曰這只是他心裏願得如此他做工夫只在這上豈不大段麄又曰子路所願者麄顔子較細向裏來且看他氣象是如何僴或問子路顔淵言志曰子路只是説得麄若無車馬輕裘便無工夫可做顔子無伐善無施勞便細膩有工夫然子路亦是無私而與物共者銖子路如此做工夫畢竟是疎是有這箇車馬輕裘方做得工夫無這車馬輕裘不見他做工夫處若顔子則心常在這裏做工夫然終是有些安排在恪子路須是有箇車馬輕裘方把與朋友共如顔子不要車馬輕裘只就性分上理㑹無伐善無施勞車馬輕裘則不足言矣然以顔子比之孔子則顔子猶是有箇善有箇勞在若孔予便不見有痕迹了夫子不厭不倦便是純亦不已植問顔子子路優劣曰子路麄用心常在外願車馬之類亦無意思若無此不成不下工夫然却不私己顔子念念在此間顔季皆是願夫子則無願字曰夫子也是願又曰子路底收歛也可以到顔子顔子底純熟可以到夫子節子路顔淵夫子都是不私己但有小大之異耳子路只車馬衣裘之間所志已狹顔子將善與衆人公共何伐之有施諸己而不願亦勿施於人何施勞之有却已是煞展拓然不若聖人分明是天地氣象端䝉問顔淵季路侍一章曰子路與顔淵固均於無我然子路做底都向外不知就身己上自有這工夫如顔子無伐善無施勞只是就自家這裏做恭甫問子路後來工夫進如衣敝緼袍與衣狐貉者立而不恥這却見於裏面有工夫曰他也只把這箇做了自着破敝底却把好底與朋友共固是人所難能然亦只是就外做較之世上一等切切於近利者大不同賀孫問顔淵季路夫子言志曰今學者只從子路比上去不見子路地位煞高是上面有顔子底一層見子路低了更有夫子一層又見顔子低了學者望子路地位如何㑹做得他底他這氣象煞大不如是何以為聖門高弟植叔器曰子路但及朋友不及他人所以較小曰願車馬衣輕裘與朋友共以朋友有通財之義故如此説那行道之人不成無故解衣衣之但所以較淺小者他能舍得車馬輕裘未必能舎得勞善有善未必不伐有勞未必不施若能退後省察則亦深宻向前推廣則亦濶大范益之云顔子是就義理上做工夫子路是就事上做工夫曰子路是就意氣上做工夫顔子自是深潛淳粹淳錄作縝宻較别子路是有些戰國俠士氣象學者亦須如子路恁地割捨得士而懷居不足以為士矣若今人恁地畏首畏尾瞻前顧後粘手惹脚如何做得事成恁地莫道做好人不成便做惡人也不成先生至此聲拯洪叔器再反覆説前意先生曰且麄説人之生各具此理但是人不見此理這裏都黒窣窣地如猫兒狗子饑便待物事喫困便睡到富貴便極聲色之奉一貧賤便憂愁無聊聖人則表裏精粗無不昭徹其形骸雖是人其實只是一團天理所謂從心所欲不踰矩左來右去盡是天理如何不快活義剛或問子路願車馬衣輕裘與朋友共是他做功夫處否曰這也不是他做工夫亦是他心裏自見得故願欲如此然必有别做工夫處若依如此做功夫大段麄了又問此却見他心曰固是此見得他心之恢廣磨去得那私意然也只去得那麄底私意如顔子却是磨去那近裏底了然皆是對物我而言又云狂簡底人做來做去没收煞便流入異端如子路底人做來做去没收煞便成任俠去又問學者做功夫須自子路功夫做起曰亦不可如此説且如有顔子資質底不成交他做子路也燾亞夫問子路言志處曰就聖人上看便如日出而爝火息雖無伐善無施勞之事皆不必言矣就顔子上看便見得雖有車馬衣裘共敝之善既不伐不施却不當事了不用如子路様着力去做然子路雖不以車馬輕裘為事然畢竟以此為一件功能此聖人大賢氣象所以不同也時舉子路有濟人利物之心顔子有平物我之心夫子有萬物得其所之心道夫吳伯英講子路顔淵夫子言志先生問衆人曰顔子季路所以未及聖人者何衆人未對先生曰子路所言只為對着一箇不與朋友共敝之而有憾在顔子所言只為對着一箇伐善施勞在非如孔子之言皆是循其理之當然初無待乎有所懲創也子路之志譬如一病人之最重者當其既甦則曰吾當謹其飲食起居也顔子之志亦如病之差輕者及其既甦則曰吾當謹其動静語黙也夫出處起居動静語嘿之知所謹盖由不知謹者為之對也曾不若一人素能謹䕶調攝渾然無病問其所為則不過曰飢則食而渴則飲也此二子之所以異於聖人也至就二子而觀之則又不容無優劣季路之所志者不過朋友而已顔子之志則又廣矣季路之所言者麄顔子之所言者細也壯祖閎祖録云子路顔淵夫子言志伊川諸説固皆至當然二子之所以異於夫子者更有一意無憾對憾而言也無伐無施對伐施而言也二子日前想亦未免此病今方不然如人病後始願不病故有此言如夫子則更無懲創不假修為此其所以異也顔淵子路只是要克去驕吝二字如謝氏對伊川云知矜之為害而改之然謝氏終有矜底意如解孟之反不伐便着意去解人傑舊或説老者安之一段謂老者安於我朋友信於我少者懷於我此説較好盖老者安於我則我之安之必盡其至朋友信於我則我之為信必無不盡少者懷於我則我之所以懷之必極其撫愛之道却是見得聖人説得自然處義剛集註或問集注云安於我懷於我信於我何也曰如大學君子賢其賢而親其親小人樂其樂而利其利一般盖無一物不得其所也老者我去安他他便安於我少者我去懷他他便懷於我朋友我去信他他便信於我又問顔子子路所答曰此只是各説身己上病痛處子路想平日不能與朋友共裘馬顔子平日未能忘伐善施勞故各如此言之如新病安來説方病時事如説我今日病較輕得些便是病未曾盡去猶有些根脚更服藥始得彼云願則猶有未盡脱然底意思又如病起時説願得不病便是曾病來然二子如此説時便是去得此病了但尚未能如夫子自然而已如夫子則無此等了曠然如太空更無些滯礙其所志但如此耳更不消着力又曰古人揀己偏重處去克治子路是去得箇吝字顔子是去得箇驕字祖道了䕫孫録云二子言志恰似新病起人雖去得此病但着服藥隄防願得不再發作若聖人之志則曠然太虚了無一物又曰古人為學大率體察病痛就上面克治將去問老者安之云云一説安者安我也恭父謂兩説只一意先生曰語意向背自不同賀孫云若作安老者説方是做去老者安我説則是自然如此了曰然因舉史記魯世家及漢書地理志云魯道之衰洙泗之間齗齗如也謂先魯盛時少者代老者負荷老者即安之到後來少者亦知代老者之勞但老者自不安於役少者故道路之間只見遜讓故曰齗齗如也注云分辨之意也賀孫問仲由何以見其求仁曰他人於微小物事尚戀戀不肯捨仲由能如此其心廣大而不私己矣非其意在於求仁乎升卿叔䝉問夫子安仁顔子不違仁子路求仁曰就子路顔子聖人只是見處有淺深大小耳皆只是盡我這裏底子路常要得車馬輕裘與朋友共據他煞是有工夫了輕財重義有得些小潑物事與朋友共多少是好今人計較財物這箇是我底那箇是你底如此見得子路是高了顔子常要得無伐善施勞顔子工夫是大段縝宻就顔子分上正恰好了也只得如此到聖人是安仁地位大抵顔子無伐善無施勞也只與願車馬輕裘與朋友共敝相似夫子安老懷少信朋友也與無伐善無施勞相似但有淺深大小不同就子路地位更收歛近裏便㑹到無伐善無施勞處就顔子地位更極其精微廣大便到安老懷少信朋友爾㝢問夫子安仁顔淵不違仁子路求仁曰伊川云孔子二子之志皆與物共者也有淺深小大之間耳子路底淺顔子底深二子底小聖人底大子路底較粗顔子底較細膩子路必待有車馬輕裘方與物共若無此物又作麽生顔子便將那好底物事與人共之見得那子路底又低了不足為只就日用間無非是與人共之事顔子底儘細膩子路底只是較粗然都是去得箇私意了只是有粗細子路譬如脱得上面兩件鏖糟底衣服了顔子又脱得那近裏面底衣服了聖人則和那裏面貼肉底汗衫都脱得赤骨立了僴問觀子路顔子孔子之志皆是與物共者也纔與物共便是仁然有小大之别子路求仁者也顔子不違仁者也孔子安仁者也求仁者是有志於此理故其氣象高遠可以入道然猶自車馬輕裘上做工夫顔子則就性分上做工夫能不私其已可謂仁矣然未免於有意只是不違仁氣象若孔子則不言而行不為而成渾然天理流行而不見其迹此安仁者也曰説得也穏大凡人有已則有私子路願車馬衣輕裘與朋友共其志可謂高遠然猶未離這軀殻裏顔子不伐其善不張大其功則高於子路然願無伐善無施勞便是猶有此心但願無之而已是一半出於軀殻裏孔子則離了軀殻不知那箇是已那箇是物凡學學此而已南升時舉錄云文振問此章先生曰子路是不以外物累其心方剥得外面一重簏皮子去顔淵却又高一等便是又剥得一重細底皮去猶在軀殻子裏若聖人則超然與天地同體矣問孔子安仁固無可言顔子不違仁乃是已得之故不違便是克己復禮底事子路方有與物共之志故曰求仁曰然又曰這般事如今都難説他當時只因子路説出那一段故顔子就子路所説上説便見得顔子是箇已得底意思孔子又就顔子所説上説皆是將己與物對説子路便是箇舍己忘私底意思今若守定他這説曰此便是求仁不成子路每日都無事只是如此當時只因子路偶然如此説出故顔子孔子各就上面説去其意思各自不同使子路若别説出一般事則顔子孔子又自就他那一般事上説然意思却只如此文蔚子路顔淵孔子言志須要知他未言時如何讀書須迎前看不得隨後看所謂考跡以觀其用察言以求其心且如公説從仁心上發出所以忘物我言語也無病也説得去只是尚在外邊程先生言不私已而與物共是三段骨體須知義理不能已之處方是用得大抵道理都是合當恁地不是過當若到是處只得箇恰好事親若曾子可也從周顔子之志不以己之長方人之短不以己之能媿人之不能是與物共道夫問伊川言子路勇於義者觀其志豈可以勢利拘之哉曰能輕己之所有以與人共勢利之人豈肯如此子路志願正學者事㝢問車馬輕裘與朋友共亦常人所能為之事子路舉此而言却似有車馬衣裘為重之意莫與氣象煞遼絶否曰固則是只是如今人自有一等鄙吝者直是計較及於父子骨肉之間或有外面勉強而中心不然者豈可與子路同日而語子路氣象非富貴所能動矣程子謂豈可以勢利拘之哉木之問浴沂地位恁高程子稱子路言志亞於浴沂何也曰子路學雖粗然它資質也高如人告以有過則喜有聞未之能行惟恐有聞見善必遷聞義必徙皆是資質高車馬輕裘都不做事看所以亞於浴沂故程子曰子路只為不達為國以禮道理若達便是這氣象也淳問亞於浴沂者也浴沂是自得於中而外物不能以累之子路雖未至自得然亦不為外物所動矣曰是義剛問車馬輕裘與朋友共此是子路有志求仁能與物共底意思但其心不為車馬衣裘所累耳而程子謂其亞於浴沂據先生解曾㸃事煞高子路只此一事如何便亞得他曰子路是箇資質高底人要不做底事便不做雖是做工夫處麄不如顔子之細宻然其資質却自甚高若見得透便不千事廣問願聞子之志雖曰比子路顔子分明氣象不同然觀曾㸃言志一段集註盛贊其雖答言志之問而初實未嘗言其志之所欲為以為曾㸃但知樂所樂而無一毫好慕之心作為之想然則聖人殆不及曾㸃邪曰聖人言志雖有及物之意然亦莫非循其理之自然使物各得其所而已不勞焉又何害於天理之流行哉蓋曾㸃所言却是意思聖人所言盡是事實問不自私己故無伐善知同於人故無施勞恐是互舉曰他先是作勞事之勞説所以有那知同於人一句某後來作功勞之勞皆只是不自矜之意無伐善是不矜己能無施勞是不矜己功至之云無施勞但作己所不欲勿施於人意思解也好曰易有勞而不伐與勞謙君子有終皆是以勞為功義剛問施勞與伐善意思相類曰是相類問看來善自其平生之所能言勞以其一時之功勞言曰亦是勞是就事業上説問程子言不自私己故無伐善知同於人故無施勞看來不自私已與知同於人亦有些相似曰不要如此疑以善者己之所有不自有於己故無伐善以勞者人之所憚知同於人故無施勞㝢問集注云羈靮以御馬而不以制牛這箇只是天理聖人順之而已曰這只是天理自合如此炎錄云天下事合恁地處便是自然之理如老者安之是他自帶得安之理來朋友信之是他自帶得信之理來少者懷之是他自帶得懷之理來聖人為之初無形跡季路顔淵便先有自身了方做去如穿牛鼻絡馬首都是天理如此恰似他生下便自帶得此理來又如放龍蛇驅虎豹也是他自帶得驅除之理來如剪滅蝮虺也是他自帶得剪滅之理來若不驅除剪滅便不是天理所以説道有物必有則不問好惡底物事都自有箇則子又云子路更修教細宻便是顔子地位顔子若展拓教開便是孔子地位子路只縁麄了又問集注云皆與物共者也但有小大之差耳曰這道理只為人不見得全體所以都自狹小了最患如此聖人如何得恁地大人都不見道理形骸之隔而物我判為二又云強恕而行求仁莫近焉若見得萬物皆備於我如何不㑹開展又問顔子恐不是強恕意思子路却是強恕否曰顔子固不是強恕然學者須是強恕始得且如今人有些小物事有箇好惡自定去把了好底却把不好底與人這般意思如何得開濶這般在學者正宜用工漸漸克去便是求仁工夫賀孫伊川令學者看聖賢氣象曰要看聖賢氣象則甚且如看子路氣象見其輕財重義如此則其胷中鄙吝消了幾多看顔子氣象見其無伐善無施勞如此則其胷中好施之心消了幾多此二事誰人胷中無雖顔子亦只願無則其胷中亦尚有之聖人氣象雖非常人之所可能然其如天底氣象亦須知常以是涵養於胷中又云亦須看子路所以不及顔子處顔子所以不及聖人處吾所以不及賢者處却好做工夫叔器問先識聖人氣象如何曰也不要如此理㑹聖賢等級自分明了如子路定不如顔子顔子定不如夫子只要看如何做得到這裏且如願車馬衣輕裘敝之無憾自家真能如此否有善真能無伐否有勞真能無施否今不理㑹聖賢做起處義剛録作今不將他做處去切己理㑹體認分明着却只去想他氣象則精神却只在外自家不曾做得着實工夫須是切問而近思向時朋友只管愛説曾㸃漆雕開優劣亦何必如此但當思量我何縁得到漆雕開田地何縁得到曾㸃田地若不去學他做只管較他優劣義剛錄作如此去做將久便解似他他那優劣自是不同何必計較便較得分明亦不干自己事如祖公年紀自是大如爺爺年紀自是大如我只計較得來也無益叔器云希顔錄曾子書莫亦要如此下工夫否曰曾子事雜見他書他只是要聚做一處看顔子事亦只要在眼前也不須恁地起模畫様而今𦂳要且看聖人是如何常人是如何自家因甚後不似聖人因甚後只似常人就此理㑹得自是超凡入聖淳義剛同或問有人於此與朋友共實無所憾但貧乏不能復有所置則於所敝未能恝然忘情則如之何曰雖無憾於朋友而眷眷不能忘情於已敝之物亦非賢達之心也道夫附問謝氏解顔淵季路侍章或問謂其以有志為至道之病因及其所論浴沂御風何思何慮之屬毎每如此竊謂謝氏論學每有不屑卑近之意其聖門狂簡之徒歟集注云狂簡志大而畧於事也曰上蔡有此等病不是小分明是釋老意思向見其雜文一編皆不帖帖地如觀復堂記與謝人啟事數篇皆然其啟内有云志在天下豈若陳孺子之云乎身寄人間得如馬少游而足矣必大或問己矣乎章問程子曰自訟不置能無改乎又曰罪己責躬不可無然亦不當長留在心胷為悔今有學者幸知自訟矣心胷之悔又若何而能不留耶曰改了便無悔又問已往之失却如何曰自是無可救了必大時可問伊川云自訟不置能無改乎譬如人争訟一訟未決必至於再必至於三必至於勝而後已有過則亦必當攻責不已必至於改而後已曰伊川怕人有過只恁地訟了便休故説教着力看來世上也自有人徒恁地訟訟了便休只看有多少事來今日又恁地自訟明日又恁地自訟今年又恁地自訟明年又恁地自訟看來依舊不曾改變只是舊時人他也只知箇自訟是好事只是不誠於自訟賀孫十室之邑章或問美底資質固多但以聖人為生知不可學而不知好學曰亦有不知所謂學底如三家村裏有好資質底人他又那知所謂學又那知聖人如何是聖人又如何是生知堯如何是堯舜如何是舜若如此則亦是理㑹不得底了燾義剛説忠信如聖人生質之美者也此是表裏粹然好底資質曰是義剛朱子語類卷二十九
