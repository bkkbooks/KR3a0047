body:
  text: 朱子語類卷八十八禮五大戴禮大戴禮無頭其篇目闕處皆是元無非小戴所去取其間多雜偽亦有最好處然多誤難讀義剛大戴禮冗雜其好處已被小戴採摘來做禮記了然尚有零碎好處在廣大戴禮賀孫録云或有注或無注皆不可曉本文多錯注尤舛誤武王諸銘有直做得巧了切題者如鑑銘是也亦有絶不可曉者賀孫録云有煞著題處有全不著題處想古人只是述戒懼之意而隨所在寫記以自警省爾不似今人為此銘便要就此物上説得親切賀孫録云須要倣象本色然其間亦有切題者如湯盤銘之類至於武王盥盤銘則又似箇船銘賀孫録云因舉問數銘可疑曰便是如盥盤銘似可做船銘想只是因水起意然恐亦有錯雜處廣賀孫録少異太公銘几杖之屬有不可曉不著題之語古人文字只是有箇意思便説不似今人區區就一物上説安卿問大戴保傅篇多與賈誼策同如何曰保傅中説秦無道之暴此等語必非古書乃後人采賈誼策為之亦有孝昭冠辭義剛明堂篇説其制度有二九四七五三六一八鄭注云法龜文也此又九數為洛書之一騐也賀孫録云他那時已自把九疇作洛書看了廣朱子語類卷八十八
  hash: sha256:7fbacfe951b445006683a82b16eda6c34f03cc3cecd5c423fe9ee3c88ea6904f
