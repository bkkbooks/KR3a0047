body:
  text: 朱子語類卷五十四孟子四公孫丑下天時不如地利章孤虛以方位言如俗言向某方利某方不利之類王相指日時集説僴孟子将朝王章問孟子将朝王齊王托疾召孟子孟子亦辭以疾莫是以齊王不合托疾否曰未論齊王托疾㸔孟子意只説他不合来召盖在他國時諸侯無越境之禮只應以幣来聘故賢者受其幣而往見之所謂答禮行義是也如見梁恵王也是恵王先来聘之既至其國或為賓師有事則王自来見或自往見王但召之則不可召之則有自尊之意故不往見也答陳代如不待其招而往何哉此以在他國而言答萬章天子不召師而况諸侯乎此以在其國而言僴或問孟子将朝王一段曰賢者在異國諸侯可以使幣聘之若既在本國賢者可以自去相見諸侯却不當去召他了盖異國則諸侯不能親往故可以聘在國則君自當去相見又豈可以召哉要見孟子出䖏之義更兼陳代與公孫丑問不見諸侯䖏及天子不召師并之齊不見平陸事一道㸔方見得孟子自有一箇方法在問孟子不去亦兼惡其託疾不真實否曰觀其終篇不如此説又問平陸大夫既以幣交得不是何故又受他底曰又恐他忽地自来夫豈不義而曾子言之文勢似使管子而愚人也則可若是義理不是則曾子豈肯恁地説孟子之平陸章王之為都左傳邑有先君之廟曰都㸔得来古之王者甞為都䖏便自有廟賀孫録云古人之廟不遷如太王廟在岐文王廟在豐武王祭太王則扵岐祭文王則於豐賀孫云鎬京却無二王之廟王朝歩自周至于豐是自鎬至豐以告文王廟也又如晋獻公使申生祭于曲沃武公雖自曲沃入晋而其先君之廟則仍在曲沃而不徙也又如魯祖文王鄭祖厲王則諸侯祖天子矣三桓祖桓公則大夫祖諸侯矣故禮運曰諸侯不得祖天子大夫不得祖諸侯公廟之設私家非禮也自三桓始也是三桓各立桓公廟於其邑也又問漢原廟如何曰原再也如原蠶之原謂既有廟而再立一廟如本朝既有太廟又有景靈宫又問此於禮當否曰非禮也賀孫云問郡國有原廟否曰行幸䖏有之然皆非禮也然以洛邑有文武廟言之則似周亦有兩廟又問原廟之制如何曰史記月出衣冠逰之所賀孫云漢之原廟是藏衣冠之所謂藏髙帝之衣冠於其中月一取其衣冠出逰於國中也古之廟制前廟後寝寝所以藏亡者之衣冠故周禮守祧掌守先王先公之廟祧其遺衣服藏焉至漢時却移寝於陵所謂陵寝故眀帝於原陵見太后鏡奩中物而悲哀蔡邕因謂上陵亦古禮眀帝猶有古之餘意然此等議論皆是他講學不眀之故他只是偶見眀帝之事故為是説然何不使人君移此意於宗廟中耶又曰王之為都又恐是周禮所謂都鄙之都周禮四縣為都廣録同賀孫孟子為卿於齊章問孟子賓師之禮如何曰當時有所謂客卿者是也大概尊禮之而不居職任事召之則不往又却為使出弔於滕木之沈同以其私問章孟子答沈同伐燕一章誠為未盡何以異於是之下合更説是吊民伐罪不行殘虐之主方可以伐之如此乃善又孟子居齊許久伐燕之事必親見之齊王乃無一語謀於孟子而孟子亦無一語諌之何也想得孟子亦必以伐之為是但不意齊師之暴虐耳不然齊有一大事如此而齊王不相謀孟子豈可更居齊耶史記云鄒人孟軻勸齊伐燕云此湯武之舉也想承此誤然亦有不可曉者僴勸齊伐燕如何曰孟子言伐燕䖏有四須合而觀之燕之父子君臣如此固有可伐之理然孟子不曾教齊不伐亦不曾教齊必伐但曰為天吏則可以伐之又曰若殺其父兄係累其子弟則非孟子意也去偽燕人畔章安卿問周公誅管蔡自公義言之其心固正大直截自私恩言之其情終有不自滿䖏所以孟子謂周公之過不亦宜乎曰是但他豈得已哉莫到恁地較好㸔周公當初做這一事也大段踈脱他也㸔那兄弟不過本是怕武庚叛故遣管蔡霍叔去監他為其至親可恃不知他反去與武庚同作一黨不知如何紂出得箇兒子也恁地狡猾想見他當時日夜去炒那管叔説道周公是你弟今却欲簒為天子汝是兄今却只恁地管叔被他炒得心􅉯他性又急所以便發出這件事来堯卿問是時可調䕶莫殺否曰他已叛只得殺如何調䕶得蔡叔霍叔性較慢罪較輕所以只囚于郭鄰降為庶人想見當時被管叔做出這事来騷動許多百姓想見也怕人鴟鴞鴟鴞既取我子毋毁我室當時也是被他害得猛如常棣一詩是後来制禮作樂時作這是先被他害所以當天下平定後更作此詩故其辭獨哀切不似諸詩和平義剛曰周公也豈不知管叔狡獪但當時於義不得不封他曰㸔来不是狡獪只是獃子義剛孟子去齊章陳希真問孟子去齊䖏集注引李氏説憂則違之而荷蕢所以為果如何曰孟子與荷蕢皆是憂則違之但荷蕢果於去不若孟子遲遲吾行盖得時行道者聖人之本心不遇而去者聖人之不得已此與孔子去魯之心同盖聖賢憂世濟時之心誠非若荷蕢之果於去也時舉孟子去齊居休章沙隨謂繼而有師命乃師友之師非師旅也正齊王欲授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式時事先生曰舊已有此説但欲授孟子室乃孟子辭去時事所謂於崇吾得見王則初見齊王時事以此攷之則師旅為當道夫朱子語類卷五十四
