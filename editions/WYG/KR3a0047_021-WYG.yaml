body:
  text: 朱子語類卷二十一論語三學而篇中曽子曰吾日三省吾身章周伯夀問為人謀而不忠三句不知是此三事最緊要或是偶於此照管不到曰豈不是緊要若為人謀而不忠既受人之託若不盡心與他理㑹則不惟欺人乃是自欺且說道為人謀而不忠後這裏是㡬多病痛此便是謹獨底道理盖卿伯夀問曽子只以此三者自省如何曰盖是來到這裏打不過义問忠信曰忠以心言信以事言青是青黄是黄這便是信未有忠而不信信而不忠故眀道曰忠信内外也這内外二字極好節問曽子三省曰此三省自是切已底事為人處如何不要忠一才不忠便是欺矣到信知就事上去看謂如一件事如此為人子細斟酌利害直似已事至誠理㑹此便是忠如這事我看得如此與他說亦是如此只此便是信程先生云循物無違之謂信極好不須做體用說謙蜚卿言曽子三省固無非忠信學習之事然人之一身大倫之目自為人謀交朋友之外得無猶在所省乎曰曽子也不是截然不省别底只是見得此三事上實有纎毫未到處其他處固不可不自省特此三事較急耳大凡看文字須看取平莫有些小偏重處然也用時候到曽子三省只是他這些未熟如今人記書熟底非全不記但未熟底比似這箇較用著心力照管這也是他打不過處又云為人謀而忠也自是難底事大凡人為己謀便盡為人謀便未必盡直卿因舉先生舊說云人在山路避人必須立己於路後讓人於路前此為人謀之不忠也如此等處蹉過多少道夫問曽子三省曰此是他自見得身分上有欠闕處或録云他自覺猶於此欠闕故將三者省之若今人欠闕處多却不曽自知得恪曽子三省看來是當下便省得才有不是處便改不是事過後方始去改省了却又休也只是合下省得便與它改銖三省固非聖人之事然是曾子晩年進徳工夫盖微有這些子渣滓去未盡耳在學者則當隨事省察非但此三者而已鎬問三省忠信是聞一貫之後抑未聞之前曰不見得然未一貫前也要得忠信既一貫後也要得忠信此是徹頭徹尾底淳為人謀時竭盡自己之心這箇便是忠問如此則忠只是箇待人底道理曰且如自家事親有不盡處亦是不忠節為人謀不忠為人謀而不忠乎為他人謀一件事須盡自家伎倆與他思量便盡己之心不得鹵莽滅裂姑為它謀如烏喙是殺人之藥須向他道是殺人不得說道只有毒如火須向他道㑹焚灼人不得說道只是熱如今人為己謀必盡為他人謀不曽著心謾爾如此便是不忠泳問為人謀有二意一是為人謀那事一是這件事為己謀則如此為人謀則如彼曰只是一箇為人謀那裏有兩箇文勢只說為人謀何須更將為己來合挿此項看為人謀不忠如何便有罪過曽子便知人於為己謀定是忠便不必說只為人謀易得不忠為人謀如為己謀便是忠不如為己謀便是不忠如前面有虎狼不堪去說與人不須去便是忠若道去也得不去也得便是不忠文勢如此何必拗轉枝蔓看文字自理㑹一直路去豈不知有千蹊萬徑不如且只就一直路去久久自然通透如精義諸老先生說非不好只是說得忒寛易使人向别處去某所以做箇集注便要人只恁地思量文義曉得了只管玩味便見聖人意思出來㝢為人謀而不忠謀是主一事說朋友交而不信是泛說人自為謀必盡其心到得為他人謀便不子細致悞他事便是不忠若為人謀事一似為己為盡心䕫孫為人謀不忠與朋友交不信問為人謀而不忠與朋友交云云曰人之本心固是不要不忠信但才見是别人事便自不如已事切了若是計較利害猶只是因利害上起這箇病猶是輕惟是未計較利害時已自有私意這箇病却最重往往是才有這箇軀殻了便自私了佛氏所謂流注想者是也所謂流注者便是不知不覺流射做那裏去但其端甚微直是要省察時舉㝢錄同别出子善問云云曰未消說計較只是為别人做事自不著意這箇病根最深於計較伊川云人才有形便有彼已所以難與道合釋氏所謂流注想如水流注下去才有形便有此事這處須用省察㝢為人謀而不忠乎人以事相謀須是子細量度善則令做不善則勿令做方是盡己若胡亂應去便是不忠或謂人非欲不忠於人縁計較利之所在才要自家利少間便成不忠於人曰未說到利處大率人情處自己事時甚著緊把他人便全不相干大段緩了所以為不忠人須是去却此心方可明作問為人謀交朋友是應接事物之時若未為人謀未交朋友之時所謂忠信便如何做工夫曰程子謂舜鷄鳴而起孳孳為善若未接物時如何為善只是主於敬此亦只是存養此心在這裏照管勿差失㝢録作令勿偏倚便是戒謹乎其所不覩恐懼乎其所不聞不動而敬不言而信處淳㝢録略與朋友交而不信乎凡事要當用自家實底心與之交有便道有無便道無泳與朋友交忠信實理也道夫忠信忠信以人言之盖忠信以理言只是一箇實理以人言之則是忠信盖不因人做出來不見得這道理端蒙信者忠之驗忠只是盡己因見於事而信又見得忠如此端蒙忠信只是一字但是發於心而自盡則為忠驗於理而不違則為信忠是信之本信是忠之發義剛忠信只是一事而相為内外始終本末有於己為忠見於物為信做一事說也得做兩字說也得僴問曽子忠信却於外面理㑹曰此是修辭立其誠之意曰莫是内面工夫已到曰内外只是一理事雖見於外而心實在内告子義外便錯了可學問忠信二字曰忠則只是盡己與事上忠同體信不過是一箇實字意思但說處不同若只將做有諸巳說未是祖道信是言行相顧之謂道夫林子武問盡己之謂忠曰盡己字本是忠字之注脚今又要討盡己注脚如此是隔幾重何不試思自家為人謀時己曽盡不曽便須見得盡己底意思也閎祖盡己之謂忠問盡己之謂忠不知盡己之甚麽曰盡己之心又曰今人好說且恁地便是不忠節問盡己之謂忠曰盡時須是十分盡得方是盡若七分盡得三分未盡也不是忠又問忠是人心實理於事父謂之孝處朋友謂之信獨於事君謂之忠何也曰父子兄弟朋友皆是分義相親至於事君則分際甚嚴人每若有不得已之意非有出於忠心之誠者故聖人以事君盡忠言之又問忠與誠如何曰忠與誠皆是實理一心之謂誠盡心之謂忠誠是心之本主忠又誠之用處用者只是心中微見得用卓問盡己之忠此是學者之忠聖人莫便是此忠否曰固是學者是學聖人而未至者聖人是為學而極至者只是一箇自然一箇勉強爾惟自然故久而不變惟勉強故有時而放失因舉程子說孟子若做孔子事儘做得只是未能如聖人龜山言孔子似知州孟子似通判權州此喻甚好通判權州也做得只是不久長壯祖或問學者盡己之忠如何比得聖人至誠不息曰只是這一箇物但有精粗衆人有衆人底忠學者有學者底忠賢者有賢者底忠聖人有聖人底忠衆人只是樸實頭不欺瞞人亦謂之忠直卿云己字便是至誠字盡字便是不息字至誠便是維天之命不息便是於穆不已學蒙未有忠而不信未有信而不忠者盡己之謂忠以實之謂信以用也泳盡己謂忠以實謂信文振問盡己之謂忠以實之謂信曰忠信只是一理自中心發出來便是忠著實便是信謂與人說話時說到底見得恁地了若說一半不肯說盡便是不忠有這事說這事無這事便說無便是信只是一箇理自其發於心謂之忠驗於事謂之信又文振說發己自盡為忠循物無違謂信發己自盡便是盡己循物無違譬如香爐只喚做香爐桌只喚做桌便著實不背了若以香爐為桌桌為香爐便是背了它便是不著實恪問盡己之謂忠曰盡己只是盡自家之心不要有一毫不盡如為人謀一事須直與它說這事合做與否若不合做則直與說這事決然不可為不可說道這事恐也不可做或做也不妨此便是不盡忠信即是忠之見於事者所以說忠信内外也只是一物未有忠而不信者亦未有信而不出於忠者只是忠則專就發己處說信則說得來周遍事上都要如此問忠信為傳習之本曰人若不忠信更無可得說習箇甚麽僴林正卿問盡己之謂忠以實之謂信曰自中心而發出者忠也施於物而無不實者信也且如甲謂之甲乙謂之乙信也以甲為乙則非信矣與發己自盡循物無違之義同又問維天之命於穆不已忠也與盡己之忠如何曰不同曽子答門人一貫之問借此義以形容之耳人傑問盡己之謂忠以實之謂信信既是實先生前又說道忠是實心不知如何分别曰忠是就心上說信是指事上說如今人要做一件事是忠做出在外是信如今人問火之性是如何向他說熱便是忠火性是熱便是信心之所發既實則見於事上皆是實若中心不實則見於事上便不實所謂不誠無物若心不實發出來更有甚麽物事賀孫忠就心上看信就事上看忠信内外也集注上除此一句甚害事方子集注諸事某一日看曽子三省處集注說亦有病如省察已做底事曽子省察只當下便省察俯視拱手而曰為人謀而不忠乎節問集注云三句又以忠信為本竊謂傳習以忠信為本少間亦自堅固曰然但此一篇如說則以學文就有道而正焉之類都是先說一箇根本而後說講學燾伯豐舉程先生曰人道惟在忠信不誠無物誠便是忠信否曰固是至之問集注說三者之序又以忠信為傳習之本曰大抵前面許多話皆是以忠信為本之意若無忠信便不是人如何講學恪問集注三者之序又以忠信為本人若不誠實便傳也傳箇甚底言未畢先生繼云習也習箇甚底南升問尹氏謂曽子守約故動必求諸身莫也須博學而後守之以約否曰參也魯其為人質實心不大叚在外故雖所學之博而所守依舊自約道夫曽子之學大率力行之意多守約是於樸實頭省氣力處用功方子佐同問諸子之學愈逺而失真莫是言語上做工夫不如曽子用心於内所以差否曰只為不曽識得聖人言語若識得聖人言語便曉得天下道理曉得理便能切已用工如曽子也明作問伊川謂曽子三省忠信而已不知此說盡得一章意否伊川之意似以傳不習為不習而傳與人亦是不忠信者問如此說莫倒了語意否曰然但以上文例推之也却恁地要之亦不須如此說大抵學而篇數章皆是以忠信為本而後濟之以學道夫集注或問發己自盡謂忠循物無違謂信曰忠信只是一字只是就這一物上見有兩端如人問自家這件事是否此事本是則答之以是則是發己自盡此之謂忠其事本是自家答之以是則是循物無違是之謂信不忠不信者反是只是發於己者既忠則見於物者便信一事而有兩端之義也僴問發己自盡為忠循物無違為信如何循物無違曰只是依物而實言之忠信只是一箇道理發於己者自然竭盡便是忠見諸言者以實便是信循物無違如這桌子黄底便道是黄黒者便道是黑這便是無違程子曰一心之謂誠盡心之謂忠存於中者之謂孚見於事者之謂信卓問發己自盡為忠曰發己是從這己上發生出來盡是盡己之誠不是盡己之理與孟子盡心不同如十分話對人只說七分便是不盡問循物無違謂信曰盡己之謂忠以實之謂信此語已都包了如盞便喚做盞楪便喚做楪若將楪喚做盞便違背了忠是體信是用自發己自盡者言之則名為忠而無不信矣自循物無違者言之則名為信而無不出於忠矣淳問發己自盡為忠何以不言反己曰若言反己是全不見用處如何接得下句來推發此心更無餘藴便是忠處恕自在其中如今俗語云逢人只說三分話只此便是不忠循體事物而無所乖違是之謂信後來伊川往往見此說尚晦故更云盡己之謂忠以實之謂信便是穏當分眀大雅問何謂發己自盡曰且如某今病得七分對人說只道三兩分這便是發於己者不能盡何謂循物無違曰正如恰方說病相似他本只是七分或添作十分或減作五分這便不是循物便是有違要之兩箇只是一理忠是有諸内信是形諸外忠則必信信則必是曽忠池本作不信必是不曽忠所以謂表裏之謂也問伊川謂盡己之謂忠以實之謂信忠信内外也只是這意曰然明道之語周於事物之理便恁地圓轉伊川之語嚴故截然方正大抵字義到二程說得方釋然只如忠信二字先儒何嘗說得到此伊川語解有一處云一心之謂誠盡心之謂忠存於中之謂孚見於事之謂信被他秤停得也不多半箇字也不少半箇字如他平時不喜人說文章如易傳序之類固是說道理如其他小小記文之類今取而讀之也不多一箇字也不少一箇字居父曰盡己之謂忠今有人不可以盡告則又當如何曰聖人到這裏又却有義且如有人對自家說那人那人復自來問自家儻其人凶惡若盡己告之必至殺人夫豈可哉到這裏又却是一箇道理所以聖人道信近於義言可復也葢信不近義則不可以復道夫㝢録别出仲思問如何是發己自盡曰發於己而自盡其實先生因足疾舉足言曰足有四分痛便說四分痛與人說三分便不是發己自盡又問循物無違曰亦譬之足實是病足行不得便說行不得行得便說行得此謂循其物而無違揚舉伊川言盡己之謂忠以實之謂信曰伊川之說簡潔明通較又發越也㝢因問忠信實有是事故實有是言則謂之忠信今世間一等人不可與露心腹處只得隠䕶其語如此亦為忠信之權乎曰聖人到這處却有箇義存焉有可說與不可說又當權其輕重如不當說而說那人好殺便與說這人當殺須便去殺他始得信近於義言可復也信不近義豈所謂信因說伊川講解一字不苟如論語中一項有四說極的當一心之謂誠盡心之謂忠存於中之謂孚見於事之謂信直是不可移易如忠恕處前輩說甚多惟程先生甚分曉因問集注說忠恕謂盡己之謂忠推己之謂恕此借學者之事以眀之在聖人則至誠無息而萬物各得其所也如此則忠恕却有兩用不知如何曰皆只是這一箇學者是這箇忠恕聖人亦只是這箇忠恕天地亦只是這箇忠恕但聖人熟學者生聖人自胷中流出學者須著勉強然看此忠恕二字本為學者做工夫處說子思所謂違道不逺正謂此也曽子懼門人不知夫子之道故舉學者之事以眀之是即此之淺近而眀彼之髙深也㝢循物無違即是以實但說得較詳閎祖循物無違為信循此事物不違其實銖循物無違謂信物之大曰大小曰小此之謂循物無違物之大曰小小曰大此之謂違於物僴問循物無違謂信曰物便是事物信主言而言盖對忠而說在己無不盡之心為忠在人無不實之言為信木之或問循物無違謂信物是性中之物否曰那箇是性外之物凡言物皆是面前物今人要髙似聖人了便嫌聖人說眼前物為太卑須要􅎑起了說如所謂有物有則之物亦只是這眼前物語言物也而信乃則也君臣物也仁與忠乃則也學䝉問眀道伊川以忠信為表裏内外何也曰盡己之謂忠見於事而為信將彼己看亦得發於我而自盡者忠也他人見得便是信問莫只是一事否曰只是一箇道理問有說信字又不說忠字如何曰便兼表裏而言問有說忠字而不說信字如何曰信非忠不能忠則必信矣又曰且如這事自家見得十分只向人說三分不說那七分便是不信如何是循物無違有人問今日在甚處來便合向他說在大中寺來故程先生曰一心之謂誠盡心之謂忠存於中之謂孚見於事之謂信問伊川曰以實之謂信何也曰此就事而言故曽子言信便就交際上說問范氏以不忠作有我與人以不信作誠意不至㳺氏以忠為操心以信為立行楊氏以不忠作違仁以不信作違道三說皆推廣非正意先生曰三說不同然操心立行底較得誠意不至有我與人底寛違道違仁底疏問傳不習乎曰𫝊人以己所未嘗習之事然有兩說榦謝先生解論語有過處如曽子為人謀而不忠只說為人謀而上蔡更說平居静慮所以處人使學者用工不專故說論語孟子惟眀道伊川之言無弊和靖雖差低而却無前弊易曰學以聚之問以辨之寛以居之仁以行之子張曰執徳不𢎞信道不篤學聚問辨矣而繼之以寛居信道篤矣而先之以執徳𢎞人心不可促廹須令著得一善又著得一善善之來無窮而吾心受之有餘地方好若著一般第二般來便未著得如此則無縁心廣而道積也洽問曽子用心於内工夫已到又恐為人謀而未忠朋友交而不信𫝊而未習日加省察求欲以盡乎人也先生細思少定曰如何分内外得㳺氏之說正如此為人謀不忠便是已有未盡處去那裏分作内外果如此則多學而識之者歟容盡己之謂忠盡物之謂信只是一理但忠是盡己信却是於人無所不盡猶曰忠信内外也端蒙問盡物之謂信盡物只是循物無違意否曰是淳道千乘之國章道千乗之國道治也作開導無義理道之以政方可訓開導人傑因說千乗之國䟽云方三百一十六里有畸零筭不徹曰此等只要理㑹過識得古人制度大意如此微細亦不必大段費力也閎祖問敬事而信疑此敬是小心畏謹之謂非主一無適之謂曰遇事臨深履薄而為之不敢輕不敢慢乃是主一無適伯羽敬事而信是節用愛人使民以時之本敬又是信之本閎祖問道千乗之國一章曰這三句自是五件事只當逐句看是合當有底無底合當做底不當做底不消如做時文要著兩句來包說又問程先生云聖人之言兼通上下恐是聖人便見得道理始終故發言自是該貫衆人縁不見得所以說得一頭又遺了一頭曰這箇也不千見事但衆人說得自是不及聖人說話聖人說得自别便是大賢說話也自是不及聖人盖聖人說得來自是與人别若衆人非無見如這五事衆人豈不見得但說時定自是别有闗竅決不及聖人也問道千乗之國章曰龜山說此處極好㸔今若治國不本此五者則君臣上下漠然無干渉何以為國又問須是先有此五者方可議及禮樂刑政曰且要就此五者反覆推尋看古人治國之勢要此五者極好看若每章翻來覆去看得分眀若看十章敢道便有長進南升賀孫録别出集注文振說道千乗之國曰龜山最說得好須看此五者是要緊古聖王所以必如此者盖有是五者而後上之意接於下下之情方始得親於上上下相闗方可以為治若無此五者則君抗然於上而民盖不知所向有此五者方始得上下交接賀問道千乗之國楊氏云未及為政也曰然此亦是政事如敬事而信便是敬那政事也節用有節用之政事愛人有愛人之政事使民有使民之政事這一段是那做底子細思了若無敬看甚事做得成不敬則不信不信則不能節用愛人不節用愛人則不能使民以時矣所以都在那敬字上若不敬則雖欲信不可得如出一令發一號自家把不當事忘了便是不信然又敬須信若徒能敬而號令施於民者無信則為徒敬矣不信固不能節用然徒信而不能節用亦不濟事不節用固不能愛人然徒能節用而不愛人則此財為誰守邪不愛人固不能使民以時然徒能愛人而不能使民以時雖有愛人之心而人不被其惠矣要之根本工夫都在敬字若能敬則下面許多事方照管得到自古聖賢自堯舜以來便說這箇敬字孔子曰脩己以敬此是最緊要處僴子升問集注云五者相因各有次序曰聖人言語自是有倫序不應胡亂說去敬了方㑹信信了方㑹節用節用了方㑹愛人愛人了方㑹使民以時又敬了須是信信了須是節用節用了須是愛人愛人須是使民以時如後面弟子入則孝出則弟謹而信之類皆似此有次第又問學而一篇多是務本之意獨此章言及為政是如何曰此便是為政之本如尊五美屏四惡行夏之時乗殷之輅服周之冕之類無此基本如何做去木之子升問如何信了方能節用曰無信如何做事如朝更夕改雖商鞅之徒亦不可為政要之下面三事須以敬信為主木之云如此凡事都著信不止與節用相繫属曰固是木之問五事反復相因各有次第曰始初須是敬方能信能敬信方真箇是節用真箇節用方是愛人能真箇愛人方能使民以時然世固有能敬於己而失信於人者故敬了又有信亦有能信於人而自縱奢侈者故信了又用節用亦有自儉嗇而不能推愛他人者故節用了又用愛人愛人了又用使民以時使民不以時却是徒然也明作道干乗之國五者相因這只消從上順說人須是事事敬方㑹信纔信便當定如此若恁地慢忽便沒有成今日恁地明日不恁地到要節用今日儉明日奢便不是節用不㑹節用便急征重斂如何得愛民既無愛民之心如何自㑹使民以時這是相因之說又一說雖則敬又須著信於民只恁地守箇敬不得雖是信又須著務節儉雖㑹節儉又須著有愛民之心終不成自儉嗇而愛不及民如隋文帝之所為雖則是愛民又須著課農桑不奪其時賀孫呉伯逰問道千乗之國三句反覆相因各有次第曰不敬於事沒理沒㑹雖有號令何以取信於人無信則朝儉暮奢焉能節用不節用則傷財害民焉能愛人若不愛人則不能使民以時又說既敬了須用信或有敬而不能信者時舉録作世固有能敬於己而或不信於民者信又用節用有能示信於人而自縱欲奢侈者節用又用愛人有愛惜官物時舉録作有自鄙吝慳儉而不能施惠於百姓者愛人又用使民以時使不以時亦徒愛耳又問楊氏謂未及為政今觀使民以時又似為政曰孟子說不違農時只言王道之始末大段是政事在銖時舉同問敬事而信章五者相承各有次序是能如此而後能如彼抑既如此更要如彼耶曰能恁地敬便自然信下句又是轉說節用了更須當愛人愛人了更當使民以時有一般人敬而不能信有一般人能節用只是吝嗇却不能愛人故能敬便自然信而敬又不可以不信聖人言語自上說下來也恁地自下說上去也恁地聖人言語都如此曰信與節用有何相闗曰信是的確若不的確有時節有時又不節淳陳希真問須主敬了方可以信先節用了方可以愛人又須是使民以時是如此否曰這般處從上說下固是一般意思從下說上又是一般意思如敬事而信固是有人凡事要誠信然未免有不敬處便是不實有人却知節用然不知愛民則徒然鄙吝於己本不為民有人知所以愛人却不知勿奪其時這般處與君子不重則不威一章都用恁地看賀孫弟子入則孝章問弟子入則孝一章力行有餘暇便當學六藝之文要知得事父兄如何而為孝弟言行如何而能謹信語尚未終先生曰下面說得支離了聖人本意重處在上面言弟子之職須當如此下面言餘力則學文大凡看文字須認聖人語脈不可分毫走作若說支離將來又生出病南升問汎愛衆曰人自是當愛人無憎嫌人底道理又問人之賢不肖自家心中自須有箇辨别但交接之際不可不汎愛爾曰他下面便說而親仁了仁者自當親其他自當汎愛盖仁是箇生底物事既是生底物便具生之理生之理發出便是愛纔是交接之際便須自有箇恭敬自有箇意思池本作思意如何漠然無情不相親属得聖人說出話兩頭都平若只說汎愛又流於兼愛矣僴問而親仁曰此亦是學文之本領盖不親仁則本末是非何從而知之燾問行有餘力所謂有餘莫是入孝出弟之理行之綽綽然有餘裕否曰誰敢便道行之有餘裕如汎愛衆而親仁何曽便時時有衆之可愛便有仁者於此得以時時親之居常無事則學文講義至事與吾接則又出而應之入孝出弟亦是當孝當弟之時行謹言信亦是如此他時有餘力自當學文㝢問則以學文曰此論本末先本後末今人只是先去學文又且驗平日果能孝弟恭謹誠信愛衆親仁乎如此了方學文此五句又以孝弟為本不孝則不能弟不孝而能弟弟亦何用不孝不弟縱行謹言信愛衆親仁亦何用銖歐陽希遜問行有餘力則以學文學文在後博學於文約之以禮文又在先如何曰博學於文也不說道未有行有餘力以上許多事須是先有許多了方可以學文且如世上有人入不孝出不弟執事不謹出言不信於衆又無愛於仁又不能親道要去學文實是要去學不得賀孫汎愛不是人人去愛他如羣居不將一等相擾害底事去䀨噪他及自占便宜之類是也無弟子之職以為本學得文濟甚事此言雖近真箇行得亦自大段好文是詩書六藝之文詩書是大槩詩書六藝是禮樂射御書數古人小學便有此等今皆無之所以難問集注力行而不學文則無以考聖賢之成法識事理之當然六藝如何考究得成法曰小學中一事具得這事之理禮樂如知所以為禮樂者如此從此上推將去如何不可考成法縁今人都無此學所以無考究處然今詩書中可考或前言往行亦可考如前輩有可法者都是人須是知得古人之法方做不錯若不學文任意自做安得不錯只是不可先學文耳子夏矯枉過正放重一邊又忒重了不似此章聖人說得兩無欠闕如棘子成矯當時之弊說得質太重子貢又矯棘子成之弊却道文猶質也質猶文也都偏了惟聖人之心和平所謂髙下小大皆宜左右前後不相悖說得如此盡眀作集註問集注云力行而不學文則無以識事理之當然且上五件條目皆是天理人倫之極致能力行則必能識事理之當然矣如集注之說則是學文又在力行之先曰若不學文則無以知事理之當否如為孝為弟亦有不當處孝於事親然事父之敬與事母之愛便别了卓不學文則事事做不得節胡氏解則以學文謂古者有業文之家今觀㣲子之命蔡仲之命左𫝊中數處誥命大抵文意相類及以閟宫殷武末章觀之誠恐古人作文亦須有箇格様逓相祖述必大賢賢易色章問賢賢易色有兩說曰只變易顔色亦得但覺說得太淺斯湏之間人誰不能未知他果有誠敬之心否須從好色之說便見得賢賢之誠處眀作問變易顔色莫是待臨時易色未善曰亦不必如此說只是下面致其身竭其力太重變易顔色太輕耳可學敬之問賢賢易色有二說曰變易顔色有偽為之者不若從上蔡說易其好色之心方見其誠也徳明問賢賢易色曰吾未見好徳如好色者去讒逺色賤貨而貴徳所以勸賢也已分眀說了儒用事父母能竭其力凡事當盡力為之不可挨推只做七八分留兩三分淳或問事君致其身曰致身一如送這身與他便看他將來如何使時舉事君能致其身集注謂不有其身是不為己之私計也眀作袁子節問賢賢易色章曰資質好底也㑹恁地問學也只是理㑹許多事眀舉漢臣說雖曰未學吾必謂之學矣先生曰此還是己學邪盖人固有資禀自好不待學而自能盡此數條者然使其為學則亦不過學此數者耳故曰人雖以為未學而吾必以為己學也時舉問賢賢易色章為學之道只要就人倫上做得是當今既有能如此雖或以為未學我必以為己學曰畢竟是曽學未學曰先生所謂非其生質之美必其務學之至曰看得是曰今日本欲看君子不重不威一章又見稍長不敢貪多曰慢看不妨只要常反覆玩味聖人㫖要尋見著落處又云近覺多病恐来日無多欲得朋友勇猛近前也要相𫝊某之心便是公之心一般南升子夏之言不免有弊盖孔子上章但是平說子夏此章皆是說到誠處說得重了然今有這様人若不是他學問来又不是天資髙安能如此但子夏說得太麤了故謂其辭氣抑揚太過也䕫孫雖曰未學世間也有資禀髙㑹做許多事底但子夏此兩句被他說殺了所以呉氏謂其言之有弊明作易色須作好徳如好色說若作變易顔色恐裏面欠了字多這也只是敬賢之誠問此四事莫是箇處得極至只得如此否曰這地位儘髙問伊川曰學求如是而已如何曰這却和學字說在裏面子夏本言却作不須學底意思呉才老以子夏此言與子路何必讀書之說同其意固善然其弊皆至於廢學若行有餘力則以學文就有道而正焉可謂好學之類方為聖人之言此說却好子夏既說殺了雖是上面說務本終不如聖人之言也榦吾必謂之學矣子夏此話說得激有矯枉過直意思聖人便不如此且看行有餘力則以學文是多少渾成他意只欲反本故說得如此激如棘子成說君子質而已矣何以文為這便全是有激之論子貢說文猶質也質猶文也這也有病質與文似不同一言可以䘮邦有諸聖人便說言不可若是其幾如唯其言而莫予違也又說如其善而莫之違固是好如不善而莫之違不幾乎一言而䘮邦如禮與其奢也寜儉䘮與其易也寜戚雖都是偏就其間論之便須說奢與易有輕重聖人說話都自恁地平向伯恭見此說甚以為看得出賀孫林一之問賢賢易色章曰他是重其所重輕其所輕固為激切之辭覺得那一邊偏重聖人言語便平如曰禮與其奢也寜儉䘮與其易也寜戚不說禮只專是儉䘮只專是戚也砥義剛說賢賢易色一章先生接集注所言云此不若上章但竭力等事比上面入孝出弟之類較重所以子夏謂吾必謂之學矣義剛或問夫子言則以學文子夏言吾必謂之學矣兩章曰聖人之言由本及末先後有序其言平正無險絶之意子夏則其言傾側而不平正險絶而不和易狹隘而不廣大故未免有弊然子夏之意欲人務本不可謂之不是但以夫子之言比之則見其偏之若此也人傑君子不重則不威章君子不重則不威既曰君子何以不重不威此是大槩說君子之道如此主忠信是誠實無偽樸實頭主字最重凡事靠他做主程子曰不誠無物謂如去水南却說去水北實不曽去水北便無這去水北一事明作輕最害事飛揚浮躁所學安能堅固故學則不固與不重不威只一套事砥主忠信忠以心言信以事言以實之謂信振主忠信人道惟在忠信不誠無物人若不忠信如木之無本水之無源更有甚底一身都空了今當反㸔自身能盡己之心能不違於物乎若未盡己之心而不違於物則是不忠信凡百處事接物皆是不情實且謾為之而已此四者皆是修身之要就其中主忠信又是最要若不主忠信便正衣冠尊瞻視只是色荘為學亦是且謾為學取朋友未必盡情改過亦未必真能改過故為人須是主忠信學而一篇再三言之南升問眀道曰不誠則無物如何曰實有此理便實有此事且如今向人說我在東却走西去那一邊便成妄誕了問伊川曰忠信者以人言之要之則實理何也曰以人言之則為忠信不以人言之則只是箇實理如誠者天之道則只是箇實理如惟天下之至誠便是以人言之榦問集注不誠無物一節曰心無形影惟誠時方有這物事今人做事若初間有誠意到半截後意思懶散謾做將去便只是前半截有物後半截無了若做到九分這一分無誠意便是這一分無物時舉問人道惟在忠信不誠無物曰凡應接事物之來皆當盡吾誠心以應之方始是有這箇物事且幹一件事自家心不在這上這一事便不成便是沒了這事如讀書自家心不在此便是沒這書賀孫人道惟在忠信不誠無物物只是眼前事物都喚做物若誠實方有這物若口裏說荘敬肚裏自慢忽口裏說誠實肚裏自狡偽則所接事物還似無一般須是實見得是實見得非截定而不可易方有這物且如欲為善又有箇為惡意思欲為是又有為非意思這只是不實如何㑹有物賀孫問人道惟在忠信不誠無物曰說道恁地又不曽真箇恁地便是不誠無物說道為善又不曽為得善說道惡惡又不曽不為惡便是無此物誠者物之終始不誠無物如人做事只至誠處便有始有末才間斷處以後便皆無物忠信所以進徳是有這骨子然後能進徳如顔子三月不違仁只未違以前便有始末才失照管處便無物矣又須到再接續處方有終始惟天地聖人未嘗有一息間斷維天之命於穆不已何嘗間斷間斷造化便死了故天生箇人便是箇人生出箇物便是箇物且不曽生箇假底人物来仲思問如隂陽舛錯雨𤾉失時亦可謂之誠乎曰只是乖錯不是假底依舊是實在人只是不要外面有裏面無且如讀書十遍初四遍心在後六遍心不在只是口頭讀過便只第一遍至第四遍是始是終第六遍後便只似不曾讀一般便是無物也又問吾不與祭如不祭是不誠無物否曰然伯羽道夫一云蜚卿問人道唯在忠信不誠無物口說道為善又不曽為得善說道惡惡又不曽惡惡便是無物如人做事只至誠處便有始有末才間斷處便無物天地造化聖人徳業未嘗有一息之間維天之命於穆不已曷嘗間斷有些間斷則造化便死了故生出一箇人便是一箇人生出一箇物便是一箇物更無些假道夫問隂陽舛錯雨𤾉不時亦可謂之誠否曰雖恁地亦只是舛錯不是假依舊是實在人則不要外面有裏面無無友不如己者與勝己者處也人傑問母友不如己作不與不勝己友則他人勝己者亦不與之友曰不然人自是要得臨深以為髙榦問無友不如己者與勝己字如何曰勝己便是如己之意人交朋友須求有益若不如我者豈能有益仍是朋友才不如我時便無敬畏之意而生狎侮之心如此則無益義剛友不如己者自是人一箇病周恭叔看得太過了上焉者吾師之下焉者若是好人吾教之中焉者勝己則友之不及者亦不拒也但不親之耳若便佞者須却之方可璘問集注謂友以輔仁不如已則有損而無益今欲擇勝己者與之為友則彼必以我為不及而不肯與我友矣雖欲友之安得而友之曰無者禁止之辭我但不可去尋求不如己者及其来也又焉得而却之推此則勝己者亦自可見道夫趙兄問無友不如己者曰凡人取友須是求勝己者始有益且如人學作文須是與勝己者商量然後有所發明若只與不如己者商量則好者彼或不知不是彼或不識我又只見其不勝己渾無激勵之意豈不為害趙曰然則有不勝我者終不可與處乎曰若不勝者来求於我則不當拒之也聖人此言但教人求友之法耳壮祖問無友不如己者伊川以為同志何如曰此求之過大凡師則求其賢於己者友則求其勝者至於不肖者則當絶之聖人此言非謂必求其勝己者今人取友見其勝己者則多逺之而不及已則好親之此言乃所以救學者之病可學問無友不如己者曰這是我去求勝己者為友若不如我者他又來求我這便是童䝉求我匪我求童䝉也前輩說這一句多是被不如己者不與為友底意思礙却便說差了其實本不相背時舉呉知先問過則勿憚改曰程子所謂知其不善則速改以從善曲折專以速改字上著力若今日不改是壊了兩日事眀日不改是壊了四日事今人只是憚難過了日子銖時舉録云最要在速字上著力凡有過若今日不改過愈深則善愈微若從今日便改則善可自此而積今為學約而易操者莫如敬敬則凡病皆可去如不重則不威章敬是緫腦不渾在散句裏必敬而後能不輕如主忠信亦先因敬不敬則誕謾而已何以主之母友不如已亦然重亦不難見如人言語簡重舉動詳緩則厚重可知言語輕率聽得便說說則無能得了舉動輕肆飛揚淺露其人輕易可知伯羽朱子語類卷二十一
