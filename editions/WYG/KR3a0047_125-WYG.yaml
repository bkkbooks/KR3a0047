body:
  text: 朱子語類卷一百二十五老氏荘列老子康節嘗言老氏得易之體孟子得易之用非也老子自有老子之體用孟子自有孟子之體用将欲取之必固與之此老子之體用也存心飬性充廣其四端此孟子之體用也廣老子之術謙沖儉嗇全不肯役精神閎祖老子之術須自家占得十分穏便方肯做才有一毫於己不便便不肯做閎祖老子之學大抵以虚靜無為沖退自守為事故其為說常以懦弱謙下為表以空虚不毁萬物為實其為治雖曰我無為而民自化然不化者則亦不之問也其為道每毎如此非特載營魄一章之指為然也若曰旁日月扶宇宙揮斥八極神氣不變者是乃荘生之荒唐其曰光明寂照無所不通不動道場徧周沙界者則又瞿曇之幻語老子則初曷嘗有是哉今世人論老子者必欲合二家之似而一之以為神常載魄而無所不之則是荘釋之所談而非老子之意矣僴伯豐問程子曰老子之言竊弄闔闢者何也曰如将欲取之必固與之之類是它亦窺得些道理将來竊弄如所謂代大匠斵則傷手者謂如人之惡者不必自去治它自有别人與它理㑹只是占便宜不肯自犯手做㽦曰此正推惡離己曰固是如子房為韓報秦攛掇髙祖入闗及項羽殺韓王成又使髙祖平項羽兩次報仇皆不自做後來定太子事它亦自處閒地又只教四老人出來定之㽦老子不犯手張子房其學也陶淵明亦只是老荘問楊氏愛身其學亦淺近而舉世宗尚之何也曰其學也不淺近自有好處便是老子之學今觀老子書自有許多說話人如何不愛其學也要出來治天下清虚無為所謂因者君之綱事事只是因而為之如漢文帝曹参便是用老氏之效然又只用得老子皮膚凡事只是包容因循将去老氏之學最忍它閒時似箇虚無卑弱底人莫教𦂳要處發出來更教你支梧不住如張子房是也子房皆老氏之學如嶢闗之戰與秦将連和了忽乗其懈擊之鴻溝之約與項羽講解了忽囬軍殺之這箇便是他柔弱之發處可畏可畏它計策不須多只消兩三次如此髙祖之業成矣僴問楊朱似老子頃見先生如此說看來楊朱較放退老子反要以此治國以此取天下曰大概氣象相似如云致虚極守靜篤之類老子初間亦只是要放退未要放出那無状來及至反一反方說以無事取天下如云反者道之動弱者道之用之類僴楊朱之學出於老子蓋是楊朱曾就老子學來故荘列之書皆說楊朱孟子闢楊朱便是闢荘老了釋氏有一種低底如梁武帝是得其低底彼初入中國也未在後來到中國却竊取老荘之徒許多説話見得儘髙新唐書李蔚賛説得好南升人皆言孟子不排老子老子便是楊氏問老子與鄉原如何曰老子是出人理之外不好聲不好色又不做官然害倫理鄉原猶在人倫中只是箇無見識底好人淳義剛一條見論語類老子中有仙意列子列子平淡疎曠方子荘子荘周曾做秀才書都讀來所以他說話都說得也是但不合沒拘檢便隔陌了或問康節近似荘周曰康節較穏燾荘子比邵子見較髙氣較豪他是事事識得又却蹴踏了以為不足為邵子却有規矩方子李夣先問荘子孟子同時何不一相遇又不聞相道及林作其書亦不相及如何曰荘子當時也無人宗之他只在僻處自說然亦止是楊朱之學但楊氏說得大了故孟子力排之義剛同䕫孫問孟子與荘子同時否曰荘子後得㡬年然亦不爭多或云荘子都不說著孟子一句曰孟子平生足跡只齊魯滕宋大梁之間不曾過大梁之南荘子自是楚人想見聲聞不相接大抵楚地便多有此様差異底人物學問所以孟子說陳良云云曰如今看許行之說如此鄙陋當時亦有數十百人從他是如何曰不特此也如荘子書中說惠施鄧析之徒與夫堅白異同之論歴舉其說是甚麽學問然亦自名家或云他恐是借此以顯理曰便是禅家要如此凡事須要倒說如所謂不管夜行投明要到如人上樹口啣樹枝手足懸空却要荅話皆是此意廣云通鑑中載孔子順與公孫龍辯說數話似好曰此出在孔叢子其他說話又不如此此書必是後漢時人撰者若是古書前漢時又都不見說是如何其中所載孔安國書之類其氣象萎苶都不似西京時文章廣老荘老子猶要做事在荘子都不要做了又却説道他㑹做只是不肯做廣荘周是箇大秀才他都理㑹得只是不把做事觀其第四篇人間世及漁父篇以後多是說孔子與諸人語只是不肯學孔子所謂知者過之者也如說易以道隂陽春秋以道名分等語後來人如何下得它直是似快刀利斧劈截将去字字有著落公晦曰荘子較之老子較平帖些曰老子極勞攘荘子得些只也乖荘子跌蕩老子収歛齊脚歛手荘子却将許多道理掀飜說不拘繩墨方子録云荘子是一箇大秀才他事事識得如天下篇後面乃是説孔子似用快刀利斧斫将去更無些礙且無一句不著落如説易以道隂陽等語大叚説得好然却不肯如此做去老子猶是欲歛手齊脚去做他却将他窠窟一齊踢飜了荘子去孟子不逺其說不及孟子者亦是不相聞今毫州明道宫乃老子所生之地荘子生於蒙在淮西間孟子只往來齊宋鄒魯以至於梁而止不至於南然當時南方多是異端如孟子所謂陳良楚産也悦周公仲尼之道北學於中國又如説南蠻鴂舌之人非先王之道是當時南方多異端或問許行恁地低也有人從之曰非獨是許行如公孫龍堅白同異之説是甚模様也使得人終日只弄這箇漢卿問孔子順許多話却好曰出於孔叢子不知是否只孔叢子說話多類東漢人文其氣軟弱又全不似西漢人文兼西漢初若有此等話何故不畧見於賈誼董仲舒所述恰限到東漢方突出來皆不可曉賀孫前廣録一條疑僴同問老子與荘子似是兩般説話曰荘子於篇末自説破矣問先儒論老子多為之出脱云老子乃矯時之説以某觀之不是矯時只是不見實理故不知禮樂刑政之所出而欲去之曰渠若識得寂然不動感而遂通天下之故自不應如此它本不知下一節欲占一簡徑言之然上節無實見故亦不脱洒今讀老子者亦多錯如道德經云名非常名則下文有名無名皆是一義今讀者皆将有無作句又如常無欲以觀其妙常有欲以觀其竅只是説無欲有欲今讀者乃以無有為句皆非老子之意可學荘子老子不是矯時夷惠矯時亦未是可學荘列孟子荘子文章皆好列子在前便有迂僻處左氏亦然皆好髙而少事實人傑因言列子語佛氏多用之荘子全寫列子又變得峻竒列子語温純柳子厚嘗稱之佛家於心地上然下工夫賀孫列荘本楊朱之學故其書多引其語荘子説子之於親也命也不可解於心至臣之於君則曰義也無所逃於天地之間是他看得那君臣之義却似是逃不得不柰何須著臣服他更無一箇自然相須為一體處可恠故孟子以為無君此類是也大雅老荘列子荘子是箇轉調底老子列子又細似荘子雷擊所在只一氣滚來間有見而不為害只縁氣未掤裂有所擊者皆是已發蔡季通云人於雷所擊處収得雷斧之屬是一氣擊後方始結成不是将這箇來打物見人拾得石斧如今斧之状似細黄石因説道士行五雷法先生曰今極卑陋是道士許多説話全亂道蔡云禅家又勝似他曰禅家已是九分亂道了他又把佛家言語參雜在裏面如佛經本自逺方外國來故語音差異有許多差異字人都理㑹不得他便撰許多符呪千般萬様教人理㑹不得極是陋蔡云道士有箇荘老在上却不去理㑹曰如今秀才讀多少書理㑹自家道理不出他又那得心情去理㑹荘老蔡云無人理㑹得老子通透大段鼔動得人恐非佛教之比曰公道如何蔡云縁他帶治國平天下道理在曰做得出也只是箇曹參蔡云曹參未能盡其術曰也只是恁地只是藏縮無形影因問蔡曰公看道可道非常道名可名非常名無名天地之始有名萬物之母是如何説蔡云只是無名是天地之始有名便是有形氣了向見先生説庚桑子一篇都是禅今看來果是曰若其它篇亦自有禅話但此篇首尾都是這話又問蔡曰荘子虚無因應如何㸃曰只是恁地㸃多有人将虚無自做一句非是他後面又自解如何是無如何是因又云荘子文章只信口流出煞髙蔡云列子亦好曰列子固好但説得困弱不如荘子問老子如何曰老子又較深厚蔡云看荘周傳説似乎荘子師於列子云先有作者如此恐是指列子曰這自説道理未必是師列子蔡問皆原於道德之意是誰道德曰這道德只自是他道德蔡云人多作吾聖人道德太史公智識卑下便把這處作非細看便把作大學中庸看了曰大學中庸且過一邊公恁地説了主張史記人道如何大凡看文字只看自家心下先自偏曲了看人説甚麽事都只入這意來如大路看不見只行下偏蹊曲徑去如分明大字不看却只看從鏬縫四旁處去如字寫在上面不看却就字背後面看如人眼自花了看見眼前物事都差了便説道只恁地蔡云不平心看文字将使天地都易位了曰道理只是這一箇道理但看之者情偽變態言語文章自有千般萬様合説東却説西合説這裏自説那裏都是将自家偏曲底心求古人意又云如太史公説話也怕古人有這般人只自家心下不當如此将臨川何言江黙之事觀之説道公羊榖梁是姓姜人一手做也有這般事尚書序不似孔安國作其文軟弱不似西漢人文西漢文麄豪也不似東漢人文東漢人文有骨肋也不似東晉人文東晉如孔坦䟽也自得他文是大段弱讀來却宛順是做孔叢子底人一手做看孔叢子撰許多説話極是陋只看他撰造説陳渉那得許多説話正史都無之他却説道自好陳渉不能從之看他文卑弱説到後面都無合殺蔡云恐是孔家子孫曰也不見得蔡説春秋吕氏解煞好曰那箇説不好如一句經在這裏説做褒也得也有許多説話做貶也得也有許多説話都自説得似又云如史記秦紀分明是國史中間儘謹嚴若如今人把來生意説也都由他説春秋只是舊史録在這裏蔡云如先生做通鑑綱目是有意是無意須是有去取如春秋聖人豈無意曰聖人雖有意今亦不可知却妄為之説不得蔡云左氏怕是左史倚相之後蓋左傳中楚事甚詳曰以三傳較之在左氏得七八分蔡云道理則榖梁及七八分或云三傳中間有許多騃處都是其學者後來添入賀孫儒教自開闢以來二帝三王述天理順人心治世教民厚典庸禮之道後世聖賢遂著書立言以示後世及世之衰亂方外之士厭一世之紛拏畏一身之禍害躭空寂以求全身於亂世而已及老子唱其端而列禦冦荘周楊朱之徒和之孟子嘗闢之以為無父無君比之禽獸然其言易入其教易行當漢之初時君世主皆信其説而民亦化之雖以蕭何曹參汲黯太史談輩亦皆主之以為真足以先於六經治世者不可以莫之尚也及後漢以來米賊張陵海島冦謙之之徒遂為盜賊曹操以兵取陽平陵之孫魯即納降欵可見其虚繆不足稽矣僴老子書道可道章第一問老子道可道章或欲以常無常有為句讀而欲字屬下句者如何曰先儒亦有如此做句者不妥貼問三十輻共一轂當其無有車之用無是車之坐處否曰恐不然若以坐處為無則上文自是就輻轂而言與下文户牗埏埴是一例語某嘗思之無是轂中空處惟其中空故能受軸而運轉不窮猶傘柄上木管子衆骨所㑹者不知名何縁管子中空又可受傘柄而闢闔下上車之轂亦猶是也荘子所謂樞始得其環中以應無窮亦此意僴谷神不死章第六正淳問谷神不死是為𤣥牝曰谷虚谷中有神受聲所以能響受物所以生物㽦問谷神曰谷只是虚而能受神謂無所不應它又云虚而不屈動而愈出有一物之不受則虚而屈矣有一物之不應是動而不能出矣問𤣥牝或云𤣥是衆妙之門牝是萬物之祖曰不是恁地説牝只是木孔承笋能受底物事如今門􅗚謂之牡鐶則謂牝鏁管便是牡鏁鬚便是牝雌雄謂之牝牡可見𤣥者謂是至妙底牝不是那一様底牝問老子之言似有可取處曰它做許多言語如何無可取如佛氏亦儘有可取但歸宿門户都錯了䕫孫問谷神不死曰谷之虚也聲達焉則響應之乃神化之自然也是謂𤣥牝𤣥妙也牝是有所受而能生物者也至妙之理有生生之意焉程子所以取老氏之説也人傑𤣥牝蓋言萬物之感而應之不窮又言受而不先如言聖人執左契而不責於人契有左右左所以衘右言左契受之義也方子沈荘仲問谷神不死是謂𤣥牝如何曰谷神是那箇虚而應物底物事又問常有欲以觀其竅竅之義如何曰徼是那邊徼如邊界相似説那應接處向來人皆作常無常有㸃不若只作常有欲無欲㸃義剛問原壤看來也是學老子曰他也不似老子老子却不恁地荘仲曰却似荘子曰是便是夫子時已有這様人了荘仲曰荘子雖以老子為宗然老子之學尚要出來應世荘子却不如此曰荘子説得較開闊較髙逺然却較虚走了老子意思若在老子當時看來也不甚喜他如此説荘仲問道可道如何解曰道而可道則非常道名而可名則非常名又問𤣥之義曰𤣥只是深逺而至於黑窣􅌥地處那便是衆妙所在又問寵辱若驚貴大患若身曰從前理㑹此章不得義剛張以道問載營魄與抱一能無離乎之義曰魄是一魂是二一是水二是火二抱一火守水魂載魄動守靜也義剛專氣致柔只看他這箇甚麽様工夫專非守之謂也只是專一無間斷致柔是到那柔之極處纔有一毫發露便是剛這氣便粗了僴老子之學只要退歩柔伏不與你爭才有一毫主張計較思慮之心這氣便麄了故曰致虚極守靜篤又曰專氣致柔能如嬰兒乎又曰知其雄守其雌為天下谿知其白守其黑為天下谷所謂谿所謂谷只是低下處讓你在髙處他只要在卑下處全不與你爭他這工夫極難常見畵本老子便是這般氣象笑嘻嘻地便是箇退歩占便宜底人雖未必肖他然亦是它氣象也只是他放出無状來便不可當如曰以正治國以竒用兵以無事取天下他取天下便是用此道如子房之術全是如此嶢闗之戰㗖秦将金己與之連和了即囬兵殺之項羽約和己講解了即勸髙祖追之漢家始終治天下全是得此術至武帝盡發出來便郎當子房閒時不做聲氣莫教他説一語更不可當少年也任俠殺人後來因黄石公教得來較細只是都使人不疑他此其所以乖也荘子比老子便不同荘子又轉調了精神發出來麄列子比荘子又較細膩問御風之説亦寓言否曰然僴古之為善士章第十五甘叔懐説先生舊常謂老子也見得此箇道理只是怕與事物交渉故其言有曰豫兮若冬渉川猶兮若畏四隣儼若容廣因以質於先生曰老子説話大抵如此只是欲得退歩占姦不要與事物接如治人事天莫若嗇廹之而後動不得已而後起皆是這様意思故為其學者多流於術數如申韓之徒皆是也其後兵家亦祖其説如漢良平之類是也他説以正治國以竒用兵以無事取天下據他所謂無事者乃是大竒耳故後來如宋齊丘遂欲以無事竊人之國如今道家者流又却都不理㑹得他意思廣将欲噏之章第三十六問老氏柔能勝剛弱能勝强之説曰它便揀便宜底先占了若這下則剛柔寛猛各有用時德明上德不德章第三十八郭德元問老子云夫禮忠信之薄而亂之首孔子又却問禮於他不知何故曰他曉得禮之曲折只是他説這是箇無𦂳要底物事不将為事某初間疑有兩箇老聃横渠亦意其如此今看來不是如此他曾為柱下史故禮自是理㑹得所以與孔子説得如此好只是他又説這箇物事不用得亦可一似聖人用禮時反若多事所以如此説禮運中謀用是作而兵由此起等語便自有這箇意思文蔚反者道之動章第四十一問反者道之動弱者道之用曰老子説話都是這様意思縁他看得天下事變熟了都於反處做起且如人剛强咆哮跳躑之不己其勢必有時而屈故他只務為弱人纔弱時却蓄得那精剛完全及其發也自然不可當故張文潜説老子惟靜故能知變然其勢必至於忍心無情視天下之人皆如土偶爾其心都冷冰冰地了便是親人也不䘏故其流多入於變詐刑名太史公將他與申韓同傳非是强安排其源流實是如此廣易不言有無老子言有生於無便不是閎祖道生一章第四十二一便生二二便生四老子却説二生三便是不理㑹得道生一一生二二生三不合説一箇生一箇方名與身章第四十四多藏必厚亡老子也是説得好義剛天下有道章第四十六天下無道却走馬以糞車是一句謂以走馬載糞車也頃在江西見有所謂糞車者方曉此語今本無車字不知先生所見何本僴治人事天章第五十九老子言治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積德則無不克他底意思只要収斂不要放出友仁儉德極好凡事儉則鮮失老子言治人事天莫若嗇夫惟嗇是謂早服早服是謂重積德被它説得曲盡早服者言能嗇則不逺而復便在此也重積德者言先已有所積復飬以嗇是又加積之也如修飬者此身未有所損失而又加以嗇飬是謂早服而重積若待其己損而後飬則飬之方是以補其所損不得謂之重積矣所以貴早服早服者早覺未損而嗇之也如某此身已衰耗如破屋相似東扶西倒雖欲修飬亦何能有益耶今年得季通書説近來深曉飬生之理盡得其法只是城郭不完無所施其功也看來是如此僴老子治人事天莫如嗇嗇飬也先生曰嗇只是吝嗇之嗇它説話只要少用些子舉此一段至莫知其極可學荘子書内篇飬生第三因者君之綱道家之説最要這因萬件事且因來做因舉史記老子傳賛云云虚無因應變化於無窮曰虚無是體與因應字當為一句蓋因應是用因而應之之義云爾植因論庖丁解牛一段至恢恢乎其有餘刃曰理之得名以此目中所見無全牛熟闕僴外篇天地第十二荘子云各有儀則之謂性此謂各有儀則如有物有則比之諸家差善董仲舒云質樸之謂性性非教化不成性本自成於教化下一成字極害理可學問野馬也塵埃也生物之以息相吹也是如何曰他是言九萬里底風也是這箇推去息是鼻息出入之氣節問荘子實而不知以為忠當而不知以為信此語似好曰以實當言忠信也好只是它意思不如此雖實而我不知以為忠雖當而我不知以為信問荘生他都曉得只是却轉了説曰其不知處便在此僴外篇天運第十四先生曰天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是孰居無事而推行是意者其有機緘而不得已邪意者其運轉不能自止邪雲者為雨乎雨者為雲乎孰隆施是孰居無事滛樂而勸是荘子這數語甚好是他見得方説到此其才髙如老子天下篇言詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分若見不分曉焉敢如此道要之他病我雖理㑹得只是不做又曰荘老二書解注者甚多竟無一人説得他本義出只據他臆説某若拈出便别只是不欲得友仁烈風荘子音作厲風如此之類甚多節參同契先生以參同契示張以道云近兩日方令書坊開得然裏面亦難曉義剛問曾景建謂參同本是龍虎上經果否曰不然蓋是後人見魏伯陽傳有龍虎上經一句遂偽作此經大概皆是體參同而為故其間有説錯了處如參同中云二用旡爻位周流行六虚二用者即易中用九用六也乾坤六爻上下皆有定位唯用九用六無位故周流行於六虚今龍虎經却錯説作虚危去蓋討頭不見胡亂牽合一字來説義剛參同契所言坎離水火龍虎鈆汞之屬只是互換其名其實只是精氣二者而已精水也坎也龍也汞也氣火也離也虎也鈆也其法以神運精氣結而為丹陽氣在下初成水以火煉之則凝成丹其説甚異内外異色如鴨子卵真箇成此物參同契文章極好蓋後漢之能文者為之讀得亦不枉其用字皆根据古書非今人所能解以故皆為人妄解世間本子極多其中有云千周粲彬彬兮萬遍将可覩神明或告人兮魂靈忽自悟言誦之久則文義要訣自見又曰二用無爻位周流行六虚二用者用九用六九六亦坎離也六虚者即乾坤之初二三四五上六爻位也言二用雖無爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而無定所也世有龍虎經云在參同契之先季通亦以為好及得觀之不然乃櫽括參同契之語而為之也僴卓録云鈆汞能虎水火坎離皆一様是精氣參同契盡被後人胡解凡説鈆汞之屬只是互換其名其實只一物也精與氣二者而以神運之耳云云千周兮粲彬彬用之萬遍斯可覩鬼神将告予神靈忽自悟言誦之久則文義要訣自見又云二用無爻位周流遍六虚言二用雖無爻位常周流乎乾坤六爻之間猶人身之精氣常周流乎人之一身而無定所也又云往來無定所上下無常居亦此意也世有龍虎經或以為在參同契之先嘗見季通説好及觀之不然乃盡是櫽括參同契為之如説二用六虚處彼不知為周易之二用六虚盡錯觧了遂分説云冇六様虚盡是亂説參同契文章極好念得亦不枉其中心云武若不告人絶聖道罪誅言之著竹帛又恐漏泄天機之意故但為重覆反復之語令人子細讀之自曉其法皆在其中多不曉參同契為艱深之詞使人難曉其中有千周萬遍之説欲人之熟讀以得之也大概其説以為欲明言之恐泄天機欲不説來又却可惜人傑論修飬人言仙人不死不是不死但只是漸漸銷融了不覺耳蓋他能煉其形氣使查滓都銷融了惟有那些清虚之氣故能升騰變化漢書有云學神仙尸解銷化之術看得來也是好則劇然久後亦須散了且如秦漢問所説仙人後來都不見了國初説鍾離權吕洞賔之屬後來亦不見了近來人又説劉髙尚過㡬時也則休也廣長孺説脩飬般運事曰只是屏氣減息思慮自少此前輩之論也今之人傳得法時便授與人更不問他人肥與瘠怯與壮但是一律教他未有不敗不成病痛者因論道家修飬有黙坐以心縮上氣而致閉死者曰心縮氣亦未為是某嘗考䆒他妙訣只要神形全不撓動故老子曰心使氣則强纔使氣便不是自然只要飬成嬰兒如身在這裏坐而外面行者是嬰兒但無工夫做此其導引法只如消息皆是下策淳隂符經恐皆唐李佺所為是他著意去做學他古人何故只因他説起便行於世某向以語伯恭伯恭亦以為然一如麻衣易只是戴氏自做自解文字自可認道夫曰向見南軒䟦云此真麻衣道者書也曰敬夫看文字甚踈道夫閭岳主簿進黄帝隂符經傳先生説握竒經等文字恐非黄帝作池本作因閭丘問握竒經引程子説先生曰云云唐李佺為之聖賢言語自平正都無許多嶢﨑池本此下云又詩序是衛宏作好事者附㑹以為出聖人其詩章多是牽合須細考可也因舉遺書云前軰説處或有未到池本作有到有不到處不可一概定横渠尋常有太深言語如言鬼神二氣之良能説得好伊川言鬼神造化之迹却未甚明白問良能之義曰只是二氣之自然者耳因舉明則有禮樂幽則有鬼神鬼自是屬禮從隂神自是屬樂從陽易言精氣池本云鬼神即禮樂又云前軰之説如此當知幽與明之實如何鬼自從隂屬禮神自從陽屬樂因舉樂者敦和率神而從天禮者别宜歸鬼而從地云云易言精氣為物㳺魂為變此却是知鬼神之情狀魂氣升於天體魄歸于地是神氣上升鬼魄下降不特人也凡物之枯敗也其香氣騰於上其物腐於下此可類推閭丘次孟謂隂符經所謂自然之道靜故天地萬物生天地之道浸故隂陽勝隂陽相推變化順矣此數語雖六經之言無以加先生謂如他閭丘此等見處儘得今按隂符經無其語道夫隂符經云天地之道浸這句極好隂陽之道無日不相勝只管逐些子挨出這箇退一分那箇便進一分道夫問隂符經云絶利一源為絶利而止守一源節問隂符經三反晝夜是如何曰三反如學而時習之是貫上文言言專而又審反是反反覆覆節三反晝夜之説如修飬家子午行持今日如此明日如此做得愈熟愈有效驗人傑論道教老氏初只是清淨無為清淨無為却帯得長生不死後來却只説得長生不死一項如今恰成箇巫祝專只理㑹厭禳祈禱這自經兩節變了賀孫道家有老荘書却不知看盡為釋氏竊而用之却去倣傚釋氏經教之屬譬如巨室子弟所有珍寳悉為人所盜去却去収拾他人家破甕破釡必大道教最衰儒教雖不甚振然猶有學者班班駮駮説些義理又曰佛書中多説佛言道書中亦多云道言佛是箇人道却如何㑹説話然自晉來已有此説必大道家之學出於老子其所謂三清蓋倣釋氏三身而為之爾佛氏所謂三身法身者釋迦之本性也報身者釋迦之德業也肉身者釋迦之真身而實有之人也今之宗其教者遂分為三像而駢列之則既失其指矣而道家之徒欲倣其所為遂尊老子為三清元始天尊太上道君太上老君而昊天上帝反坐其下悖戾僭逆莫此為甚且玉清元始天尊既非老子之法身上清太上道君又非老子之報身設有二像又非與老子為一而天尊又自為上清太上老君蓋倣釋氏之失而又失之者也况荘子明言老聃之死則聃亦人鬼爾豈可僣居昊天上帝之上哉釋老之學盡當毁廢假使不能盡去則老氏之學但當自祀其老子闗尹列荘之徒以及安期生魏伯陽軰而天地百祠自當領於天子之祠官而不當使道家預之庶乎其可也僴論道家三清今皆無理㑹如那兩尊已是詭名狹户了但老子既是人鬼如何却居昊天上帝之上朝廷更不正其位次又如真武本𤣥武避聖祖諱故曰真武𤣥龜也武蛇也此本虚危星形似之故因而名北方為𤣥武七星至東方則角亢心尾象龍故曰蒼龍西方奎婁状似虎故曰白虎南方張翼状似鳥故曰朱鳥今乃以𤣥武為真聖而作真龜蛇於下已無義理而又增天蓬天猷及翊聖真君作四聖殊無義理所謂翊聖乃今所謂曉子者真宗時有此神降故遂封為真君義剛道家行法只是精神想出恐人不信故以法愚之太史遷吕與叔集記一事極􅏜舊見臨漳有孫事道廵檢亦能此可學云天下有許多物事想相物自入來曰然可學道家説仙人尸解極恠異将死時用一劒一圓藥安於睡處少間劒化作自己藥又化作甚麽物自家却自去别處去其劒亦有名謂之良非子良非之義猶言本非我也良非子好對亡是公朱子語類卷二百十五
