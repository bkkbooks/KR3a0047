body:
  text: 朱子語類卷四性理一人物之性氣質之性這㡬箇字自古聖賢上下數千年呼唤得都一般畢竟是聖學傳授不斷故能如此至春秋時此箇道理其傳猶未泯如劉定公論人受天地之中以生鄭子産論伯有為厲事其窮理煞精廣天之生物也一物與一無妄大推天下無無性之物盖有此物則有此性無此物則無此性若海問五行均得太極否曰均問人具五行物只得一行曰物亦具有五行只是得五行之偏者耳可學問性具仁義禮智曰此猶是説成之者性上面更有一隂一陽繼之者善只一隂一陽之道未知做人做物已具是四者雖尋常昆䖝之類皆有之只偏而不全濁氣間隔徳明人物之性其賦形偏正固自合下不同然隨其偏正之中又自有清濁昏明之異僴物物運動蠢然若與人無異而人之仁義禮智之粹然者物則無也當時所記改人之之字為性字姑兩存之節或問人物之性一源何以有異曰人之性論明暗物之性只是偏塞暗者可使之明已偏塞者不可使之通也横渠言凡物莫不有是性由通蔽開塞所以有人物之别而卒謂塞者牢不可開厚者可以開而開之也難薄者開之也易是也又問人之習為不善其溺已深者終不可復反矣曰勢極重者不可反亦在乎識之淺深與其用力之多寡耳大推先生答黄商伯書有云論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同問理同而氣異此一句是説方付與萬物之初以其天命流行只是一般故理同以其二五之氣有清濁純駁故氣異下句是就萬物已得之後説以其雖有清濁之不同而同此二五之氣故氣相近以其昏明開塞之甚逺故理絶不同中庸是論其方付之初集注是看其已得之後曰氣相近如知寒煖識饑飽好生惡死趨利避害人與物都一般理不同如蜂蟻之君臣只是他義上有一㸃子明虎狼之父子只是他仁上有一㸃子明其他更推不去恰似鏡子其他處都暗了中間只有一兩㸃子光大凡物事禀得一邊重便占了其他底如慈愛底人少斷制斷制之人多殘忍盖仁多便遮了義義多便遮了那仁問所以婦人臨事多怕亦是氣偏了曰婦人之仁只流從愛上去僴問人物皆禀天地之理以為性皆受天地之氣以為形若人品之不同固是氣有昏明厚薄之異若在物言之不知是所禀之理便有不全耶亦是縁氣禀之昏蔽故如此耶曰惟其所受之氣只有許多故其理亦只有許多如犬馬他這形氣如此故只㑹得如此事又問物物具一太極則是理無不全也曰謂之全亦可謂之偏亦可以理言之則無不全以氣言之士毅録作以不能推言則不能無偏故吕與叔謂物之性有近人之性者如猫相乳之類温公集載他家一猫又更差異人之性有近物之性者如世上昏愚人廣問氣質有昏濁不同則天命之性有偏全否曰非有偏全謂如日月之光若在露地則盡見之若在蔀屋之下有所蔽塞有見有不見昏濁者是氣昏濁了故自蔽塞如在蔀屋之下然在人則蔽塞有可通之理至於禽獸亦是此性只被他形體所拘生得蔽隔之甚無可通處至於虎狼之仁豺獺之祭蜂蟻之義却只通這些子譬如一隙之光至於獼猴形狀類人便最靈於他物只不㑹説話而已到得蠻獠便在人與禽獸之間所以終難改㽦性如日光人物所受之不同如隙竅之受光有大小也人物被形質局定了也是難得開廣如螻蟻如此小便只知得君臣之分而已僴或説人物性同曰人物性本同只氣禀異如水無有不清傾放白碗中是一般色及放黑碗中又是一般色放青碗中又是一般色又曰性最難説要説同亦得要説異亦得如隙中之日隙之長短大小自是不同然却只是此日夔孫人物之生天賦之以此理未嘗不同但人物之禀受自有異耳如一江水你將杓去取只得一杓將碗去取只得一碗至於一桶一缸各自隨器量不同故理亦隨以異僴問人則能推物則不能推曰謂物無此理不得只是氣昏一似都無了夔孫天地間非特人為至靈自家心便是鳥獸草木之心但人受天地之中而生耳敬仲某有疑問呈先生曰人物之性有所謂同者又有所謂異者知其所以同又知其所以異然後可以論性矣夫太極動而二氣形二氣形而萬化生人與物俱本乎此則是其所謂同者而二氣五行絪緼交感萬變不齊則是其所謂異者同者其理也異者其氣也必得是理而後有以為人物之性則其所謂同然者固不得而異也必得是氣而後有以為人物之形則所謂異者亦不得而同也是以先生於大學或問因謂以其理而言之則萬物一原固無一物貴賤之殊以其氣而言之則得其正者通者為人得其偏且塞者為物是以或貴或賤而有所不能齊者盖以此也然其氣雖有不齊而得之以有生者在人物莫不皆有理雖有所謂同而得之以為性者人則獨異於物故為知覺為運動者此氣也為仁義為禮智者此理也知覺運動人能之物亦能之而仁義禮智則物固有之而豈能全之乎今告子乃欲指其氣而遺其理梏於其同者而不知其所謂異者此所以見闢於孟子而先生於集註則亦以為以氣言之則知覺運動人物若不異以理言之則仁義禮智之禀非物之所能全也於此則言氣同而理異者所以見人之為貴非物之所能並於彼則言理同而氣異者所以見太極之無虧欠而非有我之所得為也以是觀之尚何疑哉有以集注或問異同為疑者答之如此未知是否先生批云此一條論得甚分明昨晚朋友正有講及此者亦已略為言之然不及此之有條理也枅子晦問人物清明昏濁之殊徳輔因問堯舜之氣常清明沖和何以生丹朱商均曰氣偶然如此如瞽瞍生舜是也某曰瞽瞍之氣有時而清明堯舜之氣無時而昏濁先生答之不詳次日廖再問恐是天地之氣一時如此曰天地之氣與物相通只借從人軀殻裡過來徳輔問虎狼之父子蜂蟻之君臣豺獺之報本睢鳩之有别物雖得其一偏然徹頭徹尾得義理之正人合下具此天命之全體乃為物欲氣禀所昏反不能如物之能通其一處而全盡何也曰物只有這一處通便却專人卻事事理㑹得些便却泛泛所以易昏銖虎遇藥箭而死也直去不囘虎是剛勁之物便死得也公正僴有飛蟻爭集於燭而死指而示諸生曰此飛而亢者便是屬隂便是成之者性莊子謂一受其成形不亡以待盡道夫問人與物以氣禀之偏全而不同不知草木如何曰草木之氣又别他都無知了廣一草一木皆天地和平之氣人傑天下之物至㣲至細者亦皆有心只是有無知覺處爾且如一草一木向陽處便生向隂處便憔悴他有箇好惡在裡至大而天地生出許多萬物運轉流通不停一息四時晝夜恰似有箇物事積踏恁地去天地自有箇無心之心復卦一陽生於下這便是生物之心又如所謂惟皇上帝降􅇆於下民天道福善禍淫這便自分明有箇人在裏主宰相似心是他本領情是他箇意思又問如何見天地之情曰人正大便也見得天地之情正大天地只是正大未嘗有些子邪處未嘗有些子小處又曰且如今言藥性熱藥何嘗有性只是他所生恁地道夫徐子融以書問枯槁之中有性有氣故附子熱大黄寒此性是氣質之性陳才卿謂即是本然之性先生曰子融認知覺為性故以此為氣質之性性即是理有性即有氣是他禀得許多氣故亦只有許多理才卿謂有性無仁先生曰此説亦是是他元不曾禀得此道理惟人則得其全如動物則又近人之性矣故吕氏云物有近人之性人有近物之性盖人亦有昏愚之甚者然動物雖有知覺才死則其形骸便腐壊植物雖無知覺然其質却堅乆難壊廣問曾見答余方叔書以為枯槁有理不知枯槁瓦礫如何有理曰且如大黄附子亦是枯槁然大黄不可為附子附子不可為大黄節問枯槁之物亦有性是如何曰是他合下有此理故云天下無性外之物因行街云階磚便有磚之理因坐云竹椅便有竹椅之理枯槁之物謂之無生意則可謂之無生理則不可如朽木無所用止可付之爨竈是無生意矣然燒甚麽木則是甚麽氣亦各不同這是理元如此賀孫問枯槁有理否曰才有物便有理天不曾生箇筆人把兔毫來做筆才有筆便有理又問筆上如何分仁義曰小小底不消恁地分仁義節問理是人物同得於天者如物之無情者亦有理否曰固是有理如舟只可行之於水車只可行之於陸祖道季通云在陸者不可以入水在水者不可以居陸在陸者陽多而隂少在水者隂多而陽少若出水入陸則龜獺之類是也端䝉草木都是得隂氣走飛都是得陽氣各分之草是得隂氣木是得陽氣木堅走獸是得隂氣飛鳥是得陽氣故獸伏草而鳥棲木然獸又有得陽氣者如猿猴之類是也鳥又有得隂氣者如雉鵰之類是也唯草木都是隂氣然却有隂中陽陽中隂者端蒙問物有夏秋間生者曰生得較遲他又自有箇小四時方子問動物有知植物無知何也曰動物有血氣故能知植物雖不可言知然一般生意亦可黙見若戕賊之便枯悴不復恱懌池本作澤亦似有知者嘗觀一般花樹朝日照曜之時欣欣向榮有這生意皮包不住自逬出來若枯枝老葉便覺憔悴盖氣行已過也問此處見得仁意否曰只看戕賊之便彫瘁亦是義底意思因舉康節云植物向下頭向下本乎地者親下故濁動物向上人頭向上本乎天者親上故清獼猴之類能如人立故特靈怪如鳥獸頭多横生故有知無知相半徳明銖録云本乎天者親上凡動物首向上是親乎上人類是也本乎地者親下凡植物本向下是親乎下草木是也禽獸首多横所以無智此康節説純叟言枇杷具四時之氣秋結菩蕾冬花春實夏熟才熟後又結蓓蕾先生顧謂徳明曰如此看去意謂生理循環也徳明冬間花難謝如水仙至脆弱亦耐乆如梅花蠟梅皆然至春花則易謝若夏間花則尤甚矣如葵榴荷花只開得一日必竟冬時其氣貞固故難得謝若春夏間才發便發盡了故不能乆又云大凢花頭大者易謝果實亦然如梨樹極易得衰將死時須猛結一年實了死此亦是氣將脱也廣看茄子内一粒是箇生性方問命之不齊恐不是真有為之賦予如此只是二氣錯綜參差隨其所值因各不齊皆非人力所與故謂之天所命否曰只是從大原中流出來模様似恁地不是真有為之賦予者那得箇人在上面分付這箇詩書所說便似有箇人在上恁地如帝乃震怒之類然這箇亦只是理如此天下莫尊於理故以帝名之惟皇上帝降𠂻於下民降便有主宰意問大哉乾元萬物資始乾道變化各正性命萬物盈乎兩間生生不窮日徃則月來寒徃則暑來風雷之所以鼓動山川之所以流峙皆蒼蒼者實有以主其造化之權邪抑只是太極為萬化樞紐故萬物自然如此曰此與前只一意淳以下論氣質之性語厚之昨晩說造化為性不是造化已是形而下所以造化之理是形而上蜚卿問純亦不已是理是氣曰是理天命之謂性亦是理天命如君之命令性如受職於君氣如有能守職者有不能守職者某問天命之謂性只是主理言纔説命則氣亦在其間矣非氣則何以為人物理何所受曰極是極是子思且就總㑹處言此處最好看可學因看㽦等説性曰論性要須先識得性是箇甚麽様物事必大録此下云性畢竟無形影只是心中所有底道理是也程子性即理也此説最好今且以理言之畢竟却無形影只是這一箇道理在人仁義禮智性也然四者有何形狀亦只是有如此道理有如此道理便做得許多事出來所以能惻隠羞惡辭遜是非也譬如論藥性性寒性熱之類藥上亦無討這形狀處只是服了後却做得冷做得熱底便是性便只是仁義禮智孟子説仁義禮智根於心如曰惻隠之心便是心上説情又曰邵堯夫説性者道之形體心者性之郛郭此説甚好盖道無形體只性便是道之形體然若無箇心却將性在甚處須是有箇心便収拾得這性發用出來盖性中所有道理只是仁義禮智便是實理吾儒以性為實釋氏以性為空若是指性來做心説則不可今人徃徃以心來説性須是先識得方可説必大録云若指有知覺為性只是説得心字如有天命之性便有氣質若以天命之性為根於心則氣質之性又安頓在何處謂如人心惟危道心惟㣲都是心不成只道心是心人心不是心又曰喜怒哀樂未發之時只是渾然所謂氣質之性亦皆在其中至於喜怒哀樂却只是情又曰只管説出語言理㑹得只見事多却不如都不理㑹得底又曰然亦不可含糊亦要理㑹得箇名義著落㽦人傑必大録小異天命之謂性命便是告劄之類性便是合當做底職事如主簿銷注縣尉廵捕心便是官人氣質便是官人所習尚或寛或猛情便是當㕔處斷事如縣尉捉得賊情便是發用處性只是仁義禮智所謂天命之與氣質亦相滚同才有天命便有氣質不能相離若闕一便生物不得既有天命須是有此氣方能承當得此理若無此氣則此理如何頓放必大録此云有氣質之性無天命之性亦做人不得有天命之性無氣質之性亦做人不得天命之性本未嘗偏但氣質所禀却有偏處氣有昏明厚薄之不同然仁義禮智亦無闕一之理但若惻隠多便流為姑息柔懦若羞惡多便有羞惡其所不當羞惡者且如言光必有鏡然後有光必有水然後有光光便是性鏡水便是氣質若無鏡與水則光亦散矣謂如五色若頓在黑多處便都黑了入在紅多處便都紅了却㸔你稟得氣如何然此理却只是善既是此理如何得惡所謂惡者却是氣也孟子之論盡是説性善至有不善説是陷溺是説其初無不善後來方有不善耳若如此却似論性不論氣有些不備却得程氏説出氣質來接一接便接得有首尾一齊圓備了又曰才又在氣質之下如退之説三品等皆是論氣質之性説得儘好只是不合不説破箇氣質之性却只是做性説時便不可如三品之説便分將來何止三品雖千百可也若荀揚則是論氣而不論性故不明既不論性便却將此理來昏了又曰臯陶謨中所論寛而栗等九徳皆是論及氣質之意只不曾説破氣質耳伯豐曰匡衡疏中説治性之道亦是説氣質㽦謂寛而栗等而下一字便是功夫先生皆然之或問若是氣質不善可以變否曰須是變化而反之如人一已百人十已千則雖愚必明雖柔必強㽦人之所以生理與氣合而已天理固浩浩不窮然非是氣則雖有是理而無所湊泊故必二氣交感凝結生聚然後是理有所附著凡人之能言語動作思慮營為皆氣也而理存焉故發而為孝弟忠信仁義禮智皆理也然而二氣五行交感萬變故人物之生有精粗之不同自一氣而言之則人物皆受是氣而生自精粗而言則人得其氣之正且通者物得其氣之偏且塞者惟人得其正故是理通而無所塞物得其偏故是理塞而無所知且如人頭圓象天足方象地平正端直以其受天地之正氣所以識道理有知識物受天地之偏氣所以禽獸横生草木頭生向下尾反在上物之間有知者不過只通得一路如烏之知孝獺之知祭犬但能守禦牛但能耕而已人則無不知無不能人所以與物異者所爭者此耳然就人之所禀而言又有昏明清濁之異故上知生知之資是氣清明純粹而無一毫昏濁所以生知安行不待學而能如堯舜是也其次則亞於生知必學而後知必行而後至又其次者資禀既偏又有所蔽須是痛加工夫人一已百人十已千然後方能及亞於生知者及進而不已則成功一也孟子曰人之所以異於禽獸者㡬希人物之所以異只是爭這些子若更不能存得則與禽獸無以異矣某年十五六時讀中庸人一已百人十已千一章因見吕與叔解得此段痛快讀之未嘗不竦然警厲奮發人若有向學之志須是如此做工夫方得僴問氣質之性曰纔説性時便有些氣質在裡若無氣質則這性亦無安頓處所以繼之者只説得善到成之者便是性榦性只是理然無那天氣地質則此理沒安頓處但得氣之清明則不蔽錮此理順發出來蔽錮少者發出來天理勝蔽錮多者則私欲勝便見得本原之性無有不善孟子所謂性善周子所謂純粹至善程子所謂性之本與夫反本窮源之性是也只被氣質有昏濁則隔了故氣質之性君子有弗性者焉學以反之則天地之性存矣故説性須兼氣質説方備人天命之性若無氣質却無安頓處且如一勺水非有物盛之則水無歸著程子云論性不論氣不備論氣不論性不明二之則不是所以發明千古聖賢未盡之意甚為有功大抵此理有未分曉處秦漢以來傳記所載只是説夢韓退之畧近似千有餘年得程先生兄弟出來此理益明且如唐劉知㡬之子云注述六經之㫖世俗陶陶知我者希不知其書如何説想亦是擔當不得如果能曉得此理如何不與大家知賀孫性只是理氣質之性亦只是這裡出若不從這裡出有甚歸著如云人心惟危道心惟㣲道心固是心人心亦心也横渠言心統性情人傑論天地之性則專指理言論氣質之性則以理與氣雜而言之未有此氣己有此性氣有不存而性却常在雖其方在氣中然氣自是氣性自是性亦不相夾雜至論其徧體於物無處不在則又不論氣之精粗莫不有是理人性非氣質則無所寄氣非天性則無所成道夫蜚卿問氣質之性曰天命之性非氣質則無所寓然人之氣禀有清濁偏正之殊故天命之性亦有淺深厚薄之異要亦不可不謂之性舊見病翁云伊川言氣質之性正猶佛書所謂水中鹽味色裡膠清又問孟子言性與伊川如何曰不同孟子是剔出而言性之本伊川是兼氣質而言要之不可離也所以程子云論性不論氣不備論氣不論性不明而某於太極解亦云所謂太極者不離乎隂陽而為言亦不雜乎隂陽而為言道夫閎祖録云氣禀之偏難除釋氏云如水中鹽色中膠取不出也病翁愛説此性即理也當然之理無有不善者故孟子之言性指性之本而言然必有所依而立故氣質之禀不能無淺深厚薄之别孔子曰性相近也兼氣質而言砥天地間只是一箇道理性便是理人之所以有善有不善只縁氣質之禀各有清濁去偽人所禀之氣雖皆是天地之正氣但滚來滚去便有昏明厚薄之異盖氣是有形之物才是有形之物便自有美有惡也廣氣質之性便只是天地之性只是這箇天地之性却從那裏過好底性如水氣質之性如殺些醬與鹽便是一般滋味僴問天理變易無窮由一隂一陽生生不窮繼之者善全是天理安得不善孟子言性之本體以為善者是也二氣相軋相取相合相乖有平易處有傾側處自然有善有惡故禀氣形者有惡有善何足怪語其本則無不善也曰此却無過丁復之曰先生解中庸大本云云曰既謂之大本只是理善而已才説人欲便是氣也亦安得無本但大本中元無此耳大雅問理無不善則氣胡為有清濁之殊曰才説著氣便自有寒有熱有香有臭儒用二氣五行始何嘗不正只滚來滚去便有不正如陽為剛躁隂為重濁之類士毅氣升降無時止息理只附氣惟氣有昏濁理亦隨而間隔徳明人性本善無許多不美不知那許多不美是甚麽物事振問趙書記一日問浩如何是性浩對以伊川曰孟子言性善是極本窮原之性孔子言性相近是氣質之性起云安得有兩様只有中庸説天命之謂性自分明曰公當初不曽問他既謂之善固無兩般才説相近須有兩様便自説不得因問天命之謂性還是極本窮原之性抑氣質之性曰是極本窮原之性天之所以命只是一般縁氣質不同遂有差殊孟子分明是於人身上挑出天之所命者説與人要見得本原皆善浩人之性皆善然而有生下來善底有生下來便惡底此是氣禀不同且如天地之運萬端而無窮其可見者日月清明氣候和正之時人生而禀此氣則為清明渾厚之氣須做箇好人若是日月昏暗寒暑反常皆是天地之戾氣人若禀此氣則為不好底人何疑人之為學却是要變化氣禀然極難變化如孟子道性善不言氣禀只言人皆可以為堯舜若勇猛直前氣稟之偏自消功夫自成故不言氣禀看來吾性既善何故不能為聖賢却是被這氣禀害如氣禀偏於剛則一向剛暴偏於柔則一向柔弱之類人一向推托道氣禀不好不向前又不得一向不察氣禀之害只昏昏地去又不得須知氣禀之害要力去用功克治裁其勝而歸於中乃可濓溪云性者剛柔善惡中而已故聖人立教俾人自易其惡自至其中而止矣責沈言氣質之用狹道學之功大璘問孟子言性善伊川謂是極本窮原之性孔子言性相近伊川謂是氣質之性固已曉然中庸所謂天命之謂性不知是極本窮原之性是氣質之性曰性也只是一般天之所命何嘗有異正縁氣質不同便有不相似處故孔子謂之相近孟子恐人謂性元來不相似遂於氣質内挑出天之所命者説與人道性無有不善即子思所謂天命之謂性也浩問孔子已説繼之者善成之者性如何人尚未知性到孟子方才説出到周先生方説得盡曰孔子説得細膩説不曾了孟子説得麄説得踈畧孟子不曾推原原頭不曾説上面一截只是説成之者性也義剛孟子言性只説得本然底論才亦然荀子只見得不好底揚子又見得半上半下底韓子所言却是説得稍近盖荀揚説既不是韓子看來端的見有如此不同故有三品之説然惜其言之不盡少得一箇氣字耳程子曰論性不論氣不備論氣不論性不明盖謂此也力行孟子未嘗説氣質之性程子論性所以有功於名教者以其發明氣質之性也以氣質論則凡言性不同者皆氷釋矣退之言性亦好但不知氣質之性耳人傑亞夫問氣質之説起於何人曰此起於張程某以為極有功於聖門有補於後學讀之使人深有感於張程前此未曾有人説到此如韓退之原性中説三品説得也是但不曾分明説是氣質之性耳性那裡有三品來孟子説性善但説得本原處下面却不曾説得氣質之性所以亦費分疏諸子説性惡與善惡混使張程之説早出則這許多説話自不用紛爭故張程之説立則諸子之説泯矣因舉横渠形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉又舉明道云論性不論氣不備論氣不論性不明二之則不是且如只説箇仁義禮智是性世間却有生出來便無狀底是如何只是氣禀如此若不論那氣這道理便不周匝所以不備若只論氣禀這箇善這箇惡却不論那一原處只是這箇道理又却不明此自孔子曾子子思孟子理㑹得後都無人説這道理謙之問天地之氣當其昏明駁雜之時則其理亦隨而昏明駁雜否曰理却只恁地只是氣自如此又問若氣如此理不如此則是理與氣相離矣曰氣雖是理之所生然既生出則理管他不得如這理寓於氣了日用間運用都由這箇氣只是氣強理弱譬如大禮赦文一時將税都放了相似有那村知縣硬自捉縛須要他納縁被他近了更自呌上面不應便見得那氣粗而理㣲又如父子若子不肖父亦管他不得聖人所以立教正是要救這些子時舉柄録云問天地之性既善則氣禀之性如何不善曰理固無不善才賦於氣質便有清濁偏正剛柔緩急之不同盖氣強而理弱理管攝他不得如父子本是一氣子乃父所生父賢而子不肖父也管他不得又如君臣同心一體臣乃君所命上欲行而下阻格上之人亦不能一一去督責得他問人之徳性本無不備而氣質所賦鮮有不偏將性對氣字看性即是此理理無不善者因堕在形氣中故有不同所謂氣質之性者是如此否曰固是但氣禀偏則理亦欠闕了問徳不勝氣性命於氣徳勝其氣性命於徳所謂勝者莫是指人做處否曰固是又問性命於氣是性命都由氣則性不能全其本然命不能順其自然性命於徳是性命都由徳則性能全天性命能順天理否曰固是又問横渠論氣質之性却分曉明道生之謂性一章却難曉曰它中間性有兩三説須子細看問云生之謂性它這一句且是説禀受處否曰是性即氣氣即性它這且是滚説性便是理氣便是氣是未分别説其實理無氣亦無所附又問人生氣禀理有善惡云云善固性也然惡亦不可不謂之性也看來善固性也固是若云惡亦不可不謂之性則此理本善因氣而鶻突雖是鶻突然亦是性也曰它原頭處都是善因氣偏這性便偏了然此處亦是性如人渾身都是惻隠而無羞惡都羞惡而無惻隠這箇便是惡徳這箇唤做性却不是如墨子之心本是惻隠孟子推其弊到得無父處這箇便是惡亦不可不謂之性也又問生之謂性人生而靜以上云云便己不是性也看此㡬句是人物未生以前説性不得性字是人物己生方著得性字故才説性便是落於氣而非性之本體矣曰它這是合理氣一滚説到孟子説性便是從中間斡出好底説故謂之善又問所謂繼之者善者猶水流而就下也皆水也有流而至海云云曰它這是兩箇譬喻水之就下處它這下更欠言語要須為它作文補這裡始得它當時只是滚説了盖水之就下便是喻性之善如孟子所謂過顙在山雖不是順水之性然不謂之水不得這便是前面惡亦不可不謂之性之説到得説水之清却依舊是譬喻問它後面有一句説水之清則性善之謂也意却分曉曰固是它這一段説得詳了又問此理天命也它這處方提起以此理説則是純指上面天理而言不雜氣説曰固是又曰理離氣不得而今講學用心著力却是用這氣去尋箇道理䕫孫先生言氣質之性曰性譬之水本皆清也以淨器盛之則清以不淨之器盛之則臭以汙泥之器盛之則濁本然之清未嘗不在但既臭濁猝難得便清故雖愚必明雖柔必強也煞用氣力然後能至某嘗謂原性一篇本好但言三品處欠箇氣字欠箇來厯處却成天合下生出三般人相似孟子性善似也少箇氣字砥伯羽録云大抵孟子説話也間或有些子不都是處只被他才髙當時無人抵得他告子口更不曾得開性如水流於清渠則清流入汙渠則濁氣質之清者正者得之則全人是也氣質之濁者偏者得之則昧禽獸是也氣有清濁人則得其清者禽獸則得其濁者人大體本清故異於禽獸亦有濁者則去禽獸不逺矣節有是理而後有是氣有是氣則必有是理但禀氣之清者為聖為賢如寳珠在清冷水中其氣之濁者為愚為不肖如珠在濁水中所謂明明徳者是就濁水中揩拭此珠也物亦有是理又如寳珠落在至汙濁處然其所禀亦間有些明處就上面便自不昧如虎狼之父子蜂蟻之君臣豺獺之報本睢鳩之有别曰仁獸曰義獸是也儒用理在氣中如一箇明珠在水裡理在清底氣中如珠在那清底水裡面透底都明理在濁底氣中如珠在那濁底水裡面外面更不見光明處問物之塞得甚者雖有那珠如在深泥裡面更取不出曰也是如此胡泳敬子謂性所發時無有不善雖氣禀至惡者亦然但方發之時氣一乗之則有善有不善耳僴以為人心初發有善有惡所謂㡬善惡也初發之時本善而流入於惡者此固有之然亦有氣禀昏愚之極而所發皆不善者如子越椒之類是也且以中人論之其所發之不善者固亦多矣安得謂之無不善邪曰不當如此説如此説得不是此只當以人品賢愚清濁論有合下發得善底也有合下發得不善底也有發得善而為物欲所奪流入於不善底極多般様今有一様人雖無事在這裡坐他心裡也只思量要做不好事如蛇虺相似只欲咬人他有甚麽發得善明道説水處最好皆水也有流而至海終無所汚有流而未逺固已漸濁有流而甚逺方有所濁有濁之多者濁之少者只可如此説僴或問氣稟有清濁不同曰氣禀之殊其類不一非但清濁二字而已今人有聰明事事曉者其氣清矣而所為未必皆中於理則是其氣不醇也有謹厚忠信者其氣醇矣而所知未必皆達於理則是其氣不清也推此求之可見問季通主張氣質太過曰形質也是重且如水之氣如何似長江大河有許多洪流金之氣如何似一塊鐡恁地硬形質也是重被此生壊了後理終是抝不轉來又曰孟子言人所以異於禽獸者㡬希不知人何故與禽獸異又言犬之性猶牛之性牛之性猶人之性與不知人何故與牛犬異此兩處似欠中間一轉語須著説是形氣不同故性亦少異始得恐孟子見得人性同處自是分曉直截却於這些子未甚察又曰了翁云氣質之用狹道學之功大與季通説正相反若論其至不可只靠一邊如了翁之説則何故自古只有許多聖賢如季通之説則人皆委之於生質更不修為須是看人功夫多少如何若功夫未到則氣質之性不得不重若功夫至則氣質豈得不聽命於義理也須著如此説方盡閎祖人性雖同禀氣不能無偏重有得木氣重者則惻隠之心嘗多而羞惡辭遜是非之心為其所塞而不發有得金氣重者則羞惡之心常多而惻隠辭遜是非之心為其所塞而不發水火亦然唯隂陽合徳五性全備然後中正而為聖人也閎祖性有濁者如得木氣多者仁較多金氣多者義較多揚先生曰人有敏於外而内不敏又有敏於内而外不敏如何曰莫是禀氣強弱曰不然淮南子曰金水内明日火外明氣偏於内故内明氣偏於外則外明可學氣禀所拘只通得一路極多様或厚於此而薄於彼或通於彼而塞於此有人能盡通天下利害而不識義理或工於百工技藝而不解讀書如虎豹只知父子蜂蟻只知君臣惟人亦然或知孝於親而薄於他人如明皇友愛諸弟長枕大被終身不變然而為君則殺其臣為父則殺其子為夫則殺其妻便是有所通有所蔽是他性中只通得一路故於他處皆碍也是氣禀也是利害昏了又問以堯為父而有丹朱以鯀為父而有禹如何曰這箇又是二氣五行交際運行之際有清濁人適逢其㑹所以如此如算命推五星隂陽交際之氣當其好者則質美逢其惡者則不肖又非人之氣所能與也僴問人有強弱由氣有剛柔若人有技藝之類如何曰亦是氣如今人看五行亦推測得些小曰如才不足人明得理可為否曰若明得盡豈不可為所謂克念作聖是也然極難若只明得一二如何做得曰温公論才徳如何曰他便專把朴者為徳殊不知聰明果敢正直中和亦是才亦是徳可學或問人禀天地五行之氣然父母所生與是氣相值而然否曰便是這氣須從人身上過來今以五行枝榦推筭人命與夫地理家推擇山林向背皆是此理然又有異處如磁窰中器物聞説千百件中或有一件紅色大段好者此是異禀惟人亦然瞽鯀之生舜禹亦猶是也人傑問臨漳士友録先生語論氣之清濁處甚詳曰粗説是如此然天地之氣有多少般問堯舜生丹均瞽䏂生舜事恐不全在人亦是天地之氣曰此類不可曉人氣便是天地之氣然就人身上透過如魚在水水入口出腮但天地公共之氣人不得擅而有之徳明亞夫曰性如日月氣濁者如雲霧先生以為然節人性如一團光煨在灰裡撥開便明椿問氣禀云云曰天理明則彼如何著得可學問人有常言某人性如何某物性如何某物性熱某物性冷此是兼氣質與所禀之理而言否曰然僴問指屋柱云此理也曲直性也所以為曲直命也曲直是説氣禀曰然可學質並氣而言則是形質之質若生質則是資質之質復舉了翁責沈説曰他説多是禪不知此數句如何恁説得好義剛性者萬物之原而氣禀則有清濁是以有聖愚之異命者萬物之所同受而隂陽交運參差不齊是以五福六極值遇不一端蒙以下兼言命安卿問命字有專以理言者有專以氣言者曰也都相離不得盖天非氣無以命於人人非氣無以受天所命道夫問先生説命有兩種一種是貧富貴賤死生壽夭一種是清濁偏正智愚賢不肖一種屬氣一種屬理以僴觀之兩種皆似屬氣盖智愚賢不肖清濁偏正亦氣之所為也曰固然性則命之理而已僴問性分命分何以别曰性分是以理言之命分是兼氣言之命分有多寡厚薄之不同若性分則又都一般此理聖愚賢否皆同淳㝢録少異命之一字如天命謂性之命是言所禀之理也性也有命焉之命是言所禀之分有多寡厚薄之不同也伯羽問天命謂性之命與死生有命之命不同何也曰死生有命之命是帶氣言之氣便有禀得多少厚薄之不同天命謂性之命是純乎理言之然天之所命畢竟皆不離乎氣但中庸此句乃是以理言之孟子謂性也有命焉此性是兼氣禀食色言之命也有性焉此命是帶氣言之性善又是超出氣説淳問子罕言命若仁義禮智五常皆是天所命如貴賤死生壽夭之命有不同如何曰都是天所命禀得精英之氣便為聖為賢便是得理之全得理之正禀得清明者便英爽禀得敦厚者便温和禀得清髙者便貴禀得豐厚者便富禀得乆長者便壽禀得衰頽薄濁者一本作衰落孤單者便為貧為賤為夭便為愚不肖為貧為賤為夭天有那氣生一箇人出來便有許多物隨他來又曰天之所命固是均一到氣禀處便有不齊看其禀得來如何禀得厚道理也備嘗謂命譬如朝廷誥勑心譬如官人一般差去做官性譬如職事一般郡守便有郡守職事縣令便有縣令職事職事只一般天生人教人許多道理便是付人許多職事别本云道理只一般氣禀譬如俸給貴如官髙者賤如官卑者富如俸厚者貧如俸薄者夀如三兩年一任又再任者夭者如不得終任者朝廷差人做官便有許多物一齊趂一作隨後來横渠云形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性焉如禀得氣清明者這道理只在裡面禀得昏濁者這道理也只在裡面只被昏濁遮蔽了譬之水清底裡面纎毫皆見渾底便見不得孟子説性善他只見得大本處未説得氣質之性細碎處程子謂論性不論氣不備論氣不論性不明二之則不是孟子只論性不論氣便不全備論性不論氣這性説不盡論氣不論性性之本領處又不透徹荀揚韓諸人雖是論性其實只説得氣荀子只見得不好人底性便説做惡揚子見半善半惡底人便説善惡混韓子見天下有許多般人所以立為三品之説就三子中韓子説又較近他以仁義禮智為性以喜怒哀樂為情只是中間過接處少箇氣字㝢淳録自横渠以下同問顔淵不幸短命伯牛死曰命矣夫孔子得之不得曰有命如此之命與天命謂性之命無分别否曰命之正者出於理命之變者出於氣質要之皆天所付予孟子曰莫之致而至者命也但當自盡其道則所值之命皆正命也因問如今數家之學如康節之説謂皆一定而不可易如何曰也只是隂陽盛衰消長之理大數可見然聖賢不曾主此説如今人説康節之數謂他説一事一物皆有成敗之時都説得膚淺了木之或問亡之命矣夫此命是天理本然之命否曰此只是氣禀之命富貴死生禍福貴賤皆禀之氣而不可移易者祖道曰不知命無以為君子與五十知天命兩命字如何曰不知命亦是氣禀之命知天命則是聖人知其性中四端之所自來如人看水一般常人但見為水流聖人便知得水之發源處祖道聞一問亡之命矣夫此命字是就氣禀上説曰死生壽夭固是氣之所禀只看孟子説性也有命焉處便分曉擇之問不知命與知天命之命如何曰不同知天命謂知其理之所自來譬之於水人皆知其為水聖人則知其發源處如不知命處却是説死生壽夭貧富貴賤之命也然孟子又説當順受其正若一切任其自然而立乎巖墻之下則又非其正也因言上古天地之氣其極清者生為聖人君臨天下安享富貴又皆享上壽及至後世多反其常衰周生一孔子終身不遇壽止七十有餘其稟得清明者多夭折暴横者多得志舊看史傳見盜賊之為君長者欲其速死只是不死為其全得壽考之氣也人傑履之説子温而厲威而不猛恭而安因問得清明之氣為聖賢昏濁之氣為愚不肖氣之厚者為富貴薄者為貧賤此固然也然聖人得天地清明中和之氣宜無所虧欠而夫子反貧賤何也豈得運使然邪抑其所禀亦有不足邪曰便是禀得來有不足他那清明也只管得做聖賢却管不得那富貴禀得那髙底則貴禀得厚底則富禀得長底則壽貧賤夭者反是夫子雖得清明者以為聖人然禀得那低底薄底所以貧賤顔子又不如孔子又禀得那短底所以又天又問一隂一陽宜若停匀則賢不肖宜均何故君子常少而小人常多曰自是他那物事駁雜如何得齊且以撲錢譬之純者常少不純者常多自是他那氣駁雜或前或後所以抝不能得他却如何得均平且以一日言之或隂或晴或風或雨或寒或熱或清爽或鶻突一日之間自有許多變便可見矣又問雖是駁雜然畢竟不過只是一隂一陽二氣而已如何㑹恁地不齊曰便是不如此若只是兩箇單底隂陽則無不齊縁是他那物事錯揉萬變所以不能得他恰好又問如此則天地生聖賢又只是偶然不是有意矣曰天地那裡説我特地要生箇聖賢出來也只是氣數到那裡恰相湊著所以生出聖賢及至生出則若天之有意焉耳又問康節云陽一而隂二所以君子少而小人多此語是否曰也説得來自是那物事好底少而惡底多且如面前事也自是好底事少惡底事多其理只一般僴敬子問自然之數曰有人禀得氣厚者則福厚氣薄者則福薄禀得氣之華美者則富盛衰颯者則卑賤氣長者則壽氣短者則夭折此必然之理問神仙之説有之乎曰誰人説無誠有此理只是他那工夫大段難做除非百事棄下辦得那般工夫方做得又曰某見名寺中所畫諸祖師人物皆魁偉雄傑宜其傑然有立如此所以妙喜賛某禪師有曰當初若非這箇定是做箇渠魁觀之信然其氣貎如此則世之所謂富貴利達聲色貨利如何籠絡得他住他視之亦無足以動其心者或問若非佛氏収拾去能從吾儒之教不知如何曰他又也未是那無文王猶興底只是也須做箇特立獨行底人所為必可觀若使有聖人収拾去可知大段好只是當時吾道黑淬淬地只有些章句詞章之學他如龍如虎這些藝解都束縳他不住必決去無疑也煞被他引去了好人可畏可畏僴問富貴有命如後世鄙夫小人當堯舜三代之世如何得富貴曰當堯舜三代之世不得富貴在後世則得富貴便是命曰如此則氣禀不一定曰以此氣遇此時是他命好不遇此時便是有所謂資適逢世是也如長平死者四十萬但遇白起便如此只他相撞著便是命可學問前日嘗説鄙夫富貴事今云富貴貧賤是前定如何曰恁地時節氣亦自别後世氣運漸乖如古封建畢竟是好人在上到春秋乃生許多逆賊今儒者多歎息封建不行然行著亦可慮且如天子必是太平聖哲為之後世如秦始皇在上乃大無道人如漢髙祖乃崛起田野此豈不是氣運顛倒問此是天命否曰是可學人之禀氣富貴貧賤長短皆有定數寓其中禀得盛者其中有許多物事其來無窮亦無盛而短者若木生於山取之或貴而為棟梁或賤而為厠料皆其生時所禀氣數如此定了揚朱子語類卷四
