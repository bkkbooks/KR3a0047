body:
  text: 朱子語類卷三十四論語十六述而篇述而不作章徐兄問述而不作是制作之作乎曰是孔子未甞作一事如删詩定書皆是因詩書而删定又問聖人不得時得位只如此聖人得時得位時更有制作否曰看聖人告顔子四代禮樂只是恁地恐不大段更有制作亦因四代有此禮樂而因革之亦未是作䖏又問如何作春秋恐是作否曰其事則齊桓晉文其文則史其義則丘竊取之矣看来是寫出魯史中間微有更改爾某甞謂春秋難看平生所以不敢說著如何知得上面那個是魯史舊文那個是夫子改底字若不改時便只依魯史如何更作春秋做甚先生徐云知我者其惟春秋乎罪我者其惟春秋乎又公羊榖梁傳云其辭則丘有罪焉耳這是多少擔負想亦不䏻不是作不知是如何賀孫録意同蜚卿問信而好古曰既信古又好古今人多是信而不好或好而不信如好之者則曰他也且恁地說信之者雖知是有個理恁地畢竟多欠了個篤好底意思道夫行夫問述而不作章曰雖說道其功倍於作者論来不知所謂刪者果是有刪否要之當時史官収詩時已各有編次但到孔子時已經散失故孔子重新整理一畨未見得刪與不刪如云吾自衛反魯然後樂正雅頌各得其所云各得其所則是還其舊位賀孫集註黙而識之章宜久問黙而識之章曰此雖非聖人極致然豈易䏻黙而識之若不是心與理契念念不忘者不䏻學不厭如人之為學有些小間斷時便是厭教不倦如以它人之事為不切於己便是倦今學者須是將此三句時時省察我還䏻黙識否我學還不厭否我教還不倦否如此乃好時舉黙而識之至誨人不倦是三節雖非聖人之極致在學者亦難如平時講貫方能記得或因人提撕方䏻存得若黙而識之乃不言而存諸心非心與理契安䏻如此學不厭在學者久亦易厭視人與己若無干涉誨之安䏻不倦此三者亦須是心無間斷方䏻如此植問黙而識之曰是得之於心自不䏻忘了非是聽得人說後記得節問黙而識之曰如顔子得一善則拳拳服膺而弗失猶是執捉在這个却是聞一善言見一善行便如己有而弗失矣燾黙而識之者黙不言也不言而此物常在也今人但說著時在不說時不在非禮勿視要和根株取不是只禁你不看聴言動皆然祖道鄭問何有於我哉曰此語難說聖人是自謙言我不曾有此數者聖人常有歉然不足之意衆人雖見它是仁之至􅌻義之至精它只管自見得有欠闕處賀孫讀黙而識之章曰此必因人稱聖人有此聖人以謙辭答之後来記者却失上面一節只做聖人自話記了黙而識之便是得之於心學不厭便是更加講貫誨不倦便是施於人也時舉問何有於我哉恐是聖人自省之辭盖聖人以盛徳之至猶恐其無諸己而自省如此亦謙己以勉人之意曰此等處須有上一截話恐是或有人說夫子如何故夫子因有此言如逹巷黨人所言如此故夫子曰吾何執執御乎執射乎吾執御矣今此章却只是記録夫子之語耳如曰二三子以我為隠乎吾無隠乎爾亦必因門人疑謂有不盡與他說者故夫子因有是言也必大徳之不脩章或問此章曰須實見得是如何徳是甚麽物事如何喚做脩如何喚做不脩人而無欲害人之心這是徳得之於吾心也然害人之心或有時而萌者是不䏻脩者也徳者道理得於吾心之謂脩者言好脩治之之謂更須自體之須把這許多說話做自家身上說不是為别人說問徙義與改不善兩句意似合掌曰聖人做兩項說在試剖析令分眀徙義是做這件事未甚合宜或見人說見人做得恰好自家遷在合宜處不善便是全然不是這須重新改換方得賀孫叔器問徳之不脩可以包下三句否曰若恁地夫子但說一句便了何用更說四句徙義改過畧似脩徳裏面事然也别是箇頭項講學自是講學脩徳自是脩徳如致知格物是講學誠意正心脩身是脩徳博學審問慎思眀辨是講學篤行是脩徳若徙義改不善如何地分叔器未及對曰不善是自家做得淫邪非僻底事徙義是雖無過惡然做得未恰好便是不合義若聞人說如何方是恰好便當徙而從之聖人說這幾句淺深輕重盡在裏面聞義不䏻徙底罪小不善不䏻改底罪大但聖人不分細大都說在裏面學者皆當著工夫義剛此四句脩徳是本為要脩徳故去講學下面徙義改過即脩徳之目也㽦行父問先知徳不可不脩方知學不可不講䏻講學方䏻徙義䏻徙義方䏻改不善如此看如何曰脩徳是本脩徳恰似說入則孝出則弟謹而信汎愛衆而親仁學不可不講恰似說行有餘力則以學文或問徙義改不善之别曰徙義不是說元初做不是元初夲心自是好但做得錯了做得不合宜如所謂皆以善為之而不知其義才移教合義理便是全好若不善則是元初便做得不是須都改了方得徙義是過失不善是罪犯賀孫恪録别出行父問徳之不脩一段曰須先理㑹孝弟忠信等事有箇地位然後就這裏講學聞義不䏻徙這一件事已是好事但做得不合義見那人說如此方是義便移此之不義以從彼之義不善則已是私意了上面是過失下面是故犯恪徳之不脩如有害人之心則仁之徳不脩有穿窬之心則義之徳不脩仁之徳脩則所言無不仁之言所行無不仁之行義之徳脩則所言無不義之言所行無不義之行淵錄云實得仁於心則發出来為仁之言做出来為仁之行實得義於心則發出来為義之言做出来為義之行聞義不䏻徙不善不䏻改二句雖似合掌却有輕重深淺聞義者尚非有過但不䏻徙義耳至於不善則是有過而不䏻改其為害大矣植南升錄别出徳之不脩如無害人之心則仁之徳脩無穿窬之心則義之徳脩聞義不䏻徙是見得自家事未合宜及聞合宜事便徙而就之不善則是有過惡了如此說方不合掌南升或問徳之不脩一章曰遷善改過是脩徳中緊要事盖只脩徳而不遷善改過亦不䏻得長進又曰遷善改過是兩項不是說改其過而遷於善遷善便是有六七分是二三分不是自家却見得那二三分是處即遷而就之要教十分是著改過則是十分不好全然要改此遷善改過之别如通書中云君子乾乾不息於誠便是脩徳底事下面便是接說遷善改過底事意正相類燾立之問此章曰徳是理之既得於吾心者便已是我有底物事了更須日日磨礲勿令間斷始得徙義與改不善一似合掌然須著與他分别盖義是事之宜處我做這一件事覺得未甚合宜便著徙令合宜此却未見得有不善處至不善便是有過惡須著速改始得此所以有輕重之别又問此四句若要連續看如何曰才要連續便是說文字不是要著寔做工夫若著寔做工夫便一句自是一句時舉李問此章曰此四句是四件事不可一滚說了下面兩句粗看只是一件事一般然此兩句自有輕重盖見義不䏻徙此只是些子未合宜處便當徙而從宜不善不䏻改則大段已是過惡底事便當改了此一句較重雉讀徳之不脩章曰此自是四句若要合說便是徳須著脩於己講學便更進其徳到徙義改過始是見之於行事時須時要㸃檢如此說却相連續也時舉問聞義不䏻徙不善不䏻改先生云有輕重其意如何曰義宜也事須要合宜不䏻徙未為不是却不合宜那不善底却乖須便打并了叔重云聞義不䏻徙較輕曰那個大體却無邪惡又曰聞義不䏻徙較宻於不善不䏻改不善不䏻改較重於聞義不䏻徙節徳之不脩至是吾憂也這雖是聖人以此教人然學不厭之意多見於此使有一毫自以為聖任其自爾則雖聖而失其聖矣賀孫又曰此是聖人自憂也聖人固無是四者之憂所以然者亦自貶以教人之意謨子之燕居章叔器問申申夭夭之義曰申申是言其不局促是心廣體胖後恁地申申舒泰夭夭好貌觀桃之夭夭是少好之貌則此亦是恁地所謂色愉只是和恱底意思但此只是燕居如此在朝及接人又不然義剛問申申夭夭聖人得於天之自然若學者有心要収束則入於嚴厲有心要舒泰則入於放肆惟理義以養其氣養之久則自然到此否曰亦須稍嚴肅則可不然則無下手處又曰但得身心収斂則自然和樂又曰不是别有一個和樂才整肅則自和樂恪甚矣吾衰章據文勢時甚矣吾衰也是一句久矣吾不復夢見周公是一句惟其久不夢見所以見得是衰若只是初不夢見時也未見得衰處此也無大義理但文勢當是如此義剛孔子固不應常常夢見周公然亦必曾夢見來故如此說然其所以如此說之意却是設詞必大蜚卿問孔子夢周公若以聖人欲行其道而夢之耶則是心猶有所動若以壯年道有可行之理而夢之耶則又不應虚有此朕兆也曰聖人曷甞無夢但夢得定耳須看它與周公契合䖏如何不然又不見别夢一個人也聖人之心自有箇勤懇惻怛不䏻自己處自有箇脫然無所繫累䖏要亦正是以此卜吾之盛衰也砥問夢周公是真夢否曰當初思欲行周公之道時必亦是曾夢見曰恐渉於心動否曰心夲是箇動物怎教它不動夜之夢猶寝之思也思亦是心之動䖏但無邪思可矣夢得其正何害心存這事便夢這事常人便胡夢了㝢錄此下云孔子自言老矣以周公之道不可得行思慮亦不到此故不復夢甚嘆其衰如此居甫舉莊子言至人無夢曰清淨者愛恁地說佛老家亦說一般無夢底話淳㝢同吾不復夢見周公自是箇徴兆如此當聖人志慮未衰天意難定八分猶有兩分運轉故他做得周公事遂夢見之非以思慮也要之精神血氣與時運相為流通到鳯不至圖不出眀王不興其徴兆自是恁地胡文定公謂春秋絶筆於獲麟為志一則動氣意思說得也甚好但以某觀之生出一个物事為人所斃多少是不好是亦一徴兆也道夫問設當孔子晚年時君有䏻用之則何如曰便是不衰如孔子請討陳恒時已年七十一到此也做得個甚又問程子謂孔子之志必將正名其罪上告天子下告方伯而率與國以討之不知天子果䏻從乎曰當時惟在下者難告問果爾則告命稽違得無有不及事之悔乎曰使哀公䏻從則聖人必一面行將去聞於周王使知之耳道夫問甚矣吾衰也曰不是孔子衰是時世衰又曰與天地相應若天要用孔子必不教他衰如太公武王皆八九十嵗夫子七十餘想見纍垂節戴少望謂顔淵子路死聖人觀之人事鳯鳥不至河不出圖聖人察之天理不復夢見周公聖人騐之吾身夫然後知斯道之果不可行而天之果無意於斯世也曰這意思也發得好道夫夢周公忘肉味祭神如神在見得聖人真一䖏理㑹一事便全體在這一事道夫問孔子夢周公却是思曰程先生如此說意欲說孔子不真見周公然見何害可學問伊川以為不是夢見人只是夢寐常存行周公之道耳集註則以為如或見之不知果是如何曰想是有時而夢見既分眀說夢見周公全道不見恐亦未安又問夫子未甞識周公夢中烏得而見之曰今有人夢見平生所不相識之人却云是某人某人者盖有之夫子之夢固與常人不同然亦有是理耳壮祖集注集義問此章曰孔子未衰以前甞夢見周公矣伊川却言不曾夢見何也曰聖人不應日間思量底事夜間便夢見如高宗夢傅說却是分眀有箇傅說在那裏高宗不知所以夢見亦是朕兆先見者如此孔子夢奠兩楹事豈是思慮後方夢見此說甚精微但於此一章上說不行今且得從程子說去偽志於道章問志於道曰思量講究持守踐履皆是志念念不舎即是縂說須是有許多實事䕫孫吉甫說志於道䖏曰志於道不是只守个空底見解須是至誠懇惻念念不忘所謂道者只是日用當然之理事親必要孝事君必要忠以至事兄而弟與朋友交而信皆是道也志於道者正是謂志於此也時舉道理也是一箇有條理底物事不是鶻淪一物如老荘所謂慌惚者志於道只是存心於所當為之理而求至於所當為之地非是欲將此心繋在一物之上也端䝉志於道如講學力行皆是據於徳則是這箇物事已成个坯璞子了義剛問據於徳曰如孝便是自家元得這孝道理非從外旋取来據於徳乃是得這基址在這裏植據於徳徳者得之於身然既得之守不定亦㑹失了須常照管不要失了須是據守方得眀作問據於徳云云曰徳者吾之所自有非自外而得也以仁義禮智觀之可見韓退之云徳足乎已無待乎外說得也好南升道者人之所共由如臣之忠子之孝只是統舉理而言徳者已之所獨得如䏻忠䏻孝則是就做䖏言也依仁則又所行䖏毎事不違於仁端蒙志於道方有志焉據於徳一言一行之謹亦是徳依於仁仁是衆善搃㑹處徳眀道是日用常行合做底徳是真箇有得於已仁謂有个安頓䖏季札先生問正淳曾聞陸子夀志於道之說否正淳謂子夀先令人立志曰只做立志便虚了聖人之說不如此直是有用力䖏且如孝於親忠於君信於朋友之類便是道所謂志只是如此知之而巳未有得於己也及其行之盡於孝盡於忠盡於信有以自得於己則是孝之徳忠之徳信之徳如此然後可據然只志道據徳而有一息之不仁便間斷了二者皆不䏻有却須據於徳後而又依於仁正淳謂這箇仁是據發見說曰既見於徳亦是發見䖏然仁之在此却無隠顯皆貫通不可専指為發見㽦人傑錄云志於道是君臣父子夫婦兄弟朋友之道明得此理得之於身斯謂據於徳然而不依於仁則二者皆為無用矣依仁不止於發見凡内外隠顯莫非仁也正卿問志道據徳依仁曰志於道猶是兩件物事據於徳謂忠於君則得此忠孝於親則得此孝是我之得於己者也故可據依仁則是平日存主䖏無一念不在這裏又是據於徳底骨子時舉正卿問志道據徳依仁曰徳是自家心下得這箇道理如欲為忠而得其所以忠如欲為孝而得其所以孝到得依於仁則又不同依仁則是此理常存於心日用之間常常存在據徳依仁雖有等級不比志道與據徳依仁全是兩截志只是心之所之與有所據有所依不同也賀孫問據於徳依於仁曰徳只是做這一件事底意思據而勿失仁又親切又問仁是全體徳只是一事之徳否曰然又曰事父母則為孝徳事兄長則為悌徳徳是有得於心是未事親從兄時已渾全是孝弟之心此之謂徳必大先生問學者據徳依仁如何分别學者累日說皆不合乃曰徳是逐件上理㑹底仁是全體大用常依靠處又曰據徳是因事發見底如因事父有孝因事君有忠依仁是夲體不可須臾離底據徳如著衣喫飯依仁如鼻之呼吸氣僴徳是道之實仁是徳之心道夫行夫問志道據徳依仁游藝曰志於道方是要去做方是事親欲盡其孝事兄欲盡其弟方是恁地至據於徳則事親䏻盡其孝事兄䏻盡其弟便自有這道理了却有可據底地位才說盡其孝便是據於孝雖然如此此只是就事上逐件理㑹若是不依於仁不到那事親事兄時此心便沒頓放處依於仁則自朝至暮此心無不在這裏連許多徳縂攝貫穿都活了志於道方要去做據於徳則道方有歸著雖有歸著猶是在事上依於仁則徳方有本領雖然藝亦不可不去理㑹如禮樂射御書數一件事理㑹不得此心便覺滯礙惟是一一去理㑹這道理脈絡方始一一流通無那個滯礙因此又却養得這个道理以此知大則道無不包小則道無不入小大精粗皆無滲漏皆是做工夫䖏故曰語大天下莫䏻載語小天下莫䏻破恪志於道據於徳依於仁游於藝先生曰志者心之所之道者當為之理為君有君之理為臣有臣之理志於道者留心於此理而不忘也徳者得也既得之則當據守而弗失仁者人之本心也依如依乎中庸之依相依而不捨之意既有所據守又當依於仁而不違如所謂君子無終食之間違仁是也游於藝一句比上三句稍輕然不可大段輕說如上蔡云有之不害為小人無之不害為君子則是太輕了古人於禮樂射御書數等事皆至理之所寓游乎此則心無所放而日用之間本末具舉而内外交相養矣或言志於道正如顔子仰高鑚堅以求至乎聖人之地否曰若如此說便是要將此心寄在道裏面底說話道只是人所當行之道自有様子如為人父止於慈為人子止於孝只從實理上行不必向𣺌茫中求也謨叔器說志於道云知得這个道理從而志之曰不特是知得時方志便未知而有志於求道也是志徳是行其道而有得於心雖是有得於心而不失然也須常常執守方不失如孝行之已得則固不至於不孝若不執守也有時解走作如忠行之已得則固不至於不忠若不執守也有時解有脫落䖏這所以下一據字然而所以據此徳又只要存得這心在存得這心在時那徳便自在了所以說依於仁工夫到這裏又不遺小物而必游於藝叔器因言禮樂射御書數自秦漢以来皆廢了曰射如今秀才自是不曉御是而今無車書古人皆理㑹得如偏旁義理皆曉這也是一事數是筭數而今人皆不理㑹六者皆實用無一可缺而今人是從頭到尾皆無用小兒子教他做詩對大来便習舉子業得官又去習啓事雜文便自稱文章之士然都無用䖏所以皆不濟事漢時雖不以射取士然諸生却自講射一年一次依儀禮上說㑹射一畨却尚好今世以文取士如義若教它依經㫖去說些道理尚得今却只是體貼字只就這兩三句題目上說去全無義理如䇿若是著實論些時務也尚得今却只是虚說說得好底剗地不得包顯道言向前義是先引傳注數條後面却斷以己意如東坡數條却尚得先生然之義剛或問志道據徳依仁游藝曰徳是行来行去行得熟已成箇物事了惟這箇物事已得於我故孝也是這物事流出来做孝忠也是這物事流出来做忠若只說為子盡孝為臣盡忠這只說得盡說徳不得盖徳是得這物事於我故事親必孝必不至於不孝事君必忠必不至於不忠若今日孝明日又不孝今日忠明日又不忠是未有得於我不可謂之徳惟徳是有得於我者故可據守之也若是未有得於我則亦無可據者又問此是成徳否曰便恁地說也不得若做這物事未成就時一箇物事是一箇物事在孝只是孝忠只是忠惟做来做去湊足成就一箇物事貫通時則千頭萬件都只是這一箇物事流出来道家所謂安養成胎盖徳是百行之胎也所以君子以成徳為行依於仁仁是箇主即心也依於仁則不失其本心既不失其本心則徳亦自然有所據若失其本心則與那徳亦不見矣游於藝盖上三句是箇主腦藝却是零碎底物事做那箇又来做這箇是游来游去之謂也然亦不可㳺從别䖏去須是㳺於藝方得又云說行時只可言志於道不可謂之徳又云成徳只是要成此徳燾問自志於道到依於仁工夫到這䖏縝宻較易些否曰似恁地都是難問此是顔子不違仁地位否先生問如何知得顔子䏻如此它人不䏻曰顔子亞聖之資固易為力若它人用工深亦須到這䖏曰這䖏先要就志於道上理㑹志於道便恁地利恁地好這須知是箇生死路頭因以手指分作兩邊去云這一邊是死路那一邊去是生路這去便善那去便惡知得此路是了只管向此路去念念不忘䖏已也在是接人也在是講論也在是思索也在是今人把捉不定要做這邊去又要做那邊去一出一入或東或西以夫子十五志於學三十而立四十而不惑五十而知天命皆是從志學做来著工夫須看得聖人志於學䖏是如何這䖏見得定後去節節有下工夫䖏據於徳徳者得也便是我自得底不是徒恁地知得便住了若徒知得不䏻得之於己似說别人底於我何干如事親䏻孝便是我得這孝事君䏻忠便是我得這忠說到徳便是成就這道方有可據䖏但據於徳固是有得於心是甚次第然亦恐怕有走作時節其所存主䖏須是依於仁自得於心不可得而離矣到㳺藝猶言學文雖事未甚要緊然亦少不得須知那个先那个後始得亦所以助其存主也㝢問若是志於道據於徳則雖初學便可如此下功且如據於徳則得寸守寸得尺守尺若是依於仁則仁是指全體而言如何便解依得它曰所謂據於徳亦須是真箇有是徳方可據守如事親時自無不孝方是有孝之徳其餘亦然亦非初學遽可及也依仁只是此心常在不令少有走作也因言周禮先說知仁聖義中和孝友睦婣任䘏此是教萬民底事又說教國子以三徳曰至徳以為道本敏徳以為行本孝徳以知逆惡至徳謂徳之全體天下道理皆由此出如所謂存心養性之事是也故以此教上等人若次一等人則教以敏徳為行本敏是强敏之謂以敏徳教之使之見善必遷有過必改為學則强力任事則果決亦是一等特立獨行之人若又次一等則教以孝徳以知逆惡使它就孝上做將去熟於孝則知逆惡之不可為夫是三者必相兼若䏻至徳則自兼那兩事若自下做去亦可以到至徳䖏若只理㑹箇至徳而無下二者則空疎去又曰自志於道至依於仁是從粗入精自依於仁至游於藝是自本兼末䏻依於仁則其㳺於藝也盖無一物之非仁矣因舉横渠語云天體物而不遺猶仁體事無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾㳺衍無一物之不體也此是横渠赤心片片說與人如荀揚何甞有這様說話廣志於道志之一字不徒是知己是心中放它不下據於徳是行道而得之於己然此都且就事上說至依於仁則無物欲之累而純乎天理道至此亦活徳至此亦活却亦須㳺於藝問小學禮樂射御書數之文是藝否曰此雖小學至依於仁既熟後所謂小學者至此方得他用䕫孫據於徳徳謂得之於心有這箇物事了不待臨時旋討得来且如仁義禮智有在這裏不待臨時旋討得来又曰徳是自家有所得䖏在這裏且如事親孝則孝之理得事兄悌則弟之理得所謂在這裏但得有淺深又曰志於道據於徳說得尚粗到依於仁方是工夫細宻游於藝者乃是做到這裏又當養之以小物植據於徳有時也㑹失了必依於仁此心常存則照管得到䏻守是徳矣游於藝似若無緊切底事然䏻如此則是工夫大故做得到了所謂庸言之信庸行之謹也䕫孫讀書須將聖賢言語就自家身上做工夫方見字字是實用如志道據徳依仁㳺藝將来安排放身上看看道是甚麽物事自家如何志之以至據徳依仁㳺藝亦莫不然方始有得道夫子升問上三句皆有次序至於藝乃日用常行莫不可後否曰藝是小學工夫若說先後則藝為先而三者為後若說本末則三者為本而藝為末固不可徇末而忘本習藝之功固在先㳺者從容潜玩之意又當在後文中子說聖人志道據徳依仁而後藝可游也此說得自好木之或問游者玩物適情之謂玩物適情安得為善曰㳺於藝一句是三字公却只說得一字人傑集注自行束脩章古人空手硬不相見束脩是至不直錢底羔雁是較直錢底真宗時講筵說至此云聖人教人也要錢義剛不憤不啓章問憤悱曰此雖聖人教人之語然亦學者用力䖏敬仲學者至憤悱時其心已畧畧通流但心已喻而未甚信口欲言而未䏻達故聖人於此啓發之舉一隅其餘三隅須是學者自去理㑹舉一隅而不䏻以三隅反是不䏻自用其力者孔子所以不再舉也謨憤悱是去理㑹底若不待憤悱而啓發之不以三隅反而復之則彼不惟不理㑹得且聽得亦未將做事燾悱非是全不曉底也曉得三五分只是說不出問伊川謂必待誠至而後告之曰憤悱便是誠意到不憤悱便是誠不到節凡物有四隅舉一隅則其三隅之理可推若不䏻以三隅反則於這一隅亦恐未必理㑹得在舉一隅以三隅反只是告徃知来否曰只是凡方者一物皆有四隅植或問程子曰待憤悱而後發則沛然矣如何是沛然底意思曰此正所謂時雨之化譬如種植之物人力隨分已加但正當那時節欲發生未發生之際却欠了些子雨忽然得這些子雨来生意豈可禦也子食於有喪者之側章子食於有喪者之側未甞飽子於是日哭則不歌此是聖人天理燾問食於有喪之側而未甞飽亦以其哀傷之極足以感動人心自不䏻飽也曰哀是哀死者不干生人事所謂哭死而哀非為生者也若喪家極哀又䏻使人愈哀耳又有喪家人全不以死者為念視之若無反使人為之悲哀者同元徳記燾子食於有喪之側未甞飽也有食不下咽之意謨子於是日哭則不歌不要把一箇誠字包却須要識得聖人自然重厚不輕浮意思時舉問博文亦可以學道而上蔡解哭則不歌謂䏻識聖人之情性然後可以學道曰聖人情性便是理又曰博文約禮亦是要識得聖人情性思曰睿只是思㑹睿節集義子於是日哭則不歌上蔡說得亦有病聖人之心如春夏秋冬不遽寒燠故哭之日自是不䏻遽忘又曰聖人終不成哭了便驟去歌得如四時也須漸漸過去道夫錄云其變也有漸且如古者喪服自始死至終喪中間節次漸漸變輕不似如今人直到服滿一頓除脱了便着華采衣服賀孫道夫同問謝氏之說曰謝氏之學大抵習忘如以三月不知肉味反是病和韶樂都忘之方是必大子謂顔淵曰章讀用之則行舎之則藏章曰専在則字上如可以仕則仕可以久則久之類是也時舉此八字極要人玩味若他人用之則無可行舎之則無可藏唯孔子與顔淵先有此事業在已分内若用之則見成將出来行舎之則藏了它人豈有是哉故下文云唯我與爾有是夫有是二字當如此看謨問尹氏曰命不足道也曰如常人用之則行乃所願舎之則藏非所欲舎之則藏是自家命恁地不得已不奈何聖人無不得已底意思聖人用我便行舎我便藏無不奈何底意思何消更言命又曰命不足道也命不消得更說又曰知命不足道也節問命不足道也曰到無可奈何䖏始言命如云道之將行也與命也道之將廢也與命也此為子服景伯說時舉錄云聖人說命只是為中人以下說聖人欲曉子服景伯故以命言如曰有命是為彌子瑕說聖人用之則行舎之則藏未甞到那無可奈何䖏何須說命如一等人不知有命又一等人知有命猶自去計較中人以上便安於命到得聖人便不消得言命䕫孫問用舎行藏章曰聖人於用舎甚輕沒些子緊要做用則行舎則藏如晴乾則着鞋雨下則赤脚尹氏云命不足道盖不消言命也植義剛曰用舎係乎道之盛衰行藏以道而舒卷已之窮達非所計故曰命不足道曰用舎是由在别人不由得我行藏是由在那人用舎亦不由得我仲黙問這命只是君子不謂命也之命否曰是義剛用舎無預於己行藏安於所遇命不足道也盖只看義理如何都不問那命了雖使前面做得去若義云不得也只不做所謂殺一不辜行一不義而得天下有所不為若中人之情則見前面做不得了方休方委之於命若使前面做得它定不肯已所謂不得已而安之命者也此固賢於世之貪冒無恥者然實未䏻無求之之心也聖人更不問命只看義如何貧富貴賤惟義所在謂安於所遇也如顔子之安於陋巷它那曾計較命如何陶淵眀說盡萬千言語說不要富貴䏻忘貧賤其寔是大不䏻忘它只是硬將這箇抵拒將去然使它做那世人之所為它定不肯做此其所以賢於人也或云看来淵眀終只是晉宋間人物曰不然晉宋間人物雖曰尚清高然箇箇要官職這邊一面清談那邊一面招權納貨淵眀却真箇是䏻不要此其所以高於晉宋人也或引伊川言晉宋清談因東漢節義一激而至此者曰公且說節義如何䏻激而為清談或云節義之禍在下者不知其所以然思欲反之所以一激而其變至此曰反之固是一說然亦是東漢崇尚節義之時便自有這箇意思了盖當時節義底人便有傲睨一世汚濁朝廷之意這意思便自有高視天下之心少間便流入於清談去如皇甫規見鴈門太守曰卿在鴈門食鴈肉作何味那時便自有這意思了少間那節義清苦底意思無人學得只學得那虚驕之氣其弊必至於此僴問用舎行藏曰此有數節最好仔細看未說到用舎行藏處且先看箇毋意毋必底意此是甚底心渾然是箇天理尹氏謂命不足道此本未有此意亦不可不知也盖知命者不得已之辭人要做這事及至做不得則曰命是心裏猶不服他若聖賢用之則行舎之則藏更不消得說命到說臨事而懼好謀而成八字雖用舎行藏地位逺了然就此地頭看也自好某甞謂聖人之言好如荷葉上水珠顆顆圓這臨事而懼便是戒謹恐懼底心若有所恐懼心驚胆畏便不得了孟子說禹惡㫖酒而好善言湯立賢無方文王望道而未之見武王不泄邇不忘逺周公思兼三王許多事皆是聖人事然有小大不同如惡㫖酒乃是事之小者思兼三王乃是事之大者然亦都是一箇戒謹恐懼底心人心多縱弛便都放去若是聖人行三軍這便是不易之法非特行軍如此事事皆然莊子庖丁解牛神妙然毎到族心必怵然為之一動然後解去心動便是懼䖏豈是似醉人恣意胡亂做去韓文鬬雞聨句云一噴一醒然再接再礪乃謂都困了一以水噴之則便醒一噴一醒所謂懼也此是孟郊語也說得好又問觀此䖏則夫子與顔子一般了曰到此地位大節也同了如孟子說伯夷伊尹與夫子是則同䖏看伯夷伊尹與夫子豈是一様人但是此大節䖏同若此䖏不同則不足為聖人矣䕫孫義剛錄别出叔器說用之則行章曰命是有箇必得底意及不得則委之於命聖人只是用之則行舎之則藏如孟子所說求之有道得之有命此却是為中才發聖人自是不論到這裏然此只是尹氏添此一脚夲文非有此意臨事而懼好謀而成比用之則行舎之則藏固是大相逺但這裏面道理也自完具無欠無剩某甞說聖人言語如荷葉上水珠子一顆一顆圓叔器問顔子與聖人同否曰大節目也同如孟子說伯夷伊尹孔子得百里之地而君之皆䏻以朝諸侯有天下行一不義殺一不辜而得天下皆不為也是則同這便是大節目䖏皆同若是這个不同時便不喚做聖人了只是纎細縝宻論来却有不同䖏又曰這一章有四五節道理義剛子路說子行三軍則誰與雖無私意然猶有固必之心人傑子行三軍則誰與宜作相與之與非許與之之與好謀而成人固有好謀者然疑貳不決往往無成者多矣孔子行三軍其所與共事者必臨事而懼好謀而成者也謨亞夫問子行三軍則誰與曰三軍要勇行三軍者要謀既好謀然須要成事盖人固有好謀而事不成者却亦不濟事時舉因云謀在先成在後成非勇亦不䏻決曰然時舉好謀而成既謀了須是果決去做教成若徒謀而不成何益於事所謂作舎道旁三年不成者也臨事而懼是臨那事時又須審一審盖閒時已自思量都是了都曉得了到臨事時又更審一審這懼字正如安而後䏻慮底慮字相似又曰而今只是據本子看說行三軍是如此試把數千人與公去行看好皇恐僴問用之則行舎之則藏竊意漆雕曾閔亦䏻之曰舎之則藏易用之則行難若開用之未必䏻行也聖人規模大藏時不止藏他一身煞藏了事譬如大舡有許多器具寳貝撑去則許多物便都住了衆人便沒許大力量然聖人行藏自是脱然無所係累救世之心雖切然得做便做做不得便休他人使有此若未用時則切切扵求行舎之則未必便藏耿直之向有書云三代禮樂制度盡在聖人所以用之則有可行某謂此固其可行之具但本領更全在無所係累䖏有許大本領則制度㸃化出来都成好物故在聖人則為事業衆人沒那本領雖盡得他禮樂制度亦只如小屋收藏器具窒塞都滿運轉都不得砥問楊氏曰樂則行之憂則違之孔顔之所同天下文眀則孔子而已矣其義如何曰龜山解經常有箇纒底病如解苖而不秀章云必有事焉而勿正勿忘勿助長則苖斯秀秀斯實矣初亦不曉其說徐觀之乃是因苗字牽引上揠苗又纒上勿忘勿助耳此章取易来如此比並固亦可通然於本㫖無所發眀却外去生此議論必大集義富而可求章讀富而可求章曰須要仔細看富而可求也一句上面自是虚意言而可求便是富本不可求矣因舉君子贏得做君子小人枉了做小人之說又云此章最見得聖人言語渾成底氣象須要識得時舉子在齊聞韶章史記子在齊聞韶音學之三月不知肉味三月當作一㸃盖是學韶樂三月耳非三月之久不知肉味也去偽夫子之心與韶樂相契所以不知肉味又有習之三月之說泳子聞韶音學之三月不知肉味學之一節不知如何今正好看其忘肉味䖏這裏便見得聖人之樂如是之美聖人之心如是之誠又曰聖人聞韶須是去學不解得只恁休了學之亦須數月方熟三月大約只是言其久不是真箇足頭九十日至九十一日便知肉味想見韶樂之美是䏻感動人是䏻使人視端而行直某甞謂今世人有目不得見先王之禮有耳不得聞先王之樂此大不幸也道夫問孔子聞韶學之三月不知肉味若常人如此則是心不在焉而聖人如此何也曰此其所以為聖人也公自思量看久之又曰衆人如此則是溺於物欲之私聖人則是誠一之至心與理合不自知其如此又問聖人存心如此之切所以至於忘味曰也不是存心之切恁地又說壊了聖人它亦何甞切切然存心要去理㑹這事只是心自與那道理契合只覺得那個好自然如此耳僴呉伯英問孔子聞韶學之三月不知肉味聖人殆亦固滯不化當食之時又不免心不在焉之病若何曰主一無適是學者之功聖人行事不可以此求之也更是舜之樂盡善盡美而孔子聞之深有所契於心者所謂得志行乎中國若合符節是以學之三月而不自知其忘味也建壯祖别錄見下呉伯英問心不在焉則食而不知其味是心不得其正也然夫子聞韶何故三月不知肉味曰也有時如此所思之事大而飲食不足以奪其志也且如發憤忘食吾甞終日不食皆非常事以其所憤所思之大自不䏻忘也壮祖先生甞讀他傳云孔子居齊聞韶音見齊國之人亦皆視端而形聳盖正音所感如此升卿石丈問齊何以有韶曰人說公子完帶来亦有甚據淳問伊川以三月不知肉味為聖人滯於物今添學之二字則此意便無妨否曰是石丈引三月之證曰不要理㑹三月字須看韶是甚麽音調便使得人如此孔子是如何聞之便恁地須就舜之徳孔子之心䖏看淳集義問伊川疑三月即是音字如何曰此䖏最要看他不知肉味䖏最有意思盖夫子知韶之美一聞之則感之至深學之三月故至於不知肉味若道一聞之便三月不知肉味恐無此道理伊川疑得自是但史記上有學之二字伊川恐適不曾考到此耳觀此䖏須見得夫子之心與舜之心分眀為一感之至深故盡心以學之念念在此而自不䏻忘也時舉子在齊聞韶學之三月不知肉味上蔡只要說得泊然䖏便有些荘老某謂正好看聖人忘肉味䖏始見聖人之心如是之誠韶樂如是之美又舉史記載孔子至齊促從者行曰韶樂作從者曰何以知之曰吾見童子視端而行直雖是說得異亦容有此理賀孫冉有曰夫子為衞君乎章論子貢問衞君事曰若使子貢當時徑問輙事不唯夫子或不答便做答時亦不䏻如此詳盡若只問伯夷叔齊何人也曰古之賢人也亦未見分曉所謂賢人如君子而不仁者有矣亦如何便見得出䖏一時皆當豈無怨悔處只再問怨乎便見得子貢善問才說道求仁而得仁又何怨便見得夷齊兄弟所䖏無非天理蒯輙父子所向無非人欲二者相去奚啻珷玞美玉直截天淵矣㽦問子貢欲知為衞君何故問夷齊曰一箇是父子爭國一箇是兄弟讓國此是則彼非可知問何故又問怨乎曰此又審一審所以夫子言求仁得仁是就心上本原䖏說凡讓出於不得已便有怨夷齊之讓是合當恁地乃天理之當然又何怨大綱衞君底固為不是到此越見得衛君沒道理又問子欲正名是公子郢否曰此又是第二節事第一節須先正輙父子之名問輙尚在則如何正曰上有天子下有方伯它不當立如何不正㝢夫子為衞君乎若只言以子拒父自不須疑而問今冉子疑夫子為衞君者以常法言之則衞公輒亦於義當立者也以輙當立故疑夫子必助之求仁而得仁者只是不傷其本心而已若伯夷叔齊不讓而於心終不安人之心本仁才傷著夲心則便是不仁矣謨問子貢有怨乎之問何也曰夫子謂夷齊是賢人恐賢者亦有過之者於是問以決之看這事是義理合如此否如其不必讓而讓之則未必無怨悔之心矣夫子告以求仁而得仁者謂是合恁地若不恁地是去仁而失仁矣若衞君事則大不然矣子貢所以知其必不為也䕫孫夫子說古之賢人也賢人固有做得間不恰好䖏便未知得夷齊之讓是與不是若是不必遜則終未免有怨悔若有怨悔則讓便未得為是如此則未見得夫子不為輙所以更問怨乎夫子說求仁而得仁又何怨恁地便是要讓讓方是合這道理既是以讓為合理則始知夫子之不為輙義剛只伯夷叔齊古之賢人也一句便可知得夫子不為衛君矣何故更要問怨乎這一句却煞有說話子貢也是㑹問義剛安卿以書問夷齊辨論甚悉曰大槩是如此但更於求仁而得仁上看道夫問安字莫便是此意否曰然但見他說得来不大段緊切故教他更於此上看曰伯夷不敢安嫡長之分以違君父之命叔齊不敢從父兄之命以亂嫡庶之義這便是求仁伯夷安於逃叔齊安於讓而其心舉無隉杌之慮這便是得仁否曰然衛君便是不䏻求仁耳道夫孔子論伯夷謂求仁而得仁又何怨司馬遷作伯夷傳但見得伯夷滿身是怨蘇子由伯夷論却好只依孔子說文蔚問子貢衛君之問與去兵去食之問皆非尋常問者所及程子固甞稱之而又曰孔門學者獨顔子為善問何也曰顔子之問又須親切如此事在顔子又自理㑹得亦不必問也必大問夫子為衛君章程子所引諫伐事或問論非此章答問夲意當矣今集注全載其說不删此語何也曰諌伐而餓固非此章本意然亦是伯夷不怨底事故程子同引来說必大集注子貢之問意只主讓國諫伐之事却在裏面事如聖人却是泛說燾呉伯英問夷齊讓國而去一以父命為尊一以天倫為重要各得其本心之正而盡乎天理之公矣所謂孤竹君當時或無中子之可立則二子將奈何曰縱二子不立則其宗社之有賢子弟立之可也壮祖或問伯夷叔齊之讓使無中子則二子不成委先君之國而棄之必有當立者曰伊川說叔齊當立看来立叔齊雖以父命然終非正理恐只當立伯夷或曰伯夷終不肯立奈何曰若國有賢大臣則必請於天子而立之不問伯夷情願矣看来二子立得都不安但以正理論之則伯夷分數稍優耳胡文定春秋解這一段也好說呉季札讓國事聖人不取之牽引四五事為證所以經只書呉子使札来聘此何異於楚子使椒来聘之事耶但稱名則聖人貶之深矣云云但近世說春秋皆太巧不知果然否也僴因說記錄之難如劉質夫記眀道說輙據位而拒父則衞之臣子去之可也輙去之而從父則衞之臣子拒蒯聵可也是以蒯聵為得罪於父亦不當立也後胡文定公引在春秋中說如上句說却是但下句却云輙去而從父則衞之臣子當輔輙以拒蒯聵則是錯了後来胡致堂却說立郢為是乃是救文定前說之錯至若楊文靖說此段尤不可曉文靖之意只欲破王元澤說善兄弟之遜必惡父子之爭遂有此病要之元澤此二句自好也燾集義胡家說夷齊所為全性命之理若他人謂其全性命之理猶可若謂夷齊要全性命之理而後如此為之此大害義理殺身成仁亦只是義當殺身即是成仁若為成仁而殺身便只是利心楊飯疏食章義剛說樂在其中一章先生曰這有三十来箇字但看那箇字是先只樂字是先他是先理㑹得那樂後方見得不義而富且貴於我如浮雲吕與叔數句說得好非是有所見如何道得到義剛問樂亦在其中聖人何為如是之樂曰正要理㑹聖人之心如何得恁地聖人之心更無些子渣滓故我之心淘来淘去也要如聖人之心恪樂亦在其中此樂與貧富自不相干是别有樂䖏如氣壮底人遇熱亦不怕遇寒亦不怕若氣虚則必為所動矣閎祖叔器說樂在其中引博文約禮曰顔子自是顔子樂與夫子也不干事這說得不相似義剛問或問謂夫子樂在其中與顔子之不改者又有間矣豈非謂顔子非樂於簞瓢特不以是而改其心之所樂至於夫子則隨所寓而樂存焉一曰不改一曰亦在文意固自不同否然程子則曰非樂疏食飲水也雖疏食飲水不䏻改其樂也却似無甚異於所以論顔子者今集注乃載其說何耶曰孔顔之樂亦不必分不改是從這頭說入来在其中是從那頭說出来必大集注餘見顔樂章問上蔡云義而得富得貴猶如浮雲况不義乎曰這是上蔡說得過當此只說不義之富貴視之如浮雲不以彼之輕易吾之重若義而得富貴便是當得如何掉脫得如舜禹有天下固說道不與亦只恁地安䖏之又如所以長守貴也所以長守富也義當得之亦自當恁地保守堯命舜云天之厯數在爾躬允執其中四海困窮天禄永終豈是不要保守賀孫集義加我數年章問五十學易一段曰聖人學易於天地萬物之理吉凶悔吝進退存亡皆見得盡自然無差失聖人說此數句非是謾然且恁地說聖人必是見得是如此方如此說謙之文振問五十以學易曰也只就卦爻上占考其理合何如他書一事是一理易却說得闊也有底事說在裏未有底事也說在裏又曰易須錯綜看天下甚麽事無一不出於此如善惡是非得失以至於屈伸消長盛衰看是甚事都出於此伏羲以前不知如何占考至伏羲將隂陽兩箇畫卦以示人使人於此占考吉凶禍福一畫為陽二畫為隂一畫為竒二畫為耦遂為八卦又錯綜為六十四卦凡三百八十四爻文王又為之彖象以釋其義無非隂陽消長盛衰伸屈之理聖人之所以學者學此而已把乾卦一卦看如乾元亨利貞人要做事若占得乾卦乾是純陽元者大也亨者通也其為事必大通然而雖說大亨若所為之事不合正道則亦不得其亨故雖云大亨而又利於正卦内六爻都是如此如說潜龍勿用是自家未當出作之時須是韜晦方始無咎若於此而不䏻潜晦必須有咎又如上九云亢龍有悔若占得此爻必須以亢滿為戒如這般䖏最是易之大義易之為書大抵於盛滿時致戒盖陽氣正長必有消退之漸自是理勢如此又云當極盛之時便須慮其亢如當堯之時須交付於舜若不尋得箇舜便交付與他則堯之後天下事未可知又云康節所以見得透看他說多以盛滿為戒如云飲酒愛微醺不成使酩酊又云康節多於消長之交看又云許多道理本無不可知之數惟是康節體得熟只管體来體去到得熟後看是甚麽事理無不洞見賀孫因學者問學易無大過章曰易只有隂陽兩字分竒耦一畫是陽両畫是隂從此錯綜推為六十四卦三百八十四爻後来文王却就畫繋之以辭看来易元初只是畫又曰天地只是一箇隂一箇陽把来錯綜大抵陽則多吉隂則多凶吉為善凶為惡又看所䖏之位逐爻看之陽有時而凶隂有時而吉又曰如他經先因其事方有其文如書言堯舜禹成湯伊尹武王周公之事因有許多事業方說到那裏若無那事亦不說到那裏易則是箇空底物事未有是事預先說是理故包括得盡許多道理看人做甚事皆撞著他又曰易無思也無為也易是箇無情底物事故寂然不動占之者吉凶善惡隨事著見乃感而遂通又云易中多言貞如利貞貞吉利永貞之類皆是要人守正又云易如占得一爻須是反觀諸身果盡得那道理否如坤六二直方大不習無不利須看自家䏻直䏻方䏻大方䏻不習無不利凡皆類此又曰所謂大過如當潜而不潜當見而不見當飛而不飛皆是過又曰乾之一卦純乎陽固是好如元亨利貞盖大亨之中又須知利在正非正則過矣又曰如坤之初六須知履霜有堅冰之漸要人恐懼脩省不知恐懼脩省便是過易大槩欲人恐懼脩省又曰文王繋辭本只是與人占底書至孔子作十翼方說君子居則觀其象而玩其辭動則觀其變而玩其占又曰夫子讀易與常人不同是他胸中洞見隂陽剛柔吉凶消長進退存亡之理其賛易即就胸中寫出這箇理植問學易無大過聖人何以有過曰只是聖人不自足之意聖人此般話也如道者三我無䏻聖仁吾豈敢不是聖人䏻如此更誰䏻如此程子謂學易者無大過文勢不然此章五十字誤然章之大㫖在無大過不在五十上淳問五十以學易章先生舉史記云是時孔子年老已及七十欲賛易故發此語若作五十以學易全無意思問孔子少年不學易到老方學易乎曰作彖象文言以為十翼不是方讀易也問伊川以八索為過䖏如何曰某不敢如此說㝢問伊川前一說則大過在八索之類後一說則大過在弟子之學易者俱未有定據曰史記加作假古本五十作卒字加假聲相近五十與卒字相似而併誤也此孔子繋易之時自謂假我數年卒以學易可以無大過者為此自謙之辭以教學者深以見易之道無窮也謨子所雅言章問子所雅言詩書執禮曰古之為儒者只是習詩書禮樂言執禮則樂在其中如易則掌於太卜春秋掌於史官學者兼通之不是正業只這詩書大而天道之精微細而人事之曲折無不在其中禮則節文法度聖人教人亦只是許多事僴子所雅言詩書執禮未嘗及易夫子常所教人只是如此今人便先為一種𤣥妙之說徳眀伊川云夫子雅素之言止於如此若性與天道不可得而聞者則在黙而識之不知性與天道便於詩書執禮中求之乎曰語意不如此觀子貢說夫子之言性與天道自是有說時節但亦罕言之恭父云觀子貢此䖏固足以見子貢方聞性天道之妙又如說天何言哉四時行焉百物生焉天何言哉這是大段警悟他䖏曰這般䖏是大段分曉又云若寔䏻黙而識之則於詩書執禮上自見得性與天道若不寔䏻黙識得雖聖人便說出也曉不得賀孫問執禮執字恐當時自以執字目其禮非夫子方為是言曰詩書只是口說得底惟禮要當執守故孔子常說教人執禮故云詩書執禮皆雅言也不是當時自有此名賀孫集注葉公問孔子於子路章發憤忘食樂以忘憂不知老之將至云爾聖人不是有所因為甚事了如此只是意思有所憤發便至於忘食樂便至於忘憂至於不知老之將至聖人不肯半上落下直是做到底雖是聖人若自貶下之辭其寔超詣却非聖人做不得憤是感之極深樂是樂之極至聖人不是胡亂說是他真箇有發憤忘食樂以忘憂䖏次日再問曰如今不必說是為甚發憤或是有所感只理㑹他忘食忘憂發憤便至於忘食樂便至於忘憂便與聞韶不知肉味之意相似㽦發憤忘食樂以忘憂不知老之將至云爾泛說若是謙辭然聖人之為人自有不可及䖏直要做到底不做箇半間不界底人非是有所因真箇或有所感發憤而至於忘食所樂之至而忘憂盖有不知其然而不自知其老之將至也又如好古敏以求之自是謙詞學不厭教不倦亦是謙詞當時如公西華子貢自䏻窺測聖人不可及䖏盖聖人䖏已之謙若平易而其所以不可及者亦在其中矣觀聖人若甚慢只是你赶他不上人傑㽦錄云子貢公西華亦自看得破問發憤忘食樂以忘憂曰聖人全體極至沒那半間不界底事發憤便忘食樂便忘憂直恁地極至大槩聖人做事如所謂一棒一條痕一摑一掌血直是恁地燾問發憤忘食未知聖人發憤是如何曰要知他發憤也不得只是聖人做事超越衆人便做到極䖏發憤便忘食樂便忘憂若他人發憤未必䏻忘食樂䖏未必䏻忘憂聖人直是脫灑私欲自是惹不著這兩句雖無甚利害細看来見得聖人超出乎萬物之表㝢因說發憤忘食樂以忘憂曰觀天地之運晝夜寒暑無須臾停聖人為學亦是從生至死只是如此無止法也僴為學要剛毅果決悠悠不濟事且如發憤忘食樂以忘憂是甚麽様精神甚麽様骨肋因說胡季随學䝉其為人也發憤忘食樂以忘憂不知老之將至云爾與不怨天不尤人下學而上達知我者其天乎二章固不出乎畧無人欲渾然天理之意要各隨其頭面着他意思如何譬之皆金也做盞時是一様做釵時是一様須是隨其意思見得分眀方好不然亦只鶻突而已發憤忘食是發憤便䏻忘食樂以忘憂是樂便䏻忘憂更無些小係累無所不用其極從這頭便㸃到那頭但見義理之無窮不知身世之可憂嵗月之有變也衆人縱如何發憤也有些無緊要心在雖如何樂終有些係累乎其中不怨天不尤人樂天安土安於所遇無一毫之私意下學上達是天人事理洞然透徹無一毫之間隔聖人所謂上達只是一舉便都在此非待下學後旋上達也聖人便是天人則不䏻如天惟天無人許多病敗故獨䏻知之天非真有知識䏻知但聖人有此理天亦有此理故其妙䖏獨與之契合釋氏亦云惟佛與佛乃䏻知之正此意也伯羽對葉公之問見其事皆造極脫然無所係累但見義理無窮不知嵗月之有改莫我知之歎見其樂天安土無入而不自得天人事理洞然無毫髪之間苟有一毫之私則無以窺此境之妙故曰知我者其天乎道夫學者做得事不是須自悔悔了便不要做始得若悔了第二畨又做是自不䏻立志又干别人甚事因問集注有未得則發憤忘食之說曰聖人未必有未得之事且如此說若聖人便有這般事是他便發憤做將去學者當悔時須是學聖人始得豈可自道我不似聖人便休却眀作集注叔器問發憤忘食樂以忘憂何以便見全體至極有非聖人不䏻及者曰這様䖏也難說可以意曉但是見得聖人事事透徹事事做到那極致䖏叔器問看聖賢說話也須先識聖人是甚麽様人賢人是甚麽様人方見得他說得淺深曰夫子說聖人君子善人有恒等級甚分眀要見等級只是孟子六謂之說如可欲之謂善便是那善人如充實之謂美等便皆是那賢人事如大而化之以上方是聖人事義剛問横渠仲尼憤一發而至於聖之說曰聖人緊要䖏自生知了其積學者却只是零碎事如制度文為之類其本領不在是若張子之說是聖人全靠學也大抵如所謂我非生而知之好古敏以求之皆是移向下一等說以教人亦是聖人看得地歩廣闊自視猶有未十全滿足䖏所以其言如此非全無事實而但為此詞也必大集義發憤忘食章東坡云實言則不讓貶言則非實故常略言之而天下之美莫䏻加焉此說非不好但如此則是聖人已先計較方為此說似非聖人之意聖人言語雖是平易高深之理即便在這裏學者就中庸䖏看便見得高明䖏䕫孫我非生而知之者章問我非生而知之者好古敏以求之者聖人之敏求固止於禮樂名數然其義理之精熟亦敏求之乎曰不然聖人於義理合下便恁地固天縱之將聖又多䏻也敏求則多䏻之事耳其義理完具禮樂等事便不學也自有一副當但力可及故亦學之若孟子於此等也有學得底也有不曾學得底然亦自有一副當但不似聖人學来尤宻耳仲思問何以言之曰如班爵禄井田䘮禮之類只是說得大槩然亦是去古逺無可考䖏但他大綱正制度雖有不備䖏亦不妨伯羽好古敏以求之聖人是生知而學者然其所謂學豈若常人之學也聞一知十不足以盡之義剛子不語怪力亂神章問子不語怪力亂神集注言鬼神之理難眀易惑而寔不外乎人事鬼神之理在人事中如何見得曰鬼神只是二氣之屈伸往来就人事中言之如福善禍淫便可以見鬼神道理論語中聖人不曾說此㝢問如動靜語黙亦是此理否曰固是聖人全不曾說這話與人這䖏無形無影亦自難說所謂敬鬼神而逺之只恁地說集注舊文㝢三人行章聖人之學異夫常人之學才略舉其端這裏便無不昭徹然畢竟是學人若以自脩為心則舉天下萬物凡有感乎前者無非足以發吾義理之正善者固可師不善者這裏便恐懼脩省恐落在裏面去是皆吾師也䕫孫天生徳於予章讀天生徳於予一章曰纔做聖人自反無愧說時便小了聖人須知道天生徳於聖人桓魋如何害得故必其不䏻違天害己也時舉恭父問必不䏻違天害己不知當時聖人見其事勢不可害己還以理度其不䏻害耶曰若以勢論則害聖人甚易唯聖人自知其理有終不䏻害者賀孫問天生徳於予桓魋其如子何孔子既如此說了却又微服而過宋者乃是天理人事之交盡否曰然所謂知命者不立乎巖牆之下若知命者便立乎巖牆之下也何害却又不立而今所謂知命者只是捨命燾魏問謝氏云聖人不敢必其不我害也使其䏻為我害亦天也是如何曰這說是聖人必其不䏻害己如匡人其如予何皆是斷然害聖人不得聖人說出自恁地直截如說道之將行也與命也道之將廢也與命也公伯寮其如命何這是未定之辭如孟子說吾之不遇魯侯天也臧氏之子焉䏻使予不遇哉遇不遇看天如何亦是未定之辭賀孫二三子以我為隠乎章子善說吾無隠乎爾此在弟子自見得如何如顔子只見得所立卓爾冉子自見得力不足中道而廢聖人以學者不䏻自去用力故以此警之曰要緊意思都在吾無行而不與二三子䖏須去仔細認聖人無不與二三子䖏在那裏時舉録云須要看聖人如何是無行不與二三子䖏凡日用飲食居䖏之間認得聖人是如何自家今當如何或問鄉黨所得亦足以見聖人之動靜曰與上大夫言誾誾如也之類這亦可見但夫子所以與二三子又不止此須是實認得意思是如何賀孫夫子甞言中人以下不可以語上也而言性與天道則不可得而聞想是不曾得聞者疑其有隠而不知夫子之坐作語黙無不是這箇道理風霆流形庶物露生無非教也聖人雖教人灑掃應對這道理也在裏面義剛問伊川言聖人教人常俯就若是掠下一着教人是聖人有隠乎爾何也曰道有大小精粗大者精者固道也小者粗者亦道也觀中庸言大哉聖人之道洋洋乎發育萬物峻極於天此言道之大䖏優優大哉禮儀三百威儀三千是言道之小䖏聖人教人就其小者近者教人便是俯就然所謂大者精者亦只在此初無二致要在學者下學上達自見得耳在我則初無所隠也銖子以四教章教人之道自外約入向裏去故先文後行而忠信者又立行之方也謨子善說文行忠信恐是教人之序當先博以文使之躬行方教之忠信曰此是表裏互說在這裏不是當學文脩行時不教之存忠信在教人當從外說入又云學者初来須是先與他講說不然是行箇甚麽忠是甚物事信是甚物事到得為忠為信時自是說不得若平日講說到忠信且只是文到得盡此忠信二節全在學者自去做如講說如何是孝如何是弟這都只是文去行其所謂孝所謂弟方始是實事賀孫文行忠信如說事親是如此事兄是如此雖是行之事也只是說話在須是自家體此而行之方是行藴之於心無一毫不實䖏方是忠信可傳者只是這文若行忠信乃是在人自用力始得雖然若不理㑹得這箇道理不知是行箇甚麽忠信箇甚麽所以文為先如入孝出弟謹信汎愛親仁非謂以前不可讀書以前亦教他讀書理㑹許多道理但必盡得這箇恰好讀書又曰到這裏却好讀書讀子以四教而其初須是講學講學既眀而後脩於行所行雖善然更須反之於心無一毫不實䖏乃是忠信時舉文行忠信教不以文無由入說與事理之類便是文小學六藝皆文也子以四教且如小學子䏻食食教以右手䏻言教之男唯女俞是先教他做箇伎倆這都是文底事而後教他識義理䕫孫問文行忠信恐是博文約禮之意曰然忠信只是約禮之實燾問行是就身上說忠信是就心上說否曰是義剛問文行為先忠信為次之說如何曰世上也自有初問難曉底人便把忠信與說又教如何理㑹也須且教讀書漸漸壓伏這箇身心教定方可與說問行有餘力則以學文是如何曰讀書最不要如此比並如上說怕人卒急難理㑹須先將文開發他如詩書禮樂射御書數都是文這自是說務本意不同賀孫先生因或者講子以四教問何以有四者之序或者既對先生曰文便是窮理豈可不見之於行然既行矣又恐行之有未誠實故又教之以忠信也所以伊川言以忠信為本盖非忠信則所行不成故耳因問行有餘力則以學文何也曰彼將教子弟而使之知大槩也此則教學者深切用工也問然則彼正合小學之事與曰然壮祖或問此章是先文而後行行有餘力則以學文是先行而後文何以不同曰文行忠信是從外做向内則以學文是從内做向外聖人言此類者多要人逐䖏自識得銖因問中庸末章自衣錦說至無聲無臭是從外做向内首章自天命之性說至萬物育是從内做向外曰不特此也惟天下聪眀睿知說到溥博淵泉是從内說向外惟天下至誠經綸天下之大經至肫肫其仁聪眀聖智達天徳是從外說向内聖人發眀内外本末小大巨細無不周徧學者當随事用力也銖聖人吾不得而見之章聖人也只是這箇道理但是他理㑹得爛熟後似較聖様其實只是這道理君子是事事做得去所謂君子不器善人則又不及君子只是知得有善有惡肯為善而不肯為惡耳有恒者又不及善人只是較依本分義剛問善人是資質大故粹美其心常在於善道所以自不至於有惡有恒者則是箇確實底人否曰是有恒底也不到事事做得是只是有志於善而不肯為惡耳善人則從来恁地好事事依本分但人多等級善人雖是資質好雖是無惡然不踐迹亦不入於室縁不甚曉得道理不可以到聖人只是恁地便住了義剛善人是資質自好底人要做好事而自然無惡者也有恒則只是把捉得定又未到善人自然好䖏在善人正如上文所謂聖人有恒正如所謂君子然而善人有恒者皆未知學問者也僴問善人有恒者之别曰善人已無惡但不入道有恒者惟守恒分而已論語中此等皆汎問非切於日用之急者此等皆置之後面前面自有緊切䖏若緊切䖏通餘䖏自理㑹得賀孫竇問善人有恒一章有恒者之去聖人高下固懸絶矣然未有不自有恒而䏻至於聖人者天下事大槩既是有恒方做得成甞觀分水嶺之水其初甚微行一兩日流漸大至到建陽遂成大溪看来為學亦是有恒方可至於聖人曰最是古人斷機譬喻最切縁是斷時易接時難一斷了便不可接泳呉伯英解亡而為有章曰正謂此皆虚夸之事不可以久是以不䏻常非謂此便是無常也壮祖問亡而為有等與難乎有恒矣不相似曰盖如此則不實矣只是外面虚張做安䏻有常乎㝢亡而為有虚而為盈約而為泰此是說無恒以前事若是以亡為有以虚為盈以約為泰則不䏻常謂如我窮約却欲作富底舉止縱然時暫做得將来無時又做不得如此便是無常亡對有而言是全無虚是有但少約是就用度上說義剛問難乎有恒矣曰這不是說他無常只是這人恁地有頭無尾了是難乎有常矣是不㑹有常卓錄云此等人不可謂有常之人矣言此三病皆受於無常之前又曰如說居上不寛為禮不敬臨䘮不哀吾何以觀之哉不是不去觀他又不是不足觀只為他根源都不是了更把甚麽去觀他重在以字上又云將甚底物事去看他居上寛為禮敬臨䘮哀就裏面方可看他箇深淺過不及卓錄云如有其寛有其敬有其哀時即觀其淺深當否如何今既無之則吾復以何者而觀之言更不可觀之矣他都無這箇了更將何以觀之如考試一般若文字平平尚可就中看好惡若文理紕繆更將甚麽去考得論語如此䖏多今人都只粗淺滚說過也自說得只是聖人本意不如此只是看得熟了少間自分别得出賀孫卓錄小異盖有不知而作之者章楊問不知而作作是述作或只是凡所作事曰只是作事又問多聞擇其善者而從之多見而識之不知可以作多聞而識之多見擇其善者而從之得否曰聞見大略爭不多較所聞畢竟多聞須别識善惡而從見則見得此為是彼為非則當識之他日行去不差也㝢或問此章之義曰聞是聞前言往行見是見目今所為聞之須要擇其善者而從之必有得於已不是聞詳見略亦不是聞淺見深不須如此分聞見字盖卿問多聞多見之别曰聞是都聞得好說話了從之是又擇其尤善者而從之見只是汎汎見得雖未必便都從他然也著記他終始首尾得失燾多聞已聞得好話了故從中又揀擇多見只是平日見底事都且記放這裏燾多見而識之見又較切實多見姑且識之如沒要緊底語言文字謾與他識在不識也沒要緊要緊却在多聞擇善而從之如今人却只要多識却無擇善一著賀孫因坐客雜記而言讀多聞擇其善者而從之章云聞見亦是互相發眀此下見干禄章時舉問多聞曰聞只是聞人說底已亦未理㑹得問知有聞見之知否曰知只是一様知但有真不真爭這些子不是後来又别有一項知所知亦只是這箇事如君止於仁臣止於敬之類人都知得此只後来便是真知淳問擇善而從之是已知否曰未擇時則未辨善惡擇了則善惡别矣譬如一般物好惡来雜在此須是擇出那好底擇去那惡底擇来擇去則自見得好惡矣燾知之次也知以心言得於聞見者次之謨問多聞多見不同如何曰聞是耳聞見是目見問多聞擇其善者而從之多見如何不擇呂氏說聞愈於見從愈於識知愈於從如何曰多聞便有所當行故擇而行之多見雖切然未必當行姑識在賀孫仁逺乎哉章人之為學也是難若不從文字上做工夫又茫然不知下手䖏若是字字而求句句而論而不於身心上著切體認則又無所益且如說我欲仁斯仁至矣何故孔門許多弟子聖人竟不曾以仁許之雖以顔子之賢而尚或違於三月之後而聖人乃曰我欲斯至盍亦於日用體騐我若欲仁其心如何仁之至其意又如何又如說非禮勿視聽言動盍亦毎事省察何者為禮何者為非禮而吾又何以䏻勿視勿聽若毎日如此讀書庶幾看得道理自我心而得不為徒言也壮祖或問我欲仁斯仁至矣曰凡人讀書只去究一兩字學所以不進若要除却這箇道理又空讀書須把自身来體取做得去方是無疑若做不去須要講論且如欲仁斯仁至如何恁地易至於顔子三月不違仁又如何其餘更不及此又怎生得恁地難論語似此有三四䖏讀論語須是恁地看方得銖呉伯英講我欲仁斯仁至矣因引有䏻一日用其力於仁矣乎以證之且曰如先生固甞注曰仁夲固有欲之則至志之所至氣亦至焉先生曰固是但是解一日用力而引此言則是說進數歩今公言欲仁仁至而引前言則是放退數歩地也以此觀先生說經大率如此因正淳說我欲仁斯仁至矣曰今人非不知利禄之不可求求之必不可得及至得底皆是非用力所至然而有至終身求之而不止者如何得人皆欲仁所以後来聖賢不出盡是庸凡便是無肯欲仁者如何得箇道理使人皆好仁所以孔子謂吾未見好仁者所謂好徳如好色須是真箇好徳如好色時方可如今須是自於這裏著意思量道如何不欲仁却欲利禄如何不好徳却只好色於此猛省恐有箇道理㽦問我欲仁曰才欲便是仁在這裏胡子知言上或問放心如何求胡子說一大段某說都不消恁地如孟子以雞犬知求為喻固是但雞犬有時出去被人打殺煮喫了也求不得又其求時也須遣人去求這箇心則所係至大而不可不求求之易得而又必得盖人心只是有箇出入不出則入出乎此則入乎彼只是出去時人都不知不覺才覺得此心放便是歸在這裏了如戒慎恐懼才恁地便是心在這裏了又問程子以心使心如何曰只是一箇心被他說得来却似有兩箇子細看来只是這一箇心䕫孫陳司敗問昭公章問昭公娶同姓之事若天王舉法則如何斷曰此非昭公故為之也當時呉盛强中國無伯主以齊景公猶云既不䏻令又不受命涕出而女於呉若昭公亦是藉其勢不得已之故非貪其色而然也天子舉法則罪固不免亦須原情自有䖏置况不曰孟姬而曰呉孟子則昭公亦已自知其非矣子與人歌而善章子與人歌而善必使反之而後和之今世間人與那人說話那人正說得好自家便從中截斷如云已自理㑹得不消說之類以此類看聖人是甚氣象與人歌且教他自歌一終了方令再歌而後和之不於其初歌便和恐混雜他不盡其意此見聖人與人為善賀孫若不待其反而後和則他有善亦不得而知今必使之反之而後和之便是聖人不掩人善䖏義剛集注說子與人歌不掩人善盖他歌既善使他復歌聖人未遽和以攙雜之如今人見人說得一話好未待人了便將話来攙他底則是掩善植問伊川云歌必全章與割不正不食同意如何曰是直候歌者徹章然後再從頭和之不是半中間便和恐是此意㽦文莫吾猶人也章文莫吾猶人也莫是疑辭猶今人云莫是如此否言文則吾與人一般如云聽訟吾猶人也若躬行君子則吾未之有得此與君子之道四丘未䏻一焉之意同謨若聖與仁章夫子固多謙辭到得說抑為之不厭誨人不倦公西華便識得所以有正唯弟子不䏻學也之說便說道聖人有不讓䖏泳其他人為之誨人不䏻無厭倦時惟聖人則不厭不倦正唯弟子不䏻學也言正是弟子不䏻學䖏這若不是公西華親曾去做来親見是恁地如何解恁地說義剛為之不厭誨人不倦他也不曾說是仁聖但為之畢竟是為箇甚麽誨人畢竟是以甚麽物事誨人這便知得是為之是為仁聖之道誨之是以仁聖之道誨人義剛仁之與聖所以異者大而化之之謂聖若大而未化之只可謂之仁此其所以異眀作子疾病章讀此章曰在臣子則可在我則不可聖人也知有此理故但言我不用禱而亦不責子路之非也時舉子路請禱子曰有諸要知子路所以請禱之意是如何審一審看他意思著落再說来却轉動不得方好說與他或問有禱之理否曰子路說禱爾於上下神祗便是有此理子路若要禱但在我不用禱耳或問子路請禱䖏曰子路若不當請聖人何不直拒之乃問有諸何也立之對云聖人不直拒子路故必問之而後以為無所事禱曰不然盖夫子疑子路禱之非正故以有諸叩之及子路舉誄聖人知非淫祀乃云我無所事禱時舉子路請禱子曰有諸聖人不直截截他待子路說了然後從容和緩答他今人才到請禱䖏便截了聖人皆不如此必使反之而後和之亦然病而禱占亦有此理但子路不當請之於夫子其曰丘之禱久矣注云孔子素行合於神眀是也伊川云無過可悔無善可遷此是解素行合於神眀一句謨叔器問子路請禱注下是兩箇意思模様曰是但士䘮禮那意却只是箇小意思良久云聖人便是仔細若其他人便須呌喚罵詈聖人却問有諸待他更說却云是禱久矣這如與人歌而善必反之而後和之様却不是他心裏要恁仔細聖人自是恁地仔細不恁地失枝落節大歩跳過去說義剛問疾病而禱古人固行之矣然自典禮之亡世既莫知所當致禱之所緇黄巫覡始以其說誣民惑衆而淫祀日繁今欲一切屏絶則於君父之疾無所用力之際不一致禱在臣子之心必有歉然不足者欲姑隨世俗而勉焉為之然吾心既不以為然亦必不䏻於此自致其誠况於以所賤事君親與然則如之何而可曰今自是無所可禱如儀禮五祀今人尋常皆不曾祀又尋常動是越祭於小小神物必以為祭之無益某向為郡禱旱時如舊例醮祭之類皆甞至誠為之但才見張天師心下便不信了必大奢則不孫章或問奢則不孫曰才奢便是不孫他自是不戢斂也公且看奢底人意思儉底人意思那奢底人便有驕敖底意思須必至於過度僣上而後已然却又是一節在燾問奢非止謂僣禮犯上之事只是有夸張侈大之意便是否曰是義剛君子坦蕩蕩章君子坦蕩蕩只是意誠心廣體胖耳子温而厲章子温而厲威而不猛恭而安須看厲便自有威底意思不猛便自有温底意思大抵曰温曰威曰恭三字是主曰厲曰不猛曰安是帶說上下二句易理㑹諸公且看聖人威底氣象是如何久之云聖人徳盛自然尊嚴又云謝氏以此說夷惠過䖏頗是賀孫叔器說子温而厲章曰此雖是說聖人之徳容自然如此然學者也當如此舉偏而補弊盖自舜之命䕫已如此而臯陶陳九徳亦然不可不知義剛問子温而厲一章是縂言聖人容貌鄉黨是逐事上說否曰然此是就大體上看聖人燾問張子云十五年學箇恭而安不成曰恭而安如何學得成安便不恭恭便不安這箇使力不得是聖人養成底事顔子若是延得幾年便是聖人不是到此更用著力只是養底工夫了顔子工夫至到只是少養如煉丹火氣已足更不添火只以暖氣養教成就耳明作魏問横渠言十五年學恭而安不成眀道曰可知是學不成有多少病在莫是如伊川說若不知得只是覷却堯學他行事無堯許多聪眀睿智怎生得似他動容周旋中禮曰也是如此更有多少病在良久曰人便是被氣質局定變得些子了又更有些子變得些子了又更有些子又云聖人發憤便忘食樂便忘憂直是一刀兩段千了百當聖人固不在說但顔子得聖人說一句直是傾腸倒肚便都了更無許多㢘纎纒擾絲来線去問横渠只是硬把捉故不安否曰他只是學箇恭自騐見不曾熟不是學箇恭又學箇安賀孫朱子語類卷三十四
