body:
  text: 朱子語類卷一百三十二本朝六中興至今人物下宗澤守京城治兵禦戎以圖恢復之計無所不至上表乞回鑾數十表乞不南幸乞修二聖宫殿論不割地其所建論所謀畫是非利害昭然可觀觀其勢駸駸乎中興之基矣耿南仲沮之于南京時勢不歸京城汪黄沮之淮甸時動相掣肘使不得一有所為如令樁管器甲之類不得擅有支遣問所召募係何色額人召募得百十萬以上人令京民出助軍錢不得支錢修城池造器械數事皆汪黄張慤為之初宗守京太上即位南京時河東北京東西之民日夜自守望駕歸京王師之來全無盜賊駕一居淮甸賊起百十萬丁進李成楊進之徒兢起宗盡召之為用事垂成而薨朝廷不為諸人作主諸人四散為賊矣傷哉宗薨時年七十諡忠簡揚宗忠簡公薨其家人方入棺未歛軍兵轝出大􅆹三日祭弔來哭不絶祭物滿􅆹無數其得軍情人心如此揚王庶西人趙元鎮引作樞宻甚有威望又言他彊倔死𦵏廬山王之竒是庶之子亦作樞宻庶以私怨殺曲端端亦西人庶嘗在其軍中㡬為端所殺振王子尚初在陜西為金人所圍求救於曲端端命一愛將救之既至欲求休息數日王不許戰敗奔入城王斬之既而城䧟王奔端端詰責欲殺之有幕僚力諫止囚之一日遣入蜀遂譛端於魏公魏公殺端可學徐師川㣲時嘗逰廬山遇一宦者鄭諶與之詩曰平生不善劉蕡䇿色色門中看有人後入樞府鄭時適用事模様似有力焉徐在宻院時金人冦襄陽中書集議徐曰彼本盜賊所有時國歩末安盜有竊發據城邑者因以與之好時為官䟦扈則為盜得失不足為國家輕重時趙元鎮為參知政事曰襄陽為金人所據則川廣路斷國家危矣徐曰此是樞宻院事參政不須與趙曰小小兵事樞宻自主之可也此國家大事政府安得不與即上馬而去太上聞之罷徐樞宻徐歸鄉以前軰自居恃文使氣好罵專以飲酒為事不擇貧賤皆往啖之詩亦無甚佳者揚可學錄云徐師川在宻院荆襄有宻報五府㑹議師川曰今日朝廷視荆襄乃無用地何不棄之趙丞相為參政曰此乃上流何可棄師川曰宻院事何預參政趙曰某參知政事此乃係政事之大者安得不預遂䇿馬徑出入文字朝廷為之罷師川趙遂知院為帥未行金退師韓世忠作小官時一城被圍郡將無計世忠令募敢死士得二百人世忠云不消多只擇得精者八十人令持一斧世忠問云其間豈無能為盜者遂令往偷了鼓搥却畧將石頭去驚他門他必往報中軍便随入見有紅帳者便斫俟彼人集便出來恐有馬軍來趕便與相殺城上皆喊云馬軍進如是果退圍揚岳太尉飛本是韓魏公家佃客每見韓家子弟必拜振岳飛恃才不自晦郭子儀晚節保身甚闒冗然當𦂳要處又不然單騎見敵云云飛作副樞便直是要去做張韓知其謀便只依違然便不做亦不免其用心如此直是忠勇也揚紹興間諸將横劉光世使一將官來奏事應對之類皆善上喜之轉官頗賜予劉疑其以軍中機宻上聞欲殺之其人走投朝廷朝廷不知如何區處之劉又使人逐路殺之追者已近其人告州將藏之獄中入文字朝廷方免揚呉玠到饒風闗却走回此事惟張巨山退兵記得實徳明後世用兵只是胡厮殺那曾有節制如季通説八陣可用怕也未必可用當臨陣時只㸔當時事體排扒得着所在如吳璘敗敵於殺金平前面對陳交兵正急後面諸軍一齊擁前爛殺金人這有甚陳法且如用兵前陳交接後陳即用木車隔了不令突出當吳璘那時軍勢勇猛將來隔了一齊都斫開突前去有甚陳法㸔來兵之勝負全在勇怯又云用兵之要敵勢急則自家當委曲以纒繞之敵勢緩則自家當勁直以衝突之賀孫古之戰也兩軍相對甚有禮有饋恵焉有飲酌焉不似後世便只是爛殺將去劉錡順昌之捷亦只是投之死地而後生當時金騎大擁而至凡十餘萬諸將㑹議以為固知力不能當然急渡江則朝廷兵守已自戒嚴必不可渡兼携持老幼金騎已廹必為所追其勢終歸於死若兩下皆死不若固守庶㡬可生遂開城門而守金人大至劉錡先遣人約他某日戰金人謂其敢與我約戰大怒至日敵騎壓於城外時正暑月劉錡分部下兵五千為五隊先備暑藥飯食酒肉存在先以一副兠牟與甲置之日下曬時令人以手摸㸔熱得㡬何如此數次其兠牟與甲尚可容手則未發直待熱如火不可容手乃喚一隊軍至令喫酒飯少定與暑藥遂各授兵出西門戰少頃又喚一隊上授之出南門如此數隊分諸門迭出迭入敵遂大敗縁金人衆多其立無縫僅能操戈更轉動不得而我兵執斧直入人叢掀其馬甲以斷其足一騎纔倒即壓數騎殺死甚衆况當敵衆正熱甲盾如火流汗喘息煩悶而吾軍迭出飽鋭清涼而傷困者即扶歸闕調䕶遂以至寡敵至衆金人大敗方有怯中國之意遂從和議前此皆未肯真箇要和此是庚申年六月可惜此機不遂進賀孫張棟字彦輔謂劉信叔親與他言順昌之戰時金人十上萬人圍了城城中兵甚不多劉使人下書約戰日金人笑是日早敵騎迫城下而陣連山鉄陣甚宻不動劉先以鉄甲一聫曬庭中一邉以肉飯犒師時使人摸鉄甲未大熱又且候候甲熱闕開城門以所犒一隊持斧出令只掀起敵騎斫斷馬脚人馬都全裝一騎倒又粘倒數騎金人全無下手處此隊歸以五苓大順散與服之令歇又以所犒第二隊出如前殺甚多敵覺得勢敗遂遁走後人問曬甲之事如何曰甲熱則敵乆在日中皆熱悶矣此則在涼處歇方出時當暑月也揚籍溪嘗云建炎間勤王之師所過州縣如入無人之境恣行擒掠公私苦之有陳無玷者以才畧穪嘗作某縣宿戒邑人各備器械候聞鍾聲則人執以出随其所居相比排列未㡬勤王之師入縣將肆縱横之狀即命擊鍾邑人聞之如其宿戒以出師徒見其戈矛森列不虞其有備若此也相顧失色遂整師以過秋毫無犯邑人徳之又胡文定公之趨召命也汎舟而下無玷走吏致書戒其吏云計程到江黃間有官船自下而上者可扣之當是本官吏至彼果有舟上者一問得之其善料事如此盖渠以事占之知文定之不果造朝也儒用某人作縣臨行請教於某人先生言其姓名今忘記某人曰張直柔在彼每事可詢訪之某人到官忽有㫖令諸縣造戰船召匠計之所費甚鉅因意臨行請教之語亟訪䇿於張張曰此事甚易可作一小者計其丈尺廣狹長短即是推之則大者可見矣遂如其語為之及成推筭比前所計之費減十之三四其後諸縣皆重有科敷獨是邑不擾而辦後其人知紹興府太后山陵被㫖令應副錢數萬給磚為墻其大小厚薄呼磚匠於後圃依様造之㑹其直比抛降之數減數倍遂申朝廷乞紹興自認磚墻正中宦者欺弊遂急沮其請只令紹興府應副錢不得干預磚墻事儒用成錄云其人曰如何費許多錢遂呼磚匠于園後結墻一堵驗之闕抛磚之大小厚薄依様燒磚而結之費比朝廷所降之數減數倍云云張觷字直柔福建人嘗知處州有人欲造大舟不能計其所費問之張云可造一小舟以寸折尺便可計筭後又有人欲築紹興圍神廟墻召匠計之云費八萬緡其人用張法自築一丈長筭其墻可直二萬遂以四萬與匠者董事内官無所得遂與奏紹興貧不如自出錢太后遂自出錢費三十二萬緡揚髙宗朝有朝士後為尚書建炎嘗請駕幸福建以為福建有天險又上言邵武南劔人多鑿紙錢費農業乞降㫖禁之或人家忌日之類不得燒紙錢只燒經幡一二紙好笑如此尼雅滿長槍大劔如此而使若軰人謀國云云邵武有文集又有趙霈者清獻之孫此時亦上言聖節殺鷄鵝太多只令殺猪羊大牲適傳有一龍虎大王南侵邊方以為懼胡侍郎云不足慮此有鷄鵝御史足以當之揚紹興間曾天隱名恬作中書舍人曾亦賢者然嘗為蔡京引用後修哲宗實錄成太上趙丞相要就褒賞修實錄官制辭上説破前後是非曾以蔡之故常主那一邊及行詞只模糊作一修史轉官制一與丞相不樂命吕居仁行吕權中書舍人自丁巳三月二十五日上一狀論分别邪正謂曾之徒也自荆公諸人熈豐間用事新經字説之類已壊了人心術元祐諸公所為那一邊人終不以為是紹聖以後又復新政敗壊一向至於渡江然舊人亦多在者其所見舊染不省雖賢者亦復如是如曾之徒是也因論人以先入為主一生做病揚湯思退事秦檜最乆其無狀皆親學得故所為如此之乖揚湯思退作樞宻董徳元參政商量薦小秦作相董言之不答湯即背其説逐董出召魏良臣來作參魏治楊存中上不答湯又逐出魏湯遂作相揚湯思退王之望尹穡三人姦甚又各有文以計去了魏公盡毁其邉備山寨水櫃之類凡險要處有備禦者皆毁之還了金人四州以為可以保其和好而無事矣一日只見敵騎十萬突至驚擾一畨而去三人者乃罷其謀盖三人之所同也尹乃疏平日邉事尹能文其事尚如此好宰相自為一室藏文書全不令臺諫至其後及賈誼待大臣盤劔之類事湯卒以驚死敗小人情狀如此初去了魏公毁邊備時諸將皆欲得而殺之王之望尚在其所急上書論三事一恢復二守禦三與之和時亦要地界嵗幣之類分明上大喜即日召歸參大政及金人有所須上商量之際上意欲不與欲之望有所説之望全不言上顧之云如何之望曰不如且與之上曰卿前書意如何及敗二人皆懼邊將之怨已不敢出師上前至以鄙語相罵之望謂湯小數子成把價撒出來好士夫所為如此之類言語記不全三人之意惟恐奉之不至但㸔要如何敵見其着數低易之遂無所不敢使其和議如秦檜時則亦一檜矣好梟三人首於都市俾金人聞之亦以少畏此是甲申年金騎來時思退之望既罷穡不罷上令胡銓穡往經畧邉備二人皆搬家先去上但知胡如此怒去之時召陳魯公魯公至留胡上曰用其經畧邉事遂搬家先去用是罷之陳曰如此則穡亦搬家去臣途中見之遂罷穡多讀書能文然行不成人上初極重之每對羣臣言無人及穡龔茂良為左司諫與穡同對欲促上早定和議龔曰内政只消三二箇月打叠不日可以至太平但外敵未去下手未得且與講和為便揚方伯謨問某人如何忘其姓名先生曰對移縣丞一節全處不下又問是當初未見得曰他當初感發踊躍只是後來不接續語朱希真曰天下有一等人直是要文采求進用因説及尹穡前日趙蕃稱他是好人伯謨問他當初如何㑹許多年不出曰只是且礙過及至上手則亂渠初擢用力言但得敵和三二月綱紀自定龔實之云便是他人耳聾敢如此説如減冗官事是但非其人行之失人心渠初除浙西制置胡邦衡除浙東邦衡搬家從蘓秀迤􅆔欲歸鄉因此罷陳魯公再用因言於上曰胡銓搬家固可罪尚向北尹穡搬家乃向南上云無此事公云臣親見之自古人主無與天下立敵之理天下皆道不好陛下乃力主張張魏公在督府渠欲揺撼一日陳彦廣對言張某似有罷意上曰安有此事方今誰出魏公上上每呼張相只曰魏公必是臺諫中為此卿可宣諭陳見尹道上意尹云某請對數日駕在徳夀批出陳知建寧府魏公亦罷某問當時諸公薦之何故曰亦能文章大抵以此取人不考義理無以知其人多為所誤如蘓子由用揚畏畏為政向上三人蘓終不遷畏曰蘓公不足與矣乃反攻之可學或問胡邦衡在新州十七八年無恙先生曰天生天殺道之理也人如何解死得人廣胡邦衡尚號為有知識者一日以書與范伯達云某解得易魏公為作序解得春秋鄭億年為作序以為美事范答書云易得魏公序甚好鄭序春秋者不知是何人得非劉豫左相乎是此人時且請去之胡舊嘗見李彌遜字似之亦一好前軰謂胡曰人生亦不解事事可稱只做得一兩節好便好胡後來䘮名失節亦未必非斯言有以入之也揚吕居仁學術雖未純粹然切切以禮義亷恥為事所以亦有助於風俗今則全無此意方子吕家之學大率在於儒禪之間習典故居仁遂去學作詩亦不説於趙丞相後於秦檜所為亦有輔之者籍溪云嘗代一表云仰日月於九天之上下一句甚卑可憐之詞居仁為之也後北朝此文亦有人傳之揚吕居仁作舍人時繳奏文字好處多一章論袁煥章乞作教官教官人之師表豈可乞此論不聞數十年矣今皆是陳乞然不陳乞朝廷又不為檢舉朝廷為檢舉方是亦可以飬士大夫亷恥今皆不然都要陳乞舊除從官便不磨勘今亦不然如磨勘大約用三載考績之法一年一切了今年年日日理㑹官員磨勘揚吕居仁不甚惡贓汙深惡多才刻薄者此自回避黨人故有此論出來然大害名教豈不使得子孫取受如論固窮守節處甚佳揚吕舍人好言忍恥之類此意不佳揚因及劉道原不受溫公恵曰如此做得人也靈利揚説吕居仁解大學曰他諸公何故一做下便不改動一字非聖人安能如此這般非是大聖便是大愚因説吕居仁作汪民表墓誌不好曰作龜山底尤不好故文定全不用盡做過了振吕居仁家往往自擡舉他人家便是聖賢其家法固好然專恃此以為道理只如此却不是如某人纔見長上便須尊敬以求教見年齒纔小便要教他多是如此人傑因曰此乃取其家法而欲施之於他人也人傑汪聖錫不直潘子賤直前事云無緣聼得殿上語向宜卿云吾當時之言尹和靖某事又為朱子發理㑹䘏典子賤當時為吕居仁所賣徳明張無垢説得一般道理一切險而動振張無垢氣魄汪端明全無些子氣魄無垢論語説得甚敷暢横説竪説居之不疑永嘉前軰覺得却到好到是近日諸人無意思陳少南某向雖不識之㸔他舉動煞好雖是有些疎却無而今許多纎曲賀孫問少南雖是疎到在講筵議論實有正直氣象曰然近日許多人往往到自議論他賀孫問陳少南詩如何曰亦間有好處然疎又為之甚輕易秦檜居溫州時陳嘗為館客後入經筵因講公羊母以子貴之説為非是因論嫡妾之分是時太母還朝陳遂忤太上意安置恵州張宋卿於彼從之徽廟梓宫歸鄭后梓宫亦歸邢后太上初聘亦随歸及邉以訃聞太母還秦檜欲以吉服迎呉才老時為禮官獨以為不可謂須先以凶服迎梓宫歸太上幾年不見太母了不爭此二三日奉安梓宮了却以吉服迎太母歸衆禮官聚都堂皆從秦意呉獨爭之秦曰此不是公聚訟處即以吳出之先生又云公羊之説非是只有一嫡揚因論李徳逺黄世永為湯進之所買云他亦是不曾見前軰前軰皆不如此湯見人時一面顔色言語皆買人之物史直翁亦然然却較好史雖主和然亦有去交結得一人為應者然許他皆過分數了誠使彼足以抗敵此中亦何以處之其䇿甚非也揚史丞相好薦人極不易然却有些籠絡人意思不佳陳丞相較渾厚無這般意思又若賢否不辨者振陳福公自在只如一無所能底村秀才梁丞相亦然振史老雖如此然嘗愛論薦引抜士人此一節可喜如陳應求方寸平正逺過龔實之然龔又却好事每到處便收拾得些人才劉樞不好士人先亦讀書長編從頭批抹過近得書云尚要諸經史從頭為㸔一遍顧老病恐不能揚因論張戒定夫其初名節好後來亦以書與諸公論當時某不是全不主和議但謂和時要如何後來多有如某之料其意欲進甚鋭太上終是嫌破和議底人秦檜死亟下詔守和議不變用沈該万俟卨陳誠之軰故張戒自秦檜死後數年終不用而張自躁如此盖是學無本原故耳張學老子之類揚張定夫居建昌享髙夀有文集曰正平集自言初學孔子之道而無所得後讀老子而願學焉又喜管子其議多尚法制立朝亦可觀人傑錄與先吏部厚善當時朝士皆敬之雖有素喜陵人者亦不敢慢嘗對髙宗云陛下有仁宗之儉慈而乏藝祖之英畧髙宗以為説得好又嘗言過江以來非李伯紀趙元鎮張魏公三人也立不住先生謂若海曰令祖全節翁孝義篤至又能堅正自守當時權貴欲一見之竟不為屈至於通判公又為張趙所知持論凛然不肯阿附秦老可謂無忝於所生者前軰髙風誠可敬仰為子孫者其忍不思所以奉承而世守之乎或曰今人志在趨利聞人道及此等事則多非謗訕笑先生曰某嘗謂得他當面言之猶似可又有口以為是心實非之存在胸中不知不覺做出怪事者茲尤可畏按胡泳云内翰文公之後若海鄧名世吏臨川人學甚博趙丞相以白衣起為著作郎與先吏部同局吏部甚敬畏之有攷證文字甚多攷證姓氏一部甚詳紹興府有印板謂左丘姓人有牌牓在賣卦左氏只是姓左先生云楚左史倚相世為史官恐其後也鄧著作後為秦檜以傳出秘書文字罪之褫官勒停揚熊叔雅名彦詩王時雍壻也金人入冦京城不守時雍盡捜取婦女予金人人號時雍為金人外公當秦檜時叔雅知永州魏公時安置永州秦檜之父曾為玉山知縣玉山人要為老秦立祠堂求叔雅作記叔雅質之魏公魏公令勿須作叔雅自後只是言貧這後恐不得差遣十數日後魏公知其意語之曰前日所謂祠堂記作也不妨叔雅作之大意言人問公有甚異政曰無異政只見民父子有親君臣夫婦長幼朋友之倫皆如此好了子太師得其道以治天下亦然云云立大碑於玉山揚三山黄明陟登是黄傳正之父揚錄云張登福建人􅓌錄云張致中父登從周錄云永福姓張人其人朴寔公介為甚處宰諸録云尤溪初上任凡邑人来見者都請諸録云士夫僧道百餘人但一揖揚録云坐處亦不足只立說話問諸公能打對否人皆不敢對因云天對甚其中有人云對地又問日對甚云對月陽對甚云對隂却又問利對甚云對害乃大聲云這便不是了天下一切人都被這些子壊了才把害對利便事事上只見得利害更不問義理􅓌録云人只知以利對害便只管尋利去須知道利乃對義才眀得義利便自無乖争之事自後只要如此分别不要更到訟庭後来在任果有政聲此事頗近扵迂濶然却甚好今不可多見矣時舉㽦録云一揖而退此亦可書其桃符云奉勸邑人依本分莫将閒事到公庭意亦好楊録云其人為政簡易無繋累後坐化死李椿年行經界先從他家田上量起今之輔弼能有此心否人傑王龜齡學也麄踈只是他天資髙意思誠慤表裏如一所至州郡上下皆風動而今難得此等人賀孫王詹事守泉初到任㑹七邑宰勸酒歴告之以愛民之意出一絶云九重天子愛民深令尹冝懐惻怛心今日黄堂一杯酒使君端為庻民斟七邑宰皆為之感動其為政甚嚴而能以至誠感動人心故吏民無不畏愛去之日父老兒童攀轅者不計其數公亦為之垂淚至今泉人猶懐之如父母時舉汪端眀學亦平正然踈文亦平正不好小蹊曲徑福建政事鎮静與福亦相冝蜀政不及見事亦快揚汪端眀少從學扵焦先生汪既達時從杲老問禪怜焦之老欲進之以禪因勸焦登徑山見杲杲舉寂然不動感而遂通焦曰和尚不可破句讀書不契而歸亦竒士也焦名援字公路南京人清修苦節之士閎祖汪聖錫日以親師取友多識前言徃行為事故其晚年德成行尊為世名卿若海汪季路甚子細但為人性太寛理㑹事不能得了賀孫祝懐汝昭嘗論張說一日祝有一婢溺死衢守施元之謂張曰祝婢乃其父婢祝汙之恐事泄抑令其死張遂言之扵上上曰此事大若有之行遣不得草草若無不須以此陷人遂隂遣一兵士之類来衢探其事徃来月餘日得其實矣一日乃投都監曰奉聖㫖来探祝編脩家公事遂呌集鄰里作保明状去事方已兵士小人乃能如此揚主上一日嘉鄭自眀直言遂問近臣曰昔時有一魏掞之好直言今何在左右以死對問有子弟否無人為敷陳遂贈直秘閣宣教郎揚這道理易晦而難眀某少年過莆田見林謙之方次榮說一種道理說得精神極好聴為之踊躍皷動退而思之忘寝與食者數時好之念念而不忘及至後来再過則二公已死更無一人能繼其學者也無一箇㑹說了僴論林艾軒作文解經曰林成季井伯為艾軒作墓銘諱艾軒著書但云幸學講中庸九經及某篇是艾軒所著此是有形諱不得底嘗見九經口義先說一段冒子全與所講不干渉其說是言巍巍乎惟天為大唯堯則之巍巍乎舜禹之有天下而不與焉人㸔時都理㑹不得某却曾見他口說来乃是說道巍巍乎者世上有恁地大底事惟天有之惟堯則之下面又說箇巍巍乎者言此大事只是天與堯有之舜禹都不與此葢是取奉光堯不知却推倒舜禹又云在興化南寺見艾軒言曾㸃言志一段歸自釋音作饋字此是物各付物之意某云如何見得艾軒云曾㸃不是要與冠者童子真箇去浴沂風雩只是見那人有冠者有童子也有在那裏澡浴底也有在那裏乘涼底也有在那裏饋餉饁南畆底曾㸃見得這意思此謂物各付物艾軒甚秘其說宻言於先生也徳輔王說習之性直好人與林艾軒軰行上即位即召見論不可講和上一日謂宰臣曰前日上殿有箇生得貌寢是言此忘了甚底官人議論亦好遂除官龔實之笑王習之以不講和奉上意先生謂習之直不是奉上龔實之多讀書知前軰大體頗識義理又有才做得去亦有文小官時甚好為正言時攻曾龍後来心術一偏至扵如此可惜可惜反不為陳應求全不如他却較好揚因給舎繳駁事而大臣無所可否云昔梁叔子将為執政時曾語劉樞云某若當地頭有文字從中出不當如何何也須說教住了始得後梁已大用而文字自中出者初不聞有甚執奏劉樞深怪其事後見錢某因事說及丞相煞有力中出文字日日有之丞相每每袖回了而後已自今觀之又不見此賀孫某人初登宰輔奏逐姜特立忽有旨召姜乞出甚力在六和塔待命有㫖免宣押某人初過樞天下屬望首有召姜之命經由樞宻曾無奏止坐視丞相以近習故去國其意只以入樞未乆恐說不行而去為人所笑故放過此一著是甚小事直卿云人日日常将理義夹持个身心庶幾遇事住不得若是平常底人也是難得不變如其人固謂世人属望但此事亦須不要官爵方做得曰固是若是不要官爵這一項事如何放得過每看史策到這般地頭為之汗栗一箇身已便頓在兵刄之間然漢唐時争議而死愈死愈争其争愈力夲朝用刑至寛而人多畏懦到合說䖏反畏似虎至道因問武后事狄梁公雖復正中宗然大義終不眀做得似鶻突曰當此時世只做得到恁地狄梁公終死於周然薦得張柬之迄能反正又問吕后事勢倒做得只如此然武后却可畏曰吕后只是一箇村婦人因戚姬遂迤邐做到後来許多不好武后乃是武功臣之女合下便有無君之心自為昭儀便鴆殺其子以傾王后中宗無罪而廢之則武后之罪已定只可便以此廢之拘於子無廢母之義不得吕后與髙祖同起行伍識兵略故布置諸吕於諸軍平勃之成功也適直吕后病困故做得許多脚手平勃亦幸而成功胡文定謂武后之罪當告于宗廟社稷而誅之又云中宗決不敢為黜母之事然而并中宗廢之又不得當時人心惟是見武后以非罪廢天子故疾之深惟是見中宗以無罪被廢故願復之切若并中宗廢之又未知何以收拾人心這般處極難賀孫耿京起義兵為天平軍節度使有張安國者亦起兵與京為兩軍辛幼安時在京幕下為記室方衘命来此致歸朝之義則京已為安國所殺幼安後歸挟安國馬上還朝以正典刑儒用辛幼安亦是箇人才豈有使不得之理但眀賞罰則彼自服矣今日所以用之者彼之所短更不問之視其過當為害者皆不之䘏及至廢置又不敢收拾而用之人傑問陳亮可用否曰朝廷賞罰眀此等人皆可用如辛幼安亦是一帥材但方其縱恣時更無一人敢道他略不警策之及至如今一坐坐了又更不問着便如終廢此人作帥亦有勝他人處但當明賞罰以用之耳㽦近世如汪端眀專理㑹民如辛幼安却是專理會兵不管民他這理㑹兵時下便要驅以塞海其勢可畏植辛幼安為閩憲問政答曰臨民以寛待士以禮馭吏以嚴恭甫再為潭帥律已愈謹御吏愈嚴某謂如此方是道夫劉樞帥建康所得月千緡劉欲止受正所當得者以恐壊後来例不敢但受之後却送其不當得者於公使庫後韓元龍来作漕盡不受其所不當得者劉甚稱服之平父云振劉共父創第規模宏麗先生勸止之曰匈奴未滅何以家為忠肅意不樂也道夫劉寳學初娶熊氏生樞宻生次子方落地問是男即命與其弟直閣為子熊不樂都不問竟以是而沒後樞宻娶吕氏入門未㡬即命吕一切儀物盡與直閣女為嫁具吕即送與之平父云振某曾訪謝昌國問良齋安在謝指㕔事云即此便是其㕔亦敝陋元鄭金安節為人好振戴少望云洪景盧楊廷秀争配享俱出可謂無黨曰不然要無黨湏是分别得君子小人分眀某嘗謂凡事都分做兩邉是底放一邉非底放一邉是底是天理非底是人欲是即守而勿失非即去而勿留此治一身之法也治一家則分别一家之是非治一邑則分别一邑之邪正推而一州一路以至天下莫不皆然此直上直下之道若其不分黒白不辨是非而猥曰無黨是大亂之道戴曰信而後諫意欲委曲以濟事曰是枉尺直尋而可為也閎祖孫逢吉從之煞好初除闕便上一文字盡将今所諱忌如正心誠意許多說話一齊盡說出㸔来這是合着說底話只如今人那箇口道是是那箇不多方去回避賀孫天下事須論一箇是不是後却又論其中節與不中節余古失於許然使其言見聴不無所補李琪則所謂不在其位不謀其政要知却亦有以救其失也如二子却所謂是中之不中節者道夫耿直之作浙漕時有一榜在客位甚好說用考課之法應州縣官不許用援有績可考自發薦章如考課在上而挟貴援者即降次等今在鎮江亦然否曰僻在山林不知其詳但聞私謁不行曰向来耿守有一書說用之則行舎之則藏從周曰此義尚如何說曰也只是前来說若如耿說却是聖人學得些骨董要把来使全不自心中流出從周曰伊尹耕於有莘之野而樂堯舜之道濓溪曰志伊尹之所志學顔子之所學伊尹恥其君至若撻於市學者若横此心在胷中却是志於行莫不可曰非是私修身養性與致君澤民只是一理從周呉公路作劔南天柱灘記曰事無大小為之必成害無大小除之必去此見其志方王宣子說甘抃言士大夫以靣折廷爭為職以此而出人皆髙之宦官以承順為事忽犯顔而出誰将你當事而黄彥節是也其見如此之爭後漢吕强後世無不賢之揚近年有洪邦直為宰以贓被訟求救於伯圭伯圭薦之甘抃甘抃薦之上召見賜錢以為此人甚亷而賢除監察御史振先生聞黄文叔之死頗傷之云觀其文字議論是一箇白直響快底人想是懊悶死了言不行諫不聴要去又不得去也是悶人因言蜀中今年煞死了係名色人如胡子逺呉挺都是有氣骨底人呉是得力邊将賀孫近世士大夫憂國忘家毎言及國事輙感憤慷慨者惟於趙子直黄文叔見之耳僩趙子直奉命将入蜀請於先生曰某将入蜀蜀中亦無事可理㑹意欲請於朝得㳂淮差遣庻可理㑹屯田曰出於朝廷之意猶恐不得終其事若自請以行則下梢或有小事請乞不行便難出手如舉薦小吏而不從其薦或按劾小吏而不從其劾或求錢米以補闕乏而不從其所求這如何做賀孫趙子直政事都瑣碎看見都悶人曾向擇之云朱丈想得不喜某政事可知是不喜賀孫或言趙子直多疑先生曰諸公且言人因其多疑魯可幾曰只是見不破爾道夫趙子直要分門編奏議先生曰只是逐人編好因論舊編精義逐人編自始終有意今一齊節去更拆散了不見其全意矣趙子直亦可謂忠臣然以宗社之大計言之亦有未是處不知何以見先帝人傑一日獨侍坐先生忽顰蹙云趙丞相謫命似出胡紘問胡紘不知㑹識他否曰舊亦識知此人頗記得文字莆陽之政亦好但見朋友多説其很愎某曰丞相前日之事做得都是否曰也有些不是處問所以不是處曰公他日當自見之先生又曰一時正人皆已出去今全無一好人在朝某曰鄭溥之當時草趙丞相罷相詞固好以某觀之當時不做便乞出尤為竒特曰也不必如此但是後来既遷之後便出亦自好他却不合不肯出所以可疑若說教他不做便出亦無此典故某曰且如冨鄭公繳趙國夫人之封以前亦向曾有此自冨鄭公既做後遂為例先生㣲笑而不答某又問丞相秉軸首召先生入經筵命下士子相慶以為太平可致忽然一日報罷莫不惶惑竊議者云先生請早晚入講筵人主将不能堪便知先生不能久在君側曰早晚入講筵非某之請是自来如此然某當時便教久在講筵恐亦無益一日雖是兩畨入講筵文字分眀一一解注亦只講過而已㸔来亦只是文具枅或曰今世士大夫不詭隨者亦有五六人曰此軰在向時夲是闒茸人不比數底但今則上靣一項真箇好人盡屏除了故這一軰稍了能不變便稱好人其實班固九品之中方是中下品人若中中以上不復有矣先生因問某人如何或曰也靠不得曰然見他冩書来皆不可曉頃在某處得書来說學問又如何資質又如何讀書不長進又如何某答之云不須如何說話不濟事若資弱便放教剛若過剛便放教稍柔些若􅂴便放教勤讀論語便徹頭徹尾理㑹論語讀孟子便徹頭徹尾理㑹孟子其他書皆然此等事夲不用問人問人只是杭唐日子不濟事不須低着頭去做若做底自是不消問人這畨又得他書亦不可曉或曰終是他於利欲之場打不透欲過這邊欲拾彼不得欲倒向那邊又畏朋友之議又縁頃被其人擡奨得太過正如箇船在沙岸上要上又不得要下又推不動曰然無一畨大水来泛将去這船終不動要之只是心不勇之故某嘗歎息天下有些英雄人都被釋氏引将去甚害事且如昔日老南和尚他後生行脚時已有六七十人隨着他參請於天下叢林尊宿無不徧謁無有可其意者只聞石霜楚圓之名不曾得去遂特地去訪他及到石霜頗聞其有不可人意處南大不樂徘徊山下數日不肯去見後来义思量既到此須一見而決如是又數日不得已隨衆入室揭簾欲入又舎不得拜他如是者三遂奮然曰為人有疑不決終非丈夫遂揭簾徑入才交談便被石霜降下他這般人立志勇決如此觀其三四揭簾而不肯入他定不肯詭隨人也廣録云世上有一種人心下自不分眀只自怕人道不㑹不肯問人昔老南去參慈眀時已有人随他了他欲入慈眀室數次欲揭簾入去又休末後乃云有疑不決終非大丈夫遂入其室某嘗說怪不得今日士大夫是他心裏無可作做無可思量飽食終日無所用心自然是只隨利欲走問有務記誦為詞章者又不足以捄其夲心之陷溺所以箇箇如此只縁無所用心故如此前軰多有得於佛學當利害禍福之際而不變者葢佛氏勇猛精進清淨堅固之說猶足以使人淡泊有守不為外物所移也若記覽詞章之學這般伎倆如何捄㧞得他那利欲底窠窟動或曰某人讀書只是摘竒巧為文章以求富貴耳曰恁地工夫也只做得那不好底文章定無氣魄所以他文字皆困苦若某少年見上一軰未說如何箇箇有氣魄敢擔當做事而今人箇箇都恁地衰無氣魄也是氣運使然而今秀才便有些氣魄少年被做那時文都銷磨盡了所以都無精彩做事不成僴彪居正徳美記得無限史記只是不肯說只要說一般無巴鼻底道理在南嶽說溫故而知新不是今人所說之故新故者性也新者心也溫性而知心故可以為人師其說道理如此然口嘵嘵不肯已璘朱子語類卷一百三十二
