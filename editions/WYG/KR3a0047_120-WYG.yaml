body:
  text: 朱子語類卷一百二十朱子十七訓門人八雜訓諸門人者為此卷因説林擇之曰此人曉事非其他學者之比徐又曰到他已分事事却暗文蔚先生問堯卿近㸔道理所得如何曰日用間有些著落不似從前走作曰此語亦是鶻突須是端的見得是如何譬如飲食須見那箇是好喫那箇滋味是如何不成説道都好喫淳問堯卿今日㸔甚書曰只與安卿較量下學處曰不須比安卿公年髙且㨿見定底道理受用安卿後生有精力日子長儘可闊著歩去淳李丈問前承教只據見定道理受用某日用間已見有些著落事来也應得去不似從前走作曰日用間固是如此也須隨自家力量成就去㸔如何問工夫到此自是不能間斷得曰博學審問慎思明辯篤行這箇工夫常恁地昔李初平欲讀書濓溪曰公老無及矣只待某説與公二年方覺悟他既讀不得書濓溪説與他何故必待二年之久覺悟二年中説多少事想見事事説與他不解今日一説明日便悟頓成箇别一等人無此理也公雖年髙更著涵養工夫如一粒菜子中間含許多生意亦須是培壅澆灌方得成不成説道有那種子在此只待他自然生根生苗去若只見道理如此便要受用去則一日止如一日一年止如一年不㑹長進正如菜子無糞去培壅無水去澆灌也須是更將語孟中庸大學中道理来涵養淳義剛同堯卿問事來斷制淳録作置不下當何以處之曰便斷制不得也著斷制不成掉了又問莫須且隨力量做去曰也只得隨力量做去又問事有至理理有至當十分處今已㸔得七八分待窮来窮去熟後自解到那分數足處曰雖未能從容只是熟後便自㑹只是熟只是熟義剛淳録畧傅誠至叔請教曰聖賢教人甚分曉但人不將来做切已㸔故覺得讀所做時文之書與這箇異要之只是這箇書今人但見口頭道得筆下去得紙上冩得以為如此便了殊不知聖賢教人初不如是而今所讀亦自與自家不相干渉也道夫與楊通老説學問最怕悠悠讀書不在貪多未能讀從後面去且温習前面已曉底一畨㸔一畨别賀孫通老問孟子説浩然之氣如何是浩然之氣先生不答乆之曰公若留此數日只消把孟子自去熟讀他逐句自解一句自家只排句讀將去自見得分眀却好来商量若驀地問後待與説將去也徒然康節學於穆伯長每有扣請必曰願開其端勿盡其意他要待自思量得大凡事理若是自去尋討得出来直是别賀孫語通老早来説無事時此理存有事時此理亡無他只是把事做等閒須是於事上窮理方可理與事本無異今見事來别把做一般㸔自然錯了可學周公謹問學者理㑹文字又却昏了若不去㸔恐又無路可入曰便是難且去㸔聖賢氣象識他一箇規模若欲盡窮天下之理亦甚難且隨自家規模大小做去若是迫切求益亦害事豈不是私意泳李公謹問讀書且㸔大意有少窒礙處且放過後来旋理㑹如何曰公合下便立這規模便不濟事了才恁地立規模只是要苟簡小處曉不得也終不見大處若説窒礙到臨時十分不得已只得且放下如何先如此立心賀孫語敬子曰讀書須是心虚一而靜方㸔得道理出而今自家心只是管外事硬定要如此要别人也如此做所以来這裏㸔許多時文字都不濟事不曾見有長進是自家心只在門外走與人相抵拒在這裏不曾入得門中不知屋中是甚模様這道理本自然不消如此如公所言説得都是只是不曾自理㑹得公身上事所以全然無益只是硬摏定方法抵拒將去全無自然意思都無那活底水只是聚得許多死水李曰也須是積將去曰也只積得那死水那源頭活水不生了公只是每日硬用力推這車子只見費力若是有活水來那車子自轉不用費力李曰恐才如此説不善聽者放寛便不濟事曰不曾教你放寛所以學問難才説得寛便不著緊才太緊又不濟事寛固是便狼狽然緊底下梢頭也不濟事僴敬子問人患多懼雖眀知其不當懼然不能克莫若且强制此心使不動否曰只管强制也無了期只是理眀了自是不懼不須强制僴胡叔器問每常多有恐懼何由可免曰須是自下工夫㸔此事是當恐懼不當恐懼遺書云治怒難治懼亦難克己可以治怒眀理可以治懼若於道理見得了何懼之有義剛問叔器㸔文字如何曰兩日方在思量顔子樂處先生疾言曰不用思量他只道博我以文約我以禮後見得那天理分明日用間義理純熟後不被那人欲来苦楚自恁地快活而今只去博文約禮便自見得今却索之於杳冥無朕之際去何處討這樂處将次思量得成病而今一部論語說得恁地分明自不用思量只要著實去用工前日所說人心道心便只是這兩事只去臨時思量那箇是人心那箇是道心便顔子也只是使人心聽命於道心不被人心勝了道心今便湏是常常揀擇教精使道心常常在裏面如箇主人人心只如客様常常如此無間斷便能允執厥中義剛胡問静坐用功之法曰静坐只是恁静坐不要閒勾當不要閒思量也無法問静坐時思一事則心倚靠在事上不思量則心無所倚靠如何曰不湏得倚靠若然又是道家數出入息目視鼻端白一般他亦是心無所寄寓故要如此倚靠若不能斷得思量又不如且恁地也無害淳義剛録同又曰静坐息閒雜思量則飬得来便條暢胡叔器患精神短曰若精神少也只是做去不成道我精神少便不做公只是思索義理不精平日讀書只泛泛地過不曽貼裏細宻思量公與安卿之病正相反安卿思得義理甚精只是要将那麄底物事都掉了公又不去義理上思量事物来皆奈何不得只是不曾向裏去理㑹如入市見舖席上都是好物事只是自家沒錢買得如書册上都是好說話只是自家無奈他何如黄兄前日說忠恕忠恕只是體用只是一箇物事猶形影要除一箇除不得若未曉且㸔過去那時復把来玩味少間自見得叔器曰安之在逺方望先生指一路脉去歸自尋曰見行底便是路那裏有别底路来道理星散在事物上却無總在一處底而今只得且将論孟中庸大學熟看如論語上看不出少間就孟子上看得出孟子上底只是論語上底不可道孟子勝論語只是自家已前看不到而今方見得到又問優㳺涵泳勇猛精進字如何曰也不湏恁地立定牌榜淳録作做題目也不湏恁地起草只做将去又問應事當何如曰士人在家有甚大事只是著衣喫飯理㑹眼前事而已其他天下事聖賢都說十分盡了今無他法為髙必因丘陵為下必因川澤自家只就他說話上寄搭些工夫便都是我底某舊時看文字甚費力如論孟諸家觧有一箱每看一段必檢許多各就諸說上推尋意脉各見得著落然後斷其是非是底都抄出一兩字好亦抄出雖未如今集註簡盡然大綱已定今集註只是就那上刪来但人不著心守見成說只草草看了今試将精義来參㸔一兩段所以去取底是如何便自見得大抵事要思量學要講如古人一件事有四五人共做自家湏㸔那人做得是那人做得不是又如眼前一件事有四五人共議甲要如此乙要如彼自家湏見那人說得是那人說得不是便待思量得不是此心曾經思量一過有時那不是底發我這是底如十箇物事團九箇不著那一箇便著則九箇不著底也不是枉思量又如講義理有未通處與朋友共講十人十様說自家平心看那箇不是或他說是底却發得自家不是底或十人都說不是有時因此發得自家是底所以適来說有時是這處理㑹得有時是那䖏理㑹得少間便都理㑹得只是自家見識到别無法學者湏是撒開心胷事事逐件都與理㑹過未理㑹得底且放下待無事時復将来理㑹少間甚事理㑹不得義剛林恭甫問論語記門人問答之辭而堯曰一篇乃記堯舜湯武許多事何也曰不消恁地理㑹文字只消理㑹那道理譬如喫飯椀中盛得飯自家只去喫㸔那滋味如何莫要問他從那處来堯曰一篇某也嘗見人說来是夫子嘗誦述前聖之言弟子類記於此先儒亦只是如此說然道理緊要却不在這裏這只是外面一重讀書湏去裏面理㑹譬如㸔屋湏看那房室間架莫要只去看那外面墻壁粉飾如喫荔枝湏喫那肉不喫那皮公而今却是剥了那肉却喫那皮核讀書湏是以自家之心體驗聖人之心少間體驗得熟自家之心便是聖人之心某自二十時看道理便要看那裏面嘗看上蔡論語其初将紅筆抹出後又用青筆抹出又用黄筆抹出三四畨後又用墨筆抹出是要尋那精底看道理湏是漸漸向裏尋到那精英處方是如射箭其初方上垜後来又要中帖少間又要中第一暈又要中第二暈後又要到紅心公而今只在垜之左右或上或下却不要中的恁地不濟事湏是仔細看看得這一般熟後事事盡都好㸔便是七言雜字也有道理未看得時正要去緊要處鑚少間透徹則無書不可讀而今人不去理㑹底固是不足說去理㑹底又不知尋緊要䖏也都討頭不著義剛子升問向来讀書病於草草所以多疑而無益今承先生之教欲自大學温去曰然只是看便把做事如說持敬便湏入隻脚在裏面做不可只作說話看了木之子升問主一工夫兼動静否曰若動時收斂心神在一事上不胡亂思想東去西去便是主一又問由敬可以至誠否曰誠自是真實敬自是嚴謹如今正不要如此看但見得分曉了便下工夫做将去如整齊嚴肅其心收斂常惺惺數條無不通貫木之子升問遇事心不存之病曰只隨處警省收其放心收放只在自家俄頃瞬息間耳或舉先生與吕子約書有知其所以為放者而收之則心存矣此語最切要又問曽子謂孟敬子君子所貴乎道者三之意曰曾子之意且将對下面籩豆之事則有司存說言君子動容貌要得逺暴慢正顔色要得近信出辭氣要得逺鄙倍此其本之所當先者至於籩豆之事則有司存盖末而當後者耳未說到做工夫上若說三者工夫則在平日操存省察耳木之黎季成問向来工夫零碎今聞先生之誨乃見得人之所任甚重統體通貫曰季成只是守舊窠窟湏當進歩盖卿敬之黄名顯子問理既明於心湏又見這様子方始安稳曰學問思辨亦皆是學但學是習此事思是思量此理者只說見這様子又不得湏是依様去做然只依本畫葫蘆又不可湏是百方自去尋討始得㝢語敬之今看文字專要看做裏面去如何裏面也更無去處不著得許多言語這裏只王一無適敬以直内涵養去嘗謂文字寕是看得淺不可太深寕是低看不可太髙盖淺近雖未能到那切近處更就上面推尋却有見時節若太深逺更無回頭時恰似人要来建陽自信州来行到崇安歇了却不妨明日更行湏㑹到若不問来由一向直走過均亭去迤邐前去更無到建陽時節㝢語敬之曰這道理也只是如此看湏是自家自奮迅做去始得看公大病痛只在箇懦弱湏是便勇猛果決合做便做不要安排不要等待不要靠别人不要靠書籍言語只是自家自檢㸃公曾看易易裏說陽剛隂柔隂柔是極不好賀孫語黄敬之湏是打撲精神莫教恁地慢慢底湏是矯教緊緊底湏是莫放教慢賀孫語敬之曰敬之意氣甚弱看文字都恁地遲疑不決只是不見得道理分明賀孫問先生向令敬之看孟子若讀此書透湏自變得氣質否曰只是道理明自然㑹變今且說讀孟子讀了只依舊是這箇人便是不曾讀便是不曾得他裏面意思孟子自是孟子自家身已自是自家身已讀書看道理也湏著些氣力打撲精神看教分明透徹方於身上有功某近来衰晚不甚著力看文字若舊時看文字有一段理㑹未得湏是要理㑹得直是辛苦近日却看得平易舊時湏要勉强說教得方了要知初間也著如此著力看公如今只恁地慢慢要進又不敢進要取又不敢取只如将手恁地探摸只怕物事觸了手相似若恁地看文字終不見得道理終不濟事徒然費了時光湏是勇猛向前匹馬單鎗做将去看如何只管怕箇甚麽彼丈夫也我丈夫也吾何畏彼哉他合下也有許多義理自家合下也有許多義理他做得自家也做得某近看得道理分明便是有甚利害有甚禍福直是不怕只是見得道理合如此便做将去賀孫黄敬之有書先生示人傑人傑云其說名義處或中或否盖彼未有實功說得不濟事曰也湏要理㑹若實下工夫亦湏先理㑹名義都要著落彼謂易者心之妙用太極者性之本體其說有病如伊川所謂其體則謂之易其理則謂之道其用則謂之神方說得的當然伊川所謂體字與實字相似乃是該體用而言如隂陽動静之類畢竟是隂為體陽為用静而動動而静是所以為易之體也人傑云向見先生云體是形體却是著形氣說不如說該體用者為備耳曰若作形氣說然却只說得一邊惟說作該體用乃為全備却統得下面其理則謂之道其用則謂之神兩句人傑某平生不㑹懶雖甚病然亦一心欲向前做事自是懶不得今人所以懶未必是真箇怯弱自是先有畏事之心纔見一事便料其難而不為縁先有箇畏縮之心所以習成怯弱而不能有所為也昌父云某平生自覺血氣弱日用工夫多只揀易底事做或尚論人物亦只取其與已力量相近者學之自覺難處進歩不得也曰便當因這易處而益求其所謂難因這近處而益求其所謂逺不可只守這箇而不求進歩縱自家力量到那難處不得然不可不勉慕而求之今人都是未到那做不得處便先自懶怯了雖是怯弱然豈可不向前求其難者逺者但求之無有不得若真箇著力求而不得則無如之何也趙曰某幸聞諸老先生之緒言粗知謹守而不敢失墜爾曰固是好但終非活法爾僴昌父辭請教曰當從實處作工夫可學饒幹廷老問今之學者不是忘便是助長曰這只是見理不明耳理是自家固有底從中而出如何忘得使他見之之明如飢而必食渴而必飲則何忘之有如食而至於飽則止飲而至於滿腹則止又何助長之有此皆是見理不明之病道夫先生謂饒廷老曰觀公近日都汨沒了這箇意思雖縣事叢兄自應如此更宜做工夫盖卿二彭尋蠡初見問平居做甚工夫曰為科舉所累自時文外不曾為學曰今之學者多如此然既讀聖人書當反身而求可也二公頗自言其居家實踐等事曰躬行固好亦湏講學不講學遇事便有嵲屼不自安處講學明則坦坦地行将去此道理無出聖人之言但當熟讀深思且如人看生文字與熟文字自是兩般既熟時他人說底便是我底讀其他書不如讀論語最要盖其中無所不有若只躬行而不講學只是箇鶻突底好人又曰論語只是箇坯璞子若仔細理㑹煞有商量處謨語泉州趙公曰學固不在乎讀書然不讀書則義理無由明要之無事不要理㑹無書不要讀若不讀這一件書便闕了這一件道理不理㑹這一事便闕這一事道理要他底湏著些精彩方得然泛泛做又不得故程先生教人以敬為本然後心定理明孔子言出門如見大賔云云也是散說要人敬但敬便是箇關聚底道理非專是閉目静坐耳無聞目無見不接事物然後為敬整齊收斂這身心不敢放縱便是敬嘗謂敬字似甚字恰似箇畏字相似㝢蕭兄問心不能自把捉曰自是如此盖心便能把捉自家自家却如何把捉得他唯有以義理涵養耳又問持其志如何却又要主張曰志是心之發豈可聴其自放而不持之但不可硬守定耳盖卿問曾光祖曰公讀書有甚大疑處曰覺見持敬不甚安曰初學如何便得安除是孔子方始恭而安今人平日恁地放肆身心一下自是不安初要持敬也湏有些勉强但湏覺見有些子放去便湏收斂提掇起教在這裏常常相接乆後自熟又曰雖然這箇也恁地把捉不得湏是先理㑹得箇道理而今學問便只要理㑹一箇道理天生烝民有物有則有一箇物便有一箇道理所以大學之道教人去事物上逐一理㑹得箇道理若理㑹一件未得直湏反覆推究研窮行也思量坐也思量早上思量不得晩間又把出思量晚間思量不得明日又思量如此豈有不得底道理若只略略地思量思量不得便掉了如此千年也理㑹不得只管責道是自家魯鈍某常謂此道理無他只是要熟只是今日把来恁地㸔過明日又把来恁地㸔過㸔来㸔去少間自然看得或有㸔不得底少間遇著别事沒巴沒鼻也㑹自然觸發盖為天下只是一箇道理賀孫光祖說大學首尾該貫此處必有脫字初間㸔便不得如此要知道理只是這箇道理只縁失了多年卒急要尋討不見待只管理㑹教熟却便這箇道理初間略見得些少時也似曰生恁地自無安頓去處到後来理㑹熟了便自合當如此如一件器用掉在所在多年卒乍要討討不得待尋来尋去忽然討見即是元初的定底物事賀孫光祖說治國平天下皆本於致知格物㸔来只是敬又舉伊川說内直則外無不方曰伊川亦只是大體如此說看来世上自有一般人不觧恁地内直外便方正只是了得自身已遇事應物都顛顛倒倒沒理㑹大學湏是要人窮理今来一種學問正坐此病只說我自理㑹得了其餘事皆截斷不必理㑹自㑹做得更不觧商量更不觧􅊰䆒到做出都不合義理所以聖人說敬以直内又說義以方外是見得世上有這般人學者湏是要窮理不論小事大事都識得通透直得自本至末自項自踵並無些子夾雜處若說自家資質恁地好只消恁地做去更不觧理㑹其他道理也不消問别人這倒是夾雜倒是私意賀孫光祖告行云䝉教誨讀大學已略知為學之序平日言語動作亦自常去㸃檢又恐有發露而不自覺乞指示箴戒曰㸔公意思遲重不到有他過只是看文字上更子細加功更湏著些精采賀孫曾問讀大學已知綱目次第了然大要用工夫恐在敬之一字前見伊川說敬以直内義以方外處先生曰能敬以直内矣亦湏義以方外方能知得是非始格得物不以義方外則是非好惡不能分别物亦不可格曾又問恐敬立則義在其中伊川所謂弸諸中彪諸外是也曰雖敬立而義在也湏認得實方見得今有人雖胷中知得分明說出来亦是見得千了百當及到應物之時顛倒錯謬全是私意不知聖人所謂敬義處全是天理安得有私意因言今釋老所以能立箇門户恁地亦是他從旁窺得近似他所謂敬時亦却是能敬更有笠影之喻卓程次卿自述向嘗讀伊洛書妄謂人當隨事而思視時便思明聴時便思聰視聴不接時皆不可有所思所謂思不出其位若無事而思則是紛紜妄想曰若閒時不思量義理到臨事而思已無及若只塊然守自家箇軀殻直到有事方思閒時都莫思量這却甚易只守此一句足矣聖賢千千萬萬在這裏何用如公所說則六經語孟之書皆一齊不消存得以孔子之聖也只是好學我非生而知之者好古敏以求之者也文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有若說閒時都莫思則世上大事小事都莫理㑹如此却都無難者事事湏先理㑹知得了方做得行得何故中庸却不先說篤行之却先說博學之審問之慎思之明辨之大學何故却不先說正心誠意却先說致知是如何如何孟子却說道詖辭知其所蔽滛辭知其所陷邪辭知其所離遁辭知其所窮若如公説閒時都不消思量季通問程君之意是如何曰他只要理㑹自家這心在裏面事至方思外面事都不要思量理㑹蔡云若不理㑹得世上許多事自家裏面底也怕理㑹不得曰只㨿他所見自守一箇小小偏枯底物事無縁知得大體因顧賀孫曰公卿間陳叔向正是如此如他說格物云物是心湏是格住這心致知如了了的當常常知覺他所見既如彼便将聖賢説話都入他腔裏面不如此則他所學無據這都是不曾平心讀聖賢之書只把自家心下先頓放在這裏却捉聖賢說話壓在裏面如說隨事而思無事不消思聖賢也自有如此說時節又自就他地頭說只如公說思不出其位也不如公說這位字却不是只守得這軀殻這位字煞大若見得這意思天下甚麽事不關自家身已極而至於參天地贊化育也只是這箇心都只是自家分内事蔡云陸子静正是不要理㑹許多王道夫乞朝廷以一監書賜象山此正犯其所忌曰固是蔡云若一向是禪時也終是髙曰只是許多模様是甚道理如此若實見得自家底分明看彼許多道理不待辨而明如今諸公説道這箇也好某敢百口保其自見不曾分明如云洛底也是蜀底也是某定道他元不曾理㑹得如熈豐也不是元祐也不是某定保他自元不曾理會得如云佛氏也好老氏也好某定道他元不曾理㑹得若見得自底分明是底直是是非底直是非那得恁地含含胡胡怕觸著人這人也要周旋那人也要周旋賀孫程又問某不是說道閒時全不去思量意謂臨事而思量讀書時只思量這書曰讀書時思量書疊了䇿時都莫思量去行動時心下思量書都不得在這裏坐只思量這裏事移過那邊去坐便不可思量這裏事今日只思量今日事更不可思量明日事這不成說話試自去平心看聖賢書都自説得盡賀孫吳伯英初見問書如何讀曰讀書無甚巧妙只是熟讀字字句句對注解仔細辨認語意觧得一遍是一遍工夫解得兩遍是兩遍工夫工夫熟時義理自然通貫不用問人先生問居常看甚文字曰曾讀大學曰看得如何曰不過尋行數墨觧得文義通自不曽生眼目於言外求意曰如何是言外意曰且如臣之忠子之孝火之熱水之寒只知為臣當忠為子當孝火性本熱水性本寒不知臣之所以忠子之所以孝火之所以熱水之所以寒曰格物只是就事物上求箇當然之理若臣之忠臣自是當忠子之孝子自是當孝為臣試不忠為子試不孝看自家心中如何火熱水寒水火之性自然如此凡事只是尋箇當然不必過求便生鬼怪僩吳伯英問某當從致知持敬如此用工夫曰此自吾友身上合做底事不湏商量盖卿吳伯英問持敬之義曰且放下了持敬更湏向前進一歩問如何是進歩處曰心中若無一事時便是敬盖卿吳伯英講書先生因曰凡人讀書湏虚心入裏玩味道理不可只説得皮膚上譬如一食物滋味盡在裏面若只䑛噬其外而不得其味無益也問器逺所學来歴曰自年二十從陳先生其教人讀書但令事事理㑹如讀周禮便理㑹三百六十官如何安頓讀書便理㑹二帝三王所以區處天下之事讀春秋便理㑹所以待伯者予奪之義至論身已上工夫説道形而上者謂之道形而下者謂之器器便有道不是兩様湏是識禮樂法度皆是道理曰禮樂法度古人不是不理㑹只是古人都是見成物事到合用時便将来使如告顔淵行夏之時乗殷之輅只是見成物事如學字一般從小兒便自曉得後来只習教熟如今禮樂法度都一齊散亂不可稽考若著心費力在上面少間弄得都困了賀孫器逺言少時好讀伊洛諸書後来見陳先生却説只就事上理㑹較著實若只管去理㑹道理少間恐流於空虚曰向見伯恭亦有此意却以語孟為虚著語孟開陳許多大本原多少的實可行反以為恐流於空虚却把左傳做實要人看殊不知少間自都無主張只見許多神頭鬼面一場沒理㑹此乃是大不實也又只管教人看史書後来諸生都衰了如潘叔度臨死却去討佛書看且是止不得縁是他那裏都無箇捉摸却来尋討這箇如人乗船一齊破散了無奈何将一片板且守得在這裏又曰孟子曰作於其心害於其事作於其事害於其政若不就自家身心理㑹教分明只道有些病痛不妨待有事来旋作安排少間也把捉得一事了只是有些子罅縫少間便是一箇禍端這利害非輕假饒你盡力極巧百方去做若此心有些病根只是㑹不好又曰又有説道身已自著理㑹一種應出底事又自著理㑹這分明分做兩邉去不知古人説修身而天下平湏説做不是始得大學云物格而後知至知至而後意誠云云今来却截斷一項只便要理㑹平天下如何得又曰聖門之中得其傳者惟顔子顔子之問夫子之答有二項一則問為仁一則問為邦湏知得那箇是先那箇是後也湏從克己復禮上做来方可及為邦之事這事最分曉可見又曰公適来説君舉要理㑹經世之學今且理㑹一件要緊事如國家養許多歸明歸正及還軍年老者費糧食供之州郡困乏展轉二三十年都縮手坐視其困器逺且道合如何商量去之則傷恩飬之則益困若壮資其力而老棄其人是大不可湏有箇指實器逺言鄉間諸先生嘗懐見先生之意却不得面㑹剖析使這意思合又曰某不是要教人歩歩相循都来入這圈套只是要教人分别是非教明白是底還他是不是底還他不是大家各自著力各自撑拄君盡其職臣効其功各各行到大路頭自有箇歸一處是乃不同之同乃所以為真同也若乃依阿鶻突委曲包含不别是非要打成一片定是不可賀孫器逺問初學湏省事方做得工夫曰未能應得事終是省好然又怕要去省却有不省病痛某嘗看有時做事要省些工夫到得做出却有不好却不厭人意且如出路要減些用度令簡便到要用時沒討處也心煩依前是不曾省得若可無事時且省儘好若主家事及父母在上當代勞役終不成掉了去閒所在坐不管省事固好然一向不經歴到得事来却㑹被他来倒了問處鄉黨固當自盡不要理㑹别人若有事與已相關不可以不說當如何曰若合説便著説如所謂若要我頭也湏説若是不當自家説與其人不可説則只得不説然自家雖然是不説也湏示之以不然之意只有箇當説與不當説若要把他不是處做是説便決是不可賀孫曺問先生所解致知格物處某即就這上做去如未能到貫通處莫也無害否曰何謂無害公只是不曾學豈有不貫通處學得熟便通且如要去所在湏是去到方得若行得一日又説恐未必能到若如此怎生到得天下只有一箇道理緊包在那下撒破便光明那怕不通􅈠叔逺又問如孟子言勿忘勿助長却簡易而今要從細碎做去却怕不能貫通曰勿忘勿助長自是言養氣試取孟子説處仔細看大凡為學最切要處在吾心身其次便是做事此是的實緊切處又那裏見得如此湏是聖人之言今之學者湏是把聖人之言来窮究見得身心要如此做事要如此天下自有一箇道理若大路然聖人之言便是那引路底江文卿博識羣書因感先生之教自咎云某五十年前枉費許多工夫記許多文字曰也不妨如今若理㑹得這要緊處那許多都有用如七年十載積疊得柴了如今方㸃火燒賀孫謂江文卿曰多聞擇其善者而從之多見而識之公今却無擇善一著聖人擇善便是事不遺乎理公今知得便拽轉前許多工夫自不妨要轉便轉更無難者覺公意思尚放許多不下說㡬句又漸漸走上来如車水相似又滚将去又曰東坡說話固多不是就他一套中間又自有精處如說易說甚性命全然惡模様如說書却有好處如説帝王之興受命之祥如河圖洛書𤣥鳥生民之詩固有是理然非以是為先恨學者推之過詳流入䜟緯後人舉從而廢之亦過矣這是他說得好處公却不記得這般所在亦是自家本領不明若理㑹得原頭正到得看那許多方有辨别如程先生與禪子讀碑云公所看都是字某所看都是理似公如今所説亦都是字自家看見都是理賀孫周兄良問某平時所為把捉這心教定一念忽生則這心反被他引去曰這箇亦只是認教熟熟了便不如此今日一念纔生有以制之明日一念生又有以制之乆後便無此理只是這邊較少那邊較多便被他勝了如一車之火以少水勝之水撲處才滅而火又發矣又如弱人與强人相牽一般强人在門外弱人在門裏弱底不能勝便被他强底拖去了要得勝他亦只是将飬教力壮後自然可以敵得他去非别有箇道理也只在自家心有以處之耳孟子所謂捨則亡操則常存在此大學所謂忿懥好樂等事亦是除了此心則心自然正不是把一箇心来正一箇心又曰心只是敬程子所謂主一無適主一只是專一如在這裏讀書又思量做文字又思量别事去皆是不專又曰見得徹處徹上徹下只是一箇道理湏是見得實方是見得鐵定如是便為善不如是便為惡此方是見得實卓諸生說書畢先生曰諸公看道理尋得一線子脈絡著了說時也只是恁地但於持守處更湏加工夫湏是著實於行已上做得三兩分始得只恁説過不濟事周貴卿曰非不欲常常持守但志不能帥氣後臨事又變遷了曰只是亂道豈是由他自去正要待他去時撥轉来為仁由已而由人乎哉止吾止也往吾往也義剛李周翰請教屢歎年嵗之髙未免時文之累曰這湏是自見得從小兒也湏讀孝經論語来中間何故不教人如此曾讀書也湏疑著某所編小學公且仔細去看也有古人説話也有今人說話且看是如何古人都自少涵養好了後因說至善又問作時文先生曰讀書才說要做文字使此心便錯了若剰看得了到合說處便説當不説處不説也得本来不是要人說得便了如時文也只不出聖賢不多説話飜騰出来且如到説忠信處他也㑹說做好只是與自身全不相干因舉在漳州日詞訟訖有一士人立庭下待詢問乃是要来從學居泉州父母遣學舉業乃厭彼要從學某以其非父母命令且歸去得請再来始無所礙然其所見如此自别賀孫吳楶直翁問學亦頗知自立而病痛猶多奈何曰未論病痛人必全體是而後可以言病痛譬如純是白物事了而中有黑㸃始可言病痛公今全體都未是何病痛之可言設雖有善亦只是黑上出白㸃特其義理之不能已與氣質之或美耳大抵人湏先要趨向是若趨向正底人雖有病痛也是白地上出黑花此特其氣禀之偏未能盡勝耳要之白地多也趨向不正底人雖有善亦只是黑地上出白花却成差異事如孔門弟子亦豈能純善乎然終是白地多可愛也人湏先拽轉了自己趨向始得孔子曰苟志於仁矣無惡也既志於義理自是無惡雖有未善處只是過耳非惡也以此推之不志於仁則無善矣盖志在於利欲假有善事亦偶然耳盖其心志念念只在利欲上世之志利欲與志理義之人自是不干事志利欲者便如趨榛莽禽獸之徑志理義者便是趨正路鄉里如江徳功吳公濟諸人多少是激惱人然其志終在於善世亦有一種不激惱人底又見人說道理他也從而美之見人非佛老他亦從而非之但只是胡亂順人情說而心實不然不肯真箇去做此最不濟事伯羽某人来說書大槩只是揑合来説都不詳宻活熟此病乃是心上病盖心不專静純一故思慮不精明要湏飬得此心令虚明專静使道理從裏面流出便好銖曰豫六二介于石不終日貞吉正謂此曰然張仁叟問何以能如此莫只在静坐否曰自去檢㸃且一日間試看此幾箇時在内幾箇時在外小説中載趙公以黑白豆記善惡念之起此是古人做工夫處如此檢㸃則自見矣又曰讀書湏将心帖在書册上逐字看得各有著落方好商量湏是收拾此心令專静純一日用動静間都在不馳走散亂方看得文字精審如此方是有本領銖先生語陳公直曰讀書且逐些子理㑹莫要攪動他别底今人讀書多是從頭一向看到尾都攪渾了道夫先生嘗謂劉學古曰康節詩云閒居謹莫說無妨盖道無妨便是有妨要做好人則上面煞有等級做不好人則立地便至只在把住放行之間爾道夫彦忠問居常苦私意紛攪雖即覺悟而痛抑之然竟不能得潔静不起先生笑曰此正子静有頭之説却是使得惟其此心無主宰故為私意所勝若常加省察使良心常在見破了這私意只是從外面入縱饒有所發動只是以主待客以逸待勞自家這裏亦容他不得此事湏是平日著工夫若待他起後方省察殊不濟事道夫林士謙初見問仁智自得處曰仁者得其為仁智者得其為智豈仁智之外更有自得公此問不成問且去将論語從學而時習讀起孟子将梁惠王讀起大學從大學之道在明明徳讀起中庸從天命之謂性讀起某之法是如此不可只摘中間一兩句来理㑹意脉不相貫淳蘇宜久辭問歸欲觀易曰而今若敎公讀易只看古注并近世數家注又非某之本心若必欲教公依某之易看某底又只說得三分自有六七分曉不得亦非所以為教看来易是箇難理會底物事卒急看未得不若且未要理㑹聖人云詩書執禮皆雅言也看来聖人教人不過此數者公既理㑹詩了只得且理㑹書理㑹書了便當理㑹禮禮之為書浩瀚難理㑹卒急如何看得許多且如箇儀禮也是幾多頭項某因為思得一䇿不若且買一本温公書儀歸去子細看看得這箇不惟人家冠昏喪祭之禮便得他用兼以之看其他禮書如禮記儀禮周禮之屬少間自然易不過只是許多路逕節目温公書儀固有是有非然他那箇大槩是僩廖晋卿請讀何書曰公心放已乆精神收拾未定無非走作之時可且收斂精神方好商量讀書繼謂之曰玉藻九容處且去仔細體認待有意思方好讀書時舉厚之臨别請教因云看文字生曰日子足便熟可學陳希周請問讀書修學之門曰所謂讀書者只是要理㑹這箇道理治家有治家道理居官有居官道理雖然頭面不同然又只是一箇道理如水相似遇圎處圓方處方小處小大處大然亦只是一箇水耳時舉先生謂鄭光弼子直曰書雖是古人書今日讀之所以蓄自家之徳却不是欲這邊讀得些子便搬出做那邊用易曰君子以多識前言往行以蓄其徳公今却是讀得一書便做得許多文字馳騁跳躑心都不在裏面如此讀書終不干自家事又曰義利之辨正學者所當深知道夫子合純篤膚仲踈敏道夫先生謂正甫任忠厚遂安人精神專一倪鍾唐傑問窮理持敬曰此事不用商量若商量持敬便不成持敬若商量窮理便不成窮理湏令實理在題目之後盖卿閭丘次孟言嘗讀曲禮遺書康節詩覺得心意快活曰他本平鋪地說在裏公却帖了箇飛揚底意思在上面可知是恁地康節詩云真樂攻心不奈何某謂此非真樂也真樂便不攻心如顔子之樂何嘗恁地曰次孟何敢望康節直塗之人爾曰塗人却無許多病公正是肚裏有許多見識道理攪得恁地呌喚来又舉曲禮成誦先生曰但曲禮無許多呌喚曰次孟氣不足曰非氣不足乃氣有餘也道夫語元昭且要虚心勿要周遮元昭以十詩獻詩各以二句命題如實理之類節節推之先生指立命詩兩句幾度風霜猛摧折依前春草滿池塘既説道佛老之非又却流於佛老此意如何元昭曰言其無止息曰觀此詩與賢説話又異此只是要鬬勝知道安用許多言顔子當時不曾如此此只是要人知安排餖飣出来便不是末篇極致尤不是如何便到此直要撞破天門前日説話如彼今日又如此只是説話可學元昭告歸先生曰歸以何為工夫曰仔細觀来平生只是不實當於實處用工夫曰只是麄除去麄便是實曰每嘗觀書多只理㑹大意元不曾子細講究曰大意固合理㑹文義亦不可不講究最忌流於一偏明道曰與賢說話却似扶醉漢救得一邊倒了一邊今之學者大抵皆然如今人讀史成誦亦是玩物䘮志學者若不理㑹得聞這說話又一齊棄了只是停埋攤布使表裏相通方可然亦湏量力若自家力不及多讀無限書少間埋沒於其間不惟無益反為所害近日學者又有一病多求於理而不求於事求於心而不求於身如説一日克己復禮天下歸仁既能克己則事事皆仁天下皆歸仁於我此皆有實迹而必曰天下皆歸吾仁之中只是無形無影自龜山以来皆如此說徐承叟亦云見龜山說如此先生問元昭近来頗覺得如何曰自覺此心不實曰但不要窮髙極逺只於言行上㸃檢便自實今人論道只論理不論事只說心不說身其説至髙而蕩然無守流於空虚異端之說且如天下歸仁只是天下與其仁程子云事事皆仁是也今人湏要說天下皆歸吾仁之中其說非不好但無形無影全無下手脚處夫子對顔子克己復禮之目亦只是就視聴言動上理㑹凡思慮之類皆動字上包了不曾更出非禮勿思一條盖人能制其外則可以養其内固是内是本外是末但偏說存於中不說制於外則無下手脚處此心便不實外面儘有過言過行更不管却云吾正其心有此理否浙中王蘋信伯親見伊川来後来設教作怪舒州有語録之類專教人以天下歸仁才見人便說天下歸仁更不說克己復禮璘楊丞問心思擾擾曰程先生云嚴威整肅則心便一一則自無非僻之干只才整頓起處便是天理無别天理但常常整頓起思慮自一璘黄達才言思不能精之病曰硬思也不得只要常常提撕莫放下将乆自解有得義剛立之問某常於事物未来思慮未萌時覺見有惺惺底意思故其應變接物雖動却有不動之意存未知是否曰應變接物只要得是如敬以直内義以方外此可以盡天下之事若湏要不動則當好作事處又蹉過了時舉李伯誠曰打坐時意味也好曰坐時固是好但放下脚放開眼便不恁地了湏是臨事接物時長如坐時方可如挽一物様待他要去時硬挽将轉来方得義剛包顯道請誨曰但常常照管得那心便了人若能提掇得那心在時煞争事義剛劉炳韜仲以書問格物未盡處義未精曰此學者之通患然受病不在此這前面别有受病處余正叔曰豈其自然乎曰都不干别事本不立耳伯羽鄭昭先景紹請教曰今人却是倒置古人學而後仕今人却反仕而後學其未仕也非不讀書但心有所溺聖賢意思都不能見科舉也是奪志今既舉亦湏汲汲於學為學之道聖經賢傳所以告人者已竭盡而無餘不過欲人存此一心使自家身有主宰今人馳騖紛擾一箇心都不在軀殻裏孟子曰學問之道無他求其放心而已又曰存其心養其性所以事天也學者湏要識此道夫丘玉甫作别請益曰此道理儘說只如此工夫全在人人却聴得頑去聲了不曽真箇做湏知此理在已不在人得之於心而行之於身方有得力不可只做冊子工夫如某文字說話朋友想都曽見之想只是看過所以既看過依舊只如舊時只是将身掛在理義邊頭不曾真箇與之為一湏是決然見得未嘗離不可相捨處便自然著做不能已也又曰學者肯做工夫想是自有時然所謂時者不可等候只自肯做時便是也今學者自不以為飢如何强他使食自不以為渴如何强他使飲必大江元益問入徳曰徳者已之所自有入徳只是進得底且如仁義禮智自家不得便不是自家底幹江元益問門人勇者為誰曰未見勇者幹林叔和别去請教曰根本上欠工夫無歸宿處如讀書應事接物固當用功不讀書不應事接物時如何林好主葉正則之說曰病在先立論聖賢言語却只将来證他說凡讀書湏虚心且似未識字底将本文熟讀平看今日看不出明日又看看来看去道理自出閎祖周元卿問讀書有時半板前心在書上半板後忽然思慮他事口雖讀心自在别處如何得心只在書上曰此最不可不誠無物雖讀猶不讀也誠者物之終始如半板已前心在書上則只在半板有始有終半板以後心不在焉則無物矣壮祖謂諸友曰鄭仲履之學只管從小小處看不知經㫖初不如此觀書當從大節目處看程子有言平其心易其氣闕其疑則聖人之意可見矣盖卿方叔弟問平居時習而習中每覺有愧何也曰如此只是工夫不接續要習湏常令工夫接續則得又問尋求古人意思曰某嘗謂學者湏是信又湏不信乆之却自尋得箇可信底道理則是真信也大雅先生以林一之問卷示諸生曰一之恁地沉淪不能得超脱他説生物之心我與那物同便㑹相感這生物之心只是我底觸物便自然感非是因那物有此心我方有此心且赤子不入井牛不觳觫時此心何之湏常粧箇赤子入井牛觳觫在面前方有此惻隠之心無那物時便無此心乎又説義利作甚此心才有不存便錯了未說到那義利處淳林一之問先生說動静莫只是動中有静静中有動底道理曰固是如此然何湏将来引證某僻性最不喜人引證動中静静中動古人已說了今更引来要如何引證得是但與此文義不差耳有甚深長今自家理㑹這處便要将来得使恁地泛泛引證作何用明道言介甫說塔不是上塔今人正是說塔湏是要直上那頂上去始得說得濟甚事如要去取咸陽一直去取便好何必要問咸陽是如何廣狭城池在那處宫殿在那處亦何必説是雍州之地但取得其地便是今恁地引證恰似要説咸陽元不曽要取他地㝢郭叔雲問為學之初在乎格物物物有理從何處下手曰人箇箇有知不成都無知但不能推而致之耳格物是格物理至徹底處又云致知格物只是一事非是今日格物明日又致知格物以理言致知以心言恪先生教郭曰為學切湏收斂端嚴就自家身心上做工夫自然有所得恪與馮徳貞說為己為人曰若不為己看做甚事都只是為别人雖做得好亦不關已自家去從師也不是要理㑹身已自家去取友也不是要理㑹身已只是漫恁地只是要人説道也曽如此要人説道好自家又識得甚麽人自家又有㡬箇朋友這都是徒然說道看道理不曽著自家身已知何㑹曉得世上如此為學者多只看為己底是如何他直是苦切事事都是自家合做底事如此方可不如此定是不可今有人苦學者他因甚恁地苦只為見這物事是自家合做底事如人喫飯是自家肚飢定是要喫又如人做家主要錢使在外面百方做計壹錢也要将歸這是為甚如此只為自家身上事若如此為學如何㑹無所得賀孫余國秀問治心修身之要以為雖知事理之當為而念慮之間多與日間所講論相違曰且旋恁地做去只是如今且說箇熟字這熟字如何便得到這地位到得熟地位自有忽然不可知處不是被你硬要得直是不知不覺得如此賀孫國秀問向曾問身心性情之徳䝉批誨云云宋傑竊於自己省騐見得此心未發時其仁義禮智之體渾然未有區别於此敬而無失則發而為惻隠羞惡辭遜是非之情自有條理而不亂如此體認不知是否曰未湏說那敬而無失與未有區别及自有條理而不亂在且要識認得這身心性情之徳是甚底模様說未有區别亦如何得雖是未發時無所分别然亦不可不有所分别盖仁自有一箇仁底模様物事在内義自有箇義底模様物事在内禮智皆然今要就發處認得在裏面物事是甚模様故發而為惻隠必要認得惻隠之根在裏面是甚底物事發而為羞惡必要認得羞惡之根在裏面是甚底物事禮智亦如之譬如木有四枝雖只一箇大根然必有四根一枝必有一根也又問宋傑尋常覺得資質昏愚但持敬則此心虚静覺得好若敬心稍不存則裏面固是昏雜而發於外亦鶻突所以專於敬而無失上用功曰這裏未消説敬與不敬在盖敬是第二節事而今便把来夹雜說則鶻突了愈難理㑹且只要識得那一是一二是二便是虚静也要識得這物事不虚静也要識得這物事如未識得這物事時則所謂虚静亦是箇黑底虚静不是白底虚静而今須是要打破那黑底虚静換做箇白浄底虚静則八窓玲瓏無不融通不然則守定那裏底虚静終身黑淬淬地莫之通曉也燾問先生答余國秀云須理㑹得其性情之徳曰須知那箇是仁義禮智之性那箇是惻隠羞惡恭敬是非之情始得問且如與人相揖便要知得禮數合當如此不然則行矣而不著習矣而不察曰常常恁地覺得則所行也不㑹大段差舛胡泳用之舉似先生向日曾答蔡文書承喻以禮為先之說又似識造化之云不免倚於一物未知親切工夫耳大抵濓溪說得的當通書中數數拈出㡬字要當如此瞥地即自然有箇省力處無規矩中却有規矩未造化時已有造化此意如何曰幾箇要得且於日用處省察善便存放這裏惡便去而不為便是自家切已處古人禮儀都是自少理㑹了只如今人低躬唱喏自然習慣今既不可考而今人去理㑹合下便别将做一個大頭項又不道且理㑹切身處直是要理㑹古人因革一副當将許多精神都枉耗了元未切自家身已在又曰只有大學教人致知格物底便是就這處理㑹到意誠心正處展開去自然大若便要去理㑹甚造化先将這心弄得大了少間都沒物事說得滿賀孫林仲參問下學之要受用處曰潑底椅桌在屋下坐便是受用若貪慕外面髙山曲水便不是受用底舉詩云貧家浄掃地貧女好梳頭下士晚聞道聊以拙自修前人只恁地說了銖劉淮求教曰某無别法只是将聖賢之書虚心下氣以讀之且看這箇是那箇不是待得一回推出一囬新便是進處不然只是外面事只管做出去不見裏滋味如何責得他趙恭父再見問别後所讀書如何曰近覺得意思却不甚廹切曰若只恁地據見定做工夫却又有苟且之病去曰安敢苟且曰既不廹切便相将向這邊来又不可不察又問切已工夫如何愈見得已私難勝曰這箇也不須苦苦與他為敵但纔覺得此心随這物事去便與他喚囬来便都沒事謂南城熊曰聖賢語言只似常俗人說話如今須是把得聖賢言語湊得成常俗言語方是不要引東引西若說這句未通又引那句終乆兩下都理㑹不得若這句已通次第到那句自解通銖看文字不可過於踈亦不可過於宻如陳德本有過於踈之病楊志仁有過於宻之病盖太謹宻則少間看道理從那窮處去更挿不入不若且放下放開闊看燾器之看文字見得快叔䝉亦看得好與前不同賀孫許敬之侍教屢與言不合曰學未曉理亦無害說經未得其意亦無害且須静聴說話尋其語脉是如何一向强辯全不聴所說胷中殊無主宰少間只成箇狂妄人去淳純叟問方讀書時覺得無静底工夫湏有讀書之時有虚静之時曰某舊見李先生嘗教令静坐後来看得不然只是一箇敬字好方無事時敬於自持凡心不可放入無何有之鄉湏收斂在此及應事時敬於應事讀書時敬於讀書便自然該貫動静心無時不存德明先生見劉淳叟閉目坐曰淳叟待要遺物物本不可遺大雅坐間有及劉淳叟事曰不意其變常至此某向往奏事時来相見極口說陸子静之學大謬某因詰之云若子静學術自當付之公論公如何得如此說他此亦見他質薄處然其初間深信之畢竟自家喚做不知人賀孫辨姦論謂事之不近人情者鮮不為大姦慝每常嫌此句過當今見得亦有此様人某向年過江西與子夀對語而劉淳叟堯夫獨去後面角頭坐都不管學道家打坐被某罵云便是某與陸文言不足聴亦有數年之長何故恁地作怪義剛因論劉淳叟事云添差倅亦可以為論治三吏事云漕自来為之亦好不然委别了事人淳叟自為太掀揭故生事因論今趙帥可語鹽弊何不一言云某如何敢與大率以沉審為是出位為戒振陳寅仲問劉淳叟曰劉淳叟方其做工夫時也過於陳正已及其狼狽也甚於陳正已陳正已輕薄向到那裏覺得他意思大段輕薄每事只說道他底是他資質本自勞攘後来又去合那陳同父兼是伯恭教他時只是教他權數了伯恭教人不知是怎生地至此笑云向前見他門人有箇祭文云其有能底則教他立功名作文章其無能底便語他正心誠意義剛先生說陳正已薛象先喜之者何事賀孫云想是喜其有才汪長孺謂併無其才全做事不成曰叔權謂長孺他日觀氣質之變以騐進道之淺深此說最好大凡人須是子細沉静大學謂知止而後有定定而後能静静而後能安安而後能慮慮而後能得如一件物事自家知得未曾到這裏所見未曾定以無定之見遂要決斷此事如何斷得盡一件物事有長有短自家須實見得他那處是長那處是短如今便一定把著他短處便一齊沒他長處若只如此少間一齊不通禮記云疑事毋質直而勿有看古人都是恁地不敢草草周先生所以有主静之說如蒙艮二卦皆有静止之體洪範五事聴曰聰聰作謀謀属金金有静宻意思人之為謀亦欲静宻貎曰恭恭作肅肅屬水水有細潤意思人之舉動亦欲細潤聖人所以為聖人只是動静不失其時時止則止時行則行聖人這般所在直是則得好自家先恁地浮躁如何要發得中節做事便事事做不成說人則不曾說得著實又曰老子之術自有退後一著事也不攙前去做說也不曾説将出但任爾做得狼狽了自家徐出以應之如人當紛争之際自去僻静處坐任其如何彼之利害長短一一都冷看破了從旁下一著定是的當此固是不好底術數然較之今者浮躁胡說亂道底人彼又較勝因舉老子語豫兮若冬渉川猶兮若畏四鄰儼若客渙若氷将釋子房深於老子之學曹參學之有體而無用賀孫問姜叔權自言終日無思慮有寂然不動之意徳輔疑其已至曰且問他還能感而遂通天下之故否須是窮理若只如此則不須說格物致知問如此則叔權之静未是至曰固是徳輔戴明伯請教曰且将一件書讀聖人之言即聖人之心聖人之心即天下之理且逐段看令分曉一段分曉又看一段如此至一二十段亦未解便見箇道理但如此心平氣定不東馳西騖則道理自逐旋分明去得自家心上一病便是一箇道理明也道理固是自家本有但如今隔一隔了須逐旋揩磨呼喚得歸然無一喚便見之理如金溪只要自得若自得底是固善若自得底非却如何不若且虚心讀書讀書切不可自謂理㑹得了便理㑹得且只做理㑹不得某見說不㑹底便有長進不長進者多是自謂已理㑹得了底如此則非特終身不長進便假如釋氏三生十六刼也終理㑹不得又云此心先錯用向東去及至喚囬西邊又也只是那向東底心但只捩轉些頓放元不曾改換有一學者先佞佛日逐念金剛大悲呪不停口後来雖不念佛来誦大學論孟却依舊趕徧數荒荒忙忙誦過此亦只是将念大悲呪時意思移来念儒書爾必大括蒼徐元明名琳鄭子上同見先生說博學而詳說之將以反說約也今江西諸人之學只是要約更不務博本来雖有些好處臨事盡是鑿空杜撰至於吕子約又一向務博而不能反約讀得書多左牽右撰横說直說皆是此理只是不潔净不切要有牽合無謂處沈叔晦不讀書不教人只是所守者淺狭只有些子道理便守定了亦不博之弊璘陸深甫問為學次序曰公家庭尊長平日所以教公者如何陸云刪定叔祖所以見教者謂此心本無虧欠人須見得此心方可為學曰此心固是無虧欠然須是事事做得是方無虧欠若只說道本無虧欠只見得這箇便了豈有是理因說江西學者自以為得陸刪定之學便髙談大論略無忌憚忽一日自以為悟道明日與人飲酒如法罵人某謂賈誼云秦二世今日即位而明日射人今江西學者乃今日悟道而明日罵人不知所悟者果何道哉時舉包顯道書来言自壬子九月一省之後云云先生謂顯道曰人心存亡之決只在出入息之間豈有截自今日今時便鬼亂已後便悄悄之理聖賢之學是掯掯定定做不知不覺自然做得徹若如所言則是聖賢修為講學都不須得只等得一旦恍然悟去如此者起人僥倖之心義剛看孫吉甫書見得是要做文字底氣習且如兩漢晉宋隋唐風俗何嘗有箇人要如此變来只是其風俗之變滚来滚去自然如此漢末名節之極便變作清虚底道理到得陳隋以後都不理㑹名節也不理㑹清虚只是相與做一般纎艷底文字君臣之間把這文字做一件大事理㑹如進士舉是隋煬帝做出来至唐三百年以至國初皆是崇尚文辭鄭子上問風俗滚来滚去如何到本朝程先生出来便理㑹發明得聖賢道理曰周子二程說得道理如此亦是上面諸公挪䟎将来當楊劉時只是理㑹文字到范文正孫明復石守道李泰伯常夷甫諸人漸漸刋落枝葉務去理㑹政事思學問見於用處及胡安定出又教人作治事齋理㑹政事漸漸挪得近裏所以周程發明道理出来非一人之力也璘先生謂杜叔髙曰學貴適用先生謂魯可幾曰事不要察取盡道夫或問徐子顔曰其人有守但未知所見如何文蔚今學者有兩様意思鈍底又不能得他理㑹得到得意思快捷底雖能當下曉得然又恐其不牢固如龔郯伯理㑹也快但恐其不牢固賀孫先生問郭廷碩今如何曰也只如舊為學曰賢江西人樂善者多知學者少又說楊誠齋亷介清潔直是少謝尚書和易寛厚也煞朴直昔過湘中時曾到謝公之家頽然在敗屋之下全無一㸃富貴氣也難得又曰聞彭子夀造居甚大何必如此又及一二人曰以此觀謝尚書直是朴實祖道先生問湘鄉舊有從南軒遊者為誰佐對以周奭允升佐外舅舒誼周臣外舅沒已數嵗南軒答其論知言疑義一書載文集中允升藏修之所正枕江上南軒題曰漣溪書室鄉曲後學講習其間但允升今病不能出矣先生曰南軒向在静江曾得書甚稱說允升所見必别安得其一来次第送少藥物與之佐直卿告先生以趙友裕復有相招之意先生曰看今世務已自沒可奈何只得隨處與人說得識道理人多亦是幸事賀孫呂徳逺辭云将娶擬某日歸及期其兄云與舍弟商量了且更承教一月却歸曰公将娶了如何又恁地說此大事不可恁地宅中想都安排了須在等待不可如此了即日歸義剛季繹勸蔡季通酒止其泉南之行蔡決於先生先生笑而不答良乆云身勞而心安者為之利少而義多者為之人傑廣録云或有所欲為謀於先生曰心佚而身勞為之利少而義多為之先生看糊窓云有些子不齊整便不是他道理朱季繹云要好看却從外糊直卿云此自欺之端也賀孫朱子語類卷一百二十
