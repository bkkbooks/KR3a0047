body:
  text: 朱子語類卷九十二樂古今問古尺何所考曰羊頭山黍今不可得只依温公様他考必仔細然尺亦多様隋書載十六等尺說甚詳王莽貨泉議古尺徑一寸因出二尺曰短者周尺長者景表尺義剛十二律皆在只起黄鍾之宫不得所以起不得者尺不定也升卿律管只吹得中聲爲定季通甞截小竹吹之可騐若謂用周尺或羊頭山黍雖應凖則不得中聲終不是大抵聲太髙則噍殺低則盎緩牛鳴盎中謂此又云此不可容易杜撰劉歆為王莽造樂樂成而莽死後荀勗造於晉武帝時即有五胡之亂和峴造於周世宗時世宗亦死惟本朝太祖神聖特異初不曾理㑹樂但聼樂聲嫌其太髙令降一分其聲遂和唐太宗所定樂及夲朝樂皆平和所以世祚乆長笑云如此議論又却似在樂不在德也德明因論樂律云尺以三分為增減蓋上生下生三分損一益一故須一寸作九分一分分九釐一釐分九絲方如破竹都通得去人傑録云律管只以九寸為凖則上生下生三分益一損一如破竹矣其制作通典亦略備史記律書漢律厯志所載亦詳范蜀公與温公都枉了相争只通典亦未嘗看蜀公之言既踈温公又在下㽦無聲做管不成德明司馬遷説律只是推一箇通了十二箇皆通十二律自黄鍾而生黄鍾是最濁之聲其餘漸漸清若定得黄鍾是便入得樂都是這裏纔差了些子其他都差只是寸難定所以易差道夫樂聲黄鍾九寸最濁應鍾最清清聲則四寸半八十一五十四七十二六十四至六十四則不齊而不容分矣人傑音律如尖塔様闊者濁聲尖者清聲宫以下則太濁羽以上則太清皆不可為樂惟五聲者中聲也人傑樂律自黄鍾至中吕皆屬陽自㽔賔至應鍾皆屬隂此是一箇大隂陽黄鍾為陽大吕為隂太簇為陽夾鍾為隂每一陽間一隂又是一箇小隂陽閎祖自黄鍾至中吕皆下生自㽔賔至應鍾皆上生以上生下皆三生二以下生上皆三生四閎祖禮記注䟽說五聲六律十二管還相為宫處分明人傑旋宫且如大吕為宫則大吕用黄鍾八十一之數而三分損一下生夷則夷則又用林鍾五十四之數而三分益一上生夾鍾其餘皆然閎祖問先生所論樂今考之若以黄鍾為宫便是太簇為商姑洗為角㽔賔為變徴林鍾為徴南吕為羽應鍾為變宫若以大吕為宫便是夾鍾為商中吕為角林鍾為變徴夷則為徴無射為羽黄鍾為變宫其餘則旋相為宫周而復始若言相生之法則以律生吕便是下生以吕生律則為上生自黄鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生㽔賔㽔賔本當下生今却復上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕相生之道至是窮矣遂復變而上生黄鍾之宫再生之黄鍾不及九寸只是八寸有餘然黄鍾君象也非諸宫之所能役故虛其正而不復用所用只再生之變者就再生之變又缺其半所謂缺其半者蓋若大吕為宫黄鍾為變宫時黄鍾管最長所以只得用其半聲而餘宫亦皆倣此曰然又曰宫商角徴羽與變徴皆是數之相生自然如此非人力所加損此其所以為妙問既有宫商角徴羽又有變宫變徴何也曰二者是樂之和去聲相連接處道夫旋相為宫若到應鍾為宫則下四聲都當低去所以有半聲亦謂之子聲近時所謂清聲是也大率樂家最忌臣民陵君故商聲不得過宫聲然近時却有四清聲方響十六箇十二箇是律吕四片是清聲古來凡十二律却都有半聲所謂半聲者如㽔賔之管當用六寸却只用三寸雖用三寸聲却只是大吕但愈重濁耳又問聲氣之元曰律厯家最重這元聲元聲一定向下都定元聲差向下都差植饒夲云因論樂云黄鍾之律最長應鍾之律最短長者聲濁短者聲清十二律旋相為宫宫為君商為臣樂中最忌臣陵君故有四清聲如今方響有十六箇十二箇是正律四箇是四清聲清聲是減一律之半如應鍾為宫其聲最短而清或㽔賔為之商則是商聲髙似宫聲為臣陵君不可用遂乃用㽔賔律減半為清聲以應之雖然減半只是出律故亦自能相應也此是通典載此一項又云樂聲不可太髙又不可太低樂中上聲便是鄭衞所以太祖英明不可及當王朴造樂聞其聲太急便令減下一律其聲遂平徽宗朝作大晟樂其聲一聲低似一聲故其音緩又云賢君大槩屬意於雅樂所以仁宗晚年極力要理㑹雅樂終未理㑹得律逓相為宫到末後宫聲極清則臣民之聲反重故作折半之聲然止於四者以爲臣民不可大於君也事物大於君不妨五聲分為十二律添三分減三分至十二而止後世又增其四取四清聲璘宫與羽角與徴相去獨逺故於其間製變宫變徴二聲廣問周禮大司樂說宫角徴羽與七聲不合如何曰此是降神之樂如黄鍾為宫大吕為角太簇為徴應鍾為羽自是四樂各舉其一者而言之以大吕為角則南吕為宫太簇為徴則林鍾為宫應鍾為羽則太簇為宫以七聲推之合如此注家之說非也人傑律吕有十二用時只使七箇自黄鍾下生至七若更挿一聲便拗了淳七聲之說國語言之人傑律十有二作樂只用七聲惟宫聲筵席不可用用則賔主失歡力行云今人揲卦得乾卦者多不為吉故左傳言隨元亨利貞有是四德乃可以出曰然力行問國語云律者立均出度韋昭注云均謂均鍾木長七尺係之以弦不知其制如何曰韋昭是箇不分曉底人國語夲自不分曉更著他不曉事愈見鶻突均只是七均如以黄鍾為宫便用林鍾為徴太簇為商南吕為羽姑洗為角應鍾為變宫㽔賔為變徴這七律自成一均其聲自相諧應古人要合聲先須吹律使衆聲皆合律方可用後來人想不解去逐律吹得亰房始有律準乃是先做下一箇母子調得正了後來只依此為準國語謂之均梁武帝謂之通其制十三弦一弦是全律底黄鍾只是散聲又自黄鍾起至應鍾有十二弦要取甚聲用柱子來逐弦分寸上柱取定聲立均之意本只是如此古來解書最有一箇韋昭無理㑹且如下文六者中之色六字本只是黄字闕却上面一截他便就這六字上解謂六聲天地之中六者天地之中自是數干色甚事文蔚水火木金土是五行之序至五聲宫却屬土至羽屬水宫聲最濁羽聲最清一聲應七律共八十四調除二律是變宫止六十調人傑樂聲是土金木火水洪範是水火木金土人傑樂之六十聲便如六十甲子以五聲合十二律而成六十聲以十干合十二支而成六十甲子若不相屬而實相為用遺書云三命是律五星是厯即此說也只曉不得甲子乙丑皆屬木而納音却屬金前軰多論此皆無定説僴絲宫而竹羽人傑絲尚宫竹尚羽竹聲大故以羽聲濟之絲聲細故以宫聲濟之廣周禮以十二律為之度數如黄鍾九寸林鍾六寸之類以十二聲為之劑量斟酌磨削剛柔清濁音聲有輕重髙低故復以十二聲劑量盖磬材有厚薄令合節奏如磬氏已上則磨其旁已下則磨其端之類先生偶言及律吕謂管有長短則聲有清濁黄鍾最長則聲最濁應鍾最短則聲最清時舉云黄鍾夲為宫然周禮祭天神人鬼地示之時則其樂或以黄鍾為宫或以林鍾為宫未知如何曰此不可曉先儒謂商是殺聲鬼神所畏故不用而只用四聲迭相為宫未知其五聲不備又何以為樂大抵古樂多淡十二律之外又有黄鍾大吕太簇應鍾四清聲雜于正聲之間樂都可聴今古樂不可見矣長沙南嶽廟每祭必用樂其節奏甚善祭者乆立不勝其勞㨿圖經云是古樂然其樂器又亦用伏皷之類如此則亦非古矣時舉因云金聲玊振是樂之始終不知只是首尾用之還中間亦用耶曰樂有特鐘特磬有編鐘編磬編鐘編磬是中間奏者特鐘特磬是首尾用者時舉云所謂玉振者只是石耶還真用玉曰只是石耳但大樂亦有玉磬所謂天球是也問周禮祭不用商音或以為是武王用厭勝之術竊疑聖人恐無此意曰這箇也難曉須是問樂家如何不用商嘗見樂家言是有殺伐之意故祭不用然也恐是無商調不是無商音他那奏起來五音依舊皆在又問向見一樂書温公言夲朝無徴音竊謂五音如四時代謝不可缺一若無徴音則夲朝之樂大段不成說話曰不特夲朝從來無那徴不特徴無角亦無之然只是太常樂無那宴樂依舊有這箇也只是無徴調角調不是無徴音角音如今人曲子所謂黄鍾宫大吕羽這便是調謂如頭一聲是宫聲尾後一聲亦是宫聲這便是宫調若是其中按拍處那五音依舊都用不只是全用宫如說無徴便只是頭聲與尾聲不是徴這却不知是如何其中有箇甚麽欠缺處所以做那徴不成徽宗嘗令人硬去做然後來做得成却只是頭一聲是徴尾後一聲依舊不是依舊走了不知是如何平日也不曾去理㑹這須是樂家辨得聲音底方理㑹得但是這箇别是一項未消得理㑹義剛古者太子生則太師吹管以度其聲㸔合甚律及長其聲音髙下皆要中律南北之亂中華雅樂中絶隋文帝時鄭譯得之於蘇祗婆蘇祗婆乃自西域傳來故知律吕乃天地自然之聲氣非人之所能為譯請用旋宫何妥耻其不能遂止用黄鍾一均事見隋志因言佛與吾道不合者蓋道乃無形之物所以有差至如樂律則有數器所以合也閎祖六朝彈筝皷瑟皆歌節唐太宗不曉音律謂不在樂者只是胡說易唐祖孝孫說八十四調季通云只有六十調不以變宫變徴為調恐其說有理此左傳中聲以降五降之後不容彈矣之意也人傑自唐以前樂律尚有制度可考唐以後都無可考如杜佑通典所筭分數極精但通典用十分為寸作筭法頗難筭蔡季通只以九分筭夲朝范馬諸公非惟不識古制自是於唐制亦不曾詳看通典又不是隱僻底書不知當時諸公何故皆不看只如沈存中博覽筆談所考器數甚精亦不曾看此使其見此則所論過於范馬逺甚呂伯恭不喜筆談以為皆是亂說與某言未可恁地說恐老兄欺他未得在只是他做人不甚好耳因令將五音十二律冩作圗子云且須曉得這箇其他却又商量道夫問樂曰古聲只是和後來多以悲恨為佳温公與范蜀公胡安定與阮逸李照争辨其實都自理㑹不得却不曾去㸔通典通典說得極分明蓋此事在唐猶有傳者至唐末遂失其傳王朴當五代之末杜撰得箇樂如此當時有幾鍾名為啞鍾不曾擊得盖是八十四調朴調其聲令一一擊之其實那箇啞底却是古人制此不擊以避宫聲若一例皆擊便有陵節之患漢禮樂志劉歆說樂處亦好唐人俗舞謂之打令其狀有四曰招曰搖曰送其一記不得蓋招則邀之之意揺則揺手呼喚之意送者送酒之意舊甞見深村父老為余言其祖父嘗為之收得譜子曰兵火失去舞時皆裹幞頭列坐飲酒少刻起舞有四句號云送揺招揺三方一圎分成四片得在揺前人多不知皆以為啞謎漢卿云張滋約齊亦是張家好子弟曰見君舉說其人大曉音律因言今日到詹元善處見其教樂又以管吹習古詩二南七月之屬其歌調却只用太常譜然亦只做得今樂若古樂必不恁地美人聽他在行在録得譜子大凡壓入音律只以首尾二字章首一字是某調章尾即以某調終之如關雎關字合作無射調結尾亦著作無射聲應之葛覃葛字合作黄鍾調結尾亦著作黄鍾聲應之如七月流火三章皆七字起七字則是清聲調末亦以清聲調結之如五月斯螽動股二之日鑿氷冲冲五字二字皆是濁聲黄鍾調末以濁聲結之元善理㑹事都不要理㑹箇是只信口胡亂說事事喚做曾經理㑹來如宫商角徴羽固是就喉舌唇齒上分他便道只此便了元不知道喉舌唇齒上亦各自有宫商角徴羽何者蓋自有箇疾徐髙下賀孫温公與范忠文胡安定與阮逸李照等議樂空自争辯看得來都未是元不曾去看通典㨿通典中所說皆是又且分曉廣云如此則杜佑想是理㑹得樂曰這也不知他㑹否但古樂在唐猶有存者故他因取而載於書至唐末黄巢亂後遂失其傳至周世宗時王朴㨿他所見杜撰得箇樂出來通鑑中說王朴說當時鍾有幾箇不曾擊謂之啞鍾朴乃調其聲使皆可擊看得來所以存而不擊者恐是避其陵慢之聲故不擊之耳非不知擊之也廣范蜀公謂今漢書言律處折了八字蜀中房庻有古本漢書有八字所以與温公争者只争此范以古本爲正蜀公以上黨粟一千二百粒實今九寸為準濶九寸温公以一千二百粒排今一尺為準漢書云不甚順又粟有大小遂取中者為之然下粟時頓𦂳則粟又下了又不知如何為正排又似非是今世無人曉音律只憑器論造器又紛紛如此古人曉音律風角鳥占皆能之太史公以律論兵意出於此仁宗時李照造樂蜀公謂差過了一音每思之為之痛心劉羲叟謂聖上必得心疾後果然揚仁宗以胡安定阮逸樂書令天下名山藏之意思甚好道夫問温公論夲朝樂無徴音如何曰其中不能無徴音只是無徴調如首以徴音起而末復以徴音合殺者是徴調也徴調失其傳乆矣徽宗令人作之作不成只能以徴音起而不能以徴音終如今俗樂亦只有宫商羽三調而已淳蔡京用事主張喻世清作樂盡破前代之言樂者因作中聲正聲如正聲九寸中聲只八寸七分一按史記七字多錯乃是十分一其樂只是杜撰至今用之人傑徽宗時一黥卒魏漢津造雅樂一部皆杜撰也今太學上丁用者是此樂揚季通律書分明是好却不是臆說自有按據道夫問季通律書難曉曰甚分明但未細考耳問空圍九分便是徑三分曰古者只說空圍九分不說徑三分蓋不啻三分猶有竒也問筭到十七萬有餘之數當何用曰以定管之長短而出是聲如太簇四寸惟用半聲方和大抵考究其法是如此又未知可用與否耳節五聲須是知音律之人與審驗過方見得徳明季通理㑹樂律大段有心力看得許多書也是見成文字如史記律厯書自無人看到這裏他近日又成一律要盡合古法近時所作律逐節吹得却和怕如今未必如此這箇若促些子聲便焦殺若長些子便慢蕩賀孫陳淳言琴只可彈黄鍾一均而不可旋相為宫此說猶可至謂琴之泛聲為六律又謂六律為六同則妄矣今人彈琴都不知孰為正聲若正得一弦則其餘皆可正今調弦者云如此為宫聲如此為商聲安知是正與不正此須審音人方曉得古人所以吹管聲傳在琴上如吹管起黄鍾之指則以琴之黄鍾聲合之聲合無差然後以吹徧合諸聲五聲既正然後不用管只以琴之五聲為準而他樂皆取正焉季通書來說近已曉得但絣定七弦不用調弦皆可以彈十一宫琴之體是黄鍾一均故可以彈十一宫如此則大吕太簇夹鍾以下聲聲皆用按徽都無散聲蓋纔不按即是黄鍾聲矣亦安得許多指按耶兼如其說則大吕以下亦不可對徽須挨近苐九徽裏按之此後愈挨下去方合大吕諸聲蓋按著正徽復是黄鍾聲矣渠云頃問之太常樂工工亦云然恐無此理古人彈琴隨月調弦如十一月調黄鍾十二月調大吕正月調太簇二月調夹鍾但此後聲愈緊至十月調應鍾則弦急甚恐絶矣不知古人如何季通不能琴他只是思量得不知彈出便不可行這便是無下學工夫吾人皆坐此病古人朝夕習於此故以之上達不難蓋下學中上逹之理皆具矣如今說古人兵法戰陣坐作進退斬射擊刺皷行金止如何曉得他底莫說古人底曉不得只今之陣法也曉不得更說甚麽如古之兵法進則齊進退則齊退不令進而進猶不令退而退也如此則無人敢妄動然又却有一人躍馬陷陣殺數十百人出入數四矢石不能傷者何也良乆又曰㨿今之法只是兩軍相拄住相射相刺立得脚住不退底便贏立不住退底便輸耳僴今朝廷樂章長短句者如六州歌頭皆是俗樂皷吹之曲四言詩乃大樂中曲本朝樂章㑹要國史中只有數人做得好如王荆公做得全似毛詩甚好其他有全做不成文章横渠只學古樂府做辭拗強不似亦多錯字今之樂皆胡樂也雖古之鄭衞亦不可見矣今關雎鹿鳴等詩亦有人播之歌曲然聼之與俗樂無異不知古樂如何古之宫調與今之宫調無異但恐古者用濁聲處多今樂用清聲處多季通謂今俗樂黄鍾及夹鍾清如此則争四律不見得如何般渉調者胡樂之名也般如般若之般子在齊聞韶㨿季扎觀樂魯亦有之何必左齊而聞之也又夫子見小兒徐行恭謹曰韶樂作矣人傑詹卿家令樂家以俗樂譜吹風雅篇章初聞吹二南詩尚可聽後吹文王詩則其聲都不成模様因言古者風雅頌名既不同其聲想亦各别廣趙子敬送至小雅樂歌以黄鍾清為宫此便非古清者半聲也唐末喪亂樂人散亡禮壊樂崩朴自以私意撰四清聲古者十二律外有十二子聲又有變聲六謂如黄鍾之正聲而用其子聲故漢書云黄鍾不與他律為役者此也若用清聲為宫則夲聲輕清而髙餘聲重濁而下禮書中删去乃是樂律通典中盖說得甚明夲朝如胡安定范蜀公司馬公李照輩元不曾㸔徒自如此争辨也漢書所載甚詳然不得其要太史公所載甚畧然都是要𦂳處新修禮書中樂律補篇以一尺為九寸一寸為九分一分為九厘一厘為九毫一毫為九絲方子樂律中所載十二詩譜乃趙子敬所傳云是唐開元間鄉飲酒所歌也但却以黄鍾清為宫此便不可盖黄鍾管九寸最長若以黄鍾為宫則餘律皆順若以其他律為宫便有相陵處今且以黄鍾言之自第九宫後四宫則或為角或為羽或為商或為徴若以為角則是民陵其君矣若以為商則是臣陵其君矣徴為事羽為物皆可類推樂記曰五者皆亂迭相陵謂之慢如此則國之滅亡无日矣故製黄鍾四清聲用之清聲短其律之半是黄鍾清長四寸半也若後四宫用黄鍾為角徴商羽則以四清聲代之不可用黄鍾本律以避陵慢故漢志有云黄鍾不復為他律所役其他律亦皆有清聲若遇相陵則以清聲避之不然則否惟是黄鍾則不復為他律所用然沈存中續筆談説云惟君臣民不可相陵事物則不必避先生一日又説古人亦有時用黄鍾清為宫前説未是廣音律只有氣人亦只是氣故相闗揚今之士大夫問以五音十二律無能曉者要之當立一樂學使士大夫習之乆後必有精通者出升卿今人都不識樂器不聞其聲故不通其義如古人尚識鐘鼓然後以鐘鼔為樂故孔子云樂云樂云鐘鼔云乎㦲今人鐘鼓已自不識揚鎛鐘甚大特懸鐘也衆樂未作先擊特鐘以發其聲衆樂既闋乃擊特磬以收其韻僴堂上樂金鐘玉磬今太常玉磬鎻在櫃裏更不曾設恐為人破損無可賠還尋常交割只據文書若要㸔旋開櫃取一二枚視之人傑今之簫管乃是古之笛雲簫方是古之簫廣畢篥本名悲栗言其聲之悲壮也廣俗樂中無徴聲蓋没安排處及無黄鍾等四濁聲㽦今之曲子亦各有某宫某宫云今樂起處差一位璘洛陽有帶花劉使名几於俗樂甚眀蓋曉音律者范蜀公徒論鍾律其實不曉但守死法若以應鍾為宫則君民事物皆亂矣司馬公比范公又低二公於通典尚不曽㸔通典自説得分曉史記律書説律數亦好此盖自然之理與先天圖一般更無安排但數到窮處又須變而生之却生變律人傑劉几與伶人花日新善其弟厭之令勿通几戒花吹笛於門外則出與相見其弟又令終日吹笛亂之然花笛一吹則劉識其音矣人傑向見一女童天然理㑹得音律其歌唱皆出於自然盖是禀得這一氣之全者人傑胡問今俗妓樂不可用否曰今州縣都用自家如何不用得亦在人斟酌淳朱子語類卷九十二
