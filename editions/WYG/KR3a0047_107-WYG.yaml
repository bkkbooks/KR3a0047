body:
  text: 朱子語類卷一百七朱子四内任言丙辰後雜行孝宗朝六月四日周揆令人諭意云上問朱某到已數日何不請對遂詣閤門通進榜子有㫖初七日後殿班引及對上慰勞甚渥自陳昨日浙東提舉日荷聖恩保全上曰浙東救荒煞究心又言蒙除江西提刑衰朽多疾不任使令上曰知卿剛正只留卿在這裏待與清要差遣再三辭謝方出奏劄上曰正所欲聞口奏第一劄意言犯惡逆者近來多奏裁減死上曰似如此人只貸命有傷風教不可不理㑹第四劄言科罰上曰聞多是羅織富民第五劄讀至置將之權旁出閹寺上曰這箇事却不然盡是採之公論如何由他對曰彼雖不敢公薦然皆託於士大夫之公論而實出於此曹之私意且如監司守臣薦屬吏葢有受宰相臺諌風㫖者况此曹奸偽百出何所不可臣徃蒙賜對亦嘗以此為說聖諭謂為不然臣恐䟽逺所聞不審退而得之士大夫與夫防夫走卒莫不謂然獨陛下未之知耳至去者未逺而復還謂丼昇問上曰陛下知此人否上曰固是但漏洩文書乃是他子弟之罪對曰豈有子弟有過而父兄無罪然此特一事耳此人挾勢為奸所以為盛徳之累者多矣上曰髙宗以其有才薦過來對曰小人無才尚可小人有才鮮不為惡上因舉馬蘇論才徳之辯云云至當言責者懐其私以緘黙奏曰陛下以曽任知縣人為六院察官闕則取以充之雖曰親擢然其涂轍一定宰相得以先布私恩於合入之人及當言責徃徃懐其私㤙豈肯言其過失上曰然近日一事可見矣至知其為贒而用之則用之唯恐其不速聚之唯恐其不多知其為不肖而退之則退之唯恐其不早去之唯恐其不盡奏曰豈有慮君子太多湏留幾箇小人在裏人之治身亦然豈有慮善太多湏留些惡在裏至軍政不脩士卒愁怨曰主將刻剥士卒以為苞苴陞轉階級皆有成價上曰却不聞此果有時豈可不理㑹卿可子細採探却來說末後辭云照對江西係是盜賊刑獄浩繁去處乆闕官正臣今迤邐前去之任不知有何處分上曰卿自諳練不在多囑閎祖今之兵官有副都總管路鈐路分都監統領將官州鈐轄州都監而路鈐路分統領之類多以貴㳺子弟處之至如副都總管事體極重向以節度使為之後有以修武郎為之者如州統領至有以下班祇應為之者此士夫所親見只今天下無虞邊境不聳故無害萬一略有警便難承當兵政病敗未有如今日之甚者某屢言於夀皇夀皇謂某曰命將國之大事非朝廷之公選即諸軍之公薦決無他也某奏云陛下但見列薦於朝廷之上以為是皆公選而不知皆結托來爾且如今之文臣列薦者陛下以為果皆出於公乎不過有勢力者一書便可得夀皇曰果爾誠所當察卿其為朕察之道夫寧宗朝初見先生即拜問云先生難進易退之風天下所共知今新天子嗣位乃幡然一來必將大有論建先生笑云只為當時不合出長沙在官所有召命又不敢固辭又云今既受了侍從職名却不容便去先生云正為如此又笑云若病得狼狽時也只得去自修在講筵時論嫡孫承重之服當時不曽帶得文字行旋借得儀禮看又不能得分曉不免以禮律為證後來歸家檢注䟽看分明說嗣君有廢疾不任國事者嫡孫承重當時若冩此文字出去誰人敢争此亦講學不熟之咎人傑祧僖祖之議始於禮官許及之曽三復永嘉諸公合為一辭先生獨建不可祧之議陳君舉力以為不然趙揆亦右陳說文字既上有㫖次日引見上出所進文字云髙宗不敢祧夀皇不敢祧朕安敢祧再三以不祧為是既退而政府持之甚堅竟不行唯謝中丞入文字右先生之說乞且依禮官初議為樓大防所繳卒祧僖祖云閎祖先生檢熈寧祧廟議示諸生云荆公數語是甚次第若韓維孫固張師顔等所說如何及得他最亂道是張師顔說當時親法之議也如此是多少人說都說不倒東坡是甚麽様㑹辯也說得不甚切荆公可知是動得人主前日所論欲祧者其說不出三項一欲祧僖祖於夾室以順翼宣祖所祧之主祔焉但夾室乃偏側之處若藏列祖於偏側之處而太祖以孫居中尊是不可也一是欲祔景靈宫景靈宫元符所建貌象西畔六人東向其四皆依道家冠服是四祖二人通天冠絳紗袍乃是太祖太宗暗地設在裏不敢明言某書中有一句說云云今既無頓處况元初奉祀景靈宫聖祖是用簠簋籩豆又是蔬食今若祔列祖主祭時湏用葷腥湏用牙盤食這也不可行又一項是欲立别廟某說若立别廟湏大似太廟乃可又不知祫祭時如何終不成四人令在那一邊幾人自在這一廟也只是不可不知何苦如此其說不過但欲太祖正東向之位别更無說他所謂東向又那曽考得古時是如何東向都不曽識只從少時讀書時見奏議中有說甚東向依稀聴得如今廟室甚狹外面又接簷似乎濶三丈深三丈祭時各捧主出祭東向位便在楹南簷北之間後自坐空昭在室外後却靠實穆却在簷下一帶亦坐空如此則東向不足為尊昭一列却有面南居尊之意古者室中之事東向乃在西南隅所謂奧故為尊合祭時太祖位不動以群主入就尊者左右致饗此所以有取於東向也今堂上之位既不足以為尊何苦要如此乃使太祖無所自出祝禹圭云僖祖以上皆不可考曰是不可考要知定是有祖所自出不然僖祖却從平地爆出來是甚說話問郊則如何曰郊則自以太祖配天這般事最是宰相没主張奏議是趙子直編是他當初已不把荆公做是了所以將那不可桃之說皆附於注脚下又甚率略那許多要祧底話却作大字冩不知那許多是説箇甚麽只看荆公云反屈列祖之主下祔子孫之廟非所以順祖宗之孝心如何不説得人主動當時上云朕聞之矍然敢不祗允這許多只閒説只是好勝都不平心看道理又云某嘗在上前説此上亦以為不可云髙宗既不祧夀皇既不祧朕又安可為奈何都無一人將順這好意思某所議趙丞相白乾地不付出可怪賀孫問本朝廟制韓維請遷僖祖孫固欲為僖祖立别廟王安石欲以僖祖東向其議如何曰韓説固未是孫欲立别廟如姜嫄則姜嫄是婦人尤無義理介甫之説却好僖祖雖無功徳乃是太祖嘗以為髙祖今居東向所謂祖以孫尊孫以祖屈者也近者孝宗祔廟趙丞相主其事因祧宣祖乃併禧祖祧之令人毁拆僖祖之廟當時集議某不曽預只入文字又於上前説此事末云臣亦不敢自以為是更乞下禮官與群臣集議趙丞相遂不付出當時曽無玷陳君舉之徒全然不曉但謝子肅章茂獻却頗主某説又孫從之云僖祖無功徳某云且如秀才起家貴顯是自能力學致位何預祖宗而朝廷贈官必及三代如公之説則不必贈三代矣僖祖有廟則其下子孫當祧者置於東西夾室於理為順若以太祖為尊而自僖祖至宣祖反置於其側則太祖之心安乎又問趙丞相平日信先生何故如此曰某後來到家檢渠所編本朝諸臣奏議正主韓維等説而作小字附注王安石之説於其下此惡王氏之僻也又問廟門堂室之制曰古之士廟如今之五架屋以四分之一為室其制甚狹近因在朝見太廟之堂亦淺祫祭時太祖東向乃在虚處群穆軰簷而坐臨祭皆以帟幙圍之古人祭惟朝踐在堂它祭皆在室中户近東則太祖與昭穆之位背處皆實又其祭逐廟以東向為尊配位南向若朝踐以南向為尊則配位西向矣又問今之州縣學先聖有殿只是一虚敞處則堂室之制不備曰古禮無塑像只云先聖位向東又問若一一理㑹則更無是處曰固是人傑太廟向有十二室今祔孝宗却除了僖祖宣祖兩室止有十一室止有八世進不及祖宗時之九退不得如古之七豈有祔一宗而除兩祖之理况太祖而上又豈可不存一始祖今太祖在廟而四祖並列四夾室亦甚不便某謂止祧宣祖合存僖祖既有一祖在上以下諸祖列于西夾室猶可或言周祖后稷以其有功徳今僖祖無功不可與后稷並論某遂言今士大夫白屋起家以至榮顯皆説道功名是我自致何關於乃祖乃父則朝廷封贈三代諸公能辭而不受乎况太祖初來自尊僖祖為始祖諸公必忍去之乎某聞一日集議遂辭不赴某若去時必與諸公合炒去乃是陳君舉與趙子直自如此做曽三復孫逢吉亦主他説中間若謝子肅章茂獻張春卿樓大防皆以為不安云且待朱丈來商量曽三復乃云乘此機㑹祧了這是甚麽事乘機投㑹恁地急某先有一奏議投了樓張諸公上劄乞降出朱某議若某言近理臣等敢不遵從趙子直又不付出至於乘夜撤去僖祖室兼古時遷廟又豈應如此偶一日接奉使兩府侍從皆出以官馹狹侍郎幙次在茶坊中而隔幙次説及此某遂辨説一畨諸公皆順聴陳君舉謂今各立一廟周時后稷亦各立廟某説周制與今不同周時豈特后稷各立廟雖赧王也自是一廟今立廟若大於太廟始是尊祖今地歩狹窄若别立廟必做得小小廟宇名曰尊祖實貶之也君舉説幾句話皆是臨時去撿注脚來説某告之云某所説底都是大字印在那裏底却不是注脚細字向時大廟一帶十二間前堂後室每一廟各占一間祧廟之主却在西夾室今立一小廟在廟前不知中間如何安排後來章茂獻謝深甫諸公皆云悔不用朱丈之説想也且恁地説正淳欲借奏草看曰今事過了不湏看賀孫集議欲祧僖祖正太祖東向之位先生以為僖祖不可祧惟存此則順翼宣祧祖可以祔入劉知夫云諸公議欲立僖祖廟為别廟陳君舉舎人引閟宫為故事先生曰閟宫詩而今人都説錯了又因論周禮祀先王以衮冕祀先公以鷩冕此乃不敢以天子之服加先公故降一等直卿云恐不是祭以大夫之義先生曰祭自用天子禮只服略降耳時舉問甲寅祧廟其説異同曰趙丞相初編奏議時已將王介甫之説不作正文冩只注小字在下又曰祧廟亦無毁拆之理曰曽入文字論祧朝奏云此事不可輕易上云説得極好以髙宗朝不曽議祧孝宗朝不曽議祧卿云不可輕易極是又奏云陛下既以臣言為然合下臣章䟽集議却不曽降出過今日偶見韓持國廟議都不成文字元祐諸賢文字大率如此只是胡亂討得一二浮辭引證便將來立議論抵當他人似此様議論如何當得王介甫所以當時只被介甫出便揮動一世更無人敢當其鋒只看王介甫廟議是甚麽様文字他只是數句便說盡更移動不得是甚麽様精神這幾箇如何當得他伊川最説得公道云介甫所見終是髙於世俗之儒又曰朱公掞排禪學劄子其所以排之者甚正只是這般様論如何排得他也是胡亂討幾句引證便要斷倒他可笑之甚時吕正獻公作相好佛士大夫競徃參禪寺院中入室陞堂者皆滿當時號為禪鑚去聲故公掞上䟽乞禁止之僴實録院略無統紀修撰官三員檢討官四員各欲著撰不相統攝所修前後徃徃不相應先生嘗與衆議欲以事目分之譬之六部吏部專編差除禮部專編典禮刑部專編刑法湏依次序編排各具首末然後類聚為書方有條理又如一事而記載不同者湏置簿抄出與衆㑹議然後去取庶幾存得搃底在唯葉正則不從葉為檢討正修髙宗實録閎祖今之史官全無相統攝每人各分一年去做或有一件事頭在第一年末稍又在第二三年者史官只認分年去做及至把來全鬬湊不著某在朝時建議説不要分年只分事去做且天下大事無出吏禮兵刑工户六件事如除拜注授是吏部事只教分得吏事底人從建炎元年逐一編排至紹興三十二年他皆倣此却各將來編年逐月類入衆人不從某又云若要逐年做湏是實置三簿一簿闗報上下年事首末首當附前年某月末當附後年某月一簿承受所闗報本年合入事件一簿考異向後各人收拾得也存得箇本又别置一簿列具合立傳者若干人某人傳當行下某處收索行狀墓誌等文字專牒轉運司疾速報應已到者勾銷簿未到者㨿數再催庶幾易集後來去國聞此説又不行賜而今史官不相統揔只是各自去書書得不是人亦不敢改更是他書了亦不將出來㨿他書放那裏知他是不是今雖有那日厯然皆是兼官無暇來修得而今湏是别差六人鎻放那裏教他專工修方得如近時作髙宗實録却是教人管一年這也不得且如這一事頭在去年尾在今年那書頭底不知尾書尾底不知頭都不成文字如為臣下作𫝊某將來看時説得詳底只是冩行狀其略底又恰如春秋樣更無本末可攷又有差除去了底這一截又只休了如何地稽攷㨿某看來合分作六項人管一事謂如刑事便去闗那刑部文字看他那用刑皆有年月恁地把來編類便成次序那五者皆然俟編一年成了却合歛來如元年五月一日有某事這一月内事先後便皆可見且如立傳他那日月上薨卒皆有年月在這便當印板行下諸州索行實墓誌之屬却今運司專差一人督促史院却去督促運司有未到底又刷下去催來便恁地便好得成箇好文字而今實録他們也是將日厯做骨然却皆不曽實用心有時攷不得後將牒下州縣去討那州郡不應也不管恁地如何解理㑹得義剛近世修史之弊極甚史官各自分年去做既不相闗又不相示亦有事起在第一年而合殺處在二年前所書者不知其尾後所書者不知其頭有做一年未終而忽遷他官自空三四月日而不復修者有立某人傳移文州郡索事實而竟無至者嘗觀徽宗實録有傳極詳似只冩行狀墓誌有傳極略如春秋様不可曉其首末雜手所作不成倫理然則如之何本朝史以日厯為骨而參之以他書今當於史院置六房吏各專掌本房之事如周禮官屬下所謂史幾人者即是此類如吏房有某注差刑房有某刑獄户房有某財賦皆各有冊糸日月而書其吏房有事渉刑獄則闗過刑房刑房有事渉財賦則闗過戸房逐月接續為書史官一閲則條目具列可以依㨿又以合立傳之人列其姓名于轉運司令下諸州索逐人之行狀事實墓誌等文字專委一官掌之逐月送付史院如此然後有可下筆處及異日史成之後五房書亦各存之以備漏落淳君舉謂不合與諸公爭辯這事難説嘗記得林少頴見人好說話都記冩了嘗舉一項云國家嘗理㑹山陵要委諭民間遷去祖墳事後區處未得特差某官前徃定奪果當如何這箇官人看了乃云只消看中做林說這話說得不是當時只要理㑹當遷與不當遷當遷去雖盡去亦得若不當遷雖一毫不可動當與不當這便是中如何於二者之間酌中做此正是今時人之大病所以大學格物窮理正要理㑹這些湏要理㑹教是非端的分明不如此定不得如初間看善惡如隔一牆只管看來漸漸見得善惡如隔一壁看得隔一壁底已自勝似初看隔一牆底了然更看得又如隔一幅紙這善惡只是争些子這裏看得直是透善底端的是善惡底端的是惡略無些小疑似大學只要論箇知與不知知得切與不切先生看天雨憂形於色云第一且是􅑼宫掘箇窟在那裏如何保得無水出梓宫甚大􅑼宫今濶四丈自成池塘奈何奈何這雨浸淫已多日奈何賀孫是夜雨甚先生屢惻然憂歎謂明日掩􅑼雨勢如此奈何再三憂之賀孫問紹興山陵土甚卑不知如何曰固是可慮只這事前日既在那裏部說來只滿朝無一人可恃卒為下面許多隂陽官占住了問聞趙丞相前亦入文字說得甚好曰是說得煞好後來一不從也只住了自髙宗􅑼宫時在蜀中入文字說此今又舉此不知如何又只如此住了某初到亦入一文字後來却差孫從之相視只孫從之是朝中煞好人他初間畫三項利害云展發引之期别卜􅑼宫上䇿也只依舊在紹興下䇿也說得煞力到得相視歸來更說得沒理㑹到後來又令集議初已告報日子待到那一日四更時忽扣門報云不湏集議待問其故云已再差官相視時鄭恵叔在吏書乃六部之長闗集都是他當時但聼得說差官便止了衆人集議當時若得集議一番湏說得事理分明初孫從之去那曾得看子細纔到那裏便被守把老閹促將去云這裏不是乆立處某時在景靈宫行香聞此甚叵耐即與同坐諸公說如此亦不可不說遂囬聚於鄭恵叔處待到那裏更無一人下手作文字只管教某某云若作之何辭止縁某前日已入文字今作出又止此意思得諸公更作庶說得更透切都只說過更無人下手某遂推劉得脩作劉遂下手鄭恵叔又只管說不消説如何某說這是甚麽様大事如何恁地住遂顧左右即取紙筆令劉作衆人合湊遂成待去到待漏院要進都署衘位各了黄伯耆者他已差做相視官定了不簽他他又來湏要簽又換文字將上待得他去相視歸來却説道自好這事遂定滿朝士夫都靠主不得便如此這般事為臣子湏做一家事盡心竭誠乃可明知有不稳當事大體重如此如何住得他説湏要山是如何水湏從某方位盤轉經過某方位從某方位環抱方可用不知天地如何恰生這般山依得這般様子更莫管他也依他説為臣子也湏盡心尋求那知不有如此樣驀忽更有也未可知如何便住得聞亦自有人來説幾處可用都被那邊計較阻抑了又云許多侍從也不學宰相也不學將這般大事只恁地做且如祧廟主議某時怕去争炒遂不去只入文字後來説諸公在那日争起譁然甚可畏宰相都自怕了君舉所主廟議是把禮記祖文王宗武王為㨿上面又説祖契而宗湯又引詩小序禘太祖詩序有甚牢固又引烝祭歲文王騂牛一武王騂牛一那時自是卜洛之始未定之時一時禮數如此又用國語亦是難憑器之問濮議如何先生曰歐公説固是不是辨之者亦説得偏既是所生亦不可不略示殊異若止封皇伯與其他皇伯等亦不可湏封號為太王之類乃可伊川先生有説但後來已自措置得好凡祭享禮數一付其下面子孫朝廷無所預賀孫林丈説彭子夀彈韓􅇑胄只任氣性不顧國體致伌胄大憾放趙相激成後日之事曰他純不曉事情率爾而妄舉淳丙辰後正卿問命江陵之命將止於三辭曰今番死亦不出纔出便只是死賀孫直卿云先生去國其他人不足責如呉徳夫項平父楊子直合乞出先生曰諸人怕做黨錮看徳夫是不解恁地且如楊子直前日纔見某入文字便來勸止且攅著眉做許多模樣某對他云公何消得恁他如今都是這一串説話若一向絶了又都無好人去賀孫季通被罪臺謂及先生先生飯罷樓下起西序行數囬即中位打坐賀孫退歸精舍告諸友漢卿筮之得小過公弋取彼在穴曰先生無虞蔡所遭必傷即同輔萬季弟至樓下先生坐睡甚酣因諸生偶語而覺即揖諸生諸生問所聞蔡丈事如何曰州縣捕索甚急不曉何以得罪因與正淳説早上所問孟子未通處甚詳繼聞蔡已遵路防衛頗嚴諸友急徃中涂見别先生舟徃不及聞蔡留邑中皆詹元善調䕶之先生初亦欲與經營包顯道因言禍福已定徒爾勞擾先生嘉之且云顯道説得自好未知當局如何是夜諸生坐樓下圍爐講問而退聞蔡編管道州乃沈繼祖文字主意詆先生也賀孫或有謂先生曰沈繼祖乃正淳之連袂也先生笑曰彌子之妻與子路之妻兄弟也何傷哉人傑先生徃浄安寺候蔡蔡自府乘舟就貶過浄安先生出寺門接之坐方丈寒暄外無嗟勞語以連日所讀參同契所疑扣蔡蔡應答洒然少遲諸人醵酒至飲皆醉先生間行列坐寺前橋上飲囬寺又飲先生醉睡方坐飲橋上詹元善即退去先生曰此人富貴氣賀孫論及偽學事云元祐諸公後來被紹聖群小治時却是元祐曽去撩撥它來而今却是平地起這件事出義剛有一朋友㣲諷先生云先生有天生徳於予底意思却無㣲服過宋之意先生曰某又不曽上書自辯又不曽作詩謗訕只是與朋友講習古書説這道理更不教做却做何事因曰論語首章言人不知而不愠不亦君子乎斷章言不知命無以為君子賜錄云且以利害禍福言之此是至粗底此處人都信不及便講學得待如何亦沒安頓處今人開口亦解一飲一啄自有定分及遇小小利害便生趨避計較之心古人刀鋸在前鼎鑊在後視之如無物者賜録作如履平地盖縁只見得這道理都不見那刀鋸鼎鑊又曰死生有命如合在水裏死湏是溺殺此猶不是深奥底事難曉底話如今朋友都信不及覺見此道日孤令人意思不佳人傑或勸先生散了學徒閉户省事以避禍者先生曰禍福之來也廣先生曰如某軰皆不能保只是做將去事到則盡付之人欲避禍終不能避徳明今為辟禍之説者固出於相愛然得某壁立萬仭豈不益為吾道之光閎祖其黙足以容只是不去擊鼓訟寃便是黙不成屋下合説底話亦不敢説也同或有人勸某當此之時宜略從時某答之云但恐如草藥煆煉得無性了救不得病耳僴有客遊二廣多年知其山川人物風俗因言亷州山川極好先生笑曰被賢説得好下梢不免去行一番此時黨事方起又因問舉業先生笑曰某少年時只做得十五六篇義後來只是如此發舉及第人但不可不㑹作文字及其得也只是如此今人却要求為必得豈有此理祖道時偽學之禁嚴彭子夀䥴三官勒停諸權臣之用事者睥睨不已先生曰某今頭常如黏在頸上又曰自古聖人未嘗為人所殺胡泳雜記言行某嘗言吾儕講學正欲上不得罪於聖賢中不誤於一已下不為來者之害如此而已外此非所敢與道夫吾軰不用有忿世疾惡之意當常自體此心寛明無係累則日充日明豈可涯涘耶泛愛親仁聖人忠恕體用端的如此振人言好善嫉惡而今在閑處只見疾惡之心愈至伯謨曰唯其好善所以嫉惡道夫先生愛説恰好二字云凡事自有恰好處過先生每語學者云凡事無許多閒勞攘過先生每論及靖康建炎間事必蹙額慘然太息乆之義剛長孺問先生湏得邵堯夫先知之術先生乆之曰吾之所知者惠廸吉從逆凶滿招損謙受益若是明日晴後日雨吾又安能知耶㦛因言科舉之學問若有大賢居今之時不知當如何曰若是第一等人它定不肯就又問先生少年省試報罷時如何曰某是時已自斷定若那畨不過省定不復應舉矣僴有為其兄求薦書先生曰沒奈何為公發書某只云某人為某官亦老成諳事亦可備任使更湏求之公議如何某不敢必辛弃疾是朝廷起廢為監司初到任也湏采公議薦舉他要使一路官員他所荐舉湏要教一路官員知所激勸是如何人他若把應副人情有書來便取去這一任便倒了某兩為太守嘗備員監司非獨不曽以此事􅈤人而人亦不曽敢以此事􅈤某自謂平日脩行得這些力他明知以私意來􅈤祝必被某責然某看公議舉人是箇好人人人都知若是舉錯了也是自家錯了本不是應付人情又不是交結權勢又不是被他獻䛕這是多少明白人皆不來私􅈤其間有當薦之人自公舉之待其書來説某已自舉荐他了更無私􅈤者賀孫有親戚託人求舉先生曰親戚固是親戚然荐人於人亦湏是荐賢始得今鄉里平平等人無可稱之實某都不與發書􅈤人况某人事母如此臨財如此居鄉曲事長上如此教自家荐舉他甚麽得因問所託之人公且與撰幾句可薦之迹將來是説得説不得假使説道向來所為不善從今日自新要求舉狀是便有此心何可保賀孫人每欲不見客不知它是如何若使某一月日不見客必湏大病一月似今日一日與客説話却覺得意思舒暢不知它們闗著門不見人底是如何過日義剛直卿勸先生且謝賔客數月將息病先生曰天生一箇人便湏著管天下事若要不管湏是如楊氏為我方得某却不曽去從他這般學義剛擇之勞先生人事之繁答曰大凡事只得耐煩做將去纔起厭心便不得道夫先生病中應接不倦左右請少節之先生厲聲曰你􅂴惰教我也􅂴惰淳先生病起不敢峻補只得平補且笑曰不能興衰撥亂只得扶衰補敝淳近日百事都如此醫者用藥也只用平平稳稳底藥亦不能為害亦不能治病是他初不曽識得病故且如此酌中世上事都如此扁鵲視疾察見肺肝豈是看見裏面如何也只是看得證候極精纔見外面便知五臟六腑事賀孫先生一日説及受贓者怒形於言曰某見此等人只與大字面配去徐又曰今説公吏不合取錢為知縣者自要錢矣節節言之為之吁歎過梅雨溪流漲盛先生扶病徃觀曰君子於大水必觀焉僴先生毎觀一水一石一草一木稍清隂處竟日目不瞬飲酒不過兩三行又移一處大醉則趺坐髙拱經史子集之餘雖記録雜説舉輙成誦㣲醺則吟哦古文氣調清壯某所聞見則先生每愛誦屈原楚騷孔明出師表淵明歸去來并詩并杜子美數詩而已夀昌先生於父母墳墓所託之鄉人必加禮或曰敵已以上拜之賀孫先生毎日早起子弟在書院皆先著衫到影堂前擊板俟先生出既啟門先生陞堂率子弟以次列拜炷香又拜而退子弟一人詣土地之祠炷香而拜隨侍登閣拜先聖像方坐書院受早揖飲湯少坐或有請問而去月朔影堂薦酒果望日則薦茶有時物薦新而後食過先生早晨拈香春夏則深衣冬則戴漆紗帽衣則以布為之濶袖皂褖裳則用白紗如濓溪畫像之服或有見任官及它官相見易窄衫而出過問衣裳制度曰也無制度但畵像多如此故效之又問有尺寸否曰也無稽攷處那禮上雖略説然也説得没理㑹處義剛先生嘗立北橋忽市井游手數人悍然突過先生歛衽橋側避之毎閒行道間左右者或辟人先生即厲聲止之曰爾管他作甚先生毎徒行拜謁歩速而意專不左右顧及無事領諸生遊賞則徘􅆦顧瞻緩歩㣲吟先生有疾及諸生省問必正冠坐揖各盡其情略無倦接之意諸生有未及壯年者待之亦周詳先生病少愈既出寢室客至必見見必降階肅之去必送至階下諸生夜聴講退則不送或在坐有外客則自降階送之先生於客退必立視其車行不復顧然後退而觧衣及應酬他事或客方登車猶相面或以他事禀者不領之或前客纔登車而尚留之客輒有所禀議亦令少待先生對客語及本路監司守將必稱其官賀孫侍先生到唐石待野叟樵夫如接賔客略無分毫畦町某因侍立乆之先生曰此一等人若勢分相絶如何使他得以盡其情唐石有社倉徃徃支發不時故彼人來告先生云救弊之道在今日極是要嚴不嚴如何得實恵及此等細民炎先生端居甚嚴而或温而厲恭而安望其容貌則見面盎背當諸公攻偽學之時先生處之雍容只似平時故炎祭先生文有云凜然若􅋦馭之甚嚴泰然若方行之無畔盖乆而後得之又何止流行乎四時而昭示乎河漢炎先生書所居之桃符云愛君希道泰憂國願年豐書竹林精舎桃符云道迷前聖統朋誤逺方來先是趙昌父書曰教存君子樂朋自逺方來故嗣歲先生自家易之以此若海先生書閣上只扁南軒藏書二字鎮江一竇兄託過禀求書其家齋額不許因云人家何用立牌榜且看熹家何曽有之先是漳州守求新貢院二字巳為書去却以此説彼有數百間貢院不可無一牌人家何用過登先生藏書閣南軒題壁上題云於穆元聖繼天測靈開此謨訓恵我光明靖言保之匪金厥籯含英咀實百世其承意其為藏書閣銘也請先生書之刻置社倉書樓之上先生曰只是以此記書厨名待為别做振道間人多來求詩與䟦某以為人之所以與天地日月相為長乆者元不在此可學先生因人求墓銘曰吁嗟身後名於我如浮煙人既死了又更要這物事做甚或曰先生語此豈非有為而言曰也是既死去了待他説是説非有甚干渉又曰所可書者以其有可為後世法今人只是虛美其親若有大功大業則天下之人都知得了又何以此為且人為善亦自是本分事又何必湏要恁地寫出賀孫信州一士人為其先人求墓碑先生不許請之不已又却之臨别送出舉指云贈公務實二字過先生初欲正甫以沙隨行實來為作墓碑乆之不到既而以舊人文字稍多又欲屬筆汪季路亦不曽及是議立祠堂於徳興縣學曽為徳興丞為書沙隨先生之祠六字過陳同父一子一壻呉康同來求銘文先生是時列不作此與冩有宋龍川先生陳君同父之墓十二字婺源李參仲於先生為鄉舊其子亦來求墓銘只與䟦某人所作行實亦書有宋鍾山先生李公之墓與之過夀昌因先生酒酣興逸遂請醉墨先生為作大字韶國師頌一首又作小字杜牧之九日詩一首又作大字淵明歸田園居一首有舉子亦乘便請之先生曰公既習舉業何事於此請之不已亦為作淵明阻風於規林第二首且云但能參得此一詩透則公今日所謂舉業與夫他日所謂功名富貴者皆不必經心可也夀昌先生語朋舊無事時不妨將藥方看欲知得飬生之理也過先生説南軒論熹命云官多禄少四字因云平日辭官文字甚多過因上亮隔取中間一條為正云事湏有一箇大本方因對雨云安徐便好昨日做雨今日方㣲下已浹洽悠悠未已有周溥意不似前日暴也方開窓坐見窓前地上日色即覺熱退坐不見即不熱目受而心忌之則身不安之矣如許渤著衣問人寒熱則心凝不動也僧有受焚者亦爾方先生於世俗未嘗立異有歲迫欲入新居而外門未立者曰若入後有禁忌何以動作門欲横從巷出曰直出是公道横則與世俗相拗淳先生問直卿何不移入新屋居曰外門未立曰歲暮只有兩日便可下工若搬入後有禁忌如何動作初三又是赤口義剛夀昌問先生此心元自通天地枉却靈宫一炷香先生遊南嶽詩若在小能王廟還敢如此道否先生曰某却不曽到呉城山夀昌朱子語類卷一百七
