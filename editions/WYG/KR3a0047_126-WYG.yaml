body:
  text: 朱子語類卷一百二十六釋氏孟子不闢老荘而闢楊墨楊墨即老荘也今釋子亦有兩般禅學楊朱也苦行布施墨翟也道士則自是假今無説可闢然今禅家亦自有非其佛祖之意者試看古經如四十二章等經可見楊文公集傳燈録説西天二十八祖知他是否如何舊時佛祖是西域夷狄人却㑹做中國様押韻詩今看圓覺云四大分散今者妄身當在何處即是竊列子骨骸反其根精神入其門我尚何存語宋景文説楞嚴前面呪是他經後面説道理處是附㑹圓覺前數叠稍可看後面一段淡如一段去末後二十五定輸與大誓語可笑大雅以下論釋氏亦出楊墨問佛老與楊墨之學如何曰楊墨之説猶未足以動人墨氏謂愛無差等欲人人皆如至親此自難從故人亦未必信也楊氏一向為我超然逺舉視營營於利禄者皆不足道此其為説雖甚髙然人亦難學他未必盡從楊朱即老子弟子人言孟子不闢老氏不知但闢楊墨則老荘在其中矣佛氏之學亦出於楊氏其初如不愛身以濟衆生之説雖近於墨氏然此説最淺近未是他深處後來是達麽過來初見梁武武帝不曉其説只從事於因果遂去面壁九年只説人心至善即此便是不用辛苦修行又有人取荘老之説從而附益之所以其説愈精妙然只是不是耳又有所謂頑空真空之説頑空者如死灰槁木真空則能攝衆有而應變然亦只是空耳今不消窮䆒他伊川所謂只消就跡上斷便了他既逃其父母雖説得如何道理也使不得如此却自足以斷之矣時舉宋景文唐書贊説佛多是華人之譎誕者攘荘周列禦冦之説佐其髙此説甚好如歐陽公只説箇禮法程子又只説自家義理皆不見他正贓却是宋景文捉得他正贓佛家先偷列子列子説耳目口鼻心體處有六件佛家便有六根又三之為十八戒此處更舉佛經語與列子語相類處當考初間只有四十二章經無恁地多到東晉便有談議小説及史多説此如今之講師做一篇議緫説之到後來談議厭了達麽便入來只靜坐於中有稍受用處人又都向此今則文字極多大概都是後來中國人以荘列説自文夾揷其間都沒理㑹了攻之者所執又出禅學之下淳以下論釋氏出於荘老老子説他一箇道理甚縝宻老子之後有列子亦未甚至大段不好説列子是鄭穆公時人然穆公在孔子前而列子中説孔子則不是鄭穆公時人乃鄭頃公時人也列子後有荘子荘子模倣列子殊無道理為他是戰國時人便有縱横氣象其文大段豪偉列子序中説老子列子言語多與佛經相類覺得是如此疑得佛家初來中國多是偷老子意去做經如説空處是也後來道家做清靜經又却偷佛家言語全做得不好佛經所謂色即是空處他把色受想行識五箇對一箇空字説故曰空即是色受想行識亦復如是謂是空也而清靜經中偷此句意思却説無無亦無只偷得他色即是空却不曾理㑹得他受想行識亦復如是之意全無道理佛家偷得老子好處後來道家却只偷得佛家不好處譬如道家有箇寳藏被佛家偷去後來道家却只取得佛家瓦礫殊可笑也人説孟子只闢楊墨不闢老氏却不知道家修飬之説只是為己獨自一身便了更不管别人便是楊氏為我之學又曰孔子問老聃之禮而老聃所言禮殊無謂恐老聃與老子非一人但不可考耳因説子張學干祿先生曰如今科舉取者不問其能應者亦不必其能只是寫得盈紙便可得而推行之如除擢皆然禮官不識禮樂官不識樂皆是吏人做上去學官只是備員考試而已初不是有德行道藝可為表率仁義禮智從頭不識到尾國家元初取人如此為之柰何明作佛氏乗虚入中國廣大自勝之説幻妄寂滅之論自齋戒變為義學如逺法師支道林皆義學然又只是盜襲荘子之説今世所傳肇論云出於肇法師有四不遷之説日月歴天而不周江河兢注而不流野馬飄鼓而不動山嶽偃仆而常靜此四句只是一義只是動中有靜之意如適間所説東坡逝者如斯而未嘗徃也之意爾此是齋戒之學一變遂又説出這一般道理來及達麽入來又翻了許多窠臼説出禅來又髙妙於義學以為可以直超徑悟而其始者禍福報應之説又足以鉗制愚俗以為資足衣食之計遂使有國家者割田以贍之擇地以居之以相從陷於無父無君之域而不自覺蓋道釋之教皆一再傳而浸失其本真有國家者雖隆重儒學而選舉之制學校之法施設注措之方既不出於文字言語之工而又以道之要妙無越於釋老之中而崇重隆奉反専在於彼至於二帝三王述天理順人心治世教民厚典庸禮之大法一切不復有行之者唐之韓文公本朝之歐陽公以及闗洛諸公既皆闡明正道以排釋氏而其言之要切如傅奕本傳宋景文李蔚賛東坡儲祥觀碑陳後山白鶴宫記皆足以盡見其失此數人皆未深知道而其言或出於强為是以終有不滿人意處至二蘇兄弟晚年諸詩自言不墮落則又躬䧟其中而不自覺矣僴釋氏書其初只有四十二章經所言甚鄙俚後來日添月益皆是中華文士相助撰集如晉宋間自立講師孰為釋迦孰為阿難孰為迦葉各相問難筆之於書轉相欺誑大抵多是剽竊老子列子意思變換推衍以文其説大般若經卷帙甚多自覺支離故節縮為心經一卷楞嚴經只是強立一兩箇意義只管疊将去數節之後全無意味若圓覺經本初亦能㡬何只鄙俚甚處便是其餘增益附㑹者爾佛學其初只説空後來説動靜支蔓既甚達磨遂脱然不立文字只是黙然端坐便心靜見理此説一行前面許多皆不足道老氏亦難為抗衡了今日釋氏其盛極矣但程先生所謂攻之者執理反出其下吾儒執理既自卑汙宜乎攻之而不勝也説佛書皆能舉其支離篇章成誦此不能盡記謨因説程子耳無聞目無見之答曰決無此理遂舉釋教中有塵既不縁根無所著反流全一六用不行之説蘇子由以為此理廣因舉程子之説譬如靜坐時忽有人喚自家只得應他不成不應曰彼説出楞嚴經此經是唐房融訓釋故説得如此巧佛書中唯此經最巧然佛當初也不如是説如四十二章經最先傳來中國底文字然其説却自平實道書中有真誥末後有道授篇却是竊四十二章經之意為之非特此也至如地獄託生妄誕之説皆是竊他佛教中至鄙至陋者為之某嘗謂其徒曰自家有箇大寳珠被他竊去了却不照管亦都不知却去他牆根壁角竊得箇破瓶破罐用此甚好笑西漢時儒者説道理亦只是黄老意思如揚雄太𤣥經皆是故其自言有曰老子之言道德吾有取焉耳後漢明帝時佛始入中國當時楚王英最好之然都不曉其説直至晉宋間其教漸盛然當時文字亦只是将荘老之説來鋪張如逺師諸論皆成片盡是老荘意思直至梁㑹通間達麽入來然後一切被他掃蕩不立文字直指人心蓋當時儒者之學既廢絶不講老佛之説又如此淺陋被他窺見這箇罅隙了故横説竪説如是張王沒柰他何人才聰明便被他誘引将去嘗見畫底諸祖師其人物皆雄偉故果老謂臨濟若不為僧必作一渠魁也又嘗在廬山見歸宗像尤為可畏若不為僧必作大賊矣廣道之在天下一人説取一般禅家最説得髙妙去蓋自荘老來説得道自是一般物事閴閴在天地間後來佛氏又放開説大決藩籬更無下落愈髙愈妙吾儒多有折而入之把聖賢言語來看全不如此世間惑人之物不特於物為然一語一言可取亦是惑人况佛氏之説足以動人如此乎有學問底人便不被它惑謙因論佛曰老子先唱説後來佛氏又做得脱洒廣闊然考其語多本荘列公晦云曾聞先生説荘子説得更廣闊似佛後若有人推演出來其為害更大在拱壽謙之問佛氏之空與老子之無一般否曰不同佛氏只是空豁豁然和有都無了所謂終日喫飯不曾咬破一粒米終日著衣不曾掛著一條絲若老氏猶骨是有只是清淨無為一向恁地深藏固守自為𤣥妙教人摸索不得便是把有無做兩截看了格以下雜論釋老同異謙之問今皆以佛之説為無老之説為空空與無不同如何曰空是兼有無之名道家説半截有半截無己前都是無如今眼下却是有故謂之空若佛家之説都是無己前也是無如今眼下也是無色即是空空即是色大而萬事萬物細而百骸九竅一齊都歸於無終日喫飯却道不曾咬著一粒米滿身著衣却道不曾掛著一條絲賀孫問釋氏之無與老氏之無何以異曰老氏依舊有如所謂無欲觀其妙有欲觀其竅是也若釋氏則以天地為幻妄以四大為假合則是全無也柄老氏欲保全其身底意思多釋氏又全不以其身為事自謂别有一物不生不滅歐公嘗言老氏貪生釋氏畏死其説亦好氣聚則生氣散則死順之而已釋老則皆悖之者也廣釋老其氣象規模大概相似然而老氏之學尚自理㑹自家一箇渾身釋氏則自家一箇渾身都不管了燾佛氏之失出於自私之厭老氏之失出於自私之巧厭薄世故而盡欲空了一切者佛氏之失也闗機巧便盡天下之術數者老氏之失也故世之用兵算數刑名多本於老氏之意端䝉老氏只是要長生節病易見釋氏於天理大本處見得些分數然却認為己有而以生為寄故要見得父母未生時靣目既見便不認作衆人公共底須要見得為己有死後亦不失而以父母所生之身為寄寓譬以舊屋破倒即自挑入新屋故黄蘗一僧有偈與其母云先曾寄宿此婆家止以父母之身為寄宿處其無情義絶滅天理可知當時有司見渠此説便當明正典刑若聖人此道則不然於天理大本處見得是衆人公共底便只隨他天理去更無分毫私見如此便倫理自明不是自家作為出來皆是自然如此往來屈伸我安得而私之哉大雅釋氏見得髙底儘髙或問他何故只説空曰説𤣥空又説真空𤣥空便是空無物真空却是有物與吾儒説畧同但是它都不管天地四方只是理㑹一箇心如老氏亦只是要存得一箇神氣伊川云只就迹上斷便了不知它如此要何用南升問釋氏以天地萬物為幻老氏又却説及下截曰老氏勝可學釋氏之説易窮大抵不過如道家隂符經所謂絶利一源便到至道大雅奪胎出世之説有之釋道專專此心故神道出神故能奪胎釋定故死而能出世釋定故能入定道定故能成丹揚釋氏只四十二章經是古書餘皆中國文士潤色成之維摩經亦南北時作道家之書只老子荘列及丹經而已丹經如參同契之類然已非老氏之學清靜消灾二經皆模學釋書而誤者度人經生神章皆杜光度撰最鄙俚是北斗經蘇子瞻作儲祥宫記説後世道者只是方士之流其説得之㽦有言荘老禅佛之害者曰禅學最害道荘老於義理絶滅猶未盡佛則人倫已壊至禅則又從頭将許多義理掃滅無餘以此言之禪最為害之深者頃之復曰要其實則一耳害未有不由淺而深者以下論釋老滅綱常或問佛與荘老不同處曰荘老絶滅義理未盡至佛則人倫滅盡至禅則義理滅盡方子録云正卿問荘子與佛所以不盡曰荘子絶滅不盡佛絶滅盡佛是人倫滅盡到禅家義理都滅盡佛初入中國止説修行未有許多禅底説話學蒙佛老之學不待深辨而明只是廢三綱五常這一事已是極大罪名其他更不消説賀孫天下只是這道理終是走不得如佛老雖是滅人倫然自是逃不得如無父子却拜其師以其弟子為子長者為師兄少者為師弟但是只䕶得箇假底聖賢便是存得箇真底䕫孫釋老稱其有見只是見得箇空虚寂滅真是虚真是寂無處不知他所謂見者見箇甚底莫親於父子却棄了父子莫重於君臣却絶了君臣以至民生彛倫之間不可闕者它一皆去之所謂見者見箇甚物且如聖人親親而仁民仁民而愛物他却不親親而剗地要仁民愛物愛物時也則是食之有時用之有節見生不忍見死聞聲不忍食肉如仲春之月犧牲無用牝不麛不卵不殺胎不覆巢之類如此而已他則不食肉不茹葷以至投身施虎此是何理卓某人言天下無二道聖人無兩心儒釋雖不同畢竟只是一理某説道惟其天下無二道聖人無兩心所以有我底著他底不得有他底著我底不得若使天下有二道聖人有兩心則我行得我底他行得他底節以下儒釋之辨儒釋言性異處只是釋言空儒言實釋言無儒言有德明吾儒心雖虚而理則實若釋氏則一向歸空寂去了柄釋氏虚吾儒實釋氏二吾儒一釋氏以事理為不𦂳要而不理㑹節釋氏只要空聖人只要實釋氏所謂敬以直内只是空豁豁地更無一物却不㑹方外聖人所謂敬以直内則湛然虚明萬里具足方能義以方外問儒釋之辨莫只是虚實兩字上分别曰未須理㑹自家已分若知得真則其偽自别甚分明有不待辨可學問釋氏以空寂為本曰釋氏説空不是便不是但空裏面須有道理始得若只説道我見箇空而不知有箇實底道理却做甚用得譬如一淵清水清冷徹底看來一如無水相似它便道此淵只是空底不曾将手去探是冷是温不知道有水在裏面佛氏之見正如此今學者貴於格物致知便要見得到底今人只是一斑兩㸃見得些子所以不到極處也南升吾以心與理為一彼以心與理為二亦非固欲如此乃是見處不同彼見得心空而無理此見得心雖空而萬理咸備也雖説心與理一不察乎氣禀物欲之私是見得不真故有此病大學所謂貴格物也植或録云近世一種學問雖説心與理一却不察乎氣稟物欲之私故其發亦不合理却與釋氏同病不可不察儒者以理為不生不滅釋氏以神識為不生不滅龜山云儒釋之辨其差𦕈忽以某觀之真似氷炭方子儒者見道品節粲然佛氏亦見天機有不噐於物者然只是綽過去方問先生以釋氏之説為空為無理以空言似不若無理二字切中其病曰惟其無理是以為空它之所謂心所謂性者只是箇空底物事無理節先生問衆人曰釋氏言牧牛老氏言抱一孟子言求放心皆一般何縁不同節就問曰莫是無這理曰無理煞害事節釋氏合下見得一箇道理空虚不實故要得超脱盡去物累方是無漏為佛地位其他有惡趣者皆是衆生餓鬼只隨順有所修為者猶是菩薩地位未能作佛也若吾儒合下見得箇道理便實了故首尾與之不合大雅舉佛氏語曰千種言萬般解只要教君長不昧此説極好問程子曰佛氏之言近理所以為害尤甚所謂近理者指此等處否曰然它只是守得這些子光明全不識道理所以用處七顛八倒吾儒之學則居敬為本而窮理以充之其本原不同處在此曹問何以分别儒釋差處曰只如説天命之謂性釋氏便不識了便遽説是空覺吾儒説底是實理看他便錯了他云不染一塵不捨一法既不染一塵却如何不捨一法到了是説那空處又無歸著且如人心須是其中自有父子君臣兄弟夫婦朋友他做得徹到底便與父子君臣兄弟夫婦朋友都不相親吾儒做得到底便父子有親君臣有義兄弟有序夫婦有别朋友有信吾儒只認得一箇誠實底道理誠便是萬善骨子問佛氏所以差曰從劈初頭便錯了如天命之謂性他把做空虚説了吾儒見得都是實若見得到自家底從頭到尾小事大事都是實他底從頭到尾都是空恁地見得破如何解説不通又如實際理地不受一塵萬行叢中不捨一法等語這是他後來桀黠底又撰出這一話來倚傍吾儒道理正所謂遁辭知其所窮且如人生一世間須且理㑹切實處論至切至實處不過是一箇心不過一箇身若不自㑹做主更理㑹甚麽然求所以識那切實處則莫切於聖人之書聖人之書便是箇引導人底物事若舍此而它求則亦别無門路矣舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣髙山仰止景行行止只怕不見得若果是有志之士只見一條大路直上行将去更不問著有甚艱難險阻孔子曰向道而行忘身之老也不知年數之不足也俛焉日有孜孜斃而後已自家立著志向前做将去鬼神也避道豈可先自計較先自怕却如此終於無成賀孫因舉佛氏之學與吾儒有甚相似處如云有物先天地無形本寂寥能為萬象主不逐四時凋又曰樸落非它物縱横不是塵山河及大地全露法王身又曰若人識得心大地無寸土看他是甚麽様見識今區區小儒怎生出得他手宜其為他揮下也此是法眼禅師下一派宗㫖如此今之禅家皆破其説以為有理路落窠臼有礙正當知見今之禅家多是麻三斤乾屎橛之説謂之不落窠臼不堕理路妙喜之説便是如此然又有翻轉不如此説時僴佛者云置之一處無事不辦也只是教人如此做工夫若是專一用心於此則自㑹通達矣故學禅者只是把一箇話頭去看如何是佛麻三斤之類又都無義理得穿鑿看來看去工夫到時􅀈似打一箇失落一般便是參學事畢荘子亦云用志不分乃疑於神也只是如此教人但他都無義理只是箇空寂儒者之學則有許多義理若看得透徹則可以貫事物可以洞古今廣士毅録云釋氏云置之一處無事不辦此外别有何法只是釋氏沒道理自呀将去耳釋老之書極有髙妙者句句與自家箇同但不可将來此方然誤人事季文道夫先生遊鍾山書院見書籍中有釋氏書因而揭看先君問其中有所得否曰幸然無所得吾儒廣大精微本末備具不必它求季扎言釋氏之徒為學精專曰便是某常説吾儒這邊難得如此看他下工夫直是自日至夜無一念走作别處去學者一時一日之間是多少閑雜念慮如何得似他只惜他所學非所學枉了工夫若吾儒邊人下得這工夫是甚次第如今學者有二病好髙欲速這都是志向好底如此一則是所以學者失其㫖二則是所學者多端所以紛紛擾擾終於無所歸止賀孫以下論釋氏工夫問釋氏入定道家數息曰他只要靜則應接事物不差孟子便也要存夜氣然而須是理㑹旦晝之所為曰吾儒何不傚他恁地曰他開眼便依舊失了只是硬把捉不如吾儒非禮勿視聽言動戒謹恐懼乎不睹不聞敬以直内義以方外都一切就外面闌截曰釋氏只是勿視勿聽無那非禮工夫曰然季通因曰世上事便要人做只管似它坐定做甚日月便要行天地便要運曰他不行不運固不是吾軰是在這裏行是在這裏運只是運行又有差處如今胡喜胡怒豈不是差他是過之今人又不及幹問昔有一禅僧毎自喚曰主人翁惺惺著大學或問亦取謝氏常惺惺法之語不知是同是異曰謝氏之説地歩闊於身心事物上皆有工夫若如禅者所見只看得箇主人翁便了其動而不中理者都不管矣且如父子天性也父被他人無禮子須當去救他却不然子若有救之之心便是被愛牽動了心便是昏了主人翁處若如此惺惺成甚道理向曾覽四家録有些説話極好笑亦可駭説若父母為人所殺無一舉心動念方始名為初發心菩薩他所以呌主人翁惺惺著正要如此惺惺字則同所作工夫則異豈可同日而語友仁佛家有流注想水本流将去有些渗漏處便留滯蓋卿僧家尊宿得道便入深山中草衣木食飬數十年及其出來是甚次第自然光明俊偉世上人所以只得义手看他自動方徐子融有枯稿有性無性之論先生曰性只是理有是物斯有是理子融錯處是認心為性正與佛氏相似只是佛氏磨擦得這心極精細如一塊物事剥了一重皮又剥一重皮至剥到極盡無可剥處所以磨弄得這心精光它便認做性殊不知此正聖人之所謂心故上蔡云佛氏所謂性正聖人所謂心佛氏所謂心正聖人所謂意心只是該得這理佛氏元不曾識得這理一節便認知覺運動做性如視聽言貎聖人則視有視之理聽有聽之理言有言之理動有動之理思有思之理如箕子所謂明聰從恭睿是也佛氏則只認那能視能聽能言能思能動底便是性視明也得不明也得聽聰也得不聰也得言從也得不從也得思睿也得不睿也得它都不管横來竪來它都認做性它最怕人説這理字都要全掉了此正告子生之謂性之説也僴問禅家又有以揚眉瞬目知覺運動為弄精魂而訶斥之者何也曰便只是弄精魂只是他磨擦得來精細有光彩不如此麄糙爾僴問彼言一切萬物皆有破壊惟有法身常住不滅所謂法身便只是這箇曰然不知你如何占得這物事住天地破壊又如何被你占得這物事常不滅問彼大概欲以空為體言天地萬物皆歸於空這空便是他體曰他也不是欲以空為體它只是説這物事裏面本空著一物不得僴以下論繹氏説誤認心性問聖門説知性佛氏亦言知性有以異乎先生笑曰也問得好據公所見如何試説看曰據友仁所見及佛氏之説者此一性在心所發為意在目為見在耳為聞在口為議論在手能持在足運奔所謂知性者知此而已曰且據公所見而言若如此見得只是箇無星之秤無寸之尺若在聖門則在心所發為意須是誠始得在目雖見須是明始得在耳雖聞須是聰始得在口談論及在手在足之類須是動之以禮始得天生烝民有物有則如公所見及佛氏之説只有物無則了所以與聖門有差况孟子所説知性者乃是物格之謂友仁若是如釋氏道只是那坐底視底是則夫子之教人也只説視聽言動底是便了何故却説非禮勿視非禮勿聽非禮勿言非禮勿動如居處執事與人交止説居處執事與人交便了何故於下面著箇恭敬忠如出門使民也只説箇出門使民便了何故却説如見大賓如承大祭孔子言克己復禮為仁厲聲言復禮仁字節釋氏只知坐底是行底是如坐交脛坐也得疊足坐也得邪坐也得正坐也得将見喜所不當喜怒所不當怒為所不當為他只是直衝去更不理㑹理吾儒必要理㑹坐之理當如尸立之理當如齊如頭容便要直所以釋氏無理節知覺之理是性所以當如此者釋氏不知他但知知覺沒這理故孝也得不孝也得所以動而陽靜而隂者蓋是合動不得不動合靜不得不靜節釋氏棄了道心却取人心之危者而作用之遺其精者取其粗者以為道如以仁義禮智為非性而以眼前作用為性是也此只是源頭處錯了人傑釋氏專以作用為性如某國王問某尊者曰如何是佛曰見性為佛曰如何是性曰作用為性曰如何是作用曰云云禅家又有偈者云當來尊者答國王時國王何不問尊者云未作用時性在甚處㽦作用是性在目曰見在耳曰聞在鼻齅香在口談論在手執捉在足運奔即告子生之謂性之説也且如手執捉若執刀胡亂殺人亦可為性乎龜山舉龎居士云神道妙用運水般柴以此徐行後長亦坐此病不知徐行後長乃謂之弟疾行先長則為不弟如曰運水般柴即是妙用則徐行疾行皆可謂之弟耶人傑問釋氏作用是性曰便只是這性他説得也是孟子曰形色天性也惟聖人然後可以踐形便是此性如口㑹説話説話底是誰目能視視底是誰耳能聽聽底是誰便是這箇其言曰在眼曰見在耳曰聞在鼻齅香在口談論在手執捉在足運奔徧現俱該法界収攝在一微塵識者知是佛性不識喚作精魂他説得也好又舉楞嚴經波斯國王見恒河沙一段云云所以禅家説直指人心見性成佛他只要你見得言下便悟做處便徹見得無不是此性也説存飬心性飬得來光明寂照無所不徧無所不通唐張拙詩云光明寂照徧河沙凡聖含靈共我家云云又曰實際理地不受一塵佛事門中不舍一法他箇本自説得是所飬者也是只是差處便在這裏吾儒所飬者是仁義禮智他所飬者只是視聽言動儒者則全體中自有許多道理各自有分别有是非降𠂻秉彛無不各具此理他只見得箇渾淪底物事無分别無是非横底也是竪底也是直底也是曲底也是非理而視也是此性以理而視也是此性少間用處都差所以七顛八倒無有是處吾儒則只是一箇真底道理他也説我這箇是真實底道理如云惟此一事實餘二則非真只是他説得一邊只認得那人心無所謂道心無所謂仁義禮智惻隠羞惡辭遜是非所爭處只在此吾儒則自天命之謂性率性之謂道以至至誠盡人物之性贊天地之化育識得這道理無所不周無所不徧他也説我這箇無所不周無所不徧然眼前君臣父子兄弟夫婦上便不能周徧了更説甚周徧他説治生産業皆與實相不相違背云云如善財童子五十三參以至神鬼神仙士農工商技藝都在他性中他説得來極闊只是其實行不得只是諱其所短強如此籠罩去他舊時瞿曇説得本不如此廣闊後來禅家自覺其陋又翻轉窠臼只説直指人心見性成佛僴昨夜説作用是性因思此語亦自好雖云釋氏之學是如此他却是真箇見得真箇飬得如云説話底是誰説話底是這性目視底是誰視底也是這性聽底是誰聽底也是這性鼻之聞香口之知味無非是這箇性他凡一語黙一動息無不見得此性飬得此性或問他雖見得如何能飬曰見得後常常得在這裏不走作便是飬今儒者口中雖常説性是理不止於作用然却不曾做他様存得飬得只是説得如此元不曾用功心與身元不相管攝只是心麄若自早至暮此心常常照管甚麽次第這箇道理在在處處發見無所不有只是你不曾存得飬得佛氏所以行六七百年其教愈盛者縁他也依傍這道理所以做得盛他却常在這身上他得這些子即來欺負你秀才你秀才無一人做得似他今要做無他只説四端擴充得便是孟子説存心飬性其要只在此凡有四端於我者知皆擴而充之矣若火之始然泉之始達學者只要守得這箇如惻隠羞惡辭遜是非若常存得這惻隠之心便飬得這惻隠之性若合當愛處自家却不起愛人之心便是害了那惻隠之性如事當羞惡自家不羞惡便是傷害了那羞惡之性辭遜是非皆然人能充無欲害人之心而仁不可勝用矣人能充無受爾汝之實無所徃而不為義也只要就這裏存得飬得所以説利與善之間只爭這些子只是絲髪之間如人靜坐忽然一念之發只這箇便是道理便有箇是與非邪與正其發之正者理也雜而不正者邪也在在處處無非發見處只要常存得常飬得耳僴佛家作用引罽賓王問某問他初説空今却如此曰既無理亦只是無聽亦此不聽亦此然只是認得第二箇然他後來又不如此説傅大士云云曰他雖不如此然卒走此不得曰然可學問儒釋曰據他説道明得心又不曾得心為之用他説道明得性又不曾得性為之用不知是如何又問不知先從他徑處入然後却歸此曰若要從徑入是猶從近習求言職須是見他都無所用泳佛家説㑹萬物於一己若曉得這道理自是萬物一體更何須㑹若是曉不得雖欲㑹如何㑹得恪佛氏見影朝説這箇暮説這箇至於萬里錯綜如此却都不知方釋氏先知死只是學一箇不動心告子之學則是如此端蒙凡遇事先須識得箇邪正是非盡掃私見則至公之理自存大雅云釋氏欲驅除物累至不分善惡皆欲掃盡云凡聖情盡即如知佛然後來往自由吾道却只要掃去邪見邪見既去無非是處故生不為物累而死亦然曰聖人不説死已死了更説甚事聖人只説既生之後未死之前須是與他精細理㑹道理教是胡明仲侍郎自説得好人生物也佛不言生而言死人事可見佛不言顯而言幽釋氏更不分善惡只尊向他底便是好人背他底便入地獄若是箇殺人賊一尊了他便可生天大雅云于頔在傳燈録為法嗣可見日然大雅佛書多有後人添入初入中國只有四十二章經但此經却有添入者且如西天二十八祖所作偈皆有韻分明是後人增加如楊文公蘇子由皆不悟此可怪又其文字中至有甚拙者云云如楞嚴經前後只是説呪中間皆是增入蓋中國好佛者覺其陋而加之耳可學以下論佛經佛初止有四十二章經其説甚平如言弹琴弦急則絶慢則不響不急不慢乃是大抵是偷得老荘之意後來達麽出來一齊掃盡至楞嚴經做得極好柳宗元六祖塔銘有中外融有椊孔習方子達麽未來中國時如逺肇法師之徒只是談荘老後來人亦多以荘老助禅古亦無許多經西域豈有韻諸祖相傳偈平仄押韻語皆是後來人假合問心經如何曰本大般若經六百卷心經乃是節本曰他既説空又説色如何曰他蓋欲於色見空耳大抵只是要鶻突人如云實際中不立一法又云不捨一法此佛經語記不全之類皆然問刼數如何曰他之説亦説天地開闢但理㑹不得某經云到末刼人皆小先為火所燒成刼灰又為風所吹又為水所淹水又成沬地自生五榖天上人自飛下來喫復成世界他不識隂陽便恁地亂道問佛黙然處如何曰是他到處曰如何與灑掃應對合曰蓋言精粗無二曰活潑潑地是禅語否曰不是禅語是俗語今有儒家字為佛家所竊用而後人反以為出於佛者如寺精舍之類不一可學佛書中説六根六塵六識四大十二縁生之類皆極精巧故前輩學佛者謂此孔子所不及今學者且須截斷必欲窮䆒其説恐不能得身已出來方子録比此他底四大即吾儒所謂魂魄聚散十二縁生在華嚴合論第十三御卷佛説本言盡去世間萬事其後黠者出却言實隥理地不染一塵萬事門中不舍一法可學華嚴合論精宻閎祖華嚴合論其言極鄙陋無稽不知陳了翁一生理㑹這箇是有甚麽好處也不㑹厭可惜極好底秀才只恁地被它引去了又曰其言旁引廣諭説神説鬼只是一箇天地萬物皆具此理而已經中本説得簡徑白直却被注解得越沒收殺或問金剛經大意曰他大意只在須菩提問云何注云何降伏其心兩句上故説不應注法王心不應色色生心應無所住而生其心此是答云何住又説若胎生若卵生若濕生若化生我皆令入無餘湼槃而滅度之此是答云何降伏其心彼所謂降伏者非謂欲遏伏此心謂盡降收世間衆生之心入它無餘湼槃中滅度都教你無心了方是只是一箇無字自此以後只管纒去只是這兩句如這桌子則云若此桌子非名桌子是名桌子若見諸相非相則見如來離一切相即名佛皆是此意要之只是説箇無僴問龜山集中所荅了翁書論華嚴大㫖不知了翁諸人何為好之之篤曰只是見不透故覺得那箇好以今觀之也是好也是動得人道夫曰只為他大本不立故偏了先生黙然良久曰真所謂詖淫邪遁蓋詖者是它合下見得偏儒者之道大中至正四面均平釋氏只見一邊於那處都蔽塞了這是詖辭知其所蔽淫者是只見得一邊又却説得周遮浩瀚所以其書動數百卷是皆䧟於偏而不能返這是淫辭知其所䧟邪者是它見得偏了於道都不相貫屬這是邪辭知其所離遁者是它已離於道而不通於君臣父子都已棄絶見去不得却道道之精妙不在乎此這是遁辭知其所窮初只是詖詖而後淫淫而後邪邪而後離離而後遁要之佛氏偏處只是虚其理理是實理他却虚了故於大本不立也因問温公解禅偈却恐後人作儒佛一貫㑹了先生因誦之曰此皆佛之至陋者也妙處不在此又問遺書云釋氏於敬以直内則有之義以方外則未也道夫於此未安先生笑曰前日童蜚卿正論此以為釋氏大本與吾儒同只是其末異某與言正是大本不同因檢近思録有云佛有一箇覺之理可言敬以直内矣然無義以方外其直内者要之其本亦不是這是當時記得全處前者記得不完也又曰只無義以方外則連敬以直内也不是了又曰程子謂釋氏唯務上達而無下學然則其上達處豈有是邪亦此意學佛者嘗云儒佛一同某言你只認自家説不同若果是又何必言同只這靠傍底意思便是不同便是你底不是我底是了道夫圓覺經只有前兩三卷好後面便只是無説後強添如楞嚴經當初只有那阿難一事及那燒牛糞時一呪其餘底皆是文章之士添那燒牛糞便如爇蕭様後來也有人祈雨後燒亦出此意也義剛楞嚴經本只是呪語後來房融添入許多道理説話呪語想亦淺近但其徒恐譯出則人易之故不譯所以有呪者蓋浮屠居深山中有鬼神蛇獸為害故作呪以禁之縁他心靈故能知其性情制馭得他呪全是想法西域人誦呪如叱喝又為雄毅之状故能禁伏鬼神亦如巫者作法相似又云汀州人多為巫若巫為祟則治之者全使不行沈存中記水中金剛經不濕蓋人心歸向深固所感如此因言後世被他佛法横入來鬼神也沒理㑹了又曰世人所謂鬼神亦多是喫酒喫肉漢見他戒行精潔方寸無累底人如何不生欽敬閎祖維摩詰經舊聞李伯紀之子説是南北時一貴人如蕭子良之徒撰渠云載在正史然檢不見伯紀子名縝讀書甚博必大傳燈録極陋蓋真宗時一僧做上之真宗令楊大年刪過故出楊大年名便是楊大年也曉不得義剛因語禅家云當初入中國只有四十二章經後來既久無可得説晉宋而下始相與演義其後義又窮至達麽以來始一切掃除然其初答問亦只分明説到其後又窮故一向説無頭話如乾屎橛柏樹子之類只是胡鶻突人既曰不得無語又曰不得有語道也不是不道也不是如此則使之東亦不可西亦不可置此心於危急之地悟者為禅不悟者為顛雖為禅亦是蹉了蹊徑置此心於别處和一身皆不管故喜怒任意然細觀之只是於精神上發用問渠既一向説空及其作用又只是氣曰作用是心亦是氣渠自錯認了渠雖説空又要和空皆無如曰空生大覺中之類昔日了老專教人坐禅杲老以為不然著正邪論排之其後杲在天童了老乃一向師尊禮拜杲遂與之同及死為之作銘問渠既要清淨寂㓕如何不坐禅曰渠又要得有悟杲舊甚喜子韶及南歸貽書責之以為與前日不同今其小師録杲文字去正邪論與子韶書亦節却問病翁墓志中説官莆田事如何曰佛家自説有體無用是渠言如此依實載之問禅僧有鳴皷升坐死者如何曰世念既去自知得只是能揠不卧床席耳别無它説可學以下禅學禅只是一箇呆守法如麻三斤乾屎橛他道理初不在這上只是教他麻了心只思量這一路專一積久忽有見處便是悟大要只是把定一心不令散亂久後光明自發所以不識字底人才悟後便作得偈頌悟後所見雖同然亦有深淺某舊來愛問參禅底其説只是如此其間有㑹説者却吹嘘得大如杲佛日之徒自是氣魄大所以能鼓動一世如張子韶汪聖錫輩皆北面之閎祖或問禅家説無頭當底説話是如何曰他説得分明處却不是只内中一句黑如􅃮者便是他要𦂳處於此曉得時便盡曉得他又愛説一般㝡險絶底話如引取人到千仭之崖邊猛推一推下去人於此猛省得便了或曰不理㑹得也是一事不了曰只此亦是格物祖道郭德元問禅者云知之一字衆妙之門它也知得這知字之妙曰所以伊川説佛氏之言近理謂此類也它也㣲見得這意思要籠絡這箇道理只是它用處全差所以都間斷相接不著僴問其所謂知正指此心之神明作用者否曰然郭又問圭峯云作有義事是省悟心作無義事是狂亂心狂亂由情念臨終被業牽省悟不由情臨終能轉業又自注云此義非仁義之義乃理義之義甚好笑曰它指仁義為恩愛之義故如此説他雖説理義何嘗夣見其後杲老亦非之云理義之義便是仁義之義如何把虚空打做兩截僴僧家所謂禅者於其所行全不相應向來見㡬箇好僧説得禅又行得好自是其資質為人好耳非禅之力也所謂禅是僧家自舉一般見解如秀才家舉業相似與行已全不相干學得底人有許多機鋒将出來弄一上了便収拾了到其為人與俗人無異只縁禅自是禅與行不相應耳僧家有云行解者行是行已解是禅也璘禅僧自云有所得而作事不相應觀他又安有晬面盎背氣象只是将此一禅横置胷中遇事将出事了又収大抵只論説不論行昔日病翁見妙喜於其面前要逞自家話渠於開喜升座却云彦沖修行却不㑹禅寳學㑹禅却不修行所謂張三有錢不㑹使李四㑹使又無錢皆是亂説大抵此風亦有盛衰紹興間最盛閩中自有數人可嘆可嘆先王之道不明却令異端横出竪立可學釋氏須灼然看得他底之非一出一入不濟事禅将作何用振禅學一喝一棒都掀翻了也是快活却看二程説話可知道不索性豈特二程便夫子之言亦如此學而時習之不亦説乎看得好支離學道又雜佛學者但歇一月工夫看誰邊有味佛氏只歇一月味便消了彼漸消則此漸進此是鈍工夫然却是法門也方問德粹在四明曾到天章育王否曰到曰亦曾參禅否曰有時夜靜無事見長老入室亦覺心靜先生笑因問德光如何滕曰不問渠法門事自是大管人事先生曰皆如此今年徃莆中弔陳魏公廻途過雪峯長老升堂説法且胡鶻過及至接人却甚俗只是一路愛便宜纔説到六七句便道仰山大王㑹打供想見宗杲也是如此又問人傑如何曰臨死只是漸消削先生曰它平日只理㑹臨行一節又却如此可學雜論釋氏地水火風之説彼所謂地水如云魄氣火風如云魂氣又説火風先散地水後散則其疾不暴地水先散火風後散則其疾暴德明釋氏地水火風粗而言之地便是體水便是魄火風便是魂他便也是見得這魂魄釋氏説法身便是本性報身是其德業化身是其肉身問報身是如何曰是他成就效驗底説話看他畫毗盧遮那坐千葉蓮珠常富貴便如吾儒説聖人備道全美相似魯可㡬問釋氏因縁之説曰若看書作善降之百祥作不善降之百殃則報應之説誠有之但他説得來不是不是又問隂德之説如何曰也只是不在其身則在其子孫耳道夫佛家不合将才作縁習縁習是説􅀫縁可學禅家以父子兄弟相親愛處為有縁之慈如虎狼與我非類我却有愛及他如以身飼虎便是無縁之慈以此為真慈淳義剛同甘吉父問仁者愛之理心之德時舉因問釋氏説慈即是愛也然施之不自親始故愛無差等先生曰釋氏説無縁慈記得甚處説融性起無縁之大慈蓋佛氏之所謂慈並無縁由只是無所不愛若如愛親之愛渠便以為有縁故父母棄而不飬而遇虎之饑餓則捨身以食之此何義理耶時舉問佛法如何是以利心求曰要求清淨寂㓕超脱世界是求一身利便可學釋氏之學務使神輕去其幹以為坐亡立脱之備其魄之未盡化者則流為膏液散為珠琲以驚動世俗之耳目非老子專氣致柔之謂也僴因論釋氏多有神異疑其有之曰此未必有便有亦只是妖恠方子佛家多有奪胎之説也如何見得只是在理無此淳問説禅家言性太陽之下置器處曰此便是説輪廻可學問禅家言性傾此于彼之説曰此只是偷生奪隂之説耳禅家言偷生奪隂謂人懐胎自有箇神識在裏了我却撞入裏面去逐了它我却受它血隂它説傾此于彼蓋如一破弊物在日下其下日影自有方圓大小却欲傾此日影為彼日影它説是人生有一塊物事包褁在裏及其既死此箇物事又㑹去做張三做了張三又㑹做王二便如人做官做了這官任滿又去做别官只是無這道理或舉世間有如此類底為問先生曰而今只是理㑹箇正理若以聞見所接論之則無了期又曰横渠説形潰反原以為人生得此箇物事既死此箇物事却復歸大原去又别從裏面抽出來生人如一塊黄泥既把來做箇弹子了却依前歸一塊裏面去又做箇弹子出來伊川便説是不必以既屈之氣為方伸之氣若以聖人精氣為物游魂為變之語觀之則伊川之説為是蓋人死則氣散其生也又是從大原裏面發出來䕫孫問輪廻之説當時如何起曰自漢以來已有此説話説得成了因就此結果曰不知佛祖已有此説否曰今佛經存者亦不知孰為佛祖之書厚之云或傳范淳夫是鄧禹後身曰鄧禹亦一好人死許多時如何魄識乃至今為他人某云吕居仁詩亦有狗脚朕之語曰它又有偷胎奪隂之説皆脱空可學鄭問輪廻之説是佛家自創否曰自漢書載鬼處已有此話模様了元城語録載温公謂吾欲扶教耳温公也看不破只是硬恁地説淳或有言修後世者先生曰今世不修却修後世何也道夫德粹問人生即是氣死則氣散浮屠氏不足信然世間人為惡死若無地獄治之彼何所懲曰吾友且説堯舜三代之世無浮屠氏乃比屋可封天下太平及其後有浮屠而為惡者滿天下若為惡者必待死然後治之則生人立君又焉用滕云嘗記前軰説除却浮屠祠廟天下便知向善莫是此意曰自浮屠氏入中國善之名便錯了渠把奉佛為善如修橋道造路猶有益於人以齋僧立寺為善善安在所謂除浮屠祠廟便向善者天下之人既不溺於彼自然孝父母悌長上做一好人便是善大抵今之佛書多是後世做文字者所為向見伯恭説曾看藏經其中有至不成説話者今世傳一二本經乃是其祖師所傳故士大夫好佛者多為簧鼓某問道家之説云出於老子今世道士又却不然今之傳莫是張角術曰是張陵見三國志他今用印乃陽平治都功印張魯起兵之所又有祭酒有都講祭酒魯以女妻馬超使為之其設醮用五斗米所謂米賊是也向在浙東祈雨設醮拜得脚痛自念此何以得雨自先不信某問漢時如鄭康成注二禮但云鬼神是氣至佛入中國人鬼始亂曰然可學初西域僧來東漢時令鴻臚寺寄居後以為僧居因名曰寺寺是官寺非釋者取之寺之起自此時雄俗言佛燈此是氣盛而有光又恐是寳氣又恐是腐葉飛䖝之光蔡季通去廬山問得云是腐葉之光云昔人有以合子合得一團光來日看之乃一腐葉妙喜在某處見光令人撲之得一小蟲如蛇様而甚細僅如布線大此中有人隨汪聖錫到峨眉山云五更初去看初布白氣已而有圓光如鏡其中有佛然其人以手褁頭巾則光中之佛亦褁頭巾則知乃人影耳今所在有石號菩薩石者如水精状於日中照之便有圓光想是彼處山中有一物日初出照見其影圓而映人影如佛影耳峨眉山看佛以五更初看璘道謙言大藏經中言禅子病脾時只坐禅六七日減食便安謙言渠曾病坐得三四日便無事雪峯開山和尚住山數年都無一僧到遂下山至半嶺忽有一僧來遂與之俱還先生曰若是某雖無人來亦不下山文蔚王質不敬其父母曰自有物無始以來自家是換了㡬箇父母了其不孝莫大於是以此知佛法之無父其禍乃至於此使更有㡬箇如王質則雖殺其父母亦以為常佛法説君臣父子兄弟只説是偶然相遇趙子直戒殺身又末為因報之説云汝今殺他他再出世必殺汝此等言語乃所以啟其殺身蓋彼安知不説道我今可以殺汝必汝前身曾殺我賀孫以下論釋氏滅人倫之害佛家説要廢君臣父子他依舊廢不得且如今一寺依舊有長老之類其名分亦甚嚴如何廢得但皆是偽義剛問釋氏之失一是自利厭死生而學大本已非二是滅絶人倫三是逕求上達不務下學偏而不該曰未須如此立論人傑次日因余國秀解物則語及釋氏先生曰他佛家都從頭不識只是認知覺運動做性所以鼓動得許多聰明豪傑之士縁他是髙於世俗世俗一副當汙濁底事他是無了所以人兢趨他之學元初也不如此佛教初入中國只是修行説話如四十二章經是也初間只有這一卷經其中有云佛問一僧汝處家為何業對曰愛弹琴佛問絃緩如何曰不鳴矣弦急如何曰聲絶矣急緩得中如何曰諸音普矣佛曰學道亦然心須調適道可得矣初間只如此説後來達麽入中國見這般説話中國人都㑹説了遂換了話頭專去面壁靜坐黙照那時亦只是如此到得後來又翻得許多禅底説話來盡掉了舊時許多話柄不必看經不必靜坐越弄得來闊其實只是作弄這些精神或曰彼亦以知覺運動為形而下者以空寂為形而上者如何曰便只是形而下者他只是将知覺運動做𤣥妙説或曰如此則安能動人必更有𤣥妙處曰便只是這箇他那妙處離這知覺運動不得無這箇便説不行只是被他作弄得來精所以横渠有釋氏兩末之論只説得兩邊末梢頭中間真實道理却不曾識如知覺運動是其上一梢也因果報應是其下一梢也或曰因果報應他那邊有見識底亦自不信曰雖有不信底依舊離這箇不得如他㡬箇髙禅縱説髙殺也依舊掉舍這箇不下将去愚人他那箇物事沒理㑹捉撮他不得你道他如此他又説不如此你道他是知覺運動他又有時掉翻了都不説時雖是掉翻依舊離這箇不得或問今世士大夫所以晩年都被禅家引去者何故曰是他底髙似你你平生所讀許多書許多記誦文章所藉以為取利禄聲名之計者到這裏都靠不得了所以被他降下他底是髙似你且是省力誰不悦而趨之王介甫平生讀許多書説許多道理臨了捨宅為寺却請兩箇僧來住持也是被他􅀏你這箇物事如何出得他或問今也不消學他那一層只認依著自家底做便了曰固是豈可學他只是依自家底做少間自見得他底低僴以下論士大夫好佛問士大夫末年多溺于釋氏之説者如何曰縁不曾理㑹得自家底原頭但看得些小文字不過要做些文章務行些故事為取爵禄之具而已却見得他底髙直是𤣥妙又且省得氣力自家反不及他反為他所鄙陋所以便溺於他之説被他引入去燾今之學者徃徃多歸異教者何故蓋為自家這裏工夫有欠缺處柰何這心不下沒理㑹處又見自家這裏説得來疎畧無箇好藥方治得他沒柰何底心而禅者之説則以為有箇悟門一朝得入則前後際斷説得恁地見成捷快如何不隨他去此却是他實要心性上理㑹了如此不知道自家這裏有箇道理不必外求而此心自然各止其所非獨如今學者便是程門髙弟看他説那做工夫處徃徃不精切廣老氏見得煞髙佛氏安敢望他唐人方説佛本朝士大夫好佛者始初楊大年後來張無姤又説張無垢參杲老汪玉山被他引去後來亦好佛但汪文為人無果決好佛又見不透又不能果決而退嘗見汪丈論楊大年好佛後來守不定汪丈甚不信云是蘇子由記此恐未必是南升老氏煞清髙佛氏乃為逋逃淵藪今看何等人不問大人小兒官員村人商賈男子婦人皆得入其門最無状是見婦人便與之對談如杲老與中貴權要及士夫皆好湯思退與張魏公如水火杲老與湯張皆好又云杲老乃是禅家之俠又云陳了翁好佛説得來七郎八當南升韓退之詩陽明人所居幽暗鬼所寰嗟龍獨何智出入人鬼間今僧家上可以交賢士大夫下又交中貴小人出入其間不以為耻所謂出入人鬼間也如妙喜與張魏公好又與一種小人小官好璘信州人新鄂州教官龔安國聞李德逺過郡見之李云若論學唯佛氏直截如學周公孔子乃是抱橋柱澡洗方問近世王日休立化如何曰此人極不好貪汙異常曰既如此何故立脱曰它平日坐必向西心在於此遂想而得此乃佛氏最以為下者程氏説野狐精正是以如此為不足貴可學因説某人棄家為僧以其合奏官與弟弟又不肖母在堂無人奉飬先生顰蹙曰柰何棄人倫滅天理至此某曰此僧乃其家之長子方伯謨曰佛法亦自不許長子出家先生曰縱佛許亦不可可學陳福公臨終親筆戒其子勿用浮屠林子方力責之人之卑陋乃如此淳先生説及俗人之奉佛者毎晨拜跪備至及其老也體多康徤以為獲福於佛不知其日勞筋骨其他節省運用血氣所以安也過夷狄之教入于中國非特人為其所迷惑鬼亦被他迷惑大乾廟所以塑僧像乃勸其不用牲祭者其他廟宇中亦必有所謂勸善大師蓋縁人之信向者既衆鬼神只是依人而行必大本朝歐陽公排佛就禮法上論二程就理上論終不如宋景文公捉得正贓出見李蔚傳賛論華人增加處佛書分明是中國人附益問佛法所以傳至今以有禍福之説助之曰亦不全如此却是人佐佑之初來只有四十二章經至晉宋間乃談義皆是剽竊老荘取列子為多其後達麽來又説禅又有三事一空二假三中空全論空假者想出世界中在空假之中唐人多説假可學以下關佛問胡僧不能害傅奕只是邪不能干正否曰是他心不動胡泳論釋氏之説如明道數語闢得極善見行状中者它只要理㑹箇寂滅不知須強要寂滅它做甚既寂滅後却作何用何况號為尊􅀫禅和者亦何曾寂滅得近世如宗杲做事全不通㸃檢喜怒更不中節晉宋以前逺法師之類所談只是荘列今其集中可見其後要自立門户方脱去荘列之談然實剽切其説傅奕亦嘗如此説論佛只是説箇大話謾人可憐人都被它謾更不省悟試将法華經看便見其誕開口便説恒河沙數㡬萬㡬千㡬刧更無近底年代又如佛受記某甲㡬刧後方成佛佛有神通何不便成就它做佛何以待闕許久又如住世羅漢猶未成佛何故許多時修行都無長進今被它撰成一藏説話遍滿天下惑了多少人勢須用退之盡焚去乃可絶今其徒若聞此説必曰此正是為佛教者然實繆為此説其心豈肯如此此便是言行不相應處今世俗有一等卑下底人平日所為不善一旦因讀佛書稍稍収斂人便指為學佛之效不知此特粗勝於庸俗之人耳士大夫學佛者全不曾見得力近世李德逺軰皆是也今其徒見吾儒所以攻排之説必曰此吾之迹耳皆我自不以為然者如果是不以為然當初如何却恁地撰下又如偽作韓歐别傳之類正如盜賊怨捉事人故意攤贓耳㽦因論釋氏先生曰自伊洛君子之沒諸公亦多聞闢佛氏矣然終竟説他不下者未知其失之要領耳釋氏自謂識心見性然其所以不可推行者何哉為其於性與用分為兩截也聖人之道必明其性而率之凡修道之教無不本於此故雖功用充塞天地而未有出於性之外者釋氏非不見性及到作用處則曰無所不可為故棄君背父無所不至葢由其性與用不相管也時魏才仲侍側問其故先生曰如今未有此病然亦不可不知譬如人食物欲知烏喙之不可食須是認下這底是烏喙知此物之為毒則他日不食之矣若不便認下他日卒然遇之不知其毒未有不食之也異端之害道如釋氏者極矣以身任道者安得不辨之乎如孟子之辨楊墨正道不明而異端肆行周孔之教将遂絶矣譬如火之焚将及身任道君子豈可不拯救也因説誠意曰前軰有謂闢釋氏為扶教者安在其不妄語也閎祖伊川謂所執皆出禅學之下此説甚好謂攻之者淳今之闢佛者皆以義利辨之此是第二義正如唐人檄髙麗之不能守鴨緑之險髙麗遂守之今之闢佛者類是佛以空為見其見已錯所以都錯義利又何足以為辨舊嘗參䆒後頗疑其不是及見李先生之言初亦信未及亦且背一壁放且理㑹學問看如何後年嵗間漸見其非揚儒之不闢異端者謂如有賊在何處任之不必治揚近看石林過庭録載上蔡説伊川參某僧後有得遂反之蜀本作去偷其説來做已使是為洛學某也嘗疑如石林之説固不足信却不知上蔡也恁地説是怎生地向見光老示及某僧與伊川居士帖後見此帖乃載山谷集中後又見蜀本有文集别本四字有䟦此帖者蜀本作語字乃僧與潘子真潘淳乃興嗣之子也帖蜀本云其所以載於山谷集者以山谷載於集中而或以山谷帖也淳録云其非與伊川明矣其差謬類如此但當初佛學只是説無存飬底工夫至唐六祖始教人存飬工夫當初學者亦只是説不曾就身上做工夫至伊川方教人就身上做工夫所以謂伊川偷佛説為己使義剛問靈源與潘子真書今人皆将做與伊川書謂伊川之學出於靈源也恐後人以入傳燈録中如退之之比不知可寓於何書汪破云某舊十年前聞此事則半夜起來為作文矣其好辯甚也振釋氏之教其盛如此其勢如何拗得他轉吾人家守得一世再世不崇尚他者已自難得三世之後亦必被他轉了不知大聖人出所過者化所存者神時又如朱子語類卷一百二十六
