body:
  text: 朱子語類卷五十七孟子七離婁下舜生於諸馮章若合符節以玉為之篆刻文字而中分之彼此各藏其半有故則左右相合以為信先生曰古人符節多以玉為之如牙璋以起軍旅周禮中有以玉為竹節又有竹符又有英簜符簜小節竹今使者謂之簜節也刻之為符漢有銅虎符竹使符銅虎以起兵竹使郡守用之凡符節右留君所左以與其人有故則君以其右合其左以為信也曲禮曰獻田地者執右契右者取物之劵也如發兵取物徴召皆以右取之也卓僴同子産聴鄭國之政章鄭之虎牢即漢之成臯也虎牢之下即溱洧之水後又名為汜水關子産以乗輿濟人之所也聞人務徳以為孟子之言非是其説以為溱洧之水其深不可以施梁柱其淺不可以渉豈可以濟乗輿盖溱洧之水底皆是沙故不可以施梁柱但可用舟渡而已李先生以為疑或是偶然橋梁壊故子産用其車以渡人然此類亦何必深考孟子之意但言為政者當務民之宜而不徒以小惠耳僴卓録云或問車輿豈可以涉水曰想有可涉䖏聞人秀州人問子産之事以左傳考之類非不知為政者孟子之言姑以其乗輿濟人一事而議之耳而夫子亦止以惠人目之又謂其猶衆人之母知食而不知教豈非子産所為終以惠勝歟曰致堂於惠人也論此一段甚詳東坡云有及人之近利無經世之逺圗亦説得盡都鄙有章只是行惠人底規模若後世所謂政者便只是惠必大中也養不中章中也養不中才也養不才養者非速使之中使之才漸民以仁摩民以義之謂也下以善養人同節言人之不善章言人之不善當如後患何恐是孟子因事而言之人傑仲尼不為己甚章仲尼不為己甚言聖人所為本分之外不加毫末如人合喫八棒只打八棒不可説這人可惡更添一棒稱人之善不可有心於溢美稱人之惡不可溢惡皆不為己甚之事也或上龜山書云徐行後長得堯舜之道不為己甚知仲尼之心龜山讀之甚喜盖龜山平日喜説此兩句也僴問仲尼不為己甚此言本分之外無所増加爾曰己訓太又問非其君不仕非其民不使治亦進亂亦進不羞汙君不辭小官氣象可謂己甚矣而目之曰聖人之清和似頗難㑹頃之乃曰雖是聖終有過當䖏又問伯夷不念舊惡求仁得仁似是清中之和柳下惠不以三公易其介似亦是和中之清曰然凡所謂聖者以其渾然天理無一毫私意若所謂得百里之地而君之皆能朝諸侯有天下行一不義殺一不辜而得天下者皆不為也這便是聖人同處便是無私意處但只是氣質有偏比之失故終有不中節處所以易説中正伊川謂正未必中中無不正也言中則正巳在其中盖無正則做中不出来而单言正則未必能中也夷惠諸子其正與夫子同而夫子之中則非諸子所及也又問夷惠皆言風而不以言伊尹何哉曰或者以伊尹為得行其道而夷惠不得施其志故有此論似不必然亦偶然爾道夫曰以意揣之竊恐伊尹勝似夷惠得些曰也是伊尹體用較全頃之復曰夷恵髙似伊尹伊尹大似夷恵道夫大人者章問大人不失赤子之心大人事事理㑹得只是無許多巧偽曲折便是赤子之心時舉加㦯録云只恁地白直做将去無許曲折又云坦然眀白事事理㑹得都無許多姦巧敬之問大人不失赤子之心曰這須着兩頭㸔大人無不知無不能赤子無所知無所䏻大人者是不失其無所知無所能之心若失了此心使些子機關計些子利害便成箇小底人不成箇大底人了大人心下没許多事時舉大人無所不知無所不能赤子無所知無所能此兩句相拗如何無所不知無所不能却是不失其無所知無所能做出盖赤子之心純一無偽而大人之心亦純一無偽但赤子是無知覺底純一無偽大人是有知覺底純一無偽賀孫䕫孫録云大人之所以為大人者却縁是他存得那赤子之心而今不可将大人之心只作通達萬變赤子只作純一無偽説盖大人之心通達萬變而純一無偽赤子之心未有所知而純一無偽厚之問赤子之心曰止取純一無偽未發時雖與聖人同然亦無知但衆人既發時多邪僻而赤子尚未然耳可學問赤子之心指已發而言然亦有未發時曰亦有未發時但孟子所論乃指其已發者耳良久笑曰今之大人也無那赤子時心義剛問赤子之心莫是發而未逺乎中不可作未發時㸔否曰赤子之心也有未發時也有已發時今欲将赤子之心專作已發㸔也不得赤子之心方其未發時亦與老稚賢愚一同但其已發未有私欲故未逺乎中耳銖施問赤子之心曰程子道是已發而未逺如赤子饑則啼渴則飲便是已發㝢養生者章王徳修云親聞和靖説惟送死可以當大事曰親之生也好惡取舍得以言焉及其死也好惡取舍無得而言當是時親之心即子之心子之心即親之心故曰惟送死可以當大事先生曰亦説得好閎祖君子深造之以道章君子深造之以道語勢稍倒道字合在深造之前趙岐云道者進為之方亦不甚親切道只是進學之具深造者従此挨向前去如之以二字尋常這般去處多将作助語打過了要之却𦂳切如夜氣不足以存與三代所以直道而行以字皆不虛設既醉以酒既飽以徳皆是也謨問道者進為之方如何曰此句未甚安却只是循道以進耳道字在上可學敬之問道者進為之方曰是事事皆要得合道理取之左右逢其原到得熟了自然日用之間只見許多道理在眼前東邊去也是道理西邊去也是道理都自湊合得着故曰逢其原如水之源流出来這邊也撞着水那邉也撞着水賀孫深造之以道欲其自得之曰只深造以道便是要自得之此政與淺廹相對所謂深造者當知非淺廹所可致若欲淺廹求之便是强探力取只是既下工夫又下工夫直是深造便有自得䖏在其中又曰優㳺饜飫都只是深造後自如此非是深造之外又别欲自得也與下章博學而詳説之将以反説約之意同㽦君子深造之以道道只是道理恁地做恁地做深造是日日恁地做而今人造之不以其道無縁得自得深造之以道方始欲其自得㸔那欲字不是深造以道便解自得而今説得多又剰了説得少又説不出皆是不自得䕫孫君子深造之以道欲其自得之也如何曰深造云者非是急廹遽至要舒徐涵養期於自得而已自得之則自信不疑而居之安居之安則資之於道也深資之深則凡動静語黙一事一物無非是理所謂取之左右逢其原也又問資字如何説曰取也資有資藉之意資之深謂其所資藉者深言深得其力也謨去偽畧或問君子深造之以道一章曰深造之以道語似倒了以道字在深造字上方是盖道是造道之方法循此進進不已便是深造之猶言以這方法去深造之也今曰深造之以道是深造之以其方法也以道是工夫深造是做功夫如博學審問慎思眀辨力行之次序即是造道之方法若人為學依次序便是以道不依次序便是不以道如為仁而克己復禮便是以道若不克己復禮别做一般樣便是不以道能以道而為之不已造之愈深則自然而得之既自得之而為我有則居之安居之安則資之深資之深這一句又要人㸔盖是自家既自得之則所以資藉之者深取之無窮用之不竭只管取只管有滚滚地出来無窮自家資他他又資給自家如掘地在下藉上面源頭水来注滿若源頭深則源源来不竭若淺時則易竭矣又如富人大寳藏裏面只管取只管有取之左右逢其原盖這件事也撞着這本来底道理那件事也撞着這本来底道理事事物物頭頭件件皆撞着這道理如資之深那源頭水只是一路来到得左右逢原四方八面都来然這箇只在自得上才自得則下面節次自是如此又云資字如萬物之資始資扵事父以事君之資皆訓取字燾子善問君子深造之以道欲其自得之也一節曰大要在深造之以道此是做工夫䖏資是他資助我資給我不是我資他他那箇都是資助我底物事頭頭撞着左邊也是右邊也是都凑着他道理源頭䖏源頭便是那天之眀命滔滔汨汨底似那一池有源底水他那源頭只管来得不絶取之不禁用之不竭来供自家用似那魚湊活水相似却似都湊着他源頭且如為人君便有那仁従那邊来為人臣便有那箇敬從那邊来子之孝有那孝從那邊来父之慈有那慈從那邊来只是那道理源頭䖏荘子説恃原而往便是説這箇自家靠着他原頭底這箇道理左右前後都見是這道理荘子説在谷滿谷在坑滿坑他那資給我底物事深逺自家這裏頭頭湊着他原頭植賀孫録見下子善問君子深造之以道造是造道欲造道又着以道語意似以道深造曰此只是進為不已亦無可疑公将兩箇道字来説却不分曉賀孫問深造之造字不可便做已到説但言精進做将去又必以其方曰然又問取之左右逢其原是既資之深則道理充足取之至近之䖏莫非道理曰資字恰似資給資助一般資助既深㸔是甚事来無不湊着這道理不待自家将道理去應他只取之左右便撞着這道理如有源之水滚滚流出只管撞着他若是所資者淺略用出便枯竭了荘子説庖丁手之所觸肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中肯正是此意為人君便自撞着箇仁道理為人臣便自撞著箇敬道理為人子便自撞着箇孝道理為人父便自撞着箇慈道理與國人交便自撞着箇信道理無適而不然賀孫居之安只是如人之居住得那裏安稳只是従初本原如此到熟䖏左右皆逢之謙㦯問自得章文義莫有節次否曰此章重䖏只在自得後其勢自然順下来才恁地便恁地但其間自不無節次若是全無節次孟子何不説自得之則取之左右逢其原曰尹先生却正如此説曰㸔他説意思自别孟子之意是欲見其曲折而詳言之尹先生之言是姑舉其首尾而畧言之自孟子後更無人㑹下這般言語或問程子之説何如曰必須以道方可潜心積慮優㳺厭飫若不以道則潜心積慮優㳺厭飫做甚底燾博學而詳説之章博學而詳説之将以反説約也惟先難而後易凡事皆然道夫問博學而詳説之将以反説約也如何曰約自博中来既博學又詳説講貫得直是精確将来臨事自有箇頭緒才有頭緒便見簡約若是平日講貫得不詳悉及至臨事只覺得千頭萬緒更理㑹不下如此則豈得為約去偽問博學詳説将以反説約也曰貫通䖏便是約不是通貫了又去裏面尋討箇約公説約䖏却是通貫了又别去尋討箇約豈有此理伊川説格物䖏云但積累多後自然脱然有貫通䖏積累多後便是學之博脱然有貫通䖏便是約楊楫通老問世間博學之人非不博却又不知箇約處者何故曰他合下博得来便不是了如何㑹約他更不窮究這道理是如何都見不透徹只是搜求隠僻之事鈎摘竒異之説以為博如此豈能得約今世博學之士大率類此不讀正當底書不㸔正當注䟽偏揀人所不讀底去讀欲乗人之所不知以誇人不問義理如何只認前人所未説今人所未道者則取之以為博如此如何望到約䖏又曰某甞不喜揚子雲多聞則守之以約多見則守之以卓多聞欲其約也多見欲其卓也説多聞了又更要一个約去守他正如公説這箇是所守者約不是守之以約也僴徐子曰章所謂聲聞過情這箇大段務外郎當且更就此中間言之如為善無真實懇惻之意為學而勉强苟且狥人皆是不實須就此反躬思量方得僴人之所以異於禽獸章敬之問人之所以異扵禽獸者㡬希曰人與萬物都一般者理也所以不同者心也人心虛靈包得許多道理過無有不通雖間有氣稟昏底亦可克治使之眀萬物之心便包許多道理不過雖其間有稟得氣稍正者亦止有一兩路眀如禽獸中有父子相愛雌雄有别之類只有一兩路眀其他道理便都不通便推不去人之心便虚眀便推得去就大本論之其理則一􅅻稟於氣便有不同賀孫問㡬希二字不是説善惡之間乃是指這些好底説故下云庶民去之君子存之曰人之所以異扵物者只争這些子賀孫時舉録云人物之所同者理也所不同者心也人心虛靈無所不眀禽獸便昏了只有一兩路子眀人之虛靈皆推得去禽獸便推不去人若以私慾蔽了這箇虛靈便是禽獸人與禽獸只争這些子所以謂之㡬希徐元昭問庶民去之君子存之如何是存之曰存是存所以異於禽獸者何故至存之方問因問元昭存何物元昭云有所見曰不離日用之間曰何謂日用之間曰凡周旋運用曰此乃禽獸所以與人同須求其所以與人異者僧問佛如何是性曰耳能聞目能見他便把這箇作性不知這箇禽獸皆知人所以異者以其有仁義禮智若為子而孝為弟而悌禽獸豈􅀎之哉元昭又云萬物皆備於我此言人䏻備禽獸之不備曰觀賢此言元未甞䆒竟可學璘録别出元昭問君子存之曰存是存其所以異於禽獸之道理今自謂䏻存只是存其與禽獸同者耳饑食渴飲之類皆其與禽獸同者也釋氏云作用是性或問如何是作用云在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔徧現俱該沙界収攝在一微塵此是説其與禽獸同者耳人之異於禽獸是父子有親君臣有義夫婦有别長幼有序朋友有信釋氏元不曾存得璘知而不存者有矣未有不知而􅀎存者也君子存之僴眀扵庶物如物格閎祖或問眀於庶物察扵人倫眀察之義有淺深否曰察深於眀眀只是大槩眀得這箇道理爾又問與孝經事天眀事地察之義如何曰這箇眀察又别此察字却訓著字眀字訓昭字事父孝則事天之道昭眀事母孝則事地之道察著孟子所謂眀察與易繋眀於天之道察於人之故同去偽子善問舜眀庶物察人倫文勢自上㸔来此物字恐合作禽獸説曰不然眀扵庶物豈止是説禽獸禽獸乃一物凡天地之間眼前所接之事皆是物然有多少不甚要𦂳底事舜㸔来惟是扵人倫􅇰𦂳要賀孫明於庶物察於人倫明察是見得事事物物之理無一毫之未盡所謂仁義者皆不待求之於外此身此心渾然都是仁義賀孫守約問孟子何以只説舜眀於庶物察於人倫由仁義行非行仁義也曰堯自是渾然舜却是就事物上經歴一一理㑹過賀孫問舜由仁義行非行仁義也若學者須是行仁義方得曰這便如適来説三月不違意他是平日身常在仁義内即恁地行出學者身在外了且須去求仁義就上行然又須以由仁義行為準的方得賀孫符舜功言只是由仁義行好行仁義便有善利之分曰此是江西之學豈不見上面分眀有箇舜字惟舜便由仁義行他人須窮理知其為仁為義従而行之且如仁者安仁智者利仁既未䏻安仁亦須是利仁利仁豈是不好底知仁之為利而行之不然則以人欲為利矣徳眀禹惡㫖酒章問禹惡旨酒好善言湯執中文王望道未之見武王不泄邇不忘逺周公坐以待旦此等氣象在聖人則謂之兢兢業業純亦不已在學者則是任重道逺死而後已之意否曰他本是説聖人又曰讀此一篇使人心惕然而常存也道夫問湯執中立賢無方莫是執中道以立賢否曰不然執中自是執中立賢自是立賢只這執中却與子莫之執中不同故集注下謂執謂守而不失湯只是要事事恰好無過不及而已時舉問周公思兼三王以施四事上文既是各舉一事言四聖人之事亦多周公如何施之曰此必是周公曾如此説大抵所舉四事極好此一處自舜推之至於孔子可學周公思兼三王以施四事此不可考恐是周公自有此語如文王我師也周公豈欺我哉此直是周公曾如此語公眀儀但舉之爾四事極説得好泄字有狎底意思謨因論泄邇忘逺老蘇説乖曰聖人心如潮水上来灣坳浦溆一時皆到無有逺邇方王者之迹熄章問王者之迹熄而詩亡詩亡然後春秋作曰這道理𦂳要在王者之迹熄一句上盖王者之政存則禮樂征伐自天子出故雅之詩自作於上以教天下王迹滅熄則禮樂征伐不自天子出故雅之詩不復作於上而詩降而為國風是以孔子作春秋定天下之邪正為百王之大法也燾荘仲問王者之迹熄而詩亡詩亡然後春秋作先儒謂自東遷之後黍離降為國風而雅亡矣恐是孔子刪詩之時降之曰亦是他當時自如此要識此詩便如周南召南當初在鎬豐之時其詩為二南後来在洛邑之時其詩為黍離只是自二南進而為二雅自二雅退而為王風二南之於二雅便如登山到得黍離時節便是下坡了文蔚可以取章可以取可以無取是先見得可以取後来却見得可以無取如此而取之則傷亷矣盖後来見者較是故也與死亦然閎祖正卿問可以取可以無取取傷廉亦下二聯之義曰㸔来可以取是其初略見得如此可以無取是子細審察見得如此如夫子言再思一般下二聨放此庶㡬不礙不然則不取却是過厚而不與不死却是過薄也壮祖可以取可以無取此段正與孔子曰再斯可矣相似凡事初㸔尚未定再察則已審矣便用決斷始得若更加之思焉則私意起而非義理之本然僴可以取可以無取云云夫取為傷亷固也若與者本恵死者本勇而乃云傷恵傷勇者謂其過予與無益之死耳且學者知所當予而不至於吝嗇知所當死而不至於偷生則㡬矣人傑孟子言可以取可以無取取傷亷可以與可以無與與傷恵他主意只在取傷亷上且将那與傷恵来相對説其實與之過厚些子不害其為厚若􅅻過取便傷廉便是不好過與畢竟當時是好意思與了再㸔之方見得傷恵與傷亷不同所以子華使於齊冉子與之粟五秉聖人雖説他不是然亦不大故責他只是纔過取便深惡之如冉求為之聚歛而欲攻之是也僴天下之言性也章問則故而已矣故是如何曰故是箇已發見了底物事便分眀易見如公都子問性孟子却云乃若其情則可以為善矣盖性自是箇難言底物事惟惻隠羞惡之類却是已發見者乃可得而言只㸔這箇便見得性集注謂故者是已然之迹也是無箇字得下故下箇迹字時舉問則故而已矣曰性是箇糊塗不分眀底物事且只就那故上説故却是實有㾗迹底故有兩件如水之有順利者又有逆行者畢竟順利底是善逆行底是惡所以説行其所無事又説惡於鑿鑿則是那逆行底又説乃若其情則可以為善性是糊塗底物事情却便似實也如惻隱羞惡辭讓是非這便是情植敬之問故是已然之迹如水之潤下火之炎上以利為本是順而不拂之意曰利是不假人為而自然者如水之就下是其性本就下只得順他若激之在山是不順其性而以人為之也如無惻隱之心非人無羞惡之心非人皆是自然而然惟智者知得此理不假人為順之而行南升時舉録别出敬之問故者以利為本如火之炎上水之潤下此是故人不拂他潤下炎上之性是利曰故是本然底利是他自然底如水之潤下火之炎上固是他本然之性如此然水自然潤下火自然炎上便是利到智者行其所無事方是人之得自然底從而順他時舉倪同故是已然之迹如水之下火之上父子之必有親孟子説四端皆是然雖有惻隱亦有殘忍故當以順為本如星辰亦有逆行大要循躔度者是順問南軒説故作本然曰如此則善外别有本然孟子説性乃是於發處見其善荀揚亦扵發䖏説只是道不着問既云於發䖏見伊川云孟子説性乃拔本塞源之理莫因發以見其原曰然可學器之説故者以利為本如流水相似有向下無向上是順他去曰故是本来底以順為本許多惻隱羞惡自是順出来其理自是如此孟子怕人将不好底做出去故説此若将惡者為利之本如水搏而躍之可使過顙這便是将不利者為本如伊川説楚子越椒之生必滅若敖氏自是出来便惡了荀子因此便道人性本惡據他説塗之人皆可為禹便是性善了他只説得氣質之性自是不覺㝢故只是已然之迹如水之潤下火之炎上潤下炎上便是故也父子之所以親君臣之所以義夫婦之别長幼之序然皆有箇已然之迹但只順利䖏便是故之本如水之性固下也然搏之過顙激之在山亦豈不是水哉但非其性爾仁義禮智是為性也仁之惻隱義之羞惡禮之辭遜智之是非此即性之故也若四端則無不順利然四端皆有相反者如殘忍饒録作忮害之非仁不恥之非義不遜之非禮昏惑之非智即故之不利者也伊川發眀此意最親切謂此一章專主智言鑿於智者非所謂以利為本也其初只是性上泛説起不是專説性但謂天下之説性者只説得故而已後世如荀卿言性惡揚雄言善惡混但皆説得下面一截皆不知其所以謂之故者如何遂不䏻以利為本而然也荀卿之言只是横説如此到底滅這道理不得只就性惡篇謂塗之人皆可如禹只此自可見故字若不将已然之迹言之則下文苟求其故之言如何可推歴家自今日推算而上極於太古開闢之時更無差錯只為有此已然之迹可以推測耳天與星辰間或躔度有少差錯久之自復其常以利為本亦猶天與星辰循常度而行苟不如此皆鑿之謂也謨天下之言性則故而已矣故猶云所為也言凡人説性只説到性之故盖故却以利為本利順者従道理上順發出来是也是所謂善也若不利順則是鑿故下面以禹行水言之苟求其故此故與則故却同故猶所以然之意直卿云先生言劉公度説此段意云孟子專為智而言甚好端䝉問天下之言性則故而已先生引程子之言曰此章意在知字此章言性只是從頭説下性者渾然不可言也惟順之則是逆之則非天下之事逆理者如何行得便是鑿也鑿則非其本然之理禹之行水亦只端的見得須是如此順而行之而已鯀績之不成正為不順耳力行問伊川謂則語助也故者本如是者也今言天下萬物之性必求其故者只是欲順而不害之也伊川之説何如曰則字不可做助語看了則有不足之意性最難名状天下之言性者止説得故而已矣故字外難為别下字如故有所以然之意利順也順其所以然則不失其本性矣水性就下順而導之水之性也搏而躍之固可使之在山矣然非水之本性或問天下之言性伊川以為言天下萬物之性是否曰此倒了他文勢只是云天下之言性者止可説故而已矣如此則天下萬物之性在其間矣又問後面苟求其故此故字與前面故字一般否曰然去偽君子所以異於人者章問君子以仁存心以禮存心是我本有此仁此禮只要常存而不忘否曰非也便這箇在存心上説下来言君子所以異於小人者以其存心不同耳君子則以仁以禮而存之於心小人則以不仁不禮而存之於心須㸔他上下文主甚麽説始得僴問先生注下文言存仁存禮何也曰這箇存心與存其心養其性底存心不同只是䖏心又問如此則是君子之所以異於人者以其䖏心也曰以其䖏心與人不同又問何謂䖏心曰以仁䖏於心以禮䖏於心集注非定本節蔡問以仁存心如何下以字曰不下以字也不得吕氏云以此心應萬事之變亦下一以字不是以此心是如何問程子謂以敬直内則不直矣何也曰此䖏又是解直方二字従上説下来敬以直内方順以敬則不順矣淳我必不忠恐所以愛敬人者或有不出於誠實也人傑問自反而忠之忠曰忠者盡已也盡己者仁禮無一毫不盡節舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也此便是知恥知恥則進學安得不勇閎祖禹稷當平世章問禹稷當平世三過其門而不入似天下之事重乎私家也若家有父母豈可不入曰固是然事亦須量緩急問何謂緩急曰若洪水之患不甚為害只是那九年泛泛底水未便㑹傾國覆都過家見父母亦不妨若洪水之患甚急有傾國溺都君父危亡之災也只得且奔君父之急雖不過見父母亦不妨也又問鄉隣有鬬者雖閉户可也此便是用權若鄉鄰之鬬有親戚兄弟在其中豈可一例不救曰有兄弟固當救然事也須量大小若只是小小鬬毆救之亦無妨若是有兵戈殺人之事也只得閉門不管而已僴公都子問匡章章孟子之於匡章盖怜之耳非取其孝也故楊氏以為匡章不孝孟子非取之也特哀其志而不與之絶耳據章之所為因責善於父母而不相遇雖是父不是已是然便至如此蕩業出妻屏子終身不養則豈得為孝故孟子言父子責善賊恩之大者此便是責之以不孝也但其不孝之罪未至於可絶之地爾然當時人則遂以為不孝而絶之故孟子舉世之不孝者五以曉人若如此五者則誠在所絶爾後世因孟子不絶之則又欲盡雪匡子之不孝而以為孝此皆不公不正倚於一偏也必若孟子之所䖏然後可以見聖賢至公至仁之心矣或云㸔得匡章想是箇拗强底人觀其意属於陳仲子則可見其為人耳先生甚然之曰兩箇都是此樣人故説得合味道云舜不告而娶盖不欲廢人之大倫以懟父母耳如匡章則其懟也甚矣廣朱子語類卷五十七
