body:
  text: 朱子語類卷九十九張子書之二非類入近思者别為此卷正蒙有差分曉底看節或問正䝉中說得有病處還是他命辭不出有差還是見得差曰他是見得差如曰繼之者善也方是善惡混云云成之者性是到得聖人處方是成得性所以說知禮成性而道義岀似這處都見得差了賀孫正䝉所論道體覺得源頭有未是處故伊川云過處乃在正蒙答書之中云非明睿所照而考索至此葢横渠却只是一向苦思求將向前去却欠涵泳以待其義理自形見處如云由氣化有道之名說得是好終是生受辛苦聖賢便不如此說試教明道說便不同如以太虛太和爲道體却只是說得形而下者皆是發而皆中節謂之和處㽦横渠教人道夜間自不合睡只爲無可應接他人皆睡了已不得不睡他做正䝉時或夜裏黙坐徹曉他直是恁地勇方做得因舉曾子任重道遠一叚曰子思曾子直恁地方被他打得透幹横渠作正䝉時中夜有得亦須起冩了方放下得而睡不然放不下無安著處問正蒙說道體處如太和太虛虛空云者止是說氣說聚散處其流乃是箇大輪廽蓋其思慮攷索所至非性分自然之知若語道理惟是周子說無極而太極最好如由太虚有天之名由氣化有道之名合虚與氣有性之名合性與知覺有心之名亦說得有理由氣化有道之名如所謂率性之謂道是也然使明道形容此理必不如此說伊川所謂横渠之言誠有過者乃在正䝉以清虚一大爲萬物之原有未安等語槩可見矣人傑問横渠說太和所謂道一段考索許多亦好其後乃云不如野馬紛紜不足謂之太和却說倒了曰彼以太和狀道體與發而中節之和何異人傑問横渠太虚之說本是說無極却只說得無字曰無極是該貫虚實清濁而言無極字落在中間太虛字落在一邊了便是難說聖人熟了說出便恁地平正而今把意思去形容他却有時偏了明道說氣外無神神外無氣謂清者爲神則濁者非神乎後來亦有人與横渠說横渠却云清者可以該濁虛者可以該實却不知形而上者還他是理形而下者還他是器既說是虛便是與實對了既說是清便是與濁對了如左丞相大得右丞相不多問曰無極且得做無形無象說曰雖無形却有理又問無極太極只是一物曰本是一物被他恁地說却似兩物䕫孫横渠說道止於形器中揀箇好底說耳謂清爲道則濁之中果非道乎客感客形與無感無形未免有兩截之病聖人不如此說如曰形而上者謂之道又曰一隂一陽之謂道人傑言客感客形與無感無形未免分截作兩叚事聖人不如此說只說形而上形而下而已故又曰一隂一陽之謂道葢隂陽雖是器而與道初不相離耳道與器豈各是一物乎􅓌問太虚不能無氣一段曰此難理㑹若看又走作去裏去偽問氣聚則離明得施而有形氣不聚則離明不得施而無形離明何謂也曰此說似難曉有作日光說有作目說看來只是氣聚則目得而見不聚則不得而見易所謂離爲目是也先生因舉方其形也有以知幽之因方其不形也有以知明之故合當言其形也有以知明之故其不形也有以知幽之因方是却反說何也葢以形之時此幽之因已在此不形之際其明之故已在此聚者散之因散者聚之故木之㝢同問横渠云太虛即氣太虛何所指曰他亦指理但說得不分曉曰太和如何曰亦指氣曰他又云由昧者指虛空爲性而不本天道如何曰既曰道則不是無釋氏便直指空了大要渠當初說出此道理多誤可學正䝉中地純隂天浮陽一段說日月五星甚宻閎祖參兩篇横渠云天左旋處其中者順之少遲則反右矣此說好閎祖横渠言隂聚之陽必散之一段却見得隂陽之情􅓌横渠云陽爲隂累則相持爲雨而降陽氣正升忽遇隂氣則相持而下爲雨蓋陽氣輕隂氣重故陽氣爲隂氣壓墜而下也隂爲陽得則飄揚爲雲而升隂氣正升忽遇陽氣則助之飛騰而上爲雲也隂氣凝聚陽在内者不得出則奮擊而爲雷霆陽氣伏於隂氣之内不得出故爆開而爲雷也陽在外者不得入則周旋不舍而爲風隂氣凝結於内陽氣欲入不得故旋繞其外不已而爲風至吹散隂氣盡乃已也和而散則爲霜雪雨露不和而散則爲戾氣曀霾戾氣飛雹之類曀霾黄霧之類皆隂陽邪惡不正之氣所以雹水穢濁或青黒色僩問横渠言帝天之命主於民心曰皆此理也民心之所向即天心之所存也人傑天道篇問横渠謂鬼神者往來屈伸之意故天曰神地曰示人曰鬼示字之義如何曰說文示字以有所示爲義故視字從示天之氣生而不息故曰神地之氣顯然示人故曰示向嘗見三舍時舉子易義中有云一而大謂之天二而小謂之地二而小即示字也恐是字說又曰天曰神地曰示者蓋其氣未嘗或息也人鬼則其氣有所歸矣廣神化篇林問神爲不測故緩辭不足以盡神化爲難知故急辭不足以體化如何是緩辭急辭曰神自是急底物事緩辭如何形容之如隂陽不測之謂神神無方易無體皆是急辭化是漸漸而化若急辭以形容之則不可㝢林問象若非氣指何爲象時若非象指何爲時云云答曰且如天地日月若無這氣何以撑拄得成這象象無晦明何以别其爲晝夜無寒無暑何以别其爲冬夏㝢天氣降而地氣不接則爲霧地氣升而天氣不接則爲雺見禮運注聲者氣形相軋而成兩氣風雷之類兩形桴鼔之類氣軋形如笙篁之類形軋氣如羽扇敲矢之類是皆物感之良能人習之而不察耳至動物篇問横渠說天性在人猶水性之在冰凝釋雖異爲理一也又言未嘗無之謂體體之謂性先生皆以其言爲近釋氏冰水之喻有還元反本之病云近釋氏則可未嘗無之謂體體之謂性蓋謂性之爲體本虛而理未嘗不實若與釋氏不同曰他意不是如此亦謂死而不亡耳文蔚誠明篇問張子冰水之說何謂近釋氏曰水性在冰只是凍凝成箇冰有甚造化及其釋則這冰復歸於水便有迹了與天性在人自不同曰程子器受日光之說便是否曰是除了器日光便不見却無形了淳問横渠謂所不能無感者為性性只是理安能感恐此言只可名心否曰横渠此言雖未親切然亦有箇模樣蓋感固是心然所以感者亦是此心中有此理方能感理便是性但將此句要來解性便未端的如伊川說仁者天下之正理又曰仁者天下之公善之本也將此語來賛詠仁則可要來正解仁則未親切如義豈不是天下之正理淳問横渠言物所不能無感謂性此語如何曰有此性自是因物有感見於君臣父子日用事物當然處皆感也所謂感而遂通是也此句對了天所不能自己謂命蓋此理自無息止時晝夜寒暑無一時停故逝者如斯而程子謂與道爲體這道理今古晝夜無須臾息故曰不能己銖問聞見之知非德性之知他便把博物多能作聞見之知若如學者窮理豈不由此至德性之知曰自有不由聞見而知者可學天心篇問横渠耳目知德性知曰便是差了雖在聞見亦同此理不知他資質如此何故如此差某云吕與叔難曉處似横渠好處却多曰他又曾見伊川某云他更在得一二十年須傳得伊川之學曰渠集中有與蘇季明一書可疑恐曾學佛可學賀孫再問前夜所說横渠聖人不教人避凶趨吉亦以正信勝之之語伯謨云此可以破世俗利害之說合理者無不吉悖理者無不凶然其間未免有相反者未有久而不定也先生因云諸葛誠之却道吕不韋春秋好道他措置得事好却道董子正其義不謀其利明其道不計其功說不是他便說若是利成則義自在其中功成則道自在其中賀孫大易篇問横渠說遇曰他便說命就理說曰此遇乃是命曰然命有二有理有氣曰子思天命之謂性是理孟子是𢃄氣說曰然可學乾稱篇横渠言遇命是天命遇是人事但說得亦不甚好不如孟子某又問曰但不知他說命如何可學横渠闢釋氏輪囬之說然其說聚散屈伸處其弊却是大輪囬蓋釋氏是箇箇各自輪囬横渠是一發和了依舊一大輪囬吕與叔集中亦多有此意思􅓌横渠所謂立得心只是作得主底意思端蒙以下理窟篇語錄并雜錄問横渠得尺守尺得寸守寸之說曰不必如此且放寛地歩不成讀書得一句且守一句須一面居敬持養將去德明用之問虛者仁之原曰此如克己復禮爲仁又如太極動而生陽子蒙問虚者仁之原曰虚只是無欲故虛虚明無欲此仁之所由生也又問此虚字與一大清虛之虛如何曰這虛也只是無欲渠便將這箇喚做道體然虛對實而言却不似形而上者銖問横渠有清虛一大之說又要兼清濁虛實曰渠初云清虛一大爲伊川詰難乃云清兼濁虚兼實一兼二大兼小渠本要說形而上反成形而下最是於此處不分明如參兩云以參爲陽兩爲隂陽有太極隂無太極他要强索精思必得於已而其差如此又問横渠云太虛即氣乃是指理爲虛似非形而下曰縱指理爲虚亦如何夾氣作一處問西銘所見又的當何故却於此差曰伊川云譬如以管窺天四旁雖不見而其見處甚分明渠他處見錯獨於西銘見得好可學或問横渠先生清虛一大之說如何曰他是揀那大底說話來該攝那小底却不知道纔是恁說便偏了便是形而下者不是形而上者須是兼清濁虚實一萬小大來看方見得形而上者行乎其間横渠清虛一大却是偏他後來又要兼清濁虚實言然皆是形而下蓋有此理則清濁虛實皆在其中可學横渠說氣清虛一大恰似道有有處有無處須是清濁虛實一萬大小皆行乎其間乃是道也其欲大之乃反小之方陳後之問横渠清虛一大恐入空去否曰也不是入空他都向一邊了這道理本平正清也有是理濁也有是理虛也有是理實也有是理皆此理之所爲也他說成這一邊有那一邊無要將這一邊去管那一邊淳清虛一大形容道體如此道兼虚實言虚只說得一邊閎祖横渠言清虚一大爲道體是於形器中揀出好底來說耳遺書中明道嘗辨之㽦或者别立一天疑即是横渠可學問横渠說虚云亦有箇意思只是難說要之只動而無動靜而無靜說爲善横渠又說至虛無應有病方問中虚信之本中實信之質如何曰只看中虛中實字便見本質之異中虛是無事時虚而無物故曰中虚若有物則不謂之中虛自中虚中發出來皆是實理所以曰中實燾問中虚信之本曰中虛只是自家無私主故發出來無非真實纔有些私於中便不虚不信矣燾問心如何能通以道使無限量曰心不是横門硬迸教大得須是去物欲之蔽則清明而無不知窮事物之理則脫然有貫通處横渠曰不以聞見梏其心大其心則能體天下之物所謂通之以道便是脫然有貫通處若只守聞見便自然狹窄了㽦問心包誠一叚曰是横渠說話正如心小性大之意可學横渠云以誠包心不若以心包誠是他看得忒重故他有心小性大之說道夫因看語錄心小性大心不𢎞於性滯於知思說及上蔡云心有止說遂云心有何窮盡只得此本然之體推而應事接物皆是故於此知性之無所不有知天亦以此因省李先生云盡心者如孟子見齊王問樂則便對云云言貨色則便對云云每遇一事便有以處置將去此是盡心舊時不之曉蓋此乃盡心之效如此得此本然之心則皆推得去無窮也如見牛未見羊說苟見羊則亦便是此心矣方横渠云以道體身非以身體道蓋是主於義理只知有義理却將身只做物樣看待謂如先理㑹身上利害是非便是以身體道如顔子非禮勿視便只知有禮不知有已耳㽦問横渠說以道體身等處曰只是有義理直把自家作無物看伊川亦云除却身只是理懸空只是箇義理人傑横渠云學者識得仁體後如讀書講明義理皆是培壅且只於仁體上求得一箇真實却儘有下功夫處也謨道夫問張子云以心克己即是復性復性便是行仁義竊謂克己便是克去私心却云以心克己莫剰却以心兩字否曰克已便是此心克之公但看爲仁由已而由人乎哉非心而何言忠信行篤敬立則見其參於前在輿則見其倚於衡這不是心是甚麽凡此等皆心所爲但不必更著心字所以夫子不言心但只說在裏教人做如喫飯須是口冩字須是手更不用說口喫手冩又問復性便是行仁義復是方復得此性如何便說行得曰既復得此性便恁地行纔去得不仁不義則所行便是仁義那得一箇在不仁不義與仁義之中底物事不是人欲便是天理不是天理便是人欲所以謂欲知舜與蹠之分者無他利與善之間也所隔甚不多但聖賢把得這界定爾道夫朱子語類卷九十九
