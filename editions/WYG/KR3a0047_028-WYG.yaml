body:
  text: 朱子語類卷二十八論語十公冶長上子謂公冶長章問子謂公冶長章曰子謂可妻必有以取之矣雖在縲紲之中特因而舉之非謂以非罪而陷縲紲為可妻也南升南容為人觀其三復白圭便是能謹其言行者邦有道是君子道長之時南容必不廢棄邦無道是小人得志以陷害君子之時南容能謹其言行必不陷於刑戮南升問子謂南容章集注云以其謹於言行如其三復白圭固見其謹於言矣謹扵行䖏雖未見然言行實相表裏能謹扵言必能謹於行矣曰然燾問公冶長可妻伊川以避嫌之事賢者不為况聖人乎自今人觀之閨門中安知無合着避嫌處曰聖人正大道理合做處便做何用避嫌問古人門内之治恩掩義門外之治義斷恩㝢恐閨門中主恩怕亦有避嫌處曰固是主恩亦須是當理方可某看公浙人多要避嫌程子所謂年之長幼時之先後正是解或人之説未必當時如此大抵二人都是好人可托或先是見公冶長遂將女妻他後來見南容亦是箇好人又把兄之女妻之看來文勢恐是孔子之女年長先嫁兄之女少在後嫁亦未可知程子所謂凡人避嫌者皆内不足實是如此㝢叔䝉問程子避嫌之説曰合當委曲便是道理當如此且如避嫌亦不能無如做通判與太守是親戚也合當避嫌第五倫之事非不見得如此自是常有這心在克不去今人這様甚多只是徇情恁地去少間將這箇做正道理了大是害事所以古人於誠意正心上更著工夫正怕到這處㝢子謂子賤章或問魯無君子斯焉取斯曰便雖有聖人在也須愽取於人方能成徳問魯無君子斯焉取斯曰居鄉而多賢其老者吾當尊敬師事以求其益其行輩與吾相若者則納交取友親炙漸磨以涵養徳性薫陶氣質賀孫問子謂子賤章曰㸔来聖人以子賤為君子哉若人此君子亦是大槩説如南宮适出子曰君子哉若人一般大抵論語中有説得最髙者有大槩説如言賢者之類若言子賤為君子而子貢未至於不器恐子賤未能強似子貢又子賤因魯多君子而後有所成就不應魯人强似子貢者如此之多南升子貢問賜也何如章叔䝉問子貢通愽明達若非止扵一能者如何却以器目之莫是亦有窮否曰畢竟未全備賀孫子貢是器之貴者可以為貴用雖與賤者之器不同然畢竟只是器非不器也明作問子貢得為器之貴者聖人許之然未離乎器而未至於不器處不知子貢是合下無規模抑是後来欠工夫曰也是欠工夫也是合下禀得偏了一般人資禀䟽通明達平日所做底工夫都隨他這疏通底意思去一般人禀得恁地馴善自是隨這馴善去恰似人喫藥五臟和平底人喫這藥自流注四肢八脈去若是五臟中一處受病受得深喫這藥都做那一邊去這一邊自勝了難得効學者做工夫正要得専去偏處理㑹㝢或曰雍也章仁而不佞時人以佞為賢屢憎於人是他説得大驚小恠被他驚嚇者豈不惡之明作佞只是捷給辯口者古人所説皆如此後世方以諂字解之祖道佞是無實之辯道夫林一之問孔子於仲弓不知其仁如何曰孔子既不保他必是也有病痛然這一章是不佞要緊佞不是諂佞是箇口快底人事未問是不是一時言語便抵當得去子路使子羔為費宰子曰賊夫人之子子路曰何必讀書然後為學子曰是故惡夫佞者子路未問是與不是臨時撰得話来也好可見是佞㝢問為人君止於仁若是未仁則不能視民猶已而不足為君然夫子既許仲弓南面而又曰未知其仁如何曰言仁有麄細有只是指那慈愛而言底有就性上説底這箇便較細膩若有一毫不盡不害為未仁只是這箇仁但是那箇是淺底這箇是深底那箇是踈底這箇是宻底義剛子使漆雕開仕章陳仲卿問子使漆雕開仕章曰此章當於斯字上㸔斯是指箇甚麽未之能信者便是扵這箇道理見得未甚透徹故信未及㸔他意思便把箇仕都輕㸔了時舉吾斯之未能信他是不肯更做小底所謂有天民者達可行於天下而後行之者也道夫或問吾斯之未能信如何曰斯之一字甚大漆雕開能自言吾斯之未能信則其地已髙矣斯有所指而云非只指誠意正心之事事君以忠事父以孝皆是這箇道理若自信得及則雖欲不如此做不可得矣若自信不及如何勉强做得欲要自信得及又須是自有所得無遺方是信祖道去偽同問子使漆雕開仕對曰吾斯之未能信斯者此理也漆雕開能指此理而言便是心目之間已有所見未能信者未能真知其實然而自保其不叛以此見漆雕開已見大意方欲進進而不已盖見得大意了又要真知到至實無妄之地它日成就其可量乎此夫子所以悦其篤志也祖道按此無荅語姑從蜀本存之或問吾斯之未能信曰知得深便信得篤理合如此者必要如此知道不如此便不得如此只此是信且如人孝亦只是大綱説孝謂有些小不孝處亦未妨又如忠亦只是大綱説忠謂便有些小不忠處亦未妨即此便是未信此是漆雕開心上事信與未信聖人何縁知得只見他其才可仕故使之仕他揆之於心有一毫未得不害其為未信仍更有志於學聖人所以説之又問謝氏謂其器不安於小成何也曰據他之才已自可仕只是他不伏如此又欲求進譬如一株樹用為椽桁已自可矣他不伏做椽桁又要做柱便是不安於小成也文蔚立之問吾斯之未能信曰漆雕開己見得這道理是如此但信未及所謂信者真見得這道理是我底不是問人假借将来譬如五榖可以飽人人皆知之須是五榖灼然曾喫得飽方是信得及今學者尚未曾見得却信箇甚麽若見人説道這箇善這箇惡若不曾自見得都不濟事亦終無下手䖏矣時舉信者自保得過之意知與行皆然自保得知得自保得行得漆雕開只是見得分明然亦不敢自保如此故曰吾斯之未能信盖其絲毫隠微之間自知之爾端蒙問竊意開都見得許多道理但未能自保其終始不易曰他於道理已自透徹了又問他説未能信恐是自覺行䖏有些勉强在曰未須説行在目即便有些小窒礙處胡泳敬之問此章曰也不是要就用䖏説若是道理見未破只且理㑹自身己未敢去做他底亦不是我信得了便定着去做道理自是如此這裏見得直是分曉方可去做㝢因問明道所言漆雕開曾㸃已見大意二子固是已見大體了㸔来漆雕見得雖未甚快却是通體通用都知了曾㸃雖長見得快恐只見體其用䖏未必全也先生以為然問㝢有何説㝢曰開之未信若一理見未透即是未信曰也不止説一理要知信不過不真知決是如此行一不義殺一不辜得天下不為須是真見得有不義不辜䖏便不可以得天下若説畧行不義畧殺不辜做到九分也未甚害也不妨這便是未信䖏這裏更須玩味省察體認存養亦㑹見得決定恁地而不可不恁也所謂脱然如大寐之得醒方始是信䖏耳問格物窮理之初事事物物也要見到那裏了曰固是要見到那裏然也約摸是見得直到物格知至那時方信得及㝢漆雕開吾斯之未能信斯是甚底他是見得此箇道理了只是信未及他眼前㸔得闊只是踐履未純熟他是見得箇規模大不入這小底窠坐曾晳被他見得髙下面許多事皆所不屑為到他説時便都恁地脱灑想見他只是天資髙便見得恁地都不曾做甚工夫却與曽子相反曾子便是着實歩歩做工夫到下梢方有所得曾晳末流便㑹成荘老想見當時聖人亦須有言語敲㸃他只是論語載不全賀孫問吾斯之未能信曰信是於這箇道理上見得透全無些疑䖏他㸔得那仕與不仕全無緊要曾㸃亦然但見得那日用都是天理流行㸔見那做諸侯卿相不是緊要却不是髙尚要恁地説是他自㸔得没緊要今人居鄉只見居鄉利害居官只見居官利害全不見道理他見得道理大小大了見那居官利害都没緊要仕與不仕何害植知只是一箇知只是有深淺須是知之深方信得及如漆雕開吾斯之未能信是也若説道别有箇不可説之知便是釋氏之所謂悟也問張子所謂徳性之知不萌於聞見是如何曰此亦只是説心中自曉㑹得後又信得及耳廣問漆雕循守者乎曰循守是守一節之廉如原憲之不容物是也漆雕開却是收歛近約伯羽道夫録云原憲不能容物近於狷開却是収歛近約問注謂信是真知其如此而無毫髮之疑是如何曰便是朝聞道意思須是自見得這道理分明方得問是見得吾心之理或是出仕之理曰都是這箇理不可分别漆雕開却知得但知未深耳所以未敢自信問程子云曾㸃漆雕開已見大意如何曰也是見得這意思漆雕開想見他已知得八分了因説物格知至他只有些子未格有些子未至耳伊川嘗言虎傷者曾經傷者神色獨變此為真見得信得凡人皆知水蹈之必溺火蹈之必焚今試教他去蹈水火定不肯去無他只為真知㝢集注或問吾斯之未能信注云未有以真知其實然而保其不叛也聖門弟子雖曰有所未至然何至於叛道曰如此則曾子臨終更説戰戰兢兢如履薄冰做甚麽或曰起居動作有少違背便是叛道否曰然集注係舊本僴問曾㸃漆雕開已見大意如何是已見大意曰是他見得大了謙之録云是大底意思便小合殺不得論語中説曾㸃處亦自可見如漆雕開只是此一句如何便見得他已見大意䖏然工夫只在斯字與信字上且説斯字如何㽦等各以意對曰斯只是這許多道理見於日用之間君臣父子仁義忠孝之理信是雖己見得如此却自斷當恐做不盡不免或有過差尚自保不過雖是知其已然未能決其将然故曰吾斯之未能信㽦楊丞問如何謂之大意曰規模小底易自以為足規模大則功夫卒難了所以自謂未能信璘問漆雕開已見大意如何曰大意便是本初䖏若不見得大意如何下手作工夫若已見得大意而不下手作工夫亦不可孔門如曾㸃漆雕開皆已見大意某問開自謂未能信孔子何為使之仕曰孔子見其可仕故使之仕它隠之於心有未信處可學問曾㸃漆雕開已見大意曰漆雕開想是灰頭土面朴實去做工夫不求人知底人雖見大意也學未到若曾晳則只是見得徃徃却不曾下工夫時舉或問子説開意如何曰明道云曾㸃漆雕開已見大意又云孔子與㸃盖與聖人之志同便是堯舜氣象㸔這語意是如何㸔得此意方識得聖人意賀孫王景仁問程子言曾㸃與漆雕開已見大意何也曰此當某問公而公反以問某邪此在公自參取既而曰所謂斯之未信斯者非大意而何但其文理宻察則二子或未之及又問大意竟是如何曰若推其極只是維皇上帝降衷于下民壮祖或問曾㸃漆雕開已見大意曰曾記胡明仲説禹稷顔囘同道其意謂禹稷是就事上做得成底顔子見道是做未成底此亦相類開是着實做事已知得此理㸃見識較髙但却着實䖏不如開開却進未已㸃恐不能進銖直卿問程子云云曰開更宻似㸃㸃更規模大開尤縝宻道夫問漆雕開與曾㸃孰優劣曰舊㸔皆云曾㸃髙今㸔来却是開着實㸃頗動蕩可學問恐漆雕開見處未到曾㸃曰曾㸃見雖髙漆雕開却確實觀他吾斯之未能信之語可見文蔚曾㸃開濶漆雕開深穏方子曾㸃漆雕開已見大意若論見處開未必如㸃透徹論做䖏㸃又不如開着實邵堯夫見得恁地却又只管作弄去儒用曾㸃己見大意却做得有欠缺漆雕開見得不如㸃透徹而用工却宻㸃天資甚髙見得這物事透徹如一箇大屋但見外面墻圍周匝裏面間架却未見得却又不肯做工夫如邵康節見得恁地只管作弄又曰曾子父子却相反曾子初間却都不見得只從小䖏做去及至一下見得大䖏時他小䖏却都曾做了賜曾㸃見得甚髙却於工夫上有踈畧䖏漆雕開見䖏不如曾㸃然有向進之意曾㸃與曾參正相反曾參却是積累做去千條萬緒做到九分八釐只有這些子未透既聞夫子一貫之㫖則前日之千條萬緒皆有着落矣忠恕而已矣此是借學者之忠恕以影出聖人自然之忠恕也上蔡言漆雕開不安於小成是他先見大意了方肯不安於小成若不見大意如何知得它不肯安於小成若不見大意者只安於小成耳如人食藜藿與食芻豢若未食芻豢只知藜藿之美及食芻豢則藜藿不足食矣賀孫道不行章夫子浮海假設之言且如此説非是必要去所以謂子路勇可以從行便是未必要去明作問子路資質剛毅固是箇負荷容受得底人如何却有那聞之喜及終身誦之之事曰也只縁他好勇故凡事麄率不能深求細繹那道理故有此事廣孟武伯問子路仁乎章仲由可使治賦才也不知其仁以學言也升卿孟武伯問三子仁乎夫子但言三子才各有所長若仁則不是易事夫子雖不説三子無仁但言不知其仁則無在其中矣仁是全體不息所謂全體者合下全具此心更無一物之雜不息則未嘗休息置之無用䖏全體似箇桌子四脚若三脚便是不全不息是常用也或置之僻䖏又被别人将去便是息此心具十分道理在若只見得九分亦不是全了所以息者是私欲間之無一毫私欲方是不息乃三月不違以上地位若違時便是息不善底心固是私若一等閒思慮亦不得須要照管得此心常在明作問孟武伯問三子之仁而聖人皆不之許但許其才云云曰大槩是如此又問雖全體未是仁苟於一事上能當理而無私心亦可謂之一事之仁否曰不然盖纔説箇仁字便用以全體言若一事上能盡仁便是他全體是仁了若全體有虧這一事上必不能盡仁纔説箇仁字便包盡許多事無不當理無私了所以三子當不得這箇仁字聖人只稱其才僴問孔門之學莫大於為仁孟武伯見子路等皆孔門髙弟故問之孔子於三子者皆許其才而不許其仁曰何故許其才不許其仁對曰三子之才雖各能辦事但未知做得來能無私心否曰然聖人惟見得他有駁雜處若是不就這裏做工夫便待做得事業来終是麄率非聖賢氣象若有些子偏駮便不是全體南升林問子路不知其仁䖏曰仁譬如一盆油一般無些子夾雜方喚做油一㸃水落在裏面便不純是油了渾然天理便是仁有一毫私欲便不是仁了子路之心不是都不仁仁人心也有發見之時但是不純故夫子以不知荅之卓不知其仁仁如白不仁如黑白須是十分全白方謂之白纔是一㸃墨㸃破便不得白了䕫孫或問由求所以未仁如何曰只為它功夫未到問何謂工夫先生不答乆之乃曰聖門功夫自有一條坦然路徑諸公每日理㑹何事所謂功夫者不過居敬窮理以修身也由求只是這些功夫未到此田地不若顔子故夫子所以知其未仁若能主敬以窮理功夫到此則徳性常用物欲不行而仁流行矣銖子升問聖人稱由也可使治賦求也可使為宰後来求乃為季氏聚歛由不得其死聖人容有不能盡知者曰大約也只稱其材堪如此未論到心徳處㸔不知其仁之語裏面却煞有說話木之子謂子貢曰章問回賜孰愈一段大率比較人物亦必稱量其斤兩之相上下者如子貢之在孔門其徳行盖在冉閔之下然聖人却以之比較顔子豈以其見識敏悟雖所行不逮而所見亦可幾及與曰然聖人之道大段用敏悟曉得時方擔荷得去如子貢雖所行未實然他却極是曉得所以孔子愛與他説話縁他曉得故可以擔荷得去雖所行有未實使其見處更長一格則所行自然又進一歩聖門自曾顔而下自還是子貢如冉閔非無徳行然終是曉不甚得擔荷聖人之道不去所以孔子愛呼子貢而與之語意盖如此僴居父問回也聞一知十即始見終是如何曰知十亦不是聞一件定知得十件但言知得多知得周徧又問聖人生知其與顔子不同處是何如曰聖人固生知終不成更不用理㑹但聖人較之顔子又知得多今且未要説聖人且只就自家地位㸔今只就這一件事聞得且未能理㑹得恰好䖏况於其他賀孫集注胡問回聞一知十是明睿所照若孔子則如何曰孔子又在明睿上去耳順心通無所限際古者論聖人都説聰明如堯聰明文思惟天生聰明時乂亶聰明作元后聰明睿智足以有臨也聖人直是聰明淳問顔子明睿所照合下已得其全體不知扵金聲玉振體段俱到否曰顔子於金聲意思却得之但扵玉振意思却未盡賀孫問只是做未到却不是見未到曰是他合下都自見得周備但未盡其極耳賀孫顔子明睿所照子貢推測而知此兩句當玩味見得優劣處顔子是真箇見得徹頭徹尾子貢只是暗度想像恰似将一物来比並相似只能聞一知二顔子雖是資質純粹亦得學力所以見得道理分明凡人有不及人處多不能自知雖知亦不肯屈服而子貢自屈於顔子可謂髙明夫子所以與其弗如之説明作明睿所照如箇明鏡在此物来畢照推測而知如将些子火光逐些子照去推尋僴問子貢推測而知亦是格物窮理否曰然若不格物窮理則推測甚底燾問謝氏解女與回也孰愈章大抵謂材之髙下無與入徳之優劣顔子雖聞一知十然亦未嘗以此自多而子貢以此論之乃其所以不如顔子者夫子非以子貢之知二為不如顔子之知十也此固非當時答問之㫖然詳味謝氏語勢恐其若是曰上蔡是如此説吳才老十説中亦如此論必大集義吾未見剛者章子曰吾未見剛者蓋剛是堅强不屈之意便是卓然有立不為物欲所累底人故夫子以為未見其人或人不知剛之義夫子以為棖也慾焉得剛慾與剛正相反最怕有慾南升問剛亦非是極底地位聖門豈解無人夫子何以言未見曰也是説難得剛也是難得又言也是難得淳録作無慾便是剛真難得如那撑眉弩眼便是慾申棖便是恁地想見他做得箇人也大故勞攘義剛問秦漢以下甚麽人可謂之剛曰只㸔他做得如何那拖泥帶水底便是慾那壁立千仞底便是剛叔器問剛莫是好仁惡不仁否盖剛有那勇猛底意思曰剛則能果斷謂好惡為剛則不得如這刀有此鋼則能割物今呌割做鋼却不得又言剛與勇也自别故六言六蔽有好剛不好學又有好勇不好學義剛淳録畧棖也慾慾者溺於愛而成癖者也人傑吾未見剛者慾與剛正相反若耳之欲聲目之欲色之類皆是欲才有些被它牽引去此中便無所主焉得剛或者以申棖為剛必是外面悻悻自好聖人觀人直從裏面㸔出見得它中無所主只是色荘要人道好便是欲了安得為剛南升問吾未見剛者一章曰人之資質千條萬别自是有許多般有剛於此而不剛於彼底亦有剛而多慾亦有柔而多慾亦有剛而寡慾亦有柔而寡慾自是多般不同所以只要學問學問進而見得理明自是勝得他若是不學問只隨那資質去便自是屈扵慾如何勝得他盖學問則持守其本領擴充其識所以能勝得他而不為所屈也此人之所貴者惟學而已矣申棖也不是箇榻翣底人是箇剛悻做事聒噪人底人燾上蔡這處最説得好為物揜之謂慾故常屈於萬物之下今人纔要貪這一件物事便被這物事壓得頭低了申棖想只是箇悻悻自好底人故當時以為剛然不知悻悻自好只是客氣如此便有以意氣加人之意只此便是慾也時舉集注或問剛與悻悻何異曰剛者外面退然自守而中不詘扵慾所以為剛悻悻者外面有崛強之貌便是有計較勝負之意此便是慾也時舉子貢曰我不欲人之加諸我章子貢謂此等不善底事我欲無以加於人此意可謂廣大然夫子謂非爾所及盖是子貢功夫未到此田地學者只有箇恕字要充擴此心漸漸勉力做向前去如今便説無欲加諸人無者自然而然此等地位是本體明浄發䖏盡是不忍之心不待勉強乃仁者之事子貢遽作此言故夫子謂非爾所及言不可以躐等南升問子貢欲無加諸人夫子教之勿施於人何以異曰異處在無字與勿字上伊川説仁也恕也㸔得精大雅問此如何非子貢所能及曰程先生語録中解此數段終是未剖判唯伊川經解之言是晚年仁熟方㸔得如此分曉説出得如此分明兩句所以分仁恕只是生熟難易之間洽子貢曰我不欲人之加諸我也吾亦欲無加諸人未能忘我故也顔淵曰願無伐善無施勞能忘我故也子路曰願車馬衣輕裘與朋友共敝之而無憾未能忘物也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂能忘物也鎬此條可疑至之問此章曰正在欲字上不欲時便是全然無了這些一子心且如所不當為之事人若能不欲為其所不當為便是這箇心都無了是甚地位未到這地位便自要擔當了便不去做工夫聖人所以答他時且要它退一歩做工夫只這不自覺察便是病痛怡亦可疑子貢曰夫子之文章章子貢性與天道之嘆見得聖門之教不躐等又見其言及此實有不可以耳聞而得之者道夫性與天道性是就人物上説天道是隂陽五行僴吉甫問性與天道曰譬如一條長連底物事其流行者是天道人得之者為性乾之元亨利貞天道也人得之則為仁義禮智之性盖卿佐録云天道流行是一條長連底人便在此天道之中各得一截子自性與天道言之則天道者以天運而言自聖人之於天道言之則天道又却以性分而言這物事各有箇頓放處人傑問性與天道曰天有四時春夏秋冬風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也此可以觀性與天道雉㝢問集註説性以人之所受而言天道以理之自然而言不知性與天道亦只是説五常人所固有者何故不可得聞莫只是聖人怕人躐等否曰這般道理自是未消得理㑹且就它威儀文辭處學去這處熟性天道自可曉又問子貢既得聞之後嘆其不可得聞何也曰子貢亦用功至此方始得聞若未行得淺近者便知得他髙深作甚麽教聖人只管説這般話亦無意思天地造化隂陽五行之運若只管説要如何聖人於易方畧説到這處子罕言利與命與仁只㸔這處便見得聖人罕曾説及此又舉子所雅言詩書執禮皆雅言也這處却是聖人常説底後来孟子方説那話較多㝢問集注謂天道者天理自然之本體如何曰此言天運所謂繼之者善也即天理之流行者也性者着人而行之人傑問夫子之文章凡聖人威儀言辭皆徳之著見於外者學者所共聞也至扵性與天道乃是此理之精微盖性者是人所受於天有許多道理為心之體者也天道者謂自然之本體所以流行而付與萬物人物得之以為性者也聖人不以驟語學者故學者不得而聞然子貢却説得性與天道如此分明必是子貢可以語此故夫子從而告之曰文振㸔得文字平正又浹洽若㸔文字須還他平正又須浹洽無虧欠方得好南升問子貢是因文章中悟性天道抑後来聞孔子説邪曰是後来聞孔子説曰文章亦性天道之流行發見䖏曰固亦是發見䖏然他當初只是理㑹文章後来是聞孔子説性與天道今不可硬做是因文章得然孔子這般也罕説如一隂一陽之謂道繼之者善也成之者性也因繫易方説此豈不是言性與天道又如鼓萬物而不與聖人同憂大哉乾元萬物資始豈不言性與天道淳器之問性與天道子貢始得聞而歎美之舊時説性與天道便在這文章裏文章䖏即是天道曰此學禪者之説若如此孟子也不用説性善易中也不須説隂陽不測之謂神這道理也着知子貢當初未知得到這裏方始得聞耳㝢問孔子言性與天道不可得而聞而孟子教人乃開口便説性善是如何曰孟子亦只是大槩説性善至於性之所以善䖏也少得説須是如説一隂一陽之謂道繼之者善也成之者性也䖏方是説性與天道爾時舉叔器問謝氏文章性天道之説先生何故不取曰程先生不曾恁地説程先生説得實他説得虚安卿問先生不取謝氏説者莫是為他説只理㑹文章則性天道在其間否曰也是性天道只在文章中然聖人教人也不恁地子貢當時不曾恁地説如天命之謂性便是分明指那性大哉乾元萬物資始便是説道理一隂一陽之謂道繼之者善也成之者性也便是性與天道只是不迎頭便恁地説義剛朱子語類卷二十八
